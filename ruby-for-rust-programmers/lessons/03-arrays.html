const LESSON = {
  number: 3,
  title: "Arrays",

  intro: `
<p><code>Vec&lt;i32&gt;</code> becomes <code>Array</code> — no type
parameter, because there is nothing to parameterize: a Ruby array holds
anything, mixed freely (<code>[1, "two", 3.0]</code> is legal). Pushing needs
no <code>mut</code> because everything is mutable, and no
<code>&amp;mut self</code> because there are no borrows: the operator is
<code>&lt;&lt;</code>, pronounced "shovel". Membership checks take the value
itself — <code>arr.include?(x)</code>, no <code>&amp;x</code>.</p>
<table>
  <tr><th>Rust</th><th>Ruby</th></tr>
  <tr><td><code>let v: Vec&lt;i32&gt; = vec![1, 2, 3];</code></td><td><code>arr = [1, 2, 3]</code></td></tr>
  <tr><td><code>v.push(x)</code> (needs <code>mut</code>)</td><td><code>arr &lt;&lt; x</code> (everything is mutable)</td></tr>
  <tr><td><code>v.len()</code></td><td><code>arr.size</code></td></tr>
  <tr><td><code>v.contains(&amp;x)</code></td><td><code>arr.include?(x)</code> — no borrow</td></tr>
  <tr><td><code>v.first()</code> → <code>Option&lt;&amp;T&gt;</code></td><td><code>arr.first</code> → the element, or <code>nil</code></td></tr>
  <tr><td><code>v.last()</code> / <code>v[v.len() - 1]</code></td><td><code>arr.last</code> / <code>arr[-1]</code></td></tr>
  <tr><td><code>&amp;v[1..3]</code> (can panic)</td><td><code>arr[1..2]</code> (out of range → <code>nil</code>)</td></tr>
</table>
<p>Two collapses worth savoring. <code>Option&lt;&amp;T&gt;</code> collapses
to "the element, or <code>nil</code>": <code>arr.first</code> on an empty
array is just <code>nil</code>, no <code>unwrap</code>, no
<code>match</code>. And indexing gains a trick Rust deliberately refuses:
<strong>negative indexes</strong> count from the end, so
<code>arr[-1]</code> is the last element and <code>arr[-2]</code> the one
before it. Out-of-bounds indexing returns <code>nil</code> instead of
panicking — a softer failure mode you will learn to respect in lesson 6.</p>`,

  rust: `fn make_scores() -> Vec<i32> {
    vec![10, 20, 30]
}

fn append(arr: &mut Vec<i32>, x: i32) -> &Vec<i32> {
    arr.push(x); // &mut required: exclusive access, proven
    arr
}

fn total(nums: &[i32]) -> i32 {
    nums.iter().sum()
}

fn ends(arr: &[i32]) -> (Option<&i32>, Option<&i32>) {
    (arr.first(), arr.last()) // maybe-empty: Option
}

// let last = arr[arr.len() - 1]; // no negative indexing in Rust`,

  task: `
<p>Port the vector code to Ruby:</p>
<ol>
  <li><code>make_scores</code> — no arguments; the literal array
      <code>[10, 20, 30]</code>. No <code>vec!</code>, no element type.</li>
  <li><code>append(arr, x)</code> — push with the <code>&lt;&lt;</code>
      shovel operator. No <code>mut</code>, no <code>&amp;mut</code> — and
      since <code>&lt;&lt;</code> conveniently evaluates to the array itself,
      it can be your last expression.</li>
  <li><code>total(nums)</code> — sum the numbers with <code>.sum</code>; no
      <code>.iter()</code> needed first.</li>
  <li><code>ends(arr)</code> — the two-element array
      <code>[arr.first, arr.last]</code>. For an empty array both are
      <code>nil</code>, Ruby's collapsed <code>None</code>.</li>
</ol>`,

  requirements: [
    { pattern: /<</, message: "Push with the << shovel operator in append" },
    { pattern: /\.sum/, message: "Use .sum in total" },
    { pattern: /\.first/, message: "Use .first in ends" },

  tests: [
    { name: "make_scores returns [10, 20, 30]",
      code: "  expect_eq(make_scores, [10, 20, 30])" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "  expect_eq(append([1, 2], 3), [1, 2, 3])" },
    { name: "append([], 7) returns [7]",
      code: "  expect_eq(append([], 7), [7])" },
    { name: "total([1, 2, 3, 4]) returns 10",
      code: "  expect_eq(total([1, 2, 3, 4]), 10)" },
    { name: "ends([5, 6, 7]) returns [5, 7]",
      code: "  expect_eq(ends([5, 6, 7]), [5, 7])" },

  solution: `def make_scores
  [10, 20, 30]
end

def append(arr, x)
  arr << x
end

def total(nums)
  nums.sum
end

def ends(arr)
  [arr.first, arr.last]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Make one</td><td><code>vec![1, 2, 3]</code></td><td><code>[1, 2, 3]</code> — heterogeneous, no type parameter</td></tr>
  <tr><td>Push</td><td><code>v.push(x)</code> (needs <code>mut</code>)</td><td><code>arr &lt;&lt; x</code> (also <code>arr.push(x)</code>)</td></tr>
  <tr><td>Length</td><td><code>v.len()</code></td><td><code>arr.size</code> or <code>arr.length</code></td></tr>
  <tr><td>Membership</td><td><code>v.contains(&amp;x)</code></td><td><code>arr.include?(x)</code></td></tr>
  <tr><td>First / last</td><td><code>v.first()</code> → <code>Option&lt;&amp;T&gt;</code></td><td><code>arr.first</code> → element or <code>nil</code></td></tr>
  <tr><td>From the end</td><td><code>v[v.len() - 1]</code></td><td><code>arr[-1]</code>, <code>arr[-2]</code>, …</td></tr>
  <tr><td>Slice</td><td><code>&amp;v[1..3]</code> — panics out of range</td><td><code>arr[1..2]</code> — <code>nil</code> out of range</td></tr>
  <tr><td>Sum</td><td><code>v.iter().sum::&lt;i32&gt;()</code></td><td><code>arr.sum</code></td></tr>
</table>
<p>Notice what <code>append</code> did <em>not</em> need: no
<code>&amp;mut</code>, no clone-to-avoid-the-borrow, no returning ownership
back to the caller. Every value is a shared, garbage-collected reference, so
the array you pass in is the array the method mutates — aliasing that
<code>rustc</code> would statically forbid is Ruby's everyday calling
convention. That is real power and a real hazard: nothing stops a method
five calls away from shoveling onto your array. The borrow checker's proof
is gone; naming conventions (mutators end in <code>!</code> or are named
like <code>append</code>) and tests take its place.</p>`,
};
