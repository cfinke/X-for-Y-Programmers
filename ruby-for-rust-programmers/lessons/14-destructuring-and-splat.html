const LESSON = {
  number: 14,
  title: "Destructuring & Splat",

  intro: `
<p>Rust destructures with patterns: <code>let (a, b) = pair;</code>, slice
patterns like <code>[first, rest @ ..]</code>, and <code>mem::swap</code> or a
tuple round-trip to exchange two values. Ruby does the same jobs with
<strong>multiple assignment</strong> — no <code>let</code>, no parentheses,
and it works directly on arrays: <code>a, b = pair</code>. Swapping is the
one-liner Rust folklore wishes it had: <code>a, b = b, a</code>.</p>
<table>
  <tr><th>Rust</th><th>Ruby</th></tr>
  <tr><td><code>let (a, b) = pair;</code></td><td><code>a, b = pair</code></td></tr>
  <tr><td><code>std::mem::swap(&amp;mut a, &amp;mut b)</code></td><td><code>a, b = b, a</code></td></tr>
  <tr><td><code>let [first, rest @ ..] = ...</code></td><td><code>first, *rest = list</code></td></tr>
  <tr><td>no variadics — take <code>&amp;[i32]</code></td><td><code>def sum(*nums)</code> — nums is a plain array</td></tr>
  <tr><td><code>[left, right].concat()</code></td><td><code>[*a, *b]</code></td></tr>
  <tr><td><code>Settings { volume: 11, ..defaults }</code></td><td><code>defaults.merge(overrides)</code></td></tr>
</table>
<p>The star (<code>*</code>) is the <em>splat</em>. On the left of an
assignment it soaks up the rest of an array (<code>first, *rest = list</code>
— the slice pattern, without the <code>@ ..</code>). In a parameter list it
gives Ruby what Rust deliberately left out — variadic functions:
<code>def sum(*nums)</code> receives any number of arguments as a plain array.
And inside an array literal it spreads: <code>[*a, *b]</code> concatenates.
For hashes, <code>.merge</code> plays the role of struct-update syntax —
right-hand keys win.</p>`,

  rust: `fn swap(pair: (i32, i32)) -> (i32, i32) {
    let (a, b) = pair;
    (b, a)
}

fn head_tail(list: &[i32]) -> (i32, Vec<i32>) {
    match list {
        [first, rest @ ..] => (*first, rest.to_vec()),
        [] => panic!("empty list"),
    }
}

// Rust has no variadics — callers must build a slice:
fn sum(nums: &[i32]) -> i32 {
    nums.iter().sum()
}

// Struct-update syntax, the closest thing to a merge:
// let s = Settings { volume: 11, ..defaults };`,

  task: `
<p>Redo the pattern matching with multiple assignment and splats:</p>
<ol>
  <li><code>swap(pair)</code> — destructure with <code>a, b = pair</code>
      (no <code>let</code>, no parens) and return <code>[b, a]</code>.</li>
  <li><code>head_tail(list)</code> — the slice pattern is
      <code>first, *rest = list</code>. Return <code>[first, rest]</code>.</li>
  <li><code>sum(*nums)</code> — a real variadic: the splat parameter collects
      every argument into the array <code>nums</code>; return
      <code>nums.sum</code>. <code>sum()</code> with no arguments must return
      0.</li>
  <li><code>merge_settings(defaults, overrides)</code> — hash struct-update:
      <code>defaults.merge(overrides)</code>, where <code>overrides</code>
      wins on shared keys.</li>
</ol>`,

  starter: `# 1. swap: a, b = pair — then build the swapped array.
def swap(pair)
  raise NotImplementedError, "TODO: multiple assignment"
end

# 2. head_tail: first, *rest = list — the [first, rest @ ..] slice pattern.

  raise NotImplementedError, "TODO: splat the rest"
end

# 3. sum: the variadic Rust never got. nums arrives as a plain array.
def sum(*nums)
  raise NotImplementedError, "TODO: sum the splat parameter"
end

# 4. merge_settings: struct-update syntax for hashes; right side wins.
def merge_settings(defaults, overrides)
  raise NotImplementedError, "TODO: .merge"
end
`,

  requirements: [
    { pattern: /\*\w+/, message: "Use a splat (*rest or *nums) somewhere" },
    { pattern: /,\s*\*/, message: "Destructure with first, *rest = list" },
    { pattern: /\.merge/, message: "Combine the hashes with .merge" },
    { pattern: /def\s+sum\s*\(\s*\*/, message: "Make sum variadic: def sum(*nums)" },
  ],

  tests: [
    { name: "swap([1, 2]) returns [2, 1]",
      code: '  expect_eq(swap([1, 2]), [2, 1])\n  expect_eq(swap(["a", "b"]), ["b", "a"])' },
    { name: "head_tail([1, 2, 3]) returns [1, [2, 3]]",
      code: "  expect_eq(head_tail([1, 2, 3]), [1, [2, 3]])" },
    { name: "head_tail([9]) returns [9, []]",
      code: "  expect_eq(head_tail([9]), [9, []])" },
    { name: "sum(1, 2, 3) returns 6 — no slice required",
      code: "  expect_eq(sum(1, 2, 3), 6)" },
    { name: "sum() with no arguments returns 0",
      code: "  expect_eq(sum, 0)" },
    { name: "merge_settings lets overrides win",
      code: '  merged = merge_settings({ volume: 5, theme: "dark" }, { volume: 11 })\n  expect_eq(merged, { volume: 11, theme: "dark" })' },
  ],

  solution: `def swap(pair)
  a, b = pair
  [b, a]
end

def head_tail(list)
  first, *rest = list
  [first, rest]
end

def sum(*nums)
  nums.sum
end

def merge_settings(defaults, overrides)
  defaults.merge(overrides)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Destructure a pair</td><td><code>let (a, b) = pair;</code></td><td><code>a, b = pair</code></td></tr>
  <tr><td>Swap</td><td><code>mem::swap</code> / tuple dance</td><td><code>a, b = b, a</code></td></tr>
  <tr><td>Head + rest</td><td><code>[first, rest @ ..]</code> pattern</td><td><code>first, *rest = list</code></td></tr>
  <tr><td>Variadic function</td><td>none — take a slice</td><td><code>def sum(*nums)</code></td></tr>
  <tr><td>Spread into a literal</td><td><code>concat</code> / <code>extend</code></td><td><code>[*a, *b]</code></td></tr>
  <tr><td>Merge with overrides</td><td><code>Struct { x: 1, ..defaults }</code></td><td><code>defaults.merge(overrides)</code></td></tr>
  <tr><td>Keyword options</td><td>a config struct</td><td><code>def f(**opts)</code> — double splat</td></tr>
</table>
<p>The asymmetry to internalize: Rust patterns are <em>refutable or not</em>,
checked at compile time — a non-matching <code>let</code> is a compile error.
Ruby's multiple assignment never refuses: too few values on the right and the
extra variables get <code>nil</code>; too many and the extras are silently
dropped (unless a splat catches them). That forgiveness is what makes
<code>a, b = b, a</code> and <code>first, *rest = list</code> so terse — and
it is one more compile-time guarantee traded for brevity.</p>`,
};
