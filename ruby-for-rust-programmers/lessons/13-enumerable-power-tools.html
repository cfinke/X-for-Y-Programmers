  title: "Enumerable Power Tools",

  intro: `
<p>In Rust, the moment a pipeline outgrows <code>map</code>/<code>filter</code>
you reach for the <code>itertools</code> crate or hand-roll a <code>fold</code>
over a <code>HashMap</code> with the <code>entry</code> API. Ruby ships the
whole toolbox in <code>Enumerable</code>: <code>group_by</code> is a built-in,
the classic count-occurrences fold is one word — <code>.tally</code> — and
<code>partition</code> splits a collection in a single pass without a tuple of
<code>Vec</code> type hints.</p>
<table>
  <tr><th>Rust</th><th>Ruby</th></tr>
  <tr><td><code>use itertools::Itertools;</code> then <code>.into_group_map_by(|w| w.len())</code></td><td><code>.group_by(&amp;:length)</code></td></tr>
  <tr><td><code>*counts.entry(v).or_insert(0) += 1</code> in a loop</td><td><code>.tally</code></td></tr>
  <tr><td><code>.fold(HashMap::new(), |mut acc, x| { ...; acc })</code></td><td><code>.each_with_object(Hash.new(0)) { |x, acc| ... }</code></td></tr>
  <tr><td><code>.partition::&lt;Vec&lt;_&gt;, _&gt;(|n| n % 2 == 0)</code></td><td><code>.partition(&amp;:even?)</code></td></tr>
  <tr><td><code>.fold(0, |a, b| a + b)</code></td><td><code>.reduce(:+)</code></td></tr>
</table>
<p>The star for accumulation is <code>each_with_object</code>: it is
<code>fold</code> with a mutable accumulator and none of the ownership dance —
no <code>mut acc</code>, no remembering to return the accumulator from the
closure; the object is threaded through for you and returned at the end.
Seeding it with <code>Hash.new(0)</code> (a hash whose missing keys read as 0)
replaces the entire <code>entry(...).or_insert(0)</code> pattern with plain
<code>acc[key] += 1</code>.</p>`,

  rust: `use std::collections::HashMap;

fn vote_counts(votes: &[&str]) -> HashMap<String, u32> {
    let mut counts = HashMap::new();
    for v in votes {
        *counts.entry(v.to_string()).or_insert(0) += 1;
    }
    counts
}

fn split_evens(nums: &[i32]) -> (Vec<i32>, Vec<i32>) {
    nums.iter().partition(|n| *n % 2 == 0)
}

// Grouping needs a crate:
// use itertools::Itertools;

let total = [1, 2, 3].iter().fold(0, |a, b| a + b);`,

  solution: `def word_lengths(words)
  words.group_by(&:length)
end

def vote_counts(votes)
  votes.tally
end

def totals_by_category(items)
  items.each_with_object(Hash.new(0)) do |item, totals|
    totals[item[:category]] += item[:price]
  end
end

def split_evens(nums)
  nums.partition(&:even?)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Group by key</td><td><code>itertools::into_group_map_by</code></td><td><code>.group_by { |x| ... }</code></td></tr>
  <tr><td>Count occurrences</td><td><code>entry(k).or_insert(0) += 1</code> fold</td><td><code>.tally</code></td></tr>
  <tr><td>Fold into a collection</td><td><code>.fold(HashMap::new(), |mut acc, x| { ...; acc })</code></td><td><code>.each_with_object({}) { |x, acc| ... }</code></td></tr>
  <tr><td>Default-valued map</td><td><code>.entry(k).or_insert(0)</code></td><td><code>Hash.new(0)</code>, then plain <code>acc[k] += n</code></td></tr>
  <tr><td>Split by predicate</td><td><code>.partition::&lt;Vec&lt;_&gt;, _&gt;(...)</code></td><td><code>.partition { |x| ... }</code> → <code>[yes, no]</code></td></tr>
  <tr><td>Reduce</td><td><code>.fold(0, |a, b| a + b)</code></td><td><code>.reduce(:+)</code> — pass the operator as a symbol</td></tr>
</table>
<p>Note the argument order in <code>each_with_object</code>: the element comes
first, the accumulator second — the mirror image of <code>fold</code>'s
<code>|acc, x|</code>. And unlike <code>fold</code>, the block's return value
is ignored; the seeded object itself is what comes back, so there is no
trailing <code>acc</code> to remember. <code>reduce(:+)</code> shows the same
philosophy from another angle: where Rust passes a closure, Ruby can pass just
the name of the operation.</p>`,
