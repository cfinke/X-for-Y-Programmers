const LESSON = {
  number: 7,
  title: "Comparisons & Type Juggling",

  intro: `
<p>This is the lesson your TypeScript instincts need most. PHP's
<code>==</code> <em>juggles</em> types before comparing — <code>"1" == 1</code>
is <code>true</code>, just like the JavaScript <code>==</code> your linter has
banned for years. The fix is the same one you already practice:
<code>===</code> compares value <em>and</em> type with no coercion. Your
"always use triple equals" habit transfers to PHP completely intact — keep it.</p>
<table>
  <tr><th>Expression</th><th>TypeScript / JS</th><th>PHP</th></tr>
  <tr><td><code>"1" == 1</code></td><td><code>true</code> (lint-banned)</td><td><code>true</code> (avoid it here too)</td></tr>
  <tr><td><code>"1" === 1</code></td><td><code>false</code></td><td><code>false</code> — use this one</td></tr>
  <tr><td><code>if ("0")</code></td><td>truthy (non-empty string)</td><td><strong>falsy!</strong> <code>"0"</code> casts to false</td></tr>
  <tr><td><code>if ([])</code></td><td>truthy (objects always are)</td><td>falsy (empty array)</td></tr>
  <tr><td>three-way compare</td><td>write it by hand</td><td><code>$a &lt;=&gt; $b</code> → -1 / 0 / 1</td></tr>
  <tr><td><code>typeof x === "string"</code></td><td>runtime check</td><td><code>is_string($x)</code>, <code>is_int($x)</code>…</td></tr>
</table>
<p>Truthiness is where PHP diverges from muscle memory: <code>""</code>,
<code>0</code>, <code>null</code>, and the empty array <code>[]</code> are
falsy as you'd guess — but so is the string <code>"0"</code>, which is truthy
in JS. Cast with <code>(bool)</code> when you want PHP's answer explicitly.
Two genuinely new tools round it out: the spaceship operator
<code>&lt;=&gt;</code> returns -1, 0, or 1 (tailor-made for comparators, as
you'll see with <code>usort</code> later), and the <code>is_*</code> family
(<code>is_int</code>, <code>is_string</code>, <code>is_array</code>…) replaces
<code>typeof</code> checks.</p>`,

  typescript: `// TS habit: === always, == is lint-banned.
const a: unknown = "1";
console.log(a === 1);         // false — string vs number

// JS truthiness: "0" is a non-empty string, so it's truthy
if ("0") {
  console.log("this RUNS in JS — but not in PHP!");
}

// No spaceship operator — comparators are handwritten:
const compareNums = (x: number, y: number): number =>
  x < y ? -1 : x > y ? 1 : 0;

// Runtime type checks go through typeof:
typeof a === "string";        // true`,

  task: `
<p>Write three small functions that pin down PHP's comparison semantics:</p>
<ol>
  <li><code>same_value_and_type(mixed $a, mixed $b): bool</code> — return
      whether the two are identical using <code>===</code>. (<code>mixed</code>
      is PHP's <code>unknown</code>-ish "anything" type.)</li>
  <li><code>is_truthy(mixed $v): bool</code> — return PHP's boolean view of any
      value using an explicit <code>(bool)</code> cast. The tests probe the
      spots where PHP disagrees with JS — <code>"0"</code> especially.</li>
  <li><code>compare_nums(int $a, int $b): int</code> — return -1, 0, or 1 using
      the spaceship operator <code>&lt;=&gt;</code>. No ternary chains.</li>
</ol>`,

  starter: `<?php

// 1. Identical: same value AND same type, no juggling.
function same_value_and_type(mixed $a, mixed $b): bool {
    throw new Exception("TODO: implement same_value_and_type");
}

// 2. PHP truthiness, made explicit with a (bool) cast.
//    Careful: "0" is falsy in PHP, unlike JS!
function is_truthy(mixed $v): bool {
    throw new Exception("TODO: implement is_truthy");
}

// 3. Spaceship: -1 if $a < $b, 0 if equal, 1 if $a > $b.
function compare_nums(int $a, int $b): int {
    throw new Exception("TODO: implement compare_nums");
}
`,

  requirements: [
    { pattern: /===/, message: "Use the identity operator === (never == in this course)" },
    { pattern: /<=>/, message: "Use the spaceship operator <=> in compare_nums" },
    { pattern: /\(bool\)/, message: "Use an explicit (bool) cast in is_truthy" },
  ],

  tests: [
    { name: 'same_value_and_type: 1 === 1 but "1" !== 1 (no juggling)',
      code: 'expect_true(same_value_and_type(1, 1)); expect_true(!same_value_and_type("1", 1));' },
    { name: 'is_truthy("0") is false — the string "0" is falsy in PHP!',
      code: 'expect_true(!is_truthy("0"));' },
    { name: 'is_truthy: "" and [] are falsy, "false" is truthy',
      code: 'expect_true(!is_truthy("")); expect_true(!is_truthy([])); expect_true(is_truthy("false"));' },
    { name: "compare_nums(1, 2) returns -1",
      code: "expect_eq(compare_nums(1, 2), -1);" },
    { name: "compare_nums(5, 5) returns 0 and compare_nums(9, 2) returns 1",
      code: "expect_eq(compare_nums(5, 5), 0); expect_eq(compare_nums(9, 2), 1);" },
  ],

  solution: `<?php

function same_value_and_type(mixed $a, mixed $b): bool {
    return $a === $b;
}

function is_truthy(mixed $v): bool {
    return (bool) $v;
}

function compare_nums(int $a, int $b): int {
    return $a <=> $b;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Loose equality</td><td><code>==</code> (banned by lint)</td><td><code>==</code> (juggles — avoid the same way)</td></tr>
  <tr><td>Strict equality</td><td><code>===</code></td><td><code>===</code> (and <code>!==</code>)</td></tr>
  <tr><td>Falsy values</td><td><code>"" 0 null undefined NaN false</code></td><td><code>"" "0" 0 0.0 null false []</code></td></tr>
  <tr><td><code>"0"</code></td><td>truthy</td><td><strong>falsy</strong> — the classic trap</td></tr>
  <tr><td><code>[]</code></td><td>truthy (it's an object)</td><td>falsy (empty array)</td></tr>
  <tr><td>Three-way compare</td><td>handwritten ternary</td><td><code>$a &lt;=&gt; $b</code></td></tr>
  <tr><td>Runtime type check</td><td><code>typeof x === "string"</code></td><td><code>is_string($x)</code>, <code>is_int($x)</code>, <code>is_array($x)</code></td></tr>
  <tr><td>Explicit bool</td><td><code>Boolean(x)</code> / <code>!!x</code></td><td><code>(bool) $x</code></td></tr>
</table>
<p>PHP 8 tamed the worst juggling — <code>0 == "foo"</code> was
<code>true</code> for decades and is now <code>false</code> — but
<code>"1" == 1</code> still holds, and <code>switch</code> still compares
loosely (next lesson). The rule that needs zero adjustment: reach for
<code>===</code> every time, and treat any <code>==</code> in a code review as
a question that needs answering.</p>`,
};
