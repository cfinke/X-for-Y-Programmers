const LESSON = {
  number: 13,
  title: "array_map, array_filter & Friends",

  intro: `
<p><code>.map</code>, <code>.filter</code>, and <code>.reduce</code> all exist
in PHP — as free functions, not methods, and with two quirks that bite every
TypeScript developer. Quirk one: the argument order is <em>inconsistent</em>.
<code>array_map($fn, $arr)</code> takes the callback <strong>first</strong>;
<code>array_filter($arr, $fn)</code> takes it <strong>second</strong>. There is
no logic to memorize your way around — you just learn it.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>arr.map(fn)</code></td><td><code>array_map($fn, $arr)</code> — callback <em>first</em></td></tr>
  <tr><td><code>arr.filter(fn)</code></td><td><code>array_filter($arr, $fn)</code> — callback <em>second</em></td></tr>
  <tr><td><code>arr.reduce(fn, init)</code></td><td><code>array_reduce($arr, $fn, $init)</code></td></tr>
  <tr><td><code>arr.reduce((t, n) =&gt; t + n, 0)</code></td><td><code>array_sum($arr)</code> (the shortcut)</td></tr>
  <tr><td>filter returns a fresh 0-indexed array</td><td>filter <strong>preserves keys</strong> — wrap in <code>array_values()</code></td></tr>
</table>
<p>Quirk two is the classic PHP bug: <code>array_filter</code>
<strong>preserves keys</strong>. Filter <code>[10, 15, 20]</code> down to the
even values and you get <code>[0 =&gt; 10, 2 =&gt; 20]</code> — an array with
a <em>hole</em>. Compare it to <code>[10, 20]</code> and it's not equal;
<code>json_encode</code> it and it becomes an object, not an array. The fix is
<code>array_values()</code>, which discards keys and reindexes from 0. Until
it's reflex, wrap every <code>array_filter</code> you write.</p>`,

  typescript: `type Product = { name: string; priceCents: number; inStock: boolean };

function inStockNames(products: Product[]): string[] {
  return products
    .filter((p) => p.inStock)
    .map((p) => p.name);        // always a fresh, 0-indexed array
}

function totalValue(products: Product[]): number {
  return products.reduce((sum, p) => sum + p.priceCents, 0);
}

function evensDoubled(nums: number[]): number[] {
  return nums
    .filter((n) => n % 2 === 0)
    .map((n) => n * 2);         // [1, 2, 3, 4] -> [4, 8]
}`,

  task: `
<p>Port the three pipelines. Products are associative arrays shaped like
<code>['name' =&gt; 'Keyboard', 'price_cents' =&gt; 4500, 'in_stock' =&gt; true]</code>:</p>
<ol>
  <li><code>in_stock_names(array $products): array</code> — filter to the
      products whose <code>'in_stock'</code> is true, map each to its
      <code>'name'</code>, and reindex with <code>array_values()</code> so the
      result is a clean list. Mind the argument order:
      <code>array_filter($products, $fn)</code> but
      <code>array_map($fn, $products)</code>.</li>
  <li><code>total_value(array $products): int</code> — the sum of every
      product's <code>'price_cents'</code>. <code>array_map</code> the prices
      out, then <code>array_sum</code> (or <code>array_reduce</code>) them.</li>
  <li><code>evens_doubled(array $nums): array</code> — keep the even numbers
      (<code>$n % 2 === 0</code>), double them, reindex. One test feeds it
      <code>[1, 2, 3, 4, 5]</code> and expects exactly <code>[4, 8]</code> —
      keys included, so a forgotten <code>array_values()</code> fails.</li>
</ol>`,

  starter: `<?php

// Callback FIRST for map, SECOND for filter. Yes, really.
// fn($p) => $p['name'] is PHP's arrow function (next lesson digs in).

function in_stock_names(array $products): array {
    throw new Exception("TODO: array_filter, array_map, array_values");
}

function total_value(array $products): int {
    throw new Exception("TODO: array_map the prices, then array_sum");
}

function evens_doubled(array $nums): array {
    throw new Exception("TODO: filter evens, double, reindex");
}
`,

  requirements: [
    { pattern: /array_map/, message: "Use array_map (callback first!)" },
    { pattern: /array_filter/, message: "Use array_filter (callback second!)" },
    { pattern: /array_values/, message: "Reindex filtered results with array_values" },
    { pattern: /array_reduce|array_sum/, message: "Total the prices with array_sum or array_reduce" },
  ],

  tests: [
    { name: "in_stock_names skips out-of-stock products and reindexes from 0",
      code: "$products = [\n    ['name' => 'Mouse', 'price_cents' => 1500, 'in_stock' => false],\n    ['name' => 'Keyboard', 'price_cents' => 4500, 'in_stock' => true],\n    ['name' => 'Monitor', 'price_cents' => 20000, 'in_stock' => true],\n];\nexpect_eq(in_stock_names($products), ['Keyboard', 'Monitor']);" },
    { name: "in_stock_names([]) returns []",
      code: "expect_eq(in_stock_names([]), []);" },
    { name: "total_value sums price_cents across all products",
      code: "$products = [\n    ['name' => 'Mouse', 'price_cents' => 1500, 'in_stock' => false],\n    ['name' => 'Keyboard', 'price_cents' => 4500, 'in_stock' => true],\n    ['name' => 'Monitor', 'price_cents' => 20000, 'in_stock' => true],\n];\nexpect_eq(total_value($products), 26000);" },
    { name: "total_value([]) returns 0",
      code: "expect_eq(total_value([]), 0);" },
    { name: "evens_doubled([1, 2, 3, 4, 5]) returns [4, 8] — with keys 0 and 1, not 1 and 3",
      code: "expect_eq(evens_doubled([1, 2, 3, 4, 5]), [4, 8]);" },
    { name: "evens_doubled([1, 3, 5]) returns []",
      code: "expect_eq(evens_doubled([1, 3, 5]), []);" },
  ],

  solution: `<?php

function in_stock_names(array $products): array {
    $available = array_filter($products, fn($p) => $p['in_stock']);
    return array_values(array_map(fn($p) => $p['name'], $available));
}

function total_value(array $products): int {
    return array_sum(array_map(fn($p) => $p['price_cents'], $products));
}

function evens_doubled(array $nums): array {
    $evens = array_filter($nums, fn($n) => $n % 2 === 0);
    return array_values(array_map(fn($n) => $n * 2, $evens));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Map</td><td><code>arr.map(fn)</code></td><td><code>array_map($fn, $arr)</code></td></tr>
  <tr><td>Filter</td><td><code>arr.filter(fn)</code></td><td><code>array_values(array_filter($arr, $fn))</code></td></tr>
  <tr><td>Reduce</td><td><code>arr.reduce(fn, init)</code></td><td><code>array_reduce($arr, $fn, $init)</code></td></tr>
  <tr><td>Sum</td><td><code>reduce((t, n) =&gt; t + n, 0)</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td>Find / some / every</td><td><code>find / some / every</code></td><td><code>array_find / array_any / array_all</code> (8.4+)</td></tr>
  <tr><td>Sort</td><td><code>arr.toSorted(cmp)</code></td><td><code>usort($arr, $cmp)</code> — in place, by reference</td></tr>
</table>
<p>Why does <code>array_filter</code> preserve keys? Because PHP has only one
array type: for an associative array, keeping keys is obviously right, and
filter can't know your array was "really" a list. <code>array_map</code> over
a single array happens to preserve keys too, but since filtering is what
creates holes, the reflex to build is: <em>filter, then
<code>array_values</code></em> — especially before <code>===</code>
comparisons or <code>json_encode</code>.</p>`,
};
