<div id="app"></div>
<script>
const LESSON = {
  number: 15,
  title: "Closures & Callables",

  intro: `
<p>Here is the sharpest anti-JavaScript edge in PHP: <strong>anonymous
functions capture nothing by default</strong>. In JS, every function closes
over its entire lexical scope automatically. In PHP, a
<code>function () { ... }</code> body starts with a blank slate — outer
variables must be opted in one by one with a <code>use</code> clause:
<code>function () use ($x) { ... }</code>. And capture is <em>by value</em>, a
snapshot at creation time; write <code>use (&amp;$x)</code> to capture the
variable itself by reference, so the closure sees (and makes) changes.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>() =&gt; x * 2</code> (auto-captures <code>x</code>)</td><td><code>fn() =&gt; $x * 2</code> (auto-captures, by value)</td></tr>
  <tr><td><code>function () { return x; }</code> (auto-captures)</td><td><code>function () use ($x) { return $x; }</code> (explicit)</td></tr>
  <tr><td>mutate a captured variable — just works</td><td><code>function () use (&amp;$count) { $count++; }</code></td></tr>
  <tr><td><code>f: (x: number) =&gt; number</code></td><td><code>callable $f</code> or <code>Closure $f</code></td></tr>
  <tr><td>functions are values already</td><td><code>strlen(...)</code> — first-class callable syntax (8.1)</td></tr>
</table>
<p>PHP 7.4's arrow functions, <code>fn($a) =&gt; expr</code>, are the
JS-flavored exception: they <em>do</em> auto-capture — but only by value, and
the body must be a single expression. For types: <code>callable</code> accepts
anything invokable (closures, <code>'strlen'</code> strings,
<code>[$obj, 'method']</code> pairs), while <code>Closure</code> is the
concrete class every anonymous function is an instance of — use it as a
return type. To turn a named function into a value, modern PHP writes
<code>strlen(...)</code> rather than the stringly-typed <code>'strlen'</code>.</p>`,

  typescript: `// JS closures capture their whole scope, automatically.
function makeMultiplier(n: number) {
  return (x: number) => x * n;   // n just comes along for free
}

function applyTwice(f: (x: number) => number, x: number): number {
  return f(f(x));
}

function makeCounter(): () => number {
  let count = 0;
  return () => ++count;          // mutating the captured binding: no ceremony
}

const c = makeCounter();
c(); c(); c();                   // 1, 2, 3`,

  task: `
<p>Rebuild the three factories, choosing the right capture mode each time:</p>
<ol>
  <li><code>make_multiplier(int $n): Closure</code> — return
      <code>fn(int $x) =&gt; $x * $n;</code>. Arrow functions auto-capture
      <code>$n</code> by value, so this reads exactly like the TS.</li>
  <li><code>apply_twice(callable $f, int $x): int</code> — call <code>$f</code>
      on <code>$x</code>, then on the result: <code>$f($f($x))</code>. A
      variable holding a callable is invoked with plain parentheses.</li>
  <li><code>make_counter(): Closure</code> — the by-reference one. Initialize
      <code>$count = 0;</code> and return a long-form closure with
      <code>use (&amp;$count)</code> that increments and returns it. Successive
      calls must yield <code>1, 2, 3</code> — by-value capture (or an arrow
      function) would snapshot <code>0</code> forever and fail.</li>
</ol>`,

  starter: `<?php

// fn(...) => expr auto-captures by value — the JS-feeling one.
function make_multiplier(int $n): Closure {
    throw new Exception("TODO: return fn(int \\$x) => ...");
}

// callable accepts closures, 'strlen' strings, [\\$obj, 'method'] pairs...
function apply_twice(callable $f, int $x): int {
    throw new Exception("TODO: call \\$f twice");
}

// Long-form closures capture NOTHING unless you say use (...).
// use (\\$count) snapshots the value; use (&\\$count) shares the variable.
function make_counter(): Closure {
    throw new Exception("TODO: \\$count = 0; return a closure with use (&\\$count)");
}
`,

  requirements: [
    { pattern: /use\s*\(\s*&/, message: "Capture the counter by reference: use (&$count)" },
    { pattern: /fn\s*\(/, message: "Use an arrow function fn(...) => ... somewhere" },
    { pattern: /callable|Closure/, message: "Type the function-valued parameters/returns with callable or Closure" },
  ],

  tests: [
    { name: "make_multiplier(2) returns a closure: (5) gives 10",
      code: "$double = make_multiplier(2);\nexpect_eq($double(5), 10);" },
    { name: "each multiplier keeps its own captured $n: triple(7) is 21 while double(7) is 14",
      code: "$double = make_multiplier(2);\n$triple = make_multiplier(3);\nexpect_eq($triple(7), 21);\nexpect_eq($double(7), 14);" },
    { name: "apply_twice(fn($x) => $x + 3, 10) returns 16",
      code: "expect_eq(apply_twice(fn($x) => $x + 3, 10), 16);" },
    { name: "apply_twice(make_multiplier(2), 3) returns 12 — closures are callables",
      code: "expect_eq(apply_twice(make_multiplier(2), 3), 12);" },
    { name: "make_counter(): successive calls return 1, 2, 3 (use (&$count) at work)",
      code: "$c = make_counter();\nexpect_eq($c(), 1);\nexpect_eq($c(), 2);\nexpect_eq($c(), 3);" },
    { name: "two counters don't share state",
      code: "$a = make_counter();\n$b = make_counter();\n$a();\nexpect_eq($a(), 2);\nexpect_eq($b(), 1);" },
  ],

  solution: `<?php

function make_multiplier(int $n): Closure {
    return fn(int $x) => $x * $n;
}

function apply_twice(callable $f, int $x): int {
    return $f($f($x));
}

function make_counter(): Closure {
    $count = 0;
    return function () use (&$count): int {
        $count += 1;
        return $count;
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Anonymous function</td><td><code>function () { ... }</code> — captures all</td><td><code>function () use ($x) { ... }</code> — captures listed only</td></tr>
  <tr><td>Arrow function</td><td><code>(a) =&gt; expr</code></td><td><code>fn($a) =&gt; expr</code> — auto-capture by value, one expression</td></tr>
  <tr><td>Capture by reference</td><td>automatic (bindings are shared)</td><td><code>use (&amp;$x)</code></td></tr>
  <tr><td>Function type</td><td><code>(x: number) =&gt; number</code></td><td><code>callable</code> (loose) / <code>Closure</code> (concrete class)</td></tr>
  <tr><td>Named function as value</td><td><code>const f = strlen;</code></td><td><code>$f = strlen(...);</code> (8.1) or <code>$f = 'strlen';</code></td></tr>
  <tr><td>Method as value</td><td><code>obj.method.bind(obj)</code></td><td><code>$obj-&gt;method(...)</code></td></tr>
  <tr><td>Call it</td><td><code>f(x)</code></td><td><code>$f($x)</code></td></tr>
</table>
<p>Why the ceremony? PHP functions don't form a scope chain — a closure is an
object that must be handed its captures explicitly, and by-value is the safe
default (no spooky mutation at a distance). Reach for <code>use (&amp;$x)</code>
only when shared mutable state is the point, as in the counter. In practice
most PHP callbacks are arrow functions (<code>array_map(fn($p) =&gt;
$p['name'], $products)</code> from last lesson), which quietly behave like the
JS you already write.</p>`,
};
