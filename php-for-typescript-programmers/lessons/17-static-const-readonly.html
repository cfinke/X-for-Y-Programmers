<script>
const LESSON = {
  number: 17,
  title: "Static, Constants & readonly",

  intro: `
<p>Everything class-level in PHP is reached with <code>::</code> instead of
<code>.</code> — and that one operator covers all three of today's features.
A class constant, <code>const MAX_ITEMS = 10;</code>, is TS's
<code>static readonly MAX_ITEMS = 10</code>: no <code>$</code> sigil, read as
<code>Config::MAX_ITEMS</code>, fixed at parse time. Static properties and
methods work like TS statics, except that inside the class you say
<code>self::$count</code> and <code>self::increment()</code> rather than
repeating the class name.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>static readonly MAX = 10;</code></td><td><code>const MAX = 10;</code></td></tr>
  <tr><td><code>Config.MAX</code></td><td><code>Config::MAX</code></td></tr>
  <tr><td><code>private static count = 0;</code></td><td><code>private static int $count = 0;</code></td></tr>
  <tr><td><code>Counter.count</code> (inside class)</td><td><code>self::$count</code></td></tr>
  <tr><td><code>constructor(public readonly name: string)</code></td><td><code>__construct(public readonly string $name)</code></td></tr>
  <tr><td><code>readonly</code> checked at compile time</td><td><code>readonly</code> enforced at runtime (throws <code>Error</code>)</td></tr>
</table>
<p>The star of PHP 8.1 is <code>readonly</code> on properties: written once
(in the constructor), then locked. It combines beautifully with promoted
constructor parameters — <code>public readonly string $name</code> in the
signature declares, types, assigns, <em>and</em> freezes the property in one
stroke. Where TS's <code>readonly</code> evaporates at runtime (a cast can
mutate it), PHP's is real: a later write throws an <code>Error</code> while
the program runs.</p>`,

  typescript: `class Counter {
  private static count = 0;

  static increment(): number {
    Counter.count += 1;
    return Counter.count;
  }

  static current(): number {
    return Counter.count;
  }
}

class Config {
  static readonly DEFAULT_NAME = "guest";
  constructor(public readonly name: string) {}
}

const c = new Config("ada");
// c.name = "x";  // TS: compile error — but gone at runtime`,

  task: `
<p>Port both classes:</p>
<ol>
  <li>Write <code>class Counter</code> with
      <code>private static int $count = 0;</code>,
      <code>public static function increment(): int</code> (add 1 to
      <code>self::$count</code> and return it), and
      <code>public static function current(): int</code> (return
      <code>self::$count</code>). Remember: static <em>properties</em> keep
      the sigil after the arrows — <code>self::$count</code>, not
      <code>self::count</code>.</li>
  <li>Write <code>class Config</code> with a class constant
      <code>const DEFAULT_NAME = "guest";</code> (no <code>$</code>, no
      <code>static</code> keyword) and a promoted readonly constructor:
      <code>public function __construct(public readonly string $name) {}</code>.
      The tests read <code>$c-&gt;name</code> and verify that writing it
      throws an <code>Error</code>.</li>
</ol>`,

  starter: `<?php

// 1. Counter: private static int $count = 0, plus two static methods.
//    Inside the class, the property is self::$count (sigil stays!).
class Counter {
    // TODO: private static int $count = 0;

    public static function increment(): int {
        throw new Exception("TODO: implement increment");
    }

    public static function current(): int {
        throw new Exception("TODO: implement current");
    }
}

// 2. Config: const DEFAULT_NAME = "guest" and a promoted readonly $name.
//    TS: constructor(public readonly name: string) {}
class Config {
    // TODO: const DEFAULT_NAME = "guest";

    public function __construct(string $name) {
        throw new Exception("TODO: promote \$name to public readonly string");
    }
}
`,

  requirements: [
    { pattern: /static\s+/, message: "Declare static members on Counter" },
    { pattern: /const\s+[A-Z_]+/, message: "Declare the DEFAULT_NAME class constant with const" },
    { pattern: /readonly/, message: "Make Config's $name a readonly property" },
  ],

  tests: [
    { name: "Counter::current() starts at 0",
      code: "expect_eq(Counter::current(), 0);" },
    { name: "Counter::increment() returns 1 on first call",
      code: "expect_eq(Counter::increment(), 1);" },
    { name: "a second increment brings current() to 2 (state is shared)",
      code: "expect_eq(Counter::increment(), 2);\nexpect_eq(Counter::current(), 2);" },
    { name: 'Config::DEFAULT_NAME is "guest" and $c->name reads back',
      code: 'expect_eq(Config::DEFAULT_NAME, "guest");\n$c = new Config("ada");\nexpect_eq($c->name, "ada");' },
    { name: "writing a readonly property throws an Error",
      code: '$c = new Config("ada");\ntry { $c->name = "x"; throw new Exception("no error"); } catch (Error $e) {}' },
  ],

  solution: `<?php

class Counter {
    private static int $count = 0;

    public static function increment(): int {
        self::$count += 1;
        return self::$count;
    }

    public static function current(): int {
        return self::$count;
    }
}

class Config {
    const DEFAULT_NAME = "guest";

    public function __construct(public readonly string $name) {}
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Class constant</td><td><code>static readonly MAX = 10;</code></td><td><code>const MAX = 10;</code></td></tr>
  <tr><td>Read a constant</td><td><code>Config.MAX</code></td><td><code>Config::MAX</code> (or <code>self::MAX</code> inside)</td></tr>
  <tr><td>Static property</td><td><code>private static count = 0;</code></td><td><code>private static int $count = 0;</code></td></tr>
  <tr><td>Use it inside the class</td><td><code>Counter.count</code></td><td><code>self::$count</code></td></tr>
  <tr><td>Static method call</td><td><code>Counter.increment()</code></td><td><code>Counter::increment()</code></td></tr>
  <tr><td>Readonly property</td><td><code>public readonly name: string</code></td><td><code>public readonly string $name</code> (8.1+)</td></tr>
  <tr><td>Violation caught…</td><td>at compile time only</td><td>at runtime — throws <code>Error</code></td></tr>
</table>
<p>Keep the two sigil rules straight: constants never take <code>$</code>
(<code>Config::DEFAULT_NAME</code>), while static properties keep it even
after <code>::</code> (<code>self::$count</code>). And note which branch of
the Throwable tree a readonly violation lands in — it's an <code>Error</code>,
the engine's branch from Lesson 16, not an <code>Exception</code>. That's PHP
telling you it's a programming bug to fix, not a condition to handle.</p>`,
};
