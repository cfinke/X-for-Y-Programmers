const LESSON = {
  number: 9,
  title: "Classes & Objects",

  intro: `
<p>PHP classes will feel like coming home: the constructor is named
<code>__construct</code> instead of <code>constructor</code>, member access
uses <code>-&gt;</code> instead of <code>.</code>, and instantiation is the
same <code>new BankAccount("Ada")</code>. Best of all, PHP 8 has
<em>constructor property promotion</em> — put a visibility keyword on a
constructor parameter and it becomes a property, assigned automatically. You
know this feature: it's TypeScript's parameter properties
(<code>constructor(private balance: number)</code>), nearly keystroke for
keystroke.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>constructor(private balance: number = 0) {}</code></td><td><code>public function __construct(private int $balance = 0) {}</code></td></tr>
  <tr><td><code>this.balance</code></td><td><code>$this-&gt;balance</code></td></tr>
  <tr><td><code>acct.deposit(5)</code></td><td><code>$acct-&gt;deposit(5)</code></td></tr>
  <tr><td><code>new BankAccount("Ada")</code></td><td><code>new BankAccount("Ada")</code> (identical)</td></tr>
  <tr><td><code>balance</code> (bare, inside methods)</td><td>never bare — always <code>$this-&gt;balance</code></td></tr>
</table>
<p>Two habits to adjust. First, <code>$this</code> is <em>mandatory</em>:
inside a method, a bare <code>$balance</code> is a fresh local variable, not
the property — property reads and writes always go through
<code>$this-&gt;balance</code> (note: no <code>$</code> after the arrow).
Second, visibility defaults differ: PHP members default to
<code>public</code>, and methods are declared
<code>public function deposit(...)</code> — visibility keyword first, then
<code>function</code>.</p>`,

  typescript: `class BankAccount {
  // Parameter properties — PHP 8 adopted this exact idea.
  constructor(private owner: string, private balance: number = 0) {}

  getOwner(): string { return this.owner; }

  deposit(amount: number): void {
    this.balance += amount;
  }

  withdraw(amount: number): boolean {
    if (amount > this.balance) return false;
    this.balance -= amount;
    return true;
  }

  getBalance(): number { return this.balance; }
}

const acct = new BankAccount("Ada");
acct.deposit(100);
acct.withdraw(30);       // true; balance is now 70`,

  task: `
<p>Port <code>BankAccount</code>. The starter already declares the promoted
constructor — <code>private string $owner</code> and
<code>private int $balance = 0</code> become properties automatically. Fill in

conventionally stay camelCase-ish, but these are single words anyway):</p>
<ol>
  <li><code>owner(): string</code> — return the promoted
      <code>$this-&gt;owner</code>.</li>
  <li><code>deposit(int $amount): void</code> — add to
      <code>$this-&gt;balance</code>.</li>
  <li><code>withdraw(int $amount): bool</code> — if <code>$amount</code>

  <li><code>balance(): int</code> — return the current balance.</li>
</ol>
<p>The tests build accounts with <code>new BankAccount("Ada")</code> and check
that a failed withdrawal really leaves the balance untouched.</p>`,

  requirements: [
    { pattern: /__construct\s*\(\s*(private|public)/, message: "Use constructor property promotion (visibility keyword on the constructor parameter)" },
    { pattern: /private/, message: "Keep $owner and $balance private" },
    { pattern: /->/, message: "Access properties with $this-> (the . of TypeScript)" },
  ],

  tests: [
    { name: 'new BankAccount("Ada") starts at balance 0 with the right owner',
      code: '$a = new BankAccount("Ada"); expect_eq($a->owner(), "Ada"); expect_eq($a->balance(), 0);' },
    { name: "deposit(100) brings the balance to 100",
      code: '$a = new BankAccount("Ada"); $a->deposit(100); expect_eq($a->balance(), 100);' },
    { name: "withdraw(30) from 100 returns true and leaves 70",
      code: '$a = new BankAccount("Ada"); $a->deposit(100); expect_true($a->withdraw(30)); expect_eq($a->balance(), 70);' },
    { name: "overdrawing returns false and leaves the balance unchanged",
      code: '$a = new BankAccount("Ada"); $a->deposit(20); expect_true(!$a->withdraw(50)); expect_eq($a->balance(), 20);' },
    { name: "two accounts keep separate balances",
      code: '$a = new BankAccount("Ada"); $b = new BankAccount("Grace"); $a->deposit(5); expect_eq($b->balance(), 0); expect_eq($a->balance(), 5);' },
  ],

  solution: `<?php

class BankAccount {
    public function __construct(
        private string $owner,
        private int $balance = 0,
    ) {}

    public function owner(): string {
        return $this->owner;
    }

    public function deposit(int $amount): void {
        $this->balance += $amount;
    }

    public function withdraw(int $amount): bool {
        if ($amount > $this->balance) {
            return false;
        }
        $this->balance -= $amount;
        return true;
    }

    public function balance(): int {
        return $this->balance;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Constructor</td><td><code>constructor(...)</code></td><td><code>public function __construct(...)</code></td></tr>
  <tr><td>Parameter properties</td><td><code>constructor(private x: number)</code></td><td><code>__construct(private int $x)</code> (promotion)</td></tr>
  <tr><td>Member access</td><td><code>obj.prop</code> / <code>this.prop</code></td><td><code>$obj-&gt;prop</code> / <code>$this-&gt;prop</code></td></tr>
  <tr><td>Implicit <code>this</code></td><td><code>balance</code> works in methods? No — but close</td><td>never — <code>$this-&gt;</code> is mandatory</td></tr>
  <tr><td>Method declaration</td><td><code>deposit(n: number): void</code></td><td><code>public function deposit(int $n): void</code></td></tr>
  <tr><td>Default visibility</td><td><code>public</code></td><td><code>public</code> (same — but write it out)</td></tr>
  <tr><td>Instantiate</td><td><code>new BankAccount("Ada")</code></td><td><code>new BankAccount("Ada")</code></td></tr>
</table>
<p>One conceptual upgrade over TS: PHP's <code>private</code> is enforced at
runtime — touching <code>$acct-&gt;balance</code> from outside throws an
<code>Error</code>, whereas TypeScript's <code>private</code> erases at
compile time and JS callers can reach right in. The property arrow also
composes with what you learned in Lesson 6: <code>?-&gt;</code> is this same
arrow, made null-tolerant.</p>`,
