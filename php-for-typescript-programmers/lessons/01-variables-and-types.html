<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>PHP variables wear a sigil: every variable is <code>$name</code>, declared
by assignment — no <code>let</code>, no <code>const</code>, no annotation.
Where TypeScript checks types before the code runs, PHP is dynamically typed
at heart; since PHP 7/8 you can (and should) put real type declarations on
<em>function signatures</em>, which is where this course will keep them.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>const name = "Ada";</code></td><td><code>$name = "Ada";</code></td></tr>
  <tr><td><code>let age: number = 36;</code></td><td><code>$age = 36;</code> (int, no annotation)</td></tr>
  <tr><td><code>number</code> (one type)</td><td><code>int</code> and <code>float</code> (two types)</td></tr>
  <tr><td><code>function f(x: number): string</code></td><td><code>function f(int $x): string</code></td></tr>
</table>
<p>Note the signature syntax: the type comes <em>before</em> the parameter
(<code>int $x</code>, C-style) and the return type after a colon, like TS.
There's no <code>const</code> for locals — immutability isn't part of the
variable model — and files begin with <code>&lt;?php</code>, a tag left over
from PHP's roots as an HTML templating language.</p>`,

  typescript: `const name = "Ada";
let age: number = 36;

// TS: the compiler stops type mistakes before running.
// age = "thirty-six";  // compile error

function describeUser(name: string, age: number): string {
  return \`\${name} is \${age} years old\`;
}

console.log(describeUser(name, age));`,

  task: `
<p>Rewrite the TypeScript on the left as PHP:</p>
<ol>
  <li>Write a function <code>describe_user</code> that takes
      <code>string $name</code> and <code>int $age</code> (typed parameters,
      C-style order) and declares a <code>: string</code> return type,
      returning <code>"Ada is 36 years old"</code>-style text. Use double-quote
      interpolation — <code>"$name is $age years old"</code> is the template
      literal you already know, minus the backticks.</li>
  <li>Write a function <code>birthday</code> that takes <code>int $age</code>,
      returns <code>int</code>, and adds 1 using a local variable and
      <code>+=</code>.</li>
</ol>
<p>Keep the <code>&lt;?php</code> tag at the top, and note the convention
change: <code>snake_case</code> function names. The lesson's tests call your
functions directly.</p>`,

  starter: `<?php

// 1. describe_user: string $name and int $age in, string out.
//    TS: \`\${name} is \${age} years old\`  ->  PHP: "$name is $age years old"
function describe_user(string $name, int $age): string {
    throw new Exception("TODO: implement describe_user");
}

// 2. birthday: assign to a local, add 1 with +=, return it.
function birthday(int $age): int {
    throw new Exception("TODO: implement birthday");
}
`,

  requirements: [
    { pattern: /function\s+describe_user\s*\(\s*string\s+\$name\s*,\s*int\s+\$age\s*\)\s*:\s*string/, message: "Define describe_user(string $name, int $age): string with full type declarations" },
    { pattern: /"\$name is \$age years old"|"\{\$name\} is \{\$age\} years old"/, message: "Build the string with double-quote interpolation, not concatenation" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'expect_eq(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'expect_eq(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "expect_eq(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "expect_eq(birthday(0), 1);" },
  ],

  solution: `<?php

function describe_user(string $name, int $age): string {
    return "$name is $age years old";
}

function birthday(int $age): int {
    $next = $age;
    $next += 1;
    return $next;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Declare a variable</td><td><code>let x = 1;</code></td><td><code>$x = 1;</code> (assignment is declaration)</td></tr>
  <tr><td>Constant</td><td><code>const x = 1;</code></td><td><code>const X = 1;</code> (class/global scope only — no const locals)</td></tr>
  <tr><td>Numbers</td><td><code>number</code></td><td><code>int</code> and <code>float</code>, separate</td></tr>
  <tr><td>Typed signature</td><td><code>(x: number): string</code></td><td><code>(int $x): string</code></td></tr>
  <tr><td>Interpolation</td><td><code>\`\${name}!\`</code></td><td><code>"$name!"</code> (double quotes only)</td></tr>
  <tr><td>Naming</td><td><code>camelCase</code></td><td><code>snake_case</code> functions, <code>$camelCase</code> or <code>$snake_case</code> variables</td></tr>
</table>
<p>PHP's type declarations are enforced — but at <em>runtime</em>, when the
function is called, not at compile time. A wrong-type call throws a
<code>TypeError</code> as the code runs; there's no ahead-of-time checker
unless you add one (PHPStan and Psalm fill TypeScript's role in real
projects).</p>`,
};
</script>
