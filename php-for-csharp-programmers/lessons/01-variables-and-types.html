const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>In C#, even <code>var name = "Ada";</code> has a compile-time type — the
compiler infers <code>string</code> and holds you to it forever. In PHP,
<code>$name = "Ada";</code> is the whole story: assignment <em>is</em>
declaration, there is no <code>var</code> keyword, and the variable itself has
no fixed type — only the value it currently holds does. Every variable wears a
<code>$</code> sigil, and yes, that's the same <code>$</code> you've been
typing in front of interpolated strings — it has relocated onto the variables
themselves.</p>
<table>
  <tr><th>C#</th><th>PHP</th></tr>
  <tr><td><code>var name = "Ada";</code></td><td><code>$name = "Ada";</code></td></tr>
  <tr><td><code>int age = 36;</code> / <code>long</code></td><td><code>$age = 36;</code> (one <code>int</code> type)</td></tr>
  <tr><td><code>double</code> / <code>decimal</code></td><td><code>float</code> (one type, no decimal)</td></tr>
  <tr><td><code>static string F(int x)</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td><code>$"{name} is {age}"</code></td><td><code>"$name is $age"</code></td></tr>
</table>
<p>Types haven't vanished, though — they've moved to function signatures,
where PHP 8 enforces them at <em>runtime</em>. Call
<code>f("not an int")</code> and PHP throws a <code>TypeError</code> the
moment the call happens — think of it as the <code>ArgumentException</code>
guard clause you used to write by hand, baked into the language. Number types
collapse too: <code>int</code>/<code>long</code> become <code>int</code>, and
<code>double</code>/<code>decimal</code> become <code>float</code> (an IEEE
double — there is no built-in decimal type). Files begin with
<code>&lt;?php</code>, a tag left over from PHP's roots as an HTML templating
language.</p>`,

  csharp: `var name = "Ada";
int age = 36;

// C#: the compiler stops type mistakes before running.
// age = "thirty-six";   // CS0029: cannot implicitly convert

static string DescribeUser(string name, int age)
{
    return $"{name} is {age} years old";
}

static int Birthday(int age)
{
    var next = age;
    next += 1;
    return next;
}

Console.WriteLine(DescribeUser(name, age));`,

  task: `
<p>Rewrite the C# on the left as PHP:</p>
<ol>
  <li>Write a function <code>describe_user</code> that takes
      <code>string $name</code> and <code>int $age</code> (type before the
      parameter, C-style) and declares a <code>: string</code> return type,
      returning <code>"Ada is 36 years old"</code>-style text. Use double-quote
      interpolation — <code>"$name is $age years old"</code> is your
      <code>$"{name} is {age} years old"</code>, with the <code>$</code> moved
      onto the variables and the braces dropped.</li>
  <li>Write a function <code>birthday</code> that takes <code>int $age</code>,
      returns <code>int</code>, and adds 1 using a local variable and
      <code>+=</code>.</li>
</ol>
<p>Keep the <code>&lt;?php</code> tag at the top, and note the convention
change: <code>PascalCase</code> methods become <code>snake_case</code>
functions. The lesson's tests call your functions directly.</p>`,

  starter: `<?php

// 1. describe_user: string $name and int $age in, string out.
//    C#: $"{name} is {age} years old"  ->  PHP: "$name is $age years old"
function describe_user(string $name, int $age): string {
    throw new Exception("TODO: implement describe_user");
}

// 2. birthday: assign to a local, add 1 with +=, return it.
function birthday(int $age): int {
    throw new Exception("TODO: implement birthday");
}
`,

  requirements: [
    { pattern: /function\s+describe_user\s*\(\s*string\s+\$name\s*,\s*int\s+\$age\s*\)\s*:\s*string/, message: "Define describe_user(string $name, int $age): string with full type declarations" },
    { pattern: /"\$\w+/, message: "Build the string with double-quote interpolation, not concatenation" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'expect_eq(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'expect_eq(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "expect_eq(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "expect_eq(birthday(0), 1);" },
  ],

  solution: `<?php

function describe_user(string $name, int $age): string {
    return "$name is $age years old";
}

function birthday(int $age): int {
    $next = $age;
    $next += 1;
    return $next;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>PHP</th></tr>
  <tr><td>Declare a variable</td><td><code>var x = 1;</code></td><td><code>$x = 1;</code> (assignment is declaration)</td></tr>
  <tr><td>Integers</td><td><code>int</code>, <code>long</code></td><td><code>int</code> (64-bit on 64-bit builds)</td></tr>
  <tr><td>Reals</td><td><code>double</code>, <code>decimal</code></td><td><code>float</code> (a double; no decimal type)</td></tr>
  <tr><td>Typed signature</td><td><code>string F(int x)</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td>Interpolation</td><td><code>$"{name}!"</code></td><td><code>"$name!"</code> (double quotes only)</td></tr>
  <tr><td>Naming</td><td><code>PascalCase</code> methods</td><td><code>snake_case</code> functions</td></tr>
</table>
<p>PHP's type declarations are enforced — but at <em>runtime</em>, when the
function is actually called, not at compile time. A wrong-type call throws a
<code>TypeError</code> as the code runs; there's no ahead-of-time checker in
the box. In real projects, PHPStan and Psalm play the role Roslyn's analyzers
and the C# compiler play for you today — static analysis bolted on, rather
than built in.</p>`,
};
