const LESSON = {
  number: 14,
  title: "List Assignment & Spread",

  intro: `
<p>In C#, deconstruction is a privilege of the type: <code>var (a, b) =
pair;</code> works only when <code>pair</code> is a tuple or something with a
<code>Deconstruct</code> method. PHP's arrays need no such ceremony —
<em>any</em> array destructures anywhere an assignment happens:
<code>[$a, $b] = $pair;</code>. Because PHP arrays are also dictionaries, you
can destructure by key too — <code>['name' =&gt; $n] = $user;</code> — and
the classic swap needs no temp and no tuple:
<code>[$a, $b] = [$b, $a];</code>.</p>
<table>
  <tr><th>C#</th><th>PHP</th></tr>
  <tr><td><code>var (a, b) = pair;</code> (tuples / Deconstruct only)</td><td><code>[$a, $b] = $pair;</code> (any array)</td></tr>
  <tr><td><code>(a, b) = (b, a);</code></td><td><code>[$a, $b] = [$b, $a];</code></td></tr>
  <tr><td>— (no dictionary deconstruction)</td><td><code>['name' =&gt; $n] = $user;</code></td></tr>
  <tr><td><code>int Sum(params int[] nums)</code></td><td><code>function sum(int ...$nums)</code></td></tr>
  <tr><td><code>f(args)</code> with <code>params</code> expansion</td><td><code>f(...$args)</code> — explicit spread at the call site</td></tr>
  <tr><td><code>[..first, ..second]</code> (collection expressions, C# 12)</td><td><code>[...$first, ...$second]</code></td></tr>
</table>
<p>The <code>...</code> token does triple duty, just like C#'s trio of
<code>params</code> / argument expansion / collection-expression spread: in a
signature it collects (<code>int ...$nums</code> is <code>params
int[]</code>, typed per element); at a call site it spreads an array into
arguments; and inside an array literal it splices arrays together. With
string keys (PHP 8.1+), a later spread <em>overwrites</em> an earlier one —
which turns the defaults-then-overrides merge you'd write as a
<code>Dictionary</code> copy loop into a one-liner.</p>`,

  csharp: `(int, int) Swap((int, int) pair)
{
    var (a, b) = pair;      // needs a tuple (or Deconstruct)
    return (b, a);
}

int Sum(params int[] nums) => nums.Sum();

Dictionary<string, string> MergeSettings(
    Dictionary<string, string> defaults,
    Dictionary<string, string> overrides)
{
    var merged = new Dictionary<string, string>(defaults);
    foreach (var (k, v) in overrides)
        merged[k] = v;      // later value wins
    return merged;
}`,

  task: `
<p>Port all three, letting PHP's array syntax shrink each one:</p>
<ol>
  <li><code>swap(array $pair): array</code> — destructure the two elements
      with <code>[$a, $b] = $pair;</code> and return them reversed,
      <code>[$b, $a]</code>. No tuple type, no <code>Deconstruct</code>.</li>
  <li><code>sum(int ...$nums): int</code> — the <code>params</code>
      equivalent. Inside the function, <code>$nums</code> is an ordinary
      array; <code>array_sum($nums)</code> finishes the job. (The signature
      is already in the starter — note the type applies to <em>each</em>
      argument.)</li>
  <li><code>merge_settings(array $defaults, array $overrides): array</code> —
      splice both maps into one literal:
      <code>[...$defaults, ...$overrides]</code>. String keys collide in
      order, so overrides win — the whole copy-then-loop, gone.</li>
</ol>`,

  starter: `<?php

// 1. C#: var (a, b) = pair; return (b, a);
//    PHP: [$a, $b] = $pair; — plain arrays destructure anywhere.
function swap(array $pair): array {
    throw new Exception("TODO: implement swap");
}

// 2. C#: int Sum(params int[] nums)
//    ...$nums collects; each argument is type-checked as int.
function sum(int ...$nums): int {
    throw new Exception("TODO: implement sum");
}

// 3. Spread both into one literal; with string keys,
//    the later spread overwrites the earlier one.
function merge_settings(array $defaults, array $overrides): array {
    throw new Exception("TODO: implement merge_settings");
}
`,

  requirements: [
    { pattern: /\[\s*\$\w+\s*,\s*\$\w+\s*\]\s*=/, message: "Destructure the pair with list assignment: [$a, $b] = ..." },
    { pattern: /\.\.\.\$/, message: "Use ... with a variable — collect variadics (...$nums) or spread an array" },
    { pattern: /\[\s*\.\.\./, message: "Build the merged array with spread inside a literal: [...$defaults, ...$overrides]" },
  ],

  tests: [
    { name: "swap([1, 2]) returns [2, 1]",
      code: 'expect_eq(swap([1, 2]), [2, 1]);' },
    { name: 'swap(["left", "right"]) returns ["right", "left"]',
      code: 'expect_eq(swap(["left", "right"]), ["right", "left"]);' },
    { name: "sum(1, 2, 3) returns 6 — variadic collection",
      code: 'expect_eq(sum(1, 2, 3), 6);' },
    { name: "sum() returns 0, and sum(...[4, 5, 6]) spreads to 15",
      code: `expect_eq(sum(), 0);
expect_eq(sum(...[4, 5, 6]), 15);` },
    { name: "merge_settings: overrides win, untouched defaults survive",
      code: `$merged = merge_settings(
    ["theme" => "light", "lang" => "en"],
    ["theme" => "dark"]
);
expect_eq($merged, ["theme" => "dark", "lang" => "en"]);` },
    { name: "merge_settings with no overrides returns the defaults",
      code: 'expect_eq(merge_settings(["debug" => "off"], []), ["debug" => "off"]);' },
  ],

  solution: `<?php

function swap(array $pair): array {
    [$a, $b] = $pair;
    return [$b, $a];
}

function sum(int ...$nums): int {
    return array_sum($nums);
}

function merge_settings(array $defaults, array $overrides): array {
    return [...$defaults, ...$overrides];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>PHP</th></tr>
  <tr><td>Positional deconstruction</td><td><code>var (a, b) = pair;</code> (tuple/Deconstruct)</td><td><code>[$a, $b] = $pair;</code> (any array)</td></tr>
  <tr><td>Keyed deconstruction</td><td>—</td><td><code>['name' =&gt; $n, 'age' =&gt; $a] = $user;</code></td></tr>
  <tr><td>Swap</td><td><code>(a, b) = (b, a);</code></td><td><code>[$a, $b] = [$b, $a];</code></td></tr>
  <tr><td>Variadic parameter</td><td><code>params int[] nums</code></td><td><code>int ...$nums</code> (per-argument type check)</td></tr>
  <tr><td>Spread into a call</td><td>implicit with <code>params</code></td><td><code>f(...$args)</code> — always explicit</td></tr>
  <tr><td>Spread into a literal</td><td><code>[..a, ..b]</code> (C# 12)</td><td><code>[...$a, ...$b]</code> (string keys: later wins, PHP 8.1+)</td></tr>
  <tr><td>Skip / nest</td><td>discards: <code>var (_, b) = pair;</code></td><td><code>[, $b] = $pair;</code>, nesting allowed: <code>[[$a], [$b]]</code></td></tr>
</table>
<p>The unlock here is that destructuring and spread are <em>array</em>
features, not <em>type</em> features — nothing has to opt in with a
<code>Deconstruct</code> method or a tuple declaration, so they work on every
function's return value, every <code>foreach</code> element
(<code>foreach ($pairs as [$x, $y])</code>), every config map. The
defaults-plus-overrides spread merge is the idiom to keep: it replaces the
<code>new Dictionary(defaults)</code>-then-loop pattern with one expression
whose precedence you can read left to right.</p>`,
};
