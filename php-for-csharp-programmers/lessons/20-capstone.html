  intro: `
<p>The finale is a small inventory module that forces the course's subtlest
seam into the open: <strong>arrays copy like structs, but objects inside them
are references like classes</strong>. Assigning or passing an array copies it
(copy-on-write), so <code>array_map</code> over <code>$items</code> can't
disturb the caller's array — but the <code>Item</code> objects in the copy
are the <em>same objects</em> as in the original. Mutate one and you've
mutated the caller's data through the back door. C# instincts serve you well
here: it's exactly a <code>struct</code> array holding class references.</p>
<table>
  <tr><th>C#</th><th>PHP</th></tr>
  <tr><td><code>item with { Count = item.Count + n }</code></td><td><code>$copy = clone $item; $copy-&gt;count += $n;</code></td></tr>
  <tr><td><code>MemberwiseClone()</code> (protected)</td><td><code>clone</code> (public, shallow)</td></tr>
  <tr><td><code>Item?</code> return, <code>FirstOrDefault</code> → <code>null</code></td><td><code>?Item</code> return, <code>foreach</code> + <code>return null</code></td></tr>
  <tr><td><code>items.Sum(...)</code></td><td><code>array_reduce($items, ..., 0)</code></td></tr>
  <tr><td><code>Where(...).Select(...).ToList()</code></td><td><code>array_values(array_map(..., array_filter(...)))</code></td></tr>
</table>
<p>So the non-mutating update is C#'s record <code>with</code> expression,
hand-assembled: <code>clone</code> the matched object —
<code>MemberwiseClone</code> made public, shallow — modify the clone, and let
<code>array_map</code> build the new array around it. Everything else is a
reunion tour: lesson 9's promoted constructors, lesson 13's array trio and
the <code>array_values</code> reindexing gotcha, lesson 6's
<code>?Item</code> nullable return.</p>`,

  csharp: `record Item(string Name, int PriceCents, int Count);

int TotalValue(List<Item> items) =>
    items.Sum(i => i.PriceCents * i.Count);

Item? FindItem(List<Item> items, string name) =>
    items.FirstOrDefault(i => i.Name == name);

List<Item> Restock(List<Item> items, string name, int amount) =>
    items.Select(i => i.Name == name
        ? i with { Count = i.Count + amount }   // copy, don't mutate
        : i).ToList();

List<string> NamesInStock(List<Item> items) =>
    items.Where(i => i.Count > 0).Select(i => i.Name).ToList();`,

  task: `
<p>The <code>Item</code> class is provided, complete. Implement the four

      code: '$items = [new Item("apple", 150, 2), new Item("pen", 300, 0)];\n$stocked = restock($items, "pen", 5);\nexpect_eq($stocked[1]->count, 5);\nexpect_eq($stocked[1]->name, "pen");\nexpect_eq($stocked[0]->count, 2);\nexpect_eq(count($stocked), 2);' },

  solution: `<?php

class Item {
    public function __construct(public string $name, public int $price_cents, public int $count) {}
}

function total_value(array $items): int {
    return array_reduce($items, fn($sum, $item) => $sum + $item->price_cents * $item->count, 0);
}

function find_item(array $items, string $name): ?Item {
    foreach ($items as $item) {
        if ($item->name === $name) {
            return $item;
        }
    }
    return null;
}

function restock(array $items, string $name, int $amount): array {
    return array_map(function ($item) use ($name, $amount) {
        if ($item->name !== $name) {
            return $item;
        }
        $copy = clone $item;
        $copy->count += $amount;
        return $copy;
    }, $items);
}

function names_in_stock(array $items): array {
    $in_stock = array_filter($items, fn($item) => $item->count > 0);
    return array_values(array_map(fn($item) => $item->name, $in_stock));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>PHP</th></tr>
  <tr><td>Array/list passed to a function</td><td><code>List&lt;T&gt;</code>: same list (reference)</td><td>array: a copy, like a struct (copy-on-write)</td></tr>
  <tr><td>Objects inside it</td><td>references</td><td>references — copying the array does <em>not</em> copy them</td></tr>
  <tr><td>Non-mutating update</td><td><code>i with { Count = ... }</code></td><td><code>$copy = clone $item;</code> then modify <code>$copy</code></td></tr>
  <tr><td>Shallow copy</td><td><code>MemberwiseClone()</code> (protected)</td><td><code>clone</code> keyword (public; hook: <code>__clone()</code>)</td></tr>
  <tr><td>First-or-null</td><td><code>FirstOrDefault(...)</code>, <code>Item?</code></td><td><code>foreach</code> + <code>return null</code>, <code>?Item</code></td></tr>
  <tr><td>Sum / project / filter</td><td><code>Sum</code> / <code>Select</code> / <code>Where</code></td><td><code>array_reduce</code> / <code>array_map</code> / <code>array_filter</code> (+ <code>array_values</code>)</td></tr>
</table>
<p>The seam this capstone exercises is the one that bites transplanted C#
developers in real codebases: PHP arrays have <em>value</em> semantics and
PHP objects have <em>reference</em> semantics, and an array of objects has
both at once. <code>restock</code> got a fresh array spine for free the
moment it was called — that's why returning a new array is cheap — but every
<code>Item</code> in that spine is shared with the caller, so the only safe
update is a <code>clone</code>. Keep the rule as a slogan: <em>copying the
box copies the box, never what the box points at</em>. That, plus the
<code>array_*</code> trio and <code>::</code> for statics, and you can read
and write idiomatic modern PHP. Course complete — nicely done.</p>`,
