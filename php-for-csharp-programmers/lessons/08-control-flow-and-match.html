const LESSON = {
  number: 8,
  title: "Control Flow & match",

  intro: `
<p>PHP's <code>if</code> is C#'s <code>if</code> (with <code>elseif</code>
spelled as one word). Its <code>switch</code> <em>statement</em>, though, is
a downgrade from what you're used to: it compares with loose <code>==</code>
(lesson 7's juggling applies!) and it falls through unless you
<code>break</code> — the only idiomatic fallthrough is stacking empty
<code>case</code> labels to group values. Modern PHP mostly skips it.</p>
<table>
  <tr><th>C#</th><th>PHP</th></tr>
  <tr><td><code>else if</code></td><td><code>elseif</code> (one word)</td></tr>
  <tr><td><code>switch</code> statement (no fallthrough)</td><td><code>switch</code> statement (loose <code>==</code>, falls through — avoid)</td></tr>
  <tr><td><code>x switch { ... =&gt; ... }</code> expression</td><td><code>match ($x) { ... =&gt; ... }</code> (PHP 8)</td></tr>
  <tr><td><code>"sat" or "sun" =&gt; ...</code></td><td><code>"sat", "sun" =&gt; ...</code> (comma groups arms)</td></tr>
  <tr><td><code>&gt;= 90 =&gt; "A"</code> (relational pattern)</td><td><code>match (true) { $x &gt;= 90 =&gt; "A" }</code></td></tr>
  <tr><td><code>SwitchExpressionException</code> on a miss</td><td><code>UnhandledMatchError</code> on a miss</td></tr>
</table>
<p>The thing you actually want is <code>match</code> (PHP 8), and it maps
directly onto C# <em>switch expressions</em>: it is an expression that
returns a value, comparison is strict <code>===</code>, there is no
fallthrough, arms are grouped with commas, and an unmatched subject throws
<code>UnhandledMatchError</code> — your <code>SwitchExpressionException</code>.
PHP has no relational patterns like <code>&gt;= 90 =&gt; "A"</code>, but the
standard idiom <code>match (true)</code> gets you there: match on the literal
<code>true</code> and write boolean conditions as the arms; the first arm
whose condition is <code>true</code> wins.</p>`,

  csharp: `string Grade(int score) => score switch
{
    >= 90 => "A",
    >= 80 => "B",
    >= 70 => "C",
    _ => "F",
};

string DayType(string day) => day switch
{
    "sat" or "sun" => "weekend",
    "mon" or "tue" or "wed" or "thu" or "fri" => "weekday",
    _ => "unknown",
};

Console.WriteLine(Grade(85));       // B
Console.WriteLine(DayType("sun"));  // weekend
// DayType("???") without _ would throw SwitchExpressionException`,

  task: `
<p>Port both switch expressions to <code>match</code>:</p>
<ol>
  <li><code>grade(int $score): string</code> — use the
      <code>match (true)</code> idiom to translate the relational patterns:
      arms like <code>$score &gt;= 90 =&gt; "A"</code>, then
      <code>&gt;= 80 =&gt; "B"</code>, <code>&gt;= 70 =&gt; "C"</code>, and a
      <code>default =&gt; "F"</code> arm (PHP's <code>_</code>).</li>
  <li><code>day_type(string $day): string</code> — a plain
      <code>match ($day)</code> with grouped arms:
      <code>"sat", "sun" =&gt; "weekend"</code>, the five weekdays grouped the
      same way to <code>"weekday"</code>, and <code>default =&gt;
      "unknown"</code>.</li>
</ol>
<p>Remember each is a single expression — <code>return match (...) { ... };</code>
— and every arm ends with a comma, including the last.</p>`,

  starter: `<?php

// 1. No relational patterns in PHP — match on true and write conditions:
//    return match (true) { $score >= 90 => "A", ..., default => "F" };
function grade(int $score): string {
    throw new Exception("TODO: implement grade");
}

// 2. Strict comparison, no fallthrough, commas group arms:
//    "sat", "sun" => "weekend"
function day_type(string $day): string {
    throw new Exception("TODO: implement day_type");
}
`,

  requirements: [
    { pattern: /match\s*\(/, message: "Use a match expression (not switch)" },
    { pattern: /match\s*\(\s*true\s*\)/, message: "Use the match(true) idiom for the >= range arms in grade" },
    { pattern: /default\s*=>/, message: "Include a default => arm (PHP's _ discard pattern)" },
  ],

  tests: [
    { name: 'grade: 95 => "A", 90 => "A" (boundary)',
      code: 'expect_eq(grade(95), "A");\nexpect_eq(grade(90), "A");' },
    { name: 'grade: 85 => "B", 70 => "C" (first true arm wins, in order)',
      code: 'expect_eq(grade(85), "B");\nexpect_eq(grade(70), "C");' },
    { name: 'grade: 42 => "F" via the default arm',
      code: 'expect_eq(grade(42), "F");\nexpect_eq(grade(0), "F");' },
    { name: 'day_type: "sat" and "sun" => "weekend" (grouped arm)',
      code: 'expect_eq(day_type("sat"), "weekend");\nexpect_eq(day_type("sun"), "weekend");' },
    { name: 'day_type: "mon" and "fri" => "weekday"',
      code: 'expect_eq(day_type("mon"), "weekday");\nexpect_eq(day_type("fri"), "weekday");' },
    { name: 'day_type: "caturday" => "unknown"',
      code: 'expect_eq(day_type("caturday"), "unknown");' },
  ],

  solution: `<?php

function grade(int $score): string {
    return match (true) {
        $score >= 90 => "A",
        $score >= 80 => "B",
        $score >= 70 => "C",
        default => "F",
    };
}

function day_type(string $day): string {
    return match ($day) {
        "sat", "sun" => "weekend",
        "mon", "tue", "wed", "thu", "fri" => "weekday",
        default => "unknown",
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>PHP</th></tr>
  <tr><td>Chained condition</td><td><code>else if</code></td><td><code>elseif</code></td></tr>
  <tr><td>Value-producing branch</td><td><code>x switch { ... }</code></td><td><code>match ($x) { ... }</code></td></tr>
  <tr><td>Comparison inside</td><td>pattern matching</td><td>strict <code>===</code> (switch uses loose <code>==</code>)</td></tr>
  <tr><td>Group arms</td><td><code>"a" or "b" =&gt;</code></td><td><code>"a", "b" =&gt;</code></td></tr>
  <tr><td>Catch-all arm</td><td><code>_ =&gt;</code></td><td><code>default =&gt;</code></td></tr>
  <tr><td>Ranges / relations</td><td><code>&gt;= 90 =&gt;</code></td><td><code>match (true) { $x &gt;= 90 =&gt; ... }</code></td></tr>
  <tr><td>Unmatched subject</td><td><code>SwitchExpressionException</code></td><td><code>UnhandledMatchError</code></td></tr>
</table>
<p>Rule of thumb: reach for <code>match</code> everywhere you would write a
C# switch expression, and treat PHP's <code>switch</code> statement the way
you treat <code>goto</code> — legal, occasionally seen in old code, rarely
what you want, since it both juggles types and falls through.
<code>match (true)</code> looks odd the first time, but it is the community's
standard answer to relational patterns and reads naturally once you see the
arms as guard clauses evaluated top to bottom.</p>`,
};
