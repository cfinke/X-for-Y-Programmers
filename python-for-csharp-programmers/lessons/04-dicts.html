  intro: `
<p>Python's <code>dict</code> is the everyday key/value map — the same role a
<code>Dictionary&lt;TKey, TValue&gt;</code> plays in C#, but it is built into the
literal syntax rather than requiring a class instantiation. Keys can be any
hashable value (strings, numbers, tuples), and since Python 3.7 a dict preserves
insertion order.</p>
<table>
  <tr><th>C#</th><th>Python</th></tr>
  <tr><td><code>var m = new Dictionary&lt;string, int&gt; { {"a", 1}, {"b", 2} };</code></td><td><code>m = {"a": 1, "b": 2}</code></td></tr>
  <tr><td><code>m["a"]</code></td><td><code>m["a"]</code></td></tr>
  <tr><td><code>m.GetValueOrDefault("x", 0)</code></td><td><code>m.get("x", 0)</code></td></tr>
  <tr><td><code>m.ContainsKey("a")</code></td><td><code>"a" in m</code></td></tr>
  <tr><td><code>m.Keys</code></td><td><code>m.keys()</code></td></tr>
  <tr><td><code>m</code> (as <code>KeyValuePair</code>s)</td><td><code>m.items()</code></td></tr>
  <tr><td><code>m.Concat(n).ToDictionary(...)</code></td><td><code>{**m, **n}</code> or <code>m.update(n)</code></td></tr>
</table>
<p>Two things trip up C# programmers. First, <code>m["x"]</code> on a
missing key <em>raises</em> <code>KeyError</code> — it behaves like C#'s
indexer throwing <code>KeyNotFoundException</code>, not like
<code>TryGetValue</code> returning <code>false</code>. Reach for
<code>m.get("x", default)</code> when a key may be absent. Second, iterating a
dict yields its <em>keys</em>, so to walk pairs you iterate
<code>m.items()</code> and unpack each pair:
<code>for k, v in m.items():</code>.</p>`,

  csharp: `var scores = new Dictionary<string, int> { {"ada", 90}, {"rob", 72} };

int ada = scores["ada"];                       // 90
int cid = scores.GetValueOrDefault("cid", 0);  // 0 (missing)
bool hasRob = scores.ContainsKey("rob");       // true

int total = 0;
foreach (var (name, score) in scores) {
  total += score;
}`,

  task: `
<p>Write the Python versions:</p>
<ol>
  <li><code>build_scores()</code> returns the dict

  <li><code>score_for(scores, name)</code> returns the score for

  <li><code>total(scores)</code> sums every value by iterating

  <li><code>with_bonus(scores, points)</code> returns a <em>new</em> dict built
      with a dict comprehension, adding <code>points</code> to each score (leave

</ol>`,

  requirements: [

    { pattern: /for\s+\w+\s*,\s*\w+\s+in/, message: "Unpack each pair with `for k, v in ...`" },

    { name: "score_for defaults to 0 when missing", code: "    expect_eq(score_for({\"ada\": 90}, \"cid\"), 0)" },
    { name: "total sums the values", code: "    expect_eq(total({\"ada\": 90, \"rob\": 72}), 162)" },
    { name: "total of empty dict is 0", code: "    expect_eq(total({}), 0)" },
    { name: "with_bonus adds points to each value", code: "    expect_eq(with_bonus({\"ada\": 90, \"rob\": 72}, 5), {\"ada\": 95, \"rob\": 77})" },
    { name: "with_bonus leaves the original dict unchanged", code: "    original = {\"ada\": 90}\n    with_bonus(original, 5)\n    expect_eq(original, {\"ada\": 90})" },
  ],

  solution: `def build_scores():
    return {"ada": 90, "rob": 72}


def score_for(scores, name):
    return scores.get(name, 0)


def total(scores):
    running = 0
    for name, score in scores.items():
        running += score
    return running


def with_bonus(scores, points):
    return {name: score + points for name, score in scores.items()}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Python</th></tr>
  <tr><td>Read (may be missing)</td><td><code>m.GetValueOrDefault("x", d)</code></td><td><code>m.get("x", d)</code></td></tr>
  <tr><td>Read (must exist)</td><td><code>m["x"]</code> → <code>KeyNotFoundException</code></td><td><code>m["x"]</code> → <code>KeyError</code></td></tr>
  <tr><td>Membership</td><td><code>m.ContainsKey("x")</code></td><td><code>"x" in m</code></td></tr>
  <tr><td>Keys / values / pairs</td><td><code>m.Keys</code> / <code>m.Values</code> / <code>m</code></td><td><code>m.keys()</code> / <code>m.values()</code> / <code>m.items()</code></td></tr>
  <tr><td>Merge</td><td><code>m.Concat(n).ToDictionary(p =&gt; p.Key, p =&gt; p.Value)</code></td><td><code>{**m, **n}</code></td></tr>
  <tr><td>Comprehension</td><td><code>xs.ToDictionary(...)</code></td><td><code>{k: v for k, v in ...}</code></td></tr>
</table>
<p>Because plain <code>m["x"]</code> raises on a missing key, <code>.get()</code>
is the Python habit whenever absence is possible — and <code>m.get("x")</code>
with no default returns <code>None</code> rather than raising. When you actually
want a running default (say, counting), reach for
<code>collections.defaultdict</code> or <code>dict.setdefault</code>. Note that
<code>in</code> tests <em>keys</em>, never values: <code>"ada" in scores</code>
asks whether that key exists, mirroring how <code>ContainsKey</code> checks keys
(not values) on a C# <code>Dictionary</code>.</p>`,
