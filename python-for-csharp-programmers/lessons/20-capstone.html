  intro: `
<p>Time to put it all together. In C# you might model a small in-memory
store with a <code>record</code> for the item, a <code>class</code> holding
a <code>Dictionary</code>, custom <code>Exception</code> subclasses, and LINQ
methods (<code>Where</code>/<code>Select</code>/<code>Sum</code>) to query it. Python
gives you the same shape with different spellings: a <code>@dataclass</code>
instead of a record, a plain <code>dict</code> instead of <code>Dictionary</code>,
custom <code>Exception</code> subclasses, and comprehensions/generator
expressions instead of the LINQ chains.</p>
<table>
  <tr><th>C#</th><th>Python</th></tr>
  <tr><td><code>record Product(string Name);</code></td><td><code>@dataclass\nclass Product: name: str</code></td></tr>
  <tr><td><code>new Dictionary&lt;string, Product&gt;()</code></td><td><code>{}</code> (a dict)</td></tr>
  <tr><td><code>class NotFoundException : Exception {}</code></td><td><code>class ProductNotFound(Exception): pass</code></td></tr>
  <tr><td><code>throw new NotFoundException(name)</code></td><td><code>raise ProductNotFound(name)</code></td></tr>
  <tr><td><code>items.Where(p =&gt; p.Tags.Contains(t))</code></td><td><code>[p for p in items if t in p.tags]</code></td></tr>
  <tr><td><code>items.Sum(p =&gt; p.Price)</code></td><td><code>sum(p.price for p in items)</code></td></tr>
</table>
<p>This capstone ties together the dataclass, dict/list processing,
comprehensions, and exceptions you have met in earlier lessons — no new syntax,
just idiomatic assembly.</p>`,

  csharp: `public record Product(string Name, double Price, List<string> Tags);

public class ProductNotFound : Exception
{
    public ProductNotFound(string name) : base(name) { }
}

public class DuplicateProduct : Exception
{
    public DuplicateProduct(string name) : base(name) { }
}

public class Store
{
    private readonly Dictionary<string, Product> _items = new();

    public void Add(Product p)
    {
        if (_items.ContainsKey(p.Name)) throw new DuplicateProduct(p.Name);
        _items[p.Name] = p;
    }

    public Product Get(string name)
    {
        if (!_items.TryGetValue(name, out var p)) throw new ProductNotFound(name);
        return p;
    }

    public double TotalValue()
    {
        return _items.Values.Sum(p => p.Price);
    }

    public List<string> NamesWithTag(string tag)
    {
        return _items.Values
            .Where(p => p.Tags.Contains(tag))
            .Select(p => p.Name)
            .OrderBy(n => n)
            .ToList();
    }
}

public static Store Load(List<Product> records)
{
    var store = new Store();
    foreach (var r in records) store.Add(r);
    return store;
}`,

  solution: `from dataclasses import dataclass, field


class ProductNotFound(Exception):
    pass


class DuplicateProduct(Exception):
    pass


@dataclass
class Product:
    name: str
    price: float
    tags: list = field(default_factory=list)


class Store:
    def __init__(self):
        self._items = {}

    def add(self, product):
        if product.name in self._items:
            raise DuplicateProduct(product.name)
        self._items[product.name] = product

    def get(self, name):
        if name not in self._items:
            raise ProductNotFound(name)
        return self._items[name]

    def total_value(self):
        return sum(p.price for p in self._items.values())

    def names_with_tag(self, tag):
        return sorted(p.name for p in self._items.values() if tag in p.tags)


def load(records):
    store = Store()
    for r in records:
        store.add(Product(name=r["name"], price=r["price"], tags=r.get("tags", [])))
    return store
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Python</th></tr>
  <tr><td>Record type</td><td><code>record</code></td><td><code>@dataclass</code></td></tr>
  <tr><td>Keyed store</td><td><code>Dictionary&lt;K, V&gt;</code></td><td><code>dict</code></td></tr>
  <tr><td>Membership</td><td><code>dict.ContainsKey(k)</code></td><td><code>k in d</code></td></tr>
  <tr><td>Custom error</td><td><code>class E : Exception {}</code></td><td><code>class E(Exception): pass</code></td></tr>
  <tr><td>Signal an error</td><td><code>throw new E()</code></td><td><code>raise E()</code></td></tr>
  <tr><td>Reduce/sum</td><td><code>arr.Sum(x =&gt; x)</code></td><td><code>sum(x for x in arr)</code></td></tr>
  <tr><td>Filter + map + sort</td><td><code>arr.Where(...).Select(...).OrderBy(...)</code></td><td><code>sorted(f(x) for x in arr if g(x))</code></td></tr>
</table>
<p>A few Pythonic touches worth noting. <code>field(default_factory=list)</code>
gives each instance its own fresh list — the equivalent mistake in Python to a
shared mutable default is a real trap, and the dataclass field factory is how you
avoid it. Passing a generator expression straight into <code>sum()</code> or
<code>sorted()</code> (no surrounding brackets) is the idiomatic replacement for
a LINQ <code>Where</code>/<code>Select</code>/<code>Sum</code> chain, and it avoids
building an intermediate list. Finally, custom exceptions are just classes that
inherit from <code>Exception</code>; you catch them by type with
<code>except ProductNotFound:</code>, exactly as you would branch on a
<code>catch (ProductNotFoundException ex)</code> clause in C#.</p>`,
