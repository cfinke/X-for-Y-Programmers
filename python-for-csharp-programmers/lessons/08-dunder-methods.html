const LESSON = {
  number: 8,
  title: "Dunder Methods",

  intro: `
<p>In C#, if you want a class to print nicely you override
<code>ToString()</code>; to compare two instances by value you override
<code>Equals()</code> (and usually <code>GetHashCode()</code>, and implement
<code>IEquatable&lt;T&gt;</code>); and to make <code>a + b</code> or
<code>a &lt; b</code> mean something for your own type you define
<code>static</code> operator overloads like
<code>public static Vector operator +(Vector a, Vector b)</code>. Python takes
the same basic idea — special methods hooked up to language syntax — but
applies it far more uniformly through <em>double-underscore methods</em> —
"dunders" — that you implement on the class. Define <code>__repr__</code> and
<code>repr(obj)</code> uses it; define <code>__eq__</code> and the
<code>==</code> operator uses it; define <code>__add__</code> and the
<code>+</code> operator uses it.</p>
<table>
  <tr><th>C#</th><th>Python</th></tr>
  <tr><td><code>Vector(int[] x) { … }</code> (constructor)</td><td><code>def __init__(self, x):</code></td></tr>
  <tr><td><code>override ToString()</code></td><td><code>def __repr__(self):</code></td></tr>
  <tr><td><code>override Equals(object o)</code></td><td><code>a == b</code> → <code>__eq__</code></td></tr>
  <tr><td><code>a.Length</code> / <code>a.Count</code></td><td><code>len(a)</code> → <code>__len__</code></td></tr>
  <tr><td><code>static operator +(Vector a, Vector b)</code></td><td><code>a + b</code> → <code>__add__</code></td></tr>
</table>
<p>This is why Python feels so uniform: <code>len(x)</code>, <code>x == y</code>,
<code>print(x)</code>, and <code>x + y</code> all work on lists, strings, and
your own classes through the exact same protocol — no separate interfaces like
<code>IEquatable&lt;T&gt;</code> or <code>IComparable&lt;T&gt;</code> to opt
into. Implement the right dunders and your type becomes a first-class citizen
of the language.</p>`,

  csharp: `class Vector {
  public int[] Components;

  public Vector(params int[] components) {
    Components = components;
  }

  public override string ToString() {
    return $"Vector({string.Join(", ", Components)})";
  }

  public override bool Equals(object obj) {
    return obj is Vector other &&
      Components.SequenceEqual(other.Components);
  }

  public int Length => Components.Length;

  public static Vector operator +(Vector a, Vector b) {
    return new Vector(a.Components.Zip(b.Components, (x, y) => x + y).ToArray());
  }
}`,

  task: `
<p>Build a <code>Vector</code> value type whose instances print nicely, compare
by value, report their length, and can be added with <code>+</code>:</p>
<ol>
  <li><code>__init__(self, *components)</code> — accept any number of numbers and
      store them (a tuple is convenient).</li>
  <li><code>__repr__(self)</code> — return a string like
      <code>"Vector(1, 2, 3)"</code>.</li>
  <li><code>__eq__(self, other)</code> — two vectors are equal when their
      components are equal, so <code>Vector(1, 2) == Vector(1, 2)</code>.</li>
  <li><code>__len__(self)</code> — the number of components, so
      <code>len(Vector(1, 2, 3)) == 3</code>.</li>
  <li><code>__add__(self, other)</code> — element-wise addition, so
      <code>Vector(1, 2) + Vector(3, 4) == Vector(4, 6)</code>.</li>
</ol>`,

  starter: `class Vector:
    def __init__(self, *components):
        self.components = ()  # TODO: store the components

    def __repr__(self):
        return ""  # TODO

    def __eq__(self, other):
        return NotImplemented  # TODO

    def __len__(self):
        return 0  # TODO

    def __add__(self, other):
        return NotImplemented  # TODO
`,

  requirements: [
    { pattern: /def\s+__repr__\s*\(/, message: "Define __repr__ so the vector prints nicely" },
    { pattern: /def\s+__eq__\s*\(/, message: "Define __eq__ so vectors compare by value" },
    { pattern: /def\s+__add__\s*\(/, message: "Define __add__ so + works on vectors" },
  ],

  tests: [
    { name: "repr(Vector(1, 2, 3)) is \"Vector(1, 2, 3)\"", code: "    expect_eq(repr(Vector(1, 2, 3)), \"Vector(1, 2, 3)\")" },
    { name: "equal vectors compare equal by value", code: "    expect_true(Vector(1, 2) == Vector(1, 2))" },
    { name: "different vectors are not equal", code: "    expect_true(Vector(1, 2) != Vector(1, 3))" },
    { name: "len() counts the components", code: "    expect_eq(len(Vector(1, 2, 3, 4)), 4)" },
    { name: "empty vector has length 0", code: "    expect_eq(len(Vector()), 0)" },
    { name: "+ adds element-wise", code: "    expect_true(Vector(1, 2) + Vector(3, 4) == Vector(4, 6))" },
    { name: "chained + stays a Vector", code: "    total = Vector(1, 1) + Vector(2, 2) + Vector(3, 3)\n    expect_eq(repr(total), \"Vector(6, 6)\")" },
  ],

  solution: `class Vector:
    def __init__(self, *components):
        self.components = tuple(components)

    def __repr__(self):
        inner = ", ".join(repr(c) for c in self.components)
        return f"Vector({inner})"

    def __eq__(self, other):
        if not isinstance(other, Vector):
            return NotImplemented
        return self.components == other.components

    def __len__(self):
        return len(self.components)

    def __add__(self, other):
        if not isinstance(other, Vector):
            return NotImplemented
        return Vector(*(a + b for a, b in zip(self.components, other.components)))
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Python</th></tr>
  <tr><td>Constructor</td><td><code>Vector(…) { … }</code></td><td><code>__init__(self, …)</code></td></tr>
  <tr><td>Debug string</td><td><code>override ToString()</code></td><td><code>__repr__(self)</code></td></tr>
  <tr><td>Value equality</td><td><code>override Equals(object o)</code></td><td><code>a == b</code> (<code>__eq__</code>)</td></tr>
  <tr><td>Length / size</td><td><code>a.Length</code></td><td><code>len(a)</code> (<code>__len__</code>)</td></tr>
  <tr><td>Addition</td><td><code>static operator +(Vector a, Vector b)</code></td><td><code>a + b</code> (<code>__add__</code>)</td></tr>
</table>
<p>A few things worth knowing. Returning <code>NotImplemented</code> (not the same
as raising <code>NotImplementedError</code>) from <code>__eq__</code> or
<code>__add__</code> tells Python "I don't know how to handle that other type" —
it then tries the other operand's reflected method or, for equality, falls back
to identity. You get <code>!=</code> for free once <code>__eq__</code> is defined;
Python derives <code>__ne__</code> from it automatically — unlike C#, where
overriding <code>Equals()</code> and <code>==</code> are separate steps and easy
to forget to keep in sync.</p>
<p>Two subtleties for later. First, <code>__repr__</code> is aimed at developers
(and used by the REPL and containers); there is also <code>__str__</code> for the
user-facing <code>str(obj)</code>, and if you only define <code>__repr__</code> it
serves as the fallback for both — similar to how C# only has the one
<code>ToString()</code> but Python splits "debug" from "display" output. Second,
defining <code>__eq__</code> makes your class unhashable unless you also define
<code>__hash__</code>, so an instance can't go in a <code>set</code> or be a
<code>dict</code> key until you do — the same trap C# guards against by pairing
<code>Equals()</code> with <code>GetHashCode()</code>. Often you'll reach for
<code>@dataclass</code> (a later topic) to generate all of these at once, much
like a C# <code>record</code> generates <code>Equals</code>,
<code>GetHashCode</code>, and <code>ToString</code> for you.</p>`,
};
