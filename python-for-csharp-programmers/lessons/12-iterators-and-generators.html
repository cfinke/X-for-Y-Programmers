  intro: `
<p>In C# a <code>foreach</code> loop drives the <em>iterator pattern</em>:
it calls <code>GetEnumerator()</code> to get an <code>IEnumerator&lt;T&gt;</code>,
then calls <code>.MoveNext()</code> until it returns <code>false</code>, reading
<code>.Current</code> each time. Python has the exact same idea with plainer
names — <code>for</code> calls <code>iter(obj)</code> to get an iterator, then
calls <code>next(it)</code> until it raises <code>StopIteration</code>.</p>
<table>
  <tr><th>C#</th><th>Python</th></tr>
  <tr><td><code>obj.GetEnumerator()</code></td><td><code>iter(obj)</code></td></tr>
  <tr><td><code>it.MoveNext(); it.Current</code></td><td><code>next(it)</code></td></tr>
  <tr><td><code>MoveNext()</code> returns <code>false</code></td><td>raises <code>StopIteration</code></td></tr>
  <tr><td><code>IEnumerable&lt;T&gt; Gen() { yield return x; }</code></td><td><code>def gen():\\n    yield x</code></td></tr>
  <tr><td><code>Gen().ToList()</code></td><td><code>list(gen())</code></td></tr>
  <tr><td><code>xs.Select(f)</code> (LINQ, lazy)</td><td><code>(f(x) for x in xs)</code> (lazy)</td></tr>
</table>
<p>Just like C#'s <code>yield return</code>, a Python function that contains
<code>yield</code> becomes a <em>generator function</em>: calling it doesn't run
the body, it returns a lazy generator object. Each <code>next()</code> runs the
body up to the next <code>yield</code> and pauses there. Python also has
<em>generator expressions</em> — <code>(expr for x in xs)</code>, the lazy cousin
of a list comprehension — which produce values on demand instead of building a
whole list up front, much like a lazy LINQ chain. And any class becomes
iterable by defining <code>__iter__</code>, the equivalent of implementing
<code>IEnumerable&lt;T&gt;</code> via <code>GetEnumerator()</code>.</p>`,

  csharp: `IEnumerable<T> Take<T>(IEnumerable<T> source, int n)
{
    int i = 0;
    foreach (var x in source)
    {
        if (i++ >= n) yield break;
        yield return x;
    }
}

IEnumerable<int> Fib()
{
    int a = 0, b = 1;
    while (true)
    {
        yield return a;
        (a, b) = (b, a + b);
    }
}

var first5 = Take(Fib(), 5).ToList(); // [0, 1, 1, 2, 3]`,

  solution: `def count_up(start, stop):
    n = start
    while n < stop:
        yield n
        n += 1


def take(iterable, n):
    it = iter(iterable)
    for _ in range(n):
        try:
            yield next(it)
        except StopIteration:
            return


def fib():
    a, b = 0, 1
    while True:
        yield a
        a, b = b, a + b


def squares(iterable):
    return (x * x for x in iterable)


class CountDown:
    def __init__(self, n):
        self.n = n

    def __iter__(self):
        n = self.n
        while n > 0:
            yield n
            n -= 1
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Python</th></tr>
  <tr><td>Get an iterator</td><td><code>obj.GetEnumerator()</code></td><td><code>iter(obj)</code></td></tr>
  <tr><td>Pull next value</td><td><code>it.MoveNext(); var v = it.Current;</code></td><td><code>next(it)</code></td></tr>
  <tr><td>Signal "done"</td><td><code>MoveNext()</code> returns <code>false</code></td><td>raise <code>StopIteration</code> (or just <code>return</code> in a generator)</td></tr>
  <tr><td>Generator function</td><td><code>IEnumerable&lt;T&gt; G() { yield return x; }</code></td><td><code>def g():</code> with <code>yield</code></td></tr>
  <tr><td>Materialize</td><td><code>G().ToList()</code></td><td><code>list(g())</code></td></tr>
  <tr><td>Lazy comprehension</td><td><code>xs.Select(f)</code> (LINQ)</td><td><code>(f(x) for x in xs)</code></td></tr>
  <tr><td>Make a class iterable</td><td>implement <code>IEnumerable&lt;T&gt;</code> / <code>GetEnumerator()</code></td><td><code>def __iter__(self):</code></td></tr>
</table>
<p>A generator function can <code>return</code> early to stop the sequence — that
becomes the <code>StopIteration</code> the <code>for</code> loop watches for, so
you rarely raise it by hand (in C# terms, it's like reaching a bare
<code>yield break</code>). The big win, exactly as with C#'s
<code>yield return</code> iterator methods, is laziness: <code>fib()</code>
describes an infinite sequence, and <code>take(fib(), 6)</code> only ever
computes six values. A <em>generator expression</em> <code>(x*x for x in xs)</code>
looks like a list comprehension with parentheses, but it yields one value at a
time instead of building the whole list — ideal for piping into
<code>sum()</code>, <code>any()</code>, or <code>take()</code>, much like
chaining lazy LINQ operators before a terminal <code>.ToList()</code>. Note
that a generator is single-use: once exhausted, iterating it again yields
nothing. That is why <code>__iter__</code> here is itself a generator — each
call to <code>iter(CountDown(4))</code> starts a fresh countdown, so the object
can be looped over more than once (compare to C#, where each call to
<code>GetEnumerator()</code> on a well-behaved <code>IEnumerable&lt;T&gt;</code>
also returns a fresh enumerator).</p>`,
