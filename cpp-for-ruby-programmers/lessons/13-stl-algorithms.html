  intro: `
<p>In Ruby you rarely write index loops to process an array — you reach for
<code>sort</code>, <code>find</code>, <code>count</code>, <code>map</code>, and
<code>reduce</code>, each taking a block. C++ has the same toolbox, but the
functions live in <code>&lt;algorithm&gt;</code> and <code>&lt;numeric&gt;</code>,
and instead of being methods on the container they are free functions that take
a pair of <em>iterators</em> — <code>v.begin()</code> and <code>v.end()</code> —
marking the range to work on.</p>
<table>
  <tr><th>Ruby</th><th>C++</th></tr>
  <tr><td><code>a.sort { |x, y| x &lt;=&gt; y }</code></td><td><code>std::sort(a.begin(), a.end(), cmp)</code></td></tr>
  <tr><td><code>a.find { |x| p.call(x) }</code></td><td><code>std::find_if(a.begin(), a.end(), p)</code></td></tr>
  <tr><td><code>a.count { |x| p.call(x) }</code></td><td><code>std::count_if(a.begin(), a.end(), p)</code></td></tr>
  <tr><td><code>a.map { |x| f.call(x) }</code></td><td><code>std::transform(a.begin(), a.end(), out, f)</code></td></tr>
  <tr><td><code>a.reduce(init) { |acc, x| f.call(acc, x) }</code></td><td><code>std::accumulate(a.begin(), a.end(), init, f)</code></td></tr>
</table>
<p>The predicates and mappers are lambdas, just like Ruby's blocks:
<code>[](int x){ return x % 2 == 0; }</code> plays the role of
<code>{ |x| x.even? }</code>. The <code>[]</code> is the <em>capture list</em> —
it names any surrounding variables the lambda uses (leave it empty when it
needs none). Two things differ from the Ruby methods: <code>std::sort</code>
mutates the vector in place and returns nothing, and <code>std::transform</code>
writes into an existing output range rather than allocating a fresh array, so
you size the destination first.</p>`,

  ruby: `nums = [5, 2, 8, 1, 9, 3]

evens = nums.count { |n| n.even? }           # 2
doubled = nums.map { |n| n * 2 }             # [10, 4, ...]
total = nums.reduce(0) { |acc, n| acc + n }  # 28`,

  task: `
<p>Work with <code>std::vector&lt;int&gt;</code> using the algorithms — no
hand-written <code>for</code> loops. Write these free functions:</p>
<ol>
  <li><code>sortDescending(std::vector&lt;int&gt; v)</code> — takes the vector by

</ol>`,

  solution: `std::vector<int> sortDescending(std::vector<int> v) {
  std::sort(v.begin(), v.end(), [](int a, int b) { return a > b; });
  return v;
}

int firstGreaterThan(const std::vector<int>& v, int threshold) {
  auto it = std::find_if(v.begin(), v.end(),
                         [threshold](int x) { return x > threshold; });
  return it != v.end() ? *it : -1;
}

int countEven(const std::vector<int>& v) {
  return static_cast<int>(
      std::count_if(v.begin(), v.end(), [](int x) { return x % 2 == 0; }));
}

std::vector<int> doubled(const std::vector<int>& v) {
  std::vector<int> out(v.size());
  std::transform(v.begin(), v.end(), out.begin(),
                 [](int x) { return x * 2; });
  return out;
}

int sum(const std::vector<int>& v) {
  return std::accumulate(v.begin(), v.end(), 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>C++</th></tr>
  <tr><td>Sort with comparator</td><td><code>a.sort { |x, y| y &lt;=&gt; x }</code></td><td><code>std::sort(b, e, [](int x, int y){ return x &gt; y; })</code></td></tr>
  <tr><td>Find first match</td><td><code>a.find { |x| p.call(x) }</code></td><td><code>std::find_if(b, e, p)</code> → iterator</td></tr>
  <tr><td>Count matches</td><td><code>a.count { |x| p.call(x) }</code></td><td><code>std::count_if(b, e, p)</code></td></tr>
  <tr><td>Map</td><td><code>a.map { |x| f.call(x) }</code></td><td><code>std::transform(b, e, out, f)</code></td></tr>
  <tr><td>Reduce</td><td><code>a.reduce(0) { |acc, x| f.call(acc, x) }</code></td><td><code>std::accumulate(b, e, 0, f)</code></td></tr>
  <tr><td>Block / lambda</td><td><code>{ |x| x * 2 }</code></td><td><code>[](int x){ return x * 2; }</code></td></tr>
</table>
<p>A few gotchas coming from Ruby. The search algorithms return an
<em>iterator</em>, not the value or <code>nil</code> — you must test it against
<code>end()</code> before dereferencing, since <code>end()</code> is the
one-past-the-last sentinel (like <code>find</code> returning <code>nil</code>
when nothing matches). <code>std::count_if</code> returns a signed
<code>difference_type</code>, which is why we <code>static_cast</code> it to
<code>int</code>. And the initial value you hand to <code>std::accumulate</code>
fixes the result type: pass <code>0</code> (an <code>int</code>) and you get
integer math; pass <code>0.0</code> for a <code>double</code> sum. In C++20 you
can also spell many of these as <a>ranges</a> (<code>std::ranges::sort(v)</code>)
that take the container directly, but the iterator-pair form is the foundation
worth knowing first.</p>`,
