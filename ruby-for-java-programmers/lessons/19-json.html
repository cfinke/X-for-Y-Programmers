  title: "Working with JSON",

  intro: `
<p>JSON in Java means picking a library (Jackson, Gson…), constructing an
<code>ObjectMapper</code>, writing DTO classes, and sprinkling annotations
when names don't line up. In Ruby, <code>require "json"</code> pulls in the
standard library and then serialization is <em>a method on the data
itself</em>: <code>data.to_json</code>. No mapper object, no DTOs — the
duck-typed Hash you already have <strong>is</strong> the object.</p>
<table>
  <tr><th>Java (Jackson)</th><th>Ruby</th></tr>
  <tr><td><code>mapper.writeValueAsString(obj)</code></td><td><code>data.to_json</code></td></tr>
  <tr><td><code>mapper.readValue(s, Map.class)</code></td><td><code>JSON.parse(s)</code></td></tr>
  <tr><td>DTO classes + <code>@JsonProperty</code></td><td>— plain Hashes and Arrays</td></tr>
  <tr><td><code>node.path("a").path("b")</code></td><td><code>data.dig(:a, :b)</code></td></tr>
  <tr><td><code>JsonProcessingException</code> (checked)</td><td><code>JSON::ParserError</code> (rescue it)</td></tr>
</table>
<p>Two sharp edges to know. <code>JSON.parse(s)</code> returns Hashes keyed by
<strong>strings</strong> — faithful to JSON, but un-Ruby-ish; pass
<code>symbolize_names: true</code> to get the symbol keys idiomatic code
expects. And bad input raises <code>JSON::ParserError</code> — unchecked, as
lesson 16 taught, so nothing forces you to handle it; a def-level
<code>rescue</code> is the usual guard. For reaching into nested structures,
<code>data.dig(:a, :b)</code> walks a path and returns <code>nil</code> at the
first miss instead of raising — Jackson's <code>path(...)</code> chaining, one
method.</p>`,

  java: `// Jackson: a dependency, a mapper, a DTO — before any actual JSON.
record User(String name, int age) {}

ObjectMapper mapper = new ObjectMapper();

String json = mapper.writeValueAsString(new User("Ada", 36));
User user = mapper.readValue(json, User.class);

// Untyped access goes through JsonNode:
JsonNode node = mapper.readTree(json);
String name = node.path("name").asText("unknown");
int age = node.path("age").asInt(0);

// Bad input throws a checked JsonProcessingException:
try {
    mapper.readValue("not json", User.class);
} catch (JsonProcessingException e) {
    // recover
}`,

</ol>`,

  tests: [

    { name: "parse_user reads name and age with symbol keys",

    { name: 'parse_user fills defaults: "unknown" and 0',

  expect_eq(parse_user("{}"), { name: "unknown", age: 0 })` },
    { name: "pluck_names maps a JSON array to its names",
      code: '  expect_eq(pluck_names(%q([{"name":"Ada"},{"name":"Grace"}])), ["Ada", "Grace"])' },
    { name: "safe_parse returns {} on bad input, parsed data otherwise",

  expect_eq(safe_parse(%q({"ok":1})), { ok: 1 })` },

  solution: `require "json"

def to_json_string(data)
  data.to_json
end

def parse_user(json)
  data = JSON.parse(json, symbolize_names: true)
  { name: data.fetch(:name, "unknown"), age: data.fetch(:age, 0) }
end

def pluck_names(json)
  JSON.parse(json, symbolize_names: true).map { |user| user[:name] }
end

def safe_parse(json)
  JSON.parse(json, symbolize_names: true)
rescue JSON::ParserError
  {}
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java (Jackson)</th><th>Ruby</th></tr>
  <tr><td>Setup</td><td>add dependency, <code>new ObjectMapper()</code></td><td><code>require "json"</code> (stdlib)</td></tr>
  <tr><td>Serialize</td><td><code>mapper.writeValueAsString(obj)</code></td><td><code>data.to_json</code></td></tr>
  <tr><td>Pretty print</td><td><code>writerWithDefaultPrettyPrinter()</code></td><td><code>JSON.pretty_generate(data)</code></td></tr>
  <tr><td>Parse</td><td><code>mapper.readValue(s, T.class)</code></td><td><code>JSON.parse(s)</code> → string-keyed Hash</td></tr>
  <tr><td>Symbol keys</td><td>n/a</td><td><code>JSON.parse(s, symbolize_names: true)</code></td></tr>
  <tr><td>Nested path</td><td><code>node.path("a").path("b")</code></td><td><code>data.dig(:a, :b)</code> (nil on miss)</td></tr>
  <tr><td>Missing field default</td><td><code>.asText("unknown")</code></td><td><code>hash.fetch(:name, "unknown")</code></td></tr>
  <tr><td>Bad input</td><td><code>JsonProcessingException</code> (checked)</td><td><code>JSON::ParserError</code> (unchecked)</td></tr>
</table>
<p>The reason Ruby needs no ObjectMapper is duck typing (lesson 15): Jackson
exists to bridge JSON's dynamic shape onto Java's static classes, and DTOs
are the toll. Ruby's Hash is already dynamically shaped, so JSON maps onto it
directly — parsing gives you data you can <code>dig</code> into immediately,
and any Hash or Array can announce itself as JSON. The one convention to
internalize: JSON's keys are strings, so <code>JSON.parse</code> honors that
by default, and <code>symbolize_names: true</code> is your explicit opt-in to
Ruby's symbol-keyed idiom.</p>`,
