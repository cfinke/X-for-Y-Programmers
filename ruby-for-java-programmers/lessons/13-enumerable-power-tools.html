  title: "Enumerable Power Tools",

  intro: `
<p>Past <code>map</code> and <code>filter</code>, the Stream API sends you to
the <code>Collectors</code> class: <code>groupingBy</code>,
<code>counting</code>, <code>partitioningBy</code> — static imports,
downstream collectors, and the eternal frequency-map dance of
<code>groupingBy(v -&gt; v, counting())</code>. Ruby ships the same power
tools as ordinary methods on <code>Enumerable</code>, and the frequency map —
the thing Java makes you assemble from two collectors — is one word:
<code>.tally</code>.</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>.collect(groupingBy(String::length))</code></td><td><code>.group_by(&amp;:length)</code></td></tr>
  <tr><td><code>.collect(groupingBy(v -&gt; v, counting()))</code></td><td><code>.tally</code></td></tr>
  <tr><td><code>.reduce(0, Integer::sum)</code></td><td><code>.reduce(:+)</code></td></tr>
  <tr><td>mutable accumulation into a map</td><td><code>.each_with_object({}) { |x, acc| ... }</code></td></tr>
  <tr><td><code>.collect(partitioningBy(n -&gt; n % 2 == 0))</code></td><td><code>.partition(&amp;:even?)</code></td></tr>
</table>
<p>Two of these deserve a closer look. <code>each_with_object</code> is Ruby's
mutable-accumulator loop: it carries an object (often a hash) alongside each
element and returns it at the end — pair it with <code>Hash.new(0)</code>, a
hash whose missing keys read as <code>0</code>, and running totals become a
one-liner. And <code>partition</code> returns <em>two arrays</em> — the
elements where the block was true, then the rest — instead of Java's
<code>Map&lt;Boolean, List&lt;T&gt;&gt;</code>.</p>`,

  java: `import java.util.List;
import java.util.Map;
import static java.util.stream.Collectors.*;

class Reports {
    static Map<Integer, List<String>> wordLengths(List<String> words) {
        return words.stream().collect(groupingBy(String::length));
    }

    static Map<String, Long> voteCounts(List<String> votes) {
        // the frequency-map dance: group by identity, count downstream
        return votes.stream().collect(groupingBy(v -> v, counting()));
    }

    static Map<String, Integer> totalsByCategory(List<Item> items) {
        return items.stream().collect(
            groupingBy(Item::category, summingInt(Item::amount)));
    }

    static Map<Boolean, List<Integer>> splitEvens(List<Integer> nums) {
        return nums.stream().collect(partitioningBy(n -> n % 2 == 0));
    }
}`,

  tests: [
    { name: 'word_lengths(["cat", "horse", "dog", "zebra"]) buckets by length',

    { name: "totals_by_category of no items is an empty hash",

  solution: `def word_lengths(words)
  words.group_by(&:length)
end

def vote_counts(votes)
  votes.tally
end

def totals_by_category(items)
  items.each_with_object(Hash.new(0)) do |item, totals|
    totals[item[:category]] += item[:amount]
  end
end

def split_evens(nums)
  nums.partition(&:even?)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>Group by key</td><td><code>collect(groupingBy(String::length))</code></td><td><code>group_by(&amp;:length)</code></td></tr>
  <tr><td>Frequency map</td><td><code>collect(groupingBy(v -&gt; v, counting()))</code></td><td><code>tally</code></td></tr>
  <tr><td>Fold / reduce</td><td><code>reduce(0, Integer::sum)</code></td><td><code>reduce(:+)</code> or <code>reduce(0) { |acc, x| acc + x }</code></td></tr>
  <tr><td>Mutable accumulation</td><td><code>collect(toMap(...))</code> / manual loop</td><td><code>each_with_object({}) { |x, acc| ... }</code></td></tr>
  <tr><td>Two-way split</td><td><code>collect(partitioningBy(pred))</code> → <code>Map&lt;Boolean, List&gt;</code></td><td><code>partition { ... }</code> → <code>[yes, no]</code></td></tr>
  <tr><td>Default-valued map</td><td><code>map.getOrDefault(k, 0)</code> / <code>merge(k, v, Integer::sum)</code></td><td><code>Hash.new(0)</code> — missing keys read as 0</td></tr>
</table>
<p>A good rule of thumb: whatever you were about to build with
<code>Collectors</code>, Enumerable probably ships as a single method — check
before you reach for <code>reduce</code>. And note the argument order in
<code>each_with_object</code> blocks: element first, accumulator second
(<code>|item, totals|</code>), the reverse of <code>reduce</code>'s
<code>|acc, x|</code>. In exchange, the accumulator is returned for you — no
trailing <code>; acc }</code> to remember.</p>`,
