  intro: `
<p>Java's <code>null</code> earned its "billion-dollar mistake" reputation one
<code>NullPointerException</code> at a time, and <code>Optional</code> was the
patch: wrap the value, <code>map</code> through it, <code>orElse</code> out.
Ruby's answer is <code>nil</code> — which is a real object, an instance of
<code>NilClass</code> — plus two tiny operators that do the whole
<code>Optional</code> dance inline: <code>&amp;.</code> (safe navigation) calls
a method only if the receiver isn't <code>nil</code>, and <code>||</code>
supplies the fallback. The ten-line pipeline becomes one line.</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>null</code></td><td><code>nil</code> (an object: <code>nil.class</code> is <code>NilClass</code>)</td></tr>
  <tr><td><code>Optional.ofNullable(u).map(User::address)<br>&nbsp;&nbsp;.map(Address::city).orElse("Unknown")</code></td><td><code>u&amp;.address&amp;.city || "Unknown"</code></td></tr>
  <tr><td><code>x == null</code></td><td><code>x.nil?</code></td></tr>
  <tr><td><code>map.getOrDefault(k, d)</code></td><td><code>hash[k] || d</code></td></tr>
  <tr><td><code>if (cache == null) cache = load();</code></td><td><code>cache ||= load</code></td></tr>
</table>
<p>The rule that makes <code>||</code> safe to lean on: <strong>only
<code>nil</code> and <code>false</code> are falsy</strong>. <code>0</code> and
<code>""</code> are truthy, so <code>hash[:count] || 5</code> only falls back
when the key is genuinely absent — a stored <code>0</code> survives, and
conditions like <code>if user</code> read naturally with no
<code>!= null &amp;&amp; !isEmpty()</code> ceremony. The related idiom
<code>x ||= default</code> assigns only when <code>x</code> is
<code>nil</code>/<code>false</code> — a lazy default in three characters.</p>`,

  java: `record Address(String city) {}
record User(Address address) {}

String getCity(User user) {
    // The Optional pipeline: wrap, map, map, unwrap.
    return Optional.ofNullable(user)
        .map(User::address)
        .map(Address::city)
        .orElse("Unknown");
}

int pick(Map<String, Integer> map, String key, int fallback) {
    return map.getOrDefault(key, fallback);
}

String firstOrDefault(List<String> items, String fallback) {
    return items.isEmpty() ? fallback : items.get(0);
}`,

  solution: `class Address
  attr_reader :city

  def initialize(city)
    @city = city
  end
end

class User
  attr_reader :address

  def initialize(address = nil)
    @address = address
  end
end

def get_city(user)
  user&.address&.city || "Unknown"
end

def pick(hash, key, default)
  hash[key] || default
end

def first_or_default(arr, default)
  arr.first || default
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>The absent value</td><td><code>null</code> (not an object)</td><td><code>nil</code> (an object; has methods like <code>nil.to_s</code>)</td></tr>
  <tr><td>Null check</td><td><code>x == null</code></td><td><code>x.nil?</code> — or just <code>if x</code></td></tr>
  <tr><td>Safe chain</td><td><code>Optional.ofNullable(x).map(...)</code></td><td><code>x&amp;.foo&amp;.bar</code></td></tr>
  <tr><td>Fallback</td><td><code>.orElse(d)</code> / <code>getOrDefault</code></td><td><code>value || d</code></td></tr>
  <tr><td>Lazy init</td><td><code>if (x == null) x = ...;</code></td><td><code>x ||= ...</code></td></tr>
  <tr><td>Falsy values</td><td>only <code>boolean false</code> in conditions</td><td>only <code>nil</code> and <code>false</code> — <code>0</code> and <code>""</code> are truthy</td></tr>
</table>
<p>The NPE doesn't vanish — calling a method on <code>nil</code> raises
<code>NoMethodError: undefined method for nil</code>, Ruby's equivalent — but
<code>&amp;.</code> makes the "stop and return nil instead" choice a single
character at each step, right where a Java 17 codebase would build an
<code>Optional</code> pipeline. One caution inherited from JavaScript-style
<code>||</code>: it also replaces a stored <code>false</code>, so for hashes
that legitimately store booleans, prefer <code>hash.fetch(key, default)</code>.</p>`,
