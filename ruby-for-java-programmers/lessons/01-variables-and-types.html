<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Brace yourself: almost everything Java makes you write, Ruby simply
doesn't have. No type declarations, no semicolons, no wrapper classes, no
class to put your <code>main</code> in. A variable exists the moment you
assign to it — <code>name = "Ada"</code> is the whole ceremony — and the same
variable can hold a string now and an integer later. The types didn't
disappear, though: they moved into the objects. You ask the <em>value</em>
what it is at runtime: <code>x.class</code>, <code>x.is_a?(String)</code>.</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>String name = "Ada";</code></td><td><code>name = "Ada"</code></td></tr>
  <tr><td><code>int</code> / <code>long</code> / <code>BigInteger</code></td><td><code>Integer</code> (one class, arbitrary precision)</td></tr>
  <tr><td><code>x.getClass()</code></td><td><code>x.class</code></td></tr>
  <tr><td><code>x instanceof String</code></td><td><code>x.is_a?(String)</code></td></tr>
  <tr><td><code>String.format("%s is %d", n, a)</code></td><td><code>"#{n} is #{a}"</code></td></tr>
</table>
<p>Numbers alone repay years of Java scar tissue. Ruby's <code>Integer</code>
never overflows — <code>2 ** 100</code> just works — so <code>int</code>,
<code>long</code>, and <code>BigInteger</code> collapse into one type, and
because there are no primitives there is no boxing, no
<code>Integer.valueOf</code> cache trivia, no <code>int</code>-vs-<code>Integer</code>
split. It's <code>Integer</code> done right. One habit to start building
immediately: a method's <strong>last expression is its return value</strong>.
Idiomatic Ruby almost never writes the <code>return</code> keyword. Names are
<code>snake_case</code>, not <code>camelCase</code>.</p>`,

  java: `import java.math.BigInteger;

public class Main {
    static String describeUser(String name, int age) {
        return "%s is %d years old".formatted(name, age);
    }

    public static void main(String[] args) {
        String name = "Ada";
        int age = 36;

        System.out.println(describeUser(name, age));
        System.out.println(name.getClass());        // class java.lang.String
        System.out.println(name instanceof String); // true

        // int overflows at 2^31; long at 2^63; then you switch worlds:
        BigInteger big = BigInteger.TWO.pow(100);
    }
}`,

  task: `
<p>Rewrite the Java as Ruby — no class, no <code>main</code>, no
types, no semicolons:</p>
<ol>
  <li>Write a method <code>describe_user(name, age)</code> that produces
      <code>"Ada is 36 years old"</code>-style text using string interpolation:
      <code>"#{name} is #{age} years old"</code> replaces
      <code>String.format</code>. Make the interpolated string the method's
      <em>last expression</em> — do not write the <code>return</code> keyword
      anywhere in your solution.</li>
  <li>Write a method <code>birthday(age)</code> that copies <code>age</code>
      into a local variable, bumps it with <code>+=</code>, and yields the new
      age implicitly (again: the last expression is the result).</li>
</ol>
<p>Note the naming: <code>describeUser</code> becomes
<code>describe_user</code> — Ruby methods are <code>snake_case</code>, and
<code>def ... end</code> replaces braces.</p>`,

  starter: `# 1. describe_user: interpolate with #{} — the last expression is the result.
#    Java: "%s is %d years old".formatted(name, age)
#    Ruby: "#{name} is #{age} years old"
def describe_user(name, age)
  raise NotImplementedError, "TODO: implement describe_user"
end

# 2. birthday: bump a local with += and let it be the last expression.
def birthday(age)
  raise NotImplementedError, "TODO: implement birthday"
end
`,

  requirements: [
    { pattern: /def\s+describe_user\s*\(\s*name\s*,\s*age\s*\)/, message: "Define describe_user(name, age) with def" },
    { pattern: /#\{\s*name\s*\}/, message: "Build the string with #{} interpolation" },
    { pattern: /^(?:(?!\breturn\b)[\s\S])*$/, message: "No return keyword — the last expression is the return value" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: '  expect_eq(describe_user("Ada", 36), "Ada is 36 years old")' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: '  expect_eq(describe_user("Grace", 52), "Grace is 52 years old")' },
    { name: "birthday(36) returns 37",
      code: "  expect_eq(birthday(36), 37)" },
    { name: "birthday(0) returns 1",
      code: "  expect_eq(birthday(0), 1)" },
  ],

  solution: `def describe_user(name, age)
  "#{name} is #{age} years old"
end

def birthday(age)
  next_age = age
  next_age += 1
  next_age
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>Declare a variable</td><td><code>String name = "Ada";</code></td><td><code>name = "Ada"</code> (assignment declares)</td></tr>
  <tr><td>Constant</td><td><code>static final int X = 1;</code></td><td><code>X = 1</code> (capitalized; reassignment only warns)</td></tr>
  <tr><td>Integers</td><td><code>int</code>, <code>long</code>, <code>BigInteger</code></td><td><code>Integer</code> — arbitrary precision, no overflow</td></tr>
  <tr><td>Decimals</td><td><code>double</code> / <code>Double</code></td><td><code>Float</code> (no boxing — nothing to box)</td></tr>
  <tr><td>Format a string</td><td><code>String.format("%s is %d", n, a)</code></td><td><code>"#{n} is #{a}"</code> (double quotes only)</td></tr>
  <tr><td>Ask the type</td><td><code>x.getClass()</code>, <code>x instanceof String</code></td><td><code>x.class</code>, <code>x.is_a?(String)</code></td></tr>
  <tr><td>Method naming</td><td><code>describeUser</code></td><td><code>describe_user</code></td></tr>
  <tr><td>Return</td><td><code>return</code> required</td><td>last expression; <code>return</code> only for early exit</td></tr>
</table>
<p>The deep trade: Java proves types at compile time and pays in ceremony;
Ruby carries the types inside the objects and pays at runtime — pass the
wrong thing and you get a <code>NoMethodError</code> when a message isn't
understood, not a compile error before the program starts. This whole course
is about learning to work with that trade instead of against it.</p>`,
};
