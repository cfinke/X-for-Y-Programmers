  intro: `
<p>Here is a corner of Ruby with almost no Java equivalent — record patterns
are only just arriving, and for arrays and maps Java still has nothing.
Ruby has had <strong>multiple assignment</strong> forever:
<code>a, b = pair</code> unpacks an array into two variables, and
<code>a, b = b, a</code> swaps them with no temp variable — the right-hand
side is built as a whole before anything is assigned.</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>int a = pair[0]; int b = pair[1];</code></td><td><code>a, b = pair</code></td></tr>
  <tr><td><code>int temp = a; a = b; b = temp;</code></td><td><code>a, b = b, a</code></td></tr>
  <tr><td><code>list.get(0)</code> + <code>list.subList(1, n)</code></td><td><code>first, *rest = list</code></td></tr>
  <tr><td><code>static int sum(int... nums)</code></td><td><code>def sum(*nums)</code></td></tr>
  <tr><td>no literal spread</td><td><code>[*a, *b]</code> splices arrays together</td></tr>
  <tr><td><code>new HashMap&lt;&gt;(defaults); m.putAll(overrides);</code></td><td><code>defaults.merge(overrides)</code></td></tr>
</table>
<p>The star is the <strong>splat</strong>, and you already know half of it:
Java's varargs <code>String... parts</code> is exactly <code>def
join(*parts)</code> — same idea, star moves to the front. But Ruby's splat
also works in <em>assignment</em> (<code>first, *rest = list</code> collects
the leftovers) and in <em>literals</em> (<code>[*a, *b]</code> spreads two
arrays into one). Its double cousin <code>**opts</code> does the same for
keyword arguments; for plain hashes, the everyday tool is
<code>.merge</code>, which returns a new hash with the right-hand side
winning — Java's copy-then-<code>putAll</code>, minus the copy.</p>`,

  java: `import java.util.HashMap;
import java.util.List;
import java.util.Map;

class Utils {
    static int sum(int... nums) {            // varargs: the one splat Java has
        int total = 0;
        for (int n : nums) total += n;
        return total;
    }

    static int[] swap(int[] pair) {
        int temp = pair[0];                  // the classic temp-variable dance
        pair[0] = pair[1];
        pair[1] = temp;
        return pair;
    }

    static Map<String, Object> mergeSettings(Map<String, Object> defaults,
                                             Map<String, Object> overrides) {
        Map<String, Object> merged = new HashMap<>(defaults);
        merged.putAll(overrides);            // right side wins
        return merged;
    }
}`,

<p>Rewrite the Java with destructuring and splats:</p>

  solution: `def swap(pair)
  a, b = pair
  a, b = b, a
  [a, b]
end

def head_tail(list)
  first, *rest = list
  [first, rest]
end

def sum(*nums)
  nums.sum
end

def merge_settings(defaults, overrides)
  defaults.merge(overrides)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>Unpack a pair</td><td><code>int a = p[0]; int b = p[1];</code></td><td><code>a, b = pair</code></td></tr>
  <tr><td>Swap</td><td><code>int t = a; a = b; b = t;</code></td><td><code>a, b = b, a</code></td></tr>
  <tr><td>Head + tail</td><td><code>get(0)</code> + <code>subList(1, n)</code></td><td><code>first, *rest = list</code></td></tr>
  <tr><td>Varargs</td><td><code>int sum(int... nums)</code></td><td><code>def sum(*nums)</code></td></tr>
  <tr><td>Spread into a call</td><td>only for the trailing varargs slot</td><td><code>swap(*pair)</code> — any splattable position</td></tr>
  <tr><td>Spread into a literal</td><td>—</td><td><code>[*a, *b]</code>, <code>{ **h1, **h2 }</code></td></tr>
  <tr><td>Merge maps</td><td><code>new HashMap&lt;&gt;(a)</code> + <code>putAll(b)</code></td><td><code>a.merge(b)</code> (returns a new hash)</td></tr>
  <tr><td>Options bag</td><td><code>Map&lt;String, Object&gt; opts</code> parameter</td><td><code>def draw(**opts)</code> keyword splat</td></tr>
</table>
<p>The mental model that makes all of this click: the right-hand side of a
multiple assignment is evaluated <em>completely</em> before any variable
changes, which is why <code>a, b = b, a</code> needs no temp. And the splat is
one symmetric idea — in a parameter list it <em>collects</em> arguments into
an array, at a call site or in a literal it <em>spreads</em> an array back
out. <code>**</code> is the same pair of moves for keyword arguments and
hashes.</p>`,
