<script>
const LESSON = {
  number: 10,
  title: "Inheritance & Modules",

  intro: `
<p><code>extends</code> becomes a single character:
<code>class Circle &lt; Shape</code>. Calling up the chain works too, with one
trap for Java hands: <strong>bare <code>super</code> forwards ALL of the
current method's arguments</strong>, automatically — the opposite of Java,
where <code>super()</code> with empty parens is the no-argument call. In Ruby,
write <code>super()</code> <em>with</em> parens when you mean "pass
nothing."</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>class Circle extends Shape</code></td><td><code>class Circle &lt; Shape</code></td></tr>
  <tr><td><code>super(x, y);</code></td><td><code>super(x, y)</code> — or bare <code>super</code> to forward everything</td></tr>
  <tr><td><code>abstract double area();</code></td><td><code>def area = raise NotImplementedError</code> (convention)</td></tr>
  <tr><td><code>interface Greetable { default ... }</code></td><td><code>module Greetable</code> + <code>include Greetable</code></td></tr>
  <tr><td><code>@Override</code></td><td>just define the method again</td></tr>
</table>
<p>There is no <code>abstract</code> keyword. The convention is a base method
that raises <code>NotImplementedError</code> — enforced at <em>runtime</em>,
when the method is called, not at compile time. That's the honest trade of a
dynamic language, and it still supports the template-method pattern: the base
class's <code>describe</code> can call <code>area</code> and let each subclass
supply it. Interfaces are gone too, but <strong>modules</strong> do what
default methods do and more: <code>include Greetable</code> mixes real method
implementations into any class, and — unlike an <code>interface</code> — those
methods can call the including class's methods and touch its state.</p>`,

  java: `public abstract class Shape {
    public abstract double area();          // compile-time contract

    public String describe() {              // template method
        return "area: " + area();
    }
}

public class Circle extends Shape {
    private final double radius;

    public Circle(double radius) { this.radius = radius; }

    @Override
    public double area() {
        return Math.round(Math.PI * radius * radius * 100.0) / 100.0;
    }
}

interface Greetable {
    String name();
    default String greet() { return "Hello, I am " + name(); }
}`,

  task: `
<p>Build the same hierarchy in Ruby (constructors are already written):</p>
<ol>
  <li>In <code>class Shape</code>: make <code>area</code> raise
      <code>NotImplementedError</code> (the "abstract method" convention), and
      make <code>describe</code> return <code>"area: ..."</code> by
      interpolating <code>"area: #{area}"</code> — the template method calls
      whichever <code>area</code> the subclass defines.</li>
  <li>In <code>class Circle &lt; Shape</code>: define <code>area</code> as
      <code>(Math::PI * @radius ** 2).round(2)</code>.</li>
  <li>In <code>class Rectangle &lt; Shape</code>: define <code>area</code> as
      width times height.</li>
  <li>In <code>module Greetable</code>: define <code>greet</code> returning
      <code>"Hello, I am ..."</code> using the including class's
      <code>name</code> — the starter's <code>Robot</code> already does
      <code>include Greetable</code> and exposes <code>name</code>.</li>
</ol>`,

  starter: `class Shape
  # No abstract keyword: raise NotImplementedError so a subclass that
  # forgets area fails loudly (at runtime, not compile time).
  def area
    raise NotImplementedError, "TODO: raise NotImplementedError here"
  end

  # Template method: interpolate area, which the subclass provides.
  def describe
    raise NotImplementedError, "TODO: implement describe"
  end
end

class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    raise NotImplementedError, "TODO: pi times radius squared, rounded to 2"
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    raise NotImplementedError, "TODO: width times height"
  end
end

module Greetable
  # Mixed-in methods can call methods of the including class, like name.
  def greet
    raise NotImplementedError, "TODO: implement greet"
  end
end

class Robot
  include Greetable

  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  requirements: [
    { pattern: /<\s*Shape/, message: "Inherit with < Shape (Ruby's extends)" },
    { pattern: /NotImplementedError/, message: "Shape#area should raise NotImplementedError" },
    { pattern: /module\s+Greetable/, message: "Define module Greetable" },
    { pattern: /include\s+Greetable/, message: "Mix the module in with include Greetable" },
  ],

  tests: [
    { name: "Circle.new(2).area returns 12.57",
      code: "  expect_eq(Circle.new(2).area, 12.57)" },
    { name: "Rectangle.new(3, 4).area returns 12",
      code: "  expect_eq(Rectangle.new(3, 4).area, 12)" },
    { name: 'the template method works: Circle.new(2).describe returns "area: 12.57"',
      code: '  expect_eq(Circle.new(2).describe, "area: 12.57")' },
    { name: "Shape.new.area raises NotImplementedError",
      code: "  raised = false\n  begin\n    Shape.new.area\n  rescue NotImplementedError\n    raised = true\n  end\n  expect_true(raised)" },
    { name: 'Robot.new("R2-D2").greet returns "Hello, I am R2-D2"',
      code: '  expect_eq(Robot.new("R2-D2").greet, "Hello, I am R2-D2")' },
  ],

  solution: `class Shape
  def area
    raise NotImplementedError, "every Shape must implement area"
  end

  def describe
    "area: #{area}"
  end
end

class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    (Math::PI * @radius ** 2).round(2)
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    @width * @height
  end
end

module Greetable
  def greet
    "Hello, I am #{name}"
  end
end

class Robot
  include Greetable

  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>Inherit</td><td><code>class B extends A</code></td><td><code>class B &lt; A</code></td></tr>
  <tr><td>Call parent, same args</td><td><code>super(a, b);</code> spelled out</td><td>bare <code>super</code> forwards them all</td></tr>
  <tr><td>Call parent, no args</td><td><code>super();</code></td><td><code>super()</code> — the parens matter!</td></tr>
  <tr><td>Abstract method</td><td><code>abstract</code> (compile-time)</td><td><code>raise NotImplementedError</code> (runtime convention)</td></tr>
  <tr><td>Interface + default methods</td><td><code>interface</code> / <code>default</code></td><td><code>module</code> / <code>include</code></td></tr>
  <tr><td>Multiple contracts</td><td><code>implements A, B</code></td><td><code>include A</code> and <code>include B</code> — real code in both</td></tr>
</table>
<p>Modules are the bigger idea here. A Java interface's default methods can
only call other interface methods; a mixed-in module method runs <em>as the
object</em> — <code>greet</code> calls <code>name</code>, whatever
<code>name</code> means in the including class, and it could read
<code>@ivars</code> directly too. This is how Ruby's standard library shares
behavior: <code>include Comparable</code> gives you <code>&lt;</code>,
<code>&gt;</code>, <code>between?</code> from one <code>&lt;=&gt;</code>
method, and <code>include Enumerable</code> gives you dozens of collection
methods from one <code>each</code>. Single inheritance, but as many mixins as
you like.</p>`,
};
