  intro: `
<p>Java's <code>HashMap&lt;String, Integer&gt;</code> becomes Ruby's
<code>Hash</code>, and the ceremony gap is at its widest here: no
<code>new</code>, no type parameters, no <code>.put</code>. A hash is a
literal — <code>{ apples: 3, bananas: 5 }</code> — you read with
<code>h[:apples]</code> and write with <code>h[:cherries] = 12</code>. Note
those keys: <code>:apples</code> is a <strong>symbol</strong>, a lightweight
interned identifier. You already know the concept — Java interns string
literals behind the scenes — Ruby just makes the interned thing a visible,
first-class type, and symbols are the idiomatic choice for hash keys.</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>new HashMap&lt;String, Integer&gt;()</code></td><td><code>{ apples: 3, bananas: 5 }</code></td></tr>
  <tr><td><code>map.put(k, v)</code></td><td><code>h[k] = v</code></td></tr>
  <tr><td><code>map.get(k)</code></td><td><code>h[k]</code> (<code>nil</code> when missing)</td></tr>
  <tr><td><code>map.getOrDefault(k, 0)</code></td><td><code>h.fetch(k, 0)</code></td></tr>
  <tr><td><code>for (var e : map.entrySet())</code></td><td><code>h.each { |k, v| ... }</code></td></tr>
  <tr><td><code>map.keySet()</code></td><td><code>h.keys</code></td></tr>
</table>
<p>One gotcha to tattoo somewhere visible: <code>h[:name]</code> and
<code>h["name"]</code> are <em>different keys</em>. A symbol and a string
never compare equal, so a hash built with symbol keys returns
<code>nil</code> for string lookups — the classic first-week Ruby bug.
And where <code>map.get</code> would hand Java an NPE-in-waiting,
<code>h.fetch(k, 0)</code> is your <code>getOrDefault</code>; without the
default, <code>fetch</code> raises on a missing key, which is often exactly
the fail-fast behavior you want.</p>`,

  java: `import java.util.HashMap;
import java.util.Map;

public class Inventory {
    public static void main(String[] args) {
        Map<String, Integer> inventory = new HashMap<>();
        inventory.put("apples", 3);
        inventory.put("bananas", 5);

        int apples = inventory.getOrDefault("apples", 0);
        int pears  = inventory.getOrDefault("pears", 0);   // 0, not null

        for (Map.Entry<String, Integer> e : inventory.entrySet()) {
            System.out.println(e.getKey() + ": " + e.getValue());
        }

        boolean stocked = inventory.keySet().contains("apples");

        // A copy with one count bumped — Java makes you work for it:
        Map<String, Integer> updated = new HashMap<>(inventory);
        updated.merge("apples", 2, Integer::sum);
    }
}`,

<ol>

</ol>`,

  solution: `def build_inventory
  { apples: 3, bananas: 5 }
end

def get_count(inv, name)
  inv.fetch(name, 0)
end

def add_stock(inv, name, n)
  inv.merge(name => inv.fetch(name, 0) + n)
end

def has_apples?(inv)
  inv.keys.include?(:apples)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>Create</td><td><code>new HashMap&lt;String, Integer&gt;()</code></td><td><code>{ apples: 3 }</code> or <code>{}</code></td></tr>
  <tr><td>Write</td><td><code>map.put(k, v)</code></td><td><code>h[k] = v</code></td></tr>
  <tr><td>Read</td><td><code>map.get(k)</code> (null if missing)</td><td><code>h[k]</code> (nil if missing)</td></tr>
  <tr><td>Read with default</td><td><code>map.getOrDefault(k, 0)</code></td><td><code>h.fetch(k, 0)</code></td></tr>
  <tr><td>Read, fail fast</td><td>manual null check + throw</td><td><code>h.fetch(k)</code> raises <code>KeyError</code></td></tr>
  <tr><td>Iterate</td><td><code>for (var e : map.entrySet())</code></td><td><code>h.each { |k, v| ... }</code></td></tr>
  <tr><td>Keys / values</td><td><code>map.keySet()</code> / <code>map.values()</code></td><td><code>h.keys</code> / <code>h.values</code> (arrays)</td></tr>
  <tr><td>Copy + update</td><td><code>new HashMap&lt;&gt;(m)</code> + <code>merge(...)</code></td><td><code>h.merge(k =&gt; v)</code></td></tr>
  <tr><td>Key present?</td><td><code>map.containsKey(k)</code></td><td><code>h.key?(k)</code></td></tr>
</table>
<p>Symbols are why Ruby hashes read like data: <code>:apples</code> is one
immutable, interned object however many times it appears, so comparison is
identity-fast and the literal doubles as documentation. The
<code>{ apples: 3 }</code> shorthand is just sugar for
<code>{ :apples =&gt; 3 }</code> — when the key is a variable or a string,
you're back to the rocket. Keep the gotcha in mind when JSON enters the
picture: parsed JSON has <em>string</em> keys unless you ask otherwise
(lesson 19).</p>`,
