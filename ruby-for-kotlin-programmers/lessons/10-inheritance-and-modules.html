<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance & Modules",

  intro: `
<p>Kotlin's <code>:</code> for a superclass becomes an even shorter
<code>&lt;</code>: <code>class Circle &lt; Shape</code>. Calling up the chain
works too, with one trap for Kotlin hands: <strong>bare <code>super</code>
forwards ALL of the current method's arguments</strong>, automatically —
Kotlin has no such shorthand, you always spell out what you pass with
<code>super.foo(x, y)</code>. In Ruby, write <code>super()</code>
<em>with</em> parens when you mean "pass nothing."</p>
<table>
  <tr><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td><code>class Circle : Shape()</code></td><td><code>class Circle &lt; Shape</code></td></tr>
  <tr><td><code>super.area()</code></td><td><code>super(x, y)</code> — or bare <code>super</code> to forward everything</td></tr>
  <tr><td><code>abstract fun area(): Double</code></td><td><code>def area = raise NotImplementedError</code> (convention)</td></tr>
  <tr><td><code>interface Greetable { fun greet() = ... }</code></td><td><code>module Greetable</code> + <code>include Greetable</code></td></tr>
  <tr><td><code>override</code></td><td>just define the method again</td></tr>
</table>
<p>Unlike Kotlin, there is no <code>abstract</code> keyword — and no
<code>TODO()</code> baked into the language, though the spirit is the same. The
convention is a base method that raises <code>NotImplementedError</code> —
enforced at <em>runtime</em>, when the method is called, not at compile time.
That's the honest trade of a dynamic language, and it still supports the
template-method pattern: the base class's <code>describe</code> can call
<code>area</code> and let each subclass supply it. Kotlin interfaces are gone
too, but <strong>modules</strong> do what interface default methods do and
more: <code>include Greetable</code> mixes real method implementations into any
class, and — unlike a Kotlin <code>interface</code>, which is stateless —
those methods can call the including class's methods and touch its instance
state directly.</p>`,

  kotlin: `abstract class Shape {
    abstract fun area(): Double             // compile-time contract

    fun describe(): String =                // template method
        "area: \${area()}"
}

class Circle(private val radius: Double) : Shape() {
    override fun area(): Double =
        Math.round(Math.PI * radius * radius * 100.0) / 100.0
}

interface Greetable {
    val name: String
    fun greet(): String = "Hello, I am \$name"
}`,

  task: `
<p>Build the same hierarchy in Ruby (constructors are already written):</p>
<ol>
  <li>In <code>class Shape</code>: make <code>area</code> raise
      <code>NotImplementedError</code> (the "abstract method" convention), and
      make <code>describe</code> return <code>"area: ..."</code> by
      interpolating <code>"area: #{area}"</code> — the template method calls
      whichever <code>area</code> the subclass defines.</li>
  <li>In <code>class Circle &lt; Shape</code>: define <code>area</code> as
      <code>(Math::PI * @radius ** 2).round(2)</code>.</li>
  <li>In <code>class Rectangle &lt; Shape</code>: define <code>area</code> as
      width times height.</li>
  <li>In <code>module Greetable</code>: define <code>greet</code> returning
      <code>"Hello, I am ..."</code> using the including class's
      <code>name</code> — the starter's <code>Robot</code> already does
      <code>include Greetable</code> and exposes <code>name</code>.</li>
</ol>`,

  starter: `class Shape
  # No abstract keyword: raise NotImplementedError so a subclass that
  # forgets area fails loudly (at runtime, not compile time).
  def area
    raise NotImplementedError, "TODO: raise NotImplementedError here"
  end

  # Template method: interpolate area, which the subclass provides.
  def describe
    raise NotImplementedError, "TODO: implement describe"
  end
end

class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    raise NotImplementedError, "TODO: pi times radius squared, rounded to 2"
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    raise NotImplementedError, "TODO: width times height"
  end
end

module Greetable
  # Mixed-in methods can call methods of the including class, like name.
  def greet
    raise NotImplementedError, "TODO: implement greet"
  end
end

class Robot
  include Greetable

  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  requirements: [
    { pattern: /<\s*Shape/, message: "Inherit with < Shape (Ruby's extends)" },
    { pattern: /NotImplementedError/, message: "Shape#area should raise NotImplementedError" },
    { pattern: /module\s+Greetable/, message: "Define module Greetable" },
    { pattern: /include\s+Greetable/, message: "Mix the module in with include Greetable" },
  ],

  tests: [
    { name: "Circle.new(2).area returns 12.57",
      code: "  expect_eq(Circle.new(2).area, 12.57)" },
    { name: "Rectangle.new(3, 4).area returns 12",
      code: "  expect_eq(Rectangle.new(3, 4).area, 12)" },
    { name: 'the template method works: Circle.new(2).describe returns "area: 12.57"',
      code: '  expect_eq(Circle.new(2).describe, "area: 12.57")' },
    { name: "Shape.new.area raises NotImplementedError",
      code: "  raised = false\n  begin\n    Shape.new.area\n  rescue NotImplementedError\n    raised = true\n  end\n  expect_true(raised)" },
    { name: 'Robot.new("R2-D2").greet returns "Hello, I am R2-D2"',
      code: '  expect_eq(Robot.new("R2-D2").greet, "Hello, I am R2-D2")' },
  ],

  solution: `class Shape
  def area
    raise NotImplementedError, "every Shape must implement area"
  end

  def describe
    "area: #{area}"
  end
end

class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    (Math::PI * @radius ** 2).round(2)
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    @width * @height
  end
end

module Greetable
  def greet
    "Hello, I am #{name}"
  end
end

class Robot
  include Greetable

  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td>Inherit</td><td><code>class B : A()</code></td><td><code>class B &lt; A</code></td></tr>
  <tr><td>Call parent, same args</td><td><code>super.foo(a, b)</code> spelled out</td><td>bare <code>super</code> forwards them all</td></tr>
  <tr><td>Call parent, no args</td><td><code>super.foo()</code></td><td><code>super()</code> — the parens matter!</td></tr>
  <tr><td>Abstract method</td><td><code>abstract fun</code> (compile-time)</td><td><code>raise NotImplementedError</code> (runtime convention)</td></tr>
  <tr><td>Interface + default methods</td><td><code>interface</code> / <code>fun x() = ...</code></td><td><code>module</code> / <code>include</code></td></tr>
  <tr><td>Multiple contracts</td><td><code>: A, B</code></td><td><code>include A</code> and <code>include B</code> — real code in both</td></tr>
</table>
<p>Modules are the bigger idea here. A Kotlin interface can have default method
bodies, but it holds no state; a mixed-in module method runs <em>as the
object</em> — <code>greet</code> calls <code>name</code>, whatever
<code>name</code> means in the including class, and it could read
<code>@ivars</code> directly too. This is how Ruby's standard library shares
behavior: <code>include Comparable</code> gives you <code>&lt;</code>,
<code>&gt;</code>, <code>between?</code> from one <code>&lt;=&gt;</code>
method, and <code>include Enumerable</code> gives you dozens of collection
methods from one <code>each</code>. Single inheritance, but as many mixins as
you like.</p>`,
};
