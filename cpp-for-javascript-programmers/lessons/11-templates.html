<script>
const LESSON = {
  number: 11,
  title: "Templates",

  intro: `
<p>JavaScript doesn't have a type system, so it never needed a language feature for
"write code once, use it for many types" — a plain function like
<code>function first(xs) { return xs[0]; }</code> already works on an array of
numbers, strings, or anything else, because JavaScript never checks the type of
<code>xs</code>'s elements at all. C++ templates solve a related problem, but from
the opposite direction. A C++ template is a <em>recipe</em>: the compiler stamps out
a fresh, fully concrete function or class for each type you actually use, then
compiles that. So <code>max_of&lt;int&gt;</code> and <code>max_of&lt;double&gt;</code>
are genuinely different functions in your binary, even though you only wrote the
code once.</p>
<table>
  <tr><th>JavaScript</th><th>C++</th></tr>
  <tr><td><code>function id(x) { return x; }</code></td><td><code>template&lt;class T&gt; T id(T x)</code></td></tr>
  <tr><td><code>id(5)</code> (no type involved)</td><td><code>id(5)</code> (T deduced)</td></tr>
  <tr><td><code>id("hi")</code> (same function)</td><td><code>id&lt;std::string&gt;("hi")</code></td></tr>
  <tr><td><code>class Box { … }</code></td><td><code>template&lt;class T&gt; class Box { … }</code></td></tr>
  <tr><td>one function, no types anywhere</td><td>each instantiation compiled separately</td></tr>
</table>
<p>Two practical notes. <code>class</code> and <code>typename</code> are
interchangeable in a template parameter list — <code>template&lt;class T&gt;</code>
and <code>template&lt;typename T&gt;</code> mean the same thing. And for function
templates you usually let the compiler <em>deduce</em> <code>T</code> from the
arguments, so most calls look exactly like calling an ordinary JavaScript function;
you only spell it out in angle brackets when there is nothing to deduce from.</p>`,

  javascript: `function maxOf(a, b) {
  return a > b ? a : b;
}

class Box {
  #value;
  constructor(value) { this.#value = value; }
  get() { return this.#value; }
  set(v) { this.#value = v; }
}

const b = new Box(41);
b.set(b.get() + 1);   // 42`,

  task: `
<p>Build a generic function and a small generic container.</p>
<ol>
  <li><code>template&lt;class T&gt; T max_of(T a, T b)</code> — return the larger of
      <code>a</code> and <code>b</code> using <code>&gt;</code>. It should work for
      <code>int</code>, <code>double</code>, and <code>std::string</code> with no
      changes.</li>
  <li><code>template&lt;class T&gt; class Box</code> — a one-slot container:
    <ul>
      <li>a constructor <code>Box(T value)</code> that stores the value,</li>
      <li><code>T get() const</code> returning the stored value,</li>
      <li><code>void set(T value)</code> replacing it.</li>
    </ul>
  </li>
</ol>
<p>Because templates must be visible where they are used, write the whole
definition inline (no separate .cpp file) — which is what you are doing here anyway.</p>`,

  starter: `template<class T>
T max_of(T a, T b) {
  return a; // TODO: return the larger of a and b
}

template<class T>
class Box {
public:
  Box(T value) {
    // TODO: store value
  }
  T get() const {
    return T{}; // TODO: return the stored value
  }
  void set(T value) {
    // TODO: replace the stored value
  }
private:
  T value_{};
};
`,

  requirements: [
    { pattern: /template\s*<\s*(class|typename)\s+\w+\s*>/, message: "Declare at least one template with template<class T>" },
    { pattern: /a\s*>\s*b/, message: "max_of should compare with a > b" },
  ],

  tests: [
    { name: "max_of(3, 7) is 7", code: "    expect_eq(max_of(3, 7), 7);" },
    { name: "max_of(2.5, 1.5) is 2.5", code: "    expect_eq(max_of(2.5, 1.5), 2.5);" },
    { name: "max_of on strings picks the larger", code: "    expect_eq(max_of(std::string(\"apple\"), std::string(\"banana\")), std::string(\"banana\"));" },
    { name: "explicit type argument works", code: "    expect_eq(max_of<int>(4, 9), 9);" },
    { name: "Box<int> get returns the stored value", code: "    Box<int> b(41); expect_eq(b.get(), 41);" },
    { name: "Box<int> set replaces the value", code: "    Box<int> b(41); b.set(b.get() + 1); expect_eq(b.get(), 42);" },
    { name: "Box<std::string> holds a string", code: "    Box<std::string> s(std::string(\"hi\")); expect_eq(s.get(), std::string(\"hi\"));" },
  ],

  solution: `template<class T>
T max_of(T a, T b) {
  return a > b ? a : b;
}

template<class T>
class Box {
public:
  Box(T value) : value_(value) {}
  T get() const {
    return value_;
  }
  void set(T value) {
    value_ = value;
  }
private:
  T value_{};
};
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>C++</th></tr>
  <tr><td>Function generic</td><td><code>function f(x) { … }</code> (any type)</td><td><code>template&lt;class T&gt; auto f(T x)</code></td></tr>
  <tr><td>Class generic</td><td><code>class Box { … }</code> (any type)</td><td><code>template&lt;class T&gt; class Box</code></td></tr>
  <tr><td>Inference / deduction</td><td>n/a — no types to infer</td><td><code>f(5)</code></td></tr>
  <tr><td>Explicit type arg</td><td>n/a</td><td><code>f&lt;std::string&gt;(x)</code></td></tr>
  <tr><td>Where it lives</td><td>one function body, checked only at run time</td><td>instantiated per type, header-only</td></tr>
</table>
<p>The biggest surprise coming from JavaScript is that templates are duck-typed by
the compiler in a similar spirit to how JavaScript itself is duck-typed at run
time: there is no <code>extends</code>-style constraint by default, so
<code>max_of</code> compiles for <em>any</em> <code>T</code> that supports
<code>&gt;</code> — and only fails, often verbosely, if you feed it a type that does
not. The difference is *when* you find out: JavaScript would happily run
<code>a &gt; b</code> on anything and give you a possibly-wrong answer, while C++
refuses to compile <code>max_of</code> at all for a type that has no <code>&gt;</code>
operator. C++20 adds <em>concepts</em> (e.g.
<code>template&lt;std::totally_ordered T&gt;</code>) to state such requirements up
front, with far clearer errors than the raw template failures. Also note the member
initializer list <code>Box(T value) : value_(value) {}</code> — the idiomatic way to
initialize members, preferred over assigning inside the constructor body.</p>`,
};
