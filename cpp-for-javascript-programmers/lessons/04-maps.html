  intro: `
<p>In JavaScript you reach for a plain object or a <code>Map</code> to associate
keys with values. C++ gives you two standard containers:
<code>std::map</code>, which keeps its keys sorted in a balanced tree, and
<code>std::unordered_map</code>, a hash table with average O(1) lookup and no
ordering. Both are strongly typed in the declaration —
<code>std::map&lt;std::string, int&gt;</code> fixes the key and value types up
front, unlike a JavaScript <code>Map</code>, which can hold any key or value
type at runtime.</p>
<table>
  <tr><th>JavaScript</th><th>C++</th></tr>
  <tr><td><code>const m = new Map();</code></td><td><code>std::map&lt;std::string, int&gt; m;</code></td></tr>
  <tr><td><code>m.set("a", 1);</code></td><td><code>m["a"] = 1;</code></td></tr>
  <tr><td><code>m.get("a")</code></td><td><code>m.at("a")</code> (throws if missing)</td></tr>
  <tr><td><code>m.has("a")</code></td><td><code>m.contains("a")</code></td></tr>
  <tr><td><code>m.size</code></td><td><code>m.size()</code></td></tr>
</table>
<p>Two gotchas for a JavaScript programmer. First, <code>m["missing"]</code>
does not return <code>undefined</code> — it <em>inserts</em> a default-constructed
value (<code>0</code> for <code>int</code>) and returns a reference to it. To
look without inserting, use <code>.at</code>, <code>.find</code>,
<code>.count</code>, or <code>.contains</code>. Second, iterating yields
<code>std::pair&lt;const Key, Value&gt;</code> elements; destructure them with
structured bindings: <code>for (const auto&amp; [key, value] : m)</code>.</p>`,

  javascript: `const counts = new Map();
for (const word of words) {

const has = counts.has("cat");
const n = counts.get("cat") ?? 0;
const total = counts.size;`,

  task: `
<p>Write these free functions using <code>std::map</code> /
<code>std::unordered_map</code>:</p>
<ol>
  <li><code>wordCounts(const std::vector&lt;std::string&gt;&amp; words)</code>

  <li><code>countOf(const std::unordered_map&lt;std::string, int&gt;&amp; m, const std::string&amp; key)</code>

</ol>`,

  tests: [

  solution: `std::unordered_map<std::string, int> wordCounts(const std::vector<std::string>& words) {
  std::unordered_map<std::string, int> counts;
  for (const auto& word : words) {
    counts[word]++;
  }
  return counts;
}

int countOf(const std::unordered_map<std::string, int>& m, const std::string& key) {
  auto it = m.find(key);
  if (it == m.end()) {
    return 0;
  }
  return it->second;
}

bool hasWord(const std::unordered_map<std::string, int>& m, const std::string& key) {
  return m.contains(key);
}

int distinctCount(const std::unordered_map<std::string, int>& m) {
  return static_cast<int>(m.size());
}

int totalCount(const std::unordered_map<std::string, int>& m) {
  int total = 0;
  for (const auto& [word, n] : m) {
    total += n;
  }
  return total;
}
`,

  notes: `
<table>
  <tr><th>Operation</th><th>JavaScript (Map)</th><th>C++</th></tr>
  <tr><td>Declare</td><td><code>new Map()</code></td><td><code>std::unordered_map&lt;std::string, int&gt; m;</code></td></tr>
  <tr><td>Insert / overwrite</td><td><code>m.set(k, v)</code></td><td><code>m[k] = v;</code> or <code>m.insert({k, v})</code></td></tr>
  <tr><td>Read (throwing)</td><td>no built-in equivalent — <code>m.get(k)</code> just returns <code>undefined</code></td><td><code>m.at(k)</code></td></tr>
  <tr><td>Read (safe)</td><td><code>m.get(k) ?? d</code></td><td><code>m.find(k)</code> / <code>m.contains(k)</code></td></tr>
  <tr><td>Membership</td><td><code>m.has(k)</code></td><td><code>m.contains(k)</code> / <code>m.count(k)</code></td></tr>
  <tr><td>Size</td><td><code>m.size</code></td><td><code>m.size()</code></td></tr>
  <tr><td>Iterate</td><td><code>for (const [k, v] of m)</code></td><td><code>for (const auto&amp; [k, v] : m)</code></td></tr>
</table>
<p>The most important difference is <code>operator[]</code>. In JavaScript,
reading a missing key with <code>m.get(k)</code> gives <code>undefined</code>;
in C++, <code>m[k]</code> on a missing key silently <em>inserts</em> a default
value and hands back a reference. That is exactly why <code>m[word]++</code>
works as a counter — the first touch creates a <code>0</code>, then increments
it — but also why you must avoid <code>[]</code> for read-only lookups (and it
won't even compile on a <code>const</code> map). Prefer <code>.at</code> when
the key must exist, <code>.find</code> / <code>.contains</code> when it might
not.</p>
<p>Choose <code>std::map</code> when you need keys visited in sorted order;
choose <code>std::unordered_map</code> (a hash table) when you just need fast
lookups. The API shown here is identical between the two, so switching is a
one-word change.</p>`,
