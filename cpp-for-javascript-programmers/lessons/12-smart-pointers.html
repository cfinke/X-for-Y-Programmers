const LESSON = {
  number: 12,
  title: "Smart Pointers",

  intro: `
<p>In JavaScript every object lives on the heap and the garbage collector frees
it once nothing references it anymore. You <code>new</code> something and forget
about it. C++ has no garbage collector: whoever creates a heap object is
responsible for destroying it. The old way was <code>new</code> paired with a
matching <code>delete</code> — easy to leak, easy to double-free, easy to use
after freeing.</p>
<p>Modern C++ solves this with <em>smart pointers</em>: objects that own a heap
allocation and delete it automatically when they go out of scope (this is called
RAII). You almost never write <code>new</code> or <code>delete</code> yourself.</p>
<table>
  <tr><th>JavaScript</th><th>C++</th></tr>
  <tr><td><code>const r = new Robot("R", 8);</code></td><td><code>auto r = std::make_unique&lt;Robot&gt;("R", 8);</code></td></tr>
  <tr><td>GC frees when unreachable</td><td>freed when the <code>unique_ptr</code> dies</td></tr>
  <tr><td><code>r.name</code></td><td><code>r-&gt;name</code></td></tr>
  <tr><td>every binding is a shared reference</td><td><code>shared_ptr</code> = shared, ref-counted</td></tr>
  <tr><td>(no distinction)</td><td><code>unique_ptr</code> = exactly one owner</td></tr>
</table>
<p><code>std::unique_ptr&lt;T&gt;</code> is the default: it is the sole owner, so it
cannot be copied — only <em>moved</em> with <code>std::move</code> to hand
ownership elsewhere. <code>std::shared_ptr&lt;T&gt;</code> is closer to a
JavaScript reference: copies share one object via a reference count, and
<code>use_count()</code> tells you how many owners currently exist. The object
dies when the last <code>shared_ptr</code> does.</p>`,

  javascript: `class Robot {
  constructor(name, battery) {
    this.name = name;
    this.battery = battery;
  }
}

// GC owns the lifetime; you just new it and share references freely.
const r = new Robot("Wall-E", 80);
const alias = r;        // both point at the same Robot
console.log(r.name);    // "Wall-E"`,

  task: `
<p>A <code>Robot</code> struct is already declared for you. Build robots on the
heap through smart pointers — never call <code>new</code>:</p>
<ol>
  <li><code>make_robot(name, battery)</code> returns a
      <code>std::unique_ptr&lt;Robot&gt;</code> built with
      <code>std::make_unique&lt;Robot&gt;(name, battery)</code>.</li>
  <li><code>robot_name(const std::unique_ptr&lt;Robot&gt;&amp; r)</code> returns
      <code>r-&gt;name</code>.</li>
  <li><code>adopt(std::unique_ptr&lt;Robot&gt; r)</code> takes ownership by value
      (the caller must <code>std::move</code> into it) and returns
      <code>r-&gt;battery</code>.</li>
  <li><code>share_robot(name, battery)</code> returns a
      <code>std::shared_ptr&lt;Robot&gt;</code> built with
      <code>std::make_shared&lt;Robot&gt;(name, battery)</code>.</li>
  <li><code>owner_count(const std::shared_ptr&lt;Robot&gt;&amp; r)</code> returns
      <code>r.use_count()</code> (a <code>long</code>).</li>
</ol>`,

  std::string name;
  int battery;
  Robot(std::string n, int b) : name(std::move(n)), battery(b) {}
};

}

}

  return 0; // TODO: return the adopted robot's battery
}

  return nullptr; // TODO: build with std::make_shared
}

long owner_count(const std::shared_ptr<Robot>& r) {
  return 0; // TODO: use_count()
}
`,

  requirements: [
    { pattern: /std::make_unique\s*<\s*Robot\s*>/, message: "Build the unique_ptr with std::make_unique<Robot>(...)" },
    { pattern: /std::make_shared\s*<\s*Robot\s*>/, message: "Build the shared_ptr with std::make_shared<Robot>(...)" },
    { pattern: /\.use_count\s*\(\s*\)/, message: "Use use_count() to count the shared owners" },
  ],

  tests: [
    { name: "make_robot + robot_name reads the name", code:
`    auto r = make_robot("Wall-E", 80);
    expect_eq(robot_name(r), std::string("Wall-E"));` },
    { name: "make_robot returns a real allocation, not null", code:
`    auto r = make_robot("R2-D2", 55);
    expect_true(r != nullptr);` },
    { name: "adopt takes ownership via std::move and reads battery", code:
`    auto r = make_robot("Bender", 42);
    int b = adopt(std::move(r));
    expect_eq(b, 42);
    expect_true(r == nullptr);` },
    { name: "share_robot starts with one owner", code:
`    auto p = share_robot("Optimus", 90);
    expect_eq(owner_count(p), 1L);` },
    { name: "copying a shared_ptr raises the owner count", code:
`    auto p = share_robot("Data", 70);
    auto q = p;
    expect_eq(owner_count(p), 2L);
    expect_eq(robot_name(std::make_unique<Robot>("x", 0)), std::string("x"));
    expect_eq(q->name, std::string("Data"));` },
    { name: "owner count drops when a shared_ptr goes out of scope", code:
`    auto p = share_robot("Marvin", 5);
    { auto q = p; expect_eq(owner_count(p), 2L); }
    expect_eq(owner_count(p), 1L);` },
  ],

  solution: `struct Robot {
  std::string name;
  int battery;
  Robot(std::string n, int b) : name(std::move(n)), battery(b) {}
};

std::unique_ptr<Robot> make_robot(const std::string& name, int battery) {
  return std::make_unique<Robot>(name, battery);
}

std::string robot_name(const std::unique_ptr<Robot>& r) {
  return r->name;
}

int adopt(std::unique_ptr<Robot> r) {
  return r->battery;
}

std::shared_ptr<Robot> share_robot(const std::string& name, int battery) {
  return std::make_shared<Robot>(name, battery);
}

long owner_count(const std::shared_ptr<Robot>& r) {
  return r.use_count();
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>C++</th></tr>
  <tr><td>Build on heap</td><td><code>new Robot(...)</code></td><td><code>std::make_unique&lt;Robot&gt;(...)</code></td></tr>
  <tr><td>Shared, counted</td><td>any reference</td><td><code>std::make_shared&lt;Robot&gt;(...)</code></td></tr>
  <tr><td>Reach a member</td><td><code>r.name</code></td><td><code>r-&gt;name</code></td></tr>
  <tr><td>Hand off ownership</td><td>just assign</td><td><code>std::move(ptr)</code></td></tr>
  <tr><td>How many owners</td><td>—</td><td><code>ptr.use_count()</code></td></tr>
  <tr><td>Freeing</td><td>garbage collector</td><td>automatic when the pointer dies</td></tr>
</table>
<p>The <code>starter</code> struct's constructor exists only so
<code>make_unique</code>/<code>make_shared</code> can forward the arguments to it —
those helpers construct the object in place, which is why you pass constructor
arguments rather than an already-built <code>Robot</code>.</p>
<p>A <code>unique_ptr</code> cannot be copied, so <code>adopt</code> takes it
<em>by value</em> and the caller must write <code>std::move(r)</code> to transfer
ownership; afterwards the caller's pointer is <code>nullptr</code>. A
<code>shared_ptr</code> copies freely — each copy bumps
<code>use_count()</code>, and the object is destroyed exactly when the count hits
zero. Reach for <code>unique_ptr</code> by default and only upgrade to
<code>shared_ptr</code> when ownership genuinely must be shared.</p>`,
};
