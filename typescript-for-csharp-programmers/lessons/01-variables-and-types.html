<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Basic Types",

  intro: `
<p>TypeScript and C# share a lead designer — Anders Hejlsberg — and it shows.
<code>var x = ...</code> with full type inference? That is <code>let x = ...</code>.
Explicit annotations, checked at compile time, with the same squiggles in the
same IDE family? All here. The one syntactic flip to internalize: the type moves
<em>after</em> the name — <code>string name</code> becomes <code>name: string</code>,
and the return type moves after the parameter list.</p>
<table>
  <tr><th>C#</th><th>TypeScript</th></tr>
  <tr><td><code>string userName = "Ada";</code></td><td><code>const userName: string = "Ada";</code></td></tr>
  <tr><td><code>int age = 36;</code></td><td><code>let age: number = 36;</code></td></tr>
  <tr><td><code>double rating = 4.5;</code> / <code>decimal price = 9.99m;</code></td><td><code>let price: number = 9.99;</code> (one number type!)</td></tr>
  <tr><td><code>bool isActive = true;</code></td><td><code>let isActive: boolean = true;</code></td></tr>
  <tr><td><code>var city = "Oslo";</code></td><td><code>let city = "Oslo";</code> (same inference)</td></tr>
</table>
<p>Two habit shifts. First, <code>int</code>, <code>long</code>, <code>double</code>,
and <code>decimal</code> all collapse into a single <code>number</code> type — no
<code>m</code> or <code>f</code> suffixes, no integer division surprises to manage.
Second, C#'s <code>const</code> is a niche keyword for compile-time constants; in
TypeScript <code>const</code> is the <em>default</em> way to declare anything you
never reassign, and <code>let</code> is the exception. Also note the convention
shift: methods and locals are <code>camelCase</code>, so <code>DescribeUser</code>
becomes <code>describeUser</code>.</p>`,

  csharp: `string userName = "Ada";
int userAge = 36;
double rating = 4.5;
decimal price = 9.99m;   // int, double, decimal: three numeric types
bool isActive = true;

// var infers the type, exactly like TypeScript's let:
var city = "Oslo";                 // string
const string Greeting = "Hello";   // const = compile-time constants only

static string DescribeUser(string name, int age) =>
    $"{name} is {age} years old";

Console.WriteLine(DescribeUser(userName, userAge));`,

  task: `
<p>Rewrite the C# on the left as TypeScript:</p>
<ol>
  <li>Declare a constant <code>userName</code> of type <code>string</code> with
      the value <code>"Ada"</code>, and a variable <code>userAge</code> declared
      with <code>let</code>, of type <code>number</code>, with the value
      <code>36</code>. Write the annotations explicitly — type after the name.</li>
  <li>Declare a constant <code>price</code> of type <code>number</code> with the
      value <code>9.99</code>. No <code>decimal</code>, no <code>m</code> suffix —
      it is all just <code>number</code>.</li>
  <li>Write a function <code>describeUser</code> (camelCase, not
      <code>DescribeUser</code>) that takes <code>name: string</code> and
      <code>age: number</code> and returns a <code>string</code> like
      <code>"Ada is 36 years old"</code>. The return type goes after the
      parameter list: <code>(...): string</code>.</li>
</ol>
<p>Just like in C#, reassigning <code>userAge = "thirty-six"</code> is a compile
error — the type checker you already trust travels with you.</p>`,

  starter: `// 1 & 2. Declare userName (const, string), userAge (let, number),
//         and price (const, number). The type goes AFTER the name:
//         C#: string userName = "Ada";  ->  const userName: string = "Ada";


// 3. describeUser — note the convention shift: DescribeUser -> describeUser.
//    C#: static string DescribeUser(string name, int age) => ...
function describeUser(name, age) {
  // TODO: return "<name> is <age> years old"
  return "";
}
`,

  exportNames: ["userName", "userAge", "price", "describeUser"],

  requirements: [
    { pattern: /const\s+userName\s*:\s*string/, message: "Declare userName as a const with an explicit : string annotation" },
    { pattern: /let\s+userAge\s*:\s*number/, message: "Declare userAge with let and an explicit : number annotation" },
    { pattern: /const\s+price\s*:\s*number/, message: "Declare price as a const with an explicit : number annotation" },
    { pattern: /describeUser\s*\(\s*name\s*:\s*string\s*,\s*age\s*:\s*number\s*\)\s*:\s*string/, message: "Give describeUser typed parameters (name: string, age: number) and a : string return type" },
  ],

  tests: [
    { name: 'userName is "Ada"', run: (x) => expectEqual(x.userName, "Ada") },
    { name: "userAge is 36", run: (x) => expectEqual(x.userAge, 36) },
    { name: "price is 9.99 (a plain number)", run: (x) => expectEqual(x.price, 9.99) },
    { name: 'describeUser("Ada", 36) returns "Ada is 36 years old"', run: (x) => expectEqual(x.describeUser("Ada", 36), "Ada is 36 years old") },
    { name: 'describeUser("Anders", 65) returns "Anders is 65 years old"', run: (x) => expectEqual(x.describeUser("Anders", 65), "Anders is 65 years old") },
  ],

  solution: `const userName: string = "Ada";
let userAge: number = 36;
const price: number = 9.99;

function describeUser(name: string, age: number): string {
  return name + " is " + age + " years old";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>TypeScript</th></tr>
  <tr><td>Typed variable</td><td><code>int x = 1;</code></td><td><code>let x: number = 1;</code></td></tr>
  <tr><td>Inferred variable</td><td><code>var x = 1;</code></td><td><code>let x = 1;</code></td></tr>
  <tr><td>Never reassigned</td><td><code>const</code> (compile-time only, rare)</td><td><code>const x = 1;</code> (the default choice)</td></tr>
  <tr><td>Numeric types</td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>decimal</code></td><td><code>number</code> (just one)</td></tr>
  <tr><td>Text / truth</td><td><code>string</code>, <code>bool</code></td><td><code>string</code>, <code>boolean</code></td></tr>
  <tr><td>Return type</td><td><code>string F(int a)</code></td><td><code>function f(a: number): string</code></td></tr>
  <tr><td>Naming</td><td><code>PascalCase</code> methods</td><td><code>camelCase</code> functions</td></tr>
</table>
<p>Like C#'s <code>var</code>, TypeScript infers most types —
<code>const userName = "Ada"</code> is already a <code>string</code> — so
idiomatic code omits annotations where the initializer makes the type obvious.
This lesson asks for explicit annotations so the postfix syntax gets into your
fingers; from here on, annotate where C# would make you spell out a type
(parameters, return values, empty collections) and infer the rest.</p>`,
};
</script>
