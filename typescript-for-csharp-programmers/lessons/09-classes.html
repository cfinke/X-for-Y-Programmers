const LESSON = {
  number: 9,
  title: "Classes",

  intro: `
<p>TypeScript classes will feel like home: <code>class</code>,
<code>constructor</code>, <code>private</code>/<code>protected</code>/<code>public</code>,
<code>readonly</code>, <code>static</code> — the vocabulary maps almost
one-to-one. The headline feature is <em>parameter properties</em>: put an
access modifier on a constructor parameter and TypeScript declares the field,
takes the argument, and assigns it — all in one stroke. If you have used C# 12
primary constructors, it is that idea, but each parameter also carries its own
visibility.</p>
<table>
  <tr><th>C#</th><th>TypeScript</th></tr>
  <tr><td><code>class BankAccount(string owner)</code> (C# 12) + manual property</td><td><code>constructor(public readonly owner: string) {}</code> — field, assignment, visibility in one</td></tr>
  <tr><td><code>private decimal _balance;</code></td><td><code>private balance: number;</code> (no underscore convention needed)</td></tr>
  <tr><td><code>public string Id { get; }</code> / <code>init;</code></td><td><code>readonly id: string;</code></td></tr>
  <tr><td><code>public decimal GetBalance() => _balance;</code></td><td><code>getBalance(): number { return this.balance; }</code></td></tr>
</table>
<p>Adjustments to make: members default to <code>public</code> (like C#
interface members, unlike C# class members, which default private); methods
and fields are camelCase, so <code>Deposit</code> becomes
<code>deposit</code>; and every member access needs an explicit
<code>this.</code> — there is no implicit <code>this</code> as in C# method
bodies. There are no auto-properties (<code>{ get; set; }</code>) because
plain public fields already do that job; when you later need logic, TS has
<code>get</code>/<code>set</code> accessor syntax. And be aware
<code>private</code> is compile-time only — it is erased to a normal property
at runtime (JavaScript's hard-private <code>#field</code> exists too, but the
TS keyword is what you will see in most codebases).</p>`,

  csharp: `public class BankAccount(string owner, string id) // C# 12 primary ctor
{
    public string Owner { get; } = owner;
    public string Id { get; } = id;
    private decimal _balance = 0;

    public void Deposit(decimal amount) => _balance += amount;

    public void Withdraw(decimal amount)
    {
        if (amount > _balance)
            throw new InvalidOperationException("Insufficient funds");
        _balance -= amount;
    }

    public decimal GetBalance() => _balance;
}

var account = new BankAccount("Ada", "ACC-1");
account.Deposit(100);
account.Withdraw(40);
Console.WriteLine(account.GetBalance()); // 60`,

  task: `
<p>Port <code>BankAccount</code> using parameter properties (and camelCase
members: <code>Deposit</code> → <code>deposit</code>):</p>
<ol>
  <li>Give <code>BankAccount</code> a constructor whose parameters declare the
      fields: <code>owner</code> and <code>id</code> as
      <code>public readonly string</code>-style parameter properties
      (<code>public readonly owner: string</code>), and
      <code>balance</code> as <code>private</code> with a default of
      <code>0</code>. The constructor body stays empty — that is the point.</li>
  <li>Add <code>deposit(amount: number)</code> which adds to the balance
      (remember <code>this.</code>).</li>
  <li>Add <code>withdraw(amount: number)</code> which subtracts, but first
      <code>throw new Error("Insufficient funds")</code> if <code>amount</code>
      exceeds the balance.</li>
  <li>Add <code>getBalance(): number</code> returning the current balance.</li>
</ol>
<p>Unlike interfaces, classes survive compilation — <code>BankAccount</code>
is a real runtime value the tests can <code>new</code> up.</p>`,

  starter: `class BankAccount {
  // TODO: replace this constructor with parameter properties:
  //   constructor(public readonly owner: string,
  //               public readonly id: string,
  //               private balance: number = 0) {}
  constructor(owner: string, id: string) {
  }

  deposit(amount: number): void {
    // TODO: add to the balance (this.balance)
  }

  withdraw(amount: number): void {
    // TODO: throw new Error("Insufficient funds") on overdraft,
    // otherwise subtract from the balance
  }

  getBalance(): number {
    // TODO
    return 0;
  }
}
`,

  exportNames: ["BankAccount"],

  requirements: [
    { pattern: /private\s+balance/, message: "Declare balance as a private parameter property" },
    { pattern: /readonly\s+owner\s*:\s*string/, message: "Declare owner as a readonly parameter property of type string" },
    { pattern: /readonly\s+id\s*:\s*string/, message: "Declare id as a readonly parameter property of type string" },
  ],

  tests: [
    { name: "a new account starts with the given balance", run: (x) => expectEqual(new x.BankAccount("Ada", "ACC-1", 100).getBalance(), 100) },
    { name: "balance defaults to 0 when not provided", run: (x) => expectEqual(new x.BankAccount("Ada", "ACC-1").getBalance(), 0) },
    { name: "deposit(100) then withdraw(40) leaves 60", run: (x) => {
        const a = new x.BankAccount("Ada", "ACC-1");
        a.deposit(100);
        a.withdraw(40);
        expectEqual(a.getBalance(), 60);
      } },
    { name: "owner and id are exposed as properties", run: (x) => {
        const a = new x.BankAccount("Grace", "ACC-2");
        expectEqual(a.owner, "Grace");
        expectEqual(a.id, "ACC-2");
      } },
    { name: "withdrawing more than the balance throws", run: (x) => {
        const a = new x.BankAccount("Ada", "ACC-1", 50);
        expectThrows(() => a.withdraw(51));
      } },
    { name: "a failed withdrawal leaves the balance unchanged", run: (x) => {
        const a = new x.BankAccount("Ada", "ACC-1", 50);
        try { a.withdraw(51); } catch (e) {}
        expectEqual(a.getBalance(), 50);
      } },
  ],

  solution: `class BankAccount {
  constructor(
    public readonly owner: string,
    public readonly id: string,
    private balance: number = 0,
  ) {}

  deposit(amount: number): void {
    this.balance += amount;
  }

  withdraw(amount: number): void {
    if (amount > this.balance) {
      throw new Error("Insufficient funds");
    }
    this.balance -= amount;
  }

  getBalance(): number {
    return this.balance;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>TypeScript</th></tr>
  <tr><td>Declare + assign field</td><td>Primary ctor param + property, or ctor boilerplate</td><td>Parameter property: <code>constructor(private balance: number) {}</code></td></tr>
  <tr><td>Auto-property</td><td><code>public string Name { get; set; }</code></td><td>Plain public field: <code>name: string;</code></td></tr>
  <tr><td>Immutable member</td><td><code>{ get; }</code> / <code>init</code> / <code>readonly</code></td><td><code>readonly</code></td></tr>
  <tr><td>Default visibility</td><td><code>private</code></td><td><code>public</code></td></tr>
  <tr><td>Member access</td><td><code>_balance</code> (implicit this)</td><td><code>this.balance</code> (always explicit)</td></tr>
  <tr><td>Throwing</td><td><code>throw new InvalidOperationException("…")</code></td><td><code>throw new Error("…")</code></td></tr>
  <tr><td>Naming</td><td><code>Deposit</code>, <code>GetBalance</code></td><td><code>deposit</code>, <code>getBalance</code></td></tr>
</table>
<p>The exception hierarchy is much flatter on this side: where C# picks from
<code>ArgumentException</code>, <code>InvalidOperationException</code> and
friends, TypeScript code mostly throws <code>Error</code> (or a small custom
subclass) and puts the specifics in the message. And remember that
<code>private</code> and <code>readonly</code> are compiler-enforced, not
runtime-enforced — like the rest of the type system, they are erased in the
emitted JavaScript, which is fine: the compiler is where you wanted the error
anyway.</p>`,
};
