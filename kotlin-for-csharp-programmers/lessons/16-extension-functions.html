const LESSON = {
  number: 16,
  title: "Extension Functions",

  intro: `
<p>C# already has extension methods — <code>static</code> methods in a
<code>static</code> class, tagged with <code>this</code> on the first
parameter, that let you add a <code>Shout()</code> to <code>string</code>
without owning the class. Kotlin's <strong>extension functions</strong> do the
same job with less ceremony: no wrapper class, no <code>static</code>
boilerplate, just a top-level function.</p>
<p>An extension function is declared with a <em>receiver type</em> before the
name — <code>fun String.shout()</code> — and inside it, <code>this</code> is the
value it was called on. At the call site it reads exactly like a real method:
<code>"hello".shout()</code>. Nothing is actually added to the
<code>String</code> class; the compiler resolves the call statically to a plain
function, the same way C#'s extension methods do.</p>
<table>
  <tr><th>C#</th><th>Kotlin</th></tr>
  <tr><td><code>static string Shout(this string s) {...}</code></td><td><code>fun String.shout(): String {...}</code></td></tr>
  <tr><td><code>"hi".Shout()</code></td><td><code>"hi".shout()</code></td></tr>
  <tr><td><code>// no direct equivalent — properties can't be extended</code></td><td><code>val String.wordCount: Int get() = ...</code></td></tr>
</table>
<p>You can also define <strong>extension properties</strong> —
<code>val String.wordCount: Int</code> — which read like a field
(<code>"a b".wordCount</code>) but must be computed via a getter, since there is
nowhere to store a backing field on a type you don't own. C# has no equivalent:
extension methods exist, but extension properties don't, so you're stuck
writing <code>GetWordCount(s)</code> or a wrapper method instead.</p>`,

  csharp: `// C# extension methods live in a static class and use
// "this" on the first parameter:
public static class StringExtensions
{
    public static string Shout(this string s)
    {
        return s.ToUpper() + "!";
    }

    public static int WordCount(this string s)
    {
        return s.Trim() == "" ? 0 : s.Trim().Split(' ').Length;
    }
}

"hello".Shout();        // "HELLO!"
"a b c".WordCount();    // 3`,

  task: `
<p>Add some methods to types you don't own. All of these are top-level
declarations — no class needed:</p>
<ol>
  <li>Extension function <code>String.shout(): String</code> — returns the string
      uppercased with a <code>"!"</code> appended, e.g. <code>"hello".shout()</code>
      is <code>"HELLO!"</code>.</li>
  <li>Extension property <code>String.wordCount: Int</code> — the number of
      space-separated words; a blank string is <code>0</code>. (Use a getter.)</li>
  <li>Extension function <code>Int.double(): Int</code> — returns the receiver
      times two, e.g. <code>5.double()</code> is <code>10</code>.</li>
</ol>
<p>Inside each, refer to the value as <code>this</code> (often optional).</p>`,

  starter: `// 1. String.shout() -> uppercased + "!"
fun String.shout(): String = TODO()

// 2. String.wordCount -> number of space-separated words (blank -> 0)
val String.wordCount: Int
    get() = TODO()

// 3. Int.double() -> this * 2
fun Int.double(): Int = TODO()
`,

  requirements: [
    { pattern: /fun\s+String\s*\.\s*shout\s*\(/, message: "Define shout as an extension function on String: fun String.shout()" },
    { pattern: /val\s+String\s*\.\s*wordCount/, message: "Define wordCount as an extension property on String: val String.wordCount" },
    { pattern: /fun\s+Int\s*\.\s*double\s*\(/, message: "Define double as an extension function on Int: fun Int.double()" },
  ],

  tests: [
    { name: '"hello".shout() is "HELLO!"', code: '        expect_eq("hello".shout(), "HELLO!")' },
    { name: '"hi there".shout() is "HI THERE!"', code: '        expect_eq("hi there".shout(), "HI THERE!")' },
    { name: '"hello world".wordCount is 2', code: '        expect_eq("hello world".wordCount, 2)' },
    { name: '"one two three four".wordCount is 4', code: '        expect_eq("one two three four".wordCount, 4)' },
    { name: 'blank string wordCount is 0', code: '        expect_eq("".wordCount, 0)' },
    { name: '5.double() is 10', code: '        expect_eq(5.double(), 10)' },
    { name: '0.double() is 0', code: '        expect_true(0.double() == 0)' },
  ],

  solution: `fun String.shout(): String = this.uppercase() + "!"

val String.wordCount: Int
    get() = if (this.isBlank()) 0 else this.trim().split(" ").size

fun Int.double(): Int = this * 2
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Kotlin</th></tr>
  <tr><td>Add a "method"</td><td><code>static R F(this T x) {...}</code> in a static class</td><td><code>fun T.f() {...}</code> then <code>x.f()</code></td></tr>
  <tr><td>The receiver</td><td>first parameter, marked <code>this</code></td><td><code>this</code> (implicit)</td></tr>
  <tr><td>Add a "property"</td><td>not supported — write a method instead</td><td><code>val T.p: R get() = ...</code></td></tr>
  <tr><td>Dispatch</td><td>static (resolved by declared type)</td><td>static (resolved by declared type)</td></tr>
</table>
<p>Because extensions are resolved <em>statically</em> by the compile-time type
of the receiver, they are not virtual: an extension on <code>Base</code> is not
overridden by one on <code>Derived</code> when the static type is
<code>Base</code> — the same rule C# extension methods follow. They also can't
access <code>private</code> members of the receiver — they're just ordinary
functions with nicer call syntax. That restraint is the point: the standard
library is built almost entirely from extensions (<code>map</code>,
<code>filter</code>, <code>first</code>…), letting you grow types you don't own
without ever touching them, and without the wrapper-class boilerplate C#
requires.</p>`,
};
