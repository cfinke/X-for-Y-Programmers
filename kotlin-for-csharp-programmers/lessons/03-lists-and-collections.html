  intro: `
<p>In C# there is one <code>List&lt;T&gt;</code> type, and read-only exposure is
usually done through the <code>IReadOnlyList&lt;T&gt;</code> interface or
<code>IEnumerable&lt;T&gt;</code> at the API boundary. Kotlin splits the idea into
<em>two distinct types</em>: <code>List&lt;T&gt;</code> has no mutating methods at
all, while <code>MutableList&lt;T&gt;</code> adds <code>add</code>/<code>remove</code>. You
choose the capability by choosing the builder: <code>listOf(...)</code> gives a
read-only <code>List</code>, and <code>mutableListOf(...)</code> gives a
<code>MutableList</code>.</p>
<table>
  <tr><th>C#</th><th>Kotlin</th></tr>
  <tr><td><code>var xs = new List&lt;int&gt; { 1, 2, 3 };</code></td><td><code>val xs = listOf(1, 2, 3)</code></td></tr>
  <tr><td><code>var ys = new List&lt;int&gt;();</code></td><td><code>val ys = mutableListOf&lt;Int&gt;()</code></td></tr>
  <tr><td><code>ys.Add(4)</code></td><td><code>ys.add(4)</code></td></tr>
  <tr><td><code>xs[0]</code>, <code>xs.Count</code></td><td><code>xs[0]</code>, <code>xs.size</code></td></tr>
  <tr><td><code>xs.Contains(2)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td><code>xs.Select(x =&gt; x * 2)</code></td><td><code>xs.map { it * 2 }</code></td></tr>
</table>
<p>Notice indexing (<code>xs[0]</code>) is identical, but <code>.Count</code>
becomes <code>.size</code>, membership uses the <code>in</code> operator instead
of <code>.Contains</code>, and lambdas drop the parameter list when there is a
single argument — you refer to it as <code>it</code>. <code>first()</code> and
<code>last()</code> return the ends of a list, much like LINQ's
<code>First()</code>/<code>Last()</code>. Crucially, calling <code>.add()</code>
on a plain <code>List</code> is a <em>compile error</em>, not a runtime
<code>NotSupportedException</code> the way mutating a
<code>ReadOnlyCollection&lt;T&gt;</code> is in C# — the type system enforces
read-only up front.</p>`,

  csharp: `IReadOnlyList<int> firstThree = new List<int> { 1, 2, 3 };

List<int> nums = new List<int>();
nums.Add(1);
nums.Add(2);

List<int> Doubled(List<int> list) {
    return list.Select(x => x * 2).ToList();
}

List<int> Evens(List<int> list) {
    return list.Where(x => x % 2 == 0).ToList();
}`,

  solution: `fun firstThree(): List<Int> {
    return listOf(1, 2, 3)
}

fun collect(n: Int): MutableList<Int> {
    val result = mutableListOf<Int>()
    for (i in 1..n) {
        result.add(i)
    }
    return result
}

fun at(list: List<Int>, i: Int): Int {
    return list[i]
}

fun count(list: List<Int>): Int {
    return list.size
}

fun has(list: List<Int>, x: Int): Boolean {
    return x in list
}

fun ends(list: List<Int>): List<Int> {
    return listOf(list.first(), list.last())
}

fun doubled(list: List<Int>): List<Int> {
    return list.map { it * 2 }
}

fun evens(list: List<Int>): List<Int> {
    return list.filter { it % 2 == 0 }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Kotlin</th></tr>
  <tr><td>Read-only list</td><td><code>IReadOnlyList&lt;int&gt;</code></td><td><code>List&lt;Int&gt;</code></td></tr>
  <tr><td>Mutable list</td><td><code>List&lt;int&gt;</code></td><td><code>MutableList&lt;Int&gt;</code></td></tr>
  <tr><td>Build</td><td><code>new List&lt;int&gt; { 1, 2, 3 }</code></td><td><code>listOf(1, 2, 3)</code></td></tr>
  <tr><td>Append</td><td><code>xs.Add(4)</code></td><td><code>xs.add(4)</code></td></tr>
  <tr><td>Remove value</td><td><code>xs.Remove(4)</code></td><td><code>xs.remove(4)</code></td></tr>
  <tr><td>Length</td><td><code>xs.Count</code></td><td><code>xs.size</code></td></tr>
  <tr><td>Membership</td><td><code>xs.Contains(2)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td>Ends</td><td><code>xs.First()</code> / <code>xs.Last()</code></td><td><code>xs.first()</code> / <code>xs.last()</code></td></tr>
  <tr><td>Transform</td><td><code>xs.Select(x =&gt; x * 2)</code></td><td><code>xs.map { it * 2 }</code></td></tr>
  <tr><td>Keep some</td><td><code>xs.Where(x =&gt; ...)</code></td><td><code>xs.filter { ... }</code></td></tr>
</table>
<p>A <code>MutableList</code> <em>is a</em> <code>List</code>, so you can pass one
anywhere a read-only <code>List</code> is expected — the receiver just cannot
mutate it. That is why <code>collect</code> returns a
<code>MutableList</code> yet compares equal to a <code>listOf(...)</code>:
equality is by contents, unlike C#'s default reference equality for
<code>List&lt;T&gt;</code>. Both <code>map</code> and <code>filter</code> always
return a <em>new</em> read-only <code>List</code>, never mutating the source,
just like LINQ's <code>Select</code> and <code>Where</code> (though those return
lazy <code>IEnumerable&lt;T&gt;</code> sequences rather than eagerly built
lists). Reach for <code>listOf</code> by default and upgrade to
<code>mutableListOf</code> only when you genuinely need to grow or shrink the
collection in place.</p>`,
