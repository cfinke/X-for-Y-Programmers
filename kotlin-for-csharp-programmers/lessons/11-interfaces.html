const LESSON = {
  number: 11,
  title: "Interfaces",

  intro: `
<p>Kotlin interfaces use the same colon syntax you already know from C# —
<code>class Engineer : Employee</code> reads just like
<code>class Engineer : IEmployee</code> — and, like C#, conformance is
<strong>nominal</strong>: a class must explicitly declare that it implements the
interface, with no structural fallback. Where the two
diverge is in how freely interfaces can carry behaviour. C# interfaces only
gained default method bodies with C# 8's default interface implementations, and
most C# code still keeps interface properties purely abstract even where a
default body is technically legal; Kotlin has let you write a full method body
or a property getter directly in an interface since its very first release, and
it dispatches through the ordinary <code>override</code> mechanism — no
explicit interface cast required to reach it.</p>
<table>
  <tr><th>C#</th><th>Kotlin</th></tr>
  <tr><td><code>interface IShape { double Area(); }</code></td><td><code>interface Shape { fun area(): Double }</code></td></tr>
  <tr><td>nominal: <code>class C : IShape</code></td><td>nominal: <code>class C : Shape</code></td></tr>
  <tr><td>property in interface</td><td><code>val name: String</code> (abstract)</td></tr>
  <tr><td>method body needs C# 8 default interface members</td><td><code>fun f() = …</code> right in the interface, always</td></tr>
  <tr><td><code>class C : A, B</code></td><td><code>class C : A, B</code></td></tr>
</table>
<p>Because a Kotlin interface can hold behaviour, you can declare an abstract
<code>val</code>, a <code>val</code> with a default <code>get()</code>, and a
<code>fun</code> with a default body all in one place — then have each class
<code>override</code> only what it needs. And, as in C#, you should
<strong>program to the interface type</strong>: type your parameters and
variables as <code>Employee</code>, not <code>Engineer</code>.</p>`,

  csharp: `interface IEmployee {
    string Name { get; }
    double BaseSalary { get; }
    double Bonus();
    // Interfaces can carry default bodies since C# 8, but most C# code
    // still keeps interfaces abstract like this, so totalPay/summary
    // would have to live in a class or a helper method.
}

class Engineer : IEmployee {
    public string Name { get; }
    public double BaseSalary { get; }
    public Engineer(string name, double baseSalary) {
        Name = name;
        BaseSalary = baseSalary;
    }
    public double Bonus() => BaseSalary * 0.1;
}

double TotalPayroll(IEnumerable<IEmployee> staff) {
    return staff.Sum(e => e.BaseSalary + e.Bonus());
}`,

  task: `
<p>Build a small payroll model where the logic lives <em>in the interface</em>,
and the tests talk to everything through the interface type. No class or
<code>main</code> is needed — Kotlin allows top-level declarations.</p>
<ol>
  <li>Declare an <code>Employee</code> interface with two abstract properties
      <code>name: String</code> and <code>baseSalary: Double</code>, and an
      abstract method <code>fun bonus(): Double</code>.</li>
  <li>Give <code>Employee</code> a property <code>totalPay: Double</code> with a
      <strong>default getter</strong> returning
      <code>baseSalary + bonus()</code>, and a <strong>default method</strong>
      <code>fun summary(): String</code> returning
      <code>"$name earns $totalPay"</code>.</li>
  <li>Declare a second interface <code>Manager</code> with
      <code>fun teamSize(): Int</code>.</li>
  <li><code>class Engineer(name, baseSalary) : Employee</code> whose
      <code>bonus()</code> is 10% of <code>baseSalary</code>.</li>
  <li><code>class TeamLead(name, baseSalary, reports) : Employee, Manager</code>
      — <strong>implementing both interfaces</strong> — whose <code>bonus()</code>
      is <code>baseSalary * 0.2 + reports * 100.0</code> and whose
      <code>teamSize()</code> returns <code>reports</code>.</li>
  <li>Write <code>totalPayroll(staff: List&lt;Employee&gt;): Double</code> that
      sums <code>totalPay</code> across the list — programming to the interface.</li>
</ol>`,

  starter: `// 1 & 2. The Employee interface: abstract members, a default property getter,
//        and a default method. Fill in the two defaults.
interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = 0.0            // TODO: baseSalary + bonus()

    fun summary(): String = "" // TODO: "$name earns $totalPay"
}

// 3. A second interface.
interface Manager {
    fun teamSize(): Int
}

// 4. Engineer implements Employee.
class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = 0.0 // TODO: 10% of baseSalary
}

// 5. TeamLead implements BOTH Employee and Manager.
class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = 0.0 // TODO: baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = 0   // TODO: reports
}

// 6. Program to the interface type.
fun totalPayroll(staff: List<Employee>): Double = 0.0 // TODO
`,

  requirements: [
    { pattern: /interface\s+Employee\b/, message: "Declare an Employee interface" },
    { pattern: /fun\s+summary\s*\([^)]*\)\s*:\s*String\s*=/, message: "Give Employee a default summary() method with a body in the interface" },
    { pattern: /:\s*Employee\s*,\s*Manager/, message: "Have TeamLead implement both Employee and Manager" },
  ],

  tests: [
    { name: "Engineer.bonus() is 10% of base", code: "        expect_eq(Engineer(\"Ada\", 1000.0).bonus(), 100.0)" },
    { name: "totalPay via the Employee type uses the default getter", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.totalPay, 1100.0)" },
    { name: "default summary() reads \"Ada earns 1100.0\"", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.summary(), \"Ada earns 1100.0\")" },
    { name: "TeamLead satisfies Manager (teamSize)", code: "        val m: Manager = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(m.teamSize(), 3)" },
    { name: "TeamLead is also an Employee (totalPay)", code: "        val emp: Employee = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(emp.totalPay, 2700.0)" },
    { name: "totalPayroll sums via the interface", code: "        val staff: List<Employee> = listOf(Engineer(\"Ada\", 1000.0), TeamLead(\"Rob\", 2000.0, 3))\n        expect_eq(totalPayroll(staff), 3800.0)" },
  ],

  solution: `interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = baseSalary + bonus()

    fun summary(): String = "$name earns $totalPay"
}

interface Manager {
    fun teamSize(): Int
}

class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = baseSalary * 0.1
}

class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = reports
}

fun totalPayroll(staff: List<Employee>): Double = staff.sumOf { it.totalPay }
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Kotlin</th></tr>
  <tr><td>Declare interface</td><td><code>interface IE { … }</code></td><td><code>interface E { … }</code></td></tr>
  <tr><td>Implement</td><td><code>class C : IE</code></td><td><code>class C : E</code></td></tr>
  <tr><td>Multiple interfaces</td><td><code>: A, B</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Abstract property</td><td><code>string Name { get; }</code></td><td><code>val name: String</code></td></tr>
  <tr><td>Property with logic</td><td><code>T P => …;</code> (C# 8+)</td><td><code>val p: T get() = …</code></td></tr>
  <tr><td>Default method body</td><td><code>T F() => …;</code> (C# 8+)</td><td><code>fun f() = …</code> in the interface</td></tr>
  <tr><td>Override</td><td>not required for interface members</td><td><code>override</code> keyword required</td></tr>
</table>
<p>C# is already nominal — a class must say
<code>: IEmployee</code> to conform, so that part will feel completely natural.
What's new is how casually Kotlin lets an interface carry real behaviour: a
default <code>get()</code> or <code>fun</code> body sits right in the contract,
without the caveats around C# 8's default interface implementations, where the
default body is only reachable through a reference typed as the interface
rather than the concrete class, and diamond conflicts have to be resolved by
hand. Kotlin also requires the <code>override</code> keyword on every
implementing member, which catches typos C# would silently accept as a
brand-new, unrelated member on the class. And when a class implements two
interfaces that both define the same default method, Kotlin makes you resolve
it explicitly with <code>super&lt;A&gt;.f()</code>.</p>`,
};
