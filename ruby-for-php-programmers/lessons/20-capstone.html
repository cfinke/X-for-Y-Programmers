  intro: `
<p>No new syntax this time — just the toolkit you have built, applied to a tiny
inventory. You will combine a class with <code>attr_reader</code>, the
Enumerable methods (<code>sum</code>, <code>find</code>, <code>select</code>,
<code>map</code>), and blocks. Everything here appeared in earlier lessons; the
goal is to reach for the idiomatic method instead of a loop.</p>
<p>One gotcha deserves your full attention, because it is exactly where PHP
habits bite. In PHP an array is a <em>value</em>: assign it or pass it to a
function and you get a copy, so mutating it leaves the caller's array
untouched. Ruby arrays and objects are <em>references</em>, like PHP objects
but now for arrays too. If you push into or mutate the array you were handed,
the caller sees the change. So the restock step must build and return a
<strong>new</strong> array containing a <strong>new</strong> <code>Item</code>
for the match — never mutate the original.</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td>array passed by value (copied)</td><td>array passed by reference</td></tr>
  <tr><td><code>array_sum(array_map(...))</code></td><td><code>items.sum { |i| ... }</code></td></tr>
  <tr><td><code>foreach</code> + early <code>return</code></td><td><code>items.find { |i| ... }</code> (nil on miss)</td></tr>
  <tr><td><code>array_map</code> to rebuild</td><td><code>items.map { |i| ... }</code></td></tr>
  <tr><td><code>array_values(array_filter(...))</code></td><td><code>items.select { }.map(&amp;:name)</code></td></tr>
</table>
<p>Because Ruby won't copy the array for you, immutability is a choice you make
by <em>building new values</em> rather than editing in place. <code>map</code>,
<code>select</code>, and friends already return fresh arrays — lean on them and
you get PHP's old value-semantics safety back, on purpose.</p>`,

  php: `<?php
final class Item {
    public function __construct(
        public readonly string $name,
        public readonly int $priceCents,
        public readonly int $count,
    ) {}
}

function totalValue(array $items): int {
    return array_sum(array_map(fn($i) => $i->priceCents * $i->count, $items));
}

function findItem(array $items, string $name): ?Item {
    foreach ($items as $i) {
        if ($i->name === $name) return $i;
    }
    return null;
}

function restock(array $items, string $name, int $amount): array {
    return array_map(
        fn($i) => $i->name === $name
            ? new Item($i->name, $i->priceCents, $i->count + $amount)
            : $i,
        $items
    );
}`,

  solution: `class Item
  attr_reader :name, :price_cents, :count

  def initialize(name, price_cents, count)
    @name = name
    @price_cents = price_cents
    @count = count
  end
end

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }
end

def restock(items, name, amount)
  items.map do |i|
    if i.name == name
      Item.new(i.name, i.price_cents, i.count + amount)
    else
      i
    end
  end
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map(&:name)
end
`,

  notes: `
<table>
  <tr><th>Task</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>Value object</td><td>promoted-ctor class</td><td><code>attr_reader</code> + <code>initialize</code></td></tr>
  <tr><td>Total</td><td><code>array_sum(array_map(...))</code></td><td><code>items.sum { }</code></td></tr>
  <tr><td>Lookup</td><td><code>foreach</code> + <code>return</code></td><td><code>items.find { }</code></td></tr>
  <tr><td>Rebuild</td><td><code>array_map(...)</code></td><td><code>items.map { }</code></td></tr>
  <tr><td>Filter + project</td><td><code>array_filter</code> + <code>array_map</code></td><td><code>select { }.map(&amp;:name)</code></td></tr>
  <tr><td>Array copy</td><td>free (value semantics)</td><td>build a new one on purpose</td></tr>
</table>
<p>The one idea to carry out of the whole course: Ruby hands you references, so
"leave the input alone" is a discipline you enforce by <em>producing new
values</em>. The Enumerable methods make that easy — <code>map</code> and
<code>select</code> never touch the source array, they return a fresh one — so
idiomatic Ruby is functional almost by accident. Reach for those over
<code>each</code>-and-mutate and you get the safety of PHP's copy-on-assign
without the copies, plus code that reads as a description of the result rather
than a recipe for building it.</p>`,
