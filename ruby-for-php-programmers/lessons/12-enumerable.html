  title: "Enumerable: map, select & Friends",

  intro: `
<p>PHP's collection functions are a bag of loose <code>array_*</code> verbs, and
their argument order is famously inconsistent: <code>array_map($fn, $arr)</code>
takes the callback <em>first</em>, while <code>array_filter($arr, $fn)</code>
takes it <em>last</em>. You memorize the coin-flip. Worse, <code>array_filter</code>
preserves the original keys, so a filtered list comes back with holes —
<code>[0 =&gt; 'a', 2 =&gt; 'c']</code> — and you reach for
<code>array_values()</code> to reindex before anything downstream behaves.</p>
<p>Ruby folds all of this into one module, <code>Enumerable</code>, that every
collection includes. The verbs are <em>methods on the array</em>, so there is no
argument order to remember — the receiver is always the collection and the block
is always the transform. <code>map</code> transforms, <code>select</code> keeps,
<code>reject</code> drops, and every one of them returns a fresh, densely-indexed
array. No holes, no <code>array_values</code>, ever. Because each returns an
array, they <em>chain</em>: <code>select</code> then <code>map</code> reads
left-to-right like a pipeline.</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td><code>array_map($fn, $arr)</code> (callback first)</td><td><code>arr.map { |x| ... }</code></td></tr>
  <tr><td><code>array_filter($arr, $fn)</code> (callback last)</td><td><code>arr.select { |x| ... }</code></td></tr>
  <tr><td><code>array_values(array_filter(...))</code> to reindex</td><td>never needed — no holes</td></tr>
  <tr><td><code>array_sum($arr)</code></td><td><code>arr.sum</code> (or <code>arr.sum { |x| ... }</code>)</td></tr>
  <tr><td><code>usort($a, fn($x,$y) =&gt; $x &lt;=&gt; $y)</code></td><td><code>a.sort_by { |x| ... }</code></td></tr>
  <tr><td>manual min-tracking loop</td><td><code>a.min_by { |x| ... }</code></td></tr>
</table>
<p>That last pair is the biggest relief. To find the cheapest item in PHP you
either <code>usort</code> the whole array with a spaceship comparator and grab
<code>[0]</code>, or you write a running-minimum <code>foreach</code>. Ruby gives
you <code>min_by</code> and <code>max_by</code> that take a key block and hand
back the winning <em>element</em> directly.</p>`,

  php: `$products = [
    ['name' => 'Desk',  'price_cents' => 24900, 'in_stock' => true],
    ['name' => 'Lamp',  'price_cents' => 4500,  'in_stock' => false],
    ['name' => 'Chair', 'price_cents' => 8900,  'in_stock' => true],
];

// filter takes the array FIRST, callback SECOND — and keeps original keys,
// so you reindex with array_values before mapping:
$in_stock = array_values(array_filter($products, fn($p) => $p['in_stock']));
$names = array_map(fn($p) => $p['name'], $in_stock);

// summing a derived field means map-then-sum:
$total = array_sum(array_map(fn($p) => $p['price_cents'], $products));

// cheapest: sort with a spaceship comparator, then grab [0]:
usort($products, fn($a, $b) => $a['price_cents'] <=> $b['price_cents']);
$cheapest = $products[0]['name'];

echo "$cheapest is cheapest; stock total is $total cents\n";`,

  task: `
<p>The products are symbol-keyed hashes:
<code>{ name: "Desk", price_cents: 24900, in_stock: true }</code>. Reach for
Enumerable instead of the <code>array_*</code> toolbox:</p>
<ol>
  <li><code>in_stock_names(products)</code> — chain <code>select</code> (keep the
      ones whose <code>:in_stock</code> is true) into <code>map</code> (pull each
      <code>:name</code>). No <code>array_values</code> reindexing needed.</li>
  <li><code>total_value(products)</code> — use the block form of <code>sum</code>:
      <code>products.sum { |p| p[:price_cents] }</code>. One call, no
      map-then-sum.</li>
  <li><code>cheapest_name(products)</code> — use <code>min_by</code> with a key
      block on <code>:price_cents</code>, then read <code>[:name]</code> off the
      winning element.</li>
</ol>`,

  starter: `# 1. in_stock_names: select the in-stock products, then map to their names.

`,

  requirements: [
    { pattern: /\.select/, message: "Keep the in-stock products with .select" },
    { pattern: /\.map/, message: "Transform to names with .map" },
    { pattern: /\.sum/, message: "Add up the prices with .sum" },
    { pattern: /min_by|sort_by/, message: "Find the cheapest with min_by (or sort_by)" },
  ],

  tests: [
    { name: 'in_stock_names keeps only in-stock, maps to names',
      code: '  products = [{name: "Desk", price_cents: 24900, in_stock: true}, {name: "Lamp", price_cents: 4500, in_stock: false}, {name: "Chair", price_cents: 8900, in_stock: true}]\n  expect_eq(in_stock_names(products), ["Desk", "Chair"])' },
    { name: 'in_stock_names on an all-out-of-stock list is empty',
      code: '  products = [{name: "Lamp", price_cents: 4500, in_stock: false}]\n  expect_eq(in_stock_names(products), [])' },
    { name: 'total_value sums every price_cents',
      code: '  products = [{name: "Desk", price_cents: 24900, in_stock: true}, {name: "Lamp", price_cents: 4500, in_stock: false}, {name: "Chair", price_cents: 8900, in_stock: true}]\n  expect_eq(total_value(products), 38300)' },
    { name: 'cheapest_name returns the lowest-priced product name',
      code: '  products = [{name: "Desk", price_cents: 24900, in_stock: true}, {name: "Lamp", price_cents: 4500, in_stock: false}, {name: "Chair", price_cents: 8900, in_stock: true}]\n  expect_eq(cheapest_name(products), "Lamp")' },
    { name: 'cheapest_name with a single product returns that name',
      code: '  products = [{name: "Chair", price_cents: 8900, in_stock: true}]\n  expect_eq(cheapest_name(products), "Chair")' },
  ],

  solution: `def in_stock_names(products)
  products.select { |p| p[:in_stock] }.map { |p| p[:name] }
end

def total_value(products)
  products.sum { |p| p[:price_cents] }
end

def cheapest_name(products)
  products.min_by { |p| p[:price_cents] }[:name]
end
`,

  notes: `
<table>
  <tr><th>Task</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>Transform each</td><td><code>array_map($fn, $a)</code></td><td><code>a.map { |x| ... }</code></td></tr>
  <tr><td>Keep matching</td><td><code>array_filter($a, $fn)</code></td><td><code>a.select { |x| ... }</code></td></tr>
  <tr><td>Drop matching</td><td><code>array_filter($a, fn negated)</code></td><td><code>a.reject { |x| ... }</code></td></tr>
  <tr><td>Reindex after filter</td><td><code>array_values(...)</code></td><td>unnecessary — results are dense</td></tr>
  <tr><td>Sum</td><td><code>array_sum(array_map(...))</code></td><td><code>a.sum { |x| ... }</code></td></tr>
  <tr><td>Smallest by key</td><td><code>usort</code> + <code>[0]</code></td><td><code>a.min_by { |x| ... }</code></td></tr>
  <tr><td>Largest by key</td><td><code>usort</code> + <code>end</code></td><td><code>a.max_by { |x| ... }</code></td></tr>
  <tr><td>Sort by key</td><td><code>usort($a, spaceship)</code></td><td><code>a.sort_by { |x| ... }</code></td></tr>
</table>
<p>The mental shift is from <em>"which function, and in what argument order"</em>
to <em>"what message does this collection understand."</em> Because every
Enumerable method returns a new collection (not a mutated one) and never
introduces key holes, you compose them into pipelines with a dot —
<code>products.select { ... }.map { ... }.sum</code> — the same way you would
chain a fluent query builder, but built into the language for every array, hash,
range, and set.</p>`,
};
