  number: 4,
  title: "Hashes & Symbols",

  intro: `
<p>Last lesson split PHP's array into its list half, <code>Array</code>. This
is the other half: the dictionary. In PHP you write
<code>['apples' =&gt; 3]</code>; in Ruby that becomes a <code>Hash</code>. The
literal even keeps the fat arrow — <code>{ "apples" =&gt; 3 }</code> is legal
Ruby — but you'll almost never write it that way, because Ruby has a better
key type for the job: the <strong>symbol</strong>.</p>
<p>A symbol is an interned, immutable identifier written with a leading colon:
<code>:apples</code>. Think of it as a name that is guaranteed to be the same
object everywhere it appears — cheaper to compare than a string and impossible
to accidentally mutate. Symbol keys are so common that Ruby gives them a
shorthand that looks just like a PHP array with the arrow flipped into a
colon: <code>{ apples: 3 }</code> is <code>{ :apples =&gt; 3 }</code>. The
colon moved to the other side of the word, and that is the single biggest
visual difference from PHP.</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td><code>['apples' =&gt; 3]</code></td><td><code>{ apples: 3 }</code> (symbol keys)</td></tr>
  <tr><td><code>$m[$k]</code></td><td><code>h[k]</code></td></tr>
  <tr><td><code>$m[$k] ?? 0</code></td><td><code>h.fetch(k, 0)</code></td></tr>
  <tr><td><code>foreach ($m as $k =&gt; $v)</code></td><td><code>h.each { |k, v| ... }</code></td></tr>
  <tr><td><code>array_keys($m)</code></td><td><code>h.keys</code></td></tr>
  <tr><td><code>isset($m[$k])</code></td><td><code>h.key?(k)</code></td></tr>
</table>
<p>One gotcha bites every PHP developer at least once: a symbol key and a
string key are <em>different keys</em>. <code>h[:name]</code> and
<code>h["name"]</code> reach into two different slots. PHP array keys are
always strings or ints, so this distinction is new — when a lookup mysteriously
returns <code>nil</code>, check whether you used <code>:name</code> where the
hash was built with <code>"name"</code>.</p>`,

  php: `<?php
$inventory = ['apples' => 3, 'bananas' => 5];

$apples = $inventory['apples'];           // 3
$cherries = $inventory['cherries'] ?? 0;  // 0 — null-coalesce for a default

foreach ($inventory as $name => $count) {
    echo "$name: $count\n";
}

$names = array_keys($inventory);          // ['apples', 'bananas']

// Add stock and hand back a modified COPY (PHP arrays are values).
function add_stock(array $inv, string $name, int $n): array {
    $inv[$name] = ($inv[$name] ?? 0) + $n;
    return $inv;
}`,

  task: `
<p>Rebuild the inventory toolkit as Ruby hashes with symbol keys:</p>
<ol>
  <li><code>build_inventory</code> — return the literal hash
      <code>{ apples: 3, bananas: 5 }</code> with symbol keys and let it be the
      last expression (no <code>return</code> needed).</li>
  <li><code>get_count(inv, name)</code> — <code>$m[$k] ?? 0</code> becomes
      <code>inv.fetch(name, 0)</code>: look up <code>name</code>, or fall back
      to <code>0</code> when the key is missing.</li>
  <li><code>add_stock(inv, name, n)</code> — return a <em>new</em> hash with
      <code>n</code> added to the current count:
      <code>inv.merge(name =&gt; inv.fetch(name, 0) + n)</code>.

  <li><code>item_names(inv)</code> — <code>array_keys($inv)</code> becomes
      <code>inv.keys</code>.</li>
  <li><code>apple_count(inv)</code> — reach the apples slot directly with
      <code>inv[:apples]</code>. Note the leading colon: this is a symbol
      lookup, not a string one.</li>
</ol>`,

`,

  requirements: [
    { pattern: /fetch\s*\(/, message: "Use fetch(name, 0) for a default instead of ?? 0" },
    { pattern: /merge/, message: "Build the updated hash with merge (non-mutating)" },
    { pattern: /:\w+/, message: "Use a symbol literal such as :apples" },

  ],

  tests: [
    { name: "build_inventory returns { apples: 3, bananas: 5 }",
      code: "  expect_eq(build_inventory, { apples: 3, bananas: 5 })" },
    { name: "get_count reads an existing symbol key",
      code: "  expect_eq(get_count(build_inventory, :bananas), 5)" },
    { name: "get_count falls back to 0 for a missing key",
      code: "  expect_eq(get_count(build_inventory, :cherries), 0)" },
    { name: "a string key is NOT the symbol key (h[:name] != h[\"name\"])",
      code: "  expect_eq(get_count(build_inventory, \"apples\"), 0)" },
    { name: "add_stock returns an updated hash without mutating the original",
      code: "  inv = build_inventory\n  expect_eq(add_stock(inv, :apples, 2), { apples: 5, bananas: 5 })\n  expect_eq(inv, { apples: 3, bananas: 5 })" },
    { name: "item_names lists the keys and apple_count reads :apples",
      code: "  inv = build_inventory\n  expect_eq(item_names(inv), [:apples, :bananas])\n  expect_eq(apple_count(inv), 3)" },
  ],

  solution: `def build_inventory
  { apples: 3, bananas: 5 }
end

def get_count(inv, name)
  inv.fetch(name, 0)
end

def add_stock(inv, name, n)
  inv.merge(name => inv.fetch(name, 0) + n)
end

def item_names(inv)
  inv.keys
end

def apple_count(inv)
  inv[:apples]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>Literal</td><td><code>['apples' =&gt; 3]</code></td><td><code>{ apples: 3 }</code> (symbol keys)</td></tr>
  <tr><td>String-keyed literal</td><td><code>['x' =&gt; 1]</code></td><td><code>{ "x" =&gt; 1 }</code> (fat arrow survives)</td></tr>
  <tr><td>Read</td><td><code>$m[$k]</code></td><td><code>h[k]</code> (missing key → <code>nil</code>)</td></tr>
  <tr><td>Read with default</td><td><code>$m[$k] ?? 0</code></td><td><code>h.fetch(k, 0)</code></td></tr>
  <tr><td>Iterate</td><td><code>foreach ($m as $k =&gt; $v)</code></td><td><code>h.each { |k, v| ... }</code></td></tr>
  <tr><td>Keys / values</td><td><code>array_keys</code> / <code>array_values</code></td><td><code>h.keys</code> / <code>h.values</code></td></tr>
  <tr><td>Has key?</td><td><code>isset($m[$k])</code></td><td><code>h.key?(k)</code></td></tr>
  <tr><td>Non-mutating add</td><td>—</td><td><code>h.merge(k =&gt; v)</code></td></tr>
</table>
<p>A symbol is not a tiny string — it is an interned name, and
<code>:apples.object_id</code> is the same everywhere the symbol appears. That
is why symbols are the idiomatic choice for fixed, code-defined keys (option
names, hash keys, statuses) while strings stay for text that comes from users
or files. When a hash returns <code>nil</code> unexpectedly, your first
suspicion should be <code>:name</code> versus <code>"name"</code> — they never
collide. Prefer <code>fetch</code> over <code>[]</code> when a missing key is a
bug: <code>h.fetch(:x)</code> raises a clear <code>KeyError</code> instead of
silently handing you <code>nil</code>.</p>`,
};
