<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Ruby is PHP's tidier sibling: the same dynamic-language soul, minus the
punctuation. The <code>$</code> sigil is gone — a variable is just a bare
<code>name</code>, and it exists the moment you assign to it. Semicolons are
gone too. And PHP's optional type declarations (<code>string $name</code>,
<code>: int</code>) simply don't exist: the type lives in the value itself,
and you ask the value at runtime — <code>x.class</code>,
<code>x.is_a?(String)</code>.</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td><code>$name = "Ada";</code></td><td><code>name = "Ada"</code></td></tr>
  <tr><td><code>$age = 36;</code></td><td><code>age = 36</code></td></tr>
  <tr><td><code>int</code> / <code>float</code> (with <code>PHP_INT_MAX</code>)</td><td><code>Integer</code> (arbitrary precision!) and <code>Float</code></td></tr>
  <tr><td><code>"$name is $age"</code></td><td><code>"#{name} is #{age}"</code></td></tr>
  <tr><td><code>is_string($x)</code></td><td><code>x.is_a?(String)</code></td></tr>
</table>
<p>Two upgrades worth noticing immediately. PHP's <code>int</code> silently
overflows into a float past <code>PHP_INT_MAX</code>; Ruby's
<code>Integer</code> is arbitrary precision, so <code>2 ** 100</code> is just
a (very long) integer. And the habit to build first: a method's
<strong>last expression is its return value</strong>. Where a PHP function
without <code>return</code> hands back <code>null</code>, a Ruby method hands
back the last thing it evaluated — idiomatic Ruby almost never writes
<code>return</code>.</p>`,

  php: `<?php
$name = "Ada";
$age = 36;

// Optional declarations exist in PHP 8 — none of this exists in Ruby:
// function describe_user(string $name, int $age): string { ... }

function describe_user($name, $age) {
    return "$name is $age years old";   // no return? PHP gives you null
}

function birthday($age) {
    $next_age = $age;
    $next_age += 1;
    return $next_age;
}

echo describe_user($name, $age);
echo birthday($age);`,

  task: `
<p>Rewrite the PHP on the left as Ruby:</p>
<ol>
  <li>Write a method <code>describe_user(name, age)</code> that produces
      <code>"Ada is 36 years old"</code>-style text. Interpolation keeps the
      braces-required form but swaps <code>$</code> for <code>#</code>:
      <code>"#{name} is #{age} years old"</code>. Drop the sigils, drop the
      semicolons, and make the interpolated string the method's
      <em>last expression</em> — no <code>return</code> keyword anywhere in
      your solution.</li>
  <li>Write a method <code>birthday(age)</code> that copies <code>age</code>
      into a local variable, bumps it with <code>+=</code>, and lets the
      bumped value be the last expression.</li>
</ol>
<p>Conventions carry over nicely: <code>snake_case</code> method names, but
<code>def ... end</code> instead of braces.</p>`,

  starter: `# 1. describe_user: PHP's "$name is $age years old" becomes
#    "#{name} is #{age} years old" — same idea, braces required, # not $.
#    The last expression of the method is what the caller gets.
def describe_user(name, age)
  raise NotImplementedError, "TODO: implement describe_user"
end

# 2. birthday: copy age into a local, bump it with +=, and let the
#    bumped value be the last expression.
def birthday(age)
  raise NotImplementedError, "TODO: implement birthday"
end
`,

  requirements: [
    { pattern: /def\s+describe_user\s*\(\s*name\s*,\s*age\s*\)/, message: "Define describe_user(name, age) with def" },
    { pattern: /#\{\s*name\s*\}/, message: "Build the string with #{} interpolation" },
    { pattern: /^(?:(?!\breturn\b)[\s\S])*$/, message: "No return keyword — the last expression is the return value" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: '  expect_eq(describe_user("Ada", 36), "Ada is 36 years old")' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: '  expect_eq(describe_user("Grace", 52), "Grace is 52 years old")' },
    { name: "birthday(36) returns 37",
      code: "  expect_eq(birthday(36), 37)" },
    { name: "birthday(0) returns 1",
      code: "  expect_eq(birthday(0), 1)" },
  ],

  solution: `def describe_user(name, age)
  "#{name} is #{age} years old"
end

def birthday(age)
  next_age = age
  next_age += 1
  next_age
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>Variable</td><td><code>$x = 1;</code></td><td><code>x = 1</code> (no sigil, no semicolon)</td></tr>
  <tr><td>Constant</td><td><code>const X = 1;</code> / <code>define()</code></td><td><code>X = 1</code> (capitalized; reassignment only warns)</td></tr>
  <tr><td>Numbers</td><td><code>int</code> overflows to <code>float</code> past <code>PHP_INT_MAX</code></td><td><code>Integer</code> is arbitrary precision; <code>Float</code> for decimals</td></tr>
  <tr><td>Interpolation</td><td><code>"$name!"</code> (braces optional)</td><td><code>"#{name}!"</code> (braces required, # not $)</td></tr>
  <tr><td>Type check</td><td><code>is_string($x)</code>, <code>gettype($x)</code></td><td><code>x.is_a?(String)</code>, <code>x.class</code></td></tr>
  <tr><td>Return</td><td><code>return</code> required (else <code>null</code>)</td><td>last expression; <code>return</code> only for early exit</td></tr>
</table>
<p>The deepest shift is the last row: in PHP, forgetting <code>return</code>
is a bug that quietly hands back <code>null</code>. In Ruby, everything is an
expression and a method evaluates to its last one, so <code>return</code>
disappears from everyday code. Meanwhile <code>2 ** 100</code> just works —
there is no <code>PHP_INT_MAX</code> cliff to fall off, and no GMP extension
to reach for.</p>`,
};
