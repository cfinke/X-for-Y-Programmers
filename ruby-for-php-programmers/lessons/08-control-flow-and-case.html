const LESSON = {
  number: 8,
  title: "Control Flow & case",

  intro: `
<p>The basics map almost one-to-one: <code>if (cond) { ... }</code> becomes
<code>if cond ... end</code> — drop the parentheses, drop the braces, close with
<code>end</code>. The one spelling to memorize is <code>elseif</code> →
<code>elsif</code> (no second "e"). Ruby then adds two conveniences PHP never
had. A <strong>modifier</strong> form lets you put the condition after the
statement — <code>return x if cond</code>, which reads like English and is the
idiomatic way to write a guard clause. And <code>unless cond</code> is a plain
<code>if !cond</code> for when the negative reads better.</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td><code>if (c) { }</code></td><td><code>if c ... end</code></td></tr>
  <tr><td><code>elseif</code></td><td><code>elsif</code></td></tr>
  <tr><td><code>if (!c) { return; }</code></td><td><code>return unless c</code></td></tr>
  <tr><td><code>if ($x) return $y;</code></td><td><code>return y if x</code> (modifier)</td></tr>
  <tr><td><code>switch</code> (loose <code>==</code>, fallthrough)</td><td><code>case</code> (strict, no fallthrough)</td></tr>
</table>
<p>The bigger change is <code>switch</code> → <code>case</code>. PHP's
<code>switch</code> compares with loose <code>==</code> and <em>falls through</em>
unless you write <code>break</code> — the source of a thousand bugs. Ruby's
<code>case</code> fixes both: each <code>when</code> is self-contained (no
<code>break</code>, no fallthrough), and matching uses the <code>===</code>
"case equality" operator, which is smarter than an equals check. That last part
is the payoff: a <code>when</code> arm can be a <strong>range</strong>. Write
<code>when 90..</code> and it matches any score of 90 or more — no
<code>if</code>/<code>elsif</code> ladder and none of the old
<code>case true; when $x &gt; 90</code> hack. You can also group several values
in one arm (<code>when "sat", "sun"</code>), and the whole <code>case</code> is
an expression, so it evaluates to a value you can return directly.</p>`,

  php: `<?php
function grade(int $score): string {
    if ($score >= 90) {
        return "A";
    } elseif ($score >= 80) {
        return "B";
    } elseif ($score >= 70) {
        return "C";
    } else {
        return "F";
    }
}

function day_type(string $day): string {
    switch ($day) {
        case "sat":
        case "sun":
            return "weekend";   // fallthrough groups the two cases
        default:
            return "weekday";
    }
}`,

  task: `
<p>Rewrite three PHP branch-fests the Ruby way:</p>
<ol>
  <li><code>grade(score)</code> — a <code>case score</code> with
      <strong>range arms</strong>: <code>when 90..</code> for "A",
      <code>when 80..89</code> for "B", <code>when 70..79</code> for "C", and
      <code>else "F"</code>. Let the <code>case</code> be the method's value —
      no <code>return</code> needed.</li>
  <li><code>day_type(day)</code> — a <code>case day</code> that
      <strong>groups</strong> the weekend in one arm:
      <code>when "sat", "sun" then "weekend"</code>, else <code>"weekday"</code>.</li>
  <li><code>describe_number(n)</code> — start with a modifier-<code>if</code>
      guard: <code>return "zero" if n == 0</code>. Then an
      <code>if</code>/<code>else</code> expression returning <code>"positive"</code>
      when <code>n &gt; 0</code>, otherwise <code>"negative"</code>.</li>
</ol>`,

  starter: `# 1. grade: case score with range arms (90.., 80..89, 70..79, else).
def grade(score)
  raise NotImplementedError, "TODO: implement grade"
end

# 2. day_type: case day, grouping "sat", "sun" into one when.
def day_type(day)
  raise NotImplementedError, "TODO: implement day_type"
end

# 3. describe_number: modifier-if guard for zero, then if/else.
def describe_number(n)
  raise NotImplementedError, "TODO: implement describe_number"
end
`,

  requirements: [
    { pattern: /case\b/, message: "Use a case expression" },
    { pattern: /when\s+/, message: "Use when arms inside the case" },
    { pattern: /if\s+\w|unless/, message: "Use a modifier if (or unless) somewhere" },
  ],

  tests: [
    { name: "grade(95) is \"A\" (range arm 90..)",
      code: "  expect_eq(grade(95), \"A\")" },
    { name: "grade(83) is \"B\"",
      code: "  expect_eq(grade(83), \"B\")" },
    { name: "grade(72) is \"C\"",
      code: "  expect_eq(grade(72), \"C\")" },
    { name: "grade(40) is \"F\"",
      code: "  expect_eq(grade(40), \"F\")" },
    { name: "day_type groups the weekend",
      code: "  expect_eq(day_type(\"sat\"), \"weekend\")\n  expect_eq(day_type(\"sun\"), \"weekend\")\n  expect_eq(day_type(\"wed\"), \"weekday\")" },
    { name: "describe_number covers zero, positive, and negative",
      code: "  expect_eq(describe_number(0), \"zero\")\n  expect_eq(describe_number(7), \"positive\")\n  expect_eq(describe_number(-1), \"negative\")" },
  ],

  solution: `def grade(score)
  case score
  when 90.. then "A"
  when 80..89 then "B"
  when 70..79 then "C"
  else "F"
  end
end

def day_type(day)
  case day
  when "sat", "sun" then "weekend"
  else "weekday"
  end
end

def describe_number(n)
  return "zero" if n == 0
  if n > 0
    "positive"
  else
    "negative"
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>If</td><td><code>if (c) { }</code></td><td><code>if c ... end</code></td></tr>
  <tr><td>Else-if</td><td><code>elseif</code></td><td><code>elsif</code></td></tr>
  <tr><td>Guard clause</td><td><code>if (!c) return;</code></td><td><code>return unless c</code></td></tr>
  <tr><td>Modifier</td><td>—</td><td><code>do_thing if ready?</code></td></tr>
  <tr><td>Multi-way</td><td><code>switch</code> (loose, fallthrough)</td><td><code>case</code> (strict <code>===</code>, no fallthrough)</td></tr>
  <tr><td>Range arm</td><td>—</td><td><code>when 90..</code>, <code>when 1..9</code></td></tr>
  <tr><td>Grouped arm</td><td><code>case "a": case "b":</code></td><td><code>when "a", "b"</code></td></tr>
</table>
<p>The old PHP trick of <code>switch (true) { case $x &gt; 90: ... }</code> is
retired — a <code>case</code> with range and grouped arms covers what you used
it for, and reads far better. Remember two things: <code>case</code> uses
<code>===</code>, so a <code>Range</code>, a <code>Class</code>, or a
<code>Regexp</code> on the left of a <code>when</code> "matches" in the way you
would expect (<code>when Integer</code> tests <em>is-a</em>,
<code>when /^a/</code> tests match), and both <code>if</code> and
<code>case</code> are expressions whose value you can assign or return
implicitly.</p>`,
};
