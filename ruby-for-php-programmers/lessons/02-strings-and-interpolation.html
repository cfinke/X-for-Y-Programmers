  title: "Strings & Interpolation",

  intro: `
<p>Ruby strings will feel familiar the moment you squint: double quotes
interpolate, single quotes are literal — exactly like PHP. The syntax just
tightens up: PHP's <code>"$name is $age"</code> becomes
<code>"#{name} is #{age}"</code>. The braces aren't optional flair as in
PHP's <code>{$user}</code> form — they're required, and the marker is
<code>#</code>, not <code>$</code>. Any expression fits inside:
<code>"#{2 + 2}"</code>.</p>
<p>Watch out for one operator, though: <code>.</code> no longer concatenates
— in Ruby the dot <em>calls a method</em>. Concatenate with <code>+</code>
or, better, just interpolate. And that dot is the real story of this lesson:
the entire <code>str_*</code> function zoo becomes methods on the string
itself. Instead of passing a string <em>into</em> a function, you send a
message <em>to</em> the string.</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td><code>"$name is $age"</code></td><td><code>"#{name} is #{age}"</code></td></tr>
  <tr><td><code>'literal $name'</code></td><td><code>'literal #{name}'</code> (single quotes literal in both!)</td></tr>
  <tr><td><code>"Hello, " . $name</code></td><td><code>"Hello, " + name</code> (dot means method call now!)</td></tr>
  <tr><td><code>strtoupper($s)</code></td><td><code>s.upcase</code></td></tr>
  <tr><td><code>str_contains($h, $n)</code></td><td><code>h.include?(n)</code></td></tr>
  <tr><td><code>strlen($s)</code></td><td><code>s.length</code></td></tr>
  <tr><td><code>implode(", ", $arr)</code></td><td><code>arr.join(", ")</code></td></tr>
</table>
<p>Notice two idioms in that table. Predicates — methods that answer yes/no —
end in <code>?</code> by convention: <code>include?</code>, and later
<code>empty?</code>, <code>even?</code>. And look at <code>implode</code>:
the receiver flips. PHP hands the glue and the array to a function; Ruby asks
the <em>collection</em> to join itself with some glue.</p>`,

  php: `<?php
$name = "Ada";

echo "Hello, $name!";      // double quotes interpolate
echo 'Hello, $name!';      // single quotes: literal, same as Ruby

$loud = strtoupper("hello");                    // "HELLO"
$found = str_contains("Ruby for PHP", "PHP");   // true
$len = strlen("hello");                         // 5
$csv = implode(", ", ["a", "b", "c"]);          // "a, b, c"

function greet($name) {
    return "Hello, " . $name . "!";   // or just "Hello, $name!"
}

echo greet($name);`,

  task: `
<p>Rewrite the PHP string toolkit as methods on the values themselves:</p>
<ol>
  <li><code>shout(s)</code> — <code>strtoupper($s)</code> becomes a message to
      the string: <code>s.upcase</code>.</li>
  <li><code>greet(name)</code> — build <code>"Hello, Ada!"</code> with
      <code>#{}</code> interpolation, not the <code>.</code> operator (which
      would try to call a method!).</li>
  <li><code>contains_word?(haystack, needle)</code> — PHP 8's
      <code>str_contains($h, $n)</code> becomes
      <code>haystack.include?(needle)</code>. Note the method name: it is a
      predicate, so it ends in <code>?</code> — and so does yours.</li>
  <li><code>join_words(words)</code> — flip <code>implode(", ", $words)</code>
      around: ask the array to <code>join(", ")</code> itself.</li>
</ol>`,

  starter: `# 1. strtoupper($s) -> s.upcase: the function zoo becomes methods.

`,

  requirements: [
    { pattern: /#\{/, message: "Interpolate with #{} inside greet" },
    { pattern: /\.upcase/, message: "Call .upcase on the string in shout" },
    { pattern: /\.include\?/, message: "Use .include? in contains_word?" },
    { pattern: /\.join/, message: "Use .join on the array in join_words" },
  ],

  tests: [
    { name: 'shout("hello") returns "HELLO"',
      code: '  expect_eq(shout("hello"), "HELLO")' },
    { name: 'greet("Ada") returns "Hello, Ada!"',
      code: '  expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'contains_word?("Ruby for PHP devs", "PHP") is true',
      code: '  expect_true(contains_word?("Ruby for PHP devs", "PHP"))' },
    { name: 'contains_word?("Ruby", "Perl") is false',
      code: '  expect_eq(contains_word?("Ruby", "Perl"), false)' },
    { name: 'join_words(["a", "b", "c"]) returns "a, b, c"',
      code: '  expect_eq(join_words(["a", "b", "c"]), "a, b, c")' },
  ],

  solution: `def shout(s)
  s.upcase
end

def greet(name)
  "Hello, #{name}!"
end

def contains_word?(haystack, needle)
  haystack.include?(needle)
end

def join_words(words)
  words.join(", ")
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>Interpolation</td><td><code>"$name"</code>, <code>"{$user}"</code></td><td><code>"#{name}"</code> (braces required)</td></tr>
  <tr><td>Literal string</td><td><code>'no $vars here'</code></td><td><code>'no #{} here'</code> (same rule!)</td></tr>
  <tr><td>Concatenate</td><td><code>$a . $b</code></td><td><code>a + b</code> — or interpolate</td></tr>
  <tr><td>Uppercase / lowercase</td><td><code>strtoupper</code> / <code>strtolower</code></td><td><code>.upcase</code> / <code>.downcase</code></td></tr>
  <tr><td>Contains</td><td><code>str_contains($h, $n)</code></td><td><code>h.include?(n)</code></td></tr>
  <tr><td>Length</td><td><code>strlen($s)</code></td><td><code>s.length</code></td></tr>
  <tr><td>Trim / replace / split</td><td><code>trim</code>, <code>str_replace</code>, <code>explode</code></td><td><code>.strip</code>, <code>.sub</code>/<code>.gsub</code>, <code>.split</code></td></tr>
  <tr><td>Join</td><td><code>implode(", ", $arr)</code></td><td><code>arr.join(", ")</code></td></tr>
</table>
<p>The pattern to internalize: PHP's standard library is a flat namespace of
functions you pass values into; Ruby's is a set of methods the values carry
with them. Once you stop reaching for <code>str_whatever($s)</code> and start
typing <code>s.</code> and asking what the string can do, the whole language
opens up — every lesson from here on is this same flip applied to a new
corner of PHP.</p>`,
};
