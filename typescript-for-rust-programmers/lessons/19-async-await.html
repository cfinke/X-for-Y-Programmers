const LESSON = {
  number: 19,
  title: "Async & Promises",

  intro: `
<p>You know the shape already: <code>async fn</code> returns a future,
<code>.await</code> drives it. TypeScript: <code>async function</code> returns a
<code>Promise&lt;T&gt;</code>, <code>await</code> unwraps it — written as a
<em>prefix</em> keyword, so Rust's <code>fetch_user(id).await?</code> becomes
<code>await fetchUser(id)</code> and long chains read inside-out instead of
left-to-right. The pleasant surprise: there is no runtime to pick. No tokio
vs async-std, no <code>#[tokio::main]</code>, no feature flags — the event loop
ships with the host. And since JavaScript is single-threaded, there are no
<code>Send</code>/<code>Sync</code> bounds and no <code>Pin</code>; every
future-shaped headache from Rust simply doesn't exist here.</p>
<table>
  <tr><th>Rust</th><th>TypeScript</th></tr>
  <tr><td><code>async fn f() -&gt; Result&lt;String, E&gt;</code></td><td><code>async function f(): Promise&lt;string&gt;</code></td></tr>
  <tr><td><code>fetch_user(id).await</code> (postfix)</td><td><code>await fetchUser(id)</code> (prefix)</td></tr>
  <tr><td><code>tokio::join!(a, b)</code> / <code>try_join_all</code></td><td><code>Promise.all([a, b])</code></td></tr>
  <tr><td><code>Err(e)</code> propagated with <code>?</code></td><td><code>throw</code>, caught with <code>try { await … } catch</code></td></tr>
  <tr><td>futures are <strong>lazy</strong> — inert until polled</td><td>promises are <strong>eager</strong> — running the moment they're created</td></tr>
</table>
<p>The one difference that will actually bite you: <strong>Rust futures are lazy,
JS promises are eager</strong>. In Rust, building a future does nothing until
something polls it — "futures do nothing unless awaited" is a compiler warning.
In JavaScript, calling <code>fetchUser(id)</code> starts the work
<em>immediately</em>; the promise is a handle to an operation already in flight,
and <code>await</code> just waits for the result. That makes fan-out natural:
call <code>ids.map(fetchUser)</code> and every request is already running —
<code>Promise.all</code> collects them, resolving to an array of results or
rejecting with the first error, exactly like <code>try_join_all</code>. For
errors there's no <code>Result</code>: rejections <code>throw</code> at the
<code>await</code>, and <code>try/catch</code> plays the role of
<code>match</code>-on-<code>Err</code>.</p>`,

  rust: `// Cargo.toml: pick a runtime — tokio = { version = "1", features = ["full"] }

async fn fetch_user(id: u32) -> Result<String, String> {
    match id {
        1 => Ok("Ferris".to_string()),
        2 => Ok("Ada".to_string()),
        3 => Ok("Grace".to_string()),
        _ => Err(format!("no user with id {id}")),
    }
}

async fn fetch_user_names(ids: &[u32]) -> Result<Vec<String>, String> {
    // Lazy: these futures do NOTHING until join_all polls them.
    let futures = ids.iter().map(|&id| fetch_user(id));
    futures::future::try_join_all(futures).await
}

async fn name_or_default(id: u32) -> String {
    fetch_user(id).await.unwrap_or_else(|_| "unknown".to_string())
}`,

  task: `
<p>The starter gives you <code>fetchUser</code> — a deterministic fake async
"network call" that resolves to a name or rejects for unknown ids. Port the two
callers:</p>
<ol>
  <li>Write <code>async function fetchUserNames(ids: number[]):
      Promise&lt;string[]&gt;</code>. Map the ids to promises (remember: each one
      starts running immediately) and collect them with
      <code>Promise.all</code> — your <code>try_join_all</code>. If any id is
      unknown, the whole thing rejects, just like the first <code>Err</code>
      short-circuiting.</li>
  <li>Write <code>async function fetchNameOrDefault(id: number):
      Promise&lt;string&gt;</code> that <code>await</code>s
      <code>fetchUser(id)</code> inside <code>try/catch</code> and returns
      <code>"unknown"</code> on failure — <code>unwrap_or_else</code>, spelled
      with a <code>catch</code> block.</li>
</ol>`,

  starter: `// --- provided: a deterministic fake network call (do not change) ---
const USERS: Record<number, string> = { 1: "Ferris", 2: "Ada", 3: "Grace" };

function fetchUser(id: number): Promise<string> {
  // Eager! The work is already scheduled the moment you call this —
  // no poll required. (Rust's lazy futures would sit inert.)
  return Promise.resolve(id).then((n) => {
    const name = USERS[n];
    if (name === undefined) {
      throw new Error("no user with id " + n);
    }
    return name;
  });
}

// 1. try_join_all -> Promise.all. Map ids to promises, await them all.
async function fetchUserNames(ids: number[]): Promise<string[]> {
  // TODO: return Promise.all(...)
  return [];
}

// 2. unwrap_or_else -> try/catch. Rejections throw at the await.
async function fetchNameOrDefault(id: number): Promise<string> {
  // TODO: try { return await fetchUser(id); } catch -> "unknown"
  return "";
}`,

  exportNames: ["fetchUser", "fetchUserNames", "fetchNameOrDefault"],

  requirements: [
    { pattern: /async\s+function/, message: "Declare your functions with async function" },
    { pattern: /await/, message: "Unwrap promises with await (prefix, not .await)" },
    { pattern: /Promise\.all/, message: "Fan out with Promise.all — the try_join_all of promises" },
    { pattern: /catch/, message: "Handle the rejection with try/catch (there is no Result here)" },
  ],

  tests: [
    {
      name: 'fetchUserNames([1, 2, 3]) resolves to ["Ferris", "Ada", "Grace"]',
      run: async (x) => expectDeepEqual(await x.fetchUserNames([1, 2, 3]), ["Ferris", "Ada", "Grace"]),
    },
    {
      name: "fetchUserNames([]) resolves to an empty array",
      run: async (x) => expectDeepEqual(await x.fetchUserNames([]), []),
    },
    {
      name: "fetchUserNames rejects if any id is unknown (first Err wins)",
      run: async (x) => {
        let threw = false;
        try {
          await x.fetchUserNames([1, 99]);
        } catch (e) {
          threw = true;
        }
        expectTruthy(threw);
      },
    },
    {
      name: 'fetchNameOrDefault(2) resolves to "Ada"',
      run: async (x) => expectEqual(await x.fetchNameOrDefault(2), "Ada"),
    },
    {
      name: 'fetchNameOrDefault(99) swallows the rejection and resolves to "unknown"',
      run: async (x) => expectEqual(await x.fetchNameOrDefault(99), "unknown"),
    },
  ],

  solution: `const USERS: Record<number, string> = { 1: "Ferris", 2: "Ada", 3: "Grace" };

function fetchUser(id: number): Promise<string> {
  return Promise.resolve(id).then((n) => {
    const name = USERS[n];
    if (name === undefined) {
      throw new Error("no user with id " + n);
    }
    return name;
  });
}

async function fetchUserNames(ids: number[]): Promise<string[]> {
  // Every promise is already running after the map — Promise.all just
  // waits for all of them (or rejects with the first failure).
  return Promise.all(ids.map((id) => fetchUser(id)));
}

async function fetchNameOrDefault(id: number): Promise<string> {
  try {
    return await fetchUser(id);
  } catch (e) {
    return "unknown";
  }
}`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>TypeScript</th></tr>
  <tr><td>Async function</td><td><code>async fn f() -&gt; T</code> (returns <code>impl Future</code>)</td><td><code>async function f(): Promise&lt;T&gt;</code></td></tr>
  <tr><td>Await</td><td><code>expr.await</code> (postfix)</td><td><code>await expr</code> (prefix)</td></tr>
  <tr><td>Runtime</td><td>bring your own: tokio, async-std…</td><td>built into the host — nothing to choose</td></tr>
  <tr><td>Execution model</td><td>lazy: futures inert until polled</td><td>eager: running as soon as created</td></tr>
  <tr><td>Fan-out</td><td><code>join!</code> / <code>try_join_all</code></td><td><code>Promise.all([…])</code></td></tr>
  <tr><td>First success</td><td><code>select!</code></td><td><code>Promise.race</code> / <code>Promise.any</code></td></tr>
  <tr><td>Errors</td><td><code>Result</code> + <code>?</code></td><td>rejection throws at <code>await</code>; <code>try/catch</code></td></tr>
  <tr><td>Threading concerns</td><td><code>Send</code>/<code>Sync</code> bounds, <code>Pin</code></td><td>none — one thread, cooperative</td></tr>
</table>
<p>The insight: eagerness changes <em>where</em> concurrency happens. In Rust,
concurrency starts when you combine futures (<code>join!</code>); in JavaScript
it starts when you <em>create</em> promises, and <code>await</code> is what
serializes. So <code>const a = await f(); const b = await g();</code> is
sequential, while <code>const [a, b] = await Promise.all([f(), g()]);</code> is
concurrent — same rule of thumb as Rust, but the footgun is calling things one
<code>await</code> at a time out of habit, not forgetting to poll.</p>`,
};
