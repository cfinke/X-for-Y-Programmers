<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Basic Types",

  intro: `
<p>In Rust, <code>let x = 5;</code> gives you an immutable binding and you
opt <em>in</em> to mutation with <code>let mut</code>. TypeScript has the same
two-keyword split, but flipped in spelling: <code>const</code> is the
can't-reassign default you should reach for, and <code>let</code> is the
opt-in for rebinding. One honest caveat up front: <code>const</code> only
freezes the <em>binding</em>, not the value — a <code>const</code> array or
object is still freely mutable inside. There is no ownership, no borrow
checker, and no deep immutability; every value is a garbage-collected,
shared, mutable reference.</p>
<table>
  <tr><th>Rust</th><th>TypeScript</th></tr>
  <tr><td><code>let x = 5;</code> (immutable)</td><td><code>const x = 5;</code> (binding fixed, contents not)</td></tr>
  <tr><td><code>let mut x = 5;</code></td><td><code>let x = 5;</code></td></tr>
  <tr><td><code>i8</code>…<code>i128</code>, <code>u8</code>…<code>u64</code>, <code>f32</code>, <code>f64</code></td><td><code>number</code> — one type, and it is an f64</td></tr>
  <tr><td><code>String</code>, <code>&amp;str</code>, <code>&amp;String</code></td><td><code>string</code> — one GC'd type, no lifetimes</td></tr>
  <tr><td><code>fn f(x: i32) -&gt; String</code></td><td><code>function f(x: number): string</code></td></tr>
</table>
<p>The type system will feel familiar — annotations sit after a colon, the
compiler checks them before anything runs, and inference means you rarely
have to write them. But the numeric story is looser than you're used to:
every number is an IEEE-754 double, so integers are only exact up to
2<sup>53</sup>, and there is no overflow checking — arithmetic silently
produces <code>Infinity</code> or loses precision instead of panicking.
One convention change: <code>snake_case</code> becomes
<code>camelCase</code>.</p>`,

  rust: `let name: String = String::from("Ada");
let age: u32 = 36;

// Reassignment needs an explicit opt-in:
let mut visits: u64 = 0;
visits += 1;

// Sixteen numeric types, three common string types...
// TypeScript collapses all of this into just number and string.

fn describe_user(name: &str, age: u32) -> String {
    format!("{name} is {age} years old")
}

println!("{}", describe_user(&name, age));`,

  task: `
<p>Rewrite the Rust as TypeScript:</p>
<ol>
  <li>Declare a constant <code>userName</code> of type <code>string</code>
      with the value <code>"Ada"</code>, and a constant <code>userAge</code>
      of type <code>number</code> with the value <code>36</code>. Write the
      annotations explicitly, and note the rename:
      <code>snake_case</code> → <code>camelCase</code>.</li>
  <li>Write a function <code>describeUser</code> that takes
      <code>name: string</code> and <code>age: number</code> and returns a
      <code>string</code> like <code>"Ada is 36 years old"</code>.
      Rust's <code>-&gt; String</code> becomes <code>: string</code> after
      the parameter list.</li>
</ol>
<p>No <code>&amp;str</code> vs <code>String</code> decision to make: the
parameter and the return value are both just <code>string</code>, and
nothing is moved or borrowed.</p>`,

  starter: `// 1. Declare userName (string) and userAge (number) with explicit types.
//    Rust:  let name: String = String::from("Ada");
//    TS:    const ...: string = "Ada";


// 2. Write describeUser with typed parameters and a typed return value.
//    Rust:  fn describe_user(name: &str, age: u32) -> String
function describeUser(name, age) {
  // TODO: return "<name> is <age> years old"
  return "";
}
`,

  exportNames: ["userName", "userAge", "describeUser"],

  requirements: [
    { pattern: /const\s+userName\s*:\s*string/, message: "Declare userName as a const with an explicit : string annotation" },
    { pattern: /const\s+userAge\s*:\s*number/, message: "Declare userAge as a const with an explicit : number annotation" },
    { pattern: /describeUser\s*\(\s*name\s*:\s*string\s*,\s*age\s*:\s*number\s*\)\s*:\s*string/, message: "Give describeUser typed parameters (name: string, age: number) and a : string return type" },
  ],

  tests: [
    { name: 'userName is "Ada"', run: (x) => expectEqual(x.userName, "Ada") },
    { name: "userAge is 36", run: (x) => expectEqual(x.userAge, 36) },
    { name: 'describeUser("Ada", 36) returns "Ada is 36 years old"', run: (x) => expectEqual(x.describeUser("Ada", 36), "Ada is 36 years old") },
    { name: 'describeUser("Graydon", 51) returns "Graydon is 51 years old"', run: (x) => expectEqual(x.describeUser("Graydon", 51), "Graydon is 51 years old") },
  ],

  solution: `const userName: string = "Ada";
const userAge: number = 36;

function describeUser(name: string, age: number): string {
  return name + " is " + age + " years old";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>TypeScript</th></tr>
  <tr><td>Immutable binding</td><td><code>let x = 1;</code></td><td><code>const x = 1;</code> (binding only — contents stay mutable)</td></tr>
  <tr><td>Mutable binding</td><td><code>let mut x = 1;</code></td><td><code>let x = 1;</code></td></tr>
  <tr><td>Integers &amp; floats</td><td><code>i32</code>, <code>u64</code>, <code>f64</code>, …</td><td><code>number</code> (always an f64; exact only to 2^53; no overflow checks)</td></tr>
  <tr><td>Strings</td><td><code>String</code> / <code>&amp;str</code> / <code>&amp;String</code></td><td><code>string</code> (one GC'd type, no lifetimes)</td></tr>
  <tr><td>Function signature</td><td><code>fn f(x: i32) -&gt; String</code></td><td><code>function f(x: number): string</code></td></tr>
  <tr><td>Naming</td><td><code>snake_case</code></td><td><code>camelCase</code></td></tr>
</table>
<p>Like Rust, TypeScript infers types aggressively — <code>const name =
"Ada"</code> is already a <code>string</code> (in fact the literal type
<code>"Ada"</code>), so idiomatic code omits annotations where the value
makes them obvious. This lesson asks for explicit ones to get the syntax
into your fingers. The instinct that <em>will</em> mislead you is trusting
<code>const</code> for immutability: it is <code>let</code> without
reassignment, not <code>let</code> without <code>mut</code>.</p>`,
};
