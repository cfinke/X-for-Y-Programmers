const LESSON = {
  number: 7,
  title: "Structs & Value Types",

  intro: `
<p>In Go every struct is already a value type: assign one to a new variable,
pass it to a function, and you get an independent copy — mutate the copy and the
original is untouched. You only get sharing when you reach for a pointer,
<code>*Point</code>. C# makes that same choice explicit and per-type. A
<code>class</code> is a reference type, the C# analog of a Go pointer: assignment
shares the object. A <code>struct</code> is a <em>value</em> type — assigning it
copies the whole thing, exactly like a plain Go struct, so the two variables are
independent.</p>
<table>
  <tr><th>Go</th><th>C#</th></tr>
  <tr><td><code>type Point struct { X, Y int }</code> (value by default)</td><td><code>class Point { … }</code> (reference) vs <code>struct Point { … }</code> (value)</td></tr>
  <tr><td>assignment copies; <code>&amp;Point{...}</code> shares</td><td><code>class</code>: shares; <code>struct</code>: copies</td></tr>
  <tr><td><code>X int</code> (exported field)</td><td><code>public readonly int X;</code></td></tr>
  <tr><td><code>Point{X: 1, Y: 2}</code></td><td><code>new Point(1, 2)</code></td></tr>
</table>
<p>Reach for a <code>struct</code> when the value is small, immutable, and behaves
like a number — a point, a color, a money amount, a range. Go has no built-in
<code>readonly</code> field, but C#'s struct does: mark the fields
<code>readonly</code> so a copied value can't be half-mutated. Because a struct is
copied on assignment and when passed to a method — the same rule you already rely
on for plain Go structs — a large or mutable struct is a foot-gun; when in doubt,
use a <code>class</code>.</p>`,

  go: `type Point struct {
	X, Y int
}

func (p Point) Translate(dx, dy int) Point {
	return Point{p.X + dx, p.Y + dy}
}

a := Point{1, 2}
b := a                  // independent copy (value type)
c := a.Translate(10, 0) // Point{11, 2}

pa := &Point{1, 2}
pb := pa                // same struct (pointer = reference)`,

  task: `
<p>Define a <code>struct Point</code> that shows off value semantics:</p>
<ol>
  <li>Two <code>public readonly int</code> fields, <code>X</code> and
      <code>Y</code>, set by a constructor <code>Point(int x, int y)</code>.</li>
  <li><code>Translate(int dx, int dy)</code> returns a <em>new</em>
      <code>Point</code> shifted by the offsets — it must not mutate
      <code>this</code>.</li>
  <li>Override <code>ToString()</code> to return <code>"(X, Y)"</code>, e.g.
      <code>"(1, 2)"</code>.</li>
  <li>Override <code>bool Equals(object obj)</code> so two points with the same
      <code>X</code> and <code>Y</code> are equal, and add a matching
      <code>GetHashCode()</code>.</li>
</ol>
<p>Because it's a <code>struct</code>, copying a <code>Point</code> into another
variable makes an independent value — the tests lean on that.</p>`,

  starter: `struct Point {
  public readonly int X;
  public readonly int Y;

  public Point(int x, int y) {
    X = 0; // TODO
    Y = 0; // TODO
  }

  public Point Translate(int dx, int dy) {
    return default(Point); // TODO
  }

  public override string ToString() {
    return ""; // TODO: "(X, Y)"
  }

  public override bool Equals(object obj) {
    return false; // TODO
  }

  public override int GetHashCode() {
    return 0; // TODO
  }
}
`,

  requirements: [
    { pattern: /struct\s+Point/, message: "Define Point as a struct (a value type), not a class" },
    { pattern: /readonly\s+int/, message: "Make the X and Y fields readonly" },
  ],

  tests: [
    { name: "Constructor stores X and Y", code: "      var p = new Point(1, 2);\n      expect_eq(p.X, 1);\n      expect_eq(p.Y, 2);" },
    { name: "ToString formats as (X, Y)", code: "      expect_eq(new Point(1, 2).ToString(), \"(1, 2)\");" },
    { name: "Translate returns a shifted point", code: "      expect_eq(new Point(1, 2).Translate(10, 0).ToString(), \"(11, 2)\");" },
    { name: "Value equality by X and Y", code: "      expect_true(new Point(3, 4).Equals(new Point(3, 4)));\n      expect_true(!new Point(3, 4).Equals(new Point(4, 3)));" },
    { name: "Assignment copies the value (independent)", code: "      var a = new Point(1, 2);\n      var b = a;\n      var c = a.Translate(5, 5);\n      expect_eq(a.ToString(), \"(1, 2)\");\n      expect_eq(b.ToString(), \"(1, 2)\");\n      expect_eq(c.ToString(), \"(6, 7)\");" },
    { name: "Copies are equal but independent values", code: "      var a = new Point(8, 9);\n      var b = a;\n      expect_true(a.Equals(b));" },
  ],

  solution: `struct Point {
  public readonly int X;
  public readonly int Y;

  public Point(int x, int y) {
    X = x;
    Y = y;
  }

  public Point Translate(int dx, int dy) {
    return new Point(X + dx, Y + dy);
  }

  public override string ToString() {
    return $"({X}, {Y})";
  }

  public override bool Equals(object obj) {
    if (obj is Point other) {
      return X == other.X && Y == other.Y;
    }
    return false;
  }

  public override int GetHashCode() {
    return X * 397 ^ Y;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C#</th></tr>
  <tr><td>Value type</td><td><code>struct</code> (always, unless you use a pointer)</td><td><code>struct</code> (copied on assign)</td></tr>
  <tr><td>Reference type</td><td><code>*T</code> (pointer)</td><td><code>class</code> (shared on assign)</td></tr>
  <tr><td>Immutable field</td><td>convention only (no keyword)</td><td><code>public readonly int X;</code></td></tr>
  <tr><td>Value equality</td><td><code>==</code> on comparable structs</td><td>override <code>Equals</code> + <code>GetHashCode</code></td></tr>
  <tr><td>Default value</td><td>zero value, e.g. <code>Point{}</code></td><td><code>default(Point)</code> — all fields zeroed</td></tr>
</table>
<p>A <code>struct</code> can't be <code>null</code> (it's a value), so an
uninitialized one is its zero value — the same habit you already have in Go,
where a bare <code>Point{}</code> is all zeros. Just like Go gives you no way to
write a zero-argument constructor, C# 7.3 doesn't let a struct declare a
parameterless constructor either — <code>new Point()</code> always produces the
all-zero value, whether you like it or not. Prefer <code>readonly</code> fields
and methods that return new structs (like <code>Translate</code>) over mutating
in place: mutable structs are a familiar foot-gun from Go's own
<code>map[string]Point</code> — <code>m["a"].X = 5</code> doesn't even compile,
because a map value isn't addressable, and reading it into a variable first only
mutates a throwaway copy. C#'s <code>List&lt;Point&gt;</code> has the same trap:
<code>list[0].X = 5</code> mutates a temporary the indexer handed back, not the
stored element. When the type is big, mutable, or naturally shared, stay with a
<code>class</code>.</p>`,
};
