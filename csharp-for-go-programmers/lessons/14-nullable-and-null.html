const LESSON = {
  number: 14,
  title: "Nullable & Null Handling",

  intro: `
<p>Go has no <code>null</code> at all. An uninitialized value gets its
<em>zero value</em> — <code>0</code> for numbers, <code>""</code> for strings —
and only pointers, maps, slices, interfaces, channels, and funcs can be
<code>nil</code>. To say "this <code>int</code> might be absent," idiomatic Go
reaches for a pointer (<code>*int</code>) or a two-value <code>(int, bool)</code>
return. C# 7.3 draws a related but different line: <em>reference</em> types
(like <code>string</code>) are already nullable, but <em>value</em> types
(<code>int</code>, <code>bool</code>, <code>DateTime</code>, structs) cannot
hold <code>null</code> unless you opt in with <code>?</code> — that
<code>int?</code> is shorthand for <code>Nullable&lt;int&gt;</code>.</p>
<table>
  <tr><th>Go</th><th>C# 7.3</th></tr>
  <tr><td><code>var n *int = nil</code></td><td><code>int? n = null;</code></td></tr>
  <tr><td><code>var s string = ""</code> (zero value, never nil)</td><td><code>string s = null;</code> (already nullable)</td></tr>
  <tr><td><code>v := 0; if n != nil { v = *n }</code></td><td><code>n ?? 0</code></td></tr>
  <tr><td><code>var name string; if user != nil { name = user.Name }</code></td><td><code>user?.Name</code></td></tr>
  <tr><td><code>n != nil</code></td><td><code>n.HasValue</code></td></tr>
</table>
<p>Note the asymmetry: there is no <code>string?</code> in C# 7.3 — nullable
<em>reference</em> types arrived later, so a plain <code>string</code> can already
be <code>null</code>. Only value types need the <code>?</code>. An <code>int?</code>
exposes <code>HasValue</code> (a <code>bool</code>), <code>Value</code> (throws if
empty), and <code>GetValueOrDefault()</code>. The null-coalescing
<code>??</code> and null-conditional <code>?.</code> operators have no Go
equivalent — you write the <code>if n != nil { ... }</code> guard by hand every
time.</p>`,

  go: `func parseAge(text string) *int {
	n, err := strconv.Atoi(text)
	if err != nil {
		return nil
	}
	return &n
}

func ageOrDefault(text string, fallback int) int {
	if n := parseAge(text); n != nil {
		return *n
	}
	return fallback
}

func firstLetter(name *string) *string {
	if name == nil || len(*name) == 0 {
		return nil
	}
	letter := string((*name)[0])
	return &letter
}`,

  task: `
<p>Build a <code>static class NullTools</code> that mirrors the Go above
using C# nullable value types and null operators:</p>
<ol>
  <li><code>ParseAge(string text)</code> returns an <code>int?</code>: parse with
      <code>int.TryParse(text, out int n)</code>, returning <code>n</code> on
      success and <code>null</code> otherwise.</li>
  <li><code>AgeOrDefault(string text, int fallback)</code> returns an
      <code>int</code> — use <code>??</code> on the result of
      <code>ParseAge</code>.</li>
  <li><code>Describe(int? age)</code> returns a string: if the value is present
      return <code>$"age {age.Value}"</code> (guard with <code>HasValue</code>),
      otherwise return <code>"unknown"</code>.</li>
  <li><code>FirstLetter(string name)</code> returns a <code>string</code>: use the
      null-conditional <code>?.</code> so a <code>null</code> name yields
      <code>null</code> — e.g. <code>name?.Substring(0, 1)</code>.</li>
</ol>`,

  starter: `static class NullTools {
  public static int? ParseAge(string text) {
    return null; // TODO
  }

  public static int AgeOrDefault(string text, int fallback) {
    return 0; // TODO: use ??
  }

  public static string Describe(int? age) {
    return ""; // TODO: check HasValue
  }

  public static string FirstLetter(string name) {
    return null; // TODO: use ?.
  }
}
`,

  requirements: [
    { pattern: /int\?/, message: "Use a nullable value type (int?) for the age" },
    { pattern: /\?\?/, message: "Use the null-coalescing operator (??) to supply the fallback" },
    { pattern: /\?\./, message: "Use the null-conditional operator (?.) in FirstLetter" },
  ],

  tests: [
    { name: "ParseAge(\"36\") is 36", code: "      expect_eq(NullTools.ParseAge(\"36\"), 36);" },
    { name: "ParseAge(\"abc\") is null", code: "      expect_true(NullTools.ParseAge(\"abc\") == null);" },
    { name: "AgeOrDefault(\"abc\", 18) is 18", code: "      expect_eq(NullTools.AgeOrDefault(\"abc\", 18), 18);" },
    { name: "AgeOrDefault(\"42\", 18) is 42", code: "      expect_eq(NullTools.AgeOrDefault(\"42\", 18), 42);" },
    { name: "Describe(36) is \"age 36\"", code: "      expect_eq(NullTools.Describe(36), \"age 36\");" },
    { name: "Describe(null) is \"unknown\"", code: "      expect_eq(NullTools.Describe(null), \"unknown\");" },
    { name: "FirstLetter(null) is null", code: "      expect_true(NullTools.FirstLetter(null) == null);" },
    { name: "FirstLetter(\"Ada\") is \"A\"", code: "      expect_eq(NullTools.FirstLetter(\"Ada\"), \"A\");" },
  ],

  solution: `static class NullTools {
  public static int? ParseAge(string text) {
    if (int.TryParse(text, out int n)) {
      return n;
    }
    return null;
  }

  public static int AgeOrDefault(string text, int fallback) {
    return ParseAge(text) ?? fallback;
  }

  public static string Describe(int? age) {
    if (age.HasValue) {
      return $"age {age.Value}";
    }
    return "unknown";
  }

  public static string FirstLetter(string name) {
    return name?.Substring(0, 1);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C# 7.3</th></tr>
  <tr><td>Nullable value</td><td><code>*int</code> (pointer, nil means absent)</td><td><code>int?</code> / <code>Nullable&lt;int&gt;</code></td></tr>
  <tr><td>Has a value?</td><td><code>n != nil</code></td><td><code>n.HasValue</code></td></tr>
  <tr><td>Unwrap</td><td><code>*n</code> (panics if nil)</td><td><code>n.Value</code> (throws if empty)</td></tr>
  <tr><td>Unwrap or default</td><td><code>v := 0; if n != nil { v = *n }</code></td><td><code>n.GetValueOrDefault()</code> or <code>n ?? 0</code></td></tr>
  <tr><td>Safe navigation</td><td><code>if obj != nil { x = obj.Prop }</code></td><td><code>obj?.Prop</code></td></tr>
</table>
<p>Dereferencing a nil <code>*int</code> panics in Go — the same runtime
blow-up C#'s <code>.Value</code> throws as <code>InvalidOperationException</code>
when read on an empty <code>int?</code> — so guard with <code>HasValue</code> or
prefer <code>??</code> / <code>GetValueOrDefault()</code>. Because
<code>int?</code> is really <code>Nullable&lt;int&gt;</code>, it boxes to a plain
<code>int</code> (or <code>null</code>) when compared as <code>object</code>,
which is why the tests above can write <code>expect_eq(ParseAge("36"), 36)</code>
directly, no dereference needed. Remember the split: in C# 7.3 the
<code>?</code> is only for value types — reference types like <code>string</code>
are nullable already, and there is no <code>string?</code> yet. Go treats every
pointer uniformly instead: there's no value/reference distinction for
nullability, only pointers, maps, slices, interfaces, channels, and funcs can be
<code>nil</code> at all, and every other type carries a well-defined zero
value.</p>`,
};
