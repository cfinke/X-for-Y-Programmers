const LESSON = {
  number: 5,
  title: "Methods",

  intro: `
<p>You already write Go functions with variadic parameters, but Go has no
default parameter values, no named arguments, and no overloading — each
function needs its own name. C# methods cover the same ground and add a few
tools Go lacks entirely. Every method lives inside a class, and C# leans on
real <em>overloading</em> — many methods sharing a name, distinguished by
their parameter list — instead of Go's one function, one signature.</p>
<table>
  <tr><th>Go</th><th>C#</th></tr>
  <tr><td><code>func f(x int) {}</code> (no default)</td><td><code>void F(int x = 1) {}</code> (optional param)</td></tr>
  <tr><td><code>f(1)</code> (no named arguments)</td><td><code>F(x: 1)</code> (named argument)</td></tr>
  <tr><td><code>func f(xs ...int) {}</code></td><td><code>void F(params int[] xs)</code></td></tr>
  <tr><td>one function per name, no overloading</td><td>overload <em>bodies</em>, one per signature</td></tr>
  <tr><td>return an extra value, e.g. <code>(int, bool)</code></td><td><code>out</code> / <code>ref</code> parameters</td></tr>
</table>
<p>Two ideas have no direct Go equivalent, though Go approximates both
differently. An <code>out</code> parameter is an extra return channel: the
method must assign it before returning, and the caller reads it back — Go
gets the same effect from a function that returns a second value, the same
shape as <code>strconv.Atoi</code>'s <code>(int, error)</code>. A
<code>ref</code> parameter passes a variable in and lets the method mutate
the caller's own variable in place; Go's closest tool is passing a pointer
(<code>*int</code>) explicitly, which the call site marks with <code>&</code>
just as C# marks it with <code>ref</code>. Both languages make sure the
reader can see which arguments a function writes to.</p>`,

  go: `func greet(name string, greeting string) string {
	return fmt.Sprintf("%s, %s!", greeting, name)
}

func sum(numbers ...int) int {
	total := 0
	for _, n := range numbers {
		total += n
	}
	return total
}

// Go has no out/ref — return an extra value instead
func tryDivide(a, b int) (int, bool) {
	if b == 0 {
		return 0, false
	}
	return a / b, true
}`,

  task: `
<p>Build a <code>static class Calc</code> that shows off C#'s method features:</p>
<ol>
  <li><strong>Overloading:</strong> <code>Max(int a, int b)</code> returns the
      larger, and <code>Max(int a, int b, int c)</code> returns the largest of
      three (reuse the two-argument version).</li>
  <li><strong>Optional parameter:</strong> <code>Greet(string name, string
      greeting = "Hello")</code> returns <code>"Hello, Ada!"</code>, or uses the
      supplied greeting.</li>
  <li><strong>out parameter:</strong> <code>bool TryDivide(int a, int b, out int
      quotient)</code> sets <code>quotient</code> to <code>a / b</code> and
      returns <code>true</code>; when <code>b</code> is <code>0</code>, set
      <code>quotient = 0</code> and return <code>false</code>.</li>
  <li><strong>params array:</strong> <code>Sum(params int[] numbers)</code>
      returns the total (and <code>Sum()</code> is <code>0</code>).</li>
  <li><strong>ref parameter:</strong> <code>void Increment(ref int x)</code>
      adds one to the caller's variable.</li>
</ol>`,

  starter: `static class Calc {

`,

  requirements: [
    { pattern: /\bout\s+int\s+quotient\b/, message: "TryDivide must use an out parameter (out int quotient)" },
    { pattern: /\bparams\s+int\[\]/, message: "Sum must take a params int[] array" },

  ],

  tests: [
    { name: "Max(3, 7) is 7", code: "      expect_eq(Calc.Max(3, 7), 7);" },
    { name: "Max(3, 7, 5) is 7 (three-arg overload)", code: "      expect_eq(Calc.Max(3, 7, 5), 7);" },
    { name: "Greet(\"Ada\") uses the default greeting", code: "      expect_eq(Calc.Greet(\"Ada\"), \"Hello, Ada!\");" },
    { name: "Greet with a named argument", code: "      expect_eq(Calc.Greet(name: \"Rob\", greeting: \"Hi\"), \"Hi, Rob!\");" },
    { name: "TryDivide(10, 2) succeeds with quotient 5", code: "      bool ok = Calc.TryDivide(10, 2, out int q);\n      expect_true(ok);\n      expect_eq(q, 5);" },
    { name: "TryDivide by zero fails and yields 0", code: "      bool ok2 = Calc.TryDivide(10, 0, out int q2);\n      expect_true(!ok2);\n      expect_eq(q2, 0);" },
    { name: "Sum(1, 2, 3, 4) is 10 and Sum() is 0", code: "      expect_eq(Calc.Sum(1, 2, 3, 4), 10);\n      expect_eq(Calc.Sum(), 0);" },
    { name: "Increment mutates the caller's variable", code: "      int x = 5;\n      Calc.Increment(ref x);\n      expect_eq(x, 6);" },

  solution: `static class Calc {
  public static int Max(int a, int b) {
    return a > b ? a : b;
  }

  public static int Max(int a, int b, int c) {
    return Max(Max(a, b), c);
  }

  public static string Greet(string name, string greeting = "Hello") {
    return $"{greeting}, {name}!";
  }

  public static bool TryDivide(int a, int b, out int quotient) {
    if (b == 0) {
      quotient = 0;
      return false;
    }
    quotient = a / b;
    return true;
  }

  public static int Sum(params int[] numbers) {
    int total = 0;
    foreach (int n in numbers) {
      total += n;
    }
    return total;
  }

  public static void Increment(ref int x) {
    x++;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C#</th></tr>
  <tr><td>Optional parameter</td><td>no default values</td><td><code>F(int x = 1)</code></td></tr>
  <tr><td>Named argument</td><td>—</td><td><code>F(x: 1)</code></td></tr>
  <tr><td>Rest / params</td><td><code>xs ...int</code></td><td><code>params int[] xs</code></td></tr>
  <tr><td>Overloading</td><td>not supported, distinct names</td><td>a full body per signature</td></tr>
  <tr><td>Extra output</td><td>return <code>(value, ok)</code></td><td><code>out</code> parameter</td></tr>
  <tr><td>Mutate caller's variable</td><td>pass a pointer (<code>*int</code>)</td><td><code>ref</code> parameter</td></tr>
</table>
<p>A few sharp edges. Optional parameters must come after all required ones, and
their defaults must be compile-time constants — so <code>string greeting =
"Hello"</code> is fine but <code>DateTime.Now</code> is not. Named arguments let
you skip past optional parameters and document call sites, similar to how a Go
caller passes an options struct (the functional-options pattern) to keep a call
site self-documenting when the language itself has no named-argument syntax.
<code>out</code> variables can be declared right in the call —
<code>TryDivide(10, 2, out int q)</code> — and the <code>Try…</code>-returns-
<code>bool</code> shape is idiomatic all through the .NET library
(<code>int.TryParse</code>, <code>Dictionary.TryGetValue</code>), much like
Go's own <code>value, ok := …</code> idiom for map lookups and type assertions.
Finally, only one <code>params</code> array is allowed and it must be the last
parameter; the caller may pass loose arguments or a real array, just as a Go
variadic parameter accepts individual arguments or a slice spread with
<code>...</code>.</p>`,
};
