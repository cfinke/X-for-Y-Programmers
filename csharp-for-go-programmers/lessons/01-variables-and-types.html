const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Go and C# are both statically typed compiled languages, but they organize
code differently. Go has no classes — just packages, structs, and free
functions — while in C# every method lives inside a class or struct. C#'s
numeric types are also more finely subdivided than Go's.</p>
<table>
  <tr><th>Go</th><th>C#</th></tr>
  <tr><td><code>var age int = 36</code></td><td><code>int age = 36;</code></td></tr>
  <tr><td><code>name := "Ada"</code></td><td><code>var name = "Ada";</code> (inferred)</td></tr>
  <tr><td><code>fmt.Sprintf("%s is %d", name, age)</code></td><td><code>$"{name} is {age}"</code></td></tr>
  <tr><td><code>int</code>, <code>float64</code></td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>decimal</code>, …</td></tr>
</table>
<p>Two adjustments. First, <code>var</code> is C#'s <code>x := …</code> —
inference from the initializer — but the type is fixed once chosen. Second, the
numeric split matters: <code>7 / 2</code> is <code>3</code> (integer division),
while <code>7 / 2.0</code> is <code>3.5</code>, just like Go's <code>int</code>
vs <code>float64</code> division. Interpolated strings wear a <code>$</code>
prefix instead of a <code>fmt.Sprintf</code> call, and there are no free
functions — helpers become <code>static</code> methods on a class.</p>`,

  go: `var age int = 36
userName := "Ada"

func describe(name string, age int) string {
	return fmt.Sprintf("%s is %d", name, age)
}`,

  task: `
<p>Write the C# version. C# has no top-level functions, so put your methods in a
class:</p>
<ol>
  <li>Declare a <code>static class Basics</code> holding <code>static</code>
      methods.</li>
  <li><code>Add(int a, int b)</code> returns their sum.</li>
  <li><code>Describe(string name, int age)</code> returns a string like
      <code>"Ada is 36"</code> — use an interpolated string
      <code>$"{name} is {age}"</code>.</li>
  <li><code>Divide(int a, int b)</code> returns a <code>double</code>, so
      <code>Divide(7, 2)</code> is <code>3.5</code>. Cast one operand:
      <code>(double)a / b</code>.</li>
</ol>`,

  starter: `static class Basics {
  public static int Add(int a, int b) {
    return 0; // TODO
  }

  public static string Describe(string name, int age) {
    return ""; // TODO
  }

  public static double Divide(int a, int b) {
    return 0; // TODO: watch out for integer division
  }
}
`,

  requirements: [
    { pattern: /\$"/, message: "Build the string with an interpolated string ($\"...\")" },
    { pattern: /\(double\)/, message: "Cast to (double) so Divide returns a fractional result" },
  ],

  tests: [
    { name: "Add(2, 3) is 5", code: "      expect_eq(Basics.Add(2, 3), 5);" },
    { name: "Describe(\"Ada\", 36) is \"Ada is 36\"", code: "      expect_eq(Basics.Describe(\"Ada\", 36), \"Ada is 36\");" },
    { name: "Describe(\"Rob\", 68) is \"Rob is 68\"", code: "      expect_eq(Basics.Describe(\"Rob\", 68), \"Rob is 68\");" },
    { name: "Divide(7, 2) is 3.5", code: "      expect_eq(Basics.Divide(7, 2), 3.5);" },
    { name: "Divide(10, 4) is 2.5", code: "      expect_eq(Basics.Divide(10, 4), 2.5);" },
  ],

  solution: `static class Basics {
  public static int Add(int a, int b) {
    return a + b;
  }

  public static string Describe(string name, int age) {
    return $"{name} is {age}";
  }

  public static double Divide(int a, int b) {
    return (double)a / b;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C#</th></tr>
  <tr><td>Typed variable</td><td><code>var x int = 1</code></td><td><code>int x = 1;</code></td></tr>
  <tr><td>Inferred variable</td><td><code>x := 1</code></td><td><code>var x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>const x = 1</code></td><td><code>const int x = 1;</code></td></tr>
  <tr><td>Interpolation</td><td><code>fmt.Sprintf("%d", x)</code></td><td><code>$"{x}"</code></td></tr>
  <tr><td>Free function</td><td><code>func f() {}</code></td><td><code>static</code> method in a class</td></tr>
</table>
<p>The integer-division gotcha is the classic first surprise: <code>int / int</code>
truncates, exactly as it does in Go. Promote one side to <code>double</code> — a
cast, a literal like <code>2.0</code>, or a <code>double</code> variable — and
the whole expression becomes floating point. For money, reach for
<code>decimal</code> instead of <code>double</code> to avoid binary rounding
error (Go has no built-in decimal type; you'd reach for a library like
<code>shopspring/decimal</code>).</p>`,
};
