  title: "Capstone",

  intro: `
<p>Time to put it together. This capstone is a tiny in-memory <em>task store</em>
that leans on almost everything this course has covered: a <strong>class</strong>
to hold state and behavior, <strong>array-iteration methods</strong>
(<code>find</code>, <code>filter</code>, <code>reduce</code>) to query and
aggregate, and <strong>custom errors</strong> to refuse bad input. The shape is
familiar from C++ — a struct, a vector of structs, exceptions — but the
discipline that keeps a C++ program safe (compile-time type checking,
exceptions that must derive from <code>std::exception</code>, and iterators you
must compare against <code>end()</code> before touching them) has to be
reproduced by hand once everything is plain JavaScript.</p>
<table>
  <tr><th>C++</th><th>JavaScript</th></tr>
  <tr><td><code>struct Task { int id; bool done; };</code></td><td>a plain object shaped however you build it</td></tr>
  <tr><td><code>std::vector&lt;Task&gt; tasks;</code> — element type enforced</td><td><code>this.tasks = []</code> — holds anything you push</td></tr>
  <tr><td>compiler rejects <code>add(42)</code> (type mismatch)</td><td>you must <code>throw</code> to reject it</td></tr>
  <tr><td><code>std::find_if</code> returns an iterator you must compare to <code>end()</code></td><td><code>find</code> returns <code>undefined</code>; guard it</td></tr>
</table>
<p>In C++, forgetting to check an iterator against <code>end()</code> and
dereferencing it anyway is undefined behavior — the program might crash, might
not, and the bug can hide for months. JavaScript's failure mode is
comparatively well-behaved: <code>find</code> hands back a task or
<code>undefined</code>, and if you forget to check, the very next property
access throws a catchable <code>TypeError</code>. Either way the runtime does
not stop you from making the mistake — the discipline is to <em>make the miss
explicit</em>, detecting it and throwing a meaningful error instead of leaving
it for the caller to trip over.</p>`,

  cpp: `class NotFoundError : public std::runtime_error {
public:
  explicit NotFoundError(const std::string& msg) : std::runtime_error(msg) {}
};
class ValidationError : public std::runtime_error {
public:
  explicit ValidationError(const std::string& msg) : std::runtime_error(msg) {}
};

struct Task {
  int id;
  std::string title;
  int priority;
  bool done;
};

struct Summary {
  int total;
  int done;
  int pending;
};

class TaskStore {
  std::vector<Task> tasks;
  int nextId = 1;

public:
  Task& add(const std::string& title, int priority = 1) {
    if (title.find_first_not_of(" \\t\\n") == std::string::npos) {
      throw ValidationError("title required");
    }
    tasks.push_back({nextId++, title, priority, false});
    return tasks.back();
  }

  Task& get(int id) {
    auto it = std::find_if(tasks.begin(), tasks.end(),
                            [id](const Task& t) { return t.id == id; });
    if (it == tasks.end()) throw NotFoundError("no task " + std::to_string(id));
    return *it;
  }

  Task& complete(int id) {
    Task& task = get(id);
    task.done = true;
    return task;
  }

  std::vector<Task> pending() {
    std::vector<Task> result;
    std::copy_if(tasks.begin(), tasks.end(), std::back_inserter(result),
                 [](const Task& t) { return !t.done; });
    return result;
  }

  Summary summary() {
    return std::accumulate(
        tasks.begin(), tasks.end(), Summary{0, 0, 0},
        [](Summary acc, const Task& t) {
          acc.total += 1;
          acc.done += t.done ? 1 : 0;
          acc.pending += t.done ? 0 : 1;
          return acc;
        });
  }
};`,

  task: `
<p>Build the plain-JavaScript version of the same store. Define two error
classes and one <code>TaskStore</code> class.</p>
<ol>
  <li>Define <code>ValidationError</code> and <code>NotFoundError</code>, each a

  <li><code>TaskStore</code>'s constructor sets <code>this.tasks = []</code> and

  <li><code>get(id)</code>: use <code>find</code> to locate the task; if there is

  <li><code>summary()</code>: use <code>reduce</code> to return

</ol>`,

  exportNames: ["TaskStore", "ValidationError", "NotFoundError"],

  requirements: [
    { pattern: /class\s+TaskStore/, message: "Define a TaskStore class" },
    { pattern: /class\s+\w*Error\s+extends\s+Error/, message: "Define a custom Error subclass" },
    { pattern: /\.(find|filter|reduce)\s*\(/, message: "Use array-iteration methods (find/filter/reduce)" },
    { pattern: /throw\s+new/, message: "Throw a custom error on bad input or a missing task" },
  ],

  tests: [
    { name: "add returns a task with id 1, not done", run: (x) => {
        const store = new x.TaskStore();
        expectDeepEqual(store.add("Write", 2), { id: 1, title: "Write", priority: 2, done: false });
      } },
    { name: "ids auto-increment across adds", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        expectEqual(store.add("b").id, 2);
      } },
    { name: "add with an empty title throws ValidationError", run: (x) => {
        const store = new x.TaskStore();
        try { store.add("   "); } catch (e) { expectTruthy(e instanceof x.ValidationError); return; }
        throw new Error("expected add('   ') to throw");
      } },
    { name: "get throws NotFoundError for a missing id", run: (x) => {
        const store = new x.TaskStore();
        try { store.get(99); } catch (e) { expectTruthy(e instanceof x.NotFoundError); return; }
        throw new Error("expected get(99) to throw");
      } },
    { name: "complete marks a task done", run: (x) => {
        const store = new x.TaskStore();
        const t = store.add("ship");
        expectEqual(store.complete(t.id).done, true);
      } },
    { name: "pending excludes completed tasks", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        const b = store.add("b");
        store.complete(b.id);
        expectDeepEqual(store.pending().map((t) => t.title), ["a"]);
      } },
    { name: "summary counts total/done/pending", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        store.add("b");
        store.complete(store.add("c").id);
        expectDeepEqual(store.summary(), { total: 3, done: 1, pending: 2 });
      } },
    { name: "custom errors carry a name, message, and stack", run: (x) => {
        const err = new x.NotFoundError("nope");
        expectTruthy(err instanceof x.NotFoundError);
        expectEqual(err.name, "NotFoundError");
        expectEqual(err.message, "nope");
        expectTruthy(typeof err.stack === "string");
      } },
  ],

  solution: `class ValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = "ValidationError";
  }
}

class NotFoundError extends Error {
  constructor(message) {
    super(message);
    this.name = "NotFoundError";
  }
}

class TaskStore {
  constructor() {
    this.tasks = [];
    this.nextId = 1;
  }

  add(title, priority = 1) {
    if (typeof title !== "string" || title.trim() === "") {
      throw new ValidationError("title must be a non-empty string");
    }
    const task = { id: this.nextId++, title, priority, done: false };
    this.tasks.push(task);
    return task;
  }

  get(id) {
    const task = this.tasks.find((t) => t.id === id);
    if (!task) {
      throw new NotFoundError("no task with id " + id);
    }
    return task;
  }

  complete(id) {
    const task = this.get(id);
    task.done = true;
    return task;
  }

  pending() {
    return this.tasks.filter((t) => !t.done);
  }

  summary() {
    return this.tasks.reduce(
      (acc, t) => {
        acc.total += 1;
        if (t.done) acc.done += 1;
        else acc.pending += 1;
        return acc;
      },
      { total: 0, done: 0, pending: 0 }
    );
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>JavaScript</th></tr>
  <tr><td>Task shape</td><td><code>struct Task</code>, fields fixed at compile time</td><td>whatever object you construct</td></tr>
  <tr><td>Bad input</td><td>type mismatches rejected at compile time</td><td>rejected only if you <code>throw</code></td></tr>
  <tr><td>Missing lookup</td><td><code>find_if</code> compiles fine even if you forget to check the iterator against <code>end()</code></td><td><code>find</code> returns <code>undefined</code> silently</td></tr>
  <tr><td>Aggregate</td><td><code>std::accumulate</code> with a struct accumulator</td><td><code>reduce</code> with a seed object</td></tr>
</table>
<p>The lesson of the whole course lives in one line: <code>this.tasks.find(...)</code>
returns a task <em>or</em> <code>undefined</code>, and the runtime will not stop
you from reading <code>.done</code> off <code>undefined</code>. The
<code>if (!task) throw</code> guard is you doing, by hand, the same check a
careful C++ programmer does by hand too — comparing an iterator to
<code>end()</code> before dereferencing it. The difference is what happens when
you skip the check: C++ gives you undefined behavior, JavaScript gives you a
catchable <code>TypeError</code>. Neither language stops you from forgetting;
JavaScript is just kinder about the consequences.</p>
<p>Two other habits carried through here. Custom <code>Error</code> subclasses
let callers tell <em>why</em> something failed with <code>instanceof</code>
instead of string-matching messages — the rough equivalent of deriving from
<code>std::runtime_error</code> and catching by specific exception type — but
only because each constructor sets <code>this.name</code>. And the array
methods (<code>find</code>, <code>filter</code>, <code>reduce</code>) stayed the
workhorses: they read the same as the <code>&lt;algorithm&gt;</code> calls you'd
reach for in C++ (<code>find_if</code>, <code>copy_if</code>,
<code>accumulate</code>), they just no longer promise anything about what the
elements are. That promise is now your job.</p>`,
