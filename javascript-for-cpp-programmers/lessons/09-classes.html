const LESSON = {
  number: 9,
  title: "Classes",

  intro: `
<p>C++ private members are enforced by the compiler — <code>obj.balance</code>
outside the class simply fails to build. JavaScript classes originally had no
equivalent at all: every field was reachable from outside, and "private" was
just a naming convention (a leading underscore) the language did nothing to
enforce. That changed with ES2022's <code>#private</code> fields, which are
checked by the engine itself, not by a separate build step — reaching for
<code>obj.#balance</code> outside the class body is a syntax error, and there
is no bracket-notation trick that reaches around it the way <code>obj["balance"]</code>
can reach around a compiled-away access modifier in other languages.</p>
<table>
  <tr><th>C++</th><th>JavaScript</th></tr>
  <tr><td><code>private:<br>&nbsp;&nbsp;double balance;</code></td><td><code>#balance;</code> (truly private) or a plain field</td></tr>
  <tr><td><code>Counter(int x) : x(x) {}</code> (member-initializer list)</td><td>no member-initializer list — assign <code>this.x</code> yourself in the body</td></tr>
  <tr><td><code>const std::string id;</code></td><td>plain field (no compiler-enforced immutability)</td></tr>
  <tr><td><code>int area() const { … }</code></td><td><code>get area() { … }</code> (property syntax, not a method call)</td></tr>
  <tr><td><code>static int count;</code> + out-of-class definition</td><td><code>static count = 0;</code> (one line, no separate definition)</td></tr>
</table>
<p>Because JavaScript getters use property syntax instead of a method call, and
because a static field needs no separate out-of-class definition, the runtime
version below ends up shorter than the C++ despite doing the same job. The one
class feature with no C++ equivalent at all is <code>#private</code> fields —
worth getting comfortable with, since it is JavaScript's only real access-control
mechanism at runtime.</p>`,

  cpp: `class Counter {
private:
  static int instances;
  std::string label;
  int count = 0;

public:
  Counter(std::string label, int start = 0) : label(label), count(start) {
    instances++;
  }

  int increment() {
    count++;
    return count;
  }

  int value() const {
    return count;
  }

  std::string describe() const {
    return label + ": " + std::to_string(count);
  }

  static void reset() {
    instances = 0;
  }
};

int Counter::instances = 0;`,

  task: `
<p>Write the plain-JavaScript runtime version of a <code>Counter</code> class.
No types, no <code>private:</code> section, no member-initializer list —
just the runtime constructs.</p>
<ol>
  <li>A <code>constructor(label, start = 0)</code> that stores the label and
      seeds a <strong><code>#count</code> private field</strong> from
      <code>start</code>. It must also bump a
      <strong><code>static instances</code> field</strong> each time an instance
      is created.</li>
  <li>An instance method <code>increment()</code> that adds 1 to
      <code>#count</code> and returns the new value.</li>
  <li>A <strong>getter</strong> <code>value</code> that returns the current
      <code>#count</code>.</li>
  <li>An instance method <code>describe()</code> returning
      <code>"&lt;label&gt;: &lt;count&gt;"</code>, e.g. <code>"hits: 3"</code>.</li>
  <li>A <strong>static method</strong> <code>reset()</code> that sets
      <code>Counter.instances</code> back to <code>0</code>.</li>
</ol>
<p>Export the class as <code>Counter</code>.</p>`,

  starter: `class Counter {
  // static field: total instances created

  // #private field: the current count

  constructor(label, start = 0) {
    // TODO: store label, seed #count from start, bump the static counter
  }

  increment() {
    // TODO: add 1 to #count and return the new value
  }

  get value() {
    // TODO: return the current count
  }

  describe() {
    // TODO: return "<label>: <count>"
    return "";
  }

  static reset() {
    // TODO: set instances back to 0
  }
}
`,

  exportNames: ["Counter"],

  requirements: [
    { pattern: /#count/, message: "Use a #private field named #count" },
    { pattern: /static\s+instances/, message: "Declare a static field named instances" },
    { pattern: /get\s+value\s*\(/, message: "Define a getter named value" },
    { pattern: /static\s+reset\s*\(/, message: "Define a static method named reset" },
  ],

  tests: [
    {
      name: "constructor seeds count and value getter reads it",
      run: (x) => {
        const c = new x.Counter("hits", 5);
        expectEqual(c.value, 5);
      },
    },
    {
      name: "start defaults to 0",
      run: (x) => {
        const c = new x.Counter("hits");
        expectEqual(c.value, 0);
      },
    },
    {
      name: "increment returns the new value and mutates count",
      run: (x) => {
        const c = new x.Counter("hits", 0);
        expectEqual(c.increment(), 1);
        expectEqual(c.increment(), 2);
        expectEqual(c.value, 2);
      },
    },
    {
      name: "describe formats label and count",
      run: (x) => {
        const c = new x.Counter("hits", 2);
        c.increment();
        expectEqual(c.describe(), "hits: 3");
      },
    },
    {
      name: "static instances counts constructions; reset zeroes it",
      run: (x) => {
        x.Counter.reset();
        new x.Counter("a");
        new x.Counter("b");
        expectEqual(x.Counter.instances, 2);
        x.Counter.reset();
        expectEqual(x.Counter.instances, 0);
      },
    },
    {
      name: "#count is truly private (not an own enumerable property)",
      run: (x) => {
        const c = new x.Counter("hits", 9);
        expectDeepEqual(Object.keys(c), ["label"]);
      },
    },
  ],

  solution: `class Counter {
  static instances = 0;
  #count = 0;

  constructor(label, start = 0) {
    this.label = label;
    this.#count = start;
    Counter.instances++;
  }

  increment() {
    this.#count++;
    return this.#count;
  }

  get value() {
    return this.#count;
  }

  describe() {
    return \`\${this.label}: \${this.#count}\`;
  }

  static reset() {
    Counter.instances = 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>JavaScript runtime</th></tr>
  <tr><td>Visibility</td><td><code>private:</code> section — enforced by the compiler</td><td><code>#x</code> — enforced by the engine</td></tr>
  <tr><td>Member init</td><td><code>Counter(int x) : x(x) {}</code></td><td>write <code>this.x = x</code> by hand in the body</td></tr>
  <tr><td>Field types</td><td><code>int count = 0;</code></td><td><code>count = 0</code> (no declared type)</td></tr>
  <tr><td>Getter</td><td><code>int value() const { … }</code> (a method call)</td><td><code>get value()</code> (property syntax)</td></tr>
  <tr><td>Static</td><td><code>static int count;</code> + <code>int Counter::count = 0;</code></td><td><code>static count = 0;</code> (one line, no separate definition)</td></tr>
</table>
<p>A few runtime facts worth internalizing. <code>#count</code> is not a string
key — <code>c["#count"]</code> is <code>undefined</code>, and reaching for
<code>#count</code> from outside the class body is a <em>syntax</em> error —
much like a C++ compiler refusing to build <code>obj.count</code> against a
<code>private:</code> member, except the JavaScript engine enforces it while
running, not while linking. That is why <code>Object.keys(c)</code> lists only
<code>label</code>. Static members live on the class object itself
(<code>Counter.instances</code>), not on instances — there is no per-instance
storage the way a non-static C++ member gets a slot in every object — so
<code>this.instances</code> inside a method would be <code>undefined</code>;
reference the class by name instead. And remember that C++'s member-initializer
list and <code>const</code> members have no JavaScript output at all: in plain
JS you assign fields yourself in the constructor body, and "read-only" is a
discipline, not a guarantee, short of hiding the value behind
<code>#private</code> and simply never writing a setter for it.</p>`,
};
