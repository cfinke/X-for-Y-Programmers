  title: "Strings",

  intro: `
<p>C++'s <code>std::string</code> and JavaScript's string are both meant to
hold text, but they behave very differently at runtime. In C++ a
<code>std::string</code> is a mutable, owned buffer of bytes — you can index
into it, resize it, and modify it in place, and the compiler enforces the
type. A JavaScript string is an immutable sequence of UTF-16 code units:
every "mutating" method actually returns a brand-new string, and there is no
compiler to catch a typo or a missing return value. Everything you do to a
string is a plain method call on the built-in <code>String.prototype</code>.</p>
<table>
  <tr><th>C++</th><th>JavaScript</th></tr>
  <tr><td><code>std::string s = "Ada";</code></td><td><code>const s = "Ada";</code></td></tr>
  <tr><td><code>size_t n = s.size();</code></td><td><code>const n = s.length;</code></td></tr>
  <tr><td><code>s.substr(0, 3)</code></td><td><code>s.slice(0, 3)</code></td></tr>
  <tr><td>mutates <code>s</code> in place (e.g. <code>s += "!"</code>)</td><td>always returns a new string</td></tr>
</table>
<p>Two runtime facts worth keeping in mind. First, strings are immutable:
<code>toUpperCase()</code>, <code>trim()</code>, <code>replace()</code> and
friends never mutate — they return a brand-new string, so you must use the
return value (there is no in-place <code>+=</code> or index assignment).
Second, a template literal (<code>\`hello \${name}\`</code>) calls
<code>String()</code> on every interpolated value, which is why
<code>\`\${null}\`</code> quietly becomes <code>"null"</code> instead of a
compile error like you'd get trying to stream a null pointer with
<code>operator&lt;&lt;</code>.</p>`,

  cpp: `std::string initials(const std::string& fullName) {
    std::string trimmed = trim(fullName);
    std::istringstream iss(trimmed);
    std::string part, result;
    while (iss >> part) {
        result += std::toupper(part[0]);
    }
    return result;
}

std::string slug(const std::string& title) {
    std::string s = toLower(trim(title));
    s = std::regex_replace(s, std::regex("\\\\s+"), "-");
    return s;
}`,

  task: `
<p>Build a few small, pure string helpers — plain JavaScript, no annotations.
Each returns a new string (or number) and mutates nothing.</p>
<ol>
  <li><code>shout(text)</code> — trim the surrounding whitespace and return the

  <li><code>initials(fullName)</code> — split the name on spaces and return the

  <li><code>slug(title)</code> — trim, lowercase, and replace every run of

  <li><code>lastName(fullName)</code> — return everything after the last space

  <li><code>mentions(text, needle)</code> — return <code>true</code> if

</ol>`,

  exportNames: ["shout", "initials", "slug", "lastName", "zeroPad", "mentions"],

  requirements: [
    { pattern: /toUpperCase\s*\(/, message: "Use toUpperCase() to uppercase text" },
    { pattern: /toLowerCase\s*\(/, message: "Use toLowerCase() for case-insensitive work" },
    { pattern: /\.trim\s*\(/, message: "Use trim() to strip surrounding whitespace" },

  tests: [
    { name: 'shout("  hi  ") is "HI"', run: (x) => expectEqual(x.shout("  hi  "), "HI") },
    { name: 'shout("Hello, World") is "HELLO, WORLD"', run: (x) => expectEqual(x.shout("Hello, World"), "HELLO, WORLD") },
    { name: 'initials("ada lovelace") is "AL"', run: (x) => expectEqual(x.initials("ada lovelace"), "AL") },
    { name: 'initials("Grace Brewster Hopper") is "GBH"', run: (x) => expectEqual(x.initials("Grace Brewster Hopper"), "GBH") },
    { name: 'slug("  Hello  World ") is "hello-world"', run: (x) => expectEqual(x.slug("  Hello  World "), "hello-world") },
    { name: 'lastName("Ada Lovelace") is "Lovelace"', run: (x) => expectEqual(x.lastName("Ada Lovelace"), "Lovelace") },
    { name: 'lastName("Grace Brewster Hopper") is "Hopper"', run: (x) => expectEqual(x.lastName("Grace Brewster Hopper"), "Hopper") },
    { name: 'zeroPad(7, 3) is "007"', run: (x) => expectEqual(x.zeroPad(7, 3), "007") },
    { name: 'zeroPad(1234, 3) is "1234" (already wide enough)', run: (x) => expectEqual(x.zeroPad(1234, 3), "1234") },
    { name: 'mentions("Hello World", "world") is true', run: (x) => expectTruthy(x.mentions("Hello World", "world")) },
    { name: 'mentions("Hello World", "xyz") is false', run: (x) => expectEqual(x.mentions("Hello World", "xyz"), false) },
  ],

  solution: `function shout(text) {
  return text.trim().toUpperCase();
}

function initials(fullName) {
  return fullName
    .trim()
    .split(" ")
    .map((part) => part[0].toUpperCase())
    .join("");
}

function slug(title) {
  return title.trim().toLowerCase().replace(/\\s+/g, "-");
}

function lastName(fullName) {
  const trimmed = fullName.trim();
  const at = trimmed.lastIndexOf(" ");
  return at === -1 ? trimmed : trimmed.slice(at + 1);
}

function zeroPad(value, width) {
  return String(value).padStart(width, "0");
}

function mentions(text, needle) {
  return text.toLowerCase().includes(needle.toLowerCase());
}
`,

  notes: `
<table>
  <tr><th>Task</th><th>C++ instinct</th><th>JavaScript runtime</th></tr>
  <tr><td>Uppercase</td><td><code>std::transform(s.begin(), s.end(), s.begin(), ::toupper)</code></td><td><code>s.toUpperCase()</code> — new string</td></tr>
  <tr><td>Contains?</td><td><code>s.find(x) != std::string::npos</code></td><td><code>s.includes(x)</code> — case-sensitive</td></tr>
  <tr><td>Substring</td><td><code>s.substr(a, len)</code></td><td><code>s.slice(a, b)</code>, negatives count from end</td></tr>
  <tr><td>Split</td><td>manual loop with <code>std::stringstream</code> or <code>find</code></td><td><code>s.split(sep)</code> — array of strings</td></tr>
  <tr><td>Pad</td><td>manual loop prepending <code>'0'</code> until <code>size() &gt;= n</code></td><td>no-op if already &ge; <code>n</code></td></tr>
</table>
<p>A few runtime details that C++'s standard library handles differently.
<code>indexOf</code> returns <code>-1</code> when the substring is missing
(instead of <code>std::string::npos</code>), so guard for it before slicing —
there is no unsigned wraparound trap like comparing an <code>int</code>
against <code>npos</code>. <code>replace(str, ...)</code> only replaces the
<em>first</em> match; use a regex with the <code>/g</code> flag (or
<code>replaceAll</code>) for every match, much like choosing between
<code>std::regex_replace</code>'s default (all matches) and a manual
single-replace loop. And because JavaScript strings are immutable — unlike
<code>std::string</code>, which you can mutate with <code>+=</code> or
<code>operator[]</code> — forgetting to assign the return value of
<code>trim()</code> or <code>replace()</code> is a classic bug: the original
string is simply unchanged, with no compiler warning about a discarded
result.</p>`,
