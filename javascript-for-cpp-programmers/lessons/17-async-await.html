  number: 17,
  title: "Async & Await",

  intro: `
<p>In C++, asynchronous work is typed explicitly: <code>std::future&lt;T&gt;</code>,
returned by <code>std::async</code>, and <code>.get()</code> blocks until it unwraps
to <code>T</code>, with the compiler tracking that type the whole way through.
JavaScript's <code>await</code> looks like <code>.get()</code> in shape but runs on
a completely different machine — there is no OS thread launched per
<code>async</code> function, no thread pool. A single-threaded event loop and
microtask queue interleave every pending <code>async</code> function on the one
thread, and <code>await</code> just suspends until that promise's microtask runs.
At runtime, <code>await</code> works on <em>any</em> thenable and hands you
whatever value it settles to, number, string, object, or <code>undefined</code> —
nothing enforces that shape the way <code>std::future&lt;T&gt;</code> does.</p>
<table>
  <tr><th>C++</th><th>JavaScript</th></tr>
  <tr><td><code>std::future&lt;int&gt; f();</code></td><td><code>async function f()</code></td></tr>
  <tr><td><code>int n = f().get();</code></td><td><code>const n = await f();</code></td></tr>
  <tr><td>launch two futures, then <code>fa.get(); fb.get();</code></td><td><code>Promise.all([a, b])</code></td></tr>
  <tr><td><code>.get()</code> rethrows whatever the task threw</td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today. First, <code>await</code> in sequence is
<em>serial</em>: each line waits for the previous promise to settle before the next
even starts. To run independent work concurrently you hand the promises to
<code>Promise.all</code>, which waits for all of them and resolves to an array of
their results. Second, a rejected promise surfaces as a thrown value at the
<code>await</code>, so a plain <code>try/catch</code> catches it — and if you do not
catch it, it propagates out of your <code>async</code> function as a rejected
promise the caller must handle.</p>`,

  cpp: `#include <future>
#include <stdexcept>

std::future<int> doubleAsync(int n) {
  return std::async(std::launch::async, [n] { return n * 2; });
}

int sumDoubled(int a, int b) {
  auto fx = doubleAsync(a);
  auto fy = doubleAsync(b);
  return fx.get() + fy.get();
}

int safeDouble(int n) {
  try {
    return doubleAsync(n).get();
  } catch (const std::exception&) {
    return 0;
  }
}`,

<ol>
  <li><code>double(n)</code> — an <code>async</code> function that returns

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>JavaScript</th></tr>
  <tr><td>Return of async work</td><td><code>std::future&lt;T&gt;</code></td><td>a promise; contents unlabeled</td></tr>
  <tr><td>Awaited value</td><td><code>.get()</code> returns exactly <code>T</code></td><td>whatever it settles to</td></tr>
  <tr><td>Serial awaits</td><td>call <code>std::async</code> for b only after <code>fa.get()</code> returns</td><td>b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td>launch every <code>std::async</code> first, <code>.get()</code> each after</td><td><code>Promise.all([...])</code>; resolves to a results array</td></tr>
  <tr><td>Caught rejection</td><td><code>.get()</code> rethrows; <code>catch (const std::exception&amp;)</code></td><td><code>catch (e)</code> — any thrown value</td></tr>
</table>
<p>The most common runtime performance bug the compiler will never flag: awaiting
independent work in a loop or in sequence when it could run concurrently. Two
serial <code>await</code>s take as long as the sum of both promises;
<code>Promise.all</code> takes as long as the slowest one. Reach for
<code>Promise.all</code> whenever the tasks do not depend on each other.</p>
<p>On errors: a rejected promise becomes a thrown value at its <code>await</code>.
If nothing catches it, your <code>async</code> function returns a
<em>rejected</em> promise — the failure propagates to whoever awaits you.
C++'s <code>std::future&lt;T&gt;</code> types the resolved value but the exception
is whatever the task threw — <code>.get()</code> simply rethrows it, so a runtime
<code>catch (const std::exception&amp;)</code> (or a bare <code>catch (...)</code>)
must be ready for anything: a <code>std::runtime_error</code>, a custom exception
type, even something that is not derived from <code>std::exception</code> at all —
JavaScript's <code>catch (e)</code> has the same problem, since any value at all
can be thrown.</p>`,
