const LESSON = {
  number: 16,
  title: "Dataclasses",

  intro: `
<p>In Ruby you reach for <code>Struct.new</code> when you just want to bundle a
few fields together — a plain data-holder with generated accessors, an
<code>initialize</code>, a readable <code>inspect</code>, and structural
<code>==</code>, but no other behaviour. Python's answer is the
<code>@dataclass</code> decorator from the <code>dataclasses</code> module. You
declare the fields with class-level type annotations, and the decorator writes
the same kind of boilerplate for you: an <code>__init__</code> that assigns
every field, a readable <code>__repr__</code>, and an <code>__eq__</code> that
compares by <em>value</em> instead of identity.</p>
<table>
  <tr><th>Ruby</th><th>Python</th></tr>
  <tr><td><code>Struct.new(:x, :y)</code></td><td><code>@dataclass</code> + <code>class Point:</code></td></tr>
  <tr><td><code>:x</code> (untyped member)</td><td><code>x: int</code></td></tr>
  <tr><td>custom <code>initialize</code> with <code>tags ||= []</code></td><td><code>tags: list = field(default_factory=list)</code></td></tr>
  <tr><td><code>point.freeze</code></td><td><code>@dataclass(frozen=True)</code></td></tr>
  <tr><td><code>==</code> built in via <code>Struct</code></td><td>value <code>==</code> for free</td></tr>
</table>
<p>Ordinary fields with a default look like Ruby keyword-argument defaults
(<code>def initialize(z: 0)</code>), except a Python dataclass field's default
lives right on the class-level annotation line
(<code>z: int = 0</code>). But a <em>mutable</em> default — a list or dict —
cannot be written inline, because one shared object would leak across every
instance, the same trap a Ruby <code>tags = []</code> default argument falls
into. Use <code>field(default_factory=list)</code>: the factory is called
fresh for each new instance. Pass <code>frozen=True</code> to make instances
immutable (assigning a field raises, the same idea as calling
<code>.freeze</code> on a Ruby object), and <code>order=True</code> to also
generate <code>&lt;</code>, <code>&lt;=</code>, <code>&gt;</code>,
<code>&gt;=</code> that compare fields tuple-wise, top to bottom — in Ruby
you'd get that by mixing in <code>Comparable</code> and writing
<code>&lt;=&gt;</code> yourself.</p>`,

  ruby: `Point = Struct.new(:x, :y)

a = Point.new(1, 2)
b = Point.new(1, 2)
# structural equality is built in, no hack needed:
a == b # true

# Immutable "value object":
Origin = Struct.new(:x, :y)
origin = Origin.new(0, 0).freeze`,

  task: `
<p>Import from <code>dataclasses</code> and build two dataclasses:</p>
<ol>
  <li><code>Point</code> with fields <code>x: int</code> and <code>y: int</code>,
      plus a <code>label: str = ""</code> that defaults to the empty string.
      Decorate it with <code>@dataclass</code>. Also add
      <code>order=True</code> so points can be sorted, and give it a method
      <code>translate(self, dx, dy)</code> that returns a <em>new</em>
      <code>Point</code> shifted by <code>dx</code>/<code>dy</code> (same
      label).</li>
  <li><code>Polygon</code> with a field <code>points</code> that defaults to an
      empty list via <code>field(default_factory=list)</code>, and a method
      <code>add(self, point)</code> that appends a point to that list.</li>
  <li><code>Color</code>, a <strong>frozen</strong> dataclass
      (<code>@dataclass(frozen=True)</code>) with fields <code>r: int</code>,
      <code>g: int</code>, <code>b: int</code> — an immutable value object.</li>
</ol>`,

  starter: `from dataclasses import dataclass, field


# 1. Point: x, y, label="" ; order=True ; translate(dx, dy) -> new Point
class Point:
    pass  # TODO


# 2. Polygon: points defaults to [] via default_factory ; add(point)
class Polygon:
    pass  # TODO


# 3. Color: frozen dataclass with r, g, b
class Color:
    pass  # TODO
`,

  requirements: [
    { pattern: /@dataclass/, message: "Use the @dataclass decorator" },
    { pattern: /default_factory\s*=\s*list/, message: "Give Polygon.points a default_factory=list" },
    { pattern: /frozen\s*=\s*True/, message: "Make Color a frozen dataclass (frozen=True)" },
  ],

  tests: [
    { name: "Point auto __init__ sets fields and default label", code: "    p = Point(1, 2)\n    expect_eq(p.x, 1)\n    expect_eq(p.y, 2)\n    expect_eq(p.label, \"\")" },
    { name: "Points compare by value, not identity", code: "    expect_eq(Point(1, 2), Point(1, 2))\n    expect_true(Point(1, 2) != Point(1, 3))" },
    { name: "translate returns a new shifted Point", code: "    p = Point(1, 2, \"a\")\n    q = p.translate(10, 20)\n    expect_eq(q, Point(11, 22, \"a\"))\n    expect_eq(p, Point(1, 2, \"a\"))" },
    { name: "order=True enables sorting", code: "    pts = sorted([Point(2, 1), Point(1, 9), Point(1, 3)])\n    expect_eq(pts, [Point(1, 3), Point(1, 9), Point(2, 1)])\n    expect_true(Point(1, 3) < Point(2, 0))" },
    { name: "Polygon default_factory gives independent lists", code: "    a = Polygon()\n    b = Polygon()\n    a.add(Point(0, 0))\n    expect_eq(a.points, [Point(0, 0)])\n    expect_eq(b.points, [])" },
    { name: "Color is frozen and immutable", code: "    c = Color(255, 0, 0)\n    expect_eq(c, Color(255, 0, 0))\n    raised = False\n    try:\n        c.r = 0\n    except Exception:\n        raised = True\n    expect_true(raised)" },
  ],

  solution: `from dataclasses import dataclass, field


@dataclass(order=True)
class Point:
    x: int
    y: int
    label: str = ""

    def translate(self, dx, dy):
        return Point(self.x + dx, self.y + dy, self.label)


@dataclass
class Polygon:
    points: list = field(default_factory=list)

    def add(self, point):
        self.points.append(point)


@dataclass(frozen=True)
class Color:
    r: int
    g: int
    b: int
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Python</th></tr>
  <tr><td>Data holder</td><td><code>Struct.new(:x, :y)</code></td><td><code>@dataclass</code></td></tr>
  <tr><td>Field</td><td><code>:x</code> (untyped)</td><td><code>x: int</code></td></tr>
  <tr><td>Default</td><td>keyword default in custom <code>initialize</code></td><td><code>label: str = ""</code></td></tr>
  <tr><td>Mutable default</td><td>custom <code>initialize</code> with <code>tags ||= []</code></td><td><code>field(default_factory=list)</code></td></tr>
  <tr><td>Immutable</td><td><code>point.freeze</code></td><td><code>frozen=True</code></td></tr>
  <tr><td>Value equality</td><td><code>==</code> built in via <code>Struct</code></td><td><code>__eq__</code> for free</td></tr>
  <tr><td>Ordering</td><td><code>include Comparable</code> + <code>&lt;=&gt;</code></td><td><code>order=True</code></td></tr>
</table>
<p>The annotations are what the decorator reads to find your fields — they are
not enforced at runtime. Python type hints are documentation, not a runtime
contract, much like a Ruby <code>Struct</code> member: declaring <code>:x</code>
reserves a slot and generates an accessor, but nothing stops any type of object
from ending up there. A field with a default must come after all fields
without one (same rule as default function parameters), which is why
<code>label</code> sits last on <code>Point</code>.</p>
<p><code>order=True</code> generates the comparison operators by treating each
instance as a tuple of its fields in declaration order, so <code>Point(1, 3) &lt;
Point(1, 9)</code> falls through to the second field. A <code>frozen=True</code>
dataclass also becomes hashable, so its instances can be dict keys or set
members — handy for value objects like <code>Color</code>. If you need a modified
copy of a frozen instance, reach for <code>dataclasses.replace(c, r=0)</code>
rather than mutating in place.</p>`,
};
