  number: 7,
  title: "Classes",

  intro: `
<p>Python classes will feel structurally familiar, but the wiring is more
explicit. Ruby has <code>initialize</code>; Python has a method named
<code>__init__</code> — both run automatically when you create an instance.
The bigger difference is the receiver: Ruby methods reach instance state
implicitly through <code>@ivars</code> (and use <code>self</code> only when
you need to, such as calling a setter), while every Python method must
declare its receiver as an explicit first parameter, spelled <code>self</code>
by convention, and every attribute access is spelled out as
<code>self.something</code>. You create instance attributes by assigning to
<code>self.something</code>, usually inside <code>__init__</code>; there is no
built-in shortcut like <code>attr_accessor</code> for generating them.</p>
<table>
  <tr><th>Ruby</th><th>Python</th></tr>
  <tr><td><code>class Dog</code></td><td><code>class Dog:</code></td></tr>
  <tr><td><code>def initialize(name)</code></td><td><code>def __init__(self, name):</code></td></tr>
  <tr><td><code>@name = name</code></td><td><code>self.name = name</code></td></tr>
  <tr><td><code>def bark; … ; end</code></td><td><code>def bark(self): …</code></td></tr>
  <tr><td><code>Dog.new("Rex")</code></td><td><code>Dog("Rex")</code></td></tr>
  <tr><td><code>@@species = "…"</code></td><td><code>species = "…"</code> (in class body)</td></tr>
</table>
<p>A name assigned directly in the class body (not on <code>self</code>) is a
<em>class attribute</em> — shared by every instance, like a Ruby
<code>@@class_variable</code>, and reachable as <code>self.species</code> or
<code>Dog.species</code>. Notice you call the class without <code>new</code>:
<code>Dog("Rex")</code> runs <code>__init__</code> and hands back the instance,
in place of Ruby's <code>Dog.new("Rex")</code>.</p>
<p>Python has no <code>private</code> keyword. Ruby's <code>private</code> is
at least enforced by the interpreter for calls with an explicit receiver;
Python's encapsulation is <em>by convention only</em>: a leading underscore
(<code>_balance</code>) signals "internal, please don't touch." Nothing
enforces it — it is a promise between programmers, not a runtime rule.</p>`,

  ruby: `class Account
  @@bank = "Pygmy Bank"

  attr_reader :owner

  def initialize(owner, opening)
    @owner = owner
    @balance = opening
  end

  def deposit(amount)
    @balance += amount
  end

  def balance
    @balance
  end
end

a = Account.new("Ada", 100)
a.deposit(50)
a.balance # 150`,

  task: `
<p>Write an <code>Account</code> class:</p>
<ol>
  <li>Give it a <strong>class attribute</strong> <code>bank = "Pygmy Bank"</code>
      shared by all instances.</li>
  <li><code>__init__(self, owner, opening)</code> stores <code>owner</code> as a
      public attribute and the opening amount in a "private-by-convention"
      attribute <code>_balance</code>.</li>
  <li><code>deposit(self, amount)</code> adds to <code>_balance</code> and
      returns the new balance.</li>
  <li><code>withdraw(self, amount)</code> subtracts from <code>_balance</code> if
      there are sufficient funds and returns <code>True</code>; otherwise it
      leaves the balance untouched and returns <code>False</code>.</li>
  <li><code>balance(self)</code> returns the current <code>_balance</code>.</li>
</ol>`,

  starter: `class Account:

    bank = ""  # TODO

    def __init__(self, owner, opening):
        pass  # TODO: set self.owner and self._balance

    def deposit(self, amount):
        return None  # TODO: add to _balance, return new balance

`,

  requirements: [
    { pattern: /def\s+__init__\s*\(\s*self/, message: "Define __init__(self, ...)" },
    { pattern: /self\._balance/, message: "Store the balance in a _balance attribute (private by convention)" },
    { pattern: /bank\s*=\s*["']Pygmy Bank["']/, message: "Add a class attribute bank = \"Pygmy Bank\"" },
  ],

  tests: [
    { name: "constructs with owner and balance", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.owner, \"Ada\")\n    expect_eq(a.balance(), 100)" },
    { name: "deposit increases balance and returns it", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.deposit(50), 150)\n    expect_eq(a.balance(), 150)" },
    { name: "withdraw succeeds when funds suffice", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.withdraw(40), True)\n    expect_eq(a.balance(), 60)" },
    { name: "withdraw fails when funds insufficient", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.withdraw(500), False)\n    expect_eq(a.balance(), 100)" },
    { name: "bank is a shared class attribute", code: "    a = Account(\"Ada\", 100)\n    b = Account(\"Rob\", 5)\n    expect_eq(a.bank, \"Pygmy Bank\")\n    expect_eq(Account.bank, \"Pygmy Bank\")\n    expect_true(a.bank == b.bank)" },
    { name: "instances hold independent balances", code: "    a = Account(\"Ada\", 100)\n    b = Account(\"Rob\", 5)\n    a.deposit(10)\n    expect_eq(a.balance(), 110)\n    expect_eq(b.balance(), 5)" },
  ],

  solution: `class Account:
    bank = "Pygmy Bank"

    def __init__(self, owner, opening):
        self.owner = owner
        self._balance = opening

    def deposit(self, amount):
        self._balance += amount
        return self._balance

    def withdraw(self, amount):
        if amount > self._balance:
            return False
        self._balance -= amount
        return True

    def balance(self):
        return self._balance
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Python</th></tr>
  <tr><td>Constructor</td><td><code>def initialize(…)</code></td><td><code>def __init__(self, …)</code></td></tr>
  <tr><td>Instantiate</td><td><code>Account.new("Ada")</code></td><td><code>Account("Ada")</code></td></tr>
  <tr><td>Instance field</td><td><code>@owner = …</code></td><td><code>self.owner = …</code></td></tr>
  <tr><td>Method receiver</td><td>implicit <code>@ivars</code>, optional <code>self</code></td><td>explicit first param <code>self</code></td></tr>
  <tr><td>Static / shared</td><td><code>@@bank = …</code></td><td><code>bank = …</code> in class body</td></tr>
  <tr><td>Private</td><td><code>private</code> (enforced on explicit-receiver calls)</td><td><code>_x</code> (convention only)</td></tr>
</table>
<p>The leading underscore is a naming convention, not a barrier —
<code>a._balance</code> is still readable from outside, unlike a Ruby method
marked <code>private</code>, which raises <code>NoMethodError</code> if you
call it with an explicit receiver. Two leading underscores
(<code>__balance</code>) trigger <em>name mangling</em>, rewriting the
attribute to <code>_Account__balance</code> to dodge accidental clashes in
subclasses; it is still reachable, just harder to hit by accident. Prefer the
single underscore for ordinary "internal" state.</p>
<p>One trap: class attributes are shared, so a <em>mutable</em> class attribute
(e.g. <code>tags = []</code> in the class body) is shared across every instance
and mutations leak between them — the same trap a Ruby <code>@@tags = []</code>
class variable falls into. Keep per-instance state on <code>self</code> inside
<code>__init__</code>, and reserve class attributes for constants and truly
shared data like <code>bank</code>.</p>`,
};
