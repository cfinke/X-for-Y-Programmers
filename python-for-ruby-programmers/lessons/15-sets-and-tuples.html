  title: "Sets & Tuples",

  intro: `
<p>Ruby gives you <code>Set</code> as a class you must <code>require "set"</code>
and construct explicitly, and it has no built-in tuple type at all — a "tuple" is
just a plain, still-mutable <code>Array</code> used positionally. Python bakes
both into the language as first-class types with their own literal syntax. A
<em>set</em> is an unordered collection of unique, hashable values written with
braces. A <em>tuple</em> is an immutable, ordered sequence written with commas
(usually wrapped in parentheses).</p>
<table>
  <tr><th>Ruby</th><th>Python</th></tr>
  <tr><td><code>Set.new(["a", "b", "a"])</code></td><td><code>{"a", "b", "a"}</code> &rarr; <code>{"a", "b"}</code></td></tr>
  <tr><td><code>s.add(3)</code> / <code>s &lt;&lt; 3</code></td><td><code>s.add(3)</code></td></tr>
  <tr><td><code>a &amp; b</code></td><td><code>a &amp; b</code></td></tr>
  <tr><td><code>list.uniq</code></td><td><code>list(set(items))</code></td></tr>
  <tr><td><code>t = ["a", 1]</code> (plain Array)</td><td><code>t = ("a", 1)</code></td></tr>
  <tr><td><code>x, y = t</code></td><td><code>x, y = t</code></td></tr>
</table>
<p>Because tuples are immutable and hashable, Python lets you use them as
dictionary keys or set members — something a mutable Ruby <code>Array</code>
technically also allows (Ruby arrays hash by value), but Python plain
<code>list</code>s never can. Set algebra has operator sugar: <code>|</code>
union, <code>&amp;</code> intersection, <code>-</code> difference — the same
operators Ruby's <code>Set</code> already supports. And when a tuple's
positions start to carry meaning, <code>collections.namedtuple</code> gives
each slot a name while staying a real, immutable tuple — Ruby's closest
analogue is <code>Struct.new</code>, though a <code>Struct</code> instance
stays mutable by default.</p>`,

  ruby: `require "set"

tags = Set.new(["a", "b", "a"])   # #<Set: {"a", "b"}>
tags.add("c")

a = Set.new([1, 2, 3])
b = Set.new([2, 3, 4])
both = a & b   # #<Set: {2, 3}>

def dedupe(items)
  items.uniq
end

# tuple: just a plain array, unpacked by position
point = [3, 4]
px, py = point`,

  task: `
<p>Write the Python versions:</p>
<ol>
  <li><code>dedupe(items)</code> &mdash; return a <code>list</code> of the unique
      values in <code>items</code>, using a <code>set</code>.</li>
  <li><code>common_tags(a, b)</code> &mdash; take two lists and return a
      <code>set</code> of the tags that appear in <strong>both</strong>, using set
      intersection (<code>&amp;</code>).</li>
  <li><code>midpoint(p, q)</code> &mdash; each point is a <code>(x, y)</code>
      tuple; unpack them and return the midpoint as a new tuple
      <code>((x1 + x2) / 2, (y1 + y2) / 2)</code>.</li>
  <li>Define a namedtuple <code>Point</code> with fields <code>x</code> and
      <code>y</code>, and write <code>make_point(x, y)</code> that returns a
      <code>Point</code>.</li>
</ol>`,

  starter: `from collections import namedtuple

  requirements: [
    { pattern: /set\s*\(|\{[^}]*\}/, message: "Use a set to remove duplicates" },
    { pattern: /&/, message: "Use set intersection (&) in common_tags" },

  ],

  tests: [
    { name: "dedupe removes duplicates", code: "    expect_eq(sorted(dedupe([1, 2, 2, 3, 3, 3])), [1, 2, 3])" },
    { name: "dedupe on already-unique list", code: "    expect_eq(sorted(dedupe([\"a\", \"b\", \"c\"])), [\"a\", \"b\", \"c\"])" },
    { name: "common_tags returns a set of the overlap", code: "    expect_eq(common_tags([\"py\", \"web\", \"cli\"], [\"web\", \"cli\", \"db\"]), {\"web\", \"cli\"})" },
    { name: "common_tags with no overlap is empty", code: "    expect_eq(common_tags([\"a\"], [\"b\"]), set())" },
    { name: "midpoint unpacks and averages", code: "    expect_eq(midpoint((0, 0), (4, 6)), (2.0, 3.0))" },
    { name: "Point has named fields", code: "    p = make_point(3, 4)\n    expect_eq(p.x, 3)\n    expect_eq(p.y, 4)" },
    { name: "Point is a real tuple", code: "    p = make_point(3, 4)\n    expect_eq(tuple(p), (3, 4))\n    expect_true(p == (3, 4))" },

  solution: `from collections import namedtuple


def dedupe(items):
    return list(set(items))


def common_tags(a, b):
    return set(a) & set(b)


def midpoint(p, q):
    x1, y1 = p
    x2, y2 = q
    return ((x1 + x2) / 2, (y1 + y2) / 2)


Point = namedtuple("Point", ["x", "y"])


def make_point(x, y):
    return Point(x, y)
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Python</th></tr>
  <tr><td>Set literal</td><td><code>Set.new([1, 2])</code></td><td><code>{1, 2}</code> (but <code>{}</code> is an empty dict &mdash; use <code>set()</code>)</td></tr>
  <tr><td>Membership</td><td><code>s.include?(x)</code></td><td><code>x in s</code></td></tr>
  <tr><td>Union / intersection / diff</td><td><code>a | b</code>, <code>a &amp; b</code>, <code>a - b</code></td><td><code>a | b</code>, <code>a &amp; b</code>, <code>a - b</code></td></tr>
  <tr><td>Tuple</td><td>no tuple type &mdash; a plain <code>Array</code> (still mutable)</td><td><code>("a", 1)</code> (truly immutable)</td></tr>
  <tr><td>Unpack</td><td><code>x, y = t</code></td><td><code>x, y = t</code></td></tr>
  <tr><td>Named fields</td><td><code>Struct.new(:x, :y)</code> (mutable by default)</td><td><code>namedtuple("P", ["x", "y"])</code></td></tr>
</table>
<p>Two gotchas. First, <code>{}</code> is an empty <em>dict</em>, not a set &mdash;
the empty set is <code>set()</code>. Ruby sidesteps this ambiguity since a
<code>Set</code> always has to be built with <code>Set.new</code>, never a bare
literal. Second, set elements and tuple entries must be <em>hashable</em>:
numbers, strings, and tuples qualify, but a <code>list</code> or
<code>dict</code> does not, so <code>{[1, 2]}</code> raises
<code>TypeError</code> &mdash; this is actually one place where Python is
stricter than Ruby, since a Ruby <code>Array</code> hashes by value and can sit
inside a <code>Set</code> or serve as a <code>Hash</code> key just fine. That is
exactly why tuples make great dictionary keys and set members in Python while
lists cannot &mdash; e.g. <code>seen = {(0, 0), (1, 2)}</code> to track visited
grid cells. A <code>namedtuple</code> is still a plain tuple under the hood, so
<code>make_point(3, 4) == (3, 4)</code> is <code>True</code> and it unpacks and
indexes like any tuple, but you also get <code>.x</code> / <code>.y</code> access
and a readable <code>repr</code> &mdash; similar to a Ruby <code>Struct</code>,
except the namedtuple can never be mutated after creation.</p>`,
