  title: "Exceptions",

  intro: `
<p>In Ruby you <code>raise</code> any exception and catch it with
<code>rescue</code>, narrowing by naming the class right in the
<code>rescue</code> clause — <code>rescue RangeError =&gt; e</code>. Python works
almost the same way: exceptions are the normal way to signal "this can't be
done," and the <code>except</code> clause selects <em>which</em> exception class
to handle, so narrowing is built into the syntax just like Ruby's
<code>rescue SomeError</code>. Python also adds an <code>else</code> clause (runs
only when no exception was raised) alongside the familiar <code>finally</code>
— renamed from Ruby's <code>ensure</code>.</p>
<table>
  <tr><th>Ruby</th><th>Python</th></tr>
  <tr><td><code>begin … rescue => e … end</code></td><td><code>try:</code> … <code>except:</code> …</td></tr>
  <tr><td><code>rescue RangeError => e</code></td><td><code>except ValueError:</code></td></tr>
  <tr><td><code>raise ArgumentError, "bad"</code></td><td><code>raise ValueError("bad")</code></td></tr>
  <tr><td><code>ensure … end</code></td><td><code>finally:</code></td></tr>
  <tr><td><code>class E &lt; StandardError; end</code></td><td><code>class E(Exception): ...</code></td></tr>
</table>
<p>You catch a specific class with <code>except ValueError:</code>, and you can
bind the instance with <code>except ValueError as err:</code> — the same shape
as Ruby's <code>rescue ValueError => err</code>. Raising is
<code>raise SomeException("message")</code> — same keyword, <code>raise</code>,
as Ruby, but you raise an <em>instance</em>, not a bare class name (though
<code>raise ValueError</code> also works, the way Ruby lets you write
<code>raise ArgumentError</code> without a message). A custom exception is just
a subclass of <code>Exception</code>; an empty body with <code>pass</code> is
enough, where Ruby would just write <code>class E &lt; StandardError; end</code>.</p>`,

  ruby: `class ValidationError < StandardError; end

def check_age(age)
  raise ValidationError, "age must be >= 0" if age < 0
  age
end

def safe_check_age(age)
  check_age(age)
rescue StandardError
  -1 # fallback
end`,

  task: `
<p>Build a validator that raises and a safe wrapper that catches:</p>
<ol>
  <li>Define a custom exception <code>ValidationError</code> that subclasses
      <code>Exception</code> (a <code>pass</code> body is fine).</li>
  <li>Write <code>check_age(age)</code>: if <code>age</code> is not an
      <code>int</code>, <code>raise TypeError</code>; if it is negative,
      <code>raise ValidationError</code>; otherwise return the age.</li>
  <li>Write <code>safe_check_age(age)</code> that calls <code>check_age</code>
      inside <code>try</code>/<code>except</code> and returns <code>-1</code> as
      a fallback if <em>any</em> exception is raised.</li>
  <li>Write <code>parse_int(text)</code> that returns <code>int(text)</code>,
      but catches <code>ValueError</code> and returns <code>0</code> for
      un-parseable text. Use an <code>else</code> and/or <code>finally</code>
      clause if you like.</li>
</ol>`,

    { name: "check_age('x') raises TypeError", code: "    raised = False\n    try:\n        check_age(\"x\")\n    except TypeError:\n        raised = True\n    expect_true(raised)" },
    { name: "ValidationError is an Exception", code: "    expect_true(issubclass(ValidationError, Exception))" },
    { name: "safe_check_age(30) returns 30", code: "    expect_eq(safe_check_age(30), 30)" },
    { name: "safe_check_age(-5) falls back to -1", code: "    expect_eq(safe_check_age(-5), -1)" },
    { name: "safe_check_age('nope') falls back to -1", code: "    expect_eq(safe_check_age(\"nope\"), -1)" },
    { name: "parse_int('42') is 42", code: "    expect_eq(parse_int(\"42\"), 42)" },
    { name: "parse_int('oops') falls back to 0", code: "    expect_eq(parse_int(\"oops\"), 0)" },

  solution: `class ValidationError(Exception):
    pass


def check_age(age):
    if not isinstance(age, int) or isinstance(age, bool):
        raise TypeError("age must be an int")
    if age < 0:
        raise ValidationError("age must be >= 0")
    return age


def safe_check_age(age):
    try:
        return check_age(age)
    except Exception:
        return -1


def parse_int(text):
    try:
        value = int(text)
    except ValueError:
        return 0
    else:
        return value
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Python</th></tr>
  <tr><td>Raise</td><td><code>raise ArgumentError, "x"</code></td><td><code>raise ValueError("x")</code></td></tr>
  <tr><td>Catch one type</td><td><code>rescue RangeError</code></td><td><code>except ValueError:</code></td></tr>
  <tr><td>Bind the error</td><td><code>rescue RangeError => e</code></td><td><code>except ValueError as e:</code></td></tr>
  <tr><td>No-error branch</td><td><code>else</code> (in <code>begin</code>)</td><td><code>else:</code></td></tr>
  <tr><td>Always run</td><td><code>ensure … end</code></td><td><code>finally:</code></td></tr>
  <tr><td>Custom type</td><td><code>class E &lt; StandardError; end</code></td><td><code>class E(Exception): pass</code></td></tr>
</table>
<p>The four clauses run in a fixed order: the <code>try</code> body, then
<em>either</em> a matching <code>except</code> (if something was raised)
<em>or</em> <code>else</code> (if nothing was), and <code>finally</code> last no
matter what — the same order Ruby's <code>begin</code>/<code>rescue</code>/
<code>else</code>/<code>ensure</code> uses. Prefer catching the narrowest class
you can — a bare <code>except:</code> also swallows
<code>KeyboardInterrupt</code> and other signals, so reach for
<code>except Exception:</code> at most, and ideally name the specific class,
just as a bare Ruby <code>rescue</code> (with no class) only catches
<code>StandardError</code> and its descendants, not every
<code>Exception</code>.</p>
<p>One Python gotcha for Ruby folks: <code>bool</code> is a subclass of
<code>int</code>, so <code>isinstance(True, int)</code> is <code>True</code> —
there's no equivalent surprise in Ruby, where <code>true</code>/<code>false</code>
are instances of <code>TrueClass</code>/<code>FalseClass</code>, unrelated to
<code>Integer</code>. That is why the solution's type check also rules out
<code>bool</code> before treating the value as a valid age.</p>`,
};
