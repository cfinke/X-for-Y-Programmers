  intro: `
<p>Time to put it together. This capstone builds a small <strong>in-memory
store</strong> — the same shape you would reach for in PHP with a
<code>class</code> wrapping an associative array — but assembled from the Go pieces
you have learned: a <code>struct</code> for the record, a <code>map</code> for the
index, methods on a pointer receiver for mutation, a sentinel <code>error</code>
wrapped with <code>%w</code>, and a tiny <code>interface</code> so callers depend
on behavior, not the concrete type.</p>
<table>
  <tr><th>PHP</th><th>Go</th></tr>
  <tr><td><code>class Store { private array $items = []; }</code></td><td><code>type Store struct { items map[string]Product }</code></td></tr>
  <tr><td><code>$store->get($sku)</code> returns <code>null</code></td><td><code>Get(sku) (Product, error)</code> — value + error</td></tr>
  <tr><td><code>throw new NotFoundException()</code></td><td><code>fmt.Errorf("...: %w", ErrNotFound)</code></td></tr>
  <tr><td><code>sort(array_keys($items))</code></td><td><code>sort.Strings(keys)</code> over a built slice</td></tr>
  <tr><td><code>interface Reader { public function get(...); }</code></td><td><code>type Reader interface { Get(...) }</code> (implicit)</td></tr>
</table>
<p>Two Go habits carry the whole design. First, a lookup returns
<code>(Product, error)</code> instead of a nullable value, and the miss is a
<em>wrapped sentinel</em> — <code>errors.Is(err, ErrNotFound)</code> lets a caller
recognize the cause even though the message adds context. Second, iterating a map
yields keys in random order, so any time you need a stable result you copy the
keys into a slice and <code>sort</code> them.</p>`,

  php: `class NotFoundException extends Exception {}

class Product {
    public function __construct(
        public string $sku,
        public string $name,
        public float $price,
        public int $qty,
    ) {}
}

class Store {
    private array $items = [];

    public function add(Product $p): void {
        $this->items[$p->sku] = $p;
    }

    public function get(string $sku): Product {
        if (!isset($this->items[$sku])) {
            throw new NotFoundException("get $sku");
        }
        return $this->items[$sku];
    }

    public function remove(string $sku): void {
        if (!isset($this->items[$sku])) {
            throw new NotFoundException("remove $sku");
        }
        unset($this->items[$sku]);
    }

    public function count(): int { return count($this->items); }

    public function skus(): array {
        $keys = array_keys($this->items);
        sort($keys);
        return $keys;
    }

    public function totalValue(): float {
        $t = 0.0;
        foreach ($this->items as $p) {
            $t += $p->price * $p->qty;
        }
        return $t;
    }
}`,

  solution: `type Product struct {
	SKU   string
	Name  string
	Price float64
	Qty   int
}

var ErrNotFound = errors.New("not found")

type Store struct {
	items map[string]Product
}

func NewStore() *Store {
	return &Store{items: map[string]Product{}}
}

func (s *Store) Add(p Product) {
	s.items[p.SKU] = p
}

func (s *Store) Get(sku string) (Product, error) {
	p, ok := s.items[sku]
	if !ok {
		return Product{}, fmt.Errorf("get %q: %w", sku, ErrNotFound)
	}
	return p, nil
}

func (s *Store) Remove(sku string) error {
	if _, ok := s.items[sku]; !ok {
		return fmt.Errorf("remove %q: %w", sku, ErrNotFound)
	}
	delete(s.items, sku)
	return nil
}

func (s *Store) Count() int {
	return len(s.items)
}

func (s *Store) SKUs() []string {
	keys := make([]string, 0, len(s.items))
	for k := range s.items {
		keys = append(keys, k)
	}
	sort.Strings(keys)
	return keys
}

func (s *Store) TotalValue() float64 {
	total := 0.0
	for _, p := range s.items {
		total += p.Price * float64(p.Qty)
	}
	return total
}

type Reader interface {
	Get(sku string) (Product, error)
	Count() int
}

func Exists(r Reader, sku string) bool {
	_, err := r.Get(sku)
	return err == nil
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Go</th></tr>
  <tr><td>Record type</td><td><code>class Product { public string $sku; … }</code></td><td><code>type Product struct { … }</code></td></tr>
  <tr><td>Indexed store</td><td><code>array $items</code> keyed by SKU</td><td><code>map[string]Product</code></td></tr>
  <tr><td>Missing lookup</td><td><code>$items[$sku] ?? null</code></td><td><code>(Product, error)</code> with a wrapped sentinel</td></tr>
  <tr><td>Recognize a cause</td><td><code>$e instanceof NotFoundException</code></td><td><code>errors.Is(err, ErrNotFound)</code></td></tr>
  <tr><td>Stable key order</td><td><code>ksort($items)</code> or <code>sort(array_keys($items))</code></td><td>copy keys to a slice, then <code>sort</code></td></tr>
  <tr><td>Depend on behavior</td><td><code>implements Reader</code></td><td>just have the methods (implicit)</td></tr>
</table>
<p>Everything here is ordinary Go, and that is the point: a store is a
<code>struct</code> around a <code>map</code>, mutations are pointer-receiver
methods, and every failure path returns an <code>error</code> rather than throwing.
The <code>%w</code> verb is the piece worth internalizing — it stitches a specific
sentinel into a descriptive message, so <code>err.Error()</code> reads well for a
human while <code>errors.Is</code> still lets code branch on the cause. Compare
that with PHP, where you would define an exception subclass and test with
<code>instanceof</code>.</p>
<p>Notice what is <em>not</em> here: no scattered <code>try</code>/<code>catch</code>,
no <code>implements</code>, no null checks scattered through the callers. A
<code>*Store</code> satisfies <code>Reader</code> the instant it has
<code>Get</code> and <code>Count</code>, so <code>Exists</code> is testable
against any reader, real or fake. That combination — small structs, small
interfaces, errors as values — is how idiomatic Go programs stay composable as
they grow.</p>`,
