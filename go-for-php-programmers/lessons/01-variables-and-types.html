<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>PHP variables are dynamically typed and need no declaration keyword — just
assign to a <code>$name</code>; Go checks types at compile time and keeps them,
with a compiler that is famously strict — unused variables and imports are
errors, not warnings. The type goes <em>after</em> the name, every type has a
zero value, and Go never converts between numeric types for you.</p>
<table>
  <tr><th>PHP</th><th>Go</th></tr>
  <tr><td><code>$age = 36;</code></td><td><code>var age int = 36</code></td></tr>
  <tr><td><code>$age = 36;</code></td><td><code>age := 36</code> (declare + infer)</td></tr>
  <tr><td><code>"{$name} is {$age}"</code></td><td><code>fmt.Sprintf("%s is %d", name, age)</code></td></tr>
  <tr><td><code>int</code>, <code>float</code>, … (loosely enforced)</td><td><code>int</code>, <code>int64</code>, <code>float64</code>, … (distinct)</td></tr>
</table>
<p>The <code>:=</code> operator is Go's equivalent of a plain PHP assignment:
declare and infer in one step (only inside functions). PHP's string
interpolation with <code>"{$var}"</code> has no Go counterpart — reach for
<code>fmt.Sprintf</code> with verbs like <code>%s</code> and <code>%d</code>. And
the numeric split is strict: unlike PHP, where <code>7 / 2</code> quietly
produces the float <code>3.5</code>, Go will not divide an <code>int</code> by
<code>2</code> and hand you a <code>float64</code> without an explicit
<code>float64(n)</code> conversion.</p>`,

  php: `$age = 36;
$userName = "Ada";

function describe(string $name, int $age): string {
  return "{$name} is {$age}";
}`,

  task: `
<p>Write the Go version as package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>Add(a, b int) int</code> returns their sum.</li>
  <li><code>Describe(name string, age int) string</code> returns a string like
      <code>"Ada is 36"</code> — use <code>fmt.Sprintf("%s is %d", name, age)</code>.</li>
  <li><code>Halve(n int) float64</code> returns half of <code>n</code>, so
      <code>Halve(7)</code> is <code>3.5</code>. Convert explicitly:
      <code>float64(n) / 2</code>.</li>
</ol>`,

  starter: `func Add(a, b int) int {
	return 0 // TODO
}

func Describe(name string, age int) string {
	return "" // TODO
}

func Halve(n int) float64 {
	return 0 // TODO: Go needs an explicit conversion
}
`,

  requirements: [
    { pattern: /func\s+Add/, message: "Define a function Add" },
    { pattern: /fmt\.Sprintf/, message: "Use fmt.Sprintf to build the string in Describe" },
    { pattern: /float64\(/, message: "Convert to float64 explicitly in Halve" },
  ],

  tests: [
    { name: "Add(2, 3) is 5", code: "\t\texpect_eq(Add(2, 3), 5)" },
    { name: "Describe(\"Ada\", 36) is \"Ada is 36\"", code: "\t\texpect_eq(Describe(\"Ada\", 36), \"Ada is 36\")" },
    { name: "Describe(\"Rob\", 68) is \"Rob is 68\"", code: "\t\texpect_eq(Describe(\"Rob\", 68), \"Rob is 68\")" },
    { name: "Halve(7) is 3.5", code: "\t\texpect_eq(Halve(7), 3.5)" },
    { name: "Halve(10) is 5.0", code: "\t\texpect_eq(Halve(10), 5.0)" },
  ],

  solution: `func Add(a, b int) int {
	return a + b
}

func Describe(name string, age int) string {
	return fmt.Sprintf("%s is %d", name, age)
}

func Halve(n int) float64 {
	return float64(n) / 2
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Go</th></tr>
  <tr><td>Typed variable</td><td><code>$x = 1;</code> (loosely typed)</td><td><code>var x int = 1</code></td></tr>
  <tr><td>Declare + infer</td><td><code>$x = 1;</code></td><td><code>x := 1</code></td></tr>
  <tr><td>Constant</td><td><code>const X = 1;</code></td><td><code>const x = 1</code></td></tr>
  <tr><td>Format string</td><td><code>"{$x}"</code></td><td><code>fmt.Sprintf("%v", x)</code></td></tr>
  <tr><td>Numeric convert</td><td>implicit</td><td><code>float64(n)</code> (always explicit)</td></tr>
</table>
<p>Go's strictness is the theme of the whole language: an unused variable or a
missing conversion stops compilation. It feels heavy at first and pays off in
code that says exactly what it does. The zero value is the other habit to build —
a declared-but-unassigned <code>int</code> is <code>0</code>, a <code>string</code>
is <code>""</code>, and a <code>bool</code> is <code>false</code>, so there is no
<code>null</code> and no "undefined variable" notice, the way PHP warns when you
reference a variable that was never set.</p>`,
};
