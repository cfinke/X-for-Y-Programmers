  intro: `
<p>You already know Ruby's <code>Enumerable</code> methods — <code>select</code>,
<code>map</code>, <code>sort_by</code>, <code>reduce</code>, <code>find</code>. C#
has the exact same idea under the name <strong>LINQ</strong> (Language
Integrated Query), a set of extension methods over <code>IEnumerable&lt;T&gt;</code>
that live in the <code>System.Linq</code> namespace. The names differ, and the
lambdas take C# expression syntax, but the chaining style is identical.</p>
<table>
  <tr><th>Ruby (Enumerable)</th><th>C# (LINQ)</th></tr>
  <tr><td><code>arr.select { |x| x &gt; 0 }</code></td><td><code>arr.Where(x =&gt; x &gt; 0)</code></td></tr>
  <tr><td><code>arr.map { |x| x.name }</code></td><td><code>arr.Select(x =&gt; x.Name)</code></td></tr>
  <tr><td><code>arr.sort_by { |x| x }</code></td><td><code>arr.OrderBy(x =&gt; x)</code></td></tr>
  <tr><td><code>arr.find(&amp;p)</code></td><td><code>arr.FirstOrDefault(p)</code></td></tr>
  <tr><td><code>arr.any?(&amp;p)</code> / <code>arr.all?(&amp;p)</code></td><td><code>arr.Any(p)</code> / <code>arr.All(p)</code></td></tr>
  <tr><td><code>arr.reduce(seed, &amp;f)</code></td><td><code>arr.Aggregate(seed, f)</code></td></tr>
</table>
<p>Two differences worth internalizing. First, LINQ operators are
<strong>lazy</strong> — <code>Where</code> and <code>Select</code> return a
deferred <code>IEnumerable&lt;T&gt;</code> that only runs when you enumerate it,
so you finish a query with <code>ToList()</code> or <code>ToDictionary(...)</code>
to snapshot the results. Second, sorting is out-of-place and composable:
<code>OrderBy</code> gives the primary key and <code>ThenBy</code> adds
tie-breakers, instead of one comparator block.</p>`,

  solution: `class Product {
  public string Name { get; set; }
  public string Category { get; set; }
  public double Price { get; set; }
  public int Stock { get; set; }
  public Product(string name, string category, double price, int stock) {
    Name = name;
    Category = category;
    Price = price;
    Stock = stock;
  }
}

static class Catalog {
  public static List<Product> Sample() {
    return new List<Product> {
      new Product("Apple", "Food", 1.5, 10),
      new Product("Bread", "Food", 2.5, 0),
      new Product("Notebook", "Office", 3.0, 5),
      new Product("Pen", "Office", 1.0, 20),
      new Product("Desk", "Furniture", 100.0, 2),
    };
  }

  public static List<string> NamesUnder(List<Product> products, double maxPrice) {
    return products
      .Where(p => p.Price < maxPrice)
      .OrderBy(p => p.Price)
      .ThenBy(p => p.Name)
      .Select(p => p.Name)
      .ToList();
  }

  public static double TotalValue(List<Product> products) {
    return products.Sum(p => p.Price * p.Stock);
  }

  public static string Cheapest(List<Product> products) {
    Product p = products.OrderBy(x => x.Price).FirstOrDefault();
    return p == null ? "" : p.Name;
  }

  public static bool AnyExpensive(List<Product> products, double threshold) {
    return products.Any(p => p.Price > threshold);
  }

  public static bool AllInStock(List<Product> products) {
    return products.All(p => p.Stock > 0);
  }

  public static int CountIn(List<Product> products, string category) {
    return products.Count(p => p.Category == category);
  }

  public static Dictionary<string, int> CategoryCounts(List<Product> products) {
    return products
      .GroupBy(p => p.Category)
      .ToDictionary(g => g.Key, g => g.Count());
  }

  public static string Summary(List<Product> products) {
    return products.Aggregate("", (acc, p) => acc == "" ? p.Name : acc + ", " + p.Name);
  }
}

  notes: `
<table>
  <tr><th>Operation</th><th>Ruby</th><th>C# / LINQ</th></tr>
  <tr><td>Filter</td><td><code>select { |p| ... }</code></td><td><code>Where(p)</code></td></tr>
  <tr><td>Project</td><td><code>map { |x| ... }</code></td><td><code>Select(f)</code></td></tr>
  <tr><td>Sort (primary + tie-break)</td><td><code>sort_by</code> with array key</td><td><code>OrderBy(...).ThenBy(...)</code></td></tr>
  <tr><td>First match</td><td><code>find</code></td><td><code>First</code> / <code>FirstOrDefault</code></td></tr>
  <tr><td>Exists / for-all</td><td><code>any?</code> / <code>all?</code></td><td><code>Any</code> / <code>All</code></td></tr>
  <tr><td>Count</td><td><code>count { |x| ... }</code></td><td><code>Count(p)</code></td></tr>
  <tr><td>Sum</td><td><code>sum { |x| ... }</code></td><td><code>Sum(f)</code></td></tr>
  <tr><td>Fold</td><td><code>reduce(seed) { |acc,x| ... }</code></td><td><code>Aggregate(seed, f)</code></td></tr>
  <tr><td>Group</td><td><code>group_by { |x| ... }</code></td><td><code>GroupBy(k)</code></td></tr>
  <tr><td>Materialize</td><td>already an array</td><td><code>ToList()</code> / <code>ToDictionary(...)</code></td></tr>
</table>
<p><code>First</code> vs <code>FirstOrDefault</code> mirrors the difference between
assuming a match and handling its absence: <code>First</code> throws on an empty
sequence, while <code>FirstOrDefault</code> returns the type's default
(<code>null</code> for a class, <code>0</code> for an <code>int</code>) — the
closest analog to Ruby's <code>find</code> returning <code>nil</code>.
Note the argument order flip on the fold: Ruby's
<code>reduce(seed) { |acc, x| ... }</code> becomes <code>Aggregate(seed, fn)</code>,
seed first in both, but C# takes the seed and function as separate positional
arguments rather than a block.</p>
<p>Because LINQ is lazy, a chain like <code>Where(...).Select(...)</code> does no
work until something enumerates it. A stray <code>Count()</code> or a second
<code>foreach</code> re-runs the whole pipeline, so call <code>ToList()</code>
once when you need to iterate the result more than once — the same reason you'd
call <code>.to_a</code> on a lazy Ruby enumerator before iterating it twice.</p>`,
