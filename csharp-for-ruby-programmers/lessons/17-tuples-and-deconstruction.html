  title: "Tuples & Deconstruction",

  intro: `
<p>In Ruby you reach for a plain <code>Array</code> like <code>[count, name]</code>,
or a <code>Struct</code>/<code>Hash</code>, whenever you want to return two values
without declaring a whole class. C# has a direct equivalent to the ad-hoc array
trick: the <strong>value tuple</strong>. It is written with parentheses —
<code>(int, string)</code> — and it is a lightweight <code>struct</code>, so it
copies by value and compares by value.</p>
<table>
  <tr><th>Ruby</th><th>C#</th></tr>
  <tr><td><code>[count, name]</code></td><td><code>(int, string)</code></td></tr>
  <tr><td>plain array (positional)</td><td><code>(int Count, string Name)</code> (named)</td></tr>
  <tr><td><code>a, b = pair</code></td><td><code>var (a, b) = pair;</code></td></tr>
  <tr><td><code>return [n, s]</code></td><td><code>return (n, s);</code></td></tr>
  <tr><td><code>t[0]</code>, <code>t[1]</code></td><td><code>t.Item1</code>, <code>t.Item2</code> (or names)</td></tr>
</table>
<p>Unlike a Ruby array, a C# tuple's elements can carry <em>names</em>
(<code>(int Count, string Name)</code>), so you read <code>result.Count</code>
instead of counting index positions. And the names are just labels — two tuples
with the same element types are the same type regardless of the names, and
<code>==</code>/<code>Equals</code> compare element by element.</p>
<p>To pull a tuple apart you <strong>deconstruct</strong> it:
<code>var (a, b) = GetPair();</code>. Any type can opt into this by defining a
<code>Deconstruct</code> method with <code>out</code> parameters, and then it too
works with the <code>var (…)</code> syntax.</p>`,

  ruby: `def min_max(nums)
  lo = hi = nums[0]
  nums.each { |n| lo = [lo, n].min; hi = [hi, n].max }
  [lo, hi]
end

low, high = min_max([4, 1, 9, 2])

Point = Struct.new(:x, :y)
p = Point.new(3, 4)
x, y = p.to_a`,

<p>Build a <code>static class Stats</code> plus a small <code>Point</code> class
that shows off tuples and deconstruction:</p>
<ol>

</ol>`,

  requirements: [
    { pattern: /var\s*\(\s*\w+\s*,\s*\w+\s*\)\s*=/, message: "Deconstruct a tuple with the var (a, b) = ... syntax" },

  tests: [
    { name: "MinMax finds the extremes", code: "      var mm = Stats.MinMax(new int[]{4, 1, 9, 2});\n      expect_eq(mm.Min, 1);\n      expect_eq(mm.Max, 9);" },
    { name: "MinMax tuple equals a literal tuple", code: "      expect_true(Stats.MinMax(new int[]{5, 3, 8}).Equals((3, 8)));" },
    { name: "Divide returns quotient and remainder", code: "      var d = Stats.Divide(17, 5);\n      expect_eq(d.Quotient, 3);\n      expect_eq(d.Remainder, 2);" },
    { name: "Range deconstructs MinMax", code: "      expect_eq(Stats.Range(new int[]{4, 1, 9, 2}), 8);" },
    { name: "Point deconstructs into x and y", code: "      var p = new Point(3, 4);\n      int x, y;\n      p.Deconstruct(out x, out y);\n      expect_eq(x, 3);\n      expect_eq(y, 4);" },
    { name: "Divide result compares by value", code: "      expect_true(Stats.Divide(10, 3).Equals((3, 1)));" },

  solution: `static class Stats {
  public static (int Min, int Max) MinMax(int[] nums) {
    int lo = nums[0], hi = nums[0];
    foreach (var n in nums) {
      if (n < lo) lo = n;
      if (n > hi) hi = n;
    }
    return (lo, hi);
  }

  public static (int Quotient, int Remainder) Divide(int a, int b) {
    return (a / b, a % b);
  }

  public static int Range(int[] nums) {
    var (min, max) = MinMax(nums);
    return max - min;
  }
}

class Point {
  public int X { get; }
  public int Y { get; }

  public Point(int x, int y) {
    X = x;
    Y = y;
  }

  public void Deconstruct(out int x, out int y) {
    x = X;
    y = Y;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>C#</th></tr>
  <tr><td>Tuple type</td><td><code>[count, name]</code> (Array)</td><td><code>(int, string)</code></td></tr>
  <tr><td>Named elements</td><td>—</td><td><code>(int Count, string Name)</code></td></tr>
  <tr><td>Construct</td><td><code>[1, "a"]</code></td><td><code>(1, "a")</code></td></tr>
  <tr><td>Access</td><td><code>t[0]</code></td><td><code>t.Item1</code> or <code>t.Count</code></td></tr>
  <tr><td>Deconstruct</td><td><code>a, b = t</code></td><td><code>var (a, b) = t;</code></td></tr>
  <tr><td>Object destructure</td><td><code>x, y = p.to_a</code></td><td><code>var (x, y) = p;</code> via <code>Deconstruct</code></td></tr>
</table>
<p>A value tuple is a <code>struct</code> (<code>System.ValueTuple</code>), so it
copies on assignment and <code>==</code>/<code>Equals</code> compare element by
element — handy in tests. The element names are compile-time sugar only:
<code>(int Min, int Max)</code> and <code>(int, int)</code> are the same runtime
type, which is why <code>MinMax(...) == (3, 8)</code> works against a nameless
literal.</p>
<p>You can also mix deconstruction into <code>foreach</code>
(<code>foreach (var (k, v) in dict)</code>) and discard pieces you don't need with
<code>_</code>: <code>var (_, max) = MinMax(nums);</code>. Any type — not just
tuples — becomes deconstructible the moment it exposes a <code>Deconstruct</code>
method with <code>out</code> parameters, and you can even provide several
overloads for different arities.</p>`,
