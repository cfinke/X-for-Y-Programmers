  intro: `
<p>A <code>Promise&lt;T&gt;</code> is a <code>CompletableFuture&lt;T&gt;</code>:
a value that will arrive later or fail. The combinators map one-to-one —
<code>thenApply</code> is <code>.then</code>, <code>thenCompose</code> is
<code>.then</code> returning another promise (it auto-flattens, so the
apply/compose distinction disappears), <code>exceptionally</code> is
<code>.catch</code>. But you will rarely chain them, because
<code>async</code>/<code>await</code> turns the whole pipeline into
straight-line code: inside an <code>async function</code>,
<code>await promise</code> reads like a blocking call but never blocks a
thread.</p>
<table>
  <tr><th>Java</th><th>TypeScript</th></tr>
  <tr><td><code>CompletableFuture&lt;User&gt;</code></td><td><code>Promise&lt;User&gt;</code></td></tr>
  <tr><td><code>f.thenApply(u -&gt; u.name())</code></td><td><code>p.then(u =&gt; u.name)</code> — or just <code>await</code></td></tr>
  <tr><td><code>f.thenCompose(this::fetchMore)</code></td><td><code>await fetchMore(...)</code></td></tr>
  <tr><td><code>f.exceptionally(e -&gt; fallback)</code></td><td><code>try { await f } catch (e) { fallback }</code></td></tr>
  <tr><td><code>CompletableFuture.allOf(...)</code> then re-<code>join</code> each</td><td><code>await Promise.all(promises)</code> — results collected for you</td></tr>
</table>
<p>Two upgrades to enjoy. <code>CompletableFuture.allOf</code> returns
<code>CompletableFuture&lt;Void&gt;</code>, forcing you to loop back and
<code>join()</code> each future; <code>Promise.all</code> resolves directly to
the array of results, in input order. And because JavaScript runs your code on
a single-threaded event loop, there is no <code>synchronized</code>, no
<code>volatile</code>, no executor to size — concurrency happens between
<code>await</code> points, never in the middle of your statements.</p>`,

  java: `CompletableFuture<User> fetchUser(long id) {
    return CompletableFuture.supplyAsync(() -> repo.find(id));
}

CompletableFuture<List<String>> fetchUserNames(List<Long> ids) {
    List<CompletableFuture<User>> futures =
        ids.stream().map(this::fetchUser).toList();
    // allOf yields CompletableFuture<Void> -- you must re-join
    // every future yourself to collect the actual results.
    return CompletableFuture.allOf(futures.toArray(new CompletableFuture[0]))
        .thenApply(v -> futures.stream()
            .map(CompletableFuture::join)
            .map(User::name)
            .toList());
}

CompletableFuture<String> fetchNameOrGuest(long id) {
    return fetchUser(id).thenApply(User::name)
                        .exceptionally(e -> "guest");
}`,

  solution: `const USERS: Record<number, string> = { 1: "Ada", 2: "Grace", 3: "Linus" };

function fetchUser(id: number): Promise<{ id: number; name: string }> {
  return Promise.resolve().then(() => {
    const name = USERS[id];
    if (name === undefined) {
      throw new Error("No user with id " + id); // -> rejected promise
    }
    return { id: id, name: name };
  });
}

async function fetchUserNames(ids: number[]): Promise<string[]> {
  // Kick off every lookup first, then await them all together.
  const users = await Promise.all(ids.map((id) => fetchUser(id)));
  return users.map((user) => user.name);
}

async function fetchNameOrGuest(id: number): Promise<string> {
  try {
    const user = await fetchUser(id);
    return user.name;
  } catch (e) {
    return "guest";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>TypeScript</th></tr>
  <tr><td>Future value</td><td><code>CompletableFuture&lt;T&gt;</code></td><td><code>Promise&lt;T&gt;</code></td></tr>
  <tr><td>Create resolved/failed</td><td><code>completedFuture(v)</code> / <code>failedFuture(e)</code></td><td><code>Promise.resolve(v)</code> / <code>Promise.reject(e)</code></td></tr>
  <tr><td>Map result</td><td><code>thenApply(f)</code></td><td><code>.then(f)</code></td></tr>
  <tr><td>Chain another future</td><td><code>thenCompose(f)</code></td><td><code>.then(f)</code> — promises auto-flatten</td></tr>
  <tr><td>Recover</td><td><code>exceptionally(f)</code></td><td><code>.catch(f)</code> or <code>try</code>/<code>catch</code> around <code>await</code></td></tr>
  <tr><td>Fan-out, join all</td><td><code>allOf(...)</code> + manual <code>join()</code> per future</td><td><code>Promise.all(array)</code> — resolves to the results</td></tr>
  <tr><td>Straight-line style</td><td>virtual threads / structured concurrency (21+)</td><td><code>async</code> / <code>await</code></td></tr>
  <tr><td>Thread safety</td><td><code>synchronized</code>, <code>volatile</code>, executors</td><td>not needed — single-threaded event loop</td></tr>
</table>
<p>An <code>async function</code> always returns a <code>Promise</code>:
<code>return "x"</code> resolves it, <code>throw</code> rejects it — the same
duality as completing or completing-exceptionally a
<code>CompletableFuture</code>, but expressed with the ordinary
<code>return</code> and <code>throw</code> you already write. The one habit to
keep from Java: launch independent work <em>before</em> awaiting, or you will
accidentally serialize it.</p>`,
