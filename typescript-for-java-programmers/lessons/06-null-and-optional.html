<div id="app"></div>
<script>
const LESSON = {
  number: 6,
  title: "Null & Optional",

  intro: `
<p>You know the billion-dollar mistake intimately: in Java, <em>every</em>
reference type is secretly nullable, the compiler says nothing, and the bill
arrives at runtime as a <code>NullPointerException</code>. Java 8's
<code>Optional</code> helps — but only where authors remembered to use it,
and nothing stops a caller from ignoring it. TypeScript takes the opposite
approach: <code>string</code> means a string, <em>never</em> null. If a value
can be absent you must say so in the type — <code>string | null</code> — and
then the compiler <strong>refuses to let you touch it</strong> until you have
checked. It is the discipline Optional encourages, enforced for free.</p>
<table>
  <tr><th>Java</th><th>TypeScript</th></tr>
  <tr><td><code>User u = findUser(id);</code> (may be null, who knows)</td><td><code>const u: User | null = findUser(id);</code> (nullability is in the type)</td></tr>
  <tr><td><code>Optional.ofNullable(x).map(X::getY).orElse(def)</code></td><td><code>x?.y ?? def</code></td></tr>
  <tr><td><code>opt.isPresent()</code> then <code>opt.get()</code></td><td><code>if (x !== null)</code> — the compiler narrows <code>x</code> for you</td></tr>
  <tr><td>One kind of absence: <code>null</code></td><td>Two: <code>null</code> (deliberate) and <code>undefined</code> (never set)</td></tr>
</table>
<p>Two operators do the work of the whole Optional API. Optional chaining
<code>a?.b</code> is <code>map</code>: it evaluates to <code>undefined</code>
instead of throwing when <code>a</code> is null or undefined, and it chains.
Nullish coalescing <code>a ?? def</code> is <code>orElse</code>: it supplies a
default only when the left side is null or undefined (unlike <code>||</code>,
it leaves <code>0</code> and <code>""</code> alone). One wrinkle: Java's
single <code>null</code> splits in two here. <code>undefined</code> is what
you get from a missing property or an unassigned variable;
<code>null</code> is an explicit "nothing". Both <code>?.</code> and
<code>??</code> treat them identically, which is almost always what you
want.</p>`,

  java: `// Without Optional, every dot is a coin-flip:
String city = findUser(id).getAddress().getCity();  // NPE waiting to happen

// The Java 8+ Optional dance:
String city2 = Optional.ofNullable(findUser(id))
        .map(User::getAddress)
        .map(Address::getCity)
        .orElse("Unknown");

// And Optional is only a convention. The compiler will not stop
// a caller from skipping it entirely:
User user = findUser(id);
if (user != null && user.getAddress() != null) {
    System.out.println(user.getAddress().getCity());
}`,

  task: `
<p>Model users whose address may be missing — with the absence written into
the types, not hidden behind getters:</p>
<ol>
  <li>Define <code>interface Address</code> with <code>city: string</code>,
      and <code>interface User</code> with <code>name: string</code> and
      <code>address: Address | null</code>. Unlike Java, a plain
      <code>Address</code> here can <em>never</em> be null — you must opt in
      with <code>| null</code>.</li>
  <li>Write <code>findUser(id: number): User | null</code>:
      id <code>1</code> returns <code>{ name: "Ada", address: { city: "London" } }</code>,
      id <code>2</code> returns <code>{ name: "Linus", address: null }</code>,
      and any other id returns <code>null</code>.</li>
  <li>Write <code>getCity(user: User | null): string</code> returning the
      user's city, or <code>"Unknown"</code> if the user or the address is
      absent. The entire Optional chain from the left panel is one
      expression: <code>user?.address?.city ?? "Unknown"</code>.</li>
</ol>
<p>Try removing the <code>?.</code> and hovering the error: the compiler
tells you <code>user</code> is possibly null — the check Optional politely
suggests, TypeScript demands.</p>`,

  starter: `interface Address {
  city: string;
}

interface User {
  name: string;
  // TODO 1: the address may be missing — say so in the type: Address | null
  address: Address;
}

// TODO 2: the return type must admit the user may not exist: User | null
function findUser(id: number): User {
  // TODO: id 1 -> { name: "Ada", address: { city: "London" } }
  //       id 2 -> { name: "Linus", address: null }
  //       anything else -> null
  return { name: "Ada", address: { city: "London" } };
}

// TODO 3: accept User | null; return the city or "Unknown".
// Java:       Optional.ofNullable(user).map(User::getAddress)
//                     .map(Address::getCity).orElse("Unknown")
// TypeScript: one expression with ?. and ??
function getCity(user: User): string {
  return "Unknown";
}
`,

  exportNames: ["findUser", "getCity"],

  requirements: [
    { pattern: /\|\s*null/, message: "Write nullability into the types with | null (e.g. User | null) — the compiler then forces the check Optional only encourages" },
    { pattern: /\?\./, message: "Use optional chaining (?.) — the whole Optional.map(...) pipeline in one operator" },
    { pattern: /\?\?/, message: "Use nullish coalescing (??) — the orElse(...) at the end of the chain" },
  ],

  tests: [
    { name: 'findUser(1) returns Ada', run: (x) => expectEqual(x.findUser(1).name, "Ada") },
    { name: 'findUser(99) returns null', run: (x) => expectEqual(x.findUser(99), null) },
    { name: 'getCity(findUser(1)) returns "London"', run: (x) => expectEqual(x.getCity(x.findUser(1)), "London") },
    { name: 'getCity(findUser(2)) returns "Unknown" — address is null', run: (x) => expectEqual(x.getCity(x.findUser(2)), "Unknown") },
    { name: 'getCity(null) returns "Unknown" — no NPE, no Optional', run: (x) => expectEqual(x.getCity(null), "Unknown") },
  ],

  solution: `interface Address {
  city: string;
}

interface User {
  name: string;
  address: Address | null;
}

function findUser(id: number): User | null {
  if (id === 1) return { name: "Ada", address: { city: "London" } };
  if (id === 2) return { name: "Linus", address: null };
  return null;
}

function getCity(user: User | null): string {
  return user?.address?.city ?? "Unknown";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>TypeScript</th></tr>
  <tr><td>Maybe-absent value</td><td><code>Optional&lt;User&gt;</code> (or an undocumented null)</td><td><code>User | null</code></td></tr>
  <tr><td>Safe navigation</td><td><code>opt.map(User::getAddress)</code></td><td><code>user?.address</code></td></tr>
  <tr><td>Default value</td><td><code>opt.orElse("Unknown")</code></td><td><code>value ?? "Unknown"</code></td></tr>
  <tr><td>Presence check</td><td><code>opt.isPresent()</code> + <code>opt.get()</code></td><td><code>if (x !== null)</code> — no get() needed, the type narrows</td></tr>
  <tr><td>Kinds of absence</td><td><code>null</code></td><td><code>null</code> and <code>undefined</code> (<code>?.</code>/<code>??</code> handle both)</td></tr>
  <tr><td>Forgot the check?</td><td>NullPointerException at runtime</td><td>Compile error before you ship</td></tr>
</table>
<p>The deep difference is not the operators — it is where nullability lives.
Java bolts Optional on top of a type system in which every reference is
already nullable, so the compiler can never be sure. TypeScript (with
<code>strictNullChecks</code>, the norm in modern codebases) makes
non-nullable the default and absence an explicit type, so
<code>user.address.city</code> on a possibly-null value is rejected before it
runs. You stop writing defensive null checks everywhere and write exactly one
check, exactly where the type says it is needed.</p>`,
};
