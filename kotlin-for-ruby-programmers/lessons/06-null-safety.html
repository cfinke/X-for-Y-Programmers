<script>
const LESSON = {
  number: 6,
  title: "Null Safety",

  intro: `
<p>Kotlin bakes nullability into the type system, which is a much stricter
world than Ruby's, where any variable can hold <code>nil</code> and you find
out the hard way with a <code>NoMethodError</code>. A plain <code>String</code>
can <em>never</em> hold <code>null</code>; if a value might be absent you must
say so with a trailing <code>?</code> — <code>String?</code> is Kotlin's way of
admitting a value might be <code>nil</code>. The compiler then forces you to
deal with the null before you can call anything on it.</p>
<table>
  <tr><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>(any value may be <code>nil</code>)</td><td><code>String?</code></td></tr>
  <tr><td><code>user&amp;.name</code></td><td><code>user?.name</code></td></tr>
  <tr><td><code>name || "guest"</code></td><td><code>name ?: "guest"</code></td></tr>
  <tr><td><code>name.to_s</code> / assume present</td><td><code>name!!</code></td></tr>
  <tr><td><code>x&amp;.f</code></td><td><code>x?.let { it.f() }</code></td></tr>
</table>
<p>The tools are familiar if you already reach for Ruby's safe navigation
operator. Safe call <code>?.</code> returns <code>null</code> instead of
raising when the receiver is null (same idea as Ruby's <code>&amp;.</code>).
The Elvis operator <code>?:</code> supplies a fallback (similar to Ruby's
<code>||</code>, but it only triggers on <code>null</code>, not on falsy
values like <code>false</code> or <code>0</code>). The non-null assertion
<code>!!</code> is a loud way to say "trust me, this isn't nil" — it throws a
<code>NullPointerException</code> if you are wrong, so reach for it rarely.
And <code>value?.let { ... }</code> runs a block only when the value is
non-null, binding it to <code>it</code> (a bit like Ruby's
<code>value&amp;.then { |v| ... }</code>).</p>`,

  ruby: `def lookup_name(id)
  return "Ada" if id == 1
  return "Rob" if id == 2
  nil
end

greeting = "Hello, " + (lookup_name(id) || "stranger")
first_char = lookup_name(id)&.[](0)`,

  task: `
<p>Build a tiny name directory and handle the missing cases idiomatically. All
declarations are top-level (no class or <code>main</code> needed):</p>
<ol>
  <li>Write <code>lookupName(id: Int): String?</code> that returns
      <code>"Ada"</code> for <code>1</code>, <code>"Rob"</code> for <code>2</code>,
      and <code>null</code> otherwise.</li>
  <li>Write <code>greet(id: Int): String</code> that returns
      <code>"Hello, &lt;name&gt;"</code>, falling back to <code>"stranger"</code>
      with the Elvis operator <code>?:</code> when the name is null.</li>
  <li>Write <code>initial(id: Int): Char?</code> that returns the first character
      of the name using a safe call <code>?.</code> (so a missing name yields
      <code>null</code>).</li>
  <li>Write <code>shout(name: String?): String</code> that returns the uppercased
      name plus <code>"!"</code> using <code>name?.let { ... }</code>, or
      <code>"(silence)"</code> when <code>name</code> is null.</li>
</ol>`,

  starter: `// 1. lookupName(id) -> a name, or null if unknown
fun lookupName(id: Int): String? {
    return null // TODO
}

// 2. greet(id) -> "Hello, <name>", or "Hello, stranger" (use ?:)
fun greet(id: Int): String {
    return "" // TODO
}

// 3. initial(id) -> first char of the name, or null (use ?.)
fun initial(id: Int): Char? {
    return null // TODO
}

// 4. shout(name) -> "<NAME>!", or "(silence)" if null (use ?.let)
fun shout(name: String?): String {
    return "" // TODO
}
`,

  requirements: [
    { pattern: /\?:/, message: "Use the Elvis operator ?: to supply a fallback" },
    { pattern: /\?\./, message: "Use a safe call ?. on a nullable value" },
    { pattern: /\.let\s*\{/, message: "Use ?.let { ... } to handle the nullable name" },
  ],

  tests: [
    { name: 'lookupName(1) is "Ada"', code: "        expect_eq(lookupName(1), \"Ada\")" },
    { name: 'lookupName(2) is "Rob"', code: "        expect_eq(lookupName(2), \"Rob\")" },
    { name: "lookupName(9) is null", code: "        expect_eq(lookupName(9), null)" },
    { name: 'greet(1) is "Hello, Ada"', code: "        expect_eq(greet(1), \"Hello, Ada\")" },
    { name: 'greet(9) falls back to "stranger"', code: "        expect_eq(greet(9), \"Hello, stranger\")" },
    { name: "initial(2) is 'R'", code: "        expect_eq(initial(2), 'R')" },
    { name: "initial(9) is null", code: "        expect_eq(initial(9), null)" },
    { name: 'shout("hi") is "HI!"', code: "        expect_eq(shout(\"hi\"), \"HI!\")" },
    { name: 'shout(null) is "(silence)"', code: "        expect_eq(shout(null), \"(silence)\")" },
  ],

  solution: `fun lookupName(id: Int): String? {
    return when (id) {
        1 -> "Ada"
        2 -> "Rob"
        else -> null
    }
}

fun greet(id: Int): String {
    return "Hello, " + (lookupName(id) ?: "stranger")
}

fun initial(id: Int): Char? {
    return lookupName(id)?.first()
}

fun shout(name: String?): String {
    return name?.let { "\${it.uppercase()}!" } ?: "(silence)"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>Nullable type</td><td>(any value may be <code>nil</code>)</td><td><code>String?</code></td></tr>
  <tr><td>Safe call</td><td><code>x&amp;.f</code></td><td><code>x?.f()</code></td></tr>
  <tr><td>Fallback</td><td><code>x || y</code></td><td><code>x ?: y</code></td></tr>
  <tr><td>Assert non-null</td><td>(no equivalent; just call it)</td><td><code>x!!</code> (throws at runtime)</td></tr>
  <tr><td>Run if non-null</td><td><code>x&amp;.then { |v| f(v) }</code></td><td><code>x?.let { f(it) }</code></td></tr>
</table>
<p>The key mental shift from Ruby: nullability is checked by the compiler, not
discovered at runtime. Ruby lets you call a method on <code>nil</code> and
blow up with <code>NoMethodError</code> whenever it happens to run; Kotlin
refuses to compile that call in the first place unless you've handled the
<code>null</code> case with <code>?.</code>, <code>?:</code>, or
<code>?.let { }</code>. The <code>!!</code> operator is your escape hatch when
you're sure a value can't be null — but unlike Ruby's implicit trust, it's an
explicit, searchable admission that you're skipping the check, and it throws
immediately if you're wrong. Chaining <code>?.</code> short-circuits the whole
chain to <code>null</code> the moment any link is null, similar to chaining
<code>&amp;.</code> in Ruby.</p>`,
};
