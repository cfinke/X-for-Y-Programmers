<script>
const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>Kotlin functions start with the <code>fun</code> keyword. Unlike Ruby's
<code>def</code>, each parameter needs an explicit type, and the return type
comes last, after a colon. The features you reach for in Ruby all have direct
Kotlin equivalents, often with a bit more ceremony up front but stricter
guarantees.</p>
<table>
  <tr><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td><code>def add(a, b)</code></td><td><code>fun add(a: Int, b: Int): Int</code></td></tr>
  <tr><td><code>def greet(name, greeting: "Hi")</code> (default)</td><td><code>greeting: String = "Hi"</code></td></tr>
  <tr><td><code>add(b: 2, a: 1)</code> (keyword args)</td><td><code>add(b = 2, a = 1)</code> (named args)</td></tr>
  <tr><td><code>def sum(*nums)</code></td><td><code>vararg nums: Int</code></td></tr>
  <tr><td>implicit <code>nil</code> return</td><td><code>: Unit</code> (usually omitted)</td></tr>
</table>
<p>Two things that feel new. First, when a function is just <em>one</em>
expression you can drop the braces and <code>return</code> and use
<code>=</code>: <code>fun square(n: Int) = n * n</code>. The return type is
inferred, exactly like Ruby's implicit last-expression return but spelled
differently. Second, Kotlin's <strong>named arguments</strong> work only for
parameters explicitly declared that way at the call site — much like Ruby's
keyword arguments: you can pass <code>greet(name = "Ada")</code> and even
reorder them, which pairs beautifully with default values so you only name
the arguments you want to change.</p>`,

  ruby: `def greet(name, greeting: "Hello")
  "#{greeting}, #{name}!"
end

def sum(*nums)
  nums.reduce(0) { |a, b| a + b }
end

$log = []
def log_message(message)
  $log.push(message)
  nil
end`,

  task: `
<p>Rewrite these three functions in idiomatic Kotlin. Top-level declarations are
fine — no class or <code>main</code> needed:</p>
<ol>
  <li>Write <code>greet(name: String, greeting: String = "Hello"): String</code>
      as a <strong>single-expression</strong> function that returns a template
      like <code>"Hello, Ada!"</code>. The default lets callers write
      <code>greet("Ada")</code>, and named arguments let them write
      <code>greet(name = "Ada", greeting = "Hi")</code>.</li>
  <li>Write <code>sum(vararg nums: Int): Int</code> as a single-expression
      function that adds up any number of arguments (hint: <code>nums.sum()</code>).
      With no arguments it returns <code>0</code>.</li>
  <li>Write <code>logMessage(message: String)</code>, which returns
      <code>Unit</code> and appends <code>message</code> to the top-level
      <code>log</code> list.</li>
</ol>`,

  starter: `// A shared log the tests inspect.
val log = mutableListOf<String>()

// 1. Single-expression function with a default argument.
fun greet(name: String, greeting: String = "Hello"): String = "" // TODO

// 2. Single-expression function taking a vararg of Ints.
fun sum(vararg nums: Int): Int = 0 // TODO

// 3. A Unit-returning function (no return type needed).
fun logMessage(message: String) {
    // TODO
}
`,

  requirements: [
    { pattern: /fun\s+greet\([^)]*greeting:\s*String\s*=\s*"Hello"[^)]*\)\s*:\s*String\s*=/, message: "Write greet as a single-expression function with a default: greeting: String = \"Hello\"" },
    { pattern: /fun\s+sum\(\s*vararg\s+nums:\s*Int\s*\)\s*:\s*Int\s*=/, message: "Write sum as a single-expression function taking vararg nums: Int" },
    { pattern: /log\.add\(/, message: "logMessage should append to the log list with log.add(...)" },
  ],

  tests: [
    { name: 'greet("Ada") uses the default greeting', code: '        expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'greet("Ada", "Hi") overrides the greeting', code: '        expect_eq(greet("Ada", "Hi"), "Hi, Ada!")' },
    { name: "greet with named arguments", code: '        expect_eq(greet(name = "Ada", greeting = "Hey"), "Hey, Ada!")' },
    { name: "greet with reordered named arguments", code: '        expect_eq(greet(greeting = "Yo", name = "Bo"), "Yo, Bo!")' },
    { name: "sum() with no arguments is 0", code: "        expect_eq(sum(), 0)" },
    { name: "sum(1, 2, 3) is 6", code: "        expect_eq(sum(1, 2, 3), 6)" },
    { name: "sum spreads an array with *", code: "        val nums = intArrayOf(4, 5, 6)\n        expect_eq(sum(*nums), 15)" },
    { name: "logMessage returns Unit and appends", code: '        val before = log.size\n        val result: Unit = logMessage("hello")\n        expect_true(result == Unit)\n        expect_eq(log.size, before + 1)\n        expect_eq(log.last(), "hello")' },
  ],

  solution: `val log = mutableListOf<String>()

fun greet(name: String, greeting: String = "Hello"): String = "$greeting, $name!"

fun sum(vararg nums: Int): Int = nums.sum()

fun logMessage(message: String) {
    log.add(message)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>Single expression</td><td><code>def f(n) = n * n end</code> (implicit return)</td><td><code>fun f(n: Int) = n * n</code></td></tr>
  <tr><td>Default argument</td><td><code>def f(x = 1)</code></td><td><code>fun f(x: Int = 1)</code></td></tr>
  <tr><td>Named/keyword argument</td><td><code>def f(x:); f(x: 1)</code></td><td><code>f(x = 1)</code></td></tr>
  <tr><td>Rest / vararg</td><td><code>def f(*xs)</code></td><td><code>fun f(vararg xs: Int)</code></td></tr>
  <tr><td>Spread a collection</td><td><code>f(*arr)</code></td><td><code>f(*arr)</code></td></tr>
  <tr><td>No return value</td><td>implicit <code>nil</code></td><td><code>: Unit</code> (omit it)</td></tr>
</table>
<p>A few Kotlin-isms worth remembering. Named arguments are not just sugar — they
make call sites self-documenting, much like Ruby's keyword arguments, but in
Kotlin any parameter can be called by name, not just ones you specially mark.
To pass an existing array into a <code>vararg</code>, use the <em>spread
operator</em> <code>*</code> (e.g. <code>sum(*nums)</code>), which looks just
like Ruby's splat but is a Kotlin operator on arrays, not on any enumerable.
Finally, <code>Unit</code> is a real type with a single value (also written
<code>Unit</code>) — Kotlin's closest analogue to Ruby's implicit
<code>nil</code> return, except every function's "nothing" is explicitly
typed; a function with no declared return type returns it implicitly, so you
almost never type it out.</p>`,
};
