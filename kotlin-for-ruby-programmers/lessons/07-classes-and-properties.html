const LESSON = {
  number: 7,
  title: "Classes & Properties",

  intro: `
<p>Kotlin classes will feel familiar, but the syntax is dramatically tighter than
Ruby's. The star of the show is the <em>primary constructor</em>: you
declare a class's parameters right after its name, and prefixing one with
<code>val</code> or <code>var</code> turns it into a property in the same breath.
No <code>@x = x</code> boilerplate in an <code>initialize</code> method, no
separate <code>attr_reader</code> declarations.</p>
<table>
  <tr><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td><code>class P; def initialize(name); @name = name; end; attr_reader :name; end</code></td><td><code>class P(val name: String)</code></td></tr>
  <tr><td><code>attr_reader</code> ivar</td><td><code>val</code> property</td></tr>
  <tr><td><code>attr_accessor</code> ivar</td><td><code>var</code> property</td></tr>
  <tr><td><code>P.new("Ada")</code></td><td><code>P("Ada")</code> (no <code>new</code>/<code>.new</code>)</td></tr>
  <tr><td><code>def x; …; end</code></td><td><code>val x get() = …</code></td></tr>
</table>
<p>A <code>val</code> constructor parameter is a read-only property (like
Ruby's <code>attr_reader</code>); a <code>var</code> parameter is mutable, like
<code>attr_accessor</code>. Any setup logic that a primary constructor can't
express inline goes in an <code>init { }</code> block, which runs as part of
construction &mdash; the Kotlin analog of Ruby's <code>initialize</code> body.
Computed properties use <code>get()</code>, and a mutable property can
intercept writes with <code>set(value)</code> using the magic <code>field</code>
backing identifier.</p>`,

  ruby: `class BankAccount
  attr_reader :owner
  attr_accessor :balance

  def initialize(owner, starting_balance)
    raise ArgumentError, "negative" if starting_balance < 0
    @owner = owner
    @balance = starting_balance
    @note = ""
  end

  def summary
    "#{owner} has #{balance}"
  end

  def note=(value)
    @note = value.strip
  end
  attr_reader :note

  def deposit(amount)
    self.balance += amount
  end

  def withdraw(amount)
    return false if amount > balance
    self.balance -= amount
    true
  end
end`,

  task: `
<p>Build a <code>BankAccount</code> class. No module-level function tricks
here &mdash; this lesson is about classes:</p>
<ol>
  <li>Give it a primary constructor <code>(val owner: String, startingBalance:
      Int)</code>. <code>owner</code> is a read-only property; use
      <code>startingBalance</code> to initialize a <code>var balance</code>.</li>
  <li>Add an <code>init { }</code> block that calls
      <code>require(startingBalance &gt;= 0)</code> so negative balances throw.</li>
  <li>Add a computed <code>val summary: String</code> with a custom
      <code>get()</code> returning <code>"&lt;owner&gt; has &lt;balance&gt;"</code>.</li>
  <li>Add a <code>var note: String = ""</code> whose custom <code>set(value)</code>
      stores <code>value.trim()</code> into <code>field</code>.</li>
  <li>Add <code>deposit(amount)</code> (adds to <code>balance</code>) and
      <code>withdraw(amount): Boolean</code> (returns <code>false</code> if
      <code>amount &gt; balance</code>, otherwise subtracts and returns
      <code>true</code>).</li>
</ol>`,

  starter: `class BankAccount(val owner: String, startingBalance: Int) {
    // A mutable property initialized from a constructor parameter.
    var balance: Int = 0 // TODO: start from startingBalance

    // A property with a custom setter that trims the incoming value.
    var note: String = ""

    // TODO: an init { } block that require()s startingBalance >= 0

    // A computed, read-only property.
    val summary: String
        get() = "" // TODO: "<owner> has <balance>"

    fun deposit(amount: Int) {
        // TODO
    }

    fun withdraw(amount: Int): Boolean {
        return false // TODO
    }
}
`,

  requirements: [
    { pattern: /class\s+BankAccount\s*\(\s*val\s+owner/, message: "Declare owner as a val in the primary constructor" },
    { pattern: /\binit\s*\{/, message: "Use an init { } block to validate the starting balance" },
    { pattern: /\bget\(\)\s*=/, message: "Give summary a computed custom getter with get()" },
    { pattern: /\bset\(\s*\w+\s*\)/, message: "Give note a custom setter with set(value)" },
  ],

  tests: [
    { name: "owner is a read-only property", code: "        val a = BankAccount(\"Ada\", 100)\n        expect_eq(a.owner, \"Ada\")" },
    { name: "balance starts from the constructor argument", code: "        val a = BankAccount(\"Ada\", 100)\n        expect_eq(a.balance, 100)" },
    { name: "deposit adds to the balance", code: "        val a = BankAccount(\"Ada\", 100)\n        a.deposit(50)\n        expect_eq(a.balance, 150)" },
    { name: "withdraw subtracts and returns true", code: "        val a = BankAccount(\"Ada\", 100)\n        val ok = a.withdraw(40)\n        expect_true(ok)\n        expect_eq(a.balance, 60)" },
    { name: "withdraw fails when funds are insufficient", code: "        val a = BankAccount(\"Bo\", 20)\n        expect_true(!a.withdraw(100))\n        expect_eq(a.balance, 20)" },
    { name: "summary is a computed property", code: "        expect_eq(BankAccount(\"Ada\", 100).summary, \"Ada has 100\")" },
    { name: "note setter trims the value", code: "        val a = BankAccount(\"Cy\", 0)\n        a.note = \"  hello  \"\n        expect_eq(a.note, \"hello\")" },
  ],

  solution: `class BankAccount(val owner: String, startingBalance: Int) {
    var balance: Int = startingBalance
        private set

    var note: String = ""
        set(value) {
            field = value.trim()
        }

    init {
        require(startingBalance >= 0) { "starting balance cannot be negative" }
    }

    val summary: String
        get() = "$owner has $balance"

    fun deposit(amount: Int) {
        balance += amount
    }

    fun withdraw(amount: Int): Boolean {
        if (amount > balance) return false
        balance -= amount
        return true
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>Property in constructor</td><td><code>def initialize(name); @name = name; end</code></td><td><code>class C(val name: String)</code></td></tr>
  <tr><td>Read-only property</td><td><code>attr_reader</code></td><td><code>val</code></td></tr>
  <tr><td>Mutable property</td><td><code>attr_accessor</code></td><td><code>var</code></td></tr>
  <tr><td>Construction-time setup</td><td><code>initialize</code> body</td><td><code>init { }</code></td></tr>
  <tr><td>Computed property</td><td><code>def x; …; end</code></td><td><code>val x get() = …</code></td></tr>
  <tr><td>Write interceptor</td><td><code>def x=(v); …; end</code></td><td><code>set(value) { field = … }</code></td></tr>
  <tr><td>Read-only from outside</td><td><code>attr_reader</code> + private writer</td><td><code>var x = 0; private set</code></td></tr>
</table>
<p>The <code>field</code> identifier inside a custom setter (or getter) is
Kotlin's <em>backing field</em> &mdash; it's the storage behind the property, and
you must use it instead of <code>this.note</code> to avoid infinite recursion (a
Ruby writer method that calls <code>self.note = value</code> recurses too;
that's why you'd normally assign a separate <code>@note</code> ivar instead). A
<code>private set</code> gives you a property that anyone can read but only the
class can write &mdash; Kotlin's clean answer to a public reader with a private
writer. Note there is no <code>new</code> or <code>.new</code>:
<code>BankAccount("Ada", 100)</code> constructs an instance directly.</p>`,
};
