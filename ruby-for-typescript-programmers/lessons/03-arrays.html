const LESSON = {
  number: 3,
  title: "Arrays",

  intro: `
<p>A Ruby array is what you'd get if you deleted the <code>number[]</code>
annotation and kept everything else: an ordered, growable list that holds
references and doesn't care what's inside — <code>[1, "two", :three]</code> is
perfectly legal, because nothing checks. <code>arr.push(x)</code> exists and
works, but idiomatic Ruby writes <code>arr &lt;&lt; x</code> — the "shovel"
operator — which appends <em>and returns the array</em>, so shovels chain:
<code>list &lt;&lt; 1 &lt;&lt; 2</code>.</p>
<table>
  <tr><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td><code>const a: number[] = [1, 2];</code></td><td><code>a = [1, 2]</code></td></tr>
  <tr><td><code>arr.push(x)</code></td><td><code>arr &lt;&lt; x</code> (idiomatic; <code>push</code> works too)</td></tr>
  <tr><td><code>arr[arr.length - 1]</code></td><td><code>arr[-1]</code> or <code>arr.last</code></td></tr>
  <tr><td><code>arr.slice(1, 3)</code></td><td><code>arr[1..2]</code> (range, end-inclusive)</td></tr>
  <tr><td><code>arr.includes(x)</code></td><td><code>arr.include?(x)</code></td></tr>
  <tr><td><code>arr.reduce((a, b) =&gt; a + b, 0)</code></td><td><code>arr.sum</code></td></tr>
</table>
<p>The upgrade you'll miss everywhere else once you have it: <strong>negative
indexing</strong>. <code>arr[-1]</code> is the last element, <code>arr[-2]</code>
the second-to-last — no <code>arr.length - 1</code> arithmetic, no
<code>.at(-1)</code> half-measure. There are also plain methods
<code>arr.first</code> and <code>arr.last</code>, and both <code>.length</code>
and <code>.size</code> work (they're aliases). Slicing uses a range:
<code>arr[1..2]</code> includes index 2, <code>arr[1...3]</code> excludes it.</p>`,

  typescript: `const scores: number[] = [10, 20, 30];
scores.push(40);

const first = scores[0];
const last = scores[scores.length - 1]; // no negative indexes

function append(arr: number[], x: number): number[] {
  arr.push(x);       // mutates the caller's array (it's a reference)
  return arr;
}

const total = scores.reduce((sum, n) => sum + n, 0);

const middle = scores.slice(1, 3);      // [20, 30]

console.log(scores.length);             // 4
console.log(scores.includes(20));       // true`,

  task: `
<p>Rewrite the TypeScript on the left as four Ruby methods:</p>
<ol>
  <li><code>make_scores</code> — take no arguments and produce the array
      <code>[10, 20, 30]</code>. No type to declare; the literal is the whole
      method body.</li>
  <li><code>append(arr, x)</code> — push <code>x</code> with <code>&lt;&lt;</code>
      and hand back the array. Like JS/TS, Ruby arrays are references, so
      <code>&lt;&lt;</code> mutates the caller's array — exactly the behavior
      you already know from <code>push</code>. Bonus: <code>&lt;&lt;</code>
      itself evaluates to the array, so it can be the last expression.</li>
  <li><code>total(nums)</code> — the whole <code>reduce</code> dance is just
      <code>.sum</code>.</li>
  <li><code>ends(arr)</code> — produce a two-element array
      <code>[first element, last element]</code> using <code>.first</code> and
      <code>.last</code> (or <code>arr[-1]</code>).</li>
</ol>`,

  starter: `# 1. make_scores: no annotations — the literal is the whole body.
def make_scores
  raise NotImplementedError, "TODO: implement make_scores"
end

# 2. append: shovel x in with << — it mutates AND evaluates to the array,
#    so one line can do the whole job.

  raise NotImplementedError, "TODO: implement append"
end

# 3. total: reduce((a, b) => a + b, 0) collapses to .sum

  raise NotImplementedError, "TODO: implement total"
end

# 4. ends: [arr.first, arr.last] — or play with arr[0] and arr[-1].
def ends(arr)
  raise NotImplementedError, "TODO: implement ends"
end
`,

  requirements: [
    { pattern: /<</, message: "Append with the << shovel operator" },
    { pattern: /\.sum/, message: "Use .sum in total" },
    { pattern: /\.first/, message: "Use .first in ends" },
    { pattern: /\.last|\[-1\]/, message: "Use .last (or arr[-1]) in ends" },
  ],

  tests: [
    { name: "make_scores returns [10, 20, 30]",
      code: "  expect_eq(make_scores, [10, 20, 30])" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "  expect_eq(append([1, 2], 3), [1, 2, 3])" },
    { name: "append mutates the caller's array (references, like JS)",
      code: "  a = [1]\n  append(a, 2)\n  expect_eq(a, [1, 2])" },
    { name: "total([10, 20, 30]) returns 60",
      code: "  expect_eq(total([10, 20, 30]), 60)" },
    { name: "total([]) returns 0",
      code: "  expect_eq(total([]), 0)" },
    { name: "ends([5, 6, 7]) returns [5, 7]",
      code: "  expect_eq(ends([5, 6, 7]), [5, 7])" },
  ],

  solution: `def make_scores
  [10, 20, 30]
end

def append(arr, x)
  arr << x
end

def total(nums)
  nums.sum
end

def ends(arr)
  [arr.first, arr.last]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td>Append</td><td><code>arr.push(x)</code></td><td><code>arr &lt;&lt; x</code> (returns the array; chainable)</td></tr>
  <tr><td>Length</td><td><code>arr.length</code></td><td><code>arr.length</code> or <code>arr.size</code></td></tr>
  <tr><td>Last element</td><td><code>arr[arr.length - 1]</code> / <code>arr.at(-1)</code></td><td><code>arr[-1]</code> or <code>arr.last</code></td></tr>
  <tr><td>First element</td><td><code>arr[0]</code></td><td><code>arr[0]</code> or <code>arr.first</code></td></tr>
  <tr><td>Slice</td><td><code>arr.slice(1, 3)</code></td><td><code>arr[1..2]</code> (inclusive) / <code>arr[1...3]</code> (exclusive)</td></tr>
  <tr><td>Contains</td><td><code>arr.includes(x)</code></td><td><code>arr.include?(x)</code></td></tr>
  <tr><td>Sum</td><td><code>arr.reduce((a, b) =&gt; a + b, 0)</code></td><td><code>arr.sum</code></td></tr>
  <tr><td>Out of bounds</td><td><code>undefined</code></td><td><code>nil</code></td></tr>
</table>
<p>Two things carried over unchanged from JS: arrays are references (passing
one to a method and mutating it mutates the caller's copy), and reading past
the end quietly yields a nothing-value (<code>nil</code> here) rather than
throwing. What's new is that <code>1..2</code> in the slice isn't syntax — it's
a <code>Range</code> object, a real value you can assign and pass around, and
it will return in <code>case</code> expressions and <code>Enumerable</code>
later in the course.</p>`,
};
