const LESSON = {
  number: 8,
  title: "Control Flow & case",

  intro: `
<p>Ruby's <code>if</code> drops the parentheses and the braces:
<code>if cond ... elsif ... else ... end</code> (note the spelling —
<code>elsif</code>, not <code>else if</code>). Then it adds two things
TypeScript doesn't have. First, the <strong>modifier form</strong>:
<code>return x if cond</code> puts the condition <em>after</em> the
statement — very Ruby for guard clauses and early exits. Second,
<code>unless</code>, which is <code>if !</code> spelled for humans:
<code>raise "empty" unless items.any?</code>.</p>
<table>
  <tr><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td><code>if (x &gt; 0) { ... } else if ...</code></td><td><code>if x &gt; 0 ... elsif ... end</code></td></tr>
  <tr><td><code>if (n === 0) return "zero";</code></td><td><code>return "zero" if n.zero?</code></td></tr>
  <tr><td><code>if (!done) { ... }</code></td><td><code>... unless done</code></td></tr>
  <tr><td><code>switch (day) { case "sat": case "sun": ... }</code></td><td><code>case day when "sat", "sun" then ...</code></td></tr>
  <tr><td><code>break;</code> after every case</td><td>no fallthrough — nothing to break out of</td></tr>
</table>
<p><code>switch</code> is replaced by <code>case/when</code>, and it's simply
better. There is no fallthrough, so no <code>break</code> litter. A single
<code>when</code> takes multiple values (<code>when "sat", "sun"</code>) —
that's the grouped-cases idiom without stacked labels. Arms can be
<em>ranges</em>: <code>when 90..</code> matches 90 and up. And like everything
in Ruby, the whole <code>case</code> is an expression — its result is
whatever the chosen arm produces, so <code>grade = case score ... end</code>
just works.</p>`,

  typescript: `function grade(score: number): string {
  if (score >= 90) return "A";
  else if (score >= 60) return "pass";
  else return "fail";
}

function dayType(day: string): string {
  switch (day) {
    case "sat":          // grouped by fallthrough...
    case "sun":
      return "weekend";
    default:
      return "weekday";  // ...and don't forget break elsewhere!
  }
}

function describeNumber(n: number): string {
  if (n === 0) return "zero";
  return n > 0 ? "positive" : "negative";
}`,

  task: `
<ol>
  <li><code>grade(score)</code> — a single <code>case score</code> expression:
      <code>when 90..</code> gives <code>"A"</code>, <code>when 60...90</code>
      gives <code>"pass"</code>, <code>else</code> <code>"fail"</code>. Let
      the <code>case</code> itself be the method's return value.</li>
  <li><code>day_type(day)</code> — <code>case day</code> with one grouped arm,
      <code>when "sat", "sun"</code>, returning <code>"weekend"</code>;
      everything else is <code>"weekday"</code>.</li>
  <li><code>describe_number(n)</code> — start with the modifier form
      <code>return "zero" if n.zero?</code>, then use a plain
      <code>if/else</code> <em>expression</em> (no <code>return</code>s) to
      yield <code>"positive"</code> or <code>"negative"</code>.</li>
</ol>`,

  starter: `# 1. One case expression: when 90.. then "A"; when 60...90 then "pass".
#    (90.. is an endless range; 60...90 excludes 90.)
def grade(score)
  raise NotImplementedError, "TODO: implement grade"
end

# 2. Group values in a single arm: when "sat", "sun" — no fallthrough games.
def day_type(day)
  raise NotImplementedError, "TODO: implement day_type"
end

# 3. Guard first with a modifier if, then an if/else expression.
def describe_number(n)
  raise NotImplementedError, "TODO: implement describe_number"
end
`,

  requirements: [
    { pattern: /case\b/, message: "Use a case expression" },
    { pattern: /when\s+["\d]/, message: "Match with when arms (values or ranges)" },
    { pattern: /unless|if\s/, message: "Use if (try the modifier form) or unless" },
  ],

  tests: [
    { name: 'grade: 95 and 90 are "A" (endless range 90..)',
      code: '  expect_eq(grade(95), "A")\n  expect_eq(grade(90), "A")' },
    { name: 'grade: 75 and 60 are "pass"',
      code: '  expect_eq(grade(75), "pass")\n  expect_eq(grade(60), "pass")' },
    { name: 'grade: 59 is "fail"',
      code: '  expect_eq(grade(59), "fail")' },
    { name: 'day_type: "sat" and "sun" are "weekend"',
      code: '  expect_eq(day_type("sat"), "weekend")\n  expect_eq(day_type("sun"), "weekend")' },
    { name: 'day_type: "mon" is "weekday"',
      code: '  expect_eq(day_type("mon"), "weekday")' },
    { name: 'describe_number: 0 is "zero", 5 "positive", -2 "negative"',
      code: '  expect_eq(describe_number(0), "zero")\n  expect_eq(describe_number(5), "positive")\n  expect_eq(describe_number(-2), "negative")' },
  ],

  solution: `def grade(score)
  case score
  when 90.. then "A"
  when 60...90 then "pass"
  else "fail"
  end
end

def day_type(day)
  case day
  when "sat", "sun" then "weekend"
  else "weekday"
  end
end

def describe_number(n)
  return "zero" if n.zero?
  if n > 0
    "positive"
  else
    "negative"
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td>Branching</td><td><code>if (c) { } else if (c2) { }</code></td><td><code>if c ... elsif c2 ... end</code></td></tr>
  <tr><td>Guard clause</td><td><code>if (c) return x;</code></td><td><code>return x if c</code> (modifier)</td></tr>
  <tr><td>Negated branch</td><td><code>if (!c) { ... }</code></td><td><code>unless c ... end</code> (or a modifier)</td></tr>
  <tr><td>Multi-way</td><td><code>switch</code> + <code>break</code></td><td><code>case/when</code>, no fallthrough</td></tr>
  <tr><td>Grouped cases</td><td>stacked <code>case</code> labels</td><td><code>when "sat", "sun"</code></td></tr>
  <tr><td>Range cases</td><td>if/else chain</td><td><code>when 90..</code>, <code>when 60...90</code></td></tr>
  <tr><td>As an expression</td><td>ternary only</td><td><code>if</code> and <code>case</code> both return values</td></tr>
</table>
<p>Under the hood each <code>when</code> arm asks <code>arm === value</code>
— and classes, ranges, and regexps all define <code>===</code> as "does this
value belong to me?". That's why <code>when 90..</code> and even
<code>when String</code> or <code>when /^ERR/</code> work as match arms.
Style tip: Ruby has a ternary (<code>n &gt; 0 ? "pos" : "neg"</code>), but
because <code>if/else</code> is already an expression, rubyists reach for the
ternary far less than you do in TypeScript.</p>`,
};
