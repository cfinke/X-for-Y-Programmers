const LESSON = {
  number: 9,
  title: "Classes & Objects",

  intro: `
<p>Ruby classes will feel familiar in shape and lighter in every detail. The
constructor is a regular method named <code>initialize</code>, and you don't
call it directly — <code>new BankAccount("Ada")</code> becomes
<code>BankAccount.new("Ada")</code>: <code>new</code> is a <em>method on the
class</em> that allocates the object and forwards your arguments to
<code>initialize</code>. Instance variables are spelled <code>@balance</code>
instead of <code>this._balance</code>, and — the part that surprises
TypeScript hands — they need <strong>no declaration at all</strong>. An ivar
springs into being the moment you assign to it, and reading one that was
never set quietly gives <code>nil</code>.</p>
<table>
  <tr><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td><code>new BankAccount("Ada")</code></td><td><code>BankAccount.new("Ada")</code></td></tr>
  <tr><td><code>constructor(owner: string) { }</code></td><td><code>def initialize(owner)</code></td></tr>
  <tr><td><code>this._balance = 0;</code></td><td><code>@balance = 0</code> (no declaration needed)</td></tr>
  <tr><td><code>get balance() { return this._balance; }</code></td><td><code>attr_reader :balance</code></td></tr>
  <tr><td><code>constructor(public readonly owner: string)</code></td><td><code>attr_reader :owner</code> + assign in initialize</td></tr>
</table>
<p>Ivars are always private — the <em>only</em> way in from outside is a
method. Writing those getters by hand would be tedious, so
<code>attr_reader :owner, :balance</code> <em>generates</em> them for you
(<code>attr_accessor</code> adds setters too). It's Ruby's answer to
parameter properties, and it's just a method call that writes methods.
Finally, <code>$this</code>-anxiety can go: inside instance methods you can
call sibling methods and ivars bare; <code>self</code> exists but mostly
stays implicit.</p>`,

  typescript: `class BankAccount {
  private _balance = 0;

  // Parameter property: declares AND assigns owner.
  constructor(public readonly owner: string) {}

  get balance(): number {
    return this._balance;
  }

  deposit(amount: number): void {
    this._balance += amount;
  }

  withdraw(amount: number): boolean {
    if (amount > this._balance) return false;
    this._balance -= amount;
    return true;
  }
}

const acct = new BankAccount("Ada");`,

  task: `
<p>Build <code>BankAccount</code> in Ruby:</p>
<ol>
  <li><code>initialize(owner)</code> — set <code>@owner</code> from the
      argument and start <code>@balance</code> at <code>0</code>. No field
      declarations anywhere: the assignments <em>are</em> the fields.</li>
  <li>Expose both with <code>attr_reader :owner, :balance</code> — one line,
      two getters, no setters (callers shouldn't assign a balance).</li>
  <li><code>deposit(amount)</code> — add to <code>@balance</code>.</li>
  <li><code>withdraw(amount)</code> — if <code>amount</code> exceeds the
      balance, return <code>false</code> and change nothing; otherwise deduct
      it and return <code>true</code>. (A modifier <code>if</code> from
      lesson 8 makes a tidy guard.)</li>
</ol>`,

  starter: `class BankAccount
  # Hint: one line here can generate both getters (see the intro).

  def initialize(owner)
    raise NotImplementedError, "TODO: set @owner and start @balance at 0"
  end

  def deposit(amount)
    raise NotImplementedError, "TODO: add amount to @balance"
  end

  def withdraw(amount)
    raise NotImplementedError, "TODO: false if amount > @balance, else deduct and true"
  end
end
`,

  requirements: [
    { pattern: /class\s+BankAccount/, message: "Define class BankAccount" },
    { pattern: /def\s+initialize/, message: "The constructor is a method named initialize" },
    { pattern: /attr_reader|attr_accessor/, message: "Generate the getters with attr_reader (or attr_accessor)" },
    { pattern: /@balance/, message: "Track the money in the @balance instance variable" },
  ],

  tests: [
    { name: 'BankAccount.new("Ada") has owner "Ada" and balance 0',
      code: '  acct = BankAccount.new("Ada")\n  expect_eq(acct.owner, "Ada")\n  expect_eq(acct.balance, 0)' },
    { name: "deposit(100) then deposit(50) leaves balance 150",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(100)\n  acct.deposit(50)\n  expect_eq(acct.balance, 150)' },
    { name: "withdraw(30) from 100 returns true and leaves 70",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(100)\n  expect_eq(acct.withdraw(30), true)\n  expect_eq(acct.balance, 70)' },
    { name: "withdraw(1000) from 100 returns false and leaves the balance unchanged",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(100)\n  expect_eq(acct.withdraw(1000), false)\n  expect_eq(acct.balance, 100)' },
  ],

  solution: `class BankAccount
  attr_reader :owner, :balance

  def initialize(owner)
    @owner = owner
    @balance = 0
  end

  def deposit(amount)
    @balance += amount
  end

  def withdraw(amount)
    return false if amount > @balance
    @balance -= amount
    true
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td>Instantiate</td><td><code>new Thing(x)</code></td><td><code>Thing.new(x)</code> (new is a method)</td></tr>
  <tr><td>Constructor</td><td><code>constructor(x) { }</code></td><td><code>def initialize(x)</code></td></tr>
  <tr><td>Field</td><td>declared, typed, on <code>this</code></td><td><code>@ivar</code> — exists on first assignment</td></tr>
  <tr><td>Getter</td><td><code>get x() { ... }</code></td><td><code>attr_reader :x</code></td></tr>
  <tr><td>Getter + setter</td><td><code>get</code>/<code>set</code> pair</td><td><code>attr_accessor :x</code></td></tr>
  <tr><td>Visibility</td><td><code>private</code> keyword, compile-time</td><td>ivars always private; methods public by default</td></tr>
  <tr><td>Self-reference</td><td><code>this.helper()</code></td><td>bare <code>helper</code> (implicit self)</td></tr>
</table>
<p><code>attr_reader :balance</code> isn't syntax — it's a class-level method
call that defines a <code>balance</code> method returning
<code>@balance</code>. Classes in Ruby are executable code, which is how
libraries like Rails conjure methods at load time. One habit to keep from
this lesson: since unset ivars read as <code>nil</code> rather than erroring,
a typo like <code>@blance</code> won't crash where you wrote it — it shows up
later as a mysterious <code>nil</code>. Initialize everything in
<code>initialize</code>.</p>`,
};
