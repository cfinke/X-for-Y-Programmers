const LESSON = {
  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>In TypeScript you reach for a backtick when you want interpolation. Ruby's
version is <code>"#{name}"</code> — and it only works inside <strong>double</strong>
quotes. Single-quoted strings are almost entirely literal:
<code>'#{name}'</code> prints those exact nine characters. That's the one rule
to internalize today; everything else is just shorter method names.</p>
<table>
  <tr><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td><code>\`Hello, \${name}!\`</code></td><td><code>"Hello, #{name}!"</code></td></tr>
  <tr><td><code>s.toUpperCase()</code></td><td><code>s.upcase</code></td></tr>
  <tr><td><code>s.includes("x")</code></td><td><code>s.include?("x")</code></td></tr>
  <tr><td><code>s.length</code></td><td><code>s.length</code> (same!)</td></tr>
  <tr><td><code>words.join(", ")</code></td><td><code>words.join(", ")</code> (same!)</td></tr>
</table>
<p>Notice <code>include?</code> — the question mark is <em>part of the method
name</em>. Ruby's convention is that any method answering yes/no ends in
<code>?</code>: <code>empty?</code>, <code>start_with?</code>,
<code>include?</code>. You can (and today, will) name your own methods this
way. Also notice there are no parentheses on <code>upcase</code> — argument-less
calls usually drop them. For multi-line text, Ruby has heredocs
(<code>&lt;&lt;~TEXT ... TEXT</code>), the analog of a multi-line template
literal.</p>`,

  typescript: `const name = "Ada";
const greeting = \`Hello, \${name}!\`;

function shout(s: string): string {
  return s.toUpperCase();
}

function containsWord(haystack: string, needle: string): boolean {
  return haystack.includes(needle);
}

function joinWords(words: string[]): string {
  return words.join(", ");
}

console.log(shout(greeting));               // "HELLO, ADA!"
console.log(greeting.length);               // 11
console.log(containsWord(greeting, "Ada")); // true`,

  task: `
<p>Rewrite the TypeScript as four Ruby methods:</p>
<ol>
  <li><code>shout(s)</code> — uppercase the string. <code>.toUpperCase()</code>
      becomes plain <code>.upcase</code> (no parentheses needed).</li>
  <li><code>greet(name)</code> — build <code>"Hello, #{name}!"</code> with
      interpolation. Double quotes, <code>#{}</code> instead of
      <code>\${}</code>.</li>
  <li><code>contains_word?(haystack, needle)</code> — yes, name the method with
      a trailing <code>?</code>; it returns true/false, so Ruby convention says
      it should. Use <code>.include?</code> inside.</li>
  <li><code>join_words(words)</code> — join with <code>", "</code>. This one is
      literally the same code as TypeScript.</li>
</ol>
<p>Remember: last expression is the return value — no <code>return</code>
needed anywhere.</p>`,

  starter: `# 1. shout: .toUpperCase() becomes .upcase — shorter name, no parens.

  raise NotImplementedError, "TODO: implement shout"
end

# 2. greet: interpolate with #{} inside DOUBLE quotes.
def greet(name)
  raise NotImplementedError, "TODO: implement greet"
end

# 3. contains_word?: the ? really is part of the method name.
#    .includes(needle) becomes .include?(needle).
def contains_word?(haystack, needle)
  raise NotImplementedError, "TODO: implement contains_word?"
end

# 4. join_words: exactly like TS — join with ", ".
def join_words(words)
  raise NotImplementedError, "TODO: implement join_words"
end
`,

  requirements: [
    { pattern: /#\{/, message: 'Interpolate with #{} inside a double-quoted string' },
    { pattern: /\.upcase/, message: "Use .upcase in shout" },
    { pattern: /\.include\?/, message: "Use .include? in contains_word?" },
    { pattern: /def\s+contains_word\?/, message: "Name the predicate contains_word? — question mark included" },
  ],

  tests: [
    { name: 'shout("hello") returns "HELLO"',
      code: '  expect_eq(shout("hello"), "HELLO")' },
    { name: 'shout("Ruby 3.4") returns "RUBY 3.4"',
      code: '  expect_eq(shout("Ruby 3.4"), "RUBY 3.4")' },
    { name: 'greet("Ada") returns "Hello, Ada!"',
      code: '  expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'contains_word?("the quick brown fox", "quick") is true',
      code: '  expect_true(contains_word?("the quick brown fox", "quick"))' },
    { name: 'contains_word?("the quick brown fox", "slow") is false',
      code: '  expect_eq(contains_word?("the quick brown fox", "slow"), false)' },
    { name: 'join_words(["red", "green", "blue"]) returns "red, green, blue"',
      code: '  expect_eq(join_words(["red", "green", "blue"]), "red, green, blue")' },
  ],

  solution: `def shout(s)
  s.upcase
end

def greet(name)
  "Hello, #{name}!"
end

def contains_word?(haystack, needle)
  haystack.include?(needle)
end

def join_words(words)
  words.join(", ")
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td>Interpolation</td><td><code>\`\${name}!\`</code></td><td><code>"#{name}!"</code> (double quotes only)</td></tr>
  <tr><td>Literal string</td><td><code>'no interpolation'</code></td><td><code>'#{this} stays as-is'</code></td></tr>
  <tr><td>Upper / lower</td><td><code>.toUpperCase()</code> / <code>.toLowerCase()</code></td><td><code>.upcase</code> / <code>.downcase</code></td></tr>
  <tr><td>Contains</td><td><code>s.includes(x)</code></td><td><code>s.include?(x)</code></td></tr>
  <tr><td>Trim</td><td><code>s.trim()</code></td><td><code>s.strip</code></td></tr>
  <tr><td>Length</td><td><code>s.length</code></td><td><code>s.length</code> or <code>s.size</code></td></tr>
  <tr><td>Repeat</td><td><code>s.repeat(3)</code></td><td><code>s * 3</code></td></tr>
  <tr><td>Multi-line</td><td>template literal</td><td>heredoc: <code>&lt;&lt;~TEXT ... TEXT</code></td></tr>
</table>
<p>The <code>?</code> suffix is pure convention — the parser just allows it in
method names — but it's a convention the entire standard library follows, so
<code>if s.empty?</code> reads like English. Interpolation takes any expression
(<code>"#{2 + 2}"</code>, <code>"#{name.upcase}"</code>) and calls
<code>.to_s</code> on the result for you, so there's no <code>String(x)</code>
dance at the seams.</p>`,
};
