const LESSON = {
  number: 7,
  title: "Everything Is an Object",

  intro: `
<p>TypeScript inherits JavaScript's split personality: primitives
(<code>number</code>, <code>string</code>, <code>boolean</code>) on one side,
objects on the other, with capabilities for the primitives parked in
namespaces like <code>Math</code>. Ruby has no such split. <em>Every</em>
value is a full object that receives messages: <code>5.times</code>,
<code>-3.abs</code>, <code>2.even?</code>, <code>10.gcd(4)</code>,
<code>3.14.round(1)</code>, <code>"abc".chars</code>. There is nothing a
number can do that isn't a method on the number itself.</p>
<table>
  <tr><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td><code>Math.abs(x)</code></td><td><code>x.abs</code></td></tr>
  <tr><td><code>x % 2 === 0</code></td><td><code>x.even?</code></td></tr>
  <tr><td><code>Number(f.toFixed(1))</code></td><td><code>f.round(1)</code></td></tr>
  <tr><td><code>s.split("")</code></td><td><code>s.chars</code></td></tr>
  <tr><td><code>for (let i = 0; i &lt; 5; i++)</code></td><td><code>5.times { ... }</code></td></tr>
</table>
<p>Notice what happens to <code>Math.abs(x)</code>: the receiver flips. The
function that <em>takes</em> a number becomes a message you <em>send to</em>
the number. Once every value answers messages, method chaining becomes the
core style — <code>"hello world".chars.uniq.length</code> reads left to
right as a pipeline, no nested calls to unwind. This is the single deepest
habit shift in the course, and the rest of Ruby (blocks, Enumerable) is built
on top of it.</p>`,

  typescript: `// TS: numbers and strings are primitives; their capabilities
// live elsewhere (Math, operators, helper functions).
const n = -3;
const abs = Math.abs(n);            // ask Math, not the number

function evenNumbers(nums: number[]): number[] {
  return nums.filter((x) => x % 2 === 0);  // an operator dance
}

function rounded(f: number, digits: number): number {
  return Number(f.toFixed(digits)); // toFixed returns a string(!)
}

function charList(s: string): string[] {
  return s.split("");               // split on nothing to get chars
}`,

  task: `
<p>Rewrite each helper by sending the message straight to the value:</p>
<ol>
  <li><code>absolute(n)</code> — flip the receiver: <code>n.abs</code>, not
      <code>Math.abs(n)</code>.</li>
  <li><code>even_numbers(nums)</code> — keep the even ones with
      <code>nums.select { |x| x.even? }</code>. No modulo arithmetic:
      integers already know whether they're even.</li>
  <li><code>rounded(f, digits)</code> — <code>f.round(digits)</code>. It
      returns a real Float, not a string.</li>
  <li><code>char_list(s)</code> — <code>s.chars</code>. No splitting on the
      empty string.</li>
</ol>`,

  starter: `# 1. TS: Math.abs(n)  ->  Ruby: the number itself answers.

end

  raise NotImplementedError, "TODO: implement even_numbers"

  raise NotImplementedError, "TODO: implement rounded"

# 4. TS: s.split("")  ->  strings know their own characters.

  raise NotImplementedError, "TODO: implement char_list"

`,

  requirements: [
    { pattern: /\.abs\b/, message: "Send .abs to the number itself (no Math)" },
    { pattern: /even\?/, message: "Use the even? predicate to filter" },
    { pattern: /\.round\(/, message: "Round with .round(digits)" },
    { pattern: /\.chars\b/, message: "Use .chars to get the character list" },
  ],

  tests: [
    { name: "absolute(-7) is 7, absolute(3) stays 3",
      code: "  expect_eq(absolute(-7), 7)\n  expect_eq(absolute(3), 3)" },
    { name: "even_numbers([1, 2, 3, 4, 5, 6]) is [2, 4, 6]",
      code: "  expect_eq(even_numbers([1, 2, 3, 4, 5, 6]), [2, 4, 6])" },
    { name: "even_numbers([1, 3, 5]) is []",
      code: "  expect_eq(even_numbers([1, 3, 5]), [])" },
    { name: "rounded(3.14159, 2) is 3.14 (a Float, not a string)",
      code: "  expect_eq(rounded(3.14159, 2), 3.14)\n  expect_true(rounded(3.14159, 2).is_a?(Float))" },
    { name: 'char_list("ruby") is ["r", "u", "b", "y"]',
      code: '  expect_eq(char_list("ruby"), ["r", "u", "b", "y"])' },
  ],

  solution: `def absolute(n)
  n.abs
end

def even_numbers(nums)
  nums.select { |x| x.even? }
end

def rounded(f, digits)
  f.round(digits)
end

def char_list(s)
  s.chars
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td>Absolute value</td><td><code>Math.abs(x)</code></td><td><code>x.abs</code></td></tr>
  <tr><td>Even / odd</td><td><code>x % 2 === 0</code></td><td><code>x.even?</code> / <code>x.odd?</code></td></tr>
  <tr><td>Rounding</td><td><code>Number(f.toFixed(d))</code></td><td><code>f.round(d)</code>, also <code>.ceil</code> / <code>.floor</code></td></tr>
  <tr><td>Characters</td><td><code>s.split("")</code></td><td><code>s.chars</code></td></tr>
  <tr><td>Repeat n times</td><td><code>for</code> loop</td><td><code>n.times { ... }</code></td></tr>
  <tr><td>GCD</td><td>write it yourself</td><td><code>10.gcd(4)</code></td></tr>
</table>
<p>Even the "shorthand" filter has an object story:
<code>nums.select(&amp;:even?)</code> converts the symbol <code>:even?</code>
into a block that sends that message to each element — you'll meet
<code>&amp;:</code> properly in lesson 11. And because classes are open,
<em>your</em> objects join the same style; there is no privileged set of
built-in types with special powers, which is why lesson 15's duck typing
works at all.</p>`,
};
