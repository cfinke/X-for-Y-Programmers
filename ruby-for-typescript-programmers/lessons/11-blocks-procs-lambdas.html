<div id="app"></div>
<script>
const LESSON = {
  number: 11,
  title: "Blocks, Procs & Lambdas",

  intro: `
<p>In TypeScript, a callback is just another argument: you pass an arrow
function inside the parentheses like any other value. Ruby took a different
bet: <em>almost every</em> method call wants exactly one callback, so Ruby
gave that callback its own syntax slot <strong>outside</strong> the parens.
That's a <strong>block</strong>: <code>arr.each { |x| puts x }</code>, or the
multi-line form <code>do ... end</code>. The <code>|x|</code> pipes are the
parameter list — your <code>(x) =&gt;</code>.</p>
<table>
  <tr><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td><code>arr.forEach((x) =&gt; use(x))</code></td><td><code>arr.each { |x| use(x) }</code></td></tr>
  <tr><td><code>fn(x)</code> — callback is a named param</td><td><code>yield(x)</code> — block is invisible, invoked with <code>yield</code></td></tr>
  <tr><td><code>if (fn) fn(x)</code></td><td><code>yield(x) if block_given?</code></td></tr>
  <tr><td><code>const dbl = (x) =&gt; x * 2; dbl(5)</code></td><td><code>dbl = -&gt;(x) { x * 2 }; dbl.call(5)</code></td></tr>
  <tr><td><code>words.map((w) =&gt; w.toUpperCase())</code></td><td><code>words.map(&amp;:upcase)</code></td></tr>
</table>
<p>The receiving method never declares the block — it just calls
<code>yield</code>, which invokes whatever block the caller attached, and
<code>block_given?</code> asks whether one was attached at all. When you need
a callback as a <em>first-class value</em> — stored in a variable, returned
from a method — reach for a <strong>lambda</strong>: <code>-&gt;(x) { x * 2 }</code>,
invoked with <code>.call</code> (not bare parens). And the beloved
<code>&amp;:symbol</code> shorthand converts a method name into a block:
<code>map(&amp;:upcase)</code> means "call <code>.upcase</code> on each element."</p>`,

  typescript: `const applyTwice = (x: number, fn: (v: number) => number): number =>
  fn(fn(x));

const maybeApply = (x: number, fn?: (v: number) => number): number =>
  fn ? fn(x) : x;

// A function that RETURNS a function — a closure over n.
const makeMultiplier = (n: number) => (x: number) => x * n;

const shoutAll = (words: string[]): string[] =>
  words.map((w) => w.toUpperCase());

applyTwice(3, (v) => v * 2);   // 12
maybeApply(5);                 // 5 — no callback, pass through
makeMultiplier(3)(7);          // 21
shoutAll(["hey", "ho"]);       // ["HEY", "HO"]`,

  task: `
<p>Rebuild the four callback shapes the Ruby way:</p>
<ol>
  <li><code>apply_twice(x)</code> — takes a block (no callback parameter in
      the signature!) and applies it twice: <code>yield(yield(x))</code>.</li>
  <li><code>maybe_yield(x)</code> — returns <code>yield(x)</code> if a block
      was given (<code>block_given?</code>), otherwise returns <code>x</code>
      unchanged.</li>
  <li><code>make_multiplier(n)</code> — returns a lambda
      <code>-&gt;(x) { x * n }</code> that closes over <code>n</code>. The
      tests will invoke it with <code>.call</code>.</li>
  <li><code>shout_all(words)</code> — upcase every word using the
      <code>&amp;:symbol</code> shorthand: <code>words.map(&amp;:upcase)</code>.</li>
</ol>
<p>Callers attach blocks like <code>apply_twice(3) { |v| v * 2 }</code> —
that's how the tests will call your methods.</p>`,

  starter: `# 1. apply_twice: no block parameter in the signature — just yield twice.
def apply_twice(x)
  raise NotImplementedError, "TODO: yield(yield(x))"
end

# 2. maybe_yield: block_given? is your 'if (fn)' guard.
def maybe_yield(x)
  raise NotImplementedError, "TODO: yield(x) if a block was given, else x"
end

# 3. make_multiplier: return a lambda that closes over n.
def make_multiplier(n)
  raise NotImplementedError, "TODO: return ->(x) { ... }"
end

# 4. shout_all: map with the &:symbol shorthand.
def shout_all(words)
  raise NotImplementedError, "TODO: words.map(&:upcase)"
end
`,

  requirements: [
    { pattern: /yield/, message: "Invoke the block with yield" },
    { pattern: /block_given\?/, message: "Guard with block_given? in maybe_yield" },
    { pattern: /->\s*\(/, message: "Build the multiplier with a ->(x) lambda literal" },
    { pattern: /&:/, message: "Use the &:symbol shorthand in shout_all" },
  ],

  tests: [
    { name: "apply_twice(3) { |v| v * 2 } returns 12",
      code: "  expect_eq(apply_twice(3) { |v| v * 2 }, 12)" },
    { name: 'apply_twice("a") { |s| s + "!" } returns "a!!"',
      code: '  expect_eq(apply_twice("a") { |s| s + "!" }, "a!!")' },
    { name: "maybe_yield(5) { |v| v + 1 } returns 6",
      code: "  expect_eq(maybe_yield(5) { |v| v + 1 }, 6)" },
    { name: "maybe_yield(5) with no block returns 5",
      code: "  expect_eq(maybe_yield(5), 5)" },
    { name: "make_multiplier(3).call(7) returns 21",
      code: "  triple = make_multiplier(3)\n  expect_eq(triple.call(7), 21)" },
    { name: 'shout_all(["hey", "ho"]) returns ["HEY", "HO"]',
      code: '  expect_eq(shout_all(["hey", "ho"]), ["HEY", "HO"])' },
  ],

  solution: `def apply_twice(x)
  yield(yield(x))
end

def maybe_yield(x)
  block_given? ? yield(x) : x
end

def make_multiplier(n)
  ->(x) { x * n }
end

def shout_all(words)
  words.map(&:upcase)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td>Inline callback</td><td><code>arr.map((x) =&gt; x * 2)</code></td><td><code>arr.map { |x| x * 2 }</code></td></tr>
  <tr><td>Multi-line callback</td><td><code>(x) =&gt; { ... }</code></td><td><code>do |x| ... end</code></td></tr>
  <tr><td>Invoke the callback</td><td><code>fn(x)</code></td><td><code>yield(x)</code> — no parameter declared</td></tr>
  <tr><td>Optional callback</td><td><code>fn?: () =&gt; void</code>, <code>if (fn)</code></td><td><code>block_given?</code></td></tr>
  <tr><td>First-class function</td><td><code>const f = (x) =&gt; x * 2</code></td><td><code>f = -&gt;(x) { x * 2 }</code></td></tr>
  <tr><td>Call it</td><td><code>f(5)</code></td><td><code>f.call(5)</code> (also <code>f.(5)</code>, <code>f[5]</code>)</td></tr>
  <tr><td>Method-name shorthand</td><td>—</td><td><code>map(&amp;:upcase)</code></td></tr>
</table>
<p>The deep difference: a block is <em>not a value</em> — it's syntax, one
per call, received invisibly and fired with <code>yield</code>. The moment
you need to store, return, or pass more than one callback, promote it to a
lambda. And because lambdas are objects, calling one takes an explicit
<code>.call</code> — bare <code>f(5)</code> in Ruby always means "the method
named f", never "the variable f, invoked."</p>`,
};
</script>
