<title>Lesson 5: Methods & Implicit Return</title>

<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Methods & Implicit Return",

  intro: `
<p>This is <em>the</em> Ruby lesson: a method's <strong>last evaluated
expression is its return value</strong>. Not as a shortcut — as the design.
Idiomatic Ruby uses <code>return</code> only for early exits (guard clauses),
and because <code>if/else</code> is itself an expression that produces a
value, whole branching methods need no <code>return</code> anywhere. Today you
write three methods and the checker will reject the <code>return</code>
keyword outright — build the habit now.</p>
<table>
  <tr><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td><code>function f(x) { return x + 1; }</code></td><td><code>def f(x)</code> … <code>x + 1</code> … <code>end</code></td></tr>
  <tr><td><code>greeting: string = "Hello"</code> (default)</td><td><code>def greet(name, greeting = "Hello")</code></td></tr>
  <tr><td>options object + destructuring</td><td>keyword arguments: <code>def create(name:, age: 0)</code></td></tr>
  <tr><td><code>create({ name: "Ada" })</code></td><td><code>create(name: "Ada")</code> — no braces</td></tr>
  <tr><td><code>isAdult</code>, <code>hasKey</code></td><td><code>adult?</code>, <code>key?</code> — the <code>?</code> is in the name</td></tr>
</table>
<p>Default arguments look just like TS. The pattern TS fakes with an options
object plus destructuring is <strong>native</strong> here: keyword arguments.
<code>def full_name(first:, last: nil)</code> makes <code>first:</code>
required and <code>last:</code> optional, and callers write
<code>full_name(first: "Ada")</code> — named, order-free, no interface to
declare. Rounding out the naming conventions from lesson 2: predicates end in
<code>?</code>, and a trailing <code>!</code> marks the "dangerous" variant of
a method — usually the one that mutates in place (<code>sort!</code>,
<code>upcase!</code>) where the bare name copies.</p>`,

  typescript: `function greet(name: string, greeting: string = "Hello"): string {
  return \`\${greeting}, \${name}!\`;
}

interface NameOptions { first: string; last?: string }

function fullName({ first, last }: NameOptions): string {
  if (last === undefined) return first;
  return \`\${first} \${last}\`;
}

const isAdult = (age: number): boolean => age >= 18;

console.log(greet("Ada"));                    // "Hello, Ada!"
console.log(greet("Ada", "Howdy"));           // "Howdy, Ada!"
console.log(fullName({ first: "Ada", last: "Lovelace" }));
console.log(isAdult(17));                     // false`,

  task: `
<p>Rewrite the TypeScript as three Ruby methods — with <strong>no
<code>return</code> keyword anywhere</strong> (a checker enforces it):</p>
<ol>
  <li><code>greet(name, greeting = "Hello")</code> — default argument, TS
      syntax minus the types. The interpolated string
      <code>"#{greeting}, #{name}!"</code> is the last expression, so it's the
      value.</li>
  <li><code>full_name(first:, last: nil)</code> — keyword arguments:
      <code>first:</code> required, <code>last:</code> optional. Produce
      <code>"First Last"</code>, or just the first name when <code>last</code>
      is <code>nil</code>. Use a full <code>if/else</code> — in Ruby it's an
      expression, and as the method's last expression its result is what the
      caller gets.</li>
  <li><code>adult?(age)</code> — predicate naming, so the <code>?</code> goes
      in the method name. The comparison <code>age &gt;= 18</code> already
      evaluates to <code>true</code>/<code>false</code>; make it the whole
      body.</li>
</ol>`,

  starter: `# 1. greet: a default argument, then the interpolated string as the
#    last expression — Ruby hands the caller whatever was evaluated last.
def greet(name, greeting = "Hello")
  raise NotImplementedError, "TODO: implement greet"
end

# 2. full_name: keyword arguments — first: required, last: optional.
#    An if/else is an expression; let it be the method's value:
#      if last
#        "..."
#      else
#        ...
#      end
def full_name(first:, last: nil)
  raise NotImplementedError, "TODO: implement full_name"
end

# 3. adult?: the comparison already IS the answer — one-line body.
def adult?(age)
  raise NotImplementedError, "TODO: implement adult?"
end
`,

  requirements: [
    { pattern: /=\s*"Hello"/, message: 'Give greeting a default value of "Hello"' },
    { pattern: /\w+:/, message: "Define full_name with keyword arguments (first:, last: nil)" },
    { pattern: /def\s+adult\?/, message: "Name the predicate adult? — question mark included" },
    { pattern: /^(?:(?!\breturn\b)[\s\S])*$/, message: "No return keyword — the last expression is the value" },
  ],

  tests: [
    { name: 'greet("Ada") uses the default: "Hello, Ada!"',
      code: '  expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'greet("Ada", "Howdy") returns "Howdy, Ada!"',
      code: '  expect_eq(greet("Ada", "Howdy"), "Howdy, Ada!")' },
    { name: 'full_name(first: "Ada", last: "Lovelace") returns "Ada Lovelace"',
      code: '  expect_eq(full_name(first: "Ada", last: "Lovelace"), "Ada Lovelace")' },
    { name: 'full_name(first: "Ada") returns "Ada"',
      code: '  expect_eq(full_name(first: "Ada"), "Ada")' },
    { name: "adult?(18) is true",
      code: "  expect_true(adult?(18))" },
    { name: "adult?(17) is false",
      code: "  expect_eq(adult?(17), false)" },
  ],

  solution: `def greet(name, greeting = "Hello")
  "#{greeting}, #{name}!"
end

def full_name(first:, last: nil)
  if last
    "#{first} #{last}"
  else
    first
  end
end

def adult?(age)
  age >= 18
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td>Return a value</td><td><code>return x;</code> required</td><td>last expression; <code>return</code> only for early exit</td></tr>
  <tr><td>Default argument</td><td><code>f(x = 1)</code></td><td><code>def f(x = 1)</code> — same</td></tr>
  <tr><td>Named options</td><td>options object + interface</td><td><code>def create(name:, age: 0)</code></td></tr>
  <tr><td>Required vs optional</td><td><code>name: string; age?: number</code></td><td><code>name:</code> (no default) vs <code>age: 0</code></td></tr>
  <tr><td>Calling</td><td><code>create({ name: "Ada" })</code></td><td><code>create(name: "Ada")</code></td></tr>
  <tr><td>Predicate naming</td><td><code>isAdult</code>, <code>hasItems</code></td><td><code>adult?</code>, <code>any?</code>, <code>empty?</code></td></tr>
  <tr><td>Mutating variant</td><td>(unmarked)</td><td><code>sort!</code>, <code>upcase!</code> — <code>!</code> means "watch out"</td></tr>
  <tr><td>Branch as value</td><td><code>cond ? a : b</code></td><td><code>if/else</code> is an expression (ternary exists too)</td></tr>
</table>
<p>Because <code>if</code>, <code>case</code>, even <code>begin/rescue</code>
all evaluate to values, "compute the result, then return it" collapses into
one shape: the method body <em>is</em> the result. Forgetting a keyword
argument raises <code>ArgumentError: missing keyword: :first</code> at call
time — the closest thing dynamic Ruby has to a required field on an options
interface. And note <code>!</code> in a method name never means "not"; it
flags the surprising sibling of a safer method, almost always in-place
mutation.</p>`,
};
</script>
