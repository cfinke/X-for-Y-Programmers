const LESSON = {
  number: 11,
  title: "Interfaces",

  intro: `
<p>Kotlin interfaces will feel familiar, but they do more than Python's
informal conventions. Python has no built-in interface construct — you either
rely on duck typing (any object with the right methods "just works"), define
an <code>abc.ABC</code> with <code>@abstractmethod</code>, or use a
<code>typing.Protocol</code> for structural typing. None of those can be
enforced by the interpreter the way Kotlin enforces its interfaces: a Kotlin
interface is a real, named type you opt into with a colon, and it can carry
<strong>default method bodies</strong> and <strong>property getters</strong> —
much like a Python <code>ABC</code> with concrete (non-abstract) methods.</p>
<table>
  <tr><th>Python</th><th>Kotlin</th></tr>
  <tr><td><code>class Shape(ABC):<br>&nbsp;&nbsp;@abstractmethod<br>&nbsp;&nbsp;def area(self) -> float: ...</code></td><td><code>interface Shape { fun area(): Double }</code></td></tr>
  <tr><td>duck typing / <code>Protocol</code>: no explicit base needed</td><td>nominal: <code>class C : Shape</code></td></tr>
  <tr><td>abstract property via <code>@property</code> + <code>@abstractmethod</code></td><td><code>val name: String</code> (abstract)</td></tr>
  <tr><td>concrete method on the ABC itself</td><td><code>fun f() = …</code> right in the interface</td></tr>
  <tr><td><code>class C(A, B):</code></td><td><code>class C : A, B</code></td></tr>
</table>
<p>Because a Kotlin interface can hold behaviour, you can declare an abstract
<code>val</code>, a <code>val</code> with a default <code>get()</code>, and a
<code>fun</code> with a default body all in one place — then have each class
<code>override</code> only what it needs. And, as with a well-designed Python
<code>ABC</code>, you should <strong>program to the interface type</strong>:
type your parameters and variables as <code>Employee</code>, not
<code>Engineer</code>.</p>`,

  python: `from abc import ABC, abstractmethod

class Employee(ABC):
    name: str
    base_salary: float

    @abstractmethod
    def bonus(self) -> float: ...
    # A plain ABC can hold logic, so total_pay/summary
    # could live here too, unlike a bare Protocol.

class Engineer(Employee):
    def __init__(self, name, base_salary):
        self.name = name
        self.base_salary = base_salary

    def bonus(self):
        return self.base_salary * 0.1

def total_payroll(staff):
    return sum(e.base_salary + e.bonus() for e in staff)`,

  task: `
<p>Build a small payroll model where the logic lives <em>in the interface</em>,
and the tests talk to everything through the interface type. No class or
<code>main</code> is needed — Kotlin allows top-level declarations.</p>
<ol>
  <li>Declare an <code>Employee</code> interface with two abstract properties
      <code>name: String</code> and <code>baseSalary: Double</code>, and an
      abstract method <code>fun bonus(): Double</code>.</li>
  <li>Give <code>Employee</code> a property <code>totalPay: Double</code> with a
      <strong>default getter</strong> returning
      <code>baseSalary + bonus()</code>, and a <strong>default method</strong>
      <code>fun summary(): String</code> returning
      <code>"$name earns $totalPay"</code>.</li>
  <li>Declare a second interface <code>Manager</code> with
      <code>fun teamSize(): Int</code>.</li>
  <li><code>class Engineer(name, baseSalary) : Employee</code> whose
      <code>bonus()</code> is 10% of <code>baseSalary</code>.</li>
  <li><code>class TeamLead(name, baseSalary, reports) : Employee, Manager</code>
      — <strong>implementing both interfaces</strong> — whose <code>bonus()</code>
      is <code>baseSalary * 0.2 + reports * 100.0</code> and whose
      <code>teamSize()</code> returns <code>reports</code>.</li>
  <li>Write <code>totalPayroll(staff: List&lt;Employee&gt;): Double</code> that
      sums <code>totalPay</code> across the list — programming to the interface.</li>
</ol>`,

  starter: `// 1 & 2. The Employee interface: abstract members, a default property getter,
//        and a default method. Fill in the two defaults.
interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = 0.0            // TODO: baseSalary + bonus()

    fun summary(): String = "" // TODO: "$name earns $totalPay"
}

// 3. A second interface.
interface Manager {
    fun teamSize(): Int
}

// 4. Engineer implements Employee.
class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = 0.0 // TODO: 10% of baseSalary
}

// 5. TeamLead implements BOTH Employee and Manager.
class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = 0.0 // TODO: baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = 0   // TODO: reports
}

// 6. Program to the interface type.
fun totalPayroll(staff: List<Employee>): Double = 0.0 // TODO
`,

  requirements: [
    { pattern: /interface\s+Employee\b/, message: "Declare an Employee interface" },
    { pattern: /fun\s+summary\s*\([^)]*\)\s*:\s*String\s*=/, message: "Give Employee a default summary() method with a body in the interface" },
    { pattern: /:\s*Employee\s*,\s*Manager/, message: "Have TeamLead implement both Employee and Manager" },
  ],

  tests: [
    { name: "Engineer.bonus() is 10% of base", code: "        expect_eq(Engineer(\"Ada\", 1000.0).bonus(), 100.0)" },
    { name: "totalPay via the Employee type uses the default getter", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.totalPay, 1100.0)" },
    { name: "default summary() reads \"Ada earns 1100.0\"", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.summary(), \"Ada earns 1100.0\")" },
    { name: "TeamLead satisfies Manager (teamSize)", code: "        val m: Manager = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(m.teamSize(), 3)" },
    { name: "TeamLead is also an Employee (totalPay)", code: "        val emp: Employee = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(emp.totalPay, 2700.0)" },
    { name: "totalPayroll sums via the interface", code: "        val staff: List<Employee> = listOf(Engineer(\"Ada\", 1000.0), TeamLead(\"Rob\", 2000.0, 3))\n        expect_eq(totalPayroll(staff), 3800.0)" },
  ],

  solution: `interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = baseSalary + bonus()

    fun summary(): String = "$name earns $totalPay"
}

interface Manager {
    fun teamSize(): Int
}

class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = baseSalary * 0.1
}

class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = reports
}

fun totalPayroll(staff: List<Employee>): Double = staff.sumOf { it.totalPay }
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Kotlin</th></tr>
  <tr><td>Declare interface</td><td><code>class E(ABC): …</code></td><td><code>interface E { … }</code></td></tr>
  <tr><td>Implement</td><td><code>class C(E):</code> (or duck typing / <code>Protocol</code>)</td><td><code>class C : E</code></td></tr>
  <tr><td>Multiple interfaces</td><td><code>class C(A, B):</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Abstract property</td><td><code>@property</code> + <code>@abstractmethod</code></td><td><code>val name: String</code></td></tr>
  <tr><td>Property with logic</td><td><code>@property</code> on the ABC</td><td><code>val p: T get() = …</code></td></tr>
  <tr><td>Default method body</td><td>concrete method on the ABC</td><td><code>fun f() = …</code> in the interface</td></tr>
  <tr><td>Override</td><td>just redefine the method</td><td><code>override</code> keyword required</td></tr>
</table>
<p>The big shift from Python is that conformance is checked and
<strong>nominal</strong>: a class only satisfies <code>Employee</code> if it
says <code>: Employee</code>, and the compiler enforces every abstract member
is filled in — no more discovering a missing method with an
<code>AttributeError</code> at runtime, and no more optimistic duck typing
that just hopes an object has the right shape. In exchange you get real
behaviour in the interface — a default <code>get()</code> or <code>fun</code>
body — so shared logic lives with the contract instead of being copied into
every subclass, much like a Python <code>ABC</code> with a concrete method
(as opposed to a bare <code>Protocol</code>, which can't hold implementation
at all). Kotlin also requires the <code>override</code> keyword, which catches
typos Python would silently accept as a brand-new attribute. When a class
implements two interfaces that both define the same default method, Kotlin
makes you resolve it explicitly with <code>super&lt;A&gt;.f()</code>, whereas
Python's method resolution order picks one automatically via the MRO.</p>`,
};
