  title: "Data Classes",

  intro: `
<p>In Python you reach for a plain class (or a dict, or a
<code>namedtuple</code>) when you just want to bundle a few fields together —
and an ordinary class gives you structural equality only if you write
<code>__eq__</code> yourself, or reach for the standard-library
<code>@dataclass</code> decorator, which is Python's own answer to this exact
problem. Kotlin bakes the same idea into the language itself: prefix a class
with <code>data</code> and the compiler generates <code>equals()</code>,
<code>hashCode()</code>, <code>toString()</code>, a <code>copy()</code>, and
<code>componentN()</code> destructuring functions from the primary-constructor
properties.</p>
<table>
  <tr><th>Python</th><th>Kotlin</th></tr>
  <tr><td><code>class Point:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, x, y):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.x, self.y = x, y</code></td><td><code>data class Point(val x: Int, val y: Int)</code></td></tr>
  <tr><td><code>a.x == b.x and a.y == b.y</code></td><td><code>a == b</code></td></tr>
  <tr><td><code>Point(p.x, 9)</code></td><td><code>p.copy(y = 9)</code></td></tr>
  <tr><td><code>x, y = p.x, p.y</code></td><td><code>val (x, y) = p</code></td></tr>
</table>
<p>Because <code>==</code> on a data class calls the generated structural
<code>equals()</code> (Kotlin's <code>==</code> is never reference identity —
that's <code>===</code>), two independently-built <code>Point(1, 2)</code> values
are equal. <code>copy()</code> is the immutable-update workhorse: it clones the
value, overriding only the named arguments you pass — the same spirit as
Python's <code>dataclasses.replace()</code>, but built into every data class
with no import required.</p>`,

  python: `class Point:
    def __init__(self, x, y):

        self.y = y

def shift(p, dx, dy):
    return Point(p.x + dx, p.y + dy)

a = Point(1, 2)
b = Point(a.x, 2)
print(a.x == b.x and a.y == b.y)  # True
x, y = a.x, a.y`,

  solution: `data class Point(val x: Int, val y: Int)

data class User(val name: String, val age: Int, val active: Boolean = true)

fun shift(p: Point, dx: Int, dy: Int): Point {
    return p.copy(x = p.x + dx, y = p.y + dy)
}

fun sumCoords(p: Point): Int {
    val (x, y) = p
    return x + y
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Kotlin</th></tr>
  <tr><td>Value bundle</td><td><code>class P: def __init__(self, x): self.x = x</code></td><td><code>data class P(val x: Int)</code></td></tr>
  <tr><td>Value equality</td><td>define <code>__eq__</code> (or use <code>@dataclass</code>)</td><td><code>a == b</code> (generated)</td></tr>
  <tr><td>Reference identity</td><td><code>a is b</code></td><td><code>a === b</code></td></tr>
  <tr><td>Immutable update</td><td><code>Point(p.x, 9)</code> or <code>dataclasses.replace(p, y=9)</code></td><td><code>p.copy(y = 9)</code></td></tr>
  <tr><td>Destructure</td><td><code>x, y = p.x, p.y</code></td><td><code>val (x, y) = p</code></td></tr>
  <tr><td>Debug string</td><td><code>repr(p)</code> (needs <code>__repr__</code>)</td><td><code>p.toString()</code></td></tr>
</table>
<p>Two things to keep in mind. First, destructuring is
<strong>positional</strong>, not by name: <code>val (x, y) = p</code> calls
<code>p.component1()</code> and <code>p.component2()</code>, so the order of the
constructor properties is what matters — much like unpacking a Python tuple, not
like pulling named keys out of a dict. Second, only properties declared in the
<em>primary constructor</em> feed the generated <code>equals</code>,
<code>hashCode</code>, <code>toString</code>, and <code>copy</code>; anything you
add in the class body is ignored by them. Reach for a data class whenever you
would have reached for Python's <code>@dataclass</code> or a
<code>namedtuple</code> — Kotlin just makes it the obvious default rather than
an opt-in decorator.</p>`,
