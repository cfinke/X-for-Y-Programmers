const LESSON = {
  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>Two Java string reflexes need rewiring. First: <code>+</code> does not
concatenate in PHP — it is arithmetic <em>only</em>, and <code>"a" + $name</code>
is an error, not a string. PHP's glue operator is the dot:
<code>"User: " . $name</code>. Second: you rarely need to glue at all, because
double-quoted strings interpolate — <code>"$name is $age years old"</code>
does what <code>String.format("%s is %d years old", ...)</code> does, with no
format specifiers to mismatch.</p>
<table>
  <tr><th>Java</th><th>PHP</th></tr>
  <tr><td><code>"User: " + name</code></td><td><code>"User: " . $name</code> (dot, not plus)</td></tr>
  <tr><td><code>String.format("%s is %d", n, a)</code></td><td><code>"$n is $a"</code></td></tr>
  <tr><td><code>s.toUpperCase()</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td><code>s.contains(x)</code></td><td><code>str_contains($s, $x)</code></td></tr>
  <tr><td><code>s.length()</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td><code>String.join(", ", list)</code></td><td><code>implode(", ", $arr)</code></td></tr>
  <tr><td><code>a.equals(b)</code></td><td><code>$a === $b</code></td></tr>
</table>
<p>Notice the shape of those calls: strings are not objects here, so there are
no methods — just free functions that take the string as an argument, mostly
prefixed <code>str</code>. And your hard-won <code>.equals()</code> reflex can
finally relax: <code>==</code> compares string <em>values</em> in PHP, not
references. Prefer <code>===</code> anyway — it also requires the types to
match, which sidesteps PHP's type-juggling surprises later.</p>`,

  java: `String name = "Ada";
int age = 36;

String label = "User: " + name;                        // + concatenates
String line  = String.format("%s is %d", name, age);   // format specifiers

String loud    = name.toUpperCase();                   // "ADA"
boolean hasDa  = name.contains("da");                  // true
int len        = name.length();                        // 3

List<String> words = List.of("one", "two", "three");
String joined = String.join(", ", words);              // "one, two, three"

boolean same = name.equals("Ada");                     // never == for strings!`,

  task: `
<p>Rewrite the Java string toolbox as four PHP functions:</p>
<ol>
  <li><code>shout(string $s): string</code> — uppercase the string with
      <code>strtoupper</code> and append <code>"!"</code> using the
      <code>.</code> operator: <code>shout("hey")</code> is
      <code>"HEY!"</code>.</li>
  <li><code>greet(string $name, int $age): string</code> — return
      <code>"Ada (36) says hi!"</code>-style text using interpolation —
      <code>"$name ($age) says hi!"</code> — not <code>sprintf</code> or
      concatenation.</li>
  <li><code>contains_word(string $haystack, string $needle): bool</code> —
      PHP's answer to <code>.contains()</code> is
      <code>str_contains($haystack, $needle)</code>.</li>
  <li><code>join_words(array $words): string</code> — <code>String.join</code>
      becomes <code>implode(", ", $words)</code>: same argument order,
      separator first.</li>
</ol>`,

  starter: `<?php

// 1. strtoupper($s), then glue on "!" with the dot operator.

    throw new Exception("TODO: implement shout");
}

// 2. No String.format needed: "$name ($age) says hi!"

    throw new Exception("TODO: implement greet");

    throw new Exception("TODO: implement contains_word");

`,

  requirements: [
    { pattern: /"\$\w+|\{\$\w+/, message: "Use double-quote interpolation in greet" },
    { pattern: /strtoupper/, message: "Use strtoupper in shout" },
    { pattern: /str_contains/, message: "Use str_contains in contains_word" },
    { pattern: /implode/, message: "Use implode in join_words" },
  ],

  tests: [
    { name: 'shout("hey") returns "HEY!"',
      code: 'expect_eq(shout("hey"), "HEY!");' },
    { name: 'greet("Ada", 36) returns "Ada (36) says hi!"',
      code: 'expect_eq(greet("Ada", 36), "Ada (36) says hi!");' },
    { name: 'contains_word("the quick brown fox", "quick") is true',
      code: 'expect_true(contains_word("the quick brown fox", "quick"));' },
    { name: 'contains_word("the quick brown fox", "slow") is false',
      code: 'expect_true(!contains_word("the quick brown fox", "slow"));' },
    { name: 'join_words(["one", "two", "three"]) returns "one, two, three"',
      code: 'expect_eq(join_words(["one", "two", "three"]), "one, two, three");' },
  ],

  solution: `<?php

function shout(string $s): string {
    return strtoupper($s) . "!";
}

function greet(string $name, int $age): string {
    return "$name ($age) says hi!";
}

function contains_word(string $haystack, string $needle): bool {
    return str_contains($haystack, $needle);
}

function join_words(array $words): string {
    return implode(", ", $words);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>PHP</th></tr>
  <tr><td>Concatenate</td><td><code>"a" + b</code></td><td><code>"a" . $b</code> (<code>+</code> is arithmetic only)</td></tr>
  <tr><td>Format / template</td><td><code>String.format("%s is %d", n, a)</code></td><td><code>"$n is $a"</code>, or <code>"{$obj->prop}"</code> for expressions</td></tr>
  <tr><td>Uppercase</td><td><code>s.toUpperCase()</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td>Substring test</td><td><code>s.contains(x)</code></td><td><code>str_contains($s, $x)</code></td></tr>
  <tr><td>Length</td><td><code>s.length()</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td>Join</td><td><code>String.join(", ", list)</code></td><td><code>implode(", ", $arr)</code></td></tr>
  <tr><td>Equality</td><td><code>a.equals(b)</code></td><td><code>$a === $b</code> (value comparison; <code>===</code> adds type safety)</td></tr>
</table>
<p>The deeper difference: PHP strings are values, not objects. There is no
reference identity to worry about, so the entire <code>==</code>-vs-<code>.equals()</code>
minefield vanishes — <code>"Ada" == "Ada"</code> is simply true. The trade is
that the API lives in a flat function namespace (<code>strtoupper</code>,
<code>str_contains</code>, <code>strlen</code>, <code>implode</code>) with the
string passed as the first argument — usually. Watch <code>implode</code>: like
<code>String.join</code>, the separator comes first.</p>`,
};
