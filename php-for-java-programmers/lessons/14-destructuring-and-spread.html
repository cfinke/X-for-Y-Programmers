  number: 14,
  title: "List Assignment & Spread",

  intro: `
<p>Java only recently learned to take things apart, and only in one place:
record deconstruction works inside patterns —
<code>if (obj instanceof Pair(int a, int b))</code> — never as a plain
assignment. PHP destructures <em>anywhere</em> an assignment can appear:
<code>[$a, $b] = $pair;</code> unpacks a list, <code>['name' =&gt; $n] =
$user;</code> unpacks by key, and <code>[$a, $b] = [$b, $a];</code> swaps two
variables with no temp variable in sight.</p>
<table>
  <tr><th>Java</th><th>PHP</th></tr>
  <tr><td><code>instanceof Pair(int a, int b)</code> (patterns only)</td><td><code>[$a, $b] = $pair;</code> (any assignment)</td></tr>
  <tr><td>— (no keyed form)</td><td><code>['name' =&gt; $n] = $user;</code></td></tr>
  <tr><td><code>int t = a; a = b; b = t;</code></td><td><code>[$a, $b] = [$b, $a];</code></td></tr>
  <tr><td><code>int sum(int... nums)</code></td><td><code>function sum(int ...$nums)</code></td></tr>
  <tr><td><code>f(args)</code> — no spread for arrays<sup>*</sup></td><td><code>f(...$args)</code> spreads any array into a call</td></tr>
  <tr><td><code>merged.putAll(overrides)</code></td><td><code>[...$defaults, ...$overrides]</code> — addAll as a literal</td></tr>
</table>
<p>The same <code>...</code> token works in three positions. In a signature,
<code>int ...$nums</code> is exactly <code>int... nums</code> — the varargs
collector (<code>$nums</code> arrives as an array). At a call site,
<code>f(...$args)</code> spreads an array across the parameters — what Java
only does implicitly for a trailing varargs array. And inside an array
literal, <code>[...$a, ...$b]</code> concatenates lists or merges string-keyed
maps with later entries winning — <code>new HashMap&lt;&gt;(defaults)</code>
plus <code>putAll(overrides)</code>, in one expression.</p>`,

  java: `record Pair(int a, int b) {}

// Deconstruction exists ONLY inside a pattern:
static int[] swap(Pair p) {
    if (p instanceof Pair(int a, int b)) {
        return new int[] { b, a };
    }
    throw new IllegalStateException();
}

static int sum(int... nums) {       // varargs collector
    int total = 0;
    for (int n : nums) total += n;
    return total;
}

static Map<String, String> mergeSettings(
        Map<String, String> defaults, Map<String, String> overrides) {
    Map<String, String> merged = new HashMap<>(defaults);
    merged.putAll(overrides);        // later entries win
    return merged;
}`,

  task: `
<p>Rebuild all three with PHP's destructuring and spread:</p>
<ol>
  <li><code>swap(array $pair): array</code> — destructure the two-element
      input with <code>[$a, $b] = $pair;</code> and return them reversed (or
      swap in place with <code>[$a, $b] = [$b, $a];</code>). No temp
      variable, no pattern-matching ceremony.</li>
  <li><code>sum(int ...$nums): int</code> — a variadic exactly like
      <code>int... nums</code>; <code>$nums</code> is already an array inside,
      so total it up and return the sum (0 for no arguments).</li>
  <li><code>merge_settings(array $defaults, array $overrides): array</code> —
      merge the two string-keyed maps with a spread literal,
      <code>[...$defaults, ...$overrides]</code>, so overrides win on
      duplicate keys.</li>
</ol>`,

  starter: `<?php

    throw new Exception("TODO: implement sum");
}

// 3. new HashMap<>(defaults) + putAll(overrides), as one literal:
//    [...$defaults, ...$overrides] — later spreads win on duplicate keys.

    throw new Exception("TODO: implement merge_settings");
}
`,

  requirements: [
    { pattern: /\[\s*\$\w+\s*,\s*\$\w+\s*\]\s*=/, message: "Destructure with list assignment: [$a, $b] = ..." },
    { pattern: /\.\.\.\$/, message: "Declare sum as a variadic with int ...$nums" },
    { pattern: /\[\s*\.\.\./, message: "Merge with a spread literal: [...$defaults, ...$overrides]" },
  ],

  tests: [
    { name: "swap([1, 2]) returns [2, 1]",
      code: "expect_eq(swap([1, 2]), [2, 1]);" },
    { name: "swap(['left', 'right']) returns ['right', 'left']",
      code: "expect_eq(swap(['left', 'right']), ['right', 'left']);" },
    { name: "sum(1, 2, 3, 4) returns 10",
      code: "expect_eq(sum(1, 2, 3, 4), 10);" },
    { name: "sum() with no arguments returns 0, and a spread call works: sum(...[5, 6])",
      code: "expect_eq(sum(), 0);\nexpect_eq(sum(...[5, 6]), 11);" },
    { name: "merge_settings lets overrides win on duplicate keys",
      code: "expect_eq(\n  merge_settings(['theme' => 'light', 'lang' => 'en'], ['theme' => 'dark']),\n  ['theme' => 'dark', 'lang' => 'en']\n);" },
    { name: "merge_settings keeps defaults nobody overrode",
      code: "expect_eq(\n  merge_settings(['debug' => 'off'], []),\n  ['debug' => 'off']\n);" },
  ],

  solution: `<?php

function swap(array $pair): array {
    [$a, $b] = $pair;
    return [$b, $a];
}

function sum(int ...$nums): int {
    $total = 0;
    foreach ($nums as $n) {
        $total += $n;
    }
    return $total;
}

function merge_settings(array $defaults, array $overrides): array {
    return [...$defaults, ...$overrides];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>PHP</th></tr>
  <tr><td>Positional unpack</td><td>Record pattern (patterns only)</td><td><code>[$a, $b] = $pair;</code> anywhere</td></tr>
  <tr><td>Keyed unpack</td><td>—</td><td><code>['name' =&gt; $n] = $user;</code></td></tr>
  <tr><td>Swap two variables</td><td>Temp variable</td><td><code>[$a, $b] = [$b, $a];</code></td></tr>
  <tr><td>Varargs</td><td><code>int... nums</code></td><td><code>int ...$nums</code></td></tr>
  <tr><td>Spread into a call</td><td>Implicit, trailing varargs only</td><td><code>f(...$args)</code>, any array</td></tr>
  <tr><td>Merge as a literal</td><td><code>new HashMap&lt;&gt;(a)</code> + <code>putAll(b)</code></td><td><code>[...$a, ...$b]</code> (later keys win)</td></tr>
  <tr><td>Unpack in a loop</td><td>—</td><td><code>foreach ($pairs as [$x, $y])</code></td></tr>
</table>
<p>List assignment even reaches into <code>foreach</code> —
<code>foreach ($points as [$x, $y])</code> destructures every element as it
iterates. One boundary to remember: spreading arrays with string keys into a
<em>literal</em> works (PHP 8.1+) and behaves like <code>array_merge</code>,
but skipped positions in a positional destructure need commas
(<code>[, $second] = $pair;</code>), and unpacking a missing key quietly
yields <code>null</code> plus a warning rather than the fast failure a Java
pattern match would give you.</p>`,
};
