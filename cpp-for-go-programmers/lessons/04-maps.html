  intro: `
<p>In Go you reach for a built-in <code>map</code> to associate keys with
values. C++ gives you two standard containers: <code>std::map</code>, which
keeps its keys sorted in a balanced tree, and <code>std::unordered_map</code>,
a hash table with average O(1) lookup and no ordering. Both are strongly
typed in the declaration — <code>std::map&lt;std::string, int&gt;</code> fixes
the key and value types up front, the way a Go <code>map[string]int</code>
does.</p>
<table>
  <tr><th>Go</th><th>C++</th></tr>
  <tr><td><code>m := make(map[string]int)</code></td><td><code>std::map&lt;std::string, int&gt; m;</code></td></tr>
  <tr><td><code>m["a"] = 1</code></td><td><code>m["a"] = 1;</code></td></tr>
  <tr><td><code>v := m["a"]</code></td><td><code>m.at("a")</code> (throws if missing)</td></tr>
  <tr><td><code>_, ok := m["a"]</code></td><td><code>m.contains("a")</code></td></tr>
  <tr><td><code>len(m)</code></td><td><code>m.size()</code></td></tr>
</table>
<p>Two gotchas for a Go programmer. First, Go's <code>m["missing"]</code>
already returns a zero value without inserting anything, but C++'s
<code>m["missing"]</code> is different: it <em>inserts</em> a
default-constructed value (<code>0</code> for <code>int</code>) into the map
and returns a reference to it. To look without inserting, use
<code>.at</code>, <code>.find</code>, <code>.count</code>, or
<code>.contains</code>. Second, iterating yields
<code>std::pair&lt;const Key, Value&gt;</code> elements; destructure them with
structured bindings: <code>for (const auto&amp; [key, value] : m)</code> —
similar in spirit to Go's <code>for key, value := range m</code>.</p>`,

  go: `counts := make(map[string]int)
for _, word := range words {

}

_, has := counts["cat"]
n := counts["cat"]
total := len(counts)`,

<p>Write these free functions using <code>std::map</code> /

</ol>`,

  solution: `std::unordered_map<std::string, int> wordCounts(const std::vector<std::string>& words) {
  std::unordered_map<std::string, int> counts;
  for (const auto& word : words) {
    counts[word]++;
  }
  return counts;
}

int countOf(const std::unordered_map<std::string, int>& m, const std::string& key) {
  auto it = m.find(key);
  if (it == m.end()) {
    return 0;
  }
  return it->second;
}

bool hasWord(const std::unordered_map<std::string, int>& m, const std::string& key) {
  return m.contains(key);
}

int distinctCount(const std::unordered_map<std::string, int>& m) {
  return static_cast<int>(m.size());
}

int totalCount(const std::unordered_map<std::string, int>& m) {
  int total = 0;
  for (const auto& [word, n] : m) {
    total += n;
  }
  return total;
}
`,

  notes: `
<table>
  <tr><th>Operation</th><th>Go (map)</th><th>C++</th></tr>
  <tr><td>Declare</td><td><code>make(map[string]int)</code></td><td><code>std::unordered_map&lt;std::string, int&gt; m;</code></td></tr>
  <tr><td>Insert / overwrite</td><td><code>m[k] = v</code></td><td><code>m[k] = v;</code> or <code>m.insert({k, v})</code></td></tr>
  <tr><td>Read (throwing)</td><td>n/a — always succeeds</td><td><code>m.at(k)</code></td></tr>
  <tr><td>Read (safe)</td><td><code>v, ok := m[k]</code></td><td><code>m.find(k)</code> / <code>m.contains(k)</code></td></tr>
  <tr><td>Membership</td><td><code>_, ok := m[k]</code></td><td><code>m.contains(k)</code> / <code>m.count(k)</code></td></tr>
  <tr><td>Size</td><td><code>len(m)</code></td><td><code>m.size()</code></td></tr>
  <tr><td>Iterate</td><td><code>for k, v := range m</code></td><td><code>for (const auto&amp; [k, v] : m)</code></td></tr>
</table>
<p>The most important difference is <code>operator[]</code>. In Go, reading a
missing key gives the value type's zero value without touching the map at
all; in C++, <code>m[k]</code> on a missing key silently <em>inserts</em> a
default value and hands back a reference. That is exactly why
<code>m[word]++</code> works as a counter — the first touch creates a
<code>0</code>, then increments it — just like Go's <code>counts[word]++</code>
on an int map. But in C++ you must avoid <code>[]</code> for read-only
lookups (and it won't even compile on a <code>const</code> map, unlike Go
where reading a const-ish map value is always safe). Prefer <code>.at</code>
when the key must exist, <code>.find</code> / <code>.contains</code> when it
might not — the C++ analog of Go's comma-ok idiom.</p>
<p>Choose <code>std::map</code> when you need keys visited in sorted order
(Go's <code>map</code> deliberately randomizes iteration order); choose
<code>std::unordered_map</code> (a hash table, closer to Go's default map) when
you just need fast lookups. The API shown here is identical between the two,
so switching is a one-word change.</p>`,
