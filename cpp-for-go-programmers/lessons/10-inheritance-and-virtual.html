const LESSON = {
  number: 10,
  title: "Inheritance & Virtual Functions",

  intro: `
<p>Go has no classes and no inheritance at all — you get polymorphism by
satisfying an <code>interface</code> with a method set, and any concrete type
whose methods match the interface works, full stop. There is no base class to
opt out of and no keyword to enable dispatch; it is structural and automatic.
C++ is the opposite: it has real class inheritance, but a member function is
dispatched <em>statically</em> (by the pointer's declared type) unless you
mark it <code>virtual</code>. Only then does calling through a
<code>Base&amp;</code> or <code>Base*</code> reach the derived override — that
is polymorphism in C++.</p>
<table>
  <tr><th>Go</th><th>C++</th></tr>
  <tr><td><code>type Dog struct { Animal }</code> (embedding)</td><td><code>class Dog : public Animal {}</code></td></tr>
  <tr><td><code>func (d Dog) Speak() string { … }</code> (satisfies interface)</td><td><code>virtual std::string speak() const</code></td></tr>
  <tr><td>compiler checks method set matches the interface</td><td><code>std::string speak() const override</code></td></tr>
  <tr><td><code>type Animal interface { Speak() string }</code></td><td><code>virtual double area() const = 0;</code></td></tr>
  <tr><td>interface with no implementation to inherit</td><td>class with a pure virtual (<code>= 0</code>)</td></tr>
</table>
<p>Three rules to carry over. First, <code>virtual</code> in the base is what
enables dynamic dispatch; write <code>override</code> in the derived class so the
compiler checks you actually matched a base signature. Second, a pure virtual
(<code>= 0</code>) makes the class abstract — you cannot instantiate it, the
closest C++ analogue to an unimplemented Go <code>interface</code>. Third, a
base class with any virtual function needs a
<code>virtual ~Base() = default;</code> destructor so deleting through a base
pointer cleans up the derived part.</p>`,

  go: `type Animal interface {
	Speak() string
	Describe() string
}

type baseAnimal struct {
	name string
}

func (a baseAnimal) Describe() string {
	// Go has no virtual dispatch on structs, so a base type can't call
	// back into an embedder's override; each concrete type below defines
	// its own Describe using its own Speak.
	return ""
}

type Dog struct{ baseAnimal }

func (d Dog) Speak() string { return "Woof" }
func (d Dog) Describe() string {
	return d.name + " says " + d.Speak()
}

type Cat struct{ baseAnimal }

func (c Cat) Speak() string { return "Meow" }
func (c Cat) Describe() string {
	return c.name + " says " + c.Speak()
}

func announce(a Animal) string {
	return a.Describe()
}`,

  task: `
<p>Model the same hierarchy in C++.</p>
<ol>
  <li>An abstract base <code>Animal</code> holding a <code>std::string name</code>
      (constructor takes it). Give it a pure virtual
      <code>virtual std::string speak() const = 0;</code> and a non-virtual
      <code>describe()</code> returning <code>name + " says " + speak()</code>.
      Add <code>virtual ~Animal() = default;</code>.</li>
  <li><code>Dog</code> and <code>Cat</code> deriving <code>public Animal</code>,
      each with a constructor forwarding the name to <code>Animal</code> and an
      <code>override</code> of <code>speak()</code> returning <code>"Woof"</code>
      / <code>"Meow"</code>.</li>
  <li>A free function <code>announce(const Animal&amp; a)</code> returning
      <code>a.describe()</code> — proving dispatch works through a
      <code>Base&amp;</code>.</li>
</ol>`,

  starter: `class Animal {
public:
  explicit Animal(std::string name) : name(std::move(name)) {}
  virtual ~Animal() = default;
  // TODO: make speak() a pure virtual (= 0) so Animal is abstract
  virtual std::string speak() const { return ""; }
  std::string describe() const {
    return ""; // TODO: return name + " says " + speak()
  }
protected:
  std::string name;
};

class Dog : public Animal {
public:
  explicit Dog(std::string name) : Animal(std::move(name)) {}
  // TODO: override speak() to return "Woof"
  std::string speak() const override { return ""; }
};

class Cat : public Animal {
public:
  explicit Cat(std::string name) : Animal(std::move(name)) {}
  // TODO: override speak() to return "Meow"
  std::string speak() const override { return ""; }
};

std::string announce(const Animal& a) {
  return ""; // TODO: return a.describe()
}
`,

  requirements: [
    { pattern: /=\s*0\s*;/, message: "Give Animal a pure virtual method (= 0) so it is abstract" },
    { pattern: /\boverride\b/, message: "Mark the derived speak() with override" },
    { pattern: /virtual\s+~Animal/, message: "Give the base a virtual destructor" },
  ],

  tests: [
    { name: "Dog speaks Woof", code: "    Dog d(\"Rex\");\n    expect_eq(d.speak(), std::string(\"Woof\"));" },
    { name: "Cat speaks Meow", code: "    Cat c(\"Tom\");\n    expect_eq(c.speak(), std::string(\"Meow\"));" },
    { name: "describe uses the override", code: "    Dog d(\"Rex\");\n    expect_eq(d.describe(), std::string(\"Rex says Woof\"));" },
    { name: "announce dispatches through Animal&", code: "    Cat c(\"Tom\");\n    expect_eq(announce(c), std::string(\"Tom says Meow\"));" },
    { name: "polymorphism through a base pointer", code: "    std::unique_ptr<Animal> p = std::make_unique<Dog>(\"Fido\");\n    expect_eq(p->describe(), std::string(\"Fido says Woof\"));" },
  ],

  solution: `class Animal {
public:
  explicit Animal(std::string name) : name(std::move(name)) {}
  virtual ~Animal() = default;
  virtual std::string speak() const = 0;
  std::string describe() const {
    return name + " says " + speak();
  }
protected:
  std::string name;
};

class Dog : public Animal {
public:
  explicit Dog(std::string name) : Animal(std::move(name)) {}
  std::string speak() const override { return "Woof"; }
};

class Cat : public Animal {
public:
  explicit Cat(std::string name) : Animal(std::move(name)) {}
  std::string speak() const override { return "Meow"; }
};

std::string announce(const Animal& a) {
  return a.describe();
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C++</th></tr>
  <tr><td>Extend a class</td><td><code>type Dog struct { Animal }</code> (embedding, not extension)</td><td><code>class Dog : public Animal</code></td></tr>
  <tr><td>Enable dispatch</td><td>automatic, via interface satisfaction</td><td><code>virtual</code> in the base</td></tr>
  <tr><td>Override</td><td>define a method with the same name on the concrete type</td><td><code>m() const override</code></td></tr>
  <tr><td>Abstract method</td><td><code>Speak() string</code> in an <code>interface</code></td><td><code>virtual T m() const = 0;</code></td></tr>
  <tr><td>Call super ctor</td><td>no constructors; embedding just copies fields</td><td><code>: Animal(name)</code> init list</td></tr>
  <tr><td>Base handle</td><td><code>a Animal</code> (interface value)</td><td><code>const Animal&amp;</code> / <code>Animal*</code></td></tr>
</table>
<p>The gotcha for Go refugees: Go's embedding looks like inheritance but is not
— an embedded <code>baseAnimal</code> cannot call back into an embedder's
overridden method, so a shared <code>Describe</code> in the base type has no
way to reach <code>Dog</code>'s or <code>Cat</code>'s <code>Speak</code>. C++
solves exactly that problem: a base member function marked <code>virtual</code>
and called through a <code>Base&amp;</code> or <code>Base*</code> reaches the
derived override, no re-implementation needed in each subclass. But forget
<code>virtual</code> and you are back to Go-embedding-style static
dispatch — the base's own body runs and the derived override is invisible.
Note also that value semantics matter: assigning a <code>Dog</code> into an
<code>Animal</code> variable <em>slices</em> off the derived part.
Polymorphism in C++ only works through a reference (<code>Animal&amp;</code>)
or a pointer (<code>Animal*</code> / <code>std::unique_ptr&lt;Animal&gt;</code>),
never a by-value base — much like how a Go interface value that wraps a
concrete type still needs that dynamic type intact to dispatch correctly.</p>`,
};
