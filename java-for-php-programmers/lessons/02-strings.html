  title: "Strings",

  intro: `
<p>Java's <code>String</code> will feel familiar in one sense — like a PHP
string, it holds text you can slice and search — but it is immutable, the
method names differ, and there is no <code>.</code> concatenation operator or
double-quoted variable interpolation. You either concatenate with
<code>+</code> or reach for <code>String.format</code> (Java's
<code>sprintf</code>-style formatter). And when you build a string in a loop,
<code>+=</code> allocates a fresh object every time, so Java gives you
<code>StringBuilder</code> for that.</p>
<table>
  <tr><th>PHP</th><th>Java</th></tr>
  <tr><td><code>strtoupper($s)</code></td><td><code>s.toUpperCase()</code></td></tr>
  <tr><td><code>str_contains($s, "x")</code></td><td><code>s.contains("x")</code></td></tr>
  <tr><td><code>substr($s, 1, 3)</code></td><td><code>s.substring(1, 4)</code></td></tr>
  <tr><td><code>trim($s)</code></td><td><code>s.strip()</code> (Unicode-aware)</td></tr>
  <tr><td><code>str_repeat("ab", 3)</code></td><td><code>"ab".repeat(3)</code></td></tr>
  <tr><td><code>"$a and $b"</code></td><td><code>String.format("%s and %s", a, b)</code></td></tr>
</table>
<p>Two things to keep in mind. First, Java's <code>substring</code> takes a
start and an <em>end</em> index, not a start and a length like PHP's
<code>substr</code>. Second, because <code>String</code> is immutable, every
method that "changes" a string actually returns a new one —
<code>s.replace(...)</code> does nothing unless you capture the result, just
like PHP's <code>str_replace</code> returns a new string rather than mutating
in place.</p>`,

  php: `<?php
$s = "  Hello, World  ";

function shout(string $s): string {
    return strtoupper(trim($s));
}

function greeting(string $name, int $count): string {
    return "$name x$count";
}

function joinWords(array $words): string {
    $out = "";
    foreach ($words as $w) {
        $out .= $w . "-";
    }
    return $out;
}`,

  task: `
<p>Java has no free functions, so gather these <code>static</code> methods in a

  requirements: [

  tests: [

    { name: 'shout("Hello") is "HELLO"', code: "      expect_eq(Strings.shout(\"Hello\"), \"HELLO\");" },
    { name: 'greeting("Ada", 3) is "Ada x3"', code: "      expect_eq(Strings.greeting(\"Ada\", 3), \"Ada x3\");" },
    { name: 'initials("Ada Lovelace") is "AL"', code: "      expect_eq(Strings.initials(\"Ada Lovelace\"), \"AL\");" },
    { name: 'initials("Grace Brewster Hopper") is "GBH"', code: "      expect_eq(Strings.initials(\"Grace Brewster Hopper\"), \"GBH\");" },
    { name: 'censor("no cats here, cats!", "cats") replaces both', code: "      expect_eq(Strings.censor(\"no cats here, cats!\", \"cats\"), \"no *** here, ***!\");" },
  ],

  solution: `class Strings {
  static String shout(String s) {
    return s.strip().toUpperCase();
  }

  static String greeting(String name, int count) {
    return String.format("%s x%d", name, count);
  }

  static String initials(String full) {
    StringBuilder sb = new StringBuilder();
    for (String word : full.split(" ")) {
      if (!word.isBlank()) {
        sb.append(word.substring(0, 1).toUpperCase());
      }
    }
    return sb.toString();
  }

  static String censor(String s, String word) {
    return s.replace(word, "***");
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Java</th></tr>
  <tr><td>Substring</td><td><code>substr($s, 1, 3)</code></td><td><code>s.substring(1, 4)</code></td></tr>
  <tr><td>Contains</td><td><code>str_contains($s, "x")</code></td><td><code>s.contains("x")</code></td></tr>
  <tr><td>Index of</td><td><code>strpos($s, "x")</code></td><td><code>s.indexOf("x")</code></td></tr>
  <tr><td>Split</td><td><code>explode(",", $s)</code></td><td><code>s.split(",")</code> (regex!)</td></tr>
  <tr><td>Trim</td><td><code>trim($s)</code></td><td><code>s.strip()</code></td></tr>
  <tr><td>Blank check</td><td><code>trim($s) === ""</code></td><td><code>s.isBlank()</code></td></tr>
  <tr><td>Interpolate</td><td><code>"$a"</code></td><td><code>String.format("%s", a)</code></td></tr>
  <tr><td>Build in loop</td><td><code>$out .= $x</code></td><td><code>StringBuilder.append</code></td></tr>
</table>
<p>Watch out: Java's <code>String.split</code> takes a <em>regular expression</em>,
not a literal string like PHP's <code>explode</code>, so <code>split(".")</code>
splits on every character. Escape it (<code>split("\\\\.")</code>) or use
<code>Pattern.quote</code> when you mean a literal dot. Also note
<code>strip()</code> (Java 11+) is the Unicode-aware replacement for the older
<code>trim()</code>, which only removes ASCII control characters — closer to
what PHP's <code>trim()</code> already does by default. And since strings are
immutable, <code>StringBuilder</code> is not an optimization detail but the
idiomatic way to assemble text piece by piece — call <code>toString()</code>
when you are done, much as you would rely on <code>.=</code> in PHP.</p>`,
