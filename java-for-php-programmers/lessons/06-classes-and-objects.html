  number: 6,
  title: "Classes & Objects",

  intro: `
<p>Classes will feel familiar — Java and PHP share the same vocabulary of
fields, constructors, methods and <code>this</code>/<code>$this</code>. The
differences are mostly about syntax and ceremony. PHP marks every property
and method call with a leading <code>$</code> and an arrow
(<code>$this->balance</code>), while Java drops the sigil and uses a dot
(<code>this.balance</code>). Java also has no <code>public</code> on the
top-level class in this course: the harness compiles your file as
<code>prog.java</code>, so a <code>public</code> top-level type would be
rejected. Leave classes <em>package-private</em> (no modifier).</p>
<table>
  <tr><th>PHP</th><th>Java</th></tr>
  <tr><td><code>private int $balance;</code></td><td><code>private int balance;</code></td></tr>
  <tr><td><code>public function __construct(private string $owner) {}</code></td><td><code>BankAccount(String owner) { this.owner = owner; }</code></td></tr>
  <tr><td><code>public function getBalance(): int { return $this->balance; }</code></td><td><code>int getBalance() { return balance; }</code></td></tr>
  <tr><td><code>public function __toString(): string { … }</code></td><td><code>@Override public String toString() { … }</code></td></tr>
  <tr><td>constructor property promotion</td><td>always assign fields explicitly</td></tr>
</table>
<p>Two things to internalize. First, PHP 8's constructor property promotion
lets you declare, and assign, a field right in the parameter list — Java has
no such shortcut, so every field is declared once and assigned by hand with
<code>this.field = param;</code>. Second, <code>toString()</code> is
inherited from <code>Object</code> and is already <code>public</code>, so
your override must stay <code>public</code> (you cannot narrow visibility)
and should carry <code>@Override</code>; PHP's analogous magic method is
<code>__toString()</code>, invoked automatically whenever an object is used
in a string context.</p>`,

  php: `class BankAccount {
  private int $balance;

  public function __construct(private string $owner, int $initial) {
    $this->balance = $initial;
  }

  public function getBalance(): int {
    return $this->balance;
  }

  public function deposit(int $amount): void {
    $this->balance += $amount;
  }

  public function withdraw(int $amount): bool {
    if ($amount > $this->balance) {
      return false;
    }
    $this->balance -= $amount;
    return true;
  }

  public function __toString(): string {
    return "$this->owner has $" . $this->balance;
  }
}`,

  task: `
<p>Model a bank account as a class. Unlike PHP, Java has no top-level

<ol>

  <li>A constructor <code>BankAccount(String owner, int initialBalance)</code>

  <li>Getters <code>getOwner()</code> and <code>getBalance()</code>.</li>
  <li><code>deposit(int amount)</code> adds to the balance.</li>
  <li><code>withdraw(int amount)</code> returns <code>false</code> and changes
      nothing if <code>amount</code> exceeds the balance; otherwise it subtracts
      and returns <code>true</code>.</li>
  <li>Override <code>toString()</code> to return a string like
      <code>"Ada has $100"</code>.</li>
</ol>`,

  requirements: [

  tests: [

    { name: "toString formats the account", code:

    { name: "two instances are independent", code:
      "      var a = new BankAccount(\"Ada\", 100);\n" +

  solution: `class BankAccount {
  private final String owner;
  private int balance;

  BankAccount(String owner, int initialBalance) {
    this.owner = owner;
    this.balance = initialBalance;
  }

  String getOwner() {
    return owner;
  }

  int getBalance() {
    return balance;
  }

  void deposit(int amount) {
    this.balance += amount;
  }

  boolean withdraw(int amount) {
    if (amount > this.balance) {
      return false;
    }
    this.balance -= amount;
    return true;
  }

  @Override
  public String toString() {
    return owner + " has $" + balance;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Java</th></tr>
  <tr><td>Private field</td><td><code>private int $x;</code></td><td><code>private int x;</code></td></tr>
  <tr><td>Constructor</td><td><code>public function __construct(int $x) {}</code></td><td><code>ClassName(int x) {}</code></td></tr>
  <tr><td>Read a field</td><td><code>$this->x</code></td><td><code>this.x</code> or just <code>x</code></td></tr>
  <tr><td>Getter</td><td><code>getX(): int</code> (a method call)</td><td><code>int getX()</code> (a method call)</td></tr>
  <tr><td>Stringify</td><td><code>__toString(): string</code></td><td><code>@Override public String toString()</code></td></tr>
  <tr><td>Instantiate</td><td><code>new C(…)</code></td><td><code>new C(…)</code></td></tr>
</table>
<p>Inside a PHP method, every property access needs the explicit
<code>$this-></code> prefix — there's no bare-name shorthand. Java is the
opposite: <code>this.</code> is optional when there is no name clash, so
<code>balance</code> and <code>this.balance</code> refer to the same field.
It becomes mandatory only to disambiguate a field from a parameter of the
same name (exactly what the constructor does). Notice <code>owner</code> is
<code>final</code> in the solution: assign it once in the constructor and it
can never change, the Java equivalent of PHP's <code>readonly</code>
modifier (PHP 8.1+). And like Java, PHP's <code>private</code> is enforced
at runtime — reaching <code>$acct->balance</code> from outside the class
throws an <code>Error</code>. The difference is timing: PHP only catches it
when that line executes, while Java's compiler rejects it before the program
ever runs.</p>`,
