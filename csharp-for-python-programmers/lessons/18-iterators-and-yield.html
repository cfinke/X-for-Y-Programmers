  intro: `
<p>Python's generator functions (any <code>def</code> whose body contains
<code>yield</code>) produce values lazily, one at a time, and anything
<em>iterable</em> can drive a <code>for</code> loop. C# has the exact same idea
under different names: a method whose return type is <code>IEnumerable&lt;T&gt;</code>
becomes an <em>iterator</em> the moment it contains a <code>yield return</code>, and
<code>foreach</code> is C#'s <code>for</code>.</p>
<table>
  <tr><th>Python</th><th>C#</th></tr>
  <tr><td><code>def g():</code> (with <code>yield</code> inside)</td><td><code>IEnumerable&lt;int&gt; G()</code></td></tr>
  <tr><td><code>yield x</code></td><td><code>yield return x;</code></td></tr>
  <tr><td><code>return</code> (stop early)</td><td><code>yield break;</code></td></tr>
  <tr><td><code>for x in seq:</code></td><td><code>foreach (var x in seq)</code></td></tr>
  <tr><td><code>__iter__()</code></td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>Two things to internalize. First, iterators are <em>lazy</em>: the body does not
run until something enumerates it, and it runs only as far as the consumer asks —
so an infinite <code>fibonacci()</code> is fine as long as a caller uses
<code>itertools.islice(...)</code> to stop pulling. Second, there is no separate
generator keyword; the interpreter turns any function containing <code>yield</code>
into a generator function automatically. To make a whole <em>class</em> iterable,
implement <code>__iter__</code> — which can itself be a generator built from
<code>yield</code>.</p>`,

def fibonacci():

    def __iter__(self):
        i = self.start
        while i >= 1:

  solution: `static class Sequences {
  public static IEnumerable<int> Range(int start, int count) {
    for (int i = 0; i < count; i++) {
      yield return start + i;
    }
  }

  public static IEnumerable<T> Take<T>(IEnumerable<T> source, int n) {
    int i = 0;
    foreach (T item in source) {
      if (i >= n) {
        yield break;
      }
      yield return item;
      i++;
    }
  }

  public static IEnumerable<long> Fibonacci() {
    long a = 0, b = 1;
    while (true) {
      yield return a;
      long next = a + b;
      a = b;
      b = next;
    }
  }
}

class Countdown : IEnumerable<int> {
  private int start;

  public Countdown(int start) {
    this.start = start;
  }

  public IEnumerator<int> GetEnumerator() {
    for (int i = start; i >= 1; i--) {
      yield return i;
    }
  }

  IEnumerator IEnumerable.GetEnumerator() {
    return GetEnumerator();
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>C#</th></tr>
  <tr><td>Generator function</td><td><code>def g():</code> with <code>yield</code></td><td>method returning <code>IEnumerable&lt;T&gt;</code> with <code>yield</code></td></tr>
  <tr><td>Emit a value</td><td><code>yield x</code></td><td><code>yield return x;</code></td></tr>
  <tr><td>Stop early</td><td><code>return</code></td><td><code>yield break;</code></td></tr>
  <tr><td>Consume</td><td><code>for x in seq:</code></td><td><code>foreach</code> / LINQ</td></tr>
  <tr><td>Iterable class</td><td><code>__iter__()</code></td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>A generator function's body does not execute when you call it — it runs on
demand as the consumer pulls values (each call to <code>next()</code> resumes it up
to the next <code>yield</code>). That laziness is why an infinite
<code>fibonacci()</code> never hangs: <code>itertools.islice(fibonacci(), 7)</code>
pulls exactly seven values and then stops asking. It is also why any exception or
expensive setup inside the function is deferred until the first <code>next()</code>
call.</p>
<p>Because iterator methods return <code>IEnumerable&lt;T&gt;</code>, the entire LINQ
surface (<code>Where</code>, <code>Select</code>, <code>Sum</code>, <code>First</code>,
<code>SequenceEqual</code>, …) composes over them for free — the same way
<code>itertools</code> functions and builtins (<code>filter</code>, <code>map</code>,
<code>sum</code>, <code>sorted</code>, …) compose over a Python generator once you
iterate it. Implementing <code>IEnumerable&lt;T&gt;</code> on a class requires two
<code>GetEnumerator</code> methods: the generic one you actually write, plus a
non-generic <code>IEnumerator IEnumerable.GetEnumerator()</code> (explicit interface
implementation) that just delegates to it — a legacy requirement from the
pre-generics <code>System.Collections</code> interface. Python has no such split: a
single <code>__iter__</code> method (which may itself be a generator) is all the
iterator protocol requires.</p>`,
