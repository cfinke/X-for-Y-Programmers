const LESSON = {
  number: 11,
  title: "Templates",

  intro: `
<p>Java generics (<code>static &lt;T&gt; T first(T[] xs)</code>) and C++
templates solve the same problem — write code once, use it for many types — but at
opposite ends of the pipeline. A Java generic is a promise to the type
checker; it is erased before runtime (type erasure), so one compiled method serves
every <code>T</code>, and <code>T</code> must be a reference type — you write
<code>Box&lt;Integer&gt;</code>, never <code>Box&lt;int&gt;</code>. A C++ template is
a <em>recipe</em>: the compiler stamps out a fresh, fully concrete function or class
for each type you actually use, then compiles that — including primitives like
<code>int</code> directly, with no boxing required. So
<code>max_of&lt;int&gt;</code> and <code>max_of&lt;double&gt;</code>
are genuinely different functions in your binary.</p>
<table>
  <tr><th>Java</th><th>C++</th></tr>
  <tr><td><code>static &lt;T&gt; T id(T x)</code></td><td><code>template&lt;class T&gt; T id(T x)</code></td></tr>
  <tr><td><code>id(5)</code> (autoboxed to <code>Integer</code>)</td><td><code>id(5)</code> (T deduced as <code>int</code>)</td></tr>
  <tr><td><code>id("hi")</code> (T inferred as <code>String</code>)</td><td><code>id&lt;std::string&gt;("hi")</code></td></tr>
  <tr><td><code>class Box&lt;T&gt; { … }</code></td><td><code>template&lt;class T&gt; class Box { … }</code></td></tr>
  <tr><td>generics erased at runtime (type erasure)</td><td>each instantiation compiled separately</td></tr>
</table>
<p>Two practical notes. <code>class</code> and <code>typename</code> are
interchangeable in a template parameter list — <code>template&lt;class T&gt;</code>
and <code>template&lt;typename T&gt;</code> mean the same thing. And for function
templates you usually let the compiler <em>deduce</em> <code>T</code> from the
arguments, exactly like Java infers <code>T</code> at the call site; you only
spell it out in angle brackets when there is nothing to deduce from.</p>`,

  java: `class Generics {
  static <T extends Comparable<T>> T maxOf(T a, T b) {
    return a.compareTo(b) > 0 ? a : b;
  }
}

class Box<T> {
  private T value;
  Box(T value) { this.value = value; }
  T get() { return value; }
  void set(T value) { this.value = value; }
}

Box<Integer> b = new Box<>(41);
b.set(b.get() + 1);   // 42`,

  task: `
<p>Build a generic function and a small generic container.</p>
<ol>
  <li><code>template&lt;class T&gt; T max_of(T a, T b)</code> — return the larger of
      <code>a</code> and <code>b</code> using <code>&gt;</code>. It should work for
      <code>int</code>, <code>double</code>, and <code>std::string</code> with no
      changes.</li>
  <li><code>template&lt;class T&gt; class Box</code> — a one-slot container:
    <ul>
      <li>a constructor <code>Box(T value)</code> that stores the value,</li>
      <li><code>T get() const</code> returning the stored value,</li>
      <li><code>void set(T value)</code> replacing it.</li>
    </ul>
  </li>
</ol>
<p>Because templates must be visible where they are used, write the whole
definition inline (no separate .cpp file) — which is what you are doing here anyway.</p>`,

  starter: `template<class T>
T max_of(T a, T b) {
  return a; // TODO: return the larger of a and b
}

template<class T>
class Box {
public:
  Box(T value) {
    // TODO: store value
  }
  T get() const {
    return T{}; // TODO: return the stored value
  }
  void set(T value) {
    // TODO: replace the stored value
  }
private:
  T value_{};
};
`,

  requirements: [
    { pattern: /template\s*<\s*(class|typename)\s+\w+\s*>/, message: "Declare at least one template with template<class T>" },
    { pattern: /a\s*>\s*b/, message: "max_of should compare with a > b" },
  ],

  tests: [
    { name: "max_of(3, 7) is 7", code: "    expect_eq(max_of(3, 7), 7);" },
    { name: "max_of(2.5, 1.5) is 2.5", code: "    expect_eq(max_of(2.5, 1.5), 2.5);" },
    { name: "max_of on strings picks the larger", code: "    expect_eq(max_of(std::string(\"apple\"), std::string(\"banana\")), std::string(\"banana\"));" },
    { name: "explicit type argument works", code: "    expect_eq(max_of<int>(4, 9), 9);" },
    { name: "Box<int> get returns the stored value", code: "    Box<int> b(41); expect_eq(b.get(), 41);" },
    { name: "Box<int> set replaces the value", code: "    Box<int> b(41); b.set(b.get() + 1); expect_eq(b.get(), 42);" },
    { name: "Box<std::string> holds a string", code: "    Box<std::string> s(std::string(\"hi\")); expect_eq(s.get(), std::string(\"hi\"));" },
  ],

  solution: `template<class T>
T max_of(T a, T b) {
  return a > b ? a : b;
}

template<class T>
class Box {
public:
  Box(T value) : value_(value) {}
  T get() const {
    return value_;
  }
  void set(T value) {
    value_ = value;
  }
private:
  T value_{};
};
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C++</th></tr>
  <tr><td>Function generic</td><td><code>static &lt;T&gt; T f(T x)</code></td><td><code>template&lt;class T&gt; auto f(T x)</code></td></tr>
  <tr><td>Class generic</td><td><code>class Box&lt;T&gt;</code></td><td><code>template&lt;class T&gt; class Box</code></td></tr>
  <tr><td>Inference / deduction</td><td><code>f(5)</code></td><td><code>f(5)</code></td></tr>
  <tr><td>Explicit type arg</td><td><code>Box.&lt;String&gt;of(x)</code></td><td><code>f&lt;std::string&gt;(x)</code></td></tr>
  <tr><td>Where it lives</td><td>compiled once, erased, T boxed</td><td>instantiated per type, header-only</td></tr>
</table>
<p>The biggest surprise coming from Java is that templates are duck-typed by
the compiler: there is no <code>&lt;T extends Comparable&lt;T&gt;&gt;</code> bound
required, so <code>max_of</code> compiles for <em>any</em> <code>T</code> that
supports <code>&gt;</code> — and only fails, often verbosely, if you feed it a type
that does not. C++20 adds <em>concepts</em> (e.g.
<code>template&lt;std::totally_ordered T&gt;</code>) to state such requirements up
front, much like a Java <code>T extends Comparable&lt;T&gt;</code> bound, with far
clearer errors. Also note the member initializer list
<code>Box(T value) : value_(value) {}</code> — the idiomatic way to initialize
members, preferred over assigning inside the constructor body.</p>`,
};
