  title: "Move Semantics",

  intro: `
<p>In Java, an object variable is a reference to something on the heap. Writing
<code>Buf b = a;</code> copies the <em>reference</em>, not the data — both names now
point at the same array, and nothing is duplicated. C++ is the opposite: a
<code>std::vector</code> or <code>std::string</code> variable <em>is</em> the
data (it owns its heap buffer), so <code>auto b = a;</code> performs a deep
<strong>copy</strong> — a fresh allocation and a byte-for-byte duplicate.</p>
<p>That is often not what you want. If you are done with <code>a</code> and just
want to hand its buffer to <code>b</code>, copying is wasteful. <strong>Moving</strong>
is C++'s answer: it steals the source's internal pointer and leaves the source
empty — no allocation, no element copies, just a few pointers swapped. You opt
into it with <code>std::move</code>, which casts a value to an <em>rvalue
reference</em> (<code>T&amp;&amp;</code>) so the compiler picks the move path.</p>
<table>
  <tr><th>Java</th><th>C++</th></tr>
  <tr><td><code>Buf b = a;</code> (shares the object)</td><td><code>auto b = a;</code> (deep copy)</td></tr>
  <tr><td>no real copy happens</td><td><code>auto b = std::move(a);</code> (steal, <code>a</code> now empty)</td></tr>
  <tr><td>null out the source by hand</td><td>move leaves the source empty automatically</td></tr>
  <tr><td><code>void f(Buf x)</code></td><td><code>void f(Buf&amp;&amp; x)</code> (takes an rvalue)</td></tr>
</table>
<p>Because a move on a <code>vector</code> or <code>string</code> is a constant
number of pointer assignments regardless of size, it is essentially free —
that is why returning a big container by value in C++ is cheap, not something
to avoid.</p>`,

  java: `// In Java objects are references: assignment shares, never copies.
class Buf {
  int[] data;
  Buf(int[] data) { this.data = data; }
}

Buf a = new Buf(new int[] {1, 2, 3});
Buf b = a;              // b and a point at the SAME object
b.data[0] = 99;          // a.data is now {99, 2, 3} too

// "Moving" ownership is a manual convention: hand off, then null the source.
static int[] transfer(Buf src) {
  int[] moved = src.data;
  src.data = null;      // source emptied by hand
  return moved;
}`,

  solution: `class TextBuffer {
private:
  std::string data_;

public:
  TextBuffer(std::string s) : data_(std::move(s)) {}

  std::size_t size() const {
    return data_.size();
  }

  const std::string& str() const {
    return data_;
  }

  TextBuffer(TextBuffer&& other) noexcept : data_(std::move(other.data_)) {
    other.data_.clear();
  }
};

TextBuffer transfer(TextBuffer& src) {
  return TextBuffer(std::move(src));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C++</th></tr>
  <tr><td>Assignment</td><td>shares a reference</td><td><code>auto b = a;</code> deep-copies</td></tr>
  <tr><td>Transfer ownership</td><td><code>x = src; src = null;</code> by hand</td><td><code>auto b = std::move(a);</code></td></tr>
  <tr><td>Rvalue reference</td><td>(none)</td><td><code>T&amp;&amp;</code></td></tr>
  <tr><td>Move constructor</td><td>(none)</td><td><code>T(T&amp;&amp; o) noexcept</code></td></tr>
  <tr><td>Cost of moving a vector</td><td>n/a</td><td>O(1) — steals the buffer pointer</td></tr>
</table>
<p><code>std::move</code> does not move anything by itself — it is just a cast to
<code>T&amp;&amp;</code>. It is a signal: "I am done with this value, feel free to
gut it." The compiler then selects the move constructor (or move assignment)
over the copy version. After a move the source is still a valid object; it is
simply in an unspecified state, which is why we <code>clear()</code> it here to
make "empty" a guarantee callers can rely on.</p>
<p>Marking the move constructor <code>noexcept</code> matters: containers like
<code>std::vector</code> will only <em>move</em> your objects when they grow if
the move cannot throw — otherwise they fall back to copying to preserve their
strong exception guarantee. That one keyword is the difference between a cheap
reallocation and an expensive one.</p>`,
