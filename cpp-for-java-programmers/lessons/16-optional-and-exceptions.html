  title: "Optional & Exceptions",

  intro: `
<p>Two everyday situations: a value might be missing, or an operation might fail.
In Java you lean on a nullable reference (returning <code>null</code>) for the
first and <code>throw</code> for the second. C++ has a dedicated type for a
maybe-absent value, <code>std::optional&lt;T&gt;</code>, and a full exception
system for the failure case.</p>
<p>An <code>std::optional&lt;T&gt;</code> either holds a <code>T</code> or holds
nothing (<code>std::nullopt</code>). Unlike a nullable Java reference, there is
no separate "absent" value living inside <code>T</code> — the emptiness is
tracked by the optional wrapper itself, so an <code>optional&lt;int&gt;</code>
can be empty even though every <code>int</code> is a valid number (a raw Java
<code>int</code> can't be <code>null</code> at all; you'd have to box it to
<code>Integer</code> to get that). Ask whether it is present with
<code>has_value()</code> (or by testing the optional in a boolean context), read
the contained value with <code>*opt</code> or <code>opt.value()</code>, and
supply a fallback in one step with <code>opt.value_or(fallback)</code>.</p>
<table>
  <tr><th>Java</th><th>C++</th></tr>
  <tr><td><code>Integer</code> (nullable)</td><td><code>std::optional&lt;int&gt;</code></td></tr>
  <tr><td><code>return null;</code></td><td><code>return std::nullopt;</code></td></tr>
  <tr><td><code>x != null</code></td><td><code>opt.has_value()</code></td></tr>
  <tr><td><code>Objects.requireNonNullElse(x, fallback)</code></td><td><code>opt.value_or(fallback)</code></td></tr>
  <tr><td><code>throw new RuntimeException("bad")</code></td><td><code>throw std::runtime_error("bad")</code></td></tr>
  <tr><td><code>catch (Exception e) { … }</code></td><td><code>catch (const std::exception&amp; e) { … }</code></td></tr>
</table>
<p>Exceptions work much like Java's: you throw a typed object and catch by
type. The big difference is that C++ has no checked exceptions — there is no
<code>throws</code> clause on a function signature, and the compiler never
forces you to catch or declare anything; whether an exception gets handled is
entirely up to what each call site chooses to do. <code>std::runtime_error</code>
(from <code>&lt;stdexcept&gt;</code>) is the workhorse; its message is read back
with <code>e.what()</code>, the C++ equivalent of <code>e.getMessage()</code>.
You catch a whole family at once by catching a base class reference —
<code>const std::exception&amp;</code> catches everything in the standard
hierarchy, similar to a <code>catch (Exception e)</code> sitting above more
specific catches in Java. A custom exception is just a class that derives from
<code>std::runtime_error</code>, the way a Java exception class extends
<code>RuntimeException</code> or <code>Exception</code>.</p>`,

  java: `static String findUser(int id) {
  Map<Integer, String> users = Map.of(1, "Ada", 2, "Rob");
  return users.get(id);   // null if missing
}

String name = Objects.requireNonNullElse(findUser(3), "guest");

class ValidationError extends RuntimeException {
  ValidationError(String message) {
    super(message);
  }
}

static int validateAge(int age) {
  if (age < 0) throw new ValidationError("age must be non-negative");
  return age;
}`,

  task: `

  <li><code>greet(int id)</code> returns a <code>std::string</code>. Call

  <li>Define a custom exception:

</ol>`,

  tests: [
    { name: "findUser(1) is Ada", code: "    expect_eq(findUser(1).value(), std::string(\"Ada\"));" },
    { name: "findUser(2) has a value", code: "    expect_true(findUser(2).has_value());" },
    { name: "findUser(3) is empty", code: "    expect_true(!findUser(3).has_value());" },
    { name: "greet(1) is \"Hi Ada\"", code: "    expect_eq(greet(1), std::string(\"Hi Ada\"));" },
    { name: "greet(99) falls back to guest", code: "    expect_eq(greet(99), std::string(\"Hi guest\"));" },
    { name: "validateAge(30) returns 30", code: "    expect_eq(validateAge(30), 30);" },
    { name: "validateAge(-1) throws ValidationError", code: "    bool threw = false;\n    try { validateAge(-1); } catch (const ValidationError& e) { threw = true; expect_eq(std::string(e.what()), std::string(\"age must be non-negative\")); }\n    expect_true(threw);" },
  ],

  solution: `std::optional<std::string> findUser(int id) {
  std::map<int, std::string> users{{1, "Ada"}, {2, "Rob"}};
  auto it = users.find(id);
  if (it == users.end()) {
    return std::nullopt;
  }
  return it->second;
}

std::string greet(int id) {
  std::string name = findUser(id).value_or("guest");
  return "Hi " + name;
}

struct ValidationError : std::runtime_error {
  using std::runtime_error::runtime_error;
};

int validateAge(int age) {
  if (age < 0) {
    throw ValidationError("age must be non-negative");
  }
  return age;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C++</th></tr>
  <tr><td>Maybe-absent type</td><td>nullable reference (e.g. <code>Integer</code>)</td><td><code>std::optional&lt;T&gt;</code></td></tr>
  <tr><td>Absent value</td><td><code>null</code></td><td><code>std::nullopt</code></td></tr>
  <tr><td>Is it present?</td><td><code>x != null</code></td><td><code>opt.has_value()</code> / <code>if (opt)</code></td></tr>
  <tr><td>Read the value</td><td><code>x</code> (after null check)</td><td><code>*opt</code> / <code>opt.value()</code></td></tr>
  <tr><td>Fallback</td><td><code>Objects.requireNonNullElse(x, d)</code></td><td><code>opt.value_or(d)</code></td></tr>
  <tr><td>Throw</td><td><code>throw new RuntimeException(m)</code></td><td><code>throw std::runtime_error(m)</code></td></tr>
  <tr><td>Custom error</td><td><code>class E extends RuntimeException { ... }</code></td><td><code>struct E : std::runtime_error {}</code></td></tr>
  <tr><td>Catch by type</td><td><code>catch (E e) { … }</code></td><td><code>catch (const E&amp; e) { … }</code></td></tr>
  <tr><td>Read the message</td><td><code>e.getMessage()</code></td><td><code>e.what()</code></td></tr>
</table>
<p>Two things to keep in mind. First, <code>opt.value()</code> throws
<code>std::bad_optional_access</code> when the optional is empty, and
<code>*opt</code> on an empty optional is undefined behavior — so guard with
<code>has_value()</code> or reach for <code>value_or</code>, which never throws.
<code>value_or</code> is the direct analogue of
<code>Objects.requireNonNullElse</code> and is usually the cleanest way to
collapse "maybe a value" down to "definitely a value."</p>
<p>Second, always catch exceptions by <code>const</code> reference
(<code>catch (const std::exception&amp; e)</code>), never by value — catching by
value slices a derived exception down to its base and copies it needlessly.
Because <code>ValidationError</code> derives from <code>std::runtime_error</code>
(which derives from <code>std::exception</code>), a single
<code>catch (const std::exception&amp;)</code> higher up will still catch it; the
inheritance chain is what makes catch-by-base work. The
<code>using std::runtime_error::runtime_error;</code> line inherits the base
constructor so your custom type accepts a message string with no extra
boilerplate.</p>`,
