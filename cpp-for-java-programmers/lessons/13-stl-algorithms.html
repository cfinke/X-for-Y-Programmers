  intro: `
<p>In Java you rarely write index loops to process a <code>List</code> — you
reach for <code>Stream</code> operations: <code>sorted</code>,
<code>filter().findFirst()</code>, <code>filter().count()</code>,
<code>map</code>, and <code>reduce</code>. C++ has the same toolbox, but the
functions live in <code>&lt;algorithm&gt;</code> and <code>&lt;numeric&gt;</code>,
and instead of being chained onto a stream they are free functions that take a
pair of <em>iterators</em> — <code>v.begin()</code> and <code>v.end()</code> —
marking the range to work on.</p>
<table>
  <tr><th>Java</th><th>C++</th></tr>
  <tr><td><code>list.sort((x, y) -&gt; x - y)</code></td><td><code>std::sort(a.begin(), a.end(), cmp)</code></td></tr>
  <tr><td><code>list.stream().filter(p).findFirst()</code></td><td><code>std::find_if(a.begin(), a.end(), p)</code></td></tr>
  <tr><td><code>list.stream().filter(p).count()</code></td><td><code>std::count_if(a.begin(), a.end(), p)</code></td></tr>
  <tr><td><code>list.stream().map(f)</code></td><td><code>std::transform(a.begin(), a.end(), out, f)</code></td></tr>
  <tr><td><code>list.stream().reduce(init, f)</code></td><td><code>std::accumulate(a.begin(), a.end(), init, f)</code></td></tr>
</table>
<p>The predicates and mappers are lambdas, just like Java's lambda
expressions: <code>x -&gt; x % 2 == 0</code>. The C++ version adds a
<code>[]</code> before the parameter list — the <em>capture list</em> — which
names any surrounding variables the lambda uses (leave it empty when it needs
none; Java's lambdas capture effectively-final locals automatically, with no
equivalent syntax to write). Two things differ from the stream methods:
<code>std::sort</code> mutates the vector in place and returns nothing (closer
to <code>list.sort(cmp)</code> than to a stream pipeline), and
<code>std::transform</code> writes into an existing output range rather than
allocating a fresh collection, so you size the destination first.</p>`,

  java: `List<Integer> nums = List.of(5, 2, 8, 1, 9, 3);

List<Integer> sorted = nums.stream()
    .sorted(Comparator.reverseOrder())
    .toList();                                        // descending
int firstBig = nums.stream()
    .filter(n -> n > 4)
    .findFirst()
    .orElse(-1);                                       // 5
long evens = nums.stream().filter(n -> n % 2 == 0).count();  // 2
List<Integer> doubled = nums.stream()
    .map(n -> n * 2)
    .toList();                                          // [10, 4, ...]
int total = nums.stream().reduce(0, Integer::sum);       // 28`,

  task: `
<p>Work with <code>std::vector&lt;int&gt;</code> using the algorithms — no
hand-written <code>for</code> loops. Write these free functions:</p>
<ol>
  <li><code>sortDescending(std::vector&lt;int&gt; v)</code> — takes the vector by

</ol>`,

  solution: `std::vector<int> sortDescending(std::vector<int> v) {
  std::sort(v.begin(), v.end(), [](int a, int b) { return a > b; });
  return v;
}

int firstGreaterThan(const std::vector<int>& v, int threshold) {
  auto it = std::find_if(v.begin(), v.end(),
                         [threshold](int x) { return x > threshold; });
  return it != v.end() ? *it : -1;
}

int countEven(const std::vector<int>& v) {
  return static_cast<int>(
      std::count_if(v.begin(), v.end(), [](int x) { return x % 2 == 0; }));
}

std::vector<int> doubled(const std::vector<int>& v) {
  std::vector<int> out(v.size());
  std::transform(v.begin(), v.end(), out.begin(),
                 [](int x) { return x * 2; });
  return out;
}

int sum(const std::vector<int>& v) {
  return std::accumulate(v.begin(), v.end(), 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C++</th></tr>
  <tr><td>Sort with comparator</td><td><code>list.sort((x, y) -&gt; y - x)</code></td><td><code>std::sort(b, e, [](int x, int y){ return x &gt; y; })</code></td></tr>
  <tr><td>Find first match</td><td><code>list.stream().filter(p).findFirst()</code></td><td><code>std::find_if(b, e, p)</code> → iterator</td></tr>
  <tr><td>Count matches</td><td><code>list.stream().filter(p).count()</code></td><td><code>std::count_if(b, e, p)</code></td></tr>
  <tr><td>Map</td><td><code>list.stream().map(f)</code></td><td><code>std::transform(b, e, out, f)</code></td></tr>
  <tr><td>Reduce</td><td><code>list.stream().reduce(0, f)</code></td><td><code>std::accumulate(b, e, 0, f)</code></td></tr>
  <tr><td>Lambda</td><td><code>x -&gt; x * 2</code></td><td><code>[](int x){ return x * 2; }</code></td></tr>
</table>
<p>A few gotchas coming from Java. The search algorithms return an
<em>iterator</em>, not a value or an <code>Optional</code> — you must test it
against <code>end()</code> before dereferencing, since <code>end()</code> is
the one-past-the-last sentinel (the analogue of <code>Stream.findFirst()</code>
returning an empty <code>Optional</code> instead of throwing).
<code>std::count_if</code> returns a signed <code>difference_type</code>, which
is why we <code>static_cast</code> it to <code>int</code> — much like
<code>Stream.count()</code> returning a <code>long</code> that you would narrow
to an <code>int</code> yourself. And the initial value you hand to
<code>std::accumulate</code> fixes the result type: pass <code>0</code> (an
<code>int</code>) and you get integer math; pass <code>0.0</code> for a
<code>double</code> sum — the same role Java's identity argument plays in
<code>Stream.reduce(identity, accumulator)</code>. In C++20 you can also spell
many of these as <a>ranges</a> (<code>std::ranges::sort(v)</code>) that take
the container directly, but the iterator-pair form is the foundation worth
knowing first.</p>`,
