  intro: `
<p>In Rust a closure is just a value: you write it with pipes
(<code>|x: i32| -&gt; i32 { x * 2 }</code>), pass it around, and its type is one of
the <code>Fn</code>/<code>FnMut</code>/<code>FnOnce</code> traits inferred by the
compiler. Java has lambdas too, and the arrow syntax will look familiar — but Java
has no free-standing function <em>type</em>. Every lambda must be an instance of
a <strong>functional interface</strong>: an interface with exactly one abstract
method. The compiler infers which interface from the target type.</p>
<table>
  <tr><th>Rust</th><th>Java</th></tr>
  <tr><td><code>|x| x * 2</code></td><td><code>x -&gt; x * 2</code></td></tr>
  <tr><td><code>|a, b| a + b</code></td><td><code>(a, b) -&gt; a + b</code></td></tr>
  <tr><td><code>|| "hi"</code></td><td><code>() -&gt; "hi"</code></td></tr>
  <tr><td><code>impl Fn(i32) -&gt; i32</code></td><td><code>Function&lt;Integer,Integer&gt;</code></td></tr>
  <tr><td><code>impl Fn(i32) -&gt; bool</code></td><td><code>Predicate&lt;Integer&gt;</code></td></tr>
  <tr><td><code>iter.map(f)</code></td><td>pass a <code>Function</code> to a method</td></tr>
</table>
<p>The <code>java.util.function</code> package ships the everyday shapes:
<code>Function&lt;T,R&gt;</code> (one arg, call <code>.apply</code>),
<code>BiFunction&lt;A,B,R&gt;</code> (two args, <code>.apply</code>),
<code>Predicate&lt;T&gt;</code> (returns <code>boolean</code>, call
<code>.test</code>), and <code>Supplier&lt;T&gt;</code> (no args, call
<code>.get</code>). Because generics can't hold primitives, use the boxed types
(<code>Integer</code>, not <code>int</code>). And where Rust lets you write
<code>iter.map(square)</code> by naming a function directly, Java offers
<strong>method references</strong>: <code>Functional::square</code> (a static
method), <code>String::toUpperCase</code> (an instance method invoked on the
argument), or <code>prefix::concat</code> (an instance method bound to a specific
object).</p>`,

let is_even = |n: i32| n % 2 == 0;

fn map_all(nums: &[i32], f: impl Fn(i32) -> i32) -> Vec<i32> {
    nums.iter().map(|&n| f(n)).collect()
}

map_all(&[1, 2, 3], double);              // [2, 4, 6]
map_all(&[1, 2, 3], |n| n * n);           // [1, 4, 9]
[1, 2, 3, 4].iter().filter(|&&n| is_even(n)); // [2, 4]`,

  solution: `import java.util.function.*;

class Functional {
  static Function<Integer, Integer> doubler() {
    return n -> n * 2;
  }

  static Predicate<Integer> isEven() {
    return n -> n % 2 == 0;
  }

  static BiFunction<Integer, Integer, Integer> adder() {
    return (a, b) -> a + b;
  }

  static Supplier<String> greeter() {
    return () -> "hello";
  }

  static List<Integer> mapAll(List<Integer> nums, Function<Integer, Integer> f) {
    List<Integer> out = new ArrayList<>();
    for (Integer n : nums) {
      out.add(f.apply(n));
    }
    return out;
  }

  static List<Integer> keep(List<Integer> nums, Predicate<Integer> p) {
    List<Integer> out = new ArrayList<>();
    for (Integer n : nums) {
      if (p.test(n)) {
        out.add(n);
      }
    }
    return out;
  }

  static int square(int n) {
    return n * n;
  }

  static List<Integer> squareAll(List<Integer> nums) {
    return mapAll(nums, Functional::square);
  }

  static List<String> shout(List<String> words, String prefix) {
    Function<String, String> up = String::toUpperCase;   // Class::instanceMethod
    Function<String, String> withPrefix = prefix::concat; // instance::method
    List<String> out = new ArrayList<>();
    for (String w : words) {
      out.add(withPrefix.apply(up.apply(w)));
    }
    return out;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Java</th></tr>
  <tr><td>One-arg lambda</td><td><code>|x| x * 2</code></td><td><code>x -&gt; x * 2</code></td></tr>
  <tr><td>Function type</td><td><code>impl Fn(i32) -&gt; i32</code></td><td><code>Function&lt;Integer,Integer&gt;</code></td></tr>
  <tr><td>Calling it</td><td><code>f(x)</code></td><td><code>f.apply(x)</code></td></tr>
  <tr><td>Predicate</td><td><code>impl Fn(i32) -&gt; bool</code></td><td><code>Predicate&lt;T&gt;</code>, <code>p.test(x)</code></td></tr>
  <tr><td>Supplier</td><td><code>impl Fn() -&gt; T</code></td><td><code>Supplier&lt;T&gt;</code>, <code>s.get()</code></td></tr>
  <tr><td>Static "method ref"</td><td><code>iter.map(square)</code></td><td><code>Functional::square</code></td></tr>
  <tr><td>Instance method ref</td><td><code>iter.map(str::to_uppercase)</code></td><td><code>String::toUpperCase</code></td></tr>
</table>
<p>The big mental shift: in Rust a closure's type is an anonymous, compiler-generated
type that implements one of the <code>Fn</code> traits, and a plain function name
already satisfies those traits, so you can pass <code>square</code> or
<code>str::to_uppercase</code> straight into <code>.map()</code>; in Java a lambda
is always an <em>instance of an interface</em> with a single abstract method (a
"functional interface"). You rarely name it — the compiler infers it from the
parameter or return type — but that's why <code>.apply</code>, <code>.test</code>,
and <code>.get</code> differ: each interface names its one method differently.</p>
<p>Method references are pure sugar for a lambda that just forwards its arguments.
<code>Functional::square</code> means <code>n -&gt; Functional.square(n)</code>,
much like passing the bare function <code>square</code> in Rust;
<code>String::toUpperCase</code> means <code>s -&gt; s.toUpperCase()</code> (the
argument becomes the receiver, similar to Rust's <code>str::to_uppercase</code>
used as a closure); and <code>prefix::concat</code> means
<code>s -&gt; prefix.concat(s)</code> (bound to a captured object, like a Rust
closure that captures <code>prefix</code> by reference). Reach for them when the
lambda would only relay its inputs to an existing method.</p>`,
