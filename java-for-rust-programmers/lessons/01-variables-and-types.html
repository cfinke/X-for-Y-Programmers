<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Java and Rust are both statically typed, but they set their defaults in
opposite directions. Rust infers the type of almost every local
(<code>let age = 36;</code>) and makes it immutable unless you add
<code>mut</code>; Java requires an explicit type for fields and only recently
gained inference for locals via <code>var</code> (Java 10+), with everything
mutable unless you mark it <code>final</code>.</p>
<table>
  <tr><th>Rust</th><th>Java</th></tr>
  <tr><td><code>let age: u32 = 36;</code></td><td><code>int age = 36;</code></td></tr>
  <tr><td><code>let name = String::from("Ada");</code></td><td><code>final String name = "Ada";</code></td></tr>
  <tr><td>immutable by default (<code>let</code>)</td><td>mutable by default (needs <code>final</code>)</td></tr>
  <tr><td>top-level <code>fn</code></td><td>methods live inside a class</td></tr>
</table>
<p>Two adjustments matter most. First, Rust's granular numeric types
(<code>i32</code>, <code>u32</code>, <code>f64</code>, …) map fairly directly
onto Java's <code>int</code>, <code>long</code>, <code>double</code> and
friends, and the truncating-integer-division behavior you already know from
Rust carries straight over: <code>7 / 2</code> is <code>3</code>, while
<code>7 / 2.0</code> is <code>3.5</code>. Second, Java has no free functions —
every method belongs to a class, so a page of helpers becomes a class full of
<code>static</code> methods, much like wrapping Rust functions in an
<code>impl</code> block.</p>`,

  rust: `let age: u32 = 36;
let user_name = String::from("Ada");

fn describe(name: &str, age: u32) -> String {
    format!("{name} is {age}")
}`,

  task: `
<p>Write the Java version. Java has no top-level functions, so put your methods
in a class:</p>
<ol>
  <li>Declare a class <code>Basics</code> holding <code>static</code> methods.</li>
  <li><code>add(int a, int b)</code> returns their sum.</li>
  <li><code>describe(String name, int age)</code> returns a string like
      <code>"Ada is 36"</code>.</li>
  <li><code>divide(int a, int b)</code> returns a <code>double</code>, so
      <code>divide(7, 2)</code> is <code>3.5</code>, not <code>3</code>. Cast one
      operand: <code>(double) a / b</code>.</li>
</ol>`,

  starter: `class Basics {
  static int add(int a, int b) {
    return 0; // TODO
  }

  static String describe(String name, int age) {
    return ""; // TODO
  }

  static double divide(int a, int b) {
    return 0; // TODO: watch out for integer division
  }
}
`,

  requirements: [
    { pattern: /class\s+Basics/, message: "Declare a class named Basics" },
    { pattern: /static/, message: "Give Basics static methods" },
    { pattern: /\(double\)/, message: "Cast to (double) so divide returns a fractional result" },
  ],

  tests: [
    { name: "add(2, 3) is 5", code: "      expect_eq(Basics.add(2, 3), 5);" },
    { name: 'describe("Ada", 36) is "Ada is 36"', code: "      expect_eq(Basics.describe(\"Ada\", 36), \"Ada is 36\");" },
    { name: 'describe("Rob", 68) is "Rob is 68"', code: "      expect_eq(Basics.describe(\"Rob\", 68), \"Rob is 68\");" },
    { name: "divide(7, 2) is 3.5", code: "      expect_eq(Basics.divide(7, 2), 3.5);" },
    { name: "divide(10, 4) is 2.5", code: "      expect_eq(Basics.divide(10, 4), 2.5);" },
  ],

  solution: `class Basics {
  static int add(int a, int b) {
    return a + b;
  }

  static String describe(String name, int age) {
    return name + " is " + age;
  }

  static double divide(int a, int b) {
    return (double) a / b;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Java</th></tr>
  <tr><td>Typed local</td><td><code>let x: i32 = 1;</code></td><td><code>int x = 1;</code></td></tr>
  <tr><td>Inferred local</td><td><code>let x = 1;</code></td><td><code>var x = 1;</code></td></tr>
  <tr><td>Immutable binding</td><td><code>let x = 1;</code></td><td><code>final int x = 1;</code></td></tr>
  <tr><td>Numeric types</td><td><code>i32</code>, <code>u32</code>, <code>i64</code>, <code>f64</code>…</td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>float</code>…</td></tr>
  <tr><td>Free function</td><td><code>fn f() {}</code></td><td><code>static</code> method in a class</td></tr>
</table>
<p>The truncating integer division you already know from Rust
(<code>i32 / i32</code> throws away the remainder) carries straight over to
Java. What's new is the ceremony: Rust casts with <code>as</code>
(<code>a as f64</code>), while Java casts with a parenthesized type
(<code>(double) a</code>) — same idea, different spelling. Promote one side to
<code>double</code> and the whole expression becomes floating point, exactly
like promoting to <code>f64</code> in Rust.</p>`,
};
