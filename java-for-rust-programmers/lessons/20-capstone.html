<p>Time to put it together. Over this course you have met Java's records,
interfaces, generics, streams, and exceptions one at a time. A real component
uses all of them at once. In this capstone you will build a tiny <strong>typed
in-memory repository</strong> — the kind of thing you would reach for the moment
you needed a stand-in for a database in a Rust service.</p>
<table>
  <tr><th>Rust</th><th>Java</th></tr>
  <tr><td><code>trait Entity { fn id(&amp;self) -&gt; u32; }</code></td><td><code>interface Entity { int id(); }</code></td></tr>
  <tr><td><code>struct Repo&lt;T: Entity&gt;</code></td><td><code>class Repo&lt;T extends Entity&gt;</code></td></tr>
  <tr><td><code>HashMap&lt;u32, T&gt;</code></td><td><code>Map&lt;Integer, T&gt;</code></td></tr>
  <tr><td><code>iter().filter(p).collect()</code>, then <code>sort_by_key(...)</code></td><td><code>stream().filter(p).sorted(...)</code></td></tr>
  <tr><td><code>panic!("...")</code> / <code>Err(...)</code></td><td><code>throw new NotFoundException(id)</code></td></tr>
</table>
<p>The shape is one you know: a generic container keyed by id, a lookup that
panics when the key is missing, an <code>Option</code>-returning lookup that
does not, and a query method that takes a closure and returns filtered,
sorted results via an iterator. Each piece is small; the point is that the
trait bound <code>T: Entity</code> threads through all of them so the
same repository serves <code>User</code>, <code>Product</code>, or any future
struct without a single cast.</p>`,

  rust: `trait Entity {
    fn id(&self) -> u32;
}

struct Repo<T: Entity + Clone> {
    store: HashMap<u32, T>,
}

impl<T: Entity + Clone> Repo<T> {
    fn new() -> Self {
        Repo { store: HashMap::new() }
    }

    fn add(&mut self, e: T) -> T {
        self.store.insert(e.id(), e.clone());
        e
    }

    fn get(&self, id: u32) -> T {
        match self.store.get(&id) {
            Some(v) => v.clone(),
            None => panic!("no entity with id {id}"),
        }
    }

    fn where_(&self, pred: impl Fn(&T) -> bool) -> Vec<T> {
        let mut matches: Vec<T> = self.store.values().filter(|v| pred(v)).cloned().collect();
        matches.sort_by_key(|t| t.id());
        matches
    }
}`,

  solution: `import java.util.function.*;

interface Entity {
  int id();
}

record User(int id, String name, int age) implements Entity {}

record Product(int id, String title, double price) implements Entity {}

class NotFoundException extends RuntimeException {
  NotFoundException(int id) {
    super("no entity with id " + id);
  }
}

class Repo<T extends Entity> {
  private final Map<Integer, T> store = new HashMap<>();

  T add(T entity) {
    store.put(entity.id(), entity);
    return entity;
  }

  T get(int id) {
    T value = store.get(id);
    if (value == null) {
      throw new NotFoundException(id);
    }
    return value;
  }

  Optional<T> find(int id) {
    return Optional.ofNullable(store.get(id));
  }

  int count() {
    return store.size();
  }

  List<T> where(Predicate<T> pred) {
    return store.values().stream()
        .filter(pred)
        .sorted(Comparator.comparingInt(Entity::id))
        .toList();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Java</th></tr>
  <tr><td>Bounded generic</td><td><code>&lt;T: Entity&gt;</code></td><td><code>&lt;T extends Entity&gt;</code></td></tr>
  <tr><td>Absent-or-present</td><td><code>Option&lt;T&gt;</code></td><td><code>Optional&lt;T&gt;</code></td></tr>
  <tr><td>Filter + sort</td><td><code>iter().filter(p).collect()</code>, then <code>sort_by_key(f)</code></td><td><code>stream().filter(p).sorted(cmp).toList()</code></td></tr>
  <tr><td>Sort key</td><td><code>|t| t.id()</code></td><td><code>Comparator.comparingInt(Entity::id)</code></td></tr>
  <tr><td>Signal "missing"</td><td><code>panic!(...)</code> or <code>Err(...)</code></td><td>a typed <code>RuntimeException</code></td></tr>
</table>
<p>Two design choices echo the whole course. First, <code>get</code> and
<code>find</code> split the same lookup into a throwing path and an
<code>Optional</code> path — Java's answer to "should absence be an exception or
a value?" is to offer both and let the caller choose, whereas idiomatic Rust
nudges you toward always returning <code>Option&lt;T&gt;</code> (or
<code>Result&lt;T, E&gt;</code>) and reserving <code>panic!</code> for
programmer errors. Second, the bound <code>T extends Entity</code> is what lets
<code>where</code> sort by <code>Entity::id</code> and lets <code>add</code>
call <code>entity.id()</code>: the compiler knows every <code>T</code> has an
<code>id()</code>, so no cast is ever needed and the same class stores users
and products alike — much like a trait bound <code>T: Entity</code> does in
Rust.</p>
<p><code>NotFoundException</code> extends <code>RuntimeException</code>, so it is
<em>unchecked</em> — callers are not forced to declare or catch it, which keeps
the happy path clean while still giving failures a precise type to
<code>catch</code>. That is the idiomatic modern-Java choice for a repository
lookup, and it stands in contrast to Rust, where the equivalent failure would
typically show up as an <code>Err</code> variant in a
<code>Result&lt;T, NotFoundError&gt;</code> that the compiler forces the caller
to handle, rather than an exception the caller can silently ignore.</p>`,
