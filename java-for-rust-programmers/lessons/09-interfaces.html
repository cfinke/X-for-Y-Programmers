const LESSON = {
  number: 9,
  title: "Interfaces",

  intro: `
<p>You already think in traits. In Rust, a <code>trait</code> is a
<em>nominal</em> contract — a type only satisfies it if you write an explicit
<code>impl Shape for MyType</code> block; the shape alone isn't enough. Java
interfaces work the same way: nominal, and a class only satisfies one if it
explicitly says <code>implements</code>. The vocabulary differs, but the shape
of the idea should feel familiar.</p>
<table>
  <tr><th>Rust</th><th>Java</th></tr>
  <tr><td><code>trait Shape { fn area(&amp;self) -&gt; f64; }</code></td><td><code>interface Shape { double area(); }</code></td></tr>
  <tr><td>nominal — must write <code>impl Shape for T</code></td><td>nominal — must write <code>implements Shape</code></td></tr>
  <tr><td>a trait method can carry a default body</td><td><code>default</code> methods carry a body</td></tr>
  <tr><td><code>impl A for C</code> and <code>impl B for C</code></td><td><code>class C implements A, B</code></td></tr>
</table>
<p>Two Java specifics worth internalizing. First, an interface method with no
body is implicitly <code>public abstract</code>; the implementing class must
mark its version <code>public</code> — Rust doesn't need this ceremony, since
an <code>impl</code> block is already scoped to the trait it's filling in.
Second, a <code>default</code> method lets the interface ship a real
implementation, the same trick Rust's own default trait methods use (think
<code>Iterator::count</code>) — every implementer gets it for free unless it
overrides. As in Rust, the payoff is <em>programming to the interface</em>:
declare variables and parameters as the interface type and let the concrete
class vary underneath.</p>`,

  rust: `trait Shape {
    fn area(&self) -> f64;

    fn describe(&self) -> String {
        format!("A shape with area {}", self.area())
    }
}

struct Rectangle {
    width: f64,
    height: f64,
}

impl Shape for Rectangle {
    fn area(&self) -> f64 {
        self.width * self.height
    }
}

fn main() {
    let s: Box<dyn Shape> = Box::new(Rectangle { width: 3.0, height: 4.0 });
    println!("{}", s.area()); // 12
}`,

  task: `
<p>Model shapes behind an interface, then program to that interface.</p>
<ol>
  <li>Declare an interface <code>Shape</code> with an abstract method
      <code>double area()</code> and a <code>default</code> method
      <code>String describe()</code> that returns
      <code>"A shape with area " + area()</code>.</li>
  <li>Declare an interface <code>Named</code> with a method
      <code>String name()</code>.</li>
  <li><code>Rectangle</code> implements <code>Shape</code> (constructor takes
      <code>width</code> and <code>height</code>).</li>
  <li><code>Circle</code> implements <em>both</em> <code>Shape</code> and
      <code>Named</code> (constructor takes <code>radius</code>;
      <code>name()</code> returns <code>"circle"</code>).</li>
  <li>Remember: methods that satisfy an interface must be declared
      <code>public</code>.</li>
</ol>`,

  starter: `interface Shape {
  double area();

  default String describe() {
    return ""; // TODO: use area()
  }
}

interface Named {
  String name();
}

class Rectangle implements Shape {
  Rectangle(double width, double height) {
    // TODO: store the dimensions
  }

  public double area() {
    return 0; // TODO
  }
}

class Circle implements Shape, Named {
  Circle(double radius) {
    // TODO: store the radius
  }

  public double area() {
    return 0; // TODO
  }

  public String name() {
    return ""; // TODO
  }
}
`,

  requirements: [
    { pattern: /interface\s+Shape/, message: "Declare an interface named Shape" },
    { pattern: /default\s+String\s+describe\s*\(/, message: "Give Shape a default describe() method" },
    { pattern: /class\s+Circle\s+implements\s+Shape\s*,\s*Named/, message: "Circle must implement both Shape and Named" },
  ],

  tests: [
    { name: "Rectangle area via the Shape type is 12.0", code: "      Shape r = new Rectangle(3, 4);\n      expect_eq(r.area(), 12.0);" },
    { name: "default describe() reports the area", code: "      Shape r = new Rectangle(3, 4);\n      expect_eq(r.describe(), \"A shape with area 12.0\");" },
    { name: "Circle area via the Shape type is about PI*r^2", code: "      Shape c = new Circle(2);\n      expect_true(Math.abs(c.area() - Math.PI * 4) < 1e-9);" },
    { name: "Circle satisfies Named", code: "      Named n = new Circle(2);\n      expect_eq(n.name(), \"circle\");" },
    { name: "program to the interface: sum a List<Shape>", code: "      List<Shape> shapes = List.of(new Rectangle(2, 3), new Rectangle(4, 5), new Circle(0));\n      double total = shapes.stream().mapToDouble(Shape::area).sum();\n      expect_eq(total, 26.0);" },
  ],

  solution: `interface Shape {
  double area();

  default String describe() {
    return "A shape with area " + area();
  }
}

interface Named {
  String name();
}

class Rectangle implements Shape {
  private final double width;
  private final double height;

  Rectangle(double width, double height) {
    this.width = width;
    this.height = height;
  }

  public double area() {
    return width * height;
  }
}

class Circle implements Shape, Named {
  private final double radius;

  Circle(double radius) {
    this.radius = radius;
  }

  public double area() {
    return Math.PI * radius * radius;
  }

  public String name() {
    return "circle";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Java</th></tr>
  <tr><td>Satisfy a contract</td><td><code>impl Shape for T</code> (explicit)</td><td><code>implements Shape</code> (explicit)</td></tr>
  <tr><td>Abstract method</td><td><code>fn area(&amp;self) -&gt; f64;</code></td><td><code>double area();</code></td></tr>
  <tr><td>Method with a body</td><td>default method in the trait</td><td><code>default</code> method in the interface</td></tr>
  <tr><td>Multiple contracts</td><td><code>impl A for C</code>, <code>impl B for C</code></td><td><code>implements A, B</code></td></tr>
  <tr><td>Implementer visibility</td><td>n/a</td><td>must be <code>public</code></td></tr>
</table>
<p>Rust's traits are just as nominal as Java's interfaces, so the "cannot
accidentally satisfy a contract" guarantee you already rely on carries
straight over — the compiler catches a missing <code>implements</code>
immediately. <code>default</code> methods are how the standard library
evolves without breaking implementers (<code>List</code> gained
<code>sort</code>, <code>Iterable</code> gained <code>forEach</code>), the
same trick Rust leans on for defaulted trait methods. The one real wrinkle:
a Java reference is polymorphic by default, so a <code>Shape</code> variable
just holds whatever object it holds; Rust makes you ask for that explicitly
with a trait object (<code>Box&lt;dyn Shape&gt;</code>, <code>&amp;dyn Shape</code>)
or generics (<code>impl Shape</code>), since a bare <code>Shape</code> isn't a
sized type the compiler can place directly on the stack.</p>`,
};
