  intro: `
<p>In Rust you reach for one workhorse per job: <code>Vec&lt;T&gt;</code>,
<code>HashSet&lt;T&gt;</code>, and <code>HashMap&lt;K, V&gt;</code>. Java has the
same three ideas, but they are <em>interfaces</em> — <code>List</code>,
<code>Set</code>, <code>Map</code> — each with concrete classes behind them
(<code>ArrayList</code>, <code>HashSet</code>, <code>HashMap</code>). You
program to the interface and pick the implementation when you create it.</p>
<table>
  <tr><th>Rust</th><th>Java</th></tr>
  <tr><td><code>let xs: Vec&lt;i32&gt; = vec![1, 2];</code></td><td><code>List&lt;Integer&gt; xs = new ArrayList&lt;&gt;(List.of(1, 2));</code></td></tr>
  <tr><td><code>HashSet::&lt;i32&gt;::new()</code></td><td><code>new HashSet&lt;Integer&gt;()</code></td></tr>
  <tr><td><code>HashMap::&lt;String, i32&gt;::new()</code></td><td><code>new HashMap&lt;String, Integer&gt;()</code></td></tr>
  <tr><td><code>for x in &amp;xs</code></td><td><code>for (var x : xs)</code></td></tr>
  <tr><td><code>xs.sort_by(|a, b| a.cmp(b))</code></td><td><code>xs.sort(Comparator.naturalOrder())</code></td></tr>
</table>
<p>The shapes rhyme, but the mechanics differ. Rust's <code>sort_by</code> takes a
raw <code>Fn(&amp;T, &amp;T) -&gt; Ordering</code> closure that you compose by hand
with <code>Ordering::then</code> or <code>.then_with(...)</code>. Java gives you a
<code>Comparator&lt;T&gt;</code> <em>builder</em> instead:
<code>Comparator.comparing(Person::name)</code> makes a comparator from a key
extractor, <code>.thenComparing(...)</code> adds a tiebreaker, and
<code>.reversed()</code> flips the direction — no closures to write by hand, just
methods to chain. <code>List.sort</code> (or the static
<code>Collections.sort</code>) sorts in place, just like <code>sort_by</code> does
on a <code>Vec</code>.</p>`,

  solution: `record Person(String name, int age) {}

class Roster {
  static List<String> names(List<Person> people) {
    List<String> result = new ArrayList<>();
    for (var p : people) {
      result.add(p.name());
    }
    return result;
  }

  static Set<Integer> uniqueAges(List<Person> people) {
    Set<Integer> ages = new HashSet<>();
    for (var p : people) {
      ages.add(p.age());
    }
    return ages;
  }

  static Map<String, Integer> ageByName(List<Person> people) {
    Map<String, Integer> map = new HashMap<>();
    for (var p : people) {
      map.put(p.name(), p.age());
    }
    return map;
  }

  static List<Person> sortedByAgeThenName(List<Person> people) {
    List<Person> copy = new ArrayList<>(people);
    copy.sort(Comparator.comparingInt(Person::age).thenComparing(Person::name));
    return copy;
  }

  static List<Person> sortedByNameDesc(List<Person> people) {
    List<Person> copy = new ArrayList<>(people);
    copy.sort(Comparator.comparing(Person::name).reversed());
    return copy;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Java</th></tr>
  <tr><td>Ordered list</td><td><code>Vec&lt;T&gt;</code></td><td><code>List&lt;T&gt;</code> (<code>ArrayList</code>)</td></tr>
  <tr><td>Unique set</td><td><code>HashSet&lt;T&gt;</code></td><td><code>Set&lt;T&gt;</code> (<code>HashSet</code>)</td></tr>
  <tr><td>Key/value map</td><td><code>HashMap&lt;K, V&gt;</code></td><td><code>Map&lt;K, V&gt;</code> (<code>HashMap</code>)</td></tr>
  <tr><td>Transform</td><td><code>xs.iter().map(f).collect()</code></td><td><code>xs.stream().map(f).toList()</code> or a loop</td></tr>
  <tr><td>Sort by key</td><td><code>xs.sort_by_key(|p| p.age)</code></td><td><code>xs.sort(Comparator.comparingInt(P::age))</code></td></tr>
  <tr><td>Tiebreak</td><td><code>.then_with(|| a.name.cmp(&amp;b.name))</code></td><td><code>.thenComparing(P::name)</code></td></tr>
  <tr><td>Descending</td><td><code>xs.sort_by(|a, b| b.age.cmp(&amp;a.age))</code></td><td><code>.reversed()</code> / <code>Comparator.reverseOrder()</code></td></tr>
</table>
<p>Two gotchas for a Rust refugee. First, <code>List.of(...)</code>,
<code>Set.of(...)</code>, and <code>Map.of(...)</code> return <em>immutable</em>
collections — calling <code>.add</code> or <code>.sort</code> on them throws
<code>UnsupportedOperationException</code> at runtime, with none of the
compile-time protection you get from Rust's mutability rules. Wrap them in
<code>new ArrayList&lt;&gt;(...)</code> when you need to mutate, which is exactly
why the sort methods copy first. Second, <code>List.sort</code> mutates in place
and returns <code>void</code> — same as Rust's <code>sort_by</code> /
<code>sort_by_key</code> on a <code>Vec</code> — so <code>list.sort(cmp)</code> is
a statement, not something you chain off of the way you chain iterator
adapters.</p>`,
