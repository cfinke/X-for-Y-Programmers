const LESSON = {
  number: 16,
  title: "Exceptions & Error Handling",

  intro: `
<p>JavaScript's <code>try/catch/finally</code> maps directly onto Ruby's
<code>begin/rescue/ensure</code> — but Ruby's version fixes the part you've
been hand-rolling for years. A JS <code>catch</code> grabs <em>everything</em>,
so you write the <code>instanceof</code> dance to sort out which error you
actually meant to handle. Ruby types the rescue itself:
<code>rescue ArgumentError =&gt; e</code> catches only
<code>ArgumentError</code> (and its subclasses) and lets everything else keep
flying. Raising is symmetrical: <code>raise ArgumentError, "msg"</code> names
the class right at the throw site.</p>
<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td><code>try { ... }</code></td><td><code>begin ... end</code></td></tr>
  <tr><td><code>catch (e) { if (e instanceof RangeError) ... }</code></td><td><code>rescue RangeError =&gt; e</code> (typed at the rescue)</td></tr>
  <tr><td><code>finally { ... }</code></td><td><code>ensure ... </code></td></tr>
  <tr><td><code>throw new Error("msg")</code></td><td><code>raise ArgumentError, "msg"</code></td></tr>
  <tr><td><code>class ParseError extends Error {}</code></td><td><code>class ParseError &lt; StandardError; end</code></td></tr>
</table>
<p>Two idioms with no JS equivalent. First, a whole method body can be a
try block: write your code, then <code>rescue</code> at the same level as
<code>def</code> — no <code>begin</code> needed. Second, a <em>bare</em>
<code>rescue</code> (no class named) catches <code>StandardError</code> and
its descendants only — not <code>Exception</code>, the root. System-level
things like out-of-memory or a typo'd constant sail past it, which is why
Ruby code rarely suffers the "swallowed everything in a catch" bug. Custom
errors are one line: subclass <code>StandardError</code> and you're done —
no <code>this.name = ...</code>, no prototype fixups.</p>`,

  javascript: `function parseAge(s) {
  if (!/^\\d+$/.test(s.trim())) {
    throw new Error(\`not a number: \${s}\`);
  }
  return parseInt(s, 10);
}

function safeParseAge(s, fallback) {
  try {
    return parseAge(s);
  } catch (e) {
    if (e instanceof RangeError) throw e; // the instanceof dance
    return fallback;
  } finally {
    // cleanup would go here
  }
}

class EmptyCartError extends Error {
  constructor(msg) { super(msg); this.name = "EmptyCartError"; }
}`,

  task: `
<p>Port the error handling to Ruby:</p>
<ol>
  <li><code>parse_age(s)</code> — <code>raise ArgumentError, "..."</code>
      unless <code>s.strip.match?(/\\A\\d+\\z/)</code> (Ruby anchors:
      <code>\\A</code>/<code>\\z</code>, not <code>^</code>/<code>$</code>);
      otherwise return <code>s.to_i</code>.</li>
  <li><code>safe_parse_age(s, default)</code> — call <code>parse_age(s)</code>
      and return <code>default</code> on <code>ArgumentError</code>. Use the
      def-level rescue: no <code>begin</code>, just
      <code>rescue ArgumentError</code> aligned with the method body.</li>
  <li>Define <code>class EmptyCartError &lt; StandardError</code>, then
      <code>checkout(items)</code> — raise <code>EmptyCartError</code> when
      <code>items.empty?</code>, otherwise return the sum of each item's
      <code>:price</code> (items are hashes like
      <code>{ price: 500 }</code>).</li>
</ol>`,

  starter: `# 1. parse_age: raise ArgumentError unless s.strip.match?(/\\A\\d+\\z/)
def parse_age(s)
  raise NotImplementedError, "TODO: raise ArgumentError for non-digits, else s.to_i"
end

# 2. safe_parse_age: def-level rescue — no begin/end needed.
def safe_parse_age(s, default)
  raise NotImplementedError, "TODO: parse_age(s), rescuing ArgumentError to default"
end

# 3. A custom error is one line, then use it in checkout.
class EmptyCartError < StandardError
end

def checkout(items)
  raise NotImplementedError, "TODO: raise EmptyCartError if empty, else sum the prices"
end
`,

  requirements: [
    { pattern: /rescue\s+\w*Error/, message: "Rescue a specific error class (rescue ArgumentError) — no instanceof dance" },
    { pattern: /raise\s+/, message: "Raise an error with raise" },
    { pattern: /<\s*StandardError/, message: "Subclass StandardError for the custom error" },
    { pattern: /match\?|to_i/, message: "Validate with match? and convert with to_i" },
  ],

  tests: [
    { name: 'parse_age("42") returns the Integer 42',
      code: '  expect_eq(parse_age("42"), 42)\n  expect_eq(parse_age(" 7 "), 7)' },
    { name: 'parse_age("abc") raises ArgumentError',
      code: '  begin\n    parse_age("abc")\n    raise "did not raise"\n  rescue ArgumentError\n  end' },
    { name: 'safe_parse_age("abc", 18) falls back to 18',
      code: '  expect_eq(safe_parse_age("abc", 18), 18)' },
    { name: 'safe_parse_age("30", 0) parses normally',
      code: '  expect_eq(safe_parse_age("30", 0), 30)' },
    { name: "checkout([]) raises EmptyCartError",
      code: '  begin\n    checkout([])\n    raise "did not raise"\n  rescue EmptyCartError\n  end' },
    { name: "checkout sums the prices of a non-empty cart",
      code: '  expect_eq(checkout([{ price: 500 }, { price: 250 }]), 750)' },
  ],

  solution: `def parse_age(s)
  raise ArgumentError, "not a number: #{s.inspect}" unless s.strip.match?(/\\A\\d+\\z/)

  s.to_i
end

def safe_parse_age(s, default)
  parse_age(s)
rescue ArgumentError
  default
end

class EmptyCartError < StandardError
end

def checkout(items)
  raise EmptyCartError, "cart is empty" if items.empty?

  items.sum { |item| item[:price] }
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Try / catch / finally</td><td><code>try/catch/finally</code></td><td><code>begin/rescue/ensure/end</code></td></tr>
  <tr><td>Catch one error type</td><td><code>catch</code> + <code>instanceof</code> check</td><td><code>rescue ArgumentError =&gt; e</code></td></tr>
  <tr><td>Throw</td><td><code>throw new Error("msg")</code></td><td><code>raise ArgumentError, "msg"</code></td></tr>
  <tr><td>Re-throw</td><td><code>throw e</code></td><td>bare <code>raise</code> inside a rescue</td></tr>
  <tr><td>Custom error</td><td><code>extends Error</code> + name fixup</td><td><code>class ParseError &lt; StandardError; end</code></td></tr>
  <tr><td>Whole-method try</td><td>wrap the body in <code>try</code></td><td>def-level <code>rescue</code>, no <code>begin</code></td></tr>
  <tr><td>Catch-all default</td><td><code>catch</code> takes everything</td><td>bare <code>rescue</code> = <code>StandardError</code> only</td></tr>
</table>
<p>The hierarchy is the safety net: <code>raise "msg"</code> with just a
string raises a <code>RuntimeError</code>, and a bare <code>rescue</code>
stops at <code>StandardError</code> — so <code>NoMemoryError</code>,
<code>SyntaxError</code>, and a <code>NotImplementedError</code> stub all
escape a lazy rescue instead of being silently eaten. Notice how
<code>safe_parse_age</code> reads in the solution: the happy path is the
method body, the failure path hangs off the <code>rescue</code>, and the
rescued value (<code>default</code>) is just the last expression — implicit
return works there too.</p>`,
};
