  number: 6,
  title: "Nil & Safe Navigation",

  intro: `
<p>JavaScript gives you <em>two</em> flavors of absence — <code>null</code>
(deliberate) and <code>undefined</code> (accidental) — and a career's worth of
bugs at the seam between them. Ruby has exactly one: <code>nil</code>. A hash
miss is <code>nil</code>, a missing return value is <code>nil</code>, an
unset default is <code>nil</code>. One absence, one check:
<code>x.nil?</code> (and yes, <code>nil</code> is an object that answers
methods — more on that next lesson).</p>
<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td><code>null</code> and <code>undefined</code></td><td><code>nil</code> (just one)</td></tr>
  <tr><td><code>user?.address?.city</code></td><td><code>user&amp;.address&amp;.city</code></td></tr>
  <tr><td><code>x ?? fallback</code> vs <code>x || fallback</code></td><td><code>x || fallback</code> (always safe)</td></tr>
  <tr><td><code>x ??= fallback</code></td><td><code>x ||= fallback</code></td></tr>
  <tr><td>falsy: <code>false, 0, "", null, undefined, NaN</code></td><td>falsy: <code>nil</code> and <code>false</code>. That's it.</td></tr>
</table>
<p>Optional chaining survives the trip almost unchanged — <code>?.</code>
becomes <code>&amp;.</code> (the "lonely operator": a person sitting alone,
staring at a dot). But here is the big relief: in Ruby <strong>only
<code>nil</code> and <code>false</code> are falsy</strong>. <code>0</code>,
<code>""</code>, and <code>[]</code> are all truthy. So <code>||</code> is
finally safe as a default operator — the whole <code>??</code>-vs-<code>||</code>
anxiety ("what if the value is legitimately <code>0</code>?") simply doesn't
exist. And <code>x ||= expensive</code> is the idiom for memoized defaults:
assign only if <code>x</code> is <code>nil</code> (or <code>false</code>).</p>`,

  javascript: `function getCity(user) {
  return user?.address?.city ?? "Unknown";
}

function pick(obj, key, fallback) {
  // Must be ?? here. With || a stored 0 or ""
  // would wrongly fall through to the fallback.
  return obj[key] ?? fallback;
}

function firstOrDefault(arr, fallback) {
  return arr?.[0] ?? fallback;
}

let cache;
function config() {
  cache ??= loadConfig(); // and ??= vs ||=, too
  return cache;
}`,

  task: `
<p>The starter defines <code>Address</code> (with a <code>city</code>) and
<code>User</code> (whose <code>address</code> defaults to <code>nil</code>).
Write three methods:</p>
<ol>
  <li><code>get_city(user)</code> — return the user's address's city, or

      One line: <code>user&amp;.address&amp;.city || "Unknown"</code>.</li>
  <li><code>pick(hash, key, default)</code> — return <code>hash[key]</code>,
      falling back to <code>default</code> when the key is missing. Plain
      <code>||</code> is correct here: a stored <code>0</code> is truthy in
      Ruby, so it will <em>not</em> fall through (there's a test proving

  <li><code>first_or_default(arr, default)</code> — the first element of

</ol>`,

`,

  requirements: [
    { pattern: /&\./, message: "Use the safe navigation operator &. (Ruby's ?.)" },
    { pattern: /\|\|/, message: "Use || to supply the default values" },
    { pattern: /nil/, message: "Keep nil in play (the User address defaults to nil)" },
  ],

  tests: [
    { name: 'get_city(User.new(Address.new("Oslo"))) returns "Oslo"',
      code: '  expect_eq(get_city(User.new(Address.new("Oslo"))), "Oslo")' },
    { name: 'get_city(User.new) returns "Unknown" (address is nil)',
      code: '  expect_eq(get_city(User.new), "Unknown")' },
    { name: 'get_city(nil) returns "Unknown" (whole user is nil)',
      code: '  expect_eq(get_city(nil), "Unknown")' },
    { name: "pick({ count: 0 }, :count, 5) returns 0 — 0 is truthy in Ruby!",
      code: "  expect_eq(pick({ count: 0 }, :count, 5), 0)" },
    { name: 'pick({}, :count, 5) returns 5; pick({ name: "Ada" }, :name, "?") returns "Ada"',
      code: '  expect_eq(pick({}, :count, 5), 5)\n  expect_eq(pick({ name: "Ada" }, :name, "?"), "Ada")' },
    { name: 'first_or_default([], "none") returns "none"; first_or_default([7, 8], 0) returns 7',
      code: '  expect_eq(first_or_default([], "none"), "none")\n  expect_eq(first_or_default([7, 8], 0), 7)\n  expect_eq(first_or_default(nil, "none"), "none")' },

  solution: `class Address
  attr_reader :city

  def initialize(city)
    @city = city
  end
end

class User
  attr_reader :address

  def initialize(address = nil)
    @address = address
  end
end

def get_city(user)
  user&.address&.city || "Unknown"
end

def pick(hash, key, default)
  hash[key] || default
end

def first_or_default(arr, default)
  arr&.first || default
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Absence</td><td><code>null</code> / <code>undefined</code></td><td><code>nil</code></td></tr>
  <tr><td>Optional chaining</td><td><code>a?.b?.c</code></td><td><code>a&amp;.b&amp;.c</code></td></tr>
  <tr><td>Default value</td><td><code>x ?? d</code> (⚠ <code>||</code> eats <code>0</code>, <code>""</code>)</td><td><code>x || d</code> (safe: only <code>nil</code>/<code>false</code> are falsy)</td></tr>
  <tr><td>Default assignment</td><td><code>x ??= d</code></td><td><code>x ||= d</code></td></tr>
  <tr><td>Check for absence</td><td><code>x === null</code>, <code>x == null</code>…</td><td><code>x.nil?</code></td></tr>
  <tr><td>Hash miss</td><td><code>obj.k</code> → <code>undefined</code></td><td><code>hash[:k]</code> → <code>nil</code></td></tr>
</table>
<p>The pick test is the moment to internalize: in JavaScript,
<code>obj[key] || fallback</code> is a lurking bug because <code>0</code> and
<code>""</code> are falsy — that's exactly why <code>??</code> was invented.
In Ruby, <code>hash[key] || default</code> only falls through on
<code>nil</code> (or a stored <code>false</code>), so it <em>is</em> the
idiom. And <code>@x ||= compute</code> is how Rubyists memoize to this day —
one operator, no anxiety.</p>`,
};
