<p>No new concepts — this is the course's vocabulary doing real work. You'll

<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td><code>items.reduce((s, i) =&gt; s + ..., 0)</code></td><td><code>items.sum { |i| ... }</code></td></tr>
  <tr><td><code>items.find(...)</code> → <code>undefined</code> on miss</td><td><code>items.find { ... }</code> → <code>nil</code> on miss</td></tr>
  <tr><td><code>items.filter(...).map(...)</code></td><td><code>items.select { }.map { }</code></td></tr>
  <tr><td><code>{ ...item, count: n }</code> to avoid mutation</td><td><code>Item.new(i.name, i.price_cents, i.count + n)</code></td></tr>
</table>
<p>One semantic carries over from JavaScript unchanged, and the exercise
tests it: arrays and objects are <strong>references</strong>. If
<code>restock</code> reached in and did <code>item.count += 1</code>, every
other holder of that array would see the change — the same spooky action
you guard against with spread syntax in JS. So do the Ruby equivalent of

building a <em>new</em> <code>Item</code> for the one that changes and
passing the others through untouched. The tests check the originals
afterward.</p>`,

  javascript: `class Item {
  constructor(name, priceCents, count) {
    this.name = name;
    this.priceCents = priceCents;
    this.count = count;
  }
}

const totalValue = (items) =>
  items.reduce((sum, i) => sum + i.priceCents * i.count, 0);

const findItem = (items, name) =>
  items.find((i) => i.name === name);        // undefined on miss

const restock = (items, name, amount) =>
  items.map((i) =>                           // new array, new object —
    i.name === name                          // never mutate shared state
      ? new Item(i.name, i.priceCents, i.count + amount)
      : i);

const namesInStock = (items) =>
  items.filter((i) => i.count > 0).map((i) => i.name);`,

  solution: `class Item
  attr_reader :name, :price_cents, :count

  def initialize(name, price_cents, count)
    @name = name
    @price_cents = price_cents
    @count = count
  end
end

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }
end

def restock(items, name, amount)
  items.map do |i|
    i.name == name ? Item.new(i.name, i.price_cents, i.count + amount) : i
  end
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map { |i| i.name }
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Sum with a projection</td><td><code>reduce((s, i) =&gt; s + f(i), 0)</code></td><td><code>sum { |i| f(i) }</code></td></tr>
  <tr><td>First match</td><td><code>find</code> → <code>undefined</code></td><td><code>find</code> → <code>nil</code></td></tr>
  <tr><td>Filter + project</td><td><code>filter().map()</code></td><td><code>select { }.map { }</code></td></tr>
  <tr><td>Non-mutating update</td><td><code>map</code> + <code>{ ...i, count }</code></td><td><code>map</code> + <code>Item.new(...)</code></td></tr>
  <tr><td>Reference semantics</td><td>objects/arrays are references</td><td>same! — copy on write is on you</td></tr>
  <tr><td>Block shorthand</td><td>—</td><td><code>map(&amp;:name)</code> when the block just calls a method</td></tr>
</table>
<p>Read the finished solution top to bottom: <code>snake_case</code> names,
<code>def ... end</code>, every method body a single expression whose value
is the implicit return, blocks where JS reaches for arrow functions, and
<code>nil</code> where JS says <code>undefined</code>. That
<code>select { }.map { }</code> chain could also be written
<code>select { |i| i.count &gt; 0 }.map(&amp;:name)</code> — the
<code>&amp;:symbol</code> shorthand from lesson 11 — which is how you'll
see it in the wild. That's the course: the semantics you already knew from
JavaScript, wearing considerably less punctuation.</p>`,
