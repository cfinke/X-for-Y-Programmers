const LESSON = {
  number: 19,
  title: "Working with JSON",

  intro: `
<p>JSON is JavaScript's home turf, so the Ruby translation is short —
<code>require "json"</code> once, then serializing flips direction:
instead of the static <code>JSON.stringify(data)</code>, the method lives
<em>on the data</em> — <code>data.to_json</code> — like everything else in
Ruby. Parsing keeps the exact same name: <code>JSON.parse(s)</code>.</p>
<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>(built in)</td><td><code>require "json"</code></td></tr>
  <tr><td><code>JSON.stringify(data)</code></td><td><code>data.to_json</code> (a method on the data)</td></tr>
  <tr><td><code>JSON.parse(s)</code></td><td><code>JSON.parse(s)</code> — but keys come back as <em>strings</em></td></tr>
  <tr><td><code>parsed.name</code></td><td><code>parsed[:name]</code> after <code>symbolize_names: true</code></td></tr>
  <tr><td><code>obj?.a?.b</code></td><td><code>data.dig(:a, :b)</code></td></tr>
  <tr><td><code>catch (e)</code> around parse</td><td><code>rescue JSON::ParserError</code></td></tr>
</table>
<p>The one gotcha worth tattooing somewhere: <code>JSON.parse</code> returns
hashes with <strong>string keys</strong> — <code>data["name"]</code>, not
<code>data[:name]</code>, which silently gives <code>nil</code>. Pass
<code>symbolize_names: true</code> to get the symbol keys idiomatic Ruby
expects. For nested data, <code>data.dig(:a, :b)</code> is your optional
chain — <code>nil</code> at any missing step, no exception. And malformed
input doesn't return <code>null</code> or throw a generic
<code>SyntaxError</code>: it raises <code>JSON::ParserError</code>, a
specific class you rescue by name, exactly like lesson 16.</p>`,

  javascript: `const data = { name: "Ada", langs: ["Ruby", "JS"] };

const s = JSON.stringify(data);   // static method, takes the data
const back = JSON.parse(s);       // keys are just... keys
back.name;                        // "Ada"
back?.profile?.city;              // optional chaining for nesting

function parseUser(json) {
  const u = JSON.parse(json);
  return { name: u.name ?? "unknown", age: u.age ?? 0 };
}

function safeParse(json) {
  try {
    return JSON.parse(json);
  } catch (e) {                   // SyntaxError, caught generically
    return {};
  }
}`,

  task: `
<p>Port the JSON helpers (the starter already has
<code>require "json"</code>):</p>
<ol>
  <li><code>to_json_string(data)</code> — one line: call
      <code>.to_json</code> on the data itself.</li>
  <li><code>parse_user(json)</code> — parse with
      <code>JSON.parse(json, symbolize_names: true)</code>, then return
      <code>{ name: ..., age: ... }</code> using
      <code>fetch(:name, "unknown")</code> and <code>fetch(:age, 0)</code>
      for the defaults.</li>
  <li><code>pluck_names(json)</code> — parse an array of user objects
      (symbol keys again) and <code>map</code> out each <code>[:name]</code>.</li>
  <li><code>safe_parse(json)</code> — <code>JSON.parse(json)</code>, but
      return <code>{}</code> on <code>JSON::ParserError</code> (def-level
      rescue from lesson 16 — and note the good parse keeps its
      string keys).</li>
</ol>`,

  starter: `require "json"

# 1. Serializing is a method ON the data.
def to_json_string(data)
  raise NotImplementedError, "TODO: data.to_json"
end

# 2. symbolize_names: true, then fetch with defaults.
def parse_user(json)
  raise NotImplementedError, "TODO: parse, then fetch :name / :age with defaults"
end

# 3. Parse the array, map out the names.
def pluck_names(json)
  raise NotImplementedError, "TODO: JSON.parse + map"
end

# 4. rescue JSON::ParserError -> {} (def-level rescue).
def safe_parse(json)
  raise NotImplementedError, "TODO: parse, rescuing JSON::ParserError to {}"
end
`,

  requirements: [
    { pattern: /require\s+["']json["']/, message: 'Load the library with require "json"' },
    { pattern: /to_json/, message: "Serialize with .to_json on the data" },
    { pattern: /symbolize_names:\s*true/, message: "Parse with symbolize_names: true to get symbol keys" },
    { pattern: /JSON::ParserError|rescue/, message: "Rescue JSON::ParserError in safe_parse" },
  ],

  tests: [
    { name: "to_json_string serializes a hash",
      code: '  expect_eq(to_json_string({ name: "Ada", age: 36 }), %q({"name":"Ada","age":36}))' },
    { name: "parse_user reads name and age as symbol keys",
      code: '  expect_eq(parse_user(%q({"name":"Ada","age":36})), { name: "Ada", age: 36 })' },
    { name: 'parse_user("{}") falls back to "unknown" / 0',
      code: '  expect_eq(parse_user("{}"), { name: "unknown", age: 0 })' },
    { name: "pluck_names maps over the parsed array",
      code: '  expect_eq(pluck_names(%q([{"name":"Ada"},{"name":"Grace"}])), ["Ada", "Grace"])' },
    { name: "safe_parse returns {} for malformed JSON",
      code: '  expect_eq(safe_parse("not json at all"), {})' },
    { name: "safe_parse passes good JSON through (string keys!)",
      code: '  expect_eq(safe_parse(%q({"a":1})), { "a" => 1 })' },
  ],

  solution: `require "json"

def to_json_string(data)
  data.to_json
end

def parse_user(json)
  data = JSON.parse(json, symbolize_names: true)
  { name: data.fetch(:name, "unknown"), age: data.fetch(:age, 0) }
end

def pluck_names(json)
  users = JSON.parse(json, symbolize_names: true)
  users.map { |u| u[:name] }
end

def safe_parse(json)
  JSON.parse(json)
rescue JSON::ParserError
  {}
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Setup</td><td>built in</td><td><code>require "json"</code></td></tr>
  <tr><td>Serialize</td><td><code>JSON.stringify(data)</code></td><td><code>data.to_json</code></td></tr>
  <tr><td>Parse</td><td><code>JSON.parse(s)</code></td><td><code>JSON.parse(s)</code> — string keys by default</td></tr>
  <tr><td>Symbol keys</td><td>n/a</td><td><code>JSON.parse(s, symbolize_names: true)</code></td></tr>
  <tr><td>Missing key default</td><td><code>u.name ?? "unknown"</code></td><td><code>u.fetch(:name, "unknown")</code></td></tr>
  <tr><td>Nested lookup</td><td><code>obj?.a?.b</code></td><td><code>data.dig(:a, :b)</code></td></tr>
  <tr><td>Bad input</td><td><code>SyntaxError</code> (generic)</td><td><code>JSON::ParserError</code> (rescue by name)</td></tr>
</table>
<p>The string-keys default bites every JavaScript developer exactly once:
<code>JSON.parse(s)[:name]</code> is <code>nil</code>, no error, nothing —
because <code>"name"</code> and <code>:name</code> are different objects
(lesson 4). Make <code>symbolize_names: true</code> a reflex at the parse
boundary and the rest of your code stays in idiomatic symbol-land. Note
also how <code>safe_parse</code> reuses lesson 16 verbatim: a def-level
<code>rescue JSON::ParserError</code>, no <code>begin</code>, with
<code>{}</code> as the rescued last expression.</p>`,
};
