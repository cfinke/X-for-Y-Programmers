const LESSON = {
  number: 11,
  title: "Interfaces",

  intro: `
<p>Kotlin interfaces will feel familiar, but they do more than Go's. A Go
<code>interface</code> is a pure compile-time <em>method set</em> — it can
only declare method signatures, never implement them, and a type satisfies it
<em>implicitly</em> (no <code>implements</code> keyword; the type just needs
the right methods). A Kotlin interface is a real, named type you opt into with
a colon, and it can carry <strong>default method bodies</strong> and
<strong>property getters</strong> — the job a free function, or a Go struct
embedding a concrete helper, would do.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>type Shape interface { Area() float64 }</code></td><td><code>interface Shape { fun area(): Double }</code></td></tr>
  <tr><td>structural: no declaration needed, just the methods</td><td>nominal: <code>class C : Shape</code></td></tr>
  <tr><td>no fields in an interface</td><td><code>val name: String</code> (abstract)</td></tr>
  <tr><td>method body → needs a concrete type or free function</td><td><code>fun f() = …</code> right in the interface</td></tr>
  <tr><td>implements many interfaces just by having the methods</td><td><code>class C : A, B</code></td></tr>
</table>
<p>Because a Kotlin interface can hold behaviour, you can declare an abstract
<code>val</code>, a <code>val</code> with a default <code>get()</code>, and a
<code>fun</code> with a default body all in one place — then have each class
<code>override</code> only what it needs. And, as in Go, you should
<strong>program to the interface type</strong>: type your parameters and
variables as <code>Employee</code>, not <code>Engineer</code>.</p>`,

  go: `type Employee interface {
	Name() string
	BaseSalary() float64
	Bonus() float64
	// Go interfaces can't hold logic, so TotalPay/Summary
	// would have to live in a helper function.
}

type Engineer struct {
	name       string
	baseSalary float64
}

func (e Engineer) Name() string        { return e.name }
func (e Engineer) BaseSalary() float64 { return e.baseSalary }
func (e Engineer) Bonus() float64      { return e.baseSalary * 0.1 }

func totalPayroll(staff []Employee) float64 {
	sum := 0.0
	for _, e := range staff {
		sum += e.BaseSalary() + e.Bonus()
	}
	return sum
}`,

  task: `
<p>Build a small payroll model where the logic lives <em>in the interface</em>,
and the tests talk to everything through the interface type. No class or
<code>main</code> is needed — Kotlin allows top-level declarations.</p>
<ol>
  <li>Declare an <code>Employee</code> interface with two abstract properties
      <code>name: String</code> and <code>baseSalary: Double</code>, and an
      abstract method <code>fun bonus(): Double</code>.</li>
  <li>Give <code>Employee</code> a property <code>totalPay: Double</code> with a
      <strong>default getter</strong> returning
      <code>baseSalary + bonus()</code>, and a <strong>default method</strong>
      <code>fun summary(): String</code> returning
      <code>"$name earns $totalPay"</code>.</li>
  <li>Declare a second interface <code>Manager</code> with
      <code>fun teamSize(): Int</code>.</li>
  <li><code>class Engineer(name, baseSalary) : Employee</code> whose
      <code>bonus()</code> is 10% of <code>baseSalary</code>.</li>
  <li><code>class TeamLead(name, baseSalary, reports) : Employee, Manager</code>
      — <strong>implementing both interfaces</strong> — whose <code>bonus()</code>
      is <code>baseSalary * 0.2 + reports * 100.0</code> and whose
      <code>teamSize()</code> returns <code>reports</code>.</li>
  <li>Write <code>totalPayroll(staff: List&lt;Employee&gt;): Double</code> that
      sums <code>totalPay</code> across the list — programming to the interface.</li>
</ol>`,

  starter: `// 1 & 2. The Employee interface: abstract members, a default property getter,
//        and a default method. Fill in the two defaults.
interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = 0.0            // TODO: baseSalary + bonus()

    fun summary(): String = "" // TODO: "$name earns $totalPay"
}

// 3. A second interface.
interface Manager {
    fun teamSize(): Int
}

// 4. Engineer implements Employee.
class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = 0.0 // TODO: 10% of baseSalary
}

// 5. TeamLead implements BOTH Employee and Manager.
class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = 0.0 // TODO: baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = 0   // TODO: reports
}

// 6. Program to the interface type.
fun totalPayroll(staff: List<Employee>): Double = 0.0 // TODO
`,

  requirements: [
    { pattern: /interface\s+Employee\b/, message: "Declare an Employee interface" },
    { pattern: /fun\s+summary\s*\([^)]*\)\s*:\s*String\s*=/, message: "Give Employee a default summary() method with a body in the interface" },
    { pattern: /:\s*Employee\s*,\s*Manager/, message: "Have TeamLead implement both Employee and Manager" },
  ],

  tests: [
    { name: "Engineer.bonus() is 10% of base", code: "        expect_eq(Engineer(\"Ada\", 1000.0).bonus(), 100.0)" },
    { name: "totalPay via the Employee type uses the default getter", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.totalPay, 1100.0)" },
    { name: "default summary() reads \"Ada earns 1100.0\"", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.summary(), \"Ada earns 1100.0\")" },
    { name: "TeamLead satisfies Manager (teamSize)", code: "        val m: Manager = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(m.teamSize(), 3)" },
    { name: "TeamLead is also an Employee (totalPay)", code: "        val emp: Employee = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(emp.totalPay, 2700.0)" },
    { name: "totalPayroll sums via the interface", code: "        val staff: List<Employee> = listOf(Engineer(\"Ada\", 1000.0), TeamLead(\"Rob\", 2000.0, 3))\n        expect_eq(totalPayroll(staff), 3800.0)" },
  ],

  solution: `interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = baseSalary + bonus()

    fun summary(): String = "$name earns $totalPay"
}

interface Manager {
    fun teamSize(): Int
}

class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = baseSalary * 0.1
}

class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = reports
}

fun totalPayroll(staff: List<Employee>): Double = staff.sumOf { it.totalPay }
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Declare interface</td><td><code>type E interface { … }</code></td><td><code>interface E { … }</code></td></tr>
  <tr><td>Implement</td><td>(implicit — just define the methods)</td><td><code>class C : E</code></td></tr>
  <tr><td>Multiple interfaces</td><td>(implicit — have all the methods)</td><td><code>: A, B</code></td></tr>
  <tr><td>Abstract property</td><td>(no fields — use a method: <code>Name() string</code>)</td><td><code>val name: String</code></td></tr>
  <tr><td>Property with logic</td><td>(a method on the concrete type)</td><td><code>val p: T get() = …</code></td></tr>
  <tr><td>Default method body</td><td>(not allowed — needs a concrete type or free function)</td><td><code>fun f() = …</code> in the interface</td></tr>
  <tr><td>Override</td><td>(no keyword — just define the method)</td><td><code>override</code> keyword required</td></tr>
</table>
<p>The big shift from Go is that conformance is <strong>nominal</strong>: a
class only satisfies <code>Employee</code> if it says <code>: Employee</code>,
whereas Go's interfaces are satisfied implicitly by any type with the right
method set. In exchange you get real behaviour in the interface — a default
<code>get()</code> or <code>fun</code> body — so shared logic lives with the
contract instead of being copied into every struct's methods or hoisted into
a free function. Kotlin also requires the <code>override</code> keyword,
which catches typos that Go's implicit satisfaction would silently treat as
an unrelated new method rather than flagging a mismatch. When a class
implements two interfaces that both define the same default method, Kotlin
makes you resolve it explicitly with <code>super&lt;A&gt;.f()</code> — a
situation Go never runs into, since its interfaces never carry default
implementations to collide.</p>`,
};
