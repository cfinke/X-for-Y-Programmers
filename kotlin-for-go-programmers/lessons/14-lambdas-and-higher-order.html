  number: 14,
  title: "Lambdas & Higher-Order Functions",

  intro: `
<p>Functions are first-class in Kotlin, exactly as they are in Go: you can
store them in variables, pass them as arguments, and return them from other
functions. Kotlin's lambda syntax is more compact than Go's
<code>func(...) ... { ... }</code> literals, and it adds two conveniences Go
doesn't have: an implicit single-parameter name, <code>it</code>, and the
ability to move a trailing lambda argument outside the parentheses.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>func(n int) int { return n * 2 }</code></td><td><code>{ n: Int -> n * 2 }</code></td></tr>
  <tr><td>(no shorthand for one param)</td><td><code>{ it * 2 }</code></td></tr>
  <tr><td><code>f func(int) int</code></td><td><code>f: (Int) -> Int</code></td></tr>
  <tr><td>(no built-in map function)</td><td><code>list.map { it * 2 }</code></td></tr>
</table>
<p>A lambda is written with braces: <code>{ param -> body }</code>. When it takes a
single argument you can drop the parameter list entirely and refer to it as
<code>it</code>. The last expression in the block is its return value — there is no
<code>return</code> keyword inside a lambda, unlike a Go function literal, which
always needs an explicit <code>return</code>. A function <em>type</em> puts the
parameters in parentheses and the result after an arrow:
<code>(Int) -> Int</code>, playing the same role as Go's <code>func(int) int</code>.</p>
<p>The headline sugar: if a lambda is the <strong>last</strong> argument to a
function, it moves outside the parentheses — <code>list.map { it * 2 }</code>
instead of <code>list.map({ it * 2 })</code>. That "trailing lambda" is why so much
idiomatic Kotlin reads like it has built-in control structures — something Go,
with no closure-literal sugar, achieves only with an explicit <code>for</code>
loop.</p>`,

  go: `func applyTwice(x int, f func(int) int) int {
	return f(f(x))
}

func makeMultiplier(factor int) func(int) int {
	return func(n int) int {
		return n * factor
	}
}

func doubled(nums []int) []int {
	result := make([]int, len(nums))
	for i, n := range nums {
		result[i] = n * 2
	}
	return result // [2, 4, 6] for input [1, 2, 3]
}`,

  task: `
<p>Kotlin allows top-level declarations — no class or <code>main</code> needed.
Write four things:</p>
<ol>

  <li><code>makeMultiplier(factor: Int): (Int) -> Int</code> — returns a lambda

  <li><code>transform(nums: List&lt;Int&gt;, f: (Int) -> Int): List&lt;Int&gt;</code>

  <li><code>doubled(nums: List&lt;Int&gt;): List&lt;Int&gt;</code> — returns each
      element times two, written with a <strong>trailing lambda</strong> and the
      implicit <code>it</code>: <code>nums.map { it * 2 }</code>.</li>
</ol>`,

  requirements: [
    { pattern: /\(Int\)\s*->\s*Int/, message: "Use a function type: (Int) -> Int" },
    { pattern: /\.map\s*\{/, message: "Call .map with a trailing lambda: .map { ... }" },

  ],

  tests: [
    { name: "applyTwice(3) { it + 1 } is 5", code: "        expect_eq(applyTwice(3) { it + 1 }, 5)" },
    { name: "applyTwice(2) { it * it } is 16", code: "        expect_eq(applyTwice(2) { it * it }, 16)" },
    { name: "makeMultiplier(3)(5) is 15", code: "        val triple = makeMultiplier(3)\n        expect_eq(triple(5), 15)" },
    { name: "makeMultiplier(0)(9) is 0", code: "        expect_eq(makeMultiplier(0)(9), 0)" },
    { name: "transform squares each element", code: "        expect_eq(transform(listOf(1, 2, 3)) { it * it }, listOf(1, 4, 9))" },
    { name: "doubled doubles each element", code: "        expect_eq(doubled(listOf(1, 2, 3)), listOf(2, 4, 6))" },

  solution: `fun applyTwice(x: Int, f: (Int) -> Int): Int {
    return f(f(x))
}

fun makeMultiplier(factor: Int): (Int) -> Int {
    return { n -> n * factor }
}

fun transform(nums: List<Int>, f: (Int) -> Int): List<Int> {
    return nums.map(f)
}

fun doubled(nums: List<Int>): List<Int> {
    return nums.map { it * 2 }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Lambda</td><td><code>func(x int) int { return x + 1 }</code></td><td><code>{ x -> x + 1 }</code></td></tr>
  <tr><td>Implicit single param</td><td>(no equivalent)</td><td><code>{ it + 1 }</code></td></tr>
  <tr><td>Function type</td><td><code>func(int) int</code></td><td><code>(Int) -> Int</code></td></tr>
  <tr><td>Trailing lambda</td><td>(no equivalent)</td><td><code>list.map { … }</code></td></tr>
  <tr><td>Returning a function</td><td><code>func m() func(int) int</code></td><td><code>fun m(): (Int) -> Int = { … }</code></td></tr>
</table>
<p>Two footnotes worth remembering. First, a lambda has no <code>return</code> — its
value is the last expression; a bare <code>return</code> would try to leave the
enclosing function, whereas a Go function literal always needs an explicit
<code>return</code> statement to produce a value. Second, when a lambda is the
only argument you drop the parentheses completely
(<code>list.map { it * 2 }</code>), and when it is the last of several you keep
the others inside and move only the lambda out
(<code>list.fold(0) { acc, n -> acc + n }</code>). This is the same first-class
functions you know from Go, just with lighter syntax and no need to spell out
<code>func</code> and a parameter type every time.</p>`,
