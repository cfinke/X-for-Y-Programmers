  intro: `
<p>In Go there is one slice type, and whether something is treated as
read-only is purely a convention — nothing in the type system stops a caller
from mutating a slice you handed them. Kotlin splits the idea into <em>two
distinct types</em>: <code>List&lt;T&gt;</code> has no mutating methods at all,
while <code>MutableList&lt;T&gt;</code> adds <code>add</code>/<code>remove</code>. You
choose the capability by choosing the builder: <code>listOf(...)</code> gives a
read-only <code>List</code>, and <code>mutableListOf(...)</code> gives a
<code>MutableList</code>.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>xs := []int{1, 2, 3}</code></td><td><code>val xs = listOf(1, 2, 3)</code></td></tr>
  <tr><td><code>var ys []int</code></td><td><code>val ys = mutableListOf&lt;Int&gt;()</code></td></tr>
  <tr><td><code>ys = append(ys, 4)</code></td><td><code>ys.add(4)</code></td></tr>
  <tr><td><code>xs[0]</code>, <code>len(xs)</code></td><td><code>xs[0]</code>, <code>xs.size</code></td></tr>
  <tr><td><code>slices.Contains(xs, 2)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td><code>for i, x := range xs { xs[i] = x * 2 }</code></td><td><code>xs.map { it * 2 }</code></td></tr>
</table>
<p>Notice indexing (<code>xs[0]</code>) is identical, but <code>len(xs)</code>
becomes <code>.size</code>, membership needs a loop or <code>slices.Contains</code>
in Go but is the <code>in</code> operator in Kotlin, and Kotlin lambdas drop the
parameter list when there is a single argument — you refer to it as
<code>it</code>. <code>first()</code> and <code>last()</code> return the ends of
a list. Crucially, calling <code>.add()</code> on a plain <code>List</code> is a
<em>compile error</em>, not a silent no-op — the type system enforces
read-only, something Go's slices cannot do for you.</p>`,

nums := []int{}
nums = append(nums, 1)
nums = append(nums, 2)

func doubled(list []int) []int {
	result := make([]int, len(list))
	for i, x := range list {
		result[i] = x * 2
	}
	return result
}

func evens(list []int) []int {
	var result []int
	for _, x := range list {
		if x%2 == 0 {
			result = append(result, x)
		}
	}
	return result
}`,

  solution: `fun firstThree(): List<Int> {
    return listOf(1, 2, 3)
}

fun collect(n: Int): MutableList<Int> {
    val result = mutableListOf<Int>()
    for (i in 1..n) {
        result.add(i)
    }
    return result
}

fun at(list: List<Int>, i: Int): Int {
    return list[i]
}

fun count(list: List<Int>): Int {
    return list.size
}

fun has(list: List<Int>, x: Int): Boolean {
    return x in list
}

fun ends(list: List<Int>): List<Int> {
    return listOf(list.first(), list.last())
}

fun doubled(list: List<Int>): List<Int> {
    return list.map { it * 2 }
}

fun evens(list: List<Int>): List<Int> {
    return list.filter { it % 2 == 0 }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Read-only list</td><td>no equivalent — convention only</td><td><code>List&lt;Int&gt;</code></td></tr>
  <tr><td>Mutable list</td><td><code>[]int</code></td><td><code>MutableList&lt;Int&gt;</code></td></tr>
  <tr><td>Build</td><td><code>[]int{1, 2, 3}</code></td><td><code>listOf(1, 2, 3)</code></td></tr>
  <tr><td>Append</td><td><code>xs = append(xs, 4)</code></td><td><code>xs.add(4)</code></td></tr>
  <tr><td>Remove value</td><td><code>xs = slices.Delete(xs, i, i+1)</code></td><td><code>xs.remove(4)</code></td></tr>
  <tr><td>Length</td><td><code>len(xs)</code></td><td><code>xs.size</code></td></tr>
  <tr><td>Membership</td><td><code>slices.Contains(xs, 2)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td>Ends</td><td><code>xs[0]</code> / <code>xs[len(xs)-1]</code></td><td><code>xs.first()</code> / <code>xs.last()</code></td></tr>
  <tr><td>Transform</td><td>loop building a new slice</td><td><code>xs.map { it * 2 }</code></td></tr>
  <tr><td>Keep some</td><td>loop building a new slice</td><td><code>xs.filter { ... }</code></td></tr>
</table>
<p>A <code>MutableList</code> <em>is a</em> <code>List</code>, so you can pass one
anywhere a read-only <code>List</code> is expected — the receiver just cannot
mutate it. That is why <code>collect</code> returns a
<code>MutableList</code> yet compares equal to a <code>listOf(...)</code>:
equality is by contents. Both <code>map</code> and <code>filter</code> always
return a <em>new</em> read-only <code>List</code>, never mutating the source —
unlike Go, where <code>append</code> can sometimes mutate the underlying array
in place when there is spare capacity, a surprise Kotlin's design avoids
entirely. Reach for <code>listOf</code> by default and upgrade to
<code>mutableListOf</code> only when you genuinely need to grow or shrink the
collection in place.</p>`,
