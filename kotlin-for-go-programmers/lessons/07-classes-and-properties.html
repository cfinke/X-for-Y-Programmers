  title: "Classes & Properties",

  intro: `
<p>Kotlin classes will feel like a big step up from Go's structs-plus-methods
approach. The star of the show is the <em>primary constructor</em>: you
declare a class's parameters right after its name, and prefixing one with
<code>val</code> or <code>var</code> turns it into a property in the same breath.
No hand-written constructor function, no separate struct field list, no
<code>this.x = x</code> boilerplate.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>type P struct { Name string }</code></td><td><code>class P(val name: String)</code></td></tr>
  <tr><td>exported field, no setter (convention)</td><td><code>val</code> property</td></tr>
  <tr><td>exported field (convention)</td><td><code>var</code> property</td></tr>
  <tr><td><code>NewP("Ada")</code> (factory function)</td><td><code>P("Ada")</code> (no <code>new</code>)</td></tr>
  <tr><td><code>func (p P) X() string { … }</code></td><td><code>val x get() = …</code></td></tr>
</table>
<p>A <code>val</code> constructor parameter is a read-only property — Go has no
compiler-enforced way to say "this field can be set once and never again," so
the closest you get is convention (an exported field you simply never
reassign) or hiding an unexported field behind a getter method; a
<code>var</code> parameter is mutable, like an ordinary exported struct field.
Any setup logic that a primary constructor can't express inline goes in an
<code>init { }</code> block, which runs as part of construction — the Kotlin
analog of the validation code you'd put at the top of a Go
<code>NewP(...)</code> factory function. Computed properties use
<code>get()</code>, and a mutable property can intercept writes with
<code>set(value)</code> using the magic <code>field</code> backing
identifier — something Go can only fake with a pair of getter/setter methods,
since direct field access in Go never runs any code.</p>`,

  go: `type BankAccount struct {
	Owner   string
	Balance int
	note    string
}

func NewBankAccount(owner string, startingBalance int) *BankAccount {
	if startingBalance < 0 {
		panic("negative")
	}
	return &BankAccount{Owner: owner, Balance: startingBalance}
}

func (a *BankAccount) Summary() string {
	return fmt.Sprintf("\${a.Owner} has \${a.Balance}")
}

func (a *BankAccount) SetNote(value string) { a.note = strings.TrimSpace(value) }
func (a *BankAccount) Note() string         { return a.note }

func (a *BankAccount) Deposit(amount int) { a.Balance += amount }

func (a *BankAccount) Withdraw(amount int) bool {
	if amount > a.Balance {
		return false
	}
	a.Balance -= amount
	return true
}`,

  task: `
<p>Build a <code>BankAccount</code> class. No <code>class</code>-less top-level
tricks here — this lesson is about classes:</p>
<ol>
  <li>Give it a primary constructor <code>(val owner: String, startingBalance:
      Int)</code>. <code>owner</code> is a read-only property; use
      <code>startingBalance</code> to initialize a <code>var balance</code>.</li>
  <li>Add an <code>init { }</code> block that calls
      <code>require(startingBalance &gt;= 0)</code> so negative balances throw.</li>
  <li>Add a computed <code>val summary: String</code> with a custom

  <li>Add a <code>var note: String = ""</code> whose custom <code>set(value)</code>
      stores <code>value.trim()</code> into <code>field</code>.</li>
  <li>Add <code>deposit(amount)</code> (adds to <code>balance</code>) and
      <code>withdraw(amount): Boolean</code> (returns <code>false</code> if
      <code>amount &gt; balance</code>, otherwise subtracts and returns

</ol>`,

}
`,

  requirements: [
    { pattern: /class\s+BankAccount\s*\(\s*val\s+owner/, message: "Declare owner as a val in the primary constructor" },
    { pattern: /\binit\s*\{/, message: "Use an init { } block to validate the starting balance" },
    { pattern: /\bget\(\)\s*=/, message: "Give summary a computed custom getter with get()" },
    { pattern: /\bset\(\s*\w+\s*\)/, message: "Give note a custom setter with set(value)" },
  ],

  tests: [
    { name: "owner is a read-only property", code: "        val a = BankAccount(\"Ada\", 100)\n        expect_eq(a.owner, \"Ada\")" },
    { name: "balance starts from the constructor argument", code: "        val a = BankAccount(\"Ada\", 100)\n        expect_eq(a.balance, 100)" },
    { name: "deposit adds to the balance", code: "        val a = BankAccount(\"Ada\", 100)\n        a.deposit(50)\n        expect_eq(a.balance, 150)" },
    { name: "withdraw subtracts and returns true", code: "        val a = BankAccount(\"Ada\", 100)\n        val ok = a.withdraw(40)\n        expect_true(ok)\n        expect_eq(a.balance, 60)" },
    { name: "withdraw fails when funds are insufficient", code: "        val a = BankAccount(\"Bo\", 20)\n        expect_true(!a.withdraw(100))\n        expect_eq(a.balance, 20)" },
    { name: "summary is a computed property", code: "        expect_eq(BankAccount(\"Ada\", 100).summary, \"Ada has 100\")" },
    { name: "note setter trims the value", code: "        val a = BankAccount(\"Cy\", 0)\n        a.note = \"  hello  \"\n        expect_eq(a.note, \"hello\")" },
  ],

  solution: `class BankAccount(val owner: String, startingBalance: Int) {
    var balance: Int = startingBalance
        private set

    var note: String = ""
        set(value) {
            field = value.trim()
        }

    init {
        require(startingBalance >= 0) { "starting balance cannot be negative" }
    }

    val summary: String
        get() = "$owner has $balance"

    fun deposit(amount: Int) {
        balance += amount
    }

    fun withdraw(amount: Int): Boolean {
        if (amount > balance) return false
        balance -= amount
        return true
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Property in constructor</td><td><code>type C struct { Name string }</code> + <code>NewC(name string)</code></td><td><code>class C(val name: String)</code></td></tr>
  <tr><td>Read-only property</td><td>(no enforcement — just don't reassign)</td><td><code>val</code></td></tr>
  <tr><td>Mutable property</td><td>exported struct field</td><td><code>var</code></td></tr>
  <tr><td>Construction-time setup</td><td>validation code inside <code>NewC(...)</code></td><td><code>init { }</code></td></tr>
  <tr><td>Computed property</td><td><code>func (c C) X() string {}</code></td><td><code>val x get() = …</code></td></tr>
  <tr><td>Write interceptor</td><td><code>func (c *C) SetX(v string) {}</code></td><td><code>set(value) { field = … }</code></td></tr>
  <tr><td>Read-only from outside</td><td>unexported field + exported getter method</td><td><code>var x = 0; private set</code></td></tr>
</table>
<p>The <code>field</code> identifier inside a custom setter (or getter) is
Kotlin's <em>backing field</em> — it's the storage behind the property, and you
must use it instead of <code>this.note</code> to avoid infinite recursion. Go
has no equivalent hazard because Go has no property syntax at all: a struct
field access like <code>a.note</code> is always a raw memory read or write,
which is exactly why Go programmers reach for an unexported field plus
<code>Note()</code>/<code>SetNote()</code> methods whenever they want a hook to
run on read or write. A <code>private set</code> gives you a property that
anyone can read but only the class can write — Kotlin's clean answer to the
Go pattern of an exported getter method backed by an unexported field. Note
there is no <code>new</code> keyword and no separate factory function needed:
<code>BankAccount("Ada", 100)</code> constructs an instance directly.</p>`,
};
