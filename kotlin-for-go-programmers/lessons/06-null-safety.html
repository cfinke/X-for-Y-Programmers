const LESSON = {
  number: 6,
  title: "Null Safety",

  intro: `
<p>Kotlin bakes nullability into the type system, which is a different world
from Go's zero values. A plain <code>String</code> can <em>never</em>
hold <code>null</code>; if a value might be absent you must say so with a
trailing <code>?</code> — <code>String?</code> is Kotlin's answer to Go's habit
of returning a zero value (<code>""</code>) alongside an <code>ok bool</code> or
an <code>error</code>. The compiler then forces you to deal with the null
before you can call anything on it.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>(string, bool)</code> / <code>*string</code></td><td><code>String?</code></td></tr>
  <tr><td><code>if user != nil { user.Name }</code></td><td><code>user?.name</code></td></tr>
  <tr><td><code>if name == "" { name = "guest" }</code></td><td><code>name ?: "guest"</code></td></tr>
  <tr><td>(no direct equivalent — panics are manual)</td><td><code>name!!</code></td></tr>
  <tr><td><code>if x != nil { x.F() }</code></td><td><code>x?.let { it.f() }</code></td></tr>
</table>
<p>The tools are unfamiliar at first but map to habits you already have. Safe
call <code>?.</code> returns <code>null</code> instead of panicking when the
receiver is null (same idea as Go's <code>if x != nil</code> guard, but
inline). The Elvis operator <code>?:</code> supplies a fallback in one
expression, instead of Go's multi-line <code>if</code> block. The non-null
assertion <code>!!</code> is like manually calling <code>panic()</code> when a
value you assumed was set turns out not to be — it throws a
<code>NullPointerException</code> if you are wrong, so reach for it rarely.
And <code>value?.let { ... }</code> runs a block only when the value is
non-null, binding it to <code>it</code>.</p>`,

  go: `func lookupName(id int) (string, bool) {
	switch id {
	case 1:
		return "Ada", true
	case 2:
		return "Rob", true
	default:
		return "", false
	}
}

name, ok := lookupName(id)
if !ok {
	name = "stranger"
}
greeting := "Hello, " + name

var firstChar byte
if n, ok := lookupName(id); ok && len(n) > 0 {
	firstChar = n[0]
}`,

  task: `
<p>Build a tiny name directory and handle the missing cases idiomatically. All
declarations are top-level (no class or <code>main</code> needed):</p>
<ol>
  <li>Write <code>lookupName(id: Int): String?</code> that returns
      <code>"Ada"</code> for <code>1</code>, <code>"Rob"</code> for <code>2</code>,
      and <code>null</code> otherwise.</li>
  <li>Write <code>greet(id: Int): String</code> that returns
      <code>"Hello, &lt;name&gt;"</code>, falling back to <code>"stranger"</code>
      with the Elvis operator <code>?:</code> when the name is null.</li>
  <li>Write <code>initial(id: Int): Char?</code> that returns the first character
      of the name using a safe call <code>?.</code> (so a missing name yields
      <code>null</code>).</li>
  <li>Write <code>shout(name: String?): String</code> that returns the uppercased
      name plus <code>"!"</code> using <code>name?.let { ... }</code>, or
      <code>"(silence)"</code> when <code>name</code> is null.</li>
</ol>`,

  starter: `// 1. lookupName(id) -> a name, or null if unknown
fun lookupName(id: Int): String? {
    return null // TODO
}

// 2. greet(id) -> "Hello, <name>", or "Hello, stranger" (use ?:)
fun greet(id: Int): String {
    return "" // TODO
}

// 3. initial(id) -> first char of the name, or null (use ?.)
fun initial(id: Int): Char? {
    return null // TODO
}

// 4. shout(name) -> "<NAME>!", or "(silence)" if null (use ?.let)
fun shout(name: String?): String {
    return "" // TODO
}
`,

  requirements: [
    { pattern: /\?:/, message: "Use the Elvis operator ?: to supply a fallback" },
    { pattern: /\?\./, message: "Use a safe call ?. on a nullable value" },
    { pattern: /\.let\s*\{/, message: "Use ?.let { ... } to handle the nullable name" },
  ],

  tests: [
    { name: 'lookupName(1) is "Ada"', code: "        expect_eq(lookupName(1), \"Ada\")" },
    { name: 'lookupName(2) is "Rob"', code: "        expect_eq(lookupName(2), \"Rob\")" },
    { name: "lookupName(9) is null", code: "        expect_eq(lookupName(9), null)" },
    { name: 'greet(1) is "Hello, Ada"', code: "        expect_eq(greet(1), \"Hello, Ada\")" },
    { name: 'greet(9) falls back to "stranger"', code: "        expect_eq(greet(9), \"Hello, stranger\")" },
    { name: "initial(2) is 'R'", code: "        expect_eq(initial(2), 'R')" },
    { name: "initial(9) is null", code: "        expect_eq(initial(9), null)" },
    { name: 'shout("hi") is "HI!"', code: "        expect_eq(shout(\"hi\"), \"HI!\")" },
    { name: 'shout(null) is "(silence)"', code: "        expect_eq(shout(null), \"(silence)\")" },
  ],

  solution: `fun lookupName(id: Int): String? {
    return when (id) {
        1 -> "Ada"
        2 -> "Rob"
        else -> null
    }
}

fun greet(id: Int): String {
    return "Hello, " + (lookupName(id) ?: "stranger")
}

fun initial(id: Int): Char? {
    return lookupName(id)?.first()
}

fun shout(name: String?): String {
    return name?.let { "\${it.uppercase()}!" } ?: "(silence)"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Nullable type</td><td><code>(T, bool)</code> or <code>*T</code></td><td><code>String?</code></td></tr>
  <tr><td>Safe call</td><td><code>if x != nil { x.F() }</code></td><td><code>x?.f()</code></td></tr>
  <tr><td>Fallback</td><td><code>if x == zero { x = y }</code></td><td><code>x ?: y</code></td></tr>
  <tr><td>Assert non-null</td><td><code>panic("nil")</code> (manual)</td><td><code>x!!</code> (throws at runtime)</td></tr>
  <tr><td>Run if non-null</td><td><code>if x != nil { f(x) }</code></td><td><code>x?.let { f(it) }</code></td></tr>
</table>
<p>The key mental shift from Go: Kotlin's compiler, not convention, is what
keeps you honest. Go relies on you remembering to check the second return
value or compare a pointer against <code>nil</code> — nothing stops you from
skipping the check and dereferencing a nil pointer, which panics at runtime.
Kotlin's <code>String?</code> makes the possibility of absence part of the
type itself, so the compiler refuses to compile code that calls a method on a
nullable value without first narrowing it. <code>!!</code> is the one place
you can still shoot yourself in the foot — like an unchecked
<code>*ptr</code> dereference in Go — so save it for the rare spot where you
can prove non-null and prefer <code>?.</code>, <code>?:</code>, and
<code>?.let { }</code> for everyday handling. Chaining <code>?.</code>
short-circuits the whole chain to <code>null</code> the moment any link is
null, which replaces a whole pyramid of Go's <code>if err != nil</code> /
<code>if x != nil</code> guards with a single expression.</p>`,
};
