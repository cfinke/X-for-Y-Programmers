  intro: `
<p>In Go, <code>switch</code> is a statement: each case already breaks on its
own (no fall-through unless you write <code>fallthrough</code>), but it still
can't produce a value — every case has to assign a variable or
<code>return</code> on its own. Kotlin replaces <code>switch</code> with
<code>when</code>, which is an <em>expression</em> — each branch is a value,
there is no fall-through, and you can assign the whole thing or
<code>return</code> it. Go also has no ternary operator, so picking one of two
values needs a multi-line <code>if</code>/<code>else</code>; in Kotlin even
<code>if</code> is an expression, so it doubles as that missing ternary.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>switch x { case 1: ... }</code></td><td><code>when (x) { 1 -> ... }</code></td></tr>
  <tr><td><code>case 1, 2:</code></td><td><code>1, 2 -> ...</code></td></tr>
  <tr><td><code>default:</code></td><td><code>else -> ...</code></td></tr>
  <tr><td>(no ternary; use if/else)</td><td><code>if (a > b) a else b</code></td></tr>
  <tr><td><code>for i := 1; i &lt;= 10; i++</code></td><td><code>for (i in 1..10)</code></td></tr>
</table>
<p>A <code>when</code> branch can match a literal, a comma-separated list of
labels, or a range with <code>in</code> (<code>in 90..100</code>). When a
<code>when</code> is used as an expression it must be exhaustive, so an
<code>else</code> is usually required. Ranges are real values:
<code>1..10</code> counts up, <code>10 downTo 1</code> counts down, and
<code>step 2</code> changes the stride — all drivable by a <code>for</code>
loop, which in Kotlin only ever iterates over something, never a C-style
counter.</p>`,

  solution: `fun dayType(day: String): String = when (day) {
    "Sat", "Sun" -> "weekend"
    "Mon", "Tue", "Wed", "Thu", "Fri" -> "weekday"
    else -> "unknown"
}

fun grade(score: Int): String = when (score) {
    in 90..100 -> "A"
    in 80..89 -> "B"
    in 70..79 -> "C"
    in 60..69 -> "D"
    else -> "F"
}

fun max(a: Int, b: Int): Int = if (a >= b) a else b

fun countdown(from: Int): List<Int> {
    val result = mutableListOf<Int>()
    for (i in from downTo 1) {
        result.add(i)
    }
    return result
}

fun evens(n: Int): List<Int> {
    val result = mutableListOf<Int>()
    for (i in 2..n step 2) {
        result.add(i)
    }
    return result
}

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Multi-way branch</td><td><code>switch</code> (auto-breaks; <code>fallthrough</code> is opt-in)</td><td><code>when</code> (no fall-through)</td></tr>
  <tr><td>Branch as a value</td><td>not possible</td><td><code>val g = when (...) { ... }</code></td></tr>
  <tr><td>Grouped cases</td><td><code>case 1, 2:</code></td><td><code>1, 2 -&gt;</code></td></tr>
  <tr><td>Range test</td><td><code>x &gt;= 1 &amp;&amp; x &lt;= 10</code></td><td><code>x in 1..10</code></td></tr>
  <tr><td>Ternary</td><td>(none — use if/else)</td><td><code>if (a &gt; b) a else b</code></td></tr>
  <tr><td>Count down</td><td><code>for i := n; i &gt;= 1; i--</code></td><td><code>for (i in n downTo 1)</code></td></tr>
</table>
<p><code>when</code> can also drop its subject and take boolean branches
(<code>when { score &gt; 90 -&gt; ... }</code>), acting like an if/else-if chain.
Note that a range with <code>..</code> is inclusive on both ends, so
<code>1..10</code> contains <code>10</code>; use <code>until</code>
(<code>1 until 10</code>) for the exclusive upper bound that a C-style
<code>&lt; 10</code> loop gives you. Because <code>when</code> and <code>if</code>
are expressions, the idiomatic body is often a single <code>=</code> with no
braces, as in <code>grade</code> and <code>max</code> above.</p>`,
