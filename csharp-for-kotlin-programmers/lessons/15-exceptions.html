  intro: `
<p>Exceptions in C# will feel familiar: <code>try</code>/<code>catch</code>/<code>finally</code>
and <code>throw</code> work almost exactly like Kotlin. Both languages only let you
<code>throw</code> a <code>Throwable</code>-derived type, and both already give you
<em>typed</em> catch blocks — Kotlin's <code>catch (e: ValidationError)</code> is the
same idea as C#'s <code>catch (ValidationException e)</code>, no
<code>is</code>-check chains required. The real differences show up around
nullability and cleanup.</p>
<table>
  <tr><th>Kotlin</th><th>C#</th></tr>
  <tr><td><code>throw Exception("bad")</code></td><td><code>throw new Exception("bad")</code></td></tr>
  <tr><td><code>catch (e: Exception) { … }</code></td><td><code>catch (Exception e) { … }</code></td></tr>
  <tr><td><code>catch (e: ValidationError) { … }</code></td><td><code>catch (ValidationException e) { … }</code></td></tr>
  <tr><td><code>class E(msg: String) : Exception(msg)</code></td><td><code>class E : Exception {}</code></td></tr>
  <tr><td><code>e.message</code> (nullable)</td><td><code>e.Message</code></td></tr>
  <tr><td><code>resource.use { … }</code></td><td><code>using (var conn = …) { … }</code></td></tr>
</table>
<p>The last row is the big new idea if you are used to Kotlin's <code>use { }</code>.
C# has <code>IDisposable</code>: any type with a <code>Dispose()</code> method. A
<code>using</code> block guarantees <code>Dispose()</code> runs when the block
exits — normally or via an exception — playing the same role as Kotlin's
<code>use { }</code> extension function on a <code>Closeable</code>, but as a
built-in language statement instead of a lambda-taking library function.</p>`,

  kotlin: `class ValidationError(message: String) : Exception(message)

fun validateAge(age: Int): Int {
  if (age < 0) throw ValidationError("age cannot be negative")
  if (age > 150) throw ValidationError("age is unrealistically large")
  return age
}

fun safeValidateAge(age: Int, fallback: Int): Int {
  return try {
    validateAge(age)
  } catch (e: ValidationError) {
    fallback
  }
}`,

  solution: `class ValidationException : Exception {
  public ValidationException(string message) : base(message) { }
}

class Resource : IDisposable {
  public static int OpenCount = 0;
  public bool Disposed = false;

  public Resource() {
    OpenCount++;
  }

  public void Dispose() {
    Disposed = true;
    OpenCount--;
  }
}

static class Validator {
  public static int ValidateAge(int age) {
    if (age < 0) throw new ValidationException("age cannot be negative");
    if (age > 150) throw new ValidationException("age is unrealistically large");
    return age;
  }

  public static int SafeValidateAge(int age, int fallback) {
    try {
      return ValidateAge(age);
    } catch (ValidationException) {
      return fallback;
    }
  }

  public static string Process(int age) {
    var log = new StringBuilder();
    using (var res = new Resource()) {
      try {
        int valid = ValidateAge(age);
        log.Append($"ok:{valid}");
      } catch (ValidationException ex) {
        log.Append($"error:{ex.Message}");
      } finally {
        log.Append("|cleanup");
      }
    }
    return log.ToString();
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>C#</th></tr>
  <tr><td>Throw</td><td><code>throw Exception("x")</code></td><td><code>throw new Exception("x")</code></td></tr>
  <tr><td>Catch by type</td><td><code>catch (e: T) { … }</code></td><td><code>catch (T e) { … }</code></td></tr>
  <tr><td>Custom exception</td><td><code>class E(msg: String) : Exception(msg)</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Message</td><td><code>e.message</code> (nullable)</td><td><code>e.Message</code></td></tr>
  <tr><td>Deterministic cleanup</td><td><code>resource.use { … }</code></td><td><code>using (var x = …)</code></td></tr>
</table>
<p>A few things worth internalizing. C# enforces catch order at compile time — a
<code>catch (Exception)</code> ahead of <code>catch (ValidationException)</code> is a
compile error because the second is unreachable. Kotlin makes no such promise:
catch blocks run in the order written, but the compiler will not stop you from
putting a general <code>catch (e: Exception)</code> before a specific
<code>catch (e: ValidationError)</code>, silently turning the specific one into
dead code. Get in the habit of ordering most-specific first regardless of
language. To catch by type but keep going, use a bare <code>catch
(ValidationException)</code> with no variable (as in <code>SafeValidateAge</code>)
when you do not need <code>e</code>.</p>
<p>A <code>using</code> block is pure sugar for
<code>try { … } finally { x.Dispose(); }</code>, and it is how C# programmers write
"close this no matter what." Reach for it around files, streams, database
connections, and locks — the same places you would reach for Kotlin's
<code>resource.use { }</code> on a <code>Closeable</code>. When you need a real
custom exception, derive from <code>Exception</code> (or a more specific base such
as <code>ArgumentException</code>) and forward the message with
<code>: base(message)</code> so <code>e.Message</code> works for free — the same
job Kotlin's <code>class E(message: String) : Exception(message)</code> does with
its primary constructor.</p>`,
