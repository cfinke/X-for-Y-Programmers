  intro: `
<p>Kotlin, like C#, splits collections into two kinds instead of leaning on
one grow-anywhere type. A Kotlin <code>Array</code> (or the primitive-specialized
<code>IntArray</code>) is fixed-length, chosen at creation time — you can't
<code>add</code> onto it. When you want resizable behaviour, reach for
<code>MutableList&lt;T&gt;</code>, typically built with <code>mutableListOf</code>
and backed by an <code>ArrayList</code>. C#'s split maps onto this almost
exactly.</p>
<table>
  <tr><th>Kotlin</th><th>C#</th></tr>
  <tr><td><code>val a: IntArray = intArrayOf(1, 2, 3)</code></td><td><code>int[] a = { 1, 2, 3 };</code></td></tr>
  <tr><td><code>IntArray(3)</code></td><td><code>new int[3]</code></td></tr>
  <tr><td><code>a.size</code></td><td><code>a.Length</code> (array) / <code>a.Count</code> (list)</td></tr>
  <tr><td><code>list.add(4)</code></td><td><code>list.Add(4)</code></td></tr>
  <tr><td><code>a.contains(4)</code></td><td><code>list.Contains(4)</code></td></tr>
  <tr><td><code>val b = mutableListOf(1, 2, 3)</code> (grows)</td><td><code>var b = new List&lt;int&gt;();</code></td></tr>
</table>
<p>Two things to internalize. First, arrays are fixed size: <code>new int[3]</code>
gives three slots, all initialized to <code>0</code>, and that size never
changes — the same behaviour as Kotlin's <code>IntArray(3)</code>. Second,
<code>List&lt;T&gt;</code> is the growable one — <code>Add</code> instead of
<code>add</code>, <code>Count</code> instead of <code>size</code>, and it still
supports <code>list[i]</code> indexing. Both can be built with a collection
initializer: <code>new List&lt;int&gt; { 1, 2, 3 }</code>, much like Kotlin's
<code>mutableListOf(1, 2, 3)</code>.</p>`,

  kotlin: `fun evens(nums: IntArray): List<Int> {

  solution: `using System.Collections.Generic;

static class Collections {
  public static int Total(int[] nums) {
    int sum = 0;
    foreach (int n in nums) {
      sum += n;
    }
    return sum;
  }

  public static List<int> Evens(int[] nums) {
    var result = new List<int>();
    foreach (int n in nums) {
      if (n % 2 == 0) {
        result.Add(n);
      }
    }
    return result;
  }

  public static bool Contains(int[] nums, int target) {
    foreach (int n in nums) {
      if (n == target) {
        return true;
      }
    }
    return false;
  }
}
`,

<table>
  <tr><th>Concept</th><th>Kotlin</th><th>C#</th></tr>
  <tr><td>Fixed-size block</td><td><code>IntArray(3)</code></td><td><code>new int[3]</code></td></tr>
  <tr><td>Array literal</td><td><code>intArrayOf(1, 2, 3)</code></td><td><code>new int[] { 1, 2, 3 }</code></td></tr>
  <tr><td>Growable list</td><td><code>mutableListOf(1, 2, 3)</code></td><td><code>new List&lt;int&gt; { 1, 2, 3 }</code></td></tr>
  <tr><td>Length</td><td><code>a.size</code></td><td><code>a.Length</code> / <code>list.Count</code></td></tr>
  <tr><td>Append</td><td><code>list.add(x)</code></td><td><code>list.Add(x)</code></td></tr>
  <tr><td>Membership</td><td><code>a.contains(x)</code></td><td><code>list.Contains(x)</code></td></tr>
</table>
<p>Rule of thumb: if the size is known and fixed, an array is the leaner
choice; if you're accumulating results or the count varies, use
<code>List&lt;T&gt;</code> — the same rule Kotlin follows when choosing between
<code>Array</code> and <code>MutableList</code>. Note the naming trap — arrays
expose <code>Length</code> (a property), lists expose <code>Count</code>,
where Kotlin uses <code>size</code> for both. Once you have a list you can
still call <code>ToArray()</code> to get back a plain <code>int[]</code>, and
any array can seed a list with <code>new List&lt;int&gt;(myArray)</code>,
mirroring Kotlin's <code>myArray.toMutableList()</code> and
<code>myList.toIntArray()</code>. Under the hood a <code>List&lt;T&gt;</code>
is backed by an array it re-allocates as it grows — the same trick Kotlin's
<code>ArrayList</code> does under the hood.</p>`,
