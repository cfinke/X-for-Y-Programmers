  title: "Tuples & Deconstruction",

  intro: `
<p>In Kotlin you reach for <code>Pair&lt;Int, String&gt;</code> or
<code>Triple&lt;Int, String, Boolean&gt;</code>, or a small <code>data class</code>,
whenever you want to return two or three values without declaring a whole class.
C# has a direct equivalent: the <strong>value tuple</strong>. It is written with
parentheses — <code>(int, string)</code> — and it is a lightweight
<code>struct</code>, so it copies by value and compares by value.</p>
<table>
  <tr><th>Kotlin</th><th>C#</th></tr>
  <tr><td><code>Pair&lt;Int, String&gt;</code></td><td><code>(int, string)</code></td></tr>
  <tr><td><code>Pair(count, name)</code> (<code>.first</code>/<code>.second</code>)</td><td><code>(int Count, string Name)</code> (named)</td></tr>
  <tr><td><code>val (a, b) = pair</code></td><td><code>var (a, b) = pair;</code></td></tr>
  <tr><td><code>return n to s</code></td><td><code>return (n, s);</code></td></tr>
  <tr><td><code>t.first</code>, <code>t.second</code></td><td><code>t.Item1</code>, <code>t.Item2</code> (or names)</td></tr>
</table>
<p>Unlike a Kotlin <code>Pair</code>, a C# tuple's elements can carry
<em>names</em> (<code>(int Count, string Name)</code>), so you read
<code>result.Count</code> instead of <code>.first</code>/<code>.second</code>. And
the names are just labels — two tuples with the same element types are the same
type regardless of the names, and <code>==</code>/<code>Equals</code> compare
element by element.</p>
<p>To pull a tuple apart you <strong>deconstruct</strong> it:
<code>var (a, b) = GetPair();</code>. Any type can opt into this by defining a
<code>Deconstruct</code> method with <code>out</code> parameters, and then it too
works with the <code>var (…)</code> syntax — much like how a Kotlin
<code>data class</code> gets <code>component1()</code>/<code>component2()</code>
for free and can be destructured with <code>val (x, y) = point</code>.</p>`,

  kotlin: `fun minMax(nums: IntArray): Pair<Int, Int> {
    var lo = nums[0]
    var hi = nums[0]
    for (n in nums) { lo = minOf(lo, n); hi = maxOf(hi, n) }
    return Pair(lo, hi)
}

val (low, high) = minMax(intArrayOf(4, 1, 9, 2))

data class Point(val x: Int, val y: Int)
val p = Point(3, 4)
val (x, y) = p`,

  requirements: [
    { pattern: /var\s*\(\s*\w+\s*,\s*\w+\s*\)\s*=/, message: "Deconstruct a tuple with the var (a, b) = ... syntax" },
    { pattern: /\(\s*int\s+Min\s*,\s*int\s+Max\s*\)/, message: "MinMax should return a named tuple (int Min, int Max)" },

  tests: [
    { name: "MinMax finds the extremes", code: "      var mm = Stats.MinMax(new int[]{4, 1, 9, 2});\n      expect_eq(mm.Min, 1);\n      expect_eq(mm.Max, 9);" },
    { name: "MinMax tuple equals a literal tuple", code: "      expect_true(Stats.MinMax(new int[]{5, 3, 8}).Equals((3, 8)));" },
    { name: "Divide returns quotient and remainder", code: "      var d = Stats.Divide(17, 5);\n      expect_eq(d.Quotient, 3);\n      expect_eq(d.Remainder, 2);" },
    { name: "Range deconstructs MinMax", code: "      expect_eq(Stats.Range(new int[]{4, 1, 9, 2}), 8);" },
    { name: "Point deconstructs into x and y", code: "      var p = new Point(3, 4);\n      int x, y;\n      p.Deconstruct(out x, out y);\n      expect_eq(x, 3);\n      expect_eq(y, 4);" },
    { name: "Divide result compares by value", code: "      expect_true(Stats.Divide(10, 3).Equals((3, 1)));" },

  solution: `static class Stats {
  public static (int Min, int Max) MinMax(int[] nums) {
    int lo = nums[0], hi = nums[0];
    foreach (var n in nums) {
      if (n < lo) lo = n;
      if (n > hi) hi = n;
    }
    return (lo, hi);
  }

  public static (int Quotient, int Remainder) Divide(int a, int b) {
    return (a / b, a % b);
  }

  public static int Range(int[] nums) {
    var (min, max) = MinMax(nums);
    return max - min;
  }
}

class Point {
  public int X { get; }
  public int Y { get; }

  public Point(int x, int y) {
    X = x;
    Y = y;
  }

  public void Deconstruct(out int x, out int y) {
    x = X;
    y = Y;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>C#</th></tr>
  <tr><td>Tuple type</td><td><code>Pair&lt;Int, String&gt;</code></td><td><code>(int, string)</code></td></tr>
  <tr><td>Named elements</td><td>—</td><td><code>(int Count, string Name)</code></td></tr>
  <tr><td>Construct</td><td><code>1 to "a"</code></td><td><code>(1, "a")</code></td></tr>
  <tr><td>Access</td><td><code>t.first</code></td><td><code>t.Item1</code> or <code>t.Count</code></td></tr>
  <tr><td>Deconstruct</td><td><code>val (a, b) = t</code></td><td><code>var (a, b) = t;</code></td></tr>
  <tr><td>Data class destructure</td><td><code>val (x, y) = p</code> via <code>componentN()</code></td><td><code>var (x, y) = p;</code> via <code>Deconstruct</code></td></tr>
</table>
<p>A value tuple is a <code>struct</code> (<code>System.ValueTuple</code>), so it
copies on assignment and <code>==</code>/<code>Equals</code> compare element by
element — handy in tests. The element names are compile-time sugar only:
<code>(int Min, int Max)</code> and <code>(int, int)</code> are the same runtime
type, which is why <code>MinMax(...) == (3, 8)</code> works against a nameless
literal.</p>
<p>You can also mix deconstruction into <code>foreach</code>
(<code>foreach (var (k, v) in dict)</code>) and discard pieces you don't need with
<code>_</code>: <code>var (_, max) = MinMax(nums);</code>. Any type — not just
tuples — becomes deconstructible the moment it exposes a <code>Deconstruct</code>
method with <code>out</code> parameters, and you can even provide several
overloads for different arities — the C# analogue of Kotlin generating
<code>component1()</code>/<code>component2()</code> for a <code>data class</code>.</p>`,
