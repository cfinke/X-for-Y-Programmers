<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Java and Ruby are opposites in one big way: Ruby is dynamically typed and
never asks you to declare a type, while Java is statically typed and asks for
the types up front and almost everywhere. There is no duck typing, and locals
only get inference through <code>var</code> (Java 10+).</p>
<table>
  <tr><th>Ruby</th><th>Java</th></tr>
  <tr><td><code>age = 36</code></td><td><code>int age = 36;</code></td></tr>
  <tr><td><code>name = "Ada"</code></td><td><code>final String name = "Ada";</code></td></tr>
  <tr><td><code>Integer</code> and <code>Float</code> (separate classes)</td><td><code>int</code>, <code>long</code>, <code>double</code>, … (distinct)</td></tr>
  <tr><td>top-level methods</td><td>methods live inside a class</td></tr>
</table>
<p>Two adjustments matter most. First, and this one is actually familiar: Ruby
already splits numbers into <code>Integer</code> and <code>Float</code>, so
Java's <code>int</code>, <code>long</code>, <code>double</code> and friends
aren't a new idea — just new syntax. The load-bearing behavior carries over
unchanged: <code>7 / 2</code> is <code>3</code> (integer division), while
<code>7 / 2.0</code> is <code>3.5</code>, exactly as in Ruby. Second, Java has
no free functions — every method belongs to a class, so a script full of
top-level <code>def</code>s becomes a class full of <code>static</code>
methods.</p>`,

  ruby: `age = 36
user_name = "Ada"

def describe(name, age)
  "#{name} is #{age}"
end`,

  task: `
<p>Write the Java version. Java has no top-level methods, so put your methods
in a class:</p>
<ol>
  <li>Declare a class <code>Basics</code> holding <code>static</code> methods.</li>
  <li><code>add(int a, int b)</code> returns their sum.</li>
  <li><code>describe(String name, int age)</code> returns a string like
      <code>"Ada is 36"</code>.</li>
  <li><code>divide(int a, int b)</code> returns a <code>double</code>, so
      <code>divide(7, 2)</code> is <code>3.5</code>, not <code>3</code>. Cast one
      operand: <code>(double) a / b</code>.</li>
</ol>`,

  starter: `class Basics {
  static int add(int a, int b) {
    return 0; // TODO
  }

  static String describe(String name, int age) {
    return ""; // TODO
  }

  static double divide(int a, int b) {
    return 0; // TODO: watch out for integer division
  }
}
`,

  requirements: [
    { pattern: /class\s+Basics/, message: "Declare a class named Basics" },
    { pattern: /static/, message: "Give Basics static methods" },
    { pattern: /\(double\)/, message: "Cast to (double) so divide returns a fractional result" },
  ],

  tests: [
    { name: "add(2, 3) is 5", code: "      expect_eq(Basics.add(2, 3), 5);" },
    { name: 'describe("Ada", 36) is "Ada is 36"', code: "      expect_eq(Basics.describe(\"Ada\", 36), \"Ada is 36\");" },
    { name: 'describe("Rob", 68) is "Rob is 68"', code: "      expect_eq(Basics.describe(\"Rob\", 68), \"Rob is 68\");" },
    { name: "divide(7, 2) is 3.5", code: "      expect_eq(Basics.divide(7, 2), 3.5);" },
    { name: "divide(10, 4) is 2.5", code: "      expect_eq(Basics.divide(10, 4), 2.5);" },
  ],

  solution: `class Basics {
  static int add(int a, int b) {
    return a + b;
  }

  static String describe(String name, int age) {
    return name + " is " + age;
  }

  static double divide(int a, int b) {
    return (double) a / b;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Java</th></tr>
  <tr><td>Local variable</td><td><code>x = 1</code> (no type)</td><td><code>int x = 1;</code></td></tr>
  <tr><td>Inferred local</td><td>always inferred — Ruby has no type syntax</td><td><code>var x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>X = 1</code> (uppercase name, reassignment just warns)</td><td><code>final int x = 1;</code> (reassignment is a compile error)</td></tr>
  <tr><td>Numeric types</td><td><code>Integer</code>, <code>Float</code></td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>float</code>…</td></tr>
  <tr><td>Top-level method</td><td><code>def f; end</code></td><td><code>static</code> method in a class</td></tr>
</table>
<p>The numeric split is not a new surprise for a Ruby programmer:
<code>Integer#/</code> already floors, throwing away the remainder, exactly
like Java's <code>int / int</code>. Promote one side to a floating-point value
— a cast, a literal like <code>2.0</code>, or a <code>double</code> variable —
and the whole expression becomes floating point, the same way you'd reach for
<code>to_f</code> or a <code>2.0</code> literal in Ruby. The mechanism is new
(an explicit <code>(double)</code> cast instead of a method call), but the
underlying gotcha is one you already know.</p>`,
};
