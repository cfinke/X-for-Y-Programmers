<script>
const LESSON = {
  number: 9,
  title: "Interfaces",

  intro: `
<p>Ruby has no formal notion of an interface at all — you rely on duck typing:
any object that responds to <code>area</code> is shape enough, and nothing is
checked until that method actually gets called at runtime. Java interfaces give
that same idea a name and a compile-time guarantee: they are <em>nominal</em>.
A class only satisfies an interface if it explicitly says
<code>implements</code>.</p>
<table>
  <tr><th>Ruby</th><th>Java</th></tr>
  <tr><td>duck typing — just define <code>area</code></td><td><code>interface Shape { double area(); }</code></td></tr>
  <tr><td>structural, unchecked — responding is enough</td><td>nominal — must write <code>implements Shape</code></td></tr>
  <tr><td>a <code>module</code> mixed in with <code>include</code> carries a body</td><td><code>default</code> methods carry a body</td></tr>
  <tr><td><code>class C; include A; include B; end</code></td><td><code>class C implements A, B</code></td></tr>
</table>
<p>Two Java specifics worth internalizing. First, an interface method with no body
is implicitly <code>public abstract</code>; the implementing class must mark its
version <code>public</code>. Second, a <code>default</code> method lets the
interface ship a real implementation — the Java answer to a Ruby mixin module —
so every implementer gets it for free unless it overrides. As in Ruby, the
payoff is <em>programming to the interface</em>: declare variables and
parameters as the interface type and let the concrete class vary underneath —
except in Java the compiler enforces that the object really does quack like a
<code>Shape</code>, instead of you just hoping it responds the right way.</p>`,

  ruby: `module Shape
  def describe
    "A shape with area #{area}"
  end
end

class Rectangle
  include Shape

  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    @width * @height
  end
end

s = Rectangle.new(3, 4)
puts s.area # 12`,

  task: `
<p>Model shapes behind an interface, then program to that interface.</p>
<ol>
  <li>Declare an interface <code>Shape</code> with an abstract method
      <code>double area()</code> and a <code>default</code> method
      <code>String describe()</code> that returns
      <code>"A shape with area " + area()</code>.</li>
  <li>Declare an interface <code>Named</code> with a method
      <code>String name()</code>.</li>
  <li><code>Rectangle</code> implements <code>Shape</code> (constructor takes
      <code>width</code> and <code>height</code>).</li>
  <li><code>Circle</code> implements <em>both</em> <code>Shape</code> and
      <code>Named</code> (constructor takes <code>radius</code>;
      <code>name()</code> returns <code>"circle"</code>).</li>
  <li>Remember: methods that satisfy an interface must be declared
      <code>public</code>.</li>
</ol>`,

  starter: `interface Shape {
  double area();

  default String describe() {
    return ""; // TODO: use area()
  }
}

interface Named {
  String name();
}

class Rectangle implements Shape {
  Rectangle(double width, double height) {
    // TODO: store the dimensions
  }

  public double area() {
    return 0; // TODO
  }
}

class Circle implements Shape, Named {
  Circle(double radius) {
    // TODO: store the radius
  }

  public double area() {
    return 0; // TODO
  }

  public String name() {
    return ""; // TODO
  }
}
`,

  requirements: [
    { pattern: /interface\s+Shape/, message: "Declare an interface named Shape" },
    { pattern: /default\s+String\s+describe\s*\(/, message: "Give Shape a default describe() method" },
    { pattern: /class\s+Circle\s+implements\s+Shape\s*,\s*Named/, message: "Circle must implement both Shape and Named" },
  ],

  tests: [
    { name: "Rectangle area via the Shape type is 12.0", code: "      Shape r = new Rectangle(3, 4);\n      expect_eq(r.area(), 12.0);" },
    { name: "default describe() reports the area", code: "      Shape r = new Rectangle(3, 4);\n      expect_eq(r.describe(), \"A shape with area 12.0\");" },
    { name: "Circle area via the Shape type is about PI*r^2", code: "      Shape c = new Circle(2);\n      expect_true(Math.abs(c.area() - Math.PI * 4) < 1e-9);" },
    { name: "Circle satisfies Named", code: "      Named n = new Circle(2);\n      expect_eq(n.name(), \"circle\");" },
    { name: "program to the interface: sum a List<Shape>", code: "      List<Shape> shapes = List.of(new Rectangle(2, 3), new Rectangle(4, 5), new Circle(0));\n      double total = shapes.stream().mapToDouble(Shape::area).sum();\n      expect_eq(total, 26.0);" },
  ],

  solution: `interface Shape {
  double area();

  default String describe() {
    return "A shape with area " + area();
  }
}

interface Named {
  String name();
}

class Rectangle implements Shape {
  private final double width;
  private final double height;

  Rectangle(double width, double height) {
    this.width = width;
    this.height = height;
  }

  public double area() {
    return width * height;
  }
}

class Circle implements Shape, Named {
  private final double radius;

  Circle(double radius) {
    this.radius = radius;
  }

  public double area() {
    return Math.PI * radius * radius;
  }

  public String name() {
    return "circle";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Java</th></tr>
  <tr><td>Satisfy a contract</td><td>duck typing (implicit, unchecked)</td><td><code>implements Shape</code> (explicit)</td></tr>
  <tr><td>Abstract method</td><td>just define <code>area</code> somewhere</td><td><code>double area();</code></td></tr>
  <tr><td>Method with a body</td><td><code>module</code> mixed in with <code>include</code></td><td><code>default</code> method in the interface</td></tr>
  <tr><td>Multiple contracts</td><td><code>include A; include B</code></td><td><code>implements A, B</code></td></tr>
  <tr><td>Implementer visibility</td><td>n/a — Ruby methods are public by default</td><td>must be <code>public</code></td></tr>
</table>
<p>Because Java interfaces are nominal, the compiler catches a missing
<code>implements</code> immediately — you cannot "accidentally" satisfy a
<code>Shape</code> the way a Ruby object can accidentally quack like one just by
happening to define the right method. <code>default</code> methods are how the
standard library evolves without breaking implementers (<code>List</code>
gained <code>sort</code>, <code>Iterable</code> gained <code>forEach</code>) —
much like adding a method to a Ruby module that everything already includes.
And once a variable is typed as <code>Shape</code>, the call site neither knows
nor cares whether it holds a <code>Circle</code> or a <code>Rectangle</code> —
that is polymorphism, exactly as with duck typing in Ruby, just with the
contract spelled out and checked ahead of time.</p>`,
};
