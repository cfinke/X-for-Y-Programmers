const LESSON = {
  number: 11,
  title: "Enums",

  intro: `
<p>Ruby has no built-in enum type at all. Idiomatic Ruby reaches for symbols —
<code>:todo</code>, <code>:done</code> — often collected in a frozen array or
hash so there is at least one place that lists the valid values (Rails'
<code>enum</code> class macro is the closest thing to a real enum, and it just
maps symbols to integers under the hood). Java enums are a different animal: a
full class. Each constant is a singleton object, so it can carry fields, run a
constructor, and answer method calls.</p>
<table>
  <tr><th>Ruby</th><th>Java</th></tr>
  <tr><td><code>%i[todo done]</code> (array of symbols)</td><td><code>enum Status { TODO, DONE }</code></td></tr>
  <tr><td><code>status == :done</code></td><td>no unions — use an <code>enum</code></td></tr>
  <tr><td>constant is a bare symbol (no attached data)</td><td>constant is a full object (singleton)</td></tr>
  <tr><td>hand-rolled <code>STATUSES = %i[todo done]</code></td><td><code>Status.values()</code> built in</td></tr>
  <tr><td>no built-in parse — hand-roll a lookup</td><td><code>Status.valueOf("DONE")</code></td></tr>
</table>
<p>Because every constant is an object, you can attach data. A
<code>Planet</code> enum can store its mass and radius, take those through a
constructor, and expose a <code>surfaceGravity()</code> method that computes a
value per constant. Two built-ins come for free: <code>values()</code> returns
every constant, and <code>valueOf(String)</code> parses a name back into a
constant (throwing if it does not match). And a <code>switch</code> over an enum
needs no <code>default</code> when it covers every case.</p>`,

  ruby: `PLANET_NAMES = %i[mercury venus earth mars]

MASS = { mercury: 3.303e23, venus: 4.869e24, earth: 5.976e24, mars: 6.421e23 }
RADIUS = { mercury: 2.4397e6, venus: 6.0518e6, earth: 6.37814e6, mars: 3.3972e6 }
G = 6.673e-11

def surface_gravity(planet)
  (G * MASS[planet]) / (RADIUS[planet]**2)
end`,

  task: `
<p>Model the inner planets as a Java <code>enum</code> that carries data and
computes gravity per constant:</p>
<ol>
  <li>Declare an <code>enum Planet</code> with constants
      <code>MERCURY</code>, <code>VENUS</code>, <code>EARTH</code>,
      <code>MARS</code>, each given a mass (kg) and radius (m).</li>
  <li>Add <code>private final</code> fields for mass and radius, plus a
      constructor that stores them (<code>this.mass = mass;</code>).</li>
  <li>Add <code>double surfaceGravity()</code> returning
      <code>G * mass / (radius * radius)</code>, with
      <code>static final double G = 6.67300e-11;</code>.</li>
  <li>Add <code>double surfaceWeight(double otherMass)</code> returning
      <code>otherMass * surfaceGravity()</code>.</li>
  <li>Add <code>String kind()</code> that uses a <code>switch</code> over
      <code>this</code>: <code>MERCURY</code> and <code>MARS</code> are
      <code>"small rocky"</code>; <code>VENUS</code> and <code>EARTH</code> are
      <code>"large rocky"</code>.</li>
</ol>
<p>Suggested data: MERCURY (3.303e23, 2.4397e6), VENUS (4.869e24, 6.0518e6),
EARTH (5.976e24, 6.37814e6), MARS (6.421e23, 3.3972e6).</p>`,

  starter: `enum Planet {
  MERCURY(3.303e+23, 2.4397e6),
  VENUS(4.869e+24, 6.0518e6),
  EARTH(5.976e+24, 6.37814e6),
  MARS(6.421e+23, 3.3972e6);

  static final double G = 6.67300e-11;

  private final double mass;
  private final double radius;

  Planet(double mass, double radius) {
    this.mass = 0;   // TODO: store mass
    this.radius = 0; // TODO: store radius
  }

  double surfaceGravity() {
    return 0; // TODO
  }

  double surfaceWeight(double otherMass) {
    return 0; // TODO
  }

  String kind() {
    return ""; // TODO: switch over this
  }
}
`,

  requirements: [
    { pattern: /enum\s+Planet/, message: "Declare an enum named Planet" },
    { pattern: /this\.mass|this\.radius/, message: "Store per-constant data via the constructor (this.mass = ...)" },
    { pattern: /switch/, message: "Use a switch over the enum inside kind()" },
  ],

  tests: [
    { name: 'EARTH.name() is "EARTH"', code: "      expect_eq(Planet.EARTH.name(), \"EARTH\");" },
    { name: "values() has 4 planets", code: "      expect_eq(Planet.values().length, 4);" },
    { name: 'valueOf("MARS") is Planet.MARS', code: "      expect_true(Planet.valueOf(\"MARS\") == Planet.MARS);" },
    { name: "EARTH surface gravity is about 9.8", code: "      expect_true(Math.abs(Planet.EARTH.surfaceGravity() - 9.8) < 0.1);" },
    { name: "surfaceWeight scales with gravity", code: "      expect_true(Math.abs(Planet.EARTH.surfaceWeight(75.0) - 75.0 * Planet.EARTH.surfaceGravity()) < 1e-9);" },
    { name: 'MARS.kind() is "small rocky"', code: "      expect_eq(Planet.MARS.kind(), \"small rocky\");" },
    { name: 'EARTH.kind() is "large rocky"', code: "      expect_eq(Planet.EARTH.kind(), \"large rocky\");" },
  ],

  solution: `enum Planet {
  MERCURY(3.303e+23, 2.4397e6),
  VENUS(4.869e+24, 6.0518e6),
  EARTH(5.976e+24, 6.37814e6),
  MARS(6.421e+23, 3.3972e6);

  static final double G = 6.67300e-11;

  private final double mass;   // kilograms
  private final double radius; // meters

  Planet(double mass, double radius) {
    this.mass = mass;
    this.radius = radius;
  }

  double surfaceGravity() {
    return G * mass / (radius * radius);
  }

  double surfaceWeight(double otherMass) {
    return otherMass * surfaceGravity();
  }

  String kind() {
    return switch (this) {
      case MERCURY, MARS -> "small rocky";
      case VENUS, EARTH -> "large rocky";
    };
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Java</th></tr>
  <tr><td>Declare</td><td><code>%i[a b]</code> or a frozen array/hash</td><td><code>enum E { A, B }</code></td></tr>
  <tr><td>All values</td><td><code>E::ALL</code> (hand-rolled)</td><td><code>E.values()</code></td></tr>
  <tr><td>Parse a name</td><td>hand-rolled <code>%i[a b].include?(:a)</code></td><td><code>E.valueOf(name)</code></td></tr>
  <tr><td>Name of a constant</td><td><code>:a.to_s</code></td><td><code>E.A.name()</code></td></tr>
  <tr><td>Attach data</td><td>side hash keyed by symbol</td><td>fields + constructor on the enum</td></tr>
  <tr><td>Exhaustive branch</td><td><code>case</code>/<code>when</code>, no exhaustiveness check</td><td><code>switch</code> (no default needed)</td></tr>
</table>
<p>The mental shift: a Ruby symbol is just a label — nothing enforces that
<code>:mercury</code> is one of a fixed set, and a typo like
<code>:mercery</code> silently becomes a new, wrong "value" instead of a
compile error. A Java enum constant <em>is</em> an object, checked by the
compiler, that can carry its own data. That is why
<code>Planet.EARTH.surfaceGravity()</code> reads as a method call, not a hash
lookup. <code>valueOf</code> throws <code>IllegalArgumentException</code> on an
unknown name (unlike a silent <code>nil</code> from a missed hash key), and an
enum <code>switch</code> that covers every constant is checked for
exhaustiveness by the compiler.</p>`,
};
