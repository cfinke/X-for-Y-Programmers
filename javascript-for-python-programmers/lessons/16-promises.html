  title: "Promises",

  intro: `
<p>Python's closest cousin to a Promise is an <code>asyncio</code> awaitable —
a coroutine, <code>Task</code>, or <code>Future</code>. But there's a runtime
difference that trips people up: a bare Python coroutine
(<code>some_async_fn()</code>) is <em>lazy</em> — it does nothing at all until
you <code>await</code> it or schedule it with
<code>asyncio.create_task(...)</code>. A JavaScript Promise is <em>eager</em> —
the executor passed to <code>new Promise(...)</code> (or whatever kicked it off)
starts running the instant you create it, whether or not anything ever calls
<code>.then</code> on it. A Promise is just an object with a settled state
(<em>pending</em>, <em>fulfilled</em>, or <em>rejected</em>) and a value — no
event loop object required to build one; <code>Promise.resolve</code> and
<code>Promise.reject</code> hand you an already-settled Promise directly.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td>coroutine does nothing until <code>await</code>ed (lazy)</td><td>Promise's work starts immediately (eager)</td></tr>
  <tr><td><code>await asyncio.sleep(0); return 1</code></td><td><code>Promise.resolve(1)</code> — settled immediately, no event loop needed</td></tr>
  <tr><td><code>except Exception as e:</code> — <code>e</code> is whatever was raised</td><td>reject with anything; <code>catch</code> receives it as-is</td></tr>
  <tr><td><code>await asyncio.gather(*aws)</code> → <code>list</code></td><td><code>Promise.all([...])</code> resolves to a plain array</td></tr>
</table>
<p>Two runtime facts worth knowing up front. First, <code>then</code> always
returns a <em>new</em> Promise, and if your callback returns a value that value
becomes the next Promise's fulfillment — returning a Promise flattens it, there
is no Promise-of-a-Promise, similar to how <code>await</code>ing an awaitable
that itself returns an awaitable does not double-wrap it. Second, a
<code>throw</code> inside a <code>then</code> callback turns into a rejection of
the returned Promise, which is why <code>catch</code> can sit at the end of a
chain and catch anything above it — the same role a single enclosing
<code>try</code>/<code>except</code> plays around a sequence of
<code>await</code>s in Python.</p>`,

  python: `async def double(n: int) -> int:
    return n * 2


async def safe_divide(a: float, b: float) -> float:
    if b == 0:
        raise ValueError("divide by zero")
    return a / b


async def first_done(tasks: list[asyncio.Task]) -> int:
    done, _pending = await asyncio.wait(tasks, return_when=asyncio.FIRST_COMPLETED)
    return done.pop().result()`,

  task: `
<p>Everything here settles immediately — no timers. Build a few functions that
exercise the Promise API — the JavaScript equivalent of the
<code>asyncio</code> patterns you already know, but built on
<code>.then</code>/<code>.catch</code> callbacks instead of <code>await</code>,
and eager instead of lazy.</p>
<ol>
  <li><code>double(n)</code> — return a Promise that <strong>fulfills</strong> with
      <code>n * 2</code> (use <code>Promise.resolve</code>).</li>
  <li><code>safeDivide(a, b)</code> — return a Promise. If <code>b</code> is
      <code>0</code>, <strong>reject</strong> with <code>new Error("divide by zero")</code>
      (use <code>Promise.reject</code>); otherwise resolve with <code>a / b</code>.</li>
  <li><code>chainDouble(n)</code> — call <code>double(n)</code> and use
      <code>.then(...)</code> to return a Promise that fulfills with the doubled
      value <em>plus 1</em>.</li>
  <li><code>divideOrDefault(a, b, fallback)</code> — call <code>safeDivide</code>
      and use <code>.catch(...)</code> so that on rejection it fulfills with
      <code>fallback</code> instead.</li>
  <li><code>sumAll(promises)</code> — use <code>Promise.all</code> to wait for an
      array of number-promises, then resolve with their sum.</li>
  <li><code>describeSettled(promises)</code> — use <code>Promise.allSettled</code>
      and resolve with an array of strings: <code>"ok:&lt;value&gt;"</code> for each
      fulfilled entry and <code>"err:&lt;message&gt;"</code> for each rejected one.</li>
</ol>`,

  exportNames: ["double", "safeDivide", "chainDouble", "divideOrDefault", "sumAll", "describeSettled"],

  requirements: [
    { pattern: /Promise\.resolve/, message: "Use Promise.resolve" },
    { pattern: /Promise\.reject/, message: "Use Promise.reject for the divide-by-zero case" },
    { pattern: /\.then\s*\(/, message: "Use .then to chain in chainDouble" },
    { pattern: /\.catch\s*\(/, message: "Use .catch in divideOrDefault" },
    { pattern: /Promise\.all\b/, message: "Use Promise.all in sumAll" },
    { pattern: /Promise\.allSettled/, message: "Use Promise.allSettled in describeSettled" },
  ],

  tests: [
    { name: "double(21) fulfills with 42", run: async (x) => expectEqual(await x.double(21), 42) },
    { name: "safeDivide(10, 2) fulfills with 5", run: async (x) => expectEqual(await x.safeDivide(10, 2), 5) },
    {
      name: "safeDivide(1, 0) rejects with the right message",
      run: async (x) => {
        let msg = null;
        await x.safeDivide(1, 0).catch((e) => { msg = e.message; });
        expectEqual(msg, "divide by zero");
      },
    },
    { name: "chainDouble(20) fulfills with 41", run: async (x) => expectEqual(await x.chainDouble(20), 41) },
    { name: "divideOrDefault(8, 2, -1) fulfills with 4", run: async (x) => expectEqual(await x.divideOrDefault(8, 2, -1), 4) },
    { name: "divideOrDefault(8, 0, -1) falls back to -1", run: async (x) => expectEqual(await x.divideOrDefault(8, 0, -1), -1) },
    {
      name: "sumAll resolves the total",
      run: async (x) => expectEqual(await x.sumAll([Promise.resolve(1), Promise.resolve(2), Promise.resolve(3)]), 6),
    },
    {
      name: "describeSettled reports ok and err entries",
      run: async (x) => expectDeepEqual(
        await x.describeSettled([Promise.resolve(7), Promise.reject(new Error("nope"))]),
        ["ok:7", "err:nope"]
      ),
    },
  ],

  solution: `function double(n) {
  return Promise.resolve(n * 2);
}

function safeDivide(a, b) {
  if (b === 0) return Promise.reject(new Error("divide by zero"));
  return Promise.resolve(a / b);
}

function chainDouble(n) {
  return double(n).then((d) => d + 1);
}

function divideOrDefault(a, b, fallback) {
  return safeDivide(a, b).catch(() => fallback);
}

function sumAll(promises) {
  return Promise.all(promises).then((values) => values.reduce((t, v) => t + v, 0));
}

function describeSettled(promises) {
  return Promise.allSettled(promises).then((results) =>
    results.map((r) =>
      r.status === "fulfilled" ? "ok:" + r.value : "err:" + r.reason.message
    )
  );
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Already-settled value</td><td>no direct equivalent — closest is a coroutine that returns immediately</td><td><code>Promise.resolve(1)</code></td></tr>
  <tr><td>Rejection value</td><td>whatever you <code>raise</code>d (also unenforced at runtime, even if annotated)</td><td>whatever you rejected with</td></tr>
  <tr><td>Chaining</td><td>sequential <code>await</code> statements in one coroutine</td><td><code>then</code> returns a new Promise; returned values flatten</td></tr>
  <tr><td>Wait for all</td><td><code>await asyncio.gather(*aws)</code></td><td>resolves to a plain array, rejects on first failure</td></tr>
  <tr><td>Wait for all, keep errors</td><td><code>await asyncio.gather(*aws, return_exceptions=True)</code></td><td><code>Promise.allSettled</code> → <code>{status, value|reason}[]</code>, never rejects</td></tr>
  <tr><td>First to settle</td><td><code>await asyncio.wait(aws, return_when=asyncio.FIRST_COMPLETED)</code></td><td><code>Promise.race</code> settles with the first result, win or lose</td></tr>
</table>
<p>Reach for <code>Promise.all</code> when you need every result and one failure
should sink the whole thing — it plays the same role as
<code>asyncio.gather</code> without <code>return_exceptions=True</code>. Reach
for <code>Promise.allSettled</code> when you want to inspect each outcome — its
result objects are <code>{ status: "fulfilled", value }</code> or
<code>{ status: "rejected", reason }</code>, the same idea as
<code>gather(..., return_exceptions=True)</code> mixing results and exception
objects in one list. <code>Promise.race</code> settles as soon as the first
input does, whether that first one fulfills or rejects — the counterpart to
<code>asyncio.wait(..., return_when=asyncio.FIRST_COMPLETED)</code>.</p>
<p>Runtime gotcha with no clean Python parallel: <code>Promise.reject(x)</code>
creates an already-rejected Promise, and if nothing ever attaches a
<code>catch</code> to it you get an "unhandled rejection" warning — somewhat
like asyncio's own "Task exception was never retrieved" warning when a
<code>Task</code>'s exception is never awaited or checked, except JavaScript
raises it for <em>any</em> unattached rejection, not just ones tied to a
scheduled task. And because a thrown error inside <code>then</code> becomes a
rejection, a single trailing <code>.catch</code> (or <code>try/await/catch</code>)
covers the whole chain above it.</p>`,
};
