<script>
const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>Python lets you define a function three ways too, but they don't map neatly
onto JavaScript's three forms. A <code>def</code> becomes either a function
declaration or a function expression, and <code>lambda</code> becomes an
arrow function — except arrows are strictly better than lambdas, since they
can hold multiple statements in a <code>{ }</code> body and aren't limited to
a single expression. This lesson is about the three ways to make a function,
plus the two parameter forms you reach for most: defaults and rest.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>def add(a, b): return a + b</code></td><td><code>function add(a, b) {}</code></td></tr>
  <tr><td><code>double = lambda n: n * 2</code></td><td><code>const double = (n) =&gt; n * 2;</code></td></tr>
  <tr><td><code>def greet(name="friend"):</code></td><td><code>function greet(name = "friend") {}</code></td></tr>
  <tr><td><code>def total(*xs): return sum(xs)</code></td><td><code>function sum(...xs) {}</code></td></tr>
</table>
<p>All three forms — declarations, function expressions, and arrow functions —
produce a callable value you can pass around, return, and store. The behavior
Python programmers need to relearn: declarations <em>hoist</em> (you can call
them before their line, unlike a Python <code>def</code> that must run first),
arrow functions have no <code>this</code> or <code>arguments</code> of their
own, and a default only kicks in when the argument is <code>undefined</code>
— never for <code>None</code>'s counterpart <code>null</code>, and never for
<code>0</code> or <code>""</code>, both of which Python would also accept as
real arguments but JavaScript's default rule treats the same way regardless.</p>`,

  python: `def add(a, b):
    return a + b

double = lambda n: n * 2

def greet(name="friend"):
    return f"Hi, {name}"

def total(*xs):
    return sum(xs)`,

  task: `
<p>Write the plain-JavaScript versions — no type hints anywhere:</p>
<ol>
  <li>A function declaration <code>add(a, b)</code> that returns their sum.</li>
  <li>An arrow function stored in a <code>const double</code> that returns
      <code>n * 2</code>.</li>
  <li><code>greet(name)</code> with a <em>default parameter</em> of
      <code>"friend"</code>, returning a string like <code>"Hi, Ada"</code>.</li>
  <li><code>sum(...xs)</code> using a <em>rest parameter</em> that returns the
      total of every argument (<code>0</code> when called with none).</li>
</ol>`,

  starter: `// 1. declaration: add(a, b) -> a + b
function add(a, b) {
  // TODO
  return 0;
}

// 2. arrow function: double(n) -> n * 2
const double = (n) => {
  // TODO
  return 0;
};

// 3. default parameter: greet(name = "friend") -> "Hi, <name>"
function greet(name) {
  // TODO
  return "";
}

// 4. rest parameter: sum(...xs) -> total of all arguments
function sum() {
  // TODO
  return 0;
}
`,

  exportNames: ["add", "double", "greet", "sum"],

  requirements: [
    { pattern: /const\s+double\s*=\s*\(?\s*n\s*\)?\s*=>/, message: "Define double as an arrow function" },
    { pattern: /function\s+greet\s*\(\s*name\s*=\s*["']friend["']\s*\)/, message: "Give greet a default parameter of \"friend\"" },
    { pattern: /function\s+sum\s*\(\s*\.\.\.[A-Za-z_$][\w$]*\s*\)/, message: "Use a rest parameter in sum" },
  ],

  tests: [
    { name: "add(2, 3) is 5", run: (x) => expectEqual(x.add(2, 3), 5) },
    { name: "double(21) is 42", run: (x) => expectEqual(x.double(21), 42) },
    { name: 'greet("Ada") is "Hi, Ada"', run: (x) => expectEqual(x.greet("Ada"), "Hi, Ada") },
    { name: 'greet() falls back to "Hi, friend"', run: (x) => expectEqual(x.greet(), "Hi, friend") },
    { name: "sum() with no args is 0", run: (x) => expectEqual(x.sum(), 0) },
    { name: "sum(1, 2, 3, 4) is 10", run: (x) => expectEqual(x.sum(1, 2, 3, 4), 10) },
    { name: "double is a function value", run: (x) => expectEqual(typeof x.double, "function") },
  ],

  solution: `function add(a, b) {
  return a + b;
}

const double = (n) => n * 2;

function greet(name = "friend") {
  return \`Hi, \${name}\`;
}

function sum(...xs) {
  return xs.reduce((total, x) => total + x, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript</th></tr>
  <tr><td>Declaration</td><td><code>def add(a, b):</code></td><td><code>function add(a, b)</code> (hoisted)</td></tr>
  <tr><td>Arrow expression</td><td><code>f = lambda n: n * 2</code></td><td><code>const f = (n) =&gt; n * 2</code> (not hoisted, multi-statement)</td></tr>
  <tr><td>Default param</td><td><code>name="friend"</code></td><td><code>name = "friend"</code></td></tr>
  <tr><td>Rest param</td><td><code>*xs</code> (a tuple)</td><td><code>...xs</code> (a real array)</td></tr>
  <tr><td>Missing return</td><td>returns <code>None</code></td><td>returns <code>undefined</code></td></tr>
</table>
<p>Two runtime gotchas Python doesn't prepare you for. First, defaults trigger
only on <code>undefined</code>, not on JavaScript's <code>null</code>:
<code>greet(null)</code> returns <code>"Hi, null"</code>, not
<code>"Hi, friend"</code> — Python's <code>None</code> has no such special
case, since a missing argument in Python simply never binds. Second, a rest
parameter is a genuine <code>Array</code>, not a tuple, so you can call
<code>.reduce</code>, <code>.map</code>, or <code>.length</code> on it
directly — closer to Python's <code>list(xs)</code> than to the tuple
<code>*xs</code> actually produces. And because arrow functions capture no
<code>this</code> of their own, they are the idiomatic choice for the little
callbacks you hand to array methods, playing the same role Python's
<code>lambda</code> plays inside <code>map</code> or <code>sorted</code>.</p>`,
};
