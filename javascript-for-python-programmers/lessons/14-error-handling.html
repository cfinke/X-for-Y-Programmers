const LESSON = {
  number: 14,
  title: "Error Handling",

  intro: `
<p>Python's exception handling maps onto JavaScript's almost keyword for
keyword: <code>try</code> stays <code>try</code>, <code>except</code> becomes
<code>catch</code>, <code>finally</code> stays <code>finally</code>, and
<code>raise</code> becomes <code>throw</code>. The big difference is what you
are allowed to raise. Python restricts you to <code>BaseException</code>
subclasses — <code>raise "boom"</code> is a <code>TypeError</code>. JavaScript
has no such rule: <strong>you can <code>throw</code> <em>any</em> value at
all</strong> — a string, a number, a plain object — and whatever a
<code>catch</code> block receives could be any of those. There is no
guarantee it is even an <code>Error</code>.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>except ValueError as e:</code></td><td><code>catch (e) { /* e is whatever was thrown */ }</code></td></tr>
  <tr><td><code>raise ValueError("x")</code></td><td><code>throw new Error("x");</code></td></tr>
  <tr><td><code>except ValueError:</code> filters by type</td><td><code>instanceof</code> is a real runtime check</td></tr>
  <tr><td><code>class Foo(Exception): ...</code></td><td>subclass <code>Error</code>, set <code>this.name</code></td></tr>
</table>
<p>Because <code>catch</code> has no equivalent to Python's
<code>except ValueError:</code> filtering, idiomatic JavaScript checks the
caught value before trusting it: <code>if (e instanceof ValidationError)</code>.
An <code>Error</code> object carries a <code>name</code> and a
<code>message</code>; a custom subclass sets its own <code>name</code> so
callers can tell your errors apart from someone else's — the equivalent of
Python subclassing <code>Exception</code>.</p>`,

  python: `class ValidationError(Exception):
    def __init__(self, message):
        super().__init__(message)


def check_age(age):
    if not isinstance(age, (int, float)) or age != age:  # NaN check
        raise ValidationError("age must be a number")
    if age < 0:
        raise ValidationError("age must not be negative")
    return age


def safe_check_age(age, fallback):
    try:
        return check_age(age)
    except ValidationError:
        return fallback`,

  task: `
<p>Build a tiny validation layer that throws, catches, and reports.</p>
<ol>
  <li>Define <code>ValidationError</code>, a subclass of <code>Error</code>.
      Its constructor takes a message, calls <code>super(message)</code>, and
      sets <code>this.name = "ValidationError"</code>.</li>
  <li>Write <code>checkAge(age)</code>: if <code>age</code> is not a number (use
      <code>typeof</code>) or is <code>NaN</code>, throw a
      <code>ValidationError("age must be a number")</code>. If it is negative,
      throw a <code>ValidationError("age must not be negative")</code>.
      Otherwise return <code>age</code>.</li>
  <li>Write <code>safeCheckAge(age, fallback)</code>: run <code>checkAge</code>
      inside a <code>try</code>; if it throws, return <code>fallback</code>.</li>
  <li>Write <code>describeError(fn)</code>: call <code>fn()</code> inside a
      <code>try</code>. If it throws, return the error's
      <code>name + ": " + message</code>. Use a <code>finally</code> block that
      is harmless here (e.g. a no-op) but must run either way. If nothing throws,
      return <code>"ok"</code>.</li>
</ol>`,

  starter: `// 1. Custom error subclass
class ValidationError extends Error {
  constructor(message) {
    // TODO: call super and set this.name
  }
}

// 2. Validator that throws
function checkAge(age) {
  // TODO
  return age;
}

// 3. Safe wrapper that catches and returns a fallback
function safeCheckAge(age, fallback) {
  // TODO
  return fallback;
}

// 4. Report an error as "name: message", or "ok"
function describeError(fn) {
  // TODO
  return "ok";
}
`,

  exportNames: ["ValidationError", "checkAge", "safeCheckAge", "describeError"],

  requirements: [
    { pattern: /class\s+ValidationError\s+extends\s+Error/, message: "ValidationError must extend Error" },
    { pattern: /throw\s+new\s+ValidationError/, message: "checkAge must throw a ValidationError" },
    { pattern: /catch\s*\(/, message: "Use a try/catch block" },
    { pattern: /finally/, message: "describeError must use a finally block" },
  ],

  tests: [
    { name: "checkAge(36) returns 36", run: (x) => expectEqual(x.checkAge(36), 36) },
    { name: "checkAge(-1) throws", run: (x) => expectThrows(() => x.checkAge(-1)) },
    { name: 'checkAge("x") throws', run: (x) => expectThrows(() => x.checkAge("x")) },
    { name: "checkAge(NaN) throws", run: (x) => expectThrows(() => x.checkAge(NaN)) },
    { name: "thrown value is a ValidationError instance", run: (x) => {
        try { x.checkAge(-5); } catch (e) { expectTruthy(e instanceof x.ValidationError); return; }
        throw new Error("expected checkAge(-5) to throw");
      } },
    { name: "ValidationError carries name and message", run: (x) => {
        const err = new x.ValidationError("nope");
        expectEqual(err.name, "ValidationError");
        expectEqual(err.message, "nope");
      } },
    { name: "safeCheckAge returns value when valid", run: (x) => expectEqual(x.safeCheckAge(20, 0), 20) },
    { name: "safeCheckAge returns fallback when invalid", run: (x) => expectEqual(x.safeCheckAge(-3, 0), 0) },
    { name: "describeError reports name: message", run: (x) => expectEqual(x.describeError(() => x.checkAge(-1)), "ValidationError: age must not be negative") },
    { name: "describeError returns ok when no throw", run: (x) => expectEqual(x.describeError(() => 42), "ok") },
  ],

  solution: `class ValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = "ValidationError";
  }
}

function checkAge(age) {
  if (typeof age !== "number" || Number.isNaN(age)) {
    throw new ValidationError("age must be a number");
  }
  if (age < 0) {
    throw new ValidationError("age must not be negative");
  }
  return age;
}

function safeCheckAge(age, fallback) {
  try {
    return checkAge(age);
  } catch (e) {
    return fallback;
  }
}

function describeError(fn) {
  try {
    fn();
    return "ok";
  } catch (e) {
    return e.name + ": " + e.message;
  } finally {
    // always runs; harmless here
    void 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript</th></tr>
  <tr><td>Caught value</td><td>filtered by <code>except Type:</code></td><td>could be anything thrown</td></tr>
  <tr><td>Narrowing</td><td>the <code>except</code> clause itself</td><td><code>instanceof</code> at runtime</td></tr>
  <tr><td>Custom error</td><td>class extends <code>Exception</code></td><td>class extends <code>Error</code>, plus set <code>this.name</code></td></tr>
  <tr><td>Cleanup</td><td><code>finally</code></td><td><code>finally</code> (same)</td></tr>
</table>
<p>Three runtime facts worth internalizing. First, <code>finally</code> runs
whether the <code>try</code> returns, throws, or falls through — same as
Python, it is where you release resources. Second, JavaScript's
<code>catch (e)</code> has no equivalent to Python's
<code>except ValueError:</code> — it catches everything regardless of what was
thrown, so idiomatic code always throws an <code>Error</code> (or a subclass)
that carries a <code>name</code>, a <code>message</code>, and a stack, rather
than a bare string or number. Third, because <code>catch</code> cannot filter
by type the way Python's <code>except</code> clause can, guard with
<code>instanceof</code> before reading properties:
<code>if (e instanceof ValidationError)</code> is the JavaScript way of doing
what <code>except ValidationError:</code> does for free in Python.</p>
<p>One subtlety: setting <code>this.name</code> in the subclass constructor is
what makes <code>err.name</code> read <code>"ValidationError"</code> instead of
the inherited <code>"Error"</code>. Python gives you this automatically — an
instance of a custom exception class already reports its own class name —
but JavaScript does not, so without the explicit assignment your custom error
is indistinguishable by name from a plain one.</p>`,
};
