const LESSON = {
  number: 4,
  title: "Objects",

  intro: `
<p>In Python you would reach for a <code>dict</code> to hold a bag of named
values, keyed by strings. JavaScript's object literal plays that same role,
but it is also the thing classes and JSON are built from — there is no
separate "dict type" to import, and no <code>dict.get(key, default)</code>
helper baked in. A plain-JavaScript object is just a set of string keys
pointing at values, with no schema watching over it, much like a Python
<code>dict</code> with no type hints.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>user = {"name": "Ann"}</code></td><td><code>const user = { name: "Ann" };</code></td></tr>
  <tr><td><code>user["name"]</code></td><td><code>user.name</code> or <code>user["name"]</code></td></tr>
  <tr><td>missing key = <code>KeyError</code></td><td>missing key = <code>undefined</code></td></tr>
  <tr><td><code>"name" in user</code></td><td><code>"name" in user</code></td></tr>
</table>
<p>Because there is no exception on a missing key, reading one that is not
there does not throw — it quietly returns <code>undefined</code>, unlike
Python's <code>dict</code> which raises <code>KeyError</code> (or needs
<code>.get</code>). That is why the runtime tools matter: the <code>in</code>
operator to ask whether a key exists, bracket access for keys you compute as
strings, and <code>Object.keys</code> / <code>Object.values</code> /
<code>Object.entries</code> — JavaScript's answers to <code>dict.keys()</code>,
<code>dict.values()</code>, and <code>dict.items()</code> — to walk an object
whose shape you do not know ahead of time.</p>`,

  python: `def make_product(name, price):
    return {"name": name, "price": price}

def has_key(obj, key):
    return key in obj

def total(prices):
    return sum(prices.values())`,

  task: `
<p>Build a few small functions that create and inspect plain objects — the
JavaScript equivalent of working with a Python <code>dict</code>:</p>
<ol>
  <li><code>makeProduct(name, price)</code> — return an object
      <code>{ name, price }</code> using property shorthand.</li>
  <li><code>rename(product, newName)</code> — return a <em>new</em> object like
      <code>product</code> but with <code>name</code> set to <code>newName</code>
      (do not mutate the original).</li>
  <li><code>tag(key, value)</code> — return an object with a single
      <em>computed</em> key: the key is whatever string <code>key</code> holds.</li>
  <li><code>hasKey(obj, key)</code> — return <code>true</code>/<code>false</code>
      for whether <code>key</code> exists on <code>obj</code>, using the
      <code>in</code> operator.</li>
  <li><code>total(prices)</code> — given an object whose values are numbers,
      return the sum of all its values using <code>Object.values</code>.</li>
</ol>`,

  starter: `// 1. makeProduct(name, price) -> { name, price } (property shorthand)

  // TODO
  return {};
}

// 2. rename(product, newName) -> a new object, original untouched

// 3. tag(key, value) -> object with a computed key

  return {};
}

// 4. hasKey(obj, key) -> boolean, using the 'in' operator

  return 0;

`,

  exportNames: ["makeProduct", "rename", "tag", "hasKey", "total"],

  requirements: [
    { pattern: /\{\s*name\s*,\s*price\s*\}/, message: "Use property shorthand { name, price } in makeProduct" },
    { pattern: /\[\s*key\s*\]\s*:/, message: "Use a computed key [key]: value in tag" },
    { pattern: /\bin\b/, message: "Use the in operator inside hasKey" },
    { pattern: /Object\.values/, message: "Use Object.values inside total" },
  ],

  tests: [
    { name: "makeProduct builds { name, price }", run: (x) => expectDeepEqual(x.makeProduct("Pen", 3), { name: "Pen", price: 3 }) },
    { name: "rename returns a new name", run: (x) => expectEqual(x.rename({ name: "Pen", price: 3 }, "Pencil").name, "Pencil") },
    { name: "rename keeps other fields", run: (x) => expectEqual(x.rename({ name: "Pen", price: 3 }, "Pencil").price, 3) },
    { name: "rename does not mutate the original", run: (x) => {
      const p = { name: "Pen", price: 3 };
      x.rename(p, "Pencil");
      expectEqual(p.name, "Pen");
    } },
    { name: "tag uses a computed key", run: (x) => expectDeepEqual(x.tag("color", "red"), { color: "red" }) },
    { name: "hasKey is true for present keys", run: (x) => expectEqual(x.hasKey({ a: 1 }, "a"), true) },
    { name: "hasKey is false for missing keys", run: (x) => expectEqual(x.hasKey({ a: 1 }, "b"), false) },
    { name: "total sums the values", run: (x) => expectEqual(x.total({ pen: 3, ink: 5, pad: 2 }), 10) },
    { name: "total of an empty object is 0", run: (x) => expectEqual(x.total({}), 0) },
  ],

  solution: `function makeProduct(name, price) {
  return { name, price };
}

function rename(product, newName) {
  return { ...product, name: newName };
}

function tag(key, value) {
  return { [key]: value };
}

function hasKey(obj, key) {
  return key in obj;
}

function total(prices) {
  return Object.values(prices).reduce((sum, n) => sum + n, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript</th></tr>
  <tr><td>Literal</td><td><code>{ "name": name }</code></td><td><code>{ name }</code> (shorthand when the key matches the variable name)</td></tr>
  <tr><td>Computed key</td><td><code>{ k: v }</code> (any hashable expression)</td><td><code>{ [k]: v }</code> keyed by <code>String(k)</code></td></tr>
  <tr><td>Read a missing key</td><td><code>KeyError</code> (or <code>.get(k)</code> returns <code>None</code>)</td><td><code>undefined</code>, no exception</td></tr>
  <tr><td>Key existence</td><td><code>"k" in d</code></td><td><code>"k" in obj</code></td></tr>
  <tr><td>Enumerate keys</td><td><code>d.keys()</code> — insertion order</td><td><code>Object.keys(o)</code> — insertion order</td></tr>
</table>
<p>The trio <code>Object.keys</code>, <code>Object.values</code>, and
<code>Object.entries</code> map onto Python's <code>dict.keys()</code>,
<code>dict.values()</code>, and <code>dict.items()</code>. Both languages
preserve insertion order, though JavaScript has a quirk: integer-like string
keys are sorted numerically first, ahead of everything else.
<code>Object.entries(o)</code> gives <code>[key, value]</code> pairs, which
pairs nicely with <code>for (const [k, v] of Object.entries(o))</code> — the
same shape as Python's <code>for k, v in d.items():</code>.</p>
<p>Two runtime gotchas worth remembering: <code>obj.foo</code> and
<code>obj["foo"]</code> are identical — brackets just let the key be a computed
string, the same relationship as <code>d["foo"]</code> being the only option in
Python (there is no dot access on a plain <code>dict</code>). And
<code>key in obj</code> is not the same as <code>obj[key] !== undefined</code>:
a key can exist while holding the value <code>undefined</code>, so
<code>in</code> is the honest existence check — just as Python's <code>"k" in d</code>
is the honest check even when <code>d["k"] is None</code>.</p>`,
};
