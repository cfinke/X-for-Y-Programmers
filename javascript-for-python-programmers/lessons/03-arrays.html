const LESSON = {
  number: 3,
  title: "Arrays",

  intro: `
<p>Python gives you two different list-like tools depending on what you need:
a mutable <code>list</code> for a growable sequence, and an immutable
<code>tuple</code> when the shape shouldn't change. JavaScript collapses both
into one: a plain <code>Array</code> object whose elements can be anything,
whose length grows and shrinks on demand, and which has no concept of a
"fixed" or "frozen" version of itself.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>xs = [1, 2, 3]</code></td><td><code>const xs = [1, 2, 3];</code></td></tr>
  <tr><td><code>xs.append("no")</code> — list, always allowed</td><td><code>xs.push("no")</code> — allowed, array now mixed</td></tr>
  <tr><td><code>t = (0, 0)</code> — tuple, immutable</td><td><code>const t = [0, 0];</code> (just an array, still mutable)</td></tr>
  <tr><td>list vs. tuple mutability is enforced</td><td>every array is mutable; discipline is up to you</td></tr>
</table>
<p>The runtime skill that matters most is knowing which methods <em>mutate</em> the
array in place and which return a fresh copy. <code>push</code>, <code>pop</code>,
<code>shift</code>, and <code>unshift</code> change the array you call them on —
much like Python's <code>list.append</code>, <code>list.pop</code>, and
<code>list.insert(0, v)</code> mutate a list in place. <code>slice</code> and
<code>concat</code> leave the original untouched and hand back a new array,
similar to Python's slicing (<code>xs[1:]</code>) or <code>xs + ys</code>. Because
JavaScript has no separate immutable sequence type the way Python has tuples,
nothing stops you from accidentally mutating shared state — you have to track
it yourself.</p>`,

  python: `nums = [10, 20, 30]

def appended(xs, value):
    return xs + [value]  # non-mutating copy

def has(xs, value):
    return value in xs

def labels(xs):
    return ", ".join(str(x) for x in xs)`,

  task: `
<p>Write the JavaScript runtime versions of the equivalent Python list operations.</p>
<ol>
  <li>Export <code>nums</code>, an array literal <code>[10, 20, 30]</code>.</li>
  <li><code>pushed(xs, value)</code> — call <code>xs.push(value)</code> so it
      <em>mutates</em> <code>xs</code>, then return <code>xs</code>. (This proves
      push changes the original, unlike Python's <code>xs + [value]</code>.)</li>
  <li><code>withoutFirst(xs)</code> — return a <em>copy</em> of <code>xs</code>
      with the first element removed, using <code>slice</code>, so the original
      is left intact (like Python's <code>xs[1:]</code>).</li>
  <li><code>has(xs, value)</code> — return whether <code>value</code> is in
      <code>xs</code> using <code>includes</code> (like Python's <code>value in xs</code>).</li>
  <li><code>positionOf(xs, value)</code> — return the index of <code>value</code>
      using <code>indexOf</code> (<code>-1</code> if absent, unlike Python's
      <code>xs.index(value)</code>, which raises <code>ValueError</code>).</li>
  <li><code>labels(xs)</code> — return the elements joined into one string with
      <code>", "</code> using <code>join</code> (like Python's
      <code>", ".join(...)</code>, but the method lives on the array instead of
      the separator string).</li>
</ol>`,

  starter: `// 1. nums
const nums = [10, 20, 30];

// 2. pushed(xs, value) -> mutates xs with push, returns xs
function pushed(xs, value) {
  // TODO
  return xs;
}

// 3. withoutFirst(xs) -> a slice copy without the first element
function withoutFirst(xs) {
  // TODO
  return [];
}

// 4. has(xs, value) -> boolean, using includes

  return false;
}

// 5. positionOf(xs, value) -> index or -1, using indexOf
function positionOf(xs, value) {
  // TODO
  return -1;
}

// 6. labels(xs) -> elements joined by ", "

  // TODO
  return "";
}
`,

  exportNames: ["nums", "pushed", "withoutFirst", "has", "positionOf", "labels"],

  requirements: [
    { pattern: /\.push\s*\(/, message: "Use .push() inside pushed" },
    { pattern: /\.slice\s*\(/, message: "Use .slice() inside withoutFirst" },
    { pattern: /\.includes\s*\(/, message: "Use .includes() inside has" },
    { pattern: /\.indexOf\s*\(/, message: "Use .indexOf() inside positionOf" },
    { pattern: /\.join\s*\(/, message: "Use .join() inside labels" },
  ],

  tests: [
    { name: "nums is [10, 20, 30]", run: (x) => expectDeepEqual(x.nums, [10, 20, 30]) },
    { name: "pushed appends and returns the array", run: (x) => expectDeepEqual(x.pushed([1, 2], 3), [1, 2, 3]) },
    { name: "pushed mutates the original array", run: (x) => {
      const a = [1, 2];
      x.pushed(a, 3);
      expectDeepEqual(a, [1, 2, 3]);
    } },
    { name: "withoutFirst drops the first element", run: (x) => expectDeepEqual(x.withoutFirst([10, 20, 30]), [20, 30]) },
    { name: "withoutFirst does NOT mutate the original (slice copies)", run: (x) => {
      const a = [10, 20, 30];
      x.withoutFirst(a);
      expectDeepEqual(a, [10, 20, 30]);
    } },
    { name: "has finds a present value", run: (x) => expectEqual(x.has([10, 20, 30], 20), true) },
    { name: "has rejects an absent value", run: (x) => expectEqual(x.has([10, 20, 30], 99), false) },
    { name: "positionOf returns the index", run: (x) => expectEqual(x.positionOf([10, 20, 30], 30), 2) },
    { name: "positionOf returns -1 when absent", run: (x) => expectEqual(x.positionOf([10, 20, 30], 99), -1) },
    { name: "labels joins with a comma and space", run: (x) => expectEqual(x.labels([10, 20, 30]), "10, 20, 30") },
  ],

  solution: `const nums = [10, 20, 30];

function pushed(xs, value) {
  xs.push(value);
  return xs;
}

function withoutFirst(xs) {
  return xs.slice(1);
}

function has(xs, value) {
  return xs.includes(value);
}

function positionOf(xs, value) {
  return xs.indexOf(value);
}

function labels(xs) {
  return xs.join(", ");
}
`,

  notes: `
<table>
  <tr><th>Operation</th><th>Method</th><th>Mutates?</th></tr>
  <tr><td>Add to end</td><td><code>xs.push(v)</code></td><td>yes — returns new length</td></tr>
  <tr><td>Remove from end</td><td><code>xs.pop()</code></td><td>yes — returns the element</td></tr>
  <tr><td>Remove from front</td><td><code>xs.shift()</code></td><td>yes — returns the element</td></tr>
  <tr><td>Add to front</td><td><code>xs.unshift(v)</code></td><td>yes — returns new length</td></tr>
  <tr><td>Copy a range</td><td><code>xs.slice(start, end)</code></td><td>no — returns a new array</td></tr>
  <tr><td>Join two arrays</td><td><code>xs.concat(ys)</code></td><td>no — returns a new array</td></tr>
</table>
<p>A useful mental rule: the four <em>verbs of place</em> — push/pop/shift/unshift —
mutate; the two <em>copy</em> methods — slice/concat — do not. This maps closely
onto Python's own split: <code>list.append</code>/<code>list.pop</code> mutate,
while slicing (<code>xs[1:]</code>) and concatenation (<code>xs + ys</code>) build
new lists. When you want a non-mutating "add" in JavaScript, prefer the spread
copy <code>[...xs, v]</code> over <code>push</code>, exactly as
<code>xs + [v]</code> does in Python.</p>
<table>
  <tr><th>Query</th><th>Python</th><th>JavaScript runtime</th></tr>
  <tr><td>Membership</td><td><code>v in xs</code> → <code>bool</code></td><td><code>xs.includes(v)</code> → <code>true</code>/<code>false</code></td></tr>
  <tr><td>Position</td><td><code>xs.index(v)</code> → raises <code>ValueError</code> if absent</td><td><code>xs.indexOf(v)</code> → index or <code>-1</code></td></tr>
  <tr><td>Stringify</td><td><code>sep.join(str(x) for x in xs)</code> → <code>str</code></td><td><code>xs.join(sep)</code> → <code>string</code></td></tr>
</table>
<p>One runtime gotcha Python handles differently: JavaScript's <code>includes</code>
and <code>indexOf</code> compare with strict equality (<code>===</code>) plus a
special case that lets <code>includes</code> find <code>NaN</code> while
<code>indexOf</code> cannot — Python's <code>in</code> and <code>index</code> use
<code>==</code>, and <code>float('nan') == float('nan')</code> is <code>False</code>
either way. Also, unlike Python's <code>len(xs)</code>, JavaScript's
<code>.length</code> is a live, writable property on the array itself —
<code>xs.length = 0</code> empties the array in place. None of that shows up
until the program runs.</p>`,
};
