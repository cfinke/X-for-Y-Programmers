const LESSON = {
  number: 9,
  title: "Classes",

  intro: `
<p>Python classes and JavaScript classes cover the same ground with very
different defaults. Python has no true private attributes — a
double-underscore name like <code>__count</code> only triggers <em>name
mangling</em> to <code>_ClassName__count</code>, which is trivial to reach
from outside the class. It is a convention, not a wall. JavaScript's
<code>#count</code> fields are the opposite: a real, syntax-enforced runtime
privacy mechanism that not even <code>Object.keys</code> or bracket access
can see through.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>self.__balance</code></td><td><code>#balance;</code> (truly private) or a plain field</td></tr>
  <tr><td><code>def __init__(self, x): self.x = x</code></td><td>no parameter properties — assign <code>this.x</code> yourself (same manual step)</td></tr>
  <tr><td><code>self._id</code> (read-only by convention only)</td><td>plain field (no runtime enforcement)</td></tr>
  <tr><td><code>@property</code><br><code>def area(self): …</code></td><td><code>get area() { … }</code> (same idea)</td></tr>
  <tr><td><code>count = 0</code> (class body)</td><td><code>static count = 0;</code></td></tr>
</table>
<p>If you actually want an attribute that outside code cannot read or write,
JavaScript gives you <code>#private</code> fields — a real runtime feature,
not a naming convention. That is the one class feature Python has no true
analogue for, so it is worth getting comfortable with.</p>`,

  python: `class Counter:
    instances = 0  # class variable, shared by all instances

    def __init__(self, label: str, start: int = 0):
        self.label = label
        self.__count = start  # name-mangled to _Counter__count
        Counter.instances += 1

    def increment(self) -> int:
        self.__count += 1
        return self.__count

    @property
    def value(self) -> int:
        return self.__count

    def describe(self) -> str:
        return f"{self.label}: {self.__count}"

    @classmethod
    def reset(cls) -> None:
        Counter.instances = 0`,

  task: `
<p>Write the plain-JavaScript runtime version of a <code>Counter</code> class.
No type hints, no name-mangled <code>__</code> prefix standing in for
privacy, no automatic constructor assignment — just the runtime constructs.</p>
<ol>
  <li>A <code>constructor(label, start = 0)</code> that stores the label and
      seeds a <strong><code>#count</code> private field</strong> from
      <code>start</code>. It must also bump a
      <strong><code>static instances</code> field</strong> each time an instance
      is created.</li>
  <li>An instance method <code>increment()</code> that adds 1 to
      <code>#count</code> and returns the new value.</li>
  <li>A <strong>getter</strong> <code>value</code> that returns the current
      <code>#count</code>.</li>
  <li>An instance method <code>describe()</code> returning
      <code>"&lt;label&gt;: &lt;count&gt;"</code>, e.g. <code>"hits: 3"</code>.</li>
  <li>A <strong>static method</strong> <code>reset()</code> that sets
      <code>Counter.instances</code> back to <code>0</code>.</li>
</ol>
<p>Export the class as <code>Counter</code>.</p>`,

  starter: `class Counter {
  // static field: total instances created

  // #private field: the current count

  constructor(label, start = 0) {
    // TODO: store label, seed #count from start, bump the static counter
  }

  increment() {
    // TODO: add 1 to #count and return the new value
  }

  get value() {
    // TODO: return the current count
  }

  describe() {
    // TODO: return "<label>: <count>"
    return "";
  }

  static reset() {
    // TODO: set instances back to 0
  }
}
`,

  exportNames: ["Counter"],

  requirements: [
    { pattern: /#count/, message: "Use a #private field named #count" },
    { pattern: /static\s+instances/, message: "Declare a static field named instances" },
    { pattern: /get\s+value\s*\(/, message: "Define a getter named value" },
    { pattern: /static\s+reset\s*\(/, message: "Define a static method named reset" },
  ],

  tests: [
    {
      name: "constructor seeds count and value getter reads it",
      run: (x) => {
        const c = new x.Counter("hits", 5);
        expectEqual(c.value, 5);
      },
    },
    {
      name: "start defaults to 0",
      run: (x) => {
        const c = new x.Counter("hits");
        expectEqual(c.value, 0);
      },
    },
    {
      name: "increment returns the new value and mutates count",
      run: (x) => {
        const c = new x.Counter("hits", 0);
        expectEqual(c.increment(), 1);
        expectEqual(c.increment(), 2);
        expectEqual(c.value, 2);
      },
    },
    {
      name: "describe formats label and count",
      run: (x) => {
        const c = new x.Counter("hits", 2);
        c.increment();
        expectEqual(c.describe(), "hits: 3");
      },
    },
    {
      name: "static instances counts constructions; reset zeroes it",
      run: (x) => {
        x.Counter.reset();
        new x.Counter("a");
        new x.Counter("b");
        expectEqual(x.Counter.instances, 2);
        x.Counter.reset();
        expectEqual(x.Counter.instances, 0);
      },
    },
    {
      name: "#count is truly private (not an own enumerable property)",
      run: (x) => {
        const c = new x.Counter("hits", 9);
        expectDeepEqual(Object.keys(c), ["label"]);
      },
    },
  ],

  solution: `class Counter {
  static instances = 0;
  #count = 0;

  constructor(label, start = 0) {
    this.label = label;
    this.#count = start;
    Counter.instances++;
  }

  increment() {
    this.#count++;
    return this.#count;
  }

  get value() {
    return this.#count;
  }

  describe() {
    return \`\${this.label}: \${this.#count}\`;
  }

  static reset() {
    Counter.instances = 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript runtime</th></tr>
  <tr><td>Visibility</td><td><code>self.__x</code> — name-mangled, not enforced</td><td><code>#x</code> — enforced by the engine</td></tr>
  <tr><td>Constructor assignment</td><td><code>def __init__(self, x): self.x = x</code></td><td>write <code>this.x = x</code> by hand</td></tr>
  <tr><td>Field types</td><td><code>count: int = 0</code> (hints are unenforced)</td><td><code>count = 0</code></td></tr>
  <tr><td>Getter</td><td><code>@property def value(self): …</code></td><td><code>get value()</code></td></tr>
  <tr><td>Static / class var</td><td><code>count = 0</code> in the class body</td><td><code>static count = 0</code> (same idea)</td></tr>
</table>
<p>A few runtime facts worth internalizing. <code>#count</code> is not a string
key — <code>c["#count"]</code> is <code>undefined</code>, and reaching for
<code>#count</code> from outside the class body is a <em>syntax</em> error, not
just a convention violation. That is why <code>Object.keys(c)</code> lists only
<code>label</code>. Static members live on the class object itself
(<code>Counter.instances</code>), not on instances, so <code>this.instances</code>
inside a method would be <code>undefined</code> — reference the class by name.
And remember that Python's own privacy and read-only habits produce no runtime
guarantee at all: name-mangling on <code>__count</code> only renames the
attribute, and marking something read-only with a leading underscore or a
docstring doesn't stop assignment. In plain JS, <code>#private</code> fields
give you the real thing.</p>`,
};
