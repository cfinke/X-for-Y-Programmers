  title: "Arrays",

  intro: `
<p>C# splits sequences across <code>int[]</code>, <code>List&lt;int&gt;</code>,
<code>IEnumerable&lt;int&gt;</code>… Ruby has one: <code>Array</code>, written
<code>[1, 2, 3]</code>, growable, and happy to hold mixed types. Appending is
an operator — the "shovel": <code>arr &lt;&lt; x</code> is your
<code>list.Add(x)</code>. Your LINQ instincts carry straight over, starting
with <code>scores.Sum()</code> becoming <code>scores.sum</code> — no
<code>using System.Linq</code>, it's just there.</p>
<table>
  <tr><th>C#</th><th>Ruby</th></tr>
  <tr><td><code>new List&lt;int&gt; { 85, 92, 78 }</code></td><td><code>[85, 92, 78]</code></td></tr>
  <tr><td><code>list.Add(x)</code></td><td><code>arr &lt;&lt; x</code> (the shovel)</td></tr>
  <tr><td><code>list.Count</code></td><td><code>arr.size</code> or <code>arr.length</code></td></tr>
  <tr><td><code>list.Contains(x)</code></td><td><code>arr.include?(x)</code></td></tr>
  <tr><td><code>list[^1]</code></td><td><code>arr[-1]</code> (negative indexing)</td></tr>
  <tr><td><code>list.GetRange(1, 2)</code></td><td><code>arr[1..2]</code> (a range slice)</td></tr>
</table>
<p>Negative indexing means goodbye to <code>^1</code>: <code>arr[-1]</code> is
the last element, <code>arr[-2]</code> the one before it — and
<code>arr.first</code> / <code>arr.last</code> say it even more plainly.
Slicing uses ranges, and here's the twist: <code>1..2</code> isn't syntax,
it's a <code>Range</code> <em>object</em> you're passing to <code>[]</code> —
everything is an object, even the dots.</p>`,

  csharp: `var scores = new List<int> { 85, 92, 78 };

scores.Add(100);                      // append
var n = scores.Count;                 // 4
var has92 = scores.Contains(92);      // true

var first = scores[0];
var last = scores[^1];                // index-from-end operator
var total = scores.Sum();             // LINQ, using System.Linq

var middle = scores.GetRange(1, 2);   // { 92, 78 }

Console.WriteLine($"{first}..{last}, total {total}");`,

  task: `
<p>Rebuild the score toolkit in Ruby:</p>
<ol>
  <li><code>make_scores</code> — no arguments; the literal array
      <code>[85, 92, 78]</code>. No <code>new List&lt;int&gt;</code>

  <li><code>append(arr, x)</code> — push <code>x</code> onto <code>arr</code>

      array).</li>
  <li><code>total(nums)</code> — the sum, via <code>.sum</code>.</li>
  <li><code>ends(arr)</code> — a two-element array of the first and last
      elements: <code>[arr.first, arr.last]</code>. (Or dip into negative
      indexing with <code>arr[-1]</code>.)</li>
</ol>`,

    { name: "make_scores returns [85, 92, 78]",

    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "  expect_eq(append([1, 2], 3), [1, 2, 3])" },
    { name: "append([], 5)[-1] is 5 (negative index checks the new last element)",
      code: "  expect_eq(append([], 5)[-1], 5)" },
    { name: "total([85, 92, 78]) returns 255",
      code: "  expect_eq(total([85, 92, 78]), 255)" },
    { name: "ends([85, 92, 78]) returns [85, 78]",
      code: "  expect_eq(ends([85, 92, 78]), [85, 78])" },

  solution: `def make_scores
  [85, 92, 78]
end

def append(arr, x)
  arr << x
end

def total(nums)
  nums.sum
end

def ends(arr)
  [arr.first, arr.last]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Ruby</th></tr>
  <tr><td>Literal</td><td><code>new List&lt;int&gt; { 1, 2 }</code></td><td><code>[1, 2]</code></td></tr>
  <tr><td>Append</td><td><code>list.Add(x)</code></td><td><code>arr &lt;&lt; x</code> (or <code>arr.push(x)</code>)</td></tr>
  <tr><td>Count</td><td><code>list.Count</code></td><td><code>arr.size</code> / <code>arr.length</code></td></tr>
  <tr><td>Membership</td><td><code>list.Contains(x)</code></td><td><code>arr.include?(x)</code></td></tr>
  <tr><td>Last element</td><td><code>list[^1]</code></td><td><code>arr[-1]</code> or <code>arr.last</code></td></tr>
  <tr><td>First element</td><td><code>list[0]</code> / <code>.First()</code></td><td><code>arr[0]</code> or <code>arr.first</code></td></tr>
  <tr><td>Slice</td><td><code>list.GetRange(1, 2)</code></td><td><code>arr[1..2]</code> (or <code>arr[1...3]</code>, end-exclusive)</td></tr>
  <tr><td>Sum</td><td><code>list.Sum()</code> (LINQ)</td><td><code>arr.sum</code> (built in)</td></tr>
</table>
<p><code>arr[1..2]</code> looks like slice syntax, but <code>1..2</code> is a
real <code>Range</code> object being passed to the <code>[]</code> method —
you can assign it to a variable, iterate it, or ask it
<code>cover?(x)</code>. And <code>.sum</code> is your first taste of
<code>Enumerable</code>, Ruby's answer to LINQ: lesson 12 shows
<code>Select</code>/<code>Where</code> reborn as
<code>map</code>/<code>select</code>.</p>`,
