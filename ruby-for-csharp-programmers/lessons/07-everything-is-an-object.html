  title: "Everything Is an Object",

  intro: `
<p>C# splits its world into value types and reference types, and keeps a
boxing machine humming between them. Ruby deletes the split:
<strong>everything is an object</strong>, integers included. There is no
<code>int</code> vs <code>Int32</code> vs boxed-<code>object</code> story —
<code>5</code> is a full object with methods, and you talk to it directly:
<code>-3.abs</code>, <code>4.even?</code>, <code>5.times { ... }</code>.
Static helper classes like <code>Math</code> mostly evaporate, because the
methods live <em>on the values themselves</em>.</p>
<table>
  <tr><th>C#</th><th>Ruby</th></tr>
  <tr><td><code>Math.Abs(x)</code></td><td><code>x.abs</code></td></tr>
  <tr><td><code>x % 2 == 0</code></td><td><code>x.even?</code></td></tr>
  <tr><td><code>Math.Round(f, 2)</code></td><td><code>f.round(2)</code></td></tr>
  <tr><td><code>for (var i = 0; i &lt; 5; i++)</code></td><td><code>5.times { |i| ... }</code></td></tr>
  <tr><td><code>s.ToCharArray()</code></td><td><code>s.chars</code></td></tr>
</table>
<p>If you love extension methods — writing <code>x.IsEven()</code> instead of
<code>Helper.IsEven(x)</code> — Ruby is that energy, built in. Every number,
string, and array ships loaded with methods (and note the convention:
predicate methods end in <code>?</code>, like <code>even?</code> and
<code>nil?</code>). Because every call returns an object with more methods,
<em>chaining</em> is the core style:
<code>"hello".chars.map(&amp;:upcase)</code> reads left to right like a
pipeline, no wrapper classes, no LINQ namespace to import.</p>`,

  csharp: `int Absolute(int n) => Math.Abs(n);

List<int> EvenNumbers(List<int> nums) =>
    nums.Where(n => n % 2 == 0).ToList();

double Rounded(double f, int digits) =>
    Math.Round(f, digits);

List<char> CharList(string s) =>
    s.ToCharArray().ToList();

// int is a "value type"; passing it as object boxes it.
// Ruby has no such split — 5 is already a full object:
// there is nothing to box, and Math.Abs is just 5.abs.`,

  task: `
<p>Rewrite each C# helper as a Ruby method that sends the message straight
to the value:</p>
<ol>
  <li><code>absolute(n)</code> — return the absolute value using
      <code>n.abs</code>. No <code>Math</code> class in sight.</li>
  <li><code>even_numbers(nums)</code> — return only the even numbers using
      <code>nums.select(&amp;:even?)</code>. The number itself knows whether
      it's even; <code>&amp;:even?</code> asks each one.</li>
  <li><code>rounded(f, digits)</code> — round a float with
      <code>f.round(digits)</code> — the float rounds itself.</li>
  <li><code>char_list(s)</code> — return the string's characters as an array
      of one-character strings using <code>s.chars</code>.</li>
</ol>`,

  requirements: [
    { pattern: /\.abs/, message: "Call .abs on the number itself (no Math class)" },
    { pattern: /\.even\?|&:even\?/, message: "Ask each number with .even? (or the &:even? shorthand)" },

  tests: [
    { name: "absolute(-5) is 5 and absolute(3) is 3",

    { name: "even_numbers([1, 2, 3, 4, 5, 6]) is [2, 4, 6]",
      code: "  expect_eq(even_numbers([1, 2, 3, 4, 5, 6]), [2, 4, 6])" },
    { name: "even_numbers([1, 3, 5]) is []",
      code: "  expect_eq(even_numbers([1, 3, 5]), [])" },
    { name: "rounded(3.14159, 2) is 3.14",
      code: "  expect_eq(rounded(3.14159, 2), 3.14)" },
    { name: "rounded(2.71828, 3) is 2.718",
      code: "  expect_eq(rounded(2.71828, 3), 2.718)" },

  solution: `def absolute(n)
  n.abs
end

def even_numbers(nums)
  nums.select(&:even?)
end

def rounded(f, digits)
  f.round(digits)
end

def char_list(s)
  s.chars
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Ruby</th></tr>
  <tr><td>Absolute value</td><td><code>Math.Abs(x)</code></td><td><code>x.abs</code></td></tr>
  <tr><td>Even / odd</td><td><code>x % 2 == 0</code></td><td><code>x.even?</code> / <code>x.odd?</code></td></tr>
  <tr><td>Rounding</td><td><code>Math.Round(f, 2)</code></td><td><code>f.round(2)</code></td></tr>
  <tr><td>Counted loop</td><td><code>for (var i = 0; i &lt; 5; i++)</code></td><td><code>5.times { |i| ... }</code></td></tr>
  <tr><td>String to chars</td><td><code>s.ToCharArray()</code></td><td><code>s.chars</code></td></tr>
  <tr><td>Value vs reference types</td><td><code>int</code> boxes to <code>object</code></td><td>no split — everything already is an object</td></tr>
</table>
<p>The deeper shift: in Ruby you don't <em>call functions on</em> data, you
<em>send messages to</em> objects — even literals. <code>5.times</code>,
<code>-3.abs</code>, and <code>"a,b".split(",")</code> are all the same move,
and because each answer is itself an object, chains like
<code>nums.select(&amp;:even?).map(&amp;:abs).sum</code> replace whole
LINQ pipelines — with no <code>.ToList()</code> at the end.</p>`,
