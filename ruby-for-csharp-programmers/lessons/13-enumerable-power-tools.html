  title: "Enumerable Power Tools",

  intro: `
<p>Past <code>map</code> and <code>select</code>, Enumerable keeps going where
LINQ starts requiring ceremony. <code>.GroupBy(...)</code> plus the
<code>ToDictionary(g =&gt; g.Key, g =&gt; g.ToList())</code> dance is just
<code>.group_by { }</code> — it returns the hash directly. The classic
count-the-occurrences <code>GroupBy(x =&gt; x).ToDictionary(g =&gt; g.Key,
g =&gt; g.Count())</code> is one word: <code>.tally</code>.</p>
<table>
  <tr><th>C# (LINQ)</th><th>Ruby (Enumerable)</th></tr>
  <tr><td><code>.GroupBy(f).ToDictionary(g =&gt; g.Key, g =&gt; g.ToList())</code></td><td><code>.group_by { }</code> — a hash, directly</td></tr>
  <tr><td><code>.GroupBy(x =&gt; x).ToDictionary(g =&gt; g.Key, g =&gt; g.Count())</code></td><td><code>.tally</code></td></tr>
  <tr><td><code>.Aggregate(0, (acc, x) =&gt; acc + x)</code></td><td><code>.reduce(:+)</code></td></tr>
  <tr><td><code>.Aggregate(new Dictionary…, (acc, x) =&gt; { …; return acc; })</code></td><td><code>.each_with_object({}) { |x, acc| … }</code></td></tr>
  <tr><td>two <code>.Where</code> passes</td><td><code>.partition { }</code> — one pass, two arrays</td></tr>
</table>
<p><code>Aggregate</code> maps to <code>.reduce</code>, and for the
build-up-a-mutable-accumulator flavor Ruby offers
<code>.each_with_object(initial)</code>: the accumulator is handed to every
iteration and returned at the end — no <code>return acc;</code> boilerplate,
and <code>Hash.new(0)</code> (a hash whose missing keys read as 0) deletes the
<code>TryGetValue</code> fumbling. Finally, <code>.partition</code> has no LINQ
equivalent at all: one pass over the data, two arrays back —
<code>[matches, rest]</code>.</p>`,

  csharp: `static Dictionary<int, List<string>> WordLengths(List<string> words) =>
    words.GroupBy(w => w.Length)
         .ToDictionary(g => g.Key, g => g.ToList());

static Dictionary<string, int> VoteCounts(List<string> votes) =>
    votes.GroupBy(v => v)
         .ToDictionary(g => g.Key, g => g.Count());

static Dictionary<string, int> TotalsByCategory(
    List<(string Category, int Amount)> items) =>
    items.GroupBy(i => i.Category)
         .ToDictionary(g => g.Key, g => g.Sum(i => i.Amount));

// No single-pass LINQ equivalent — two scans:
var evens = nums.Where(n => n % 2 == 0).ToList();
var odds  = nums.Where(n => n % 2 != 0).ToList();`,

<p>Rebuild the left column with the power tools:</p>

  tests: [
    { name: 'word_lengths(["hi", "yo", "hey"]) groups by length',

    { name: 'vote_counts(["ruby", "cs", "ruby", "ruby"]) counts occurrences',

    { name: "totals_by_category sums amounts per category",
      code: `  items = [
    { category: "food", amount: 5 },

  ]
  expect_eq(totals_by_category(items), { "food" => 8, "gas" => 10 })` },
    { name: "split_evens([1, 2, 3, 4, 5]) returns [[2, 4], [1, 3, 5]]",

  solution: `def word_lengths(words)
  words.group_by(&:length)
end

def vote_counts(votes)
  votes.tally
end

def totals_by_category(items)
  items.each_with_object(Hash.new(0)) do |item, acc|
    acc[item[:category]] += item[:amount]
  end
end

def split_evens(nums)
  nums.partition(&:even?)
end
`,

  notes: `
<table>
  <tr><th>Job</th><th>C# (LINQ)</th><th>Ruby</th></tr>
  <tr><td>Group into a dictionary</td><td><code>GroupBy(f).ToDictionary(g =&gt; g.Key, g =&gt; g.ToList())</code></td><td><code>group_by { }</code></td></tr>
  <tr><td>Frequency count</td><td><code>GroupBy(x =&gt; x).ToDictionary(g =&gt; g.Key, g =&gt; g.Count())</code></td><td><code>tally</code></td></tr>
  <tr><td>Fold to a value</td><td><code>Aggregate(0, (a, x) =&gt; a + x)</code></td><td><code>reduce(:+)</code> or <code>reduce(0) { |a, x| a + x }</code></td></tr>
  <tr><td>Fold into a container</td><td><code>Aggregate</code> + <code>return acc;</code></td><td><code>each_with_object({}) { |x, acc| }</code></td></tr>
  <tr><td>Split in two</td><td>two <code>Where</code> passes</td><td><code>partition { }</code> — one pass</td></tr>
  <tr><td>Default-valued dictionary</td><td><code>TryGetValue</code> / <code>GetValueOrDefault</code></td><td><code>Hash.new(0)</code></td></tr>
</table>
<p>A subtlety worth knowing: <code>reduce</code> passes the accumulator's
<em>return value</em> forward (functional fold), while
<code>each_with_object</code> keeps handing you the <em>same object</em> to
mutate — which is why <code>+=</code> into a <code>Hash.new(0)</code> works so
cleanly there. Rule of thumb: reducing to a number, use <code>reduce</code>;
building a hash or array, use <code>each_with_object</code>.</p>`,
};
