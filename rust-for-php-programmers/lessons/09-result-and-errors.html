<div id="app"></div>
<script>
const LESSON = {
  number: 9,
  title: "Result & the ? Operator",

  intro: `
<p>PHP has two error traditions living side by side. The modern one:
<code>throw</code>, <code>try</code>/<code>catch</code>, exception hierarchies
— where a function's signature says <code>int</code> and the possibility of
failure is invisible until it detonates somewhere up the stack. The older one:
<code>strpos()</code> returning <code>false</code>, <code>@</code>-suppression,
and <code>(int) "abc"</code> silently becoming <code>0</code> — errors as
values, but sloppy ones that a forgotten <code>=== false</code> check lets
slide right by. Rust picks the second tradition and does it properly:
<code>Result&lt;T, E&gt;</code> is either <code>Ok(value)</code> or
<code>Err(error)</code>, it's right there in the signature, and — as with
<code>Option</code> — the compiler won't let you touch the value without
acknowledging the error.</p>
<table>
  <tr><th>PHP</th><th>Rust</th></tr>
  <tr><td><code>function parseAge(string $s): int</code> (throws — who knows?)</td><td><code>fn parse_age(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code></td></tr>
  <tr><td><code>throw new InvalidArgumentException($msg);</code></td><td><code>Err(msg)</code> — returned, not thrown</td></tr>
  <tr><td><code>return $age;</code></td><td><code>Ok(age)</code></td></tr>
  <tr><td><code>try { ... } catch (E $e) { throw $e; }</code></td><td><code>?</code> — one character</td></tr>
  <tr><td><code>(int) "abc"</code> → <code>0</code>, silently</td><td><code>"abc".parse::&lt;u32&gt;()</code> → <code>Err(...)</code></td></tr>
  <tr><td><code>strpos($h, $n) === false</code></td><td><code>Err</code> is a different type — can't forget the check</td></tr>
</table>
<p>The star here is <code>?</code>. Appended to a <code>Result</code>, it
means: if this is <code>Ok(v)</code>, give me <code>v</code> and keep going;
if it's <code>Err(e)</code>, return that <code>Err</code> from the current
function right now. It's the catch-and-rethrow boilerplate — an entire
<code>try</code>/<code>catch</code> block — compressed into one character,
and it only works inside functions that themselves return a
<code>Result</code>, so propagation stays visible in every signature it
passes through.</p>`,

  php: `function parseAge(string $s): int {
    $trimmed = trim($s);
    if (!ctype_digit($trimmed)) {
        throw new InvalidArgumentException("invalid age: $s");
    }
    return (int) $trimmed;
}

function ageNextYear(string $s): int {
    return parseAge($s) + 1;   // exceptions ride an invisible channel
}

try {
    echo ageNextYear(" 29 ");             // 30
} catch (InvalidArgumentException $e) {
    echo $e->getMessage();
}

// And the old ways this replaces:
$n = (int) "abc";                          // 0 — silent nonsense
$pos = strpos('haystack', 'x');            // false — hope you === checked`,

  task: `
<p>Rewrite the age parser with failure in the signature:</p>
<ol>
  <li><code>parse_age(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code> —
      trim the input and parse it: <code>s.trim().parse::&lt;u32&gt;()</code>.
      That returns a <code>Result</code> whose error type isn't
      <code>String</code>, so convert it with
      <code>.map_err(|_| format!("invalid age: {}", s))</code> — the
      exception-wrapping <code>catch</code> block, as a method.</li>
  <li><code>age_next_year(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code>
      — call <code>parse_age(s)?</code>, add 1, and wrap the sum in
      <code>Ok(...)</code>. The <code>?</code> forwards any <code>Err</code>
      to the caller untouched — no <code>try</code>, no
      <code>catch</code>, no rethrow.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. parse_age: trim, parse as u32, and turn the parse error into a String.
//    PHP: if (!ctype_digit(trim($s))) throw new InvalidArgumentException(...);
//    Rust: s.trim().parse::<u32>().map_err(|_| format!("invalid age: {}", s))
fn parse_age(s: &str) -> Result<u32, String> {
    todo!()
}

// 2. age_next_year: parse_age(s)? + 1, wrapped in Ok.
//    The ? is the entire try/catch-and-rethrow, in one character.
fn age_next_year(s: &str) -> Result<u32, String> {
    todo!()
}
`,

  requirements: [
    { pattern: /Result</, message: "Return Result<u32, String> from both functions" },
    { pattern: /map_err|Err\(/, message: "Produce the error side with map_err (or Err) — no exceptions to throw" },
    { pattern: /\)\?/, message: "Propagate the error in age_next_year with the ? operator" },
  ],

  tests: [
    { name: 'parse_age("42") returns Ok(42)',
      code: 'assert_eq!(parse_age("42"), Ok(42));' },
    { name: 'parse_age(" 7 ") trims whitespace and returns Ok(7)',
      code: 'assert_eq!(parse_age(" 7 "), Ok(7));' },
    { name: 'parse_age("abc") returns an Err — not 0',
      code: 'assert!(parse_age("abc").is_err());' },
    { name: 'age_next_year("29") returns Ok(30)',
      code: 'assert_eq!(age_next_year("29"), Ok(30));' },
    { name: 'age_next_year("abc") propagates the Err from parse_age',
      code: 'assert!(age_next_year("abc").is_err());\nassert_eq!(age_next_year("abc"), parse_age("abc").map(|n| n + 1));' },
  ],

  solution: `fn parse_age(s: &str) -> Result<u32, String> {
    s.trim().parse::<u32>().map_err(|_| format!("invalid age: {}", s))
}

fn age_next_year(s: &str) -> Result<u32, String> {
    Ok(parse_age(s)? + 1)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Rust</th></tr>
  <tr><td>Fallible signature</td><td><code>: int</code> + <code>@throws</code> docblock, maybe</td><td><code>-&gt; Result&lt;u32, String&gt;</code>, enforced</td></tr>
  <tr><td>Failure</td><td><code>throw new Exception($msg);</code></td><td><code>Err(msg)</code></td></tr>
  <tr><td>Success</td><td><code>return $v;</code></td><td><code>Ok(v)</code></td></tr>
  <tr><td>Propagate</td><td>do nothing (it flies past) or catch/rethrow</td><td><code>?</code> — explicit, but one character</td></tr>
  <tr><td>Translate errors</td><td><code>catch (E $e) { throw new F(...); }</code></td><td><code>.map_err(|e| ...)</code></td></tr>
  <tr><td>String to int</td><td><code>(int) $s</code> — <code>0</code> on garbage</td><td><code>s.parse::&lt;u32&gt;()</code> — <code>Err</code> on garbage</td></tr>
  <tr><td>Handle both</td><td><code>try</code>/<code>catch</code></td><td><code>match r { Ok(v) =&gt; ..., Err(e) =&gt; ... }</code></td></tr>
</table>
<p>Compare the two propagation stories. In PHP, an uncaught exception passes
through <code>ageNextYear()</code> invisibly — the function's code and
signature give no hint it can fail. In Rust the same flow is
<code>parse_age(s)? + 1</code>: one visible character marks the exit point,
and the <code>Result</code> in the return type warns every caller. Nothing is
silent — not the failure (<code>parse</code> refuses where <code>(int)</code>
invents a <code>0</code>) and not the propagation — yet the happy path stays
one line long.</p>`,
};
