const LESSON = {
  number: 15,
  title: "Slices, Tuples & Destructuring",

  intro: `
<p>When a PHP function needs to return "a pair", it returns an array and
everyone politely agrees to treat it as one:
<code>[$x, $y] = getCoordinates();</code>. Nothing stops that array from
having three elements, or string keys, or a stray <code>null</code>. Rust has
an actual pair type: the <em>tuple</em>. <code>(f64, f64)</code> is a typed
pair — not an array wearing a costume — with a fixed length and a fixed type
per position, accessed as <code>point.0</code> and <code>point.1</code>.</p>
<table>
  <tr><th>PHP</th><th>Rust</th></tr>
  <tr><td><code>return [$x, $y];</code> — an array, by convention a pair</td><td><code>(x, y)</code> — a real <code>(f64, f64)</code></td></tr>
  <tr><td><code>[$a, $b] = $pair;</code></td><td><code>let (a, b) = pair;</code></td></tr>
  <tr><td><code>$pair[0]</code>, <code>$pair[1]</code></td><td><code>pair.0</code>, <code>pair.1</code></td></tr>
  <tr><td><code>[$a, $b] = [$b, $a];</code> — the swap trick</td><td><code>(a, b) = (b, a);</code> — works the same</td></tr>
  <tr><td><code>array_slice($v, 1, 3)</code> — copies the elements</td><td><code>&amp;v[1..4]</code> — a borrowed view, no copy</td></tr>
</table>
<p>Destructuring travels with the type: PHP's
<code>[$a, $b] = $pair</code> becomes <code>let (a, b) = pair</code>, and it's
the same pattern syntax <code>match</code> used in lesson 11. The other view
type you've been using all along deserves a name too: <code>&amp;[i32]</code>
is a <em>slice</em> — a borrowed view into a Vec or array, like
<code>array_slice</code> without the copy. It's why one signature accepts
both <code>&amp;vec</code> and <code>&amp;[1, 2, 3]</code>: both lend the
function a window onto their elements.</p>`,

  php: `<?php
function swap(array $pair): array {
    [$a, $b] = $pair;              // list destructuring...
    return [$b, $a];               // ...into an array "pair", fingers crossed
}

function distance(array $p, array $q): float {
    [$px, $py] = $p;
    [$qx, $qy] = $q;
    return sqrt(($qx - $px) ** 2 + ($qy - $py) ** 2);
}

function ends(array $values): array {
    return [$values[0], $values[count($values) - 1]];
}

print_r(swap([1, 2]));                       // [2, 1]
echo distance([0.0, 0.0], [3.0, 4.0]);       // 5`,

  task: `
<p>Same functions, with pairs the type system can see:</p>
<ol>
  <li><code>swap(pair: (i32, i32)) -&gt; (i32, i32)</code> — destructure with
      <code>let (a, b) = pair;</code> and return <code>(b, a)</code>.</li>
  <li><code>distance(p: (f64, f64), q: (f64, f64)) -&gt; f64</code> —
      destructure both points with <code>let (x, y)</code> bindings, then the
      Pythagorean theorem. <code>f64</code> has methods for the math:
      <code>(dx).powi(2)</code> and <code>.sqrt()</code>. A 3-4-5 triangle
      must come out as exactly <code>5.0</code>.</li>
  <li><code>ends(v: &amp;[i32]) -&gt; (i32, i32)</code> — first and last
      element of a borrowed slice, as a tuple. Assume the slice is non-empty;
      <code>v.len() - 1</code> is the last index.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// swap: let (a, b) = pair; then hand back (b, a).
fn swap(pair: (i32, i32)) -> (i32, i32) {
    todo!()
}

// distance: destructure p and q with let (x, y) patterns, then
// ((qx - px).powi(2) + (qy - py).powi(2)).sqrt()
fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    todo!()
}

// ends: (first, last) of a borrowed view — v[0] and v[v.len() - 1].
// Assume non-empty.
fn ends(v: &[i32]) -> (i32, i32) {
    todo!()
}
`,

  requirements: [
    { pattern: /\(\s*f64\s*,\s*f64\s*\)/, message: "Use real (f64, f64) tuples in distance's signature" },
    { pattern: /let\s*\(/, message: "Destructure a tuple with let (a, b) = ..." },
    { pattern: /&\[i32\]/, message: "ends should take a borrowed slice: &[i32]" },
  ],

  tests: [
    { name: "swap((1, 2)) returns (2, 1)",
      code: "assert_eq!(swap((1, 2)), (2, 1));" },
    { name: "swap((-5, 0)) returns (0, -5)",
      code: "assert_eq!(swap((-5, 0)), (0, -5));" },
    { name: "distance((0.0, 0.0), (3.0, 4.0)) is exactly 5.0 — the 3-4-5 triangle",
      code: "assert_eq!(distance((0.0, 0.0), (3.0, 4.0)), 5.0);" },
    { name: "distance from a point to itself is 0.0",
      code: "assert_eq!(distance((2.5, -1.0), (2.5, -1.0)), 0.0);" },
    { name: "ends(&[7, 8, 9]) returns (7, 9)",
      code: "assert_eq!(ends(&[7, 8, 9]), (7, 9));" },
    { name: "ends works on a Vec too (a slice is a view into either)",
      code: "let v = vec![42];\nassert_eq!(ends(&v), (42, 42));" },
  ],

  solution: `fn swap(pair: (i32, i32)) -> (i32, i32) {
    let (a, b) = pair;
    (b, a)
}

fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    let (px, py) = p;
    let (qx, qy) = q;
    ((qx - px).powi(2) + (qy - py).powi(2)).sqrt()
}

fn ends(v: &[i32]) -> (i32, i32) {
    let (first, last) = (v[0], v[v.len() - 1]);
    (first, last)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Rust</th></tr>
  <tr><td>A pair</td><td><code>[$x, $y]</code> — an array, by convention</td><td><code>(f64, f64)</code> — a real type</td></tr>
  <tr><td>Destructure</td><td><code>[$a, $b] = $pair;</code></td><td><code>let (a, b) = pair;</code></td></tr>
  <tr><td>Positional access</td><td><code>$pair[0]</code></td><td><code>pair.0</code> (a field, not an index)</td></tr>
  <tr><td>Swap</td><td><code>[$a, $b] = [$b, $a];</code></td><td><code>(a, b) = (b, a);</code> (bindings must be <code>mut</code>)</td></tr>
  <tr><td>Sub-view of a list</td><td><code>array_slice($v, 1, 3)</code> — copies</td><td><code>&amp;v[1..4]</code> — borrows, zero copy</td></tr>
  <tr><td>Accepts Vec or array</td><td><code>array</code> (and hope)</td><td><code>&amp;[i32]</code> — both coerce to a slice</td></tr>
</table>
<p>Tuples answer PHP's "multiple return values" itch without the ceremony:
<code>ends</code> returns two values with a signature that says so, and the
caller unpacks them with <code>let (first, last) = ends(&amp;v);</code> —
list() destructuring, but the compiler knows there are exactly two and knows
their types. Mismatched arity is a compile error, not a silently
<code>null</code> third variable. When positions start needing names, that's
the signal to graduate the tuple into a struct — lesson 10's tool, one
refactor away.</p>`,
};
