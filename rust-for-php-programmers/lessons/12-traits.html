<div id="app"></div>
<script>
const LESSON = {
  number: 12,
  title: "Traits",

  intro: `
<p>PHP splits shared behavior across two features: an <code>interface</code>
declares the contract (method signatures, no bodies), and a <code>trait</code>
— the code-reuse kind — carries method bodies you <code>use</code> into a
class. A Rust <code>trait</code> does both jobs at once. It lists required
methods, like an interface, <em>and</em> it can supply default method bodies
that every implementor inherits for free, like a PHP trait — with the default
allowed to call the required methods, so the shared code plugs into each
type's own behavior.</p>
<table>
  <tr><th>PHP</th><th>Rust</th></tr>
  <tr><td><code>interface Describable { public function name(): string; }</code></td><td><code>trait Describe { fn name(&amp;self) -&gt; String; }</code></td></tr>
  <tr><td><code>trait DescribeDefaults { public function describe() { ... } }</code></td><td>a default body in the same <code>trait</code> block</td></tr>
  <tr><td><code>class Dog implements Describable { use DescribeDefaults; ... }</code></td><td><code>impl Describe for Dog { ... }</code> — outside the type</td></tr>
  <tr><td>Only classes you write can <code>implements</code>/<code>use</code></td><td>implement <em>your</em> trait for types you didn't write</td></tr>
</table>
<p>The other shift is <em>where</em> the implementation lives. In PHP,
<code>implements</code> and <code>use</code> go inside the class declaration —
if you don't own the class, you can't add the interface. In Rust,
<code>impl Describe for Dog</code> is a free-standing block outside the struct,
so you can implement your own trait for <code>Vec</code>, for <code>i32</code>,
for a type from any crate. No inheritance anywhere in this story: traits are
how Rust shares behavior, full stop.</p>`,

  php: `<?php
interface Describable {                  // the contract...
    public function name(): string;
}

trait DescribeDefaults {                 // ...and the shared body,
    public function describe(): string { // two separate features
        return "This is " . $this->name();
    }
}

class Dog implements Describable {       // both bolted on inside
    use DescribeDefaults;                // the class you must own
    public function __construct(public string $name) {}
    public function name(): string { return $this->name; }
}

$dog = new Dog("Rex");
echo $dog->describe();                   // This is Rex`,

  task: `
<p>Fold the interface and the trait into one Rust trait:</p>
<ol>
  <li>In the <code>trait Describe</code> block, fill in the default body of
      <code>describe</code>: it should return
      <code>format!("This is {}", self.name())</code> — shared code calling
      the per-type contract, exactly what the PHP trait + interface pair was
      simulating.</li>
  <li>Complete <code>impl Describe for Dog</code>: <code>name</code> returns
      a clone of the dog's <code>name</code> field
      (<code>self.name.clone()</code>).</li>
  <li>Complete <code>impl Describe for Robot</code>: <code>name</code> returns
      <code>"Unit-"</code> followed by the robot's <code>id</code> — use
      <code>format!("Unit-{}", self.id)</code>. Neither impl defines
      <code>describe</code>: both types inherit the default.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your methods
directly.</p>`,

  starter: `// The structs are complete — the tests construct them directly.
struct Dog {
    name: String,
}

struct Robot {
    id: u32,
}

// One trait = the interface contract AND the shared default body.
trait Describe {
    // Required: every implementor must write this (the interface half).
    fn name(&self) -> String;

    // Default: implementors get it for free (the PHP-trait half).
    fn describe(&self) -> String {
        todo!() // format!("This is {}", self.name())
    }
}

// The impl lives OUTSIDE the struct. Dog could come from another crate.
impl Describe for Dog {
    fn name(&self) -> String {
        todo!() // the name field, cloned
    }
}

impl Describe for Robot {
    fn name(&self) -> String {
        todo!() // format!("Unit-{}", self.id)
    }
}
`,

  requirements: [
    { pattern: /trait\s+Describe/, message: "Define the trait Describe" },
    { pattern: /impl\s+Describe\s+for\s+/, message: "Implement Describe with an impl Describe for ... block" },
    { pattern: /self\.name\(\)/, message: "The default describe body should call self.name()" },
  ],

  tests: [
    { name: 'Dog { name: "Rex" }.name() returns "Rex"',
      code: 'let dog = Dog { name: String::from("Rex") };\nassert_eq!(dog.name(), "Rex");' },
    { name: 'the default describe works for Dog: "This is Rex"',
      code: 'let dog = Dog { name: String::from("Rex") };\nassert_eq!(dog.describe(), "This is Rex");' },
    { name: 'Robot { id: 7 }.name() returns "Unit-7"',
      code: 'let robot = Robot { id: 7 };\nassert_eq!(robot.name(), "Unit-7");' },
    { name: 'the same default describe works for Robot: "This is Unit-7"',
      code: 'let robot = Robot { id: 7 };\nassert_eq!(robot.describe(), "This is Unit-7");' },
  ],

  solution: `struct Dog {
    name: String,
}

struct Robot {
    id: u32,
}

trait Describe {
    fn name(&self) -> String;

    fn describe(&self) -> String {
        format!("This is {}", self.name())
    }
}

impl Describe for Dog {
    fn name(&self) -> String {
        self.name.clone()
    }
}

impl Describe for Robot {
    fn name(&self) -> String {
        format!("Unit-{}", self.id)
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Rust</th></tr>
  <tr><td>Contract</td><td><code>interface Describable</code></td><td><code>trait Describe</code> — required methods, no body</td></tr>
  <tr><td>Shared body</td><td><code>trait DescribeDefaults</code> + <code>use</code></td><td>a default body in the same trait</td></tr>
  <tr><td>Adopting it</td><td><code>implements</code>/<code>use</code> inside the class</td><td><code>impl Describe for Dog</code> — outside the type</td></tr>
  <tr><td>Types you don't own</td><td>can't retrofit an interface</td><td>implement your trait for any type</td></tr>
  <tr><td>Overriding the default</td><td>redeclare the method in the class</td><td>write <code>describe</code> in the <code>impl</code> block</td></tr>
</table>
<p>Notice what the default body buys you: <code>describe</code> was written
once, in the trait, yet it produced <code>"This is Rex"</code> for a struct
with a <code>String</code> field and <code>"This is Unit-7"</code> for a
struct with a <code>u32</code> — because it delegates to each type's own
<code>name()</code>. That's the template-method pattern you'd build in PHP
with an abstract class, minus the inheritance. You've been consuming traits
all course (<code>PartialEq</code> powers <code>==</code>,
<code>Clone</code> powers <code>.clone()</code>); now you can mint your
own.</p>`,
};
