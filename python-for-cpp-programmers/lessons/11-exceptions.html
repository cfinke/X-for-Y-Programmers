const LESSON = {
  number: 11,
  title: "Exceptions",

  intro: `
<p>In C++ you can <code>throw</code> any type, though idiomatic code throws
something deriving from <code>std::exception</code>, and you catch it with a
typed <code>catch (const SomeType&amp; e)</code> clause — or <code>catch (...)</code>
to catch literally anything. Python leans on exceptions much more heavily —
they are the normal way to signal "this can't be done" — and the
<code>except</code> clause selects <em>which</em> exception class to handle,
working much like C++'s typed <code>catch</code> clauses but with less
ceremony (no reference syntax, no worrying about slicing). Python also adds an
<code>else</code> clause (runs only when no exception was raised); C++ has no
keyword equivalent to <code>finally</code> at all — its RAII idiom
(destructors that fire automatically during stack unwinding) covers the same
"always clean up" need.</p>
<table>
  <tr><th>C++</th><th>Python</th></tr>
  <tr><td><code>try { … } catch (const std::exception&amp; e) { … }</code></td><td><code>try:</code> … <code>except:</code> …</td></tr>
  <tr><td><code>catch (const std::out_of_range&amp; e) { … }</code></td><td><code>except ValueError:</code></td></tr>
  <tr><td><code>throw std::runtime_error("bad");</code></td><td><code>raise ValueError("bad")</code></td></tr>
  <tr><td>RAII destructor (no <code>finally</code> keyword)</td><td><code>finally:</code></td></tr>
  <tr><td><code>class E : public std::exception {};</code></td><td><code>class E(Exception): ...</code></td></tr>
</table>
<p>You catch a specific class with <code>except ValueError:</code>, and you can
bind the instance with <code>except ValueError as err:</code>. Raising is
<code>raise SomeException("message")</code> — note <code>raise</code>, not
<code>throw</code>, and you raise an <em>instance</em>, not a bare class name
(though <code>raise ValueError</code> also works). A custom exception is just a
subclass of <code>Exception</code>; an empty body with <code>pass</code> is
enough.</p>`,

  cpp: `class ValidationError : public std::runtime_error {
public:
    using std::runtime_error::runtime_error;
};

int checkAge(int age) {
    if (age < 0) throw ValidationError("age must be >= 0");
    return age;
}

int safeCheckAge(int age) {
    try {
        return checkAge(age);
    } catch (const std::exception& e) {
        return -1; // fallback
    }
}`,

  task: `
<p>Build a validator that raises and a safe wrapper that catches:</p>
<ol>
  <li>Define a custom exception <code>ValidationError</code> that subclasses
      <code>Exception</code> (a <code>pass</code> body is fine).</li>
  <li>Write <code>check_age(age)</code>: if <code>age</code> is not an
      <code>int</code>, <code>raise TypeError</code>; if it is negative,
      <code>raise ValidationError</code>; otherwise return the age.</li>
  <li>Write <code>safe_check_age(age)</code> that calls <code>check_age</code>
      inside <code>try</code>/<code>except</code> and returns <code>-1</code> as
      a fallback if <em>any</em> exception is raised.</li>
  <li>Write <code>parse_int(text)</code> that returns <code>int(text)</code>,
      but catches <code>ValueError</code> and returns <code>0</code> for
      un-parseable text. Use an <code>else</code> and/or <code>finally</code>
      clause if you like.</li>
</ol>`,

  starter: `# 1. Custom exception subclassing Exception
class ValidationError(Exception):
    pass  # TODO


# 2. Validator that raises
def check_age(age):
    return None  # TODO


# 3. Safe wrapper that catches and returns a fallback
def safe_check_age(age):
    return None  # TODO


# 4. Parse an int, falling back to 0 on ValueError
def parse_int(text):
    return None  # TODO
`,

  requirements: [
    { pattern: /class\s+ValidationError\s*\(\s*Exception\s*\)/, message: "Subclass Exception for ValidationError" },
    { pattern: /raise\s+ValidationError/, message: "raise ValidationError inside check_age" },
    { pattern: /except\s+ValueError/, message: "Catch ValueError specifically in parse_int" },
  ],

  tests: [
    { name: "check_age(30) returns 30", code: "    expect_eq(check_age(30), 30)" },
    { name: "check_age(-1) raises ValidationError", code: "    raised = False\n    try:\n        check_age(-1)\n    except ValidationError:\n        raised = True\n    expect_true(raised)" },
    { name: "check_age('x') raises TypeError", code: "    raised = False\n    try:\n        check_age(\"x\")\n    except TypeError:\n        raised = True\n    expect_true(raised)" },
    { name: "ValidationError is an Exception", code: "    expect_true(issubclass(ValidationError, Exception))" },
    { name: "safe_check_age(30) returns 30", code: "    expect_eq(safe_check_age(30), 30)" },
    { name: "safe_check_age(-5) falls back to -1", code: "    expect_eq(safe_check_age(-5), -1)" },
    { name: "safe_check_age('nope') falls back to -1", code: "    expect_eq(safe_check_age(\"nope\"), -1)" },
    { name: "parse_int('42') is 42", code: "    expect_eq(parse_int(\"42\"), 42)" },
    { name: "parse_int('oops') falls back to 0", code: "    expect_eq(parse_int(\"oops\"), 0)" },
  ],

  solution: `class ValidationError(Exception):
    pass


def check_age(age):
    if not isinstance(age, int) or isinstance(age, bool):
        raise TypeError("age must be an int")
    if age < 0:
        raise ValidationError("age must be >= 0")
    return age


def safe_check_age(age):
    try:
        return check_age(age)
    except Exception:
        return -1


def parse_int(text):
    try:
        value = int(text)
    except ValueError:
        return 0
    else:
        return value
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Python</th></tr>
  <tr><td>Raise</td><td><code>throw std::runtime_error("x");</code></td><td><code>raise ValueError("x")</code></td></tr>
  <tr><td>Catch one type</td><td><code>catch (const std::out_of_range&amp; e)</code></td><td><code>except ValueError:</code></td></tr>
  <tr><td>Bind the error</td><td><code>catch (const std::exception&amp; e)</code></td><td><code>except ValueError as e:</code></td></tr>
  <tr><td>No-error branch</td><td>(none)</td><td><code>else:</code></td></tr>
  <tr><td>Always run</td><td>RAII destructor (no <code>finally</code> keyword)</td><td><code>finally:</code></td></tr>
  <tr><td>Custom type</td><td><code>class E : public std::exception {};</code></td><td><code>class E(Exception): pass</code></td></tr>
</table>
<p>The four clauses run in a fixed order: the <code>try</code> body, then
<em>either</em> a matching <code>except</code> (if something was raised)
<em>or</em> <code>else</code> (if nothing was), and <code>finally</code> last no
matter what. Prefer catching the narrowest class you can — a bare
<code>except:</code> also swallows <code>KeyboardInterrupt</code> and other
signals, so reach for <code>except Exception:</code> at most, and ideally name
the specific class.</p>
<p>One Python gotcha for C++ folks: <code>bool</code> is a subclass of
<code>int</code>, so <code>isinstance(True, int)</code> is <code>True</code>.
There is no analogue in C++, where <code>bool</code> and <code>int</code> are
distinct types requiring an explicit conversion. That is why the solution's
type check also rules out <code>bool</code> before treating the value as a
valid age.</p>`,
};
