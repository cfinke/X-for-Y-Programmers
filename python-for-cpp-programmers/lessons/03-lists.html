  intro: `
<p>Python's <code>list</code> is the everyday sequence — the counterpart to a
C++ <code>std::vector</code>. It is ordered, mutable, and freely mixes types
(though you will usually keep one kind of thing in it), and unlike a vector it
needs no element type up front and never needs a capacity reserved. What is
new is <em>negative indexing</em> and <em>slicing</em>, two of the most
Pythonic things you will learn this week.</p>
<table>
  <tr><th>C++</th><th>Python</th></tr>
  <tr><td><code>std::vector&lt;int&gt; xs = {1, 2, 3};</code></td><td><code>xs = [1, 2, 3]</code></td></tr>
  <tr><td><code>xs.size()</code></td><td><code>len(xs)</code></td></tr>
  <tr><td><code>xs[xs.size() - 1]</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td><code>xs.push_back(4)</code></td><td><code>xs.append(4)</code></td></tr>
  <tr><td><code>std::vector&lt;int&gt;(xs.begin() + 1, xs.begin() + 3)</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td><code>std::find(xs.begin(), xs.end(), 2) != xs.end()</code></td><td><code>2 in xs</code></td></tr>
</table>
<p>Indexing from the end is built in: <code>xs[-1]</code> is the last element,
<code>xs[-2]</code> the second-to-last — no more <code>xs[xs.size() - 1]</code>
arithmetic. A <em>slice</em> <code>xs[a:b]</code> returns a new list from index
<code>a</code> up to (but not including) <code>b</code>; either bound may be
omitted (<code>xs[:2]</code>, <code>xs[2:]</code>) and a third value is a step
(<code>xs[::-1]</code> reverses). Membership is the <code>in</code> operator —
no iterator dance with <code>std::find</code> — and the length is the free
function <code>len(xs)</code> rather than a <code>.size()</code> method.</p>
<p>Two ways to sort: <code>sorted(xs)</code> returns a new sorted list and leaves
<code>xs</code> alone, while <code>xs.sort()</code> reorders in place and returns
<code>None</code> — the opposite of <code>std::sort</code>, which always mutates
in place and has no built-in way to produce a sorted copy. And when you want to
transform a list into another list, reach for a <em>comprehension</em> —
<code>[n * 2 for n in xs]</code> — the Pythonic replacement for
<code>std::transform</code>.</p>`,

  cpp: `std::vector<int> nums = {3, 1, 2};
nums.push_back(4);
int last = nums[nums.size() - 1];
std::vector<int> firstTwo(nums.begin(), nums.begin() + 2);
std::vector<int> doubled;
std::transform(nums.begin(), nums.end(), std::back_inserter(doubled),
               [](int n) { return n * 2; });
std::vector<int> asc = nums;
std::sort(asc.begin(), asc.end());
bool hasThree = std::find(nums.begin(), nums.end(), 3) != nums.end();`,

  solution: `def make_range(n):
    return [i for i in range(n)]


def last(xs):
    return xs[-1]


def middle(xs):
    return xs[1:-1]


def with_added(xs, value):
    return xs + [value]


def doubled(xs):
    return [n * 2 for n in xs]


def sorted_desc(xs):
    return sorted(xs, reverse=True)


def contains(xs, value):
    return value in xs
`,

  notes: `
<table>
  <tr><th>Operation</th><th>C++</th><th>Python</th></tr>
  <tr><td>Length</td><td><code>xs.size()</code></td><td><code>len(xs)</code></td></tr>
  <tr><td>Last element</td><td><code>xs.back()</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td>Slice</td><td><code>std::vector&lt;int&gt;(xs.begin()+1, xs.begin()+3)</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td>Reverse copy</td><td><code>std::vector&lt;int&gt; r(xs.rbegin(), xs.rend());</code></td><td><code>xs[::-1]</code></td></tr>
  <tr><td>Append</td><td><code>xs.push_back(v)</code></td><td><code>xs.append(v)</code></td></tr>
  <tr><td>Concat many</td><td><code>xs.insert(xs.end(), ys.begin(), ys.end())</code></td><td><code>xs.extend(ys)</code></td></tr>
  <tr><td>Insert at i</td><td><code>xs.insert(xs.begin() + i, v)</code></td><td><code>xs.insert(i, v)</code></td></tr>
  <tr><td>Remove &amp; return</td><td><code>xs.back(); xs.pop_back();</code></td><td><code>xs.pop()</code> / <code>xs.pop(i)</code></td></tr>
  <tr><td>Map</td><td><code>std::transform(xs.begin(), xs.end(), out, f)</code></td><td><code>[f(x) for x in xs]</code></td></tr>
  <tr><td>Sort (copy)</td><td><code>auto ys = xs; std::sort(ys.begin(), ys.end());</code></td><td><code>sorted(xs)</code></td></tr>
  <tr><td>Sort (in place)</td><td><code>std::sort(xs.begin(), xs.end())</code></td><td><code>xs.sort()</code></td></tr>
  <tr><td>Contains</td><td><code>std::find(xs.begin(), xs.end(), v) != xs.end()</code></td><td><code>v in xs</code></td></tr>
</table>
<p>The key mental split is <strong>copy vs. mutate</strong>. <code>sorted(xs)</code>,
a slice, and a comprehension all build a <em>new</em> list; <code>xs.sort()</code>,
<code>xs.append(v)</code>, <code>xs.insert(i, v)</code>, and <code>xs.pop()</code>
change <code>xs</code> in place. The in-place methods return <code>None</code>, so
<code>ys = xs.sort()</code> is a classic beginner bug — it binds <code>ys</code>
to <code>None</code>, unlike C++ where <code>std::sort</code> returns
<code>void</code> and simply can't be misused that way. Also note
<code>xs + [value]</code> makes a fresh list, while <code>xs.append(value)</code>
does not, which is why <code>with_added</code> above uses <code>+</code> to avoid
mutating its argument — there is no reference/pointer aliasing to worry about
either way, since Python lists are always accessed through references.</p>
<p>List comprehensions read left-to-right as "collect <em>expression</em> for each
<em>item</em>," and can filter with a trailing <code>if</code>:
<code>[n for n in xs if n &gt; 0]</code>. They are the first Pythonic idiom worth
building a reflex for — most <code>&lt;algorithm&gt;</code> calls like
<code>std::transform</code> and <code>std::copy_if</code> that you would write in
C++ become a single comprehension here.</p>`,
