  title: "Functions",

  intro: `
<p>You already know functions from C++. Python's <code>def</code> keyword
covers the same ground, but the parameter system is richer at the call site: any
positional parameter can also be passed <em>by name</em>, defaults are written
inline, and two magic prefixes — <code>*args</code> and <code>**kwargs</code> —
collect the leftovers. There are no type annotations required (they are optional
hints, unlike C++'s compile-time-checked signatures), and the body is marked by
indentation after the colon instead of curly braces.</p>
<table>
  <tr><th>C++</th><th>Python</th></tr>
  <tr><td><code>int add(int a, int b) { return a + b; }</code></td><td><code>def add(a, b):</code></td></tr>
  <tr><td><code>std::string greet(std::string name = "friend")</code></td><td><code>def greet(name="friend"):</code></td></tr>
  <tr><td><code>int sum(std::initializer_list&lt;int&gt; nums)</code></td><td><code>def sum(*nums):</code></td></tr>
  <tr><td>manual unpack from a container</td><td><code>fn(*args)</code></td></tr>
  <tr><td><code>return std::make_pair(a, b);</code></td><td><code>return a, b</code></td></tr>
</table>
<p>The big new idea is <strong>keyword arguments</strong>: given
<code>def area(width, height):</code> you can call <code>area(3, 4)</code> or
<code>area(width=3, height=4)</code> or even <code>area(4, width=3)</code>… no,
that last one collides — but <code>area(3, height=4)</code> is fine. This makes
calls self-documenting and lets defaults live anywhere, unlike C++ where only
trailing parameters may have defaults and there is no way to name an argument
at the call site. To gather extra positionals use <code>*args</code> (a tuple);
to gather extra named ones use <code>**kwargs</code> (a dict) — no need for
variadic templates or <code>std::initializer_list</code>. And returning several
values is just returning a comma-separated tuple: <code>return lo, hi</code> —
the caller unpacks with <code>lo, hi = bounds(...)</code>, with none of the
ceremony of <code>std::pair</code>, <code>std::tuple</code>, or output
parameters.</p>`,

  cpp: `std::string greet(const std::string& name, const std::string& greeting = "Hello") {
    return greeting + ", " + name + "!";
}

int total(std::initializer_list<int> nums) {
    int sum = 0;
    for (int n : nums) sum += n;
    return sum;
}

std::pair<int, int> minMax(const std::vector<int>& nums) {
    auto [lo, hi] = std::minmax_element(nums.begin(), nums.end());
    return {*lo, *hi};
}`,

      e.g. <code>min_max(3, 1, 2)</code> returns <code>(1, 3)</code>. Use

</ol>`,

  solution: `def greet(name, greeting="Hello"):
    return f"{greeting}, {name}!"


def total(*nums):
    result = 0
    for n in nums:
        result += n
    return result


def min_max(*nums):
    lo = min(nums)
    hi = max(nums)
    return lo, hi

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Python</th></tr>
  <tr><td>Define</td><td><code>int f(int a) { … }</code></td><td><code>def f(a):</code></td></tr>
  <tr><td>Default</td><td><code>int f(int a = 1)</code></td><td><code>def f(a=1):</code></td></tr>
  <tr><td>Rest / varargs</td><td><code>std::initializer_list&lt;T&gt;</code> or variadic templates</td><td><code>def f(*xs):</code> (a tuple)</td></tr>
  <tr><td>Named extras</td><td>(no direct equivalent)</td><td><code>def f(**kw):</code> (a dict)</td></tr>
  <tr><td>Call by name</td><td>—</td><td><code>f(a=1, b=2)</code></td></tr>
  <tr><td>Spread a call</td><td>manual unpack, or <code>std::apply</code> for tuples</td><td><code>f(*arr)</code>, <code>f(**dct)</code></td></tr>
  <tr><td>Multiple return</td><td><code>return std::make_pair(a, b);</code></td><td><code>return a, b</code></td></tr>
</table>
<p>Two gotchas worth internalizing early. First, <strong>never use a mutable
default</strong> like <code>def f(items=[]):</code> — the list is created once at
definition time and shared across every call, the way a <code>static</code>
local in C++ would persist between calls. The idiom is
<code>def f(items=None):</code> then <code>if items is None: items = []</code>
inside. Second, <code>*args</code> gives you a <em>tuple</em>, not a list, and
<code>**kwargs</code> gives you a <em>dict</em> — you can iterate them exactly
like any other collection, with no need to specify element types the way a
templated C++ function would. Returning <code>a, b</code> builds a tuple, and the
caller can either keep it whole or unpack it into names in one line, which is how
Python code so often avoids ever declaring an output "shape" type or a
<code>struct</code> just to bundle a couple of return values.</p>`,
