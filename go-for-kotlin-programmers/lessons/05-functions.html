const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>Functions in Go are first-class values, just like in Kotlin — you can pass
them as arguments, store them in variables, and return them. But Go adds a few
things Kotlin does not have natively: a function can return <em>multiple</em>
values without wrapping them in a <code>Pair</code> or a <code>data class</code>,
those results can be <em>named</em>, and the last parameter can be
<em>variadic</em> with <code>...</code>.</p>
<table>
  <tr><th>Kotlin</th><th>Go</th></tr>
  <tr><td><code>fun f(): Pair&lt;Int, Boolean&gt;</code></td><td><code>func f() (int, bool)</code> (real multi-return)</td></tr>
  <tr><td><code>val (q, ok) = f()</code></td><td><code>q, ok := f()</code></td></tr>
  <tr><td><code>fun sum(vararg ns: Int): Int</code></td><td><code>func Sum(ns ...int) int</code></td></tr>
  <tr><td><code>(Int) -&gt; Int</code></td><td><code>func(int) int</code></td></tr>
</table>
<p>The <code>(value, ok)</code> pair is a pervasive Go idiom: instead of returning
a nullable <code>Int?</code>, a lookup returns two values where the second is a
<code>bool</code> that says whether the first is meaningful. Named return values
let you declare the result variables in the signature and <code>return</code> with
no arguments — a "naked" return. And a variadic parameter collects extra arguments
into a slice, so inside <code>Sum</code> the parameter <code>ns</code> is just an
<code>[]int</code> — much like Kotlin's <code>vararg ns: Int</code> is a plain
<code>IntArray</code> inside the function body.</p>`,

  kotlin: `fun safeDivide(a: Int, b: Int): Pair<Int, Boolean> {
    if (b == 0) return 0 to false
    return (a / b) to true
}

fun sum(vararg ns: Int): Int = ns.sum()

val transform = { f: (Int) -> Int, ns: List<Int> -> ns.map(f) }`,

  task: `
<p>Write these as package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>Sum(nums ...int) int</code> — a <strong>variadic</strong> function that
      returns the total of all arguments. <code>Sum()</code> is <code>0</code>,
      <code>Sum(1, 2, 3)</code> is <code>6</code>.</li>
  <li><code>SafeDivide(a, b int) (q int, ok bool)</code> — use <strong>named
      returns</strong>. When <code>b</code> is <code>0</code>, return
      <code>0, false</code>; otherwise return the quotient and <code>true</code>.</li>
  <li><code>Transform(f func(int) int, nums []int) []int</code> — take a
      <strong>function as a parameter</strong> and return a new slice with
      <code>f</code> applied to each element.</li>
</ol>`,

  starter: `func Sum(nums ...int) int {
	return 0 // TODO
}

func SafeDivide(a, b int) (q int, ok bool) {
	return 0, false // TODO
}

func Transform(f func(int) int, nums []int) []int {
	return nil // TODO
}
`,

  requirements: [
    { pattern: /nums\s+\.\.\.int/, message: "Sum must take a variadic parameter (nums ...int)" },
    { pattern: /\(q int, ok bool\)/, message: "SafeDivide must use named return values (q int, ok bool)" },
    { pattern: /f\s+func\(int\)\s*int/, message: "Transform must take a function parameter f func(int) int" },
  ],

  tests: [
    { name: "Sum() is 0", code: "\t\texpect_eq(Sum(), 0)" },
    { name: "Sum(1, 2, 3) is 6", code: "\t\texpect_eq(Sum(1, 2, 3), 6)" },
    { name: "Sum(5, 10, 15, 20) is 50", code: "\t\texpect_eq(Sum(5, 10, 15, 20), 50)" },
    { name: "SafeDivide(10, 2) is 5, true", code: "\t\tq, ok := SafeDivide(10, 2)\n\t\texpect_eq(q, 5)\n\t\texpect_true(ok)" },
    { name: "SafeDivide(7, 0) is 0, false", code: "\t\tq, ok := SafeDivide(7, 0)\n\t\texpect_eq(q, 0)\n\t\texpect_true(!ok)" },
    { name: "Transform squares each element", code: "\t\tgot := Transform(func(x int) int { return x * x }, []int{1, 2, 3})\n\t\texpect_eq(got, []int{1, 4, 9})" },
    { name: "Transform doubles each element", code: "\t\tgot := Transform(func(x int) int { return x * 2 }, []int{4, 5})\n\t\texpect_eq(got, []int{8, 10})" },
  ],

  solution: `func Sum(nums ...int) int {
	total := 0
	for _, n := range nums {
		total += n
	}
	return total
}

func SafeDivide(a, b int) (q int, ok bool) {
	if b == 0 {
		return 0, false
	}
	q = a / b
	ok = true
	return
}

func Transform(f func(int) int, nums []int) []int {
	out := make([]int, len(nums))
	for i, n := range nums {
		out[i] = f(n)
	}
	return out
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Go</th></tr>
  <tr><td>Multiple returns</td><td><code>Pair&lt;Int, Boolean&gt;</code> (or a data class)</td><td><code>(int, bool)</code> native</td></tr>
  <tr><td>Destructure result</td><td><code>val (q, ok) = f()</code></td><td><code>q, ok := f()</code></td></tr>
  <tr><td>Named returns</td><td>—</td><td><code>func f() (q int, ok bool)</code> + naked <code>return</code></td></tr>
  <tr><td>Variadic</td><td><code>vararg ns: Int</code></td><td><code>ns ...int</code></td></tr>
  <tr><td>Function type</td><td><code>(Int) -&gt; Int</code></td><td><code>func(int) int</code></td></tr>
  <tr><td>Absent value</td><td><code>Int?</code> (nullable)</td><td><code>(T, bool)</code> comma-ok</td></tr>
</table>
<p>The <code>(value, ok)</code> convention is everywhere in Go: map access
(<code>v, ok := m[k]</code>), type assertions, and channel receives all return it.
Preferring it over a nullable type means the caller is nudged to check
<code>ok</code> before trusting the value, rather than risking a missed null check.
Named returns are handy for short functions and for documenting what each result
means, but a bare <code>return</code> in a long function hurts readability — use
them sparingly. To spread a slice into a variadic call, write
<code>Sum(xs...)</code>, the mirror image of Kotlin's spread operator
<code>sum(*xs)</code>.</p>`,
};
