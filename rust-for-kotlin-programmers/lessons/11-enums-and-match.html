<script>
const LESSON = {
  number: 11,
  title: "Enums & Pattern Matching",

  intro: `
<p>Kotlin's sealed interfaces, data classes, and exhaustive <code>when</code>
give you a closed set of shapes the compiler can check exhaustively. Rust
enums are that same idea in a tighter package. Where Kotlin needs a
<code>sealed interface</code> plus one <code>data class</code> per case, a Rust
<code>enum</code> declares the whole sealed hierarchy in four lines, with each
variant carrying its own data.</p>
<table>
  <tr><th>Kotlin</th><th>Rust</th></tr>
  <tr><td><code>sealed interface Shape</code><br><code>data class Circle(val radius: Double) : Shape</code></td><td><code>enum Shape { Circle { radius: f64 }, ... }</code></td></tr>
  <tr><td><code>when (shape) { is Circle -> ... }</code></td><td><code>match shape { Shape::Circle { radius } => ... }</code></td></tr>
  <tr><td>Exhaustive over a sealed hierarchy</td><td>Exhaustive over every variant, always</td></tr>
  <tr><td><code>Circle(2.0)</code></td><td><code>Shape::Circle { radius: 2.0 }</code></td></tr>
</table>
<p><code>match</code> is your exhaustive <code>when</code>: leave out a
variant and you get a compile error, exactly like a <code>when</code> over a
sealed type with a missing case. The patterns also destructure —
<code>Shape::Circle { radius }</code> binds the variant's field in the same
breath, going one step further than a Kotlin <code>is Circle</code> smart cast
that only narrows the type. You've already met this machinery:
<code>Option</code> and <code>Result</code> from earlier lessons are just enums
like this one.</p>`,

  kotlin: `sealed interface Shape
data class Circle(val radius: Double) : Shape
data class Rectangle(val width: Double, val height: Double) : Shape

fun area(shape: Shape): Double = when (shape) {
    is Circle    -> Math.PI * shape.radius * shape.radius
    is Rectangle -> shape.width * shape.height
    // No else branch needed: the hierarchy is sealed,
    // so the compiler knows these two cases are exhaustive.
}

val s: Shape = Circle(2.0)
println(area(s)) // 12.566...`,

  task: `
<p>The Rust side of the sealed hierarchy is already written for you:</p>
<ol>
  <li>Keep the <code>enum Shape</code> definition from the starter — the tests
      construct <code>Shape::Circle { radius: 1.0 }</code> and
      <code>Shape::Rectangle { width: 3.0, height: 4.0 }</code> directly.</li>
  <li>Implement <code>area(shape: &amp;Shape) -&gt; f64</code> using a
      <code>match</code> expression. A circle's area is
      <code>std::f64::consts::PI * radius * radius</code>; a rectangle's is
      <code>width * height</code>. Destructure the fields right in the match
      arms, going further than a Kotlin smart cast.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// The whole sealed hierarchy — interface + two records — in four lines:
enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

// area: match on the shape and destructure each variant's fields.
// Circle: std::f64::consts::PI * radius * radius. Rectangle: width * height.
fn area(shape: &Shape) -> f64 {
    todo!()
}
`,

  requirements: [
    { pattern: /enum\s+Shape/, message: "Keep the enum Shape definition" },
    { pattern: /match\b/, message: "Use a match expression in area" },
    { pattern: /Circle\s*\{/, message: "Handle the Circle variant with a destructuring pattern" },
  ],

  tests: [
    { name: "area of Circle { radius: 1.0 } is about PI",
      code: 'assert!((area(&Shape::Circle { radius: 1.0 }) - std::f64::consts::PI).abs() < 0.001, "expected about 3.14159");' },
    { name: "area of Circle { radius: 2.0 } is about 4*PI",
      code: 'assert!((area(&Shape::Circle { radius: 2.0 }) - 4.0 * std::f64::consts::PI).abs() < 0.001, "expected about 12.566");' },
    { name: "area of Rectangle { width: 3.0, height: 4.0 } is 12.0",
      code: "assert_eq!(area(&Shape::Rectangle { width: 3.0, height: 4.0 }), 12.0);" },
    { name: "area of Rectangle { width: 2.5, height: 2.0 } is 5.0",
      code: "assert_eq!(area(&Shape::Rectangle { width: 2.5, height: 2.0 }), 5.0);" },
  ],

  solution: `enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

fn area(shape: &Shape) -> f64 {
    match shape {
        Shape::Circle { radius } => std::f64::consts::PI * radius * radius,
        Shape::Rectangle { width, height } => width * height,
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Rust</th></tr>
  <tr><td>Closed hierarchy</td><td><code>sealed interface</code> + <code>data class</code> per case</td><td>one <code>enum</code>, variants carry data</td></tr>
  <tr><td>Construct a case</td><td><code>Circle(2.0)</code></td><td><code>Shape::Circle { radius: 2.0 }</code></td></tr>
  <tr><td>Branch on the case</td><td><code>when (shape) { is Circle -> ... }</code></td><td><code>match shape { Shape::Circle { radius } => ... }</code></td></tr>
  <tr><td>Destructure fields</td><td><code>is Circle</code> smart-casts, then <code>shape.radius</code></td><td><code>Shape::Circle { radius }</code> — any pattern, anywhere</td></tr>
  <tr><td>Missing case</td><td>compile error (when over a sealed type)</td><td>compile error, always</td></tr>
</table>
<p>Note that <code>match</code> is an expression, so each arm's value becomes
the function's return value with no <code>return</code> in sight — the same
trick as a Kotlin <code>when</code> used as an expression. Try deleting the
<code>Rectangle</code> arm and running the tests: the compiler names the exact
variant you forgot, which is precisely the safety an exhaustive
<code>when</code> brings to Kotlin.</p>`,
};
</script>
