<p>Final lesson — no new syntax, just everything at once. You'll build a small
inventory system of the kind you've written in Kotlin a hundred times: a data
class, a total, a lookup, an update, a filtered projection. Every piece maps
onto something from this course: <code>struct</code> instead of a
<code>data class</code>, <code>Option&lt;&amp;Item&gt;</code> instead of a
nullable <code>Item?</code>, iterator chains instead of collection functions,
and <code>&amp;mut</code> instead of "hope nobody else is mutating this list

<table>
  <tr><th>Kotlin</th><th>Rust</th></tr>
  <tr><td><code>data class Item(val name: String, val priceCents: Int, val count: Int)</code></td><td><code>struct Item { name: String, price_cents: u32, count: u32 }</code></td></tr>
  <tr><td><code>items.sumOf { it.priceCents * it.count }</code></td><td><code>items.iter().map(|i| ...).sum()</code></td></tr>
  <tr><td><code>Item?</code> via <code>.firstOrNull { ... }</code></td><td><code>Option&lt;&amp;Item&gt;</code> via <code>.iter().find(...)</code></td></tr>
  <tr><td>mutate freely, document "not thread-safe"</td><td><code>&amp;mut Vec&lt;Item&gt;</code> — exclusive access, compiler-checked</td></tr>
  <tr><td><code>.filter { ... }.map { ... }</code></td><td><code>.filter(...).map(...).collect()</code></td></tr>
</table>
<p>Two ownership details to watch. <code>find_item</code> returns a
<em>borrowed</em> <code>Option&lt;&amp;Item&gt;</code> — no copy, just a
reference into the slice, which is why its signature carries the
<code>&lt;'a&gt;</code> from lesson 16 (the result borrows from
<code>items</code>, not from <code>name</code> — two reference inputs, so
elision alone can't tell which one). And <code>restock</code> takes

opted into by the caller — a guarantee no amount of KDoc provides.</p>`,

  kotlin: `data class Item(val name: String, val priceCents: Int, val count: Int)

  task: `
<p>The <code>Item</code> struct is complete in the starter. Implement the four

  solution: `struct Item {
    name: String,
    price_cents: u32,
    count: u32,
}

fn total_value(items: &[Item]) -> u32 {
    items.iter().map(|i| i.price_cents * i.count).sum()
}

fn find_item<'a>(items: &'a [Item], name: &str) -> Option<&'a Item> {
    items.iter().find(|i| i.name == name)
}

fn restock(items: &mut Vec<Item>, name: &str, amount: u32) -> bool {
    match items.iter_mut().find(|i| i.name == name) {
        Some(item) => {
            item.count += amount;
            true
        }
        None => false,
    }
}

fn names_in_stock(items: &[Item]) -> Vec<String> {
    items.iter()
        .filter(|i| i.count > 0)
        .map(|i| i.name.clone())
        .collect()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Rust</th></tr>
  <tr><td>Data type</td><td><code>data class Item(...)</code></td><td><code>struct Item { ... }</code></td></tr>
  <tr><td>Aggregate</td><td><code>.sumOf { ... }</code></td><td><code>.iter().map(...).sum()</code></td></tr>
  <tr><td>Maybe-a-result</td><td><code>Item?</code> (a nullable reference)</td><td><code>Option&lt;&amp;Item&gt;</code> (a checked borrow, lifetime and all)</td></tr>
  <tr><td>In-place update</td><td>mutate and hope callers expected it</td><td><code>&amp;mut Vec&lt;Item&gt;</code> — exclusivity in the signature</td></tr>
  <tr><td>Filtered projection</td><td><code>.filter { ... }.map { ... }</code></td><td><code>.filter(...).map(...).collect()</code></td></tr>
  <tr><td>Find-and-mutate</td><td><code>indexOfFirst { ... }</code> or a second lookup</td><td><code>.iter_mut().find(...)</code> → <code>Option&lt;&amp;mut Item&gt;</code></td></tr>
</table>
<p>Step back and look at what the signatures alone tell a reader:
<code>total_value</code> and <code>names_in_stock</code> only look
(<code>&amp;[Item]</code>), <code>restock</code> mutates
(<code>&amp;mut</code>), <code>find_item</code> lends you a view into data you
don't own (<code>Option&lt;&amp;'a Item&gt;</code>), and nothing can be
<code>null</code>. In Kotlin the exclusivity and borrow information lives in
KDoc and convention; in Rust it's machine-checked on every call. That's the
trade you've been learning for twenty lessons — more to say up front, far less
to debug later.</p>`,
