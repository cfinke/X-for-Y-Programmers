<div id="app"></div>
<script>
const LESSON = {
  number: 2,
  title: "Functions & Control Flow",

  intro: `
<p>Free functions will feel familiar — Kotlin already lets you declare
<code>fun maxOf(a, b)</code> at the top level of a file, no wrapper class
required, and Rust's <code>fn max_of(a, b)</code> works the same way. The
signature order is close too: types come <em>after</em> names
(<code>x: i32</code>, just like Kotlin's <code>x: Int</code>), but the return
type moves behind an arrow — <code>-> String</code> — instead of Kotlin's
<code>: String</code>.</p>
<table>
  <tr><th>Kotlin</th><th>Rust</th></tr>
  <tr><td><code>fun f(x: Int): String { ... }</code></td><td><code>fn f(x: i32) -> String { ... }</code></td></tr>
  <tr><td><code>val m = if (a &gt; b) a else b</code></td><td><code>let m = if a &gt; b { a } else { b };</code></td></tr>
  <tr><td><code>return x</code> or <code>= x</code></td><td>last expression, no semicolon</td></tr>
  <tr><td>top-level functions</td><td>free functions at file scope</td></tr>
</table>
<p>Like Kotlin, in Rust nearly everything is an <em>expression</em> — it
produces a value. You already reach for <code>val m = if (a &gt; b) a else b</code>
instead of a ternary (Kotlin dropped <code>? :</code> for exactly this reason),
and Rust's <code>if</code> works the same way:
<code>let m = if a &gt; b { a } else { b };</code> (and it scales to
<code>else if</code> chains just as cleanly). The genuinely new rule is about
blocks and semicolons: a block's last expression — written <em>without</em> a
semicolon — is the block's value. It's like Kotlin's single-expression
<code>fun f() = expr</code> form, but generalized to every <code>{ }</code>,
which is why idiomatic Rust functions usually end with a bare expression
instead of <code>return</code>.</p>`,

  kotlin: `// Kotlin: these helpers live at the top level — no wrapper class needed.
fun maxOf(a: Int, b: Int): Int = if (a > b) a else b   // if as a value

fun grade(score: Int): String {
    val result = if (score >= 60) "pass" else "fail"
    return result
}

fun sign(n: Int): Int = when {
    n > 0 -> 1
    n < 0 -> -1
    else -> 0
}`,

  task: `
<p>You already write these as top-level Kotlin functions; now build the Rust
equivalents — no <code>return</code> keyword anywhere, letting the last
expression be the value:</p>
<ol>
  <li><code>max_of</code> takes <code>a: i32</code> and <code>b: i32</code>
      and returns <code>i32</code> — the larger of the two. Make the
      <code>if</code>/<code>else</code> expression itself the function body's
      last expression.</li>
  <li><code>grade</code> takes <code>score: u32</code> and returns
      <code>String</code>: <code>"pass"</code> for scores of 60 and above,
      <code>"fail"</code> below. Bind the result of an <code>if</code>
      expression with <code>let</code> (just like Kotlin's
      <code>val result = if (...) ... else ...</code>), then return that
      binding as the last expression. Use <code>String::from("...")</code> to
      make an owned <code>String</code>.</li>
  <li><code>sign</code> takes <code>n: i32</code> and returns <code>i32</code>:
      <code>1</code> if positive, <code>-1</code> if negative, <code>0</code>
      if zero — one <code>if</code>/<code>else if</code>/<code>else</code>
      chain as the body (where Kotlin would reach for <code>when</code>).</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. max_of: the whole body is one if/else expression — no \`return\`.
fn max_of(a: i32, b: i32) -> i32 {
    todo!()
}

// 2. grade: let result = if score >= 60 { ... } else { ... };
//    then \`result\` alone (no semicolon) as the last line.
fn grade(score: u32) -> String {
    todo!()
}

// 3. sign: if / else if / else, each branch producing the value.
fn sign(n: i32) -> i32 {
    todo!()
}
`,

  requirements: [
    { pattern: /->/, message: "Declare return types with -> after the parameter list" },
    { pattern: /=\s*if\b/, message: "Bind the result of an if expression with let (the ternary replacement)" },
  ],

  tests: [
    { name: "max_of(3, 7) returns 7",
      code: "assert_eq!(max_of(3, 7), 7);" },
    { name: "max_of(10, -2) returns 10",
      code: "assert_eq!(max_of(10, -2), 10);" },
    { name: 'grade(72) returns "pass" and grade(60) returns "pass"',
      code: 'assert_eq!(grade(72), "pass");\nassert_eq!(grade(60), "pass");' },
    { name: 'grade(59) returns "fail"',
      code: 'assert_eq!(grade(59), "fail");' },
    { name: "sign(42) returns 1 and sign(-7) returns -1",
      code: "assert_eq!(sign(42), 1);\nassert_eq!(sign(-7), -1);" },
    { name: "sign(0) returns 0",
      code: "assert_eq!(sign(0), 0);" },
  ],

  solution: `fn max_of(a: i32, b: i32) -> i32 {
    if a > b { a } else { b }
}

fn grade(score: u32) -> String {
    let result = if score >= 60 { "pass" } else { "fail" };
    String::from(result)
}

fn sign(n: i32) -> i32 {
    if n > 0 {
        1
    } else if n < 0 {
        -1
    } else {
        0
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Rust</th></tr>
  <tr><td>Function</td><td><code>fun f(x: Int): String</code></td><td><code>fn f(x: i32) -> String</code></td></tr>
  <tr><td>Where it lives</td><td>top level or inside a class</td><td>free at file scope</td></tr>
  <tr><td>Conditional value</td><td><code>if (a &gt; b) a else b</code></td><td><code>if a &gt; b { a } else { b }</code></td></tr>
  <tr><td>Returning</td><td><code>return x</code> or <code>= x</code></td><td>last expression, no semicolon (<code>return</code> exists but is for early exits)</td></tr>
  <tr><td>Multi-way</td><td><code>when</code> expression</td><td>one <code>if</code>/<code>else if</code>/<code>else</code> expression</td></tr>
</table>
<p>The semicolon rule is the one to internalize: <code>x</code> is an
expression that yields a value; <code>x;</code> is a statement that throws it
away. Forget and end a function body with a semicolon, and the compiler will
tell you the function returns <code>()</code> — Rust's <code>Unit</code> —
instead of your declared type. It's the most common early stumble, and the
error message names it exactly.</p>`,
};
</script>
