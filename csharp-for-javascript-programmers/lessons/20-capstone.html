<p>Time to put the whole course together. You'll build a small
<strong>typed in-memory repository</strong> — the same shape you'd reach for in
JavaScript with a <code>Map</code> behind a class, but assembled
from the C# tools you've collected: a generic class with a constraint, an
interface, LINQ, and real exceptions instead of returning <code>undefined</code>.</p>
<table>
  <tr><th>JavaScript</th><th>C#</th></tr>
  <tr><td><code>class Repo</code> (no compile-time shape check)</td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td><code>#items = new Map()</code></td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td><code>items.values()</code> then <code>.filter(...)</code></td><td><code>items.Values.Where(...)</code> (LINQ)</td></tr>
  <tr><td><code>throw new NotFoundError(...)</code></td><td><code>throw new NotFoundException(...)</code></td></tr>
  <tr><td>return the item, or <code>undefined</code></td><td>return <code>T</code>, or <em>throw</em></td></tr>
</table>
<p>Two design habits carry over cleanly, though C# makes them explicit where
JavaScript leaves them to convention. The generic <em>constraint</em>
(<code>where T : IEntity</code>) is C#'s answer to a comment saying "every item
must have an <code>id</code>": it lets the repository read <code>item.Id</code>
because the compiler guarantees every <code>T</code> has it. And where
JavaScript code often just returns <code>undefined</code> for a miss, idiomatic
C# throws a custom exception derived from <code>Exception</code> — the caller
either gets a valid <code>T</code> or a failure it can <code>catch</code> by
type.</p>`,

  javascript: `class NotFoundError extends Error {}

class Repository {
  #items = new Map();

  add(item) {
    if (this.#items.has(item.id))
      throw new Error(\`id \${item.id} already exists\`);
    this.#items.set(item.id, item);
  }

  get(id) {
    const item = this.#items.get(id);
    if (item === undefined)
      throw new NotFoundError(\`id \${id} not found\`);
    return item;
  }

  where(predicate) {
    return [...this.#items.values()]
      .filter(predicate)
      .sort((a, b) => a.id - b.id);
  }

  get count() {
    return this.#items.size;
  }
}`,

  solution: `interface IEntity {
  int Id { get; }
}

class NotFoundException : Exception {
  public NotFoundException(string message) : base(message) {
  }
}

class Repository<T> where T : IEntity {
  private Dictionary<int, T> items = new Dictionary<int, T>();

  public void Add(T item) {
    if (items.ContainsKey(item.Id)) {
      throw new InvalidOperationException($"id {item.Id} already exists");
    }
    items[item.Id] = item;
  }

  public T Get(int id) {
    T value;
    if (!items.TryGetValue(id, out value)) {
      throw new NotFoundException($"id {id} not found");
    }
    return value;
  }

  public bool Remove(int id) {
    return items.Remove(id);
  }

  public List<T> Where(Func<T, bool> predicate) {
    return items.Values.Where(predicate).OrderBy(x => x.Id).ToList();
  }

  public int Count {
    get { return items.Count; }
  }
}

class User : IEntity {
  public int Id { get; private set; }
  public string Name { get; private set; }
  public int Age { get; private set; }

  public User(int id, string name, int age) {
    Id = id;
    Name = name;
    Age = age;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>C#</th></tr>
  <tr><td>Constrained generic</td><td>duck typing — no compile-time check</td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td>Keyed store</td><td><code>Map</code></td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td>Safe lookup</td><td><code>map.get(id)</code> → value or <code>undefined</code></td><td><code>TryGetValue(id, out value)</code></td></tr>
  <tr><td>Filter</td><td><code>arr.filter(p)</code></td><td><code>seq.Where(p)</code> (LINQ)</td></tr>
  <tr><td>Custom error</td><td><code>class E extends Error</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Catch by type</td><td><code>catch (e) { if (e instanceof E) }</code></td><td><code>catch (E ex) { }</code></td></tr>
</table>
<p>A few things came together here. <code>where T : IEntity</code> is what unlocks
<code>item.Id</code> inside the generic — without the constraint the compiler only
knows <code>T</code> is <em>some</em> type and would reject the member access,
something JavaScript never checks at all since <code>item.id</code> just resolves
(or evaluates to <code>undefined</code>) at runtime. The LINQ chain
<code>Where(...).OrderBy(...).ToList()</code> is lazy until <code>ToList()</code>
forces it, mirroring how you'd <code>filter</code> then <code>sort</code> an array.</p>
<p>The big idiomatic shift from JavaScript is error handling: rather than returning
<code>undefined</code> and making every caller check for it, C# code throws a
typed exception on the exceptional path. Callers <code>catch</code> by exception
type — <code>catch (NotFoundException ex)</code> — which is both more precise and
more discoverable than an <code>instanceof</code> ladder. That's the whole course
in one small object: types that are real at runtime, generics with constraints,
interfaces as contracts, LINQ for querying, and exceptions for failure.</p>`,
