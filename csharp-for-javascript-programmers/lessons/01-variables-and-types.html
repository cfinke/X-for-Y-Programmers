const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>JavaScript and C# look related on the surface — both use curly braces,
<code>function</code>-shaped syntax, and <code>async</code>/<code>await</code> —
but C# is statically typed, its types are real and checked at compile time, the
numeric types are distinct, and every method lives inside a class or struct.</p>
<table>
  <tr><th>JavaScript</th><th>C#</th></tr>
  <tr><td><code>let age = 36;</code></td><td><code>int age = 36;</code></td></tr>
  <tr><td><code>const name = "Ada";</code></td><td><code>var name = "Ada";</code> (inferred)</td></tr>
  <tr><td><code>\`\${name} is \${age}\`</code></td><td><code>$"{name} is {age}"</code></td></tr>
  <tr><td><code>number</code> (one type for everything)</td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>decimal</code>, …</td></tr>
</table>
<p>Two adjustments. First, <code>var</code> in C# is not the loose, reassignable
<code>var</code> you may remember from old JavaScript — it means "infer the type
from the initializer," and the type is fixed once chosen. Second, the numeric
split matters: JavaScript has a single <code>number</code> type, but C# separates
integers from floating point, so <code>7 / 2</code> is <code>3</code> (integer
division), while <code>7 / 2.0</code> is <code>3.5</code>. Interpolated strings
wear a <code>$</code> prefix, and there are no free functions — helpers become
<code>static</code> methods on a class.</p>`,

  javascript: `let age = 36;
const userName = "Ada";

function describe(name, age) {
  return \`\${name} is \${age}\`;
}`,

  task: `
<p>Write the C# version. C# has no top-level functions, so put your methods in a
class:</p>
<ol>
  <li>Declare a <code>static class Basics</code> holding <code>static</code>
      methods.</li>
  <li><code>Add(int a, int b)</code> returns their sum.</li>
  <li><code>Describe(string name, int age)</code> returns a string like
      <code>"Ada is 36"</code> — use an interpolated string
      <code>$"{name} is {age}"</code>.</li>
  <li><code>Divide(int a, int b)</code> returns a <code>double</code>, so
      <code>Divide(7, 2)</code> is <code>3.5</code>. Cast one operand:
      <code>(double)a / b</code>.</li>
</ol>`,

  starter: `static class Basics {
  public static int Add(int a, int b) {
    return 0; // TODO
  }

  public static string Describe(string name, int age) {
    return ""; // TODO
  }

  public static double Divide(int a, int b) {
    return 0; // TODO: watch out for integer division
  }
}
`,

  requirements: [
    { pattern: /\$"/, message: "Build the string with an interpolated string ($\"...\")" },
    { pattern: /\(double\)/, message: "Cast to (double) so Divide returns a fractional result" },
  ],

  tests: [
    { name: "Add(2, 3) is 5", code: "      expect_eq(Basics.Add(2, 3), 5);" },
    { name: "Describe(\"Ada\", 36) is \"Ada is 36\"", code: "      expect_eq(Basics.Describe(\"Ada\", 36), \"Ada is 36\");" },
    { name: "Describe(\"Rob\", 68) is \"Rob is 68\"", code: "      expect_eq(Basics.Describe(\"Rob\", 68), \"Rob is 68\");" },
    { name: "Divide(7, 2) is 3.5", code: "      expect_eq(Basics.Divide(7, 2), 3.5);" },
    { name: "Divide(10, 4) is 2.5", code: "      expect_eq(Basics.Divide(10, 4), 2.5);" },
  ],

  solution: `static class Basics {
  public static int Add(int a, int b) {
    return a + b;
  }

  public static string Describe(string name, int age) {
    return $"{name} is {age}";
  }

  public static double Divide(int a, int b) {
    return (double)a / b;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>C#</th></tr>
  <tr><td>Typed variable</td><td><code>let x = 1;</code> (no type)</td><td><code>int x = 1;</code></td></tr>
  <tr><td>Inferred variable</td><td><code>let x = 1;</code></td><td><code>var x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>const x = 1;</code></td><td><code>const int x = 1;</code></td></tr>
  <tr><td>Interpolation</td><td><code>\`\${x}\`</code></td><td><code>$"{x}"</code></td></tr>
  <tr><td>Free function</td><td><code>function f() {}</code></td><td><code>static</code> method in a class</td></tr>
</table>
<p>The integer-division gotcha is the classic first surprise for a JavaScript
programmer: JavaScript's single <code>number</code> type makes <code>7 / 2</code>
equal <code>3.5</code> without a second thought, but C#'s <code>int / int</code>
truncates. Promote one side to <code>double</code> — a cast, a literal like
<code>2.0</code>, or a <code>double</code> variable — and the whole expression
becomes floating point. For money, reach for <code>decimal</code> instead of
<code>double</code> to avoid binary rounding error.</p>`,
};
