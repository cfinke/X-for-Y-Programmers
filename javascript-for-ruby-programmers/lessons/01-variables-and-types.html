<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Ruby and JavaScript are both dynamically typed under the hood: a name is
just bound to a value, and nothing about the name itself constrains what it
can point to next. If you've ever reassigned a Ruby local variable from a
number to a string without so much as a warning, you already understand the
JavaScript mindset — plain, unchecked assignment is the norm in both
languages. Start with the smallest change: Ruby's bare assignment becomes
JavaScript's <code>const</code> and <code>let</code>.</p>
<table>
  <tr><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td><code>age = 36</code></td><td><code>let age = 36;</code></td></tr>
  <tr><td><code>name = "Ada"</code></td><td><code>const name = "Ada";</code></td></tr>
  <tr><td><code>NAME = "Ada"</code> (constant, warns on reassignment)</td><td><code>const</code> — reassignment is a runtime error</td></tr>
</table>
<p>The difference that matters is enforcement. Ruby's <code>NAME = "Ada"</code>
style constants only emit a warning if you reassign them — the program keeps
running. JavaScript enforces it: reach for <code>const</code> by default and
rebinding the name becomes a real <code>TypeError</code>. Two habits carry you
a long way: prefer <code>const</code> over <code>let</code>, and use the
<code>typeof</code> operator when you genuinely need to know what you are
holding — the JavaScript analogue of Ruby's <code>.class</code>.</p>`,

  ruby: `age = 36
user_name = "Ada"

def describe(name, age)
  "#{name} is #{age}"
end`,

  task: `
<p>Write the JavaScript version of the same code:</p>
<ol>
  <li>Declare a constant <code>userName</code> = <code>"Ada"</code> and a
      variable <code>userAge</code> = <code>36</code> — no type annotations,
      and use <code>let</code> for <code>userAge</code>.</li>
  <li>Write <code>describe(name, age)</code> that returns a string like
      <code>"Ada is 36"</code> using a template literal — the JavaScript
      equivalent of Ruby's string interpolation.</li>
  <li>Write <code>typeOf(value)</code> that returns the JavaScript
      <code>typeof</code> string for whatever it is given, the way Ruby's
      <code>value.class</code> would tell you the class.</li>
</ol>`,

  starter: `// 1. userName (const) and userAge (let) — no annotations


// 2. describe(name, age) -> "<name> is <age>"
function describe(name, age) {
  // TODO
  return "";
}

// 3. typeOf(value) -> the typeof string, e.g. "number"
function typeOf(value) {
  // TODO
  return "";
}
`,

  exportNames: ["userName", "userAge", "describe", "typeOf"],

  requirements: [
    { pattern: /const\s+userName/, message: "Declare userName with const" },
    { pattern: /let\s+userAge/, message: "Declare userAge with let" },
    { pattern: /typeof/, message: "Use the typeof operator inside typeOf" },
  ],

  tests: [
    { name: 'userName is "Ada"', run: (x) => expectEqual(x.userName, "Ada") },
    { name: "userAge is 36", run: (x) => expectEqual(x.userAge, 36) },
    { name: 'describe("Ada", 36) returns "Ada is 36"', run: (x) => expectEqual(x.describe("Ada", 36), "Ada is 36") },
    { name: 'describe("Rob", 68) returns "Rob is 68"', run: (x) => expectEqual(x.describe("Rob", 68), "Rob is 68") },
    { name: 'typeOf(1) is "number"', run: (x) => expectEqual(x.typeOf(1), "number") },
    { name: 'typeOf("a") is "string"', run: (x) => expectEqual(x.typeOf("a"), "string") },
    { name: 'typeOf(true) is "boolean"', run: (x) => expectEqual(x.typeOf(true), "boolean") },
  ],

  solution: `const userName = "Ada";
let userAge = 36;

function describe(name, age) {
  return \`\${name} is \${age}\`;
}

function typeOf(value) {
  return typeof value;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td>Variable declaration</td><td><code>x = 1</code> (no keyword)</td><td><code>let x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>X = 1</code> (warns on reassignment, still allowed)</td><td><code>const x = 1;</code> (enforced)</td></tr>
  <tr><td>Runtime type check</td><td><code>x.class</code></td><td><code>typeof x</code></td></tr>
  <tr><td>Reassign a new type</td><td>allowed — no static typing</td><td>allowed at runtime (unless <code>const</code>)</td></tr>
</table>
<p><code>typeof</code> returns one of a small set of strings: <code>"number"</code>,
<code>"string"</code>, <code>"boolean"</code>, <code>"undefined"</code>,
<code>"object"</code>, <code>"function"</code>, <code>"symbol"</code>, and
<code>"bigint"</code>. Its famous wart: <code>typeof null === "object"</code>.
Ruby's <code>.class</code> returns the actual class object instead — e.g.
<code>1.class</code> is <code>Integer</code> — and has no such quirk. Whatever
shape you were tracking mentally while writing Ruby is gone once the code
runs; <code>typeof</code> is how JavaScript answers the same "what is this?"
question at runtime.</p>`,
};
</script>
