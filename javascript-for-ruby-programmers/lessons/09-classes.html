<script>
const LESSON = {
  number: 9,
  title: "Classes",

  intro: `
<p>Ruby instance variables are already invisible from outside the object —
there is no dot syntax that reaches <code>@count</code>; the closest thing is
the reflection method <code>instance_variable_get(:@count)</code>, which most
code never calls. That might lead you to expect JavaScript classes offer the
same protection by default. They don't: a plain field on a JavaScript class
instance is just an ordinary, publicly readable and writable property, exactly
like a plain object property.</p>
<table>
  <tr><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td><code>@balance</code> (no dot-syntax access from outside)</td><td><code>#balance;</code> (truly private) or a plain field</td></tr>
  <tr><td><code>def initialize(x); @x = x; end</code></td><td>no parameter properties either — assign <code>this.x</code> yourself</td></tr>
  <tr><td>no <code>readonly</code> — <code>freeze</code> the object for real immutability</td><td>plain field (no runtime enforcement)</td></tr>
  <tr><td><code>def area; …; end</code> (called without parens)</td><td><code>get area() { … }</code> (needs the <code>get</code> keyword)</td></tr>
  <tr><td><code>@@count = 0</code> (class variable)</td><td><code>static count = 0;</code></td></tr>
</table>
<p>If you actually want a field that outside code cannot read or write, even
via reflection, JavaScript gives you <code>#private</code> fields — a real
runtime feature that is stricter than Ruby's convention. Reaching for
<code>x.instance_variable_get(:@count)</code> works fine in Ruby, but writing
<code>#count</code> outside the class body in JavaScript is a <em>syntax</em>
error, full stop. That is the one class feature that has no direct Ruby
analogue, so it is worth getting comfortable with.</p>`,

  ruby: `class Counter
  @@instances = 0

  def initialize(label, start = 0)
    @label = label
    @count = start
    @@instances += 1
  end

  def increment
    @count += 1
  end

  def value
    @count
  end

  def describe
    "#{@label}: #{@count}"
  end

  def self.reset
    @@instances = 0
  end
end`,

  task: `
<p>Write the plain-JavaScript runtime version of a <code>Counter</code> class.
Ruby has no <code>#private</code> field syntax and no <code>static</code>
keyword — just class variables and class methods defined with
<code>self.</code> — so translate those ideas into JavaScript's own runtime
constructs.</p>
<ol>
  <li>A <code>constructor(label, start = 0)</code> that stores the label and
      seeds a <strong><code>#count</code> private field</strong> from
      <code>start</code>. It must also bump a
      <strong><code>static instances</code> field</strong> each time an instance
      is created.</li>
  <li>An instance method <code>increment()</code> that adds 1 to
      <code>#count</code> and returns the new value.</li>
  <li>A <strong>getter</strong> <code>value</code> that returns the current
      <code>#count</code>.</li>
  <li>An instance method <code>describe()</code> returning
      <code>"&lt;label&gt;: &lt;count&gt;"</code>, e.g. <code>"hits: 3"</code>.</li>
  <li>A <strong>static method</strong> <code>reset()</code> that sets
      <code>Counter.instances</code> back to <code>0</code>.</li>
</ol>
<p>Export the class as <code>Counter</code>.</p>`,

  starter: `class Counter {
  // static field: total instances created

  // #private field: the current count

  constructor(label, start = 0) {
    // TODO: store label, seed #count from start, bump the static counter
  }

  increment() {
    // TODO: add 1 to #count and return the new value
  }

  get value() {
    // TODO: return the current count
  }

  describe() {
    // TODO: return "<label>: <count>"
    return "";
  }

  static reset() {
    // TODO: set instances back to 0
  }
}
`,

  exportNames: ["Counter"],

  requirements: [
    { pattern: /#count/, message: "Use a #private field named #count" },
    { pattern: /static\s+instances/, message: "Declare a static field named instances" },
    { pattern: /get\s+value\s*\(/, message: "Define a getter named value" },
    { pattern: /static\s+reset\s*\(/, message: "Define a static method named reset" },
  ],

  tests: [
    {
      name: "constructor seeds count and value getter reads it",
      run: (x) => {
        const c = new x.Counter("hits", 5);
        expectEqual(c.value, 5);
      },
    },
    {
      name: "start defaults to 0",
      run: (x) => {
        const c = new x.Counter("hits");
        expectEqual(c.value, 0);
      },
    },
    {
      name: "increment returns the new value and mutates count",
      run: (x) => {
        const c = new x.Counter("hits", 0);
        expectEqual(c.increment(), 1);
        expectEqual(c.increment(), 2);
        expectEqual(c.value, 2);
      },
    },
    {
      name: "describe formats label and count",
      run: (x) => {
        const c = new x.Counter("hits", 2);
        c.increment();
        expectEqual(c.describe(), "hits: 3");
      },
    },
    {
      name: "static instances counts constructions; reset zeroes it",
      run: (x) => {
        x.Counter.reset();
        new x.Counter("a");
        new x.Counter("b");
        expectEqual(x.Counter.instances, 2);
        x.Counter.reset();
        expectEqual(x.Counter.instances, 0);
      },
    },
    {
      name: "#count is truly private (not an own enumerable property)",
      run: (x) => {
        const c = new x.Counter("hits", 9);
        expectDeepEqual(Object.keys(c), ["label"]);
      },
    },
  ],

  solution: `class Counter {
  static instances = 0;
  #count = 0;

  constructor(label, start = 0) {
    this.label = label;
    this.#count = start;
    Counter.instances++;
  }

  increment() {
    this.#count++;
    return this.#count;
  }

  get value() {
    return this.#count;
  }

  describe() {
    return \`\${this.label}: \${this.#count}\`;
  }

  static reset() {
    Counter.instances = 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>JavaScript runtime</th></tr>
  <tr><td>Visibility</td><td><code>@x</code> — no dot-syntax access, but reachable via reflection</td><td><code>#x</code> — enforced by the engine, unreachable even by reflection</td></tr>
  <tr><td>Parameter assignment</td><td><code>def initialize(x); @x = x; end</code> — manual, same idea</td><td>write <code>this.x = x</code> by hand</td></tr>
  <tr><td>Field initialization</td><td><code>@count = 0</code> inside <code>initialize</code></td><td><code>#count = 0</code> as a class field</td></tr>
  <tr><td>Getter</td><td><code>def value; @count; end</code> (called without parens)</td><td><code>get value() { … }</code></td></tr>
  <tr><td>Class-level state</td><td><code>@@count</code> — shared across the whole inheritance hierarchy</td><td><code>static count = 0</code> — belongs to this class only</td></tr>
</table>
<p>A few runtime facts worth internalizing. <code>#count</code> is not a string
key — <code>c["#count"]</code> is <code>undefined</code>, and reaching for
<code>#count</code> from outside the class body is a <em>syntax</em> error, not
a warning or a convention. That is why <code>Object.keys(c)</code> lists only
<code>label</code>. Static members live on the class object itself
(<code>Counter.instances</code>), not on instances, so <code>this.instances</code>
inside a method would be <code>undefined</code> — reference the class by name,
the same discipline <code>def self.reset</code> already required of you in
Ruby. And note the one place JavaScript is actually stricter than Ruby: Ruby's
<code>@@count</code> class variables are notorious for leaking into
subclasses and being silently shared, while a JavaScript <code>static</code>
field belongs to exactly the class that declares it.</p>`,
};
