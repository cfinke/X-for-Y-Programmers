  title: "Promises",

  intro: `
<p>Ruby doesn't ship a Promise in the core language — the closest built-in
tools are a <code>Thread</code> plus a manual join, or a <code>Fiber</code>
for cooperative pausing. When Rubyists want the resolve/reject vocabulary they
reach for the <code>concurrent-ruby</code> gem's <code>Concurrent::Promise</code>,
which uses the exact same three states as JavaScript: <em>pending</em>,
<em>fulfilled</em>, and <em>rejected</em>. That part of the mental model
transfers directly. What doesn't transfer is the plumbing underneath it:
<code>concurrent-ruby</code> runs your block on a thread pool and
<code>.value</code> blocks the calling thread until it settles, while
JavaScript's Promise is single-threaded — nothing runs "at the same time",
<code>then</code> callbacks are just deferred until the current script
finishes.</p>
<table>
  <tr><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td><code>Concurrent::Promise.fulfill(1)</code></td><td><code>Promise.resolve(1)</code> — value is just <code>1</code></td></tr>
  <tr><td><code>.then { |n| ... }</code></td><td><code>.then((n) =&gt; ...)</code> — <code>n</code> is whatever came through</td></tr>
  <tr><td><code>.rescue { |reason| ... }</code> receives any raised exception</td><td>reject with anything; <code>catch</code> receives it as-is</td></tr>
  <tr><td><code>Concurrent::Promise.zip(p1, p2)</code></td><td><code>Promise.all([...])</code> resolves to a plain array</td></tr>
</table>
<p>Two runtime facts worth knowing up front. First, <code>then</code> always
returns a <em>new</em> Promise, and if your callback returns a value that value
becomes the next Promise's fulfillment — returning a Promise flattens it, you
never end up with a Promise wrapping a Promise, just one flat chain. Second, a
<code>throw</code> inside a <code>then</code> callback turns into a rejection
of the returned Promise, which is why <code>catch</code> can sit at the end of
a chain and catch anything above it — much like one <code>rescue</code> at the
end of a Ruby method catching whatever any line above it raised.</p>`,

  ruby: `def double(n)
  Concurrent::Promise.execute { n * 2 }
end

def safe_divide(a, b)
  Concurrent::Promise.execute do
    raise "divide by zero" if b.zero?
    a / b
  end
end

def first_done(tasks)
  # concurrent-ruby has no built-in "race" - poll until one settles
  Thread.pass until (done = tasks.find { |t| !t.pending? })
  done.value
end`,

  solution: `function double(n) {
  return Promise.resolve(n * 2);
}

function safeDivide(a, b) {
  if (b === 0) return Promise.reject(new Error("divide by zero"));
  return Promise.resolve(a / b);
}

function chainDouble(n) {
  return double(n).then((d) => d + 1);
}

function divideOrDefault(a, b, fallback) {
  return safeDivide(a, b).catch(() => fallback);
}

function sumAll(promises) {
  return Promise.all(promises).then((values) => values.reduce((t, v) => t + v, 0));
}

function describeSettled(promises) {
  return Promise.allSettled(promises).then((results) =>
    results.map((r) =>
      r.status === "fulfilled" ? "ok:" + r.value : "err:" + r.reason.message
    )
  );
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Already-settled value</td><td><code>Concurrent::Promise.fulfill(1)</code></td><td><code>Promise.resolve(1)</code></td></tr>
  <tr><td>Rejection value</td><td><code>.rescue</code> receives whatever exception you raised</td><td>whatever you rejected with</td></tr>
  <tr><td>Chaining</td><td><code>.then { |v| ... }</code> returns a new Promise</td><td><code>then</code> returns a new Promise; returned values flatten</td></tr>
  <tr><td>Wait for all</td><td><code>Concurrent::Promise.zip(*promises)</code></td><td>resolves to a plain array, rejects on first failure</td></tr>
  <tr><td>Wait for all, keep errors</td><td>no built-in equivalent — rescue each promise individually</td><td><code>Promise.allSettled</code> → <code>{status, value|reason}[]</code>, never rejects</td></tr>
  <tr><td>First to settle</td><td>no built-in equivalent — poll, or coordinate with a queue</td><td><code>Promise.race</code> settles with the first result, win or lose</td></tr>
</table>
<p>Reach for <code>Promise.all</code> when you need every result and one failure
should sink the whole thing; reach for <code>Promise.allSettled</code> when you
want to inspect each outcome — its result objects are <code>{ status:
"fulfilled", value }</code> or <code>{ status: "rejected", reason }</code>.
<code>Promise.race</code> settles as soon as the first input does, whether that
first one fulfills or rejects.</p>
<p>Runtime detail worth flagging, since <code>concurrent-ruby</code> handles
this differently: <code>Promise.reject(x)</code> creates an already-rejected
Promise, and if nothing ever attaches a <code>catch</code> to it you get an
"unhandled rejection" warning — there's no supervisor quietly logging it for
you the way a thread pool might. And because a thrown error inside
<code>then</code> becomes a rejection, a single trailing <code>.catch</code>
(or <code>try/await/catch</code>) covers the whole chain above it, the same
way one <code>rescue</code> at the end of a Ruby method covers every line
above it.</p>`,
