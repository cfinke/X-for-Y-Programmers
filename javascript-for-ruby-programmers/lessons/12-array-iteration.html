  title: "Array Iteration",

  intro: `
<p>Ruby's <code>Enumerable</code> module gives arrays the same toolkit under
different names: <code>map</code> (aka <code>collect</code>),
<code>select</code> (aka <code>filter</code>), <code>reduce</code> (aka
<code>inject</code>), <code>find</code> (aka <code>detect</code>). JavaScript's
array methods are the direct analogs — same idea, mostly the same spelling,
with a few edge-case behaviors that differ. Both languages are dynamically
typed, so nothing checks the shape of what flows through a chain in either
one; the discipline lives in your head either way, not in a compiler.</p>
<table>
  <tr><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td><code>arr.map { |x| x.to_s }</code></td><td><code>arr.map((x) =&gt; ...)</code></td></tr>
  <tr><td><code>arr.reduce(0) { |sum, x| sum + x }</code></td><td><code>arr.reduce((sum, x) =&gt; sum + x, 0)</code></td></tr>
  <tr><td><code>arr.find { |x| ... }</code> — may be <code>nil</code></td><td><code>arr.find(...)</code> — may be <code>undefined</code></td></tr>
  <tr><td><code>arr.select { |x| ... }</code></td><td><code>arr.filter((x) =&gt; ...)</code></td></tr>
</table>
<p>The idiomatic move — in both languages — is to <em>chain</em> these methods
instead of writing manual loops: describe the transformation as a pipeline
(<code>select</code> then <code>map</code> then <code>reduce</code> in Ruby,
<code>filter</code> then <code>map</code> then <code>reduce</code> in
JavaScript) rather than a sequence of mutations. At runtime each link
allocates a new array, so the pipeline reads top-to-bottom as a series of pure
steps. Two runtime facts worth holding onto: <code>find</code> returns
<code>undefined</code> when nothing matches, the same way Ruby's
<code>find</code>/<code>detect</code> returns <code>nil</code> — but an empty
array with no seed behaves differently across the two: Ruby's
<code>[].reduce(:+)</code> quietly returns <code>nil</code>, while
JavaScript's <code>[].reduce(fn)</code> <em>throws</em> if you give it no
initial value.</p>`,

  ruby: `Order = Struct.new(:id, :customer, :total, :paid)

def paid_total(orders)
  orders.select(&:paid).reduce(0) { |sum, o| sum + o.total }
end

def customer_names(orders)
  orders.map(&:customer)
end`,

  task: `
<p>You are given an array of order objects, each shaped like
<code>{ id, customer, total, paid }</code>. Build a little reporting toolkit —
no manual <code>for</code>/<code>while</code> loops, use the array methods:</p>
<ol>
  <li><code>paidTotal(orders)</code> — sum of <code>total</code> across only the
      <em>paid</em> orders (chain <code>filter</code> then <code>reduce</code>).
      Returns <code>0</code> for an empty array.</li>
  <li><code>bigSpenders(orders, min)</code> — an array of the
      <code>customer</code> names whose order <code>total</code> is greater than
      or equal to <code>min</code> (chain <code>filter</code> then
      <code>map</code>).</li>
  <li><code>findOrder(orders, id)</code> — the first order object with the given

  <li><code>allPaid(orders)</code> — <code>true</code> if every order is paid
      (use <code>every</code>).</li>
  <li><code>anyUnpaid(orders)</code> — <code>true</code> if at least one order is

  <li><code>totalByCustomer(orders)</code> — an object mapping each customer name
      to the sum of their order totals, built with a single <code>reduce</code>.</li>
</ol>`,

  exportNames: ["paidTotal", "bigSpenders", "findOrder", "allPaid", "anyUnpaid", "totalByCustomer"],

  requirements: [
    { pattern: /\.filter\s*\(/, message: "Use .filter() to select orders" },
    { pattern: /\.map\s*\(/, message: "Use .map() to project customer names" },
    { pattern: /\.reduce\s*\(/, message: "Use .reduce() to aggregate totals" },
    { pattern: /\.find\s*\(/, message: "Use .find() to locate an order by id" },
  ],

  tests: [
    {
      name: "paidTotal sums only paid orders",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },

      name: "bigSpenders keeps names at or above min",
      run: (x) => {
        const orders = [

      name: "findOrder returns the matching order",
      run: (x) => {
        const orders = [

          { id: 2, customer: "Rob", total: 25, paid: false },

      name: "allPaid and anyUnpaid reflect the paid flags",

        const clean = [{ id: 3, customer: "Cy", total: 10, paid: true }];
        expectEqual(x.allPaid(mixed), false);
        expectEqual(x.allPaid(clean), true);
        expectEqual(x.anyUnpaid(mixed), true);
        expectEqual(x.anyUnpaid(clean), false);
      },
    },
    {
      name: "totalByCustomer groups totals by name",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },

  solution: `function paidTotal(orders) {
  return orders
    .filter((o) => o.paid)
    .reduce((sum, o) => sum + o.total, 0);
}

function bigSpenders(orders, min) {
  return orders
    .filter((o) => o.total >= min)
    .map((o) => o.customer);
}

function findOrder(orders, id) {
  return orders.find((o) => o.id === id);
}

function allPaid(orders) {
  return orders.every((o) => o.paid);
}

function anyUnpaid(orders) {
  return orders.some((o) => !o.paid);
}

function totalByCustomer(orders) {
  return orders.reduce((acc, o) => {
    acc[o.customer] = (acc[o.customer] || 0) + o.total;
    return acc;
  }, {});
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Mapped result</td><td><code>map</code> returns a new <code>Array</code>, no compile-time check on the block's return value</td><td>whatever the callback returns</td></tr>
  <tr><td>reduce accumulator</td><td>whatever you pass as the seed to <code>reduce</code>/<code>inject</code></td><td>whatever you seed and return</td></tr>
  <tr><td>find miss</td><td><code>find</code>/<code>detect</code> returns <code>nil</code>, nothing forces a check</td><td>silently <code>undefined</code></td></tr>
  <tr><td>reduce, no seed, empty array</td><td><code>[].reduce(:+)</code> returns <code>nil</code></td><td>throws <code>TypeError</code> at runtime</td></tr>
  <tr><td>Grouping accumulator</td><td><code>each_with_object(Hash.new(0))</code> or a literal <code>{}</code></td><td>a plain <code>{}</code> object</td></tr>
</table>
<p>Because there is no compiler in either language, a few runtime edges become
yours to manage — and JavaScript is stricter about one of them than Ruby is.
Always pass an initial value to <code>reduce</code> in JavaScript: both to
define the result type in your head and because
<code>[].reduce((a, b) =&gt; a + b)</code> throws "Reduce of empty array with
no initial value" — Ruby's <code>inject</code>/<code>reduce</code> on an empty
array with no seed simply returns <code>nil</code> instead of raising. A
<code>find</code> that fails returns <code>undefined</code>, so reaching
straight into <code>.customer</code> on the result can blow up with "Cannot
read properties of undefined" — guard it, or use <code>?.</code>, the same
role Ruby's <code>&amp;.</code> safe-navigation operator plays after a
<code>find</code>/<code>detect</code> comes back <code>nil</code>. And each of
<code>filter</code>/<code>map</code> allocates a fresh array, so a long chain
over a huge list does more work than one fused loop — the same tradeoff a
chained <code>select.map.reduce</code> makes in Ruby. For the sizes in
everyday code the readability of the pipeline wins, but it is a real runtime
cost in both languages.</p>`,
