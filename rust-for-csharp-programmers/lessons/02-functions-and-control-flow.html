<script>
const LESSON = {
  number: 2,
  title: "Functions & Control Flow",

  intro: `
<p>C#'s <code>string F(int x)</code> becomes Rust's
<code>fn f(x: i32) -&gt; String</code>: types move <em>after</em> the names,
and the return type moves to the end behind <code>-&gt;</code>. Functions are
free-standing — no <code>static class Helpers</code> wrapper required, and no
ceremony beyond <code>fn</code>. If you've enjoyed C#'s top-level statements
and local functions, Rust feels like that everywhere.</p>
<table>
  <tr><th>C#</th><th>Rust</th></tr>
  <tr><td><code>string F(int x) { ... }</code></td><td><code>fn f(x: i32) -&gt; String { ... }</code></td></tr>
  <tr><td><code>static</code> methods in a class</td><td>free functions, no wrapper</td></tr>
  <tr><td><code>var m = a &gt; b ? a : b;</code></td><td><code>let m = if a &gt; b { a } else { b };</code></td></tr>
  <tr><td><code>n switch { &gt; 0 =&gt; 1, ... }</code></td><td><code>if</code>/<code>match</code> — every block is an expression</td></tr>
  <tr><td><code>return x;</code></td><td>last expression, no semicolon</td></tr>
</table>
<p>The bigger shift: in Rust, <strong>everything is an expression</strong>.
C# has been inching this way — expression-bodied members, then
<code>switch</code> expressions in C# 8 — but Rust starts there.
<code>if</code>/<code>else</code> produces a value, so there is no ternary
operator: <code>let m = if a &gt; b { a } else { b };</code> <em>is</em> the
ternary. And a block's value is its final expression — written without a
semicolon and without <code>return</code>. Adding a stray semicolon turns
that expression into a statement (value discarded), which is the classic
first-week compile error; the compiler's hint for it is excellent.</p>`,

  csharp: `static class MathHelpers
{
    public static int MaxOf(int a, int b)
    {
        return a > b ? a : b;
    }

    public static string Grade(int score) =>
        score >= 60 ? "pass" : "fail";

    // switch expressions were C#'s step toward
    // expression-orientation; Rust starts there.
    public static int Sign(int n) => n switch
    {
        > 0 => 1,
        < 0 => -1,
        _   => 0,
    };
}`,

  task: `
<p>Rewrite the C# on the left as free Rust functions — no class wrapper, no
<code>return</code> keyword anywhere:</p>
<ol>
  <li><code>max_of</code>: takes <code>a: i32</code> and <code>b: i32</code>,
      returns <code>i32</code>. Bind the result of an
      <code>if</code>-expression to a local
      (<code>let m = if ... { ... } else { ... };</code>) and make that local
      the function's final expression.</li>
  <li><code>grade</code>: takes <code>score: u32</code>, returns
      <code>String</code> — <code>"pass"</code> for 60 and above,
      <code>"fail"</code> below.</li>
  <li><code>sign</code>: takes <code>n: i32</code>, returns <code>i32</code> —
      <code>1</code> for positive, <code>-1</code> for negative,
      <code>0</code> for zero. An <code>if</code>/<code>else if</code>/<code>else</code>
      chain as the function body works nicely.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. max_of: bind an if-expression to a local, then return
//    that local as the block's final expression (no semicolon).
fn max_of(a: i32, b: i32) -> i32 {
    todo!()
}

// 2. grade: "pass" for score >= 60, "fail" otherwise.
//    Tip: "pass".to_string() turns a &str literal into a String.
fn grade(score: u32) -> String {
    todo!()
}

// 3. sign: 1, -1, or 0. The whole if/else if/else chain
//    can be the function body -- it's one expression.
fn sign(n: i32) -> i32 {
    todo!()
}
`,

  requirements: [
    { pattern: /->/, message: "Declare return types with -> (types come after the parameter list)" },
    { pattern: /=\s*if\b/, message: "Bind an if-expression to a variable: let m = if ... { } else { }" },
  ],

  tests: [
    { name: "max_of picks the larger value",
      code: "assert_eq!(max_of(3, 7), 7);\nassert_eq!(max_of(10, 2), 10);\nassert_eq!(max_of(-5, -9), -5);" },
    { name: 'grade(75) returns "pass"',
      code: 'assert_eq!(grade(75), "pass");' },
    { name: 'grade(59) returns "fail" and grade(60) returns "pass"',
      code: 'assert_eq!(grade(59), "fail");\nassert_eq!(grade(60), "pass");' },
    { name: "sign handles positive, negative, and zero",
      code: "assert_eq!(sign(42), 1);\nassert_eq!(sign(-3), -1);\nassert_eq!(sign(0), 0);" },
  ],

  solution: `fn max_of(a: i32, b: i32) -> i32 {
    let m = if a > b { a } else { b };
    m
}

fn grade(score: u32) -> String {
    let g = if score >= 60 { "pass" } else { "fail" };
    g.to_string()
}

fn sign(n: i32) -> i32 {
    if n > 0 {
        1
    } else if n < 0 {
        -1
    } else {
        0
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Rust</th></tr>
  <tr><td>Signature</td><td><code>string F(int x)</code></td><td><code>fn f(x: i32) -&gt; String</code></td></tr>
  <tr><td>Where functions live</td><td>inside a class (often <code>static</code>)</td><td>free-standing at module level</td></tr>
  <tr><td>Conditional value</td><td><code>a &gt; b ? a : b</code></td><td><code>if a &gt; b { a } else { b }</code></td></tr>
  <tr><td>Multi-way value</td><td><code>n switch { ... }</code></td><td><code>if</code>/<code>else if</code> chain or <code>match</code></td></tr>
  <tr><td>Returning</td><td><code>return x;</code> or <code>=&gt; x</code></td><td>final expression, no semicolon</td></tr>
</table>
<p>The <code>return</code> keyword exists in Rust, but idiomatic code reserves
it for early exits — the normal path just ends on an expression. If you liked
how C#'s expression-bodied members (<code>=&gt; x</code>) trimmed ceremony,
Rust applies that economy to every block in the language: <code>if</code>,
<code>match</code>, even plain <code>{ }</code> blocks all produce values.</p>`,
};
