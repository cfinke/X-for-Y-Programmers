<script>
const LESSON = {
  number: 12,
  title: "Traits",

  intro: `
<p>Traits are Rust's interfaces — a named set of methods a type promises to
provide. The declaration will look instantly familiar, right down to default
method bodies (C# 8's default interface methods carry straight over). The
structural difference is <em>where</em> the implementation lives. In C#,
implementing an interface happens on the class declaration:
<code>class Dog : IDescribe</code>, and if you don't own the class, you're
out of luck. In Rust, the implementation is a free-standing block —
<code>impl Describe for Dog</code> — written <strong>outside</strong> the
type.</p>
<table>
  <tr><th>C#</th><th>Rust</th></tr>
  <tr><td><code>interface IDescribe { string Name(); }</code></td><td><code>trait Describe { fn name(&amp;self) -&gt; String; }</code></td></tr>
  <tr><td><code>class Dog : IDescribe { ... }</code> (at declaration)</td><td><code>impl Describe for Dog { ... }</code> (separate block)</td></tr>
  <tr><td>Default interface method (C# 8)</td><td>Default trait method — same idea, used constantly</td></tr>
  <tr><td>Extension methods: add behavior, can't satisfy an interface</td><td><code>impl Trait for Type</code>: adds behavior <em>and</em> satisfies the trait</td></tr>
  <tr><td>Retrofit an interface onto <code>string</code>? Impossible</td><td><code>impl Describe for String</code> — routine</td></tr>
</table>
<p>Think of it as the C# feature that doesn't exist: extension methods that
can satisfy an interface. Because the <code>impl</code> block is decoupled
from the type, you can implement <em>your</em> trait for someone else's type
(<code>impl Describe for String</code>), or a library's trait for your type.
Default methods make traits more than contracts: a trait can require one
small method and provide a family of derived behavior for free —
exactly how the standard library's <code>Iterator</code> gives you
<code>map</code>, <code>filter</code>, and dozens more from a single
required <code>next()</code>.</p>`,

  csharp: `public interface IDescribe
{
    string Name();

    // C# 8 default interface method
    string Describe() => $"I am {Name()}";
}

public class Dog : IDescribe          // declared on the class itself
{
    public required string DogName { get; init; }
    public string Name() => DogName;  // Describe() comes for free
}

// The gap: you can't retrofit IDescribe onto a type you don't own.
// Extension methods add behavior to string, but they can never
// make string *implement* IDescribe. In Rust, they can.`,

  task: `
<p>Build the same contract, Rust-style:</p>
<ol>
  <li>Complete the trait <code>Describe</code>: the required method
      <code>name(&amp;self) -&gt; String</code> is declared for you;
      fill in the default method <code>describe(&amp;self) -&gt; String</code>
      so it returns <code>"I am &lt;name&gt;"</code> — build it with
      <code>format!</code> and <code>self.name()</code>.</li>
  <li>Implement <code>Describe</code> for <code>Dog</code> (already defined
      in the starter): <code>name</code> returns a clone of the dog's
      <code>name</code> field.</li>
  <li>Implement <code>Describe</code> for <code>Robot</code>:
      <code>name</code> returns <code>"Unit-&lt;id&gt;"</code>, e.g.
      <code>"Unit-7"</code> for id 7. Neither impl should define
      <code>describe</code> — both types get it from the default.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// The trait: an interface whose implementations live outside the type.
trait Describe {
    // Required method -- every implementor must provide this.
    fn name(&self) -> String;

    // Default method (like a C# default interface method).
    // Make it return "I am <name>" using self.name().
    fn describe(&self) -> String {
        todo!()
    }
}

struct Dog {
    name: String,
}

struct Robot {
    id: u32,
}

// Implement name() for Dog: return a clone of the name field.
impl Describe for Dog {
    fn name(&self) -> String {
        todo!()
    }
}

// Implement name() for Robot: return "Unit-<id>" (format! is your friend).
impl Describe for Robot {
    fn name(&self) -> String {
        todo!()
    }
}
`,

  requirements: [
    { pattern: /trait\s+Describe/, message: "Define the trait Describe" },
    { pattern: /impl\s+Describe\s+for\s+/, message: "Implement Describe with an impl Describe for ... block" },
    { pattern: /self\.name\(\)/, message: "The default describe method should call self.name()" },
  ],

  tests: [
    { name: 'Dog { name: "Rex" }.name() returns "Rex"',
      code: 'let d = Dog { name: String::from("Rex") };\nassert_eq!(d.name(), "Rex");' },
    { name: 'Dog { name: "Rex" }.describe() returns "I am Rex" (via the default method)',
      code: 'let d = Dog { name: String::from("Rex") };\nassert_eq!(d.describe(), "I am Rex");' },
    { name: 'Robot { id: 7 }.name() returns "Unit-7"',
      code: 'let r = Robot { id: 7 };\nassert_eq!(r.name(), "Unit-7");' },
    { name: 'Robot { id: 42 }.describe() returns "I am Unit-42"',
      code: 'let r = Robot { id: 42 };\nassert_eq!(r.describe(), "I am Unit-42");' },
  ],

  solution: `trait Describe {
    fn name(&self) -> String;

    fn describe(&self) -> String {
        format!("I am {}", self.name())
    }
}

struct Dog {
    name: String,
}

struct Robot {
    id: u32,
}

impl Describe for Dog {
    fn name(&self) -> String {
        self.name.clone()
    }
}

impl Describe for Robot {
    fn name(&self) -> String {
        format!("Unit-{}", self.id)
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Rust</th></tr>
  <tr><td>Contract</td><td><code>interface IDescribe</code> (I-prefix convention)</td><td><code>trait Describe</code> (no prefix)</td></tr>
  <tr><td>Implementing</td><td><code>class Dog : IDescribe</code> — at declaration, owner only</td><td><code>impl Describe for Dog</code> — separate block, anywhere*</td></tr>
  <tr><td>Default method</td><td>C# 8 default interface method (niche)</td><td>Default trait method (everywhere — see <code>Iterator</code>)</td></tr>
  <tr><td>Retrofit onto foreign type</td><td>Extension methods only — can't satisfy the interface</td><td><code>impl Describe for String</code> — full trait membership</td></tr>
  <tr><td>Generic constraint</td><td><code>where T : IDescribe</code></td><td><code>T: Describe</code> (next lesson)</td></tr>
</table>
<p>*The fine print: the <em>orphan rule</em>. An <code>impl Trait for Type</code>
is allowed only if you own the trait or the type (or both) — so you can
implement your trait for <code>String</code>, or <code>Display</code> for
your struct, but not a foreign trait for a foreign type. That single rule is
what keeps "implementations can live anywhere" coherent across an entire
dependency graph: no two crates can ever disagree about how a type
implements a trait. Also note what's missing from this lesson: inheritance.
Rust has no class hierarchies at all — traits plus composition cover what
base classes did, and after a few lessons you rarely miss them.</p>`,
};
</script>
