  number: 14,
  title: "Closures & Iterators",

  intro: `
<p>This is the lesson where a decade of LINQ pays off. Rust's iterator
chains map onto LINQ method syntax almost one-to-one:
<code>.Where</code> → <code>.filter</code>, <code>.Select</code> →
<code>.map</code>, <code>.Sum()</code> → <code>.sum()</code>,
<code>.ToList()</code> → <code>.collect()</code>. The lambda syntax trades
the arrow for pipes — <code>p =&gt; p.InStock</code> becomes
<code>|p| p.in_stock</code> — but it's the same anonymous,
environment-capturing function you've written ten thousand times.</p>
<table>
  <tr><th>C# / LINQ</th><th>Rust</th></tr>
  <tr><td><code>products.Where(p =&gt; p.InStock)</code></td><td><code>products.iter().filter(|p| p.in_stock)</code></td></tr>
  <tr><td><code>.Select(p =&gt; p.Name)</code></td><td><code>.map(|p| p.name.clone())</code></td></tr>
  <tr><td><code>.Sum(p =&gt; p.PriceCents)</code></td><td><code>.map(|p| p.price_cents).sum()</code></td></tr>
  <tr><td><code>.ToList()</code></td><td><code>.collect()</code></td></tr>
  <tr><td>Lazy <code>IEnumerable&lt;T&gt;</code> until materialized</td><td>Lazy <code>Iterator</code> until consumed — same model</td></tr>
</table>
<p>The evaluation model transfers too: like <code>IEnumerable&lt;T&gt;</code>,
a Rust iterator chain does <em>nothing</em> until a consumer runs it —
<code>.collect()</code> materializes like <code>ToList()</code>,
<code>.sum()</code> like <code>Sum()</code>. One new ceremony: collections
don't chain directly; you ask for an iterator first with
<code>.iter()</code> (think <code>.AsEnumerable()</code>, but mandatory,
and yielding <em>references</em> to the elements — borrowing, not copying).
And one genuine upgrade: LINQ's lazy chains cost allocations and virtual
calls; Rust's compile down to the same machine code as the hand-written
<code>for</code> loop. The "abstraction penalty" your team's performance
guidelines warn about with LINQ simply isn't there.</p>`,

  csharp: `record Product(string Name, int PriceCents, bool InStock);

List<string> InStockNames(IEnumerable<Product> products) =>
    products.Where(p => p.InStock)
            .Select(p => p.Name)
            .ToList();

int TotalValue(IEnumerable<Product> products) =>
    products.Sum(p => p.PriceCents);

List<int> EvensDoubled(IEnumerable<int> nums) =>
    nums.Where(n => n % 2 == 0)
        .Select(n => n * 2)
        .ToList();

// All lazy until ToList()/Sum() -- exactly like Rust's
// .collect()/.sum().`,

  task: `
<p>Port the three LINQ queries. The <code>Product</code> struct is defined
in the starter; leave it as is.</p>
<ol>
  <li><code>in_stock_names(products: &amp;[Product]) -&gt; Vec&lt;String&gt;</code>
      — names of in-stock products, in order:
      <code>.iter().filter(...).map(...).collect()</code>. Inside
      <code>map</code>, clone the name (<code>p.name.clone()</code>) —
      you're borrowing the products, but returning owned
      <code>String</code>s.</li>
  <li><code>total_value(products: &amp;[Product]) -&gt; u32</code> — the sum
      of <code>price_cents</code> across <em>all</em> products:
      <code>.iter().map(...).sum()</code>.</li>
  <li><code>evens_doubled(nums: &amp;[i32]) -&gt; Vec&lt;i32&gt;</code> —
      keep the even numbers, double each:
      <code>.iter().filter(...).map(...).collect()</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

    name: String,
    price_cents: u32,
    in_stock: bool,
}

// 1. LINQ: products.Where(p => p.InStock).Select(p => p.Name).ToList()
//    Rust:  .iter().filter(|p| ...).map(|p| ...).collect()
//    (clone the name: p.name.clone())
fn in_stock_names(products: &[Product]) -> Vec<String> {
    todo!()
}

// 2. LINQ: products.Sum(p => p.PriceCents)
//    Rust:  .iter().map(|p| ...).sum()
fn total_value(products: &[Product]) -> u32 {
    todo!()
}

// 3. LINQ: nums.Where(n => n % 2 == 0).Select(n => n * 2).ToList()
fn evens_doubled(nums: &[i32]) -> Vec<i32> {
    todo!()
}
`,

  requirements: [
    { pattern: /\.iter\(\)/, message: "Start the chains with .iter() — the mandatory .AsEnumerable()" },
    { pattern: /\.filter\(/, message: "Use .filter(...) — LINQ's .Where(...)" },
    { pattern: /\.map\(/, message: "Use .map(...) — LINQ's .Select(...)" },
    { pattern: /\.collect/, message: "Materialize with .collect() — LINQ's .ToList()" },
  ],

  tests: [
    { name: 'in_stock_names picks ["Widget", "Gizmo"] from a mixed list',
      code: 'let products = vec![\n    Product { name: String::from("Widget"), price_cents: 250, in_stock: true },\n    Product { name: String::from("Gadget"), price_cents: 1099, in_stock: false },\n    Product { name: String::from("Gizmo"), price_cents: 75, in_stock: true },\n];\nassert_eq!(in_stock_names(&products), vec!["Widget", "Gizmo"]);' },
    { name: "in_stock_names returns an empty Vec when nothing is in stock",
      code: 'let products = vec![\n    Product { name: String::from("Widget"), price_cents: 250, in_stock: false },\n];\nassert_eq!(in_stock_names(&products), Vec::<String>::new());' },
    { name: "total_value sums price_cents: 250 + 1099 + 75 = 1424",
      code: 'let products = vec![\n    Product { name: String::from("Widget"), price_cents: 250, in_stock: true },\n    Product { name: String::from("Gadget"), price_cents: 1099, in_stock: false },\n    Product { name: String::from("Gizmo"), price_cents: 75, in_stock: true },\n];\nassert_eq!(total_value(&products), 1424);' },
    { name: "total_value of an empty slice is 0",
      code: "assert_eq!(total_value(&[]), 0);" },
    { name: "evens_doubled(&[1, 2, 3, 4, 5]) returns [4, 8]",
      code: "assert_eq!(evens_doubled(&[1, 2, 3, 4, 5]), vec![4, 8]);" },
    { name: "evens_doubled(&[1, 3, 5]) returns an empty Vec",
      code: "assert_eq!(evens_doubled(&[1, 3, 5]), Vec::<i32>::new());" },
  ],

  solution: `struct Product {
    name: String,
    price_cents: u32,
    in_stock: bool,
}

fn in_stock_names(products: &[Product]) -> Vec<String> {
    products
        .iter()
        .filter(|p| p.in_stock)
        .map(|p| p.name.clone())
        .collect()
}

fn total_value(products: &[Product]) -> u32 {
    products.iter().map(|p| p.price_cents).sum()
}

fn evens_doubled(nums: &[i32]) -> Vec<i32> {
    nums.iter().filter(|n| *n % 2 == 0).map(|n| n * 2).collect()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C# / LINQ</th><th>Rust</th></tr>
  <tr><td>Lambda</td><td><code>p =&gt; p.InStock</code></td><td><code>|p| p.in_stock</code></td></tr>
  <tr><td>Filter</td><td><code>.Where(...)</code></td><td><code>.filter(...)</code></td></tr>
  <tr><td>Project</td><td><code>.Select(...)</code></td><td><code>.map(...)</code></td></tr>
  <tr><td>Aggregate</td><td><code>.Sum()</code>, <code>.Count()</code>, <code>.Aggregate()</code></td><td><code>.sum()</code>, <code>.count()</code>, <code>.fold()</code></td></tr>
  <tr><td>Materialize</td><td><code>.ToList()</code>, <code>.ToDictionary()</code></td><td><code>.collect()</code> — target type decides what you get</td></tr>
  <tr><td>First match</td><td><code>.FirstOrDefault(...)</code></td><td><code>.find(...)</code> → <code>Option&lt;&amp;T&gt;</code></td></tr>
  <tr><td>Start a chain</td><td>implicit on any <code>IEnumerable</code></td><td><code>.iter()</code> (borrow) / <code>.into_iter()</code> (consume)</td></tr>
</table>
<p>One genuinely new idea hides in <code>.collect()</code>: it's generic
over its <em>result</em>. The same call produces a <code>Vec</code>, a
<code>HashMap</code>, or a <code>String</code> depending on the type it
must return — one method covering <code>ToList</code>,
<code>ToDictionary</code>, <code>ToHashSet</code>, and
<code>string.Concat</code> at once. And a borrow-checker footnote you'll
hit soon: <code>.iter()</code> yields <code>&amp;T</code> references, which
is why <code>in_stock_names</code> clones each name — the iterator borrows
the products, but the returned <code>Vec&lt;String&gt;</code> must own its
contents. When you want the chain to consume the collection and hand you
owned values, that's <code>.into_iter()</code>.</p>`,
};
