  title: "Threads & Channels",

  intro: `
<p>You know the C# concurrency toolbox: <code>Task.Run</code> to get work off
the current thread, <code>lock</code> and <code>Interlocked</code> to guard
shared state, <code>ConcurrentDictionary</code> when you gave up on guarding
it yourself. And you know the failure mode: forget the <code>lock</code>,
and the code compiles, runs, and races — at best an analyzer warns you.
Rust's headline claim is that <strong>sharing mutable state across threads
without synchronization is a compile error</strong>. The ownership rules
you've been living with since lesson 4 turn out to be exactly what data-race
prevention needed.</p>
<table>
  <tr><th>C#</th><th>Rust</th></tr>
  <tr><td><code>Task.Run(() =&gt; work())</code></td><td><code>thread::spawn(move || work())</code></td></tr>
  <tr><td><code>task.Result</code> / <code>await task</code></td><td><code>handle.join().unwrap()</code></td></tr>
  <tr><td><code>lock</code> forgotten → race at runtime</td><td>unsynchronized sharing → compile error</td></tr>
  <tr><td><code>Channel&lt;T&gt;</code> (System.Threading.Channels)</td><td><code>mpsc::channel()</code> — typed sender/receiver pair</td></tr>
  <tr><td>closure captures freely (races included)</td><td><code>move</code> transfers ownership into the thread</td></tr>
</table>
<p>Note what this lesson is <em>not</em>: <code>thread::spawn</code> creates a
real OS thread, not a thread-pool task, and there's no <code>async</code>/
<code>await</code> here (that's a separate, library-provided world in Rust).
The <code>move</code> keyword is the load-bearing part: it hands the closure
<em>ownership</em> of what it captures, so the spawning thread simply no
longer has the data — nothing shared, nothing to race on. When you do want
to communicate, an <code>mpsc</code> channel is
<code>System.Threading.Channels</code> in miniature: a typed
<code>(Sender, Receiver)</code> pair, multi-producer, single-consumer.</p>`,

  csharp: `// C#: Task.Run + .Result, and typed channels for hand-off.
int ParallelSum(List<int> a, List<int> b)
{
    var task = Task.Run(() => b.Sum());   // other thread
    int sumA = a.Sum();                   // this thread
    return sumA + task.Result;            // .Result blocks, like join
}

List<int> ChannelDouble(List<int> vals)
{
    var ch = Channel.CreateUnbounded<int>();
    var producer = Task.Run(async () => {
        foreach (var v in vals)
            await ch.Writer.WriteAsync(v * 2);
    });
    var result = new List<int>();
    for (int i = 0; i < vals.Count; i++)
        result.Add(ch.Reader.ReadAsync().AsTask().Result);
    producer.Wait();
    return result;
}`,

  solution: `use std::thread;
use std::sync::mpsc;

fn parallel_sum(a: Vec<i32>, b: Vec<i32>) -> i32 {
    let handle = thread::spawn(move || b.iter().sum::<i32>());
    let sum_a: i32 = a.iter().sum();
    sum_a + handle.join().unwrap()
}

fn channel_double(vals: Vec<i32>) -> Vec<i32> {
    let (tx, rx) = mpsc::channel();
    let n = vals.len();
    let handle = thread::spawn(move || {
        for v in vals {
            tx.send(v * 2).unwrap();
        }
    });
    let mut out = Vec::with_capacity(n);
    for _ in 0..n {
        out.push(rx.recv().unwrap());
    }
    handle.join().unwrap();
    out
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Rust</th></tr>
  <tr><td>Start background work</td><td><code>Task.Run(() =&gt; ...)</code> (thread pool)</td><td><code>thread::spawn(move || ...)</code> (OS thread)</td></tr>
  <tr><td>Wait for result</td><td><code>task.Result</code> / <code>await</code></td><td><code>handle.join().unwrap()</code></td></tr>
  <tr><td>Capture semantics</td><td>closure shares variables (race-prone)</td><td><code>move</code> transfers ownership (race-proof)</td></tr>
  <tr><td>Typed hand-off</td><td><code>Channel.CreateUnbounded&lt;int&gt;()</code></td><td><code>mpsc::channel()</code> → <code>(tx, rx)</code></td></tr>
  <tr><td>Send / receive</td><td><code>Writer.WriteAsync</code> / <code>Reader.ReadAsync</code></td><td><code>tx.send(v)</code> / <code>rx.recv()</code> (blocking)</td></tr>
  <tr><td>Shared mutable state</td><td><code>lock</code> / <code>Interlocked</code> — your job to remember</td><td><code>Arc&lt;Mutex&lt;T&gt;&gt;</code> — forgetting doesn't compile</td></tr>
</table>
<p>The deep idea: a data race requires two threads reaching the same mutable
data at the same time — and Rust's borrow rules (one <code>&amp;mut</code>
<em>or</em> many <code>&amp;</code>, never both) already forbid exactly that,
so the borrow checker moonlights as a race detector. Try to use
<code>vals</code> after the <code>move</code> closure took it, or share a
counter between threads without a <code>Mutex</code>, and you get a compile
error where C# gives you a Heisenbug at 3 a.m. When you do need shared
state, <code>Arc&lt;Mutex&lt;T&gt;&gt;</code> is the sanctioned route — a
<code>lock</code> statement whose acquisition the compiler refuses to let
you skip.</p>`,
