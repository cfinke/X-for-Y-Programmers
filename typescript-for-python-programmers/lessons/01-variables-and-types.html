<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Basic Types",

  intro: `
<p>Good news: if you have used Python's type hints, TypeScript's annotations
will look almost eerily familiar — <code>age: int = 36</code> becomes
<code>let age: number = 36</code>. The big difference is what happens next.
Python's hints are optional documentation that the interpreter ignores unless
you run mypy on the side; TypeScript's annotations are <em>enforced by the
compiler</em>, every time, before the code runs.</p>
<table>
  <tr><th>Python</th><th>TypeScript</th></tr>
  <tr><td><code>name: str = "Ada"</code></td><td><code>const name: string = "Ada";</code></td></tr>
  <tr><td><code>age: int = 36</code></td><td><code>let age: number = 36;</code></td></tr>
  <tr><td><code>price: float = 9.99</code></td><td><code>let price: number = 9.99;</code> (one number type!)</td></tr>
  <tr><td><code>active: bool = True</code></td><td><code>let active: boolean = true;</code></td></tr>
</table>
<p>Three habits to adjust: variables must be declared with <code>const</code>
(never reassigned — your default) or <code>let</code> (reassigned later);
Python's separate <code>int</code> and <code>float</code> collapse into a
single <code>number</code> type; and the convention is <code>camelCase</code>
rather than <code>snake_case</code>. Booleans are lowercase:
<code>true</code>/<code>false</code>, not <code>True</code>/<code>False</code>.</p>`,

  python: `name: str = "Ada"
age: int = 36
is_active: bool = True

# The hint is just a hint — Python happily allows this at runtime:
age = "thirty-six"  # mypy would complain, but python won't

def describe_user(name: str, age: int) -> str:
    return f"{name} is {age} years old"

print(describe_user(name, age))`,

  task: `
<p>Rewrite the Python as TypeScript:</p>
<ol>
  <li>Declare a constant <code>userName</code> of type <code>string</code>
      with the value <code>"Ada"</code>, and a variable <code>userAge</code>
      of type <code>number</code> with the value <code>36</code>.
      Write the type annotations explicitly (note: camelCase, not snake_case).</li>
  <li>Write a function <code>describeUser</code> that takes
      <code>name: string</code> and <code>age: number</code>, and returns a
      <code>string</code> like <code>"Ada is 36 years old"</code>.
      The return type goes after the parameter list, like Python's
      <code>-&gt;</code> but written with a colon.</li>
</ol>
<p>In TypeScript, reassigning <code>userAge = "thirty-six"</code> is a compile
error — the mistake Python only catches if you remember to run mypy.</p>`,

  starter: `// 1. Declare userName (string) and userAge (number) with explicit types.
//    Python: name: str = "Ada"  ->  TypeScript: const ...: string = "Ada";


// 2. Write describeUser with typed parameters and a typed return value.
//    Python: def describe_user(name: str, age: int) -> str:
function describeUser(name, age) {
  // TODO: return "<name> is <age> years old"
  return "";
}
`,

  exportNames: ["userName", "userAge", "describeUser"],

  requirements: [
    { pattern: /const\s+userName\s*:\s*string/, message: "Declare userName as a const with an explicit : string annotation" },
    { pattern: /let\s+userAge\s*:\s*number/, message: "Declare userAge with let and an explicit : number annotation" },
    { pattern: /describeUser\s*\(\s*name\s*:\s*string\s*,\s*age\s*:\s*number\s*\)\s*:\s*string/, message: "Give describeUser typed parameters (name: string, age: number) and a : string return type" },
  ],

  tests: [
    { name: 'userName is "Ada"', run: (x) => expectEqual(x.userName, "Ada") },
    { name: "userAge is 36", run: (x) => expectEqual(x.userAge, 36) },
    { name: 'describeUser("Ada", 36) returns "Ada is 36 years old"', run: (x) => expectEqual(x.describeUser("Ada", 36), "Ada is 36 years old") },
    { name: 'describeUser("Guido", 70) returns "Guido is 70 years old"', run: (x) => expectEqual(x.describeUser("Guido", 70), "Guido is 70 years old") },
  ],

  solution: `const userName: string = "Ada";
let userAge: number = 36;

function describeUser(name: string, age: number): string {
  return name + " is " + age + " years old";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>TypeScript</th></tr>
  <tr><td>Variable with hint</td><td><code>x: int = 1</code></td><td><code>let x: number = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>X = 1</code> (convention only)</td><td><code>const x = 1;</code> (actually enforced)</td></tr>
  <tr><td>str / int / float / bool</td><td><code>str</code>, <code>int</code>, <code>float</code>, <code>bool</code></td><td><code>string</code>, <code>number</code> (covers both), <code>boolean</code></td></tr>
  <tr><td>Return type</td><td><code>def f() -&gt; str:</code></td><td><code>function f(): string { }</code></td></tr>
  <tr><td>Booleans</td><td><code>True</code> / <code>False</code></td><td><code>true</code> / <code>false</code></td></tr>
  <tr><td>When types are checked</td><td>Only if you run mypy/pyright</td><td>Always, at compile time</td></tr>
</table>
<p>Like Python with a good type checker, TypeScript <em>infers</em> most types
(<code>const name = "Ada"</code> is already a string), so idiomatic code omits
annotations where the value makes the type obvious. This lesson asks for
explicit annotations so you get the syntax into your fingers.</p>`,
};
