  number: 20,
  title: "Modules & Capstone",

  intro: `
<p>Python's module system is implicit: every <code>.py</code> file is a module,
every name in it is importable (underscores and <code>__all__</code> are polite
requests), packages need an <code>__init__.py</code>, and scripts guard their
entry point with <code>if __name__ == "__main__":</code>. TypeScript flips the
default: one file = one module, but <em>nothing</em> leaves a module unless you
mark it with the <code>export</code> keyword at the definition site. Consumers
pull names in with <code>import { thing } from "./module"</code> — note the
explicit relative path, where Python resolves <code>from module import
thing</code> for you.</p>
<table>
  <tr><th>Python</th><th>TypeScript</th></tr>
  <tr><td><code>from cart import add_item</code></td><td><code>import { addItem } from "./cart";</code></td></tr>
  <tr><td><code>import cart</code></td><td><code>import * as cart from "./cart";</code></td></tr>
  <tr><td>Everything importable by default</td><td>Only <code>export</code>ed names are visible</td></tr>
  <tr><td><code>__init__.py</code> packages</td><td>No equivalent needed — files are modules</td></tr>
  <tr><td><code>if __name__ == "__main__":</code></td><td>A separate entry-point file that imports the module</td></tr>
</table>
<p>A module can also declare one <code>default</code> export
(<code>export default</code>), imported without braces — closer to "the one
thing this file is about". Prefer named exports; they refactor and autocomplete
better. Now the capstone: a small typed inventory module that pulls the whole
course together — an <code>interface</code>, a generic function, array methods,
spread, and <code>| undefined</code> narrowing, all published with
<code>export</code>. (In this sandbox there are no other files, so write the
<code>export</code>s but no <code>import</code> statements.)</p>`,

  python: `# cart.py — every top-level name is importable, like it or not
from dataclasses import dataclass
from typing import TypeVar

T = TypeVar("T")

@dataclass
class CartItem:
    id: int
    name: str
    price: float
    quantity: int

def first_or_default(items: list[T], fallback: T) -> T:
    return items[0] if items else fallback

def add_item(cart: list[CartItem], item: CartItem) -> list[CartItem]:
    return [*cart, item]  # new list, original untouched

def cart_total(cart: list[CartItem]) -> float:
    return sum(item.price * item.quantity for item in cart)

def find_item(cart: list[CartItem], item_id: int) -> CartItem | None:
    return next((i for i in cart if i.id == item_id), None)

# main.py:  from cart import add_item, cart_total
# if __name__ == "__main__": ...`,

  task: `
<p>Build the cart module in TypeScript. Everything below must use the
<code>export</code> keyword at its definition site (camelCase names):</p>
<ol>
  <li>An <code>interface CartItem</code> with <code>id: number</code>,
      <code>name: string</code>, <code>price: number</code>,

  <li><code>export function firstOrDefault&lt;T&gt;(items: T[], fallback: T): T</code>

  <li><code>export function addItem(cart: CartItem[], item: CartItem): CartItem[]</code>

  <li><code>export function cartTotal(cart: CartItem[]): number</code> — sum

</ol>
<p>Do not write any <code>import</code> statements — there is no other file to

  requirements: [
    { pattern: /export\s+(function|const)/, message: "Publish your functions with the export keyword at the definition site" },
    { pattern: /interface\s+CartItem/, message: "Define interface CartItem with id, name, price, quantity" },
    { pattern: /firstOrDefault\s*<\s*T\s*>/, message: "Make firstOrDefault generic: firstOrDefault<T>(items: T[], fallback: T): T" },
    { pattern: /\.reduce\s*\(/, message: "Compute cartTotal with .reduce" },
  ],

  tests: [
    {
      name: "cartTotal sums price * quantity (2.5 x 4 + 10 x 1 = 20)",
      run: (x) => {
        const cart = [
          { id: 1, name: "Widget", price: 2.5, quantity: 4 },
          { id: 2, name: "Gadget", price: 10, quantity: 1 },
        ];
        expectEqual(x.cartTotal(cart), 20);
      },
    },
    {
      name: "cartTotal of an empty cart is 0",
      run: (x) => expectEqual(x.cartTotal([]), 0),
    },
    {
      name: "addItem returns a new array containing the item",
      run: (x) => {
        const cart = [{ id: 1, name: "Widget", price: 2.5, quantity: 4 }];
        const bigger = x.addItem(cart, { id: 2, name: "Gadget", price: 10, quantity: 1 });
        expectEqual(bigger.length, 2);
        expectEqual(bigger[0].name, "Widget");
        expectEqual(bigger[1].name, "Gadget");
      },
    },

      name: "addItem does not mutate the original cart",
      run: (x) => {
        const cart = [{ id: 1, name: "Widget", price: 2.5, quantity: 4 }];
        const bigger = x.addItem(cart, { id: 2, name: "Gadget", price: 10, quantity: 1 });
        expectEqual(cart.length, 1);
        expectTruthy(bigger !== cart);
      },
    },
    {
      name: "findItem finds by id, and returns undefined when missing",
      run: (x) => {
        const cart = [
          { id: 1, name: "Widget", price: 2.5, quantity: 4 },
          { id: 2, name: "Gadget", price: 10, quantity: 1 },
        ];
        expectEqual(x.findItem(cart, 2).name, "Gadget");
        expectEqual(x.findItem(cart, 99), undefined);
      },
    },
    {
      name: "firstOrDefault works for numbers and strings (it is generic)",
      run: (x) => {
        expectEqual(x.firstOrDefault([5, 6, 7], 0), 5);
        expectEqual(x.firstOrDefault([], 0), 0);
        expectEqual(x.firstOrDefault(["a", "b"], "z"), "a");
        expectEqual(x.firstOrDefault([], "z"), "z");
      },
    },
  ],

  solution: `// cart module — export at the definition site; only exported names escape.
export interface CartItem {
  id: number;
  name: string;
  price: number;
  quantity: number;
}

// TypeVar("T") -> <T>. Works for any element type.
export function firstOrDefault<T>(items: T[], fallback: T): T {
  return items.length > 0 ? items[0] : fallback;
}

// [*cart, item] -> [...cart, item]: a new array, input untouched.
export function addItem(cart: CartItem[], item: CartItem): CartItem[] {
  return [...cart, item];
}

// sum(item.price * item.quantity for item in cart) -> .reduce
export function cartTotal(cart: CartItem[]): number {
  return cart.reduce((total, item) => total + item.price * item.quantity, 0);
}

// next((i for i in cart if ...), None) -> .find, with | undefined.
export function findItem(cart: CartItem[], id: number): CartItem | undefined {
  return cart.find((item) => item.id === id);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>TypeScript</th></tr>
  <tr><td>Named import</td><td><code>from cart import add_item</code></td><td><code>import { addItem } from "./cart";</code></td></tr>
  <tr><td>Whole module</td><td><code>import cart</code></td><td><code>import * as cart from "./cart";</code></td></tr>
  <tr><td>Publishing a name</td><td>Implicit (all top-level names)</td><td>Explicit: <code>export function</code> / <code>export const</code></td></tr>
  <tr><td>"Private" helper</td><td><code>_leading_underscore</code> (convention)</td><td>Just don't export it (enforced)</td></tr>
  <tr><td>Package marker</td><td><code>__init__.py</code></td><td>None — every file is already a module</td></tr>
  <tr><td>Entry point</td><td><code>if __name__ == "__main__":</code></td><td>A dedicated entry file (e.g. <code>main.ts</code>)</td></tr>
  <tr><td>The one main thing</td><td>No direct equivalent</td><td><code>export default</code> (import without braces)</td></tr>
</table>
<p>And that is the course: type hints that are actually enforced, unions and
narrowing instead of <code>isinstance</code> scattered everywhere, derived
types instead of duplicate classes, <code>async</code> that finally needs no
loop-wrangling, and modules where privacy is the default. The capstone you
just wrote — a typed interface, a generic, immutable updates via spread, and
<code>reduce</code>/<code>find</code> with <code>| undefined</code> — is
idiomatic TypeScript that any Python developer can now read as an old
friend with a compiler.</p>`,
