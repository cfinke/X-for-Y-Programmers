<div id="app"></div>
<script>
const LESSON = {
  number: 2,
  title: "Functions & Control Flow",

  intro: `
<p>Ruby's <code>def max_of(a, b)</code> says nothing about what <code>a</code>
and <code>b</code> are — pass strings, arrays, whatever responds to
<code>&gt;</code>, and you find out at runtime. Rust's <code>fn</code> makes
you write the contract down: <code>fn max_of(a: i32, b: i32) -&gt; i32</code>.
Every parameter is typed, the return type goes after <code>-&gt;</code>, and
the compiler <em>enforces</em> all of it. Call it with a string and the
program never compiles — that's a whole class of "wrong argument" bugs gone
before you run anything.</p>
<table>
  <tr><th>Ruby</th><th>Rust</th></tr>
  <tr><td><code>def max_of(a, b)</code></td><td><code>fn max_of(a: i32, b: i32) -&gt; i32</code></td></tr>
  <tr><td>last expression is the return value</td><td>last expression (no semicolon!) is the return value</td></tr>
  <tr><td><code>x = if cond then 1 else 2 end</code></td><td><code>let x = if cond { 1 } else { 2 };</code></td></tr>
  <tr><td><code>elsif</code></td><td><code>else if</code></td></tr>
</table>
<p>Now the good news, and it's very good: Rust kept Ruby's two most elegant
habits. A block's last expression is its value — write the result on the
final line with <em>no semicolon</em> and it's returned, no <code>return</code>
keyword needed, exactly like Ruby. And <code>if</code>/<code>else</code> is an
expression, not a statement, so <code>let x = if cond { ... } else { ... };</code>
reads just like Ruby's <code>x = if cond ... end</code>. The one trap: adding
a semicolon to the last line turns it into a statement and the function
returns nothing — the compiler will tell you, loudly.</p>`,

  ruby: `def max_of(a, b)
  if a > b
    a
  else
    b
  end
end

def grade(score)
  if score >= 60 then "pass" else "fail" end
end

def sign(n)
  if n > 0
    1
  elsif n < 0
    -1
  else
    0
  end
end

puts max_of(3, 7)   # 7
puts grade(59)      # fail
puts sign(-12)      # -1`,

  task: `
<p>Rewrite the Ruby as Rust — using <code>if</code> as an
expression and implicit returns throughout, so it feels as Ruby-ish as
possible:</p>
<ol>
  <li><code>max_of</code> takes <code>a: i32</code> and <code>b: i32</code>
      and returns <code>i32</code> — the larger of the two. Make the whole
      body one <code>if</code>/<code>else</code> expression. No
      <code>return</code> keyword anywhere.</li>
  <li><code>grade</code> takes <code>score: u32</code> and returns
      <code>String</code>: <code>"pass"</code> for 60 and above,
      <code>"fail"</code> below. (Turn a literal into an owned
      <code>String</code> with <code>.to_string()</code> — more on why in the
      next lesson.)</li>
  <li><code>sign</code> takes <code>n: i32</code> and returns <code>i32</code>:
      1 if positive, -1 if negative, 0 if zero. Ruby's <code>elsif</code> is
      spelled <code>else if</code>.</li>
</ol>
<p>Somewhere in your code, bind an <code>if</code> expression to a variable
(<code>let x = if ...</code>) — the tests check for it. Don't write
<code>fn main</code>; the lesson's tests call your functions directly.</p>`,

  starter: `// 1. max_of: the whole body is one if/else expression.
//    Remember: no semicolon on the value lines, no \`return\` needed.
fn max_of(a: i32, b: i32) -> i32 {
    todo!()
}

// 2. grade: "pass" for 60+, "fail" otherwise.
//    Try: let result = if score >= 60 { ... } else { ... };
fn grade(score: u32) -> String {
    todo!()
}

// 3. sign: 1, -1, or 0. Ruby's elsif -> else if.
fn sign(n: i32) -> i32 {
    todo!()
}
`,

  requirements: [
    { pattern: /->/, message: "Write return types with -> on your functions" },
    { pattern: /=\s*if\b/, message: "Bind an if expression to a variable (let x = if ...)" },
  ],

  tests: [
    { name: "max_of(3, 7) returns 7",
      code: "assert_eq!(max_of(3, 7), 7);" },
    { name: "max_of(10, -2) returns 10",
      code: "assert_eq!(max_of(10, -2), 10);" },
    { name: 'grade(60) returns "pass" and grade(59) returns "fail"',
      code: 'assert_eq!(grade(60), "pass");\nassert_eq!(grade(59), "fail");' },
    { name: 'grade(100) returns "pass" and grade(0) returns "fail"',
      code: 'assert_eq!(grade(100), "pass");\nassert_eq!(grade(0), "fail");' },
    { name: "sign(-12) returns -1, sign(0) returns 0, sign(5) returns 1",
      code: "assert_eq!(sign(-12), -1);\nassert_eq!(sign(0), 0);\nassert_eq!(sign(5), 1);" },
  ],

  solution: `fn max_of(a: i32, b: i32) -> i32 {
    if a > b { a } else { b }
}

fn grade(score: u32) -> String {
    let result = if score >= 60 { "pass" } else { "fail" };
    result.to_string()
}

fn sign(n: i32) -> i32 {
    if n > 0 {
        1
    } else if n < 0 {
        -1
    } else {
        0
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Rust</th></tr>
  <tr><td>Define a function</td><td><code>def f(x)</code></td><td><code>fn f(x: i32) -&gt; i32</code></td></tr>
  <tr><td>Implicit return</td><td>last expression</td><td>last expression, <em>no semicolon</em></td></tr>
  <tr><td>Explicit return</td><td><code>return x</code> (early exit)</td><td><code>return x;</code> (early exit only, by convention)</td></tr>
  <tr><td>Conditional expression</td><td><code>x = if c then a else b end</code></td><td><code>let x = if c { a } else { b };</code></td></tr>
  <tr><td>Chained conditions</td><td><code>elsif</code></td><td><code>else if</code></td></tr>
  <tr><td>Parentheses on condition</td><td>optional</td><td>omitted (<code>if x &gt; 0 {</code>), braces required</td></tr>
</table>
<p>Two dialect notes. First: both arms of a Rust <code>if</code> expression
must produce the <em>same type</em> — <code>if c { 1 } else { "no" }</code> is
a compile error, where Ruby would happily hand you either. Second: the
semicolon distinction is doing real work. <code>x + 1</code> is an expression
(a value); <code>x + 1;</code> is a statement (value discarded). Ruby never
made you think about this; Rust makes it the difference between returning a
value and returning nothing — and the compiler catches the mistake with a
"consider removing this semicolon" hint.</p>`,
};
</script>
