<script>
const LESSON = {
  number: 3,
  title: "Strings: String & &str",

  intro: `
<p>Ruby has one string class, and it's mutable — <code>s &lt;&lt; "!"</code>
changes it in place (which is exactly why frozen string literals became a
thing). Rust splits that one class in two: <code>String</code> is the owned,
growable buffer you can build and modify, and <code>&amp;str</code> is a
borrowed, read-only <em>view</em> into string data someone else owns. Every
string literal like <code>"hello"</code> is a <code>&amp;str</code>. The rule
of thumb that covers 90% of code: <strong>take <code>&amp;str</code> as
parameters, return <code>String</code></strong> — accept a view of anyone's
string, hand back a fresh one you built.</p>
<table>
  <tr><th>Ruby</th><th>Rust</th></tr>
  <tr><td><code>String</code> (one class, mutable)</td><td><code>String</code> (owned) + <code>&amp;str</code> (borrowed view)</td></tr>
  <tr><td><code>"Hi, #{name}!"</code></td><td><code>format!("Hi, {}!", name)</code></td></tr>
  <tr><td><code>s.upcase</code></td><td><code>s.to_uppercase()</code></td></tr>
  <tr><td><code>s.include?("x")</code></td><td><code>s.contains("x")</code></td></tr>
  <tr><td><code>s.length</code> (characters)</td><td><code>s.len()</code> (<em>bytes</em>, not characters)</td></tr>
</table>
<p>The methods mostly translate one-for-one, with two dialect changes. Ruby's
predicate <code>?</code> isn't legal in Rust identifiers, so
<code>include?</code> becomes <code>contains</code> — you lose the question
mark but the compiler now guarantees the answer is a real <code>bool</code>,
never a truthy-ish something. And <code>.len()</code> counts <em>bytes</em>:
<code>"héllo".len()</code> is 6, not 5. Ruby quietly does the encoding work
for you; Rust makes the cost visible (use <code>.chars().count()</code> when
you truly need characters).</p>`,

  ruby: `def shout(s)
  "#{s.upcase}!"
end

def greet(name)
  "Hello, #{name}!"
end

def contains_word(haystack, needle)
  haystack.include?(needle)
end

puts shout("hello")                     # HELLO!
puts greet("Matz")                      # Hello, Matz!
puts contains_word("ruby rocks", "ruby") # true

# Ruby: one String class, mutable in place.
s = "abc"
s << "def"   # s is now "abcdef" — and so is every other
             # variable pointing at the same object!`,

  task: `
<p>Rewrite the Ruby on the left as Rust, following the rule: borrow
<code>&amp;str</code> in, return owned <code>String</code> out.</p>
<ol>
  <li><code>shout</code> takes <code>s: &amp;str</code> and returns a
      <code>String</code>: the input uppercased with <code>"!"</code> on the
      end. <code>.upcase</code> is <code>.to_uppercase()</code>; build the
      result with <code>format!</code>.</li>
  <li><code>greet</code> takes <code>name: &amp;str</code> and returns
      <code>String</code>: <code>"Hello, Matz!"</code> style. Pure
      <code>format!</code> — Ruby's <code>"#{name}"</code> with the braces
      emptied out.</li>
  <li><code>contains_word</code> takes <code>haystack: &amp;str</code> and
      <code>needle: &amp;str</code> and returns <code>bool</code>. Ruby's
      <code>include?</code> is Rust's <code>.contains(...)</code> — same
      check, no question mark.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. shout: uppercase + "!".
//    Ruby: "#{s.upcase}!"  ->  Rust: format!("{}!", s.to_uppercase())
fn shout(s: &str) -> String {
    todo!()
}

// 2. greet: "Hello, <name>!"
fn greet(name: &str) -> String {
    todo!()
}

// 3. contains_word: Ruby's include? is .contains() here.
fn contains_word(haystack: &str, needle: &str) -> bool {
    todo!()
}
`,

  requirements: [
    { pattern: /&str/, message: "Take &str (a borrowed view) as your parameter type" },
    { pattern: /->\s*String/, message: "Return an owned String from shout and greet" },
    { pattern: /format!\s*\(/, message: "Build strings with the format! macro" },
  ],

  tests: [
    { name: 'shout("hello") returns "HELLO!"',
      code: 'assert_eq!(shout("hello"), "HELLO!");' },
    { name: 'shout("Ruby") returns "RUBY!"',
      code: 'assert_eq!(shout("Ruby"), "RUBY!");' },
    { name: 'greet("Matz") returns "Hello, Matz!"',
      code: 'assert_eq!(greet("Matz"), "Hello, Matz!");' },
    { name: 'greet("world") returns "Hello, world!"',
      code: 'assert_eq!(greet("world"), "Hello, world!");' },
    { name: 'contains_word("ruby rocks", "ruby") is true; ("ruby rocks", "python") is false',
      code: 'assert!(contains_word("ruby rocks", "ruby"));\nassert!(!contains_word("ruby rocks", "python"));' },
  ],

  solution: `fn shout(s: &str) -> String {
    format!("{}!", s.to_uppercase())
}

fn greet(name: &str) -> String {
    format!("Hello, {}!", name)
}

fn contains_word(haystack: &str, needle: &str) -> bool {
    haystack.contains(needle)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Rust</th></tr>
  <tr><td>Owned, growable string</td><td><code>String.new("hi")</code></td><td><code>String::from("hi")</code> / <code>"hi".to_string()</code></td></tr>
  <tr><td>Borrowed view / literal</td><td>(no equivalent)</td><td><code>&amp;str</code> — every <code>"literal"</code> is one</td></tr>
  <tr><td>Interpolation</td><td><code>"Hi, #{name}!"</code></td><td><code>format!("Hi, {}!", name)</code></td></tr>
  <tr><td>Uppercase</td><td><code>s.upcase</code></td><td><code>s.to_uppercase()</code></td></tr>
  <tr><td>Substring test</td><td><code>s.include?("x")</code></td><td><code>s.contains("x")</code></td></tr>
  <tr><td>Length</td><td><code>s.length</code> (chars)</td><td><code>s.len()</code> (bytes); <code>s.chars().count()</code> for chars</td></tr>
  <tr><td>Append</td><td><code>s &lt;&lt; "more"</code></td><td><code>s.push_str("more")</code> (needs <code>let mut s: String</code>)</td></tr>
</table>
<p>Why two types at all? In Ruby, passing a string means sharing the one
mutable object — cheap, but anyone can mutate it out from under you (hence
<code># frozen_string_literal: true</code> at the top of half your files).
Rust's split makes the choice explicit in the signature: <code>&amp;str</code>
says "I'll only look at it," <code>String</code> says "this one's mine."
The next lesson — ownership — explains the machinery that makes those
promises enforceable.</p>`,
};
