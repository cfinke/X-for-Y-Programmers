<p>Time to put the course together. This capstone is a small inventory
system — the kind of thing you'd knock out in Ruby with a
<code>Struct</code> and a handful of Enumerable calls — written the Rust
way: a <code>struct</code> for the data, iterator chains for the queries,
<code>Option</code> where Ruby would return <code>nil</code>, and an
explicit <code>&amp;mut</code> for the one function that changes
anything.</p>
<table>
  <tr><th>Ruby</th><th>Rust</th></tr>
  <tr><td><code>Item = Struct.new(:name, :price_cents, :count)</code></td><td><code>struct Item { name: String, price_cents: u32, count: u32 }</code></td></tr>
  <tr><td><code>items.sum { |i| ... }</code></td><td><code>items.iter().map(|i| ...).sum()</code></td></tr>
  <tr><td><code>items.find { ... }</code> → item or <code>nil</code></td><td><code>items.iter().find(|i| ...)</code> → <code>Option&lt;&amp;Item&gt;</code></td></tr>
  <tr><td>mutate freely, anywhere</td><td>only through <code>&amp;mut Vec&lt;Item&gt;</code>, visible in the signature</td></tr>
  <tr><td><code>items.select { ... }.map(&amp;:name)</code></td><td><code>items.iter().filter(...).map(...).collect()</code></td></tr>
</table>
<p>Every signature tells the story of this course. <code>&amp;[Item]</code>
says "I only read the inventory." <code>&amp;mut Vec&lt;Item&gt;</code>
says "I change it" — no other function can. And
<code>find_item&lt;'a&gt;(items: &amp;'a [Item], name: &amp;str) -&gt;
Option&lt;&amp;'a Item&gt;</code> combines borrowing, lifetimes, and
<code>Option</code> in one line: it hands back a reference <em>into</em> the
caller's vector (no copying), tied by <code>'a</code> to that vector's
lifetime — and it needs the annotation precisely because two references
come in and the compiler can't guess which one the result borrows from.
In Ruby the same method returns the item or <code>nil</code> and hopes
you remember to check.</p>`,

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }  # item or nil
end

def restock(items, name, amount)
  item = find_item(items, name)
  return false unless item
  item.count += amount
  true
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map(&:name)
end`,

  solution: `struct Item {
    name: String,
    price_cents: u32,
    count: u32,
}

fn total_value(items: &[Item]) -> u32 {
    items.iter().map(|i| i.price_cents * i.count).sum()
}

fn find_item<'a>(items: &'a [Item], name: &str) -> Option<&'a Item> {
    items.iter().find(|i| i.name == name)
}

fn restock(items: &mut Vec<Item>, name: &str, amount: u32) -> bool {
    for item in items.iter_mut() {
        if item.name == name {
            item.count += amount;
            return true;
        }
    }
    false
}

fn names_in_stock(items: &[Item]) -> Vec<String> {
    items
        .iter()
        .filter(|i| i.count > 0)
        .map(|i| i.name.clone())
        .collect()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Rust</th></tr>
  <tr><td>Record type</td><td><code>Struct.new(:name, :price_cents, :count)</code></td><td><code>struct Item { ... }</code> + <code>#[derive]</code> as needed</td></tr>
  <tr><td>Aggregate</td><td><code>items.sum { |i| ... }</code></td><td><code>.iter().map(...).sum()</code></td></tr>
  <tr><td>Maybe-find</td><td><code>find</code> → item or <code>nil</code></td><td><code>.iter().find(...)</code> → <code>Option&lt;&amp;Item&gt;</code></td></tr>
  <tr><td>Filter + project</td><td><code>select { ... }.map(&amp;:name)</code></td><td><code>.filter(...).map(...).collect()</code></td></tr>
  <tr><td>Read-only vs mutating</td><td>convention (<code>!</code> methods, docs)</td><td><code>&amp;[Item]</code> vs <code>&amp;mut Vec&lt;Item&gt;</code> — enforced</td></tr>
  <tr><td>Iterate mutably</td><td>just mutate inside <code>each</code></td><td><code>.iter_mut()</code> — an explicitly different iterator</td></tr>
</table>
<p>Step back and compare the two panels: the Rust is barely longer than the
Ruby, and every extra character is information. The types document what each
function reads, what it changes, what might be absent, and whose memory the
result points into — and the compiler holds every caller to it. That's the
trade this whole course has been about: Ruby optimizes for the writing;
Rust spends a little more at the keyboard to make the <em>reading</em> —
and the refactoring, and the 3am debugging — cheap. You now know the core
of the language: ownership, borrowing, <code>Option</code>/<code>Result</code>,
structs and enums, traits, iterators, modules, and threads. From here, the
Rust Book and real projects are well within reach.</p>`,
