  title: "Lambdas",

  intro: `
<p>A PHP closure decides what it captures from the enclosing scope via an
explicit <code>use</code> clause — and whether each captured variable is
copied in or bound by reference (<code>use (&amp;$x)</code>). A C++ lambda
works the same way but folds that decision into the <em>capture list</em> in
square brackets right up front: it says exactly which surrounding variables
the lambda can see, and <em>how</em> — by value or by reference. Everything
else about the syntax will look familiar once you account for that:
<code>[captures](params){ body }</code>.</p>
<table>
  <tr><th>PHP</th><th>C++</th></tr>
  <tr><td><code>fn($x) =&gt; $x + 1</code></td><td><code>[](int x){ return x + 1; }</code></td></tr>
  <tr><td><code>function($n) use ($factor) { return $n * $factor; }</code></td><td><code>[factor](int n){ return n * factor; }</code> (by value)</td></tr>
  <tr><td><code>function() use (&amp;$total) { $total += $x; }</code></td><td><code>[&amp;total](){ total += x; }</code> (by reference)</td></tr>
  <tr><td><code>callable</code> (typed as <code>\Closure</code>)</td><td><code>std::function&lt;int(int)&gt; f</code></td></tr>
</table>
<p>Three knobs to know. <strong>Capture by value</strong> — <code>[x]</code> or
<code>[=]</code> for everything — copies the variable into the lambda; the copy
is <code>const</code> by default, which is stricter than PHP's <code>use ($x)</code>
(no automatic re-assignment protection there). <strong>Capture by reference</strong> —
<code>[&amp;x]</code> or <code>[&amp;]</code> for everything — mirrors PHP's
<code>use (&amp;$x)</code>: it lets the body read and write the original.
Adding <code>mutable</code> after the parameter list lets a by-value lambda
modify <em>its own copy</em> between calls, which is how you build a stateful
closure — PHP arrow functions and closures don't need this because a captured-by-value
variable there is just a local you're free to reassign inside the function body.
To store a lambda in a variable, a struct field, or a function parameter, wrap
it in <code>std::function&lt;Ret(Args)&gt;</code> — the type-erased equivalent
of PHP's <code>callable</code>/<code>\Closure</code> type hint.</p>`,

  php: `function applyTwice(int $x, callable $f): int {
    return $f($f($x));
}

function makeCounter(): callable {
    $count = 0;
    return function () use (&$count) {
        return ++$count;   // closes over $count by reference
    };
}

$total = array_reduce([1, 2, 3, 4], fn($sum, $x) => $sum + $x, 0);`,

  task: `
<p>Write these free functions, each exercising a different facet of lambdas:</p>
<ol>
  <li><code>applyTwice(int x, const std::function&lt;int(int)&gt;&amp; f)</code> —

  <li><code>countGreaterThan(const std::vector&lt;int&gt;&amp; v, int threshold)</code>

      <code>std::count_if</code> with a lambda that captures

      that yields 1, 2, 3, … on successive calls. Capture a counter by value and

</ol>`,

  solution: `int applyTwice(int x, const std::function<int(int)>& f) {
  return f(f(x));
}

int total(const std::vector<int>& v) {
  int sum = 0;
  std::for_each(v.begin(), v.end(), [&sum](int x){ sum += x; });
  return sum;
}

int countGreaterThan(const std::vector<int>& v, int threshold) {
  return static_cast<int>(
    std::count_if(v.begin(), v.end(), [threshold](int x){ return x > threshold; }));
}

std::function<int()> makeCounter() {
  int count = 0;
  return [count]() mutable { return ++count; };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C++</th></tr>
  <tr><td>Lambda</td><td><code>fn($x) =&gt; $x + 1</code></td><td><code>[](int x){ return x + 1; }</code></td></tr>
  <tr><td>Capture by value</td><td><code>use ($x)</code> (copy)</td><td><code>[x]</code> or <code>[=]</code> (copy, const)</td></tr>
  <tr><td>Capture by reference</td><td><code>use (&amp;$x)</code></td><td><code>[&amp;x]</code> or <code>[&amp;]</code></td></tr>
  <tr><td>Stateful closure</td><td><code>use (&amp;$count) { return ++$count; }</code></td><td><code>[count]() mutable { return ++count; }</code></td></tr>
  <tr><td>Function-typed value</td><td><code>callable</code> / <code>\Closure</code></td><td><code>std::function&lt;int(int)&gt;</code></td></tr>
</table>
<p>A bare lambda has a unique, unnameable type, so <code>auto c = makeCounter();</code>
works but you cannot spell the type by hand — that is what
<code>std::function</code> is for when you need to name it, store it, or pass it
across a function boundary. Note the cost trade-off PHP's <code>\Closure</code>
never forces on you: passing a lambda directly to <code>std::for_each</code> or
<code>std::count_if</code> lets the compiler inline it (fast), while wrapping it
in <code>std::function</code> adds a small indirection in exchange for a nameable,
storable type. Reach for <code>std::function</code> at API boundaries; let
templates and <code>auto</code> keep the hot paths concrete.</p>
<p>One footgun: capturing a local <em>by reference</em> and then returning the
lambda leaves a dangling reference once the enclosing function exits — the same
trap as returning a PHP closure that used <code>use (&amp;$x)</code> to close
over a variable that then goes out of scope. That is why <code>makeCounter</code>
captures <code>count</code> <em>by value</em> — the state lives inside the
returned closure, not on a stack frame that is about to vanish.</p>`,
