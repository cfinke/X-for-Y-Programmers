  number: 15,
  title: "Enums & Variant",

  intro: `
<p>Since PHP 8.1 you reach for a native <code>enum</code> when you want a
closed set of named cases, but PHP has nothing built in for a discriminated
(tagged) union — a value that can be one of several distinct shapes. The usual
workaround is a shared interface implemented by several classes, checked with
<code>instanceof</code>. C++ has direct, stricter equivalents: <code>enum
class</code> for the first, and <code>std::variant</code> for the second.</p>
<p>An <code>enum class</code> is a <em>scoped</em> enum. Its members live
inside the enum's name (<code>Color::Red</code>, never a bare
<code>Red</code>), and it does not implicitly convert to its integer value —
you must ask with <code>static_cast&lt;int&gt;</code>. That is similar in
spirit to a PHP <em>pure</em> enum, whose cases are singleton objects with no
numeric value at all unless you declare a backed enum (<code>enum Color: int
{ ... }</code>) and read <code>-&gt;value</code>.</p>
<table>
  <tr><th>PHP</th><th>C++</th></tr>
  <tr><td><code>enum Color { case Red; case Green; }</code></td><td><code>enum class Color { Red, Green };</code></td></tr>
  <tr><td><code>Color::Red</code></td><td><code>Color::Red</code></td></tr>
  <tr><td><code>Color::Red-&gt;value</code> (backed enum only)</td><td><code>static_cast&lt;int&gt;(Color::Red)</code></td></tr>
  <tr><td><code>Circle|Square</code> (union type hint, untagged)</td><td><code>std::variant&lt;Circle, Square&gt;</code></td></tr>
  <tr><td><code>match(true) { $s instanceof Circle =&gt; ... }</code></td><td><code>std::visit(overload, s)</code></td></tr>
</table>
<p>A <code>std::variant&lt;A, B, C&gt;</code> holds exactly one of its listed
types at a time. You ask which with <code>std::holds_alternative&lt;A&gt;(v)</code>,
pull a value out with <code>std::get&lt;A&gt;(v)</code>, and handle every case
at once with <code>std::visit</code>. Unlike a PHP <code>instanceof</code>
check against a union type hint, the "which" information is tracked and
enforced by the variant itself at compile time — there is no separate
<code>kind</code> property to maintain, and the compiler (not a runtime
<code>UnhandledMatchError</code>) tells you when a case is missing.</p>`,

  php: `enum Direction {
    case North;
    case East;
    case South;
    case West;
}

function turnRight(Direction $d): Direction {
    $cases = Direction::cases();
    $i = array_search($d, $cases, true);
    return $cases[($i + 1) % 4];
}

interface Shape {}

class Circle implements Shape {
    public function __construct(public float $radius) {}
}

class Square implements Shape {
    public function __construct(public float $side) {}
}

function area(Shape $s): float {
    return match (true) {
        $s instanceof Circle => M_PI * $s->radius * $s->radius,
        $s instanceof Square => $s->side * $s->side,
    };
}`,

  task: `
<p>Model the same ideas in modern C++.</p>
<ol>
  <li>Define <code>enum class Direction { North, East, South, West };</code>
      (the default underlying values are <code>0..3</code>).</li>
  <li><code>turnRight(Direction d)</code> returns the next direction clockwise,
      wrapping <code>West</code> back to <code>North</code>. Convert to
      <code>int</code>, add one modulo 4, and cast back.</li>
  <li>Define two shape structs, <code>Circle { double radius; }</code> and
      <code>Square { double side; }</code>, and a
      <code>using Shape = std::variant&lt;Circle, Square&gt;;</code>.</li>
  <li><code>area(const Shape&amp; s)</code> returns the area. Use
      <code>std::visit</code> with a lambda that is overloaded on the two struct
      types (a generic <code>auto</code> lambda plus
      <code>if constexpr</code>, or two overloads — either works).</li>
  <li><code>shapeName(const Shape&amp; s)</code> returns <code>"circle"</code> or
      <code>"square"</code>. Use <code>std::holds_alternative&lt;Circle&gt;(s)</code>.</li>
</ol>`,

  starter: `enum class Direction { North, East, South, West };

  return d; // TODO
}

struct Square { double side; };
using Shape = std::variant<Circle, Square>;

}
`,

  requirements: [
    { pattern: /enum\s+class\s+Direction/, message: "Define Direction as an enum class (a scoped enum)" },
    { pattern: /std::visit/, message: "Use std::visit to compute the area of the variant" },
    { pattern: /std::holds_alternative/, message: "Use std::holds_alternative to identify the shape" },
  ],

  tests: [
    { name: "turnRight(North) is East", code: "    expect_true(turnRight(Direction::North) == Direction::East);" },
    { name: "turnRight(West) wraps to North", code: "    expect_true(turnRight(Direction::West) == Direction::North);" },
    { name: "underlying value of South is 2", code: "    expect_eq(static_cast<int>(Direction::South), 2);" },
    { name: "area of a circle", code: "    Shape s = Circle{2.0};\n    expect_true(std::abs(area(s) - 12.566370614359172) < 1e-9);" },
    { name: "area of a square", code: "    Shape s = Square{3.0};\n    expect_eq(area(s), 9.0);" },
    { name: "shapeName(circle) is \"circle\"", code: "    Shape s = Circle{1.0};\n    expect_eq(shapeName(s), std::string(\"circle\"));" },
    { name: "shapeName(square) is \"square\"", code: "    Shape s = Square{1.0};\n    expect_eq(shapeName(s), std::string(\"square\"));" },
  ],

  solution: `enum class Direction { North, East, South, West };

Direction turnRight(Direction d) {
  return static_cast<Direction>((static_cast<int>(d) + 1) % 4);
}

struct Circle { double radius; };
struct Square { double side; };
using Shape = std::variant<Circle, Square>;

double area(const Shape& s) {
  return std::visit([](const auto& shape) -> double {
    using T = std::decay_t<decltype(shape)>;
    if constexpr (std::is_same_v<T, Circle>) {
      return 3.141592653589793 * shape.radius * shape.radius;
    } else {
      return shape.side * shape.side;
    }
  }, s);
}

std::string shapeName(const Shape& s) {
  if (std::holds_alternative<Circle>(s)) {
    return "circle";
  }
  return "square";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C++</th></tr>
  <tr><td>Scoped enum member</td><td><code>Direction::North</code> (real singleton object)</td><td><code>Direction::North</code></td></tr>
  <tr><td>Enum to number</td><td><code>-&gt;value</code> (backed enums only)</td><td><code>static_cast&lt;int&gt;(d)</code> (explicit)</td></tr>
  <tr><td>Union type</td><td><code>Circle|Square</code> (type hint, no runtime tag)</td><td><code>std::variant&lt;Circle, Square&gt;</code></td></tr>
  <tr><td>Narrowing check</td><td><code>$s instanceof Circle</code></td><td><code>std::holds_alternative&lt;Circle&gt;(s)</code></td></tr>
  <tr><td>Extract value</td><td><code>$s-&gt;radius</code> (after instanceof narrows it)</td><td><code>std::get&lt;Circle&gt;(s).radius</code></td></tr>
  <tr><td>Exhaustive handling</td><td><code>match(true) { … }</code> (throws at runtime if a case is missed)</td><td><code>std::visit(fn, s)</code> (fails to compile if a case is missed)</td></tr>
</table>
<p>Two idioms are worth internalizing. First, <code>std::get&lt;Circle&gt;(s)</code>
throws <code>std::bad_variant_access</code> if the variant does not currently
hold a <code>Circle</code> — so guard it with <code>std::holds_alternative</code>
first, exactly like checking <code>instanceof</code> before touching a
class-specific property in PHP. Second, the <code>std::visit</code> +
generic-lambda + <code>if constexpr</code> pattern is the C++ answer to an
exhaustive <code>match</code>: add a type to the variant and the code stops
compiling until every branch is handled, whereas a PHP <code>match(true)</code>
built from <code>instanceof</code> arms only tells you about a missing case
when it actually runs and throws <code>UnhandledMatchError</code>. Because
<code>enum class</code> values do not implicitly convert to <code>int</code>,
you also cannot accidentally compare a <code>Direction</code> with a
<code>Color</code> — the type system keeps unrelated enums apart, something
PHP's <code>===</code> on enum cases enforces too, just without compile-time
checking.</p>`,
};
