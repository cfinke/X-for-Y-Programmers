<script>
const LESSON = {
  number: 6,
  title: "Scope & Closures",

  intro: `
<p>Java lets you close over local variables too, but only through anonymous
classes and lambdas, and only over variables that are <code>final</code> or
<em>effectively final</em> — the compiler will not let you reassign a captured
local. JavaScript has no such restriction: a closure is just a function that
remembers the variables of the scope it was created in — even after that outer
function has returned — and it can freely reassign what it captured.</p>
<table>
  <tr><th>Java</th><th>JavaScript</th></tr>
  <tr><td><code>Supplier&lt;Integer&gt; make()</code></td><td><code>function make()</code></td></tr>
  <tr><td><code>BiFunction&lt;Integer,Integer,Integer&gt; add = (a, b) -&gt; a + b;</code></td><td><code>const add = (a) =&gt; (b) =&gt; a + b;</code></td></tr>
  <tr><td>captured local must be effectively final</td><td>captured var is a live, mutable binding</td></tr>
</table>
<p>The important runtime fact: the inner function captures the <em>binding</em>,
not a snapshot of the value. If the outer variable changes, the closure sees the
change. That is exactly how a counter can keep incrementing, and how you get
truly private state — no <code>private</code> field, no <code>class</code>, just
a variable that nothing outside the closure can reach.</p>`,

  java: `import java.util.function.Supplier;
import java.util.function.Function;
import java.util.function.BiFunction;

public class Closures {
    static Supplier<Integer> makeCounter() {
        int[] count = {0}; // array trick: a mutable "box" to close over
        return () -> ++count[0];
    }

    static Function<Integer, Function<Integer, Integer>> add =
        a -> b -> a + b;

    static <T, R> Supplier<R> once(Supplier<R> fn) {
        boolean[] called = {false};
        Object[] result = {null};
        return () -> {
            if (!called[0]) {
                called[0] = true;
                result[0] = fn.get();
            }
            @SuppressWarnings("unchecked")
            R r = (R) result[0];
            return r;
        };
    }
}`,

  task: `
<p>Write the plain-JavaScript versions. Each relies on a variable captured by a
returned function:</p>
<ol>
  <li><code>makeCounter()</code> returns a function; each call returns the next
      integer starting at <code>1</code>. Two counters must be independent.</li>
  <li><code>add(a)</code> returns a function so that <code>add(2)(3)</code> is
      <code>5</code> — a curried adder factory.</li>
  <li><code>once(fn)</code> returns a wrapped function that runs <code>fn</code>
      only the first time; later calls return the first result and never call
      <code>fn</code> again.</li>
  <li><code>makeAccount(balance)</code> returns an object with
      <code>deposit(n)</code> and <code>getBalance()</code> methods sharing one
      private <code>balance</code> variable — no property on the object holds it.</li>
</ol>`,

  starter: `// 1. makeCounter() -> function returning 1, 2, 3, ...
function makeCounter() {
  // TODO
}

// 2. add(a)(b) -> a + b
function add(a) {
  // TODO
}

// 3. once(fn) -> wrapper that runs fn only the first time
function once(fn) {
  // TODO
}

// 4. makeAccount(balance) -> { deposit, getBalance } over a private balance
function makeAccount(balance) {
  // TODO
}
`,

  exportNames: ["makeCounter", "add", "once", "makeAccount"],

  requirements: [
    { pattern: /return\s+function|=>\s*{|=>[^;]*;?\s*}|return\s*\(/, message: "Return a function (or object of functions) that closes over a variable" },
    { pattern: /let\s+\w+\s*=\s*0|\+\+|count/, message: "Use a captured, mutable variable inside makeCounter" },
  ],

  tests: [
    { name: "makeCounter counts 1, 2, 3", run: (x) => {
      const c = x.makeCounter();
      expectEqual(c(), 1);
      expectEqual(c(), 2);
      expectEqual(c(), 3);
    } },
    { name: "counters are independent", run: (x) => {
      const a = x.makeCounter();
      const b = x.makeCounter();
      expectEqual(a(), 1);
      expectEqual(a(), 2);
      expectEqual(b(), 1);
    } },
    { name: "add(2)(3) is 5", run: (x) => expectEqual(x.add(2)(3), 5) },
    { name: "add is curried and reusable", run: (x) => {
      const add10 = x.add(10);
      expectEqual(add10(5), 15);
      expectEqual(add10(-10), 0);
    } },
    { name: "once runs fn only the first time", run: (x) => {
      let calls = 0;
      const f = x.once(() => { calls++; return 42; });
      expectEqual(f(), 42);
      expectEqual(f(), 42);
      expectEqual(calls, 1);
    } },
    { name: "once returns the first result on later calls", run: (x) => {
      let n = 0;
      const f = x.once(() => ++n);
      expectEqual(f(), 1);
      expectEqual(f(), 1);
    } },
    { name: "makeAccount keeps balance private", run: (x) => {
      const acc = x.makeAccount(100);
      expectEqual(acc.getBalance(), 100);
      acc.deposit(50);
      expectEqual(acc.getBalance(), 150);
      expectEqual(acc.balance, undefined);
    } },
  ],

  solution: `function makeCounter() {
  let count = 0;
  return function () {
    return ++count;
  };
}

function add(a) {
  return function (b) {
    return a + b;
  };
}

function once(fn) {
  let called = false;
  let result;
  return function (...args) {
    if (!called) {
      called = true;
      result = fn(...args);
    }
    return result;
  };
}

function makeAccount(balance) {
  return {
    deposit(n) {
      balance += n;
    },
    getBalance() {
      return balance;
    },
  };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>JavaScript</th></tr>
  <tr><td>Returned function type</td><td><code>Supplier&lt;Integer&gt;</code></td><td>inferred at runtime</td></tr>
  <tr><td>Private state</td><td><code>private</code> field on a class</td><td>captured variable</td></tr>
  <tr><td>Captured value</td><td>must be final / effectively final</td><td>live binding (sees mutations)</td></tr>
  <tr><td>Wrapping a fn</td><td><code>Supplier&lt;R&gt;</code>, generic method</td><td><code>...args</code> rest/spread</td></tr>
</table>
<p>The classic gotcha lives here: a closure captures the <em>variable</em>, not
its value at capture time. With <code>var</code> in a loop, every closure shares
the one function-scoped binding and ends up seeing the final value; with
<code>let</code>, each iteration gets a fresh binding — which is what you almost
always want. Java sidesteps this problem entirely by forbidding reassignment of
a captured local (that's why the Java snippet above has to wrap its counter in a
one-element array just to get a mutable "box"). JavaScript has no such
restriction, so it feels more powerful but also easier to shoot yourself in the
foot with. When you reach for a class with a <code>private</code> field just to
hide one value, remember a closure does the same job with a plain variable that
nothing outside can name.</p>`,
};
