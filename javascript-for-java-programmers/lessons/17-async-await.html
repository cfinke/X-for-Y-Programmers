  title: "Async & Await",

  intro: `
<p>Java has no <code>async</code>/<code>await</code> keywords. Asynchronous work
is represented by <code>CompletableFuture&lt;T&gt;</code>, which you either block
on with <code>.get()</code>/<code>.join()</code> or chain with
<code>.thenApply</code>/<code>.thenCompose</code>, and it runs on a real OS thread
(or, since Project Loom, a lightweight virtual thread) from a thread pool.
JavaScript's <code>async</code>/<code>await</code> looks similar on the page but
runs on a single thread: an <code>async</code> function always returns a promise,
and <code>await</code> just pauses that function until the promise settles,
letting other JavaScript run in the meantime via the event loop and microtask
queue. There is no blocking call and no separate thread — <code>await</code>
works on <em>any</em> thenable and hands you whatever value it settles to,
number, string, object, or <code>undefined</code>.</p>
<table>
  <tr><th>Java</th><th>JavaScript</th></tr>
  <tr><td><code>CompletableFuture&lt;Integer&gt; f()</code></td><td><code>async function f()</code></td></tr>
  <tr><td><code>int n = f().get();</code> (blocks the thread)</td><td><code>const n = await f();</code> (pauses the function, not the thread)</td></tr>
  <tr><td><code>CompletableFuture.allOf(fa, fb)</code></td><td><code>Promise.all([a, b])</code></td></tr>
  <tr><td>failure wrapped in <code>ExecutionException</code></td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today. First, <code>await</code> in sequence is
<em>serial</em>: each line waits for the previous promise to settle before the next
even starts. To run independent work concurrently you hand the promises to
<code>Promise.all</code>, which waits for all of them and resolves to an array of
their results. Second, a rejected promise surfaces as a thrown value at the
<code>await</code>, so a plain <code>try/catch</code> catches it — and if you do not
catch it, it propagates out of your <code>async</code> function as a rejected
promise the caller must handle.</p>`,

  java: `CompletableFuture<Integer> doubleAsync(int n) {
    return CompletableFuture.supplyAsync(() -> n * 2);
}

CompletableFuture<Integer> sumDoubled(int a, int b) {
    CompletableFuture<Integer> fx = doubleAsync(a);
    CompletableFuture<Integer> fy = doubleAsync(b);
    return CompletableFuture.allOf(fx, fy)
        .thenApply(v -> fx.join() + fy.join());
}

CompletableFuture<Integer> safeDouble(int n) {
    return doubleAsync(n)
        .exceptionally(e -> 0);
}`,

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>JavaScript</th></tr>
  <tr><td>Return of async op</td><td><code>CompletableFuture&lt;T&gt;</code></td><td>a promise; contents unlabeled</td></tr>
  <tr><td>Getting the value</td><td><code>.get()</code>/<code>.join()</code> blocks the thread</td><td><code>await</code> pauses the function, not the thread</td></tr>
  <tr><td>Serial awaits</td><td>sequential <code>.get()</code> calls</td><td><code>await a; await b;</code> — b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td><code>CompletableFuture.allOf(...)</code></td><td><code>Promise.all([...])</code> — resolves to a results array</td></tr>
  <tr><td>Caught failure</td><td><code>ExecutionException</code> wraps the real cause</td><td><code>catch (e)</code> — any thrown value, unwrapped</td></tr>
</table>
<p>The most common runtime performance bug neither language stops you from
writing: awaiting independent work in a loop or in sequence when it could run
concurrently. Two serial <code>await</code>s take as long as the sum of both
promises; <code>Promise.all</code> takes as long as the slowest one — the same
tradeoff as chaining sequential <code>.get()</code> calls versus combining
several <code>CompletableFuture</code>s with <code>allOf</code>. Reach for
<code>Promise.all</code> whenever the tasks do not depend on each other.</p>
<p>On errors: a rejected promise becomes a thrown value at its <code>await</code>.
If nothing catches it, your <code>async</code> function returns a
<em>rejected</em> promise — the failure propagates to whoever awaits you. This is
similar in spirit to a <code>CompletableFuture</code> whose exception is captured
and re-thrown (wrapped in a <code>CompletionException</code>) when you call
<code>.get()</code>, rather than declared up front the way a checked exception
would be. A runtime <code>catch (e)</code> in JavaScript must be ready for
anything: an <code>Error</code>, a string, even <code>undefined</code>.</p>`,
