  intro: `
<p>Time to put it together. This capstone is a tiny in-memory <em>task store</em>
that leans on almost everything this course has covered: a <strong>class</strong>
to hold state and behavior, <strong>array-iteration methods</strong>
(<code>find</code>, <code>filter</code>, <code>reduce</code>) to query and
aggregate, and <strong>custom errors</strong> to refuse bad input. Nothing here
is new syntax — you have written all of it in Java. The point is to feel
how it behaves once the classes and generics are gone and the only thing standing
between a caller and a corrupt store is the code <em>you</em> wrote.</p>
<table>
  <tr><th>Java</th><th>JavaScript</th></tr>
  <tr><td><code>record Task(int id, String title, int priority, boolean done) {}</code></td><td>a plain object shaped however you build it</td></tr>
  <tr><td><code>List&lt;Task&gt; tasks</code> — element type enforced</td><td><code>this.tasks = []</code> — holds anything you push</td></tr>
  <tr><td>compiler rejects <code>add(42)</code></td><td>you must <code>throw</code> to reject it</td></tr>
  <tr><td><code>stream().findFirst(): Optional&lt;Task&gt;</code> forces a check</td><td><code>find</code> returns <code>undefined</code>; guard it</td></tr>
</table>
<p>In Java, <code>stream().findFirst()</code> returns an <code>Optional&lt;Task&gt;</code>,
and the compiler will not let you touch the contained value without unwrapping it
first — <code>orElseThrow</code>, <code>isPresent</code>, or similar. At runtime
that wrapper does not exist in JavaScript: <code>find</code> hands back a task or
<code>undefined</code>, and if you forget to check, the very next property access
throws a <code>TypeError</code>. The runtime discipline is to <em>make the miss
explicit</em> — detect it and throw a meaningful error instead of letting a
cryptic one leak out later.</p>`,

  java: `class NotFoundException extends RuntimeException {
  public NotFoundException(String message) { super(message); }
}
class ValidationException extends RuntimeException {
  public ValidationException(String message) { super(message); }
}

class Task {
  final int id;
  final String title;
  final int priority;
  boolean done;

  Task(int id, String title, int priority, boolean done) {
    this.id = id;
    this.title = title;
    this.priority = priority;
    this.done = done;
  }
}

class TaskStore {
  private final List<Task> tasks = new ArrayList<>();
  private int nextId = 1;

  Task add(String title, int priority) {
    if (title.trim().isEmpty()) {
      throw new ValidationException("title required");
    }
    Task task = new Task(nextId++, title, priority, false);
    tasks.add(task);
    return task;
  }

  Task get(int id) {
    return tasks.stream()
      .filter(t -> t.id == id)
      .findFirst()
      .orElseThrow(() -> new NotFoundException("no task " + id));
  }

  Task complete(int id) {
    Task task = get(id);
    task.done = true;
    return task;
  }

  List<Task> pending() {
    return tasks.stream().filter(t -> !t.done).toList();
  }

  Map<String, Integer> summary() {
    int total = tasks.size();
    int done = (int) tasks.stream().filter(t -> t.done).count();
    return Map.of("total", total, "done", done, "pending", total - done);
  }
}`,

  requirements: [

    { pattern: /class\s+\w*Error\s+extends\s+Error/, message: "Define a custom Error subclass" },

  tests: [
    { name: "add returns a task with id 1, not done", run: (x) => {
        const store = new x.TaskStore();

        const err = new x.NotFoundError("nope");
        expectTruthy(err instanceof x.NotFoundError);
        expectEqual(err.name, "NotFoundError");
        expectEqual(err.message, "nope");

  solution: `class ValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = "ValidationError";
  }
}

class NotFoundError extends Error {
  constructor(message) {
    super(message);
    this.name = "NotFoundError";
  }
}

class TaskStore {
  constructor() {
    this.tasks = [];
    this.nextId = 1;
  }

  add(title, priority = 1) {
    if (typeof title !== "string" || title.trim() === "") {
      throw new ValidationError("title must be a non-empty string");
    }
    const task = { id: this.nextId++, title, priority, done: false };
    this.tasks.push(task);
    return task;
  }

  get(id) {
    const task = this.tasks.find((t) => t.id === id);
    if (!task) {
      throw new NotFoundError("no task with id " + id);
    }
    return task;
  }

  complete(id) {
    const task = this.get(id);
    task.done = true;
    return task;
  }

  pending() {
    return this.tasks.filter((t) => !t.done);
  }

  summary() {
    return this.tasks.reduce(
      (acc, t) => {
        acc.total += 1;
        if (t.done) acc.done += 1;
        else acc.pending += 1;
        return acc;
      },
      { total: 0, done: 0, pending: 0 }
    );
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>JavaScript</th></tr>
  <tr><td>Task shape</td><td><code>record Task</code> enforced</td><td>whatever object you construct</td></tr>
  <tr><td>Bad input</td><td>rejected at compile time</td><td>rejected only if you <code>throw</code></td></tr>
  <tr><td>Missing lookup</td><td><code>Optional&lt;Task&gt;</code> forces a check</td><td><code>find</code> returns <code>undefined</code> silently</td></tr>
  <tr><td>Aggregate</td><td><code>stream().reduce</code> with a typed accumulator</td><td><code>reduce</code> with a seed object</td></tr>
</table>
<p>The lesson of the whole course lives in one line: <code>this.tasks.find(...)</code>
returns a task <em>or</em> <code>undefined</code>, and the runtime will not stop
you from reading <code>.done</code> off <code>undefined</code>. The
<code>if (!task) throw</code> guard is you doing, by hand, the unwrapping that
<code>Optional.orElseThrow</code> would have forced in Java. Every place Java's
compiler inserted a check, runtime code has to earn it.</p>
<p>Two other habits carried through here. Custom <code>Error</code> subclasses
let callers tell <em>why</em> something failed with <code>instanceof</code>
instead of string-matching messages — the same idea as catching a specific
custom <code>Exception</code> subclass in Java — but only because each
constructor sets <code>this.name</code>. And the array methods (<code>find</code>,
<code>filter</code>, <code>reduce</code>) stayed the workhorses: they read the
same as Java's stream pipeline, they just no longer promise anything about what
the elements are the way generics do. That promise is now your job.</p>`,
