const LESSON = {
  number: 17,
  title: "Generics",

  intro: `
<p>Plain JavaScript has no generics at all — there's no type system to
parametrize, so a "generic" container or function is really just a container
or function that happens to work with values of any type, and you rely on
comments or naming conventions (or a library like JSDoc) to say what type it
was built for. Kotlin makes that intent explicit: you put a type parameter in
angle brackets on a function or a class, and the compiler threads the
concrete type through for you and checks it at every call site.</p>
<table>
  <tr><th>JavaScript</th><th>Kotlin</th></tr>
  <tr><td><code>function first(xs) { return xs[0]; }</code></td><td><code>fun &lt;T&gt; first(xs: List&lt;T&gt;): T</code></td></tr>
  <tr><td><code>class Box { constructor(value) { ... } }</code></td><td><code>class Box&lt;T&gt;(val value: T)</code></td></tr>
  <tr><td>no way to require "comparable" values</td><td><code>&lt;T : Comparable&lt;T&gt;&gt;</code></td></tr>
  <tr><td>no concept of variance</td><td><code>out</code> / <code>in</code> (declared)</td></tr>
</table>
<p>Since JavaScript never declares a type parameter, there's nothing to
translate one-to-one — every Kotlin generic declaration below is new syntax,
not a rename of something you already write. The type parameter on a
<em>function</em> goes before the function name — <code>fun &lt;T&gt;
first(...)</code> — while on a class it goes after the name. A bound uses a
colon (<code>T : Comparable&lt;T&gt;</code>) to say "T must be a type that can
compare itself to another T." Because Kotlin has no bare <code>&gt;</code>
operator on arbitrary types the way JavaScript's <code>&gt;</code> silently
works (or misbehaves) on anything, a constraint like
<code>Comparable&lt;T&gt;</code> is what lets you write <code>a &gt; b</code>
inside a generic function at all.</p>`,

  javascript: `class Box {
  constructor(value) {
    this.value = value;
  }
  map(fn) {
    return new Box(fn(this.value));
  }
}

// no way to require that items be comparable — > just does whatever it does
function largest(items) {
  return items.reduce((a, b) => (b > a ? b : a));
}`,

  task: `
<p>Build a small generic toolkit. Everything is top-level — no
<code>main</code> needed.</p>
<ol>
  <li>Define a generic container <code>class Box&lt;T&gt;(val value: T)</code>.
      Give it <code>fun &lt;R&gt; map(transform: (T) -&gt; R): Box&lt;R&gt;</code>
      that returns a new box holding the transformed value, and a
      <code>toString()</code> that returns <code>"Box(&lt;value&gt;)"</code>.</li>
  <li>Write <code>describe(box: Box&lt;out Any?&gt;): String</code> that returns
      <code>box.toString()</code>. The <code>out</code> projection is use-site
      variance — it lets a <code>Box&lt;Int&gt;</code> be passed where any
      <code>Box</code> is accepted.</li>
  <li>Write <code>largest</code> as a constrained generic
      <code>fun &lt;T : Comparable&lt;T&gt;&gt; largest(items: List&lt;T&gt;): T</code>
      that returns the biggest element of a non-empty list using
      <code>&gt;</code>.</li>
</ol>`,

  starter: `// 1. Box<T> — a generic container holding one value of type T
class Box<T>(val value: T) {
    // map: turn a Box<T> into a Box<R> by transforming the value
    fun <R> map(transform: (T) -> R): Box<R> = TODO()

    override fun toString(): String = "Box(\$value)"
}

// 2. describe — accept a Box of anything using use-site variance (out)
fun describe(box: Box<out Any?>): String = TODO()

// 3. largest — the largest element of a non-empty list, via a Comparable constraint
fun <T : Comparable<T>> largest(items: List<T>): T = TODO()
`,

  requirements: [
    { pattern: /class\s+Box\s*<\s*T\s*>/, message: "Define a generic container: class Box<T>" },
    { pattern: /fun\s*<\s*T\s*:\s*Comparable\s*<\s*T\s*>\s*>/, message: "Write largest with a constraint: fun <T : Comparable<T>>" },
    { pattern: /Box\s*<\s*out\b/, message: "Accept any Box with use-site variance: Box<out Any?>" },
  ],

  tests: [
    { name: "Box holds its value", code: "        expect_eq(Box(42).value, 42)" },
    { name: "map transforms Int -> Int", code: "        expect_eq(Box(3).map { it * 2 }.value, 6)" },
    { name: "map can change the type (String -> Int)", code: "        expect_eq(Box(\"hi\").map { it.length }.value, 2)" },
    { name: "describe accepts a Box<Int> via out", code: "        expect_eq(describe(Box(5)), \"Box(5)\")" },
    { name: "largest of Ints", code: "        expect_eq(largest(listOf(3, 9, 2)), 9)" },
    { name: "largest of Strings", code: "        expect_eq(largest(listOf(\"apple\", \"pear\", \"kiwi\")), \"pear\")" },
  ],

  solution: `class Box<T>(val value: T) {
    fun <R> map(transform: (T) -> R): Box<R> = Box(transform(value))

    override fun toString(): String = "Box(\$value)"
}

fun describe(box: Box<out Any?>): String = box.toString()

fun <T : Comparable<T>> largest(items: List<T>): T {
    var result = items[0]
    for (item in items) {
        if (item > result) result = item
    }
    return result
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Kotlin</th></tr>
  <tr><td>Generic function</td><td><code>function f(x) { ... }</code> (untyped)</td><td><code>fun &lt;T&gt; f(x: T)</code></td></tr>
  <tr><td>Generic class</td><td><code>class Box { constructor(value) { ... } }</code></td><td><code>class Box&lt;T&gt;(val value: T)</code></td></tr>
  <tr><td>Upper bound</td><td>no equivalent (duck typing at runtime)</td><td><code>&lt;T : X&gt;</code></td></tr>
  <tr><td>Producer (covariant)</td><td>no equivalent</td><td><code>class Src&lt;out T&gt;</code> / <code>Box&lt;out T&gt;</code></td></tr>
  <tr><td>Consumer (contravariant)</td><td>no equivalent</td><td><code>class Sink&lt;in T&gt;</code></td></tr>
</table>
<p>Kotlin makes variance <em>explicit</em>. An <code>out T</code> means the type
only ever <em>produces</em> a <code>T</code> (like a read-only source), so
<code>Box&lt;Int&gt;</code> can safely stand in for <code>Box&lt;Any?&gt;</code>.
An <code>in T</code> means the type only <em>consumes</em> a <code>T</code>.
You can declare it on the class (declaration-site) or, as in
<code>Box&lt;out Any?&gt;</code> above, at the point of use (use-site
projection) — none of which JavaScript has any notion of, since it never
checks whether a value passed to a function is "the right shape" until the
code actually runs (if it ever checks at all).</p>
<p>Where JavaScript would need a runtime <code>typeof</code>/<code>instanceof</code>
check — or just hope for the best — to enforce that a value supports both
behaviors A and B, Kotlin lets you write a <code>where</code> clause:
<code>fun &lt;T&gt; f(x: T) where T : A, T : B</code>. And unlike JavaScript,
where nothing is ever "erased" because nothing was ever checked in the first
place, Kotlin's generics normally erase their type argument at runtime too —
except that a function marked <code>inline</code> with a <code>reified</code>
parameter can retain it, which is handy for <code>x is T</code> checks.</p>`,
};
