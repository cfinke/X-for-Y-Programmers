<title>Lesson 8: Interfaces & Object Shapes</title>
<link rel="stylesheet" href="../../shared/css/style.css">

<div id="app"></div>
<script>
const LESSON = {
  number: 8,
  title: "Interfaces & Object Shapes",

  intro: `
<p>Good news first: TypeScript interfaces are satisfied <em>implicitly</em>,
exactly like Go's. There is no <code>implements</code> declaration to write —
if a value has the right shape, it satisfies the interface, full stop. The
structural-typing instinct you built in Go transfers directly, down to "any
package's type can satisfy my interface without knowing it exists".</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>type Stringer interface { String() string }</code></td><td><code>interface Product { name: string; price: number }</code></td></tr>
  <tr><td>Describes a <em>method set</em> (behavior)</td><td>Mostly describes a <em>data shape</em> (struct-like)</td></tr>
  <tr><td>Satisfied implicitly — no <code>implements</code></td><td>Satisfied implicitly — no <code>implements</code> needed</td></tr>
  <tr><td>Optional field ≈ zero value or <code>*float64</code></td><td><code>discount?: number</code> — optionality in the type</td></tr>
</table>
<p>The difference is what interfaces are <em>for</em>. Go interfaces describe
method sets — behavior — and data lives in structs. TypeScript interfaces do
double duty, and in day-to-day code they mostly play the <em>struct</em> role:
they describe the shape of plain data. A bare object literal
<code>{ name: "Book", price: 20 }</code> satisfies <code>Product</code> with
no constructor and no declaration. And where a Go struct fakes optionality
with a zero value (<code>Discount: 0</code> — no discount, or a real 0%?) or
a pointer, TypeScript writes <code>discount?: number</code>: the field is
either genuinely there or genuinely absent, and lesson 6's <code>??</code>
handles the absent case.</p>`,

  go: `// Behavior lives in a Go interface — a method set:
type Stringer interface {
	String() string
}

// Data shape lives in a struct; optionality is faked:
type Product struct {
	Name     string
	Price    float64
	Discount float64 // 0 == "none"? Or a real zero discount?
}

func FinalPrice(p Product) float64 {
	return p.Price - p.Discount
}

// Product satisfies Stringer implicitly — no "implements":
func (p Product) String() string {
	return fmt.Sprintf("%s — $%.0f", p.Name, FinalPrice(p))
}`,

  task: `
<p>Move the struct's job onto a TypeScript interface:</p>
<ol>
  <li>Declare <code>interface Product</code> with <code>name: string</code>,
      <code>price: number</code>, and an <em>optional</em>
      <code>discount?: number</code> — absence is real, not a zero value.</li>
  <li>Write <code>finalPrice(p: Product): number</code> returning the price
      minus the discount, treating a missing discount as 0
      (<code>p.discount ?? 0</code>).</li>
  <li>Write <code>describeProduct(p: Product): string</code> returning
      <code>name</code> + <code>" — $"</code> + the final price, e.g.
      <code>"Keyboard — $70"</code>.</li>
  <li>Declare a plain object literal <code>sampleProduct</code> annotated as
      <code>Product</code> — no constructor, no <code>NewProduct</code>, no
      declaration that it "implements" anything. The shape is the
      contract.</li>
</ol>`,

  starter: `// 1. TODO: finish the interface — price: number, and an OPTIONAL
//    discount (write it as  discount?: number ).
interface Product {
  name: string;
}

// 2. TODO: price minus discount; missing discount counts as 0.
//    (Annotate p as Product once the interface is complete.)
function finalPrice(p: any): number {
  return 0;
}

// 3. TODO: return e.g. "Keyboard — $70" using finalPrice.
function describeProduct(p: any): string {
  return "";
}

// 4. TODO: annotate as Product. Note there is no constructor —
//    the literal's shape is what satisfies the interface.
const sampleProduct = {
  name: "The Go Programming Language",
};
`,

  exportNames: ["finalPrice", "describeProduct", "sampleProduct"],

  requirements: [
    { pattern: /interface\s+Product/, message: "Declare interface Product" },
    { pattern: /\w+\?\s*:/, message: "Make discount optional with the ?: syntax — real absence, not a zero value" },
    { pattern: /finalPrice\s*\(\s*p\s*:\s*Product\s*\)/, message: "Annotate finalPrice's parameter as Product" },
  ],

  tests: [
    { name: "finalPrice({name, price: 20}) is 20 — no discount field at all", run: (x) => expectEqual(x.finalPrice({ name: "Book", price: 20 }), 20) },
    { name: "finalPrice({name, price: 20, discount: 5}) is 15", run: (x) => expectEqual(x.finalPrice({ name: "Book", price: 20, discount: 5 }), 15) },
    { name: 'describeProduct({name: "Keyboard", price: 80, discount: 10}) is "Keyboard — $70"', run: (x) => expectEqual(x.describeProduct({ name: "Keyboard", price: 80, discount: 10 }), "Keyboard — $70") },
    { name: "sampleProduct is a plain literal with a string name and numeric price", run: (x) => { expectTruthy(x.sampleProduct); expectEqual(typeof x.sampleProduct.name, "string"); expectEqual(typeof x.sampleProduct.price, "number"); } },
    { name: "sampleProduct satisfies the functions that consume Product", run: (x) => expectEqual(typeof x.finalPrice(x.sampleProduct), "number") },
  ],

  solution: `interface Product {
  name: string;
  price: number;
  discount?: number; // optional — either really there or really absent
}

function finalPrice(p: Product): number {
  return p.price - (p.discount ?? 0);
}

function describeProduct(p: Product): string {
  return p.name + " — $" + finalPrice(p);
}

// A bare literal satisfies Product implicitly — the Go instinct holds.
const sampleProduct: Product = {
  name: "The Go Programming Language",
  price: 40,
  discount: 5,
};
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Interface describes</td><td>Method set (behavior)</td><td>Usually a data shape (structs' old job); methods allowed too</td></tr>
  <tr><td>Satisfaction</td><td>Implicit, structural</td><td>Implicit, structural — same instinct</td></tr>
  <tr><td>Making a value</td><td><code>Product{Name: "Book", Price: 20}</code></td><td><code>{ name: "Book", price: 20 }</code> — plain literal</td></tr>
  <tr><td>Optional field</td><td>Zero value (ambiguous) or <code>*float64</code></td><td><code>discount?: number</code></td></tr>
  <tr><td>Read optional field</td><td><code>if p.Discount != 0 { ... }</code></td><td><code>p.discount ?? 0</code></td></tr>
  <tr><td>At runtime</td><td>Interface value exists (type + pointer)</td><td>Erased entirely — types vanish after compilation</td></tr>
</table>
<p>One thing to internalize: a TypeScript interface is <em>only</em> a
compile-time shape — after compilation it is gone, so there is no
<code>x.(Product)</code> assertion and no reflection on it. That sounds like a
loss, but it is why a plain JSON payload can satisfy <code>Product</code>
directly. When you need Go-style <em>behavioral</em> interfaces, TypeScript
interfaces can declare method signatures too
(<code>interface Stringer { toString(): string }</code>) — same implicit
satisfaction, and classes (next lesson) satisfy them just by having the
methods.</p>`,
};
</script>
