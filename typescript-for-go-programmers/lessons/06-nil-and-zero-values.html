<div id="app"></div>
<script>
const LESSON = {
  number: 6,
  title: "Nil & Undefined",

  intro: `
<p>Go papers over absence in two ways, and both can bite. Value types get
<em>zero values</em>: a missing <code>City</code> is <code>""</code>, a missing
count is <code>0</code> — indistinguishable from a real empty string or a real
zero. Pointer and map lookups give you <code>nil</code>, which compiles
cheerfully and then panics the moment you dereference it. The compiler knows
<code>*User</code> might be nil, but it never makes you check.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>func Find(id int) *User</code> (nil possible, unchecked)</td><td><code>function find(id: number): User | undefined</code> (checked)</td></tr>
  <tr><td><code>if u != nil &amp;&amp; u.Addr != nil { ... }</code></td><td><code>u?.addr?.street</code></td></tr>
  <tr><td><code>if s == "" { s = "default" }</code> (was it ever set?)</td><td><code>s ?? "default"</code> (absence is its own value)</td></tr>
  <tr><td>Nil deref = runtime panic</td><td>Unchecked access = compile error</td></tr>
</table>
<p>TypeScript puts absence <em>in the type</em>. A function that might not find
a user returns <code>User | undefined</code>, and the compiler refuses to let
you touch <code>.name</code> until you have checked — it is a nil check
enforced at compile time. Two operators make the checks painless:
<code>?.</code> chains through possibly-absent values without the
<code>if x != nil</code> pyramid, and <code>??</code> supplies a default only
when the value is <code>null</code>/<code>undefined</code>. And because
<code>undefined</code> is a distinct value, it can never be confused with a
legitimate <code>""</code> or <code>0</code> the way a zero value can.</p>`,

  go: `type User struct {
	Name string
	City string // "" means... never set? Or actually empty?
}

var users = map[int]*User{
	1: {Name: "Rob", City: "Zurich"},
	2: {Name: "Ken"}, // City gets the zero value ""
}

func FindUser(id int) *User {
	return users[id] // nil for a missing key — caller beware
}

func CityOf(id int) string {
	u := FindUser(id)
	if u == nil || u.City == "" { // the manual nil-and-zero dance
		return "unknown"
	}
	return u.City
}`,

  task: `
<p>Port the lookup to TypeScript, letting the type system do the nil checks:</p>
<ol>
  <li>Give <code>findUser</code> an honest return type:
      <code>User | undefined</code>. Return the user from <code>users</code>
      whose <code>id</code> matches, or <code>undefined</code> if none does
      (<code>users.find(...)</code> already returns exactly that type).</li>
  <li>Write <code>cityOf(id: number): string</code> in a single expression
      using <code>?.</code> to reach through the possibly-missing user to
      <code>city</code>, and <code>??</code> to fall back to
      <code>"unknown"</code> — for a missing user <em>and</em> for Ken, whose
      <code>city</code> was genuinely never set (not zero-valued to
      <code>""</code>).</li>
</ol>
<p>Try accessing <code>findUser(1).name</code> without a check — the compiler
stops you. That is the nil-pointer panic caught before the program runs.</p>`,

  starter: `type User = { id: number; name: string; city?: string };

const users: User[] = [
  { id: 1, name: "Rob", city: "Zurich" },
  { id: 2, name: "Ken" }, // no city — truly absent, not ""
];

// 1. TODO: make the return type honest: User | undefined.
//    Then return users.find(...) — its type already says the truth.
function findUser(id: number) {
  // TODO: find the user with a matching id
  return undefined;
}

// 2. TODO: one line: findUser(id)?.city ?? "unknown"
function cityOf(id: number): string {
  return "";
}
`,

  exportNames: ["findUser", "cityOf"],

  requirements: [
    { pattern: /\|\s*(null|undefined)/, message: "findUser's return type must include | undefined — put the absence in the type" },
    { pattern: /\?\./, message: "Use optional chaining (?.) instead of an if-nil pyramid" },
    { pattern: /\?\?/, message: "Use nullish coalescing (??) to supply the \"unknown\" default" },
  ],

  tests: [
    { name: 'findUser(1) returns Rob', run: (x) => { const u = x.findUser(1); expectTruthy(u); expectEqual(u.name, "Rob"); } },
    { name: "findUser(99) returns undefined (not a zero-value User)", run: (x) => expectEqual(x.findUser(99), undefined) },
    { name: 'cityOf(1) returns "Zurich"', run: (x) => expectEqual(x.cityOf(1), "Zurich") },
    { name: 'cityOf(2) returns "unknown" — Ken exists but has no city', run: (x) => expectEqual(x.cityOf(2), "unknown") },
    { name: 'cityOf(99) returns "unknown" — no user at all', run: (x) => expectEqual(x.cityOf(99), "unknown") },
  ],

  solution: `type User = { id: number; name: string; city?: string };

const users: User[] = [
  { id: 1, name: "Rob", city: "Zurich" },
  { id: 2, name: "Ken" },
];

function findUser(id: number): User | undefined {
  return users.find((u) => u.id === id);
}

function cityOf(id: number): string {
  return findUser(id)?.city ?? "unknown";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Missing value</td><td><code>nil</code> pointer or zero value (<code>""</code>, <code>0</code>)</td><td><code>undefined</code> (and <code>null</code>), visible in the type</td></tr>
  <tr><td>"Might be absent" signature</td><td><code>func F() *User</code> — nil unchecked</td><td><code>function f(): User | undefined</code> — checked</td></tr>
  <tr><td>Guarded access</td><td><code>if u != nil { u.Name }</code></td><td><code>u?.name</code></td></tr>
  <tr><td>Chained guards</td><td><code>if u != nil &amp;&amp; u.Addr != nil { ... }</code></td><td><code>u?.addr?.street</code></td></tr>
  <tr><td>Default for absence</td><td><code>if v == "" { v = "x" }</code></td><td><code>v ?? "x"</code></td></tr>
  <tr><td>Forgot the check</td><td>Panic at runtime</td><td>Error at compile time</td></tr>
</table>
<p>The deep difference: Go's zero values make absence <em>look like</em>
presence (<code>""</code> and <code>0</code> are valid data), while
<code>nil</code> makes absence invisible to the compiler. TypeScript makes
absence a first-class, compiler-tracked value. <code>x ?? d</code> only falls
back on <code>null</code>/<code>undefined</code> — a real <code>0</code> or
<code>""</code> passes through untouched, which is exactly the distinction the
zero-value convention erases. (Avoid <code>||</code> for defaults: it treats
<code>0</code> and <code>""</code> as falsy and reintroduces the Go
ambiguity.)</p>`,
};
</script>
