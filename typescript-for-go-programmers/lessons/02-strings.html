<div id="app"></div>
<script>
const LESSON = {
  number: 2,
  title: "Strings",

  intro: `
<p>In Go, string work means importing <code>fmt</code> and <code>strings</code>
and keeping your <code>%s</code>/<code>%d</code> verbs lined up with the
arguments. TypeScript moves all of that onto the value itself. The headline is
the template literal: <code>fmt.Sprintf("%s is %d years old", name, age)</code>
becomes <code>\`\${name} is \${age} years old\`</code> — backticks, with
expressions inline. There are no verbs to mismatch, because the expression
sits exactly where its output goes.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>fmt.Sprintf("%s is %d years old", name, age)</code></td><td><code>\`\${name} is \${age} years old\`</code></td></tr>
  <tr><td><code>strings.ToUpper(s)</code></td><td><code>s.toUpperCase()</code></td></tr>
  <tr><td><code>strings.Contains(s, sub)</code></td><td><code>s.includes(sub)</code></td></tr>
  <tr><td><code>len(s)</code></td><td><code>s.length</code></td></tr>
  <tr><td><code>strings.HasPrefix(s, p)</code></td><td><code>s.startsWith(p)</code></td></tr>
</table>
<p>The second shift: functions move onto the value. Go keeps strings plain and
puts the behavior in a package — <code>strings.ToUpper(s)</code>. TypeScript
strings carry their methods with them — <code>s.toUpperCase()</code>,
<code>s.includes(sub)</code>, <code>s.trim()</code> — no import needed. Even
<code>len(s)</code> becomes the property <code>s.length</code> (note: no
parentheses). One caveat for the Unicode-aware: <code>len(s)</code> counts
bytes, while <code>s.length</code> counts UTF-16 code units — both lie about
emoji, just differently.</p>`,

  go: `name := "Gopher"
age := 14

// Formatting: verbs must match the argument types, or you
// find out at runtime with a %!d(string=...) in your output.
msg := fmt.Sprintf("%s is %d years old", name, age)

// Behavior lives in the strings package, not on the value
upper := strings.ToUpper(name)          // "GOPHER"
n := len(name)                          // 6
hasGo := strings.Contains(name, "Go")   // true
starts := strings.HasPrefix(name, "Go") // true

fmt.Println(msg, upper, n, hasGo, starts)`,

  task: `
<p>Rewrite the Go string helpers as TypeScript:</p>
<ol>
  <li>Write <code>makeGreeting(name: string, age: number): string</code> that
      returns <code>"Gopher is 14 years old"</code> style output — use a
      <em>template literal</em> (backticks and <code>\${...}</code>), not
      concatenation.</li>
  <li>Write <code>shout(s: string): string</code> that returns the string
      uppercased. Go: <code>strings.ToUpper(s)</code>; here the method lives
      on the string itself.</li>
  <li>Write <code>mentions(s: string, word: string): boolean</code> that
      reports whether <code>s</code> contains <code>word</code> — the
      <code>strings.Contains</code> of the house.</li>
</ol>`,

  starter: `// 1. makeGreeting — Go: fmt.Sprintf("%s is %d years old", name, age)
//    Use a template literal: backticks, with \${expr} holes.
function makeGreeting(name: string, age: number): string {
  // TODO
  return "";
}

// 2. shout — Go: strings.ToUpper(s). The function moves onto the value.
function shout(s: string): string {
  // TODO
  return s;
}

// 3. mentions — Go: strings.Contains(s, word)
function mentions(s: string, word: string): boolean {
  // TODO
  return false;
}
`,

  exportNames: ["makeGreeting", "shout", "mentions"],

  requirements: [
    { pattern: /`[^`]*\$\{[^`]*`/, message: "Use a template literal (backticks with a ${...} placeholder) in makeGreeting" },
    { pattern: /\.toUpperCase\s*\(\s*\)/, message: "Use the .toUpperCase() string method in shout" },
    { pattern: /\.includes\s*\(/, message: "Use the .includes() string method in mentions" },
  ],

  tests: [
    { name: 'makeGreeting("Gopher", 14) returns "Gopher is 14 years old"', run: (x) => expectEqual(x.makeGreeting("Gopher", 14), "Gopher is 14 years old") },
    { name: 'makeGreeting("Ada", 36) returns "Ada is 36 years old"', run: (x) => expectEqual(x.makeGreeting("Ada", 36), "Ada is 36 years old") },
    { name: 'shout("gopher") returns "GOPHER"', run: (x) => expectEqual(x.shout("gopher"), "GOPHER") },
    { name: 'mentions("TypeScript for Go programmers", "Go") is true', run: (x) => expectEqual(x.mentions("TypeScript for Go programmers", "Go"), true) },
    { name: 'mentions("TypeScript for Go programmers", "Rust") is false', run: (x) => expectEqual(x.mentions("TypeScript for Go programmers", "Rust"), false) },
  ],

  solution: `function makeGreeting(name: string, age: number): string {
  return \`\${name} is \${age} years old\`;
}

function shout(s: string): string {
  return s.toUpperCase();
}

function mentions(s: string, word: string): boolean {
  return s.includes(word);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Interpolation</td><td><code>fmt.Sprintf("%s/%d", a, b)</code></td><td><code>\`\${a}/\${b}\`</code></td></tr>
  <tr><td>Uppercase / lowercase</td><td><code>strings.ToUpper(s)</code> / <code>strings.ToLower(s)</code></td><td><code>s.toUpperCase()</code> / <code>s.toLowerCase()</code></td></tr>
  <tr><td>Contains</td><td><code>strings.Contains(s, sub)</code></td><td><code>s.includes(sub)</code></td></tr>
  <tr><td>Prefix / suffix</td><td><code>strings.HasPrefix</code> / <code>HasSuffix</code></td><td><code>s.startsWith()</code> / <code>s.endsWith()</code></td></tr>
  <tr><td>Length</td><td><code>len(s)</code> (bytes)</td><td><code>s.length</code> (UTF-16 units, no parens)</td></tr>
  <tr><td>Split / join</td><td><code>strings.Split</code> / <code>strings.Join</code></td><td><code>s.split(",")</code> / <code>arr.join(",")</code></td></tr>
</table>
<p>The pattern to internalize: where Go says <code>strings.Verb(s, ...)</code>,
TypeScript says <code>s.verb(...)</code>. You lose the tidy one-package index
of every string operation, but you gain chaining —
<code>s.trim().toLowerCase().split(" ")</code> reads left to right the way the
data flows, no nested calls, no intermediate variables.</p>`,
};
