<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>The signature translates almost mechanically:
<code>func f(x int) string</code> becomes
<code>function f(x: number): string</code> — the types stay after the names,
they just gain colons. Go's signature move, multiple return values, has no
direct twin: <code>func divmod(a, b int) (int, int)</code> becomes a function
returning a <em>tuple type</em>, <code>[number, number]</code> — one value
that happens to be a typed pair. (And the <code>(val, err)</code> pattern
specifically? TypeScript code usually <em>throws</em> errors instead of
returning them — a trade we'll wrestle with properly in a later lesson.)</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>func f(x int) string</code></td><td><code>function f(x: number): string</code></td></tr>
  <tr><td><code>func divmod(a, b int) (int, int)</code></td><td><code>function divmod(a: number, b: number): [number, number]</code></td></tr>
  <tr><td>default params: not a thing — write a wrapper</td><td><code>greeting: string = "Hello"</code></td></tr>
  <tr><td>optional params: not a thing — write a wrapper</td><td><code>last?: string</code></td></tr>
  <tr><td><code>double := func(x int) int { return x * 2 }</code></td><td><code>const double = (x: number): number =&gt; x * 2;</code></td></tr>
</table>
<p>Then comes the feature Go famously refused on principle: <em>default and
optional parameters</em>. Where Go makes you write <code>greet</code> and
<code>greetWith</code> wrapper pairs, TypeScript writes
<code>greeting: string = "Hello"</code> (caller may omit it, gets the
default) or <code>last?: string</code> (caller may omit it, you get
<code>undefined</code> and must handle it). Two functions collapse into
one — this is exactly the simplicity-for-expressiveness trade this course
keeps flagging, landing in expressiveness's favor for once.</p>
<p>Finally, function literals: <code>func(x int) int { ... }</code> becomes
the arrow function <code>(x: number): number =&gt; x * 2</code>. Arrows are
the default for anything you assign to a variable or pass as a callback.</p>`,

  go: `func area(w float64, h float64) float64 {
	return w * h
}

// Multiple return values — Go's signature move
func divmod(a, b int) (int, int) {
	return a / b, a % b
}

// No default or optional params in Go: you write wrappers
func greet(name string) string {
	return greetWith("Hello", name)
}

func greetWith(greeting, name string) string {
	return greeting + ", " + name + "!"
}

// Function literals get assigned to variables
var double = func(x int) int { return x * 2 }`,

  task: `
<p>Rewrite the Go functions as TypeScript:</p>
<ol>
  <li>Write <code>greet(name: string, greeting: string = "Hello"): string</code>
      returning <code>"Hello, Gopher!"</code>-style strings. The default value
      replaces Go's <code>greet</code>/<code>greetWith</code> wrapper pair —
      one function does both jobs.</li>
  <li>Write <code>fullName(first: string, last?: string): string</code> —
      <code>last</code> is <em>optional</em>. Return
      <code>"first last"</code> when it is given, just <code>first</code>
      when it is not.</li>
  <li>Write <code>double</code> as an <em>arrow function</em> assigned to a
      <code>const</code>: takes a <code>number</code>, returns it doubled.</li>
  <li>Write <code>divmod(a: number, b: number): [number, number]</code>
      returning the quotient and remainder as a tuple — Go's
      <code>(int, int)</code> return, packed into one value. (Use
      <code>Math.trunc(a / b)</code> to match Go's integer division.)</li>
</ol>`,

  starter: `// 1. greet — give greeting a DEFAULT value of "Hello".
//    Go needed two functions for this; TypeScript needs one.
function greet(name: string, greeting: string): string {
  // TODO: return "<greeting>, <name>!"
  return "";
}

// 2. fullName — make last OPTIONAL with ?.
//    If last is undefined, return just first.
function fullName(first: string, last: string): string {
  // TODO
  return first;
}

// 3. double — rewrite Go's  var double = func(x int) int {...}
//    as an arrow function on a const:
// const double = ...

// 4. divmod — Go: func divmod(a, b int) (int, int)
//    Return a [number, number] tuple instead of two values.
function divmod(a: number, b: number) {
  // TODO: annotate the return type as [number, number]
  return [0, 0];
}
`,

  exportNames: ["greet", "fullName", "double", "divmod"],

  requirements: [
    { pattern: /greeting\s*:\s*string\s*=\s*"Hello"/, message: 'Give greeting a default value: greeting: string = "Hello"' },
    { pattern: /last\?\s*:\s*string/, message: "Mark last as optional with ?: last?: string" },
    { pattern: /const\s+double\s*=[\s\S]*?=>/, message: "Define double as an arrow function assigned to a const" },
    { pattern: /:\s*\[\s*number\s*,\s*number\s*\]/, message: "Annotate divmod's return type as the tuple [number, number]" },
  ],

  tests: [
    { name: 'greet("Gopher") uses the default: "Hello, Gopher!"', run: (x) => expectEqual(x.greet("Gopher"), "Hello, Gopher!") },
    { name: 'greet("Gopher", "Howdy") overrides it: "Howdy, Gopher!"', run: (x) => expectEqual(x.greet("Gopher", "Howdy"), "Howdy, Gopher!") },
    { name: 'fullName("Ada", "Lovelace") returns "Ada Lovelace"', run: (x) => expectEqual(x.fullName("Ada", "Lovelace"), "Ada Lovelace") },
    { name: 'fullName("Ada") returns "Ada" — the optional param was omitted', run: (x) => expectEqual(x.fullName("Ada"), "Ada") },
    { name: "double(21) returns 42", run: (x) => expectEqual(x.double(21), 42) },
    { name: "divmod(17, 5) returns the tuple [3, 2]", run: (x) => expectDeepEqual(x.divmod(17, 5), [3, 2]) },
  ],

  solution: `function greet(name: string, greeting: string = "Hello"): string {
  return \`\${greeting}, \${name}!\`;
}

function fullName(first: string, last?: string): string {
  return last ? \`\${first} \${last}\` : first;
}

const double = (x: number): number => x * 2;

function divmod(a: number, b: number): [number, number] {
  return [Math.trunc(a / b), a % b];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Signature</td><td><code>func f(x int) string</code></td><td><code>function f(x: number): string</code></td></tr>
  <tr><td>Multiple returns</td><td><code>(int, int)</code></td><td><code>[number, number]</code> tuple (or an object)</td></tr>
  <tr><td>Errors</td><td><code>(T, error)</code>, checked at every call</td><td>usually <code>throw</code> + <code>try/catch</code></td></tr>
  <tr><td>Default param</td><td>— (wrapper function)</td><td><code>greeting: string = "Hello"</code></td></tr>
  <tr><td>Optional param</td><td>— (wrapper or variadic hack)</td><td><code>last?: string</code> (arrives as <code>undefined</code>)</td></tr>
  <tr><td>Function literal</td><td><code>f := func(x int) int {...}</code></td><td><code>const f = (x: number) =&gt; ...;</code></td></tr>
  <tr><td>Integer division</td><td><code>a / b</code> on ints truncates</td><td><code>Math.trunc(a / b)</code></td></tr>
</table>
<p>Optional and default parameters are where TypeScript spends the complexity
budget Go hoards: every extra <code>?</code> is one more shape a call site can
take. The discipline that keeps it Go-simple: optional and defaulted
parameters must come last, an omitted <code>?</code> param is
<code>undefined</code> and the compiler makes you deal with that, and if a
function grows more than one or two optionals, the idiom is to take a single
options object instead — TypeScript's answer to Go's config struct.</p>`,
};
</script>
