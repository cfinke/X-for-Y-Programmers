<script>
const LESSON = {
  number: 3,
  title: "Slices → Arrays",

  intro: `
<p>Go's slice is a beautiful machine you were required to understand:
a header pointing at a backing array, a length, a capacity, and the
<code>s = append(s, x)</code> reassignment ritual because <code>append</code>
might reallocate out from under you. TypeScript's array is just… a growable
list. <code>nums.push(4)</code> appends in place — no reassignment, no
capacity bookkeeping, and no aliasing surprises where two slices silently
share a backing array.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>nums := []int{1, 2, 3}</code></td><td><code>const nums: number[] = [1, 2, 3];</code></td></tr>
  <tr><td><code>nums = append(nums, 4)</code></td><td><code>nums.push(4);</code></td></tr>
  <tr><td><code>len(nums)</code></td><td><code>nums.length</code></td></tr>
  <tr><td><code>nums[1:3]</code> (shares backing array)</td><td><code>nums.slice(1, 3)</code> (a copy)</td></tr>
  <tr><td>contains: write the loop (or <code>slices.Contains</code>, since 1.21)</td><td><code>nums.includes(4)</code> — always been there</td></tr>
</table>
<p>Note the <code>const nums</code> + <code>nums.push(4)</code> combination:
<code>const</code> locks the <em>binding</em>, not the contents — and since
<code>push</code> mutates in place rather than returning a new slice header,
<code>const</code> is still the right declaration. Slicing syntax survives
almost intact — <code>nums[1:3]</code> becomes <code>nums.slice(1, 3)</code>,
same half-open interval — but it returns a fresh copy, so mutating the result
never touches the original.</p>
<p>And the small luxury: <code>nums.includes(x)</code> has been built in
forever, while Go shipped without a generic contains for over a decade and
you wrote that <code>for _, v := range</code> loop every single time.</p>`,

  go: `nums := []int{1, 2, 3}

// append may reallocate, so you must reassign the result
nums = append(nums, 4)

n := len(nums)   // 4
mid := nums[1:3] // [2 3] — half-open, and it SHARES the backing array

langs := []string{"Go", "TypeScript"}
langs = append(langs, "Rust")

// "contains": the loop you wrote for a decade
found := false
for _, v := range nums {
	if v == 4 {
		found = true
		break
	}
}
fmt.Println(n, mid, found)`,

  task: `
<p>Rewrite the slice code as TypeScript arrays:</p>
<ol>
  <li>Declare a constant <code>langs</code> with an explicit
      <code>: string[]</code> annotation, holding <code>"Go"</code> and
      <code>"TypeScript"</code>.</li>
  <li>Write <code>appendScore(scores: number[], score: number): number[]</code>
      that appends <code>score</code> with <code>.push()</code> (mutating the
      array in place — no reassignment needed) and returns the same array.</li>
  <li>Write <code>middleTwo(nums: number[]): number[]</code> that returns
      elements 1 and 2 — Go's <code>nums[1:3]</code> is
      <code>nums.slice(1, 3)</code> here, same half-open range.</li>
  <li>Write <code>hasValue(nums: number[], target: number): boolean</code>
      using the built-in <code>.includes()</code> — no loop required.</li>
</ol>
<p>Annotate every array parameter and return type explicitly
(<code>number[]</code> / <code>string[]</code>).</p>`,

  starter: `// 1. langs — Go: langs := []string{"Go", "TypeScript"}
//    Annotate it explicitly: const langs: string[] = ...


// 2. appendScore — Go: scores = append(scores, score)
//    Here push mutates in place; just return the same array.
function appendScore(scores: number[], score: number): number[] {
  // TODO: push, then return scores
  return scores;
}

// 3. middleTwo — Go: nums[1:3]
function middleTwo(nums: number[]): number[] {
  // TODO
  return [];
}

// 4. hasValue — Go: the for-range loop. TypeScript: one method call.
function hasValue(nums: number[], target: number): boolean {
  // TODO
  return false;
}
`,

  exportNames: ["langs", "appendScore", "middleTwo", "hasValue"],

  requirements: [
    { pattern: /const\s+langs\s*:\s*string\[\]/, message: "Declare langs as a const with an explicit : string[] annotation" },
    { pattern: /:\s*number\[\]/, message: "Annotate the number-array parameters and returns with number[]" },
    { pattern: /\.push\s*\(/, message: "Use .push() to append in appendScore (no reassignment, unlike append)" },
    { pattern: /\.slice\s*\(/, message: "Use .slice(1, 3) in middleTwo — the [1:3] of TypeScript" },
  ],

  tests: [
    { name: 'langs is ["Go", "TypeScript"]', run: (x) => expectDeepEqual(x.langs, ["Go", "TypeScript"]) },
    { name: "appendScore([1, 2, 3], 4) returns [1, 2, 3, 4]", run: (x) => expectDeepEqual(x.appendScore([1, 2, 3], 4), [1, 2, 3, 4]) },
    { name: "appendScore mutates the array in place (same array, no reallocation dance)", run: (x) => { const a = [7, 8]; x.appendScore(a, 9); expectDeepEqual(a, [7, 8, 9]); } },
    { name: "middleTwo([10, 20, 30, 40]) returns [20, 30]", run: (x) => expectDeepEqual(x.middleTwo([10, 20, 30, 40]), [20, 30]) },
    { name: "middleTwo does not modify the original array", run: (x) => { const a = [1, 2, 3, 4]; x.middleTwo(a); expectDeepEqual(a, [1, 2, 3, 4]); } },
    { name: "hasValue finds 4 in [1, 2, 3, 4] but not 9", run: (x) => { expectEqual(x.hasValue([1, 2, 3, 4], 4), true); expectEqual(x.hasValue([1, 2, 3, 4], 9), false); } },
  ],

  solution: `const langs: string[] = ["Go", "TypeScript"];

function appendScore(scores: number[], score: number): number[] {
  scores.push(score);
  return scores;
}

function middleTwo(nums: number[]): number[] {
  return nums.slice(1, 3);
}

function hasValue(nums: number[], target: number): boolean {
  return nums.includes(target);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Literal</td><td><code>[]int{1, 2, 3}</code></td><td><code>const a: number[] = [1, 2, 3];</code></td></tr>
  <tr><td>Append</td><td><code>s = append(s, x)</code></td><td><code>a.push(x);</code> (in place)</td></tr>
  <tr><td>Length</td><td><code>len(s)</code></td><td><code>a.length</code></td></tr>
  <tr><td>Capacity</td><td><code>cap(s)</code></td><td>— (not your problem)</td></tr>
  <tr><td>Subrange</td><td><code>s[1:3]</code> (view, shared memory)</td><td><code>a.slice(1, 3)</code> (copy)</td></tr>
  <tr><td>Contains</td><td>hand-rolled loop / <code>slices.Contains</code></td><td><code>a.includes(x)</code></td></tr>
  <tr><td>Copy</td><td><code>copy(dst, src)</code></td><td><code>[...a]</code> or <code>a.slice()</code></td></tr>
</table>
<p>The mental model swap: a Go slice is a <em>view</em> onto a backing array,
which is why <code>append</code> returns a possibly-new header and why
subslices alias each other. A TypeScript array <em>owns</em> its elements —
<code>push</code> mutates it, <code>slice</code> copies from it, and nothing
aliases unless you pass the same reference around. You give up Go's
zero-copy subslicing tricks; you get back every hour you ever spent debugging
an aliased backing array.</p>`,
};
