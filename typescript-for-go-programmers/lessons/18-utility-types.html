<div id="app"></div>
<script>
const LESSON = {
  number: 18,
  title: "Utility Types",

  intro: `
<p>Every Go service grows a family of shadow structs around each real one.
The PATCH endpoint needs a <code>UserPatch</code> where every field is a
pointer — <code>*string</code>, <code>*bool</code> — so <code>nil</code> can
mean "not provided" (and so <code>nil</code> now ambiguously means both
"absent" and, for pointer-typed fields, maybe "set to nothing"). The list
endpoint needs a hand-written <code>UserSummary</code> with two fields copied
out. Or you give up and sling <code>map[string]interface{}</code>. Each shadow
struct is real code that drifts when <code>User</code> changes.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>UserPatch</code> struct, every field a pointer (<code>*string</code>)</td><td><code>Partial&lt;User&gt;</code> — every field optional, derived on the spot</td></tr>
  <tr><td>Hand-written <code>UserSummary</code> view struct</td><td><code>Pick&lt;User, "id" | "name"&gt;</code> (or <code>Omit&lt;User, "email"&gt;</code>)</td></tr>
  <tr><td><code>map[string]interface{}</code> — no checking at all</td><td>Still typed: <code>Partial&lt;User&gt;</code> rejects unknown keys and wrong types</td></tr>
  <tr><td>Immutability by discipline and copying</td><td><code>Readonly&lt;User&gt;</code> — writes are compile errors</td></tr>
</table>
<p>TypeScript <em>derives</em> these shapes instead. <code>Partial&lt;User&gt;</code>
is <code>User</code> with every field optional — the patch struct with no
pointers and no nil ambiguity, because "absent" is simply the key not being
there. <code>Pick</code> and <code>Omit</code> carve views by naming keys, and
<code>Readonly</code> freezes a shape at compile time. Zero extra
declarations, and when <code>User</code> gains a field, every derived type
updates itself. Applying a patch is one expression: spread the original, then
spread the changes — <code>{ ...user, ...changes }</code> — later keys win,
and you get a fresh object instead of mutating the input.</p>`,

  go: `// The shadow-struct tax: one real type, two hand-maintained copies.
type User struct {
	ID     int
	Name   string
	Email  string
	Active bool
}

type UserPatch struct { // every field a pointer: nil = "not provided"
	Name   *string
	Email  *string
	Active *bool
}

func UpdateUser(u User, p UserPatch) User {
	if p.Name != nil {
		u.Name = *p.Name
	}
	if p.Email != nil {
		u.Email = *p.Email
	}
	if p.Active != nil {
		u.Active = *p.Active
	}
	return u
}

type UserSummary struct { // the list-endpoint view, copied by hand
	ID   int
	Name string
}`,

  task: `
<p>Replace all three Go structs with one interface and two derived types:</p>
<ol>
  <li>Keep the <code>User</code> interface (<code>id</code>,
      <code>name</code>, <code>email</code>, <code>active</code>) — it is the
      only shape you declare.</li>
  <li>Write <code>updateUser(user: User, changes: Partial&lt;User&gt;): User</code>
      that returns a <em>new</em> user with the changes applied, via object
      spread: <code>{ ...user, ...changes }</code>. Do not mutate
      <code>user</code> — the tests check.</li>
  <li>Write <code>toSummary(user: User): Pick&lt;User, "id" | "name"&gt;</code>
      returning an object with exactly those two fields — the
      <code>UserSummary</code> you no longer hand-write.</li>
</ol>
<p>Notice what the pointer dance in Go's <code>UpdateUser</code> collapses to:
an absent key in <code>changes</code> simply is not spread, so the original
field survives. No <code>nil</code> checks, no dereferences.</p>`,

  starter: `interface User {
  id: number;
  name: string;
  email: string;
  active: boolean;
}

// 2. TODO: type changes as Partial<User> — the pointer-field patch
//    struct, derived for free. Apply it with { ...user, ...changes }
//    and return the new object (do not mutate user).
function updateUser(user: User, changes: {}): User {
  return user;
}

// 3. TODO: return type Pick<User, "id" | "name"> — the hand-written
//    UserSummary struct, replaced by naming two keys.
function toSummary(user: User) {
  return user;
}
`,

  exportNames: ["updateUser", "toSummary"],

  requirements: [
    { pattern: /Partial\s*<\s*User\s*>/, message: "Type the changes parameter as Partial<User> — the derived patch shape" },
    { pattern: /(Pick|Omit)\s*</, message: "Derive the summary view with Pick (or Omit) instead of a hand-written type" },
    { pattern: /\{\s*\.\.\.\w+\s*,\s*\.\.\.\w+\s*\}/, message: "Apply the patch with a double spread: { ...user, ...changes }" },
  ],

  tests: [
    { name: "updateUser applies provided fields and keeps the rest", run: (x) => {
        const u = { id: 1, name: "Ada", email: "ada@example.com", active: true };
        const r = x.updateUser(u, { name: "Grace", active: false });
        expectEqual(r.name, "Grace");
        expectEqual(r.active, false);
        expectEqual(r.email, "ada@example.com");
        expectEqual(r.id, 1);
      } },
    { name: "updateUser does not mutate the original user", run: (x) => {
        const u = { id: 1, name: "Ada", email: "ada@example.com", active: true };
        x.updateUser(u, { name: "Grace" });
        expectEqual(u.name, "Ada");
        expectEqual(u.active, true);
      } },
    { name: "updateUser with an empty patch returns an equal (fresh) user", run: (x) => {
        const u = { id: 7, name: "Rob", email: "rob@example.com", active: false };
        const r = x.updateUser(u, {});
        expectDeepEqual(r, u);
        expectEqual(r === u, false);
      } },
    { name: "toSummary keeps id and name, field by field", run: (x) => {
        const s = x.toSummary({ id: 2, name: "Ken", email: "ken@example.com", active: true });
        expectEqual(s.id, 2);
        expectEqual(s.name, "Ken");
      } },
    { name: "toSummary drops email and active — exactly two keys remain", run: (x) => {
        const s = x.toSummary({ id: 2, name: "Ken", email: "ken@example.com", active: true });
        expectEqual("email" in s, false);
        expectEqual("active" in s, false);
        expectEqual(Object.keys(s).length, 2);
      } },
  ],

  solution: `interface User {
  id: number;
  name: string;
  email: string;
  active: boolean;
}

// Partial<User>: every field optional. The UserPatch struct, derived —
// no pointers, no nil ambiguity: absent means "key not present".
function updateUser(user: User, changes: Partial<User>): User {
  // Spread the original, then the changes; later keys win.
  return { ...user, ...changes };
}

// Pick<User, "id" | "name">: the UserSummary view, named not copied.
function toSummary(user: User): Pick<User, "id" | "name"> {
  return { id: user.id, name: user.name };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Patch shape</td><td>Struct of pointers (<code>*string</code>, nil = absent)</td><td><code>Partial&lt;T&gt;</code> — all fields optional</td></tr>
  <tr><td>View shape</td><td>Hand-written summary struct + copy code</td><td><code>Pick&lt;T, "k1" | "k2"&gt;</code> / <code>Omit&lt;T, "k3"&gt;</code></td></tr>
  <tr><td>Immutable shape</td><td>Discipline, or copy-on-write by hand</td><td><code>Readonly&lt;T&gt;</code> — assignment is a compile error</td></tr>
  <tr><td>All fields required again</td><td>n/a (write another struct)</td><td><code>Required&lt;T&gt;</code></td></tr>
  <tr><td>Typed map</td><td><code>map[string]User</code></td><td><code>Record&lt;string, User&gt;</code></td></tr>
  <tr><td>Applying a patch</td><td>One <code>if p.X != nil</code> per field</td><td><code>{ ...user, ...changes }</code></td></tr>
</table>
<p>The insight: Go types are things you <em>write</em>; TypeScript types are
also things you <em>compute</em>. <code>Partial</code>, <code>Pick</code>,
and friends are ordinary generic types running over the keys of another type,
so the derived shapes can never drift from the source the way a
<code>UserPatch</code> drifts from <code>User</code>. Rename a field on
<code>User</code> and every <code>Pick</code> that names the old key fails to
compile — the shadow structs are gone, and so is the class of bug where one
of them was three fields behind.</p>`,
};
</script>
