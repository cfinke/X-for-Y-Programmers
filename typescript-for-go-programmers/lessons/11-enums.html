<title>Lesson 11: Enums & Literal Types</title>
<link rel="stylesheet" href="../../shared/css/style.css">
</head>
<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 11,
  title: "Enums & Literal Types",

  intro: `
<p>Go does not have enums — it has a convention. You declare a named integer
type, stamp out constants with <code>iota</code>, and then hand-write a
<code>String()</code> method so the values print as something other than
<code>0</code>, <code>1</code>, <code>2</code>. And after all that ceremony the
compiler still lets <code>Status(42)</code> through, because any
<code>int</code> converts to <code>Status</code>. The set was never actually
closed.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>type Status int</code> + <code>iota</code> const block</td><td><code>enum OrderStatus { Pending = "pending", ... }</code></td></tr>
  <tr><td>Hand-written <code>String()</code> method</td><td>Unnecessary — the value <em>is</em> the label</td></tr>
  <tr><td><code>Status(42)</code> compiles fine</td><td>Anything outside the set is a compile error</td></tr>
  <tr><td>No lightweight option</td><td><code>type Speed = "standard" | "express"</code></td></tr>
</table>
<p>TypeScript gives you two real tools. A <em>string enum</em> is a runtime
object whose members carry their label as their value — printing one gives you
<code>"pending"</code>, no <code>String()</code> method required. A
<em>literal union</em> like <code>"standard" | "express" | "overnight"</code>
is even lighter: just plain strings, but the compiler rejects any string not
in the list, and a <code>switch</code> over one is checked for exhaustiveness.
Both are genuinely closed sets — the thing the iota pattern only gestures
at.</p>`,

  go: `type Status int

const (
	Pending Status = iota // 0
	Shipped               // 1
	Delivered             // 2
)

func (s Status) String() string {
	switch s {
	case Pending:
		return "pending"
	case Shipped:
		return "shipped"
	case Delivered:
		return "delivered"
	}
	return "unknown"
}

var oops Status = 42 // compiles — any int converts to Status`,

  task: `
<p>Replace the iota-plus-String() pattern with types that enforce the set:</p>
<ol>
  <li>Declare a string enum <code>OrderStatus</code> with members
      <code>Pending = "pending"</code>, <code>Shipped = "shipped"</code>, and
      <code>Delivered = "delivered"</code>.</li>
  <li>Declare a literal-union type alias <code>ShippingSpeed</code> that is
      exactly <code>"standard" | "express" | "overnight"</code>.</li>
  <li>Write <code>statusLabel(status: OrderStatus): string</code> returning
      <code>"Order is pending"</code> (etc.). No <code>String()</code> method,
      no switch — the enum's value is already the label.</li>
  <li>Write <code>shippingCost(speed: ShippingSpeed): number</code> with a
      <code>switch</code>: <code>"standard"</code> costs <code>0</code>,
      <code>"express"</code> costs <code>10</code>,
      <code>"overnight"</code> costs <code>25</code>.</li>
</ol>
<p>Try calling <code>shippingCost("priority")</code> — the compiler rejects
it. That is the closed set Go's named-int pattern never gave you.</p>`,

  starter: `// 1. TODO: declare a string enum OrderStatus with members
//    Pending = "pending", Shipped = "shipped", Delivered = "delivered".
//    Go needed iota plus a String() method; here the value IS the label.
enum OrderStatus {
  Pending = "pending",
  // TODO: add Shipped and Delivered
}

// 2. TODO: widen this alias to the full union:
//    "standard" | "express" | "overnight"
type ShippingSpeed = "standard";

// 3. TODO: return "Order is <status>" — status already holds the label.
function statusLabel(status: OrderStatus): string {
  return "";
}

// 4. TODO: switch on speed: "standard" -> 0, "express" -> 10, "overnight" -> 25.
//    The compiler knows these three strings are the only possibilities.
function shippingCost(speed: ShippingSpeed): number {
  return 0;
}
`,

  exportNames: ["OrderStatus", "statusLabel", "shippingCost"],

  requirements: [
    { pattern: /enum\s+OrderStatus/, message: "Declare an enum named OrderStatus" },
    { pattern: /Pending\s*=\s*"pending"/, message: "Give the enum members explicit string values (Pending = \"pending\", ...)" },
    { pattern: /"\w+"\s*\|\s*"/, message: "Declare ShippingSpeed as a union of string literals (\"standard\" | \"express\" | ...)" },
  ],

  tests: [
    { name: 'OrderStatus.Pending is "pending" — the value is the label', run: (x) => expectEqual(x.OrderStatus.Pending, "pending") },
    { name: "OrderStatus has Shipped and Delivered members", run: (x) => { expectEqual(x.OrderStatus.Shipped, "shipped"); expectEqual(x.OrderStatus.Delivered, "delivered"); } },
    { name: 'statusLabel(OrderStatus.Pending) returns "Order is pending"', run: (x) => expectEqual(x.statusLabel(x.OrderStatus.Pending), "Order is pending") },
    { name: 'statusLabel(OrderStatus.Delivered) returns "Order is delivered"', run: (x) => expectEqual(x.statusLabel(x.OrderStatus.Delivered), "Order is delivered") },
    { name: 'shippingCost: "standard" is 0, "express" is 10', run: (x) => { expectEqual(x.shippingCost("standard"), 0); expectEqual(x.shippingCost("express"), 10); } },
    { name: 'shippingCost("overnight") is 25', run: (x) => expectEqual(x.shippingCost("overnight"), 25) },
  ],

  solution: `enum OrderStatus {
  Pending = "pending",
  Shipped = "shipped",
  Delivered = "delivered",
}

type ShippingSpeed = "standard" | "express" | "overnight";

function statusLabel(status: OrderStatus): string {
  return "Order is " + status;
}

function shippingCost(speed: ShippingSpeed): number {
  switch (speed) {
    case "standard":
      return 0;
    case "express":
      return 10;
    case "overnight":
      return 25;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Enumerated type</td><td><code>type Status int</code> + <code>iota</code> const block</td><td><code>enum OrderStatus { Pending = "pending" }</code></td></tr>
  <tr><td>Printable name</td><td>Hand-written <code>String()</code> (or stringer codegen)</td><td>Free — the member's value is the label</td></tr>
  <tr><td>Lightweight set</td><td>—</td><td><code>type Speed = "standard" | "express"</code></td></tr>
  <tr><td>Out-of-range value</td><td><code>Status(42)</code> compiles</td><td>Compile error</td></tr>
  <tr><td>Runtime cost</td><td>Constants</td><td>Enum: small object; literal union: none (erased)</td></tr>
</table>
<p>The practical split: reach for a literal union first — it is the idiomatic
TypeScript default, costs nothing at runtime, and plain strings like
<code>"express"</code> flow through JSON untouched. Use an <code>enum</code>
when you want a runtime object to iterate or a single place to rename a value.
Note the asymmetry with Go: an enum survives compilation (it is a real
object, which is why the tests can see it), while a type alias is erased —
<code>ShippingSpeed</code> exists only for the compiler, exactly like every
other type annotation you have written so far.</p>`,
};
</script>
