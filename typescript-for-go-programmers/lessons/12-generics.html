<div id="app"></div>
<script>
const LESSON = {
  number: 12,
  title: "Generics",

  intro: `
<p>You waited over a decade for <code>func First[T any](s []T)</code>.
TypeScript had it all along — same idea, angle brackets instead of square
ones: <code>function firstItem&lt;T&gt;(items: T[]): T | undefined</code>.
The mapping is direct: <code>[T any]</code> becomes <code>&lt;T&gt;</code>,
and a constraint interface like <code>constraints.Ordered</code> becomes an
<code>extends</code> bound. Everything you learned about type parameters in
Go 1.18 transfers; inference works the same way, so call sites stay clean:
<code>firstItem([1, 2, 3])</code> just works.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>func First[T any](s []T) (T, bool)</code></td><td><code>function firstItem&lt;T&gt;(items: T[]): T | undefined</code></td></tr>
  <tr><td><code>[T constraints.Ordered]</code></td><td><code>&lt;T extends number | string&gt;</code></td></tr>
  <tr><td><code>[K comparable]</code></td><td><code>&lt;K extends keyof T&gt;</code> — and far more</td></tr>
  <tr><td>"K is a field name of T"</td><td><code>keyof</code> — inexpressible in Go</td></tr>
</table>
<p>Then TypeScript keeps going where Go stops. <code>keyof T</code> is the
union of a type's property names, so <code>&lt;T, K extends keyof T&gt;</code>
says "K must be an actual field of T" — and the return type
<code>T[K]</code> is <em>the type of that field</em>. Pass a
<code>Product[]</code> and <code>"price"</code>, get <code>number[]</code>
back; misspell the key and it will not compile. In Go the equivalent
<code>Pluck</code> degrades to <code>map[string]any</code> and hands the type
information back to you at runtime, if you are lucky.</p>`,

  go: `// Since Go 1.18:
func First[T any](s []T) (T, bool) {
	var zero T
	if len(s) == 0 {
		return zero, false
	}
	return s[0], true
}

func Max[T constraints.Ordered](a, b T) T {
	if a > b {
		return a
	}
	return b
}

// But "key must be a field of T" is not expressible.
// The honest Go version gives up on types entirely:
func Pluck(items []map[string]any, key string) []any {
	out := make([]any, 0, len(items))
	for _, it := range items {
		out = append(out, it[key]) // any — type info gone
	}
	return out
}`,

  task: `
<p>Port the generic helpers, then write the one Go can't have:</p>
<ol>
  <li>Write <code>firstItem&lt;T&gt;(items: T[]): T | undefined</code>
      returning the first element, or <code>undefined</code> for an empty
      array. Where Go returns <code>(T, bool)</code>, TypeScript folds the
      "ok" into the return type.</li>
  <li>Write <code>pluck&lt;T, K extends keyof T&gt;(items: T[], key: K): T[K][]</code>
      returning the value of <code>key</code> from every item (a one-line
      <code>.map</code>). The <code>extends keyof T</code> bound means a typo
      in the key is a compile error, and the element type of the result is
      whatever type that field has.</li>
</ol>
<p>Note what you did <em>not</em> write: any type assertions, any
<code>any</code>. Try <code>pluck(products, "prise")</code> — the compiler
catches the typo that Go's version would return as a slice of nils.</p>`,

  starter: `// 1. TODO: make firstItem generic.
//    Go:  func First[T any](s []T) (T, bool)
//    TS:  function firstItem<T>(items: T[]): T | undefined
//    Square brackets become angle brackets; the ok-bool folds into the type.
function firstItem(items: any[]): any {
  // TODO: return the first element, or undefined for an empty array
  return undefined;
}

// 2. TODO: pluck<T, K extends keyof T>(items: T[], key: K): T[K][]
//    "K extends keyof T" is the constraint Go cannot express:
//    key must name a real field of T, and T[K] is that field's type.
function pluck(items: any[], key: string): any[] {
  // TODO: map each item to item[key]
  return [];
}
`,

  exportNames: ["firstItem", "pluck"],

  requirements: [
    { pattern: /<T\b/, message: "Declare a type parameter with angle brackets: firstItem<T>(...)" },
    { pattern: /:\s*T\s*\|\s*undefined/, message: "firstItem's return type should be T | undefined — the (T, bool) pair folded into one type" },
    { pattern: /extends\s+keyof/, message: "Constrain pluck's key with K extends keyof T" },
  ],

  tests: [
    { name: "firstItem([10, 20, 30]) returns 10", run: (x) => expectEqual(x.firstItem([10, 20, 30]), 10) },
    { name: "firstItem([]) returns undefined — no zero value invented", run: (x) => expectEqual(x.firstItem([]), undefined) },
    { name: 'firstItem(["go", "ts"]) works for any T', run: (x) => expectEqual(x.firstItem(["go", "ts"]), "go") },
    { name: 'pluck(products, "name") returns the names', run: (x) => expectDeepEqual(x.pluck([{ name: "Mouse", price: 25 }, { name: "Keyboard", price: 90 }], "name"), ["Mouse", "Keyboard"]) },
    { name: 'pluck(products, "price") returns the prices', run: (x) => expectDeepEqual(x.pluck([{ name: "Mouse", price: 25 }, { name: "Keyboard", price: 90 }], "price"), [25, 90]) },
  ],

  solution: `function firstItem<T>(items: T[]): T | undefined {
  return items.length > 0 ? items[0] : undefined;
}

function pluck<T, K extends keyof T>(items: T[], key: K): T[K][] {
  return items.map((item) => item[key]);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Type parameter</td><td><code>func F[T any](s []T)</code></td><td><code>function f&lt;T&gt;(s: T[])</code></td></tr>
  <tr><td>Constraint</td><td><code>[T constraints.Ordered]</code></td><td><code>&lt;T extends number | string&gt;</code></td></tr>
  <tr><td>Constraint definition</td><td>Interface with a type set</td><td>Any type after <code>extends</code>, including unions</td></tr>
  <tr><td>"Not found" result</td><td><code>(T, bool)</code> with a zero value</td><td><code>T | undefined</code></td></tr>
  <tr><td>Field-name parameter</td><td>Inexpressible — fall back to <code>any</code></td><td><code>K extends keyof T</code>, result typed <code>T[K]</code></td></tr>
  <tr><td>Generic instantiation</td><td>Inferred, or <code>F[int](s)</code></td><td>Inferred, or <code>f&lt;number&gt;(s)</code></td></tr>
</table>
<p>The philosophical difference: Go's generics are deliberately minimal —
type parameters constrained by method sets and type lists, full stop.
TypeScript's type parameters plug into the whole type system:
<code>keyof</code>, unions, conditional types, literal types. That is how the
standard library types things like <code>Object.keys</code> and how every
ORM gives you typed column access. When a TypeScript signature looks
baroque, read it the way you read a Go constraint interface: it is a
machine-checked sentence about what the caller may pass.</p>`,
};
