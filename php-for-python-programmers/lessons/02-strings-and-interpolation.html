  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>Python interpolates nowhere without the <code>f</code> prefix. PHP flips
that default: <em>double-quoted</em> strings always interpolate —
<code>"$name is $age"</code> just works — while <em>single-quoted</em> strings
are literal, like Python's plain non-f strings. So the quote character you
pick is the f-prefix decision. For expressions beyond a bare variable, wrap
them in braces: <code>"{$user-&gt;name}"</code>.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>f"{name} is {age}"</code></td><td><code>"$name is $age"</code></td></tr>
  <tr><td><code>"a" + "b"</code></td><td><code>'a' . 'b'</code> (dot, not plus)</td></tr>
  <tr><td><code>s.upper()</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td><code>"x" in s</code></td><td><code>str_contains($haystack, $needle)</code></td></tr>
  <tr><td><code>len(s)</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td><code>", ".join(words)</code></td><td><code>implode(", ", $words)</code></td></tr>
</table>
<p>The other shift: strings aren't objects with methods. Where Python writes
<code>s.upper()</code>, PHP calls a free function from the <code>str_*</code>
toolbox: <code>strtoupper($s)</code>, <code>strlen($s)</code>,
<code>str_contains($h, $n)</code>. Concatenation uses <code>.</code> instead
of <code>+</code> (PHP's <code>+</code> is strictly arithmetic on strings —
it would try to add them as numbers). And watch <code>implode</code>: it's
<code>join</code> with the argument order flipped — separator first, array
second, both arguments to one function instead of a method on the
separator.</p>`,

  python: `def shout(s: str) -> str:
    return s.upper() + "!"

def greet(name: str, city: str) -> str:
    return f"{name} lives in {city}"

def contains_word(haystack: str, needle: str) -> bool:
    return needle in haystack

def join_words(words: list[str]) -> str:
    return ", ".join(words)

print(shout("hey"))                    # HEY!
print(greet("Ada", "London"))          # Ada lives in London
print(len("hello"))                    # 5 -- PHP: strlen("hello")
print(join_words(["a", "b", "c"]))     # a, b, c`,

  task: `
<p>Port each helper to PHP:</p>
<ol>
  <li><code>shout(string $s): string</code> — uppercase the input with
      <code>strtoupper</code> and append <code>"!"</code> using the

  <li><code>greet(string $name, string $city): string</code> — return

      interpolation (no <code>f</code> prefix exists or is needed).</li>
  <li><code>contains_word(string $haystack, string $needle): bool</code> —

      <code>str_contains($haystack, $needle)</code>.</li>
  <li><code>join_words(array $words): string</code> — join with
      <code>", "</code> using <code>implode</code>. Remember: separator
      first, array second.</li>
</ol>`,

  starter: `<?php

  requirements: [
    { pattern: /"\$\w+|\{\$\w+/, message: "Use double-quote interpolation in greet" },
    { pattern: /strtoupper/, message: "Use strtoupper in shout" },
    { pattern: /str_contains/, message: "Use str_contains in contains_word" },

  ],

  tests: [
    { name: 'shout("hey") returns "HEY!"',
      code: 'expect_eq(shout("hey"), "HEY!");' },
    { name: 'greet("Ada", "London") returns "Ada lives in London"',
      code: 'expect_eq(greet("Ada", "London"), "Ada lives in London");' },
    { name: 'contains_word("hello world", "world") is true',
      code: 'expect_true(contains_word("hello world", "world"));' },
    { name: 'contains_word("hello world", "mars") is false',
      code: 'expect_eq(contains_word("hello world", "mars"), false);' },
    { name: 'join_words(["a", "b", "c"]) returns "a, b, c"',
      code: 'expect_eq(join_words(["a", "b", "c"]), "a, b, c");' },
  ],

  solution: `<?php

function shout(string $s): string {
    return strtoupper($s) . "!";
}

function greet(string $name, string $city): string {
    return "$name lives in $city";
}

function contains_word(string $haystack, string $needle): bool {
    return str_contains($haystack, $needle);
}

function join_words(array $words): string {
    return implode(", ", $words);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Interpolating string</td><td><code>f"{name}"</code></td><td><code>"$name"</code> (double quotes)</td></tr>
  <tr><td>Literal string</td><td><code>"plain"</code></td><td><code>'plain'</code> (single quotes)</td></tr>
  <tr><td>Concatenation</td><td><code>+</code></td><td><code>.</code></td></tr>
  <tr><td>Uppercase</td><td><code>s.upper()</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td>Substring test</td><td><code>"x" in s</code></td><td><code>str_contains($s, "x")</code></td></tr>
  <tr><td>Length</td><td><code>len(s)</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td>Join</td><td><code>", ".join(words)</code></td><td><code>implode(", ", $words)</code></td></tr>
  <tr><td>Split</td><td><code>s.split(",")</code></td><td><code>explode(",", $s)</code></td></tr>
</table>
<p>The mental model: PHP strings are values handled by a library of free
functions, not objects with methods — so muscle-memory chains like
<code>s.strip().upper()</code> become nested calls,
<code>strtoupper(trim($s))</code>. The interpolation defaults are mirror
images: Python never interpolates without <code>f</code>; PHP always does in
double quotes. Reach for single quotes when you <em>don't</em> want a
<code>$</code> treated specially.</p>`,
