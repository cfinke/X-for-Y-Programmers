const LESSON = {
  number: 3,
  title: "Arrays as Lists",

  intro: `
<p>PHP merges Python's <code>list</code> and <code>dict</code> into a single
type: the <em>array</em>. This lesson covers the list half. The literal is
identical — <code>[1, 2, 3]</code> — and indexing works as you expect, but
the operations move from methods to free functions, and one of them hides a
trap: <code>array_slice</code> takes a <em>length</em>, not an end index.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>nums = [1, 2, 3]</code></td><td><code>$nums = [1, 2, 3];</code></td></tr>
  <tr><td><code>nums.append(x)</code></td><td><code>$nums[] = $x;</code></td></tr>
  <tr><td><code>len(nums)</code></td><td><code>count($nums)</code></td></tr>
  <tr><td><code>x in nums</code></td><td><code>in_array($x, $nums, true)</code></td></tr>
  <tr><td><code>nums[1:3]</code></td><td><code>array_slice($nums, 1, 2)</code> — length 2, not end 3!</td></tr>
  <tr><td><code>sum(nums)</code></td><td><code>array_sum($nums)</code></td></tr>
</table>
<p>The deep difference is passing behavior. Python lists are references:
hand one to a function, and an <code>append</code> inside mutates the
caller's list. PHP arrays are <em>values</em> (copy-on-write): a function
receives its own logical copy, and nothing it does can surprise-mutate your
variable. So the idiomatic PHP shape for "add to a list" is to modify the
local copy and <em>return it</em> — the exercise below makes you feel this
difference directly.</p>`,

  python: `def make_scores() -> list[int]:
    return [86, 92, 74]

def append(arr: list[int], x: int) -> list[int]:
    arr.append(x)   # mutates the CALLER's list too!
    return arr

def total(nums: list[int]) -> int:
    return sum(nums)

scores = make_scores()
append(scores, 99)
print(len(scores))       # 4 -- the caller's list grew
print(scores[0:2])       # [86, 92] -- slice by end index
print(total(scores))     # 351`,

  task: `
<p>Port the list helpers to PHP:</p>
<ol>
  <li><code>make_scores(): array</code> — return the literal
      <code>[86, 92, 74]</code>. Same syntax as Python; the return type is
      just <code>array</code> (no element type in the declaration).</li>
  <li><code>append(array $arr, int $x): array</code> — push <code>$x</code>
      onto the array with the <code>$arr[] = $x;</code> idiom and return the
      result. Because arrays are values, the caller's original is untouched
      — you're returning the modified copy, and a test checks exactly
      that.</li>
  <li><code>total(array $nums): int</code> — Python's <code>sum()</code> is
      <code>array_sum()</code>.</li>
</ol>`,

  starter: `<?php

// 1. Same literal as Python: [86, 92, 74]
function make_scores(): array {
    throw new Exception("TODO: implement make_scores");
}

// 2. arr.append(x)  ->  $arr[] = $x;  then return $arr.
//    (Value semantics: the caller's array is NOT modified.)
function append(array $arr, int $x): array {
    throw new Exception("TODO: implement append");
}

// 3. sum(nums)  ->  array_sum($nums)
function total(array $nums): int {
    throw new Exception("TODO: implement total");
}
`,

  requirements: [
    { pattern: /\[\]\s*=/, message: "Use the $arr[] = $x append idiom" },
    { pattern: /count\(|array_sum\(/, message: "Use count() or array_sum() instead of len()/sum()" },
    { pattern: /:\s*array/, message: "Declare : array return types" },
  ],

  tests: [
    { name: "make_scores() returns [86, 92, 74]",
      code: "expect_eq(make_scores(), [86, 92, 74]);" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "expect_eq(append([1, 2], 3), [1, 2, 3]);" },
    { name: "append does not mutate the caller's array (value semantics)",
      code: "$original = [1, 2];\n$grown = append($original, 3);\nexpect_eq($grown, [1, 2, 3]);\nexpect_eq($original, [1, 2]);" },
    { name: "total([86, 92, 74]) returns 252",
      code: "expect_eq(total([86, 92, 74]), 252);" },
    { name: "total([]) returns 0",
      code: "expect_eq(total([]), 0);" },
  ],

  solution: `<?php

function make_scores(): array {
    return [86, 92, 74];
}

function append(array $arr, int $x): array {
    $arr[] = $x;
    return $arr;
}

function total(array $nums): int {
    return array_sum($nums);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Literal</td><td><code>[1, 2, 3]</code></td><td><code>[1, 2, 3]</code> — identical</td></tr>
  <tr><td>Append</td><td><code>nums.append(x)</code></td><td><code>$nums[] = $x;</code></td></tr>
  <tr><td>Length</td><td><code>len(nums)</code></td><td><code>count($nums)</code></td></tr>
  <tr><td>Membership</td><td><code>x in nums</code></td><td><code>in_array($x, $nums, true)</code></td></tr>
  <tr><td>Slice</td><td><code>nums[1:3]</code> (end index)</td><td><code>array_slice($nums, 1, 2)</code> (length)</td></tr>
  <tr><td>Sum</td><td><code>sum(nums)</code></td><td><code>array_sum($nums)</code></td></tr>
  <tr><td>Passing</td><td>reference — callee can mutate</td><td>value (copy-on-write) — callee cannot</td></tr>
</table>
<p>Two things to internalize. First, <code>array_slice($nums, 1, 2)</code>'s
third argument is <em>how many</em> elements, where Python's
<code>nums[1:3]</code> says where to <em>stop</em> — off-by-one bugs live
here. Second, always pass <code>true</code> as <code>in_array</code>'s third
argument for a strict comparison; without it, PHP's loose <code>==</code>
rules apply (a later lesson covers why that matters). The value semantics,
meanwhile, are a quiet upgrade: no more defensive
<code>list(nums)</code> copies before handing data to someone else's
function.</p>`,
};
