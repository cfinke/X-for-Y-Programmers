const LESSON = {
  number: 10,
  title: "Interfaces, Inheritance & Abstracts",

  intro: `
<p>Inheritance gets a keyword: <code>class Circle(Shape)</code> becomes
<code>class Circle extends Shape</code>. But it's <em>single</em>
inheritance only — one parent, no MRO, no diamonds, no
<code>class C(A, B)</code>. Where Python mixes in extra base classes, PHP
reaches for interfaces (this lesson) and traits (lesson 12). Calling up the
chain drops <code>super()</code> for
<code>parent::__construct(...)</code>.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>class Circle(Shape):</code></td><td><code>class Circle extends Shape</code></td></tr>
  <tr><td><code>class Shape(ABC):</code></td><td><code>abstract class Shape</code></td></tr>
  <tr><td><code>@abstractmethod</code></td><td><code>abstract public function area(): float;</code></td></tr>
  <tr><td><code>super().__init__(x)</code></td><td><code>parent::__construct($x);</code></td></tr>
  <tr><td><code>class C(A, B):</code> (multiple)</td><td>one <code>extends</code> + many <code>implements</code></td></tr>
  <tr><td><code>Protocol</code> (structural)</td><td>no equivalent — <code>interface</code> is nominal</td></tr>
</table>
<p><code>abc.ABC</code> plus <code>@abstractmethod</code> maps to a
first-class construct: <code>abstract class</code> with
<code>abstract public function area(): float;</code> — declarative, no
decorator, no metaclass, and just like ABCs you can't instantiate one or
skip implementing its abstract methods. Interfaces
(<code>interface HasArea { public function area(): float; }</code> …
<code>class Circle implements HasArea</code>) are pure method contracts —
but note there is no <code>Protocol</code> equivalent: PHP typing is
<em>nominal</em>, so a class only satisfies an interface if it says
<code>implements</code>, no matter how perfectly its methods happen to
match.</p>`,

  python: `from abc import ABC, abstractmethod
import math

class Shape(ABC):
    @abstractmethod
    def area(self) -> float: ...

    def describe(self) -> str:            # concrete, uses the abstract method
        return f"shape with area {self.area()}"

class Circle(Shape):
    def __init__(self, radius: float):
        self.radius = radius

    def area(self) -> float:
        return math.pi * self.radius ** 2

class Rectangle(Shape):
    def __init__(self, width: float, height: float):
        self.width = width

    def area(self) -> float:
        return self.width * self.height`,

  task: `
<p>Port the shape hierarchy (the Python <code>Rectangle</code> has a bug —
it forgot to store <code>height</code>; don't copy it):</p>
<ol>
  <li><code>abstract class Shape</code> declaring
      <code>abstract public function area(): float;</code> plus a
      <em>concrete</em> <code>describe(): string</code> that returns
      <code>"shape with area "</code> followed by <code>$this-&gt;area()</code>
      — the template-method pattern, same as your ABC.</li>
  <li><code>class Circle extends Shape</code> with a promoted
      <code>float $radius</code>; <code>area()</code> returns
      <code>M_PI * $this-&gt;radius ** 2</code> (PHP has <code>**</code> too;
      <code>M_PI</code> is <code>math.pi</code>).</li>
  <li><code>class Rectangle extends Shape</code> with promoted
      <code>float $width</code> and <code>float $height</code>;
      <code>area()</code> multiplies them.</li>
</ol>`,

  starter: `<?php

// The abstract method has NO body — subclasses must provide one,
// enforced at parse time (no metaclass magic needed).
abstract class Shape {
    abstract public function area(): float;

    // Concrete method calling the abstract one, like your ABC template.
    public function describe(): string {
        throw new Exception("TODO: return 'shape with area ' . \$this->area()");
    }
}

class Circle extends Shape {
    public function __construct(private float $radius) {}

    public function area(): float {
        throw new Exception("TODO: M_PI * radius ** 2");
    }
}

class Rectangle extends Shape {
    public function __construct(private float $width, private float $height) {}

    public function area(): float {
        throw new Exception("TODO: width * height");
    }
}
`,

  requirements: [
    { pattern: /abstract\s+class\s+Shape/, message: "Declare Shape as an abstract class" },
    { pattern: /extends\s+Shape/, message: "Circle and Rectangle must extend Shape" },
    { pattern: /abstract\s+(public\s+)?function\s+area/, message: "Declare area() as an abstract function (no body) in Shape" },
  ],

  tests: [
    { name: 'a unit circle has area pi: round(area(), 2) === 3.14',
      code: '$c = new Circle(1.0); expect_eq(round($c->area(), 2), 3.14);' },
    { name: 'Circle(2.0) area rounds to 12.57',
      code: 'expect_eq(round((new Circle(2.0))->area(), 2), 12.57);' },
    { name: 'Rectangle(3.0, 4.0) area is exactly 12.0',
      code: 'expect_eq((new Rectangle(3.0, 4.0))->area(), 12.0);' },
    { name: 'the inherited describe() uses the subclass area()',
      code: 'expect_eq((new Rectangle(2.0, 3.0))->describe(), "shape with area 6");' },
    { name: 'shapes are polymorphic through the abstract base',
      code: '$shapes = [new Circle(1.0), new Rectangle(2.0, 2.0)]; expect_true($shapes[0] instanceof Shape); $total = 0.0; foreach ($shapes as $s) { $total += $s->area(); } expect_eq(round($total, 2), 7.14);' },
  ],

  solution: `<?php

abstract class Shape {
    abstract public function area(): float;

    public function describe(): string {
        return "shape with area " . $this->area();
    }
}

class Circle extends Shape {
    public function __construct(private float $radius) {}

    public function area(): float {
        return M_PI * $this->radius ** 2;
    }
}

class Rectangle extends Shape {
    public function __construct(private float $width, private float $height) {}

    public function area(): float {
        return $this->width * $this->height;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Inherit</td><td><code>class Circle(Shape):</code></td><td><code>class Circle extends Shape</code></td></tr>
  <tr><td>Abstract base</td><td><code>class Shape(ABC):</code></td><td><code>abstract class Shape</code></td></tr>
  <tr><td>Abstract method</td><td><code>@abstractmethod def area(self): ...</code></td><td><code>abstract public function area(): float;</code></td></tr>
  <tr><td>Call parent ctor</td><td><code>super().__init__(x)</code></td><td><code>parent::__construct($x);</code></td></tr>
  <tr><td>Method contract</td><td><code>Protocol</code> (structural)</td><td><code>interface</code> + <code>implements</code> (nominal)</td></tr>
  <tr><td>Multiple parents</td><td><code>class C(A, B):</code> + MRO</td><td>impossible — one <code>extends</code>, many <code>implements</code></td></tr>
  <tr><td>Type test</td><td><code>isinstance(c, Shape)</code></td><td><code>$c instanceof Shape</code></td></tr>
</table>
<p>The division of labor: an <code>abstract class</code> is for shared
<em>implementation</em> plus required overrides (like your ABC with concrete
helpers), while an <code>interface</code> is a pure contract — method
signatures only, and a class may <code>implements</code> as many as it
likes, which is where Python's multiple inheritance use cases usually land.
Because interfaces are nominal rather than structural, PHP has nothing like
duck-typed <code>Protocol</code> conformance: if a function demands
<code>HasArea</code>, only classes that explicitly declared
<code>implements HasArea</code> get through, however quacky the rest.</p>`,
};
