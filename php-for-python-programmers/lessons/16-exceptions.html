const LESSON = {
  number: 16,
  title: "Exceptions & Error Handling",

  intro: `
<p>PHP exceptions are Python exceptions with the keywords swapped:
<code>try/except/finally</code> becomes <code>try/catch/finally</code>, and
<code>raise ValueError(...)</code> becomes
<code>throw new InvalidArgumentException(...)</code> — note the explicit
<code>new</code>; you always throw an instance, never a class. The caught
exception is bound with a type declaration instead of <code>as</code>:
<code>catch (ValueError $e)</code>. Python's tuple form
<code>except (A, B):</code> is a pipe in PHP: <code>catch (A | B $e)</code>.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>raise ValueError("bad")</code></td><td><code>throw new InvalidArgumentException("bad");</code></td></tr>
  <tr><td><code>except ValueError as e:</code></td><td><code>catch (InvalidArgumentException $e) {</code></td></tr>
  <tr><td><code>except (A, B) as e:</code></td><td><code>catch (A | B $e) {</code></td></tr>
  <tr><td><code>finally:</code></td><td><code>finally {</code></td></tr>
  <tr><td><code>class MyError(Exception):</code></td><td><code>class MyError extends Exception {}</code></td></tr>
</table>
<p>The hierarchy differs at the root. Python has <code>BaseException</code>
above <code>Exception</code>; PHP has the <code>Throwable</code> interface
with two branches: <code>Exception</code> for userland errors (subclass this
for your own types, exactly like subclassing <code>Exception</code> in
Python) and <code>Error</code> for engine-level failures —
<code>TypeError</code>, division by zero, bad property writes; think
<code>SyntaxError</code>/<code>MemoryError</code> territory. Catch
<code>Throwable</code> only when you truly mean "anything".</p>`,

  python: `def parse_age(s: str) -> int:
    s = s.strip()
    if not s.isdigit():
        raise ValueError(f"not a number: {s}")
    return int(s)

def safe_parse_age(s: str, default: int) -> int:
    try:
        return parse_age(s)
    except ValueError:
        return default

print(parse_age("42"))            # 42
print(safe_parse_age(" 7 ", 0))   # 7
print(safe_parse_age("abc", 18))  # 18 -- swallowed, default returned`,

  task: `
<p>Port the pair of parsers:</p>
<ol>
  <li><code>parse_age(string $s): int</code> — trim the input; if
      <code>ctype_digit(trim($s))</code> is false (PHP's
      <code>str.isdigit()</code>), <code>throw new
      InvalidArgumentException(...)</code> — that's PHP's
      <code>ValueError</code> for bad arguments. Otherwise cast with
      <code>(int)</code> and return.</li>
  <li><code>safe_parse_age(string $s, int $default): int</code> — call
      <code>parse_age</code> inside <code>try { ... }</code> and return
      <code>$default</code> from a
      <code>catch (InvalidArgumentException $e)</code> block. Same shape as
      the Python, keyword-swapped.</li>
</ol>`,

  starter: `<?php

// 1. raise ValueError(...)  ->  throw new InvalidArgumentException(...);
//    Check the digits with ctype_digit(trim($s)).
function parse_age(string $s): int {
    throw new Exception("TODO: implement parse_age");
}

// 2. try/except ValueError  ->  try { ... } catch (InvalidArgumentException $e) { ... }
function safe_parse_age(string $s, int $default): int {
    throw new Exception("TODO: implement safe_parse_age");
}
`,

  requirements: [
    { pattern: /InvalidArgumentException/, message: "Throw and catch InvalidArgumentException (PHP's ValueError for bad arguments)" },
    { pattern: /try\s*\{/, message: "Use a try block in safe_parse_age" },
    { pattern: /catch\s*\(/, message: "Use catch (…) — PHP's except" },
    { pattern: /throw\s+new/, message: "throw new — you always throw an instance" },
  ],

  tests: [
    { name: 'parse_age("42") returns int 42',
      code: 'expect_eq(parse_age("42"), 42);' },
    { name: 'parse_age(" 7 ") trims whitespace and returns 7',
      code: 'expect_eq(parse_age(" 7 "), 7);' },
    { name: 'parse_age("abc") throws InvalidArgumentException',
      code: 'try { parse_age("abc"); throw new Exception("did not throw"); } catch (InvalidArgumentException $e) {}' },
    { name: 'safe_parse_age("19", 0) returns 19',
      code: 'expect_eq(safe_parse_age("19", 0), 19);' },
    { name: 'safe_parse_age("abc", 18) returns the default 18',
      code: 'expect_eq(safe_parse_age("abc", 18), 18);' },
  ],

  solution: `<?php

function parse_age(string $s): int {
    $s = trim($s);
    if (!ctype_digit($s)) {
        throw new InvalidArgumentException("not a number: $s");
    }
    return (int) $s;
}

function safe_parse_age(string $s, int $default): int {
    try {
        return parse_age($s);
    } catch (InvalidArgumentException $e) {
        return $default;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Raise / throw</td><td><code>raise ValueError("x")</code></td><td><code>throw new InvalidArgumentException("x");</code></td></tr>
  <tr><td>Catch one type</td><td><code>except ValueError as e:</code></td><td><code>catch (InvalidArgumentException $e) {</code></td></tr>
  <tr><td>Catch several</td><td><code>except (A, B) as e:</code></td><td><code>catch (A | B $e) {</code></td></tr>
  <tr><td>Cleanup</td><td><code>finally:</code></td><td><code>finally {</code></td></tr>
  <tr><td>Custom exception</td><td><code>class MyError(Exception): pass</code></td><td><code>class MyError extends Exception {}</code></td></tr>
  <tr><td>Root of userland errors</td><td><code>Exception</code></td><td><code>Exception</code> (a <code>Throwable</code>)</td></tr>
  <tr><td>Engine-level errors</td><td><code>SyntaxError</code>, <code>MemoryError</code>…</td><td><code>Error</code> (the other <code>Throwable</code> branch)</td></tr>
  <tr><td>Message</td><td><code>str(e)</code></td><td><code>$e-&gt;getMessage()</code></td></tr>
</table>
<p>The mental model transfers almost untouched — the real adjustment is the
split root. In Python everything from <code>ValueError</code> to
<code>RecursionError</code> descends from one <code>Exception</code>; PHP
keeps your errors (<code>Exception</code>) and the engine's errors
(<code>Error</code>, e.g. <code>TypeError</code> from a bad type declaration)
as sibling branches under <code>Throwable</code>. So a bare
<code>catch (Exception $e)</code> is like a well-behaved
<code>except Exception:</code> — it won't accidentally swallow engine
failures unless you explicitly ask for <code>Throwable</code>.</p>`,
};
