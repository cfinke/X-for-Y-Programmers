const LESSON = {
  number: 6,
  title: "Null, ?? & ?->",

  intro: `
<p>Python's <code>None</code> is PHP's <code>null</code>, and the surrounding
idioms map almost one to one — except PHP got the operators Python's
community said no to. <code>d.get(key, default)</code> becomes
<code>$m[$key] ?? $default</code>: <code>??</code> is the null coalescing
operator, the very feature PEP&nbsp;505 proposed for Python and got
<em>rejected</em>. It returns the left side unless it's missing or
<code>null</code>, in which case you get the right side — no
<code>KeyError</code>-style warning, no fuss.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>None</code></td><td><code>null</code></td></tr>
  <tr><td><code>d.get(k, default)</code></td><td><code>$m[$k] ?? $default</code></td></tr>
  <tr><td><code>u.address.city if u and u.address else "?"</code></td><td><code>$u?-&gt;address?-&gt;city ?? "?"</code></td></tr>
  <tr><td><code>x is None</code></td><td><code>$x === null</code></td></tr>
  <tr><td><code>x is not None</code></td><td><code>$x !== null</code>, or <code>isset($x)</code></td></tr>
</table>
<p>The second operator Python never got: <code>?-&gt;</code>, the
<em>nullsafe</em> member access. Where you write
<code>x.attr if x else None</code> chains (or nested <code>if</code>s),
PHP writes <code>$obj?-&gt;attr</code> — if <code>$obj</code> is
<code>null</code>, the whole chain short-circuits to <code>null</code>
instead of blowing up. Combine it with <code>??</code> and a three-level
lookup with a fallback is one line. Finally, <code>isset($x)</code> means
roughly "is defined <em>and</em> not null" — note that
<code>isset($a["k"])</code> is <code>false</code> when the key exists but
holds <code>null</code>, which is exactly how <code>??</code> decides to
fall back.</p>`,

  python: `from dataclasses import dataclass

@dataclass
class Address:
    city: str

@dataclass
class User:
    address: Address | None = None

def get_city(user: User | None) -> str:
    if user is not None and user.address is not None:
        return user.address.city
    return "Unknown"

def pick(data: dict[str, str], key: str, default: str) -> str:
    return data.get(key, default)  # PEP 505 would have made this data[key] ?? default`,

  task: `
<p>The starter defines <code>Address</code> and <code>User</code> for you
(PHP 8 constructor promotion — lesson 9 explains it). Implement:</p>
<ol>
  <li><code>get_city(?User $user): string</code> — return the user's
      address city, or <code>"Unknown"</code> if the user is
      <code>null</code> <em>or</em> has no address. Use a
      <code>$user?-&gt;address?-&gt;city</code> nullsafe chain finished with
      <code>??</code> — one <code>return</code>, no <code>if</code>.</li>
  <li><code>pick(array $data, string $key, string $default): string</code> —
      the PHP spelling of <code>data.get(key, default)</code>, using
      <code>??</code>. It should also fall back when the key exists but
      holds <code>null</code>.</li>
</ol>`,

  starter: `<?php

// Given: a ?Address property means "Address or null", like Address | None.
class Address {
    public function __construct(public string $city) {}
}

class User {
    public function __construct(public ?Address $address = null) {}
}

// 1. Chain $user?->address?->city, then ?? "Unknown".
function get_city(?User $user): string {
    throw new Exception("TODO: implement get_city");
}

// 2. data.get(key, default) in PHP: $data[$key] ?? $default.
function pick(array $data, string $key, string $default): string {
    throw new Exception("TODO: implement pick");
}
`,

  requirements: [
    { pattern: /\?\?/, message: "Use the null coalescing operator ??" },
    { pattern: /\?->/, message: "Use a nullsafe ?-> chain in get_city" },
    { pattern: /\?User|\?Address/, message: "Keep the nullable type declarations (?User / ?Address)" },
  ],

  tests: [
    { name: 'get_city with user and address returns the city',
      code: '$u = new User(new Address("Paris")); expect_eq(get_city($u), "Paris");' },
    { name: 'get_city with a user but no address returns "Unknown"',
      code: 'expect_eq(get_city(new User()), "Unknown");' },
    { name: 'get_city(null) returns "Unknown"',
      code: 'expect_eq(get_city(null), "Unknown");' },
    { name: 'pick finds an existing key',
      code: 'expect_eq(pick(["name" => "Ada"], "name", "n/a"), "Ada");' },
    { name: 'pick falls back on a missing key',
      code: 'expect_eq(pick([], "name", "n/a"), "n/a");' },
    { name: 'pick falls back when the value is null (?? treats null as absent)',
      code: 'expect_eq(pick(["name" => null], "name", "n/a"), "n/a");' },
  ],

  solution: `<?php

class Address {
    public function __construct(public string $city) {}
}

class User {
    public function __construct(public ?Address $address = null) {}
}

function get_city(?User $user): string {
    return $user?->address?->city ?? "Unknown";
}

function pick(array $data, string $key, string $default): string {
    return $data[$key] ?? $default;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Nothing</td><td><code>None</code></td><td><code>null</code></td></tr>
  <tr><td>Dict lookup with default</td><td><code>d.get(k, default)</code></td><td><code>$m[$k] ?? $default</code></td></tr>
  <tr><td>Null-tolerant chain</td><td><code>x.a.b if x and x.a else None</code></td><td><code>$x?-&gt;a?-&gt;b</code></td></tr>
  <tr><td>Null check</td><td><code>x is None</code></td><td><code>$x === null</code></td></tr>
  <tr><td>"Exists and not None"</td><td><code>k in d and d[k] is not None</code></td><td><code>isset($m[$k])</code></td></tr>
  <tr><td>Assign if null</td><td><code>x = x if x is not None else y</code></td><td><code>$x ??= $y;</code></td></tr>
  <tr><td>Nullable type hint</td><td><code>Address | None</code></td><td><code>?Address</code></td></tr>
</table>
<p>The key mental model: <code>??</code> and <code>isset()</code> share one
definition of "missing" — undefined <em>or</em> null. That makes
<code>$m[$k] ?? $default</code> safer than Python's <code>d[k]</code> (no
exception) but subtly different from <code>d.get(k, default)</code>: a key
explicitly set to <code>null</code> still triggers the fallback. And unlike
short-circuit tricks with <code>or</code> in Python, <code>??</code> only
reacts to null — <code>0</code>, <code>""</code>, and <code>[]</code> pass
through untouched.</p>`,
};
