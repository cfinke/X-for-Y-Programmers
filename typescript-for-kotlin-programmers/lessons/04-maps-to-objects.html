const LESSON = {
  number: 4,
  title: "Maps → Objects",

  intro: `
<p>Where you would reach for <code>mutableMapOf&lt;String, Int&gt;()</code>,
idiomatic TypeScript reaches for a plain object typed as
<code>Record&lt;string, number&gt;</code>. Read <code>Record&lt;K, V&gt;</code>
exactly like <code>Map&lt;K, V&gt;</code>: the two type parameters are key
and value types. The literal syntax replaces the builder call plus a chain of
<code>put</code>s (or <code>to</code> pairs): <code>{ apple: 3, banana: 5 }</code>
is a fully populated map in one expression. Lookups use bracket indexing,
<code>stock["apple"]</code> — just like Kotlin's own <code>stock["apple"]</code> —
or dot access, <code>stock.apple</code>, when the key is a fixed identifier.</p>
<table>
  <tr><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td><code>val m = mutableMapOf&lt;String, Int&gt;()</code></td><td><code>const m: Record&lt;string, number&gt; = {};</code></td></tr>
  <tr><td><code>m["apple"] = 3</code></td><td><code>m["apple"] = 3;</code></td></tr>
  <tr><td><code>m["apple"]</code></td><td><code>m["apple"]</code></td></tr>
  <tr><td><code>m["pear"] ?: 0</code></td><td><code>m["pear"] ?? 0</code></td></tr>
  <tr><td><code>"apple" in m</code></td><td><code>"apple" in m</code></td></tr>
  <tr><td><code>for ((k, v) in m)</code></td><td><code>for (const [k, v] of Object.entries(m))</code></td></tr>
  <tr><td><code>m.keys</code> / <code>m.values</code></td><td><code>Object.keys(m)</code> / <code>Object.values(m)</code></td></tr>
</table>
<p>Your <code>getOrDefault</code> (or elvis <code>?:</code>) instinct maps to the
<code>??</code> (nullish coalescing) operator: a missing key yields
<code>undefined</code> rather than <code>null</code>, and
<code>m[key] ?? fallback</code> supplies the default — same contract you get
from Kotlin's <code>m[key] ?: fallback</code>, just a different spelling.
<code>containsKey</code> becomes the <code>in</code> operator — the very
operator you already use in Kotlin — and the <code>for ((k, v) in m)</code>
loop becomes <code>for (const [k, v] of Object.entries(m))</code>, which hands
you <code>[key, value]</code> pairs you destructure right in the loop header,
exactly like Kotlin's component destructuring. (TypeScript also has a real
<code>Map</code> class for non-string keys; for string-keyed maps like this
one, <code>Record</code> objects are the idiom.)</p>`,

  kotlin: `val stock = mutableMapOf("apple" to 3, "banana" to 5)

val apples = stock["apple"]           // 3 (an Int?)
val pears  = stock["pear"] ?: 0       // 0 — no NPE, elvis supplies the default
val hasApple = "apple" in stock       // true

var total = 0
for ((item, count) in stock) {
    println("$item x$count")
    total += count
}`,

  task: `
<p>Port the inventory code:</p>
<ol>
  <li>Declare a constant <code>stock</code> of type
      <code>Record&lt;string, number&gt;</code> holding
      <code>apple: 3</code> and <code>banana: 5</code> — the
      <code>mutableMapOf</code> with its two <code>to</code> pairs, as one
      literal.</li>
  <li>Write <code>getCount(inv: Record&lt;string, number&gt;, item: string): number</code>
      that returns the count for <code>item</code>, or <code>0</code> if the
      key is absent. This is <code>getOrDefault</code>: index with
      <code>inv[item]</code> and supply the fallback with <code>??</code>
      (the elvis <code>?:</code> you know).</li>
  <li>Write <code>hasItem(inv: Record&lt;string, number&gt;, item: string): boolean</code>
      — <code>containsKey</code> becomes the <code>in</code> operator:
      <code>item in inv</code>, same as in Kotlin.</li>
  <li>Write <code>totalItems(inv: Record&lt;string, number&gt;): number</code>
      that sums all the counts. Loop with
      <code>for (const [item, count] of Object.entries(inv))</code> —
      the <code>for ((k, v) in m)</code> loop with an
      <code>Object.entries</code> in front.</li>
</ol>`,

  starter: `// 1. new HashMap<>() + put("apple", 3) + put("banana", 5), as one literal.
//    Type it Record<string, number> — read it like Map<String, Integer>.
const stock = {};

// 2. Java: inv.getOrDefault(item, 0)  ->  TS: inv[item] ?? 0
function getCount(inv: Record<string, number>, item: string): number {
  // TODO
  return 0;
}

// 3. Java: inv.containsKey(item)  ->  TS: item in inv
function hasItem(inv: Record<string, number>, item: string): boolean {
  // TODO
  return false;
}

// 4. Java: for (Map.Entry<String, Integer> e : inv.entrySet()) { ... }
//    TS:   for (const [item, count] of Object.entries(inv)) { ... }
function totalItems(inv: Record<string, number>): number {
  // TODO: sum every count
  return 0;
}
`,

  exportNames: ["stock", "getCount", "hasItem", "totalItems"],

  requirements: [
    { pattern: /stock\s*:\s*Record<\s*string\s*,\s*number\s*>/, message: "Type stock as Record<string, number> — the Map<String, Integer> of TypeScript" },
    { pattern: /\?\?/, message: "Use the ?? operator to supply the default — TypeScript's getOrDefault" },
    { pattern: /\w+\s+in\s+\w+/, message: "Use the in operator for the containsKey check" },
    { pattern: /Object\.(entries|keys)\s*\(/, message: "Iterate with Object.entries(...) (or Object.keys) — the entrySet() loop" },
  ],

  tests: [
    { name: "stock is { apple: 3, banana: 5 }", run: (x) => expectDeepEqual(x.stock, { apple: 3, banana: 5 }) },
    { name: 'getCount(stock, "apple") is 3', run: (x) => expectEqual(x.getCount({ apple: 3, banana: 5 }, "apple"), 3) },
    { name: 'getCount(stock, "pear") falls back to 0', run: (x) => expectEqual(x.getCount({ apple: 3, banana: 5 }, "pear"), 0) },
    { name: "hasItem finds present keys and rejects absent ones", run: (x) => { expectEqual(x.hasItem({ apple: 3 }, "apple"), true); expectEqual(x.hasItem({ apple: 3 }, "pear"), false); } },
    { name: "totalItems({ apple: 3, banana: 5 }) is 8", run: (x) => expectEqual(x.totalItems({ apple: 3, banana: 5 }), 8) },
    { name: "totalItems({}) is 0", run: (x) => expectEqual(x.totalItems({}), 0) },
  ],

  solution: `const stock: Record<string, number> = { apple: 3, banana: 5 };

function getCount(inv: Record<string, number>, item: string): number {
  return inv[item] ?? 0;
}

function hasItem(inv: Record<string, number>, item: string): boolean {
  return item in inv;
}

function totalItems(inv: Record<string, number>): number {
  let total = 0;
  for (const [item, count] of Object.entries(inv)) {
    total += count;
  }
  return total;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td>Type</td><td><code>Map&lt;String, Int&gt;</code></td><td><code>Record&lt;string, number&gt;</code></td></tr>
  <tr><td>Create + fill</td><td><code>mutableMapOf("apple" to 3, ...)</code></td><td><code>{ apple: 3, banana: 5 }</code></td></tr>
  <tr><td>Read</td><td><code>m[k]</code></td><td><code>m[k]</code></td></tr>
  <tr><td>Write</td><td><code>m[k] = v</code></td><td><code>m[k] = v</code></td></tr>
  <tr><td>Default on miss</td><td><code>m[k] ?: d</code></td><td><code>m[k] ?? d</code></td></tr>
  <tr><td>Key check</td><td><code>k in m</code></td><td><code>k in m</code></td></tr>
  <tr><td>Entries loop</td><td><code>for ((k, v) in m)</code></td><td><code>for (const [k, v] of Object.entries(m))</code></td></tr>
  <tr><td>Keys / values</td><td><code>m.keys</code> / <code>m.values</code></td><td><code>Object.keys(m)</code> / <code>Object.values(m)</code></td></tr>
</table>
<p>The contract difference worth internalizing: Kotlin's <code>m[k]</code>
returns <code>Int?</code> — <code>null</code> on a missing key, which the type
system makes you unwrap — while TypeScript's <code>m[k]</code> returns
<code>undefined</code>, and the type checker (with an index-checking flag)
makes you handle it at the call site, which is exactly what
<code>?? fallback</code> does, mirroring your elvis <code>?:</code>. Prefer
<code>??</code> over the older <code>||</code> trick: <code>||</code> also
replaces legitimate falsy values like <code>0</code>, so
<code>m["pear"] || 1</code> would "default" a real zero count —
<code>??</code> only steps in for <code>null</code> and
<code>undefined</code>.</p>`,
};
