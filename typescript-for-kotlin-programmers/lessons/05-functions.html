const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>Kotlin already lets a function sit at the top level of a file, fully typed,
with no wrapper class required — so this is friendly territory. What some
languages force into <code>TextUtils.greet(name)</code> you already write as a
free <code>greet(name)</code>, and TypeScript works exactly the same way. The
concepts you lean on in Kotlin — default parameters, functions as first-class
values, lambdas, function types — all carry straight over; only the spelling
changes.</p>
<table>
  <tr><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td><code>fun f(x: Int): Int { ... }</code> at top level</td><td><code>function f(x: number): number { ... }</code> at top level</td></tr>
  <tr><td><code>fun greet(name: String, greeting: String = "Hello")</code></td><td><code>greet(name: string, greeting: string = "Hello")</code></td></tr>
  <tr><td><code>last: String? = null</code> (nullable, may be absent)</td><td><code>last?: string</code> (optional parameter)</td></tr>
  <tr><td><code>{ x -&gt; x * 2 }</code></td><td><code>x =&gt; x * 2</code></td></tr>
  <tr><td><code>(Int) -&gt; Int</code></td><td><code>(n: number) =&gt; number</code></td></tr>
  <tr><td><code>f(x)</code></td><td><code>f(x)</code></td></tr>
</table>
<p>The "let the caller omit an argument" pattern is a <em>default parameter</em>
in both languages — Kotlin's <code>greeting: String = "Hello"</code> becomes
TypeScript's <code>greeting: string = "Hello"</code>, one function body, no
overloads. The one spot where the two genuinely differ is an argument that may
be absent entirely: Kotlin reaches for a nullable type
(<code>last: String? = null</code>), while TypeScript writes an <em>optional
parameter</em> (<code>last?: string</code>, whose type inside the body is
<code>string | undefined</code>). Your lambda instincts transfer almost
character for character: Kotlin's <code>{ x -&gt; x * 2 }</code> becomes
<code>x =&gt; x * 2</code>. And just as in Kotlin, functions are ordinary
values with ordinary types written inline as
<code>(n: number) =&gt; number</code> — you just call them, no ceremony.</p>`,

  kotlin: `// Top-level functions — no wrapper class required.
// One body with a default parameter, not two overloads:
fun greet(name: String, greeting: String = "Hello"): String =
    "$greeting, $name!"

// Lambdas have function types directly — no functional interface to hunt for:
val doubler: (Int) -> Int = { x -> x * 2 }
doubler(21)                               // 42

val applyTwice: ((Int) -> Int, Int) -> Int = { f, v -> f(f(v)) }
applyTwice(doubler, 5)                     // 20`,

  task: `
<p>Write four top-level functions:</p>
<ol>
  <li><code>greet(name: string, greeting: string = "Hello"): string</code> —
      the same one-function-with-a-<em>default parameter</em> shape you would
      write in Kotlin as <code>greeting: String = "Hello"</code>. Return
      <code>greeting + ", " + name + "!"</code>.</li>
  <li><code>formatName(first: string, last?: string): string</code> — where
      Kotlin would use a nullable <code>last: String? = null</code>, TypeScript
      uses an <em>optional parameter</em>. Return
      <code>"first last"</code> when <code>last</code> is provided,
      otherwise just <code>first</code>. Inside the body,
      <code>last</code> has type <code>string | undefined</code>, so check
      it before using it.</li>
  <li><code>double</code> — a <code>const</code> with the explicit function
      type <code>(n: number) =&gt; number</code>, assigned an
      <em>arrow function</em> that doubles its argument. This is Kotlin's
      <code>val double: (Int) -&gt; Int = { n -&gt; n * 2 }</code>.</li>
  <li><code>applyTwice(fn: (n: number) =&gt; number, value: number): number</code>
      — takes a function value and applies it twice:
      <code>fn(fn(value))</code>. Just like Kotlin, you call it directly.</li>
</ol>`,

  starter: `// 1. Kotlin's default argument (greeting: String = "Hello") carries straight over.
function greet(name: string, greeting: string = "Hello"): string {
  // TODO: greeting + ", " + name + "!"
  return "";
}

// 2. Kotlin's nullable last: String? = null becomes an optional param.
//    Inside the body, last is string | undefined — check before using.
function formatName(first: string, last?: string): string {
  // TODO
  return "";
}

// 3. Kotlin: val doubler: (Int) -> Int = { x -> x * 2 }
//    TS:   a typed const holding an arrow function.
const double: (n: number) => number = (n) => n; // TODO: actually double it

// 4. Kotlin: a function taking a function value, called directly with fn(...).
//    TS:   the function type is written inline, and you just call fn(...).
function applyTwice(fn: (n: number) => number, value: number): number {
  // TODO: apply fn twice
  return value;
}
`,

  exportNames: ["greet", "formatName", "double", "applyTwice"],

  requirements: [
    { pattern: /greeting\s*:\s*string\s*=\s*"Hello"/, message: 'Give greeting the default value "Hello" — Kotlin\'s greeting: String = "Hello"' },
    { pattern: /\w+\?\s*:\s*string/, message: "Declare the optional parameter with ?: — Kotlin's nullable last: String? = null" },
    { pattern: /=>/, message: "Use an arrow function — the => spelling of Kotlin's ->" },
    { pattern: /\(\s*\w+\s*:\s*number\s*\)\s*=>\s*number/, message: "Write the function type (n: number) => number — Kotlin's (Int) -> Int" },
  ],

  tests: [
    { name: 'greet("Ada") uses the default: "Hello, Ada!"', run: (x) => expectEqual(x.greet("Ada"), "Hello, Ada!") },
    { name: 'greet("Ada", "Hi") overrides it: "Hi, Ada!"', run: (x) => expectEqual(x.greet("Ada", "Hi"), "Hi, Ada!") },
    { name: "formatName handles both one and two arguments", run: (x) => { expectEqual(x.formatName("Grace", "Hopper"), "Grace Hopper"); expectEqual(x.formatName("Grace"), "Grace"); } },
    { name: "double(21) is 42", run: (x) => expectEqual(x.double(21), 42) },
    { name: "applyTwice(double, 5) is 20", run: (x) => expectEqual(x.applyTwice(x.double, 5), 20) },
    { name: "applyTwice works with any (n: number) => number", run: (x) => expectEqual(x.applyTwice((n) => n + 1, 0), 2) },
  ],

  solution: `function greet(name: string, greeting: string = "Hello"): string {
  return greeting + ", " + name + "!";
}

function formatName(first: string, last?: string): string {
  if (last === undefined) {
    return first;
  }
  return first + " " + last;
}

const double: (n: number) => number = (n) => n * 2;

function applyTwice(fn: (n: number) => number, value: number): number {
  return fn(fn(value));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td>Where functions live</td><td>top level of any file</td><td>top level of any file</td></tr>
  <tr><td>Optional trailing arg</td><td><code>greeting: String = "Hello"</code></td><td><code>greeting: string = "Hello"</code></td></tr>
  <tr><td>Arg that may be absent</td><td><code>last: String? = null</code> (nullable)</td><td><code>last?: string</code> → <code>string | undefined</code> inside</td></tr>
  <tr><td>Lambda</td><td><code>{ x -&gt; x * 2 }</code></td><td><code>x =&gt; x * 2</code></td></tr>
  <tr><td>Function type</td><td><code>(A) -&gt; R</code> / <code>(A, B) -&gt; R</code> / ...</td><td><code>(a: A, b: B) =&gt; R</code>, written inline</td></tr>
  <tr><td>Invoking a function value</td><td><code>f(x)</code></td><td><code>f(x)</code></td></tr>
</table>
<p>Not much of a mental shift here: Kotlin already treats functions as
first-class values with function types like <code>(Int) -&gt; Int</code>, and
TypeScript does the same with <code>(n: number) =&gt; number</code>. In both
languages the type is structural — any function whose parameters and return
type line up is assignable, no named interface required. That is why
<code>applyTwice</code> happily accepts <code>double</code>, an inline arrow,
or a plain named function: they all have the shape
<code>(n: number) =&gt; number</code>. The single thing to keep straight is the
"absent argument" case: where Kotlin uses a nullable
<code>String? = null</code>, idiomatic TypeScript uses an optional parameter
whose in-body type is <code>string | undefined</code>. TypeScript does have
declaration-based overloads for advanced cases, but reach for default and
optional parameters first — one body, no delegation chains.</p>`,
};
