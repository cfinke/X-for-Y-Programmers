<script>
const LESSON = {
  number: 2,
  title: "Strings",

  intro: `
<p>Concatenation with <code>+</code> works exactly as in Kotlin, so half of
your string habits carry over untouched. Kotlin already spoiled you with
string templates ŌĆö <code>"\$name is \$age"</code> ŌĆö and TypeScript has the same
idea under a different skin: the <em>template literal</em>, a backtick-quoted
string where <code>\${expr}</code> interpolates any expression inline. The
differences are cosmetic: backticks instead of double quotes, and you always
wrap the expression in <code>\${...}</code> (there is no bare <code>\$name</code>
shorthand). Methods mostly keep familiar names
(<code>trim</code>, <code>indexOf</code>, <code>startsWith</code>), with two
notes: <code>length</code> is a <em>property</em> in both languages ŌĆö no
parentheses either way ŌĆö and Kotlin's <code>contains</code> is spelled
<code>includes</code>.</p>
<table>
  <tr><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td><code>a + " " + b</code></td><td><code>a + " " + b</code> (unchanged)</td></tr>
  <tr><td><code>"\$n is \$a"</code></td><td>template literal with <code>\${n}</code> and <code>\${a}</code></td></tr>
  <tr><td><code>s.length</code></td><td><code>s.length</code> ŌĆö property in both</td></tr>
  <tr><td><code>s == t</code></td><td><code>s === t</code></td></tr>
  <tr><td><code>s.contains("x")</code></td><td><code>s.includes("x")</code></td></tr>
  <tr><td><code>s.uppercase()</code></td><td><code>s.toUpperCase()</code></td></tr>
</table>
<p>Now the one that will trip your reflexes. In Kotlin, <code>==</code> is
<em>value</em> equality (it calls <code>equals</code>) and <code>===</code> is
<em>reference</em> equality ŌĆö the referential one you almost never want. In
TypeScript that mapping <em>flips</em>: <code>===</code> is the value comparison
you should always reach for. Strings are primitives, so <code>===</code>
compares them by value with no reference-identity subtleties, no interning
traps, no <code>.equals()</code> at all. So retrain the muscle: the triple-equals
that means "danger, reference check" in Kotlin means "correct value comparison"
here. The double-equals <code>==</code> exists but does loose type coercion, so
treat it the way you treat a platform type leaking in from Java: legal, and
never what you want.</p>`,

  kotlin: `val first = "Grace"
val last = "Hopper"

val full = "\$first \$last"                    // template, or first + " " + last
val label = "\$full is 85"                     // template -> TS template literal

val len = full.length                          // property in Kotlin, same in TS
val shout = full.uppercase() + "!"
val hasGrace = full.contains("Grace")          // -> .includes() in TS

// In Kotlin == is value equality; === is reference equality.
val same = full == "Grace Hopper"              // true  (value)
val ref = full === "Grace Hopper"              // reference check ŌĆö not what you want
val caseSame = full.equals("GRACE HOPPER", ignoreCase = true)`,

  task: `
<p>Port the string toolkit to TypeScript:</p>
<ol>
  <li>Write <code>formatUser(name: string, age: number): string</code>
      returning <code>"Grace is 85 years old"</code>-style output. Use a
      <em>template literal</em> (backticks + <code>\${...}</code>), not
      <code>+</code> concatenation ŌĆö it is the exact analogue of Kotlin's
      <code>"\$name is \$age"</code> string template.</li>
  <li>Write <code>shout(s: string): string</code> that returns the string
      uppercased with <code>"!"</code> appended, e.g.
      <code>shout("hello")</code> ŌåÆ <code>"HELLO!"</code>.</li>
  <li>Write <code>sameText(a: string, b: string): boolean</code> that
      compares the two strings <em>by value</em>. In Kotlin this is
      <code>a == b</code>; here it is <code>a === b</code> ŌĆö yes,
      triple-equals is the value comparison in TypeScript.</li>
  <li>Write <code>containsWord(s: string, word: string): boolean</code>
      using <code>.includes(...)</code> ŌĆö Kotlin's <code>.contains()</code>
      under its JS name.</li>
</ol>`,

  starter: `// 1. Kotlin's "\$name is \$age" string template -> template literal.
//    Backticks, with \${name} and \${age} interpolated inline.
function formatUser(name: string, age: number): string {
  // TODO: return a template literal, not + concatenation
  return "";
}

// 2. Kotlin's .uppercase() becomes .toUpperCase() here.
function shout(s: string): string {
  // TODO: uppercase s and append "!"
  return s;
}

// 3. Kotlin: a == b. TypeScript: === compares string VALUES.
function sameText(a: string, b: string): boolean {
  // TODO: use === (there is no .equals here, and you don't need it)
  return false;
}

// 4. Kotlin: s.contains(word). TypeScript renames it to .includes(word).
function containsWord(s: string, word: string): boolean {
  // TODO
  return false;
}
`,

  exportNames: ["formatUser", "shout", "sameText", "containsWord"],

  requirements: [
    { pattern: /`[^`]*\$\{[^`]*`/, message: "Use a template literal (backticks with ${...}) in formatUser" },
    { pattern: /===/, message: "Compare strings with === (Kotlin's == is value equality ŌĆö no .equals reflex needed; here === is the value comparison)" },
    { pattern: /\.includes\s*\(/, message: "Use .includes(...) ŌĆö the TypeScript spelling of Kotlin's .contains(...)" },
    { pattern: /\.toUpperCase\s*\(/, message: "Use .toUpperCase() ŌĆö Kotlin's .uppercase()" },
  ],

  tests: [
    { name: 'formatUser("Grace", 85) returns "Grace is 85 years old"', run: (x) => expectEqual(x.formatUser("Grace", 85), "Grace is 85 years old") },
    { name: 'formatUser("Ada", 36) returns "Ada is 36 years old"', run: (x) => expectEqual(x.formatUser("Ada", 36), "Ada is 36 years old") },
    { name: 'shout("hello") returns "HELLO!"', run: (x) => expectEqual(x.shout("hello"), "HELLO!") },
    { name: "sameText compares by value, not reference", run: (x) => { expectEqual(x.sameText("Ada", "Ada"), true); expectEqual(x.sameText("Ada", "Grace"), false); } },
    { name: 'containsWord("Grace Hopper", "Grace") is true', run: (x) => expectEqual(x.containsWord("Grace Hopper", "Grace"), true) },
    { name: 'containsWord("Grace Hopper", "Linus") is false', run: (x) => expectEqual(x.containsWord("Grace Hopper", "Linus"), false) },
  ],

  solution: `function formatUser(name: string, age: number): string {
  return \`\${name} is \${age} years old\`;
}

function shout(s: string): string {
  return s.toUpperCase() + "!";
}

function sameText(a: string, b: string): boolean {
  return a === b;
}

function containsWord(s: string, word: string): boolean {
  return s.includes(word);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td>Concatenation</td><td><code>a + " " + b</code></td><td><code>a + " " + b</code></td></tr>
  <tr><td>Formatting</td><td><code>"\$n is \$a"</code> string template</td><td>backtick template literal with <code>\${n}</code>, <code>\${a}</code></td></tr>
  <tr><td>Length</td><td><code>s.length</code> (property)</td><td><code>s.length</code> (property)</td></tr>
  <tr><td>Value equality</td><td><code>s == t</code></td><td><code>s === t</code></td></tr>
  <tr><td>Case-insensitive equality</td><td><code>s.equals(t, ignoreCase = true)</code></td><td><code>s.toLowerCase() === t.toLowerCase()</code></td></tr>
  <tr><td>Substring test</td><td><code>s.contains(x)</code></td><td><code>s.includes(x)</code></td></tr>
  <tr><td>Case / trim / search</td><td><code>uppercase</code>, <code>trim</code>, <code>indexOf</code>, <code>startsWith</code></td><td><code>toUpperCase</code>, <code>trim</code>, <code>indexOf</code>, <code>startsWith</code></td></tr>
</table>
<p>The real re-wiring is equality, not length: <code>s.length</code> is already
a property in Kotlin, so that carries over cleanly with no parentheses drama.
The gotcha is that <code>===</code> swaps meaning across the border ŌĆö in Kotlin
it is the referential check you avoid, while in TypeScript it is the value
comparison you always want, because JavaScript strings are primitives with no
reference identity to compare. Reach for <code>===</code> without hesitation, and
leave <code>==</code> (loose coercion) alone.</p>`,
};
