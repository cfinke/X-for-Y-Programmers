const LESSON = {
  number: 12,
  title: "Generics",

  intro: `
<p>Here is a lesson where your Kotlin instincts transfer almost untouched.
<code>&lt;T&gt;</code> means the same thing, and type arguments are inferred at
call sites exactly as they are in Kotlin. The one syntactic wrinkle: an upper
bound is written with <code>extends</code> rather than Kotlin's <code>:</code>
— <code>&lt;T extends Shape&gt;</code> where you would write
<code>&lt;T : Shape&gt;</code>. And the famous gotcha carries over: TypeScript
generics are <strong>erased at runtime</strong>, just like Kotlin's on the JVM
— there is no <code>T</code> to reflect on, no <code>x is List&lt;String&gt;</code>.
The difference is that Kotlin hands you an escape hatch,
<code>inline fun &lt;reified T&gt;</code>, which lets you write
<code>if (x is T)</code>; TypeScript has no <code>reified</code>, so the
erasure is total and permanent.</p>
<table>
  <tr><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td><code>fun &lt;T&gt; first(items: List&lt;T&gt;): T?</code></td><td><code>function first&lt;T&gt;(items: T[]): T</code></td></tr>
  <tr><td><code>&lt;T : Comparable&lt;T&gt;&gt;</code></td><td><code>&lt;T extends SomeShape&gt;</code> (bound is a structural shape)</td></tr>
  <tr><td><code>List&lt;out Number&gt;</code> projection</td><td>usually just <code>T[]</code> — no projections needed</td></tr>
  <tr><td>Erasure: <code>T</code> gone at runtime (unless <code>reified</code>)</td><td>Erasure: types vanish — no <code>reified</code> escape hatch</td></tr>
</table>
<p>Two differences worth savoring: first, there are <strong>no variance
annotations</strong>. Kotlin needs <code>out</code> and <code>in</code>
(declaration-site) plus star/use-site projections because its generics are
invariant and nominal; TypeScript's structural typing makes most of that
variance dance unnecessary — a <code>Dog[]</code> is simply usable where the
shapes line up. Second, bounds can reference <em>other type parameters'
structure</em>: <code>&lt;T, K extends keyof T&gt;</code> means "K must be the
name of a property of T" — something Kotlin's type system cannot express at
all. That one construct replaces a whole family of reflection-based
<code>readProperty(obj, "name")</code> utilities with a compile-checked
version.</p>`,

  kotlin: `fun <T> firstItem(items: List<T>): T? =
    items.firstOrNull()

fun <T : Comparable<T>> max(a: T, b: T): T =
    if (a >= b) a else b

// Kotlin's List is declared List<out E>, so it is already covariant --
// no wildcard needed where Java would require List<? extends Number>:
fun total(nums: List<Number>): Double =
    nums.sumOf { it.toDouble() }

val names = listOf("Ada", "Linus")
val first = firstItem(names)   // T inferred as String
// Erasure: at runtime, firstItem has no idea T was String.`,

  task: `
<p>Port two generic utilities:</p>
<ol>
  <li>Write <code>firstItem&lt;T&gt;(items: T[]): T | undefined</code> —
      return the first element, or <code>undefined</code> for an empty array.
      This is Kotlin's own <code>firstOrNull()</code>: where Kotlin returns a
      nullable <code>T?</code>, TypeScript makes the empty case an honest part
      of the signature with <code>T | undefined</code>.</li>
  <li>Write <code>pluck&lt;T, K extends keyof T&gt;(items: T[], key: K): T[K][]</code>
      — given an array of objects and a property name, return the array of
      that property's values. It is <code>.map(Product::name)</code>
      generalized to <em>every</em> property, with the compiler rejecting
      misspelled keys. Implement it with <code>items.map(...)</code>.</li>
</ol>
<p>Both functions are called with zero explicit type arguments — inference
fills in <code>T</code> and <code>K</code>, just like Kotlin call sites.</p>`,

  starter: `// 1. Kotlin: fun <T> firstItem(items: List<T>): T?
//    The <T> moves to just after the function name; List<T> becomes T[].
function firstItem<T>(items: T[]): T | undefined {
  // TODO: return the first element, or undefined if the array is empty
  return undefined;
}

// 2. A bound that Kotlin cannot write: K must be a property name of T.
//    TODO: add the type parameters <T, K extends keyof T> and retype the
//    signature as (items: T[], key: K): T[K][]
function pluck(items: any[], key: any): any[] {
  // TODO: map each item to item[key]
  return [];
}
`,

  exportNames: ["firstItem", "pluck"],

  requirements: [
    { pattern: /<T\b/, message: "Declare a generic type parameter <T> after the function name (Kotlin writes it as fun <T> foo)" },
    { pattern: /extends\s+keyof/, message: "Bound the key parameter with K extends keyof T" },
    { pattern: /:\s*T\s*\|\s*undefined/, message: "Give firstItem the honest return type T | undefined" },
  ],

  tests: [
    { name: "firstItem([10, 20, 30]) returns 10", run: (x) => expectEqual(x.firstItem([10, 20, 30]), 10) },
    { name: "firstItem([]) returns undefined", run: (x) => expectEqual(x.firstItem([]), undefined) },
    { name: 'firstItem(["ada"]) returns "ada" (T inferred as string)', run: (x) => expectEqual(x.firstItem(["ada"]), "ada") },
    { name: 'pluck(users, "name") returns ["Ada", "Linus"]', run: (x) => expectDeepEqual(x.pluck([{ name: "Ada", age: 36 }, { name: "Linus", age: 55 }], "name"), ["Ada", "Linus"]) },
    { name: 'pluck(users, "age") returns [36, 55]', run: (x) => expectDeepEqual(x.pluck([{ name: "Ada", age: 36 }, { name: "Linus", age: 55 }], "age"), [36, 55]) },
  ],

  solution: `function firstItem<T>(items: T[]): T | undefined {
  return items.length > 0 ? items[0] : undefined;
}

function pluck<T, K extends keyof T>(items: T[], key: K): T[K][] {
  return items.map(item => item[key]);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td>Generic function</td><td><code>fun &lt;T&gt; f(xs: List&lt;T&gt;): T</code></td><td><code>function f&lt;T&gt;(xs: T[]): T</code></td></tr>
  <tr><td>Bounded parameter</td><td><code>&lt;T : Number&gt;</code></td><td><code>&lt;T extends number&gt;</code> (bound can be any type, incl. shapes)</td></tr>
  <tr><td>Key-of-object bound</td><td>not expressible (use reflection)</td><td><code>&lt;T, K extends keyof T&gt;</code>, indexed access <code>T[K]</code></td></tr>
  <tr><td>Variance / projections</td><td><code>List&lt;out Shape&gt;</code>, <code>out</code>/<code>in</code></td><td>rarely needed — structural typing handles it</td></tr>
  <tr><td>Runtime type info</td><td>erased (or <code>inline</code> <code>reified T</code>)</td><td>erased (pass a value or check shapes)</td></tr>
  <tr><td>Generic classes/interfaces</td><td><code>class Box&lt;T&gt; { }</code></td><td><code>class Box&lt;T&gt; { }</code> — identical</td></tr>
</table>
<p>Erasure means a similar discipline applies in both languages: you cannot
branch on <code>T</code> at runtime — unless, in Kotlin, you reach for an
<code>inline fun &lt;reified T&gt;</code>. TypeScript has no such escape hatch,
but it turns erasure into a feature — since types cost nothing, you can write
luxuriously precise signatures like <code>pluck</code>'s and pay zero bytes for
them in the shipped JavaScript. The compile-time expressiveness is strictly
higher than Kotlin's; the runtime is exactly as type-free as the JVM's erased
bytecode.</p>`,
};
