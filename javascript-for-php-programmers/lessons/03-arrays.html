<script>
const LESSON = {
  number: 3,
  title: "Arrays",

  intro: `
<p>In PHP a single <code>array</code> type covers everything — an indexed list,
an associative map, even a stack or queue — and its keys can be integers or
strings mixed together. JavaScript splits that job in two: a plain
<code>Array</code> object for ordered lists, and <code>Object</code>/<code>Map</code>
for keyed data. This lesson is about the list half — a JavaScript
<code>Array</code> whose elements can be anything, whose length grows and
shrinks on demand, and which (unlike a PHP array) always has sequential
numeric indices starting at 0.</p>
<table>
  <tr><th>PHP</th><th>JavaScript</th></tr>
  <tr><td><code>$xs = [1, 2, 3];</code></td><td><code>const xs = [1, 2, 3];</code></td></tr>
  <tr><td><code>$xs[] = "no";</code> — allowed, array now mixed</td><td><code>xs.push("no")</code> — allowed, array now mixed</td></tr>
  <tr><td><code>$t = [0, 0];</code> (still just an array)</td><td><code>const t = [0, 0];</code> (just an array)</td></tr>
  <tr><td>keys can be int or string, in any order</td><td>indices are always sequential integers from 0</td></tr>
</table>
<p>The runtime skill that matters most is knowing which methods <em>mutate</em> the
array in place and which return a fresh copy. <code>push</code>, <code>pop</code>,
<code>shift</code>, and <code>unshift</code> change the array you call them on —
much like PHP's <code>array_push</code>, <code>array_pop</code>,
<code>array_shift</code>, and <code>array_unshift</code>, which also mutate the
array passed by reference. <code>slice</code> and <code>concat</code> leave the
original untouched and hand back a new array, the way PHP's <code>array_slice</code>
and <code>array_merge</code> do. Neither language's array "type" tells you which
is which — you have to know the function, and track it yourself.</p>`,

  php: `<?php
$nums = [10, 20, 30];

function appended(array $xs, $value): array {
  return [...$xs, $value];        // non-mutating copy (spread)
}

function has(array $xs, $value): bool {
  return in_array($value, $xs, true);
}

function labels(array $xs): string {
  return implode(", ", $xs);
}`,

  task: `
<p>Write the equivalent JavaScript versions. No PHP array-function names in your code.</p>
<ol>
  <li>Export <code>nums</code>, an array literal <code>[10, 20, 30]</code>.</li>
  <li><code>pushed(xs, value)</code> — call <code>xs.push(value)</code> so it
      <em>mutates</em> <code>xs</code>, then return <code>xs</code>. (This proves
      push changes the original, the same way PHP's <code>array_push($xs, $value)</code>
      mutates its by-reference argument.)</li>
  <li><code>withoutFirst(xs)</code> — return a <em>copy</em> of <code>xs</code>
      with the first element removed, using <code>slice</code>, so the original
      is left intact (JavaScript's equivalent of PHP's
      <code>array_slice($xs, 1)</code>).</li>
  <li><code>has(xs, value)</code> — return whether <code>value</code> is in
      <code>xs</code> using <code>includes</code> (PHP's
      <code>in_array($value, $xs, true)</code>).</li>
  <li><code>positionOf(xs, value)</code> — return the index of <code>value</code>
      using <code>indexOf</code> (<code>-1</code> if absent) — PHP's
      <code>array_search</code> returns <code>false</code> instead.</li>
  <li><code>labels(xs)</code> — return the elements joined into one string with
      <code>", "</code> using <code>join</code> (PHP's <code>implode(", ", $xs)</code>).</li>
</ol>`,

  starter: `// 1. nums
const nums = [10, 20, 30];

// 2. pushed(xs, value) -> mutates xs with push, returns xs
function pushed(xs, value) {
  // TODO
  return xs;
}

// 3. withoutFirst(xs) -> a slice copy without the first element
function withoutFirst(xs) {
  // TODO
  return [];
}

// 4. has(xs, value) -> boolean, using includes
function has(xs, value) {
  // TODO
  return false;
}

// 5. positionOf(xs, value) -> index or -1, using indexOf
function positionOf(xs, value) {
  // TODO
  return -1;
}

// 6. labels(xs) -> elements joined by ", "
function labels(xs) {
  // TODO
  return "";
}
`,

  exportNames: ["nums", "pushed", "withoutFirst", "has", "positionOf", "labels"],

  requirements: [
    { pattern: /\.push\s*\(/, message: "Use .push() inside pushed" },
    { pattern: /\.slice\s*\(/, message: "Use .slice() inside withoutFirst" },
    { pattern: /\.includes\s*\(/, message: "Use .includes() inside has" },
    { pattern: /\.indexOf\s*\(/, message: "Use .indexOf() inside positionOf" },
    { pattern: /\.join\s*\(/, message: "Use .join() inside labels" },
  ],

  tests: [
    { name: "nums is [10, 20, 30]", run: (x) => expectDeepEqual(x.nums, [10, 20, 30]) },
    { name: "pushed appends and returns the array", run: (x) => expectDeepEqual(x.pushed([1, 2], 3), [1, 2, 3]) },
    { name: "pushed mutates the original array", run: (x) => {
      const a = [1, 2];
      x.pushed(a, 3);
      expectDeepEqual(a, [1, 2, 3]);
    } },
    { name: "withoutFirst drops the first element", run: (x) => expectDeepEqual(x.withoutFirst([10, 20, 30]), [20, 30]) },
    { name: "withoutFirst does NOT mutate the original (slice copies)", run: (x) => {
      const a = [10, 20, 30];
      x.withoutFirst(a);
      expectDeepEqual(a, [10, 20, 30]);
    } },
    { name: "has finds a present value", run: (x) => expectEqual(x.has([10, 20, 30], 20), true) },
    { name: "has rejects an absent value", run: (x) => expectEqual(x.has([10, 20, 30], 99), false) },
    { name: "positionOf returns the index", run: (x) => expectEqual(x.positionOf([10, 20, 30], 30), 2) },
    { name: "positionOf returns -1 when absent", run: (x) => expectEqual(x.positionOf([10, 20, 30], 99), -1) },
    { name: "labels joins with a comma and space", run: (x) => expectEqual(x.labels([10, 20, 30]), "10, 20, 30") },
  ],

  solution: `const nums = [10, 20, 30];

function pushed(xs, value) {
  xs.push(value);
  return xs;
}

function withoutFirst(xs) {
  return xs.slice(1);
}

function has(xs, value) {
  return xs.includes(value);
}

function positionOf(xs, value) {
  return xs.indexOf(value);
}

function labels(xs) {
  return xs.join(", ");
}
`,

  notes: `
<table>
  <tr><th>Operation</th><th>Method</th><th>Mutates?</th></tr>
  <tr><td>Add to end</td><td><code>xs.push(v)</code></td><td>yes — returns new length</td></tr>
  <tr><td>Remove from end</td><td><code>xs.pop()</code></td><td>yes — returns the element</td></tr>
  <tr><td>Remove from front</td><td><code>xs.shift()</code></td><td>yes — returns the element</td></tr>
  <tr><td>Add to front</td><td><code>xs.unshift(v)</code></td><td>yes — returns new length</td></tr>
  <tr><td>Copy a range</td><td><code>xs.slice(start, end)</code></td><td>no — returns a new array</td></tr>
  <tr><td>Join two arrays</td><td><code>xs.concat(ys)</code></td><td>no — returns a new array</td></tr>
</table>
<p>A useful mental rule: the four <em>ends-of-the-array verbs</em> — push/pop/shift/unshift —
mutate; the two <em>copy</em> methods — slice/concat — do not. This maps directly onto
PHP: <code>array_push</code>/<code>array_pop</code>/<code>array_shift</code>/<code>array_unshift</code>
mutate their by-reference argument, while <code>array_slice</code> and
<code>array_merge</code> return new arrays and leave the original alone. When you
want a non-mutating "add" in JavaScript, prefer the spread copy
<code>[...xs, v]</code> over <code>push</code>, exactly as the PHP source did with
<code>[...$xs, $value]</code>.</p>
<table>
  <tr><th>Query</th><th>PHP</th><th>JavaScript</th></tr>
  <tr><td>Membership</td><td><code>in_array($v, $xs, true)</code> → <code>bool</code></td><td><code>xs.includes(v)</code> → <code>true</code>/<code>false</code></td></tr>
  <tr><td>Position</td><td><code>array_search($v, $xs, true)</code> → index or <code>false</code></td><td><code>xs.indexOf(v)</code> → index or <code>-1</code></td></tr>
  <tr><td>Stringify</td><td><code>implode($sep, $xs)</code> → <code>string</code></td><td><code>xs.join(sep)</code> → <code>string</code></td></tr>
</table>
<p>One runtime gotcha to watch for: JavaScript's <code>includes</code> and
<code>indexOf</code> compare with strict equality (<code>===</code>) plus a special
case that lets <code>includes</code> find <code>NaN</code> while <code>indexOf</code>
cannot — similar to always passing PHP's optional <code>strict</code> argument to
<code>in_array</code>/<code>array_search</code>, except JavaScript gives you no
loose-comparison option to opt out of. And <code>.length</code> is a live, writable
property — <code>xs.length = 0</code> empties the array in place, something PHP has
no direct counterpart for (you'd reach for <code>array_splice($xs, 0)</code> instead).</p>`,
};
