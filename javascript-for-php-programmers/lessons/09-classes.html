const LESSON = {
  number: 9,
  title: "Classes",

  intro: `
<p>PHP classes and JavaScript classes look a lot alike on the surface — both
use <code>class</code>, <code>constructor</code>/<code>__construct</code>,
<code>static</code>, and getters. But the visibility model is quite different.
PHP's <code>private</code> and <code>protected</code> are enforced by the
engine itself: reaching into a private property from outside the class throws
an <code>Error</code>. JavaScript has no <code>private</code> keyword at all —
a field you don't prefix with <code>#</code> is just a regular, fully public
property, no matter how you name it or comment it.</p>
<table>
  <tr><th>PHP</th><th>JavaScript</th></tr>
  <tr><td><code>private float $balance;</code></td><td><code>#balance;</code> (truly private) or a plain field</td></tr>
  <tr><td><code>public function __construct(private int $x) {}</code></td><td>no constructor promotion — assign <code>this.x</code> yourself</td></tr>
  <tr><td><code>readonly string $id;</code></td><td>plain field (no runtime enforcement)</td></tr>
  <tr><td><code>public function getArea(): float { … }</code></td><td><code>get area() { … }</code> (a real getter, accessed like a property)</td></tr>
  <tr><td><code>public static int $count = 0;</code></td><td><code>static count = 0;</code></td></tr>
</table>
<p>If you actually want a field that outside code cannot read or write, JavaScript
gives you <code>#private</code> fields — a real runtime feature enforced by the
engine, much like PHP's own <code>private</code>. It just uses a <code>#</code>
sigil instead of a keyword, and reaching for <code>obj.#count</code> outside the
class body is a syntax error rather than a warning.</p>`,

  php: `<?php
class Counter {
  public static int $instances = 0;
  private int $count = 0;

  public function __construct(private string $label, int $start = 0) {
    $this->count = $start;
    self::$instances++;
  }

  public function increment(): int {
    $this->count++;
    return $this->count;
  }

  public function getValue(): int {
    return $this->count;
  }

  public function describe(): string {
    return "{$this->label}: {$this->count}";
  }

  public static function reset(): void {
    self::$instances = 0;
  }
}`,

  task: `
<p>Write the plain-JavaScript runtime version of a <code>Counter</code> class.
No visibility keywords, no constructor promotion — just the runtime constructs.</p>
<ol>
  <li>A <code>constructor(label, start = 0)</code> that stores the label and
      seeds a <strong><code>#count</code> private field</strong> from
      <code>start</code>. It must also bump a
      <strong><code>static instances</code> field</strong> each time an instance
      is created.</li>
  <li>An instance method <code>increment()</code> that adds 1 to
      <code>#count</code> and returns the new value.</li>
  <li>A <strong>getter</strong> <code>value</code> that returns the current
      <code>#count</code>.</li>
  <li>An instance method <code>describe()</code> returning
      <code>"&lt;label&gt;: &lt;count&gt;"</code>, e.g. <code>"hits: 3"</code>.</li>
  <li>A <strong>static method</strong> <code>reset()</code> that sets
      <code>Counter.instances</code> back to <code>0</code>.</li>
</ol>
<p>Export the class as <code>Counter</code>.</p>`,

  starter: `class Counter {
  // static field: total instances created

  // #private field: the current count

  constructor(label, start = 0) {
    // TODO: store label, seed #count from start, bump the static counter
  }

  increment() {
    // TODO: add 1 to #count and return the new value
  }

  get value() {
    // TODO: return the current count
  }

  describe() {
    // TODO: return "<label>: <count>"
    return "";
  }

  static reset() {
    // TODO: set instances back to 0
  }
}
`,

  exportNames: ["Counter"],

  requirements: [
    { pattern: /#count/, message: "Use a #private field named #count" },
    { pattern: /static\s+instances/, message: "Declare a static field named instances" },
    { pattern: /get\s+value\s*\(/, message: "Define a getter named value" },
    { pattern: /static\s+reset\s*\(/, message: "Define a static method named reset" },
  ],

  tests: [
    {
      name: "constructor seeds count and value getter reads it",
      run: (x) => {
        const c = new x.Counter("hits", 5);
        expectEqual(c.value, 5);
      },
    },
    {
      name: "start defaults to 0",
      run: (x) => {
        const c = new x.Counter("hits");
        expectEqual(c.value, 0);
      },
    },
    {
      name: "increment returns the new value and mutates count",
      run: (x) => {
        const c = new x.Counter("hits", 0);
        expectEqual(c.increment(), 1);
        expectEqual(c.increment(), 2);
        expectEqual(c.value, 2);
      },
    },
    {
      name: "describe formats label and count",
      run: (x) => {
        const c = new x.Counter("hits", 2);
        c.increment();
        expectEqual(c.describe(), "hits: 3");
      },
    },
    {
      name: "static instances counts constructions; reset zeroes it",
      run: (x) => {
        x.Counter.reset();
        new x.Counter("a");
        new x.Counter("b");
        expectEqual(x.Counter.instances, 2);
        x.Counter.reset();
        expectEqual(x.Counter.instances, 0);
      },
    },
    {
      name: "#count is truly private (not an own enumerable property)",
      run: (x) => {
        const c = new x.Counter("hits", 9);
        expectDeepEqual(Object.keys(c), ["label"]);
      },
    },
  ],

  solution: `class Counter {
  static instances = 0;
  #count = 0;

  constructor(label, start = 0) {
    this.label = label;
    this.#count = start;
    Counter.instances++;
  }

  increment() {
    this.#count++;
    return this.#count;
  }

  get value() {
    return this.#count;
  }

  describe() {
    return \`\${this.label}: \${this.#count}\`;
  }

  static reset() {
    Counter.instances = 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>JavaScript runtime</th></tr>
  <tr><td>Visibility</td><td><code>private $x</code> — enforced by the engine</td><td><code>#x</code> — also enforced by the engine</td></tr>
  <tr><td>Constructor promotion</td><td><code>__construct(private $x) {}</code></td><td>write <code>this.x = x</code> by hand</td></tr>
  <tr><td>Field types</td><td><code>int $count = 0;</code></td><td><code>count = 0</code></td></tr>
  <tr><td>Getter</td><td><code>public function getValue(): int</code> (called as <code>$c->getValue()</code>)</td><td><code>get value()</code> (accessed as <code>c.value</code>, no parens)</td></tr>
  <tr><td>Static</td><td><code>public static int $count = 0;</code>, referenced via <code>self::$count</code></td><td><code>static count = 0</code>, referenced via <code>ClassName.count</code></td></tr>
</table>
<p>A few runtime facts worth internalizing. <code>#count</code> is not a string
key — <code>c["#count"]</code> is <code>undefined</code>, and reaching for
<code>#count</code> from outside the class body is a <em>syntax</em> error, much
like PHP throwing an <code>Error</code> for touching a private property from
outside the class — except JavaScript catches the mistake before the code even
runs. That is why <code>Object.keys(c)</code> lists only <code>label</code>.
Static members live on the class object itself (<code>Counter.instances</code>),
not on instances, so <code>this.instances</code> inside a method would be
<code>undefined</code> — reference the class by name, the same instinct PHP
trains with <code>self::$instances</code> instead of <code>$this->instances</code>.
And unlike PHP's <code>getValue()</code>, JavaScript's <code>get value()</code>
is accessed without parentheses — <code>c.value</code>, not <code>c.value()</code> —
even though a real method call is running behind the scenes.</p>`,
};
