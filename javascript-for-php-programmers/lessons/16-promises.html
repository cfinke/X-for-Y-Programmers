  number: 16,
  title: "Promises",

  intro: `
<p>PHP has nothing built into the language quite like a Promise. The closest
things you've used are probably synchronous — a function just returns its
result or throws — or, if you've touched ReactPHP or Amp, a promise-like
object of your own. JavaScript's Promise is a plain object with a settled
state (<em>pending</em>, <em>fulfilled</em>, or <em>rejected</em>) and a
value, and every asynchronous-looking API in the language hands you one.
There's no type system checking what's inside it; <code>then</code> hands you
whatever the previous step actually produced.</p>
<table>
  <tr><th>PHP</th><th>JavaScript</th></tr>
  <tr><td>a function that just <code>return</code>s <code>1</code></td><td><code>Promise.resolve(1)</code> — value is just <code>1</code>, but wrapped</td></tr>
  <tr><td><code>throw new Exception(...)</code></td><td><code>Promise.reject(new Error(...))</code> — a rejection, not an exception yet</td></tr>
  <tr><td><code>try { ... } catch (Exception $e) { ... }</code></td><td><code>promise.catch((e) => ...)</code> or <code>try/await/catch</code></td></tr>
  <tr><td><code>[$a, $b]</code> from two sequential calls</td><td><code>Promise.all([...])</code> resolves to a plain array</td></tr>
</table>
<p>Two runtime facts worth knowing up front. First, <code>then</code> always
returns a <em>new</em> Promise, and if your callback returns a value that value
becomes the next Promise's fulfillment — returning a Promise flattens it, there
is no "Promise of a Promise." Second, a <code>throw</code> inside a
<code>then</code> callback turns into a rejection of the returned Promise, which
is why <code>catch</code> can sit at the end of a chain and catch anything above
it — much like a single <code>catch</code> block in PHP can catch an exception
thrown from deep inside a call chain.</p>`,

  php: `<?php
function double(int $n): int {
  return $n * 2;
}

function safeDivide(int $a, int $b): float {
  if ($b === 0) {
    throw new Exception("divide by zero");
  }
  return $a / $b;
}

function firstDone(array $tasks): mixed {
  // PHP has no built-in equivalent of Promise.race;
  // this just runs them in order and returns the first result.
  foreach ($tasks as $task) {
    return $task();
  }
}`,

  task: `
<p>Everything here settles immediately — no timers. Build a few functions that
exercise the Promise API, written as plain runtime JavaScript.</p>
<ol>
  <li><code>double(n)</code> — return a Promise that <strong>fulfills</strong> with
      <code>n * 2</code> (use <code>Promise.resolve</code>).</li>
  <li><code>safeDivide(a, b)</code> — return a Promise. If <code>b</code> is
      <code>0</code>, <strong>reject</strong> with <code>new Error("divide by zero")</code>
      (use <code>Promise.reject</code>); otherwise resolve with <code>a / b</code>.</li>
  <li><code>chainDouble(n)</code> — call <code>double(n)</code> and use
      <code>.then(...)</code> to return a Promise that fulfills with the doubled
      value <em>plus 1</em>.</li>
  <li><code>divideOrDefault(a, b, fallback)</code> — call <code>safeDivide</code>
      and use <code>.catch(...)</code> so that on rejection it fulfills with
      <code>fallback</code> instead.</li>
  <li><code>sumAll(promises)</code> — use <code>Promise.all</code> to wait for an
      array of number-promises, then resolve with their sum.</li>
  <li><code>describeSettled(promises)</code> — use <code>Promise.allSettled</code>
      and resolve with an array of strings: <code>"ok:&lt;value&gt;"</code> for each
      fulfilled entry and <code>"err:&lt;message&gt;"</code> for each rejected one.</li>
</ol>`,

`,

  exportNames: ["double", "safeDivide", "chainDouble", "divideOrDefault", "sumAll", "describeSettled"],

  requirements: [
    { pattern: /Promise\.resolve/, message: "Use Promise.resolve" },
    { pattern: /Promise\.reject/, message: "Use Promise.reject for the divide-by-zero case" },
    { pattern: /\.then\s*\(/, message: "Use .then to chain in chainDouble" },
    { pattern: /\.catch\s*\(/, message: "Use .catch in divideOrDefault" },
    { pattern: /Promise\.all\b/, message: "Use Promise.all in sumAll" },
    { pattern: /Promise\.allSettled/, message: "Use Promise.allSettled in describeSettled" },
  ],

  tests: [
    { name: "double(21) fulfills with 42", run: async (x) => expectEqual(await x.double(21), 42) },
    { name: "safeDivide(10, 2) fulfills with 5", run: async (x) => expectEqual(await x.safeDivide(10, 2), 5) },
    {
      name: "safeDivide(1, 0) rejects with the right message",
      run: async (x) => {
        let msg = null;
        await x.safeDivide(1, 0).catch((e) => { msg = e.message; });
        expectEqual(msg, "divide by zero");
      },
    },
    { name: "chainDouble(20) fulfills with 41", run: async (x) => expectEqual(await x.chainDouble(20), 41) },
    { name: "divideOrDefault(8, 2, -1) fulfills with 4", run: async (x) => expectEqual(await x.divideOrDefault(8, 2, -1), 4) },
    { name: "divideOrDefault(8, 0, -1) falls back to -1", run: async (x) => expectEqual(await x.divideOrDefault(8, 0, -1), -1) },
    {
      name: "sumAll resolves the total",
      run: async (x) => expectEqual(await x.sumAll([Promise.resolve(1), Promise.resolve(2), Promise.resolve(3)]), 6),
    },
    {
      name: "describeSettled reports ok and err entries",
      run: async (x) => expectDeepEqual(
        await x.describeSettled([Promise.resolve(7), Promise.reject(new Error("nope"))]),
        ["ok:7", "err:nope"]

    },
  ],

  solution: `function double(n) {
  return Promise.resolve(n * 2);
}

function safeDivide(a, b) {
  if (b === 0) return Promise.reject(new Error("divide by zero"));
  return Promise.resolve(a / b);
}

function chainDouble(n) {
  return double(n).then((d) => d + 1);
}

function divideOrDefault(a, b, fallback) {
  return safeDivide(a, b).catch(() => fallback);
}

function sumAll(promises) {
  return Promise.all(promises).then((values) => values.reduce((t, v) => t + v, 0));
}

function describeSettled(promises) {
  return Promise.allSettled(promises).then((results) =>
    results.map((r) =>
      r.status === "fulfilled" ? "ok:" + r.value : "err:" + r.reason.message
    )
  );
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Already-settled value</td><td>just <code>return 1;</code> — no wrapping</td><td><code>Promise.resolve(1)</code></td></tr>
  <tr><td>Rejection value</td><td>a thrown <code>Exception</code></td><td>whatever you rejected with, caught by <code>catch</code></td></tr>
  <tr><td>Chaining</td><td>sequential statements, one after another</td><td><code>then</code> returns a new Promise; returned values flatten</td></tr>
  <tr><td>Wait for all</td><td>call each function in turn and collect the results</td><td><code>Promise.all</code> resolves to a plain array, rejects on first failure</td></tr>
  <tr><td>Wait for all, keep errors</td><td>wrap each call in its own <code>try/catch</code></td><td><code>Promise.allSettled</code> → <code>{status, value|reason}[]</code>, never rejects</td></tr>
  <tr><td>First to settle</td><td>no built-in equivalent</td><td><code>Promise.race</code> settles with the first result, win or lose</td></tr>
</table>
<p>Reach for <code>Promise.all</code> when you need every result and one failure
should sink the whole thing — much like letting an uncaught PHP
<code>Exception</code> abort the rest of a script. Reach for
<code>Promise.allSettled</code> when you want to inspect each outcome
individually, the way you might wrap each call in its own <code>try/catch</code>
to keep going after a failure; its result objects are <code>{ status:
"fulfilled", value }</code> or <code>{ status: "rejected", reason }</code>.
<code>Promise.race</code> settles as soon as the first input does, whether that
first one fulfills or rejects — PHP has nothing built-in that matches this.</p>
<p>Runtime gotcha PHP programmers often trip over: <code>Promise.reject(x)</code>
creates an already-rejected Promise, and if nothing ever attaches a
<code>catch</code> to it you get an "unhandled rejection" warning instead of a
script-halting fatal error — nothing forces you to handle it the way PHP's
uncaught-exception behavior does. And because a thrown error inside
<code>then</code> becomes a rejection, a single trailing <code>.catch</code>
(or <code>try/await/catch</code>) covers the whole chain above it, similar to
one <code>catch</code> block catching an exception thrown several calls deep.</p>`,
};
