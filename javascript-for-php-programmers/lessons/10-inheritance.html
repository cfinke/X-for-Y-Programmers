<script>
const LESSON = {
  number: 10,
  title: "Inheritance",

  intro: `
<p>The <code>class</code> syntax you use in PHP has a real runtime
counterpart in JavaScript — <code>extends</code>, method overriding, and
<code>instanceof</code> all exist at runtime in both languages, and PHP's
<code>instanceof</code> works essentially the same way JavaScript's does.
What's different is everything <em>around</em> the class machinery: PHP's
visibility keywords (<code>public</code>/<code>private</code>/<code>protected</code>),
promoted constructor properties, <code>abstract</code> classes that PHP
actually refuses to instantiate, and interfaces (<code>implements</code>) all
have no equivalent in JavaScript.</p>
<table>
  <tr><th>PHP</th><th>JavaScript</th></tr>
  <tr><td><code>class Dog extends Animal {}</code></td><td><code>class Dog extends Animal {}</code> (same)</td></tr>
  <tr><td><code>__construct(public string $breed)</code> (promoted property)</td><td>you assign <code>this.breed</code> yourself</td></tr>
  <tr><td><code>protected string $name;</code></td><td>just a normal public property</td></tr>
  <tr><td><code>abstract class</code> / <code>abstract function speak();</code> (engine refuses to instantiate)</td><td>no such thing — plain class, nothing stops you from skipping an override</td></tr>
  <tr><td><code>parent::__construct()</code> — forgetting it is <em>not</em> an error</td><td>engine throws if you touch <code>this</code> before calling <code>super()</code></td></tr>
</table>
<p>One runtime rule is stricter in JavaScript than in PHP: in a subclass
constructor you must call <code>super(...)</code> before you read or write
<code>this</code> — the engine throws a <code>ReferenceError</code>
otherwise. PHP has no equivalent check; skipping <code>parent::__construct()</code>
just silently leaves the parent's setup undone. <code>instanceof</code>,
though, behaves the same way you already expect from PHP: it walks the
class/prototype chain, so a <code>Dog</code> is genuinely an
<code>Animal</code> at run time.</p>`,

  php: `<?php
class Animal {
  public function __construct(public string $name) {}

  public function speak(): string {
    return "{$this->name} makes a sound";
  }

  public function describe(): string {
    return "{$this->name} is an animal";
  }
}

class Dog extends Animal {
  public function __construct(string $name, public string $breed) {
    parent::__construct($name);
  }

  public function speak(): string {
    return "{$this->name} barks";
  }

  public function describe(): string {
    return parent::describe() . ", specifically a {$this->breed}";
  }
}`,

  task: `
<p>Build the same class hierarchy in plain JavaScript — no promoted
constructor properties, no visibility keywords (assign fields yourself):</p>
<ol>
  <li>A base class <code>Animal</code> whose constructor takes <code>name</code>
      and stores it on <code>this.name</code>. Give it <code>speak()</code>
      returning <code>"&lt;name&gt; makes a sound"</code> and
      <code>describe()</code> returning <code>"&lt;name&gt; is an animal"</code>.</li>
  <li>A subclass <code>Dog</code> that <code>extends Animal</code>. Its
      constructor takes <code>name</code> and <code>breed</code>, calls
      <code>super(name)</code>, then stores <code>this.breed</code>. Override
      <code>speak()</code> to return <code>"&lt;name&gt; barks"</code>, and
      override <code>describe()</code> to call <code>super.describe()</code> and
      append <code>", specifically a &lt;breed&gt;"</code>.</li>
  <li>A function <code>identify(x)</code> that returns <code>"dog"</code> if
      <code>x</code> is a <code>Dog</code>, <code>"animal"</code> if it is any
      other <code>Animal</code>, and <code>"unknown"</code> otherwise — using
      <code>instanceof</code>.</li>
</ol>`,

  starter: `// 1. Base class
class Animal {
  constructor(name) {
    // TODO: store name
  }
  speak() {
    // TODO
    return "";
  }
  describe() {
    // TODO
    return "";
  }
}

// 2. Subclass that overrides and calls super
class Dog extends Animal {
  constructor(name, breed) {
    // TODO: call super, then store breed
  }
  speak() {
    // TODO
    return "";
  }
  describe() {
    // TODO: reuse super.describe()
    return "";
  }
}

// 3. identify(x) using instanceof
function identify(x) {
  // TODO
  return "";
}
`,

  exportNames: ["Animal", "Dog", "identify"],

  requirements: [
    { pattern: /class\s+Dog\s+extends\s+Animal/, message: "Dog must extend Animal" },
    { pattern: /super\s*\(/, message: "Call super(...) in the Dog constructor" },
    { pattern: /super\.describe\s*\(/, message: "Dog.describe() must call super.describe()" },
    { pattern: /instanceof/, message: "Use instanceof inside identify" },
  ],

  tests: [
    { name: 'Animal.speak() uses the base behavior', run: (x) => expectEqual(new x.Animal("Rex").speak(), "Rex makes a sound") },
    { name: 'Dog overrides speak()', run: (x) => expectEqual(new x.Dog("Rex", "Lab").speak(), "Rex barks") },
    { name: 'super(name) sets the inherited field', run: (x) => expectEqual(new x.Dog("Rex", "Lab").name, "Rex") },
    { name: 'Dog.describe() calls super.describe()', run: (x) => expectEqual(new x.Dog("Rex", "Lab").describe(), "Rex is an animal, specifically a Lab") },
    { name: 'a Dog is an Animal (prototype chain)', run: (x) => expectTruthy(new x.Dog("Rex", "Lab") instanceof x.Animal) },
    { name: 'identify distinguishes Dog, Animal, and other', run: (x) => {
        expectEqual(x.identify(new x.Dog("Rex", "Lab")), "dog");
        expectEqual(x.identify(new x.Animal("Generic")), "animal");
        expectEqual(x.identify(42), "unknown");
    } },
  ],

  solution: `class Animal {
  constructor(name) {
    this.name = name;
  }
  speak() {
    return \`\${this.name} makes a sound\`;
  }
  describe() {
    return \`\${this.name} is an animal\`;
  }
}

class Dog extends Animal {
  constructor(name, breed) {
    super(name);
    this.breed = breed;
  }
  speak() {
    return \`\${this.name} barks\`;
  }
  describe() {
    return \`\${super.describe()}, specifically a \${this.breed}\`;
  }
}

function identify(x) {
  if (x instanceof Dog) return "dog";
  if (x instanceof Animal) return "animal";
  return "unknown";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>JavaScript</th></tr>
  <tr><td>Subclass</td><td><code>class Dog extends Animal</code></td><td><code>class Dog extends Animal</code> (same)</td></tr>
  <tr><td>Base constructor</td><td><code>parent::__construct($name)</code></td><td><code>super(name)</code> (same idea, but required before touching <code>this</code>)</td></tr>
  <tr><td>Field from a param</td><td><code>__construct(public string $breed)</code></td><td><code>this.breed = breed;</code></td></tr>
  <tr><td>Call base method</td><td><code>parent::describe()</code></td><td><code>super.describe()</code> (same idea)</td></tr>
  <tr><td>Runtime type test</td><td><code>$x instanceof Animal</code></td><td><code>x instanceof Animal</code> (same idea)</td></tr>
</table>
<p>Order matters in <code>identify</code>: check <code>instanceof Dog</code> before
<code>instanceof Animal</code>, because a <code>Dog</code> passes both — that is
what inheritance means at runtime, in JavaScript exactly as in PHP.
<code>instanceof</code> is checking whether <code>Animal.prototype</code>
appears anywhere on <code>x</code>'s prototype chain, the JavaScript
equivalent of walking PHP's class hierarchy.</p>
<p>One gotcha that catches PHP programmers off guard: in PHP, forgetting
<code>parent::__construct()</code> is not an error — the parent's
initialization simply never runs, and you might not notice until later code
reads an uninitialized property. JavaScript is stricter: the engine throws
<code>ReferenceError: must call super constructor</code> the instant you touch
<code>this</code> without having called <code>super()</code> first — you
cannot forget it silently. And unlike PHP's <code>private</code>/<code>protected</code>,
which the engine enforces at run time, JavaScript has no runtime-checked
visibility keywords at all — every field you set with plain <code>class</code>
syntax is publicly reachable; naming conventions or true <code>#private</code>
fields are your only real fences.</p>`,
};
