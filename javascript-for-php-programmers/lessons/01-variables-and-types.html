<title>Lesson 1: Variables & Types</title>

<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Coming from PHP, the syntax will look familiar in places but the rules
underneath are different. This course is about what your code does at
<em>runtime</em> in JavaScript's engine, not PHP's. Start with the smallest
change: variables lose their <code>$</code> sigil and their loose typing
rules change shape.</p>
<table>
  <tr><th>PHP</th><th>JavaScript</th></tr>
  <tr><td><code>$age = 36;</code></td><td><code>let age = 36;</code></td></tr>
  <tr><td><code>$name = "Ada";</code></td><td><code>const name = "Ada";</code></td></tr>
  <tr><td><code>gettype($x)</code> at run time</td><td><code>typeof x</code> checked at run time</td></tr>
</table>
<p>Like PHP, JavaScript is dynamically typed — a variable's "type" is just
whatever value it holds right now, and nothing stops it changing.
<code>let x = 1; x = "one";</code> is perfectly legal JavaScript, the same way
<code>$x = 1; $x = "one";</code> is legal PHP. Two habits carry you a long
way: reach for <code>const</code> by default (PHP has no exact equivalent for
variables — the closest is <code>define()</code> or <code>const</code> inside a
class, but JavaScript's <code>const</code> works on ordinary local variables),
and use the <code>typeof</code> operator when you genuinely need to know what
you are holding, the way you'd reach for <code>gettype()</code> in PHP.</p>`,

  php: `<?php
$age = 36;
$userName = "Ada";

function describe(string $name, int $age): string {
  return "$name is $age";
}`,

  task: `
<p>Write the equivalent JavaScript version of the same code:</p>
<ol>
  <li>Declare a constant <code>userName</code> = <code>"Ada"</code> and a
      variable <code>userAge</code> = <code>36</code> — no <code>$</code>
      sigils, and use <code>let</code> for <code>userAge</code>.</li>
  <li>Write <code>describe(name, age)</code> that returns a string like
      <code>"Ada is 36"</code> using a template literal (JavaScript's
      equivalent of PHP's double-quoted string interpolation).</li>
  <li>Write <code>typeOf(value)</code> that returns the JavaScript
      <code>typeof</code> string for whatever it is given — JavaScript's
      answer to PHP's <code>gettype()</code>.</li>
</ol>`,

  starter: `// 1. userName (const) and userAge (let) — no annotations


// 2. describe(name, age) -> "<name> is <age>"
function describe(name, age) {
  // TODO
  return "";
}

// 3. typeOf(value) -> the typeof string, e.g. "number"
function typeOf(value) {
  // TODO
  return "";
}
`,

  exportNames: ["userName", "userAge", "describe", "typeOf"],

  requirements: [
    { pattern: /const\s+userName/, message: "Declare userName with const" },
    { pattern: /let\s+userAge/, message: "Declare userAge with let" },
    { pattern: /typeof/, message: "Use the typeof operator inside typeOf" },
  ],

  tests: [
    { name: 'userName is "Ada"', run: (x) => expectEqual(x.userName, "Ada") },
    { name: "userAge is 36", run: (x) => expectEqual(x.userAge, 36) },
    { name: 'describe("Ada", 36) returns "Ada is 36"', run: (x) => expectEqual(x.describe("Ada", 36), "Ada is 36") },
    { name: 'describe("Rob", 68) returns "Rob is 68"', run: (x) => expectEqual(x.describe("Rob", 68), "Rob is 68") },
    { name: 'typeOf(1) is "number"', run: (x) => expectEqual(x.typeOf(1), "number") },
    { name: 'typeOf("a") is "string"', run: (x) => expectEqual(x.typeOf("a"), "string") },
    { name: 'typeOf(true) is "boolean"', run: (x) => expectEqual(x.typeOf(true), "boolean") },
  ],

  solution: `const userName = "Ada";
let userAge = 36;

function describe(name, age) {
  return \`\${name} is \${age}\`;
}

function typeOf(value) {
  return typeof value;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>JavaScript</th></tr>
  <tr><td>Variable declaration</td><td><code>$x = 1;</code></td><td><code>let x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>define('X', 1);</code> or <code>const X = 1;</code> (class only)</td><td><code>const x = 1;</code> (works on any local variable)</td></tr>
  <tr><td>Runtime type check</td><td><code>gettype($x)</code></td><td><code>typeof x</code></td></tr>
  <tr><td>Reassign a new type</td><td>allowed at runtime</td><td>allowed at runtime (same)</td></tr>
</table>
<p><code>typeof</code> returns one of a small set of strings: <code>"number"</code>,
<code>"string"</code>, <code>"boolean"</code>, <code>"undefined"</code>,
<code>"object"</code>, <code>"function"</code>, <code>"symbol"</code>, and
<code>"bigint"</code>. Its famous wart: <code>typeof null === "object"</code> —
a quirk not unlike PHP's own <code>gettype(null)</code> returning
<code>"NULL"</code> rather than something more predictable. Where PHP splits
numbers into <code>int</code> and <code>float</code> (<code>gettype(1)</code>
is <code>"integer"</code>, <code>gettype(1.5)</code> is <code>"double"</code>),
JavaScript has just one numeric type, and <code>typeof</code> reports both as
<code>"number"</code>.</p>`,
};
