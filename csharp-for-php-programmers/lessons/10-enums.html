  intro: `
<p>In PHP you probably reach for a handful of string or int constants
(<code>const LOW = "low"; const MEDIUM = "medium"; const HIGH = "high";</code>)
or a class of class-constants far more often than PHP's own <code>enum</code>
keyword, which only arrived in PHP 8.1 and is still relatively new territory
for a lot of codebases. C# enums are the opposite: they're a first-class,
everyday tool that has been around since the beginning. An <code>enum</code>
is a named set of integer constants — a real value type backed by
<code>int</code> (by default) that you can cast, switch on, and combine with
bitwise operators.</p>
<table>
  <tr><th>PHP</th><th>C#</th></tr>
  <tr><td><code>enum Priority { case Low; case Medium; case High; }</code></td><td><code>enum Priority { Low, Medium, High }</code></td></tr>
  <tr><td><code>Priority::High-&gt;value</code> is <code>2</code></td><td><code>(int)Priority.High</code> is <code>2</code></td></tr>
  <tr><td><code>Priority::High-&gt;name</code> → <code>"High"</code></td><td><code>Priority.High.ToString()</code> → <code>"High"</code></td></tr>
  <tr><td>parse: <code>Priority::from($value)</code></td><td><code>Enum.Parse(typeof(Priority), "High")</code></td></tr>
  <tr><td>bit flags: hand-rolled numbers</td><td><code>[Flags]</code> + <code>|</code> <code>&amp;</code></td></tr>
</table>
<p>Members auto-number from <code>0</code>, but you can assign explicit
underlying values (<code>Low = 1</code>). Casting is explicit in both directions:
<code>(int)p</code> and <code>(Priority)n</code>. For a set of independent
on/off options, tag the enum with <code>[Flags]</code>, give members
power-of-two values, and combine them with <code>|</code> / test them with
<code>&amp;</code>.</p>`,

  task: `
<p>Model task priorities and file permissions with enums. Two top-level enums and

  solution: `enum Priority {
  Low = 1,
  Medium = 2,
  High = 3,
}

[Flags]
enum Access {
  None = 0,
  Read = 1,
  Write = 2,
  Execute = 4,
}

static class Enums {
  public static int ToInt(Priority p) {
    return (int)p;
  }

  public static Priority FromInt(int n) {
    return (Priority)n;
  }

  public static Priority Parse(string s) {
    return (Priority)Enum.Parse(typeof(Priority), s);
  }

  public static string Describe(Priority p) {
    switch (p) {
      case Priority.Low:
        return "can wait";
      case Priority.Medium:
        return "soon";
      case Priority.High:
        return "now";
      default:
        return "unknown";
    }
  }

  public static bool CanWrite(Access a) {
    return (a & Access.Write) == Access.Write;
  }

  public static Access Grant(Access a, Access flag) {
    return a | flag;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C#</th></tr>
  <tr><td>Declare</td><td><code>enum P { case Low; case Medium; case High; }</code></td><td><code>enum P { Low, Medium, High }</code></td></tr>
  <tr><td>Explicit value</td><td><code>case Low = 1;</code> (backed enum)</td><td><code>Low = 1</code></td></tr>
  <tr><td>To number</td><td><code>$p-&gt;value</code></td><td><code>(int)p</code></td></tr>
  <tr><td>From number</td><td><code>P::from($n)</code></td><td><code>(P)n</code></td></tr>
  <tr><td>To name</td><td><code>$p-&gt;name</code></td><td><code>p.ToString()</code></td></tr>
  <tr><td>From name</td><td><code>constant("P::High")</code></td><td><code>Enum.Parse(typeof(P), "High")</code></td></tr>
  <tr><td>Bit flags</td><td>manual numbers</td><td><code>[Flags]</code>, <code>|</code>, <code>&amp;</code></td></tr>
</table>
<p>A few things worth knowing. Casting from <code>int</code> is unchecked — an
undefined value like <code>(Priority)99</code> won't throw, so validate with
<code>Enum.IsDefined(typeof(Priority), n)</code> when the number comes from
outside. <code>Enum.Parse</code> throws on an unknown name; use
<code>Enum.TryParse</code> for the safe path.</p>
<p>The <code>switch</code> here is a <em>statement</em> — each
<code>case</code> ends in <code>return</code> (or would need <code>break</code>),
and C# forbids fall-through between non-empty cases. C# also has a
<em>switch expression</em> (<code>p =&gt; ...</code>), but that arrived after the
version this course targets, so stick with the statement form.</p>
<p><code>[Flags]</code> doesn't change how the enum stores bits — it only makes
<code>ToString()</code> render combinations as <code>"Read, Write"</code> instead
of a bare number. The real work is done by giving each member a distinct power of
two and combining them with bitwise <code>|</code> (set), <code>&amp;</code>
(test), and <code>&amp; ~</code> (clear). <code>a.HasFlag(Access.Write)</code> is
a readable alternative to the <code>&amp;</code> test.</p>`,
