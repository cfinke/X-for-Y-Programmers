  title: "Equality & Comparable",

  intro: `
<p>In PHP, <code>==</code> on two objects compares the class and every property
value — a built-in structural check — while <code>===</code> is strict identity,
true only when both variables point at the same instance. Sorting an array of
objects means writing a comparator and passing it to <code>usort()</code>
yourself; PHP has no interface that <code>sort()</code> consults automatically.
C# lets a type define what equality and ordering <em>mean</em>. You override a
handful of members, and then <code>==</code>, <code>.Equals()</code>,
hash-based collections, and <code>List&lt;T&gt;.Sort()</code> all cooperate with
your type.</p>
<table>
  <tr><th>PHP</th><th>C#</th></tr>
  <tr><td><code>$a == $b</code> (built-in structural check)</td><td><code>a == b</code> (you can define it)</td></tr>
  <tr><td><code>$a->equals($b)</code> (your own method)</td><td><code>a.Equals(b)</code> via <code>IEquatable&lt;T&gt;</code></td></tr>
  <tr><td>hand-rolled string key for a cache array</td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td><code>usort($arr, fn($a, $b) =&gt; $a->compareTo($b))</code></td><td><code>list.Sort()</code> via <code>IComparable&lt;T&gt;</code></td></tr>
</table>
<p>The one firm rule: <strong>if you override <code>Equals</code>, you must also
override <code>GetHashCode</code></strong>, and equal objects must return equal
hash codes — otherwise <code>Dictionary</code> and <code>HashSet</code> will lose
your keys. Implement <code>IEquatable&lt;T&gt;</code> for a strongly-typed,
allocation-free <code>Equals(T)</code>, and <code>IComparable&lt;T&gt;</code> so
sorting and <code>SortedSet</code> know the order. Overloading <code>==</code> is
a nicety layered on top of <code>Equals</code>.</p>`,

  php: `class SemVer {
  public function __construct(
    public readonly int $major,
    public readonly int $minor,
    public readonly int $patch,
  ) {}

  public function equals(SemVer $o): bool {
    return $this->major === $o->major && $this->minor === $o->minor && $this->patch === $o->patch;
  }

  public function compareTo(SemVer $o): int {
    return $this->major <=> $o->major ?: $this->minor <=> $o->minor ?: $this->patch <=> $o->patch;
  }
}

$versions = [new SemVer(1, 2, 0), new SemVer(1, 0, 5)];
usort($versions, fn($a, $b) => $a->compareTo($b)); // PHP needs an explicit comparator`,

  solution: `class SemVer : IEquatable<SemVer>, IComparable<SemVer> {
  public int Major { get; }
  public int Minor { get; }
  public int Patch { get; }

  public SemVer(int major, int minor, int patch) {
    Major = major;
    Minor = minor;
    Patch = patch;
  }

  public bool Equals(SemVer other) {
    if (ReferenceEquals(other, null)) return false;
    return Major == other.Major && Minor == other.Minor && Patch == other.Patch;
  }

  public override bool Equals(object obj) {
    return Equals(obj as SemVer);
  }

  public override int GetHashCode() {
    unchecked {
      int hash = 17;
      hash = hash * 31 + Major;
      hash = hash * 31 + Minor;
      hash = hash * 31 + Patch;
      return hash;
    }
  }

  public int CompareTo(SemVer other) {
    if (ReferenceEquals(other, null)) return 1;
    int c = Major.CompareTo(other.Major);
    if (c != 0) return c;
    c = Minor.CompareTo(other.Minor);
    if (c != 0) return c;
    return Patch.CompareTo(other.Patch);
  }

  public static bool operator ==(SemVer a, SemVer b) {
    if (ReferenceEquals(a, b)) return true;
    if (ReferenceEquals(a, null) || ReferenceEquals(b, null)) return false;
    return a.Equals(b);
  }

  public static bool operator !=(SemVer a, SemVer b) {
    return !(a == b);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C#</th></tr>
  <tr><td>Value equality</td><td><code>==</code> (built-in) or hand-written <code>equals()</code></td><td><code>IEquatable&lt;T&gt;</code> + <code>Equals</code> overrides</td></tr>
  <tr><td>Hashing a key</td><td>serialize into a string array key</td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td>Ordering</td><td><code>usort($arr, fn($a, $b) =&gt; …)</code> comparator</td><td><code>IComparable&lt;T&gt;.CompareTo</code></td></tr>
  <tr><td>Operator</td><td>can't overload <code>==</code></td><td><code>operator ==</code> / <code>!=</code></td></tr>
</table>
<p>The <code>Equals</code>/<code>GetHashCode</code> pair is the part people forget.
Hash-based collections first bucket by hash code, then confirm with
<code>Equals</code> — so two objects that are <code>Equals</code> but hash
differently will land in different buckets and never be found. Keeping the hash
in sync with the fields you compare is what makes <code>HashSet</code> and
<code>Dictionary</code> keys work — a stricter discipline than PHP, where nothing
ties a hand-written <code>equals()</code> to the string key you happen to build
for a cache array.</p>
<p><code>CompareTo</code> returns a sign, not a boolean: negative means "I sort
before <code>other</code>", zero means "equal order", positive means "after" —
the same convention as PHP's <code>&lt;=&gt;</code> spaceship operator, which is
exactly why the sample solution chains it with <code>?:</code>. Delegating to
each field's own <code>CompareTo</code> (<code>Major.CompareTo(…)</code>) gives
you correct results for free. Once <code>IComparable&lt;T&gt;</code> is in place,
<code>List&lt;T&gt;.Sort()</code>, <code>Array.Sort</code>, and
<code>SortedSet&lt;T&gt;</code> all use it with no comparator argument — you never
write another <code>usort()</code> callback for this type. On modern .NET you'd
usually let a <code>record</code> generate all of this, but records don't exist
in C# 7.3 — writing it by hand shows exactly what they generate.</p>`,
