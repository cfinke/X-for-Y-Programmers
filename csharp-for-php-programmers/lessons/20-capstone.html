<p>Time to put the whole course together. You'll build a small
<strong>typed in-memory repository</strong> — the same shape you'd reach for in
PHP with an associative array keyed by id, wrapped in a class, but assembled
from the C# tools you've collected: a generic class with a constraint, an
interface, LINQ, and real exceptions instead of returning <code>null</code>.</p>
<table>
  <tr><th>PHP</th><th>C#</th></tr>
  <tr><td><code>class Repository implements ...</code></td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td><code>private array $items = [];</code></td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td><code>array_values($items)</code> then <code>array_filter(...)</code></td><td><code>items.Values.Where(...)</code> (LINQ)</td></tr>
  <tr><td><code>throw new NotFoundException(...)</code></td><td><code>throw new NotFoundException(...)</code></td></tr>
  <tr><td>return <code>?T</code> (nullable) or <code>null</code></td><td>return <code>T</code>, or <em>throw</em></td></tr>
</table>
<p>Two design habits carry over cleanly. The generic <em>constraint</em>
(<code>where T : IEntity</code>) is C#'s answer to PHP's lack of true generics —
in PHP you'd only be able to document with a docblock (<code>@template T of Entity</code>)
that every stored value has an <code>id</code>; C# actually enforces it at compile
time, so the repository can read <code>item.Id</code> knowing every <code>T</code>
is guaranteed to have it. And where PHP code often returns <code>null</code> for a
miss (or relies on the caller remembering to check), idiomatic C# throws a custom
exception derived from <code>Exception</code> — the caller either gets a valid
<code>T</code> or a failure it can <code>catch</code> by type.</p>`,

  php: `interface Entity {
    public function getId(): int;
}

class NotFoundError extends Exception {}

class Repository {
    /** @var array<int, Entity> */
    private array $items = [];

    public function add(Entity $item): void {
        if (array_key_exists($item->getId(), $this->items)) {
            throw new Exception("id {$item->getId()} already exists");
        }
        $this->items[$item->getId()] = $item;
    }

    public function get(int $id): Entity {
        if (!array_key_exists($id, $this->items)) {
            throw new NotFoundError("id {$id} not found");
        }
        return $this->items[$id];
    }

    public function where(callable $predicate): array {
        $matches = array_values(array_filter($this->items, $predicate));
        usort($matches, fn($a, $b) => $a->getId() <=> $b->getId());
        return $matches;
    }

    public function count(): int {
        return count($this->items);
    }
}`,

  solution: `interface IEntity {
  int Id { get; }
}

class NotFoundException : Exception {
  public NotFoundException(string message) : base(message) {
  }
}

class Repository<T> where T : IEntity {
  private Dictionary<int, T> items = new Dictionary<int, T>();

  public void Add(T item) {
    if (items.ContainsKey(item.Id)) {
      throw new InvalidOperationException($"id {item.Id} already exists");
    }
    items[item.Id] = item;
  }

  public T Get(int id) {
    T value;
    if (!items.TryGetValue(id, out value)) {
      throw new NotFoundException($"id {id} not found");
    }
    return value;
  }

  public bool Remove(int id) {
    return items.Remove(id);
  }

  public List<T> Where(Func<T, bool> predicate) {
    return items.Values.Where(predicate).OrderBy(x => x.Id).ToList();
  }

  public int Count {
    get { return items.Count; }
  }
}

class User : IEntity {
  public int Id { get; private set; }
  public string Name { get; private set; }
  public int Age { get; private set; }

  public User(int id, string name, int age) {
    Id = id;
    Name = name;
    Age = age;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C#</th></tr>
  <tr><td>Constrained generic</td><td>no true generics — a docblock hint at best</td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td>Keyed store</td><td><code>array $items = []</code></td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td>Safe lookup</td><td><code>array_key_exists($id, $items)</code> then index</td><td><code>TryGetValue(id, out value)</code></td></tr>
  <tr><td>Filter</td><td><code>array_filter($arr, $p)</code></td><td><code>seq.Where(p)</code> (LINQ)</td></tr>
  <tr><td>Custom error</td><td><code>class E extends Exception</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Catch by type</td><td><code>catch (E $e) { }</code></td><td><code>catch (E ex) { }</code></td></tr>
</table>
<p>A few things came together here. <code>where T : IEntity</code> is what unlocks
<code>item.Id</code> inside the generic — without the constraint the compiler only
knows <code>T</code> is <em>some</em> type and would reject the member access. PHP
has no equivalent enforcement mechanism: you could write a repository that assumes
every element has an <code>id</code> property, but nothing stops you from adding an
object that doesn't, and the failure only shows up at runtime. The LINQ chain
<code>Where(...).OrderBy(...).ToList()</code> is lazy until <code>ToList()</code>
forces it, mirroring how you'd <code>array_filter</code> then sort an array in PHP,
except C# builds the whole pipeline before materializing it.</p>
<p>The big idiomatic shift from PHP is error handling: rather than returning
<code>null</code> and making every caller remember to check (PHP won't stop you from
forgetting), C# code throws a typed exception on the exceptional path. Callers
<code>catch</code> by exception type — <code>catch (NotFoundException ex)</code> —
which is both more precise and more discoverable than a loosely-typed
<code>catch (Exception $e)</code> with manual <code>instanceof</code> checks. That's
the whole course in one small object: types that are real and enforced at compile
time, generics with constraints, interfaces as contracts, LINQ for querying, and
exceptions for failure.</p>`,
