<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Java and TypeScript are cousins — both statically typed, both class-friendly —
but Java asks for the types up front and almost everywhere. There is no
structural typing, and locals only get inference through <code>var</code>
(Java 10+).</p>
<table>
  <tr><th>TypeScript</th><th>Java</th></tr>
  <tr><td><code>let age: number = 36;</code></td><td><code>int age = 36;</code></td></tr>
  <tr><td><code>const name = "Ada";</code></td><td><code>final String name = "Ada";</code></td></tr>
  <tr><td><code>number</code> (one numeric type)</td><td><code>int</code>, <code>long</code>, <code>double</code>, … (distinct)</td></tr>
  <tr><td>top-level functions</td><td>methods live inside a class</td></tr>
</table>
<p>Two adjustments matter most. First, TypeScript's single <code>number</code>
splits into Java's <code>int</code>, <code>long</code>, <code>double</code> and
friends — and the split is load-bearing: <code>7 / 2</code> is <code>3</code>
(integer division), while <code>7 / 2.0</code> is <code>3.5</code>. Second, Java
has no free functions — every method belongs to a class, so a page of helpers
becomes a class full of <code>static</code> methods.</p>`,

  typescript: `let age: number = 36;
const userName: string = "Ada";

function describe(name: string, age: number): string {
  return \`\${name} is \${age}\`;
}`,

  task: `
<p>Write the Java version. Java has no top-level functions, so put your methods
in a class:</p>
<ol>
  <li>Declare a class <code>Basics</code> holding <code>static</code> methods.</li>
  <li><code>add(int a, int b)</code> returns their sum.</li>
  <li><code>describe(String name, int age)</code> returns a string like
      <code>"Ada is 36"</code>.</li>
  <li><code>divide(int a, int b)</code> returns a <code>double</code>, so
      <code>divide(7, 2)</code> is <code>3.5</code>, not <code>3</code>. Cast one
      operand: <code>(double) a / b</code>.</li>
</ol>`,

  starter: `class Basics {
  static int add(int a, int b) {
    return 0; // TODO
  }

  static String describe(String name, int age) {
    return ""; // TODO
  }

  static double divide(int a, int b) {
    return 0; // TODO: watch out for integer division
  }
}
`,

  requirements: [
    { pattern: /class\s+Basics/, message: "Declare a class named Basics" },
    { pattern: /static/, message: "Give Basics static methods" },
    { pattern: /\(double\)/, message: "Cast to (double) so divide returns a fractional result" },
  ],

  tests: [
    { name: "add(2, 3) is 5", code: "      expect_eq(Basics.add(2, 3), 5);" },
    { name: 'describe("Ada", 36) is "Ada is 36"', code: "      expect_eq(Basics.describe(\"Ada\", 36), \"Ada is 36\");" },
    { name: 'describe("Rob", 68) is "Rob is 68"', code: "      expect_eq(Basics.describe(\"Rob\", 68), \"Rob is 68\");" },
    { name: "divide(7, 2) is 3.5", code: "      expect_eq(Basics.divide(7, 2), 3.5);" },
    { name: "divide(10, 4) is 2.5", code: "      expect_eq(Basics.divide(10, 4), 2.5);" },
  ],

  solution: `class Basics {
  static int add(int a, int b) {
    return a + b;
  }

  static String describe(String name, int age) {
    return name + " is " + age;
  }

  static double divide(int a, int b) {
    return (double) a / b;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Java</th></tr>
  <tr><td>Typed local</td><td><code>let x: number = 1;</code></td><td><code>int x = 1;</code></td></tr>
  <tr><td>Inferred local</td><td><code>let x = 1;</code></td><td><code>var x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>const x = 1;</code></td><td><code>final int x = 1;</code></td></tr>
  <tr><td>Numeric types</td><td><code>number</code></td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>float</code>…</td></tr>
  <tr><td>Free function</td><td><code>function f() {}</code></td><td><code>static</code> method in a class</td></tr>
</table>
<p>The numeric split is the classic first surprise: <code>int / int</code> throws
away the remainder. Promote one side to <code>double</code> (a cast, a literal
like <code>2.0</code>, or a <code>double</code> variable) and the whole
expression becomes floating point. TypeScript never made you think about it;
Java always does.</p>`,
};
