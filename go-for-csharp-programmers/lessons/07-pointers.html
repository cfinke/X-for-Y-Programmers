  title: "Pointers",

  intro: `
<p>C# has pointers too, but you rarely touch them: they're locked behind
<code>unsafe</code> blocks. Instead, C# hides the reference/value split behind
its type system — classes are reference types (handed around by reference, so
a method that writes to a parameter's field mutates the caller's object) and
structs and primitives (<code>int</code>, <code>string</code> is actually a
reference type but immutable, <code>bool</code>) are value types, copied on
assignment and by default when passed. Go makes this split explicit with
pointers, everywhere, all the time.</p>
<p>A pointer is a value that holds the address of another value. <code>&x</code>
takes the address of <code>x</code>; <code>*p</code> <em>dereferences</em> —
reads or writes the value at that address. The type <code>*int</code> means
"pointer to an int". Every pointer's zero value is <code>nil</code> (Go's
<code>null</code>), and dereferencing a <code>nil</code> pointer panics, so you
guard with <code>if p == nil</code>.</p>
<table>
  <tr><th>C#</th><th>Go</th></tr>
  <tr><td>class instances passed by reference</td><td><code>*T</code> pointer, taken with <code>&amp;x</code></td></tr>
  <tr><td><code>ref</code> / <code>out</code> parameter</td><td><code>*p</code> reads/writes the pointee</td></tr>
  <tr><td><code>null</code></td><td><code>nil</code> (the zero value of a pointer)</td></tr>
  <tr><td>value types (<code>int</code>, <code>struct</code>) always copied</td><td><code>func f(p *int)</code> can mutate the caller's int</td></tr>
  <tr><td>class method mutates the object implicitly</td><td>pointer receiver <code>func (a *T) M()</code></td></tr>
</table>
<p>Go copies arguments by default, so to let a function change a caller's value you
pass a pointer to it — much like C#'s <code>ref</code> parameter, except a Go
pointer is a first-class value you can store, return, and pass around freely. The
same idea drives <strong>pointer receivers</strong>: a method declared on
<code>*T</code> can mutate the struct it is called on, while a method on
<code>T</code> only sees a copy — this is the difference between a C# class
(always reference semantics) and a C# struct (value semantics unless you mutate
through a <code>ref</code>). Go conveniently lets you call a pointer method on an
addressable value: <code>a.Deposit(50)</code> is shorthand for
<code>(&amp;a).Deposit(50)</code>. There is no pointer arithmetic in Go — you can
only take an address, dereference it, or compare against <code>nil</code>.</p>`,

  csharp: `// Classes: mutation through a reference works.
class AccountRef { public int Balance; }
void Deposit(AccountRef a, int amount) {
    a.Balance += amount;
}

// Value types: copied, so this can't touch the caller's variable,
// unless you use 'ref'.
void Double(int n) {
    n = n * 2; // no effect outside
}
void DoubleRef(ref int n) {
    n = n * 2; // this does affect the caller
}`,

  solution: `func Double(p *int) {
	*p = *p * 2
}

type Account struct {
	Balance int
}

func (a *Account) Deposit(amount int) {
	a.Balance += amount
}

func ValueOr(p *int, fallback int) int {
	if p == nil {
		return fallback
	}
	return *p
}

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Go</th></tr>
  <tr><td>Take an address</td><td>(implicit for class refs; <code>ref x</code> for value types)</td><td><code>p := &amp;x</code></td></tr>
  <tr><td>Read the pointee</td><td>—</td><td><code>v := *p</code></td></tr>
  <tr><td>Write the pointee</td><td>—</td><td><code>*p = 10</code></td></tr>
  <tr><td>Null pointer</td><td><code>null</code></td><td><code>nil</code></td></tr>
  <tr><td>Mutate caller's value</td><td><code>void f(ref int p)</code></td><td><code>func f(p *int)</code></td></tr>
  <tr><td>Mutating method</td><td><code>this.x = …</code> (classes only)</td><td><code>func (a *T) M()</code></td></tr>
</table>
<p>Rules of thumb: use a <strong>pointer receiver</strong> when a method needs to
modify the struct (or when the struct is large and you want to avoid copying it),
and be consistent — if one method on a type uses a pointer receiver, give them all
pointer receivers. When you build a struct you plan to mutate, keep a pointer to it
(<code>a := &amp;Account{}</code>) so every method call shares the same value —
this is the same discipline C# gives you for free with classes, but Go structs
default to value semantics, so you have to opt in. And because a <code>nil</code>
pointer panics on dereference, treat <code>*p</code> the way you'd treat a possibly
<code>null</code> reference in C#: check first (or use <code>p != null</code>-style
guards) unless you know it's set.</p>`,
