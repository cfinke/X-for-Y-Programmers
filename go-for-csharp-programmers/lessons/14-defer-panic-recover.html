const LESSON = {
  number: 14,
  title: "Defer, Panic & Recover",

  intro: `
<p>Go's cleanup and error-escape-hatch trio maps onto C#'s
<code>try/finally</code> and <code>throw/catch</code>, but the mechanics differ.
<code>defer</code> schedules a call to run when the surrounding function returns —
like a <code>finally</code> block you can write anywhere, and stack. Deferred calls
run in <strong>LIFO</strong> order: the last one deferred runs first.</p>
<table>
  <tr><th>C#</th><th>Go</th></tr>
  <tr><td><code>try { … } finally { Cleanup(); }</code></td><td><code>defer cleanup()</code></td></tr>
  <tr><td><code>throw new Exception("boom")</code></td><td><code>panic("boom")</code></td></tr>
  <tr><td><code>catch (Exception e) { … }</code></td><td><code>recover()</code> (only inside a deferred func)</td></tr>
</table>
<p><code>panic</code> unwinds the stack like an uncaught exception and crashes the
program — unless a deferred function calls <code>recover()</code>, which stops the
unwinding and hands you the panic value. The idiomatic pattern is to
<strong>recover in a deferred closure and assign to a named return value</strong>,
converting a panic into an ordinary <code>error</code> the caller can handle. Unlike
C#, you cannot <code>recover</code> at an arbitrary point — it only works
from within a <code>defer</code>.</p>`,

  csharp: `int SafeDivide(int a, int b) {
    try {
        if (b == 0) throw new DivideByZeroException("division by zero");
        return a / b;
    } catch (DivideByZeroException) {
        return 0; // recover to a safe result
    }
}`,

  task: `
<p>Write these package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>LIFO() []int</code> — use a loop from 1 to 3 that <code>defer</code>s
      appending each number to a named return slice. Because defers run last-in
      first-out, the result must be <code>[]int{3, 2, 1}</code>.</li>
  <li><code>Divide(a, b int) int</code> — return <code>a / b</code>, but if
      <code>b</code> is <code>0</code>, <code>panic("division by zero")</code>.</li>
  <li><code>SafeDivide(a, b int) (result int, err error)</code> — call
      <code>Divide</code>, and use a deferred closure with <code>recover()</code> to
      turn any panic into a returned <code>error</code>. On success return the
      quotient and <code>nil</code>; on a recovered panic <code>result</code> stays
      <code>0</code> and <code>err</code> is non-nil.</li>
</ol>`,

  starter: `func LIFO() (out []int) {
	return nil // TODO: defer appends in a loop
}

func Divide(a, b int) int {
	return 0 // TODO: panic when b == 0
}

func SafeDivide(a, b int) (result int, err error) {
	return 0, nil // TODO: recover a panic into err
}
`,

  requirements: [
    { pattern: /defer/, message: "Use defer (in LIFO and in SafeDivide)" },
    { pattern: /panic\(/, message: "Call panic in Divide" },
    { pattern: /recover\(/, message: "Call recover inside a deferred func in SafeDivide" },
  ],

  tests: [
    { name: "LIFO() is [3 2 1] (last deferred runs first)", code: "\t\texpect_eq(LIFO(), []int{3, 2, 1})" },
    { name: "Divide(6, 2) is 3", code: "\t\texpect_eq(Divide(6, 2), 3)" },
    { name: "SafeDivide(6, 2) is (3, nil)", code: "\t\tr, err := SafeDivide(6, 2)\n\t\texpect_eq(r, 3)\n\t\texpect_true(err == nil)" },
    { name: "SafeDivide(10, 0) recovers to (0, error)", code: "\t\tr, err := SafeDivide(10, 0)\n\t\texpect_eq(r, 0)\n\t\texpect_true(err != nil)" },
  ],

  solution: `func LIFO() (out []int) {
	for i := 1; i <= 3; i++ {
		defer func(n int) {
			out = append(out, n)
		}(i)
	}
	return out
}

func Divide(a, b int) int {
	if b == 0 {
		panic("division by zero")
	}
	return a / b
}

func SafeDivide(a, b int) (result int, err error) {
	defer func() {
		if r := recover(); r != nil {
			err = fmt.Errorf("%v", r)
		}
	}()
	result = Divide(a, b)
	return result, nil
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Go</th></tr>
  <tr><td>Cleanup on exit</td><td><code>finally { … }</code></td><td><code>defer f()</code></td></tr>
  <tr><td>Run order</td><td>single block</td><td>LIFO across all defers</td></tr>
  <tr><td>Raise</td><td><code>throw</code></td><td><code>panic</code></td></tr>
  <tr><td>Catch</td><td><code>catch (Exception e)</code> anywhere</td><td><code>recover()</code> in a defer only</td></tr>
  <tr><td>Idiomatic error flow</td><td>exceptions</td><td>return <code>error</code> values</td></tr>
</table>
<p>The named-return trick is the key: assigning to <code>err</code> from inside the
deferred closure changes what <code>SafeDivide</code> returns, because the return
values already have names the defer can reach. Reserve <code>panic</code> for truly
exceptional, unrecoverable situations — Go's culture strongly prefers explicit
<code>error</code> returns for anything a caller might reasonably handle. A common
real-world use of <code>recover</code> is at a boundary, like an HTTP handler, so one
bad request cannot crash the whole server.</p>`,
};
