  title: "Enumerators & Lazy",

  intro: `
<p>Go 1.23 finally gave you iterators: range-over-func, where a sequence is a
<code>func(yield func(T) bool)</code> and you write the protocol yourself —
check <code>yield</code>'s return value, remember to stop, wire up the
break-propagation. Ruby's <code>Enumerator</code> is the same idea with the
protocol hidden: <code>Enumerator.new { |y| ... y &lt;&lt; value ... }</code>
hands you a <em>yielder</em> object, you shovel values into it, and the
consumer's demand drives the block. No bool to check, no channels, no
goroutine to leak if the consumer stops early.</p>
<table>
  <tr><th>Go</th><th>Ruby</th></tr>
  <tr><td><code>func(yield func(int) bool)</code></td><td><code>Enumerator.new { |y| ... }</code></td></tr>
  <tr><td><code>if !yield(v) { return }</code></td><td><code>y &lt;&lt; v</code> (suspension is automatic)</td></tr>
  <tr><td><code>for v := range seq { ... break }</code></td><td><code>seq.first(n)</code>, <code>seq.take(5)</code></td></tr>
  <tr><td>infinite loop + manual <code>break</code></td><td><code>(1..Float::INFINITY).lazy</code></td></tr>
  <tr><td>chunking: index arithmetic</td><td><code>arr.each_slice(2)</code></td></tr>
</table>
<p>For infinite sequences you often don't even need an Enumerator:
<code>(1..Float::INFINITY).lazy.select { ... }.first(5)</code> chains
<code>map</code>/<code>select</code> over an endless range, <em>demand-driven</em>
— <code>.lazy</code> makes each stage pull one element at a time instead of
materializing arrays, and <code>.first(n)</code> stops the whole pipeline
after n results. It's the pull-based iterator pattern you'd hand-build with
range-over-func (or, worse, channels), as a one-liner.</p>`,

  go: `// Go 1.23 range-over-func: the iterator protocol, visible.
func Fib(yield func(int) bool) {
	a, b := 0, 1
	for {
		if !yield(a) { // consumer said stop — our job to notice
			return
		}
		a, b = b, a+b
	}
}

func main() {
	fibs := []int{}
	for f := range Fib {
		fibs = append(fibs, f)
		if len(fibs) == 8 {
			break
		}
	}
	fmt.Println(fibs) // [0 1 1 2 3 5 8 13]
}`,

</ol>`,

    { name: "pairs([1, 2, 3, 4, 5]) returns [[1, 2], [3, 4], [5]]",

  solution: `def multiples_of(k, count)
  (1..Float::INFINITY).lazy.select { |n| n % k == 0 }.first(count)
end

def fibonacci(count)
  fibs = Enumerator.new do |y|
    a, b = 0, 1
    loop do
      y << a
      a, b = b, a + b
    end
  end
  fibs.first(count)
end

def pairs(arr)
  arr.each_slice(2).to_a
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Ruby</th></tr>
  <tr><td>Custom iterator</td><td><code>func(yield func(T) bool)</code></td><td><code>Enumerator.new { |y| y &lt;&lt; v }</code></td></tr>
  <tr><td>Stop signal</td><td><code>if !yield(v) { return }</code>, by hand</td><td>automatic — the yielder suspends</td></tr>
  <tr><td>Infinite source</td><td><code>for { ... }</code> + <code>break</code></td><td><code>(1..Float::INFINITY)</code>, <code>loop do</code></td></tr>
  <tr><td>Demand-driven pipeline</td><td>hand-rolled, or channels + goroutines</td><td><code>.lazy.map { }.select { }.first(n)</code></td></tr>
  <tr><td>Take n</td><td>counter + <code>break</code></td><td><code>.first(n)</code> / <code>.take(n)</code></td></tr>
  <tr><td>Chunking</td><td>index arithmetic over a slice</td><td><code>each_slice(n)</code>, <code>each_cons(n)</code></td></tr>
</table>
<p>Without <code>.lazy</code>, each Enumerable stage eagerly builds a whole
array before the next begins — mapping an infinite range would hang. With it,
one element flows through the entire chain at a time, and <code>first(n)</code>
shuts the pipeline down — the same early-exit guarantee that range-over-func
encodes in <code>yield</code>'s bool, with none of the plumbing. Every
<code>each_*</code> method called without a block returns an Enumerator, so
<code>arr.each_slice(2)</code> is itself a lazy-ish sequence you can chain
before materializing with <code>.to_a</code>.</p>`,
