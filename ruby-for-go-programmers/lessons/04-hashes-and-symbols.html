  title: "Hashes & Symbols",

  intro: `
<p>Go's <code>map[string]int</code> becomes Ruby's <code>Hash</code> — but
the idiomatic keys aren't strings. They're <strong>symbols</strong>:
<code>:apples</code> is an interned identifier, created once and reused, so
comparing two symbols is a pointer comparison instead of a string comparison.
The literal <code>{ apples: 3, bananas: 5 }</code> is shorthand for
<code>{ :apples =&gt; 3, :bananas =&gt; 5 }</code>. Writing goes the way you
expect (<code>h[k] = v</code>), but reading replaces the comma-ok idiom:
where Go writes <code>v, ok := m[k]</code> and branches, Ruby's
<code>h.fetch(k, 0)</code> folds the lookup and the default into one call —
or plain <code>h[k]</code> returns <code>nil</code> for a missing key rather
than a zero value.</p>
<table>
  <tr><th>Go</th><th>Ruby</th></tr>
  <tr><td><code>map[string]int{"apples": 3}</code></td><td><code>{ apples: 3 }</code> (symbol keys)</td></tr>
  <tr><td><code>m[k] = v</code></td><td><code>h[k] = v</code></td></tr>
  <tr><td><code>v, ok := m[k]; if !ok { v = 0 }</code></td><td><code>h.fetch(k, 0)</code></td></tr>
  <tr><td>missing key → zero value</td><td><code>h[k]</code> → <code>nil</code></td></tr>
  <tr><td><code>for k, v := range m</code> (random order!)</td><td><code>h.each { |k, v| ... }</code> (insertion order)</td></tr>
</table>
<p>One guarantee Go deliberately withholds, Ruby gives you for free: hashes
iterate in <strong>insertion order</strong>, every time — Go randomizes range
order precisely so you can't depend on it. And one gotcha to carry from day
one: <code>h[:name]</code> and <code>h["name"]</code> are different keys.
JSON parsing gives you string keys; literals give you symbols; mixing them up
produces <code>nil</code>s that look like missing data.</p>`,

  go: `package main

import "fmt"

func buildInventory() map[string]int {
	return map[string]int{"apples": 3, "bananas": 5}
}

func getCount(inv map[string]int, name string) int {
	if n, ok := inv[name]; ok {
		return n
	}
	return 0
}

// Non-mutating: copy, then bump.
func addStock(inv map[string]int, name string, n int) map[string]int {
	out := make(map[string]int, len(inv)+1)
	for k, v := range inv {
		out[k] = v
	}
	out[name] += n
	return out
}

func main() {
	inv := buildInventory()
	for name, count := range inv { // order is randomized on purpose
		fmt.Println(name, count)
	}
}`,

  task: `
<p>Rewrite the Go on the left as Ruby:</p>
<ol>

</ol>`,

  solution: `def build_inventory
  # { apples: 3 } is shorthand for { :apples => 3 } — symbol keys either way.
  { apples: 3, bananas: 5 }
end

def get_count(inv, name)
  inv.fetch(name, 0)
end

def add_stock(inv, name, n)
  inv.merge(name => inv.fetch(name, 0) + n)
end

def item_names(inv)
  inv.keys
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Ruby</th></tr>
  <tr><td>Literal</td><td><code>map[string]int{"a": 1}</code></td><td><code>{ a: 1 }</code>, i.e. <code>{ :a =&gt; 1 }</code></td></tr>
  <tr><td>Key type of choice</td><td>strings</td><td>symbols — <code>:a</code> is interned, cheaper than <code>"a"</code></td></tr>
  <tr><td>Read with default</td><td><code>v, ok := m[k]</code> + branch</td><td><code>h.fetch(k, 0)</code></td></tr>
  <tr><td>Missing key</td><td>zero value (silently!)</td><td><code>h[k]</code> → <code>nil</code>; bare <code>h.fetch(k)</code> raises</td></tr>
  <tr><td>Write</td><td><code>m[k] = v</code></td><td><code>h[k] = v</code></td></tr>
  <tr><td>Iterate</td><td><code>for k, v := range m</code> — random order</td><td><code>h.each { |k, v| ... }</code> — insertion order</td></tr>
  <tr><td>Copy + update</td><td>make + range loop</td><td><code>h.merge(k =&gt; v)</code></td></tr>
</table>
<p>Notice the reversal on missing keys: Go hands you a zero value and makes
you opt <em>in</em> to noticing (<code>ok</code>); Ruby hands you
<code>nil</code> — or, with one-argument <code>fetch</code>, an exception —
and makes you opt in to a default. Same problem, opposite defaults. Keep the
<code>:name</code> vs <code>"name"</code> distinction in mind whenever data
crosses a JSON boundary.</p>`,
