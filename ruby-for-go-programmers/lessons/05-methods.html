<script>
const LESSON = {
  number: 5,
  title: "Methods & Implicit Return",

  intro: `
<p>Go's <code>func f(x int) string { return ... }</code> becomes Ruby's
<code>def f(x) ... end</code> — no parameter types, no result type, and,
the big one, no <code>return</code>: a method's value is whatever its
<strong>last expression</strong> evaluates to. Every explicit
<code>return</code> you'd write in Go simply disappears; the keyword survives
only for early exits. Multiple return values become an array —
<code>[quotient, remainder]</code> — destructured on assignment:
<code>q, r = divmod(a, b)</code>.</p>
<table>
  <tr><th>Go</th><th>Ruby</th></tr>
  <tr><td><code>func f(x int) string { return s }</code></td><td><code>def f(x) ... s ... end</code> (last expression)</td></tr>
  <tr><td>no default parameters</td><td><code>def greet(name, greeting = "Hello")</code></td></tr>
  <tr><td><code>(int, error)</code> / multiple results</td><td><code>[a, b]</code>, destructured: <code>q, r = divmod(x, y)</code></td></tr>
  <tr><td>functional-options pattern</td><td>keyword arguments: <code>def create(name:, age: 0)</code></td></tr>
  <tr><td><code>IsAdult(age int) bool</code></td><td><code>adult?(age)</code></td></tr>
</table>
<p>Then Ruby hands you two things Go deliberately left out. Default
parameter values: <code>greeting = "Hello"</code> in the signature replaces
the wrapper-function workaround. And <strong>keyword arguments</strong>:
<code>def full_name(first:, last: nil)</code> gives you named, reorderable,
defaultable parameters — the functional-options pattern as a language
feature instead of a page of <code>WithX</code> closures. A bare
<code>first:</code> is required; <code>last: nil</code> is optional. Add the
naming conventions — <code>?</code> for predicates, <code>!</code> for
"mutates or raises" — and a Ruby signature carries a surprising amount of
what Go encodes in types.</p>`,

  go: `package main

import "fmt"

// No default parameters in Go — so: a wrapper.
func greet(name, greeting string) string {
	return fmt.Sprintf("%s, %s!", greeting, name)
}

func greetHello(name string) string {
	return greet(name, "Hello")
}

// No keyword arguments either — so: an options struct.
type NameOpts struct {
	First string
	Last  string // "" means no last name
}

func fullName(o NameOpts) string {
	if o.Last == "" {
		return o.First
	}
	return o.First + " " + o.Last
}

func isAdult(age int) bool {
	return age >= 18
}`,

  task: `
<p>Rewrite the Go as Ruby — three methods replace five
declarations, and no <code>return</code> keyword appears anywhere:</p>
<ol>
  <li><code>greet(name, greeting = "Hello")</code> — the default parameter
      makes <code>greetHello</code> unnecessary. Produce
      <code>"Hello, Ada!"</code> (or <code>"Howdy, Ada!"</code> when a
      greeting is passed) as the last expression.</li>
  <li><code>full_name(first:, last: nil)</code> — keyword arguments replace
      the options struct. If <code>last</code> is <code>nil</code>, the
      result is just <code>first</code>; otherwise
      <code>"first last"</code>. (A ternary or trailing <code>if</code>
      works — every branch is an expression.)</li>
  <li><code>adult?(age)</code> — true when <code>age &gt;= 18</code>. The
      comparison itself is the last expression; the <code>?</code> replaces
      the <code>Is</code> prefix.</li>
</ol>`,

  starter: `# 1. greet: the default value lives in the signature — no wrapper needed.
#    greet("Ada") -> "Hello, Ada!", greet("Ada", "Howdy") -> "Howdy, Ada!"
def greet(name, greeting = "Hello")
  raise NotImplementedError, "TODO: implement greet"
end

# 2. full_name: keyword args — first: is required, last: defaults to nil.
#    The last expression is the value; nothing here needs a keyword to exit.
def full_name(first:, last: nil)
  raise NotImplementedError, "TODO: implement full_name"
end

# 3. adult?: a predicate — the comparison itself is the method body.
def adult?(age)
  raise NotImplementedError, "TODO: implement adult?"
end
`,

  requirements: [
    { pattern: /=\s*"Hello"/, message: 'Give greeting a default value of "Hello" in the signature' },
    { pattern: /\w+:/, message: "Define full_name with keyword arguments (first:, last:)" },
    { pattern: /def\s+adult\?/, message: "Name the predicate adult? — with the question mark" },
    { pattern: /^(?:(?!\breturn\b)[\s\S])*$/, message: "No return keyword — the last expression is the return value" },
  ],

  tests: [
    { name: 'greet("Ada") uses the default: "Hello, Ada!"',
      code: '  expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'greet("Ada", "Howdy") returns "Howdy, Ada!"',
      code: '  expect_eq(greet("Ada", "Howdy"), "Howdy, Ada!")' },
    { name: 'full_name(first: "Grace", last: "Hopper") returns "Grace Hopper"',
      code: '  expect_eq(full_name(first: "Grace", last: "Hopper"), "Grace Hopper")' },
    { name: 'full_name(first: "Prince") returns "Prince"',
      code: '  expect_eq(full_name(first: "Prince"), "Prince")' },
    { name: "keyword arguments can be passed in any order",
      code: '  expect_eq(full_name(last: "Hopper", first: "Grace"), "Grace Hopper")' },
    { name: "adult?(18) is true, adult?(17) is false",
      code: "  expect_true(adult?(18))\n  expect_eq(adult?(17), false)" },
  ],

  solution: `def greet(name, greeting = "Hello")
  "#{greeting}, #{name}!"
end

def full_name(first:, last: nil)
  last ? "#{first} #{last}" : first
end

def adult?(age)
  age >= 18
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Ruby</th></tr>
  <tr><td>Define</td><td><code>func f(x int) string { ... }</code></td><td><code>def f(x) ... end</code></td></tr>
  <tr><td>Result</td><td><code>return</code>, always explicit</td><td>last expression; <code>return</code> only for early exit</td></tr>
  <tr><td>Default values</td><td>not in the language</td><td><code>def greet(name, greeting = "Hello")</code></td></tr>
  <tr><td>Named options</td><td>options struct / functional options</td><td><code>def create(name:, age: 0)</code> — <code>name:</code> required, <code>age:</code> optional</td></tr>
  <tr><td>Multiple results</td><td><code>(int, int)</code></td><td><code>[q, r]</code>, then <code>q, r = divmod(a, b)</code></td></tr>
  <tr><td>Predicate</td><td><code>IsAdult(age) bool</code></td><td><code>adult?(age)</code></td></tr>
  <tr><td>Dangerous variant</td><td>—</td><td><code>sort!</code>, <code>save!</code> — mutates or raises</td></tr>
</table>
<p>Implicit return is why Ruby methods read like a chain of values rather
than a sequence of steps: an <code>if</code>/<code>else</code>, a
<code>case</code>, even a whole begin/rescue is an expression, and whichever
branch runs last <em>is</em> the result. Go would call that too clever;
Ruby calls Go's version too noisy. Both are right — which is the honest
summary of this entire course.</p>`,
};
