  number: 12,
  title: "Sealed Classes",

  intro: `
<p>PHP has no built-in way to say "this value is one of a fixed set of shapes."
The idiomatic approximation is an array (or object) with a string
<code>'kind'</code> key, matched with PHP 8's <code>match</code> expression — or
a plain class hierarchy checked with a chain of <code>instanceof</code>. Nothing
stops another developer from adding a new <code>'kind'</code> value, or a new
subclass, without updating every place that switches on it. Kotlin's equivalent
is a <strong>sealed class</strong> (or <strong>sealed interface</strong>): a type
whose subclasses are all known at compile time because they must live in the
same file/module.</p>
<table>
  <tr><th>PHP</th><th>Kotlin</th></tr>
  <tr><td>array shape <code>['kind' => 'circle', ...]</code></td><td><code>sealed class Shape</code></td></tr>
  <tr><td><code>['kind' => 'circle', 'radius' => 1.0]</code></td><td><code>class Circle : Shape()</code></td></tr>
  <tr><td><code>match ($shape['kind'])</code></td><td><code>when (s) { is Circle -&gt; ... }</code></td></tr>
  <tr><td>tag check <code>$shape['kind'] === 'circle'</code></td><td>type check <code>is Circle</code></td></tr>
</table>
<p>The payoff is <em>exhaustiveness</em>. Because the compiler knows the complete
list of subtypes, a <code>when</code> that covers them all needs <strong>no
<code>else</code> branch</strong> — and if you later add a fourth subclass, every
<code>when</code> used as an expression stops compiling until you handle it. It is
the same safety some PHP teams chase with PHPStan or Psalm exhaustiveness
checks, enforced here directly by the compiler instead of a static-analysis
plugin.</p>`,

  php: `// Shape is one of:
//   ['kind' => 'circle', 'radius' => float]
//   ['kind' => 'rectangle', 'width' => float, 'height' => float]
//   ['kind' => 'triangle', 'base' => float, 'height' => float]

function area(array $shape): float {
    return match ($shape['kind']) {
        'circle' => M_PI * $shape['radius'] ** 2,
        'rectangle' => $shape['width'] * $shape['height'],
        'triangle' => 0.5 * $shape['base'] * $shape['height'],
    };
}`,

  task: `
<p>The <code>Shape</code> hierarchy is already declared for you (a
<code>sealed class</code> with three subclasses). Fill in the two functions using
an exhaustive <code>when</code> — inside each <code>is Circle</code> branch the
value is smart-cast, so you can read <code>shape.radius</code> directly:</p>
<ol>
  <li>Complete <code>area(shape: Shape): Double</code>. Match each subtype with
      <code>is</code> and return its area (<code>PI * r * r</code> for a circle,
      <code>width * height</code> for a rectangle, <code>0.5 * base * height</code>
      for a triangle). Do <strong>not</strong> add an <code>else</code> branch.</li>
  <li>Complete <code>name(shape: Shape): String</code> to return
      <code>"circle"</code>, <code>"rectangle"</code>, or <code>"triangle"</code>.</li>
</ol>`,

  starter: `import kotlin.math.PI

`,

  requirements: [
    { pattern: /sealed\s+class\s+Shape/, message: "Keep the sealed class Shape hierarchy" },
    { pattern: /when\s*\(/, message: "Match the shape with a when expression" },
    { pattern: /is\s+Circle/, message: "Branch on the subtype with `is Circle` (and friends)" },
  ],

  tests: [
    { name: "area of a rectangle", code: "        expect_eq(area(Rectangle(3.0, 4.0)), 12.0)" },
    { name: "area of a triangle", code: "        expect_eq(area(Triangle(4.0, 3.0)), 6.0)" },
    { name: "area of a circle uses PI", code: "        expect_true(area(Circle(1.0)) > 3.14 && area(Circle(1.0)) < 3.15)" },
    { name: 'name(Circle) is "circle"', code: "        expect_eq(name(Circle(2.0)), \"circle\")" },
    { name: 'name(Rectangle) is "rectangle"', code: "        expect_eq(name(Rectangle(1.0, 2.0)), \"rectangle\")" },
    { name: 'name(Triangle) is "triangle"', code: "        expect_eq(name(Triangle(1.0, 2.0)), \"triangle\")" },
  ],

  solution: `import kotlin.math.PI

sealed class Shape
class Circle(val radius: Double) : Shape()
class Rectangle(val width: Double, val height: Double) : Shape()
class Triangle(val base: Double, val height: Double) : Shape()

fun area(shape: Shape): Double = when (shape) {
    is Circle -> PI * shape.radius * shape.radius
    is Rectangle -> shape.width * shape.height
    is Triangle -> 0.5 * shape.base * shape.height
}

fun name(shape: Shape): String = when (shape) {
    is Circle -> "circle"
    is Rectangle -> "rectangle"
    is Triangle -> "triangle"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Kotlin</th></tr>
  <tr><td>Closed set of types</td><td>array with a <code>'kind'</code> key (or a class hierarchy)</td><td><code>sealed class</code> / <code>sealed interface</code></td></tr>
  <tr><td>Variant</td><td><code>['kind' => 'circle', ...]</code></td><td><code>class Circle(...) : Shape()</code></td></tr>
  <tr><td>Match</td><td><code>match ($shape['kind'])</code></td><td><code>when (s) { is Circle -&gt; }</code></td></tr>
  <tr><td>Narrowing</td><td>none — read by array key</td><td>smart cast after <code>is</code></td></tr>
  <tr><td>Exhaustiveness</td><td>none at compile time (<code>UnhandledMatchError</code> at runtime)</td><td>built in — no <code>else</code></td></tr>
</table>
<p>A <code>when</code> used as an <em>expression</em> (as here, on the right of
<code>=</code>) is checked for exhaustiveness; a <code>when</code> used only as a
statement is not, so prefer the expression form to get the safety. PHP's
<code>match()</code> only catches a missing case at runtime, by throwing
<code>UnhandledMatchError</code> — Kotlin catches the same mistake at compile
time instead. The same pattern models a <code>Result</code>:
<code>sealed class Result&lt;out T&gt;</code> with
<code>class Ok&lt;T&gt;(val value: T)</code> and
<code>class Err(val message: String)</code>, then <code>when</code> over it.
Variants that carry no data can be <code>object</code> singletons (e.g.
<code>object Loading : Result&lt;Nothing&gt;()</code>) instead of classes.</p>`,
