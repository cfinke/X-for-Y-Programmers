const LESSON = {
  number: 9,
  title: "Classes",

  intro: `
<p>Go does not have classes at all — it has structs with methods attached
via receivers. A JavaScript <code>class</code> bundles state and behavior the
way a Go struct plus its methods do, but the mechanisms underneath are quite
different. Go has no <code>private</code>/<code>public</code> keywords per
field; visibility is a naming convention the compiler enforces at the
<em>package</em> boundary — a capitalized identifier is exported, a
lowercase one is not. An unexported field like <code>count</code> is
invisible outside its package, but fully accessible to any code
<em>inside</em> that package — nothing stops another file in the same
package from reading <code>c.count</code> directly.</p>
<table>
  <tr><th>Go</th><th>JavaScript</th></tr>
  <tr><td><code>balance int</code> (lowercase = unexported)</td><td><code>#balance;</code> (truly private) or a plain field</td></tr>
  <tr><td><code>func NewCounter(x int) *Counter { return &amp;Counter{x: x} }</code></td><td>no parameter properties — assign <code>this.x</code> yourself</td></tr>
  <tr><td>no <code>readonly</code>; convention/comment only</td><td>plain field (no runtime enforcement)</td></tr>
  <tr><td><code>func (c *Counter) Area() float64 { … }</code> (plain method)</td><td><code>get area() { … }</code> (same idea, getter syntax)</td></tr>
  <tr><td>package-level <code>var count int</code> (no true statics)</td><td><code>static count = 0;</code></td></tr>
</table>
<p>If you actually want a field that outside code cannot read or write —
not even from the same package — JavaScript gives you <code>#private</code>
fields, a real runtime feature scoped to the individual class body. That
is stricter than anything Go's unexported fields offer, and it is the one
class feature with no direct Go analogue, so it is worth getting
comfortable with.</p>`,

  go: `package counter

import "fmt"

type Counter struct {
	label    string
	count    int
}

var instances int

func NewCounter(label string, start int) *Counter {
	instances++
	return &Counter{label: label, count: start}
}

func (c *Counter) Increment() int {
	c.count++
	return c.count
}

func (c *Counter) Value() int {
	return c.count
}

func (c *Counter) Describe() string {
	return fmt.Sprintf("%s: %d", c.label, c.count)
}

func ResetInstances() {
	instances = 0
}`,

  task: `
<p>Write the JavaScript <code>class</code> equivalent of the Go
<code>Counter</code> struct above. Instead of an unexported struct field and
a package-level variable, use JavaScript's own encapsulation and
class-level tools: a <code>#private</code> field and a <code>static</code>
field.</p>
<ol>
  <li>A <code>constructor(label, start = 0)</code> that stores the label and
      seeds a <strong><code>#count</code> private field</strong> from
      <code>start</code>. It must also bump a
      <strong><code>static instances</code> field</strong> each time an instance
      is created.</li>
  <li>An instance method <code>increment()</code> that adds 1 to
      <code>#count</code> and returns the new value.</li>
  <li>A <strong>getter</strong> <code>value</code> that returns the current
      <code>#count</code>.</li>
  <li>An instance method <code>describe()</code> returning
      <code>"&lt;label&gt;: &lt;count&gt;"</code>, e.g. <code>"hits: 3"</code>.</li>
  <li>A <strong>static method</strong> <code>reset()</code> that sets
      <code>Counter.instances</code> back to <code>0</code>.</li>
</ol>
<p>Export the class as <code>Counter</code>.</p>`,

  starter: `class Counter {
  // static field: total instances created

  // #private field: the current count

  constructor(label, start = 0) {
    // TODO: store label, seed #count from start, bump the static counter
  }

  increment() {
    // TODO: add 1 to #count and return the new value
  }

  get value() {
    // TODO: return the current count
  }

  describe() {
    // TODO: return "<label>: <count>"
    return "";
  }

  static reset() {
    // TODO: set instances back to 0
  }
}
`,

  exportNames: ["Counter"],

  requirements: [
    { pattern: /#count/, message: "Use a #private field named #count" },
    { pattern: /static\s+instances/, message: "Declare a static field named instances" },
    { pattern: /get\s+value\s*\(/, message: "Define a getter named value" },
    { pattern: /static\s+reset\s*\(/, message: "Define a static method named reset" },
  ],

  tests: [
    {
      name: "constructor seeds count and value getter reads it",
      run: (x) => {
        const c = new x.Counter("hits", 5);
        expectEqual(c.value, 5);
      },
    },
    {
      name: "start defaults to 0",
      run: (x) => {
        const c = new x.Counter("hits");
        expectEqual(c.value, 0);
      },
    },
    {
      name: "increment returns the new value and mutates count",
      run: (x) => {
        const c = new x.Counter("hits", 0);
        expectEqual(c.increment(), 1);
        expectEqual(c.increment(), 2);
        expectEqual(c.value, 2);
      },
    },
    {
      name: "describe formats label and count",
      run: (x) => {
        const c = new x.Counter("hits", 2);
        c.increment();
        expectEqual(c.describe(), "hits: 3");
      },
    },
    {
      name: "static instances counts constructions; reset zeroes it",
      run: (x) => {
        x.Counter.reset();
        new x.Counter("a");
        new x.Counter("b");
        expectEqual(x.Counter.instances, 2);
        x.Counter.reset();
        expectEqual(x.Counter.instances, 0);
      },
    },
    {
      name: "#count is truly private (not an own enumerable property)",
      run: (x) => {
        const c = new x.Counter("hits", 9);
        expectDeepEqual(Object.keys(c), ["label"]);
      },
    },
  ],

  solution: `class Counter {
  static instances = 0;
  #count = 0;

  constructor(label, start = 0) {
    this.label = label;
    this.#count = start;
    Counter.instances++;
  }

  increment() {
    this.#count++;
    return this.#count;
  }

  get value() {
    return this.#count;
  }

  describe() {
    return \`\${this.label}: \${this.#count}\`;
  }

  static reset() {
    Counter.instances = 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>JavaScript runtime</th></tr>
  <tr><td>Visibility</td><td><code>count int</code> — unexported, enforced per package</td><td><code>#count</code> — enforced per class body by the engine</td></tr>
  <tr><td>Constructor</td><td><code>func NewCounter(x int) *Counter {}</code> (plain function, just a convention)</td><td>write <code>this.x = x</code> inside a real <code>constructor</code></td></tr>
  <tr><td>Field types</td><td><code>count int</code></td><td><code>count = 0</code></td></tr>
  <tr><td>Getter</td><td><code>func (c *Counter) Value() int { … }</code> (plain method)</td><td><code>get value()</code> (accessed like a property, not called)</td></tr>
  <tr><td>Static / shared state</td><td>package-level <code>var instances int</code> (shared by everyone, not per-type)</td><td><code>static count = 0</code> (lives on the class, one per subclass)</td></tr>
</table>
<p>A few runtime facts worth internalizing. <code>#count</code> is not a string
key — <code>c["#count"]</code> is <code>undefined</code>, and reaching for
<code>#count</code> from outside the class body is a <em>syntax</em> error. Go
has no equivalent restriction: an unexported field such as <code>count</code>
is just a normal struct field, freely readable as <code>c.count</code> by any
code in the same package — the enforcement boundary is the package, not the
type. That is why <code>Object.keys(c)</code> lists only <code>label</code>
in the JavaScript version, while the same reflection in Go would happily show
every field regardless of casing. Static members live on the JavaScript class
object itself (<code>Counter.instances</code>), not on instances, so
<code>this.instances</code> inside a method would be <code>undefined</code> —
reference the class by name, the same way Go code reaches for the
package-level <code>instances</code> variable directly rather than through a
receiver. And remember that Go's <code>NewCounter</code> pattern is only a
naming convention, not a language feature — nothing stops you from building a
<code>Counter</code> another way. In plain JS, <code>constructor</code> is
enforced by the language, and "read-only" is still a discipline, not a
guarantee, unless you reach for <code>#private</code>.</p>`,
};
