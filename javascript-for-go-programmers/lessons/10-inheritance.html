<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance",

  intro: `
<p>Go has no <code>class</code> keyword and no inheritance at all — it has
<strong>struct embedding</strong>, which promotes an embedded type's fields and
methods onto the outer struct. It looks similar at the call site, but it is
composition wearing an inheritance-shaped hat: there is no shared base type,
no <code>super</code>, and no dynamic dispatch back down to an "overriding"
method. JavaScript's <code>class</code> syntax, by contrast, is real,
single-inheritance, prototype-based OOP with genuine runtime polymorphism.</p>
<table>
  <tr><th>Go</th><th>JavaScript</th></tr>
  <tr><td><code>type Dog struct { Animal }</code> (embedding)</td><td><code>class Dog extends Animal {}</code> (true inheritance)</td></tr>
  <tr><td>no constructors — a <code>NewDog(...)</code> function</td><td><code>constructor(...)</code> with parameters you assign yourself</td></tr>
  <tr><td>no access modifiers — capitalized = exported</td><td>no access modifiers either — just a normal public property</td></tr>
  <tr><td>no <code>abstract</code> — interfaces play that role</td><td>no such thing — plain class</td></tr>
  <tr><td>embedded method calls stay on the embedded type</td><td>runtime throws if you touch <code>this</code> before <code>super()</code></td></tr>
</table>
<p>Two runtime rules matter. First, in a subclass constructor you must call
<code>super(...)</code> before you read or write <code>this</code> — the engine
throws a <code>ReferenceError</code> otherwise. Second, <code>instanceof</code>
walks the prototype chain, so a <code>Dog</code> is genuinely an
<code>Animal</code> at run time — a real "is-a" relationship Go's embedding does
not give you, since Go has no such runtime type hierarchy to walk.</p>`,

  go: `type Animal struct {
	Name string
}

func (a Animal) Speak() string {
	return a.Name + " makes a sound"
}

func (a Animal) Describe() string {
	return a.Name + " is an animal"
}

type Dog struct {
	Animal
	Breed string
}

func NewDog(name, breed string) Dog {
	return Dog{Animal: Animal{Name: name}, Breed: breed}
}

func (d Dog) Speak() string {
	return d.Name + " barks"
}

func (d Dog) Describe() string {
	return d.Animal.Describe() + ", specifically a " + d.Breed
}`,

  task: `
<p>Build the same class hierarchy in plain JavaScript — no annotations, no
access modifiers, no parameter properties (assign fields yourself):</p>
<ol>
  <li>A base class <code>Animal</code> whose constructor takes <code>name</code>
      and stores it on <code>this.name</code>. Give it <code>speak()</code>
      returning <code>"&lt;name&gt; makes a sound"</code> and
      <code>describe()</code> returning <code>"&lt;name&gt; is an animal"</code>.</li>
  <li>A subclass <code>Dog</code> that <code>extends Animal</code>. Its
      constructor takes <code>name</code> and <code>breed</code>, calls
      <code>super(name)</code>, then stores <code>this.breed</code>. Override
      <code>speak()</code> to return <code>"&lt;name&gt; barks"</code>, and
      override <code>describe()</code> to call <code>super.describe()</code> and
      append <code>", specifically a &lt;breed&gt;"</code>.</li>
  <li>A function <code>identify(x)</code> that returns <code>"dog"</code> if
      <code>x</code> is a <code>Dog</code>, <code>"animal"</code> if it is any
      other <code>Animal</code>, and <code>"unknown"</code> otherwise — using
      <code>instanceof</code>.</li>
</ol>`,

  starter: `// 1. Base class
class Animal {
  constructor(name) {
    // TODO: store name
  }
  speak() {
    // TODO
    return "";
  }
  describe() {
    // TODO
    return "";
  }
}

// 2. Subclass that overrides and calls super
class Dog extends Animal {
  constructor(name, breed) {
    // TODO: call super, then store breed
  }
  speak() {
    // TODO
    return "";
  }
  describe() {
    // TODO: reuse super.describe()
    return "";
  }
}

// 3. identify(x) using instanceof
function identify(x) {
  // TODO
  return "";
}
`,

  exportNames: ["Animal", "Dog", "identify"],

  requirements: [
    { pattern: /class\s+Dog\s+extends\s+Animal/, message: "Dog must extend Animal" },
    { pattern: /super\s*\(/, message: "Call super(...) in the Dog constructor" },
    { pattern: /super\.describe\s*\(/, message: "Dog.describe() must call super.describe()" },
    { pattern: /instanceof/, message: "Use instanceof inside identify" },
  ],

  tests: [
    { name: 'Animal.speak() uses the base behavior', run: (x) => expectEqual(new x.Animal("Rex").speak(), "Rex makes a sound") },
    { name: 'Dog overrides speak()', run: (x) => expectEqual(new x.Dog("Rex", "Lab").speak(), "Rex barks") },
    { name: 'super(name) sets the inherited field', run: (x) => expectEqual(new x.Dog("Rex", "Lab").name, "Rex") },
    { name: 'Dog.describe() calls super.describe()', run: (x) => expectEqual(new x.Dog("Rex", "Lab").describe(), "Rex is an animal, specifically a Lab") },
    { name: 'a Dog is an Animal (prototype chain)', run: (x) => expectTruthy(new x.Dog("Rex", "Lab") instanceof x.Animal) },
    { name: 'identify distinguishes Dog, Animal, and other', run: (x) => {
        expectEqual(x.identify(new x.Dog("Rex", "Lab")), "dog");
        expectEqual(x.identify(new x.Animal("Generic")), "animal");
        expectEqual(x.identify(42), "unknown");
    } },
  ],

  solution: `class Animal {
  constructor(name) {
    this.name = name;
  }
  speak() {
    return \`\${this.name} makes a sound\`;
  }
  describe() {
    return \`\${this.name} is an animal\`;
  }
}

class Dog extends Animal {
  constructor(name, breed) {
    super(name);
    this.breed = breed;
  }
  speak() {
    return \`\${this.name} barks\`;
  }
  describe() {
    return \`\${super.describe()}, specifically a \${this.breed}\`;
  }
}

function identify(x) {
  if (x instanceof Dog) return "dog";
  if (x instanceof Animal) return "animal";
  return "unknown";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>JavaScript</th></tr>
  <tr><td>Subclass</td><td><code>type Dog struct { Animal }</code> (embedding, not inheritance)</td><td><code>class Dog extends Animal</code> (real inheritance)</td></tr>
  <tr><td>Base constructor</td><td><code>NewDog(...)</code> builds the embedded field yourself</td><td><code>super(name)</code> (required before <code>this</code>)</td></tr>
  <tr><td>Field from a param</td><td><code>Animal: Animal{Name: name}</code></td><td><code>this.breed = breed;</code></td></tr>
  <tr><td>Call base method</td><td><code>d.Animal.Describe()</code> (explicit, no dynamic dispatch)</td><td><code>super.describe()</code></td></tr>
  <tr><td>Runtime type test</td><td>type assertion / type switch on an interface</td><td><code>x instanceof Animal</code></td></tr>
</table>
<p>Order matters in <code>identify</code>: check <code>instanceof Dog</code> before
<code>instanceof Animal</code>, because a <code>Dog</code> passes both — that is
what inheritance means at runtime. <code>instanceof</code> is checking whether
<code>Animal.prototype</code> appears anywhere on <code>x</code>'s prototype
chain. Go has nothing equivalent to walk: embedding is resolved at compile
time by promoting fields and methods, so <code>Dog</code> and <code>Animal</code>
are unrelated concrete types that merely happen to share a field — there is no
runtime "is-a" check to perform, only interface satisfaction.</p>
<p>One gotcha JavaScript newcomers from Go hit: forgetting <code>super(name)</code>
does not silently misbehave — the engine throws
<code>ReferenceError: must call super constructor</code> the moment you touch
<code>this</code>. Go has no equivalent failure mode, since there is no
constructor call to forget — you just build the struct literal. And because
there are no <code>private</code>/<code>protected</code> keywords at runtime in
JavaScript (unlike Go's capitalization-based export rules), every field you set
is publicly reachable; naming conventions or <code>#private</code> fields are
your only real fences.</p>`,
};
