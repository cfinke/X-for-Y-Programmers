const LESSON = {
  number: 12,
  title: "Array Iteration",

  intro: `
<p>Go has no built-in <code>map</code>/<code>filter</code>/<code>reduce</code>
chain on slices — you write a <code>for range</code> loop and accumulate into a
variable by hand, or reach for a small generic helper you (or a package) wrote
once. The compiler checks that loop body element by element: the type of
<code>o</code> and the type of your accumulator are both pinned down up front.
JavaScript bakes the transformation into the array itself: <code>map</code>
returns a new array, <code>filter</code> narrows, <code>reduce</code> threads an
accumulator whose shape is whatever you seed and return — nothing checks it, so
the discipline that Go's compiler enforces moves into your head.</p>
<table>
  <tr><th>Go</th><th>JavaScript</th></tr>
  <tr><td><code>for _, o := range orders { ... }</code></td><td><code>arr.map((x) =&gt; ...)</code></td></tr>
  <tr><td>manual running total in a loop</td><td><code>arr.reduce(fn, 0)</code></td></tr>
  <tr><td><code>slices.IndexFunc(...)</code> → index or <code>-1</code></td><td><code>arr.find(...)</code> — may be <code>undefined</code></td></tr>
  <tr><td>result type declared by the loop/function signature</td><td>result is whatever the callback returned</td></tr>
</table>
<p>The idiomatic move — in both languages — is to describe the transformation as
a pipeline instead of a tangle of mutations. In Go that pipeline is a sequence of
loops, each producing a fresh slice; in JavaScript it's a literal chain
(<code>filter</code> then <code>map</code> then <code>reduce</code>) read
top-to-bottom as a series of pure steps, with each link allocating a new array
at runtime. Two runtime facts worth holding onto: <code>find</code> returns
<code>undefined</code> when nothing matches (there's no <code>ok</code> boolean
forcing you to check it, the way <code>slices.IndexFunc</code>'s <code>-1</code>
does), and <code>reduce</code> on an empty array <em>throws</em> if you gave it
no initial value.</p>`,

  go: `type Order struct {
	ID       int
	Customer string
	Total    float64
	Paid     bool
}

func paidTotal(orders []Order) float64 {
	var sum float64
	for _, o := range orders {
		if o.Paid {
			sum += o.Total
		}
	}
	return sum
}

func customerNames(orders []Order) []string {
	names := make([]string, len(orders))
	for i, o := range orders {
		names[i] = o.Customer
	}
	return names
}`,

  task: `
<p>You are given an array of order objects, each shaped like
<code>{ id, customer, total, paid }</code>. Build a little reporting toolkit —
no manual <code>for</code>/<code>while</code> loops, use the array methods:</p>
<ol>
  <li><code>paidTotal(orders)</code> — sum of <code>total</code> across only the
      <em>paid</em> orders (chain <code>filter</code> then <code>reduce</code>).
      Returns <code>0</code> for an empty array.</li>
  <li><code>bigSpenders(orders, min)</code> — an array of the
      <code>customer</code> names whose order <code>total</code> is greater than
      or equal to <code>min</code> (chain <code>filter</code> then
      <code>map</code>).</li>
  <li><code>findOrder(orders, id)</code> — the first order object with the given
      <code>id</code>, or <code>undefined</code> if there is none (use
      <code>find</code>).</li>
  <li><code>allPaid(orders)</code> — <code>true</code> if every order is paid
      (use <code>every</code>).</li>
  <li><code>anyUnpaid(orders)</code> — <code>true</code> if at least one order is
      unpaid (use <code>some</code>).</li>
  <li><code>totalByCustomer(orders)</code> — an object mapping each customer name
      to the sum of their order totals, built with a single <code>reduce</code>.</li>
</ol>`,

  return [];

  return undefined;

  return false;

  return false;
}

`,

  exportNames: ["paidTotal", "bigSpenders", "findOrder", "allPaid", "anyUnpaid", "totalByCustomer"],

  requirements: [
    { pattern: /\.filter\s*\(/, message: "Use .filter() to select orders" },
    { pattern: /\.map\s*\(/, message: "Use .map() to project customer names" },
    { pattern: /\.reduce\s*\(/, message: "Use .reduce() to aggregate totals" },
    { pattern: /\.find\s*\(/, message: "Use .find() to locate an order by id" },
  ],

  tests: [
    {
      name: "paidTotal sums only paid orders",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Ada", total: 10, paid: true },
        ];
        expectEqual(x.paidTotal(orders), 50);
      },
    },
    {
      name: "paidTotal returns 0 for an empty array",
      run: (x) => expectEqual(x.paidTotal([]), 0),
    },
    {
      name: "bigSpenders keeps names at or above min",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Cy", total: 100, paid: true },
        ];
        expectDeepEqual(x.bigSpenders(orders, 40), ["Ada", "Cy"]);
      },
    },
    {
      name: "findOrder returns the matching order",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
        ];
        expectEqual(x.findOrder(orders, 2).customer, "Rob");
      },
    },
    {
      name: "findOrder returns undefined when nothing matches",
      run: (x) => expectEqual(x.findOrder([{ id: 1, customer: "Ada", total: 40, paid: true }], 99), undefined),
    },
    {
      name: "allPaid and anyUnpaid reflect the paid flags",
      run: (x) => {
        const mixed = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
        ];
        const clean = [{ id: 3, customer: "Cy", total: 10, paid: true }];
        expectEqual(x.allPaid(mixed), false);
        expectEqual(x.allPaid(clean), true);
        expectEqual(x.anyUnpaid(mixed), true);
        expectEqual(x.anyUnpaid(clean), false);
      },
    },
    {
      name: "totalByCustomer groups totals by name",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Ada", total: 10, paid: true },
        ];
        expectDeepEqual(x.totalByCustomer(orders), { Ada: 50, Rob: 25 });
      },
    },
  ],

  solution: `function paidTotal(orders) {
  return orders
    .filter((o) => o.paid)
    .reduce((sum, o) => sum + o.total, 0);
}

function bigSpenders(orders, min) {
  return orders
    .filter((o) => o.total >= min)
    .map((o) => o.customer);
}

function findOrder(orders, id) {
  return orders.find((o) => o.id === id);
}

function allPaid(orders) {
  return orders.every((o) => o.paid);
}

function anyUnpaid(orders) {
  return orders.some((o) => !o.paid);
}

function totalByCustomer(orders) {
  return orders.reduce((acc, o) => {
    acc[o.customer] = (acc[o.customer] || 0) + o.total;
    return acc;
  }, {});
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Mapped result type</td><td>the slice type you declared for the loop</td><td>whatever the callback returns</td></tr>
  <tr><td>reduce accumulator</td><td>a variable whose type you declared before the loop</td><td>whatever you seed and return</td></tr>
  <tr><td>find miss</td><td><code>-1</code> or a second <code>ok</code> bool forces a check</td><td>silently <code>undefined</code></td></tr>
  <tr><td>reduce, no seed, empty slice</td><td>n/a — a loop over nothing just does nothing</td><td>throws <code>TypeError</code> at runtime</td></tr>
  <tr><td>Grouping accumulator</td><td><code>map[string]float64</code></td><td>a plain <code>{}</code> object</td></tr>
</table>
<p>Because there's no compiler double-checking the callback's return type, a few
runtime edges become yours to manage. Always pass an initial value to
<code>reduce</code> — both to pin down the result shape in your head (the way
Go's <code>var sum float64</code> does explicitly) and because
<code>[].reduce((a, b) =&gt; a + b)</code> throws "Reduce of empty array with no
initial value," a failure mode a bare Go <code>for range</code> loop simply
can't have since an empty slice just skips the body. A <code>find</code> that
fails returns <code>undefined</code> rather than Go's usual "zero value plus an
<code>ok</code> flag" pattern, so reaching straight into <code>.customer</code>
on the result can blow up with "Cannot read properties of undefined" — guard it,
or use <code>?.</code>. And each of <code>filter</code>/<code>map</code>
allocates a fresh array, so a long chain over a huge slice does more allocation
than one hand-written loop; for the sizes in everyday code the readability of
the pipeline wins, but it is a real runtime cost Go's explicit loops make
visible and JavaScript's chain hides.</p>`,
};
