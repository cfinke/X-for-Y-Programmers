<div id="app"></div>
<script>
const LESSON = {
  number: 18,
  title: "Modules",

  intro: `
<p>Go decides what a package exports by <em>capitalization</em>: any
identifier that starts with an uppercase letter — a function, const, type,
whatever — is automatically visible to importers as <code>pkg.Name</code>;
anything lowercase stays private to the package. There is no <code>export</code>
keyword, and there is no such thing as a "default" export — every exported
identifier is just another named member of the package. JavaScript modules
invert both of those decisions. Nothing is exported unless you say so
explicitly with the word <code>export</code>, capitalization is irrelevant,
and a module may additionally designate <em>one</em> binding as its default
export, importable without braces under whatever name the caller chooses.</p>
<table>
  <tr><th>Go</th><th>JavaScript</th></tr>
  <tr><td><code>const TaxRate = 0.1</code> (exported by capital T)</td><td><code>export const TAX_RATE = 0.1;</code></td></tr>
  <tr><td><code>type cart struct { ... }</code> (lowercase — private)</td><td>no <code>export</code> — not visible outside the module</td></tr>
  <tr><td>caller writes <code>pricing.TaxRate</code></td><td>caller writes <code>import { TAX_RATE } from "./m";</code></td></tr>
  <tr><td>no default-export concept</td><td><code>export default function total() {}</code></td></tr>
</table>
<p>The mental shift: in Go, exporting is a side effect of how you spell the
name; in JavaScript, exporting is an explicit, opt-in statement attached to
each binding. And where Go always makes you reach through the package name to
get at anything, JavaScript's default export is the one binding that skips
that step entirely.</p>`,

  go: `package pricing

import (
	"fmt"
	"math"
)

const TaxRate = 0.1

func AddTax(cents int) int {
	return int(math.Round(float64(cents) * (1 + TaxRate)))
}

func FormatUSD(cents int) string {
	return fmt.Sprintf("$%.2f", float64(cents)/100)
}

// Go has no "default export" — every exported identifier is reached
// through the package name, e.g. pricing.Total(items).
func Total(items []int) int {
	sum := 0
	for _, cents := range items {
		sum += cents
	}
	return sum
}`,

  task: `
<p>Build a tiny pricing module using plain-JavaScript exports. Where Go would
export these by capitalizing their names, JavaScript requires an explicit
<code>export</code> on each one, plus one binding marked as the module's
default export — a concept Go doesn't have:</p>
<ol>
  <li><strong>Named const export</strong>: <code>TAX_RATE</code> = <code>0.1</code>.</li>
  <li><strong>Named function export</strong>: <code>addTax(cents)</code> returns
      the price with tax added, rounded to a whole number of cents
      (<code>Math.round(cents * (1 + TAX_RATE))</code>).</li>
  <li><strong>Named function export</strong>: <code>formatUSD(cents)</code>
      returns a string like <code>"$12.34"</code> (dollars with two decimals).</li>
  <li><strong>Default export</strong>: <code>total(items)</code>, a function that
      sums an array of cent amounts and returns the total (<code>0</code> for an
      empty array). Export it with <code>export default</code>.</li>
</ol>`,

  starter: `// 1. named const export
export const TAX_RATE = 0.1;

// 2. named function export: price with tax, rounded to whole cents
export function addTax(cents) {
  // TODO
  return 0;
}

// 3. named function export: cents -> "$12.34"
export function formatUSD(cents) {
  // TODO
  return "";
}

// 4. default export: sum an array of cent amounts
export default function total(items) {
  // TODO
  return 0;
}
`,

  exportNames: ["TAX_RATE", "addTax", "formatUSD", "total"],

  requirements: [
    { pattern: /export\s+const\s+TAX_RATE/, message: "Use a named const export for TAX_RATE" },
    { pattern: /export\s+function\s+addTax/, message: "Use a named function export for addTax" },
    { pattern: /export\s+default/, message: "Use export default for total" },
  ],

  tests: [
    { name: "TAX_RATE is 0.1", run: (x) => expectEqual(x.TAX_RATE, 0.1) },
    { name: "addTax(100) is 110", run: (x) => expectEqual(x.addTax(100), 110) },
    { name: "addTax(199) rounds to 219", run: (x) => expectEqual(x.addTax(199), 219) },
    { name: 'formatUSD(1234) is "$12.34"', run: (x) => expectEqual(x.formatUSD(1234), "$12.34") },
    { name: 'formatUSD(500) is "$5.00"', run: (x) => expectEqual(x.formatUSD(500), "$5.00") },
    { name: "default export total sums the array", run: (x) => expectEqual(x.total([100, 200, 300]), 600) },
    { name: "default export total([]) is 0", run: (x) => expectEqual(x.total([]), 0) },
  ],

  solution: `export const TAX_RATE = 0.1;

export function addTax(cents) {
  return Math.round(cents * (1 + TAX_RATE));
}

export function formatUSD(cents) {
  return "$" + (cents / 100).toFixed(2);
}

export default function total(items) {
  return items.reduce((sum, cents) => sum + cents, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>JavaScript</th></tr>
  <tr><td>Named export</td><td>capitalize it: <code>func Add(...) {}</code></td><td><code>export function add() {}</code></td></tr>
  <tr><td>Private symbol</td><td>lowercase it: <code>func add(...) {}</code></td><td>no <code>export</code> keyword</td></tr>
  <tr><td>Default export</td><td>no equivalent — always <code>pkg.Name</code></td><td><code>export default fn;</code> — the module's unnamed "main" value</td></tr>
  <tr><td>Exported type</td><td><code>type Cart struct{...}</code> — capital T</td><td>no special case — a class or object is exported like any other value</td></tr>
  <tr><td>Import</td><td><code>import "shop/pricing"</code> then <code>pricing.Add</code></td><td><code>import { add } from "./pricing.js";</code></td></tr>
</table>
<p>A default export is not a special kind of value — it is exposed under the
name <code>default</code>, which is exactly why <code>import Something from "./m"</code>
(no braces) grabs it and lets you rename it freely, while named imports must
match the exported name inside braces. Go has nothing quite like this: every
exported identifier keeps its original capitalized name forever, and callers
always reach it through the package qualifier. The upside of Go's approach is
that <code>pricing.Add</code> is unambiguous wherever you read it; the upside
of JavaScript's is that a module can offer one "obvious" thing to import
without forcing every caller to also type the module's own name. At runtime, a
JavaScript module is just an object of live value bindings — no more, no
less.</p>`,
};
</script>
