const LESSON = {
  number: 15,
  title: "Slices, Tuples & Destructuring",

  intro: `
<p>Here's a secret about Go: <code>(val, err)</code> return values
<em>are</em> tuples — they just aren't allowed to exist anywhere except a
return statement. You can't store the pair in a variable, put it in a
slice, or pass it to another function without inventing a struct. Rust
makes the tuple first-class: <code>(f64, f64)</code> is a real type you
can bind, store in a <code>Vec</code>, return, and take as a parameter.
Access fields positionally with <code>.0</code> and <code>.1</code>, or —
better — destructure the whole thing:
<code>val, err := f()</code> becomes <code>let (val, err) = f();</code>.</p>
<table>
  <tr><th>Go</th><th>Rust</th></tr>
  <tr><td><code>func f() (float64, float64)</code></td><td><code>fn f() -&gt; (f64, f64)</code> — a real type, usable anywhere</td></tr>
  <tr><td><code>val, err := f()</code></td><td><code>let (val, err) = f();</code></td></tr>
  <tr><td><code>a, b = b, a</code></td><td><code>(a, b) = (b, a);</code> — same swap trick</td></tr>
  <tr><td><code>nums []int</code> (shared backing array)</td><td><code>nums: &amp;[i32]</code> (borrow rules prevent aliasing surprises)</td></tr>
</table>
<p>And <code>&amp;[i32]</code> is the Go slice you already know — a
pointer-plus-length view into someone else's array, cheap to pass, with
indexing and <code>.len()</code> — minus the classic Go bug where two
slices share a backing array and an <code>append</code> through one
mysteriously rewrites the other. Rust's borrowing rules (lesson 5) make
that aliased-mutation situation a compile error instead of a 2 a.m.
debugging session. Slices and tuples meet in this lesson's exercise:
functions that take a slice and hand back a pair.</p>`,

  go: `func swap(a, b int) (int, int) {
	return b, a // a "tuple" — but only in a return
}

func distance(x1, y1, x2, y2 float64) float64 {
	// No pair type, so points arrive as four loose floats.
	dx, dy := x2-x1, y2-y1
	return math.Sqrt(dx*dx + dy*dy)
}

func ends(nums []int) (int, int) {
	return nums[0], nums[len(nums)-1]
}

// You can unpack... and that's all you can do:
lo, hi := ends(nums)
// pairs := [](int, int){}   // not a thing in Go`,

  task: `
<p>Port these with first-class tuples:</p>
<ol>
  <li><code>swap</code> takes <code>pair: (i32, i32)</code> — one parameter,
      not two! — and returns <code>(i32, i32)</code> with the elements
      reversed. Destructure with <code>let (a, b) = pair;</code> and return
      <code>(b, a)</code>.</li>
  <li><code>distance</code> takes two points <code>p: (f64, f64)</code> and
      <code>q: (f64, f64)</code> and returns the Euclidean distance as
      <code>f64</code>. Destructure both with <code>let (x, y)</code>
      bindings, then use <code>.powi(2)</code> and <code>.sqrt()</code>
      (methods on <code>f64</code> — no <code>math</code> package).</li>
  <li><code>ends</code> takes <code>v: &amp;[i32]</code> and returns
      <code>(i32, i32)</code>: the first and last elements. Assume the slice
      is non-empty; <code>v[v.len() - 1]</code> mirrors the Go.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. swap: the pair is ONE parameter of type (i32, i32).
//    let (a, b) = pair; then hand back (b, a).
fn swap(pair: (i32, i32)) -> (i32, i32) {
    todo!()
}

// 2. distance: destructure both points, then
//    ((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()
fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    todo!()
}

// 3. ends: first and last of a non-empty slice, as a tuple.
fn ends(v: &[i32]) -> (i32, i32) {
    todo!()
}
`,

  requirements: [
    { pattern: /\(\s*f64\s*,\s*f64\s*\)/, message: "Use the tuple type (f64, f64) for points" },
    { pattern: /let\s*\(/, message: "Destructure a tuple with let (x, y) = ..." },
    { pattern: /&\[i32\]/, message: "Take the slice as &[i32]" },
  ],

  tests: [
    { name: "swap((1, 2)) returns (2, 1)",
      code: "assert_eq!(swap((1, 2)), (2, 1));" },
    { name: "swap((-5, 0)) returns (0, -5)",
      code: "assert_eq!(swap((-5, 0)), (0, -5));" },
    { name: "distance((0.0, 0.0), (3.0, 4.0)) is exactly 5.0 (the 3-4-5 triangle)",
      code: "assert_eq!(distance((0.0, 0.0), (3.0, 4.0)), 5.0);" },
    { name: "distance((1.0, 1.0), (4.0, 5.0)) is exactly 5.0",
      code: "assert_eq!(distance((1.0, 1.0), (4.0, 5.0)), 5.0);" },
    { name: "ends(&[7, 2, 9, 4]) returns (7, 4)",
      code: "assert_eq!(ends(&[7, 2, 9, 4]), (7, 4));" },
    { name: "ends(&[42]) returns (42, 42)",
      code: "assert_eq!(ends(&[42]), (42, 42));" },
  ],

  solution: `fn swap(pair: (i32, i32)) -> (i32, i32) {
    let (a, b) = pair;
    (b, a)
}

fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    let (x1, y1) = p;
    let (x2, y2) = q;
    ((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()
}

fn ends(v: &[i32]) -> (i32, i32) {
    (v[0], v[v.len() - 1])
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Rust</th></tr>
  <tr><td>Pair type</td><td>only as multiple returns</td><td><code>(i32, i32)</code> — first-class, anywhere</td></tr>
  <tr><td>Unpack</td><td><code>val, err := f()</code></td><td><code>let (val, err) = f();</code></td></tr>
  <tr><td>Positional access</td><td>n/a</td><td><code>pair.0</code>, <code>pair.1</code></td></tr>
  <tr><td>Swap</td><td><code>a, b = b, a</code></td><td><code>(a, b) = (b, a);</code></td></tr>
  <tr><td>Slice view</td><td><code>[]int</code> — shared backing array, <code>append</code> surprises</td><td><code>&amp;[i32]</code> — aliasing checked at compile time</td></tr>
  <tr><td>Math helpers</td><td><code>math.Sqrt(x)</code></td><td>methods: <code>x.sqrt()</code>, <code>x.powi(2)</code></td></tr>
</table>
<p>Destructuring is the same pattern language <code>match</code> used in
lesson 11 — <code>let (x, y) = p;</code> is a pattern that always fits, so
no <code>match</code> is needed. It nests, too:
<code>let ((x1, y1), (x2, y2)) = (p, q);</code> unpacks both points in one
line. Rule of thumb for pairs vs structs: a tuple is fine when position
says it all (a point, a min/max pair); the moment you're squinting at what
<code>.1</code> means, give the fields names — same instinct as Go's "two
results, fine; three, return a struct".</p>`,
};
