const LESSON = {
  number: 13,
  title: "Generics & Trait Bounds",

  intro: `
<p>You waited until Go 1.18 for <code>func First[T any](s []T)</code>; Rust
had generics from day one, and the syntax maps almost token for token.
Square brackets become angle brackets, <code>any</code> becomes an
unconstrained <code>&lt;T&gt;</code>, and <code>cmp.Ordered</code> becomes
the trait bound <code>&lt;T: PartialOrd&gt;</code> — "T, provided it
implements PartialOrd". The bound is exactly Go's constraint idea: it
declares up front what the function is allowed to do with <code>T</code>,
and calling <code>&gt;</code> on an unconstrained <code>T</code> is a
compile error in both languages.</p>
<table>
  <tr><th>Go</th><th>Rust</th></tr>
  <tr><td><code>func First[T any](s []T)</code></td><td><code>fn first&lt;T&gt;(items: &amp;[T])</code></td></tr>
  <tr><td><code>[T cmp.Ordered]</code></td><td><code>&lt;T: PartialOrd&gt;</code></td></tr>
  <tr><td>constraint = interface listing methods/types</td><td>bound = trait — including ones you wrote (lesson 12)</td></tr>
  <tr><td>zero value + <code>bool</code> for "maybe empty"</td><td><code>Option&lt;&amp;T&gt;</code></td></tr>
</table>
<p>Under the hood they even compile the same way: monomorphization. Rust
stamps out a concrete copy of <code>first</code> for each <code>T</code>
you use it with (Go's GC-shape stenciling aside), so a generic call costs
the same as a hand-written concrete one — no <code>interface{}</code>
boxing, no runtime type assertions. Where the two part ways is
expressiveness: any trait can be a bound, bounds can pile up
(<code>T: Clone + PartialOrd</code>), and they extend to levels Go
deliberately doesn't attempt — the kind of "only types with <em>this</em>
capability" precision TypeScript people get from <code>keyof</code>.</p>`,

  go: `// Since Go 1.18:
func First[T any](s []T) (T, bool) {
	var zero T
	if len(s) == 0 {
		return zero, false // zero value + ok flag
	}
	return s[0], true
}

// cmp.Ordered constrains T to <, >, ==, etc.
func Largest[T cmp.Ordered](s []T) T {
	largest := s[0]
	for _, v := range s[1:] {
		if v > largest {
			largest = v
		}
	}
	return largest
}`,

  task: `
<p>Port both functions:</p>
<ol>
  <li><code>first&lt;T&gt;</code> takes <code>items: &amp;[T]</code> and
      returns <code>Option&lt;&amp;T&gt;</code> — <code>Some</code> of a
      reference to the first element, or <code>None</code> if the slice is
      empty. No constraint needed: like <code>[T any]</code>, we never
      compare or copy <code>T</code>. (Note the return replaces Go's
      <code>(T, bool)</code> pair — and needs no zero value.)</li>
  <li><code>largest&lt;T: PartialOrd&gt;</code> takes
      <code>items: &amp;[T]</code> and returns <code>&amp;T</code>, a
      reference to the largest element. Assume the slice is non-empty:
      start with <code>&amp;items[0]</code> and loop, exactly like the Go.
      The <code>PartialOrd</code> bound is what makes <code>&gt;</code>
      legal — delete it and watch the compile error.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. first: Go's (T, bool) becomes Option<&T>. Return items.get(0),
//    or write the if/else yourself.
fn first<T>(items: &[T]) -> Option<&T> {
    todo!()
}

// 2. largest: the T: PartialOrd bound is Rust's cmp.Ordered.
//    Track a &T starting at &items[0]; assume non-empty.
fn largest<T: PartialOrd>(items: &[T]) -> &T {
    todo!()
}
`,

  requirements: [
    { pattern: /<T\s*:\s*PartialOrd>/, message: "Constrain largest with <T: PartialOrd>" },
    { pattern: /<T>/, message: "Leave first's type parameter unconstrained: <T>" },
    { pattern: /Option<&T>/, message: "first should return Option<&T>" },
  ],

  tests: [
    { name: "first(&[1, 2, 3]) returns Some(&1)",
      code: "assert_eq!(first(&[1, 2, 3]), Some(&1));" },
    { name: "first of an empty &[i32] returns None",
      code: "let empty: &[i32] = &[];\nassert_eq!(first(empty), None);" },
    { name: 'first(&["a", "b"]) returns Some(&"a") — same function, different T',
      code: 'assert_eq!(first(&["a", "b"]), Some(&"a"));' },
    { name: "largest(&[3, 9, 2]) returns 9",
      code: "assert_eq!(*largest(&[3, 9, 2]), 9);" },
    { name: 'largest(&["apple", "pear", "banana"]) returns "pear"',
      code: 'assert_eq!(*largest(&["apple", "pear", "banana"]), "pear");' },
  ],

  solution: `fn first<T>(items: &[T]) -> Option<&T> {
    if items.is_empty() {
        None
    } else {
        Some(&items[0])
    }
}

fn largest<T: PartialOrd>(items: &[T]) -> &T {
    let mut biggest = &items[0];
    for item in items {
        if item > biggest {
            biggest = item;
        }
    }
    biggest
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Rust</th></tr>
  <tr><td>Type parameter</td><td><code>func F[T any](s []T)</code></td><td><code>fn f&lt;T&gt;(items: &amp;[T])</code></td></tr>
  <tr><td>Constraint / bound</td><td><code>[T cmp.Ordered]</code></td><td><code>&lt;T: PartialOrd&gt;</code></td></tr>
  <tr><td>Multiple constraints</td><td>define a combined interface</td><td>inline: <code>&lt;T: Clone + PartialOrd&gt;</code></td></tr>
  <tr><td>"Maybe absent" result</td><td><code>(T, bool)</code> + zero value</td><td><code>Option&lt;&amp;T&gt;</code></td></tr>
  <tr><td>Compilation</td><td>stenciling by GC shape</td><td>full monomorphization — one copy per concrete T</td></tr>
</table>
<p>The bound isn't just permission to use <code>&gt;</code> — it's the whole
interface between a generic function and its callers. Inside
<code>largest</code>, <code>T</code> has <em>only</em> what
<code>PartialOrd</code> grants, so the body can't quietly depend on
anything more; and any trait works as a bound, including
<code>Describe</code> from lesson 12
(<code>fn announce&lt;T: Describe&gt;(x: &amp;T)</code>). When bounds get
long, Rust's <code>where</code> clause plays the same tidying role as
factoring a Go constraint into a named interface.</p>`,
};
