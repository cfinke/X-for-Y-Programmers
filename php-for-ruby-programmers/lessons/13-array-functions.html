  title: "array_map, array_filter & Friends",

  intro: `
<p>Ruby's <code>.map</code>/<code>.select</code>/<code>.reduce</code> chains
become free functions in PHP: <code>array_map</code>,
<code>array_filter</code>, <code>array_reduce</code> — and the block
<code>{ |p| … }</code> becomes an arrow function
<code>fn($p) =&gt; …</code>. The ideas transfer perfectly; two mechanical
quirks do not, and you simply have to memorize them.</p>
<table>
  <tr><th>Ruby</th><th>PHP</th></tr>
  <tr><td><code>arr.map { |x| x * 2 }</code></td><td><code>array_map(fn($x) =&gt; $x * 2, $arr)</code> — callback <strong>first</strong></td></tr>
  <tr><td><code>arr.select { |x| x.even? }</code></td><td><code>array_filter($arr, fn($x) =&gt; $x % 2 === 0)</code> — array <strong>first</strong></td></tr>
  <tr><td><code>arr.reduce(0) { |acc, x| acc + x }</code></td><td><code>array_reduce($arr, fn($acc, $x) =&gt; $acc + $x, 0)</code></td></tr>
  <tr><td><code>arr.sum</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td><code>.select</code> returns a fresh 0-indexed array</td><td><code>array_filter</code> <strong>preserves keys</strong> — wrap in <code>array_values()</code></td></tr>
</table>
<p>Quirk one: the argument order is inconsistent. <code>array_map</code> takes
the callback first, <code>array_filter</code> takes the array first. There is
no logic to recover here — memorize it. Quirk two is sneakier:
<code>array_filter</code> keeps the original keys, so filtering
<code>[1, 2, 3, 4]</code> for evens gives <code>[1 =&gt; 2, 3 =&gt; 4]</code>,
not <code>[2, 4]</code>. Ruby's <code>.select</code> never did this, and the
gap bites the moment you compare against a plain list or encode to JSON
(you get an object, not an array). The cure is
<code>array_values()</code> to reindex from zero. Say it with me:
<em>filter, then array_values</em>.</p>`,

  ruby: `products = [
  { name: "Desk",  price_cents: 24_900, in_stock: true },
  { name: "Lamp",  price_cents: 4_900,  in_stock: false },
  { name: "Chair", price_cents: 9_900,  in_stock: true },
]

def in_stock_names(products)
  products.select { |p| p[:in_stock] }.map { |p| p[:name] }
end

def total_value(products)
  products.sum { |p| p[:price_cents] }
end

def evens_doubled(nums)
  nums.select(&:even?).map { |n| n * 2 }
end

in_stock_names(products)    # ["Desk", "Chair"]
total_value(products)       # 39700
evens_doubled([1, 2, 3, 4]) # [4, 8]`,

  task: `
<p>Products are associative arrays with <code>'name'</code>,
<code>'price_cents'</code>, and <code>'in_stock'</code> keys. Port the
three functions:</p>
<ol>
  <li><code>in_stock_names(array $products): array</code> —
      <code>select</code> then <code>map</code>: filter to products whose
      <code>'in_stock'</code> is true, map to their <code>'name'</code>, and
      reindex with <code>array_values()</code> so the result is a clean list
      like <code>['Desk', 'Chair']</code>.</li>
  <li><code>total_value(array $products): int</code> — sum every product's
      <code>'price_cents'</code>. Map to the prices then
      <code>array_sum</code>, or fold with <code>array_reduce</code> —
      your choice.</li>
  <li><code>evens_doubled(array $nums): array</code> — keep the even numbers,
      double them, and return a reindexed list: <code>[1, 2, 3, 4]</code>
      becomes <code>[4, 8]</code>, keys <code>0</code> and <code>1</code>.
      A test checks the keys, so don't skip <code>array_values()</code>.</li>
</ol>`,

  starter: `<?php

//    Remember: array_filter($arr, $fn) but array_map($fn, $arr) —
//    and array_filter keeps keys, so finish with array_values().

}

// 2. .sum { |p| p[:price_cents] }  ->  array_sum(array_map(...))
//    or array_reduce($products, $fn, 0).

    throw new Exception("TODO: implement total_value");
}

// 3. .select(&:even?).map { |n| n * 2 } — reindexed from 0.

    throw new Exception("TODO: implement evens_doubled");
}
`,

  requirements: [
    { pattern: /array_map/, message: "Use array_map (callback first!) for the .map steps" },
    { pattern: /array_filter/, message: "Use array_filter (array first!) for the .select steps" },
    { pattern: /array_values/, message: "Reindex filtered results with array_values" },
    { pattern: /array_reduce|array_sum/, message: "Sum with array_sum or fold with array_reduce" },
  ],

  tests: [
    { name: "in_stock_names picks the in-stock names, in order",
      code: "$products = [\n  ['name' => 'Desk', 'price_cents' => 24900, 'in_stock' => true],\n  ['name' => 'Lamp', 'price_cents' => 4900, 'in_stock' => false],\n  ['name' => 'Chair', 'price_cents' => 9900, 'in_stock' => true],\n];\nexpect_eq(in_stock_names($products), ['Desk', 'Chair']);" },
    { name: "in_stock_names returns a reindexed list (keys 0, 1, ...)",
      code: "$products = [\n  ['name' => 'Lamp', 'price_cents' => 4900, 'in_stock' => false],\n  ['name' => 'Chair', 'price_cents' => 9900, 'in_stock' => true],\n];\nexpect_eq(array_keys(in_stock_names($products)), [0]);\nexpect_eq(in_stock_names($products), ['Chair']);" },
    { name: "total_value sums price_cents across all products",
      code: "$products = [\n  ['name' => 'Desk', 'price_cents' => 24900, 'in_stock' => true],\n  ['name' => 'Lamp', 'price_cents' => 4900, 'in_stock' => false],\n  ['name' => 'Chair', 'price_cents' => 9900, 'in_stock' => true],\n];\nexpect_eq(total_value($products), 39700);" },
    { name: "total_value of no products is 0",
      code: "expect_eq(total_value([]), 0);" },
    { name: "evens_doubled([1, 2, 3, 4]) is exactly [4, 8] — keys included",
      code: "expect_eq(evens_doubled([1, 2, 3, 4]), [4, 8]);" },
    { name: "evens_doubled([1, 3, 5]) is an empty list",
      code: "expect_eq(evens_doubled([1, 3, 5]), []);" },
  ],

  solution: `<?php

function in_stock_names(array $products): array {
    $in_stock = array_filter($products, fn($p) => $p['in_stock']);
    return array_values(array_map(fn($p) => $p['name'], $in_stock));
}

function total_value(array $products): int {
    return array_sum(array_map(fn($p) => $p['price_cents'], $products));
}

function evens_doubled(array $nums): array {
    $evens = array_filter($nums, fn($n) => $n % 2 === 0);
    return array_values(array_map(fn($n) => $n * 2, $evens));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>PHP</th></tr>
  <tr><td>Map</td><td><code>arr.map { |x| … }</code></td><td><code>array_map(fn($x) =&gt; …, $arr)</code> — callback first</td></tr>
  <tr><td>Filter</td><td><code>arr.select { |x| … }</code></td><td><code>array_filter($arr, fn($x) =&gt; …)</code> — array first</td></tr>
  <tr><td>Reject</td><td><code>arr.reject { … }</code></td><td>negate the predicate in <code>array_filter</code></td></tr>
  <tr><td>Reduce</td><td><code>arr.reduce(init) { |acc, x| … }</code></td><td><code>array_reduce($arr, fn($acc, $x) =&gt; …, $init)</code></td></tr>
  <tr><td>Sum</td><td><code>arr.sum</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td>Reindex</td><td>(automatic)</td><td><code>array_values($arr)</code> after every filter</td></tr>
  <tr><td>Sort with block</td><td><code>arr.sort_by { … }</code></td><td><code>usort($arr, $cmp)</code> — mutates, returns bool</td></tr>
</table>
<p>No method chaining means pipelines read inside-out:
Ruby's <code>select … map … sum</code> becomes
<code>array_sum(array_map(…, array_filter(…)))</code>. When the nesting gets
deep, do what the solution does — name the intermediate steps with local
variables. It's the same pipeline, one line per stage, and the
<code>array_values()</code> call has an obvious place to live.</p>`,
};
