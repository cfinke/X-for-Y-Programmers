<div id="app"></div>
<script>
const LESSON = {
  number: 12,
  title: "Traits",

  intro: `
<p>Ruby's signature reuse mechanism — the module mixin — maps almost 1:1 onto
PHP <em>traits</em>. Where you write <code>module Describable</code> and
<code>include Describable</code>, PHP writes <code>trait Describable</code>
and <code>use Describable;</code> inside the class body. The methods are
copied into the class as if you'd written them there, <code>$this</code> and
all.</p>
<table>
  <tr><th>Ruby</th><th>PHP</th></tr>
  <tr><td><code>module Describable … end</code></td><td><code>trait Describable { … }</code></td></tr>
  <tr><td><code>include Describable</code></td><td><code>use Describable;</code> (inside the class body)</td></tr>
  <tr><td>mixin method calls <code>name</code></td><td>trait method calls <code>$this-&gt;name()</code></td></tr>
  <tr><td>conflicts resolved by the MRO (last include wins)</td><td>conflicts are a compile error — resolve with <code>insteadof</code></td></tr>
  <tr><td><code>Comparable</code>, <code>Enumerable</code></td><td>the same pattern, hand-rolled per trait</td></tr>
</table>
<p>The pattern you already know from <code>Comparable</code> carries straight
over: the mixin provides rich behavior (<code>describe()</code>) built on top
of a method it <em>expects the class to define</em> (<code>name()</code>) —
exactly how <code>Comparable</code> gives you <code>&lt;</code> and
<code>between?</code> in exchange for <code>&lt;=&gt;</code>. One real
difference: Ruby linearizes modules into an ancestor chain, so two modules
defining the same method resolve silently by include order. PHP has no MRO
for traits — two traits bringing in the same method name is a hard error you
must settle explicitly with
<code>use A, B { A::foo insteadof B; }</code>. Louder, but never
surprising.</p>`,

  ruby: `module Describable
  def describe
    "This is #{name}" # relies on the includer defining #name
  end
end

class Dog
  include Describable
  def name = "Rex"
end

class Robot
  include Describable
  def name = "XR-7"
end

Dog.new.describe    # "This is Rex"
Robot.new.describe  # "This is XR-7"`,

  task: `
<p>Port the mixin to a trait:</p>
<ol>
  <li><code>Describable</code> — a trait with one method,
      <code>describe(): string</code>, returning
      <code>"This is "</code> concatenated with <code>$this-&gt;name()</code>.
      Just like the Ruby module, it calls a method it doesn't define.</li>
  <li><code>Dog</code> — a class that does <code>use Describable;</code> and
      defines <code>name(): string</code> returning <code>"Rex"</code>.</li>
  <li><code>Robot</code> — same shape: <code>use Describable;</code> plus
      <code>name(): string</code> returning <code>"XR-7"</code>.</li>
</ol>
<p>The tests call both <code>-&gt;describe()</code> and <code>-&gt;name()</code>
on instances of each class.</p>`,

  starter: `<?php

// module Describable  ->  trait Describable
trait Describable {
    public function describe(): string {
        // Build "This is " . $this->name() — the Comparable pattern:
        // rich behavior on top of a method the class must provide.
        throw new Exception("TODO: implement describe");
    }
}

class Dog {
    use Describable; // include Describable

    public function name(): string {
        throw new Exception("TODO: implement Dog::name");
    }
}

class Robot {
    use Describable;

    public function name(): string {
        throw new Exception("TODO: implement Robot::name");
    }
}
`,

  requirements: [
    { pattern: /trait\s+Describable/, message: "Define trait Describable (Ruby's module)" },
    { pattern: /use\s+Describable/, message: "Mix it in with use Describable; (Ruby's include)" },
  ],

  tests: [
    { name: "(new Dog())->describe() returns 'This is Rex'",
      code: "expect_eq((new Dog())->describe(), 'This is Rex');" },
    { name: "(new Robot())->describe() returns 'This is XR-7'",
      code: "expect_eq((new Robot())->describe(), 'This is XR-7');" },
    { name: "(new Dog())->name() returns 'Rex'",
      code: "expect_eq((new Dog())->name(), 'Rex');" },
    { name: "(new Robot())->name() returns 'XR-7'",
      code: "expect_eq((new Robot())->name(), 'XR-7');" },
    { name: "both classes really share the one trait method",
      code: "expect_true(in_array(Describable::class, class_uses(Dog::class), true));\nexpect_true(in_array(Describable::class, class_uses(Robot::class), true));" },
  ],

  solution: `<?php

trait Describable {
    public function describe(): string {
        return "This is " . $this->name();
    }
}

class Dog {
    use Describable;

    public function name(): string {
        return "Rex";
    }
}

class Robot {
    use Describable;

    public function name(): string {
        return "XR-7";
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>PHP</th></tr>
  <tr><td>Define</td><td><code>module Describable … end</code></td><td><code>trait Describable { … }</code></td></tr>
  <tr><td>Mix in</td><td><code>include Describable</code></td><td><code>use Describable;</code></td></tr>
  <tr><td>Several at once</td><td><code>include A, B</code></td><td><code>use A, B;</code></td></tr>
  <tr><td>Call host's method</td><td>bare <code>name</code></td><td><code>$this-&gt;name()</code></td></tr>
  <tr><td>Require the method</td><td>convention (NoMethodError if missing)</td><td>convention — or declare <code>abstract public function name(): string;</code> in the trait</td></tr>
  <tr><td>Name conflict</td><td>MRO decides silently</td><td>fatal error; pick with <code>A::foo insteadof B</code>, alias with <code>as</code></td></tr>
  <tr><td>Check at runtime</td><td><code>Dog.include?(Describable)</code></td><td><code>class_uses(Dog::class)</code></td></tr>
</table>
<p>One thing traits are <em>not</em>: types. <code>include Comparable</code>
puts the module in the ancestor chain, so <code>is_a?(Comparable)</code> is
true; a PHP trait is pure copy-paste and creates no type you can hint
against. When you need "anything describable" as a parameter type, pair the
trait with an interface — <code>interface HasDescription</code> for the
contract, <code>trait Describable</code> for the shared implementation — and
have classes declare both.</p>`,
};
</script>
