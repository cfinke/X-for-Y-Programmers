<p>Time to put the course together: a small inventory module built from a
promoted-constructor class, the <code>array_*</code> trio, nullable returns,
and one last semantics lesson. The <code>Item</code> class is written for you
— your job is the four functions around it.</p>
<table>
  <tr><th>Ruby</th><th>PHP</th></tr>
  <tr><td><code>Struct.new(:name, :price_cents, :count)</code></td><td><code>__construct(public string $name, …)</code></td></tr>
  <tr><td><code>items.sum { |i| … }</code></td><td><code>array_reduce($items, fn(…) =&gt; …, 0)</code></td></tr>
  <tr><td><code>items.find { |i| … }</code> (or <code>nil</code>)</td><td><code>foreach</code> + <code>return null;</code>, typed <code>?Item</code></td></tr>
  <tr><td><code>i.dup</code> before mutating</td><td><code>clone $i</code> — still required for objects!</td></tr>
  <tr><td><code>items.select { … }.map(&amp;:name)</code></td><td><code>array_values(array_map(…, array_filter(…)))</code></td></tr>
</table>
<p>The semantics finale: lesson 3 taught you that PHP <em>arrays</em> copy on
assignment — but <em>objects</em> travel by handle, exactly like Ruby objects.
Pass an array of <code>Item</code>s into a function and you get a fresh array
whose slots point at the <strong>same</strong> <code>Item</code> objects.
Mutate one and the caller sees it. So the defensive-copy instinct Ruby taught
you comes back for one final bow: to return an updated inventory without
touching the original, <code>clone</code> the matched item (the
<code>.dup</code>) and build a new array with <code>array_map</code>. The
tests check both that the returned array is updated <em>and</em> that the
original objects are untouched.</p>`,

  ruby: `Item = Struct.new(:name, :price_cents, :count)

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }   # nil when absent
end

def restock(items, name, amount)
  items.map do |i|
    next i unless i.name == name
    copy = i.dup                      # don't mutate the caller's Item!
    copy.count += amount
    copy
  end
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map(&:name)
end`,

  solution: `<?php

class Item {
    public function __construct(
        public string $name,
        public int $price_cents,
        public int $count,
    ) {}
}

function total_value(array $items): int {
    return array_reduce($items, fn($sum, $i) => $sum + $i->price_cents * $i->count, 0);
}

function find_item(array $items, string $name): ?Item {
    foreach ($items as $item) {
        if ($item->name === $name) {
            return $item;
        }
    }
    return null;   // find's nil
}

function restock(array $items, string $name, int $amount): array {
    return array_map(function ($item) use ($name, $amount) {
        if ($item->name !== $name) {
            return $item;
        }
        $copy = clone $item;   // the .dup — objects are shared references
        $copy->count += $amount;
        return $copy;
    }, $items);
}

function names_in_stock(array $items): array {
    $in_stock = array_filter($items, fn($i) => $i->count > 0);
    return array_values(array_map(fn($i) => $i->name, $in_stock));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>PHP</th></tr>
  <tr><td>Value object</td><td><code>Struct.new(:a, :b)</code></td><td>promoted constructor properties</td></tr>
  <tr><td>Sum with block</td><td><code>items.sum { |i| … }</code></td><td><code>array_reduce($items, fn($s, $i) =&gt; …, 0)</code></td></tr>
  <tr><td>Find or nil</td><td><code>items.find { … }</code></td><td><code>foreach</code> + <code>return null;</code>, typed <code>?Item</code></td></tr>
  <tr><td>Copy an object</td><td><code>i.dup</code></td><td><code>clone $i</code></td></tr>
  <tr><td>Array semantics</td><td>reference — <code>.dup</code> the array too</td><td>value — arrays copy themselves</td></tr>
  <tr><td>Object semantics</td><td>reference</td><td>reference — <code>clone</code> before mutating</td></tr>
  <tr><td>Filter + map names</td><td><code>select { … }.map(&amp;:name)</code></td><td><code>array_values(array_map(…, array_filter(…)))</code></td></tr>
</table>
<p>The rule that ties the whole course together: PHP <em>arrays</em> are
values, PHP <em>objects</em> are references. <code>restock</code> gets a free
copy of the array — but its slots still point at the caller's
<code>Item</code>s, so mutating <code>$item-&gt;count</code> in place would leak
into the original inventory, exactly the bug <code>.dup</code> guards against
in Ruby. <code>clone</code> the object you change, map into a fresh array, and
both worlds stay clean. That copy-what-you-mutate discipline — plus typed
signatures like <code>?Item</code> that make the nil-case explicit — is the
heart of writing modern PHP with a Rubyist's instincts intact.</p>`,
