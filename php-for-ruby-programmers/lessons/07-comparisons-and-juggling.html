const LESSON = {
  number: 7,
  title: "Comparisons & Type Juggling",

  intro: `
<p>Here's the lesson where PHP will genuinely surprise you. In Ruby,
<code>==</code> is sane: <code>1 == "1"</code> is <code>false</code>, end of
story. PHP's <code>==</code> performs <em>type juggling</em> — it coerces
the operands toward each other first, so <code>"1" == 1</code> is
<code>true</code>, and <code>"abc" == 0</code> was true for decades (fixed
in PHP 8, but the operator remains a minefield). The community's answer is
unanimous: <strong>always use <code>===</code></strong>, which compares
value <em>and</em> type with zero coercion — that's the operator that
behaves like Ruby's <code>==</code>.</p>
<table>
  <tr><th>Expression</th><th>Ruby <code>==</code></th><th>PHP <code>==</code></th><th>PHP <code>===</code></th></tr>
  <tr><td><code>1</code> vs <code>"1"</code></td><td><code>false</code></td><td><code>true</code> (juggled!)</td><td><code>false</code></td></tr>
  <tr><td><code>0</code> vs <code>false</code></td><td><code>false</code></td><td><code>true</code> (juggled!)</td><td><code>false</code></td></tr>
  <tr><td><code>1</code> vs <code>1.0</code></td><td><code>true</code></td><td><code>true</code></td><td><code>false</code> (int vs float)</td></tr>
  <tr><td><code>1</code> vs <code>1</code></td><td><code>true</code></td><td><code>true</code></td><td><code>true</code></td></tr>
</table>
<p>The second surprise is that <em>truthiness flips</em>. Ruby has exactly
two falsy values: <code>nil</code> and <code>false</code> — so
<code>if 0</code> and <code>if ""</code> both run. PHP makes
<code>""</code>, <code>0</code>, <code>0.0</code>, <code>"0"</code>, and
<code>[]</code> all falsy. This is the single biggest habit change in the
course: <code>if ($count)</code> skips when the count is zero, and
<code>if ($name)</code> skips the empty string. One piece of home comfort,
though: the spaceship <code>&lt;=&gt;</code> — Ruby's gift to the world —
exists in PHP with identical semantics.</p>`,

  ruby: `1 == "1" # false — Ruby's == is sane; PHP's == would say true!

def same_value_and_type(a, b)
  a == b # in PHP this job needs === instead
end

def truthy?(v)
  !!v # in Ruby only nil and false are falsy
end

def compare_nums(a, b)
  a <=> b # the spaceship: -1, 0, or 1
end

same_value_and_type(1, "1") # false
truthy?(0)                  # true  — 0 is truthy in Ruby!
truthy?("")                 # true  — so is ""
truthy?(nil)                # false
compare_nums(1, 2)          # -1
compare_nums(3, 3)          # 0`,

  task: `
<p>Port the Ruby to PHP — and internalize the two flips:</p>
<ol>
  <li><code>same_value_and_type(mixed $a, mixed $b): bool</code> — return
      whether the two values are identical using <code>===</code>. This is
      the PHP operator that behaves like Ruby's <code>==</code>:
      <code>1 === "1"</code> is <code>false</code>, and even
      <code>1 === 1.0</code> is <code>false</code> because int and float are
      different types.</li>
  <li><code>is_truthy(mixed $v): bool</code> — return PHP's opinion of the
      value by casting: <code>(bool) $v</code>. The tests document the flip:
      <code>0</code>, <code>""</code>, <code>"0"</code>, and <code>[]</code>
      are all falsy here, unlike Ruby.</li>
  <li><code>compare_nums(int $a, int $b): int</code> — the spaceship
      <code>&lt;=&gt;</code>, exactly as you know it: <code>-1</code>,
      <code>0</code>, or <code>1</code>.</li>
</ol>`,

  starter: `<?php

// 1. PHP's === is Ruby's ==: same value AND same type, no juggling.
//    (mixed means "any type" — the honest signature for a comparator.)
function same_value_and_type(mixed $a, mixed $b): bool {
    throw new Exception("TODO: implement same_value_and_type");
}

// 2. Cast with (bool) to get PHP's truthiness verdict.
//    Remember: "", 0, "0", and [] are ALL falsy in PHP.
function is_truthy(mixed $v): bool {
    throw new Exception("TODO: implement is_truthy");
}

// 3. The spaceship operator <=> works exactly like Ruby's.
function compare_nums(int $a, int $b): int {
    throw new Exception("TODO: implement compare_nums");
}
`,

  requirements: [
    { pattern: /===/, message: "Compare with === (the no-juggling operator)" },
    { pattern: /<=>/, message: "Use the spaceship operator <=>" },
    { pattern: /\(bool\)/, message: "Cast with (bool) to test truthiness" },
  ],

  tests: [
    { name: "1 and '1' are NOT identical — === refuses to juggle",
      code: "expect_true(!same_value_and_type(1, '1'));\nexpect_true(!same_value_and_type(0, false));" },
    { name: "identical values pass; int 1 vs float 1.0 does not",
      code: "expect_true(same_value_and_type(1, 1));\nexpect_true(same_value_and_type('a', 'a'));\nexpect_true(!same_value_and_type(1, 1.0));" },
    { name: "0 is falsy in PHP (it was truthy in Ruby!)",
      code: "expect_true(!is_truthy(0));" },
    { name: "the empty string, '0', and [] are falsy too",
      code: "expect_true(!is_truthy(''));\nexpect_true(!is_truthy('0'));\nexpect_true(!is_truthy([]));" },
    { name: "non-empty values are still truthy",
      code: "expect_true(is_truthy(1));\nexpect_true(is_truthy('hello'));\nexpect_true(is_truthy([0]));" },
    { name: "the spaceship returns -1, 0, 1",
      code: "expect_eq(compare_nums(1, 2), -1);\nexpect_eq(compare_nums(2, 1), 1);\nexpect_eq(compare_nums(3, 3), 0);" },
  ],

  solution: `<?php

function same_value_and_type(mixed $a, mixed $b): bool {
    return $a === $b;
}

function is_truthy(mixed $v): bool {
    return (bool) $v;
}

function compare_nums(int $a, int $b): int {
    return $a <=> $b;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>PHP</th></tr>
  <tr><td>Sane equality</td><td><code>==</code></td><td><code>===</code> — use it always</td></tr>
  <tr><td>Coercing equality</td><td>(none)</td><td><code>==</code> — avoid it</td></tr>
  <tr><td>Not-identical</td><td><code>!=</code></td><td><code>!==</code></td></tr>
  <tr><td>Falsy values</td><td><code>nil</code>, <code>false</code> only</td><td><code>null</code>, <code>false</code>, <code>0</code>, <code>0.0</code>, <code>""</code>, <code>"0"</code>, <code>[]</code></td></tr>
  <tr><td>Spaceship</td><td><code>a &lt;=&gt; b</code></td><td><code>$a &lt;=&gt; $b</code> (same!)</td></tr>
  <tr><td>Truthiness cast</td><td><code>!!v</code></td><td><code>(bool) $v</code></td></tr>
</table>
<p>Make <code>===</code> muscle memory and most juggling bugs disappear —
the same advice extends to the strict flags you've already seen, like
<code>in_array($x, $arr, true)</code>. Truthiness takes longer to rewire:
in Ruby, <code>if count</code> asks "is there a count?"; in PHP,
<code>if ($count)</code> asks "is the count non-zero?" — and
<code>"0"</code> being falsy is a genuine oddity with no Ruby analogue at
all. When in doubt, compare explicitly: <code>$count !== null</code> says
exactly what you mean.</p>`,
};
