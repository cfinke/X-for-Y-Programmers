const LESSON = {
  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>Interpolation carries straight over, minus the ceremony: Ruby's
<code>"#{name} is #{age}"</code> becomes <code>"$name is $age"</code> — for a
simple variable you don't even need braces. For anything fancier (an array
element, a property) wrap it as <code>"{$user['name']}"</code>. Single quotes,
as in Ruby, don't interpolate. Concatenation swaps <code>+</code> for a dot:
<code>$a . $b</code>.</p>
<p>The bigger personality shift: Ruby hangs methods on <code>String</code>
itself, while PHP hands you a <em>toolbox of functions</em>. There is no
<code>$s-&gt;upcase</code> — there's <code>strtoupper($s)</code>. The receiver
becomes the argument.</p>
<table>
  <tr><th>Ruby</th><th>PHP</th></tr>
  <tr><td><code>"#{name} is #{age}"</code></td><td><code>"$name is $age"</code></td></tr>
  <tr><td><code>"Hi, " + name</code></td><td><code>"Hi, " . $name</code></td></tr>
  <tr><td><code>s.upcase</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td><code>s.include?(x)</code></td><td><code>str_contains($s, $x)</code></td></tr>
  <tr><td><code>s.length</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td><code>words.join(", ")</code></td><td><code>implode(", ", $words)</code></td></tr>
</table>`,

  ruby: `def shout(s)
  s.upcase
end

def greet(name, age)
  "#{name} is #{age}"
end

def contains_word(haystack, needle)
  haystack.include?(needle)
end

def join_words(words)
  words.join(", ")
end

puts shout("hello")                     # HELLO
puts greet("Ada", 36)                   # Ada is 36
puts contains_word("to be", "be")       # true
puts join_words(%w[x y z])              # x, y, z`,

  task: `
<p>Port the four Ruby methods to PHP functions:</p>
<ol>
  <li><code>shout(string $s): string</code> — uppercase via
      <code>strtoupper($s)</code>. The method becomes a function; the receiver
      becomes the argument.</li>
  <li><code>greet(string $name, int $age): string</code> — return
      <code>"Ada is 36"</code>-style text using double-quote interpolation.</li>
  <li><code>contains_word(string $haystack, string $needle): bool</code> —
      Ruby's <code>include?</code> is <code>str_contains($haystack, $needle)</code>
      (the <code>?</code> naming convention doesn't exist; the <code>: bool</code>
      return type says it instead).</li>
  <li><code>join_words(array $words): string</code> — <code>join(", ")</code>
      is <code>implode(", ", $words)</code>. Watch the argument order: glue
      first, array second.</li>
</ol>
<p>Remember: every function needs an explicit <code>return</code>.</p>`,

  starter: `<?php

// 1. Method -> function: s.upcase becomes strtoupper($s).

    throw new Exception("TODO: implement shout");
}

// 2. "#{name} is #{age}" becomes "$name is $age" — no braces needed.

    throw new Exception("TODO: implement greet");
}

// 3. haystack.include?(needle) becomes str_contains($haystack, $needle).
function contains_word(string $haystack, string $needle): bool {
    throw new Exception("TODO: implement contains_word");
}

// 4. words.join(", ") becomes implode(", ", $words) — glue comes FIRST.
function join_words(array $words): string {
    throw new Exception("TODO: implement join_words");
}
`,

  requirements: [
    { pattern: /"\$\w+|\{\$\w+/, message: "Use double-quote interpolation in greet" },
    { pattern: /strtoupper/, message: "Use strtoupper() in shout" },
    { pattern: /str_contains/, message: "Use str_contains() in contains_word" },
    { pattern: /implode/, message: "Use implode() in join_words" },
  ],

  tests: [
    { name: 'shout("hello") returns "HELLO"',
      code: 'expect_eq(shout("hello"), "HELLO");' },
    { name: 'greet("Ada", 36) returns "Ada is 36"',
      code: 'expect_eq(greet("Ada", 36), "Ada is 36");' },
    { name: 'contains_word("to be or not", "be") is true',
      code: 'expect_true(contains_word("to be or not", "be"));' },
    { name: 'contains_word("to be or not", "quokka") is false',
      code: 'expect_eq(contains_word("to be or not", "quokka"), false);' },
    { name: 'join_words(["x", "y", "z"]) returns "x, y, z"',
      code: 'expect_eq(join_words(["x", "y", "z"]), "x, y, z");' },
  ],

  solution: `<?php

function shout(string $s): string {
    return strtoupper($s);
}

function greet(string $name, int $age): string {
    return "$name is $age";
}

function contains_word(string $haystack, string $needle): bool {
    return str_contains($haystack, $needle);
}

function join_words(array $words): string {
    return implode(", ", $words);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>PHP</th></tr>
  <tr><td>Interpolation</td><td><code>"#{name}"</code></td><td><code>"$name"</code>; expressions need <code>"{$user['name']}"</code></td></tr>
  <tr><td>Concatenation</td><td><code>a + b</code></td><td><code>$a . $b</code> (and <code>.=</code> for append)</td></tr>
  <tr><td>Uppercase / lowercase</td><td><code>s.upcase</code> / <code>s.downcase</code></td><td><code>strtoupper($s)</code> / <code>strtolower($s)</code></td></tr>
  <tr><td>Substring test</td><td><code>s.include?(x)</code></td><td><code>str_contains($s, $x)</code></td></tr>
  <tr><td>Length</td><td><code>s.length</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td>Join</td><td><code>words.join(", ")</code></td><td><code>implode(", ", $words)</code></td></tr>
  <tr><td>Trim / replace / split</td><td><code>s.strip</code>, <code>s.gsub</code>, <code>s.split</code></td><td><code>trim($s)</code>, <code>str_replace(...)</code>, <code>explode(...)</code></td></tr>
</table>
<p>The <code>str_*</code> toolbox replaces <code>String</code>'s methods
wholesale, and argument order is worth memorizing per function —
<code>str_contains(haystack, needle)</code> but
<code>implode(glue, array)</code>. When in doubt, the receiver you'd have
written in Ruby is usually the first argument… except when it isn't.
Editor autocomplete on <code>str_</code> is your friend.</p>`,
};
