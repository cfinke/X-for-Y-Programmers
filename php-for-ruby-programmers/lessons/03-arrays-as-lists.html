<div id="app"></div>
<script>
const LESSON = {
  number: 3,
  title: "Arrays as Lists",

  intro: `
<p>List literals are identical — <code>[1, 2, 3]</code> is valid in both
languages. From there the toolbox pattern from the strings lesson repeats:
Ruby's <code>Array</code> methods become PHP functions.
<code>arr &lt;&lt; x</code> becomes the append-bracket syntax
<code>$arr[] = $x;</code>, <code>.size</code> becomes <code>count($arr)</code>,
and <code>.sum</code> becomes <code>array_sum($nums)</code>.</p>
<table>
  <tr><th>Ruby</th><th>PHP</th></tr>
  <tr><td><code>[1, 2, 3]</code></td><td><code>[1, 2, 3]</code> (same!)</td></tr>
  <tr><td><code>arr &lt;&lt; x</code></td><td><code>$arr[] = $x;</code></td></tr>
  <tr><td><code>arr.size</code></td><td><code>count($arr)</code></td></tr>
  <tr><td><code>arr.include?(x)</code></td><td><code>in_array($x, $arr, true)</code></td></tr>
  <tr><td><code>arr.sum</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td><code>arr.dup</code> before mutating</td><td>unnecessary — assignment already copies</td></tr>
</table>
<p>The deep difference is <em>value semantics</em>. Ruby arrays are references:
pass one to a method, mutate it, and the caller sees the change — hence the
defensive <code>.dup</code> you sometimes forget. PHP arrays <strong>copy on
assignment</strong>: <code>$b = $a;</code> or passing to a function gives you
an independent copy (efficiently, via copy-on-write). The
"who mutated my array?!" bug simply cannot happen — it's the <code>.dup</code>
you never have to remember.</p>`,

  ruby: `def make_scores
  [90, 85, 100]
end

def append(arr, x)
  copy = arr.dup # forget .dup and the CALLER's array mutates!
  copy << x
  copy
end

def total(nums)
  nums.sum
end

scores = make_scores
scores.size            # 3
scores.include?(100)   # true
append(scores, 75)     # [90, 85, 100, 75]
scores                 # still [90, 85, 100] — thanks, .dup
total(scores)          # 275`,

  task: `
<p>Port the Ruby to PHP:</p>
<ol>
  <li><code>make_scores(): array</code> — return the list
      <code>[90, 85, 100]</code>. The literal is character-for-character
      Ruby; only the declared <code>: array</code> return type is new
      (PHP has one <code>array</code> type covering lists and hashes).</li>
  <li><code>append(array $arr, int $x): array</code> — push <code>$x</code>
      with <code>$arr[] = $x;</code> and return <code>$arr</code>. No
      <code>.dup</code> needed: <code>$arr</code> is already the function's own
      copy, so the caller's array is untouched. A test checks exactly that.</li>
  <li><code>total(array $nums): int</code> — <code>.sum</code> becomes
      <code>array_sum($nums)</code>.</li>
</ol>`,

  starter: `<?php

// 1. Same literal as Ruby, plus a declared : array return type.
function make_scores(): array {
    throw new Exception("TODO: implement make_scores");
}

// 2. arr << x  ->  $arr[] = $x;  then return $arr.
//    $arr is already a copy — value semantics, no .dup needed.
function append(array $arr, int $x): array {
    throw new Exception("TODO: implement append");
}

// 3. nums.sum  ->  array_sum($nums)
function total(array $nums): int {
    throw new Exception("TODO: implement total");
}
`,

  requirements: [
    { pattern: /\[\]\s*=/, message: "Append with $arr[] = $x (PHP's <<)" },
    { pattern: /count\(|array_sum\(/, message: "Use the array function toolbox (array_sum / count)" },
    { pattern: /:\s*array/, message: "Declare : array return types" },
  ],

  tests: [
    { name: "make_scores() returns [90, 85, 100]",
      code: "expect_eq(make_scores(), [90, 85, 100]);" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "expect_eq(append([1, 2], 3), [1, 2, 3]);" },
    { name: "append leaves the caller's array untouched (value semantics)",
      code: "$orig = [1, 2];\nappend($orig, 3);\nexpect_eq($orig, [1, 2]);" },
    { name: "total([90, 85, 100]) returns 275",
      code: "expect_eq(total([90, 85, 100]), 275);" },
    { name: "count(make_scores()) is 3",
      code: "expect_eq(count(make_scores()), 3);" },
  ],

  solution: `<?php

function make_scores(): array {
    return [90, 85, 100];
}

function append(array $arr, int $x): array {
    $arr[] = $x; // mutates only this function's copy
    return $arr;
}

function total(array $nums): int {
    return array_sum($nums);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>PHP</th></tr>
  <tr><td>Literal</td><td><code>[1, 2, 3]</code></td><td><code>[1, 2, 3]</code></td></tr>
  <tr><td>Append</td><td><code>arr &lt;&lt; x</code></td><td><code>$arr[] = $x;</code></td></tr>
  <tr><td>Length</td><td><code>arr.size</code> / <code>arr.length</code></td><td><code>count($arr)</code></td></tr>
  <tr><td>Membership</td><td><code>arr.include?(x)</code></td><td><code>in_array($x, $arr, true)</code> — always pass <code>true</code> for strict comparison</td></tr>
  <tr><td>Sum</td><td><code>arr.sum</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td>First / last</td><td><code>arr.first</code> / <code>arr.last</code></td><td><code>$arr[0]</code> / <code>$arr[count($arr) - 1]</code></td></tr>
  <tr><td>Defensive copy</td><td><code>arr.dup</code></td><td>not needed — assignment and argument passing copy</td></tr>
</table>
<p>Because arrays copy on assignment, the idiomatic PHP shape for
"add something" is exactly what you wrote: take an array, modify your copy,
<em>return</em> it. If you genuinely want Ruby-style shared mutation you must
opt in with a reference parameter (<code>function f(array &$arr)</code>) —
the aliasing you get for free in Ruby is explicit and rare in PHP.</p>`,
};
