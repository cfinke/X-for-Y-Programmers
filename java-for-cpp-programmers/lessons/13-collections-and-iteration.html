  intro: `
<p>In C++ you reach for one workhorse per job: <code>std::vector&lt;T&gt;</code>,
<code>std::set&lt;T&gt;</code>, and <code>std::map&lt;K, V&gt;</code>. Java has the
same three ideas, but they are <em>interfaces</em> — <code>List</code>,
<code>Set</code>, <code>Map</code> — each with concrete classes behind them
(<code>ArrayList</code>, <code>HashSet</code>, <code>HashMap</code>). You
program to the interface and pick the implementation when you create it.</p>
<table>
  <tr><th>C++</th><th>Java</th></tr>
  <tr><td><code>std::vector&lt;int&gt; xs = {1, 2};</code></td><td><code>List&lt;Integer&gt; xs = new ArrayList&lt;&gt;(List.of(1, 2));</code></td></tr>
  <tr><td><code>std::set&lt;int&gt;()</code></td><td><code>new HashSet&lt;Integer&gt;()</code></td></tr>
  <tr><td><code>std::map&lt;std::string, int&gt;()</code></td><td><code>new HashMap&lt;String, Integer&gt;()</code></td></tr>
  <tr><td><code>for (const auto&amp; x : xs)</code></td><td><code>for (var x : xs)</code></td></tr>
  <tr><td><code>std::sort(xs.begin(), xs.end())</code></td><td><code>xs.sort(Comparator.naturalOrder())</code></td></tr>
</table>
<p>The big shift is sorting. C++'s <code>std::sort</code> takes a pair of
iterators plus an optional raw <code>bool(const T&amp;, const T&amp;)</code>
predicate that you compose by hand — often a lambda with a manual
<code>&lt;</code>-chain for tiebreaking. Java gives you a
<code>Comparator&lt;T&gt;</code> <em>builder</em>:
<code>Comparator.comparing(Person::name)</code> makes a comparator from a key
extractor, <code>.thenComparing(...)</code> adds a tiebreaker, and
<code>.reversed()</code> flips the direction. <code>List.sort</code> (or the
static <code>Collections.sort</code>) sorts in place; there is no
hand-rolled less-than lambda to get wrong.</p>`,

  std::sort(people.begin(), people.end(), [](const Person& a, const Person& b) {
    if (a.age != b.age) return a.age < b.age;
    return a.name < b.name;
  });

}

std::vector<std::string> names;

std::set<int> ages;
for (const auto& p : people) ages.insert(p.age);`,

  solution: `record Person(String name, int age) {}

class Roster {
  static List<String> names(List<Person> people) {
    List<String> result = new ArrayList<>();
    for (var p : people) {
      result.add(p.name());
    }
    return result;
  }

  static Set<Integer> uniqueAges(List<Person> people) {
    Set<Integer> ages = new HashSet<>();
    for (var p : people) {
      ages.add(p.age());
    }
    return ages;
  }

  static Map<String, Integer> ageByName(List<Person> people) {
    Map<String, Integer> map = new HashMap<>();
    for (var p : people) {
      map.put(p.name(), p.age());
    }
    return map;
  }

  static List<Person> sortedByAgeThenName(List<Person> people) {
    List<Person> copy = new ArrayList<>(people);
    copy.sort(Comparator.comparingInt(Person::age).thenComparing(Person::name));
    return copy;
  }

  static List<Person> sortedByNameDesc(List<Person> people) {
    List<Person> copy = new ArrayList<>(people);
    copy.sort(Comparator.comparing(Person::name).reversed());
    return copy;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Java</th></tr>
  <tr><td>Ordered list</td><td><code>std::vector&lt;T&gt;</code></td><td><code>List&lt;T&gt;</code> (<code>ArrayList</code>)</td></tr>
  <tr><td>Unique set</td><td><code>std::set&lt;T&gt;</code></td><td><code>Set&lt;T&gt;</code> (<code>HashSet</code>)</td></tr>

  <tr><td>Sort by key</td><td><code>std::sort(xs.begin(), xs.end(), [](auto&amp; a, auto&amp; b){ return a.age &lt; b.age; })</code></td><td><code>xs.sort(Comparator.comparingInt(P::age))</code></td></tr>
  <tr><td>Tiebreak</td><td>extra <code>if</code> inside the lambda</td><td><code>.thenComparing(P::name)</code></td></tr>
  <tr><td>Descending</td><td>flip the <code>&lt;</code> to <code>&gt;</code> in the lambda</td><td><code>.reversed()</code> / <code>Comparator.reverseOrder()</code></td></tr>
</table>
<p>Two gotchas for a C++ refugee. First, <code>List.of(...)</code>,
<code>Set.of(...)</code>, and <code>Map.of(...)</code> return <em>immutable</em>
collections — calling <code>.add</code> or <code>.sort</code> on them throws
<code>UnsupportedOperationException</code>, unlike a plain <code>const</code>
<code>std::vector</code> where the constness is enforced (or not) by the type
system rather than at runtime. Wrap them in <code>new ArrayList&lt;&gt;(...)</code>
when you need to mutate, which is exactly why the sort methods copy first.
Second, <code>List.sort</code> mutates in place and returns <code>void</code> —
just like <code>std::sort</code>, which also mutates the range in place and
returns nothing — so <code>list.sort(cmp)</code> is a statement, not something
you chain off of.</p>`,
