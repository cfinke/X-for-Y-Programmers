  intro: `
<p>Java's <code>String</code> is nothing like C++'s <code>std::string</code> in
one crucial way: it is <em>immutable</em>. Where C++ lets you write
<code>s[0] = 'X';</code> or call <code>s.append(...)</code> to mutate a string
in place, every Java "mutating" method — <code>toUpperCase()</code>,
<code>trim()</code>, <code>replace()</code> — returns a brand-new
<code>String</code> and leaves the original untouched. There's also no
operator-overload trick like <code>ostringstream</code>'s <code>&lt;&lt;</code>;
instead you concatenate with <code>+</code> or reach for
<code>String.format</code> (Java's <code>printf</code>-style formatter). And
because repeated <code>+=</code> in a loop allocates a fresh object every time,
Java gives you <code>StringBuilder</code> for that — a distinct mutable class,
where C++ would just keep appending to the same <code>std::string</code>.</p>
<table>
  <tr><th>C++</th><th>Java</th></tr>
  <tr><td><code>std::transform(s.begin(), s.end(), s.begin(), ::toupper)</code></td><td><code>s.toUpperCase()</code></td></tr>
  <tr><td><code>s.find("x") != std::string::npos</code></td><td><code>s.contains("x")</code></td></tr>
  <tr><td><code>s.substr(1, 3)</code></td><td><code>s.substring(1, 4)</code></td></tr>
  <tr><td>hand-rolled with <code>find_first_not_of</code>/<code>find_last_not_of</code></td><td><code>s.strip()</code> (Unicode-aware)</td></tr>
  <tr><td>hand-rolled loop (no built-in repeat)</td><td><code>"ab".repeat(3)</code></td></tr>
  <tr><td><code>std::format("{} and {}", a, b)</code> / <code>ostringstream</code></td><td><code>String.format("%s and %s", a, b)</code></td></tr>
</table>
<p>Two things to keep in mind. First, <code>substring</code> takes a start and an
<em>end</em> index, whereas C++'s <code>substr</code> takes a start and a
<em>length</em> — mind the difference when porting bounds. Second, because
<code>String</code> is immutable, every method that "changes" a string
actually returns a new one — <code>s.replace(...)</code> does nothing unless
you capture the result, unlike C++ where <code>std::string::replace</code>
mutates in place.</p>`,

  cpp: `#include <string>
#include <vector>
#include <algorithm>
#include <sstream>

std::string s = "  Hello, World  ";

std::string shout(std::string s) {
    size_t start = s.find_first_not_of(" ");
    size_t end = s.find_last_not_of(" ");
    s = s.substr(start, end - start + 1);
    std::transform(s.begin(), s.end(), s.begin(), ::toupper);
    return s;
}

std::string greeting(const std::string& name, int count) {
    std::ostringstream out;
    out << name << " x" << count;
    return out.str();
}

std::string joinWords(const std::vector<std::string>& words) {
    std::string out;
    for (const auto& w : words) out += w + "-";
    return out;
}`,

  solution: `class Strings {
  static String shout(String s) {
    return s.strip().toUpperCase();
  }

  static String greeting(String name, int count) {
    return String.format("%s x%d", name, count);
  }

  static String initials(String full) {
    StringBuilder sb = new StringBuilder();
    for (String word : full.split(" ")) {
      if (!word.isBlank()) {
        sb.append(word.substring(0, 1).toUpperCase());
      }
    }
    return sb.toString();
  }

  static String censor(String s, String word) {
    return s.replace(word, "***");
  }
}
`,

<table>

</table>
<p>Watch out: Java's <code>String.split</code> takes a <em>regular expression</em>,
not a literal string, so <code>split(".")</code> splits on every character. Escape
it (<code>split("\\\\.")</code>) or use <code>Pattern.quote</code> when you mean a
literal dot — unlike C++, which has no built-in <code>split</code> at all, so a
literal dot never gets accidentally treated as a wildcard. Also note
<code>strip()</code> (Java 11+) is the Unicode-aware replacement for the older
<code>trim()</code>, which only removes ASCII control characters. And since
strings are immutable, <code>StringBuilder</code> is not an optimization detail
but the idiomatic way to assemble text piece by piece — call
<code>toString()</code> when you are done, much as you would just keep
appending to a mutable <code>std::string</code> in C++ without a second
thought.</p>`,
