  number: 18,
  title: "equals, hashCode & Comparable",

  intro: `
<p>In C++, <code>==</code> on objects only exists if you define
<code>operator==</code> yourself — for a plain class with no such operator, the
code simply fails to compile. Sorting is a callback (or an <code>operator&lt;</code>):
<code>std::sort(v.begin(), v.end(), [](auto&amp; a, auto&amp; b){ return a.x &lt; b.x; });</code>.
Java bakes both of these into the object model. Every class inherits
<code>equals(Object)</code> and <code>hashCode()</code> from <code>Object</code> —
by default they mean reference identity — and you <em>override</em> them to give a
class value semantics. For ordering, a class implements
<code>Comparable&lt;T&gt;</code> and defines <code>compareTo</code>, which
<code>Collections.sort</code> and <code>TreeSet</code> use automatically.</p>
<table>
  <tr><th>C++</th><th>Java</th></tr>
  <tr><td><code>a == b</code> (needs <code>operator==</code>)</td><td><code>a == b</code> (identity)</td></tr>
  <tr><td>custom <code>operator==</code> or helper function</td><td>override <code>a.equals(b)</code></td></tr>
  <tr><td><code>std::hash&lt;T&gt;</code> specialization for unordered containers</td><td>override <code>hashCode()</code> to match <code>equals</code></td></tr>
  <tr><td><code>std::sort(v.begin(), v.end(), cmp)</code> or <code>operator&lt;</code></td><td><code>implements Comparable&lt;T&gt;</code> + <code>compareTo</code></td></tr>
</table>
<p>The load-bearing rule is <strong>the equals/hashCode contract</strong>: if
<code>a.equals(b)</code> is true, then <code>a.hashCode() == b.hashCode()</code>
must also be true. Break it and hash-based collections
(<code>HashMap</code>, <code>HashSet</code>) silently misbehave — a key you
inserted becomes unfindable. Override the two together, always, over the same
fields. <code>Objects.equals</code> and <code>Objects.hash</code> make this a
one-liner each.</p>`,

  cpp: `class Money {
public:
  Money(int cents, std::string currency) : cents(cents), currency(std::move(currency)) {}
  int cents;
  std::string currency;
};

// value equality is a manual operator== (or hand-written helper) in C++
bool operator==(const Money& a, const Money& b) {
  return a.cents == b.cents && a.currency == b.currency;
}

// sorting is a callback
std::sort(wallet.begin(), wallet.end(),
          [](const Money& a, const Money& b) { return a.cents < b.cents; });`,

  task: `
<p>Build a small value class <code>Money</code> that has both value equality and a
natural ordering.</p>
<ol>
  <li>Give it two fields: <code>int cents</code> and <code>String currency</code>,
      set in the constructor. Make the class <code>implements Comparable&lt;Money&gt;</code>.</li>
  <li>Override <code>equals(Object o)</code> so two <code>Money</code> values are
      equal when both <code>cents</code> and <code>currency</code> match. Use the
      <code>getClass()</code> check and a cast, then compare fields
      (<code>Objects.equals</code> for the String).</li>
  <li>Override <code>hashCode()</code> consistently with
      <code>equals</code> — <code>return Objects.hash(cents, currency);</code></li>
  <li>Implement <code>compareTo(Money other)</code> for natural ordering by
      <code>cents</code> ascending. Use <code>Integer.compare(this.cents, other.cents)</code>
      (never <code>this.cents - other.cents</code>, which can overflow).</li>
</ol>
<p>Once <code>compareTo</code> exists, <code>Collections.sort(list)</code> works
with no comparator argument.</p>`,

`,

  requirements: [
    { pattern: /public\s+boolean\s+equals\s*\(\s*Object/, message: "Override equals(Object o)" },
    { pattern: /public\s+int\s+hashCode\s*\(/, message: "Override hashCode()" },

  tests: [
    { name: "equal values are equal", code: "      expect_true(new Money(500, \"USD\").equals(new Money(500, \"USD\")));" },
    { name: "different cents are not equal", code: "      expect_true(!new Money(500, \"USD\").equals(new Money(750, \"USD\")));" },
    { name: "different currency is not equal", code: "      expect_true(!new Money(500, \"USD\").equals(new Money(500, \"EUR\")));" },
    { name: "hashCode matches for equal values", code: "      expect_eq(new Money(500, \"USD\").hashCode(), new Money(500, \"USD\").hashCode());" },
    { name: "works as a HashSet element", code: "      Set<Money> set = new HashSet<>();\n      set.add(new Money(500, \"USD\"));\n      expect_true(set.contains(new Money(500, \"USD\")));" },
    { name: "compareTo orders by cents", code: "      expect_true(new Money(300, \"USD\").compareTo(new Money(500, \"USD\")) < 0);\n      expect_true(new Money(500, \"USD\").compareTo(new Money(500, \"USD\")) == 0);" },
    { name: "Collections.sort uses natural ordering", code: "      List<Money> list = new ArrayList<>(List.of(new Money(300, \"USD\"), new Money(100, \"USD\"), new Money(200, \"USD\")));\n      Collections.sort(list);\n      expect_eq(list.get(0).cents, 100);\n      expect_eq(list.get(2).cents, 300);" },
  ],

  solution: `class Money implements Comparable<Money> {
  final int cents;
  final String currency;

  Money(int cents, String currency) {
    this.cents = cents;
    this.currency = currency;
  }

  @Override
  public boolean equals(Object o) {
    if (this == o) return true;
    if (o == null || getClass() != o.getClass()) return false;
    Money other = (Money) o;
    return cents == other.cents && Objects.equals(currency, other.currency);
  }

  @Override
  public int hashCode() {
    return Objects.hash(cents, currency);
  }

  @Override
  public int compareTo(Money other) {
    return Integer.compare(this.cents, other.cents);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Java</th></tr>
  <tr><td>Identity check</td><td><code>&amp;a == &amp;b</code></td><td><code>a == b</code></td></tr>
  <tr><td>Value equality</td><td>hand-written <code>operator==</code></td><td>override <code>equals(Object)</code></td></tr>
  <tr><td>Hashing</td><td><code>std::hash&lt;T&gt;</code> specialization</td><td>override <code>hashCode()</code> to match equals</td></tr>
  <tr><td>Combine fields into a hash</td><td>manual XOR/mix, or boost::hash_combine</td><td><code>Objects.hash(a, b)</code></td></tr>
  <tr><td>Natural ordering</td><td>hand-written <code>operator&lt;</code></td><td><code>Comparable&lt;T&gt;.compareTo</code></td></tr>
  <tr><td>One-off ordering</td><td>comparator lambda passed to <code>std::sort</code></td><td><code>Comparator</code> passed to sort</td></tr>
</table>
<p>The contract is the whole point: <code>equals</code> and <code>hashCode</code>
travel together and must be computed from the same fields, or
<code>HashMap</code>/<code>HashSet</code> break. In real code you'd usually reach
for a <a><code>record</code></a>, which generates a correct
<code>equals</code>/<code>hashCode</code> for you — much like a defaulted
<code>operator==</code> and <code>operator&lt;=&gt;</code> on a C++20
<code>struct</code> generate comparisons from the member list — but records still
need a hand-written <code>compareTo</code> if you want ordering, and knowing the
manual version explains what the record is doing under the hood.</p>
<p><code>compareTo</code> returns a sign, not a boolean: negative means
<code>this</code> sorts before <code>other</code>, zero means equal ordering,
positive means after — exactly the contract of a C++ three-way comparator. Prefer
<code>Integer.compare</code> / <code>Comparator</code> chains over subtracting,
since subtraction can overflow for large values.</p>`,
};
