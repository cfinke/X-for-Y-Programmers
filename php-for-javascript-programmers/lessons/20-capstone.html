  intro: `
<p>Nothing new this time — the capstone is an inventory module built from
pieces you already own: a promoted-constructor class, the
<code>array_map</code>/<code>array_filter</code>/<code>array_reduce</code>
trio, nullable return types, and one semantic point worth engraving. PHP
arrays <strong>copy</strong> on assignment — but the <strong>objects inside
them are handles</strong>, exactly like JS references. Copy an array of
<code>Item</code> objects and you get a new array pointing at the <em>same</em>
items; mutate one and both "copies" see it.</p>
<table>
  <tr><th>JavaScript</th><th>PHP</th></tr>
  <tr><td><code>items.reduce((s, i) =&gt; ..., 0)</code></td><td><code>array_reduce($items, fn($s, $i) =&gt; ..., 0)</code></td></tr>
  <tr><td><code>items.find(...) ?? null</code></td><td><code>foreach</code> + return, declared <code>: ?Item</code></td></tr>
  <tr><td><code>{ ...item, count: c + n }</code> (spread-copy)</td><td><code>$copy = clone $item; $copy-&gt;count += $n;</code></td></tr>
  <tr><td><code>items.filter(...).map(...)</code></td><td><code>array_values(array_map(..., array_filter(...)))</code></td></tr>
</table>
<p>So a non-mutating update has two layers here, just as in JS: a fresh
array (which PHP's copy semantics nearly give you for free) <em>and</em> a
fresh object for the one element you're changing — that's what
<code>clone</code> is for, PHP's spelling of the <code>{ ...item }</code>
spread-copy. Everything else in the object graph can be shared untouched.</p>`,

  javascript: `class Item {
  constructor(name, priceCents, count) {
    Object.assign(this, { name, priceCents, count });
  }
}

  items.find((i) => i.name === name) ?? null;

function restock(items, name, amount) {
  // new array + copied object for the match: no mutation anywhere
  return items.map((i) =>
    i.name === name ? Object.assign(new Item(), i, { count: i.count + amount }) : i);
}

const namesInStock = (items) =>
  items.filter((i) => i.count > 0).map((i) => i.name);`,

  solution: `<?php

class Item {
    public function __construct(
        public string $name,
        public int $price_cents,
        public int $count,
    ) {}
}

function total_value(array $items): int {
    return array_reduce(
        $items,
        fn($sum, $item) => $sum + $item->price_cents * $item->count,
        0,
    );
}

function find_item(array $items, string $name): ?Item {
    foreach ($items as $item) {
        if ($item->name === $name) {
            return $item;
        }
    }
    return null;
}

function restock(array $items, string $name, int $amount): array {
    return array_map(function (Item $item) use ($name, $amount) {
        if ($item->name !== $name) {
            return $item;
        }
        $copy = clone $item;
        $copy->count += $amount;
        return $copy;
    }, $items);
}

function names_in_stock(array $items): array {
    $in_stock = array_filter($items, fn($item) => $item->count > 0);
    return array_values(array_map(fn($item) => $item->name, $in_stock));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>PHP</th></tr>
  <tr><td>Sum a list</td><td><code>reduce((s, x) =&gt; ..., 0)</code></td><td><code>array_reduce($a, fn($s, $x) =&gt; ..., 0)</code></td></tr>
  <tr><td>Find or null</td><td><code>find(...) ?? null</code></td><td><code>foreach</code> + <code>return</code>, typed <code>: ?Item</code></td></tr>
  <tr><td>Shallow-copy an object</td><td><code>{ ...item }</code></td><td><code>clone $item</code></td></tr>
  <tr><td>Copy an array</td><td><code>[...items]</code> (explicit)</td><td>assignment / <code>array_map</code> (automatic)</td></tr>
  <tr><td>Objects in arrays</td><td>references</td><td>handles — the one thing PHP does <em>not</em> copy</td></tr>
  <tr><td>Filter + reindex</td><td><code>filter()</code> (fresh indexes free)</td><td><code>array_values(array_filter(...))</code></td></tr>
</table>
<p>The deep insight — and the course's value-semantics story completed:
PHP arrays copy, PHP objects don't. <code>restock</code> shows both layers
working together: <code>array_map</code> hands you a brand-new array (layer
one, free), but every element in it is still a live handle to an original
<code>Item</code> — so the one element you intend to change must be
<code>clone</code>d (layer two, explicit) before you touch its
<code>count</code>. Share what you don't change, copy what you do: that's
the same discipline as <code>items.map(i =&gt; ({ ...i }))</code> in JS,
just with the copying split between the language and you.</p>`,
