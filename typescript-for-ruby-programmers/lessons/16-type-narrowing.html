<div id="app"></div>
<script>
const LESSON = {
  number: 16,
  title: "Type Narrowing & Guards",

  intro: `
<p>In Ruby, when a method receives "something", you interrogate it at runtime:
<code>value.is_a?(String)</code>, <code>value.is_a?(Array)</code>,
<code>value.respond_to?(:name)</code>. TypeScript has the same moves — but the
compiler <em>watches you make them</em>. Inside an
<code>if (typeof value === "string")</code> branch, the type of
<code>value</code> literally becomes <code>string</code>, and string methods
light up. This is called <strong>narrowing</strong>, and the checks that
trigger it are called <strong>type guards</strong>.</p>
<table>
  <tr><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td><code>x.is_a?(String)</code></td><td><code>typeof x === "string"</code></td></tr>
  <tr><td><code>x.is_a?(Numeric)</code></td><td><code>typeof x === "number"</code></td></tr>
  <tr><td><code>x.is_a?(Array)</code></td><td><code>Array.isArray(x)</code> (typeof says "object" for arrays!)</td></tr>
  <tr><td><code>x.is_a?(User)</code> (class instance)</td><td><code>x instanceof User</code></td></tr>
  <tr><td><code>x.respond_to?(:name)</code></td><td><code>"name" in x</code></td></tr>
  <tr><td><code>def user_like?(x)</code> duck check</td><td><code>function isUser(x): x is User</code> — a type predicate</td></tr>
</table>
<p>The starting point is <code>unknown</code> — TypeScript's safe "could be
anything". Unlike <code>any</code> (which lets you call whatever you want and
find out in production, very Ruby), <code>unknown</code> refuses every
operation until you narrow it. And the classic Ruby duck check —
<code>respond_to?(:name) &amp;&amp; respond_to?(:email)</code> — gets a formal home:
a <strong>custom type predicate</strong>. A function whose return type is
<code>value is User</code> tells the compiler "if I return true, you may treat
this as a User from here on". It is the duck test, documented and trusted by
the type checker.</p>`,

  ruby: `def describe_value(value)
  case value
  when String
    "string of length #{value.length}"
  when Numeric
    "number: #{value}"
  when Array
    "array of #{value.length} items"
  else
    if user_like?(value)
      "user: #{value[:name]}"
    elsif value.is_a?(Hash)
      "plain object"
    else
      "something else"
    end
  end
end

def user_like?(value)
  value.is_a?(Hash) && value.key?(:name) && value.key?(:email)
end`,

  task: `
<p>Port the Ruby to TypeScript, using narrowing instead of
<code>case/when</code>:</p>
<ol>
  <li>Write <code>isUser(value: unknown): value is User</code> — a custom type
      predicate that returns <code>true</code> only when <code>value</code> is
      a non-null object containing both a <code>"name"</code> and an
      <code>"email"</code> key. (Careful: <code>typeof null</code> is
      <code>"object"</code> — a famous JavaScript wart. Check for
      <code>null</code> explicitly.)</li>
  <li>Write <code>describeValue(value: unknown): string</code> that returns:
    <ul>
      <li><code>"string of length N"</code> for strings (use <code>typeof</code>)</li>
      <li><code>"number: N"</code> for numbers</li>
      <li><code>"array of N items"</code> for arrays (use <code>Array.isArray</code>)</li>
      <li><code>"user: NAME"</code> when <code>isUser</code> says so</li>
      <li><code>"plain object"</code> for any other non-null object</li>
      <li><code>"something else"</code> for everything left over</li>
    </ul>
  </li>
</ol>
<p>Notice that inside each branch, the editor knows the narrowed type: after
<code>isUser(value)</code> passes, <code>value.name</code> just works.</p>`,

  starter: `interface User {
  name: string;
  email: string;
}

// 1. The duck check, formalized. Return type "value is User" is a
//    type predicate: if this returns true, the compiler narrows.
//    Ruby: value.is_a?(Hash) && value.key?(:name) && value.key?(:email)
function isUser(value: unknown): value is User {
  // TODO: non-null object, with "name" in it and "email" in it
  return false;
}

// 2. Narrow the unknown, branch by branch — a case/when the compiler follows.
function describeValue(value: unknown): string {
  // TODO: typeof for string and number, Array.isArray for arrays,
  //       isUser for users, then plain objects, then the fallback.
  return "something else";
}
`,

  exportNames: ["isUser", "describeValue"],

  requirements: [
    { pattern: /unknown/, message: "Type the input as unknown — the safe \"could be anything\"" },
    { pattern: /\bis\s+\w+/, message: "Give isUser a type-predicate return type (value is User)" },
    { pattern: /typeof/, message: "Use typeof to narrow primitives, like is_a?(String)" },
    { pattern: /Array\.isArray/, message: "Use Array.isArray for the array branch — typeof calls arrays \"object\"" },
  ],

  tests: [
    { name: 'describeValue("hello") describes a string', run: (x) => expectEqual(x.describeValue("hello"), "string of length 5") },
    { name: "describeValue(42) describes a number", run: (x) => expectEqual(x.describeValue(42), "number: 42") },
    { name: "describeValue([1, 2, 3]) describes an array", run: (x) => expectEqual(x.describeValue([1, 2, 3]), "array of 3 items") },
    { name: "describeValue recognizes a user via the predicate", run: (x) => expectEqual(x.describeValue({ name: "Matz", email: "matz@ruby.org" }), "user: Matz") },
    { name: "other objects and leftovers fall through correctly", run: (x) => {
        expectEqual(x.describeValue({ role: "admin" }), "plain object");
        expectEqual(x.describeValue(true), "something else");
      } },
    { name: "isUser rejects null, strings, and near-misses", run: (x) => {
        expectEqual(x.isUser(null), false);
        expectEqual(x.isUser("Matz"), false);
        expectEqual(x.isUser({ name: "Matz" }), false);
        expectEqual(x.isUser({ name: "Matz", email: "matz@ruby.org" }), true);
      } },
  ],

  solution: `interface User {
  name: string;
  email: string;
}

function isUser(value: unknown): value is User {
  return (
    typeof value === "object" &&
    value !== null &&
    "name" in value &&
    "email" in value
  );
}

function describeValue(value: unknown): string {
  if (typeof value === "string") {
    return "string of length " + value.length;
  }
  if (typeof value === "number") {
    return "number: " + value;
  }
  if (Array.isArray(value)) {
    return "array of " + value.length + " items";
  }
  if (isUser(value)) {
    return "user: " + value.name;
  }
  if (typeof value === "object" && value !== null) {
    return "plain object";
  }
  return "something else";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td>Class check (primitive)</td><td><code>x.is_a?(String)</code></td><td><code>typeof x === "string"</code></td></tr>
  <tr><td>Array check</td><td><code>x.is_a?(Array)</code></td><td><code>Array.isArray(x)</code></td></tr>
  <tr><td>Instance check</td><td><code>x.is_a?(User)</code></td><td><code>x instanceof User</code> (real classes only)</td></tr>
  <tr><td>Duck check</td><td><code>x.respond_to?(:name)</code></td><td><code>"name" in x</code></td></tr>
  <tr><td>Reusable duck check</td><td><code>def user_like?(x)</code> — returns a bare boolean</td><td><code>isUser(x): x is User</code> — the compiler narrows on true</td></tr>
  <tr><td>"Anything" input</td><td>Every parameter, implicitly</td><td><code>unknown</code> — locked until narrowed (<code>any</code> = unlocked, avoid)</td></tr>
  <tr><td>Nil trap</td><td><code>nil.is_a?(Object)</code> is true</td><td><code>typeof null === "object"</code> — check null explicitly</td></tr>
</table>
<p>The insight: Ruby's runtime checks and TypeScript's guards are the same
gestures, but in TypeScript each check <em>changes the static type</em> inside
the branch. A custom predicate like <code>isUser</code> is where you encode a
duck test once, and the compiler then enforces everywhere that you actually
performed it before touching <code>.name</code> — no more
<code>NoMethodError for nil</code> at 2 a.m.</p>`,
};
</script>
