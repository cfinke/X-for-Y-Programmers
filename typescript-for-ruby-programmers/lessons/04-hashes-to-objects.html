<div id="app"></div>
<script>
const LESSON = {
  number: 4,
  title: "Hashes → Objects",

  intro: `
<p>Here is a pleasant surprise: Ruby's modern hash syntax,
<code>{ name: "Ada", age: 36 }</code>, is <em>character-for-character</em>
valid TypeScript. In Ruby it builds a Hash with symbol keys; in TypeScript it
builds an object literal. What changes is the access: instead of
<code>h[:name]</code> you write <code>obj.name</code> — dot access, as if
every hash key were an attr_reader.</p>
<table>
  <tr><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td><code>user = { name: "Ada", age: 36 }</code></td><td><code>const user = { name: "Ada", age: 36 };</code></td></tr>
  <tr><td><code>user[:name]</code></td><td><code>user.name</code></td></tr>
  <tr><td><code>h.fetch(:city, "Unknown")</code></td><td><code>obj.city ?? "Unknown"</code></td></tr>
  <tr><td><code>h.each { |k, v| ... }</code></td><td><code>for (const [k, v] of Object.entries(obj))</code></td></tr>
  <tr><td><code>h.keys</code> / <code>h.values</code></td><td><code>Object.keys(obj)</code> / <code>Object.values(obj)</code></td></tr>
</table>
<p>Two idioms deserve names. <code>fetch</code> with a default becomes the
<em>nullish coalescing</em> operator <code>??</code> — "use the left side
unless it's missing." And for a uniform hash — string keys, all values the
same type, like an inventory count — the type is
<code>Record&lt;string, number&gt;</code>: any string key, every value a
number. Iteration flips from receiver-first (<code>h.each</code>) to
function-first (<code>Object.entries(h)</code>), because plain objects don't
carry Enumerable along with them.</p>`,

  ruby: `user = { name: "Ada", age: 36 }   # this exact line is also TypeScript!

puts user[:name]                  # symbol-key access
puts user.fetch(:city, "Unknown") # default when the key is absent

stock = { apples: 3, pears: 5 }   # uniform: every value an Integer

stock.each do |fruit, count|
  puts "#{fruit}: #{count}"
end

puts stock.keys.inspect           # [:apples, :pears]
puts stock.values.sum             # 8`,

  task: `
<p>Translate the hash code into typed objects:</p>
<ol>
  <li>Declare a constant <code>user</code> as an object literal with
      <code>name: "Ada"</code> and <code>age: 36</code> — you can nearly
      paste the Ruby.</li>
  <li>Write a function <code>cityOf</code> that takes a user of type
      <code>{ name: string; city?: string }</code> (the <code>?</code> marks
      the key as optional) and returns the city, or <code>"Unknown"</code>
      when it's missing — use <code>??</code>, the <code>fetch</code>-default
      operator.</li>
  <li>Declare a constant <code>stock</code> of type
      <code>Record&lt;string, number&gt;</code> holding
      <code>apples: 3</code> and <code>pears: 5</code>.</li>
  <li>Write a function <code>describeStock</code> that takes a
      <code>Record&lt;string, number&gt;</code> and returns a
      <code>string[]</code> of <code>"key: value"</code> lines, using
      <code>Object.entries</code> the way Ruby uses
      <code>h.each { |k, v| }</code>.</li>
</ol>`,

  starter: `// 1. Ruby: user = { name: "Ada", age: 36 } — almost a straight paste
const user = { name: "", age: 0 }; // TODO: fill in the real values

// 2. Ruby: u.fetch(:city, "Unknown") — use ?? for the default
function cityOf(u: { name: string; city?: string }): string {
  // TODO
  return "";
}

// 3. A uniform hash: annotate with Record<string, number>
const stock = { apples: 3, pears: 5 }; // TODO: add the Record annotation

// 4. Ruby: h.each { |k, v| ... } — use Object.entries(h)
function describeStock(s: Record<string, number>): string[] {
  const lines: string[] = [];
  // TODO: push "key: value" for each entry
  return lines;
}
`,

  exportNames: ["user", "cityOf", "stock", "describeStock"],

  requirements: [
    { pattern: /Record\s*<\s*string\s*,\s*number\s*>/, message: "Annotate stock with Record<string, number> — the type of a uniform hash" },
    { pattern: /\?\?/, message: "Use the ?? operator — TypeScript's fetch-with-default" },
    { pattern: /Object\s*\.\s*(entries|keys)\s*\(/, message: "Use Object.entries(...) (or Object.keys) to iterate the object" },
  ],

  tests: [
    { name: 'user.name is "Ada" and user.age is 36', run: (x) => { expectEqual(x.user.name, "Ada"); expectEqual(x.user.age, 36); } },
    { name: 'cityOf({ name: "Ada", city: "London" }) returns "London"', run: (x) => expectEqual(x.cityOf({ name: "Ada", city: "London" }), "London") },
    { name: 'cityOf({ name: "Grace" }) returns "Unknown"', run: (x) => expectEqual(x.cityOf({ name: "Grace" }), "Unknown") },
    { name: "stock is { apples: 3, pears: 5 }", run: (x) => expectDeepEqual(x.stock, { apples: 3, pears: 5 }) },
    { name: 'describeStock({ apples: 3, pears: 5 }) returns ["apples: 3", "pears: 5"]', run: (x) => expectDeepEqual(x.describeStock({ apples: 3, pears: 5 }), ["apples: 3", "pears: 5"]) },
    { name: "describeStock({}) returns []", run: (x) => expectDeepEqual(x.describeStock({}), []) },
  ],

  solution: `const user = { name: "Ada", age: 36 };

function cityOf(u: { name: string; city?: string }): string {
  return u.city ?? "Unknown";
}

const stock: Record<string, number> = { apples: 3, pears: 5 };

function describeStock(s: Record<string, number>): string[] {
  const lines: string[] = [];
  for (const [key, value] of Object.entries(s)) {
    lines.push(\`\${key}: \${value}\`);
  }
  return lines;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td>Literal</td><td><code>{ name: "Ada", age: 36 }</code></td><td>Identical syntax</td></tr>
  <tr><td>Read a key</td><td><code>h[:name]</code></td><td><code>obj.name</code> (or <code>obj["name"]</code>)</td></tr>
  <tr><td>Default for missing key</td><td><code>h.fetch(:k, default)</code></td><td><code>obj.k ?? default</code></td></tr>
  <tr><td>Iterate pairs</td><td><code>h.each { |k, v| }</code></td><td><code>for (const [k, v] of Object.entries(obj))</code></td></tr>
  <tr><td>Keys / values</td><td><code>h.keys</code> / <code>h.values</code></td><td><code>Object.keys(obj)</code> / <code>Object.values(obj)</code></td></tr>
  <tr><td>Uniform hash type</td><td>(implicit)</td><td><code>Record&lt;string, number&gt;</code></td></tr>
  <tr><td>Optional key</td><td>any key may be absent</td><td><code>city?: string</code> — absence is declared</td></tr>
</table>
<p>The deeper shift: a Ruby hash is an open bag where any key might be
missing, so <code>fetch</code>-vs-<code>[]</code> discipline is on you. A
TypeScript object has a declared <em>shape</em> — fixed keys like
<code>user</code>, or uniform maps like <code>Record</code> — and the
compiler knows which keys exist, flags typos like <code>user.nmae</code>, and
makes you handle the optional ones. It's <code>fetch</code>-discipline,
enforced for free.</p>`,
};
</script>
