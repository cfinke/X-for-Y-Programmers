const LESSON = {
  number: 16,
  title: "Records",

  intro: `
<p>In Kotlin, a plain data holder is almost free — you write a
<code>data class</code> and the compiler generates
<code>equals</code>/<code>hashCode</code>/<code>toString</code>,
<code>copy()</code>, and <code>componentN()</code> destructuring functions for
you. Java's classic answer was a verbose "POJO": private fields, a
constructor, a getter per field, plus hand-written <code>equals</code>,
<code>hashCode</code>, and <code>toString</code>. A <strong>record</strong>
(Java 16+) collapses all of that into one line — a narrower, more opinionated
cousin of Kotlin's <code>data class</code>: every component is implicitly
<code>final</code>, there is no <code>var</code> option, and there is no
<code>copy()</code>.</p>
<table>
  <tr><th>Kotlin</th><th>Java</th></tr>
  <tr><td><code>data class Point(val x: Int, val y: Int)</code></td><td><code>record Point(int x, int y) {}</code></td></tr>
  <tr><td><code>p.x</code> (property)</td><td><code>p.x()</code> (accessor method)</td></tr>
  <tr><td><code>val</code> components are immutable, <code>var</code> ones aren't</td><td>components are <code>final</code> — deeply immutable API</td></tr>
  <tr><td>structural equality generated for you</td><td><code>equals</code>/<code>hashCode</code> auto-generated by value</td></tr>
</table>
<p>Declaring <code>record Point(int x, int y)</code> generates a canonical
constructor, a <code>final</code> field and an accessor (<code>x()</code>,
<code>y()</code>) for each component, and value-based <code>equals</code>,
<code>hashCode</code>, and <code>toString</code>. Two records with equal
components are <code>.equals()</code> — the same value semantics Kotlin's
<code>data class</code> already gives you with <code>==</code>. When you need
to validate, a <strong>compact constructor</strong> lets you check arguments
without repeating the parameter list, the same job Kotlin's <code>init</code>
block does. And a record can <code>implements</code> an interface, so it slots
into your existing contracts, just like a <code>data class</code> can.</p>`,

  kotlin: `interface Describable { fun describe(): String }

// a plain data shape
class Point(val x: Int, val y: Int)

// value equality is not built in for a plain (non-data) class:
val a = Point(3, 4)
val b = Point(3, 4)
println(a == b)                     // false (reference equality)
println(a.x == b.x && a.y == b.y)   // true (a manual comparison)`,

  task: `
<p>Model immutable data with records instead of hand-written classes.</p>
<ol>
  <li>Declare an interface <code>Describable</code> with one method
      <code>String describe()</code>.</li>
  <li>Declare a record <code>Point(int x, int y)</code> that
      <code>implements Describable</code>. Its <code>describe()</code> (declared
      <code>public</code>) returns the accessors formatted as
      <code>"(3, 4)"</code> — that is <code>"(" + x() + ", " + y() + ")"</code>.</li>
  <li>Declare a record <code>Money(String currency, long cents)</code> with a
      <strong>compact constructor</strong> that throws
      <code>IllegalArgumentException</code> when <code>cents</code> is negative.</li>
  <li>Do <em>not</em> write accessors, <code>equals</code>, <code>hashCode</code>,
      or <code>toString</code> — the record gives you those for free.</li>
</ol>`,

  starter: `interface Describable {
  String describe();
}

record Point(int x, int y) implements Describable {
  public String describe() {
    return ""; // TODO: format like "(3, 4)" using x() and y()
  }
}

record Money(String currency, long cents) {
  Money {
    // TODO: reject negative cents with IllegalArgumentException
  }
}
`,

  requirements: [
    { pattern: /record\s+Point\s*\(\s*int\s+x\s*,\s*int\s+y\s*\)\s*implements\s+Describable/, message: "Point must be a record implementing Describable" },
    { pattern: /record\s+Money\s*\(/, message: "Declare a record named Money" },
    { pattern: /throw\s+new\s+IllegalArgumentException/, message: "Validate in Money's compact constructor by throwing IllegalArgumentException" },
  ],

  tests: [
    { name: "generated accessors return the components", code: "      Point p = new Point(3, 4);\n      expect_eq(p.x(), 3);\n      expect_eq(p.y(), 4);" },
    { name: "records compare by value, not reference", code: "      expect_true(new Point(1, 2).equals(new Point(1, 2)));\n      expect_true(!new Point(1, 2).equals(new Point(1, 3)));" },
    { name: "equal records share a hashCode", code: "      expect_eq(new Point(1, 2).hashCode(), new Point(1, 2).hashCode());" },
    { name: "auto-generated toString", code: "      expect_eq(new Point(3, 4).toString(), \"Point[x=3, y=4]\");" },
    { name: "record implements the interface", code: "      Describable d = new Point(3, 4);\n      expect_eq(d.describe(), \"(3, 4)\");" },
    { name: "Money accessors and value equality", code: "      Money m = new Money(\"USD\", 150);\n      expect_eq(m.currency(), \"USD\");\n      expect_eq(m.cents(), 150L);\n      expect_true(m.equals(new Money(\"USD\", 150)));" },
    { name: "compact constructor rejects negative cents", code: "      boolean threw = false;\n      try { new Money(\"USD\", -1); } catch (IllegalArgumentException e) { threw = true; }\n      expect_true(threw);" },
  ],

  solution: `interface Describable {
  String describe();
}

record Point(int x, int y) implements Describable {
  public String describe() {
    return "(" + x() + ", " + y() + ")";
  }
}

record Money(String currency, long cents) {
  Money {
    if (cents < 0) {
      throw new IllegalArgumentException("cents must not be negative");
    }
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Java record</th></tr>
  <tr><td>Declare shape</td><td><code>data class Point(val x: Int, val y: Int)</code></td><td><code>record Point(int x, int y) {}</code></td></tr>
  <tr><td>Read a field</td><td><code>p.x</code></td><td><code>p.x()</code> (accessor)</td></tr>
  <tr><td>Value equality</td><td><code>a == b</code> (generated)</td><td><code>a.equals(b)</code> (generated)</td></tr>
  <tr><td>Printable form</td><td><code>toString()</code> → <code>Point(x=3, y=4)</code></td><td><code>toString()</code> → <code>Point[x=3, y=4]</code></td></tr>
  <tr><td>Validate on construction</td><td><code>init</code> block</td><td>compact constructor</td></tr>
  <tr><td>Satisfy a contract</td><td><code>class Point(...) : Interface</code></td><td><code>record X(...) implements I</code></td></tr>
</table>
<p>A record is a <em>transparent carrier for its components</em>: the component
list <em>is</em> the API. The compact constructor (<code>Money { ... }</code>,
no parameter list, no assignments) runs before the fields are set, so it is the
place for validation and normalization — you can even reassign a parameter
(e.g. <code>currency = currency.toUpperCase();</code>) and the record stores the
adjusted value, the same job Kotlin's <code>init</code> block does before a
constructor property is stored. Records are implicitly <code>final</code> and
their fields are <code>final</code>, so they cannot be subclassed and cannot be
mutated; to "change" one, build a new record — the same discipline Kotlin
nudges you toward with a <code>data class</code>'s generated <code>copy()</code>,
except a record gives you no <code>copy()</code> at all, so you call the
constructor again. They can add extra methods and implement interfaces, but
they cannot <code>extends</code> a class. Reach for a record whenever you would
have reached for a Kotlin <code>data class</code> and wanted that same value
semantics enforced by the language rather than by convention.</p>`,
};
