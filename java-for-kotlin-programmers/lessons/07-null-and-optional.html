  number: 7,
  title: "Null & Optional",

  intro: `
<p>In Kotlin, "no value" is baked into the type system itself —
<code>String</code> and <code>String?</code> are different types, and the
compiler forces you to handle the null case (with <code>?.</code>,
<code>?:</code>, or a smart cast) before you can use a nullable value. Java's
story is split. Any reference type can already be <code>null</code>, and the
compiler will happily let you call a method on it; you just get a
<code>NullPointerException</code> at runtime. To recover a Kotlin-like "might
be absent, handle it explicitly" contract, Java offers
<code>Optional&lt;T&gt;</code> — a small wrapper you return instead of a bare
nullable reference.</p>
<table>
  <tr><th>Kotlin</th><th>Java</th></tr>
  <tr><td><code>String?</code></td><td><code>Optional&lt;String&gt;</code></td></tr>
  <tr><td><code>x ?: "default"</code></td><td><code>opt.orElse("default")</code></td></tr>
  <tr><td><code>x != null</code></td><td><code>opt.isPresent()</code></td></tr>
  <tr><td><code>x?.length</code></td><td><code>opt.map(String::length)</code></td></tr>
  <tr><td><code>x?.let { use(it) }</code></td><td><code>opt.ifPresent(v -&gt; use(v))</code></td></tr>
</table>
<p>You build an <code>Optional</code> three ways: <code>Optional.of(x)</code> when
you know <code>x</code> is non-null (it throws if it isn't), <code>Optional.ofNullable(x)</code>
when <code>x</code> may be <code>null</code>, and <code>Optional.empty()</code> for
the definitely-absent case. The payoff is at the call site: a method that returns
<code>Optional&lt;String&gt;</code> makes "there may be no answer" part of its type,
so the caller can't silently forget — much like a Kotlin nullable type nudges you toward
a null check.</p>`,

  kotlin: `val emails: Map<String, String> = mapOf(
  "ada" to "ada@example.com",
  "grace" to "grace@example.com"
)

fun findEmail(name: String): String? = emails[name]

val email = findEmail("nobody") ?: "unknown@example.com"
val length = findEmail("ada")?.length ?: -1`,

  task: `
<p>Model a tiny directory lookup. A <code>Directory</code> class holds a map of
names to emails; the lookup returns an <code>Optional</code> so callers must decide
what to do when the name is missing.</p>
<ol>
  <li><code>findEmail(String name)</code> returns <code>Optional&lt;String&gt;</code>.
      Use <code>Optional.ofNullable(...)</code> on the map lookup — a missing key
      gives an empty <code>Optional</code>.</li>
  <li><code>emailOrDefault(String name)</code> returns the email, or
      <code>"unknown@example.com"</code> when absent. Unwrap with
      <code>orElse</code> (Java's <code>??</code>).</li>
  <li><code>emailLength(String name)</code> returns the email's length, or
      <code>-1</code> when absent. Chain <code>map(String::length)</code> then
      <code>orElse(-1)</code>.</li>
  <li><code>greeting(String name)</code> returns <code>"Hi &lt;email&gt;"</code>, or
      <code>"Hi guest"</code> when absent. Use <code>map(...).orElse(...)</code>.</li>
  <li><code>knownEmails(List&lt;String&gt; names)</code> returns the emails that
      exist, in order. Loop and use <code>ifPresent</code> to collect them.</li>
</ol>`,

    "ada", "ada@example.com",
    "grace", "grace@example.com"

  static Optional<String> findEmail(String name) {
    return Optional.empty(); // TODO

  static String emailOrDefault(String name) {
    return ""; // TODO

  static int emailLength(String name) {
    return 0; // TODO

}
`,

  requirements: [
    { pattern: /Optional</, message: "Return an Optional<String> from the lookup" },
    { pattern: /\.orElse\(/, message: "Unwrap with orElse to supply a fallback" },
    { pattern: /\.map\(/, message: "Transform the value with map" },
  ],

  tests: [
    { name: 'findEmail("ada") is present and correct', code: "      expect_true(Directory.findEmail(\"ada\").isPresent());\n      expect_eq(Directory.findEmail(\"ada\").get(), \"ada@example.com\");" },
    { name: 'findEmail("nobody") is empty', code: "      expect_true(Directory.findEmail(\"nobody\").isEmpty());" },
    { name: 'emailOrDefault falls back when absent', code: "      expect_eq(Directory.emailOrDefault(\"nobody\"), \"unknown@example.com\");" },
    { name: 'emailOrDefault returns the real email', code: "      expect_eq(Directory.emailOrDefault(\"grace\"), \"grace@example.com\");" },
    { name: 'emailLength maps then falls back', code: "      expect_eq(Directory.emailLength(\"ada\"), 15);\n      expect_eq(Directory.emailLength(\"nobody\"), -1);" },
    { name: 'greeting uses map + orElse', code: "      expect_eq(Directory.greeting(\"ada\"), \"Hi ada@example.com\");\n      expect_eq(Directory.greeting(\"nobody\"), \"Hi guest\");" },
    { name: 'knownEmails collects with ifPresent', code: "      expect_eq(Directory.knownEmails(List.of(\"ada\", \"nobody\", \"grace\")), List.of(\"ada@example.com\", \"grace@example.com\"));" },
  ],

  solution: `class Directory {
  static final Map<String, String> EMAILS = Map.of(
    "ada", "ada@example.com",
    "grace", "grace@example.com"
  );

  static Optional<String> findEmail(String name) {
    return Optional.ofNullable(EMAILS.get(name));
  }

  static String emailOrDefault(String name) {
    return findEmail(name).orElse("unknown@example.com");
  }

  static int emailLength(String name) {
    return findEmail(name).map(String::length).orElse(-1);
  }

  static String greeting(String name) {
    return findEmail(name).map(email -> "Hi " + email).orElse("Hi guest");
  }

  static List<String> knownEmails(List<String> names) {
    List<String> result = new ArrayList<>();
    for (String name : names) {
      findEmail(name).ifPresent(result::add);
    }
    return result;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Java</th></tr>
  <tr><td>Absent-aware return</td><td><code>T?</code></td><td><code>Optional&lt;T&gt;</code></td></tr>
  <tr><td>Wrap a maybe-null</td><td>—</td><td><code>Optional.ofNullable(x)</code></td></tr>
  <tr><td>Wrap a known value</td><td>—</td><td><code>Optional.of(x)</code></td></tr>
  <tr><td>The empty case</td><td><code>null</code></td><td><code>Optional.empty()</code></td></tr>
  <tr><td>Default</td><td><code>x ?: d</code></td><td><code>opt.orElse(d)</code></td></tr>
  <tr><td>Safe call</td><td><code>x?.f()</code></td><td><code>opt.map(v -&gt; v.f())</code></td></tr>
  <tr><td>Run a side effect</td><td><code>x?.let { g(it) }</code></td><td><code>opt.ifPresent(g)</code></td></tr>
</table>
<p>Reach for <code>Optional</code> as a <em>return type</em> for lookups that may
find nothing — that's exactly where a Kotlin programmer expects
<code>T?</code>. Prefer <code>orElse</code>, <code>map</code>, and
<code>ifPresent</code> over <code>get()</code>: calling <code>get()</code> on an
empty <code>Optional</code> throws <code>NoSuchElementException</code>, which just
trades one runtime blow-up for another — much like Kotlin's <code>!!</code>
operator trades a compile-time nullability check for a runtime
<code>NullPointerException</code>. And note what <code>Optional</code> is
not: it isn't a general replacement for <code>null</code> in fields or parameters,
and any reference can still be <code>null</code> — so a stray
<code>NullPointerException</code> remains Java's most common runtime error, the
very class of bug Kotlin's type system catches at compile time.</p>`,
};
