const LESSON = {
  number: 17,
  title: "Exceptions",

  intro: `
<p>Kotlin throws and catches typed exceptions — <code>catch (e: SomeException)</code>
rather than an untyped catch-all — but the language has no checked-exception concept
at all: Kotlin's designers deliberately dropped it, so every exception you throw or
catch, even ones that model I/O failures, is effectively unchecked. Java, which Kotlin
compiles down to and interoperates with, keeps the distinction it inherited. Unchecked
exceptions (subclasses of <code>RuntimeException</code>) behave like Kotlin's: throw
them freely, catch them if you want. <strong>Checked</strong> exceptions (subclasses of
<code>Exception</code> but not <code>RuntimeException</code>) are part of a method's
signature — you must either <code>catch</code> them or declare <code>throws</code> to
pass the buck, and the compiler enforces it.</p>
<table>
  <tr><th>Kotlin</th><th>Java</th></tr>
  <tr><td><code>throw RuntimeException("bad")</code></td><td><code>throw new RuntimeException("bad")</code></td></tr>
  <tr><td><code>catch (e: RuntimeException) { }</code></td><td><code>catch (RuntimeException e) { }</code></td></tr>
  <tr><td><code>try { } finally { }</code></td><td><code>try { } finally { }</code></td></tr>
  <tr><td>no checked exceptions</td><td><code>throws IOException</code> in the signature</td></tr>
  <tr><td><code>class MyErr(msg: String) : RuntimeException(msg)</code></td><td><code>class MyErr extends RuntimeException</code></td></tr>
</table>
<p>The <code>catch</code> clause names a type, exactly like Kotlin's, so you can have
several catches for different exception types, most specific first. Modern idiomatic
Java leans on unchecked exceptions for programming errors and validation, reserving
checked exceptions for recoverable, expected conditions (I/O, parsing) — the one corner
of Java's exception model that Kotlin has no direct equivalent for. A common pattern: a
method validates its input and <code>throw</code>s a custom
<code>RuntimeException</code>, and a defensive caller wraps the call in
<code>try/catch</code> and returns a fallback instead of blowing up.</p>`,

  kotlin: `class ValidationError(message: String) : Exception(message)

fun parsePositive(input: String): Int {
    val n = input.toIntOrNull() ?: throw ValidationError("not a number: $input")
    if (n <= 0) throw ValidationError("not positive: $n")
    return n
}

fun parseOrDefault(input: String, fallback: Int): Int {
    return try {
        parsePositive(input)
    } catch (e: ValidationError) {
        fallback
    }
}`,

  task: `
<p>Build a small validator plus a safe caller, mirroring the Kotlin above.</p>
<ol>
  <li>Define a custom exception <code>ValidationError</code> that
      <code>extends RuntimeException</code>. Give it a constructor taking a
      <code>String message</code> and calling <code>super(message)</code>.</li>
  <li>In a class <code>Validators</code>, write a <code>static int
      parsePositive(String input)</code> that parses <code>input</code> with
      <code>Integer.parseInt</code> and returns it — but if the value is
      <code>&lt;= 0</code> it must <code>throw new ValidationError(...)</code>.
      Declare it with <code>throws ValidationError</code> in the signature so
      the intent is explicit (this is legal for unchecked exceptions too).</li>
  <li>Write a <code>static int parseOrDefault(String input, int fallback)</code>
      that calls <code>parsePositive</code> inside a <code>try</code>, returns
      the parsed value, and in a <code>catch</code> returns <code>fallback</code>.
      Catch both <code>ValidationError</code> and the
      <code>NumberFormatException</code> that <code>Integer.parseInt</code>
      throws on bad text.</li>
</ol>`,

  starter: `class ValidationError extends RuntimeException {
  ValidationError(String message) {
    super(message);
  }
}

class Validators {
  static int parsePositive(String input) throws ValidationError {
    return 0; // TODO: parse and validate, throwing ValidationError when <= 0
  }

  static int parseOrDefault(String input, int fallback) {
    return 0; // TODO: try parsePositive, catch and return fallback
  }
}
`,

  requirements: [
    { pattern: /class\s+ValidationError\s+extends\s+RuntimeException/, message: "Define ValidationError extends RuntimeException" },
    { pattern: /throw\s+new\s+ValidationError/, message: "parsePositive must throw new ValidationError" },
    { pattern: /catch\s*\(/, message: "parseOrDefault must catch the exception" },
  ],

  tests: [
    { name: "parsePositive(\"42\") returns 42", code: "      expect_eq(Validators.parsePositive(\"42\"), 42);" },
    { name: "parseOrDefault(\"7\", -1) returns 7", code: "      expect_eq(Validators.parseOrDefault(\"7\", -1), 7);" },
    { name: "parseOrDefault(\"-5\", 99) falls back to 99", code: "      expect_eq(Validators.parseOrDefault(\"-5\", 99), 99);" },
    { name: "parseOrDefault(\"abc\", 0) falls back to 0", code: "      expect_eq(Validators.parseOrDefault(\"abc\", 0), 0);" },
    { name: "parsePositive(\"0\") throws ValidationError", code: "      boolean threw = false;\n      try { Validators.parsePositive(\"0\"); } catch (ValidationError e) { threw = true; }\n      expect_true(threw);" },
    { name: "the thrown exception carries a message", code: "      String msg = null;\n      try { Validators.parsePositive(\"-3\"); } catch (ValidationError e) { msg = e.getMessage(); }\n      expect_true(msg != null && msg.length() > 0);" },
  ],

  solution: `class ValidationError extends RuntimeException {
  ValidationError(String message) {
    super(message);
  }
}

class Validators {
  static int parsePositive(String input) throws ValidationError {
    int n = Integer.parseInt(input);
    if (n <= 0) {
      throw new ValidationError("not positive: " + n);
    }
    return n;
  }

  static int parseOrDefault(String input, int fallback) {
    try {
      return parsePositive(input);
    } catch (ValidationError | NumberFormatException e) {
      return fallback;
    }
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Java</th></tr>
  <tr><td>Throw</td><td><code>throw RuntimeException("x")</code></td><td><code>throw new RuntimeException("x")</code></td></tr>
  <tr><td>Typed catch</td><td><code>catch (e: IOException) { }</code></td><td><code>catch (IOException e) { }</code></td></tr>
  <tr><td>Multi-catch</td><td>no built-in syntax; catch a common supertype or branch with <code>when</code></td><td><code>catch (A | B e) { }</code></td></tr>
  <tr><td>Declared throws</td><td>— (only <code>@Throws</code> for Java interop)</td><td><code>void f() throws IOException</code></td></tr>
  <tr><td>Custom error</td><td><code>class MyErr(msg: String) : Exception(msg)</code></td><td><code>class MyErr extends RuntimeException</code></td></tr>
  <tr><td>Cleanup</td><td><code>finally { }</code> / <code>Closeable.use { }</code></td><td><code>finally { }</code> / try-with-resources</td></tr>
</table>
<p>The big mental shift is <strong>checked exceptions</strong> — a concept Kotlin
doesn't have at all. If a method declares <code>throws IOException</code> and that is a
checked type, Java callers cannot ignore it — the compiler rejects the code until you
catch it or re-declare it. (Kotlin code calling into such a Java method isn't forced to
catch anything, since the Kotlin compiler never enforces checked exceptions, even across
the Java boundary.) Extending <code>RuntimeException</code> (as we did) opts out of that
enforcement, which is why declaring <code>throws ValidationError</code> above is
optional documentation rather than a compiler-imposed contract — much like every
exception in Kotlin.</p>
<p>Two more niceties: multi-catch (<code>catch (A | B e)</code>) handles several types in
one block — Kotlin has no dedicated syntax for this, so you'd typically catch a shared
supertype instead — and <code>finally</code> runs whether or not an exception was
thrown, just as in Kotlin. For closing files, sockets, and other resources, prefer
<em>try-with-resources</em> (<code>try (var f = ...) { }</code>), which auto-closes
anything implementing <code>AutoCloseable</code>, the rough Java counterpart to Kotlin's
<code>Closeable.use { }</code> extension function.</p>`,
};
