  number: 1,
  title: "Variables & Types",

  intro: `
<p>There is no compilation step. A PHP file is a script: you save it, the
interpreter runs it, and that's the whole toolchain — no headers, no linker,
no <code>-std=c++17</code>, no build directory. Variables wear a
<code>$</code> sigil and are declared by assignment: <code>$age = 36;</code>
does what <code>int age = 36;</code> did, except the type lives with the
<em>value</em> at runtime, not with the variable at compile time. Memory is
garbage-collected (reference counting plus a cycle collector), so
<code>new</code>/<code>delete</code>, ownership, and lifetimes simply stop
being your problem.</p>
<table>
  <tr><th>C++17</th><th>PHP</th></tr>
  <tr><td><code>int age = 36;</code></td><td><code>$age = 36;</code> (no declared type)</td></tr>
  <tr><td><code>int</code>, <code>long</code>, <code>size_t</code>, …</td><td><code>int</code> — one integer type, 64-bit</td></tr>
  <tr><td><code>double</code>, <code>float</code></td><td><code>float</code> — one floating type (a C double)</td></tr>
  <tr><td><code>std::string s = "Ada";</code></td><td><code>$s = "Ada";</code></td></tr>
  <tr><td><code>std::format("{} is {}", n, a)</code></td><td><code>"$n is $a"</code> — interpolation in double quotes</td></tr>
  <tr><td><code>std::string f(int x)</code></td><td><code>function f(int $x): string</code></td></tr>
</table>
<p>Dynamic typing does not mean untyped. Since PHP 7/8, <em>function
signatures</em> take real type declarations — parameter types C-style before
the name, return type after a colon — and they are enforced at runtime: pass
a wrong-type argument and the call throws a <code>TypeError</code>, like a
<code>static_assert</code> that fires per-call instead of per-build. That
signature boundary is where this course keeps its types. One familiar
comfort: idiomatic PHP uses <code>snake_case</code> function names, the same
convention as the standard library you're leaving behind.</p>`,

  cpp: `#include <format>
#include <string>

std::string describe_user(const std::string& name, int age) {
    return std::format("{} is {} years old", name, age);
}

int birthday(int age) {
    int next = age;
    next += 1;
    return next;
}

// Types are checked before anything runs:
// describe_user(36, "Ada");   // compile error, caught by g++

int main() {
    auto line = describe_user("Ada", 36);
}`,

  task: `
<p>Rewrite the C++ on the left as PHP:</p>
<ol>
  <li>Write <code>describe_user</code> taking <code>string $name</code> and
      <code>int $age</code> (typed parameters, type before the name just like
      C) with a <code>: string</code> return type, returning
      <code>"Ada is 36 years old"</code>-style text. Skip
      <code>std::format</code>: in a double-quoted string, <code>$name</code>
      and <code>$age</code> interpolate directly —
      <code>"$name is $age years old"</code>.</li>
  <li>Write <code>birthday</code> taking <code>int $age</code>, returning
      <code>int</code>, that copies the argument into a local variable and
      adds 1 with <code>+=</code>. Locals need no declaration — the first
      assignment <em>is</em> the declaration.</li>
</ol>
<p>Keep the <code>&lt;?php</code> tag at the top. There is no
<code>main()</code>: the lesson's tests call your functions directly.</p>`,

  starter: `<?php

//    std::format("{} is {} years old", ...)  ->  "$name is $age years old"

  requirements: [
    { pattern: /function\s+describe_user\s*\(\s*string\s+\$name\s*,\s*int\s+\$age\s*\)\s*:\s*string/, message: "Define describe_user(string $name, int $age): string with full type declarations" },
    { pattern: /"\$\w+/, message: "Build the string with double-quote interpolation, not concatenation" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'expect_eq(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'expect_eq(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "expect_eq(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "expect_eq(birthday(0), 1);" },
  ],

  solution: `<?php

function describe_user(string $name, int $age): string {
    return "$name is $age years old";
}

function birthday(int $age): int {
    $next = $age;
    $next += 1;
    return $next;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17</th><th>PHP</th></tr>
  <tr><td>Declare a variable</td><td><code>int x = 1;</code></td><td><code>$x = 1;</code> (assignment is declaration)</td></tr>
  <tr><td>Integer types</td><td><code>int</code>/<code>long</code>/<code>size_t</code>/…</td><td><code>int</code> — one 64-bit signed integer</td></tr>
  <tr><td>Floating types</td><td><code>float</code>/<code>double</code></td><td><code>float</code> — always double precision</td></tr>
  <tr><td>Typed signature</td><td><code>std::string f(int x)</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td>Wrong-type argument</td><td>compile error</td><td><code>TypeError</code> thrown at the call, at runtime</td></tr>
  <tr><td>Format a string</td><td><code>std::format("{} is {}", n, a)</code></td><td><code>"$n is $a"</code> in double quotes</td></tr>
  <tr><td>Build &amp; run</td><td>compile, link, execute</td><td><code>php file.php</code> — the script just runs</td></tr>
  <tr><td>Memory</td><td>RAII, ownership, smart pointers</td><td>garbage-collected; not your problem</td></tr>
</table>
<p>The mental shift: type errors move from build time to call time. A PHP
signature like <code>function f(int $x): string</code> is genuinely enforced
— it just fires as a <code>TypeError</code> when a bad call happens rather
than stopping the build. In real projects, static analyzers (PHPStan, Psalm)
read those same declarations ahead of time and give you back most of what
the compiler used to catch.</p>`,
};
