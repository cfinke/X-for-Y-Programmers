  number: 16,
  title: "Exceptions & Error Handling",

  intro: `
<p>C++ exceptions come with baggage: exception-safety guarantees to
hand-verify (basic? strong? nothrow?), RAII interplay on every unwind path,
and half the industry building with <code>-fno-exceptions</code> so you can't
rely on them anyway. PHP exceptions are the same mechanism with the
controversy deleted. The garbage collector means nothing leaks when the stack
unwinds — there is no <code>delete</code> to miss and no destructor ordering
to reason about — and there is no build flag that turns them off. Every PHP
codebase uses exceptions, so you can too, without a style-guide fight.</p>
<table>
  <tr><th>C++17</th><th>PHP</th></tr>
  <tr><td><code>throw std::invalid_argument("bad");</code></td><td><code>throw new InvalidArgumentException("bad");</code> — always <code>new</code>, thrown by handle</td></tr>
  <tr><td><code>catch (const std::invalid_argument&amp; e)</code></td><td><code>catch (InvalidArgumentException $e)</code></td></tr>
  <tr><td>two catch blocks for two types</td><td><code>catch (TypeError | ValueError $e)</code> — multi-catch in one block</td></tr>
  <tr><td><code>catch (...)</code></td><td><code>catch (Throwable $e)</code> — still typed, still gives you the object</td></tr>
  <tr><td><code>struct MyErr : std::runtime_error { ... };</code></td><td><code>class MyErr extends Exception {}</code></td></tr>
  <tr><td>scope guard / RAII destructor</td><td><code>finally { ... }</code> — runs on every exit path</td></tr>
</table>
<p>Everything throwable lives in one tree rooted at <code>Throwable</code>,
which splits into <code>Exception</code> (what your code throws and catches)
and <code>Error</code> (what the engine throws: <code>TypeError</code>,
<code>DivisionByZeroError</code>, and friends). Catch dispatch works exactly
like C++: the first <code>catch</code> whose class matches — subclasses
included — wins. <code>e.what()</code> becomes
<code>$e-&gt;getMessage()</code>, and <code>finally</code> does the job your
scope-guard destructors do today, minus the destructor.</p>`,

  cpp: `#include <algorithm>
#include <cctype>
#include <stdexcept>
#include <string>

int parse_age(const std::string& s) {
    std::string t = trim(s);   // hand-rolled elsewhere, naturally
    bool all_digits = !t.empty() && std::all_of(t.begin(), t.end(),
        [](unsigned char c) { return std::isdigit(c); });
    if (!all_digits)
        throw std::invalid_argument("not a valid age: " + s);
    return std::stoi(t);
}

int safe_parse_age(const std::string& s, int fallback) {
    try {
        return parse_age(s);
    } catch (const std::invalid_argument&) {
        return fallback;       // and hope nothing leaked on the unwind
    }
}`,

  task: `
<p>Port the parser pair. No trim helper needed — PHP ships one:</p>
<ol>
  <li><code>parse_age(string $s): int</code> — let <code>$t = trim($s)</code>;
      if <code>ctype_digit($t)</code> is false (it is false for
      <code>""</code>, so empty input fails for free),
      <code>throw new InvalidArgumentException(...)</code>. Otherwise return
      <code>(int) $t</code>.</li>
  <li><code>safe_parse_age(string $s, int $default): int</code> — call
      <code>parse_age</code> inside <code>try { ... }</code> and
      <code>catch (InvalidArgumentException $e)</code> to return
      <code>$default</code> instead. Catch the specific class, not
      <code>Throwable</code> — same discipline as not writing
      <code>catch (...)</code>.</li>
</ol>`,

  starter: `<?php

  requirements: [
    { pattern: /InvalidArgumentException/, message: "Throw and catch InvalidArgumentException specifically" },
    { pattern: /try\s*\{/, message: "Use a try block in safe_parse_age" },
    { pattern: /catch\s*\(/, message: "Catch the exception with catch (...)" },
    { pattern: /throw\s+new/, message: "Throw with throw new — exceptions are objects" },
  ],

  tests: [
    { name: 'parse_age("42") returns int 42',
      code: `expect_eq(parse_age("42"), 42);` },
    { name: 'parse_age(" 7 ") trims and returns 7',
      code: `expect_eq(parse_age(" 7 "), 7);` },
    { name: 'parse_age("abc") throws InvalidArgumentException',
      code: `try { parse_age("abc"); throw new Exception("did not throw"); } catch (InvalidArgumentException $e) {}` },
    { name: 'parse_age("12.5") rejects non-digit characters',
      code: `try { parse_age("12.5"); throw new Exception("did not throw"); } catch (InvalidArgumentException $e) {}` },
    { name: 'safe_parse_age("abc", 18) falls back to 18',
      code: `expect_eq(safe_parse_age("abc", 18), 18);` },
    { name: 'safe_parse_age("30", 18) parses 30',
      code: `expect_eq(safe_parse_age("30", 18), 30);` },
  ],

  solution: `<?php

function parse_age(string $s): int {
    $t = trim($s);
    if (!ctype_digit($t)) {
        throw new InvalidArgumentException("not a valid age: '{$s}'");
    }
    return (int) $t;
}

function safe_parse_age(string $s, int $default): int {
    try {
        return parse_age($s);
    } catch (InvalidArgumentException $e) {
        return $default;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17</th><th>PHP</th></tr>
  <tr><td>Throw</td><td><code>throw std::runtime_error("boom");</code></td><td><code>throw new RuntimeException("boom");</code></td></tr>
  <tr><td>Catch one type</td><td><code>catch (const std::invalid_argument&amp; e)</code></td><td><code>catch (InvalidArgumentException $e)</code></td></tr>
  <tr><td>Catch several types</td><td>separate blocks (or a base class)</td><td><code>catch (A | B $e)</code> — multi-catch</td></tr>
  <tr><td>Catch everything</td><td><code>catch (...)</code> — no object</td><td><code>catch (Throwable $e)</code> — object included</td></tr>
  <tr><td>The message</td><td><code>e.what()</code></td><td><code>$e-&gt;getMessage()</code></td></tr>
  <tr><td>Custom exception</td><td><code>struct E : std::runtime_error</code></td><td><code>class E extends Exception {}</code></td></tr>
  <tr><td>Rethrow</td><td><code>throw;</code></td><td><code>throw $e;</code></td></tr>
  <tr><td>Cleanup on unwind</td><td>RAII destructors, scope guards</td><td><code>finally { ... }</code></td></tr>
</table>
<p>The insight: in C++ the hard part of exceptions was never
<code>try</code>/<code>catch</code> — it was proving your code safe while the
stack unwinds past it. PHP removes that proof obligation. Unwinding cannot
leak memory (GC), there are no destructors racing the unwind, and the one
cleanup tool you need — close a file, release a lock — is an explicit
<code>finally</code> block you can read at the call site. What remains is
pure control flow, and the C++ habits that survive are the good ones: throw
specific types, catch the narrowest class that you can actually handle, and
let everything else propagate.</p>`,
};
