  number: 14,
  title: "List Assignment & Spread",

  intro: `
<p>C++17's structured bindings — <code>auto [a, b] = pair;</code> — were a
late, welcome arrival, but they only work at declaration time and only bind
positionally. PHP's list assignment is the same move with fewer restrictions:
<code>[$a, $b] = $pair;</code> works on any array, anywhere an assignment
works, into variables that already exist. That last part enables the swap
idiom <code>[$a, $b] = [$b, $a];</code> — no <code>std::swap</code>, no
temporary. And because PHP arrays are keyed, you can destructure <em>by
name</em>: <code>['name' =&gt; $n] = $user;</code> plucks one field out,
something structured bindings can't do at all.</p>
<table>
  <tr><th>C++17</th><th>PHP</th></tr>
  <tr><td><code>auto [a, b] = pair;</code></td><td><code>[$a, $b] = $pair;</code></td></tr>
  <tr><td><code>std::swap(a, b)</code></td><td><code>[$a, $b] = [$b, $a];</code></td></tr>
  <tr><td>bind one member by name</td><td><code>['name' =&gt; $n] = $user;</code></td></tr>
  <tr><td><code>template&lt;class... Ts&gt; f(Ts... xs)</code></td><td><code>function f(int ...$nums)</code> — just an array</td></tr>
  <tr><td><code>sizeof...(xs)</code>, recursive unpacking</td><td><code>count($nums)</code>, <code>foreach</code> — it's an array</td></tr>
  <tr><td><code>std::apply(f, tup)</code></td><td><code>f(...$args)</code></td></tr>
  <tr><td>concat: insert / <code>ranges::concat</code></td><td><code>[...$a, ...$b]</code></td></tr>
</table>
<p>The <code>...</code> token plays both parameter-pack roles, minus the
metaprogramming. In a signature, <code>int ...$nums</code> collects the rest
of the arguments into a plain array — no recursion, no
<code>sizeof...</code>, no fold expressions; you just <code>foreach</code> it.
At a call site, <code>f(...$args)</code> is <code>std::apply</code>. Inside an
array literal, <code>[...$a, ...$b]</code> concatenates — and with string
keys, later spreads overwrite earlier ones, which makes
defaults-then-overrides a one-liner.</p>`,

  cpp: `#include <array>
#include <map>
#include <string>
#include <utility>

std::pair<int, int> swap_pair(std::pair<int, int> p) {
    auto [a, b] = p;            // structured bindings: new names only
    return {b, a};
}

template <typename... Ts>       // parameter pack + fold expression
int sum(Ts... nums) {
    return (0 + ... + nums);
}

std::map<std::string, std::string> merge_settings(
        std::map<std::string, std::string> defaults,
        const std::map<std::string, std::string>& overrides) {
    for (const auto& [k, v] : overrides) defaults[k] = v;
    return defaults;
}`,

  task: `
<p>Three small functions, three uses of the bracket-and-dots toolkit:</p>
<ol>
  <li><code>swap(array $pair): array</code> — destructure the two elements
      with <code>[$a, $b] = $pair;</code> and return them reversed. (Or swap
      in place with <code>[$a, $b] = [$b, $a];</code> first — either way, the
      tests want <code>[second, first]</code>.)</li>
  <li><code>sum(int ...$nums): int</code> — a variadic that takes any number
      of ints. Inside the body <code>$nums</code> is an ordinary array;
      <code>array_sum</code> finishes the job. No recursion, no
      <code>sizeof...</code>.</li>
  <li><code>merge_settings(array $defaults, array $overrides): array</code> —
      merge with spread: <code>[...$defaults, ...$overrides]</code>. String
      keys collide right-hand-wins, so overrides beat defaults — the loop from
      the C++ version disappears.</li>
</ol>`,

  starter: `<?php

// 1. [$a, $b] = $pair; then return them flipped.
function swap(array $pair): array {
    throw new Exception("TODO: implement swap");
}

// 2. ...$nums packs every argument into a plain array. array_sum it.
function sum(int ...$nums): int {
    throw new Exception("TODO: implement sum");
}

// 3. Spread both into one literal; later string keys overwrite earlier.
function merge_settings(array $defaults, array $overrides): array {
    throw new Exception("TODO: implement merge_settings");
}
`,

  requirements: [
    { pattern: /\[\s*\$\w+\s*,\s*\$\w+\s*\]\s*=/, message: "Use list assignment: [$a, $b] = ... in swap" },
    { pattern: /\.\.\.\$/, message: "Keep the variadic ...$nums signature (and/or spread an array with ...$arr)" },
    { pattern: /\[\s*\.\.\./, message: "Merge with array spread: [...$defaults, ...$overrides]" },
  ],

  tests: [
    { name: "swap([1, 2]) returns [2, 1]",
      code: "expect_eq(swap([1, 2]), [2, 1]);" },
    { name: "swap(['low', 'high']) returns ['high', 'low']",
      code: "expect_eq(swap(['low', 'high']), ['high', 'low']);" },
    { name: "sum(1, 2, 3) returns 6 — no pack recursion required",
      code: "expect_eq(sum(1, 2, 3), 6);" },
    { name: "sum() returns 0, and sum(...[4, 5]) spreads like std::apply",
      code: "expect_eq(sum(), 0);\nexpect_eq(sum(...[4, 5]), 9);" },
    { name: "merge_settings: overrides win, defaults survive",
      code: "$merged = merge_settings(['theme' => 'dark', 'font_size' => 12], ['font_size' => 14]);\nexpect_eq($merged, ['theme' => 'dark', 'font_size' => 14]);" },
    { name: "merge_settings with no overrides returns the defaults",
      code: "expect_eq(merge_settings(['bell' => true], []), ['bell' => true]);" },
  ],

  solution: `<?php

function swap(array $pair): array {
    [$a, $b] = $pair;
    return [$b, $a];
}

function sum(int ...$nums): int {
    return array_sum($nums);
}

function merge_settings(array $defaults, array $overrides): array {
    return [...$defaults, ...$overrides];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17</th><th>PHP</th></tr>
  <tr><td>Destructure</td><td><code>auto [a, b] = pair;</code> (declaration only)</td><td><code>[$a, $b] = $pair;</code> (any assignment)</td></tr>
  <tr><td>Destructure by name</td><td>—</td><td><code>['name' =&gt; $n] = $user;</code></td></tr>
  <tr><td>Swap</td><td><code>std::swap(a, b)</code></td><td><code>[$a, $b] = [$b, $a];</code></td></tr>
  <tr><td>Variadic function</td><td><code>template&lt;class... Ts&gt; f(Ts... xs)</code></td><td><code>function f(int ...$nums)</code></td></tr>
  <tr><td>Pack size / iterate</td><td><code>sizeof...(xs)</code>, recursion, folds</td><td><code>count($nums)</code>, <code>foreach</code></td></tr>
  <tr><td>Apply array as args</td><td><code>std::apply(f, tuple)</code></td><td><code>f(...$args)</code></td></tr>
  <tr><td>Concatenate</td><td><code>v.insert(v.end(), w.begin(), w.end())</code></td><td><code>[...$a, ...$b]</code></td></tr>
  <tr><td>Skip a slot</td><td>must name it (<code>[a, _]</code>)</td><td><code>[, $b] = $pair;</code></td></tr>
</table>
<p>The insight: every trick in this lesson is one runtime data structure — the
array — wearing different syntax. A variadic parameter pack <em>is</em> an
array, a spread <em>is</em> an array being poured out, list assignment
<em>is</em> an array being poured in. Where C++ parameter packs live in the
type system and demand template machinery to touch, PHP hands you the
arguments as data. The price is that arity mistakes surface at runtime; the
payoff is that "forward these arguments" is three dots, not a
<code>std::forward</code> incantation.</p>`,
};
