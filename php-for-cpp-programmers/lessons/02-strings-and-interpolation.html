const LESSON = {
  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>PHP strings are value types like <code>std::string</code> — copied on
assignment, no lifetime worries — but the operators moved. Concatenation is
the dot: <code>$a . $b</code>. The <code>+</code> operator is
<em>arithmetic only</em>: <code>"1" + 1</code> is the integer <code>2</code>,
not <code>"11"</code>, because <code>+</code> coerces its operands to
numbers. Keeping "glue strings" and "add numbers" on separate operators is
one of PHP's quietly good decisions — but it will bite you exactly once, so
learn it now.</p>
<table>
  <tr><th>C++17</th><th>PHP</th></tr>
  <tr><td><code>a + b</code> (std::string)</td><td><code>$a . $b</code> — dot concatenates; <code>+</code> is arithmetic only</td></tr>
  <tr><td><code>std::format("{} is {}", n, a)</code></td><td><code>"$n is $a"</code> — interpolation beats format strings</td></tr>
  <tr><td>loop + <code>std::toupper</code> per char</td><td><code>strtoupper($s)</code></td></tr>
  <tr><td><code>s.find(n) != std::string::npos</code></td><td><code>str_contains($h, $n)</code> — an actual bool</td></tr>
  <tr><td><code>s.size()</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td>manual join loop over a vector</td><td><code>implode(", ", $arr)</code></td></tr>
</table>
<p>Double-quoted strings interpolate: <code>"Hello, $name!"</code> drops the
variable straight in (use <code>"{$expr}"</code> braces when the parser needs
help finding the edges). Single-quoted strings don't interpolate at all —
they're your raw literals. And the free-function toolbox
(<code>strtoupper</code>, <code>str_contains</code>, <code>strlen</code>,
<code>implode</code>) replaces both the member functions and the
<code>&lt;algorithm&gt;</code> gymnastics: what took a
<code>std::transform</code> with a per-character lambda is one call.</p>`,

  cpp: `#include <algorithm>
#include <string>
#include <vector>

std::string shout(std::string s) {
    std::transform(s.begin(), s.end(), s.begin(),
                   [](unsigned char c) { return std::toupper(c); });
    return s;
}

bool contains_word(const std::string& h, const std::string& n) {
    return h.find(n) != std::string::npos;  // npos: the -1 that isn't
}

std::string join_words(const std::vector<std::string>& words) {
    std::string out;
    for (size_t i = 0; i < words.size(); ++i) {
        if (i) out += ", ";
        out += words[i];
    }
    return out;
}`,

  task: `
<p>Rebuild the string toolbox in PHP — each body is a line or two:</p>
<ol>
  <li><code>shout(string $s): string</code> — uppercase the whole string.
      No transform, no lambda, no per-character loop:
      <code>strtoupper</code>.</li>
  <li><code>greet(string $name): string</code> — return
      <code>"Hello, Ada!"</code>-style text using double-quote
      interpolation, not concatenation.</li>
  <li><code>contains_word(string $haystack, string $needle): bool</code> —
      the <code>find() != npos</code> idiom is one bool-returning call:
      <code>str_contains</code>.</li>
  <li><code>join_words(array $words): string</code> — join with
      <code>", "</code>. The whole C++ loop is
      <code>implode(", ", $words)</code>.</li>
</ol>`,

  starter: `<?php

}

`,

  requirements: [
    { pattern: /"\$\w+|\{\$\w+/, message: "greet must use double-quote interpolation ($name inside the string)" },
    { pattern: /strtoupper/, message: "Use strtoupper in shout" },
    { pattern: /str_contains/, message: "Use str_contains in contains_word" },
    { pattern: /implode/, message: "Use implode in join_words" },
  ],

  tests: [
    { name: 'shout("hello") returns "HELLO"',
      code: 'expect_eq(shout("hello"), "HELLO");' },
    { name: 'greet("Ada") returns "Hello, Ada!"',
      code: 'expect_eq(greet("Ada"), "Hello, Ada!");' },
    { name: 'contains_word("the quick brown fox", "quick") is true',
      code: 'expect_eq(contains_word("the quick brown fox", "quick"), true);' },
    { name: 'contains_word("the quick brown fox", "slow") is false',
      code: 'expect_eq(contains_word("the quick brown fox", "slow"), false);' },
    { name: 'join_words(["C", "C++", "PHP"]) returns "C, C++, PHP"',
      code: 'expect_eq(join_words(["C", "C++", "PHP"]), "C, C++, PHP");' },
  ],

  solution: `<?php

function shout(string $s): string {
    return strtoupper($s);
}

function greet(string $name): string {
    return "Hello, {$name}!";
}

function contains_word(string $haystack, string $needle): bool {
    return str_contains($haystack, $needle);
}

function join_words(array $words): string {
    return implode(", ", $words);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17</th><th>PHP</th></tr>
  <tr><td>Concatenate</td><td><code>a + b</code></td><td><code>$a . $b</code> (and <code>.=</code> for <code>+=</code>)</td></tr>
  <tr><td>Add numbers</td><td><code>a + b</code></td><td><code>$a + $b</code> — <em>only</em> arithmetic; <code>"1" + 1 === 2</code></td></tr>
  <tr><td>Format / interpolate</td><td><code>std::format("{}!", name)</code></td><td><code>"$name!"</code> or <code>"{$name}!"</code>; <code>sprintf</code> exists when you want printf</td></tr>
  <tr><td>Uppercase</td><td><code>std::transform</code> + <code>::toupper</code></td><td><code>strtoupper($s)</code> / <code>strtolower($s)</code></td></tr>
  <tr><td>Substring test</td><td><code>s.find(n) != npos</code></td><td><code>str_contains($h, $n)</code> (8.0+; also <code>str_starts_with</code>, <code>str_ends_with</code>)</td></tr>
  <tr><td>Length</td><td><code>s.size()</code></td><td><code>strlen($s)</code> — bytes, like <code>size()</code></td></tr>
  <tr><td>Join</td><td>hand-rolled loop</td><td><code>implode(", ", $arr)</code>; inverse is <code>explode</code></td></tr>
  <tr><td>Raw literal</td><td><code>R"(...)"</code></td><td><code>'single quotes'</code> — no interpolation, no escapes but <code>\\'</code></td></tr>
</table>
<p>The deep difference is that <code>.</code> vs <code>+</code> isn't
overloading — it's two different coercions. <code>.</code> converts both
sides to string; <code>+</code> converts both sides to numbers. The same
value flows through either, and the <em>operator</em>, not the operand
types, decides what happens. Once that clicks, PHP's string handling is
mostly a downhill walk: member-function chains become a flat toolbox of
<code>str_*</code> free functions that take the string as their first
argument.</p>`,
};
