<div id="app"></div>
<script>
const LESSON = {
  number: 17,
  title: "Static, Constants & readonly",

  intro: `
<p>Here is a corner of PHP where you are already fluent: the scope-resolution
operator <code>::</code> survived intact. A class constant is
<code>const MAX = 10;</code> — a <code>static constexpr</code> without the
keyword soup — and you read it as <code>Config::MAX</code>, exactly the
spelling your fingers know. Static properties and methods also work as
expected, with two improvements: the initializer lives right in the class
body (<code>private static int $count = 0;</code> — no out-of-line
<code>int Counter::count = 0;</code> definition, no ODR ritual), and inside
the class you reach them through an explicit <code>self::</code> —
<code>self::$count</code>, <code>self::increment()</code> — because in a
static context there is no <code>$this</code>.</p>
<table>
  <tr><th>C++17</th><th>PHP</th></tr>
  <tr><td><code>static constexpr int MAX = 10;</code></td><td><code>const MAX = 10;</code> (class constant)</td></tr>
  <tr><td><code>Config::MAX</code></td><td><code>Config::MAX</code> — identical</td></tr>
  <tr><td><code>static int count;</code> + out-of-line definition</td><td><code>private static int $count = 0;</code> — one line, done</td></tr>
  <tr><td><code>Counter::increment()</code></td><td><code>Counter::increment()</code> — identical</td></tr>
  <tr><td><code>count</code> (implicit, inside the class)</td><td><code>self::$count</code> — always explicit</td></tr>
  <tr><td><code>const std::string name;</code> member</td><td><code>public readonly string $name</code> (PHP 8.1)</td></tr>
</table>
<p><code>readonly</code> is the <code>const</code> member field you always
wanted. Write it once in the constructor — usually via a promoted parameter,
<code>__construct(public readonly string $name)</code> — and the engine
enforces immutability afterward: any later assignment throws an
<code>Error</code> at runtime. Unlike a C++ <code>const</code> member it
doesn't delete your copy assignment or force initializer-list gymnastics, and
there is no <code>mutable</code>/<code>const_cast</code> escape hatch to
audit for. Reads are plain <code>$config-&gt;name</code>.</p>`,

  cpp: `struct Counter {
    static int count;                        // declared here...
    static int increment() { return ++count; }
    static int current()   { return count; }
};
int Counter::count = 0;                      // ...defined here. ODR says hi.

struct Config {
    static constexpr const char* DEFAULT_NAME = "guest";

    const std::string name;                  // write-once via the ctor;
                                             // also deletes copy-assignment
    explicit Config(std::string n) : name(std::move(n)) {}
};

// Config::DEFAULT_NAME, Counter::increment() — :: as you know it.`,

  task: `
<p>Port both classes:</p>
<ol>
  <li><code>class Counter</code> with
      <code>private static int $count = 0;</code>,
      <code>public static function increment(): int</code> (bump
      <code>self::$count</code> and return it) and
      <code>public static function current(): int</code> (return it without
      bumping). Note there's no out-of-line definition to write — the
      <code>= 0</code> in the class body is the whole story.</li>
  <li><code>class Config</code> with a class constant
      <code>const DEFAULT_NAME = "guest";</code> and a one-line constructor
      that promotes a <code>public readonly string $name</code> property:
      <code>public function __construct(public readonly string $name) {}</code>.
      The tests verify the engine rejects a later write with an
      <code>Error</code> — no <code>const_cast</code> for anyone.</li>
</ol>`,

  starter: `<?php

// 1. private static int $count = 0; — initialized in-class, no ODR dance.
//    Inside the class, reach it as self::$count.
class Counter {
    private static int $count = 0;

    public static function increment(): int {
        throw new Exception("TODO: bump self::\\$count and return it");
    }

    public static function current(): int {
        throw new Exception("TODO: return self::\\$count");
    }
}

// 2. Add: const DEFAULT_NAME = "guest";
//    and promote a public readonly string property in the constructor.
class Config {
    public function __construct(string $name) {
        throw new Exception("TODO: promote a public readonly property");
    }
}
`,

  requirements: [
    { pattern: /static\s+/, message: "Use static members in Counter" },
    { pattern: /const\s+[A-Z_]+/, message: "Declare the class constant const DEFAULT_NAME" },
    { pattern: /readonly/, message: "Make Config's $name a readonly property" },
  ],

  tests: [
    { name: "Counter::increment() counts 1, 2 through the class name",
      code: `expect_eq(Counter::increment(), 1);
expect_eq(Counter::increment(), 2);` },
    { name: "Counter::current() reads without incrementing",
      code: `expect_eq(Counter::current(), 2);
expect_eq(Counter::current(), 2);
expect_eq(Counter::increment(), 3);` },
    { name: 'Config::DEFAULT_NAME is "guest" — :: like static constexpr',
      code: `expect_eq(Config::DEFAULT_NAME, "guest");` },
    { name: "->name reads the readonly property set in the constructor",
      code: `$c = new Config("ada");
expect_eq($c->name, "ada");
expect_eq((new Config(Config::DEFAULT_NAME))->name, "guest");` },
    { name: "writing to a readonly property throws Error — engine-enforced",
      code: `$c = new Config("ada");
try { $c->name = "x"; throw new Exception("no error"); } catch (Error $e) {}
expect_eq($c->name, "ada");` },
  ],

  solution: `<?php

class Counter {
    private static int $count = 0;

    public static function increment(): int {
        self::$count += 1;
        return self::$count;
    }

    public static function current(): int {
        return self::$count;
    }
}

class Config {
    const DEFAULT_NAME = "guest";

    public function __construct(public readonly string $name) {}
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17</th><th>PHP</th></tr>
  <tr><td>Class constant</td><td><code>static constexpr int MAX = 10;</code></td><td><code>const MAX = 10;</code></td></tr>
  <tr><td>Read it</td><td><code>Config::MAX</code></td><td><code>Config::MAX</code> — same syntax</td></tr>
  <tr><td>Static data member</td><td>declare in-class, define out-of-line</td><td><code>private static int $count = 0;</code> — in-class only</td></tr>
  <tr><td>Static member fn</td><td><code>static int f();</code></td><td><code>public static function f(): int</code></td></tr>
  <tr><td>Inside the class</td><td><code>count</code> (implicit)</td><td><code>self::$count</code>, <code>self::f()</code>, <code>self::MAX</code></td></tr>
  <tr><td>Write-once field</td><td><code>const std::string name;</code> (breaks assignment)</td><td><code>public readonly string $name</code></td></tr>
  <tr><td>Mutate it anyway</td><td><code>const_cast</code>, <code>mutable</code></td><td>impossible — write throws <code>Error</code></td></tr>
</table>
<p>The insight: <code>readonly</code> gives you the immutability you meant
when you wrote <code>const std::string name;</code>, without the collateral
damage. In C++ a const member silently deletes copy assignment and pushes
every initialization into the initializer list; the compiler enforces it only
where it can see, and <code>const_cast</code> lurks. PHP checks the write at
runtime, every time, from everywhere — one keyword on a promoted constructor
parameter and the object's field is sealed. Combined with in-class static
initialization, the whole lesson is C++ semantics with the ceremony
refunded.</p>`,
};
