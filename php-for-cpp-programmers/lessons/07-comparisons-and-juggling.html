const LESSON = {
  number: 7,
  title: "Comparisons & Type Juggling",

  intro: `
<p>In C++, <code>==</code> never crosses types unless an implicit conversion
you control makes it possible — <code>std::string("1") == 1</code> is a
compile error, full stop. PHP's <code>==</code> is a different animal: it
<em>juggles</em> types at runtime. <code>"1" == 1</code> is true, because PHP
converts the operands toward each other before comparing. The fix is
<code>===</code>: it compares value <em>and</em> type with no conversions
whatsoever, and it is what you should reach for by default — this lesson's
test harness itself is built on it.</p>
<table>
  <tr><th>C++</th><th>PHP</th></tr>
  <tr><td><code>a == b</code> (types must already agree)</td><td><code>$a === $b</code> — value <em>and</em> type, no juggling</td></tr>
  <tr><td><code>std::string("1") == 1</code> → compile error</td><td><code>"1" == 1</code> → <code>true</code> (juggled!), <code>"1" === 1</code> → <code>false</code></td></tr>
  <tr><td><code>static_cast&lt;bool&gt;(v)</code></td><td><code>(bool) $v</code></td></tr>
  <tr><td><code>a &lt;=&gt; b</code> (C++20, returns an ordering type)</td><td><code>$a &lt;=&gt; $b</code> (PHP 7.0, returns -1 / 0 / 1)</td></tr>
</table>
<p>Truthiness works like C++'s implicit conversion to <code>bool</code>, but
with rules to memorize rather than derive: <code>""</code>, <code>0</code>,
<code>0.0</code>, <code>null</code>, the empty array <code>[]</code> — and,
the one that bites everyone, the <em>string</em> <code>"0"</code> — are all
falsy. Everything else (including <code>"false"</code> and <code>"0.0"</code>)
is truthy. And yes, <code>&lt;=&gt;</code> really is the spaceship operator —
PHP shipped it in 7.0 (2015), five years before C++20, and PHP's returns a
plain <code>int</code> instead of <code>std::strong_ordering</code>.</p>`,

  cpp: `#include <compare>  // C++20 finally got <=>; PHP had it in 2015

bool same_value_and_type(int a, int b) {
    return a == b;  // == never juggles: the types were settled
}                   // at compile time or it didn't compile

// std::string("1") == 1;   // error: no operator== for these
// PHP: "1" == 1 is true (juggled), "1" === 1 is false.

bool is_truthy(int v) {
    return static_cast<bool>(v);  // conversion rules you defined
}

int compare_nums(int a, int b) {
    auto c = a <=> b;             // std::strong_ordering...
    return c < 0 ? -1 : (c > 0 ? 1 : 0);  // ...flattened by hand
}`,

  task: `
<p>Implement three one-liners:</p>
<ol>
  <li><code>same_value_and_type(mixed $a, mixed $b): bool</code> — true only
      when the operands match in both value and type. Use <code>===</code>,
      never <code>==</code>.</li>
  <li><code>is_truthy(mixed $v): bool</code> — PHP's truthiness verdict for
      any value, via an explicit <code>(bool)</code> cast. Remember:
      <code>"0"</code> is falsy.</li>
  <li><code>compare_nums(int $a, int $b): int</code> — use the spaceship
      operator <code>&lt;=&gt;</code>. Unlike C++'s ordering types, PHP's
      returns exactly <code>-1</code>, <code>0</code>, or <code>1</code>,
      ready to hand to a sort.</li>
</ol>`,

  starter: `<?php

// 1. Strict comparison: value AND type, zero conversions.
function same_value_and_type(mixed $a, mixed $b): bool {
    throw new Exception("TODO: implement same_value_and_type");
}

// 2. static_cast<bool>(v) is spelled (bool) $v.
function is_truthy(mixed $v): bool {
    throw new Exception("TODO: implement is_truthy");
}

// 3. The spaceship needs no flattening here: it already returns -1/0/1.
function compare_nums(int $a, int $b): int {
    throw new Exception("TODO: implement compare_nums");
}
`,

  requirements: [
    { pattern: /===/, message: "Use the strict comparison operator ===" },
    { pattern: /<=>/, message: "Use the spaceship operator <=> in compare_nums" },
    { pattern: /\(bool\)/, message: "Use an explicit (bool) cast in is_truthy" },
  ],

  tests: [
    { name: "same_value_and_type(1, 1) is true",
      code: "expect_true(same_value_and_type(1, 1));" },
    { name: 'same_value_and_type("1", 1) is false — === does not juggle',
      code: 'expect_true(!same_value_and_type("1", 1));' },
    { name: 'the string "0" is falsy (the classic PHP gotcha)',
      code: 'expect_true(!is_truthy("0"));' },
    { name: 'is_truthy: "" , 0, [] falsy; "false" and 1 truthy',
      code: 'expect_true(!is_truthy(""));\nexpect_true(!is_truthy(0));\nexpect_true(!is_truthy([]));\nexpect_true(is_truthy("false"));\nexpect_true(is_truthy(1));' },
    { name: "compare_nums returns exactly -1, 0, 1",
      code: "expect_eq(compare_nums(1, 2), -1);\nexpect_eq(compare_nums(5, 5), 0);\nexpect_eq(compare_nums(9, 3), 1);" },
  ],

  solution: `<?php

function same_value_and_type(mixed $a, mixed $b): bool {
    return $a === $b;
}

function is_truthy(mixed $v): bool {
    return (bool) $v;
}

function compare_nums(int $a, int $b): int {
    return $a <=> $b;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>PHP</th></tr>
  <tr><td>Equality</td><td><code>==</code> (types settled at compile time)</td><td><code>===</code> — use it; <code>==</code> juggles</td></tr>
  <tr><td>Inequality</td><td><code>!=</code></td><td><code>!==</code> (strict) / <code>!=</code> (loose)</td></tr>
  <tr><td>To bool</td><td><code>static_cast&lt;bool&gt;(v)</code></td><td><code>(bool) $v</code></td></tr>
  <tr><td>Falsy set</td><td>zero / null pointer, by conversion rule</td><td><code>""</code>, <code>0</code>, <code>0.0</code>, <code>"0"</code>, <code>null</code>, <code>[]</code></td></tr>
  <tr><td>Three-way</td><td><code>&lt;=&gt;</code> (C++20, ordering type)</td><td><code>&lt;=&gt;</code> (PHP 7.0, int -1/0/1)</td></tr>
</table>
<p>The mental model shift: C++ resolves what <code>==</code> means at compile
time and refuses mixed types you haven't blessed with a conversion; PHP's
<code>==</code> makes that decision <em>per comparison, at runtime</em>, with
conversion rules you didn't write. Treat <code>==</code> the way you treat a
C-style cast — legal, occasionally intended, usually a bug — and write
<code>===</code>/<code>!==</code> on reflex. PHP 8 tamed the worst juggling
(<code>0 == "foo"</code> is now false), but <code>"1" == 1</code> remains
true, so the advice stands.</p>`,
};
