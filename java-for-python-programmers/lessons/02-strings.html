  intro: `
<p>Java's <code>String</code> will feel familiar — it is immutable, just like a
Python <code>str</code> — but the method names differ and there is no
f-string syntax built into the language itself. You either concatenate with
<code>+</code> or reach for <code>String.format</code> (Java's
<code>printf</code>-style formatter, in the same spirit as Python's
<code>%</code> operator or <code>str.format</code>). And when you build a
string in a loop, <code>+=</code> allocates a fresh object every time, so Java
gives you <code>StringBuilder</code> for that — much like Python's own advice
to prefer <code>"".join(...)</code> over repeated concatenation.</p>
<table>
  <tr><th>Python</th><th>Java</th></tr>
  <tr><td><code>s.upper()</code></td><td><code>s.toUpperCase()</code></td></tr>
  <tr><td><code>"x" in s</code></td><td><code>s.contains("x")</code></td></tr>
  <tr><td><code>s[1:4]</code></td><td><code>s.substring(1, 4)</code></td></tr>
  <tr><td><code>s.strip()</code></td><td><code>s.strip()</code> (Unicode-aware)</td></tr>
  <tr><td><code>"ab" * 3</code></td><td><code>"ab".repeat(3)</code></td></tr>
  <tr><td><code>f"{a} and {b}"</code></td><td><code>String.format("%s and %s", a, b)</code></td></tr>
</table>
<p>Two things to keep in mind. First, <code>substring</code> takes a start and an
<em>end</em> index (like Python's slice), not a start and a length. Second,
because <code>String</code> is immutable, every method that "changes" a string
actually returns a new one — <code>s.replace(...)</code> does nothing unless you
capture the result, exactly as with Python's <code>str.replace</code>.</p>`,

  solution: `class Strings {
  static String shout(String s) {
    return s.strip().toUpperCase();
  }

  static String greeting(String name, int count) {
    return String.format("%s x%d", name, count);
  }

  static String initials(String full) {
    StringBuilder sb = new StringBuilder();
    for (String word : full.split(" ")) {
      if (!word.isBlank()) {
        sb.append(word.substring(0, 1).toUpperCase());
      }
    }
    return sb.toString();
  }

  static String censor(String s, String word) {
    return s.replace(word, "***");
  }
}

<p>Watch out: Java's <code>String.split</code> takes a <em>regular expression</em>,
not a literal string like Python's <code>str.split</code> does — so
<code>split(".")</code> splits on every character. Escape it
(<code>split("\\\\.")</code>) or use <code>Pattern.quote</code> when you mean a
literal dot (Python's own regex splitting lives in <code>re.split</code>, which
behaves the same way Java's does). Also note <code>strip()</code> (Java 11+) is
the Unicode-aware replacement for the older <code>trim()</code>, which only
removes ASCII control characters — this maps cleanly onto Python's
<code>str.strip()</code>, which has always been Unicode-aware. And since
strings are immutable, <code>StringBuilder</code> is not an optimization
detail but the idiomatic way to assemble text piece by piece — call
<code>toString()</code> when you are done, much like Python's own advice to
build a list and call <code>"".join(...)</code> rather than repeatedly
concatenating.</p>`,
