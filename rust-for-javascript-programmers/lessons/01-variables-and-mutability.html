<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables, Mutability & Types",

  intro: `
<p>You already write <code>const</code> by default and reach for
<code>let</code> only when you plan to reassign. Rust has the same two-speed
system, but the defaults are stricter: <code>let</code> is Rust's
<code>const</code>-and-then-some — not only can you not reassign the binding,
you can't mutate its <em>contents</em> either. Where JS happily allows
<code>const user = {}; user.name = "Ada"</code>, Rust's plain <code>let</code>
freezes the whole value. Want mutation? You opt in, visibly, with
<code>let mut</code>.</p>
<table>
  <tr><th>JavaScript</th><th>Rust</th></tr>
  <tr><td><code>const name = "Ada";</code></td><td><code>let name = "Ada";</code></td></tr>
  <tr><td><code>let age = 36;</code> (reassignable)</td><td><code>let mut age = 36;</code></td></tr>
  <tr><td>no annotations — values just have types</td><td><code>let age: u32 = 36;</code> (usually inferred)</td></tr>
  <tr><td><code>number</code> for everything, always a float</td><td><code>i32</code>, <code>u32</code>, <code>f64</code>… you pick</td></tr>
</table>
<p>The bigger novelty: every variable has a <em>type the compiler checks</em>.
An annotation is a colon after the name — <code>age: u32</code> means "age is
an unsigned 32-bit integer" — but thanks to inference you rarely write one
outside function signatures. And JavaScript's single <code>number</code> splits
apart: <code>i32</code> is the default integer, <code>u32</code> can't go
negative, <code>f64</code> is the float you already know. Integers are exact —
no more <code>0.1 + 0.2</code> weirdness when you're just counting things.</p>
<p>The payoff for all this bookkeeping: typos, wrong argument orders, and
"oops that was a string" bugs stop being runtime surprises and become red
squiggles before the program ever runs.</p>`,

  javascript: `const name = "Ada";
let age = 36;

age = 37;             // fine: let is reassignable
// name = "Grace";    // TypeError — but only when this line RUNS

// const doesn't freeze contents:
const user = { name: "Ada" };
user.name = "Grace";  // ...perfectly legal

function describeUser(name, age) {
  return \`\${name} is \${age} years old\`;
}

// Nothing checks what we pass in:
console.log(describeUser(36, "Ada")); // "36 is Ada years old" — oops
console.log(describeUser("Ada", 36)); // "Ada is 36 years old"`,

  task: `
<p>Rewrite the JavaScript on the left as Rust (note the naming convention
change: <code>snake_case</code>, not camelCase):</p>
<ol>
  <li>Write <code>describe_user</code> taking <code>name: &amp;str</code> and
      <code>age: u32</code> and returning a <code>String</code> like
      <code>"Ada is 36 years old"</code>. Use <code>format!</code> — Rust's
      template literal: <code>format!("{} is {}", a, b)</code> fills the
      <code>{}</code> holes in order. (Don't worry about <code>&amp;str</code>
      vs <code>String</code> yet — Lesson 3 covers it.)</li>
  <li>Write <code>birthday</code> taking <code>age: u32</code> and returning
      <code>u32</code>: bind the argument to a <code>let mut</code> local,
      add 1 with <code>+=</code>, and return it.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. describe_user: name: &str, age: u32 -> String
//    JS template literal  ->  format!("{} is {} years old", name, age)
fn describe_user(name: &str, age: u32) -> String {
    todo!()
}

// 2. birthday: copy age into a let mut local, += 1, return it.
fn birthday(age: u32) -> u32 {
    todo!()
}
`,

  requirements: [
    { pattern: /fn\s+describe_user\s*\(\s*name\s*:\s*&str\s*,\s*age\s*:\s*u32\s*\)\s*->\s*String/, message: "Define describe_user(name: &str, age: u32) -> String" },
    { pattern: /format!\s*\(/, message: "Build the string with the format! macro" },
    { pattern: /let\s+mut\b/, message: "Use a let mut binding inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'assert_eq!(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'assert_eq!(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "assert_eq!(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "assert_eq!(birthday(0), 1);" },
  ],

  solution: `fn describe_user(name: &str, age: u32) -> String {
    format!("{} is {} years old", name, age)
}

fn birthday(age: u32) -> u32 {
    let mut next = age;
    next += 1;
    next
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Rust</th></tr>
  <tr><td>Immutable binding</td><td><code>const x = 1;</code> (contents still mutable)</td><td><code>let x = 1;</code> (contents frozen too)</td></tr>
  <tr><td>Mutable binding</td><td><code>let x = 1;</code></td><td><code>let mut x = 1;</code></td></tr>
  <tr><td>Type annotation</td><td>none — types are checked never</td><td><code>let age: u32 = 36;</code> — checked at compile time, usually inferred</td></tr>
  <tr><td>Numbers</td><td><code>number</code> (always a float)</td><td><code>i32</code> / <code>u32</code> / <code>f64</code>… exact integers, no silent mixing</td></tr>
  <tr><td>String interpolation</td><td>template literal with <code>\\\${}</code></td><td><code>format!("{} is {} years old", name, age)</code></td></tr>
  <tr><td>Naming</td><td><code>camelCase</code></td><td><code>snake_case</code> (the compiler will nag you)</td></tr>
</table>
<p>Look at <code>birthday</code>'s last line: no <code>return</code>, no
semicolon. A block's final expression is its value — more on that next lesson.
And notice what you just bought: call <code>describe_user(36, "Ada")</code>
with the arguments flipped and the program doesn't print garbage at 2 a.m. —
it simply refuses to compile.</p>`,
};
