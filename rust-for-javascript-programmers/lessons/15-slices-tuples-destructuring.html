<div id="app"></div>
<script>
const LESSON = {
  number: 15,
  title: "Slices, Tuples & Destructuring",

  intro: `
<p>JavaScript has one shape for "a few values traveling together": the array.
A point is <code>[3, 4]</code>, a key-value pair is <code>[k, v]</code>, and
you unpack either with <code>const [a, b] = pair</code>. It works, but the
array doesn't know it's a pair — nothing stops <code>[3]</code> or
<code>[3, 4, 5]</code> or <code>["3", "4"]</code> from sneaking in.</p>
<p>Rust splits that habit into two real types. A <strong>tuple</strong> like
<code>(f64, f64)</code> is a fixed-size, fixed-type bundle: exactly two
floats, guaranteed, accessed as <code>.0</code> and <code>.1</code> or
unpacked with <code>let (x, y) = point</code> — your destructuring reflex,
with parentheses instead of brackets. Tuples are also how functions return
multiple values: return a <code>(i32, i32)</code>, no ad-hoc object
needed.</p>
<table>
  <tr><th>JavaScript</th><th>Rust</th></tr>
  <tr><td><code>const point = [3, 4];</code></td><td><code>let point = (3.0, 4.0);</code> — type <code>(f64, f64)</code></td></tr>
  <tr><td><code>const [x, y] = point;</code></td><td><code>let (x, y) = point;</code></td></tr>
  <tr><td><code>point[0]</code>, <code>point[1]</code></td><td><code>point.0</code>, <code>point.1</code></td></tr>
  <tr><td>function takes "any array-like"</td><td>function takes <code>&amp;[i32]</code> — a borrowed view</td></tr>
</table>
<p>The other half is the <strong>slice</strong>, <code>&amp;[T]</code>: a
borrowed <em>view</em> into a run of elements, wherever they live. You met
slices as the parameter type in recent lessons — here's the rule of thumb
they came from: accept <code>&amp;[i32]</code> instead of
<code>&amp;Vec&lt;i32&gt;</code>, the way a good JS function accepts anything
array-like rather than demanding one specific container. A <code>&amp;Vec</code>,
an array, or a piece of either (<code>&amp;v[1..3]</code>) all coerce to it
for free — no copying, just a lens on someone else's data.</p>`,

  javascript: `// The two-element array standing in for a pair:
const point = [3, 4];
const [x, y] = point;          // destructuring

function swap([a, b]) {
  return [b, a];
}

function distance([x1, y1], [x2, y2]) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function ends(arr) {
  return [arr[0], arr[arr.length - 1]];
}

distance([0, 0], [3, 4]);      // 5
// But nothing stops distance([3], ["a", "b"]) —
// you find out when the math goes NaN.`,

  task: `
<p>Port the pair-juggling to real tuples and slices:</p>
<ol>
  <li><code>swap(pair: (i32, i32)) -&gt; (i32, i32)</code> — return the pair
      flipped. Destructure with <code>let (a, b) = pair;</code> and build the
      result with plain parens: <code>(b, a)</code>.</li>
  <li><code>distance(p: (f64, f64), q: (f64, f64)) -&gt; f64</code> — the
      straight-line distance between two points. Unpack both with
      <code>let (x1, y1) = p;</code> style destructuring, then
      <code>((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()</code> — Rust has
      no <code>Math.hypot</code>, but methods live on the numbers
      themselves.</li>
  <li><code>ends(v: &amp;[i32]) -&gt; (i32, i32)</code> — a tuple of the first
      and last elements (assume non-empty). Index with <code>v[0]</code> and
      <code>v[v.len() - 1]</code>; because the slice borrows, this works on a
      <code>&amp;Vec</code>, an array, or any piece of one.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. swap: destructure with let (a, b) = pair; return (b, a).
fn swap(pair: (i32, i32)) -> (i32, i32) {
    todo!()
}

// 2. distance: unpack both points, then
//    ((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()
fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    todo!()
}

// 3. ends: first and last of a borrowed slice (assume non-empty).
fn ends(v: &[i32]) -> (i32, i32) {
    todo!()
}
`,

  requirements: [
    { pattern: /\(\s*f64\s*,\s*f64\s*\)/, message: "Points are real tuples: (f64, f64)" },
    { pattern: /let\s*\(/, message: "Destructure a tuple with let (a, b) = ..." },
    { pattern: /&\[i32\]/, message: "ends should take a borrowed slice: &[i32]" },
  ],

  tests: [
    { name: "swap((1, 2)) returns (2, 1)",
      code: "assert_eq!(swap((1, 2)), (2, 1));" },
    { name: "swap((-5, 10)) returns (10, -5)",
      code: "assert_eq!(swap((-5, 10)), (10, -5));" },
    { name: "distance((0.0, 0.0), (3.0, 4.0)) is exactly 5.0 (the 3-4-5 triangle)",
      code: "assert_eq!(distance((0.0, 0.0), (3.0, 4.0)), 5.0);" },
    { name: "distance((1.0, 1.0), (4.0, 5.0)) is exactly 5.0 (same triangle, moved)",
      code: "assert_eq!(distance((1.0, 1.0), (4.0, 5.0)), 5.0);" },
    { name: "ends(&[7, 2, 9, 4]) returns (7, 4)",
      code: "assert_eq!(ends(&[7, 2, 9, 4]), (7, 4));" },
    { name: "ends works on a slice of a Vec too",
      code: `let v = vec![1, 2, 3];
assert_eq!(ends(&v), (1, 3));
assert_eq!(ends(&v[1..]), (2, 3));` },
  ],

  solution: `fn swap(pair: (i32, i32)) -> (i32, i32) {
    let (a, b) = pair;
    (b, a)
}

fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    let (x1, y1) = p;
    let (x2, y2) = q;
    ((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()
}

fn ends(v: &[i32]) -> (i32, i32) {
    (v[0], v[v.len() - 1])
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Rust</th></tr>
  <tr><td>A pair</td><td><code>[3, 4]</code> (just an array)</td><td><code>(3.0, 4.0)</code> — type <code>(f64, f64)</code>, size and types fixed</td></tr>
  <tr><td>Destructure</td><td><code>const [a, b] = pair;</code></td><td><code>let (a, b) = pair;</code></td></tr>
  <tr><td>Positional access</td><td><code>pair[0]</code></td><td><code>pair.0</code> (a field, not an index — checked at compile time)</td></tr>
  <tr><td>Multiple return values</td><td>return an array or object</td><td>return a tuple: <code>-&gt; (i32, i32)</code></td></tr>
  <tr><td>"Any array-like" parameter</td><td>convention</td><td><code>&amp;[T]</code> — <code>&amp;Vec&lt;T&gt;</code>, arrays, and sub-ranges all coerce</td></tr>
  <tr><td>Part of an array</td><td><code>arr.slice(1, 3)</code> (copies)</td><td><code>&amp;v[1..3]</code> (borrows — zero copy)</td></tr>
</table>
<p>Notice what the last test proves: <code>ends</code> never copied anything.
<code>&amp;v</code> and <code>&amp;v[1..]</code> are both just borrowed views
into the same Vec — JS's <code>.slice()</code> allocates a new array, Rust's
slice is a pointer and a length. And the tuple version of <code>distance</code>
simply cannot be called the broken ways the JS version can: a
3-element "pair" or a pair of strings isn't a runtime <code>NaN</code>, it's a
type error at the call site.</p>`,
};
