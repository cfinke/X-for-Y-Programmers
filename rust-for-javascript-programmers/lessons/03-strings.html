const LESSON = {
  number: 3,
  title: "Strings: String & &str",

  intro: `
<p>JavaScript has one string type and it's everywhere. Rust has two, and the
split is about <em>ownership</em> (the next lesson's big idea, previewed
here): <code>String</code> is text you own — growable, heap-allocated, yours
to modify. <code>&amp;str</code> (say "string slice") is a borrowed view into
text that lives somewhere else — a peek, not a possession. String literals
like <code>"hello"</code> are <code>&amp;str</code>. Until it becomes second
nature, one rule covers almost everything: <strong>take parameters as
<code>&amp;str</code>, return <code>String</code></strong>.</p>
<table>
  <tr><th>JavaScript</th><th>Rust</th></tr>
  <tr><td><code>"hello"</code> — a string, the only kind</td><td><code>"hello"</code> is a <code>&amp;str</code>; <code>String::from("hello")</code> owns it</td></tr>
  <tr><td>template literal with <code>\\\${}</code></td><td><code>format!("Hello, {}!", name)</code></td></tr>
  <tr><td><code>"1" + 1</code> → <code>"11"</code></td><td>compile error — no coercion, ever</td></tr>
  <tr><td><code>s.toUpperCase()</code>, <code>s.includes()</code>, <code>s.length</code></td><td><code>s.to_uppercase()</code>, <code>s.contains()</code>, <code>s.len()</code></td></tr>
</table>
<p>The habit that has to die here is coercion. In JS, <code>"1" + 1</code> is
<code>"11"</code>, <code>1 + "1"</code> is also <code>"11"</code>, and half of
your defensive <code>String(x)</code> calls exist because you can't be sure
what x is. In Rust a string is never secretly a number and a number never
becomes a string without you asking (<code>format!</code> or
<code>.to_string()</code>). The method names will feel like home in
snake_case: <code>.to_uppercase()</code>, <code>.contains()</code>,
<code>.len()</code> — and <code>format!</code> is your template literal.</p>`,

  javascript: `// One string type, coercion everywhere:
"1" + 1;                // "11" — number silently became a string
1 + "1";                // also "11"
"5" * "4";              // 20 — strings silently became numbers!

const shout = (s) => s.toUpperCase();

function greet(name) {
  return \`Hello, \${name}!\`;
}

function containsWord(haystack, needle) {
  return haystack.includes(needle);
}

console.log(shout("hey"));                    // "HEY"
console.log(greet("world"));                  // "Hello, world!"
console.log(containsWord("to be or not", "be")); // true`,

  task: `
<p>Rewrite the JavaScript on the left as Rust, following the rule — borrow
parameters as <code>&amp;str</code>, return owned <code>String</code>:</p>
<ol>
  <li><code>shout(s: &amp;str) -> String</code> — return the text uppercased.
      <code>.to_uppercase()</code> already gives you a <code>String</code>.</li>
  <li><code>greet(name: &amp;str) -> String</code> — return
      <code>"Hello, {name}!"</code> using <code>format!</code>.</li>
  <li><code>contains_word(haystack: &amp;str, needle: &amp;str) -> bool</code>
      — <code>true</code> if <code>haystack</code> contains
      <code>needle</code>. <code>.contains()</code> is the Rust spelling of
      <code>.includes()</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. shout: .to_uppercase() returns a String — perfect as the last expression.
fn shout(s: &str) -> String {
    todo!()
}

// 2. greet: format!("Hello, {}!", name)
fn greet(name: &str) -> String {
    todo!()
}

// 3. contains_word: .contains() is JS's .includes()
fn contains_word(haystack: &str, needle: &str) -> bool {
    todo!()
}
`,

  requirements: [
    { pattern: /&str/, message: "Take your string parameters as &str" },
    { pattern: /->\s*String/, message: "Return an owned String from shout and greet" },
    { pattern: /format!\s*\(/, message: "Build the greeting with format!" },
  ],

  tests: [
    { name: 'shout("hey") returns "HEY"',
      code: 'assert_eq!(shout("hey"), "HEY");' },
    { name: 'shout("Rust!") returns "RUST!"',
      code: 'assert_eq!(shout("Rust!"), "RUST!");' },
    { name: 'greet("world") returns "Hello, world!"',
      code: 'assert_eq!(greet("world"), "Hello, world!");' },
    { name: 'greet("Ada") returns "Hello, Ada!"',
      code: 'assert_eq!(greet("Ada"), "Hello, Ada!");' },
    { name: 'contains_word finds "be" in "to be or not"',
      code: 'assert!(contains_word("to be or not", "be"));\nassert!(!contains_word("to be or not", "xyzzy"));' },
  ],

  solution: `fn shout(s: &str) -> String {
    s.to_uppercase()
}

fn greet(name: &str) -> String {
    format!("Hello, {}!", name)
}

fn contains_word(haystack: &str, needle: &str) -> bool {
    haystack.contains(needle)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Rust</th></tr>
  <tr><td>Owned text</td><td>every string</td><td><code>String</code> (<code>String::from("hi")</code>, or what <code>format!</code> returns)</td></tr>
  <tr><td>Borrowed text</td><td>—</td><td><code>&amp;str</code>: literals, and what you pass to functions</td></tr>
  <tr><td>Interpolation</td><td>template literal with <code>\\\${}</code></td><td><code>format!("Hello, {}!", name)</code></td></tr>
  <tr><td>Uppercase</td><td><code>s.toUpperCase()</code></td><td><code>s.to_uppercase()</code></td></tr>
  <tr><td>Substring check</td><td><code>s.includes(x)</code></td><td><code>s.contains(x)</code></td></tr>
  <tr><td>Length</td><td><code>s.length</code></td><td><code>s.len()</code> (bytes, not characters)</td></tr>
  <tr><td><code>"1" + 1</code></td><td><code>"11"</code></td><td>compile error — convert explicitly</td></tr>
</table>
<p>Why does <code>&amp;str</code> as a parameter work for both kinds? Because
a <code>&amp;String</code> quietly converts to <code>&amp;str</code>, so a
<code>&amp;str</code> parameter accepts literals <em>and</em> borrowed
<code>String</code>s — maximum flexibility for the caller. That's the whole
rule: borrow in, own out. The class of bug you just retired is real: every
"why does the page say <code>NaN</code>" and "why is the total
<code>'12034'</code>" traces back to coercion Rust refuses to perform.</p>`,
};
