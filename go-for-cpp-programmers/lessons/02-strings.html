  intro: `
<p>A Go <code>string</code> is an immutable, read-only slice of bytes — usually
UTF-8 text. Like C++'s <code>std::string</code> you concatenate with
<code>+</code>, but Go's string type has no member functions at all: there is
no <code>s.length()</code> or <code>s.substr()</code> built into the value
itself, only free functions. Formatting lives in <code>fmt</code>, everyday
text manipulation in <code>strings</code>, and number/string conversion in
<code>strconv</code>.</p>
<table>
  <tr><th>C++</th><th>Go</th></tr>
  <tr><td><code>std::format("{} {}", a, b)</code></td><td><code>fmt.Sprintf("%s %d", a, b)</code></td></tr>
  <tr><td><code>std::transform(s.begin(), s.end(), s.begin(), ::toupper)</code></td><td><code>strings.ToUpper(s)</code></td></tr>
  <tr><td><code>s.find(x) != std::string::npos</code></td><td><code>strings.Contains(s, x)</code></td></tr>
  <tr><td>manual trim via <code>find_first_not_of</code>/<code>find_last_not_of</code></td><td><code>strings.TrimSpace(s)</code></td></tr>
  <tr><td><code>std::to_string(n)</code></td><td><code>strconv.Itoa(n)</code></td></tr>
  <tr><td><code>s.length()</code> (bytes!)</td><td><code>len(s)</code> (bytes!) / rune count via <code>range</code></td></tr>
</table>
<p>The verbs you will reach for constantly: <code>%s</code> (string),
<code>%d</code> (integer), <code>%q</code> (double-quoted string), and
<code>%v</code> (any value in its default form). The <code>strings</code>
package also gives you <code>Split</code>, <code>Join</code>, <code>Replace</code>,
<code>HasPrefix</code>, and friends — all as functions that take the string as
their first argument.</p>
<p>A C++ programmer feels right at home with the one real gotcha here: like
<code>std::string</code>, Go's <code>len(s)</code> counts <em>bytes</em>, not
characters. Because Go stores UTF-8 (much like a UTF-8-encoded
<code>std::string</code>), a multi-byte character like <code>"é"</code> or an
emoji makes <code>len</code> larger than the number of visible characters. To
count actual characters (runes), iterate with <code>for range</code>, which
decodes one rune per step — built into the language, where C++ would make you
reach for <code>codecvt</code> or a library like ICU/utfcpp to do the same
walk.</p>`,

  cpp: `std::string name = "Ada";

std::string msg = std::format("{} has {} messages", name, count);

std::string s = "  go  ";
s.erase(0, s.find_first_not_of(' '));
s.erase(s.find_last_not_of(' ') + 1);
std::transform(s.begin(), s.end(), s.begin(), ::toupper);
std::string loud = s;                          // "GO"
std::string label = std::to_string(5) + " items"; // "5 items"
// s.length() would give the byte count, not the character count`,

<p>Write these as package-level functions (no <code>package</code>,

  solution: `func Announce(name string, count int) string {
	return fmt.Sprintf("%s has %d messages", name, count)
}

func Normalize(s string) string {
	return strings.ToUpper(strings.TrimSpace(s))
}

func CountLabel(n int) string {
	return strconv.Itoa(n) + " items"
}

func RuneLength(s string) int {
	count := 0
	for range s {
		count++
	}
	return count
}

<table>

  <tr><td>Char count</td><td>manual UTF-8 decode loop (or a library like utfcpp)</td><td><code>for range s</code> (or <code>utf8.RuneCountInString</code>)</td></tr>
</table>
<p>Two habits carry over from this lesson. First, text operations are functions,
not methods — you will import <code>strings</code> and <code>strconv</code>
constantly, and their functions all take the data as the first argument, much
like reaching for a free function or algorithm header in C++ instead of a
member call. Second, respect the byte/rune distinction: <code>len(s)</code> is
bytes and indexing <code>s[i]</code> gives you a single <code>byte</code>
(exactly like indexing a UTF-8 <code>std::string</code> gives you a raw byte),
while <code>for i, r := range s</code> hands you the byte offset <code>i</code>
and the decoded rune <code>r</code>. When you truly need characters, range or
the <code>unicode/utf8</code> helpers are the correct tools — no separate
Unicode library required.</p>
<p>Note that <code>strconv.Atoi</code> returns <em>two</em> values — the number
and an <code>error</code> — because parsing can fail. That two-value error return
is Go's central idiom, and it is the subject of a later lesson. It stands in
for what C++ handles with an exception (<code>std::stoi</code>) or an
error-code out-parameter (<code>std::from_chars</code>).</p>`,
