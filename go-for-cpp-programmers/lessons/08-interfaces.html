  number: 8,
  title: "Interfaces",

  intro: `
<p>Go interfaces describe behavior — a set of method signatures — the way an
abstract base class with pure virtual methods does in C++. The one big
difference is <strong>implicit satisfaction</strong>: there is no
<code>: public Shape</code> to write. If a type has the methods an interface
names, it satisfies that interface automatically. You never declare the
relationship in the type's definition; the compiler infers it at every use
site.</p>
<table>
  <tr><th>C++</th><th>Go</th></tr>
  <tr><td><code>class Shape { virtual double area() const = 0; };</code></td><td><code>type Shape interface { Area() float64 }</code></td></tr>
  <tr><td><code>class Rectangle : public Shape {…}</code></td><td><code>func (r Rectangle) Area() float64 {…}</code> (no base class)</td></tr>
  <tr><td><code>double total(std::vector&lt;std::shared_ptr&lt;Shape&gt;&gt;)</code></td><td><code>func TotalArea(s []Shape)</code></td></tr>
  <tr><td><code>void*</code> / <code>std::any</code></td><td><code>interface{}</code> (the empty interface)</td></tr>
</table>
<p>Because satisfaction is structural, a <code>Rectangle</code> becomes a
<code>Shape</code> the moment it gains an <code>Area()</code> method — no
header to include, no base class linking the two, no vtable to opt into. A
function that takes a <code>Shape</code> parameter accepts any such value and
calls the method through the interface, dispatching to the concrete type at
runtime — the same runtime dispatch you get from a C++ virtual call, but
without ever writing <code>public Shape</code> or <code>override</code>. The
empty interface <code>interface{}</code> names <em>zero</em> methods, so
<em>every</em> value satisfies it — it is Go's <code>void*</code>, but type-safe.</p>`,

  cpp: `class Shape {
public:
  virtual double area() const = 0;
};

class Rectangle : public Shape {
public:
  double width, height;
  Rectangle(double w, double h) : width(w), height(h) {}
  double area() const override { return width * height; }
};

double totalArea(const std::vector<std::shared_ptr<Shape>>& shapes) {
  double sum = 0;
  for (const auto& s : shapes) sum += s->area();
  return sum;
}`,

  <li><code>Stringify(v interface{}) string</code> that accepts a value of any type

</ol>`,

  solution: `type Shape interface {
	Area() float64
}

type Rectangle struct {
	Width, Height float64
}

func (r Rectangle) Area() float64 {
	return r.Width * r.Height
}

type Triangle struct {
	Base, Height float64
}

func (t Triangle) Area() float64 {
	return 0.5 * t.Base * t.Height
}

func TotalArea(shapes []Shape) float64 {
	total := 0.0
	for _, s := range shapes {
		total += s.Area()
	}
	return total
}

func Stringify(v interface{}) string {
	return fmt.Sprintf("%v", v)
}

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Go</th></tr>
  <tr><td>Declare interface</td><td><code>class Shape { virtual double area() const = 0; };</code></td><td><code>type Shape interface { Area() float64 }</code></td></tr>
  <tr><td>Satisfy it</td><td><code>class C : public Shape</code> (explicit base class)</td><td>just define the method — no keyword</td></tr>
  <tr><td>Interface parameter</td><td><code>void f(const Shape&amp; s)</code> or <code>shared_ptr&lt;Shape&gt;</code></td><td><code>func f(s Shape)</code></td></tr>
  <tr><td>Any value</td><td><code>void*</code> / <code>std::any</code></td><td><code>interface{}</code> (or <code>any</code> in Go 1.18+)</td></tr>
</table>
<p>Implicit satisfaction is the mental shift. In C++, satisfying an interface
means <em>nominal</em> typing: you declare, at the point you write the class,
that it inherits from <code>Shape</code>, and the compiler builds a vtable for
that specific hierarchy. Go extends structural typing to method sets instead,
so a concrete type can satisfy an interface defined in a package it has never
heard of, with no base class and no vtable pointer baked into the object's
layout. Interfaces stay small — often one method — and callers depend on
behavior, not on a class hierarchy.</p>
<p>Go 1.18 added <code>any</code> as an alias for <code>interface{}</code>, so
you will see both; they are identical. To recover the concrete value out of an
<code>interface{}</code>, you use a type assertion (<code>v.(int)</code>) or a
type switch — the same job C++ does with <code>std::any_cast</code> or, for a
class hierarchy, <code>dynamic_cast</code>.</p>`,
