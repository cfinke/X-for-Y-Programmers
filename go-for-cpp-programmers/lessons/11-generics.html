  title: "Generics",

  intro: `
<p>C++ has had templates since long before Go had generics, so writing one
function that works over many types is nothing new to you. But Go's type
parameters are closer to a C++20 <em>constrained template</em> than to a plain
unconstrained <code>template&lt;typename T&gt;</code>: Go requires you to state
up front, as a <em>constraint</em>, which operations a type parameter must
support, rather than letting the compiler discover a type error deep inside the
function body at instantiation time.</p>
<p>The shape is different: C++ introduces type parameters with
<code>template&lt;typename T&gt;</code> <strong>before</strong> the function;
Go puts them in <strong>square brackets after the name</strong>, and every
parameter needs a constraint — an interface describing which types are
allowed. <code>any</code> (an alias for <code>interface{}</code>) means "no
restriction" — the closest thing to an unconstrained C++ template parameter —
<code>comparable</code> means "usable with <code>==</code>", and
<code>cmp.Ordered</code> means "usable with <code>&lt;</code>, <code>&gt;</code>",
similar in spirit to a C++20 concept like <code>std::totally_ordered</code>.</p>
<table>
  <tr><th>C++</th><th>Go</th></tr>
  <tr><td><code>template&lt;typename T&gt; T id(T x)</code></td><td><code>func Id[T any](x T) T</code></td></tr>
  <tr><td><code>template&lt;typename T&gt;</code> (before the function)</td><td><code>[T any]</code> (square brackets, needs a constraint)</td></tr>
  <tr><td><code>template&lt;typename T, typename U&gt;</code></td><td><code>[T, U any]</code></td></tr>
  <tr><td>unconstrained template parameter</td><td><code>any</code> (= <code>interface{}</code>)</td></tr>
  <tr><td>C++20 concept, e.g. <code>std::equality_comparable</code></td><td><code>comparable</code>, <code>cmp.Ordered</code>, or an interface</td></tr>
</table>
<p>Unlike a C++ template, which is instantiated fresh for every type and (absent
concepts) accepts anything that happens to support the operations used in its
body, Go checks a type parameter against its constraint interface at compile
time regardless of what the function body actually does. In exchange you must be
explicit about what operations a type parameter supports — you can only use
<code>&lt;</code> on a <code>T</code> whose constraint promises ordering.</p>`,

  cpp: `template <typename T, typename U>
std::vector<U> map(const std::vector<T>& xs, U (*f)(T)) {
  std::vector<U> result;
  for (const auto& x : xs) result.push_back(f(x));
  return result;
}

template <typename T>
T max(T a, T b) {
  return a > b ? a : b;
}

template <typename T>
bool contains(const std::vector<T>& xs, const T& v) {
  return std::find(xs.begin(), xs.end(), v) != xs.end();
}`,

  task: `
<p>Write three generic helpers as package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you). The
<code>cmp</code> package is available without importing.</p>
<ol>
  <li><code>Map[T, U any](s []T, f func(T) U) []U</code> — apply <code>f</code> to
      every element and return a new slice of results.</li>
  <li><code>Max[T cmp.Ordered](a, b T) T</code> — return the larger of the two.
      The <code>cmp.Ordered</code> constraint is what lets you use
      <code>&gt;</code> on a type parameter.</li>
  <li><code>Contains[T comparable](s []T, v T) bool</code> — report whether
      <code>v</code> appears in <code>s</code>. The <code>comparable</code>
      constraint is what lets you use <code>==</code>.</li>
</ol>`,

`,

  solution: `func Map[T, U any](s []T, f func(T) U) []U {
	result := make([]U, len(s))
	for i, v := range s {
		result[i] = f(v)
	}
	return result
}

func Max[T cmp.Ordered](a, b T) T {
	if a > b {
		return a
	}
	return b
}

func Contains[T comparable](s []T, v T) bool {
	for _, x := range s {
		if x == v {

		}
	}
	return false
}

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Go</th></tr>
  <tr><td>Generic function</td><td><code>template&lt;typename T&gt; T f(T x)</code></td><td><code>func F[T any](x T)</code></td></tr>
  <tr><td>Two parameters</td><td><code>template&lt;typename T, typename U&gt;</code></td><td><code>[T, U any]</code></td></tr>
  <tr><td>Equality bound</td><td><code>std::equality_comparable</code> (C++20) or implicit</td><td><code>[T comparable]</code></td></tr>
  <tr><td>Ordering bound</td><td><code>std::totally_ordered</code> (C++20) or implicit</td><td><code>[T cmp.Ordered]</code></td></tr>
  <tr><td>Generic type</td><td><code>template&lt;typename T&gt; class Box { ... };</code></td><td><code>type Box[T any] struct{ ... }</code></td></tr>
</table>
<p>Type inference usually lets you call <code>Map(xs, f)</code> and
<code>Max(3, 7)</code> without writing the type arguments — the compiler reads
them off the values, much like C++ template argument deduction. When inference
can't (an empty slice, say), you spell them explicitly:
<code>Max[int](a, b)</code>, the same way you'd write <code>max&lt;int&gt;(a, b)</code>
in C++.</p>
<p>Two rules trip up newcomers. First, only what the constraint promises is
allowed: you can <code>==</code> a <code>comparable</code> but not <code>&lt;</code>
it — that needs <code>cmp.Ordered</code>. A C++ template without concepts won't
catch a mismatch like this until instantiation, if it catches it at all — Go
checks it at every call site, before the function is even used. Second, Go
deliberately has no generic <em>methods</em> (a method can't introduce its own
type parameter, unlike a C++ member function template), and idiomatic Go still
prefers a plain <code>interface</code> when behavior, not a container, is what
varies — closer to C++ virtual dispatch than to templates. Generics are for
containers and algorithms; interfaces are for polymorphism. The standard library
leans on this split with the <code>slices</code> and <code>maps</code> packages,
which are just generic helpers over the built-in types, much like
<code>&lt;algorithm&gt;</code> in C++.</p>`,
};
