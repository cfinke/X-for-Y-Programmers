<div id="app"></div>
<script>
const LESSON = {
  number: 13,
  title: "Type Switches",

  intro: `
<p>C++ has no built-in type that narrows automatically the way an algebraic
union type does in some other languages. The closest built-in tools are
<code>std::any</code> (C++17),
which can hold a value of any type, plus RTTI — <code>typeid</code> and
<code>dynamic_cast</code> — to ask what is actually inside at runtime. Go's
equivalent is asking an <code>interface{}</code> (aka <code>any</code>) value
what concrete type it is holding at runtime. That is a <em>type assertion</em>,
and the multi-branch form is a <em>type switch</em>.</p>
<table>
  <tr><th>C++</th><th>Go</th></tr>
  <tr><td><code>x.type() == typeid(int)</code></td><td><code>v, ok := x.(int)</code></td></tr>
  <tr><td><code>std::any_cast&lt;std::string&gt;(x)</code> (throws if wrong)</td><td><code>x.(string)</code> (panics if wrong)</td></tr>
  <tr><td><code>if (x.type() == typeid(std::string)) { … }</code></td><td><code>switch v := x.(type) { case string: … }</code></td></tr>
  <tr><td>trailing <code>else</code> / <code>throw</code></td><td><code>default:</code> case</td></tr>
</table>
<p>The comma-ok form <code>v, ok := x.(int)</code> never panics: on a match
<code>ok</code> is <code>true</code> and <code>v</code> holds the value; on a
mismatch <code>ok</code> is <code>false</code> and <code>v</code> is the zero
value. The single-result form <code>x.(int)</code> panics on a mismatch, much
like <code>std::any_cast&lt;T&gt;(x)</code> throws <code>std::bad_any_cast</code>
on a type mismatch, so reach for it only when you are certain. Inside a type
switch, the bound variable <code>v</code> has the specific type of whichever
<code>case</code> matched — the compiler narrows it for you, more automatically
than C++'s manual <code>any_cast</code> calls.</p>`,

  cpp: `std::string describe(const std::any& x) {
  if (x.type() == typeid(int)) {
    return "int: " + std::to_string(std::any_cast<int>(x));
  }
  if (x.type() == typeid(std::string)) {
    return "string of length " + std::to_string(std::any_cast<std::string>(x).size());
  }
  if (x.type() == typeid(bool)) {
    return std::any_cast<bool>(x) ? "the boolean true" : "the boolean false";
  }
  return "unknown type";
}`,

  task: `
<p>Write two package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>Describe(x interface{}) string</code> classifies <code>x</code> by its
      dynamic type using a <strong>type switch</strong>:
    <ul>
      <li><code>int</code> &rarr; <code>"int: N"</code> (e.g. <code>"int: 7"</code>) — use
          <code>fmt.Sprintf("int: %d", v)</code>.</li>
      <li><code>string</code> &rarr; <code>"string of length N"</code> using
          <code>len(v)</code>.</li>
      <li><code>bool</code> &rarr; <code>"the boolean true"</code> or
          <code>"the boolean false"</code>.</li>
      <li>anything else &rarr; <code>"unknown type"</code> (the <code>default</code> case).</li>
    </ul>
  </li>
  <li><code>AsInt(x interface{}) (int, bool)</code> uses the comma-ok assertion
      <code>v, ok := x.(int)</code> and returns both results. For a non-int it
      returns <code>(0, false)</code>.</li>
</ol>`,

  starter: `func Describe(x interface{}) string {
	return "" // TODO: use a type switch
}

func AsInt(x interface{}) (int, bool) {
	return 0, false // TODO: use the comma-ok assertion x.(int)
}
`,

  requirements: [
    { pattern: /switch\s+\w+\s*:=\s*\w+\.\(type\)/, message: "Use a type switch: switch v := x.(type)" },
    { pattern: /\.\(int\)/, message: "Use the comma-ok assertion x.(int) in AsInt" },
  ],

  tests: [
    { name: "Describe(7) is \"int: 7\"", code: "\t\texpect_eq(Describe(7), \"int: 7\")" },
    { name: "Describe(\"hello\") is \"string of length 5\"", code: "\t\texpect_eq(Describe(\"hello\"), \"string of length 5\")" },
    { name: "Describe(true) is \"the boolean true\"", code: "\t\texpect_eq(Describe(true), \"the boolean true\")" },
    { name: "Describe(false) is \"the boolean false\"", code: "\t\texpect_eq(Describe(false), \"the boolean false\")" },
    { name: "Describe(3.14) is \"unknown type\"", code: "\t\texpect_eq(Describe(3.14), \"unknown type\")" },
    { name: "AsInt(42) is (42, true)", code: "\t\tv, ok := AsInt(42)\n\t\texpect_eq(v, 42)\n\t\texpect_true(ok)" },
    { name: "AsInt(\"nope\") is (0, false)", code: "\t\tv, ok := AsInt(\"nope\")\n\t\texpect_eq(v, 0)\n\t\texpect_eq(ok, false)" },
  ],

  solution: `func Describe(x interface{}) string {
	switch v := x.(type) {
	case int:
		return fmt.Sprintf("int: %d", v)
	case string:
		return fmt.Sprintf("string of length %d", len(v))
	case bool:
		if v {
			return "the boolean true"
		}
		return "the boolean false"
	default:
		return "unknown type"
	}
}

func AsInt(x interface{}) (int, bool) {
	v, ok := x.(int)
	return v, ok
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Go</th></tr>
  <tr><td>Checked narrow</td><td><code>if (x.type() == typeid(int))</code> then <code>std::any_cast&lt;int&gt;(x)</code></td><td><code>v, ok := x.(int)</code></td></tr>
  <tr><td>Unchecked cast</td><td><code>std::any_cast&lt;int&gt;(x)</code> (throws <code>std::bad_any_cast</code>)</td><td><code>x.(int)</code> (panics if wrong)</td></tr>
  <tr><td>Multi-way narrow</td><td><code>if</code>/<code>else if</code> chain on <code>x.type()</code>, or <code>std::visit</code> over a <code>std::variant</code></td><td><code>switch v := x.(type)</code></td></tr>
  <tr><td>Empty interface</td><td><code>!x.has_value()</code> on an empty <code>std::any</code></td><td><code>case nil:</code></td></tr>
</table>
<p>Two habits to carry over. First, prefer the comma-ok form over the panicking
single-result assertion unless a mismatch is truly impossible — it is Go's
equivalent of checking <code>x.type()</code> before calling <code>any_cast</code>
instead of letting it throw. Second, inside <code>switch v := x.(type)</code>
the variable <code>v</code> takes on the matched case's concrete type, so you can
call type-specific methods on it without another assertion. If you list several
types in one case (<code>case int, int64:</code>), <code>v</code> keeps the
original <code>interface{}</code> type in that branch, since Go cannot pick just
one. A <code>case nil:</code> matches an interface holding no value at all — the
closest C++ analog is an empty <code>std::any</code>, checked with
<code>has_value()</code>.</p>`,
};
