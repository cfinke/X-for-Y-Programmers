  title: "None & Truthiness",

  intro: `
<p>Kotlin has exactly one empty value, <code>null</code>, and the type system
won't let you ignore it — a type is only nullable if it ends in
<code>?</code>, and the compiler forces a check before you can use it. But
Kotlin has no notion of truthiness at all: an <code>if</code> condition must
be an actual <code>Boolean</code>, so <code>if (list)</code> or
<code>if (name)</code> won't even compile. Python has exactly one empty too,
<code>None</code>, but its rule is looser: a value is falsy if it is
<em>empty or zero</em>. That means empty containers count too —
<code>[]</code>, <code>{}</code>, <code>""</code>, and <code>0</code> are all
falsy, so you rarely write <code>len(x) == 0</code>.</p>
<table>
  <tr><th>Kotlin</th><th>Python</th></tr>
  <tr><td><code>null</code></td><td><code>None</code></td></tr>
  <tr><td><code>x == null</code></td><td><code>x is None</code></td></tr>
  <tr><td><code>if (list.isEmpty())</code></td><td><code>if not arr:</code></td></tr>
  <tr><td><code>x ?: fallback</code></td><td><code>x if x is not None else fallback</code></td></tr>
  <tr><td><code>if (x.isNullOrEmpty()) fallback else x</code></td><td><code>x or fallback</code></td></tr>
  <tr><td><code>x?.let { f(it) }</code></td><td><code>x and f(x)</code></td></tr>
</table>
<p>Two things matter here. First, use <code>is</code> / <code>is not</code> to
compare against <code>None</code> — <code>is</code> checks <em>identity</em>
(same object) while <code>==</code> checks <em>equality</em> (same value).
Because there is only one <code>None</code> object in the whole program,
<code>x is None</code> is the idiomatic test — it plays a role similar to
Kotlin's <code>==</code>, which is already null-safe structural equality, but
Python reserves <code>is</code> for singleton checks. Second, <code>or</code>
and <code>and</code> short-circuit and return one of their <em>operands</em>,
not a boolean — so <code>value or default</code> is Python's everyday way to
supply a fallback, something Kotlin can't do directly since <code>||</code>
only accepts and returns <code>Boolean</code>.</p>`,

  kotlin: `fun greet(name: String?): String {
    val who = if (name.isNullOrEmpty()) "stranger" else name
    return "Hello, $who"
}

fun <T> firstItem(items: List<T>): T? {
    return if (items.isNotEmpty()) items[0] else null
}`,

  task: `

<ol>

</ol>`,

  solution: `def greet(name):
    who = name or "stranger"
    return f"Hello, {who}"


def is_empty(value):
    return not value


def first_item(items):
    return items[0] if items else None


def has_value(value):
    return value is not None
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Python</th></tr>
  <tr><td>The empty value</td><td><code>null</code> (only one)</td><td><code>None</code> (only one)</td></tr>
  <tr><td>Null check</td><td><code>x == null</code></td><td><code>x is None</code></td></tr>
  <tr><td>Present check</td><td><code>x != null</code></td><td><code>x is not None</code></td></tr>
  <tr><td>Empty container</td><td><code>list.isEmpty()</code></td><td><code>not arr</code></td></tr>
  <tr><td>Null-only default</td><td><code>x ?: d</code></td><td><code>x if x is not None else d</code></td></tr>
  <tr><td>Falsy default</td><td>no equivalent — <code>||</code> requires <code>Boolean</code></td><td><code>x or d</code></td></tr>
</table>
<p>The subtle trap is one Kotlin's <code>?:</code> elvis operator sidesteps
entirely: <code>x or d</code> replaces <em>any</em> falsy <code>x</code>, so a
legitimate <code>0</code> or <code>""</code> gets swapped for the default. When
only <code>None</code> should trigger the fallback, reach for
<code>x if x is not None else d</code> — the equivalent of <code>?:</code>.
Reserve <code>is</code> for the singletons <code>None</code>, <code>True</code>,
and <code>False</code>; use <code>==</code> for comparing values like numbers
and strings — Python's <code>==</code> is closer to Kotlin's <code>==</code>
(value equality) than to Kotlin's <code>===</code> (reference equality). And
remember that <code>and</code>/<code>or</code> return an operand, not a bool —
a bigger departure from Kotlin than from most languages, since Kotlin's
<code>&amp;&amp;</code>/<code>||</code> only accept and return actual
<code>Boolean</code>s: <code>[] or "x"</code> is <code>"x"</code>, and
<code>2 and 3</code> is <code>3</code>.</p>`,
