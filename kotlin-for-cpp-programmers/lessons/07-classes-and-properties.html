  title: "Classes & Properties",

  intro: `
<p>Kotlin classes will feel familiar, but the syntax is dramatically tighter than
C++'s. The star of the show is the <em>primary constructor</em>: you
declare a class's parameters right after its name, and prefixing one with
<code>val</code> or <code>var</code> turns it into a property in the same breath.
No member-initializer-list boilerplate, no separate field declarations.</p>
<table>
  <tr><th>C++</th><th>Kotlin</th></tr>
  <tr><td><code>class P { public: std::string name; P(std::string n) : name(n) {} };</code></td><td><code>class P(val name: String)</code></td></tr>
  <tr><td><code>const</code> member</td><td><code>val</code> property</td></tr>
  <tr><td>mutable member</td><td><code>var</code> property</td></tr>
  <tr><td><code>P p("Ada");</code> (no <code>new</code> for stack objects)</td><td><code>P("Ada")</code> (no <code>new</code>)</td></tr>
  <tr><td><code>T x() const { … }</code> getter method</td><td><code>val x get() = …</code></td></tr>
</table>
<p>A <code>val</code> constructor parameter is a read-only property (like a
C++ <code>const</code> member); a <code>var</code> parameter is mutable. Any
setup logic that a primary constructor can't express inline goes in an
<code>init { }</code> block, which runs as part of construction — no separate
member-initializer list required. Computed properties use <code>get()</code>,
and a mutable property can intercept writes with <code>set(value)</code> using
the magic <code>field</code> backing identifier.</p>`,

  cpp: `class BankAccount {
public:
    const std::string owner;
    int balance;

    BankAccount(std::string owner, int startingBalance) : owner(owner) {
        if (startingBalance < 0) throw std::invalid_argument("negative");
        balance = startingBalance;
    }

    std::string summary() const {
        return owner + " has " + std::to_string(balance);
    }

    void setNote(std::string value) { note_ = trim(value); }
    std::string getNote() const { return note_; }

    void deposit(int amount) { balance += amount; }
    bool withdraw(int amount) {
        if (amount > balance) return false;
        balance -= amount;
        return true;
    }

private:
    std::string note_ = "";
};`,

  task: `
<p>Build a <code>BankAccount</code> class. No <code>class</code>-less top-level

</ol>`,

    { name: "balance starts from the constructor argument", code: "        val a = BankAccount(\"Ada\", 100)\n        expect_eq(a.balance, 100)" },

    { name: "withdraw fails when funds are insufficient", code: "        val a = BankAccount(\"Bo\", 20)\n        expect_true(!a.withdraw(100))\n        expect_eq(a.balance, 20)" },
    { name: "summary is a computed property", code: "        expect_eq(BankAccount(\"Ada\", 100).summary, \"Ada has 100\")" },
    { name: "note setter trims the value", code: "        val a = BankAccount(\"Cy\", 0)\n        a.note = \"  hello  \"\n        expect_eq(a.note, \"hello\")" },

  solution: `class BankAccount(val owner: String, startingBalance: Int) {
    var balance: Int = startingBalance
        private set

    var note: String = ""
        set(value) {
            field = value.trim()
        }

    init {
        require(startingBalance >= 0) { "starting balance cannot be negative" }
    }

    val summary: String
        get() = "$owner has $balance"

    fun deposit(amount: Int) {
        balance += amount
    }

    fun withdraw(amount: Int): Boolean {
        if (amount > balance) return false
        balance -= amount
        return true
    }
}

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Kotlin</th></tr>
  <tr><td>Property in constructor</td><td><code>C(std::string n) : name(n) {}</code></td><td><code>class C(val name: String)</code></td></tr>
  <tr><td>Read-only property</td><td><code>const</code> member</td><td><code>val</code></td></tr>
  <tr><td>Mutable property</td><td>plain member</td><td><code>var</code></td></tr>
  <tr><td>Construction-time setup</td><td>constructor body / initializer list</td><td><code>init { }</code></td></tr>
  <tr><td>Computed property</td><td><code>T x() const {}</code> getter method</td><td><code>val x get() = …</code></td></tr>
  <tr><td>Write interceptor</td><td><code>void setX(T v) {}</code> setter method</td><td><code>set(value) { field = … }</code></td></tr>
  <tr><td>Read-only from outside</td><td>private member + public getter</td><td><code>var x = 0; private set</code></td></tr>
</table>
<p>The <code>field</code> identifier inside a custom setter (or getter) is
Kotlin's <em>backing field</em> — it's the storage behind the property, and you
must use it instead of <code>this.note</code> to avoid infinite recursion. C++
sidesteps this entirely because it has no property syntax that automatically
intercepts assignment: a <code>setNote()</code> method just writes to a
plainly-named private member like <code>note_</code>, with no risk of the
method calling itself. Kotlin's <code>field</code> gives you that same
separation of "the property you write" from "the storage behind it" without
having to invent a second member name. A <code>private set</code> gives you a
property that anyone can read but only the class can write — Kotlin's clean
answer to what C++ does with a private member plus a public getter method.
Note there is no <code>new</code> keyword: <code>BankAccount("Ada", 100)</code>
constructs an instance directly, much like a C++ stack object such as
<code>BankAccount a("Ada", 100);</code>.</p>`,
