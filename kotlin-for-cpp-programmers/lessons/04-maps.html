  intro: `
<p>Kotlin splits the concept you know from C++'s <code>std::map</code> /
<code>std::unordered_map</code> into two types by mutability. A
<code>mapOf(...)</code> is a <em>read-only</em> <code>Map</code> (no
<code>put</code> in its interface), while a <code>mutableMapOf(...)</code> is a
<code>MutableMap</code> you can add to. Both are backed by a
<code>LinkedHashMap</code>, so insertion order is preserved — unlike
<code>std::map</code> (sorted by key) or <code>std::unordered_map</code>
(unspecified order).</p>
<table>
  <tr><th>C++</th><th>Kotlin</th></tr>
  <tr><td><code>std::map&lt;std::string,int&gt;{{"a",1},{"b",2}}</code></td><td><code>mapOf("a" to 1, "b" to 2)</code></td></tr>
  <tr><td><code>std::unordered_map&lt;std::string,int&gt;{}</code></td><td><code>mutableMapOf&lt;String, Int&gt;()</code></td></tr>
  <tr><td><code>m.at("a")</code> / <code>m["a"]</code></td><td><code>m["a"]</code> (returns <code>Int?</code>)</td></tr>
  <tr><td><code>m.count(k) ? m.at(k) : d</code></td><td><code>m.getOrDefault(k, d)</code></td></tr>
  <tr><td><code>m[k] = v;</code></td><td><code>m[k] = v</code> (mutable only)</td></tr>
  <tr><td><code>m.count(k) &gt; 0</code> / <code>m.contains(k)</code></td><td><code>m.containsKey(k)</code></td></tr>
</table>
<p>The key difference from C++ is that indexing a map, <code>m[k]</code>,
returns a <em>nullable</em> <code>V?</code> instead of throwing (like
<code>std::map::at</code>) or silently inserting a default-constructed value
(like <code>std::map::operator[]</code>) — the type system forces you to
handle a missing key. Reach for <code>getOrDefault</code> when you have a
sensible fallback.</p>`,

std::string capital = (it != capitals.end()) ? it->second : "Unknown";

std::unordered_map<std::string, int> counts;
for (const auto& w : words) {
    counts[w]++;
}`,

  solution: `val capitals: Map<String, String> = mapOf(
    "France" to "Paris",
    "Japan" to "Tokyo",
    "Kenya" to "Nairobi",
)

fun isKnown(country: String): Boolean {
    return capitals.containsKey(country)
}

fun capitalOr(country: String, fallback: String): String {
    return capitals.getOrDefault(country, fallback)
}

fun wordCounts(words: List<String>): Map<String, Int> {
    val counts = mutableMapOf<String, Int>()
    for (w in words) {
        counts[w] = counts.getOrDefault(w, 0) + 1
    }
    return counts
}

fun entryLines(m: Map<String, Int>): List<String> {
    val lines = mutableListOf<String>()
    for ((k, v) in m.toSortedMap()) {
        lines.add("$k=$v")
    }
    return lines
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Kotlin</th></tr>
  <tr><td>Read-only map</td><td><code>const std::map&lt;K,V&gt;</code></td><td><code>mapOf(...)</code> → <code>Map</code></td></tr>
  <tr><td>Mutable map</td><td><code>std::unordered_map&lt;K,V&gt;</code></td><td><code>mutableMapOf(...)</code> → <code>MutableMap</code></td></tr>
  <tr><td>Lookup</td><td><code>m.at(k)</code> (throws) / <code>m[k]</code> (inserts default)</td><td><code>m[k]</code> → <code>V?</code></td></tr>
  <tr><td>With default</td><td><code>m.count(k) ? m.at(k) : d</code></td><td><code>m.getOrDefault(k, d)</code></td></tr>
  <tr><td>Insert / update</td><td><code>m[k] = v;</code> / <code>m.insert({k, v})</code></td><td><code>m[k] = v</code></td></tr>
  <tr><td>Views</td><td>iterate <code>m</code> for <code>.first</code>/<code>.second</code></td><td><code>m.keys</code> / <code>m.values</code> / <code>m.entries</code></td></tr>
  <tr><td>Iterate pairs</td><td><code>for (const auto& [k, v] : m)</code></td><td><code>for ((k, v) in m)</code></td></tr>
</table>
<p>Note that <code>m[k] = v</code> is the idiomatic way to write
<code>put</code>; it only compiles on a <code>MutableMap</code>, so the read-only
<code>Map</code> from <code>mapOf</code> won't let you accidentally mutate it —
unlike C++'s <code>std::map::operator[]</code>, which silently
default-constructs and inserts a value for a missing key even on a
non-<code>const</code> map. For counting and grouping, Kotlin also ships
higher-level helpers — <code>words.groupingBy { it }.eachCount()</code> is the
one-liner equivalent of the <code>wordCounts</code> loop, and
<code>groupBy</code> collects items into <code>Map&lt;K, List&lt;V&gt;&gt;</code>.
Iterating a map yields <code>Map.Entry</code> objects, which destructure
straight into <code>(k, v)</code> — much like structured bindings on a
<code>std::pair</code> in a range-based <code>for</code>.</p>`,
