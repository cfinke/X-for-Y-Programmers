  number: 12,
  title: "Sealed Classes",

  intro: `
<p>In C++ you model "one of a fixed set of shapes" with a tagged union — either
a hand-rolled <code>enum</code> tag plus a <code>union</code>/<code>struct</code>,
or, since C++17, <code>std::variant</code> paired with <code>std::visit</code> —
and you branch on that tag with a <code>switch</code> or a visitor. Kotlin's
equivalent is a <strong>sealed class</strong> (or <strong>sealed interface</strong>):
a type whose subclasses are all known at compile time because they must live in
the same file/module.</p>
<table>
  <tr><th>C++</th><th>Kotlin</th></tr>
  <tr><td><code>std::variant&lt;A, B, C&gt;</code></td><td><code>sealed class Shape</code></td></tr>
  <tr><td><code>struct Circle { double radius; };</code></td><td><code>class Circle : Shape()</code></td></tr>
  <tr><td><code>std::visit(overloaded, shape)</code></td><td><code>when (s) { is Circle -&gt; ... }</code></td></tr>
  <tr><td>tag check <code>std::holds_alternative&lt;Circle&gt;(s)</code></td><td>type check <code>is Circle</code></td></tr>
</table>
<p>The payoff is <em>exhaustiveness</em>. Because the compiler knows the complete
list of subtypes, a <code>when</code> that covers them all needs <strong>no
<code>else</code> branch</strong> — and if you later add a fourth subclass, every
<code>when</code> used as an expression stops compiling until you handle it. It is
the same safety you get from <code>std::visit</code> with a fully-covering
<code>if constexpr</code> chain (which fails to compile if a case is missing),
except Kotlin gives it to you by default instead of requiring the
compile-time-dispatch idiom.</p>`,

  cpp: `#include <variant>
#include <cmath>

struct Circle { double radius; };
struct Rectangle { double width, height; };
struct Triangle { double base, height; };
using Shape = std::variant<Circle, Rectangle, Triangle>;

double area(const Shape& shape) {
  return std::visit([](auto&& s) -> double {
    using T = std::decay_t<decltype(s)>;
    if constexpr (std::is_same_v<T, Circle>) {
      return M_PI * s.radius * s.radius;
    } else if constexpr (std::is_same_v<T, Rectangle>) {
      return s.width * s.height;
    } else if constexpr (std::is_same_v<T, Triangle>) {
      return 0.5 * s.base * s.height;
    }
  }, shape);
}`,

  task: `
<p>The <code>Shape</code> hierarchy is already declared for you (a
<code>sealed class</code> with three subclasses). Fill in the two functions using
an exhaustive <code>when</code> — inside each <code>is Circle</code> branch the

<ol>

  <li>Complete <code>name(shape: Shape): String</code> to return

</ol>`,

  requirements: [
    { pattern: /sealed\s+class\s+Shape/, message: "Keep the sealed class Shape hierarchy" },

    { pattern: /is\s+Circle/, message: "Branch on the subtype with `is Circle` (and friends)" },

  tests: [

    { name: "area of a triangle", code: "        expect_eq(area(Triangle(4.0, 3.0)), 6.0)" },
    { name: "area of a circle uses PI", code: "        expect_true(area(Circle(1.0)) > 3.14 && area(Circle(1.0)) < 3.15)" },
    { name: 'name(Circle) is "circle"', code: "        expect_eq(name(Circle(2.0)), \"circle\")" },
    { name: 'name(Rectangle) is "rectangle"', code: "        expect_eq(name(Rectangle(1.0, 2.0)), \"rectangle\")" },
    { name: 'name(Triangle) is "triangle"', code: "        expect_eq(name(Triangle(1.0, 2.0)), \"triangle\")" },
  ],

  solution: `import kotlin.math.PI

sealed class Shape
class Circle(val radius: Double) : Shape()
class Rectangle(val width: Double, val height: Double) : Shape()
class Triangle(val base: Double, val height: Double) : Shape()

fun area(shape: Shape): Double = when (shape) {
    is Circle -> PI * shape.radius * shape.radius
    is Rectangle -> shape.width * shape.height
    is Triangle -> 0.5 * shape.base * shape.height
}

fun name(shape: Shape): String = when (shape) {
    is Circle -> "circle"
    is Rectangle -> "rectangle"
    is Triangle -> "triangle"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Kotlin</th></tr>
  <tr><td>Closed set of types</td><td><code>std::variant&lt;A, B, C&gt;</code></td><td><code>sealed class</code> / <code>sealed interface</code></td></tr>
  <tr><td>Variant</td><td><code>struct Circle { double radius; };</code></td><td><code>class Circle(...) : Shape()</code></td></tr>
  <tr><td>Match</td><td><code>std::visit(overloaded, shape)</code></td><td><code>when (s) { is Circle -&gt; }</code></td></tr>
  <tr><td>Narrowing</td><td><code>auto&&</code> + <code>if constexpr</code> inside the visitor lambda</td><td>smart cast after <code>is</code></td></tr>
  <tr><td>Exhaustiveness</td><td>opt-in (missing <code>if constexpr</code> branch just returns nothing, or you add a <code>static_assert(false)</code> fallback)</td><td>built in — no <code>else</code></td></tr>
</table>
<p>A <code>when</code> used as an <em>expression</em> (as here, on the right of
<code>=</code>) is checked for exhaustiveness; a <code>when</code> used only as a
statement is not, so prefer the expression form to get the safety. The same
pattern models a <code>Result</code>: <code>sealed class Result&lt;out T&gt;</code>
with <code>class Ok&lt;T&gt;(val value: T)</code> and
<code>class Err(val message: String)</code>, then <code>when</code> over it.
Variants that carry no data can be <code>object</code> singletons (e.g.
<code>object Loading : Result&lt;Nothing&gt;()</code>) instead of classes.</p>`,
