  intro: `
<p>In C++ there is one primary sequence container, <code>std::vector&lt;T&gt;</code>,
and read-only access is a matter of taking a <code>const</code> reference rather
than choosing a different type. Kotlin splits the idea into <em>two distinct
types</em>: <code>List&lt;T&gt;</code> has no mutating methods at all, while
<code>MutableList&lt;T&gt;</code> adds <code>add</code>/<code>remove</code>. You
choose the capability by choosing the builder: <code>listOf(...)</code> gives a
read-only <code>List</code>, and <code>mutableListOf(...)</code> gives a
<code>MutableList</code>.</p>
<table>
  <tr><th>C++</th><th>Kotlin</th></tr>
  <tr><td><code>const std::vector&lt;int&gt; xs = {1, 2, 3};</code></td><td><code>val xs = listOf(1, 2, 3)</code></td></tr>
  <tr><td><code>std::vector&lt;int&gt; ys;</code></td><td><code>val ys = mutableListOf&lt;Int&gt;()</code></td></tr>
  <tr><td><code>ys.push_back(4)</code></td><td><code>ys.add(4)</code></td></tr>
  <tr><td><code>xs[0]</code>, <code>xs.size()</code></td><td><code>xs[0]</code>, <code>xs.size</code></td></tr>
  <tr><td><code>std::find(xs.begin(), xs.end(), 2) != xs.end()</code></td><td><code>2 in xs</code></td></tr>
  <tr><td><code>std::transform(...)</code></td><td><code>xs.map { it * 2 }</code></td></tr>
</table>
<p>Notice indexing (<code>xs[0]</code>) is identical, but <code>.size()</code>
becomes <code>.size</code> (no parentheses — it's a property, not a method call),
membership uses the <code>in</code> operator instead of <code>std::find</code>,
and lambdas drop the parameter list when there is a single argument — you refer to
it as <code>it</code>. <code>first()</code> and <code>last()</code> return the
ends of a list. Crucially, calling <code>.add()</code> on a plain
<code>List</code> is a <em>compile error</em>, not a silent no-op — the type
system enforces read-only, whereas a C++ <code>const std::vector&lt;T&gt;&amp;</code>
only stops you from calling non-<code>const</code> member functions through that
particular reference.</p>`,

  cpp: `const std::vector<int> firstThree = {1, 2, 3};

std::vector<int> nums;
nums.push_back(1);
nums.push_back(2);

std::vector<int> doubled(const std::vector<int>& list) {
  std::vector<int> result;
  for (int x : list) result.push_back(x * 2);
  return result;
}

std::vector<int> evens(const std::vector<int>& list) {
  std::vector<int> result;
  for (int x : list) if (x % 2 == 0) result.push_back(x);
  return result;
}`,

  solution: `fun firstThree(): List<Int> {
    return listOf(1, 2, 3)
}

fun collect(n: Int): MutableList<Int> {
    val result = mutableListOf<Int>()
    for (i in 1..n) {
        result.add(i)
    }
    return result
}

fun at(list: List<Int>, i: Int): Int {
    return list[i]
}

fun count(list: List<Int>): Int {
    return list.size
}

fun has(list: List<Int>, x: Int): Boolean {
    return x in list
}

fun ends(list: List<Int>): List<Int> {
    return listOf(list.first(), list.last())
}

fun doubled(list: List<Int>): List<Int> {
    return list.map { it * 2 }
}

fun evens(list: List<Int>): List<Int> {
    return list.filter { it % 2 == 0 }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Kotlin</th></tr>
  <tr><td>Read-only list</td><td><code>const std::vector&lt;int&gt;&amp;</code></td><td><code>List&lt;Int&gt;</code></td></tr>
  <tr><td>Mutable list</td><td><code>std::vector&lt;int&gt;</code></td><td><code>MutableList&lt;Int&gt;</code></td></tr>
  <tr><td>Build</td><td><code>{1, 2, 3}</code></td><td><code>listOf(1, 2, 3)</code></td></tr>
  <tr><td>Append</td><td><code>xs.push_back(4)</code></td><td><code>xs.add(4)</code></td></tr>
  <tr><td>Remove value</td><td><code>xs.erase(std::remove(xs.begin(), xs.end(), 4), xs.end())</code></td><td><code>xs.remove(4)</code></td></tr>
  <tr><td>Length</td><td><code>xs.size()</code></td><td><code>xs.size</code></td></tr>
  <tr><td>Membership</td><td><code>std::find(xs.begin(), xs.end(), 2) != xs.end()</code></td><td><code>2 in xs</code></td></tr>
  <tr><td>Ends</td><td><code>xs.front()</code> / <code>xs.back()</code></td><td><code>xs.first()</code> / <code>xs.last()</code></td></tr>
  <tr><td>Transform</td><td><code>std::transform(xs.begin(), xs.end(), out.begin(), f)</code></td><td><code>xs.map { it * 2 }</code></td></tr>
  <tr><td>Keep some</td><td><code>std::copy_if(xs.begin(), xs.end(), ...)</code></td><td><code>xs.filter { ... }</code></td></tr>
</table>
<p>A <code>MutableList</code> <em>is a</em> <code>List</code>, so you can pass one
anywhere a read-only <code>List</code> is expected — the receiver just cannot
mutate it. That is why <code>collect</code> returns a
<code>MutableList</code> yet compares equal to a <code>listOf(...)</code>:
equality is by contents. Both <code>map</code> and <code>filter</code> always
return a <em>new</em> read-only <code>List</code>, never mutating the source,
much like <code>std::transform</code> and <code>std::copy_if</code> write into a
separate output range rather than mutating the input. Reach for <code>listOf</code>
by default and upgrade to <code>mutableListOf</code> only when you genuinely need
to grow or shrink the collection in place.</p>`,
