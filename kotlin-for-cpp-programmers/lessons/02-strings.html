  intro: `
<p>Kotlin strings will feel far more forgiving than C++'s. Interpolation uses a bare
<code>$name</code> right inside the string, and for a full
expression you wrap it in braces: <code>\${user.age + 1}</code> — no more chaining
<code>std::ostringstream</code> or <code>std::format</code> calls together. Since a
Kotlin <code>String</code> is a single immutable type (not a raw <code>char*</code>,
<code>std::string</code>, and <code>std::string_view</code> to juggle), a plain
double-quoted string <em>is</em> a template string — there's no separate syntax to
opt into.</p>
<table>
  <tr><th>C++</th><th>Kotlin</th></tr>
  <tr><td><code>"Hi " + name</code></td><td><code>"Hi $name"</code></td></tr>
  <tr><td><code>std::format("{}", a + b)</code></td><td><code>"\${a + b}"</code></td></tr>
  <tr><td><code>std::toupper</code> per char</td><td><code>s.uppercase()</code></td></tr>
  <tr><td><code>s.find(x) != std::string::npos</code></td><td><code>s.contains(x)</code></td></tr>
  <tr><td><code>std::stoi("42")</code></td><td><code>"42".toInt()</code></td></tr>
</table>
<p>The method names read close to the STL algorithms you already know but are
called directly on the string: <code>uppercase()</code> /
<code>lowercase()</code> (no manual <code>std::transform</code> loop),
<code>contains()</code> (no <code>.find() != npos</code> dance), and
<code>joinToString()</code> in place of hand-rolling a loop with a
<code>std::stringstream</code> and delimiter checks. Multi-line and regex-heavy
text goes in a <em>triple-quoted</em> raw string (<code>""" ... """</code>) where
backslashes are literal — handy where C++ reaches for an R-string literal
(<code>R"(...)"</code>).</p>`,

  cpp: `std::string greet(const std::string& name) {
  return "Hello, " + name + "!";
}

std::string slugify(std::string title) {
  // trim, lowercase, and replace spaces with hyphens
  title.erase(0, title.find_first_not_of(' '));
  title.erase(title.find_last_not_of(' ') + 1);
  std::transform(title.begin(), title.end(), title.begin(), ::tolower);
  std::replace(title.begin(), title.end(), ' ', '-');
  return title;
}

std::string doubled = std::to_string(std::stoi(" 21 ") * 2); // "42"`,

  solution: `fun greet(name: String): String {
    return "Hello, $name!"
}

fun preview(title: String, body: String): String {
    return "\${title.uppercase()}: \${body.length} chars"
}

fun slugify(title: String): String {
    return title.trim().lowercase().split(" ").joinToString("-")
}

fun redact(text: String): String {
    return text.replace("secret", "*****")
}

fun snippet(text: String): String {
    return text.substring(0, 5)
}

fun mentions(text: String, term: String): Boolean {
    return text.contains(term)
}

fun isHashtag(text: String): Boolean {
    return text.startsWith("#")
}

fun doubleNumber(numText: String): String {
    return (numText.trim().toInt() * 2).toString()
}

fun card(name: String, role: String): String {
    return """
        Name: $name
        Role: $role
    """.trimIndent()
}
`,

  notes: `
<table>
  <tr><th>Task</th><th>C++</th><th>Kotlin</th></tr>
  <tr><td>Interpolate</td><td><code>"Hi " + name</code> / <code>std::format</code></td><td><code>"$x"</code> / <code>"\${x.y}"</code></td></tr>
  <tr><td>Case</td><td><code>std::transform(..., ::toupper)</code></td><td><code>uppercase()</code></td></tr>
  <tr><td>Split &amp; join</td><td>manual loop + <code>std::stringstream</code></td><td><code>s.split(",").joinToString("-")</code></td></tr>
  <tr><td>Substring</td><td><code>s.substr(0, 5)</code></td><td><code>s.substring(0, 5)</code></td></tr>
  <tr><td>Contains</td><td><code>s.find(x) != std::string::npos</code></td><td><code>s.contains(x)</code></td></tr>
  <tr><td>Parse int</td><td><code>std::stoi(s)</code></td><td><code>s.toInt()</code></td></tr>
  <tr><td>Raw / multi-line</td><td><code>R"(line1\nline2)"</code></td><td><code>"""line1\nline2"""</code></td></tr>
</table>
<p>One sharp edge for C++ refugees: <code>"42".toInt()</code>
<em>throws</em> on bad input, much like <code>std::stoi</code> throwing
<code>std::invalid_argument</code> — reach for
<code>toIntOrNull()</code> when the text might not be a number, since there's no
silent zero-and-move-on the way <code>atoi</code> behaves. And unlike having to
overload <code>operator&lt;&lt;</code> or write a helper for every type, Kotlin's
<code>x.toString()</code> is a method on every value, so <code>42.toString()</code>
and <code>listOf(1).toString()</code> both just work — no stream plumbing required.
Prefer <code>joinToString</code> whenever you're turning a collection
back into text — it takes optional <code>prefix</code>, <code>postfix</code>, and
per-element <code>transform</code> arguments that cover most formatting needs.</p>`,
