<script>
const LESSON = {
  number: 13,
  title: "Equality & Truthiness",

  intro: `
<p>Rust's <code>==</code> only exists between values that implement
<code>PartialEq</code> for the <em>same</em> type — the compiler refuses to
compare an <code>i32</code> to a <code>String</code>, and there is no such
thing as a "falsy" value; only <code>bool</code> can appear where a condition
is expected. JavaScript throws that discipline away. This lesson is about the
runtime rules behind comparison and truthiness: what <code>==</code> actually
does, which values are <em>falsy</em>, and how <code>??</code>, <code>||</code>,
<code>&amp;&amp;</code>, and <code>?.</code> short-circuit.</p>
<table>
  <tr><th>Rust</th><th>JavaScript (runtime)</th></tr>
  <tr><td><code>a == b</code> (same type, via <code>PartialEq</code>)</td><td><code>a === b</code> — no coercion, checked live</td></tr>
  <tr><td>no coercing equality operator</td><td><code>a == b</code> — coerces operands first</td></tr>
  <tr><td><code>x.unwrap_or(d)</code> on <code>Option&lt;T&gt;</code></td><td><code>x ?? d</code> — only <code>null</code>/<code>undefined</code> fall through</td></tr>
  <tr><td>no truthiness-based fallback</td><td><code>x || d</code> — every falsy value falls through</td></tr>
  <tr><td><code>opt.map(|o| o.prop)</code> on <code>Option&lt;T&gt;</code></td><td><code>obj?.prop</code> — short-circuits to <code>undefined</code></td></tr>
</table>
<p>The key insight: <code>||</code> reacts to <em>truthiness</em>, while
<code>??</code> reacts only to <em>nullishness</em>. The eight falsy values are
<code>false</code>, <code>0</code>, <code>-0</code>, <code>0n</code>,
<code>""</code>, <code>null</code>, <code>undefined</code>, and
<code>NaN</code>. Everything else — including <code>"0"</code>,
<code>[]</code>, and <code>{}</code> — is truthy.</p>`,

  rust: `fn classify<T>(x: Option<T>) -> &'static str {
    match x {
        None => "nullish",
        Some(_) => "truthy", // Rust has no separate "falsy" concept
    }
}

fn with_default(value: Option<i32>, fallback: i32) -> i32 {
    value.unwrap_or(fallback)
}

fn loose_eq<T: PartialEq>(a: T, b: T) -> bool {
    a == b // same type required, no coercion
}`,

  task: `
<p>Write four pure functions that expose the runtime comparison rules:</p>
<ol>
  <li><code>classify(x)</code> — return <code>"nullish"</code> if <code>x</code>
      is <code>null</code> or <code>undefined</code>, else <code>"falsy"</code>
      for any other falsy value, else <code>"truthy"</code>.</li>
  <li><code>looseEq(a, b)</code> — return the result of the coercing
      <code>==</code> comparison (not <code>===</code>).</li>
  <li><code>withDefault(value, fallback)</code> — return <code>value</code>
      unless it is <code>null</code>/<code>undefined</code>, in which case return
      <code>fallback</code>. Use <code>??</code> so <code>0</code> and
      <code>""</code> are kept.</li>
  <li><code>cityOf(user)</code> — safely read
      <code>user.address.city</code> using optional chaining, returning
      <code>"unknown"</code> when any link is missing.</li>
</ol>`,

  starter: `// 1. classify(x) -> "nullish" | "falsy" | "truthy"
function classify(x) {
  // TODO
  return "";
}

// 2. looseEq(a, b) -> result of == (coercing) comparison
function looseEq(a, b) {
  // TODO
  return false;
}

// 3. withDefault(value, fallback) -> value unless nullish (use ??)
function withDefault(value, fallback) {
  // TODO
  return fallback;
}

// 4. cityOf(user) -> user.address.city, or "unknown" if missing (use ?.)
function cityOf(user) {
  // TODO
  return "unknown";
}
`,

  exportNames: ["classify", "looseEq", "withDefault", "cityOf"],

  requirements: [
    { pattern: /\?\?/, message: "Use the nullish coalescing operator ?? in withDefault" },
    { pattern: /\?\./, message: "Use optional chaining ?. in cityOf" },
    { pattern: /[^=!<>]==[^=]/, message: "Use the loose (coercing) == operator in looseEq" },
  ],

  tests: [
    { name: 'classify(null) is "nullish"', run: (x) => expectEqual(x.classify(null), "nullish") },
    { name: 'classify(undefined) is "nullish"', run: (x) => expectEqual(x.classify(undefined), "nullish") },
    { name: 'classify(0) is "falsy"', run: (x) => expectEqual(x.classify(0), "falsy") },
    { name: 'classify("") is "falsy"', run: (x) => expectEqual(x.classify(""), "falsy") },
    { name: 'classify("0") is "truthy"', run: (x) => expectEqual(x.classify("0"), "truthy") },
    { name: 'classify([]) is "truthy"', run: (x) => expectEqual(x.classify([]), "truthy") },
    { name: "looseEq(0, false) is true", run: (x) => expectEqual(x.looseEq(0, false), true) },
    { name: 'looseEq("1", 1) is true', run: (x) => expectEqual(x.looseEq("1", 1), true) },
    { name: "looseEq(null, undefined) is true", run: (x) => expectEqual(x.looseEq(null, undefined), true) },
    { name: "withDefault keeps 0", run: (x) => expectEqual(x.withDefault(0, 99), 0) },
    { name: "withDefault replaces null", run: (x) => expectEqual(x.withDefault(null, 99), 99) },
    { name: "withDefault replaces undefined", run: (x) => expectEqual(x.withDefault(undefined, 99), 99) },
    { name: "cityOf reads nested city", run: (x) => expectEqual(x.cityOf({ address: { city: "Paris" } }), "Paris") },
    { name: 'cityOf returns "unknown" when address missing', run: (x) => expectEqual(x.cityOf({}), "unknown") },
    { name: 'cityOf returns "unknown" for null user', run: (x) => expectEqual(x.cityOf(null), "unknown") },
  ],

  solution: `function classify(x) {
  if (x === null || x === undefined) return "nullish";
  return x ? "truthy" : "falsy";
}

function looseEq(a, b) {
  return a == b;
}

function withDefault(value, fallback) {
  return value ?? fallback;
}

function cityOf(user) {
  return user?.address?.city ?? "unknown";
}
`,

  notes: `
<table>
  <tr><th>Expression</th><th>Result</th><th>Why</th></tr>
  <tr><td><code>0 == false</code></td><td><code>true</code></td><td><code>==</code> coerces both to numbers</td></tr>
  <tr><td><code>0 === false</code></td><td><code>false</code></td><td><code>===</code> compares type + value</td></tr>
  <tr><td><code>0 || "d"</code></td><td><code>"d"</code></td><td><code>0</code> is falsy</td></tr>
  <tr><td><code>0 ?? "d"</code></td><td><code>0</code></td><td><code>0</code> is not nullish</td></tr>
  <tr><td><code>a?.b</code> when <code>a</code> is null</td><td><code>undefined</code></td><td>short-circuits, no throw</td></tr>
</table>
<p><code>&amp;&amp;</code> and <code>||</code> do not return booleans — they
return one of their <em>operands</em>. <code>a && b</code> yields <code>a</code>
if <code>a</code> is falsy, otherwise <code>b</code>; <code>a || b</code> yields
<code>a</code> if <code>a</code> is truthy, otherwise <code>b</code>. That is why
<code>user?.address?.city ?? "unknown"</code> is the idiomatic runtime pattern:
optional chaining collapses a missing link to <code>undefined</code>, and
<code>??</code> supplies the default only for that nullish case — leaving a
genuine empty string or <code>0</code> intact, which <code>||</code> would have
clobbered. Rust's <code>Option&lt;T&gt;</code> and <code>?</code> operator
enforce this distinction statically instead of relying on runtime coercion
rules.</p>`,
};
