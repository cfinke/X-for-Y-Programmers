const LESSON = {
  number: 20,
  title: "Capstone",

  intro: `
<p>Time to put it together. This capstone is a tiny in-memory <em>task store</em>
that leans on almost everything this course has covered: a <strong>class</strong>
to hold state and behavior, <strong>array-iteration methods</strong>
(<code>find</code>, <code>filter</code>, <code>reduce</code>) to query and
aggregate, and <strong>custom errors</strong> to refuse bad input. The shape is
familiar from Rust — a struct with methods, an iterator search that can come up
empty, a validation step that rejects bad input — but the guarantees are gone.
The point is to feel how it behaves once there is no compiler and the only thing
standing between a caller and a corrupt store is the code <em>you</em> wrote.</p>
<table>
  <tr><th>Rust</th><th>JavaScript</th></tr>
  <tr><td><code>struct Task { id: u32, done: bool }</code></td><td>a plain object shaped however you build it</td></tr>
  <tr><td><code>tasks: Vec&lt;Task&gt;</code> — element type enforced</td><td><code>this.tasks = []</code> — holds anything you push</td></tr>
  <tr><td>compiler rejects <code>add(42)</code> (expected <code>&amp;str</code>, found integer)</td><td>you must <code>throw</code> to reject it</td></tr>
  <tr><td><code>fn get(&amp;self, id: u32) -&gt; Option&lt;&amp;Task&gt;</code> can't be used without unwrapping</td><td><code>find</code> returns <code>undefined</code>; guard it</td></tr>
</table>
<p>In Rust, a lookup that might miss returns <code>Option&lt;&amp;Task&gt;</code>,
and the compiler refuses to let you call <code>.done</code> on it until you
<code>match</code>, <code>if let</code>, or <code>unwrap</code> your way past the
<code>None</code> case. At runtime that <code>Option</code> does not exist:
<code>find</code> hands back a task or <code>undefined</code>, and if you forget
to check, the very next property access throws a <code>TypeError</code>. The
runtime discipline is to <em>make the miss explicit</em> — detect it and throw a
meaningful error instead of letting a cryptic one leak out later.</p>`,

  rust: `use std::fmt;

#[derive(Debug)]
struct ValidationError(String);
#[derive(Debug)]
struct NotFoundError(String);

impl fmt::Display for ValidationError {
    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {
        write!(f, "{}", self.0)
    }
}
impl fmt::Display for NotFoundError {
    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {
        write!(f, "{}", self.0)
    }
}

#[derive(Clone)]
struct Task {
    id: u32,
    title: String,
    priority: u32,
    done: bool,
}

struct Summary {
    total: u32,
    done: u32,
    pending: u32,
}

struct TaskStore {
    tasks: Vec<Task>,
    next_id: u32,
}

impl TaskStore {
    fn new() -> Self {
        TaskStore { tasks: Vec::new(), next_id: 1 }
    }

    // Rust has no default parameters; callers pass priority explicitly.
    fn add(&mut self, title: &str, priority: u32) -> Result<Task, ValidationError> {
        if title.trim().is_empty() {
            return Err(ValidationError("title required".to_string()));
        }
        let task = Task { id: self.next_id, title: title.to_string(), priority, done: false };
        self.next_id += 1;
        self.tasks.push(task.clone());
        Ok(task)
    }

    fn get(&self, id: u32) -> Result<&Task, NotFoundError> {
        self.tasks.iter().find(|t| t.id == id)
            .ok_or_else(|| NotFoundError(format!("no task {}", id)))
    }

    fn complete(&mut self, id: u32) -> Result<&Task, NotFoundError> {
        let task = self.tasks.iter_mut().find(|t| t.id == id)
            .ok_or_else(|| NotFoundError(format!("no task {}", id)))?;
        task.done = true;
        Ok(task)
    }

    fn pending(&self) -> Vec<&Task> {
        self.tasks.iter().filter(|t| !t.done).collect()
    }

    fn summary(&self) -> Summary {
        self.tasks.iter().fold(
            Summary { total: 0, done: 0, pending: 0 },
            |acc, t| Summary {
                total: acc.total + 1,
                done: acc.done + if t.done { 1 } else { 0 },
                pending: acc.pending + if t.done { 0 } else { 1 },
            },
        )
    }
}`,

  task: `
<p>Build the plain-JavaScript version of the same store. Define two error
classes and one <code>TaskStore</code> class.</p>
<ol>
  <li>Define <code>ValidationError</code> and <code>NotFoundError</code>, each a
      subclass of <code>Error</code> whose constructor calls
      <code>super(message)</code> and sets <code>this.name</code> to its own
      class name.</li>
  <li><code>TaskStore</code>'s constructor sets <code>this.tasks = []</code> and
      <code>this.nextId = 1</code>.</li>
  <li><code>add(title, priority = 1)</code>: if <code>title</code> is not a
      string or is empty/whitespace, throw a <code>ValidationError</code>.
      Otherwise create <code>{ id, title, priority, done: false }</code> using
      the next id (which then increments), push it, and return it.</li>
  <li><code>get(id)</code>: use <code>find</code> to locate the task; if there is
      none, throw a <code>NotFoundError</code>. Otherwise return it.</li>
  <li><code>complete(id)</code>: look the task up with <code>get</code>, set

  <li><code>pending()</code>: return a <code>filter</code>ed array of the
      not-done tasks.</li>
  <li><code>summary()</code>: use <code>reduce</code> to return
      <code>{ total, done, pending }</code> counts.</li>
</ol>`,

  exportNames: ["TaskStore", "ValidationError", "NotFoundError"],

  requirements: [
    { pattern: /class\s+TaskStore/, message: "Define a TaskStore class" },
    { pattern: /class\s+\w*Error\s+extends\s+Error/, message: "Define a custom Error subclass" },
    { pattern: /\.(find|filter|reduce)\s*\(/, message: "Use array-iteration methods (find/filter/reduce)" },
    { pattern: /throw\s+new/, message: "Throw a custom error on bad input or a missing task" },
  ],

  tests: [
    { name: "add returns a task with id 1, not done", run: (x) => {
        const store = new x.TaskStore();
        expectDeepEqual(store.add("Write", 2), { id: 1, title: "Write", priority: 2, done: false });
      } },
    { name: "ids auto-increment across adds", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        expectEqual(store.add("b").id, 2);
      } },
    { name: "add with an empty title throws ValidationError", run: (x) => {
        const store = new x.TaskStore();
        try { store.add("   "); } catch (e) { expectTruthy(e instanceof x.ValidationError); return; }
        throw new Error("expected add('   ') to throw");
      } },
    { name: "get throws NotFoundError for a missing id", run: (x) => {
        const store = new x.TaskStore();
        try { store.get(99); } catch (e) { expectTruthy(e instanceof x.NotFoundError); return; }
        throw new Error("expected get(99) to throw");
      } },
    { name: "complete marks a task done", run: (x) => {
        const store = new x.TaskStore();
        const t = store.add("ship");
        expectEqual(store.complete(t.id).done, true);
      } },
    { name: "pending excludes completed tasks", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        const b = store.add("b");
        store.complete(b.id);
        expectDeepEqual(store.pending().map((t) => t.title), ["a"]);
      } },
    { name: "summary counts total/done/pending", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        store.add("b");
        store.complete(store.add("c").id);
        expectDeepEqual(store.summary(), { total: 3, done: 1, pending: 2 });
      } },
    { name: "custom errors carry a name, message, and stack", run: (x) => {
        const err = new x.NotFoundError("nope");
        expectTruthy(err instanceof x.NotFoundError);
        expectEqual(err.name, "NotFoundError");
        expectEqual(err.message, "nope");
        expectTruthy(typeof err.stack === "string");
      } },
  ],

  solution: `class ValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = "ValidationError";
  }
}

class NotFoundError extends Error {
  constructor(message) {
    super(message);
    this.name = "NotFoundError";
  }
}

class TaskStore {
  constructor() {
    this.tasks = [];
    this.nextId = 1;
  }

  add(title, priority = 1) {
    if (typeof title !== "string" || title.trim() === "") {
      throw new ValidationError("title must be a non-empty string");
    }
    const task = { id: this.nextId++, title, priority, done: false };
    this.tasks.push(task);
    return task;
  }

  get(id) {
    const task = this.tasks.find((t) => t.id === id);
    if (!task) {
      throw new NotFoundError("no task with id " + id);
    }
    return task;
  }

  complete(id) {
    const task = this.get(id);
    task.done = true;
    return task;
  }

  pending() {
    return this.tasks.filter((t) => !t.done);
  }

  summary() {
    return this.tasks.reduce(
      (acc, t) => {
        acc.total += 1;
        if (t.done) acc.done += 1;
        else acc.pending += 1;
        return acc;
      },
      { total: 0, done: 0, pending: 0 }
    );
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>JavaScript</th></tr>
  <tr><td>Task shape</td><td><code>struct Task</code> enforced</td><td>whatever object you construct</td></tr>
  <tr><td>Bad input type</td><td>rejected at compile time</td><td>rejected only if you <code>throw</code></td></tr>
  <tr><td>Missing lookup</td><td><code>Option&lt;&amp;Task&gt;</code> forces a check</td><td><code>find</code> returns <code>undefined</code> silently</td></tr>
  <tr><td>Aggregate</td><td><code>fold</code> with a typed accumulator</td><td><code>reduce</code> with a seed object</td></tr>
</table>
<p>The lesson of the whole course lives in one line: <code>this.tasks.find(...)</code>
returns a task <em>or</em> <code>undefined</code>, and the runtime will not stop
you from reading <code>.done</code> off <code>undefined</code>. The
<code>if (!task) throw</code> guard is you doing, by hand, the check that Rust's
<code>Option&lt;&amp;Task&gt;</code> forces at compile time through
<code>match</code>, <code>if let</code>, or <code>?</code>. Every place Rust's
type system inserted a check, JavaScript runtime code has to earn it.</p>
<p>Two other habits carried through here. Custom <code>Error</code> subclasses
let callers tell <em>why</em> something failed with <code>instanceof</code>
instead of matching on an error variant — but only because each constructor sets
<code>this.name</code>. And the array methods (<code>find</code>,
<code>filter</code>, <code>reduce</code>) stayed the workhorses: they read the
same as Rust's iterator adapters (<code>find</code>, <code>filter</code>,
<code>fold</code>), they just no longer promise anything about what the elements
are, and there is no <code>Option</code> or <code>Result</code> wrapping the
outcome. That promise is now your job.</p>`,
};
