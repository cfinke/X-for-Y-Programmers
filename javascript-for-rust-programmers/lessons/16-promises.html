const LESSON = {
  number: 16,
  title: "Promises",

  intro: `
<p>In Rust an <code>async fn</code> returns something implementing
<code>Future&lt;Output = T&gt;</code>, and the compiler checks that <code>T</code>
end to end — you can't <code>.await</code> a <code>Future&lt;Output = i32&gt;</code>
and get a <code>String</code> back. A JavaScript Promise has no such contract. It
is just an object with a settled state (<em>pending</em>, <em>fulfilled</em>, or
<em>rejected</em>) and a value, and nothing checks that the value matches
anything; <code>then</code> hands you whatever the previous step actually
produced.</p>
<table>
  <tr><th>Rust</th><th>JavaScript</th></tr>
  <tr><td><code>async { 1 }</code> — a <code>Future&lt;Output = i32&gt;</code></td><td><code>Promise.resolve(1)</code> — value is just <code>1</code></td></tr>
  <tr><td><code>.await</code> — unwraps a <code>Future&lt;Output = i32&gt;</code></td><td><code>.then((n) =&gt; ...)</code> — <code>n</code> is whatever came through</td></tr>
  <tr><td>errors are <code>Result&lt;T, E&gt;</code>, <code>E</code> checked at compile time</td><td>reject with anything; <code>catch</code> receives it as-is</td></tr>
  <tr><td><code>join!(a, b): (A, B)</code>, tuple types known statically</td><td><code>Promise.all([...])</code> resolves to a plain array</td></tr>
</table>
<p>Two runtime facts the type system hid from you. First, <code>then</code> always
returns a <em>new</em> Promise, and if your callback returns a value that value
becomes the next Promise's fulfillment — returning a Promise flattens it, there
is no "Promise of a Promise," the way an <code>async fn</code> in Rust can never
return a bare <code>Future</code> without it being flattened by <code>.await</code>.
Second, a <code>throw</code> inside a <code>then</code> callback turns into a
rejection of the returned Promise, which is why <code>catch</code> can sit at the
end of a chain and catch anything above it — there's no <code>?</code> operator
doing that propagation for you; JavaScript wires it up implicitly.</p>`,

  rust: `use std::future::Future;

async fn double(n: i32) -> i32 {
    n * 2
}

async fn safe_divide(a: i32, b: i32) -> Result<i32, String> {
    if b == 0 {
        return Err("divide by zero".to_string());
    }
    Ok(a / b)
}

async fn first_done(tasks: Vec<impl Future<Output = i32>>) -> i32 {
    let (result, _index, _remaining) = futures::future::select_all(tasks).await;
    result
}`,

  task: `
<p>Everything here settles immediately — no timers. Build a few functions that
exercise the Promise API, the way you'd reach for <code>async fn</code> and
<code>Result</code> in Rust, but written as plain runtime JavaScript.</p>
<ol>
  <li><code>double(n)</code> — return a Promise that <strong>fulfills</strong> with
      <code>n * 2</code> (use <code>Promise.resolve</code>).</li>
  <li><code>safeDivide(a, b)</code> — return a Promise. If <code>b</code> is
      <code>0</code>, <strong>reject</strong> with <code>new Error("divide by zero")</code>
      (use <code>Promise.reject</code>); otherwise resolve with <code>a / b</code>.</li>
  <li><code>chainDouble(n)</code> — call <code>double(n)</code> and use
      <code>.then(...)</code> to return a Promise that fulfills with the doubled
      value <em>plus 1</em>.</li>
  <li><code>divideOrDefault(a, b, fallback)</code> — call <code>safeDivide</code>
      and use <code>.catch(...)</code> so that on rejection it fulfills with
      <code>fallback</code> instead.</li>
  <li><code>sumAll(promises)</code> — use <code>Promise.all</code> to wait for an
      array of number-promises, then resolve with their sum.</li>
  <li><code>describeSettled(promises)</code> — use <code>Promise.allSettled</code>
      and resolve with an array of strings: <code>"ok:&lt;value&gt;"</code> for each
      fulfilled entry and <code>"err:&lt;message&gt;"</code> for each rejected one.</li>
</ol>`,

  starter: `// 1. double(n) -> Promise fulfilling with n * 2

  // TODO: use Promise.resolve
}

}

// 3. chainDouble(n) -> double(n) then + 1
function chainDouble(n) {
  // TODO: use .then
}

// 4. divideOrDefault(a, b, fallback) -> safeDivide, .catch -> fallback
function divideOrDefault(a, b, fallback) {
  // TODO: use .catch
}

// 5. sumAll(promises) -> Promise of the sum
function sumAll(promises) {
  // TODO: use Promise.all
}

// 6. describeSettled(promises) -> ["ok:<value>" | "err:<message>", ...]

  // TODO: use Promise.allSettled

`,

  exportNames: ["double", "safeDivide", "chainDouble", "divideOrDefault", "sumAll", "describeSettled"],

  requirements: [
    { pattern: /Promise\.resolve/, message: "Use Promise.resolve" },
    { pattern: /Promise\.reject/, message: "Use Promise.reject for the divide-by-zero case" },
    { pattern: /\.then\s*\(/, message: "Use .then to chain in chainDouble" },
    { pattern: /\.catch\s*\(/, message: "Use .catch in divideOrDefault" },
    { pattern: /Promise\.all\b/, message: "Use Promise.all in sumAll" },
    { pattern: /Promise\.allSettled/, message: "Use Promise.allSettled in describeSettled" },
  ],

  tests: [
    { name: "double(21) fulfills with 42", run: async (x) => expectEqual(await x.double(21), 42) },
    { name: "safeDivide(10, 2) fulfills with 5", run: async (x) => expectEqual(await x.safeDivide(10, 2), 5) },
    {
      name: "safeDivide(1, 0) rejects with the right message",
      run: async (x) => {
        let msg = null;
        await x.safeDivide(1, 0).catch((e) => { msg = e.message; });
        expectEqual(msg, "divide by zero");
      },
    },
    { name: "chainDouble(20) fulfills with 41", run: async (x) => expectEqual(await x.chainDouble(20), 41) },
    { name: "divideOrDefault(8, 2, -1) fulfills with 4", run: async (x) => expectEqual(await x.divideOrDefault(8, 2, -1), 4) },
    { name: "divideOrDefault(8, 0, -1) falls back to -1", run: async (x) => expectEqual(await x.divideOrDefault(8, 0, -1), -1) },
    {
      name: "sumAll resolves the total",
      run: async (x) => expectEqual(await x.sumAll([Promise.resolve(1), Promise.resolve(2), Promise.resolve(3)]), 6),
    },
    {
      name: "describeSettled reports ok and err entries",
      run: async (x) => expectDeepEqual(
        await x.describeSettled([Promise.resolve(7), Promise.reject(new Error("nope"))]),
        ["ok:7", "err:nope"]
      ),
    },
  ],

  solution: `function double(n) {
  return Promise.resolve(n * 2);
}

function safeDivide(a, b) {
  if (b === 0) return Promise.reject(new Error("divide by zero"));
  return Promise.resolve(a / b);
}

function chainDouble(n) {
  return double(n).then((d) => d + 1);
}

function divideOrDefault(a, b, fallback) {
  return safeDivide(a, b).catch(() => fallback);
}

function sumAll(promises) {
  return Promise.all(promises).then((values) => values.reduce((t, v) => t + v, 0));
}

function describeSettled(promises) {
  return Promise.allSettled(promises).then((results) =>
    results.map((r) =>
      r.status === "fulfilled" ? "ok:" + r.value : "err:" + r.reason.message
    )
  );
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Already-settled value</td><td><code>async { 1i32 }</code> — a ready <code>Future</code></td><td><code>Promise.resolve(1)</code></td></tr>
  <tr><td>Rejection value</td><td><code>Err(e)</code>, <code>e</code>'s type checked at compile time</td><td>whatever you rejected with</td></tr>
  <tr><td>Chaining</td><td><code>.await</code> chains, verified by the compiler at each step</td><td><code>then</code> returns a new Promise; returned values flatten</td></tr>
  <tr><td>Wait for all</td><td><code>join!(a, b)</code> / <code>try_join!</code> gives a typed tuple, short-circuits on first <code>Err</code></td><td>resolves to a plain array, rejects on first failure</td></tr>
  <tr><td>Wait for all, keep errors</td><td><code>join_all(...)</code> collecting into <code>Vec&lt;Result&lt;T, E&gt;&gt;</code></td><td>same shape, never rejects</td></tr>
  <tr><td>First to settle</td><td><code>select!</code> / <code>future::select</code></td><td>settles with the first result, win or lose</td></tr>
</table>
<p>Reach for <code>Promise.all</code> when you need every result and one failure
should sink the whole thing — the JavaScript analogue of Rust's
<code>try_join!</code>; reach for <code>Promise.allSettled</code> when you want
to inspect each outcome, the way you'd collect a <code>Vec&lt;Result&lt;T, E&gt;&gt;</code>
instead of short-circuiting. Its result objects are <code>{ status: "fulfilled",
value }</code> or <code>{ status: "rejected", reason }</code>.
<code>Promise.race</code> settles as soon as the first input does, whether that
first one fulfills or rejects — like Rust's <code>select!</code>, except it
never cancels the losing branch.</p>
<p>Runtime gotcha the compiler would never let you ship in Rust: a Rust
<code>Future</code> does nothing until something polls it — building one is
inert. A JavaScript Promise starts running the moment it's created, so
<code>Promise.reject(x)</code> immediately becomes an already-rejected Promise,
and if nothing ever attaches a <code>catch</code> to it you get an "unhandled
rejection" warning at runtime — there's no <code>#[must_use]</code>-style
compile-time nudge forcing you to handle it. And because a thrown error inside
<code>then</code> becomes a rejection, a single trailing <code>.catch</code> (or
<code>try/await/catch</code>) covers the whole chain above it.</p>`,
};
