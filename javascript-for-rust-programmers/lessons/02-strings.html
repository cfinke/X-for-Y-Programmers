  number: 2,
  title: "Strings",

  intro: `
<p>Rust's <code>String</code>/<code>&str</code> split — owned, growable heap
data versus a borrowed view into it — has no equivalent in JavaScript. There is
only one string type, it behaves like <code>&str</code> in that it's UTF-16
and immutable, but you never own, borrow, or clone it: assignment and function
calls just copy a reference, and the garbage collector handles the rest. There
is no borrow checker to satisfy and no <code>.to_string()</code> or
<code>.clone()</code> ceremony — you just pass the value around.</p>
<table>
  <tr><th>Rust</th><th>JavaScript</th></tr>
  <tr><td><code>let s: String = String::from("Ada");</code></td><td><code>const s = "Ada";</code></td></tr>
  <tr><td><code>let n: usize = s.len();</code></td><td><code>const n = s.length;</code></td></tr>
  <tr><td><code>&s[0..3]</code></td><td><code>s.slice(0, 3)</code></td></tr>
  <tr><td>byte length, panics on non-char-boundary slices</td><td><code>.length</code> counts UTF-16 code units; <code>.slice</code> never panics</td></tr>
</table>
<p>Two runtime facts worth keeping in mind. First, strings are immutable, same
as Rust's <code>&str</code>: <code>toUpperCase()</code>, <code>trim()</code>,
<code>replace()</code> and friends never mutate in place — they return a
brand-new string (there's no <code>String::push_str</code> equivalent), so you
must use the return value. Second, a template literal
(<code>\`hello \${name}\`</code>) calls <code>String()</code> on every
interpolated value automatically, unlike Rust's <code>format!</code>, which
requires every interpolated value to already implement <code>Display</code>;
JavaScript just coerces, so <code>\`\${null}\`</code> quietly becomes
<code>"null"</code>.</p>`,

  rust: `fn initials(full_name: &str) -> String {
    full_name
        .trim()
        .split(' ')
        .map(|part| part[0..1].to_uppercase())
        .collect()
}

fn slug(title: &str) -> String {
    let re = regex::Regex::new(r"\\s+").unwrap();
    re.replace_all(&title.trim().to_lowercase(), "-").into_owned()
}`,

  task: `
<p>Build a few small, pure string helpers — plain JavaScript, no annotations.
Each returns a new string (or number) and mutates nothing.</p>
<ol>
  <li><code>shout(text)</code> — trim the surrounding whitespace and return the
      result in UPPERCASE.</li>
  <li><code>initials(fullName)</code> — split the name on spaces and return the
      first letter of each part, uppercased and joined (e.g.
      <code>"ada lovelace"</code> &rarr; <code>"AL"</code>).</li>
  <li><code>slug(title)</code> — trim, lowercase, and replace every run of
      whitespace with a single hyphen (e.g. <code>"  Hello  World "</code>
      &rarr; <code>"hello-world"</code>).</li>
  <li><code>lastName(fullName)</code> — return everything after the last space
      using <code>indexOf</code>/<code>lastIndexOf</code> and <code>slice</code>.</li>
  <li><code>zeroPad(value, width)</code> — turn <code>value</code> into a string
      and left-pad it with <code>"0"</code> to at least <code>width</code>
      characters using <code>padStart</code>.</li>
  <li><code>mentions(text, needle)</code> — return <code>true</code> if
      <code>text</code> contains <code>needle</code>, case-insensitively.</li>
</ol>`,

`,

  exportNames: ["shout", "initials", "slug", "lastName", "zeroPad", "mentions"],

  requirements: [
    { pattern: /toUpperCase\s*\(/, message: "Use toUpperCase() to uppercase text" },
    { pattern: /toLowerCase\s*\(/, message: "Use toLowerCase() for case-insensitive work" },
    { pattern: /\.trim\s*\(/, message: "Use trim() to strip surrounding whitespace" },
    { pattern: /\.split\s*\(/, message: "Use split() to break a string into parts" },
    { pattern: /\.replace\s*\(/, message: "Use replace() to build the slug" },
    { pattern: /padStart\s*\(/, message: "Use padStart() in zeroPad" },
    { pattern: /\.includes\s*\(/, message: "Use includes() in mentions" },
  ],

  tests: [
    { name: 'shout("  hi  ") is "HI"', run: (x) => expectEqual(x.shout("  hi  "), "HI") },
    { name: 'shout("Hello, World") is "HELLO, WORLD"', run: (x) => expectEqual(x.shout("Hello, World"), "HELLO, WORLD") },
    { name: 'initials("ada lovelace") is "AL"', run: (x) => expectEqual(x.initials("ada lovelace"), "AL") },
    { name: 'initials("Grace Brewster Hopper") is "GBH"', run: (x) => expectEqual(x.initials("Grace Brewster Hopper"), "GBH") },
    { name: 'slug("  Hello  World ") is "hello-world"', run: (x) => expectEqual(x.slug("  Hello  World "), "hello-world") },
    { name: 'lastName("Ada Lovelace") is "Lovelace"', run: (x) => expectEqual(x.lastName("Ada Lovelace"), "Lovelace") },
    { name: 'lastName("Grace Brewster Hopper") is "Hopper"', run: (x) => expectEqual(x.lastName("Grace Brewster Hopper"), "Hopper") },
    { name: 'zeroPad(7, 3) is "007"', run: (x) => expectEqual(x.zeroPad(7, 3), "007") },
    { name: 'zeroPad(1234, 3) is "1234" (already wide enough)', run: (x) => expectEqual(x.zeroPad(1234, 3), "1234") },
    { name: 'mentions("Hello World", "world") is true', run: (x) => expectTruthy(x.mentions("Hello World", "world")) },
    { name: 'mentions("Hello World", "xyz") is false', run: (x) => expectEqual(x.mentions("Hello World", "xyz"), false) },
  ],

  solution: `function shout(text) {
  return text.trim().toUpperCase();
}

function initials(fullName) {
  return fullName
    .trim()
    .split(" ")
    .map((part) => part[0].toUpperCase())
    .join("");
}

function slug(title) {
  return title.trim().toLowerCase().replace(/\\s+/g, "-");
}

function lastName(fullName) {
  const trimmed = fullName.trim();
  const at = trimmed.lastIndexOf(" ");
  return at === -1 ? trimmed : trimmed.slice(at + 1);
}

function zeroPad(value, width) {
  return String(value).padStart(width, "0");
}

function mentions(text, needle) {
  return text.toLowerCase().includes(needle.toLowerCase());
}
`,

  notes: `
<table>
  <tr><th>Task</th><th>Rust instinct</th><th>JavaScript runtime</th></tr>
  <tr><td>Uppercase</td><td><code>s.to_uppercase() -> String</code></td><td><code>s.toUpperCase()</code> — new string</td></tr>
  <tr><td>Contains?</td><td><code>s.contains(x) -> bool</code></td><td><code>s.includes(x)</code> — case-sensitive</td></tr>
  <tr><td>Substring</td><td><code>&s[a..b]</code>, panics off a char boundary</td><td><code>s.slice(a, b)</code>, negatives count from end, never panics</td></tr>
  <tr><td>Split</td><td><code>s.split(sep) -> impl Iterator</code></td><td><code>s.split(sep)</code> — array of strings</td></tr>
  <tr><td>Pad</td><td><code>format!("{:0>width$}", s)</code></td><td><code>s.padStart(n, pad)</code> — no-op if already &ge; <code>n</code></td></tr>
</table>
<p>A few runtime details Rust's stricter API would have caught for you.
<code>indexOf</code> returns <code>-1</code> when the substring is missing —
not <code>None</code> the way <code>str::find</code> would — so guard for it
before slicing; nothing forces the check. <code>replace(str, ...)</code> only
replaces the <em>first</em> match, unlike Rust's <code>str::replace</code>
which replaces every match by default; use a regex with the <code>/g</code>
flag (or <code>replaceAll</code>) to replace everything in JavaScript. And
because strings are immutable — as in Rust — forgetting to assign the return
value of <code>trim()</code> or <code>replace()</code> is a classic bug: there
is no compiler warning you that the result is unused, the original string is
simply left unchanged.</p>`,
};
