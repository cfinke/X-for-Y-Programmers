  number: 11,
  title: "Interfaces",

  intro: `
<p>Kotlin interfaces will feel closer to Rust traits than you might expect.
Both are <strong>nominal</strong> — a type only counts as conforming when it
explicitly says so, with <code>impl Employee for Engineer</code> in Rust or
<code>class Engineer : Employee</code> in Kotlin. And both can carry
<strong>default method bodies</strong>: Rust traits have supported that since
1.0, so a Kotlin interface with a <code>fun f() = …</code> body isn't a new
trick. What Kotlin adds is a dedicated <strong>property</strong> syntax inside
the interface itself — <code>val name: String</code> as an abstract member,
and <code>val totalPay: Double get() = …</code> as one with a default body —
where Rust has only methods, so the equivalent is a zero-argument function
like <code>fn name(&self) -> &str</code>.</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>trait Shape { fn area(&self) -> f64; }</code></td><td><code>interface Shape { fun area(): Double }</code></td></tr>
  <tr><td>nominal: <code>impl Shape for C</code> required</td><td>nominal: <code>class C : Shape</code></td></tr>
  <tr><td>no property syntax: <code>fn name(&self) -> &str;</code></td><td><code>val name: String</code> (abstract)</td></tr>
  <tr><td><code>fn f(&self) -> T { … }</code> right in the trait</td><td><code>fun f() = …</code> right in the interface</td></tr>
  <tr><td><code>impl A for C {} impl B for C {}</code> (separate blocks)</td><td><code>class C : A, B</code></td></tr>
</table>
<p>Because a Kotlin interface can hold behaviour, you can declare an abstract
<code>val</code>, a <code>val</code> with a default <code>get()</code>, and a
<code>fun</code> with a default body all in one place — then have each class
<code>override</code> only what it needs. And, as in Rust, you should
<strong>program to the interface type</strong>: type your parameters and
variables as <code>Employee</code>, not <code>Engineer</code>, much as Rust
code takes <code>&dyn Employee</code> or an <code>impl Employee</code> bound
instead of a concrete struct.</p>`,

  rust: `trait Employee {
    fn name(&self) -> &str;
    fn base_salary(&self) -> f64;
    fn bonus(&self) -> f64;

    // Rust traits CAN hold default logic, just like Kotlin interfaces.
    fn total_pay(&self) -> f64 {
        self.base_salary() + self.bonus()
    }
    fn summary(&self) -> String {
        format!("{} earns {}", self.name(), self.total_pay())
    }
}

struct Engineer {
    name: String,
    base_salary: f64,
}

impl Employee for Engineer {
    fn name(&self) -> &str { &self.name }
    fn base_salary(&self) -> f64 { self.base_salary }
    fn bonus(&self) -> f64 { self.base_salary * 0.1 }
}

fn total_payroll(staff: &[Box<dyn Employee>]) -> f64 {
    staff.iter().fold(0.0, |sum, e| sum + e.base_salary() + e.bonus())
}`,

  task: `
<p>Build a small payroll model where the logic lives <em>in the interface</em>,
and the tests talk to everything through the interface type. No class or
<code>main</code> is needed — Kotlin allows top-level declarations.</p>
<ol>
  <li>Declare an <code>Employee</code> interface with two abstract properties
      <code>name: String</code> and <code>baseSalary: Double</code>, and an
      abstract method <code>fun bonus(): Double</code>.</li>
  <li>Give <code>Employee</code> a property <code>totalPay: Double</code> with a
      <strong>default getter</strong> returning
      <code>baseSalary + bonus()</code>, and a <strong>default method</strong>
      <code>fun summary(): String</code> returning
      <code>"$name earns $totalPay"</code>.</li>
  <li>Declare a second interface <code>Manager</code> with
      <code>fun teamSize(): Int</code>.</li>
  <li><code>class Engineer(name, baseSalary) : Employee</code> whose
      <code>bonus()</code> is 10% of <code>baseSalary</code>.</li>
  <li><code>class TeamLead(name, baseSalary, reports) : Employee, Manager</code>
      — <strong>implementing both interfaces</strong> — whose <code>bonus()</code>
      is <code>baseSalary * 0.2 + reports * 100.0</code> and whose
      <code>teamSize()</code> returns <code>reports</code>.</li>
  <li>Write <code>totalPayroll(staff: List&lt;Employee&gt;): Double</code> that
      sums <code>totalPay</code> across the list — programming to the interface.</li>
</ol>`,

  starter: `// 1 & 2. The Employee interface: abstract members, a default property getter,
//        and a default method. Fill in the two defaults.
interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = 0.0            // TODO: baseSalary + bonus()

    fun summary(): String = "" // TODO: "$name earns $totalPay"
}

// 3. A second interface.
interface Manager {
    fun teamSize(): Int
}

// 4. Engineer implements Employee.
class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = 0.0 // TODO: 10% of baseSalary
}

// 5. TeamLead implements BOTH Employee and Manager.
class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = 0.0 // TODO: baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = 0   // TODO: reports
}

// 6. Program to the interface type.
fun totalPayroll(staff: List<Employee>): Double = 0.0 // TODO
`,

  requirements: [
    { pattern: /interface\s+Employee\b/, message: "Declare an Employee interface" },
    { pattern: /fun\s+summary\s*\([^)]*\)\s*:\s*String\s*=/, message: "Give Employee a default summary() method with a body in the interface" },
    { pattern: /:\s*Employee\s*,\s*Manager/, message: "Have TeamLead implement both Employee and Manager" },
  ],

  tests: [
    { name: "Engineer.bonus() is 10% of base", code: "        expect_eq(Engineer(\"Ada\", 1000.0).bonus(), 100.0)" },
    { name: "totalPay via the Employee type uses the default getter", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.totalPay, 1100.0)" },
    { name: "default summary() reads \"Ada earns 1100.0\"", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.summary(), \"Ada earns 1100.0\")" },
    { name: "TeamLead satisfies Manager (teamSize)", code: "        val m: Manager = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(m.teamSize(), 3)" },
    { name: "TeamLead is also an Employee (totalPay)", code: "        val emp: Employee = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(emp.totalPay, 2700.0)" },
    { name: "totalPayroll sums via the interface", code: "        val staff: List<Employee> = listOf(Engineer(\"Ada\", 1000.0), TeamLead(\"Rob\", 2000.0, 3))\n        expect_eq(totalPayroll(staff), 3800.0)" },
  ],

  solution: `interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = baseSalary + bonus()

    fun summary(): String = "$name earns $totalPay"
}

interface Manager {
    fun teamSize(): Int
}

class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = baseSalary * 0.1
}

class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = reports
}

fun totalPayroll(staff: List<Employee>): Double = staff.sumOf { it.totalPay }
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Declare interface/trait</td><td><code>trait E { … }</code></td><td><code>interface E { … }</code></td></tr>
  <tr><td>Implement</td><td><code>impl E for C { … }</code></td><td><code>class C : E</code></td></tr>
  <tr><td>Multiple traits/interfaces</td><td><code>impl A for C {} impl B for C {}</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Abstract property</td><td><code>fn name(&self) -> &str;</code></td><td><code>val name: String</code></td></tr>
  <tr><td>Property with logic</td><td><code>fn p(&self) -> T { … }</code> (default method)</td><td><code>val p: T get() = …</code></td></tr>
  <tr><td>Default method body</td><td><code>fn f(&self) -> T { … }</code> (already supported)</td><td><code>fun f() = …</code> in the interface</td></tr>
  <tr><td>Override</td><td>re-declare in the <code>impl</code> block</td><td><code>override</code> keyword required</td></tr>
</table>
<p>Conformance here isn't a new idea coming from Rust: Rust already requires a
struct to say <code>impl Employee for Engineer</code>
before it counts as an <code>Employee</code>, exactly as nominal as Kotlin's
<code>class C : Employee</code>. What's new is that Kotlin gives properties
their own syntax inside the interface — <code>val totalPay: Double get() = …</code>
reads like plain field access at every call site, where Rust would spell the
same idea as an ordinary method, <code>fn total_pay(&self) -> f64</code>, with
parentheses at the call site. Kotlin also requires the <code>override</code>
keyword on every implementing member, similar to how Rust makes you redeclare
each trait method inside its <code>impl Trait for Type</code> block — both
catch typos that would otherwise silently create a brand-new member instead of
satisfying the contract. And just as Rust makes you disambiguate colliding
default methods from two traits with fully qualified syntax like
<code>&lt;Type as TraitA&gt;::method(&self)</code>, Kotlin makes you resolve
the same collision explicitly with <code>super&lt;A&gt;.f()</code>.</p>`,
};
