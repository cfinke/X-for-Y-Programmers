  title: "Objects & Companions",

  intro: `
<p>Rust gives you three separate tools for "one-of-a-kind" and "type-level"
code: a private <code>static</code> — usually wrapped in a
<code>Mutex</code> or <code>OnceLock</code> — for a singleton, associated
functions inside an <code>impl</code> block for members that hang off the type
rather than an instance, and a small unit struct with a trait <code>impl</code>
for a throwaway implementation. Kotlin folds all three under one keyword —
<code>object</code>.</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>static TALLY: Mutex&lt;Vec&lt;String&gt;&gt; = …</code> (module singleton)</td><td><code>object Tally { … }</code></td></tr>
  <tr><td><code>impl User { fn parse(…) }</code> (associated fn)</td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td><code>struct Polite; impl Greeter for Polite { … }</code></td><td><code>object : Greeter { … }</code></td></tr>
  <tr><td>private struct fields + public factory fn</td><td><code>class User private constructor(…)</code></td></tr>
</table>
<p>An <strong>object declaration</strong> (<code>object Name { … }</code>) is a
lazily-created singleton — there is exactly one instance and you reach it by its
name, without the ceremony of a <code>static</code> plus
<code>Mutex</code>/<code>OnceLock</code> that guarding mutable global state
manually requires in Rust. A <strong>companion object</strong> is a singleton
that lives inside a class, so its members read like Rust's associated
functions (<code>User::parse(…)</code>), and because it can see the class's
<code>private</code> constructor it is the idiomatic home for factory
functions. An <strong>object expression</strong> (<code>object : Greeter { …
}</code>) is an anonymous instance created on the spot; Rust has no true
anonymous type, so the closest equivalent is a tiny unit struct with a trait
<code>impl</code>, returned as <code>impl Greeter</code>.</p>`,

  rust: `// "Singleton": module-private static state behind a Mutex
mod tally {
    use std::sync::Mutex;
    static ITEMS: Mutex<Vec<String>> = Mutex::new(Vec::new());
    pub fn add(item: &str) { ITEMS.lock().unwrap().push(item.to_string()); }
    pub fn count() -> usize { ITEMS.lock().unwrap().len() }
}

trait Greeter { fn greet(&self, name: &str) -> String; }

// Associated ("static") factory + private fields
pub struct User { name: String, age: u32 }

impl User {
    pub const SPECIES: &str = "human";
    pub fn parse(text: &str) -> User {
        let mut parts = text.split(':');
        let name = parts.next().unwrap().to_string();
        let age: u32 = parts.next().unwrap().parse().unwrap();
        User { name, age }
    }
}

// A named type implementing the trait, returned as an anonymous-ish impl
struct PoliteGreeter;
impl Greeter for PoliteGreeter {
    fn greet(&self, name: &str) -> String {
        format!("Hello, {name}")
    }
}
fn polite_greeter() -> impl Greeter {
    PoliteGreeter
}`,

<ol>

  <li>Make <code>politeGreeter(): Greeter</code> return an

</ol>`,

  requirements: [
    { pattern: /\bobject\s+Tally\b/, message: "Declare Tally as an object (singleton) declaration" },
    { pattern: /\bcompanion\s+object\b/, message: "Use a companion object for User's factory and constant" },
    { pattern: /\bobject\s*:\s*Greeter\b/, message: "Return an object expression: object : Greeter { … }" },
  ],

  tests: [
    { name: "Tally is a singleton: state persists across calls", code: "        val start = Tally.count()\n        Tally.add(\"apples\")\n        Tally.add(\"pears\")\n        expect_eq(Tally.count(), start + 2)\n        expect_true(Tally.all().contains(\"apples\"))\n        expect_true(Tally.all().contains(\"pears\"))" },
    { name: "Tally.all() returns a copy, not the live list", code: "        val snapshot = Tally.all()\n        Tally.add(\"plums\")\n        expect_eq(snapshot.contains(\"plums\"), false)" },
    { name: "companion factory parses a user", code: "        val u = User.parse(\"Ada:36\")\n        expect_eq(u.name, \"Ada\")\n        expect_eq(u.age, 36)" },
    { name: "companion factory parses another user", code: "        expect_eq(User.parse(\"Rob:68\").age, 68)" },
    { name: "companion constant is reachable on the class", code: "        expect_eq(User.SPECIES, \"human\")" },
    { name: "object expression implements Greeter", code: "        expect_eq(politeGreeter().greet(\"Ada\"), \"Hello, Ada\")" },

  ],

  solution: `object Tally {
    private val items = mutableListOf<String>()

    fun add(item: String) {
        items.add(item)
    }

    fun count(): Int = items.size

    fun all(): List<String> = items.toList()
}

interface Greeter {
    fun greet(name: String): String
}

class User private constructor(val name: String, val age: Int) {
    companion object {
        const val SPECIES = "human"

        fun parse(text: String): User {
            val parts = text.split(":")
            return User(parts[0], parts[1].toInt())
        }
    }
}

fun politeGreeter(): Greeter = object : Greeter {
    override fun greet(name: String): String = "Hello, $name"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Singleton</td><td><code>static TALLY: Mutex&lt;Vec&lt;String&gt;&gt; = …</code></td><td><code>object Tally { … }</code></td></tr>
  <tr><td>Type-level member</td><td><code>impl User { fn parse(…) }</code></td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td>Type-level constant</td><td><code>impl User { const X: … }</code></td><td><code>const val X</code> (in companion)</td></tr>
  <tr><td>Private constructor</td><td>private struct fields + public factory fn</td><td><code>class C private constructor(…)</code></td></tr>
  <tr><td>Anonymous instance</td><td><code>struct P; impl Greeter for P { … }</code></td><td><code>object : Greeter { … }</code></td></tr>
</table>
<p>A companion object is <em>not</em> a bag of statics — it is a genuine
singleton object attached to the class, reachable as
<code>User.Companion</code>, and it can implement interfaces or hold state like
any other object. You get the <code>User.parse(…)</code> call syntax for free
because Kotlin lets you address companion members through the class name, the
same way Rust lets you call <code>User::parse(…)</code> on an associated
function. A <code>private constructor</code> plus a companion factory is the
standard way to force construction through a validated entry point — the same
discipline as keeping a Rust struct's fields private within its module and
exposing only a factory function as the public entry point.</p>
<p>One idiomatic wrinkle: Kotlin allows top-level functions, so you often do not
need a singleton at all — a plain <code>fun</code> or a top-level
<code>val</code> replaces many types you would have written as a module of free
functions in Rust. Reach for <code>object</code> when you specifically want a
single named instance that carries state or implements an interface — in Rust
terms, when a <code>static</code> behind a <code>Mutex</code>/<code>OnceLock</code>
plus a handful of free functions would otherwise be your only option.</p>`,
