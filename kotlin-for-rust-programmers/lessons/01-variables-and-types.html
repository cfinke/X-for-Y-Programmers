const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Kotlin will feel like home: static typing with inference, first-class
functions, and — like Rust — a serious approach to null safety. The
headline difference is <code>val</code> vs <code>var</code>: <code>val</code> is
a read-only binding (your default, immutable <code>let</code>) and is the
default you should reach for; <code>var</code> is for the rare genuine
reassignment (Rust's <code>let mut</code>).</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>let name = "Ada";</code></td><td><code>val name = "Ada"</code></td></tr>
  <tr><td><code>let mut age = 36;</code></td><td><code>var age = 36</code></td></tr>
  <tr><td><code>format!("{name} is {age}")</code></td><td><code>"$name is $age"</code></td></tr>
  <tr><td><code>x: i32</code></td><td><code>x: Int</code> / <code>x: Double</code></td></tr>
</table>
<p>The type still goes after the name with a colon, but you rarely write it —
Kotlin infers it from the initializer, just like Rust. String templates
use a bare <code>$name</code> (or <code>\${expr}</code> for a full expression)
instead of <code>format!</code>'s <code>{name}</code> placeholders. And every
value has a real type at runtime, reachable via
<code>value::class.simpleName</code> — unlike Rust, where type information is
erased after compilation.</p>`,

  rust: `let age: i32 = 36;
let user_name: String = String::from("Ada");

fn describe(name: &str, age: i32) -> String {
    format!("{name} is {age}")
}`,

  task: `
<p>Write the Kotlin version. Kotlin allows top-level declarations — no
<code>fn main</code> needed (that's added for you):</p>
<ol>
  <li>Declare <code>userName</code> with <code>val</code> = <code>"Ada"</code>
      and <code>userAge</code> with <code>var</code> = <code>36</code>.</li>
  <li>Write <code>describe(name: String, age: Int): String</code> that returns a
      string like <code>"Ada is 36"</code> using a string template.</li>
  <li>Write <code>typeName(value: Any): String</code> that returns the value's
      runtime type name — use <code>value::class.simpleName ?: "?"</code>.</li>
</ol>`,

  starter: `// 1. userName (val) and userAge (var) — replace the placeholder values
val userName = "" // TODO
var userAge = 0    // TODO


// 2. describe(name, age) -> "<name> is <age>"
fun describe(name: String, age: Int): String {
    return "" // TODO
}

// 3. typeName(value) -> the runtime type name, e.g. "Int"
fun typeName(value: Any): String {
    return "" // TODO
}
`,

  requirements: [
    { pattern: /\bval\s+userName/, message: "Declare userName with val" },
    { pattern: /\bvar\s+userAge/, message: "Declare userAge with var" },
    { pattern: /"\$name is \$age"/, message: "Build the string with a template: \"$name is $age\"" },
  ],

  tests: [
    { name: 'userName is "Ada"', code: "        expect_eq(userName, \"Ada\")" },
    { name: "userAge is 36", code: "        expect_eq(userAge, 36)" },
    { name: 'describe("Ada", 36) is "Ada is 36"', code: "        expect_eq(describe(\"Ada\", 36), \"Ada is 36\")" },
    { name: 'describe("Rob", 68) is "Rob is 68"', code: "        expect_eq(describe(\"Rob\", 68), \"Rob is 68\")" },
    { name: 'typeName(1) is "Int"', code: "        expect_eq(typeName(1), \"Int\")" },
    { name: 'typeName("a") is "String"', code: "        expect_eq(typeName(\"a\"), \"String\")" },
    { name: 'typeName(true) is "Boolean"', code: "        expect_eq(typeName(true), \"Boolean\")" },
  ],

  solution: `val userName = "Ada"
var userAge = 36

fun describe(name: String, age: Int): String {
    return "$name is $age"
}

fun typeName(value: Any): String {
    return value::class.simpleName ?: "?"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Read-only binding</td><td><code>let x = 1;</code></td><td><code>val x = 1</code></td></tr>
  <tr><td>Reassignable</td><td><code>let mut x = 1;</code></td><td><code>var x = 1</code></td></tr>
  <tr><td>Explicit type</td><td><code>let x: i32 = 1;</code></td><td><code>val x: Int = 1</code></td></tr>
  <tr><td>Template</td><td><code>format!("{x}")</code></td><td><code>"$x"</code> / <code>"\${x.foo}"</code></td></tr>
  <tr><td>Runtime type</td><td><code>std::any::type_name::&lt;T&gt;()</code></td><td><code>x::class.simpleName</code></td></tr>
</table>
<p>Kotlin splits numeric types much like Rust's <code>i32</code>,
<code>i64</code>, <code>f64</code>, and friends, and it will not silently mix
them — <code>1 / 2</code> is <code>0</code> (integer division), while
<code>1.0 / 2</code> is <code>0.5</code>, the same rule as Rust. Prefer
<code>val</code> everywhere you can; the compiler will tell you the moment you
actually need <code>var</code> — no borrow checker required, since Kotlin
uses garbage collection instead of Rust's ownership model.</p>`,
};
