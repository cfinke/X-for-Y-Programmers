const LESSON = {
  number: 6,
  title: "Null Safety",

  intro: `
<p>Kotlin bakes nullability into the type system, much like Rust's
<code>Option&lt;T&gt;</code>. A plain <code>String</code> can <em>never</em>
hold <code>null</code>; if a value might be absent you must say so with a
trailing <code>?</code> — <code>String?</code> is Kotlin's answer to Rust's
<code>Option&lt;String&gt;</code>. The compiler then forces you to deal with
the null before you can call anything on it.</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>Option&lt;String&gt;</code></td><td><code>String?</code></td></tr>
  <tr><td><code>user.map(|u| &amp;u.name)</code></td><td><code>user?.name</code></td></tr>
  <tr><td><code>name.unwrap_or("guest".into())</code></td><td><code>name ?: "guest"</code></td></tr>
  <tr><td><code>name.unwrap()</code></td><td><code>name!!</code></td></tr>
  <tr><td><code>if let Some(x) = x { x.f(); }</code></td><td><code>x?.let { it.f() }</code></td></tr>
</table>
<p>The tools are familiar, even though there's no wrapper type. Safe call
<code>?.</code> returns <code>null</code> instead of throwing when the
receiver is null (much like calling <code>.map()</code> on an
<code>Option</code>). The Elvis operator <code>?:</code> supplies a fallback
(Rust's <code>.unwrap_or(...)</code>). The non-null assertion <code>!!</code>
is the loud twin of Rust's <code>.unwrap()</code> — it throws a
<code>NullPointerException</code> if you are wrong, just as
<code>.unwrap()</code> panics on <code>None</code>, so reach for it rarely.
And <code>value?.let { ... }</code> runs a block only when the value is
non-null, binding it to <code>it</code> — the same shape as Rust's
<code>if let Some(v) = value { ... }</code>.</p>`,

  rust: `fn lookup_name(id: i32) -> Option<String> {
    if id == 1 { return Some("Ada".to_string()); }
    if id == 2 { return Some("Rob".to_string()); }
    None
}

let greeting = format!("Hello, {}", lookup_name(id).unwrap_or("stranger".to_string()));
let first_char = lookup_name(id).and_then(|s| s.chars().next());`,

  task: `
<p>Build a tiny name directory and handle the missing cases idiomatically. All
declarations are top-level (no class or <code>main</code> needed):</p>
<ol>
  <li>Write <code>lookupName(id: Int): String?</code> that returns
      <code>"Ada"</code> for <code>1</code>, <code>"Rob"</code> for <code>2</code>,
      and <code>null</code> otherwise.</li>
  <li>Write <code>greet(id: Int): String</code> that returns
      <code>"Hello, &lt;name&gt;"</code>, falling back to <code>"stranger"</code>
      with the Elvis operator <code>?:</code> when the name is null.</li>
  <li>Write <code>initial(id: Int): Char?</code> that returns the first character
      of the name using a safe call <code>?.</code> (so a missing name yields
      <code>null</code>).</li>
  <li>Write <code>shout(name: String?): String</code> that returns the uppercased
      name plus <code>"!"</code> using <code>name?.let { ... }</code>, or
      <code>"(silence)"</code> when <code>name</code> is null.</li>
</ol>`,

  starter: `// 1. lookupName(id) -> a name, or null if unknown
fun lookupName(id: Int): String? {
    return null // TODO
}

// 2. greet(id) -> "Hello, <name>", or "Hello, stranger" (use ?:)
fun greet(id: Int): String {
    return "" // TODO
}

// 3. initial(id) -> first char of the name, or null (use ?.)
fun initial(id: Int): Char? {
    return null // TODO
}

// 4. shout(name) -> "<NAME>!", or "(silence)" if null (use ?.let)
fun shout(name: String?): String {
    return "" // TODO
}
`,

  requirements: [
    { pattern: /\?:/, message: "Use the Elvis operator ?: to supply a fallback" },
    { pattern: /\?\./, message: "Use a safe call ?. on a nullable value" },
    { pattern: /\.let\s*\{/, message: "Use ?.let { ... } to handle the nullable name" },
  ],

  tests: [
    { name: 'lookupName(1) is "Ada"', code: "        expect_eq(lookupName(1), \"Ada\")" },
    { name: 'lookupName(2) is "Rob"', code: "        expect_eq(lookupName(2), \"Rob\")" },
    { name: "lookupName(9) is null", code: "        expect_eq(lookupName(9), null)" },
    { name: 'greet(1) is "Hello, Ada"', code: "        expect_eq(greet(1), \"Hello, Ada\")" },
    { name: 'greet(9) falls back to "stranger"', code: "        expect_eq(greet(9), \"Hello, stranger\")" },
    { name: "initial(2) is 'R'", code: "        expect_eq(initial(2), 'R')" },
    { name: "initial(9) is null", code: "        expect_eq(initial(9), null)" },
    { name: 'shout("hi") is "HI!"', code: "        expect_eq(shout(\"hi\"), \"HI!\")" },
    { name: 'shout(null) is "(silence)"', code: "        expect_eq(shout(null), \"(silence)\")" },
  ],

  solution: `fun lookupName(id: Int): String? {
    return when (id) {
        1 -> "Ada"
        2 -> "Rob"
        else -> null
    }
}

fun greet(id: Int): String {
    return "Hello, " + (lookupName(id) ?: "stranger")
}

fun initial(id: Int): Char? {
    return lookupName(id)?.first()
}

fun shout(name: String?): String {
    return name?.let { "\${it.uppercase()}!" } ?: "(silence)"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Nullable type</td><td><code>Option&lt;String&gt;</code></td><td><code>String?</code></td></tr>
  <tr><td>Safe call</td><td><code>x.map(|v| v.f())</code></td><td><code>x?.f()</code></td></tr>
  <tr><td>Fallback</td><td><code>x.unwrap_or(y)</code></td><td><code>x ?: y</code></td></tr>
  <tr><td>Assert non-null</td><td><code>x.unwrap()</code> (panics at runtime)</td><td><code>x!!</code> (throws at runtime)</td></tr>
  <tr><td>Run if non-null</td><td><code>if let Some(x) = x { f(x); }</code></td><td><code>x?.let { f(it) }</code></td></tr>
</table>
<p>The key mental shift from Rust: <code>Option&lt;T&gt;</code> is a distinct
wrapper type you must unwrap or pattern-match to get at the inner value, but
Kotlin's <code>String?</code> is still just a <code>String</code> at runtime —
nullability is tracked by the compiler, not by wrapping the value. And
<code>!!</code> is a real runtime check, much like Rust's
<code>.unwrap()</code>: if the value is null, <code>!!</code> throws
immediately, just as <code>.unwrap()</code> panics on <code>None</code> —
which is deliberate, so an "impossible" null fails loudly at the source
instead of leaking downstream. Prefer <code>?.</code>, <code>?:</code>, and
<code>?.let { }</code> for everyday handling — Kotlin's answers to
<code>.map()</code>, <code>.unwrap_or()</code>, and <code>if let</code> — and
save <code>!!</code> for the rare spot where you can prove non-null. Chaining
<code>?.</code> short-circuits the whole chain to <code>null</code> the
moment any link is null, exactly like chaining <code>.and_then()</code> calls
on an <code>Option</code> in Rust.</p>`,
};
