  number: 7,
  title: "Classes & Properties",

  intro: `
<p>Kotlin classes will feel familiar in spirit but foreign in shape: Rust
splits data (<code>struct</code>) from behavior (<code>impl</code>) and has no
constructor sugar, so you hand-write a <code>new</code> associated function.
Kotlin fuses all three. The star of the show is the <em>primary
constructor</em>: you declare a class's parameters right after its name, and
prefixing one with <code>val</code> or <code>var</code> turns it into a
property in the same breath. No <code>self.x = x</code> boilerplate, no
separate field declarations.</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>struct P { name: String }</code> + <code>impl</code></td><td><code>class P(val name: String)</code></td></tr>
  <tr><td>immutable field (no setter)</td><td><code>val</code> property</td></tr>
  <tr><td>field mutated via <code>&amp;mut self</code></td><td><code>var</code> property</td></tr>
  <tr><td><code>P::new("Ada")</code></td><td><code>P("Ada")</code> (no <code>new</code> keyword)</td></tr>
  <tr><td><code>fn x(&amp;self) -> T { … }</code></td><td><code>val x get() = …</code></td></tr>
</table>
<p>A <code>val</code> constructor parameter is a read-only property (Rust gets
this by simply exposing no setter method); a <code>var</code> parameter is
mutable, like a field you're willing to change through a <code>&amp;mut
self</code> method. Any setup logic that a primary constructor can't express
inline goes in an <code>init { }</code> block, which runs as part of
construction — Rust has no equivalent, since building a struct literal
<em>is</em> the whole construction step, so validation normally lives inside
your <code>new()</code> function instead (often panicking via
<code>assert!</code> or returning a <code>Result</code>). Computed properties
use <code>get()</code>, and a mutable property can intercept writes with
<code>set(value)</code> using the magic <code>field</code> backing identifier
— Rust has no property syntax at all, so the same job falls to plain methods
like <code>fn summary(&amp;self) -> String</code> and <code>fn set_note(&amp;mut
self, v: &amp;str)</code>.</p>`,

  rust: `struct BankAccount {
    owner: String,
    balance: i32,
    note: String,
}

impl BankAccount {
    fn new(owner: String, starting_balance: i32) -> Self {
        assert!(starting_balance >= 0, "negative");
        BankAccount { owner, balance: starting_balance, note: String::new() }
    }

    fn summary(&self) -> String {
        format!("{} has {}", self.owner, self.balance)
    }

    fn set_note(&mut self, value: &str) {
        self.note = value.trim().to_string();
    }

    fn note(&self) -> &str {
        &self.note
    }

    fn deposit(&mut self, amount: i32) {
        self.balance += amount;
    }

    fn withdraw(&mut self, amount: i32) -> bool {
        if amount > self.balance {
            return false;
        }
        self.balance -= amount;
        true
    }
}`,

  task: `
<p>Build a <code>BankAccount</code> class. No <code>class</code>-less top-level
tricks here — this lesson is about classes:</p>
<ol>
  <li>Give it a primary constructor <code>(val owner: String, startingBalance:
      Int)</code>. <code>owner</code> is a read-only property; use

  <li>Add an <code>init { }</code> block that calls

  <li>Add <code>deposit(amount)</code> (adds to <code>balance</code>) and
      <code>withdraw(amount): Boolean</code> (returns <code>false</code> if
      <code>amount &gt; balance</code>, otherwise subtracts and returns
      <code>true</code>).</li>
</ol>`,

}
`,

  requirements: [
    { pattern: /class\s+BankAccount\s*\(\s*val\s+owner/, message: "Declare owner as a val in the primary constructor" },
    { pattern: /\binit\s*\{/, message: "Use an init { } block to validate the starting balance" },
    { pattern: /\bget\(\)\s*=/, message: "Give summary a computed custom getter with get()" },
    { pattern: /\bset\(\s*\w+\s*\)/, message: "Give note a custom setter with set(value)" },
  ],

  tests: [
    { name: "owner is a read-only property", code: "        val a = BankAccount(\"Ada\", 100)\n        expect_eq(a.owner, \"Ada\")" },
    { name: "balance starts from the constructor argument", code: "        val a = BankAccount(\"Ada\", 100)\n        expect_eq(a.balance, 100)" },
    { name: "deposit adds to the balance", code: "        val a = BankAccount(\"Ada\", 100)\n        a.deposit(50)\n        expect_eq(a.balance, 150)" },
    { name: "withdraw subtracts and returns true", code: "        val a = BankAccount(\"Ada\", 100)\n        val ok = a.withdraw(40)\n        expect_true(ok)\n        expect_eq(a.balance, 60)" },
    { name: "withdraw fails when funds are insufficient", code: "        val a = BankAccount(\"Bo\", 20)\n        expect_true(!a.withdraw(100))\n        expect_eq(a.balance, 20)" },
    { name: "summary is a computed property", code: "        expect_eq(BankAccount(\"Ada\", 100).summary, \"Ada has 100\")" },
    { name: "note setter trims the value", code: "        val a = BankAccount(\"Cy\", 0)\n        a.note = \"  hello  \"\n        expect_eq(a.note, \"hello\")" },
  ],

  solution: `class BankAccount(val owner: String, startingBalance: Int) {
    var balance: Int = startingBalance
        private set

    var note: String = ""
        set(value) {
            field = value.trim()
        }

    init {
        require(startingBalance >= 0) { "starting balance cannot be negative" }
    }

    val summary: String
        get() = "$owner has $balance"

    fun deposit(amount: Int) {
        balance += amount
    }

    fun withdraw(amount: Int): Boolean {
        if (amount > balance) return false
        balance -= amount
        return true
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Property in constructor</td><td><code>struct C { name: String }</code> (no constructor sugar)</td><td><code>class C(val name: String)</code></td></tr>
  <tr><td>Read-only property</td><td>field with no setter method</td><td><code>val</code></td></tr>
  <tr><td>Mutable property</td><td>field mutated via <code>&amp;mut self</code></td><td><code>var</code></td></tr>
  <tr><td>Construction-time setup</td><td>validation inside <code>fn new() -> Self { … }</code></td><td><code>init { }</code></td></tr>
  <tr><td>Computed property</td><td><code>fn x(&amp;self) -> T { … }</code></td><td><code>val x get() = …</code></td></tr>
  <tr><td>Write interceptor</td><td><code>fn set_x(&amp;mut self, v: T)</code></td><td><code>set(value) { field = … }</code></td></tr>
  <tr><td>Read-only from outside</td><td>private field + public getter method</td><td><code>var x = 0; private set</code></td></tr>
</table>
<p>The <code>field</code> identifier inside a custom setter (or getter) is
Kotlin's <em>backing field</em> — it's the storage behind the property, and you
must use it instead of <code>this.note</code> to avoid infinite recursion.
Rust has nothing analogous to trip over here: since there's no property syntax,
a Rust setter method just assigns straight into <code>self.note</code>, no
recursion trap to dodge (that trap is exactly why Kotlin invented
<code>field</code> in the first place). A <code>private set</code> gives you a
property that anyone can read but only the class can write — Kotlin's compact
answer to Rust's usual pattern of a private field plus a public getter method.
Note there is no <code>new</code> keyword: <code>BankAccount("Ada", 100)</code>
constructs an instance directly, unlike Rust's conventional
<code>Type::new(...)</code> associated function.</p>`,
