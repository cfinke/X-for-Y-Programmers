  intro: `
<p>Kotlin strings will feel instantly familiar. Interpolation uses a bare
<code>$name</code> instead of Rust's <code>format!("{name}")</code>, and for a full
expression you wrap it in braces: <code>\${user.age + 1}</code>. Since there are
no macros involved, a plain double-quoted string <em>is</em> a template
string — there's no separate <code>format!</code> call to reach for.</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>format!("Hi {name}")</code></td><td><code>"Hi $name"</code></td></tr>
  <tr><td><code>format!("{}", a + b)</code></td><td><code>"\${a + b}"</code></td></tr>
  <tr><td><code>s.to_uppercase()</code></td><td><code>s.uppercase()</code></td></tr>
  <tr><td><code>s.contains(x)</code></td><td><code>s.contains(x)</code></td></tr>
  <tr><td><code>"42".parse::&lt;i32&gt;()</code></td><td><code>"42".toInt()</code></td></tr>
</table>
<p>The method names are close but not identical: <code>uppercase()</code> /
<code>lowercase()</code> (not <code>to_uppercase</code>), <code>contains()</code>
(matches Rust's own name), and <code>joinToString()</code> in place of
<code>slice::join</code>. Multi-line and regex-heavy text goes in a
<em>triple-quoted</em> raw string (<code>""" ... """</code>) where backslashes
are literal — handy where Rust reaches for a raw string literal
<code>r"..."</code>.</p>`,

  solution: `fun greet(name: String): String {
    return "Hello, $name!"
}

fun preview(title: String, body: String): String {
    return "\${title.uppercase()}: \${body.length} chars"
}

fun slugify(title: String): String {
    return title.trim().lowercase().split(" ").joinToString("-")
}

fun redact(text: String): String {
    return text.replace("secret", "*****")
}

fun snippet(text: String): String {
    return text.substring(0, 5)
}

fun mentions(text: String, term: String): Boolean {
    return text.contains(term)
}

fun isHashtag(text: String): Boolean {
    return text.startsWith("#")
}

fun doubleNumber(numText: String): String {
    return (numText.trim().toInt() * 2).toString()
}

fun card(name: String, role: String): String {
    return """
        Name: $name
        Role: $role
    """.trimIndent()
}

  notes: `
<table>
  <tr><th>Task</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Interpolate</td><td><code>format!("{x}")</code></td><td><code>"$x"</code> / <code>"\${x.y}"</code></td></tr>
  <tr><td>Case</td><td><code>to_uppercase()</code></td><td><code>uppercase()</code></td></tr>
  <tr><td>Split &amp; join</td><td><code>s.split(",").collect::&lt;Vec&lt;_&gt;&gt;().join("-")</code></td><td><code>s.split(",").joinToString("-")</code></td></tr>
  <tr><td>Substring</td><td><code>&amp;s[0..5]</code></td><td><code>s.substring(0, 5)</code></td></tr>
  <tr><td>Contains</td><td><code>s.contains(x)</code></td><td><code>s.contains(x)</code></td></tr>
  <tr><td>Parse int</td><td><code>s.parse::&lt;i32&gt;()</code></td><td><code>s.toInt()</code></td></tr>
  <tr><td>Raw / multi-line</td><td><code>r"line1\nline2"</code></td><td><code>"""line1\nline2"""</code></td></tr>
</table>
<p>One sharp edge for Rust refugees: <code>"42".toInt()</code>
<em>throws</em> on bad input rather than returning a <code>Result</code> you can
match on — reach for <code>toIntOrNull()</code> when the text might not be a
number, much like preferring a fallible parse over an <code>unwrap()</code>
that can panic. And unlike Rust's <code>format!("{}", x)</code>, Kotlin's
<code>x.toString()</code> is a method on every value, so <code>42.toString()</code>
and <code>listOf(1).toString()</code> both just work — no <code>Display</code>
trait to implement first. Prefer <code>joinToString</code> whenever you're
turning a collection back into text — it takes optional <code>prefix</code>,
<code>postfix</code>, and per-element <code>transform</code> arguments that
cover most formatting needs.</p>`,
