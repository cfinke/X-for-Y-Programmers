const LESSON = {
  number: 14,
  title: "Lambdas & Higher-Order Functions",

  intro: `
<p>Functions are first-class in Kotlin, much like closures are in Rust. You can
store them in variables, pass them as arguments, and return them from other
functions. The main things to re-learn are the <em>syntax</em> — Kotlin lambdas
skip Rust's <code>move</code>/borrow-checker ceremony entirely — and one very
Kotlin-specific convenience: the implicit <code>it</code> parameter and
trailing-lambda calls, neither of which Rust has a direct equivalent for.</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>|n: i32| n * 2</code></td><td><code>{ n: Int -> n * 2 }</code></td></tr>
  <tr><td><code>|n| n * 2</code> <em>(still names the param)</em></td><td><code>{ it * 2 }</code></td></tr>
  <tr><td><code>f: impl Fn(i32) -> i32</code></td><td><code>f: (Int) -> Int</code></td></tr>
  <tr><td><code>v.iter().map(|n| n * 2)</code></td><td><code>list.map { it * 2 }</code></td></tr>
</table>
<p>A lambda is written with braces: <code>{ param -> body }</code>. When it takes a
single argument you can drop the parameter list entirely and refer to it as
<code>it</code> — a Rust closure always names its parameter, even when there's
only one, as in <code>|n| n * 2</code>. The last expression in the block is its
return value — there is no <code>return</code> keyword inside a lambda, just
like a Rust closure's tail expression. A function <em>type</em> puts the
parameters in parentheses and the result after an arrow:
<code>(Int) -> Int</code>, the counterpart of Rust's <code>Fn(i32) -> i32</code>
trait bound, usually spelled <code>impl Fn(i32) -> i32</code> since Rust
closures don't share one concrete type.</p>
<p>The headline sugar: if a lambda is the <strong>last</strong> argument to a
function, it moves outside the parentheses — <code>list.map { it * 2 }</code>
instead of <code>list.map({ it * 2 })</code>. Rust has no equivalent shorthand;
a closure argument always stays inside the parentheses, as in
<code>v.iter().map(|n| n * 2)</code>. That "trailing lambda" is why so much
idiomatic Kotlin reads like it has built-in control structures.</p>`,

  rust: `fn apply_twice(x: i32, f: impl Fn(i32) -> i32) -> i32 {
    f(f(x))
}

fn make_multiplier(factor: i32) -> impl Fn(i32) -> i32 {
    move |n| n * factor
}

let doubled: Vec<i32> = vec![1, 2, 3].iter().map(|n| n * 2).collect(); // [2, 4, 6]`,

  task: `
<p>Kotlin allows top-level declarations — no class or <code>main</code> needed.
Write four things:</p>
<ol>
  <li><code>applyTwice(x: Int, f: (Int) -> Int): Int</code> — a higher-order
      function that applies <code>f</code> to <code>x</code> twice, i.e.
      <code>f(f(x))</code>.</li>
  <li><code>makeMultiplier(factor: Int): (Int) -> Int</code> — returns a lambda
      that multiplies its argument by <code>factor</code>.</li>
  <li><code>transform(nums: List&lt;Int&gt;, f: (Int) -> Int): List&lt;Int&gt;</code>
      — applies <code>f</code> to every element (use <code>nums.map(f)</code>).</li>
  <li><code>doubled(nums: List&lt;Int&gt;): List&lt;Int&gt;</code> — returns each
      element times two, written with a <strong>trailing lambda</strong> and the
      implicit <code>it</code>: <code>nums.map { it * 2 }</code>.</li>
</ol>`,

  starter: `// 1. applyTwice: call f on x, then on the result

    return 0 // TODO

// 2. makeMultiplier: return a function (Int) -> Int

`,

  requirements: [
    { pattern: /\(Int\)\s*->\s*Int/, message: "Use a function type: (Int) -> Int" },
    { pattern: /\.map\s*\{/, message: "Call .map with a trailing lambda: .map { ... }" },
    { pattern: /\bit\b/, message: "Use the implicit single-parameter name it" },
  ],

  tests: [
    { name: "applyTwice(3) { it + 1 } is 5", code: "        expect_eq(applyTwice(3) { it + 1 }, 5)" },
    { name: "applyTwice(2) { it * it } is 16", code: "        expect_eq(applyTwice(2) { it * it }, 16)" },
    { name: "makeMultiplier(3)(5) is 15", code: "        val triple = makeMultiplier(3)\n        expect_eq(triple(5), 15)" },
    { name: "makeMultiplier(0)(9) is 0", code: "        expect_eq(makeMultiplier(0)(9), 0)" },
    { name: "transform squares each element", code: "        expect_eq(transform(listOf(1, 2, 3)) { it * it }, listOf(1, 4, 9))" },
    { name: "doubled doubles each element", code: "        expect_eq(doubled(listOf(1, 2, 3)), listOf(2, 4, 6))" },
    { name: "doubled of empty list is empty", code: "        expect_eq(doubled(listOf()), listOf<Int>())" },
  ],

  solution: `fun applyTwice(x: Int, f: (Int) -> Int): Int {
    return f(f(x))
}

fun makeMultiplier(factor: Int): (Int) -> Int {
    return { n -> n * factor }
}

fun transform(nums: List<Int>, f: (Int) -> Int): List<Int> {
    return nums.map(f)
}

fun doubled(nums: List<Int>): List<Int> {
    return nums.map { it * 2 }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Lambda</td><td><code>|x| x + 1</code></td><td><code>{ x -> x + 1 }</code></td></tr>
  <tr><td>Implicit single param</td><td>— (always named)</td><td><code>{ it + 1 }</code></td></tr>
  <tr><td>Function type</td><td><code>impl Fn(i32) -> i32</code></td><td><code>(Int) -> Int</code></td></tr>
  <tr><td>Trailing lambda</td><td><code>iter.map(|x| …)</code> (no shorthand)</td><td><code>list.map { … }</code></td></tr>
  <tr><td>Returning a function</td><td><code>fn m() -> impl Fn(i32) -> i32 { move |n| … }</code></td><td><code>fun m(): (Int) -> Int = { … }</code></td></tr>
</table>
<p>Two footnotes worth remembering. First, a lambda has no <code>return</code> —
its value is the last expression, just as a Rust closure's value is its tail
expression; a bare <code>return</code> would try to leave the enclosing
function. Second, when a lambda is the only argument you drop the parentheses
completely (<code>list.map { it * 2 }</code>), and when it is the last of
several you keep the others inside and move only the lambda out
(<code>list.fold(0) { acc, n -> acc + n }</code>). Rust has no such shorthand —
a closure argument always stays inside the call's parentheses, as in
<code>iter.fold(0, |acc, n| acc + n)</code>. This is the same first-class
functions you know from Rust, just with less ceremony around captures — no
<code>move</code> keyword to remember, no explicit parameter types required,
and no borrow-checker friction to work around.</p>`,
};
