<script>
const LESSON = {
  number: 15,
  title: "Slices, Tuples & Destructuring",

  intro: `
<p>TypeScript's tuple types map straight across: <code>[string, number]</code>
becomes <code>(String, i32)</code>, built with parentheses instead of
brackets. Access is positional — <code>pair.0</code>, <code>pair.1</code> —
and destructuring works just like <code>const [a, b] = pair</code>, only with
parens: <code>let (a, b) = pair;</code>. It works in function bodies, and the
same patterns show up inside <code>match</code> arms too.</p>
<table>
  <tr><th>TypeScript</th><th>Rust</th></tr>
  <tr><td><code>type Pair = [number, number];</code></td><td><code>(i32, i32)</code></td></tr>
  <tr><td><code>pair[0]</code>, <code>pair[1]</code></td><td><code>pair.0</code>, <code>pair.1</code></td></tr>
  <tr><td><code>const [a, b] = pair;</code></td><td><code>let (a, b) = pair;</code></td></tr>
  <tr><td><code>readonly number[]</code> parameter</td><td><code>&amp;[i32]</code> — a borrowed slice</td></tr>
</table>
<p>The other half of this lesson is the slice, <code>&amp;[T]</code>: a
borrowed <em>view</em> into a run of elements, whoever owns them. A function
taking <code>&amp;[i32]</code> accepts an array, a <code>Vec</code>, or a
sub-range of either — which is why slices are the parameter type you should
default to, the way you'd accept <code>readonly number[]</code> rather than
demanding a specific container. Slices index like arrays (<code>v[0]</code>,
<code>v[v.len() - 1]</code>), and their <code>.first()</code> /
<code>.last()</code> helpers return <code>Option</code> because the slice
might be empty.</p>`,

  typescript: `type Pair = [number, number];

function swap([a, b]: Pair): Pair {
  return [b, a];
}

function distance(p: Pair, q: Pair): number {
  const [x1, y1] = p;
  const [x2, y2] = q;
  return Math.hypot(x2 - x1, y2 - y1);
}

function ends(v: number[]): Pair {
  return [v[0], v[v.length - 1]];
}`,

  task: `
<p>Port the three functions:</p>
<ol>
  <li><code>swap(pair: (i32, i32)) -&gt; (i32, i32)</code> — return the
      elements in the opposite order. Destructure with
      <code>let (a, b) = pair;</code> and build the result with
      <code>(b, a)</code>.</li>
  <li><code>distance(p: (f64, f64), q: (f64, f64)) -&gt; f64</code> —
      Euclidean distance between two points. Use
      <code>let (x1, y1) = p;</code> style destructuring for both points,
      then either <code>(x2 - x1).hypot(y2 - y1)</code> or the square root
      of the sum of squares (<code>.powi(2)</code> and <code>.sqrt()</code>
      are methods on <code>f64</code>).</li>
  <li><code>ends(v: &amp;[i32]) -&gt; (i32, i32)</code> — return
      <code>(first, last)</code> from a slice. Assume it's non-empty and
      index directly: <code>v[0]</code> and <code>v[v.len() - 1]</code>.
      (In production you'd reach for <code>.first()</code>/<code>.last()</code>
      and handle the <code>Option</code>.)</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// let (a, b) = pair; then hand back (b, a).
fn swap(pair: (i32, i32)) -> (i32, i32) {
    todo!()
}

// Destructure both points, then hypot — or sqrt of summed squares.
fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    todo!()
}

// (first, last) — assume non-empty, so v[0] and v[v.len() - 1] are safe.
fn ends(v: &[i32]) -> (i32, i32) {
    todo!()
}
`,

  requirements: [
    { pattern: /\(\s*f64\s*,\s*f64\s*\)/, message: "distance should take (f64, f64) tuple parameters" },
    { pattern: /let\s*\(/, message: "Destructure a tuple with let (a, b) = ..." },
    { pattern: /&\[i32\]/, message: "ends should accept a borrowed slice, &[i32]" },
  ],

  tests: [
    { name: "swap((1, 2)) returns (2, 1)",
      code: "assert_eq!(swap((1, 2)), (2, 1));" },
    { name: "swap((-5, 5)) returns (5, -5)",
      code: "assert_eq!(swap((-5, 5)), (5, -5));" },
    { name: "distance((0.0, 0.0), (3.0, 4.0)) is exactly 5.0 (3-4-5 triangle)",
      code: "assert_eq!(distance((0.0, 0.0), (3.0, 4.0)), 5.0);" },
    { name: "distance((1.0, 1.0), (4.0, 5.0)) is exactly 5.0",
      code: "assert_eq!(distance((1.0, 1.0), (4.0, 5.0)), 5.0);" },
    { name: "ends(&[10, 20, 30]) returns (10, 30)",
      code: "assert_eq!(ends(&[10, 20, 30]), (10, 30));" },
    { name: "ends(&[7]) returns (7, 7) — first and last coincide",
      code: "assert_eq!(ends(&[7]), (7, 7));" },
  ],

  solution: `fn swap(pair: (i32, i32)) -> (i32, i32) {
    let (a, b) = pair;
    (b, a)
}

fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    let (x1, y1) = p;
    let (x2, y2) = q;
    ((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()
}

fn ends(v: &[i32]) -> (i32, i32) {
    (v[0], v[v.len() - 1])
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Rust</th></tr>
  <tr><td>Tuple type</td><td><code>[string, number]</code></td><td><code>(String, i32)</code></td></tr>
  <tr><td>Positional access</td><td><code>pair[0]</code></td><td><code>pair.0</code> (a field, not an index)</td></tr>
  <tr><td>Destructuring</td><td><code>const [a, b] = pair;</code></td><td><code>let (a, b) = pair;</code></td></tr>
  <tr><td>Read-only sequence param</td><td><code>readonly number[]</code></td><td><code>&amp;[i32]</code> — borrows an array, a Vec, or a sub-range</td></tr>
  <tr><td>First/last, safely</td><td><code>v[0]</code> may be <code>undefined</code></td><td><code>v.first()</code>/<code>v.last()</code> return <code>Option&lt;&amp;T&gt;</code></td></tr>
</table>
<p>Note what <code>ends</code> gives up by indexing directly: <code>v[0]</code>
on an empty slice panics at runtime, Rust's equivalent of the
<code>undefined</code> you'd silently get in TypeScript — honest, but abrupt.
The <code>Option</code>-returning <code>.first()</code> and
<code>.last()</code> are the idiomatic fix once "assume non-empty" stops
being a promise you can keep. And the tuple habit scales down nicely:
returning two values is just <code>-&gt; (i32, i32)</code>, no wrapper object,
destructured at the call site with a single <code>let</code>.</p>`,
};
