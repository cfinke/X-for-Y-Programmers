<div id="app"></div>
<script>
const LESSON = {
  number: 13,
  title: "Generics & Trait Bounds",

  intro: `
<p>Generics transfer almost untouched: <code>function first&lt;T&gt;(items: T[])</code>
becomes <code>fn first&lt;T&gt;(items: &amp;[T])</code>, and turbofish aside,
<code>Vec&lt;String&gt;</code> reads exactly like <code>Array&lt;string&gt;</code>.
The real difference is philosophical. In TypeScript, an unconstrained
<code>T</code> lets you try anything and find out at the call site; in Rust,
an unconstrained <code>T</code> supports almost <em>nothing</em> — you can
move it, borrow it, and that's about it. Not even <code>==</code> or
<code>&gt;</code>.</p>
<table>
  <tr><th>TypeScript</th><th>Rust</th></tr>
  <tr><td><code>function first&lt;T&gt;(items: T[]): T | undefined</code></td><td><code>fn first&lt;T&gt;(items: &amp;[T]) -&gt; Option&lt;&amp;T&gt;</code></td></tr>
  <tr><td><code>&lt;T extends Lengthy&gt;</code> constrains T's <em>shape</em></td><td><code>&lt;T: PartialOrd&gt;</code> declares T's <em>operations</em></td></tr>
  <tr><td>Unbounded <code>T</code>: comparisons still type-check loosely</td><td>Unbounded <code>T</code>: <code>a &gt; b</code> won't compile at all</td></tr>
  <tr><td>Multiple constraints: <code>T extends A &amp; B</code></td><td><code>T: A + B</code></td></tr>
</table>
<p>So Rust makes you <em>declare</em> what <code>T</code> can do, using the
traits from the last lesson as the vocabulary:
<code>fn largest&lt;T: PartialOrd&gt;(items: &amp;[T]) -&gt; &amp;T</code> reads
"any T that can be ordered". It's the same move as
<code>extends</code>-constraints, but aimed at operations instead of
properties — and checked when the generic is <em>defined</em>, not when it's
used, so a generic function that compiles can never blow up on a weird
instantiation later.</p>`,

  typescript: `function first<T>(items: T[]): T | undefined {
  return items[0];
}

// "extends" constrains the shape T must have…
function largest<T extends number | string>(items: T[]): T {
  let biggest = items[0];
  for (const item of items) {
    if (item > biggest) biggest = item;
  }
  return biggest;
}

console.log(first([1, 2, 3]));                    // 1
console.log(largest([3, 7, 2]));                  // 7
console.log(largest(["apple", "cherry", "b"]));   // "cherry"`,

  task: `
<p>Write the two generic functions:</p>
<ol>
  <li><code>first&lt;T&gt;(items: &amp;[T]) -&gt; Option&lt;&amp;T&gt;</code> —
      return a reference to the first element, or <code>None</code> for an
      empty slice. No bound needed: looking at an element demands nothing of
      <code>T</code>. (The slice method <code>.first()</code> does exactly
      this, or write the <code>if</code> yourself.)</li>
  <li><code>largest&lt;T: PartialOrd&gt;(items: &amp;[T]) -&gt; &amp;T</code> —
      return a reference to the largest element. The
      <code>PartialOrd</code> bound is what makes <code>&gt;</code> legal
      inside the body. Start with a reference to <code>items[0]</code> and
      loop; assume the slice is non-empty.</li>
</ol>
<p>The tests call both functions with <code>i32</code> slices <em>and</em>
<code>&amp;str</code> slices — one definition, every orderable type. Don't
write <code>fn main</code> — the tests call your functions directly.</p>`,

  starter: `// No bound: returning a reference asks nothing of T.
fn first<T>(items: &[T]) -> Option<&T> {
    todo!()
}

// T: PartialOrd is the "extends" of operations — it's what
// makes the > comparison inside the body compile.
fn largest<T: PartialOrd>(items: &[T]) -> &T {
    todo!() // assume items is non-empty
}
`,

  requirements: [
    { pattern: /<T\s*:\s*PartialOrd>/, message: "Declare the bound <T: PartialOrd> on largest" },
    { pattern: /<T>/, message: "Define first with a plain, unbounded <T>" },
    { pattern: /Option<&T>/, message: "first should return Option<&T>" },
  ],

  tests: [
    { name: "first(&[10, 20, 30]) returns Some(&10)",
      code: "assert_eq!(first(&[10, 20, 30]), Some(&10));" },
    { name: "first of an empty i32 slice returns None",
      code: "assert_eq!(first::<i32>(&[]), None);" },
    { name: 'first(&["solo"]) returns Some(&"solo") — same fn, &str',
      code: 'assert_eq!(first(&["solo"]), Some(&"solo"));' },
    { name: "largest(&[3, 7, 2, 5]) returns &7",
      code: "assert_eq!(*largest(&[3, 7, 2, 5]), 7);" },
    { name: 'largest(&["apple", "cherry", "banana"]) returns &"cherry"',
      code: 'assert_eq!(*largest(&["apple", "cherry", "banana"]), "cherry");' },
  ],

  solution: `fn first<T>(items: &[T]) -> Option<&T> {
    items.first()
}

fn largest<T: PartialOrd>(items: &[T]) -> &T {
    let mut biggest = &items[0];
    for item in items {
        if item > biggest {
            biggest = item;
        }
    }
    biggest
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Rust</th></tr>
  <tr><td>Generic function</td><td><code>function first&lt;T&gt;(items: T[])</code></td><td><code>fn first&lt;T&gt;(items: &amp;[T])</code></td></tr>
  <tr><td>Constraint</td><td><code>&lt;T extends Comparable&gt;</code></td><td><code>&lt;T: PartialOrd&gt;</code> (a trait bound)</td></tr>
  <tr><td>Several constraints</td><td><code>T extends A &amp; B</code></td><td><code>T: A + B</code>, or a <code>where</code> clause</td></tr>
  <tr><td>Unbounded T can…</td><td>Anything the checker can't disprove</td><td>Be moved and borrowed — nothing else</td></tr>
  <tr><td>Explicit type argument</td><td><code>first&lt;number&gt;([])</code></td><td><code>first::&lt;i32&gt;(&amp;[])</code> — the "turbofish"</td></tr>
</table>
<p>Bounds are checked where the generic is <em>written</em>: if
<code>largest</code> compiles, no caller can ever hit a "T doesn't support
&gt;" error, because callers whose types lack <code>PartialOrd</code> are
rejected at the call site instead. And unlike TypeScript's erased generics,
Rust monomorphizes — it compiles a specialized copy per concrete type, so
<code>largest::&lt;i32&gt;</code> runs as fast as a hand-written i32
version.</p>`,
};
</script>
