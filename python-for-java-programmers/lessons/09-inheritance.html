  title: "Inheritance",

  intro: `
<p>Python classes inherit much the way Java classes do, but the spellings
differ. A subclass names its parent in parentheses — <code>class Dog(Animal)</code>
— instead of with <code>extends</code>. To reach the parent's constructor you
call <code>super().__init__(...)</code>; in Java the parent constructor is
reached by calling <code>super(...)</code> as the first statement of the
child's constructor, and the compiler enforces it whenever the parent has no
no-arg constructor. Python has no such enforcement: if you write
<code>__init__</code> in the child and forget the <code>super()</code> call,
the parent's setup simply never runs.</p>
<table>
  <tr><th>Java</th><th>Python</th></tr>
  <tr><td><code>class Dog extends Animal</code></td><td><code>class Dog(Animal):</code></td></tr>
  <tr><td><code>super(name);</code></td><td><code>super().__init__(name)</code></td></tr>
  <tr><td><code>String speak() { … }</code> (override)</td><td><code>def speak(self):</code> (override)</td></tr>
  <tr><td><code>x instanceof Animal</code></td><td><code>isinstance(x, Animal)</code></td></tr>
  <tr><td><code>class C extends A implements M</code></td><td><code>class C(A, M):</code> (mixin)</td></tr>
</table>
<p>Overriding is just defining a method with the same name (and signature) in
the subclass — typically marked with <code>@Override</code> as documentation —
the most-derived version wins, and it can call the parent's version through
<code>super()</code>. Type checks use <code>isinstance(obj, Cls)</code>, which —
like <code>instanceof</code> — is <code>True</code> for subclasses too. Python
has no <code>interface</code> keyword; where Java would reach for an interface
with a default method, Python just adds an extra base class that contributes
methods, listed alongside the main parent in the parentheses.</p>`,

  java: `class Animal {
    private final String name;

    Animal(String name) {
        this.name = name;
    }

    String speak() {
        return name + " makes a sound";
    }

class Dog extends Animal {
    Dog(String name) {
        super(name);
    }

    @Override
    String speak() {
        return super.speak() + " — woof!";
    }
}

Dog d = new Dog("Rex");
d.speak();                 // "Rex makes a sound — woof!"
d instanceof Animal;       // true`,

</ol>`,

  solution: `class Animal:
    def __init__(self, name):
        self.name = name

    def speak(self):
        return f"{self.name} makes a sound"


class Dog(Animal):
    def __init__(self, name, breed):
        super().__init__(name)
        self.breed = breed

    def speak(self):
        return f"{super().speak()} — woof!"


class Loud:
    def shout(self):
        return self.speak().upper()


class LoudDog(Dog, Loud):
    pass


def describe(obj):
    return "animal" if isinstance(obj, Animal) else "other"
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Python</th></tr>
  <tr><td>Subclass</td><td><code>class B extends A</code></td><td><code>class B(A):</code></td></tr>
  <tr><td>Parent constructor</td><td><code>super(x);</code></td><td><code>super().__init__(x)</code></td></tr>
  <tr><td>Call parent method</td><td><code>super.m()</code></td><td><code>super().m()</code></td></tr>
  <tr><td>Override</td><td>same signature, <code>@Override</code></td><td>same method name</td></tr>
  <tr><td>Type check</td><td><code>x instanceof A</code></td><td><code>isinstance(x, A)</code></td></tr>
  <tr><td>Mixin</td><td>interface with a default method</td><td>extra base class <code>(A, M)</code></td></tr>
</table>
<p>The biggest gotcha for a Java programmer: Python never calls the parent's
<code>__init__</code> automatically. Java forces the issue at compile time —
if the parent has no no-arg constructor, the compiler refuses to build until
you add an explicit <code>super(...)</code> call. Python has no such check: if
a subclass defines its own <code>__init__</code> and forgets to call
<code>super().__init__(...)</code>, the parent's setup simply never runs, and
attributes it would have set (like <code>self.name</code>) never get created.
Python also lets a class inherit from more than one base at once, something
Java restricts to interfaces; method lookups resolve left-to-right along the
<em>MRO</em> (method resolution order). For a simple mixin like
<code>Loud</code> that just adds a method, this means <code>LoudDog</code>
gets <code>speak</code> from <code>Dog</code> and <code>shout</code> from
<code>Loud</code> with no conflict — the kind of thing Java would express
with an interface default method instead. You can also pass a tuple to
<code>isinstance</code>, e.g. <code>isinstance(x, (Dog, Cat))</code>.</p>`,
