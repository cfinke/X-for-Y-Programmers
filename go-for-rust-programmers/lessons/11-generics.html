const LESSON = {
  number: 11,
  title: "Generics",

  intro: `
<p>Before Go 1.18 the only way to write a reusable container or algorithm was
<code>interface{}</code> plus a type assertion at every call site — nothing like
Rust's monomorphized generics, and far less safe. Go 1.18 added
<em>type parameters</em>, so you can now write the same <code>Map</code> and
<code>Max</code> helpers you reach for in Rust, fully type-checked.</p>
<p>The shape is familiar, but the brackets moved and the bound is different: Go
puts type parameters in <strong>square brackets after the name</strong>, and every
parameter needs a <em>constraint</em> — an interface describing which types are
allowed. <code>any</code> (an alias for <code>interface{}</code>) means "no
restriction", <code>comparable</code> means "usable with <code>==</code>", and
<code>cmp.Ordered</code> means "usable with <code>&lt;</code>, <code>&gt;</code>".</p>
<table>
  <tr><th>Rust</th><th>Go</th></tr>
  <tr><td><code>fn id&lt;T&gt;(x: T) -&gt; T</code></td><td><code>func Id[T any](x T) T</code></td></tr>
  <tr><td><code>&lt;T&gt;</code> (angle brackets)</td><td><code>[T any]</code> (square brackets, needs a constraint)</td></tr>
  <tr><td><code>&lt;T, U&gt;</code></td><td><code>[T, U any]</code></td></tr>
  <tr><td>no bound / unconstrained</td><td><code>any</code> (= <code>interface{}</code>)</td></tr>
  <tr><td><code>T: PartialEq</code>, <code>T: Ord</code></td><td><code>comparable</code>, <code>cmp.Ordered</code>, or an interface</td></tr>
</table>
<p>Like Rust's, Go's generics are real at runtime rather than erased: the compiler
stamps out a version for the types you use (Rust calls this monomorphization; Go's
GC-backed runtime does something similar under the hood). And just as Rust needs a
trait bound before you can call a method on a type parameter, Go needs a constraint
before you can use an operator on one — you can only use <code>&lt;</code> on a
<code>T</code> whose constraint promises ordering.</p>`,

  rust: `fn map<T, U>(xs: &[T], f: impl Fn(&T) -> U) -> Vec<U> {
    xs.iter().map(f).collect()
}

fn max<T: PartialOrd>(a: T, b: T) -> T {
    if a > b { a } else { b }
}

fn contains<T: PartialEq>(xs: &[T], v: &T) -> bool {
    xs.contains(v)
}`,

  task: `
<p>Write three generic helpers as package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you). The
<code>cmp</code> package is available without importing.</p>
<ol>
  <li><code>Map[T, U any](s []T, f func(T) U) []U</code> — apply <code>f</code> to
      every element and return a new slice of results.</li>
  <li><code>Max[T cmp.Ordered](a, b T) T</code> — return the larger of the two.
      The <code>cmp.Ordered</code> constraint is what lets you use
      <code>&gt;</code> on a type parameter.</li>
  <li><code>Contains[T comparable](s []T, v T) bool</code> — report whether
      <code>v</code> appears in <code>s</code>. The <code>comparable</code>
      constraint is what lets you use <code>==</code>.</li>
</ol>`,

  starter: `func Map[T, U any](s []T, f func(T) U) []U {
	return nil // TODO
}

func Max[T cmp.Ordered](a, b T) T {
	var zero T
	return zero // TODO
}

func Contains[T comparable](s []T, v T) bool {
	return false // TODO
}
`,

  requirements: [
    { pattern: /func\s+Map\s*\[\s*T\s*,\s*U\s+any\s*\]/, message: "Define Map with type parameters [T, U any]" },
    { pattern: /cmp\.Ordered/, message: "Constrain Max's type parameter with cmp.Ordered" },
    { pattern: /\bcomparable\b/, message: "Constrain Contains's type parameter with comparable" },
  ],

  tests: [
    { name: "Map doubles ints", code: "\t\texpect_eq(Map([]int{1, 2, 3}, func(n int) int { return n * 2 }), []int{2, 4, 6})" },
    { name: "Map maps strings to lengths", code: "\t\texpect_eq(Map([]string{\"a\", \"bb\", \"ccc\"}, func(s string) int { return len(s) }), []int{1, 2, 3})" },
    { name: "Max of ints", code: "\t\texpect_eq(Max(3, 7), 7)" },
    { name: "Max of ints, first larger", code: "\t\texpect_eq(Max(9, 2), 9)" },
    { name: "Max of strings", code: "\t\texpect_eq(Max(\"apple\", \"banana\"), \"banana\")" },
    { name: "Contains finds an int", code: "\t\texpect_true(Contains([]int{1, 2, 3}, 2))" },
    { name: "Contains misses a string", code: "\t\texpect_eq(Contains([]string{\"a\", \"b\"}, \"c\"), false)" },
  ],

  solution: `func Map[T, U any](s []T, f func(T) U) []U {
	result := make([]U, len(s))
	for i, v := range s {
		result[i] = f(v)
	}
	return result
}

func Max[T cmp.Ordered](a, b T) T {
	if a > b {
		return a
	}
	return b
}

func Contains[T comparable](s []T, v T) bool {
	for _, x := range s {
		if x == v {
			return true
		}
	}
	return false
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Go</th></tr>
  <tr><td>Generic function</td><td><code>fn f&lt;T&gt;(x: T)</code></td><td><code>func F[T any](x T)</code></td></tr>
  <tr><td>Two parameters</td><td><code>&lt;T, U&gt;</code></td><td><code>[T, U any]</code></td></tr>
  <tr><td>Equality bound</td><td><code>&lt;T: PartialEq&gt;</code></td><td><code>[T comparable]</code></td></tr>
  <tr><td>Ordering bound</td><td><code>&lt;T: PartialOrd&gt;</code></td><td><code>[T cmp.Ordered]</code></td></tr>
  <tr><td>Generic type</td><td><code>struct Box&lt;T&gt;</code></td><td><code>type Box[T any] struct{ ... }</code></td></tr>
</table>
<p>Type inference usually lets you call <code>Map(xs, f)</code> and
<code>Max(3, 7)</code> without writing the type arguments — the compiler reads
them off the values, just like Rust. When inference can't (an empty slice,
say), you spell them explicitly: <code>Max[int](a, b)</code>.</p>
<p>Two rules trip up newcomers. First, only what the constraint promises is
allowed: you can <code>==</code> a <code>comparable</code> but not <code>&lt;</code>
it — that needs <code>cmp.Ordered</code>. This is the same discipline Rust
enforces with trait bounds, just spelled with a fixed, built-in set of
constraints (<code>any</code>, <code>comparable</code>, <code>cmp.Ordered</code>)
instead of arbitrary traits. Second, Go deliberately has no generic
<em>methods</em> (a method can't introduce its own type parameter, unlike a
Rust <code>impl&lt;T&gt;</code> block adding generic methods to a type), and
idiomatic Go still prefers a plain <code>interface</code> when behavior, not a
container, is what varies — much like reaching for a trait object instead of a
generic parameter. Generics are for containers and algorithms; interfaces are
for polymorphism. The standard library leans on this split with the
<code>slices</code> and <code>maps</code> packages, which are just generic helpers
over the built-in types.</p>`,
};
