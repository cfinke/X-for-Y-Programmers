  title: "Slices",

  intro: `
<p>A Go <strong>slice</strong> is the everyday list type — the thing you reach for
whenever you'd write <code>Vec&lt;i32&gt;</code> in Rust. It's a growable view
onto a backing array, described by a length (<code>len</code>) and a capacity
(<code>cap</code>). Like a Rust <code>Vec</code>, a slice is homogeneous and typed:
<code>[]int</code> holds ints and nothing else — but unlike <code>Vec</code>,
there's no ownership or borrow checker to satisfy; the garbage collector handles it.</p>
<table>
  <tr><th>Rust</th><th>Go</th></tr>
  <tr><td><code>let xs: Vec&lt;i32&gt; = vec![1, 2, 3];</code></td><td><code>xs := []int{1, 2, 3}</code></td></tr>
  <tr><td><code>xs.push(4)</code></td><td><code>xs = append(xs, 4)</code></td></tr>
  <tr><td><code>xs.len()</code></td><td><code>len(xs)</code></td></tr>
  <tr><td><code>&amp;xs[1..3]</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td><code>for x in &amp;xs</code></td><td><code>for _, x := range xs</code></td></tr>
</table>
<p>The big surprise is <code>append</code>: it isn't a mutating method like
<code>push</code>. It <em>returns</em> a (possibly new) slice, so you must assign
the result back: <code>xs = append(xs, 4)</code>. Alongside <code>len</code>,
a slice also has a <code>cap</code> — the size of its backing array — and
<code>make([]int, n)</code> pre-allocates a slice of <code>n</code> zero values,
much like <code>vec![0; n]</code>. Ranging gives you an index and a value; use
<code>_</code> to discard the index.</p>`,

  rust: `fn doubled(xs: &[i32]) -> Vec<i32> {
    let mut out: Vec<i32> = Vec::new();
    for x in xs {
        out.push(x * 2);
    }
    out
}

fn total(xs: &[i32]) -> i32 {
    let mut sum = 0;
    for x in xs {
        sum += x;
    }
    sum
}`,

  task: `
<p>Write these as package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>Doubled(xs []int) []int</code> returns a <em>new</em> slice with every
      element multiplied by 2. Build it with <code>make([]int, len(xs))</code>
      or start from <code>[]int{}</code> and <code>append</code>. Use
      <code>range</code> to iterate.</li>
  <li><code>Total(xs []int) int</code> returns the sum of all elements
      (<code>0</code> for an empty slice).</li>
  <li><code>Middle(xs []int) []int</code> returns the slice with its first and
      last elements dropped, using slicing: <code>xs[1 : len(xs)-1]</code>. You
      may assume <code>len(xs) &gt;= 2</code>.</li>
</ol>`,

  starter: `func Doubled(xs []int) []int {
	return nil // TODO
}

func Total(xs []int) int {
	return 0 // TODO
}

func Middle(xs []int) []int {
	return nil // TODO: use slicing xs[a:b]
}
`,

  requirements: [
    { pattern: /append|make\s*\(/, message: "Build the result slice with append or make" },
    { pattern: /range/, message: "Iterate with range" },
    { pattern: /xs\[1\s*:/, message: "Use slicing xs[1:...] in Middle" },
  ],

  tests: [
    { name: "Doubled([1,2,3]) is [2,4,6]", code: "\t\texpect_eq(Doubled([]int{1, 2, 3}), []int{2, 4, 6})" },
    { name: "Doubled([]) is []", code: "\t\texpect_eq(Doubled([]int{}), []int{})" },
    { name: "Doubled does not mutate input", code: "\t\tin := []int{4, 5}\n\t\t_ = Doubled(in)\n\t\texpect_eq(in, []int{4, 5})" },
    { name: "Total([1,2,3,4]) is 10", code: "\t\texpect_eq(Total([]int{1, 2, 3, 4}), 10)" },
    { name: "Total([]) is 0", code: "\t\texpect_eq(Total([]int{}), 0)" },
    { name: "Middle([1,2,3,4,5]) is [2,3,4]", code: "\t\texpect_eq(Middle([]int{1, 2, 3, 4, 5}), []int{2, 3, 4})" },
    { name: "Middle([9,9]) is []", code: "\t\texpect_eq(len(Middle([]int{9, 9})), 0)" },
  ],

  solution: `func Doubled(xs []int) []int {
	out := make([]int, len(xs))
	for i, x := range xs {
		out[i] = x * 2
	}
	return out
}

func Total(xs []int) int {
	sum := 0
	for _, x := range xs {
		sum += x
	}
	return sum
}

func Middle(xs []int) []int {
	return xs[1 : len(xs)-1]
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Go</th></tr>
  <tr><td>Literal</td><td><code>vec![1, 2, 3]</code></td><td><code>[]int{1, 2, 3}</code></td></tr>
  <tr><td>Append</td><td><code>xs.push(x)</code></td><td><code>xs = append(xs, x)</code></td></tr>
  <tr><td>Length</td><td><code>xs.len()</code></td><td><code>len(xs)</code></td></tr>
  <tr><td>Pre-size</td><td><code>vec![0; n]</code></td><td><code>make([]int, n)</code></td></tr>
  <tr><td>Sub-slice</td><td><code>&amp;xs[a..b]</code></td><td><code>xs[a:b]</code></td></tr>
  <tr><td>Iterate</td><td><code>for x in &amp;xs</code></td><td><code>for _, x := range xs</code></td></tr>
</table>
<p>Two habits to build. First, <code>append</code> returns a value — forgetting
the assignment is the classic beginner bug; there's no borrow checker to catch
it for you the way Rust would flag a dropped return value from a non-mutating
method. Second, slicing with <code>xs[a:b]</code> does <em>not</em> copy: the
result shares the same backing array, so writing through one can be seen
through the other — behavior Rust would normally forbid without an explicit
<code>&amp;mut</code> borrow, but Go's garbage collector and lack of aliasing
rules let it happen silently. That's why idiomatic Go functions that transform
data build and return a <em>new</em> slice (via <code>make</code> or
<code>append</code>) rather than mutating in place — exactly what <code>Doubled</code>
does here. When you truly need an independent copy, use the built-in
<code>copy(dst, src)</code>, Go's answer to Rust's <code>.to_vec()</code> or
<code>.clone()</code>.</p>`,
