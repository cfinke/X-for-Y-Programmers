  title: "Pointers",

  intro: `
<p>Rust never lets you forget about references: <code>&T</code> is a shared,
read-only borrow and <code>&mut T</code> is an exclusive, mutable borrow, and
the borrow checker enforces at compile time that only one <code>&mut</code>
(or any number of <code>&</code>) exists at a time. Go has pointers, not
borrows — the same address-of-and-dereference machinery, but with none of the
compile-time aliasing rules. A Go pointer is a plain value that can alias
freely, be reassigned to point anywhere, or be <code>nil</code>, and the
compiler won't stop you from writing through it while something else reads it.</p>
<p>A pointer is a value that holds the address of another value. <code>&x</code>
takes the address of <code>x</code>; <code>*p</code> <em>dereferences</em> —
reads or writes the value at that address. The type <code>*int</code> means
"pointer to an int". Every pointer's zero value is <code>nil</code> (there is
no <code>Option</code> wrapper around it — a <code>*T</code> is nilable by
default), and dereferencing a <code>nil</code> pointer panics, so you guard
with <code>if p == nil</code> instead of matching on <code>None</code>.</p>
<table>
  <tr><th>Rust</th><th>Go</th></tr>
  <tr><td><code>&T</code> / <code>&mut T</code> borrow, taken with <code>&x</code> / <code>&mut x</code></td><td><code>*T</code> pointer, taken with <code>&amp;x</code></td></tr>
  <tr><td><code>*p</code> reads/writes the pointee (through a borrow)</td><td><code>*p</code> reads/writes the pointee</td></tr>
  <tr><td><code>Option<&T></code> — no null borrows</td><td><code>nil</code> (the zero value of a pointer)</td></tr>
  <tr><td><code>fn f(p: &mut i32)</code> mutates the caller's int</td><td><code>func f(p *int)</code> can mutate the caller's int</td></tr>
  <tr><td><code>fn m(&mut self)</code> mutates the receiver</td><td>pointer receiver <code>func (a *T) M()</code></td></tr>
</table>
<p>Go copies arguments by default, so to let a function change a caller's value you
pass a pointer to it — the same idea as taking <code>&mut i32</code> in Rust,
except Go's compiler does not check that no one else is reading the value at the
same time. The same idea drives <strong>pointer receivers</strong>: a
method declared on <code>*T</code> can mutate the struct it is called on, while a
method on <code>T</code> only sees a copy, mirroring Rust's <code>&mut self</code>
versus plain <code>self</code>. Go conveniently lets you call a pointer
method on an addressable value: <code>a.Deposit(50)</code> is shorthand for
<code>(&amp;a).Deposit(50)</code>, much like Rust's automatic <code>&mut</code>
insertion when you call a <code>&mut self</code> method through auto-ref. There is
no pointer arithmetic in Go — you can only take an address, dereference it, or
compare against <code>nil</code>.</p>`,

  rust: `// Structs: mutation through a &mut reference works.
struct Account {
    balance: i32,
}

fn deposit(a: &mut Account, amount: i32) {
    a.balance += amount;
}

// i32 is Copy, so this can't touch the caller's variable.
fn double(mut n: i32) {
    n = n * 2; // no effect outside
}`,

  task: `

</ol>`,

  requirements: [

  tests: [
    { name: "Double doubles the caller's int", code: "\t\tx := 5\n\t\tDouble(&x)\n\t\texpect_eq(x, 10)" },
    { name: "Double works on zero", code: "\t\tn := 0\n\t\tDouble(&n)\n\t\texpect_eq(n, 0)" },
    { name: "Deposit mutates the account", code: "\t\ta := Account{Balance: 100}\n\t\ta.Deposit(50)\n\t\texpect_eq(a.Balance, 150)" },
    { name: "Deposit accumulates", code: "\t\ta := Account{Balance: 0}\n\t\ta.Deposit(10)\n\t\ta.Deposit(5)\n\t\texpect_eq(a.Balance, 15)" },
    { name: "ValueOr dereferences a non-nil pointer", code: "\t\tn := 42\n\t\texpect_eq(ValueOr(&n, 0), 42)" },
    { name: "ValueOr returns the fallback for nil", code: "\t\texpect_eq(ValueOr(nil, 7), 7)" },

  solution: `func Double(p *int) {
	*p = *p * 2
}

type Account struct {
	Balance int
}

func (a *Account) Deposit(amount int) {
	a.Balance += amount
}

func ValueOr(p *int, fallback int) int {
	if p == nil {
		return fallback
	}
	return *p
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Go</th></tr>
  <tr><td>Take an address</td><td><code>&amp;x</code> / <code>&amp;mut x</code></td><td><code>p := &amp;x</code></td></tr>
  <tr><td>Read the pointee</td><td>auto-deref, or <code>*p</code></td><td><code>v := *p</code></td></tr>
  <tr><td>Write the pointee</td><td><code>*p = 10</code> (through a <code>&amp;mut</code>)</td><td><code>*p = 10</code></td></tr>
  <tr><td>Null pointer</td><td><code>Option::None</code></td><td><code>nil</code></td></tr>
  <tr><td>Mutate caller's value</td><td><code>fn f(p: &amp;mut i32)</code></td><td><code>func f(p *int)</code></td></tr>
  <tr><td>Mutating method</td><td><code>fn m(&amp;mut self)</code></td><td><code>func (a *T) M()</code></td></tr>
</table>
<p>Rules of thumb: use a <strong>pointer receiver</strong> when a method needs to
modify the struct (or when the struct is large and you want to avoid copying it),
and be consistent — if one method on a type uses a pointer receiver, give them all
pointer receivers. When you build a struct you plan to mutate, keep a pointer to it
(<code>a := &amp;Account{}</code>) so every method call shares the same value —
the same discipline as holding a single <code>&amp;mut Account</code> in Rust. And
because a <code>nil</code> pointer panics on dereference, treat <code>*p</code> the
way you'd treat <code>.unwrap()</code> on a <code>None</code> in Rust: check first
(<code>if p == nil</code>) unless you know it's set — Go just won't stop you at
compile time the way the borrow checker would.</p>`,
