<title>Lesson 4: Object Types &amp; Type Aliases</title>
<link rel="stylesheet" href="../../shared/css/style.css">
</head>
<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 4,
  title: "Object Types & Type Aliases",

  intro: `
<p>Most JavaScript data is object literals, and most object bugs are typos:
read <code>user.contact.citty</code> and you get <code>undefined</code>, not
an error. TypeScript lets you write down an object's shape —
<code>{ name: string; age: number }</code> — and then every property access
is checked against it. Shapes nest exactly like the objects they describe,
so a typo'd property anywhere in the chain becomes a compile error at the
line that made it.</p>
<table>
  <tr><th>JavaScript</th><th>TypeScript</th></tr>
  <tr><td><code>const u = { name: "Ada", age: 36 };</code></td><td><code>const u: { name: string; age: number } = ...;</code></td></tr>
  <tr><td>shape lives in your head</td><td><code>type User = { name: string; age: number };</code></td></tr>
  <tr><td><code>u.nmae</code> → <code>undefined</code></td><td><code>u.nmae</code> → compile error</td></tr>
  <tr><td><code>const inv = { apples: 3 };</code> as a dictionary</td><td><code>const inv: Record&lt;string, number&gt; = { apples: 3 };</code></td></tr>
</table>
<p>Writing <code>{ name: string; age: number }</code> inline at every
function signature gets old immediately, so TypeScript lets you name a shape
once with a <em>type alias</em>: <code>type User = { ... }</code>. An alias
is purely a compile-time name — it produces zero JavaScript output — but it
turns your signatures into documentation: <code>formatUser(user: User)</code>
says everything.</p>
<p>Finally, the dictionary-style object — string keys you don't know in
advance, uniform values — gets its own idiom:
<code>Record&lt;string, number&gt;</code> means "any string keys, every value
a number". That's the typed version of the plain-object-as-map pattern you
already use everywhere.</p>`,

  javascript: `const ada = {
  name: "Ada",
  age: 36,
  contact: { email: "ada@example.com", city: "London" },
};

function formatUser(user) {
  // Typo: "citty" — JavaScript shrugs and returns undefined
  return user.name + " (" + user.age + ") from " + user.contact.citty;
}

formatUser(ada); // "Ada (36) from undefined"

const inventory = { apples: 3, pears: 2 };

function countItems(inv) {
  let total = 0;
  for (const key in inv) total += inv[key];
  return total;
}`,

  task: `
<p>Give the code its shapes:</p>
<ol>
  <li>Define a type alias <code>User</code> for the shape
      <code>{ name: string; age: number; contact: { email: string; city: string } }</code>
      — note the nested <code>contact</code> shape.</li>
  <li>Declare the constant <code>ada</code> annotated as <code>: User</code>,
      with the same values.</li>
  <li>Write <code>formatUser(user: User): string</code> returning
      <code>"Ada (36) from London"</code> — name, age in parentheses,
      then <code>from</code> and the contact city. (Fix the typo: with the
      alias in place, <code>citty</code> wouldn't compile.)</li>
  <li>Define a type alias <code>Inventory</code> as
      <code>Record&lt;string, number&gt;</code>, and write
      <code>countItems(inv: Inventory): number</code> returning the sum of
      all the values.</li>
</ol>`,

  starter: `// 1. Define the alias:
//    type User = { name: string; age: number; contact: { ... } };


// 2. Define the dictionary alias:
//    type Inventory = Record<string, number>;


// 3. Annotate ada as : User.
const ada = {
  name: "Ada",
  age: 36,
  contact: { email: "ada@example.com", city: "London" },
};

// 4. Type the parameters and return values below.
function formatUser(user) {
  // TODO: return "<name> (<age>) from <city>"
  return "";
}

function countItems(inv) {
  let total = 0;
  for (const key in inv) {
    total += inv[key];
  }
  return total;
}
`,

  exportNames: ["ada", "formatUser", "countItems"],

  requirements: [
    { pattern: /type\s+User\s*=\s*\{/, message: "Define a type alias: type User = { ... }" },
    { pattern: /contact\s*:\s*\{/, message: "Give User a nested contact shape: contact: { email: string; city: string }" },
    { pattern: /Record\s*<\s*string\s*,\s*number\s*>/, message: "Define Inventory using Record<string, number>" },
    { pattern: /user\s*:\s*User/, message: "Annotate formatUser's parameter as user: User" },
  ],

  tests: [
    { name: "ada has the full nested shape", run: (x) => expectDeepEqual(x.ada, { name: "Ada", age: 36, contact: { email: "ada@example.com", city: "London" } }) },
    { name: 'formatUser(ada) returns "Ada (36) from London"', run: (x) => expectEqual(x.formatUser(x.ada), "Ada (36) from London") },
    { name: "formatUser works on another User", run: (x) => expectEqual(x.formatUser({ name: "Grace", age: 85, contact: { email: "grace@example.com", city: "Arlington" } }), "Grace (85) from Arlington") },
    { name: "countItems({ apples: 3, pears: 2 }) returns 5", run: (x) => expectEqual(x.countItems({ apples: 3, pears: 2 }), 5) },
    { name: "countItems({}) returns 0", run: (x) => expectEqual(x.countItems({}), 0) },
  ],

  solution: `type User = {
  name: string;
  age: number;
  contact: {
    email: string;
    city: string;
  };
};

type Inventory = Record<string, number>;

const ada: User = {
  name: "Ada",
  age: 36,
  contact: { email: "ada@example.com", city: "London" },
};

function formatUser(user: User): string {
  return user.name + " (" + user.age + ") from " + user.contact.city;
}

function countItems(inv: Inventory): number {
  let total = 0;
  for (const key in inv) {
    total += inv[key];
  }
  return total;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>TypeScript</th></tr>
  <tr><td>Object shape</td><td>implicit, in your head</td><td><code>{ name: string; age: number }</code></td></tr>
  <tr><td>Naming a shape</td><td>a comment, maybe</td><td><code>type User = { ... };</code> (erased at compile time)</td></tr>
  <tr><td>Nested objects</td><td>nest literals</td><td>nest shapes: <code>contact: { city: string }</code></td></tr>
  <tr><td>Typo'd property</td><td><code>undefined</code> at runtime</td><td>compile error at the exact line</td></tr>
  <tr><td>Object as dictionary</td><td><code>{ apples: 3 }</code></td><td><code>Record&lt;string, number&gt;</code></td></tr>
  <tr><td>Missing property on assign</td><td>silently absent</td><td>compile error — the shape is a contract</td></tr>
</table>
<p>A type alias costs nothing at runtime — <code>type User = ...</code>
compiles to no JavaScript at all, so there is no reason to hoard them. The
practical habit: the moment an object shape appears in two signatures, or an
inline shape wraps to a second line, give it a name. Your function
signatures become self-documenting, and the shape has exactly one place to
change.</p>`,
};
</script>
