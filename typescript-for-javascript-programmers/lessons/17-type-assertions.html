<title>Lesson 17: Type Assertions &amp; unknown vs any</title>
<link rel="stylesheet" href="../../shared/css/style.css">

<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 17,
  title: "Type Assertions & unknown vs any",

  intro: `
<p>Sometimes you genuinely know more than the compiler. You know the JSON
your server sends, you know that <code>getElementById("save")</code> is a
button. A <em>type assertion</em> — <code>value as SomeType</code> — is you
telling TypeScript "trust me on this one". It changes nothing at runtime;
it only overrides the compiler's opinion. That makes it powerful and
dangerous in equal measure: assert wrongly and you've smuggled a lie past
the type checker.</p>
<table>
  <tr><th>JavaScript</th><th>TypeScript</th></tr>
  <tr><td><code>JSON.parse(text)</code> → whatever</td><td><code>JSON.parse(text)</code> → <code>any</code> (checker off!)</td></tr>
  <tr><td>trust the data blindly</td><td><code>unknown</code> → must check before using</td></tr>
  <tr><td>"I know what this is"</td><td><code>value as Config</code> — assertion, zero runtime cost</td></tr>
  <tr><td>"it won't be null here"</td><td><code>element!</code> — non-null assertion, use sparingly</td></tr>
</table>
<p>The safer default for untrusted data is <code>unknown</code>. Where
<code>any</code> lets you call anything on the value with no complaints,
<code>unknown</code> is the opposite: you can do <em>nothing</em> with it
until you narrow it — with <code>typeof</code>, <code>null</code> checks, or
a carefully scoped assertion. The winning pattern for JSON:
parse to <code>unknown</code>, verify the shape field by field, and only
then return the typed value. The <code>as</code> lives in one small,
auditable spot instead of being sprayed across the codebase.</p>`,

  javascript: `// JSON.parse returns... whatever. You find out at runtime.
var config = JSON.parse(text);
console.log(config.theme.toUpperCase()); // hope it exists, hope it's a string

// And malformed JSON just throws:
var data = JSON.parse("not json"); // SyntaxError, program down

// The usual defense: ad-hoc checks, easy to forget one
function parseConfig(text) {
  try {
    var raw = JSON.parse(text);
    if (raw && typeof raw.theme === "string" &&
        typeof raw.fontSize === "number") {
      return raw;
    }
  } catch (e) {}
  return null;
}`,

  task: `
<p>Build a safe pipeline from raw JSON text to a typed <code>Config</code>:</p>
<ol>
  <li>Keep the provided <code>interface Config</code> with
      <code>theme: string</code> and <code>fontSize: number</code>.</li>
  <li>Write <code>safeParse(json: string): unknown</code> — call
      <code>JSON.parse</code> inside <code>try/catch</code> and return
      <code>null</code> if parsing throws. Returning <code>unknown</code>
      (not <code>any</code>) forces every caller to check before touching
      the result.</li>
  <li>Write <code>parseConfig(json: string): Config | null</code> — use
      <code>safeParse</code>, verify the value is a non-null object, assert
      it <code>as Record&lt;string, unknown&gt;</code> so you can index into
      it, then check <code>typeof</code> of both fields. Return a
      <code>Config</code> on success, <code>null</code> on any mismatch.</li>
</ol>
<p>Notice the one <code>as</code>: it only claims "this is an object I can
index", never "this is a Config" — the fields still get checked for real.</p>`,

  starter: `interface Config {
  theme: string;
  fontSize: number;
}

// 1. Wrap JSON.parse so it never throws and returns unknown, not any.
//    TODO: change the return type to unknown; add try/catch returning null.
function safeParse(json: string): any {
  return JSON.parse(json);
}

// 2. Narrow the unknown value down to a Config, or return null.
function parseConfig(json: string): Config | null {
  const data = safeParse(json);
  // TODO: reject anything that is not a non-null object
  // TODO: assert data as Record<string, unknown>, then verify
  //       typeof theme === "string" and typeof fontSize === "number"
  return null;
}
`,

  exportNames: ["safeParse", "parseConfig"],

  requirements: [
    { pattern: /safeParse\s*\(\s*json\s*:\s*string\s*\)\s*:\s*unknown/, message: "Give safeParse the return type unknown" },
    { pattern: /\bas\s+\w/, message: "Use one type assertion (value as SomeType) to index into the parsed object" },
    { pattern: /typeof/, message: "Narrow the fields with typeof checks before trusting them" },
  ],

  tests: [
    {
      name: "safeParse parses valid JSON",
      run: (x) => expectDeepEqual(x.safeParse('{"a": 1, "b": [2, 3]}'), { a: 1, b: [2, 3] }),
    },
    {
      name: 'safeParse("not json at all") returns null instead of throwing',
      run: (x) => expectEqual(x.safeParse("not json at all"), null),
    },
    {
      name: "parseConfig accepts a valid config",
      run: (x) => expectDeepEqual(x.parseConfig('{"theme": "dark", "fontSize": 14}'), { theme: "dark", fontSize: 14 }),
    },
    {
      name: "parseConfig rejects a config with a missing field",
      run: (x) => expectEqual(x.parseConfig('{"theme": "dark"}'), null),
    },
    {
      name: "parseConfig rejects wrong field types",
      run: (x) => {
        expectEqual(x.parseConfig('{"theme": "dark", "fontSize": "big"}'), null);
        expectEqual(x.parseConfig('"just a string"'), null);
      },
    },
    {
      name: "parseConfig returns null on malformed JSON",
      run: (x) => expectEqual(x.parseConfig("{theme: dark"), null),
    },
  ],

  solution: `interface Config {
  theme: string;
  fontSize: number;
}

function safeParse(json: string): unknown {
  try {
    return JSON.parse(json);
  } catch (err) {
    return null;
  }
}

function parseConfig(json: string): Config | null {
  const data = safeParse(json);
  if (typeof data !== "object" || data === null) {
    return null;
  }
  const record = data as Record<string, unknown>;
  if (typeof record.theme === "string" && typeof record.fontSize === "number") {
    return { theme: record.theme, fontSize: record.fontSize };
  }
  return null;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>TypeScript</th></tr>
  <tr><td>"Trust me" cast</td><td>n/a — everything is trusted</td><td><code>value as Config</code> (no runtime effect)</td></tr>
  <tr><td>Untrusted data</td><td>use it and pray</td><td><code>unknown</code> — unusable until narrowed</td></tr>
  <tr><td>Checker escape hatch</td><td>n/a</td><td><code>any</code> — checker off, avoid for input data</td></tr>
  <tr><td>DOM lookup</td><td><code>document.getElementById("save")</code></td><td><code>... as HTMLButtonElement</code> when you know the tag</td></tr>
  <tr><td>"Not null here, promise"</td><td>n/a</td><td><code>element!</code> — prefer a real null check</td></tr>
  <tr><td>JSON pipeline</td><td>parse, then hope</td><td>parse to <code>unknown</code> → narrow → typed value</td></tr>
</table>
<p>The rule of thumb: <code>any</code> says "stop checking me",
<code>unknown</code> says "check me before use", and <code>as</code> says
"I checked, in a way you can't see". Reach for <code>unknown</code> at every
boundary where data enters the program, and keep each <code>as</code> small
and adjacent to the runtime checks that justify it — an assertion without a
nearby check is just a comment that lies with confidence.</p>`,
};
