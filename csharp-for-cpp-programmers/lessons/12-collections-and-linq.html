  intro: `
<p>You already know C++'s <code>&lt;algorithm&gt;</code> functions —
<code>std::copy_if</code>/<code>remove_if</code>, <code>std::transform</code>,
<code>std::sort</code>, <code>std::accumulate</code>, <code>std::find_if</code>.
C# has the exact same idea under the name <strong>LINQ</strong> (Language
Integrated Query), a set of extension methods over <code>IEnumerable&lt;T&gt;</code>
that live in the <code>System.Linq</code> namespace. The operations map almost
one-to-one, and the lambdas look familiar, but LINQ chains read left-to-right
as method calls instead of standalone functions taking iterator pairs.</p>
<table>
  <tr><th>C++ (&lt;algorithm&gt;)</th><th>C# (LINQ)</th></tr>
  <tr><td><code>std::copy_if(first, last, out, pred)</code></td><td><code>arr.Where(x =&gt; pred(x))</code></td></tr>
  <tr><td><code>std::transform(first, last, out, f)</code></td><td><code>arr.Select(x =&gt; f(x))</code></td></tr>
  <tr><td><code>std::sort(first, last, cmp)</code></td><td><code>arr.OrderBy(x =&gt; x)</code></td></tr>
  <tr><td><code>std::find_if(first, last, pred)</code></td><td><code>arr.FirstOrDefault(pred)</code></td></tr>
  <tr><td><code>std::any_of(...)</code> / <code>std::all_of(...)</code></td><td><code>arr.Any(p)</code> / <code>arr.All(p)</code></td></tr>
  <tr><td><code>std::accumulate(first, last, seed, f)</code></td><td><code>arr.Aggregate(seed, f)</code></td></tr>
</table>
<p>Two differences worth internalizing. First, LINQ operators are
<strong>lazy</strong> — <code>Where</code> and <code>Select</code> return a
deferred <code>IEnumerable&lt;T&gt;</code> that only runs when you enumerate it,
so you finish a query with <code>ToList()</code> or <code>ToDictionary(...)</code>
to snapshot the results. This is closer to C++20's <code>&lt;ranges&gt;</code>
views than to the classic <code>&lt;algorithm&gt;</code> functions, which run
eagerly and write into an output range you provide. Second, sorting is
out-of-place and composable: <code>OrderBy</code> gives the primary key and
<code>ThenBy</code> adds tie-breakers, instead of one comparator lambda with a
hand-written tie-break branch like <code>a.price != b.price ? a.price &lt; b.price
: a.name &lt; b.name</code>.</p>`,

  cpp: `struct Product {
  std::string name, category;
  double price;
  int stock;
};

std::vector<std::string> namesUnder(std::vector<Product> products, double max) {
  products.erase(
    std::remove_if(products.begin(), products.end(),
      [max](const Product& p) { return p.price >= max; }),
    products.end());

  std::sort(products.begin(), products.end(), [](const Product& a, const Product& b) {
    return a.price != b.price ? a.price < b.price : a.name < b.name;
  });

  std::vector<std::string> names;
  std::transform(products.begin(), products.end(), std::back_inserter(names),
    [](const Product& p) { return p.name; });
  return names;
}

double total = std::accumulate(products.begin(), products.end(), 0.0,
  [](double sum, const Product& p) { return sum + p.price * p.stock; });`,

  solution: `class Product {
  public string Name { get; set; }
  public string Category { get; set; }
  public double Price { get; set; }
  public int Stock { get; set; }
  public Product(string name, string category, double price, int stock) {
    Name = name;
    Category = category;
    Price = price;
    Stock = stock;
  }
}

static class Catalog {
  public static List<Product> Sample() {
    return new List<Product> {
      new Product("Apple", "Food", 1.5, 10),
      new Product("Bread", "Food", 2.5, 0),
      new Product("Notebook", "Office", 3.0, 5),
      new Product("Pen", "Office", 1.0, 20),
      new Product("Desk", "Furniture", 100.0, 2),
    };
  }

  public static List<string> NamesUnder(List<Product> products, double maxPrice) {
    return products
      .Where(p => p.Price < maxPrice)
      .OrderBy(p => p.Price)
      .ThenBy(p => p.Name)
      .Select(p => p.Name)
      .ToList();
  }

  public static double TotalValue(List<Product> products) {
    return products.Sum(p => p.Price * p.Stock);
  }

  public static string Cheapest(List<Product> products) {
    Product p = products.OrderBy(x => x.Price).FirstOrDefault();
    return p == null ? "" : p.Name;
  }

  public static bool AnyExpensive(List<Product> products, double threshold) {
    return products.Any(p => p.Price > threshold);
  }

  public static bool AllInStock(List<Product> products) {
    return products.All(p => p.Stock > 0);
  }

  public static int CountIn(List<Product> products, string category) {
    return products.Count(p => p.Category == category);
  }

  public static Dictionary<string, int> CategoryCounts(List<Product> products) {
    return products
      .GroupBy(p => p.Category)
      .ToDictionary(g => g.Key, g => g.Count());
  }

  public static string Summary(List<Product> products) {
    return products.Aggregate("", (acc, p) => acc == "" ? p.Name : acc + ", " + p.Name);
  }
}

  notes: `
<table>
  <tr><th>Operation</th><th>C++</th><th>C# / LINQ</th></tr>
  <tr><td>Filter</td><td><code>std::copy_if</code> / <code>remove_if</code></td><td><code>Where(p)</code></td></tr>
  <tr><td>Project</td><td><code>std::transform(f)</code></td><td><code>Select(f)</code></td></tr>
  <tr><td>Sort (primary + tie-break)</td><td>one comparator lambda</td><td><code>OrderBy(...).ThenBy(...)</code></td></tr>
  <tr><td>First match</td><td><code>std::find_if</code></td><td><code>First</code> / <code>FirstOrDefault</code></td></tr>
  <tr><td>Exists / for-all</td><td><code>std::any_of</code> / <code>std::all_of</code></td><td><code>Any</code> / <code>All</code></td></tr>
  <tr><td>Count</td><td><code>std::count_if(p)</code></td><td><code>Count(p)</code></td></tr>
  <tr><td>Sum</td><td><code>std::accumulate(...,0,plus)</code></td><td><code>Sum(f)</code></td></tr>
  <tr><td>Fold</td><td><code>std::accumulate(first,last,seed,f)</code></td><td><code>Aggregate(seed, f)</code></td></tr>
  <tr><td>Group</td><td>manual <code>std::unordered_map</code> loop</td><td><code>GroupBy(k)</code></td></tr>
  <tr><td>Materialize</td><td>already a <code>std::vector</code></td><td><code>ToList()</code> / <code>ToDictionary(...)</code></td></tr>
</table>
<p><code>First</code> vs <code>FirstOrDefault</code> mirrors the difference between
assuming a match and handling its absence: <code>First</code> throws on an empty
sequence, while <code>FirstOrDefault</code> returns the type's default
(<code>null</code> for a class, <code>0</code> for an <code>int</code>) — the
closest analog to C++'s <code>std::find_if</code> returning the <code>end()</code>
iterator instead of a sentinel value you'd have to check for. The fold's
argument order should already feel natural: C++'s
<code>std::accumulate(first, last, seed, fn)</code> puts the seed before the
function, matching <code>Aggregate(seed, fn)</code> rather than a
callback-first signature.</p>
<p>Because LINQ is lazy, a chain like <code>Where(...).Select(...)</code> does no
work until something enumerates it. A stray <code>Count()</code> or a second
<code>foreach</code> re-runs the whole pipeline, so call <code>ToList()</code>
once when you need to iterate the result more than once — the same reason you'd
materialize a C++20 <code>&lt;ranges&gt;</code> view chain into a
<code>std::vector</code> rather than letting it re-evaluate the pipeline on
every pass.</p>`,
