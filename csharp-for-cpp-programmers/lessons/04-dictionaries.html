  title: "Dictionaries",

  intro: `
<p>In C++ you reach for <code>std::map</code> or <code>std::unordered_map</code>
when you need key/value lookups. C#'s workhorse is <code>Dictionary&lt;K, V&gt;</code> — a real
generic type where both the key and value types are fixed at compile time. It is
closest to C++'s <code>std::unordered_map&lt;K, V&gt;</code>, not the ordered
<code>std::map</code>, because both are hash-based and iteration order is not
guaranteed.</p>
<table>
  <tr><th>C++</th><th>C#</th></tr>
  <tr><td><code>std::unordered_map&lt;std::string, int&gt; m;</code></td><td><code>new Dictionary&lt;string, int&gt;()</code></td></tr>
  <tr><td><code>m["a"] = 1;</code></td><td><code>d["a"] = 1;</code> or <code>d.Add("a", 1)</code></td></tr>
  <tr><td><code>m.at("a")</code></td><td><code>d["a"]</code> (throws if absent)</td></tr>
  <tr><td><code>m.count("a")</code></td><td><code>d.ContainsKey("a")</code></td></tr>
  <tr><td><code>m.size()</code></td><td><code>d.Count</code></td></tr>
</table>
<p>One sharp edge: C++'s own indexer <code>m["a"]</code> <em>inserts</em> a
default-constructed value when the key is missing rather than throwing, while
<code>m.at("a")</code> throws <code>std::out_of_range</code> instead. C#'s
indexer <code>d["a"]</code> <em>throws</em> <code>KeyNotFoundException</code> when
the key is missing — there is no silent-insert behavior to watch out for. The
idiomatic safe lookup is <code>TryGetValue(key, out value)</code>, which returns a
<code>bool</code> and hands you the value through an <code>out</code> parameter,
much like checking <code>m.find(key) != m.end()</code> in C++.
Assigning through the indexer (<code>d["a"] = 1</code>) inserts or overwrites,
while <code>Add</code> throws if the key already exists.</p>`,

  cpp: `#include <unordered_map>
#include <string>

std::unordered_map<std::string, int> scores = {
  {"Ada", 90},
  {"Rob", 75},
};

int get(const std::unordered_map<std::string, int>& m, const std::string& name) {
  auto it = m.find(name);
  return it != m.end() ? it->second : 0;
}

int total(const std::unordered_map<std::string, int>& m) {
  int sum = 0;
  for (const auto& [key, value] : m) sum += value;
  return sum;
}`,

</ol>`,

  requirements: [
    { pattern: /TryGetValue/, message: "Use TryGetValue(name, out ...) for the safe lookup" },

  tests: [
    { name: "Build() has 3 entries", code: "      expect_eq(Scores.Build().Count, 3);" },
    { name: "Build()[\"Ada\"] is 90", code: "      expect_eq(Scores.Build()[\"Ada\"], 90);" },
    { name: "GetOrZero for present key", code: "      expect_eq(Scores.GetOrZero(Scores.Build(), \"Rob\"), 75);" },
    { name: "GetOrZero for missing key is 0", code: "      expect_eq(Scores.GetOrZero(Scores.Build(), \"Nobody\"), 0);" },
    { name: "Total sums all values", code: "      expect_eq(Scores.Total(Scores.Build()), 253);" },

  solution: `static class Scores {
  public static Dictionary<string, int> Build() {
    return new Dictionary<string, int> {
      { "Ada", 90 },
      { "Rob", 75 },
      { "Grace", 88 },
    };
  }

  public static int GetOrZero(Dictionary<string, int> dict, string name) {
    if (dict.TryGetValue(name, out int score)) {
      return score;
    }
    return 0;
  }

  public static int Total(Dictionary<string, int> dict) {
    int sum = 0;
    foreach (KeyValuePair<string, int> entry in dict) {
      sum += entry.Value;
    }
    return sum;
  }

  public static int Count(Dictionary<string, int> dict) {
    return dict.Count;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++ (unordered_map)</th><th>C#</th></tr>
  <tr><td>Create + fill</td><td><code>std::unordered_map&lt;std::string,int&gt; m = {{"a", 1}};</code></td><td><code>new Dictionary&lt;string,int&gt; { { "a", 1 } }</code></td></tr>
  <tr><td>Insert/overwrite</td><td><code>m["a"] = 1;</code></td><td><code>d["a"] = 1;</code></td></tr>
  <tr><td>Insert (fail if exists)</td><td><code>m.insert({"a", 1})</code> (no-op, returns bool)</td><td><code>d.Add("a", 1)</code> (throws)</td></tr>
  <tr><td>Safe read</td><td><code>m.find("a") != m.end()</code></td><td><code>d.TryGetValue("a", out v)</code></td></tr>
  <tr><td>Has key</td><td><code>m.count("a")</code></td><td><code>d.ContainsKey("a")</code></td></tr>
  <tr><td>Iterate</td><td><code>for (const auto&amp; [k, v] : m)</code></td><td><code>foreach (var kv in d)</code> → <code>kv.Key</code>, <code>kv.Value</code></td></tr>
</table>
<p>The <code>out</code> parameter on <code>TryGetValue</code> is the pattern to
memorize: you can declare the variable inline (<code>out int score</code>) right
at the call site. When the key is missing, the <code>out</code> value is set to
the type's default (<code>0</code> for <code>int</code>), so some code even skips
checking the returned <code>bool</code> — but relying on that hides the
missing-key case. Prefer the explicit <code>if (dict.TryGetValue(...))</code>
form. For iteration, each element is a <code>KeyValuePair&lt;K, V&gt;</code> with
read-only <code>Key</code> and <code>Value</code> properties; you can also loop
<code>dict.Keys</code> or <code>dict.Values</code> directly.</p>`,
};
