  title: "Inheritance & Abstract Classes",

  intro: `
<p>C++ and C# both grow class hierarchies with <code>:</code>-based inheritance,
constructors that chain to a parent, and members that opt in to being overridden.
The difference is enforcement. In C++, a base method becomes overridable simply by
marking it <code>virtual</code>; the derived class's <code>override</code> specifier
is optional tooling that catches signature mismatches — skip it, and a typo quietly
declares a <em>new</em> method that hides the base one instead of overriding it, with
no compiler error. C# runs the same base rule (<code>virtual</code>/<code>abstract</code>)
but makes <code>override</code> mandatory in the subclass, so a mismatch is always
caught at compile time.</p>
<table>
  <tr><th>C++</th><th>C#</th></tr>
  <tr><td><code>class Dog : public Animal {}</code></td><td><code>class Dog : Animal {}</code></td></tr>
  <tr><td><code>Dog(std::string n) : Animal(n) {}</code></td><td><code>: base(name)</code> (constructor)</td></tr>
  <tr><td><code>class Shape { virtual double area() const = 0; };</code> (abstract via pure virtual)</td><td><code>abstract class Shape {}</code></td></tr>
  <tr><td><code>virtual double area() const = 0;</code></td><td><code>public abstract double Area();</code></td></tr>
  <tr><td><code>double area() const override</code> (optional)</td><td><code>public override double Area()</code> (required)</td></tr>
  <tr><td><code>class Square final : public Shape {}</code> / <code>double area() const final</code></td><td><code>sealed class</code> / <code>sealed override</code></td></tr>
</table>
<p>Three things to internalize. First, the base-constructor call in C++ happens in
the member-initializer list — <code>Dog(std::string n) : Animal(n) {}</code> — which
is the same colon-after-signature shape as C#'s <code>: base(name)</code>, so this
part transfers directly. Second, C++ only requires <code>virtual</code> on the base;
<code>override</code> on the child is optional but should always be written, since
without it a mismatched override silently becomes an unrelated hidden method. C#
forces the issue by making <code>override</code> mandatory. Third, <code>final</code>
in C++ stops further subclassing (on a class) or further overriding (on a method),
the same role <code>sealed</code> plays in C#. Polymorphism works the same as C++: a
<code>Shape&amp;</code> or <code>Shape*</code> referring to a <code>Circle</code>
calls <code>Circle</code>'s override — but only through a pointer or reference;
accessing by value slices the object down to <code>Shape</code>.</p>`,

  cpp: `class Shape {
public:
  explicit Shape(std::string name) : name_(std::move(name)) {}
  virtual ~Shape() = default;
  virtual double area() const = 0;
  std::string describe() const {
    return name_ + " has area " + std::to_string(area());
  }
protected:
  std::string name_;
};

class Rectangle : public Shape {
public:
  Rectangle(double w, double h) : Shape("Rectangle"), w_(w), h_(h) {}
  double area() const override { return w_ * h_; }
private:
  double w_, h_;
};`,

  task: `
<p>Build a small shape hierarchy that shows off inheritance, abstract members,
constructor chaining, and polymorphism.</p>
<ol>
  <li>Declare an <code>abstract class Shape</code> with a read-only
      <code>string Name</code> property set through a <code>protected</code>
      constructor <code>Shape(string name)</code>.</li>
  <li>Give <code>Shape</code> an <code>abstract double Area()</code> (no body) and a
      <code>virtual string Describe()</code> that returns
      <code>$"{Name} has area {Area()}"</code>.</li>
  <li><code>Rectangle : Shape</code> — constructor
      <code>Rectangle(double width, double height) : base("Rectangle")</code>,
      overriding <code>Area()</code> to return <code>Width * Height</code>.</li>
  <li><code>Square : Shape</code> — mark it <code>sealed</code>, chain
      <code>: base("Square")</code>, <code>override Area()</code> to return
      <code>Side * Side</code>, and <code>override Describe()</code> to return
      <code>$"Square with side {Side}"</code>.</li>
</ol>`,

`,

  requirements: [
    { pattern: /abstract\s+double\s+Area/, message: "Declare Area() as an abstract method on Shape" },
    { pattern: /override\s+double\s+Area/, message: "Override Area() with the override keyword in each subclass" },
    { pattern: /:\s*base\(/, message: "Chain to the base constructor with : base(...)" },
  ],

  tests: [
    { name: "Rectangle(3, 4).Area() is 12", code: "      expect_eq(new Rectangle(3, 4).Area(), 12.0);" },
    { name: "Square(5).Area() is 25", code: "      expect_eq(new Square(5).Area(), 25.0);" },
    { name: "Name set via base(...)", code: "      expect_eq(new Rectangle(1, 1).Name, \"Rectangle\");" },
    { name: "virtual Describe() runs on a base reference", code: "      Shape s = new Rectangle(3, 4);\n      expect_eq(s.Describe(), \"Rectangle has area 12\");" },
    { name: "Square overrides Describe()", code: "      Shape sq = new Square(5);\n      expect_eq(sq.Describe(), \"Square with side 5\");" },
    { name: "polymorphism through a base array", code: "      Shape[] shapes = { new Rectangle(2, 3), new Square(4) };\n      double total = 0;\n      foreach (var shape in shapes) total += shape.Area();\n      expect_eq(total, 22.0);" },
  ],

  solution: `abstract class Shape {
  public string Name { get; }

  protected Shape(string name) {
    Name = name;
  }

  public abstract double Area();

  public virtual string Describe() {
    return $"{Name} has area {Area()}";
  }
}

class Rectangle : Shape {
  public double Width { get; }
  public double Height { get; }

  public Rectangle(double width, double height) : base("Rectangle") {
    Width = width;
    Height = height;
  }

  public override double Area() {
    return Width * Height;
  }
}

sealed class Square : Shape {
  public double Side { get; }

  public Square(double side) : base("Square") {
    Side = side;
  }

  public override double Area() {
    return Side * Side;
  }

  public override string Describe() {
    return $"Square with side {Side}";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>C#</th></tr>
  <tr><td>Extend a class</td><td><code>class D : public B</code></td><td><code>class D : B</code></td></tr>
  <tr><td>Call base ctor</td><td><code>D(x) : B(x) {}</code> (member-init list)</td><td><code>: base(x)</code></td></tr>
  <tr><td>Abstract method</td><td><code>virtual T f() = 0;</code></td><td><code>public abstract T F();</code></td></tr>
  <tr><td>Overridable method</td><td>only <code>virtual</code></td><td>only <code>virtual</code>/<code>abstract</code></td></tr>
  <tr><td>Override</td><td><code>override</code> keyword optional</td><td><code>override</code> keyword required</td></tr>
  <tr><td>Block subclassing</td><td><code>final</code></td><td><code>sealed class</code></td></tr>
</table>
<p>C# is stricter than C++ here by making the safety net mandatory instead of optional.
In C++, you cannot accidentally make a method virtual — the base must mark it
<code>virtual</code> explicitly — but the override in the derived class needs no
keyword at all; <code>override</code> is opt-in tooling that only catches a signature
mismatch if you remember to write it. C# requires <code>override</code> unconditionally,
so the compiler always checks. To reach the parent's version from inside an override,
call <code>Base::Describe()</code> in C++ — the analog of C#'s
<code>base.Describe()</code>. An abstract class in C++ (one with at least one pure
virtual function, marked <code>= 0</code>) cannot be instantiated directly, just like
a C# <code>abstract class</code> blocks <code>new</code>. <code>final</code> is the
inverse — attached to a class it slams the door on further subclassing, and attached
to a method it stops a deeper override; it plays the same role as
<code>sealed class</code> / <code>sealed override</code>, letting the compiler
devirtualize calls that can no longer be overridden.</p>`,
};
