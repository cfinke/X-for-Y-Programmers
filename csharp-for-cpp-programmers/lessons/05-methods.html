  number: 5,
  title: "Methods",

  intro: `
<p>You already write C++ functions with default parameters and variadic
arguments. C# methods cover the same ground and add a few tools C++
lacks. Every method lives inside a class, and C# leans on real
<em>overloading</em> — many methods sharing a name, distinguished by their
parameter list — much like C++'s own overload resolution, but C# also adds
named arguments and dedicated <code>out</code>/<code>ref</code> parameter
modifiers instead of C++'s pointers and references.</p>
<table>
  <tr><th>C++</th><th>C#</th></tr>
  <tr><td><code>void f(int x = 1) {}</code></td><td><code>void F(int x = 1) {}</code> (optional param)</td></tr>
  <tr><td><code>f(/* x */ 1)</code> (comment only, not enforced)</td><td><code>F(x: 1)</code> (named argument)</td></tr>
  <tr><td><code>void f(std::initializer_list&lt;int&gt; xs)</code></td><td><code>void F(params int[] xs)</code></td></tr>
  <tr><td>overload <em>bodies</em>, one per signature</td><td>overload <em>bodies</em>, one per signature</td></tr>
  <tr><td><code>bool f(int a, int b, int& result)</code></td><td><code>out</code> / <code>ref</code> parameters</td></tr>
</table>
<p>Two ideas map onto C++ reference parameters but with compiler-enforced
guarantees. An <code>out</code> parameter is an extra return channel: the
method must assign it before returning, and the caller reads it back — the
backbone of the <code>TryParse</code> pattern, similar to passing an
<code>int&amp;</code> in C++ but the compiler checks that it's always
written. A <code>ref</code> parameter passes a variable in and lets the
method mutate the caller's own variable in place, just like a C++
<code>int&amp;</code> reference parameter. Both are marked at the call site
too, so the reader always sees which arguments a method writes to.</p>`,

  cpp: `std::string greet(const std::string& name, std::string greeting = "Hello") {
  return greeting + ", " + name + "!";
}

int sum(std::initializer_list<int> numbers) {
  int total = 0;
  for (int n : numbers) total += n;
  return total;
}

// C++ uses a reference out-parameter for the extra value
bool tryDivide(int a, int b, int& quotient) {
  if (b == 0) { quotient = 0; return false; }
  quotient = a / b;
  return true;
}`,

  task: `
<p>Build a <code>static class Calc</code> that shows off C#'s method features:</p>
<ol>
  <li><strong>Overloading:</strong> <code>Max(int a, int b)</code> returns the
      larger, and <code>Max(int a, int b, int c)</code> returns the largest of
      three (reuse the two-argument version).</li>
  <li><strong>Optional parameter:</strong> <code>Greet(string name, string
      greeting = "Hello")</code> returns <code>"Hello, Ada!"</code>, or uses the
      supplied greeting.</li>
  <li><strong>out parameter:</strong> <code>bool TryDivide(int a, int b, out int
      quotient)</code> sets <code>quotient</code> to <code>a / b</code> and
      returns <code>true</code>; when <code>b</code> is <code>0</code>, set
      <code>quotient = 0</code> and return <code>false</code>.</li>
  <li><strong>params array:</strong> <code>Sum(params int[] numbers)</code>
      returns the total (and <code>Sum()</code> is <code>0</code>).</li>
  <li><strong>ref parameter:</strong> <code>void Increment(ref int x)</code>
      adds one to the caller's variable.</li>
</ol>`,

`,

  requirements: [
    { pattern: /\bout\s+int\s+quotient\b/, message: "TryDivide must use an out parameter (out int quotient)" },
    { pattern: /\bparams\s+int\[\]/, message: "Sum must take a params int[] array" },

  tests: [
    { name: "Max(3, 7) is 7", code: "      expect_eq(Calc.Max(3, 7), 7);" },
    { name: "Max(3, 7, 5) is 7 (three-arg overload)", code: "      expect_eq(Calc.Max(3, 7, 5), 7);" },

    { name: "TryDivide(10, 2) succeeds with quotient 5", code: "      bool ok = Calc.TryDivide(10, 2, out int q);\n      expect_true(ok);\n      expect_eq(q, 5);" },
    { name: "TryDivide by zero fails and yields 0", code: "      bool ok2 = Calc.TryDivide(10, 0, out int q2);\n      expect_true(!ok2);\n      expect_eq(q2, 0);" },
    { name: "Sum(1, 2, 3, 4) is 10 and Sum() is 0", code: "      expect_eq(Calc.Sum(1, 2, 3, 4), 10);\n      expect_eq(Calc.Sum(), 0);" },

  solution: `static class Calc {
  public static int Max(int a, int b) {
    return a > b ? a : b;
  }

  public static int Max(int a, int b, int c) {
    return Max(Max(a, b), c);
  }

  public static string Greet(string name, string greeting = "Hello") {
    return $"{greeting}, {name}!";
  }

  public static bool TryDivide(int a, int b, out int quotient) {
    if (b == 0) {
      quotient = 0;
      return false;
    }
    quotient = a / b;
    return true;
  }

  public static int Sum(params int[] numbers) {
    int total = 0;
    foreach (int n in numbers) {
      total += n;
    }
    return total;
  }

  public static void Increment(ref int x) {
    x++;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>C#</th></tr>
  <tr><td>Optional parameter</td><td><code>f(int x = 1)</code></td><td><code>F(int x = 1)</code></td></tr>
  <tr><td>Named argument</td><td>—</td><td><code>F(x: 1)</code></td></tr>
  <tr><td>Variadic / params</td><td><code>std::initializer_list&lt;int&gt;</code> or a template pack</td><td><code>params int[] xs</code></td></tr>
  <tr><td>Overloading</td><td>a full body per signature</td><td>a full body per signature</td></tr>
  <tr><td>Extra output</td><td><code>int&amp;</code> reference parameter</td><td><code>out</code> parameter</td></tr>
  <tr><td>Mutate caller's variable</td><td><code>int&amp;</code> reference parameter</td><td><code>ref</code> parameter</td></tr>
</table>
<p>A few sharp edges. Optional parameters must come after all required ones, and
their defaults must be compile-time constants — so <code>string greeting =
"Hello"</code> is fine but <code>DateTime.Now</code> is not, the same
restriction C++ places on default arguments. Named arguments let you skip
past optional parameters and document call sites, something C++ has no
direct syntax for. <code>out</code> variables can be declared right in the
call — <code>TryDivide(10, 2, out int q)</code> — and the
<code>Try…</code>-returns-<code>bool</code> shape is idiomatic all through the
.NET library (<code>int.TryParse</code>, <code>Dictionary.TryGetValue</code>),
much as C++ APIs often return a <code>bool</code> success flag alongside a
reference output parameter. Finally, only one <code>params</code> array is
allowed and it must be the last parameter; the caller may pass loose
arguments or a real array, where C++ would reach for an
<code>initializer_list</code> or variadic template instead.</p>`,
};
