const LESSON = {
  number: 7,
  title: "Structs & Value Types",

  intro: `
<p>C++ already gives you this choice, and C# borrows the same vocabulary. A
<code>class</code> in C++ can be passed by value or by reference/pointer at the
call site — it's up to the caller. C# splits the two roles into separate
keywords instead: a <code>class</code> is <em>always</em> a reference type (like
a C++ object accessed through a pointer or reference), while a <code>struct</code>
is <em>always</em> a value type — assigning it copies the whole thing, just like
assigning a plain C++ struct or class by value, and there's no way to opt out.</p>
<table>
  <tr><th>C++</th><th>C#</th></tr>
  <tr><td><code>struct Point { … };</code> (value semantics by default)</td><td><code>class Point { … }</code> (reference) vs <code>struct Point { … }</code> (value)</td></tr>
  <tr><td>assignment copies unless you use a pointer/reference</td><td><code>class</code>: shares; <code>struct</code>: copies</td></tr>
  <tr><td><code>const int x;</code> (set once, in the initializer list)</td><td><code>public readonly int X;</code></td></tr>
  <tr><td><code>Point{1, 2}</code></td><td><code>new Point(1, 2)</code></td></tr>
</table>
<p>Reach for a <code>struct</code> when the value is small, immutable, and behaves
like a number — a point, a color, a money amount, a range — the same rule of
thumb you'd apply when deciding whether a C++ type should be passed by value.
Mark the fields <code>readonly</code> so a copied value can't be half-mutated.
Because a struct is copied on assignment and when passed to a method, a large or
mutable struct is a foot-gun, exactly like passing a big C++ struct by value
instead of by <code>const&</code>; when in doubt, use a <code>class</code>.</p>`,

  cpp: `struct Point {
  const int x;
  const int y;

  Point(int x, int y) : x(x), y(y) {}

  Point translate(int dx, int dy) const {
    return Point(x + dx, y + dy);
  }
};

Point a(1, 2);
Point b = a;                  // independent copy (value)
Point c = a.translate(10, 0); // Point(11, 2)`,

  task: `
<p>Define a <code>struct Point</code> that shows off value semantics:</p>
<ol>
  <li>Two <code>public readonly int</code> fields, <code>X</code> and
      <code>Y</code>, set by a constructor <code>Point(int x, int y)</code>.</li>
  <li><code>Translate(int dx, int dy)</code> returns a <em>new</em>
      <code>Point</code> shifted by the offsets — it must not mutate
      <code>this</code>.</li>
  <li>Override <code>ToString()</code> to return <code>"(X, Y)"</code>, e.g.
      <code>"(1, 2)"</code>.</li>
  <li>Override <code>bool Equals(object obj)</code> so two points with the same
      <code>X</code> and <code>Y</code> are equal, and add a matching
      <code>GetHashCode()</code>.</li>
</ol>
<p>Because it's a <code>struct</code>, copying a <code>Point</code> into another
variable makes an independent value — the tests lean on that.</p>`,

  starter: `struct Point {
  public readonly int X;
  public readonly int Y;

  public Point(int x, int y) {
    X = 0; // TODO
    Y = 0; // TODO
  }

  public Point Translate(int dx, int dy) {
    return default(Point); // TODO
  }

  public override string ToString() {
    return ""; // TODO: "(X, Y)"
  }

  public override bool Equals(object obj) {
    return false; // TODO
  }

  public override int GetHashCode() {
    return 0; // TODO
  }
}
`,

  requirements: [
    { pattern: /struct\s+Point/, message: "Define Point as a struct (a value type), not a class" },
    { pattern: /readonly\s+int/, message: "Make the X and Y fields readonly" },
  ],

  tests: [
    { name: "Constructor stores X and Y", code: "      var p = new Point(1, 2);\n      expect_eq(p.X, 1);\n      expect_eq(p.Y, 2);" },
    { name: "ToString formats as (X, Y)", code: "      expect_eq(new Point(1, 2).ToString(), \"(1, 2)\");" },
    { name: "Translate returns a shifted point", code: "      expect_eq(new Point(1, 2).Translate(10, 0).ToString(), \"(11, 2)\");" },
    { name: "Value equality by X and Y", code: "      expect_true(new Point(3, 4).Equals(new Point(3, 4)));\n      expect_true(!new Point(3, 4).Equals(new Point(4, 3)));" },
    { name: "Assignment copies the value (independent)", code: "      var a = new Point(1, 2);\n      var b = a;\n      var c = a.Translate(5, 5);\n      expect_eq(a.ToString(), \"(1, 2)\");\n      expect_eq(b.ToString(), \"(1, 2)\");\n      expect_eq(c.ToString(), \"(6, 7)\");" },
    { name: "Copies are equal but independent values", code: "      var a = new Point(8, 9);\n      var b = a;\n      expect_true(a.Equals(b));" },
  ],

  solution: `struct Point {
  public readonly int X;
  public readonly int Y;

  public Point(int x, int y) {
    X = x;
    Y = y;
  }

  public Point Translate(int dx, int dy) {
    return new Point(X + dx, Y + dy);
  }

  public override string ToString() {
    return $"({X}, {Y})";
  }

  public override bool Equals(object obj) {
    if (obj is Point other) {
      return X == other.X && Y == other.Y;
    }
    return false;
  }

  public override int GetHashCode() {
    return X * 397 ^ Y;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>C#</th></tr>
  <tr><td>Value type</td><td>any type passed/held by value (default)</td><td><code>struct</code> (copied on assign)</td></tr>
  <tr><td>Reference type</td><td>accessed via pointer or reference</td><td><code>class</code> (shared on assign)</td></tr>
  <tr><td>Immutable field</td><td><code>const int x;</code> (init-list only)</td><td><code>public readonly int X;</code></td></tr>
  <tr><td>Value equality</td><td><code>operator==</code></td><td>override <code>Equals</code> + <code>GetHashCode</code></td></tr>
  <tr><td>Default value</td><td>default-constructed / zero-initialized</td><td><code>default(Point)</code> — all fields zeroed</td></tr>
</table>
<p>A <code>struct</code> can't be <code>null</code> (it's a value), so an
uninitialized one is its zero value, much like a default-constructed C++
struct with zero-initialized members rather than a null pointer. It also can't
declare a parameterless constructor in C# 7.3 — <code>new Point()</code> always
gives the all-zero value. Prefer <code>readonly</code> fields and methods that
return new structs (like <code>Translate</code>) over mutating in place: a mutable
struct surprises people because <code>list[0].X = 5</code> mutates a throwaway
copy, not the stored element — the same trap as calling a non-<code>const</code>
mutator on a temporary copy pulled out of a C++ <code>std::vector&lt;Point&gt;</code>
by value instead of by reference. When the type is big, mutable, or naturally
shared, stay with a <code>class</code>.</p>`,
};
