  intro: `
<p>You already have true function overloading in C#, so C++'s ability to
declare several functions with the same name but different parameter lists —
resolved by the compiler at compile time from the argument types — will feel
completely natural. What's new here is how deliberate the calling convention
becomes. In C#, value types
(<code>int</code>, <code>double</code>, structs) are copied by default, and
reference types (arrays, <code>List&lt;T&gt;</code>, classes) hand the callee a
copy of the reference — mutating members is visible to the caller, but
reassigning the parameter is not, unless you add <code>ref</code>. C++ folds
all of that into the parameter's declared type itself: a plain value, a
<code>const &amp;</code> (read-only, no copy), or a plain <code>&amp;</code>
(aliases the caller's variable, mutations and all).</p>
<table>
  <tr><th>C#</th><th>C++</th></tr>
  <tr><td><code>void F(int x)</code></td><td><code>void f(int x)</code> (by value — a copy)</td></tr>
  <tr><td>pass a reference type (array, <code>List&lt;T&gt;</code>, …)</td><td><code>void f(const std::string&amp; s)</code> (read-only, no copy)</td></tr>
  <tr><td><code>void F(ref int x)</code></td><td><code>void f(std::string&amp; s)</code> (callee mutates caller's object)</td></tr>
  <tr><td>true overloads, e.g. <code>int Area(int)</code> / <code>int Area(int, int)</code></td><td>truly separate functions per signature — same idea</td></tr>
  <tr><td><code>int G(int x = 10)</code></td><td><code>int g(int x = 10)</code></td></tr>
</table>
<p>The rule of thumb: pass small values (<code>int</code>, <code>double</code>,
<code>bool</code>) <em>by value</em>, just as C# does for its value types;
pass objects you only read (<code>std::string</code>, <code>std::vector</code>)
by <code>const</code> <em>reference</em> to skip the copy — C#'s reference
types give you the no-copy part for free; pass by plain reference
(<code>T&amp;</code>) only when you intend to modify the caller's object, the
C++ equivalent of C#'s <code>ref</code> keyword.</p>`,

  csharp: `// C# already has true overloading, like C++:
int Area(int side) => side * side;
int Area(int width, int height) => width * height;

string Greet(string name, string greeting = "Hello") {
  return $"{greeting}, {name}!";
}

// Arrays are reference types, so contents mutate through a plain parameter;
// ref is only needed to rebind the parameter itself:
void DoubleAll(int[] xs) {
  for (int i = 0; i < xs.Length; i++) xs[i] *= 2;
}`,

  return side * side;
}

int area(int width, int height) {
  return width * height;
}

std::string greet(const std::string& name, const std::string& greeting = "Hello") {
  return greeting + ", " + name + "!";
}

void doubleAll(std::vector<int>& xs) {
  for (int& x : xs) {
    x *= 2;
  }
}

int sumOf(const std::vector<int>& xs) {
  int total = 0;
  for (int x : xs) {
    total += x;
  }
  return total;
}

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>C++</th></tr>
  <tr><td>By value (copy)</td><td>value types (<code>int</code>, structs) are copied</td><td><code>void f(int x)</code></td></tr>
  <tr><td>Read-only object</td><td>reference type handed in (no copy, not enforced read-only)</td><td><code>void f(const std::string&amp; s)</code></td></tr>
  <tr><td>Mutate caller's object</td><td><code>void F(ref int x)</code></td><td><code>void f(std::string&amp; s)</code></td></tr>
  <tr><td>Overloading</td><td>separate methods per signature</td><td>separate functions per signature</td></tr>
  <tr><td>Default argument</td><td><code>int G(int x = 10)</code></td><td><code>int g(int x = 10)</code></td></tr>
</table>
<p>A subtle point that trips up C# programmers: C#'s reference types (arrays,
<code>List&lt;T&gt;</code>, classes) already hand the callee a reference to the
same object, so a method that takes an array can always mutate its contents
without any keyword. C++ makes that choice explicit in the parameter's type
instead. <code>const std::vector&lt;int&gt;&amp;</code> says "I will read this
and not copy it"; drop the <code>const</code> and you are asking for a handle
you can write through, which changes the caller's own vector — the same
mutation a C# reference type gives you for free, just spelled out. Pass an
object by value (<code>std::vector&lt;int&gt; xs</code>) and the callee gets
its own copy — mutations stay local, but you paid for the copy, something C#
only does for value types.</p>
<p>Default arguments live in the declaration, not the call, and follow the
same "trailing only" rule as C# optional parameters: once a parameter has a
default, everything after it must too. Overload resolution happens entirely at
compile time in both languages — <code>area(4)</code> and
<code>area(3, 5)</code> resolve to two genuinely different functions, just as
C#'s overload resolution picks a distinct <code>Area</code> method for each
call.</p>`,
