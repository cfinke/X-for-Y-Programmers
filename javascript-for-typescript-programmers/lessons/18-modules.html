const LESSON = {
  number: 18,
  title: "Modules",

  intro: `
<p>ES modules are one of the few places where TypeScript syntax and JavaScript
syntax are nearly identical — <code>export</code>, <code>import</code>,
<code>export default</code> all survive compilation untouched. What changes is
what the words <em>mean</em>. In TypeScript a module can export both values and
types, and <code>import type</code> lets you pull in something that has no
runtime existence at all. Once the compiler is gone, only the values remain:
a module is just an object of live bindings, and a default export is nothing
more magical than a property named <code>default</code>.</p>
<table>
  <tr><th>TypeScript</th><th>JavaScript (runtime)</th></tr>
  <tr><td><code>export const TAX: number = 0.1;</code></td><td><code>export const TAX = 0.1;</code></td></tr>
  <tr><td><code>export interface Cart { ... }</code></td><td>erased — exports nothing</td></tr>
  <tr><td><code>import type { Cart } from "./m";</code></td><td>erased — no runtime import</td></tr>
  <tr><td><code>export default function total() {}</code></td><td><code>export default function total() {}</code></td></tr>
</table>
<p>The mental shift: a named export is a <em>value</em> you name, and the
default export is just the one binding the module hands back when you import it
without braces. There is nothing at runtime that distinguishes a "type export"
from a value export, because type-only exports never made it into the shipped
code.</p>`,

  typescript: `export const TAX_RATE: number = 0.1;

export function addTax(cents: number): number {
  return Math.round(cents * (1 + TAX_RATE));
}

export function formatUSD(cents: number): string {
  return "$" + (cents / 100).toFixed(2);
}

// the module's "main" value — imported without braces
export default function total(items: number[]): number {
  return items.reduce((sum, cents) => sum + cents, 0);
}`,

  task: `
<p>Build a tiny pricing module using plain-JavaScript exports. Export every
symbol directly (no type annotations), and give the module one default export:</p>
<ol>
  <li><strong>Named const export</strong>: <code>TAX_RATE</code> = <code>0.1</code>.</li>
  <li><strong>Named function export</strong>: <code>addTax(cents)</code> returns
      the price with tax added, rounded to a whole number of cents
      (<code>Math.round(cents * (1 + TAX_RATE))</code>).</li>
  <li><strong>Named function export</strong>: <code>formatUSD(cents)</code>
      returns a string like <code>"$12.34"</code> (dollars with two decimals).</li>
  <li><strong>Default export</strong>: <code>total(items)</code>, a function that
      sums an array of cent amounts and returns the total (<code>0</code> for an
      empty array). Export it with <code>export default</code>.</li>
</ol>`,

  starter: `// 1. named const export
export const TAX_RATE = 0.1;

// 2. named function export: price with tax, rounded to whole cents
export function addTax(cents) {
  // TODO
  return 0;
}

// 3. named function export: cents -> "$12.34"
export function formatUSD(cents) {
  // TODO
  return "";
}

// 4. default export: sum an array of cent amounts
export default function total(items) {
  // TODO
  return 0;
}
`,

  exportNames: ["TAX_RATE", "addTax", "formatUSD", "total"],

  requirements: [
    { pattern: /export\s+const\s+TAX_RATE/, message: "Use a named const export for TAX_RATE" },
    { pattern: /export\s+function\s+addTax/, message: "Use a named function export for addTax" },
    { pattern: /export\s+default/, message: "Use export default for total" },
  ],

  tests: [
    { name: "TAX_RATE is 0.1", run: (x) => expectEqual(x.TAX_RATE, 0.1) },
    { name: "addTax(100) is 110", run: (x) => expectEqual(x.addTax(100), 110) },
    { name: "addTax(199) rounds to 219", run: (x) => expectEqual(x.addTax(199), 219) },
    { name: 'formatUSD(1234) is "$12.34"', run: (x) => expectEqual(x.formatUSD(1234), "$12.34") },
    { name: 'formatUSD(500) is "$5.00"', run: (x) => expectEqual(x.formatUSD(500), "$5.00") },
    { name: "default export total sums the array", run: (x) => expectEqual(x.total([100, 200, 300]), 600) },
    { name: "default export total([]) is 0", run: (x) => expectEqual(x.total([]), 0) },
  ],

  solution: `export const TAX_RATE = 0.1;

export function addTax(cents) {
  return Math.round(cents * (1 + TAX_RATE));
}

export function formatUSD(cents) {
  return "$" + (cents / 100).toFixed(2);
}

export default function total(items) {
  return items.reduce((sum, cents) => sum + cents, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Named export</td><td><code>export const x = 1;</code></td><td><code>export const x = 1;</code> (same)</td></tr>
  <tr><td>Default export</td><td><code>export default fn;</code></td><td>becomes the <code>default</code> binding</td></tr>
  <tr><td>Type export</td><td><code>export type T = ...;</code></td><td>erased — nothing shipped</td></tr>
  <tr><td>Type-only import</td><td><code>import type { T }</code></td><td>erased — no runtime effect</td></tr>
  <tr><td>Import a default</td><td><code>import fn from "./m";</code></td><td><code>import fn from "./m";</code> (same)</td></tr>
</table>
<p>A default export is not a special kind of value — it is exposed under the name
<code>default</code>, which is exactly why <code>import Something from "./m"</code>
(no braces) grabs it and lets you rename it freely, while named imports must
match the exported name inside braces. Because types are erased, a module that
looks like it exports "a Cart type and a makeCart function" ships as a module
that exports only <code>makeCart</code>. If you ever see a bundle where an
<code>import</code> mysteriously disappeared, it was almost certainly an
<code>import type</code> the compiler dropped. At runtime, a module is just an
object of live value bindings — no more, no less.</p>`,
};
