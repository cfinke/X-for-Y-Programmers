const LESSON = {
  number: 2,
  title: "Strings",

  intro: `
<p>Strings are the same primitive in both languages — TypeScript's
<code>string</code> is just an annotation over the exact JavaScript value you
already work with. What changes at runtime is that nothing narrows for you: a
value you <em>believe</em> is a string might be <code>undefined</code>, and the
compiler is no longer around to complain. Everything you do to a string is a
plain method call on the built-in <code>String.prototype</code>.</p>
<table>
  <tr><th>TypeScript</th><th>JavaScript</th></tr>
  <tr><td><code>const s: string = "Ada";</code></td><td><code>const s = "Ada";</code></td></tr>
  <tr><td><code>const n: number = s.length;</code></td><td><code>const n = s.length;</code></td></tr>
  <tr><td><code>s.slice(0, 3): string</code></td><td><code>s.slice(0, 3)</code></td></tr>
  <tr><td>return type inferred as <code>string</code></td><td>whatever the method actually returns</td></tr>
</table>
<p>Two runtime facts worth keeping in mind. First, strings are immutable:
<code>toUpperCase()</code>, <code>trim()</code>, <code>replace()</code> and
friends never mutate — they return a brand-new string, so you must use the
return value. Second, a template literal (<code>\`hello \${name}\`</code>) calls
<code>String()</code> on every interpolated value, which is why
<code>\`\${null}\`</code> quietly becomes <code>"null"</code> instead of a type
error.</p>`,

  typescript: `function initials(fullName: string): string {
  return fullName
    .trim()
    .split(" ")
    .map((part: string): string => part[0].toUpperCase())
    .join("");
}

function slug(title: string): string {
  return title.trim().toLowerCase().replace(/\\s+/g, "-");
}`,

  task: `
<p>Build a few small, pure string helpers — plain JavaScript, no annotations.
Each returns a new string (or number) and mutates nothing.</p>
<ol>
  <li><code>shout(text)</code> — trim the surrounding whitespace and return the
      result in UPPERCASE.</li>
  <li><code>initials(fullName)</code> — split the name on spaces and return the
      first letter of each part, uppercased and joined (e.g.
      <code>"ada lovelace"</code> &rarr; <code>"AL"</code>).</li>
  <li><code>slug(title)</code> — trim, lowercase, and replace every run of
      whitespace with a single hyphen (e.g. <code>"  Hello  World "</code>
      &rarr; <code>"hello-world"</code>).</li>
  <li><code>lastName(fullName)</code> — return everything after the last space
      using <code>indexOf</code>/<code>lastIndexOf</code> and <code>slice</code>.</li>
  <li><code>zeroPad(value, width)</code> — turn <code>value</code> into a string
      and left-pad it with <code>"0"</code> to at least <code>width</code>
      characters using <code>padStart</code>.</li>
  <li><code>mentions(text, needle)</code> — return <code>true</code> if
      <code>text</code> contains <code>needle</code>, case-insensitively.</li>
</ol>`,

  starter: `// 1. shout(text) -> trimmed, UPPERCASE

  // TODO
  return "";
}

}

// 4. lastName(fullName) -> everything after the last space
function lastName(fullName) {
  // TODO
  return "";
}

// 5. zeroPad(value, width) -> String(value) left-padded with "0" to width
function zeroPad(value, width) {
  // TODO
  return "";
}

// 6. mentions(text, needle) -> true if text includes needle, case-insensitive
function mentions(text, needle) {
  // TODO
  return false;
}
`,

  exportNames: ["shout", "initials", "slug", "lastName", "zeroPad", "mentions"],

  requirements: [
    { pattern: /toUpperCase\s*\(/, message: "Use toUpperCase() to uppercase text" },
    { pattern: /toLowerCase\s*\(/, message: "Use toLowerCase() for case-insensitive work" },
    { pattern: /\.trim\s*\(/, message: "Use trim() to strip surrounding whitespace" },
    { pattern: /\.split\s*\(/, message: "Use split() to break a string into parts" },
    { pattern: /\.replace\s*\(/, message: "Use replace() to build the slug" },
    { pattern: /padStart\s*\(/, message: "Use padStart() in zeroPad" },
    { pattern: /\.includes\s*\(/, message: "Use includes() in mentions" },
  ],

  tests: [
    { name: 'shout("  hi  ") is "HI"', run: (x) => expectEqual(x.shout("  hi  "), "HI") },
    { name: 'shout("Hello, World") is "HELLO, WORLD"', run: (x) => expectEqual(x.shout("Hello, World"), "HELLO, WORLD") },
    { name: 'initials("ada lovelace") is "AL"', run: (x) => expectEqual(x.initials("ada lovelace"), "AL") },
    { name: 'initials("Grace Brewster Hopper") is "GBH"', run: (x) => expectEqual(x.initials("Grace Brewster Hopper"), "GBH") },
    { name: 'slug("  Hello  World ") is "hello-world"', run: (x) => expectEqual(x.slug("  Hello  World "), "hello-world") },
    { name: 'lastName("Ada Lovelace") is "Lovelace"', run: (x) => expectEqual(x.lastName("Ada Lovelace"), "Lovelace") },
    { name: 'lastName("Grace Brewster Hopper") is "Hopper"', run: (x) => expectEqual(x.lastName("Grace Brewster Hopper"), "Hopper") },
    { name: 'zeroPad(7, 3) is "007"', run: (x) => expectEqual(x.zeroPad(7, 3), "007") },
    { name: 'zeroPad(1234, 3) is "1234" (already wide enough)', run: (x) => expectEqual(x.zeroPad(1234, 3), "1234") },
    { name: 'mentions("Hello World", "world") is true', run: (x) => expectTruthy(x.mentions("Hello World", "world")) },
    { name: 'mentions("Hello World", "xyz") is false', run: (x) => expectEqual(x.mentions("Hello World", "xyz"), false) },
  ],

  solution: `function shout(text) {
  return text.trim().toUpperCase();
}

function initials(fullName) {
  return fullName
    .trim()
    .split(" ")
    .map((part) => part[0].toUpperCase())
    .join("");
}

function slug(title) {
  return title.trim().toLowerCase().replace(/\\s+/g, "-");
}

function lastName(fullName) {
  const trimmed = fullName.trim();
  const at = trimmed.lastIndexOf(" ");
  return at === -1 ? trimmed : trimmed.slice(at + 1);
}

function zeroPad(value, width) {
  return String(value).padStart(width, "0");
}

function mentions(text, needle) {
  return text.toLowerCase().includes(needle.toLowerCase());
}
`,

  notes: `
<table>
  <tr><th>Task</th><th>TypeScript instinct</th><th>JavaScript runtime</th></tr>
  <tr><td>Uppercase</td><td><code>s.toUpperCase(): string</code></td><td><code>s.toUpperCase()</code> — new string</td></tr>
  <tr><td>Contains?</td><td><code>s.includes(x): boolean</code></td><td><code>s.includes(x)</code> — case-sensitive</td></tr>
  <tr><td>Substring</td><td><code>s.slice(a, b): string</code></td><td><code>s.slice(a, b)</code>, negatives count from end</td></tr>
  <tr><td>Split</td><td><code>s.split(sep): string[]</code></td><td><code>s.split(sep)</code> — array of strings</td></tr>
  <tr><td>Pad</td><td><code>s.padStart(n, pad): string</code></td><td>no-op if already &ge; <code>n</code></td></tr>
</table>
<p>A few runtime details the types papered over. <code>indexOf</code> returns
<code>-1</code> when the substring is missing, so guard for it before slicing —
there is no <code>string | undefined</code> to force your hand.
<code>replace(str, ...)</code> only replaces the <em>first</em> match; use a
regex with the <code>/g</code> flag (or <code>replaceAll</code>) for every
match. And because strings are immutable, forgetting to assign the return value
of <code>trim()</code> or <code>replace()</code> is a classic bug the compiler
never warned you about — the original string is simply unchanged.</p>`,
};
