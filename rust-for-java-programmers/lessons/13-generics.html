<script>
const LESSON = {
  number: 13,
  title: "Generics & Trait Bounds",

  intro: `
<p>Your <code>List&lt;T&gt;</code> instincts transfer almost unchanged:
<code>fn first&lt;T&gt;(items: &amp;[T])</code> reads just like
<code>static &lt;T&gt; Optional&lt;T&gt; first(List&lt;T&gt; items)</code>.
Where Java constrains a type parameter with
<code>&lt;T extends Comparable&lt;T&gt;&gt;</code>, Rust writes a
<em>trait bound</em>: <code>&lt;T: PartialOrd&gt;</code>. Same idea — the
bound declares which operations the function body is allowed to use on
<code>T</code>. No bound, no comparing: <code>item &gt; best</code> only
compiles because <code>PartialOrd</code> says it can.</p>
<table>
  <tr><th>Java</th><th>Rust</th></tr>
  <tr><td><code>static &lt;T&gt; Optional&lt;T&gt; first(List&lt;T&gt; items)</code></td><td><code>fn first&lt;T&gt;(items: &amp;[T]) -&gt; Option&lt;&amp;T&gt;</code></td></tr>
  <tr><td><code>&lt;T extends Comparable&lt;T&gt;&gt;</code></td><td><code>&lt;T: PartialOrd&gt;</code></td></tr>
  <tr><td><code>a.compareTo(b) &gt; 0</code></td><td><code>a &gt; b</code> (operators come with the trait)</td></tr>
  <tr><td>Erasure: one method on <code>Object</code> at runtime</td><td>Monomorphization: a specialized copy per type</td></tr>
</table>
<p>The big difference is what happens after the type check. Java
<em>erases</em> generics: at runtime there is one <code>first</code>, operating
on <code>Object</code>, boxing every <code>int</code> into an
<code>Integer</code> on the way in. Rust <em>monomorphizes</em>: the compiler
stamps out a specialized copy of the function for each concrete type you use
it with — <code>first::&lt;i32&gt;</code>, <code>first::&lt;&amp;str&gt;</code>
— so generic code runs exactly as fast as hand-written code, with no boxing.
And because borrows already express "read-only view", there's no wildcard
zoo: no <code>? extends</code>, no <code>? super</code>, just
<code>&amp;[T]</code>.</p>`,

  java: `static <T> Optional<T> first(List<T> items) {
    return items.isEmpty() ? Optional.empty()
                           : Optional.of(items.get(0));
}

static <T extends Comparable<T>> T largest(List<T> items) {
    T best = items.get(0);
    for (T item : items) {
        if (item.compareTo(best) > 0) best = item;
    }
    return best;
}

// Erasure: at runtime both calls run the SAME bytecode on Object,
// and the ints below are boxed into Integers to get there.
System.out.println(largest(List.of(1, 5, 3)));          // 5
System.out.println(largest(List.of("apple", "zebra"))); // zebra`,

  task: `
<p>Port both generic methods:</p>
<ol>
  <li><code>first&lt;T&gt;(items: &amp;[T]) -&gt; Option&lt;&amp;T&gt;</code>
      — return <code>Some</code> of a reference to the first element, or
      <code>None</code> for an empty slice. (The slice method
      <code>.first()</code> does exactly this, or write the
      <code>if</code> yourself.)</li>
  <li><code>largest&lt;T: PartialOrd&gt;(items: &amp;[T]) -&gt; &amp;T</code>
      — return a reference to the largest element, comparing with
      <code>&gt;</code>. Assume the slice is non-empty. Note the bound: remove
      <code>: PartialOrd</code> and watch the comparison stop compiling.</li>
</ol>
<p>The tests call both functions with <code>i32</code> and <code>&amp;str</code>
slices — two monomorphized copies each. Don't write <code>fn main</code> —
the lesson's tests call your functions directly.</p>`,

  starter: `// 1. first: Optional.of(items.get(0)) / Optional.empty() -> Some / None.
//    No bound needed: we never compare, only hand back a reference.
fn first<T>(items: &[T]) -> Option<&T> {
    todo!()
}

// 2. largest: <T extends Comparable<T>> becomes <T: PartialOrd>,
//    and item.compareTo(best) > 0 becomes item > best.
fn largest<T: PartialOrd>(items: &[T]) -> &T {
    todo!()
}
`,

  requirements: [
    { pattern: /<T\s*:\s*PartialOrd>/, message: "Bound largest with <T: PartialOrd>" },
    { pattern: /<T>/, message: "Make first generic over <T> with no bound" },
    { pattern: /Option<&T>/, message: "first should return Option<&T>" },
  ],

  tests: [
    { name: "first(&[1, 2, 3]) returns Some(&1)",
      code: "assert_eq!(first(&[1, 2, 3]), Some(&1));" },
    { name: "first on an empty i32 slice returns None",
      code: "assert_eq!(first::<i32>(&[]), None);" },
    { name: 'first(&["a", "b"]) returns Some(&"a")',
      code: 'assert_eq!(first(&["a", "b"]), Some(&"a"));' },
    { name: "largest(&[1, 5, 3]) returns 5",
      code: "assert_eq!(*largest(&[1, 5, 3]), 5);" },
    { name: 'largest(&["apple", "zebra", "mango"]) returns "zebra"',
      code: 'assert_eq!(*largest(&["apple", "zebra", "mango"]), "zebra");' },
  ],

  solution: `fn first<T>(items: &[T]) -> Option<&T> {
    if items.is_empty() {
        None
    } else {
        Some(&items[0])
    }
}

fn largest<T: PartialOrd>(items: &[T]) -> &T {
    let mut best = &items[0];
    for item in items {
        if item > best {
            best = item;
        }
    }
    best
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Rust</th></tr>
  <tr><td>Generic function</td><td><code>static &lt;T&gt; T pick(List&lt;T&gt; xs)</code></td><td><code>fn pick&lt;T&gt;(xs: &amp;[T]) -&gt; &amp;T</code></td></tr>
  <tr><td>Constraint</td><td><code>&lt;T extends Comparable&lt;T&gt;&gt;</code></td><td><code>&lt;T: PartialOrd&gt;</code></td></tr>
  <tr><td>Several constraints</td><td><code>&lt;T extends A &amp; B&gt;</code></td><td><code>&lt;T: A + B&gt;</code></td></tr>
  <tr><td>Runtime model</td><td>erasure + boxing (one <code>Object</code> version)</td><td>monomorphization (a copy per type, zero overhead)</td></tr>
  <tr><td>Wildcards</td><td><code>? extends T</code>, <code>? super T</code></td><td>not needed — borrows cover it</td></tr>
</table>
<p>Because each instantiation is real compiled code, <code>largest</code> over
<code>i32</code> compares machine integers directly — no
<code>compareTo</code> call, no unboxing. That's also why
<code>first::&lt;i32&gt;(&amp;[])</code> in the tests names its type
explicitly (the "turbofish"): with an empty slice there's nothing for
inference to look at, the same reason Java sometimes needs
<code>Collections.&lt;String&gt;emptyList()</code>.</p>`,
};
