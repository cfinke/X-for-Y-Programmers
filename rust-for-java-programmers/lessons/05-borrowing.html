const LESSON = {
  number: 5,
  title: "Borrowing & References",

  intro: `
<p>Moving everything would be exhausting — usually a function just needs to
<em>look at</em> your data, not own it. So instead of moving, you lend:
<code>&amp;T</code> is a shared, read-only borrow (any number may exist at
once), and <code>&amp;mut T</code> is an exclusive, mutable borrow — exactly
one, and while it lives there can be no readers either. That
one-writer-XOR-many-readers rule is checked at compile time, and it's the
discipline Java can never give you: in Java, any method you pass a list to
might stash a reference and mutate it later, which is why defensive copies in
getters and <code>List.copyOf</code> exist at all. In Rust, a
<code>&amp;Vec</code> parameter <em>provably</em> can't modify or keep your
vector.</p>
<table>
  <tr><th>Java</th><th>Rust</th></tr>
  <tr><td>every object variable is a reference</td><td><code>&amp;T</code> only when you borrow, explicitly</td></tr>
  <tr><td>callee might mutate — who knows</td><td><code>&amp;T</code> can't mutate; <code>&amp;mut T</code> visibly can</td></tr>
  <tr><td><code>f(list)</code> — call site says nothing</td><td><code>f(&amp;list)</code> / <code>f(&amp;mut list)</code> — intent at the call site</td></tr>
  <tr><td><code>return List.copyOf(items);</code> (defensive)</td><td>return <code>&amp;items</code> — a copy is pointless</td></tr>
</table>
<p>The <code>&amp;</code> shows up at the call site, too: <code>total(&amp;numbers)</code>
tells the reader "lends it, read-only", and <code>add_item(&amp;mut items, ...)</code>
says "this call mutates <code>items</code>" — information a Java call site
simply doesn't carry. For read-only sequence parameters the idiomatic type is
a <em>slice</em>, <code>&amp;[i32]</code>, rather than <code>&amp;Vec&lt;i32&gt;</code>
— same idea as preferring <code>List</code> over <code>ArrayList</code> in a
Java signature. (You met this pattern already: <code>&amp;str</code> is to
<code>String</code> what <code>&amp;[i32]</code> is to <code>Vec&lt;i32&gt;</code>.)</p>`,

  java: `int total(List<Integer> numbers) {        // promise: read-only.
    int sum = 0;                            // enforced by... politeness
    for (int n : numbers) sum += n;
    return sum;
}

void addItem(List<String> items, String item) {
    items.add(item);                        // mutates the caller's list —
}                                           // nothing at the call site warns them

int longer(String a, String b) {
    return Math.max(a.length(), b.length());
}

// The Java reflex borrowing makes obsolete:
List<String> getItems() {
    return List.copyOf(items);              // defensive copy, "just in case"
}`,

  task: `
<p>Write three functions that borrow instead of taking ownership:</p>
<ol>
  <li><code>total</code> takes <code>numbers: &amp;[i32]</code> (a read-only
      slice) and returns <code>i32</code> — the sum. Loop with
      <code>for n in numbers { ... }</code> and a <code>let mut</code>
      accumulator.</li>
  <li><code>add_item</code> takes <code>items: &amp;mut Vec&lt;String&gt;</code>
      and <code>item: String</code>, and pushes the item onto the vector. It
      returns nothing — no <code>-&gt;</code> needed — because the mutation
      happens through the exclusive borrow.</li>
  <li><code>longer</code> takes <code>a: &amp;str</code> and
      <code>b: &amp;str</code> and returns <code>usize</code> — the length of
      the longer string (<code>.len()</code> returns <code>usize</code>,
      Rust's type for sizes and indexes).</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. total: borrow a read-only slice; sum it with a for loop.
fn total(numbers: &[i32]) -> i32 {
    todo!()
}

// 2. add_item: &mut Vec<String> is the one exclusive borrow —
//    push through it; no return value.
fn add_item(items: &mut Vec<String>, item: String) {
    todo!()
}

// 3. longer: two shared borrows, compare .len()s (usize).
fn longer(a: &str, b: &str) -> usize {
    todo!()
}
`,

  requirements: [
    { pattern: /&\[i32\]/, message: "Take the numbers as a read-only slice: &[i32]" },
    { pattern: /&mut\s/, message: "Take the vector as an exclusive mutable borrow: &mut Vec<String>" },
  ],

  tests: [
    { name: "total(&[1, 2, 3, 4]) returns 10",
      code: "assert_eq!(total(&[1, 2, 3, 4]), 10);" },
    { name: "total(&[]) returns 0",
      code: "assert_eq!(total(&[]), 0);" },
    { name: "total(&[-5, 5, 7]) returns 7",
      code: "assert_eq!(total(&[-5, 5, 7]), 7);" },
    { name: "add_item pushes onto the caller's vector through &mut",
      code: 'let mut items = vec![String::from("beans")];\nadd_item(&mut items, String::from("rice"));\nassert_eq!(items, vec!["beans", "rice"]);' },
    { name: "add_item works on an empty vector",
      code: 'let mut items: Vec<String> = Vec::new();\nadd_item(&mut items, String::from("first"));\nassert_eq!(items, vec!["first"]);' },
    { name: 'longer("hello", "hi") returns 5 and longer("a", "abc") returns 3',
      code: 'assert_eq!(longer("hello", "hi"), 5);\nassert_eq!(longer("a", "abc"), 3);' },
  ],

  solution: `fn total(numbers: &[i32]) -> i32 {
    let mut sum = 0;
    for n in numbers {
        sum += n;
    }
    sum
}

fn add_item(items: &mut Vec<String>, item: String) {
    items.push(item);
}

fn longer(a: &str, b: &str) -> usize {
    if a.len() > b.len() { a.len() } else { b.len() }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Rust</th></tr>
  <tr><td>Shared read-only access</td><td>any reference (hopefully unused for writes)</td><td><code>&amp;T</code> — many allowed, writes impossible</td></tr>
  <tr><td>Mutable access</td><td>any reference (silently)</td><td><code>&amp;mut T</code> — exactly one, no readers alongside</td></tr>
  <tr><td>Call site</td><td><code>f(list)</code> — mutation invisible</td><td><code>f(&amp;list)</code> vs <code>f(&amp;mut list)</code> — visible</td></tr>
  <tr><td>Sequence parameter</td><td><code>List&lt;Integer&gt;</code> (over <code>ArrayList</code>)</td><td><code>&amp;[i32]</code> (over <code>&amp;Vec&lt;i32&gt;</code>)</td></tr>
  <tr><td>Defensive copies</td><td><code>List.copyOf(...)</code> in getters</td><td>unnecessary — <code>&amp;T</code> callers can't mutate</td></tr>
  <tr><td>Lengths &amp; indexes</td><td><code>int</code></td><td><code>usize</code></td></tr>
</table>
<p>The rule to carry forward: many readers <em>or</em> one writer, never both
at once. It's why <code>total</code> can be handed the same slice from ten
places safely, and why while <code>add_item</code> holds its
<code>&amp;mut</code>, nobody can even be reading the vector. That aliasing
discipline is what buries the defensive-copy reflex — and, later in this
course, it's the same rule that makes Rust's threads data-race-free at
compile time.</p>`,
};
