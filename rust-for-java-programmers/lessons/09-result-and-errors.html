const LESSON = {
  number: 9,
  title: "Result & the ? Operator",

  intro: `
<p>Checked exceptions were the right instinct: the failure mode belongs in
the signature, where callers can't miss it. What made them miserable was
the handling — <code>try/catch</code> pyramids, wrapper exceptions, and
lambdas that can't throw. Rust keeps the instinct and fixes the
ergonomics: <code>Result&lt;T, E&gt;</code> is <code>throws E</code> written
as a return type. A function returns <code>Ok(value)</code> or
<code>Err(error)</code>, both ordinary values you can match on, map over,
and pass around — errors compose like data because they <em>are</em>
data.</p>
<table>
  <tr><th>Java</th><th>Rust</th></tr>
  <tr><td><code>int f(String s) throws NumberFormatException</code></td><td><code>fn f(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code></td></tr>
  <tr><td><code>return value;</code></td><td><code>Ok(value)</code></td></tr>
  <tr><td><code>throw new NumberFormatException(...)</code></td><td><code>Err("bad input".to_string())</code></td></tr>
  <tr><td><code>Integer.parseInt(s)</code> (throws)</td><td><code>s.parse::&lt;u32&gt;()</code> (returns <code>Result</code>)</td></tr>
  <tr><td><code>try { … } catch (E e) { throw e; }</code></td><td><code>expr?</code></td></tr>
</table>
<p>The killer feature is <code>?</code>. Appended to a <code>Result</code>,
it means "unwrap the <code>Ok</code>, or return the <code>Err</code> to my
caller right now" — the catch-and-rethrow you'd write by hand, in one
character. So <code>parse_age(s)? + 1</code> reads like the happy path but
propagates failure automatically, exactly like an unhandled checked
exception bubbling up — except the compiler verified your function's return
type can carry it. <code>Integer.parseInt</code>'s
<code>NumberFormatException</code> becomes <code>s.parse()</code> handing
back a <code>Result</code>, and <code>map_err</code> lets you swap the
error for your own message — the equivalent of wrapping a low-level
exception in a domain one.</p>`,

  java: `// The failure is in the signature — good! — but handling it is ceremony.
static int parseAge(String s) throws NumberFormatException {
    return Integer.parseInt(s.trim());
}

static int ageNextYear(String s) throws IllegalArgumentException {
    try {
        return parseAge(s) + 1;
    } catch (NumberFormatException e) {
        // wrap-and-rethrow: the boilerplate every codebase grows
        throw new IllegalArgumentException("invalid age: " + s, e);
    }
}

// And in streams? Checked exceptions don't compose at all:
// ages.stream().map(Main::parseAge)   // does not compile
//     .collect(Collectors.toList());`,

  task: `
<p>Rewrite the Java as Rust:</p>
<ol>
  <li>Write <code>parse_age(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code>:
      call <code>s.trim().parse::&lt;u32&gt;()</code>, and use
      <code>.map_err(|_| ...)</code> to replace the library's parse error
      with your own <code>String</code> — make it
      <code>format!("invalid age: {}", s)</code>.</li>
  <li>Write <code>age_next_year(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code>
      that returns the parsed age plus one, using
      <code>parse_age(s)?</code> — the <code>?</code> replaces the whole
      <code>try/catch</code>-rethrow block. Wrap the sum in
      <code>Ok(...)</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. parse_age: s.trim().parse::<u32>() returns a Result already —
//    map_err swaps its error for your String: format!("invalid age: {}", s).
fn parse_age(s: &str) -> Result<u32, String> {
    todo!()
}

// 2. age_next_year: parse_age(s)? unwraps the Ok or returns the Err
//    to the caller — the one-character rethrow. Then Ok(age + 1).
fn age_next_year(s: &str) -> Result<u32, String> {
    todo!()
}
`,

  requirements: [
    { pattern: /Result</, message: "Put the failure in the return type: Result<u32, String>" },
    { pattern: /map_err|Err\(/, message: "Produce your own error with map_err (or Err)" },
    { pattern: /\)\?/, message: "Propagate with the ? operator in age_next_year" },
  ],

  tests: [
    { name: 'parse_age("42") is Ok(42)',
      code: 'assert_eq!(parse_age("42"), Ok(42));' },
    { name: 'parse_age("  7  ") trims whitespace first',
      code: 'assert_eq!(parse_age("  7  "), Ok(7));' },
    { name: 'parse_age("abc") is an Err (no exception thrown)',
      code: 'assert!(parse_age("abc").is_err());' },
    { name: 'age_next_year("29") is Ok(30)',
      code: 'assert_eq!(age_next_year("29"), Ok(30));' },
    { name: '? propagates: age_next_year("old") is an Err',
      code: 'assert!(age_next_year("old").is_err());' },
  ],

  solution: `fn parse_age(s: &str) -> Result<u32, String> {
    s.trim()
        .parse::<u32>()
        .map_err(|_| format!("invalid age: {}", s))
}

fn age_next_year(s: &str) -> Result<u32, String> {
    Ok(parse_age(s)? + 1)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Rust</th></tr>
  <tr><td>Declare failure</td><td><code>throws NumberFormatException</code></td><td><code>-&gt; Result&lt;u32, String&gt;</code></td></tr>
  <tr><td>Succeed</td><td><code>return v;</code></td><td><code>Ok(v)</code></td></tr>
  <tr><td>Fail</td><td><code>throw new ...</code></td><td><code>Err(e)</code></td></tr>
  <tr><td>Parse</td><td><code>Integer.parseInt(s)</code></td><td><code>s.parse::&lt;u32&gt;()</code></td></tr>
  <tr><td>Rethrow</td><td><code>try { … } catch (E e) { throw …; }</code></td><td><code>expr?</code></td></tr>
  <tr><td>Wrap the error</td><td><code>new IllegalArgumentException(msg, e)</code></td><td><code>.map_err(|e| msg)</code></td></tr>
  <tr><td>Just crash</td><td>let it propagate to <code>main</code></td><td><code>.unwrap()</code> / <code>.expect("msg")</code></td></tr>
</table>
<p>Because <code>Result</code> is an ordinary value, it composes everywhere
checked exceptions couldn't: you can put Results in a <code>Vec</code>,
<code>map</code> a fallible function over an iterator, or store one in a
field. And <code>?</code> only works inside functions whose return type can
absorb the error — the compiler enforces the same "handle it or declare it"
rule as <code>javac</code>, minus the pyramid.</p>`,
};
