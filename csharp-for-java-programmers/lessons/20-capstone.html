<strong>typed in-memory repository</strong> — the same shape you'd reach for in
Java with a <code>Map&lt;Integer, T&gt;</code> behind a class, but assembled
from the C# tools you've collected: a generic class with a constraint, an
interface, LINQ, and real exceptions instead of returning <code>null</code>.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>class Repo&lt;T extends Entity&gt;</code></td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>

  <tr><td><code>throw new NotFoundException(...)</code></td><td><code>throw new NotFoundException(...)</code></td></tr>
  <tr><td>return <code>T</code>, or <code>null</code></td><td>return <code>T</code>, or <em>throw</em></td></tr>
</table>
<p>Two design habits carry over cleanly. The generic <em>constraint</em>
(<code>where T : IEntity</code>) is C#'s answer to <code>T extends Entity</code>:
it lets the repository read <code>item.Id</code> because every <code>T</code> is
guaranteed to have it. And where Java code often returns <code>null</code>
for a miss, idiomatic C# throws a custom exception derived from
<code>Exception</code> — the caller either gets a valid <code>T</code> or a
failure it can <code>catch</code> by type.</p>`,

}

class NotFoundException extends RuntimeException {
  public NotFoundException(String message) {
    super(message);
  }
}

class Repository<T extends Entity> {
  private Map<Integer, T> items = new HashMap<>();

  void add(T item) {
    if (items.containsKey(item.getId()))
      throw new IllegalStateException("id " + item.getId() + " already exists");
    items.put(item.getId(), item);
  }

  T get(int id) {
    T item = items.get(id);
    if (item == null)
      throw new NotFoundException("id " + id + " not found");
    return item;
  }

  List<T> where(Predicate<T> predicate) {
    return items.values().stream()
        .filter(predicate)
        .sorted(Comparator.comparingInt(Entity::getId))
        .collect(Collectors.toList());
  }

  int getCount() {
    return items.size();
  }
}`,

  solution: `interface IEntity {
  int Id { get; }
}

class NotFoundException : Exception {
  public NotFoundException(string message) : base(message) {
  }
}

class Repository<T> where T : IEntity {
  private Dictionary<int, T> items = new Dictionary<int, T>();

  public void Add(T item) {
    if (items.ContainsKey(item.Id)) {
      throw new InvalidOperationException($"id {item.Id} already exists");
    }
    items[item.Id] = item;
  }

  public T Get(int id) {
    T value;
    if (!items.TryGetValue(id, out value)) {
      throw new NotFoundException($"id {id} not found");
    }
    return value;
  }

  public bool Remove(int id) {
    return items.Remove(id);
  }

  public List<T> Where(Func<T, bool> predicate) {
    return items.Values.Where(predicate).OrderBy(x => x.Id).ToList();
  }

  public int Count {
    get { return items.Count; }
  }
}

class User : IEntity {
  public int Id { get; private set; }
  public string Name { get; private set; }
  public int Age { get; private set; }

  public User(int id, string name, int age) {
    Id = id;
    Name = name;
    Age = age;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Constrained generic</td><td><code>class R&lt;T extends Entity&gt;</code></td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td>Keyed store</td><td><code>Map&lt;Integer, T&gt;</code></td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td>Safe lookup</td><td><code>map.get(id)</code> → <code>T</code> or <code>null</code></td><td><code>TryGetValue(id, out value)</code></td></tr>
  <tr><td>Filter</td><td><code>stream().filter(p)</code></td><td><code>seq.Where(p)</code> (LINQ)</td></tr>
  <tr><td>Custom error</td><td><code>class E extends RuntimeException</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Catch by type</td><td><code>catch (E ex) { }</code></td><td><code>catch (E ex) { }</code></td></tr>
</table>
<p>A few things came together here. <code>where T : IEntity</code> is what unlocks
<code>item.Id</code> inside the generic — without the constraint the compiler only
knows <code>T</code> is <em>some</em> type and would reject the member access, the
same way <code>T extends Entity</code> bounds a Java generic. The LINQ chain
<code>Where(...).OrderBy(...).ToList()</code> is lazy until <code>ToList()</code>
forces it, mirroring how a Java stream stays unevaluated until a terminal
operation like <code>collect(...)</code> runs it.</p>
<p>The big idiomatic shift from Java is smaller here than in most other
languages — both throw typed exceptions on the exceptional path rather than
returning <code>null</code>. C#'s <code>NotFoundException</code> is unchecked
just like Java's if it extends <code>RuntimeException</code>, so callers
<code>catch</code> by exception type — <code>catch (NotFoundException ex)</code>
in both — without a checked-exception signature to declare. That's the whole
course in one small object: types that are real at runtime, generics with
constraints, interfaces as contracts, LINQ for querying, and exceptions for
failure.</p>`,
