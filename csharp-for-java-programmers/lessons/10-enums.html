  intro: `
<p>In Java, <code>enum</code> is already the natural, everyday tool for a small
closed set of named values — you don't reach for string constants or interface
constants the way older code did. But a Java enum is a full reference type: each
constant is a singleton instance of the enum class, not a raw integer. C# enums
look similar on the surface but work differently under the hood — they're a
distinct value type that's really just an <code>int</code> (by default) you can
cast, switch on, and combine with bitwise operators.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>enum Priority { LOW, MEDIUM, HIGH }</code></td><td><code>enum Priority { Low, Medium, High }</code></td></tr>
  <tr><td><code>Priority.HIGH.ordinal()</code> is <code>2</code></td><td><code>(int)Priority.High</code> is <code>2</code></td></tr>
  <tr><td><code>Priority.HIGH.name()</code> → <code>"HIGH"</code></td><td><code>Priority.High.ToString()</code> → <code>"High"</code></td></tr>
  <tr><td>parse: <code>Priority.valueOf("HIGH")</code></td><td><code>Enum.Parse(typeof(Priority), "High")</code></td></tr>
  <tr><td>bit flags: <code>EnumSet&lt;Access&gt;</code>, no native bitwise support</td><td><code>[Flags]</code> + <code>|</code> <code>&amp;</code></td></tr>
</table>
<p>Java's <code>ordinal()</code> gives you declaration order, but unlike C# you
can't reassign it directly — if you need a custom underlying number you give the
enum a constructor and a field (<code>LOW(1)</code>), the same way you'd model
<code>Low = 1</code> in C#. Converting is also asymmetric: C# lets you cast
directly in both directions (<code>(int)p</code> and <code>(Priority)n</code>),
while Java has no cast between an enum and an <code>int</code> at all — you go
through <code>ordinal()</code>/a lookup array on one side. For a set of
independent on/off options, Java favors <code>EnumSet&lt;Access&gt;</code> over
hand-rolled bits; C# tags the enum with <code>[Flags]</code>, gives members
power-of-two values, and combines them with <code>|</code> / tests them with
<code>&amp;</code>.</p>`,

  java: `enum FileAccess { READ, WRITE, EXECUTE }

enum Priority {

    private final int value;

    Priority(int value) {

String describe(Priority p) {
    switch (p) {
        case LOW: return "can wait";
        case MEDIUM: return "soon";
        case HIGH: return "now";
        default: return "unknown";
    }

  solution: `enum Priority {
  Low = 1,
  Medium = 2,
  High = 3,
}

[Flags]
enum Access {
  None = 0,
  Read = 1,
  Write = 2,
  Execute = 4,
}

static class Enums {
  public static int ToInt(Priority p) {
    return (int)p;
  }

  public static Priority FromInt(int n) {
    return (Priority)n;
  }

  public static Priority Parse(string s) {
    return (Priority)Enum.Parse(typeof(Priority), s);
  }

  public static string Describe(Priority p) {
    switch (p) {
      case Priority.Low:
        return "can wait";
      case Priority.Medium:
        return "soon";
      case Priority.High:
        return "now";
      default:
        return "unknown";
    }
  }

  public static bool CanWrite(Access a) {
    return (a & Access.Write) == Access.Write;
  }

  public static Access Grant(Access a, Access flag) {
    return a | flag;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Declare</td><td><code>enum P { LOW, MEDIUM, HIGH }</code></td><td><code>enum P { Low, Medium, High }</code></td></tr>
  <tr><td>Explicit value</td><td>constructor field, e.g. <code>LOW(1)</code></td><td><code>Low = 1</code></td></tr>
  <tr><td>To number</td><td><code>p.ordinal()</code> (or your own field)</td><td><code>(int)p</code></td></tr>
  <tr><td>From number</td><td><code>P.values()[n]</code></td><td><code>(P)n</code></td></tr>
  <tr><td>To name</td><td><code>p.name()</code></td><td><code>p.ToString()</code></td></tr>
  <tr><td>From name</td><td><code>P.valueOf("HIGH")</code></td><td><code>Enum.Parse(typeof(P), "High")</code></td></tr>
  <tr><td>Bit flags</td><td><code>EnumSet&lt;P&gt;</code></td><td><code>[Flags]</code>, <code>|</code>, <code>&amp;</code></td></tr>
</table>
<p>A few things worth knowing. Casting from <code>int</code> is unchecked — an
undefined value like <code>(Priority)99</code> won't throw, so validate with
<code>Enum.IsDefined(typeof(Priority), n)</code> when the number comes from
outside. That's a real gap compared to Java, where there's no cast from
<code>int</code> to an enum at all, so an invalid number can never silently
become a bogus constant. <code>Enum.Parse</code> throws on an unknown name, much
like <code>Priority.valueOf("Nope")</code> throws in Java; use
<code>Enum.TryParse</code> for the safe path.</p>
<p>The <code>switch</code> here is a <em>statement</em> — each
<code>case</code> ends in <code>return</code> (or would need <code>break</code>),
and C# forbids fall-through between non-empty cases. That's the same shape as a
classic Java <code>switch</code> statement on an enum. C# also has a
<em>switch expression</em> (<code>p =&gt; ...</code>), roughly the counterpart of
Java's newer switch expressions, but that arrived after the version this course
targets, so stick with the statement form.</p>
<p><code>[Flags]</code> doesn't change how the enum stores bits — it only makes
<code>ToString()</code> render combinations as <code>"Read, Write"</code> instead
of a bare number. The real work is done by giving each member a distinct power of
two and combining them with bitwise <code>|</code> (set), <code>&amp;</code>
(test), and <code>&amp; ~</code> (clear). <code>a.HasFlag(Access.Write)</code> is
a readable alternative to the <code>&amp;</code> test. Java has no built-in
attribute like this at all — the idiomatic equivalent is
<code>EnumSet&lt;Access&gt;</code>, which stores a set of enum constants
efficiently as a bitmask internally without you ever touching the bits
yourself.</p>`,
