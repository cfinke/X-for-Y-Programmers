  intro: `
<p>Java already splits collections the same way C# does, so this lesson is
mostly about matching up names. A Java <em>array</em> (<code>int[]</code>) is
a fixed-length block chosen at creation time — fast, but you can't add onto
it. When you want the resizable behaviour of <code>ArrayList</code>, C# gives
you <code>List&lt;T&gt;</code>.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>int[] a = { 1, 2, 3 };</code></td><td><code>int[] a = { 1, 2, 3 };</code></td></tr>
  <tr><td><code>new int[3]</code></td><td><code>new int[3]</code></td></tr>
  <tr><td><code>a.length</code></td><td><code>a.Length</code> (array) / <code>a.Count</code> (list)</td></tr>
  <tr><td><code>list.add(4)</code></td><td><code>list.Add(4)</code></td></tr>
  <tr><td><code>list.contains(4)</code></td><td><code>list.Contains(4)</code></td></tr>
  <tr><td><code>new ArrayList&lt;Integer&gt;()</code> (grows)</td><td><code>var b = new List&lt;int&gt;();</code></td></tr>
</table>
<p>Two things to internalize. First, arrays are fixed size: <code>new int[3]</code>
gives three slots, all initialized to <code>0</code>, and that size never changes
— just like Java. Second, <code>List&lt;T&gt;</code> is the growable one, and it
reads almost exactly like Java's <code>ArrayList&lt;Integer&gt;</code> —
<code>Add</code> instead of <code>add</code>, <code>Count</code> instead of
<code>size()</code>, and it still supports <code>list[i]</code> indexing
(no <code>get</code>/<code>set</code> calls needed). Both can be built with a
collection initializer: <code>new List&lt;int&gt; { 1, 2, 3 }</code>.</p>`,

  solution: `using System.Collections.Generic;

static class Collections {
  public static int Total(int[] nums) {
    int sum = 0;
    foreach (int n in nums) {
      sum += n;
    }
    return sum;
  }

  public static List<int> Evens(int[] nums) {
    var result = new List<int>();
    foreach (int n in nums) {
      if (n % 2 == 0) {
        result.Add(n);
      }
    }
    return result;
  }

  public static bool Contains(int[] nums, int target) {
    foreach (int n in nums) {
      if (n == target) {
        return true;
      }
    }
    return false;
  }
}

<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Fixed-size block</td><td><code>new int[3]</code></td><td><code>new int[3]</code></td></tr>
  <tr><td>Array literal</td><td><code>{ 1, 2, 3 }</code></td><td><code>new int[] { 1, 2, 3 }</code></td></tr>
  <tr><td>Growable list</td><td><code>new ArrayList&lt;&gt;(List.of(1, 2, 3))</code></td><td><code>new List&lt;int&gt; { 1, 2, 3 }</code></td></tr>
  <tr><td>Length</td><td><code>a.length</code> / <code>list.size()</code></td><td><code>a.Length</code> / <code>list.Count</code></td></tr>
  <tr><td>Append</td><td><code>list.add(x)</code></td><td><code>list.Add(x)</code></td></tr>
  <tr><td>Membership</td><td><code>list.contains(x)</code></td><td><code>list.Contains(x)</code></td></tr>
</table>
<p>Rule of thumb: if the size is known and fixed, an array is the leaner choice;
if you're accumulating results or the count varies, use <code>List&lt;T&gt;</code>
— same tradeoff Java makes between <code>int[]</code> and
<code>ArrayList&lt;Integer&gt;</code>. Note the naming trap — arrays expose
<code>Length</code> (a property, no parentheses), lists expose <code>Count</code>,
where Java would use <code>.length</code> on the array and <code>.size()</code> on
the list. Once you have a list you can still call <code>ToArray()</code> to get
back a plain <code>int[]</code>, and any array can seed a list with
<code>new List&lt;int&gt;(myArray)</code>. Under the hood a <code>List&lt;T&gt;</code>
is backed by an array it re-allocates as it grows — the same trick
<code>ArrayList</code> plays in Java, and another reason <code>List&lt;int&gt;</code>
holds true <code>int</code>s directly instead of boxing to
<code>Integer</code> the way <code>ArrayList&lt;Integer&gt;</code> must.</p>`,
