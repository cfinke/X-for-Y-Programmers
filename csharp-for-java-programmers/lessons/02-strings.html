  title: "Strings",

  intro: `
<p>C# strings will feel familiar: they are immutable sequences of UTF-16 code
units, just like Java strings, and every operation returns a <em>new</em>
string rather than mutating the original. The method names differ a
little — Java's camelCase methods (<code>toUpperCase</code>,
<code>indexOf</code>) become PascalCase in C# (<code>ToUpper</code>,
<code>IndexOf</code>) — and a couple of them (<code>Substring</code>,
<code>IndexOf</code>) have sharper edges than their Java cousins.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>s.toUpperCase()</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td><code>s.contains("x")</code></td><td><code>s.Contains("x")</code></td></tr>
  <tr><td><code>s.indexOf("x")</code></td><td><code>s.IndexOf("x")</code></td></tr>
  <tr><td><code>s.substring(1, 4)</code></td><td><code>s.Substring(1, 3)</code></td></tr>
  <tr><td><code>s.split(",")</code></td><td><code>s.Split(',')</code></td></tr>
  <tr><td><code>s.trim()</code></td><td><code>s.Trim()</code></td></tr>
  <tr><td><code>String.join(", ", arr)</code></td><td><code>string.Join(", ", arr)</code></td></tr>
</table>
<p>Two traps to note. <code>Substring(start, length)</code> takes a
<em>length</em>, not an end index, so it is not the same call as Java's
<code>substring(beginIndex, endIndex)</code> — the numbers only line up
because <code>4 - 1 == 3</code> in the row above; change either number and
they diverge. And <code>IndexOf</code> returns <code>-1</code> when the
substring is missing, exactly like Java. For assembling many pieces in a
loop, reach for <code>StringBuilder</code> instead of repeatedly
<code>+</code>-ing strings — the same discipline you already practice in
Java, but here it is the idiomatic tool as well.</p>`,

  java: `static String shout(String s) {
  return s.trim().toUpperCase();
}

static String csv(String[] parts) {
  return String.join(", ", parts);

static String initials(String name) {
  StringBuilder sb = new StringBuilder();
  for (String w : name.split(" ")) {
    sb.append(w.charAt(0));
  }
  return sb.toString();
}`,

    { name: "Greeting(\"Ada\") is \"Hello, Ada!\"", code: "      expect_eq(TextUtil.Greeting(\"Ada\"), \"Hello, Ada!\");" },
  ],

  solution: `static class TextUtil {
  public static string Shout(string s) {
    return s.Trim().ToUpper();
  }

  public static string Csv(string[] parts) {
    return string.Join(", ", parts);
  }

  public static string Initials(string name) {
    var sb = new StringBuilder();
    foreach (var word in name.Split(' ')) {
      if (word.Length > 0) {
        sb.Append(word[0]);
      }
    }
    return sb.ToString();
  }

  public static string Greeting(string name) {
    return $"Hello, {name}!";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Uppercase</td><td><code>s.toUpperCase()</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td>Contains</td><td><code>s.contains(x)</code></td><td><code>s.Contains(x)</code></td></tr>
  <tr><td>Substring</td><td><code>s.substring(1, 4)</code></td><td><code>s.Substring(1, 3)</code> (start, <em>length</em>)</td></tr>
  <tr><td>Replace</td><td><code>s.replace("a", "b")</code></td><td><code>s.Replace("a", "b")</code> (replaces all)</td></tr>
  <tr><td>Join</td><td><code>String.join(sep, arr)</code></td><td><code>string.Join(sep, arr)</code> (static)</td></tr>
  <tr><td>Build in loop</td><td><code>sb.append(piece)</code></td><td><code>sb.Append(piece)</code></td></tr>
</table>
<p>A few more idioms worth filing away. <code>string.Split</code> takes a
<code>char</code> (single quotes: <code>','</code>) or a <code>string[]</code> of
separators — not a regex, unlike Java's <code>String.split</code>, which
always treats its argument as a regular expression (a plain comma happens to
work the same way in both, but a literal <code>.</code> or <code>|</code>
needs escaping in Java and does not in C#). <code>Replace</code> swaps
<em>every</em> occurrence, matching Java's <code>String.replace(CharSequence,
CharSequence)</code> rather than a "replace first" behavior.
<code>StartsWith</code>, <code>EndsWith</code>, and <code>Contains</code> all
return <code>bool</code>, the same shape as Java's <code>boolean</code>-returning
equivalents. And note that <code>string.Join</code>,
<code>string.IsNullOrEmpty</code>, and friends are <em>static</em> methods on the
<code>string</code> type, which is why the call reads
<code>string.Join(...)</code> rather than <code>arr.Join(...)</code> — the
same static-helper pattern as Java's <code>String.join(...)</code> and
<code>String.format(...)</code>.</p>`,
