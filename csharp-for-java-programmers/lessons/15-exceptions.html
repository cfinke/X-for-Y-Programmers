  intro: `
<p>Exceptions in C# will feel familiar: <code>try</code>/<code>catch</code>/<code>finally</code>
and <code>throw</code> work just like Java. The differences are mostly about
<em>checked exceptions</em> and <em>cleanup</em>. Java forces you to declare
checked exceptions with <code>throws</code> and either catch or propagate them; C#
has no checked exceptions at all — every exception is effectively unchecked, so a
method's signature never tells you what it might throw. Each <code>catch</code>
still names the exception type it handles, so you filter by type instead of writing
<code>instanceof</code> chains.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>throw new RuntimeException("bad")</code></td><td><code>throw new Exception("bad")</code></td></tr>
  <tr><td><code>catch (Exception e) { … }</code></td><td><code>catch (Exception e) { … }</code></td></tr>
  <tr><td><code>catch (ValidationException e) { … }</code></td><td><code>catch (ValidationException e) { … }</code></td></tr>
  <tr><td><code>class E extends RuntimeException {}</code></td><td><code>class E : Exception {}</code></td></tr>
  <tr><td><code>e.getMessage()</code></td><td><code>e.Message</code></td></tr>
  <tr><td><code>try (var conn = …) { … }</code></td><td><code>using (var conn = …) { … }</code></td></tr>
</table>
<p>The last row should feel very familiar. C# has <code>IDisposable</code>, the
equivalent of Java's <code>AutoCloseable</code>: any type with a
<code>Dispose()</code> method (Java's is <code>close()</code>). A <code>using</code>
block guarantees <code>Dispose()</code> runs when the block exits — normally or via
an exception — just like Java's try-with-resources guarantees <code>close()</code>
runs. It is the idiomatic replacement for a hand-written <code>try/finally</code>
that closes a file, connection, or lock.</p>`,

  java: `class ValidationException extends RuntimeException {
  public ValidationException(String message) {

    try {
      return validateAge(age);

  solution: `class ValidationException : Exception {
  public ValidationException(string message) : base(message) { }
}

class Resource : IDisposable {
  public static int OpenCount = 0;
  public bool Disposed = false;

  public Resource() {
    OpenCount++;
  }

  public void Dispose() {
    Disposed = true;
    OpenCount--;
  }
}

static class Validator {
  public static int ValidateAge(int age) {
    if (age < 0) throw new ValidationException("age cannot be negative");
    if (age > 150) throw new ValidationException("age is unrealistically large");
    return age;
  }

  public static int SafeValidateAge(int age, int fallback) {
    try {
      return ValidateAge(age);
    } catch (ValidationException) {
      return fallback;
    }
  }

  public static string Process(int age) {
    var log = new StringBuilder();
    using (var res = new Resource()) {
      try {
        int valid = ValidateAge(age);
        log.Append($"ok:{valid}");
      } catch (ValidationException ex) {
        log.Append($"error:{ex.Message}");
      } finally {
        log.Append("|cleanup");
      }
    }
    return log.ToString();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Throw</td><td><code>throw new RuntimeException("x")</code></td><td><code>throw new Exception("x")</code></td></tr>
  <tr><td>Catch by type</td><td><code>catch (T e)</code></td><td><code>catch (T e)</code></td></tr>
  <tr><td>Custom exception</td><td><code>class E extends RuntimeException</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Message</td><td><code>e.getMessage()</code></td><td><code>e.Message</code></td></tr>
  <tr><td>Deterministic cleanup</td><td><code>try (var x = …) { … }</code></td><td><code>using (var x = …)</code></td></tr>
</table>
<p>A few things worth internalizing. Order your <code>catch</code> blocks
most-specific first — a <code>catch (Exception)</code> ahead of
<code>catch (ValidationException)</code> is a compile error because the second is
unreachable, exactly as in Java. To catch by type but keep going, use a bare
<code>catch (ValidationException)</code> with no variable (as in
<code>SafeValidateAge</code>) when you do not need <code>e</code> — Java has no
equivalent shorthand, so this will feel like a small bonus.</p>
<p>The biggest mental shift coming from Java is that C# has no checked exceptions:
there is no <code>throws</code> clause, and the compiler never forces you to catch
or declare anything. A <code>using</code> block is pure sugar for
<code>try { … } finally { x.Dispose(); }</code>, just like Java's try-with-resources
is sugar for <code>try { … } finally { x.close(); }</code>. Reach for it around
files, streams, database connections, and locks. When you need a real custom
exception, derive from <code>Exception</code> (or a more specific base such as
<code>ArgumentException</code>) and forward the message with <code>: base(message)</code>
so <code>e.Message</code> works for free.</p>`,
