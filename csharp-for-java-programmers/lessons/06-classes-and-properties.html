  intro: `
<p>Java classes and C# classes look almost identical at first glance —
fields, a constructor, methods. The big difference is C#'s <em>properties</em>.
Where Java reaches for private fields plus explicit <code>getX()</code>/<code>setX()</code>
methods, idiomatic C# uses <em>auto-properties</em>:
<code>public int Age { get; set; }</code> compiles down to a hidden backing field
plus a getter and setter, but reads and writes like a plain field.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>private String name;</code></td><td><code>private string name;</code></td></tr>
  <tr><td><code>private int age = 0;<br>public int getAge() { return age; }<br>public void setAge(int age) { this.age = age; }</code></td><td><code>public int Age { get; set; }</code></td></tr>
  <tr><td><code>private final int id;<br>public int getId() { return id; }</code></td><td><code>public int Id { get; }</code> (get-only)</td></tr>
  <tr><td><code>public int getTotal() { return … }</code></td><td><code>public int Total => …;</code></td></tr>
  <tr><td><code>Thing(int x) { … }</code></td><td><code>public Thing(int x) { … }</code></td></tr>
</table>
<p>Three things to internalize. First, public members are conventionally
<strong>PascalCase</strong> in C# (<code>Balance</code>, not <code>balance</code>),
whereas Java properties are exposed as camelCase getter/setter method pairs.
Second, a <code>{ get; }</code> property with no setter can only be assigned in
the constructor — that is C#'s answer to Java's <code>final</code> field with a
getter. A <code>{ get; private set; }</code> lets the class mutate it while the
outside world sees it as read-only: real encapsulation, without writing a setter
method at all. Third, <code>=></code> defines an <em>expression-bodied member</em>,
the terse form of a computed getter or a one-line method — no <code>return</code>
statement or braces needed.</p>`,

  java: `class BankAccount {
  private final String owner;
  private double balance;

  public BankAccount(String owner, double initial) {
    this.owner = owner;
    this.balance = initial;
  }

  public double getBalance() { return balance; }

  public void deposit(double amount) { balance += amount; }

  public String getSummary() { return owner + ": " + balance; }
}`,

  solution: `class BankAccount {
  public string Owner { get; }
  public decimal Balance { get; private set; }
  private int transactionCount;

  public BankAccount(string owner, decimal initial) {
    Owner = owner;
    Balance = initial;
    transactionCount = 0;
  }

  public void Deposit(decimal amount) {
    Balance += amount;
    transactionCount++;
  }

  public bool Withdraw(decimal amount) {
    if (amount > Balance) {
      return false;
    }
    Balance -= amount;
    transactionCount++;
    return true;
  }

  public int TransactionCount => transactionCount;
  public string Summary => $"{Owner}: {Balance}";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Mutable property</td><td><code>private int x;<br>getX()/setX(int x)</code></td><td><code>int X { get; set; }</code></td></tr>
  <tr><td>Read-only from outside</td><td>omit the setter method</td><td><code>int X { get; private set; }</code></td></tr>
  <tr><td>Immutable after construction</td><td><code>private final int x;</code></td><td><code>int X { get; }</code></td></tr>
  <tr><td>Computed getter</td><td><code>int getTotal() {…}</code></td><td><code>int Total => …;</code></td></tr>
  <tr><td>Private field</td><td><code>private int x;</code></td><td><code>private int x;</code></td></tr>
</table>
<p>An auto-property is just sugar: <code>{ get; set; }</code> generates a hidden
backing field and trivial accessors, sparing you from writing the
<code>getX()</code>/<code>setX()</code> boilerplate Java requires for the same
effect. The moment you need logic — validation, change tracking — you either
switch to a full property with an explicit backing field, or, as here, keep the
auto-property and route all mutation through methods that guard the invariant.
Because the setter is <code>private</code>, no caller outside
<code>BankAccount</code> can bypass <code>Withdraw</code>'s overdraft check.</p>
<p>One Java habit to drop: reaching for a matching <code>getX()</code>/
<code>setX()</code> pair every time a field needs to be exposed. The .NET
convention is PascalCase for anything public (properties, methods, types), and
a property is accessed like a field (<code>account.Balance</code>, not
<code>account.getBalance()</code>) even though a getter and setter run behind
the scenes. The compiler doesn't enforce PascalCase, but every C# codebase you
touch will expect it.</p>`,
