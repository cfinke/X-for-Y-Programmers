  title: "Dictionaries",

  intro: `
<p>In Java you reach for <code>HashMap</code> (or the <code>Map</code>
interface more generally) when you need key/value lookups. C#'s workhorse is
<code>Dictionary&lt;K, V&gt;</code> — a real generic type where both the key
and value types are fixed at compile time. It is very close to Java's
<code>HashMap&lt;K, V&gt;</code>: both use a hash table internally and neither
guarantees iteration order.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>new HashMap&lt;String, Integer&gt;()</code></td><td><code>new Dictionary&lt;string, int&gt;()</code></td></tr>
  <tr><td><code>m.put("a", 1)</code></td><td><code>d["a"] = 1;</code> or <code>d.Add("a", 1)</code></td></tr>
  <tr><td><code>m.get("a")</code></td><td><code>d["a"]</code> (throws if absent)</td></tr>
  <tr><td><code>m.containsKey("a")</code></td><td><code>d.ContainsKey("a")</code></td></tr>
  <tr><td><code>m.size()</code></td><td><code>d.Count</code></td></tr>
</table>
<p>One sharp edge: the indexer <code>d["a"]</code> <em>throws</em>
<code>KeyNotFoundException</code> when the key is missing — unlike
<code>map.get</code>, which returns <code>null</code>. The idiomatic safe
lookup is <code>TryGetValue(key, out value)</code>, which returns a
<code>bool</code> and hands you the value through an <code>out</code> parameter.
Assigning through the indexer (<code>d["a"] = 1</code>) inserts or overwrites,
while <code>Add</code> throws if the key already exists.</p>`,

  java: `Map<String, Integer> scores = new HashMap<>();
scores.put("Ada", 90);
scores.put("Rob", 75);

static int get(Map<String, Integer> m, String name) {
  return m.getOrDefault(name, 0);
}

static int total(Map<String, Integer> m) {
  int sum = 0;
  for (int v : m.values()) sum += v;
  return sum;
}`,

  task: `
<p>Write a <code>static class Scores</code> that builds and queries a
<code>Dictionary&lt;string, int&gt;</code>:</p>
<ol>

      <code>"Ada" =&gt; 90</code>, <code>"Rob" =&gt; 75</code>, and

  <li><code>Count(dict)</code> returns how many entries the dictionary holds

</ol>`,

  requirements: [
    { pattern: /TryGetValue/, message: "Use TryGetValue(name, out ...) for the safe lookup" },

  tests: [

    { name: "Build()[\"Ada\"] is 90", code: "      expect_eq(Scores.Build()[\"Ada\"], 90);" },
    { name: "GetOrZero for present key", code: "      expect_eq(Scores.GetOrZero(Scores.Build(), \"Rob\"), 75);" },
    { name: "GetOrZero for missing key is 0", code: "      expect_eq(Scores.GetOrZero(Scores.Build(), \"Nobody\"), 0);" },
    { name: "Total sums all values", code: "      expect_eq(Scores.Total(Scores.Build()), 253);" },
    { name: "Count matches", code: "      expect_eq(Scores.Count(Scores.Build()), 3);" },
  ],

  solution: `static class Scores {
  public static Dictionary<string, int> Build() {
    return new Dictionary<string, int> {
      { "Ada", 90 },
      { "Rob", 75 },
      { "Grace", 88 },
    };
  }

  public static int GetOrZero(Dictionary<string, int> dict, string name) {
    if (dict.TryGetValue(name, out int score)) {
      return score;
    }
    return 0;
  }

  public static int Total(Dictionary<string, int> dict) {
    int sum = 0;
    foreach (KeyValuePair<string, int> entry in dict) {
      sum += entry.Value;
    }
    return sum;
  }

  public static int Count(Dictionary<string, int> dict) {
    return dict.Count;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java (HashMap)</th><th>C#</th></tr>
  <tr><td>Create + fill</td><td><code>Map.of("a", 1)</code> (immutable) or <code>new HashMap&lt;&gt;() {{ put("a", 1); }}</code></td><td><code>new Dictionary&lt;string,int&gt; { { "a", 1 } }</code></td></tr>
  <tr><td>Insert/overwrite</td><td><code>m.put("a", 1)</code></td><td><code>d["a"] = 1;</code></td></tr>
  <tr><td>Insert (fail if exists)</td><td><code>m.putIfAbsent("a", 1)</code> (silently no-ops instead)</td><td><code>d.Add("a", 1)</code></td></tr>
  <tr><td>Safe read</td><td><code>m.get("a")</code> → <code>null</code>, or <code>m.getOrDefault("a", 0)</code></td><td><code>d.TryGetValue("a", out v)</code></td></tr>
  <tr><td>Has key</td><td><code>m.containsKey("a")</code></td><td><code>d.ContainsKey("a")</code></td></tr>
  <tr><td>Iterate</td><td><code>for (var entry : m.entrySet())</code></td><td><code>foreach (var kv in d)</code> → <code>kv.Key</code>, <code>kv.Value</code></td></tr>
</table>
<p>The <code>out</code> parameter on <code>TryGetValue</code> is the pattern to
memorize: you can declare the variable inline (<code>out int score</code>) right
at the call site. When the key is missing, the <code>out</code> value is set to
the type's default (<code>0</code> for <code>int</code>), so some code even skips
checking the returned <code>bool</code> — but relying on that hides the
missing-key case. Prefer the explicit <code>if (dict.TryGetValue(...))</code>
form. For iteration, each element is a <code>KeyValuePair&lt;K, V&gt;</code> with
read-only <code>Key</code> and <code>Value</code> properties; you can also loop
<code>dict.Keys</code> or <code>dict.Values</code> directly.</p>`,
