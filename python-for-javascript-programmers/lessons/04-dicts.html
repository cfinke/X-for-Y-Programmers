  intro: `
<p>Python's <code>dict</code> is the everyday key/value map — the same role a
plain object or a <code>Map</code> plays in JavaScript, but it is
a real hash map with a proper API, not an object you bolt properties onto. Keys
can be any hashable value (strings, numbers, tuples), and since Python 3.7 a
dict preserves insertion order.</p>
<table>
  <tr><th>JavaScript</th><th>Python</th></tr>
  <tr><td><code>const m = { a: 1, b: 2 };</code></td><td><code>m = {"a": 1, "b": 2}</code></td></tr>
  <tr><td><code>m["a"]</code></td><td><code>m["a"]</code></td></tr>
  <tr><td><code>m["x"] ?? 0</code></td><td><code>m.get("x", 0)</code></td></tr>
  <tr><td><code>"a" in m</code></td><td><code>"a" in m</code></td></tr>
  <tr><td><code>Object.keys(m)</code></td><td><code>m.keys()</code></td></tr>
  <tr><td><code>Object.entries(m)</code></td><td><code>m.items()</code></td></tr>
  <tr><td><code>{ ...m, ...n }</code></td><td><code>{**m, **n}</code> or <code>m.update(n)</code></td></tr>
</table>
<p>Two things trip up JavaScript programmers. First, <code>m["x"]</code> on a
missing key <em>raises</em> <code>KeyError</code> — it does not return
<code>undefined</code>. Reach for <code>m.get("x", default)</code> when a key may
be absent. Second, iterating a dict yields its <em>keys</em>, so to walk pairs
you iterate <code>m.items()</code> and unpack each pair:
<code>for k, v in m.items():</code>.</p>`,

  javascript: `const scores = { ada: 90, rob: 72 };

const ada = scores["ada"];          // 90
const cid = scores["cid"] ?? 0;     // 0 (missing)
const hasRob = "rob" in scores;     // true

let total = 0;
for (const [name, score] of Object.entries(scores)) {
  total += score;
}`,

  task: `
<p>Write the Python versions:</p>
<ol>
  <li><code>build_scores()</code> returns the dict
      <code>{"ada": 90, "rob": 72}</code> as a literal.</li>
  <li><code>score_for(scores, name)</code> returns the score for
      <code>name</code>, or <code>0</code> if the name is not present — use
      <code>.get()</code> with a default.</li>
  <li><code>total(scores)</code> sums every value by iterating
      <code>.items()</code> with tuple unpacking.</li>
  <li><code>with_bonus(scores, points)</code> returns a <em>new</em> dict built
      with a dict comprehension, adding <code>points</code> to each score (leave
      the original untouched).</li>
</ol>`,

  starter: `# 1. build_scores() -> {"ada": 90, "rob": 72}

  requirements: [
    { pattern: /\.get\s*\(/, message: "Use .get() with a default in score_for" },
    { pattern: /\.items\s*\(\)/, message: "Iterate .items() in total" },
    { pattern: /for\s+\w+\s*,\s*\w+\s+in/, message: "Unpack each pair with `for k, v in ...`" },

  tests: [
    { name: "build_scores() returns the literal", code: "    expect_eq(build_scores(), {\"ada\": 90, \"rob\": 72})" },
    { name: "score_for finds a present key", code: "    expect_eq(score_for({\"ada\": 90}, \"ada\"), 90)" },
    { name: "score_for defaults to 0 when missing", code: "    expect_eq(score_for({\"ada\": 90}, \"cid\"), 0)" },
    { name: "total sums the values", code: "    expect_eq(total({\"ada\": 90, \"rob\": 72}), 162)" },
    { name: "total of empty dict is 0", code: "    expect_eq(total({}), 0)" },
    { name: "with_bonus adds points to each value", code: "    expect_eq(with_bonus({\"ada\": 90, \"rob\": 72}, 5), {\"ada\": 95, \"rob\": 77})" },
    { name: "with_bonus leaves the original dict unchanged", code: "    original = {\"ada\": 90}\n    with_bonus(original, 5)\n    expect_eq(original, {\"ada\": 90})" },
  ],

  solution: `def build_scores():
    return {"ada": 90, "rob": 72}


def score_for(scores, name):
    return scores.get(name, 0)


def total(scores):
    running = 0
    for name, score in scores.items():
        running += score
    return running


def with_bonus(scores, points):
    return {name: score + points for name, score in scores.items()}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Python</th></tr>
  <tr><td>Read (may be missing)</td><td><code>m["x"] ?? d</code></td><td><code>m.get("x", d)</code></td></tr>
  <tr><td>Read (must exist)</td><td><code>m["x"]</code> → <code>undefined</code></td><td><code>m["x"]</code> → <code>KeyError</code></td></tr>
  <tr><td>Membership</td><td><code>"x" in m</code></td><td><code>"x" in m</code></td></tr>
  <tr><td>Keys / values / pairs</td><td><code>Object.keys/values/entries(m)</code></td><td><code>m.keys()</code> / <code>m.values()</code> / <code>m.items()</code></td></tr>
  <tr><td>Merge</td><td><code>{ ...m, ...n }</code></td><td><code>{**m, **n}</code></td></tr>
  <tr><td>Comprehension</td><td><code>Object.fromEntries(...)</code></td><td><code>{k: v for k, v in ...}</code></td></tr>
</table>
<p>Because plain <code>m["x"]</code> raises on a missing key, <code>.get()</code>
is the Python habit whenever absence is possible — and <code>m.get("x")</code>
with no default returns <code>None</code> rather than raising. When you actually
want a running default (say, counting), reach for
<code>collections.defaultdict</code> or <code>dict.setdefault</code>. Note that
<code>in</code> tests <em>keys</em>, never values: <code>"ada" in scores</code>
asks whether that key exists, mirroring how <code>in</code> checks own keys in
JavaScript.</p>`,
