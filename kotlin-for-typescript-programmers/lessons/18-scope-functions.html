  number: 18,
  title: "Scope Functions",

  intro: `
<p>TypeScript doesn't have a built-in vocabulary for "do a few things with this
object and hand something back." You reach for <code>Object.assign</code>, a
temporary variable, or a hand-rolled <code>tap</code> helper. Kotlin bakes five of
these into the standard library: <code>let</code>, <code>run</code>,
<code>with</code>, <code>apply</code>, and <code>also</code>. They all run a block
"scoped to" a receiver — the only differences are <em>how the receiver is exposed</em>
(as <code>it</code> or as <code>this</code>) and <em>what the whole expression
returns</em> (the receiver itself, or the block's last line).</p>
<table>
  <tr><th>TypeScript</th><th>Kotlin</th></tr>
  <tr><td><code>Object.assign(c, {host, port})</code></td><td><code>c.apply { this.host = host; this.port = port }</code></td></tr>
  <tr><td><code>x != null ? f(x) : null</code></td><td><code>x?.let { f(it) }</code></td></tr>
  <tr><td><code>tap(x, v =&gt; log(v))</code></td><td><code>x.also { log(it) }</code></td></tr>
</table>
<p>The two you will use constantly: <code>apply</code> (configure an object and get
<em>it</em> back — perfect for builders) and <code>let</code> (run a block only when
a nullable is non-null, and get the <em>block's result</em> back — a null-safe
<code>map</code> for a single value). <code>also</code> is the "side effect and pass
through" one: it hands the receiver to the block as <code>it</code>, ignores the
block's value, and returns the receiver.</p>`,

  typescript: `class Config {
  host = "localhost";
  port = 80;
  secure = false;
}

function configure(host: string, port: number): Config {
  const c = new Config();
  c.host = host;
  c.port = port;
  c.secure = port === 443;
  return c;
}

const shout = (s: string | null) => s != null ? s.toUpperCase() + "!" : null;`,

  task: `

Write three functions, each showcasing one scope function:</p>
<ol>

  <li><code>shout(s: String?): String?</code> — use a null-guarded

</ol>`,

    { name: "configure returns the same object it built", code: "        val c = configure(\"h\", 80)\n        expect_true(c.host == \"h\" && c.port == 80 && !c.secure)" },
    { name: "shout uppercases and appends !", code: "        expect_eq(shout(\"hi\"), \"HI!\")" },
    { name: "shout of null is null", code: "        expect_eq(shout(null), null)" },
    { name: "recordAndReturn returns the value", code: "        val log = mutableListOf<Int>()\n        expect_eq(recordAndReturn(5, log), 5)" },
    { name: "recordAndReturn logs as a side effect", code: "        val log = mutableListOf<Int>()\n        recordAndReturn(5, log)\n        recordAndReturn(9, log)\n        expect_eq(log, listOf(5, 9))" },

  solution: `data class Config(var host: String = "localhost", var port: Int = 80, var secure: Boolean = false)

fun configure(host: String, port: Int): Config =
    Config().apply {
        this.host = host
        this.port = port
        secure = port == 443
    }

fun shout(s: String?): String? =
    s?.let { it.uppercase() + "!" }

fun recordAndReturn(value: Int, log: MutableList<Int>): Int =
    value.also { log.add(it) }
`,

  notes: `
<table>
  <tr><th>Function</th><th>Receiver is</th><th>Returns</th><th>Reach for it when…</th></tr>
  <tr><td><code>apply</code></td><td><code>this</code></td><td>the receiver</td><td>configuring an object (builders)</td></tr>
  <tr><td><code>also</code></td><td><code>it</code></td><td>the receiver</td><td>a side effect in a chain (log, validate)</td></tr>
  <tr><td><code>let</code></td><td><code>it</code></td><td>block result</td><td>null-guarded transforms: <code>x?.let { … }</code></td></tr>
  <tr><td><code>run</code></td><td><code>this</code></td><td>block result</td><td>computing a value from a receiver</td></tr>
  <tr><td><code>with</code></td><td><code>this</code> (arg)</td><td>block result</td><td>many calls on one object, no chaining</td></tr>
</table>
<p>Two axes decide everything: <strong>receiver as <code>it</code> vs
<code>this</code></strong>, and <strong>returns the receiver vs the block's last
line</strong>. <code>apply</code>/<code>also</code> return the receiver (so they
disappear from the value of an expression — great in the middle of a chain);
<code>let</code>/<code>run</code>/<code>with</code> return the block. Use
<code>it</code>-flavored ones (<code>let</code>, <code>also</code>) when you want a
name, or when you're diving through a nullable with <code>?.</code>; use the
<code>this</code>-flavored ones (<code>apply</code>, <code>run</code>,
<code>with</code>) when the block is mostly member access. And don't over-apply
them — a plain local <code>val</code> is often clearer than a nested scope
block.</p>
<table>
  <tr><th>TypeScript</th><th>Kotlin</th></tr>
  <tr><td><code>const c = new C(); c.a = 1; return c;</code></td><td><code>C().apply { a = 1 }</code></td></tr>
  <tr><td><code>x != null ? x.f() : null</code></td><td><code>x?.let { it.f() }</code></td></tr>
  <tr><td><code>const y = x; log(y); return y;</code></td><td><code>x.also { log(it) }</code></td></tr>
</table>`,
