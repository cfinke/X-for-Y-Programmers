const LESSON = {
  number: 7,
  title: "Comparisons & Type Juggling",

  intro: `
<p>In Go, <code>"1" == 1</code> isn't false — it's a <em>compile error</em>.
The type system won't even let the question be asked. PHP's <code>==</code>
answers it enthusiastically: it <em>juggles</em> types at runtime, converting
operands until they match, so <code>"1" == 1</code> is <code>true</code>.
This is the single biggest source of PHP bugs, and the fix is a habit:
always use <code>===</code>, which compares value <strong>and</strong> type —
the semantics your Go-trained instincts already assume.</p>
<table>
  <tr><th>Go</th><th>PHP</th></tr>
  <tr><td><code>"1" == 1</code> → won't compile</td><td><code>"1" == 1</code> → <code>true</code> (juggled!); <code>"1" === 1</code> → <code>false</code></td></tr>
  <tr><td><code>==</code> (types already proven equal)</td><td><code>===</code> — value and type, no conversion</td></tr>
  <tr><td><code>if s != ""</code> (conditions must be bool)</td><td><code>if ($s)</code> — truthiness exists; <code>(bool)</code> makes it explicit</td></tr>
  <tr><td>—</td><td>falsy: <code>""</code>, <code>0</code>, <code>0.0</code>, <code>"0"</code>, <code>[]</code>, <code>null</code>, <code>false</code></td></tr>
  <tr><td><code>cmp.Compare(a, b)</code> → -1, 0, 1</td><td><code>$a &lt;=&gt; $b</code> (spaceship) → -1, 0, 1</td></tr>
</table>
<p>Truthiness deserves a squint from a Go programmer: PHP conditions accept
any type, and the falsy list has one famous trap — the <em>string</em>
<code>"0"</code> is falsy (a leftover from PHP's everything-was-a-string CGI
roots). Meanwhile the spaceship operator <code>&lt;=&gt;</code> is exactly
<code>cmp.Compare</code>: a three-way comparison returning -1, 0, or 1,
and the standard tool for <code>usort</code> callbacks (lesson 13's
<code>sort.Slice</code> moment).</p>`,

  go: `import "cmp"

// Comparing mismatched types doesn't compile in Go:
// fmt.Println("1" == 1)  // invalid operation

func sameValueAndType(a, b any) bool {
    return a == b // any: equal only if type AND value match
}

func isTruthy(s string) bool {
    return s != "" // no truthiness — spell the condition out
}

func compareNums(a, b int) int {
    return cmp.Compare(a, b) // -1, 0, or 1
}`,

  task: `
<p>Port the three helpers, letting PHP's operators do the work:</p>
<ol>
  <li><code>same_value_and_type(mixed $a, mixed $b): bool</code> — return
      whether the two values are identical using <code>===</code>. This is
      Go's <code>==</code> on <code>any</code>: type and value must both
      match, no conversions.</li>
  <li><code>is_truthy(mixed $v): bool</code> — return the value's truthiness
      with an explicit <code>(bool)</code> cast: exactly what PHP does
      implicitly inside every <code>if</code>. Remember <code>"0"</code> is
      falsy.</li>
  <li><code>compare_nums(int $a, int $b): int</code> — the spaceship:
      return <code>$a &lt;=&gt; $b</code>, PHP's built-in
      <code>cmp.Compare</code>.</li>
</ol>`,

  starter: `<?php

// 1. Identity: value AND type, no juggling. Go's == semantics.
function same_value_and_type(mixed $a, mixed $b): bool {
    throw new Exception("TODO: implement same_value_and_type");
}

// 2. What if ($v) would decide — made explicit with a (bool) cast.
function is_truthy(mixed $v): bool {
    throw new Exception("TODO: implement is_truthy");
}

// 3. cmp.Compare(a, b), spelled as an operator.
function compare_nums(int $a, int $b): int {
    throw new Exception("TODO: implement compare_nums");
}
`,

  requirements: [
    { pattern: /===/, message: "Use the identity operator === (never bare == in this course)" },
    { pattern: /<=>/, message: "Use the spaceship operator <=> in compare_nums" },
    { pattern: /\(bool\)/, message: "Use an explicit (bool) cast in is_truthy" },
  ],

  tests: [
    { name: "identical values of the same type are ===",
      code: 'expect_true(same_value_and_type(1, 1));\nexpect_true(same_value_and_type("go", "go"));' },
    { name: '=== refuses to juggle: "1" vs 1, 0 vs false',
      code: 'expect_true(!same_value_and_type("1", 1));\nexpect_true(!same_value_and_type(0, false));' },
    { name: '"", 0, "0", and [] are all falsy',
      code: 'expect_true(!is_truthy(""));\nexpect_true(!is_truthy(0));\nexpect_true(!is_truthy("0"));\nexpect_true(!is_truthy([]));' },
    { name: 'non-empty strings and arrays are truthy',
      code: 'expect_true(is_truthy("hello"));\nexpect_true(is_truthy(1));\nexpect_true(is_truthy([0]));' },
    { name: "compare_nums returns -1, 0, 1 like cmp.Compare",
      code: "expect_eq(compare_nums(1, 2), -1);\nexpect_eq(compare_nums(5, 5), 0);\nexpect_eq(compare_nums(9, 2), 1);" },
  ],

  solution: `<?php

function same_value_and_type(mixed $a, mixed $b): bool {
    return $a === $b;
}

function is_truthy(mixed $v): bool {
    return (bool) $v;
}

function compare_nums(int $a, int $b): int {
    return $a <=> $b;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>PHP</th></tr>
  <tr><td>Equality</td><td><code>==</code> (compile-time type-checked)</td><td><code>===</code> — use it always; <code>==</code> juggles</td></tr>
  <tr><td>Inequality</td><td><code>!=</code></td><td><code>!==</code></td></tr>
  <tr><td>Mixed-type compare</td><td>won't compile</td><td><code>"1" == 1</code> is true; <code>"1" === 1</code> is false</td></tr>
  <tr><td>Condition type</td><td>must be <code>bool</code></td><td>anything — coerced via truthiness</td></tr>
  <tr><td>Falsy values</td><td>only <code>false</code></td><td><code>false, 0, 0.0, "", "0", [], null</code></td></tr>
  <tr><td>Three-way compare</td><td><code>cmp.Compare(a, b)</code></td><td><code>$a &lt;=&gt; $b</code></td></tr>
</table>
<p>PHP 8 tamed the worst juggling — <code>0 == "foo"</code> was true for
twenty years and is finally false — but <code>"1" == 1</code> still juggles
and always will. Treat <code>==</code> as a legacy operator you read but
never write. The same discipline applies to library functions:
<code>in_array()</code> and <code>array_search()</code> juggle by default
and take a <code>true</code> third argument to compare strictly. Your Go
instincts are correct here; PHP just makes you opt in to them.</p>`,
};
