<div id="app"></div>
<script>
const LESSON = {
  number: 8,
  title: "Control Flow & match",

  intro: `
<p><code>if</code> barely changes: Go's <code>if x &gt; 0 {</code> becomes
<code>if ($x &gt; 0) {</code> — parentheses required, braces the norm. The
interesting story is <code>switch</code>. Go's is everything you want:
strict comparison, break-by-default, <code>case "sat", "sun":</code> for
grouping. PHP's classic <code>switch</code> is the exact opposite on both
counts — it compares with loose <code>==</code> (lesson 7's juggling!)
<em>and</em> falls through unless you write <code>break</code>. Avoid it.</p>
<table>
  <tr><th>Go</th><th>PHP</th></tr>
  <tr><td><code>if x &gt; 0 { ... }</code></td><td><code>if ($x &gt; 0) { ... }</code></td></tr>
  <tr><td><code>switch</code>: strict, no fallthrough</td><td><code>switch</code>: loose <code>==</code>, falls through — avoid</td></tr>
  <tr><td><code>switch day { case "sat", "sun": ... }</code></td><td><code>match ($day) { "sat", "sun" =&gt; ... }</code></td></tr>
  <tr><td><code>switch { case score &gt;= 90: ... }</code></td><td><code>match (true) { $score &gt;= 90 =&gt; ... }</code></td></tr>
  <tr><td>switch is a statement</td><td><code>match</code> is an <em>expression</em>: <code>$g = match (...) {...};</code></td></tr>
  <tr><td>no case matched → falls to default/nothing</td><td>no arm matched, no default → throws <code>UnhandledMatchError</code></td></tr>
</table>
<p>PHP 8's <code>match</code> restores Go semantics and raises the bet:
comparisons are strict <code>===</code>, there is no fallthrough, the whole
thing is an expression that returns its arm's value, and a value no arm
handles <em>throws</em> instead of sliding by silently. And Go's
expressionless <code>switch {</code> — the clean way to write an if/else-if
chain — has a direct PHP twin: <code>match (true)</code>, where each arm is
a boolean condition and the first true one wins.</p>`,

  go: `func grade(score int) string {
    switch { // expressionless switch: first true case wins
    case score >= 90:
        return "A"
    case score >= 80:
        return "B"
    case score >= 70:
        return "C"
    default:
        return "F"
    }
}

func dayType(day string) string {
    switch day {
    case "sat", "sun": // grouped cases, no fallthrough
        return "weekend"
    default:
        return "weekday"
    }
}`,

  task: `
<p>Port both functions using <code>match</code> — no <code>switch</code>,
no if/else chain:</p>
<ol>
  <li><code>grade(int $score): string</code> — use <code>match (true)</code>
      with range arms (<code>$score &gt;= 90 =&gt; "A"</code>, then 80/"B",
      70/"C") and a <code>default =&gt; "F"</code>. Arms are checked in
      order, exactly like Go's expressionless switch. Return the match's
      value directly: <code>return match (true) { ... };</code></li>
  <li><code>day_type(string $day): string</code> — <code>match</code> on
      <code>$day</code> with a grouped arm
      <code>"sat", "sun" =&gt; "weekend"</code> (the twin of
      <code>case "sat", "sun":</code>) and <code>default =&gt;
      "weekday"</code>.</li>
</ol>
<p>Syntax reminders: arms are <code>condition =&gt; value</code>, separated
by commas, and the closing brace needs a semicolon after it when the match
is a return value.</p>`,

  starter: `<?php

// 1. Go's "switch {" is PHP's "match (true) {" — first true arm wins,
//    and the whole match IS the return value.
function grade(int $score): string {
    throw new Exception("TODO: implement grade with match(true)");
}

// 2. case "sat", "sun":  becomes  "sat", "sun" =>
//    Strict === comparison, no fallthrough, throws on unmatched input
//    unless you give it a default arm.
function day_type(string $day): string {
    throw new Exception("TODO: implement day_type with match");
}
`,

  requirements: [
    { pattern: /match\s*\(/, message: "Use a match expression" },
    { pattern: /match\s*\(\s*true\s*\)/, message: "grade should use match(true) with range conditions, like Go's expressionless switch" },
    { pattern: /default\s*=>/, message: "Give each match a default => arm" },
  ],

  tests: [
    { name: 'grade: 95 and the 90 boundary are "A"',
      code: 'expect_eq(grade(95), "A");\nexpect_eq(grade(90), "A");' },
    { name: 'grade: 85 is "B", 70 is "C"',
      code: 'expect_eq(grade(85), "B");\nexpect_eq(grade(70), "C");' },
    { name: 'grade: below 70 falls to the default "F"',
      code: 'expect_eq(grade(69), "F");\nexpect_eq(grade(0), "F");' },
    { name: 'day_type: "sat" and "sun" hit the grouped arm',
      code: 'expect_eq(day_type("sat"), "weekend");\nexpect_eq(day_type("sun"), "weekend");' },
    { name: 'day_type: weekdays hit the default',
      code: 'expect_eq(day_type("mon"), "weekday");\nexpect_eq(day_type("fri"), "weekday");' },
  ],

  solution: `<?php

function grade(int $score): string {
    return match (true) {
        $score >= 90 => "A",
        $score >= 80 => "B",
        $score >= 70 => "C",
        default => "F",
    };
}

function day_type(string $day): string {
    return match ($day) {
        "sat", "sun" => "weekend",
        default => "weekday",
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>PHP</th></tr>
  <tr><td>if</td><td><code>if x &gt; 0 { }</code></td><td><code>if ($x &gt; 0) { }</code> — parens required</td></tr>
  <tr><td>Value switch</td><td><code>switch day { case ...: }</code></td><td><code>match ($day) { ... =&gt; ... }</code> (skip legacy <code>switch</code>)</td></tr>
  <tr><td>Condition chain</td><td><code>switch { case a &gt; b: }</code></td><td><code>match (true) { $a &gt; $b =&gt; ... }</code></td></tr>
  <tr><td>Grouped cases</td><td><code>case "sat", "sun":</code></td><td><code>"sat", "sun" =&gt;</code></td></tr>
  <tr><td>Comparison</td><td>strict (typed)</td><td><code>match</code>: strict <code>===</code>; <code>switch</code>: loose <code>==</code></td></tr>
  <tr><td>Statement or expression?</td><td>statement</td><td><code>match</code> is an expression — assign it, return it</td></tr>
  <tr><td>Unhandled value</td><td>runs nothing</td><td>throws <code>UnhandledMatchError</code></td></tr>
</table>
<p>That last row is a feature, not a hazard: an exhaustive <code>match</code>
without a lazy <code>default</code> means new enum cases or unexpected inputs
fail loudly at the point of omission — the closest PHP gets to Go's
exhaustive-switch linting, and it's enforced at runtime for free. One shape
to note: match arms hold single <em>expressions</em>, not statement blocks.
If an arm needs several steps, extract a function — which usually improves
the Go version too.</p>`,
};
</script>
