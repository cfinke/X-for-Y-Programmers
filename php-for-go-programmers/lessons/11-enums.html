const LESSON = {
  number: 11,
  title: "Enums",

  intro: `
<p>You know the Go ritual: a named int type, an <code>iota</code> const
block, a hand-written <code>String()</code> method, and then eternal
vigilance — because <code>var s OrderStatus = 42</code> compiles without a
murmur. Any int converts to your "enum"; the closed set is a convention, not
a guarantee. PHP 8.1 gave the language what Go still lacks: real enums.
<code>enum OrderStatus: string { case Pending = 'pending'; }</code> declares
a genuinely closed set — the only values of type <code>OrderStatus</code>
that can ever exist are its declared cases.</p>
<table>
  <tr><th>Go</th><th>PHP</th></tr>
  <tr><td><code>type OrderStatus int</code> + <code>iota</code> block</td><td><code>enum OrderStatus: string { case Pending = 'pending'; }</code></td></tr>
  <tr><td>hand-written <code>String()</code> method</td><td><code>$status-&gt;value</code> — for free</td></tr>
  <tr><td>parse: write a map or switch yourself</td><td><code>OrderStatus::from('pending')</code></td></tr>
  <tr><td>parse, tolerating bad input</td><td><code>OrderStatus::tryFrom($s)</code> → case or <code>null</code></td></tr>
  <tr><td>keep a manual slice of all values</td><td><code>OrderStatus::cases()</code></td></tr>
  <tr><td><code>var s OrderStatus = 42</code> — compiles!</td><td>impossible: the set is closed</td></tr>
</table>
<p>This is a <em>backed</em> enum: each case carries a primitive value, read
via <code>-&gt;value</code> — your <code>String()</code> method, generated.
Going the other way, <code>OrderStatus::from('pending')</code> parses a raw
value into a case (throwing on garbage), while
<code>OrderStatus::tryFrom($raw)</code> returns <code>null</code> on a miss
— perfect for untrusted input. <code>OrderStatus::cases()</code> lists every
case, and because the set is closed, <code>match</code> on an enum can cover
all cases with no <code>default</code> arm needed.</p>`,

  go: `type OrderStatus int

const (
    Pending OrderStatus = iota
    Shipped
    Delivered
)

func (s OrderStatus) String() string {
    switch s {
    case Pending:
        return "pending"
    case Shipped:
        return "shipped"
    default:
        return "delivered"
    }
}

var sneaky OrderStatus = 42 // compiles fine — any int "is" a status`,

  task: `
<p>Replace the iota block with a real enum:</p>
<ol>
  <li>Keep the provided <code>enum OrderStatus: string</code> with its three
      cases: <code>Pending = 'pending'</code>, <code>Shipped =
      'shipped'</code>, <code>Delivered = 'delivered'</code>.</li>
  <li><code>status_label(OrderStatus $status): string</code> — use
      <code>match ($status)</code> to return <code>'Order received'</code>
      for <code>Pending</code>, <code>'On its way'</code> for
      <code>Shipped</code>, and <code>'Delivered'</code> for
      <code>Delivered</code>. No <code>default</code> arm required — the set
      is closed.</li>
  <li><code>parse_status(string $value): ?OrderStatus</code> — turn a raw
      string like <code>'shipped'</code> into a case with
      <code>OrderStatus::tryFrom</code>, returning <code>null</code> for
      anything unrecognized.</li>
</ol>`,

  starter: `<?php

// The iota const block + String() method, replaced by one declaration:
enum OrderStatus: string {
    case Pending = 'pending';
    case Shipped = 'shipped';
    case Delivered = 'delivered';
}

// 2. A closed set means match needs no default arm
function status_label(OrderStatus $status): string {
    throw new Exception("TODO: implement status_label with match");
}

// 3. Untrusted input -> tryFrom (null on a miss)
function parse_status(string $value): ?OrderStatus {
    throw new Exception("TODO: implement parse_status");
}
`,

  requirements: [
    { pattern: /enum\s+OrderStatus\s*:\s*string/, message: "Declare a string-backed enum OrderStatus" },
    { pattern: /case\s+\w+\s*=/, message: "Give each case a backing value (case Pending = 'pending';)" },
    { pattern: /::tryFrom|::from/, message: "Parse raw strings with OrderStatus::tryFrom (or ::from)" },
    { pattern: /match\s*\(/, message: "Use a match expression in status_label" },
  ],

  tests: [
    { name: "status_label covers every case",
      code: "expect_eq(status_label(OrderStatus::Pending), 'Order received');\nexpect_eq(status_label(OrderStatus::Shipped), 'On its way');\nexpect_eq(status_label(OrderStatus::Delivered), 'Delivered');" },
    { name: "parse_status('shipped') returns the Shipped case",
      code: "expect_true(parse_status('shipped') === OrderStatus::Shipped);" },
    { name: "parse_status returns null on unknown input (tryFrom)",
      code: "expect_true(parse_status('lost-in-the-mail') === null);" },
    { name: "->value gives the backing string (String() for free)",
      code: "expect_eq(OrderStatus::Pending->value, 'pending');" },
    { name: "cases() lists the whole closed set",
      code: "expect_eq(count(OrderStatus::cases()), 3);\nexpect_true(OrderStatus::cases()[0] === OrderStatus::Pending);" },
  ],

  solution: `<?php

enum OrderStatus: string {
    case Pending = 'pending';
    case Shipped = 'shipped';
    case Delivered = 'delivered';
}

function status_label(OrderStatus $status): string {
    return match ($status) {
        OrderStatus::Pending => 'Order received',
        OrderStatus::Shipped => 'On its way',
        OrderStatus::Delivered => 'Delivered',
    };
}

function parse_status(string $value): ?OrderStatus {
    return OrderStatus::tryFrom($value);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>PHP</th></tr>
  <tr><td>Declare</td><td><code>type S int</code> + <code>iota</code> const block</td><td><code>enum S: string { case A = 'a'; }</code></td></tr>
  <tr><td>To raw value</td><td>hand-written <code>String()</code></td><td><code>$s-&gt;value</code></td></tr>
  <tr><td>Case name</td><td>—</td><td><code>$s-&gt;name</code> (e.g. <code>"Pending"</code>)</td></tr>
  <tr><td>From raw value</td><td>hand-written map/switch</td><td><code>S::from($raw)</code> (throws) / <code>S::tryFrom($raw)</code> (null)</td></tr>
  <tr><td>All values</td><td>manual slice</td><td><code>S::cases()</code></td></tr>
  <tr><td>Exhaustiveness</td><td>linters, maybe</td><td><code>match</code> throws on an unhandled case</td></tr>
  <tr><td>Invalid values</td><td><code>OrderStatus(42)</code> — legal</td><td>cannot be constructed</td></tr>
</table>
<p>The guarantee is the point. A function that accepts an
<code>OrderStatus</code> can never receive a 42 — the type system, not code
review, enforces the closed set, which is why <code>match</code> can skip
the <code>default</code> arm. Enums can also hold methods (put
<code>status_label</code> <em>on</em> the enum as
<code>public function label(): string</code> in real code), implement
interfaces, and define constants. Pure enums — <code>enum Suit { case
Hearts; }</code>, no backing values — cover the cases where Go's iota was
only ever a distinct token and the number never mattered.</p>`,
};
