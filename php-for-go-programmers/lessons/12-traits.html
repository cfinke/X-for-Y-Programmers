const LESSON = {
  number: 12,
  title: "Traits",

  intro: `
<p>When you want to share method implementations across Go types, you embed
a struct. It mostly works — until the shared method needs to call back into
the outer type. Go embedding is composition, not inheritance: if
<code>Animal.Describe()</code> calls <code>a.Name()</code>, it calls
<em>Animal's</em> <code>Name</code>, even when embedded in a
<code>Dog</code> that defines its own. There is no virtual dispatch back
into the embedder.</p>
<table>
  <tr><th>Go</th><th>PHP</th></tr>
  <tr><td>embed a struct: <code>type Dog struct { Animal }</code></td><td><code>class Dog { use Describable; }</code></td></tr>
  <tr><td>methods promoted, but stay Animal's</td><td>methods <em>flattened into</em> Dog, as if written there</td></tr>
  <tr><td>shared code can't call the embedder</td><td><code>$this-&gt;name()</code> resolves to <em>Dog's</em> method</td></tr>
  <tr><td>one struct per reuse relationship</td><td><code>use A, B;</code> — mix in several traits</td></tr>
</table>
<p>A PHP <code>trait</code> is the embedding you actually wanted. Writing
<code>use Describable;</code> inside a class copies — <em>flattens</em> —
the trait's methods into the class, exactly as if you had typed them there.
So when the trait's <code>describe()</code> says
<code>$this-&gt;name()</code>, that <code>$this</code> is the real object:
a <code>Dog</code>'s <code>describe()</code> calls <code>Dog::name()</code>,
a <code>Robot</code>'s calls <code>Robot::name()</code>. The trait supplies
the shared behavior and each class supplies the parts that differ — the
callback into the embedder that Go's embedding can't do. (Note the two
meanings of <code>use</code>: inside a class body it pulls in a trait;
you've also seen it importing namespaces at the top of a file.)</p>`,

  go: `type Animal struct {
    name string
}

func (a Animal) Name() string {
    return a.name
}

func (a Animal) Describe() string {
    return "This is " + a.Name()
}

type Dog struct {
    Animal // embedded: Dog gets Describe() and Name()
}

// Even if Dog defines its own Name(), Animal.Describe()
// still calls Animal's — no dispatch back into Dog.
d := Dog{Animal{name: "Rex"}}
fmt.Println(d.Describe()) // "This is Rex"`,

  task: `
<p>Build the shared behavior as a trait:</p>
<ol>
  <li><code>trait Describable</code> — one method,
      <code>describe(): string</code>, returning <code>"This is "</code>
      concatenated with <code>$this-&gt;name()</code>. The trait itself never
      defines <code>name()</code> — it trusts whatever class it lands in to
      provide one.</li>
  <li><code>class Dog</code> — <code>use Describable;</code> and define
      <code>name(): string</code> returning <code>"Rex"</code>.</li>
  <li><code>class Robot</code> — <code>use Describable;</code> and define
      <code>name(): string</code> returning <code>"Unit-7"</code>.</li>
</ol>
<p>One <code>describe()</code>, written once, that dispatches into whichever
class it was flattened into.</p>`,

  starter: `<?php

// Shared behavior that calls back into its host class
trait Describable {
    public function describe(): string {
        throw new Exception("TODO: return 'This is ' . \$this->name()");
    }
}

class Dog {
    use Describable;

    public function name(): string {
        throw new Exception("TODO: return 'Rex'");
    }
}

class Robot {
    use Describable;

    public function name(): string {
        throw new Exception("TODO: return 'Unit-7'");
    }
}
`,

  requirements: [
    { pattern: /trait\s+Describable/, message: "Declare a trait named Describable" },
    { pattern: /use\s+Describable/, message: "Pull the trait into each class with use Describable;" },
  ],

  tests: [
    { name: "Dog::describe() comes from the trait and calls Dog's name()",
      code: "expect_eq((new Dog())->describe(), 'This is Rex');" },
    { name: "Robot::describe() — same trait method, Robot's name()",
      code: "expect_eq((new Robot())->describe(), 'This is Unit-7');" },
    { name: "each class still answers name() directly",
      code: "expect_eq((new Dog())->name(), 'Rex');\nexpect_eq((new Robot())->name(), 'Unit-7');" },
    { name: "the trait's method really is flattened into both classes",
      code: "expect_true(method_exists('Dog', 'describe'));\nexpect_true(method_exists('Robot', 'describe'));" },
  ],

  solution: `<?php

trait Describable {
    public function describe(): string {
        return "This is " . $this->name();
    }
}

class Dog {
    use Describable;

    public function name(): string {
        return "Rex";
    }
}

class Robot {
    use Describable;

    public function name(): string {
        return "Unit-7";
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>PHP</th></tr>
  <tr><td>Share method code</td><td>embed a struct</td><td><code>trait T { ... }</code> + <code>use T;</code></td></tr>
  <tr><td>How methods arrive</td><td>promoted, still the inner type's</td><td>flattened in, as if written in the class</td></tr>
  <tr><td>Call back into host</td><td>not possible via embedding</td><td><code>$this-&gt;method()</code> — dynamic dispatch</td></tr>
  <tr><td>Multiple sources</td><td>embed several structs</td><td><code>use A, B;</code></td></tr>
  <tr><td>Name clash</td><td>ambiguous selector error</td><td><code>use A, B { A::f insteadof B; }</code></td></tr>
  <tr><td>Require host methods</td><td>—</td><td><code>abstract public function name(): string;</code> in the trait</td></tr>
  <tr><td>State</td><td>embedded struct's fields</td><td>traits can declare properties too</td></tr>
</table>
<p>The insight: a trait is compile-time copy-paste with <code>$this</code>
left late-bound. That's precisely the piece Go embedding lacks — its inner
methods are compiled against the inner type, while a trait's methods are
compiled into each host class, so <code>$this</code> means <em>Dog</em> or
<em>Robot</em>, not "Describable". In production code, make the contract
explicit: declare <code>abstract public function name(): string;</code>
inside the trait and PHP will refuse to load any class that uses the trait
without providing <code>name()</code> — your interface-like guarantee,
enforced at class-load time.</p>`,
};
