const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>PHP variables wear a sigil: every variable is <code>$name</code>, and
assignment declares it — <code>$name = "Ada";</code> is PHP's
<code>name := "Ada"</code>. The difference is what happens next: there is no
compiler pass. Nothing type-checks your file before it runs, and a variable
can be freely reassigned to a value of another type. Go's
<code>int</code>/<code>int64</code>/<code>float64</code> menagerie collapses
to just <code>int</code> and <code>float</code>.</p>
<table>
  <tr><th>Go</th><th>PHP</th></tr>
  <tr><td><code>name := "Ada"</code></td><td><code>$name = "Ada";</code></td></tr>
  <tr><td><code>var age int = 36</code></td><td><code>$age = 36;</code> (no annotation on variables)</td></tr>
  <tr><td><code>int</code>, <code>int64</code>, <code>float64</code>…</td><td><code>int</code> and <code>float</code>, that's it</td></tr>
  <tr><td><code>func f(x int) string</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td><code>fmt.Sprintf("%s is %d", n, a)</code></td><td><code>"$n is $a"</code> (interpolation, no verbs)</td></tr>
</table>
<p>You don't lose types entirely: function <em>signatures</em> can (and in
this course always will) declare them — <code>function f(int $x): string</code>.
They're enforced when the function is <em>called</em>, at runtime: pass the
wrong type and PHP throws a <code>TypeError</code>. No compile-time check,
but no silent coercion into garbage either. And note that word:
<em>throws</em>. PHP signals failure with exceptions, not
<code>(value, error)</code> returns — the biggest mental shift of this course,
covered fully in lesson 16.</p>`,

  go: `name := "Ada"
age := 36

// Go: the compiler rejects this before anything runs.
// age = "thirty-six"  // compile error

func describeUser(name string, age int) string {
    return fmt.Sprintf("%s is %d years old", name, age)
}

func birthday(age int) int {
    next := age
    next += 1
    return next
}

fmt.Println(describeUser(name, age))`,

  task: `
<p>Rewrite the Go as PHP:</p>
<ol>
  <li>Write a function <code>describe_user</code> taking
      <code>string $name</code> and <code>int $age</code> (type <em>before</em>
      the parameter, so <code>name string</code> becomes
      <code>string $name</code>) with a <code>: string</code> return type,
      returning <code>"Ada is 36 years old"</code>-style text. Skip
      <code>Sprintf</code>: inside double quotes, <code>"$name is $age years
      old"</code> interpolates directly — no format verbs to mismatch.</li>
  <li>Write a function <code>birthday</code> that takes <code>int $age</code>,
      returns <code>int</code>, and adds 1 using a local variable and
      <code>+=</code>.</li>
</ol>
<p>Keep the <code>&lt;?php</code> tag at the top, and note the convention
change: Go's <code>camelCase</code> becomes <code>snake_case</code> for PHP
function names. The lesson's tests call your functions directly.</p>`,

  starter: `<?php

// 1. describe_user: string $name and int $age in, string out.
//    Go: fmt.Sprintf("%s is %d years old", name, age)
//    PHP: "$name is $age years old"
function describe_user(string $name, int $age): string {
    throw new Exception("TODO: implement describe_user");
}

// 2. birthday: assign to a local, add 1 with +=, return it.
function birthday(int $age): int {
    throw new Exception("TODO: implement birthday");
}
`,

  requirements: [
    { pattern: /function\s+describe_user\s*\(\s*string\s+\$name\s*,\s*int\s+\$age\s*\)\s*:\s*string/, message: "Define describe_user(string $name, int $age): string with full type declarations" },
    { pattern: /"\$\w+/, message: "Build the string with double-quote interpolation, not Sprintf-style formatting or concatenation" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'expect_eq(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Rob", 52) returns "Rob is 52 years old"',
      code: 'expect_eq(describe_user("Rob", 52), "Rob is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "expect_eq(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "expect_eq(birthday(0), 1);" },
  ],

  solution: `<?php

function describe_user(string $name, int $age): string {
    return "$name is $age years old";
}

function birthday(int $age): int {
    $next = $age;
    $next += 1;
    return $next;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>PHP</th></tr>
  <tr><td>Declare + assign</td><td><code>x := 1</code></td><td><code>$x = 1;</code> (assignment is declaration)</td></tr>
  <tr><td>Change type later</td><td>compile error</td><td>allowed — variables are dynamic</td></tr>
  <tr><td>Numbers</td><td><code>int</code>, <code>int64</code>, <code>float64</code>, …</td><td><code>int</code> and <code>float</code></td></tr>
  <tr><td>Typed signature</td><td><code>func f(x int) string</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td>Formatting</td><td><code>fmt.Sprintf("%s is %d", n, a)</code></td><td><code>"$n is $a"</code> in double quotes</td></tr>
  <tr><td>Failure</td><td><code>return val, err</code></td><td><code>throw new Exception(...)</code> (lesson 16)</td></tr>
  <tr><td>Naming</td><td><code>camelCase</code></td><td><code>snake_case</code> functions</td></tr>
</table>
<p>PHP's signature types are real — call <code>birthday("old")</code> and you
get a <code>TypeError</code> — but they're checked at runtime, when the call
happens, not ahead of time. There's no <code>go build</code> moment to catch
mistakes for you; in real projects, static analyzers like PHPStan fill that
role. And unlike your long-running Go binaries, a PHP script typically lives
for one request: it starts, runs top to bottom, and all state vanishes.</p>`,
};
