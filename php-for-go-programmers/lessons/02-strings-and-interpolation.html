  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>Go string work is <code>fmt.Sprintf</code> plus the <code>strings</code>
package. PHP replaces the first with interpolation — inside double quotes,
<code>"$name is $age"</code> just works, with no <code>%s</code>/<code>%d</code>
verbs to mismatch (write <code>"{$name}"</code> with braces when the variable
butts up against other text). The second maps almost one-to-one onto PHP's
global string functions: they're free functions like Go's
<code>strings.ToUpper(s)</code>, not methods — you'll feel right at home.</p>
<table>
  <tr><th>Go</th><th>PHP</th></tr>
  <tr><td><code>fmt.Sprintf("Hi, %s!", name)</code></td><td><code>"Hi, $name!"</code></td></tr>
  <tr><td><code>a + b</code> (concat)</td><td><code>$a . $b</code> — <code>+</code> is arithmetic <em>only</em></td></tr>
  <tr><td><code>strings.ToUpper(s)</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td><code>strings.Contains(h, n)</code></td><td><code>str_contains($h, $n)</code> (same argument order!)</td></tr>
  <tr><td><code>len(s)</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td><code>strings.Join(parts, ", ")</code></td><td><code>implode(", ", $parts)</code> (order flips)</td></tr>
</table>
<p>Two traps for Go fingers. First, concatenation is the dot operator:
<code>$a . $b</code>. Writing <code>$a + $b</code> on strings is arithmetic
and will not do what you want. Second, argument order is inconsistent across
PHP's standard library — <code>str_contains(haystack, needle)</code> matches
Go, but <code>implode(glue, pieces)</code> is <code>strings.Join</code>
reversed. Check, don't assume.</p>`,

  go: `s := "gopher"
loud := strings.ToUpper(s)

name := "Ada"
greeting := fmt.Sprintf("Hello, %s!", name)

if strings.Contains("go gopher", "gopher") {
    fmt.Println("found it")
}

fmt.Println(len(s)) // 6

parts := []string{"go", "php"}
line := strings.Join(parts, ", ") // "go, php"

fmt.Println(loud, greeting, line)`,

  task: `
<p>Port the string toolbox:</p>
<ol>
  <li><code>shout(string $s): string</code> — uppercase the input with
      <code>strtoupper</code> (that's <code>strings.ToUpper</code>).</li>
  <li><code>greet(string $name): string</code> — return
      <code>"Hello, Ada!"</code>-style text using interpolation, not
      concatenation. Try the braced form <code>"{$name}"</code>.</li>
  <li><code>contains_word(string $haystack, string $needle): bool</code> —
      wrap <code>str_contains</code>; the argument order matches
      <code>strings.Contains</code>.</li>
  <li><code>join_words(array $words): string</code> — join with
      <code>", "</code> using <code>implode</code>. Careful: the glue comes
      <em>first</em>, the opposite of <code>strings.Join</code>.</li>
</ol>`,

  starter: `<?php

    throw new Exception("TODO: implement shout");
}

// 2. fmt.Sprintf("Hello, %s!", name) -> interpolation in double quotes

    throw new Exception("TODO: implement greet");
}

// 3. strings.Contains(haystack, needle) -> str_contains, same order

    throw new Exception("TODO: implement contains_word");
}

// 4. strings.Join(words, ", ") -> implode(", ", $words) - order flips!

    throw new Exception("TODO: implement join_words");
}
`,

  requirements: [
    { pattern: /"\$\w+|\{\$\w+/, message: "Use double-quote interpolation in greet, not concatenation" },
    { pattern: /strtoupper/, message: "Use strtoupper in shout" },
    { pattern: /str_contains/, message: "Use str_contains in contains_word" },
    { pattern: /implode/, message: "Use implode in join_words" },
  ],

  tests: [
    { name: 'shout("gopher") returns "GOPHER"',
      code: 'expect_eq(shout("gopher"), "GOPHER");' },
    { name: 'greet("Ada") returns "Hello, Ada!"',
      code: 'expect_eq(greet("Ada"), "Hello, Ada!");' },
    { name: 'contains_word finds "gopher" in "go gopher"',
      code: 'expect_true(contains_word("go gopher", "gopher"));' },
    { name: 'contains_word does not find "rust" in "go gopher"',
      code: 'expect_eq(contains_word("go gopher", "rust"), false);' },
    { name: 'join_words(["go", "php"]) returns "go, php"',
      code: 'expect_eq(join_words(["go", "php"]), "go, php");' },
  ],

  solution: `<?php

function shout(string $s): string {
    return strtoupper($s);
}

function greet(string $name): string {
    return "Hello, {$name}!";
}

function contains_word(string $haystack, string $needle): bool {
    return str_contains($haystack, $needle);
}

function join_words(array $words): string {
    return implode(", ", $words);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>PHP</th></tr>
  <tr><td>Format into a string</td><td><code>fmt.Sprintf("%s is %d", n, a)</code></td><td><code>"$n is $a"</code> or <code>"{$n} is {$a}"</code></td></tr>
  <tr><td>Concatenate</td><td><code>a + b</code></td><td><code>$a . $b</code></td></tr>
  <tr><td>Uppercase</td><td><code>strings.ToUpper(s)</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td>Substring test</td><td><code>strings.Contains(h, n)</code></td><td><code>str_contains($h, $n)</code></td></tr>
  <tr><td>Length</td><td><code>len(s)</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td>Join</td><td><code>strings.Join(parts, ", ")</code></td><td><code>implode(", ", $parts)</code></td></tr>
  <tr><td>Split</td><td><code>strings.Split(s, ",")</code></td><td><code>explode(",", $s)</code></td></tr>
</table>
<p>Interpolation only happens inside <em>double</em> quotes; single-quoted
strings are literal, closer to Go raw strings. And when a formatting itch
really needs verbs, PHP does ship <code>sprintf</code> with the same
<code>%s</code>/<code>%d</code> family — but idiomatic PHP reaches for
interpolation first, so this course does too.</p>`,
};
