<script>
const LESSON = {
  number: 18,
  title: "Modules",

  intro: `
<p>C# organizes code with namespaces, assemblies, and access modifiers —
<code>public</code>, <code>internal</code>, <code>private</code> — enforced by
the compiler and the CLR at every call site. A <code>using Some.Namespace;</code>
directive brings types into scope, and anything not marked <code>public</code>
(or <code>internal</code> within the same assembly) is invisible to the caller,
a rule the runtime itself upholds via metadata tokens. JavaScript's module
syntax looks superficially similar — <code>export</code>, <code>import</code>,
<code>export default</code> — but there is no visibility keyword at all. A
module is nothing more than a plain object of live bindings: whatever you
attach to it with <code>export</code> is visible, and whatever you don't is
simply absent, not access-denied.</p>
<table>
  <tr><th>C#</th><th>JavaScript (runtime)</th></tr>
  <tr><td><code>public const decimal TaxRate = 0.1m;</code></td><td><code>export const TAX_RATE = 0.1;</code></td></tr>
  <tr><td><code>internal static class Cart { ... }</code></td><td>a non-exported binding — invisible outside the file, full stop</td></tr>
  <tr><td><code>using Store;</code></td><td><code>import { TAX_RATE, addTax } from "./m.js";</code></td></tr>
  <tr><td>no equivalent — types are always referenced by name</td><td><code>export default function total() {}</code></td></tr>
</table>
<p>The mental shift: a named export is a <em>value</em> you name, much like
<code>using Store;</code> lets you reference <code>Store.Pricing.TaxRate</code>
by name; the default export is just the one binding the module hands back when
you import it without braces — something C# has no parallel for, since every
C# type is always reached through its declared name. And because JavaScript has
no <code>internal</code>/<code>private</code> for module-level bindings, a value
that isn't exported isn't protected by an access check — it's simply not a
property on the module object.</p>`,

  csharp: `namespace Store;

public static class Pricing
{
    public const decimal TaxRate = 0.1m;

    public static int AddTax(int cents) =>
        (int)Math.Round(cents * (1 + TaxRate));

    public static string FormatUsd(int cents) =>
        "$" + (cents / 100m).ToString("F2");
}

// C# has no "default export" — every public member is reached
// by name via "using Store;"; there is no unnamed default member.
public static class Totals
{
    public static int Total(int[] items) => items.Sum();
}`,

  task: `
<p>Build a tiny pricing module using plain-JavaScript exports. Export every
symbol directly (no access modifiers — everything exported is simply exported),
and give the module one default export:</p>
<ol>
  <li><strong>Named const export</strong>: <code>TAX_RATE</code> = <code>0.1</code>.</li>
  <li><strong>Named function export</strong>: <code>addTax(cents)</code> returns
      the price with tax added, rounded to a whole number of cents
      (<code>Math.round(cents * (1 + TAX_RATE))</code>).</li>
  <li><strong>Named function export</strong>: <code>formatUSD(cents)</code>
      returns a string like <code>"$12.34"</code> (dollars with two decimals).</li>
  <li><strong>Default export</strong>: <code>total(items)</code>, a function that
      sums an array of cent amounts and returns the total (<code>0</code> for an
      empty array). Export it with <code>export default</code>.</li>
</ol>`,

  starter: `// 1. named const export
export const TAX_RATE = 0.1;

// 2. named function export: price with tax, rounded to whole cents
export function addTax(cents) {
  // TODO
  return 0;
}

// 3. named function export: cents -> "$12.34"
export function formatUSD(cents) {
  // TODO
  return "";
}

// 4. default export: sum an array of cent amounts
export default function total(items) {
  // TODO
  return 0;
}
`,

  exportNames: ["TAX_RATE", "addTax", "formatUSD", "total"],

  requirements: [
    { pattern: /export\s+const\s+TAX_RATE/, message: "Use a named const export for TAX_RATE" },
    { pattern: /export\s+function\s+addTax/, message: "Use a named function export for addTax" },
    { pattern: /export\s+default/, message: "Use export default for total" },
  ],

  tests: [
    { name: "TAX_RATE is 0.1", run: (x) => expectEqual(x.TAX_RATE, 0.1) },
    { name: "addTax(100) is 110", run: (x) => expectEqual(x.addTax(100), 110) },
    { name: "addTax(199) rounds to 219", run: (x) => expectEqual(x.addTax(199), 219) },
    { name: 'formatUSD(1234) is "$12.34"', run: (x) => expectEqual(x.formatUSD(1234), "$12.34") },
    { name: 'formatUSD(500) is "$5.00"', run: (x) => expectEqual(x.formatUSD(500), "$5.00") },
    { name: "default export total sums the array", run: (x) => expectEqual(x.total([100, 200, 300]), 600) },
    { name: "default export total([]) is 0", run: (x) => expectEqual(x.total([]), 0) },
  ],

  solution: `export const TAX_RATE = 0.1;

export function addTax(cents) {
  return Math.round(cents * (1 + TAX_RATE));
}

export function formatUSD(cents) {
  return "$" + (cents / 100).toFixed(2);
}

export default function total(items) {
  return items.reduce((sum, cents) => sum + cents, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Named export</td><td><code>public const int X = 1;</code></td><td><code>export const x = 1;</code> (no modifier needed)</td></tr>
  <tr><td>Default export</td><td>no equivalent — types are always referenced by name</td><td>becomes the <code>default</code> binding</td></tr>
  <tr><td>Visibility</td><td><code>internal</code>/<code>private</code>, enforced by the CLR</td><td>unexported = simply absent from the module object</td></tr>
  <tr><td>Importing</td><td><code>using Store;</code> then <code>Pricing.TaxRate</code></td><td><code>import fn from "./m.js";</code> (same idea)</td></tr>
</table>
<p>A default export is not a special kind of value — it is exposed under the name
<code>default</code>, which is exactly why <code>import Something from "./m.js"</code>
(no braces) grabs it and lets you rename it freely, while named imports must
match the exported name inside braces. C# has no real analogue: every
<code>public</code> type is always reached through its declared name, whether
that's <code>Store.Pricing</code> or a fully qualified path — there's no "the
one thing this namespace hands back by default." And because JavaScript has no
<code>internal</code> or <code>private</code> for module-level bindings, a value
that isn't <code>export</code>ed isn't protected by any access check — it's just
not a property on the module object, so it can never be imported, no matter
what you try from the outside. At runtime, a module is just an object of live
value bindings — no more, no less.</p>`,
};
