  number: 12,
  title: "Array Iteration",

  intro: `
<p>In C# you reach for LINQ to keep transformations honest:
<code>Select</code> gives you an <code>IEnumerable&lt;TResult&gt;</code>,
<code>Where</code> narrows, <code>Aggregate</code> threads an accumulator
whose type is fixed by its seed. JavaScript's array methods are the same
idea with different names — <code>map</code>, <code>filter</code>,
<code>reduce</code> — but they run against plain arrays, execute eagerly
(no deferred execution the way LINQ queries do), and nothing checks the
shape of what flows through them, so the discipline moves from the
compiler into your head.</p>
<table>
  <tr><th>C#</th><th>JavaScript</th></tr>
  <tr><td><code>orders.Select(o =&gt; o.Customer)</code></td><td><code>orders.map((o) =&gt; o.customer)</code></td></tr>
  <tr><td><code>orders.Aggregate(0, (sum, o) =&gt; sum + o.Total)</code></td><td><code>orders.reduce((sum, o) =&gt; sum + o.total, 0)</code></td></tr>
  <tr><td><code>orders.FirstOrDefault(...)</code> — <code>null</code> or default struct</td><td><code>arr.find(...)</code> — may be <code>undefined</code></td></tr>
  <tr><td>result type inferred &amp; checked</td><td>result is whatever the callback returned</td></tr>
</table>
<p>The idiomatic move — in both languages — is to <em>chain</em> these methods
instead of writing manual <code>for</code> loops: describe the transformation as
a pipeline (<code>filter</code> then <code>map</code> then <code>reduce</code>)
rather than a sequence of mutations. At runtime each link allocates a new array,
so the pipeline reads top-to-bottom as a series of pure steps — unlike LINQ's
lazy <code>IEnumerable</code> chains, JavaScript's chain runs and materializes
an array at every step. Two runtime facts worth holding onto: <code>find</code>
returns <code>undefined</code> when nothing matches (there's no
<code>FirstOrDefault</code>-style default value to configure), and
<code>reduce</code> on an empty array <em>throws</em> if you gave it no initial
value.</p>`,

  csharp: `record Order(int Id, string Customer, decimal Total, bool Paid);

decimal PaidTotal(IEnumerable<Order> orders) =>
    orders
        .Where(o => o.Paid)
        .Aggregate(0m, (sum, o) => sum + o.Total);

IEnumerable<string> CustomerNames(IEnumerable<Order> orders) =>
    orders.Select(o => o.Customer);`,

  task: `
<p>You are given an array of order objects, each shaped like
<code>{ id, customer, total, paid }</code>. Build a little reporting toolkit —
no manual <code>for</code>/<code>while</code> loops, use the array methods:</p>
<ol>
  <li><code>paidTotal(orders)</code> — sum of <code>total</code> across only the
      <em>paid</em> orders (chain <code>filter</code> then <code>reduce</code>).
      Returns <code>0</code> for an empty array.</li>
  <li><code>bigSpenders(orders, min)</code> — an array of the
      <code>customer</code> names whose order <code>total</code> is greater than
      or equal to <code>min</code> (chain <code>filter</code> then
      <code>map</code>).</li>
  <li><code>findOrder(orders, id)</code> — the first order object with the given
      <code>id</code>, or <code>undefined</code> if there is none (use
      <code>find</code>).</li>
  <li><code>allPaid(orders)</code> — <code>true</code> if every order is paid
      (use <code>every</code>).</li>
  <li><code>anyUnpaid(orders)</code> — <code>true</code> if at least one order is
      unpaid (use <code>some</code>).</li>
  <li><code>totalByCustomer(orders)</code> — an object mapping each customer name
      to the sum of their order totals, built with a single <code>reduce</code>.</li>
</ol>`,

`,

  exportNames: ["paidTotal", "bigSpenders", "findOrder", "allPaid", "anyUnpaid", "totalByCustomer"],

  requirements: [
    { pattern: /\.filter\s*\(/, message: "Use .filter() to select orders" },
    { pattern: /\.map\s*\(/, message: "Use .map() to project customer names" },
    { pattern: /\.reduce\s*\(/, message: "Use .reduce() to aggregate totals" },
    { pattern: /\.find\s*\(/, message: "Use .find() to locate an order by id" },
  ],

  tests: [
    {
      name: "paidTotal sums only paid orders",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Ada", total: 10, paid: true },
        ];
        expectEqual(x.paidTotal(orders), 50);
      },
    },
    {
      name: "paidTotal returns 0 for an empty array",
      run: (x) => expectEqual(x.paidTotal([]), 0),
    },
    {
      name: "bigSpenders keeps names at or above min",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Cy", total: 100, paid: true },
        ];
        expectDeepEqual(x.bigSpenders(orders, 40), ["Ada", "Cy"]);
      },
    },
    {
      name: "findOrder returns the matching order",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
        ];
        expectEqual(x.findOrder(orders, 2).customer, "Rob");
      },
    },
    {
      name: "findOrder returns undefined when nothing matches",
      run: (x) => expectEqual(x.findOrder([{ id: 1, customer: "Ada", total: 40, paid: true }], 99), undefined),
    },
    {
      name: "allPaid and anyUnpaid reflect the paid flags",
      run: (x) => {
        const mixed = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
        ];
        const clean = [{ id: 3, customer: "Cy", total: 10, paid: true }];
        expectEqual(x.allPaid(mixed), false);
        expectEqual(x.allPaid(clean), true);
        expectEqual(x.anyUnpaid(mixed), true);
        expectEqual(x.anyUnpaid(clean), false);
      },
    },
    {
      name: "totalByCustomer groups totals by name",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Ada", total: 10, paid: true },
        ];
        expectDeepEqual(x.totalByCustomer(orders), { Ada: 50, Rob: 25 });
      },
    },
  ],

  solution: `function paidTotal(orders) {
  return orders
    .filter((o) => o.paid)
    .reduce((sum, o) => sum + o.total, 0);
}

function bigSpenders(orders, min) {
  return orders
    .filter((o) => o.total >= min)
    .map((o) => o.customer);
}

function findOrder(orders, id) {
  return orders.find((o) => o.id === id);
}

function allPaid(orders) {
  return orders.every((o) => o.paid);
}

function anyUnpaid(orders) {
  return orders.some((o) => !o.paid);
}

function totalByCustomer(orders) {
  return orders.reduce((acc, o) => {
    acc[o.customer] = (acc[o.customer] || 0) + o.total;
    return acc;
  }, {});
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Mapped result type</td><td><code>IEnumerable&lt;TResult&gt;</code>, checked</td><td>whatever the callback returns</td></tr>
  <tr><td>reduce accumulator</td><td>type fixed by the seed passed to <code>Aggregate</code></td><td>whatever you seed and return</td></tr>
  <tr><td>find miss</td><td><code>FirstOrDefault</code> returns <code>null</code>/default, no exception</td><td>silently <code>undefined</code></td></tr>
  <tr><td>reduce, no seed, empty array</td><td><code>Aggregate</code> without a seed throws <code>InvalidOperationException</code></td><td>throws <code>TypeError</code> at runtime</td></tr>
  <tr><td>Grouping accumulator</td><td><code>Dictionary&lt;string, decimal&gt;</code></td><td>a plain <code>{}</code> object</td></tr>
</table>
<p>Because the compiler is gone, a few runtime edges become yours to manage.
Always pass an initial value to <code>reduce</code> — both to define the result
type in your head and because <code>[].reduce((a, b) =&gt; a + b)</code> throws
"Reduce of empty array with no initial value" (the same trap as calling
<code>Aggregate</code> without a seed on an empty sequence). A <code>find</code>
that fails returns <code>undefined</code>, so reaching straight into
<code>.customer</code> on the result can blow up with "Cannot read properties of
undefined" — guard it, or use <code>?.</code>, much as you'd guard a
<code>null</code> from <code>FirstOrDefault</code>. And each of
<code>filter</code>/<code>map</code> allocates a fresh array — unlike LINQ's
lazily-evaluated chain, which only walks the sequence once when you finally
enumerate it — so a long JavaScript chain over a huge list does more work than
one fused loop; for the sizes in everyday code the readability of the pipeline
wins, but it is a real runtime cost the type annotations never hinted at.</p>`,
};
