  intro: `
<p>Time to put it together. This capstone is a tiny in-memory <em>task store</em>
that leans on almost everything this course has covered: a <strong>class</strong>
to hold state and behavior, <strong>array-iteration methods</strong>
(<code>find</code>, <code>filter</code>, <code>reduce</code>) to query and
aggregate, and <strong>custom errors</strong> to refuse bad input. Nothing here
is new syntax — you have written all of it in C#. The point is to feel
how it behaves once the compiler is gone and the only thing standing between
a caller and a corrupt store is the code <em>you</em> wrote.</p>
<table>
  <tr><th>C#</th><th>JavaScript</th></tr>
  <tr><td><code>class Task { public int Id; public bool Done; }</code></td><td>a plain object shaped however you build it</td></tr>
  <tr><td><code>List&lt;Task&gt; _tasks</code> — element type enforced</td><td><code>this.tasks = []</code> — holds anything you push</td></tr>
  <tr><td>compiler rejects <code>Add(42)</code></td><td>you must <code>throw</code> to reject it</td></tr>
  <tr><td><code>Task Get(int id)</code> can't (implicitly) return null</td><td><code>find</code> returns <code>undefined</code>; guard it</td></tr>
</table>
<p>In C#, <code>FirstOrDefault</code> returning a possibly-null <code>Task</code>
is something nullable reference types force you to handle at compile time. At
runtime that safety net does not exist in JavaScript: <code>find</code> hands
back a task or <code>undefined</code>, and if you forget to check, the very next
property access throws a <code>TypeError</code>. The runtime discipline is to
<em>make the miss explicit</em> — detect it and throw a meaningful error instead
of letting a cryptic one leak out later.</p>`,

  csharp: `class NotFoundException : Exception {
    public NotFoundException(string message) : base(message) { }
}
class ValidationException : Exception {
    public ValidationException(string message) : base(message) { }
}

// Named TaskItem to avoid clashing with System.Threading.Tasks.Task
class TaskItem {
    public int Id { get; set; }
    public string Title { get; set; }
    public int Priority { get; set; }
    public bool Done { get; set; }
}

class TaskStore {
    private readonly List<TaskItem> _tasks = new();
    private int _nextId = 1;

    public TaskItem Add(string title, int priority = 1) {
        if (string.IsNullOrWhiteSpace(title)) throw new ValidationException("title required");
        var task = new TaskItem { Id = _nextId++, Title = title, Priority = priority, Done = false };
        _tasks.Add(task);
        return task;
    }

    public TaskItem Get(int id) {
        var task = _tasks.FirstOrDefault(t => t.Id == id);
        if (task is null) throw new NotFoundException($"no task {id}");
        return task;
    }

    public TaskItem Complete(int id) {
        var task = Get(id);
        task.Done = true;
        return task;
    }

    public List<TaskItem> Pending() {
        return _tasks.Where(t => !t.Done).ToList();
    }

    public (int Total, int Done, int Pending) Summary() {
        return _tasks.Aggregate(
            (Total: 0, Done: 0, Pending: 0),
            (acc, t) => (
                Total: acc.Total + 1,
                Done: acc.Done + (t.Done ? 1 : 0),
                Pending: acc.Pending + (t.Done ? 0 : 1)
            )
        );
    }
}`,

  task: `
<p>Build the plain-JavaScript version of the same store. Define two error
classes and one <code>TaskStore</code> class.</p>
<ol>
  <li>Define <code>ValidationError</code> and <code>NotFoundError</code>, each a

  <li><code>summary()</code>: use <code>reduce</code> to return

</ol>`,

  exportNames: ["TaskStore", "ValidationError", "NotFoundError"],

  requirements: [
    { pattern: /class\s+TaskStore/, message: "Define a TaskStore class" },
    { pattern: /class\s+\w*Error\s+extends\s+Error/, message: "Define a custom Error subclass" },
    { pattern: /\.(find|filter|reduce)\s*\(/, message: "Use array-iteration methods (find/filter/reduce)" },

  tests: [
    { name: "add returns a task with id 1, not done", run: (x) => {
        const store = new x.TaskStore();
        expectDeepEqual(store.add("Write", 2), { id: 1, title: "Write", priority: 2, done: false });
      } },
    { name: "ids auto-increment across adds", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        expectEqual(store.add("b").id, 2);
      } },
    { name: "add with an empty title throws ValidationError", run: (x) => {
        const store = new x.TaskStore();
        try { store.add("   "); } catch (e) { expectTruthy(e instanceof x.ValidationError); return; }
        throw new Error("expected add('   ') to throw");
      } },
    { name: "get throws NotFoundError for a missing id", run: (x) => {
        const store = new x.TaskStore();
        try { store.get(99); } catch (e) { expectTruthy(e instanceof x.NotFoundError); return; }
        throw new Error("expected get(99) to throw");
      } },
    { name: "complete marks a task done", run: (x) => {
        const store = new x.TaskStore();
        const t = store.add("ship");
        expectEqual(store.complete(t.id).done, true);
      } },
    { name: "pending excludes completed tasks", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        const b = store.add("b");
        store.complete(b.id);
        expectDeepEqual(store.pending().map((t) => t.title), ["a"]);
      } },
    { name: "summary counts total/done/pending", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        store.add("b");
        store.complete(store.add("c").id);
        expectDeepEqual(store.summary(), { total: 3, done: 1, pending: 2 });
      } },
    { name: "custom errors carry a name, message, and stack", run: (x) => {
        const err = new x.NotFoundError("nope");
        expectTruthy(err instanceof x.NotFoundError);
        expectEqual(err.name, "NotFoundError");
        expectEqual(err.message, "nope");
        expectTruthy(typeof err.stack === "string");
      } },
  ],

  solution: `class ValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = "ValidationError";
  }
}

class NotFoundError extends Error {
  constructor(message) {
    super(message);
    this.name = "NotFoundError";
  }
}

class TaskStore {
  constructor() {
    this.tasks = [];
    this.nextId = 1;
  }

  add(title, priority = 1) {
    if (typeof title !== "string" || title.trim() === "") {
      throw new ValidationError("title must be a non-empty string");
    }
    const task = { id: this.nextId++, title, priority, done: false };
    this.tasks.push(task);
    return task;
  }

  get(id) {
    const task = this.tasks.find((t) => t.id === id);
    if (!task) {
      throw new NotFoundError("no task with id " + id);
    }
    return task;
  }

  complete(id) {
    const task = this.get(id);
    task.done = true;
    return task;
  }

  pending() {
    return this.tasks.filter((t) => !t.done);
  }

  summary() {
    return this.tasks.reduce(
      (acc, t) => {
        acc.total += 1;
        if (t.done) acc.done += 1;
        else acc.pending += 1;
        return acc;
      },
      { total: 0, done: 0, pending: 0 }
    );
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>JavaScript</th></tr>
  <tr><td>Task shape</td><td><code>class TaskItem</code> enforced</td><td>whatever object you construct</td></tr>
  <tr><td>Bad input</td><td>rejected at compile time</td><td>rejected only if you <code>throw</code></td></tr>
  <tr><td>Missing lookup</td><td>nullable reference types force a check</td><td><code>find</code> returns <code>undefined</code> silently</td></tr>
  <tr><td>Aggregate</td><td><code>Aggregate</code> with a typed tuple accumulator</td><td><code>reduce</code> with a seed object</td></tr>
</table>
<p>The lesson of the whole course lives in one line: <code>this.tasks.find(...)</code>
returns a task <em>or</em> <code>undefined</code>, and the runtime will not stop
you from reading <code>.done</code> off <code>undefined</code>. The
<code>if (!task) throw</code> guard is you doing, by hand, the narrowing that
C#'s compiler and nullable-reference-type checker do for free. Every place C#
inserted a check, runtime JavaScript code has to earn it.</p>
<p>Two other habits carried through here. Custom exception types let callers
tell <em>why</em> something failed — in C# via a typed <code>catch
(NotFoundException e)</code> clause, in JavaScript via <code>instanceof</code>
since there is no such thing as a typed catch. The JavaScript check only works
because each constructor sets <code>this.name</code>. And the array methods
(<code>find</code>, <code>filter</code>, <code>reduce</code>) stayed the
workhorses: they read the same as LINQ's <code>FirstOrDefault</code>,
<code>Where</code>, and <code>Aggregate</code>, they just no longer promise
anything about what the elements are. That promise is now your job.</p>`,
};
