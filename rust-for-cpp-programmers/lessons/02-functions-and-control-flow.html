<script>
const LESSON = {
  number: 2,
  title: "Functions & Control Flow",

  intro: `
<p>C++11 added trailing return types — <code>auto f(int x) -&gt; std::string</code> —
and in Rust that fight is over: the trailing form is the only form.
<code>std::string f(int x)</code> becomes <code>fn f(x: i32) -&gt; String</code>.
Parameter types sit after the name (<code>x: i32</code>), the return type
after the arrow, and there are no forward declarations or header/source
splits — declaration order within a file doesn't matter.</p>
<table>
  <tr><th>C++</th><th>Rust</th></tr>
  <tr><td><code>std::string f(int x) { ... }</code></td><td><code>fn f(x: i32) -&gt; String { ... }</code></td></tr>
  <tr><td><code>int m = a &gt; b ? a : b;</code></td><td><code>let m = if a &gt; b { a } else { b };</code></td></tr>
  <tr><td><code>return x;</code></td><td><code>x</code> as the block's last expression (no semicolon)</td></tr>
  <tr><td>Forward declarations / headers</td><td>Not needed — order doesn't matter</td></tr>
</table>
<p>The bigger shift: nearly everything is an expression. The ternary operator
is gone because <code>if</code>/<code>else</code> itself produces a value —
<code>let m = if a &gt; b { a } else { b };</code> reads like the ternary but
scales to multi-line branches without nesting <code>?:</code>. A block's last
expression — written <em>without</em> a trailing semicolon — is the block's
value, so idiomatic Rust functions rarely spell out <code>return</code>
(it still exists, for early exits). Add a semicolon and you've turned the
expression into a statement returning <code>()</code>; the compiler will tell
you exactly that when you forget.</p>`,

  cpp: `#include <string>

int max_of(int a, int b);   // forward declaration, or a compile error below

int max_of(int a, int b) {
    return a > b ? a : b;   // the ternary: C++'s only expression-if
}

std::string grade(unsigned score) {
    if (score >= 60) {
        return "pass";
    }
    return "fail";
}

int sign(int n) {
    if (n > 0) return 1;
    if (n < 0) return -1;
    return 0;
}`,

  task: `
<p>Rewrite the C++ as Rust, leaning on expressions:</p>
<ol>
  <li><code>max_of</code> takes <code>a: i32</code> and <code>b: i32</code> and
      returns <code>i32</code> — the larger of the two. Use an
      <code>if</code>-expression bound with <code>let</code> (the ternary's
      replacement); don't use the <code>return</code> keyword at all.</li>
  <li><code>grade</code> takes <code>score: u32</code> and returns
      <code>String</code>: <code>"pass"</code> for 60 and above,
      <code>"fail"</code> below. (Turn a <code>&amp;str</code> literal into a
      <code>String</code> with <code>.to_string()</code>.)</li>
  <li><code>sign</code> takes <code>n: i32</code> and returns <code>i32</code>:
      <code>1</code> if positive, <code>-1</code> if negative, <code>0</code>
      otherwise — an <code>if</code>/<code>else if</code>/<code>else</code>
      chain as the function's final expression.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. max_of: bind an if-expression with \`let\`, no \`return\` keyword.
//    C++: a > b ? a : b   ->   Rust: if a > b { a } else { b }
fn max_of(a: i32, b: i32) -> i32 {
    todo!()
}

// 2. grade: "pass" for score >= 60, "fail" otherwise.
fn grade(score: u32) -> String {
    todo!()
}

// 3. sign: 1 for positive, -1 for negative, 0 for zero.
fn sign(n: i32) -> i32 {
    todo!()
}
`,

  requirements: [
    { pattern: /->/, message: "Use trailing return types: fn name(...) -> Type" },
    { pattern: /=\s*if\b/, message: "Bind an if-expression with let, like the ternary: let m = if a > b { a } else { b }" },
  ],

  tests: [
    { name: "max_of(3, 7) returns 7",
      code: "assert_eq!(max_of(3, 7), 7);" },
    { name: "max_of(10, -2) returns 10",
      code: "assert_eq!(max_of(10, -2), 10);" },
    { name: 'grade(60) and grade(93) return "pass"',
      code: 'assert_eq!(grade(60), "pass");\nassert_eq!(grade(93), "pass");' },
    { name: 'grade(59) returns "fail"',
      code: 'assert_eq!(grade(59), "fail");' },
    { name: "sign(-8) is -1, sign(0) is 0, sign(5) is 1",
      code: "assert_eq!(sign(-8), -1);\nassert_eq!(sign(0), 0);\nassert_eq!(sign(5), 1);" },
  ],

  solution: `fn max_of(a: i32, b: i32) -> i32 {
    let bigger = if a > b { a } else { b };
    bigger
}

fn grade(score: u32) -> String {
    let result = if score >= 60 { "pass" } else { "fail" };
    result.to_string()
}

fn sign(n: i32) -> i32 {
    if n > 0 {
        1
    } else if n < 0 {
        -1
    } else {
        0
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Rust</th></tr>
  <tr><td>Function signature</td><td><code>std::string f(int x)</code></td><td><code>fn f(x: i32) -&gt; String</code></td></tr>
  <tr><td>Conditional expression</td><td><code>a &gt; b ? a : b</code></td><td><code>if a &gt; b { a } else { b }</code></td></tr>
  <tr><td>Returning a value</td><td><code>return x;</code></td><td>Last expression, no semicolon (or <code>return x;</code> for early exit)</td></tr>
  <tr><td>No return value</td><td><code>void</code></td><td>Omit the arrow (implicitly <code>()</code>)</td></tr>
  <tr><td>Declaration order</td><td>Declare before use (headers, forward decls)</td><td>Any order within the module</td></tr>
  <tr><td>Braces on if</td><td>Optional for one statement</td><td>Always required; parens around the condition never are</td></tr>
</table>
<p>Look at <code>sign</code> in the solution: the whole
<code>if</code>/<code>else if</code>/<code>else</code> chain is the function
body's final expression, so each branch just ends in its value — no
<code>return</code>, no fall-through worries. Both branches of an
<code>if</code>-expression must have the same type, exactly like the two arms
of the C++ ternary; the difference is the compiler error message actually
tells you which branch disagrees.</p>`,
};
