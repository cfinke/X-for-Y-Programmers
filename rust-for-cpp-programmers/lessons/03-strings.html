const LESSON = {
  number: 3,
  title: "Strings: String & &str",

  intro: `
<p>If you've adopted C++17's <code>std::string_view</code>, you already know
Rust's string design: <code>String</code> is <code>std::string</code> (owned,
heap-allocated, growable) and <code>&amp;str</code> is
<code>std::string_view</code> (a borrowed pointer + length into someone
else's characters). Same split, same reason — pass views to avoid copies,
own when you need to keep or build. The difference is what happens when you
get it wrong: a <code>string_view</code> outliving its string is undefined
behavior at 3 a.m.; a <code>&amp;str</code> outliving its <code>String</code>
is a compile error.</p>
<table>
  <tr><th>C++</th><th>Rust</th></tr>
  <tr><td><code>std::string</code> (owns)</td><td><code>String</code></td></tr>
  <tr><td><code>std::string_view</code> (borrows)</td><td><code>&amp;str</code></td></tr>
  <tr><td><code>void f(std::string_view s)</code></td><td><code>fn f(s: &amp;str)</code></td></tr>
  <tr><td><code>s.size()</code></td><td><code>s.len()</code> (bytes; UTF-8 guaranteed valid)</td></tr>
  <tr><td><code>s.find(w) != npos</code></td><td><code>s.contains(w)</code></td></tr>
  <tr><td><code>std::format</code> / <code>ostringstream</code></td><td><code>format!</code></td></tr>
</table>
<p>The parameter-passing rule you already follow transfers verbatim:
<strong>take <code>&amp;str</code>, return <code>String</code></strong> —
the analogue of "accept <code>string_view</code>, return
<code>std::string</code>". String literals are <code>&amp;str</code>, and a
<code>&amp;String</code> coerces to <code>&amp;str</code> at the call site, so
one signature serves both. <code>.len()</code> counts bytes, but unlike
<code>std::string</code> the contents are guaranteed valid UTF-8 — no
"bag of bytes plus vibes". For building strings, <code>format!</code> replaces
the <code>ostringstream</code> dance and <code>operator+</code>'s overload
maze with one compile-time-checked call.</p>`,

  cpp: `#include <algorithm>
#include <cctype>
#include <string>
#include <string_view>

std::string shout(std::string_view s) {
    std::string out(s);
    std::transform(out.begin(), out.end(), out.begin(),
                   [](unsigned char c) { return std::toupper(c); });
    return out;
}

std::string greet(std::string_view name) {
    return "Hello, " + std::string(name) + "!";
}

bool contains_word(std::string_view haystack, std::string_view needle) {
    return haystack.find(needle) != std::string_view::npos;
}`,

  task: `
<p>Rewrite the C++ as Rust — borrow in, own out:</p>
<ol>
  <li><code>shout</code> takes <code>s: &amp;str</code> and returns a
      <code>String</code> in uppercase. No <code>std::transform</code>
      ceremony: <code>.to_uppercase()</code> is a method on <code>&amp;str</code>
      that returns a fresh <code>String</code>.</li>
  <li><code>greet</code> takes <code>name: &amp;str</code> and returns
      <code>String</code> like <code>"Hello, Ada!"</code>. Use
      <code>format!</code> instead of chained <code>+</code>.</li>
  <li><code>contains_word</code> takes <code>haystack: &amp;str</code> and
      <code>needle: &amp;str</code> and returns <code>bool</code> — use
      <code>.contains()</code>, no <code>npos</code> sentinel to compare
      against.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. shout: &str in, uppercase String out (.to_uppercase()).
fn shout(s: &str) -> String {
    todo!()
}

// 2. greet: format!("Hello, {}!", ...) — no operator+ chains.
fn greet(name: &str) -> String {
    todo!()
}

// 3. contains_word: haystack.contains(needle) — bool, no npos.
fn contains_word(haystack: &str, needle: &str) -> bool {
    todo!()
}
`,

  requirements: [
    { pattern: /&str/, message: "Take borrowed &str parameters (the string_view of Rust)" },
    { pattern: /->\s*String/, message: "Return an owned String from shout and greet" },
    { pattern: /format!\s*\(/, message: "Build the greeting with format!" },
  ],

  tests: [
    { name: 'shout("hello") returns "HELLO"',
      code: 'assert_eq!(shout("hello"), "HELLO");' },
    { name: 'shout("Rust 1.0") returns "RUST 1.0"',
      code: 'assert_eq!(shout("Rust 1.0"), "RUST 1.0");' },
    { name: 'greet("Ada") returns "Hello, Ada!"',
      code: 'assert_eq!(greet("Ada"), "Hello, Ada!");' },
    { name: 'greet also accepts a &String (deref coercion)',
      code: 'let owned = String::from("Bjarne");\nassert_eq!(greet(&owned), "Hello, Bjarne!");' },
    { name: 'contains_word finds "quick" in "the quick brown fox"',
      code: 'assert!(contains_word("the quick brown fox", "quick"));' },
    { name: 'contains_word does not find "slow"',
      code: 'assert!(!contains_word("the quick brown fox", "slow"));' },
  ],

  solution: `fn shout(s: &str) -> String {
    s.to_uppercase()
}

fn greet(name: &str) -> String {
    format!("Hello, {}!", name)
}

fn contains_word(haystack: &str, needle: &str) -> bool {
    haystack.contains(needle)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Rust</th></tr>
  <tr><td>Owned string</td><td><code>std::string</code></td><td><code>String</code></td></tr>
  <tr><td>Borrowed view</td><td><code>std::string_view</code></td><td><code>&amp;str</code></td></tr>
  <tr><td>Literal's type</td><td><code>const char*</code></td><td><code>&amp;str</code></td></tr>
  <tr><td>Length</td><td><code>.size()</code> (bytes, any encoding)</td><td><code>.len()</code> (bytes, valid UTF-8 guaranteed)</td></tr>
  <tr><td>Search</td><td><code>.find(w) != npos</code></td><td><code>.contains(w)</code> → <code>bool</code></td></tr>
  <tr><td>Build a string</td><td><code>std::format</code>, <code>ostringstream</code>, <code>operator+</code></td><td><code>format!</code></td></tr>
  <tr><td>View → owned</td><td><code>std::string(sv)</code></td><td><code>s.to_string()</code></td></tr>
  <tr><td>Dangling view</td><td>Undefined behavior</td><td>Compile error</td></tr>
</table>
<p>The habit to import unchanged: sign functions with <code>&amp;str</code>
parameters and <code>String</code> returns, exactly as you'd accept
<code>string_view</code> and return <code>std::string</code>. The habit to
drop: defensive copies "just in case the view dangles". The borrow checker
proves the view can't dangle, so a <code>&amp;str</code> is always safe to
hold for as long as the compiler lets you hold it — which is precisely as
long as the owner lives.</p>`,
};
