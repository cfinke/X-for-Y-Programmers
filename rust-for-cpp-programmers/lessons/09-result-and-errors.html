<script>
const LESSON = {
  number: 9,
  title: "Result & the ? Operator",

  intro: `
<p>C++ gives you two error-handling schools and problems with both. Exceptions
are hidden control flow — nothing in a signature says what it throws, which is
why half the industry's style guides ban them outright. Error codes are honest
but ignorable: nothing stops a caller from discarding the <code>errc</code>
from <code>std::from_chars</code>, and <code>[[nodiscard]]</code> is only a
warning. Rust's <code>Result&lt;T, E&gt;</code> is the error-code school with
teeth: the error path is right there in the signature, and it cannot be
silently ignored — to get the <code>T</code> out, you must go through the
<code>Err</code> case.</p>
<table>
  <tr><th>C++</th><th>Rust</th></tr>
  <tr><td><code>unsigned parse(...)</code> — throws? errno? who knows</td><td><code>fn parse_age(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code></td></tr>
  <tr><td><code>return value;</code></td><td><code>Ok(value)</code></td></tr>
  <tr><td><code>throw ...;</code> / <code>return {0, false};</code></td><td><code>Err(message)</code></td></tr>
  <tr><td><code>if (!r.ok) return r;</code> at every call site</td><td><code>let v = parse_age(s)?;</code></td></tr>
  <tr><td><code>strtol</code> + errno / <code>from_chars</code> + <code>errc</code></td><td><code>s.parse::&lt;u32&gt;()</code> returns a <code>Result</code></td></tr>
</table>
<p>The star is <code>?</code>: propagate-or-continue in one character. On
<code>Ok(v)</code> it evaluates to <code>v</code>; on <code>Err(e)</code> it
returns the error from the current function immediately. It's the
check-and-early-return you write by hand around every fallible call — and the
operator C++'s <code>std::expected</code> (C++23) wishes it had. Where the
error types differ, <code>.map_err(f)</code> converts one error into another
on the way through.</p>`,

  cpp: `#include <string>
#include <charconv>

struct ParseResult { unsigned value; bool ok; };  // or throw, or errno...

ParseResult parse_age(const std::string& s) {
    auto start = s.find_first_not_of(" \\t");
    if (start == std::string::npos) return {0, false};
    unsigned v = 0;
    auto [ptr, ec] = std::from_chars(s.data() + start,
                                     s.data() + s.size(), v);
    if (ec != std::errc{}) return {0, false};
    return {v, true};
}

ParseResult age_next_year(const std::string& s) {
    auto r = parse_age(s);
    if (!r.ok) return r;        // manual propagation, every single call site
    return {r.value + 1, true};
}`,

  task: `
<p>Port the parsing code on the left to Rust:</p>
<ol>
  <li><code>parse_age(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code> —
      trim the input and parse it:
      <code>s.trim().parse::&lt;u32&gt;()</code> already returns a
      <code>Result</code>, but its error type is the standard library's
      <code>ParseIntError</code>. Convert it to your <code>String</code> error
      with <code>.map_err(|_| format!("invalid age: {}", s.trim()))</code>.</li>
  <li><code>age_next_year(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code>
      — call <code>parse_age(s)?</code> to unwrap-or-propagate, add 1, and
      wrap the sum in <code>Ok(...)</code>. The entire
      <code>if (!r.ok) return r;</code> dance is that one
      <code>?</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. parse_age: trim, then parse. .parse::<u32>() gives
//    Result<u32, ParseIntError>; use .map_err(|_| format!(...)) to turn
//    the error into your String, e.g. "invalid age: abc".
fn parse_age(s: &str) -> Result<u32, String> {
    todo!()
}

// 2. age_next_year: let age = parse_age(s)?; — on Err, that ? returns the
//    error for you. Then Ok(age + 1).
fn age_next_year(s: &str) -> Result<u32, String> {
    todo!()
}
`,

  requirements: [
    { pattern: /Result</, message: "Return Result<u32, String> from both functions" },
    { pattern: /map_err|Err\(/, message: "Produce the error case (map_err or Err(...))" },
    { pattern: /\)\?/, message: "Propagate with the ? operator in age_next_year" },
  ],

  tests: [
    { name: 'parse_age("42") returns Ok(42)',
      code: 'assert_eq!(parse_age("42"), Ok(42));' },
    { name: 'parse_age("  30 ") trims whitespace and returns Ok(30)',
      code: 'assert_eq!(parse_age("  30 "), Ok(30));' },
    { name: 'parse_age("abc") returns an Err',
      code: 'assert!(parse_age("abc").is_err());' },
    { name: 'age_next_year("42") returns Ok(43)',
      code: 'assert_eq!(age_next_year("42"), Ok(43));' },
    { name: 'age_next_year("oops") propagates the Err (that\'s the ?)',
      code: 'assert!(age_next_year("oops").is_err());' },
  ],

  solution: `fn parse_age(s: &str) -> Result<u32, String> {
    s.trim()
        .parse::<u32>()
        .map_err(|_| format!("invalid age: {}", s.trim()))
}

fn age_next_year(s: &str) -> Result<u32, String> {
    let age = parse_age(s)?;
    Ok(age + 1)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Rust</th></tr>
  <tr><td>Fallible signature</td><td>invisible (exceptions) or ad-hoc struct / <code>std::expected</code></td><td><code>fn f() -&gt; Result&lt;T, E&gt;</code></td></tr>
  <tr><td>Success</td><td><code>return value;</code></td><td><code>Ok(value)</code></td></tr>
  <tr><td>Failure</td><td><code>throw</code> / error code / <code>std::unexpected(e)</code></td><td><code>Err(e)</code></td></tr>
  <tr><td>Propagate</td><td><code>if (!r.ok) return r;</code> by hand</td><td><code>let v = f()?;</code></td></tr>
  <tr><td>Convert error type</td><td>catch-rethrow / manual mapping</td><td><code>.map_err(f)</code></td></tr>
  <tr><td>String → number</td><td><code>strtol</code> + errno, <code>from_chars</code> + <code>errc</code></td><td><code>s.parse::&lt;u32&gt;()</code> → <code>Result</code></td></tr>
  <tr><td>Ignoring an error</td><td>easy; <code>[[nodiscard]]</code> merely warns</td><td>can't reach the value without handling <code>Err</code></td></tr>
</table>
<p>Like <code>Option</code>, <code>Result</code> is a plain library enum —
<code>enum Result&lt;T, E&gt; { Ok(T), Err(E) }</code> — with no unwinding
machinery, no landing pads, no exception tables: an error return is an
ordinary return. The <code>::&lt;u32&gt;</code> in
<code>parse::&lt;u32&gt;()</code> is the "turbofish", Rust's spelling of an
explicit template argument — needed here because <code>parse</code> is generic
over what it parses into, exactly like calling <code>parse&lt;unsigned&gt;(s)</code>
would be.</p>`,
};
