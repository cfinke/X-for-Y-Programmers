const LESSON = {
  number: 15,
  title: "Slices, Tuples & Destructuring",

  intro: `
<p>Rust's tuples are <code>std::tuple</code> without the ceremony:
<code>(f64, f64)</code> is a type, <code>(3.0, 4.0)</code> is a value, and
the fields are <code>.0</code> and <code>.1</code> instead of
<code>std::get&lt;0&gt;(t)</code> or the eternally ambiguous
<code>.first</code>/<code>.second</code>. Structured bindings —
<code>auto [x, y] = p;</code>, the C++17 feature you actually like — become
<code>let (x, y) = p;</code>, and the same destructuring syntax works in
every pattern position: <code>match</code> arms, function parameters,
<code>for</code> loops over <code>(key, value)</code> pairs.</p>
<table>
  <tr><th>C++</th><th>Rust</th></tr>
  <tr><td><code>std::pair&lt;double, double&gt;</code> / <code>std::tuple</code></td><td><code>(f64, f64)</code> — one built-in tuple</td></tr>
  <tr><td><code>p.first</code>, <code>std::get&lt;1&gt;(t)</code></td><td><code>p.0</code>, <code>p.1</code></td></tr>
  <tr><td><code>auto [x, y] = p;</code></td><td><code>let (x, y) = p;</code> — works in any pattern</td></tr>
  <tr><td><code>return {a, b};</code></td><td><code>(a, b)</code> as the final expression</td></tr>
  <tr><td><code>std::span&lt;const int&gt;</code></td><td><code>&amp;[i32]</code> — borrow-checked view</td></tr>
</table>
<p>And <code>&amp;[i32]</code> is your <code>std::span&lt;const int&gt;</code>:
a pointer-plus-length view that accepts arrays, <code>Vec</code>s, or
sub-ranges without copying. The difference is the failure mode you can't
have: a <code>span</code> over a vector that reallocates or dies is UB you
find in a core dump; a <code>&amp;[i32]</code> in the same position is a
lifetime error you find in the compiler output. Same zero-cost view, minus
the dangling.</p>`,

  cpp: `#include <cmath>
#include <span>
#include <tuple>
#include <utility>

std::pair<int, int> swap_pair(std::pair<int, int> p) {
    return { p.second, p.first };          // .first/.second roulette
}

double distance(std::pair<double, double> p, std::pair<double, double> q) {
    auto [px, py] = p;                     // structured bindings (C++17)
    auto [qx, qy] = q;
    return std::hypot(qx - px, qy - py);
}

// span: a borrowed view — and a dangling one if the vector dies first.
std::pair<int, int> ends(std::span<const int> v) {
    return { v.front(), v.back() };
}`,

  task: `
<p>Port all three functions:</p>
<ol>
  <li><code>swap(pair: (i32, i32)) -&gt; (i32, i32)</code> — return the pair
      with its elements flipped. <code>.0</code> and <code>.1</code> are your
      <code>.first</code> and <code>.second</code>.</li>
  <li><code>distance(p: (f64, f64), q: (f64, f64)) -&gt; f64</code> — the
      Euclidean distance between two points. Destructure both with
      <code>let (x, y) = …;</code> bindings, then
      <code>((qx - px).powi(2) + (qy - py).powi(2)).sqrt()</code> — math
      methods live on the floats themselves, no <code>&lt;cmath&gt;</code>.</li>
  <li><code>ends(v: &amp;[i32]) -&gt; (i32, i32)</code> — the first and last
      elements of the slice (assume it's non-empty). Indexing and
      <code>v.len()</code> work like on a <code>span</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. Flip the pair: p.first/p.second are pair.0/pair.1 here.
fn swap(pair: (i32, i32)) -> (i32, i32) {
    todo!()
}

// 2. auto [px, py] = p;  ->  let (px, py) = p;
//    then ((qx - px).powi(2) + (qy - py).powi(2)).sqrt()
fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    todo!()
}

// 3. &[i32] is std::span<const int>: v[0], v[v.len() - 1].
//    Assume the slice is non-empty.
fn ends(v: &[i32]) -> (i32, i32) {
    todo!()
}
`,

  requirements: [
    { pattern: /\(\s*f64\s*,\s*f64\s*\)/, message: "Use the tuple type (f64, f64) in distance's signature" },
    { pattern: /let\s*\(/, message: "Destructure a tuple with a let (…) binding" },
    { pattern: /&\[i32\]/, message: "Take a borrowed slice &[i32] in ends" },
  ],

  tests: [
    { name: "swap((1, 2)) returns (2, 1)",
      code: "assert_eq!(swap((1, 2)), (2, 1));" },
    { name: "swap((-5, 10)) returns (10, -5)",
      code: "assert_eq!(swap((-5, 10)), (10, -5));" },
    { name: "distance((0.0, 0.0), (3.0, 4.0)) is exactly 5.0",
      code: "assert_eq!(distance((0.0, 0.0), (3.0, 4.0)), 5.0);" },
    { name: "distance from a point to itself is 0.0",
      code: "assert_eq!(distance((1.5, -2.5), (1.5, -2.5)), 0.0);" },
    { name: "ends(&[7, 8, 9]) returns (7, 9)",
      code: "assert_eq!(ends(&[7, 8, 9]), (7, 9));" },
    { name: "ends(&[42]) returns (42, 42)",
      code: "assert_eq!(ends(&[42]), (42, 42));" },
  ],

  solution: `fn swap(pair: (i32, i32)) -> (i32, i32) {
    (pair.1, pair.0)
}

fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    let (px, py) = p;
    let (qx, qy) = q;
    ((qx - px).powi(2) + (qy - py).powi(2)).sqrt()
}

fn ends(v: &[i32]) -> (i32, i32) {
    (v[0], v[v.len() - 1])
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Rust</th></tr>
  <tr><td>Pair/tuple type</td><td><code>std::pair&lt;A, B&gt;</code>, <code>std::tuple&lt;…&gt;</code></td><td><code>(A, B)</code>, <code>(A, B, C)</code> — built in</td></tr>
  <tr><td>Field access</td><td><code>p.first</code>, <code>std::get&lt;0&gt;(t)</code></td><td><code>p.0</code>, <code>p.1</code></td></tr>
  <tr><td>Destructure</td><td><code>auto [x, y] = p;</code> (declarations only)</td><td><code>let (x, y) = p;</code> — and in <code>match</code>, <code>for</code>, params</td></tr>
  <tr><td>Build one</td><td><code>std::make_pair(a, b)</code> / <code>{a, b}</code></td><td><code>(a, b)</code></td></tr>
  <tr><td>Read-only view</td><td><code>std::span&lt;const int&gt;</code> (can dangle)</td><td><code>&amp;[i32]</code> (lifetime-checked)</td></tr>
  <tr><td>Math helpers</td><td><code>std::sqrt(x)</code>, <code>std::pow(x, 2)</code></td><td><code>x.sqrt()</code>, <code>x.powi(2)</code> — methods on <code>f64</code></td></tr>
</table>
<p>The through-line of this lesson is that destructuring isn't a special
initializer feature the way <code>auto [x, y]</code> is — <code>(x, y)</code>
is a <em>pattern</em>, the same machinery <code>match</code> uses, usable
anywhere a name can be bound. And note what <code>ends</code> accepts:
<code>&amp;[7, 8, 9]</code> here, but a <code>&amp;Vec&lt;i32&gt;</code> or a
sub-range <code>&amp;v[1..4]</code> would coerce to the same
<code>&amp;[i32]</code> — one parameter type for every contiguous source,
which is exactly the API guideline <code>std::span</code> was added to
enable.</p>`,
};
