  intro: `
<p>Python lists are Ruby Arrays, and you're on home turf immediately:
literals look identical, they hold anything, and <strong>negative indexing
works</strong> — <code>arr[-1]</code> is the last element in both languages,
no apology needed. Appending gets a new idiom: <code>nums &lt;&lt; x</code>,
the "shovel" operator (or <code>.push</code>, if you prefer — there's more
than one way, this is Ruby).</p>
<table>
  <tr><th>Python</th><th>Ruby</th></tr>
  <tr><td><code>nums.append(x)</code></td><td><code>nums &lt;&lt; x</code> (or <code>nums.push(x)</code>)</td></tr>
  <tr><td><code>len(nums)</code></td><td><code>nums.size</code> or <code>nums.length</code></td></tr>
  <tr><td><code>x in nums</code></td><td><code>nums.include?(x)</code></td></tr>
  <tr><td><code>nums[-1]</code></td><td><code>nums[-1]</code> — same!</td></tr>
  <tr><td><code>nums[1:3]</code></td><td><code>nums[1..2]</code> (inclusive!) or <code>nums[1...3]</code></td></tr>
  <tr><td><code>sum(nums)</code></td><td><code>nums.sum</code></td></tr>
</table>
<p>One slice gotcha deserves a flag: Ruby slices with <em>ranges</em>, and
the two-dot range <code>1..3</code> <strong>includes</strong> its end — the
opposite of Python's half-open <code>[1:3)</code>. Python's
<code>nums[1:3]</code> is Ruby's <code>nums[1..2]</code>, or
<code>nums[1...3]</code> with <em>three</em> dots for the exclusive end.
Better still, ranges take negative ends: <code>arr[1..-2]</code> is Python's
<code>arr[1:-1]</code>. And the function-vs-method pattern continues:
<code>len()</code> and <code>sum()</code> become <code>.size</code> and
<code>.sum</code> — questions you ask the array.</p>`,

  python: `scores = []
scores.append(90)
scores.append(85)
scores.append(70)

print(len(scores))       # 3
print(scores[-1])        # 70   (negative indexing)
print(scores[1:3])       # [85, 70]  (end EXCLUSIVE)
print(sum(scores))       # 245
print(85 in scores)      # True


def append(arr, x):
    arr.append(x)
    return arr


def middle(arr):
    return arr[1:-1]     # everything but first and last


print(middle([1, 2, 3, 4, 5]))  # [2, 3, 4]`,

  solution: `def make_scores
  scores = []
  scores << 90
  scores << 85
  scores << 70
  scores
end

def append(arr, x)
  arr << x
end

def total(nums)
  nums.sum
end

def middle(arr)
  arr[1..-2]
end

def contains?(nums, x)
  nums.include?(x)
end

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Ruby</th></tr>
  <tr><td>Append</td><td><code>nums.append(x)</code></td><td><code>nums &lt;&lt; x</code> or <code>nums.push(x)</code></td></tr>
  <tr><td>Length</td><td><code>len(nums)</code></td><td><code>nums.size</code> / <code>nums.length</code></td></tr>
  <tr><td>Membership</td><td><code>x in nums</code></td><td><code>nums.include?(x)</code></td></tr>
  <tr><td>Last element</td><td><code>nums[-1]</code></td><td><code>nums[-1]</code>, or <code>nums.last</code></td></tr>
  <tr><td>First element</td><td><code>nums[0]</code></td><td><code>nums[0]</code>, or <code>nums.first</code></td></tr>
  <tr><td>Slice</td><td><code>nums[1:3]</code> (end exclusive)</td><td><code>nums[1..2]</code> inclusive, <code>nums[1...3]</code> exclusive</td></tr>
  <tr><td>Sum</td><td><code>sum(nums)</code></td><td><code>nums.sum</code></td></tr>
</table>
<p>The two-dot / three-dot distinction is worth over-learning now:
<code>1..3</code> is <code>[1, 2, 3]</code>, <code>1...3</code> is
<code>[1, 2]</code>. More dots, fewer elements — everyone trips on it exactly
once. Note also <code>nums.first</code> and <code>nums.last</code>: where
Python has one obvious way (<code>nums[0]</code>, <code>nums[-1]</code>),
Ruby offers named methods too, and idiomatic code usually prefers them for
readability.</p>`,
