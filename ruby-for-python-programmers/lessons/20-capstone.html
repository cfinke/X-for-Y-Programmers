<p>No new concepts — this is the course in one exercise: a class with
<code>attr_reader</code>, and four functions over a collection of its
instances, each one an Enumerable method with a block where Python reaches
for a comprehension or a <code>next(...)</code> idiom.</p>
<table>
  <tr><th>Python</th><th>Ruby</th></tr>
  <tr><td><code>sum(i.price_cents * i.count for i in items)</code></td><td><code>items.sum { |i| i.price_cents * i.count }</code></td></tr>
  <tr><td><code>next((i for i in items if ...), None)</code></td><td><code>items.find { |i| ... }</code> — nil on miss</td></tr>
  <tr><td><code>[i.name for i in items if i.count &gt; 0]</code></td><td><code>items.select { ... }.map(&amp;:name)</code></td></tr>
  <tr><td><code>Item(i.name, ...)</code> to avoid aliasing</td><td><code>Item.new(i.name, ...)</code> — same reason</td></tr>
</table>
<p>One Python instinct transfers wholesale: variables hold <em>references</em>
to objects, exactly like Python's. If <code>restock</code> mutated the
matching item, every other list holding that item would see the change — the
same aliasing bug as mutating a shared object in Python. So build a fresh
<code>Item.new(...)</code> for the updated entry and return a new array,
leaving the caller's data untouched.</p>`,

  python: `class Item:
    def __init__(self, name, price_cents, count):
        self.name = name
        self.price_cents = price_cents
        self.count = count

def total_value(items):
    return sum(i.price_cents * i.count for i in items)

def find_item(items, name):
    return next((i for i in items if i.name == name), None)

def restock(items, name, amount):
    return [Item(i.name, i.price_cents, i.count + amount)
            if i.name == name else i
            for i in items]

def names_in_stock(items):
    return [i.name for i in items if i.count > 0]`,

  solution: `class Item
  attr_reader :name, :price_cents, :count

  def initialize(name, price_cents, count)
    @name = name
    @price_cents = price_cents
    @count = count
  end
end

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }
end

def restock(items, name, amount)
  items.map do |i|
    if i.name == name
      Item.new(i.name, i.price_cents, i.count + amount)
    else
      i
    end
  end
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map(&:name)
end
`,

<table>

  <tr><td>Sum a derived value</td><td><code>sum(f(i) for i in xs)</code></td><td><code>xs.sum { |i| f(i) }</code></td></tr>
  <tr><td>First match or nothing</td><td><code>next((i for i in xs if p), None)</code></td><td><code>xs.find { |i| p }</code> — nil built in</td></tr>
  <tr><td>Filter + transform</td><td><code>[i.name for i in xs if p]</code></td><td><code>xs.select { |i| p }.map(&amp;:name)</code></td></tr>
  <tr><td>Conditional rebuild</td><td>list comp with ternary</td><td><code>map</code> with <code>if/else</code> inside the block</td></tr>
  <tr><td>Avoid aliasing</td><td>construct a new object</td><td><code>Item.new(...)</code> — same instinct</td></tr>
</table>
<p>That's the course: classes whose accessors are one <code>attr_reader</code>
line, collections processed by naming the operation
(<code>sum</code>, <code>find</code>, <code>select</code>, <code>map</code>)
instead of writing a comprehension, blocks as the universal callable, and
<code>nil</code> flowing through misses the way <code>None</code> does. When a
pipeline needs a step you'd import from <code>itertools</code> or write a
recipe for, check Enumerable first — it's almost always already there.</p>`,
