  intro: `
<p>Past <code>map</code> and <code>select</code>, Python scatters its
collection tools across the standard library: <code>itertools.groupby</code>,
<code>collections.Counter</code>, <code>functools.reduce</code> — three
imports for three jobs. In Ruby they're all just methods, already on every
collection. And they fix Python's sharpest edge:
<code>itertools.groupby</code> only groups <em>adjacent</em> items, so you
must sort first or silently get fragments. Ruby's <code>.group_by</code>
needs no sort — it hashes each block result and collects, done.</p>
<table>
  <tr><th>Python</th><th>Ruby</th></tr>
  <tr><td><code>groupby(sorted(xs, key=f), key=f)</code> — sort required!</td><td><code>xs.group_by { |x| f(x) }</code> — no sort needed</td></tr>
  <tr><td><code>Counter(votes)</code></td><td><code>votes.tally</code></td></tr>
  <tr><td><code>d = {}</code> + a <code>for</code> loop building it</td><td><code>xs.each_with_object({}) { |x, d| ... }</code></td></tr>
  <tr><td><code>reduce(lambda a, b: a + b, nums)</code></td><td><code>nums.reduce(:+)</code> or <code>nums.reduce { |a, b| a + b }</code></td></tr>
</table>
<p>Two more you'll reach for constantly: <code>.each_with_object(acc)</code>
replaces the "make an empty dict, loop, fill it in" pattern — the block gets
each element plus the accumulator, and the accumulator is returned at the
end. And <code>.partition</code> splits a collection into
<code>[matching, rest]</code> in a single pass, where Python needs two
comprehensions (two passes) or a manual loop.</p>`,

  python: `from itertools import groupby
from collections import Counter

words = ["cat", "mouse", "dog"]
# groupby only groups ADJACENT items — sort first or lose data!
by_len = {k: list(g)
          for k, g in groupby(sorted(words, key=len), key=len)}
# {3: ['cat', 'dog'], 5: ['mouse']}

votes = ["ruby", "python", "ruby", "ruby"]
counts = dict(Counter(votes))     # {'ruby': 3, 'python': 1}

items = [{"category": "food", "price": 5},
         {"category": "food", "price": 3}]
totals = {}                       # dict-building loop
for item in items:
    cat = item["category"]
    totals[cat] = totals.get(cat, 0) + item["price"]

nums = [1, 2, 3, 4, 5]
evens = [n for n in nums if n % 2 == 0]   # two passes
odds  = [n for n in nums if n % 2 != 0]   # for a partition`,

<p>Rebuild each Python pattern with the matching Enumerable method:</p>

</ol>`,

  tests: [

    { name: 'vote_counts(["ruby", "python", "ruby", "ruby"]) counts occurrences',

    { name: "totals_by_category sums prices per category",
      code: '  expect_eq(totals_by_category([{ category: :food, price: 5 }, { category: :tools, price: 12 }, { category: :food, price: 3 }]), { food: 8, tools: 12 })' },
    { name: "totals_by_category of no items is an empty hash",
      code: '  expect_eq(totals_by_category([]), {})' },
    { name: "split_evens([1, 2, 3, 4, 5]) returns [[2, 4], [1, 3, 5]]",

  solution: `def word_lengths(words)
  words.group_by(&:length)
end

def vote_counts(votes)
  votes.tally
end

def totals_by_category(items)
  items.each_with_object(Hash.new(0)) do |item, totals|
    totals[item[:category]] += item[:price]
  end
end

def split_evens(nums)
  nums.partition(&:even?)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Ruby</th></tr>
  <tr><td>Group by key</td><td><code>groupby(sorted(xs, key=f), key=f)</code></td><td><code>xs.group_by { |x| f(x) }</code></td></tr>
  <tr><td>Count occurrences</td><td><code>Counter(xs)</code></td><td><code>xs.tally</code></td></tr>
  <tr><td>Build a dict in a loop</td><td><code>d = {}</code> + <code>for</code> + <code>d.get(k, 0)</code></td><td><code>xs.each_with_object(Hash.new(0)) { |x, d| ... }</code></td></tr>
  <tr><td>Fold / reduce</td><td><code>reduce(lambda a, b: a + b, xs)</code></td><td><code>xs.reduce(:+)</code> — pass the operator as a symbol</td></tr>
  <tr><td>Split by predicate</td><td>two comprehensions, two passes</td><td><code>xs.partition { |x| ... }</code>, one pass</td></tr>
  <tr><td>Flatten one level</td><td><code>chain.from_iterable(xs)</code></td><td><code>xs.flatten(1)</code> or <code>xs.flat_map { ... }</code></td></tr>
</table>
<p>The pattern behind all of these: where Python routes special collection
jobs through importable functions that wrap an iterable, Ruby keeps adding
methods to Enumerable itself. If you're writing <code>each</code> with an
accumulator variable, stop — there is almost certainly a one-word Enumerable
method (or an <code>each_with_object</code> shape) that says it directly.
<code>reduce(:+)</code> is the extreme of the idiom: even the operator is
just a symbol naming a method.</p>`,
