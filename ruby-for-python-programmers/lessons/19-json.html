  intro: `
<p>Python's <code>import json</code> is Ruby's <code>require "json"</code>,
and the two operations map cleanly — with one philosophical flip. Serializing
is not a module function you hand data to; loading the library adds a
<code>to_json</code> <em>method to the data itself</em>:
<code>data.to_json</code> where Python writes <code>json.dumps(data)</code>.
Parsing goes the module route like Python's: <code>JSON.parse(s)</code> for
<code>json.loads(s)</code>.</p>
<table>
  <tr><th>Python</th><th>Ruby</th></tr>
  <tr><td><code>import json</code></td><td><code>require "json"</code></td></tr>
  <tr><td><code>json.dumps(data)</code></td><td><code>data.to_json</code> (a method on the data)</td></tr>
  <tr><td><code>json.loads(s)</code></td><td><code>JSON.parse(s)</code></td></tr>
  <tr><td><code>d["a"]["b"]</code> (KeyError on miss)</td><td><code>data.dig(:a, :b)</code> (nil on miss)</td></tr>
  <tr><td><code>json.JSONDecodeError</code></td><td><code>JSON::ParserError</code></td></tr>
</table>
<p>The catch: <code>JSON.parse</code> returns hashes with <em>string</em> keys
— same as Python — but idiomatic Ruby wants symbol keys, so you will
constantly write <code>JSON.parse(s, symbolize_names: true)</code> and get
<code>{ name: "Ada" }</code> instead of <code>{ "name" =&gt; "Ada" }</code>.
From there the hash tools you already know apply: <code>fetch</code> with a
default for missing keys, <code>dig</code> for nested access that returns
<code>nil</code> instead of exploding, and a def-level
<code>rescue JSON::ParserError</code> (lesson 16) for input you don't
trust.</p>`,

  python: `import json

def to_json_string(data):
    return json.dumps(data, separators=(",", ":"))

def parse_user(text):
    data = json.loads(text)
    return {"name": data.get("name", "unknown"), "age": data.get("age", 0)}

def pluck_names(text):
    return [user["name"] for user in json.loads(text)]

def safe_parse(text):
    try:
        return json.loads(text)
    except json.JSONDecodeError:
        return {}`,

  solution: `require "json"

def to_json_string(data)
  data.to_json
end

def parse_user(json)
  data = JSON.parse(json, symbolize_names: true)
  { name: data.fetch(:name, "unknown"), age: data.fetch(:age, 0) }
end

def pluck_names(json)
  JSON.parse(json, symbolize_names: true).map { |user| user[:name] }
end

def safe_parse(json)
  JSON.parse(json, symbolize_names: true)
rescue JSON::ParserError
  {}
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Ruby</th></tr>
  <tr><td>Load the library</td><td><code>import json</code></td><td><code>require "json"</code></td></tr>
  <tr><td>Serialize</td><td><code>json.dumps(data)</code></td><td><code>data.to_json</code></td></tr>
  <tr><td>Pretty-print</td><td><code>json.dumps(data, indent=2)</code></td><td><code>JSON.pretty_generate(data)</code></td></tr>
  <tr><td>Parse</td><td><code>json.loads(s)</code></td><td><code>JSON.parse(s)</code> — string keys</td></tr>
  <tr><td>Parse to symbols</td><td>—</td><td><code>JSON.parse(s, symbolize_names: true)</code></td></tr>
  <tr><td>Default on missing key</td><td><code>d.get("k", default)</code></td><td><code>h.fetch(:k, default)</code></td></tr>
  <tr><td>Nested access</td><td><code>d["a"]["b"]</code></td><td><code>data.dig(:a, :b)</code> — nil, never raises</td></tr>
  <tr><td>Bad input</td><td><code>json.JSONDecodeError</code></td><td><code>JSON::ParserError</code></td></tr>
</table>
<p>Note the symbol/string asymmetry: <em>parsing</em> gives you string keys
unless you ask for symbols, but <em>serializing</em> erases the difference —
<code>{ name: "Ada" }.to_json</code> and
<code>{ "name" =&gt; "Ada" }.to_json</code> produce the identical
<code>{"name":"Ada"}</code>, since JSON keys are always strings. That makes
<code>symbolize_names: true</code> a safe habit at every parse site: your
Ruby code gets idiomatic <code>data[:name]</code> access, and nothing changes
on the way back out.</p>`,
