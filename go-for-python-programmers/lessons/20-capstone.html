  intro: `
<p>Time to put it together. This capstone builds a small <strong>in-memory
store</strong> — the same shape you would reach for in Python with a
<code>class</code> wrapping a <code>dict</code> — but assembled from the Go pieces
you have learned: a <code>struct</code> for the record, a <code>map</code> for the
index, methods on a pointer receiver for mutation, a sentinel <code>error</code>
wrapped with <code>%w</code>, and a tiny <code>interface</code> so callers depend
on behavior, not the concrete type.</p>
<table>
  <tr><th>Python</th><th>Go</th></tr>
  <tr><td><code>class Store: self._items = {}</code></td><td><code>type Store struct { items map[string]Product }</code></td></tr>
  <tr><td><code>store.get(sku)</code> returns <code>None</code></td><td><code>Get(sku) (Product, error)</code> — value + error</td></tr>
  <tr><td><code>raise NotFoundError()</code></td><td><code>fmt.Errorf("...: %w", ErrNotFound)</code></td></tr>
  <tr><td><code>sorted(d.keys())</code></td><td><code>sort.Strings(keys)</code> over a built slice</td></tr>
  <tr><td><code>class Reader(Protocol): def get(...)</code></td><td><code>type Reader interface { Get(...) }</code> (implicit)</td></tr>
</table>
<p>Two Go habits carry the whole design. First, a lookup returns
<code>(Product, error)</code> instead of a nullable value, and the miss is a
<em>wrapped sentinel</em> — <code>errors.Is(err, ErrNotFound)</code> lets a caller
recognize the cause even though the message adds context. Second, iterating a map
yields keys in random order, so any time you need a stable result you copy the
keys into a slice and <code>sort</code> them.</p>`,

  python: `class NotFoundError(Exception):
    pass

class Product:
    def __init__(self, sku: str, name: str, price: float, qty: int):
        self.sku = sku
        self.name = name
        self.price = price
        self.qty = qty

class Store:
    def __init__(self):
        self._items: dict[str, Product] = {}

    def add(self, p: Product) -> None:
        self._items[p.sku] = p

    def get(self, sku: str) -> Product:
        p = self._items.get(sku)
        if p is None:
            raise NotFoundError(f"get {sku}")
        return p

    def remove(self, sku: str) -> None:
        if sku not in self._items:
            raise NotFoundError(f"remove {sku}")
        del self._items[sku]

    def count(self) -> int:
        return len(self._items)

    def skus(self) -> list[str]:
        return sorted(self._items.keys())

    def total_value(self) -> float:
        return sum(p.price * p.qty for p in self._items.values())`,

  solution: `type Product struct {
	SKU   string
	Name  string
	Price float64
	Qty   int
}

var ErrNotFound = errors.New("not found")

type Store struct {
	items map[string]Product
}

func NewStore() *Store {
	return &Store{items: map[string]Product{}}
}

func (s *Store) Add(p Product) {
	s.items[p.SKU] = p
}

func (s *Store) Get(sku string) (Product, error) {
	p, ok := s.items[sku]
	if !ok {
		return Product{}, fmt.Errorf("get %q: %w", sku, ErrNotFound)
	}
	return p, nil
}

func (s *Store) Remove(sku string) error {
	if _, ok := s.items[sku]; !ok {
		return fmt.Errorf("remove %q: %w", sku, ErrNotFound)
	}
	delete(s.items, sku)
	return nil
}

func (s *Store) Count() int {
	return len(s.items)
}

func (s *Store) SKUs() []string {
	keys := make([]string, 0, len(s.items))
	for k := range s.items {
		keys = append(keys, k)
	}
	sort.Strings(keys)
	return keys
}

func (s *Store) TotalValue() float64 {
	total := 0.0
	for _, p := range s.items {
		total += p.Price * float64(p.Qty)
	}
	return total
}

type Reader interface {
	Get(sku string) (Product, error)
	Count() int
}

func Exists(r Reader, sku string) bool {
	_, err := r.Get(sku)
	return err == nil
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Go</th></tr>
  <tr><td>Record type</td><td><code>class Product: …</code></td><td><code>type Product struct { … }</code></td></tr>
  <tr><td>Indexed store</td><td><code>dict[str, Product]</code></td><td><code>map[string]Product</code></td></tr>
  <tr><td>Missing lookup</td><td><code>.get(sku)</code> returns <code>None</code></td><td><code>(Product, error)</code> with a wrapped sentinel</td></tr>
  <tr><td>Recognize a cause</td><td><code>isinstance(e, NotFoundError)</code></td><td><code>errors.Is(err, ErrNotFound)</code></td></tr>
  <tr><td>Stable key order</td><td><code>dict</code> preserves insertion order, but you still <code>sorted(...)</code> for a sorted result</td><td>copy keys to a slice, then <code>sort</code></td></tr>
  <tr><td>Depend on behavior</td><td><code>class Reader(Protocol)</code> / plain duck typing</td><td>just have the methods (implicit)</td></tr>
</table>
<p>Everything here is ordinary Go, and that is the point: a store is a
<code>struct</code> around a <code>map</code>, mutations are pointer-receiver
methods, and every failure path returns an <code>error</code> rather than raising.
The <code>%w</code> verb is the piece worth internalizing — it stitches a specific
sentinel into a descriptive message, so <code>err.Error()</code> reads well for a
human while <code>errors.Is</code> still lets code branch on the cause. Compare
that with Python, where you would define an exception subclass and test with
<code>isinstance</code>.</p>
<p>Notice what is <em>not</em> here: no implicit exceptions flying past callers,
no <code>None</code> checks scattered through them instead. A
<code>*Store</code> satisfies <code>Reader</code> the instant it has
<code>Get</code> and <code>Count</code>, so <code>Exists</code> is testable
against any reader, real or fake. That combination — small structs, small
interfaces, errors as values — is how idiomatic Go programs stay composable as
they grow.</p>`,
