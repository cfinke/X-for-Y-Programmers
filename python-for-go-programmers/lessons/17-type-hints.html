<script>
const LESSON = {
  number: 17,
  title: "Type Hints",

  intro: `
<p>Coming from Go, you are used to types that the compiler
<em>enforces</em>: pass a <code>string</code> where an <code>int</code> is
expected and it will not even compile. Python has type hints too, with a
syntax that will feel familiar in spirit — but the crucial difference is that
the interpreter does <strong>not</strong> enforce them. Hints are annotations
read by editors, linters, and tools like <code>mypy</code>; at runtime the
code runs exactly as it would without them. A hint that lies does not
panic — it just runs.</p>
<table>
  <tr><th>Go</th><th>Python</th></tr>
  <tr><td><code>var name string</code></td><td><code>name: str</code></td></tr>
  <tr><td><code>func f() int</code></td><td><code>def f() -&gt; int:</code></td></tr>
  <tr><td><code>var x *int</code> (<code>nil</code> for missing)</td><td><code>x: int | None</code></td></tr>
  <tr><td><code>(T, bool)</code> comma-ok, or <code>*T</code></td><td><code>Optional[T]</code></td></tr>
  <tr><td><code>[]int</code></td><td><code>list[int]</code></td></tr>
  <tr><td><code>map[string]int</code></td><td><code>dict[str, int]</code></td></tr>
</table>
<p>Annotate a parameter with <code>name: type</code> and a return with
<code>-&gt; type</code> after the parameter list. Collections use the built-in
generics <code>list[int]</code> and <code>dict[str, int]</code> (lowercase, since
Python 3.9). Go has no union types, so "maybe missing" is normally spelled
with a pointer (<code>*int</code>, <code>nil</code> when absent) or the
two-value <code>value, ok :=</code> idiom; Python instead writes
<code>int | None</code> directly on the type. The older <code>Optional[int]</code>
from the <code>typing</code> module means the exact same thing. Because none of
this is enforced, your <em>behavior</em> is what matters — the tests below
call your functions and check results, not annotations.</p>`,

  go: `func greet(name string) string {
	return fmt.Sprintf("Hello, %s", name)
}

func total(prices []int) int {
	sum := 0
	for _, p := range prices {
		sum += p
	}
	return sum
}

func findUser(id int) (string, bool) {
	if id == 1 {
		return "Ada", true
	}
	return "", false
}`,

  task: `
<p>Write typed Python versions of each function. Annotate every parameter and
return type — remember the hints do not change behavior, so the tests only
check what the functions return.</p>
<ol>
  <li><code>greet(name: str) -&gt; str</code> returns <code>"Hello, &lt;name&gt;"</code>.</li>
  <li><code>total(prices: list[int]) -&gt; int</code> returns the sum of the list.</li>
  <li><code>find_user(id: int) -&gt; str | None</code> returns <code>"Ada"</code> when
      <code>id</code> is <code>1</code>, otherwise <code>None</code>.</li>
  <li><code>counts(words: list[str]) -&gt; dict[str, int]</code> returns a dict
      mapping each word to how many times it appears.</li>
</ol>`,

  starter: `# 1. greet(name: str) -> str
def greet(name):
    return ""  # TODO


# 2. total(prices: list[int]) -> int
def total(prices):
    return 0  # TODO


# 3. find_user(id: int) -> str | None
def find_user(id):
    return None  # TODO


# 4. counts(words: list[str]) -> dict[str, int]
def counts(words):
    return {}  # TODO
`,

  requirements: [
    { pattern: /def\s+greet\s*\(\s*name\s*:\s*str\s*\)\s*->\s*str/, message: "Annotate greet's parameter and return type (name: str) -> str" },
    { pattern: /def\s+find_user\s*\([^)]*\)\s*->\s*(str\s*\|\s*None|Optional\s*\[\s*str\s*\])/, message: "find_user should return str | None (or Optional[str])" },
    { pattern: /->\s*dict\s*\[\s*str\s*,\s*int\s*\]/, message: "Annotate counts' return as dict[str, int]" },
  ],

  tests: [
    { name: 'greet("Ada") is "Hello, Ada"', code: "    expect_eq(greet(\"Ada\"), \"Hello, Ada\")" },
    { name: "total([1, 2, 3]) is 6", code: "    expect_eq(total([1, 2, 3]), 6)" },
    { name: "total([]) is 0", code: "    expect_eq(total([]), 0)" },
    { name: 'find_user(1) is "Ada"', code: "    expect_eq(find_user(1), \"Ada\")" },
    { name: "find_user(2) is None", code: "    expect_true(find_user(2) is None)" },
    { name: "counts groups repeated words", code: "    expect_eq(counts([\"a\", \"b\", \"a\"]), {\"a\": 2, \"b\": 1})" },
    { name: "counts([]) is an empty dict", code: "    expect_eq(counts([]), {})" },
  ],

  solution: `def greet(name: str) -> str:
    return f"Hello, {name}"


def total(prices: list[int]) -> int:
    return sum(prices)


def find_user(id: int) -> str | None:
    return "Ada" if id == 1 else None


def counts(words: list[str]) -> dict[str, int]:
    result: dict[str, int] = {}
    for word in words:
        result[word] = result.get(word, 0) + 1
    return result
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Python</th></tr>
  <tr><td>Param annotation</td><td><code>(name string)</code></td><td><code>(name: str)</code></td></tr>
  <tr><td>Return annotation</td><td><code>) string {</code></td><td><code>) -&gt; int:</code></td></tr>
  <tr><td>Slice / List</td><td><code>[]int</code></td><td><code>list[int]</code></td></tr>
  <tr><td>Map / Dict</td><td><code>map[string]int</code></td><td><code>dict[str, int]</code></td></tr>
  <tr><td>Nullable</td><td><code>*T</code> (<code>nil</code>) or comma-ok</td><td><code>T | None</code> or <code>Optional[T]</code></td></tr>
  <tr><td>Enforcement</td><td>compiler (build fails)</td><td>none at runtime (tools only)</td></tr>
</table>
<p>The biggest mental shift: a wrong hint is not an error. <code>greet(42)</code>
runs fine — <code>f"Hello, {42}"</code> is <code>"Hello, 42"</code> — even though
you annotated <code>name: str</code>. To actually catch mismatches you run a
static checker such as <code>mypy</code> or <code>pyright</code> as a separate
step, the way <code>go build</code> catches type errors for you automatically.
Also note the lowercase built-in generics <code>list[int]</code> /
<code>dict[str, int]</code> replaced the old capital-L <code>List</code>/<code>Dict</code>
from <code>typing</code>; and <code>Optional[int]</code> is exactly
<code>int | None</code>, not "optional" in the sense of a default value —
it just permits <code>None</code>, much like a nil-able <code>*int</code>
in Go permits an absent value.</p>`,
};
