const LESSON = {
  number: 7,
  title: "Classes",

  intro: `
<p>Python classes will feel like a different world coming from Go: there is no
separate <code>struct</code> definition and no free-standing function with a
receiver. Everything lives inside a <code>class</code> block. There is no
<code>New</code>-prefixed constructor function — you write a method named
<code>__init__</code>. Every method takes the instance as its first parameter,
spelled <code>self</code> by convention (Go's explicit receiver,
<code>func (a *Account) Deposit(...)</code>, made even more explicit — <code>self</code>
is just an ordinary parameter). You create instance attributes by assigning to
<code>self.something</code>, usually inside <code>__init__</code>; there is no
separate struct-field list to declare ahead of time.</p>
<table>
  <tr><th>Go</th><th>Python</th></tr>
  <tr><td><code>type Dog struct { Name string }</code></td><td><code>class Dog:</code></td></tr>
  <tr><td><code>func NewDog(name string) *Dog {</code></td><td><code>def __init__(self, name):</code></td></tr>
  <tr><td><code>d.Name = name</code></td><td><code>self.name = name</code></td></tr>
  <tr><td><code>func (d *Dog) Bark() { … }</code></td><td><code>def bark(self): …</code></td></tr>
  <tr><td><code>NewDog("Rex")</code></td><td><code>Dog("Rex")</code></td></tr>
  <tr><td><code>const Species = "…"</code> (package-level)</td><td><code>species = "…"</code> (in class body)</td></tr>
</table>
<p>A name assigned directly in the class body (not on <code>self</code>) is a
<em>class attribute</em> — shared by every instance. Go has no per-type shared
field at all; the nearest equivalent is a package-level <code>const</code> or
<code>var</code>, which isn't attached to the type and can't be reached through
an instance the way <code>self.species</code> or <code>Dog.species</code> can.
Notice you call the class directly, with no <code>New</code>-prefixed function
required: <code>Dog("Rex")</code> runs <code>__init__</code> and hands back the
instance.</p>
<p>Python has no <code>private</code> keyword. Encapsulation is <em>by
convention</em>: a leading underscore (<code>_balance</code>) signals "internal,
please don't touch." Nothing enforces it — unlike Go, where an unexported
(lowercase) field name really is inaccessible from outside the package,
checked by the compiler.</p>`,

  go: `type Account struct {
	Owner   string
	balance int
}

const Bank = "Pygmy Bank"

func NewAccount(owner string, opening int) *Account {
	return &Account{Owner: owner, balance: opening}
}

func (a *Account) Deposit(amount int) {
	a.balance += amount
}

func (a *Account) Balance() int {
	return a.balance
}

a := NewAccount("Ada", 100)
a.Deposit(50)
a.Balance() // 150`,

  task: `
<p>Write an <code>Account</code> class:</p>
<ol>
  <li>Give it a <strong>class attribute</strong> <code>bank = "Pygmy Bank"</code>
      shared by all instances.</li>
  <li><code>__init__(self, owner, opening)</code> stores <code>owner</code> as a
      public attribute and the opening amount in a "private-by-convention"
      attribute <code>_balance</code>.</li>
  <li><code>deposit(self, amount)</code> adds to <code>_balance</code> and
      returns the new balance.</li>
  <li><code>withdraw(self, amount)</code> subtracts from <code>_balance</code> if
      there are sufficient funds and returns <code>True</code>; otherwise it
      leaves the balance untouched and returns <code>False</code>.</li>
  <li><code>balance(self)</code> returns the current <code>_balance</code>.</li>
</ol>`,

  starter: `class Account:
    # 1. class attribute shared by all instances
    bank = ""  # TODO

    def __init__(self, owner, opening):
        pass  # TODO: set self.owner and self._balance

    def deposit(self, amount):
        return None  # TODO: add to _balance, return new balance

    def withdraw(self, amount):
        return None  # TODO: return True on success, False if insufficient

    def balance(self):
        return None  # TODO: return current balance
`,

  requirements: [
    { pattern: /def\s+__init__\s*\(\s*self/, message: "Define __init__(self, ...)" },
    { pattern: /self\._balance/, message: "Store the balance in a _balance attribute (private by convention)" },
    { pattern: /bank\s*=\s*["']Pygmy Bank["']/, message: "Add a class attribute bank = \"Pygmy Bank\"" },
  ],

  tests: [
    { name: "constructs with owner and balance", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.owner, \"Ada\")\n    expect_eq(a.balance(), 100)" },
    { name: "deposit increases balance and returns it", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.deposit(50), 150)\n    expect_eq(a.balance(), 150)" },
    { name: "withdraw succeeds when funds suffice", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.withdraw(40), True)\n    expect_eq(a.balance(), 60)" },
    { name: "withdraw fails when funds insufficient", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.withdraw(500), False)\n    expect_eq(a.balance(), 100)" },
    { name: "bank is a shared class attribute", code: "    a = Account(\"Ada\", 100)\n    b = Account(\"Rob\", 5)\n    expect_eq(a.bank, \"Pygmy Bank\")\n    expect_eq(Account.bank, \"Pygmy Bank\")\n    expect_true(a.bank == b.bank)" },
    { name: "instances hold independent balances", code: "    a = Account(\"Ada\", 100)\n    b = Account(\"Rob\", 5)\n    a.deposit(10)\n    expect_eq(a.balance(), 110)\n    expect_eq(b.balance(), 5)" },
  ],

  solution: `class Account:
    bank = "Pygmy Bank"

    def __init__(self, owner, opening):
        self.owner = owner
        self._balance = opening

    def deposit(self, amount):
        self._balance += amount
        return self._balance

    def withdraw(self, amount):
        if amount > self._balance:
            return False
        self._balance -= amount
        return True

    def balance(self):
        return self._balance
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Python</th></tr>
  <tr><td>Constructor</td><td><code>func NewAccount(…) *Account</code></td><td><code>def __init__(self, …)</code></td></tr>
  <tr><td>Instantiate</td><td><code>NewAccount("Ada", 100)</code></td><td><code>Account("Ada")</code></td></tr>
  <tr><td>Instance field</td><td><code>a.Owner = …</code></td><td><code>self.owner = …</code></td></tr>
  <tr><td>Method receiver</td><td>explicit <code>func (a *Account) …</code></td><td>explicit first param <code>self</code></td></tr>
  <tr><td>Static / shared</td><td><code>const Bank = …</code> (package-level)</td><td><code>bank = …</code> in class body</td></tr>
  <tr><td>Private</td><td>unexported <code>balance</code> (checked, package-scoped)</td><td><code>_x</code> (convention only)</td></tr>
</table>
<p>The leading underscore is a naming convention, not a barrier —
<code>a._balance</code> is still readable from outside. Two leading underscores
(<code>__balance</code>) trigger <em>name mangling</em>, rewriting the attribute
to <code>_Account__balance</code> to dodge accidental clashes in subclasses; it
is still reachable, just harder to hit by accident. Prefer the single underscore
for ordinary "internal" state.</p>
<p>One trap: class attributes are shared, so a <em>mutable</em> class attribute
(e.g. <code>tags = []</code> in the class body) is shared across every instance
and mutations leak between them. Keep per-instance state on <code>self</code>
inside <code>__init__</code>, and reserve class attributes for constants and
truly shared data like <code>bank</code>.</p>`,
};
