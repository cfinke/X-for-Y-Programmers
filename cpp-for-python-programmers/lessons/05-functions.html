  intro: `
<p>You already write free functions in Python, and C++ free functions look
similar. But C++ adds two things Python does not have. First, real
<em>overloading</em>: several functions can share a name as long as their
parameter lists differ, and the compiler picks one at compile time from the
argument types. Python has no overloading at all — a later <code>def</code>
with the same name simply replaces the earlier one (the <code>typing</code>
module's <code>@overload</code> is only a type-checker hint, and still needs
one real implementation underneath). Second, the calling convention is part
of the parameter type. How you declare a parameter decides whether the
argument is copied, shared read-only, or made writable by the callee.</p>
<table>
  <tr><th>Python</th><th>C++</th></tr>
  <tr><td><code>def f(x: int)</code></td><td><code>void f(int x)</code> (by value — a copy)</td></tr>
  <tr><td>pass a list (shared ref)</td><td><code>void f(const std::string&amp; s)</code> (read-only, no copy)</td></tr>
  <tr><td>mutate the list in place</td><td><code>void f(std::string&amp; s)</code> (callee mutates caller's object)</td></tr>
  <tr><td>one <code>def</code>, last one wins</td><td>truly separate functions per signature</td></tr>
  <tr><td><code>def g(x=10)</code></td><td><code>int g(int x = 10)</code></td></tr>
</table>
<p>The rule of thumb: pass small values (<code>int</code>, <code>double</code>,
<code>bool</code>) <em>by value</em>; pass objects you only read
(<code>std::string</code>, <code>std::vector</code>) by <code>const</code>
<em>reference</em> to skip the copy; pass by plain reference
(<code>T&amp;</code>) only when you intend to modify the caller's object.</p>`,

int area(int width, int height) {

std::string greet(const std::string& name, const std::string& greeting = "Hello") {
  return greeting + ", " + name + "!";
}

void doubleAll(std::vector<int>& xs) {
  for (int& x : xs) {
    x *= 2;
  }
}

int sumOf(const std::vector<int>& xs) {
  int total = 0;
  for (int x : xs) {
    total += x;
  }
  return total;
}

<table>

<p>A subtle point that trips up Python programmers: in Python every list,
dict, or object instance is a shared reference, so a function that takes a
list can always mutate it — there is no way to opt out at the call site. In
C++ you <em>choose</em>. <code>const std::vector&lt;int&gt;&amp;</code> says
"I will read this and not copy it"; drop the <code>const</code> and you are
asking for a handle you can write through, which changes the caller's own
vector. Pass an object by value (<code>std::vector&lt;int&gt; xs</code>) and
the callee gets its own copy — mutations stay local, but you paid for the
copy.</p>
<p>Default arguments live in the declaration, not the call, and follow the
same "trailing only" rule as Python: once a parameter has a default,
every parameter after it must too. Overload resolution happens entirely at
compile time — <code>area(4)</code> and <code>area(3, 5)</code> resolve to
two genuinely different functions, unlike Python, where defining a second
<code>def area</code> just overwrites the first and the earlier definition
is gone.</p>`,
