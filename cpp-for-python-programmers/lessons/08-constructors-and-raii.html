const LESSON = {
  number: 8,
  title: "Constructors & RAII",

  intro: `
<p>In Python <code>__init__</code> runs when you call the class, but cleanup is
not your job: the garbage collector frees memory <em>sometime</em> later, and
even <code>__del__</code> gives no reliable moment when "the object dies" —
CPython's refcounting usually runs it promptly, but it is not guaranteed by the
language. C++ flips this. Every object has a <strong>destructor</strong> that
runs at a <em>precise, predictable</em> point — when the object goes out of
scope — and that determinism is the foundation of the language's most
important idiom: <strong>RAII</strong> (Resource Acquisition Is
Initialization).</p>
<p>The idea: acquire a resource (memory, a file, a lock, a count) in the
constructor, release it in the destructor. Because the destructor is guaranteed
to run when the object leaves scope, the resource is <em>always</em> released —
even if an exception is thrown. No <code>finally</code>, no <code>with</code>
block, no manual <code>close()</code>.</p>
<table>
  <tr><th>Python</th><th>C++</th></tr>
  <tr><td><code>def __init__(self): ...</code></td><td><code>Widget() { ... }</code> (default)</td></tr>
  <tr><td><code>def __init__(self, id: int): ...</code></td><td><code>Widget(int id) : id_(id) {}</code></td></tr>
  <tr><td><code>self.id = id</code> in body</td><td><code>: id_(id)</code> init list (preferred)</td></tr>
  <tr><td>GC frees "eventually"; <code>__del__</code> unreliable</td><td><code>~Widget() { ... }</code> at scope end</td></tr>
  <tr><td><code>with open(...) as f:</code></td><td>RAII — automatic, always</td></tr>
</table>
<p>The <strong>member initializer list</strong> — the <code>: id_(id),
name_(name)</code> after the constructor signature — initializes members
directly, before the constructor body runs. Prefer it over assigning inside the
body: it is the only way to initialize <code>const</code> and reference members,
and it avoids a wasteful default-construct-then-assign.</p>`,

  python: `class Widget:
    live_count = 0

    def __init__(self, id: int = 0, name: str = "unnamed"):
        self.id = id
        self.name = name
        Widget.live_count += 1
    # No __del__. Even if we defined one, CPython's garbage
    # collector decides when it runs; there is no guaranteed
    # "cleanup runs now" moment in the language spec.`,

  task: `
<p>Build a <code>Widget</code> class that counts how many instances are alive,
using RAII to keep the count exact.</p>
<ol>
  <li>Private members <code>int id_</code> and <code>std::string name_</code>,
      plus a shared counter <code>inline static int liveCount_ = 0;</code>.</li>
  <li>A <strong>default constructor</strong> <code>Widget()</code> that sets
      <code>id_</code> to <code>0</code> and <code>name_</code> to
      <code>"unnamed"</code>, and increments <code>liveCount_</code>.</li>
  <li>A <strong>parameterized constructor</strong>
      <code>Widget(int id, std::string name)</code> that uses a member
      initializer list and also increments <code>liveCount_</code>.</li>
  <li>A <strong>destructor</strong> <code>~Widget()</code> that decrements
      <code>liveCount_</code> — the RAII release step.</li>
  <li>Const accessors <code>int id() const</code> and
      <code>const std::string&amp; name() const</code>, and a
      <code>static int alive()</code> that returns <code>liveCount_</code>.</li>
</ol>
<p>Because the destructor runs the instant a <code>Widget</code> leaves scope,
<code>Widget::alive()</code> is always accurate.</p>`,

    expect_eq(w.id(), 0);

    {

    { name: "count returns to baseline even with many widgets", code:

    {

        batch.reserve(3);
        batch.emplace_back(1, "x");

  solution: `class Widget {
public:
  Widget() {
    ++liveCount_;
  }

  Widget(int id, std::string name)
      : id_(id), name_(std::move(name)) {
    ++liveCount_;
  }

  ~Widget() {
    --liveCount_;
  }

  int id() const { return id_; }
  const std::string& name() const { return name_; }

  static int alive() { return liveCount_; }

private:
  int id_ = 0;
  std::string name_ = "unnamed";
  inline static int liveCount_ = 0;
};
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>C++</th></tr>
  <tr><td>Default constructor</td><td><code>def __init__(self): ...</code></td><td><code>Widget() {}</code></td></tr>
  <tr><td>Init member</td><td><code>self.id = id</code></td><td><code>: id_(id)</code> (init list)</td></tr>
  <tr><td>Cleanup</td><td>GC, non-deterministic (<code>__del__</code> unreliable)</td><td><code>~Widget()</code> at scope end</td></tr>
  <tr><td>Class-level counter</td><td><code>live_count = 0</code></td><td><code>inline static int liveCount_ = 0;</code></td></tr>
  <tr><td>Move a value in</td><td>(just assign — no ownership transfer)</td><td><code>std::move(name)</code></td></tr>
</table>
<p><strong>The rule of zero.</strong> Notice <code>Widget</code>'s members are a
plain <code>int</code> and a <code>std::string</code> — both clean up after
themselves. If your class holds only such self-managing members, you should
write <strong>no</strong> destructor, copy constructor, or assignment operator
at all; the compiler-generated ones are correct. We added a destructor here
<em>only</em> to manage the shared count, which is a resource the members don't
know about. When a class owns nothing special, owning nothing special is the
whole point — let the members do the work.</p>
<p><strong>Deterministic vs. eventual.</strong> In Python you reach for
<code>try/finally</code> or a <code>with</code> block (a context manager's
<code>__exit__</code>) to force cleanup at a known time. In C++ that guarantee
is built into every object: the destructor fires when the variable's scope
ends, in reverse order of construction, whether the scope exits normally or via
an exception. That is why RAII types like <code>std::lock_guard</code>,
<code>std::unique_ptr</code>, and <code>std::fstream</code> never need an
explicit <code>close()</code>.</p>`,
