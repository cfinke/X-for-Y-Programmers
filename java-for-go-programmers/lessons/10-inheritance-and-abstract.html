const LESSON = {
  number: 10,
  title: "Inheritance & Abstract Classes",

  intro: `
<p>Go has no inheritance at all — a struct can <em>embed</em> another struct
to reuse its fields and methods, but there is no <code>extends</code>, no
base-class constructor to call, and no runtime notion of "this struct is a
subtype of that one." Java's object model is built entirely around that idea:
a class <code>extends</code> a base, calls <code>super</code>, and overrides
methods. Java also has a real <code>abstract</code> keyword for classes and
methods, a <code>@Override</code> annotation the compiler actually enforces,
and a <code>final</code> keyword that blocks further subclassing or
reassignment — none of which have a direct Go equivalent.</p>
<table>
  <tr><th>Go</th><th>Java</th></tr>
  <tr><td>no true subtyping; struct embedding</td><td><code>class Dog extends Animal</code></td></tr>
  <tr><td>(no super constructor call)</td><td><code>super(name);</code></td></tr>
  <tr><td>embedded method, explicitly re-called</td><td><code>super.speak();</code></td></tr>
  <tr><td>interface with no implementation</td><td><code>abstract class</code> / <code>abstract T m();</code></td></tr>
  <tr><td>type assertion / type switch</td><td><code>x instanceof Dog</code></td></tr>
</table>
<p>Two things trip up newcomers coming from Go. First, <code>@Override</code>
is optional but you should always write it — if the signature does not
actually match a superclass method, the compiler errors instead of silently
creating a new method (Go has nothing like this because it has no overriding
to get wrong). Second, <code>final</code> does double duty: on a field or
local it means "assign once" (closer to a Go value you simply never
reassign, since Go has no built-in immutability keyword), and on a class or
method it forbids subclassing or overriding.</p>`,

  go: `type Employee struct {
	Name string
}

func (e Employee) Describe(totalPay func() float64) string {
	return fmt.Sprintf("%s: %v", e.Name, totalPay())
}

type Manager struct {
	Employee // embedding, not inheritance
	Bonus    float64
}

func (m Manager) BasePay() float64 { return 8000 }
func (m Manager) TotalPay() float64 { return m.BasePay() + m.Bonus }`,

  task: `
<p>Build a small employee hierarchy that exercises every inheritance feature.</p>
<ol>
  <li>An <code>abstract class Employee</code> with a <code>final</code> field
      <code>name</code>, a constructor that sets it, an
      <code>abstract double basePay()</code>, a concrete
      <code>double totalPay()</code> that returns <code>basePay()</code>, and a
      <code>String describe()</code> returning <code>name + ": " + totalPay()</code>
      (e.g. <code>"Ada: 5000.0"</code>).</li>
  <li>A <code>Developer extends Employee</code> whose constructor calls
      <code>super(name)</code> and whose <code>basePay()</code> (marked
      <code>@Override</code>) returns <code>5000</code>.</li>
  <li>A <code>Manager extends Employee</code> with an extra <code>double bonus</code>.
      Its <code>basePay()</code> returns <code>8000</code>, and its
      <code>totalPay()</code> returns <code>super.totalPay() + bonus</code>.</li>
  <li>A class <code>Payroll</code> with static <code>double totalPayroll(Employee[] emps)</code>
      (sum of every <code>totalPay()</code>) and
      <code>int countManagers(Employee[] emps)</code> using
      <code>instanceof</code>.</li>
</ol>`,

`,

  requirements: [
    { pattern: /abstract\s+class\s+Employee/, message: "Make Employee an abstract class" },
    { pattern: /extends\s+Employee/, message: "Have Developer and Manager extend Employee" },
    { pattern: /instanceof/, message: "Use instanceof to count managers" },
  ],

  tests: [
    { name: "Developer.totalPay() is 5000.0", code: "      expect_eq(new Developer(\"Ada\").totalPay(), 5000.0);" },
    { name: "Manager.totalPay() adds bonus via super", code: "      expect_eq(new Manager(\"Rob\", 2000).totalPay(), 10000.0);" },
    { name: "describe() uses name and totalPay", code: "      expect_eq(new Manager(\"Rob\", 2000).describe(), \"Rob: 10000.0\");" },
    { name: "polymorphism: Employee ref calls override", code: "      Employee e = new Manager(\"Sue\", 500);\n      expect_eq(e.totalPay(), 8500.0);" },
    { name: "Payroll.totalPayroll sums the team", code: "      Employee[] team = { new Developer(\"A\"), new Manager(\"B\", 1000) };\n      expect_eq(Payroll.totalPayroll(team), 14000.0);" },
    { name: "Payroll.countManagers uses instanceof", code: "      Employee[] team = { new Developer(\"A\"), new Manager(\"B\", 1000), new Manager(\"C\", 0) };\n      expect_eq(Payroll.countManagers(team), 2);" },
    { name: "a Manager is an Employee", code: "      expect_true(new Manager(\"X\", 0) instanceof Employee);" },
  ],

  solution: `abstract class Employee {
  protected final String name;

  protected Employee(String name) {
    this.name = name;
  }

  abstract double basePay();

  double totalPay() {
    return basePay();
  }

  String describe() {
    return name + ": " + totalPay();
  }
}

class Developer extends Employee {
  Developer(String name) {
    super(name);
  }

  @Override
  double basePay() {
    return 5000;
  }
}

class Manager extends Employee {
  private final double bonus;

  Manager(String name, double bonus) {
    super(name);
    this.bonus = bonus;
  }

  @Override
  double basePay() {
    return 8000;
  }

  @Override
  double totalPay() {
    return super.totalPay() + bonus;
  }
}

class Payroll {
  static double totalPayroll(Employee[] emps) {
    double sum = 0;
    for (Employee e : emps) {
      sum += e.totalPay();
    }
    return sum;
  }

  static int countManagers(Employee[] emps) {
    int count = 0;
    for (Employee e : emps) {
      if (e instanceof Manager) {
        count++;
      }
    }
    return count;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Java</th></tr>
  <tr><td>Subclass</td><td>no equivalent; struct embedding shares fields/methods but isn't a subtype</td><td><code>class B extends A</code></td></tr>
  <tr><td>Super constructor</td><td>(none — embedded struct is just initialized inline)</td><td><code>super(x);</code></td></tr>
  <tr><td>Super method</td><td><code>a.Method()</code> via the embedded field, called explicitly</td><td><code>super.m()</code></td></tr>
  <tr><td>Mark an override</td><td>(no overriding exists)</td><td><code>@Override</code> (compiler-checked)</td></tr>
  <tr><td>Abstract member</td><td>method required by an <code>interface</code>, with no default body</td><td><code>abstract T m();</code></td></tr>
  <tr><td>No subclassing</td><td>(the default — nothing to opt out of)</td><td><code>final class</code> / <code>final</code> method</td></tr>
  <tr><td>Runtime type check</td><td>type assertion <code>v.(B)</code> or a type switch</td><td><code>x instanceof B</code></td></tr>
</table>
<p>Polymorphism has no direct Go parallel: an <code>Employee</code> reference
holding a <code>Manager</code> runs <code>Manager.totalPay()</code> because
the JVM dispatches virtual methods by the object's actual runtime class. Go
gets a similar effect only through interfaces and explicit implementations,
never through a shared base type. The big wins over Go's embedding model are
compiler-enforced overrides (<code>@Override</code> catches typos in method
names) and <code>final</code>, which lets you lock a class or method against
further extension. Note that a class with even one <code>abstract</code>
method must itself be <code>abstract</code> and cannot be instantiated with
<code>new</code> — Go's closest analogue is an interface type, which can
never be instantiated directly either.</p>`,
};
