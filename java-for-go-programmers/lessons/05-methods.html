<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Methods",

  intro: `
<p>In Go a function is a value: you can write it top-level, hang it on a
type via a receiver, or pass it around. Java is stricter. Every method lives
inside a type, and its <em>signature</em> — the name plus the parameter types
— is part of how the compiler picks which method you meant.</p>
<table>
  <tr><th>Go</th><th>Java</th></tr>
  <tr><td>top-level <code>func f() {}</code></td><td><code>static</code> method on a class</td></tr>
  <tr><td>method with a receiver</td><td>instance method (no <code>static</code>)</td></tr>
  <tr><td>one <code>f</code>, no overloading</td><td>overloading: several <code>f</code> with different params</td></tr>
  <tr><td><code>f(xs ...int)</code></td><td><code>f(int... xs)</code> (varargs)</td></tr>
  <tr><td><code>pkg.F()</code> vs <code>v.Method()</code></td><td><code>Class.method()</code> (static) vs <code>obj.method()</code> (instance)</td></tr>
</table>
<p>Go has no overloading at all — a package-level function name can only be
declared once, so a second "shape" of the same operation needs a different
name (or a struct with optional fields). Java's <strong>overloading</strong>
fills that gap: you can declare the same method name more than once as long
as the parameter lists differ, and the compiler resolves the call at compile
time based on the argument types. <strong>Varargs</strong> (<code>int... xs</code>)
accepts zero or more trailing arguments and hands them to you as an array —
the same role as Go's <code>...int</code> parameter, but chosen by overload
resolution just like any other signature.</p>
<p>A <code>static</code> method belongs to the class and is called as
<code>MathUtil.max(...)</code>. An instance method belongs to an object and reads
the object's fields through <code>this</code>. This lesson is all static utility
methods; instance methods get their own lesson.</p>`,

  go: `func add(a int, b int) int {
	return a + b
}

// Go has no overloading, so a second "shape" needs a new name:
func labelWithUnit(x int, unit string) string {
	if unit != "" {
		return fmt.Sprintf("%d%s", x, unit)
	}
	return strconv.Itoa(x)
}

// variadic parameter == Java varargs
func sum(xs ...int) int {
	total := 0
	for _, x := range xs {
		total += x
	}
	return total
}`,

  task: `
<p>Write a class <code>MathUtil</code> full of <code>static</code> methods. You
will practice all three method features at once:</p>
<ol>
  <li><code>add(int a, int b)</code> returns their sum.</li>
  <li>Overload <code>label</code>: <code>label(int x)</code> returns the number
      as a string (e.g. <code>"5"</code>), and <code>label(int x, String unit)</code>
      returns the number with the unit appended (e.g. <code>"5kg"</code>). Same
      name, different parameter lists.</li>
  <li><code>sum(int... xs)</code> uses varargs: <code>sum()</code> is
      <code>0</code>, <code>sum(1, 2, 3)</code> is <code>6</code>. Inside the
      method <code>xs</code> is an <code>int[]</code>.</li>
  <li><code>max(int... xs)</code> returns the largest value, or <code>0</code>
      when called with no arguments.</li>
</ol>
<p>Have <code>label(int x)</code> call <code>label(x, "")</code> if you like —
one overload delegating to another is idiomatic.</p>`,

  starter: `class MathUtil {
  static int add(int a, int b) {
    return 0; // TODO
  }

  static String label(int x) {
    return ""; // TODO
  }

  static String label(int x, String unit) {
    return ""; // TODO
  }

  static int sum(int... xs) {
    return 0; // TODO
  }

  static int max(int... xs) {
    return 0; // TODO
  }
}
`,

  requirements: [
    { pattern: /static\s+String\s+label\s*\(\s*int\s+\w+\s*\)[\s\S]*static\s+String\s+label\s*\(\s*int\s+\w+\s*,/,
      message: "Declare two overloads of label: label(int) and label(int, String)" },
    { pattern: /int\s*\.\.\.\s*\w+/, message: "Use varargs (int... xs) for sum and max" },
  ],

  tests: [
    { name: "add(2, 3) is 5", code: "      expect_eq(MathUtil.add(2, 3), 5);" },
    { name: 'label(5) is "5"', code: "      expect_eq(MathUtil.label(5), \"5\");" },
    { name: 'label(5, "kg") is "5kg"', code: "      expect_eq(MathUtil.label(5, \"kg\"), \"5kg\");" },
    { name: "sum() is 0", code: "      expect_eq(MathUtil.sum(), 0);" },
    { name: "sum(1, 2, 3) is 6", code: "      expect_eq(MathUtil.sum(1, 2, 3), 6);" },
    { name: "max(3, 9, 4) is 9", code: "      expect_eq(MathUtil.max(3, 9, 4), 9);" },
    { name: "max() is 0", code: "      expect_eq(MathUtil.max(), 0);" },
  ],

  solution: `class MathUtil {
  static int add(int a, int b) {
    return a + b;
  }

  static String label(int x) {
    return label(x, "");
  }

  static String label(int x, String unit) {
    return x + unit;
  }

  static int sum(int... xs) {
    int total = 0;
    for (int x : xs) {
      total += x;
    }
    return total;
  }

  static int max(int... xs) {
    if (xs.length == 0) {
      return 0;
    }
    int best = xs[0];
    for (int x : xs) {
      if (x > best) {
        best = x;
      }
    }
    return best;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Java</th></tr>
  <tr><td>Utility function</td><td><code>func f() {}</code></td><td><code>static</code> method</td></tr>
  <tr><td>Two shapes, one name</td><td>not possible — needs a new name</td><td>two overloads: <code>f(int)</code>, <code>f(int, String)</code></td></tr>
  <tr><td>Variadic</td><td><code>f(xs ...int)</code></td><td><code>f(int... xs)</code></td></tr>
  <tr><td>Params inside</td><td><code>xs</code> is a <code>[]int</code></td><td><code>xs</code> is an <code>int[]</code></td></tr>
  <tr><td>Delegation</td><td>one function calls another</td><td>one overload calls another</td></tr>
</table>
<p>Overload resolution happens at compile time from the static argument types,
so Java's overloads are doing something Go simply doesn't offer — in Go every
top-level name is unique, and each overload here is its own method with its
own body (or one delegates to another, as <code>label(int)</code> does here).
Varargs must be the <em>last</em> parameter, and <code>f()</code> with no
varargs arguments hands you an empty array, not <code>null</code> — which is
why <code>sum()</code> safely returns <code>0</code>, just as Go's
<code>xs ...int</code> gives you a <code>nil</code>-safe, zero-length slice
when called with no arguments. One caveat: you can't overload on return type
alone; the parameter lists must differ.</p>`,
};
