const LESSON = {
  number: 17,
  title: "Exceptions",

  intro: `
<p>Go has no exceptions in the everyday sense. A function that can fail
returns an <code>error</code> as an extra value — <code>n, err :=
f()</code> — and you check <code>if err != nil</code> by hand; nothing
forces you to look at it. Go does have <code>panic</code>/<code>recover</code>
for truly exceptional situations, and that pair behaves a lot like Java's
<strong>unchecked</strong> exceptions (subclasses of
<code>RuntimeException</code>): panic freely, recover if you want, the
compiler never checks. Java also has <strong>checked</strong> exceptions
(subclasses of <code>Exception</code> but not <code>RuntimeException</code>),
which have no Go equivalent at all — they are part of a method's signature,
and the compiler forces every caller to either <code>catch</code> them or
declare <code>throws</code> to pass the buck.</p>
<table>
  <tr><th>Go</th><th>Java</th></tr>
  <tr><td><code>return nil, errors.New("bad")</code></td><td><code>throw new RuntimeException("bad")</code></td></tr>
  <tr><td><code>if err != nil { }</code></td><td><code>catch (RuntimeException e) { }</code></td></tr>
  <tr><td><code>defer func() { }()</code></td><td><code>try { } finally { }</code></td></tr>
  <tr><td>no checked errors — <code>error</code> is just a value</td><td><code>throws IOException</code> in the signature</td></tr>
  <tr><td><code>type MyErr struct{...}</code> implementing <code>Error()</code></td><td><code>class MyErr extends RuntimeException</code></td></tr>
</table>
<p>The <code>catch</code> clause names a type, so you can have several catches
for different exception types, most specific first — there is no Go analog
since <code>error</code> values are usually inspected with
<code>errors.As</code> or a type switch instead of being routed by the
language itself. Modern idiomatic Java leans on unchecked exceptions for
programming errors and validation, reserving checked exceptions for
recoverable, expected conditions (I/O, parsing) — the cases Go would model
as an ordinary returned <code>error</code>. A common pattern: a method
validates its input and <code>throw</code>s a custom
<code>RuntimeException</code>, and a defensive caller wraps the call in
<code>try/catch</code> and returns a fallback instead of blowing up.</p>`,

  go: `type ValidationError struct {
	Message string
}

func (e *ValidationError) Error() string {
	return e.Message
}

func parsePositive(input string) (int, error) {
	n, err := strconv.Atoi(input)
	if err != nil {
		return 0, &ValidationError{Message: "not a number: " + input}
	}
	if n <= 0 {
		return 0, &ValidationError{Message: fmt.Sprintf("not positive: %d", n)}
	}
	return n, nil
}

func parseOrDefault(input string, fallback int) int {
	n, err := parsePositive(input)
	if err != nil {
		return fallback
	}
	return n
}`,

  task: `
<p>Build a small validator plus a safe caller, mirroring the Go above.</p>
<ol>
  <li>Define a custom exception <code>ValidationError</code> that
      <code>extends RuntimeException</code>. Give it a constructor taking a
      <code>String message</code> and calling <code>super(message)</code>.</li>
  <li>In a class <code>Validators</code>, write a <code>static int
      parsePositive(String input)</code> that parses <code>input</code> with
      <code>Integer.parseInt</code> and returns it — but if the value is
      <code>&lt;= 0</code> it must <code>throw new ValidationError(...)</code>.
      Declare it with <code>throws ValidationError</code> in the signature so
      the intent is explicit (this is legal for unchecked exceptions too).</li>
  <li>Write a <code>static int parseOrDefault(String input, int fallback)</code>
      that calls <code>parsePositive</code> inside a <code>try</code>, returns
      the parsed value, and in a <code>catch</code> returns <code>fallback</code>.
      Catch both <code>ValidationError</code> and the
      <code>NumberFormatException</code> that <code>Integer.parseInt</code>
      throws on bad text.</li>
</ol>`,

  starter: `class ValidationError extends RuntimeException {
  ValidationError(String message) {
    super(message);
  }
}

class Validators {
  static int parsePositive(String input) throws ValidationError {
    return 0; // TODO: parse and validate, throwing ValidationError when <= 0
  }

  static int parseOrDefault(String input, int fallback) {
    return 0; // TODO: try parsePositive, catch and return fallback
  }
}
`,

  requirements: [
    { pattern: /class\s+ValidationError\s+extends\s+RuntimeException/, message: "Define ValidationError extends RuntimeException" },
    { pattern: /throw\s+new\s+ValidationError/, message: "parsePositive must throw new ValidationError" },
    { pattern: /catch\s*\(/, message: "parseOrDefault must catch the exception" },
  ],

  tests: [
    { name: "parsePositive(\"42\") returns 42", code: "      expect_eq(Validators.parsePositive(\"42\"), 42);" },
    { name: "parseOrDefault(\"7\", -1) returns 7", code: "      expect_eq(Validators.parseOrDefault(\"7\", -1), 7);" },
    { name: "parseOrDefault(\"-5\", 99) falls back to 99", code: "      expect_eq(Validators.parseOrDefault(\"-5\", 99), 99);" },
    { name: "parseOrDefault(\"abc\", 0) falls back to 0", code: "      expect_eq(Validators.parseOrDefault(\"abc\", 0), 0);" },
    { name: "parsePositive(\"0\") throws ValidationError", code: "      boolean threw = false;\n      try { Validators.parsePositive(\"0\"); } catch (ValidationError e) { threw = true; }\n      expect_true(threw);" },
    { name: "the thrown exception carries a message", code: "      String msg = null;\n      try { Validators.parsePositive(\"-3\"); } catch (ValidationError e) { msg = e.getMessage(); }\n      expect_true(msg != null && msg.length() > 0);" },
  ],

  solution: `class ValidationError extends RuntimeException {
  ValidationError(String message) {
    super(message);
  }
}

class Validators {
  static int parsePositive(String input) throws ValidationError {
    int n = Integer.parseInt(input);
    if (n <= 0) {
      throw new ValidationError("not positive: " + n);
    }
    return n;
  }

  static int parseOrDefault(String input, int fallback) {
    try {
      return parsePositive(input);
    } catch (ValidationError | NumberFormatException e) {
      return fallback;
    }
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Java</th></tr>
  <tr><td>Throw</td><td><code>return nil, errors.New("x")</code></td><td><code>throw new RuntimeException("x")</code></td></tr>
  <tr><td>Typed catch</td><td><code>if err != nil { }</code> (untyped)</td><td><code>catch (IOException e) { }</code></td></tr>
  <tr><td>Multi-catch</td><td><code>errors.As</code> / type switch</td><td><code>catch (A | B e) { }</code></td></tr>
  <tr><td>Declared throws</td><td><code>error</code> as a return value</td><td><code>void f() throws IOException</code></td></tr>
  <tr><td>Custom error</td><td><code>func (e *MyErr) Error() string</code></td><td><code>extends RuntimeException</code></td></tr>
  <tr><td>Cleanup</td><td><code>defer</code></td><td><code>finally { }</code> / try-with-resources</td></tr>
</table>
<p>The big mental shift is <strong>checked exceptions</strong>. Go has nothing
like them: an <code>error</code> return value is just a value, and a caller
can discard it with <code>_</code> and the compiler will not stop them. If a
Java method declares <code>throws IOException</code> and that is a checked
type, callers cannot ignore it — the compiler rejects the code until you
catch it or re-declare it. Extending <code>RuntimeException</code> (as we did)
opts out of that enforcement, which is why declaring
<code>throws ValidationError</code> above is optional documentation rather
than a compiler-imposed contract, much like an ordinary Go <code>error</code>
return.</p>
<p>Two more niceties: multi-catch (<code>catch (A | B e)</code>) handles several
types in one block — where Go would need an <code>errors.As</code> check per
type or a type switch — and <code>finally</code> runs whether or not an
exception was thrown, Go's rough equivalent of <code>defer</code>. For closing
files, sockets, and other resources, though, prefer
<em>try-with-resources</em> (<code>try (var f = ...) { }</code>), which
auto-closes anything implementing <code>AutoCloseable</code> — Java's answer
to Go's <code>defer f.Close()</code>.</p>`,
};
