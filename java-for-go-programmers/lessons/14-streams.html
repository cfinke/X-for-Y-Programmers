  intro: `
<p>Go transforms slices with hand-written <code>for</code> loops — there is no
built-in <code>.Filter()</code>/<code>.Map()</code>/<code>.Reduce()</code> on
<code>[]T</code>, though the newer <code>slices</code> package adds a few
helpers. Java's answer is the <strong>Stream API</strong>. You call
<code>.stream()</code> on a collection to open a pipeline, chain lazy
operations, and finish with a <em>terminal</em> operation — usually
<code>.collect(...)</code> or a reduction like <code>.sum()</code>.</p>
<table>
  <tr><th>Go</th><th>Java</th></tr>
  <tr><td><code>for _, x := range xs { if x &gt; 0 { out = append(out, x) } }</code></td><td><code>list.stream().filter(x -&gt; x &gt; 0)</code></td></tr>
  <tr><td><code>for _, x := range xs { out = append(out, x.Name) }</code></td><td><code>list.stream().map(x -&gt; x.name())</code></td></tr>
  <tr><td><code>sum := 0; for _, x := range xs { sum += x }</code></td><td><code>stream.reduce(0, Integer::sum)</code></td></tr>
  <tr><td><code>out</code> (already a slice)</td><td><code>.collect(Collectors.toList())</code></td></tr>
</table>
<p>Two things differ from a Go loop. First, a stream is
<strong>single-use and lazy</strong>: nothing runs until a terminal operation
pulls values through, and you cannot reuse a stream after that. Second, a
pipeline does not produce a collection by itself — you must <em>collect</em> it.
The <code>Collectors</code> class is the toolbox: <code>toList()</code>,
<code>joining(", ")</code>, <code>groupingBy(...)</code>,
<code>summingInt(...)</code>, and <code>counting()</code>. For plain number
crunching, <code>mapToInt(...)</code> turns the stream into an
<code>IntStream</code> with a direct <code>.sum()</code>.</p>`,

  go: `type Product struct {
	Name     string
	Category string
	Price    int
}

func namesUnder(products []Product, max int) []string {
	out := []string{}
	for _, p := range products {
		if p.Price < max {
			out = append(out, p.Name)
		}
	}
	return out
}

func totalPrice(products []Product) int {
	sum := 0
	for _, p := range products {
		sum += p.Price
	}
	return sum
}

func totalByCategory(products []Product) map[string]int {
	out := map[string]int{}
	for _, p := range products {
		out[p.Category] += p.Price
	}
	return out
}`,

  task: `
<p>You are given a <code>record Product(String name, String category, int

that process a <code>List&lt;Product&gt;</code> with stream pipelines —

<ol>
  <li><code>namesUnder(List&lt;Product&gt; products, int maxPrice)</code> —
      <code>filter</code> to products cheaper than <code>maxPrice</code>,
      <code>map</code> to the name, and <code>collect(Collectors.toList())</code>

  <li><code>totalPrice(List&lt;Product&gt; products)</code> — return the
      <code>int</code> sum of prices using <code>mapToInt(...)</code> then
      <code>.sum()</code>.</li>
  <li><code>totalPriceReduce(List&lt;Product&gt; products)</code> — same total,

</ol>`,

  solution: `record Product(String name, String category, int price) {}

class Catalog {
  static List<String> namesUnder(List<Product> products, int maxPrice) {
    return products.stream()
        .filter(p -> p.price() < maxPrice)
        .map(Product::name)
        .collect(Collectors.toList());
  }

  static int totalPrice(List<Product> products) {
    return products.stream()
        .mapToInt(Product::price)
        .sum();
  }

  static int totalPriceReduce(List<Product> products) {
    return products.stream()
        .map(Product::price)
        .reduce(0, Integer::sum);
  }

  static String nameList(List<Product> products) {
    return products.stream()
        .map(Product::name)
        .collect(Collectors.joining(", "));
  }

  static Map<String, List<Product>> byCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category));
  }

  static Map<String, Integer> totalByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.summingInt(Product::price)));
  }

  static Map<String, Long> countByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.counting()));
  }
}
`,

  notes: `
<table>
  <tr><th>Goal</th><th>Go</th><th>Java</th></tr>
  <tr><td>Start</td><td><code>xs</code></td><td><code>list.stream()</code></td></tr>
  <tr><td>Keep some</td><td><code>if</code> inside a loop + <code>append</code></td><td><code>.filter(f)</code></td></tr>
  <tr><td>Transform</td><td><code>append</code> the mapped value inside a loop</td><td><code>.map(f)</code></td></tr>
  <tr><td>Sum numbers</td><td><code>sum += x</code> in a loop</td><td><code>.mapToInt(f).sum()</code></td></tr>
  <tr><td>Fold</td><td><code>acc = f(acc, x)</code> in a loop</td><td><code>.reduce(init, f)</code></td></tr>
  <tr><td>Back to a slice/list</td><td>already a slice</td><td><code>.collect(Collectors.toList())</code></td></tr>
  <tr><td>Join to string</td><td><code>strings.Join(xs, ", ")</code></td><td><code>.collect(Collectors.joining(", "))</code></td></tr>
  <tr><td>Group</td><td>manual <code>map[string][]T</code></td><td><code>Collectors.groupingBy(f)</code></td></tr>
  <tr><td>Count per group</td><td>manual <code>map[string]int</code></td><td><code>groupingBy(f, counting())</code></td></tr>
</table>
<p>Go has no argument-order surprise here since there is no built-in
<code>reduce</code> — you just accumulate into a variable inside a loop. Java's
<code>reduce(identity, accumulator)</code> takes the starting value first, then
the combining function. The method reference <code>Integer::sum</code> is Java
shorthand for <code>(a, b) -&gt; a + b</code>, similar in spirit to passing a
named Go function like <code>func add(a, b int) int</code> where Go would
otherwise want an inline closure. <code>counting()</code> yields a
<code>Long</code>, not an <code>int</code>, which is why
<code>countByCategory</code> returns <code>Map&lt;String, Long&gt;</code>.
Remember a stream is one-shot: build the pipeline and finish it in a single
chain, since you cannot iterate the same stream twice — unlike a Go slice,
which you can range over as many times as you like.</p>`,
