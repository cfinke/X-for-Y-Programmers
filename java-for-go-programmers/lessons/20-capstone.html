  intro: `
<p>Time to put it together. Over this course you have met Java's records,
interfaces, generics, streams, and exceptions one at a time. A real component
uses all of them at once. In this capstone you will build a tiny <strong>typed
in-memory repository</strong> — the kind of thing you would reach for the moment
you needed a stand-in for a database in a Go service.</p>
<table>
  <tr><th>Go</th><th>Java</th></tr>
  <tr><td><code>type Entity interface { ID() int }</code></td><td><code>interface Entity { int id(); }</code></td></tr>
  <tr><td><code>type Repo[T Entity] struct { ... }</code></td><td><code>class Repo&lt;T extends Entity&gt;</code></td></tr>
  <tr><td><code>map[int]T</code></td><td><code>Map&lt;Integer, T&gt;</code></td></tr>
  <tr><td>manual filter/sort loop + <code>sort.Slice</code></td><td><code>stream().filter(p).sorted(...)</code></td></tr>
  <tr><td><code>errors.New("...")</code> / a custom <code>error</code></td><td><code>throw new NotFoundException(id)</code></td></tr>
</table>
<p>The shape is one you know: a generic container keyed by id, a lookup that
returns an error when the key is missing, a lookup that instead returns a
"found" boolean, and a query method that takes a predicate and returns
filtered, sorted results. Each piece is small; the point is that the type
parameter <code>T extends Entity</code> threads through all of them so the
same repository serves <code>User</code>, <code>Product</code>, or any future
record without a single cast — the same job Go's <code>[T Entity]</code>
constraint does for a generic struct.</p>`,

  go: `type Entity interface {
	ID() int
}

type Repo[T Entity] struct {
	store map[int]T
}

func NewRepo[T Entity]() *Repo[T] {
	return &Repo[T]{store: make(map[int]T)}
}

func (r *Repo[T]) Add(e T) T {
	r.store[e.ID()] = e
	return e
}

func (r *Repo[T]) Get(id int) (T, error) {
	v, ok := r.store[id]
	if !ok {
		return v, fmt.Errorf("no entity with id %d", id)
	}
	return v, nil
}

func (r *Repo[T]) Where(pred func(T) bool) []T {
	var out []T
	for _, v := range r.store {
		if pred(v) {
			out = append(out, v)
		}
	}
	sort.Slice(out, func(i, j int) bool {
		return out[i].ID() < out[j].ID()
	})
	return out
}`,

  solution: `import java.util.function.*;

interface Entity {
  int id();
}

record User(int id, String name, int age) implements Entity {}

record Product(int id, String title, double price) implements Entity {}

class NotFoundException extends RuntimeException {
  NotFoundException(int id) {
    super("no entity with id " + id);
  }
}

class Repo<T extends Entity> {
  private final Map<Integer, T> store = new HashMap<>();

  T add(T entity) {
    store.put(entity.id(), entity);
    return entity;
  }

  T get(int id) {
    T value = store.get(id);
    if (value == null) {
      throw new NotFoundException(id);
    }
    return value;
  }

  Optional<T> find(int id) {
    return Optional.ofNullable(store.get(id));
  }

  int count() {
    return store.size();
  }

  List<T> where(Predicate<T> pred) {
    return store.values().stream()
        .filter(pred)
        .sorted(Comparator.comparingInt(Entity::id))
        .toList();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Java</th></tr>
  <tr><td>Bounded generic</td><td><code>[T Entity]</code></td><td><code>&lt;T extends Entity&gt;</code></td></tr>
  <tr><td>Absent-or-present</td><td><code>(T, bool)</code> comma-ok</td><td><code>Optional&lt;T&gt;</code></td></tr>
  <tr><td>Filter + sort</td><td>loop + <code>sort.Slice</code></td><td><code>stream().filter(p).sorted(cmp).toList()</code></td></tr>
  <tr><td>Sort key</td><td><code>out[i].ID() &lt; out[j].ID()</code></td><td><code>Comparator.comparingInt(Entity::id)</code></td></tr>
  <tr><td>Signal "missing"</td><td><code>fmt.Errorf(...)</code> return value</td><td>a typed <code>RuntimeException</code></td></tr>
</table>
<p>Two design choices echo the whole course. First, <code>get</code> and
<code>find</code> split the same lookup into a throwing path and an
<code>Optional</code> path — Java's answer to "should absence be an exception or
a value?" is to offer both and let the caller choose, rather than relying only
on a returned <code>error</code> as Go does. Second, the bound
<code>T extends Entity</code> is what lets <code>where</code> sort by
<code>Entity::id</code> and lets <code>add</code> call <code>entity.id()</code>:
the compiler knows every <code>T</code> has an <code>id()</code>, so no cast is
ever needed and the same class stores users and products alike.</p>
<p><code>NotFoundException</code> extends <code>RuntimeException</code>, so it is
<em>unchecked</em> — callers are not forced to declare or catch it, which keeps
the happy path clean while still giving failures a precise type to
<code>catch</code>. That is the idiomatic modern-Java choice for a repository
lookup, and it maps onto the same problem Go solves by returning a second
<code>error</code> value from <code>Get</code>.</p>`,
