  title: "Vectors",

  intro: `
<p>A Rust <code>Vec&lt;T&gt;</code> is a growable, ordered list, and it
is the collection you reach for by default. C++ gives you the same everyday tool
under a different name: <code>std::vector&lt;T&gt;</code>. It stores its elements
contiguously, grows as you push onto it, and — like <code>Vec&lt;T&gt;</code> —
holds exactly one element type, fixed at compile time.</p>
<table>
  <tr><th>Rust</th><th>C++</th></tr>
  <tr><td><code>let mut xs: Vec&lt;i32&gt; = Vec::new();</code></td><td><code>std::vector&lt;int&gt; xs;</code></td></tr>
  <tr><td><code>xs.push(5);</code></td><td><code>xs.push_back(5);</code></td></tr>
  <tr><td><code>xs[0]</code></td><td><code>xs[0]</code> or <code>xs.at(0)</code></td></tr>
  <tr><td><code>xs.len()</code></td><td><code>xs.size()</code></td></tr>
  <tr><td><code>for x in &amp;xs</code></td><td><code>for (int x : xs)</code></td></tr>
</table>
<p>Two things to note. First, <code>xs.size()</code> returns an unsigned integer
(<code>std::size_t</code>), the same flavor as Rust's <code>usize</code> from
<code>xs.len()</code>. Second, there are two ways to index: <code>xs[i]</code>
is fast but unchecked (out of range is undefined behavior — unlike Rust's
<code>xs[i]</code>, which panics), while <code>xs.at(i)</code> does
bounds-checking and throws <code>std::out_of_range</code> — the closer
analogue to Rust's own panicking <code>xs[i]</code>.</p>`,

  rust: `fn evens_up_to(n: i32) -> Vec<i32> {
    let mut out: Vec<i32> = Vec::new();
    for i in 0..=n {
        if i % 2 == 0 {
            out.push(i);
        }
    }
    out
}

fn sum(xs: &[i32]) -> i32 {
    let mut total = 0;
    for x in xs {
        total += x;
    }
    total
}`,

<p>Write these free functions that build and query
<code>std::vector&lt;int&gt;</code>:</p>
<ol>
  <li><code>evensUpTo(int n)</code> returns a vector of every even number from
      <code>0</code> to <code>n</code> inclusive. Build it with

  <li><code>sum(const std::vector&lt;int&gt;&amp; xs)</code> returns the total of

</ol>`,

    { name: "sum({1,2,3,4}) is 10", code: "    expect_eq(sum(std::vector<int>{1, 2, 3, 4}), 10);" },
    { name: "sum({}) is 0", code: "    expect_eq(sum(std::vector<int>{}), 0);" },
    { name: "at({10,20,30}, 1) is 20", code: "    expect_eq(at(std::vector<int>{10, 20, 30}, 1), 20);" },

  solution: `std::vector<int> evensUpTo(int n) {
  std::vector<int> out;
  for (int i = 0; i <= n; i++) {
    if (i % 2 == 0) out.push_back(i);
  }
  return out;
}

int sum(const std::vector<int>& xs) {
  int total = 0;
  for (int x : xs) total += x;
  return total;
}

int at(const std::vector<int>& xs, int i) {
  return xs.at(i);
}

std::vector<int> withoutFirst(std::vector<int> xs) {
  xs.erase(xs.begin());
  return xs;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C++</th></tr>
  <tr><td>Empty list</td><td><code>let mut xs: Vec&lt;T&gt; = Vec::new();</code></td><td><code>std::vector&lt;T&gt; xs;</code></td></tr>
  <tr><td>Append</td><td><code>xs.push(v)</code></td><td><code>xs.push_back(v)</code></td></tr>
  <tr><td>Length</td><td><code>xs.len()</code></td><td><code>xs.size()</code></td></tr>
  <tr><td>Checked index</td><td><code>xs[i]</code> (panics if OOB)</td><td><code>xs.at(i)</code> (throws)</td></tr>
  <tr><td>Remove at index</td><td><code>xs.remove(0)</code></td><td><code>xs.erase(xs.begin())</code></td></tr>
  <tr><td>Insert at index</td><td><code>xs.insert(0, v)</code></td><td><code>xs.insert(xs.begin(), v)</code></td></tr>
</table>
<p>The big mental shift is <em>copy vs. reference</em>, and it maps onto
ownership rules you already know. A parameter of type
<code>std::vector&lt;int&gt;</code> (by value) moves or copies the vector into
the function — mutating it does not touch the caller's vector, which is why
<code>withoutFirst</code> can erase freely and hand back the result, much like
taking a Rust <code>Vec&lt;i32&gt;</code> by value. A parameter of type
<code>const std::vector&lt;int&gt;&amp;</code> (by <code>const</code>
reference) avoids the copy and is the default for read-only access — the C++
counterpart of borrowing with <code>&amp;[i32]</code>. Unlike Rust, though,
the compiler will not stop you from taking a non-<code>const</code> reference
and mutating the caller's vector out from under it; there is no borrow
checker enforcing exclusivity.</p>
<p><code>erase</code> and <code>insert</code> take <em>iterators</em>, not
indices: <code>xs.begin()</code> points at the first element, and you can offset
it with <code>xs.begin() + i</code>. That is the C++ equivalent of the index
arithmetic Rust's <code>remove</code> and <code>insert</code> hide for you.</p>`,
