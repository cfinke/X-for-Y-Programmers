  intro: `
<p>You already write free functions in Rust, and C++ free functions look
similar. But C++ adds two things Rust does not have. First, real
<em>overloading</em>: several functions can share a name as long as their
parameter lists differ, and the compiler picks one at compile time from the
argument types. Rust has no overloading at all — each function name is unique,
and "optional" behavior is handled with separate names, <code>Option</code>
parameters, or traits. Second, the calling convention is spelled out in the
parameter type much like Rust's own borrowing rules, but C++ will not enforce
them for you. How you declare a parameter decides whether the argument is
copied, shared read-only, or made writable by the callee — and the compiler
will not stop you from misusing a plain reference the way the Rust borrow
checker would.</p>
<table>
  <tr><th>Rust</th><th>C++</th></tr>
  <tr><td><code>fn f(x: i32)</code></td><td><code>void f(int x)</code> (by value — a copy)</td></tr>
  <tr><td><code>fn f(s: &amp;str)</code></td><td><code>void f(const std::string&amp; s)</code> (read-only, no copy)</td></tr>
  <tr><td><code>fn f(s: &amp;mut String)</code></td><td><code>void f(std::string&amp; s)</code> (callee mutates caller's object)</td></tr>
  <tr><td>no overloading; unique names</td><td>truly separate functions per signature</td></tr>
  <tr><td>no default arguments</td><td><code>int g(int x = 10)</code></td></tr>
</table>
<p>The rule of thumb: pass small values (<code>int</code>, <code>double</code>,
<code>bool</code>) <em>by value</em>; pass objects you only read
(<code>std::string</code>, <code>std::vector</code>) by <code>const</code>
<em>reference</em> to skip the copy; pass by plain reference
(<code>T&amp;</code>) only when you intend to modify the caller's object.</p>`,

  rust: `// Rust has no overloading, so distinct arities need distinct names
// or an enum/Option parameter:
fn area_square(size: i32) -> i32 {
    size * size
}

fn area_rect(w: i32, h: i32) -> i32 {
    w * h
}

// No default arguments either; a second function (or Option) stands in:
fn greet(name: &str, greeting: &str) -> String {
    format!("{greeting}, {name}!")
}

// Mutation is explicit via &mut, checked at compile time:
fn double_all(xs: &mut Vec<i32>) {
    for x in xs.iter_mut() {
        *x *= 2;
    }
}`,

  return side * side;
}

int area(int width, int height) {
  return width * height;
}

std::string greet(const std::string& name, const std::string& greeting = "Hello") {
  return greeting + ", " + name + "!";
}

void doubleAll(std::vector<int>& xs) {
  for (int& x : xs) {
    x *= 2;
  }
}

int sumOf(const std::vector<int>& xs) {
  int total = 0;
  for (int x : xs) {
    total += x;
  }
  return total;
}

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C++</th></tr>
  <tr><td>By value (copy/move)</td><td><code>fn f(x: i32)</code> / <code>fn f(s: String)</code></td><td><code>void f(int x)</code></td></tr>
  <tr><td>Read-only object</td><td><code>fn f(s: &amp;str)</code></td><td><code>void f(const std::string&amp; s)</code></td></tr>
  <tr><td>Mutate caller's object</td><td><code>fn f(s: &amp;mut String)</code></td><td><code>void f(std::string&amp; s)</code></td></tr>
  <tr><td>Overloading</td><td>not supported; unique names</td><td>separate functions per signature</td></tr>
  <tr><td>Default argument</td><td>not supported; use another function or <code>Option</code></td><td><code>int g(int x = 10)</code></td></tr>
</table>
<p>A subtle point that trips up Rust programmers: the reference syntax looks
familiar — <code>const T&amp;</code> reads like <code>&amp;T</code>, and
<code>T&amp;</code> reads like <code>&amp;mut T</code> — but C++ does not have a
borrow checker enforcing the rules at compile time. Nothing stops you from
holding a <code>std::string&amp;</code> that outlives the object it refers to,
or from having two mutable references alias the same data. The
<code>const</code>/non-<code>const</code> distinction is a promise you make to
readers and the compiler checks only the "does this function try to write
through a const reference" part, not aliasing or lifetimes the way Rust does.
Pass an object by value (<code>std::vector&lt;int&gt; xs</code>) and the callee
gets its own copy — mutations stay local, but you paid for the copy, similar to
passing an owned <code>Vec&lt;i32&gt;</code> in Rust instead of a
<code>&amp;Vec&lt;i32&gt;</code>.</p>
<p>Default arguments live in the declaration, not the call, and once a
parameter has a default, every parameter after it must too — Rust has no
equivalent, so the same effect is usually reached with a second function, a
builder, or an <code>Option</code> parameter. Overload resolution happens
entirely at compile time — <code>area(4)</code> and <code>area(3, 5)</code>
resolve to two genuinely different functions, something Rust sidesteps
entirely by simply not allowing two functions to share a name.</p>`,
