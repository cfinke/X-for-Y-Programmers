  number: 14,
  title: "Lambdas",

  intro: `
<p>A Rust closure infers what to capture from how the body uses it, and the
compiler picks the tightest fit (<code>Fn</code>, <code>FnMut</code>, or
<code>FnOnce</code>) automatically, with <code>move</code> forcing an
ownership-taking capture when you need one. A C++ lambda makes that
capture explicit up front: the <em>capture list</em> in square brackets says
exactly which surrounding variables the lambda can see, and <em>how</em> — by
value or by reference. Everything else about the syntax will look familiar:
<code>[captures](params){ body }</code>.</p>
<table>
  <tr><th>Rust</th><th>C++</th></tr>
  <tr><td><code>|x: i32| x + 1</code></td><td><code>[](int x){ return x + 1; }</code></td></tr>
  <tr><td><code>|n| n * factor</code> (captures <code>factor</code>)</td><td><code>[factor](int n){ return n * factor; }</code> (by value)</td></tr>
  <tr><td><code>|| { total += x; }</code> (captures <code>&amp;mut total</code>)</td><td><code>[&amp;total](){ total += x; }</code> (by reference)</td></tr>
  <tr><td><code>let f: Box&lt;dyn Fn(i32) -&gt; i32&gt;</code></td><td><code>std::function&lt;int(int)&gt; f</code></td></tr>
</table>
<p>Three knobs to know. <strong>Capture by value</strong> — <code>[x]</code> or
<code>[=]</code> for everything — copies the variable into the lambda; the copy
is <code>const</code> by default. <strong>Capture by reference</strong> —
<code>[&amp;x]</code> or <code>[&amp;]</code> for everything — lets the body read
and write the original. Adding <code>mutable</code> after the parameter list lets
a by-value lambda modify <em>its own copy</em> between calls, which is how you
build a stateful closure. To store a lambda in a variable, a struct field, or a
function parameter, wrap it in <code>std::function&lt;Ret(Args)&gt;</code> — the
type-erased equivalent of a Rust <code>Box&lt;dyn Fn...&gt;</code> trait object.</p>`,

  rust: `fn apply_twice(x: i32, f: impl Fn(i32) -> i32) -> i32 {
    f(f(x))
}

fn make_counter() -> impl FnMut() -> i32 {
    let mut count = 0;
    move || { count += 1; count } // closes over count
}

let total: i32 = vec![1, 2, 3, 4].iter().fold(0, |sum, x| sum + x);`,

  task: `
<p>Write these free functions, each exercising a different facet of lambdas:</p>
<ol>
  <li><code>applyTwice(int x, const std::function&lt;int(int)&gt;&amp; f)</code> —

  <li><code>total(const std::vector&lt;int&gt;&amp; v)</code> — sum the vector by

      accumulator <strong>by reference</strong> (<code>[&amp;sum]</code>).</li>
  <li><code>countGreaterThan(const std::vector&lt;int&gt;&amp; v, int threshold)</code>
      — return how many elements exceed <code>threshold</code> using
      <code>std::count_if</code> with a lambda that captures
      <code>threshold</code> <strong>by value</strong> (<code>[threshold]</code>).
      Return it as an <code>int</code>.</li>
  <li><code>makeCounter()</code> — return a <code>std::function&lt;int()&gt;</code>
      that yields 1, 2, 3, … on successive calls. Capture a counter by value and

</ol>`,

    { pattern: /\bmutable\b/, message: "Use a mutable lambda so makeCounter's closure can update its own copy" },

  tests: [
    { name: "applyTwice applies f twice (inline lambda)", code: "    expect_eq(applyTwice(3, [](int n){ return n + 1; }), 5);" },
    { name: "applyTwice works with a capturing lambda", code: "    int factor = 3;\n    expect_eq(applyTwice(2, [factor](int n){ return n * factor; }), 18);" },
    { name: "total sums the vector", code: "    expect_eq(total(std::vector<int>{1, 2, 3, 4}), 10);" },

    { name: "countGreaterThan counts elements above threshold", code: "    expect_eq(countGreaterThan(std::vector<int>{1, 5, 2, 8, 3}, 3), 2);" },
    { name: "makeCounter yields 1, 2, 3", code: "    auto c = makeCounter();\n    expect_eq(c(), 1);\n    expect_eq(c(), 2);\n    expect_eq(c(), 3);" },
    { name: "counters are independent", code: "    auto a = makeCounter();\n    auto b = makeCounter();\n    expect_eq(a(), 1);\n    expect_eq(a(), 2);\n    expect_eq(b(), 1);" },

  solution: `int applyTwice(int x, const std::function<int(int)>& f) {
  return f(f(x));
}

int total(const std::vector<int>& v) {
  int sum = 0;
  std::for_each(v.begin(), v.end(), [&sum](int x){ sum += x; });
  return sum;
}

int countGreaterThan(const std::vector<int>& v, int threshold) {
  return static_cast<int>(
    std::count_if(v.begin(), v.end(), [threshold](int x){ return x > threshold; }));
}

std::function<int()> makeCounter() {
  int count = 0;
  return [count]() mutable { return ++count; };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C++</th></tr>
  <tr><td>Lambda</td><td><code>|x| x + 1</code></td><td><code>[](int x){ return x + 1; }</code></td></tr>
  <tr><td>Capture by value</td><td><code>move</code> keyword forces it</td><td><code>[x]</code> or <code>[=]</code> (copy, const)</td></tr>
  <tr><td>Capture by reference</td><td>inferred <code>&amp;</code>/<code>&amp;mut</code> borrow</td><td><code>[&amp;x]</code> or <code>[&amp;]</code></td></tr>
  <tr><td>Stateful closure</td><td><code>move || { count += 1; count }</code></td><td><code>[count]() mutable { return ++count; }</code></td></tr>
  <tr><td>Function-typed value</td><td><code>Box&lt;dyn Fn(i32) -&gt; i32&gt;</code></td><td><code>std::function&lt;int(int)&gt;</code></td></tr>
</table>
<p>A bare lambda has a unique, unnameable type, so <code>auto c = makeCounter();</code>
works but you cannot spell the type by hand — that is what
<code>std::function</code> is for when you need to name it, store it, or pass it
across a function boundary. This mirrors Rust's own split: an anonymous
closure has its own compiler-generated type usable with <code>impl Fn...</code>
or generics, while <code>Box&lt;dyn Fn...&gt;</code> is the type-erased,
nameable form you reach for at API boundaries — trading a small indirection
for a concrete, storable type. Passing a lambda directly to
<code>std::for_each</code> or <code>std::count_if</code> lets the compiler
inline it, the same way passing a closure to a generic function monomorphizes
it in Rust; wrapping it in <code>std::function</code> (or boxing it as
<code>dyn Fn</code>) gives up that inlining for a nameable type.</p>
<p>One footgun Rust's borrow checker would catch at compile time: capturing a
local <em>by reference</em> and then returning the lambda leaves a dangling
reference once the enclosing function exits. C++ will not stop you. That is
why <code>makeCounter</code> captures <code>count</code> <em>by value</em> —
the state lives inside the returned closure, not on a stack frame that is
about to vanish.</p>`,
};
