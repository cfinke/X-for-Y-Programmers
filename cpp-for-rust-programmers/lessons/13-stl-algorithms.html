  intro: `
<p>Rust's iterator adapters — <code>sort</code>, <code>find</code>,
<code>filter</code>, <code>map</code>, and <code>fold</code> — let you process a
slice without writing an index loop. C++ has the same toolbox, but the
functions live in <code>&lt;algorithm&gt;</code> and <code>&lt;numeric&gt;</code>,
and instead of being chained onto an iterator adapter they are free functions
that take a pair of <em>iterators</em> — <code>v.begin()</code> and
<code>v.end()</code> — marking the range to work on.</p>
<table>
  <tr><th>Rust</th><th>C++</th></tr>
  <tr><td><code>v.sort_by(|x, y| x.cmp(y))</code></td><td><code>std::sort(a.begin(), a.end(), cmp)</code></td></tr>
  <tr><td><code>v.iter().find(|x| p(x))</code></td><td><code>std::find_if(a.begin(), a.end(), p)</code></td></tr>
  <tr><td><code>v.iter().filter(|x| p(x)).count()</code></td><td><code>std::count_if(a.begin(), a.end(), p)</code></td></tr>
  <tr><td><code>v.iter().map(f)</code></td><td><code>std::transform(a.begin(), a.end(), out, f)</code></td></tr>
  <tr><td><code>v.iter().fold(init, f)</code></td><td><code>std::accumulate(a.begin(), a.end(), init, f)</code></td></tr>
</table>
<p>The predicates and mappers are lambdas, just like Rust's closures:
<code>[](int x){ return x % 2 == 0; }</code>. The <code>[]</code> is the
<em>capture list</em> — it names any surrounding variables the lambda uses
(leave it empty when it needs none), playing the same role as Rust deciding
whether a closure borrows or moves its environment. Two things differ from the
Rust iterator methods: <code>std::sort</code> mutates the vector in place and
returns nothing (Rust's <code>sort_by</code> does the same on a
<code>Vec</code>, but <code>std::sort</code> has no non-mutating counterpart to
reach for), and <code>std::transform</code> writes into an existing output
range rather than allocating a fresh <code>Vec</code>, so you size the
destination first.</p>`,

  rust: `let nums = vec![5, 2, 8, 1, 9, 3];

let mut sorted = nums.clone();
sorted.sort_by(|a, b| b.cmp(a));                       // descending
let first_big = nums.iter().find(|&&n| n > 4);         // Some(5)
let evens = nums.iter().filter(|&&n| n % 2 == 0).count(); // 2
let doubled: Vec<i32> = nums.iter().map(|n| n * 2).collect(); // [10, 4, ...]
let total = nums.iter().fold(0, |acc, n| acc + n);     // 28`,

  task: `
<p>Work with <code>std::vector&lt;int&gt;</code> using the algorithms — no
hand-written <code>for</code> loops. Write these free functions:</p>
<ol>
  <li><code>sortDescending(std::vector&lt;int&gt; v)</code> — takes the vector by

  <li><code>firstGreaterThan(const std::vector&lt;int&gt;&amp; v, int threshold)</code>

      <code>std::find_if</code>, or <code>-1</code> if none. Compare the returned

  <li><code>countEven(const std::vector&lt;int&gt;&amp; v)</code> — returns how many

  <li><code>doubled(const std::vector&lt;int&gt;&amp; v)</code> — returns a new

  <li><code>sum(const std::vector&lt;int&gt;&amp; v)</code> — returns the total
      using <code>std::accumulate</code> with an initial value of <code>0</code>.</li>
</ol>`,

  solution: `std::vector<int> sortDescending(std::vector<int> v) {
  std::sort(v.begin(), v.end(), [](int a, int b) { return a > b; });
  return v;
}

int firstGreaterThan(const std::vector<int>& v, int threshold) {
  auto it = std::find_if(v.begin(), v.end(),
                         [threshold](int x) { return x > threshold; });
  return it != v.end() ? *it : -1;
}

int countEven(const std::vector<int>& v) {
  return static_cast<int>(
      std::count_if(v.begin(), v.end(), [](int x) { return x % 2 == 0; }));
}

std::vector<int> doubled(const std::vector<int>& v) {
  std::vector<int> out(v.size());
  std::transform(v.begin(), v.end(), out.begin(),
                 [](int x) { return x * 2; });
  return out;
}

int sum(const std::vector<int>& v) {
  return std::accumulate(v.begin(), v.end(), 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C++</th></tr>
  <tr><td>Sort with comparator</td><td><code>v.sort_by(|x, y| y.cmp(x))</code></td><td><code>std::sort(b, e, [](int x, int y){ return x &gt; y; })</code></td></tr>
  <tr><td>Find first match</td><td><code>v.iter().find(p)</code></td><td><code>std::find_if(b, e, p)</code> → iterator</td></tr>
  <tr><td>Count matches</td><td><code>v.iter().filter(p).count()</code></td><td><code>std::count_if(b, e, p)</code></td></tr>
  <tr><td>Map</td><td><code>v.iter().map(f)</code></td><td><code>std::transform(b, e, out, f)</code></td></tr>
  <tr><td>Fold / reduce</td><td><code>v.iter().fold(0, f)</code></td><td><code>std::accumulate(b, e, 0, f)</code></td></tr>
  <tr><td>Closure / lambda</td><td><code>|x| x * 2</code></td><td><code>[](int x){ return x * 2; }</code></td></tr>
</table>
<p>A few gotchas coming from Rust. The search algorithms return an
<em>iterator</em>, not an <code>Option</code> — you must test it against
<code>end()</code> before dereferencing, since <code>end()</code> is the
one-past-the-last sentinel (like a Rust iterator's <code>find</code> returning
<code>None</code> instead of a sentinel). <code>std::count_if</code> returns a
signed <code>difference_type</code>, which is why we <code>static_cast</code>
it to <code>int</code> — there is no built-in narrowing check the way
<code>usize</code>-to-<code>i32</code> conversions get flagged by Rust's
type system. And the initial value you hand to <code>std::accumulate</code>
fixes the result type: pass <code>0</code> (an <code>int</code>) and you get
integer math; pass <code>0.0</code> for a <code>double</code> sum, much as
Rust's <code>fold</code> infers its accumulator type from the initial value
you give it. In C++20 you can also spell many of these as
<a>ranges</a> (<code>std::ranges::sort(v)</code>) that take the container
directly — closer to Rust's method-chaining style — but the iterator-pair
form is the foundation worth knowing first.</p>`,
