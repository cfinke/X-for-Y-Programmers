  title: "Smart Pointers",

  intro: `
<p>Rust has no garbage collector either — you already live in this world.
Every value has a single owner, and the compiler enforces at compile time that
you never alias a value you don't own. Heap allocation goes through explicit
smart pointers: <code>Box&lt;T&gt;</code> for sole ownership and
<code>Rc&lt;T&gt;</code> (or <code>Arc&lt;T&gt;</code> across threads) for
shared, reference-counted ownership. C++ tells the same two-pointer story,
just checked mostly at runtime instead of compile time, and spelled
<code>std::unique_ptr</code> and <code>std::shared_ptr</code>.</p>
<p>Modern C++ solves manual <code>new</code>/<code>delete</code> the same way
Rust solves it: objects that own a heap allocation and delete it automatically
when they go out of scope (this is called RAII). You almost never write
<code>new</code> or <code>delete</code> yourself, the same way you almost
never call <code>Box::into_raw</code> or drop something by hand.</p>
<table>
  <tr><th>Rust</th><th>C++</th></tr>
  <tr><td><code>let r = Box::new(Robot::new("R", 8));</code></td><td><code>auto r = std::make_unique&lt;Robot&gt;("R", 8);</code></td></tr>
  <tr><td>freed when the <code>Box</code> is dropped</td><td>freed when the <code>unique_ptr</code> dies</td></tr>
  <tr><td><code>r.name</code> (auto-deref)</td><td><code>r-&gt;name</code></td></tr>
  <tr><td><code>Rc&lt;T&gt;</code> = shared, ref-counted</td><td><code>shared_ptr</code> = shared, ref-counted</td></tr>
  <tr><td><code>Box&lt;T&gt;</code> = exactly one owner</td><td><code>unique_ptr</code> = exactly one owner</td></tr>
</table>
<p><code>std::unique_ptr&lt;T&gt;</code> is the default, exactly like
<code>Box&lt;T&gt;</code>: it is the sole owner, so it cannot be copied — only
<em>moved</em> with <code>std::move</code> to hand ownership elsewhere, the
same move the compiler already inserts for you when a <code>Box</code> passes
by value. <code>std::shared_ptr&lt;T&gt;</code> mirrors <code>Rc&lt;T&gt;</code>:
copies (<code>.clone()</code> in Rust, plain <code>=</code> in C++) share one
object via a reference count, and <code>use_count()</code> is the C++
equivalent of <code>Rc::strong_count()</code>. The object dies when the last
owner does.</p>`,

  rust: `struct Robot {
    name: String,
    battery: u32,
}

// Rc gives you a GC-like shared reference, counted instead of traced.
let r = Rc::new(Robot { name: "Wall-E".to_string(), battery: 80 });
let alias = Rc::clone(&r);  // both point at the same Robot
println!("{}", r.name);     // "Wall-E"`,

  task: `
<p>A <code>Robot</code> struct is already declared for you. Build robots on the
heap through smart pointers — never call <code>new</code>:</p>
<ol>
  <li><code>make_robot(name, battery)</code> returns a
      <code>std::unique_ptr&lt;Robot&gt;</code> built with
      <code>std::make_unique&lt;Robot&gt;(name, battery)</code>.</li>
  <li><code>robot_name(const std::unique_ptr&lt;Robot&gt;&amp; r)</code> returns
      <code>r-&gt;name</code>.</li>
  <li><code>adopt(std::unique_ptr&lt;Robot&gt; r)</code> takes ownership by value
      (the caller must <code>std::move</code> into it) and returns
      <code>r-&gt;battery</code>.</li>
  <li><code>share_robot(name, battery)</code> returns a
      <code>std::shared_ptr&lt;Robot&gt;</code> built with
      <code>std::make_shared&lt;Robot&gt;(name, battery)</code>.</li>
  <li><code>owner_count(const std::shared_ptr&lt;Robot&gt;&amp; r)</code> returns

</ol>`,

`,

    { pattern: /std::make_unique\s*<\s*Robot\s*>/, message: "Build the unique_ptr with std::make_unique<Robot>(...)" },

`    auto r = make_robot("Wall-E", 80);

    { name: "make_robot returns a real allocation, not null", code:
`    auto r = make_robot("R2-D2", 55);

`    auto p = share_robot("Marvin", 5);

  solution: `struct Robot {
  std::string name;
  int battery;
  Robot(std::string n, int b) : name(std::move(n)), battery(b) {}
};

std::unique_ptr<Robot> make_robot(const std::string& name, int battery) {
  return std::make_unique<Robot>(name, battery);
}

std::string robot_name(const std::unique_ptr<Robot>& r) {
  return r->name;
}

int adopt(std::unique_ptr<Robot> r) {
  return r->battery;
}

std::shared_ptr<Robot> share_robot(const std::string& name, int battery) {
  return std::make_shared<Robot>(name, battery);
}

long owner_count(const std::shared_ptr<Robot>& r) {
  return r.use_count();
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C++</th></tr>
  <tr><td>Build on heap</td><td><code>Box::new(Robot::new(...))</code></td><td><code>std::make_unique&lt;Robot&gt;(...)</code></td></tr>
  <tr><td>Shared, counted</td><td><code>Rc::new(Robot::new(...))</code></td><td><code>std::make_shared&lt;Robot&gt;(...)</code></td></tr>
  <tr><td>Reach a member</td><td><code>r.name</code> (auto-deref)</td><td><code>r-&gt;name</code></td></tr>
  <tr><td>Hand off ownership</td><td>plain assignment (moves by default)</td><td><code>std::move(ptr)</code></td></tr>
  <tr><td>How many owners</td><td><code>Rc::strong_count(&amp;ptr)</code></td><td><code>ptr.use_count()</code></td></tr>
  <tr><td>Freeing</td><td>dropped when owner count hits 0 / scope ends</td><td>automatic when the pointer dies</td></tr>
</table>
<p>The <code>starter</code> struct's constructor exists only so
<code>make_unique</code>/<code>make_shared</code> can forward the arguments to it —
those helpers construct the object in place, which is why you pass constructor
arguments rather than an already-built <code>Robot</code>, the same way
<code>Box::new</code>/<code>Rc::new</code> take an already-built value, while
the real field assembly happens wherever you construct the <code>Robot</code>
that goes inside.</p>
<p>A <code>unique_ptr</code> cannot be copied, so <code>adopt</code> takes it
<em>by value</em> and the caller must write <code>std::move(r)</code> to transfer
ownership; afterwards the caller's pointer is <code>nullptr</code> — this is the
same move the compiler enforces for free on a <code>Box&lt;T&gt;</code>, except
C++ leaves the moved-from pointer alive (as null) instead of making it a
compile error to touch again. A <code>shared_ptr</code> copies freely — each
copy bumps <code>use_count()</code>, exactly like calling <code>.clone()</code>
on an <code>Rc&lt;T&gt;</code> bumps its strong count — and the object is
destroyed exactly when the count hits zero. Reach for <code>unique_ptr</code>
(<code>Box</code>) by default and only upgrade to <code>shared_ptr</code>
(<code>Rc</code>) when ownership genuinely must be shared.</p>`,
};
