<p>Time to put it together. You will build a <strong>mini expression
evaluator</strong>: parse a string like <code>"(1 + 2) * 3"</code> into a small
tree of nodes, then walk the tree to compute the answer. This one exercise
touches almost everything from the course — a class or two, an owned tree of
polymorphic nodes, and two flavors of error handling.</p>
<p>The shape is the same one a Rust programmer would draw: a recursive
<em>node</em> enum (a number, or an operator with a left and right child) and a
recursive walk that evaluates it. The differences are all about
<strong>ownership and errors</strong>. In Rust the tree owns its children
through <code>Box&lt;Node&gt;</code>, and a fallible walk naturally returns
<code>Result&lt;T, E&gt;</code>. In C++ you own the tree explicitly with
<code>std::unique_ptr</code> in place of <code>Box</code>, and you get to
<em>choose</em> your error channel: throw for the strict path, or return
<code>std::optional</code> for the "just tell me if it worked" path.</p>
<table>
  <tr><th>Rust</th><th>C++</th></tr>
  <tr><td><code>enum Node { Num(f64), Op { .. } }</code></td><td>base class + <code>override</code>d <code>eval()</code></td></tr>
  <tr><td><code>Box&lt;Node&gt;</code> owns each child</td><td><code>std::unique_ptr&lt;Node&gt;</code> owns each child</td></tr>
  <tr><td><code>panic!(...)</code> / <code>Err(...)</code></td><td><code>throw std::runtime_error(...)</code></td></tr>
  <tr><td><code>Option&lt;f64&gt;</code></td><td><code>std::optional&lt;double&gt;</code></td></tr>
  <tr><td><code>result.ok()</code></td><td><code>try { ... } catch (const std::exception&amp;)</code></td></tr>
</table>
<p>Grammar (standard precedence, left-associative):
<code>expr := term (('+'|'-') term)*</code>,
<code>term := factor (('*'|'/') factor)*</code>,
<code>factor := number | '(' expr ')' | '-' factor</code>.</p>`,

    Num(f64),
    Op { op: char, lhs: Box<Node>, rhs: Box<Node> },
}

fn eval_node(n: &Node) -> Result<f64, String> {
    match n {
        Node::Num(v) => Ok(*v),
        Node::Op { op, lhs, rhs } => {
            let a = eval_node(lhs)?;
            let b = eval_node(rhs)?;
            match op {
                '+' => Ok(a + b),
                '-' => Ok(a - b),
                '*' => Ok(a * b),
                '/' => {
                    if b == 0.0 { return Err("division by zero".to_string()); }
                    Ok(a / b)
                }
                _ => Err("bad operator".to_string()),
            }
        }
    }
}

// evaluate() parses then walks, returning a Result; try_evaluate() collapses
// the Err into None:
fn try_evaluate(src: &str) -> Option<f64> {
    evaluate(src).ok()

  solution: `struct Node {
  virtual ~Node() = default;
  virtual double eval() const = 0;
};

struct Num : Node {
  double value;
  explicit Num(double v) : value(v) {}
  double eval() const override { return value; }
};

struct BinOp : Node {
  char op;
  std::unique_ptr<Node> lhs, rhs;
  BinOp(char o, std::unique_ptr<Node> l, std::unique_ptr<Node> r)
    : op(o), lhs(std::move(l)), rhs(std::move(r)) {}
  double eval() const override {
    double a = lhs->eval();
    double b = rhs->eval();
    switch (op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/':
        if (b == 0.0) throw std::runtime_error("division by zero");
        return a / b;
    }
    throw std::runtime_error("unknown operator");
  }
};

class Parser {
public:
  explicit Parser(const std::string& src) : src_(src), pos_(0) {}

  std::unique_ptr<Node> parse() {
    auto node = parseExpr();
    skipSpaces();
    if (pos_ != src_.size()) throw std::runtime_error("trailing input");
    return node;
  }

private:
  const std::string& src_;
  std::size_t pos_;

  void skipSpaces() {
    while (pos_ < src_.size() && std::isspace(static_cast<unsigned char>(src_[pos_]))) pos_++;
  }
  char peek() {
    skipSpaces();
    return pos_ < src_.size() ? src_[pos_] : '\\0';
  }

  std::unique_ptr<Node> parseExpr() {
    auto node = parseTerm();
    for (char c = peek(); c == '+' || c == '-'; c = peek()) {
      pos_++;
      node = std::make_unique<BinOp>(c, std::move(node), parseTerm());
    }
    return node;
  }

  std::unique_ptr<Node> parseTerm() {
    auto node = parseFactor();
    for (char c = peek(); c == '*' || c == '/'; c = peek()) {
      pos_++;
      node = std::make_unique<BinOp>(c, std::move(node), parseFactor());
    }
    return node;
  }

  std::unique_ptr<Node> parseFactor() {
    char c = peek();
    if (c == '-') {
      pos_++;
      return std::make_unique<BinOp>('-', std::make_unique<Num>(0.0), parseFactor());
    }
    if (c == '(') {
      pos_++;
      auto node = parseExpr();
      if (peek() != ')') throw std::runtime_error("expected )");
      pos_++;
      return node;
    }
    return parseNumber();
  }

  std::unique_ptr<Node> parseNumber() {
    skipSpaces();
    std::size_t start = pos_;
    while (pos_ < src_.size() &&
           (std::isdigit(static_cast<unsigned char>(src_[pos_])) || src_[pos_] == '.')) {
      pos_++;
    }
    if (pos_ == start) throw std::runtime_error("expected a number");
    return std::make_unique<Num>(std::stod(src_.substr(start, pos_ - start)));
  }
};

double evaluate(const std::string& expr) {
  Parser parser(expr);
  std::unique_ptr<Node> tree = parser.parse();
  return tree->eval();
}

std::optional<double> tryEvaluate(const std::string& expr) {
  try {
    return evaluate(expr);
  } catch (const std::exception&) {
    return std::nullopt;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C++</th></tr>
  <tr><td>Polymorphic node</td><td><code>enum</code> + <code>match</code></td><td>base class + virtual <code>eval()</code></td></tr>
  <tr><td>Owning a child</td><td><code>Box&lt;Node&gt;</code></td><td><code>std::unique_ptr&lt;Node&gt;</code></td></tr>
  <tr><td>Hand off ownership</td><td>move (checked by the compiler)</td><td><code>std::move(child)</code></td></tr>
  <tr><td>Strict errors</td><td><code>panic!</code> / <code>Err(e)</code></td><td><code>throw std::runtime_error</code></td></tr>
  <tr><td>Soft errors</td><td><code>Option&lt;T&gt;</code> via <code>Result::ok()</code></td><td><code>std::optional&lt;T&gt;</code></td></tr>
</table>
<p>Three things to carry forward. First, <code>std::move(node)</code> is
mandatory, not optional: a <code>unique_ptr</code> cannot be copied, so
transferring a child into <code>BinOp</code> means <em>moving</em> it — the old
handle is left empty and the new one owns the subtree, the same rule Rust's
borrow checker enforces automatically every time a <code>Box&lt;Node&gt;</code>
changes hands. When the root <code>unique_ptr</code> in <code>evaluate</code>
goes out of scope it deletes the whole tree recursively; there is no
<code>delete</code> to write and no leak to chase, just as dropping a
<code>Box&lt;Node&gt;</code> in Rust recursively frees its children.</p>
<p>Second, the two error channels are a deliberate design choice, not
redundancy. <code>evaluate</code> throws so a caller who expects valid input
gets a loud failure; <code>tryEvaluate</code> wraps that throw and hands back
<code>std::nullopt</code> for callers who treat bad input as normal — the same
split as writing a fallible function that returns <code>Result&lt;T, E&gt;</code>
and a thin wrapper that turns it into <code>Option&lt;T&gt;</code> with
<code>.ok()</code>. Third, catching <code>const std::exception&amp;</code>
(by reference, to the base type) catches every standard exception at once,
including the <code>std::runtime_error</code> you threw and the
<code>std::invalid_argument</code> that <code>std::stod</code> can raise —
Rust has no comparable base-class hierarchy for errors, since every fallible
call spells out its own <code>Result&lt;T, E&gt;</code>, but the effect here is
the same idea: one <code>catch</code> clause absorbs both the failure you
anticipated and the ones the standard library throws on your behalf.</p>`,
