  title: "Move Semantics",

  intro: `
<p>In Rust, assignment of a non-<code>Copy</code> type is a <strong>move</strong> by
default. Writing <code>let b = a;</code> transfers ownership of <code>a</code>'s
heap buffer to <code>b</code>, and the compiler statically forbids any further
use of <code>a</code> — try it and you get a "use of moved value" error at
compile time, not a runtime bug. C++ takes the opposite default: a
<code>std::vector</code> or <code>std::string</code> variable <em>is</em> the
data (it owns its heap buffer), so <code>auto b = a;</code> performs a deep
<strong>copy</strong> — a fresh allocation and a byte-for-byte duplicate.</p>
<p>That is often not what you want. If you are done with <code>a</code> and just
want to hand its buffer to <code>b</code>, copying is wasteful. <strong>Moving</strong>
is C++'s answer: it steals the source's internal pointer and leaves the source
empty — no allocation, no element copies, just a few pointers swapped. Unlike
Rust, this is opt-in and not statically enforced: you ask for it with
<code>std::move</code>, which casts a value to an <em>rvalue reference</em>
(<code>T&amp;&amp;</code>) so the compiler picks the move path — and the compiler
will happily let you keep using the (now-empty) source afterward.</p>
<table>
  <tr><th>Rust</th><th>C++</th></tr>
  <tr><td><code>let b = a;</code> (moves, <code>a</code> becomes unusable)</td><td><code>auto b = a;</code> (deep copy)</td></tr>
  <tr><td>enforced at compile time</td><td><code>auto b = std::move(a);</code> (steal, <code>a</code> now empty)</td></tr>
  <tr><td>compiler forbids using a moved-from value</td><td>move leaves the source in a valid, typically-empty state — using it again compiles fine</td></tr>
  <tr><td><code>fn f(x: Buf)</code> (takes ownership)</td><td><code>void f(Buf&amp;&amp; x)</code> (takes an rvalue)</td></tr>
</table>
<p>Because a move on a <code>vector</code> or <code>string</code> is a constant
number of pointer assignments regardless of size, it is essentially free — just
like moving a <code>Vec</code> or <code>String</code> in Rust — which is why
returning a big container by value in C++ is cheap, not something to avoid.</p>`,

  rust: `// In Rust, non-Copy types move by default: assignment transfers ownership.
struct Buf { data: Vec<i32> }

let a = Buf { data: vec![1, 2, 3] };
let b = a;           // ownership of the Vec moves from a to b
// a.data.push(4);   // compile error: use of moved value: \`a\`

// "Moving" ownership out through a function argument is the normal case.
fn transfer(src: Buf) -> Vec<i32> {
    src.data          // ownership moves out; src is consumed here
}`,

  solution: `class TextBuffer {
private:
  std::string data_;

public:
  TextBuffer(std::string s) : data_(std::move(s)) {}

  std::size_t size() const {
    return data_.size();
  }

  const std::string& str() const {
    return data_;
  }

  TextBuffer(TextBuffer&& other) noexcept : data_(std::move(other.data_)) {
    other.data_.clear();
  }
};

TextBuffer transfer(TextBuffer& src) {
  return TextBuffer(std::move(src));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C++</th></tr>
  <tr><td>Assignment</td><td><code>let b = a;</code> moves, <code>a</code> unusable</td><td><code>auto b = a;</code> deep-copies</td></tr>
  <tr><td>Transfer ownership</td><td>the default for non-<code>Copy</code> types</td><td><code>auto b = std::move(a);</code></td></tr>
  <tr><td>Rvalue reference</td><td>(none — moving is implicit, no distinct reference kind)</td><td><code>T&amp;&amp;</code></td></tr>
  <tr><td>Move constructor</td><td>(none — the compiler moves fields for you)</td><td><code>T(T&amp;&amp; o) noexcept</code></td></tr>
  <tr><td>Cost of moving a <code>Vec&lt;T&gt;</code>/vector</td><td>O(1) — pointer/len/capacity copy</td><td>O(1) — steals the buffer pointer</td></tr>
</table>
<p><code>std::move</code> does not move anything by itself — it is just a cast to
<code>T&amp;&amp;</code>. It is a signal: "I am done with this value, feel free to
gut it." The compiler then selects the move constructor (or move assignment)
over the copy version. Unlike Rust, where the compiler statically forbids using
<code>a</code> again after <code>let b = a;</code>, C++ does not track "moved-from"
state at compile time — after a move the source is still a valid object, just in
an unspecified state, which is why we <code>clear()</code> it here to make "empty"
a guarantee callers can rely on.</p>
<p>Marking the move constructor <code>noexcept</code> matters: containers like
<code>std::vector</code> will only <em>move</em> your objects when they grow if
the move cannot throw — otherwise they fall back to copying to preserve their
strong exception guarantee. Rust sidesteps this question entirely: its moves are
infallible bitwise transfers of ownership with no user code running and nothing
that could throw, so there is no equivalent knob to turn. That <code>noexcept</code>
keyword is the difference between a cheap reallocation and an expensive one in C++.</p>`,
