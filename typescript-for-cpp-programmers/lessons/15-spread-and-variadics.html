<script>
const LESSON = {
  number: 15,
  title: "Spread & Rest",

  intro: `
<p>Think of every trick C++ needs for "a function taking any number of
arguments": parameter packs, recursive unpacking with a base-case overload,
C++17 fold expressions, <code>sizeof...</code>. TypeScript's answer is a rest
parameter: <code>function sum(...nums: number[])</code>. Inside the function,
<code>nums</code> is <em>just an array</em> — no recursion, no fold, no
<code>sizeof...(nums)</code> (that's <code>nums.length</code>), and you loop
or <code>reduce</code> over it like any other array. What
<code>std::initializer_list</code> does for callers, the plain array literal
already does here.</p>
<table>
  <tr><th>C++</th><th>TypeScript</th></tr>
  <tr><td><code>template &lt;typename... Ts&gt; int sum(Ts... ns)</code></td><td><code>function sum(...nums: number[])</code></td></tr>
  <tr><td><code>(ns + ... + 0)</code> fold expression</td><td><code>nums.reduce((t, n) =&gt; t + n, 0)</code></td></tr>
  <tr><td><code>sizeof...(ns)</code></td><td><code>nums.length</code></td></tr>
  <tr><td><code>out.insert(out.end(), b.begin(), b.end())</code></td><td><code>[...a, ...b]</code></td></tr>
  <tr><td>copy struct, then tweak fields</td><td><code>{ ...defaults, ...overrides }</code></td></tr>
  <tr><td><code>v.push_back(x)</code> (mutates)</td><td><code>[...v, x]</code> (fresh array, original untouched)</td></tr>
</table>
<p>The same <code>...</code> works in the other direction — <em>spread</em>.
Where merging two vectors takes the
<code>insert(out.end(), b.begin(), b.end())</code> incantation, TypeScript
writes <code>[...a, ...b]</code>. And for structs, the C++ pattern "copy the
object, then overwrite a couple of fields" becomes a single expression:
<code>{ ...defaults, ...overrides }</code> — later spreads win, so the
overrides shadow the defaults. Both forms build a <em>new</em> array or
object, which makes them the standard tool for non-mutating updates.</p>`,

  cpp: `#include <vector>

// Variadic template: a parameter pack + C++17 fold expression
// (pre-17: recursion with a base-case overload).
template <typename... Ts>
int sum(Ts... nums) {
    return (nums + ... + 0);
}

std::vector<int> merge(const std::vector<int>& a,
                       const std::vector<int>& b) {
    std::vector<int> out = a;                     // copy
    out.insert(out.end(), b.begin(), b.end());    // splice
    return out;
}

struct Settings { int width; int height; bool dark; };

Settings with_overrides(Settings defaults, bool dark) {
    Settings s = defaults;   // copy the whole struct...
    s.dark = dark;           // ...then patch fields one by one
    return s;
}`,

  task: `
<p>Rewrite it with <code>...</code> in both directions:</p>
<ol>
  <li><code>sum(...nums: number[]): number</code> — a rest parameter instead
      of a parameter pack. Add the numbers with
      <code>nums.reduce((total, n) =&gt; total + n, 0)</code>; calling
      <code>sum()</code> with no arguments must return <code>0</code>.</li>
  <li><code>mergeSettings(defaults: Settings, overrides: { width?: number; height?: number; dark?: boolean }): Settings</code>
      — return <code>{ ...defaults, ...overrides }</code>. Later spreads win,
      and <code>defaults</code> must not be modified. (The
      <code>Settings</code> type is provided in the starter.)</li>
  <li><code>appendItem(list: number[], item: number): number[]</code> — return
      a <em>new</em> array <code>[...list, item]</code>. Unlike
      <code>push_back</code>, the original array stays untouched.</li>
</ol>`,

  starter: `type Settings = { width: number; height: number; dark: boolean };

// 1. sum: the entire variadic-template machine becomes ...nums,
//    and nums is just a number[] — reduce over it.
function sum(...nums: number[]): number {
  // TODO
  return -1;
}

// 2. mergeSettings: copy-the-struct-then-patch-fields in one
//    expression. Later spreads overwrite earlier ones.
function mergeSettings(
  defaults: Settings,
  overrides: { width?: number; height?: number; dark?: boolean }
): Settings {
  // TODO
  return defaults;
}

// 3. appendItem: push_back mutates; spread builds a new array.
function appendItem(list: number[], item: number): number[] {
  // TODO
  return [];
}
`,

  exportNames: ["sum", "mergeSettings", "appendItem"],

  requirements: [
    { pattern: /\(\s*\.\.\./, message: "Declare sum with a rest parameter: sum(...nums: number[])" },
    { pattern: /\{\s*\.\.\./, message: "Use object spread ({ ...defaults, ...overrides }) in mergeSettings" },
    { pattern: /\[\s*\.\.\./, message: "Use array spread ([...list, item]) in appendItem" },
  ],

  tests: [
    { name: "sum() is 0 and sum(4) is 4", run: (x) => { expectEqual(x.sum(), 0); expectEqual(x.sum(4), 4); } },
    { name: "sum(1, 2, 3, 4) is 10 — no recursion required", run: (x) => expectEqual(x.sum(1, 2, 3, 4), 10) },
    { name: "mergeSettings applies overrides on top of defaults", run: (x) => expectDeepEqual(x.mergeSettings({ width: 800, height: 600, dark: false }, { dark: true }), { width: 800, height: 600, dark: true }) },
    { name: "mergeSettings does not mutate the defaults object", run: (x) => { const defaults = { width: 800, height: 600, dark: false }; x.mergeSettings(defaults, { width: 1024, dark: true }); expectDeepEqual(defaults, { width: 800, height: 600, dark: false }); } },
    { name: "appendItem returns [1, 2, 3] for ([1, 2], 3)", run: (x) => expectDeepEqual(x.appendItem([1, 2], 3), [1, 2, 3]) },
    { name: "appendItem leaves the original array untouched", run: (x) => { const orig = [1, 2]; const grown = x.appendItem(orig, 3); expectDeepEqual(orig, [1, 2]); expectTruthy(grown !== orig); } },
  ],

  solution: `type Settings = { width: number; height: number; dark: boolean };

function sum(...nums: number[]): number {
  return nums.reduce((total, n) => total + n, 0);
}

function mergeSettings(
  defaults: Settings,
  overrides: { width?: number; height?: number; dark?: boolean }
): Settings {
  return { ...defaults, ...overrides };
}

function appendItem(list: number[], item: number): number[] {
  return [...list, item];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>TypeScript</th></tr>
  <tr><td>Variadic function</td><td><code>template &lt;typename... Ts&gt; f(Ts... xs)</code></td><td><code>f(...xs: number[])</code></td></tr>
  <tr><td>Consume the pack</td><td>recursion or fold expression</td><td><code>xs</code> is an array — loop/<code>reduce</code></td></tr>
  <tr><td>Pack size</td><td><code>sizeof...(xs)</code></td><td><code>xs.length</code></td></tr>
  <tr><td>Forward a pack</td><td><code>f(std::forward&lt;Ts&gt;(xs)...)</code></td><td><code>f(...xs)</code></td></tr>
  <tr><td>Brace-init a container</td><td><code>std::initializer_list</code></td><td>array literal <code>[1, 2, 3]</code></td></tr>
  <tr><td>Concatenate containers</td><td><code>insert(end, begin, end)</code></td><td><code>[...a, ...b]</code></td></tr>
  <tr><td>Copy-with-changes</td><td>copy struct, assign fields</td><td><code>{ ...obj, field: newValue }</code></td></tr>
  <tr><td>Conflicting keys</td><td>n/a</td><td>later spread wins</td></tr>
</table>
<p>One systems-programmer caveat: spread performs a <em>shallow</em> copy,
closer to a memberwise copy of pointers than to a deep clone. Top-level fields
are fresh, but nested objects are shared between the copy and the original —
mutate <code>merged.nested.x</code> and both see it. For flat config objects
like <code>Settings</code> that's exactly right and essentially free; for deep
structures, spread each level you intend to change.</p>`,
};
