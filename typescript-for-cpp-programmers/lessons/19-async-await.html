  number: 19,
  title: "Async & Promises",

  intro: `
<p>Concurrency is where TypeScript diverges hardest from C++. Forget
<code>std::thread</code>, mutexes, and data races: your code runs on
<strong>one thread</strong>, driven by an event loop. A
<code>Promise&lt;T&gt;</code> is a <code>std::future&lt;T&gt;</code> that you
can never block on — there is no <code>.get()</code> that parks the thread.
Instead, <code>await</code> <em>yields</em>: it suspends the current
<code>async function</code>, lets the event loop run other work, and resumes
when the promise settles. Same shape as a coroutine's
<code>co_await</code>, but it's the only model, not an opt-in.</p>
<table>
  <tr><th>C++</th><th>TypeScript</th></tr>
  <tr><td><code>std::future&lt;T&gt;</code></td><td><code>Promise&lt;T&gt;</code></td></tr>
  <tr><td><code>std::async(std::launch::async, f)</code></td><td>call an <code>async function</code> (no new thread)</td></tr>
  <tr><td><code>fut.get()</code> — blocks the thread</td><td><code>await fut</code> — suspends, never blocks</td></tr>
  <tr><td>loop over N futures calling <code>.get()</code></td><td><code>await Promise.all([...])</code></td></tr>
  <tr><td><code>std::mutex</code> + <code>lock_guard</code></td><td>not needed — no shared-memory parallelism</td></tr>
  <tr><td><code>try { fut.get(); } catch</code></td><td><code>try { await fut; } catch</code></td></tr>
</table>
<p>The payoff of single-threading: between two <code>await</code>s, nothing
else can touch your data. No locks, no <code>std::atomic</code>, no
happens-before reasoning — a rejected promise is just an exception that
<code>await</code> rethrows, so error handling is a plain
<code>try/catch</code>. And where C++ waits on N futures with a loop of
blocking <code>.get()</code> calls, <code>Promise.all</code> takes an array of
promises and gives you one promise of the array of results (rejecting fast if
any input rejects).</p>`,

  cpp: `#include <future>
#include <string>
#include <vector>

std::string fetch_user(int id);   // slow: hits the network

std::vector<std::string> fetch_all(const std::vector<int>& ids) {
    std::vector<std::future<std::string>> futures;
    for (int id : ids)
        futures.push_back(
            std::async(std::launch::async, fetch_user, id));

    std::vector<std::string> names;
    for (auto& f : futures)
        names.push_back(f.get());   // blocks this thread; throws
    return names;                   // if fetch_user threw
}

std::string fetch_or_guest(int id) {
    try { return fetch_user(id); }
    catch (...) { return "guest"; }
}`,

  task: `
<p>The starter provides <code>fetchUser(id)</code> — a deterministic fake
async API built on <code>Promise.resolve().then(...)</code> (no timers, no
network). It resolves with a name for ids 1–3 and <em>rejects</em> for unknown
ids. Leave it as is and implement:</p>
<ol>
  <li><code>fetchUserNames(ids: number[]): Promise&lt;string[]&gt;</code> — an
      <code>async function</code> that fires off <em>all</em> the lookups at
      once with <code>ids.map(fetchUser)</code> (the launch loop pushing
      futures), then <code>await Promise.all(...)</code> — waiting on N
      futures in one line — and returns the names.</li>
  <li><code>fetchUserOrGuest(id: number): Promise&lt;string&gt;</code> — an
      <code>async function</code> that <code>await</code>s
      <code>fetchUser(id)</code> inside <code>try { ... } catch { ... }</code>
      and returns <code>"guest"</code> if the lookup rejected — the exact
      shape of the C++ <code>try { fut.get(); } catch</code> pattern.</li>
</ol>`,

  starter: `// Provided: a fake async API. Deterministic — it settles on the
// microtask queue via Promise.resolve().then, no timers, no network.
const USERS: Record<number, string> = { 1: "Ada", 2: "Grace", 3: "Linus" };

function fetchUser(id: number): Promise<string> {
  return Promise.resolve().then(() => {
    const name = USERS[id];
    if (name === undefined) {
      throw new Error("no user " + id); // becomes a rejected Promise
    }
    return name;
  });
}

// 1. Launch all lookups, then await Promise.all — the non-blocking
//    version of the loop of futures + .get().
async function fetchUserNames(ids: number[]): Promise<string[]> {
  // TODO
  return [];
}

// 2. try { fut.get(); } catch (...) { return "guest"; }
//    → try { return await ...; } catch { return "guest"; }
async function fetchUserOrGuest(id: number): Promise<string> {
  // TODO
  return "";
}
`,

  exportNames: ["fetchUser", "fetchUserNames", "fetchUserOrGuest"],

  requirements: [
    { pattern: /async\s+function/, message: "Declare your functions with async function" },
    { pattern: /await/, message: "Use await — the non-blocking .get()" },
    { pattern: /Promise\.all\s*\(/, message: "Wait on all the lookups with Promise.all(...)" },
    { pattern: /try\s*\{/, message: "Handle the rejection in fetchUserOrGuest with try/catch" },
  ],

  tests: [
    { name: 'fetchUser(1) resolves to "Ada"', run: async (x) => expectEqual(await x.fetchUser(1), "Ada") },
    { name: "fetchUser(99) rejects (awaiting it throws)", run: async (x) => { let threw = false; try { await x.fetchUser(99); } catch (e) { threw = true; } expectTruthy(threw); } },
    { name: "fetchUserNames([1, 2, 3]) resolves to all three names in order", run: async (x) => expectDeepEqual(await x.fetchUserNames([1, 2, 3]), ["Ada", "Grace", "Linus"]) },
    { name: "fetchUserNames([]) resolves to []", run: async (x) => expectDeepEqual(await x.fetchUserNames([]), []) },
    { name: 'fetchUserOrGuest(2) resolves to "Grace"', run: async (x) => expectEqual(await x.fetchUserOrGuest(2), "Grace") },
    { name: 'fetchUserOrGuest(42) falls back to "guest" instead of rejecting', run: async (x) => expectEqual(await x.fetchUserOrGuest(42), "guest") },
  ],

  solution: `const USERS: Record<number, string> = { 1: "Ada", 2: "Grace", 3: "Linus" };

function fetchUser(id: number): Promise<string> {
  return Promise.resolve().then(() => {
    const name = USERS[id];
    if (name === undefined) {
      throw new Error("no user " + id);
    }
    return name;
  });
}

async function fetchUserNames(ids: number[]): Promise<string[]> {
  const lookups = ids.map(fetchUser); // all "in flight" at once
  return await Promise.all(lookups);  // one await for N futures
}

async function fetchUserOrGuest(id: number): Promise<string> {
  try {
    return await fetchUser(id);
  } catch (e) {
    return "guest";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>TypeScript</th></tr>
  <tr><td>Handle to a future value</td><td><code>std::future&lt;T&gt;</code></td><td><code>Promise&lt;T&gt;</code></td></tr>
  <tr><td>Start async work</td><td><code>std::async</code> / spawn a thread</td><td>call an <code>async function</code></td></tr>
  <tr><td>Get the result</td><td><code>fut.get()</code> — blocks</td><td><code>await p</code> — suspends the coroutine</td></tr>
  <tr><td>Wait for N results</td><td>loop of <code>.get()</code> calls</td><td><code>await Promise.all(promises)</code></td></tr>
  <tr><td>Error propagation</td><td>exception rethrown by <code>.get()</code></td><td>rejection rethrown by <code>await</code>; <code>try/catch</code></td></tr>
  <tr><td>Shared-state protection</td><td><code>std::mutex</code>, <code>std::atomic</code></td><td>unnecessary — one thread, no data races</td></tr>
  <tr><td>Return type marker</td><td><code>std::future&lt;T&gt;</code> from <code>std::async</code></td><td><code>async</code> ⇒ always returns <code>Promise&lt;T&gt;</code></td></tr>
</table>
<p>Keep the model straight and everything follows: concurrency without
parallelism. All your TypeScript runs on one thread; async work is
<em>interleaved</em> at <code>await</code> points, never simultaneous. That is
why there are no mutexes to forget and no data races to debug — and also why
you must never busy-wait or block: a spin loop starves the entire event loop.
An <code>async function</code> always returns a <code>Promise</code>, so
callers <code>await</code> it in turn — async is contagious up the call
stack, by design.</p>`,
};
