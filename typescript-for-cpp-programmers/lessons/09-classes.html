<script>
const LESSON = {
  number: 9,
  title: "Classes",

  intro: `
<p>TypeScript classes will feel like C++ classes with most of the ceremony
deleted. There is no header/implementation split — one class, one place,
methods defined inline. Access control moves from <code>public:</code> /
<code>private:</code> <em>sections</em> to a modifier on each member. There
are no member initializer lists: either assign in the constructor body, or
use <em>parameter properties</em> — <code>constructor(private balance:
number)</code> declares the field, takes the parameter, and assigns it, all
in one token. And <code>readonly</code> is your <code>const</code> member: it
can be set in the constructor, then never again.</p>
<table>
  <tr><th>C++</th><th>TypeScript</th></tr>
  <tr><td><code>.h</code> declaration + <code>.cpp</code> definition</td><td>One class body, methods inline</td></tr>
  <tr><td><code>private:</code> section</td><td><code>private balance: number;</code> per member</td></tr>
  <tr><td><code>: owner_(std::move(owner)), balance_(0)</code></td><td><code>constructor(readonly owner: string, private balance = 0) {}</code></td></tr>
  <tr><td><code>const std::string owner_;</code></td><td><code>readonly owner: string;</code></td></tr>
  <tr><td><code>~BankAccount()</code>, RAII, <code>delete</code></td><td>Nothing — the garbage collector owns cleanup</td></tr>
  <tr><td>Value vs pointer vs reference semantics</td><td>Objects are <em>always</em> heap references</td></tr>
</table>
<p>The deeper changes are about object lifetime. There are no destructors and
no <code>delete</code>: memory is garbage-collected, so RAII does not exist
(for non-memory resources you call a close method explicitly). And every
object lives on the heap and is handled by reference — <code>const b =
a</code> copies a reference, never the object. That means no copy
constructors, no assignment operators, no move semantics, and no slicing:
assigning a derived object to a base-typed variable keeps the whole object,
always. The rule of five becomes the rule of zero, permanently.</p>`,

  cpp: `// bank_account.h
class BankAccount {
public:
    BankAccount(std::string owner, int id)
        : owner_(std::move(owner)), id_(id), balance_(0) {}
    void   deposit(double amount);
    void   withdraw(double amount);          // throws on overdraft
    double get_balance() const { return balance_; }
private:
    const std::string owner_;   // set once, in the init list
    const int id_;
    double balance_;
};

// bank_account.cpp
void BankAccount::deposit(double amount) { balance_ += amount; }
void BankAccount::withdraw(double amount) {
    if (amount > balance_) throw std::runtime_error("overdraft");
    balance_ -= amount;
}`,

  task: `
<p>Port <code>BankAccount</code> — header, cpp file, and initializer list all
collapse into one class:</p>
<ol>
  <li>Write <code>class BankAccount</code> whose constructor takes the owner
      and id using parameter properties:
      <code>public readonly owner: string</code>,
      <code>public readonly id: number</code>, and
      <code>private balance: number = 0</code>. That one signature replaces
      the entire member list <em>and</em> the initializer list.</li>
  <li>Add <code>deposit(amount: number): void</code> — adds to the
      balance.</li>
  <li>Add <code>withdraw(amount: number): void</code> — subtracts from the
      balance, but <code>throw new Error("overdraft")</code> if
      <code>amount</code> exceeds the balance.</li>
  <li>Add <code>getBalance(): number</code> — returns the balance. (No
      <code>const</code> qualifier to write: methods cannot promise
      const-ness in TypeScript.)</li>
</ol>
<p>No destructor, and note that <code>new BankAccount(...)</code> is how every
object is made — but unlike C++'s <code>new</code>, nobody ever writes the
matching <code>delete</code>.</p>`,

  starter: `// One file, one class body. No .h/.cpp split, no initializer list.
class BankAccount {
  // TODO: replace this constructor with parameter properties:
  //   constructor(public readonly owner: string,
  //               public readonly id: number,
  //               private balance: number = 0) {}
  constructor(owner: string, id: number) {
  }

  // TODO: deposit(amount: number): void

  // TODO: withdraw(amount: number): void  — throw new Error("overdraft")
  //       when amount > balance

  // TODO: getBalance(): number
}
`,

  exportNames: ["BankAccount"],

  requirements: [
    { pattern: /private\s+balance/, message: "Make balance private (a per-member modifier, not a private: section)" },
    { pattern: /readonly\s+owner/, message: "Make owner readonly — the const member" },
    { pattern: /readonly\s+id/, message: "Make id readonly too" },
  ],

  tests: [
    { name: "a new account starts with balance 0", run: (x) => expectEqual(new x.BankAccount("Ada", 1).getBalance(), 0) },
    { name: "deposit(100) brings the balance to 100", run: (x) => { const a = new x.BankAccount("Ada", 1); a.deposit(100); expectEqual(a.getBalance(), 100); } },
    { name: "withdraw(40) after deposit(100) leaves 60", run: (x) => { const a = new x.BankAccount("Ada", 1); a.deposit(100); a.withdraw(40); expectEqual(a.getBalance(), 60); } },
    { name: "withdrawing more than the balance throws", run: (x) => { const a = new x.BankAccount("Ada", 1); a.deposit(50); expectThrows(() => a.withdraw(51)); } },
    { name: "owner and id are readable public members", run: (x) => { const a = new x.BankAccount("Grace", 7); expectEqual(a.owner, "Grace"); expectEqual(a.id, 7); } },
  ],

  solution: `class BankAccount {
  // Parameter properties: declares, receives, and assigns
  // owner, id, and balance — the initializer list in one line.
  constructor(
    public readonly owner: string,
    public readonly id: number,
    private balance: number = 0
  ) {}

  deposit(amount: number): void {
    this.balance += amount;
  }

  withdraw(amount: number): void {
    if (amount > this.balance) {
      throw new Error("overdraft");
    }
    this.balance -= amount;
  }

  getBalance(): number {
    return this.balance;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>TypeScript</th></tr>
  <tr><td>Where code lives</td><td><code>.h</code> + <code>.cpp</code></td><td>One class body</td></tr>
  <tr><td>Access control</td><td><code>public:</code>/<code>private:</code> sections</td><td><code>public</code>/<code>private</code>/<code>protected</code> per member (default public)</td></tr>
  <tr><td>Member init</td><td>Initializer list <code>: x_(x)</code></td><td>Ctor-body assignment or <code>constructor(private x: number)</code></td></tr>
  <tr><td>const member</td><td><code>const int id_;</code></td><td><code>readonly id: number;</code></td></tr>
  <tr><td>Destruction</td><td><code>~T()</code>, RAII, <code>delete</code></td><td>Garbage collector; no destructors</td></tr>
  <tr><td>Copy/move</td><td>Rule of five</td><td>None — objects are always shared references</td></tr>
  <tr><td>this-&gt;</td><td>Optional</td><td><code>this.</code> is <em>mandatory</em> for members</td></tr>
</table>
<p>Two habits to unlearn, one to keep. Unlearn lifetime management: there is
no owner, no <code>unique_ptr</code>/<code>shared_ptr</code> distinction —
every object is effectively a <code>shared_ptr</code> the runtime collects
when unreachable. Unlearn value semantics: passing an object never copies it,
so mutation is visible to every holder of the reference. Keep encapsulation:
<code>private</code> and <code>readonly</code> are compile-time walls (like
<code>const</code>, they vanish from the emitted JavaScript), so the compiler
— not the linker or a segfault — is what stops
<code>account.balance = 1e9</code>.</p>`,
};
