<div id="app"></div>
<script>
const LESSON = {
  number: 7,
  title: "Union Types",

  intro: `
<p>When a C++ value can be one of several types, you reach for
<code>std::variant&lt;int, std::string&gt;</code> — and then pay the toll:
<code>std::holds_alternative&lt;int&gt;(v)</code> to ask which one it is,
<code>std::get&lt;int&gt;(v)</code> to extract it, and a
<code>std::bad_variant_access</code> exception if you guessed wrong. The
check and the access are two separate operations, and nothing forces them to
agree. TypeScript's union types fuse them: <code>number | string</code> is the
variant, and an ordinary <code>typeof id === "number"</code> check <em>is</em>
the <code>holds_alternative</code> — inside that branch the compiler
<em>narrows</em> the type to plain <code>number</code>, so you use the value
directly. No <code>std::get</code>, no extraction step, no exception to
throw.</p>
<table>
  <tr><th>C++</th><th>TypeScript</th></tr>
  <tr><td><code>std::variant&lt;int, std::string&gt; id;</code></td><td><code>let id: number | string;</code></td></tr>
  <tr><td><code>std::holds_alternative&lt;int&gt;(id)</code></td><td><code>typeof id === "number"</code></td></tr>
  <tr><td><code>std::get&lt;int&gt;(id)</code> (throws if wrong)</td><td>Just use <code>id</code> — it is already narrowed</td></tr>
  <tr><td><code>std::visit(overloaded{...}, id)</code></td><td>An <code>if</code>/<code>else</code> on <code>typeof</code></td></tr>
  <tr><td>Wrong-alternative access</td><td>Does not compile</td></tr>
</table>
<p>The static guarantee runs both directions. Before any check, calling
<code>id.toUpperCase()</code> is a compile error because <code>id</code> might
be a number; after <code>if (typeof id === "number")</code>, string methods
are compile errors inside the branch and — since the compiler knows what is
left over — <code>id</code> is plain <code>string</code> in the
<code>else</code>. The runtime <code>bad_variant_access</code> failure mode
simply has no equivalent: every access the compiler accepts is an access that
cannot be to the wrong alternative.</p>`,

  cpp: `#include <variant>
#include <string>
#include <cstdio>
#include <cctype>

using Id = std::variant<int, std::string>;

std::string format_id(const Id& id) {
    if (std::holds_alternative<int>(id)) {
        int n = std::get<int>(id);   // guess wrong -> bad_variant_access
        char buf[16];
        std::snprintf(buf, sizeof buf, "ID-%06d", n);
        return buf;
    }
    std::string s = std::get<std::string>(id);
    for (auto& c : s) c = std::toupper(static_cast<unsigned char>(c));
    return "ID-" + s;
}`,

  task: `
<p>Port <code>format_id</code> to TypeScript:</p>
<ol>
  <li>Write <code>formatId(id: number | string): string</code> — the union
      annotation replaces the whole <code>using Id = std::variant&lt;...&gt;</code>
      declaration.</li>
  <li>If <code>id</code> is a number (<code>typeof id === "number"</code>),
      return <code>"ID-"</code> plus the number zero-padded to 6 digits:
      <code>formatId(42)</code> is <code>"ID-000042"</code>. The
      <code>%06d</code> equivalent is
      <code>String(id).padStart(6, "0")</code>.</li>
  <li>Otherwise <code>id</code> is a string — return <code>"ID-"</code> plus
      the string uppercased: <code>formatId("x9k")</code> is
      <code>"ID-X9K"</code>. Note you call <code>id.toUpperCase()</code>
      directly: no <code>std::get</code>, because in the else-branch the
      compiler already knows <code>id</code> is a <code>string</code>.</li>
</ol>`,

  starter: `// using Id = std::variant<int, std::string>;
// -> just write the union inline in the signature.

// TODO: annotate id as number | string, then narrow with typeof.
function formatId(id: any): string {
  // TODO: number  -> "ID-" + zero-padded to 6 digits (padStart)
  // TODO: string  -> "ID-" + uppercased
  return "";
}
`,

  exportNames: ["formatId"],

  requirements: [
    { pattern: /\(\s*id\s*:\s*number\s*\|\s*string\s*\)/, message: "Declare the parameter as the union number | string (the std::variant)" },
    { pattern: /typeof\s+id/, message: "Narrow with typeof id — the holds_alternative check" },
  ],

  tests: [
    { name: 'formatId(42) returns "ID-000042"', run: (x) => expectEqual(x.formatId(42), "ID-000042") },
    { name: 'formatId(123456) returns "ID-123456"', run: (x) => expectEqual(x.formatId(123456), "ID-123456") },
    { name: 'formatId("abc") returns "ID-ABC"', run: (x) => expectEqual(x.formatId("abc"), "ID-ABC") },
    { name: 'formatId("x9k7") returns "ID-X9K7"', run: (x) => expectEqual(x.formatId("x9k7"), "ID-X9K7") },
  ],

  solution: `function formatId(id: number | string): string {
  if (typeof id === "number") {
    // Narrowed: id is plain number here — no std::get<int> needed.
    return "ID-" + String(id).padStart(6, "0");
  }
  // And here the compiler knows id is a string.
  return "ID-" + id.toUpperCase();
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>TypeScript</th></tr>
  <tr><td>Declare the alternatives</td><td><code>std::variant&lt;int, std::string&gt;</code></td><td><code>number | string</code></td></tr>
  <tr><td>Which one is it?</td><td><code>std::holds_alternative&lt;int&gt;(v)</code></td><td><code>typeof v === "number"</code></td></tr>
  <tr><td>Extract the value</td><td><code>std::get&lt;int&gt;(v)</code></td><td>Nothing — the check already narrowed it</td></tr>
  <tr><td>Wrong access</td><td><code>std::bad_variant_access</code> at runtime</td><td>Compile error</td></tr>
  <tr><td>Exhaustive handling</td><td><code>std::visit</code> + overload set</td><td><code>if</code>/<code>else</code> chain (compiler tracks what remains)</td></tr>
  <tr><td>Name an alias</td><td><code>using Id = std::variant&lt;...&gt;;</code></td><td><code>type Id = number | string;</code></td></tr>
</table>
<p>The key mental shift: in C++ the variant's runtime tag and your check of it
are only connected by discipline — <code>std::get</code> re-asks the question
and throws if the answer changed or you were wrong. In TypeScript the check
and the access are connected by <em>control flow analysis</em>: the compiler
proves, per branch, which alternative you hold, and only compiles accesses
consistent with that proof. It is <code>std::visit</code>'s exhaustiveness
with <code>if</code>-statement ergonomics. Later lessons extend the same idea
to object unions via discriminant fields — tagged unions where the compiler
manages the tag.</p>`,
};
