const LESSON = {
  number: 10,
  title: "Inheritance & Abstract Classes",

  intro: `
<p>JavaScript and Java share the same object model: a class <code>extends</code> a
base, calls <code>super</code>, and overrides methods. The differences are in
the ceremony. Java has a real <code>abstract</code> keyword for classes and
methods, a <code>@Override</code> annotation the compiler actually enforces, and
a <code>final</code> keyword that blocks further subclassing or reassignment.
JavaScript has none of these — "abstract" classes are just a convention
(throw in the base constructor or method), and there is no compiler to catch
a mistyped override; a subtype relationship exists only if you wrote
<code>extends</code>, but nothing stops you from shadowing a method with the
wrong signature.</p>
<table>
  <tr><th>JavaScript</th><th>Java</th></tr>
  <tr><td><code>class Dog extends Animal</code></td><td><code>class Dog extends Animal</code></td></tr>
  <tr><td><code>super(name)</code></td><td><code>super(name);</code></td></tr>
  <tr><td><code>super.speak()</code></td><td><code>super.speak();</code></td></tr>
  <tr><td>throw in constructor / method (convention only)</td><td><code>abstract class</code> / <code>abstract T m();</code></td></tr>
  <tr><td><code>x instanceof Dog</code></td><td><code>x instanceof Dog</code></td></tr>
</table>
<p>Two things trip up newcomers. First, JavaScript has no <code>@Override</code>
equivalent — if a subclass method's name doesn't quite match the one it's
meant to replace, JavaScript just adds a new method silently, while Java's
compiler errors immediately. Second, Java's <code>final</code> does double duty:
on a field or local it means "assign once" (JavaScript has no direct
equivalent for object fields, though <code>const</code> is close for
variables), and on a class or method it forbids subclassing or overriding,
something JavaScript cannot express at all.</p>`,

  javascript: `class Employee {
  constructor(name) { this.name = name; }
  basePay() { throw new Error("not implemented"); }
  totalPay() { return this.basePay(); }
  describe() { return \`\${this.name}: \${this.totalPay()}\`; }
}

class Manager extends Employee {
  constructor(name, bonus) { super(name); this.bonus = bonus; }
  basePay() { return 8000; }
  totalPay() { return super.totalPay() + this.bonus; }
}`,

  task: `
<p>Build a small employee hierarchy that exercises every inheritance feature.</p>
<ol>
  <li>An <code>abstract class Employee</code> with a <code>final</code> field
      <code>name</code>, a constructor that sets it, an
      <code>abstract double basePay()</code>, a concrete
      <code>double totalPay()</code> that returns <code>basePay()</code>, and a
      <code>String describe()</code> returning <code>name + ": " + totalPay()</code>
      (e.g. <code>"Ada: 5000.0"</code>).</li>
  <li>A <code>Developer extends Employee</code> whose constructor calls
      <code>super(name)</code> and whose <code>basePay()</code> (marked
      <code>@Override</code>) returns <code>5000</code>.</li>
  <li>A <code>Manager extends Employee</code> with an extra <code>double bonus</code>.
      Its <code>basePay()</code> returns <code>8000</code>, and its
      <code>totalPay()</code> returns <code>super.totalPay() + bonus</code>.</li>
  <li>A class <code>Payroll</code> with static <code>double totalPayroll(Employee[] emps)</code>
      (sum of every <code>totalPay()</code>) and
      <code>int countManagers(Employee[] emps)</code> using
      <code>instanceof</code>.</li>
</ol>`,

  starter: `abstract class Employee {

  protected Employee(String name) {
    this.name = name;

  double totalPay() {
    return 0; // TODO
  }

    return ""; // TODO
  }
}

class Developer extends Employee {

  }

  @Override

  }
}

class Manager extends Employee {
  private final double bonus;

  }

  @Override

  }

  @Override
  double totalPay() {
    return 0; // TODO: add bonus to super.totalPay()
  }
}

class Payroll {

    return 0; // TODO
  }

  static int countManagers(Employee[] emps) {
    return 0; // TODO: use instanceof
  }
}
`,

  requirements: [
    { pattern: /abstract\s+class\s+Employee/, message: "Make Employee an abstract class" },
    { pattern: /extends\s+Employee/, message: "Have Developer and Manager extend Employee" },
    { pattern: /instanceof/, message: "Use instanceof to count managers" },
  ],

  tests: [
    { name: "Developer.totalPay() is 5000.0", code: "      expect_eq(new Developer(\"Ada\").totalPay(), 5000.0);" },
    { name: "Manager.totalPay() adds bonus via super", code: "      expect_eq(new Manager(\"Rob\", 2000).totalPay(), 10000.0);" },
    { name: "describe() uses name and totalPay", code: "      expect_eq(new Manager(\"Rob\", 2000).describe(), \"Rob: 10000.0\");" },
    { name: "polymorphism: Employee ref calls override", code: "      Employee e = new Manager(\"Sue\", 500);\n      expect_eq(e.totalPay(), 8500.0);" },
    { name: "Payroll.totalPayroll sums the team", code: "      Employee[] team = { new Developer(\"A\"), new Manager(\"B\", 1000) };\n      expect_eq(Payroll.totalPayroll(team), 14000.0);" },
    { name: "Payroll.countManagers uses instanceof", code: "      Employee[] team = { new Developer(\"A\"), new Manager(\"B\", 1000), new Manager(\"C\", 0) };\n      expect_eq(Payroll.countManagers(team), 2);" },
    { name: "a Manager is an Employee", code: "      expect_true(new Manager(\"X\", 0) instanceof Employee);" },
  ],

  solution: `abstract class Employee {
  protected final String name;

  protected Employee(String name) {
    this.name = name;
  }

  abstract double basePay();

  double totalPay() {
    return basePay();
  }

  String describe() {
    return name + ": " + totalPay();
  }
}

class Developer extends Employee {
  Developer(String name) {
    super(name);
  }

  @Override
  double basePay() {
    return 5000;
  }
}

class Manager extends Employee {
  private final double bonus;

  Manager(String name, double bonus) {
    super(name);
    this.bonus = bonus;
  }

  @Override
  double basePay() {
    return 8000;
  }

  @Override
  double totalPay() {
    return super.totalPay() + bonus;
  }
}

class Payroll {
  static double totalPayroll(Employee[] emps) {
    double sum = 0;
    for (Employee e : emps) {
      sum += e.totalPay();
    }
    return sum;
  }

  static int countManagers(Employee[] emps) {
    int count = 0;
    for (Employee e : emps) {
      if (e instanceof Manager) {
        count++;
      }
    }
    return count;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Java</th></tr>
  <tr><td>Subclass</td><td><code>class B extends A</code></td><td><code>class B extends A</code></td></tr>
  <tr><td>Super constructor</td><td><code>super(x)</code></td><td><code>super(x);</code></td></tr>
  <tr><td>Super method</td><td><code>super.m()</code></td><td><code>super.m()</code></td></tr>
  <tr><td>Mark an override</td><td>(no syntax; not checked)</td><td><code>@Override</code> (compiler-checked)</td></tr>
  <tr><td>Abstract member</td><td>throw in base method (convention)</td><td><code>abstract T m();</code></td></tr>
  <tr><td>No subclassing</td><td>(none built in)</td><td><code>final class</code> / <code>final</code> method</td></tr>
  <tr><td>Runtime type check</td><td><code>x instanceof B</code></td><td><code>x instanceof B</code></td></tr>
</table>
<p>Polymorphism works exactly like JavaScript: an <code>Employee</code> reference
holding a <code>Manager</code> runs <code>Manager.totalPay()</code>. The big
wins over JavaScript are compiler-enforced overrides (<code>@Override</code>
catches typos in method names, something JavaScript would silently accept as
a brand-new method) and <code>final</code>, which lets you lock a class or
method against further extension — JavaScript has no way to prevent a class
from being subclassed or a method from being overridden. Note that a Java
class with even one <code>abstract</code> method must itself be
<code>abstract</code> and cannot be instantiated with <code>new</code>; in
JavaScript the closest you can get is throwing from the base constructor or
method and relying on discipline.</p>`,
};
