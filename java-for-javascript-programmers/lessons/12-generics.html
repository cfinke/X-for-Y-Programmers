const LESSON = {
  number: 12,
  title: "Generics",

  intro: `
<p>JavaScript doesn't have generics — every function and class already works
on any type, because nothing checks the type at all. <code>class Box {
constructor(value) { this.value = value; } }</code> happily holds a string
today and a number tomorrow, and <code>function identity(x) { return x; }</code>
just works on whatever you hand it. That flexibility is real, but "T must be
comparable" or "this Box holds a Dog, not a Cat" lives only in your head, or a
comment — never in anything the runtime checks.</p>
<table>
  <tr><th>JavaScript</th><th>Java</th></tr>
  <tr><td><code>class Box { ... }</code> — holds anything</td><td><code>class Box&lt;T&gt; { ... }</code></td></tr>
  <tr><td><code>function identity(x) { return x; }</code></td><td><code>&lt;T&gt; T identity(T x)</code></td></tr>
  <tr><td>no way to say "T must be comparable"</td><td><code>&lt;T extends Comparable&lt;T&gt;&gt;</code></td></tr>
  <tr><td><code>[1, 2, 3]</code> — mixed element types allowed</td><td><code>List&lt;Integer&gt;</code>, no primitives in generics</td></tr>
</table>
<p>Java generics take that same "one definition, any type" idea and make it
explicit and enforced: <code>class Box&lt;T&gt;</code> reads "a Box holding
some specific type T, decided when you create it," and the compiler holds you
to it from then on. Two things have no JavaScript equivalent to lean on.
First, a generic method puts its type parameter <em>before</em> the return
type — <code>static &lt;T&gt; T identity(T x)</code> — not after the name.
Second, Java generics are <em>invariant</em>: a <code>List&lt;Integer&gt;</code>
is <strong>not</strong> a <code>List&lt;Number&gt;</code>. To accept "a list of
some subtype of Number" you use a wildcard: <code>List&lt;? extends
Number&gt;</code>. And because of type erasure, generics only work over
reference types, so you write <code>Box&lt;Integer&gt;</code>, never
<code>Box&lt;int&gt;</code>.</p>`,

  javascript: `class Box {
  #value;
  constructor(value) { this.#value = value; }
  get() { return this.#value; }
}

function identity(x) { return x; }

function max(items, less) {
  let best = items[0];
  for (const x of items) if (less(best, x)) best = x;
  return best;
}

function sum(nums) {
  return nums.reduce((a, b) => a + b, 0);
}`,

  task: `
<p>Build a small generic toolkit. Write two top-level types:</p>
<ol>
  <li>A generic container <code>class Box&lt;T&gt;</code> with a constructor
      taking a <code>T</code>, a method <code>T get()</code>, and a method
      <code>void set(T value)</code>.</li>
  <li>A utility <code>class Generics</code> with three static methods:
    <ul>
      <li><code>&lt;T&gt; T identity(T x)</code> — returns its argument
          unchanged (note the <code>&lt;T&gt;</code> before the return type).</li>
      <li><code>&lt;T extends Comparable&lt;T&gt;&gt; T max(List&lt;T&gt; items)</code>
          — returns the largest element using <code>compareTo</code>.</li>
      <li><code>double sum(List&lt;? extends Number&gt; nums)</code> — adds the
          numbers, calling <code>doubleValue()</code> on each. The wildcard lets
          it accept a <code>List&lt;Integer&gt;</code> or a
          <code>List&lt;Double&gt;</code>.</li>
    </ul>
  </li>
</ol>`,

  starter: `class Box<T> {

}

  }

  static <T extends Comparable<T>> T max(List<T> items) {
    return null; // TODO: find the largest with compareTo
  }

`,

  requirements: [
    { pattern: /class\s+Box<T>/, message: "Declare a generic class Box<T>" },
    { pattern: /<T\s+extends\s+Comparable<T>>/, message: "Use a bounded type parameter <T extends Comparable<T>> on max" },
    { pattern: /List<\?\s+extends\s+Number>/, message: "Accept a List<? extends Number> wildcard in sum" },
  ],

  tests: [
    { name: "Box holds and returns a value", code: "      Box<String> b = new Box<>(\"hi\");\n      expect_eq(b.get(), \"hi\");" },
    { name: "Box.set replaces the value", code: "      Box<Integer> b = new Box<>(1);\n      b.set(42);\n      expect_eq(b.get(), 42);" },
    { name: "identity returns its argument", code: "      expect_eq(Generics.identity(\"abc\"), \"abc\");\n      expect_eq(Generics.identity(7), 7);" },
    { name: "max of integers", code: "      expect_eq(Generics.max(List.of(3, 9, 1, 7)), 9);" },
    { name: "max of strings (lexicographic)", code: "      expect_eq(Generics.max(List.of(\"apple\", \"pear\", \"fig\")), \"pear\");" },
    { name: "sum accepts List<Integer>", code: "      expect_eq(Generics.sum(List.of(1, 2, 3)), 6.0);" },
    { name: "sum accepts List<Double>", code: "      expect_eq(Generics.sum(List.of(1.5, 2.5)), 4.0);" },
  ],

  solution: `class Box<T> {
  private T value;

  Box(T value) {
    this.value = value;
  }

  T get() {
    return value;
  }

  void set(T value) {
    this.value = value;
  }
}

class Generics {
  static <T> T identity(T x) {
    return x;
  }

  static <T extends Comparable<T>> T max(List<T> items) {
    T best = items.get(0);
    for (T x : items) {
      if (x.compareTo(best) > 0) {
        best = x;
      }
    }
    return best;
  }

  static double sum(List<? extends Number> nums) {
    double total = 0;
    for (Number n : nums) {
      total += n.doubleValue();
    }
    return total;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Java</th></tr>
  <tr><td>A class that works on any type</td><td><code>class Box { ... }</code>, implicitly</td><td><code>class Box&lt;T&gt;</code>, explicitly</td></tr>
  <tr><td>A function that works on any type</td><td><code>function id(x) { return x; }</code></td><td><code>&lt;T&gt; T id(T x)</code> (param before return type)</td></tr>
  <tr><td>"T must be comparable"</td><td>a comment, or a crash</td><td><code>&lt;T extends Comparable&lt;T&gt;&gt;</code></td></tr>
  <tr><td>Accepting a "subtype of" a type</td><td>nothing to declare — anything goes</td><td><code>List&lt;? extends Number&gt;</code> (explicit wildcard)</td></tr>
  <tr><td>Element type</td><td>mixed freely, e.g. <code>[1, "two"]</code></td><td><code>List&lt;Integer&gt;</code> (no primitives, e.g. no <code>int</code>)</td></tr>
</table>
<p>The wildcard is the piece with no JavaScript equivalent, because JavaScript
never had to solve the problem it solves. Because Java lists are invariant, a
method that only <em>reads</em> Numbers should say <code>List&lt;? extends
Number&gt;</code> so callers can pass a <code>List&lt;Integer&gt;</code>. The
mirror image, <code>? super T</code>, is for lists you only <em>write</em> to
— the classic "producer extends, consumer super" rule. Also remember erasure:
at runtime a <code>Box&lt;String&gt;</code> and a <code>Box&lt;Integer&gt;</code>
are the same class, so you cannot write <code>new T()</code> or
<code>x instanceof Box&lt;String&gt;</code> — a reminder that, under the hood,
Java's generics are closer to JavaScript's "no type info at runtime" than you
might expect.</p>`,
};
