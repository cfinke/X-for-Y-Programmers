const LESSON = {
  number: 16,
  title: "Dataclasses",

  intro: `
<p>In Rust you reach for a <code>struct</code> when you just want to bundle a
few fields together — a plain data-holder with no complex behaviour. Python's
answer is the <code>@dataclass</code> decorator from the
<code>dataclasses</code> module. You declare the fields with class-level type
annotations, and the decorator writes the boilerplate for you: an
<code>__init__</code> that assigns every field, a readable <code>__repr__</code>,
and an <code>__eq__</code> that compares by <em>value</em> instead of identity —
much like <code>#[derive(Debug, Clone, PartialEq)]</code> writes similar
boilerplate for a Rust struct.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>struct Point { x: i32, y: i32 }</code></td><td><code>@dataclass</code> + <code>class Point:</code></td></tr>
  <tr><td><code>x: i32,</code></td><td><code>x: int</code></td></tr>
  <tr><td><code>Vec::new()</code> in a constructor (per-instance)</td><td><code>tags: list = field(default_factory=list)</code></td></tr>
  <tr><td>no <code>mut</code> on the binding</td><td><code>@dataclass(frozen=True)</code></td></tr>
  <tr><td><code>#[derive(PartialEq)]</code></td><td>value <code>==</code> for free</td></tr>
</table>
<p>Rust has no inline default-field syntax at all — <code>z: i32 = 0</code>
isn't valid inside a <code>struct</code> definition; you'd need a
<code>new()</code> constructor or <code>#[derive(Default)]</code>. But because
Rust structs are always built explicitly, there's no equivalent to Python's
shared-mutable-default trap: a <em>mutable</em> default in Python — a list or
dict — cannot be written inline, because one shared object would leak across
every instance. Use <code>field(default_factory=list)</code>: the factory is
called fresh for each new instance. Pass <code>frozen=True</code> to make
instances immutable (assigning a field raises), and <code>order=True</code>
to also generate <code>&lt;</code>, <code>&lt;=</code>, <code>&gt;</code>,
<code>&gt;=</code> that compare fields tuple-wise, top to bottom — similar to
what <code>#[derive(PartialOrd, Ord)]</code> gives a Rust struct.</p>`,

  rust: `#[derive(Debug, Clone, PartialEq)]
struct Point {
    x: i32,
    y: i32,
    label: Option<String>,
}

let a = Point { x: 1, y: 2, label: None };
let b = Point { x: 1, y: 2, label: None };
// #[derive(PartialEq)] gives structural equality:
a == b; // true

// Immutable "value object" (no \`mut\` binding):
let origin = Point { x: 0, y: 0, label: None };`,

  task: `
<p>Import from <code>dataclasses</code> and build two dataclasses:</p>
<ol>
  <li><code>Point</code> with fields <code>x: int</code> and <code>y: int</code>,
      plus a <code>label: str = ""</code> that defaults to the empty string.
      Decorate it with <code>@dataclass</code>. Also add
      <code>order=True</code> so points can be sorted, and give it a method
      <code>translate(self, dx, dy)</code> that returns a <em>new</em>
      <code>Point</code> shifted by <code>dx</code>/<code>dy</code> (same
      label).</li>
  <li><code>Polygon</code> with a field <code>points</code> that defaults to an
      empty list via <code>field(default_factory=list)</code>, and a method
      <code>add(self, point)</code> that appends a point to that list.</li>
  <li><code>Color</code>, a <strong>frozen</strong> dataclass
      (<code>@dataclass(frozen=True)</code>) with fields <code>r: int</code>,
      <code>g: int</code>, <code>b: int</code> — an immutable value object.</li>
</ol>`,

  starter: `from dataclasses import dataclass, field


# 1. Point: x, y, label="" ; order=True ; translate(dx, dy) -> new Point
class Point:
    pass  # TODO


# 2. Polygon: points defaults to [] via default_factory ; add(point)
class Polygon:
    pass  # TODO


# 3. Color: frozen dataclass with r, g, b
class Color:
    pass  # TODO
`,

  requirements: [
    { pattern: /@dataclass/, message: "Use the @dataclass decorator" },
    { pattern: /default_factory\s*=\s*list/, message: "Give Polygon.points a default_factory=list" },
    { pattern: /frozen\s*=\s*True/, message: "Make Color a frozen dataclass (frozen=True)" },
  ],

  tests: [
    { name: "Point auto __init__ sets fields and default label", code: "    p = Point(1, 2)\n    expect_eq(p.x, 1)\n    expect_eq(p.y, 2)\n    expect_eq(p.label, \"\")" },
    { name: "Points compare by value, not identity", code: "    expect_eq(Point(1, 2), Point(1, 2))\n    expect_true(Point(1, 2) != Point(1, 3))" },
    { name: "translate returns a new shifted Point", code: "    p = Point(1, 2, \"a\")\n    q = p.translate(10, 20)\n    expect_eq(q, Point(11, 22, \"a\"))\n    expect_eq(p, Point(1, 2, \"a\"))" },
    { name: "order=True enables sorting", code: "    pts = sorted([Point(2, 1), Point(1, 9), Point(1, 3)])\n    expect_eq(pts, [Point(1, 3), Point(1, 9), Point(2, 1)])\n    expect_true(Point(1, 3) < Point(2, 0))" },
    { name: "Polygon default_factory gives independent lists", code: "    a = Polygon()\n    b = Polygon()\n    a.add(Point(0, 0))\n    expect_eq(a.points, [Point(0, 0)])\n    expect_eq(b.points, [])" },
    { name: "Color is frozen and immutable", code: "    c = Color(255, 0, 0)\n    expect_eq(c, Color(255, 0, 0))\n    raised = False\n    try:\n        c.r = 0\n    except Exception:\n        raised = True\n    expect_true(raised)" },
  ],

  solution: `from dataclasses import dataclass, field


@dataclass(order=True)
class Point:
    x: int
    y: int
    label: str = ""

    def translate(self, dx, dy):
        return Point(self.x + dx, self.y + dy, self.label)


@dataclass
class Polygon:
    points: list = field(default_factory=list)

    def add(self, point):
        self.points.append(point)


@dataclass(frozen=True)
class Color:
    r: int
    g: int
    b: int
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Data holder</td><td><code>struct</code></td><td><code>@dataclass</code></td></tr>
  <tr><td>Field</td><td><code>x: i32</code></td><td><code>x: int</code></td></tr>
  <tr><td>Default</td><td><code>new()</code> constructor / <code>#[derive(Default)]</code></td><td><code>label: str = ""</code></td></tr>
  <tr><td>Mutable default</td><td><code>Vec::new()</code> in a constructor</td><td><code>field(default_factory=list)</code></td></tr>
  <tr><td>Immutable</td><td>no <code>mut</code> on the binding</td><td><code>frozen=True</code></td></tr>
  <tr><td>Value equality</td><td><code>#[derive(PartialEq)]</code></td><td><code>__eq__</code> for free</td></tr>
  <tr><td>Ordering</td><td><code>#[derive(PartialOrd, Ord)]</code></td><td><code>order=True</code></td></tr>
</table>
<p>Python's type annotations are what the decorator reads to find your
fields, but — unlike Rust's struct field types — they are never checked at
runtime; nothing stops you from stuffing a string into a field annotated
<code>int</code>. A field with a default must come after all fields without
one (same rule as default function parameters), which is why
<code>label</code> sits last on <code>Point</code>. Rust has no shorthand for
this at all: every struct field must be supplied at construction, or you
write a <code>new()</code> function (or derive <code>Default</code>) that
fills in the gaps for you.</p>
<p><code>order=True</code> generates the comparison operators by treating each
instance as a tuple of its fields in declaration order, so <code>Point(1, 3) &lt;
Point(1, 9)</code> falls through to the second field — exactly what
<code>#[derive(PartialOrd, Ord)]</code> does for a Rust struct. A
<code>frozen=True</code> dataclass also becomes hashable, so its instances can
be dict keys or set members — handy for value objects like <code>Color</code>,
much like deriving <code>Hash</code> on a Rust struct. If you need a modified
copy of a frozen instance, reach for <code>dataclasses.replace(c, r=0)</code>
rather than mutating in place; Rust's analogous idiom is struct update syntax,
<code>Color { r: 0, ..c }</code>, which also produces a new value without
touching the original.</p>`,
};
