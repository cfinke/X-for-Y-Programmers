  intro: `
<p>Rust already has real tuples as a built-in, immutable-by-default type &mdash;
<code>(3, 4)</code> is a fixed-size sequence with no dynamic array backing it, much
like Python's own tuple. Sets, though, live in
<code>std::collections::HashSet</code>, a generic collection you construct and
mutate with methods, and its elements must implement <code>Eq</code> and
<code>Hash</code> &mdash; the same restriction Python expresses by requiring set
elements to be <em>hashable</em>. Python bakes both into the language as
first-class types with their own literal syntax. A <em>set</em> is
an unordered collection of unique, hashable values written with braces. A
<em>tuple</em> is an immutable, ordered sequence written with commas (usually
wrapped in parentheses).</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>HashSet::from([1, 2, 2])</code></td><td><code>{1, 2, 2}</code> &rarr; <code>{1, 2}</code></td></tr>
  <tr><td><code>s.insert(3)</code></td><td><code>s.add(3)</code></td></tr>
  <tr><td><code>a.intersection(&amp;b)</code></td><td><code>a &amp; b</code></td></tr>
  <tr><td><code>items.into_iter().collect::&lt;HashSet&lt;_&gt;&gt;()</code></td><td><code>list(set(items))</code></td></tr>
  <tr><td><code>let t: (&amp;str, i32) = ("a", 1);</code></td><td><code>t = ("a", 1)</code></td></tr>
  <tr><td><code>let (x, y) = t;</code></td><td><code>x, y = t</code></td></tr>
</table>
<p>Because tuples are immutable and hashable, Python lets you use them as
dictionary keys or set members &mdash; exactly as Rust already allows for its own
tuples in a <code>HashMap</code> or <code>HashSet</code>. Set algebra has operator
sugar in Python: <code>|</code> union, <code>&amp;</code> intersection,
<code>-</code> difference &mdash; where Rust instead calls
<code>.union(&amp;other)</code>, <code>.intersection(&amp;other)</code>, and
<code>.difference(&amp;other)</code>, each returning an iterator you typically
<code>.collect()</code>. And when a tuple's positions start to carry meaning,
<code>collections.namedtuple</code> gives each slot a name while staying a real,
immutable tuple &mdash; the rough equivalent of reaching for a Rust
<code>struct</code> with named fields instead of a bare tuple.</p>`,

  rust: `use std::collections::HashSet;

let mut tags: HashSet<&str> = HashSet::from(["a", "b", "a"]); // {"a", "b"}
tags.insert("c");

let a: HashSet<i32> = HashSet::from([1, 2, 3]);
let b: HashSet<i32> = HashSet::from([2, 3, 4]);
// union / intersection via iterator methods
let both: HashSet<i32> = a.intersection(&b).cloned().collect(); // {2, 3}

fn dedupe<T: Eq + std::hash::Hash + Clone>(items: Vec<T>) -> Vec<T> {
    items.into_iter().collect::<HashSet<T>>().into_iter().collect()
}

// tuple: fixed positions, unpacked by position
let point: (i32, i32) = (3, 4);
let (px, py) = point;`,

<p>Write the Python versions:</p>

  solution: `from collections import namedtuple


def dedupe(items):
    return list(set(items))


def common_tags(a, b):
    return set(a) & set(b)


def midpoint(p, q):
    x1, y1 = p
    x2, y2 = q
    return ((x1 + x2) / 2, (y1 + y2) / 2)


Point = namedtuple("Point", ["x", "y"])


def make_point(x, y):
    return Point(x, y)
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Set literal</td><td><code>HashSet::from([1, 2])</code></td><td><code>{1, 2}</code> (but <code>{}</code> is an empty dict &mdash; use <code>set()</code>)</td></tr>
  <tr><td>Membership</td><td><code>s.contains(&amp;x)</code></td><td><code>x in s</code></td></tr>
  <tr><td>Union / intersection / diff</td><td><code>a.union(&amp;b)</code>, <code>a.intersection(&amp;b)</code>, <code>a.difference(&amp;b)</code> (each an iterator)</td><td><code>a | b</code>, <code>a &amp; b</code>, <code>a - b</code></td></tr>
  <tr><td>Tuple</td><td><code>(i32, i32)</code> (immutable unless bound <code>mut</code>)</td><td><code>("a", 1)</code> (always immutable)</td></tr>
  <tr><td>Unpack</td><td><code>let (x, y) = t;</code></td><td><code>x, y = t</code></td></tr>
  <tr><td>Named fields</td><td><code>struct Point { x: i32, y: i32 }</code></td><td><code>namedtuple("P", ["x", "y"])</code></td></tr>
</table>
<p>Two gotchas. First, <code>{}</code> is an empty <em>dict</em>, not a set &mdash;
the empty set is <code>set()</code>. Second, set elements and tuple entries must be
<em>hashable</em>: numbers, strings, and tuples qualify, but a <code>list</code> or
<code>dict</code> does not, so <code>{[1, 2]}</code> raises <code>TypeError</code>
&mdash; the same constraint Rust enforces at compile time by requiring
<code>Eq + Hash</code> on anything placed in a <code>HashSet</code> or used as a
<code>HashMap</code> key. That is exactly why tuples make great dictionary keys and
set members while lists cannot &mdash; e.g. <code>seen = {(0, 0), (1, 2)}</code> to
track visited grid cells, just as a Rust <code>(i32, i32)</code> tuple can be
inserted into a <code>HashSet&lt;(i32, i32)&gt;</code>. A <code>namedtuple</code> is
still a plain tuple under the hood, so <code>make_point(3, 4) == (3, 4)</code> is
<code>True</code> and it unpacks and indexes like any tuple, but you also get
<code>.x</code> / <code>.y</code> access and a readable <code>repr</code> &mdash;
closer to a small Rust <code>struct</code>, minus the compile-time field
checking.</p>`,
