const LESSON = {
  number: 11,
  title: "Exceptions",

  intro: `
<p>Rust has no exceptions at all — recoverable failures are ordinary values
wrapped in <code>Result&lt;T, E&gt;</code>, and the caller must explicitly
<code>match</code> on <code>Ok</code>/<code>Err</code> or propagate with the
<code>?</code> operator. Only truly unrecoverable bugs use <code>panic!</code>,
and catching an unwinding panic with <code>catch_unwind</code> is rare and
generally discouraged. Python leans the opposite way — exceptions are the
normal way to signal "this can't be done" — and the <code>except</code> clause
selects <em>which</em> exception class to handle, so narrowing is built into
the syntax. Python also adds an <code>else</code> clause (runs only when no
exception was raised) alongside the familiar <code>finally</code>.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>match result { Ok(v) => …, Err(e) => … }</code></td><td><code>try:</code> … <code>except:</code> …</td></tr>
  <tr><td><code>Err(MyError::Validation(_)) => …</code></td><td><code>except ValueError:</code></td></tr>
  <tr><td><code>return Err(ValidationError)</code></td><td><code>raise ValueError("bad")</code></td></tr>
  <tr><td><code>Drop</code> impl / scope guard</td><td><code>finally:</code></td></tr>
  <tr><td><code>struct E; impl Error for E {}</code></td><td><code>class E(Exception): ...</code></td></tr>
</table>
<p>You catch a specific class with <code>except ValueError:</code>, and you can
bind the instance with <code>except ValueError as err:</code>. Raising is
<code>raise SomeException("message")</code> — note <code>raise</code>, not
Rust's <code>return Err(...)</code>, and you raise an <em>instance</em>, not a
bare class name (though <code>raise ValueError</code> also works). A custom
exception is just a subclass of <code>Exception</code>; an empty body with
<code>pass</code> is enough.</p>`,

  rust: `#[derive(Debug)]
struct ValidationError;

fn check_age(age: i32) -> Result<i32, ValidationError> {
    if age < 0 {
        return Err(ValidationError);
    }
    Ok(age)
}

fn safe_check_age(age: i32) -> i32 {
    match check_age(age) {
        Ok(value) => value,
        Err(_) => -1, // fallback
    }
}`,

  task: `
<p>Build a validator that raises and a safe wrapper that catches:</p>
<ol>
  <li>Define a custom exception <code>ValidationError</code> that subclasses
      <code>Exception</code> (a <code>pass</code> body is fine).</li>
  <li>Write <code>check_age(age)</code>: if <code>age</code> is not an
      <code>int</code>, <code>raise TypeError</code>; if it is negative,
      <code>raise ValidationError</code>; otherwise return the age.</li>
  <li>Write <code>safe_check_age(age)</code> that calls <code>check_age</code>
      inside <code>try</code>/<code>except</code> and returns <code>-1</code> as
      a fallback if <em>any</em> exception is raised.</li>
  <li>Write <code>parse_int(text)</code> that returns <code>int(text)</code>,
      but catches <code>ValueError</code> and returns <code>0</code> for
      un-parseable text. Use an <code>else</code> and/or <code>finally</code>
      clause if you like.</li>
</ol>`,

  starter: `# 1. Custom exception subclassing Exception
class ValidationError(Exception):
    pass  # TODO


# 2. Validator that raises
def check_age(age):
    return None  # TODO


# 3. Safe wrapper that catches and returns a fallback
def safe_check_age(age):
    return None  # TODO


# 4. Parse an int, falling back to 0 on ValueError
def parse_int(text):
    return None  # TODO
`,

  requirements: [
    { pattern: /class\s+ValidationError\s*\(\s*Exception\s*\)/, message: "Subclass Exception for ValidationError" },
    { pattern: /raise\s+ValidationError/, message: "raise ValidationError inside check_age" },
    { pattern: /except\s+ValueError/, message: "Catch ValueError specifically in parse_int" },
  ],

  tests: [
    { name: "check_age(30) returns 30", code: "    expect_eq(check_age(30), 30)" },
    { name: "check_age(-1) raises ValidationError", code: "    raised = False\n    try:\n        check_age(-1)\n    except ValidationError:\n        raised = True\n    expect_true(raised)" },
    { name: "check_age('x') raises TypeError", code: "    raised = False\n    try:\n        check_age(\"x\")\n    except TypeError:\n        raised = True\n    expect_true(raised)" },
    { name: "ValidationError is an Exception", code: "    expect_true(issubclass(ValidationError, Exception))" },
    { name: "safe_check_age(30) returns 30", code: "    expect_eq(safe_check_age(30), 30)" },
    { name: "safe_check_age(-5) falls back to -1", code: "    expect_eq(safe_check_age(-5), -1)" },
    { name: "safe_check_age('nope') falls back to -1", code: "    expect_eq(safe_check_age(\"nope\"), -1)" },
    { name: "parse_int('42') is 42", code: "    expect_eq(parse_int(\"42\"), 42)" },
    { name: "parse_int('oops') falls back to 0", code: "    expect_eq(parse_int(\"oops\"), 0)" },
  ],

  solution: `class ValidationError(Exception):
    pass


def check_age(age):
    if not isinstance(age, int) or isinstance(age, bool):
        raise TypeError("age must be an int")
    if age < 0:
        raise ValidationError("age must be >= 0")
    return age


def safe_check_age(age):
    try:
        return check_age(age)
    except Exception:
        return -1


def parse_int(text):
    try:
        value = int(text)
    except ValueError:
        return 0
    else:
        return value
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Raise</td><td><code>return Err(MyError)</code> (<code>panic!("x")</code> for bugs)</td><td><code>raise ValueError("x")</code></td></tr>
  <tr><td>Catch one type</td><td><code>Err(MyError::Validation(_)) => …</code></td><td><code>except ValueError:</code></td></tr>
  <tr><td>Bind the error</td><td><code>Err(e) => …</code></td><td><code>except ValueError as e:</code></td></tr>
  <tr><td>No-error branch</td><td><code>Ok(v) => …</code></td><td><code>else:</code></td></tr>
  <tr><td>Always run</td><td><code>Drop</code> impl / scope guard</td><td><code>finally:</code></td></tr>
  <tr><td>Custom type</td><td><code>struct E; impl Error for E {}</code></td><td><code>class E(Exception): pass</code></td></tr>
</table>
<p>The four clauses run in a fixed order: the <code>try</code> body, then
<em>either</em> a matching <code>except</code> (if something was raised)
<em>or</em> <code>else</code> (if nothing was), and <code>finally</code> last no
matter what. Prefer catching the narrowest class you can — a bare
<code>except:</code> also swallows <code>KeyboardInterrupt</code> and other
signals, so reach for <code>except Exception:</code> at most, and ideally name
the specific class.</p>
<p>One Python gotcha for Rust folks: <code>bool</code> is a subclass of
<code>int</code>, so <code>isinstance(True, int)</code> is <code>True</code>.
That is why the solution's type check also rules out <code>bool</code> before
treating the value as a valid age.</p>`,
};
