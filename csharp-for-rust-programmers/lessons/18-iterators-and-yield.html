  title: "Iterators & yield",

  intro: `
<p>Rust's <code>Iterator</code> trait has no built-in generator syntax — the
<code>yield</code> keyword only exists behind a nightly feature gate — so
laziness there comes from implementing <code>Iterator::next</code> by hand (a
hand-written state machine) or from chaining adapters like <code>.map()</code>,
<code>.filter()</code>, and <code>.take()</code> that never materialize a
<code>Vec</code>. C# has a shortcut Rust doesn't: a method whose return type is
<code>IEnumerable&lt;T&gt;</code> becomes an <em>iterator</em> the moment it
contains a <code>yield return</code>, and <code>foreach</code> is C#'s
equivalent of a Rust <code>for</code> loop calling <code>.next()</code>.</p>
<table>
  <tr><th>Rust</th><th>C#</th></tr>
  <tr><td><code>impl Iterator for S { fn next(&amp;mut self) -&gt; Option&lt;T&gt; {…} }</code></td><td><code>IEnumerable&lt;int&gt; G()</code></td></tr>
  <tr><td><code>Some(x)</code> (from <code>next</code>)</td><td><code>yield return x;</code></td></tr>
  <tr><td><code>None</code> (stop early)</td><td><code>yield break;</code></td></tr>
  <tr><td><code>for x in seq</code></td><td><code>foreach (var x in seq)</code></td></tr>
  <tr><td><code>IntoIterator::into_iter()</code></td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>Two things to internalize. First, iterators are <em>lazy</em>: the body does not
run until something enumerates it, and it runs only as far as the consumer asks —
so an infinite <code>Fibonacci()</code> is fine as long as a caller uses
<code>Take(…)</code> to stop pulling, exactly like a Rust iterator that is never
fully <code>.collect()</code>ed. Second, C# needs no special marker at the
method signature at all: the compiler rewrites any method containing
<code>yield</code> into a state machine automatically, sparing you the
<code>struct</code> fields and manual <code>next()</code> bookkeeping Rust's
<code>impl Iterator</code> requires. To make a whole <em>class</em> iterable,
implement <code>IEnumerable&lt;T&gt;</code> and give it a
<code>GetEnumerator()</code> — which can itself be an iterator built from
<code>yield return</code>, playing the role Rust's <code>IntoIterator</code>
plays for a type.</p>`,

  rust: `struct RangeIter {
    current: i32,
    remaining: i32,
}

impl Iterator for RangeIter {
    type Item = i32;
    fn next(&mut self) -> Option<i32> {
        if self.remaining == 0 {
            return None;
        }
        let value = self.current;
        self.current += 1;
        self.remaining -= 1;
        Some(value)
    }
}

fn range(start: i32, count: i32) -> RangeIter {
    RangeIter { current: start, remaining: count }
}

fn take<T>(source: impl Iterator<Item = T>, n: usize) -> impl Iterator<Item = T> {
    source.take(n) // built-in adapter, no yield needed
}

struct Fibonacci {
    a: u64,
    b: u64,
}

impl Iterator for Fibonacci {
    type Item = u64;
    fn next(&mut self) -> Option<u64> {
        let current = self.a;
        let next = self.a + self.b;
        self.a = self.b;
        self.b = next;
        Some(current)
    }
}

fn fibonacci() -> Fibonacci {
    Fibonacci { a: 0, b: 1 }
}

struct Countdown {
    start: i32,
}

impl Iterator for Countdown {
    type Item = i32;
    fn next(&mut self) -> Option<i32> {
        if self.start < 1 {
            return None;
        }
        let value = self.start;
        self.start -= 1;
        Some(value)
    }
}`,

  task: `
<p>Build a few lazy sequences with <code>yield</code>, then make a class iterable.</p>
<ol>
  <li>Write <code>static class Sequences</code> holding three iterator methods.</li>
  <li><code>IEnumerable&lt;int&gt; Range(int start, int count)</code> yields
      <code>start</code>, <code>start+1</code>, … for <code>count</code> values
      (so <code>Range(1, 3)</code> yields <code>1, 2, 3</code>). Use
      <code>yield return</code>.</li>
  <li><code>IEnumerable&lt;T&gt; Take&lt;T&gt;(IEnumerable&lt;T&gt; source, int n)</code>
      yields the first <code>n</code> items of <code>source</code>, then stops with
      <code>yield break</code>. If <code>source</code> is shorter than <code>n</code>,

  <li><code>IEnumerable&lt;long&gt; Fibonacci()</code> yields the infinite Fibonacci

  <li>Write <code>class Countdown : IEnumerable&lt;int&gt;</code> with a constructor

      required non-generic <code>IEnumerator IEnumerable.GetEnumerator()</code> that
      delegates to it.</li>
</ol>`,

  requirements: [
    { pattern: /yield\s+return/, message: "Produce values with yield return" },
    { pattern: /yield\s+break/, message: "Stop Take early with yield break" },
    { pattern: /class\s+Countdown\s*:\s*IEnumerable<int>/, message: "Countdown must implement IEnumerable<int>" },
  ],

  tests: [
    { name: "Range(1, 3) yields 1,2,3", code: "      expect_true(Sequences.Range(1, 3).SequenceEqual(new[] { 1, 2, 3 }));" },
    { name: "Range(0, 4) sums to 6", code: "      expect_eq(Sequences.Range(0, 4).Sum(), 6);" },
    { name: "Take stops at n", code: "      expect_true(Sequences.Take(new[] { 10, 20, 30, 40 }, 2).SequenceEqual(new[] { 10, 20 }));" },
    { name: "Take past the end yields all", code: "      expect_eq(Sequences.Take(new[] { 5, 6 }, 9).Count(), 2);" },
    { name: "Fibonacci is lazy and infinite", code: "      expect_true(Sequences.Take(Sequences.Fibonacci(), 7).SequenceEqual(new long[] { 0, 1, 1, 2, 3, 5, 8 }));" },
    { name: "Countdown(3) enumerates 3,2,1", code: "      expect_true(new Countdown(3).SequenceEqual(new[] { 3, 2, 1 }));" },
    { name: "Countdown works with LINQ", code: "      expect_eq(new Countdown(5).Sum(), 15);" },
  ],

  solution: `static class Sequences {
  public static IEnumerable<int> Range(int start, int count) {
    for (int i = 0; i < count; i++) {
      yield return start + i;
    }
  }

  public static IEnumerable<T> Take<T>(IEnumerable<T> source, int n) {
    int i = 0;
    foreach (T item in source) {
      if (i >= n) {
        yield break;
      }
      yield return item;
      i++;
    }
  }

  public static IEnumerable<long> Fibonacci() {
    long a = 0, b = 1;
    while (true) {
      yield return a;
      long next = a + b;
      a = b;
      b = next;
    }
  }
}

class Countdown : IEnumerable<int> {
  private int start;

  public Countdown(int start) {
    this.start = start;
  }

  public IEnumerator<int> GetEnumerator() {
    for (int i = start; i >= 1; i--) {
      yield return i;
    }
  }

  IEnumerator IEnumerable.GetEnumerator() {
    return GetEnumerator();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C#</th></tr>
  <tr><td>Generator method</td><td>no stable equivalent — implement <code>Iterator::next</code> by hand</td><td>method returning <code>IEnumerable&lt;T&gt;</code> with <code>yield</code></td></tr>
  <tr><td>Emit a value</td><td><code>Some(x)</code> (from <code>next</code>)</td><td><code>yield return x;</code></td></tr>
  <tr><td>Stop early</td><td><code>None</code> (from <code>next</code>)</td><td><code>yield break;</code></td></tr>
  <tr><td>Consume</td><td><code>for x in seq</code></td><td><code>foreach</code> / LINQ</td></tr>
  <tr><td>Iterable type</td><td><code>impl IntoIterator for T</code></td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>An iterator method's body does not execute when you call it — it runs on demand
as the consumer pulls values, the same laziness a Rust iterator adapter chain has
before something calls <code>.collect()</code> or <code>.sum()</code> on it. That
laziness is why an infinite <code>Fibonacci()</code> never hangs:
<code>Take(Fibonacci(), 7)</code> pulls exactly seven values and then stops asking,
the same way <code>fib().take(7)</code> in Rust only ever computes seven Fibonacci
numbers. It is also why any exception or expensive setup inside the method is
deferred until the first <code>MoveNext</code> — comparable to how a Rust
iterator's <code>next()</code> only runs when something actually calls it.</p>
<p>Because iterator methods return <code>IEnumerable&lt;T&gt;</code>, the entire LINQ
surface (<code>Where</code>, <code>Select</code>, <code>Sum</code>, <code>First</code>,
<code>SequenceEqual</code>, …) composes over them for free — the same way
<code>.filter()</code>, <code>.map()</code>, <code>.sum()</code>, and the rest of
Rust's adapter methods compose over anything implementing <code>Iterator</code>.
Implementing <code>IEnumerable&lt;T&gt;</code> on a class requires two
<code>GetEnumerator</code> methods: the generic one you actually write, plus a
non-generic <code>IEnumerator IEnumerable.GetEnumerator()</code> (explicit
interface implementation) that just delegates to it — a legacy requirement from
the pre-generics <code>System.Collections</code> interface, with no counterpart
in Rust's single <code>IntoIterator</code>/<code>Iterator</code> trait pair.</p>`,
};
