  number: 2,
  title: "Strings",

  intro: `
<p>C# strings will feel familiar in one big way and foreign in another: like
Rust's <code>String</code>, a C# <code>string</code> is immutable, so every
operation returns a <em>new</em> string rather than mutating the original. But
there is no ownership or borrowing to track — no <code>&str</code> vs.
<code>String</code> split, no lifetimes, and the garbage collector handles
cleanup. The method names differ too: they are PascalCase, and a couple of
them (<code>Substring</code>, <code>IndexOf</code>) have sharper edges than
their Rust cousins.</p>
<table>
  <tr><th>Rust</th><th>C#</th></tr>
  <tr><td><code>s.to_uppercase()</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td><code>s.contains("x")</code></td><td><code>s.Contains("x")</code></td></tr>
  <tr><td><code>s.find("x")</code></td><td><code>s.IndexOf("x")</code></td></tr>
  <tr><td><code>&s[1..4]</code></td><td><code>s.Substring(1, 3)</code></td></tr>
  <tr><td><code>s.split(",")</code></td><td><code>s.Split(',')</code></td></tr>
  <tr><td><code>s.trim()</code></td><td><code>s.Trim()</code></td></tr>
  <tr><td><code>words.join(", ")</code></td><td><code>string.Join(", ", arr)</code></td></tr>
</table>
<p>Two traps to note. <code>Substring(start, length)</code> takes a
<em>length</em>, not an end index, so it is not the same shape as Rust's
<code>&s[start..end]</code> range slicing. And <code>IndexOf</code> returns
<code>-1</code> when the substring is missing, where Rust's <code>find</code>
returns <code>None</code>. For assembling many pieces in a loop, reach for
<code>StringBuilder</code> instead of repeatedly <code>+</code>-ing strings —
the same reason you would build up a Rust <code>String</code> with
<code>push_str</code> instead of repeated <code>format!</code> concatenation,
but here it is the idiomatic tool.</p>`,

  rust: `fn shout(s: &str) -> String {
    s.trim().to_uppercase()
}

fn csv(parts: &[&str]) -> String {
    parts.join(", ")
}

fn initials(name: &str) -> String {
    name.split(' ')
        .filter_map(|w| w.chars().next())
        .collect()
}`,

  task: `
<p>Build a <code>static class TextUtil</code> with these <code>static</code>
methods:</p>
<ol>
  <li><code>Shout(string s)</code> — trim surrounding whitespace and uppercase it.
      Chain <code>Trim()</code> and <code>ToUpper()</code>.</li>
  <li><code>Csv(string[] parts)</code> — join the parts with <code>", "</code>

  <li><code>Initials(string name)</code> — split on spaces, take the first
      character of each word, and concatenate them. Build the result with a
      <code>StringBuilder</code>.</li>
  <li><code>Greeting(string name)</code> — return an interpolated string
      <code>$"Hello, {name}!"</code>.</li>
</ol>`,

  starter: `static class TextUtil {

    return ""; // TODO

    return ""; // TODO: use string.Join

`,

  requirements: [
    { pattern: /string\.Join/, message: "Join the parts with string.Join" },
    { pattern: /new\s+StringBuilder/, message: "Build the initials with a StringBuilder" },
    { pattern: /\$"/, message: "Build the greeting with an interpolated string ($\"...\")" },
  ],

  tests: [
    { name: "Shout(\"  hi there \") is \"HI THERE\"", code: "      expect_eq(TextUtil.Shout(\"  hi there \"), \"HI THERE\");" },
    { name: "Csv joins with \", \"", code: "      expect_eq(TextUtil.Csv(new string[] { \"a\", \"b\", \"c\" }), \"a, b, c\");" },
    { name: "Csv of one element has no separator", code: "      expect_eq(TextUtil.Csv(new string[] { \"solo\" }), \"solo\");" },
    { name: "Initials(\"Ada Lovelace\") is \"AL\"", code: "      expect_eq(TextUtil.Initials(\"Ada Lovelace\"), \"AL\");" },
    { name: "Initials(\"grace brewster hopper\") is \"gbh\"", code: "      expect_eq(TextUtil.Initials(\"grace brewster hopper\"), \"gbh\");" },
    { name: "Greeting(\"Ada\") is \"Hello, Ada!\"", code: "      expect_eq(TextUtil.Greeting(\"Ada\"), \"Hello, Ada!\");" },
  ],

  solution: `static class TextUtil {
  public static string Shout(string s) {
    return s.Trim().ToUpper();
  }

  public static string Csv(string[] parts) {
    return string.Join(", ", parts);
  }

  public static string Initials(string name) {
    var sb = new StringBuilder();
    foreach (var word in name.Split(' ')) {
      if (word.Length > 0) {
        sb.Append(word[0]);
      }
    }
    return sb.ToString();
  }

  public static string Greeting(string name) {
    return $"Hello, {name}!";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C#</th></tr>
  <tr><td>Uppercase</td><td><code>s.to_uppercase()</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td>Contains</td><td><code>s.contains(x)</code></td><td><code>s.Contains(x)</code></td></tr>
  <tr><td>Substring</td><td><code>&s[1..4]</code></td><td><code>s.Substring(1, 3)</code> (start, <em>length</em>)</td></tr>
  <tr><td>Replace</td><td><code>s.replace("a", "b")</code></td><td><code>s.Replace("a", "b")</code> (replaces all)</td></tr>
  <tr><td>Join</td><td><code>arr.join(sep)</code></td><td><code>string.Join(sep, arr)</code> (static)</td></tr>
  <tr><td>Build in loop</td><td><code>s.push_str(piece)</code></td><td><code>sb.Append(piece)</code></td></tr>
</table>
<p>A few more idioms worth filing away. <code>string.Split</code> takes a
<code>char</code> (single quotes: <code>','</code>) or a <code>string[]</code> of
separators — not a regex, and closer to Rust's <code>str::split</code> with a
<code>char</code> pattern than to a fancier splitter. <code>Replace</code> swaps
<em>every</em> occurrence, matching Rust's <code>str::replace</code> rather than
<code>replacen</code>. <code>StartsWith</code>, <code>EndsWith</code>, and
<code>Contains</code> all return <code>bool</code>, just like their Rust
counterparts. And note that <code>string.Join</code>,
<code>string.IsNullOrEmpty</code>, and friends are <em>static</em> methods on the
<code>string</code> type rather than free functions or associated functions on
an owned value, which is why the call reads
<code>string.Join(...)</code> rather than <code>arr.Join(...)</code>.</p>`,
