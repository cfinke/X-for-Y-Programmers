  number: 6,
  title: "Classes & Properties",

  intro: `
<p>Rust structs and C# classes both bundle data with behavior, but Rust has no
property syntax at all — a struct is just fields, and every field is private
by default unless marked <code>pub</code>. There's no auto-generated getter or
setter; if you want controlled access, you write a method by hand. C#'s
<em>auto-properties</em> give you that same controlled access for free:
<code>public int Age { get; set; }</code> compiles down to a hidden backing field
plus a getter and setter, but reads and writes like a plain field.</p>
<table>
  <tr><th>Rust</th><th>C#</th></tr>
  <tr><td><code>name: String,</code> (private by default)</td><td><code>private string name;</code></td></tr>
  <tr><td><code>pub age: i32,</code></td><td><code>public int Age { get; set; }</code></td></tr>
  <tr><td>field set once in <code>new</code>, no setter</td><td><code>public int Id { get; }</code> (get-only)</td></tr>
  <tr><td><code>fn total(&amp;self) -> i32 { … }</code></td><td><code>public int Total => …;</code></td></tr>
  <tr><td><code>fn new(x: i32) -> Self { … }</code></td><td><code>public Thing(int x) { … }</code></td></tr>
</table>
<p>Three things to internalize. First, public members are conventionally
<strong>PascalCase</strong> in C# (<code>Balance</code>, not <code>balance</code>),
where Rust keeps <code>snake_case</code> for fields and methods even when they're
public. Second, a <code>{ get; }</code> property with no setter can only be
assigned in the constructor — that is C#'s version of a Rust field you only ever
write inside <code>new</code> and never expose a setter for. A
<code>{ get; private set; }</code> lets the class mutate it while the outside
world sees it as read-only: the same encapsulation Rust gets by keeping a field
private to its module and exposing only a getter method. Third, <code>=></code>
defines an <em>expression-bodied member</em>, the terse form of a computed
getter or a one-line method — the C# analogue of a Rust method whose body is a
single trailing expression with no semicolon.</p>`,

  rust: `struct BankAccount {
    owner: String,
    balance: f64,
}

impl BankAccount {
    fn new(owner: &str, initial: f64) -> Self {
        BankAccount { owner: owner.to_string(), balance: initial }
    }

    fn balance(&self) -> f64 { self.balance }

    fn deposit(&mut self, amount: f64) { self.balance += amount; }

    fn summary(&self) -> String { format!("{}: {}", self.owner, self.balance) }
}`,

<p>Build a <code>BankAccount</code> class that encapsulates its balance so callers

  solution: `class BankAccount {
  public string Owner { get; }
  public decimal Balance { get; private set; }
  private int transactionCount;

  public BankAccount(string owner, decimal initial) {
    Owner = owner;
    Balance = initial;
    transactionCount = 0;
  }

  public void Deposit(decimal amount) {
    Balance += amount;
    transactionCount++;
  }

  public bool Withdraw(decimal amount) {
    if (amount > Balance) {
      return false;
    }
    Balance -= amount;
    transactionCount++;
    return true;
  }

  public int TransactionCount => transactionCount;
  public string Summary => $"{Owner}: {Balance}";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C#</th></tr>
  <tr><td>Mutable public field</td><td><code>pub x: i32,</code></td><td><code>int X { get; set; }</code></td></tr>
  <tr><td>Read-only from outside</td><td>private field + <code>fn x(&amp;self) -> i32</code></td><td><code>int X { get; private set; }</code></td></tr>
  <tr><td>Immutable after construction</td><td>field set only in <code>new</code></td><td><code>int X { get; }</code></td></tr>
  <tr><td>Computed getter</td><td><code>fn total(&amp;self) -> i32 { … }</code></td><td><code>int Total => …;</code></td></tr>
  <tr><td>Private field</td><td><code>x: i32,</code> (default)</td><td><code>private int x;</code></td></tr>
</table>
<p>An auto-property is just sugar: <code>{ get; set; }</code> generates a hidden
backing field and trivial accessors — the same thing you get in Rust by writing
a plain field plus a one-line accessor method, except C# generates the
boilerplate for you. The moment you need logic — validation, change tracking —
you either switch to a full property with an explicit backing field, or, as
here, keep the auto-property and route all mutation through methods that guard
the invariant. Because the setter is <code>private</code>, no caller outside
<code>BankAccount</code> can bypass <code>Withdraw</code>'s overdraft check —
the same guarantee Rust gives you by keeping a struct field private to its
module and exposing only the methods that enforce the rule.</p>
<p>One Rust habit to drop: naming public members in snake_case. The .NET
convention is PascalCase for anything public (properties, methods, types) and
camelCase only for private fields, parameters, and locals. The compiler doesn't
enforce it, but every C# codebase you touch will expect it.</p>`,
