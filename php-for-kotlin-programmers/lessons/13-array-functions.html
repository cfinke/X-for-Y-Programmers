  number: 13,
  title: "array_map, array_filter & Friends",

  intro: `
<p>Kotlin gave you the collection operators; PHP gives you the same
operations <em>as free functions</em>. <code>array_map</code>,
<code>array_filter</code>, and <code>array_reduce</code> are plain functions
taking and returning arrays — and <strong>nested rather than chained</strong>.
The fluent pipeline <code>list.filter { ... }.map { ... }</code>
reads left-to-right; its PHP translation reads inside-out:
<code>array_values(array_map($fn, array_filter($arr, $keep)))</code>.</p>
<table>
  <tr><th>Kotlin collections</th><th>PHP arrays</th></tr>
  <tr><td><code>.map { f(it) }</code></td><td><code>array_map($f, $arr)</code> — <strong>callback first</strong></td></tr>
  <tr><td><code>.filter { p(it) }</code></td><td><code>array_filter($arr, $p)</code> — <strong>array first!</strong></td></tr>
  <tr><td><code>.fold(0) { a, b -&gt; ... }</code></td><td><code>array_reduce($arr, $f, 0)</code> (initial value last)</td></tr>
  <tr><td><code>.sumOf { f(it) }</code></td><td><code>array_sum(array_map($f, $arr))</code></td></tr>
  <tr><td><code>.filter { ... }</code> (fresh indices)</td><td><code>array_values(...)</code> — reindex after filtering</td></tr>
</table>
<p>Two traps for collection veterans. First, the argument orders disagree with
each other: <code>array_map</code> takes the callback <em>first</em>,
<code>array_filter</code> takes the array first. Second — the big one —
<code>array_filter</code> <strong>preserves keys</strong>: filtering
<code>[10, 15, 20]</code> for evens yields <code>[0 =&gt; 10, 2 =&gt; 20]</code>
with a hole at index 1. In Kotlin <code>filter</code> always hands back a fresh
<code>List</code> renumbered from 0, so this never comes up; in PHP that
gap-riddled array is not <code>===</code> to <code>[10, 20]</code> and
json_encodes as an object, so <code>array_values()</code> is your way to throw
the old keys away and reindex from 0.</p>`,

  kotlin: `data class Product(val name: String, val priceCents: Int, val inStock: Boolean)

val inStockNames: List<String> = products
    .filter { it.inStock }
    .map { it.name }

val totalValue: Int = products.sumOf { it.priceCents }

val evensDoubled: List<Int> = nums
    .filter { it % 2 == 0 }
    .map { it * 2 }`,

  task: `
<p>Products here are associative arrays shaped like
<code>['name' =&gt; 'Keyboard', 'price_cents' =&gt; 4500, 'in_stock' =&gt; true]</code>.
Rebuild the three pipelines:</p>
<ol>
  <li><code>in_stock_names(array $products): array</code> — the names of the
      in-stock products, as a cleanly reindexed list. Filter, then map, then
      <code>array_values()</code> (filtering first leaves key gaps).</li>
  <li><code>total_value(array $products): int</code> — the sum of every
      product's <code>price_cents</code>. Map to the prices, then
      <code>array_sum()</code> (or fold it with <code>array_reduce()</code>).</li>
  <li><code>evens_doubled(array $nums): array</code> — keep the even numbers,
      double each, and return a reindexed list: <code>[1, 2, 3, 4]</code>
      becomes <code>[4, 8]</code>, indexed from 0.</li>
</ol>`,

  starter: `<?php

//    array_values(array_map($fn, array_filter($products, $keep)))

}

    throw new Exception("TODO: implement total_value");
}

// 3. Filter for evens, double them, and reindex with array_values —
//    array_filter keeps the original keys, holes and all.
function evens_doubled(array $nums): array {
    throw new Exception("TODO: implement evens_doubled");
}
`,

  requirements: [
    { pattern: /array_map/, message: "Use array_map for the mapping steps" },
    { pattern: /array_filter/, message: "Use array_filter for the filtering steps" },
    { pattern: /array_values/, message: "Reindex filtered results with array_values" },
    { pattern: /array_reduce|array_sum/, message: "Total the prices with array_sum or array_reduce" },
  ],

  tests: [
    { name: "in_stock_names picks the in-stock names, reindexed from 0",
      code: "$products = [\n  ['name' => 'Keyboard', 'price_cents' => 4500, 'in_stock' => true],\n  ['name' => 'Mouse', 'price_cents' => 2500, 'in_stock' => false],\n  ['name' => 'Monitor', 'price_cents' => 22000, 'in_stock' => true],\n];\nexpect_eq(in_stock_names($products), ['Keyboard', 'Monitor']);" },
    { name: "in_stock_names returns [] when nothing is in stock",
      code: "$products = [['name' => 'Cable', 'price_cents' => 900, 'in_stock' => false]];\nexpect_eq(in_stock_names($products), []);" },
    { name: "total_value sums every price_cents",
      code: "$products = [\n  ['name' => 'Keyboard', 'price_cents' => 4500, 'in_stock' => true],\n  ['name' => 'Mouse', 'price_cents' => 2500, 'in_stock' => false],\n  ['name' => 'Monitor', 'price_cents' => 22000, 'in_stock' => true],\n];\nexpect_eq(total_value($products), 29000);" },
    { name: "total_value of no products is 0",
      code: "expect_eq(total_value([]), 0);" },
    { name: "evens_doubled([1, 2, 3, 4, 5]) returns [4, 8] with fresh indices",
      code: "expect_eq(evens_doubled([1, 2, 3, 4, 5]), [4, 8]);" },
    { name: "evens_doubled([7, 9]) returns []",
      code: "expect_eq(evens_doubled([7, 9]), []);" },
  ],

  solution: `<?php

function in_stock_names(array $products): array {
    return array_values(array_map(
        fn(array $p) => $p['name'],
        array_filter($products, fn(array $p) => $p['in_stock'])
    ));
}

function total_value(array $products): int {
    return array_sum(array_map(fn(array $p) => $p['price_cents'], $products));
}

function evens_doubled(array $nums): array {
    return array_values(array_map(
        fn(int $n) => $n * 2,
        array_filter($nums, fn(int $n) => $n % 2 === 0)
    ));
}
`,

  notes: `
<table>
  <tr><th>Collection operation</th><th>Kotlin</th><th>PHP</th></tr>
  <tr><td>map</td><td><code>.map { f(it) }</code></td><td><code>array_map($f, $arr)</code> — callback, then array</td></tr>
  <tr><td>filter</td><td><code>.filter { p(it) }</code></td><td><code>array_filter($arr, $p)</code> — array, then callback</td></tr>
  <tr><td>reduce / fold</td><td><code>.fold(init) { acc, x -&gt; op }</code></td><td><code>array_reduce($arr, $op, $init)</code></td></tr>
  <tr><td>sum</td><td><code>.sumOf { f(it) }</code></td><td><code>array_sum(array_map($f, $arr))</code></td></tr>
  <tr><td>reindex</td><td>(automatic — <code>filter</code> returns a fresh list)</td><td><code>array_values($arr)</code></td></tr>
  <tr><td>sort</td><td><code>.sortedWith(comparator)</code> — returns a copy</td><td><code>usort($arr, $cmp)</code> — mutates in place!</td></tr>
  <tr><td>laziness</td><td>Eager on <code>List</code>; lazy with <code>.asSequence()</code></td><td>None — every call builds a full array</td></tr>
</table>
<p>The <code>array_filter</code> key-preservation rule is the bug factory to
internalize: PHP arrays are ordered maps, and filtering removes entries
without renumbering, so downstream code expecting <code>[0, 1, 2, ...]</code>
keys (or JSON expecting a <code>[...]</code> list) silently breaks. Kotlin's
<code>filter</code> always hands you a freshly numbered <code>List</code>, so
you never had to think about this. Habit to build now: any time an
<code>array_filter</code> result should be a <em>list</em>, wrap it in
<code>array_values()</code> — it gives you back the renumbered list your
Kotlin muscle memory expects for free.</p>`,
};
