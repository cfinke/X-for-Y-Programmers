  title: "Closures & Callables",

  intro: `
<p>A Kotlin lambda captures outer variables automatically, and it can even
read and <strong>write</strong> a captured <code>var</code>. PHP
anonymous functions capture <strong>nothing</strong> unless you say so:
<code>function () use ($x) { ... }</code> lists every captured variable
explicitly, and each is copied <em>by value</em> — a snapshot at creation time,
so later changes to the outer variable don't affect the copy. Add an ampersand,
<code>use (&amp;$x)</code>, and you get capture <em>by reference</em>: the
closure reads and <strong>writes the live outer variable</strong> — the shared
mutable capture Kotlin hands you by default.</p>
<table>
  <tr><th>Kotlin</th><th>PHP</th></tr>
  <tr><td><code>{ x -&gt; x * n }</code> (auto-capture)</td><td><code>function ($x) use ($n) { return $x * $n; }</code></td></tr>
  <tr><td>—</td><td><code>fn($x) =&gt; $x * $n</code> — arrow fn, auto-captures by value</td></tr>
  <tr><td>Mutable capture: allowed (mutate a captured <code>var</code>)</td><td><code>use (&amp;$count)</code> — capture by reference</td></tr>
  <tr><td><code>(Int) -&gt; Int</code>, <code>() -&gt; T</code>, ...</td><td><code>callable</code> (param type) / <code>Closure</code> (the object)</td></tr>
  <tr><td><code>f(x)</code>, <code>s()</code></td><td><code>$f($x)</code> — just call it</td></tr>
</table>
<p>The short form, <code>fn($x) =&gt; $x * $n</code>, is the one that feels
like home: a single expression that auto-captures, no <code>use</code> clause —
the closest PHP gets to a Kotlin lambda, though the capture is a by-value
snapshot rather than Kotlin's live share. For types, PHP has two words where
Kotlin has a single structural function type: <code>callable</code> is the loose
parameter type accepting closures, function-name strings, and more (its
signature is unchecked — nothing like Kotlin's <code>(A) -&gt; B</code>), while
<code>Closure</code> is the concrete class anonymous functions actually are,
usable as a precise return type. And invocation is the part you already know —
every callable is invoked the same way, <code>$f($x)</code>, exactly like
calling a Kotlin lambda with <code>f(x)</code>.</p>`,

  kotlin: `val n = 3 // captured automatically; val or var both work
val triple: (Int) -> Int = { x -> x * n }

fun applyTwice(f: (Int) -> Int, x: Int): Int = f(f(x))

// A counting lambda? Kotlin lets you mutate a captured local directly:
var count = 0
val counter = { ++count }
// counter() -> 1, counter() -> 2, counter() -> 3
// No AtomicInteger box needed — the captured var is live.`,

  task: `
<p>Write the three closure factories, PHP-style:</p>
<ol>
  <li><code>make_multiplier(int $n): Closure</code> — return
      <code>fn(int $x) =&gt; $x * $n</code>. The arrow function auto-captures
      <code>$n</code> by value, like a Kotlin lambda capturing <code>n</code>.</li>
  <li><code>apply_twice(callable $f, int $x): int</code> — call <code>$f</code>
      on <code>$x</code>, then on the result: <code>$f($f($x))</code>.
      <code>callable</code> stands in for Kotlin's function type
      <code>(Int) -&gt; Int</code>, and you invoke it with <code>$f($x)</code> —
      just like calling a Kotlin lambda.</li>
  <li><code>make_counter(): Closure</code> — start a local
      <code>$count</code> at 0 and return a long-form closure with
      <code>use (&amp;$count)</code> that increments and returns it:
      successive calls yield 1, 2, 3. By-reference capture gives PHP the live,
      mutable captured state a Kotlin lambda gets for free from a captured
      <code>var</code>.</li>
</ol>`,

`,

  requirements: [
    { pattern: /use\s*\(\s*&/, message: "Capture the counter by reference with use (&$count)" },
    { pattern: /fn\s*\(/, message: "Use an arrow function fn(...) => ... in make_multiplier" },
    { pattern: /callable|Closure/, message: "Type the parameters/returns with callable and Closure" },
  ],

  tests: [
    { name: "make_multiplier(3) returns a closure that triples",
      code: "$triple = make_multiplier(3);\nexpect_eq($triple(7), 21);" },
    { name: "the captured $n is a snapshot per closure — two multipliers don't interfere",
      code: "$double = make_multiplier(2);\n$ten = make_multiplier(10);\nexpect_eq($double(5), 10);\nexpect_eq($ten(5), 50);" },
    { name: "apply_twice(fn($x) => $x + 1, 5) returns 7",
      code: "expect_eq(apply_twice(fn($x) => $x + 1, 5), 7);" },
    { name: "apply_twice composes with make_multiplier: doubling twice is x4",
      code: "expect_eq(apply_twice(make_multiplier(2), 3), 12);" },
    { name: "make_counter() counts 1, 2, 3 across calls (mutable capture)",
      code: "$counter = make_counter();\nexpect_eq($counter(), 1);\nexpect_eq($counter(), 2);\nexpect_eq($counter(), 3);" },
    { name: "each counter owns its own $count",
      code: "$a = make_counter();\n$b = make_counter();\n$a();\n$a();\nexpect_eq($b(), 1);" },
  ],

  solution: `<?php

function make_multiplier(int $n): Closure {
    return fn(int $x) => $x * $n;
}

function apply_twice(callable $f, int $x): int {
    return $f($f($x));
}

function make_counter(): Closure {
    $count = 0;
    return function () use (&$count): int {
        $count += 1;
        return $count;
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>PHP</th></tr>
  <tr><td>Lambda, one expression</td><td><code>{ x -&gt; x * n }</code></td><td><code>fn($x) =&gt; $x * $n</code> (auto-captures by value)</td></tr>
  <tr><td>Lambda, full body</td><td><code>{ x -&gt; ... }</code></td><td><code>function ($x) use ($n) { ... }</code> (explicit capture)</td></tr>
  <tr><td>Capture rule</td><td>Automatic; can read/write a captured <code>var</code></td><td>Explicit <code>use</code>; by-value copy, outer var stays free</td></tr>
  <tr><td>Mutable capture</td><td>Allowed — mutate a captured <code>var</code></td><td><code>use (&amp;$x)</code> — by reference</td></tr>
  <tr><td>Function type</td><td><code>(A) -&gt; B</code>, <code>() -&gt; T</code>, <code>(A) -&gt; Boolean</code>, ...</td><td><code>callable</code> (loose) / <code>Closure</code> (concrete class)</td></tr>
  <tr><td>Invoke</td><td><code>f(x)</code> / <code>s()</code> / <code>p(x)</code></td><td><code>$f($x)</code>, always</td></tr>
  <tr><td>Method reference</td><td><code>String::trim</code>, <code>::println</code></td><td><code>strlen(...)</code> — first-class callable (PHP 8.1)</td></tr>
</table>
<p>The capture model is the real difference to internalize: a Kotlin lambda
shares the live variable — mutations and all — while a PHP closure by default
owns a <em>copy</em> taken when the closure was created — later changes to the
outer variable are invisible, which surprises in loops. Reach for
<code>use (&amp;$x)</code> when you genuinely want the shared mutable state
Kotlin gives you by default, as in the counter; and note that
<code>callable</code> promises nothing about arity or types, so a
<code>Closure</code> return type plus a documented signature is the closest PHP
gets to a typed <code>() -&gt; Int</code>.</p>`,
