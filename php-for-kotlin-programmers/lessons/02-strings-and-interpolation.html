const LESSON = {
  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>One Kotlin string reflex needs rewiring. In Kotlin, <code>+</code>
concatenates strings — <code>"a" + name</code> builds a string. In PHP,
<code>+</code> is arithmetic <em>only</em>, and <code>"a" + $name</code>
is an error, not a string. PHP's glue operator is the dot:
<code>"User: " . $name</code>. The good news: your string-template reflex
carries straight over. Kotlin's <code>"$name is $age years old"</code> becomes
PHP's <code>"$name is $age years old"</code> — the same <code>$</code>-prefixed
interpolation, no <code>String.format</code>-style specifiers to mismatch.</p>
<table>
  <tr><th>Kotlin</th><th>PHP</th></tr>
  <tr><td><code>"User: " + name</code></td><td><code>"User: " . $name</code> (dot, not plus)</td></tr>
  <tr><td><code>"$n is $a"</code></td><td><code>"$n is $a"</code></td></tr>
  <tr><td><code>s.uppercase()</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td><code>s.contains(x)</code></td><td><code>str_contains($s, $x)</code></td></tr>
  <tr><td><code>s.length</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td><code>list.joinToString(", ")</code></td><td><code>implode(", ", $arr)</code></td></tr>
  <tr><td><code>a == b</code></td><td><code>$a === $b</code></td></tr>
</table>
<p>Notice the shape of those calls: strings are not objects here, so there are
no methods — just free functions that take the string as an argument, mostly
prefixed <code>str</code>. Your equality reflex, on the other hand, carries over
nicely: just as Kotlin's <code>==</code> compares string <em>values</em> (it
calls <code>equals</code>, while <code>===</code> is reference identity),
PHP's <code>==</code> compares values too. Prefer <code>===</code> anyway — in
PHP it also requires the types to match, which sidesteps PHP's type-juggling
surprises later.</p>`,

  kotlin: `val name = "Ada"
val age = 36

val label = "User: " + name              // + concatenates in Kotlin
val line  = "$name is $age"              // string templates

val loud   = name.uppercase()            // "ADA"
val hasDa  = name.contains("da")         // true
val len    = name.length                 // 3

val words  = listOf("one", "two", "three")
val joined = words.joinToString(", ")    // "one, two, three"

val same = name == "Ada"                 // == compares values (calls equals)`,

  task: `
<p>Rewrite the Kotlin string toolbox as four PHP functions:</p>
<ol>
  <li><code>shout(string $s): string</code> — uppercase the string with
      <code>strtoupper</code> and append <code>"!"</code> using the
      <code>.</code> operator: <code>shout("hey")</code> is
      <code>"HEY!"</code>.</li>
  <li><code>greet(string $name, int $age): string</code> — return
      <code>"Ada (36) says hi!"</code>-style text using interpolation —
      <code>"$name ($age) says hi!"</code>, just like a Kotlin string
      template.</li>
  <li><code>contains_word(string $haystack, string $needle): bool</code> —
      PHP's answer to <code>.contains()</code> is
      <code>str_contains($haystack, $needle)</code>.</li>
  <li><code>join_words(array $words): string</code> —
      <code>words.joinToString(", ")</code> becomes
      <code>implode(", ", $words)</code>: here the separator comes first.</li>
</ol>`,

  starter: `<?php

// 1. strtoupper($s), then glue on "!" with the dot operator.
function shout(string $s): string {
    throw new Exception("TODO: implement shout");
}

// 2. No String.format needed: "$name ($age) says hi!"
function greet(string $name, int $age): string {
    throw new Exception("TODO: implement greet");
}

// 3. str_contains(haystack, needle) — a plain function, not a method.

    throw new Exception("TODO: implement contains_word");

    throw new Exception("TODO: implement join_words");

`,

  requirements: [
    { pattern: /"\$\w+|\{\$\w+/, message: "Use double-quote interpolation in greet" },
    { pattern: /strtoupper/, message: "Use strtoupper in shout" },
    { pattern: /str_contains/, message: "Use str_contains in contains_word" },
    { pattern: /implode/, message: "Use implode in join_words" },
  ],

  tests: [
    { name: 'shout("hey") returns "HEY!"',
      code: 'expect_eq(shout("hey"), "HEY!");' },
    { name: 'greet("Ada", 36) returns "Ada (36) says hi!"',
      code: 'expect_eq(greet("Ada", 36), "Ada (36) says hi!");' },
    { name: 'contains_word("the quick brown fox", "quick") is true',
      code: 'expect_true(contains_word("the quick brown fox", "quick"));' },
    { name: 'contains_word("the quick brown fox", "slow") is false',
      code: 'expect_true(!contains_word("the quick brown fox", "slow"));' },
    { name: 'join_words(["one", "two", "three"]) returns "one, two, three"',
      code: 'expect_eq(join_words(["one", "two", "three"]), "one, two, three");' },
  ],

  solution: `<?php

function shout(string $s): string {
    return strtoupper($s) . "!";
}

function greet(string $name, int $age): string {
    return "$name ($age) says hi!";
}

function contains_word(string $haystack, string $needle): bool {
    return str_contains($haystack, $needle);
}

function join_words(array $words): string {
    return implode(", ", $words);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>PHP</th></tr>
  <tr><td>Concatenate</td><td><code>"a" + b</code></td><td><code>"a" . $b</code> (<code>+</code> is arithmetic only)</td></tr>
  <tr><td>Format / template</td><td><code>"$n is $a"</code></td><td><code>"$n is $a"</code>, or <code>"{$obj->prop}"</code> for expressions</td></tr>
  <tr><td>Uppercase</td><td><code>s.uppercase()</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td>Substring test</td><td><code>s.contains(x)</code></td><td><code>str_contains($s, $x)</code></td></tr>
  <tr><td>Length</td><td><code>s.length</code></td><td><code>strlen($s)</code></td></tr>
  <tr><td>Join</td><td><code>list.joinToString(", ")</code></td><td><code>implode(", ", $arr)</code></td></tr>
  <tr><td>Equality</td><td><code>a == b</code></td><td><code>$a === $b</code> (value comparison; <code>===</code> adds type safety)</td></tr>
</table>
<p>The deeper difference: PHP strings are values, not objects. In Kotlin you
already reach for <code>==</code> to compare string contents (it calls
<code>equals</code>), so that habit transfers cleanly — <code>"Ada" == "Ada"</code>
is simply true. The trade is that the API lives in a flat function namespace
(<code>strtoupper</code>, <code>str_contains</code>, <code>strlen</code>,
<code>implode</code>) with the string passed as the first argument — usually.
Watch <code>implode</code>: unlike <code>joinToString</code>, where the list is
the receiver, here the separator comes first.</p>`,
};
