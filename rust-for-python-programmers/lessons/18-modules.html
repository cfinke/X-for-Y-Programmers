const LESSON = {
  number: 18,
  title: "Modules & Visibility",

  intro: `
<p>In Python, a module <em>is</em> a file: drop functions in
<code>inventory.py</code>, <code>import inventory</code>, done. Privacy is a
handshake — prefix a helper with an underscore and polite colleagues won't
import it, but <code>from inventory import _join_names</code> works fine.
The interpreter enforces nothing.</p>
<p>Rust modules can be files too, but they can also be carved out
<em>inside</em> a file with <code>mod name { ... }</code> — a namespace block.
And privacy is real: everything in a module is private unless marked
<code>pub</code>. Call an un-<code>pub</code> function from outside and you
don't get a lint warning, you get a compile error. It's the underscore
convention, enforced by the compiler.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>inventory.py</code> (module = file)</td><td><code>mod inventory { ... }</code> (also: a file)</td></tr>
  <tr><td><code>import inventory</code></td><td><code>use</code> — or just path syntax</td></tr>
  <tr><td><code>inventory.item_count(items)</code></td><td><code>inventory::item_count(&amp;items)</code></td></tr>
  <tr><td><code>def _helper():</code> (convention only)</td><td><code>fn helper()</code> — private for real, no underscore needed</td></tr>
  <tr><td><code>def item_count():</code> (public by default)</td><td><code>pub fn item_count()</code> (private by default)</td></tr>
</table>
<p>Note the flip: Python is public-by-default with a privacy convention;
Rust is private-by-default with an explicit <code>pub</code> opt-out. The
path separator is <code>::</code> instead of <code>.</code>, and because
privacy is enforced, private helpers don't need a naming convention at all —
they're simply invisible from outside.</p>`,

  python: `# inventory.py -- in Python, a module is just a file.

def item_count(items: list[str]) -> int:
    return len(items)

def describe(items: list[str]) -> str:
    if not items:
        return "empty inventory"
    return f"{item_count(items)} items: {_join_names(items)}"

def _join_names(items: list[str]) -> str:
    # The underscore whispers "private" -- but nothing stops
    # \`from inventory import _join_names\` in another file.
    return ", ".join(items)

# elsewhere:
#   import inventory
#   inventory.describe(["apple", "banana"])  # "2 items: apple, banana"`,

  task: `
<p>Recreate the module in Rust, with privacy that actually holds:</p>
<ol>
  <li>Keep the <code>mod inventory { ... }</code> block from the starter —
      it's the in-file equivalent of <code>inventory.py</code>.</li>
  <li><code>pub fn item_count(items: &amp;Vec&lt;String&gt;) -&gt; usize</code> —
      return how many items there are (<code>.len()</code>).</li>
  <li><code>pub fn describe(items: &amp;Vec&lt;String&gt;) -&gt; String</code> —
      return <code>"empty inventory"</code> for an empty list, otherwise
      <code>"2 items: apple, banana"</code> style. Build the comma-separated
      name list in a <em>private</em> helper function inside the module (no
      <code>pub</code> — no underscore needed either; hint:
      <code>items.join(", ")</code>).</li>
</ol>
<p>The tests call your functions from outside the module, as
<code>inventory::item_count(...)</code> — so both must stay <code>pub</code>,
while the helper must not be. Don't write <code>fn main</code> — the lesson's
tests call your functions directly.</p>`,

  starter: `// mod carves a namespace inside this file -- like a nested
// inventory.py. Everything inside is PRIVATE unless marked pub.
mod inventory {
    pub fn item_count(items: &Vec<String>) -> usize {
        todo!()
    }

    // "empty inventory" if empty, else "2 items: apple, banana".
    pub fn describe(items: &Vec<String>) -> String {
        todo!()
    }

    // Add a private helper here (fn, no pub) that joins the names
    // with ", " -- describe should call it. Outside this block it
    // simply doesn't exist.
}
`,

  requirements: [
    { pattern: /mod\s+inventory/, message: "Keep the mod inventory { ... } block" },
    { pattern: /pub\s+fn/, message: "Mark the module's public functions with pub fn" },
  ],

  tests: [
    { name: "inventory::item_count on three items returns 3",
      code: `let items = vec![String::from("apple"), String::from("banana"), String::from("cherry")];
assert_eq!(inventory::item_count(&items), 3);` },
    { name: "inventory::item_count on an empty list returns 0",
      code: `let items: Vec<String> = Vec::new();
assert_eq!(inventory::item_count(&items), 0);` },
    { name: 'inventory::describe lists the items: "2 items: apple, banana"',
      code: `let items = vec![String::from("apple"), String::from("banana")];
assert_eq!(inventory::describe(&items), "2 items: apple, banana");` },
    { name: 'inventory::describe on an empty list returns "empty inventory"',
      code: `let items: Vec<String> = Vec::new();
assert_eq!(inventory::describe(&items), "empty inventory");` },
  ],

  solution: `mod inventory {
    pub fn item_count(items: &Vec<String>) -> usize {
        items.len()
    }

    pub fn describe(items: &Vec<String>) -> String {
        if items.is_empty() {
            return String::from("empty inventory");
        }
        format!("{} items: {}", item_count(items), join_names(items))
    }

    // Private: no pub, and no underscore convention needed --
    // the compiler makes it invisible outside this module.
    fn join_names(items: &Vec<String>) -> String {
        items.join(", ")
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Module</td><td>a file (<code>inventory.py</code>)</td><td><code>mod inventory { ... }</code> or a file</td></tr>
  <tr><td>Qualified call</td><td><code>inventory.describe(items)</code></td><td><code>inventory::describe(&amp;items)</code></td></tr>
  <tr><td>Import a name</td><td><code>from inventory import describe</code></td><td><code>use inventory::describe;</code></td></tr>
  <tr><td>Default visibility</td><td>public</td><td>private</td></tr>
  <tr><td>Making it public</td><td>it already is</td><td><code>pub fn</code>, <code>pub struct</code>, <code>pub mod</code></td></tr>
  <tr><td>Marking it private</td><td><code>_underscore</code> (convention)</td><td>do nothing (enforced)</td></tr>
</table>
<p>The insight: Rust turns your <code>_helper</code> discipline into a
compiler guarantee. Inside <code>mod inventory</code>, functions call each
other freely — <code>describe</code> reaches <code>join_names</code> with no
prefix — but from outside, only <code>pub</code> items exist at all. In a
real project the same rules scale up: <code>mod</code> blocks become files
(<code>src/inventory.rs</code>), directories become module trees, and
<code>use</code> plays the role of <code>import</code>. The privacy rules are
identical at every level, so what you practiced here in one file is the whole
model.</p>`,
};
