const LESSON = {
  number: 6,
  title: "Vectors",

  intro: `
<p>Rust's <code>Vec&lt;T&gt;</code> is the Python list, with one rule Python
never enforced: every element has the same type. <code>[1, "two", None]</code>
is a perfectly legal Python list; a <code>Vec&lt;i32&gt;</code> holds
<code>i32</code>s and nothing else, and the compiler checks it. In exchange,
you never write <code>isinstance</code> checks over a list again — if it's a
<code>Vec&lt;i32&gt;</code>, every element is an <code>i32</code>.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>scores = [10, 20, 30]</code></td><td><code>let scores = vec![10, 20, 30];</code></td></tr>
  <tr><td><code>scores.append(40)</code></td><td><code>scores.push(40);</code> (needs <code>let mut</code>)</td></tr>
  <tr><td><code>len(scores)</code></td><td><code>scores.len()</code></td></tr>
  <tr><td><code>scores[100]</code> → <code>IndexError</code> at runtime</td><td><code>scores.get(100)</code> → <code>Option</code>, no crash</td></tr>
  <tr><td><code>sum(scores)</code></td><td><code>scores.iter().sum()</code></td></tr>
</table>
<p>Two habits carry over with a twist. First, mutation is opt-in: a plain
<code>let</code> vector cannot be <code>.push</code>ed — you need
<code>let mut</code>, the same immutable-by-default rule from Lesson 1.
Second, iteration: where Python style says "never <code>range(len(xs))</code>,
just <code>for x in xs</code>", Rust agrees — <code>for x in &amp;v</code>
walks the elements directly, and the <code>&amp;</code> borrows the vector so
you can still use it afterwards.</p>`,

  python: `scores: list[int] = [10, 20, 30]
scores.append(40)           # grow in place
print(len(scores))          # 4
print(sum(scores))          # 100

# Python lists happily mix types — impossible in a Vec<i32>:
mixed = [1, "two", None]

# Indexing past the end blows up at runtime:
# scores[100]               # IndexError: list index out of range
print(scores.pop() if scores else None)

def total(values: list[int]) -> int:
    return sum(values)

for score in scores:        # idiomatic: no range(len(scores))
    print(score)`,

  task: `
<p>Rewrite the list-handling code in Rust:</p>
<ol>
  <li><code>make_scores()</code> returns a <code>Vec&lt;i32&gt;</code>
      containing <code>10, 20, 30</code> — use the <code>vec!</code> macro,
      the literal syntax that plays the role of <code>[10, 20, 30]</code>.</li>
  <li><code>append(v: &amp;mut Vec&lt;i32&gt;, x: i32)</code> adds
      <code>x</code> to the end of <code>v</code>. Python's
      <code>.append</code> is Rust's <code>.push</code>, and it only works
      through a mutable reference.</li>
  <li><code>total(v: &amp;[i32]) -&gt; i32</code> returns the sum of the
      elements. Your <code>sum(v)</code> instinct transfers almost directly:
      <code>v.iter().sum()</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. make_scores: return a Vec<i32> holding 10, 20, 30.
//    Python: [10, 20, 30]  ->  Rust: vec![10, 20, 30]
fn make_scores() -> Vec<i32> {
    todo!()
}

// 2. append: Python's v.append(x) is v.push(x) — through a &mut reference.
fn append(v: &mut Vec<i32>, x: i32) {
    todo!()
}

// 3. total: Python's sum(v) is v.iter().sum() in Rust.
fn total(v: &[i32]) -> i32 {
    todo!()
}
`,

  requirements: [
    { pattern: /vec!\s*\[/, message: "Use the vec! macro to build the vector" },
    { pattern: /\.push\(/, message: "Use .push() to append (Python's .append)" },
    { pattern: /Vec<i32>/, message: "Work with the Vec<i32> type" },
  ],

  tests: [
    { name: "make_scores() returns vec![10, 20, 30]",
      code: "assert_eq!(make_scores(), vec![10, 20, 30]);" },
    { name: "append adds an element to the end",
      code: "let mut v = make_scores();\nappend(&mut v, 40);\nassert_eq!(v, vec![10, 20, 30, 40]);" },
    { name: "append works on an empty vector",
      code: "let mut v: Vec<i32> = Vec::new();\nappend(&mut v, 7);\nassert_eq!(v, vec![7]);" },
    { name: "total(&make_scores()) is 60",
      code: "assert_eq!(total(&make_scores()), 60);" },
    { name: "total of an empty slice is 0",
      code: "assert_eq!(total(&[]), 0);" },
  ],

  solution: `fn make_scores() -> Vec<i32> {
    vec![10, 20, 30]
}

fn append(v: &mut Vec<i32>, x: i32) {
    v.push(x);
}

fn total(v: &[i32]) -> i32 {
    v.iter().sum()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Literal</td><td><code>[10, 20, 30]</code></td><td><code>vec![10, 20, 30]</code></td></tr>
  <tr><td>Append</td><td><code>v.append(x)</code></td><td><code>v.push(x)</code> — vector must be <code>mut</code></td></tr>
  <tr><td>Length</td><td><code>len(v)</code></td><td><code>v.len()</code></td></tr>
  <tr><td>Safe index</td><td><code>v[i]</code> raises <code>IndexError</code></td><td><code>v.get(i)</code> returns <code>Option&lt;&amp;T&gt;</code></td></tr>
  <tr><td>Sum</td><td><code>sum(v)</code></td><td><code>v.iter().sum()</code></td></tr>
  <tr><td>Iterate</td><td><code>for x in v:</code></td><td><code>for x in &amp;v {}</code></td></tr>
  <tr><td>Mixed types</td><td><code>[1, "two", None]</code> is fine</td><td>One element type per <code>Vec</code>, checked at compile time</td></tr>
</table>
<p>Notice that <code>total</code> takes <code>&amp;[i32]</code> — a slice —
rather than <code>&amp;Vec&lt;i32&gt;</code>. It's the same instinct as typing
a Python parameter as <code>Sequence[int]</code> instead of
<code>list[int]</code>: accept the most general "some contiguous ints" view,
and callers can pass a borrowed vector (<code>&amp;v</code>), an array, or a
sub-slice. Indexing with <code>v[i]</code> still exists and still panics past
the end, exactly like <code>IndexError</code>; <code>v.get(i)</code> is how
you say "this might be out of range" without crashing — it returns an
<code>Option</code>, which Lesson 8 covers in full.</p>`,
};
