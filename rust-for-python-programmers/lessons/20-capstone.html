  intro: `
<p>Twenty lessons ago, <code>let</code> refused to let you mutate a variable.
Now you own the whole toolkit: structs for shape, <code>Option</code> instead
of <code>None</code>-crashes, iterator chains instead of loops-with-appends,
<code>&amp;</code> to look and <code>&amp;mut</code> to touch, and lifetimes
naming whose data a reference borrows. The capstone is a small inventory
system that uses every one of them — the kind of code you'd write in Python
with a <code>@dataclass</code> and a handful of comprehensions, translated
idiom for idiom.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>sum(i.price_cents * i.count for i in items)</code></td><td><code>items.iter().map(|i| ...).sum()</code></td></tr>
  <tr><td><code>next((i for i in items if ...), None)</code></td><td><code>items.iter().find(|i| ...)</code> → <code>Option&lt;&amp;Item&gt;</code></td></tr>
  <tr><td>mutate freely, return <code>bool</code></td><td><code>&amp;mut Vec&lt;Item&gt;</code> — mutation declared in the signature</td></tr>
  <tr><td><code>[i.name for i in items if i.count &gt; 0]</code></td><td><code>.iter().filter(...).map(...).collect()</code></td></tr>
</table>
<p>Two things to notice as you write it. <code>find_item</code> returns
<code>Option&lt;&amp;'a Item&gt;</code> — a <em>borrowed</em> view into the
slice, and the <code>'a</code> from Lesson 16 says exactly that: the result
lives only as long as the slice it points into. And <code>restock</code>
takes <code>&amp;mut Vec&lt;Item&gt;</code> — where Python mutation is
invisible at the call site, Rust callers see <code>&amp;mut items</code> and
know. Nothing new here; this is just everything at once.</p>`,

  python: `from dataclasses import dataclass

@dataclass
class Item:
    name: str
    price_cents: int
    count: int

def total_value(items: list[Item]) -> int:
    return sum(i.price_cents * i.count for i in items)

def find_item(items: list[Item], name: str) -> Item | None:
    return next((i for i in items if i.name == name), None)

def restock(items: list[Item], name: str, amount: int) -> bool:
    item = find_item(items, name)
    if item is None:
        return False
    item.count += amount
    return True

def names_in_stock(items: list[Item]) -> list[str]:
    return [i.name for i in items if i.count > 0]`,

  task: `
<p>The <code>Item</code> struct is done; implement the four functions:</p>
<ol>

  <li><code>find_item&lt;'a&gt;(items: &amp;'a [Item], name: &amp;str) -&gt;

</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions

assert_eq!(names_in_stock(&[]), Vec::<String>::new());` },
  ],

  solution: `struct Item {
    name: String,
    price_cents: u32,
    count: u32,
}

fn total_value(items: &[Item]) -> u32 {
    items.iter().map(|i| i.price_cents * i.count).sum()
}

fn find_item<'a>(items: &'a [Item], name: &str) -> Option<&'a Item> {
    items.iter().find(|i| i.name == name)
}

fn restock(items: &mut Vec<Item>, name: &str, amount: u32) -> bool {
    for item in items.iter_mut() {
        if item.name == name {
            item.count += amount;
            return true;
        }
    }
    false
}

fn names_in_stock(items: &[Item]) -> Vec<String> {
    items
        .iter()
        .filter(|i| i.count > 0)
        .map(|i| i.name.clone())
        .collect()
}
`,

  notes: `
<table>
  <tr><th>Pattern</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Record type</td><td><code>@dataclass class Item:</code></td><td><code>struct Item { ... }</code></td></tr>
  <tr><td>Aggregate</td><td><code>sum(... for i in items)</code></td><td><code>.iter().map(...).sum()</code></td></tr>
  <tr><td>Find-or-None</td><td><code>next((i for i in ... if ...), None)</code></td><td><code>.iter().find(...)</code> → <code>Option&lt;&amp;Item&gt;</code></td></tr>
  <tr><td>Filtered projection</td><td><code>[i.name for i in items if ...]</code></td><td><code>.iter().filter(...).map(...).collect()</code></td></tr>
  <tr><td>Mutation</td><td>implicit — any function might</td><td><code>&amp;mut</code> in the signature, <code>&amp;mut items</code> at the call</td></tr>
  <tr><td>Borrowed result</td><td>every reference, GC-managed</td><td><code>Option&lt;&amp;'a Item&gt;</code> — tied to the slice's life</td></tr>
</table>
<p>Look back at what changed and what didn't. The <em>logic</em> is
line-for-line the Python you started with — same comprehension shapes, same
find-or-None, same early-return restock. What changed is that every implicit
Python contract became explicit and checked: absence is <code>Option</code>,
not a crash waiting on a <code>None</code>; mutation is visible at every call
site; and the borrowed <code>&amp;'a Item</code> can never outlive the
inventory it points into. That's the trade this course has been selling —
you spell out what Python leaves implicit, and in exchange the compiler
catches at build time what Python catches in production. Welcome to Rust;
you're ready for real projects, <code>cargo new</code> awaits.</p>`,
