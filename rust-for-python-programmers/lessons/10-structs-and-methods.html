<script>
const LESSON = {
  number: 10,
  title: "Structs & Methods",

  intro: `
<p>A Python <code>class</code> bundles data and behavior in one block. Rust
splits them: a <code>struct</code> declares the data (fields and their types
— no surprise attributes appearing in <code>__init__</code>), and an
<code>impl</code> block attaches the behavior. There's no constructor
keyword; by convention you write an associated function called
<code>new</code> — your <code>__init__</code> — and call it as
<code>BankAccount::new("Ada")</code>.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>class BankAccount:</code></td><td><code>struct BankAccount { ... }</code> + <code>impl BankAccount { ... }</code></td></tr>
  <tr><td><code>def __init__(self, owner):</code></td><td><code>fn new(owner: &amp;str) -&gt; BankAccount</code></td></tr>
  <tr><td><code>acct = BankAccount("Ada")</code></td><td><code>let mut acct = BankAccount::new("Ada");</code></td></tr>
  <tr><td><code>def deposit(self, amount):</code></td><td><code>fn deposit(&amp;mut self, amount: i64)</code></td></tr>
  <tr><td><code>def get_balance(self):</code></td><td><code>fn balance(&amp;self) -&gt; i64</code></td></tr>
</table>
<p>The <code>self</code> parameter looks familiar, but it carries new
information: <code>&amp;self</code> means "this method only reads", and
<code>&amp;mut self</code> means "this method mutates". In Python, nothing
distinguishes a getter from a method that silently rewrites half the object's
state — here, every method <em>declares</em> whether it mutates, the compiler
verifies the body against the claim, and you can only call
<code>&amp;mut self</code> methods on a <code>mut</code> binding. One habit to
leave behind: structs don't form inheritance hierarchies. There's no base
class to extend — shared behavior comes from traits (Lesson 12), and Rust code
reaches for composition where Python might subclass.</p>`,

  python: `class BankAccount:
    def __init__(self, owner: str) -> None:
        self.owner = owner
        self.balance = 0

    def deposit(self, amount: int) -> None:
        self.balance += amount     # nothing marks this as mutating

    def withdraw(self, amount: int) -> None:
        if amount > self.balance:
            raise ValueError("insufficient funds")
        self.balance -= amount

    def get_balance(self) -> int:
        return self.balance

acct = BankAccount("Ada")
acct.deposit(100)
acct.withdraw(40)
print(acct.get_balance())          # 60`,

  task: `
<p>The <code>struct BankAccount</code> definition is already complete in the
starter — write the <code>impl</code> block's methods:</p>
<ol>
  <li><code>new(owner: &amp;str) -&gt; BankAccount</code> — the
      <code>__init__</code>: store the owner (convert with
      <code>owner.to_string()</code>) and start <code>balance</code> at 0.</li>
  <li><code>deposit(&amp;mut self, amount: i64)</code> — add
      <code>amount</code> to the balance. It mutates, so it takes
      <code>&amp;mut self</code>.</li>
  <li><code>withdraw(&amp;mut self, amount: i64) -&gt; Result&lt;(), String&gt;</code>
      — if <code>amount</code> exceeds the balance, return an
      <code>Err</code> (the <code>ValueError</code> you'd raise, as a value)
      and leave the balance unchanged; otherwise subtract and return
      <code>Ok(())</code>.</li>
  <li><code>balance(&amp;self) -&gt; i64</code> — return the balance. It only
      reads, so plain <code>&amp;self</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your methods
directly.</p>`,

  starter: `// The data half is done — fields and types, all declared up front.
struct BankAccount {
    owner: String,
    balance: i64,
}

// The behavior half: fill in each method.
impl BankAccount {
    // 1. new: the __init__ by convention. Build and return a BankAccount
    //    with owner.to_string() and balance 0.
    fn new(owner: &str) -> BankAccount {
        todo!()
    }

    // 2. deposit mutates, so it declares &mut self.
    fn deposit(&mut self, amount: i64) {
        todo!()
    }

    // 3. withdraw: Err(...) instead of raise ValueError when funds are short.
    fn withdraw(&mut self, amount: i64) -> Result<(), String> {
        todo!()
    }

    // 4. balance only reads — &self is enough.
    fn balance(&self) -> i64 {
        todo!()
    }
}
`,

  requirements: [
    { pattern: /struct\s+BankAccount/, message: "Keep the BankAccount struct (the data half)" },
    { pattern: /impl\s+BankAccount/, message: "Put the methods in an impl BankAccount block" },
    { pattern: /&mut\s+self/, message: "Mutating methods must declare &mut self" },
  ],

  tests: [
    { name: 'new("Ada") sets the owner and a zero balance',
      code: 'let acct = BankAccount::new("Ada");\nassert_eq!(acct.owner, "Ada");\nassert_eq!(acct.balance(), 0);' },
    { name: "deposit adds to the balance",
      code: 'let mut acct = BankAccount::new("Ada");\nacct.deposit(100);\nacct.deposit(50);\nassert_eq!(acct.balance(), 150);' },
    { name: "withdraw subtracts and returns Ok",
      code: 'let mut acct = BankAccount::new("Ada");\nacct.deposit(100);\nassert!(acct.withdraw(40).is_ok());\nassert_eq!(acct.balance(), 60);' },
    { name: "withdraw of more than the balance is an Err",
      code: 'let mut acct = BankAccount::new("Grace");\nassert!(acct.withdraw(100).is_err());' },
    { name: "a failed withdraw leaves the balance unchanged",
      code: 'let mut acct = BankAccount::new("Grace");\nacct.deposit(30);\nlet _ = acct.withdraw(100);\nassert_eq!(acct.balance(), 30);' },
  ],

  solution: `struct BankAccount {
    owner: String,
    balance: i64,
}

impl BankAccount {
    fn new(owner: &str) -> BankAccount {
        BankAccount {
            owner: owner.to_string(),
            balance: 0,
        }
    }

    fn deposit(&mut self, amount: i64) {
        self.balance += amount;
    }

    fn withdraw(&mut self, amount: i64) -> Result<(), String> {
        if amount > self.balance {
            return Err(String::from("insufficient funds"));
        }
        self.balance -= amount;
        Ok(())
    }

    fn balance(&self) -> i64 {
        self.balance
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Data + behavior</td><td>one <code>class</code> block</td><td><code>struct</code> (data) + <code>impl</code> (behavior)</td></tr>
  <tr><td>Constructor</td><td><code>__init__</code>, called as <code>BankAccount("Ada")</code></td><td><code>fn new(...)</code> by convention, called as <code>BankAccount::new("Ada")</code></td></tr>
  <tr><td>Read-only method</td><td><code>def get_balance(self):</code></td><td><code>fn balance(&amp;self) -&gt; i64</code></td></tr>
  <tr><td>Mutating method</td><td><code>def deposit(self, ...):</code> — looks identical</td><td><code>fn deposit(&amp;mut self, ...)</code> — declared</td></tr>
  <tr><td>Failure in a method</td><td><code>raise ValueError(...)</code></td><td><code>-&gt; Result&lt;(), String&gt;</code>, return <code>Err(...)</code></td></tr>
  <tr><td>Fields</td><td>whatever <code>__init__</code> (or anyone) assigns</td><td>declared once in the <code>struct</code>, fixed</td></tr>
  <tr><td>Code reuse</td><td>inheritance (<code>class Savings(BankAccount)</code>)</td><td>traits &amp; composition — no subclassing</td></tr>
</table>
<p>The <code>&amp;self</code> / <code>&amp;mut self</code> split is Lesson 5's
borrowing applied to methods, and it pays off at the call site: seeing
<code>acct.balance()</code> in a code review, you <em>know</em> it didn't
change anything, because its signature says so and the compiler checked the
body. No more guessing which innocuously named method mutates state. Note
also that <code>self.balance</code> (field) and <code>self.balance()</code>
(method) coexist — fields and methods live in separate namespaces, so the
Python <code>get_</code> prefix convention isn't needed.</p>`,
};
</script>
