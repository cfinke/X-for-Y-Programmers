const LESSON = {
  number: 2,
  title: "Functions & Control Flow",

  intro: `
<p>You already write <code>def f(x: int) -&gt; str:</code> — Rust's
<code>fn f(x: i32) -&gt; String</code> is the same shape, same arrow, but now
the signature is a contract the compiler enforces, not a hint. The body swaps
indentation for braces and statements end with semicolons, but the layout of
a function will feel immediately familiar.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>def f(x: int) -&gt; str:</code></td><td><code>fn f(x: i32) -&gt; String {</code></td></tr>
  <tr><td>indentation delimits the body</td><td><code>{ }</code> braces delimit the body</td></tr>
  <tr><td><code>a if a &gt; b else b</code></td><td><code>if a &gt; b { a } else { b }</code></td></tr>
  <tr><td><code>return x</code></td><td>last expression, no semicolon (or <code>return x;</code> for early exits)</td></tr>
</table>
<p>The big conceptual upgrade: in Rust, <em>everything is an expression</em>.
Python's ternary <code>m = a if a &gt; b else b</code> becomes
<code>let m = if a &gt; b { a } else { b };</code> — the whole
<code>if</code> produces a value, so there's no separate ternary syntax to
learn. The same rule powers returns: a block's last expression (written
<em>without</em> a semicolon) is the block's value. It reads like Python's
implicit <code>return None</code>, except principled — the value is whatever
you left on the last line, and the compiler checks it matches the arrow.</p>`,

  python: `def max_of(a: int, b: int) -> int:
    return a if a > b else b

def grade(score: int) -> str:
    if score >= 60:
        return "pass"
    return "fail"

def sign(n: int) -> int:
    if n > 0:
        return 1
    elif n < 0:
        return -1
    else:
        return 0`,

  task: `
<p>Translate the three Python functions to Rust:</p>
<ol>
  <li><code>max_of</code> takes <code>a: i32</code> and <code>b: i32</code>
      and returns <code>i32</code>. Bind the result of an
      <code>if</code>-expression to a local with <code>let</code>
      (the ternary, Rust-style), then make that local the function's final
      expression. Don't use the <code>return</code> keyword anywhere.</li>
  <li><code>grade</code> takes <code>score: u32</code> and returns
      <code>String</code>: <code>"pass"</code> for scores of 60 and above,
      <code>"fail"</code> below. (Turn a <code>&amp;str</code> literal into a
      <code>String</code> with <code>.to_string()</code>.)</li>
  <li><code>sign</code> takes <code>n: i32</code> and returns <code>i32</code>:
      <code>1</code> if positive, <code>-1</code> if negative, <code>0</code>
      otherwise — <code>else if</code> is Rust's <code>elif</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. max_of: Python's \`a if a > b else b\`, but the if IS the expression.
//    Bind it with \`let\`, return it as the last line — no \`return\` keyword.
fn max_of(a: i32, b: i32) -> i32 {
    todo!()
}

// 2. grade: "pass" for 60 and above, "fail" below. Return a String.
fn grade(score: u32) -> String {
    todo!()
}

// 3. sign: 1 if positive, -1 if negative, 0 otherwise. \`else if\` = elif.
fn sign(n: i32) -> i32 {
    todo!()
}
`,

  requirements: [
    { pattern: /->/, message: "Give your functions return types with ->" },
    { pattern: /=\s*if\b/, message: "Bind the result of an if-expression with let x = if ..." },
  ],

  tests: [
    { name: "max_of(3, 7) returns 7",
      code: "assert_eq!(max_of(3, 7), 7);" },
    { name: "max_of(10, -2) returns 10",
      code: "assert_eq!(max_of(10, -2), 10);" },
    { name: 'grade(75) returns "pass" and grade(60) returns "pass"',
      code: 'assert_eq!(grade(75), "pass");\nassert_eq!(grade(60), "pass");' },
    { name: 'grade(59) returns "fail"',
      code: 'assert_eq!(grade(59), "fail");' },
    { name: "sign(42) returns 1 and sign(-3) returns -1",
      code: "assert_eq!(sign(42), 1);\nassert_eq!(sign(-3), -1);" },
    { name: "sign(0) returns 0",
      code: "assert_eq!(sign(0), 0);" },
  ],

  solution: `fn max_of(a: i32, b: i32) -> i32 {
    let bigger = if a > b { a } else { b };
    bigger
}

fn grade(score: u32) -> String {
    let result = if score >= 60 { "pass" } else { "fail" };
    result.to_string()
}

fn sign(n: i32) -> i32 {
    if n > 0 {
        1
    } else if n < 0 {
        -1
    } else {
        0
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Function definition</td><td><code>def f(x: int) -&gt; str:</code></td><td><code>fn f(x: i32) -&gt; String { }</code></td></tr>
  <tr><td>Body delimiter</td><td>indentation</td><td>braces + semicolons</td></tr>
  <tr><td>Ternary</td><td><code>a if cond else b</code></td><td><code>if cond { a } else { b }</code> (just an if)</td></tr>
  <tr><td>elif</td><td><code>elif cond:</code></td><td><code>else if cond { }</code></td></tr>
  <tr><td>Return</td><td><code>return x</code> (or implicit <code>None</code>)</td><td>last expression without a semicolon</td></tr>
  <tr><td>Condition parens</td><td><code>if x &gt; 0:</code></td><td><code>if x &gt; 0 {</code> — also no parens!</td></tr>
</table>
<p>The semicolon is doing real work here: <code>1</code> is an expression
that produces a value, while <code>1;</code> is a statement that discards it.
Look at <code>sign</code> — the whole <code>if/else if/else</code> chain is
one expression, each arm ends without a semicolon, and that expression is the
function's return value. Once this clicks, <code>return</code> starts to look
like what it really is in Rust: an early-exit tool, not the normal way out.</p>`,
};
