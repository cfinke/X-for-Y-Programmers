const LESSON = {
  number: 15,
  title: "Slices, Tuples & Destructuring",

  intro: `
<p>Python tuples map to Rust almost one-to-one. <code>(3, 4)</code> is
<code>(3, 4)</code>; the difference is that Rust's has a type —
<code>(i32, i32)</code> — fixing the arity and each position's type at
compile time. Access uses <code>.0</code> and <code>.1</code> instead of
<code>[0]</code> and <code>[1]</code> (positions are part of the type, so
they're fields, not indices), and your unpacking instincts carry straight
over: <code>x, y = point</code> becomes <code>let (x, y) = point;</code>,
and the beloved <code>a, b = b, a</code> swap is the same trick,
parenthesized.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>point = (3, 4)</code></td><td><code>let point: (i32, i32) = (3, 4);</code></td></tr>
  <tr><td><code>point[0]</code>, <code>point[1]</code></td><td><code>point.0</code>, <code>point.1</code></td></tr>
  <tr><td><code>x, y = point</code></td><td><code>let (x, y) = point;</code></td></tr>
  <tr><td><code>a, b = b, a</code></td><td><code>let (a, b) = (b, a);</code></td></tr>
  <tr><td><code>v[1:3]</code> (copies to a new list)</td><td><code>&amp;v[1..3]</code> (borrowed view, type <code>&amp;[i32]</code>)</td></tr>
</table>
<p>Slices you've been using all course without the name: <code>&amp;[i32]</code>
is the type behind every <code>fn f(v: &amp;[i32])</code> you've written.
It's what Python slicing <em>gestures at</em> — a view of a sequence — except
<code>v[1:3]</code> copies elements into a fresh list, while
<code>&amp;v[1..3]</code> is a borrowed window into the original: no copy,
can't outlive the data, and one parameter type that accepts a whole
<code>Vec</code>, an array, or a sub-range of either. Indexing still works
(<code>v[0]</code>), lengths come from <code>v.len()</code>, and
<code>v[v.len() - 1]</code> stands in for Python's <code>v[-1]</code> —
negative indexing didn't make the trip.</p>`,

  python: `import math

def swap(pair: tuple[int, int]) -> tuple[int, int]:
    a, b = pair
    return b, a

def distance(p: tuple[float, float], q: tuple[float, float]) -> float:
    x1, y1 = p
    x2, y2 = q
    return math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2)

def ends(v: list[int]) -> tuple[int, int]:
    return v[0], v[-1]     # no negative indexing in Rust!

point = (3, 4)
x, y = point               # unpacking
a, b = 1, 2
a, b = b, a                # the classic swap`,

  task: `
<p>Translate the three tuple-and-slice functions:</p>
<ol>
  <li><code>swap(pair: (i32, i32)) -&gt; (i32, i32)</code> — destructure with
      <code>let (a, b) = pair;</code> and return <code>(b, a)</code>.</li>
  <li><code>distance(p: (f64, f64), q: (f64, f64)) -&gt; f64</code> —
      destructure both points with <code>let (x, y)</code> bindings, then
      Pythagoras: <code>.powi(2)</code> is <code>** 2</code> and
      <code>.sqrt()</code> is <code>math.sqrt</code>, both methods on
      <code>f64</code>. The 3-4-5 triangle must come out exactly
      <code>5.0</code>.</li>
  <li><code>ends(v: &amp;[i32]) -&gt; (i32, i32)</code> — return the first and
      last elements as a tuple: <code>v[0]</code> and
      <code>v[v.len() - 1]</code> (no <code>v[-1]</code>). Assume the slice
      is non-empty.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// Python: a, b = pair; return b, a
fn swap(pair: (i32, i32)) -> (i32, i32) {
    todo!()
}

// Destructure both tuples, then Pythagoras:
// (dx * dx + dy * dy).sqrt(), or use .powi(2) for squaring.
fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    todo!()
}

// First and last: v[0] and v[v.len() - 1]. No v[-1] in Rust.
fn ends(v: &[i32]) -> (i32, i32) {
    todo!()
}
`,

  requirements: [
    { pattern: /\(\s*f64\s*,\s*f64\s*\)/, message: "distance should take (f64, f64) tuple parameters" },
    { pattern: /let\s*\(/, message: "Destructure a tuple with a let (x, y) = … binding" },
    { pattern: /&\[i32\]/, message: "ends should take a borrowed slice, &[i32]" },
  ],

  tests: [
    { name: "swap((1, 2)) returns (2, 1)",
      code: "assert_eq!(swap((1, 2)), (2, 1));" },
    { name: "swap((-5, 0)) returns (0, -5)",
      code: "assert_eq!(swap((-5, 0)), (0, -5));" },
    { name: "distance((0.0, 0.0), (3.0, 4.0)) is exactly 5.0 (3-4-5 triangle)",
      code: "assert_eq!(distance((0.0, 0.0), (3.0, 4.0)), 5.0);" },
    { name: "distance from a point to itself is 0.0",
      code: "assert_eq!(distance((1.5, -2.0), (1.5, -2.0)), 0.0);" },
    { name: "ends(&[10, 20, 30]) returns (10, 30)",
      code: "assert_eq!(ends(&[10, 20, 30]), (10, 30));" },
    { name: "ends(&[7]) returns (7, 7)",
      code: "assert_eq!(ends(&[7]), (7, 7));" },
  ],

  solution: `fn swap(pair: (i32, i32)) -> (i32, i32) {
    let (a, b) = pair;
    (b, a)
}

fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    let (x1, y1) = p;
    let (x2, y2) = q;
    ((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()
}

fn ends(v: &[i32]) -> (i32, i32) {
    (v[0], v[v.len() - 1])
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Tuple literal</td><td><code>(3, 4)</code></td><td><code>(3, 4)</code> — typed <code>(i32, i32)</code></td></tr>
  <tr><td>Positional access</td><td><code>t[0]</code>, <code>t[1]</code></td><td><code>t.0</code>, <code>t.1</code></td></tr>
  <tr><td>Unpacking</td><td><code>x, y = point</code></td><td><code>let (x, y) = point;</code></td></tr>
  <tr><td>Swap</td><td><code>a, b = b, a</code></td><td><code>let (a, b) = (b, a);</code></td></tr>
  <tr><td>Sequence view</td><td><code>v[1:3]</code> (a copy)</td><td><code>&amp;v[1..3]</code> (a borrow, type <code>&amp;[i32]</code>)</td></tr>
  <tr><td>Last element</td><td><code>v[-1]</code></td><td><code>v[v.len() - 1]</code>, or <code>v.last()</code> → <code>Option</code></td></tr>
  <tr><td>Return two values</td><td><code>return a, b</code></td><td><code>(a, b)</code></td></tr>
</table>
<p>The unifying idea: <code>let (x, y) = point;</code> isn't a special
unpacking statement — the left side of every <code>let</code> is a
<em>pattern</em>, the same machinery as <code>match</code> arms from the
enums lesson. Tuples are how Rust returns multiple values, exactly like
Python's <code>return a, b</code> (which was a tuple all along, too). And
prefer <code>&amp;[i32]</code> over <code>&amp;Vec&lt;i32&gt;</code> in every
signature you write — it costs nothing and accepts vectors, arrays, and
slices of both alike.</p>`,
};
