<div id="app"></div>
<script>
const LESSON = {
  number: 7,
  title: "Union Types",

  intro: `
<p>When a Go function must accept "an int <em>or</em> a string", the escape
hatch is <code>interface{}</code> (today spelled <code>any</code>) plus a type
switch. It works, but the type system checks out at the boundary: the caller
can pass a <code>float64</code>, a <code>bool</code>, or a live goroutine, and
the compiler shrugs. You find out at runtime, in the <code>default</code>
branch — if you remembered to write one.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>func F(id interface{})</code> — accepts anything</td><td><code>function f(id: number | string)</code> — accepts exactly two types</td></tr>
  <tr><td><code>switch v := id.(type) { case int: ... }</code></td><td><code>if (typeof id === "number") { ... }</code></td></tr>
  <tr><td><code>default:</code> branch for illegal input, at runtime</td><td>Illegal input rejected at the call site, at compile time</td></tr>
  <tr><td>Inside <code>case int:</code>, <code>v</code> is an <code>int</code></td><td>Inside the <code>typeof</code> branch, <code>id</code> is a <code>number</code></td></tr>
</table>
<p>A TypeScript union type keeps the checking: <code>number | string</code> is
a <em>closed set</em>. Callers can pass those two types and nothing else, so
the <code>default: return error</code> branch simply disappears. Inside the
function, a <code>typeof</code> check works exactly like Go's type switch —
the compiler <em>narrows</em> <code>id</code> to <code>number</code> in one
branch and <code>string</code> in the other, and it verifies you handled every
member of the union. Same idiom, but the contract holds on both sides of the
call.</p>`,

  go: `// The Go escape hatch: accept anything, sort it out at runtime.
func FormatID(id interface{}) (string, error) {
	switch v := id.(type) {
	case int:
		return fmt.Sprintf("ID-%04d", v), nil
	case string:
		return "ID-" + strings.ToUpper(v), nil
	default:
		// The compiler let the bad value in; we bounce it here.
		return "", fmt.Errorf("unsupported id type %T", id)
	}
}

func main() {
	s, _ := FormatID(42)     // "ID-0042"
	t, _ := FormatID("abc")  // "ID-ABC"
	_, err := FormatID(3.14) // compiles fine; fails at runtime
	fmt.Println(s, t, err)
}`,

  task: `
<p>Port <code>FormatID</code> with the boundary check restored:</p>
<ol>
  <li>Change the parameter of <code>formatId</code> from <code>any</code>
      (Go's <code>interface{}</code>) to the union
      <code>id: number | string</code>, returning <code>string</code>.</li>
  <li>Narrow with <code>typeof id === "number"</code> — TypeScript's type
      switch. For numbers, return <code>"ID-"</code> plus the number
      zero-padded to at least 4 digits
      (<code>String(id).padStart(4, "0")</code>). Longer numbers stay as-is:
      <code>12345</code> → <code>"ID-12345"</code>.</li>
  <li>In the other branch the compiler already knows <code>id</code> is a
      <code>string</code>: return <code>"ID-"</code> plus the string
      uppercased. No <code>default</code> branch, no error return — a
      <code>boolean</code> can't get in.</li>
</ol>
<p>After it works, try calling <code>formatId(3.14 &gt; 0)</code> in the
editor: the mistake Go's <code>default:</code> catches at runtime is a red
squiggle here.</p>`,

  starter: `// Right now this parameter is Go's interface{} — anything gets in,
// and the compiler checks nothing inside the function either.
// 1. TODO: change any to the closed set: number | string
function formatId(id: any): string {
  // 2. TODO: narrow with typeof (the type switch):
  //    number -> "ID-" + zero-padded to 4 digits
  //    string -> "ID-" + uppercased
  return "";
}

console.log(formatId(42));    // want "ID-0042"
console.log(formatId("abc")); // want "ID-ABC"
`,

  exportNames: ["formatId"],

  requirements: [
    { pattern: /formatId\s*\(\s*id\s*:\s*(number\s*\|\s*string|string\s*\|\s*number)\s*\)/, message: "Declare formatId with the union parameter id: number | string" },
    { pattern: /typeof\s+id\s*===?\s*["'](number|string)["']/, message: "Narrow with a typeof check — TypeScript's type switch" },
  ],

  tests: [
    { name: 'formatId(42) returns "ID-0042"', run: (x) => expectEqual(x.formatId(42), "ID-0042") },
    { name: 'formatId(7) returns "ID-0007"', run: (x) => expectEqual(x.formatId(7), "ID-0007") },
    { name: 'formatId(12345) returns "ID-12345" — padding is a minimum, not a truncation', run: (x) => expectEqual(x.formatId(12345), "ID-12345") },
    { name: 'formatId("abc") returns "ID-ABC"', run: (x) => expectEqual(x.formatId("abc"), "ID-ABC") },
    { name: 'formatId("x9") returns "ID-X9"', run: (x) => expectEqual(x.formatId("x9"), "ID-X9") },
  ],

  solution: `function formatId(id: number | string): string {
  if (typeof id === "number") {
    // In this branch, id is a number — narrowed, like case int:
    return "ID-" + String(id).padStart(4, "0");
  }
  // Only string is left in the union; no default branch needed.
  return "ID-" + id.toUpperCase();
}

console.log(formatId(42));
console.log(formatId("abc"));
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>"int or string" parameter</td><td><code>id interface{}</code> (anything, really)</td><td><code>id: number | string</code> (exactly those)</td></tr>
  <tr><td>Branch on the type</td><td><code>switch v := id.(type)</code></td><td><code>if (typeof id === "number")</code> or <code>switch (typeof id)</code></td></tr>
  <tr><td>Inside a branch</td><td><code>v</code> has the case's type</td><td><code>id</code> is narrowed — no new variable needed</td></tr>
  <tr><td>Illegal argument</td><td>Compiles; hits <code>default:</code> at runtime</td><td>Compile error at the call site</td></tr>
  <tr><td>Forgot a case</td><td>Silent fallthrough to <code>default:</code></td><td>Compiler knows what's left; unhandled members are type errors</td></tr>
</table>
<p>The key mental shift: a union is not "give up on types", it is a
<em>closed set</em> the compiler reasons about. Every <code>typeof</code>
check subtracts members from the set, so after handling <code>number</code>
the compiler <em>knows</em> only <code>string</code> remains and lets you call
<code>.toUpperCase()</code> unguarded. Unions also compose with everything
else you've seen — lesson 6's <code>User | undefined</code> was already a
union, and lesson 17 builds Go's kind-field struct pattern into exhaustive
tagged unions.</p>`,
};
