<div id="app"></div>
<script>
const LESSON = {
  number: 17,
  title: "Discriminated Unions",

  intro: `
<p>Go gives you two ways to model "a shape is a circle <em>or</em> a rectangle
<em>or</em> a triangle", and both leak. Option one is the fat struct: a
<code>Kind</code> field plus every variant's fields side by side, where
nothing stops a "circle" from carrying a <code>Width</code> or a rectangle
from having <code>Radius: 5</code> silently ignored. Option two is an
interface plus a type switch — cleaner, but not exhaustive: add a
<code>Triangle</code> type next month, forget one switch, and you get zero
values or a fallthrough. Silence, not an error.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Fat struct: <code>Kind</code> + all fields of all variants</td><td>Each variant is its own exact shape; illegal fields don't compile</td></tr>
  <tr><td><code>switch s.Kind { case "circle": ... }</code> — strings, unchecked</td><td><code>switch (s.kind)</code> on literal types — each case narrows <code>s</code></td></tr>
  <tr><td>Missed case → zero value / silent fallthrough</td><td>Missed case → <code>never</code> default is a <em>compile error</em></td></tr>
  <tr><td>New variant: grep every switch and hope</td><td>New variant: the compiler lists every switch you must update</td></tr>
</table>
<p>A TypeScript <em>discriminated union</em> (tagged union) keeps the
<code>Kind</code>-field idiom but makes the compiler enforce it. Each variant
declares its tag as a <em>literal type</em> — <code>kind: "circle"</code>,
not <code>kind: string</code> — and only its own fields. Switching on
<code>shape.kind</code> narrows <code>shape</code> per branch, exactly like
lesson 16. The payoff is the <code>default</code> branch: assign the leftover
<code>shape</code> to a variable of type <code>never</code> ("no value can
exist here"). If every case is handled, that assignment type-checks; forget a
case and the leftover variant does not fit into <code>never</code> —
a compile error that names the variant you missed.</p>`,

  go: `// The fat-struct pattern: one struct carries every variant's fields.
type Shape struct {
	Kind   string  // "circle", "rectangle", "triangle" — by convention
	Radius float64 // circles only (rectangles get a junk zero)
	Width  float64 // rectangles only
	Height float64 // rectangles and triangles
	Base   float64 // triangles only
}

func Area(s Shape) float64 {
	switch s.Kind {
	case "circle":
		return math.Pi * s.Radius * s.Radius
	case "rectangle":
		return s.Width * s.Height
	case "triangle":
		return s.Base * s.Height / 2
	}
	return 0 // forgot a Kind? You get 0 — silently.
}`,

  task: `
<p>Rebuild <code>Shape</code> so every leak above becomes a compile error:</p>
<ol>
  <li>Declare three interfaces — <code>Circle</code> with
      <code>kind: "circle"</code> and <code>radius: number</code>;
      <code>Rectangle</code> with <code>kind: "rectangle"</code>,
      <code>width</code> and <code>height</code>; <code>Triangle</code> with
      <code>kind: "triangle"</code>, <code>base</code> and
      <code>height</code>. The tag is a <em>literal type</em>: the string is
      the type.</li>
  <li>Combine them: <code>type Shape = Circle | Rectangle | Triangle;</code></li>
  <li>Write <code>area(shape: Shape): number</code> with a
      <code>switch (shape.kind)</code> — circle is
      <code>Math.PI * r * r</code>, rectangle <code>width * height</code>,
      triangle <code>base * height / 2</code>.</li>
  <li>In the <code>default</code> branch, write the exhaustiveness lock:
      <code>const impossible: never = shape; return impossible;</code>
      Now delete a case and watch it fail to compile — Go's silent
      <code>return 0</code>, upgraded to a named error.</li>
</ol>`,

  starter: `// 1. TODO: one interface per variant. The tag is a literal type:
//    kind: "circle" — not kind: string.
interface Circle {
  kind: string; // TODO: narrow to the literal "circle"
  radius: number;
}
// TODO: add Rectangle (width, height) and Triangle (base, height)

// 2. TODO: the closed set — Go's fat struct, split into exact shapes.
type Shape = Circle; // TODO: Circle | Rectangle | Triangle

// 3. + 4. TODO: switch on shape.kind; each case narrows shape.
//    Finish with the never-typed default so a missed case can't compile.
function area(shape: Shape): number {
  return 0;
}
`,

  exportNames: ["area"],

  requirements: [
    { pattern: /kind\s*:\s*"/, message: 'Tag each variant with a literal type: kind: "circle" (the string is the type)' },
    { pattern: /type\s+Shape\s*=\s*\w+\s*\|/, message: "Define Shape as a union of the three variant interfaces" },
    { pattern: /switch\s*\(/, message: "Branch with a switch on shape.kind — Go's Kind switch, but narrowing" },
    { pattern: /never/, message: "Add a never-typed default branch so a forgotten case is a compile error" },
  ],

  tests: [
    { name: "area of a circle with radius 2 is Math.PI * 4", run: (x) => expectEqual(x.area({ kind: "circle", radius: 2 }), Math.PI * 4) },
    { name: "area of a 3 x 4 rectangle is 12", run: (x) => expectEqual(x.area({ kind: "rectangle", width: 3, height: 4 }), 12) },
    { name: "area of a triangle with base 10, height 6 is 30", run: (x) => expectEqual(x.area({ kind: "triangle", base: 10, height: 6 }), 30) },
    { name: "area of a unit circle (radius 1) is Math.PI", run: (x) => expectEqual(x.area({ kind: "circle", radius: 1 }), Math.PI) },
  ],

  solution: `interface Circle {
  kind: "circle";
  radius: number;
}

interface Rectangle {
  kind: "rectangle";
  width: number;
  height: number;
}

interface Triangle {
  kind: "triangle";
  base: number;
  height: number;
}

type Shape = Circle | Rectangle | Triangle;

function area(shape: Shape): number {
  switch (shape.kind) {
    case "circle":
      // shape is Circle here — .radius exists, .width does not.
      return Math.PI * shape.radius * shape.radius;
    case "rectangle":
      return shape.width * shape.height;
    case "triangle":
      return (shape.base * shape.height) / 2;
    default: {
      // Exhaustiveness lock: if a case is missing, the leftover
      // variant won't assign to never and this line won't compile.
      const impossible: never = shape;
      return impossible;
    }
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Variant data</td><td>Fat struct with unused fields, or interface + concrete types</td><td>One exact interface per variant</td></tr>
  <tr><td>The tag</td><td><code>Kind string</code> — any string compiles</td><td><code>kind: "circle"</code> — literal type, typo = compile error</td></tr>
  <tr><td>Branching</td><td><code>switch s.Kind</code> or <code>switch v := s.(type)</code></td><td><code>switch (s.kind)</code> — narrows <code>s</code> in each case</td></tr>
  <tr><td>Wrong field access</td><td>Compiles; reads a zero value</td><td>Compile error outside the right branch</td></tr>
  <tr><td>Missing case</td><td>Silent zero / fallthrough at runtime</td><td><code>never</code> default fails to compile, names the variant</td></tr>
</table>
<p>This is the single biggest safety upgrade over the Go idioms you know:
the fat struct's "which fields are real?" question and the type switch's
"did I cover everything?" question both become compiler questions. When you
add a <code>Pentagon</code> variant to <code>Shape</code>, you don't grep —
you recompile, and every switch missing a <code>case "pentagon":</code>
fails on its <code>never</code> line. State machines, API responses, and
event types all want this shape.</p>`,
};
</script>
