  intro: `
<p>Last mechanic, then the capstone. In Go, visibility is spelled with a
shift key: <code>AddItem</code> is public because it is capitalized,
<code>total</code> is private because it is not, and the unit of privacy is
the <em>package</em> — every file in the directory sees everything.
TypeScript uses ES modules: each <em>file</em> is its own scope, everything
is private by default, and you publish a symbol with the <code>export</code>
keyword. Naming and visibility decouple — <code>deposit</code> can stay
lowercase (idiomatic camelCase) and still be public.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>func AddItem(...)</code> — capital letter = exported</td><td><code>export function addItem(...)</code> — keyword = exported, name is free</td></tr>
  <tr><td><code>func total(...)</code> — lowercase = package-private</td><td><code>function total(...)</code> — no export = file-private</td></tr>
  <tr><td><code>import "shop/inventory"</code> then <code>inventory.AddItem</code></td><td><code>import { addItem } from "./inventory"</code> — names come in directly</td></tr>
  <tr><td>Scope of privacy: the package (directory)</td><td>Scope of privacy: the single file</td></tr>
  <tr><td><code>go.mod</code> + <code>go get</code></td><td><code>package.json</code> + <code>npm install</code></td></tr>
</table>
<p>Now the capstone: build a small inventory module that uses one tool from
each part of the course — an <code>interface</code> for the data shape, a
generic function with a constraint, array methods instead of loops, spread
instead of mutation, and <code>typeof</code> narrowing on a union — with
every public symbol published via <code>export</code>. (In this editor there
is no second file to <code>import</code> from, so write only the exports;
the tests import you, so to speak.)</p>`,

  go: `// inventory/inventory.go
package inventory

// Capitalized = exported; lowercase = private to the package.
type Product struct {
	ID    int
	Name  string
	Price float64
}

func AddItem(cart []Product, p Product) []Product {
	return append(cart, p)
}

func CartTotal(cart []Product) float64 {
	sum := 0.0
	for _, p := range cart {
		sum += p.Price
	}
	return sum
}

// elsewhere: import "shop/inventory"  ->  inventory.AddItem(...)`,

  solution: `// Everything public is published with export — no capital letters
// required. Anything without export stays private to this file.
export interface Product {
  id: number;
  name: string;
  price: number;
}

export function addItem(cart: Product[], item: Product): Product[] {
  // Spread, not push: the caller's cart is untouched.
  return [...cart, item];
}

export function cartTotal(cart: Product[]): number {
  return cart.reduce((sum, p) => sum + p.price, 0);
}

// Generic with a constraint — Go's [T any] plus an interface, in one.
export function findById<T extends { id: number }>(
  items: T[],
  id: number
): T | undefined {
  return items.find((item) => item.id === id);
}

export function describeItem(value: Product | string): string {
  if (typeof value === "string") {
    return "Unknown item: " + value;
  }
  // Narrowed: value is a Product here.
  return value.name + " ($" + value.price.toFixed(2) + ")";
}
`,

<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Make something public</td><td>Capitalize it: <code>AddItem</code></td><td><code>export function addItem</code></td></tr>
  <tr><td>Keep something private</td><td>lowercase: <code>total</code></td><td>Just don't export it</td></tr>
  <tr><td>Privacy boundary</td><td>The package (whole directory)</td><td>The single file</td></tr>
  <tr><td>Consume</td><td><code>import "shop/inventory"</code>; qualified <code>inventory.AddItem</code></td><td><code>import { addItem } from "./inventory"</code>; unqualified</td></tr>
  <tr><td>Dependencies</td><td><code>go.mod</code>, <code>go get</code></td><td><code>package.json</code>, <code>npm install</code></td></tr>
  <tr><td>Entry point</td><td><code>package main</code>, <code>func main()</code></td><td>Whatever file you tell node/the bundler to run</td></tr>
</table>
<p>That completes the course, and the capstone is the course in miniature:
an interface where Go had a struct, a constrained generic where Go had
<code>[T any]</code>, <code>reduce</code> where Go had
<code>for range</code> with an accumulator, spread where Go had
<code>append</code>, and <code>typeof</code> narrowing where Go had a type
switch. The through-line is the compiler moving work off your shoulders:
exhaustiveness, absence, mutation, and visibility are all things you
<em>declare</em> in TypeScript where in Go you <em>police</em> them by
convention. Keep writing Go on the backend — but let tsc be as paranoid as
you always were.</p>`,
