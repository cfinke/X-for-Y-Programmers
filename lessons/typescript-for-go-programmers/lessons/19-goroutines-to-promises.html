  number: 19,
  title: "Async & Promises",

  intro: `
<p>Concurrency is where the mental model flips hardest. Go gives you many
threads of execution: fire goroutines with <code>go func()</code>, pass
results through channels, wait with a <code>sync.WaitGroup</code>, and guard
shared writes with a mutex — or eat a data race. JavaScript has <em>one</em>
thread and an event loop. Nothing preempts your code; instead, slow
operations return a <code>Promise&lt;T&gt;</code> immediately, and
<code>await</code> parks the current function (not the thread) until the
value arrives. Think of <code>Promise&lt;T&gt;</code> as a channel that
yields exactly once, and <code>await</code> as the receive.</p>
<table>
  <tr><th>Go</th><th>TypeScript</th></tr>
  <tr><td><code>go fetchUser(id)</code> + a channel for the result</td><td><code>const p = fetchUser(id)</code> — calling it already "goes"; p is the one-shot channel</td></tr>
  <tr><td><code>u := &lt;-ch</code> — blocks the goroutine</td><td><code>const u = await p</code> — parks this function, thread keeps running</td></tr>
  <tr><td><code>wg.Add / wg.Wait</code> + slice + mutex to fan out</td><td><code>await Promise.all(promises)</code> — wait + collect, in order, one call</td></tr>
  <tr><td><code>u, err := fetchUser(id); if err != nil { ... }</code></td><td><code>try { await fetchUser(id) } catch (err) { ... }</code></td></tr>
</table>
<p>Because there is only one thread, the whole hazard class you budget for in
Go disappears: no mutexes, no data races, no <code>select</code>, no
"forgot to <code>wg.Add</code>". Fan-out becomes
<code>Promise.all(ids.map(fetchUser))</code> — every fetch is already in
flight, and <code>Promise.all</code> is the WaitGroup <em>and</em> the
results slice in one call (first rejection wins, like returning the first
error). And where Go returns <code>err</code> as a value, a rejected promise
<em>throws</em> at the <code>await</code> — <code>try/catch</code> is your
<code>if err != nil</code>.</p>`,

  go: `// Fan out, wait, collect: goroutines + WaitGroup + shared slice.
func FetchUserNames(ids []int) ([]string, error) {
	names := make([]string, len(ids))
	var wg sync.WaitGroup
	var firstErr error
	for i, id := range ids {
		wg.Add(1)
		go func(i, id int) {
			defer wg.Done()
			u, err := fetchUser(id)
			if err != nil {
				firstErr = err // data race! really needs a mutex
				return
			}
			names[i] = u.Name
		}(i, id)
	}
	wg.Wait()
	return names, firstErr
}`,

const USERS: Record<number, string> = { 1: "Ada", 2: "Grace", 3: "Linus" };

  requirements: [

  solution: `interface User {
  id: number;
  name: string;
}

const USERS: Record<number, string> = { 1: "Ada", 2: "Grace", 3: "Linus" };

function fetchUser(id: number): Promise<User> {
  return Promise.resolve().then(() => {
    const name = USERS[id];
    if (name === undefined) {
      throw new Error("user " + id + " not found");
    }
    return { id: id, name: name };
  });
}

async function fetchUserNames(ids: number[]): Promise<string[]> {
  // .map(fetchUser) launches every fetch — each call is a go statement.
  // Promise.all is wg.Wait() plus the results slice, order preserved;
  // a rejection propagates like returning the first err.
  const users = await Promise.all(ids.map((id) => fetchUser(id)));
  return users.map((u) => u.name);
}

async function fetchNameOrGuest(id: number): Promise<string> {
  try {
    const user = await fetchUser(id);
    return user.name;
  } catch (err) {
    return "guest"; // the err != nil branch
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>TypeScript</th></tr>
  <tr><td>Start async work</td><td><code>go f(x)</code></td><td><code>const p = f(x)</code> — calling an async function starts it</td></tr>
  <tr><td>One-shot result</td><td><code>ch := make(chan T, 1)</code></td><td><code>Promise&lt;T&gt;</code></td></tr>
  <tr><td>Receive</td><td><code>v := &lt;-ch</code> (blocks the goroutine)</td><td><code>const v = await p</code> (parks the function only)</td></tr>
  <tr><td>Fan out + join</td><td>WaitGroup + slice + mutex</td><td><code>await Promise.all(ps)</code></td></tr>
  <tr><td>First of several</td><td><code>select { ... }</code></td><td><code>await Promise.race(ps)</code></td></tr>
  <tr><td>Error path</td><td><code>v, err := f(); if err != nil</code></td><td><code>try { await f() } catch (err)</code></td></tr>
  <tr><td>Data races</td><td>Possible; run -race and pray</td><td>Impossible between awaits — one thread</td></tr>
</table>
<p>The trap to unlearn: <code>await</code> looks like blocking but is not —
while your function is parked, the event loop runs everything else, which is
why one thread keeps up with thousands of connections. The trap to keep from
Go: sequential awaits are sequential, exactly like calling two functions
without <code>go</code>. <code>await a(); await b();</code> is a pipeline of
two round trips — if they are independent, start both first and
<code>Promise.all</code> them, just as you would fire two goroutines before
waiting.</p>`,
