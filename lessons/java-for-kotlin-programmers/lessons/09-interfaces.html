<script>
const LESSON = {
  number: 9,
  title: "Interfaces",

  intro: `
<p>You already think in interfaces. Kotlin's <code>interface</code> is a
nominal contract — a class only satisfies it if it explicitly says
<code>: Shape</code> — and Java interfaces work the same way, just with more
ceremony. A class only satisfies a Java interface if it explicitly says
<code>implements</code>.</p>
<table>
  <tr><th>Kotlin</th><th>Java</th></tr>
  <tr><td><code>interface Shape { fun area(): Double }</code></td><td><code>interface Shape { double area(); }</code></td></tr>
  <tr><td>nominal — must write <code>: Shape</code></td><td>nominal — must write <code>implements Shape</code></td></tr>
  <tr><td>a body-having function is just a normal member with a default implementation</td><td><code>default</code> methods carry a body</td></tr>
  <tr><td><code>class C : A, B</code></td><td><code>class C implements A, B</code></td></tr>
</table>
<p>Two Java specifics worth internalizing. First, an interface method with no body
is implicitly <code>public abstract</code>; the implementing class must mark its
version <code>public</code> (Kotlin members are <code>public</code> by default, so
this often feels like extra boilerplate). Second, a <code>default</code> method
lets the interface ship a real implementation — Java's answer to what Kotlin
gives you for free with an interface function body — so every implementer gets
it unless it overrides. As in Kotlin, the payoff is <em>programming to the
interface</em>: declare variables and parameters as the interface type and let
the concrete class vary underneath.</p>`,

  kotlin: `interface Shape {
    fun area(): Double
    fun describe(): String = "A shape with area \${area()}"
}

class Rectangle(private val width: Double, private val height: Double) : Shape {
    override fun area(): Double = width * height
}

val s: Shape = Rectangle(3.0, 4.0)
println(s.area()) // 12.0`,

  task: `
<p>Model shapes behind an interface, then program to that interface.</p>
<ol>
  <li>Declare an interface <code>Shape</code> with an abstract method
      <code>double area()</code> and a <code>default</code> method
      <code>String describe()</code> that returns
      <code>"A shape with area " + area()</code>.</li>
  <li>Declare an interface <code>Named</code> with a method
      <code>String name()</code>.</li>
  <li><code>Rectangle</code> implements <code>Shape</code> (constructor takes
      <code>width</code> and <code>height</code>).</li>
  <li><code>Circle</code> implements <em>both</em> <code>Shape</code> and
      <code>Named</code> (constructor takes <code>radius</code>;
      <code>name()</code> returns <code>"circle"</code>).</li>
  <li>Remember: methods that satisfy an interface must be declared
      <code>public</code>.</li>
</ol>`,

  starter: `interface Shape {
  double area();

  default String describe() {
    return ""; // TODO: use area()
  }
}

interface Named {
  String name();
}

class Rectangle implements Shape {
  Rectangle(double width, double height) {
    // TODO: store the dimensions
  }

  public double area() {
    return 0; // TODO
  }
}

class Circle implements Shape, Named {
  Circle(double radius) {
    // TODO: store the radius
  }

  public double area() {
    return 0; // TODO
  }

  public String name() {
    return ""; // TODO
  }
}
`,

  requirements: [
    { pattern: /interface\s+Shape/, message: "Declare an interface named Shape" },
    { pattern: /default\s+String\s+describe\s*\(/, message: "Give Shape a default describe() method" },
    { pattern: /class\s+Circle\s+implements\s+Shape\s*,\s*Named/, message: "Circle must implement both Shape and Named" },
  ],

  tests: [
    { name: "Rectangle area via the Shape type is 12.0", code: "      Shape r = new Rectangle(3, 4);\n      expect_eq(r.area(), 12.0);" },
    { name: "default describe() reports the area", code: "      Shape r = new Rectangle(3, 4);\n      expect_eq(r.describe(), \"A shape with area 12.0\");" },
    { name: "Circle area via the Shape type is about PI*r^2", code: "      Shape c = new Circle(2);\n      expect_true(Math.abs(c.area() - Math.PI * 4) < 1e-9);" },
    { name: "Circle satisfies Named", code: "      Named n = new Circle(2);\n      expect_eq(n.name(), \"circle\");" },
    { name: "program to the interface: sum a List<Shape>", code: "      List<Shape> shapes = List.of(new Rectangle(2, 3), new Rectangle(4, 5), new Circle(0));\n      double total = shapes.stream().mapToDouble(Shape::area).sum();\n      expect_eq(total, 26.0);" },
  ],

  solution: `interface Shape {
  double area();

  default String describe() {
    return "A shape with area " + area();
  }
}

interface Named {
  String name();
}

class Rectangle implements Shape {
  private final double width;
  private final double height;

  Rectangle(double width, double height) {
    this.width = width;
    this.height = height;
  }

  public double area() {
    return width * height;
  }
}

class Circle implements Shape, Named {
  private final double radius;

  Circle(double radius) {
    this.radius = radius;
  }

  public double area() {
    return Math.PI * radius * radius;
  }

  public String name() {
    return "circle";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Java</th></tr>
  <tr><td>Satisfy a contract</td><td><code>class C : Shape</code> (explicit)</td><td><code>implements Shape</code> (explicit)</td></tr>
  <tr><td>Abstract method</td><td><code>fun area(): Double</code></td><td><code>double area();</code></td></tr>
  <tr><td>Method with a body</td><td>interface function with a default body</td><td><code>default</code> method in the interface</td></tr>
  <tr><td>Multiple contracts</td><td><code>: A, B</code></td><td><code>implements A, B</code></td></tr>
  <tr><td>Implementer visibility</td><td>public by default</td><td>must be <code>public</code></td></tr>
</table>
<p>Because Java interfaces are nominal, the compiler catches a missing
<code>implements</code> immediately — you cannot "accidentally" satisfy a
<code>Shape</code>, same as Kotlin catches a missing <code>: Shape</code>.
<code>default</code> methods are how the standard library evolves without
breaking implementers (<code>List</code> gained <code>sort</code>,
<code>Iterable</code> gained <code>forEach</code>) — the same role Kotlin's
interface function bodies play. And once a variable is typed as
<code>Shape</code>, the call site neither knows nor cares whether it holds a
<code>Circle</code> or a <code>Rectangle</code> — that is polymorphism, exactly
as in Kotlin, just with the contract spelled out.</p>`,
};
