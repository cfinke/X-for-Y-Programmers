const LESSON = {
  number: 10,
  title: "Inheritance & Abstract Classes",

  intro: `
<p>Kotlin and Java share the same object model: a class inherits from a base,
delegates to a superclass constructor, and overrides methods. The differences
are in the defaults and the ceremony. In Kotlin, classes and members are
<code>final</code> by default — you must mark them <code>open</code> before
anything can subclass or override them. Java flips that default: classes and
methods are open unless you mark them <code>final</code>, and it has a real
<code>abstract</code> keyword for classes and methods plus a
<code>@Override</code> annotation the compiler actually enforces. Neither
language has structural typing — a subtype relationship exists only if you
wrote <code>: Base</code> (Kotlin) or <code>extends</code> (Java).</p>
<table>
  <tr><th>Kotlin</th><th>Java</th></tr>
  <tr><td><code>class Dog(name: String) : Animal(name)</code></td><td><code>class Dog extends Animal</code></td></tr>
  <tr><td><code>: Animal(name)</code></td><td><code>super(name);</code></td></tr>
  <tr><td><code>super.speak()</code></td><td><code>super.speak();</code></td></tr>
  <tr><td><code>abstract class</code> / <code>abstract fun m(): T</code></td><td><code>abstract class</code> / <code>abstract T m();</code></td></tr>
  <tr><td><code>x is Dog</code></td><td><code>x instanceof Dog</code></td></tr>
</table>
<p>Two things trip up newcomers coming from Kotlin. First, Kotlin's
<code>override</code> keyword is mandatory, while Java's <code>@Override</code>
is optional — but you should always write it: if the signature does not
actually match a superclass method, the compiler errors instead of silently
creating a new method. Second, Java's <code>final</code> does double duty: on a
field or local it means "assign once" (like Kotlin's <code>val</code>), and on
a class or method it forbids subclassing or overriding — the very restriction
Kotlin applies by default and you'd normally lift with <code>open</code>.</p>`,

  kotlin: `abstract class Employee(protected val name: String) {
    abstract fun basePay(): Double
    open fun totalPay(): Double = basePay()
    fun describe(): String = "$name: \${totalPay()}"
}

class Manager(name: String, private val bonus: Double) : Employee(name) {
    override fun basePay(): Double = 8000.0
    override fun totalPay(): Double = super.totalPay() + bonus
}`,

  task: `
<p>Build a small employee hierarchy that exercises every inheritance feature.</p>
<ol>
  <li>An <code>abstract class Employee</code> with a <code>final</code> field
      <code>name</code>, a constructor that sets it, an
      <code>abstract double basePay()</code>, a concrete
      <code>double totalPay()</code> that returns <code>basePay()</code>, and a
      <code>String describe()</code> returning <code>name + ": " + totalPay()</code>
      (e.g. <code>"Ada: 5000.0"</code>).</li>
  <li>A <code>Developer extends Employee</code> whose constructor calls
      <code>super(name)</code> and whose <code>basePay()</code> (marked
      <code>@Override</code>) returns <code>5000</code>.</li>
  <li>A <code>Manager extends Employee</code> with an extra <code>double bonus</code>.
      Its <code>basePay()</code> returns <code>8000</code>, and its
      <code>totalPay()</code> returns <code>super.totalPay() + bonus</code>.</li>
  <li>A class <code>Payroll</code> with static <code>double totalPayroll(Employee[] emps)</code>
      (sum of every <code>totalPay()</code>) and
      <code>int countManagers(Employee[] emps)</code> using
      <code>instanceof</code>.</li>
</ol>`,

`,

  requirements: [
    { pattern: /abstract\s+class\s+Employee/, message: "Make Employee an abstract class" },
    { pattern: /extends\s+Employee/, message: "Have Developer and Manager extend Employee" },
    { pattern: /instanceof/, message: "Use instanceof to count managers" },
  ],

  tests: [
    { name: "Developer.totalPay() is 5000.0", code: "      expect_eq(new Developer(\"Ada\").totalPay(), 5000.0);" },
    { name: "Manager.totalPay() adds bonus via super", code: "      expect_eq(new Manager(\"Rob\", 2000).totalPay(), 10000.0);" },
    { name: "describe() uses name and totalPay", code: "      expect_eq(new Manager(\"Rob\", 2000).describe(), \"Rob: 10000.0\");" },
    { name: "polymorphism: Employee ref calls override", code: "      Employee e = new Manager(\"Sue\", 500);\n      expect_eq(e.totalPay(), 8500.0);" },
    { name: "Payroll.totalPayroll sums the team", code: "      Employee[] team = { new Developer(\"A\"), new Manager(\"B\", 1000) };\n      expect_eq(Payroll.totalPayroll(team), 14000.0);" },
    { name: "Payroll.countManagers uses instanceof", code: "      Employee[] team = { new Developer(\"A\"), new Manager(\"B\", 1000), new Manager(\"C\", 0) };\n      expect_eq(Payroll.countManagers(team), 2);" },
    { name: "a Manager is an Employee", code: "      expect_true(new Manager(\"X\", 0) instanceof Employee);" },
  ],

  solution: `abstract class Employee {
  protected final String name;

  protected Employee(String name) {
    this.name = name;
  }

  abstract double basePay();

  double totalPay() {
    return basePay();
  }

  String describe() {
    return name + ": " + totalPay();
  }
}

class Developer extends Employee {
  Developer(String name) {
    super(name);
  }

  @Override
  double basePay() {
    return 5000;
  }
}

class Manager extends Employee {
  private final double bonus;

  Manager(String name, double bonus) {
    super(name);
    this.bonus = bonus;
  }

  @Override
  double basePay() {
    return 8000;
  }

  @Override
  double totalPay() {
    return super.totalPay() + bonus;
  }
}

class Payroll {
  static double totalPayroll(Employee[] emps) {
    double sum = 0;
    for (Employee e : emps) {
      sum += e.totalPay();
    }
    return sum;
  }

  static int countManagers(Employee[] emps) {
    int count = 0;
    for (Employee e : emps) {
      if (e instanceof Manager) {
        count++;
      }
    }
    return count;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Java</th></tr>
  <tr><td>Subclass</td><td><code>class B(...) : A(...)</code></td><td><code>class B extends A</code></td></tr>
  <tr><td>Super constructor</td><td><code>: A(x)</code></td><td><code>super(x);</code></td></tr>
  <tr><td>Super method</td><td><code>super.m()</code></td><td><code>super.m()</code></td></tr>
  <tr><td>Mark an override</td><td><code>override fun m()</code> (mandatory)</td><td><code>@Override</code> (optional, compiler-checked)</td></tr>
  <tr><td>Abstract member</td><td><code>abstract fun m(): T</code></td><td><code>abstract T m();</code></td></tr>
  <tr><td>No subclassing</td><td>default, unless marked <code>open</code></td><td><code>final class</code> / <code>final</code> method</td></tr>
  <tr><td>Runtime type check</td><td><code>x is B</code></td><td><code>x instanceof B</code></td></tr>
</table>
<p>Polymorphism works exactly like Kotlin: an <code>Employee</code> reference
holding a <code>Manager</code> runs <code>Manager.totalPay()</code>. The
biggest mental flip coming from Kotlin is the default direction: Kotlin
classes and members are closed to inheritance unless marked <code>open</code>,
while Java classes and methods are open unless marked <code>final</code>.
Java's <code>@Override</code> is optional (Kotlin's <code>override</code> is
mandatory) but you should always write it — it catches typos in method names
that would otherwise silently create a new method instead of overriding one.
Note that a class with even one <code>abstract</code> method must itself be
<code>abstract</code> and cannot be instantiated with <code>new</code>, just
as in Kotlin.</p>`,
};
