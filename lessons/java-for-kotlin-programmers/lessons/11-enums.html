const LESSON = {
  number: 11,
  title: "Enums",

  intro: `
<p>Kotlin enum classes are already full classes, much like Java's — each
constant is a singleton object that can carry properties, run through a
constructor, and expose methods. The syntax is more compact than Java's,
though: constructor parameters become <code>val</code> properties directly in
the class header, so there is no separate field declaration plus assignment
step.</p>
<table>
  <tr><th>Kotlin</th><th>Java</th></tr>
  <tr><td><code>enum class Status { TODO, DONE }</code></td><td><code>enum Status { TODO, DONE }</code></td></tr>
  <tr><td>constant is a full object (singleton)</td><td>constant is a full object (singleton)</td></tr>
  <tr><td><code>Status.values()</code> / <code>entries</code></td><td><code>Status.values()</code> built in</td></tr>
  <tr><td><code>Status.valueOf("DONE")</code></td><td><code>Status.valueOf("DONE")</code></td></tr>
  <tr><td><code>when (status) { ... }</code></td><td><code>switch (status) { ... }</code></td></tr>
</table>
<p>Because every constant is an object in both languages, you can attach data
directly to it. A <code>Planet</code> enum can store its mass and radius, take
those through a constructor, and expose a <code>surfaceGravity()</code> method
that computes a value per constant. Two built-ins come for free:
<code>values()</code> returns every constant, and <code>valueOf(String)</code>
parses a name back into a constant (throwing if it does not match). And a
<code>switch</code> over an enum needs no <code>default</code> when it covers
every case — Kotlin's <code>when</code> gets the same treatment.</p>`,

  kotlin: `enum class Planet(private val mass: Double, private val radius: Double) {
  MERCURY(3.303e+23, 2.4397e6),
  VENUS(4.869e+24, 6.0518e6),
  EARTH(5.976e+24, 6.37814e6),
  MARS(6.421e+23, 3.3972e6);

  companion object {
    const val G = 6.673e-11
  }

  fun surfaceGravity(): Double = G * mass / (radius * radius)
}`,

  task: `
<p>Model the inner planets as a Java <code>enum</code> that carries data and
computes gravity per constant:</p>
<ol>
  <li>Declare an <code>enum Planet</code> with constants
      <code>MERCURY</code>, <code>VENUS</code>, <code>EARTH</code>,
      <code>MARS</code>, each given a mass (kg) and radius (m).</li>
  <li>Add <code>private final</code> fields for mass and radius, plus a
      constructor that stores them (<code>this.mass = mass;</code>).</li>
  <li>Add <code>double surfaceGravity()</code> returning
      <code>G * mass / (radius * radius)</code>, with
      <code>static final double G = 6.67300e-11;</code>.</li>
  <li>Add <code>double surfaceWeight(double otherMass)</code> returning
      <code>otherMass * surfaceGravity()</code>.</li>
  <li>Add <code>String kind()</code> that uses a <code>switch</code> over
      <code>this</code>: <code>MERCURY</code> and <code>MARS</code> are
      <code>"small rocky"</code>; <code>VENUS</code> and <code>EARTH</code> are
      <code>"large rocky"</code>.</li>
</ol>
<p>Suggested data: MERCURY (3.303e23, 2.4397e6), VENUS (4.869e24, 6.0518e6),
EARTH (5.976e24, 6.37814e6), MARS (6.421e23, 3.3972e6).</p>`,

  starter: `enum Planet {
  MERCURY(3.303e+23, 2.4397e6),
  VENUS(4.869e+24, 6.0518e6),
  EARTH(5.976e+24, 6.37814e6),
  MARS(6.421e+23, 3.3972e6);

  static final double G = 6.67300e-11;

  private final double mass;
  private final double radius;

  Planet(double mass, double radius) {
    this.mass = 0;   // TODO: store mass
    this.radius = 0; // TODO: store radius
  }

  double surfaceGravity() {
    return 0; // TODO
  }

  double surfaceWeight(double otherMass) {
    return 0; // TODO
  }

  String kind() {
    return ""; // TODO: switch over this
  }
}
`,

  requirements: [
    { pattern: /enum\s+Planet/, message: "Declare an enum named Planet" },
    { pattern: /this\.mass|this\.radius/, message: "Store per-constant data via the constructor (this.mass = ...)" },
    { pattern: /switch/, message: "Use a switch over the enum inside kind()" },
  ],

  tests: [
    { name: 'EARTH.name() is "EARTH"', code: "      expect_eq(Planet.EARTH.name(), \"EARTH\");" },
    { name: "values() has 4 planets", code: "      expect_eq(Planet.values().length, 4);" },
    { name: 'valueOf("MARS") is Planet.MARS', code: "      expect_true(Planet.valueOf(\"MARS\") == Planet.MARS);" },
    { name: "EARTH surface gravity is about 9.8", code: "      expect_true(Math.abs(Planet.EARTH.surfaceGravity() - 9.8) < 0.1);" },
    { name: "surfaceWeight scales with gravity", code: "      expect_true(Math.abs(Planet.EARTH.surfaceWeight(75.0) - 75.0 * Planet.EARTH.surfaceGravity()) < 1e-9);" },
    { name: 'MARS.kind() is "small rocky"', code: "      expect_eq(Planet.MARS.kind(), \"small rocky\");" },
    { name: 'EARTH.kind() is "large rocky"', code: "      expect_eq(Planet.EARTH.kind(), \"large rocky\");" },
  ],

  solution: `enum Planet {
  MERCURY(3.303e+23, 2.4397e6),
  VENUS(4.869e+24, 6.0518e6),
  EARTH(5.976e+24, 6.37814e6),
  MARS(6.421e+23, 3.3972e6);

  static final double G = 6.67300e-11;

  private final double mass;   // kilograms
  private final double radius; // meters

  Planet(double mass, double radius) {
    this.mass = mass;
    this.radius = radius;
  }

  double surfaceGravity() {
    return G * mass / (radius * radius);
  }

  double surfaceWeight(double otherMass) {
    return otherMass * surfaceGravity();
  }

  String kind() {
    return switch (this) {
      case MERCURY, MARS -> "small rocky";
      case VENUS, EARTH -> "large rocky";
    };
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Java</th></tr>
  <tr><td>Declare</td><td><code>enum class E { A, B }</code></td><td><code>enum E { A, B }</code></td></tr>
  <tr><td>All values</td><td><code>E.values()</code> / <code>E.entries</code></td><td><code>E.values()</code></td></tr>
  <tr><td>Parse a name</td><td><code>E.valueOf(name)</code></td><td><code>E.valueOf(name)</code></td></tr>
  <tr><td>Name of a constant</td><td><code>E.A.name</code></td><td><code>E.A.name()</code></td></tr>
  <tr><td>Attach data</td><td>constructor properties on the enum class</td><td>fields + constructor on the enum</td></tr>
  <tr><td>Exhaustive branch</td><td><code>when</code> (no else needed)</td><td><code>switch</code> (no default needed)</td></tr>
</table>
<p>The mental shift here is smaller than coming from most other languages: a
Kotlin enum constant is already a full object, exactly like a Java one. What
differs is ceremony. Kotlin lets constructor parameters become properties in
one line (<code>Planet(private val mass: Double, ...)</code>), where Java
needs an explicit field declaration plus a separate assignment inside the
constructor body (<code>this.mass = mass;</code>). <code>valueOf</code>
throws in both languages on an unknown name
(<code>IllegalArgumentException</code>), and both a Kotlin <code>when</code>
and a Java <code>switch</code> that cover every constant are checked for
exhaustiveness by the compiler.</p>`,
};
