  title: "Arrays & Lists",

  intro: `
<p>Kotlin already draws a line between arrays and lists — <code>IntArray</code>
or <code>Array&lt;T&gt;</code> is fixed-size, while <code>MutableList&lt;T&gt;</code>
(commonly an <code>ArrayList</code> under the hood) grows with <code>add</code>.
Java draws the same line, just with more ceremony. A <code>T[]</code> array has
a <em>fixed length</em> chosen when you create it, while
<code>ArrayList&lt;T&gt;</code> (the <code>List&lt;T&gt;</code> interface) is the
growable, <code>add</code>-friendly collection you will reach for most of the
time.</p>
<table>
  <tr><th>Kotlin</th><th>Java</th></tr>
  <tr><td><code>val a: IntArray = intArrayOf(1, 2, 3)</code></td><td><code>int[] a = {1, 2, 3};</code></td></tr>
  <tr><td><code>IntArray(n)</code></td><td><code>new int[n]</code> (fixed length)</td></tr>
  <tr><td><code>a.size</code></td><td><code>a.length</code> (a field, no <code>()</code>)</td></tr>
  <tr><td><code>list.add(x)</code></td><td><code>list.add(x)</code> (on a <code>List</code>)</td></tr>
  <tr><td><code>a[i]</code> / <code>list.size</code></td><td><code>list.get(i)</code> / <code>list.size()</code></td></tr>
</table>
<p>Two things trip up newcomers. First, a Java array can hold primitives
(<code>int[]</code>) but a <code>List</code> can only hold objects, so you write
<code>List&lt;Integer&gt;</code>, not <code>List&lt;int&gt;</code> — Java autoboxes
<code>int</code> to <code>Integer</code> for you, much like Kotlin's
<code>Int</code> gets boxed when it goes into a generic <code>List&lt;Int&gt;</code>
instead of an <code>IntArray</code>. Second, <code>array.length</code>
is a field with no parentheses, but <code>list.size()</code> is a method call —
Kotlin's <code>.size</code> property hides that distinction on both sides.
Reach for an array when the size is fixed and known; reach for
<code>ArrayList</code>/<code>List</code> whenever it grows.</p>`,

  kotlin: `fun squares(n: Int): IntArray {
    val out = IntArray(n)
    for (i in 0 until n) out[i] = i * i
    return out
}

fun contains(xs: IntArray, value: Int): Boolean {
    return xs.contains(value)
}`,

  task: `
<p>Write a class <code>Lists</code> with <code>static</code> methods that exercise
both a fixed array and a growable list:</p>
<ol>
  <li><code>sum(int[] nums)</code> returns the total. Loop with

  <li><code>squares(int n)</code> returns an <code>int[]</code> of length
      <code>n</code> where element <code>i</code> is <code>i * i</code>. Create it
      with <code>new int[n]</code>.</li>
  <li><code>evens(int limit)</code> returns a <code>List&lt;Integer&gt;</code> of
      the even numbers from <code>0</code> up to (but not including)
      <code>limit</code>. Build a <code>new ArrayList&lt;&gt;()</code> and
      <code>add</code> to it.</li>
  <li><code>has(List&lt;Integer&gt; xs, int value)</code> returns whether the list
      contains <code>value</code> (use <code>contains</code>).</li>
  <li><code>primaryColors()</code> returns an immutable
      <code>List&lt;String&gt;</code> equal to <code>["red", "green", "blue"]</code>
      using <code>List.of(...)</code>.</li>
</ol>`,

`,

  requirements: [
    { pattern: /new\s+int\s*\[/, message: "Create the array with new int[n]" },
    { pattern: /new\s+ArrayList\s*<\s*>\s*\(/, message: "Build a growable list with new ArrayList<>()" },
    { pattern: /List\s*\.\s*of\s*\(/, message: "Return an immutable list with List.of(...)" },
  ],

  tests: [
    { name: "sum({1,2,3,4}) is 10", code: "      expect_eq(Lists.sum(new int[]{1, 2, 3, 4}), 10);" },
    { name: "squares(4) has length 4 and last element 9", code: "      int[] sq = Lists.squares(4);\n      expect_eq(sq.length, 4);\n      expect_eq(sq[3], 9);" },
    { name: "evens(10) is [0, 2, 4, 6, 8]", code: "      expect_eq(Lists.evens(10), List.of(0, 2, 4, 6, 8));" },
    { name: "evens(10) size is 5", code: "      expect_eq(Lists.evens(10).size(), 5);" },
    { name: "has finds present and missing values", code: "      expect_true(Lists.has(List.of(1, 2, 3), 2));\n      expect_true(!Lists.has(List.of(1, 2, 3), 9));" },
    { name: "primaryColors() is [red, green, blue]", code: "      expect_eq(Lists.primaryColors(), List.of(\"red\", \"green\", \"blue\"));" },
  ],

  solution: `class Lists {
  static int sum(int[] nums) {
    int total = 0;
    for (int i = 0; i < nums.length; i++) {
      total += nums[i];
    }
    return total;
  }

  static int[] squares(int n) {
    int[] out = new int[n];
    for (int i = 0; i < n; i++) {
      out[i] = i * i;
    }
    return out;
  }

  static List<Integer> evens(int limit) {
    List<Integer> out = new ArrayList<>();
    for (int i = 0; i < limit; i += 2) {
      out.add(i);
    }
    return out;
  }

  static boolean has(List<Integer> xs, int value) {
    return xs.contains(value);
  }

  static List<String> primaryColors() {
    return List.of("red", "green", "blue");
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Java array</th><th>Java List</th></tr>
  <tr><td>Create</td><td><code>intArrayOf(1, 2, 3)</code></td><td><code>new int[]{1, 2, 3}</code></td><td><code>new ArrayList&lt;&gt;()</code></td></tr>
  <tr><td>Length</td><td><code>a.size</code></td><td><code>a.length</code></td><td><code>list.size()</code></td></tr>
  <tr><td>Read</td><td><code>a[i]</code></td><td><code>a[i]</code></td><td><code>list.get(i)</code></td></tr>
  <tr><td>Append</td><td><code>mutableListOf&lt;Int&gt;().add(x)</code></td><td>— (fixed size)</td><td><code>list.add(x)</code></td></tr>
  <tr><td>Membership</td><td><code>a.contains(x)</code></td><td>—</td><td><code>list.contains(x)</code></td></tr>
  <tr><td>Immutable</td><td><code>listOf(...)</code></td><td>—</td><td><code>List.of(...)</code></td></tr>
</table>
<p>Note the element type: a <code>List</code> holds objects, so you write
<code>List&lt;Integer&gt;</code> and Java autoboxes <code>int</code> values as you
add them, the same way Kotlin boxes <code>Int</code> when you use a generic
<code>List&lt;Int&gt;</code> instead of <code>IntArray</code>. Arrays are the
exception that can store raw primitives, which is why <code>int[]</code> (like
Kotlin's <code>IntArray</code>) is both faster and less flexible.</p>
<p><code>List.of(...)</code> returns an <em>immutable</em> list — calling
<code>add</code> on it throws <code>UnsupportedOperationException</code> at
runtime, mirroring how Kotlin's <code>listOf(...)</code> returns a read-only
<code>List</code> with no <code>add</code> method at all. That is a feature: it
is the idiomatic way to hand back a constant sequence you do not want callers
to mutate. When you need to grow the list, start from
<code>new ArrayList&lt;&gt;()</code> instead — Kotlin's equivalent is
<code>mutableListOf(...)</code>.</p>`,
};
