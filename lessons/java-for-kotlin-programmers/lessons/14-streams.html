  intro: `
<p>In Kotlin you transform collections with chained functions:
<code>.filter()</code>, <code>.map()</code>, <code>.fold()</code>. Java's
answer is the <strong>Stream API</strong>. You call <code>.stream()</code> on a
collection to open a pipeline, chain lazy operations, and finish with a
<em>terminal</em> operation — usually <code>.collect(...)</code> or a reduction
like <code>.sum()</code>.</p>
<table>
  <tr><th>Kotlin</th><th>Java</th></tr>
  <tr><td><code>list.filter { it > 0 }</code></td><td><code>list.stream().filter(x -&gt; x &gt; 0)</code></td></tr>
  <tr><td><code>list.map { it.name }</code></td><td><code>list.stream().map(x -&gt; x.name())</code></td></tr>
  <tr><td><code>list.fold(0) { a, b -&gt; a + b }</code></td><td><code>stream.reduce(0, Integer::sum)</code></td></tr>
  <tr><td><code>list</code> (already a <code>List</code>)</td><td><code>.collect(Collectors.toList())</code></td></tr>
</table>
<p>Two things differ from Kotlin's <code>List</code> functions. First, a stream is
<strong>single-use and lazy</strong>: nothing runs until a terminal operation
pulls values through, and you cannot reuse a stream after that — Kotlin's
<code>filter</code>/<code>map</code> run eagerly and return a fresh list each
time, so there's no equivalent restriction. Second, a Java pipeline does not
produce a collection by itself — you must <em>collect</em> it. The
<code>Collectors</code> class is the toolbox: <code>toList()</code>,
<code>joining(", ")</code>, <code>groupingBy(...)</code>,
<code>summingInt(...)</code>, and <code>counting()</code>. For plain number
crunching, <code>mapToInt(...)</code> turns the stream into an
<code>IntStream</code> with a direct <code>.sum()</code>.</p>`,

  kotlin: `data class Product(val name: String, val category: String, val price: Int)

fun namesUnder(products: List<Product>, max: Int): List<String> {
  return products.filter { it.price < max }.map { it.name }
}

fun totalPrice(products: List<Product>): Int {
  return products.fold(0) { sum, p -> sum + p.price }
}

fun totalByCategory(products: List<Product>): Map<String, Int> {
  val out = mutableMapOf<String, Int>()
  for (p in products) out[p.category] = (out[p.category] ?: 0) + p.price
  return out
}`,

</ol>`,

  solution: `record Product(String name, String category, int price) {}

class Catalog {
  static List<String> namesUnder(List<Product> products, int maxPrice) {
    return products.stream()
        .filter(p -> p.price() < maxPrice)
        .map(Product::name)
        .collect(Collectors.toList());
  }

  static int totalPrice(List<Product> products) {
    return products.stream()
        .mapToInt(Product::price)
        .sum();
  }

  static int totalPriceReduce(List<Product> products) {
    return products.stream()
        .map(Product::price)
        .reduce(0, Integer::sum);
  }

  static String nameList(List<Product> products) {
    return products.stream()
        .map(Product::name)
        .collect(Collectors.joining(", "));
  }

  static Map<String, List<Product>> byCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category));
  }

  static Map<String, Integer> totalByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.summingInt(Product::price)));
  }

  static Map<String, Long> countByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.counting()));
  }
}
`,

  notes: `
<table>
  <tr><th>Goal</th><th>Kotlin</th><th>Java</th></tr>
  <tr><td>Start</td><td><code>list</code></td><td><code>list.stream()</code></td></tr>
  <tr><td>Keep some</td><td><code>.filter { f(it) }</code></td><td><code>.filter(f)</code></td></tr>
  <tr><td>Transform</td><td><code>.map { f(it) }</code></td><td><code>.map(f)</code></td></tr>
  <tr><td>Sum numbers</td><td><code>.sumOf { it }</code></td><td><code>.mapToInt(f).sum()</code></td></tr>
  <tr><td>Fold</td><td><code>.fold(init) { a, b -&gt; f(a, b) }</code></td><td><code>.reduce(init, f)</code></td></tr>
  <tr><td>Back to a list</td><td>already a <code>List</code></td><td><code>.collect(Collectors.toList())</code></td></tr>
  <tr><td>Join to string</td><td><code>.joinToString(", ")</code></td><td><code>.collect(Collectors.joining(", "))</code></td></tr>
  <tr><td>Group</td><td><code>.groupBy { f(it) }</code></td><td><code>Collectors.groupingBy(f)</code></td></tr>
  <tr><td>Count per group</td><td><code>.groupBy(f).mapValues { it.value.size }</code></td><td><code>groupingBy(f, counting())</code></td></tr>
</table>
<p>Note the argument order flip on <code>reduce</code>/<code>fold</code>:
Kotlin's <code>fold</code> takes <code>(initial, accumulator lambda)</code> with
the lambda itself receiving <code>(acc, element)</code>, which lines up closely
with Java's <code>reduce(identity, accumulator)</code>. The method reference
<code>Integer::sum</code> is Java shorthand for <code>(a, b) -&gt; a + b</code>,
similar to Kotlin's <code>Int::plus</code>. <code>counting()</code> yields a
<code>Long</code>, not an <code>int</code>, which is why
<code>countByCategory</code> returns <code>Map&lt;String, Long&gt;</code>.
Remember a stream is one-shot: build the pipeline and finish it in a single
chain, since you cannot iterate the same stream twice — unlike a Kotlin
<code>List</code>, which you can traverse as many times as you like.</p>`,
