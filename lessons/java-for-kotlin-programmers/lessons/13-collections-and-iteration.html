  intro: `
<p>Kotlin already gives you <code>List&lt;T&gt;</code>, <code>Set&lt;T&gt;</code>,
and <code>Map&lt;K, V&gt;</code> — plus their <code>MutableList</code>,
<code>MutableSet</code>, and <code>MutableMap</code> counterparts — sitting
directly on top of Java's collections framework. Java has the same three ideas,
but exposes them as the interfaces you already know from the JVM side:
<code>List</code>, <code>Set</code>, <code>Map</code> — each with concrete
classes behind them (<code>ArrayList</code>, <code>HashSet</code>,
<code>HashMap</code>). You program to the interface and pick the implementation
when you create it, the same discipline Kotlin encourages by returning
<code>List</code> rather than <code>ArrayList</code> from its own
<code>listOf(...)</code>.</p>
<table>
  <tr><th>Kotlin</th><th>Java</th></tr>
  <tr><td><code>val xs: MutableList&lt;Int&gt; = mutableListOf(1, 2)</code></td><td><code>List&lt;Integer&gt; xs = new ArrayList&lt;&gt;(List.of(1, 2));</code></td></tr>
  <tr><td><code>mutableSetOf&lt;Int&gt;()</code></td><td><code>new HashSet&lt;Integer&gt;()</code></td></tr>
  <tr><td><code>mutableMapOf&lt;String, Int&gt;()</code></td><td><code>new HashMap&lt;String, Integer&gt;()</code></td></tr>
  <tr><td><code>for (x in xs)</code></td><td><code>for (var x : xs)</code></td></tr>
  <tr><td><code>xs.sort()</code></td><td><code>xs.sort(Comparator.naturalOrder())</code></td></tr>
</table>
<p>The big shift is sorting. Kotlin's <code>compareBy(...).thenBy(...).reversed()</code>
builder walks the same path Java's <code>Comparator&lt;T&gt;</code> builder does:
<code>Comparator.comparing(Person::name)</code> makes a comparator from a key
extractor, <code>.thenComparing(...)</code> adds a tiebreaker, and
<code>.reversed()</code> flips the direction. The one wrinkle is mutation —
Kotlin's <code>sortedWith</code> returns a new list while its
<code>sortWith</code> mutates in place; Java's <code>List.sort</code> (or the
static <code>Collections.sort</code>) always sorts in place, so there is no
separate immutable variant to reach for.</p>`,

  solution: `record Person(String name, int age) {}

class Roster {
  static List<String> names(List<Person> people) {
    List<String> result = new ArrayList<>();
    for (var p : people) {
      result.add(p.name());
    }
    return result;
  }

  static Set<Integer> uniqueAges(List<Person> people) {
    Set<Integer> ages = new HashSet<>();
    for (var p : people) {
      ages.add(p.age());
    }
    return ages;
  }

  static Map<String, Integer> ageByName(List<Person> people) {
    Map<String, Integer> map = new HashMap<>();
    for (var p : people) {
      map.put(p.name(), p.age());
    }
    return map;
  }

  static List<Person> sortedByAgeThenName(List<Person> people) {
    List<Person> copy = new ArrayList<>(people);
    copy.sort(Comparator.comparingInt(Person::age).thenComparing(Person::name));
    return copy;
  }

  static List<Person> sortedByNameDesc(List<Person> people) {
    List<Person> copy = new ArrayList<>(people);
    copy.sort(Comparator.comparing(Person::name).reversed());
    return copy;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Java</th></tr>
  <tr><td>Ordered list</td><td><code>List&lt;T&gt;</code> / <code>MutableList&lt;T&gt;</code></td><td><code>List&lt;T&gt;</code> (<code>ArrayList</code>)</td></tr>
  <tr><td>Unique set</td><td><code>Set&lt;T&gt;</code> / <code>MutableSet&lt;T&gt;</code></td><td><code>Set&lt;T&gt;</code> (<code>HashSet</code>)</td></tr>
  <tr><td>Key/value map</td><td><code>Map&lt;K, V&gt;</code> / <code>MutableMap&lt;K, V&gt;</code></td><td><code>Map&lt;K, V&gt;</code> (<code>HashMap</code>)</td></tr>
  <tr><td>Transform</td><td><code>xs.map { f(it) }</code></td><td><code>xs.stream().map(f).toList()</code> or a loop</td></tr>
  <tr><td>Sort by key</td><td><code>xs.sortedBy { it.age }</code></td><td><code>xs.sort(Comparator.comparingInt(P::age))</code></td></tr>
  <tr><td>Tiebreak</td><td><code>compareBy { it.age }.thenBy { it.name }</code></td><td><code>.thenComparing(P::name)</code></td></tr>
  <tr><td>Descending</td><td><code>xs.sortedByDescending { it.age }</code></td><td><code>.reversed()</code> / <code>Comparator.reverseOrder()</code></td></tr>
</table>
<p>Two gotchas coming from Kotlin. First, Java's <code>List.of(...)</code>,
<code>Set.of(...)</code>, and <code>Map.of(...)</code> return <em>immutable</em>
collections — calling <code>.add</code> or <code>.sort</code> on them throws
<code>UnsupportedOperationException</code>, the same contract as Kotlin's
<code>listOf(...)</code>/<code>setOf(...)</code>/<code>mapOf(...)</code> (which
simply have no mutating methods to call in the first place). Wrap them in
<code>new ArrayList&lt;&gt;(...)</code> when you need to mutate, which is
exactly why the sort methods copy first — mirroring how you would call
<code>.toMutableList()</code> before sorting a Kotlin <code>listOf(...)</code>
in place. Second, <code>List.sort</code> mutates in place and returns
<code>void</code> (unlike Kotlin's <code>sortedWith</code>, which returns a new
list and leaves the original untouched), so <code>list.sort(cmp)</code> is a
statement, not something you chain off of — reach for
<code>Collections.sort</code> or the plain <code>.sort(...)</code> shown above
when you want the in-place behavior Kotlin's <code>sortWith</code> gives you.</p>`,
};
