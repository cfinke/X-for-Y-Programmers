<title>Lesson 18: Utility Types</title>
<link rel="stylesheet" href="../../../shared/css/style.css">

<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 18,
  title: "Utility Types",

  intro: `
<p>Python has good <em>runtime</em> tools for "a variation on this shape":
<code>dataclasses.replace(user, name="X")</code> copies with changes,
<code>TypedDict(total=False)</code> makes every key optional, and when you need
"just these two fields" you usually write a second class by hand and keep it
in sync forever. What Python lacks is a way to <em>derive one type from
another</em>. TypeScript ships that as utility types: <code>Partial&lt;T&gt;</code>,
<code>Pick&lt;T, K&gt;</code>, <code>Omit&lt;T, K&gt;</code>, and
<code>Readonly&lt;T&gt;</code>.</p>
<table>
  <tr><th>Python</th><th>TypeScript</th></tr>
  <tr><td><code>class UserPatch(TypedDict, total=False):</code> (write it all again)</td><td><code>Partial&lt;User&gt;</code></td></tr>
  <tr><td>Second class with just <code>id</code>, <code>name</code></td><td><code>Pick&lt;User, "id" | "name"&gt;</code></td></tr>
  <tr><td>Second class with everything <em>but</em> <code>email</code></td><td><code>Omit&lt;User, "email"&gt;</code></td></tr>
  <tr><td><code>@dataclass(frozen=True)</code></td><td><code>Readonly&lt;User&gt;</code></td></tr>
  <tr><td><code>replace(user, name="X")</code></td><td><code>{ ...user, name: "X" }</code></td></tr>
</table>
<p>These are computed entirely at compile time — zero runtime cost, no second
class to maintain, and they update automatically when <code>User</code> gains a
field. The runtime half of the idiom is the object spread you already met:
<code>{ ...user, ...changes }</code> is <code>dataclasses.replace</code>, except
the <code>changes</code> argument can be typed <code>Partial&lt;User&gt;</code>
so a typo like <code>nmae</code> fails to compile instead of exploding at
runtime. (As usual: <code>snake_case</code> Python fields become
<code>camelCase</code> in TS.)</p>`,

  python: `from dataclasses import dataclass, replace

@dataclass(frozen=True)
class User:
    id: int
    name: str
    email: str
    active: bool

def update_user(user: User, **changes) -> User:
    # replace() copies-with-changes, but **changes is untyped:
    # update_user(u, nmae="X") only blows up at runtime.
    return replace(user, **changes)

def to_summary(user: User) -> dict:
    # No way to say "User, but only id and name" — you either
    # hand-write a second class or fall back to an untyped dict.
    return {"id": user.id, "name": user.name}`,

  task: `
<p>Port this to TypeScript with derived types instead of second classes:</p>
<ol>
  <li>Define <code>interface User</code> with <code>id: number</code>,
      <code>name: string</code>, <code>email: string</code>,
      <code>active: boolean</code>.</li>
  <li>Write <code>updateUser(user: User, changes: Partial&lt;User&gt;): User</code>
      — the <code>dataclasses.replace</code> equivalent. Implement it with
      object spread and do <em>not</em> mutate the original user.</li>
  <li>Write <code>toSummary(user: User): Pick&lt;User, "id" | "name"&gt;</code>
      returning a fresh object with exactly those two properties — the
      "second class" you never have to write.</li>
</ol>`,

  starter: `interface User {
  id: number;
  name: string;
  email: string;
  active: boolean;
}

// 1. TODO: type changes as Partial<User> — every field optional, for free.
//    Implement with spread, like dataclasses.replace(user, **changes).
function updateUser(user: User, changes: object): User {
  // TODO: return a NEW object; do not mutate user.
  return user;
}

// 2. TODO: return type Pick<User, "id" | "name"> — derived, not hand-written.
function toSummary(user: User) {
  // TODO: return an object with exactly id and name.
  return user;
}
`,

  exportNames: ["updateUser", "toSummary"],

  requirements: [
    { pattern: /Partial\s*</, message: "Type the changes parameter as Partial<User>" },
    { pattern: /(Pick\s*<|Omit\s*<)/, message: "Use Pick or Omit to derive the summary type from User" },
    { pattern: /\{\s*\.\.\./, message: "Implement the copy with object spread ({ ...user, ...changes })" },
  ],

  tests: [
    {
      name: 'updateUser applies a single change ({ name: "Grace" })',
      run: (x) => {
        const u = { id: 1, name: "Ada", email: "ada@lovelace.dev", active: true };
        const r = x.updateUser(u, { name: "Grace" });
        expectEqual(r.name, "Grace");
        expectEqual(r.id, 1);
        expectEqual(r.email, "ada@lovelace.dev");
        expectEqual(r.active, true);
      },
    },
    {
      name: "updateUser applies multiple changes at once",
      run: (x) => {
        const u = { id: 2, name: "Grace", email: "grace@navy.mil", active: true };
        const r = x.updateUser(u, { email: "grace@hopper.dev", active: false });
        expectEqual(r.email, "grace@hopper.dev");
        expectEqual(r.active, false);
        expectEqual(r.name, "Grace");
      },
    },
    {
      name: "updateUser does not mutate the original user",
      run: (x) => {
        const u = { id: 3, name: "Alan", email: "alan@bletchley.uk", active: true };
        x.updateUser(u, { name: "Turing", active: false });
        expectEqual(u.name, "Alan");
        expectEqual(u.active, true);
      },
    },
    {
      name: "toSummary returns the right id and name",
      run: (x) => {
        const s = x.toSummary({ id: 7, name: "Barbara", email: "b@liskov.dev", active: true });
        expectEqual(s.id, 7);
        expectEqual(s.name, "Barbara");
      },
    },
    {
      name: "toSummary has exactly the picked keys (no email, no active)",
      run: (x) => {
        const s = x.toSummary({ id: 7, name: "Barbara", email: "b@liskov.dev", active: true });
        expectEqual(s.email, undefined);
        expectEqual(s.active, undefined);
        expectEqual(Object.keys(s).length, 2);
      },
    },
  ],

  solution: `interface User {
  id: number;
  name: string;
  email: string;
  active: boolean;
}

// Partial<User> = every field optional. The dataclasses.replace of TS:
function updateUser(user: User, changes: Partial<User>): User {
  return { ...user, ...changes };
}

// Pick<User, "id" | "name"> = a derived type with just those fields.
function toSummary(user: User): Pick<User, "id" | "name"> {
  return { id: user.id, name: user.name };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>TypeScript</th></tr>
  <tr><td>All fields optional</td><td><code>TypedDict(total=False)</code>, written by hand</td><td><code>Partial&lt;User&gt;</code></td></tr>
  <tr><td>Only some fields</td><td>Second class, kept in sync manually</td><td><code>Pick&lt;User, "id" | "name"&gt;</code></td></tr>
  <tr><td>All but some fields</td><td>Second class again</td><td><code>Omit&lt;User, "email"&gt;</code></td></tr>
  <tr><td>Immutable view</td><td><code>@dataclass(frozen=True)</code></td><td><code>Readonly&lt;User&gt;</code> (compile-time only)</td></tr>
  <tr><td>Copy with changes</td><td><code>replace(user, name="X")</code></td><td><code>{ ...user, name: "X" }</code></td></tr>
  <tr><td>Typo in a change</td><td>Runtime <code>TypeError</code></td><td>Compile error (<code>Partial</code> knows the keys)</td></tr>
</table>
<p>The mental shift: in Python, each shape variation is a new class you
maintain; in TypeScript, variations are <em>expressions over an existing
type</em>. Change <code>User</code> once and every <code>Partial</code>,
<code>Pick</code>, and <code>Omit</code> derived from it updates itself —
utility types are the DRY principle applied to type definitions.</p>`,
};
</script>
