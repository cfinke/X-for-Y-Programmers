  number: 2,
  title: "Strings & Template Literals",

  intro: `
<p>Python's f-strings are one of its best features, and TypeScript has an
almost exact equivalent: <em>template literals</em>. Instead of an
<code>f</code> prefix you use backticks, and instead of <code>{name}</code>
you write <code>\${name}</code> — so <code>f"Hello, {name}!"</code> becomes
<code>\`Hello, \${name}!\`</code>. Anything goes inside the braces, including
method calls, just like in an f-string.</p>
<table>
  <tr><th>Python</th><th>TypeScript</th></tr>
  <tr><td><code>f"Hello, {name}!"</code></td><td><code>\`Hello, \${name}!\`</code></td></tr>
  <tr><td><code>s.upper()</code> / <code>s.lower()</code></td><td><code>s.toUpperCase()</code> / <code>s.toLowerCase()</code></td></tr>
  <tr><td><code>len(s)</code></td><td><code>s.length</code> (a property — no parentheses!)</td></tr>
  <tr><td><code>"x" in s</code></td><td><code>s.includes("x")</code></td></tr>
  <tr><td><code>", ".join(words)</code></td><td><code>words.join(", ")</code></td></tr>
</table>
<p>Two gotchas trip up every Python developer. First, <code>len(s)</code>
becomes the <em>property</em> <code>s.length</code> — writing
<code>s.length()</code> is an error because it is not a function. Second,
Python's <code>"x" in s</code> operator becomes the method
<code>s.includes("x")</code> — note the subject flips to the string itself.
Also notice <code>join</code> switches sides: Python calls it on the
separator, TypeScript calls it on the array. And as always, method names go
camelCase: <code>to_upper</code>-style names become
<code>toUpperCase</code>.</p>`,

  python: `name: str = "Ada"
greeting: str = f"Hello, {name}!"

def shout(s: str) -> str:
    return f"{s.upper()}!"

def describe_length(s: str) -> str:
    return f"{s} has {len(s)} characters"

def contains_word(sentence: str, word: str) -> bool:
    return word in sentence

def join_words(words: list[str]) -> str:
    return ", ".join(words)

print(shout(greeting))  # HELLO, ADA!!`,

  task: `
<p>Rewrite the Python string helpers as TypeScript. Every formatted string
must use a template literal (backticks + <code>\${}</code>), not
concatenation:</p>
<ol>
  <li><code>greet(name: string): string</code> — return
      <code>"Hello, &lt;name&gt;!"</code> using a template literal, exactly
      like the f-string.</li>
  <li><code>shout(s: string): string</code> — return the string uppercased
      with a <code>!</code> appended. Remember: <code>.upper()</code> is
      spelled <code>.toUpperCase()</code>.</li>
  <li><code>describeLength(s: string): string</code> — return
      <code>"&lt;s&gt; has &lt;n&gt; characters"</code>. Use
      <code>s.length</code> — a property, so no parentheses.</li>
  <li><code>containsWord(sentence: string, word: string): boolean</code> —
      Python's <code>word in sentence</code> becomes
      <code>sentence.includes(word)</code>.</li>
  <li><code>joinWords(words: string[]): string</code> — join with
      <code>", "</code>. The array owns <code>.join</code> in TypeScript,
      not the separator.</li>
</ol>`,

  starter: `// 1. Python: f"Hello, {name}!"  ->  TypeScript: a template literal.
//    Use backticks and \${...}, not string concatenation.

  // TODO: return "<s> has <n> characters"
  return "";

// 4. Python: word in sentence  ->  sentence.includes(word)

  // TODO
  return false;
}

// 5. Python: ", ".join(words)  ->  words.join(", ")

  // TODO
  return "";
}
`,

  exportNames: ["greet", "shout", "describeLength", "containsWord", "joinWords"],

  requirements: [
    { pattern: /`[\s\S]*?\$\{[\s\S]*?\}[\s\S]*?`/, message: "Use a template literal: backticks with ${...} inside, like an f-string" },
    { pattern: /\.toUpperCase\s*\(\s*\)/, message: "Use .toUpperCase() — the camelCase spelling of Python's .upper()" },
    { pattern: /\.length\b(?!\s*\()/, message: "Use the .length property (no parentheses) instead of len(s)" },
    { pattern: /\.includes\s*\(/, message: 'Use .includes() — the method form of the Python "in" operator' },
  ],

  tests: [
    { name: 'greet("Ada") returns "Hello, Ada!"', run: (x) => expectEqual(x.greet("Ada"), "Hello, Ada!") },
    { name: 'greet("World") returns "Hello, World!"', run: (x) => expectEqual(x.greet("World"), "Hello, World!") },
    { name: 'shout("hi there") returns "HI THERE!"', run: (x) => expectEqual(x.shout("hi there"), "HI THERE!") },
    { name: 'describeLength("Ada") returns "Ada has 3 characters"', run: (x) => expectEqual(x.describeLength("Ada"), "Ada has 3 characters") },
    { name: 'containsWord finds "quick" but not "dog"', run: (x) => {
        expectEqual(x.containsWord("the quick brown fox", "quick"), true);
        expectEqual(x.containsWord("the quick brown fox", "dog"), false);
      } },
    { name: 'joinWords(["a", "b", "c"]) returns "a, b, c"', run: (x) => expectEqual(x.joinWords(["a", "b", "c"]), "a, b, c") },
  ],

  solution: `function greet(name: string): string {
  return \`Hello, \${name}!\`;
}

function shout(s: string): string {
  return \`\${s.toUpperCase()}!\`;
}

function describeLength(s: string): string {
  return \`\${s} has \${s.length} characters\`;
}

function containsWord(sentence: string, word: string): boolean {
  return sentence.includes(word);
}

function joinWords(words: string[]): string {
  return words.join(", ");
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>TypeScript</th></tr>
  <tr><td>Interpolation</td><td><code>f"Hi {name}"</code></td><td><code>\`Hi \${name}\`</code></td></tr>
  <tr><td>Expressions inside</td><td><code>f"{s.upper()}"</code></td><td><code>\`\${s.toUpperCase()}\`</code></td></tr>
  <tr><td>Length</td><td><code>len(s)</code></td><td><code>s.length</code> (property!)</td></tr>
  <tr><td>Membership</td><td><code>"x" in s</code></td><td><code>s.includes("x")</code></td></tr>
  <tr><td>Case</td><td><code>.upper()</code> / <code>.lower()</code></td><td><code>.toUpperCase()</code> / <code>.toLowerCase()</code></td></tr>
  <tr><td>Join</td><td><code>", ".join(words)</code></td><td><code>words.join(", ")</code></td></tr>
  <tr><td>Multi-line strings</td><td><code>"""..."""</code></td><td>Template literals span lines too</td></tr>
</table>
<p>Template literals also replace Python's triple-quoted strings: a backtick
string can span multiple lines with no special syntax. The two habits worth
drilling are <code>s.length</code> without parentheses (the single most
common Python-to-TypeScript typo) and flipping <code>x in s</code> to
<code>s.includes(x)</code>.</p>`,
};
