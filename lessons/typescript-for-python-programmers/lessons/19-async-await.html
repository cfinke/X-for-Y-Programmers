  intro: `
<p>If you know <code>asyncio</code>, this is the lesson where you feel at home:
<code>async def</code> becomes <code>async function</code>, <code>await</code>
is literally <code>await</code>, and <code>asyncio.gather(*tasks)</code>
becomes <code>Promise.all(tasks)</code>. A <code>Promise&lt;T&gt;</code> is
simply a typed awaitable — an <code>Awaitable[T]</code> that already exists
as a first-class runtime object.</p>
<table>
  <tr><th>Python</th><th>TypeScript</th></tr>
  <tr><td><code>async def f() -&gt; str:</code></td><td><code>async function f(): Promise&lt;string&gt;</code></td></tr>
  <tr><td><code>result = await coro</code></td><td><code>const result = await promise;</code></td></tr>
  <tr><td><code>await asyncio.gather(a, b)</code></td><td><code>await Promise.all([a, b])</code></td></tr>
  <tr><td><code>asyncio.run(main())</code></td><td>Just call <code>main()</code> — the loop is always on</td></tr>
  <tr><td><code>try: ... except Err:</code></td><td><code>try { ... } catch (e) { }</code></td></tr>
</table>
<p>The big operational difference: Python makes you manage the event loop —
<code>asyncio.run()</code> to start it, and no <code>await</code> at the top
level of an ordinary script. In JavaScript the event loop is <em>always
running</em>; you never start it, and calling an <code>async function</code>
just returns a <code>Promise</code> immediately. Error handling maps directly
too: a rejected promise surfaces at the <code>await</code>, so
<code>try</code>/<code>except</code> becomes <code>try</code>/<code>catch</code>
around the <code>await</code>. One naming note: <code>fetch_user_names</code>
becomes <code>fetchUserNames</code>.</p>`,

  python: `import asyncio

USERS = {1: "Ada", 2: "Grace", 3: "Alan"}

async def fetch_user(user_id: int) -> dict:
    await asyncio.sleep(0)  # pretend network latency
    if user_id not in USERS:
        raise KeyError(user_id)
    return {"id": user_id, "name": USERS[user_id]}

async def fetch_user_names(ids: list[int]) -> list[str]:
    users = await asyncio.gather(*(fetch_user(i) for i in ids))
    return [u["name"] for u in users]

async def safe_fetch_name(user_id: int) -> str:
    try:
        user = await fetch_user(user_id)
        return user["name"]
    except KeyError:
        return "unknown"

# Can't await at top level of a script — you must start the loop:
print(asyncio.run(fetch_user_names([1, 2, 3])))`,

  solution: `// --- Provided fake API (deterministic — no timers, no network). ------------
const USERS: Record<number, string> = { 1: "Ada", 2: "Grace", 3: "Alan" };

function fetchUser(id: number): Promise<{ id: number; name: string }> {
  return Promise.resolve().then(() => {
    const name = USERS[id];
    if (name === undefined) {
      throw new Error("no user with id " + id); // becomes a rejected promise
    }
    return { id: id, name: name };
  });
}
// ---------------------------------------------------------------------------

// asyncio.gather(*(fetch_user(i) for i in ids)) -> Promise.all(ids.map(...))
async function fetchUserNames(ids: number[]): Promise<string[]> {
  const users = await Promise.all(ids.map((id) => fetchUser(id)));
  return users.map((user) => user.name);
}

// try/except KeyError -> try/catch around the await.
async function safeFetchName(id: number): Promise<string> {
  try {
    const user = await fetchUser(id);
    return user.name;
  } catch (e) {
    return "unknown";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>TypeScript</th></tr>
  <tr><td>Async function</td><td><code>async def f() -&gt; str:</code></td><td><code>async function f(): Promise&lt;string&gt;</code></td></tr>
  <tr><td>The awaitable type</td><td><code>Awaitable[str]</code> / coroutine</td><td><code>Promise&lt;string&gt;</code></td></tr>
  <tr><td>Run concurrently</td><td><code>await asyncio.gather(a, b)</code></td><td><code>await Promise.all([a, b])</code></td></tr>
  <tr><td>Start the loop</td><td><code>asyncio.run(main())</code></td><td>Not needed — the loop always runs</td></tr>
  <tr><td>Failure</td><td>Exception raised at the <code>await</code></td><td>Rejected promise thrown at the <code>await</code></td></tr>
  <tr><td>Handle it</td><td><code>try / except</code></td><td><code>try / catch</code></td></tr>
  <tr><td>Fire and inspect later</td><td><code>asyncio.create_task(coro)</code></td><td>Just call it — you already hold a <code>Promise</code></td></tr>
</table>
<p>The deepest difference is cultural, not syntactic: Python bolted an event
loop onto a synchronous language, so you manage it (<code>asyncio.run</code>,
"no await at top level"). JavaScript grew up inside one, so async is ambient —
calling an <code>async function</code> never blocks, it just hands you a
<code>Promise&lt;T&gt;</code>, and the type parameter tells you exactly what
the <code>await</code> will yield.</p>`,
