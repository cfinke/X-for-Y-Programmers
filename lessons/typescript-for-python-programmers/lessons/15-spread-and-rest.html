<title>Lesson 15: Spread & Rest</title>
<link rel="stylesheet" href="../../../shared/css/style.css">

<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 15,
  title: "Spread & Rest",

  intro: `
<p>Python has a family of star operators — <code>*args</code>,
<code>**kwargs</code>, <code>[*a, *b]</code>, <code>{**defaults,
**overrides}</code>, <code>f(*items)</code>. TypeScript covers nearly all of
them with a single spelling: three dots. In a parameter list,
<code>...nums: number[]</code> is a <em>rest</em> parameter, collecting extra
arguments exactly like <code>*args</code>. Everywhere else, <code>...</code>
is <em>spread</em>, unpacking an array or object into a new one or into a
call.</p>
<table>
  <tr><th>Python</th><th>TypeScript</th></tr>
  <tr><td><code>def total(*args: int) -&gt; int:</code></td>
      <td><code>function sum(...nums: number[]): number</code></td></tr>
  <tr><td><code>combined = [*a, *b]</code></td>
      <td><code>const combined = [...a, ...b];</code></td></tr>
  <tr><td><code>settings = {**defaults, **overrides}</code></td>
      <td><code>const settings = { ...defaults, ...overrides };</code></td></tr>
  <tr><td><code>f(*items)</code></td>
      <td><code>f(...items);</code></td></tr>
  <tr><td><code>def f(**kwargs):</code></td>
      <td>no equivalent — pass an options object instead</td></tr>
</table>
<p>Object spread is <em>exactly</em> the dict-merge idiom you already use:
later spreads win, so <code>{ ...defaults, ...overrides }</code> is
<code>{**defaults, **overrides}</code> character for character in spirit. The
one genuine gap is <code>**kwargs</code> — TypeScript functions cannot absorb
arbitrary named arguments; the idiom is a single typed options object (which
you met in the functions lesson). Spread also doubles as the standard way to
copy-instead-of-mutate: <code>[...items, item]</code> is the non-destructive
<code>append</code>.</p>`,

  python: `def total(*args: int) -> int:
    result = 0
    for n in args:
        result += n
    return result

defaults = {"theme": "light", "font_size": 12}
overrides = {"theme": "dark"}
settings = {**defaults, **overrides}   # {'theme': 'dark', 'font_size': 12}

a = [1, 2]
b = [3, 4]
combined = [*a, *b]                    # [1, 2, 3, 4]

numbers = [5, 10, 15]
print(total(*numbers))                 # unpack into the call: 30`,

  task: `
<p>Using <code>type Settings = { theme: string; fontSize: number }</code>
(already in the starter), write:</p>
<ol>
  <li><code>mergeSettings(defaults: Settings, overrides: Partial&lt;Settings&gt;): Settings</code>
      — the dict-merge idiom via object spread: overrides win, and
      <em>neither input object is modified</em> (there is a test for
      that).</li>
  <li><code>sum(...nums: number[]): number</code> — a rest parameter, so
      <code>sum(1, 2, 3)</code> works like Python's <code>total(1, 2, 3)</code>
      with <code>*args</code>. <code>sum()</code> with no arguments returns
      <code>0</code>.</li>
  <li><code>appendItem&lt;T&gt;(items: T[], item: T): T[]</code> — return a
      <em>new</em> array with the item added at the end, via array spread.
      The original array must be left untouched.</li>
</ol>`,

  starter: `type Settings = { theme: string; fontSize: number };

// Python: settings = {**defaults, **overrides}
function mergeSettings(defaults: Settings, overrides: Partial<Settings>): Settings {
  // TODO: return a new object via object spread — do not modify either input
  return defaults;
}

// Python: def total(*args: int) -> int:
// TODO: change the parameter into a rest parameter: ...nums: number[]
function sum(): number {
  // TODO: add up every argument (0 when there are none)
  return 0;
}

// Python: new_list = [*items, item]
function appendItem<T>(items: T[], item: T): T[] {
  // TODO: return a NEW array via array spread — no .push on the original!
  return items;
}
`,

  exportNames: ["mergeSettings", "sum", "appendItem"],

  requirements: [
    { pattern: /\(\s*\.\.\./, message: "Give sum a rest parameter: function sum(...nums: number[])" },
    { pattern: /\{\s*\.\.\./, message: "Merge the settings with object spread: { ...defaults, ...overrides }" },
    { pattern: /\[\s*\.\.\./, message: "Build the new array with array spread: [...items, item]" },
  ],

  tests: [
    { name: "sum(1, 2, 3) returns 6", run: (x) => expectEqual(x.sum(1, 2, 3), 6) },
    { name: "sum() with no arguments returns 0", run: (x) => expectEqual(x.sum(), 0) },
    {
      name: "mergeSettings: overrides win, missing keys fall back to defaults",
      run: (x) => expectDeepEqual(
        x.mergeSettings({ theme: "light", fontSize: 12 }, { theme: "dark" }),
        { theme: "dark", fontSize: 12 }
      ),
    },
    {
      name: "mergeSettings does NOT mutate the defaults object",
      run: (x) => {
        const defaults = { theme: "light", fontSize: 12 };
        x.mergeSettings(defaults, { theme: "dark", fontSize: 16 });
        expectDeepEqual(defaults, { theme: "light", fontSize: 12 });
      },
    },
    { name: "appendItem([1, 2], 3) returns [1, 2, 3]", run: (x) => expectDeepEqual(x.appendItem([1, 2], 3), [1, 2, 3]) },
    {
      name: "appendItem does NOT mutate the original array",
      run: (x) => {
        const items = ["a", "b"];
        x.appendItem(items, "c");
        expectDeepEqual(items, ["a", "b"]);
      },
    },
  ],

  solution: `type Settings = { theme: string; fontSize: number };

function mergeSettings(defaults: Settings, overrides: Partial<Settings>): Settings {
  return { ...defaults, ...overrides };
}

function sum(...nums: number[]): number {
  return nums.reduce((total, n) => total + n, 0);
}

function appendItem<T>(items: T[], item: T): T[] {
  return [...items, item];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>TypeScript</th></tr>
  <tr><td>Variadic parameters</td><td><code>def f(*args: int):</code></td><td><code>function f(...nums: number[])</code></td></tr>
  <tr><td>Merge dicts / objects</td><td><code>{**defaults, **overrides}</code></td><td><code>{ ...defaults, ...overrides }</code></td></tr>
  <tr><td>Concatenate lists / arrays</td><td><code>[*a, *b]</code></td><td><code>[...a, ...b]</code></td></tr>
  <tr><td>Unpack into a call</td><td><code>f(*items)</code></td><td><code>f(...items)</code></td></tr>
  <tr><td>Shallow copy</td><td><code>list(xs)</code> / <code>dict(d)</code></td><td><code>[...xs]</code> / <code>{ ...d }</code></td></tr>
  <tr><td>Keyword arguments</td><td><code>def f(**kwargs):</code></td><td>a typed options object: <code>f({ theme: "dark" })</code></td></tr>
  <tr><td>Collect the remainder</td><td><code>first, *rest = items</code></td><td><code>const [first, ...rest] = items;</code></td></tr>
</table>
<p>The position decides the meaning: dots in a parameter list or on the left
of a destructuring <em>collect</em> values (rest, like <code>*args</code>);
dots inside a literal or a call <em>scatter</em> them (spread, like
<code>*</code>/<code>**</code> unpacking). Both copies are shallow — nested
objects are shared, the same caveat as <code>dict(**d)</code> versus
<code>copy.deepcopy</code>.</p>`,
};
</script>
