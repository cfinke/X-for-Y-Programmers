<div id="app"></div>
<script>
const LESSON = {
  number: 8,
  title: "Interfaces & Object Shapes",

  intro: `
<p>Python gives you three tools for "a thing with these fields":
<code>TypedDict</code> for dict shapes, <code>@dataclass</code> for record
classes, and <code>Protocol</code> for structural ("duck") typing that mypy
checks. TypeScript rolls all three jobs into one keyword:
<code>interface</code>. An interface describes the shape of a plain object —
no constructor, no base class, no runtime cost. Like type hints, it is
<em>erased</em> when the code runs.</p>
<table>
  <tr><th>Python</th><th>TypeScript</th></tr>
  <tr><td><code>class Product(TypedDict):</code></td><td><code>interface Product { ... }</code></td></tr>
  <tr><td><code>name: str</code></td><td><code>name: string;</code></td></tr>
  <tr><td><code>desc: NotRequired[str]</code></td><td><code>desc?: string;</code> (the <code>?</code> marks it optional)</td></tr>
  <tr><td><code>class Sized(Protocol): ...</code></td><td>every interface — structural typing is the default</td></tr>
</table>
<p>The part that surprises Python developers most: <strong>every TypeScript
interface behaves like a Protocol</strong>. Nothing ever declares
"I implement Product" — any object literal with the right properties simply
<em>is</em> a Product, checked structurally by the compiler. Optional
properties get a <code>?</code> after the name (like
<code>NotRequired</code>, or a dataclass field with a default), and reading
one gives you <code>T | undefined</code>, so you check before using it —
exactly the union discipline from Lesson 7. Field names, as usual, go
camelCase: <code>in_stock</code> → <code>inStock</code>.</p>`,

  python: `from typing import TypedDict, NotRequired

class Product(TypedDict):
    id: int
    name: str
    price: float
    description: NotRequired[str]  # optional key

def describe_product(p: Product) -> str:
    base = f"{p['name']} (\${p['price']:.2f})"
    if "description" in p:
        return f"{base}: {p['description']}"
    return base

def apply_discount(p: Product, percent: float) -> Product:
    new_price = round(p["price"] * (100 - percent)) / 100
    return {**p, "price": new_price}

widget: Product = {"id": 1, "name": "Widget", "price": 9.99}
print(describe_product(widget))  # Widget ($9.99)`,

  task: `
<p>Port the TypedDict version to an interface:</p>
<ol>
  <li>Define <code>interface Product</code> with <code>id: number</code>,
      <code>name: string</code>, <code>price: number</code>, and an
      <em>optional</em> <code>description?: string</code>.</li>
  <li>Write <code>describeProduct(p: Product): string</code> returning
      <code>"Widget ($9.99)"</code> — use <code>p.price.toFixed(2)</code> for
      the two decimals. If <code>p.description</code> is present, append it:
      <code>"Widget ($9.99): A handy widget"</code>.</li>
  <li>Write <code>applyDiscount(p: Product, percent: number): Product</code>
      that returns a <em>new</em> product whose price is reduced by
      <code>percent</code> and rounded to cents:
      <code>Math.round(p.price * (100 - percent)) / 100</code>. Spread the
      original like Python's <code>{**p, ...}</code>:
      <code>{ ...p, price: newPrice }</code>.</li>
</ol>
<p>Note that no object ever says "I am a Product" — passing
<code>{ id: 1, name: "Widget", price: 9.99 }</code> just works, because the
shape matches. That is Protocol-style structural typing, on by default.</p>`,

  starter: `// 1. Define the Product interface.
//    Python:  class Product(TypedDict): ...  with NotRequired[str]
//    TS:      optional properties use a ? after the name.
interface Product {
  id: number;
  // TODO: name (string), price (number), and an optional description (string)
}

// 2. TODO: return "Name ($X.XX)" — plus ": <description>" when present.
function describeProduct(p: Product): string {
  return "";
}

// 3. TODO: return a NEW Product with the discounted price.
//    Python: {**p, "price": new_price}  ->  TS: { ...p, price: newPrice }
function applyDiscount(p: Product, percent: number): Product {
  return p;
}
`,

  exportNames: ["describeProduct", "applyDiscount"],

  requirements: [
    { pattern: /interface\s+Product/, message: "Define an interface named Product" },
    { pattern: /\w+\?\s*:/, message: "Mark one property optional with ? (like NotRequired)" },
    { pattern: /describeProduct\s*\(\s*\w+\s*:\s*Product\s*\)/, message: "describeProduct must take a parameter typed as Product" },
  ],

  tests: [
    { name: 'describeProduct without description returns "Widget ($9.99)"', run: (x) => expectEqual(x.describeProduct({ id: 1, name: "Widget", price: 9.99 }), "Widget ($9.99)") },
    { name: 'describeProduct with description appends it', run: (x) => expectEqual(x.describeProduct({ id: 2, name: "Gadget", price: 25, description: "A shiny gadget" }), "Gadget ($25.00): A shiny gadget") },
    { name: "applyDiscount takes 10% off 10.00", run: (x) => expectEqual(x.applyDiscount({ id: 1, name: "Widget", price: 10 }, 10).price, 9) },
    { name: "applyDiscount rounds 9.99 minus 10% to 8.99", run: (x) => expectEqual(x.applyDiscount({ id: 1, name: "Widget", price: 9.99 }, 10).price, 8.99) },
    { name: "applyDiscount keeps the other fields and returns a new object", run: (x) => {
        const original = { id: 3, name: "Doohickey", price: 100 };
        const discounted = x.applyDiscount(original, 25);
        expectEqual(discounted.name, "Doohickey");
        expectEqual(discounted.price, 75);
        expectEqual(original.price, 100);
      } },
  ],

  solution: `interface Product {
  id: number;
  name: string;
  price: number;
  description?: string; // optional, like NotRequired[str]
}

function describeProduct(p: Product): string {
  const base = p.name + " ($" + p.price.toFixed(2) + ")";
  if (p.description !== undefined) {
    return base + ": " + p.description;
  }
  return base;
}

function applyDiscount(p: Product, percent: number): Product {
  const newPrice = Math.round(p.price * (100 - percent)) / 100;
  return { ...p, price: newPrice };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>TypeScript</th></tr>
  <tr><td>Dict/object shape</td><td><code>class P(TypedDict):</code></td><td><code>interface P { }</code></td></tr>
  <tr><td>Optional field</td><td><code>NotRequired[str]</code> / <code>total=False</code></td><td><code>desc?: string;</code></td></tr>
  <tr><td>Record class</td><td><code>@dataclass</code></td><td>interface + object literal (or <code>class</code>, Lesson 9)</td></tr>
  <tr><td>Structural typing</td><td><code>Protocol</code> (opt-in)</td><td>every interface (the default)</td></tr>
  <tr><td>Copy with changes</td><td><code>{**p, "price": x}</code></td><td><code>{ ...p, price: x }</code></td></tr>
  <tr><td>Missing optional field</td><td><code>"key" in p</code></td><td><code>p.desc !== undefined</code></td></tr>
</table>
<p>Rule of thumb for choosing: reach for an <code>interface</code> whenever
you would reach for a TypedDict or a behavior-free dataclass — data in, data
out. Save real <code>class</code>es (next lesson) for when you need methods,
encapsulation, or construction logic. And remember interfaces are erased at
runtime: you cannot <code>instanceof</code> an interface, just as you cannot
<code>isinstance</code> a TypedDict.</p>`,
};
