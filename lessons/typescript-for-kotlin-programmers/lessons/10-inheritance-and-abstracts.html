<title>Lesson 10: Inheritance &amp; Abstract Classes</title>

<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance & Abstract Classes",

  intro: `
<p>This is one of the more familiar lessons in the course, though the spelling
shifts more than you might expect from Kotlin. TypeScript keeps Java-style
keywords — <code>extends</code>, <code>implements</code>, and
<code>abstract</code> — where Kotlin folds extends and implements into a
single <code>:</code>. An <code>abstract class</code> cannot be instantiated,
may mix abstract method signatures with concrete implementations, and
subclasses must fill in the abstract members — exactly the template-method
setup you already write in Kotlin. The constructor chain is the same idea with
different placement: where Kotlin calls the superclass constructor in the class
header (<code>: Shape()</code>), a TypeScript subclass constructor calls
<code>super(...)</code> before touching <code>this</code>, and TypeScript
enforces that ordering.</p>
<table>
  <tr><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td><code>abstract class Shape { ... }</code></td><td><code>abstract class Shape { ... }</code></td></tr>
  <tr><td><code>abstract fun area(): Double</code></td><td><code>abstract area(): number;</code></td></tr>
  <tr><td><code>class Circle(...) : Shape() { ... }</code></td><td><code>class Circle extends Shape { ... }</code></td></tr>
  <tr><td><code>: Shape(...)</code> in the class header</td><td><code>super(...)</code> before any use of <code>this</code></td></tr>
  <tr><td><code>override fun area(): Double { ... }</code></td><td><code>area(): number { ... }</code> — no keyword needed</td></tr>
  <tr><td><code>c is Shape</code></td><td><code>c instanceof Shape</code></td></tr>
</table>
<p>The biggest difference is a subtraction. Unlike Kotlin, TypeScript has no
mandatory <code>override</code> keyword: the compiler checks every override
against the base signature automatically, and a typo like <code>aera()</code>
fails to compile because the abstract member is left unimplemented. There is
also only <em>single</em> class inheritance, same as Kotlin — one superclass,
any number of interfaces (one <code>extends</code>, any number of
<code>implements</code>). One runtime caveat worth knowing: unlike Kotlin,
where <code>abstract</code> is a real runtime property of the class,
TypeScript's <code>abstract</code> is a compile-time concept that is erased
from the emitted JavaScript, so the "cannot instantiate" guarantee comes from
the type checker, not the runtime.</p>`,

  kotlin: `abstract class Shape {
    abstract fun area(): Double             // subclasses must implement

    fun describe(): String {                // template method — calls area()
        return "A shape with area " + Math.round(area() * 100) / 100.0
    }
}

class Circle(private val radius: Double) : Shape() {
    override fun area(): Double = Math.PI * radius * radius
}`,

  task: `
<p>Port the shape hierarchy:</p>
<ol>
  <li>Declare <code>abstract class Shape</code> with an abstract method
      <code>area(): number</code> (signature only — no body, no braces,
      just like Kotlin's <code>abstract fun area(): Double</code>) and a
      concrete <code>describe(): string</code> that returns
      <code>"A shape with area " + Math.round(this.area() * 100) / 100</code>.
      That is the template method: the base class owns the wording,
      subclasses own the math.</li>
  <li>Write <code>class Circle extends Shape</code> whose constructor takes
      <code>radius: number</code>, calls <code>super()</code>, and stores
      the radius. Implement <code>area()</code> as
      <code>Math.PI * radius * radius</code> — unlike Kotlin, no
      <code>override</code> keyword is needed or exists.</li>
  <li>Write <code>class Rectangle extends Shape</code> whose constructor
      takes <code>width: number</code> and <code>height: number</code>,
      calls <code>super()</code>, and implements <code>area()</code> as
      <code>width * height</code>.</li>
</ol>`,

  starter: `// 1. abstract class, exactly like Java. Declare the abstract method as
//    a bare signature ending in a semicolon: abstract area(): number;
abstract class Shape {
  // TODO: abstract area(): number;

  // TODO: the template method — concrete, calls this.area():
  //       "A shape with area " + Math.round(this.area() * 100) / 100
  describe(): string {
    return "";
  }
}

// 2. Same extends keyword. Constructor takes radius, calls super() first.
//    Then implement area() — no @Override annotation exists in TS.
class Circle extends Shape {
  // TODO
}

// 3. Constructor takes width and height; area() is width * height.
class Rectangle extends Shape {
  // TODO
}
`,

  exportNames: ["Shape", "Circle", "Rectangle"],

  requirements: [
    { pattern: /abstract\s+class\s+Shape/, message: "Declare Shape with abstract class — the keyword carries over from Java" },
    { pattern: /abstract\s+area\s*\(\s*\)\s*:\s*number/, message: "Declare the abstract method signature: abstract area(): number;" },
    { pattern: /extends\s+Shape/, message: "Use extends Shape for the subclasses — same keyword as Java" },
    { pattern: /super\s*\(\s*\)/, message: "Call super() in the subclass constructors before using this" },
  ],

  tests: [
    { name: "new Circle(2).area() is about 12.57", run: (x) => expectEqual(Math.round(new x.Circle(2).area() * 100) / 100, 12.57) },
    { name: "new Rectangle(3, 4).area() is 12", run: (x) => expectEqual(new x.Rectangle(3, 4).area(), 12) },
    { name: "Circle inherits describe() from Shape (template method)", run: (x) => expectEqual(new x.Circle(1).describe(), "A shape with area 3.14") },
    { name: "Rectangle inherits describe() too", run: (x) => expectEqual(new x.Rectangle(3, 4).describe(), "A shape with area 12") },
    { name: "both subclasses are instanceof Shape", run: (x) => { expectTruthy(new x.Circle(1) instanceof x.Shape); expectTruthy(new x.Rectangle(1, 2) instanceof x.Shape); } },
  ],

  solution: `abstract class Shape {
  abstract area(): number;

  describe(): string {
    return "A shape with area " + Math.round(this.area() * 100) / 100;
  }
}

class Circle extends Shape {
  constructor(private radius: number) {
    super();
  }

  area(): number {
    return Math.PI * this.radius * this.radius;
  }
}

class Rectangle extends Shape {
  constructor(private width: number, private height: number) {
    super();
  }

  area(): number {
    return this.width * this.height;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td>Abstract class</td><td><code>abstract class Shape</code></td><td><code>abstract class Shape</code></td></tr>
  <tr><td>Abstract method</td><td><code>abstract fun area(): Double</code></td><td><code>abstract area(): number;</code></td></tr>
  <tr><td>Subclassing</td><td><code>class Circle : Shape()</code></td><td><code>class Circle extends Shape</code></td></tr>
  <tr><td>Constructor chaining</td><td><code>: Shape(...)</code> in the class header</td><td><code>super(...)</code> before any <code>this</code> access</td></tr>
  <tr><td>Override marker</td><td><code>override</code> keyword required</td><td>none needed — checked by signature</td></tr>
  <tr><td>Multiple inheritance</td><td>one superclass, many interfaces</td><td>one <code>extends</code>, many <code>implements</code></td></tr>
  <tr><td>Runtime type check</td><td><code>x is Shape</code></td><td><code>x instanceof Shape</code></td></tr>
</table>
<p>The design insight transfers untouched: <code>describe()</code> is a
template method, written once in the base class in terms of the abstract
<code>area()</code> that each subclass supplies. What is worth internalizing
is <em>when</em> to reach for this in TypeScript. Like Kotlin, TypeScript
gives you more than class hierarchies: structural interfaces (lesson 8) and
discriminated unions (lesson 17) often replace inheritance entirely — much as
you might reach for a Kotlin <code>sealed class</code> or interface instead.
Reserve <code>abstract class</code> for the cases it is genuinely best at —
shared concrete behavior plus enforced extension points — and remember that,
unlike in Kotlin, <code>abstract</code> is erased at runtime, so the
no-instantiation rule is enforced by the compiler rather than by a thrown
exception.</p>`,
};
