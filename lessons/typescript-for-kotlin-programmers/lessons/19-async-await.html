  title: "Async & Promises",

  intro: `
<p>A <code>Promise&lt;T&gt;</code> is a <code>Deferred&lt;T&gt;</code>:
a value that will arrive later or fail. But just as Kotlin coroutines steer you
away from chaining combinators, TypeScript's <code>async</code>/<code>await</code>
turns the whole pipeline into straight-line code. Inside an
<code>async function</code>, <code>await promise</code> reads like a blocking
call but never blocks a thread — exactly the feeling of calling a
<code>suspend fun</code> or <code>.await()</code>-ing a <code>Deferred</code>.</p>
<table>
  <tr><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td><code>Deferred&lt;User&gt;</code></td><td><code>Promise&lt;User&gt;</code></td></tr>
  <tr><td><code>deferred.await().name</code></td><td><code>p.then(u =&gt; u.name)</code> — or just <code>await</code></td></tr>
  <tr><td><code>fetchMore(...)</code> (another <code>suspend fun</code>)</td><td><code>await fetchMore(...)</code></td></tr>
  <tr><td><code>try { f.await() } catch (e: Exception) { fallback }</code></td><td><code>try { await f } catch (e) { fallback }</code></td></tr>
  <tr><td><code>awaitAll(...)</code> — results collected for you</td><td><code>await Promise.all(promises)</code> — results collected for you</td></tr>
</table>
<p>Two things to note. Kotlin's <code>awaitAll</code> already resolves directly
to the list of results in input order, and <code>Promise.all</code> behaves
identically — the array of results, in the same order you passed the promises
in. The bigger shift: because JavaScript runs your code on a single-threaded
event loop, there is no <code>@Synchronized</code>, no <code>@Volatile</code>,
no dispatcher to choose — concurrency happens between <code>await</code> points,
never in the middle of your statements.</p>`,

  kotlin: `data class User(val id: Long, val name: String)

suspend fun fetchUser(id: Long): User =
    withContext(Dispatchers.IO) { repo.find(id) }

suspend fun fetchUserNames(ids: List<Long>): List<String> = coroutineScope {
    // Kick off every lookup with async first, then await them together.
    // awaitAll returns the results in input order -- no manual joining.
    ids.map { id -> async { fetchUser(id) } }
        .awaitAll()
        .map { it.name }
}

suspend fun fetchNameOrGuest(id: Long): String =
    try {
        fetchUser(id).name
    } catch (e: Exception) {
        "guest"
    }`,

  task: `
<p>The starter gives you a deterministic fake <code>fetchUser</code> (no
network, no timers — it resolves on the next microtask). Build on it:</p>
<ol>
  <li>Implement <code>async function fetchUserNames(ids: number[]): Promise&lt;string[]&gt;</code>.
      Start all lookups at once by mapping <code>ids</code> to promises, then
      <code>await Promise.all(...)</code> and return just the names, in the
      same order as <code>ids</code>. Do not <code>await</code> inside a loop —
      that would serialize the requests, like <code>.await()</code>-ing each
      <code>Deferred</code> before starting the next instead of launching them

  <li>Implement <code>async function fetchNameOrGuest(id: number): Promise&lt;string&gt;</code>:

</ol>`,

const USERS: Record<number, string> = { 1: "Ada", 2: "Grace", 3: "Linus" };

function fetchUser(id: number): Promise<{ id: number; name: string }> {
  return Promise.resolve().then(() => {
    const name = USERS[id];
    if (name === undefined) {
      throw new Error("No user with id " + id); // -> rejected promise
    }
    return { id: id, name: name };
  });
}

`,

  exportNames: ["fetchUser", "fetchUserNames", "fetchNameOrGuest"],

  requirements: [
    { pattern: /async\s+function/, message: "Declare the functions with async function" },
    { pattern: /await/, message: "Use await instead of .then chains" },
    { pattern: /Promise\.all/, message: "Run the lookups concurrently with Promise.all" },
  ],

  tests: [
    { name: "fetchUser(1) resolves to Ada", run: async (x) => {
        const user = await x.fetchUser(1);
        expectEqual(user.name, "Ada");
        expectEqual(user.id, 1);
      } },
    { name: 'fetchUserNames([1, 2, 3]) resolves to ["Ada", "Grace", "Linus"]', run: async (x) => {
        expectDeepEqual(await x.fetchUserNames([1, 2, 3]), ["Ada", "Grace", "Linus"]);
      } },
    { name: "fetchUserNames([3, 1]) preserves input order", run: async (x) => {

      } },
    { name: "fetchUserNames([]) resolves to an empty array", run: async (x) => {
        expectDeepEqual(await x.fetchUserNames([]), []);
      } },
    { name: "fetchUser(99) rejects with an error", run: async (x) => {
        try {
          await x.fetchUser(99);
        } catch (e) {
          return; // rejected, as expected
        }
        throw new Error("expected the promise to reject, but it resolved");
      } },
    { name: 'fetchNameOrGuest falls back to "guest" on rejection', run: async (x) => {

        expectEqual(await x.fetchNameOrGuest(99), "guest");

  solution: `const USERS: Record<number, string> = { 1: "Ada", 2: "Grace", 3: "Linus" };

function fetchUser(id: number): Promise<{ id: number; name: string }> {
  return Promise.resolve().then(() => {
    const name = USERS[id];
    if (name === undefined) {
      throw new Error("No user with id " + id); // -> rejected promise
    }
    return { id: id, name: name };
  });
}

async function fetchUserNames(ids: number[]): Promise<string[]> {
  // Kick off every lookup first, then await them all together.
  const users = await Promise.all(ids.map((id) => fetchUser(id)));
  return users.map((user) => user.name);
}

async function fetchNameOrGuest(id: number): Promise<string> {
  try {
    const user = await fetchUser(id);
    return user.name;
  } catch (e) {
    return "guest";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td>Future value</td><td><code>Deferred&lt;T&gt;</code></td><td><code>Promise&lt;T&gt;</code></td></tr>
  <tr><td>Create resolved/failed</td><td><code>CompletableDeferred(v)</code> / <code>.completeExceptionally(e)</code></td><td><code>Promise.resolve(v)</code> / <code>Promise.reject(e)</code></td></tr>
  <tr><td>Map result</td><td><code>d.await().let(f)</code></td><td><code>.then(f)</code></td></tr>
  <tr><td>Chain another future</td><td>call another <code>suspend fun</code></td><td><code>.then(f)</code> — promises auto-flatten</td></tr>
  <tr><td>Recover</td><td><code>try</code>/<code>catch</code> around <code>await()</code></td><td><code>.catch(f)</code> or <code>try</code>/<code>catch</code> around <code>await</code></td></tr>
  <tr><td>Fan-out, join all</td><td><code>awaitAll(...)</code> — resolves to the results</td><td><code>Promise.all(array)</code> — resolves to the results</td></tr>
  <tr><td>Straight-line style</td><td><code>suspend fun</code> / coroutines</td><td><code>async</code> / <code>await</code></td></tr>
  <tr><td>Thread safety</td><td><code>Dispatchers</code>, <code>Mutex</code>, <code>@Volatile</code></td><td>not needed — single-threaded event loop</td></tr>
</table>
<p>An <code>async function</code> always returns a <code>Promise</code>:
<code>return "x"</code> resolves it, <code>throw</code> rejects it — the same
duality as completing or completing-exceptionally a <code>Deferred</code>, but
expressed with the ordinary <code>return</code> and <code>throw</code> you
already write in a <code>suspend fun</code>. The one habit to keep from Kotlin:
launch independent work with <code>async</code> <em>before</em> awaiting, or you
will accidentally serialize it.</p>`,
};
