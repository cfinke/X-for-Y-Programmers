<script>
const LESSON = {
  number: 16,
  title: "Type Narrowing & Guards",

  intro: `
<p>Kotlin's smart casts are one of the language's best-loved features:
after <code>if (value is String)</code>, the compiler automatically treats
<code>value</code> as a <code>String</code> inside the branch — no explicit
cast, no new binding variable. TypeScript works almost the same way; only the
runtime test is spelled differently. An ordinary
<code>if (typeof value === "string")</code> <em>narrows</em> the type inside the
branch. The compiler tracks control flow: after the check, <code>value</code>
simply <em>is</em> a <code>string</code>, and <code>value.length</code> compiles.</p>
<table>
  <tr><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td><code>if (value is String) { value.length }</code></td><td><code>if (typeof value === "string") { value.length; }</code></td></tr>
  <tr><td><code>if (value is List&lt;*&gt;)</code></td><td><code>if (Array.isArray(value))</code></td></tr>
  <tr><td><code>value is User</code></td><td><code>value instanceof User</code> (classes) or <code>"name" in value</code> (shapes)</td></tr>
  <tr><td><code>Any?</code> (the top type)</td><td><code>unknown</code> — like Any?, but you <em>must</em> narrow before use</td></tr>
</table>
<p>The Kotlin <code>Any?</code> role is played by <code>unknown</code>, and it is
stricter than <code>Any?</code> ever was: you cannot call anything on an
<code>unknown</code> — not even <code>toString()</code> — until you have narrowed
it. Here TypeScript actually hits a wall Kotlin never does: because TypeScript
interfaces are erased at runtime, <code>instanceof</code> cannot see them. In
Kotlin, <code>value is User</code> just works whether <code>User</code> is a
class or an interface. In TypeScript you write a <em>type predicate</em>: a
function whose return type is <code>value is User</code>. Return
<code>true</code> and the compiler narrows the argument to <code>User</code> at
every call site, like a reusable, named <code>is</code> check for structural
types.</p>`,

  kotlin: `fun describeValue(value: Any?): String {
    // Kotlin smart casts: after an \`is\` check the compiler
    // automatically casts value inside the branch — no explicit cast.
    return when (value) {
        is String -> "string of length \${value.length}"
        is Int -> "number with value \$value"
        is List<*> -> "array of \${value.size} items"
        is User -> "user named \${value.name}"
        else -> "something else"
    }
}`,

  task: `
<p>Port <code>describeValue</code> to TypeScript, narrowing an
<code>unknown</code> step by step:</p>
<ol>
  <li>Write a type guard <code>isUser</code> with the signature
      <code>function isUser(value: unknown): value is User</code>. It returns
      <code>true</code> only when <code>value</code> is a non-null object whose
      <code>name</code> and <code>email</code> properties are both strings
      (the <code>User</code> interface is provided).</li>
  <li>Write <code>describeValue(value: unknown): string</code> that returns:
      <ul>
        <li><code>"string of length N"</code> for strings (via <code>typeof</code>)</li>
        <li><code>"number with value N"</code> for numbers (via <code>typeof</code>)</li>
        <li><code>"array of N items"</code> for arrays (via <code>Array.isArray</code>)</li>
        <li><code>"user named NAME"</code> when <code>isUser(value)</code> is true</li>
        <li><code>"something else"</code> otherwise</li>
      </ul>
      Inside each branch, use the narrowed value directly — no casts.</li>
</ol>`,

  starter: `interface User {
  name: string;
  email: string;
}

// TODO 1: turn this into a real type guard.
// Signature: function isUser(value: unknown): value is User
// True only for a non-null object whose name and email are both strings.
// (Inside the guard one cast is fine, e.g. value as Record<string, unknown>.)
function isUser(value: any): boolean {
  return false; // TODO
}

// TODO 2: take unknown and narrow it branch by branch — no casts needed.
function describeValue(value: any): string {
  // typeof for string/number, Array.isArray for arrays, isUser for users:
  //   string        -> "string of length N"
  //   number        -> "number with value N"
  //   array         -> "array of N items"
  //   User          -> "user named NAME"
  //   anything else -> "something else"
  return ""; // TODO
}
`,

  exportNames: ["isUser", "describeValue"],

  requirements: [
    { pattern: /unknown/, message: "Type the incoming values as unknown — the type-safe Object" },
    { pattern: /\bis\s+\w+/, message: "Give isUser a type-predicate return type (value is User)" },
    { pattern: /typeof/, message: "Narrow with typeof checks — no casts" },
  ],

  tests: [
    { name: 'describeValue("hello") returns "string of length 5"', run: (x) => expectEqual(x.describeValue("hello"), "string of length 5") },
    { name: 'describeValue(42) returns "number with value 42"', run: (x) => expectEqual(x.describeValue(42), "number with value 42") },
    { name: 'describeValue([1, 2, 3]) returns "array of 3 items"', run: (x) => expectEqual(x.describeValue([1, 2, 3]), "array of 3 items") },
    { name: 'describeValue(a user object) returns "user named Ada"', run: (x) => expectEqual(x.describeValue({ name: "Ada", email: "ada@example.com" }), "user named Ada") },
    { name: "isUser accepts a real user and rejects impostors", run: (x) => {
        expectTruthy(x.isUser({ name: "Ada", email: "ada@example.com" }));
        expectEqual(x.isUser(null), false);
        expectEqual(x.isUser("Ada"), false);
        expectEqual(x.isUser({ name: "Ada" }), false);
      } },
    { name: 'describeValue(true) returns "something else"', run: (x) => expectEqual(x.describeValue(true), "something else") },
  ],

  solution: `interface User {
  name: string;
  email: string;
}

function isUser(value: unknown): value is User {
  if (typeof value !== "object" || value === null) {
    return false;
  }
  const candidate = value as Record<string, unknown>;
  return typeof candidate.name === "string" && typeof candidate.email === "string";
}

function describeValue(value: unknown): string {
  if (typeof value === "string") {
    return "string of length " + value.length;
  }
  if (typeof value === "number") {
    return "number with value " + value;
  }
  if (Array.isArray(value)) {
    return "array of " + value.length + " items";
  }
  if (isUser(value)) {
    return "user named " + value.name;
  }
  return "something else";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td>Top type</td><td><code>Any?</code></td><td><code>unknown</code> (must narrow before use)</td></tr>
  <tr><td>Type test + bind</td><td><code>if (v is String)</code> — v smart-casts</td><td><code>if (typeof v === "string")</code> — v itself narrows</td></tr>
  <tr><td>Primitives</td><td><code>v is Int</code>, <code>v is String</code></td><td><code>typeof v === "number"</code> / <code>"string"</code> / <code>"boolean"</code></td></tr>
  <tr><td>Collections</td><td><code>v is List&lt;*&gt;</code></td><td><code>Array.isArray(v)</code></td></tr>
  <tr><td>Class instances</td><td><code>v is User</code></td><td><code>v instanceof User</code> (classes only)</td></tr>
  <tr><td>Interface shapes</td><td><code>v is User</code> — interfaces are retained</td><td><code>"name" in v</code> or a custom predicate <code>v is User</code></td></tr>
  <tr><td>Reusable check</td><td>helper returning <code>Boolean</code> (no smart cast without a contract)</td><td>predicate returning <code>v is User</code> (narrows at call site)</td></tr>
</table>
<p>The good news: Kotlin's smart casts already retype the <em>same</em> variable
inside the branch, so TypeScript's control-flow narrowing will feel familiar.
The real difference is at runtime — Kotlin retains classes and interfaces, so
<code>is</code> sees them all; TypeScript erases interfaces, so
<code>instanceof</code> only works on classes. For plain object shapes, a
<code>value is User</code> predicate is the idiomatic replacement, and unlike a
plain Kotlin <code>Boolean</code> helper, the compiler actually trusts it to
narrow.</p>`,
};
