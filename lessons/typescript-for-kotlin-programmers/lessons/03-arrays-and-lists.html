const LESSON = {
  number: 3,
  title: "Arrays & Lists",

  intro: `
<p>Kotlin gives you several sequence types and makes you choose:
<code>IntArray</code> (fixed length, primitive ints, no boxing) and
<code>List&lt;Int&gt;</code> (read-only) / <code>MutableList&lt;Int&gt;</code>
(growable, boxed) built with <code>listOf(...)</code> and
<code>mutableListOf(...)</code>. TypeScript collapses them into one:
<code>number[]</code>. It is dynamically sized like a
<code>MutableList</code>, there is no boxing because there is no
primitive/wrapper split (no <code>Int</code> vs <code>Integer</code>, no
autoboxing at all), and the literal syntax <code>[1, 2, 3]</code> works
everywhere — no <code>listOf</code>, no <code>arrayOf</code>.</p>
<table>
  <tr><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td><code>val a = intArrayOf(1, 2, 3)</code></td><td><code>const a: number[] = [1, 2, 3];</code></td></tr>
  <tr><td><code>val l = mutableListOf&lt;Int&gt;()</code></td><td><code>const l: number[] = [];</code> (same type as above)</td></tr>
  <tr><td><code>l.add(10)</code></td><td><code>l.push(10);</code></td></tr>
  <tr><td><code>l.size</code> / <code>a.size</code></td><td><code>l.length</code> (property, both cases)</td></tr>
  <tr><td><code>l.contains(20)</code> / <code>20 in l</code></td><td><code>l.includes(20)</code></td></tr>
  <tr><td><code>for (s in scores)</code></td><td><code>for (const s of scores)</code></td></tr>
  <tr><td><code>l[0]</code> / <code>a[0]</code></td><td><code>l[0]</code> (brackets, always)</td></tr>
</table>
<p>The renames are small and consistent: <code>add</code> →
<code>push</code>, <code>size</code> → <code>.length</code> (still a
property, just a different name), <code>contains</code> →
<code>includes</code>, and index access <code>[i]</code> carries over
unchanged. Kotlin's <code>for (s in scores)</code> becomes
<code>for..of</code> — <code>in</code> swapped for <code>of</code>, and you
declare the loop variable with <code>const</code>. Note that
<code>const</code> on an array works like <code>val</code> on a
<code>MutableList</code>: the <em>reference</em> is fixed, but
<code>push</code> still mutates the contents.</p>`,

  kotlin: `val fixed = intArrayOf(1, 2, 3)           // fixed length, primitive ints

val scores = mutableListOf<Int>()        // growable, boxed Ints
scores.add(10)
scores.add(20)
scores.add(30)

val count = scores.size                   // 3
val has20 = scores.contains(20)           // true (or: 20 in scores)

var total = 0
for (s in scores) {                       // for-in loop
    total += s
}

val names = listOf("Ada", "Grace")
val hasAda = names.contains("Ada")`,

  task: `
<p>Port the list code, using explicit element-type annotations
(<code>number[]</code>, <code>string[]</code>) throughout:</p>
<ol>
  <li>Write <code>buildScores(): number[]</code> that creates an empty
      <code>number[]</code>, adds <code>10</code>, <code>20</code>, and
      <code>30</code> with <code>.push(...)</code> (Kotlin's
      <code>.add(...)</code>), and returns it. One
      <code>mutableListOf&lt;Int&gt;()</code> call becomes
      <code>[]</code>.</li>
  <li>Write <code>sum(nums: number[]): number</code> that totals the array
      with a <code>for..of</code> loop — Kotlin's <code>for (s in nums)</code>
      with <code>of</code> instead of <code>in</code>.</li>
  <li>Write <code>hasName(names: string[], name: string): boolean</code>
      using <code>.includes(...)</code>, the rename of Kotlin's
      <code>.contains(...)</code>.</li>
</ol>`,

  starter: `// 1. mutableListOf<Int>() + three .add() calls -> [] + .push().
//    Annotate the return type: number[]
function buildScores(): number[] {
  // TODO: start from [], push 10, 20, 30, return the array
  return [];
}

// 2. Kotlin: for (s in nums) { total += s }
//    TS:     for (const s of nums) { total += s; }
function sum(nums: number[]): number {
  // TODO: total the numbers with a for..of loop
  return 0;
}

// 3. Kotlin's list.contains(x) is spelled .includes(x) here.
function hasName(names: string[], name: string): boolean {
  // TODO
  return false;
}
`,

  exportNames: ["buildScores", "sum", "hasName"],

  requirements: [
    { pattern: /:\s*number\[\]/, message: "Annotate at least one array as number[]" },
    { pattern: /:\s*string\[\]/, message: "Annotate the names parameter as string[]" },
    { pattern: /\.push\s*\(/, message: "Grow the array with .push(...) — Kotlin's list.add(...)" },
    { pattern: /for\s*\(\s*(const|let)\s+\w+\s+of\b/, message: "Use a for..of loop — Kotlin's for (s in nums), with of instead of in" },
  ],

  tests: [
    { name: "buildScores() returns [10, 20, 30]", run: (x) => expectDeepEqual(x.buildScores(), [10, 20, 30]) },
    { name: "buildScores().length is 3 (size() is a property now)", run: (x) => expectEqual(x.buildScores().length, 3) },
    { name: "sum([10, 20, 30]) is 60", run: (x) => expectEqual(x.sum([10, 20, 30]), 60) },
    { name: "sum([]) is 0", run: (x) => expectEqual(x.sum([]), 0) },
    { name: 'hasName(["Ada", "Grace"], "Ada") is true', run: (x) => expectEqual(x.hasName(["Ada", "Grace"], "Ada"), true) },
    { name: 'hasName(["Ada", "Grace"], "Linus") is false', run: (x) => expectEqual(x.hasName(["Ada", "Grace"], "Linus"), false) },
  ],

  solution: `function buildScores(): number[] {
  const scores: number[] = [];
  scores.push(10);
  scores.push(20);
  scores.push(30);
  return scores;
}

function sum(nums: number[]): number {
  let total = 0;
  for (const n of nums) {
    total += n;
  }
  return total;
}

function hasName(names: string[], name: string): boolean {
  return names.includes(name);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td>Type</td><td><code>IntArray</code> or <code>List&lt;Int&gt;</code></td><td><code>number[]</code> (also written <code>Array&lt;number&gt;</code>)</td></tr>
  <tr><td>Create</td><td><code>mutableListOf&lt;Int&gt;()</code> / <code>listOf(1, 2)</code></td><td><code>[]</code> / <code>[1, 2]</code></td></tr>
  <tr><td>Append</td><td><code>list.add(x)</code></td><td><code>arr.push(x)</code></td></tr>
  <tr><td>Size</td><td><code>list.size</code> / <code>arr.size</code></td><td><code>arr.length</code></td></tr>
  <tr><td>Membership</td><td><code>list.contains(x)</code> / <code>x in list</code></td><td><code>arr.includes(x)</code></td></tr>
  <tr><td>Index access</td><td><code>list[i]</code> / <code>arr[i]</code></td><td><code>arr[i]</code></td></tr>
  <tr><td>Iterate</td><td><code>for (s in scores)</code></td><td><code>for (const s of scores)</code></td></tr>
  <tr><td>Boxing</td><td><code>Int</code> vs boxed <code>Int</code> in <code>List</code></td><td>None — one <code>number</code> type</td></tr>
</table>
<p>One habit to keep from Kotlin and one to drop. Keep: arrays here are
homogeneous by type — <code>number[]</code> rejects a pushed string at
compile time, exactly like <code>MutableList&lt;Int&gt;</code>. Drop: the
comfort of a safe indexer — <code>arr[99]</code> on a 3-element array does
not throw an <code>IndexOutOfBoundsException</code>; it silently returns
<code>undefined</code>, which is why <code>for..of</code> and the array
methods you'll meet in the Streams lesson are preferred over hand-rolled
index loops.</p>`,
};
