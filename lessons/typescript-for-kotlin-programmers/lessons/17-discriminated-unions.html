const LESSON = {
  number: 17,
  title: "Discriminated Unions",

  intro: `
<p>If you have used Kotlin's sealed interfaces with an exhaustive
<code>when</code>, you already know discriminated unions — Kotlin arrived at
the same design. A sealed interface enumerates a closed set of subtypes, and
the compiler forces your <code>when</code> to handle every one. TypeScript
gets the identical guarantee with less machinery: each member of a union
carries a string-literal <code>kind</code> field (the <em>discriminant</em>),
and switching on it narrows the value in each <code>case</code>, exactly like a
smart cast in a <code>when</code> branch.</p>
<table>
  <tr><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td><code>sealed interface Shape</code></td><td><code>type Shape = Circle | Rectangle | Triangle;</code></td></tr>
  <tr><td><code>data class Circle(val radius: Double) : Shape</code></td><td><code>interface Circle { kind: "circle"; radius: number }</code></td></tr>
  <tr><td><code>is Circle -&gt; ... shape.radius</code></td><td><code>case "circle": ... shape.radius</code> (shape narrowed)</td></tr>
  <tr><td>Exhaustiveness: compiler rejects a missing branch</td><td>Exhaustiveness: a <code>never</code>-typed default catches the leak</td></tr>
</table>
<p>Kotlin proves exhaustiveness by refusing to compile a <code>when</code> used
as an expression with a missing branch. TypeScript's trick is the
<code>never</code> type — the type with no values, like a hypothetical class
nothing can instantiate. If your switch handles every variant, the value in the
<code>default</code> branch has been narrowed to <code>never</code>, so
assigning it to a <code>never</code>-typed constant compiles. Add a fourth
shape later and forget a case? That assignment becomes a compile error pointing
at the exact switch you need to update — the same safety net a sealed hierarchy
gives you.</p>`,

  kotlin: `sealed interface Shape
data class Circle(val radius: Double) : Shape
data class Rectangle(val width: Double, val height: Double) : Shape
data class Triangle(val base: Double, val height: Double) : Shape

fun area(shape: Shape): Double =
    // Kotlin's when as an expression over a sealed type: the compiler
    // knows the hierarchy is closed, so no else branch is needed --
    // and a missing branch is a compile error.
    when (shape) {
        is Circle    -> Math.PI * shape.radius * shape.radius
        is Rectangle -> shape.width * shape.height
        is Triangle  -> 0.5 * shape.base * shape.height
    }`,

  task: `
<p>Rebuild the sealed hierarchy as a discriminated union:</p>
<ol>
  <li>Define three interfaces — <code>Circle</code> with
      <code>kind: "circle"</code> and <code>radius: number</code>;
      <code>Rectangle</code> with <code>kind: "rectangle"</code>,
      <code>width</code>, and <code>height</code>; <code>Triangle</code> with
      <code>kind: "triangle"</code>, <code>base</code>, and
      <code>height</code>.</li>
  <li>Combine them: <code>type Shape = Circle | Rectangle | Triangle;</code></li>
  <li>Write <code>area(shape: Shape): number</code> using
      <code>switch (shape.kind)</code>. Circle is
      <code>Math.PI * r * r</code>, rectangle is <code>width * height</code>,
      triangle is <code>0.5 * base * height</code>.</li>
  <li>In the <code>default</code> branch, assign <code>shape</code> to a
      constant typed <code>never</code>, then <code>throw new Error(...)</code>.
      That assignment is your exhaustiveness proof.</li>
</ol>`,

  starter: `// TODO 1: define Circle, Rectangle, and Triangle interfaces,
// each tagged with a string-literal "kind" field.

// TODO 2: replace this placeholder with the real union.
type Shape = never; // TODO: Circle | Rectangle | Triangle

// TODO 3: exhaustive switch on shape.kind.
function area(shape: Shape): number {
  // switch (shape.kind) { case "circle": ... }
  // In the default branch, assign shape to a constant typed never,
  // then throw new Error(...) so bogus runtime data fails loudly.
  return 0; // TODO
}
`,

  exportNames: ["area"],

  requirements: [
    { pattern: /kind\s*:\s*"/, message: 'Tag each variant with a string-literal kind field (kind: "circle", ...)' },
    { pattern: /switch\s*\(/, message: "Dispatch with a switch on shape.kind" },
    { pattern: /never/, message: "Prove exhaustiveness with a never-typed constant in the default branch" },
  ],

  tests: [
    { name: "area of a circle with radius 2 is Math.PI * 4", run: (x) => expectEqual(x.area({ kind: "circle", radius: 2 }), Math.PI * 4) },
    { name: "area of a 3 x 4 rectangle is 12", run: (x) => expectEqual(x.area({ kind: "rectangle", width: 3, height: 4 }), 12) },
    { name: "area of a triangle with base 10, height 6 is 30", run: (x) => expectEqual(x.area({ kind: "triangle", base: 10, height: 6 }), 30) },
    { name: "an unknown kind throws instead of returning garbage", run: (x) => expectThrows(() => x.area({ kind: "hexagon", side: 5 })) },
  ],

  solution: `interface Circle {
  kind: "circle";
  radius: number;
}

interface Rectangle {
  kind: "rectangle";
  width: number;
  height: number;
}

interface Triangle {
  kind: "triangle";
  base: number;
  height: number;
}

type Shape = Circle | Rectangle | Triangle;

function area(shape: Shape): number {
  switch (shape.kind) {
    case "circle":
      return Math.PI * shape.radius * shape.radius;
    case "rectangle":
      return shape.width * shape.height;
    case "triangle":
      return 0.5 * shape.base * shape.height;
    default: {
      // If every variant is handled, shape is narrowed to never here.
      // Add a fourth shape and this line becomes a compile error.
      const impossible: never = shape;
      throw new Error("Unknown shape: " + JSON.stringify(impossible));
    }
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>TypeScript</th></tr>
  <tr><td>Closed hierarchy</td><td><code>sealed interface Shape</code></td><td><code>type Shape = A | B | C;</code></td></tr>
  <tr><td>Variant</td><td><code>data class Circle(val radius: Double) : Shape</code></td><td><code>interface Circle { kind: "circle"; radius: number }</code></td></tr>
  <tr><td>Which variant is it?</td><td>runtime class of the object</td><td>the literal <code>kind</code> field (survives JSON!)</td></tr>
  <tr><td>Dispatch + narrow</td><td><code>is Circle -&gt;</code> (smart cast)</td><td><code>case "circle":</code> — shape narrows in the case body</td></tr>
  <tr><td>Exhaustiveness</td><td>missing branch = compile error</td><td><code>const x: never = shape;</code> in default = compile error when a case is missing</td></tr>
  <tr><td>Bottom type</td><td><code>Nothing</code></td><td><code>never</code> — the type with no values</td></tr>
</table>
<p>One practical edge over sealed classes: the discriminant is plain data. A
<code>Shape</code> parsed from JSON is already a valid member of the union — no
deserialization into sealed subclasses, no visitor pattern, no
custom <code>kotlinx.serialization</code> polymorphic setup. The
<code>kind</code> string travels over the wire, and the same <code>switch</code>
that satisfies the compiler also routes runtime data.</p>`,
};
