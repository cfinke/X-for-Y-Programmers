  title: "Strings",

  intro: `
<p>Java's <code>String</code> will feel familiar in one sense — it is immutable,
just like a Go <code>string</code> — but the shape of the API differs sharply. Go
keeps strings plain and puts behavior in the <code>strings</code> package
(<code>strings.ToUpper(s)</code>), with formatting handled by
<code>fmt.Sprintf</code>'s <code>%s</code>/<code>%d</code> verbs. Java attaches
the same behavior as instance methods (<code>s.toUpperCase()</code>) and offers
<code>String.format</code> as its own printf-style formatter. And when you build
a string in a loop, Java's <code>+=</code> allocates a fresh object every time —
just like repeated <code>+=</code> on a Go string — so Java gives you
<code>StringBuilder</code>, the counterpart to Go's <code>strings.Builder</code>,
for that.</p>
<table>
  <tr><th>Go</th><th>Java</th></tr>
  <tr><td><code>strings.ToUpper(s)</code></td><td><code>s.toUpperCase()</code></td></tr>
  <tr><td><code>strings.Contains(s, "x")</code></td><td><code>s.contains("x")</code></td></tr>
  <tr><td><code>s[1:4]</code></td><td><code>s.substring(1, 4)</code></td></tr>
  <tr><td><code>strings.TrimSpace(s)</code></td><td><code>s.strip()</code> (Unicode-aware)</td></tr>
  <tr><td><code>strings.Repeat("ab", 3)</code></td><td><code>"ab".repeat(3)</code></td></tr>
  <tr><td><code>fmt.Sprintf("%s and %s", a, b)</code></td><td><code>String.format("%s and %s", a, b)</code></td></tr>
</table>
<p>Two things to keep in mind. First, <code>substring</code> takes a start and an
<em>end</em> index (like Go's slice expression <code>s[1:4]</code>), not a start
and a length — though Go's slicing operates on bytes, not runes, so multi-byte
UTF-8 characters can get split in half. Second, because <code>String</code> is
immutable, every method that "changes" a string actually returns a new one —
<code>s.replace(...)</code> does nothing unless you capture the result, the same
way Go's <code>strings.Replace</code> hands back a new string instead of
mutating in place.</p>`,

  go: `s := "  Hello, World  "

func shout(s string) string {
	return strings.ToUpper(strings.TrimSpace(s))
}

func greeting(name string, count int) string {
	return fmt.Sprintf("%s x%d", name, count)
}

func joinWords(words []string) string {
	var sb strings.Builder
	for _, w := range words {
		sb.WriteString(w)
		sb.WriteString("-")
	}
	return sb.String()
}`,

  solution: `class Strings {
  static String shout(String s) {
    return s.strip().toUpperCase();
  }

  static String greeting(String name, int count) {
    return String.format("%s x%d", name, count);
  }

  static String initials(String full) {
    StringBuilder sb = new StringBuilder();
    for (String word : full.split(" ")) {
      if (!word.isBlank()) {
        sb.append(word.substring(0, 1).toUpperCase());
      }
    }
    return sb.toString();
  }

  static String censor(String s, String word) {
    return s.replace(word, "***");
  }
}

<p>Watch out: Java's <code>String.split</code> takes a <em>regular expression</em>,
not a literal string, so <code>split(".")</code> splits on every character. Escape
it (<code>split("\\\\.")</code>) or use <code>Pattern.quote</code> when you mean a
literal dot. Go's <code>strings.Split</code> is the opposite — it always splits on
a literal string, so there is no equivalent gotcha; reach for
<code>regexp.MustCompile(...).Split</code> when you actually want a regex. Also
note <code>strip()</code> (Java 11+) is the Unicode-aware replacement for the
older <code>trim()</code>, which only removes ASCII control characters. And since
strings are immutable in both languages, <code>StringBuilder</code> is not an
optimization detail but the idiomatic way to assemble text piece by piece — call
<code>toString()</code> when you are done, the same way Go's
<code>strings.Builder</code> needs a final call to <code>String()</code>.</p>`,
