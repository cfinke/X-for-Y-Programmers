  intro: `
<p>Go reaches for one workhorse per job: a <em>slice</em> (<code>[]T</code>),
a <em>map with a <code>bool</code> or empty-struct value</em> for a set
(there is no built-in set type), and a <em>map</em> (<code>map[K]V</code>).
Java has the same three ideas, but they are <em>interfaces</em> —
<code>List</code>, <code>Set</code>, <code>Map</code> — each with concrete
classes behind them (<code>ArrayList</code>, <code>HashSet</code>,
<code>HashMap</code>). You program to the interface and pick the
implementation when you create it.</p>
<table>
  <tr><th>Go</th><th>Java</th></tr>
  <tr><td><code>xs := []int{1, 2}</code></td><td><code>List&lt;Integer&gt; xs = new ArrayList&lt;&gt;(List.of(1, 2));</code></td></tr>
  <tr><td><code>make(map[int]struct{})</code></td><td><code>new HashSet&lt;Integer&gt;()</code></td></tr>
  <tr><td><code>make(map[string]int)</code></td><td><code>new HashMap&lt;String, Integer&gt;()</code></td></tr>
  <tr><td><code>for _, x := range xs</code></td><td><code>for (var x : xs)</code></td></tr>
  <tr><td><code>sort.Slice(xs, func(i, j int) bool { return xs[i] &lt; xs[j] })</code></td><td><code>xs.sort(Comparator.naturalOrder())</code></td></tr>
</table>
<p>The big shift is sorting. Go's <code>sort.Slice</code> takes a raw
<code>less(i, j int) bool</code> callback that indexes back into the slice by
hand. Java gives you a <code>Comparator&lt;T&gt;</code> <em>builder</em>:
<code>Comparator.comparing(Person::name)</code> makes a comparator from a key
extractor, <code>.thenComparing(...)</code> adds a tiebreaker, and
<code>.reversed()</code> flips the direction. <code>List.sort</code> (or the
static <code>Collections.sort</code>) sorts in place; there is no
index-juggling to get wrong.</p>`,

  go: `type Person struct {
	Name string
	Age  int
}

func sortedByAgeThenName(people []Person) []Person {
	out := make([]Person, len(people))
	copy(out, people)
	sort.Slice(out, func(i, j int) bool {
		if out[i].Age != out[j].Age {
			return out[i].Age < out[j].Age
		}
		return out[i].Name < out[j].Name
	})
	return out
}

names := make([]string, 0, len(people))
for _, p := range people {

ages := make(map[int]struct{})
for _, p := range people {
	ages[p.Age] = struct{}{}
}`,

  solution: `record Person(String name, int age) {}

class Roster {
  static List<String> names(List<Person> people) {
    List<String> result = new ArrayList<>();
    for (var p : people) {
      result.add(p.name());
    }
    return result;
  }

  static Set<Integer> uniqueAges(List<Person> people) {
    Set<Integer> ages = new HashSet<>();
    for (var p : people) {
      ages.add(p.age());
    }
    return ages;
  }

  static Map<String, Integer> ageByName(List<Person> people) {
    Map<String, Integer> map = new HashMap<>();
    for (var p : people) {
      map.put(p.name(), p.age());
    }
    return map;
  }

  static List<Person> sortedByAgeThenName(List<Person> people) {
    List<Person> copy = new ArrayList<>(people);
    copy.sort(Comparator.comparingInt(Person::age).thenComparing(Person::name));
    return copy;
  }

  static List<Person> sortedByNameDesc(List<Person> people) {
    List<Person> copy = new ArrayList<>(people);
    copy.sort(Comparator.comparing(Person::name).reversed());
    return copy;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Java</th></tr>
  <tr><td>Ordered list</td><td><code>[]T</code></td><td><code>List&lt;T&gt;</code> (<code>ArrayList</code>)</td></tr>
  <tr><td>Unique set</td><td><code>map[T]struct{}</code> (no built-in set)</td><td><code>Set&lt;T&gt;</code> (<code>HashSet</code>)</td></tr>
  <tr><td>Key/value map</td><td><code>map[K]V</code></td><td><code>Map&lt;K, V&gt;</code> (<code>HashMap</code>)</td></tr>
  <tr><td>Transform</td><td><code>for _, x := range xs { out = append(out, f(x)) }</code></td><td><code>xs.stream().map(f).toList()</code> or a loop</td></tr>
  <tr><td>Sort by key</td><td><code>sort.Slice(xs, func(i, j int) bool { return xs[i].Age &lt; xs[j].Age })</code></td><td><code>xs.sort(Comparator.comparingInt(P::age))</code></td></tr>
  <tr><td>Tiebreak</td><td>extra <code>if</code> inside the <code>less</code> func</td><td><code>.thenComparing(P::name)</code></td></tr>
  <tr><td>Descending</td><td>flip the <code>&lt;</code> to <code>&gt;</code></td><td><code>.reversed()</code> / <code>Comparator.reverseOrder()</code></td></tr>
</table>
<p>Two gotchas for a Go refugee. First, <code>List.of(...)</code>,
<code>Set.of(...)</code>, and <code>Map.of(...)</code> return <em>immutable</em>
collections — calling <code>.add</code> or <code>.sort</code> on them throws
<code>UnsupportedOperationException</code>. Wrap them in
<code>new ArrayList&lt;&gt;(...)</code> when you need to mutate, which is exactly
why the sort methods copy first. Second, <code>List.sort</code> mutates in place
and returns <code>void</code> (much like Go's <code>sort.Slice</code>, which
also mutates and returns nothing), so <code>list.sort(cmp)</code> is a
statement, not something you chain off of — no need to reassign the result the
way you would after <code>append</code>.</p>`,
