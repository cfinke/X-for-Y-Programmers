  number: 8,
  title: "Control Flow & Switch",

  intro: `
<p>Loops and conditionals in Go and Java overlap on the fundamentals, but
Java's modern <code>switch</code> goes further than anything Go offers. The
<em>enhanced for</em> (<code>for (T x : coll)</code>) is close to Go's
<code>for _, x := range coll</code>, and Java's <code>while</code> is Go's
condition-only <code>for c { … }</code> (Go has no separate <code>while</code>
keyword). Go's <code>switch</code> already drops the classic fall-through
behavior of C-style switches, but it is still a <em>statement</em> — Java takes
it one step further and makes <code>switch</code> an <strong>expression</strong>:
it produces a value, uses arrow labels, and the compiler checks it is
exhaustive.</p>
<table>
  <tr><th>Go</th><th>Java</th></tr>
  <tr><td><code>for _, x := range list</code></td><td><code>for (T x : list)</code></td></tr>
  <tr><td><code>for c { … }</code></td><td><code>while (c) { … }</code></td></tr>
  <tr><td><code>switch</code> statement, no fall-through by default</td><td><code>switch</code> <em>expression</em>, arrow <code>-></code></td></tr>
  <tr><td>assign inside each case for a value</td><td><code>switch</code> that returns a value</td></tr>
</table>
<p>A switch expression pairs each label with <code>-></code>. One label can list
several constants (<code>case A, B -> …</code>), there is no fall-through — same
as Go's default — and when a branch needs more than one statement you wrap it in
a block and <code>yield</code> the result. Switching over an <code>enum</code>
that covers every constant needs no <code>default</code> — the compiler already
knows it is exhaustive, a guarantee Go's <code>switch</code> cannot give you.</p>`,

  go: `type Suit int

const (
	Hearts Suit = iota
	Diamonds
	Clubs
	Spades
)

func color(s Suit) string {
	switch s {
	case Hearts, Diamonds:
		return "Red"
	default:
		return "Black"
	}
}

func sumEven(nums []int) int {
	total := 0
	for _, n := range nums {
		if n%2 == 0 {
			total += n
		}
	}
	return total
}`,

  task: `
<p>Build a class <code>Flow</code> with <code>static</code> methods, plus an
<code>enum Suit</code>:</p>
<ol>
  <li>Declare <code>enum Suit { HEARTS, DIAMONDS, CLUBS, SPADES }</code>.</li>
  <li><code>color(Suit s)</code> returns a <code>String</code> using a
      <strong>switch expression</strong>: <code>case HEARTS, DIAMONDS -> "Red"</code>
      and <code>case CLUBS, SPADES -> "Black"</code>. No <code>default</code> is
      needed — an enum switch is exhaustive.</li>
  <li><code>sumEven(List&lt;Integer&gt; nums)</code> returns the sum of the even
      values, using an <strong>enhanced for</strong> (<code>for (int n : nums)</code>).</li>
  <li><code>factorial(int n)</code> returns a <code>long</code>, computed with a
      <code>while</code> loop.</li>
  <li><code>sizeLabel(int count)</code> returns <code>"none"</code> for 0,
      <code>"few"</code> for 1 or 2, and otherwise a block branch that
      <code>yield</code>s <code>"huge"</code> when <code>count &gt; 100</code>

</ol>`,

  starter: `enum Suit { HEARTS, DIAMONDS, CLUBS, SPADES }

class Flow {
  static String color(Suit s) {
    return ""; // TODO: switch expression with arrow labels

`,

  requirements: [
    { pattern: /for\s*\([^;)]*:[^)]*\)/, message: "Use an enhanced for loop, for (T x : coll)" },
    { pattern: /switch\s*\([^)]*\)\s*\{[\s\S]*->/, message: "Use a switch expression with arrow (->) labels" },
    { pattern: /\byield\b/, message: "Use yield to return a value from a switch block branch" },
  ],

  tests: [
    { name: "color(HEARTS) is Red", code: "      expect_eq(Flow.color(Suit.HEARTS), \"Red\");" },
    { name: "color(DIAMONDS) is Red", code: "      expect_eq(Flow.color(Suit.DIAMONDS), \"Red\");" },
    { name: "color(SPADES) is Black", code: "      expect_eq(Flow.color(Suit.SPADES), \"Black\");" },
    { name: "sumEven([1..6]) is 12", code: "      expect_eq(Flow.sumEven(List.of(1, 2, 3, 4, 5, 6)), 12);" },
    { name: "factorial(5) is 120", code: "      expect_eq(Flow.factorial(5), 120L);" },
    { name: "sizeLabel(0) is none", code: "      expect_eq(Flow.sizeLabel(0), \"none\");" },
    { name: "sizeLabel(2) is few, sizeLabel(50) is many, sizeLabel(500) is huge", code: "      expect_eq(Flow.sizeLabel(2), \"few\");\n      expect_eq(Flow.sizeLabel(50), \"many\");\n      expect_eq(Flow.sizeLabel(500), \"huge\");" },
  ],

  solution: `enum Suit { HEARTS, DIAMONDS, CLUBS, SPADES }

class Flow {
  static String color(Suit s) {
    return switch (s) {
      case HEARTS, DIAMONDS -> "Red";
      case CLUBS, SPADES -> "Black";
    };
  }

  static int sumEven(List<Integer> nums) {
    int total = 0;
    for (int n : nums) {
      if (n % 2 == 0) total += n;
    }
    return total;
  }

  static long factorial(int n) {
    long result = 1;
    int i = n;
    while (i > 1) {
      result *= i;
      i--;
    }
    return result;
  }

  static String sizeLabel(int count) {
    return switch (count) {
      case 0 -> "none";
      case 1, 2 -> "few";
      default -> {
        String label = count > 100 ? "huge" : "many";
        yield label;
      }
    };
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Java</th></tr>
  <tr><td>Iterate values</td><td><code>for _, x := range xs</code></td><td><code>for (T x : xs)</code></td></tr>
  <tr><td>Multi-label branch</td><td><code>case A, B:</code></td><td><code>case A, B -> …</code></td></tr>
  <tr><td>Fall-through</td><td>none by default (opt in with <code>fallthrough</code>)</td><td>none with <code>-></code></td></tr>
  <tr><td>Value from a branch</td><td>assign a variable, no expression form</td><td><code>yield</code> (in a block)</td></tr>
  <tr><td>Exhaustiveness</td><td>not checked by the compiler</td><td>required (enum switch needs no <code>default</code>)</td></tr>
</table>
<p>A single-expression branch (<code>case 0 -> "none"</code>) yields its value
implicitly; only a <code>{ … }</code> block needs an explicit <code>yield</code>.
Go's <code>switch</code> already drops fall-through by default — each case stops
on its own — but unlike Java it has no expression form, so producing a value
means declaring a variable above the switch and assigning it in every branch.
And when you switch over an <code>enum</code> in Java and cover every constant,
leaving out <code>default</code> is a feature: add a new constant later and the
compiler flags the switch as no longer exhaustive, something Go's plain
<code>int</code>-backed constants cannot do for you.</p>`,
};
