  title: "Interfaces",

  intro: `
<p>C++ has no dedicated <code>interface</code> keyword — the idiomatic way to
express a pure contract is an abstract class made entirely of pure virtual
functions, and a derived class opts in with public inheritance. C#'s
<code>interface</code> is that same idea made into a first-class, lighter-weight
construct: it is <em>nominal</em>, just like public inheritance in C++. A class
only implements an interface if it says so explicitly with <code>: IName</code>.
Having the right members is not enough; the class must declare the contract.</p>
<table>
  <tr><th>C++</th><th>C#</th></tr>
  <tr><td><code>struct Shape { virtual double area() const = 0; };</code></td><td><code>interface IShape { double Area(); }</code></td></tr>
  <tr><td><code>class Box : public Shape {}</code></td><td><code>class Box : IShape {}</code></td></tr>
  <tr><td>nominal (must publicly inherit)</td><td>nominal (must declare <code>: IShape</code>)</td></tr>
  <tr><td><code>const std::string& name() const;</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td><code>class C : public A, public B</code></td><td><code>class C : A, B</code></td></tr>
</table>
<p>Three conventions to absorb. First, C# interface names start with a capital
<code>I</code> (<code>IShape</code>, <code>IComparable</code>) — the same role
as an abstract base full of <code>= 0</code> methods in C++. Second, interface
members are implicitly <code>public</code> — you write no access modifier in the
interface, but the implementing class must mark them <code>public</code>. Third, in
C# 7.3 an interface has <em>no</em> method bodies at all (default interface methods
arrived later), so every member is a pure signature the class must fill in, much
like a C++ abstract class with nothing but pure virtual declarations.</p>`,

  cpp: `struct Shape {
  virtual ~Shape() = default;
  virtual std::string name() const = 0;
  virtual double area() const = 0;
};

struct Named {
  virtual ~Named() = default;
  virtual std::string describe() const = 0;
};

class Circle : public Shape, public Named {
public:
  Circle(std::string name, double r) : name_(std::move(name)), r_(r) {}
  std::string name() const override { return name_; }
  double area() const override { return M_PI * r_ * r_; }
  std::string describe() const override {
    return name_ + ": " + std::to_string(area());
  }
private:
  std::string name_;
  double r_;
};

double totalArea(const std::vector<Shape*>& shapes) {
  double sum = 0;
  for (auto* s : shapes) sum += s->area();
  return sum;
}`,

  solution: `interface IShape {
  string Name { get; }
  double Area();
}

interface IDescribable {
  string Describe();
}

class Rectangle : IShape, IDescribable {
  public string Name { get; private set; }
  private double width;
  private double height;

  public Rectangle(string name, double width, double height) {
    Name = name;
    this.width = width;
    this.height = height;
  }

  public double Area() {
    return width * height;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

class Square : IShape, IDescribable {
  public string Name { get; private set; }
  private double side;

  public Square(string name, double side) {
    Name = name;
    this.side = side;
  }

  public double Area() {
    return side * side;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

static class Shapes {
  public static double TotalArea(IShape[] shapes) {
    double sum = 0;
    foreach (IShape s in shapes) {
      sum += s.Area();
    }
    return sum;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>C#</th></tr>
  <tr><td>Declare</td><td><code>struct Shape { virtual double area() const = 0; };</code></td><td><code>interface IShape {}</code></td></tr>
  <tr><td>Implement</td><td><code>class Box : public Shape</code></td><td><code>class Box : IShape</code></td></tr>
  <tr><td>Conformance</td><td>nominal (must publicly inherit)</td><td>nominal (explicit)</td></tr>
  <tr><td>Read-only property</td><td><code>const std::string& name() const;</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td>Multiple</td><td><code>: public A, public B</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Member bodies</td><td>none (pure virtual, <code>= 0</code>)</td><td>none (in C# 7.3)</td></tr>
</table>
<p>Because conformance is nominal, adding a method that happens to match an
interface does <em>not</em> make a class implement it — you must list the interface
after the colon, exactly as in C++ you must publicly inherit from the abstract
base to satisfy it. That same colon does double duty for base classes: a class can
extend at most one class but implement any number of interfaces, and if it does
both the base class comes first (<code>class C : BaseClass, IShape</code>). Unlike
C++, there's no diamond-inheritance ambiguity to worry about, no virtual
inheritance, and no vtable pointers to manage by hand — the runtime handles
dispatch for you.</p>
<p>The payoff is the <code>IShape[]</code> parameter in <code>TotalArea</code>:
callers pass concrete <code>Rectangle</code> and <code>Square</code> objects, but
the method only sees the contract — much like taking a <code>const Shape&amp;</code>
or a <code>Shape*</code> in C++, except C# needs no raw pointers or manual lifetime
management to do it. This is C#'s everyday tool for decoupling and is exactly what
powers built-in interfaces like <code>IEnumerable&lt;T&gt;</code>,
<code>IComparable&lt;T&gt;</code>, and <code>IEquatable&lt;T&gt;</code>.</p>`,
