  intro: `
<p>Exceptions in C# will feel familiar: <code>try</code>/<code>catch</code>/<code>finally</code>
and <code>throw</code> work much like C++. The differences are all about
<em>types</em> and <em>cleanup</em>. In C++ you can <code>throw</code> almost any
value — an <code>int</code>, a <code>std::string</code>, or (by convention) a type
derived from <code>std::exception</code> — and a catch-all <code>catch (...)</code>
handles whatever comes through. In C# you can only throw objects that derive from
<code>System.Exception</code>, and each <code>catch</code> names the exception type
it handles — so you rarely need a catch-all at all.</p>
<table>
  <tr><th>C++</th><th>C#</th></tr>
  <tr><td><code>throw std::runtime_error("bad")</code></td><td><code>throw new Exception("bad")</code></td></tr>
  <tr><td><code>catch (const std::exception&amp; e) { … }</code></td><td><code>catch (Exception e) { … }</code></td></tr>
  <tr><td><code>catch (const ValidationError&amp; e) { … }</code></td><td><code>catch (ValidationException e) { … }</code></td></tr>
  <tr><td><code>class E : public std::exception {}</code></td><td><code>class E : Exception {}</code></td></tr>
  <tr><td><code>e.what()</code></td><td><code>e.Message</code></td></tr>
  <tr><td><code>{ std::lock_guard&lt;std::mutex&gt; lk(m); … }</code></td><td><code>using (var conn = …) { … }</code></td></tr>
</table>
<p>The last row is the big new idea. C++ relies on RAII: a destructor runs
automatically when an object goes out of scope, whether the block exits normally
or by exception, so cleanup is implicit and needs no extra syntax. C# has no
destructor you can lean on for this — finalizers exist, but they only reclaim
unmanaged memory and run on the garbage collector's own schedule, not when a
scope ends. Instead C# gives you <code>IDisposable</code>: any type with a
<code>Dispose()</code> method. A <code>using</code> block guarantees
<code>Dispose()</code> runs when the block exits, making it the explicit, opt-in
stand-in for the RAII cleanup C++ gives you for free.</p>`,

  cpp: `class ValidationError : public std::runtime_error {
public:
  explicit ValidationError(const std::string& message)
    : std::runtime_error(message) {}
};

int validateAge(int age) {
  if (age < 0) throw ValidationError("age cannot be negative");
  if (age > 150) throw ValidationError("age is unrealistically large");
  return age;
}

int safeValidateAge(int age, int fallback) {
  try {
    return validateAge(age);
  } catch (const ValidationError&) {
    return fallback;
  }
}`,

  solution: `class ValidationException : Exception {
  public ValidationException(string message) : base(message) { }
}

class Resource : IDisposable {
  public static int OpenCount = 0;
  public bool Disposed = false;

  public Resource() {
    OpenCount++;
  }

  public void Dispose() {
    Disposed = true;
    OpenCount--;
  }
}

static class Validator {
  public static int ValidateAge(int age) {
    if (age < 0) throw new ValidationException("age cannot be negative");
    if (age > 150) throw new ValidationException("age is unrealistically large");
    return age;
  }

  public static int SafeValidateAge(int age, int fallback) {
    try {
      return ValidateAge(age);
    } catch (ValidationException) {
      return fallback;
    }
  }

  public static string Process(int age) {
    var log = new StringBuilder();
    using (var res = new Resource()) {
      try {
        int valid = ValidateAge(age);
        log.Append($"ok:{valid}");
      } catch (ValidationException ex) {
        log.Append($"error:{ex.Message}");
      } finally {
        log.Append("|cleanup");
      }
    }
    return log.ToString();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>C#</th></tr>
  <tr><td>Throw</td><td><code>throw std::runtime_error("x")</code></td><td><code>throw new Exception("x")</code></td></tr>
  <tr><td>Catch by type</td><td><code>catch (const T&amp; e)</code></td><td><code>catch (T e)</code></td></tr>
  <tr><td>Custom exception</td><td><code>class E : public std::exception</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Message</td><td><code>e.what()</code></td><td><code>e.Message</code></td></tr>
  <tr><td>Deterministic cleanup</td><td>RAII destructor</td><td><code>using (var x = …)</code></td></tr>
</table>
<p>A few things worth internalizing. Order your <code>catch</code> blocks
most-specific first — a <code>catch (Exception)</code> ahead of
<code>catch (ValidationException)</code> is a compile error because the second is
unreachable, the same way putting <code>catch (const std::exception&amp;)</code>
before <code>catch (const ValidationError&amp;)</code> would make the second
unreachable in C++. To catch by type but keep going, use a bare
<code>catch (ValidationException)</code> with no variable (as in
<code>SafeValidateAge</code>) when you do not need <code>e</code> — the C++
equivalent is a reference catch with no name, <code>catch (const
ValidationError&amp;)</code>.</p>
<p>A <code>using</code> block is pure sugar for
<code>try { … } finally { x.Dispose(); }</code>, and it is how C# programmers write
"close this no matter what," standing in for the destructor call C++ would trigger
automatically. Reach for it around files, streams, database connections, and locks
— anywhere C++ would lean on RAII. When you need a real custom exception, derive
from <code>Exception</code> (or a more specific base such as
<code>ArgumentException</code>) and forward the message with <code>: base(message)</code>
so <code>e.Message</code> works for free, just as a C++ exception type derives from
<code>std::exception</code> and forwards to its constructor so <code>what()</code>
works for free.</p>`,
