  title: "Strings",

  intro: `
<p>C# strings will feel familiar in one big way and unfamiliar in another: they
are immutable sequences of UTF-16 code units, so every operation returns a
<em>new</em> string rather than mutating the original — unlike C++'s
<code>std::string</code>, which you can happily mutate in place with
<code>s[0] = 'X';</code> or <code>s.append(...)</code>. The method names also
differ: they are PascalCase, and a couple of them (<code>Substring</code>,
<code>IndexOf</code>) have sharper edges than their C++ cousins.</p>
<table>
  <tr><th>C++</th><th>C#</th></tr>
  <tr><td><code>std::transform(s.begin(), s.end(), s.begin(), ::toupper)</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td><code>s.find("x") != std::string::npos</code></td><td><code>s.Contains("x")</code></td></tr>
  <tr><td><code>s.find("x")</code></td><td><code>s.IndexOf("x")</code></td></tr>
  <tr><td><code>s.substr(1, 3)</code></td><td><code>s.Substring(1, 3)</code></td></tr>
  <tr><td>hand-rolled with <code>std::stringstream</code>/<code>std::getline</code></td><td><code>s.Split(',')</code></td></tr>
  <tr><td>hand-rolled with <code>find_first_not_of</code>/<code>find_last_not_of</code></td><td><code>s.Trim()</code></td></tr>
  <tr><td>hand-rolled loop (or <code>std::accumulate</code>)</td><td><code>string.Join(", ", arr)</code></td></tr>
</table>
<p>One reassurance and one trap. <code>Substring(start, length)</code> takes a
<em>length</em>, just like C++'s <code>substr(pos, len)</code> — so the shape
should feel natural. But <code>IndexOf</code> returns <code>-1</code> when the
substring is missing, whereas C++'s <code>find</code> returns
<code>std::string::npos</code> (a huge unsigned value, not literally
<code>-1</code>) — mind the type when you port a bounds check. For assembling
many pieces in a loop, reach for <code>StringBuilder</code> instead of
repeatedly <code>+</code>-ing strings; in C++ you'd just keep appending to the
same mutable <code>std::string</code>, but because C# strings are immutable,
<code>StringBuilder</code> is the idiomatic tool for the same job.</p>`,

  cpp: `#include <string>
#include <vector>
#include <algorithm>
#include <sstream>
#include <cctype>

std::string shout(std::string s) {
    size_t start = s.find_first_not_of(' ');
    size_t end = s.find_last_not_of(' ');
    s = (start == std::string::npos) ? "" : s.substr(start, end - start + 1);
    std::transform(s.begin(), s.end(), s.begin(), ::toupper);
    return s;
}

std::string csv(const std::vector<std::string>& parts) {
    std::string out;
    for (size_t i = 0; i < parts.size(); ++i) {
        if (i > 0) out += ", ";
        out += parts[i];
    }
    return out;
}

std::string initials(const std::string& name) {
    std::istringstream iss(name);
    std::string word, out;
    while (iss >> word) {
        out += word[0];
    }
    return out;
}`,

  solution: `static class TextUtil {
  public static string Shout(string s) {
    return s.Trim().ToUpper();
  }

  public static string Csv(string[] parts) {
    return string.Join(", ", parts);
  }

  public static string Initials(string name) {
    var sb = new StringBuilder();
    foreach (var word in name.Split(' ')) {
      if (word.Length > 0) {
        sb.Append(word[0]);
      }
    }
    return sb.ToString();
  }

  public static string Greeting(string name) {
    return $"Hello, {name}!";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>C#</th></tr>
  <tr><td>Uppercase</td><td><code>std::transform(s.begin(), s.end(), s.begin(), ::toupper)</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td>Contains</td><td><code>s.find(x) != std::string::npos</code></td><td><code>s.Contains(x)</code></td></tr>
  <tr><td>Substring</td><td><code>s.substr(1, 3)</code> (start, length)</td><td><code>s.Substring(1, 3)</code> (start, <em>length</em> — same shape)</td></tr>
  <tr><td>Replace</td><td>hand-rolled loop calling <code>s.replace(pos, len, repl)</code> per match</td><td><code>s.Replace("a", "b")</code> (replaces all)</td></tr>
  <tr><td>Join</td><td>hand-rolled loop (or <code>std::accumulate</code>)</td><td><code>string.Join(sep, arr)</code> (static)</td></tr>
  <tr><td>Build in loop</td><td><code>out += piece;</code> (already mutable)</td><td><code>sb.Append(piece)</code></td></tr>
</table>
<p>A few more idioms worth filing away. <code>string.Split</code> takes a
<code>char</code> (single quotes: <code>','</code>) or a <code>string[]</code> of
separators — no regex involved, so unlike a hand-rolled C++ splitter built
around <code>std::stringstream</code> or <code>find</code>/<code>substr</code>
loops, there's nothing to escape. <code>Replace</code> swaps <em>every</em>
occurrence, which is more convenient than C++, where there is no built-in
"replace all" — you write a loop that repeatedly calls <code>find</code> and
<code>replace</code> (or reach for a library). <code>StartsWith</code>,
<code>EndsWith</code>, and <code>Contains</code> all return <code>bool</code>,
mirroring C++20's <code>starts_with</code>/<code>ends_with</code> or a
<code>find</code>-based check on older standards. And note that
<code>string.Join</code>, <code>string.IsNullOrEmpty</code>, and friends are
<em>static</em> methods on the <code>string</code> type, which is why the call
reads <code>string.Join(...)</code> rather than <code>arr.Join(...)</code> —
similar to how a free function like <code>std::to_string</code> lives outside
the class in C++ rather than as a member.</p>`,
