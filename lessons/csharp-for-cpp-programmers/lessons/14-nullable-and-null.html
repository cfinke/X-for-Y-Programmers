const LESSON = {
  number: 14,
  title: "Nullable & Null Handling",

  intro: `
<p>C++ has no single, universal notion of "empty" that works across every type.
A raw pointer (<code>std::string*</code>) already carries <code>nullptr</code> as
a built-in empty state, but a plain value type like <code>int</code> has no such
state — <code>0</code> is a perfectly valid <code>int</code>, not an absence of
one. <code>std::optional&lt;T&gt;</code> (C++17) fills that gap by wrapping any
type in a box that may or may not hold a value. C# 7.3 draws the same line:
<em>reference</em> types (like <code>string</code>) are already nullable, but
<em>value</em> types (<code>int</code>, <code>bool</code>, <code>DateTime</code>,
structs) cannot hold <code>null</code> unless you opt in with <code>?</code> —
that <code>int?</code> is shorthand for <code>Nullable&lt;int&gt;</code>.</p>
<table>
  <tr><th>C++</th><th>C# 7.3</th></tr>
  <tr><td><code>std::optional&lt;int&gt; n = std::nullopt;</code></td><td><code>int? n = null;</code></td></tr>
  <tr><td><code>std::string* s = nullptr;</code></td><td><code>string s = null;</code> (already nullable)</td></tr>
  <tr><td><code>n.value_or(0)</code></td><td><code>n ?? 0</code></td></tr>
  <tr><td><code>user ? user-&gt;name : ""</code></td><td><code>user?.Name</code></td></tr>
  <tr><td><code>n.has_value()</code></td><td><code>n.HasValue</code></td></tr>
</table>
<p>Note the asymmetry: there is no <code>string?</code> in C# 7.3 — nullable
<em>reference</em> types arrived later, so a plain <code>string</code> can already
be <code>null</code>. Only value types need the <code>?</code>. An <code>int?</code>
exposes <code>HasValue</code> (a <code>bool</code>), <code>Value</code> (throws if
empty), and <code>GetValueOrDefault()</code>. The null-coalescing
<code>??</code> and null-conditional <code>?.</code> operators work like a
combination of <code>std::optional</code>'s <code>value_or</code> and a manual
pointer-null check in C++.</p>`,

  cpp: `#include <optional>
#include <string>
#include <charconv>

std::optional<int> parseAge(const std::string& text) {
  int n;
  auto result = std::from_chars(text.data(), text.data() + text.size(), n);
  if (result.ec == std::errc()) {
    return n;
  }
  return std::nullopt;
}

int ageOrDefault(const std::string& text, int fallback) {
  return parseAge(text).value_or(fallback);
}

std::optional<char> firstLetter(const std::string* name) {
  return name ? std::optional<char>{(*name)[0]} : std::nullopt;
}`,

  task: `
<p>Build a <code>static class NullTools</code> that mirrors the C++ above
using C# nullable value types and null operators:</p>
<ol>
  <li><code>ParseAge(string text)</code> returns an <code>int?</code>: parse with
      <code>int.TryParse(text, out int n)</code>, returning <code>n</code> on
      success and <code>null</code> otherwise.</li>
  <li><code>AgeOrDefault(string text, int fallback)</code> returns an
      <code>int</code> — use <code>??</code> on the result of
      <code>ParseAge</code>.</li>
  <li><code>Describe(int? age)</code> returns a string: if the value is present
      return <code>$"age {age.Value}"</code> (guard with <code>HasValue</code>),
      otherwise return <code>"unknown"</code>.</li>
  <li><code>FirstLetter(string name)</code> returns a <code>string</code>: use the
      null-conditional <code>?.</code> so a <code>null</code> name yields
      <code>null</code> — e.g. <code>name?.Substring(0, 1)</code>.</li>
</ol>`,

  starter: `static class NullTools {
  public static int? ParseAge(string text) {
    return null; // TODO
  }

  public static int AgeOrDefault(string text, int fallback) {
    return 0; // TODO: use ??
  }

  public static string Describe(int? age) {
    return ""; // TODO: check HasValue
  }

  public static string FirstLetter(string name) {
    return null; // TODO: use ?.
  }
}
`,

  requirements: [
    { pattern: /int\?/, message: "Use a nullable value type (int?) for the age" },
    { pattern: /\?\?/, message: "Use the null-coalescing operator (??) to supply the fallback" },
    { pattern: /\?\./, message: "Use the null-conditional operator (?.) in FirstLetter" },
  ],

  tests: [
    { name: "ParseAge(\"36\") is 36", code: "      expect_eq(NullTools.ParseAge(\"36\"), 36);" },
    { name: "ParseAge(\"abc\") is null", code: "      expect_true(NullTools.ParseAge(\"abc\") == null);" },
    { name: "AgeOrDefault(\"abc\", 18) is 18", code: "      expect_eq(NullTools.AgeOrDefault(\"abc\", 18), 18);" },
    { name: "AgeOrDefault(\"42\", 18) is 42", code: "      expect_eq(NullTools.AgeOrDefault(\"42\", 18), 42);" },
    { name: "Describe(36) is \"age 36\"", code: "      expect_eq(NullTools.Describe(36), \"age 36\");" },
    { name: "Describe(null) is \"unknown\"", code: "      expect_eq(NullTools.Describe(null), \"unknown\");" },
    { name: "FirstLetter(null) is null", code: "      expect_true(NullTools.FirstLetter(null) == null);" },
    { name: "FirstLetter(\"Ada\") is \"A\"", code: "      expect_eq(NullTools.FirstLetter(\"Ada\"), \"A\");" },
  ],

  solution: `static class NullTools {
  public static int? ParseAge(string text) {
    if (int.TryParse(text, out int n)) {
      return n;
    }
    return null;
  }

  public static int AgeOrDefault(string text, int fallback) {
    return ParseAge(text) ?? fallback;
  }

  public static string Describe(int? age) {
    if (age.HasValue) {
      return $"age {age.Value}";
    }
    return "unknown";
  }

  public static string FirstLetter(string name) {
    return name?.Substring(0, 1);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>C# 7.3</th></tr>
  <tr><td>Nullable value</td><td><code>std::optional&lt;int&gt;</code></td><td><code>int?</code> / <code>Nullable&lt;int&gt;</code></td></tr>
  <tr><td>Has a value?</td><td><code>n.has_value()</code></td><td><code>n.HasValue</code></td></tr>
  <tr><td>Unwrap</td><td><code>n.value()</code> (throws <code>std::bad_optional_access</code>)</td><td><code>n.Value</code> (throws if empty)</td></tr>
  <tr><td>Unwrap or default</td><td><code>n.value_or(0)</code></td><td><code>n.GetValueOrDefault()</code> or <code>n ?? 0</code></td></tr>
  <tr><td>Safe navigation</td><td><code>ptr ? ptr-&gt;prop : ...</code> (no built-in operator)</td><td><code>obj?.Prop</code></td></tr>
</table>
<p>Reading <code>.Value</code> on an empty <code>int?</code> throws
<code>InvalidOperationException</code> — a checked, catchable failure, unlike
dereferencing a null pointer in C++, which is undefined behavior rather than an
exception — so guard with <code>HasValue</code> or prefer <code>??</code> /
<code>GetValueOrDefault()</code>. Because <code>int?</code> is really
<code>Nullable&lt;int&gt;</code>, it boxes to a plain <code>int</code> (or
<code>null</code>) when compared as <code>object</code>, which is why the tests
above can write <code>expect_eq(ParseAge("36"), 36)</code>. Remember the split:
in C# 7.3 the <code>?</code> is only for value types — reference types like
<code>string</code> are nullable already, and there is no <code>string?</code>
yet.</p>`,
};
