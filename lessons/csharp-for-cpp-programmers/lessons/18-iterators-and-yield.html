  intro: `
<p>C++20 coroutines let a function suspend itself with <code>co_yield</code> and
produce values lazily, one at a time, resuming only when the caller asks for the
next one. C# has the exact same idea under different names: a method whose return
type is <code>IEnumerable&lt;T&gt;</code> becomes an <em>iterator</em> the moment it
contains a <code>yield return</code>, and <code>foreach</code> plays the role of a
C++ range-based <code>for</code> loop over that lazily-produced sequence.</p>
<table>
  <tr><th>C++</th><th>C#</th></tr>
  <tr><td><code>std::generator&lt;int&gt; g()</code> (C++23, via <code>co_yield</code>)</td><td><code>IEnumerable&lt;int&gt; G()</code></td></tr>
  <tr><td><code>co_yield x;</code></td><td><code>yield return x;</code></td></tr>
  <tr><td><code>co_return;</code> (stop early)</td><td><code>yield break;</code></td></tr>
  <tr><td><code>for (int x : seq)</code></td><td><code>foreach (var x in seq)</code></td></tr>
  <tr><td>a member function returning a generator</td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>Two things to internalize. First, iterators are <em>lazy</em>: the body does not
run until something enumerates it, and it runs only as far as the consumer asks —
so an infinite <code>Fibonacci()</code> is fine as long as a caller uses
<code>Take(…)</code> to stop pulling. Second, there is no special generator
keyword; in C#, the compiler rewrites any method containing <code>yield</code> into
a state machine automatically, exactly the way a C++20 compiler rewrites any
function containing <code>co_yield</code> into a coroutine frame behind the
scenes. To make a whole <em>class</em> iterable, implement
<code>IEnumerable&lt;T&gt;</code> and give it a <code>GetEnumerator()</code> — which
can itself be an iterator built from <code>yield return</code>, much like a C++
class exposing a member function that returns a <code>std::generator</code>.</p>`,

  cpp: `#include <generator>   // C++23

std::generator<int> range(int start, int count) {
  for (int i = 0; i < count; i++) co_yield start + i;
}

template <typename T>
std::generator<T> take(std::generator<T> source, int n) {
  int i = 0;
  for (T x : source) {
    if (i >= n) co_return;   // stop early
    co_yield x;
    i++;
  }
}

std::generator<long> fibonacci() {
  long a = 0, b = 1;
  while (true) {
    co_yield a;
    long next = a + b;
    a = b;
    b = next;
  }
}

class Countdown {
  int start;
public:
  explicit Countdown(int start) : start(start) {}
  std::generator<int> items() const {
    for (int i = start; i >= 1; i--) co_yield i;
  }
};

// usage: for (int x : Countdown(3).items()) { ... }`,

  solution: `static class Sequences {
  public static IEnumerable<int> Range(int start, int count) {
    for (int i = 0; i < count; i++) {
      yield return start + i;
    }
  }

  public static IEnumerable<T> Take<T>(IEnumerable<T> source, int n) {
    int i = 0;
    foreach (T item in source) {
      if (i >= n) {
        yield break;
      }
      yield return item;
      i++;
    }
  }

  public static IEnumerable<long> Fibonacci() {
    long a = 0, b = 1;
    while (true) {
      yield return a;
      long next = a + b;
      a = b;
      b = next;
    }
  }
}

class Countdown : IEnumerable<int> {
  private int start;

  public Countdown(int start) {
    this.start = start;
  }

  public IEnumerator<int> GetEnumerator() {
    for (int i = start; i >= 1; i--) {
      yield return i;
    }
  }

  IEnumerator IEnumerable.GetEnumerator() {
    return GetEnumerator();
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>C#</th></tr>
  <tr><td>Generator function</td><td>function using <code>co_yield</code>, returning <code>std::generator&lt;T&gt;</code> (C++23)</td><td>method returning <code>IEnumerable&lt;T&gt;</code> with <code>yield</code></td></tr>
  <tr><td>Emit a value</td><td><code>co_yield x;</code></td><td><code>yield return x;</code></td></tr>
  <tr><td>Stop early</td><td><code>co_return;</code></td><td><code>yield break;</code></td></tr>
  <tr><td>Consume</td><td>range-based <code>for (T x : seq)</code></td><td><code>foreach</code> / LINQ</td></tr>
  <tr><td>Iterable class</td><td>member function returning a generator</td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>An iterator method's body does not execute when you call it — it runs on demand
as the consumer pulls values. That laziness is why an infinite <code>Fibonacci()</code>
never hangs: <code>Take(Fibonacci(), 7)</code> pulls exactly seven values and then
stops asking. It is also why any exception or expensive setup inside the method is
deferred until the first <code>MoveNext</code>.</p>
<p>Because iterator methods return <code>IEnumerable&lt;T&gt;</code>, the entire LINQ
surface (<code>Where</code>, <code>Select</code>, <code>Sum</code>, <code>First</code>,
<code>SequenceEqual</code>, …) composes over them for free — the same way the
<code>&lt;ranges&gt;</code> algorithms and views compose over anything that models a
C++ range, including a <code>std::generator</code>. Implementing
<code>IEnumerable&lt;T&gt;</code> on a class requires two <code>GetEnumerator</code>
methods: the generic one you actually write, plus a non-generic
<code>IEnumerator IEnumerable.GetEnumerator()</code> (explicit interface
implementation) that just delegates to it — a legacy requirement from the
pre-generics <code>System.Collections</code> interface.</p>`,
