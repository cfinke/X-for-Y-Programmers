  title: "Equality & Comparable",

  intro: `
<p>In C++, <code>==</code> on two objects only works if you overload
<code>operator==</code> yourself, and the default is either a compile error or
(for pointers) reference identity; ordering for <code>std::sort</code> comes
from overloading <code>operator&lt;</code> or supplying a comparator. C# lets
a type define what equality and ordering <em>mean</em> through a small,
standard set of interfaces. You override a handful of members, and then
<code>==</code>, <code>.Equals()</code>, hash-based collections, and
<code>List&lt;T&gt;.Sort()</code> all cooperate with your type.</p>
<table>
  <tr><th>C++</th><th>C#</th></tr>
  <tr><td><code>a == b</code> (only if you overload <code>operator==</code>)</td><td><code>a == b</code> (you can define it)</td></tr>
  <tr><td><code>a.equals(b)</code> (your own method)</td><td><code>a.Equals(b)</code> via <code>IEquatable&lt;T&gt;</code></td></tr>
  <tr><td>hand-written hash specialization for <code>std::unordered_map</code></td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td><code>std::sort(v.begin(), v.end())</code> via <code>operator&lt;</code></td><td><code>list.Sort()</code> via <code>IComparable&lt;T&gt;</code></td></tr>
</table>
<p>The one firm rule: <strong>if you override <code>Equals</code>, you must also
override <code>GetHashCode</code></strong>, and equal objects must return equal
hash codes — otherwise <code>Dictionary</code> and <code>HashSet</code> will lose
your keys. Implement <code>IEquatable&lt;T&gt;</code> for a strongly-typed,
allocation-free <code>Equals(T)</code>, and <code>IComparable&lt;T&gt;</code> so
sorting and <code>SortedSet</code> know the order. Overloading <code>==</code> is
a nicety layered on top of <code>Equals</code>.</p>`,

  cpp: `struct SemVer {
  int major, minor, patch;

  bool operator==(const SemVer& o) const {
    return major == o.major && minor == o.minor && patch == o.patch;
  }

  bool operator<(const SemVer& o) const {
    if (major != o.major) return major < o.major;
    if (minor != o.minor) return minor < o.minor;
    return patch < o.patch;
  }
};

std::vector<SemVer> versions = { {1, 2, 0}, {1, 0, 5} };
std::sort(versions.begin(), versions.end()); // uses operator<`,

  solution: `class SemVer : IEquatable<SemVer>, IComparable<SemVer> {
  public int Major { get; }
  public int Minor { get; }
  public int Patch { get; }

  public SemVer(int major, int minor, int patch) {
    Major = major;
    Minor = minor;
    Patch = patch;
  }

  public bool Equals(SemVer other) {
    if (ReferenceEquals(other, null)) return false;
    return Major == other.Major && Minor == other.Minor && Patch == other.Patch;
  }

  public override bool Equals(object obj) {
    return Equals(obj as SemVer);
  }

  public override int GetHashCode() {
    unchecked {
      int hash = 17;
      hash = hash * 31 + Major;
      hash = hash * 31 + Minor;
      hash = hash * 31 + Patch;
      return hash;
    }
  }

  public int CompareTo(SemVer other) {
    if (ReferenceEquals(other, null)) return 1;
    int c = Major.CompareTo(other.Major);
    if (c != 0) return c;
    c = Minor.CompareTo(other.Minor);
    if (c != 0) return c;
    return Patch.CompareTo(other.Patch);
  }

  public static bool operator ==(SemVer a, SemVer b) {
    if (ReferenceEquals(a, b)) return true;
    if (ReferenceEquals(a, null) || ReferenceEquals(b, null)) return false;
    return a.Equals(b);
  }

  public static bool operator !=(SemVer a, SemVer b) {
    return !(a == b);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>C#</th></tr>
  <tr><td>Value equality</td><td><code>operator==</code> overload</td><td><code>IEquatable&lt;T&gt;</code> + <code>Equals</code> overrides</td></tr>
  <tr><td>Hashing a key</td><td><code>std::hash&lt;T&gt;</code> specialization</td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td>Ordering</td><td><code>operator&lt;</code> or a comparator passed to <code>std::sort</code></td><td><code>IComparable&lt;T&gt;.CompareTo</code></td></tr>
  <tr><td>Operator</td><td><code>operator==</code> / <code>operator!=</code> as free or member functions</td><td><code>operator ==</code> / <code>!=</code></td></tr>
</table>
<p>The <code>Equals</code>/<code>GetHashCode</code> pair is the part people forget.
Hash-based collections first bucket by hash code, then confirm with
<code>Equals</code> — so two objects that are <code>Equals</code> but hash
differently will land in different buckets and never be found. Keeping the hash
in sync with the fields you compare is what makes <code>HashSet</code> and
<code>Dictionary</code> keys work — the same discipline C++ requires when you
specialize <code>std::hash</code> alongside <code>operator==</code> for a type
used as an <code>unordered_map</code> key.</p>
<p><code>CompareTo</code> returns a sign, not a boolean: negative means "I sort
before <code>other</code>", zero means "equal order", positive means "after".
Delegating to each field's own <code>CompareTo</code> (<code>Major.CompareTo(…)</code>)
gives you correct results for free. Once <code>IComparable&lt;T&gt;</code> is in
place, <code>List&lt;T&gt;.Sort()</code>, <code>Array.Sort</code>, and
<code>SortedSet&lt;T&gt;</code> all use it with no comparator argument — unlike
C++, where <code>std::sort</code> and <code>std::set</code> need an
<code>operator&lt;</code> (or explicit comparator) supplied per container. On
modern .NET you'd usually let a <code>record</code> generate all of this, but
records don't exist in C# 7.3 — writing it by hand shows exactly what they
generate.</p>`,
