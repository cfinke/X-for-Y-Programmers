<script>
const LESSON = {
  number: 2,
  title: "Functions & Control Flow",

  intro: `
<p>A PHP 8 signature like <code>function f(int $x): string</code> translates
almost mechanically to Rust: <code>fn f(x: i32) -> String</code>. Same
shape — name, typed parameters, return type — the only news is spelling:
<code>fn</code> instead of <code>function</code>, <code>-&gt;</code> instead
of <code>:</code>, and the types you sometimes write in PHP are now
mandatory everywhere.</p>
<table>
  <tr><th>PHP</th><th>Rust</th></tr>
  <tr><td><code>function f(int $x): string</code></td><td><code>fn f(x: i32) -> String</code></td></tr>
  <tr><td><code>$m = $a > $b ? $a : $b;</code></td><td><code>let m = if a > b { a } else { b };</code></td></tr>
  <tr><td><code>return $x;</code> (always required)</td><td>last expression, no semicolon — <code>return</code> is only for early exits</td></tr>
  <tr><td><code>if ($x) { ... }</code> — a statement</td><td><code>if x { ... }</code> — an expression that produces a value</td></tr>
</table>
<p>The real shift is that in Rust, control flow is made of
<em>expressions</em>. PHP's <code>if</code> is a statement — it does things
but is nothing — so PHP grew a separate ternary <code>?:</code> for the
"choose a value" case. Rust doesn't need one: <code>if</code> itself
produces a value, so <code>let m = if a &gt; b { a } else { b };</code>
replaces the ternary outright. The same principle powers implicit returns:
a block's <em>last expression</em> — written without a semicolon — is the
block's value, so most functions never say <code>return</code> at all.
Add a semicolon and you turn the expression into a statement, discarding
the value; forgetting this is the classic first-week Rust compile error.</p>`,

  php: `<?php
function maxOf(int $a, int $b): int {
    return $a > $b ? $a : $b;   // the ternary: if-as-a-value, bolted on
}

function grade(int $score): string {
    if ($score >= 60) {
        return "pass";
    }
    return "fail";
}

function sign(int $n): int {
    if ($n > 0) return 1;
    if ($n < 0) return -1;
    return 0;
}

echo maxOf(3, 8);   // 8`,

  task: `
<p>Rewrite the PHP as Rust, leaning on expressions:</p>
<ol>
  <li>Write <code>max_of</code> taking <code>a: i32</code> and
      <code>b: i32</code>, returning <code>i32</code>. Bind the result of an
      <code>if</code>-expression to a local with
      <code>let ... = if ...</code> (this replaces PHP's ternary) and make
      that local the function's last expression — do not use the
      <code>return</code> keyword anywhere.</li>
  <li>Write <code>grade</code> taking <code>score: u32</code> and returning
      <code>String</code>: <code>"pass"</code> for scores of 60 and above,
      <code>"fail"</code> below.</li>
  <li>Write <code>sign</code> taking <code>n: i32</code> and returning
      <code>i32</code>: 1 for positive, -1 for negative, 0 for zero — one
      <code>if / else if / else</code> chain as the function body.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. max_of: let bigger = if ... { ... } else { ... }; then make
//    \`bigger\` the last expression (no semicolon, no \`return\`).
fn max_of(a: i32, b: i32) -> i32 {
    todo!()
}

// 2. grade: "pass" for 60 and up, "fail" below.
//    Tip: "pass".to_string() turns a literal into a String.
fn grade(score: u32) -> String {
    todo!()
}

// 3. sign: 1, -1, or 0. The whole body can be one if/else-if/else chain.
fn sign(n: i32) -> i32 {
    todo!()
}
`,

  requirements: [
    { pattern: /->/, message: "Give your functions return types with ->" },
    { pattern: /=\s*if\b/, message: "Bind the result of an if-expression: let x = if ..." },
  ],

  tests: [
    { name: "max_of(3, 8) returns 8",
      code: "assert_eq!(max_of(3, 8), 8);" },
    { name: "max_of(10, -2) returns 10",
      code: "assert_eq!(max_of(10, -2), 10);" },
    { name: 'grade(72) returns "pass"',
      code: 'assert_eq!(grade(72), "pass");' },
    { name: 'grade(60) passes, grade(59) fails',
      code: 'assert_eq!(grade(60), "pass");\nassert_eq!(grade(59), "fail");' },
    { name: "sign(42) is 1, sign(-7) is -1, sign(0) is 0",
      code: "assert_eq!(sign(42), 1);\nassert_eq!(sign(-7), -1);\nassert_eq!(sign(0), 0);" },
  ],

  solution: `fn max_of(a: i32, b: i32) -> i32 {
    let bigger = if a > b { a } else { b };
    bigger
}

fn grade(score: u32) -> String {
    let result = if score >= 60 { "pass" } else { "fail" };
    result.to_string()
}

fn sign(n: i32) -> i32 {
    if n > 0 {
        1
    } else if n < 0 {
        -1
    } else {
        0
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Rust</th></tr>
  <tr><td>Function</td><td><code>function f(int $x): string</code></td><td><code>fn f(x: i32) -> String</code></td></tr>
  <tr><td>Choose a value</td><td><code>$m = $a > $b ? $a : $b;</code></td><td><code>let m = if a > b { a } else { b };</code></td></tr>
  <tr><td>Return a value</td><td><code>return $x;</code> — mandatory</td><td>last expression, no semicolon; <code>return</code> only for early exits</td></tr>
  <tr><td>Condition</td><td><code>if ($x >= 60)</code> — parens required</td><td><code>if x >= 60</code> — no parens, braces required</td></tr>
  <tr><td>Truthiness</td><td><code>"0"</code>, <code>[]</code>, <code>null</code> are falsy</td><td>conditions must be a real <code>bool</code> — no coercion</td></tr>
</table>
<p>Look at <code>sign</code> in the solution: the entire
<code>if / else if / else</code> chain <em>is</em> the return value, the way
a PHP <code>match</code> expression's arms are. That's the pattern to
internalize — in Rust you don't step out of a computation to
<code>return</code> from checkpoints; you write one expression that
evaluates to the answer.</p>`,
};
