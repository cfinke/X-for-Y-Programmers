const LESSON = {
  number: 14,
  title: "Closures & Iterators",

  intro: `
<p>You know this pipeline by heart:
<code>array_filter($products, fn($p) =&gt; $p-&gt;inStock)</code>, then
<code>array_map</code> to pull out the names — and then
<code>array_values</code>, because <code>array_filter</code> quietly kept the
original keys and your "list" now has holes in it. You also know the
argument-order trap: <code>array_filter($array, $fn)</code> but
<code>array_map($fn, $array)</code>. Rust's iterator chains fix both
annoyances by construction: methods chain off the collection, so the order is
always <em>data, then operation</em>, and there are no keys to preserve — a
filtered iterator just yields fewer items.</p>
<table>
  <tr><th>PHP</th><th>Rust</th></tr>
  <tr><td><code>fn($p) =&gt; $p-&gt;inStock</code></td><td><code>|p| p.in_stock</code></td></tr>
  <tr><td><code>array_filter($items, $fn)</code> — array first</td><td><code>items.iter().filter(fn)</code></td></tr>
  <tr><td><code>array_map($fn, $items)</code> — array <em>second</em></td><td><code>.map(fn)</code> — always chains off the data</td></tr>
  <tr><td><code>array_values(...)</code> to fix the keys</td><td>not a thing — <code>.collect()</code> builds a fresh Vec</td></tr>
  <tr><td><code>array_sum(array_map($fn, $items))</code> — inside-out</td><td><code>items.iter().map(fn).sum()</code> — left to right</td></tr>
</table>
<p>Closures are PHP's arrow functions with pipes instead of
<code>fn</code>: <code>|x| x * 2</code>, capturing variables from the
enclosing scope automatically (no <code>use ($tax)</code> clause needed).
The chain itself is <em>lazy</em>: <code>.iter().filter(...).map(...)</code>
does nothing until a consumer like <code>.collect()</code> (build a
collection) or <code>.sum()</code> (fold to one number) pulls items through —
one pass, no intermediate arrays, and it reads left to right instead of
inside-out.</p>`,

  php: `<?php
class Product {
    public function __construct(
        public string $name,
        public int $priceCents,
        public bool $inStock,
    ) {}
}

function inStockNames(array $products): array {
    $available = array_filter($products, fn($p) => $p->inStock);
    // filter kept the keys ([0 => ..., 2 => ...]) — flatten or suffer:
    return array_values(array_map(fn($p) => $p->name, $available));
}

function totalValue(array $products): int {
    return array_sum(array_map(fn($p) => $p->priceCents, $products));
}

function evensDoubled(array $nums): array {
    $evens = array_filter($nums, fn($n) => $n % 2 === 0);
    return array_values(array_map(fn($n) => $n * 2, $evens));
}`,

  task: `
<p>Rewrite the three pipelines as iterator chains. The
<code>Product</code> struct is complete in the starter — the tests construct
products directly.</p>
<ol>
  <li><code>in_stock_names(products: &amp;[Product]) -&gt; Vec&lt;String&gt;</code> —
      <code>.iter()</code>, <code>.filter(|p| p.in_stock)</code>,
      <code>.map(|p| p.name.clone())</code>, <code>.collect()</code>. No
      <code>array_values</code> step: collect builds a clean
      <code>Vec</code>.</li>
  <li><code>total_value(products: &amp;[Product]) -&gt; u32</code> — map each
      product to its <code>price_cents</code> and <code>.sum()</code> them
      (PHP's <code>array_sum(array_map(...))</code>, reading left to
      right).</li>
  <li><code>evens_doubled(nums: &amp;[i32]) -&gt; Vec&lt;i32&gt;</code> — keep
      the even numbers (<code>n % 2 == 0</code>), double them, collect.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// Complete — the tests construct Products directly.
struct Product {
    name: String,
    price_cents: u32,
    in_stock: bool,
}

// filter -> map -> collect. .iter() borrows; clone the name to hand
// out an owned String.
fn in_stock_names(products: &[Product]) -> Vec<String> {
    todo!()
}

// map to price_cents, then .sum() — array_sum, at the end of the
// chain instead of wrapped around it.
fn total_value(products: &[Product]) -> u32 {
    todo!()
}

// filter evens (n % 2 == 0), map to n * 2, collect.
fn evens_doubled(nums: &[i32]) -> Vec<i32> {
    todo!()
}
`,

  requirements: [
    { pattern: /\.iter\(\)/, message: "Start your chains with .iter()" },
    { pattern: /\.filter\(/, message: "Use .filter( — array_filter, chained" },
    { pattern: /\.map\(/, message: "Use .map( — array_map, chained" },
    { pattern: /\.collect/, message: "Finish with .collect() to build the Vec" },
  ],

  tests: [
    { name: 'in_stock_names keeps only in-stock products, in order',
      code: 'let products = vec![\n    Product { name: String::from("Keyboard"), price_cents: 4500, in_stock: true },\n    Product { name: String::from("Mouse"), price_cents: 2500, in_stock: false },\n    Product { name: String::from("Monitor"), price_cents: 12000, in_stock: true },\n];\nassert_eq!(in_stock_names(&products), vec!["Keyboard", "Monitor"]);' },
    { name: "in_stock_names of all out-of-stock products is an empty Vec",
      code: 'let products = vec![\n    Product { name: String::from("Webcam"), price_cents: 3000, in_stock: false },\n];\nassert_eq!(in_stock_names(&products), Vec::<String>::new());' },
    { name: "total_value sums every product's price_cents (19000)",
      code: 'let products = vec![\n    Product { name: String::from("Keyboard"), price_cents: 4500, in_stock: true },\n    Product { name: String::from("Mouse"), price_cents: 2500, in_stock: false },\n    Product { name: String::from("Monitor"), price_cents: 12000, in_stock: true },\n];\nassert_eq!(total_value(&products), 19000);' },
    { name: "total_value of no products is 0",
      code: "let products: Vec<Product> = Vec::new();\nassert_eq!(total_value(&products), 0);" },
    { name: "evens_doubled(&[1, 2, 3, 4, 5]) returns [4, 8]",
      code: "assert_eq!(evens_doubled(&[1, 2, 3, 4, 5]), vec![4, 8]);" },
    { name: "evens_doubled of all-odd input is an empty Vec",
      code: "assert_eq!(evens_doubled(&[1, 3, 5]), Vec::<i32>::new());" },
  ],

  solution: `struct Product {
    name: String,
    price_cents: u32,
    in_stock: bool,
}

fn in_stock_names(products: &[Product]) -> Vec<String> {
    products
        .iter()
        .filter(|p| p.in_stock)
        .map(|p| p.name.clone())
        .collect()
}

fn total_value(products: &[Product]) -> u32 {
    products.iter().map(|p| p.price_cents).sum()
}

fn evens_doubled(nums: &[i32]) -> Vec<i32> {
    nums.iter().filter(|n| *n % 2 == 0).map(|n| n * 2).collect()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Rust</th></tr>
  <tr><td>Closure</td><td><code>fn($x) =&gt; $x * 2</code></td><td><code>|x| x * 2</code></td></tr>
  <tr><td>Capturing</td><td><code>function ($x) use ($tax) { ... }</code></td><td>automatic — just mention <code>tax</code></td></tr>
  <tr><td>Filter</td><td><code>array_filter($items, $fn)</code> + <code>array_values</code></td><td><code>.filter(fn)</code> — no key cleanup</td></tr>
  <tr><td>Map</td><td><code>array_map($fn, $items)</code></td><td><code>.map(fn)</code></td></tr>
  <tr><td>Sum</td><td><code>array_sum(...)</code></td><td><code>.sum()</code></td></tr>
  <tr><td>Materialize</td><td>each step builds a full array</td><td>lazy until <code>.collect()</code> / <code>.sum()</code> — one pass</td></tr>
</table>
<p>Two things worth pinning. First, <code>.iter()</code> yields
<em>references</em> — that's why <code>in_stock_names</code> clones the name
(handing out an owned <code>String</code> from borrowed data) and why the
filter closure in <code>evens_doubled</code> dereferences with
<code>*n</code>. Second, laziness isn't just an optimization aesthetic: PHP's
version of <code>evensDoubled</code> allocates an intermediate array after
<code>array_filter</code> and another after <code>array_map</code>; the Rust
chain streams each element through filter and map in a single pass, and
nothing runs at all until <code>.collect()</code> asks.</p>`,
};
