<title>Lesson 4: Ownership & Moves</title>
<link rel="stylesheet" href="../../../shared/css/style.css">
</head>
<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 4,
  title: "Ownership & Moves",

  intro: `
<p>Think about what PHP does when you write <code>$b = $a</code>. If
<code>$a</code> is an array, you get copy-on-write: it <em>looks</em> like a
copy, and silently becomes a real one the moment either side mutates. If
<code>$a</code> is an object, you get a shared handle: mutate through
<code>$b</code> and <code>$a</code> changes too. Two different behaviors,
both invisible at the assignment, with a garbage collector cleaning up
whenever. Rust replaces all of it with one rule:
<strong>every value has exactly one owner</strong>.</p>
<table>
  <tr><th>PHP</th><th>Rust</th></tr>
  <tr><td><code>$b = $a;</code> array → copy-on-write, behind your back</td><td><code>let b = a;</code> → <em>move</em>: <code>b</code> owns it now</td></tr>
  <tr><td><code>$b = $a;</code> object → shared handle, spooky aliasing</td><td>using <code>a</code> after the move is a <em>compile error</em></td></tr>
  <tr><td><code>clone $a</code> — explicit copy, objects only</td><td><code>a.clone()</code> — explicit copy, for everything</td></tr>
  <tr><td>garbage collector frees memory eventually</td><td>owner goes out of scope → freed immediately, deterministically</td></tr>
</table>
<p>Assignment (and passing to a function) <em>moves</em> the value: ownership
transfers, and the old variable is dead — touch it and the compiler stops
you. No invisible copies, no shared-handle surprises: if you want a copy,
you say <code>.clone()</code>, right there in the code where the cost is
paid. It's PHP's <code>clone</code> keyword generalized to every type and
made mandatory. One exemption keeps this ergonomic: simple scalars like
<code>i32</code> and <code>bool</code> are <code>Copy</code> — they're
duplicated automatically because copying them is as cheap as moving them,
so numbers keep behaving exactly the way you expect.</p>`,

  php: `<?php
// Arrays: copy-on-write behind your back.
$a = [1, 2, 3];
$b = $a;            // looks like a copy...
$b[] = 4;           // ...becomes a real one here, invisibly.
count($a);          // 3 — $a was quietly protected

// Objects: shared by handle.
$user  = new User("Ada");
$alias = $user;
$alias->name = "Grace";     // surprise: $user->name is "Grace" too

$copy = clone $user;        // the one explicit copy PHP has
$copy->name = "Ada";        // $user is untouched this time

function consumeAndShout(string $s): string {
    return strtoupper($s) . "!";
}`,

  task: `
<p>Make ownership do the work explicitly:</p>
<ol>
  <li>Write <code>consume_and_shout</code> taking <code>s: String</code> —
      an <em>owned</em> String, not <code>&amp;str</code>, so the function
      takes ownership and the caller's variable is moved away — and
      returning a new <code>String</code>: the input uppercased with
      <code>"!"</code> appended.</li>
  <li>Write <code>keep_both</code> taking <code>v: Vec&lt;i32&gt;</code> and
      returning the tuple <code>(Vec&lt;i32&gt;, Vec&lt;i32&gt;)</code>.
      Inside: make an explicit copy with <code>.clone()</code> (bind it with
      <code>let mut</code>), <code>.push(0)</code> onto the clone only, and
      return <code>(v, clone)</code> — the untouched original plus the
      extended copy. In PHP the array would have forked silently; here you
      pay for the copy in plain sight.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. consume_and_shout takes an owned String (note: no &).
//    The caller loses the value to you; give back a new one.
fn consume_and_shout(s: String) -> String {
    todo!()
}

// 2. keep_both: clone v (let mut copy = ...), push 0 onto the clone,
//    return (v, copy). Without .clone(), returning v twice cannot compile:
//    the first v in the tuple would move it, killing the second.
fn keep_both(v: Vec<i32>) -> (Vec<i32>, Vec<i32>) {
    todo!()
}
`,

  requirements: [
    { pattern: /\.clone\(\)/, message: "Copy the vector explicitly with .clone()" },
    { pattern: /\.push\(/, message: "Push the extra element onto the clone with .push()" },
  ],

  tests: [
    { name: 'consume_and_shout(String::from("hey")) returns "HEY!"',
      code: 'assert_eq!(consume_and_shout(String::from("hey")), "HEY!");' },
    { name: 'consume_and_shout(String::from("Rust")) returns "RUST!"',
      code: 'assert_eq!(consume_and_shout(String::from("Rust")), "RUST!");' },
    { name: "keep_both(vec![1, 2, 3]) returns the original untouched",
      code: "let (original, extended) = keep_both(vec![1, 2, 3]);\nassert_eq!(original, vec![1, 2, 3]);" },
    { name: "keep_both(vec![1, 2, 3]) returns a clone with 0 pushed",
      code: "let (_, extended) = keep_both(vec![1, 2, 3]);\nassert_eq!(extended, vec![1, 2, 3, 0]);" },
    { name: "keep_both(vec![]) returns (empty, just [0])",
      code: "let (original, extended) = keep_both(vec![]);\nassert_eq!(original, Vec::<i32>::new());\nassert_eq!(extended, vec![0]);" },
  ],

  solution: `fn consume_and_shout(s: String) -> String {
    format!("{}!", s.to_uppercase())
}

fn keep_both(v: Vec<i32>) -> (Vec<i32>, Vec<i32>) {
    let mut copy = v.clone();
    copy.push(0);
    (v, copy)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Rust</th></tr>
  <tr><td>Assign an array/collection</td><td>copy-on-write, invisible</td><td><code>let b = a;</code> — move; <code>a</code> is dead</td></tr>
  <tr><td>Assign an object</td><td>shared handle, aliased mutation</td><td>move — no two owners, no aliasing surprises</td></tr>
  <tr><td>Explicit copy</td><td><code>clone $obj</code> (objects only)</td><td><code>value.clone()</code> (anything cloneable)</td></tr>
  <tr><td>Use after giving it away</td><td>fine (that's the surprise)</td><td>compile error: "value used here after move"</td></tr>
  <tr><td>Numbers, bools</td><td>copied by value</td><td><code>Copy</code> types — also copied, exempt from moves</td></tr>
  <tr><td>Cleanup</td><td>garbage collector, eventually</td><td>owner leaves scope → freed immediately</td></tr>
</table>
<p>The mental upgrade: in PHP you memorize <em>which</em> types copy and
which share, and debug the surprises at runtime. In Rust there is one rule —
values move — and every exception is written in the code:
<code>.clone()</code> for a paid-for copy, <code>Copy</code> types for cheap
scalars. Passing a value to a function moves it exactly like assignment
does, which is why <code>consume_and_shout</code> "eats" its argument. The
obvious next question — "how do I let a function <em>look at</em> my data
without losing it?" — is the next lesson: borrowing.</p>`,
};
</script>
