<title>Lesson 17: Common Traits &amp; Derive</title>

<div id="app"></div>
<script>
const LESSON = {
  number: 17,
  title: "Common Traits & Derive",

  intro: `
<p>PHP objects come with capabilities baked in: <code>var_dump</code> prints
anything, <code>clone</code> copies anything (shallowly, unless a
<code>__clone</code> hook says otherwise), and <code>==</code> compares
anything — with a side of type juggling you've learned to defend against
with <code>===</code>. Rust flips this: a fresh <code>struct</code> can do
<em>none</em> of those things. Printing, cloning, and equality are each a
trait (lesson 12's tool), and your type opts in to each one explicitly.</p>
<table>
  <tr><th>PHP</th><th>Rust</th></tr>
  <tr><td><code>var_dump($p)</code> — works on anything</td><td><code>Debug</code> trait — enables <code>format!("{:?}", p)</code></td></tr>
  <tr><td><code>clone $p</code> — shallow, plus <code>__clone</code> hooks</td><td><code>Clone</code> trait — explicit <code>.clone()</code>, no hooks</td></tr>
  <tr><td><code>$a == $b</code> — by value, with juggling</td><td><code>PartialEq</code> trait — <code>==</code> by value, <em>no</em> juggling</td></tr>
  <tr><td><code>new Point()</code> with default properties</td><td><code>Default</code> trait — <code>Point::default()</code></td></tr>
</table>
<p>The good news: you almost never write these impls by hand. One attribute
above the struct — <code>#[derive(Debug, Clone, PartialEq)]</code> — asks the
compiler to generate them field-by-field: <code>Debug</code> prints
<code>Point { x: 1, y: 2 }</code>, <code>Clone</code> deep-copies every
field, <code>PartialEq</code> compares every field. It's the boilerplate an
IDE would generate in PHP, except it's one line, always in sync with the
fields, and its absence is a compile error rather than a surprise at
runtime.</p>`,

  php: `<?php
class Point {
    public function __construct(
        public int $x,
        public int $y,
    ) {}
}

$a = new Point(1, 2);
$b = new Point(1, 2);

var_dump($a);            // printing: always available, opt-out impossible
$copy = clone $a;        // cloning: shallow, unless __clone intervenes
var_dump($a == $b);      // true  — == compares by value...
var_dump($a === $b);     // false — ...=== by identity
var_dump(0 == "a");      // false in PHP 8, true in PHP 7 — juggling scars`,

  task: `
<p>The starter defines <code>Point</code> with no derives — so it can't be
printed, compared, or cloned yet. Add
<code>#[derive(Debug, Clone, PartialEq)]</code> above the struct, then
implement three one-liners that use the derived powers:</p>
<ol>
  <li><code>points_equal(a: &amp;Point, b: &amp;Point) -&gt; bool</code> —
      just <code>a == b</code>. Without <code>PartialEq</code> in the derive
      list, that operator doesn't exist for <code>Point</code>.</li>
  <li><code>debug_string(p: &amp;Point) -&gt; String</code> — the
      <code>var_dump</code> move: <code>format!("{:?}", p)</code>, which
      needs <code>Debug</code>.</li>
  <li><code>duplicate(p: &amp;Point) -&gt; Point</code> — turn a borrow into
      a fresh owned value with <code>p.clone()</code>, which needs
      <code>Clone</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// This struct can't be printed, compared, or cloned — yet.
// Add the derive attribute on the line above it:
//   #[derive(Debug, Clone, PartialEq)]
struct Point {
    x: i32,
    y: i32,
}

// == only exists for Point once PartialEq is derived.
fn points_equal(a: &Point, b: &Point) -> bool {
    todo!()
}

// var_dump, the Rust way: format!("{:?}", p) — needs Debug.
fn debug_string(p: &Point) -> String {
    todo!()
}

// A fresh owned copy from a borrow: p.clone() — needs Clone.
fn duplicate(p: &Point) -> Point {
    todo!()
}
`,

  requirements: [
    { pattern: /#\[derive\(/, message: "Add a #[derive(...)] attribute above the struct" },
    { pattern: /PartialEq/, message: "Derive PartialEq so == works on Point" },
    { pattern: /Debug/, message: "Derive Debug so {:?} can print a Point" },
    { pattern: /Clone/, message: "Derive Clone so .clone() works on Point" },
  ],

  tests: [
    { name: "points_equal: equal field-by-field means equal",
      code: "assert!(points_equal(&Point { x: 1, y: 2 }, &Point { x: 1, y: 2 }));" },
    { name: "points_equal: any differing field means not equal",
      code: "assert!(!points_equal(&Point { x: 1, y: 2 }, &Point { x: 1, y: 3 }));\nassert!(!points_equal(&Point { x: 0, y: 2 }, &Point { x: 1, y: 2 }));" },
    { name: 'debug_string(&Point { x: 1, y: 2 }) is "Point { x: 1, y: 2 }"',
      code: 'assert_eq!(debug_string(&Point { x: 1, y: 2 }), "Point { x: 1, y: 2 }");' },
    { name: 'debug_string works for negative coordinates too',
      code: 'assert_eq!(debug_string(&Point { x: -4, y: 0 }), "Point { x: -4, y: 0 }");' },
    { name: "duplicate returns an owned Point with the same fields",
      code: "let p = Point { x: 3, y: -7 };\nlet d = duplicate(&p);\nassert_eq!(d.x, 3);\nassert_eq!(d.y, -7);" },
  ],

  solution: `#[derive(Debug, Clone, PartialEq)]
struct Point {
    x: i32,
    y: i32,
}

fn points_equal(a: &Point, b: &Point) -> bool {
    a == b
}

fn debug_string(p: &Point) -> String {
    format!("{:?}", p)
}

fn duplicate(p: &Point) -> Point {
    p.clone()
}
`,

  notes: `
<table>
  <tr><th>Capability</th><th>PHP</th><th>Rust</th></tr>
  <tr><td>Dump for debugging</td><td><code>var_dump($p)</code></td><td><code>#[derive(Debug)]</code> + <code>format!("{:?}", p)</code> / <code>println!("{:?}", p)</code></td></tr>
  <tr><td>Copy a value</td><td><code>clone $p</code> (shallow, <code>__clone</code> hooks)</td><td><code>#[derive(Clone)]</code> + <code>p.clone()</code> (field-by-field, no hooks)</td></tr>
  <tr><td>Value equality</td><td><code>$a == $b</code> (juggles) / <code>$a === $b</code> (identity)</td><td><code>#[derive(PartialEq)]</code> + <code>a == b</code> — one operator, no juggling</td></tr>
  <tr><td>Zero-ish default</td><td>Constructor defaults</td><td><code>#[derive(Default)]</code> + <code>Point::default()</code></td></tr>
  <tr><td>Who writes the code</td><td>The engine, for everything, always</td><td>The compiler, per type, when you ask</td></tr>
</table>
<p>Opt-in sounds like more work than PHP's everything-included model, but
it's the <code>===</code> lesson generalized: capabilities you didn't choose
are capabilities that bite you later. Deriving <code>PartialEq</code> means
<code>==</code> does exactly one thing — compare these fields — and
<code>0 == "a"</code>-style archaeology can't happen, because comparing a
<code>Point</code> to a string isn't sloppily <code>false</code>, it's a
compile error. And when a struct gains a field next year, every derived impl
updates itself; the hand-written <code>__clone</code> that forgot the new
property is a bug class Rust simply deleted.</p>`,
};
