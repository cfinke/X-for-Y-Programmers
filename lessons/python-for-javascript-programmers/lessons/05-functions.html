  title: "Functions",

  intro: `
<p>You already know functions from JavaScript. Python's <code>def</code> keyword
covers the same ground, but the parameter system is richer at the call site: any
positional parameter can also be passed <em>by name</em>, defaults are written
inline, and two magic prefixes — <code>*args</code> and <code>**kwargs</code> —
collect the leftovers. There are no type annotations required (they are optional
hints), and the body is marked by indentation after the colon.</p>
<table>
  <tr><th>JavaScript</th><th>Python</th></tr>
  <tr><td><code>function add(a, b) { return a + b; }</code></td><td><code>def add(a, b):</code></td></tr>
  <tr><td><code>function greet(name = "friend")</code></td><td><code>def greet(name="friend"):</code></td></tr>
  <tr><td><code>function sum(...nums)</code></td><td><code>def sum(*nums):</code></td></tr>
  <tr><td><code>fn(...args)</code></td><td><code>fn(*args)</code></td></tr>
  <tr><td><code>return [a, b];</code></td><td><code>return a, b</code></td></tr>
</table>
<p>The big new idea is <strong>keyword arguments</strong>: given
<code>def area(width, height):</code> you can call <code>area(3, 4)</code> or
<code>area(width=3, height=4)</code> or even <code>area(4, width=3)</code>… no,
that last one collides — but <code>area(3, height=4)</code> is fine. This makes
calls self-documenting and lets defaults live anywhere. To gather extra
positionals use <code>*args</code> (a tuple); to gather extra named ones use
<code>**kwargs</code> (a dict). And returning several values is just returning a
comma-separated tuple: <code>return lo, hi</code> — the caller unpacks with
<code>lo, hi = bounds(...)</code>.</p>`,

  javascript: `function greet(name, greeting = "Hello") {
  return \`\${greeting}, \${name}!\`;
}

function total(...nums) {
  return nums.reduce((a, b) => a + b, 0);
}

function minMax(nums) {
  return [Math.min(...nums), Math.max(...nums)];
}`,

  task: `
<p>Write the Python versions:</p>
<ol>
  <li><code>greet(name, greeting="Hello")</code> — returns a string like
      <code>"Hello, Ada!"</code>. The <code>greeting</code> parameter has a
      default so <code>greet("Ada")</code> works, and it can be overridden by
      keyword: <code>greet("Ada", greeting="Hi")</code>.</li>
  <li><code>total(*nums)</code> — accepts any number of positional arguments and
      returns their sum (<code>total()</code> is <code>0</code>).</li>
  <li><code>min_max(*nums)</code> — returns the smallest and largest as a tuple,
      e.g. <code>min_max(3, 1, 2)</code> returns <code>(1, 3)</code>. Use
      <code>return lo, hi</code>.</li>
</ol>`,

  solution: `def greet(name, greeting="Hello"):
    return f"{greeting}, {name}!"


def total(*nums):
    result = 0
    for n in nums:
        result += n
    return result


def min_max(*nums):
    lo = min(nums)
    hi = max(nums)
    return lo, hi
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Python</th></tr>
  <tr><td>Define</td><td><code>function f(a) { … }</code></td><td><code>def f(a):</code></td></tr>
  <tr><td>Default</td><td><code>function f(a = 1)</code></td><td><code>def f(a=1):</code></td></tr>
  <tr><td>Rest / varargs</td><td><code>function f(...xs)</code></td><td><code>def f(*xs):</code> (a tuple)</td></tr>
  <tr><td>Named extras</td><td>(object param)</td><td><code>def f(**kw):</code> (a dict)</td></tr>
  <tr><td>Call by name</td><td>—</td><td><code>f(a=1, b=2)</code></td></tr>
  <tr><td>Spread a call</td><td><code>f(...arr)</code></td><td><code>f(*arr)</code>, <code>f(**dct)</code></td></tr>
  <tr><td>Multiple return</td><td><code>return [a, b];</code></td><td><code>return a, b</code></td></tr>
</table>
<p>Two gotchas worth internalizing early. First, <strong>never use a mutable
default</strong> like <code>def f(items=[]):</code> — the list is created once at
definition time and shared across every call. The idiom is
<code>def f(items=None):</code> then <code>if items is None: items = []</code>
inside. Second, <code>*args</code> gives you a <em>tuple</em>, not a list, and
<code>**kwargs</code> gives you a <em>dict</em> — you can iterate them exactly
like any other collection. Returning <code>a, b</code> builds a tuple, and the
caller can either keep it whole or unpack it into names in one line, which is how
Python code so often avoids ever declaring an output "shape" type.</p>`,
