<script>
const LESSON = {
  number: 17,
  title: "Type Hints",

  intro: `
<p>Coming from JavaScript, you are used to a language with no type syntax at
all: any variable can hold any value, and nothing checks that a function was
called with the "right" kind of argument. Python type hints will look like
new territory, but the key thing to understand up front is that they are
<strong>not enforced</strong> either — much like JavaScript, the interpreter
runs your code the same way whether the hints are accurate, wrong, or
missing entirely. Hints are annotations read by editors, linters, and tools
like <code>mypy</code>; they document intent without changing behavior. A
hint that lies does not raise — it just runs.</p>
<table>
  <tr><th>JavaScript</th><th>Python</th></tr>
  <tr><td><code>// name is a string</code></td><td><code>name: str</code></td></tr>
  <tr><td><code>function f() { ... }</code></td><td><code>def f() -&gt; int:</code></td></tr>
  <tr><td><code>let x = 5 or null;</code></td><td><code>x: int | None</code></td></tr>
  <tr><td>no built-in optional syntax</td><td><code>Optional[T]</code></td></tr>
  <tr><td><code>Array of numbers</code></td><td><code>list[int]</code></td></tr>
  <tr><td><code>plain object as a map</code></td><td><code>dict[str, int]</code></td></tr>
</table>
<p>Annotate a parameter with <code>name: type</code> and a return with
<code>-&gt; type</code> after the parameter list. Collections use the built-in
generics <code>list[int]</code> and <code>dict[str, int]</code> (lowercase, since
Python 3.9). For "maybe missing" values, modern Python writes <code>int | None</code>;
the older <code>Optional[int]</code> from the <code>typing</code> module means
the exact same thing. Because none of this is enforced, your <em>behavior</em>
is what matters — the tests below call your functions and check results, not
annotations.</p>`,

  javascript: `function greet(name) {
  return \`Hello, \${name}\`;
}

function total(prices) {
  return prices.reduce((a, b) => a + b, 0);
}

function findUser(id) {
  return id === 1 ? "Ada" : null;
}`,

  task: `
<p>Write typed Python versions of each function. Annotate every parameter and
return type — remember the hints do not change behavior, so the tests only
check what the functions return.</p>
<ol>
  <li><code>greet(name: str) -&gt; str</code> returns <code>"Hello, &lt;name&gt;"</code>.</li>
  <li><code>total(prices: list[int]) -&gt; int</code> returns the sum of the list.</li>
  <li><code>find_user(id: int) -&gt; str | None</code> returns <code>"Ada"</code> when
      <code>id</code> is <code>1</code>, otherwise <code>None</code>.</li>
  <li><code>counts(words: list[str]) -&gt; dict[str, int]</code> returns a dict
      mapping each word to how many times it appears.</li>
</ol>`,

  starter: `# 1. greet(name: str) -> str
def greet(name):
    return ""  # TODO


# 2. total(prices: list[int]) -> int
def total(prices):
    return 0  # TODO


# 3. find_user(id: int) -> str | None
def find_user(id):
    return None  # TODO


# 4. counts(words: list[str]) -> dict[str, int]
def counts(words):
    return {}  # TODO
`,

  requirements: [
    { pattern: /def\s+greet\s*\(\s*name\s*:\s*str\s*\)\s*->\s*str/, message: "Annotate greet's parameter and return type (name: str) -> str" },
    { pattern: /def\s+find_user\s*\([^)]*\)\s*->\s*(str\s*\|\s*None|Optional\s*\[\s*str\s*\])/, message: "find_user should return str | None (or Optional[str])" },
    { pattern: /->\s*dict\s*\[\s*str\s*,\s*int\s*\]/, message: "Annotate counts' return as dict[str, int]" },
  ],

  tests: [
    { name: 'greet("Ada") is "Hello, Ada"', code: "    expect_eq(greet(\"Ada\"), \"Hello, Ada\")" },
    { name: "total([1, 2, 3]) is 6", code: "    expect_eq(total([1, 2, 3]), 6)" },
    { name: "total([]) is 0", code: "    expect_eq(total([]), 0)" },
    { name: 'find_user(1) is "Ada"', code: "    expect_eq(find_user(1), \"Ada\")" },
    { name: "find_user(2) is None", code: "    expect_true(find_user(2) is None)" },
    { name: "counts groups repeated words", code: "    expect_eq(counts([\"a\", \"b\", \"a\"]), {\"a\": 2, \"b\": 1})" },
    { name: "counts([]) is an empty dict", code: "    expect_eq(counts([]), {})" },
  ],

  solution: `def greet(name: str) -> str:
    return f"Hello, {name}"


def total(prices: list[int]) -> int:
    return sum(prices)


def find_user(id: int) -> str | None:
    return "Ada" if id == 1 else None


def counts(words: list[str]) -> dict[str, int]:
    result: dict[str, int] = {}
    for word in words:
        result[word] = result.get(word, 0) + 1
    return result
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Python</th></tr>
  <tr><td>Param annotation</td><td>none — <code>(name)</code></td><td><code>(name: str)</code></td></tr>
  <tr><td>Return annotation</td><td>none — <code>) {</code></td><td><code>) -&gt; int:</code></td></tr>
  <tr><td>Array / List</td><td><code>Array</code> (untyped)</td><td><code>list[int]</code></td></tr>
  <tr><td>Map / Dict</td><td>plain object (untyped)</td><td><code>dict[str, int]</code></td></tr>
  <tr><td>Nullable</td><td>any value can be <code>null</code></td><td><code>T | None</code> or <code>Optional[T]</code></td></tr>
  <tr><td>Enforcement</td><td>none, ever</td><td>none at runtime (tools only)</td></tr>
</table>
<p>The biggest mental shift: a wrong hint is not an error, same as in
JavaScript. <code>greet(42)</code> runs fine — <code>f"Hello, {42}"</code> is
<code>"Hello, 42"</code> — even though you annotated <code>name: str</code>.
To actually catch mismatches you run a static checker such as
<code>mypy</code> or <code>pyright</code> as a separate step; plain
JavaScript has no built-in equivalent of that step at all. Also note the
lowercase built-in generics
<code>list[int]</code> / <code>dict[str, int]</code> replaced the old
capital-L <code>List</code>/<code>Dict</code> from <code>typing</code>; and
<code>Optional[int]</code> is exactly <code>int | None</code>, not "optional"
in the sense of a default value — it just permits <code>None</code>.</p>`,
};
