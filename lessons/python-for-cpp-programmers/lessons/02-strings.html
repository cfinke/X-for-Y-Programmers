  intro: `
<p>Forget everything about manual buffer management: Python strings are
immutable, zero-indexed, garbage-collected objects, and every method returns a
new string rather than mutating in place — much closer to
<code>std::string</code>'s value semantics than to raw <code>char*</code>. The
names differ, though — Python spells interpolation with an <em>f-string</em>
instead of <code>std::format</code> or stream concatenation, and slicing
replaces <code>substr</code> with the compact <code>s[a:b]</code> syntax.</p>
<table>
  <tr><th>C++</th><th>Python</th></tr>
  <tr><td><code>std::format("Hi {}", name)</code></td><td><code>f"Hi {name}"</code></td></tr>
  <tr><td><code>std::transform(s.begin(), s.end(), s.begin(), ::toupper)</code></td><td><code>s.upper()</code></td></tr>
  <tr><td><code>boost::trim(s)</code></td><td><code>s.strip()</code></td></tr>
  <tr><td>manual find/replace loop</td><td><code>s.replace("a", "b")</code></td></tr>
  <tr><td><code>boost::split(parts, s, boost::is_any_of(","))</code></td><td><code>s.split(",")</code></td></tr>
  <tr><td><code>boost::join(arr, "-")</code></td><td><code>"-".join(arr)</code></td></tr>
  <tr><td><code>s.substr(0, 3)</code></td><td><code>s[0:3]</code></td></tr>
  <tr><td><code>std::stoi(s)</code> / <code>std::to_string(n)</code></td><td><code>int(s)</code> / <code>str(n)</code></td></tr>
</table>
<p>Two things to unlearn. First, <code>str.replace</code> already replaces
<em>every</em> occurrence — there is no separate "replace first" variant to
reach for. Second, <code>join</code> is a method on the <em>separator</em>
string, not on the list: you write <code>", ".join(parts)</code>, and every
element must already be a string. And <code>find</code> returns <code>-1</code>
when the substring is absent, just like <code>std::string::find</code> returns
<code>std::string::npos</code>.</p>`,

    std::string result;
    for (size_t i = 0; i < parts.size(); ++i) {

        result += std::toupper(parts[i][0]);

}

  solution: `def shout(text):
    return text.strip().upper()


def slugify(title):
    return title.strip().lower().replace(" ", "-")


def initials(full_name):
    parts = full_name.split(" ")
    return ".".join(p[0].upper() for p in parts)


def label(name, score):
    return f"{name}: {score}"


def parse_total(a, b):
    return str(int(a) + int(b))

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Python</th></tr>
  <tr><td>Interpolation</td><td><code>std::format("{}", x)</code></td><td><code>f"{x}"</code></td></tr>
  <tr><td>Substring</td><td><code>s.substr(1, 3)</code></td><td><code>s[1:4]</code></td></tr>
  <tr><td>Last char</td><td><code>s[s.size() - 1]</code> or <code>s.back()</code></td><td><code>s[-1]</code></td></tr>
  <tr><td>Contains</td><td><code>s.find("x") != std::string::npos</code></td><td><code>"x" in s</code></td></tr>

  <tr><td>Prefix / suffix</td><td><code>s.starts_with / ends_with</code> (C++20)</td><td><code>s.startswith / endswith</code></td></tr>

<p>Slices never raise on out-of-range bounds: <code>s[0:99]</code> just returns
the whole string, unlike <code>substr</code>, which throws
<code>std::out_of_range</code> if the start position exceeds the string's
length. A negative index counts from the end, so <code>s[-3:]</code> is the
last three characters — there's no equivalent shorthand in C++. Because
strings are immutable in Python you can happily chain
<code>.strip().lower().replace(...)</code> — each call hands back a fresh
string, with none of the aliasing worries that come with mutating a
<code>std::string</code> in place. If you need case-insensitive membership,
lowercase both sides first (<code>"x" in s.lower()</code>); there is no
<code>includes</code>-with-a-flag equivalent.</p>`,
