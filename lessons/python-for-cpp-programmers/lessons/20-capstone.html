  intro: `
<p>Time to put it all together. In C++ you might model a small in-memory
store with a <code>struct</code> for the record, a class holding a
<code>std::map</code> (or <code>std::unordered_map</code>), custom exception
classes derived from <code>std::exception</code>, and loops or
<code>&lt;algorithm&gt;</code> calls (<code>copy_if</code>/<code>transform</code>/
<code>accumulate</code>) to query it. Python gives you the same shape with
different spellings: a <code>@dataclass</code> instead of a struct, a plain
<code>dict</code> instead of <code>std::map</code>, custom
<code>Exception</code> subclasses, and comprehensions/generator expressions
instead of the algorithm-header calls.</p>
<table>
  <tr><th>C++</th><th>Python</th></tr>
  <tr><td><code>struct Product { std::string name; };</code></td><td><code>@dataclass\nclass Product: name: str</code></td></tr>
  <tr><td><code>std::map&lt;std::string, Product&gt;</code></td><td><code>{}</code> (a dict)</td></tr>
  <tr><td><code>class NotFound : public std::runtime_error {};</code></td><td><code>class ProductNotFound(Exception): pass</code></td></tr>
  <tr><td><code>throw NotFound(name);</code></td><td><code>raise ProductNotFound(name)</code></td></tr>
  <tr><td><code>std::copy_if(items.begin(), items.end(), ...)</code></td><td><code>[p for p in items if t in p.tags]</code></td></tr>
  <tr><td><code>std::accumulate(items.begin(), items.end(), 0.0, ...)</code></td><td><code>sum(p.price for p in items)</code></td></tr>
</table>
<p>This capstone ties together the dataclass, dict/list processing,
comprehensions, and exceptions you have met in earlier lessons — no new syntax,
just idiomatic assembly.</p>`,

  cpp: `struct Product {
  std::string name;
  double price;
  std::vector<std::string> tags;
};

class ProductNotFound : public std::runtime_error {
public:
  explicit ProductNotFound(const std::string& name)
      : std::runtime_error(name) {}
};
class DuplicateProduct : public std::runtime_error {
public:
  explicit DuplicateProduct(const std::string& name)
      : std::runtime_error(name) {}
};

class Store {
public:
  void add(const Product& p) {
    if (items_.count(p.name)) throw DuplicateProduct(p.name);
    items_[p.name] = p;
  }
  const Product& get(const std::string& name) const {
    auto it = items_.find(name);
    if (it == items_.end()) throw ProductNotFound(name);
    return it->second;
  }
  double totalValue() const {
    double sum = 0;
    for (const auto& [name, p] : items_) sum += p.price;
    return sum;
  }
  std::vector<std::string> namesWithTag(const std::string& tag) const {
    std::vector<std::string> result;
    for (const auto& [name, p] : items_) {
      if (std::find(p.tags.begin(), p.tags.end(), tag) != p.tags.end())
        result.push_back(name);
    }
    std::sort(result.begin(), result.end());
    return result;
  }

private:
  std::map<std::string, Product> items_;
};

Store load(const std::vector<Product>& records) {
  Store store;
  for (const auto& r : records) store.add(r);
  return store;
}`,

  solution: `from dataclasses import dataclass, field


class ProductNotFound(Exception):
    pass


class DuplicateProduct(Exception):
    pass


@dataclass
class Product:
    name: str
    price: float
    tags: list = field(default_factory=list)


class Store:
    def __init__(self):
        self._items = {}

    def add(self, product):
        if product.name in self._items:
            raise DuplicateProduct(product.name)
        self._items[product.name] = product

    def get(self, name):
        if name not in self._items:
            raise ProductNotFound(name)
        return self._items[name]

    def total_value(self):
        return sum(p.price for p in self._items.values())

    def names_with_tag(self, tag):
        return sorted(p.name for p in self._items.values() if tag in p.tags)


def load(records):
    store = Store()
    for r in records:
        store.add(Product(name=r["name"], price=r["price"], tags=r.get("tags", [])))
    return store
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Python</th></tr>
  <tr><td>Record type</td><td><code>struct</code></td><td><code>@dataclass</code></td></tr>
  <tr><td>Keyed store</td><td><code>std::map&lt;K, V&gt;</code></td><td><code>dict</code></td></tr>
  <tr><td>Membership</td><td><code>map.count(k)</code></td><td><code>k in d</code></td></tr>
  <tr><td>Custom error</td><td><code>class E : public std::runtime_error {}</code></td><td><code>class E(Exception): pass</code></td></tr>
  <tr><td>Signal an error</td><td><code>throw E(...);</code></td><td><code>raise E()</code></td></tr>
  <tr><td>Reduce/sum</td><td><code>std::accumulate(v.begin(), v.end(), 0.0, ...)</code></td><td><code>sum(x for x in arr)</code></td></tr>
  <tr><td>Filter + map + sort</td><td><code>copy_if</code>/<code>transform</code> + <code>std::sort</code></td><td><code>sorted(f(x) for x in arr if g(x))</code></td></tr>
</table>
<p>A few Pythonic touches worth noting. <code>field(default_factory=list)</code>
gives each instance its own fresh list — the equivalent mistake in Python to a
shared mutable default is a real trap, and the dataclass field factory is how you
avoid it. Passing a generator expression straight into <code>sum()</code> or
<code>sorted()</code> (no surrounding brackets) is the idiomatic replacement for
the loops or <code>&lt;algorithm&gt;</code> calls you would reach for in C++, and
it avoids building an intermediate list. Finally, custom exceptions are just
classes that inherit from <code>Exception</code>; you catch them by type with
<code>except ProductNotFound:</code>, exactly as you would catch by type with
<code>catch (const ProductNotFound&amp; e)</code> in C++.</p>`,
