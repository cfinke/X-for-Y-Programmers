  intro: `
<p>C++ gives you <code>std::set</code> (or <code>std::unordered_set</code>) as a
template class you construct and mutate with methods, and <code>std::tuple</code>
as a fixed-size, heterogeneous container built with a template. Python bakes both
into the language as first-class types with their own literal syntax. A
<em>set</em> is an unordered collection of unique, hashable values written with
braces. A <em>tuple</em> is an immutable, ordered sequence written with commas
(usually wrapped in parentheses).</p>
<table>
  <tr><th>C++</th><th>Python</th></tr>
  <tr><td><code>std::set&lt;int&gt; s = {1, 2, 2};</code></td><td><code>{1, 2, 2}</code> &rarr; <code>{1, 2}</code></td></tr>
  <tr><td><code>s.insert(3);</code></td><td><code>s.add(3)</code></td></tr>
  <tr><td>manual loop or <code>std::set_union</code></td><td><code>a | b</code></td></tr>
  <tr><td><code>std::set&lt;int&gt; s(list.begin(), list.end());</code></td><td><code>list(set(items))</code></td></tr>
  <tr><td><code>std::tuple&lt;std::string, int&gt; t = {"a", 1};</code></td><td><code>t = ("a", 1)</code></td></tr>
  <tr><td><code>auto [x, y] = t;</code></td><td><code>x, y = t</code></td></tr>
</table>
<p>Because tuples are immutable and hashable, Python lets you use them as
dictionary keys or set members — something a mutable list can never do. Set
algebra has operator sugar: <code>|</code> union, <code>&amp;</code> intersection,
<code>-</code> difference. And when a tuple's positions start to carry meaning,
<code>collections.namedtuple</code> gives each slot a name while staying a real,
immutable tuple.</p>`,

  cpp: `#include <set>
#include <tuple>
#include <vector>
#include <algorithm>

std::set<std::string> tags = {"a", "b", "a"};   // {"a", "b"}
tags.insert("c");

std::set<int> a = {1, 2, 3};
std::set<int> b = {2, 3, 4};
// intersection by hand
std::set<int> both;
std::set_intersection(a.begin(), a.end(), b.begin(), b.end(),

template <typename T>
std::vector<T> dedupe(const std::vector<T>& items) {
  std::set<T> s(items.begin(), items.end());
  return std::vector<T>(s.begin(), s.end());
}

// tuple: fixed positions, unpacked by position
std::tuple<int, int> point = {3, 4};

  solution: `from collections import namedtuple


def dedupe(items):
    return list(set(items))


def common_tags(a, b):
    return set(a) & set(b)


def midpoint(p, q):
    x1, y1 = p
    x2, y2 = q
    return ((x1 + x2) / 2, (y1 + y2) / 2)


Point = namedtuple("Point", ["x", "y"])


def make_point(x, y):
    return Point(x, y)
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Python</th></tr>
  <tr><td>Set literal</td><td><code>std::set&lt;int&gt; s = {1, 2};</code></td><td><code>{1, 2}</code> (but <code>{}</code> is an empty dict &mdash; use <code>set()</code>)</td></tr>
  <tr><td>Membership</td><td><code>s.count(x) &gt; 0</code> or <code>s.contains(x)</code> (C++20)</td><td><code>x in s</code></td></tr>
  <tr><td>Union / intersection / diff</td><td><code>std::set_union</code> / <code>std::set_intersection</code> / <code>std::set_difference</code> with iterators</td><td><code>a | b</code>, <code>a &amp; b</code>, <code>a - b</code></td></tr>
  <tr><td>Tuple</td><td><code>std::tuple&lt;std::string, int&gt;</code> (fixed types, but reassignable)</td><td><code>("a", 1)</code> (truly immutable)</td></tr>
  <tr><td>Unpack</td><td><code>auto [x, y] = t;</code></td><td><code>x, y = t</code></td></tr>
  <tr><td>Named fields</td><td><code>struct</code> or class</td><td><code>namedtuple("P", ["x", "y"])</code></td></tr>
</table>
<p>Two gotchas. First, <code>{}</code> is an empty <em>dict</em>, not a set &mdash;
the empty set is <code>set()</code>. Second, set elements and tuple entries must be
<em>hashable</em>: numbers, strings, and tuples qualify, but a <code>list</code> or
<code>dict</code> does not, so <code>{[1, 2]}</code> raises <code>TypeError</code>.
That is exactly why tuples make great dictionary keys and set members while lists
cannot &mdash; e.g. <code>seen = {(0, 0), (1, 2)}</code> to track visited grid
cells. A <code>namedtuple</code> is still a plain tuple under the hood, so
<code>make_point(3, 4) == (3, 4)</code> is <code>True</code> and it unpacks and
indexes like any tuple, but you also get <code>.x</code> / <code>.y</code> access
and a readable <code>repr</code>.</p>`,
