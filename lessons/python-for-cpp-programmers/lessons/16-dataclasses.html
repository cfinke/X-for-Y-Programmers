const LESSON = {
  number: 16,
  title: "Dataclasses",

  intro: `
<p>In C++ you reach for a <code>struct</code> — or a <code>class</code> with
everything public — when you just want to bundle a few fields together, a
plain data-holder with no real behaviour. Python's answer is the
<code>@dataclass</code> decorator from the <code>dataclasses</code> module.
You declare the fields with class-level type annotations, and the decorator
writes the boilerplate for you: an <code>__init__</code> that assigns every
field, a readable <code>__repr__</code>, and an <code>__eq__</code> that
compares by <em>value</em> instead of identity — things a C++
<code>struct</code> doesn't hand you for free unless you write them (or ask
the compiler to synthesize an <code>operator==</code> via
<code>= default</code>).</p>
<table>
  <tr><th>C++</th><th>Python</th></tr>
  <tr><td><code>struct Point { int x; int y; };</code></td><td><code>@dataclass</code> + <code>class Point:</code></td></tr>
  <tr><td><code>int x;</code></td><td><code>x: int</code></td></tr>
  <tr><td><code>std::vector&lt;Tag&gt; tags;</code> (per-instance)</td><td><code>tags: list = field(default_factory=list)</code></td></tr>
  <tr><td><code>const</code> members / <code>const Point</code></td><td><code>@dataclass(frozen=True)</code></td></tr>
  <tr><td><code>bool operator==(...) const = default;</code></td><td>value <code>==</code> for free</td></tr>
</table>
<p>Ordinary fields with a default look just like a C++ in-class member
initializer (<code>int z = 0;</code> becomes <code>z: int = 0</code>). But a
<em>mutable</em> default — a list or dict — cannot be written inline, because
one shared object would leak across every instance (the same trap C++
avoids automatically since each instance gets its own
<code>std::vector</code> member by construction). Use
<code>field(default_factory=list)</code>: the factory is called fresh for
each new instance. Pass <code>frozen=True</code> to make instances immutable
(assigning a field raises, much like declaring every member <code>const</code>),
and <code>order=True</code> to also generate <code>&lt;</code>,
<code>&lt;=</code>, <code>&gt;</code>, <code>&gt;=</code> that compare fields
tuple-wise, top to bottom — Python's version of writing
<code>auto operator&lt;=&gt;(const Point&) const = default;</code>.</p>`,

  cpp: `struct Point {
  int x;
  int y;
  std::string label;

  bool operator==(const Point&) const = default;
};

Point a{1, 2, ""};
Point b{1, 2, ""};
a == b; // true, but you had to opt in with = default

// Immutable "value object":
const Point origin{0, 0, ""};`,

  task: `
<p>Import from <code>dataclasses</code> and build two dataclasses:</p>
<ol>
  <li><code>Point</code> with fields <code>x: int</code> and <code>y: int</code>,
      plus a <code>label: str = ""</code> that defaults to the empty string.
      Decorate it with <code>@dataclass</code>. Also add
      <code>order=True</code> so points can be sorted, and give it a method
      <code>translate(self, dx, dy)</code> that returns a <em>new</em>
      <code>Point</code> shifted by <code>dx</code>/<code>dy</code> (same
      label).</li>
  <li><code>Polygon</code> with a field <code>points</code> that defaults to an
      empty list via <code>field(default_factory=list)</code>, and a method
      <code>add(self, point)</code> that appends a point to that list.</li>
  <li><code>Color</code>, a <strong>frozen</strong> dataclass
      (<code>@dataclass(frozen=True)</code>) with fields <code>r: int</code>,
      <code>g: int</code>, <code>b: int</code> — an immutable value object.</li>
</ol>`,

  starter: `from dataclasses import dataclass, field


# 1. Point: x, y, label="" ; order=True ; translate(dx, dy) -> new Point
class Point:
    pass  # TODO


# 2. Polygon: points defaults to [] via default_factory ; add(point)
class Polygon:
    pass  # TODO


# 3. Color: frozen dataclass with r, g, b
class Color:
    pass  # TODO
`,

  requirements: [
    { pattern: /@dataclass/, message: "Use the @dataclass decorator" },
    { pattern: /default_factory\s*=\s*list/, message: "Give Polygon.points a default_factory=list" },
    { pattern: /frozen\s*=\s*True/, message: "Make Color a frozen dataclass (frozen=True)" },
  ],

  tests: [
    { name: "Point auto __init__ sets fields and default label", code: "    p = Point(1, 2)\n    expect_eq(p.x, 1)\n    expect_eq(p.y, 2)\n    expect_eq(p.label, \"\")" },
    { name: "Points compare by value, not identity", code: "    expect_eq(Point(1, 2), Point(1, 2))\n    expect_true(Point(1, 2) != Point(1, 3))" },
    { name: "translate returns a new shifted Point", code: "    p = Point(1, 2, \"a\")\n    q = p.translate(10, 20)\n    expect_eq(q, Point(11, 22, \"a\"))\n    expect_eq(p, Point(1, 2, \"a\"))" },
    { name: "order=True enables sorting", code: "    pts = sorted([Point(2, 1), Point(1, 9), Point(1, 3)])\n    expect_eq(pts, [Point(1, 3), Point(1, 9), Point(2, 1)])\n    expect_true(Point(1, 3) < Point(2, 0))" },
    { name: "Polygon default_factory gives independent lists", code: "    a = Polygon()\n    b = Polygon()\n    a.add(Point(0, 0))\n    expect_eq(a.points, [Point(0, 0)])\n    expect_eq(b.points, [])" },
    { name: "Color is frozen and immutable", code: "    c = Color(255, 0, 0)\n    expect_eq(c, Color(255, 0, 0))\n    raised = False\n    try:\n        c.r = 0\n    except Exception:\n        raised = True\n    expect_true(raised)" },
  ],

  solution: `from dataclasses import dataclass, field


@dataclass(order=True)
class Point:
    x: int
    y: int
    label: str = ""

    def translate(self, dx, dy):
        return Point(self.x + dx, self.y + dy, self.label)


@dataclass
class Polygon:
    points: list = field(default_factory=list)

    def add(self, point):
        self.points.append(point)


@dataclass(frozen=True)
class Color:
    r: int
    g: int
    b: int
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Python</th></tr>
  <tr><td>Data holder</td><td><code>struct</code> / plain <code>class</code></td><td><code>@dataclass</code></td></tr>
  <tr><td>Field</td><td><code>int x;</code></td><td><code>x: int</code></td></tr>
  <tr><td>Default</td><td><code>std::string label = "";</code></td><td><code>label: str = ""</code></td></tr>
  <tr><td>Mutable default</td><td><code>std::vector&lt;Tag&gt; tags;</code></td><td><code>field(default_factory=list)</code></td></tr>
  <tr><td>Immutable</td><td><code>const</code> members / <code>const Point</code></td><td><code>frozen=True</code></td></tr>
  <tr><td>Value equality</td><td><code>operator==(...) const = default;</code></td><td><code>__eq__</code> for free</td></tr>
  <tr><td>Ordering</td><td><code>operator&lt;=&gt;</code> (or custom comparator)</td><td><code>order=True</code></td></tr>
</table>
<p>The annotations are what the decorator reads to find your fields — they are
not enforced at runtime, unlike C++'s compile-time-checked member types. A
field with a default must come after all fields without one (same rule as
default function parameters in C++), which is why <code>label</code> sits
last on <code>Point</code>.</p>
<p><code>order=True</code> generates the comparison operators by treating each
instance as a tuple of its fields in declaration order, so <code>Point(1, 3) &lt;
Point(1, 9)</code> falls through to the second field — the same lexicographic
behaviour you'd get from a defaulted <code>operator&lt;=&gt;</code> in C++20. A
<code>frozen=True</code> dataclass also becomes hashable, so its instances can
be dict keys or set members — handy for value objects like <code>Color</code>,
much like a type with a const-correct <code>operator==</code> and a
<code>std::hash</code> specialization. If you need a modified copy of a frozen
instance, reach for <code>dataclasses.replace(c, r=0)</code> rather than
mutating in place — there is no in-place "wither" like hand-rolling a copy
constructor with one field changed.</p>`,
};
