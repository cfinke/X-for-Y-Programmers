  title: "Inheritance",

  intro: `
<p>Python classes inherit much the way C++ classes do, but the spellings and
guarantees differ. A subclass names its parent in parentheses —
<code>class Dog(Animal)</code> — instead of with
<code>: public Animal</code>. To reach the parent's constructor you call
<code>super().__init__(...)</code>; in C++, if you omit an explicit base-class
call from the member-initializer list, the compiler either calls the base's
default constructor for you or, if there isn't one, refuses to compile. Python
does <em>neither</em> — if you write <code>__init__</code> in the child and
forget the <code>super()</code> call, the parent's setup simply never runs, and
nothing complains until you try to use an attribute that was never set.</p>
<table>
  <tr><th>C++</th><th>Python</th></tr>
  <tr><td><code>class Dog : public Animal { ... };</code></td><td><code>class Dog(Animal):</code></td></tr>
  <tr><td><code>Dog(std::string n) : Animal(n) {}</code></td><td><code>super().__init__(name)</code></td></tr>
  <tr><td><code>std::string speak() const override { … }</code> (override)</td><td><code>def speak(self):</code> (override)</td></tr>
  <tr><td><code>dynamic_cast&lt;Animal*&gt;(&x) != nullptr</code></td><td><code>isinstance(x, Animal)</code></td></tr>
  <tr><td><code>class C : public A, public M { ... };</code> (multiple inheritance)</td><td><code>class C(A, M):</code> (mixin)</td></tr>
</table>
<p>Overriding is just defining a method with the same name in the subclass; the
most-derived version wins, and it can call the parent's version through
<code>super()</code> — no <code>virtual</code>/<code>override</code> keywords
needed, because in Python every method is effectively virtual. Type checks use
<code>isinstance(obj, Cls)</code>, which — like <code>dynamic_cast</code> — is
<code>True</code> for subclasses too, but works even on classes that aren't
polymorphic. Python has no separate interface mechanism; a <em>mixin</em> is
just an extra base class that contributes methods, listed alongside the main
parent in the parentheses — much like C++'s native multiple inheritance,
except Python resolves name clashes automatically via a well-defined method
resolution order instead of forcing you to disambiguate by hand.</p>`,

  cpp: `class Animal {
public:
    Animal(std::string name) : name(std::move(name)) {}
    virtual std::string speak() const {
        return name + " makes a sound";
    }
    std::string name;
};

class Dog : public Animal {
public:
    Dog(std::string name) : Animal(std::move(name)) {}
    std::string speak() const override {
        return Animal::speak() + " — woof!";
    }
};

Dog d("Rex");
d.speak();                             // "Rex makes a sound — woof!"
dynamic_cast<Animal*>(&d) != nullptr;  // true`,

  task: `
<p>Recreate the hierarchy in Python:</p>
<ol>
  <li>Write a base class <code>Animal</code> whose <code>__init__(self, name)</code>
      stores <code>self.name</code>, and whose <code>speak(self)</code> returns

  <li>Write <code>Dog(Animal)</code> that adds a <code>breed</code>: its
      <code>__init__(self, name, breed)</code> calls
      <code>super().__init__(name)</code> and then stores <code>self.breed</code>.
      Override <code>speak(self)</code> to return the parent's result plus
      <code>" — woof!"</code> — call <code>super().speak()</code>, don't
      rebuild the string.</li>
  <li>Write a mixin class <code>Loud</code> with a method
      <code>shout(self)</code> that returns <code>self.speak().upper()</code>,

  <li>Write <code>describe(obj)</code> that returns <code>"animal"</code> if
      <code>obj</code> is an <code>Animal</code> (use <code>isinstance</code>)
      and <code>"other"</code> otherwise.</li>
</ol>`,

  starter: `class Animal:

`,

  requirements: [
    { pattern: /class\s+Dog\s*\(\s*Animal\s*\)/, message: "Define Dog as a subclass of Animal" },

  tests: [
    { name: 'Animal("Cat").speak() is "Cat makes a sound"', code: "    expect_eq(Animal(\"Cat\").speak(), \"Cat makes a sound\")" },
    { name: 'Dog stores name and breed', code: "    d = Dog(\"Rex\", \"Lab\")\n    expect_eq(d.name, \"Rex\")\n    expect_eq(d.breed, \"Lab\")" },
    { name: 'Dog.speak() calls super and appends', code: "    expect_eq(Dog(\"Rex\", \"Lab\").speak(), \"Rex makes a sound — woof!\")" },
    { name: 'a Dog is an Animal (isinstance)', code: "    expect_true(isinstance(Dog(\"Rex\", \"Lab\"), Animal))" },
    { name: 'LoudDog.shout() mixes in Loud', code: "    expect_eq(LoudDog(\"Rex\", \"Lab\").shout(), \"REX MAKES A SOUND — WOOF!\")" },
    { name: 'describe distinguishes animals from others', code: "    expect_eq(describe(Dog(\"Rex\", \"Lab\")), \"animal\")\n    expect_eq(describe(42), \"other\")" },

  solution: `class Animal:
    def __init__(self, name):
        self.name = name

    def speak(self):
        return f"{self.name} makes a sound"


class Dog(Animal):
    def __init__(self, name, breed):
        super().__init__(name)
        self.breed = breed

    def speak(self):
        return f"{super().speak()} — woof!"


class Loud:
    def shout(self):
        return self.speak().upper()


class LoudDog(Dog, Loud):
    pass


def describe(obj):
    return "animal" if isinstance(obj, Animal) else "other"
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Python</th></tr>
  <tr><td>Subclass</td><td><code>class B : public A { ... };</code></td><td><code>class B(A):</code></td></tr>
  <tr><td>Parent constructor</td><td><code>B(...) : A(x) {}</code></td><td><code>super().__init__(x)</code></td></tr>
  <tr><td>Call parent method</td><td><code>A::m()</code></td><td><code>super().m()</code></td></tr>
  <tr><td>Override</td><td><code>virtual</code> + <code>override</code></td><td>same method name</td></tr>
  <tr><td>Type check</td><td><code>dynamic_cast&lt;A*&gt;(x) != nullptr</code></td><td><code>isinstance(x, A)</code></td></tr>
  <tr><td>Mixin</td><td>native multiple inheritance</td><td>extra base class <code>(A, M)</code></td></tr>
</table>
<p>The biggest gotcha for a C++ programmer: Python never calls the parent's
<code>__init__</code> automatically, and there's no compiler to catch a missed
call the way there is with a base class that lacks a default constructor. If a
subclass defines its own <code>__init__</code>, it is fully responsible for
invoking <code>super().__init__(...)</code> — otherwise attributes the parent
would have set (like <code>self.name</code>) never get created, and you won't
find out until something tries to read them. There's also no
<code>virtual</code>/<code>override</code> ceremony to get wrong — every
method is dynamically dispatched, so overriding <code>speak</code> just means
defining a method with that name. Multiple inheritance resolves method lookups
left-to-right along the <em>MRO</em> (method resolution order) instead of
requiring you to qualify calls with <code>A::</code> or <code>M::</code>; for a
simple mixin like <code>Loud</code> that just adds a method, this means
<code>LoudDog</code> gets <code>speak</code> from <code>Dog</code> and
<code>shout</code> from <code>Loud</code> with no conflict. You can also pass a
tuple to <code>isinstance</code>, e.g. <code>isinstance(x, (Dog, Cat))</code>.</p>`,
};
