const LESSON = {
  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>Go's string story is a package of free functions: you import
<code>strings</code> and pass the string in — <code>strings.ToUpper(s)</code>,
<code>strings.Contains(s, sub)</code>. Ruby inverts that: the functions move
<em>onto the value</em>. A string carries its own toolkit around with it, so
you write <code>s.upcase</code> and <code>s.include?(sub)</code> — no import,
no package prefix, and note the <code>?</code>: methods that answer yes/no
end in a question mark by convention. Even <code>len(s)</code> becomes a
method, <code>s.length</code>.</p>
<table>
  <tr><th>Go</th><th>Ruby</th></tr>
  <tr><td><code>fmt.Sprintf("Hello, %s!", name)</code></td><td><code>"Hello, #{name}!"</code></td></tr>
  <tr><td><code>strings.ToUpper(s)</code></td><td><code>s.upcase</code></td></tr>
  <tr><td><code>strings.Contains(s, sub)</code></td><td><code>s.include?(sub)</code></td></tr>
  <tr><td><code>len(s)</code></td><td><code>s.length</code></td></tr>
  <tr><td><code>strings.Join(parts, ", ")</code></td><td><code>parts.join(", ")</code></td></tr>
</table>
<p>And formatting: <code>fmt.Sprintf</code> with its verb zoo — and the
runtime <code>%!s(MISSING)</code> when you miscount arguments — is replaced
by interpolation. <code>#{...}</code> inside a double-quoted string evaluates
any Ruby expression and splices in the result. There are no verbs to match to
argument types and no argument list to keep in sync; the expression sits
exactly where its value will appear.</p>`,

  go: `package main

import (
	"fmt"
	"strings"
)

func shout(s string) string {
	return strings.ToUpper(s)
}

func greet(name string) string {
	return fmt.Sprintf("Hello, %s!", name)
}

func containsWord(haystack, needle string) bool {
	return strings.Contains(haystack, needle)
}

func joinWords(words []string) string {
	return strings.Join(words, ", ")
}`,

  task: `
<p>Rewrite the Go as Ruby — four small methods, and notice that
every <code>strings.X(s, ...)</code> becomes <code>s.x(...)</code>:</p>
<ol>
  <li><code>shout(s)</code> — the whole string uppercased, via
      <code>.upcase</code>.</li>
  <li><code>greet(name)</code> — <code>"Hello, Gopher!"</code>-style text via
      <code>#{}</code> interpolation, not format verbs.</li>
  <li><code>contains_word?(haystack, needle)</code> — true if
      <code>haystack</code> contains <code>needle</code>, via
      <code>.include?</code>. The <code>?</code> is part of the method name —
      Ruby lets you name a predicate honestly.</li>
  <li><code>join_words(words)</code> — join an array with <code>", "</code>
      via <code>.join</code>.</li>
</ol>`,

  starter: `# 1. shout: strings.ToUpper(s) -> s.upcase (the function moves onto the value).
def shout(s)
  raise NotImplementedError, "TODO: implement shout"
end

# 2. greet: fmt.Sprintf("Hello, %s!", name) -> "Hello, #{name}!"
def greet(name)
  raise NotImplementedError, "TODO: implement greet"
end

# 3. contains_word?: strings.Contains(haystack, needle) -> haystack.include?(needle)
def contains_word?(haystack, needle)
  raise NotImplementedError, "TODO: implement contains_word?"
end

# 4. join_words: strings.Join(words, ", ") -> words.join(", ")
def join_words(words)
  raise NotImplementedError, "TODO: implement join_words"
end
`,

  requirements: [
    { pattern: /#\{/, message: "Use #{} interpolation in greet" },
    { pattern: /\.upcase/, message: "Use .upcase in shout" },
    { pattern: /\.include\?/, message: "Use .include? in contains_word?" },
    { pattern: /\.join/, message: "Use .join in join_words" },
  ],

  tests: [
    { name: 'shout("go") returns "GO"',
      code: '  expect_eq(shout("go"), "GO")' },
    { name: 'greet("Gopher") returns "Hello, Gopher!"',
      code: '  expect_eq(greet("Gopher"), "Hello, Gopher!")' },
    { name: 'contains_word?("hello world", "world") is true',
      code: '  expect_true(contains_word?("hello world", "world"))' },
    { name: 'contains_word?("hello world", "gopher") is false',
      code: '  expect_eq(contains_word?("hello world", "gopher"), false)' },
    { name: 'join_words(["a", "b", "c"]) returns "a, b, c"',
      code: '  expect_eq(join_words(["a", "b", "c"]), "a, b, c")' },
  ],

  solution: `def shout(s)
  s.upcase
end

def greet(name)
  "Hello, #{name}!"
end

def contains_word?(haystack, needle)
  haystack.include?(needle)
end

def join_words(words)
  words.join(", ")
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Ruby</th></tr>
  <tr><td>Format</td><td><code>fmt.Sprintf("%s is %d", n, a)</code></td><td><code>"#{n} is #{a}"</code> (double quotes only)</td></tr>
  <tr><td>Uppercase / lowercase</td><td><code>strings.ToUpper(s)</code> / <code>ToLower</code></td><td><code>s.upcase</code> / <code>s.downcase</code></td></tr>
  <tr><td>Contains</td><td><code>strings.Contains(s, sub)</code></td><td><code>s.include?(sub)</code></td></tr>
  <tr><td>Length</td><td><code>len(s)</code> (bytes!)</td><td><code>s.length</code> (characters)</td></tr>
  <tr><td>Join</td><td><code>strings.Join(parts, ", ")</code></td><td><code>parts.join(", ")</code></td></tr>
  <tr><td>Split</td><td><code>strings.Split(s, ",")</code></td><td><code>s.split(",")</code></td></tr>
  <tr><td>Trim whitespace</td><td><code>strings.TrimSpace(s)</code></td><td><code>s.strip</code></td></tr>
</table>
<p>The <code>?</code> suffix is pure convention — the interpreter doesn't
care — but Ruby code leans on it everywhere: <code>include?</code>,
<code>empty?</code>, <code>start_with?</code>. Where a Go API communicates
through types (<code>func ... bool</code>), a Ruby API communicates through
names. Different channel, same intent: you can tell it's a predicate at the
call site.</p>`,
};
