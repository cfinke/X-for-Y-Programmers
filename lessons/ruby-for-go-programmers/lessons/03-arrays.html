const LESSON = {
  number: 3,
  title: "Arrays",

  intro: `
<p>Go gives you slices: views over a backing array, with the famous
<code>s = append(s, x)</code> reassignment dance because <code>append</code>
may or may not reallocate. Ruby's <code>Array</code> is one honest,
heterogeneous, growable list — <code>[1, 2, 3]</code> — and there is no
length/capacity bookkeeping at all. To push, you use the shovel:
<code>arr &lt;&lt; x</code> appends <em>in place</em>, no reassignment, no
"did it reallocate?" question to ask.</p>
<table>
  <tr><th>Go</th><th>Ruby</th></tr>
  <tr><td><code>s := []int{1, 2, 3}</code></td><td><code>arr = [1, 2, 3]</code></td></tr>
  <tr><td><code>s = append(s, x)</code></td><td><code>arr &lt;&lt; x</code> (in place)</td></tr>
  <tr><td><code>len(s)</code></td><td><code>arr.size</code></td></tr>
  <tr><td><code>slices.Contains(s, x)</code></td><td><code>arr.include?(x)</code></td></tr>
  <tr><td><code>s[len(s)-1]</code></td><td><code>arr[-1]</code> or <code>arr.last</code></td></tr>
  <tr><td><code>s[1:3]</code> (shares backing array!)</td><td><code>arr[1..2]</code> (an independent copy)</td></tr>
</table>
<p>Indexing gets friendlier too: negative indexes count from the end, so
<code>arr[-1]</code> replaces the <code>s[len(s)-1]</code> idiom, and
<code>arr.first</code> / <code>arr.last</code> say it in words. Range slices
like <code>arr[1..2]</code> hand back a <em>copy</em> — mutate the slice and
the original is untouched, so the whole class of aliased-backing-array bugs
simply doesn't exist. The trade-off is equally honest: Ruby copies where Go
shares, so Go wins on control over allocations; Ruby wins on never having to
think about them.</p>`,

  go: `package main

import (
	"fmt"
	"slices"
)

func makeScores() []int {
	return []int{10, 20, 30}
}

func total(nums []int) int {
	sum := 0
	for _, n := range nums {
		sum += n
	}
	return sum
}

func main() {
	scores := makeScores()
	scores = append(scores, 40) // must reassign: append may reallocate
	fmt.Println(len(scores))    // 4
	fmt.Println(slices.Contains(scores, 20))
	first, last := scores[0], scores[len(scores)-1]
	fmt.Println(first, last)
	fmt.Println(total(scores))
}`,

  task: `
<p>Rewrite the Go as Ruby:</p>
<ol>
  <li><code>make_scores</code> — the array <code>[10, 20, 30]</code>, as the
      last expression.</li>
  <li><code>append(arr, x)</code> — push <code>x</code> onto <code>arr</code>
      with the shovel <code>&lt;&lt;</code>. No reassignment: <code>&lt;&lt;</code>
      mutates in place <em>and</em> evaluates to the array, so the shovel
      expression itself is your method body.</li>
  <li><code>total(nums)</code> — the whole <code>sum := 0; for range</code>
      loop collapses to <code>nums.sum</code>.</li>
  <li><code>ends(arr)</code> — a two-element array of the first and last
      elements: <code>[arr.first, arr.last]</code>. No
      <code>len(arr)-1</code> anywhere.</li>
</ol>`,

  starter: `# 1. make_scores: []int{10, 20, 30} -> [10, 20, 30]

  raise NotImplementedError, "TODO: implement make_scores"
end

# 2. append: s = append(s, x) -> arr << x  (in place; << evaluates to arr)

  raise NotImplementedError, "TODO: implement append"

# 3. total: the sum-accumulator for loop -> nums.sum

  raise NotImplementedError, "TODO: implement total"

  raise NotImplementedError, "TODO: implement ends"
end
`,

  requirements: [
    { pattern: /<</, message: "Push with the << shovel in append" },
    { pattern: /\.sum/, message: "Use .sum in total (no accumulator loop)" },
    { pattern: /\.first/, message: "Use .first in ends" },
    { pattern: /\[-1\]|\.last/, message: "Grab the last element with arr[-1] or .last" },
  ],

  tests: [
    { name: "make_scores returns [10, 20, 30]",
      code: "  expect_eq(make_scores, [10, 20, 30])" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "  expect_eq(append([1, 2], 3), [1, 2, 3])" },
    { name: "append mutates the array in place (no reassignment needed)",
      code: "  a = [1, 2]\n  append(a, 3)\n  expect_eq(a, [1, 2, 3])" },
    { name: "total([1, 2, 3, 4]) returns 10",
      code: "  expect_eq(total([1, 2, 3, 4]), 10)" },
    { name: "total([]) returns 0",
      code: "  expect_eq(total([]), 0)" },
    { name: "ends([5, 6, 7]) returns [5, 7]",
      code: "  expect_eq(ends([5, 6, 7]), [5, 7])\n  expect_eq(ends([42]), [42, 42])" },
  ],

  solution: `def make_scores
  [10, 20, 30]
end

def append(arr, x)
  arr << x
end

def total(nums)
  nums.sum
end

def ends(arr)
  [arr.first, arr.last]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Ruby</th></tr>
  <tr><td>Literal</td><td><code>[]int{1, 2, 3}</code></td><td><code>[1, 2, 3]</code> (mixed types welcome)</td></tr>
  <tr><td>Push</td><td><code>s = append(s, x)</code></td><td><code>arr &lt;&lt; x</code> (in place, returns the array)</td></tr>
  <tr><td>Length</td><td><code>len(s)</code></td><td><code>arr.size</code> (or <code>.length</code>)</td></tr>
  <tr><td>Membership</td><td><code>slices.Contains(s, x)</code></td><td><code>arr.include?(x)</code></td></tr>
  <tr><td>Last element</td><td><code>s[len(s)-1]</code></td><td><code>arr[-1]</code> / <code>arr.last</code></td></tr>
  <tr><td>Sub-slice</td><td><code>s[1:3]</code> — shared backing array</td><td><code>arr[1..2]</code> — independent copy</td></tr>
  <tr><td>Sum</td><td><code>for _, n := range s { sum += n }</code></td><td><code>arr.sum</code></td></tr>
</table>
<p>Because <code>&lt;&lt;</code> returns the array itself, pushes chain:
<code>arr &lt;&lt; 1 &lt;&lt; 2 &lt;&lt; 3</code>. And because slicing copies,
you can hand <code>arr[1..2]</code> to anyone without wondering who else
sees their mutations — the aliasing analysis Go asks you to do in your head
is gone, at the price of the allocation.</p>`,
};
