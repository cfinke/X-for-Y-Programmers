const LESSON = {
  number: 12,
  title: "Enumerable: map, select & Friends",

  intro: `
<p>You know the loop on the left by heart: <code>make</code> a destination
slice, <code>range</code> over the source, <code>if</code>, <code>append</code>,
<code>return</code>. Five lines of bookkeeping per question, and you write it
several times a day. Ruby retires that loop. Every collection mixes in
<strong>Enumerable</strong>, a module of ready-made verbs that each take a
block: <code>.map { }</code> transforms, <code>.select { }</code> filters,
<code>.sum</code> accumulates, <code>.min_by { }</code> finds — one call each,
no index, no destination slice, no bookkeeping.</p>
<table>
  <tr><th>Go</th><th>Ruby</th></tr>
  <tr><td>make + range + if + append</td><td><code>products.select { |p| p[:in_stock] }</code></td></tr>
  <tr><td>make + range + append</td><td><code>products.map { |p| p[:name] }</code></td></tr>
  <tr><td><code>total := 0; for ... { total += p.PriceCents }</code></td><td><code>products.sum { |p| p[:price_cents] }</code></td></tr>
  <tr><td><code>slices.MinFunc(products, cmp)</code></td><td><code>products.min_by { |p| p[:price_cents] }</code></td></tr>
  <tr><td>each helper is its own func + loop</td><td>calls chain: <code>.select { }.map { }</code></td></tr>
</table>
<p>Go 1.21's <code>slices</code> package (and 1.23's iterators) gestures at
this — <code>slices.MinFunc</code>, <code>slices.ContainsFunc</code> — but
Ruby's Enumerable is the full toolkit, and the verbs <em>chain</em>: the result
of <code>select</code> is another array, so <code>.map</code> hangs right off
it. Each verb is just a method that <code>yield</code>s every element to your
block — lesson 11 in action.</p>`,

  go: `type Product struct {
	Name       string
	PriceCents int
	InStock    bool
}

// One loop per question — the daily grind.
func inStockNames(products []Product) []string {
	names := make([]string, 0, len(products))
	for _, p := range products {
		if p.InStock {
			names = append(names, p.Name)
		}
	}
	return names
}

// ...and another loop for totalValue, and another for cheapest
// (or slices.MinFunc since Go 1.21 — one borrowed verb at a time).`,

  task: `
<p>The products are symbol-keyed hashes:
<code>{ name: "Mouse", price_cents: 2500, in_stock: true }</code>. Replace the
loops with Enumerable verbs:</p>
<ol>
  <li><code>in_stock_names(products)</code> — names of the in-stock products,
      in order. Chain <code>.select { |p| p[:in_stock] }</code> into
      <code>.map { |p| p[:name] }</code> — the whole Go function is one
      line.</li>
  <li><code>total_value(products)</code> — the sum of every product's price:
      <code>products.sum { |p| p[:price_cents] }</code>. No accumulator
      variable exists.</li>
  <li><code>cheapest_name(products)</code> — the name of the lowest-priced
      product. <code>.min_by { |p| p[:price_cents] }</code> hands back the
      whole hash; then index it with <code>[:name]</code>.</li>
</ol>
<p>Zero <code>for</code> keywords, zero indexes, zero <code>make</code>.</p>`,

  starter: `# 1. in_stock_names: .select { } to filter, then .map { } to transform.

`,

  requirements: [
    { pattern: /\.select/, message: "Filter with .select" },
    { pattern: /\.map/, message: "Transform with .map" },
    { pattern: /\.sum/, message: "Total the prices with .sum" },
    { pattern: /min_by|sort_by/, message: "Find the cheapest with min_by (or sort_by)" },
  ],

  tests: [
    { name: 'in_stock_names picks ["Keyboard", "Mouse"]',
      code: '  expect_eq(in_stock_names([{ name: "Keyboard", price_cents: 4500, in_stock: true }, { name: "Monitor", price_cents: 22000, in_stock: false }, { name: "Mouse", price_cents: 2500, in_stock: true }]), ["Keyboard", "Mouse"])' },
    { name: "in_stock_names returns [] when nothing is in stock",
      code: '  expect_eq(in_stock_names([{ name: "Monitor", price_cents: 22000, in_stock: false }]), [])' },
    { name: "total_value sums 4500 + 22000 + 2500 = 29000",
      code: '  expect_eq(total_value([{ name: "Keyboard", price_cents: 4500, in_stock: true }, { name: "Monitor", price_cents: 22000, in_stock: false }, { name: "Mouse", price_cents: 2500, in_stock: true }]), 29000)' },
    { name: "total_value of an empty list is 0",
      code: "  expect_eq(total_value([]), 0)" },
    { name: 'cheapest_name finds "Mouse"',
      code: '  expect_eq(cheapest_name([{ name: "Keyboard", price_cents: 4500, in_stock: true }, { name: "Monitor", price_cents: 22000, in_stock: false }, { name: "Mouse", price_cents: 2500, in_stock: true }]), "Mouse")' },
  ],

  solution: `def in_stock_names(products)
  products.select { |p| p[:in_stock] }.map { |p| p[:name] }
end

def total_value(products)
  products.sum { |p| p[:price_cents] }
end

def cheapest_name(products)
  products.min_by { |p| p[:price_cents] }[:name]
end
`,

  notes: `
<table>
  <tr><th>Loop you write in Go</th><th>Enumerable verb</th></tr>
  <tr><td>range + append (transform)</td><td><code>.map { |x| ... }</code></td></tr>
  <tr><td>range + if + append (filter)</td><td><code>.select { |x| ... }</code> / opposite: <code>.reject { }</code></td></tr>
  <tr><td>range + <code>total += x</code></td><td><code>.sum</code> or <code>.sum { |x| ... }</code></td></tr>
  <tr><td><code>slices.MinFunc</code> / <code>MaxFunc</code></td><td><code>.min_by { }</code> / <code>.max_by { }</code></td></tr>
  <tr><td><code>slices.ContainsFunc</code></td><td><code>.any? { }</code>; also <code>.all? { }</code>, <code>.none? { }</code></td></tr>
  <tr><td><code>slices.IndexFunc</code> then index</td><td><code>.find { }</code> returns the element (or nil)</td></tr>
  <tr><td><code>slices.SortFunc</code></td><td><code>.sort_by { |x| ... }</code></td></tr>
</table>
<p>The chainability is the real upgrade: every verb returns a new collection,
so a filter-then-transform-then-total pipeline reads top to bottom as
<code>.select { }.map { }.sum</code> with no intermediate names. And because
these are ordinary methods yielding to ordinary blocks, they work on anything
Enumerable — arrays, hashes, ranges, files — not just slices of one element
type.</p>`,
};
