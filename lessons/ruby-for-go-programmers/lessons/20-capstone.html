<p>No new concepts — this is the course's toolkit applied to one small,
Go-shaped problem: an inventory of items, each with a name, a price in
cents, and a count. In Go this is a struct, a handful of loops, and the
comma-ok pattern for lookups. In Ruby it's a class with
<code>attr_reader</code>, and every loop collapses into an Enumerable call
with a block.</p>
<table>
  <tr><th>Go</th><th>Ruby</th></tr>
  <tr><td><code>for _, it := range items { total += ... }</code></td><td><code>items.sum { |i| ... }</code></td></tr>
  <tr><td><code>it, ok := FindItem(items, name)</code></td><td><code>items.find { ... }</code> — the item, or <code>nil</code></td></tr>
  <tr><td>filter loop + <code>append</code></td><td><code>items.select { ... }.map { ... }</code></td></tr>
  <tr><td><code>it.PriceCents</code></td><td><code>i.price_cents</code></td></tr>
</table>
<p>One Go instinct to keep and one to translate. Keep: value-style updates.
Ruby objects are <em>references</em> — an <code>Item</code> in two arrays is
the same object in both, so "change the count" done naively mutates shared
state. The functional habit is to build a <em>new</em>
<code>Item.new(...)</code> and a new array, like copying a Go struct value.
Translate: the found-bool. <code>find</code> returns the element or
<code>nil</code>, and lesson 6's nil-handling replaces the
<code>ok</code> flag.</p>`,

  go: `type Item struct {
	Name       string
	PriceCents int
	Count      int
}

func TotalValue(items []Item) int {
	total := 0
	for _, it := range items {
		total += it.PriceCents * it.Count
	}
	return total
}

func FindItem(items []Item, name string) (Item, bool) {
	for _, it := range items {
		if it.Name == name {
			return it, true // the comma-ok pattern
		}
	}
	return Item{}, false
}

func Restock(items []Item, name string, amount int) []Item {
	out := make([]Item, len(items))
	for i, it := range items {
		if it.Name == name {
			it.Count += amount // it is a copy — originals untouched
		}
		out[i] = it
	}
	return out
}`,

  solution: `class Item
  attr_reader :name, :price_cents, :count

  def initialize(name, price_cents, count)
    @name = name
    @price_cents = price_cents
    @count = count
  end
end

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }
end

def restock(items, name, amount)
  items.map do |i|
    i.name == name ? Item.new(i.name, i.price_cents, i.count + amount) : i
  end
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map { |i| i.name }
end

  <tr><td>Filter + project</td><td>loop + <code>append</code></td><td><code>.select { }.map { }</code></td></tr>

  <tr><td>Safe use of a miss</td><td><code>if !ok { ... }</code></td><td><code>item&amp;.count</code>, <code>if item.nil?</code></td></tr>

<p>That reference semantics point is the one real trap for a Go programmer
here: in Go, <code>it.Count += amount</code> inside <code>Restock</code> was
safe <em>because</em> <code>it</code> was a copy. In Ruby the equivalent
mutation would silently edit the item inside the caller's array too — so the
idiom is to make copying explicit with <code>Item.new</code>. Everything
else you wrote today — <code>attr_reader</code>, blocks, chained
Enumerable, nil instead of ok-flags — is the whole course in one file.
Nicely done.</p>`,
