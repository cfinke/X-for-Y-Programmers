  number: 7,
  title: "Everything Is an Object",

  intro: `
<p>Go splits the world in two: primitive values (<code>int</code>,
<code>string</code>, slices) and the package functions that operate on them —
<code>len(x)</code>, <code>math.Abs(f)</code>, <code>strings.Split(s, "")</code>.
Ruby has no such split. <strong>Every</strong> value is an object, and all
computation is a message sent to one: <code>-3.abs</code>,
<code>4.even?</code>, <code>5.times { ... }</code>. Even integer literals
receive method calls.</p>
<table>
  <tr><th>Go</th><th>Ruby</th></tr>
  <tr><td><code>math.Abs(x)</code></td><td><code>x.abs</code></td></tr>
  <tr><td><code>n % 2 == 0</code></td><td><code>n.even?</code></td></tr>
  <tr><td><code>strings.Split(s, "")</code></td><td><code>s.chars</code></td></tr>
  <tr><td><code>len(xs)</code></td><td><code>xs.length</code> (or <code>xs.size</code>)</td></tr>
  <tr><td><code>for i := 0; i &lt; 5; i++ { ... }</code></td><td><code>5.times { ... }</code></td></tr>
</table>
<p>So there is no <code>strings</code> package to import, no <code>math</code>
package for the basics — the methods live <em>on the values themselves</em>.
That is why idiomatic Ruby chains where Go writes one statement per line:
<code>nums.select(&amp;:even?).map { |n| n * n }.sum</code> reads as a pipeline
of messages, each returning the next receiver. (<code>&amp;:even?</code> is
shorthand for a block that calls <code>.even?</code> on each element — more on
blocks in lesson 11.)</p>`,

  go: `import (
	"math"
	"strings"
)

func absolute(f float64) float64 {
	return math.Abs(f) // a package function, not a method
}

func evenNumbers(nums []int) []int {
	out := []int{}
	for _, n := range nums {
		if n%2 == 0 { // an operator, not a question
			out = append(out, n)
		}
	}
	return out
}

func charList(s string) []string {
	return strings.Split(s, "") // the strings package again
}`,

  task: `
<p>Rewrite the package-function style as messages to objects:</p>
<ol>
  <li><code>absolute(n)</code> — return the absolute value with
      <code>n.abs</code>. No <code>math</code> import; the number knows.</li>
  <li><code>even_numbers(nums)</code> — keep only the even numbers with
      <code>nums.select(&amp;:even?)</code>. The whole Go loop is one
      message.</li>
  <li><code>rounded(f, digits)</code> — round a float with
      <code>f.round(digits)</code>.</li>
  <li><code>char_list(s)</code> — split a string into an array of one-character
      strings with <code>s.chars</code>.</li>
</ol>`,

  starter: `# 1. math.Abs(n) -> n.abs — the method lives on the number.

  raise NotImplementedError, "TODO: implement rounded"

`,

  requirements: [
    { pattern: /\.abs/, message: "Call .abs on the number" },
    { pattern: /\.even\?|&:even\?/, message: "Ask the numbers even? (e.g. select(&:even?))" },
    { pattern: /\.round\(/, message: "Call .round(digits) on the float" },
    { pattern: /\.chars/, message: "Call .chars on the string" },
  ],

  tests: [
    { name: "absolute(-7) returns 7; absolute(3) returns 3",
      code: "  expect_eq(absolute(-7), 7)\n  expect_eq(absolute(3), 3)" },
    { name: "even_numbers([1, 2, 3, 4, 5, 6]) returns [2, 4, 6]",
      code: "  expect_eq(even_numbers([1, 2, 3, 4, 5, 6]), [2, 4, 6])" },
    { name: "even_numbers([1, 3, 5]) returns []",
      code: "  expect_eq(even_numbers([1, 3, 5]), [])" },
    { name: "rounded(3.14159, 2) returns 3.14",
      code: "  expect_eq(rounded(3.14159, 2), 3.14)" },
    { name: 'char_list("go") returns ["g", "o"]',
      code: '  expect_eq(char_list("go"), ["g", "o"])' },
  ],

  solution: `def absolute(n)
  n.abs
end

def even_numbers(nums)
  nums.select(&:even?)
end

def rounded(f, digits)
  f.round(digits)
end

def char_list(s)
  s.chars
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Ruby</th></tr>
  <tr><td>Absolute value</td><td><code>math.Abs(x)</code></td><td><code>x.abs</code></td></tr>
  <tr><td>Even / odd</td><td><code>n % 2 == 0</code></td><td><code>n.even?</code> / <code>n.odd?</code></td></tr>
  <tr><td>Rounding</td><td><code>math.Round(x*100) / 100</code></td><td><code>x.round(2)</code></td></tr>
  <tr><td>String to chars</td><td><code>strings.Split(s, "")</code></td><td><code>s.chars</code></td></tr>
  <tr><td>Length</td><td><code>len(x)</code> builtin</td><td><code>x.length</code> — works on String, Array, Hash</td></tr>
  <tr><td>Repeat n times</td><td><code>for i := 0; i &lt; n; i++</code></td><td><code>n.times { |i| ... }</code></td></tr>
  <tr><td>Discover methods</td><td>read the package docs</td><td><code>x.methods</code>, <code>x.respond_to?(:abs)</code></td></tr>
</table>
<p>The deeper shift is grammatical: Go asks "which package operates on this
type?", Ruby asks "what messages does this object answer?" Once every
operation returns an object, chaining stops being a style choice and becomes
the natural shape of the language — which is exactly what the Enumerable
lessons (12–13) build on.</p>`,
