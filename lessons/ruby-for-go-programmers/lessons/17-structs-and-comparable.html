  number: 17,
  title: "Structs & Comparable",

  intro: `
<p>Go's little value types — <code>type Point struct { X, Y int }</code> —
need a few pieces assembled by hand: the type, a constructor convention,
methods, and (for anything beyond simple comparable fields) hand-written
equality. Ruby packs the whole kit into one line:
<code>Point = Struct.new(:x, :y)</code> gives you a class with a constructor,
accessors for each field, <em>value</em> equality, and a readable
<code>to_s</code> — there is no <code>==</code> operator to write. Pass
<code>Struct.new</code> a block and you can define methods right inside it.</p>
<table>
  <tr><th>Go</th><th>Ruby</th></tr>
  <tr><td><code>type Point struct { X, Y int }</code></td><td><code>Point = Struct.new(:x, :y)</code></td></tr>
  <tr><td><code>p := Point{3, 4}</code></td><td><code>p = Point.new(3, 4)</code></td></tr>
  <tr><td><code>p.X</code></td><td><code>p.x</code> (a generated accessor)</td></tr>
  <tr><td><code>sort.Slice(vs, func(i, j int) bool {...})</code></td><td><code>vs.sort</code> — no less-function</td></tr>
  <tr><td><code>vs[i].Less(vs[j])</code>, written per type</td><td><code>a &lt; b</code>, free from <code>Comparable</code></td></tr>
</table>
<p>Ordering is the bigger win. Go asks for a fresh
<code>func(i, j int) bool</code> at every <code>sort.Slice</code> call site.
Ruby asks you to write exactly <em>one</em> method — the spaceship
<code>&lt;=&gt;</code>, returning <code>-1</code>, <code>0</code>, or
<code>1</code> — and <code>include Comparable</code> then derives
<code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>,
<code>==</code>, and <code>between?</code> from it, and <code>.sort</code>
just works. Arrays already compare element-by-element, so
<code>[major, minor] &lt;=&gt; [other.major, other.minor]</code> is the whole
implementation.</p>`,

  go: `type Point struct{ X, Y int }

func (p Point) DistanceTo(q Point) float64 {
	dx := float64(p.X - q.X)
	dy := float64(p.Y - q.Y)
	return math.Sqrt(dx*dx + dy*dy)
}

type Version struct{ Major, Minor int }

func main() {
	fmt.Println(Point{1, 2} == Point{1, 2}) // true — but no <, no sort

	vs := []Version{{2, 0}, {1, 10}, {1, 2}}
	sort.Slice(vs, func(i, j int) bool { // a less-func at every call site
		if vs[i].Major != vs[j].Major {
			return vs[i].Major < vs[j].Major
		}
		return vs[i].Minor < vs[j].Minor
	})
	fmt.Println(vs) // [{1 2} {1 10} {2 0}]
}`,

  task: `
<p>Rewrite the Go as Ruby:</p>
<ol>
  <li><code>Point = Struct.new(:x, :y)</code> is already in the starter, with
      a block. Implement <code>distance_to(other)</code> inside the block:
      <code>Math.sqrt((x - other.x)**2 + (y - other.y)**2)</code> — the
      <code>x</code> and <code>y</code> accessors were generated for you.</li>
  <li>Finish <code>class Version</code>: in <code>initialize(major, minor)</code>
      assign <code>@major</code> and <code>@minor</code>, and add
      <code>attr_reader :major, :minor</code>.</li>
  <li>Implement the spaceship <code>&lt;=&gt;(other)</code> by comparing
      arrays: <code>[major, minor] &lt;=&gt; [other.major, other.minor]</code>.
      With <code>include Comparable</code> already in place, that one method
      unlocks <code>&lt;</code>, <code>&gt;</code>, <code>==</code>,
      <code>between?</code>, and <code>.sort</code>.</li>
</ol>`,

  starter: `# 1. A struct with methods: the block form of Struct.new.
#    Constructor, accessors, and value equality come built in.
Point = Struct.new(:x, :y) do
  def distance_to(other)
    raise NotImplementedError, "TODO: implement distance_to"
  end
end

# 2 & 3. One <=> method + Comparable = the whole ordering family.
class Version
  include Comparable

  def initialize(major, minor)
    raise NotImplementedError, "TODO: assign @major and @minor"
  end

  def <=>(other)
    raise NotImplementedError, "TODO: compare [major, minor] arrays"
  end
end
`,

  requirements: [
    { pattern: /Struct\.new/, message: "Build Point with Struct.new" },
    { pattern: /include\s+Comparable/, message: "include Comparable in Version" },
    { pattern: /<=>/, message: "Define the spaceship operator <=>" },
    { pattern: /def\s+distance_to/, message: "Define distance_to inside the Struct.new block" },
  ],

  tests: [
    { name: "distance_to: the 3-4-5 triangle",
      code: "  expect_eq(Point.new(0, 0).distance_to(Point.new(3, 4)), 5.0)" },
    { name: "Struct gives value equality for free (no == to write)",
      code: "  expect_true(Point.new(1, 2) == Point.new(1, 2))\n  expect_true(Point.new(1, 2) != Point.new(2, 1))" },
    { name: "Version.new(1, 2) < Version.new(1, 10) — numeric, not lexicographic",
      code: "  expect_true(Version.new(1, 2) < Version.new(1, 10))\n  expect_true(Version.new(2, 0) > Version.new(1, 10))" },
    { name: "versions .sort with no less-function anywhere",
      code: "  vs = [Version.new(2, 0), Version.new(1, 10), Version.new(1, 2)]\n  expect_true(vs.sort == [Version.new(1, 2), Version.new(1, 10), Version.new(2, 0)])" },
    { name: "between? comes free with Comparable",
      code: "  expect_true(Version.new(1, 5).between?(Version.new(1, 2), Version.new(2, 0)))\n  expect_true(!Version.new(2, 1).between?(Version.new(1, 2), Version.new(2, 0)))" },
  ],

  solution: `Point = Struct.new(:x, :y) do
  def distance_to(other)
    Math.sqrt((x - other.x)**2 + (y - other.y)**2)
  end
end

class Version
  include Comparable

  attr_reader :major, :minor

  def initialize(major, minor)
    @major = major
    @minor = minor
  end

  def <=>(other)
    [major, minor] <=> [other.major, other.minor]
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Ruby</th></tr>
  <tr><td>Value type</td><td><code>type Point struct { X, Y int }</code></td><td><code>Point = Struct.new(:x, :y)</code></td></tr>
  <tr><td>Construct</td><td><code>Point{3, 4}</code></td><td><code>Point.new(3, 4)</code></td></tr>
  <tr><td>Equality</td><td><code>==</code> for comparable fields; hand-written otherwise</td><td>value <code>==</code> generated by <code>Struct</code></td></tr>
  <tr><td>Methods on it</td><td><code>func (p Point) DistanceTo(q Point)</code></td><td><code>def distance_to(other)</code> in the block</td></tr>
  <tr><td>Ordering</td><td><code>sort.Slice</code> + less-func per call site</td><td><code>&lt;=&gt;</code> once + <code>include Comparable</code></td></tr>
  <tr><td>Compare tuples</td><td>nested <code>if</code> on each field</td><td><code>[a, b] &lt;=&gt; [c, d]</code></td></tr>
</table>
<p><code>Comparable</code> is duck typing paying off: the module's
<code>&lt;</code>, <code>between?</code>, and friends are written once,
against anything that responds to <code>&lt;=&gt;</code> — the same way
<code>sort.Interface</code> works, but with one method instead of three and
no boilerplate <code>Len</code>/<code>Swap</code>. If you need a struct
that's frozen and keyword-constructed, look up <code>Data.define</code> —
Ruby 3.2's immutable sibling of <code>Struct</code>.</p>`,
};
