  title: "Closures & Callables",

  intro: `
<p>Go closures capture surrounding variables by reference, automatically and
silently — which is exactly why the loop-variable bug (every goroutine in the
loop seeing the <em>final</em> value of <code>v</code>) haunted Go for a
decade until 1.22 changed loop semantics to fix it. PHP refuses to capture
anything silently: an anonymous <code>function</code> sees <em>no</em> outer
variables unless you list them in a <code>use (...)</code> clause. And the
default capture mode is <strong>by value</strong> — a snapshot taken at the
moment the closure is created. If you want Go-style live-reference capture,
you opt in per variable with an ampersand: <code>use (&amp;$count)</code>.</p>
<table>
  <tr><th>Go</th><th>PHP</th></tr>
  <tr><td><code>func(x int) int { return x * n }</code></td><td><code>function (int $x) use ($n) { return $x * $n; }</code></td></tr>
  <tr><td><em>capture is implicit</em></td><td><code>use ($n)</code> — explicit, or the variable is undefined</td></tr>
  <tr><td><em>capture is by reference</em></td><td><code>use ($n)</code> is a by-value snapshot; <code>use (&amp;$n)</code> is by reference</td></tr>
  <tr><td><em>(no short form)</em></td><td><code>fn(int $x) =&gt; $x * $n</code> — auto-captures by value</td></tr>
  <tr><td><code>f func(int) int</code> parameter</td><td><code>callable $f</code> or <code>Closure $f</code> parameter</td></tr>
  <tr><td><code>f(x)</code></td><td><code>$f($x)</code></td></tr>
</table>
<p>PHP 7.4's arrow function <code>fn($x) =&gt; expr</code> is the ergonomic
middle ground: single expression, no braces, and it auto-captures whatever it
mentions — but always by value, so it stays snapshot-safe. For typing, a
<code>callable</code> parameter accepts anything invokable (closures,
<code>'strlen'</code> as a string, method references), while
<code>Closure</code> is the concrete class every anonymous function is an
instance of — use it as a return type the way you'd write
<code>func() int</code> in a Go signature.</p>`,

  go: `func makeMultiplier(n int) func(int) int {
    return func(x int) int {
        return x * n // n captured implicitly, by reference
    }
}

func makeCounter() func() int {
    count := 0
    return func() int {
        count++ // mutates the captured variable
        return count
    }
}

// The pre-1.22 footgun: every closure shared ONE v.
for _, v := range items {
    fs = append(fs, func() { fmt.Println(v) })
}`,

  task: `
<p>Build the two classic closure factories and a higher-order helper:</p>
<ol>
  <li><code>make_multiplier(int $n): Closure</code> — return an arrow
      function <code>fn(int $x) =&gt; $x * $n</code>. The arrow function
      auto-captures <code>$n</code> by value — no <code>use</code> clause
      needed.</li>
  <li><code>apply_twice(callable $f, int $x): int</code> — call
      <code>$f</code> on <code>$x</code>, then on the result:
      <code>$f($f($x))</code>. This is your <code>func(int) int</code>
      parameter, spelled <code>callable</code>.</li>
  <li><code>make_counter(): Closure</code> — the Go counter above. Start a
      local <code>$count</code> at <code>0</code> and return a
      <code>function () use (&amp;$count)</code> that increments and returns
      it: <code>1, 2, 3, ...</code>. The <code>&amp;</code> is the whole
      lesson — without it the closure gets a snapshot of <code>0</code> and
      returns <code>1</code> forever.</li>
</ol>`,

    { name: 'each multiplier keeps its own captured $n',

    { name: 'apply_twice works with a multiplier closure',
      code: 'expect_eq(apply_twice(make_multiplier(3), 2), 18);' },
    { name: 'make_counter() counts 1, 2, 3 across calls',

  solution: `<?php

function make_multiplier(int $n): Closure {
    return fn(int $x) => $x * $n;
}

function apply_twice(callable $f, int $x): int {
    return $f($f($x));
}

function make_counter(): Closure {
    $count = 0;
    return function () use (&$count): int {
        $count++;
        return $count;
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>PHP</th></tr>
  <tr><td>Anonymous function</td><td><code>func(x int) int { ... }</code></td><td><code>function (int $x) { ... }</code></td></tr>
  <tr><td>Capture a variable</td><td>implicit, by reference</td><td><code>use ($n)</code> — explicit, by value (snapshot)</td></tr>
  <tr><td>Capture by reference</td><td><em>the only mode</em></td><td><code>use (&amp;$n)</code> — opt-in per variable</td></tr>
  <tr><td>Short single expression</td><td>—</td><td><code>fn($x) =&gt; $x * $n</code> (auto-captures by value)</td></tr>
  <tr><td>Function-typed parameter</td><td><code>f func(int) int</code></td><td><code>callable $f</code> / <code>Closure $f</code></td></tr>
  <tr><td>Function-typed return</td><td><code>func() int</code></td><td><code>Closure</code></td></tr>
  <tr><td>Named function as a value</td><td><code>strings.ToUpper</code></td><td><code>strtoupper(...)</code> (first-class callable) or <code>'strtoupper'</code></td></tr>
</table>
<p>PHP's by-value default means the pre-1.22 Go loop bug <em>cannot happen</em>
with <code>use ($v)</code> or <code>fn() =&gt; $v</code> — every closure gets
its own copy at creation time, which is exactly the semantics Go 1.22 adopted
for loop variables. The flip side: stateful closures like the counter need the
explicit <code>&amp;</code>, and forgetting it is the classic mistake in the
other direction — the closure happily increments its private snapshot and
returns <code>1</code> every time. One caveat carried over from lesson 9:
"by value" still means objects are captured as handles, so a closure that
captures an object by value can still mutate that object's properties.</p>`,
