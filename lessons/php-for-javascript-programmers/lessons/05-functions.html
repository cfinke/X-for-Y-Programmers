<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>PHP functions read like JavaScript functions: same <code>function</code>
keyword, same <code>return</code>, and default parameter values carry over
verbatim — <code>function greet($name, $greeting = "Hello")</code>. What you
gain are powers JavaScript doesn't have. Type declarations are real and
runtime-enforced: <code>string $name</code> rejects a wrong-type argument with
a <code>TypeError</code>. A leading <code>?</code> makes a type nullable
(<code>?string $last</code> accepts a string or <code>null</code>), and
PHP 8 union types spell out alternatives inline: <code>int|string $id</code>,
which you then discriminate with checks like <code>is_int($id)</code> — the
<code>typeof</code>-narrowing pattern, formalized.</p>
<table>
  <tr><th>JavaScript</th><th>PHP</th></tr>
  <tr><td><code>function greet(name, greeting = "Hello")</code></td><td><code>function greet(string $name, string $greeting = "Hello")</code></td></tr>
  <tr><td><code>last = null</code> (by convention)</td><td><code>?string $last = null</code> (enforced)</td></tr>
  <tr><td><code>typeof id === "number"</code></td><td><code>int|string $id</code> + <code>is_int($id)</code></td></tr>
  <tr><td><code>f({ name: "Ada", greeting: "Yo" })</code></td><td><code>f(name: "Ada", greeting: "Yo")</code></td></tr>
</table>
<p>The last row is the headline: <strong>named arguments</strong>. Where
JavaScript fakes labeled parameters with an options object (and destructuring
to unpack it), PHP 8 builds the pattern into the call site —
<code>greet(name: "Ada")</code>, in any order, skipping any defaults you don't
care about. No wrapper object, no destructuring, and the types still
apply.</p>`,

  javascript: `function greet(name, greeting = "Hello") {
  return \`\${greeting}, \${name}!\`;
}

function formatName(first, last = null) {
  return last === null ? first : \`\${first} \${last}\`;
}

function describe(id) {
  // "number or string" lives only in a comment or JSDoc.
  if (typeof id === "number") {
    return \`integer id \${id}\`;
  }
  return \`string id \${id}\`;
}

// The options-object pattern — JS's stand-in for named arguments:
// greetOpts({ name: "Ada", greeting: "Yo" })
console.log(greet("Ada"), formatName("Grace", "Hopper"), describe(7));`,

  task: `
<p>Port the three functions, upgrading each with a PHP-only power:</p>
<ol>
  <li><code>greet(string $name, string $greeting = "Hello"): string</code> —
      returns <code>"Hello, Ada!"</code>-style text. The default works exactly
      like JS — and the tests also call it with a <em>named argument</em>
      (<code>greet(greeting: "Yo", name: "Ada")</code>), which needs no extra
      code from you: any function with named parameters supports it.</li>
  <li><code>format_name(string $first, ?string $last = null): string</code> —
      <code>"Grace Hopper"</code> when a last name is given, just
      <code>"Grace"</code> when it's <code>null</code>. The <code>?string</code>
      makes "string or null" part of the enforced signature instead of a
      convention.</li>
  <li><code>describe(int|string $id): string</code> — a union type. Use
      <code>is_int($id)</code> to return <code>"integer id 7"</code> for ints
      and <code>"string id abc"</code> for strings.</li>
</ol>`,

  starter: `<?php

// 1. Same default-parameter syntax as JS. Named arguments come free.
function greet(string $name, string $greeting = "Hello"): string {
    throw new Exception("TODO: implement greet");
}

// 2. ?string = "string or null", enforced at the boundary.
function format_name(string $first, ?string $last = null): string {
    throw new Exception("TODO: implement format_name");
}

// 3. int|string is a union type; branch on is_int($id).
function describe(int|string $id): string {
    throw new Exception("TODO: implement describe");
}
`,

  requirements: [
    { pattern: /=\s*"Hello"/, message: 'Give $greeting the default value "Hello"' },
    { pattern: /\?string/, message: "Declare $last as nullable with ?string" },
    { pattern: /int\|string/, message: "Declare describe's parameter with the int|string union type" },
  ],

  tests: [
    { name: 'greet("Ada") uses the default: "Hello, Ada!"',
      code: 'expect_eq(greet("Ada"), "Hello, Ada!");' },
    { name: 'greet("Ada", "Hi") returns "Hi, Ada!"',
      code: 'expect_eq(greet("Ada", "Hi"), "Hi, Ada!");' },
    { name: 'named arguments: greet(greeting: "Yo", name: "Ada") returns "Yo, Ada!"',
      code: 'expect_eq(greet(greeting: "Yo", name: "Ada"), "Yo, Ada!");' },
    { name: 'format_name("Grace", "Hopper") returns "Grace Hopper"',
      code: 'expect_eq(format_name("Grace", "Hopper"), "Grace Hopper");' },
    { name: 'format_name("Grace") returns "Grace"',
      code: 'expect_eq(format_name("Grace"), "Grace");' },
    { name: 'describe(7) and describe("abc") branch on the union type',
      code: 'expect_eq(describe(7), "integer id 7");\nexpect_eq(describe("abc"), "string id abc");' },
  ],

  solution: `<?php

function greet(string $name, string $greeting = "Hello"): string {
    return "$greeting, $name!";
}

function format_name(string $first, ?string $last = null): string {
    if ($last === null) {
        return $first;
    }
    return "$first $last";
}

function describe(int|string $id): string {
    if (is_int($id)) {
        return "integer id $id";
    }
    return "string id $id";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>PHP</th></tr>
  <tr><td>Default parameter</td><td><code>greeting = "Hello"</code></td><td><code>string $greeting = "Hello"</code> (same idea, plus a type)</td></tr>
  <tr><td>Nullable parameter</td><td><code>last = null</code> (convention)</td><td><code>?string $last = null</code> (enforced)</td></tr>
  <tr><td>"Number or string"</td><td>JSDoc comment + <code>typeof</code></td><td><code>int|string $id</code> union type</td></tr>
  <tr><td>Narrowing</td><td><code>typeof id === "number"</code></td><td><code>is_int($id)</code>, <code>is_string($id)</code>, <code>is_array($id)</code>…</td></tr>
  <tr><td>Labeled call</td><td><code>f({ name: "Ada" })</code> options object</td><td><code>f(name: "Ada")</code> named arguments, built in</td></tr>
  <tr><td>Wrong-type call</td><td>silently proceeds</td><td>throws <code>TypeError</code> at the call</td></tr>
</table>
<p>Named arguments quietly retire a whole JavaScript design pattern: instead
of accepting an options object, destructuring it, and documenting the shape,
you declare ordinary typed parameters with defaults and let callers name the
ones they pass — <code>greet(name: "Ada")</code> — in any order. Parameter
names are part of your public API now, which is exactly what makes call sites
self-documenting. Combined with runtime-checked types, unions, and nullable
markers, a PHP signature carries the contract JavaScript would scatter across
JSDoc, validation code, and hope.</p>`,
};
</script>
