const LESSON = {
  number: 13,
  title: "array_map, array_filter & Friends",

  intro: `
<p>Your <code>.map</code>/<code>.filter</code>/<code>.reduce</code> pipeline
exists in PHP, but as plain <em>functions</em>, not methods — there's no
chaining, and (brace yourself) the argument orders are inconsistent:
<code>array_map($fn, $arr)</code> takes the callback <em>first</em>,
<code>array_filter($arr, $fn)</code> takes the array first. Every PHP
developer alive has gotten this backwards at least once.</p>
<table>
  <tr><th>JavaScript</th><th>PHP</th></tr>
  <tr><td><code>arr.map(fn)</code></td><td><code>array_map($fn, $arr)</code> — callback first</td></tr>
  <tr><td><code>arr.filter(fn)</code></td><td><code>array_filter($arr, $fn)</code> — array first!</td></tr>
  <tr><td><code>arr.reduce(fn, init)</code></td><td><code>array_reduce($arr, $fn, $init)</code></td></tr>
  <tr><td><code>arr.reduce((s, n) =&gt; s + n, 0)</code></td><td><code>array_sum($arr)</code> — the shortcut</td></tr>
  <tr><td>filter reindexes automatically</td><td><code>array_values(array_filter(...))</code> — you reindex</td></tr>
</table>
<p>The bigger trap is the one JS never has: <strong><code>array_filter</code>
preserves keys</strong>. Filter <code>[1, 2, 3, 4]</code> down to the evens
and you get <code>[1 =&gt; 2, 3 =&gt; 4]</code> — the survivors keep their
old indexes, so what looks like a list now has holes. Compared with
<code>[2, 4]</code> under <code>===</code> it fails, and
<code>json_encode</code> turns it into an object instead of an array. The
fix is <code>array_values()</code>, which discards keys and renumbers from
zero. Filter, then reindex: make it muscle memory.</p>`,

  javascript: `const products = [
  { name: "Keyboard", priceCents: 4500, inStock: true },
  { name: "Mouse", priceCents: 2500, inStock: false },
  { name: "Monitor", priceCents: 18000, inStock: true },
];

const inStockNames = (products) =>
  products.filter((p) => p.inStock).map((p) => p.name);

const totalValue = (products) =>
  products.reduce((sum, p) => sum + p.priceCents, 0);

const evensDoubled = (nums) =>
  nums.filter((n) => n % 2 === 0).map((n) => n * 2);

// filter() returns a fresh, dense array — indexes 0, 1, 2...
// You have never once thought about this. PHP will make you.`,

  task: `
<p>Products are associative arrays like
<code>['name' =&gt; 'Keyboard', 'price_cents' =&gt; 4500, 'in_stock' =&gt; true]</code>.
Port the pipeline:</p>
<ol>
  <li><code>in_stock_names(array $products): array</code> — keep the in-stock
      products with <code>array_filter</code>, map them to their
      <code>'name'</code> with <code>array_map</code>, and wrap the result in
      <code>array_values()</code> so the tests see a clean
      <code>[0, 1, ...]</code> list.</li>
  <li><code>total_value(array $products): int</code> — total up every
      product's <code>'price_cents'</code> with <code>array_reduce</code>
      (or <code>array_map</code> + <code>array_sum</code>).</li>
  <li><code>evens_doubled(array $nums): array</code> — keep the even numbers,
      double them, and reindex. Without <code>array_values</code> this
      returns <code>[1 =&gt; 4, 3 =&gt; 8]</code> and fails the strict
      comparison.</li>
</ol>`,

  starter: `<?php

// 1. array_filter($products, $fn) -> array_map($fn, $names) -> array_values.
//    Watch the argument orders: filter is array-first, map is callback-first.
function in_stock_names(array $products): array {
    throw new Exception("TODO: implement in_stock_names");
}

// 2. array_reduce($arr, fn($carry, $item) => ..., 0) — or map + array_sum.
function total_value(array $products): int {
    throw new Exception("TODO: implement total_value");
}

// 3. Evens only, doubled — and reindexed, or the keys give you away.
function evens_doubled(array $nums): array {
    throw new Exception("TODO: implement evens_doubled");
}
`,

  requirements: [
    { pattern: /array_map/, message: "Transform with array_map($fn, $arr) — callback first" },
    { pattern: /array_filter/, message: "Select with array_filter($arr, $fn) — array first" },
    { pattern: /array_values/, message: "Reindex filtered results with array_values()" },
    { pattern: /array_reduce|array_sum/, message: "Total the prices with array_reduce (or array_sum)" },
  ],

  tests: [
    { name: "in_stock_names returns ['Keyboard', 'Monitor'] with clean 0,1 keys",
      code: `$products = [
    ['name' => 'Keyboard', 'price_cents' => 4500, 'in_stock' => true],
    ['name' => 'Mouse', 'price_cents' => 2500, 'in_stock' => false],
    ['name' => 'Monitor', 'price_cents' => 18000, 'in_stock' => true],
];
expect_eq(in_stock_names($products), ['Keyboard', 'Monitor']);` },
    { name: "in_stock_names([]) returns []",
      code: "expect_eq(in_stock_names([]), []);" },
    { name: "total_value adds up to 25000 cents",
      code: `$products = [
    ['name' => 'Keyboard', 'price_cents' => 4500, 'in_stock' => true],
    ['name' => 'Mouse', 'price_cents' => 2500, 'in_stock' => false],
    ['name' => 'Monitor', 'price_cents' => 18000, 'in_stock' => true],
];
expect_eq(total_value($products), 25000);` },
    { name: "evens_doubled([1, 2, 3, 4, 5]) returns [4, 8] — reindexed",
      code: "expect_eq(evens_doubled([1, 2, 3, 4, 5]), [4, 8]);\nexpect_eq(array_keys(evens_doubled([1, 2, 3, 4, 5])), [0, 1]);" },
    { name: "evens_doubled([1, 3, 5]) returns []",
      code: "expect_eq(evens_doubled([1, 3, 5]), []);" },
  ],

  solution: `<?php

function in_stock_names(array $products): array {
    $in_stock = array_filter($products, fn($p) => $p['in_stock']);
    $names = array_map(fn($p) => $p['name'], $in_stock);
    return array_values($names);
}

function total_value(array $products): int {
    return array_reduce($products, fn($total, $p) => $total + $p['price_cents'], 0);
}

function evens_doubled(array $nums): array {
    $evens = array_filter($nums, fn($n) => $n % 2 === 0);
    return array_values(array_map(fn($n) => $n * 2, $evens));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>PHP</th></tr>
  <tr><td>Map</td><td><code>arr.map(fn)</code></td><td><code>array_map($fn, $arr)</code></td></tr>
  <tr><td>Filter</td><td><code>arr.filter(fn)</code></td><td><code>array_filter($arr, $fn)</code> — note the flipped order</td></tr>
  <tr><td>Reduce</td><td><code>arr.reduce(fn, init)</code></td><td><code>array_reduce($arr, $fn, $init)</code></td></tr>
  <tr><td>Sum</td><td><code>arr.reduce((s, n) =&gt; s + n, 0)</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td>Reindex after filter</td><td>automatic</td><td><code>array_values($arr)</code></td></tr>
  <tr><td>Sort</td><td><code>arr.toSorted(cmp)</code></td><td><code>usort($arr, $cmp)</code> — in place, by reference</td></tr>
  <tr><td>Chaining</td><td><code>arr.filter(f).map(g)</code></td><td>nest or use intermediate variables</td></tr>
</table>
<p>Why does <code>array_filter</code> preserve keys? Because PHP has only one
array type: for an associative array, keeping keys is obviously right, and
<code>array_filter</code> can't know your array was "really" a list. So the
idiom is always the pair — <code>array_values(array_filter(...))</code> —
whenever list-ness matters: strict comparisons, <code>json_encode</code>
(which emits a JS object, not an array, the moment keys have gaps), or any
consumer expecting <code>0, 1, 2...</code>. <code>array_map</code>, by
contrast, preserves keys too but never drops elements, so a map over a list
stays a list.</p>`,
};
