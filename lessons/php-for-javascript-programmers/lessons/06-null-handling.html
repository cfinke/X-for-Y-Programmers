<title>Lesson 6: Null, ?? &amp; ?-&gt;</title>

<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 6,
  title: "Null, ?? & ?->",

  intro: `
<p>JavaScript gives you <em>two</em> nothings — <code>null</code> and
<code>undefined</code> — and a career's worth of arguments about which one
means what. PHP has exactly one: <code>null</code>. An unset variable, a
missing return value, a nullable parameter's default — all <code>null</code>.
The tools you built for JS's pair carry over almost symbol-for-symbol:
<code>??</code> is the same null coalescing operator (and <code>??=</code>
works too), and optional chaining just swaps its arrow —
<code>?.</code> becomes <code>?-&gt;</code>, because PHP reaches into objects
with <code>-&gt;</code> instead of <code>.</code></p>
<table>
  <tr><th>JavaScript</th><th>PHP</th></tr>
  <tr><td><code>null</code> and <code>undefined</code></td><td><code>null</code> (just the one)</td></tr>
  <tr><td><code>x ?? "fallback"</code></td><td><code>$x ?? "fallback"</code> (identical)</td></tr>
  <tr><td><code>x ??= "default"</code></td><td><code>$x ??= "default"</code> (identical)</td></tr>
  <tr><td><code>user?.address?.city</code></td><td><code>$user?-&gt;address?-&gt;city</code></td></tr>
  <tr><td><code>typeof x !== "undefined"</code></td><td><code>isset($x)</code></td></tr>
  <tr><td><code>string | null</code> (TS) / duck it (JS)</td><td><code>?string</code> nullable type</td></tr>
</table>
<p>The existence-check idiom is <code>isset($x)</code> — PHP's answer to the
<code>typeof</code> dance, and like <code>?.</code> it never throws on
variables or array keys that don't exist. One gotcha to tattoo somewhere:
<code>isset($x)</code> returns <strong>false</strong> when <code>$x</code>
exists but holds <code>null</code>. "Set to null" and "not set at all" are
indistinguishable to <code>isset()</code>. Conveniently, <code>??</code> has
the same blind spot on purpose: <code>$arr["missing"] ?? "d"</code> quietly
returns the default with no warning, which is why it's the idiomatic array
lookup you met in lesson 4. Function signatures mark nullable types with a
leading question mark: <code>?User $user</code> means "a User or null" —
TypeScript's <code>User | null</code>, compressed.</p>`,

  javascript: `const user = { address: { city: "Paris" } };
const ghost = null;

// Optional chaining short-circuits at the first null/undefined:
console.log(user?.address?.city);   // "Paris"
console.log(ghost?.address?.city);  // undefined

// ?? falls back only on null/undefined — not on "" or 0:
const city = ghost?.address?.city ?? "Unknown";
console.log(city);                  // "Unknown"

// ??= assigns only if currently null/undefined:
let label = null;
label ??= "n/a";

// And the classic "does it even exist" check:
if (typeof window !== "undefined") { /* browser-only code */ }`,

  task: `
<p>The starter defines <code>Address</code> and <code>User</code> classes for
you (note the <code>?Address</code> nullable type). Implement two functions:</p>
<ol>
  <li><code>get_city(?User $user): string</code> — return the user's city, or
      <code>"Unknown"</code> if the user is <code>null</code>, has no address,
      or the chain breaks anywhere. One line: chain
      <code>?-&gt;</code> through <code>address</code> and <code>city</code>,
      then catch the null with <code>??</code>.</li>
  <li><code>pick(array $data, string $key, string $default): string</code> —
      return <code>$data[$key]</code> if it's set and non-null, otherwise
      <code>$default</code>. This is the <code>??</code> array-lookup idiom;
      no <code>isset()</code> gymnastics needed.</li>
</ol>`,

  starter: `<?php

// Given: an Address always has a city; a User may or may not have an Address.
class Address {
    public function __construct(public string $city) {}
}

class User {
    public function __construct(public ?Address $address = null) {}
}

// 1. Chain ?-> through the maybe-nulls, then ?? the fallback.
//    JS: user?.address?.city ?? "Unknown"
function get_city(?User $user): string {
    throw new Exception("TODO: implement get_city");
}

// 2. $data[$key] ?? $default — missing key OR null value both fall back.
function pick(array $data, string $key, string $default): string {
    throw new Exception("TODO: implement pick");
}
`,

  requirements: [
    { pattern: /\?\?/, message: "Use the null coalescing operator ??" },
    { pattern: /\?->/, message: "Use the nullsafe operator ?-> to chain through the maybe-null objects" },
    { pattern: /\?User|\?Address/, message: "Keep the nullable type declarations (?User / ?Address)" },
  ],

  tests: [
    { name: 'get_city on a user with an address returns the city',
      code: 'expect_eq(get_city(new User(new Address("Paris"))), "Paris");' },
    { name: 'get_city on a user with no address returns "Unknown"',
      code: 'expect_eq(get_city(new User()), "Unknown");' },
    { name: 'get_city(null) returns "Unknown" (no crash — the chain short-circuits)',
      code: 'expect_eq(get_city(null), "Unknown");' },
    { name: 'pick finds an existing key',
      code: 'expect_eq(pick(["name" => "Ada"], "name", "n/a"), "Ada");' },
    { name: 'pick falls back on a missing key',
      code: 'expect_eq(pick(["name" => "Ada"], "email", "n/a"), "n/a");' },
    { name: 'pick falls back when the key exists but holds null',
      code: 'expect_eq(pick(["email" => null], "email", "n/a"), "n/a");' },
  ],

  solution: `<?php

class Address {
    public function __construct(public string $city) {}
}

class User {
    public function __construct(public ?Address $address = null) {}
}

function get_city(?User $user): string {
    return $user?->address?->city ?? "Unknown";
}

function pick(array $data, string $key, string $default): string {
    return $data[$key] ?? $default;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>PHP</th></tr>
  <tr><td>The nothing value(s)</td><td><code>null</code>, <code>undefined</code></td><td><code>null</code> only</td></tr>
  <tr><td>Null coalescing</td><td><code>a ?? b</code></td><td><code>$a ?? $b</code> (also silences missing keys/vars)</td></tr>
  <tr><td>Coalescing assignment</td><td><code>a ??= b</code></td><td><code>$a ??= $b</code></td></tr>
  <tr><td>Optional chaining</td><td><code>obj?.prop?.deep</code></td><td><code>$obj?-&gt;prop?-&gt;deep</code></td></tr>
  <tr><td>Existence check</td><td><code>typeof x !== "undefined"</code></td><td><code>isset($x)</code> — but false for null!</td></tr>
  <tr><td>Nullable type</td><td><code>string | null</code> (TS)</td><td><code>?string</code></td></tr>
</table>
<p>The deep insight: PHP's <code>??</code> is quietly more powerful than
JavaScript's, because it suppresses the "undefined variable/key" warning as
well as handling null — <code>$config["debug"] ?? false</code> is safe even
when the key was never written. The price is the <code>isset()</code> gotcha:
because PHP folds "absent" and "null" into one concept, no built-in check can
tell them apart short of <code>array_key_exists()</code>, the one function
that still sees a key holding null.</p>`,
};
