<title>Lesson 1: Variables & Types</title>
<link rel="stylesheet" href="../../../shared/css/style.css">

<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>PHP variables wear a sigil: every variable is <code>$name</code>, declared
by assignment — no <code>let</code>, no <code>const</code>, no <code>var</code>
at all. There's also no block-scoping drama to relearn: variables are simply
function-scoped, full stop. Like JavaScript, PHP is dynamically typed at
heart, so <code>$x = "Ada"</code> followed by <code>$x = 36</code> is legal —
the type lives in the value, not the variable.</p>
<table>
  <tr><th>JavaScript</th><th>PHP</th></tr>
  <tr><td><code>const name = "Ada";</code></td><td><code>$name = "Ada";</code></td></tr>
  <tr><td><code>let age = 36;</code></td><td><code>$age = 36;</code></td></tr>
  <tr><td><code>number</code> (one type)</td><td><code>int</code> and <code>float</code> (two types)</td></tr>
  <tr><td><code>function f(x) { ... }</code></td><td><code>function f(int $x): string { ... }</code></td></tr>
</table>
<p>Two real differences. First, JavaScript's single <code>number</code> splits
into <code>int</code> and <code>float</code>. Second, PHP 8 lets you put type
declarations on <em>function signatures</em> — parameter types C-style before
the name (<code>int $x</code>), return type after a colon — and they are
enforced at <em>runtime</em>: call the function with the wrong type and PHP
throws a <code>TypeError</code>, like a built-in argument validator you never
have to write by hand. Files begin with <code>&lt;?php</code>, a tag left over
from PHP's roots as an HTML templating language.</p>`,

  javascript: `const name = "Ada";
let age = 36;

// JS: one number type covers both of these.
const price = 9.99;   // PHP would call this a float
const count = 3;      // ...and this an int

function describeUser(name, age) {
  // No enforcement: describeUser(36, "Ada") happily returns nonsense.
  return \`\${name} is \${age} years old\`;
}

function birthday(age) {
  let next = age;
  next += 1;
  return next;
}

console.log(describeUser(name, age));`,

  task: `
<p>Rewrite the JavaScript as PHP:</p>
<ol>
  <li>Write a function <code>describe_user</code> that takes
      <code>string $name</code> and <code>int $age</code> (typed parameters,
      type before the name) and declares a <code>: string</code> return type,
      returning <code>"Ada is 36 years old"</code>-style text. Use double-quote
      interpolation — <code>"$name is $age years old"</code> is the template
      literal you already know, minus the backticks.</li>
  <li>Write a function <code>birthday</code> that takes <code>int $age</code>,
      returns <code>int</code>, and adds 1 using a local variable and
      <code>+=</code>.</li>
</ol>
<p>Keep the <code>&lt;?php</code> tag at the top, and note the convention
change: <code>snake_case</code> function names. The lesson's tests call your
functions directly.</p>`,

  starter: `<?php

// 1. describe_user: string $name and int $age in, string out.
//    JS: \`\${name} is \${age} years old\`  ->  PHP: "$name is $age years old"
function describe_user(string $name, int $age): string {
    throw new Exception("TODO: implement describe_user");
}

// 2. birthday: assign to a local, add 1 with +=, return it.
function birthday(int $age): int {
    throw new Exception("TODO: implement birthday");
}
`,

  requirements: [
    { pattern: /function\s+describe_user\s*\(\s*string\s+\$name\s*,\s*int\s+\$age\s*\)\s*:\s*string/, message: "Define describe_user(string $name, int $age): string with full type declarations" },
    { pattern: /"\$\w+/, message: "Build the string with double-quote interpolation, not concatenation" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'expect_eq(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'expect_eq(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "expect_eq(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "expect_eq(birthday(0), 1);" },
  ],

  solution: `<?php

function describe_user(string $name, int $age): string {
    return "$name is $age years old";
}

function birthday(int $age): int {
    $next = $age;
    $next += 1;
    return $next;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>PHP</th></tr>
  <tr><td>Declare a variable</td><td><code>let x = 1;</code></td><td><code>$x = 1;</code> (assignment is declaration)</td></tr>
  <tr><td>Constant</td><td><code>const x = 1;</code></td><td><code>const X = 1;</code> (class/global scope only — no const locals)</td></tr>
  <tr><td>Scoping</td><td>block scope (<code>let</code>/<code>const</code>), hoisting</td><td>function scope only — no hoisting drama</td></tr>
  <tr><td>Numbers</td><td><code>number</code></td><td><code>int</code> and <code>float</code>, separate</td></tr>
  <tr><td>Typed signature</td><td>(comments/JSDoc only)</td><td><code>function f(int $x): string</code>, enforced at runtime</td></tr>
  <tr><td>Interpolation</td><td><code>\`\${name}!\`</code></td><td><code>"$name!"</code> (double quotes only)</td></tr>
  <tr><td>Naming</td><td><code>camelCase</code></td><td><code>snake_case</code> functions, <code>$variables</code> with a sigil</td></tr>
</table>
<p>Think of PHP's type declarations as the argument-validation code you'd
otherwise write by hand in JavaScript: nothing is checked ahead of time, but
the moment someone calls <code>describe_user(36, "Ada")</code>, PHP throws a
<code>TypeError</code> instead of silently producing nonsense. Static
ahead-of-time checking (TypeScript's role) is filled by opt-in tools like
PHPStan and Psalm in real projects.</p>`,
};
</script>
