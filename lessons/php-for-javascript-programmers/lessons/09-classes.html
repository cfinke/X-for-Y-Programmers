const LESSON = {
  number: 9,
  title: "Classes & Objects",

  intro: `
<p>PHP classes will feel like coming home: <code>class</code>, a constructor,
<code>new</code>, methods — the shape you know from ES2015+. Three renames
cover most of the diff: the constructor is a method literally named
<code>__construct</code> (not <code>constructor</code>), members are reached
with <code>-&gt;</code> instead of <code>.</code>, and inside methods you
write <code>$this-&gt;balance</code> — the <code>$this</code> is mandatory,
there's no bare-property shorthand. The upside of that verbosity:
<strong>no lexical-<code>this</code> puzzles</strong>. PHP methods are just
methods; <code>$this</code> is always the object the method was called on,
and you will never <code>.bind(this)</code> anything, ever.</p>
<table>
  <tr><th>JavaScript</th><th>PHP</th></tr>
  <tr><td><code>constructor(owner) { ... }</code></td><td><code>public function __construct(...) { }</code></td></tr>
  <tr><td><code>acct.deposit(5)</code></td><td><code>$acct-&gt;deposit(5)</code></td></tr>
  <tr><td><code>this.balance</code> (this optional-ish)</td><td><code>$this-&gt;balance</code> (mandatory)</td></tr>
  <tr><td><code>#balance</code> private field</td><td><code>private int $balance</code></td></tr>
  <tr><td><code>this.owner = owner;</code> in constructor</td><td>promoted: <code>__construct(private string $owner)</code></td></tr>
</table>
<p>Where JS gives you <code>#private</code> fields as a late bolt-on, PHP has
real visibility keywords — <code>public</code>, <code>private</code>,
<code>protected</code> — on properties <em>and</em> methods, enforced at
runtime. And PHP 8's <em>constructor property promotion</em> kills the
<code>this.x = x</code> dance entirely: declare the visibility right in the
parameter list, as in <code>public function __construct(private int
$balance = 0)</code>, and PHP declares the property and assigns it in one
stroke. You already used it in lesson 6's starter classes; now you get to
write it.</p>`,

  javascript: `class BankAccount {
  #balance = 0;                    // private field, ES2022

  constructor(owner) {
    this.owner = owner;            // the classic this.x = x dance
  }

  deposit(amount) {
    this.#balance += amount;
  }

  withdraw(amount) {
    if (amount > this.#balance) return false;
    this.#balance -= amount;
    return true;
  }

  balance() {
    return this.#balance;
  }
}

const acct = new BankAccount("Ada");
acct.deposit(100);
console.log(acct.withdraw(250));   // false — insufficient funds`,

  task: `
<p>Port the <code>BankAccount</code> class. The starter already declares the
promoted constructor — <code>private string $owner</code> and
<code>private int $balance = 0</code> in the parameter list, no body needed.
Implement the four methods:</p>
<ol>
  <li><code>owner(): string</code> — return the owner's name. Remember:
      <code>$this-&gt;owner</code>, arrow not dot.</li>
  <li><code>deposit(int $amount): void</code> — add to the balance.
      <code>void</code> is a real return type here, not just a TS
      annotation.</li>
  <li><code>withdraw(int $amount): bool</code> — if the balance is
      insufficient, return <code>false</code> and change nothing; otherwise
      subtract and return <code>true</code>.</li>
  <li><code>balance(): int</code> — return the current balance.</li>
</ol>`,

  starter: `<?php

    // No this.owner = owner; anywhere.

        private string $owner,
        private int $balance = 0,

    public function owner(): string {
        throw new Exception("TODO: implement owner");
    }

    public function deposit(int $amount): void {
        throw new Exception("TODO: implement deposit");
    }

`,

  requirements: [
    { pattern: /__construct\s*\(\s*(private|public)/, message: "Use constructor property promotion (visibility keywords in the __construct parameter list)" },
    { pattern: /private/, message: "Keep the properties private" },
    { pattern: /->/, message: "Access properties with $this-> (arrow, not dot)" },
  ],

  tests: [
    { name: 'a new account knows its owner and starts at 0',
      code: '$acct = new BankAccount("Ada");\nexpect_eq($acct->owner(), "Ada");\nexpect_eq($acct->balance(), 0);' },
    { name: "deposits accumulate: 100 + 50 = 150",
      code: '$acct = new BankAccount("Ada");\n$acct->deposit(100);\n$acct->deposit(50);\nexpect_eq($acct->balance(), 150);' },
    { name: "a covered withdrawal returns true and subtracts",
      code: '$acct = new BankAccount("Ada");\n$acct->deposit(100);\nexpect_true($acct->withdraw(40));\nexpect_eq($acct->balance(), 60);' },
    { name: "an overdraft returns false and leaves the balance unchanged",
      code: '$acct = new BankAccount("Ada");\n$acct->deposit(50);\nexpect_true(!$acct->withdraw(100));\nexpect_eq($acct->balance(), 50);' },
    { name: "withdrawing the exact balance works and leaves 0",
      code: '$acct = new BankAccount("Ada");\n$acct->deposit(75);\nexpect_true($acct->withdraw(75));\nexpect_eq($acct->balance(), 0);' },
  ],

  solution: `<?php

class BankAccount {
    public function __construct(
        private string $owner,
        private int $balance = 0,
    ) {}

    public function owner(): string {
        return $this->owner;
    }

    public function deposit(int $amount): void {
        $this->balance += $amount;
    }

    public function withdraw(int $amount): bool {
        if ($amount > $this->balance) {
            return false;
        }
        $this->balance -= $amount;
        return true;
    }

    public function balance(): int {
        return $this->balance;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>PHP</th></tr>
  <tr><td>Constructor</td><td><code>constructor()</code></td><td><code>public function __construct()</code></td></tr>
  <tr><td>Member access</td><td><code>obj.prop</code></td><td><code>$obj-&gt;prop</code></td></tr>
  <tr><td>Self reference</td><td><code>this</code> (lexically slippery)</td><td><code>$this</code> (mandatory, always the receiver)</td></tr>
  <tr><td>Privacy</td><td><code>#field</code></td><td><code>private</code> / <code>protected</code> / <code>public</code></td></tr>
  <tr><td>Init a property</td><td><code>this.x = x;</code></td><td>promotion: <code>__construct(private int $x)</code></td></tr>
  <tr><td>No return value</td><td>(nothing)</td><td><code>: void</code>, enforced</td></tr>
  <tr><td>Method as callback</td><td><code>obj.method.bind(obj)</code></td><td><code>$obj-&gt;method(...)</code> — no binding needed</td></tr>
</table>
<p>The deep insight: JavaScript's classes are sugar over prototypes and
free-floating functions, which is why <code>this</code> can escape and why
you learned to fear detached method references. PHP's classes are the
primary object model — a method carries its object, visibility is enforced
by the engine at runtime (reading a <code>private</code> property from
outside throws an <code>Error</code>, not a convention violation), and
promoted constructor properties make the boilerplate-free data class the
default, not a pattern you build.</p>`,
};
