  intro: `
<p>Most of what you know about C# strings carries over: they are
immutable, zero-indexed, and every method returns a new string rather than
mutating in place. The names differ, though — Python spells interpolation with
an <em>f-string</em>, and slicing replaces <code>Substring</code>
with the compact <code>s[a:b]</code> syntax.</p>
<table>
  <tr><th>C#</th><th>Python</th></tr>
  <tr><td><code>$"Hi {name}"</code></td><td><code>f"Hi {name}"</code></td></tr>
  <tr><td><code>s.ToUpper()</code></td><td><code>s.upper()</code></td></tr>
  <tr><td><code>s.Trim()</code></td><td><code>s.strip()</code></td></tr>
  <tr><td><code>s.Replace("a", "b")</code></td><td><code>s.replace("a", "b")</code></td></tr>
  <tr><td><code>s.Split(',')</code></td><td><code>s.split(",")</code></td></tr>
  <tr><td><code>string.Join("-", arr)</code></td><td><code>"-".join(arr)</code></td></tr>
  <tr><td><code>s.Substring(0, 3)</code></td><td><code>s[0:3]</code></td></tr>
  <tr><td><code>int.Parse(s)</code> / <code>n.ToString()</code></td><td><code>int(s)</code> / <code>str(n)</code></td></tr>
</table>
<p>Two things to unlearn. First, <code>str.replace</code> already replaces
<em>every</em> occurrence — there is no separate overload needed, unlike
juggling <code>Replace</code> with a <code>StringComparison</code>.
Second, <code>join</code> is a method on the <em>separator</em> string, not on
the list: you write <code>", ".join(parts)</code>, and every element must
already be a string. And <code>find</code> returns <code>-1</code> when the
substring is absent, exactly like <code>IndexOf</code>.</p>`,

var slug = "  Hello World  ".Trim().ToLower().Replace(" ", "-");`,

</ol>`,

  solution: `def shout(text):
    return text.strip().upper()


def slugify(title):
    return title.strip().lower().replace(" ", "-")


def initials(full_name):
    parts = full_name.split(" ")
    return ".".join(p[0].upper() for p in parts)


def label(name, score):
    return f"{name}: {score}"


def parse_total(a, b):
    return str(int(a) + int(b))
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Python</th></tr>
  <tr><td>Interpolation</td><td><code>$"{x}"</code></td><td><code>f"{x}"</code></td></tr>
  <tr><td>Substring</td><td><code>s.Substring(1, 3)</code></td><td><code>s[1:4]</code></td></tr>
  <tr><td>Last char</td><td><code>s[s.Length - 1]</code></td><td><code>s[-1]</code></td></tr>
  <tr><td>Contains</td><td><code>s.Contains("x")</code></td><td><code>"x" in s</code></td></tr>
  <tr><td>Index of</td><td><code>s.IndexOf("x")</code></td><td><code>s.find("x")</code> (-1 if absent)</td></tr>
  <tr><td>Prefix / suffix</td><td><code>s.StartsWith / EndsWith</code></td><td><code>s.startswith / endswith</code></td></tr>
  <tr><td>Repeat</td><td><code>string.Concat(Enumerable.Repeat("ab", 3))</code></td><td><code>"ab" * 3</code></td></tr>
</table>
<p>Slices never raise on out-of-range bounds: <code>s[0:99]</code> just returns
the whole string, and a negative index counts from the end, so <code>s[-3:]</code>
is the last three characters. Because strings are immutable you can happily
chain <code>.strip().lower().replace(...)</code> — each call hands back a fresh
string. If you need case-insensitive membership, lowercase both sides first
(<code>"x" in s.lower()</code>); there is no <code>StringComparison</code> flag
to pass instead.</p>`,
