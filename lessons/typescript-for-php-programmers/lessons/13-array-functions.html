<div id="app"></div>
<script>
const LESSON = {
  number: 13,
  title: "Array Functions",

  intro: `
<p>PHP's array functions work, but every PHP developer has been bitten by
their quirks: <code>array_map($fn, $arr)</code> takes the callback first,
<code>array_filter($arr, $fn)</code> takes it second, <code>usort()</code>
mutates in place and returns a bool, and <code>array_filter()</code>
<em>preserves keys</em>, so you sprinkle <code>array_values()</code> everywhere
to get a clean list back. In TypeScript, these are <em>methods on the array
itself</em>, so the argument order is always the same — and because they chain,
a filter-then-map pipeline reads top to bottom instead of inside out.</p>
<table>
  <tr><th>PHP</th><th>TypeScript</th></tr>
  <tr><td><code>array_map($fn, $arr)</code> (callback first)</td><td><code>arr.map(fn)</code></td></tr>
  <tr><td><code>array_values(array_filter($arr, $fn))</code></td><td><code>arr.filter(fn)</code> — reindexes automatically</td></tr>
  <tr><td><code>array_reduce($arr, $fn, $init)</code></td><td><code>arr.reduce(fn, init)</code></td></tr>
  <tr><td><code>usort($arr, $cmp)</code> (mutates, returns bool)</td><td><code>[...arr].sort(cmp)</code> (sort mutates too — copy first!)</td></tr>
</table>
<p>The callbacks are fully typed: mapping over a <code>Product[]</code> gives
your arrow function a <code>Product</code> parameter with autocomplete on every
property. One trap carries over from PHP: <code>.sort()</code> mutates the
array in place just like <code>usort()</code> does. The idiomatic fix is to
spread into a fresh array first — <code>[...arr].sort(...)</code> — so callers
keep their original untouched.</p>`,

  php: `<?php
$products = [
    ['name' => 'Keyboard', 'price' => 49.00, 'inStock' => true],
    ['name' => 'Monitor',  'price' => 299.00, 'inStock' => false],
    ['name' => 'Mouse',    'price' => 29.00, 'inStock' => true],
];

// Filter, then map — note array_values() to fix the preserved keys,
// and the flipped argument orders between the two calls.
$inStockNames = array_map(
    fn($p) => $p['name'],
    array_values(array_filter($products, fn($p) => $p['inStock']))
);

$total = array_reduce($products, fn($sum, $p) => $sum + $p['price'], 0);

// usort() mutates $products in place and returns a bool.
usort($products, fn($a, $b) => $a['price'] <=> $b['price']);`,

  task: `
<p>Given this interface (already in the starter):</p>
<pre><code>interface Product { name: string; price: number; inStock: boolean; }</code></pre>
<ol>
  <li>Write <code>inStockNames(products: Product[]): string[]</code> that
      returns the names of in-stock products, using <code>.filter()</code>
      chained into <code>.map()</code> — no <code>array_values()</code>
      needed.</li>
  <li>Write <code>totalValue(products: Product[]): number</code> that sums
      all prices with <code>.reduce()</code>, starting from <code>0</code>.</li>
  <li>Write <code>sortByPrice(products: Product[]): Product[]</code> that
      returns a <em>new</em> array sorted by ascending price. Use
      <code>[...products].sort(...)</code> so the caller's array is not
      mutated — the test checks this.</li>
</ol>`,

  starter: `interface Product {
  name: string;
  price: number;
  inStock: boolean;
}

function inStockNames(products: Product[]): string[] {
  // TODO: .filter() the in-stock products, then .map() to their names
  return [];
}

function totalValue(products: Product[]): number {
  // TODO: .reduce() the prices to a single sum, starting at 0
  return 0;
}

function sortByPrice(products: Product[]): Product[] {
  // TODO: copy with [...products], then .sort() with a comparator
  return products;
}
`,

  exportNames: ["inStockNames", "totalValue", "sortByPrice"],

  requirements: [
    { pattern: /\.filter\s*\(/, message: "Use .filter() instead of array_filter()" },
    { pattern: /\.map\s*\(/, message: "Use .map() instead of array_map()" },
    { pattern: /\.reduce\s*\(/, message: "Use .reduce() instead of array_reduce()" },
    { pattern: /\[\s*\.\.\.\s*products\s*\]\s*\.sort\s*\(/, message: "Sort a copy: [...products].sort(...) — .sort() mutates like usort()" },
  ],

  tests: [
    { name: "inStockNames returns only in-stock names, reindexed", run: (x) => expectDeepEqual(
        x.inStockNames([
          { name: "Keyboard", price: 49, inStock: true },
          { name: "Monitor", price: 299, inStock: false },
          { name: "Mouse", price: 29, inStock: true },
        ]),
        ["Keyboard", "Mouse"]) },
    { name: "inStockNames of an empty list is []", run: (x) => expectDeepEqual(x.inStockNames([]), []) },
    { name: "totalValue sums the prices", run: (x) => expectEqual(
        x.totalValue([
          { name: "Keyboard", price: 49, inStock: true },
          { name: "Monitor", price: 299, inStock: false },
          { name: "Mouse", price: 29, inStock: true },
        ]),
        377) },
    { name: "totalValue of an empty list is 0", run: (x) => expectEqual(x.totalValue([]), 0) },
    { name: "sortByPrice orders by ascending price", run: (x) => expectDeepEqual(
        x.sortByPrice([
          { name: "Monitor", price: 299, inStock: false },
          { name: "Mouse", price: 29, inStock: true },
          { name: "Keyboard", price: 49, inStock: true },
        ]).map((p) => p.name),
        ["Mouse", "Keyboard", "Monitor"]) },
    { name: "sortByPrice does not mutate the original array", run: (x) => {
        const original = [
          { name: "Monitor", price: 299, inStock: false },
          { name: "Mouse", price: 29, inStock: true },
        ];
        x.sortByPrice(original);
        expectDeepEqual(original.map((p) => p.name), ["Monitor", "Mouse"]);
      } },
  ],

  solution: `interface Product {
  name: string;
  price: number;
  inStock: boolean;
}

function inStockNames(products: Product[]): string[] {
  return products.filter((p) => p.inStock).map((p) => p.name);
}

function totalValue(products: Product[]): number {
  return products.reduce((sum, p) => sum + p.price, 0);
}

function sortByPrice(products: Product[]): Product[] {
  return [...products].sort((a, b) => a.price - b.price);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>TypeScript</th></tr>
  <tr><td>Transform each item</td><td><code>array_map($fn, $arr)</code></td><td><code>arr.map(fn)</code></td></tr>
  <tr><td>Keep some items</td><td><code>array_values(array_filter($arr, $fn))</code></td><td><code>arr.filter(fn)</code> (reindexes for you)</td></tr>
  <tr><td>Fold to one value</td><td><code>array_reduce($arr, $fn, $init)</code></td><td><code>arr.reduce(fn, init)</code></td></tr>
  <tr><td>Sort with comparator</td><td><code>usort($arr, $cmp)</code> — mutates</td><td><code>[...arr].sort(cmp)</code> — copy first, or it mutates too</td></tr>
  <tr><td>Spaceship comparator</td><td><code>$a['price'] &lt;=&gt; $b['price']</code></td><td><code>a.price - b.price</code> (return &lt;0, 0, or &gt;0)</td></tr>
  <tr><td>Membership / search</td><td><code>in_array()</code>, <code>array_search()</code></td><td><code>arr.includes()</code>, <code>arr.find()</code>, <code>arr.findIndex()</code></td></tr>
</table>
<p>Because these are methods, pipelines chain naturally:
<code>products.filter(...).map(...).reduce(...)</code> reads in execution
order, where the PHP equivalent nests inside out. And since each step is
typed, a filter over <code>Product[]</code> yields <code>Product[]</code>, the
map to <code>p.name</code> yields <code>string[]</code>, and a typo like
<code>p.pricce</code> is a compile error rather than a null creeping through
your totals.</p>`,
};
</script>
