<title>Lesson 3: Arrays</title>
<link rel="stylesheet" href="../../../shared/css/style.css">
</head>
<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 3,
  title: "Arrays",

  intro: `
<p>PHP's array is famously two data structures in a trench coat: an ordered map
that plays both list (<code>[1, 2, 3]</code>) and dictionary
(<code>['a' => 1]</code>), holding any mix of types. TypeScript splits those
jobs apart. This lesson covers the list half: a real array type, written
<code>number[]</code> or <code>string[]</code>, where the annotation promises
every element is the same type. Push a string into a <code>number[]</code> and
the compiler stops you — the bug PHP would let you discover in production.</p>
<table>
  <tr><th>PHP</th><th>TypeScript</th></tr>
  <tr><td><code>$scores = [90, 85, 77];</code></td><td><code>const scores: number[] = [90, 85, 77];</code></td></tr>
  <tr><td><code>$scores[] = 100;</code></td><td><code>scores.push(100);</code></td></tr>
  <tr><td><code>count($scores)</code></td><td><code>scores.length</code></td></tr>
  <tr><td><code>in_array(90, $scores)</code></td><td><code>scores.includes(90)</code></td></tr>
</table>
<p>As with strings, the global functions become methods on the array itself:
<code>count()</code> is the <code>.length</code> property, <code>in_array()</code>
is <code>.includes()</code>, and the append shorthand <code>$arr[] = $x</code>
becomes <code>arr.push(x)</code>. Note that <code>const</code> on an array only
locks the <em>binding</em>, not the contents — you can still
<code>.push()</code> onto a <code>const</code> array, just not reassign it.</p>`,

  php: `<?php
$langs = ["PHP", "TypeScript", "JavaScript"];

// Nothing stops a mixed array in PHP:
$langs[] = 42; // an int sneaks into a list of strings

function appendScore(array $scores, int $score): array {
    $scores[] = $score;
    return $scores;
}

function countScores(array $scores): int {
    return count($scores);
}

function hasLang(array $langs, string $lang): bool {
    return in_array($lang, $langs, true);
}

print_r(appendScore([90, 85], 77));`,

  task: `
<p>Rewrite the PHP as TypeScript, with homogeneous typed arrays:</p>
<ol>
  <li>Declare a constant <code>langs</code> with an explicit
      <code>string[]</code> annotation, holding
      <code>"PHP"</code>, <code>"TypeScript"</code>, <code>"JavaScript"</code>
      in that order.</li>
  <li>Write <code>appendScore(scores: number[], score: number): number[]</code>
      that appends the score with <code>.push()</code> (PHP's
      <code>$scores[] = $score</code>) and returns the array.</li>
  <li>Write <code>countScores(scores: number[]): number</code> that returns how
      many scores there are — <code>count()</code> becomes
      <code>.length</code>.</li>
  <li>Write <code>hasLang(langs: string[], lang: string): boolean</code> that
      returns whether the language is present — <code>in_array()</code> becomes
      <code>.includes()</code>.</li>
</ol>`,

  starter: `// 1. Annotate langs as string[] — the compiler will then reject langs.push(42).
const langs = ["PHP", "TypeScript", "JavaScript"];

// 2. $scores[] = $score  becomes  scores.push(score)
function appendScore(scores: number[], score: number): number[] {
  // TODO: push the score, then return the array
  return scores;
}

// 3. count($scores) becomes a property, not a function call.
function countScores(scores: number[]): number {
  // TODO: return the length
  return 0;
}

// 4. in_array($lang, $langs) becomes a method on the array.
function hasLang(langs: string[], lang: string): boolean {
  // TODO: use .includes()
  return false;
}
`,

  exportNames: ["langs", "appendScore", "countScores", "hasLang"],

  requirements: [
    { pattern: /langs\s*:\s*string\s*\[\s*\]/, message: "Annotate langs with an explicit string[] type" },
    { pattern: /scores\s*:\s*number\s*\[\s*\]/, message: "Annotate the scores parameter as number[]" },
    { pattern: /\.\s*push\s*\(/, message: "Append with .push() (TypeScript's $arr[] = $x)" },
    { pattern: /\.\s*includes\s*\(/, message: "Check membership with .includes() (TypeScript's in_array)" },
  ],

  tests: [
    { name: 'langs is ["PHP", "TypeScript", "JavaScript"]', run: (x) => expectDeepEqual(x.langs, ["PHP", "TypeScript", "JavaScript"]) },
    { name: "appendScore([90, 85], 77) returns [90, 85, 77]", run: (x) => expectDeepEqual(x.appendScore([90, 85], 77), [90, 85, 77]) },
    { name: "appendScore([], 100) returns [100]", run: (x) => expectDeepEqual(x.appendScore([], 100), [100]) },
    { name: "countScores([10, 20, 30]) is 3", run: (x) => expectEqual(x.countScores([10, 20, 30]), 3) },
    { name: "countScores([]) is 0", run: (x) => expectEqual(x.countScores([]), 0) },
    { name: 'hasLang(["PHP", "Go"], "PHP") is true and hasLang(["PHP", "Go"], "Rust") is false', run: (x) => { expectEqual(x.hasLang(["PHP", "Go"], "PHP"), true); expectEqual(x.hasLang(["PHP", "Go"], "Rust"), false); } },
  ],

  solution: `const langs: string[] = ["PHP", "TypeScript", "JavaScript"];

function appendScore(scores: number[], score: number): number[] {
  scores.push(score);
  return scores;
}

function countScores(scores: number[]): number {
  return scores.length;
}

function hasLang(langs: string[], lang: string): boolean {
  return langs.includes(lang);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>TypeScript</th></tr>
  <tr><td>List literal</td><td><code>$a = [1, 2, 3];</code></td><td><code>const a: number[] = [1, 2, 3];</code></td></tr>
  <tr><td>Append</td><td><code>$a[] = 4;</code> / <code>array_push($a, 4)</code></td><td><code>a.push(4);</code></td></tr>
  <tr><td>Size</td><td><code>count($a)</code></td><td><code>a.length</code></td></tr>
  <tr><td>Membership</td><td><code>in_array($x, $a, true)</code></td><td><code>a.includes(x)</code> (always strict)</td></tr>
  <tr><td>Index access</td><td><code>$a[0]</code></td><td><code>a[0]</code></td></tr>
  <tr><td>Remove last / first</td><td><code>array_pop($a)</code> / <code>array_shift($a)</code></td><td><code>a.pop()</code> / <code>a.shift()</code></td></tr>
  <tr><td>Mixed types allowed?</td><td>Yes, always</td><td>Only if you ask: <code>(number | string)[]</code></td></tr>
</table>
<p>The deeper shift: a PHP array is really an <em>ordered map</em>, so lists and
dictionaries blur together. TypeScript arrays are purely positional lists with
numeric indexes — the <code>['key' => $value]</code> half of PHP arrays maps to
objects and <code>Record</code> types, which is exactly what the next lesson
covers.</p>`,
};
</script>
