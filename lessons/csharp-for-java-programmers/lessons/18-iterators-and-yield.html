  title: "Iterators & yield",

  intro: `
<p>Java has no <code>yield</code>-based generator syntax built into the language;
producing a lazy sequence normally means hand-writing an <code>Iterator&lt;T&gt;</code>
(or <code>Iterable&lt;T&gt;</code>) with your own <code>hasNext()</code>/<code>next()</code>
state machine, or reaching for a library like RxJava. C# solves the same problem far
more directly: a method whose return type is <code>IEnumerable&lt;T&gt;</code> becomes
an <em>iterator</em> the moment it contains a <code>yield return</code>, and the
compiler builds the state machine for you — no manual <code>hasNext</code> bookkeeping
required. <code>foreach</code> is C#'s enhanced <code>for</code> loop.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>Iterator&lt;Integer&gt; g()</code> (hand-written)</td><td><code>IEnumerable&lt;int&gt; G()</code> (with <code>yield return</code>)</td></tr>
  <tr><td><code>return x;</code> from <code>next()</code></td><td><code>yield return x;</code></td></tr>
  <tr><td>make <code>hasNext()</code> return <code>false</code></td><td><code>yield break;</code></td></tr>
  <tr><td><code>for (int x : seq)</code></td><td><code>foreach (var x in seq)</code></td></tr>
  <tr><td><code>iterator()</code> on <code>Iterable&lt;T&gt;</code></td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>Two things to internalize. First, iterators are <em>lazy</em>: the body does not
run until something enumerates it, and it runs only as far as the consumer asks —
so an infinite <code>Fibonacci()</code> is fine as long as a caller uses
<code>Take(…)</code> to stop pulling. Second, there is no special keyword marking the
method; the compiler rewrites any method containing <code>yield</code> into a state
machine automatically. To make a whole <em>class</em> iterable, implement
<code>IEnumerable&lt;T&gt;</code> and give it a <code>GetEnumerator()</code> — which
can itself be an iterator built from <code>yield return</code>.</p>`,

  java: `class Sequences {
  static Iterable<Integer> range(int start, int count) {
    return () -> new Iterator<Integer>() {
      int i = 0;
      public boolean hasNext() { return i < count; }
      public Integer next() { return start + i++; }
    };
  }

  static <T> Iterable<T> take(Iterable<T> source, int n) {
    return () -> new Iterator<T>() {
      final Iterator<T> it = source.iterator();
      int i = 0;
      public boolean hasNext() { return i < n && it.hasNext(); }
      public T next() { i++; return it.next(); }
    };
  }

  static Iterable<Long> fibonacci() {
    return () -> new Iterator<Long>() {
      long a = 0, b = 1;
      public boolean hasNext() { return true; }
      public Long next() { long r = a; long next = a + b; a = b; b = next; return r; }
    };
  }
}

class Countdown implements Iterable<Integer> {
  private final int start;
  Countdown(int start) { this.start = start; }
  public Iterator<Integer> iterator() {
    return new Iterator<Integer>() {
      int current = start;
      public boolean hasNext() { return current >= 1; }
      public Integer next() { return current--; }
    };
  }
}`,

    { pattern: /yield\s+return/, message: "Produce values with yield return" },
    { pattern: /yield\s+break/, message: "Stop Take early with yield break" },
    { pattern: /class\s+Countdown\s*:\s*IEnumerable<int>/, message: "Countdown must implement IEnumerable<int>" },

  tests: [
    { name: "Range(1, 3) yields 1,2,3", code: "      expect_true(Sequences.Range(1, 3).SequenceEqual(new[] { 1, 2, 3 }));" },
    { name: "Range(0, 4) sums to 6", code: "      expect_eq(Sequences.Range(0, 4).Sum(), 6);" },
    { name: "Take stops at n", code: "      expect_true(Sequences.Take(new[] { 10, 20, 30, 40 }, 2).SequenceEqual(new[] { 10, 20 }));" },
    { name: "Take past the end yields all", code: "      expect_eq(Sequences.Take(new[] { 5, 6 }, 9).Count(), 2);" },
    { name: "Fibonacci is lazy and infinite", code: "      expect_true(Sequences.Take(Sequences.Fibonacci(), 7).SequenceEqual(new long[] { 0, 1, 1, 2, 3, 5, 8 }));" },
    { name: "Countdown(3) enumerates 3,2,1", code: "      expect_true(new Countdown(3).SequenceEqual(new[] { 3, 2, 1 }));" },

  solution: `static class Sequences {
  public static IEnumerable<int> Range(int start, int count) {
    for (int i = 0; i < count; i++) {
      yield return start + i;
    }
  }

  public static IEnumerable<T> Take<T>(IEnumerable<T> source, int n) {
    int i = 0;
    foreach (T item in source) {
      if (i >= n) {
        yield break;
      }
      yield return item;
      i++;
    }
  }

  public static IEnumerable<long> Fibonacci() {
    long a = 0, b = 1;
    while (true) {
      yield return a;
      long next = a + b;
      a = b;
      b = next;
    }
  }
}

class Countdown : IEnumerable<int> {
  private int start;

  public Countdown(int start) {
    this.start = start;
  }

  public IEnumerator<int> GetEnumerator() {
    for (int i = start; i >= 1; i--) {
      yield return i;
    }
  }

  IEnumerator IEnumerable.GetEnumerator() {
    return GetEnumerator();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Generator method</td><td>hand-written <code>Iterator&lt;T&gt;</code> (<code>hasNext</code>/<code>next</code>)</td><td>method returning <code>IEnumerable&lt;T&gt;</code> with <code>yield</code></td></tr>
  <tr><td>Emit a value</td><td><code>return x;</code> from <code>next()</code></td><td><code>yield return x;</code></td></tr>
  <tr><td>Stop early</td><td><code>hasNext()</code> returns <code>false</code></td><td><code>yield break;</code></td></tr>
  <tr><td>Consume</td><td><code>for (T x : seq)</code></td><td><code>foreach</code> / LINQ</td></tr>
  <tr><td>Iterable class</td><td><code>iterator()</code> on <code>Iterable&lt;T&gt;</code></td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>An iterator method's body does not execute when you call it — it runs on demand
as the consumer pulls values. That laziness is why an infinite <code>Fibonacci()</code>
never hangs: <code>Take(Fibonacci(), 7)</code> pulls exactly seven values and then
stops asking. It is also why any exception or expensive setup inside the method is
deferred until the first <code>MoveNext</code>.</p>
<p>Because iterator methods return <code>IEnumerable&lt;T&gt;</code>, the entire LINQ
surface (<code>Where</code>, <code>Select</code>, <code>Sum</code>, <code>First</code>,
<code>SequenceEqual</code>, …) composes over them for free — the same way Java's
<code>Stream</code> methods chain once you wrap an <code>Iterable</code> in
<code>StreamSupport.stream(...)</code>. Implementing <code>IEnumerable&lt;T&gt;</code>
on a class requires two <code>GetEnumerator</code> methods: the generic one you
actually write, plus a non-generic <code>IEnumerator IEnumerable.GetEnumerator()</code>
(explicit interface implementation) that just delegates to it — a legacy requirement
from the pre-generics <code>System.Collections</code> interface. It's the price C#
pays once for the same anonymous-inner-class boilerplate Java's hand-rolled
<code>Iterator</code> pays every time you write one.</p>`,
