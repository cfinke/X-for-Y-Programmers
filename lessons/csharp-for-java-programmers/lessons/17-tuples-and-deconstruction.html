  intro: `
<p>Java has no built-in tuple type — to return two values without declaring a
whole class you typically fall back to an array like <code>int[]</code>, a
small helper class, or (since Java 16) a compact <code>record</code> such as
<code>record Pair(int min, int max) {}</code>. C# has a direct equivalent
built right into the language: the <strong>value tuple</strong>. It is
written with parentheses — <code>(int, string)</code> — and it is a
lightweight <code>struct</code>, so it copies by value and compares by
value.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>int[]</code> or <code>record Pair(int a, int b)</code></td><td><code>(int, string)</code></td></tr>
  <tr><td><code>record Pair(int count, String name)</code> (named, but needs a declaration)</td><td><code>(int Count, string Name)</code> (named, no declaration needed)</td></tr>
  <tr><td>no built-in destructuring of plain values</td><td><code>var (a, b) = pair;</code></td></tr>
  <tr><td><code>return new int[] { n, s };</code> or <code>return new Pair(n, s);</code></td><td><code>return (n, s);</code></td></tr>
  <tr><td><code>arr[0]</code>, <code>arr[1]</code> / <code>pair.a()</code>, <code>pair.b()</code></td><td><code>t.Item1</code>, <code>t.Item2</code> (or names)</td></tr>
</table>
<p>Unlike a Java array or record, a C# tuple's elements can carry <em>names</em>
(<code>(int Count, string Name)</code>) without you having to declare a type
first, so you read <code>result.Count</code> instead of counting index
positions or writing a whole record just for one return value. And the names
are just labels — two tuples with the same element types are the same type
regardless of the names, and <code>==</code>/<code>Equals</code> compare
element by element.</p>
<p>To pull a tuple apart you <strong>deconstruct</strong> it:
<code>var (a, b) = GetPair();</code>. Any type can opt into this by defining a
<code>Deconstruct</code> method with <code>out</code> parameters, and then it
too works with the <code>var (…)</code> syntax — a bit like Java 21's record
pattern <code>if (obj instanceof Point(int x, int y))</code>, except C#'s
version works directly on assignment rather than only inside a pattern
match.</p>`,

  java: `static int[] minMax(int[] nums) {
  int lo = nums[0], hi = nums[0];
  for (int n : nums) {
    lo = Math.min(lo, n);
    hi = Math.max(hi, n);
  }
  return new int[] { lo, hi };
}

int[] result = minMax(new int[] {4, 1, 9, 2});
int low = result[0], high = result[1];

record Point(int x, int y) {}
Point p = new Point(3, 4);

// Java 21 record pattern -- the closest thing to deconstruction:
if (p instanceof Point(int x, int y)) {
  // x and y are now local variables
}`,

  solution: `static class Stats {
  public static (int Min, int Max) MinMax(int[] nums) {
    int lo = nums[0], hi = nums[0];
    foreach (var n in nums) {
      if (n < lo) lo = n;
      if (n > hi) hi = n;
    }
    return (lo, hi);
  }

  public static (int Quotient, int Remainder) Divide(int a, int b) {
    return (a / b, a % b);
  }

  public static int Range(int[] nums) {
    var (min, max) = MinMax(nums);
    return max - min;
  }
}

class Point {
  public int X { get; }
  public int Y { get; }

  public Point(int x, int y) {
    X = x;
    Y = y;
  }

  public void Deconstruct(out int x, out int y) {
    x = X;
    y = Y;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Tuple type</td><td><code>int[]</code> or <code>record Pair(int a, int b)</code></td><td><code>(int, string)</code></td></tr>
  <tr><td>Named elements</td><td><code>record Pair(int count, String name)</code> (must declare the type)</td><td><code>(int Count, string Name)</code></td></tr>
  <tr><td>Construct</td><td><code>new int[]{1, 2}</code> or <code>new Pair(1, "a")</code></td><td><code>(1, "a")</code></td></tr>
  <tr><td>Access</td><td><code>arr[0]</code> or <code>pair.count()</code></td><td><code>t.Item1</code> or <code>t.Count</code></td></tr>
  <tr><td>Deconstruct</td><td>no equivalent for arrays; record patterns (Java 21) can match a record's components</td><td><code>var (a, b) = t;</code></td></tr>
  <tr><td>Object destructure</td><td><code>if (p instanceof Point(int x, int y)) { … }</code> (Java 21 record pattern)</td><td><code>var (x, y) = p;</code> via <code>Deconstruct</code></td></tr>
</table>
<p>A value tuple is a <code>struct</code> (<code>System.ValueTuple</code>), so it
copies on assignment and <code>==</code>/<code>Equals</code> compare element by
element — handy in tests. The element names are compile-time sugar only:
<code>(int Min, int Max)</code> and <code>(int, int)</code> are the same runtime
type, which is why <code>MinMax(...) == (3, 8)</code> works against a nameless
literal.</p>
<p>You can also mix deconstruction into <code>foreach</code>
(<code>foreach (var (k, v) in dict)</code>) and discard pieces you don't need with
<code>_</code>: <code>var (_, max) = MinMax(nums);</code>. Any type — not just
tuples — becomes deconstructible the moment it exposes a <code>Deconstruct</code>
method with <code>out</code> parameters, and you can even provide several
overloads for different arities.</p>`,
