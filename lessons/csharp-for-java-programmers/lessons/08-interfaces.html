  intro: `
<p>You already think in interfaces — Java's <code>interface</code> is a
contract that a class must explicitly opt into with <code>implements</code>.
C#'s <code>interface</code> is the same idea, right down to the nominal
typing: a class only implements an interface if it says so explicitly with
<code>: IName</code>. Having the right members is not enough; the class must
declare the contract, exactly as in Java.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>interface Shape { double area(); }</code></td><td><code>interface IShape { double Area(); }</code></td></tr>
  <tr><td><code>class Box implements Shape {}</code></td><td><code>class Box : IShape {}</code></td></tr>
  <tr><td>nominal (must declare <code>implements Shape</code>)</td><td>nominal (must declare <code>: IShape</code>)</td></tr>
  <tr><td><code>String getName();</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td><code>class C implements A, B</code></td><td><code>class C : A, B</code></td></tr>
</table>
<p>Three conventions to absorb. First, C# interface names start with a capital
<code>I</code> (<code>IShape</code>, <code>IComparable</code>) — Java has no
such naming convention. Second, interface members are implicitly
<code>public</code> — you write no access modifier in the interface, but the
implementing class must mark them <code>public</code> (Java requires this
too). Third, in C# 7.3 an interface has <em>no</em> method bodies at all
(default interface methods arrived later, similar to Java's <code>default</code>
methods), so every member is a pure signature the class must fill in.</p>`,

  java: `interface Shape {
  String getName();
  double area();
}

interface Named {
  String describe();
}

class Circle implements Shape, Named {
  private final String name;
  private final double r;

  Circle(String name, double r) {
    this.name = name;
    this.r = r;
  }

  public String getName() { return name; }
  public double area() { return Math.PI * r * r; }
  public String describe() { return name + ": " + area(); }
}

static double totalArea(List<Shape> shapes) {
  double sum = 0;
  for (Shape s : shapes) {
    sum += s.area();
  }
  return sum;
}`,

  solution: `interface IShape {
  string Name { get; }
  double Area();
}

interface IDescribable {
  string Describe();
}

class Rectangle : IShape, IDescribable {
  public string Name { get; private set; }
  private double width;
  private double height;

  public Rectangle(string name, double width, double height) {
    Name = name;
    this.width = width;
    this.height = height;
  }

  public double Area() {
    return width * height;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

class Square : IShape, IDescribable {
  public string Name { get; private set; }
  private double side;

  public Square(string name, double side) {
    Name = name;
    this.side = side;
  }

  public double Area() {
    return side * side;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

static class Shapes {
  public static double TotalArea(IShape[] shapes) {
    double sum = 0;
    foreach (IShape s in shapes) {
      sum += s.Area();
    }
    return sum;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Declare</td><td><code>interface Shape {}</code></td><td><code>interface IShape {}</code></td></tr>
  <tr><td>Implement</td><td><code>class Box implements Shape</code></td><td><code>class Box : IShape</code></td></tr>
  <tr><td>Conformance</td><td>nominal (explicit)</td><td>nominal (explicit)</td></tr>
  <tr><td>Read-only property</td><td><code>String getName();</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td>Multiple</td><td><code>implements A, B</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Member bodies</td><td>none, unless <code>default</code></td><td>none (in C# 7.3)</td></tr>
</table>
<p>Just like Java, C# conformance is nominal — adding a method that happens to
match an interface does <em>not</em> make a class implement it — you must list
the interface after the colon. That colon does double duty for base classes:
a class can extend at most one class but implement any number of interfaces,
and if it does both the base class comes first
(<code>class C : BaseClass, IShape</code>), which mirrors Java's rule that
<code>extends</code> comes before <code>implements</code> in a class
declaration.</p>
<p>The payoff is the <code>IShape[]</code> parameter in <code>TotalArea</code>:
callers pass concrete <code>Rectangle</code> and <code>Square</code> objects, but
the method only sees the contract. This is C#'s everyday tool for decoupling and is
exactly what powers built-in interfaces like <code>IEnumerable&lt;T&gt;</code>,
<code>IComparable&lt;T&gt;</code>, and <code>IEquatable&lt;T&gt;</code> — the
counterparts to Java's <code>Iterable&lt;T&gt;</code>, <code>Comparable&lt;T&gt;</code>,
and <code>equals()</code>.</p>`,
