  title: "Equality & Comparable",

  intro: `
<p>You already know this pattern from Java: <code>==</code> on two objects is
always reference identity, <code>equals()</code> is the method you override for
value equality, and <code>hashCode()</code> must stay in sync with it or
<code>HashMap</code>/<code>HashSet</code> break. C# has the exact same shape,
just spelled with capitals and with one extra: it lets you overload
<code>==</code> itself so it calls your equality logic directly.</p>
<table>
  <tr><th>Java</th><th>C#</th></tr>
  <tr><td><code>a == b</code> (reference only)</td><td><code>a == b</code> (you can define it)</td></tr>
  <tr><td><code>a.equals(b)</code> (override <code>Object.equals</code>)</td><td><code>a.Equals(b)</code> via <code>IEquatable&lt;T&gt;</code></td></tr>
  <tr><td><code>hashCode()</code> override</td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td><code>Comparable&lt;T&gt;.compareTo</code>, <code>Collections.sort(list)</code></td><td><code>list.Sort()</code> via <code>IComparable&lt;T&gt;</code></td></tr>
</table>
<p>The one firm rule — familiar from Java's own <code>equals</code>/<code>hashCode</code>
contract: <strong>if you override <code>Equals</code>, you must also
override <code>GetHashCode</code></strong>, and equal objects must return equal
hash codes — otherwise <code>Dictionary</code> and <code>HashSet</code> will lose
your keys. Implement <code>IEquatable&lt;T&gt;</code> for a strongly-typed,
allocation-free <code>Equals(T)</code> (Java's <code>equals(Object)</code> always
takes the untyped form; C# lets you add a typed overload alongside it), and
<code>IComparable&lt;T&gt;</code> so sorting and <code>SortedSet</code> know the
order, the same role <code>Comparable&lt;T&gt;</code> plays in Java. Overloading
<code>==</code> is a nicety layered on top of <code>Equals</code> that Java has
no equivalent for.</p>`,

  java: `class SemVer implements Comparable<SemVer> {
  final int major, minor, patch;

  SemVer(int major, int minor, int patch) {
    this.major = major;
    this.minor = minor;
    this.patch = patch;
  }

  @Override
  public boolean equals(Object o) {
    if (!(o instanceof SemVer)) return false;
    SemVer other = (SemVer) o;
    return major == other.major && minor == other.minor && patch == other.patch;
  }

  @Override
  public int hashCode() {
    return Objects.hash(major, minor, patch);
  }

  @Override
  public int compareTo(SemVer o) {
    if (major != o.major) return major - o.major;
    if (minor != o.minor) return minor - o.minor;
    return patch - o.patch;
  }
}

List<SemVer> versions = new ArrayList<>(List.of(new SemVer(1, 2, 0), new SemVer(1, 0, 5)));
Collections.sort(versions); // works because SemVer implements Comparable<SemVer>`,

  solution: `class SemVer : IEquatable<SemVer>, IComparable<SemVer> {
  public int Major { get; }
  public int Minor { get; }
  public int Patch { get; }

  public SemVer(int major, int minor, int patch) {
    Major = major;
    Minor = minor;
    Patch = patch;
  }

  public bool Equals(SemVer other) {
    if (ReferenceEquals(other, null)) return false;
    return Major == other.Major && Minor == other.Minor && Patch == other.Patch;
  }

  public override bool Equals(object obj) {
    return Equals(obj as SemVer);
  }

  public override int GetHashCode() {
    unchecked {
      int hash = 17;
      hash = hash * 31 + Major;
      hash = hash * 31 + Minor;
      hash = hash * 31 + Patch;
      return hash;
    }
  }

  public int CompareTo(SemVer other) {
    if (ReferenceEquals(other, null)) return 1;
    int c = Major.CompareTo(other.Major);
    if (c != 0) return c;
    c = Minor.CompareTo(other.Minor);
    if (c != 0) return c;
    return Patch.CompareTo(other.Patch);
  }

  public static bool operator ==(SemVer a, SemVer b) {
    if (ReferenceEquals(a, b)) return true;
    if (ReferenceEquals(a, null) || ReferenceEquals(b, null)) return false;
    return a.Equals(b);
  }

  public static bool operator !=(SemVer a, SemVer b) {
    return !(a == b);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C#</th></tr>
  <tr><td>Value equality</td><td>override <code>equals(Object)</code></td><td><code>IEquatable&lt;T&gt;</code> + <code>Equals</code> overrides</td></tr>
  <tr><td>Hashing a key</td><td>override <code>hashCode()</code></td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td>Ordering</td><td><code>Comparable&lt;T&gt;.compareTo</code></td><td><code>IComparable&lt;T&gt;.CompareTo</code></td></tr>
  <tr><td>Operator</td><td>can't overload <code>==</code></td><td><code>operator ==</code> / <code>!=</code></td></tr>
</table>
<p>The <code>Equals</code>/<code>GetHashCode</code> pair is the part people
forget — except you won't forget it, because it's the identical rule Java
enforces for <code>equals()</code>/<code>hashCode()</code>. Hash-based
collections first bucket by hash code, then confirm with <code>Equals</code> —
so two objects that are <code>Equals</code> but hash differently will land in
different buckets and never be found. Keeping the hash in sync with the fields
you compare is what makes <code>HashSet</code> and <code>Dictionary</code> keys
work, exactly as it does for <code>HashMap</code> in Java.</p>
<p><code>CompareTo</code> returns a sign, not a boolean, just like Java's
<code>compareTo</code>: negative means "I sort before <code>other</code>", zero
means "equal order", positive means "after". Delegating to each field's own
<code>CompareTo</code> (<code>Major.CompareTo(…)</code>) gives you correct
results for free. Once <code>IComparable&lt;T&gt;</code> is in place,
<code>List&lt;T&gt;.Sort()</code>, <code>Array.Sort</code>, and
<code>SortedSet&lt;T&gt;</code> all use it with no comparator argument — the
same convenience Java gets from implementing <code>Comparable&lt;T&gt;</code>
and calling <code>Collections.sort(list)</code> with no explicit
<code>Comparator</code>. On modern .NET you'd usually let a <code>record</code>
generate all of this, but records don't exist in C# 7.3 — writing it by hand
shows exactly what they generate.</p>`,
