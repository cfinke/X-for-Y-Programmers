const LESSON = {
  number: 18,
  title: "Generators & Iterables",

  intro: `
<p>Good news: PHP has real generators, and they behave like the
<code>function*</code> generators you know — lazy, resumable, consumed once.
The syntax is even lighter: there's no <code>*</code> marker. Any function
containing <code>yield</code> <em>is</em> a generator, and by convention you
declare it as returning <code>Generator</code>. Values are produced on demand:
nothing runs until something iterates, and <code>foreach</code> is that
something — it drives generators exactly like <code>for…of</code>.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>function* evens(): Generator&lt;number&gt;</code></td><td><code>function evens(): Generator</code> (yield makes it one)</td></tr>
  <tr><td><code>yield i;</code></td><td><code>yield $i;</code></td></tr>
  <tr><td><code>for (const x of gen())</code></td><td><code>foreach (gen() as $x)</code></td></tr>
  <tr><td><code>[...gen()]</code></td><td><code>iterator_to_array(gen())</code></td></tr>
  <tr><td><code>Iterable&lt;T&gt;</code> parameter</td><td><code>iterable</code> parameter (arrays <em>and</em> generators)</td></tr>
</table>
<p>To materialize a generator into an array, spread doesn't work — use
<code>iterator_to_array()</code>. Since generators yield keys
<code>0, 1, 2…</code> by default, the result compares cleanly with a plain
list via <code>===</code>. And when you write a function that should accept
either an array or a generator, type the parameter <code>iterable</code> —
PHP's <code>Iterable&lt;T&gt;</code>, satisfied by both.</p>`,

  typescript: `function* evensUpTo(max: number): Generator<number> {
  for (let i = 2; i <= max; i += 2) {
    yield i;
  }
}

function* squares(nums: number[]): Generator<number> {
  for (const n of nums) yield n * n;
}

function take<T>(items: Iterable<T>, n: number): T[] {
  const out: T[] = [];
  for (const item of items) {
    if (out.length >= n) break;
    out.push(item);
  }
  return out;
}

console.log([...evensUpTo(8)]); // [2, 4, 6, 8]
console.log(take(evensUpTo(1_000_000), 3)); // lazy: [2, 4, 6]`,

  task: `
<p>Port all three, remembering there's no <code>*</code> — <code>yield</code>
alone does the job:</p>
<ol>
  <li>Write <code>evens_up_to(int $max): Generator</code> yielding the even
      numbers from 2 up to <code>$max</code> inclusive (a <code>for</code>
      loop stepping by 2).</li>
  <li>Write <code>squares(array $nums): Generator</code> yielding the square
      of each element, via <code>foreach</code>.</li>
  <li>Write <code>take(iterable $items, int $n): array</code> collecting at
      most <code>$n</code> items into an array with a counter (or
      <code>count()</code>) and <code>break</code> — note the
      <code>iterable</code> type, so the tests can hand it both arrays and
      generators.</li>
</ol>`,

  starter: `<?php

//    No function* in PHP: the yield keyword alone makes this a generator.

    throw new Exception("TODO: implement evens_up_to");
}

    throw new Exception("TODO: implement squares");
}

// 3. take: iterable accepts arrays AND generators. Collect at most $n
//    items, then break — the generator never runs past what you take.
function take(iterable $items, int $n): array {
    throw new Exception("TODO: implement take");
}
`,

  requirements: [
    { pattern: /yield/, message: "Produce values with yield" },
    { pattern: /:\s*Generator/, message: "Declare the generator functions as returning Generator" },
    { pattern: /iterable/, message: "Type take's first parameter as iterable" },
  ],

  tests: [
    { name: "iterator_to_array(evens_up_to(8)) is [2, 4, 6, 8]",
      code: "expect_eq(iterator_to_array(evens_up_to(8)), [2, 4, 6, 8]);" },
    { name: "evens_up_to(1) yields nothing",
      code: "expect_eq(iterator_to_array(evens_up_to(1)), []);" },
    { name: "evens_up_to returns a Generator, lazily",
      code: "expect_true(evens_up_to(10) instanceof Generator);" },
    { name: "iterator_to_array(squares([1, 2, 3])) is [1, 4, 9]",
      code: "expect_eq(iterator_to_array(squares([1, 2, 3])), [1, 4, 9]);" },
    { name: "take(evens_up_to(1000000), 3) is [2, 4, 6] without exhausting the generator",
      code: "expect_eq(take(evens_up_to(1000000), 3), [2, 4, 6]);" },
    { name: "take works on plain arrays too, and stops at the end",
      code: 'expect_eq(take(["a", "b", "c"], 2), ["a", "b"]);\nexpect_eq(take([1], 5), [1]);' },
  ],

  solution: `<?php

function evens_up_to(int $max): Generator {
    for ($i = 2; $i <= $max; $i += 2) {
        yield $i;
    }
}

function squares(array $nums): Generator {
    foreach ($nums as $n) {
        yield $n * $n;
    }
}

function take(iterable $items, int $n): array {
    $out = [];
    foreach ($items as $item) {
        if (count($out) >= $n) {
            break;
        }
        $out[] = $item;
    }
    return $out;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Declare a generator</td><td><code>function* f()</code></td><td><code>function f(): Generator</code> — yield inside</td></tr>
  <tr><td>Produce a value</td><td><code>yield x;</code></td><td><code>yield $x;</code></td></tr>
  <tr><td>Consume</td><td><code>for (const x of g)</code></td><td><code>foreach ($g as $x)</code></td></tr>
  <tr><td>Materialize</td><td><code>[...g]</code></td><td><code>iterator_to_array($g)</code></td></tr>
  <tr><td>Delegate</td><td><code>yield* other()</code></td><td><code>yield from other();</code></td></tr>
  <tr><td>Accept array or generator</td><td><code>Iterable&lt;T&gt;</code></td><td><code>iterable</code></td></tr>
</table>
<p>One habit to carry over intact: generators are single-use. Iterating a
<code>Generator</code> a second time throws — call the function again for a
fresh one. And one PHP-specific footnote: <code>iterator_to_array()</code>
preserves keys by default. Plain <code>yield</code> produces keys
<code>0, 1, 2…</code> so lists come out clean, but a generator that yields
<code>key =&gt; value</code> pairs (yes, that exists) can overwrite entries —
pass <code>false</code> as the second argument when you only want the
values.</p>`,
};
