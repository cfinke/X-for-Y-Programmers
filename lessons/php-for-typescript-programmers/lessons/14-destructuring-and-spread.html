<script>
const LESSON = {
  number: 14,
  title: "List Assignment & Spread",

  intro: `
<p>Destructuring and spread both exist in PHP and look almost identical to the
TypeScript versions — square brackets on the left of an <code>=</code> unpack
an array, and <code>...</code> spreads one. <code>const [a, b] = pair</code>
becomes <code>[$a, $b] = $pair;</code> (PHP calls it <em>list assignment</em>),
and because PHP arrays are also maps, the same syntax destructures by key:
<code>['name' =&gt; $name] = $user;</code> is your
<code>const { name } = user</code>.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>const [a, b] = pair;</code></td><td><code>[$a, $b] = $pair;</code></td></tr>
  <tr><td><code>const { name } = user;</code></td><td><code>['name' =&gt; $name] = $user;</code></td></tr>
  <tr><td><code>[x, y] = [y, x];</code></td><td><code>[$a, $b] = [$b, $a];</code> — swap, no temp</td></tr>
  <tr><td><code>function sum(...nums: number[])</code></td><td><code>function sum(int ...$nums)</code></td></tr>
  <tr><td><code>f(...args)</code></td><td><code>f(...$args)</code></td></tr>
  <tr><td><code>{ ...defaults, ...overrides }</code></td><td><code>[...$defaults, ...$overrides]</code> (string keys OK since 8.1)</td></tr>
</table>
<p>Spread works in both directions, just like JS: <code>int ...$nums</code> in
a signature gathers arguments into an array (rest), and <code>f(...$args)</code>
at a call site scatters them back out. In array literals,
<code>[...$a, ...$b]</code> merges — and since PHP 8.1 it handles
<em>string</em> keys too, with later spreads overwriting earlier ones. That
makes it the modern successor to <code>array_merge()</code> and a perfect
match for the TS "defaults then overrides" object-spread idiom.</p>`,

  typescript: `function swap(pair: [number, number]): [number, number] {
  const [a, b] = pair;
  return [b, a];
}

function sum(...nums: number[]): number {
  return nums.reduce((t, n) => t + n, 0);
}

type Settings = Record<string, unknown>;

function mergeSettings(defaults: Settings, overrides: Settings): Settings {
  return { ...defaults, ...overrides }; // later keys win
}

mergeSettings({ theme: "light", lang: "en" }, { theme: "dark" });
// { theme: "dark", lang: "en" }`,

  task: `
<p>Port all three, using the syntax rather than index fiddling:</p>
<ol>
  <li><code>swap(array $pair): array</code> — unpack with list assignment
      (<code>[$a, $b] = $pair;</code>), return <code>[$b, $a]</code>. No
      <code>$pair[0]</code> allowed by the requirements.</li>
  <li><code>sum(int ...$nums): int</code> — a variadic. Inside the body,
      <code>$nums</code> is a plain array; total it however you like
      (<code>array_sum</code> is fine). <code>sum()</code> with no arguments
      must return <code>0</code>.</li>
  <li><code>merge_settings(array $defaults, array $overrides): array</code> —
      one expression: <code>[...$defaults, ...$overrides]</code>. String keys
      spread fine in PHP 8.1+, and later spreads overwrite earlier ones, so
      overrides win exactly like object spread.</li>
</ol>`,

  starter: `<?php

// [$a, $b] = $pair;  — destructuring, PHP-style ("list assignment").
function swap(array $pair): array {
    throw new Exception("TODO: unpack with [\\$a, \\$b] = ..., return them swapped");
}

// int ...$nums gathers any number of int arguments into an array.
function sum(int ...$nums): int {
    throw new Exception("TODO: total the variadic args");
}

// [...$a, ...$b] merges arrays; later spreads win on duplicate keys.
function merge_settings(array $defaults, array $overrides): array {
    throw new Exception("TODO: spread both into one literal");
}
`,

  requirements: [
    { pattern: /\[\s*\$\w+\s*,\s*\$\w+\s*\]\s*=/, message: "Use list assignment: [$a, $b] = ..." },
    { pattern: /\.\.\.\$/, message: "Use ... — a variadic parameter or a spread of a variable" },
    { pattern: /\[\s*\.\.\./, message: "Spread inside an array literal: [...$defaults, ...$overrides]" },
  ],

  tests: [
    { name: "swap([1, 2]) returns [2, 1]",
      code: "expect_eq(swap([1, 2]), [2, 1]);" },
    { name: "swap(['left', 'right']) returns ['right', 'left']",
      code: "expect_eq(swap(['left', 'right']), ['right', 'left']);" },
    { name: "sum(1, 2, 3) returns 6",
      code: "expect_eq(sum(1, 2, 3), 6);" },
    { name: "sum() returns 0, and spread at a call site works: sum(...[4, 5]) is 9",
      code: "expect_eq(sum(), 0);\nexpect_eq(sum(...[4, 5]), 9);" },
    { name: "merge_settings: overrides win, untouched defaults survive",
      code: "expect_eq(\n    merge_settings(['theme' => 'light', 'lang' => 'en'], ['theme' => 'dark']),\n    ['theme' => 'dark', 'lang' => 'en']\n);" },
    { name: "merge_settings([], ['debug' => true]) returns ['debug' => true]",
      code: "expect_eq(merge_settings([], ['debug' => true]), ['debug' => true]);" },
  ],

  solution: `<?php

function swap(array $pair): array {
    [$a, $b] = $pair;
    return [$b, $a];
}

function sum(int ...$nums): int {
    return array_sum($nums);
}

function merge_settings(array $defaults, array $overrides): array {
    return [...$defaults, ...$overrides];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Positional unpack</td><td><code>const [a, b] = pair;</code></td><td><code>[$a, $b] = $pair;</code></td></tr>
  <tr><td>Keyed unpack</td><td><code>const { name } = user;</code></td><td><code>['name' =&gt; $name] = $user;</code></td></tr>
  <tr><td>Skip an element</td><td><code>const [, b] = pair;</code></td><td><code>[, $b] = $pair;</code></td></tr>
  <tr><td>Swap</td><td><code>[x, y] = [y, x];</code></td><td><code>[$a, $b] = [$b, $a];</code></td></tr>
  <tr><td>Rest parameter</td><td><code>(...nums: number[])</code></td><td><code>(int ...$nums)</code></td></tr>
  <tr><td>Spread a call</td><td><code>f(...args)</code></td><td><code>f(...$args)</code></td></tr>
  <tr><td>Merge maps</td><td><code>{ ...a, ...b }</code></td><td><code>[...$a, ...$b]</code> (8.1+) or <code>array_merge($a, $b)</code></td></tr>
  <tr><td>Rest in destructuring</td><td><code>const [a, ...rest] = xs;</code></td><td>not supported — use <code>array_slice</code></td></tr>
</table>
<p>Two gaps to remember: there's no <code>...rest</code> on the <em>left</em> of
a list assignment, and no default values in the pattern
(<code>const [a = 1] = xs</code> has no PHP equivalent — reach for
<code>??</code> instead). Also note what foreach can do:
<code>foreach ($pairs as [$x, $y])</code> destructures each element in the
loop header, a trick that keeps data-heavy loops tidy.</p>`,
};
