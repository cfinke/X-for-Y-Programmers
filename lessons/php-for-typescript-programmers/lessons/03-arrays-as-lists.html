<div id="app"></div>
<script>
const LESSON = {
  number: 3,
  title: "Arrays as Lists",

  intro: `
<p>Where TypeScript gives you <code>number[]</code>, <code>Map</code>,
<code>Set</code>, and object literals, PHP has one workhorse:
<code>array</code>. It plays both the list role (this lesson) and the
dictionary role (next lesson). The literal syntax is what you'd guess —
<code>$scores = [10, 20, 30];</code> — and the type declaration is just
<code>array</code>, with no element type (that's a job for PHPStan/Psalm
docblocks in real projects).</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>const a: number[] = [1, 2];</code></td><td><code>$a = [1, 2];</code></td></tr>
  <tr><td><code>a.push(x)</code></td><td><code>$a[] = $x;</code></td></tr>
  <tr><td><code>a.length</code></td><td><code>count($a)</code></td></tr>
  <tr><td><code>a.includes(x)</code></td><td><code>in_array($x, $a, true)</code></td></tr>
  <tr><td><code>sum via reduce</code></td><td><code>array_sum($a)</code></td></tr>
  <tr><td><code>const b = a;</code> (b aliases a)</td><td><code>$b = $a;</code> (<strong>b is a copy</strong>)</td></tr>
</table>
<p>The last row is the big one. In TypeScript, arrays are references:
assign or pass one, and both names point at the same object — mutate through
either and both see it. PHP arrays are <strong>value types</strong>:
assignment and argument passing hand over a (copy-on-write, so cheap)
<em>copy</em>. Appending to a parameter inside a function leaves the caller's
array untouched. This is the exact opposite of the JS mental model, and it
means "modify and return" is the idiomatic move where TS code would mutate
in place. Idiom notes: push is the funny-looking <code>$a[] = $x;</code>
(assign to an empty index), length is the free function <code>count()</code>,
and always pass <code>true</code> as <code>in_array</code>'s third argument
to get <code>===</code> comparison instead of loose <code>==</code>.</p>`,

  typescript: `function makeScores(): number[] {
  return [10, 20, 30];
}

function append(arr: number[], x: number): number[] {
  arr.push(x);   // mutates the CALLER's array too — shared reference!
  return arr;
}

function total(nums: number[]): number {
  return nums.reduce((sum, n) => sum + n, 0);
}

const scores = makeScores();
append(scores, 40);
console.log(scores.length, total(scores)); // 4 100`,

  task: `
<p>Rebuild the score helpers in PHP — and notice how value semantics change
the story:</p>
<ol>
  <li><code>make_scores(): array</code> — return the list
      <code>[10, 20, 30]</code>.</li>
  <li><code>append(array $arr, int $x): array</code> — push <code>$x</code>
      with <code>$arr[] = $x;</code> and return <code>$arr</code>. Because
      <code>$arr</code> is a <em>copy</em>, this returns a new, longer array
      while the caller's original is untouched — the tests verify exactly
      that.</li>
  <li><code>total(array $nums): int</code> — no reduce boilerplate:
      <code>array_sum($nums)</code> is built in.</li>
</ol>`,

  starter: `<?php

// 1. Return the list [10, 20, 30]. Plain [] literals, like TS.
function make_scores(): array {
    throw new Exception("TODO: implement make_scores");
}

// 2. Push with $arr[] = $x; then return $arr.
//    $arr is a COPY of the caller's array — the original stays untouched.
function append(array $arr, int $x): array {
    throw new Exception("TODO: implement append");
}

// 3. TS: nums.reduce((s, n) => s + n, 0)  ->  PHP: array_sum($nums)
function total(array $nums): int {
    throw new Exception("TODO: implement total");
}
`,

  requirements: [
    { pattern: /\[\]\s*=/, message: "Push with $arr[] = $x (assign to an empty index)" },
    { pattern: /count\(|array_sum\(/, message: "Use count() or array_sum() — .length and .reduce don't exist" },
    { pattern: /:\s*array/, message: "Declare : array return types on your functions" },
  ],

  tests: [
    { name: "make_scores() returns [10, 20, 30]",
      code: "expect_eq(make_scores(), [10, 20, 30]);" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "expect_eq(append([1, 2], 3), [1, 2, 3]);" },
    { name: "append leaves the caller's array unchanged (value semantics!)",
      code: "$a = [1, 2];\n$b = append($a, 3);\nexpect_eq($b, [1, 2, 3]);\nexpect_eq($a, [1, 2]);" },
    { name: "append([], 7) returns [7]",
      code: "expect_eq(append([], 7), [7]);" },
    { name: "total([10, 20, 30]) returns 60",
      code: "expect_eq(total([10, 20, 30]), 60);" },
    { name: "total([]) returns 0",
      code: "expect_eq(total([]), 0);" },
  ],

  solution: `<?php

function make_scores(): array {
    return [10, 20, 30];
}

function append(array $arr, int $x): array {
    $arr[] = $x;
    return $arr;
}

function total(array $nums): int {
    return array_sum($nums);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>List literal</td><td><code>[1, 2, 3]</code></td><td><code>[1, 2, 3]</code> (same)</td></tr>
  <tr><td>Push</td><td><code>a.push(x)</code></td><td><code>$a[] = $x;</code></td></tr>
  <tr><td>Length</td><td><code>a.length</code></td><td><code>count($a)</code></td></tr>
  <tr><td>Membership</td><td><code>a.includes(x)</code></td><td><code>in_array($x, $a, true)</code> — the <code>true</code> means <code>===</code></td></tr>
  <tr><td>Sum</td><td><code>a.reduce((s, n) =&gt; s + n, 0)</code></td><td><code>array_sum($a)</code></td></tr>
  <tr><td>Assignment / passing</td><td>shares a reference</td><td><strong>copies</strong> (copy-on-write)</td></tr>
</table>
<p>Value semantics are the deepest mindset shift in this course. In TS,
passing an array to a function creates aliasing — spooky action at a
distance that you defend against with <code>[...arr]</code> spreads and
<code>readonly</code> types. In PHP, every assignment and call boundary is an
implicit defensive copy, made cheap by copy-on-write (the engine only
physically duplicates when one side actually mutates). The upside: functions
can't stomp on your data by accident. The habit to build: PHP functions that
"modify" an array take a copy, change it, and <em>return</em> it — as
<code>append</code> just did. (Objects, we'll see later, behave like JS —
handles, shared.)</p>`,
};
