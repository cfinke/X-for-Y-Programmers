<title>Lesson 6: Null, ?? & ?-></title>

<div id="app"></div>
<script>
const LESSON = {
  number: 6,
  title: "Null, ?? & ?->",

  intro: `
<p>TypeScript makes you juggle <em>two</em> bottom values — <code>null</code>
and <code>undefined</code> — and half the ecosystem's style debates are about
which one to use. PHP has exactly one: <code>null</code>. A variable that was
never assigned, a missing array key, a nullable property — they all read as
<code>null</code>. Nullable types are spelled with a leading question mark:
<code>?User</code> is TypeScript's <code>User | null</code>.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>null</code> / <code>undefined</code></td><td><code>null</code> (just the one)</td></tr>
  <tr><td><code>User | null</code></td><td><code>?User</code></td></tr>
  <tr><td><code>a ?? b</code></td><td><code>$a ?? $b</code> (identical!)</td></tr>
  <tr><td><code>a ??= b</code></td><td><code>$a ??= $b</code> (also identical)</td></tr>
  <tr><td><code>user?.address?.city</code></td><td><code>$user?-&gt;address?-&gt;city</code></td></tr>
  <tr><td><code>"k" in obj</code></td><td><code>array_key_exists("k", $arr)</code></td></tr>
</table>
<p>The good news: <code>??</code> carries over <em>verbatim</em>, and the
optional-chaining operator you know as <code>?.</code> is spelled
<code>?-&gt;</code> because PHP's property arrow is <code>-&gt;</code>. One
gotcha to file away: <code>isset($arr['k'])</code> returns <code>false</code>
when the key exists but holds <code>null</code> — use
<code>array_key_exists</code> when you genuinely need to distinguish
"key missing" from "key set to null". <code>??</code> has isset semantics,
which is usually what you want: missing and null both fall through to the
default, with no notice or warning.</p>`,

  typescript: `interface Address { city: string; }
interface User { address: Address | null; }

function getCity(user: User | null): string {
  // ?. short-circuits to undefined, ?? supplies the default
  return user?.address?.city ?? "Unknown";
}

function pick(data: Record<string, string | null>,
              key: string, fallback: string): string {
  return data[key] ?? fallback;
}

getCity(null);                            // "Unknown"
getCity({ address: { city: "Paris" } }); // "Paris"`,

  task: `
<p>The starter defines <code>Address</code> and <code>User</code> classes for
you (peek at their promoted constructors — Lesson 9 covers those). Port the
two functions:</p>
<ol>
  <li><code>get_city(?User $user): string</code> — walk
      <code>$user?-&gt;address?-&gt;city</code> with the nullsafe operator and
      fall back to <code>"Unknown"</code> with <code>??</code>. If any link in
      the chain is null, the whole chain evaluates to null, exactly like
      <code>?.</code> in TS.</li>
  <li><code>pick(array $data, string $key, string $default): string</code> —
      return <code>$data[$key]</code>, or <code>$default</code> when the key is
      missing <em>or</em> its value is null. One <code>??</code> does both jobs
      (no "possibly undefined index" error — <code>??</code> suppresses it).</li>
</ol>`,

  starter: `<?php

class Address {
    public function __construct(public string $city) {}
}

class User {
    public function __construct(public ?Address $address = null) {}
}

// 1. get_city: TS user?.address?.city ?? "Unknown"
//    PHP spells ?. as ?-> (the property arrow is ->).
function get_city(?User $user): string {
    throw new Exception("TODO: implement get_city");
}

// 2. pick: one ?? covers both a missing key and a null value.
function pick(array $data, string $key, string $default): string {
    throw new Exception("TODO: implement pick");
}
`,

  requirements: [
    { pattern: /\?\?/, message: "Use the null coalescing operator ??" },
    { pattern: /\?->/, message: "Use the nullsafe operator ?-> to chain through nullable objects" },
    { pattern: /\?User|\?Address/, message: "Keep the nullable type declarations (?User / ?Address)" },
  ],

  tests: [
    { name: 'get_city(null) returns "Unknown"',
      code: 'expect_eq(get_city(null), "Unknown");' },
    { name: 'get_city(new User()) — user exists, address is null',
      code: 'expect_eq(get_city(new User()), "Unknown");' },
    { name: 'get_city(new User(new Address("Paris"))) returns "Paris"',
      code: 'expect_eq(get_city(new User(new Address("Paris"))), "Paris");' },
    { name: 'pick finds an existing key',
      code: 'expect_eq(pick(["role" => "admin"], "role", "guest"), "admin");' },
    { name: 'pick falls back when the key is missing',
      code: 'expect_eq(pick([], "role", "guest"), "guest");' },
    { name: 'pick falls back when the value is null (isset semantics)',
      code: 'expect_eq(pick(["role" => null], "role", "guest"), "guest");' },
  ],

  solution: `<?php

class Address {
    public function __construct(public string $city) {}
}

class User {
    public function __construct(public ?Address $address = null) {}
}

function get_city(?User $user): string {
    return $user?->address?->city ?? "Unknown";
}

function pick(array $data, string $key, string $default): string {
    return $data[$key] ?? $default;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Bottom values</td><td><code>null</code> and <code>undefined</code></td><td><code>null</code> only</td></tr>
  <tr><td>Nullable type</td><td><code>User | null</code></td><td><code>?User</code></td></tr>
  <tr><td>Coalesce</td><td><code>a ?? b</code></td><td><code>$a ?? $b</code></td></tr>
  <tr><td>Coalesce-assign</td><td><code>a ??= b</code></td><td><code>$a ??= $b</code></td></tr>
  <tr><td>Optional chain</td><td><code>user?.address?.city</code></td><td><code>$user?-&gt;address?-&gt;city</code></td></tr>
  <tr><td>"Is it set (and not null)?"</td><td><code>obj.k != null</code></td><td><code>isset($arr['k'])</code></td></tr>
  <tr><td>"Does the key exist at all?"</td><td><code>"k" in obj</code></td><td><code>array_key_exists('k', $arr)</code></td></tr>
</table>
<p>The <code>isset</code> vs <code>array_key_exists</code> split is the one
that bites: <code>isset(["k" =&gt; null]["k"])</code> is <code>false</code>,
because isset answers "set <em>and not null</em>". Since <code>??</code> is
built on isset semantics, <code>$data[$key] ?? $default</code> treats a null
value and a missing key the same way — usually a feature, occasionally a bug,
always worth knowing which one you're relying on.</p>`,
};
