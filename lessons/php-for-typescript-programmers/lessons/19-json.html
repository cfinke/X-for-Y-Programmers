const LESSON = {
  number: 19,
  title: "Working with JSON",

  intro: `
<p>JSON was born in JavaScript, so TS gets <code>JSON.stringify</code> and
<code>JSON.parse</code> for free. PHP's equivalents are
<code>json_encode()</code> and <code>json_decode()</code> — and encoding is
delightfully boring, because PHP's associative array maps straight onto a JSON
object and a list array onto a JSON array. Decoding hides the classic
newcomer trap: by default, <code>json_decode($json)</code> gives you
<code>stdClass</code> <em>objects</em> (<code>$data-&gt;name</code>). Pass
<code>true</code> as the second argument and you get associative arrays
(<code>$data['name']</code>) — which is what the rest of the array-centric
standard library expects. Make <code>json_decode($json, true)</code> muscle
memory.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>JSON.stringify(data)</code></td><td><code>json_encode($data)</code></td></tr>
  <tr><td><code>JSON.parse(json)</code></td><td><code>json_decode($json, true)</code> — don't forget the <code>true</code></td></tr>
  <tr><td>bad JSON throws <code>SyntaxError</code></td><td>returns <code>null</code>… unless <code>JSON_THROW_ON_ERROR</code></td></tr>
  <tr><td><code>d.name ?? "unknown"</code></td><td><code>$d['name'] ?? "unknown"</code></td></tr>
</table>
<p>Error handling also differs by default: where <code>JSON.parse</code>
throws on garbage, <code>json_decode</code> quietly returns <code>null</code>.
For real error handling, pass the <code>JSON_THROW_ON_ERROR</code> flag —
<code>json_decode($json, true, 512, JSON_THROW_ON_ERROR)</code> — and it
throws a <code>JsonException</code> you can catch like any other. For missing
keys after a successful parse, <code>??</code> is the same defaulting idiom
you use in TS.</p>`,

  typescript: `function toJson(data: object): string {
  return JSON.stringify(data);
}

interface User { name: string; age: number; }

function parseUser(json: string): User {
  const d = JSON.parse(json); // throws SyntaxError on bad JSON
  return {
    name: d.name ?? "unknown",
    age: d.age ?? 0,
  };
}

function pluckNames(json: string): string[] {
  const users: { name: string }[] = JSON.parse(json);
  return users.map((u) => u.name);
}`,

  task: `
<p>Port the three JSON helpers, decoding to associative arrays throughout:</p>
<ol>
  <li>Write <code>to_json(array $data): string</code> — a one-liner around
      <code>json_encode</code>.</li>
  <li>Write <code>parse_user(string $json): array</code> that decodes with
      <code>json_decode($json, true)</code> and returns
      <code>['name' =&gt; ..., 'age' =&gt; ...]</code>, defaulting missing
      keys to <code>"unknown"</code> and <code>0</code> with
      <code>??</code>.</li>
  <li>Write <code>pluck_names(string $json): array</code> that decodes a JSON
      array of user objects and returns just the names, via
      <code>array_map</code> over the decoded list.</li>
</ol>`,

  starter: `<?php

// 1. to_json: JSON.stringify -> json_encode. That's the whole function.
function to_json(array $data): string {
    throw new Exception("TODO: implement to_json");
}

// 2. parse_user: json_decode($json, true) — the true means assoc arrays,
//    not stdClass objects. Default missing keys with ??.
function parse_user(string $json): array {
    throw new Exception("TODO: implement parse_user");
}

// 3. pluck_names: decode a JSON list, then array_map out the names.
function pluck_names(string $json): array {
    throw new Exception("TODO: implement pluck_names");
}
`,

  requirements: [
    { pattern: /json_encode/, message: "Encode with json_encode" },
    { pattern: /json_decode\s*\(\s*\$\w+\s*,\s*true\s*\)/, message: "Decode with json_decode($json, true) to get associative arrays" },
    { pattern: /\?\?/, message: "Default the missing keys with ??" },
  ],

  tests: [
    { name: 'to_json(["a" => 1]) returns {"a":1}',
      code: `expect_eq(to_json(["a" => 1]), '{"a":1}');` },
    { name: "to_json([1, 2, 3]) encodes a list as a JSON array",
      code: `expect_eq(to_json([1, 2, 3]), '[1,2,3]');` },
    { name: "parse_user with both keys present",
      code: `expect_eq(parse_user('{"name":"Ada","age":36}'), ["name" => "Ada", "age" => 36]);` },
    { name: "parse_user('{}') falls back to unknown / 0",
      code: `expect_eq(parse_user('{}'), ["name" => "unknown", "age" => 0]);` },
    { name: "parse_user with only a name defaults age to 0",
      code: `expect_eq(parse_user('{"name":"Grace"}'), ["name" => "Grace", "age" => 0]);` },
    { name: "pluck_names extracts every name",
      code: `expect_eq(pluck_names('[{"name":"Ada"},{"name":"Grace"}]'), ["Ada", "Grace"]);` },
  ],

  solution: `<?php

function to_json(array $data): string {
    return json_encode($data);
}

function parse_user(string $json): array {
    $d = json_decode($json, true);
    return [
        "name" => $d["name"] ?? "unknown",
        "age" => $d["age"] ?? 0,
    ];
}

function pluck_names(string $json): array {
    $users = json_decode($json, true);
    return array_map(fn(array $u): string => $u["name"], $users);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Encode</td><td><code>JSON.stringify(data)</code></td><td><code>json_encode($data)</code></td></tr>
  <tr><td>Decode to data</td><td><code>JSON.parse(json)</code></td><td><code>json_decode($json, true)</code></td></tr>
  <tr><td>Decode (default)</td><td>—</td><td><code>json_decode($json)</code> → <code>stdClass</code> objects</td></tr>
  <tr><td>Bad input</td><td>throws <code>SyntaxError</code></td><td>returns <code>null</code>; add <code>JSON_THROW_ON_ERROR</code> to throw</td></tr>
  <tr><td>Pretty print</td><td><code>JSON.stringify(d, null, 2)</code></td><td><code>json_encode($d, JSON_PRETTY_PRINT)</code></td></tr>
  <tr><td>Missing key default</td><td><code>d.name ?? "unknown"</code></td><td><code>$d['name'] ?? "unknown"</code></td></tr>
</table>
<p>One encoding subtlety worth knowing: <code>json_encode</code> decides
between a JSON array and a JSON object by looking at the keys. A list-shaped
array (<code>[1, 2, 3]</code>) becomes <code>[1,2,3]</code>, but the same
array run through <code>array_filter</code> — which leaves key gaps — becomes
<code>{"0":1,"2":3}</code>. If an API suddenly receives an object where it
expected an array, reach for Lesson 13's <code>array_values()</code> before
encoding.</p>`,
};
