<script>
const LESSON = {
  number: 10,
  title: "Interfaces, Inheritance & Abstracts",

  intro: `
<p>PHP's OO toolkit is the classical one: <code>interface</code> +
<code>implements</code>, <code>abstract class</code> + <code>extends</code>,
<code>parent::__construct()</code> for <code>super(...)</code>. The syntax
maps one-to-one onto TypeScript's — but the <em>typing model</em> doesn't.
TypeScript is structural: any object with the right shape satisfies an
interface, and <code>implements</code> is optional documentation. PHP is
<strong>nominal</strong>: a class satisfies an interface only by literally
declaring <code>implements TheInterface</code>. There is no duck typing at
the type level — the declaration <em>is</em> the relationship.</p>
<table>
  <tr><th>TypeScript</th><th>PHP</th></tr>
  <tr><td><code>interface HasArea { area(): number }</code></td><td><code>interface HasArea { public function area(): float; }</code></td></tr>
  <tr><td><code>implements</code> (optional, structural)</td><td><code>implements</code> (required, nominal — the only way in)</td></tr>
  <tr><td><code>abstract class Shape</code></td><td><code>abstract class Shape</code> (same keyword)</td></tr>
  <tr><td><code>class Circle extends Shape</code></td><td><code>class Circle extends Shape</code> (same)</td></tr>
  <tr><td><code>super(name)</code></td><td><code>parent::__construct($name)</code></td></tr>
  <tr><td><code>x instanceof Shape</code></td><td><code>$x instanceof Shape</code> (same)</td></tr>
</table>
<p>Abstract classes work exactly as you expect: they can't be instantiated,
<code>abstract</code> methods declare a signature that subclasses must
implement, and concrete methods can call those abstract hooks through
<code>$this</code> — the classic <em>template method</em> pattern. Overriding
is implicit (no <code>override</code> keyword required, though PHP 8.3 added
an optional <code>#[\\Override]</code> attribute), and a subclass constructor
that needs the parent's setup must call <code>parent::__construct(...)</code>
explicitly — PHP won't do it for you.</p>`,

  typescript: `interface HasArea {
  area(): number;
}

abstract class Shape implements HasArea {
  constructor(protected name: string) {}

  abstract area(): number;   // subclasses must supply this

  // Template method: concrete code calling the abstract hook
  describe(): string {
    return this.name + " has area " + this.area();
  }
}

class Circle extends Shape {
  constructor(private radius: number) { super("circle"); }
  area(): number { return Math.PI * this.radius ** 2; }
}`,

  task: `
<p>Build the shape hierarchy. The starter gives you the class skeletons and
constructors (note the <code>parent::__construct(...)</code> calls — PHP's
<code>super()</code>):</p>
<ol>
  <li>In <code>abstract class Shape</code>, implement
      <code>describe(): string</code> — return
      <code>$this-&gt;name . " has area " . round($this-&gt;area(), 2)</code>.
      It calls the <em>abstract</em> <code>area()</code> that only subclasses
      define: the template method.</li>
  <li><code>class Circle extends Shape</code> — implement
      <code>area(): float</code> as
      <code>M_PI * $this-&gt;radius * $this-&gt;radius</code>
      (<code>M_PI</code> is PHP's <code>Math.PI</code>).</li>
  <li><code>class Rectangle extends Shape</code> — implement
      <code>area(): float</code> as width times height.</li>
</ol>
<p>Keep the <code>abstract public function area(): float;</code> declaration
on <code>Shape</code> — removing it would let a shape forget to define
<code>area()</code> and break <code>describe()</code>.</p>`,

  starter: `<?php

abstract class Shape {
    public function __construct(protected string $name) {}

    // Subclasses MUST implement this — enforced at class-load time.
    abstract public function area(): float;

    // 1. Template method: name, " has area ", round(area, 2).
    public function describe(): string {
        throw new Exception("TODO: implement describe using \$this->area()");
    }
}

class Circle extends Shape {
    public function __construct(private float $radius) {
        parent::__construct("circle");   // TS: super("circle")
    }

    // 2. M_PI * radius squared.
    public function area(): float {
        throw new Exception("TODO: implement Circle::area");
    }
}

class Rectangle extends Shape {
    public function __construct(private float $width, private float $height) {
        parent::__construct("rectangle");
    }

    // 3. Width times height.
    public function area(): float {
        throw new Exception("TODO: implement Rectangle::area");
    }
}
`,

  requirements: [
    { pattern: /abstract\s+class\s+Shape/, message: "Keep Shape an abstract class" },
    { pattern: /extends\s+Shape/, message: "Circle and Rectangle must extend Shape" },
    { pattern: /abstract\s+(public\s+)?function\s+area/, message: "Declare area() as an abstract method on Shape" },
  ],

  tests: [
    { name: "Circle(1.0) has area pi (3.14 to two decimals)",
      code: '$c = new Circle(1.0); expect_eq(round($c->area(), 2), 3.14);' },
    { name: "Rectangle(3.0, 4.0) has area exactly 12.0",
      code: '$r = new Rectangle(3.0, 4.0); expect_eq($r->area(), 12.0);' },
    { name: 'Circle describe() uses the template method: "circle has area 3.14"',
      code: 'expect_eq((new Circle(1.0))->describe(), "circle has area 3.14");' },
    { name: 'Rectangle describe() returns "rectangle has area 12"',
      code: 'expect_eq((new Rectangle(3.0, 4.0))->describe(), "rectangle has area 12");' },
    { name: "both are instances of Shape (nominal subtyping)",
      code: 'expect_true(new Circle(2.0) instanceof Shape); expect_true(new Rectangle(1.0, 1.0) instanceof Shape);' },
  ],

  solution: `<?php

abstract class Shape {
    public function __construct(protected string $name) {}

    abstract public function area(): float;

    public function describe(): string {
        return $this->name . " has area " . round($this->area(), 2);
    }
}

class Circle extends Shape {
    public function __construct(private float $radius) {
        parent::__construct("circle");
    }

    public function area(): float {
        return M_PI * $this->radius * $this->radius;
    }
}

class Rectangle extends Shape {
    public function __construct(private float $width, private float $height) {
        parent::__construct("rectangle");
    }

    public function area(): float {
        return $this->width * $this->height;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>PHP</th></tr>
  <tr><td>Interface</td><td>structural — shape is enough</td><td>nominal — must declare <code>implements</code></td></tr>
  <tr><td>Interface methods</td><td><code>area(): number;</code></td><td><code>public function area(): float;</code> (no body)</td></tr>
  <tr><td>Abstract class</td><td><code>abstract class Shape</code></td><td><code>abstract class Shape</code></td></tr>
  <tr><td>Abstract method</td><td><code>abstract area(): number;</code></td><td><code>abstract public function area(): float;</code></td></tr>
  <tr><td>Inherit</td><td><code>extends</code> (single)</td><td><code>extends</code> (single — same rule)</td></tr>
  <tr><td>Call parent ctor</td><td><code>super(name)</code></td><td><code>parent::__construct($name)</code> — never implicit</td></tr>
  <tr><td>Call parent method</td><td><code>super.describe()</code></td><td><code>parent::describe()</code></td></tr>
  <tr><td>Type test</td><td><code>instanceof</code></td><td><code>instanceof</code> (works on interfaces too)</td></tr>
</table>
<p>The nominal model changes how you design: in TS an interface can be
retrofitted onto objects that never heard of it, but in PHP a class only
satisfies interfaces it explicitly declares. In practice this pushes PHP code
toward small, deliberately-implemented interfaces and abstract base classes
like <code>Shape</code> here — concrete behavior (<code>describe</code>)
layered over abstract hooks (<code>area</code>) that <code>extends</code>
obliges every subclass to fill in.</p>`,
};
