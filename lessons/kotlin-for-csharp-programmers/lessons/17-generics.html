const LESSON = {
  number: 17,
  title: "Generics",

  intro: `
<p>Generics work almost exactly like C#'s. You put a type parameter in
angle brackets on a function or a class, and the compiler threads the concrete
type through for you. The syntax is so close that most declarations translate
one-to-one.</p>
<table>
  <tr><th>C#</th><th>Kotlin</th></tr>
  <tr><td><code>T First&lt;T&gt;(List&lt;T&gt; xs)</code></td><td><code>fun &lt;T&gt; first(xs: List&lt;T&gt;): T</code></td></tr>
  <tr><td><code>class Box&lt;T&gt; { ... }</code></td><td><code>class Box&lt;T&gt;(val value: T)</code></td></tr>
  <tr><td><code>&lt;T&gt; where T : IComparable&lt;T&gt;</code></td><td><code>&lt;T : Comparable&lt;T&gt;&gt;</code></td></tr>
  <tr><td><code>out</code> / <code>in</code> (interfaces only)</td><td><code>out</code> / <code>in</code> (any generic type)</td></tr>
</table>
<p>Two things differ. First, the type parameter on a <em>function</em> goes
before the function name — <code>fun &lt;T&gt; first(...)</code>, not
<code>T First&lt;T&gt;(...)</code> — while on a class it stays after the name.
Second, a bound uses a colon (<code>T : Comparable&lt;T&gt;</code>) where
C# writes a trailing <code>where T : IComparable&lt;T&gt;</code> clause.
Because Kotlin has no bare <code>&gt;</code> operator on arbitrary types, a
constraint like <code>Comparable&lt;T&gt;</code> is what lets you write
<code>a &gt; b</code> inside a generic function at all.</p>`,

  csharp: `class Box<T> {
    public T Value { get; }
    public Box(T value) { Value = value; }
    public Box<R> Map<R>(Func<T, R> fn) {
        return new Box<R>(fn(Value));
    }
}

// T must be comparable so we can use CompareTo on it
static T Largest<T>(IEnumerable<T> items) where T : IComparable<T> {
    return items.Aggregate((a, b) => b.CompareTo(a) > 0 ? b : a);
}`,

  task: `
<p>Build a small generic toolkit. Everything is top-level — no
<code>main</code> needed.</p>
<ol>
  <li>Define a generic container <code>class Box&lt;T&gt;(val value: T)</code>.
      Give it <code>fun &lt;R&gt; map(transform: (T) -&gt; R): Box&lt;R&gt;</code>
      that returns a new box holding the transformed value, and a
      <code>toString()</code> that returns <code>"Box(&lt;value&gt;)"</code>.</li>
  <li>Write <code>describe(box: Box&lt;out Any?&gt;): String</code> that returns
      <code>box.toString()</code>. The <code>out</code> projection is use-site
      variance — it lets a <code>Box&lt;Int&gt;</code> be passed where any
      <code>Box</code> is accepted.</li>
  <li>Write <code>largest</code> as a constrained generic
      <code>fun &lt;T : Comparable&lt;T&gt;&gt; largest(items: List&lt;T&gt;): T</code>
      that returns the biggest element of a non-empty list using
      <code>&gt;</code>.</li>
</ol>`,

  starter: `// 1. Box<T> — a generic container holding one value of type T
class Box<T>(val value: T) {
    // map: turn a Box<T> into a Box<R> by transforming the value
    fun <R> map(transform: (T) -> R): Box<R> = TODO()

    override fun toString(): String = "Box(\$value)"
}

// 2. describe — accept a Box of anything using use-site variance (out)
fun describe(box: Box<out Any?>): String = TODO()

// 3. largest — the largest element of a non-empty list, via a Comparable constraint
fun <T : Comparable<T>> largest(items: List<T>): T = TODO()
`,

  requirements: [
    { pattern: /class\s+Box\s*<\s*T\s*>/, message: "Define a generic container: class Box<T>" },
    { pattern: /fun\s*<\s*T\s*:\s*Comparable\s*<\s*T\s*>\s*>/, message: "Write largest with a constraint: fun <T : Comparable<T>>" },
    { pattern: /Box\s*<\s*out\b/, message: "Accept any Box with use-site variance: Box<out Any?>" },
  ],

  tests: [
    { name: "Box holds its value", code: "        expect_eq(Box(42).value, 42)" },
    { name: "map transforms Int -> Int", code: "        expect_eq(Box(3).map { it * 2 }.value, 6)" },
    { name: "map can change the type (String -> Int)", code: "        expect_eq(Box(\"hi\").map { it.length }.value, 2)" },
    { name: "describe accepts a Box<Int> via out", code: "        expect_eq(describe(Box(5)), \"Box(5)\")" },
    { name: "largest of Ints", code: "        expect_eq(largest(listOf(3, 9, 2)), 9)" },
    { name: "largest of Strings", code: "        expect_eq(largest(listOf(\"apple\", \"pear\", \"kiwi\")), \"pear\")" },
  ],

  solution: `class Box<T>(val value: T) {
    fun <R> map(transform: (T) -> R): Box<R> = Box(transform(value))

    override fun toString(): String = "Box(\$value)"
}

fun describe(box: Box<out Any?>): String = box.toString()

fun <T : Comparable<T>> largest(items: List<T>): T {
    var result = items[0]
    for (item in items) {
        if (item > result) result = item
    }
    return result
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Kotlin</th></tr>
  <tr><td>Generic function</td><td><code>T F&lt;T&gt;(T x)</code></td><td><code>fun &lt;T&gt; f(x: T)</code></td></tr>
  <tr><td>Generic class</td><td><code>class Box&lt;T&gt;</code></td><td><code>class Box&lt;T&gt;(val value: T)</code></td></tr>
  <tr><td>Upper bound</td><td><code>&lt;T&gt; where T : X</code></td><td><code>&lt;T : X&gt;</code></td></tr>
  <tr><td>Producer (covariant)</td><td><code>interface ISrc&lt;out T&gt;</code></td><td><code>class Src&lt;out T&gt;</code> / <code>Box&lt;out T&gt;</code></td></tr>
  <tr><td>Consumer (contravariant)</td><td><code>interface ISink&lt;in T&gt;</code></td><td><code>class Sink&lt;in T&gt;</code></td></tr>
</table>
<p>Kotlin makes variance <em>explicit</em>, the same way C# does with
<code>out</code>/<code>in</code> on interface and delegate type parameters —
but Kotlin lets you put those modifiers on ordinary classes too, not just
interfaces. An <code>out T</code> means the type only ever <em>produces</em> a
<code>T</code> (like <code>IEnumerable&lt;out T&gt;</code>), so
<code>Box&lt;Int&gt;</code> can safely stand in for <code>Box&lt;Any?&gt;</code>.
An <code>in T</code> means the type only <em>consumes</em> a <code>T</code>
(like <code>IComparer&lt;in T&gt;</code>). You can declare it on the class
(declaration-site, same as C#'s <code>out</code>/<code>in</code> on an
interface) or, as in <code>Box&lt;out Any?&gt;</code> above, at the point of
use (use-site projection) — something C# has no direct equivalent for, since
C# variance is always declared on the generic type definition itself.</p>
<p>The multiple upper bounds you'd write with a compound
<code>where T : IA, IB</code> clause in C# become a <code>where</code> clause
in Kotlin too, just with different punctuation:
<code>fun &lt;T&gt; f(x: T) where T : A, T : B</code>. And unlike C#'s
generics — which are reified at runtime, letting you write <code>typeof(T)</code>
or <code>x is T</code> freely — Kotlin generics are erased by default; you only
get that back when a function is marked <code>inline</code> with a
<code>reified</code> parameter, which is what makes <code>x is T</code> legal
inside it.</p>`,
};
