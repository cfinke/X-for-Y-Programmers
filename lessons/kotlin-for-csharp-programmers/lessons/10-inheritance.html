<script>
const LESSON = {
  number: 10,
  title: "Inheritance",

  intro: `
<p>Inheritance in Kotlin looks familiar, but the defaults land differently than
in C#. C# splits overridability two ways: a class is extendable by default (you
opt out with <code>sealed</code>), but a method is <strong>not</strong>
overridable unless you mark it <code>virtual</code> or <code>abstract</code>.
Kotlin instead applies one rule everywhere — classes and methods are both
<strong>final by default</strong>. To let a class be subclassed you mark it
<code>open</code>; to let a subclass replace a method you mark that method
<code>open</code> too. The subclass then uses <code>override</code> — just like
C#, that keyword is <em>required</em>, not optional.</p>
<table>
  <tr><th>C#</th><th>Kotlin</th></tr>
  <tr><td><code>class Dog : Animal { }</code></td><td><code>class Dog : Animal() {}</code></td></tr>
  <tr><td><code>abstract class Animal { }</code></td><td><code>abstract class Animal {}</code></td></tr>
  <tr><td><code>public abstract string Sound();</code></td><td><code>abstract fun sound(): String</code></td></tr>
  <tr><td><code>public override string Sound() { ... }</code></td><td><code>override fun sound() { ... }</code></td></tr>
  <tr><td><code>base.Describe()</code></td><td><code>super.describe()</code></td></tr>
</table>
<p>You call the base constructor from the derived constructor's header:
<code>public Dog(string name) : base(name)</code> passes <code>name</code>
straight up — Kotlin puts the equivalent call on the class header itself:
<code>class Dog(name: String) : Animal(name)</code>. An <code>abstract</code>
class can't be instantiated and may declare members with no body
(<code>abstract fun</code>); a subclass must implement them. Abstract and open
members are the only ones a subclass may override — the same restriction C#
enforces with <code>abstract</code>/<code>virtual</code> members versus plain
ones.</p>`,

  csharp: `abstract class Animal {
  protected Animal(string name) { Name = name; }
  protected string Name { get; }
  public abstract string Sound();
  public virtual string Describe() => $"\${Name} says \${Sound()}";
}

class Dog : Animal {
  public Dog(string name) : base(name) {}
  public override string Sound() => "Woof";
}

class Puppy : Dog {
  public Puppy(string name) : base(name) {}
  public override string Sound() => "Yip";
  public override string Describe() => "Baby " + base.Describe();
}`,

  task: `
<p>The <code>Animal</code> base class is provided for you: it takes a
<code>name</code>, declares an <code>abstract fun sound()</code>, and has an
<code>open fun describe()</code>. Build the two subclasses:</p>
<ol>
  <li>Make <code>Dog</code> an <code>open class</code> extending
      <code>Animal(name)</code> (so it passes <code>name</code> to the base
      constructor) and <code>override</code> <code>sound()</code> to return
      <code>"Woof"</code>.</li>
  <li>Make <code>Puppy</code> extend <code>Dog(name)</code>,
      <code>override sound()</code> to return <code>"Yip"</code>, and
      <code>override describe()</code> to return
      <code>"Baby "</code> prepended to <code>super.describe()</code>.</li>
</ol>
<p>Because <code>describe()</code> calls <code>sound()</code>, dynamic dispatch
means a <code>Puppy</code>'s <code>describe()</code> uses the <code>Puppy</code>
sound even when invoked through <code>super</code>.</p>`,

  starter: `abstract class Animal(val name: String) {
    // Subclasses must implement this (no body allowed on an abstract member).
    abstract fun sound(): String

    // 'open' lets subclasses override this; the default just uses sound().
    open fun describe(): String = "$name says \${sound()}"
}

// 1. Dog: an open class so Puppy can extend it. Pass name to Animal(name).
open class Dog(name: String) : Animal(name) {
    override fun sound(): String = "" // TODO: return "Woof"
}

// 2. Puppy: extend Dog(name); override sound() and describe().
class Puppy(name: String) : Dog(name) {
    // TODO: override sound() to return "Yip"
    // TODO: override describe() to return "Baby " + super.describe()
}
`,

  requirements: [
    { pattern: /\bopen\s+class\s+Dog\b/, message: "Declare Dog as an open class so Puppy can extend it" },
    { pattern: /\boverride\s+fun\s+sound\b/, message: "Override sound() in the subclasses" },
    { pattern: /super\.describe\s*\(\s*\)/, message: "Call the base implementation with super.describe()" },
  ],

  tests: [
    { name: 'Dog("Rex").sound() is "Woof"', code: "        expect_eq(Dog(\"Rex\").sound(), \"Woof\")" },
    { name: 'Dog("Rex").describe() is "Rex says Woof"', code: "        expect_eq(Dog(\"Rex\").describe(), \"Rex says Woof\")" },
    { name: 'Puppy("Fido").sound() is "Yip"', code: "        expect_eq(Puppy(\"Fido\").sound(), \"Yip\")" },
    { name: 'Puppy("Fido").describe() is "Baby Fido says Yip"', code: "        expect_eq(Puppy(\"Fido\").describe(), \"Baby Fido says Yip\")" },
    { name: "base-constructor name is inherited", code: "        expect_eq(Puppy(\"Fido\").name, \"Fido\")" },
    { name: "a Puppy is-an Animal", code: "        expect_true(Puppy(\"Fido\") is Animal)" },
  ],

  solution: `abstract class Animal(val name: String) {
    abstract fun sound(): String

    open fun describe(): String = "$name says \${sound()}"
}

open class Dog(name: String) : Animal(name) {
    override fun sound(): String = "Woof"
}

class Puppy(name: String) : Dog(name) {
    override fun sound(): String = "Yip"
    override fun describe(): String = "Baby " + super.describe()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Kotlin</th></tr>
  <tr><td>Subclassable</td><td>every class (opt out with <code>sealed</code>)</td><td><code>open class</code> (opt in)</td></tr>
  <tr><td>Overridable method</td><td><code>virtual</code>/<code>abstract</code> only (opt in)</td><td><code>open fun</code> (opt in)</td></tr>
  <tr><td>Override keyword</td><td><code>override</code> (required)</td><td><code>override</code> (required)</td></tr>
  <tr><td>Abstract member</td><td><code>public abstract string Sound();</code></td><td><code>abstract fun sound(): String</code></td></tr>
  <tr><td>Base constructor</td><td><code>: base(name)</code> in constructor header</td><td><code>: Animal(name)</code> in class header</td></tr>
</table>
<p>The mindset shift versus C# is narrower than it first looks: C# already
requires <code>override</code>, and a plain (non-<code>virtual</code>) member
already resists being overridden, just like a non-<code>open</code> Kotlin
member. What actually differs is the class itself — a C# class is extendable
unless you mark it <code>sealed</code>, while a Kotlin class is sealed unless
you mark it <code>open</code>. Note that <code>abstract</code> members are
implicitly open in Kotlin — you don't (and can't) write
<code>open abstract fun</code> — much like an <code>abstract</code> C# member is
implicitly <code>virtual</code>. To stop an inherited method from being
overridden any further, C# uses <code>sealed override</code>; Kotlin marks the
override itself <code>final</code>.</p>`,
};
