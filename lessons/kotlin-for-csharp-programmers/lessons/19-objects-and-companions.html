  title: "Objects & Companions",

  intro: `
<p>C# gives you three separate tools for "one-of-a-kind" and
"class-level" code: the singleton pattern (a class with a private constructor
and a static instance field) for a one-of-a-kind object, the
<code>static</code> keyword for members that hang off the class rather than
an instance, and an anonymous type or lambda-backed interface implementation
for a throwaway implementation. Kotlin folds all three under one keyword —
<code>object</code>.</p>
<table>
  <tr><th>C#</th><th>Kotlin</th></tr>
  <tr><td>Singleton pattern (private ctor + static instance)</td><td><code>object Tally { … }</code></td></tr>
  <tr><td><code>static Parse(…)</code> on a class</td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td>Anonymous class implementing an interface</td><td><code>object : Greeter { … }</code></td></tr>
  <tr><td><code>private User(…)</code> (private constructor)</td><td><code>class User private constructor(…)</code></td></tr>
</table>
<p>An <strong>object declaration</strong> (<code>object Name { … }</code>) is a
lazily-created singleton — there is exactly one instance and you reach it by its
name. A <strong>companion object</strong> is a singleton that lives inside a
class, so its members read like C# <code>static</code> members
(<code>User.parse(…)</code>), and because it can see the class's
<code>private</code> constructor it is the idiomatic home for factory functions.
An <strong>object expression</strong> (<code>object : Greeter { … }</code>) is an
anonymous instance created on the spot, Kotlin's answer to C#'s anonymous class
implementing an interface.</p>`,

  csharp: `// Singleton: private constructor + static instance
class Tally {
    private static readonly Tally _instance = new Tally();
    public static Tally Instance => _instance;
    private readonly List<string> items = new List<string>();
    private Tally() {}
    public void Add(string item) => items.Add(item);
    public int Count() => items.Count;
}

interface IGreeter { string Greet(string name); }

// Static factory + private constructor
class User {
    private User(string name, int age) { Name = name; Age = age; }
    public string Name { get; }
    public int Age { get; }
    public static readonly string Species = "human";
    public static User Parse(string text) {
        var parts = text.Split(':');
        return new User(parts[0], int.Parse(parts[1]));
    }
}

// Anonymous class implementing an interface
IGreeter PoliteGreeter() {
    return new PoliteGreeterImpl();
}
class PoliteGreeterImpl : IGreeter {
    public string Greet(string name) => \$"Hello, {name}";
}`,

  solution: `object Tally {
    private val items = mutableListOf<String>()

    fun add(item: String) {
        items.add(item)
    }

    fun count(): Int = items.size

    fun all(): List<String> = items.toList()
}

interface Greeter {
    fun greet(name: String): String
}

class User private constructor(val name: String, val age: Int) {
    companion object {
        const val SPECIES = "human"

        fun parse(text: String): User {
            val parts = text.split(":")
            return User(parts[0], parts[1].toInt())
        }
    }
}

fun politeGreeter(): Greeter = object : Greeter {
    override fun greet(name: String): String = "Hello, $name"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Kotlin</th></tr>
  <tr><td>Singleton</td><td>Private ctor + static instance field</td><td><code>object Tally { … }</code></td></tr>
  <tr><td>Class-level member</td><td><code>static Parse(…)</code></td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td>Class-level constant</td><td><code>static readonly X</code></td><td><code>const val X</code> (in companion)</td></tr>
  <tr><td>Private constructor</td><td><code>private C(…)</code></td><td><code>class C private constructor(…)</code></td></tr>
  <tr><td>Anonymous instance</td><td>Anonymous class implementing an interface</td><td><code>object : Greeter { … }</code></td></tr>
</table>
<p>A companion object is <em>not</em> a bag of statics — it is a genuine
singleton object attached to the class, reachable as
<code>User.Companion</code>, and it can implement interfaces or hold state like
any other object. You get the <code>User.parse(…)</code> call syntax for free
because Kotlin lets you address companion members through the class name. A
<code>private constructor</code> plus a companion factory is the standard way to
force construction through a validated entry point — the same intent as C#'s
private-constructor-plus-static-factory pattern, but Kotlin gives that factory
its own dedicated singleton object instead of just a loose static method.</p>
<p>One idiomatic wrinkle: Kotlin allows top-level functions, so you often do not
need a singleton at all — a plain <code>fun</code> or a top-level
<code>val</code> replaces many classes you would have written as a static
utility class in C#. Reach for <code>object</code> when you specifically want a
single named instance that carries state or implements an interface.</p>`,
