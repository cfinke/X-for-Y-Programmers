const LESSON = {
  number: 10,
  title: "Inheritance & Virtual Functions",

  intro: `
<p>In C#, every method on a class is dispatched based on its runtime type only
if you opt in with <code>virtual</code>/<code>override</code> — plain methods
are non-virtual by default, same as C++. So the mechanics should feel familiar;
what changes is the syntax and a few sharp edges. A member function is
dispatched <em>statically</em> (by the pointer's declared type) unless you mark
it <code>virtual</code>. Only then does calling through a <code>Base&amp;</code>
or <code>Base*</code> reach the derived override — that is polymorphism in
C++.</p>
<table>
  <tr><th>C#</th><th>C++</th></tr>
  <tr><td><code>class Dog : Animal { }</code></td><td><code>class Dog : public Animal {}</code></td></tr>
  <tr><td><code>public virtual string Speak() { … }</code></td><td><code>virtual std::string speak() const</code></td></tr>
  <tr><td><code>public override string Speak() { … }</code></td><td><code>std::string speak() const override</code></td></tr>
  <tr><td><code>public abstract double Area();</code></td><td><code>virtual double area() const = 0;</code></td></tr>
  <tr><td><code>abstract class Shape</code></td><td>class with a pure virtual (<code>= 0</code>)</td></tr>
</table>
<p>Three rules to carry over. First, <code>virtual</code> in the base is what
enables dynamic dispatch; write <code>override</code> in the derived class so the
compiler checks you actually matched a base signature. Second, a pure virtual
(<code>= 0</code>) makes the class abstract — you cannot instantiate it, exactly
like C#'s <code>abstract</code>. Third, a base class with any virtual function needs a
<code>virtual ~Base() = default;</code> destructor so deleting through a base
pointer cleans up the derived part — C# gives you this for free via the garbage
collector, but C++ does not.</p>`,

  csharp: `abstract class Animal {
  protected string name;
  protected Animal(string name) { this.name = name; }
  public abstract string Speak();
  public string Describe() {
    return $"{name} says {Speak()}";
  }
}

class Dog : Animal {
  public Dog(string name) : base(name) {}
  public override string Speak() { return "Woof"; }
}
class Cat : Animal {
  public Cat(string name) : base(name) {}
  public override string Speak() { return "Meow"; }
}

string Announce(Animal a) {
  return a.Describe();
}`,

  task: `
<p>Model the same hierarchy in C++.</p>
<ol>
  <li>An abstract base <code>Animal</code> holding a <code>std::string name</code>
      (constructor takes it). Give it a pure virtual
      <code>virtual std::string speak() const = 0;</code> and a non-virtual
      <code>describe()</code> returning <code>name + " says " + speak()</code>.
      Add <code>virtual ~Animal() = default;</code>.</li>
  <li><code>Dog</code> and <code>Cat</code> deriving <code>public Animal</code>,
      each with a constructor forwarding the name to <code>Animal</code> and an
      <code>override</code> of <code>speak()</code> returning <code>"Woof"</code>
      / <code>"Meow"</code>.</li>
  <li>A free function <code>announce(const Animal&amp; a)</code> returning
      <code>a.describe()</code> — proving dispatch works through a
      <code>Base&amp;</code>.</li>
</ol>`,

  starter: `class Animal {
public:
  explicit Animal(std::string name) : name(std::move(name)) {}
  virtual ~Animal() = default;
  // TODO: make speak() a pure virtual (= 0) so Animal is abstract
  virtual std::string speak() const { return ""; }
  std::string describe() const {
    return ""; // TODO: return name + " says " + speak()
  }
protected:
  std::string name;
};

class Dog : public Animal {
public:
  explicit Dog(std::string name) : Animal(std::move(name)) {}
  // TODO: override speak() to return "Woof"
  std::string speak() const override { return ""; }
};

class Cat : public Animal {
public:
  explicit Cat(std::string name) : Animal(std::move(name)) {}
  // TODO: override speak() to return "Meow"
  std::string speak() const override { return ""; }
};

std::string announce(const Animal& a) {
  return ""; // TODO: return a.describe()
}
`,

  requirements: [
    { pattern: /=\s*0\s*;/, message: "Give Animal a pure virtual method (= 0) so it is abstract" },
    { pattern: /\boverride\b/, message: "Mark the derived speak() with override" },
    { pattern: /virtual\s+~Animal/, message: "Give the base a virtual destructor" },
  ],

  tests: [
    { name: "Dog speaks Woof", code: "    Dog d(\"Rex\");\n    expect_eq(d.speak(), std::string(\"Woof\"));" },
    { name: "Cat speaks Meow", code: "    Cat c(\"Tom\");\n    expect_eq(c.speak(), std::string(\"Meow\"));" },
    { name: "describe uses the override", code: "    Dog d(\"Rex\");\n    expect_eq(d.describe(), std::string(\"Rex says Woof\"));" },
    { name: "announce dispatches through Animal&", code: "    Cat c(\"Tom\");\n    expect_eq(announce(c), std::string(\"Tom says Meow\"));" },
    { name: "polymorphism through a base pointer", code: "    std::unique_ptr<Animal> p = std::make_unique<Dog>(\"Fido\");\n    expect_eq(p->describe(), std::string(\"Fido says Woof\"));" },
  ],

  solution: `class Animal {
public:
  explicit Animal(std::string name) : name(std::move(name)) {}
  virtual ~Animal() = default;
  virtual std::string speak() const = 0;
  std::string describe() const {
    return name + " says " + speak();
  }
protected:
  std::string name;
};

class Dog : public Animal {
public:
  explicit Dog(std::string name) : Animal(std::move(name)) {}
  std::string speak() const override { return "Woof"; }
};

class Cat : public Animal {
public:
  explicit Cat(std::string name) : Animal(std::move(name)) {}
  std::string speak() const override { return "Meow"; }
};

std::string announce(const Animal& a) {
  return a.describe();
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>C++</th></tr>
  <tr><td>Extend a class</td><td><code>class Dog : Animal</code></td><td><code>class Dog : public Animal</code></td></tr>
  <tr><td>Enable dispatch</td><td><code>virtual</code> in the base</td><td><code>virtual</code> in the base</td></tr>
  <tr><td>Override</td><td><code>public override T M() {}</code></td><td><code>T m() const override</code></td></tr>
  <tr><td>Abstract method</td><td><code>public abstract T M();</code></td><td><code>virtual T m() const = 0;</code></td></tr>
  <tr><td>Call super ctor</td><td><code>: base(name)</code></td><td><code>: Animal(name)</code> init list</td></tr>
  <tr><td>Base handle</td><td><code>Animal a</code> (reference type)</td><td><code>const Animal&amp;</code> / <code>Animal*</code></td></tr>
</table>
<p>The gotcha for C# refugees: C# already requires <code>virtual</code> on the
base and <code>override</code> on the derived class, so the dispatch rules
themselves are not the trap. Forget <code>virtual</code> in C++ and
<code>announce</code> would call <code>Animal::speak</code> — except here it
cannot, because <code>speak</code> is pure, so the class would not compile as
concrete at all. In a hierarchy where the base <em>did</em> supply a body,
dropping <code>virtual</code> silently gives you static dispatch and the wrong
answer, with no compiler error. The bigger gotcha is value semantics: unlike C#,
where every class is a reference type and <code>Animal a = new Dog();</code>
just works, a C++ <code>Animal</code> is a value type by default. Assigning a
<code>Dog</code> into an <code>Animal</code> variable <em>slices</em> off the
derived part. Polymorphism in C++ only works through a reference
(<code>Animal&amp;</code>) or a pointer (<code>Animal*</code> /
<code>std::unique_ptr&lt;Animal&gt;</code>), never a by-value base.</p>`,
};
