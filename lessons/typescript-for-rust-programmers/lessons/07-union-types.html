<title>Lesson 7: Union Types</title>
<link rel="stylesheet" href="../../../shared/css/style.css">

<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 7,
  title: "Union Types",

  intro: `
<p>In Rust, "this value is an <code>i32</code> <em>or</em> a
<code>String</code>" is a whole ceremony: define
<code>enum IdValue { Num(i32), Text(String) }</code>, wrap every value in a
variant at every call site, then <code>match</code> and destructure to get it
back out. The enum is nominal — it needs a name, its variants need names, and
it lives somewhere in your module tree. TypeScript writes the same idea
inline and anonymously: <code>number | string</code>, right in the function
signature. No declaration, no variant names, no wrapping.</p>
<table>
  <tr><th>Rust</th><th>TypeScript</th></tr>
  <tr><td><code>enum IdValue { Num(i32), Text(String) }</code></td><td><code>number | string</code> — inline, anonymous</td></tr>
  <tr><td><code>IdValue::Num(42)</code></td><td><code>42</code> — no wrapping at call sites</td></tr>
  <tr><td><code>match id { Num(n) =&gt; ..., Text(s) =&gt; ... }</code></td><td><code>if (typeof id === "number") { ... } else { ... }</code></td></tr>
  <tr><td><code>match</code> must be exhaustive</td><td>after the <code>if</code>, the <code>else</code> branch <em>is</em> the remaining type</td></tr>
</table>
<p>The part that should feel familiar: <code>typeof</code> narrowing
<em>is</em> the <code>match</code>. Inside the
<code>typeof id === "number"</code> branch the compiler treats
<code>id</code> as a plain <code>number</code>; in the <code>else</code>
branch it has eliminated <code>number</code>, so <code>id</code> is a
<code>string</code> and string methods compile. Before the check, calling
<code>id.toUpperCase()</code> is a compile error — exactly the discipline
<code>match</code> gives you, minus the boilerplate. The trade-off is real,
though: with no variant names, two cases with the same runtime type
(say, two different structs) can't be told apart by <code>typeof</code> —
that's what discriminated unions are for, later in the course.</p>`,

  rust: `// "a number or a string" forces a named enum, variants, and a match:
enum IdValue {
    Num(u32),
    Text(String),
}

fn format_id(id: IdValue) -> String {
    match id {
        IdValue::Num(n) => format!("ID-{n:06}"),
        IdValue::Text(s) => format!("ID-{}", s.to_uppercase()),
    }
}

fn main() {
    // every call site pays the wrapping tax:
    println!("{}", format_id(IdValue::Num(42)));
    println!("{}", format_id(IdValue::Text(String::from("a1b2"))));
}`,

  task: `
<p>Port <code>format_id</code> without the enum:</p>
<ol>
  <li>Write <code>formatId(id: number | string): string</code> — the union
      goes straight into the parameter's type annotation. Numbers become
      <code>"ID-"</code> plus the number zero-padded to 6 digits
      (<code>formatId(42)</code> → <code>"ID-000042"</code> — use
      <code>String(id).padStart(6, "0")</code>). Strings become
      <code>"ID-"</code> plus the string uppercased
      (<code>formatId("a1b2")</code> → <code>"ID-A1B2"</code>).
      Branch with <code>typeof id === "number"</code>; that check is your
      <code>match</code>, and in the <code>else</code> branch
      <code>id.toUpperCase()</code> compiles because the compiler knows only
      <code>string</code> is left.</li>
  <li>Write <code>idKind(id: number | string): string</code> returning
      <code>"number"</code> or <code>"string"</code>. Notice that
      <code>typeof id</code> is not just a runtime check — it is also a value
      you can return.</li>
</ol>`,

  starter: `// Rust: fn format_id(id: IdValue) -> String { match id { ... } }
// TypeScript: the union is inline — no enum, no variants, no wrapping.
function formatId(id: number | string): string {
  // TODO: typeof id === "number" -> "ID-" + String(id).padStart(6, "0")
  //       otherwise             -> "ID-" + id.toUpperCase()
  // The typeof check IS the match: each branch sees a narrowed type.
  return "";
}

// TODO: return "number" or "string" for the given id.
function idKind(id: number | string): string {
  return "";
}
`,

  exportNames: ["formatId", "idKind"],

  requirements: [
    { pattern: /formatId\s*\(\s*id\s*:\s*number\s*\|\s*string\s*\)/, message: "Declare formatId with the inline union parameter id: number | string" },
    { pattern: /typeof\s+id/, message: "Narrow with typeof id — the typeof check is the match" },
  ],

  tests: [
    { name: 'formatId(42) is "ID-000042"', run: (x) => expectEqual(x.formatId(42), "ID-000042") },
    { name: 'formatId(7) is "ID-000007"', run: (x) => expectEqual(x.formatId(7), "ID-000007") },
    { name: 'formatId("a1b2") is "ID-A1B2"', run: (x) => expectEqual(x.formatId("a1b2"), "ID-A1B2") },
    { name: 'idKind(42) is "number"', run: (x) => expectEqual(x.idKind(42), "number") },
    { name: 'idKind("abc") is "string"', run: (x) => expectEqual(x.idKind("abc"), "string") },
  ],

  solution: `function formatId(id: number | string): string {
  if (typeof id === "number") {
    // in this branch, id is a plain number
    return "ID-" + String(id).padStart(6, "0");
  }
  // here the compiler has eliminated number: id is a string
  return "ID-" + id.toUpperCase();
}

function idKind(id: number | string): string {
  return typeof id;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>TypeScript</th></tr>
  <tr><td>"A or B" type</td><td><code>enum IdValue { Num(i32), Text(String) }</code></td><td><code>number | string</code>, written inline</td></tr>
  <tr><td>Construct a value</td><td><code>IdValue::Num(42)</code></td><td><code>42</code> — the value is already a member</td></tr>
  <tr><td>Branch on the case</td><td><code>match id { Num(n) =&gt; ... }</code></td><td><code>if (typeof id === "number")</code></td></tr>
  <tr><td>Get the payload out</td><td>destructure in the match arm</td><td>nothing to unwrap — <code>id</code> is narrowed in place</td></tr>
  <tr><td>Exhaustiveness</td><td>compiler rejects a missing arm</td><td>the <code>else</code> branch is the leftover type; a union member you never handle stays a compile error at the use site</td></tr>
  <tr><td>Variant names</td><td>you invent <code>Num</code>/<code>Text</code></td><td>none — the runtime types are the tags</td></tr>
</table>
<p>The insight to carry forward: Rust attaches the tag explicitly (the
variant), while <code>typeof</code> reads a tag JavaScript already stores on
every value. That works beautifully while the union members have distinct
runtime types — <code>number | string | boolean</code> — and breaks down the
moment two members are both plain objects. For those you add the tag back
yourself as a <code>kind</code> field, which is exactly the data-carrying
enum pattern; it gets its own lesson (Discriminated Unions, Lesson 17).</p>`,
};
</script>
