<title>Lesson 14: Tuples & Destructuring</title>

<div id="app"></div>
<script>
const LESSON = {
  number: 14,
  title: "Tuples & Destructuring",

  intro: `
<p>TypeScript has tuples, and they are spelled as arrays: <code>(3, 4): (i32,
i32)</code> becomes <code>[3, 4]</code> typed as <code>[number, number]</code>.
A tuple type is just an array type with a fixed length and a type per position
— element access is <code>point[0]</code> instead of <code>point.0</code>, and
the compiler still knows position 0 is a <code>number</code> and rejects
<code>point[2]</code>.</p>
<table>
  <tr><th>Rust</th><th>TypeScript</th></tr>
  <tr><td><code>let point: (i32, i32) = (3, 4);</code></td><td><code>const point: [number, number] = [3, 4];</code></td></tr>
  <tr><td><code>point.0</code>, <code>point.1</code></td><td><code>point[0]</code>, <code>point[1]</code></td></tr>
  <tr><td><code>let (x, y) = point;</code></td><td><code>const [x, y] = point;</code></td></tr>
  <tr><td><code>let User { name, age } = user;</code></td><td><code>const { name, age } = user;</code></td></tr>
  <tr><td><code>let User { name: n, .. } = user;</code></td><td><code>const { name: n } = user;</code> — no <code>..</code> needed</td></tr>
  <tr><td><code>let (a, b) = (b, a);</code></td><td><code>[a, b] = [b, a];</code></td></tr>
</table>
<p>Destructuring maps one-to-one. <code>let (x, y) = point</code> is
<code>const [x, y] = point</code>; struct destructuring <code>let User { name,
age } = user</code> is <code>const { name, age } = user</code>. Two quality-of-life
upgrades: renaming is <code>{ name: n }</code> and defaults are <code>{ role =
"user" }</code> — and because TypeScript never forces exhaustiveness on
patterns, there is no <code>..</code> to write. You just take the fields you
want. Destructuring works in parameter position too, which gives you Rust-style
named arguments for free: the tuple-swap idiom carries over unchanged.</p>`,

  rust: `struct User {
    name: String,
    age: u32,
}

fn distance(p: (f64, f64)) -> f64 {
    let (x, y) = p;
    (x * x + y * y).sqrt()
}

fn swap_pair<A, B>(pair: (A, B)) -> (B, A) {
    let (first, second) = pair;
    (second, first)
}

fn format_user(user: &User) -> String {
    let User { name, age } = user;
    format!("{name} ({age})")
}`,

  task: `
<p>Port the three functions:</p>
<ol>
  <li>Write <code>distance(p: [number, number]): number</code> — the distance
      from the origin. Destructure the tuple with <code>const [x, y] = p</code>
      and return <code>Math.sqrt(x * x + y * y)</code>.</li>
  <li>Write <code>swapPair&lt;A, B&gt;(pair: [A, B]): [B, A]</code> — generic
      over both positions, exactly like the Rust version, and destructured the
      same way.</li>
  <li>Write <code>formatUser</code> taking a <em>destructured object
      parameter</em> <code>{ name, role = "user" }</code> typed as
      <code>{ name: string; role?: string }</code>, returning
      <code>"&lt;name&gt; [&lt;role&gt;]"</code> (e.g. <code>"Ada
      [admin]"</code>). The <code>= "user"</code> default fills in when the
      caller omits <code>role</code> — something Rust's struct patterns don't
      do.</li>
</ol>
<p>Note what you do <em>not</em> write: no <code>..</code> to ignore fields, no
<code>&amp;</code>, no clone.</p>`,

  starter: `// 1. (f64, f64) -> [number, number]; let (x, y) = p -> const [x, y] = p
function distance(p) {
  // TODO: type the parameter as the tuple [number, number], destructure, and
  //       return Math.sqrt(x * x + y * y)
  return 0;
}

// 2. fn swap_pair<A, B>(pair: (A, B)) -> (B, A)
function swapPair(pair) {
  // TODO: swapPair<A, B>(pair: [A, B]): [B, A]
  return pair;
}

// 3. Struct destructuring, in parameter position, with a default:
//    { name, role = "user" }: { name: string; role?: string }
function formatUser(user) {
  // TODO: destructure in the parameter list; return "<name> [<role>]"
  return "";
}
`,

  exportNames: ["distance", "swapPair", "formatUser"],

  requirements: [
    { pattern: /:\s*\[\s*number\s*,\s*number\s*\]/, message: "Type distance's parameter as the tuple [number, number]" },
    { pattern: /const\s*\[/, message: "Destructure a tuple with const [x, y] = ... (Rust's let (x, y) = ...)" },
    { pattern: /\(\s*\{\s*name/, message: "Destructure the object directly in formatUser's parameter list" },
    { pattern: /role\s*=\s*"user"/, message: 'Give role a destructuring default of "user"' },
  ],

  tests: [
    { name: "distance([3, 4]) returns 5", run: (x) => expectEqual(x.distance([3, 4]), 5) },
    { name: "distance([0, 0]) returns 0", run: (x) => expectEqual(x.distance([0, 0]), 0) },
    { name: 'swapPair([1, "a"]) returns ["a", 1]', run: (x) => expectDeepEqual(x.swapPair([1, "a"]), ["a", 1]) },
    { name: "swapPair(swapPair(pair)) round-trips", run: (x) => expectDeepEqual(x.swapPair(x.swapPair([true, 7])), [true, 7]) },
    { name: 'formatUser({ name: "Ada", role: "admin" }) returns "Ada [admin]"', run: (x) => expectEqual(x.formatUser({ name: "Ada", role: "admin" }), "Ada [admin]") },
    { name: 'formatUser({ name: "Grace" }) falls back to "Grace [user]"', run: (x) => expectEqual(x.formatUser({ name: "Grace" }), "Grace [user]") },
  ],

  solution: `function distance(p: [number, number]): number {
  const [x, y] = p;
  return Math.sqrt(x * x + y * y);
}

function swapPair<A, B>(pair: [A, B]): [B, A] {
  const [first, second] = pair;
  return [second, first];
}

function formatUser({ name, role = "user" }: { name: string; role?: string }): string {
  return \`\${name} [\${role}]\`;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>TypeScript</th></tr>
  <tr><td>Tuple type</td><td><code>(i32, String)</code></td><td><code>[number, string]</code></td></tr>
  <tr><td>Tuple value</td><td><code>(3, 4)</code></td><td><code>[3, 4]</code> (an array, fixed shape)</td></tr>
  <tr><td>Positional access</td><td><code>point.0</code></td><td><code>point[0]</code></td></tr>
  <tr><td>Tuple destructuring</td><td><code>let (x, y) = point;</code></td><td><code>const [x, y] = point;</code></td></tr>
  <tr><td>Struct/object destructuring</td><td><code>let User { name, age } = user;</code></td><td><code>const { name, age } = user;</code></td></tr>
  <tr><td>Rename / default</td><td><code>{ name: n, .. }</code> / —</td><td><code>{ name: n }</code> / <code>{ role = "user" }</code></td></tr>
  <tr><td>Swap</td><td><code>let (a, b) = (b, a);</code></td><td><code>[a, b] = [b, a];</code></td></tr>
</table>
<p>Because a tuple is "just" an array with a richer type, everything arrays do
— iteration, spread, <code>.map</code> — works on tuples too; the type system
is the only thing keeping the shape honest. The destructured-parameter idiom
from <code>formatUser</code> is worth internalizing: it is how idiomatic
TypeScript fakes named arguments, and you will see <code>function f({ a, b })</code>
signatures everywhere Rust would have reached for a builder or an options
struct.</p>`,
};
</script>
