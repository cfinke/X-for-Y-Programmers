<script>
const LESSON = {
  number: 16,
  title: "Type Narrowing & Guards",

  intro: `
<p>In Rust, <code>match</code> and <code>if let Some(x)</code> don't just test a
value — each arm hands you a <em>new binding</em> with a more precise type. And
when the type genuinely isn't known until runtime (<code>&amp;dyn Any</code>,
<code>serde_json::Value</code>), you probe it with
<code>downcast_ref::&lt;T&gt;()</code> and get an <code>Option</code> back.
TypeScript reaches the same place with a different move: <strong>flow-based
narrowing</strong>. Write an ordinary runtime check — <code>typeof v ===
"string"</code>, <code>v instanceof Error</code>, <code>Array.isArray(v)</code> —
and inside that branch the compiler treats <em>the same variable</em> as the
narrower type. It's the binding a match arm would give you, without the arm.</p>
<table>
  <tr><th>Rust</th><th>TypeScript</th></tr>
  <tr><td><code>&amp;dyn Any</code>, <code>serde_json::Value</code></td><td><code>unknown</code> — anything, but you must narrow before touching it</td></tr>
  <tr><td><code>if let Some(s) = v.downcast_ref::&lt;String&gt;()</code></td><td><code>if (typeof v === "string") { /* v: string here */ }</code></td></tr>
  <tr><td><code>v.downcast_ref::&lt;Vec&lt;i32&gt;&gt;()</code></td><td><code>Array.isArray(v)</code></td></tr>
  <tr><td>hand-rolled shape check on a <code>Value</code></td><td><code>function isUser(v: unknown): v is User</code> — a type predicate</td></tr>
</table>
<p>The starting point is <code>unknown</code>: the type-safe "could be anything."
Unlike <code>any</code> (which is <code>unsafe</code> blocks without the keyword),
<code>unknown</code> refuses every operation until you've proven the type with a
check. For structured data — JSON from the wire, <code>serde_json::Value</code>
territory — you write a <strong>type predicate</strong>: a function whose return
type is <code>value is User</code>. It's a hand-rolled, compiler-trusted downcast:
if it returns <code>true</code>, the caller's variable is narrowed to
<code>User</code> from then on. The compiler trusts your logic completely, so the
checks inside had better actually verify the shape.</p>`,

  rust: `use std::any::Any;

fn describe(value: &dyn Any) -> String {
    if let Some(s) = value.downcast_ref::<String>() {
        return format!("string of length {}", s.len());
    }
    if let Some(n) = value.downcast_ref::<f64>() {
        return format!("number: {n}");
    }
    if let Some(v) = value.downcast_ref::<Vec<i32>>() {
        return format!("array of {} items", v.len());
    }
    "unknown value".to_string()
}

// serde_json territory: verify a shape by hand
fn is_user(value: &serde_json::Value) -> bool {
    value.get("name").map_or(false, |v| v.is_string())
        && value.get("age").map_or(false, |v| v.is_number())
}`,

  task: `
<p>Port the runtime type probing:</p>
<ol>
  <li>Write <code>describeValue(value: unknown): string</code>. Narrow with
      checks, in this order:
      <ul>
        <li><code>typeof value === "string"</code> → return
            <code>"string of length N"</code> (its length),</li>
        <li><code>typeof value === "number"</code> → return
            <code>"number: N"</code> (the value),</li>
        <li><code>Array.isArray(value)</code> → return
            <code>"array of N items"</code>,</li>
        <li>a non-null <code>object</code> → return <code>"object"</code>
            (remember: <code>typeof null === "object"</code> — JS's oldest bug),</li>
        <li>anything else → return <code>"unknown value"</code>.</li>
      </ul>
      Inside each branch, use <code>value</code> directly — the compiler has
      already narrowed it.</li>
  <li>Write a type predicate <code>isUser(value: unknown): value is User</code>
      for <code>interface User { name: string; age: number }</code> (the
      interface is in the starter). Return <code>true</code> only if
      <code>value</code> is a non-null object whose <code>name</code> is a
      string and whose <code>age</code> is a number.</li>
</ol>`,

  starter: `interface User {
  name: string;
  age: number;
}

// 1. Narrow \`unknown\` step by step — a chain of downcast_ref::<T>() checks,
//    except the checks narrow \`value\` itself instead of binding a new name.
function describeValue(value: unknown): string {
  // TODO: typeof value === "string"  -> \`string of length \${value.length}\`
  // TODO: typeof value === "number"  -> \`number: \${value}\`
  // TODO: Array.isArray(value)       -> \`array of \${value.length} items\`
  // TODO: non-null object            -> "object"
  return "unknown value";
}

// 2. A type predicate. Change the return type to \`value is User\`, then
//    verify the shape for real — the compiler trusts whatever you return.
function isUser(value: unknown): boolean {
  // TODO: non-null object, name is a string, age is a number
  return false;
}`,

  exportNames: ["describeValue", "isUser"],

  requirements: [
    { pattern: /unknown/, message: "Take unknown, not any — the type-safe \"could be anything\"" },
    { pattern: /typeof/, message: "Narrow with typeof checks" },
    { pattern: /\bis\s+\w+/, message: "Give isUser a type-predicate return type (value is User)" },
  ],

  tests: [
    { name: 'describeValue("hello") reports a string of length 5', run: (x) => expectEqual(x.describeValue("hello"), "string of length 5") },
    { name: "describeValue(42) reports the number", run: (x) => expectEqual(x.describeValue(42), "number: 42") },
    { name: "describeValue([1, 2, 3]) reports an array of 3 items", run: (x) => expectEqual(x.describeValue([1, 2, 3]), "array of 3 items") },
    { name: "describeValue({}) says object, describeValue(null) does not", run: (x) => { expectEqual(x.describeValue({ a: 1 }), "object"); expectEqual(x.describeValue(null), "unknown value"); } },
    { name: "isUser accepts a well-formed user", run: (x) => expectEqual(x.isUser({ name: "Ferris", age: 10 }), true) },
    { name: "isUser rejects near-misses (missing age, wrong types, null)", run: (x) => { expectEqual(x.isUser({ name: "Ferris" }), false); expectEqual(x.isUser({ name: 7, age: 10 }), false); expectEqual(x.isUser(null), false); expectEqual(x.isUser("Ferris"), false); } },
  ],

  solution: `interface User {
  name: string;
  age: number;
}

function describeValue(value: unknown): string {
  if (typeof value === "string") {
    return \`string of length \${value.length}\`;
  }
  if (typeof value === "number") {
    return \`number: \${value}\`;
  }
  if (Array.isArray(value)) {
    return \`array of \${value.length} items\`;
  }
  if (typeof value === "object" && value !== null) {
    return "object";
  }
  return "unknown value";
}

function isUser(value: unknown): value is User {
  if (typeof value !== "object" || value === null) {
    return false;
  }
  const candidate = value as { name?: unknown; age?: unknown };
  return typeof candidate.name === "string" && typeof candidate.age === "number";
}`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>TypeScript</th></tr>
  <tr><td>Runtime-unknown value</td><td><code>&amp;dyn Any</code>, <code>serde_json::Value</code></td><td><code>unknown</code></td></tr>
  <tr><td>Probe a primitive</td><td><code>downcast_ref::&lt;String&gt;()</code></td><td><code>typeof v === "string"</code></td></tr>
  <tr><td>Probe a collection</td><td><code>downcast_ref::&lt;Vec&lt;T&gt;&gt;()</code></td><td><code>Array.isArray(v)</code></td></tr>
  <tr><td>Probe a class instance</td><td><code>downcast_ref::&lt;MyType&gt;()</code></td><td><code>v instanceof MyType</code></td></tr>
  <tr><td>Where the narrow value lives</td><td>new binding in the arm: <code>if let Some(s) = …</code></td><td>the same variable, narrowed in the branch</td></tr>
  <tr><td>Custom shape check</td><td>hand-written fn returning <code>bool</code></td><td><code>fn(v: unknown): v is User</code> — narrows the caller's variable</td></tr>
  <tr><td>Escape hatch (avoid)</td><td><code>unsafe { transmute }</code></td><td><code>any</code>, <code>as</code> casts</td></tr>
</table>
<p>The insight: Rust narrows by <em>binding</em> (each match arm introduces a new
name with a new type), TypeScript narrows by <em>flow analysis</em> (the compiler
re-types the same variable per branch). Both are compiler-verified — but a type
predicate is trusted, not checked. <code>value is User</code> with a sloppy body
is the moral equivalent of a bad <code>unsafe</code> block: the compiler will
believe you, and the crash happens somewhere else.</p>`,
};
