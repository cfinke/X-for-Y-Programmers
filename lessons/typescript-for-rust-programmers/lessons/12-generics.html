<script>
const LESSON = {
  number: 12,
  title: "Generics",

  intro: `
<p>Generics will feel like coming home: <code>fn first&lt;T&gt;(items: &amp;[T])
-&gt; Option&lt;&amp;T&gt;</code> becomes <code>function firstItem&lt;T&gt;(items:
T[]): T | undefined</code>. Same angle brackets, same type parameter, same
inference at the call site — minus the lifetimes and borrows, because there is
nothing to borrow. Trait bounds translate too: where Rust writes
<code>T: Display + Clone</code>, TypeScript writes <code>T extends ...</code>
with a <em>structural</em> bound — any shape the type must satisfy.</p>
<table>
  <tr><th>Rust</th><th>TypeScript</th></tr>
  <tr><td><code>fn first&lt;T&gt;(items: &amp;[T]) -&gt; Option&lt;&amp;T&gt;</code></td><td><code>function firstItem&lt;T&gt;(items: T[]): T | undefined</code></td></tr>
  <tr><td><code>fn f&lt;T: Named + Clone&gt;(x: T)</code></td><td><code>function f&lt;T extends { name: string }&gt;(x: T)</code></td></tr>
  <tr><td><code>first::&lt;i32&gt;(&amp;v)</code> (turbofish)</td><td><code>firstItem&lt;number&gt;(v)</code> — rarely needed, inference wins</td></tr>
  <tr><td>Monomorphized: one copy per concrete type</td><td>Erased: one function, types vanish at compile time</td></tr>
  <tr><td>Field-access generics need macros</td><td><code>K extends keyof T</code> → <code>T[K]</code>, built in</td></tr>
</table>
<p>The key mechanical difference: Rust <em>monomorphizes</em> — the compiler
stamps out a specialized copy of the function for every concrete type. TypeScript
<em>erases</em> — the types are checked, then deleted, and one plain JavaScript
function runs for every type. Neither costs anything at runtime, but erasure means
no specialization: you cannot ask <code>T</code> what it is at runtime. In exchange
you get tricks Rust cannot express without macros, like <code>K extends keyof
T</code>: "K is the name of some field of T, and the result has that field's
type."</p>`,

  rust: `fn first<T>(items: &[T]) -> Option<&T> {
    items.first()
}

// A bound: T must implement Named to be eligible.
trait Named {
    fn name(&self) -> &str;
}

fn longest_name<T: Named>(items: &[T]) -> Option<&T> {
    items.iter().max_by_key(|item| item.name().len())
}

// "Give me field K of every T, typed as T's field type" —
// Rust can't express this without a proc macro. TypeScript
// spells it: pluck<T, K extends keyof T>(items: T[], key: K): T[K][]`,

  task: `
<p>Port the generic toolkit:</p>
<ol>
  <li>Write <code>firstItem&lt;T&gt;(items: T[]): T | undefined</code> that
      returns the first element, or <code>undefined</code> for an empty array.
      No <code>Option</code>, no borrow — the union type <em>is</em> the
      <code>Option</code> (lesson 6).</li>
  <li>Write <code>longestName&lt;T extends { name: string }&gt;(items: T[]):
      T | undefined</code> that returns the item whose <code>.name</code> is
      longest. The <code>extends</code> clause is your trait bound — but
      structural: any object with a <code>name: string</code> qualifies, no
      impl required.</li>
  <li>Write <code>pluck&lt;T, K extends keyof T&gt;(items: T[], key: K):
      T[K][]</code> that maps each item to its <code>key</code> field. This is
      the one Rust needs a macro for: pass <code>"age"</code> and the compiler
      knows the result is <code>number[]</code>.</li>
</ol>
<p>Let inference do its job at call sites — no turbofish required.</p>`,

  starter: `// 1. fn first<T>(items: &[T]) -> Option<&T>  becomes...
function firstItem(items) {
  // TODO: add the <T> type parameter, type items as T[], return T | undefined
  return undefined;
}

// 2. Trait bound -> structural bound: T extends { name: string }
function longestName(items) {
  // TODO: return the item with the longest .name (undefined if empty)
  return undefined;
}

// 3. The keyof trick: K names a field of T, T[K] is that field's type.
//    pluck([{ name: "Ada", age: 36 }], "age") -> [36]
function pluck(items, key) {
  // TODO: pluck<T, K extends keyof T>(items: T[], key: K): T[K][]
  return [];
}
`,

  exportNames: ["firstItem", "longestName", "pluck"],

  requirements: [
    { pattern: /<T\b/, message: "Declare a generic type parameter <T> — same angle brackets as Rust" },
    { pattern: /extends\s+\{\s*name/, message: "Give longestName a structural bound: T extends { name: string }" },
    { pattern: /extends\s+keyof/, message: "Constrain pluck's key with K extends keyof T" },
  ],

  tests: [
    { name: "firstItem([10, 20, 30]) returns 10", run: (x) => expectEqual(x.firstItem([10, 20, 30]), 10) },
    { name: "firstItem([]) returns undefined", run: (x) => expectEqual(x.firstItem([]), undefined) },
    { name: 'firstItem(["a", "b"]) works for strings too — one T fits all', run: (x) => expectEqual(x.firstItem(["a", "b"]), "a") },
    { name: 'longestName picks "Katherine" over "Ada"', run: (x) => {
        const people = [{ name: "Ada" }, { name: "Katherine" }, { name: "Grace" }];
        expectEqual(x.longestName(people).name, "Katherine");
      } },
    { name: "longestName([]) returns undefined", run: (x) => expectEqual(x.longestName([]), undefined) },
    { name: 'pluck(users, "age") returns [36, 45]', run: (x) => {
        const users = [{ name: "Ada", age: 36 }, { name: "Grace", age: 45 }];
        expectDeepEqual(x.pluck(users, "age"), [36, 45]);
        expectDeepEqual(x.pluck(users, "name"), ["Ada", "Grace"]);
      } },
  ],

  solution: `function firstItem<T>(items: T[]): T | undefined {
  return items.length > 0 ? items[0] : undefined;
}

function longestName<T extends { name: string }>(items: T[]): T | undefined {
  let best: T | undefined = undefined;
  for (const item of items) {
    if (best === undefined || item.name.length > best.name.length) {
      best = item;
    }
  }
  return best;
}

function pluck<T, K extends keyof T>(items: T[], key: K): T[K][] {
  return items.map((item) => item[key]);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>TypeScript</th></tr>
  <tr><td>Generic function</td><td><code>fn first&lt;T&gt;(items: &amp;[T])</code></td><td><code>function firstItem&lt;T&gt;(items: T[])</code></td></tr>
  <tr><td>Bound</td><td><code>T: Display + Clone</code></td><td><code>T extends { ... }</code> (structural, no impl)</td></tr>
  <tr><td>Multiple bounds</td><td><code>T: A + B</code></td><td><code>T extends A &amp; B</code></td></tr>
  <tr><td>Explicit instantiation</td><td><code>f::&lt;i32&gt;(x)</code> turbofish</td><td><code>f&lt;number&gt;(x)</code> — rare; inference covers it</td></tr>
  <tr><td>Compilation strategy</td><td>Monomorphization (copies per type)</td><td>Erasure (types deleted, one function)</td></tr>
  <tr><td>Field-name generics</td><td>Proc macro territory</td><td><code>K extends keyof T</code>, result <code>T[K]</code></td></tr>
</table>
<p>Erasure is why there is no <code>typeof T</code> branch inside a generic
TypeScript function: at runtime the type parameter simply does not exist. If
you catch yourself wanting specialization, take a value (or a discriminant
field) instead of a type. And <code>keyof</code> is the payoff of the
structural world — a whole category of "typed field access" helpers
(<code>pluck</code>, <code>sortBy</code>, <code>groupBy</code>) that Rust
handles with macros or trait gymnastics falls out of two keywords here.</p>`,
};
