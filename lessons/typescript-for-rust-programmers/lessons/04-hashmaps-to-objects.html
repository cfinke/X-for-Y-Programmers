  number: 4,
  title: "HashMaps → Objects",

  intro: `
<p>Where Rust reaches for <code>HashMap::new()</code> plus a run of
<code>insert</code> calls, JavaScript's workhorse is the plain object
literal: <code>{ serde: 9000, tokio: 7500 }</code>. Keys are strings, and
the type that describes "string keys mapped to numbers" is
<code>Record&lt;string, number&gt;</code> — read it as
<code>HashMap&lt;String, u64&gt;</code> with the numeric precision
laundered away.</p>
<table>
  <tr><th>Rust</th><th>TypeScript</th></tr>
  <tr><td><code>let mut m = HashMap::new();</code><br><code>m.insert("serde".into(), 9000);</code></td><td><code>const m: Record&lt;string, number&gt; = { serde: 9000 };</code></td></tr>
  <tr><td><code>m.get("k")</code> → <code>Option&lt;&amp;V&gt;</code></td><td><code>m["k"]</code> → <code>number | undefined</code></td></tr>
  <tr><td><code>m.get("k").copied().unwrap_or(0)</code></td><td><code>m["k"] ?? 0</code></td></tr>
  <tr><td><code>m.contains_key("k")</code></td><td><code>"k" in m</code></td></tr>
  <tr><td><code>for (k, v) in &amp;m { }</code></td><td><code>for (const [k, v] of Object.entries(m)) { }</code></td></tr>
</table>
<p>The lookup story keeps Rust's honesty about absence: a missing key gives
<code>undefined</code>, the unwrapped cousin of <code>None</code> — no
borrow, no <code>&amp;V</code>, just the value or not. (Full disclosure:
by default the compiler types <code>Record</code> lookups as plain
<code>number</code> and trusts you; turn on
<code>noUncheckedIndexedAccess</code> to make it <code>number |
undefined</code>, the strictness you actually want.)
<code>unwrap_or(default)</code> becomes the <code>??</code> operator, and
iteration goes through <code>Object.entries</code>, which hands back
<code>[key, value]</code> pairs in insertion order — a determinism
<code>HashMap</code> never promised you.</p>`,

  rust: `use std::collections::HashMap;

let mut downloads: HashMap<String, u64> = HashMap::new();
downloads.insert("serde".to_string(), 9000);
downloads.insert("tokio".to_string(), 7500);

let serde = downloads.get("serde");   // Some(&9000)
let rocket = downloads.get("rocket")  // None...
    .copied()
    .unwrap_or(0);                    // ...so 0

let known = downloads.contains_key("tokio"); // true

for (name, count) in &downloads {
    println!("{name}: {count}"); // order not guaranteed!
}`,

  task: `
<p>Port the HashMap code:</p>
<ol>
  <li>Declare <code>downloads</code> as a <code>const</code> of type
      <code>Record&lt;string, number&gt;</code> — an object literal with
      <code>serde: 9000</code> and <code>tokio: 7500</code>. No
      <code>::new()</code>, no <code>insert</code>.</li>
  <li>Write <code>getCount(counts: Record&lt;string, number&gt;, name: string): number</code>
      — return <code>counts[name] ?? 0</code>. That <code>??</code> is
      <code>unwrap_or(0)</code>.</li>
  <li>Write <code>hasCrate(counts: Record&lt;string, number&gt;, name: string): boolean</code>
      — use the <code>in</code> operator, the local spelling of
      <code>contains_key</code>.</li>
  <li>Write <code>entryLines(counts: Record&lt;string, number&gt;): string[]</code>
      — loop over <code>Object.entries(counts)</code> and return an array of
      <code>"name: count"</code> strings.</li>
</ol>`,

  starter: `// 1. HashMap::new() + insert  ->  one object literal, typed Record<string, number>
// TODO: declare downloads with serde: 9000 and tokio: 7500


// 2. .get(k).copied().unwrap_or(0)  ->  counts[name] ?? 0

  return 0; // TODO

// 3. .contains_key(k)  ->  k in counts

  return false; // TODO
}

// 4. for (k, v) in &m  ->  for (const [k, v] of Object.entries(m))
function entryLines(counts: Record<string, number>): string[] {
  const lines: string[] = [];
  // TODO: push "name: count" for each entry
  return lines;
}
`,

  exportNames: ["downloads", "getCount", "hasCrate", "entryLines"],

  requirements: [
    { pattern: /downloads\s*:\s*Record\s*<\s*string\s*,\s*number\s*>/, message: "Type downloads as Record<string, number> — the HashMap<String, u64> of TypeScript" },
    { pattern: /\?\?/, message: "Use the ?? operator in getCount — it is unwrap_or for null/undefined" },
    { pattern: /\bin\s+counts/, message: "Use the in operator in hasCrate (name in counts) — contains_key, spelled infix" },
    { pattern: /Object\.(entries|keys)\s*\(/, message: "Iterate with Object.entries(...) (or Object.keys) in entryLines" },
  ],

  tests: [
    { name: "downloads is { serde: 9000, tokio: 7500 }", run: (x) => expectDeepEqual(x.downloads, { serde: 9000, tokio: 7500 }) },
    { name: 'getCount(downloads, "serde") is 9000', run: (x) => expectEqual(x.getCount(x.downloads, "serde"), 9000) },
    { name: 'getCount(downloads, "rocket") is 0 — ?? supplied the default, like unwrap_or', run: (x) => expectEqual(x.getCount(x.downloads, "rocket"), 0) },
    { name: 'hasCrate finds "tokio" but not "rocket"', run: (x) => { expectEqual(x.hasCrate(x.downloads, "tokio"), true); expectEqual(x.hasCrate(x.downloads, "rocket"), false); } },
    { name: 'entryLines({ a: 1, b: 2 }) is ["a: 1", "b: 2"] — insertion order, unlike HashMap', run: (x) => expectDeepEqual(x.entryLines({ a: 1, b: 2 }), ["a: 1", "b: 2"]) },
  ],

  solution: `const downloads: Record<string, number> = {
  serde: 9000,
  tokio: 7500,
};

function getCount(counts: Record<string, number>, name: string): number {
  return counts[name] ?? 0; // unwrap_or(0)
}

function hasCrate(counts: Record<string, number>, name: string): boolean {
  return name in counts; // contains_key
}

function entryLines(counts: Record<string, number>): string[] {
  const lines: string[] = [];
  for (const [name, count] of Object.entries(counts)) {
    lines.push(\`\${name}: \${count}\`);
  }
  return lines;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>TypeScript</th></tr>
  <tr><td>Build</td><td><code>HashMap::new()</code> + <code>insert</code></td><td>object literal <code>{ k: v }</code></td></tr>
  <tr><td>Type</td><td><code>HashMap&lt;String, u64&gt;</code></td><td><code>Record&lt;string, number&gt;</code></td></tr>
  <tr><td>Lookup</td><td><code>m.get(&amp;k)</code> → <code>Option&lt;&amp;V&gt;</code></td><td><code>m[k]</code> → value or <code>undefined</code>, no borrow</td></tr>
  <tr><td>Default</td><td><code>.unwrap_or(0)</code></td><td><code>?? 0</code></td></tr>
  <tr><td>Membership</td><td><code>m.contains_key(&amp;k)</code></td><td><code>k in m</code></td></tr>
  <tr><td>Iterate pairs</td><td><code>for (k, v) in &amp;m</code> — arbitrary order</td><td><code>Object.entries(m)</code> — insertion order</td></tr>
</table>
<p>One instinct to port carefully: <code>??</code> only falls through on
<code>null</code> and <code>undefined</code>, so it really is
<code>unwrap_or</code> — a stored <code>0</code> or <code>""</code>
survives. Its older sibling <code>||</code> falls through on <em>any</em>
falsy value and would silently replace a legitimate <code>0</code>; prefer
<code>??</code> the way you'd prefer <code>unwrap_or</code> over an ad-hoc
truthiness check. When your keys aren't strings — or you insert and delete
heavily — TypeScript also has a real <code>Map&lt;K, V&gt;</code> class,
the closer <code>HashMap</code> analogue; plain objects are the idiomatic
default for string-keyed records like this one.</p>`,
};
