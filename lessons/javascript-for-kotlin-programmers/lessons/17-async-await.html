  number: 17,
  title: "Async & Await",

  intro: `
<p>In Kotlin, a <code>suspend fun</code> is typed to return <code>T</code> directly
— the suspension is invisible in the signature, and the compiler tracks the
coroutine machinery for you behind the scenes. JavaScript makes the equivalent
machinery explicit instead: an <code>async</code> function always returns a
<code>Promise</code> object, and <code>await</code> is the operator that suspends
execution until that promise settles and hands you the value inside. There is no
separate coroutine builder or dispatcher to configure — the same event loop, the
same microtask queue, run everything. At runtime, <code>await</code> works on
<em>any</em> thenable and hands you whatever value it settles to, number, string,
object, or <code>undefined</code>.</p>
<table>
  <tr><th>Kotlin</th><th>JavaScript</th></tr>
  <tr><td><code>suspend fun f(): Int</code></td><td><code>async function f()</code></td></tr>
  <tr><td><code>val n: Int = f()</code></td><td><code>const n = await f();</code></td></tr>
  <tr><td><code>awaitAll(a, b)</code> (via <code>async {}</code>)</td><td><code>Promise.all([a, b])</code></td></tr>
  <tr><td>checked/unchecked exception in <code>catch</code></td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today. First, <code>await</code> in sequence is
<em>serial</em>: each line waits for the previous promise to settle before the next
even starts — much like calling two <code>suspend fun</code>s back to back without
wrapping them in separate coroutines. To run independent work concurrently you hand
the promises to <code>Promise.all</code>, which waits for all of them and resolves
to an array of their results — the JavaScript analog of launching several
<code>async {}</code> blocks and calling <code>awaitAll</code>. Second, a rejected
promise surfaces as a thrown value at the <code>await</code>, so a plain
<code>try/catch</code> catches it — and if you do not catch it, it propagates out of
your <code>async</code> function as a rejected promise the caller must handle.</p>`,

  kotlin: `suspend fun double(n: Int): Int {
    return n * 2
}

suspend fun sumDoubled(a: Int, b: Int): Int = coroutineScope {
    val x = async { double(a) }
    val y = async { double(b) }
    x.await() + y.await()
}

suspend fun safeDouble(n: Int): Int {
    return try {
        double(n)
    } catch (e: Exception) {
        0
    }
}`,

  task: `
<p>All promises here resolve immediately — no timers. Write four functions:</p>
<ol>
  <li><code>double(n)</code> — an <code>async</code> function that returns

  <li><code>sumSequential(a, b)</code> — <code>await</code> <code>double(a)</code>,

  <li><code>sumConcurrent(nums)</code> — given an array of numbers, run every

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>JavaScript</th></tr>
  <tr><td>Return of async fn</td><td><code>suspend fun</code> returns <code>T</code> directly</td><td>a promise; contents unlabeled</td></tr>
  <tr><td>Awaited value</td><td>the declared return type <code>T</code></td><td>whatever it settles to</td></tr>
  <tr><td>Serial awaits</td><td>two sequential <code>suspend</code> calls</td><td>b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td><code>async {}</code> + <code>awaitAll(...)</code></td><td><code>Promise.all([...])</code>; resolves to a results array</td></tr>
  <tr><td>Caught rejection</td><td><code>catch (e: Exception)</code></td><td><code>catch (e)</code> — any thrown value</td></tr>
</table>
<p>The most common runtime performance bug that is easy to fall into coming from
Kotlin: awaiting independent work in a loop or in sequence when it could run
concurrently, the same trap as forgetting to wrap two <code>suspend</code> calls in
separate <code>async {}</code> builders. Two serial <code>await</code>s take as
long as the sum of both promises; <code>Promise.all</code> takes as long as the
slowest one. Reach for <code>Promise.all</code> whenever the tasks do not depend on
each other.</p>
<p>On errors: a rejected promise becomes a thrown value at its <code>await</code>.
If nothing catches it, your <code>async</code> function returns a
<em>rejected</em> promise — the failure propagates to whoever awaits you, much like
an uncaught exception in a <code>suspend fun</code> propagating to its caller.
Unlike Kotlin, JavaScript has no checked exceptions and no compile-time exception
type at all, so a runtime <code>catch (e)</code> must be ready for anything: an
<code>Error</code>, a string, even <code>undefined</code>.</p>`,
