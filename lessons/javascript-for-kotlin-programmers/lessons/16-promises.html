  title: "Promises",

  intro: `
<p>In Kotlin you'd reach for <code>CompletableFuture&lt;T&gt;</code> (or a
coroutine's <code>Deferred&lt;T&gt;</code>) and the compiler would track that
<code>T</code> for you all the way through <code>thenApply</code>. But like any
JVM generic, that type parameter is erased at runtime — a completed
<code>CompletableFuture&lt;Int&gt;</code> is, once running, just an object
holding a value. JavaScript's Promise is the same idea with no compile-time
layer at all: an object with a settled state (<em>pending</em>,
<em>fulfilled</em>, or <em>rejected</em>) and a value. Nothing checks that the
value matches anything; <code>then</code> hands you whatever the previous step
actually produced.</p>
<table>
  <tr><th>Kotlin</th><th>JavaScript</th></tr>
  <tr><td><code>CompletableFuture.completedFuture(1)</code> — type erased at runtime</td><td><code>Promise.resolve(1)</code> — value is just <code>1</code></td></tr>
  <tr><td><code>.thenApply { n: Int -&gt; ... }</code></td><td><code>.then((n) =&gt; ...)</code> — <code>n</code> is whatever came through</td></tr>
  <tr><td>failure is a <code>Throwable</code>; not tracked in the future's type</td><td>reject with anything; <code>catch</code> receives it as-is</td></tr>
  <tr><td><code>CompletableFuture.allOf(...)</code> returns <code>CompletableFuture&lt;Void&gt;</code> — you re-<code>join()</code> each future yourself</td><td><code>Promise.all([...])</code> resolves to a plain array</td></tr>
</table>
<p>Two runtime facts that hold no matter how the types looked. First,
<code>then</code> always returns a <em>new</em> Promise, and if your callback
returns a value that value becomes the next Promise's fulfillment — returning a
Promise flattens it, there is no <code>Promise&lt;Promise&lt;T&gt;&gt;</code>,
the same way <code>thenCompose</code> flattens a nested
<code>CompletableFuture</code> while plain <code>thenApply</code> would not (the
<code>map</code> vs <code>flatMap</code> distinction you already know). Second,
a <code>throw</code> inside a <code>then</code> callback turns into a rejection
of the returned Promise, which is why <code>catch</code> can sit at the end of a
chain and catch anything above it.</p>`,

  kotlin: `fun double(n: Int): CompletableFuture<Int> {
    return CompletableFuture.completedFuture(n * 2)
}

fun safeDivide(a: Int, b: Int): CompletableFuture<Int> {
    if (b == 0) return CompletableFuture.failedFuture(IllegalArgumentException("divide by zero"))
    return CompletableFuture.completedFuture(a / b)
}

fun firstDone(tasks: List<CompletableFuture<Int>>): CompletableFuture<Int> {
    return CompletableFuture.anyOf(*tasks.toTypedArray()).thenApply { it as Int }
}`,

  task: `

<ol>
  <li><code>double(n)</code> — return a Promise that <strong>fulfills</strong> with
      <code>n * 2</code> (use <code>Promise.resolve</code>).</li>
  <li><code>safeDivide(a, b)</code> — return a Promise. If <code>b</code> is
      <code>0</code>, <strong>reject</strong> with <code>new Error("divide by zero")</code>
      (use <code>Promise.reject</code>); otherwise resolve with <code>a / b</code>.</li>
  <li><code>chainDouble(n)</code> — call <code>double(n)</code> and use

  <li><code>sumAll(promises)</code> — use <code>Promise.all</code> to wait for an

      and resolve with an array of strings: <code>"ok:&lt;value&gt;"</code> for each
      fulfilled entry and <code>"err:&lt;message&gt;"</code> for each rejected one.</li>
</ol>`,

  solution: `function double(n) {
  return Promise.resolve(n * 2);
}

function safeDivide(a, b) {
  if (b === 0) return Promise.reject(new Error("divide by zero"));
  return Promise.resolve(a / b);
}

function chainDouble(n) {
  return double(n).then((d) => d + 1);
}

function divideOrDefault(a, b, fallback) {
  return safeDivide(a, b).catch(() => fallback);
}

function sumAll(promises) {
  return Promise.all(promises).then((values) => values.reduce((t, v) => t + v, 0));
}

function describeSettled(promises) {
  return Promise.allSettled(promises).then((results) =>
    results.map((r) =>
      r.status === "fulfilled" ? "ok:" + r.value : "err:" + r.reason.message
    )
  );
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Already-settled value</td><td><code>CompletableFuture.completedFuture(1)</code></td><td><code>Promise.resolve(1)</code></td></tr>
  <tr><td>Rejection value</td><td>a <code>Throwable</code>, not part of the future's type</td><td>whatever you rejected with</td></tr>
  <tr><td>Chaining</td><td><code>thenApply</code> wraps (like <code>map</code>); <code>thenCompose</code> flattens (like <code>flatMap</code>)</td><td><code>then</code> returns a new Promise; returned values flatten</td></tr>
  <tr><td>Wait for all</td><td><code>CompletableFuture.allOf(...)</code> → <code>CompletableFuture&lt;Void&gt;</code>, read each future's value yourself</td><td>resolves to a plain array, rejects on first failure</td></tr>
  <tr><td>Wait for all, keep errors</td><td>no built-in equivalent — <code>handle()</code> each future individually</td><td><code>Promise.allSettled</code> → <code>{status, value|reason}[]</code></td></tr>
  <tr><td>First to settle</td><td><code>CompletableFuture.anyOf(...)</code></td><td>settles with the first result, win or lose</td></tr>
</table>
<p>Reach for <code>Promise.all</code> when you need every result and one failure
should sink the whole thing; reach for <code>Promise.allSettled</code> when you
want to inspect each outcome — its result objects are <code>{ status:
"fulfilled", value }</code> or <code>{ status: "rejected", reason }</code>.
<code>Promise.race</code> settles as soon as the first input does, whether that
first one fulfills or rejects.</p>
<p>Runtime gotcha that no type system saves you from, in Kotlin or JavaScript:
<code>Promise.reject(x)</code> creates an already-rejected Promise, and if
nothing ever attaches a <code>catch</code> to it you get an "unhandled
rejection" warning — much like an exceptionally-completed
<code>CompletableFuture</code> that nobody ever calls <code>.join()</code> or
<code>.get()</code> on. And because a thrown error inside <code>then</code>
becomes a rejection, a single trailing <code>.catch</code> (or
<code>try/await/catch</code>) covers the whole chain above it.</p>`,
