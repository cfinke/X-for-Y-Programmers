<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance",

  intro: `
<p>Kotlin's class hierarchies compile down to the same prototype-based
inheritance JavaScript has always had — but a lot of what Kotlin makes the
compiler enforce simply isn't there at runtime. <code>extends</code> (Kotlin's
colon-based supertype list), <code>super</code>, method overriding, and
<code>instanceof</code>'s cousin (<code>is</code>) all have direct runtime
analogues. What disappears is everything <em>around</em> the runtime
machinery: visibility modifiers (<code>public</code>/<code>private</code>/<code>protected</code>),
the <code>open</code>/<code>override</code> keywords, <code>abstract</code>,
constructor-parameter properties, <code>interface</code> implementation, and
any guarantee that a subclass actually called its superclass constructor.</p>
<table>
  <tr><th>Kotlin</th><th>JavaScript</th></tr>
  <tr><td><code>class Dog(...) : Animal(...)</code></td><td><code>class Dog extends Animal {}</code></td></tr>
  <tr><td><code>class Dog(breed: String) : ...</code></td><td>you assign <code>this.breed</code> yourself</td></tr>
  <tr><td><code>protected val name: String</code></td><td>just a normal public property</td></tr>
  <tr><td><code>abstract class</code> / <code>abstract fun</code></td><td>no such thing — plain class</td></tr>
  <tr><td>compiler enforces the superclass constructor call</td><td>runtime throws if you touch <code>this</code> first</td></tr>
</table>
<p>Two runtime rules matter. First, in a subclass constructor you must call
<code>super(...)</code> before you read or write <code>this</code> — the engine
throws a <code>ReferenceError</code> otherwise. Second, <code>instanceof</code>
walks the prototype chain, so a <code>Dog</code> is genuinely an
<code>Animal</code> at run time, not just to the compiler's type system.</p>`,

  kotlin: `open class Animal(open val name: String) {
  open fun speak(): String {
    return "\${name} makes a sound"
  }
  open fun describe(): String {
    return "\${name} is an animal"
  }
}

class Dog(name: String, val breed: String) : Animal(name) {
  override fun speak(): String {
    return "\${name} barks"
  }
  override fun describe(): String {
    return "\${super.describe()}, specifically a \${breed}"
  }
}`,

  task: `
<p>Build the same class hierarchy in plain JavaScript — no annotations, no
access modifiers, no constructor-parameter properties (assign fields yourself):</p>
<ol>
  <li>A base class <code>Animal</code> whose constructor takes <code>name</code>
      and stores it on <code>this.name</code>. Give it <code>speak()</code>
      returning <code>"&lt;name&gt; makes a sound"</code> and
      <code>describe()</code> returning <code>"&lt;name&gt; is an animal"</code>.</li>
  <li>A subclass <code>Dog</code> that <code>extends Animal</code>. Its
      constructor takes <code>name</code> and <code>breed</code>, calls
      <code>super(name)</code>, then stores <code>this.breed</code>. Override
      <code>speak()</code> to return <code>"&lt;name&gt; barks"</code>, and
      override <code>describe()</code> to call <code>super.describe()</code> and
      append <code>", specifically a &lt;breed&gt;"</code>.</li>
  <li>A function <code>identify(x)</code> that returns <code>"dog"</code> if
      <code>x</code> is a <code>Dog</code>, <code>"animal"</code> if it is any
      other <code>Animal</code>, and <code>"unknown"</code> otherwise — using
      <code>instanceof</code>.</li>
</ol>`,

  starter: `// 1. Base class
class Animal {
  constructor(name) {
    // TODO: store name
  }
  speak() {
    // TODO
    return "";
  }
  describe() {
    // TODO
    return "";
  }
}

// 2. Subclass that overrides and calls super
class Dog extends Animal {
  constructor(name, breed) {
    // TODO: call super, then store breed
  }
  speak() {
    // TODO
    return "";
  }
  describe() {
    // TODO: reuse super.describe()
    return "";
  }
}

// 3. identify(x) using instanceof
function identify(x) {
  // TODO
  return "";
}
`,

  exportNames: ["Animal", "Dog", "identify"],

  requirements: [
    { pattern: /class\s+Dog\s+extends\s+Animal/, message: "Dog must extend Animal" },
    { pattern: /super\s*\(/, message: "Call super(...) in the Dog constructor" },
    { pattern: /super\.describe\s*\(/, message: "Dog.describe() must call super.describe()" },
    { pattern: /instanceof/, message: "Use instanceof inside identify" },
  ],

  tests: [
    { name: 'Animal.speak() uses the base behavior', run: (x) => expectEqual(new x.Animal("Rex").speak(), "Rex makes a sound") },
    { name: 'Dog overrides speak()', run: (x) => expectEqual(new x.Dog("Rex", "Lab").speak(), "Rex barks") },
    { name: 'super(name) sets the inherited field', run: (x) => expectEqual(new x.Dog("Rex", "Lab").name, "Rex") },
    { name: 'Dog.describe() calls super.describe()', run: (x) => expectEqual(new x.Dog("Rex", "Lab").describe(), "Rex is an animal, specifically a Lab") },
    { name: 'a Dog is an Animal (prototype chain)', run: (x) => expectTruthy(new x.Dog("Rex", "Lab") instanceof x.Animal) },
    { name: 'identify distinguishes Dog, Animal, and other', run: (x) => {
        expectEqual(x.identify(new x.Dog("Rex", "Lab")), "dog");
        expectEqual(x.identify(new x.Animal("Generic")), "animal");
        expectEqual(x.identify(42), "unknown");
    } },
  ],

  solution: `class Animal {
  constructor(name) {
    this.name = name;
  }
  speak() {
    return \`\${this.name} makes a sound\`;
  }
  describe() {
    return \`\${this.name} is an animal\`;
  }
}

class Dog extends Animal {
  constructor(name, breed) {
    super(name);
    this.breed = breed;
  }
  speak() {
    return \`\${this.name} barks\`;
  }
  describe() {
    return \`\${super.describe()}, specifically a \${this.breed}\`;
  }
}

function identify(x) {
  if (x instanceof Dog) return "dog";
  if (x instanceof Animal) return "animal";
  return "unknown";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>JavaScript</th></tr>
  <tr><td>Subclass</td><td><code>class Dog(...) : Animal(...)</code></td><td><code>class Dog extends Animal {}</code></td></tr>
  <tr><td>Base constructor</td><td><code>: Animal(name)</code> in the header</td><td><code>super(name)</code> (required before <code>this</code>)</td></tr>
  <tr><td>Field from a param</td><td><code>class Dog(val breed: String)</code></td><td><code>this.breed = breed;</code></td></tr>
  <tr><td>Call base method</td><td><code>super.describe()</code></td><td><code>super.describe()</code> (same)</td></tr>
  <tr><td>Runtime type test</td><td><code>x is Animal</code> / smart cast</td><td><code>x instanceof Animal</code></td></tr>
</table>
<p>Order matters in <code>identify</code>: check <code>instanceof Dog</code> before
<code>instanceof Animal</code>, because a <code>Dog</code> passes both — that is
what inheritance means at runtime. <code>instanceof</code> is checking whether
<code>Animal.prototype</code> appears anywhere on <code>x</code>'s prototype
chain, so it works the same way Kotlin's <code>is</code> does, just without any
compile-time smart-casting to help you afterward.</p>
<p>One gotcha the compiler used to hide: forget <code>super(name)</code> and the
program does not silently misbehave — the engine throws
<code>ReferenceError: must call super constructor</code> the moment you touch
<code>this</code>. And because there are no <code>private</code>/<code>protected</code>
keywords at runtime, every field you set is publicly reachable; naming
conventions or <code>#private</code> fields are your only real fences — Kotlin's
<code>open</code>/<code>override</code> requirement also has no runtime
counterpart, so any JavaScript method can override any parent method silently.</p>`,
};
</script>
