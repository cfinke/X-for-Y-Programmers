const LESSON = {
  number: 18,
  title: "Modules",

  intro: `
<p>JavaScript's <code>export</code>/<code>import</code> syntax has no direct
counterpart in Kotlin. Kotlin organizes code into packages, and visibility
modifiers — <code>public</code>, <code>internal</code>, <code>private</code> —
decide what a caller can see, all resolved by the compiler before a single
instruction runs. A JavaScript module is a different shape entirely: it is
just a file, and the module system is a runtime feature. "Exporting" a value
literally binds it onto the module's public surface, and "importing" reads
that binding back. Kotlin's public top-level declarations are the closest
match to a named export — but there is no Kotlin equivalent of a
<em>default</em> export, since every Kotlin import already names the exact
declaration you want.</p>
<table>
  <tr><th>Kotlin</th><th>JavaScript (runtime)</th></tr>
  <tr><td><code>const val TAX_RATE: Double = 0.1</code> (top-level, public)</td><td><code>export const TAX_RATE = 0.1;</code></td></tr>
  <tr><td><code>internal val TAX_RATE = 0.1</code> (module-private)</td><td>no direct match — simply do not export it</td></tr>
  <tr><td><code>import pricing.TAX_RATE</code></td><td><code>import { TAX_RATE } from "./m";</code></td></tr>
  <tr><td>no "default declaration" concept</td><td><code>export default function total() {}</code></td></tr>
</table>
<p>The mental shift: a named export is a <em>value</em> you name, and the
default export is just the one binding the module hands back when you import
it without braces — a JavaScript-only idea with no Kotlin parallel. Because
Kotlin has no default declarations, every import you write already lines up
with a name declared in the source; JavaScript's braces-vs-no-braces
distinction is worth memorizing precisely because it is unfamiliar.</p>`,

  kotlin: `// Pricing.kt
package pricing

const val TAX_RATE: Double = 0.1

fun addTax(cents: Int): Int {
    return Math.round(cents * (1 + TAX_RATE)).toInt()
}

fun formatUSD(cents: Int): String {
    return "$" + "%.2f".format(cents / 100.0)
}

// Kotlin has no "default declaration" — every top-level function is
// imported by name, e.g. import pricing.total
fun total(items: List<Int>): Int {
    return items.sum()
}`,

  task: `
<p>Build a tiny pricing module using plain-JavaScript exports. Export every
symbol directly (no type annotations), and give the module one default export:</p>
<ol>
  <li><strong>Named const export</strong>: <code>TAX_RATE</code> = <code>0.1</code>.</li>
  <li><strong>Named function export</strong>: <code>addTax(cents)</code> returns
      the price with tax added, rounded to a whole number of cents
      (<code>Math.round(cents * (1 + TAX_RATE))</code>).</li>
  <li><strong>Named function export</strong>: <code>formatUSD(cents)</code>
      returns a string like <code>"$12.34"</code> (dollars with two decimals).</li>
  <li><strong>Default export</strong>: <code>total(items)</code>, a function that
      sums an array of cent amounts and returns the total (<code>0</code> for an
      empty array). Export it with <code>export default</code>.</li>
</ol>`,

  starter: `// 1. named const export
export const TAX_RATE = 0.1;

// 2. named function export: price with tax, rounded to whole cents
export function addTax(cents) {
  // TODO
  return 0;
}

// 3. named function export: cents -> "$12.34"
export function formatUSD(cents) {
  // TODO
  return "";
}

// 4. default export: sum an array of cent amounts
export default function total(items) {
  // TODO
  return 0;
}
`,

  exportNames: ["TAX_RATE", "addTax", "formatUSD", "total"],

  requirements: [
    { pattern: /export\s+const\s+TAX_RATE/, message: "Use a named const export for TAX_RATE" },
    { pattern: /export\s+function\s+addTax/, message: "Use a named function export for addTax" },
    { pattern: /export\s+default/, message: "Use export default for total" },
  ],

  tests: [
    { name: "TAX_RATE is 0.1", run: (x) => expectEqual(x.TAX_RATE, 0.1) },
    { name: "addTax(100) is 110", run: (x) => expectEqual(x.addTax(100), 110) },
    { name: "addTax(199) rounds to 219", run: (x) => expectEqual(x.addTax(199), 219) },
    { name: 'formatUSD(1234) is "$12.34"', run: (x) => expectEqual(x.formatUSD(1234), "$12.34") },
    { name: 'formatUSD(500) is "$5.00"', run: (x) => expectEqual(x.formatUSD(500), "$5.00") },
    { name: "default export total sums the array", run: (x) => expectEqual(x.total([100, 200, 300]), 600) },
    { name: "default export total([]) is 0", run: (x) => expectEqual(x.total([]), 0) },
  ],

  solution: `export const TAX_RATE = 0.1;

export function addTax(cents) {
  return Math.round(cents * (1 + TAX_RATE));
}

export function formatUSD(cents) {
  return "$" + (cents / 100).toFixed(2);
}

export default function total(items) {
  return items.reduce((sum, cents) => sum + cents, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Named export</td><td><code>const val x = 1</code> (top-level, public)</td><td><code>export const x = 1;</code> (same idea)</td></tr>
  <tr><td>Default export</td><td>no equivalent — Kotlin has no default declarations</td><td>becomes the <code>default</code> binding</td></tr>
  <tr><td>Restricted visibility</td><td><code>internal val x = 1</code> (module-private)</td><td>not exported — simply omit <code>export</code></td></tr>
  <tr><td>Import a named declaration</td><td><code>import pricing.x</code></td><td><code>import { x } from "./m";</code></td></tr>
  <tr><td>Import a default</td><td>no equivalent</td><td><code>import fn from "./m";</code></td></tr>
</table>
<p>A default export is not a special kind of value — it is exposed under the name
<code>default</code>, which is exactly why <code>import Something from "./m"</code>
(no braces) grabs it and lets you rename it freely, while named imports must
match the exported name inside braces. That braces-vs-no-braces distinction has
no Kotlin parallel to reach for: every Kotlin import matches a declared name
exactly. If you are used to <code>internal</code> restricting visibility to a
module, JavaScript's answer is coarser — something is exported or it is not,
with no built-in "package-private" export tier. At runtime, a module is just
an object of live value bindings — no more, no less, and nothing about
visibility survives from source to runtime the way Kotlin's <code>internal</code>
keyword does.</p>`,
};
