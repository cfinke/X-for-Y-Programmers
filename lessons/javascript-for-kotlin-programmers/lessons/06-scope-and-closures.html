<div id="app"></div>
<script>
const LESSON = {
  number: 6,
  title: "Scope & Closures",

  intro: `
<p>Closures work the same way in Kotlin and JavaScript: both let a function
capture variables from the scope it was created in and keep using them even
after that outer function has returned. Kotlin's lambdas close over local
<code>var</code>s and <code>val</code>s just like JavaScript's functions and
arrow functions close over <code>let</code> and <code>const</code>. The syntax
and the compiler diverge; the runtime idea — a function carrying its enclosing
scope around with it — is identical.</p>
<table>
  <tr><th>Kotlin</th><th>JavaScript</th></tr>
  <tr><td><code>fun make(): () -&gt; Int</code></td><td><code>function make()</code></td></tr>
  <tr><td><code>val add = { a: Int -&gt; { b: Int -&gt; a + b } }</code></td><td><code>const add = (a) =&gt; (b) =&gt; a + b;</code></td></tr>
  <tr><td>captured <code>var</code> is a live, mutable binding</td><td>captured var is just a live binding</td></tr>
</table>
<p>The important runtime fact: the inner function captures the <em>binding</em>,
not a snapshot of the value. If the outer variable changes, the closure sees the
change — Kotlin's lambdas capturing a <code>var</code> behave the same way. That
is exactly how a counter can keep incrementing, and how you get truly private
state — no backing field, no <code>class</code>, just a variable that nothing
outside the closure can reach.</p>`,

  kotlin: `fun makeCounter(): () -> Int {
    var count = 0
    return { ++count }
}

val add: (Int) -> (Int) -> Int = { a -> { b -> a + b } }

fun <T, R> once(fn: (T) -> R): (T) -> R {
    var called = false
    var result: R? = null
    return { arg ->
        if (!called) { called = true; result = fn(arg) }
        @Suppress("UNCHECKED_CAST")
        result as R
    }
}`,

  task: `
<p>Write the plain-JavaScript versions. Each relies on a variable captured by a
returned function:</p>
<ol>
  <li><code>makeCounter()</code> returns a function; each call returns the next
      integer starting at <code>1</code>. Two counters must be independent.</li>
  <li><code>add(a)</code> returns a function so that <code>add(2)(3)</code> is
      <code>5</code> — a curried adder factory.</li>
  <li><code>once(fn)</code> returns a wrapped function that runs <code>fn</code>
      only the first time; later calls return the first result and never call
      <code>fn</code> again.</li>
  <li><code>makeAccount(balance)</code> returns an object with
      <code>deposit(n)</code> and <code>getBalance()</code> methods sharing one
      private <code>balance</code> variable — no property on the object holds it.</li>
</ol>`,

  starter: `// 1. makeCounter() -> function returning 1, 2, 3, ...
function makeCounter() {
  // TODO
}

// 2. add(a)(b) -> a + b
function add(a) {
  // TODO
}

// 3. once(fn) -> wrapper that runs fn only the first time
function once(fn) {
  // TODO
}

// 4. makeAccount(balance) -> { deposit, getBalance } over a private balance
function makeAccount(balance) {
  // TODO
}
`,

  exportNames: ["makeCounter", "add", "once", "makeAccount"],

  requirements: [
    { pattern: /return\s+function|=>\s*{|=>[^;]*;?\s*}|return\s*\(/, message: "Return a function (or object of functions) that closes over a variable" },
    { pattern: /let\s+\w+\s*=\s*0|\+\+|count/, message: "Use a captured, mutable variable inside makeCounter" },
  ],

  tests: [
    { name: "makeCounter counts 1, 2, 3", run: (x) => {
      const c = x.makeCounter();
      expectEqual(c(), 1);
      expectEqual(c(), 2);
      expectEqual(c(), 3);
    } },
    { name: "counters are independent", run: (x) => {
      const a = x.makeCounter();
      const b = x.makeCounter();
      expectEqual(a(), 1);
      expectEqual(a(), 2);
      expectEqual(b(), 1);
    } },
    { name: "add(2)(3) is 5", run: (x) => expectEqual(x.add(2)(3), 5) },
    { name: "add is curried and reusable", run: (x) => {
      const add10 = x.add(10);
      expectEqual(add10(5), 15);
      expectEqual(add10(-10), 0);
    } },
    { name: "once runs fn only the first time", run: (x) => {
      let calls = 0;
      const f = x.once(() => { calls++; return 42; });
      expectEqual(f(), 42);
      expectEqual(f(), 42);
      expectEqual(calls, 1);
    } },
    { name: "once returns the first result on later calls", run: (x) => {
      let n = 0;
      const f = x.once(() => ++n);
      expectEqual(f(), 1);
      expectEqual(f(), 1);
    } },
    { name: "makeAccount keeps balance private", run: (x) => {
      const acc = x.makeAccount(100);
      expectEqual(acc.getBalance(), 100);
      acc.deposit(50);
      expectEqual(acc.getBalance(), 150);
      expectEqual(acc.balance, undefined);
    } },
  ],

  solution: `function makeCounter() {
  let count = 0;
  return function () {
    return ++count;
  };
}

function add(a) {
  return function (b) {
    return a + b;
  };
}

function once(fn) {
  let called = false;
  let result;
  return function (...args) {
    if (!called) {
      called = true;
      result = fn(...args);
    }
    return result;
  };
}

function makeAccount(balance) {
  return {
    deposit(n) {
      balance += n;
    },
    getBalance() {
      return balance;
    },
  };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>JavaScript</th></tr>
  <tr><td>Returned function type</td><td><code>(): () -&gt; Int</code></td><td>inferred at runtime</td></tr>
  <tr><td>Private state</td><td><code>private var balance</code> field</td><td>captured variable</td></tr>
  <tr><td>Captured value</td><td>typed binding (must be <code>var</code> to mutate)</td><td>live binding (sees mutations)</td></tr>
  <tr><td>Wrapping a fn</td><td>generic <code>&lt;T, R&gt;</code> function type</td><td><code>...args</code> rest/spread</td></tr>
</table>
<p>The classic gotcha lives here: a closure captures the <em>variable</em>, not
its value at capture time. With <code>var</code> in a loop, every closure shares
the one function-scoped binding and ends up seeing the final value; with
<code>let</code>, each iteration gets a fresh binding — which is what you almost
always want. Kotlin sidesteps this particular trap because <code>for</code> loop
variables are effectively fresh per iteration already, but the underlying rule —
a lambda captures the variable, not a copy — is the same one you already rely on
when a Kotlin lambda mutates an outer <code>var</code>. When you reach for a
class with a private backing field just to hide one value, remember a closure
does the same job with a plain variable that nothing outside can name.</p>`,
};
