const LESSON = {
  number: 15,
  title: "Enums & Variant",

  intro: `
<p>In Go you reach for a block of typed <code>const</code> values (usually built
with <code>iota</code>) when you want a closed set of named constants, and for
an <code>interface</code> implemented by several structs when a value can be
one of several shapes. C++ has direct equivalents: <code>enum class</code> for
the first, and <code>std::variant</code> for the second.</p>
<p>An <code>enum class</code> is a <em>scoped</em> enum. Its members live inside
the enum's name (<code>Color::Red</code>, never a bare <code>Red</code>), and it
does not implicitly convert to its integer value — you must ask with
<code>static_cast&lt;int&gt;</code>. That is stricter than a Go
<code>const</code>-based enum, whose underlying type (often <code>int</code>)
converts freely.</p>
<table>
  <tr><th>Go</th><th>C++</th></tr>
  <tr><td><code>type Color int</code><br><code>const ( Red Color = iota; Green )</code></td><td><code>enum class Color { Red, Green };</code></td></tr>
  <tr><td><code>Red</code></td><td><code>Color::Red</code></td></tr>
  <tr><td><code>int(Red)</code></td><td><code>static_cast&lt;int&gt;(Color::Red)</code></td></tr>
  <tr><td><code>type Shape interface { isShape() }</code></td><td><code>std::variant&lt;Circle, Square&gt;</code></td></tr>
  <tr><td><code>switch s := s.(type) { … }</code></td><td><code>std::visit(overload, s)</code></td></tr>
</table>
<p>A <code>std::variant&lt;A, B, C&gt;</code> holds exactly one of its listed
types at a time. You ask which with <code>std::holds_alternative&lt;A&gt;(v)</code>,
pull a value out with <code>std::get&lt;A&gt;(v)</code>, and handle every case at
once with <code>std::visit</code>. Unlike a Go type switch over an interface,
the "which" information is tracked by the variant itself — there is no runtime
type assertion needed to recover it.</p>`,

  go: `type Direction int

const (
	North Direction = iota
	East
	South
	West
)

func turnRight(d Direction) Direction {
	return (d + 1) % 4
}

type Shape interface {
	Area() float64
}

type Circle struct{ Radius float64 }
type Square struct{ Side float64 }

func (c Circle) Area() float64 { return math.Pi * c.Radius * c.Radius }
func (s Square) Area() float64 { return s.Side * s.Side }`,

  task: `
<p>Model the same ideas in modern C++.</p>
<ol>
  <li>Define <code>enum class Direction { North, East, South, West };</code>
      (the default underlying values are <code>0..3</code>).</li>
  <li><code>turnRight(Direction d)</code> returns the next direction clockwise,
      wrapping <code>West</code> back to <code>North</code>. Convert to
      <code>int</code>, add one modulo 4, and cast back.</li>
  <li>Define two shape structs, <code>Circle { double radius; }</code> and
      <code>Square { double side; }</code>, and a
      <code>using Shape = std::variant&lt;Circle, Square&gt;;</code>.</li>
  <li><code>area(const Shape&amp; s)</code> returns the area. Use
      <code>std::visit</code> with a lambda that is overloaded on the two struct
      types (a generic <code>auto</code> lambda plus
      <code>if constexpr</code>, or two overloads — either works).</li>
  <li><code>shapeName(const Shape&amp; s)</code> returns <code>"circle"</code> or
      <code>"square"</code>. Use <code>std::holds_alternative&lt;Circle&gt;(s)</code>.</li>
</ol>`,

  starter: `enum class Direction { North, East, South, West };

Direction turnRight(Direction d) {
  return d; // TODO
}

struct Circle { double radius; };
struct Square { double side; };
using Shape = std::variant<Circle, Square>;

double area(const Shape& s) {
  return 0.0; // TODO: std::visit
}

std::string shapeName(const Shape& s) {
  return ""; // TODO: std::holds_alternative
}
`,

  requirements: [
    { pattern: /enum\s+class\s+Direction/, message: "Define Direction as an enum class (a scoped enum)" },
    { pattern: /std::visit/, message: "Use std::visit to compute the area of the variant" },
    { pattern: /std::holds_alternative/, message: "Use std::holds_alternative to identify the shape" },
  ],

  tests: [
    { name: "turnRight(North) is East", code: "    expect_true(turnRight(Direction::North) == Direction::East);" },
    { name: "turnRight(West) wraps to North", code: "    expect_true(turnRight(Direction::West) == Direction::North);" },
    { name: "underlying value of South is 2", code: "    expect_eq(static_cast<int>(Direction::South), 2);" },
    { name: "area of a circle", code: "    Shape s = Circle{2.0};\n    expect_true(std::abs(area(s) - 12.566370614359172) < 1e-9);" },
    { name: "area of a square", code: "    Shape s = Square{3.0};\n    expect_eq(area(s), 9.0);" },
    { name: "shapeName(circle) is \"circle\"", code: "    Shape s = Circle{1.0};\n    expect_eq(shapeName(s), std::string(\"circle\"));" },
    { name: "shapeName(square) is \"square\"", code: "    Shape s = Square{1.0};\n    expect_eq(shapeName(s), std::string(\"square\"));" },
  ],

  solution: `enum class Direction { North, East, South, West };

Direction turnRight(Direction d) {
  return static_cast<Direction>((static_cast<int>(d) + 1) % 4);
}

struct Circle { double radius; };
struct Square { double side; };
using Shape = std::variant<Circle, Square>;

double area(const Shape& s) {
  return std::visit([](const auto& shape) -> double {
    using T = std::decay_t<decltype(shape)>;
    if constexpr (std::is_same_v<T, Circle>) {
      return 3.141592653589793 * shape.radius * shape.radius;
    } else {
      return shape.side * shape.side;
    }
  }, s);
}

std::string shapeName(const Shape& s) {
  if (std::holds_alternative<Circle>(s)) {
    return "circle";
  }
  return "square";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C++</th></tr>
  <tr><td>Scoped enum member</td><td><code>North</code> (package-scoped)</td><td><code>Direction::North</code></td></tr>
  <tr><td>Enum to number</td><td><code>int(d)</code> (implicit underlying type)</td><td><code>static_cast&lt;int&gt;(d)</code> (explicit)</td></tr>
  <tr><td>Sum-of-shapes type</td><td><code>Shape</code> interface + <code>Circle</code>/<code>Square</code></td><td><code>std::variant&lt;Circle, Square&gt;</code></td></tr>
  <tr><td>Narrowing check</td><td><code>_, ok := s.(Circle)</code></td><td><code>std::holds_alternative&lt;Circle&gt;(s)</code></td></tr>
  <tr><td>Extract value</td><td><code>s.(Circle).Radius</code> (after assertion)</td><td><code>std::get&lt;Circle&gt;(s).radius</code></td></tr>
  <tr><td>Exhaustive handling</td><td><code>switch v := s.(type) { … }</code></td><td><code>std::visit(fn, s)</code></td></tr>
</table>
<p>Two idioms are worth internalizing. First, <code>std::get&lt;Circle&gt;(s)</code>
throws <code>std::bad_variant_access</code> if the variant does not currently
hold a <code>Circle</code> — so guard it with <code>std::holds_alternative</code>
first, exactly like the "comma ok" form of a Go type assertion before touching a
field. Second, the <code>std::visit</code> + generic-lambda + <code>if constexpr</code>
pattern is the C++ answer to an exhaustive Go type switch: add a type to the
variant and the code stops compiling until every branch is handled — Go's
compiler cannot enforce that a type switch covers every implementation of an
interface. Because <code>enum class</code> values do not implicitly convert to
<code>int</code>, you cannot accidentally compare a <code>Direction</code> with
a <code>Color</code> — the type system keeps unrelated enums apart.</p>`,
};
