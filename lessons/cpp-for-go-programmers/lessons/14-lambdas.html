  number: 14,
  title: "Lambdas",

  intro: `
<p>A function literal in Go closes over every variable in its enclosing scope
automatically — there is no syntax to opt in or out, and the captured
variables are always <em>shared</em> with the surrounding function, never
copied. A C++ lambda makes that closure explicit: the <em>capture list</em> in
square brackets says exactly which surrounding variables the lambda can see,
and <em>how</em> — by value or by reference. Everything else about the syntax
will look familiar: <code>[captures](params){ body }</code>.</p>
<table>
  <tr><th>Go</th><th>C++</th></tr>
  <tr><td><code>func(x int) int { return x + 1 }</code></td><td><code>[](int x){ return x + 1; }</code></td></tr>
  <tr><td><code>func(n int) int { return n * factor }</code> (closes over <code>factor</code>)</td><td><code>[factor](int n){ return n * factor; }</code> (by value)</td></tr>
  <tr><td><code>func() { total += x }</code> (shares <code>total</code>)</td><td><code>[&amp;total](){ total += x; }</code> (by reference)</td></tr>
  <tr><td><code>var f func(int) int</code></td><td><code>std::function&lt;int(int)&gt; f</code></td></tr>
</table>
<p>Three knobs to know. <strong>Capture by value</strong> — <code>[x]</code> or
<code>[=]</code> for everything — copies the variable into the lambda; the copy
is <code>const</code> by default. Go has no equivalent: every variable a
closure captures is shared with the enclosing scope, so if you need an
independent snapshot you must assign it into a fresh local variable before
building the closure. <strong>Capture by reference</strong> —
<code>[&amp;x]</code> or <code>[&amp;]</code> for everything — lets the body
read and write the original; this is simply how every Go closure already
behaves. Adding <code>mutable</code> after the parameter list lets a by-value
lambda modify <em>its own copy</em> between calls, which is how you build a
stateful closure — Go closures get this for free, since they mutate the
shared variable directly with no keyword required. To store a lambda in a
variable, a struct field, or a function parameter, wrap it in
<code>std::function&lt;Ret(Args)&gt;</code> — the type-erased equivalent of a
Go function type like <code>func(int) int</code>.</p>`,

  go: `func applyTwice(x int, f func(int) int) int {
	return f(f(x))
}

func makeCounter() func() int {
	count := 0
	return func() int {
		count++ // closes over count, shared, not copied
		return count
	}
}

total := 0
for _, x := range []int{1, 2, 3, 4} {
	total += x
}`,

  task: `
<p>Write these free functions, each exercising a different facet of lambdas:</p>
<ol>
  <li><code>applyTwice(int x, const std::function&lt;int(int)&gt;&amp; f)</code> —
      a higher-order function that returns <code>f(f(x))</code>.</li>
  <li><code>total(const std::vector&lt;int&gt;&amp; v)</code> — sum the vector by
      running <code>std::for_each</code> with a lambda that captures a local
      accumulator <strong>by reference</strong> (<code>[&amp;sum]</code>).</li>
  <li><code>countGreaterThan(const std::vector&lt;int&gt;&amp; v, int threshold)</code>
      — return how many elements exceed <code>threshold</code> using
      <code>std::count_if</code> with a lambda that captures
      <code>threshold</code> <strong>by value</strong> (<code>[threshold]</code>).
      Return it as an <code>int</code>.</li>
  <li><code>makeCounter()</code> — return a <code>std::function&lt;int()&gt;</code>
      that yields 1, 2, 3, … on successive calls. Capture a counter by value and
      mark the lambda <code>mutable</code> so it can bump its own copy.</li>
</ol>`,

    { pattern: /\bmutable\b/, message: "Use a mutable lambda so makeCounter's closure can update its own copy" },
    { pattern: /\[\s*&/, message: "Capture the accumulator by reference (e.g. [&sum]) in total" },
  ],

  tests: [
    { name: "applyTwice applies f twice (inline lambda)", code: "    expect_eq(applyTwice(3, [](int n){ return n + 1; }), 5);" },
    { name: "applyTwice works with a capturing lambda", code: "    int factor = 3;\n    expect_eq(applyTwice(2, [factor](int n){ return n * factor; }), 18);" },
    { name: "total sums the vector", code: "    expect_eq(total(std::vector<int>{1, 2, 3, 4}), 10);" },
    { name: "total of empty is 0", code: "    expect_eq(total(std::vector<int>{}), 0);" },
    { name: "countGreaterThan counts elements above threshold", code: "    expect_eq(countGreaterThan(std::vector<int>{1, 5, 2, 8, 3}, 3), 2);" },
    { name: "makeCounter yields 1, 2, 3", code: "    auto c = makeCounter();\n    expect_eq(c(), 1);\n    expect_eq(c(), 2);\n    expect_eq(c(), 3);" },
    { name: "counters are independent", code: "    auto a = makeCounter();\n    auto b = makeCounter();\n    expect_eq(a(), 1);\n    expect_eq(a(), 2);\n    expect_eq(b(), 1);" },

  solution: `int applyTwice(int x, const std::function<int(int)>& f) {
  return f(f(x));
}

int total(const std::vector<int>& v) {
  int sum = 0;
  std::for_each(v.begin(), v.end(), [&sum](int x){ sum += x; });
  return sum;
}

int countGreaterThan(const std::vector<int>& v, int threshold) {
  return static_cast<int>(
    std::count_if(v.begin(), v.end(), [threshold](int x){ return x > threshold; }));
}

std::function<int()> makeCounter() {
  int count = 0;
  return [count]() mutable { return ++count; };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C++</th></tr>
  <tr><td>Lambda</td><td><code>func(x int) int { return x + 1 }</code></td><td><code>[](int x){ return x + 1; }</code></td></tr>
  <tr><td>Capture by value</td><td>not directly supported — copy into a fresh local first</td><td><code>[x]</code> or <code>[=]</code> (copy, const)</td></tr>
  <tr><td>Capture by reference</td><td>the only mode — every capture is shared</td><td><code>[&amp;x]</code> or <code>[&amp;]</code></td></tr>
  <tr><td>Stateful closure</td><td><code>func() int { count++; return count }</code></td><td><code>[count]() mutable { return ++count; }</code></td></tr>
  <tr><td>Function-typed value</td><td><code>func(int) int</code></td><td><code>std::function&lt;int(int)&gt;</code></td></tr>
</table>
<p>A bare lambda has a unique, unnameable type, so <code>auto c = makeCounter();</code>
works but you cannot spell the type by hand — that is what
<code>std::function</code> is for when you need to name it, store it, or pass it
across a function boundary. Note the cost trade-off Go never forces on
you: passing a lambda directly to <code>std::for_each</code> or
<code>std::count_if</code> lets the compiler inline it (fast), while wrapping it
in <code>std::function</code> adds a small indirection in exchange for a nameable,
storable type. Reach for <code>std::function</code> at API boundaries; let
templates and <code>auto</code> keep the hot paths concrete.</p>
<p>One footgun: capturing a local <em>by reference</em> and then returning the
lambda leaves a dangling reference once the enclosing function exits. That is why
<code>makeCounter</code> captures <code>count</code> <em>by value</em> — the state
lives inside the returned closure, not on a stack frame that is about to vanish.
Go sidesteps this particular danger through escape analysis: if a closure
returned from a function refers to a local variable, the compiler automatically
moves that variable's storage to the heap so it outlives the call. C++ makes no
such promise — you are responsible for choosing a capture mode that keeps the
referenced data alive as long as the lambda does.</p>`,
};
