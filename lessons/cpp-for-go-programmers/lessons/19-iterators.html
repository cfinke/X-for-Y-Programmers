  title: "Iterators",

  intro: `
<p>In Go, iteration is invisible: <code>range</code> over a slice, string, or map
just works, and you rarely touch anything resembling an iterator object. In C++
the iterator is front and center. Every standard container exposes
<code>begin()</code> — pointing at the first element — and <code>end()</code> —
a sentinel <em>one past</em> the last element. An iterator is a cursor you move
with <code>++it</code> and read with <code>*it</code>, and that
<code>[begin, end)</code> half-open range is the common currency every
algorithm speaks.</p>
<table>
  <tr><th>Go</th><th>C++</th></tr>
  <tr><td><code>for _, x := range v</code></td><td><code>for (auto x : v)</code></td></tr>
  <tr><td><code>for i := range v</code></td><td><code>auto it = v.begin();</code></td></tr>
  <tr><td><code>v[i]</code></td><td><code>*it</code> then <code>++it</code></td></tr>
  <tr><td>loop condition <code>i &lt; len(v)</code></td><td>done when <code>it == v.end()</code></td></tr>
  <tr><td><code>len(v)</code></td><td><code>std::distance(v.begin(), v.end())</code></td></tr>
</table>
<p>Two habits to carry over. First, <code>end()</code> is not an element — never
dereference it; it only marks where to stop, exactly like checking
<code>i &lt; len(v)</code> before indexing. Second, because algorithms take a raw
<code>(begin, end)</code> pair, a function that accepts <em>iterators</em>
instead of a specific container works on any range — a slice of a vector, a
whole <code>std::set</code>, whatever. Reach for a range-based <code>for</code>
as your everyday default; drop to explicit iterators when you need the cursor
itself.</p>`,

  go: `nums := []int{10, 20, 30, 40}

// The idiomatic default: range hides the index bookkeeping.
total := 0
for _, n := range nums {
    total += n // 100
}

// The explicit form, which C++ makes you see:
for i := 0; i < len(nums); i++ {
    _ = nums[i] // walk to the end
}

count := len(nums) // 4`,

  task: `
<p>Work with <code>std::vector&lt;int&gt;</code> and its iterators. Write these

<ol>

</ol>`,

  solution: `int sumWithIterator(const std::vector<int>& v) {
  int total = 0;
  for (auto it = v.begin(); it != v.end(); ++it) {
    total += *it;
  }
  return total;
}

int countElements(const std::vector<int>& v) {
  return static_cast<int>(std::distance(v.begin(), v.end()));
}

int thirdElement(const std::vector<int>& v) {
  auto it = v.begin();
  std::advance(it, 2);
  return *it;
}

int sumRange(std::vector<int>::const_iterator begin,
             std::vector<int>::const_iterator end) {
  int total = 0;
  for (auto it = begin; it != end; ++it) {
    total += *it;
  }
  return total;
}

int maxOf(const std::vector<int>& v) {
  return *std::max_element(v.begin(), v.end());
}

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C++</th></tr>
  <tr><td>Idiomatic loop</td><td><code>for _, x := range v</code></td><td><code>for (auto x : v)</code></td></tr>
  <tr><td>Get a cursor</td><td><code>i := 0</code></td><td><code>v.begin()</code></td></tr>
  <tr><td>Read / advance</td><td><code>v[i]</code>, <code>i++</code></td><td><code>*it</code>, <code>++it</code></td></tr>
  <tr><td>End sentinel</td><td><code>i &lt; len(v)</code></td><td><code>it == v.end()</code></td></tr>
  <tr><td>Distance / size</td><td><code>len(v)</code></td><td><code>std::distance(b, e)</code></td></tr>
  <tr><td>Jump forward</td><td><code>i += n</code></td><td><code>std::advance(it, n)</code></td></tr>
  <tr><td>Read-only cursor</td><td>value copy from <code>range</code></td><td><code>const_iterator</code></td></tr>
</table>
<p>A few things that surprise Go folks. <code>const_iterator</code> is what you
get from a <code>const</code> container (or from <code>cbegin()</code>): you can
move it and read through it, but not write — the "read-only view" a
<code>const std::vector&amp;</code> parameter hands you. <code>std::distance</code>
and <code>std::advance</code> are cheap O(1) pointer math on a vector, but O(n)
on a <code>std::list</code> or <code>std::set</code>, because those iterators can
only step one link at a time — the algorithm adapts to what the iterator
supports. Writing a function against a <code>(begin, end)</code> pair, like
<code>sumRange</code>, is the generic-programming payoff: the same code totals a
whole vector, a slice of one, or any other range. Still, prefer range-based
<code>for</code> for straightforward whole-container work — it is the clearest
default, and you only reach for explicit iterators when you genuinely need the
cursor.</p>`,
