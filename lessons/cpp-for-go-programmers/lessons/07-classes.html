const LESSON = {
  number: 7,
  title: "Classes",

  intro: `
<p>A C++ <code>class</code> is closer to a Go <code>struct</code> with methods
than to anything Go calls a class — Go has no classes at all. Two habits differ
from what you are used to. First, C++ access is <em>closed by default</em>:
everything in a <code>class</code> is <code>private</code> until you write
<code>public:</code>. (A <code>struct</code> is the same thing with the default
flipped to <code>public</code> — that is the <em>only</em> difference.) Go's
access control works differently: it is per-identifier, not per-type, and is
spelled with capitalization — <code>Count</code> is exported from the package,
<code>count</code> is not. Second, C++ groups members under a single
<code>public:</code> or <code>private:</code> label rather than tagging each one
individually.</p>
<table>
  <tr><th>Go</th><th>C++</th></tr>
  <tr><td><code>type Counter struct {</code></td><td><code>class Counter {</code></td></tr>
  <tr><td><code>count int</code> (unexported field)</td><td><code>private:\n  int count_ = 0;</code></td></tr>
  <tr><td><code>func NewCounter(n int) *Counter {\n  return &amp;Counter{count: n}\n}</code></td><td><code>Counter(int n) : count_(n) {}</code></td></tr>
  <tr><td><code>func (c *Counter) Increment() {\n  c.count++\n}</code></td><td><code>void increment() { count_++; }</code></td></tr>
  <tr><td><code>func (c *Counter) Get() int {\n  return c.count\n}</code></td><td><code>int get() const { return count_; }</code></td></tr>
</table>
<p>The <code>: count_(n)</code> piece is a <strong>member initializer list</strong>.
It runs before the constructor body and builds each member directly from the
given value — the idiomatic way to initialize members in C++, playing a role
similar to a Go composite literal like <code>Counter{count: n}</code>. The
trailing <code>const</code> on <code>get()</code> is a promise to the compiler:
this method does not modify the object. You call it on <code>const</code>
objects, and the compiler rejects any accidental write to a member. There is no
<code>this.</code> prefix — members are named directly, whereas Go methods still
need the receiver name (<code>c.count</code>) to reach a field.</p>`,

  go: `type BankAccount struct {
	owner   string
	balance int
}

func NewBankAccount(owner string, opening int) *BankAccount {
	return &BankAccount{owner: owner, balance: opening}
}

func (a *BankAccount) Deposit(amount int) {
	a.balance += amount
}

func (a *BankAccount) Withdraw(amount int) {
	a.balance -= amount
}

func (a *BankAccount) Balance() int {
	return a.balance
}

func (a *BankAccount) Owner() string {
	return a.owner
}`,

  task: `
<p>Write a <code>BankAccount</code> class:</p>
<ol>
  <li>Two <strong>private</strong> members: <code>std::string owner_</code> and

  <li>A constructor <code>BankAccount(std::string owner, int opening)</code> that

  <li>A public <code>void deposit(int amount)</code> that adds to the balance.</li>
  <li>A public <code>void withdraw(int amount)</code> that subtracts from the
      balance.</li>
  <li>Two <strong>const</strong> getters: <code>int balance() const</code> and
      <code>std::string owner() const</code>.</li>
</ol>`,

public:

  requirements: [
    { pattern: /:\s*owner_\s*\(/, message: "Initialize owner_ with a member initializer list (: owner_(...))" },
    { pattern: /int\s+balance\s*\(\s*\)\s*const/, message: "Make balance() a const member function" },

  tests: [
    { name: "opening balance is stored", code: "    BankAccount a(\"Ada\", 100);\n    expect_eq(a.balance(), 100);" },
    { name: "owner is stored", code: "    BankAccount a(\"Ada\", 100);\n    expect_eq(a.owner(), std::string(\"Ada\"));" },
    { name: "deposit adds to the balance", code: "    BankAccount a(\"Rob\", 50);\n    a.deposit(25);\n    expect_eq(a.balance(), 75);" },
    { name: "withdraw subtracts from the balance", code: "    BankAccount a(\"Rob\", 50);\n    a.withdraw(20);\n    expect_eq(a.balance(), 30);" },
    { name: "deposits and withdrawals accumulate", code: "    BankAccount a(\"Grace\", 0);\n    a.deposit(100);\n    a.withdraw(40);\n    a.deposit(10);\n    expect_eq(a.balance(), 70);" },
    { name: "getters work on a const object", code: "    const BankAccount a(\"Linus\", 500);\n    expect_eq(a.balance(), 500);\n    expect_eq(a.owner(), std::string(\"Linus\"));" },
  ],

  solution: `class BankAccount {
private:
  std::string owner_;
  int balance_ = 0;

public:
  BankAccount(std::string owner, int opening)
      : owner_(owner), balance_(opening) {}

  void deposit(int amount) {
    balance_ += amount;
  }

  void withdraw(int amount) {
    balance_ -= amount;
  }

  int balance() const {
    return balance_;
  }

  std::string owner() const {
    return owner_;
  }
};
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C++</th></tr>
  <tr><td>Default access</td><td>per-identifier, via capitalization</td><td><code>class</code> &rarr; <code>private</code>, <code>struct</code> &rarr; <code>public</code></td></tr>
  <tr><td>Private data</td><td>unexported field: <code>count int</code></td><td><code>private:</code> then <code>int x_ = 0;</code></td></tr>
  <tr><td>Member access</td><td><code>c.count</code> (receiver prefix)</td><td><code>x_</code> (no <code>this.</code>)</td></tr>
  <tr><td>Init in constructor</td><td><code>&amp;Counter{count: n}</code> (composite literal)</td><td><code>: x_(n) {}</code> (initializer list)</td></tr>
  <tr><td>Read-only method</td><td>value receiver, not compiler-enforced</td><td><code>int get() const</code></td></tr>
</table>
<p>A member initializer list is not just style: members without a default value
must be constructed somehow, and the list constructs them directly rather than
default-constructing and then assigning. For a <code>std::string</code> that is
one construction instead of two operations — the closest Go analog is building
the whole value in one composite literal, as <code>NewBankAccount</code> does.
Marking read-only methods <code>const</code> is the everyday default in C++ —
it is what lets a <code>const BankAccount</code> still answer
<code>balance()</code>. Go has nothing that enforces this: choosing a value
receiver over a pointer receiver signals "does not mutate" by convention, but
the compiler will not stop you from taking a pointer receiver on a getter. A
common convention, used here, is a trailing underscore (<code>balance_</code>)
on private members so a getter can be named <code>balance()</code> without a
clash — Go instead just makes the field unexported (<code>balance</code>) and
gives the getter a capitalized name (<code>Balance()</code>).</p>`,
};
