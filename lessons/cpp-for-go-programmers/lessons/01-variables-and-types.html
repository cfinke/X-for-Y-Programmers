const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Go's types are checked at compile time too — nothing here is erased
before the code runs. But Go generally hands you one obvious numeric type
per job (<code>int</code>, <code>float64</code>); C++ hands you a menu and
expects you to pick the machine representation explicitly —
<code>int</code> and <code>double</code> are genuinely different types, not
the same value wearing different hats.</p>
<table>
  <tr><th>Go</th><th>C++</th></tr>
  <tr><td><code>var age int = 36</code></td><td><code>int age = 36;</code></td></tr>
  <tr><td><code>name := "Ada"</code></td><td><code>const std::string name = "Ada";</code></td></tr>
  <tr><td><code>x := 1</code> (inferred)</td><td><code>auto x = 1;</code> (inferred)</td></tr>
  <tr><td><code>int</code>, <code>float64</code> (a small, chosen-for-you set)</td><td><code>int</code>, <code>long</code>, <code>double</code>, … (you choose)</td></tr>
</table>
<p>Two things will feel familiar. First, integer division: <code>7 / 2</code>
is <code>3</code> in both languages, and you need a float on one side to get
<code>3.5</code> — <code>7 / 2.0</code> works the same way in Go and C++.
Second, <code>auto</code> is C++'s <code>:=</code> — it infers the type from
the initializer, and once fixed, that type never changes, exactly like a Go
variable declared with <code>:=</code>. Free functions are welcome here
too; unlike Java, C++ does not require a class.</p>`,

  go: `var age int = 36
userName := "Ada"

func describe(name string, age int) string {
	return fmt.Sprintf("%s is %d", name, age)
}`,

  task: `
<p>Write the C++ version as free functions (no class needed — same idea as
Go's package-level funcs):</p>
<ol>
  <li><code>add(int a, int b)</code> returns their sum.</li>
  <li><code>describe(const std::string&amp; name, int age)</code> returns a string
      like <code>"Ada is 36"</code>. Build it with
      <code>name + " is " + std::to_string(age)</code>.</li>
  <li><code>divide(int a, int b)</code> returns a <code>double</code>, so
      <code>divide(7, 2)</code> is <code>3.5</code>. Promote one operand:
      <code>static_cast&lt;double&gt;(a) / b</code>.</li>
</ol>`,

  starter: `int add(int a, int b) {
  return 0; // TODO
}

std::string describe(const std::string& name, int age) {
  return ""; // TODO
}

double divide(int a, int b) {
  return 0; // TODO: watch out for integer division
}
`,

  requirements: [
    { pattern: /std::to_string/, message: "Use std::to_string to turn the age into text" },
    { pattern: /static_cast<double>/, message: "Use static_cast<double> so divide returns a fractional result" },
  ],

  tests: [
    { name: "add(2, 3) is 5", code: "    expect_eq(add(2, 3), 5);" },
    { name: "describe(\"Ada\", 36) is \"Ada is 36\"", code: "    expect_eq(describe(\"Ada\", 36), std::string(\"Ada is 36\"));" },
    { name: "describe(\"Rob\", 68) is \"Rob is 68\"", code: "    expect_eq(describe(\"Rob\", 68), std::string(\"Rob is 68\"));" },
    { name: "divide(7, 2) is 3.5", code: "    expect_eq(divide(7, 2), 3.5);" },
    { name: "divide(10, 4) is 2.5", code: "    expect_eq(divide(10, 4), 2.5);" },
  ],

  solution: `int add(int a, int b) {
  return a + b;
}

std::string describe(const std::string& name, int age) {
  return name + " is " + std::to_string(age);
}

double divide(int a, int b) {
  return static_cast<double>(a) / b;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C++</th></tr>
  <tr><td>Typed variable</td><td><code>var x int = 1</code></td><td><code>int x = 1;</code></td></tr>
  <tr><td>Inferred variable</td><td><code>x := 1</code></td><td><code>auto x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>const x = 1</code></td><td><code>const int x = 1;</code></td></tr>
  <tr><td>Number to string</td><td><code>strconv.Itoa(age)</code></td><td><code>std::to_string(age)</code></td></tr>
  <tr><td>Integer division</td><td><code>7 / 2 == 3</code>, needs a <code>float64</code> for <code>3.5</code></td><td><code>7 / 2 == 3</code>, <code>7 / 2.0 == 3.5</code></td></tr>
</table>
<p>C++ has no string interpolation, so you build strings by concatenation and
explicit conversion: <code>std::to_string</code> for numbers, and
<code>+</code> to join <code>std::string</code>s — closer to Go's
<code>strconv.Itoa</code> plus <code>+</code> than to
<code>fmt.Sprintf</code>. Note the parameter type
<code>const std::string&amp;</code> — passing by <code>const</code>
reference avoids copying the string, the everyday default for read-only
object parameters, much like Go quietly passes slices and maps by
reference under the hood while still copying plain structs and strings by
value.</p>`,
};
