  number: 8,
  title: "Control Flow & case",

  intro: `
<p>Ruby's <code>if</code> drops the parentheses and the braces:
<code>if cond ... end</code>. Then it goes further with the
<strong>modifier form</strong> — <code>return x if cond</code> — which turns a
three-line guard clause into one line that reads like English. Its negative
twin <code>unless</code> (<code>raise if invalid</code> vs
<code>return unless valid</code>) covers the <code>if (!...)</code> cases
without the <code>!</code>.</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>if (cond) { ... }</code></td><td><code>if cond ... end</code></td></tr>
  <tr><td><code>if (n == 0) { return "zero"; }</code></td><td><code>return "zero" if n.zero?</code></td></tr>
  <tr><td><code>if (!valid) { ... }</code></td><td><code>unless valid ... end</code></td></tr>
  <tr><td><code>case "sat", "sun" -&gt; "weekend";</code></td><td><code>when "sat", "sun" then "weekend"</code></td></tr>
  <tr><td><code>if (score &gt;= 90) ... else if ...</code> chain</td><td><code>case score when 90.. then "A" ...</code></td></tr>
</table>
<p>Java 14's <code>switch</code> expressions finally gave you arrow arms, no
fallthrough, and a value — Ruby's <code>case/when</code> has been that since
the beginning, and looser: no <code>break</code> exists, arms can be
<strong>ranges</strong> (<code>when 90..</code> matches 90 and up), grouped
values (<code>when "sat", "sun"</code>), even classes and regexps — each arm
is compared with the <code>===</code> "case equality" operator. And like
everything in Ruby, both <code>if</code> and <code>case</code> are
<em>expressions</em>: the selected branch's value is the value of the whole
thing, so you can assign it or make it a method's implicit return.</p>`,

  java: `String grade(int score) {
    // A range check needs an if/else-if ladder; switch can't do ranges.
    if (score >= 90) { return "A"; }
    else if (score >= 80) { return "B"; }
    else if (score >= 70) { return "C"; }
    return "F";
}

String dayType(String day) {
    return switch (day) {              // Java 14+ switch expression
        case "sat", "sun" -> "weekend";
        default -> "weekday";
    };
}

String describeNumber(int n) {
    if (n == 0) { return "zero"; }     // guard clause: three tokens of ceremony
    return (n > 0) ? "positive" : "negative";
}`,

  task: `
<p>Rewrite the three methods in Ruby:</p>
<ol>
  <li><code>grade(score)</code> — a <code>case score</code> expression with
      <strong>range arms</strong>: <code>when 90..</code> is an "A",
      <code>when 80...90</code> a "B", <code>when 70...80</code> a "C",
      <code>else</code> "F". Make the <code>case</code> the method's last
      expression — no <code>return</code>, no <code>break</code>.</li>
  <li><code>day_type(day)</code> — a <code>case day</code> with a
      <strong>grouped arm</strong>: <code>when "sat", "sun"</code> returns
      <code>"weekend"</code>, anything else <code>"weekday"</code>.</li>
  <li><code>describe_number(n)</code> — start with a one-line
      <strong>modifier-if guard</strong>: <code>return "zero" if n.zero?</code>.
      Then an <code>if/else</code> <em>expression</em> (no returns) yielding
      <code>"positive"</code> or <code>"negative"</code>.</li>
</ol>`,

  starter: `# 1. case is an expression: each when arm can be a Range like 90..
def grade(score)
  raise NotImplementedError, "TODO: implement grade with case/when range arms"
end

# 2. One when arm can match several values, separated by commas.
def day_type(day)
  raise NotImplementedError, "TODO: implement day_type with a grouped when"
end

# 3. Guard first (modifier if), then let if/else produce the value.
def describe_number(n)
  raise NotImplementedError, "TODO: implement describe_number"
end
`,

  requirements: [
    { pattern: /case\b/, message: "Use a case expression" },
    { pattern: /when\s+/, message: "Use when arms (ranges and grouped values)" },
    { pattern: /if\s+\w|unless/, message: "Use a modifier if (or unless) guard clause" },
  ],

  tests: [
    { name: 'grade covers the range arms: 95 → "A", 90 → "A", 85 → "B"',
      code: '  expect_eq(grade(95), "A")\n  expect_eq(grade(90), "A")\n  expect_eq(grade(85), "B")' },
    { name: 'grade(72) returns "C" and grade(50) returns "F"',
      code: '  expect_eq(grade(72), "C")\n  expect_eq(grade(50), "F")' },
    { name: 'day_type("sat") and day_type("sun") return "weekend"',
      code: '  expect_eq(day_type("sat"), "weekend")\n  expect_eq(day_type("sun"), "weekend")' },
    { name: 'day_type("mon") returns "weekday"',
      code: '  expect_eq(day_type("mon"), "weekday")' },
    { name: 'describe_number(0) returns "zero"',
      code: '  expect_eq(describe_number(0), "zero")' },
    { name: 'describe_number(5) is "positive", describe_number(-3) is "negative"',
      code: '  expect_eq(describe_number(5), "positive")\n  expect_eq(describe_number(-3), "negative")' },
  ],

  solution: `def grade(score)
  case score
  when 90.. then "A"
  when 80...90 then "B"
  when 70...80 then "C"
  else "F"
  end
end

def day_type(day)
  case day
  when "sat", "sun" then "weekend"
  else "weekday"
  end
end

def describe_number(n)
  return "zero" if n.zero?

  if n.positive?
    "positive"
  else
    "negative"
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>Condition</td><td><code>if (cond) { ... }</code></td><td><code>if cond ... end</code> — no parens, no braces</td></tr>
  <tr><td>Guard clause</td><td><code>if (x) { return y; }</code></td><td><code>return y if x</code></td></tr>
  <tr><td>Negated if</td><td><code>if (!cond)</code></td><td><code>unless cond</code></td></tr>
  <tr><td>Multi-way branch</td><td><code>switch (x) { case a, b -&gt; ...; }</code></td><td><code>case x when a, b then ... end</code></td></tr>
  <tr><td>Range arm</td><td>not possible — if/else ladder</td><td><code>when 90..</code>, <code>when 80...90</code> (<code>...</code> excludes the end)</td></tr>
  <tr><td>Result as value</td><td><code>switch</code> expression (Java 14+)</td><td><code>if</code> <em>and</em> <code>case</code> are always expressions</td></tr>
</table>
<p>Each <code>when</code> arm matches via <code>arm === value</code>: ranges
check <code>cover?</code>, classes check <code>is_a?</code>, regexps check
<code>match?</code>, and plain values check <code>==</code>. That's why
<code>case</code> arms are so much more flexible than <code>switch</code>
labels — and since there's no fallthrough, there's no <code>break</code> to
forget. Style note: modifier <code>if</code>/<code>unless</code> shine for
one-line guards; once there's an <code>else</code>, use the block form.</p>`,
};
