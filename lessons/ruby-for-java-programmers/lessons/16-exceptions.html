  number: 16,
  title: "Exceptions & Error Handling",

  intro: `
<p>Ruby's exception machinery maps almost one-to-one onto Java's:
<code>begin/rescue/ensure</code> is <code>try/catch/finally</code>,
<code>raise</code> is <code>throw</code>, and a custom error is a class that
extends — sorry, <em>inherits from</em> — <code>StandardError</code>. The big
difference is what's missing: <strong>there are no checked exceptions</strong>.
No <code>throws IOException</code> clauses, no compiler forcing you to catch
or declare. The discipline Java enforced at compile time moves into
documentation and tests — a recurring theme by now.</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>try { ... } catch (E e) { ... } finally { ... }</code></td><td><code>begin ... rescue E =&gt; e ... ensure ... end</code></td></tr>
  <tr><td><code>throw new IllegalArgumentException("msg");</code></td><td><code>raise ArgumentError, "msg"</code></td></tr>
  <tr><td><code>class MyError extends RuntimeException</code></td><td><code>class MyError &lt; StandardError; end</code></td></tr>
  <tr><td><code>catch (Exception e)</code></td><td><code>rescue =&gt; e</code> (catches <code>StandardError</code> only)</td></tr>
  <tr><td><code>int parse(String s) throws ParseException</code></td><td>— no checked exceptions, no <code>throws</code> clause</td></tr>
</table>
<p>Two idioms worth stealing immediately. First, a bare <code>rescue</code>
catches <code>StandardError</code>, <em>not</em> <code>Exception</code> — the
same good hygiene as catching <code>Exception</code> but never
<code>Throwable</code>: things like out-of-memory and interrupt signals sail
past it. Second, a whole method body can end with <code>rescue</code> — no
<code>begin</code> needed. <code>def ... rescue ... end</code> is the
Ruby equivalent of wrapping the entire method body in one
<code>try/catch</code>, without the extra nesting level.</p>`,

  java: `class EmptyCartException extends RuntimeException {
    EmptyCartException(String msg) { super(msg); }
}

static int parseAge(String s) {
    String t = s.strip();
    if (!t.matches("\\d+")) {
        throw new IllegalArgumentException("not a valid age: " + s);
    }
    return Integer.parseInt(t);
}

static int safeParseAge(String s, int defaultAge) {
    try {
        return parseAge(s);
    } catch (IllegalArgumentException e) {
        return defaultAge;
    } finally {
        // cleanup would go here — Ruby calls this "ensure"
    }
}`,

  task: `
<p>Port the Java — note there is no <code>throws</code> clause to
write anywhere:</p>
<ol>
  <li>Write <code>parse_age(s)</code> that raises

  <li>Write <code>safe_parse_age(s, default)</code> that calls
      <code>parse_age</code> and returns <code>default</code> if it raises.
      Use a <strong>def-level rescue</strong>: the method body is the call,
      then <code>rescue ArgumentError</code>, then the default — no
      <code>begin</code> keyword anywhere.</li>
  <li>Define <code>class EmptyCartError &lt; StandardError</code> (already

</ol>`,

`,

  tests: [

    { name: "checkout([]) raises EmptyCartError",
      code: `  begin
    checkout([])
    raise "expected checkout([]) to raise EmptyCartError"

  end` },
    { name: "checkout([100, 250, 399]) returns 749",
      code: "  expect_eq(checkout([100, 250, 399]), 749)" },

  solution: `def parse_age(s)
  raise ArgumentError, "not a valid age: #{s.inspect}" unless s.strip.match?(/\\A\\d+\\z/)
  s.to_i
end

def safe_parse_age(s, default)
  parse_age(s)
rescue ArgumentError
  default
end

class EmptyCartError < StandardError
end

def checkout(items)
  raise EmptyCartError, "the cart is empty" if items.empty?
  items.sum
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>Guarded block</td><td><code>try { ... }</code></td><td><code>begin ... end</code></td></tr>
  <tr><td>Catch typed</td><td><code>catch (IOException e)</code></td><td><code>rescue ArgumentError =&gt; e</code></td></tr>
  <tr><td>Catch broadly</td><td><code>catch (Exception e)</code></td><td><code>rescue =&gt; e</code> (StandardError, never the whole Exception tree)</td></tr>
  <tr><td>Always run</td><td><code>finally { ... }</code></td><td><code>ensure ... end</code></td></tr>
  <tr><td>Throw</td><td><code>throw new X("msg");</code></td><td><code>raise X, "msg"</code></td></tr>
  <tr><td>Re-throw current</td><td><code>throw e;</code></td><td>bare <code>raise</code> inside a rescue</td></tr>
  <tr><td>Custom error</td><td><code>class E extends RuntimeException</code></td><td><code>class E &lt; StandardError; end</code></td></tr>
  <tr><td>Whole-method guard</td><td><code>try</code> wrapping the body</td><td>def-level <code>rescue</code> — no <code>begin</code></td></tr>
  <tr><td>Declare throws</td><td><code>throws IOException</code> (checked)</td><td>nothing — document it, test it</td></tr>
</table>
<p>The hierarchy insight: Ruby's root is <code>Exception</code>, but almost
everything you'd ever want to catch lives under <code>StandardError</code> —
and that is all a bare <code>rescue</code> catches. It's the
<code>Throwable</code>/<code>Exception</code> split with the safe default
built in: you cannot accidentally swallow the Ruby equivalents of
<code>OutOfMemoryError</code> or <code>ThreadDeath</code> by being lazy.
What you lose is the compiler telling you what a method might raise; what you
gain is method signatures that say only what a method <em>does</em>.</p>`,
};
