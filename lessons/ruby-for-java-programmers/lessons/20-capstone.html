<p>Last lesson — no new concepts, just the course put to work. You'll build a
tiny inventory module: a class with <code>attr_reader</code> accessors

<table>
  <tr><th>Java</th><th>Ruby</th></tr>

<p>Two threads from earlier lessons come due here. Ruby's answer to

  java: `record Item(String name, int priceCents, int count) {}

static int totalValue(List<Item> items) {
    return items.stream().mapToInt(i -> i.priceCents() * i.count()).sum();
}

static Optional<Item> findItem(List<Item> items, String name) {
    return items.stream().filter(i -> i.name().equals(name)).findFirst();
}

static List<Item> restock(List<Item> items, String name, int amount) {
    return items.stream()
        .map(i -> i.name().equals(name)
            ? new Item(i.name(), i.priceCents(), i.count() + amount)
            : i)
        .toList();
}

static List<String> namesInStock(List<Item> items) {
    return items.stream().filter(i -> i.count() > 0)
                .map(Item::name).toList();
}`,

  solution: `class Item
  attr_reader :name, :price_cents, :count

  def initialize(name, price_cents, count)
    @name = name
    @price_cents = price_cents
    @count = count
  end
end

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }
end

def restock(items, name, amount)
  items.map do |i|
    if i.name == name
      Item.new(i.name, i.price_cents, i.count + amount)
    else
      i
    end
  end
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map { |i| i.name }
end
`,

<table>

  <tr><td>Value class</td><td><code>record Item(...)</code></td><td><code>class</code> + <code>attr_reader</code> (or <code>Struct</code>/<code>Data</code>, lesson 17)</td></tr>
  <tr><td>Sum a projection</td><td><code>stream().mapToInt(...).sum()</code></td><td><code>sum { |i| ... }</code></td></tr>
  <tr><td>First match</td><td><code>filter(...).findFirst()</code> → <code>Optional</code></td><td><code>find { ... }</code> → item or <code>nil</code></td></tr>
  <tr><td>Handle the miss</td><td><code>opt.map(...).orElse(x)</code></td><td><code>item&amp;.price_cents || x</code> (lesson 6)</td></tr>
  <tr><td>Filter + project</td><td><code>filter(...).map(...).toList()</code></td><td><code>select { ... }.map { ... }</code></td></tr>
  <tr><td>Non-mutating update</td><td><code>new Item(...)</code> in a <code>map</code></td><td><code>Item.new(...)</code> in a <code>map</code></td></tr>
</table>
<p>Notice what the whole pipeline ceremony reduced to: no
<code>.stream()</code> on the way in, no <code>.collect()</code> or
<code>.toList()</code> on the way out, no <code>Optional</code> wrapper — the
collection methods live on the collection, and absence is <code>nil</code>.
That compression is the course in miniature: Java makes guarantees explicit
in types and pays in ceremony; Ruby trusts the objects and the tests. You now
know how to write the tests. Nicely done — that's the course.</p>`,
