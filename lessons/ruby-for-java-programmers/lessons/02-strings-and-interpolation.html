  intro: `
<p>Java builds strings by gluing pieces with <code>+</code> (or reaching for
<code>String.format</code> / text blocks when it gets ugly). Ruby has
<code>+</code> too, but nobody uses it for this: any double-quoted string can
embed an expression with <code>#{...}</code>, and interpolation wins every
time — <code>"Hello, #{name}!"</code>. Inside the braces you can put any
expression, not just a variable.</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>"Hello, " + name + "!"</code></td><td><code>"Hello, #{name}!"</code></td></tr>
  <tr><td><code>s.toUpperCase()</code></td><td><code>s.upcase</code></td></tr>
  <tr><td><code>s.contains("x")</code></td><td><code>s.include?("x")</code></td></tr>
  <tr><td><code>s.length()</code></td><td><code>s.length</code> (no parens needed)</td></tr>
  <tr><td><code>String.join(", ", list)</code></td><td><code>list.join(", ")</code> (receiver flips)</td></tr>
  <tr><td><code>a.equals(b)</code></td><td><code>a == b</code></td></tr>
</table>
<p>Three culture shocks in the method names. First, empty parentheses are
optional, so getter-ish calls drop them: <code>s.length</code>,
<code>s.upcase</code>. Second, methods that answer yes/no end in a question
mark — <code>s.include?("x")</code>, <code>s.empty?</code> — the convention
Java approximates with an <code>is</code>/<code>has</code> prefix. Third, and
sweetest: in Ruby, <code>==</code> compares <em>values</em>. The
<code>.equals()</code> reflex — and every interview question about the string
pool — can finally rest.</p>`,

  java: `import java.util.List;

public class Strings {
    public static void main(String[] args) {
        String name = "Ada";
        String greeting = "Hello, " + name + "!";   // concatenation

        String loud = greeting.toUpperCase();
        boolean hasName = greeting.contains("Ada");
        int len = greeting.length();

        List<String> words = List.of("one", "two", "three");
        String joined = String.join(", ", words);   // static; the list is an argument

        // The reflex burned into every Java developer:
        boolean same = greeting.equals("Hello, Ada!");  // == would compare references
    }
}`,

  task: `
<p>Rewrite the string handling in Ruby:</p>
<ol>
  <li><code>shout(s)</code> — the whole string uppercased.
      <code>toUpperCase()</code> becomes <code>upcase</code>, no parentheses

  <li><code>greet(name)</code> — produce <code>"Hello, Ada!"</code> for
      <code>"Ada"</code>, using <code>#{}</code> interpolation rather than

  <li><code>contains_word?(haystack, needle)</code> — true when
      <code>haystack</code> contains <code>needle</code>. Note the method name:

      string method you want.</li>
  <li><code>join_words(words)</code> — join an array of strings with
      <code>", "</code>. The receiver flips: the <em>array</em> gets
      <code>.join</code>, not a static String helper.</li>
</ol>`,

  solution: `def shout(s)
  s.upcase
end

def greet(name)
  "Hello, #{name}!"
end

def contains_word?(haystack, needle)
  haystack.include?(needle)
end

def join_words(words)
  words.join(", ")
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>Build a string</td><td><code>"Hi, " + name + "!"</code></td><td><code>"Hi, #{name}!"</code></td></tr>
  <tr><td>Uppercase / lowercase</td><td><code>s.toUpperCase()</code> / <code>s.toLowerCase()</code></td><td><code>s.upcase</code> / <code>s.downcase</code></td></tr>
  <tr><td>Substring check</td><td><code>s.contains("x")</code></td><td><code>s.include?("x")</code></td></tr>
  <tr><td>Empty check</td><td><code>s.isEmpty()</code></td><td><code>s.empty?</code></td></tr>
  <tr><td>Length</td><td><code>s.length()</code></td><td><code>s.length</code> or <code>s.size</code></td></tr>
  <tr><td>Join</td><td><code>String.join(", ", list)</code></td><td><code>list.join(", ")</code></td></tr>
  <tr><td>Value equality</td><td><code>a.equals(b)</code></td><td><code>a == b</code></td></tr>
  <tr><td>Trim</td><td><code>s.trim()</code> / <code>s.strip()</code></td><td><code>s.strip</code></td></tr>
</table>
<p>Ruby strings are also <em>mutable</em> — <code>s &lt;&lt; " more"</code>
appends in place — which feels illegal after a career of immutable
<code>java.lang.String</code>. In practice idiomatic Ruby mostly builds new
strings with interpolation anyway, and frozen string literals are common in
production code, so the mental model transfers better than you'd fear.</p>`,
