  number: 12,
  title: "Enumerable: map, select & Friends",

  intro: `
<p>Java's Stream API made you a pipeline builder:
<code>stream()</code> to enter, <code>map</code>/<code>filter</code> in the
middle, <code>collect(toList())</code> to escape back into a real collection.
Ruby deletes both ends of that ceremony — <strong>collections are the
pipeline</strong>. Every Array and Hash mixes in <code>Enumerable</code>, so
<code>.map</code> and friends live directly on the object, and each step hands
you back a plain Array, ready for the next call. No <code>stream()</code>, no
<code>collect()</code>, ever.</p>
<table>
  <tr><th>Java</th><th>Ruby</th></tr>
  <tr><td><code>list.stream().map(f).collect(toList())</code></td><td><code>arr.map { |x| ... }</code></td></tr>
  <tr><td><code>.filter(p -&gt; p.inStock())</code></td><td><code>.select { |p| p[:in_stock] }</code></td></tr>
  <tr><td><code>.mapToInt(Product::priceCents).sum()</code></td><td><code>.sum { |p| p[:price_cents] }</code></td></tr>
  <tr><td><code>.sorted(Comparator.comparing(Product::price))</code></td><td><code>.sort_by { |p| p[:price] }</code></td></tr>
  <tr><td><code>.min(Comparator.comparingInt(...)).orElseThrow()</code></td><td><code>.min_by { |p| p[:price_cents] }</code></td></tr>
</table>
<p>The renames to learn: <code>filter</code> is <code>select</code>, and
anywhere Java demands a <code>Comparator</code>, Ruby takes a <em>key
function</em> instead — <code>sort_by</code>, <code>min_by</code>,
<code>max_by</code> all receive a block that answers "sort me by what?", with
no <code>Comparator.comparing</code> wrapper. <code>sum</code> takes an
optional block too, replacing the whole
<code>mapToInt(...).sum()</code> detour through primitive streams.</p>`,

  java: `import java.util.Comparator;
import java.util.List;

record Product(String name, int priceCents, boolean inStock) {}

class Catalog {
    static List<String> inStockNames(List<Product> products) {
        return products.stream()              // enter the pipeline
                .filter(Product::inStock)
                .map(Product::name)
                .toList();                    // exit the pipeline
    }

    static int totalValue(List<Product> products) {
        return products.stream().mapToInt(Product::priceCents).sum();
    }

    static String cheapestName(List<Product> products) {
        return products.stream()
                .min(Comparator.comparingInt(Product::priceCents))
                .orElseThrow().name();
    }
}`,

  task: `
<p>The products are symbol-keyed hashes, Ruby's stand-in for the record:
<code>{ name: "Desk", price_cents: 24900, in_stock: true }</code>. Rewrite the
three Java methods — no <code>stream()</code>, no <code>collect()</code>, no
<code>Comparator</code>:</p>
<ol>
  <li><code>in_stock_names(products)</code> — <code>select</code> the hashes
      whose <code>p[:in_stock]</code> is true, then <code>map</code> to
      <code>p[:name]</code>. Chain the two calls directly.</li>
  <li><code>total_value(products)</code> — add up the prices with
      <code>sum { |p| p[:price_cents] }</code>; the block replaces
      <code>mapToInt(...).sum()</code>.</li>
  <li><code>cheapest_name(products)</code> — <code>min_by</code> the price (a
      key function, not a Comparator) returns the whole hash; index it with
      <code>[:name]</code>.</li>
</ol>`,

  starter: `# Products look like: { name: "Desk", price_cents: 24900, in_stock: true }

`,

  requirements: [
    { pattern: /\.select/, message: "Filter with .select (Java's .filter)" },
    { pattern: /\.map/, message: "Transform with .map" },
    { pattern: /\.sum/, message: "Total the prices with .sum and a block" },
    { pattern: /min_by|sort_by/, message: "Find the cheapest with a key function: min_by (or sort_by)" },
  ],

  tests: [
    { name: 'in_stock_names returns ["Desk", "Lamp"]',
      code: `  products = [
    { name: "Desk", price_cents: 24900, in_stock: true },
    { name: "Chair", price_cents: 9900, in_stock: false },
    { name: "Lamp", price_cents: 3500, in_stock: true },
  ]
  expect_eq(in_stock_names(products), ["Desk", "Lamp"])` },
    { name: "in_stock_names returns [] when nothing is in stock",
      code: `  products = [{ name: "Desk", price_cents: 24900, in_stock: false }]
  expect_eq(in_stock_names(products), [])` },
    { name: "total_value sums price_cents to 38300",
      code: `  products = [
    { name: "Desk", price_cents: 24900, in_stock: true },
    { name: "Chair", price_cents: 9900, in_stock: false },
    { name: "Lamp", price_cents: 3500, in_stock: true },
  ]
  expect_eq(total_value(products), 38300)` },
    { name: "total_value of an empty catalog is 0",
      code: "  expect_eq(total_value([]), 0)" },
    { name: 'cheapest_name returns "Lamp"',
      code: `  products = [
    { name: "Desk", price_cents: 24900, in_stock: true },
    { name: "Chair", price_cents: 9900, in_stock: false },
    { name: "Lamp", price_cents: 3500, in_stock: true },
  ]
  expect_eq(cheapest_name(products), "Lamp")` },
  ],

  solution: `def in_stock_names(products)
  products.select { |p| p[:in_stock] }.map { |p| p[:name] }
end

def total_value(products)
  products.sum { |p| p[:price_cents] }
end

def cheapest_name(products)
  products.min_by { |p| p[:price_cents] }[:name]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Ruby</th></tr>
  <tr><td>Enter/exit pipeline</td><td><code>.stream()</code> … <code>.collect(toList())</code></td><td>nothing — the collection is the pipeline</td></tr>
  <tr><td>Transform</td><td><code>.map(Product::name)</code></td><td><code>.map { |p| p[:name] }</code></td></tr>
  <tr><td>Keep matching</td><td><code>.filter(Product::inStock)</code></td><td><code>.select { |p| p[:in_stock] }</code></td></tr>
  <tr><td>Drop matching</td><td><code>.filter(p -&gt; !p.inStock())</code></td><td><code>.reject { |p| p[:in_stock] }</code></td></tr>
  <tr><td>Total</td><td><code>.mapToInt(Product::priceCents).sum()</code></td><td><code>.sum { |p| p[:price_cents] }</code></td></tr>
  <tr><td>Sort</td><td><code>.sorted(Comparator.comparing(...))</code></td><td><code>.sort_by { |p| p[:price_cents] }</code></td></tr>
  <tr><td>Min / max</td><td><code>.min(Comparator...).orElseThrow()</code></td><td><code>.min_by { ... }</code> / <code>.max_by { ... }</code></td></tr>
</table>
<p>Notice what else vanished with the Comparator: the <code>Optional</code>.
Ruby's <code>min_by</code> returns the element itself (or <code>nil</code> for
an empty array) — there is no <code>orElseThrow</code> unwrapping step. The
key-function habit generalizes: any time Java asks "give me a Comparator",
Ruby asks the simpler question "give me the value to compare by", and
<code>sort_by</code>, <code>min_by</code>, <code>max_by</code>, and
<code>group_by</code> (next lesson) all speak it.</p>`,
};
