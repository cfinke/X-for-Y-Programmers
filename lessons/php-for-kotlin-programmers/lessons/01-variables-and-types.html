const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>In Kotlin, a variable is born with an inferred or declared type:
<code>val name = "Ada"</code> or <code>val name: String = "Ada"</code>.
In PHP, the assignment <em>is</em> the declaration — <code>$name = "Ada";</code> —
no <code>val</code>/<code>var</code> keyword, and every variable wears a
<code>$</code> sigil. Types don't attach to variables at all; a variable simply
holds whatever you last assigned, and could hold something else tomorrow.</p>
<table>
  <tr><th>Kotlin</th><th>PHP</th></tr>
  <tr><td><code>val name = "Ada"</code></td><td><code>$name = "Ada";</code></td></tr>
  <tr><td><code>val age = 36</code></td><td><code>$age = 36;</code> (an int, but undeclared)</td></tr>
  <tr><td><code>val price = 9.99</code></td><td><code>$price = 9.99;</code> (a <code>float</code> — PHP's only floating type)</td></tr>
  <tr><td><code>fun f(x: Int): String</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td><code>"$n is $a"</code></td><td><code>"$n is $a"</code> (interpolation)</td></tr>
</table>
<p>So where did the types go? Onto <em>function signatures</em>. Since PHP 7/8
you can declare parameter and return types — <code>function f(int $x): string</code>
— and PHP enforces them, but at <strong>runtime</strong>: a wrong-type call
throws a <code>TypeError</code> when the call happens, not when the code is
compiled. Think of it as <code>kotlinc</code>'s checks moved to call time. Also
note the scalar names: <code>Int</code> becomes lowercase <code>int</code>,
<code>Double</code> becomes <code>float</code> (PHP has no separate single/double
distinction), and Kotlin's string templates carry over almost verbatim —
<code>"$name is $age"</code> works the same in both languages.</p>`,

  kotlin: `fun describeUser(name: String, age: Int): String {
    return "$name is $age years old"
}

fun birthday(age: Int): Int {
    var next = age
    next += 1
    return next
}

fun main() {
    val name = "Ada"
    val age = 36
    println(describeUser(name, age)) // Ada is 36 years old
    println(birthday(age))           // 37
}`,

  task: `
<p>Rewrite the Kotlin as PHP — no wrapper needed, just two
functions in a file:</p>
<ol>
  <li>Write <code>describe_user</code> taking <code>string $name</code> and
      <code>int $age</code> (the type goes <em>before</em> the parameter,
      C-style, not after with a colon) with a <code>: string</code> return
      type. Return <code>"Ada is 36 years old"</code>-style text using
      double-quote interpolation — <code>"$name is $age years old"</code> works
      just like a Kotlin string template.</li>
  <li>Write <code>birthday</code> taking <code>int $age</code>, returning
      <code>int</code>: copy the age into a local variable, add 1 with
      <code>+=</code>, and return it. Locals need no declaration and no
      <code>var</code> — assigning creates them.</li>
</ol>
<p>Note the naming shift: Kotlin's <code>describeUser</code> becomes PHP's
conventional <code>snake_case</code> — <code>describe_user</code>. The tests
call your functions by those exact names.</p>`,

  starter: `<?php

// 1. describe_user: string $name and int $age in, string out.
//    Java: String.format("%s is %d years old", name, age)
//    PHP:  "$name is $age years old"
function describe_user(string $name, int $age): string {
    throw new Exception("TODO: implement describe_user");
}

// 2. birthday: copy $age into a local, add 1 with +=, return it.
function birthday(int $age): int {
    throw new Exception("TODO: implement birthday");
}
`,

  requirements: [
    { pattern: /function\s+describe_user\s*\(\s*string\s+\$name\s*,\s*int\s+\$age\s*\)\s*:\s*string/, message: "Define describe_user(string $name, int $age): string with full type declarations" },
    { pattern: /"\$\w+/, message: "Build the string with double-quote interpolation, not concatenation or sprintf" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'expect_eq(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'expect_eq(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "expect_eq(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "expect_eq(birthday(0), 1);" },
  ],

  solution: `<?php

function describe_user(string $name, int $age): string {
    return "$name is $age years old";
}

function birthday(int $age): int {
    $next = $age;
    $next += 1;
    return $next;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>PHP</th></tr>
  <tr><td>Declare a variable</td><td><code>val name = "Ada"</code></td><td><code>$name = "Ada";</code> (assignment declares)</td></tr>
  <tr><td>Integers</td><td><code>Int</code> / <code>Long</code></td><td><code>int</code> (one size, platform-native)</td></tr>
  <tr><td>Floating point</td><td><code>Double</code> / <code>Float</code></td><td><code>float</code> (one type, double-precision)</td></tr>
  <tr><td>Typed signature</td><td><code>fun f(x: Int): String</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td>Type errors caught</td><td>At compile time (<code>kotlinc</code>)</td><td>At call time (<code>TypeError</code> thrown)</td></tr>
  <tr><td>Formatting</td><td><code>"$n is $a"</code> (string template)</td><td><code>"$n is $a"</code> (double quotes only)</td></tr>
  <tr><td>Naming</td><td><code>camelCase</code></td><td><code>snake_case</code> functions, <code>$variables</code></td></tr>
</table>
<p>The mental shift: in Kotlin the <em>variable</em> has a type and the compiler
polices every assignment; in PHP the <em>value</em> has a type and signatures
are checkpoints. Declared parameter and return types are genuinely enforced —
<code>describe_user([], "x")</code> throws a <code>TypeError</code> — but only
when execution reaches the call. Static analyzers like PHPStan and Psalm are
how real PHP projects get their <code>kotlinc</code>-style ahead-of-time
checking back.</p>`,
};
