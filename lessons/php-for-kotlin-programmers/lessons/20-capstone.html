  intro: `
<p>The capstone: a small inventory module that pulls together classes with
promoted constructors, the <code>array_map</code>/<code>array_filter</code>
toolkit, nullable return types — and the one semantic seam this course has
been circling. In PHP, <strong>arrays have value semantics</strong>: assigning
or passing an array copies it (Kotlin hands out references to one
<code>List</code>). But <strong>objects have reference semantics</strong>,
exactly like Kotlin: copying an array of objects copies the <em>array</em>,
while the objects inside are still shared handles.</p>
<table>
  <tr><th>Kotlin</th><th>PHP</th></tr>
  <tr><td><code>List&lt;Item&gt;</code> passed by reference</td><td><code>array</code> copied on assign/pass (value semantics)</td></tr>
  <tr><td>objects are references</td><td>objects are references (same!)</td></tr>
  <tr><td><code>Item?</code> / <code>null</code></td><td><code>?Item</code> return type</td></tr>
  <tr><td><code>item.copy(...)</code> / <code>Item(...)</code> by hand</td><td><code>clone $item</code> (free shallow copy)</td></tr>
  <tr><td><code>items.map { ... }</code></td><td><code>array_map(fn(...) =&gt; ..., $items)</code></td></tr>
  <tr><td><code>filter { ... }</code> returns a fresh list</td><td><code>array_filter</code> keeps keys — wrap in <code>array_values</code></td></tr>
</table>
<p>So a "pure" transformation of an array of objects takes one extra step: the
new array comes free, but any object you intend to modify must be copied
first. That's what <code>clone</code> is for — a shallow copy constructor
every object has for free, PHP's answer to a data class's <code>copy()</code>.
<code>restock</code> below is the exercise: return a new array where the
matched <code>Item</code> is a modified <em>clone</em>, leaving every original
object untouched.</p>`,

  kotlin: `data class Item(val name: String, val priceCents: Int, val count: Int)

fun totalValue(items: List<Item>): Int =
    items.sumOf { it.priceCents * it.count }

fun findItem(items: List<Item>, name: String): Item? =
    items.firstOrNull { it.name == name }

fun restock(items: List<Item>, name: String, amount: Int): List<Item> =
    items.map { item ->
        if (item.name == name) item.copy(count = item.count + amount) else item
    }

fun namesInStock(items: List<Item>): List<String> =
    items.filter { it.count > 0 }.map { it.name }`,

<p>The <code>Item</code> class is written for you in the starter — port the

  solution: `<?php

class Item {
    public function __construct(
        public string $name,
        public int $price_cents,
        public int $count,
    ) {}
}

function total_value(array $items): int {
    return array_reduce(
        $items,
        fn($sum, $item) => $sum + $item->price_cents * $item->count,
        0
    );
}

function find_item(array $items, string $name): ?Item {
    foreach ($items as $item) {
        if ($item->name === $name) {
            return $item;
        }
    }
    return null;
}

function restock(array $items, string $name, int $amount): array {
    return array_map(function ($item) use ($name, $amount) {
        if ($item->name !== $name) {
            return $item;
        }
        $copy = clone $item;
        $copy->count += $amount;
        return $copy;
    }, $items);
}

function names_in_stock(array $items): array {
    $in_stock = array_filter($items, fn($item) => $item->count > 0);
    return array_values(array_map(fn($item) => $item->name, $in_stock));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>PHP</th></tr>
  <tr><td>Collection passed to a function</td><td>reference to the one list</td><td>copied array (value semantics)</td></tr>
  <tr><td>Objects inside</td><td>shared references</td><td>shared references (identical to Kotlin)</td></tr>
  <tr><td>Maybe-absent return</td><td><code>Item?</code></td><td><code>?Item</code> (return <code>null</code>)</td></tr>
  <tr><td>Defensive copy</td><td><code>item.copy()</code> (data class)</td><td><code>clone $item</code> (shallow)</td></tr>
  <tr><td>map</td><td><code>items.map(f)</code></td><td><code>array_map($f, $items)</code></td></tr>
  <tr><td>filter + reindex</td><td><code>items.filter(f)</code></td><td><code>array_values(array_filter($items, $f))</code></td></tr>
  <tr><td>reduce</td><td><code>items.fold(0, op)</code></td><td><code>array_reduce($items, $op, 0)</code></td></tr>
</table>
<p>The insight — and the seam this capstone exists to expose: PHP's copy
semantics stop at the object boundary. <code>restock</code> receives its own
copy of the <em>array</em> for free, and <code>array_map</code> builds another
new array, so the list structure is safely yours; but every element of those
arrays is still a handle to the caller's <code>Item</code> objects, so
<code>$item-&gt;count += $amount</code> would leak the mutation straight back
out — the classic Kotlin aliasing bug wearing a value-semantics disguise.
<code>clone</code> is the one-keyword fix: a free shallow copy constructor
that turns a shared handle into a private object you may mutate. New array
from <code>array_map</code>, new object from <code>clone</code> — change
either one without both, and someone else sees your edits.</p>`,
