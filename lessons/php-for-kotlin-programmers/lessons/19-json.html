const LESSON = {
  number: 19,
  title: "Working with JSON",

  intro: `
<p>No Jackson, no <code>ObjectMapper</code>, no <code>@Serializable</code>
annotations, no data classes to bind into: JSON support is built into the
language and it speaks PHP's native data structure. <code>json_encode($data)</code>
serializes an array directly — associative arrays become objects, list arrays
become arrays — and <code>json_decode($json, true)</code> parses back into
associative arrays. That <code>true</code> matters: <em>without</em> it you get
<code>stdClass</code> objects (<code>$obj-&gt;name</code>) instead of arrays
(<code>$arr['name']</code>), and the two don't mix. This course always passes
<code>true</code>.</p>
<table>
  <tr><th>Kotlin (Jackson)</th><th>PHP</th></tr>
  <tr><td><code>mapper.writeValueAsString(obj)</code></td><td><code>json_encode($data)</code></td></tr>
  <tr><td><code>mapper.readValue&lt;User&gt;(json)</code></td><td><code>json_decode($json, true)</code> (assoc arrays)</td></tr>
  <tr><td>bind to a data class</td><td>no binding step — arrays all the way down</td></tr>
  <tr><td>throws <code>JsonProcessingException</code></td><td>returns <code>null</code> silently — unless <code>JSON_THROW_ON_ERROR</code></td></tr>
  <tr><td><code>node["k"]?.asText() ?: d</code></td><td><code>$data['k'] ?? $default</code></td></tr>
</table>
<p>Two habits to bring along. First, error handling is <em>opt-in</em>: by
default <code>json_decode</code> returns <code>null</code> on malformed input
without a peep — pass <code>JSON_THROW_ON_ERROR</code> to get a
<code>JsonException</code> instead, the behavior a Kotlin developer would have
expected all along. Second, the null-safe path navigation you write with
<code>?.</code> and <code>?:</code> in Kotlin collapses into a single
<code>??</code>: missing key, no problem, take the default.</p>`,

  kotlin: `data class User(val name: String = "unknown", val age: Int = 0)

val mapper = jacksonObjectMapper()   // jackson-module-kotlin

fun toJson(data: Map<String, Any?>): String =
    mapper.writeValueAsString(data)

fun parseUser(json: String): User {
    val root = mapper.readTree(json)
    val name = root["name"]?.asText() ?: "unknown"
    val age = root["age"]?.asInt() ?: 0
    return User(name, age)
}

fun pluckNames(json: String): List<String> {
    val users: List<Map<String, Any?>> = mapper.readValue(json)
    return users.map { it["name"] as String }
}`,

  task: `
<p>Replace the Jackson machinery with the built-ins:</p>
<ol>
  <li>Write <code>to_json(array $data): string</code> — one call to
      <code>json_encode</code>. Pass <code>JSON_THROW_ON_ERROR</code> as the
      second argument to opt into exceptions instead of a silent
      <code>false</code>.</li>
  <li>Write <code>parse_user(string $json): array</code> — decode with
      <code>json_decode($json, true)</code> (associative arrays!), then return
      <code>['name' =&gt; ..., 'age' =&gt; ...]</code> where missing keys fall
      back to <code>"unknown"</code> and <code>0</code> via <code>??</code> —
      the whole <code>?.</code> / <code>?:</code> dance in two expressions.</li>
  <li>Write <code>pluck_names(string $json): array</code> — decode a JSON
      array of user objects and <code>array_map</code> each row to its
      <code>'name'</code> value. No data class, no casts to declare.</li>
</ol>
<p>The tests feed you JSON with missing keys, so the <code>??</code> defaults
are load-bearing, and they compare <code>to_json</code> output against exact
JSON strings.</p>`,

  starter: `<?php

// 1. to_json: json_encode($data, JSON_THROW_ON_ERROR) -- errors become
//    exceptions instead of a silent false return.
function to_json(array $data): string {
    throw new Exception('TODO: implement to_json');
}

// 2. parse_user: json_decode($json, true), then build
//    ['name' => ... ?? "unknown", 'age' => ... ?? 0].
function parse_user(string $json): array {
    throw new Exception('TODO: implement parse_user');
}

// 3. pluck_names: decode, then array_map each user row to its name.
function pluck_names(string $json): array {
    throw new Exception('TODO: implement pluck_names');
}
`,

  requirements: [
    { pattern: /json_encode/, message: "Serialize with json_encode" },
    { pattern: /json_decode\s*\(\s*\$\w+\s*,\s*true\s*\)/, message: "Decode with json_decode($json, true) — associative arrays, not stdClass" },
    { pattern: /\?\?/, message: "Use ?? for the missing-key defaults in parse_user" },
  ],

  tests: [
    { name: 'to_json(["name" => "Ada"]) produces {"name":"Ada"}',
      code: 'expect_eq(to_json(["name" => "Ada"]), \'{"name":"Ada"}\');' },
    { name: "to_json([1, 2, 3]) produces a JSON array, [1,2,3]",
      code: "expect_eq(to_json([1, 2, 3]), '[1,2,3]');" },
    { name: 'parse_user with both keys returns ["name" => "Ada", "age" => 36]',
      code: 'expect_eq(parse_user(\'{"name":"Ada","age":36}\'), ["name" => "Ada", "age" => 36]);' },
    { name: 'parse_user("{}") falls back to "unknown" and 0',
      code: 'expect_eq(parse_user("{}"), ["name" => "unknown", "age" => 0]);' },
    { name: "parse_user with only age defaults just the name",
      code: 'expect_eq(parse_user(\'{"age":50}\'), ["name" => "unknown", "age" => 50]);' },
    { name: "pluck_names extracts every name in order",
      code: 'expect_eq(pluck_names(\'[{"name":"Ada","age":36},{"name":"Grace","age":52}]\'), ["Ada", "Grace"]);' },
  ],

  solution: `<?php

function to_json(array $data): string {
    return json_encode($data, JSON_THROW_ON_ERROR);
}

function parse_user(string $json): array {
    $data = json_decode($json, true);
    return [
        "name" => $data["name"] ?? "unknown",
        "age"  => $data["age"] ?? 0,
    ];
}

function pluck_names(string $json): array {
    $users = json_decode($json, true);
    return array_map(fn($u) => $u["name"], $users);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin (Jackson)</th><th>PHP</th></tr>
  <tr><td>Serialize</td><td><code>mapper.writeValueAsString(obj)</code></td><td><code>json_encode($data)</code></td></tr>
  <tr><td>Parse</td><td><code>mapper.readValue&lt;T&gt;(json)</code></td><td><code>json_decode($json, true)</code></td></tr>
  <tr><td>Forget the <code>true</code></td><td>—</td><td><code>stdClass</code> objects: <code>$o-&gt;name</code>, not <code>$a['name']</code></td></tr>
  <tr><td>Malformed input</td><td>throws <code>JsonProcessingException</code></td><td>returns <code>null</code> silently; <code>JSON_THROW_ON_ERROR</code> → <code>JsonException</code></td></tr>
  <tr><td>Missing key + default</td><td><code>node["k"]?.asText() ?: d</code></td><td><code>$data['k'] ?? $d</code></td></tr>
  <tr><td>Target shape</td><td>data class</td><td>plain arrays (JSON object ↔ assoc array)</td></tr>
</table>
<p>The insight: Jackson exists because Kotlin has to map JSON's loose shapes
onto rigid data classes; PHP's associative array <em>is</em> JSON's object model,
so the mapping layer disappears — encode and decode are lossless round trips
through the structure you already work in. The price of that convenience is
that both failure modes are quiet by default: malformed input decodes to
<code>null</code> and a typo'd key is just a missing entry. So make errors
loud with <code>JSON_THROW_ON_ERROR</code>, and make absences explicit with
<code>??</code> defaults at the boundary — then hand validated arrays to the
rest of your code.</p>`,
};
