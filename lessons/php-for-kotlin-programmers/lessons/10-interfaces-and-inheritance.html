const LESSON = {
  number: 10,
  title: "Interfaces, Inheritance & Abstracts",

  intro: `
<p>This lesson is home turf. PHP's object model is the one you know from
Kotlin: <code>interface</code>, <code>abstract class</code>, single
inheritance of classes, multiple interfaces per class, abstract methods that
subclasses must implement, concrete methods they inherit. If you can design a
Kotlin class hierarchy, you can design a PHP one — the concepts transfer
one-to-one, only the punctuation (and a couple of defaults) change.</p>
<table>
  <tr><th>Kotlin</th><th>PHP</th></tr>
  <tr><td><code>interface Runner { fun run() }</code></td><td><code>interface Runner { public function run(): void; }</code></td></tr>
  <tr><td><code>class A : B(), C, D</code></td><td><code>class A extends B implements C, D</code></td></tr>
  <tr><td><code>abstract fun area(): Double</code></td><td><code>abstract public function area(): float;</code></td></tr>
  <tr><td><code>super(x)</code> (in header) / <code>super.method()</code></td><td><code>parent::__construct($x);</code> / <code>parent::method()</code></td></tr>
  <tr><td><code>override</code> (mandatory), base needs <code>open</code></td><td>nothing — overriding is implicit (PHP 8.3 adds an opt-in <code>#[\\Override]</code> attribute)</td></tr>
  <tr><td><code>obj is Shape</code></td><td><code>$obj instanceof Shape</code></td></tr>
</table>
<p>The exercise is the <em>template method</em> pattern: an abstract
<code>Shape</code> declares <code>abstract public function area(): float</code>
and provides a concrete <code>describe()</code> that calls
<code>$this->area()</code> — dispatching, virtually, to whichever subclass
implementation the object actually has. Two defaults flip relative to Kotlin.
First, PHP classes and methods are <em>open</em> by default: no
<code>open</code> keyword is needed to subclass or override, whereas Kotlin
seals everything shut until you opt in. Second, PHP has no mandatory
<code>override</code> keyword — a typo'd method name silently becomes a
<em>new</em> method rather than a compile error, so name carefully. Calling
the parent uses the <code>parent::</code> scope-resolution syntax rather than
Kotlin's <code>super</code> keyword.</p>`,

  kotlin: `abstract class Shape {
    abstract fun area(): Double

    // Template method: concrete, calls the abstract hook.
    fun describe(): String =
        "area: \${Math.round(area() * 100) / 100.0}"
}

class Circle(private val radius: Double) : Shape() {
    override fun area(): Double = Math.PI * radius * radius
}

class Rectangle(private val width: Double, private val height: Double) : Shape() {
    override fun area(): Double = width * height
}`,

  task: `
<p>Port the hierarchy. The class skeletons are in the starter:</p>
<ol>
  <li>In the abstract class <code>Shape</code>, implement the concrete
      template method <code>describe(): string</code> — return
      <code>"area: "</code> concatenated (with the <code>.</code> operator)
      to <code>round($this->area(), 2)</code>. It calls an abstract method,
      exactly like the Kotlin version.</li>
  <li>In <code>Circle</code> (which <code>extends Shape</code>), implement
      <code>area(): float</code> using the built-in <code>M_PI</code>
      constant — PHP's <code>Math.PI</code>.</li>
  <li>In <code>Rectangle</code>, implement <code>area(): float</code> as
      width times height.</li>
</ol>
<p>The tests check <code>round($c->area(), 2)</code> for a unit circle, the
rectangle's exact area, <code>describe()</code> on both subclasses, and that
both are <code>instanceof Shape</code>.</p>`,

  starter: `<?php

abstract class Shape {
    // Abstract hook — same meaning as Kotlin's "abstract fun area(): Double".
    abstract public function area(): float;

    // 1. Template method: "area: " . round($this->area(), 2)
    public function describe(): string {
        throw new Exception("TODO: implement describe using \\$this->area()");
    }
}

class Circle extends Shape {
    public function __construct(private float $radius) {}

    // 2. No override keyword needed (or available) — just redeclare the method.
    public function area(): float {
        throw new Exception("TODO: implement area with M_PI");
    }
}

class Rectangle extends Shape {
    public function __construct(private float $width, private float $height) {}

    // 3. width times height.
    public function area(): float {
        throw new Exception("TODO: implement area");
    }
}
`,

  requirements: [
    { pattern: /abstract\s+class\s+Shape/, message: "Keep Shape an abstract class" },
    { pattern: /extends\s+Shape/, message: "Circle and Rectangle must extend Shape" },
    { pattern: /abstract\s+(public\s+)?function\s+area/, message: "Declare area() abstract in Shape" },
  ],

  tests: [
    { name: "Circle(1.0): area rounds to 3.14 (M_PI)",
      code: '$c = new Circle(1.0);\nexpect_eq(round($c->area(), 2), 3.14);' },
    { name: "Circle(2.0): area rounds to 12.57",
      code: '$c = new Circle(2.0);\nexpect_eq(round($c->area(), 2), 12.57);' },
    { name: "Rectangle(3.0, 4.0): area is exactly 12.0",
      code: '$r = new Rectangle(3.0, 4.0);\nexpect_eq($r->area(), 12.0);' },
    { name: 'describe() template method: Circle(1.0) says "area: 3.14"',
      code: 'expect_eq((new Circle(1.0))->describe(), "area: 3.14");' },
    { name: 'describe() template method: Rectangle(2.0, 5.0) says "area: 10"',
      code: 'expect_eq((new Rectangle(2.0, 5.0))->describe(), "area: 10");' },
    { name: "both subclasses are instanceof Shape",
      code: 'expect_true(new Circle(1.0) instanceof Shape);\nexpect_true(new Rectangle(1.0, 1.0) instanceof Shape);' },
  ],

  solution: `<?php

abstract class Shape {
    abstract public function area(): float;

    public function describe(): string {
        return "area: " . round($this->area(), 2);
    }
}

class Circle extends Shape {
    public function __construct(private float $radius) {}

    public function area(): float {
        return M_PI * $this->radius * $this->radius;
    }
}

class Rectangle extends Shape {
    public function __construct(private float $width, private float $height) {}

    public function area(): float {
        return $this->width * $this->height;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>PHP</th></tr>
  <tr><td>Interface</td><td><code>interface I { fun m() }</code></td><td><code>interface I { public function m(): void; }</code></td></tr>
  <tr><td>Implement / inherit</td><td><code>class A : B(), C, D</code></td><td><code>extends B implements C, D</code></td></tr>
  <tr><td>Class inheritance</td><td>single</td><td>single</td></tr>
  <tr><td>Abstract method</td><td><code>abstract fun area(): Double</code></td><td><code>abstract public function area(): float;</code></td></tr>
  <tr><td>Call the parent</td><td><code>super(...)</code>, <code>super.m()</code></td><td><code>parent::__construct(...)</code>, <code>parent::m()</code></td></tr>
  <tr><td>Override marker</td><td><code>override</code> (required), base needs <code>open</code></td><td>implicit (opt-in <code>#[\\Override]</code> since 8.3)</td></tr>
</table>
<p>One structural note for when hierarchies grow: because subclass
constructors are ordinary <code>__construct</code> methods, a child that
defines its own constructor must call
<code>parent::__construct(...)</code> <em>explicitly</em> — PHP never forces
the superclass-constructor delegation that Kotlin bakes into the class header
(<code>: Shape(...)</code>). Forgetting it doesn't fail at the call site; the
parent's properties just go uninitialized, and PHP 8's typed properties will
then throw the moment one is read. Same model as Kotlin, minus the compiler
hand-holding — which is this whole lesson in one sentence.</p>`,
};
