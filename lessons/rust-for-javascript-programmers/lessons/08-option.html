const LESSON = {
  number: 8,
  title: "Option: The End of Null",

  intro: `
<p>JavaScript has two nothings — <code>null</code> and
<code>undefined</code> — and a whole toolkit for surviving them:
<code>?.</code>, <code>??</code>, <code>if (x != null)</code>, and the
2am classic, <em>"Cannot read properties of undefined."</em> The bug is
always the same: a value that <em>might</em> be absent looks exactly like
a value that's definitely there, so nothing forces you to check before
you use it.</p>
<table>
  <tr><th>JavaScript</th><th>Rust</th></tr>
  <tr><td>a <code>string</code>… or <code>undefined</code>, silently</td><td><code>Option&lt;String&gt;</code> — absence is in the type</td></tr>
  <tr><td>value present</td><td><code>Some("Ada".to_string())</code></td></tr>
  <tr><td><code>null</code> / <code>undefined</code></td><td><code>None</code></td></tr>
  <tr><td><code>name ?? "Guest"</code></td><td><code>name.unwrap_or("Guest".to_string())</code></td></tr>
  <tr><td><code>name?.toUpperCase()</code></td><td><code>name.map(|n| n.to_uppercase())</code></td></tr>
</table>
<p>Rust replaces both nothings with one concept: <code>Option&lt;T&gt;</code>,
which is either <code>Some(value)</code> or <code>None</code>. The trick
isn't the wrapper — it's that an <code>Option&lt;String&gt;</code>
<em>is not a</em> <code>String</code>. You can't call a string method on
it, pass it where a <code>String</code> is expected, or otherwise pretend
the value is there. The compiler refuses to build your program until
you've said what happens in the <code>None</code> case — with
<code>unwrap_or</code> (your <code>??</code>), <code>map</code> (your
<code>?.</code>), or a <code>match</code>. The crash you've been
defensively coding around all these years is simply not a runtime event
anymore.</p>`,

  javascript: `function findUser(id) {
  const users = { 1: "Ada", 2: "Grace" };
  return users[id];       // a string… or undefined. Same shape either way.
}

const name = findUser(3);

// name.toUpperCase();
// TypeError: Cannot read properties of undefined

// So every call site wears armor:
const display = name ?? "Guest";
const upper = name?.toUpperCase();
const first = name ? name[0] : undefined;

console.log(display, upper, first);`,

  task: `
<p>Make absence a type instead of a surprise:</p>
<ol>
  <li>Write <code>find_user(id: u32) -&gt; Option&lt;String&gt;</code>:
      <code>Some("Ada".to_string())</code> for id 1,
      <code>Some("Grace".to_string())</code> for id 2, and
      <code>None</code> for anything else. A <code>match</code> on
      <code>id</code> with a <code>_</code> arm reads nicely.</li>
  <li>Write <code>display_name(name: Option&lt;String&gt;) -&gt; String</code>
      that returns the name if present and <code>"Guest"</code> otherwise —
      one call to <code>unwrap_or</code>, the Rust <code>??</code>.</li>
  <li>Write <code>first_char(s: &amp;str) -&gt; Option&lt;char&gt;</code>
      returning the first character, if any:
      <code>s.chars().next()</code> already produces exactly the right
      <code>Option</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. find_user: Some("Ada") for 1, Some("Grace") for 2, None otherwise.
//    Remember string literals need .to_string() to become owned Strings.
fn find_user(id: u32) -> Option<String> {
    todo!()
}

// 2. display_name: the ?? "Guest" of Rust — one unwrap_or call.
fn display_name(name: Option<String>) -> String {
    todo!()
}

// 3. first_char: s.chars().next() is already an Option<char>.
fn first_char(s: &str) -> Option<char> {
    todo!()
}
`,

  requirements: [
    { pattern: /Option</, message: "Work with the Option<T> type" },
    { pattern: /Some\(/, message: "Return present values wrapped in Some(...)" },
    { pattern: /None/, message: "Return None for absent values" },
    { pattern: /unwrap_or/, message: "Use unwrap_or for the ?? \"Guest\" default" },
  ],

  tests: [
    { name: 'find_user(1) returns Some("Ada")',
      code: 'assert_eq!(find_user(1), Some("Ada".to_string()));' },
    { name: 'find_user(2) returns Some("Grace")',
      code: 'assert_eq!(find_user(2), Some("Grace".to_string()));' },
    { name: "find_user(99) returns None",
      code: "assert_eq!(find_user(99), None);" },
    { name: 'display_name(Some("Ada")) returns "Ada"',
      code: 'assert_eq!(display_name(Some("Ada".to_string())), "Ada");' },
    { name: 'display_name(None) returns "Guest"',
      code: 'assert_eq!(display_name(None), "Guest");' },
    { name: "first_char works on both empty and non-empty strings",
      code: 'assert_eq!(first_char("rust"), Some(\'r\'));\nassert_eq!(first_char(""), None);' },
  ],

  solution: `fn find_user(id: u32) -> Option<String> {
    match id {
        1 => Some("Ada".to_string()),
        2 => Some("Grace".to_string()),
        _ => None,
    }
}

fn display_name(name: Option<String>) -> String {
    name.unwrap_or("Guest".to_string())
}

fn first_char(s: &str) -> Option<char> {
    s.chars().next()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Rust</th></tr>
  <tr><td>Absence</td><td><code>null</code> and <code>undefined</code></td><td><code>None</code> — one nothing, and it's typed</td></tr>
  <tr><td>Presence</td><td>the bare value</td><td><code>Some(value)</code></td></tr>
  <tr><td>Default</td><td><code>x ?? fallback</code></td><td><code>x.unwrap_or(fallback)</code></td></tr>
  <tr><td>Safe transform</td><td><code>x?.method()</code></td><td><code>x.map(|v| v.method())</code></td></tr>
  <tr><td>Forgot to check</td><td>runtime <code>TypeError</code>, maybe in prod</td><td>compile error, before the code ever runs</td></tr>
</table>
<p>The deep shift: in JavaScript, <em>any</em> value might secretly be
undefined, so defensive checks are a judgment call you make (or forget)
at every call site. In Rust, a <code>String</code> is always a string —
guaranteed — and only an <code>Option&lt;String&gt;</code> can be absent,
which you can read straight off the function signature. The armor moves
out of your code and into the type.</p>`,
};
