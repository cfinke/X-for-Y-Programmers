  intro: `
<p>No new concepts this time — just the ones you own now, working
together. You're building the core of a little inventory system: a
<code>struct</code> for the data, iterator chains for the queries,
<code>Option</code> where a lookup can miss, and <code>&amp;mut</code>
where something actually changes. It's the Rust translation of code
you've written in JavaScript a hundred times: an array of objects and a
handful of functions over it.</p>
<table>
  <tr><th>JavaScript</th><th>Rust</th></tr>
  <tr><td><code>{ name, priceCents, count }</code></td><td><code>struct Item { name, price_cents, count }</code></td></tr>
  <tr><td><code>items.reduce((s, i) =&gt; s + ..., 0)</code></td><td><code>items.iter().map(...).sum()</code></td></tr>
  <tr><td><code>items.find(...)</code> — item or <code>undefined</code></td><td><code>items.iter().find(...)</code> — <code>Option&lt;&amp;Item&gt;</code></td></tr>
  <tr><td>mutate freely, hope nothing else was looking</td><td><code>&amp;mut Vec&lt;Item&gt;</code> — mutation declared in the signature</td></tr>
  <tr><td><code>items.filter(...).map(...)</code></td><td><code>items.iter().filter(...).map(...).collect()</code></td></tr>
</table>
<p>Read the four signatures in the starter before writing anything —
they tell the whole story, which is itself the payoff of the course.
<code>&amp;[Item]</code> means "I only look." <code>&amp;mut Vec&lt;Item&gt;</code>
means "I change it." <code>Option&lt;&amp;Item&gt;</code> means "this can
miss, and the caller must deal with it." In JavaScript those facts live
in your memory of the implementation; in Rust they're the contract.</p>`,

  javascript: `const items = [
  { name: "apple", priceCents: 50, count: 3 },
  { name: "banana", priceCents: 25, count: 0 },
];

const totalValue = (items) =>
  items.reduce((sum, i) => sum + i.priceCents * i.count, 0);

const findItem = (items, name) =>
  items.find((i) => i.name === name);   // an item… or undefined

function restock(items, name, amount) {
  const item = findItem(items, name);
  if (!item) return false;
  item.count += amount;                  // silent mutation
  return true;
}

const namesInStock = (items) =>
  items.filter((i) => i.count > 0).map((i) => i.name);`,

  task: `
<p>Implement the four functions over <code>Item</code> (the struct is
already complete — don't change it):</p>
<ol>
  <li><code>total_value(items: &amp;[Item]) -&gt; u32</code> — the sum of

      <code>.iter().find(|i| i.name == name)</code> returns exactly this.

  <li><code>restock(items: &amp;mut Vec&lt;Item&gt;, name: &amp;str, amount: u32) -&gt; bool</code>

</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions

  requirements: [
    { pattern: /Option<&/, message: "find_item returns Option<&Item> — a borrow that can miss" },
    { pattern: /\.iter\(\)/, message: "Use .iter() to walk the items" },
    { pattern: /&mut\s+Vec<Item>/, message: "restock takes &mut Vec<Item> — mutation is in the signature" },
  ],

  tests: [
    { name: "total_value sums price_cents * count (3*50 + 0*25 + 2*100 = 350)",
      code: 'let items = vec![\n    Item { name: "apple".to_string(), price_cents: 50, count: 3 },\n    Item { name: "banana".to_string(), price_cents: 25, count: 0 },\n    Item { name: "cherry".to_string(), price_cents: 100, count: 2 },\n];\nassert_eq!(total_value(&items), 350);' },
    { name: 'names_in_stock skips count 0: only ["apple", "cherry"]',
      code: 'let items = vec![\n    Item { name: "apple".to_string(), price_cents: 50, count: 3 },\n    Item { name: "banana".to_string(), price_cents: 25, count: 0 },\n    Item { name: "cherry".to_string(), price_cents: 100, count: 2 },\n];\nassert_eq!(names_in_stock(&items), vec!["apple".to_string(), "cherry".to_string()]);' },

    { name: "restock adds to the count and returns true",
      code: 'let mut items = vec![Item { name: "banana".to_string(), price_cents: 25, count: 0 }];\nassert!(restock(&mut items, "banana", 5));\nassert_eq!(items[0].count, 5);' },
    { name: "restock returns false (and changes nothing) for an unknown name",
      code: 'let mut items = vec![Item { name: "apple".to_string(), price_cents: 50, count: 3 }];\nassert!(!restock(&mut items, "durian", 5));\nassert_eq!(items[0].count, 3);' },
  ],

  solution: `struct Item {
    name: String,
    price_cents: u32,
    count: u32,
}

fn total_value(items: &[Item]) -> u32 {
    items.iter().map(|i| i.price_cents * i.count).sum()
}

fn find_item<'a>(items: &'a [Item], name: &str) -> Option<&'a Item> {
    items.iter().find(|i| i.name == name)
}

fn restock(items: &mut Vec<Item>, name: &str, amount: u32) -> bool {
    for item in items.iter_mut() {
        if item.name == name {
            item.count += amount;
            return true;
        }
    }
    false
}

fn names_in_stock(items: &[Item]) -> Vec<String> {
    items
        .iter()
        .filter(|i| i.count > 0)
        .map(|i| i.name.clone())
        .collect()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Rust</th></tr>
  <tr><td>Record of fields</td><td>object literal, shape by convention</td><td><code>struct Item</code>, shape by definition</td></tr>
  <tr><td>Aggregate</td><td><code>reduce((s, i) =&gt; ..., 0)</code></td><td><code>.iter().map(...).sum()</code></td></tr>
  <tr><td>Lookup that can miss</td><td><code>find</code> → value or <code>undefined</code></td><td><code>find</code> → <code>Option&lt;&amp;Item&gt;</code>, checked at the call site</td></tr>
  <tr><td>Mutation</td><td>any function might do it</td><td>only through <code>&amp;mut</code>, visible in the signature</td></tr>
  <tr><td>Filter + project</td><td><code>filter(...).map(...)</code></td><td><code>.iter().filter(...).map(...).collect()</code></td></tr>
</table>
<p>Set the two versions side by side and the bodies are nearly the same —
<code>find</code> is <code>find</code>, <code>filter/map</code> is
<code>filter/map</code>. What changed is everything <em>around</em> the
bodies: <code>undefined</code> became a type the compiler makes callers
handle, silent mutation became a <code>&amp;mut</code> you can read in
the signature, and camelCase became snake_case somewhere along the way.
That's the course in one sentence: Rust didn't ask you to think new
thoughts, it asked you to write down the ones you already had — and then
it checks them for you, forever. Nicely done.</p>`,
