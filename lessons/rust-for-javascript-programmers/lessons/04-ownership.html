<div id="app"></div>
<script>
const LESSON = {
  number: 4,
  title: "Ownership & Moves",

  intro: `
<p>This is the lesson Rust is famous for. In JavaScript, every object and
array is shared by reference: assign it, pass it to a function, stash it in
three data structures — they all point at the same thing, anyone can mutate
it, and the garbage collector cleans up whenever it gets around to it. Rust
has no garbage collector. Instead, <strong>every value has exactly one
owner</strong>, and when the owner goes out of scope, the value is freed —
deterministically, for free.</p>
<table>
  <tr><th>JavaScript</th><th>Rust</th></tr>
  <tr><td><code>const b = a;</code> — a and b share one array</td><td><code>let b = a;</code> — the value <em>moves</em> to b; a is dead</td></tr>
  <tr><td><code>const c = [...a];</code> — copy by habit</td><td><code>let c = a.clone();</code> — copy on request, visibly</td></tr>
  <tr><td>pass to a function → still shared</td><td>pass by value → moved in; the caller loses it</td></tr>
  <tr><td>GC frees memory eventually</td><td>owner goes out of scope → freed immediately</td></tr>
</table>
<p>One owner means assignment can't copy the reference the JS way — instead
it <em>moves</em> ownership. After <code>let b = a;</code>, using
<code>a</code> is a compile error: "borrow of moved value". The same happens
when you pass a <code>String</code> or <code>Vec</code> (Rust's array) into a
function by value — the function <em>consumes</em> it. Want two independent
copies? Say so: <code>.clone()</code> is your <code>[...spread]</code> habit
made explicit and visible in the code.</p>
<p>One carve-out: simple values like <code>i32</code> and <code>bool</code>
are <em>Copy</em> types — they're duplicated on assignment, like JS numbers,
and never move. It's the heap-owning types — <code>String</code>,
<code>Vec</code> — that play by ownership rules.</p>`,

  javascript: `// In JS, assignment shares — it never copies objects:
const a = [1, 2, 3];
const b = a;            // b IS a
b.push(4);
console.log(a);         // [1, 2, 3, 4] — a "changed" at a distance

// The fix you already do by reflex — copy explicitly:
const c = [...a];
c.push(5);
console.log(a.length, c.length);  // 4 5 — finally independent

function consumeAndShout(s) {
  return s.toUpperCase(); // s is shared with the caller, and the
}                         // GC will collect it... sometime

const msg = "hello";
console.log(consumeAndShout(msg));
console.log(msg);         // still alive — everything always is`,

  task: `
<p>Practice moving, consuming, and cloning:</p>
<ol>
  <li><code>consume_and_shout(s: String) -> String</code> — note the parameter
      is an owned <code>String</code>, not <code>&amp;str</code>: calling this
      function <em>moves</em> the string in, and the caller can never use it
      again. Return it uppercased with <code>.to_uppercase()</code>.</li>
  <li><code>keep_both(v: Vec&lt;i32&gt;) -> (Vec&lt;i32&gt;, Vec&lt;i32&gt;)</code>
      — the function owns <code>v</code> now, and the only way to give it back
      is to return it. Make a <code>.clone()</code> of <code>v</code> (bind it
      with <code>let mut</code>), <code>.push(0)</code> onto the clone, and
      return the tuple <code>(v, clone)</code>: original untouched, extended
      copy alongside. <code>(a, b)</code> builds a tuple — like returning
      <code>[a, b]</code> in JS.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. consume_and_shout takes ownership of s (String, not &str) and
//    returns a new uppercased String.
fn consume_and_shout(s: String) -> String {
    todo!()
}

// 2. keep_both: clone v into a let mut, push 0 onto the clone,
//    return (v, clone).
fn keep_both(v: Vec<i32>) -> (Vec<i32>, Vec<i32>) {
    todo!()
}
`,

  requirements: [
    { pattern: /\.clone\(\)/, message: "Copy the vector explicitly with .clone()" },
    { pattern: /\.push\(/, message: "Push the extra element onto the clone with .push()" },
  ],

  tests: [
    { name: 'consume_and_shout("hello".to_string()) returns "HELLO"',
      code: 'assert_eq!(consume_and_shout(String::from("hello")), "HELLO");' },
    { name: 'consume_and_shout("Rust") returns "RUST"',
      code: 'assert_eq!(consume_and_shout(String::from("Rust")), "RUST");' },
    { name: "keep_both(vec![1, 2, 3]) returns the original and a clone ending in 0",
      code: "assert_eq!(keep_both(vec![1, 2, 3]), (vec![1, 2, 3], vec![1, 2, 3, 0]));" },
    { name: "keep_both(vec![]) returns (empty, [0])",
      code: "assert_eq!(keep_both(vec![]), (vec![], vec![0]));" },
    { name: "the original vector comes back unmodified",
      code: "let (original, extended) = keep_both(vec![7, 8]);\nassert_eq!(original, vec![7, 8]);\nassert_eq!(extended.len(), 3);" },
  ],

  solution: `fn consume_and_shout(s: String) -> String {
    s.to_uppercase()
}

fn keep_both(v: Vec<i32>) -> (Vec<i32>, Vec<i32>) {
    let mut extended = v.clone();
    extended.push(0);
    (v, extended)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Rust</th></tr>
  <tr><td>Assign an array/object</td><td>shares a reference</td><td>moves ownership; old name is dead</td></tr>
  <tr><td>Use after assigning away</td><td>fine (same object)</td><td>compile error: "borrow of moved value"</td></tr>
  <tr><td>Explicit copy</td><td><code>[...a]</code>, <code>{...o}</code>, <code>structuredClone</code></td><td><code>a.clone()</code></td></tr>
  <tr><td>Numbers/booleans</td><td>copied on assignment</td><td>same — Copy types are exempt from moves</td></tr>
  <tr><td>Memory reclaimed</td><td>GC, eventually</td><td>when the owner goes out of scope, immediately</td></tr>
</table>
<p>Every spooky-action-at-a-distance bug you've debugged — a function that
mutated the array you passed it, two components "sharing" state by accident —
comes from JS's everything-is-shared model. Rust makes sharing impossible by
default: a value has one owner, moves are tracked by the compiler, and a copy
happens only where you can see the word <code>clone</code>. In the next
lesson: how to <em>lend</em> a value instead of moving it, which is what
you'll actually do most of the time.</p>`,
};
</script>
