  intro: `
<p>In Python, functions are just values: you can pass them around, store them
in variables, and write a type hint like <code>Callable[[int, int], int]</code>
if you're chasing type checkers. C# does all of this too, but a function value
has a <em>named type</em> called a <strong>delegate</strong>. You rarely
declare one by hand, because the framework ships generic delegates that cover
almost every case: <code>Func&lt;&gt;</code> for something that returns a
value, <code>Action&lt;&gt;</code> for something that returns <code>void</code>,
and <code>Predicate&lt;T&gt;</code> for a test returning <code>bool</code>.</p>
<table>
  <tr><th>Python</th><th>C#</th></tr>
  <tr><td><code>Callable[[int], int]</code></td><td><code>Func&lt;int, int&gt;</code></td></tr>
  <tr><td><code>Callable[[int, int], int]</code></td><td><code>Func&lt;int, int, int&gt;</code></td></tr>
  <tr><td><code>Callable[[int], None]</code></td><td><code>Action&lt;int&gt;</code></td></tr>
  <tr><td><code>Callable[[int], bool]</code></td><td><code>Predicate&lt;int&gt;</code></td></tr>
  <tr><td><code>lambda x: x + 1</code></td><td><code>x =&gt; x + 1</code> (same idea!)</td></tr>
  <tr><td><code>Combine = Callable[[int, int], int]</code></td><td><code>delegate int Op(int a, int b);</code></td></tr>
</table>
<p>Two things to note. In <code>Func&lt;A, B, R&gt;</code> the <em>last</em>
type parameter is the return type and the rest are the arguments — so
<code>Func&lt;int, int, int&gt;</code> takes two <code>int</code>s and returns an
<code>int</code>. And the lambda arrow <code>=&gt;</code> plays the same role
as Python's <code>lambda</code> keyword: <code>x =&gt; x + 1</code> is like
<code>lambda x: x + 1</code> — but a C# lambda can also take a block body,
<code>x =&gt; { return x + 1; }</code>, something Python's single-expression
<code>lambda</code> can't do (you'd reach for a <code>def</code> instead).
Lambdas capture surrounding variables, so you can return one that closes over
a parameter.</p>`,

  python: `from typing import Callable

Combine = Callable[[int, int], int]

def reduce_(nums: list[int], seed: int, op: Combine) -> int:
    acc = seed
    for n in nums:
        acc = op(acc, n)
    return acc

def count_where(nums: list[int], pred: Callable[[int], bool]) -> int:
    return sum(1 for n in nums if pred(n))

def adder(n: int) -> Callable[[int], int]:
    return lambda x: x + n`,

  task: `

  solution: `static class Higher {
  public delegate int Combine(int a, int b);

  public static int Reduce(IEnumerable<int> nums, int seed, Combine op) {
    int acc = seed;
    foreach (var n in nums) {
      acc = op(acc, n);
    }
    return acc;
  }

  public static int CountWhere(IEnumerable<int> nums, Predicate<int> pred) {
    int count = 0;
    foreach (var n in nums) {
      if (pred(n)) count++;
    }
    return count;
  }

  public static int SumMapped(IEnumerable<int> nums, Func<int, int> f) {
    int total = 0;
    foreach (var n in nums) {
      total += f(n);
    }
    return total;
  }

  public static Func<int, int> Adder(int n) {
    return x => x + n;
  }

  public static void ForEach(IEnumerable<int> nums, Action<int> effect) {
    foreach (var n in nums) {
      effect(n);
    }
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>C#</th></tr>
  <tr><td>Value-returning fn type</td><td><code>Callable[[int], int]</code></td><td><code>Func&lt;int, int&gt;</code></td></tr>
  <tr><td>Void fn type</td><td><code>Callable[[int], None]</code></td><td><code>Action&lt;int&gt;</code></td></tr>
  <tr><td>Boolean test</td><td><code>Callable[[int], bool]</code></td><td><code>Predicate&lt;int&gt;</code></td></tr>
  <tr><td>Named fn type</td><td><code>Op = Callable[[int, int], int]</code></td><td><code>delegate int Op(int a, int b);</code></td></tr>
  <tr><td>Arrow / lambda</td><td><code>lambda x: x + 1</code></td><td><code>x =&gt; x + 1</code></td></tr>
  <tr><td>Closure</td><td><code>lambda x: x + n</code> (captures <code>n</code>)</td><td><code>x =&gt; x + n</code> (captures <code>n</code>)</td></tr>
</table>
<p><code>Func&lt;&gt;</code>, <code>Action&lt;&gt;</code>, and
<code>Predicate&lt;T&gt;</code> are just pre-declared delegate types, so your
<code>Combine</code> above could equally have been a
<code>Func&lt;int, int, int&gt;</code> — a custom delegate mostly earns its keep
when the name documents intent or the signature uses <code>ref</code>/<code>out</code>
parameters that <code>Func</code> cannot express.</p>
<p>Because these are all the same underlying concept, a lambda flows into any
delegate whose shape it matches. This is exactly how LINQ works:
<code>nums.Where(x =&gt; x &gt; 0).Select(x =&gt; x * x).Sum()</code> is just
higher-order methods taking <code>Func</code>/<code>Predicate</code> arguments —
much like Python's <code>filter</code>/<code>map</code>/<code>sum</code>, or a
list comprehension. Your <code>CountWhere</code> and <code>SumMapped</code> are
hand-rolled versions of <code>Count(pred)</code> and <code>Sum(selector)</code>.</p>`,
