<p>Time to put the whole course together. You'll build a small
<strong>typed in-memory repository</strong> — the same shape you'd reach for in
Python with a <code>dict[int, T]</code> behind a class, but assembled
from the C# tools you've collected: a generic class with a constraint, an
interface, LINQ, and real exceptions instead of returning <code>None</code>.</p>
<table>
  <tr><th>Python</th><th>C#</th></tr>
  <tr><td><code>TypeVar("T", bound=Entity)</code></td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td><code>self.items: dict[int, T] = {}</code></td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td><code>items.values()</code> then <code>filter(...)</code></td><td><code>items.Values.Where(...)</code> (LINQ)</td></tr>
  <tr><td><code>raise NotFoundError(...)</code></td><td><code>throw new NotFoundException(...)</code></td></tr>
  <tr><td>return <code>T | None</code></td><td>return <code>T</code>, or <em>throw</em></td></tr>
</table>
<p>Two design habits carry over cleanly. The generic <em>constraint</em>
(<code>where T : IEntity</code>) is C#'s answer to a <code>Protocol</code>-bound
<code>TypeVar("T", bound=Entity)</code>: it lets the repository read
<code>item.Id</code> because every <code>T</code> is guaranteed to have it — though
in Python that bound is only checked by a tool like <code>mypy</code>, never at
runtime. And where Python code often returns <code>T | None</code> for a miss,
idiomatic C# throws a custom exception derived from <code>Exception</code> — the
caller either gets a valid <code>T</code> or a failure it can <code>catch</code> by
type.</p>`,

  python: `from typing import Protocol, TypeVar


class Entity(Protocol):
    id: int


T = TypeVar("T", bound=Entity)


class NotFoundError(Exception):
    pass


class Repository:
    def __init__(self):
        self.items: dict[int, T] = {}

    def add(self, item):
        if item.id in self.items:
            raise ValueError(f"id {item.id} already exists")
        self.items[item.id] = item

    def get(self, id):
        item = self.items.get(id)
        if item is None:
            raise NotFoundError(f"id {id} not found")
        return item

    def where(self, predicate):
        return sorted(filter(predicate, self.items.values()), key=lambda x: x.id)

    @property
    def count(self):
        return len(self.items)`,

  solution: `interface IEntity {
  int Id { get; }
}

class NotFoundException : Exception {
  public NotFoundException(string message) : base(message) {
  }
}

class Repository<T> where T : IEntity {
  private Dictionary<int, T> items = new Dictionary<int, T>();

  public void Add(T item) {
    if (items.ContainsKey(item.Id)) {
      throw new InvalidOperationException($"id {item.Id} already exists");
    }
    items[item.Id] = item;
  }

  public T Get(int id) {
    T value;
    if (!items.TryGetValue(id, out value)) {
      throw new NotFoundException($"id {id} not found");
    }
    return value;
  }

  public bool Remove(int id) {
    return items.Remove(id);
  }

  public List<T> Where(Func<T, bool> predicate) {
    return items.Values.Where(predicate).OrderBy(x => x.Id).ToList();
  }

  public int Count {
    get { return items.Count; }
  }
}

class User : IEntity {
  public int Id { get; private set; }
  public string Name { get; private set; }
  public int Age { get; private set; }

  public User(int id, string name, int age) {
    Id = id;
    Name = name;
    Age = age;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>C#</th></tr>
  <tr><td>Constrained generic</td><td><code>TypeVar("T", bound=Entity)</code></td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td>Keyed store</td><td><code>dict[int, T]</code></td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td>Safe lookup</td><td><code>d.get(id)</code> → <code>T | None</code></td><td><code>TryGetValue(id, out value)</code></td></tr>
  <tr><td>Filter</td><td><code>filter(p, items)</code></td><td><code>seq.Where(p)</code> (LINQ)</td></tr>
  <tr><td>Custom error</td><td><code>class E(Exception)</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Catch by type</td><td><code>except E as e:</code></td><td><code>catch (E ex) { }</code></td></tr>
</table>
<p>A few things came together here. <code>where T : IEntity</code> is what unlocks
<code>item.Id</code> inside the generic — without the constraint the compiler only
knows <code>T</code> is <em>some</em> type and would reject the member access,
similar to how a <code>Protocol</code> bound narrows what a Python type checker
will allow for <code>T</code>. The LINQ chain
<code>Where(...).OrderBy(...).ToList()</code> is lazy until <code>ToList()</code>
forces it, mirroring how you'd <code>filter</code> then <code>sorted</code> an
iterable.</p>
<p>The big idiomatic shift from Python is error handling: rather than returning
<code>T | None</code> and making every caller check for <code>None</code>, C# code
throws a typed exception on the exceptional path. Callers <code>catch</code> by
exception type — <code>catch (NotFoundException ex)</code> — which is both more
precise and more discoverable than an <code>isinstance</code> check inside an
<code>except</code> clause. That's the whole course in one small object: types
that are real at runtime, generics with constraints, interfaces as contracts,
LINQ for querying, and exceptions for failure.</p>`,
