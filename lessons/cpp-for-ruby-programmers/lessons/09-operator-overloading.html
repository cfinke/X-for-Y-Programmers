const LESSON = {
  number: 9,
  title: "Operator Overloading",

  intro: `
<p>In Ruby, <code>==</code> and <code>&lt;</code> are just methods —
<code>def ==(other)</code> and <code>def &lt;(other)</code> — so any object can
already teach them what to do, and mixing in <code>Comparable</code> gets you
<code>&lt;</code>, <code>&lt;=</code>, <code>&gt;</code>, <code>&gt;=</code>,
and <code>between?</code> for free once you define <code>&lt;=&gt;</code>. C++
has no such mixin, but it has the same idea in spirit: a type <em>defines</em>
what the operators mean for its own values. Once <code>Fraction</code> has an
<code>operator==</code>, writing <code>a == b</code> calls it, and every generic
algorithm and container that expects <code>==</code> or <code>&lt;</code> just
works with your type for free.</p>
<table>
  <tr><th>Ruby</th><th>C++</th></tr>
  <tr><td><code>a == b</code> (calls <code>def ==</code>)</td><td><code>a == b</code> (via <code>operator==</code>)</td></tr>
  <tr><td><code>(a &lt;=&gt; b) &lt; 0</code></td><td><code>a &lt; b</code> (via <code>operator&lt;</code>)</td></tr>
  <tr><td><code>a + b</code> (calls <code>def +</code>)</td><td><code>a + b</code> (via <code>operator+</code>)</td></tr>
  <tr><td>no separate <code>+=</code> method</td><td><code>a += b</code> (via <code>operator+=</code>)</td></tr>
</table>
<p>An operator is just a function with a funny name. Written as a member,
<code>a == b</code> becomes <code>a.operator==(b)</code>: the left operand is
<code>*this</code> and the right is the parameter — much like Ruby's
<code>a == b</code> desugaring to <code>a.==(b)</code>. Comparison operators
return <code>bool</code>; arithmetic operators like <code>+</code> return a
fresh value and leave their operands alone, so they are <code>const</code>.
Compound assignment (<code>+=</code>) mutates the left operand and returns a
reference to it — Ruby has no equivalent single method, since
<code>a += b</code> there just expands to <code>a = a + b</code>.</p>`,

  ruby: `class Fraction
  attr_reader :num, :den

  def initialize(num, den)
    @num = num
    @den = den
  end

  def ==(other)
    num * other.den == other.num * den
  end

  def less_than(other)
    num * other.den < other.num * den
  end

  def plus(other)
    Fraction.new(num * other.den + other.num * den,
                 den * other.den)
  end
end`,

  task: `
<p>Build a <code>Fraction</code> value type. The constructor should
<strong>normalize</strong> so equal fractions share a representation: keep the
denominator positive, and divide both parts by <code>std::gcd</code> (from
<code>&lt;numeric&gt;</code>, already included). A default of <code>0/1</code>
is provided.</p>
<p>Then overload these operators as members:</p>
<ol>
  <li><code>operator==</code> and <code>operator!=</code> — two fractions are
      equal when <code>num*o.den == o.num*den</code>. Write <code>!=</code> in
      terms of <code>==</code>.</li>
  <li><code>operator&lt;</code> — <code>num*o.den &lt; o.num*den</code> (valid
      because the constructor keeps denominators positive).</li>
  <li><code>operator+</code> — returns a new <code>Fraction</code>:
      <code>(num*o.den + o.num*den) / (den*o.den)</code>. It runs through the
      constructor, so the result comes back normalized.</li>
  <li><code>operator+=</code> — mutate <code>*this</code> and
      <code>return *this;</code> by reference.</li>
</ol>`,

  starter: `struct Fraction {
  int num;
  int den;

  Fraction(int n = 0, int d = 1) : num(n), den(d) {
    // TODO: normalize (positive denominator, divide by gcd)
  }

  bool operator==(const Fraction& o) const {
    return false; // TODO
  }

  bool operator!=(const Fraction& o) const {
    return false; // TODO
  }

  bool operator<(const Fraction& o) const {
    return false; // TODO
  }

  Fraction operator+(const Fraction& o) const {
    return Fraction(); // TODO
  }

  Fraction& operator+=(const Fraction& o) {
    return *this; // TODO
  }
};
`,

  requirements: [
    { pattern: /bool\s+operator==/, message: "Define a member operator== that returns bool" },
    { pattern: /bool\s+operator</, message: "Define a member operator< for ordering" },
    { pattern: /Fraction\s+operator\+/, message: "Define operator+ returning a Fraction by value" },
  ],

  tests: [
    { name: "1/2 equals 2/4 after normalizing", code: "    expect_true(Fraction(1, 2) == Fraction(2, 4));" },
    { name: "1/2 does not equal 2/3", code: "    expect_true(Fraction(1, 2) != Fraction(2, 3));" },
    { name: "1/3 < 1/2", code: "    expect_true(Fraction(1, 3) < Fraction(1, 2));" },
    { name: "negative denominator normalizes", code: "    expect_true(Fraction(1, -2) == Fraction(-1, 2));" },
    { name: "1/2 + 1/3 == 5/6", code: "    expect_eq(Fraction(1, 2) + Fraction(1, 3), Fraction(5, 6));" },
    { name: "1/6 + 1/6 reduces to 1/3", code: "    expect_eq(Fraction(1, 6) + Fraction(1, 6), Fraction(1, 3));" },
    { name: "+= mutates and returns reference", code: "    Fraction f(1, 4);\n    f += Fraction(1, 4);\n    expect_eq(f, Fraction(1, 2));" },
  ],

  solution: `struct Fraction {
  int num;
  int den;

  Fraction(int n = 0, int d = 1) : num(n), den(d) {
    if (den < 0) { num = -num; den = -den; }
    int g = std::gcd(num < 0 ? -num : num, den);
    if (g != 0) { num /= g; den /= g; }
  }

  bool operator==(const Fraction& o) const {
    return num * o.den == o.num * den;
  }

  bool operator!=(const Fraction& o) const {
    return !(*this == o);
  }

  bool operator<(const Fraction& o) const {
    return num * o.den < o.num * den;
  }

  Fraction operator+(const Fraction& o) const {
    return Fraction(num * o.den + o.num * den, den * o.den);
  }

  Fraction& operator+=(const Fraction& o) {
    *this = *this + o;
    return *this;
  }
};
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>C++</th></tr>
  <tr><td>Equality</td><td><code>def ==(other)</code></td><td><code>bool operator==(const T&amp;) const</code></td></tr>
  <tr><td>Ordering</td><td><code>def &lt;=&gt;(other)</code></td><td><code>bool operator&lt;(const T&amp;) const</code></td></tr>
  <tr><td>Add (new value)</td><td><code>def +(other)</code></td><td><code>T operator+(const T&amp;) const</code></td></tr>
  <tr><td>Add in place</td><td><code>a = a + b</code></td><td><code>T&amp; operator+=(const T&amp;)</code></td></tr>
</table>
<p>Notice how the operators compose. <code>operator!=</code> delegates to
<code>operator==</code>, and <code>operator+=</code> is written in terms of
<code>operator+</code> — define the primitive once, build the rest on top. This
mirrors how Ruby's <code>Comparable</code> module derives
<code>&lt;</code>, <code>&lt;=</code>, <code>&gt;</code>, and <code>&gt;=</code>
from a single <code>&lt;=&gt;</code> you provide; C++ has no such mixin, so each
operator you want has to be written (or delegated) by hand. Because
<code>operator+</code> returns by value it does not touch its operands, which is
why it is <code>const</code>; <code>operator+=</code> returns <code>*this</code>
by reference so that, like the built-in types, <code>(a += b) += c</code> keeps
working on the same object.</p>
<p>Two idioms worth carrying forward. First, since your type now models
<code>==</code> and <code>&lt;</code>, it drops straight into
<code>std::sort</code>, <code>std::set</code>, and any algorithm that needs to
compare — that is the real payoff of overloading the operators the standard
library already speaks. Second, C++20 can generate all six comparisons from one
<code>auto operator&lt;=&gt;(const Fraction&amp;) const = default;</code> (the
"spaceship" operator) when a memberwise comparison is what you want — the same
spirit as deriving from <code>&lt;=&gt;</code> in Ruby's <code>Comparable</code>;
we wrote them by hand here because the fraction's cross-multiplication logic is
not memberwise.</p>`,
};
