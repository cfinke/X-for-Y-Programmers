const LESSON = {
  number: 11,
  title: "Destructuring & Spread",

  intro: `
<p>Ruby has pattern matching and multiple assignment, but it does not have
JavaScript's object-destructuring syntax — there is no Ruby equivalent of
pulling <code>x</code> and <code>y</code> straight off a hash by name in one
declaration. Ruby's closest tools are array decomposition
(<code>a, *rest = xs</code>) and keyword arguments
(<code>def f(n:) end</code>), plus <code>Hash#dig</code> and
<code>||</code> for the nested-default case. JavaScript's destructuring covers
both objects and arrays with one syntax, directly in a <code>const</code> or a
parameter list.</p>
<table>
  <tr><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td><code>x, y = p[:x], p[:y]</code></td><td><code>const { x, y } = p;</code></td></tr>
  <tr><td><code>a, *rest = xs</code></td><td><code>const [a, ...rest] = xs;</code></td></tr>
  <tr><td><code>def f(n:) end</code></td><td><code>function f({ n }) {}</code></td></tr>
  <tr><td>missing key = <code>nil</code></td><td>missing property = <code>undefined</code></td></tr>
</table>
<p>A default only fires when the value is <code>undefined</code> — not for
<code>null</code>, not for <code>0</code>, not for <code>""</code>. That is a
narrower trigger than Ruby's <code>||=</code>-style fallbacks, which also kick
in for <code>nil</code> and <code>false</code> but not for <code>0</code> or
<code>""</code> either. Destructuring a property that does not exist gives you
<code>undefined</code> silently, so defaults are your only guardrail. And
<code>{ ...a, ...b }</code> is a shallow copy, much like Ruby's
<code>a.merge(b)</code>: last-writer-wins on keys, and nested objects are
shared by reference, not cloned.</p>`,

  ruby: `Point = Struct.new(:x, :y)
User = Struct.new(:name, :address)

def renamed(p)
  left, top = p.x, p.y
  { left: left, top: top }
end

def city_of(u)
  u.address&.dig(:city) || "Unknown"
end

def merge(base, overrides)
  base.merge(overrides)
end`,

  task: `
<p>Write these as plain JavaScript functions, using destructuring and spread
instead of the Ruby idioms above.</p>
<ol>
  <li><code>renamed(point)</code> — destructure <code>x</code> and <code>y</code>
      out of <code>point</code>, <strong>renaming</strong> them to
      <code>left</code> and <code>top</code>, and return
      <code>{ left, top }</code>.</li>
  <li><code>cityOf(user)</code> — use <strong>nested</strong> destructuring with a
      <strong>default</strong> to pull <code>user.address.city</code>, returning
      <code>"Unknown"</code> when either the address or the city is missing.</li>
  <li><code>headAndRest(arr)</code> — use array destructuring with a
      <strong>rest</strong> element to return
      <code>{ head, rest }</code> (the first item and an array of the remainder).</li>
  <li><code>greet({ name, greeting = "Hello" })</code> — take a
      <strong>destructured parameter</strong> with a default and return a string
      like <code>"Hello, Ada!"</code>.</li>
  <li><code>merge(base, overrides)</code> — return a new object combining both with
      the <strong>spread</strong> operator (overrides win); do not mutate
      <code>base</code>.</li>
  <li><code>concatAll(...arrays)</code> — accept any number of arrays and return one
      flat array using <strong>spread</strong>.</li>
</ol>`,

  starter: `// 1. renamed(point) -> { left, top }

  // TODO: const { x: left, y: top } = point;

}

// 2. cityOf(user) -> user.address.city or "Unknown"

}

// 3. headAndRest(arr) -> { head, rest }
function headAndRest(arr) {
  // TODO: const [head, ...rest] = arr;
  return {};
}

// 4. greet({ name, greeting = "Hello" }) -> "Hello, Ada!"
function greet(person) {
  // TODO: destructure the parameter with a default
  return "";
}

// 5. merge(base, overrides) -> new merged object
function merge(base, overrides) {
  // TODO: spread both
  return {};
}

// 6. concatAll(...arrays) -> one flat array
function concatAll() {
  // TODO: rest params + spread
  return [];

`,

  exportNames: ["renamed", "cityOf", "headAndRest", "greet", "merge", "concatAll"],

  requirements: [
    { pattern: /\{\s*x\s*:\s*left\s*,\s*y\s*:\s*top\s*\}/, message: "Rename x and y to left and top while destructuring" },
    { pattern: /\[\s*head\s*,\s*\.\.\.rest\s*\]/, message: "Use a rest element in the array destructuring" },
    { pattern: /\{\s*name\s*,\s*greeting\s*=\s*["']Hello["']\s*\}/, message: "Destructure the greet parameter with a default" },
    { pattern: /\{\s*\.\.\.base\s*,\s*\.\.\.overrides\s*\}/, message: "Use spread to merge base and overrides" },
    { pattern: /\.\.\.arrays/, message: "Use a rest parameter in concatAll" },
  ],

  tests: [
    { name: "renamed relabels x/y to left/top", run: (x) => expectDeepEqual(x.renamed({ x: 1, y: 2 }), { left: 1, top: 2 }) },
    { name: "cityOf reads a nested city", run: (x) => expectEqual(x.cityOf({ name: "Ada", address: { city: "London" } }), "London") },
    { name: "cityOf falls back when address is missing", run: (x) => expectEqual(x.cityOf({ name: "Ada" }), "Unknown") },
    { name: "cityOf falls back when city is missing", run: (x) => expectEqual(x.cityOf({ name: "Ada", address: {} }), "Unknown") },
    { name: "headAndRest splits an array", run: (x) => expectDeepEqual(x.headAndRest([10, 20, 30]), { head: 10, rest: [20, 30] }) },
    { name: "headAndRest of a single item gives empty rest", run: (x) => expectDeepEqual(x.headAndRest([9]), { head: 9, rest: [] }) },
    { name: "greet uses the default greeting", run: (x) => expectEqual(x.greet({ name: "Ada" }), "Hello, Ada!") },
    { name: "greet honors an explicit greeting", run: (x) => expectEqual(x.greet({ name: "Rob", greeting: "Hi" }), "Hi, Rob!") },
    { name: "merge lets overrides win", run: (x) => expectDeepEqual(x.merge({ a: 1, b: 2 }, { b: 9, c: 3 }), { a: 1, b: 9, c: 3 }) },
    { name: "merge does not mutate base", run: (x) => {
        const base = { a: 1 };
        x.merge(base, { a: 2 });
        expectEqual(base.a, 1);
      } },
    { name: "concatAll flattens several arrays", run: (x) => expectDeepEqual(x.concatAll([1], [2, 3], [4]), [1, 2, 3, 4]) },
    { name: "concatAll with no arguments is empty", run: (x) => expectDeepEqual(x.concatAll(), []) },
  ],

  solution: `function renamed(point) {
  const { x: left, y: top } = point;
  return { left, top };
}

function cityOf(user) {
  const { address: { city = "Unknown" } = {} } = user;
  return city;
}

function headAndRest(arr) {
  const [head, ...rest] = arr;
  return { head, rest };
}

function greet({ name, greeting = "Hello" }) {
  return \`\${greeting}, \${name}!\`;
}

function merge(base, overrides) {
  return { ...base, ...overrides };
}

function concatAll(...arrays) {
  return [].concat(...arrays);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td>Rename</td><td><code>left = p[:x]</code></td><td><code>const { x: left } = p;</code></td></tr>
  <tr><td>Default</td><td><code>n = h[:n] || 5</code> (also skips <code>false</code>)</td><td>fires on <code>undefined</code> only</td></tr>
  <tr><td>Nested + default</td><td><code>h.dig(:a, :b) || 1</code></td><td><code>const { a: { b = 1 } = {} } = o;</code></td></tr>
  <tr><td>Spread merge</td><td><code>a.merge(b)</code></td><td><code>{ ...a, ...b }</code>, shallow</td></tr>
  <tr><td>Rest param</td><td><code>def f(*xs) end</code></td><td><code>(...xs)</code></td></tr>
</table>
<p>Two gotchas that Ruby's own idioms have close but not identical analogs for.
First, a default only triggers for <code>undefined</code>:
<code>const { n = 5 } = { n: null }</code> leaves <code>n</code> as
<code>null</code>, and <code>{ n: 0 }</code> keeps <code>0</code> — this is
actually stricter than Ruby's <code>||</code>, which would also replace
<code>nil</code> and <code>false</code>. Second, that nested <code>= {}</code>
in <code>{ address: { city } = {} }</code> is load-bearing — without it,
destructuring <code>city</code> from a missing <code>address</code> throws
<code>TypeError: Cannot destructure property 'city' of undefined</code>, much
like calling a method on <code>nil</code> would raise
<code>NoMethodError</code> in Ruby without a guard.</p>
<p>Spread copies are <strong>shallow</strong>, just like Ruby's
<code>Hash#merge</code>. In <code>{ ...base, ...overrides }</code> any nested
object is shared, not cloned — mutating a nested value through the copy
mutates the original too. And <code>[].concat(...arrays)</code> flattens exactly
one level, which is all "spread the arguments" gets you.</p>`,
};
