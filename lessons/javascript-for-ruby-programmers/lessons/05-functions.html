<title>Lesson 5: Functions</title>
<link rel="stylesheet" href="../../../shared/css/style.css">

<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>In Ruby every method belongs to some object — even a "plain" top-level
method is secretly defined on <code>Object</code> — and <code>def</code> is
the only way to make one. JavaScript has no such single form: a function is
just a value, created with a declaration, a function expression, or an arrow,
and it can be passed around, returned, and stored like any other value. This
lesson is about those three ways to make a function, plus the two parameter
forms you reach for most: defaults and rest.</p>
<table>
  <tr><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td><code>def add(a, b)<br>&nbsp;&nbsp;a + b<br>end</code></td><td><code>function add(a, b) {}</code></td></tr>
  <tr><td><code>double = ->(n) { n * 2 }</code></td><td><code>const double = (n) =&gt; n * 2;</code></td></tr>
  <tr><td><code>def greet(name = "friend")</code></td><td><code>function greet(name = "friend") {}</code></td></tr>
  <tr><td><code>def sum(*xs)</code></td><td><code>function sum(...xs) {}</code></td></tr>
</table>
<p>All three JavaScript forms — declarations, function expressions, and arrow
functions — produce a callable value, the same way a Ruby <code>lambda</code>
or <code>proc</code> is a first-class object you can hold in a variable. The
runtime differences are real: declarations <em>hoist</em> (you can call them
before their line, unlike a Ruby method which must be defined before it's
called), arrow functions have no <code>this</code> or <code>arguments</code>
of their own, and a default only kicks in when the argument is
<code>undefined</code> — never for <code>null</code>, never for <code>0</code>
or <code>""</code> (Ruby's default parameters, by contrast, only trigger when
the argument is omitted entirely).</p>`,

  ruby: `def add(a, b)
  a + b
end

double = ->(n) { n * 2 }

def greet(name = "friend")
  "Hi, #{name}"
end

def sum(*xs)
  xs.reduce(0) { |total, x| total + x }
end`,

  task: `
<p>Write the JavaScript versions of the same functions:</p>
<ol>
  <li>A function declaration <code>add(a, b)</code> that returns their sum.</li>
  <li>An arrow function stored in a <code>const double</code> that returns
      <code>n * 2</code>.</li>
  <li><code>greet(name)</code> with a <em>default parameter</em> of
      <code>"friend"</code>, returning a string like <code>"Hi, Ada"</code>.</li>
  <li><code>sum(...xs)</code> using a <em>rest parameter</em> that returns the
      total of every argument (<code>0</code> when called with none).</li>
</ol>`,

  starter: `// 1. declaration: add(a, b) -> a + b
function add(a, b) {
  // TODO
  return 0;
}

// 2. arrow function: double(n) -> n * 2
const double = (n) => {
  // TODO
  return 0;
};

// 3. default parameter: greet(name = "friend") -> "Hi, <name>"
function greet(name) {
  // TODO
  return "";
}

// 4. rest parameter: sum(...xs) -> total of all arguments
function sum() {
  // TODO
  return 0;
}
`,

  exportNames: ["add", "double", "greet", "sum"],

  requirements: [
    { pattern: /const\s+double\s*=\s*\(?\s*n\s*\)?\s*=>/, message: "Define double as an arrow function" },
    { pattern: /function\s+greet\s*\(\s*name\s*=\s*["']friend["']\s*\)/, message: "Give greet a default parameter of \"friend\"" },
    { pattern: /function\s+sum\s*\(\s*\.\.\.[A-Za-z_$][\w$]*\s*\)/, message: "Use a rest parameter in sum" },
  ],

  tests: [
    { name: "add(2, 3) is 5", run: (x) => expectEqual(x.add(2, 3), 5) },
    { name: "double(21) is 42", run: (x) => expectEqual(x.double(21), 42) },
    { name: 'greet("Ada") is "Hi, Ada"', run: (x) => expectEqual(x.greet("Ada"), "Hi, Ada") },
    { name: 'greet() falls back to "Hi, friend"', run: (x) => expectEqual(x.greet(), "Hi, friend") },
    { name: "sum() with no args is 0", run: (x) => expectEqual(x.sum(), 0) },
    { name: "sum(1, 2, 3, 4) is 10", run: (x) => expectEqual(x.sum(1, 2, 3, 4), 10) },
    { name: "double is a function value", run: (x) => expectEqual(typeof x.double, "function") },
  ],

  solution: `function add(a, b) {
  return a + b;
}

const double = (n) => n * 2;

function greet(name = "friend") {
  return \`Hi, \${name}\`;
}

function sum(...xs) {
  return xs.reduce((total, x) => total + x, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td>Declaration</td><td><code>def add(a, b) ... end</code></td><td><code>function add(a, b)</code> (hoisted)</td></tr>
  <tr><td>Arrow / lambda expression</td><td><code>->(n) { n * 2 }</code> or <code>lambda { |n| n * 2 }</code></td><td><code>const f = (n) =&gt; n * 2</code> (not hoisted)</td></tr>
  <tr><td>Default param</td><td><code>def greet(name = "friend")</code></td><td><code>function greet(name = "friend")</code></td></tr>
  <tr><td>Rest / splat param</td><td><code>def sum(*xs)</code></td><td><code>function sum(...xs)</code> (a real array)</td></tr>
  <tr><td>Implicit return</td><td>last expression's value</td><td>must use <code>return</code>, otherwise <code>undefined</code></td></tr>
</table>
<p>Two runtime gotchas that Ruby's <code>*xs</code> and default parameters
don't have. First, JavaScript defaults trigger only on <code>undefined</code>:
<code>greet(null)</code> returns <code>"Hi, null"</code>, not
<code>"Hi, friend"</code> — Ruby's <code>name = "friend"</code> only kicks in
when the argument is left out entirely, so there's no direct equivalent of
that null-slips-through trap. Second, a rest parameter is a genuine
<code>Array</code> — you can call <code>.reduce</code>, <code>.map</code>, or
<code>.length</code> on it directly, the same way Ruby's <code>*xs</code> splat
collects arguments into a real <code>Array</code>. And because arrow
functions capture no <code>this</code> of their own, they are the idiomatic
choice for the little callbacks you hand to array methods — much like how a
Ruby block naturally captures the enclosing <code>self</code>.</p>`,
};
</script>
