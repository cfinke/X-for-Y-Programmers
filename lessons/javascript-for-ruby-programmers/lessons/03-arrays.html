const LESSON = {
  number: 3,
  title: "Arrays",

  intro: `
<p>Ruby arrays don't carry compile-time element types either — a Ruby
<code>Array</code> is already the same kind of grab-bag JavaScript's is:
heterogeneous, resizable, with no built-in notion of "should only contain
numbers." What differs is how each language signals mutation. Ruby leans on a
naming convention: many methods ship in pairs, a plain one that returns a new
array and a <code>!</code> ("bang") twin that mutates the receiver in place —
<code>xs.reverse</code> vs <code>xs.reverse!</code>. JavaScript's
<code>Array</code> methods have no such convention; each one is simply,
permanently, either a mutator or a copier, and you just have to learn which.</p>
<table>
  <tr><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td><code>xs = [1, 2, 3]</code></td><td><code>const xs = [1, 2, 3];</code></td></tr>
  <tr><td><code>xs.push("no")</code> — mutates <code>xs</code></td><td><code>xs.push("no")</code> — allowed, array now mixed</td></tr>
  <tr><td><code>t = [0, 0].freeze</code> — opt-in immutability</td><td><code>const t = [0, 0];</code> (<code>const</code> only locks the binding)</td></tr>
  <tr><td>mutation is usually explicit (<code>!</code>) or opt-in (<code>freeze</code>)</td><td>every array is always mutable; discipline is up to you</td></tr>
</table>
<p>The runtime skill that matters most is knowing which methods <em>mutate</em> the
array in place and which return a fresh copy. Several names carry straight over:
<code>push</code>, <code>pop</code>, <code>shift</code>, and <code>unshift</code>
mutate in both Ruby and JavaScript, and <code>slice</code> exists in both, never
mutating either way. Watch <code>concat</code> closely, though — Ruby's
<code>Array#concat</code> <em>mutates</em> the receiver, while JavaScript's
<code>concat</code> always returns a new array and leaves the original alone.</p>`,

  ruby: `nums = [10, 20, 30]

def appended(xs, value)
  xs + [value]  # non-mutating copy
end

def has(xs, value)
  xs.include?(value)
end

def labels(xs)
  xs.join(", ")
end`,

  task: `
<p>Write the JavaScript runtime versions of the equivalent Ruby array operations.</p>
<ol>
  <li>Export <code>nums</code>, an array literal <code>[10, 20, 30]</code>.</li>
  <li><code>pushed(xs, value)</code> — call <code>xs.push(value)</code> so it
      <em>mutates</em> <code>xs</code>, then return <code>xs</code>. (Same
      contract as Ruby's <code>xs.push(value)</code>, which also mutates and
      returns the array.)</li>
  <li><code>withoutFirst(xs)</code> — return a <em>copy</em> of <code>xs</code>
      with the first element removed, using <code>slice</code>, so the original
      is left intact (like Ruby's <code>xs[1..]</code> or <code>xs.drop(1)</code>).</li>
  <li><code>has(xs, value)</code> — return whether <code>value</code> is in
      <code>xs</code> using <code>includes</code> (like Ruby's
      <code>xs.include?(value)</code>).</li>
  <li><code>positionOf(xs, value)</code> — return the index of <code>value</code>
      using <code>indexOf</code> (<code>-1</code> if absent, unlike Ruby's
      <code>xs.index(value)</code>, which returns <code>nil</code>).</li>
  <li><code>labels(xs)</code> — return the elements joined into one string with
      <code>", "</code> using <code>join</code> (exactly like Ruby's
      <code>xs.join(", ")</code> — same method name, same argument).</li>
</ol>`,

  starter: `// 1. nums
const nums = [10, 20, 30];

// 2. pushed(xs, value) -> mutates xs with push, returns xs
function pushed(xs, value) {
  // TODO
  return xs;
}

// 3. withoutFirst(xs) -> a slice copy without the first element
function withoutFirst(xs) {
  // TODO
  return [];
}

// 4. has(xs, value) -> boolean, using includes
function has(xs, value) {
  // TODO
  return false;
}

// 5. positionOf(xs, value) -> index or -1, using indexOf
function positionOf(xs, value) {
  // TODO
  return -1;
}

// 6. labels(xs) -> elements joined by ", "
function labels(xs) {
  // TODO
  return "";
}
`,

  exportNames: ["nums", "pushed", "withoutFirst", "has", "positionOf", "labels"],

  requirements: [
    { pattern: /\.push\s*\(/, message: "Use .push() inside pushed" },
    { pattern: /\.slice\s*\(/, message: "Use .slice() inside withoutFirst" },
    { pattern: /\.includes\s*\(/, message: "Use .includes() inside has" },
    { pattern: /\.indexOf\s*\(/, message: "Use .indexOf() inside positionOf" },
    { pattern: /\.join\s*\(/, message: "Use .join() inside labels" },
  ],

  tests: [
    { name: "nums is [10, 20, 30]", run: (x) => expectDeepEqual(x.nums, [10, 20, 30]) },
    { name: "pushed appends and returns the array", run: (x) => expectDeepEqual(x.pushed([1, 2], 3), [1, 2, 3]) },
    { name: "pushed mutates the original array", run: (x) => {
      const a = [1, 2];
      x.pushed(a, 3);
      expectDeepEqual(a, [1, 2, 3]);
    } },
    { name: "withoutFirst drops the first element", run: (x) => expectDeepEqual(x.withoutFirst([10, 20, 30]), [20, 30]) },
    { name: "withoutFirst does NOT mutate the original (slice copies)", run: (x) => {
      const a = [10, 20, 30];
      x.withoutFirst(a);
      expectDeepEqual(a, [10, 20, 30]);
    } },
    { name: "has finds a present value", run: (x) => expectEqual(x.has([10, 20, 30], 20), true) },
    { name: "has rejects an absent value", run: (x) => expectEqual(x.has([10, 20, 30], 99), false) },
    { name: "positionOf returns the index", run: (x) => expectEqual(x.positionOf([10, 20, 30], 30), 2) },
    { name: "positionOf returns -1 when absent", run: (x) => expectEqual(x.positionOf([10, 20, 30], 99), -1) },
    { name: "labels joins with a comma and space", run: (x) => expectEqual(x.labels([10, 20, 30]), "10, 20, 30") },
  ],

  solution: `const nums = [10, 20, 30];

function pushed(xs, value) {
  xs.push(value);
  return xs;
}

function withoutFirst(xs) {
  return xs.slice(1);
}

function has(xs, value) {
  return xs.includes(value);
}

function positionOf(xs, value) {
  return xs.indexOf(value);
}

function labels(xs) {
  return xs.join(", ");
}
`,

  notes: `
<table>
  <tr><th>Operation</th><th>Method</th><th>Mutates?</th></tr>
  <tr><td>Add to end</td><td><code>xs.push(v)</code></td><td>yes — returns new length</td></tr>
  <tr><td>Remove from end</td><td><code>xs.pop()</code></td><td>yes — returns the element</td></tr>
  <tr><td>Remove from front</td><td><code>xs.shift()</code></td><td>yes — returns the element</td></tr>
  <tr><td>Add to front</td><td><code>xs.unshift(v)</code></td><td>yes — returns new length</td></tr>
  <tr><td>Copy a range</td><td><code>xs.slice(start, end)</code></td><td>no — returns a new array</td></tr>
  <tr><td>Join two arrays</td><td><code>xs.concat(ys)</code></td><td>no — returns a new array</td></tr>
</table>
<p>A useful mental rule: the four <em>verbs of place</em> — push/pop/shift/unshift —
mutate; the two <em>copy</em> methods — slice/concat — do not. That last one is
the trap coming from Ruby, where <code>concat</code> is itself a mutator (the
non-bang/bang split doesn't apply — it's just always in-place); JavaScript's
<code>concat</code> never is. When you want a non-mutating "add" in JavaScript,
prefer the spread copy <code>[...xs, v]</code> over <code>push</code>, the way
Ruby's own non-mutating <code>xs + [v]</code> does.</p>
<table>
  <tr><th>Query</th><th>Ruby</th><th>JavaScript runtime</th></tr>
  <tr><td>Membership</td><td><code>xs.include?(v)</code> → <code>true</code>/<code>false</code></td><td><code>xs.includes(v)</code> → <code>true</code>/<code>false</code></td></tr>
  <tr><td>Position</td><td><code>xs.index(v)</code> → index or <code>nil</code></td><td><code>xs.indexOf(v)</code> → index or <code>-1</code></td></tr>
  <tr><td>Stringify</td><td><code>xs.join(sep)</code> → <code>String</code></td><td><code>xs.join(sep)</code> → <code>string</code></td></tr>
</table>
<p>One runtime gotcha to watch for: JavaScript's <code>includes</code> and
<code>indexOf</code> compare with strict equality (<code>===</code>) plus a
special case that lets <code>includes</code> find <code>NaN</code> while
<code>indexOf</code> cannot — Ruby's <code>include?</code> and <code>index</code>
both use <code>==</code>, so that particular asymmetry doesn't arise there. Also,
unlike Ruby's read-only <code>length</code> (and its synonym <code>size</code>),
JavaScript's <code>.length</code> is a live, writable property on the array
itself — <code>xs.length = 0</code> empties the array in place. Nothing about
that shows up until the program actually runs.</p>`,
};
