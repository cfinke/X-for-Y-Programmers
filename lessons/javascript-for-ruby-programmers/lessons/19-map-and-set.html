<div id="app"></div>
<script>
const LESSON = {
  number: 19,
  title: "Map & Set",

  intro: `
<p>Ruby's <code>Hash</code> already behaves the way you would want: any object
can be a key with no coercion, insertion order is preserved, and
<code>hash.size</code> just works. JavaScript's plain <code>{}</code> object does
not give you all of that for free — object keys get coerced to strings, and
checking size means <code>Object.keys(o).length</code>. That is exactly the gap
<code>Map</code> fills. Think of JavaScript's <code>Map</code> as the moral
equivalent of a Ruby <code>Hash</code>, and JavaScript's <code>Set</code> as the
moral equivalent of Ruby's <code>Set</code> (from <code>require "set"</code>) —
reached for deliberately instead of being the default.</p>
<table>
  <tr><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td><code>{}</code> / <code>Hash.new</code></td><td><code>new Map()</code></td></tr>
  <tr><td><code>require "set"; Set.new</code></td><td><code>new Set()</code></td></tr>
  <tr><td>any object can be a key, no coercion</td><td>with <code>Map</code>, any value can be a key too</td></tr>
  <tr><td><code>hash[k]</code> is <code>nil</code> if absent</td><td><code>map.get(k)</code>, undefined if absent</td></tr>
</table>
<p>Two runtime facts matter most. First, a JavaScript <code>Map</code> key can be
<em>anything</em> — an object, a function, <code>NaN</code>, not just a string —
matching what you already get for free with a Ruby <code>Hash</code>; a plain
JavaScript object cannot do this, since its keys are coerced to strings. Second,
a <code>Map</code> remembers insertion order and reports its <code>size</code>
directly, just like a Ruby <code>Hash</code> — but a plain JS object makes you
reach for <code>Object.keys(o).length</code>. A <code>Set</code> is the same
story for uniqueness: membership is O(1) and duplicates simply do not take,
exactly as with Ruby's <code>Set</code>.</p>`,

  ruby: `counts = Hash.new(0)
counts["go"] += 1

require "set"
seen = Set.new
seen.add(1)
seen.add(1) # no-op
seen.size # 1`,

  task: `
<p>Build a few small utilities on top of <code>Map</code> and <code>Set</code>:</p>
<ol>
  <li><code>wordCount(text)</code> — split <code>text</code> on whitespace and
      return a <code>Map</code> from each word to how many times it appears.
      Assume words are already lowercased and clean; an empty string yields an
      empty Map.</li>
  <li><code>unique(arr)</code> — return a new array with duplicates removed,
      preserving first-seen order, using a <code>Set</code>.</li>
  <li><code>mostCommon(text)</code> — return the word with the highest count from
      <code>wordCount</code> (first one to reach that count wins on ties), or
      <code>null</code> for empty input.</li>
  <li><code>keyTypes(map)</code> — return a <code>Set</code> of the
      <code>typeof</code> string for every key in <code>map</code>
      (demonstrating that Map keys need not be strings).</li>
</ol>`,

  starter: `// 1. wordCount(text) -> Map<word, count>
function wordCount(text) {
  // TODO
  return new Map();
}

// 2. unique(arr) -> array with duplicates removed, order preserved
function unique(arr) {
  // TODO
  return [];
}

// 3. mostCommon(text) -> the most frequent word, or null if none
function mostCommon(text) {
  // TODO
  return null;
}

// 4. keyTypes(map) -> Set of typeof for each key
function keyTypes(map) {
  // TODO
  return new Set();
}
`,

  exportNames: ["wordCount", "unique", "mostCommon", "keyTypes"],

  requirements: [
    { pattern: /new\s+Map/, message: "Use a Map in wordCount" },
    { pattern: /new\s+Set/, message: "Use a Set in unique or keyTypes" },
    { pattern: /\.set\s*\(/, message: "Use Map.set to record counts" },
  ],

  tests: [
    {
      name: "wordCount counts repeats",
      run: (x) => {
        const m = x.wordCount("go go stop go");
        expectEqual(m.get("go"), 3);
        expectEqual(m.get("stop"), 1);
        expectEqual(m.size, 2);
      },
    },
    {
      name: "wordCount('') is an empty Map",
      run: (x) => {
        const m = x.wordCount("");
        expectEqual(m.size, 0);
        expectEqual(m.get("anything"), undefined);
      },
    },
    {
      name: "unique preserves first-seen order",
      run: (x) => expectDeepEqual(x.unique([3, 1, 3, 2, 1, 2]), [3, 1, 2]),
    },
    {
      name: "unique keeps distinct objects distinct",
      run: (x) => {
        const a = {}, b = {};
        expectEqual(x.unique([a, a, b]).length, 2);
      },
    },
    {
      name: "mostCommon picks the top word",
      run: (x) => expectEqual(x.mostCommon("a b a c a b"), "a"),
    },
    {
      name: "mostCommon('') is null",
      run: (x) => expectEqual(x.mostCommon(""), null),
    },
    {
      name: "keyTypes reports mixed key types",
      run: (x) => {
        const m = new Map();
        m.set("s", 1);
        m.set(42, 2);
        m.set({}, 3);
        const types = x.keyTypes(m);
        expectTruthy(types.has("string"));
        expectTruthy(types.has("number"));
        expectTruthy(types.has("object"));
        expectEqual(types.size, 3);
      },
    },
  ],

  solution: `function wordCount(text) {
  const counts = new Map();
  const words = text.split(/\\s+/).filter((w) => w.length > 0);
  for (const word of words) {
    counts.set(word, (counts.get(word) ?? 0) + 1);
  }
  return counts;
}

function unique(arr) {
  const seen = new Set();
  const out = [];
  for (const item of arr) {
    if (!seen.has(item)) {
      seen.add(item);
      out.push(item);
    }
  }
  return out;
}

function mostCommon(text) {
  const counts = wordCount(text);
  let best = null;
  let bestCount = 0;
  for (const [word, count] of counts) {
    if (count > bestCount) {
      best = word;
      bestCount = count;
    }
  }
  return best;
}

function keyTypes(map) {
  const types = new Set();
  for (const key of map.keys()) {
    types.add(typeof key);
  }
  return types;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>JavaScript Map / Set</th></tr>
  <tr><td>Any-typed keys</td><td><code>hash[obj] = v</code> keeps identity already</td><td><code>map.set(obj, v)</code> keeps identity</td></tr>
  <tr><td>Size</td><td><code>hash.size</code> / <code>set.size</code></td><td><code>map.size</code> / <code>set.size</code></td></tr>
  <tr><td>Membership</td><td><code>hash.key?(k)</code> / <code>set.include?(v)</code></td><td><code>map.has(k)</code> / <code>set.has(v)</code></td></tr>
  <tr><td>Iteration order</td><td>strict insertion order</td><td>strict insertion order</td></tr>
  <tr><td>Dedupe</td><td><code>arr.uniq</code> / <code>Set.new(arr).to_a</code></td><td><code>[...new Set(arr)]</code></td></tr>
</table>
<p>A <code>Map</code> uses SameValueZero for key equality, so <code>NaN</code>
works as a key (unlike <code>===</code>) but <code>{}</code> and a different
<code>{}</code> are distinct keys because objects compare by identity. That is
exactly why <code>unique([{}, {}])</code> keeps both — the Set sees two different
references.</p>
<p>Prefer <code>Map</code> over a plain object when keys are dynamic, non-string,
or you care about size and order; prefer <code>Set</code> over an array when you
need fast membership or dedupe. Reach back for objects and arrays when you want
JSON serialization or a fixed, known shape — <code>JSON.stringify</code> ignores
Map and Set contents entirely.</p>`,
};
