  number: 17,
  title: "Async & Await",

  intro: `
<p>Ruby has no built-in promise type and no <code>async</code>/<code>await</code>
keywords — method calls run synchronously, top to bottom, and "concurrency" usually
means reaching for a <code>Thread</code>, a <code>Fiber</code>, or a gem like
<code>concurrent-ruby</code> that layers futures and promises on top. JavaScript
bakes that concept straight into the language: an <code>async</code> function
always returns a promise, and <code>await</code> pauses that function (without
blocking the rest of the program) until the promise settles, handing you back
whatever value it resolves to — number, string, object, or <code>undefined</code>.</p>
<table>
  <tr><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td><code>Concurrent::Promise.execute { n * 2 }</code></td><td><code>async function f()</code></td></tr>
  <tr><td><code>n = promise.value!</code></td><td><code>const n = await f();</code></td></tr>
  <tr><td><code>Concurrent::Promise.zip(a, b).value!</code></td><td><code>Promise.all([a, b])</code></td></tr>
  <tr><td><code>rescue => e</code> — any raised exception</td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today. First, <code>await</code> in sequence is
<em>serial</em>: each line waits for the previous promise to settle before the next
even starts — much like calling one Ruby method after another. To run independent
work concurrently you hand the promises to <code>Promise.all</code>, which waits
for all of them and resolves to an array of their results, the rough JavaScript
counterpart of firing off several futures and then collecting every value. Second,
a rejected promise surfaces as a thrown value at the <code>await</code>, so a plain
<code>try/catch</code> catches it — much like Ruby's <code>begin/rescue</code> — and
if you do not catch it, it propagates out of your <code>async</code> function as a
rejected promise the caller must handle.</p>`,

  ruby: `def double(n)
  Concurrent::Promise.execute { n * 2 }
end

def sum_doubled(a, b)
  x, y = Concurrent::Promise.zip(double(a), double(b)).value!
  x + y
end

def safe_double(n)
  double(n).value!
rescue StandardError
  0
end`,

  task: `
<p>All promises here resolve immediately — no timers. Write four functions:</p>
<ol>
  <li><code>double(n)</code> — an <code>async</code> function that returns
      <code>n * 2</code>. (Because it is <code>async</code>, callers get a promise.)</li>
  <li><code>sumSequential(a, b)</code> — <code>await</code> <code>double(a)</code>,

</ol>
<p>A helper is given to you — paste it as-is into your solution:</p>
<pre><code>async function parseAsync(value) {

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>JavaScript</th></tr>
  <tr><td>Return of async fn</td><td>a <code>Concurrent::Promise</code> object (plain methods just return their value)</td><td>a promise; contents unlabeled</td></tr>
  <tr><td>Awaited value</td><td><code>promise.value!</code> blocks and returns the settled value</td><td>whatever it settles to</td></tr>
  <tr><td>Serial awaits</td><td>calling one method, then the next — each blocks in turn</td><td>b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td><code>Concurrent::Promise.zip(...)</code>, or a pool of <code>Thread</code>s</td><td><code>Promise.all([...])</code>; resolves to a results array</td></tr>
  <tr><td>Caught rejection</td><td><code>rescue => e</code> — any raised exception</td><td><code>catch (e)</code> — any thrown value</td></tr>
</table>
<p>The most common runtime performance bug in either language: awaiting
independent work in a loop or in sequence when it could run concurrently. Two
serial <code>await</code>s take as long as the sum of both promises;
<code>Promise.all</code> takes as long as the slowest one. Reach for
<code>Promise.all</code> whenever the tasks do not depend on each other — the same
instinct that leads a Ruby programmer to fan work out across threads or futures
instead of calling one blocking method after another.</p>
<p>On errors: a rejected promise becomes a thrown value at its <code>await</code>.
If nothing catches it, your <code>async</code> function returns a
<em>rejected</em> promise — the failure propagates to whoever awaits you, much
like an unrescued exception unwinding the call stack in Ruby. Neither language
tells you at compile time what kind of thing might be thrown, so a runtime
<code>catch (e)</code> — like a bare Ruby <code>rescue</code> — must be ready for
anything: an <code>Error</code>, a string, even <code>undefined</code>.</p>`,
