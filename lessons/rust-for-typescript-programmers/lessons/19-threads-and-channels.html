  title: "Threads & Channels",

  intro: `
<p>TypeScript's concurrency story is one thread plus an event loop:
<code>async</code>/<code>await</code> interleaves work, but only one piece of
JS runs at a time, and real parallelism means spinning up a
<code>Worker</code> and talking to it with <code>postMessage</code>. Rust
gives you <em>real OS threads</em> that genuinely run at once — and the
reason that isn't terrifying is the system you've spent this course learning.
Ownership rules are exactly what make threads safe: a data race requires two
threads mutating the same data, and the borrow checker already forbids two
mutable owners.</p>
<table>
  <tr><th>TypeScript</th><th>Rust</th></tr>
  <tr><td>one thread + event loop; <code>new Worker(...)</code> for parallelism</td><td><code>thread::spawn(move || ...)</code> — a real OS thread</td></tr>
  <tr><td><code>await promise</code> for the result</td><td><code>handle.join().unwrap()</code> — block until the thread finishes, get its return value</td></tr>
  <tr><td><code>worker.postMessage(v)</code> / <code>onmessage</code></td><td><code>mpsc::channel()</code> → <code>tx.send(v)</code> / <code>rx.recv()</code></td></tr>
  <tr><td>runtime prevents shared memory (mostly)</td><td>compiler proves the sharing is safe (<code>move</code> transfers ownership in)</td></tr>
</table>
<p>Two tools cover most jobs. <code>thread::spawn(move || ...)</code> starts a
thread; the <code>move</code> keyword hands the closure <em>ownership</em> of
whatever it uses, so the compiler knows the main thread can't touch that data
anymore — no race possible. The returned handle's <code>.join()</code> waits
for the thread and yields its return value, like <code>await</code> for
threads. And <code>mpsc::channel()</code> (multi-producer, single-consumer)
is the <code>postMessage</code> of Rust: <code>tx.send(value)</code> on one
thread, <code>rx.recv()</code> on another, with values arriving in send
order.</p>`,

  typescript: `// TS: one thread; real parallelism means a Worker and
// message passing.
const worker = new Worker("./double.js");
// double.js: onmessage = (e) => postMessage(e.data * 2);

function channelDouble(vals: number[]): Promise<number[]> {
  return new Promise((resolve) => {
    const out: number[] = [];
    worker.onmessage = (e) => {
      out.push(e.data as number);
      if (out.length === vals.length) resolve(out);
    };
    for (const v of vals) worker.postMessage(v);
  });
}

channelDouble([1, 2, 3]).then(console.log); // [2, 4, 6]`,

  task: `

  solution: `use std::thread;
use std::sync::mpsc;

fn parallel_sum(a: Vec<i32>, b: Vec<i32>) -> i32 {
    // move gives the closure ownership of b — the compiler now
    // knows this thread is the only one touching it.
    let handle = thread::spawn(move || b.iter().sum::<i32>());

    // Meanwhile, on the main thread:
    let sum_a: i32 = a.iter().sum();

    // .join() blocks until the thread finishes (like await),
    // and hands back the closure's return value.
    let sum_b = handle.join().unwrap();
    sum_a + sum_b
}

fn channel_double(vals: Vec<i32>) -> Vec<i32> {
    let (tx, rx) = mpsc::channel();
    let n = vals.len();

    let handle = thread::spawn(move || {
        for v in vals {
            tx.send(v * 2).unwrap(); // the postMessage of Rust
        }
    });

    let mut out = Vec::with_capacity(n);
    for _ in 0..n {
        out.push(rx.recv().unwrap()); // arrives in send order
    }

    handle.join().unwrap(); // all threads done before we return
    out
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Rust</th></tr>
  <tr><td>Start parallel work</td><td><code>new Worker("./w.js")</code></td><td><code>let h = thread::spawn(move || ...)</code></td></tr>
  <tr><td>Wait for the result</td><td><code>await promise</code></td><td><code>h.join().unwrap()</code></td></tr>
  <tr><td>Send a message</td><td><code>worker.postMessage(v)</code></td><td><code>tx.send(v).unwrap()</code></td></tr>
  <tr><td>Receive a message</td><td><code>onmessage = (e) => ...</code></td><td><code>rx.recv().unwrap()</code> (blocks until one arrives)</td></tr>
  <tr><td>Sharing data safely</td><td>structured clone at the boundary</td><td><code>move</code> transfers ownership; the borrow checker verifies it</td></tr>
</table>
<p>The insight: JavaScript made concurrency safe by having only one thread;
Rust makes it safe by having a type system that can see across threads. The
<code>move</code> on the closure isn't ceremony — it's the ownership transfer
that <em>proves</em> the spawned thread has exclusive access to that data,
which is why Rust's slogan is "fearless concurrency." When you need results
back, prefer what you did here: return a value through <code>.join()</code>
or send messages through a channel, rather than sharing mutable state.</p>`,
