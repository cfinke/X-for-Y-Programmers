<div id="app"></div>
<script>
const LESSON = {
  number: 11,
  title: "Enums & Pattern Matching",

  intro: `
<p>Discriminated unions are the crown jewel of TypeScript modeling — a union
of object shapes with a <code>kind</code> field, narrowed by
<code>switch</code>. Rust has the same idea as a first-class language feature:
<code>enum</code>. Each variant can carry its own payload, and there is no
<code>kind</code> field to invent, because <em>the variant is the tag</em>.
<code>Shape::Circle { radius: 1.0 }</code> knows what it is; the discriminant
is built into the value.</p>
<table>
  <tr><th>TypeScript</th><th>Rust</th></tr>
  <tr><td><code>type Shape = { kind: "circle"; ... } | { kind: "rectangle"; ... }</code></td><td><code>enum Shape { Circle { ... }, Rectangle { ... } }</code></td></tr>
  <tr><td><code>{ kind: "circle", radius: 1 }</code></td><td><code>Shape::Circle { radius: 1.0 }</code></td></tr>
  <tr><td><code>switch (shape.kind) { case "circle": ... }</code></td><td><code>match shape { Shape::Circle { radius } =&gt; ... }</code></td></tr>
  <tr><td>Exhaustiveness via the <code>never</code>-default trick</td><td>Exhaustiveness enforced by the compiler, always</td></tr>
</table>
<p>Where you <code>switch</code> on <code>shape.kind</code> and then trust
narrowing to expose <code>shape.radius</code>, Rust's <code>match</code> does
both at once: each arm names a variant <em>and destructures its payload</em>
right in the pattern. And the exhaustiveness check you had to engineer with
<code>const _exhaustive: never = shape</code> is simply how <code>match</code>
works — forget a variant and your code does not compile. Add a variant next
month and the compiler walks you to every <code>match</code> that needs a new
arm.</p>`,

  typescript: `type Shape =
  | { kind: "circle"; radius: number }
  | { kind: "rectangle"; width: number; height: number };

function area(shape: Shape): number {
  switch (shape.kind) {
    case "circle":
      return Math.PI * shape.radius ** 2;
    case "rectangle":
      return shape.width * shape.height;
    default:
      // The never-default trick, to force exhaustiveness:
      const _exhaustive: never = shape;
      return _exhaustive;
  }
}`,

  task: `
<p>Port the discriminated union to a real enum:</p>
<ol>
  <li>The enum <code>Shape</code> is already defined in the starter, with the
      variants <code>Circle { radius: f64 }</code> and
      <code>Rectangle { width: f64, height: f64 }</code> — the tests construct
      values like <code>Shape::Circle { radius: 1.0 }</code>, so leave the
      definition as is.</li>
  <li>Implement <code>area(shape: &amp;Shape) -&gt; f64</code> using
      <code>match</code>. Destructure each variant's payload in its arm:
      circles are <code>&pi;r&sup2;</code> (use
      <code>std::f64::consts::PI</code>), rectangles are
      <code>width * height</code>. No <code>default</code> arm needed — cover
      both variants and the compiler certifies you covered everything.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call
<code>area</code> directly.</p>`,

  starter: `// The variant IS the tag: no kind field, and the payload lives
// inside each variant. The tests build Shape::Circle { radius: 1.0 },
// so keep this definition exactly as it is.
enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

// match on the shape; each arm destructures its variant's fields.
// Circle: std::f64::consts::PI * radius * radius
// Rectangle: width * height
fn area(shape: &Shape) -> f64 {
    todo!()
}
`,

  requirements: [
    { pattern: /enum\s+Shape/, message: "Keep the enum Shape definition" },
    { pattern: /match\b/, message: "Use a match expression in area" },
    { pattern: /Circle\s*\{/, message: "Destructure the Circle variant's payload in a match arm" },
  ],

  tests: [
    { name: "area of Circle { radius: 1.0 } is about 3.14159",
      code: "assert!((area(&Shape::Circle { radius: 1.0 }) - 3.14159265).abs() < 0.001);" },
    { name: "area of Circle { radius: 2.0 } is about 12.566",
      code: "assert!((area(&Shape::Circle { radius: 2.0 }) - 12.56637061).abs() < 0.001);" },
    { name: "area of Rectangle { width: 3.0, height: 4.0 } is 12.0",
      code: "assert_eq!(area(&Shape::Rectangle { width: 3.0, height: 4.0 }), 12.0);" },
    { name: "area of Rectangle { width: 2.5, height: 2.0 } is 5.0",
      code: "assert_eq!(area(&Shape::Rectangle { width: 2.5, height: 2.0 }), 5.0);" },
  ],

  solution: `enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

fn area(shape: &Shape) -> f64 {
    match shape {
        Shape::Circle { radius } => std::f64::consts::PI * radius * radius,
        Shape::Rectangle { width, height } => width * height,
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Rust</th></tr>
  <tr><td>Tagged union</td><td><code>type Shape = A | B</code> with a <code>kind</code> field</td><td><code>enum Shape { A {...}, B {...} }</code> — variant is the tag</td></tr>
  <tr><td>Construct a variant</td><td><code>{ kind: "circle", radius: 1 }</code></td><td><code>Shape::Circle { radius: 1.0 }</code></td></tr>
  <tr><td>Branch on the tag</td><td><code>switch (shape.kind)</code> + narrowing</td><td><code>match shape { Shape::Circle { radius } =&gt; ... }</code></td></tr>
  <tr><td>Exhaustiveness</td><td>Opt-in, via <code>never</code> default</td><td>Built in — a missing arm is a compile error</td></tr>
  <tr><td>Catch-all arm</td><td><code>default:</code></td><td><code>_ =&gt; ...</code> (use sparingly; it forfeits the safety net)</td></tr>
</table>
<p>You already knew <code>Option</code> and <code>Result</code> from earlier
lessons — they are exactly this: plain enums, <code>Some(T)</code> and
<code>Err(E)</code> being variants with payloads. Nothing about them is
special-cased in the language. Once you internalize "the variant is the
tag", you'll reach for an enum any place you used to write a discriminated
union — and skip the <code>kind</code>-field bookkeeping entirely.</p>`,
};
