<p>No new concepts — this is the course's material assembled into one small
inventory system: a promoted-property class, the
<code>array_map</code>/<code>array_filter</code>/<code>array_reduce</code>
trio, nullable returns, and the one semantic seam that deserves a final
spotlight: <em>arrays copy, objects don't</em>. Assigning or passing a PHP
array copies it (value semantics — nothing like Python lists). But the
<em>objects stored inside</em> that array are references, exactly like every
Python object. So a "copied" array of <code>Item</code>s is a fresh list of
pointers to the <em>same</em> items.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>items2 = items</code> — same list</td><td><code>$items2 = $items;</code> — independent copy</td></tr>
  <tr><td><code>items2[0] is items[0]</code> → <code>True</code></td><td><code>$items2[0] === $items[0]</code> → <code>true</code> (same object!)</td></tr>
  <tr><td><code>dataclasses.replace(item, count=5)</code></td><td><code>$copy = clone $item; $copy-&gt;count = 5;</code></td></tr>
  <tr><td><code>Item | None</code> return</td><td><code>?Item</code> return</td></tr>
</table>
<p>That's why non-mutating updates need <code>clone</code>: to "change" one
item without touching the caller's data, you build a new array
(<code>array_map</code> does that for free) and, for the matching element,
return a <em>modified clone</em> instead of the original object — PHP's
<code>dataclasses.replace</code> move. <code>clone</code> is shallow, like
<code>copy.copy</code>, which is all these flat objects need.</p>`,

  python: `from dataclasses import dataclass, replace

@dataclass
class Item:
    name: str
    price_cents: int
    count: int

def total_value(items: list[Item]) -> int:
    return sum(i.price_cents * i.count for i in items)

def find_item(items: list[Item], name: str) -> Item | None:
    return next((i for i in items if i.name == name), None)

def restock(items: list[Item], name: str, amount: int) -> list[Item]:
    # new list; matched item replaced by a modified copy, originals untouched
    return [replace(i, count=i.count + amount) if i.name == name else i
            for i in items]

def names_in_stock(items: list[Item]) -> list[str]:
    return [i.name for i in items if i.count > 0]`,

  solution: `<?php

class Item {
    public function __construct(
        public string $name,
        public int $price_cents,
        public int $count,
    ) {}
}

function total_value(array $items): int {
    return array_reduce(
        $items,
        fn($sum, $item) => $sum + $item->price_cents * $item->count,
        0,
    );
}

function find_item(array $items, string $name): ?Item {
    foreach ($items as $item) {
        if ($item->name === $name) {
            return $item;
        }
    }
    return null;
}

function restock(array $items, string $name, int $amount): array {
    return array_map(function ($item) use ($name, $amount) {
        if ($item->name !== $name) {
            return $item;
        }
        $copy = clone $item;
        $copy->count += $amount;
        return $copy;
    }, $items);
}

function names_in_stock(array $items): array {
    $in_stock = array_filter($items, fn($item) => $item->count > 0);
    return array_values(array_map(fn($item) => $item->name, $in_stock));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>List assignment</td><td>aliases the same list</td><td>copies the array (value semantics)</td></tr>
  <tr><td>Objects in a container</td><td>references</td><td>references — same as Python</td></tr>
  <tr><td>Shallow copy of an object</td><td><code>copy.copy(obj)</code></td><td><code>clone $obj</code></td></tr>
  <tr><td>Copy-with-changes</td><td><code>dataclasses.replace(i, count=5)</code></td><td><code>$c = clone $i; $c-&gt;count = 5;</code></td></tr>
  <tr><td>Optional return</td><td><code>-&gt; Item | None</code></td><td><code>: ?Item</code></td></tr>
  <tr><td>sum / comprehension / filter</td><td><code>sum()</code>, listcomp, <code>if</code></td><td><code>array_reduce</code>, <code>array_map</code>, <code>array_filter</code> + <code>array_values</code></td></tr>
  <tr><td>Identity check</td><td><code>a is b</code></td><td><code>$a === $b</code> (on objects)</td></tr>
</table>
<p>The seam this capstone walks is worth restating once, precisely: PHP
arrays have value semantics (assignment and function calls copy), PHP
objects have reference semantics (like every Python object). So
<code>restock</code> gets its "new array" for free the moment
<code>array_map</code> runs — but the <code>Item</code>s inside are still
shared with the caller, and mutating one would leak the change back. The
<code>clone</code>-and-modify pattern is the PHP spelling of
<code>dataclasses.replace</code>, and <code>===</code> on objects is
Python's <code>is</code> — which is exactly how the tests catch a missing
<code>clone</code>. If you've internalized that one asymmetry, plus
snake_case and <code>-&gt;</code>, you read and write PHP now. Course
complete.</p>`,
