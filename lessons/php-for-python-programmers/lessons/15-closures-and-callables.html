const LESSON = {
  number: 15,
  title: "Closures & Callables",

  intro: `
<p>Python closures capture the enclosing scope automatically — convenient,
until it isn't. Every Python developer eventually hits the late-binding loop
trap (<code>[lambda: i for i in range(3)]</code> — three lambdas, all
returning 2), and writing to a captured variable needs the
<code>nonlocal</code> keyword. PHP anonymous functions capture
<strong>nothing</strong> by default: you list every captured variable in a
<code>use (...)</code> clause, and each is copied <em>by value</em> at the
moment the closure is created. A snapshot — which means the loop trap simply
cannot happen.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>def inner(): return x</code> (auto-capture, late binding)</td>
      <td><code>function () use ($x) { return $x; }</code> (explicit, by value)</td></tr>
  <tr><td><code>nonlocal count</code> (write access)</td>
      <td><code>use (&amp;$count)</code> (capture by reference)</td></tr>
  <tr><td><code>lambda x: x * n</code></td>
      <td><code>fn($x) =&gt; $x * $n</code> (arrow fn: auto-captures by value)</td></tr>
  <tr><td>everything callable is just "callable"</td>
      <td><code>callable</code> type declaration; closures are <code>Closure</code> objects</td></tr>
</table>
<p>PHP 7.4's arrow functions are the exception that feels like home:
<code>fn($x) =&gt; $x * $n</code> is <code>lambda x: x * n</code> — one
expression, implicit return, and it auto-captures outer variables (by value,
no <code>use</code> clause needed). For typing, PHP has <code>callable</code>
(anything invokable: a closure, a function name string, a method reference)
and the concrete <code>Closure</code> class that anonymous functions actually
are. Calling one looks like calling anything else: <code>$f($x)</code> —
PHP's variable-function syntax, no <code>__call__</code> ceremony.</p>`,

  python: `def make_multiplier(n):
    return lambda x: x * n     # auto-captures n

def apply_twice(f, x: int) -> int:
    return f(f(x))

def make_counter():
    count = 0
    def counter():
        nonlocal count         # needed to WRITE to it
        count += 1
        return count
    return counter

triple = make_multiplier(3)
print(triple(5))               # 15
c = make_counter()
print(c(), c(), c())           # 1 2 3`,

  task: `
<p>Port the three higher-order functions:</p>
<ol>
  <li><code>make_multiplier(int $n): Closure</code> — return
      <code>fn(int $x) =&gt; $x * $n</code>. The arrow function grabs
      <code>$n</code> by value on its own, exactly like the lambda.</li>
  <li><code>apply_twice(callable $f, int $x): int</code> — call
      <code>$f</code> on <code>$x</code>, then on the result. Note the
      parameter type: <code>callable</code> accepts closures, function-name
      strings, anything invokable.</li>
  <li><code>make_counter(): Closure</code> — the <code>nonlocal</code> port.
      Start <code>$count</code> at 0 and return a long-form closure with
      <code>use (&amp;$count)</code> — the <code>&amp;</code> captures by
      reference so the write survives between calls. Successive calls return
      1, 2, 3, …</li>
</ol>`,

  starter: `<?php

// 1. Python: return lambda x: x * n
//    PHP arrow fn: fn(int $x) => ... auto-captures $n by value.
function make_multiplier(int $n): Closure {
    throw new Exception("TODO: return an arrow function");
}

// 2. callable accepts any invokable; call it with plain $f(...).
function apply_twice(callable $f, int $x): int {
    throw new Exception("TODO: apply f twice");
}

// 3. Python's nonlocal count -> use (&$count). Without the &,
//    the closure gets a by-value snapshot and the count never moves.
function make_counter(): Closure {
    throw new Exception("TODO: return a closure over \$count by reference");
}
`,

  requirements: [
    { pattern: /fn\s*\(/, message: "Use an arrow function (fn($x) => ...) for the multiplier" },
    { pattern: /use\s*\(\s*&/, message: "Capture the counter state by reference: use (&$count)" },
    { pattern: /callable|Closure/, message: "Type the function values with callable / Closure" },
  ],

  tests: [
    { name: "make_multiplier(3) returns a closure; (5) gives 15",
      code: "$triple = make_multiplier(3);\nexpect_true($triple instanceof Closure);\nexpect_eq($triple(5), 15);" },
    { name: "each multiplier keeps its own snapshot of $n",
      code: "$double = make_multiplier(2);\n$ten = make_multiplier(10);\nexpect_eq($double(7), 14);\nexpect_eq($ten(7), 70);" },
    { name: "apply_twice(fn($x) => $x + 1, 5) returns 7",
      code: "expect_eq(apply_twice(fn($x) => $x + 1, 5), 7);" },
    { name: "apply_twice composes with make_multiplier",
      code: "expect_eq(apply_twice(make_multiplier(2), 3), 12);" },
    { name: "make_counter() returns 1, 2, 3 across calls",
      code: "$c = make_counter();\nexpect_eq($c(), 1);\nexpect_eq($c(), 2);\nexpect_eq($c(), 3);" },
    { name: "two counters are independent",
      code: "$a = make_counter();\n$b = make_counter();\n$a();\n$a();\nexpect_eq($b(), 1);" },
  ],

  solution: `<?php

function make_multiplier(int $n): Closure {
    return fn(int $x) => $x * $n;
}

function apply_twice(callable $f, int $x): int {
    return $f($f($x));
}

function make_counter(): Closure {
    $count = 0;
    return function () use (&$count): int {
        $count += 1;
        return $count;
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Lambda</td><td><code>lambda x: x * n</code></td><td><code>fn($x) =&gt; $x * $n</code> (auto-capture by value)</td></tr>
  <tr><td>Full closure</td><td><code>def inner(): ...</code> (auto-capture)</td><td><code>function () use ($a, $b) { ... }</code> (explicit list)</td></tr>
  <tr><td>Capture semantics</td><td>late binding — reads the variable at call time</td><td>by value — a snapshot at creation time</td></tr>
  <tr><td>Write to captured var</td><td><code>nonlocal x</code></td><td><code>use (&amp;$x)</code></td></tr>
  <tr><td>Loop-variable trap</td><td>yes — classic gotcha</td><td>no — each closure snapshots the current value</td></tr>
  <tr><td>Type hint</td><td><code>Callable[[int], int]</code></td><td><code>callable</code> (loose) or <code>Closure</code> (concrete class)</td></tr>
  <tr><td>Function reference</td><td><code>f</code> (bare name)</td><td><code>strlen(...)</code> — first-class callable syntax (8.1)</td></tr>
</table>
<p>Python and PHP made opposite bets on capture. Python closures hold a
<em>live link</em> to the enclosing scope: cheap to write, but the value you
get depends on when you call, and mutation needs <code>nonlocal</code> to
declare intent. PHP closures hold <em>copies</em>: you spell out each capture
in <code>use (...)</code>, the value is frozen at creation, and a live link is
what needs the explicit marker (<code>&amp;</code>). Same two capabilities,
inverted defaults — and PHP's snapshot default is why its loops full of
closures do what they look like they do. One more habit: a bare function name
in PHP is just a string; to pass <code>strlen</code> around like a Python
function object, write <code>strlen(...)</code> or pass
<code>'strlen'</code>.</p>`,
};
