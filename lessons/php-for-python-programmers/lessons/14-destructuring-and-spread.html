  title: "List Assignment & Spread",

  intro: `
<p>Python's tuple unpacking — <code>a, b = pair</code> — exists in PHP, with
one syntactic demand: the left side must wear brackets. <code>[$a, $b] =
$pair;</code> pulls elements 0 and 1 into two variables, and the classic swap
works the same way: <code>[$a, $b] = [$b, $a];</code>. Because PHP arrays are
keyed, you can also unpack <em>by key</em> — <code>['name' =&gt; $n] =
$user;</code> plucks one key from an associative array, something Python
dicts can't do in one statement.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>a, b = pair</code></td><td><code>[$a, $b] = $pair;</code></td></tr>
  <tr><td><code>a, b = b, a</code></td><td><code>[$a, $b] = [$b, $a];</code></td></tr>
  <tr><td><code>n = user["name"]</code> (per key)</td><td><code>['name' =&gt; $n] = $user;</code></td></tr>
  <tr><td><code>def f(*nums):</code></td><td><code>function f(int ...$nums)</code></td></tr>
  <tr><td><code>f(*args)</code></td><td><code>f(...$args)</code></td></tr>
  <tr><td><code>[*a, *b]</code> and <code>{**d1, **d2}</code></td><td><code>[...$a, ...$b]</code> — one operator for both</td></tr>
</table>
<p>Everywhere Python splits into <code>*</code> and <code>**</code>, PHP has a
single <code>...</code> doing both jobs. In a signature,
<code>int ...$nums</code> is <code>*nums</code> — and unlike Python, each
collected argument can be type-checked. At a call site, <code>f(...$args)</code>
is <code>f(*args)</code>. In an array literal, <code>[...$a, ...$b]</code>
covers both <code>[*a, *b]</code> and <code>{**d1, **d2}</code>: since PHP 8.1
spread carries string keys along, and later values overwrite earlier ones —
the same last-wins rule as merging dicts.</p>`,

  python: `def swap(pair):
    a, b = pair          # tuple unpacking
    return [b, a]

def sum_all(*nums) -> int:   # collect any number of args
    total = 0
    for n in nums:
        total += n
    return total

def merge_settings(defaults: dict, overrides: dict) -> dict:
    return {**defaults, **overrides}   # last one wins

nums = [10, 20, 30]
print(sum_all(*nums))   # unpack a list into arguments -> 60
print(merge_settings({"theme": "light", "lang": "en"},
                     {"theme": "dark"}))
# {'theme': 'dark', 'lang': 'en'}`,

  task: `
<p>Port all three, swapping <code>*</code>/<code>**</code> for

<ol>

      <code>int</code>. Inside, <code>$nums</code> is a plain array. (The

</ol>`,

    { pattern: /\[\s*\$\w+\s*,\s*\$\w+\s*\]\s*=/, message: "Unpack with list assignment: [$a, $b] = ..." },
    { pattern: /\.\.\.\$/, message: "Use ... — as a variadic parameter and/or a spread" },

  tests: [
    { name: "swap([1, 2]) returns [2, 1]",
      code: "expect_eq(swap([1, 2]), [2, 1]);" },
    { name: "swap(['left', 'right']) returns ['right', 'left']",
      code: "expect_eq(swap(['left', 'right']), ['right', 'left']);" },
    { name: "sum(1, 2, 3) returns 6",
      code: "expect_eq(sum(1, 2, 3), 6);" },
    { name: "sum(...$nums) unpacks a list into arguments, like f(*args)",
      code: "$nums = [10, 20, 30];\nexpect_eq(sum(...$nums), 60);" },
    { name: "merge_settings: overrides win, untouched defaults survive",
      code: "expect_eq(\n    merge_settings(['theme' => 'light', 'lang' => 'en'], ['theme' => 'dark']),\n    ['theme' => 'dark', 'lang' => 'en']\n);" },
    { name: "merge_settings with no overrides returns the defaults",
      code: "expect_eq(merge_settings(['lang' => 'en'], []), ['lang' => 'en']);" },
  ],

  solution: `<?php

function swap(array $pair): array {
    [$a, $b] = $pair;
    return [$b, $a];
}

function sum(int ...$nums): int {
    $total = 0;
    foreach ($nums as $n) {
        $total += $n;
    }
    return $total;
}

function merge_settings(array $defaults, array $overrides): array {
    return [...$defaults, ...$overrides];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Unpack a pair</td><td><code>a, b = pair</code></td><td><code>[$a, $b] = $pair;</code></td></tr>
  <tr><td>Swap</td><td><code>a, b = b, a</code></td><td><code>[$a, $b] = [$b, $a];</code></td></tr>
  <tr><td>Unpack by key</td><td>—</td><td><code>['name' =&gt; $n] = $user;</code></td></tr>
  <tr><td>Skip an element</td><td><code>_, b = pair</code></td><td><code>[, $b] = $pair;</code></td></tr>
  <tr><td>Collect args</td><td><code>def f(*nums):</code></td><td><code>function f(int ...$nums)</code></td></tr>
  <tr><td>Unpack args</td><td><code>f(*args)</code> / <code>f(**kwargs)</code></td><td><code>f(...$args)</code> (string keys become named args)</td></tr>
  <tr><td>Merge literals</td><td><code>[*a, *b]</code> / <code>{**d1, **d2}</code></td><td><code>[...$a, ...$b]</code></td></tr>
</table>
<p>The unification runs deep: because PHP's one array type plays both list and
dict, one <code>...</code> covers Python's four spellings (<code>*</code> and
<code>**</code>, in calls and in literals). Even <code>f(...$args)</code> with
string keys does what <code>f(**kwargs)</code> does — the keys are matched to
parameter names as named arguments. One habit to unlearn: Python's
<code>a, b = b, a</code> feels simultaneous because the right side builds a
tuple first; PHP's <code>[$a, $b] = [$b, $a];</code> works for exactly the
same reason — the right-hand array is fully built before any assigning
happens.</p>`,
