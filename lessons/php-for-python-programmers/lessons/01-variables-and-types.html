const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Good news first: like Python, PHP declares variables by assignment — no
<code>let</code>, no <code>var</code> keyword to learn. The visible changes are
cosmetic: every variable wears a <code>$</code> sigil, statements end in
semicolons, and blocks use braces instead of indentation. Your
<code>snake_case</code> habits transfer untouched.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>name = "Ada"</code></td><td><code>$name = "Ada";</code></td></tr>
  <tr><td><code>age: int = 36</code></td><td><code>$age = 36;</code> (no annotation on locals)</td></tr>
  <tr><td><code>int</code> / <code>float</code></td><td><code>int</code> / <code>float</code> (direct mapping)</td></tr>
  <tr><td><code>def f(x: int) -&gt; str:</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td><code>f"{name} is {age}"</code></td><td><code>"$name is $age"</code></td></tr>
</table>
<p>The deep difference is what type hints <em>mean</em>. In Python,
<code>def f(x: int) -&gt; str</code> is advisory — the interpreter ignores it
unless you run mypy. PHP's <code>function f(int $x): string</code> is
<em>enforced at runtime</em>: pass the wrong type and the engine throws a
<code>TypeError</code> the moment the call happens. Think of it as mypy built
into the interpreter, checking at call time. Types go on function signatures
(parameter type <em>before</em> the <code>$name</code>, C-style; return type
after a colon like Python's <code>-&gt;</code>), not on local variables. And
every file opens with <code>&lt;?php</code> — a relic of PHP's origins as an
HTML templating language.</p>`,

  python: `name = "Ada"
age: int = 36

# Hints are advisory: mypy would complain, but Python
# itself happily runs this line.
# age = "thirty-six"

def describe_user(name: str, age: int) -> str:
    return f"{name} is {age} years old"

def birthday(age: int) -> int:
    next_age = age
    next_age += 1
    return next_age

print(describe_user(name, age))`,

  task: `
<p>Rewrite the Python as PHP:</p>
<ol>
  <li>Write <code>describe_user(string $name, int $age): string</code> —
      note the full type declarations, with the type <em>before</em> each
      parameter — returning <code>"Ada is 36 years old"</code>-style text.
      Use double-quote interpolation: <code>"$name is $age years old"</code>
      is the f-string you already know, minus the <code>f</code> and the
      braces.</li>
  <li>Write <code>birthday(int $age): int</code> that copies the age into a
      local variable, adds 1 with <code>+=</code>, and returns it.</li>
</ol>
<p>Keep the <code>&lt;?php</code> tag at the top. Function names stay
<code>snake_case</code> — PHP convention agrees with Python here. The tests
call your functions directly.</p>`,

  starter: `<?php

// 1. describe_user: string $name and int $age in, string out.
//    Python: f"{name} is {age} years old"  ->  PHP: "$name is $age years old"
function describe_user(string $name, int $age): string {
    throw new Exception("TODO: implement describe_user");
}

// 2. birthday: assign to a local, add 1 with +=, return it.
function birthday(int $age): int {
    throw new Exception("TODO: implement birthday");
}
`,

  requirements: [
    { pattern: /function\s+describe_user\s*\(\s*string\s+\$name\s*,\s*int\s+\$age\s*\)\s*:\s*string/, message: "Define describe_user(string $name, int $age): string with full type declarations" },
    { pattern: /"\$\w+/, message: "Build the string with double-quote interpolation, not concatenation" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'expect_eq(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'expect_eq(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "expect_eq(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "expect_eq(birthday(0), 1);" },
  ],

  solution: `<?php

function describe_user(string $name, int $age): string {
    return "$name is $age years old";
}

function birthday(int $age): int {
    $next = $age;
    $next += 1;
    return $next;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Declare a variable</td><td><code>x = 1</code></td><td><code>$x = 1;</code> (assignment declares in both)</td></tr>
  <tr><td>Statement end</td><td>newline</td><td><code>;</code></td></tr>
  <tr><td>Block</td><td>indentation</td><td><code>{ }</code> braces</td></tr>
  <tr><td>Numbers</td><td><code>int</code> / <code>float</code></td><td><code>int</code> / <code>float</code> — same split</td></tr>
  <tr><td>Typed signature</td><td><code>def f(x: int) -&gt; str:</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td>Interpolation</td><td><code>f"{name}!"</code></td><td><code>"$name!"</code> (double quotes only)</td></tr>
  <tr><td>Hint enforcement</td><td>advisory (mypy is external)</td><td>enforced — <code>TypeError</code> at call time</td></tr>
</table>
<p>Both languages are dynamically typed at heart, but they draw the line in
different places. Python trusts you everywhere and leaves checking to an
external tool; PHP checks declared signatures <em>as the code runs</em>. A
wrong-type call doesn't slip through and corrupt data three functions later —
it throws a <code>TypeError</code> right at the boundary. There's still no
ahead-of-time pass (PHPStan and Psalm play mypy's role in real projects), but
the runtime itself is on your side.</p>`,
};
