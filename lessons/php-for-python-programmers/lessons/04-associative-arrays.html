  title: "Associative Arrays",

  intro: `
<p>Here's the dict half of PHP's one array type. A Python dict like
<code>{"apples": 3}</code> becomes <code>['apples' =&gt; 3]</code> — square
brackets again, with <code>=&gt;</code> pairing each key to its value. It's
the <em>same</em> type as last lesson's list: a list is just an array whose
keys happen to be 0, 1, 2… PHP arrays are ordered dictionaries at heart,
which will feel natural — Python dicts have guaranteed insertion order since
3.7 too.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>{"apples": 3}</code></td><td><code>['apples' =&gt; 3]</code></td></tr>
  <tr><td><code>d["apples"]</code></td><td><code>$m['apples']</code></td></tr>
  <tr><td><code>d.get(k, 0)</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td><code>for k, v in d.items():</code></td><td><code>foreach ($m as $k =&gt; $v)</code></td></tr>
  <tr><td><code>d.keys()</code></td><td><code>array_keys($m)</code></td></tr>
  <tr><td><code>"k" in d</code></td><td><code>array_key_exists('k', $m)</code> / <code>isset($m['k'])</code></td></tr>
</table>
<p>Your <code>d.get(k, default)</code> reflex maps to the null coalescing
operator: <code>$m[$k] ?? 0</code> reads "the value at <code>$k</code>, or 0
if it's missing" — no KeyError-style notice, no verbose guard. Iteration is
<code>foreach ($m as $k =&gt; $v)</code>, the direct translation of
<code>for k, v in d.items()</code>. And remember lesson 3: arrays are
values, so a function that "adds a key" is really building a modified copy
to return.</p>`,

  python: `def build_inventory() -> dict[str, int]:
    return {"apples": 3, "bananas": 5}

def get_count(inv: dict[str, int], name: str) -> int:
    return inv.get(name, 0)

def add_stock(inv: dict[str, int], name: str, n: int) -> dict[str, int]:
    inv[name] = inv.get(name, 0) + n   # mutates the caller's dict
    return inv

def total_stock(inv: dict[str, int]) -> int:
    total = 0
    for name, count in inv.items():
        total += count
    return total

inv = build_inventory()
print(get_count(inv, "kiwis"))    # 0
print(total_stock(inv))           # 8`,

</ol>`,

  tests: [
    { name: "build_inventory() maps 'apples' to 3 and 'bananas' to 5",

    { name: "add_stock creates missing keys and leaves the caller's array alone",
      code: "$inv = build_inventory();\n$new = add_stock($inv, 'kiwis', 4);\nexpect_eq($new['kiwis'], 4);\nexpect_eq($inv, ['apples' => 3, 'bananas' => 5]);" },

  solution: `<?php

function build_inventory(): array {
    return ['apples' => 3, 'bananas' => 5];
}

function get_count(array $inv, string $name): int {
    return $inv[$name] ?? 0;
}

function add_stock(array $inv, string $name, int $n): array {
    $inv[$name] = ($inv[$name] ?? 0) + $n;
    return $inv;
}

function total_stock(array $inv): int {
    $total = 0;
    foreach ($inv as $name => $count) {
        $total += $count;
    }
    return $total;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Literal</td><td><code>{"k": 1}</code></td><td><code>['k' =&gt; 1]</code></td></tr>
  <tr><td>Read</td><td><code>d["k"]</code></td><td><code>$m['k']</code></td></tr>
  <tr><td>Read with default</td><td><code>d.get(k, 0)</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td>Write</td><td><code>d[k] = v</code></td><td><code>$m[$k] = $v;</code></td></tr>
  <tr><td>Iterate pairs</td><td><code>for k, v in d.items():</code></td><td><code>foreach ($m as $k =&gt; $v)</code></td></tr>
  <tr><td>Keys</td><td><code>d.keys()</code></td><td><code>array_keys($m)</code></td></tr>
  <tr><td>Key test</td><td><code>"k" in d</code></td><td><code>array_key_exists('k', $m)</code>, <code>isset($m['k'])</code></td></tr>
</table>
<p>One structure for both lists and dicts sounds messy, but it's coherent:
every PHP array is an ordered map, and "list" is the special case of integer
keys. Two footnotes for your Python instincts: reading a genuinely missing
key without <code>??</code> emits a warning rather than raising like
KeyError, so make <code>??</code> a habit; and <code>isset($m['k'])</code>
is false when the key exists but holds <code>null</code> — use
<code>array_key_exists</code> when that distinction matters.</p>`,
