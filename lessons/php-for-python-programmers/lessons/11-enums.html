  title: "Enums",

  intro: `
<p>If you use <code>enum.Enum</code> in Python, PHP 8.1's enums will feel like
a direct port — arguably a cleaner one, since they're a real language
construct rather than a metaclass trick. A <em>backed enum</em> declares its
value type up front (<code>enum OrderStatus: string</code>), each
<code>case</code> carries a value, and you read it with <code>-&gt;value</code>
exactly like Python's <code>.value</code>.</p>
<table>
  <tr><th>Python</th><th>PHP</th></tr>
  <tr><td><code>class OrderStatus(Enum):<br>&nbsp;&nbsp;&nbsp;&nbsp;PENDING = 'pending'</code></td>
      <td><code>enum OrderStatus: string {<br>&nbsp;&nbsp;&nbsp;&nbsp;case Pending = 'pending';<br>}</code></td></tr>
  <tr><td><code>OrderStatus.PENDING</code></td><td><code>OrderStatus::Pending</code></td></tr>
  <tr><td><code>status.value</code></td><td><code>$status-&gt;value</code></td></tr>
  <tr><td><code>OrderStatus('pending')</code> (raises <code>ValueError</code>)</td>
      <td><code>OrderStatus::from('pending')</code> (throws <code>ValueError</code>)</td></tr>
  <tr><td><code>try: OrderStatus(v) except ValueError: None</code></td>
      <td><code>OrderStatus::tryFrom($v)</code> (returns <code>null</code>)</td></tr>
  <tr><td><code>list(OrderStatus)</code></td><td><code>OrderStatus::cases()</code></td></tr>
</table>
<p>Value-to-case lookup is where PHP is nicer: Python only gives you the
constructor call that raises, so the "or None" version means a try/except.
PHP gives you both as named constructors — <code>::from()</code> throws,
<code>::tryFrom()</code> returns <code>null</code>. And like Python enums, PHP
enums can define methods; a method on the enum plus a <code>match</code> on
<code>$this</code> (or on a passed-in case) replaces Python's
<code>match status:</code> dispatch. Cases conventionally use
<code>PascalCase</code> rather than Python's <code>SCREAMING_CASE</code>.</p>`,

  python: `from enum import Enum

class OrderStatus(Enum):
    PENDING = 'pending'
    SHIPPED = 'shipped'
    DELIVERED = 'delivered'

def status_label(status: OrderStatus) -> str:
    match status:
        case OrderStatus.PENDING:
            return 'Order received'
        case OrderStatus.SHIPPED:
            return 'On its way'
        case OrderStatus.DELIVERED:
            return 'Delivered'

def parse_status(value: str) -> OrderStatus | None:
    try:
        return OrderStatus(value)
    except ValueError:
        return None

print(OrderStatus.PENDING.value)        # pending
print(len(list(OrderStatus)))           # 3`,

  task: `
<p>Port the Python enum to a PHP 8.1 backed enum:</p>
<ol>

      <code>Pending = 'pending'</code>, <code>Shipped = 'shipped'</code>,

  <li>Write <code>status_label(OrderStatus $status): string</code> using a
      <code>match ($status)</code> expression: <code>Pending</code> →
      <code>"Order received"</code>, <code>Shipped</code> →
      <code>"On its way"</code>, <code>Delivered</code> →
      <code>"Delivered"</code>.</li>
  <li>Write <code>parse_status(string $value): ?OrderStatus</code> that
      returns the matching case or <code>null</code> — one call to

</ol>`,

}

}

// 3. Python: try: OrderStatus(value) except ValueError: return None

`,

  requirements: [
    { pattern: /enum\s+OrderStatus\s*:\s*string/, message: "Declare a string-backed enum: enum OrderStatus: string" },
    { pattern: /case\s+\w+\s*=/, message: "Give each case a backing value (case Pending = 'pending';)" },
    { pattern: /::tryFrom|::from/, message: "Look cases up by value with OrderStatus::tryFrom() (or ::from())" },
    { pattern: /match\s*\(/, message: "Dispatch on the case with a match expression in status_label" },
  ],

  tests: [
    { name: "OrderStatus::Pending->value is 'pending'",
      code: "expect_eq(OrderStatus::Pending->value, 'pending');" },
    { name: "status_label covers all three cases",
      code: "expect_eq(status_label(OrderStatus::Pending), 'Order received');\nexpect_eq(status_label(OrderStatus::Shipped), 'On its way');\nexpect_eq(status_label(OrderStatus::Delivered), 'Delivered');" },
    { name: "parse_status('shipped') returns OrderStatus::Shipped",
      code: "expect_true(parse_status('shipped') === OrderStatus::Shipped);" },
    { name: "parse_status('bogus') returns null instead of throwing",
      code: "expect_true(parse_status('bogus') === null);" },
    { name: "OrderStatus::cases() lists all three cases, like list(OrderStatus)",
      code: "expect_eq(count(OrderStatus::cases()), 3);\nexpect_true(OrderStatus::cases()[0] === OrderStatus::Pending);" },
  ],

  solution: `<?php

enum OrderStatus: string {
    case Pending = 'pending';
    case Shipped = 'shipped';
    case Delivered = 'delivered';
}

function status_label(OrderStatus $status): string {
    return match ($status) {
        OrderStatus::Pending => 'Order received',
        OrderStatus::Shipped => 'On its way',
        OrderStatus::Delivered => 'Delivered',
    };
}

function parse_status(string $value): ?OrderStatus {
    return OrderStatus::tryFrom($value);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>PHP</th></tr>
  <tr><td>Declare</td><td><code>class OrderStatus(Enum):</code></td><td><code>enum OrderStatus: string { ... }</code></td></tr>
  <tr><td>Member</td><td><code>PENDING = 'pending'</code></td><td><code>case Pending = 'pending';</code></td></tr>
  <tr><td>Access</td><td><code>OrderStatus.PENDING</code></td><td><code>OrderStatus::Pending</code></td></tr>
  <tr><td>Backing value</td><td><code>status.value</code></td><td><code>$status-&gt;value</code></td></tr>
  <tr><td>Lookup (strict)</td><td><code>OrderStatus('pending')</code></td><td><code>OrderStatus::from('pending')</code></td></tr>
  <tr><td>Lookup (safe)</td><td>try/except <code>ValueError</code></td><td><code>OrderStatus::tryFrom('pending')</code> → case or <code>null</code></td></tr>
  <tr><td>All members</td><td><code>list(OrderStatus)</code></td><td><code>OrderStatus::cases()</code></td></tr>
  <tr><td>Methods</td><td>yes — defined in the class body</td><td>yes — defined in the enum body</td></tr>
</table>
<p>PHP enums come in two flavors. This lesson used a <em>backed</em> enum
(<code>: string</code> or <code>: int</code>, every case has a value — the
shape you serialize to a database or JSON). Drop the type and the values and
you get a <em>pure</em> enum: cases with identity but no <code>-&gt;value</code>,
closer to Python's bare <code>Enum</code> with <code>auto()</code> when you
never look at the numbers. Either way each case is a singleton object, so
<code>===</code> comparisons are exact — the same guarantee Python's
<code>is</code> gives you between enum members.</p>`,
};
