  number: 12,
  title: "Closures",

  intro: `
<p>A closure is a function that remembers the variables of the scope it was
created in. Rust closures do this too, but the borrow checker makes you
declare upfront how the capture works — <code>move</code> or borrow, and
which of the <code>Fn</code> / <code>FnMut</code> / <code>FnOnce</code> traits
the closure implements. Go is far more permissive: an inner function keeps a
live reference to the enclosing variable, not a copy, so mutating it persists
across calls, and there is no ownership system deciding whether the capture is
by move or by reference — it is simply whatever variable was in scope. Go
writes anonymous functions as <code>func(params) returnType { ... }</code> and
function types the same way, with no trait bounds to satisfy.</p>
<table>
  <tr><th>Rust</th><th>Go</th></tr>
  <tr><td><code>fn() -&gt; i32</code></td><td><code>func() int</code></td></tr>
  <tr><td><code>impl Fn(i32) -&gt; i32</code></td><td><code>func(n int) int</code></td></tr>
  <tr><td><code>let f = || { ... };</code></td><td><code>f := func() int { ... }</code></td></tr>
  <tr><td><code>let mut count = 0;</code> moved into the closure</td><td><code>count := 0</code> captured</td></tr>
</table>
<p>Because the captured variable is shared, a factory that returns a closure hands
back a private, persistent piece of state — the same trick you would reach for
in Rust with a <code>move</code> closure returning <code>impl FnMut() -&gt; i32</code>.
Go has no <code>this</code> to worry about, and no borrow checker either, so the
mental model is even simpler: the closure just reaches out and touches the
variable that was in scope when it was defined, with no explicit <code>move</code>
keyword required.</p>`,

  rust: `fn make_counter() -> impl FnMut() -> i32 {
    let mut count = 0;
    move || {
        count += 1;
        count
    }
}

let mut next = make_counter();
next(); // 1
next(); // 2`,

  task: `
<p>Write these package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>MakeCounter() func() int</code> returns a closure. Each call to the
      returned function increments a captured <code>count</code> and returns the
      new value: first call gives <code>1</code>, then <code>2</code>, and so on.</li>
  <li><code>MakeAdder(start int) func(int) int</code> captures <code>start</code>
      as a running total. Each call adds its argument to the total and returns the
      updated total, so <code>a := MakeAdder(10); a(5)</code> is <code>15</code>
      and a following <code>a(3)</code> is <code>18</code>.</li>
  <li><code>ApplyTwice(n int, f func(int) int) int</code> takes a closure as an
      argument and returns <code>f(f(n))</code>.</li>
</ol>`,

  starter: `func MakeCounter() func() int {
	return nil // TODO
}

func MakeAdder(start int) func(int) int {
	return nil // TODO
}

func ApplyTwice(n int, f func(int) int) int {
	return 0 // TODO
}
`,

  requirements: [
    { pattern: /func\(\)\s*int\s*{/, message: "Return an anonymous func() int closure from MakeCounter" },
    { pattern: /func\s+MakeAdder/, message: "Define MakeAdder that captures a running total" },
    { pattern: /f\(f\(/, message: "In ApplyTwice, call the closure twice: f(f(n))" },
  ],

  tests: [
    { name: "MakeCounter counts 1,2,3", code: "\t\tc := MakeCounter()\n\t\texpect_eq(c(), 1)\n\t\texpect_eq(c(), 2)\n\t\texpect_eq(c(), 3)" },
    { name: "Separate counters are independent", code: "\t\ta := MakeCounter()\n\t\tb := MakeCounter()\n\t\texpect_eq(a(), 1)\n\t\texpect_eq(a(), 2)\n\t\texpect_eq(b(), 1)" },
    { name: "MakeAdder accumulates", code: "\t\tadd := MakeAdder(10)\n\t\texpect_eq(add(5), 15)\n\t\texpect_eq(add(3), 18)" },
    { name: "ApplyTwice applies the closure twice", code: "\t\tdouble := func(x int) int { return x * 2 }\n\t\texpect_eq(ApplyTwice(3, double), 12)" },
  ],

  solution: `func MakeCounter() func() int {
	count := 0
	return func() int {
		count++
		return count
	}
}

func MakeAdder(start int) func(int) int {
	total := start
	return func(n int) int {
		total += n
		return total
	}
}

func ApplyTwice(n int, f func(int) int) int {
	return f(f(n))
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Go</th></tr>
  <tr><td>Anonymous function</td><td><code>|n: i32| n * 2</code></td><td><code>func(n int) int { return n * 2 }</code></td></tr>
  <tr><td>Function type</td><td><code>impl Fn() -&gt; i32</code></td><td><code>func() int</code></td></tr>
  <tr><td>Captured, mutated var</td><td><code>count += 1</code> inside a <code>move</code> closure</td><td><code>count++</code></td></tr>
  <tr><td>Closure factory</td><td><code>make_counter()</code></td><td><code>MakeCounter()</code></td></tr>
  <tr><td>Closure as argument</td><td><code>f: impl Fn(i32) -&gt; i32</code></td><td><code>ApplyTwice(n, f)</code></td></tr>
</table>
<p>The captured variable lives as long as the closure does. Go's garbage collector
keeps <code>count</code> alive even after <code>MakeCounter</code> returns, so the
state survives across calls — with no ownership annotations required, unlike Rust
where you would write <code>move</code> to transfer <code>count</code> into the
closure and let the borrow checker confirm no one else can still reach it. Each
call to the factory creates a fresh variable, which is why two counters never
share a value.</p>
<p>One Go-specific gotcha to remember for later lessons: before Go 1.22, a loop
variable was captured by reference and <em>shared</em> across iterations, so
closures made inside a <code>for</code> loop all saw the final value. Go 1.22 gave
each iteration its own copy — the same guarantee Rust already gives you for free,
since each iteration of a <code>for</code> loop introduces its own binding and a
closure that wants to capture it must explicitly <code>move</code> or borrow that
specific iteration's value.</p>`,
};
