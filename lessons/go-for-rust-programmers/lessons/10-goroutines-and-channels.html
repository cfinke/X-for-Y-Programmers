  title: "Goroutines & Channels",

  intro: `
<p>Rust's concurrency is built on OS threads that you spawn explicitly and
whose safety the type system checks at compile time: <code>Send</code> and
<code>Sync</code> decide what can cross a thread boundary, and the borrow
checker refuses to compile a data race. Go's concurrency is also built into
the language, but the safety net is a run-time race detector rather than a
compile-time one. You start a <em>goroutine</em> — a cheap, green-threaded
function that runs alongside yours, scheduled many-to-one onto real OS
threads by the Go runtime — with the <code>go</code> keyword, and goroutines
talk to each other through <em>channels</em>, typed pipes you send to with
<code>ch &lt;- v</code> and receive from with <code>v := &lt;-ch</code>.</p>
<table>
  <tr><th>Rust</th><th>Go</th></tr>
  <tr><td><code>thread::spawn(|| do_work())</code></td><td><code>go doWork()</code></td></tr>
  <tr><td><code>for h in handles { h.join().unwrap(); }</code></td><td><code>var wg sync.WaitGroup; …; wg.Wait()</code></td></tr>
  <tr><td><code>mpsc::Receiver&lt;T&gt;</code> (a channel end)</td><td><code>ch chan T</code> (a value in flight)</td></tr>
  <tr><td><code>rx.recv().unwrap()</code></td><td><code>v := &lt;-ch</code></td></tr>
  <tr><td><code>for v in rx { … }</code></td><td><code>for v := range ch</code></td></tr>
</table>
<p>A channel is made with <code>make(chan T)</code>. An unbuffered channel blocks the
sender until someone receives; a <em>buffered</em> one, <code>make(chan T, n)</code>,
holds up to <code>n</code> values before blocking — the same trade-off as choosing
between Rust's <code>mpsc::channel()</code> (unbounded, roughly) and
<code>mpsc::sync_channel(n)</code> (bounded). When a producer is done it calls
<code>close(ch)</code>; a <code>for v := range ch</code> loop then drains the remaining
values and exits cleanly. Rust has no explicit <code>close</code> — a channel closes
itself once every <code>Sender</code> tied to it has been dropped, and iterating a
<code>Receiver</code> then simply ends. To wait for a group of goroutines with no value
to return, use <code>sync.WaitGroup</code>: <code>Add(1)</code> before each,
<code>Done()</code> inside, and <code>Wait()</code> to block until the count hits
zero — the same job a Rust <code>Vec&lt;JoinHandle&lt;()&gt;&gt;</code> does when you
<code>.join()</code> each handle in turn. All of this is deterministic when you
collect results rather than sleep and hope.</p>`,

  rust: `use std::sync::mpsc;
use std::thread;

fn sum_concurrent(nums: Vec<i32>) -> i32 {
    let (tx, rx) = mpsc::channel();
    for n in nums {
        let tx = tx.clone();
        thread::spawn(move || {
            tx.send(n).unwrap();
        });
    }
    drop(tx);
    rx.iter().sum()
}

fn square_all(nums: Vec<i32>) -> Vec<i32> {
    let handles: Vec<_> = nums
        .into_iter()
        .map(|n| thread::spawn(move || n * n))
        .collect();
    handles.into_iter().map(|h| h.join().unwrap()).collect()
}`,

  solution: `func SumConcurrent(nums []int) int {
	ch := make(chan int)
	for _, n := range nums {
		go func(n int) {
			ch <- n
		}(n)
	}
	total := 0
	for range nums {
		total += <-ch
	}
	return total
}

func SquareAll(nums []int) []int {
	result := make([]int, len(nums))
	var wg sync.WaitGroup
	for i, n := range nums {
		wg.Add(1)
		go func(i, n int) {
			defer wg.Done()
			result[i] = n * n
		}(i, n)
	}
	wg.Wait()
	return result
}

func CountUp(n int) []int {
	ch := make(chan int, n)
	go func() {
		for i := 0; i < n; i++ {
			ch <- i
		}
		close(ch)
	}()
	out := make([]int, 0, n)
	for v := range ch {
		out = append(out, v)
	}
	return out
}
`,

<table>
  <tr><th>Concept</th><th>Rust</th><th>Go</th></tr>
  <tr><td>Start concurrent work</td><td><code>thread::spawn(move || work())</code></td><td><code>go work()</code></td></tr>
  <tr><td>Channel of T</td><td><code>mpsc::channel::&lt;T&gt;()</code></td><td><code>make(chan T)</code></td></tr>

  <tr><td>Signal "no more"</td><td>drop every <code>Sender</code></td><td><code>close(ch)</code></td></tr>
  <tr><td>Drain a stream</td><td><code>for v in rx { … }</code></td><td><code>for v := range ch</code></td></tr>
  <tr><td>Wait for a group</td><td><code>for h in handles { h.join().unwrap(); }</code></td><td><code>wg.Wait()</code></td></tr>

<p>A few habits that keep concurrent Go correct, and where Rust either mirrors
them or makes them unnecessary. Pass loop variables into the goroutine as
arguments (<code>go func(n int){…}(n)</code>) or capture a fresh copy —
otherwise every goroutine may see the last value; Rust sidesteps this entirely
because a <code>move</code> closure takes ownership of its own copy of each
loop variable, so the equivalent bug can't compile. Only the producer should
<code>close</code> a channel, and only once; sending on a closed channel
panics, but receiving from one keeps yielding the zero value with
<code>ok == false</code> — in Rust there's no manual close to get wrong,
since the channel closes itself once every <code>Sender</code> is dropped,
and sending after the last <code>Receiver</code> is gone returns an
<code>Err</code> instead of panicking. Two goroutines writing the
<em>same</em> map or slice element is a data race, but writing
<em>distinct</em> indices of a pre-sized slice (as <code>SquareAll</code>
does) is safe and needs nothing more than the <code>WaitGroup</code>. Plain
safe Rust won't let several threads hold a <code>&mut Vec</code> at once even
to touch different indices — you'd reach for <code>slice::split_at_mut</code>
or scoped threads to do that — so the idiomatic translation instead returns
each square through its <code>JoinHandle</code> and collects them back in
order, trading a little structure for the same compile-time guarantee Go
only gives you if you're careful. And whenever a test must be deterministic,
gather results through a channel or joined handles — never a
<code>thread::sleep</code>, which only papers over the race.</p>`,
