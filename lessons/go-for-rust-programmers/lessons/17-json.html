const LESSON = {
  number: 17,
  title: "JSON",

  intro: `
<p>Rust has no JSON support in the standard library — the <strong>serde</strong>
crate does the work: a <code>#[derive(Serialize, Deserialize)]</code> macro on a
struct generates the code to walk its fields, and <code>serde_json</code> turns
that into text and back. It is fully typed on both sides, much like Go: you
serialize <em>into</em> and deserialize <em>out of</em> a concrete struct, never
an untyped blob. Go's <code>encoding/json</code> does the same job with built-in
<strong>struct tags</strong> standing in for serde's derive macro and attributes.</p>
<table>
  <tr><th>Rust</th><th>Go</th></tr>
  <tr><td><code>serde_json::to_string(&amp;u)?</code></td><td><code>b, err := json.Marshal(u)</code> (<code>[]byte</code>)</td></tr>
  <tr><td><code>serde_json::from_str::&lt;User&gt;(&amp;s)?</code></td><td><code>json.Unmarshal([]byte(s), &amp;u)</code></td></tr>
  <tr><td><code>#[derive(Serialize, Deserialize)]</code> struct field <code>name: String</code></td><td><code>Name string \`json:"name"\`</code></td></tr>
  <tr><td><code>#[serde(skip_serializing_if = "Option::is_none")]</code></td><td><code>json:"email,omitempty"</code></td></tr>
</table>
<p>Two things surprise Rust programmers. First, serde works on a struct's fields
regardless of visibility — a private field serializes just fine — while Go's
<code>encoding/json</code> uses reflection that can only see <strong>exported</strong>
(capitalized) fields, so a JSON key like <code>"name"</code> comes from an exported
<code>Name</code> field plus a tag. Second, <code>serde_json::to_string</code>
returns an owned <code>String</code> directly, no byte-to-string conversion needed,
whereas <code>Marshal</code> hands back <code>[]byte</code> that you wrap in
<code>string(b)</code> to read. Both return something you're expected to check —
Rust's <code>Result&lt;T, serde_json::Error&gt;</code> and Go's <code>(T, error)</code>.</p>`,

  rust: `use serde::{Deserialize, Serialize};

#[derive(Serialize, Deserialize)]
struct User {
    name: String,
    age: u32,
    #[serde(skip_serializing_if = "Option::is_none")]
    email: Option<String>,
}

let u = User { name: "Ada".to_string(), age: 36, email: None };
let s = serde_json::to_string(&u).unwrap();       // {"name":"Ada","age":36}
let back: User = serde_json::from_str(&s).unwrap();`,

  task: `
<p>Write these as package-level declarations (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li>A struct <code>User</code> with three exported fields and JSON tags:
      <code>Name string</code> tagged <code>json:"name"</code>,
      <code>Age int</code> tagged <code>json:"age"</code>, and
      <code>Email string</code> tagged <code>json:"email,omitempty"</code> so an
      empty email is left out entirely.</li>
  <li><code>ToJSON(u User) (string, error)</code>: call <code>json.Marshal(u)</code>
      and return the bytes as a <code>string</code> (or <code>""</code> and the error).</li>
  <li><code>FromJSON(data string) (User, error)</code>: declare a
      <code>var u User</code>, call <code>json.Unmarshal([]byte(data), &amp;u)</code>,
      and return <code>u</code> and the error.</li>
  <li><code>ParseScores(data string) (map[string]int, error)</code>: unmarshal a JSON
      object of numbers into a <code>map[string]int</code> — no struct needed when the
      keys are dynamic.</li>
</ol>
<p><code>Marshal</code> writes struct fields in declaration order, so
<code>ToJSON(User{Name: "Ada", Age: 36})</code> is exactly
<code>{"name":"Ada","age":36}</code> — <code>omitempty</code> drops the empty email.</p>`,

  starter: `type User struct {
	Name  string \`json:"name"\`
	Age   int    \`json:"age"\`
	Email string \`json:"email,omitempty"\`
}

func ToJSON(u User) (string, error) {
	return "", nil // TODO: json.Marshal
}

func FromJSON(data string) (User, error) {
	return User{}, nil // TODO: json.Unmarshal into a User
}

func ParseScores(data string) (map[string]int, error) {
	return nil, nil // TODO: json.Unmarshal into a map[string]int
}
`,

  requirements: [
    { pattern: /json:"email,omitempty"/, message: "Tag Email with json:\"email,omitempty\"" },
    { pattern: /json\.Marshal/, message: "Use json.Marshal in ToJSON" },
    { pattern: /json\.Unmarshal/, message: "Use json.Unmarshal to decode JSON" },
  ],

  tests: [
    { name: "ToJSON marshals fields in order", code: "\t\ts, err := ToJSON(User{Name: \"Ada\", Age: 36, Email: \"ada@example.com\"})\n\t\texpect_true(err == nil)\n\t\texpect_eq(s, `{\"name\":\"Ada\",\"age\":36,\"email\":\"ada@example.com\"}`)" },
    { name: "omitempty drops an empty email", code: "\t\ts, err := ToJSON(User{Name: \"Rob\", Age: 68})\n\t\texpect_true(err == nil)\n\t\texpect_eq(s, `{\"name\":\"Rob\",\"age\":68}`)" },
    { name: "FromJSON fills the struct fields", code: "\t\tu, err := FromJSON(`{\"name\":\"Ada\",\"age\":36,\"email\":\"ada@example.com\"}`)\n\t\texpect_true(err == nil)\n\t\texpect_eq(u.Name, \"Ada\")\n\t\texpect_eq(u.Age, 36)\n\t\texpect_eq(u.Email, \"ada@example.com\")" },
    { name: "round-trip preserves the value", code: "\t\torig := User{Name: \"Grace\", Age: 45, Email: \"grace@navy.mil\"}\n\t\ts, err := ToJSON(orig)\n\t\texpect_true(err == nil)\n\t\tback, err := FromJSON(s)\n\t\texpect_true(err == nil)\n\t\texpect_eq(back, orig)" },
    { name: "ParseScores decodes into a map", code: "\t\tm, err := ParseScores(`{\"alice\":10,\"bob\":7}`)\n\t\texpect_true(err == nil)\n\t\texpect_eq(m, map[string]int{\"alice\": 10, \"bob\": 7})" },
  ],

  solution: `type User struct {
	Name  string \`json:"name"\`
	Age   int    \`json:"age"\`
	Email string \`json:"email,omitempty"\`
}

func ToJSON(u User) (string, error) {
	b, err := json.Marshal(u)
	if err != nil {
		return "", err
	}
	return string(b), nil
}

func FromJSON(data string) (User, error) {
	var u User
	err := json.Unmarshal([]byte(data), &u)
	return u, err
}

func ParseScores(data string) (map[string]int, error) {
	var m map[string]int
	err := json.Unmarshal([]byte(data), &m)
	return m, err
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Go</th></tr>
  <tr><td>Encode</td><td><code>serde_json::to_string(&amp;u)</code></td><td><code>json.Marshal(u)</code> → <code>[]byte</code></td></tr>
  <tr><td>Decode</td><td><code>serde_json::from_str::&lt;User&gt;(&amp;s)</code></td><td><code>json.Unmarshal(b, &amp;u)</code></td></tr>
  <tr><td>Rename key</td><td><code>#[serde(rename = "name")]</code></td><td><code>\`json:"name"\`</code> tag</td></tr>
  <tr><td>Skip empty</td><td><code>#[serde(skip_serializing_if = "Option::is_none")]</code></td><td><code>,omitempty</code></td></tr>
  <tr><td>Dynamic keys</td><td><code>HashMap&lt;String, i32&gt;</code></td><td><code>map[string]int</code></td></tr>
</table>
<p>Notice the shape of the two APIs: Rust's <code>from_str</code> <em>returns</em> a
freshly built <code>User</code> that you bind with <code>let</code>, so there is no
address-of ritual to forget. Go's <code>Unmarshal(b, &amp;u)</code> instead
<em>writes into</em> a value through a pointer you pass in — forget the
<code>&amp;</code> and the compiler will not stop you (any value satisfies the
<code>interface{}</code> parameter), but the fields stay at their zero values, a
classic first bug that Rust's ownership rules simply don't allow to compile.</p>
<p>A field with no <code>#[serde(rename = ...)]</code> attribute still serializes,
using the Rust field name verbatim (<code>name</code> → <code>"name"</code>), which
happens to already be idiomatic JSON in this example but often isn't once you cross
naming conventions. Reach for a <code>HashMap</code> (or Go's <code>map</code>) only
when the keys are genuinely dynamic; when the shape is known, a derived struct gives
you compile-time field checking and no silent typos — the same guarantee
<code>#[derive(Serialize, Deserialize)]</code> buys you over hand-rolled JSON
construction.</p>`,
};
