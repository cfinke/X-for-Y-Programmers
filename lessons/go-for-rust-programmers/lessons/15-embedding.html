  number: 15,
  title: "Embedding & Composition",

  intro: `
<p>Rust never had classical inheritance either — <code>struct Car</code> cannot
extend <code>struct Engine</code>. The idiomatic Rust move is composition: give
<code>Car</code> a field of type <code>Engine</code>, then write a method on
<code>Car</code> that calls through to it (<code>self.engine.start()</code>).
Go embeds instead of composing-and-delegating: write a type's name with no field
name inside a struct, and its fields and methods are <strong>promoted</strong> —
you call <code>car.Start()</code> directly, with no forwarding method to write,
even though <code>Start</code> is defined on the embedded <code>Engine</code>.
Go automates the delegation step that Rust makes you spell out by hand.</p>
<table>
  <tr><th>Rust</th><th>Go</th></tr>
  <tr><td><code>struct Car { engine: Engine }</code></td><td><code>type Car struct { Engine }</code></td></tr>
  <tr><td><code>self.engine.start()</code> (hand-written forward)</td><td><code>car.Engine.Start()</code></td></tr>
  <tr><td><code>fn start(&self) { self.engine.start() }</code></td><td><code>car.Start()</code> (promoted, no wrapper)</td></tr>
  <tr><td><code>trait Vehicle: Starter + Describer {}</code></td><td><code>type Vehicle interface { Starter; Describer }</code></td></tr>
</table>
<p>There is no keyword for this — embedding is just a field with no name: the
outer type gains the inner type's methods, but the inner value is still
reachable by its type name (<code>car.Engine</code>) when you need it, similar
to keeping <code>self.engine</code> reachable in Rust. Interfaces embed the same
way — <code>Vehicle</code> can be built by listing the smaller interfaces it
should include, much like a Rust trait declaring supertraits with
<code>trait Vehicle: Starter + Describer {}</code> — and any type that has all
the required methods satisfies it automatically, with no <code>impl Vehicle for
Car</code> block to write.</p>`,

  rust: `struct Engine {
    horsepower: i32,
}

impl Engine {
    fn start(&self) -> String { "vroom".to_string() }
}

struct Car {
    engine: Engine,
    brand: String,
}

impl Car {
    // manual delegation -- Rust has no field/method promotion
    fn start(&self) -> String { self.engine.start() }

    fn description(&self) -> String {
        format!("{} with {} hp", self.brand, self.engine.horsepower)
    }
}`,

</ol>`,

  solution: `type Engine struct {
	Horsepower int
}

func (e Engine) Start() string {
	return "vroom"
}

type Starter interface {
	Start() string
}

type Describer interface {
	Description() string
}

type Vehicle interface {
	Starter
	Describer
}

type Car struct {
	Engine
	Brand string
}

func (c Car) Description() string {
	return fmt.Sprintf("%s with %d hp", c.Brand, c.Horsepower)
}

func Report(v Vehicle) string {
	return fmt.Sprintf("%s / %s", v.Start(), v.Description())
}

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Go</th></tr>
  <tr><td>Reuse a type</td><td><code>struct B { a: A }</code> (field, no auto reuse)</td><td><code>type B struct { A }</code></td></tr>
  <tr><td>Call reused method</td><td><code>b.a.method()</code> (hand-written forward)</td><td><code>b.method()</code> (promoted)</td></tr>
  <tr><td>Reach the inner value</td><td><code>b.a.method()</code></td><td><code>b.A.method()</code></td></tr>
  <tr><td>Compose interfaces</td><td><code>trait C: A + B {}</code></td><td><code>type C interface { A; B }</code></td></tr>
  <tr><td>Satisfy interface</td><td><code>impl C for B { … }</code> (write every method)</td><td>implicit (has the methods)</td></tr>
</table>
<p>Embedding looks like the composition Rust programmers already reach for, but
it goes one step further: there is no subtype relationship, no virtual dispatch,
and the outer type does not "become" the inner one — a <code>Car</code> is not
an <code>Engine</code>, it just <em>has</em> one whose members are promoted. In
Rust you would still write <code>fn start(&self) { self.engine.start() }</code>
by hand for every forwarded method; Go skips that boilerplate entirely. If the
outer type defines a method with the same name, that method wins and shadows
the promoted one, and you can still reach the inner version explicitly with
<code>car.Engine.Start()</code> — much like keeping <code>self.engine</code>
addressable in Rust even after adding your own <code>start</code> override. Go's
proverb is "prefer composition over inheritance," a sentiment Rust programmers
already share; embedding is just the ergonomic tool that removes the manual
forwarding Rust still requires.</p>`,
