  intro: `
<p>Time to put it all together. This capstone builds a tiny arithmetic
<strong>evaluator</strong> — the same shape you would write in JavaScript with a
tagged object shape and a recursive <code>switch</code>, but leaning on the
Kotlin features from the whole course at once:</p>
<table>
  <tr><th>Feature (JavaScript)</th><th>Feature (Kotlin)</th></tr>
  <tr><td>tagged-object node types</td><td><code>sealed interface Expr</code></td></tr>
  <tr><td>object literal per variant</td><td><code>data class Num(...) : Expr</code></td></tr>
  <tr><td><code>switch (node.kind)</code></td><td>exhaustive <code>when (node)</code> with smart casts</td></tr>
  <tr><td>plain object lookup, maybe <code>undefined</code></td><td><code>Map&lt;String, Double&gt;</code> lookup returning <code>Double?</code></td></tr>
  <tr><td><code>arr.map(...).filter(x =&gt; x !== undefined)</code></td><td><code>list.mapNotNull { ... }</code></td></tr>
</table>
<p>An expression is a tree: a literal number, a variable reference, or a binary
operation whose operands are themselves expressions. Evaluation is recursive and
can <em>fail</em> — a variable might be unbound, or you might divide by zero — so
the result type is a nullable <code>Double?</code>, and <code>null</code> is your
"could not evaluate" signal. This is the payoff of the course: closed type
hierarchies, structural data, collection pipelines, and null safety working
together on one small program.</p>`,

  javascript: `function evaluate(e, env) {
  switch (e.kind) {
    case "num": return e.value;
    case "var": return e.name in env ? env[e.name] : null;
    case "op": {
      const l = evaluate(e.left, env);
      const r = evaluate(e.right, env);
      if (l === null || r === null) return null;
      switch (e.op) {
        case "+": return l + r;
        case "-": return l - r;
        case "*": return l * r;
        case "/": return r === 0 ? null : l / r;
        default: return null;
      }
    }
  }
}`,

  solution: `sealed interface Expr
data class Num(val value: Double) : Expr
data class Var(val name: String) : Expr
data class BinOp(val op: String, val left: Expr, val right: Expr) : Expr

fun eval(expr: Expr, env: Map<String, Double>): Double? = when (expr) {
    is Num -> expr.value
    is Var -> env[expr.name]
    is BinOp -> {
        val l = eval(expr.left, env)
        val r = eval(expr.right, env)
        if (l == null || r == null) null
        else when (expr.op) {
            "+" -> l + r
            "-" -> l - r
            "*" -> l * r
            "/" -> if (r == 0.0) null else l / r
            else -> null
        }
    }
}

fun variables(expr: Expr): Set<String> = when (expr) {
    is Num -> emptySet()
    is Var -> setOf(expr.name)
    is BinOp -> variables(expr.left) + variables(expr.right)
}

fun evalAll(exprs: List<Expr>, env: Map<String, Double>): List<Double> =
    exprs.mapNotNull { eval(it, env) }
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Kotlin</th></tr>
  <tr><td>Node hierarchy</td><td>tagged object shape</td><td><code>sealed interface</code> + <code>data class</code></td></tr>
  <tr><td>Recursive dispatch</td><td><code>switch (e.kind)</code></td><td>exhaustive <code>when (e)</code></td></tr>
  <tr><td>Narrowing a variant</td><td>no compiler narrowing — just trust the tag</td><td>smart cast after <code>is</code></td></tr>
  <tr><td>Missing value</td><td><code>number</code> or <code>null</code>/<code>undefined</code>, unchecked</td><td><code>Double?</code></td></tr>
  <tr><td>Map/filter out nulls</td><td><code>.map().filter(Boolean)</code></td><td><code>.mapNotNull { }</code></td></tr>
</table>
<p>Notice how little glue this took: no <code>else</code> branch on the outer
<code>when</code> (the compiler knows the three variants are exhaustive, and will
force you to update it if you add a <code>Neg</code> node), no manual equality for
the <code>data class</code> nodes, and <code>mapNotNull</code> folding the
map-then-filter into one pass while carrying the nullability through the types.
In JavaScript none of this is checked — a typo in a <code>kind</code> string, a
missing <code>case</code>, or an unhandled <code>undefined</code> would just
misbehave at runtime instead of failing to compile. From here you could grow
this into a real interpreter — add a
<code>data class Let(val name: String, ...)</code> variant, or return a
<code>sealed</code> <code>Result</code> instead of <code>null</code> to carry an
error message — and the compiler will walk you through every <code>when</code>
that needs the new case.</p>`,
