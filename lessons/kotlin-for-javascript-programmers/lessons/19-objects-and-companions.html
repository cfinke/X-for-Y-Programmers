  title: "Objects & Companions",

  intro: `
<p>JavaScript gives you three separate tools for "one-of-a-kind" and
"class-level" code: a module-scoped object literal for a singleton, the
<code>static</code> keyword for members that hang off the class rather than
an instance, and an inline object literal for a throwaway implementation. Kotlin
folds all three under one keyword — <code>object</code>.</p>
<table>
  <tr><th>JavaScript</th><th>Kotlin</th></tr>
  <tr><td><code>const Tally = { … }</code> (module singleton)</td><td><code>object Tally { … }</code></td></tr>
  <tr><td><code>static parse(…)</code> on a class</td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td><code>{ greet: n =&gt; … }</code> (inline impl)</td><td><code>object : Greeter { … }</code></td></tr>
  <tr><td>closure-based "private" constructor</td><td><code>class User private constructor(…)</code></td></tr>
</table>
<p>An <strong>object declaration</strong> (<code>object Name { … }</code>) is a
lazily-created singleton — there is exactly one instance and you reach it by its
name. A <strong>companion object</strong> is a singleton that lives inside a
class, so its members read like JavaScript <code>static</code>s
(<code>User.parse(…)</code>), and because it can see the class's
<code>private</code> constructor it is the idiomatic home for factory functions.
An <strong>object expression</strong> (<code>object : Greeter { … }</code>) is an
anonymous instance created on the spot, Kotlin's answer to an inline object
literal or an anonymous class.</p>`,

  javascript: `// Singleton: a module-level object
const Tally = {
  items: [],
  add(item) { this.items.push(item); },
  count() { return this.items.length; },
};

// Greeter is just a shape: anything with a greet(name) method

// Static factory + closure-based "private" constructor
class User {
  static SPECIES = "human";
  #name; #age;
  constructor(name, age) { this.#name = name; this.#age = age; }
  get name() { return this.#name; }
  get age() { return this.#age; }
  static parse(text) {
    const [name, age] = text.split(":");
    return new User(name, Number(age));
  }
}

// Anonymous object implementing the Greeter shape
function politeGreeter() {
  return { greet: (name) => \`Hello, \${name}\` };
}`,

  task: `
<p>Everything is top-level — no <code>main</code> needed (that's added for you).
Build one of each flavor of <code>object</code>:</p>
<ol>

  <li><code>User</code> has a <strong>private constructor</strong>. Fill in its

  <li>Make <code>politeGreeter(): Greeter</code> return an
      <strong>object expression</strong> — <code>object : Greeter { … }</code> —

</ol>`,

  requirements: [
    { pattern: /\bobject\s+Tally\b/, message: "Declare Tally as an object (singleton) declaration" },
    { pattern: /\bcompanion\s+object\b/, message: "Use a companion object for User's factory and constant" },
    { pattern: /\bobject\s*:\s*Greeter\b/, message: "Return an object expression: object : Greeter { … }" },
  ],

  tests: [
    { name: "Tally is a singleton: state persists across calls", code: "        val start = Tally.count()\n        Tally.add(\"apples\")\n        Tally.add(\"pears\")\n        expect_eq(Tally.count(), start + 2)\n        expect_true(Tally.all().contains(\"apples\"))\n        expect_true(Tally.all().contains(\"pears\"))" },
    { name: "Tally.all() returns a copy, not the live list", code: "        val snapshot = Tally.all()\n        Tally.add(\"plums\")\n        expect_eq(snapshot.contains(\"plums\"), false)" },
    { name: "companion factory parses a user", code: "        val u = User.parse(\"Ada:36\")\n        expect_eq(u.name, \"Ada\")\n        expect_eq(u.age, 36)" },
    { name: "companion factory parses another user", code: "        expect_eq(User.parse(\"Rob:68\").age, 68)" },
    { name: "companion constant is reachable on the class", code: "        expect_eq(User.SPECIES, \"human\")" },
    { name: "object expression implements Greeter", code: "        expect_eq(politeGreeter().greet(\"Ada\"), \"Hello, Ada\")" },
    { name: "object expression works for any name", code: "        expect_eq(politeGreeter().greet(\"Rob\"), \"Hello, Rob\")" },
  ],

  solution: `object Tally {
    private val items = mutableListOf<String>()

    fun add(item: String) {
        items.add(item)
    }

    fun count(): Int = items.size

    fun all(): List<String> = items.toList()
}

interface Greeter {
    fun greet(name: String): String
}

class User private constructor(val name: String, val age: Int) {
    companion object {
        const val SPECIES = "human"

        fun parse(text: String): User {
            val parts = text.split(":")
            return User(parts[0], parts[1].toInt())
        }
    }
}

fun politeGreeter(): Greeter = object : Greeter {
    override fun greet(name: String): String = "Hello, $name"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Kotlin</th></tr>
  <tr><td>Singleton</td><td><code>const Tally = { … }</code></td><td><code>object Tally { … }</code></td></tr>
  <tr><td>Class-level member</td><td><code>static parse(…)</code></td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td>Class-level constant</td><td><code>static SPECIES = "human"</code></td><td><code>const val X</code> (in companion)</td></tr>
  <tr><td>Private constructor</td><td>closure or <code>#</code>-field convention</td><td><code>class C private constructor(…)</code></td></tr>
  <tr><td>Anonymous instance</td><td><code>{ greet: n =&gt; … }</code></td><td><code>object : Greeter { … }</code></td></tr>
</table>
<p>A companion object is <em>not</em> a bag of statics — it is a genuine
singleton object attached to the class, reachable as
<code>User.Companion</code>, and it can implement interfaces or hold state like
any other object. You get the <code>User.parse(…)</code> call syntax for free
because Kotlin lets you address companion members through the class name. A
<code>private constructor</code> plus a companion factory is the standard way to
force construction through a validated entry point — something JavaScript can
only approximate with a private <code>#</code> field flag or a closure, since
JavaScript classes have no true private constructors.</p>
<p>One idiomatic wrinkle: Kotlin allows top-level functions, so you often do not
need a singleton at all — a plain <code>fun</code> or a top-level
<code>val</code> replaces many classes you would have written as a namespace of
statics in JavaScript. Reach for <code>object</code> when you specifically want a
single named instance that carries state or implements an interface.</p>`,
