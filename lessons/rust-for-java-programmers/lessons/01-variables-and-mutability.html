<script>
const LESSON = {
  number: 1,
  title: "Variables, Mutability & Types",

  intro: `
<p>You already know the discipline: in careful Java you sprinkle
<code>final</code> everywhere so a local can't be reassigned. Rust makes that
the default and drops the keyword — <code>let name = "Ada";</code> is
<code>final</code> without saying so. Reassignment is the thing you opt
<em>into</em>, with <code>let mut</code>. The compiler even nags you the other
way: declare something <code>mut</code> and never mutate it, and you get a
warning.</p>
<table>
  <tr><th>Java</th><th>Rust</th></tr>
  <tr><td><code>final String name = "Ada";</code></td><td><code>let name = "Ada";</code></td></tr>
  <tr><td><code>int age = 36;</code> (reassignable)</td><td><code>let mut age = 36;</code></td></tr>
  <tr><td><code>var price = 9.99;</code></td><td><code>let price = 9.99;</code> (inferred <code>f64</code>)</td></tr>
  <tr><td><code>int</code> / <code>long</code> / <code>double</code></td><td><code>i32</code> / <code>i64</code> / <code>f64</code> — plus <code>u32</code>, <code>u64</code>…</td></tr>
  <tr><td><code>String.format("%s is %d", n, a)</code></td><td><code>format!("{} is {}", n, a)</code></td></tr>
</table>
<p>The numeric types map almost one-to-one — <code>i32</code> is
<code>int</code>, <code>i64</code> is <code>long</code>, <code>f64</code> is
<code>double</code> — and then Rust adds the unsigned family Java never had:
<code>u32</code> is a 32-bit integer that simply cannot be negative, which is
perfect for things like ages and counts. And there's no boxing: no
<code>Integer</code> vs <code>int</code> split, no autoboxing surprises, no
<code>==</code>-on-wrappers trap. An <code>i32</code> is just an
<code>i32</code>, everywhere. Inference works like Java's <code>var</code> but
better — it can flow backwards from how a value is used — so idiomatic Rust
annotates function signatures and lets the compiler figure out the locals.</p>`,

  java: `final String name = "Ada";
int age = 36;
var price = 9.99;              // inferred double

age = 37;                      // fine: not final
// name = "Grace";             // error: final

String describeUser(String name, int age) {
    return String.format("%s is %d years old", name, age);
}

int birthday(int age) {
    age += 1;
    return age;
}`,

  task: `
<p>Rewrite the Java as Rust:</p>
<ol>
  <li>Write a function <code>describe_user</code> that takes
      <code>name: &amp;str</code> and <code>age: u32</code> and returns a
      <code>String</code> like <code>"Ada is 36 years old"</code>. Use
      <code>format!</code> — it replaces <code>String.format</code>, with
      <code>{}</code> instead of <code>%s</code>/<code>%d</code>. Note the
      naming convention change: <code>snake_case</code>, not camelCase.</li>
  <li>Write a function <code>birthday</code> that takes <code>age: u32</code>
      and returns <code>u32</code>. Parameters are immutable by default, so
      bind the argument to a <code>let mut</code> local, add 1 to it with
      <code>+=</code>, and return it.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. describe_user: takes name: &str and age: u32, returns String.
//    Java: String.format("%s is %d years old", name, age)
//    Rust: format!("{} is {} years old", ...)
fn describe_user(name: &str, age: u32) -> String {
    todo!()
}

// 2. birthday: bind age to a \`let mut\` local, increment it with +=, return it.
fn birthday(age: u32) -> u32 {
    todo!()
}
`,

  requirements: [
    { pattern: /fn\s+describe_user\s*\(\s*name\s*:\s*&str\s*,\s*age\s*:\s*u32\s*\)\s*->\s*String/, message: "Define describe_user(name: &str, age: u32) -> String" },
    { pattern: /format!\s*\(/, message: "Use the format! macro to build the string" },
    { pattern: /let\s+mut\b/, message: "Use a let mut binding inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'assert_eq!(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'assert_eq!(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "assert_eq!(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "assert_eq!(birthday(0), 1);" },
  ],

  solution: `fn describe_user(name: &str, age: u32) -> String {
    format!("{} is {} years old", name, age)
}

fn birthday(age: u32) -> u32 {
    let mut next = age;
    next += 1;
    next
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Rust</th></tr>
  <tr><td>Immutable local</td><td><code>final int x = 1;</code></td><td><code>let x = 1;</code> (the default)</td></tr>
  <tr><td>Mutable local</td><td><code>int x = 1;</code></td><td><code>let mut x = 1;</code> (the opt-in)</td></tr>
  <tr><td>Inference</td><td><code>var x = 1;</code></td><td><code>let x = 1;</code></td></tr>
  <tr><td>Integers</td><td><code>int</code>, <code>long</code></td><td><code>i32</code>, <code>i64</code> — plus unsigned <code>u32</code>, <code>u64</code></td></tr>
  <tr><td>Floating point</td><td><code>double</code></td><td><code>f64</code></td></tr>
  <tr><td>Boxing</td><td><code>Integer</code> vs <code>int</code></td><td>none — <code>i32</code> is always just <code>i32</code></td></tr>
  <tr><td>Formatting</td><td><code>String.format("%s is %d", n, a)</code></td><td><code>format!("{} is {}", n, a)</code></td></tr>
  <tr><td>Naming</td><td><code>camelCase</code></td><td><code>snake_case</code> (the compiler will nag you)</td></tr>
</table>
<p>Notice <code>birthday</code>'s last line has no <code>return</code> and no
semicolon: a block's final expression is its value — the next lesson leans
into that. Also notice what you didn't write: no wrapper class around these
functions, and no <code>%d</code>-vs-argument-type mismatch waiting to blow up
at runtime — <code>format!</code> is checked at compile time.</p>`,
};
