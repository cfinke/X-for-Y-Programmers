<div id="app"></div>
<script>
const LESSON = {
  number: 2,
  title: "Functions & Control Flow",

  intro: `
<p>Free functions, at last. Java makes you wrap every helper in a class of
<code>static</code> methods — <code>MathUtils.maxOf(a, b)</code> — because
nothing can live outside a class. In Rust, <code>fn max_of(a, b)</code> sits
at the top level of the file, no wrapper required. The signature reads in a
different order: types come <em>after</em> names (<code>x: i32</code> instead
of <code>int x</code>), and the return type moves to the end after an
arrow.</p>
<table>
  <tr><th>Java</th><th>Rust</th></tr>
  <tr><td><code>static String f(int x) { ... }</code></td><td><code>fn f(x: i32) -> String { ... }</code></td></tr>
  <tr><td><code>int m = a &gt; b ? a : b;</code></td><td><code>let m = if a &gt; b { a } else { b };</code></td></tr>
  <tr><td><code>return x;</code> (mandatory)</td><td>last expression, no semicolon</td></tr>
  <tr><td>needs a wrapper class</td><td>free functions at file scope</td></tr>
</table>
<p>The bigger shift: in Rust nearly everything is an <em>expression</em> — it
produces a value. Java's <code>if</code> is a statement, so you invented the
ternary <code>? :</code> to get a value out of a condition; Rust's
<code>if</code> already is one, so <code>let m = if a &gt; b { a } else { b };</code>
replaces the ternary (and scales to <code>else if</code> chains the ternary
can't handle readably). Same for blocks: a block's last expression — written
<em>without</em> a semicolon — is the block's value, which is why idiomatic
Rust functions usually end with a bare expression instead of
<code>return</code>.</p>`,

  java: `// Java: even a max() helper needs a class to live in.
public final class MathUtils {

    static int maxOf(int a, int b) {
        return a > b ? a : b;      // ternary: if-as-a-value
    }

    static String grade(int score) {
        String result = score >= 60 ? "pass" : "fail";
        return result;
    }

    static int sign(int n) {
        if (n > 0) return 1;
        if (n < 0) return -1;
        return 0;
    }
}`,

  task: `
<p>Rewrite <code>MathUtils</code> as three free Rust functions — no class, no
<code>static</code>, no <code>return</code> keyword anywhere:</p>
<ol>
  <li><code>max_of</code> takes <code>a: i32</code> and <code>b: i32</code>
      and returns <code>i32</code> — the larger of the two. Make the
      <code>if</code>/<code>else</code> expression itself the function body's
      last expression.</li>
  <li><code>grade</code> takes <code>score: u32</code> and returns
      <code>String</code>: <code>"pass"</code> for scores of 60 and above,
      <code>"fail"</code> below. Bind the result of an <code>if</code>
      expression with <code>let</code> (the ternary replacement), then return
      that binding as the last expression. Use
      <code>String::from("...")</code> to make an owned <code>String</code>.</li>
  <li><code>sign</code> takes <code>n: i32</code> and returns <code>i32</code>:
      <code>1</code> if positive, <code>-1</code> if negative, <code>0</code>
      if zero — one <code>if</code>/<code>else if</code>/<code>else</code>
      chain as the body.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. max_of: the whole body is one if/else expression — no \`return\`.
fn max_of(a: i32, b: i32) -> i32 {
    todo!()
}

// 2. grade: let result = if score >= 60 { ... } else { ... };
//    then \`result\` alone (no semicolon) as the last line.
fn grade(score: u32) -> String {
    todo!()
}

// 3. sign: if / else if / else, each branch producing the value.
fn sign(n: i32) -> i32 {
    todo!()
}
`,

  requirements: [
    { pattern: /->/, message: "Declare return types with -> after the parameter list" },
    { pattern: /=\s*if\b/, message: "Bind the result of an if expression with let (the ternary replacement)" },
  ],

  tests: [
    { name: "max_of(3, 7) returns 7",
      code: "assert_eq!(max_of(3, 7), 7);" },
    { name: "max_of(10, -2) returns 10",
      code: "assert_eq!(max_of(10, -2), 10);" },
    { name: 'grade(72) returns "pass" and grade(60) returns "pass"',
      code: 'assert_eq!(grade(72), "pass");\nassert_eq!(grade(60), "pass");' },
    { name: 'grade(59) returns "fail"',
      code: 'assert_eq!(grade(59), "fail");' },
    { name: "sign(42) returns 1 and sign(-7) returns -1",
      code: "assert_eq!(sign(42), 1);\nassert_eq!(sign(-7), -1);" },
    { name: "sign(0) returns 0",
      code: "assert_eq!(sign(0), 0);" },
  ],

  solution: `fn max_of(a: i32, b: i32) -> i32 {
    if a > b { a } else { b }
}

fn grade(score: u32) -> String {
    let result = if score >= 60 { "pass" } else { "fail" };
    String::from(result)
}

fn sign(n: i32) -> i32 {
    if n > 0 {
        1
    } else if n < 0 {
        -1
    } else {
        0
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Rust</th></tr>
  <tr><td>Function</td><td><code>static String f(int x)</code></td><td><code>fn f(x: i32) -> String</code></td></tr>
  <tr><td>Where it lives</td><td>inside a class, always</td><td>free at file scope</td></tr>
  <tr><td>Conditional value</td><td><code>a &gt; b ? a : b</code></td><td><code>if a &gt; b { a } else { b }</code></td></tr>
  <tr><td>Returning</td><td><code>return x;</code></td><td>last expression, no semicolon (<code>return</code> exists but is for early exits)</td></tr>
  <tr><td>Multi-way</td><td>nested ternaries or if-statements</td><td>one <code>if</code>/<code>else if</code>/<code>else</code> expression</td></tr>
</table>
<p>The semicolon rule is the one to internalize: <code>x</code> is an
expression that yields a value; <code>x;</code> is a statement that throws it
away. Forget and end a function body with a semicolon, and the compiler will
tell you the function returns <code>()</code> — Rust's <code>void</code> —
instead of your declared type. It's the most common early stumble, and the
error message names it exactly.</p>`,
};
</script>
