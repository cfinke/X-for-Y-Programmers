const LESSON = {
  number: 17,
  title: "Common Traits & Derive",

  intro: `
<p>Every Java developer knows the ritual: write a data class, then generate
<code>equals</code>, <code>hashCode</code>, <code>toString</code>, maybe
<code>clone</code> — by hand, with your IDE, with Lombok's
<code>@Data</code>, or by reaching for a <code>record</code>. Rust bakes the
same idea into the language: put <code>#[derive(...)]</code> above a struct and
the compiler writes those implementations for you, correctly, field by
field.</p>
<table>
  <tr><th>Java</th><th>Rust</th></tr>
  <tr><td><code>toString()</code> (or Lombok <code>@ToString</code>)</td><td><code>#[derive(Debug)]</code> → print with <code>{:?}</code></td></tr>
  <tr><td><code>equals()</code> / <code>hashCode()</code></td><td><code>#[derive(PartialEq)]</code> (and <code>Eq</code>, <code>Hash</code>)</td></tr>
  <tr><td><code>clone()</code> (and its sharp edges)</td><td><code>#[derive(Clone)]</code> → <code>.clone()</code> done right</td></tr>
  <tr><td>No-args constructor with default fields</td><td><code>#[derive(Default)]</code> → <code>Point::default()</code></td></tr>
  <tr><td><code>record Point(int x, int y) {}</code></td><td><code>#[derive(Debug, PartialEq, Clone)] struct Point { ... }</code></td></tr>
</table>
<p>One habit to unlearn: in Rust, <code>==</code> compares <em>values</em>, not
references. Java's <code>a == b</code> on objects asks "same object in
memory?" and you were trained to call <code>.equals()</code> instead. Rust's
<code>==</code> simply calls the <code>PartialEq</code> implementation — so
once you derive it, <code>==</code> is the field-by-field comparison you
always wanted it to be. The flip side: a struct with no derives can't be
compared, printed, or cloned at all. You opt in to each capability, and the
compiler tells you the moment you forgot one.</p>`,

  java: `import java.util.Objects;

class Point {
    final int x, y;
    Point(int x, int y) { this.x = x; this.y = y; }

    @Override public boolean equals(Object o) {
        if (this == o) return true;
        if (!(o instanceof Point p)) return false;
        return x == p.x && y == p.y;
    }
    @Override public int hashCode() { return Objects.hash(x, y); }
    @Override public String toString() {
        return "Point{x=" + x + ", y=" + y + "}";
    }
}

// Or let the language generate it all:
// record Point(int x, int y) {}`,

  task: `
<p>The starter defines <code>struct Point</code> with <em>no</em> derives.
Give it capabilities, then use them:</p>
<ol>
  <li>Add a derive attribute to <code>Point</code> that includes at least
      <code>Debug</code>, <code>PartialEq</code>, and <code>Clone</code>.</li>
  <li>Implement <code>points_equal(a: &amp;Point, b: &amp;Point) -&gt; bool</code>
      using <code>==</code> — it works once <code>PartialEq</code> is derived
      (compare <code>a</code> and <code>b</code> as values: <code>a == b</code>).</li>
  <li>Implement <code>debug_string(p: &amp;Point) -&gt; String</code> with
      <code>format!("{:?}", p)</code> — that's what <code>Debug</code>
      unlocks. For <code>Point { x: 3, y: 4 }</code> it produces exactly
      <code>"Point { x: 3, y: 4 }"</code>.</li>
  <li>Implement <code>duplicate(p: &amp;Point) -&gt; Point</code> using
      <code>.clone()</code> — an independent copy, courtesy of
      <code>Clone</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// TODO: add the derive attribute this lesson is about, right here,
// on the line above the struct. Without it, Points can't be compared,
// printed, or cloned — try running the tests and read the errors.
struct Point {
    x: i32,
    y: i32,
}

// 1. Are the two points equal by value? (Java: a.equals(b) — Rust: ==)
fn points_equal(a: &Point, b: &Point) -> bool {
    todo!()
}

// 2. The toString() equivalent: format! with the {:?} placeholder.
fn debug_string(p: &Point) -> String {
    todo!()
}

// 3. An independent copy of the point.
fn duplicate(p: &Point) -> Point {
    todo!()
}
`,

  requirements: [
    { pattern: /#\[derive\(/, message: "Add a #[derive(...)] attribute to Point" },
    { pattern: /PartialEq/, message: "Derive PartialEq so == works on Points" },
    { pattern: /Debug/, message: "Derive Debug so {:?} works on Points" },
    { pattern: /Clone/, message: "Derive Clone so .clone() works on Points" },
  ],

  tests: [
    { name: "points_equal: equal values compare equal",
      code: `let a = Point { x: 1, y: 2 };
let b = Point { x: 1, y: 2 };
assert!(points_equal(&a, &b));` },
    { name: "points_equal: different values compare unequal",
      code: `let a = Point { x: 1, y: 2 };
let b = Point { x: 1, y: 3 };
assert!(!points_equal(&a, &b));` },
    { name: 'debug_string(Point { x: 3, y: 4 }) returns "Point { x: 3, y: 4 }"',
      code: `let p = Point { x: 3, y: 4 };
assert_eq!(debug_string(&p), "Point { x: 3, y: 4 }");` },
    { name: "duplicate returns a copy with the same fields",
      code: `let p = Point { x: -7, y: 9 };
let copy = duplicate(&p);
assert_eq!(copy.x, -7);
assert_eq!(copy.y, 9);` },
    { name: "duplicate leaves the original usable (a real copy, not a move)",
      code: `let p = Point { x: 5, y: 6 };
let copy = duplicate(&p);
assert_eq!(p.x + copy.x, 10);` },
  ],

  solution: `#[derive(Debug, PartialEq, Clone)]
struct Point {
    x: i32,
    y: i32,
}

fn points_equal(a: &Point, b: &Point) -> bool {
    a == b
}

fn debug_string(p: &Point) -> String {
    format!("{:?}", p)
}

fn duplicate(p: &Point) -> Point {
    p.clone()
}
`,

  notes: `
<table>
  <tr><th>Capability</th><th>Java</th><th>Rust</th></tr>
  <tr><td>Readable printout</td><td><code>toString()</code></td><td><code>#[derive(Debug)]</code> + <code>{:?}</code></td></tr>
  <tr><td>Value equality</td><td><code>equals()</code> (never <code>==</code>!)</td><td><code>#[derive(PartialEq)]</code> + <code>==</code> (yes, <code>==</code>)</td></tr>
  <tr><td>Hashing</td><td><code>hashCode()</code></td><td><code>#[derive(Hash)]</code> (with <code>Eq</code>)</td></tr>
  <tr><td>Copying</td><td><code>clone()</code> / copy constructor</td><td><code>#[derive(Clone)]</code> + <code>.clone()</code></td></tr>
  <tr><td>"Empty" instance</td><td>no-args constructor</td><td><code>#[derive(Default)]</code> + <code>Point::default()</code></td></tr>
  <tr><td>Generate it all</td><td>Lombok <code>@Data</code> / <code>record</code></td><td><code>#[derive(Debug, Clone, PartialEq, Eq, Hash, Default)]</code></td></tr>
</table>
<p>The deepest difference is the default. Every Java object inherits
<code>equals</code>, <code>hashCode</code>, and <code>toString</code> from
<code>Object</code> — usually with useless identity-based behavior that works
just well enough to hide bugs. A Rust struct starts with <em>none</em> of
these; forget a derive and you get a compile error at the call site, not a
HashMap that quietly misplaces your keys because someone forgot
<code>hashCode</code>.</p>`,
};
