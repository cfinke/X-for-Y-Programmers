<script>
const LESSON = {
  number: 10,
  title: "Structs & Methods",

  intro: `
<p>A Java class bundles three things: the fields, the constructor, and the
methods. Rust splits the first from the rest: a <code>struct</code> declares
only the data, and an <code>impl</code> block attaches the behavior. Same
capabilities, different geometry — and the constructor turns out to be just
a convention: an associated function named <code>new</code> (no
<code>self</code> parameter — think <code>static</code>) that builds and
returns the value. You call it as <code>BankAccount::new("Ada")</code>;
there's no <code>new</code> keyword and no constructor ceremony, just a
function that happens to be named well.</p>
<table>
  <tr><th>Java</th><th>Rust</th></tr>
  <tr><td><code>class BankAccount { fields + methods }</code></td><td><code>struct BankAccount { fields }</code> + <code>impl BankAccount { methods }</code></td></tr>
  <tr><td><code>new BankAccount("Ada")</code></td><td><code>BankAccount::new("Ada")</code> (convention, not keyword)</td></tr>
  <tr><td><code>public long getBalance()</code></td><td><code>fn balance(&amp;self) -&gt; i64</code></td></tr>
  <tr><td><code>public void deposit(long amount)</code></td><td><code>fn deposit(&amp;mut self, amount: i64)</code></td></tr>
  <tr><td><code>this.balance</code></td><td><code>self.balance</code></td></tr>
</table>
<p>The genuinely new idea is in the <code>self</code> parameter. Java methods
all get the same mutable <code>this</code>; whether <code>getBalance()</code>
quietly changes state is a documentation question. Rust methods declare it:
<code>&amp;self</code> means "I only read", <code>&amp;mut self</code> means
"I mutate" — it's the const-correctness Java never had, checked by the
compiler. You can see from the signature alone that <code>balance</code> is
safe to call anywhere, and that <code>deposit</code> requires the account to
be bound with <code>mut</code>. Combined with last lesson's
<code>Result</code>, <code>withdraw</code> can report "insufficient funds"
in its return type instead of throwing.</p>`,

  java: `public class BankAccount {
    private final String owner;
    private long balance;

    public BankAccount(String owner) {
        this.owner = owner;
        this.balance = 0;
    }

    public void deposit(long amount) {
        balance += amount;          // mutates — but the signature won't say so
    }

    public void withdraw(long amount) {
        if (amount > balance) {
            throw new IllegalStateException("insufficient funds");
        }
        balance -= amount;
    }

    public long getBalance() { return balance; }
}`,

  task: `
<p>Rewrite the Java as Rust. The
<code>struct BankAccount</code> definition is already complete in the
starter — your job is the <code>impl</code> block:</p>
<ol>
  <li><code>new(owner: &amp;str) -&gt; BankAccount</code> — the constructor by
      convention: build a <code>BankAccount</code> with the given owner
      (<code>owner.to_string()</code>) and a balance of 0.</li>
  <li><code>deposit(&amp;mut self, amount: i64)</code> — add
      <code>amount</code> to <code>self.balance</code>. Note
      <code>&amp;mut self</code>: the signature declares the mutation.</li>
  <li><code>withdraw(&amp;mut self, amount: i64) -&gt; Result&lt;(), String&gt;</code>
      — if <code>amount</code> exceeds the balance, return an
      <code>Err</code> with a message and leave the balance untouched
      (where Java throws <code>IllegalStateException</code>); otherwise
      subtract and return <code>Ok(())</code>.</li>
  <li><code>balance(&amp;self) -&gt; i64</code> — the getter: plain
      <code>&amp;self</code>, because it only reads.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// The data: fields only, no behavior. (Complete — leave as is.)
struct BankAccount {
    owner: String,
    balance: i64,
}

// The behavior: an impl block attaches methods to the struct.
impl BankAccount {
    // 1. The constructor by convention: no self parameter, returns the value.
    fn new(owner: &str) -> BankAccount {
        todo!()
    }

    // 2. &mut self: this method declares that it mutates the account.
    fn deposit(&mut self, amount: i64) {
        todo!()
    }

    // 3. Overdraft is an Err, not an exception. Ok(()) on success.
    fn withdraw(&mut self, amount: i64) -> Result<(), String> {
        todo!()
    }

    // 4. &self: read-only, safe to call anywhere.
    fn balance(&self) -> i64 {
        todo!()
    }
}
`,

  requirements: [
    { pattern: /struct\s+BankAccount/, message: "Keep the struct BankAccount data definition" },
    { pattern: /impl\s+BankAccount/, message: "Attach the methods in an impl BankAccount block" },
    { pattern: /&mut\s+self/, message: "Mutating methods must take &mut self" },
  ],

  tests: [
    { name: 'BankAccount::new("Ada") starts with owner "Ada" and balance 0',
      code: 'let acct = BankAccount::new("Ada");\nassert_eq!(acct.owner, "Ada");\nassert_eq!(acct.balance(), 0);' },
    { name: "deposit adds to the balance",
      code: 'let mut acct = BankAccount::new("Ada");\nacct.deposit(100);\nacct.deposit(50);\nassert_eq!(acct.balance(), 150);' },
    { name: "withdraw succeeds when funds are sufficient",
      code: 'let mut acct = BankAccount::new("Ada");\nacct.deposit(100);\nassert!(acct.withdraw(40).is_ok());\nassert_eq!(acct.balance(), 60);' },
    { name: "overdraft returns Err instead of throwing",
      code: 'let mut acct = BankAccount::new("Ada");\nassert!(acct.withdraw(100).is_err());' },
    { name: "a failed withdraw leaves the balance untouched",
      code: 'let mut acct = BankAccount::new("Ada");\nacct.deposit(30);\nlet _ = acct.withdraw(1000);\nassert_eq!(acct.balance(), 30);' },
  ],

  solution: `struct BankAccount {
    owner: String,
    balance: i64,
}

impl BankAccount {
    fn new(owner: &str) -> BankAccount {
        BankAccount {
            owner: owner.to_string(),
            balance: 0,
        }
    }

    fn deposit(&mut self, amount: i64) {
        self.balance += amount;
    }

    fn withdraw(&mut self, amount: i64) -> Result<(), String> {
        if amount > self.balance {
            return Err("insufficient funds".to_string());
        }
        self.balance -= amount;
        Ok(())
    }

    fn balance(&self) -> i64 {
        self.balance
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Rust</th></tr>
  <tr><td>Data + behavior</td><td>one <code>class</code></td><td><code>struct</code> (data) + <code>impl</code> (behavior)</td></tr>
  <tr><td>Constructor</td><td><code>new BankAccount("Ada")</code></td><td><code>BankAccount::new("Ada")</code> — a plain associated fn</td></tr>
  <tr><td>Static method</td><td><code>static</code></td><td>associated fn (no <code>self</code>), called with <code>::</code></td></tr>
  <tr><td>Read-only method</td><td>convention (<code>getX</code>)</td><td><code>&amp;self</code> — enforced</td></tr>
  <tr><td>Mutating method</td><td>indistinguishable from a getter</td><td><code>&amp;mut self</code> — in the signature</td></tr>
  <tr><td>This object</td><td><code>this.balance</code> (implicit)</td><td><code>self.balance</code> (explicit parameter)</td></tr>
  <tr><td>Failure</td><td><code>throw new IllegalStateException(...)</code></td><td><code>-&gt; Result&lt;(), String&gt;</code></td></tr>
</table>
<p>The <code>&amp;self</code> / <code>&amp;mut self</code> distinction is the
borrowing rules from Lesson 5 applied to methods — a method that takes
<code>&amp;mut self</code> can only be called on an account bound with
<code>let mut</code>, which is why the tests write
<code>let mut acct</code> before depositing. In Java you'd wonder which
methods change state and read the source to find out; in Rust the signature
is the documentation, and the compiler holds every implementation to
it.</p>`,
};
</script>
