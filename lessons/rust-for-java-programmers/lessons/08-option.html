const LESSON = {
  number: 8,
  title: "Option: The End of Null",

  intro: `
<p>Every Java developer has shipped a <code>NullPointerException</code>.
Java's answer was <code>Optional&lt;T&gt;</code> — a fine idea with a fatal
flaw: it's opt-in. Any method can still return a plain nullable reference,
so <code>Optional</code> protects only the code paths where someone
remembered to use it. Rust's <code>Option&lt;T&gt;</code> is the same idea
made <em>unskippable</em>: there are no nullable references at all. If a
value can be absent, its type says <code>Option&lt;T&gt;</code>, and the
compiler forces the <code>isPresent</code> check before you can touch the
value inside. The billion-dollar mistake isn't discouraged — it's
unrepresentable.</p>
<table>
  <tr><th>Java</th><th>Rust</th></tr>
  <tr><td><code>Optional.of("Ada")</code></td><td><code>Some("Ada".to_string())</code></td></tr>
  <tr><td><code>Optional.empty()</code></td><td><code>None</code></td></tr>
  <tr><td><code>opt.orElse("anonymous")</code></td><td><code>opt.unwrap_or("anonymous".to_string())</code></td></tr>
  <tr><td><code>opt.map(String::length)</code></td><td><code>opt.map(|s| s.len())</code></td></tr>
  <tr><td><code>if (opt.isPresent()) opt.get()</code></td><td><code>match opt { Some(v) =&gt; …, None =&gt; … }</code></td></tr>
</table>
<p>The combinators map one-to-one — <code>unwrap_or</code> is
<code>orElse</code>, <code>.map</code> is <code>Optional.map</code> — and
where Java reaches for <code>isPresent()</code>/<code>get()</code>, Rust
reaches for <code>match</code>, which hands you the inner value only inside
the <code>Some</code> arm. There's no <code>.get()</code> to call on the
wrong branch. (There is <code>.unwrap()</code>, which panics on
<code>None</code> — the moral equivalent of calling <code>get()</code>
without checking — but unlike Java, you can grep for every place you
gambled.)</p>`,

  java: `// The classic: any reference might be null, the types won't tell you.
String name = findUser(id);
int len = name.length();       // NullPointerException waiting to happen

// The fix Java added in 2014 — but only where people opt in:
Optional<String> maybe = findUserOpt(id);
String display = maybe.orElse("anonymous");
int length = maybe.map(String::length).orElse(0);

static Optional<String> findUserOpt(int id) {
    if (id == 1) return Optional.of("Ada");
    if (id == 2) return Optional.of("Grace");
    return Optional.empty();
}

// And nothing stops findUser from still returning plain null...
static String findUser(int id) { return id == 1 ? "Ada" : null; }`,

  task: `
<p>Rewrite the Java as Rust:</p>
<ol>
  <li>Write <code>find_user(id: u32) -&gt; Option&lt;String&gt;</code>:
      <code>Some("Ada".to_string())</code> for id 1,
      <code>Some("Grace".to_string())</code> for id 2, and
      <code>None</code> for anything else — <code>Optional.empty()</code>,
      not <code>null</code>.</li>
  <li>Write <code>display_name(name: Option&lt;String&gt;) -&gt; String</code>
      that returns the name if present, or <code>"anonymous"</code> if not —
      Java's <code>orElse</code>, spelled <code>unwrap_or</code>.</li>
  <li>Write <code>first_char(s: &amp;str) -&gt; Option&lt;char&gt;</code>
      using <code>s.chars().next()</code> — the standard library already
      speaks Option, so an empty string is <code>None</code> for free.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. find_user: Some("Ada") for 1, Some("Grace") for 2, None otherwise.
//    A match on id (with a _ catch-all arm) reads well here.
fn find_user(id: u32) -> Option<String> {
    todo!()
}

// 2. display_name: Java's maybe.orElse("anonymous") is
//    name.unwrap_or("anonymous".to_string()).
fn display_name(name: Option<String>) -> String {
    todo!()
}

// 3. first_char: .chars().next() already returns Option<char>.
fn first_char(s: &str) -> Option<char> {
    todo!()
}
`,

  requirements: [
    { pattern: /Option</, message: "Return Option<T> — absence lives in the type" },
    { pattern: /Some\(/, message: "Wrap present values in Some(...)" },
    { pattern: /None/, message: "Use None where Java would return null or Optional.empty()" },
    { pattern: /unwrap_or/, message: "Use unwrap_or (Java's orElse) in display_name" },
  ],

  tests: [
    { name: 'find_user(1) is Some("Ada")',
      code: 'assert_eq!(find_user(1), Some("Ada".to_string()));' },
    { name: 'find_user(2) is Some("Grace")',
      code: 'assert_eq!(find_user(2), Some("Grace".to_string()));' },
    { name: "find_user(99) is None — not null, not a crash",
      code: 'assert_eq!(find_user(99), None);' },
    { name: "display_name unwraps a present name",
      code: 'assert_eq!(display_name(Some("Linus".to_string())), "Linus");' },
    { name: 'display_name(None) falls back to "anonymous"',
      code: 'assert_eq!(display_name(None), "anonymous");' },
    { name: "first_char: Some('r') for \"rust\", None for \"\"",
      code: "assert_eq!(first_char(\"rust\"), Some('r'));\nassert_eq!(first_char(\"\"), None);" },
  ],

  solution: `fn find_user(id: u32) -> Option<String> {
    match id {
        1 => Some("Ada".to_string()),
        2 => Some("Grace".to_string()),
        _ => None,
    }
}

fn display_name(name: Option<String>) -> String {
    name.unwrap_or("anonymous".to_string())
}

fn first_char(s: &str) -> Option<char> {
    s.chars().next()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Rust</th></tr>
  <tr><td>Present value</td><td><code>Optional.of(v)</code></td><td><code>Some(v)</code></td></tr>
  <tr><td>Absent value</td><td><code>Optional.empty()</code> (or <code>null</code>…)</td><td><code>None</code></td></tr>
  <tr><td>Default</td><td><code>opt.orElse(fallback)</code></td><td><code>opt.unwrap_or(fallback)</code></td></tr>
  <tr><td>Transform</td><td><code>opt.map(f)</code></td><td><code>opt.map(f)</code></td></tr>
  <tr><td>Check &amp; extract</td><td><code>isPresent()</code> + <code>get()</code></td><td><code>match</code> / <code>if let Some(v)</code></td></tr>
  <tr><td>Gamble</td><td><code>opt.get()</code> unchecked</td><td><code>opt.unwrap()</code> (greppable, panics loudly)</td></tr>
</table>
<p>The difference from <code>Optional</code> isn't the API — it's the
coverage. In Java, <code>Optional</code> is a convention at the edges of
well-behaved libraries; every other reference in the language is still
secretly nullable. In Rust, <code>Option</code> is the <em>only</em> way to
express absence, so the question "could this be missing?" is always answered
by the signature — never by reading the Javadoc, and never at 3 a.m. by a
stack trace.</p>`,
};
