const LESSON = {
  number: 15,
  title: "Slices, Tuples & Destructuring",

  intro: `
<p>Java has no tuples. Every time a method needs to return two values you pay
the tax: declare a <code>record</code>, misuse <code>Map.Entry</code>, or
reach for a <code>Pair</code> from some library. Rust has anonymous tuples
built in: <code>(f64, f64)</code> is a pair of doubles, made with
<code>(3.0, 4.0)</code>, read with <code>.0</code> and <code>.1</code>, no
declaration anywhere.</p>
<table>
  <tr><th>Java</th><th>Rust</th></tr>
  <tr><td><code>record Point(double x, double y) {}</code> just to return two values</td><td><code>(f64, f64)</code> — anonymous, no declaration</td></tr>
  <tr><td><code>p.x()</code>, <code>p.y()</code></td><td><code>p.0</code>, <code>p.1</code></td></tr>
  <tr><td><code>case Point(double x, double y)</code> (record patterns, Java 21)</td><td><code>let (x, y) = p;</code> — works on every tuple, everywhere</td></tr>
  <tr><td><code>int tmp = a; a = b; b = tmp;</code></td><td><code>(a, b) = (b, a);</code></td></tr>
</table>
<p>Destructuring is Java 21's record patterns, generalized:
<code>let (x, y) = point;</code> unpacks any tuple into locals, no
<code>instanceof</code> ceremony — and swapping two values is a one-liner
with no temp variable. The other half of this lesson you've already been
using: <code>&amp;[i32]</code> is a <em>slice</em>, a read-only view into a
<code>Vec</code> or array. It's the <code>List.copyOf</code> defensive copy
you'd hand out in Java, except it's free — no copy, and the borrow checker
guarantees nobody mutates it out from under you.</p>`,

  java: `// Java has no tuples: to return two values you declare a type.
record Point(double x, double y) {}
record IntPair(int first, int second) {}

static IntPair swap(IntPair pair) {
    return new IntPair(pair.second(), pair.first());
}

static double distance(Point p, Point q) {
    // Record patterns (Java 21) finally allow destructuring:
    if (p instanceof Point(double x1, double y1)
            && q instanceof Point(double x2, double y2)) {
        return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
    }
    throw new IllegalStateException("unreachable");
}

static IntPair ends(List<Integer> v) {
    return new IntPair(v.get(0), v.get(v.size() - 1));
}`,

  task: `
<p>Port all three — no records required:</p>
<ol>
  <li><code>swap(pair: (i32, i32)) -&gt; (i32, i32)</code> — return the pair
      with its elements exchanged. Destructure with
      <code>let (a, b) = pair;</code> and build the new tuple.</li>
  <li><code>distance(p: (f64, f64), q: (f64, f64)) -&gt; f64</code> — the
      Euclidean distance between two points. Destructure each point with a
      <code>let (x, y)</code> pattern, then
      <code>((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()</code>.</li>
  <li><code>ends(v: &amp;[i32]) -&gt; (i32, i32)</code> — a tuple of the first
      and last elements of the slice (assume it's non-empty; for a one-element
      slice both are the same value).</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. swap: destructure with let (a, b) = pair; then return (b, a).
//    No IntPair record needed — the tuple type is anonymous.
fn swap(pair: (i32, i32)) -> (i32, i32) {
    todo!()
}

// 2. distance: let (x1, y1) = p; let (x2, y2) = q;
//    then ((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()
fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    todo!()
}

// 3. ends: first and last of the slice — v[0] and v[v.len() - 1].
fn ends(v: &[i32]) -> (i32, i32) {
    todo!()
}
`,

  requirements: [
    { pattern: /\(\s*f64\s*,\s*f64\s*\)/, message: "Use the anonymous tuple type (f64, f64) in distance's signature" },
    { pattern: /let\s*\(/, message: "Destructure a tuple with a let (…) pattern" },
    { pattern: /&\[i32\]/, message: "ends should take a slice: &[i32]" },
  ],

  tests: [
    { name: "swap((1, 2)) returns (2, 1)",
      code: "assert_eq!(swap((1, 2)), (2, 1));" },
    { name: "swap((-5, 0)) returns (0, -5)",
      code: "assert_eq!(swap((-5, 0)), (0, -5));" },
    { name: "distance of the 3-4-5 triangle is exactly 5.0",
      code: "assert_eq!(distance((0.0, 0.0), (3.0, 4.0)), 5.0);" },
    { name: "distance from a point to itself is 0.0",
      code: "assert_eq!(distance((2.5, -1.0), (2.5, -1.0)), 0.0);" },
    { name: "ends(&[10, 20, 30]) returns (10, 30)",
      code: "assert_eq!(ends(&[10, 20, 30]), (10, 30));" },
    { name: "ends(&[7]) returns (7, 7)",
      code: "assert_eq!(ends(&[7]), (7, 7));" },
  ],

  solution: `fn swap(pair: (i32, i32)) -> (i32, i32) {
    let (a, b) = pair;
    (b, a)
}

fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    let (x1, y1) = p;
    let (x2, y2) = q;
    ((x2 - x1).powi(2) + (y2 - y1).powi(2)).sqrt()
}

fn ends(v: &[i32]) -> (i32, i32) {
    (v[0], v[v.len() - 1])
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Rust</th></tr>
  <tr><td>Pair of values</td><td><code>record IntPair(int a, int b)</code> / <code>Map.Entry</code></td><td><code>(i32, i32)</code> — anonymous</td></tr>
  <tr><td>Field access</td><td><code>pair.first()</code></td><td><code>pair.0</code>, <code>pair.1</code></td></tr>
  <tr><td>Destructuring</td><td>record patterns via <code>instanceof</code>/<code>switch</code></td><td><code>let (x, y) = p;</code> — any tuple, any time</td></tr>
  <tr><td>Swap two variables</td><td>third <code>tmp</code> variable</td><td><code>(a, b) = (b, a);</code></td></tr>
  <tr><td>Read-only list view</td><td><code>List.copyOf(v)</code> (a real copy)</td><td><code>&amp;[i32]</code> — a free borrow</td></tr>
</table>
<p>When should a tuple become a struct? The same instinct you have about
records applies: <code>(f64, f64)</code> is fine across a couple of lines, but
once a pair travels through your API, name it — a tuple struct like
<code>struct Point(f64, f64);</code> is the middle ground, keeping
<code>.0</code>/<code>.1</code> access while giving the type a name the
compiler can tell apart from every other pair of doubles.</p>`,
};
