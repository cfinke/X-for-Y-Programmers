const LESSON = {
  number: 8,
  title: "Data Classes",

  intro: `
<p>In TypeScript you reach for a plain object or an <code>interface</code> when
you just want to bundle a few fields together — and you get structural equality
for free only if you compare field-by-field or pull in a helper. Kotlin's
answer is the <strong>data class</strong>: prefix a class with <code>data</code>
and the compiler generates <code>equals()</code>, <code>hashCode()</code>,
<code>toString()</code>, a <code>copy()</code>, and <code>componentN()</code>
destructuring functions from the primary-constructor properties.</p>
<table>
  <tr><th>TypeScript</th><th>Kotlin</th></tr>
  <tr><td><code>interface Point { x: number; y: number }</code></td><td><code>data class Point(val x: Int, val y: Int)</code></td></tr>
  <tr><td><code>a.x === b.x && a.y === b.y</code></td><td><code>a == b</code></td></tr>
  <tr><td><code>{ ...p, y: 9 }</code></td><td><code>p.copy(y = 9)</code></td></tr>
  <tr><td><code>const { x, y } = p;</code></td><td><code>val (x, y) = p</code></td></tr>
</table>
<p>Because <code>==</code> on a data class calls the generated structural
<code>equals()</code> (Kotlin's <code>==</code> is never reference identity —
that's <code>===</code>), two independently-built <code>Point(1, 2)</code> values
are equal. <code>copy()</code> is the immutable-update workhorse: it clones the
value, overriding only the named arguments you pass — the same spirit as an
object spread, but type-checked.</p>`,

  typescript: `interface Point { x: number; y: number }

function shift(p: Point, dx: number, dy: number): Point {
  return { ...p, x: p.x + dx, y: p.y + dy };
}

const a: Point = { x: 1, y: 2 };
const b = { ...a, y: 2 };
console.log(a.x === b.x && a.y === b.y); // true
const { x, y } = a;`,

  task: `
<p>Model a 2D point and a user as data classes. Everything is top-level — no

<ol>
  <li>Make <code>Point</code> a <strong>data class</strong> with
      <code>val x: Int</code> and <code>val y: Int</code>.</li>
  <li>Make <code>User</code> a <strong>data class</strong> with
      <code>val name: String</code>, <code>val age: Int</code>, and
      <code>val active: Boolean = true</code> (a default so it can be built with

  <li>Write <code>shift(p: Point, dx: Int, dy: Int): Point</code> that returns a

</ol>`,

  requirements: [
    { pattern: /\bdata\s+class\s+Point\b/, message: "Define Point as a data class" },
    { pattern: /\bdata\s+class\s+User\b/, message: "Define User as a data class" },
    { pattern: /\.copy\s*\(/, message: "Use copy() to build the shifted point" },

  ],

  tests: [
    { name: "structural equality: Point(1, 2) == Point(1, 2)", code: "        expect_true(Point(1, 2) == Point(1, 2))" },
    { name: "distinct points are not equal", code: "        expect_true(Point(1, 2) != Point(3, 4))" },
    { name: "generated toString", code: "        expect_eq(Point(1, 2).toString(), \"Point(x=1, y=2)\")" },
    { name: "shift returns a copy moved by (dx, dy)", code: "        expect_eq(shift(Point(1, 2), 3, 4), Point(4, 6))" },
    { name: "shift leaves the original untouched", code: "        val p = Point(1, 2)\n        shift(p, 5, 5)\n        expect_eq(p, Point(1, 2))" },
    { name: "sumCoords destructures the point", code: "        expect_eq(sumCoords(Point(3, 4)), 7)" },
    { name: "sumCoords on another point", code: "        expect_eq(sumCoords(Point(5, 6)), 11)" },
    { name: "named-argument construction with default", code: "        expect_eq(User(name = \"Ada\", age = 36), User(\"Ada\", 36, true))" },
    { name: "active defaults to true", code: "        expect_true(User(\"Ada\", 36).active)" },

  solution: `data class Point(val x: Int, val y: Int)

data class User(val name: String, val age: Int, val active: Boolean = true)

fun shift(p: Point, dx: Int, dy: Int): Point {
    return p.copy(x = p.x + dx, y = p.y + dy)
}

fun sumCoords(p: Point): Int {
    val (x, y) = p
    return x + y
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Kotlin</th></tr>
  <tr><td>Value bundle</td><td><code>interface P { x: number }</code></td><td><code>data class P(val x: Int)</code></td></tr>
  <tr><td>Value equality</td><td>compare each field</td><td><code>a == b</code> (generated)</td></tr>
  <tr><td>Reference identity</td><td><code>a === b</code></td><td><code>a === b</code></td></tr>
  <tr><td>Immutable update</td><td><code>{ ...p, y: 9 }</code></td><td><code>p.copy(y = 9)</code></td></tr>
  <tr><td>Destructure</td><td><code>const { x, y } = p</code></td><td><code>val (x, y) = p</code></td></tr>
  <tr><td>Debug string</td><td><code>JSON.stringify(p)</code></td><td><code>p.toString()</code></td></tr>
</table>
<p>Two things to keep in mind. First, destructuring is
<strong>positional</strong>, not by name: <code>val (x, y) = p</code> calls
<code>p.component1()</code> and <code>p.component2()</code>, so the order of the
constructor properties is what matters — unlike TypeScript's name-based
<code>const { y, x } = p</code>. Second, only properties declared in the
<em>primary constructor</em> feed the generated <code>equals</code>,
<code>hashCode</code>, <code>toString</code>, and <code>copy</code>; anything you
add in the class body is ignored by them. Reach for a data class whenever you
would have used a bag-of-fields object, and reach for named arguments plus
defaults instead of the overloaded constructors or optional-property objects you
might write in TypeScript.</p>`,
