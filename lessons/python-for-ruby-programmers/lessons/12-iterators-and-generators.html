  title: "Iterators & Generators",

  intro: `
<p>In Ruby, iteration is usually <em>internal</em> — <code>each</code> takes a
block and calls it once per element, with no explicit "get an iterator, call
next" step in everyday code. But Ruby does have an external iterator hiding
underneath: calling <code>obj.each</code> with no block returns an
<code>Enumerator</code>, and that Enumerator's <code>.next</code> method raises
<code>StopIteration</code> once nothing is left — the very same exception name
Python uses! Python has the exact same idea with plainer entry points —
<code>for</code> calls <code>iter(obj)</code> to get an iterator, then calls
<code>next(it)</code> until it raises <code>StopIteration</code>.</p>
<table>
  <tr><th>Ruby</th><th>Python</th></tr>
  <tr><td><code>obj.each</code> (no block)</td><td><code>iter(obj)</code></td></tr>
  <tr><td><code>it.next</code></td><td><code>next(it)</code></td></tr>
  <tr><td>raises <code>StopIteration</code></td><td>raises <code>StopIteration</code></td></tr>
  <tr><td><code>Enumerator.new { |y| y << x }</code></td><td><code>def gen():\\n    yield x</code></td></tr>
  <tr><td><code>gen.to_a</code></td><td><code>list(gen())</code></td></tr>
  <tr><td><code>xs.lazy.map { |x| f(x) }</code></td><td><code>(f(x) for x in xs)</code> (lazy)</td></tr>
</table>
<p>Just like Ruby's <code>Enumerator.new</code> block (which hands you a
<em>yielder</em> object, conventionally named <code>y</code>), a Python
function that contains <code>yield</code> becomes a <em>generator
function</em>: calling it doesn't run the body, it returns a lazy generator
object. Each <code>next()</code> runs the body up to the next <code>yield</code>
and pauses there. Python also has <em>generator expressions</em> —
<code>(expr for x in xs)</code>, the lazy cousin of a list comprehension —
which produce values on demand instead of building a whole list up front, much
like chaining <code>.lazy</code> onto a Ruby Enumerable. And any class becomes
iterable by defining <code>__iter__</code>, the equivalent of Ruby defining
<code>each</code> (typically alongside <code>include Enumerable</code>).</p>`,

  ruby: `def take(enum, n)
  Enumerator.new do |y|
    i = 0
    enum.each do |x|
      break if i >= n
      y << x
      i += 1
    end
  end
end

def fib
  Enumerator.new do |y|
    a, b = 0, 1
    loop do
      y << a
      a, b = b, a + b
    end
  end
end

first5 = take(fib, 5).to_a # [0, 1, 1, 2, 3]`,

  task: `
<p>Build a set of lazy tools plus one custom iterable:</p>

  <li>Write a generator <code>fib()</code> that yields the Fibonacci sequence

  <li>Write <code>squares(iterable)</code> that returns a <em>generator

  <li>Write a class <code>CountDown(n)</code> whose <code>__iter__</code> makes it

</ol>`,

  tests: [
    { name: "count_up(1, 5) -> [1, 2, 3, 4]", code: "    expect_eq(list(count_up(1, 5)), [1, 2, 3, 4])" },
    { name: "count_up is lazy (a generator)", code: "    it = count_up(0, 3)\n    expect_eq(next(it), 0)\n    expect_eq(next(it), 1)" },
    { name: "take(count_up(0, 100), 3) -> [0, 1, 2]", code: "    expect_eq(list(take(count_up(0, 100), 3)), [0, 1, 2])" },
    { name: "take works on an infinite generator", code: "    expect_eq(list(take(fib(), 6)), [0, 1, 1, 2, 3, 5])" },
    { name: "fib() first eight", code: "    expect_eq(list(take(fib(), 8)), [0, 1, 1, 2, 3, 5, 8, 13])" },
    { name: "squares yields lazily", code: "    g = squares([1, 2, 3, 4])\n    expect_eq(next(g), 1)\n    expect_eq(list(g), [4, 9, 16])" },
    { name: "CountDown(4) is iterable", code: "    expect_eq(list(CountDown(4)), [4, 3, 2, 1])\n    expect_eq([x * 2 for x in CountDown(3)], [6, 4, 2])" },

  solution: `def count_up(start, stop):
    n = start
    while n < stop:
        yield n
        n += 1


def take(iterable, n):
    it = iter(iterable)
    for _ in range(n):
        try:
            yield next(it)
        except StopIteration:
            return


def fib():
    a, b = 0, 1
    while True:
        yield a
        a, b = b, a + b


def squares(iterable):
    return (x * x for x in iterable)


class CountDown:
    def __init__(self, n):
        self.n = n

    def __iter__(self):
        n = self.n
        while n > 0:
            yield n
            n -= 1
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Python</th></tr>
  <tr><td>Get an iterator</td><td><code>obj.each</code> (no block)</td><td><code>iter(obj)</code></td></tr>
  <tr><td>Pull next value</td><td><code>it.next</code></td><td><code>next(it)</code></td></tr>
  <tr><td>Signal "done"</td><td>raises <code>StopIteration</code></td><td>raise <code>StopIteration</code> (or just <code>return</code> in a generator)</td></tr>
  <tr><td>Generator function</td><td><code>Enumerator.new { |y| … }</code></td><td><code>def g():</code> with <code>yield</code></td></tr>
  <tr><td>Materialize</td><td><code>g.to_a</code></td><td><code>list(g())</code></td></tr>
  <tr><td>Lazy comprehension</td><td><code>xs.lazy.map { |x| f(x) }</code></td><td><code>(f(x) for x in xs)</code></td></tr>
  <tr><td>Make a class iterable</td><td><code>def each; …; end</code> (+ <code>include Enumerable</code>)</td><td><code>def __iter__(self):</code></td></tr>
</table>
<p>A generator function can <code>return</code> early to stop the sequence — that
becomes the <code>StopIteration</code> the <code>for</code> loop watches for, so
you rarely raise it by hand. The big win, exactly as with Ruby's
<code>Enumerator.new</code> generators, is laziness: <code>fib()</code> describes
an infinite sequence, and <code>take(fib(), 6)</code> only ever computes six
values. A <em>generator expression</em> <code>(x*x for x in xs)</code> looks
like a list comprehension with parentheses, but it yields one value at a time
instead of building the whole list — ideal for piping into <code>sum()</code>,
<code>any()</code>, or <code>take()</code>, much like chaining <code>.lazy</code>
onto a Ruby Enumerable before calling <code>.first(n)</code>. Note that a
generator is single-use: once exhausted, iterating it again yields nothing —
the same is true of a Ruby <code>Enumerator</code> built from a block, though
calling the method that builds it again hands you a brand new one. That is why
<code>__iter__</code> here is itself a generator — each call to
<code>iter(CountDown(4))</code> starts a fresh countdown, so the object can be
looped over more than once, just as Ruby's <code>each</code> re-runs its block
from scratch every time it's invoked.</p>`,
