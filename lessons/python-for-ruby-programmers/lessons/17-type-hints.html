<script>
const LESSON = {
  number: 17,
  title: "Type Hints",

  intro: `
<p>Coming from Ruby, you are used to a language with no built-in type syntax
at all — you might annotate intent informally with a YARD comment like
<code># @param name [String]</code>, or reach for a gem like Sorbet or an
external RBS file, but nothing about types lives in the method definition
itself. Python type hints will look like a new tool, then: syntax built into
the language for declaring parameter and return types. But the crucial catch
is that they are enforced no more strictly than your YARD comments were —
Hints are annotations read by editors, linters, and tools like
<code>mypy</code>; at runtime the code runs exactly as it would without them.
A hint that lies does not raise — it just runs.</p>
<table>
  <tr><th>Ruby</th><th>Python</th></tr>
  <tr><td><code># @param name [String]</code> (YARD, a comment)</td><td><code>name: str</code></td></tr>
  <tr><td><code># @return [Integer]</code> (YARD, a comment)</td><td><code>def f() -&gt; int:</code></td></tr>
  <tr><td>no built-in nilable syntax — a method just may return <code>nil</code></td><td><code>x: int | None</code></td></tr>
  <tr><td><code>T.nilable(String)</code> (Sorbet, a gem)</td><td><code>Optional[T]</code></td></tr>
  <tr><td><code>Array</code> (no element type)</td><td><code>list[int]</code></td></tr>
  <tr><td><code>Hash</code> (no key/value types)</td><td><code>dict[str, int]</code></td></tr>
</table>
<p>Annotate a parameter with <code>name: type</code> and a return with
<code>-&gt; type</code> after the parameter list. Collections use the built-in
generics <code>list[int]</code> and <code>dict[str, int]</code> (lowercase, since
Python 3.9) — Ruby's core <code>Array</code> and <code>Hash</code> have no
notion of an element type at all, so this is more precise than anything you
can express inline in plain Ruby. For "maybe missing" values, modern Python
writes <code>int | None</code>; Ruby has no built-in syntax for this either —
you would just document that a method "returns <code>nil</code>", or reach
for something like Sorbet's <code>T.nilable(Integer)</code>. The older
<code>Optional[int]</code> from the <code>typing</code> module means the
exact same thing as <code>int | None</code>. Because none of this is
enforced, your <em>behavior</em> is what matters — the tests below call your
functions and check results, not annotations.</p>`,

  ruby: `def greet(name)
  "Hello, #{name}"
end

def total(prices)
  prices.reduce(0) { |a, b| a + b }
end

def find_user(id)
  id == 1 ? "Ada" : nil
end`,

  task: `
<p>Write typed Python versions of each function. Annotate every parameter and
return type — remember the hints do not change behavior, so the tests only
check what the functions return.</p>
<ol>
  <li><code>greet(name: str) -&gt; str</code> returns <code>"Hello, &lt;name&gt;"</code>.</li>
  <li><code>total(prices: list[int]) -&gt; int</code> returns the sum of the list.</li>
  <li><code>find_user(id: int) -&gt; str | None</code> returns <code>"Ada"</code> when
      <code>id</code> is <code>1</code>, otherwise <code>None</code>.</li>
  <li><code>counts(words: list[str]) -&gt; dict[str, int]</code> returns a dict
      mapping each word to how many times it appears.</li>
</ol>`,

  starter: `# 1. greet(name: str) -> str
def greet(name):
    return ""  # TODO


# 2. total(prices: list[int]) -> int
def total(prices):
    return 0  # TODO


# 3. find_user(id: int) -> str | None
def find_user(id):
    return None  # TODO


# 4. counts(words: list[str]) -> dict[str, int]
def counts(words):
    return {}  # TODO
`,

  requirements: [
    { pattern: /def\s+greet\s*\(\s*name\s*:\s*str\s*\)\s*->\s*str/, message: "Annotate greet's parameter and return type (name: str) -> str" },
    { pattern: /def\s+find_user\s*\([^)]*\)\s*->\s*(str\s*\|\s*None|Optional\s*\[\s*str\s*\])/, message: "find_user should return str | None (or Optional[str])" },
    { pattern: /->\s*dict\s*\[\s*str\s*,\s*int\s*\]/, message: "Annotate counts' return as dict[str, int]" },
  ],

  tests: [
    { name: 'greet("Ada") is "Hello, Ada"', code: "    expect_eq(greet(\"Ada\"), \"Hello, Ada\")" },
    { name: "total([1, 2, 3]) is 6", code: "    expect_eq(total([1, 2, 3]), 6)" },
    { name: "total([]) is 0", code: "    expect_eq(total([]), 0)" },
    { name: 'find_user(1) is "Ada"', code: "    expect_eq(find_user(1), \"Ada\")" },
    { name: "find_user(2) is None", code: "    expect_true(find_user(2) is None)" },
    { name: "counts groups repeated words", code: "    expect_eq(counts([\"a\", \"b\", \"a\"]), {\"a\": 2, \"b\": 1})" },
    { name: "counts([]) is an empty dict", code: "    expect_eq(counts([]), {})" },
  ],

  solution: `def greet(name: str) -> str:
    return f"Hello, {name}"


def total(prices: list[int]) -> int:
    return sum(prices)


def find_user(id: int) -> str | None:
    return "Ada" if id == 1 else None


def counts(words: list[str]) -> dict[str, int]:
    result: dict[str, int] = {}
    for word in words:
        result[word] = result.get(word, 0) + 1
    return result
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Python</th></tr>
  <tr><td>Param annotation</td><td><code># @param name [String]</code> (comment)</td><td><code>(name: str)</code></td></tr>
  <tr><td>Return annotation</td><td><code># @return [Integer]</code> (comment)</td><td><code>) -&gt; int:</code></td></tr>
  <tr><td>Array / List</td><td><code>Array</code> (no element type)</td><td><code>list[int]</code></td></tr>
  <tr><td>Map / Dict</td><td><code>Hash</code> (no key/value types)</td><td><code>dict[str, int]</code></td></tr>
  <tr><td>Nullable</td><td><code>nil</code> is just a possible value; <code>T.nilable(T)</code> with Sorbet</td><td><code>T | None</code> or <code>Optional[T]</code></td></tr>
  <tr><td>Enforcement</td><td>none, ever, without an external gem</td><td>none at runtime (tools only)</td></tr>
</table>
<p>The biggest mental shift: a wrong hint is not an error. <code>greet(42)</code>
runs fine — <code>f"Hello, {42}"</code> is <code>"Hello, 42"</code> — even though
you annotated <code>name: str</code>. To actually catch mismatches you run a
static checker such as <code>mypy</code> or <code>pyright</code> as a separate
step, the same way you would run <code>srb tc</code> if you had opted into
Sorbet's gradual typing in a Ruby project. Also note the lowercase
built-in generics <code>list[int]</code> / <code>dict[str, int]</code> replaced
the old capital-L <code>List</code>/<code>Dict</code> from <code>typing</code>;
and <code>Optional[int]</code> is exactly <code>int | None</code>, not
"optional" in the sense of a default value — it just permits <code>None</code>,
much like a Ruby method that is documented to sometimes return <code>nil</code>.</p>`,
};
