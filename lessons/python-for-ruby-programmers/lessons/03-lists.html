  intro: `
<p>Python's <code>list</code> is the everyday sequence — the counterpart to a
Ruby <code>Array</code>. It is ordered, mutable, and freely mixes types (though
you will usually keep one kind of thing in it). Coming from Ruby, negative
indexing and slicing will already feel familiar — Ruby has both too. What is
different is the slice <em>syntax</em> itself, the name for "add one item," and
the fact that Python has no built-in <code>.map</code>/<code>.select</code> —
you reach for a <em>comprehension</em> instead.</p>
<table>
  <tr><th>Ruby</th><th>Python</th></tr>
  <tr><td><code>xs = [1, 2, 3]</code></td><td><code>xs = [1, 2, 3]</code></td></tr>
  <tr><td><code>xs.length</code></td><td><code>len(xs)</code></td></tr>
  <tr><td><code>xs[-1]</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td><code>xs.push(4)</code> / <code>xs &lt;&lt; 4</code></td><td><code>xs.append(4)</code></td></tr>
  <tr><td><code>xs[1, 2]</code> or <code>xs[1..2]</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td><code>xs.include?(2)</code></td><td><code>2 in xs</code></td></tr>
</table>
<p>Indexing from the end is built in on both sides: <code>xs[-1]</code> is the
last element, <code>xs[-2]</code> the second-to-last, in Ruby and Python alike.
Slicing is where the syntax diverges. Ruby's <code>xs[1, 2]</code> takes a start
and a <em>length</em>, and <code>xs[1..2]</code> takes an inclusive range;
Python's <code>xs[a:b]</code> takes a start and an <em>exclusive</em> end —
elements from index <code>a</code> up to but not including <code>b</code>.
Either bound may be omitted (<code>xs[:2]</code>, <code>xs[2:]</code>), and a
third value is a step (<code>xs[::-1]</code> reverses, no <code>.reverse</code>
call needed). Membership is the <code>in</code> operator, and the length is the
free function <code>len(xs)</code> rather than a method call.</p>
<p>Sorting has a twist for Ruby programmers: Python's naming is the
<em>opposite</em> of Ruby's bang convention. <code>sorted(xs)</code> — no bang,
no trailing punctuation — returns a new sorted list and leaves <code>xs</code>
alone, the same as Ruby's <code>xs.sort</code>. But <code>xs.sort()</code>
reorders <code>xs</code> in place and returns <code>None</code>, the same as
Ruby's <code>xs.sort!</code>. And when you want to transform a list into
another list, reach for a <em>comprehension</em> — <code>[n * 2 for n in xs]</code>
— the Pythonic replacement for <code>xs.map { |n| n * 2 }</code>.</p>`,

  ruby: `nums = [3, 1, 2]

first_two = nums[0, 2]
doubled = nums.map { |n| n * 2 }

has_three = nums.include?(3)`,

  solution: `def make_range(n):
    return [i for i in range(n)]


def last(xs):
    return xs[-1]


def middle(xs):
    return xs[1:-1]


def with_added(xs, value):
    return xs + [value]


def doubled(xs):
    return [n * 2 for n in xs]


def sorted_desc(xs):
    return sorted(xs, reverse=True)


def contains(xs, value):
    return value in xs
`,

  notes: `
<table>
  <tr><th>Operation</th><th>Ruby</th><th>Python</th></tr>
  <tr><td>Length</td><td><code>xs.length</code></td><td><code>len(xs)</code></td></tr>
  <tr><td>Last element</td><td><code>xs.last</code> / <code>xs[-1]</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td>Slice</td><td><code>xs[1, 2]</code> / <code>xs[1..2]</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td>Reverse copy</td><td><code>xs.reverse</code></td><td><code>xs[::-1]</code></td></tr>
  <tr><td>Append</td><td><code>xs.push(v)</code> / <code>xs &lt;&lt; v</code></td><td><code>xs.append(v)</code></td></tr>
  <tr><td>Concat many</td><td><code>xs.concat(ys)</code></td><td><code>xs.extend(ys)</code></td></tr>
  <tr><td>Insert at i</td><td><code>xs.insert(i, v)</code></td><td><code>xs.insert(i, v)</code></td></tr>
  <tr><td>Remove &amp; return</td><td><code>xs.pop</code></td><td><code>xs.pop()</code> / <code>xs.pop(i)</code></td></tr>
  <tr><td>Map</td><td><code>xs.map { |x| f(x) }</code></td><td><code>[f(x) for x in xs]</code></td></tr>
  <tr><td>Sort (copy)</td><td><code>xs.sort</code></td><td><code>sorted(xs)</code></td></tr>
  <tr><td>Sort (in place)</td><td><code>xs.sort!</code></td><td><code>xs.sort()</code></td></tr>
  <tr><td>Contains</td><td><code>xs.include?(v)</code></td><td><code>v in xs</code></td></tr>
</table>
<p>The key mental split is <strong>copy vs. mutate</strong>, and it maps onto
Ruby's bang convention with the names swapped. <code>sorted(xs)</code>, a
slice, and a comprehension all build a <em>new</em> list — like Ruby's
non-bang <code>xs.sort</code>. But <code>xs.sort()</code>,
<code>xs.append(v)</code>, <code>xs.insert(i, v)</code>, and <code>xs.pop()</code>
change <code>xs</code> in place — like Ruby's <code>xs.sort!</code>. Python's
in-place methods return <code>None</code>, so <code>ys = xs.sort()</code> is a
classic beginner bug — it binds <code>ys</code> to <code>None</code>, the same
trap as forgetting that <code>xs.sort!</code> returns the mutated array (or
<code>nil</code> if it decides nothing changed) rather than a fresh one. Also
note <code>xs + [value]</code> makes a fresh list, while
<code>xs.append(value)</code> does not, which is why <code>with_added</code>
above uses <code>+</code> to avoid mutating its argument — the same discipline
as choosing <code>xs + [value]</code> over <code>xs &lt;&lt; value</code> in
Ruby when you don't want to touch the caller's array.</p>
<p>List comprehensions read left-to-right as "collect <em>expression</em> for
each <em>item</em>," and can filter with a trailing <code>if</code>:
<code>[n for n in xs if n &gt; 0]</code>. They are the first Pythonic idiom
worth building a reflex for — most <code>.map</code>/<code>.select</code>
chains you would write in Ruby become a single comprehension here.</p>`,
