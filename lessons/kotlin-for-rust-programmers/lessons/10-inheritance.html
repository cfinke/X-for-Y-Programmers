const LESSON = {
  number: 10,
  title: "Inheritance",

  intro: `
<p>Inheritance in Kotlin has no direct analog in Rust: Rust doesn't have
classes at all, and a <code>struct</code> can never extend another
<code>struct</code>. What Rust has instead is <strong>traits</strong> — closer
to Kotlin interfaces than to a base class — plus, when you actually want to
reuse an implementation, either a trait's <strong>default method</strong> or
plain <strong>composition</strong> (a struct that stores another struct as a
field). Kotlin's own default is closer in spirit to Rust than you might expect:
Kotlin classes (and their methods) are <strong>final by default</strong>, and
only become extendable once you mark them <code>open</code> — Rust just takes
that idea to its limit and never lets you extend a concrete type at all.</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>struct Dog { .. }</code> + <code>impl Animal for Dog { .. }</code></td><td><code>class Dog : Animal() {}</code></td></tr>
  <tr><td><code>trait Animal { .. }</code></td><td><code>abstract class Animal {}</code></td></tr>
  <tr><td><code>fn sound(&self) -> String;</code></td><td><code>abstract fun sound(): String</code></td></tr>
  <tr><td><code>fn sound(&self) -> String { .. }</code> (impl)</td><td><code>override fun sound() { ... }</code></td></tr>
  <tr><td>no <code>super</code> — recompute, or delegate to a stored field</td><td><code>super.describe()</code></td></tr>
</table>
<p>Where Kotlin threads a constructor argument up to its supertype with
<code>: Animal(name)</code>, Rust just stores the shared data directly —
in a field, or in an embedded struct — with no automatic call to anything
"above" it. And where Kotlin's <code>abstract</code> class can't be
instantiated and may declare members with no body, Rust's closest match is a
trait method with no default body (<code>fn sound(&self) -> String;</code>):
nothing can use the trait until some concrete type supplies an
implementation.</p>`,

  rust: `trait Animal {
    fn name(&self) -> &str;
    fn sound(&self) -> String;

    // A default method is the closest Rust gets to a base-class implementation.
    fn describe(&self) -> String {
        format!("{} says {}", self.name(), self.sound())
    }
}

struct Dog {
    name: String,
}

impl Animal for Dog {
    fn name(&self) -> &str { &self.name }
    fn sound(&self) -> String { "Woof".to_string() }
}

// No inheritance, so "Puppy extends Dog" becomes composition instead: Puppy
// holds a Dog and implements Animal on its own terms.
struct Puppy {
    dog: Dog,
}

impl Animal for Puppy {
    fn name(&self) -> &str { self.dog.name() }
    fn sound(&self) -> String { "Yip".to_string() }
    // There's no super.describe() to call, so we just recompute using self,
    // which still picks up Puppy's own sound().
    fn describe(&self) -> String {
        format!("Baby {} says {}", self.name(), self.sound())
    }
}`,

  task: `
<p>The <code>Animal</code> base class is provided for you: it takes a
<code>name</code>, declares an <code>abstract fun sound()</code>, and has an
<code>open fun describe()</code>. Build the two subclasses:</p>
<ol>
  <li>Make <code>Dog</code> an <code>open class</code> extending
      <code>Animal(name)</code> (so it passes <code>name</code> to the base
      constructor) and <code>override</code> <code>sound()</code> to return
      <code>"Woof"</code>.</li>
  <li>Make <code>Puppy</code> extend <code>Dog(name)</code>,
      <code>override sound()</code> to return <code>"Yip"</code>, and
      <code>override describe()</code> to return
      <code>"Baby "</code> prepended to <code>super.describe()</code>.</li>
</ol>
<p>Because <code>describe()</code> calls <code>sound()</code>, dynamic dispatch
means a <code>Puppy</code>'s <code>describe()</code> uses the <code>Puppy</code>
sound even when invoked through <code>super</code>.</p>`,

  starter: `abstract class Animal(val name: String) {
    // Subclasses must implement this (no body allowed on an abstract member).
    abstract fun sound(): String

    // 'open' lets subclasses override this; the default just uses sound().
    open fun describe(): String = "$name says \${sound()}"
}

// 1. Dog: an open class so Puppy can extend it. Pass name to Animal(name).
open class Dog(name: String) : Animal(name) {
    override fun sound(): String = "" // TODO: return "Woof"
}

// 2. Puppy: extend Dog(name); override sound() and describe().
class Puppy(name: String) : Dog(name) {
    // TODO: override sound() to return "Yip"
    // TODO: override describe() to return "Baby " + super.describe()
}
`,

  requirements: [
    { pattern: /\bopen\s+class\s+Dog\b/, message: "Declare Dog as an open class so Puppy can extend it" },
    { pattern: /\boverride\s+fun\s+sound\b/, message: "Override sound() in the subclasses" },
    { pattern: /super\.describe\s*\(\s*\)/, message: "Call the base implementation with super.describe()" },
  ],

  tests: [
    { name: 'Dog("Rex").sound() is "Woof"', code: "        expect_eq(Dog(\"Rex\").sound(), \"Woof\")" },
    { name: 'Dog("Rex").describe() is "Rex says Woof"', code: "        expect_eq(Dog(\"Rex\").describe(), \"Rex says Woof\")" },
    { name: 'Puppy("Fido").sound() is "Yip"', code: "        expect_eq(Puppy(\"Fido\").sound(), \"Yip\")" },
    { name: 'Puppy("Fido").describe() is "Baby Fido says Yip"', code: "        expect_eq(Puppy(\"Fido\").describe(), \"Baby Fido says Yip\")" },
    { name: "base-constructor name is inherited", code: "        expect_eq(Puppy(\"Fido\").name, \"Fido\")" },
    { name: "a Puppy is-an Animal", code: "        expect_true(Puppy(\"Fido\") is Animal)" },
  ],

  solution: `abstract class Animal(val name: String) {
    abstract fun sound(): String

    open fun describe(): String = "$name says \${sound()}"
}

open class Dog(name: String) : Animal(name) {
    override fun sound(): String = "Woof"
}

class Puppy(name: String) : Dog(name) {
    override fun sound(): String = "Yip"
    override fun describe(): String = "Baby " + super.describe()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Subclassable</td><td>never — structs can't be extended</td><td><code>open class</code> (opt in)</td></tr>
  <tr><td>Overridable method</td><td>N/A — traits are implemented, not overridden</td><td><code>open fun</code> (opt in)</td></tr>
  <tr><td>Override keyword</td><td>none needed — each <code>impl</code> block is independent</td><td><code>override</code> (required)</td></tr>
  <tr><td>Abstract member</td><td><code>fn sound(&self) -> String;</code> (trait method, no body)</td><td><code>abstract fun sound(): String</code></td></tr>
  <tr><td>Base constructor</td><td>no equivalent — initialize a field or embedded struct directly</td><td><code>: Animal(name)</code> in header</td></tr>
</table>
<p>The open/final spectrum isn't really a spectrum in Rust the way it is in
Kotlin — Rust simply has no notion of extending a concrete type, so the
question "can this be subclassed?" never comes up. Composition (a struct that
stores another struct) and traits with default methods cover the same ground
that Kotlin covers with open classes and overridable methods, but they compose
<em>explicitly</em> rather than implicitly: nothing about a <code>Puppy</code>
struct's shape or behavior is inherited from <code>Dog</code>, so any sharing
has to be spelled out by hand, field by field and method by method. The
underlying instinct is still the same one Kotlin encodes with
<code>final</code>-by-default, though: don't let arbitrary code hook into your
type's internals unless you deliberately designed it to allow that. Where
Kotlin's tool for going further — stopping an inherited method from being
overridden again — is marking the override <code>final</code>, Rust's nearest
equivalent is the <strong>sealed trait</strong> pattern: adding a private
supertrait so that no type outside your crate can implement your trait at
all.</p>`,
};
