  intro: `
<p>Rust has one growable sequence type, <code>Vec&lt;T&gt;</code>, and you get
read-only access by borrowing it as <code>&Vec&lt;T&gt;</code> or
<code>&[T]</code> rather than through a different type. Kotlin instead splits
the idea into <em>two distinct types</em>: <code>List&lt;T&gt;</code> has no
mutating methods at all, while <code>MutableList&lt;T&gt;</code> adds
<code>add</code>/<code>remove</code>. You choose the capability by choosing the
builder: <code>listOf(...)</code> gives a read-only <code>List</code>, and
<code>mutableListOf(...)</code> gives a <code>MutableList</code>.</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>let xs = vec![1, 2, 3];</code></td><td><code>val xs = listOf(1, 2, 3)</code></td></tr>
  <tr><td><code>let mut ys: Vec&lt;i32&gt; = Vec::new();</code></td><td><code>val ys = mutableListOf&lt;Int&gt;()</code></td></tr>
  <tr><td><code>ys.push(4);</code></td><td><code>ys.add(4)</code></td></tr>
  <tr><td><code>xs[0]</code>, <code>xs.len()</code></td><td><code>xs[0]</code>, <code>xs.size</code></td></tr>
  <tr><td><code>xs.contains(&2)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td><code>xs.iter().map(|x| x * 2)</code></td><td><code>xs.map { it * 2 }</code></td></tr>
</table>
<p>Notice indexing (<code>xs[0]</code>) is identical, but <code>.len()</code>
becomes <code>.size</code> (a property, not a method call), membership uses the
<code>in</code> operator instead of <code>.contains(&2)</code>, and lambdas drop
the parameter list when there is a single argument — you refer to it as
<code>it</code> rather than naming it in <code>|x| ...</code>. <code>first()</code>
and <code>last()</code> return the ends of a list, much like Rust's
<code>.first()</code> and <code>.last()</code> (though those return
<code>Option&lt;&T&gt;</code> in Rust, while Kotlin's throw if the list is
empty). Crucially, calling <code>.add()</code> on a plain <code>List</code> is a
<em>compile error</em>, not a borrow-checker violation — the type itself, not
mutability tracking, enforces read-only.</p>`,

  rust: `let first_three: Vec<i32> = vec![1, 2, 3];

let mut nums: Vec<i32> = Vec::new();
nums.push(1);
nums.push(2);

fn doubled(list: &[i32]) -> Vec<i32> {
    list.iter().map(|x| x * 2).collect()
}

fn evens(list: &[i32]) -> Vec<i32> {
    list.iter().filter(|x| *x % 2 == 0).copied().collect()
}`,

  solution: `fun firstThree(): List<Int> {
    return listOf(1, 2, 3)
}

fun collect(n: Int): MutableList<Int> {
    val result = mutableListOf<Int>()
    for (i in 1..n) {
        result.add(i)
    }
    return result
}

fun at(list: List<Int>, i: Int): Int {
    return list[i]
}

fun count(list: List<Int>): Int {
    return list.size
}

fun has(list: List<Int>, x: Int): Boolean {
    return x in list
}

fun ends(list: List<Int>): List<Int> {
    return listOf(list.first(), list.last())
}

fun doubled(list: List<Int>): List<Int> {
    return list.map { it * 2 }
}

fun evens(list: List<Int>): List<Int> {
    return list.filter { it % 2 == 0 }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Read-only list</td><td><code>&[i32]</code></td><td><code>List&lt;Int&gt;</code></td></tr>
  <tr><td>Mutable list</td><td><code>Vec&lt;i32&gt;</code></td><td><code>MutableList&lt;Int&gt;</code></td></tr>
  <tr><td>Build</td><td><code>vec![1, 2, 3]</code></td><td><code>listOf(1, 2, 3)</code></td></tr>
  <tr><td>Append</td><td><code>xs.push(4);</code></td><td><code>xs.add(4)</code></td></tr>
  <tr><td>Remove value</td><td><code>xs.retain(|&v| v != 4);</code></td><td><code>xs.remove(4)</code></td></tr>
  <tr><td>Length</td><td><code>xs.len()</code></td><td><code>xs.size</code></td></tr>
  <tr><td>Membership</td><td><code>xs.contains(&2)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td>Ends</td><td><code>xs.first()</code> / <code>xs.last()</code></td><td><code>xs.first()</code> / <code>xs.last()</code></td></tr>
  <tr><td>Transform</td><td><code>xs.iter().map(|x| x * 2)</code></td><td><code>xs.map { it * 2 }</code></td></tr>
  <tr><td>Keep some</td><td><code>xs.iter().filter(|x| ...)</code></td><td><code>xs.filter { ... }</code></td></tr>
</table>
<p>A <code>MutableList</code> <em>is a</em> <code>List</code>, so you can pass one
anywhere a read-only <code>List</code> is expected — the receiver just cannot
mutate it, much like passing a <code>Vec&lt;i32&gt;</code> where <code>&[i32]</code>
is expected via deref coercion. That is why <code>collect</code> returns a
<code>MutableList</code> yet compares equal to a <code>listOf(...)</code>:
equality is by contents, not by the specific runtime type — Kotlin's
<code>List</code>/<code>MutableList</code> split is a compile-time capability
distinction, not a different data layout the way <code>&[T]</code> and
<code>Vec&lt;T&gt;</code> are. Both <code>map</code> and <code>filter</code>
always return a <em>new</em> read-only <code>List</code> and never mutate the
source — you don't need Rust's <code>.iter()</code>/<code>.collect()</code>
dance, and there's no ownership to fight over since Kotlin uses garbage
collection. Reach for <code>listOf</code> by default and upgrade to
<code>mutableListOf</code> only when you genuinely need to grow or shrink the
collection in place.</p>`,
