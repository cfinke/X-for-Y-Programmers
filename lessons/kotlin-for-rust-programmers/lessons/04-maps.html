  title: "Maps",

  intro: `
<p>Kotlin splits the concept you know from Rust into two types by
mutability, rather than by variable binding. A <code>mapOf(...)</code> is a
<em>read-only</em> <code>Map</code> (no <code>put</code> in its interface),
while a <code>mutableMapOf(...)</code> is a <code>MutableMap</code> you can
add to. Both are backed by a <code>LinkedHashMap</code>, so insertion order
is preserved — unlike Rust's <code>HashMap</code>, though it matches a Rust
<code>BTreeMap</code> in spirit (there, order is by key rather than
insertion).</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>HashMap::from([("a", 1), ("b", 2)])</code></td><td><code>mapOf("a" to 1, "b" to 2)</code></td></tr>
  <tr><td><code>HashMap::&lt;String, i32&gt;::new()</code></td><td><code>mutableMapOf&lt;String, Int&gt;()</code></td></tr>
  <tr><td><code>m.get("a")</code> (returns <code>Option&lt;&amp;V&gt;</code>)</td><td><code>m["a"]</code> (returns <code>Int?</code>)</td></tr>
  <tr><td><code>m.get(k).unwrap_or(&amp;d)</code></td><td><code>m.getOrDefault(k, d)</code></td></tr>
  <tr><td><code>m.insert(k, v)</code></td><td><code>m[k] = v</code> (mutable only)</td></tr>
  <tr><td><code>m.contains_key(k)</code></td><td><code>m.containsKey(k)</code></td></tr>
</table>
<p>The good news is that indexing a map, <code>m[k]</code>, returns a
<em>nullable</em> <code>V?</code> — the type system forces you to handle a
missing key, exactly the way Rust's <code>Option&lt;&amp;V&gt;</code> from
<code>get</code> does. Reach for <code>getOrDefault</code> when you have a
sensible fallback, the same job Rust's <code>unwrap_or</code> does.</p>`,

let mut counts: HashMap<String, i32> = HashMap::new();
for w in &words {
    *counts.entry(w.clone()).or_insert(0) += 1;
}`,

  solution: `val capitals: Map<String, String> = mapOf(
    "France" to "Paris",
    "Japan" to "Tokyo",
    "Kenya" to "Nairobi",
)

fun isKnown(country: String): Boolean {
    return capitals.containsKey(country)
}

fun capitalOr(country: String, fallback: String): String {
    return capitals.getOrDefault(country, fallback)
}

fun wordCounts(words: List<String>): Map<String, Int> {
    val counts = mutableMapOf<String, Int>()
    for (w in words) {
        counts[w] = counts.getOrDefault(w, 0) + 1
    }
    return counts
}

fun entryLines(m: Map<String, Int>): List<String> {
    val lines = mutableListOf<String>()
    for ((k, v) in m.toSortedMap()) {
        lines.add("$k=$v")
    }
    return lines
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Read-only map</td><td><code>let m = ...</code> (binding, not type)</td><td><code>mapOf(...)</code> → <code>Map</code></td></tr>
  <tr><td>Mutable map</td><td><code>let mut m = HashMap::new()</code></td><td><code>mutableMapOf(...)</code> → <code>MutableMap</code></td></tr>
  <tr><td>Lookup</td><td><code>m.get(k)</code> → <code>Option&lt;&amp;V&gt;</code></td><td><code>m[k]</code> → <code>V?</code></td></tr>
  <tr><td>With default</td><td><code>m.get(k).unwrap_or(&amp;d)</code></td><td><code>m.getOrDefault(k, d)</code></td></tr>
  <tr><td>Insert / update</td><td><code>m.insert(k, v)</code></td><td><code>m[k] = v</code></td></tr>
  <tr><td>Views</td><td><code>m.keys()</code> / <code>m.values()</code></td><td><code>m.keys</code> / <code>m.values</code> / <code>m.entries</code></td></tr>
  <tr><td>Iterate pairs</td><td><code>for (k, v) in &amp;m</code></td><td><code>for ((k, v) in m)</code></td></tr>
</table>
<p>Note that <code>m[k] = v</code> is the idiomatic way to write
<code>insert</code>; it only compiles on a <code>MutableMap</code>, so the
read-only <code>Map</code> from <code>mapOf</code> won't let you accidentally
mutate it — Kotlin enforces at the type level what Rust enforces through
<code>let</code> vs. <code>let mut</code>. For counting and grouping, Kotlin
also ships higher-level helpers — <code>words.groupingBy { it }.eachCount()</code>
is the one-liner equivalent of the manual
<code>*counts.entry(w).or_insert(0) += 1</code> loop you'd write in Rust, and
<code>groupBy</code> collects items into <code>Map&lt;K, List&lt;V&gt;&gt;</code>.
Iterating a map yields <code>Map.Entry</code> objects, which destructure
straight into <code>(k, v)</code> — much like destructuring the
<code>(&amp;K, &amp;V)</code> tuple you get from iterating a Rust
<code>HashMap</code>.</p>`,
