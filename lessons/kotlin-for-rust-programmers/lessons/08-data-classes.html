  number: 8,
  title: "Data Classes",

  intro: `
<p>In Rust you reach for a <code>struct</code> when you just want to bundle a
few fields together — and you get structural equality, hashing, and a debug
representation for free only if you <code>#[derive(...)]</code> the right
traits. Kotlin's answer is the <strong>data class</strong>: prefix a class
with <code>data</code> and the compiler generates <code>equals()</code>,
<code>hashCode()</code>, <code>toString()</code>, a <code>copy()</code>, and
<code>componentN()</code> destructuring functions from the primary-constructor
properties.</p>
<table>
  <tr><th>Rust</th><th>Kotlin</th></tr>
  <tr><td><code>#[derive(PartialEq, Debug, Clone)]<br>struct Point { x: i32, y: i32 }</code></td><td><code>data class Point(val x: Int, val y: Int)</code></td></tr>
  <tr><td><code>a == b</code></td><td><code>a == b</code></td></tr>
  <tr><td><code>Point { y: 9, ..p }</code></td><td><code>p.copy(y = 9)</code></td></tr>
  <tr><td><code>let Point { x, y } = p;</code></td><td><code>val (x, y) = p</code></td></tr>
</table>
<p>Because <code>==</code> on a data class calls the generated structural
<code>equals()</code> (Kotlin's <code>==</code> is never reference identity —
that's <code>===</code>), two independently-built <code>Point(1, 2)</code> values
are equal, the same as deriving <code>PartialEq</code> in Rust.
<code>copy()</code> is the immutable-update workhorse: it clones the value,
overriding only the named arguments you pass — the same spirit as Rust's
functional update syntax (<code>Point { y: 9, ..p }</code>), but you don't
need <code>Clone</code> derived first.</p>`,

  rust: `#[derive(PartialEq, Debug, Clone, Copy)]
struct Point { x: i32, y: i32 }

fn shift(p: Point, dx: i32, dy: i32) -> Point {
    Point { x: p.x + dx, y: p.y + dy, ..p }
}

let a = Point { x: 1, y: 2 };
let b = Point { y: 2, ..a };
println!("{}", a.x == b.x && a.y == b.y); // true
let Point { x, y } = a;`,

</ol>`,

    { name: "distinct points are not equal", code: "        expect_true(Point(1, 2) != Point(3, 4))" },
    { name: "generated toString", code: "        expect_eq(Point(1, 2).toString(), \"Point(x=1, y=2)\")" },
    { name: "shift returns a copy moved by (dx, dy)", code: "        expect_eq(shift(Point(1, 2), 3, 4), Point(4, 6))" },
    { name: "shift leaves the original untouched", code: "        val p = Point(1, 2)\n        shift(p, 5, 5)\n        expect_eq(p, Point(1, 2))" },
    { name: "sumCoords destructures the point", code: "        expect_eq(sumCoords(Point(3, 4)), 7)" },
    { name: "sumCoords on another point", code: "        expect_eq(sumCoords(Point(5, 6)), 11)" },
    { name: "named-argument construction with default", code: "        expect_eq(User(name = \"Ada\", age = 36), User(\"Ada\", 36, true))" },

  solution: `data class Point(val x: Int, val y: Int)

data class User(val name: String, val age: Int, val active: Boolean = true)

fun shift(p: Point, dx: Int, dy: Int): Point {
    return p.copy(x = p.x + dx, y = p.y + dy)
}

fun sumCoords(p: Point): Int {
    val (x, y) = p
    return x + y
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Kotlin</th></tr>
  <tr><td>Value bundle</td><td><code>struct P { x: i32 }</code></td><td><code>data class P(val x: Int)</code></td></tr>
  <tr><td>Value equality</td><td><code>#[derive(PartialEq)]</code> then <code>a == b</code></td><td><code>a == b</code> (generated)</td></tr>
  <tr><td>Reference identity</td><td><code>std::ptr::eq(&a, &b)</code></td><td><code>a === b</code></td></tr>
  <tr><td>Immutable update</td><td><code>Point { y: 9, ..p }</code></td><td><code>p.copy(y = 9)</code></td></tr>
  <tr><td>Destructure</td><td><code>let Point { x, y } = p;</code></td><td><code>val (x, y) = p</code></td></tr>
  <tr><td>Debug string</td><td><code>#[derive(Debug)]</code> then <code>{:?}</code></td><td><code>p.toString()</code></td></tr>
</table>
<p>Two things to keep in mind. First, destructuring is
<strong>positional</strong>, not by name: <code>val (x, y) = p</code> calls
<code>p.component1()</code> and <code>p.component2()</code>, so the order of the
constructor properties is what matters — unlike Rust's name-based
<code>let Point { y, x } = p;</code>, where field names do the matching
regardless of order. Second, only properties declared in the <em>primary
constructor</em> feed the generated <code>equals</code>, <code>hashCode</code>,
<code>toString</code>, and <code>copy</code>; anything you add in the class
body is ignored by them. Reach for a data class whenever you would reach for a
<code>#[derive(PartialEq, Debug, Clone)] struct</code> in Rust — Kotlin bakes
those derives in by default instead of making you opt in field by field, and
you get named-argument construction with defaults for free, no builder pattern
or <code>Default</code> impl required.</p>`,
