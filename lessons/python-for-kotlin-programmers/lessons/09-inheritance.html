const LESSON = {
  number: 9,
  title: "Inheritance",

  intro: `
<p>Python classes inherit much the way Kotlin classes do, but the spellings
differ. A subclass names its parent in parentheses — <code>class Dog(Animal)</code>
— instead of with <code>: Animal()</code>. To reach the parent's constructor you
call <code>super().__init__(...)</code>; unlike Kotlin, Python does
<em>not</em> call it for you, so if you write <code>__init__</code> in the child
and forget the <code>super()</code> call, the parent's setup simply never runs.</p>
<table>
  <tr><th>Kotlin</th><th>Python</th></tr>
  <tr><td><code>class Dog : Animal(name)</code></td><td><code>class Dog(Animal):</code></td></tr>
  <tr><td><code>super(name)</code> (in the constructor)</td><td><code>super().__init__(name)</code></td></tr>
  <tr><td><code>override fun speak(): String { … }</code></td><td><code>def speak(self):</code> (override)</td></tr>
  <tr><td><code>x is Animal</code></td><td><code>isinstance(x, Animal)</code></td></tr>
  <tr><td><code>class C : A(), M</code> (interface)</td><td><code>class C(A, M):</code> (mixin)</td></tr>
</table>
<p>Overriding is just defining a method with the same name in the subclass — no
<code>open</code>/<code>override</code> keywords required, since every Python
method is overridable by default; the most-derived version wins, and it can
call the parent's version through <code>super()</code>. Type checks use
<code>isinstance(obj, Cls)</code>, which — like <code>is</code> — is
<code>True</code> for subclasses too. Python has no <code>interface</code>
keyword; a <em>mixin</em> is just an extra base class that contributes
methods, listed alongside the main parent in the parentheses.</p>`,

  kotlin: `open class Animal(val name: String) {
    open fun speak(): String {
        return "$name makes a sound"
    }
}

class Dog(name: String) : Animal(name) {
    override fun speak(): String {
        return "\${super.speak()} — woof!"
    }
}

val d = Dog("Rex")
d.speak()          // "Rex makes a sound — woof!"
d is Animal        // true`,

  task: `
<p>Recreate the hierarchy in Python:</p>
<ol>
  <li>Write a base class <code>Animal</code> whose <code>__init__(self, name)</code>
      stores <code>self.name</code>, and whose <code>speak(self)</code> returns
      <code>"&lt;name&gt; makes a sound"</code>.</li>
  <li>Write <code>Dog(Animal)</code> that adds a <code>breed</code>: its
      <code>__init__(self, name, breed)</code> calls
      <code>super().__init__(name)</code> and then stores <code>self.breed</code>.
      Override <code>speak(self)</code> to return the parent's result plus
      <code>" — woof!"</code> — call <code>super().speak()</code>, don't
      rebuild the string.</li>
  <li>Write a mixin class <code>Loud</code> with a method
      <code>shout(self)</code> that returns <code>self.speak().upper()</code>,
      and <code>LoudDog(Dog, Loud)</code> that adds no new code (just
      <code>pass</code>).</li>
  <li>Write <code>describe(obj)</code> that returns <code>"animal"</code> if
      <code>obj</code> is an <code>Animal</code> (use <code>isinstance</code>)
      and <code>"other"</code> otherwise.</li>
</ol>`,

  starter: `class Animal:
    def __init__(self, name):
        pass  # TODO: store self.name

    def speak(self):
        return ""  # TODO


class Dog(Animal):
    def __init__(self, name, breed):
        pass  # TODO: call super().__init__ and store self.breed

    def speak(self):
        return ""  # TODO: call super().speak() and add " — woof!"


class Loud:
    def shout(self):
        return ""  # TODO


class LoudDog(Dog, Loud):
    pass


def describe(obj):
    return ""  # TODO: "animal" or "other"
`,

  requirements: [
    { pattern: /class\s+Dog\s*\(\s*Animal\s*\)/, message: "Define Dog as a subclass of Animal" },
    { pattern: /super\s*\(\s*\)\s*\.\s*__init__/, message: "Call super().__init__ from Dog" },
    { pattern: /isinstance\s*\(/, message: "Use isinstance() inside describe" },
  ],

  tests: [
    { name: 'Animal("Cat").speak() is "Cat makes a sound"', code: "    expect_eq(Animal(\"Cat\").speak(), \"Cat makes a sound\")" },
    { name: 'Dog stores name and breed', code: "    d = Dog(\"Rex\", \"Lab\")\n    expect_eq(d.name, \"Rex\")\n    expect_eq(d.breed, \"Lab\")" },
    { name: 'Dog.speak() calls super and appends', code: "    expect_eq(Dog(\"Rex\", \"Lab\").speak(), \"Rex makes a sound — woof!\")" },
    { name: 'a Dog is an Animal (isinstance)', code: "    expect_true(isinstance(Dog(\"Rex\", \"Lab\"), Animal))" },
    { name: 'LoudDog.shout() mixes in Loud', code: "    expect_eq(LoudDog(\"Rex\", \"Lab\").shout(), \"REX MAKES A SOUND — WOOF!\")" },
    { name: 'describe distinguishes animals from others', code: "    expect_eq(describe(Dog(\"Rex\", \"Lab\")), \"animal\")\n    expect_eq(describe(42), \"other\")" },
  ],

  solution: `class Animal:
    def __init__(self, name):
        self.name = name

    def speak(self):
        return f"{self.name} makes a sound"


class Dog(Animal):
    def __init__(self, name, breed):
        super().__init__(name)
        self.breed = breed

    def speak(self):
        return f"{super().speak()} — woof!"


class Loud:
    def shout(self):
        return self.speak().upper()


class LoudDog(Dog, Loud):
    pass


def describe(obj):
    return "animal" if isinstance(obj, Animal) else "other"
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Python</th></tr>
  <tr><td>Subclass</td><td><code>class B : A()</code></td><td><code>class B(A):</code></td></tr>
  <tr><td>Parent constructor</td><td><code>: A(x)</code> on the class header</td><td><code>super().__init__(x)</code></td></tr>
  <tr><td>Call parent method</td><td><code>super.m()</code></td><td><code>super().m()</code></td></tr>
  <tr><td>Override</td><td><code>open</code> on parent, <code>override</code> on child</td><td>same method name (open by default)</td></tr>
  <tr><td>Type check</td><td><code>x is A</code></td><td><code>isinstance(x, A)</code></td></tr>
  <tr><td>Mixin</td><td>an <code>interface</code> with default methods</td><td>extra base class <code>(A, M)</code></td></tr>
</table>
<p>The biggest gotcha for a Kotlin programmer: Python never calls the
parent's <code>__init__</code> automatically the way Kotlin's <code>: A(x)</code>
header does. If a subclass defines its own <code>__init__</code>, it is fully
responsible for invoking <code>super().__init__(...)</code> — otherwise
attributes the parent would have set (like <code>self.name</code>) never get
created. Also, Python classes and methods are overridable by default, with no
<code>open</code>/<code>final</code> ceremony to opt in. Multiple inheritance
resolves method lookups left-to-right along the <em>MRO</em> (method resolution
order); for a simple mixin like <code>Loud</code> that just adds a method, this
means <code>LoudDog</code> gets <code>speak</code> from <code>Dog</code> and
<code>shout</code> from <code>Loud</code> with no conflict — similar in spirit
to how Kotlin resolves default methods from multiple interfaces, but Python
does it with ordinary classes rather than interfaces. You can also pass a
tuple to <code>isinstance</code>, e.g. <code>isinstance(x, (Dog, Cat))</code>.</p>`,
};
