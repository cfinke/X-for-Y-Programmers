  intro: `
<p>Time to put it all together. In Kotlin you might model a small in-memory
store with a <code>data class</code> for the record, a <code>class</code> holding
a <code>MutableMap</code>, custom exception subclasses, and collection functions
(<code>filter</code>/<code>map</code>/<code>sumOf</code>) to query it. Python
gives you the same shape with different spellings: a <code>@dataclass</code>
instead of a data class, a plain <code>dict</code> instead of
<code>MutableMap</code>, custom <code>Exception</code> subclasses, and
comprehensions/generator expressions instead of the collection-function chains.</p>
<table>
  <tr><th>Kotlin</th><th>Python</th></tr>
  <tr><td><code>data class Product(val name: String)</code></td><td><code>@dataclass\nclass Product: name: str</code></td></tr>
  <tr><td><code>mutableMapOf&lt;String, Product&gt;()</code></td><td><code>{}</code> (a dict)</td></tr>
  <tr><td><code>class NotFound(name: String) : Exception(name)</code></td><td><code>class ProductNotFound(Exception): pass</code></td></tr>
  <tr><td><code>throw NotFound(name)</code></td><td><code>raise ProductNotFound(name)</code></td></tr>
  <tr><td><code>items.filter { it.tags.contains(t) }</code></td><td><code>[p for p in items if t in p.tags]</code></td></tr>
  <tr><td><code>items.sumOf { it.price }</code></td><td><code>sum(p.price for p in items)</code></td></tr>
</table>
<p>This capstone ties together the dataclass, dict/list processing,
comprehensions, and exceptions you have met in earlier lessons — no new syntax,
just idiomatic assembly.</p>`,

  kotlin: `data class Product(
    val name: String,
    val price: Double,
    val tags: List<String> = emptyList()
)

class ProductNotFound(name: String) : Exception(name)
class DuplicateProduct(name: String) : Exception(name)

class Store {
    private val items = mutableMapOf<String, Product>()

    fun add(p: Product) {
        if (items.containsKey(p.name)) throw DuplicateProduct(p.name)
        items[p.name] = p
    }
    fun get(name: String): Product {
        return items[name] ?: throw ProductNotFound(name)
    }
    fun totalValue(): Double {
        return items.values.sumOf { it.price }
    }
    fun namesWithTag(tag: String): List<String> {
        return items.values
            .filter { it.tags.contains(tag) }
            .map { it.name }
            .sorted()
    }
}

fun load(records: List<Product>): Store {
    val store = Store()
    for (r in records) store.add(r)
    return store
}`,

  solution: `from dataclasses import dataclass, field


class ProductNotFound(Exception):
    pass


class DuplicateProduct(Exception):
    pass


@dataclass
class Product:
    name: str
    price: float
    tags: list = field(default_factory=list)


class Store:
    def __init__(self):
        self._items = {}

    def add(self, product):
        if product.name in self._items:
            raise DuplicateProduct(product.name)
        self._items[product.name] = product

    def get(self, name):
        if name not in self._items:
            raise ProductNotFound(name)
        return self._items[name]

    def total_value(self):
        return sum(p.price for p in self._items.values())

    def names_with_tag(self, tag):
        return sorted(p.name for p in self._items.values() if tag in p.tags)


def load(records):
    store = Store()
    for r in records:
        store.add(Product(name=r["name"], price=r["price"], tags=r.get("tags", [])))
    return store
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Python</th></tr>
  <tr><td>Record type</td><td><code>data class</code></td><td><code>@dataclass</code></td></tr>
  <tr><td>Keyed store</td><td><code>MutableMap&lt;K, V&gt;</code></td><td><code>dict</code></td></tr>
  <tr><td>Membership</td><td><code>map.containsKey(k)</code></td><td><code>k in d</code></td></tr>
  <tr><td>Custom error</td><td><code>class E(msg: String) : Exception(msg)</code></td><td><code>class E(Exception): pass</code></td></tr>
  <tr><td>Signal an error</td><td><code>throw E()</code></td><td><code>raise E()</code></td></tr>
  <tr><td>Reduce/sum</td><td><code>list.sumOf { it.x }</code></td><td><code>sum(x for x in arr)</code></td></tr>
  <tr><td>Filter + map + sort</td><td><code>list.filter { ... }.map { ... }.sorted()</code></td><td><code>sorted(f(x) for x in arr if g(x))</code></td></tr>
</table>
<p>A few Pythonic touches worth noting. <code>field(default_factory=list)</code>
gives each instance its own fresh list — the equivalent mistake in Python to a
shared mutable default is a real trap, and the dataclass field factory is how you
avoid it. Passing a generator expression straight into <code>sum()</code> or
<code>sorted()</code> (no surrounding brackets) is the idiomatic replacement for
a <code>sumOf</code>/<code>filter</code>/<code>map</code> chain, and it avoids
building an intermediate list. Finally, custom exceptions are just classes that
inherit from <code>Exception</code>; you catch them by type with
<code>except ProductNotFound:</code>, exactly as you would branch on an
<code>is</code> check in a Kotlin <code>catch</code> clause.</p>`,
