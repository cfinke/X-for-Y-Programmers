  title: "Strings",

  intro: `
<p>C# strings will feel unfamiliar in one big way: they are immutable,
unlike Ruby <code>String</code>, which is mutable by default — that's why Ruby
has bang-methods like <code>s.upcase!</code> that actually change the object in
place. C# has no such bang-methods; every operation returns a <em>new</em>
string rather than mutating the original. The method names differ too, they
are PascalCase, and a couple of them (<code>Substring</code>,
<code>IndexOf</code>) have sharper edges than their Ruby cousins.</p>
<table>
  <tr><th>Ruby</th><th>C#</th></tr>
  <tr><td><code>s.upcase</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td><code>s.include?("x")</code></td><td><code>s.Contains("x")</code></td></tr>
  <tr><td><code>s.index("x")</code></td><td><code>s.IndexOf("x")</code></td></tr>
  <tr><td><code>s[1...4]</code></td><td><code>s.Substring(1, 3)</code></td></tr>
  <tr><td><code>s.split(",")</code></td><td><code>s.Split(',')</code></td></tr>
  <tr><td><code>s.strip</code></td><td><code>s.Trim()</code></td></tr>
  <tr><td><code>arr.join(", ")</code></td><td><code>string.Join(", ", arr)</code></td></tr>
</table>
<p>Two traps to note. <code>Substring(start, length)</code> takes a
<em>length</em>, not an end index, so it is not quite the same shape as Ruby's
<code>s[1...4]</code> range slice. And <code>IndexOf</code> returns
<code>-1</code> when the substring is missing, where Ruby's <code>index</code>
returns <code>nil</code> — so the "not found" check in C# is a numeric
comparison, not a nil check. For assembling many pieces in a loop, reach for
<code>StringBuilder</code> instead of repeatedly <code>+</code>-ing strings —
the same reason you would reach for the mutating <code>&lt;&lt;</code> instead
of <code>+=</code> in a hot loop in Ruby, but here it is the idiomatic tool
since C# strings can't be mutated in place at all.</p>`,

  ruby: `def shout(s)
  s.strip.upcase
end

def csv(parts)
  parts.join(", ")
end

def initials(name)
  name
    .split(" ")
    .map { |w| w[0] }
    .join("")
end`,

<p>Build a <code>static class TextUtil</code> with these <code>static</code>

</ol>`,

  requirements: [
    { pattern: /string\.Join/, message: "Join the parts with string.Join" },

    { name: "Initials(\"grace brewster hopper\") is \"gbh\"", code: "      expect_eq(TextUtil.Initials(\"grace brewster hopper\"), \"gbh\");" },
    { name: "Greeting(\"Ada\") is \"Hello, Ada!\"", code: "      expect_eq(TextUtil.Greeting(\"Ada\"), \"Hello, Ada!\");" },
  ],

  solution: `static class TextUtil {
  public static string Shout(string s) {
    return s.Trim().ToUpper();
  }

  public static string Csv(string[] parts) {
    return string.Join(", ", parts);
  }

  public static string Initials(string name) {
    var sb = new StringBuilder();
    foreach (var word in name.Split(' ')) {
      if (word.Length > 0) {
        sb.Append(word[0]);
      }
    }
    return sb.ToString();
  }

  public static string Greeting(string name) {
    return $"Hello, {name}!";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>C#</th></tr>
  <tr><td>Uppercase</td><td><code>s.upcase</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td>Contains</td><td><code>s.include?(x)</code></td><td><code>s.Contains(x)</code></td></tr>
  <tr><td>Substring</td><td><code>s[1...4]</code></td><td><code>s.Substring(1, 3)</code> (start, <em>length</em>)</td></tr>
  <tr><td>Replace</td><td><code>s.gsub("a", "b")</code></td><td><code>s.Replace("a", "b")</code> (replaces all)</td></tr>
  <tr><td>Join</td><td><code>arr.join(sep)</code></td><td><code>string.Join(sep, arr)</code> (static)</td></tr>
  <tr><td>Build in loop</td><td><code>s &lt;&lt; piece</code></td><td><code>sb.Append(piece)</code></td></tr>
</table>
<p>A few more idioms worth filing away. <code>string.Split</code> takes a
<code>char</code> (single quotes: <code>','</code>) or a <code>string[]</code> of
separators — not a regex. <code>Replace</code> swaps <em>every</em> occurrence,
so it matches Ruby's <code>gsub</code>, not <code>sub</code>.
<code>StartsWith</code>, <code>EndsWith</code>, and <code>Contains</code> all
return <code>bool</code>, the same shape as Ruby's <code>?</code>-suffixed
predicates, just without the punctuation. And note that <code>string.Join</code>,
<code>string.IsNullOrEmpty</code>, and friends are <em>static</em> methods on the
<code>string</code> type, which is why the call reads
<code>string.Join(...)</code> rather than <code>arr.Join(...)</code> the way
Ruby's <code>Array#join</code> reads.</p>`,
