  number: 6,
  title: "Classes & Properties",

  intro: `
<p>Ruby classes and C# classes both wrap up state and behavior, but they get
there differently. Ruby exposes instance variables (<code>@name</code>) through
methods you either write by hand or generate with <code>attr_accessor</code> /
<code>attr_reader</code> / <code>attr_writer</code>. C# instead leans on
idiomatic <em>auto-properties</em>: <code>public int Age { get; set; }</code>
compiles down to a hidden backing field plus a getter and setter, but reads and
writes like a plain field.</p>
<table>
  <tr><th>Ruby</th><th>C#</th></tr>
  <tr><td><code>@name</code> (no accessor)</td><td><code>private string name;</code></td></tr>
  <tr><td><code>attr_accessor :age</code></td><td><code>public int Age { get; set; }</code></td></tr>
  <tr><td><code>attr_reader :id</code></td><td><code>public int Id { get; }</code> (get-only)</td></tr>
  <tr><td><code>def total; …; end</code></td><td><code>public int Total => …;</code></td></tr>
  <tr><td><code>def initialize(x); …; end</code></td><td><code>public Thing(int x) { … }</code></td></tr>
</table>
<p>Three things to internalize. First, public members are conventionally
<strong>PascalCase</strong> in C# (<code>Balance</code>, not <code>balance</code>) —
a bigger habit change than it sounds, since Ruby methods and instance variables
are snake_case throughout. Second, a <code>{ get; }</code> property with no
setter can only be assigned in the constructor — that is C#'s <code>readonly</code>,
roughly like an <code>attr_reader</code> whose ivar is set once in
<code>initialize</code> and never touched again. A <code>{ get; private set; }</code>
lets the class mutate it while the outside world sees it as read-only: real
encapsulation, the way a hand-written reader with a deliberately private writer
method would work in Ruby. Third, <code>=></code> defines an <em>expression-bodied
member</em>, the terse form of a computed getter or a one-line method — much
like a single-line Ruby method such as <code>def total; @a + @b; end</code>.</p>`,

  ruby: `class BankAccount
  attr_reader :owner, :balance

  def initialize(owner, initial)
    @owner = owner
    @balance = initial
  end

  def deposit(amount)
    @balance += amount
  end

  def summary
    "#{@owner}: #{@balance}"
  end
end`,

<p>Build a <code>BankAccount</code> class that encapsulates its balance so callers

<ol>

</ol>`,

`,

      "      a.Withdraw(5m);\n" +

    { name: "Summary reads owner and balance", code:

  solution: `class BankAccount {
  public string Owner { get; }
  public decimal Balance { get; private set; }
  private int transactionCount;

  public BankAccount(string owner, decimal initial) {
    Owner = owner;
    Balance = initial;
    transactionCount = 0;
  }

  public void Deposit(decimal amount) {
    Balance += amount;
    transactionCount++;
  }

  public bool Withdraw(decimal amount) {
    if (amount > Balance) {
      return false;
    }
    Balance -= amount;
    transactionCount++;
    return true;
  }

  public int TransactionCount => transactionCount;
  public string Summary => $"{Owner}: {Balance}";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>C#</th></tr>
  <tr><td>Mutable property</td><td><code>attr_accessor :x</code></td><td><code>int X { get; set; }</code></td></tr>
  <tr><td>Read-only from outside</td><td><code>attr_reader :x</code> plus a private writer method</td><td><code>int X { get; private set; }</code></td></tr>
  <tr><td>Immutable after construction</td><td><code>attr_reader :x</code>, set once in <code>initialize</code> (convention only)</td><td><code>int X { get; }</code></td></tr>
  <tr><td>Computed getter</td><td><code>def total; …; end</code></td><td><code>int Total => …;</code></td></tr>
  <tr><td>Private field</td><td><code>@x</code> (ivars are inaccessible from outside by default)</td><td><code>private int x;</code></td></tr>
</table>
<p>An auto-property is just sugar: <code>{ get; set; }</code> generates a hidden
backing field and trivial accessors, much like <code>attr_accessor</code>
generates reader and writer methods around an instance variable. The moment you
need logic — validation, change tracking — you either switch to a full property
with an explicit backing field, or, as here, keep the auto-property and route
all mutation through methods that guard the invariant. Because the setter is
<code>private</code>, no caller outside <code>BankAccount</code> can bypass
<code>Withdraw</code>'s overdraft check — a guarantee the compiler enforces,
unlike Ruby's "just don't call the writer" convention.</p>
<p>One Ruby habit to drop: naming methods and instance variables in snake_case.
The .NET convention is PascalCase for anything public (properties, methods,
types) and camelCase only for private fields, parameters, and locals. The
compiler doesn't enforce it, but every C# codebase you touch will expect it.</p>`,
