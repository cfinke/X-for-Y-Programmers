  intro: `
<p>Exceptions in C# will feel familiar: <code>try</code>/<code>catch</code>/<code>finally</code>
maps directly onto Ruby's <code>begin</code>/<code>rescue</code>/<code>ensure</code>, and
<code>throw</code> is Ruby's <code>raise</code>. The differences are mostly about
<em>types</em>. Ruby lets you rescue a specific class with
<code>rescue ValidationError =&gt; e</code>, but a bare <code>rescue</code> catches
<code>StandardError</code> and everything less specific than it. In C# you can only throw
objects that derive from <code>System.Exception</code>, and every <code>catch</code>
names the exact exception type it handles — there is no bare <code>catch</code> that
quietly swallows more than you meant.</p>
<table>
  <tr><th>Ruby</th><th>C#</th></tr>
  <tr><td><code>raise ValidationError, "bad"</code></td><td><code>throw new Exception("bad")</code></td></tr>
  <tr><td><code>rescue =&gt; e</code></td><td><code>catch (Exception e) { … }</code></td></tr>
  <tr><td><code>rescue ValidationError =&gt; e</code></td><td><code>catch (ValidationException e) { … }</code></td></tr>
  <tr><td><code>class E &lt; StandardError; end</code></td><td><code>class E : Exception {}</code></td></tr>
  <tr><td><code>e.message</code></td><td><code>e.Message</code></td></tr>
  <tr><td><code>begin … ensure conn.close end</code></td><td><code>using (var conn = …) { … }</code></td></tr>
</table>
<p>The last row is the big new idea. Ruby has no built-in <code>using</code> construct —
<code>File.open</code> with a block closes the file for you, and other libraries follow
the same convention, but it's a convention, not a language feature. C# formalizes it
with <code>IDisposable</code>: any type with a <code>Dispose()</code> method. A
<code>using</code> block guarantees <code>Dispose()</code> runs when the block exits —
normally or via an exception — so it is the idiomatic replacement for a hand-written
<code>begin/ensure</code> that closes a file, connection, or lock.</p>`,

  ruby: `class ValidationError < StandardError; end

def validate_age(age)
  raise ValidationError, "age cannot be negative" if age < 0
  raise ValidationError, "age is unrealistically large" if age > 150
  age
end

def safe_validate_age(age, fallback)
  validate_age(age)
rescue ValidationError
  fallback
end`,

  solution: `class ValidationException : Exception {
  public ValidationException(string message) : base(message) { }
}

class Resource : IDisposable {
  public static int OpenCount = 0;
  public bool Disposed = false;

  public Resource() {
    OpenCount++;
  }

  public void Dispose() {
    Disposed = true;
    OpenCount--;
  }
}

static class Validator {
  public static int ValidateAge(int age) {
    if (age < 0) throw new ValidationException("age cannot be negative");
    if (age > 150) throw new ValidationException("age is unrealistically large");
    return age;
  }

  public static int SafeValidateAge(int age, int fallback) {
    try {
      return ValidateAge(age);
    } catch (ValidationException) {
      return fallback;
    }
  }

  public static string Process(int age) {
    var log = new StringBuilder();
    using (var res = new Resource()) {
      try {
        int valid = ValidateAge(age);
        log.Append($"ok:{valid}");
      } catch (ValidationException ex) {
        log.Append($"error:{ex.Message}");
      } finally {
        log.Append("|cleanup");
      }
    }
    return log.ToString();
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>C#</th></tr>
  <tr><td>Throw</td><td><code>raise Exception, "x"</code></td><td><code>throw new Exception("x")</code></td></tr>
  <tr><td>Catch by type</td><td><code>rescue T =&gt; e</code></td><td><code>catch (T e)</code></td></tr>
  <tr><td>Custom exception</td><td><code>class E &lt; StandardError</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Message</td><td><code>e.message</code></td><td><code>e.Message</code></td></tr>
  <tr><td>Deterministic cleanup</td><td><code>begin/ensure + close</code></td><td><code>using (var x = …)</code></td></tr>
</table>
<p>A few things worth internalizing. Order your <code>catch</code> blocks
most-specific first — a <code>catch (Exception)</code> ahead of
<code>catch (ValidationException)</code> is a compile error because the second is
unreachable. Ruby has a similar discipline but doesn't enforce it: <code>rescue</code>
clauses are tried top to bottom, so put <code>rescue ValidationError</code> before
<code>rescue StandardError</code> or the broader clause will always win first. To
catch by type but keep going, use a bare <code>catch (ValidationException)</code> with
no variable (as in <code>SafeValidateAge</code>) when you do not need <code>e</code> —
the same idea as writing <code>rescue ValidationError</code> without <code>=&gt; e</code>
in Ruby.</p>
<p>A <code>using</code> block is pure sugar for
<code>try { … } finally { x.Dispose(); }</code>, and it plays the role that
<code>begin/ensure</code> or a <code>File.open</code> block plays in Ruby: "close this
no matter what." Reach for it around files, streams, database connections, and locks.
When you need a real custom exception, derive from <code>Exception</code> (or a more
specific base such as <code>ArgumentException</code>) and forward the message with
<code>: base(message)</code> — the C# equivalent of Ruby's
<code>def initialize(msg) = super(msg)</code> — so <code>e.Message</code> works for
free.</p>`,
