  number: 19,
  title: "Equality & Comparable",

  intro: `
<p>In Ruby, <code>==</code> is inherited from <code>Object</code> as reference
identity unless a class overrides it — two different objects are never equal,
no matter their contents — and <code>Array#sort</code> falls back to
<code>&lt;=&gt;</code> (or a block you supply). C# lets a type define what
equality and ordering <em>mean</em>. You override a handful of members, and
then <code>==</code>, <code>.Equals()</code>, hash-based
collections, and <code>List&lt;T&gt;.Sort()</code> all cooperate with your
type.</p>
<table>
  <tr><th>Ruby</th><th>C#</th></tr>
  <tr><td><code>a == b</code> (identity unless overridden)</td><td><code>a == b</code> (you can define it)</td></tr>
  <tr><td><code>def ==(other)</code> (your own override)</td><td><code>a.Equals(b)</code> via <code>IEquatable&lt;T&gt;</code></td></tr>
  <tr><td><code>eql?</code> / <code>hash</code> for a <code>Hash</code> key</td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td><code>&lt;=&gt;</code> + <code>include Comparable</code></td><td><code>list.Sort()</code> via <code>IComparable&lt;T&gt;</code></td></tr>
</table>
<p>The one firm rule: <strong>if you override <code>Equals</code>, you must also
override <code>GetHashCode</code></strong>, and equal objects must return equal
hash codes — otherwise <code>Dictionary</code> and <code>HashSet</code> will lose
your keys, the same way a Ruby <code>Hash</code> loses keys whose <code>eql?</code>
and <code>hash</code> fall out of sync. Implement <code>IEquatable&lt;T&gt;</code> for a
strongly-typed, allocation-free <code>Equals(T)</code>, and <code>IComparable&lt;T&gt;</code> so
sorting and <code>SortedSet</code> know the order. Overloading <code>==</code> is
a nicety layered on top of <code>Equals</code>.</p>`,

  ruby: `class SemVer
  attr_reader :major, :minor, :patch

  def initialize(major, minor, patch)
    @major = major
    @minor = minor
    @patch = patch
  end

  def ==(other)
    major == other.major && minor == other.minor && patch == other.patch
  end

  def <=>(other)
    [major, minor, patch] <=> [other.major, other.minor, other.patch]
  end

  include Comparable
end

versions = [SemVer.new(1, 2, 0), SemVer.new(1, 0, 5)]
versions.sort # Comparable gives sort for free once <=> is defined`,

  solution: `class SemVer : IEquatable<SemVer>, IComparable<SemVer> {
  public int Major { get; }
  public int Minor { get; }
  public int Patch { get; }

  public SemVer(int major, int minor, int patch) {
    Major = major;
    Minor = minor;
    Patch = patch;
  }

  public bool Equals(SemVer other) {
    if (ReferenceEquals(other, null)) return false;
    return Major == other.Major && Minor == other.Minor && Patch == other.Patch;
  }

  public override bool Equals(object obj) {
    return Equals(obj as SemVer);
  }

  public override int GetHashCode() {
    unchecked {
      int hash = 17;
      hash = hash * 31 + Major;
      hash = hash * 31 + Minor;
      hash = hash * 31 + Patch;
      return hash;
    }
  }

  public int CompareTo(SemVer other) {
    if (ReferenceEquals(other, null)) return 1;
    int c = Major.CompareTo(other.Major);
    if (c != 0) return c;
    c = Minor.CompareTo(other.Minor);
    if (c != 0) return c;
    return Patch.CompareTo(other.Patch);
  }

  public static bool operator ==(SemVer a, SemVer b) {
    if (ReferenceEquals(a, b)) return true;
    if (ReferenceEquals(a, null) || ReferenceEquals(b, null)) return false;
    return a.Equals(b);
  }

  public static bool operator !=(SemVer a, SemVer b) {
    return !(a == b);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>C#</th></tr>
  <tr><td>Value equality</td><td>hand-written <code>==</code></td><td><code>IEquatable&lt;T&gt;</code> + <code>Equals</code> overrides</td></tr>
  <tr><td>Hashing a key</td><td><code>eql?</code> + <code>hash</code> overrides</td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td>Ordering</td><td><code>&lt;=&gt;</code> + <code>include Comparable</code></td><td><code>IComparable&lt;T&gt;.CompareTo</code></td></tr>
  <tr><td>Operator</td><td><code>==</code> is just a method, freely overridable</td><td><code>operator ==</code> / <code>!=</code></td></tr>
</table>
<p>The <code>Equals</code>/<code>GetHashCode</code> pair is the part people forget —
it mirrors Ruby's <code>eql?</code>/<code>hash</code> pair for <code>Hash</code> keys.
Hash-based collections first bucket by hash code, then confirm with
<code>Equals</code> — so two objects that are <code>Equals</code> but hash
differently will land in different buckets and never be found. Keeping the hash
in sync with the fields you compare is what makes <code>HashSet</code> and
<code>Dictionary</code> keys work, the same discipline Ruby asks of <code>eql?</code>
and <code>hash</code> for its own <code>Hash</code> and <code>Set</code>.</p>
<p><code>CompareTo</code> returns a sign, not a boolean — the same contract as Ruby's
<code>&lt;=&gt;</code>: negative means "I sort before <code>other</code>", zero means
"equal order", positive means "after". Delegating to each field's own
<code>CompareTo</code> (<code>Major.CompareTo(…)</code>) gives you correct results for
free, much like a Ruby <code>&lt;=&gt;</code> can delegate to an array comparison such as
<code>[major, minor, patch] &lt;=&gt; [other.major, other.minor, other.patch]</code>.
Once <code>IComparable&lt;T&gt;</code> is in place, <code>List&lt;T&gt;.Sort()</code>,
<code>Array.Sort</code>, and <code>SortedSet&lt;T&gt;</code> all use it with no
comparator argument — the same payoff Ruby gets from mixing in <code>Comparable</code>,
which derives <code>&lt;</code>, <code>&gt;</code>, <code>between?</code>, and
<code>sort</code> from a single <code>&lt;=&gt;</code>. On modern .NET you'd usually
let a <code>record</code> generate all of this, but records don't exist in C# 7.3 —
writing it by hand shows exactly what they generate.</p>`,
