  number: 8,
  title: "Interfaces",

  intro: `
<p>Ruby doesn't have interfaces as a language construct — you get contracts by
convention (any object that responds to <code>area</code> can be treated as a
shape) or by mixing in a <code>Module</code> with <code>include</code>. C#'s
<code>interface</code> formalizes that contract and enforces it: it is
<em>nominal</em>. A class only implements an interface if it says so explicitly
with <code>: IName</code>. Having the right methods is not enough; the class
must declare the contract.</p>
<table>
  <tr><th>Ruby</th><th>C#</th></tr>
  <tr><td><code>module Shape; def area; end; end</code></td><td><code>interface IShape { double Area(); }</code></td></tr>
  <tr><td><code>class Box; include Shape; end</code></td><td><code>class Box : IShape {}</code></td></tr>
  <tr><td>duck typing (responds_to?)</td><td>nominal (must declare <code>: IShape</code>)</td></tr>
  <tr><td><code>attr_reader :name</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td><code>include A; include B</code></td><td><code>class C : A, B</code></td></tr>
</table>
<p>Three conventions to absorb. First, C# interface names start with a capital
<code>I</code> (<code>IShape</code>, <code>IComparable</code>). Second, interface
members are implicitly <code>public</code> — you write no access modifier in the
interface, but the implementing class must mark them <code>public</code>. Third, in
C# 7.3 an interface has <em>no</em> method bodies at all (default interface methods
arrived later), so every member is a pure signature the class must fill in.</p>`,

  ruby: `module Shape
  def name
    raise NotImplementedError
  end

  def area
    raise NotImplementedError
  end
end

module Named
  def describe
    raise NotImplementedError
  end
end

class Circle
  include Shape
  include Named

  def initialize(name, r)
    @name = name
    @r = r
  end

  attr_reader :name

  def area
    Math::PI * @r * @r
  end

  def describe
    "#{name}: #{area}"
  end
end

def total_area(shapes)
  shapes.reduce(0) { |sum, s| sum + s.area }
end`,

  task: `
<p>Model shapes behind an interface, then program against that interface.</p>
<ol>
  <li>Declare <code>interface IShape</code> with a read-only property
      <code>string Name { get; }</code> and a method <code>double Area();</code>.</li>
  <li>Declare a second <code>interface IDescribable</code> with a method
      <code>string Describe();</code>.</li>
  <li>Write <code>class Rectangle</code> that implements <em>both</em> interfaces:
      <code>class Rectangle : IShape, IDescribable</code>. Give it a constructor
      <code>Rectangle(string name, double width, double height)</code>.
      <code>Area()</code> returns <code>width * height</code>, and
      <code>Describe()</code> returns a string like <code>"box: 6"</code>
      (name, then the area).</li>
  <li>Write <code>class Square : IShape, IDescribable</code> with a constructor
      <code>Square(string name, double side)</code>. Its <code>Area()</code> is
      <code>side * side</code>.</li>
  <li>Add a <code>static class Shapes</code> with
      <code>static double TotalArea(IShape[] shapes)</code> that sums
      <code>Area()</code> across the array — note the parameter is typed as the
      <em>interface</em>, so it accepts any shape.</li>
</ol>`,

`,

  requirements: [
    { pattern: /interface\s+IShape/, message: "Declare an interface named IShape" },
    { pattern: /class\s+Rectangle\s*:\s*IShape\s*,\s*IDescribable/, message: "Rectangle must implement both IShape and IDescribable" },
    { pattern: /TotalArea\s*\(\s*IShape\s*\[\s*\]/, message: "TotalArea must take an IShape[] (program against the interface)" },
  ],

  tests: [
    { name: "Rectangle.Area() is width * height", code: "      IShape r = new Rectangle(\"box\", 2, 3);\n      expect_eq(r.Area(), 6.0);" },
    { name: "Rectangle.Name is readable via IShape", code: "      IShape r = new Rectangle(\"box\", 2, 3);\n      expect_eq(r.Name, \"box\");" },
    { name: "Square.Area() is side * side", code: "      IShape s = new Square(\"sq\", 4);\n      expect_eq(s.Area(), 16.0);" },
    { name: "Describe() via the IDescribable interface", code: "      IDescribable d = new Rectangle(\"box\", 2, 3);\n      expect_eq(d.Describe(), \"box: 6\");" },
    { name: "TotalArea sums a mixed IShape[]", code: "      IShape[] all = { new Rectangle(\"box\", 2, 3), new Square(\"sq\", 4) };\n      expect_eq(Shapes.TotalArea(all), 22.0);" },
    { name: "TotalArea of empty array is 0", code: "      IShape[] none = new IShape[0];\n      expect_eq(Shapes.TotalArea(none), 0.0);" },
  ],

  solution: `interface IShape {
  string Name { get; }
  double Area();
}

interface IDescribable {
  string Describe();
}

class Rectangle : IShape, IDescribable {
  public string Name { get; private set; }
  private double width;
  private double height;

  public Rectangle(string name, double width, double height) {
    Name = name;
    this.width = width;
    this.height = height;
  }

  public double Area() {
    return width * height;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

class Square : IShape, IDescribable {
  public string Name { get; private set; }
  private double side;

  public Square(string name, double side) {
    Name = name;
    this.side = side;
  }

  public double Area() {
    return side * side;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

static class Shapes {
  public static double TotalArea(IShape[] shapes) {
    double sum = 0;
    foreach (IShape s in shapes) {
      sum += s.Area();
    }
    return sum;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>C#</th></tr>
  <tr><td>Declare</td><td><code>module Shape; end</code></td><td><code>interface IShape {}</code></td></tr>
  <tr><td>Implement</td><td><code>class Box; include Shape; end</code></td><td><code>class Box : IShape</code></td></tr>
  <tr><td>Conformance</td><td>duck typing</td><td>nominal (explicit)</td></tr>
  <tr><td>Read-only property</td><td><code>attr_reader :name</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td>Multiple</td><td><code>include A; include B</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Member bodies</td><td>allowed (mixin methods)</td><td>none (in C# 7.3)</td></tr>
</table>
<p>Because conformance is nominal, adding a method that happens to match an
interface does <em>not</em> make a class implement it — you must list the interface
after the colon. That same colon does double duty for base classes: a class can
extend at most one class but implement any number of interfaces, and if it does
both the base class comes first (<code>class C : BaseClass, IShape</code>).</p>
<p>The payoff is the <code>IShape[]</code> parameter in <code>TotalArea</code>:
callers pass concrete <code>Rectangle</code> and <code>Square</code> objects, but
the method only sees the contract. This is C#'s everyday tool for decoupling and is
exactly what powers built-in interfaces like <code>IEnumerable&lt;T&gt;</code>,
<code>IComparable&lt;T&gt;</code>, and <code>IEquatable&lt;T&gt;</code>.</p>`,
};
