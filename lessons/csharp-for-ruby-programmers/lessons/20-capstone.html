<p>Time to put the whole course together. You'll build a small
<strong>typed in-memory repository</strong> — the same shape you'd reach for in
Ruby with a <code>Hash</code> tucked behind a class, but assembled from the C#
tools you've collected: a generic class with a constraint, an interface, LINQ,
and real exceptions instead of returning <code>nil</code>.</p>
<table>
  <tr><th>Ruby</th><th>C#</th></tr>
  <tr><td><code>class Repo</code> (duck-typed on <code>id</code>)</td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td><code>@items = {}</code></td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td><code>items.values.select { ... }</code></td><td><code>items.Values.Where(...)</code> (LINQ)</td></tr>
  <tr><td><code>raise NotFoundError, ...</code></td><td><code>throw new NotFoundException(...)</code></td></tr>
  <tr><td>return item or <code>nil</code></td><td>return <code>T</code>, or <em>throw</em></td></tr>
</table>
<p>Two design habits carry over cleanly. The generic <em>constraint</em>
(<code>where T : IEntity</code>) is C#'s answer to Ruby's duck typing: Ruby
happily calls <code>item.id</code> on whatever gets passed in and only fails at
run time if it's missing, while C#'s constraint lets the repository read
<code>item.Id</code> with the compiler guaranteeing every <code>T</code> has it.
And where Ruby methods often just return <code>nil</code> on a miss (leaving it
to the caller to remember to check), idiomatic C# throws a custom exception
derived from <code>Exception</code> — the caller either gets a valid <code>T</code>
or a failure it can <code>catch</code> by type.</p>`,

class Repository
  def initialize
    @items = {}
  end

  def add(item)
    raise "id #{item.id} already exists" if @items.key?(item.id)
    @items[item.id] = item
  end

  def get(id)
    item = @items[id]
    raise NotFoundError, "id #{id} not found" if item.nil?
    item
  end

  def where(&predicate)
    @items.values.select(&predicate).sort_by(&:id)
  end

  def count
    @items.size
  end
end`,

  solution: `interface IEntity {
  int Id { get; }
}

class NotFoundException : Exception {
  public NotFoundException(string message) : base(message) {
  }
}

class Repository<T> where T : IEntity {
  private Dictionary<int, T> items = new Dictionary<int, T>();

  public void Add(T item) {
    if (items.ContainsKey(item.Id)) {
      throw new InvalidOperationException($"id {item.Id} already exists");
    }
    items[item.Id] = item;
  }

  public T Get(int id) {
    T value;
    if (!items.TryGetValue(id, out value)) {
      throw new NotFoundException($"id {id} not found");
    }
    return value;
  }

  public bool Remove(int id) {
    return items.Remove(id);
  }

  public List<T> Where(Func<T, bool> predicate) {
    return items.Values.Where(predicate).OrderBy(x => x.Id).ToList();
  }

  public int Count {
    get { return items.Count; }
  }
}

class User : IEntity {
  public int Id { get; private set; }
  public string Name { get; private set; }
  public int Age { get; private set; }

  public User(int id, string name, int age) {
    Id = id;
    Name = name;
    Age = age;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>C#</th></tr>
  <tr><td>Constrained generic</td><td>duck typing on <code>item.id</code></td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td>Keyed store</td><td><code>Hash</code> (<code>{}</code>)</td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td>Safe lookup</td><td><code>hash[id]</code> → value or <code>nil</code></td><td><code>TryGetValue(id, out value)</code></td></tr>
  <tr><td>Filter</td><td><code>arr.select { |x| ... }</code></td><td><code>seq.Where(p)</code> (LINQ)</td></tr>
  <tr><td>Custom error</td><td><code>class E &lt; StandardError</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Catch by type</td><td><code>rescue E =&gt; e</code></td><td><code>catch (E ex) { }</code></td></tr>
</table>
<p>A few things came together here. <code>where T : IEntity</code> is what unlocks
<code>item.Id</code> inside the generic — without the constraint the compiler only
knows <code>T</code> is <em>some</em> type and would reject the member access, a
guarantee Ruby simply doesn't check up front: a duck-typed <code>Repository</code>
would happily accept an object with no <code>id</code> method and blow up only when
called. The LINQ chain <code>Where(...).OrderBy(...).ToList()</code> is lazy until
<code>ToList()</code> forces it, mirroring how you'd <code>select</code> then
<code>sort_by</code> an array.</p>
<p>The big idiomatic shift from Ruby is error handling: rather than returning
<code>nil</code> and making every caller remember to check, C# code throws a typed
exception on the exceptional path. Callers <code>catch</code> by exception type —
<code>catch (NotFoundException ex)</code> — which is both more precise and more
discoverable than a Ruby <code>rescue</code> that has to guess whether <code>nil</code>
was even a failure or a legitimate value. That's the whole course in one small
object: types that are real at runtime, generics with constraints, interfaces as
contracts, LINQ for querying, and exceptions for failure.</p>`,
