<div id="app"></div>
<script>
const LESSON = {
  number: 18,
  title: "Modules",

  intro: `
<p>Java organizes code with packages and classes: a <code>public</code> class,
method, or field is "exported" for other packages to use via
<code>import</code>, while package-private members stay hidden. A single file
can hold one <code>public</code> class plus whatever helper classes it needs,
and a class can expose static fields, static methods, and instance methods all
at once. JavaScript modules work differently. There are no classes required
at all — a module is simply a file, and <code>export</code> can be attached to
any top-level const, function, or class. There's also a special one-per-module
<code>export default</code>, which has no real Java equivalent (the closest
analogy is "the one public class a file is named after," except JavaScript's
default export can be anything — a function, an object, a primitive).</p>
<table>
  <tr><th>Java</th><th>JavaScript (runtime)</th></tr>
  <tr><td><code>public static final double TAX = 0.1;</code></td><td><code>export const TAX = 0.1;</code></td></tr>
  <tr><td><code>public interface Cart { ... }</code></td><td>no equivalent — JS has no interfaces</td></tr>
  <tr><td><code>import com.example.Cart;</code></td><td><code>import { Cart } from "./m.js";</code></td></tr>
  <tr><td>the file's one <code>public class</code></td><td><code>export default function total() {}</code></td></tr>
</table>
<p>The mental shift: a named export is a <em>value</em> you name, and the
default export is just the one binding the module hands back when you import it
without braces. There's no access-modifier keyword like <code>public</code> or
<code>private</code> on individual members — a top-level binding is either
marked with <code>export</code> (visible outside the module) or it isn't
(invisible outside the module, the JavaScript equivalent of package-private).</p>`,

  java: `public final class Pricing {
    public static final double TAX_RATE = 0.1;

    public static int addTax(int cents) {
        return Math.round(cents * (float) (1 + TAX_RATE));
    }

    public static String formatUSD(int cents) {
        return String.format("$%.2f", cents / 100.0);
    }

    // the class's "main" purpose, but Java has no true default export
    public static int total(int[] items) {
        int sum = 0;
        for (int cents : items) {
            sum += cents;
        }
        return sum;
    }
}`,

  task: `
<p>Build a tiny pricing module using plain-JavaScript exports. Export every
symbol directly (no interfaces or access modifiers), and give the module one default export:</p>
<ol>
  <li><strong>Named const export</strong>: <code>TAX_RATE</code> = <code>0.1</code>.</li>
  <li><strong>Named function export</strong>: <code>addTax(cents)</code> returns
      the price with tax added, rounded to a whole number of cents
      (<code>Math.round(cents * (1 + TAX_RATE))</code>).</li>
  <li><strong>Named function export</strong>: <code>formatUSD(cents)</code>
      returns a string like <code>"$12.34"</code> (dollars with two decimals).</li>
  <li><strong>Default export</strong>: <code>total(items)</code>, a function that
      sums an array of cent amounts and returns the total (<code>0</code> for an
      empty array). Export it with <code>export default</code>.</li>
</ol>`,

  starter: `// 1. named const export
export const TAX_RATE = 0.1;

// 2. named function export: price with tax, rounded to whole cents
export function addTax(cents) {
  // TODO
  return 0;
}

// 3. named function export: cents -> "$12.34"
export function formatUSD(cents) {
  // TODO
  return "";
}

// 4. default export: sum an array of cent amounts
export default function total(items) {
  // TODO
  return 0;
}
`,

  exportNames: ["TAX_RATE", "addTax", "formatUSD", "total"],

  requirements: [
    { pattern: /export\s+const\s+TAX_RATE/, message: "Use a named const export for TAX_RATE" },
    { pattern: /export\s+function\s+addTax/, message: "Use a named function export for addTax" },
    { pattern: /export\s+default/, message: "Use export default for total" },
  ],

  tests: [
    { name: "TAX_RATE is 0.1", run: (x) => expectEqual(x.TAX_RATE, 0.1) },
    { name: "addTax(100) is 110", run: (x) => expectEqual(x.addTax(100), 110) },
    { name: "addTax(199) rounds to 219", run: (x) => expectEqual(x.addTax(199), 219) },
    { name: 'formatUSD(1234) is "$12.34"', run: (x) => expectEqual(x.formatUSD(1234), "$12.34") },
    { name: 'formatUSD(500) is "$5.00"', run: (x) => expectEqual(x.formatUSD(500), "$5.00") },
    { name: "default export total sums the array", run: (x) => expectEqual(x.total([100, 200, 300]), 600) },
    { name: "default export total([]) is 0", run: (x) => expectEqual(x.total([]), 0) },
  ],

  solution: `export const TAX_RATE = 0.1;

export function addTax(cents) {
  return Math.round(cents * (1 + TAX_RATE));
}

export function formatUSD(cents) {
  return "$" + (cents / 100).toFixed(2);
}

export default function total(items) {
  return items.reduce((sum, cents) => sum + cents, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Named export</td><td><code>public static final int x = 1;</code></td><td><code>export const x = 1;</code></td></tr>
  <tr><td>Default export</td><td>no real equivalent</td><td>becomes the <code>default</code> binding</td></tr>
  <tr><td>Interface</td><td><code>public interface T { ... }</code></td><td>no equivalent — JS has no interfaces</td></tr>
  <tr><td>Import a class</td><td><code>import com.example.Thing;</code></td><td><code>import fn from "./m.js";</code></td></tr>
  <tr><td>Package-private member</td><td>omit the <code>public</code> modifier</td><td>omit <code>export</code></td></tr>
</table>
<p>A default export is not a special kind of value — it is exposed under the name
<code>default</code>, which is exactly why <code>import Something from "./m"</code>
(no braces) grabs it and lets you rename it freely, while named imports must
match the exported name inside braces. Java has no direct parallel: a file's
public class is publicly visible, but there is no notion of "the one thing this
file hands you when you import it without specifying a name" — every Java
import names its class explicitly. At runtime, a JavaScript module is just an
object of live value bindings — no more, no less.</p>`,
};
