  number: 16,
  title: "Promises",

  intro: `
<p>In Java you reach for <code>CompletableFuture&lt;T&gt;</code> — a strongly-typed
future value where the compiler checks every <code>thenApply</code> and
<code>exceptionally</code> stage against <code>T</code>. A JavaScript Promise
looks similar on the surface but carries no type information at all: it is
just an object with a settled state (<em>pending</em>, <em>fulfilled</em>, or
<em>rejected</em>) and a value. Nothing checks that the value matches
anything; <code>then</code> hands you whatever the previous step actually
produced.</p>
<table>
  <tr><th>Java</th><th>JavaScript</th></tr>
  <tr><td><code>CompletableFuture.completedFuture(1)</code></td><td><code>Promise.resolve(1)</code> — value is just <code>1</code></td></tr>
  <tr><td><code>.thenApply((Integer n) -&gt; ...)</code></td><td><code>.then((n) =&gt; ...)</code> — <code>n</code> is whatever came through</td></tr>
  <tr><td>exceptions surface as typed <code>Throwable</code></td><td>reject with anything; <code>catch</code> receives it as-is</td></tr>
  <tr><td><code>CompletableFuture.allOf(...)</code> — must <code>join()</code> each future yourself</td><td><code>Promise.all([...])</code> resolves to a plain array</td></tr>
</table>
<p>Two runtime facts to notice, especially coming from Java's two-flavor API.
First, <code>then</code> always returns a <em>new</em> Promise, and if your
callback returns a value that value becomes the next Promise's fulfillment —
returning a Promise flattens it automatically, the way <code>thenCompose</code>
does in Java, so there is no separate <code>thenApply</code>/<code>thenCompose</code>
split to remember. Second, a <code>throw</code> inside a <code>then</code>
callback turns into a rejection of the returned Promise, playing the role an
escaping exception plays in a <code>CompletableFuture</code> stage — which is
why <code>catch</code> can sit at the end of a chain and catch anything above
it, much like a trailing <code>.exceptionally</code>.</p>`,

  java: `CompletableFuture<Integer> doubleIt(int n) {
    return CompletableFuture.completedFuture(n * 2);
}

CompletableFuture<Double> safeDivide(double a, double b) {
    if (b == 0) {
        return CompletableFuture.failedFuture(new ArithmeticException("divide by zero"));
    }
    return CompletableFuture.completedFuture(a / b);
}

CompletableFuture<Integer> firstDone(List<CompletableFuture<Integer>> tasks) {
    return CompletableFuture.anyOf(tasks.toArray(new CompletableFuture[0]))
        .thenApply(result -> (Integer) result);
}`,

  task: `
<p>Everything here settles immediately — no timers. Build a few functions that
exercise the Promise API — the same shape of operations a Java programmer
already knows from <code>CompletableFuture</code>, but written as plain
runtime JavaScript.</p>
<ol>
  <li><code>double(n)</code> — return a Promise that <strong>fulfills</strong> with
      <code>n * 2</code> (use <code>Promise.resolve</code>).</li>
  <li><code>safeDivide(a, b)</code> — return a Promise. If <code>b</code> is
      <code>0</code>, <strong>reject</strong> with <code>new Error("divide by zero")</code>
      (use <code>Promise.reject</code>); otherwise resolve with <code>a / b</code>.</li>
  <li><code>chainDouble(n)</code> — call <code>double(n)</code> and use
      <code>.then(...)</code> to return a Promise that fulfills with the doubled
      value <em>plus 1</em>.</li>
  <li><code>divideOrDefault(a, b, fallback)</code> — call <code>safeDivide</code>
      and use <code>.catch(...)</code> so that on rejection it fulfills with
      <code>fallback</code> instead.</li>
  <li><code>sumAll(promises)</code> — use <code>Promise.all</code> to wait for an
      array of number-promises, then resolve with their sum.</li>
  <li><code>describeSettled(promises)</code> — use <code>Promise.allSettled</code>
      and resolve with an array of strings: <code>"ok:&lt;value&gt;"</code> for each
      fulfilled entry and <code>"err:&lt;message&gt;"</code> for each rejected one.</li>
</ol>`,

  exportNames: ["double", "safeDivide", "chainDouble", "divideOrDefault", "sumAll", "describeSettled"],

    { pattern: /\.then\s*\(/, message: "Use .then to chain in chainDouble" },
    { pattern: /\.catch\s*\(/, message: "Use .catch in divideOrDefault" },
    { pattern: /Promise\.all\b/, message: "Use Promise.all in sumAll" },

  tests: [
    { name: "double(21) fulfills with 42", run: async (x) => expectEqual(await x.double(21), 42) },
    { name: "safeDivide(10, 2) fulfills with 5", run: async (x) => expectEqual(await x.safeDivide(10, 2), 5) },

    {
      name: "sumAll resolves the total",
      run: async (x) => expectEqual(await x.sumAll([Promise.resolve(1), Promise.resolve(2), Promise.resolve(3)]), 6),

      name: "describeSettled reports ok and err entries",
      run: async (x) => expectDeepEqual(

  solution: `function double(n) {
  return Promise.resolve(n * 2);
}

function safeDivide(a, b) {
  if (b === 0) return Promise.reject(new Error("divide by zero"));
  return Promise.resolve(a / b);
}

function chainDouble(n) {
  return double(n).then((d) => d + 1);
}

function divideOrDefault(a, b, fallback) {
  return safeDivide(a, b).catch(() => fallback);
}

function sumAll(promises) {
  return Promise.all(promises).then((values) => values.reduce((t, v) => t + v, 0));
}

function describeSettled(promises) {
  return Promise.allSettled(promises).then((results) =>
    results.map((r) =>
      r.status === "fulfilled" ? "ok:" + r.value : "err:" + r.reason.message
    )
  );
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Already-settled value</td><td><code>CompletableFuture.completedFuture(1)</code></td><td><code>Promise.resolve(1)</code></td></tr>
  <tr><td>Rejection value</td><td>typed <code>Throwable</code> in <code>exceptionally</code>/<code>handle</code></td><td>whatever you rejected with</td></tr>
  <tr><td>Chaining</td><td>must pick <code>thenApply</code> vs <code>thenCompose</code></td><td><code>then</code> returns a new Promise; returned values flatten either way</td></tr>
  <tr><td>Wait for all</td><td><code>allOf(...)</code> gives <code>CompletableFuture&lt;Void&gt;</code>; <code>join()</code> each future yourself</td><td><code>Promise.all</code> resolves to a plain array, rejects on first failure</td></tr>
  <tr><td>Wait for all, keep errors</td><td>no built-in; build it with per-future <code>.handle(...)</code></td><td><code>Promise.allSettled</code> → <code>{status, value|reason}[]</code>, never rejects</td></tr>
  <tr><td>First to settle</td><td><code>CompletableFuture.anyOf(...)</code></td><td><code>Promise.race</code> — settles with the first result, win or lose</td></tr>
</table>
<p>Reach for <code>Promise.all</code> when you need every result and one failure
should sink the whole thing — it plays the role of <code>allOf</code> plus the
manual <code>join()</code> loop, but resolves straight to the array of results.
Reach for <code>Promise.allSettled</code> when you want to inspect each
outcome — its result objects are <code>{ status: "fulfilled", value }</code>
or <code>{ status: "rejected", reason }</code>, the same information you would
otherwise pull out of a <code>.handle((v, e) -&gt; ...)</code> stage per future.
<code>Promise.race</code> settles as soon as the first input does, whether
that first one fulfills or rejects, same as <code>anyOf</code>.</p>
<p>Runtime gotcha Java's compiler would never let you ignore:
<code>Promise.reject(x)</code> creates an already-rejected Promise, and if
nothing ever attaches a <code>catch</code> to it you get an "unhandled
rejection" warning instead of a compile error — there is no checked-exception
mechanism forcing you to handle it. And because a thrown error inside
<code>then</code> becomes a rejection, a single trailing <code>.catch</code>
(or <code>try/await/catch</code>) covers the whole chain above it, the same
way one <code>.exceptionally</code> at the end of a <code>CompletableFuture</code>
pipeline catches everything upstream.</p>`,
