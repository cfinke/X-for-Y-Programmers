const LESSON = {
  number: 9,
  title: "Classes",

  intro: `
<p>Java classes and JavaScript classes share the same <code>class</code> and
constructor vocabulary, but the underlying enforcement is very different. Java
checks field types, and its <code>public</code>/<code>private</code>/
<code>protected</code> modifiers are backed by the compiler <em>and</em> the
JVM's access control — though even that is not airtight, since reflection's
<code>setAccessible(true)</code> can punch through it. JavaScript has no type
checking at all, and until recently had no true privacy either: a field named
with a leading underscore was just a convention, nothing stopped
<code>obj.secret</code>.</p>
<table>
  <tr><th>Java</th><th>JavaScript</th></tr>
  <tr><td><code>private int balance;</code></td><td><code>#balance;</code> (truly private) or a plain field</td></tr>
  <tr><td><code>this.x = x;</code> in the constructor body (no shorthand)</td><td>same — assign <code>this.x</code> yourself</td></tr>
  <tr><td><code>private final String id;</code></td><td>plain field (no runtime enforcement)</td></tr>
  <tr><td><code>public double getArea() { … }</code> (called as <code>shape.getArea()</code>)</td><td><code>get area() { … }</code> (called as <code>shape.area</code>, no parens)</td></tr>
  <tr><td><code>private static int count = 0;</code></td><td><code>static count = 0;</code></td></tr>
</table>
<p>If you actually want a field that outside code cannot read or write,
JavaScript gives you <code>#private</code> fields — a real runtime feature
enforced by the parser itself. It is a stronger guarantee than Java's
<code>private</code>, which reflection can still bypass: reaching for
<code>#count</code> from outside the class body is not an access-control
violation, it is a <em>syntax error</em>. That is the one class feature with
no direct pre-ES2022 analogue, so it is worth getting comfortable with.</p>`,

  java: `public class Counter {
    private static int instances = 0;
    private final String label;
    private int count;

    public Counter(String label) {
        this(label, 0);
    }

    public Counter(String label, int start) {
        this.label = label;
        this.count = start;
        Counter.instances++;
    }

    public int increment() {
        this.count++;
        return this.count;
    }

    public int getValue() {
        return this.count;
    }

    public String describe() {
        return this.label + ": " + this.count;
    }

    public static void reset() {
        Counter.instances = 0;
    }
}`,

  task: `
<p>Write the plain-JavaScript runtime version of a <code>Counter</code> class —
the same behavior as the Java class above, but using JavaScript's own runtime
constructs: no type declarations, no access modifiers, no constructor
overloading for the default value — just a default parameter and a
<code>#private</code> field.</p>
<ol>
  <li>A <code>constructor(label, start = 0)</code> that stores the label and
      seeds a <strong><code>#count</code> private field</strong> from
      <code>start</code>. It must also bump a
      <strong><code>static instances</code> field</strong> each time an instance
      is created.</li>
  <li>An instance method <code>increment()</code> that adds 1 to
      <code>#count</code> and returns the new value.</li>
  <li>A <strong>getter</strong> <code>value</code> that returns the current
      <code>#count</code>.</li>
  <li>An instance method <code>describe()</code> returning
      <code>"&lt;label&gt;: &lt;count&gt;"</code>, e.g. <code>"hits: 3"</code>.</li>
  <li>A <strong>static method</strong> <code>reset()</code> that sets
      <code>Counter.instances</code> back to <code>0</code>.</li>
</ol>
<p>Export the class as <code>Counter</code>.</p>`,

  starter: `class Counter {
  // static field: total instances created

  // #private field: the current count

  constructor(label, start = 0) {
    // TODO: store label, seed #count from start, bump the static counter
  }

  increment() {
    // TODO: add 1 to #count and return the new value
  }

  get value() {
    // TODO: return the current count
  }

  describe() {
    // TODO: return "<label>: <count>"
    return "";
  }

  static reset() {
    // TODO: set instances back to 0
  }
}
`,

  exportNames: ["Counter"],

  requirements: [
    { pattern: /#count/, message: "Use a #private field named #count" },
    { pattern: /static\s+instances/, message: "Declare a static field named instances" },
    { pattern: /get\s+value\s*\(/, message: "Define a getter named value" },
    { pattern: /static\s+reset\s*\(/, message: "Define a static method named reset" },
  ],

  tests: [
    {
      name: "constructor seeds count and value getter reads it",
      run: (x) => {
        const c = new x.Counter("hits", 5);
        expectEqual(c.value, 5);
      },
    },
    {
      name: "start defaults to 0",
      run: (x) => {
        const c = new x.Counter("hits");
        expectEqual(c.value, 0);
      },
    },
    {
      name: "increment returns the new value and mutates count",
      run: (x) => {
        const c = new x.Counter("hits", 0);
        expectEqual(c.increment(), 1);
        expectEqual(c.increment(), 2);
        expectEqual(c.value, 2);
      },
    },
    {
      name: "describe formats label and count",
      run: (x) => {
        const c = new x.Counter("hits", 2);
        c.increment();
        expectEqual(c.describe(), "hits: 3");
      },
    },
    {
      name: "static instances counts constructions; reset zeroes it",
      run: (x) => {
        x.Counter.reset();
        new x.Counter("a");
        new x.Counter("b");
        expectEqual(x.Counter.instances, 2);
        x.Counter.reset();
        expectEqual(x.Counter.instances, 0);
      },
    },
    {
      name: "#count is truly private (not an own enumerable property)",
      run: (x) => {
        const c = new x.Counter("hits", 9);
        expectDeepEqual(Object.keys(c), ["label"]);
      },
    },
  ],

  solution: `class Counter {
  static instances = 0;
  #count = 0;

  constructor(label, start = 0) {
    this.label = label;
    this.#count = start;
    Counter.instances++;
  }

  increment() {
    this.#count++;
    return this.#count;
  }

  get value() {
    return this.#count;
  }

  describe() {
    return \`\${this.label}: \${this.#count}\`;
  }

  static reset() {
    Counter.instances = 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>JavaScript runtime</th></tr>
  <tr><td>Visibility</td><td><code>private x;</code> — compiler + JVM access control (reflection can bypass)</td><td><code>#x</code> — enforced by the parser, no escape hatch</td></tr>
  <tr><td>Constructor assignment</td><td><code>this.x = x;</code> by hand</td><td><code>this.x = x;</code> by hand (same)</td></tr>
  <tr><td>Field types</td><td><code>private int count = 0;</code></td><td><code>count = 0</code></td></tr>
  <tr><td>Getter</td><td><code>public int getValue() { … }</code>, called as <code>c.getValue()</code></td><td><code>get value() { … }</code>, called as <code>c.value</code></td></tr>
  <tr><td>Static</td><td><code>private static int count = 0;</code></td><td><code>static count = 0;</code> (same idea, no modifier)</td></tr>
</table>
<p>A few runtime facts worth internalizing. <code>#count</code> is not a string
key — <code>c["#count"]</code> is <code>undefined</code>, and reaching for
<code>#count</code> from outside the class body is a <em>syntax</em> error, full
stop — there is no <code>setAccessible(true)</code> equivalent to punch through
it the way Java reflection can. That is why <code>Object.keys(c)</code> lists
only <code>label</code>. Static members live on the class object itself
(<code>Counter.instances</code>), not on instances, so <code>this.instances</code>
inside a method would be <code>undefined</code> — reference the class by name,
exactly as you would with <code>Counter.instances</code> in Java. And remember:
Java's overloaded constructor for a default <code>start</code> value has no
JavaScript equivalent need — JS just writes <code>start = 0</code> once, in the
parameter list.</p>`,
};
