  intro: `
<p>In PHP there is one array type, and every array is mutable by default —
there is no built-in read-only or "frozen" array. Kotlin splits the idea into
<em>two distinct types</em>: <code>List&lt;T&gt;</code> has no mutating methods
at all, while <code>MutableList&lt;T&gt;</code> adds <code>add</code>/<code>remove</code>. You
choose the capability by choosing the builder: <code>listOf(...)</code> gives a
read-only <code>List</code>, and <code>mutableListOf(...)</code> gives a
<code>MutableList</code>.</p>
<table>
  <tr><th>PHP</th><th>Kotlin</th></tr>
  <tr><td><code>$xs = [1, 2, 3];</code></td><td><code>val xs = listOf(1, 2, 3)</code></td></tr>
  <tr><td><code>$ys = [];</code></td><td><code>val ys = mutableListOf&lt;Int&gt;()</code></td></tr>
  <tr><td><code>$ys[] = 4;</code></td><td><code>ys.add(4)</code></td></tr>
  <tr><td><code>$xs[0]</code>, <code>count($xs)</code></td><td><code>xs[0]</code>, <code>xs.size</code></td></tr>
  <tr><td><code>in_array(2, $xs)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td><code>array_map(fn($x) =&gt; $x * 2, $xs)</code></td><td><code>xs.map { it * 2 }</code></td></tr>
</table>
<p>Notice indexing (<code>xs[0]</code>) is identical, but <code>count($xs)</code>
becomes <code>.size</code>, membership uses the <code>in</code> operator, and
lambdas drop the parameter list when there is a single argument — you refer to
it as <code>it</code>. <code>first()</code> and <code>last()</code> return the
ends of a list. Crucially, calling <code>.add()</code> on a plain
<code>List</code> is a <em>compile error</em>, not a silent no-op — the type
system enforces read-only, something PHP's arrays have no way to express.</p>`,

function doubled(array \$list): array {
    return array_map(fn(\$x) => \$x * 2, \$list);
}

function evens(array \$list): array {
    return array_filter(\$list, fn(\$x) => \$x % 2 === 0);
}`,

  solution: `fun firstThree(): List<Int> {
    return listOf(1, 2, 3)
}

fun collect(n: Int): MutableList<Int> {
    val result = mutableListOf<Int>()
    for (i in 1..n) {
        result.add(i)
    }
    return result
}

fun at(list: List<Int>, i: Int): Int {
    return list[i]
}

fun count(list: List<Int>): Int {
    return list.size
}

fun has(list: List<Int>, x: Int): Boolean {
    return x in list
}

fun ends(list: List<Int>): List<Int> {
    return listOf(list.first(), list.last())
}

fun doubled(list: List<Int>): List<Int> {
    return list.map { it * 2 }
}

fun evens(list: List<Int>): List<Int> {
    return list.filter { it % 2 == 0 }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Kotlin</th></tr>
  <tr><td>Read-only list</td><td>(none — arrays are always mutable)</td><td><code>List&lt;Int&gt;</code></td></tr>
  <tr><td>Mutable list</td><td><code>array</code></td><td><code>MutableList&lt;Int&gt;</code></td></tr>
  <tr><td>Build</td><td><code>[1, 2, 3]</code></td><td><code>listOf(1, 2, 3)</code></td></tr>
  <tr><td>Append</td><td><code>$xs[] = 4;</code></td><td><code>xs.add(4)</code></td></tr>
  <tr><td>Remove value</td><td><code>array_splice($xs, array_search(4, $xs), 1);</code></td><td><code>xs.remove(4)</code></td></tr>
  <tr><td>Length</td><td><code>count($xs)</code></td><td><code>xs.size</code></td></tr>
  <tr><td>Membership</td><td><code>in_array(2, $xs)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td>Ends</td><td><code>$xs[0]</code> / <code>$xs[count($xs) - 1]</code></td><td><code>xs.first()</code> / <code>xs.last()</code></td></tr>
  <tr><td>Transform</td><td><code>array_map(fn($x) =&gt; $x * 2, $xs)</code></td><td><code>xs.map { it * 2 }</code></td></tr>
  <tr><td>Keep some</td><td><code>array_filter($xs, fn($x) =&gt; ...)</code></td><td><code>xs.filter { ... }</code></td></tr>
</table>
<p>A <code>MutableList</code> <em>is a</em> <code>List</code>, so you can pass one
anywhere a read-only <code>List</code> is expected — the receiver just cannot
mutate it. That is why <code>collect</code> returns a
<code>MutableList</code> yet compares equal to a <code>listOf(...)</code>:
equality is by contents. Both <code>map</code> and <code>filter</code> always
return a <em>new</em> read-only <code>List</code>, never mutating the source,
just like PHP's <code>array_map</code> and <code>array_filter</code> always
return a new array rather than touching the one you passed in. Reach for
<code>listOf</code> by default and upgrade to <code>mutableListOf</code> only
when you genuinely need to grow or shrink the collection in place. PHP has no
such distinction at the type level — every array supports every array
function, mutating or not — but PHP arrays are copied by value on assignment
(<code>$ys = $xs;</code> makes an independent copy), whereas Kotlin's
<code>List</code>/<code>MutableList</code> are references: assigning or
passing one around never copies the underlying data, only the type system's
permission to mutate it changes.</p>`,
