const LESSON = {
  number: 17,
  title: "Generics",

  intro: `
<p>PHP has no generics as a language feature — there's no angle-bracket
syntax the runtime understands. The closest you get is <code>mixed</code>
typing, plus docblock annotations like <code>@template</code> that static
analyzers such as PHPStan or Psalm read but PHP itself completely ignores.
Kotlin generics are the real thing: a type parameter in angle brackets on a
function or a class, checked by the compiler and threaded through for you.</p>
<table>
  <tr><th>PHP</th><th>Kotlin</th></tr>
  <tr><td><code>function first(array \$xs): mixed</code></td><td><code>fun &lt;T&gt; first(xs: List&lt;T&gt;): T</code></td></tr>
  <tr><td><code>class Box { public mixed \$value; }</code></td><td><code>class Box&lt;T&gt;(val value: T)</code></td></tr>
  <tr><td><code>@template T of Comparable</code> (docblock only, unchecked)</td><td><code>&lt;T : Comparable&lt;T&gt;&gt;</code></td></tr>
  <tr><td>no variance concept</td><td><code>out</code> / <code>in</code> (declared)</td></tr>
</table>
<p>Two things to get used to. First, the type parameter on a <em>function</em>
goes before the function name — <code>fun &lt;T&gt; first(...)</code>, not
<code>fun first&lt;T&gt;(...)</code> — while on a class it stays after the
name, roughly where a PHP docblock's <code>@template</code> tag sits above the
class. Second, a bound uses a colon (<code>T : Comparable&lt;T&gt;</code>)
where PHP has nothing enforced at all — the type is just <code>mixed</code>
unless a linter is watching. Because Kotlin has no bare <code>&gt;</code>
operator on arbitrary types, a constraint like <code>Comparable&lt;T&gt;</code>
is what lets you write <code>a &gt; b</code> inside a generic function at
all, and the compiler — not a linter — enforces it.</p>`,

  php: `<?php
/**
 * @template T
 */
class Box {
    /** @param T \$value */
    public function __construct(public mixed \$value) {}

    /**
     * @template R
     * @param callable(T): R \$fn
     * @return Box<R>
     */
    public function map(callable \$fn): Box {
        return new Box(\$fn(\$this->value));
    }
}

// T must be comparable so we can use > on it
// (PHP can't express or check that constraint — it's just documentation)
/**
 * @template T
 * @param T[] \$items
 * @return T
 */
function largest(array \$items): mixed {
    return array_reduce(
        \$items,
        fn(\$a, \$b) => \$b > \$a ? \$b : \$a,
    );
}`,

  task: `
<p>Build a small generic toolkit. Everything is top-level — no
<code>main</code> needed.</p>
<ol>
  <li>Define a generic container <code>class Box&lt;T&gt;(val value: T)</code>.
      Give it <code>fun &lt;R&gt; map(transform: (T) -&gt; R): Box&lt;R&gt;</code>
      that returns a new box holding the transformed value, and a
      <code>toString()</code> that returns <code>"Box(&lt;value&gt;)"</code>.</li>
  <li>Write <code>describe(box: Box&lt;out Any?&gt;): String</code> that returns
      <code>box.toString()</code>. The <code>out</code> projection is use-site
      variance — it lets a <code>Box&lt;Int&gt;</code> be passed where any
      <code>Box</code> is accepted.</li>
  <li>Write <code>largest</code> as a constrained generic
      <code>fun &lt;T : Comparable&lt;T&gt;&gt; largest(items: List&lt;T&gt;): T</code>
      that returns the biggest element of a non-empty list using
      <code>&gt;</code>.</li>
</ol>`,

  starter: `// 1. Box<T> — a generic container holding one value of type T
class Box<T>(val value: T) {
    // map: turn a Box<T> into a Box<R> by transforming the value
    fun <R> map(transform: (T) -> R): Box<R> = TODO()

    override fun toString(): String = "Box(\$value)"
}

// 2. describe — accept a Box of anything using use-site variance (out)
fun describe(box: Box<out Any?>): String = TODO()

// 3. largest — the largest element of a non-empty list, via a Comparable constraint
fun <T : Comparable<T>> largest(items: List<T>): T = TODO()
`,

  requirements: [
    { pattern: /class\s+Box\s*<\s*T\s*>/, message: "Define a generic container: class Box<T>" },
    { pattern: /fun\s*<\s*T\s*:\s*Comparable\s*<\s*T\s*>\s*>/, message: "Write largest with a constraint: fun <T : Comparable<T>>" },
    { pattern: /Box\s*<\s*out\b/, message: "Accept any Box with use-site variance: Box<out Any?>" },
  ],

  tests: [
    { name: "Box holds its value", code: "        expect_eq(Box(42).value, 42)" },
    { name: "map transforms Int -> Int", code: "        expect_eq(Box(3).map { it * 2 }.value, 6)" },
    { name: "map can change the type (String -> Int)", code: "        expect_eq(Box(\"hi\").map { it.length }.value, 2)" },
    { name: "describe accepts a Box<Int> via out", code: "        expect_eq(describe(Box(5)), \"Box(5)\")" },
    { name: "largest of Ints", code: "        expect_eq(largest(listOf(3, 9, 2)), 9)" },
    { name: "largest of Strings", code: "        expect_eq(largest(listOf(\"apple\", \"pear\", \"kiwi\")), \"pear\")" },
  ],

  solution: `class Box<T>(val value: T) {
    fun <R> map(transform: (T) -> R): Box<R> = Box(transform(value))

    override fun toString(): String = "Box(\$value)"
}

fun describe(box: Box<out Any?>): String = box.toString()

fun <T : Comparable<T>> largest(items: List<T>): T {
    var result = items[0]
    for (item in items) {
        if (item > result) result = item
    }
    return result
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Kotlin</th></tr>
  <tr><td>Generic function</td><td>no equivalent (<code>@template T</code> docblock, unchecked)</td><td><code>fun &lt;T&gt; f(x: T)</code></td></tr>
  <tr><td>Generic class</td><td><code>class Box { public mixed \$value; }</code></td><td><code>class Box&lt;T&gt;(val value: T)</code></td></tr>
  <tr><td>Upper bound</td><td><code>@template T of X</code> (docblock only)</td><td><code>&lt;T : X&gt;</code></td></tr>
  <tr><td>Producer (covariant)</td><td>no concept — everything is <code>mixed</code></td><td><code>class Src&lt;out T&gt;</code> / <code>Box&lt;out T&gt;</code></td></tr>
  <tr><td>Consumer (contravariant)</td><td>no concept — everything is <code>mixed</code></td><td><code>class Sink&lt;in T&gt;</code></td></tr>
</table>
<p>Kotlin makes variance <em>explicit</em>. An <code>out T</code> means the type
only ever <em>produces</em> a <code>T</code> (like a read-only source), so
<code>Box&lt;Int&gt;</code> can safely stand in for <code>Box&lt;Any?&gt;</code>.
An <code>in T</code> means the type only <em>consumes</em> a <code>T</code>.
You can declare it on the class (declaration-site) or, as in
<code>Box&lt;out Any?&gt;</code> above, at the point of use (use-site
projection). PHP has nothing like this at all — without a static analyzer
reading the docblocks, the language doesn't distinguish a "read-only source"
from a "write-only sink"; a parameter typed <code>mixed</code> accepts and
returns anything, and it's on you to use it consistently.</p>
<p>The multiple upper bounds you'd write with a stacked <code>@template T of A</code>
plus manual checks in PHP become a <code>where</code> clause in Kotlin:
<code>fun &lt;T&gt; f(x: T) where T : A, T : B</code>. And because PHP has no
generics to erase in the first place, there's no PHP equivalent to Kotlin's
type erasure — but Kotlin can still retain a type argument at runtime when a
function is marked <code>inline</code> with a <code>reified</code> parameter,
handy for <code>x is T</code> checks.</p>`,
};
