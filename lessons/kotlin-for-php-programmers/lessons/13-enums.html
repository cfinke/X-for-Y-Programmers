  number: 13,
  title: "Enums",

  intro: `
<p>A PHP <code>enum</code> (added in PHP 8.1) is a real language construct —
closer to Kotlin than the class-of-constants tricks older PHP relied on — but
it is still thinner than Kotlin's. Each case can carry at most one scalar
backing value (declared with <code>: int</code> or <code>: string</code> after
the enum name), not a full set of properties, and cases can call shared methods
but can't override one individually. Kotlin's <code>enum class</code> is a much
richer thing: each constant is a real singleton object, so it can carry its own
<em>properties</em>, share <em>methods</em>, and even override behaviour per
constant.</p>
<table>
  <tr><th>PHP</th><th>Kotlin</th></tr>
  <tr><td><code>enum Status { case Ok; case Error; }</code></td><td><code>enum class Status { OK, ERROR }</code></td></tr>
  <tr><td><code>Status::Ok</code></td><td><code>Status.OK</code></td></tr>
  <tr><td><code>Status::Ok->name</code> → <code>"Ok"</code></td><td><code>Status.OK.name</code> → <code>"OK"</code></td></tr>
  <tr><td>no built-in position (loop <code>Status::cases()</code>)</td><td><code>Status.OK.ordinal</code> → <code>0</code></td></tr>
  <tr><td><code>constant(Status::class."::".$name)</code></td><td><code>Status.valueOf("OK")</code></td></tr>
  <tr><td><code>Status::cases()</code></td><td><code>Status.values()</code></td></tr>
</table>
<p>PHP's backed enums get you partway to attaching data: <code>enum HttpStatus:
int { case OK = 200; ... }</code> lets each case carry one scalar, read back
with <code>->value</code>. Kotlin goes further — because a constant can take
constructor arguments, <code>OK(200)</code> stores <code>200</code> in a
<code>val code</code> property, and a constant can carry several such
properties at once. Every constant automatically gets <code>.name</code> (its
declared identifier as a <code>String</code>) and <code>.ordinal</code> (its
zero-based position). And a <code>when</code> over an enum is
<em>exhaustive</em> — if you handle every constant, you need no <code>else</code>,
and the compiler will flag you the day someone adds a new one, unlike PHP's
<code>match</code>, which only throws <code>UnhandledMatchError</code> at
runtime.</p>`,

  php: `enum HttpStatus: int {
    case OK = 200;
    case NotFound = 404;
    case ServerError = 500;

    public function isError(): bool {
        return $this->value >= 400;
    }

    public function label(): string {
        return match ($this) {
            HttpStatus::OK => "OK",
            HttpStatus::NotFound => "Not Found",
            HttpStatus::ServerError => "Server Error",
        };
    }
}`,

</ol>`,

  requirements: [
    { pattern: /enum class HttpStatus\(val code: Int\)/, message: "Declare enum class HttpStatus(val code: Int)" },
    { pattern: /when\s*\(\s*status\s*\)/, message: "Use a when over the status in label()" },

  tests: [
    { name: "OK carries code 200", code: "        expect_eq(HttpStatus.OK.code, 200)" },
    { name: "SERVER_ERROR carries code 500", code: "        expect_eq(HttpStatus.SERVER_ERROR.code, 500)" },
    { name: "OK is not an error", code: "        expect_true(!HttpStatus.OK.isError())" },
    { name: "NOT_FOUND is an error", code: "        expect_true(HttpStatus.NOT_FOUND.isError())" },
    { name: "name gives the identifier", code: "        expect_eq(HttpStatus.NOT_FOUND.name, \"NOT_FOUND\")" },
    { name: "ordinal is zero-based position", code: "        expect_eq(HttpStatus.SERVER_ERROR.ordinal, 2)" },
    { name: "label(OK) is \"OK\"", code: "        expect_eq(label(HttpStatus.OK), \"OK\")" },
    { name: "label(NOT_FOUND) is \"Not Found\"", code: "        expect_eq(label(HttpStatus.NOT_FOUND), \"Not Found\")" },
    { name: "allCodes lists every code", code: "        expect_eq(allCodes(), listOf(200, 404, 500))" },

  solution: `enum class HttpStatus(val code: Int) {
    OK(200),
    NOT_FOUND(404),
    SERVER_ERROR(500);

    fun isError(): Boolean = code >= 400
}

fun label(status: HttpStatus): String {
    return when (status) {
        HttpStatus.OK -> "OK"
        HttpStatus.NOT_FOUND -> "Not Found"
        HttpStatus.SERVER_ERROR -> "Server Error"
    }
}

fun allCodes(): List<Int> {
    return HttpStatus.values().map { it.code }
}

fun fromName(name: String): HttpStatus {
    return HttpStatus.valueOf(name)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Kotlin</th></tr>
  <tr><td>Declare</td><td><code>enum Status { case Ok; }</code></td><td><code>enum class Status { OK }</code></td></tr>
  <tr><td>Attach data</td><td><code>enum Status: int { case Ok = 200; }</code> (one scalar)</td><td><code>OK(200)</code> + <code>val code</code></td></tr>
  <tr><td>Constant name</td><td><code>Status::Ok->name</code></td><td><code>Status.OK.name</code></td></tr>
  <tr><td>Position</td><td>none built in</td><td><code>Status.OK.ordinal</code></td></tr>
  <tr><td>By name</td><td><code>constant(Status::class."::".$name)</code></td><td><code>Status.valueOf("OK")</code></td></tr>
  <tr><td>All members</td><td><code>Status::cases()</code></td><td><code>Status.values()</code></td></tr>
  <tr><td>Switch</td><td><code>match</code> (no compile-time exhaustiveness check against cases)</td><td>exhaustive <code>when</code> — no <code>else</code></td></tr>
</table>
<p>PHP cases can't override a shared method individually the way Kotlin
constants can — every case runs the same method body, so per-case behaviour
has to be expressed with a <code>match</code> inside that method, the way
<code>label()</code> does above. Kotlin instead lets you declare an
<code>abstract fun</code> in the enum body and give each constant its own
<code>{ ... }</code> block, turning the enum into a compact strategy table.
Note the semicolon after the last constant in Kotlin: it is required whenever
the enum body contains members (a constructor property, method, or override).
And <code>valueOf</code> throws <code>IllegalArgumentException</code> for an
unknown name (PHP's backed-enum <code>from()</code> throws
<code>ValueError</code>; <code>tryFrom()</code> returns <code>null</code>
instead), so reach for <code>entries.find { it.name == name }</code> or
<code>enumValueOf&lt;HttpStatus&gt;(...)</code> in a <code>try</code> when the
input is untrusted.</p>`,
