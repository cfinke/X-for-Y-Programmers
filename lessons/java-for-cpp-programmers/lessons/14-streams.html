  intro: `
<p>In C++ you transform ranges with algorithms from <code>&lt;algorithm&gt;</code>
and <code>&lt;numeric&gt;</code>: <code>std::copy_if</code>,
<code>std::transform</code>, <code>std::accumulate</code>, each writing its
result into an explicit output container. Java's
answer is the <strong>Stream API</strong>. You call <code>.stream()</code> on a
collection to open a pipeline, chain lazy operations, and finish with a
<em>terminal</em> operation — usually <code>.collect(...)</code> or a reduction
like <code>.sum()</code>.</p>
<table>
  <tr><th>C++</th><th>Java</th></tr>
  <tr><td><code>std::copy_if(v.begin(), v.end(), std::back_inserter(out), [](int x){ return x &gt; 0; })</code></td><td><code>list.stream().filter(x -&gt; x &gt; 0)</code></td></tr>
  <tr><td><code>std::transform(v.begin(), v.end(), std::back_inserter(out), [](auto&amp; x){ return x.name; })</code></td><td><code>list.stream().map(x -&gt; x.name())</code></td></tr>
  <tr><td><code>std::accumulate(v.begin(), v.end(), 0)</code></td><td><code>stream.reduce(0, Integer::sum)</code></td></tr>
  <tr><td><code>out</code> (already a container)</td><td><code>.collect(Collectors.toList())</code></td></tr>
</table>
<p>Two things differ from C++ algorithms. First, a stream is
<strong>single-use and lazy</strong>: nothing runs until a terminal operation
pulls values through, and you cannot reuse a stream after that — there is no
separate iterator pair to pass around a second time. Second, a
pipeline does not produce a collection by itself — you must <em>collect</em> it,
much like you must supply an output iterator (such as
<code>std::back_inserter</code>) to a C++ algorithm.
The <code>Collectors</code> class is the toolbox: <code>toList()</code>,
<code>joining(", ")</code>, <code>groupingBy(...)</code>,
<code>summingInt(...)</code>, and <code>counting()</code>. For plain number
crunching, <code>mapToInt(...)</code> turns the stream into an
<code>IntStream</code> with a direct <code>.sum()</code>.</p>`,

  cpp: `struct Product { std::string name; std::string category; int price; };

std::vector<std::string> namesUnder(const std::vector<Product>& products, int max) {
  std::vector<std::string> out;
  for (const auto& p : products) {
    if (p.price < max) out.push_back(p.name);
  }
  return out;
}

int totalPrice(const std::vector<Product>& products) {
  return std::accumulate(products.begin(), products.end(), 0,
      [](int sum, const Product& p) { return sum + p.price; });
}

std::map<std::string, int> totalByCategory(const std::vector<Product>& products) {
  std::map<std::string, int> out;
  for (const auto& p : products) out[p.category] += p.price;
  return out;
}`,

<ol>

  <li><code>totalPrice(List&lt;Product&gt; products)</code> — return the
      <code>int</code> sum of prices using <code>mapToInt(...)</code> then

  <li><code>totalPriceReduce(List&lt;Product&gt; products)</code> — same total,

</ol>`,

  solution: `record Product(String name, String category, int price) {}

class Catalog {
  static List<String> namesUnder(List<Product> products, int maxPrice) {
    return products.stream()
        .filter(p -> p.price() < maxPrice)
        .map(Product::name)
        .collect(Collectors.toList());
  }

  static int totalPrice(List<Product> products) {
    return products.stream()
        .mapToInt(Product::price)
        .sum();
  }

  static int totalPriceReduce(List<Product> products) {
    return products.stream()
        .map(Product::price)
        .reduce(0, Integer::sum);
  }

  static String nameList(List<Product> products) {
    return products.stream()
        .map(Product::name)
        .collect(Collectors.joining(", "));
  }

  static Map<String, List<Product>> byCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category));
  }

  static Map<String, Integer> totalByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.summingInt(Product::price)));
  }

  static Map<String, Long> countByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.counting()));
  }
}
`,

  notes: `
<table>
  <tr><th>Goal</th><th>C++</th><th>Java</th></tr>
  <tr><td>Start</td><td><code>v.begin(), v.end()</code></td><td><code>list.stream()</code></td></tr>
  <tr><td>Keep some</td><td><code>std::copy_if(...)</code></td><td><code>.filter(f)</code></td></tr>
  <tr><td>Transform</td><td><code>std::transform(...)</code></td><td><code>.map(f)</code></td></tr>
  <tr><td>Sum numbers</td><td><code>std::accumulate(v.begin(), v.end(), 0)</code></td><td><code>.mapToInt(f).sum()</code></td></tr>
  <tr><td>Fold</td><td><code>std::accumulate(begin, end, init, f)</code></td><td><code>.reduce(init, f)</code></td></tr>
  <tr><td>Back to a list</td><td><code>std::back_inserter(out)</code> target</td><td><code>.collect(Collectors.toList())</code></td></tr>
  <tr><td>Join to string</td><td>manual loop with <code>+=</code></td><td><code>.collect(Collectors.joining(", "))</code></td></tr>
  <tr><td>Group</td><td>manual <code>std::map</code> loop</td><td><code>Collectors.groupingBy(f)</code></td></tr>
  <tr><td>Count per group</td><td>manual</td><td><code>groupingBy(f, counting())</code></td></tr>
</table>
<p>Note the argument order in <code>std::accumulate</code>:
<code>(begin, end, initial, binaryOp)</code>, while Java's <code>reduce</code>
takes <code>(identity, accumulator)</code> on an already-open stream. The
method reference <code>Integer::sum</code> is Java shorthand for
<code>(a, b) -&gt; a + b</code> — the same idea as passing
<code>std::plus&lt;&gt;()</code> to <code>std::accumulate</code>.
<code>counting()</code> yields a
<code>Long</code>, not an <code>int</code>, which is why
<code>countByCategory</code> returns <code>Map&lt;String, Long&gt;</code>.
Remember a stream is one-shot: build the pipeline and finish it in a single
chain, since you cannot iterate the same stream twice — unlike a
<code>std::vector</code>'s iterators, which you can pass to as many algorithm
calls as you like.</p>`,
