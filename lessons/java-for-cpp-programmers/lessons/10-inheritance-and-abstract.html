  title: "Inheritance & Abstract Classes",

  intro: `
<p>C++ and Java share the same core object model: a class inherits from a
base — <code>: public Base</code> in C++, <code>extends Base</code> in Java —
calls the base constructor, and can override methods. The biggest difference
is dispatch. In C++, a method is only virtual — meaning subclasses can
override it and calls resolve at runtime — if you mark it
<code>virtual</code>; everything else binds statically at compile time. In
Java, every instance method is virtual by default, so the opposite keyword,
<code>final</code>, is what turns dispatch off.</p>
<table>
  <tr><th>C++</th><th>Java</th></tr>
  <tr><td><code>class Manager : public Employee</code></td><td><code>class Manager extends Employee</code></td></tr>
  <tr><td><code>Employee(name)</code> (base ctor init list)</td><td><code>super(name);</code></td></tr>
  <tr><td><code>Employee::totalPay()</code></td><td><code>super.totalPay();</code></td></tr>
  <tr><td><code>virtual T m() = 0;</code> (pure virtual)</td><td><code>abstract T m();</code></td></tr>
  <tr><td><code>dynamic_cast&lt;Dog*&gt;(x) != nullptr</code></td><td><code>x instanceof Dog</code></td></tr>
</table>
<p>Two things trip up newcomers. First, the <code>override</code> keyword
(C++11) is optional but you should always write it — if the signature does
not actually match a virtual base method, the compiler errors instead of
silently declaring an unrelated method. Second, Java's <code>final</code>
does double duty: on a field or local it means "assign once" (like
<code>const</code>), and on a class or method it forbids subclassing or
overriding — C++ has a matching <code>final</code> specifier for classes and
virtual methods, but it's used far less often than in Java.</p>`,

  cpp: `class Employee {
public:
  explicit Employee(std::string name) : name_(std::move(name)) {}
  virtual double basePay() const = 0;
  virtual double totalPay() const { return basePay(); }
  std::string describe() const {
    return name_ + ": " + std::to_string(totalPay());
  }
protected:
  const std::string name_;
};

class Manager : public Employee {
public:
  Manager(std::string name, double bonus)
      : Employee(std::move(name)), bonus_(bonus) {}
  double basePay() const override { return 8000; }
  double totalPay() const override { return Employee::totalPay() + bonus_; }
private:
  const double bonus_;
};`,

  task: `
<p>Build a small employee hierarchy that exercises every inheritance feature.</p>

    { name: "Payroll.totalPayroll sums the team", code: "      Employee[] team = { new Developer(\"A\"), new Manager(\"B\", 1000) };\n      expect_eq(Payroll.totalPayroll(team), 14000.0);" },

  solution: `abstract class Employee {
  protected final String name;

  protected Employee(String name) {
    this.name = name;
  }

  abstract double basePay();

  double totalPay() {
    return basePay();
  }

  String describe() {
    return name + ": " + totalPay();
  }
}

class Developer extends Employee {
  Developer(String name) {
    super(name);
  }

  @Override
  double basePay() {
    return 5000;
  }
}

class Manager extends Employee {
  private final double bonus;

  Manager(String name, double bonus) {
    super(name);
    this.bonus = bonus;
  }

  @Override
  double basePay() {
    return 8000;
  }

  @Override
  double totalPay() {
    return super.totalPay() + bonus;
  }
}

class Payroll {
  static double totalPayroll(Employee[] emps) {
    double sum = 0;
    for (Employee e : emps) {
      sum += e.totalPay();
    }
    return sum;
  }

  static int countManagers(Employee[] emps) {
    int count = 0;
    for (Employee e : emps) {
      if (e instanceof Manager) {
        count++;
      }
    }
    return count;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Java</th></tr>
  <tr><td>Subclass</td><td><code>class B : public A</code></td><td><code>class B extends A</code></td></tr>
  <tr><td>Super constructor</td><td><code>A(x)</code> in the init list</td><td><code>super(x);</code></td></tr>
  <tr><td>Super method</td><td><code>A::m()</code></td><td><code>super.m()</code></td></tr>
  <tr><td>Mark an override</td><td><code>override</code> (compiler-checked)</td><td><code>@Override</code> (compiler-checked)</td></tr>
  <tr><td>Abstract member</td><td><code>virtual T m() = 0;</code></td><td><code>abstract T m();</code></td></tr>
  <tr><td>No subclassing</td><td><code>final</code> class/method (rarely used)</td><td><code>final class</code> / <code>final</code> method</td></tr>
  <tr><td>Runtime type check</td><td><code>dynamic_cast&lt;B*&gt;(x)</code></td><td><code>x instanceof B</code></td></tr>
</table>
<p>Polymorphism works the same way it does through a C++ base-class pointer
or reference calling a <code>virtual</code> function: an <code>Employee</code>
reference holding a <code>Manager</code> runs <code>Manager.totalPay()</code>.
The big win over C++ is that dispatch is virtual by default, so you can never
forget the keyword and accidentally get static binding — and
<code>@Override</code> catches typos in method names the same way
<code>override</code> does. Note that a class with even one
<code>abstract</code> method must itself be <code>abstract</code> and cannot
be instantiated with <code>new</code>, just as a C++ class with an
un-overridden pure virtual function can't be instantiated either.</p>`,
