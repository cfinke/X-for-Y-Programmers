<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Methods",

  intro: `
<p>In C++ a function can live on its own outside any class, or as a member
function inside one — and C++ already has real function overloading, so
declaring the same name twice with different parameter lists and letting the
compiler pick at compile time will feel familiar. Java keeps overload
resolution but drops the free function: every method, even a standalone
utility, has to live inside some class, and its <em>signature</em> — the name
plus the parameter types — is how the compiler picks which method you meant.</p>
<table>
  <tr><th>C++</th><th>Java</th></tr>
  <tr><td>free function outside any class</td><td><code>static</code> method on a class</td></tr>
  <tr><td>member function</td><td>instance method (no <code>static</code>)</td></tr>
  <tr><td>overloading: several <code>f</code> with different params (native)</td><td>overloading: several <code>f</code> with different params</td></tr>
  <tr><td><code>f(std::initializer_list&lt;int&gt; xs)</code></td><td><code>f(int... xs)</code> (varargs)</td></tr>
  <tr><td><code>obj.method()</code> vs <code>Class::method()</code> (static)</td><td><code>Class.method()</code> (static) vs <code>obj.method()</code> (instance)</td></tr>
</table>
<p>Overloading transfers almost directly: both languages resolve the call at
compile time based on the argument types, and both let one overload delegate
to another. The gap is variadic parameters. C++ offers several ways to write
"zero or more arguments" — a C-style <code>...</code>, a variadic template, or
<code>std::initializer_list&lt;T&gt;</code> — and it's that last one, iterated
with a range-for loop, that maps most cleanly onto Java's
<strong>varargs</strong> (<code>int... xs</code>), which hands the extra
arguments to you as a plain array.</p>
<p>A <code>static</code> method belongs to the class and is called as
<code>MathUtil.max(...)</code>. An instance method belongs to an object and reads
the object's fields through <code>this</code>. This lesson is all static utility
methods; instance methods get their own lesson.</p>`,

  cpp: `int add(int a, int b) {
  return a + b;
}

// C++ already has real overloading -- no faking needed:
std::string label(int x) {
  return std::to_string(x);
}

std::string label(int x, const std::string& unit) {
  return std::to_string(x) + unit;
}

// std::initializer_list is the closest match to Java varargs
int sum(std::initializer_list<int> xs) {
  int total = 0;
  for (int x : xs) {
    total += x;
  }
  return total;
}`,

  task: `
<p>Write a class <code>MathUtil</code> full of <code>static</code> methods. You
will practice all three method features at once:</p>
<ol>
  <li><code>add(int a, int b)</code> returns their sum.</li>
  <li>Overload <code>label</code>: <code>label(int x)</code> returns the number
      as a string (e.g. <code>"5"</code>), and <code>label(int x, String unit)</code>
      returns the number with the unit appended (e.g. <code>"5kg"</code>). Same
      name, different parameter lists.</li>
  <li><code>sum(int... xs)</code> uses varargs: <code>sum()</code> is
      <code>0</code>, <code>sum(1, 2, 3)</code> is <code>6</code>. Inside the
      method <code>xs</code> is an <code>int[]</code>.</li>
  <li><code>max(int... xs)</code> returns the largest value, or <code>0</code>
      when called with no arguments.</li>
</ol>
<p>Have <code>label(int x)</code> call <code>label(x, "")</code> if you like —
one overload delegating to another is idiomatic.</p>`,

  starter: `class MathUtil {
  static int add(int a, int b) {
    return 0; // TODO
  }

  static String label(int x) {
    return ""; // TODO
  }

  static String label(int x, String unit) {
    return ""; // TODO
  }

  static int sum(int... xs) {
    return 0; // TODO
  }

  static int max(int... xs) {
    return 0; // TODO
  }
}
`,

  requirements: [
    { pattern: /static\s+String\s+label\s*\(\s*int\s+\w+\s*\)[\s\S]*static\s+String\s+label\s*\(\s*int\s+\w+\s*,/,
      message: "Declare two overloads of label: label(int) and label(int, String)" },
    { pattern: /int\s*\.\.\.\s*\w+/, message: "Use varargs (int... xs) for sum and max" },
  ],

  tests: [
    { name: "add(2, 3) is 5", code: "      expect_eq(MathUtil.add(2, 3), 5);" },
    { name: 'label(5) is "5"', code: "      expect_eq(MathUtil.label(5), \"5\");" },
    { name: 'label(5, "kg") is "5kg"', code: "      expect_eq(MathUtil.label(5, \"kg\"), \"5kg\");" },
    { name: "sum() is 0", code: "      expect_eq(MathUtil.sum(), 0);" },
    { name: "sum(1, 2, 3) is 6", code: "      expect_eq(MathUtil.sum(1, 2, 3), 6);" },
    { name: "max(3, 9, 4) is 9", code: "      expect_eq(MathUtil.max(3, 9, 4), 9);" },
    { name: "max() is 0", code: "      expect_eq(MathUtil.max(), 0);" },
  ],

  solution: `class MathUtil {
  static int add(int a, int b) {
    return a + b;
  }

  static String label(int x) {
    return label(x, "");
  }

  static String label(int x, String unit) {
    return x + unit;
  }

  static int sum(int... xs) {
    int total = 0;
    for (int x : xs) {
      total += x;
    }
    return total;
  }

  static int max(int... xs) {
    if (xs.length == 0) {
      return 0;
    }
    int best = xs[0];
    for (int x : xs) {
      if (x > best) {
        best = x;
      }
    }
    return best;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Java</th></tr>
  <tr><td>Utility function</td><td>free function</td><td><code>static</code> method</td></tr>
  <tr><td>Two shapes, one name</td><td>native overloading: <code>f(int)</code>, <code>f(int, string)</code></td><td>two overloads: <code>f(int)</code>, <code>f(int, String)</code></td></tr>
  <tr><td>Variadic</td><td><code>f(std::initializer_list&lt;int&gt; xs)</code></td><td><code>f(int... xs)</code></td></tr>
  <tr><td>Params inside</td><td><code>std::initializer_list&lt;int&gt;</code>, walked with a range-for</td><td><code>xs</code> is an <code>int[]</code></td></tr>
  <tr><td>Delegation</td><td>default argument, or one overload calling another</td><td>one overload calls another</td></tr>
</table>
<p>Overload resolution happens at compile time from the static argument types in
both languages, so this part of Java needs no new mental model if you already
reach for overloading in C++ — each overload is its own method with its own
body (or one delegates to another, as <code>label(int)</code> does here).
Varargs must be the <em>last</em> parameter, and <code>f()</code> with no
varargs arguments hands you an empty array, not <code>null</code> — which is
why <code>sum()</code> safely returns <code>0</code>, the same guarantee an
empty <code>std::initializer_list</code> gives you in C++. One caveat: you
can't overload on return type alone; the parameter lists must differ.</p>`,
};
