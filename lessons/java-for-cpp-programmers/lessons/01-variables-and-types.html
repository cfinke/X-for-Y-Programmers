const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Java and C++ are both statically typed, both class-friendly, and both
demand the type up front for every variable — no surprises there. Where they
diverge is memory and structure: C++ gives you raw pointers, stack objects,
and manual lifetime management, while Java hands everything off to the
garbage collector and treats non-primitive values as references you never
have to free.</p>
<table>
  <tr><th>C++</th><th>Java</th></tr>
  <tr><td><code>int age = 36;</code></td><td><code>int age = 36;</code></td></tr>
  <tr><td><code>const std::string name = "Ada";</code></td><td><code>final String name = "Ada";</code></td></tr>
  <tr><td><code>int</code>, <code>long</code>, <code>double</code>, … (several numeric types)</td><td><code>int</code>, <code>long</code>, <code>double</code>, … (distinct)</td></tr>
  <tr><td>free functions live outside any class</td><td>methods live inside a class</td></tr>
</table>
<p>Two adjustments matter most. First, C++'s numeric types map over closely —
<code>int</code>, <code>long</code>, and <code>double</code> behave the same
way, and the split is just as load-bearing: <code>7 / 2</code> is <code>3</code>
(integer division), while <code>7 / 2.0</code> is <code>3.5</code>, exactly as
in C++. Second, Java has no free functions — every method belongs to a class,
so a header full of standalone helper functions becomes a class full of
<code>static</code> methods.</p>`,

  cpp: `int age = 36;
const std::string userName = "Ada";

std::string describe(const std::string& name, int age) {
  return name + " is " + std::to_string(age);
}`,

  task: `
<p>Write the Java version. Java has no top-level functions, so put your methods
in a class:</p>
<ol>
  <li>Declare a class <code>Basics</code> holding <code>static</code> methods.</li>
  <li><code>add(int a, int b)</code> returns their sum.</li>
  <li><code>describe(String name, int age)</code> returns a string like
      <code>"Ada is 36"</code>.</li>
  <li><code>divide(int a, int b)</code> returns a <code>double</code>, so
      <code>divide(7, 2)</code> is <code>3.5</code>, not <code>3</code>. Cast one
      operand: <code>(double) a / b</code>.</li>
</ol>`,

  starter: `class Basics {
  static int add(int a, int b) {
    return 0; // TODO
  }

  static String describe(String name, int age) {
    return ""; // TODO
  }

  static double divide(int a, int b) {
    return 0; // TODO: watch out for integer division
  }
}
`,

  requirements: [
    { pattern: /class\s+Basics/, message: "Declare a class named Basics" },
    { pattern: /static/, message: "Give Basics static methods" },
    { pattern: /\(double\)/, message: "Cast to (double) so divide returns a fractional result" },
  ],

  tests: [
    { name: "add(2, 3) is 5", code: "      expect_eq(Basics.add(2, 3), 5);" },
    { name: 'describe("Ada", 36) is "Ada is 36"', code: "      expect_eq(Basics.describe(\"Ada\", 36), \"Ada is 36\");" },
    { name: 'describe("Rob", 68) is "Rob is 68"', code: "      expect_eq(Basics.describe(\"Rob\", 68), \"Rob is 68\");" },
    { name: "divide(7, 2) is 3.5", code: "      expect_eq(Basics.divide(7, 2), 3.5);" },
    { name: "divide(10, 4) is 2.5", code: "      expect_eq(Basics.divide(10, 4), 2.5);" },
  ],

  solution: `class Basics {
  static int add(int a, int b) {
    return a + b;
  }

  static String describe(String name, int age) {
    return name + " is " + age;
  }

  static double divide(int a, int b) {
    return (double) a / b;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Java</th></tr>
  <tr><td>Typed local</td><td><code>int x = 1;</code></td><td><code>int x = 1;</code></td></tr>
  <tr><td>Inferred local</td><td><code>auto x = 1;</code></td><td><code>var x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>const int x = 1;</code></td><td><code>final int x = 1;</code></td></tr>
  <tr><td>Numeric types</td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>float</code>…</td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>float</code>…</td></tr>
  <tr><td>Free function</td><td><code>std::string f() {}</code></td><td><code>static</code> method in a class</td></tr>
</table>
<p>The numeric split is a rule you already know from C++: <code>int / int</code>
throws away the remainder. Promote one side to <code>double</code> (a cast, a
literal like <code>2.0</code>, or a <code>double</code> variable) and the whole
expression becomes floating point. The main shift is where the code lives —
Java has no free functions, so every helper you'd have written outside a class
in C++ becomes a <code>static</code> method here.</p>`,
};
