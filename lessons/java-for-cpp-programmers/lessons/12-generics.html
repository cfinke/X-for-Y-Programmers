  title: "Generics",

  intro: `
<p>Generics will feel familiar: both languages write the type parameter in
angle brackets, and both use them to make containers and helpers reusable
without giving up type safety. C++ calls this "templates," and the syntax
lines up closely enough that Java even borrowed <code>extends</code> for its
bounds, playing a role similar to a C++ concept or a SFINAE constraint.</p>
<table>
  <tr><th>C++</th><th>Java</th></tr>
  <tr><td><code>template&lt;typename T&gt; class Box { ... };</code></td><td><code>class Box&lt;T&gt; { ... }</code></td></tr>
  <tr><td><code>template&lt;typename T&gt; T id(T x)</code></td><td><code>&lt;T&gt; T id(T x)</code></td></tr>
  <tr><td><code>template&lt;typename T&gt; requires std::totally_ordered&lt;T&gt;</code></td><td><code>&lt;T extends Comparable&lt;T&gt;&gt;</code></td></tr>
  <tr><td><code>std::vector&lt;int&gt;</code> (templates hold primitives fine)</td><td><code>List&lt;Integer&gt;</code>, no primitives in generics</td></tr>
</table>
<p>Two differences bite. First, a generic method puts its type parameter
<em>before</em> the return type — <code>static &lt;T&gt; T identity(T x)</code> —
not after the name, the way a C++ <code>template&lt;typename T&gt;</code> line
sits before the function signature it modifies. Second, Java generics are
<em>invariant</em>: a <code>List&lt;Integer&gt;</code> is <strong>not</strong> a
<code>List&lt;Number&gt;</code>, whereas C++ templates simply instantiate a
distinct type per argument and don't have this subtyping question in the same
form. To accept "a list of some subtype of Number" in Java you use a wildcard:
<code>List&lt;? extends Number&gt;</code>. And because of type erasure, Java
generics only work over reference types, so you write
<code>Box&lt;Integer&gt;</code>, never <code>Box&lt;int&gt;</code> — unlike a
C++ template, which is monomorphized per type and happily instantiates
<code>Box&lt;int&gt;</code> directly.</p>`,

  cpp: `template<typename T>
class Box {
public:
  explicit Box(T value) : value_(value) {}
  T get() const { return value_; }
private:
  T value_;
};

template<typename T>
T identity(T x) { return x; }

template<typename T, typename Less>
T max_of(const std::vector<T>& items, Less less) {
  T best = items[0];
  for (const auto& x : items) if (less(best, x)) best = x;
  return best;
}

double sum(const std::vector<double>& nums) {
  double total = 0;
  for (double n : nums) total += n;
  return total;
}`,

  task: `
<p>Build a small generic toolkit. Write two top-level types:</p>
<ol>

  solution: `class Box<T> {
  private T value;

  Box(T value) {
    this.value = value;
  }

  T get() {
    return value;
  }

  void set(T value) {
    this.value = value;
  }
}

class Generics {
  static <T> T identity(T x) {
    return x;
  }

  static <T extends Comparable<T>> T max(List<T> items) {
    T best = items.get(0);
    for (T x : items) {
      if (x.compareTo(best) > 0) {
        best = x;
      }
    }
    return best;
  }

  static double sum(List<? extends Number> nums) {
    double total = 0;
    for (Number n : nums) {
      total += n.doubleValue();
    }
    return total;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Java</th></tr>
  <tr><td>Generic class</td><td><code>template&lt;typename T&gt; class Box { ... };</code></td><td><code>class Box&lt;T&gt;</code></td></tr>
  <tr><td>Generic method</td><td><code>template&lt;typename T&gt; T id(T x)</code></td><td><code>&lt;T&gt; T id(T x)</code> (param before return type)</td></tr>
  <tr><td>Upper bound</td><td>concept / <code>requires</code> clause</td><td><code>&lt;T extends X&gt;</code></td></tr>
  <tr><td>Codegen</td><td>monomorphized: a fresh copy compiled per type</td><td><code>List&lt;? extends Number&gt;</code> (one erased class, explicit wildcard)</td></tr>
  <tr><td>Element type</td><td><code>Box&lt;int&gt;</code> (templates take primitives directly)</td><td><code>Box&lt;Integer&gt;</code> (no <code>int</code>)</td></tr>
</table>
<p>The wildcard is the piece with no direct C++ template equivalent, because
C++ templates don't need one: <code>std::vector&lt;int&gt;</code> and
<code>std::vector&lt;double&gt;</code> are just two separately compiled types,
and a template function taking <code>const std::vector&lt;T&gt;&amp;</code>
gets instantiated fresh for whichever <code>T</code> you pass. Java instead
compiles <code>List&lt;T&gt;</code> once and erases <code>T</code> at runtime,
so a method that only <em>reads</em> Numbers must say
<code>List&lt;? extends Number&gt;</code> to accept a <code>List&lt;Integer&gt;</code>
in place of a <code>List&lt;Number&gt;</code>. The mirror image,
<code>? super T</code>, is for lists you only <em>write</em> to — the classic
"producer extends, consumer super" rule. Also remember erasure: at runtime a
<code>Box&lt;String&gt;</code> and a <code>Box&lt;Integer&gt;</code> are the
same class (unlike two C++ template instantiations, which are genuinely
distinct types), so you cannot write <code>new T()</code> or
<code>x instanceof Box&lt;String&gt;</code>.</p>`,
