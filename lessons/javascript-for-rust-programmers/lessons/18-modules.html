<script>
const LESSON = {
  number: 18,
  title: "Modules",

  intro: `
<p>Rust organizes code into modules with <code>mod</code>, exposes items with
<code>pub</code>, and pulls a path into scope with <code>use</code> — but none
of that syntax survives into JavaScript, because Rust compiles all the way
down to native code, not down to JS. ES modules are JavaScript's own runtime
system: <code>export</code>, <code>import</code>, and <code>export default</code>
are live bindings the engine resolves while the program runs, not paths a
compiler checks once and discards. Where Rust's module tree is a compile-time
namespace (<code>crate::pricing::add_tax</code>, visibility enforced by the
compiler), a JavaScript module is just an object of live bindings, and a
default export is nothing more magical than a property named
<code>default</code>.</p>
<table>
  <tr><th>Rust</th><th>JavaScript (runtime)</th></tr>
  <tr><td><code>pub const TAX: f64 = 0.1;</code></td><td><code>export const TAX = 0.1;</code></td></tr>
  <tr><td><code>pub struct Cart { ... }</code></td><td>no structs — exports are plain values</td></tr>
  <tr><td><code>use crate::pricing::Cart;</code></td><td>no type-only import — everything is a value</td></tr>
  <tr><td><code>pub fn total(items: &amp;[i64]) -> i64</code> (no privileged "default" item)</td><td><code>export default function total() {}</code></td></tr>
</table>
<p>The mental shift: a named export is a <em>value</em> you name, and the
default export is just the one binding the module hands back when you import it
without braces. Rust has nothing corresponding to that — every <code>pub</code>
item lives at its own explicit path, and there is no way to mark one item as
"the thing this module hands back by default."</p>`,

  rust: `pub const TAX_RATE: f64 = 0.1;

pub fn add_tax(cents: i64) -> i64 {
    ((cents as f64) * (1.0 + TAX_RATE)).round() as i64
}

pub fn format_usd(cents: i64) -> String {
    format!("\${:.2}", cents as f64 / 100.0)
}

// no single "default" item — callers just use the full path
pub fn total(items: &[i64]) -> i64 {
    items.iter().sum()
}`,

  task: `
<p>Build a tiny pricing module using plain-JavaScript exports. Export every
symbol directly (no type annotations), and give the module one default export:</p>
<ol>
  <li><strong>Named const export</strong>: <code>TAX_RATE</code> = <code>0.1</code>.</li>
  <li><strong>Named function export</strong>: <code>addTax(cents)</code> returns
      the price with tax added, rounded to a whole number of cents
      (<code>Math.round(cents * (1 + TAX_RATE))</code>).</li>
  <li><strong>Named function export</strong>: <code>formatUSD(cents)</code>
      returns a string like <code>"$12.34"</code> (dollars with two decimals).</li>
  <li><strong>Default export</strong>: <code>total(items)</code>, a function that
      sums an array of cent amounts and returns the total (<code>0</code> for an
      empty array). Export it with <code>export default</code>.</li>
</ol>`,

  starter: `// 1. named const export
export const TAX_RATE = 0.1;

// 2. named function export: price with tax, rounded to whole cents
export function addTax(cents) {
  // TODO
  return 0;
}

// 3. named function export: cents -> "$12.34"
export function formatUSD(cents) {
  // TODO
  return "";
}

// 4. default export: sum an array of cent amounts
export default function total(items) {
  // TODO
  return 0;
}
`,

  exportNames: ["TAX_RATE", "addTax", "formatUSD", "total"],

  requirements: [
    { pattern: /export\s+const\s+TAX_RATE/, message: "Use a named const export for TAX_RATE" },
    { pattern: /export\s+function\s+addTax/, message: "Use a named function export for addTax" },
    { pattern: /export\s+default/, message: "Use export default for total" },
  ],

  tests: [
    { name: "TAX_RATE is 0.1", run: (x) => expectEqual(x.TAX_RATE, 0.1) },
    { name: "addTax(100) is 110", run: (x) => expectEqual(x.addTax(100), 110) },
    { name: "addTax(199) rounds to 219", run: (x) => expectEqual(x.addTax(199), 219) },
    { name: 'formatUSD(1234) is "$12.34"', run: (x) => expectEqual(x.formatUSD(1234), "$12.34") },
    { name: 'formatUSD(500) is "$5.00"', run: (x) => expectEqual(x.formatUSD(500), "$5.00") },
    { name: "default export total sums the array", run: (x) => expectEqual(x.total([100, 200, 300]), 600) },
    { name: "default export total([]) is 0", run: (x) => expectEqual(x.total([]), 0) },
  ],

  solution: `export const TAX_RATE = 0.1;

export function addTax(cents) {
  return Math.round(cents * (1 + TAX_RATE));
}

export function formatUSD(cents) {
  return "$" + (cents / 100).toFixed(2);
}

export default function total(items) {
  return items.reduce((sum, cents) => sum + cents, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Named export</td><td><code>pub const X: i32 = 1;</code></td><td><code>export const x = 1;</code></td></tr>
  <tr><td>Default export</td><td>no equivalent — no privileged "default" item</td><td>becomes the <code>default</code> binding</td></tr>
  <tr><td>Type definition</td><td><code>pub struct Cart { ... }</code> (real, compiled item)</td><td>no types — exports are plain values only</td></tr>
  <tr><td>Bringing a name into scope</td><td><code>use crate::pricing::add_tax;</code></td><td><code>import { addTax } from "./pricing.js";</code></td></tr>
  <tr><td>Import a default</td><td>not applicable — every item has an explicit path</td><td><code>import fn from "./m";</code></td></tr>
</table>
<p>A default export is not a special kind of value — it is exposed under the name
<code>default</code>, which is exactly why <code>import Something from "./m"</code>
(no braces) grabs it and lets you rename it freely, while named imports must
match the exported name inside braces. Rust has no shortcut like that: every
<code>pub</code> item lives at its own explicit path
(<code>crate::pricing::total</code>), and a <code>use</code> statement always
names exactly what it pulls in, so there is nothing corresponding to "the one
thing this module hands back by default." At runtime, a JavaScript module is
just an object of live value bindings — no more, no less — whereas a Rust
crate's module tree, item visibility, and <code>use</code> paths are all
resolved once at compile time and leave nothing to inspect while the program
runs.</p>`,
};
