const LESSON = {
  number: 15,
  title: "Iterators & Generators",

  intro: `
<p>In Rust you implement the <code>Iterator</code> trait — a single required
method, <code>fn next(&amp;mut self) -&gt; Option&lt;Self::Item&gt;</code>, that
returns <code>Some(value)</code> or <code>None</code> once exhausted. JavaScript's
iterator protocol is the untyped cousin of that trait: an object is
<em>iterable</em> if it has a method under the key <code>Symbol.iterator</code>
that returns an <em>iterator</em> — any object with a <code>next()</code> method
returning <code>{ value, done }</code> instead of an <code>Option</code>.</p>
<table>
  <tr><th>Rust</th><th>JavaScript</th></tr>
  <tr><td><code>fn next(&amp;mut self) -&gt; Option&lt;i32&gt;</code></td><td><code>function* range(a, b)</code></td></tr>
  <tr><td><code>let it = xs.into_iter();</code></td><td><code>const it = xs[Symbol.iterator]();</code></td></tr>
  <tr><td><code>Some(v)</code> / <code>None</code></td><td>a plain <code>{ value, done }</code> object</td></tr>
  <tr><td>compiler enforces the shape via the <code>Iterator</code> trait</td><td><code>for...of</code> just calls <code>next()</code></td></tr>
</table>
<p>Stable Rust has no <code>yield</code> keyword for hand-rolled state machines —
generators are an unstable, nightly-only feature — so you normally write a
<code>struct</code> holding the iteration state and implement <code>Iterator</code>
on it by hand, or lean on adaptors like <code>.chain()</code> and
<code>.take(n)</code>. JavaScript's <code>function*</code> (generator function)
gives you that struct for free: calling it returns an object that is <em>its
own</em> iterator, and each <code>yield</code> hands a value back to the consumer
and pauses until <code>next()</code> is called again. <code>yield*</code>
delegates to another iterable, the way Rust's <code>.chain()</code> stitches two
iterators end to end. Because generators are lazy — like Rust iterators, which do
nothing until polled — <code>range(0, Infinity)</code> is fine until you actually
pull values from it.</p>`,

  rust: `struct Range {
    current: i32,
    end: i32,
}

impl Iterator for Range {
    type Item = i32;
    fn next(&mut self) -> Option<i32> {
        if self.current < self.end {
            let v = self.current;
            self.current += 1;
            Some(v)
        } else {
            None
        }
    }
}

fn range(start: i32, end: i32) -> Range {
    Range { current: start, end }
}

fn take<I: Iterator>(mut iter: I, n: usize) -> Vec<I::Item> {
    let mut out = Vec::new();
    for _ in 0..n {
        match iter.next() {
            Some(v) => out.push(v),
            None => break,
        }
    }
    out
}`,

  task: `
<p>Build a tiny lazy-sequence toolkit using the iterator protocol directly — no
<code>struct</code>s or <code>Iterator</code> trait impls in the runtime code:</p>
<ol>
  <li><code>range(start, end)</code> — a generator function that
      <code>yield</code>s every integer from <code>start</code> up to but not
      including <code>end</code>.</li>
  <li><code>take(iterable, n)</code> — pull at most <code>n</code> values from
      any iterable by driving its <code>next()</code>, returning them as an
      array. Stop early if the iterable runs out.</li>
  <li><code>concat(a, b)</code> — a generator that yields everything from
      <code>a</code>, then everything from <code>b</code>, using
      <code>yield*</code>.</li>
  <li><code>countUpFrom(start)</code> — return a custom <em>iterable object</em>
      (not a generator function) whose <code>[Symbol.iterator]()</code> counts
      <code>start</code>, <code>start + 1</code>, <code>start + 2</code>, …
      forever.</li>
</ol>`,

  starter: `// 1. range(start, end) — generator yielding start .. end-1
function* range(start, end) {
  // TODO
}

// 2. take(iterable, n) — first n values as an array
function take(iterable, n) {
  // TODO
  return [];
}

// 3. concat(a, b) — generator delegating with yield*
function* concat(a, b) {
  // TODO
}

// 4. countUpFrom(start) — a custom iterable object (infinite)
function countUpFrom(start) {
  // TODO
  return {};
}
`,

  exportNames: ["range", "take", "concat", "countUpFrom"],

  requirements: [
    { pattern: /function\s*\*\s*range/, message: "range must be a generator function (function*)" },
    { pattern: /yield\s*\*/, message: "Use yield* to delegate inside concat" },
    { pattern: /\[\s*Symbol\.iterator\s*\]/, message: "countUpFrom must define a [Symbol.iterator]() method" },
    { pattern: /\.next\s*\(/, message: "take must drive the iterator by calling next()" },
  ],

  tests: [
    { name: "range(0, 5) spreads to [0,1,2,3,4]", run: (x) => expectDeepEqual([...x.range(0, 5)], [0, 1, 2, 3, 4]) },
    { name: "range(2, 2) is empty", run: (x) => expectDeepEqual(Array.from(x.range(2, 2)), []) },
    { name: "take(range(10, 100), 3) is [10,11,12]", run: (x) => expectDeepEqual(x.take(x.range(10, 100), 3), [10, 11, 12]) },
    { name: "take stops early when the source runs out", run: (x) => expectDeepEqual(x.take(x.range(0, 2), 5), [0, 1]) },
    { name: "concat yields a then b", run: (x) => expectDeepEqual([...x.concat(x.range(0, 2), x.range(5, 7))], [0, 1, 5, 6]) },
    { name: "concat works with arrays (any iterable)", run: (x) => expectDeepEqual(Array.from(x.concat([1, 2], [3])), [1, 2, 3]) },
    { name: "countUpFrom is an infinite iterable driven by take", run: (x) => expectDeepEqual(x.take(x.countUpFrom(100), 4), [100, 101, 102, 103]) },
  ],

  solution: `function* range(start, end) {
  for (let i = start; i < end; i++) {
    yield i;
  }
}

function take(iterable, n) {
  const out = [];
  const it = iterable[Symbol.iterator]();
  for (let i = 0; i < n; i++) {
    const r = it.next();
    if (r.done) break;
    out.push(r.value);
  }
  return out;
}

function* concat(a, b) {
  yield* a;
  yield* b;
}

function countUpFrom(start) {
  return {
    [Symbol.iterator]() {
      let i = start;
      return {
        next() {
          return { value: i++, done: false };
        },
      };
    },
  };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>JavaScript</th></tr>
  <tr><td>Iterable contract</td><td><code>IntoIterator</code></td><td>object with <code>[Symbol.iterator]()</code></td></tr>
  <tr><td>Iterator contract</td><td><code>Iterator</code> trait — <code>next(&amp;mut self) -&gt; Option&lt;Item&gt;</code></td><td>object with <code>next()</code> → <code>{ value, done }</code></td></tr>
  <tr><td>Generator</td><td>no stable <code>yield</code> — a <code>struct</code> plus a hand-written <code>impl Iterator</code></td><td>result of calling a <code>function*</code></td></tr>
  <tr><td>Collect to array</td><td><code>iter.collect::&lt;Vec&lt;_&gt;&gt;()</code></td><td><code>[...gen]</code> / <code>Array.from(gen)</code> — both drive the protocol</td></tr>
</table>
<p>A generator object is <em>both</em> an iterator and an iterable: its own
<code>[Symbol.iterator]()</code> returns itself. That is why you can spread it
directly with <code>[...range(0, 5)]</code>. Note the consequence — a generator
is single-use; once fully consumed, iterating it again yields nothing, much like
a Rust iterator that has already returned <code>None</code>. A custom iterable
object like <code>countUpFrom</code> is different: each call to
<code>[Symbol.iterator]()</code> starts a fresh iterator, so it can be looped
over repeatedly — the same way calling <code>.iter()</code> again on a Rust
collection hands back a brand-new iterator without disturbing the collection
itself.</p>
<p>Beware infinite iterables with <code>[...gen]</code> or <code>Array.from</code>
— they will loop forever. That is exactly what <code>take</code> guards against:
it pulls a bounded number of values and never asks for more, the same discipline
you'd apply calling <code>.take(n)</code> on an infinite Rust iterator like
<code>(0..).map(...)</code>.</p>`,
};
