  title: "Async & Await",

  intro: `
<p>In Rust, an <code>async fn</code> returns <code>impl Future&lt;Output = T&gt;</code>,
and that future does <em>nothing</em> until something polls it — <code>.await</code>,
<code>block_on</code>, or a runtime like Tokio. In JavaScript, calling an
<code>async</code> function starts running its body immediately; you just don't
see the result until you <code>await</code> the promise it hands back. Same
mental shape — a value that resolves later — but JavaScript's promises are
eager and always backed by a built-in event loop, while Rust's futures are lazy
and inert until an executor drives them. Once you get past that, <code>await</code>
in both languages does the same job: suspend here, resume with whatever value
this thing settles to — <code>number</code>, string, object, or
<code>undefined</code> in JS; the future's <code>Output</code> type in Rust.</p>
<table>
  <tr><th>Rust</th><th>JavaScript</th></tr>
  <tr><td><code>async fn f() -&gt; i32</code></td><td><code>async function f()</code></td></tr>
  <tr><td><code>let n: i32 = f().await;</code></td><td><code>const n = await f();</code></td></tr>
  <tr><td><code>tokio::join!(a, b)</code></td><td><code>Promise.all([a, b])</code></td></tr>
  <tr><td><code>Result&lt;T, E&gt;</code> returned and matched/<code>?</code>-propagated</td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today. First, <code>await</code> in sequence is
<em>serial</em>: each line waits for the previous promise to settle before the next
even starts — just as awaiting one future to completion before starting the next
is serial in Rust. To run independent work concurrently you hand the promises to
<code>Promise.all</code>, which waits for all of them and resolves to an array of
their results — the rough equivalent of <code>tokio::join!</code> or
<code>futures::future::join_all</code>. Second, a rejected promise surfaces as a
thrown value at the <code>await</code>, so a plain <code>try/catch</code> catches
it — and if you do not catch it, it propagates out of your <code>async</code>
function as a rejected promise the caller must handle. Rust has no equivalent of
an untyped throw; the closest analog is an async fn returning
<code>Result&lt;T, E&gt;</code>, whose <code>Err</code> arm you match on or
propagate with <code>?</code>.</p>`,

  rust: `async fn double(n: i32) -> i32 {
    n * 2
}

async fn sum_doubled(a: i32, b: i32) -> i32 {
    let (x, y) = tokio::join!(double(a), double(b));
    x + y
}

async fn safe_double(n: i32) -> i32 {
    match risky_double(n).await {
        Ok(v) => v,
        Err(_) => 0,
    }
}`,

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>JavaScript</th></tr>
  <tr><td>Return of async fn</td><td><code>impl Future&lt;Output = T&gt;</code>, lazy</td><td>a promise; eager, contents unlabeled</td></tr>
  <tr><td>Awaited value</td><td>the future's <code>Output</code> type, checked at compile time</td><td>whatever it settles to</td></tr>
  <tr><td>Serial awaits</td><td><code>a.await; b.await;</code></td><td>b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td><code>tokio::join!(a, b)</code></td><td><code>Promise.all([...])</code>; resolves to a results array</td></tr>
  <tr><td>Caught failure</td><td><code>match x.await { Ok(v) =&gt; ..., Err(e) =&gt; ... }</code></td><td><code>catch (e)</code> — any thrown value</td></tr>
</table>
<p>The most common runtime performance bug that even a strict type system will
never flag: awaiting independent work in a loop or in sequence when it could run
concurrently. Two serial <code>await</code>s take as long as the sum of both
promises; <code>Promise.all</code> takes as long as the slowest one. Reach for
<code>Promise.all</code> whenever the tasks do not depend on each other — the
same instinct that leads you to <code>tokio::join!</code> or
<code>join_all</code> instead of a sequence of <code>.await</code>s in Rust.</p>
<p>On errors: a rejected promise becomes a thrown value at its <code>await</code>.
If nothing catches it, your <code>async</code> function returns a
<em>rejected</em> promise — the failure propagates to whoever awaits you. Rust
forces you to name the error type in <code>Result&lt;T, E&gt;</code> and either
match it or propagate it with <code>?</code>; JavaScript's <code>catch (e)</code>
gets no such guarantee and must be ready for anything: an <code>Error</code>, a
string, even <code>undefined</code>.</p>`,
