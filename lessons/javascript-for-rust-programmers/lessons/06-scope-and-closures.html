<script>
const LESSON = {
  number: 6,
  title: "Scope & Closures",

  intro: `
<p>Closures exist in Rust too, but the borrow checker makes you spell out
exactly how the capture works: <code>move</code> or borrow, and which of the
<code>Fn</code> / <code>FnMut</code> / <code>FnOnce</code> traits the closure
implements. A closure is still just a function that remembers the variables of
the scope it was created in — even after that outer function has returned —
but in Rust the compiler tracks ownership of every captured variable, while in
JavaScript the garbage collector simply keeps the variable alive for as long as
any closure still references it.</p>
<table>
  <tr><th>Rust</th><th>JavaScript</th></tr>
  <tr><td><code>fn make() -&gt; impl FnMut() -&gt; i32</code></td><td><code>function make()</code></td></tr>
  <tr><td><code>let add = |a: i32| move |b: i32| a + b;</code></td><td><code>const add = (a) =&gt; (b) =&gt; a + b;</code></td></tr>
  <tr><td>captured var owned/moved into the closure</td><td>captured var is just a live binding</td></tr>
</table>
<p>The important runtime fact: the inner function captures the <em>binding</em>,
not a snapshot of the value. If the outer variable changes, the closure sees the
change — much like a Rust closure that captures by mutable reference
(<code>FnMut</code>). That is exactly how a counter can keep incrementing, and
how you get truly private state — no <code>struct</code> with a private field,
no <code>impl</code> block, just a variable that nothing outside the closure can
reach.</p>`,

  rust: `fn make_counter() -> impl FnMut() -> i32 {
    let mut count = 0;
    move || {
        count += 1;
        count
    }
}

fn add(a: i32) -> impl Fn(i32) -> i32 {
    move |b| a + b
}

fn once<F, T>(mut f: F) -> impl FnMut() -> T
where
    F: FnMut() -> T,
    T: Clone,
{
    let mut result: Option<T> = None;
    move || {
        if result.is_none() {
            result = Some(f());
        }
        result.clone().unwrap()
    }
}`,

  task: `
<p>Write the plain-JavaScript versions. Each relies on a variable captured by a
returned function:</p>
<ol>
  <li><code>makeCounter()</code> returns a function; each call returns the next
      integer starting at <code>1</code>. Two counters must be independent.</li>
  <li><code>add(a)</code> returns a function so that <code>add(2)(3)</code> is
      <code>5</code> — a curried adder factory.</li>
  <li><code>once(fn)</code> returns a wrapped function that runs <code>fn</code>
      only the first time; later calls return the first result and never call
      <code>fn</code> again.</li>
  <li><code>makeAccount(balance)</code> returns an object with
      <code>deposit(n)</code> and <code>getBalance()</code> methods sharing one
      private <code>balance</code> variable — no property on the object holds it.</li>
</ol>`,

  starter: `// 1. makeCounter() -> function returning 1, 2, 3, ...
function makeCounter() {
  // TODO
}

// 2. add(a)(b) -> a + b
function add(a) {
  // TODO
}

// 3. once(fn) -> wrapper that runs fn only the first time
function once(fn) {
  // TODO
}

// 4. makeAccount(balance) -> { deposit, getBalance } over a private balance
function makeAccount(balance) {
  // TODO
}
`,

  exportNames: ["makeCounter", "add", "once", "makeAccount"],

  requirements: [
    { pattern: /return\s+function|=>\s*{|=>[^;]*;?\s*}|return\s*\(/, message: "Return a function (or object of functions) that closes over a variable" },
    { pattern: /let\s+\w+\s*=\s*0|\+\+|count/, message: "Use a captured, mutable variable inside makeCounter" },
  ],

  tests: [
    { name: "makeCounter counts 1, 2, 3", run: (x) => {
      const c = x.makeCounter();
      expectEqual(c(), 1);
      expectEqual(c(), 2);
      expectEqual(c(), 3);
    } },
    { name: "counters are independent", run: (x) => {
      const a = x.makeCounter();
      const b = x.makeCounter();
      expectEqual(a(), 1);
      expectEqual(a(), 2);
      expectEqual(b(), 1);
    } },
    { name: "add(2)(3) is 5", run: (x) => expectEqual(x.add(2)(3), 5) },
    { name: "add is curried and reusable", run: (x) => {
      const add10 = x.add(10);
      expectEqual(add10(5), 15);
      expectEqual(add10(-10), 0);
    } },
    { name: "once runs fn only the first time", run: (x) => {
      let calls = 0;
      const f = x.once(() => { calls++; return 42; });
      expectEqual(f(), 42);
      expectEqual(f(), 42);
      expectEqual(calls, 1);
    } },
    { name: "once returns the first result on later calls", run: (x) => {
      let n = 0;
      const f = x.once(() => ++n);
      expectEqual(f(), 1);
      expectEqual(f(), 1);
    } },
    { name: "makeAccount keeps balance private", run: (x) => {
      const acc = x.makeAccount(100);
      expectEqual(acc.getBalance(), 100);
      acc.deposit(50);
      expectEqual(acc.getBalance(), 150);
      expectEqual(acc.balance, undefined);
    } },
  ],

  solution: `function makeCounter() {
  let count = 0;
  return function () {
    return ++count;
  };
}

function add(a) {
  return function (b) {
    return a + b;
  };
}

function once(fn) {
  let called = false;
  let result;
  return function (...args) {
    if (!called) {
      called = true;
      result = fn(...args);
    }
    return result;
  };
}

function makeAccount(balance) {
  return {
    deposit(n) {
      balance += n;
    },
    getBalance() {
      return balance;
    },
  };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>JavaScript</th></tr>
  <tr><td>Returned function type</td><td><code>-&gt; impl FnMut() -&gt; i32</code></td><td>inferred at runtime</td></tr>
  <tr><td>Private state</td><td>private field on a <code>struct</code></td><td>captured variable</td></tr>
  <tr><td>Captured value</td><td>owned or borrowed via <code>move</code> / <code>&amp;mut</code></td><td>live binding (sees mutations)</td></tr>
  <tr><td>Wrapping a fn</td><td>generic <code>F: Fn(...) -&gt; T</code> bound</td><td><code>...args</code> rest/spread</td></tr>
</table>
<p>The classic gotcha lives here: a closure captures the <em>variable</em>, not
its value at capture time. With <code>var</code> in a loop, every closure shares
the one function-scoped binding and ends up seeing the final value; with
<code>let</code>, each iteration gets a fresh binding — which is what you almost
always want. In Rust this bug could never compile silently: the borrow checker
forces you to decide up front whether a closure moves or borrows each captured
variable, and each loop iteration produces its own binding, so there is no
equivalent of the <code>var</code>-in-a-loop trap. When you reach for a
<code>struct</code> with a private field just to hide one value, remember a
closure does the same job with a plain variable that nothing outside can name —
the difference is that JavaScript's garbage collector, not an owner, decides
when that variable's memory finally goes away.</p>`,
};
