const LESSON = {
  number: 6,
  title: "Null Safety",

  intro: `
<p>Kotlin bakes nullability into the type system, which is a much stricter
guarantee than Python's runtime approach. In Python, any variable can hold
<code>None</code> at any time — the interpreter never stops you from calling a
method on something that turns out to be <code>None</code>, and you find out
with an <code>AttributeError</code> at runtime. In Kotlin, a plain
<code>String</code> can <em>never</em> hold <code>null</code>; if a value might
be absent you must say so with a trailing <code>?</code> —
<code>String?</code> is Kotlin's way of spelling Python's "this might be
<code>None</code>". The compiler then forces you to deal with the null before
you can call anything on it.</p>
<table>
  <tr><th>Python</th><th>Kotlin</th></tr>
  <tr><td><code>Optional[str]</code> / <code>str | None</code></td><td><code>String?</code></td></tr>
  <tr><td><code>user.name if user else None</code></td><td><code>user?.name</code></td></tr>
  <tr><td><code>name or "guest"</code></td><td><code>name ?: "guest"</code></td></tr>
  <tr><td><code>assert name is not None; name</code></td><td><code>name!!</code></td></tr>
  <tr><td><code>if x is not None: x.f()</code></td><td><code>x?.let { it.f() }</code></td></tr>
</table>
<p>The tools have Python analogues, but Kotlin checks them at compile time.
Safe call <code>?.</code> returns <code>null</code> instead of raising when the
receiver is null (similar in spirit to writing <code>x.f() if x is not None
else None</code>). The Elvis operator <code>?:</code> supplies a fallback,
like Python's <code>or</code> (though <code>?:</code> only falls back on
<code>null</code>, not on falsy values like <code>0</code> or
<code>""</code>). The non-null assertion <code>!!</code> is like an
<code>assert x is not None</code> baked into the expression — it throws a
<code>NullPointerException</code> if you are wrong, so reach for it rarely.
And <code>value?.let { ... }</code> runs a block only when the value is
non-null, binding it to <code>it</code>, similar to a Python
<code>if value is not None:</code> guard.</p>`,

  python: `def lookup_name(id):
    if id == 1:
        return "Ada"
    if id == 2:
        return "Rob"
    return None

greeting = "Hello, " + (lookup_name(id) or "stranger")
first_char = name[0] if (name := lookup_name(id)) is not None else None`,

  task: `
<p>Build a tiny name directory and handle the missing cases idiomatically. All
declarations are top-level (no class or <code>main</code> needed):</p>
<ol>
  <li>Write <code>lookupName(id: Int): String?</code> that returns
      <code>"Ada"</code> for <code>1</code>, <code>"Rob"</code> for <code>2</code>,
      and <code>null</code> otherwise.</li>
  <li>Write <code>greet(id: Int): String</code> that returns
      <code>"Hello, &lt;name&gt;"</code>, falling back to <code>"stranger"</code>
      with the Elvis operator <code>?:</code> when the name is null.</li>
  <li>Write <code>initial(id: Int): Char?</code> that returns the first character
      of the name using a safe call <code>?.</code> (so a missing name yields
      <code>null</code>).</li>
  <li>Write <code>shout(name: String?): String</code> that returns the uppercased
      name plus <code>"!"</code> using <code>name?.let { ... }</code>, or
      <code>"(silence)"</code> when <code>name</code> is null.</li>
</ol>`,

  starter: `// 1. lookupName(id) -> a name, or null if unknown
fun lookupName(id: Int): String? {
    return null // TODO
}

// 2. greet(id) -> "Hello, <name>", or "Hello, stranger" (use ?:)
fun greet(id: Int): String {
    return "" // TODO
}

// 3. initial(id) -> first char of the name, or null (use ?.)
fun initial(id: Int): Char? {
    return null // TODO
}

// 4. shout(name) -> "<NAME>!", or "(silence)" if null (use ?.let)
fun shout(name: String?): String {
    return "" // TODO
}
`,

  requirements: [
    { pattern: /\?:/, message: "Use the Elvis operator ?: to supply a fallback" },
    { pattern: /\?\./, message: "Use a safe call ?. on a nullable value" },
    { pattern: /\.let\s*\{/, message: "Use ?.let { ... } to handle the nullable name" },
  ],

  tests: [
    { name: 'lookupName(1) is "Ada"', code: "        expect_eq(lookupName(1), \"Ada\")" },
    { name: 'lookupName(2) is "Rob"', code: "        expect_eq(lookupName(2), \"Rob\")" },
    { name: "lookupName(9) is null", code: "        expect_eq(lookupName(9), null)" },
    { name: 'greet(1) is "Hello, Ada"', code: "        expect_eq(greet(1), \"Hello, Ada\")" },
    { name: 'greet(9) falls back to "stranger"', code: "        expect_eq(greet(9), \"Hello, stranger\")" },
    { name: "initial(2) is 'R'", code: "        expect_eq(initial(2), 'R')" },
    { name: "initial(9) is null", code: "        expect_eq(initial(9), null)" },
    { name: 'shout("hi") is "HI!"', code: "        expect_eq(shout(\"hi\"), \"HI!\")" },
    { name: 'shout(null) is "(silence)"', code: "        expect_eq(shout(null), \"(silence)\")" },
  ],

  solution: `fun lookupName(id: Int): String? {
    return when (id) {
        1 -> "Ada"
        2 -> "Rob"
        else -> null
    }
}

fun greet(id: Int): String {
    return "Hello, " + (lookupName(id) ?: "stranger")
}

fun initial(id: Int): Char? {
    return lookupName(id)?.first()
}

fun shout(name: String?): String {
    return name?.let { "\${it.uppercase()}!" } ?: "(silence)"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Kotlin</th></tr>
  <tr><td>Nullable type</td><td><code>Optional[str]</code></td><td><code>String?</code></td></tr>
  <tr><td>Safe call</td><td><code>x.f() if x is not None else None</code></td><td><code>x?.f()</code></td></tr>
  <tr><td>Fallback</td><td><code>x or y</code></td><td><code>x ?: y</code></td></tr>
  <tr><td>Assert non-null</td><td><code>assert x is not None</code> (runtime, separate statement)</td><td><code>x!!</code> (runtime, inline)</td></tr>
  <tr><td>Run if non-null</td><td><code>if x is not None: f(x)</code></td><td><code>x?.let { f(it) }</code></td></tr>
</table>
<p>The key mental shift from Python: nullability is checked by the compiler,
not discovered at runtime. Python's duck typing lets you call a method on
anything and only fails when that call actually happens, potentially far from
where the <code>None</code> was introduced; Kotlin refuses to compile code
that calls a method on a <code>String?</code> without first narrowing it.
<code>!!</code> is a real runtime check, much like an explicit
<code>assert x is not None</code> — if the value is null, <code>!!</code>
throws immediately, which is deliberate, so an "impossible" null fails loudly
at the source instead of leaking downstream. Prefer <code>?.</code>,
<code>?:</code>, and <code>?.let { }</code> for everyday handling and save
<code>!!</code> for the rare spot where you can prove non-null. Chaining
<code>?.</code> short-circuits the whole chain to <code>null</code> the moment
any link is null, similar to guarding each step of a Python attribute chain
with an <code>is not None</code> check.</p>`,
};
