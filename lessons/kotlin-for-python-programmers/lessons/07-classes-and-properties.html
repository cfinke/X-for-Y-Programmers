  number: 7,
  title: "Classes & Properties",

  intro: `
<p>Kotlin classes will feel different from Python's, but far tighter once you
get used to the <em>primary constructor</em>. In Python you write
<code>__init__</code> and manually assign <code>self.x = x</code> for every
attribute; in Kotlin, you declare a class's parameters right after its name,
and prefixing one with <code>val</code> or <code>var</code> turns it into a
property in the same breath. No <code>self.x = x</code> boilerplate, no
separate assignment statements.</p>
<table>
  <tr><th>Python</th><th>Kotlin</th></tr>
  <tr><td><code>def __init__(self, name): self.name = name</code></td><td><code>class P(val name: String)</code></td></tr>
  <tr><td>plain attribute (always mutable)</td><td><code>val</code> property (immutable)</td></tr>
  <tr><td>mutable attribute</td><td><code>var</code> property</td></tr>
  <tr><td><code>P("Ada")</code> (no <code>new</code>)</td><td><code>P("Ada")</code> (no <code>new</code>)</td></tr>
  <tr><td><code>@property</code> + <code>def x(self): …</code></td><td><code>val x get() = …</code></td></tr>
</table>
<p>A <code>val</code> constructor parameter is a read-only property (Kotlin
enforces this at compile time, unlike a plain Python attribute); a
<code>var</code> parameter is mutable, like an ordinary Python attribute. Any
setup logic that a primary constructor can't express inline goes in an
<code>init { }</code> block, which runs as part of construction — comparable
to extra logic in <code>__init__</code> beyond simple assignment. Computed
properties use <code>get()</code>, much like Python's <code>@property</code>,
and a mutable property can intercept writes with <code>set(value)</code>
using the magic <code>field</code> backing identifier, similar to how a
Python <code>@x.setter</code> method writes into a private
<code>self._x</code> attribute.</p>`,

  python: `class BankAccount:
    def __init__(self, owner: str, starting_balance: int):
        if starting_balance < 0:
            raise ValueError("negative")
        self.owner = owner
        self.balance = starting_balance
        self._note = ""

    @property
    def summary(self) -> str:
        return f"{self.owner} has {self.balance}"

    @property
    def note(self) -> str:
        return self._note

    @note.setter
    def note(self, value: str) -> None:
        self._note = value.strip()

    def deposit(self, amount: int) -> None:
        self.balance += amount

    def withdraw(self, amount: int) -> bool:
        if amount > self.balance:
            return False
        self.balance -= amount
        return True`,

  task: `
<p>Build a <code>BankAccount</code> class. No <code>class</code>-less top-level
tricks here — this lesson is about classes:</p>
<ol>
  <li>Give it a primary constructor <code>(val owner: String, startingBalance:
      Int)</code>. <code>owner</code> is a read-only property; use
      <code>startingBalance</code> to initialize a <code>var balance</code>.</li>
  <li>Add an <code>init { }</code> block that calls
      <code>require(startingBalance &gt;= 0)</code> so negative balances throw.</li>
  <li>Add a computed <code>val summary: String</code> with a custom
      <code>get()</code> returning <code>"&lt;owner&gt; has &lt;balance&gt;"</code>.</li>
  <li>Add a <code>var note: String = ""</code> whose custom <code>set(value)</code>
      stores <code>value.trim()</code> into <code>field</code>.</li>
  <li>Add <code>deposit(amount)</code> (adds to <code>balance</code>) and
      <code>withdraw(amount): Boolean</code> (returns <code>false</code> if
      <code>amount &gt; balance</code>, otherwise subtracts and returns
      <code>true</code>).</li>
</ol>`,

  starter: `class BankAccount(val owner: String, startingBalance: Int) {

    var balance: Int = 0 // TODO: start from startingBalance

    // A property with a custom setter that trims the incoming value.

    // TODO: an init { } block that require()s startingBalance >= 0

    // A computed, read-only property.
    val summary: String
        get() = "" // TODO: "<owner> has <balance>"

    fun deposit(amount: Int) {
        // TODO
    }

    fun withdraw(amount: Int): Boolean {
        return false // TODO
    }
}
`,

  requirements: [
    { pattern: /class\s+BankAccount\s*\(\s*val\s+owner/, message: "Declare owner as a val in the primary constructor" },
    { pattern: /\binit\s*\{/, message: "Use an init { } block to validate the starting balance" },
    { pattern: /\bget\(\)\s*=/, message: "Give summary a computed custom getter with get()" },
    { pattern: /\bset\(\s*\w+\s*\)/, message: "Give note a custom setter with set(value)" },
  ],

  tests: [
    { name: "owner is a read-only property", code: "        val a = BankAccount(\"Ada\", 100)\n        expect_eq(a.owner, \"Ada\")" },
    { name: "balance starts from the constructor argument", code: "        val a = BankAccount(\"Ada\", 100)\n        expect_eq(a.balance, 100)" },
    { name: "deposit adds to the balance", code: "        val a = BankAccount(\"Ada\", 100)\n        a.deposit(50)\n        expect_eq(a.balance, 150)" },
    { name: "withdraw subtracts and returns true", code: "        val a = BankAccount(\"Ada\", 100)\n        val ok = a.withdraw(40)\n        expect_true(ok)\n        expect_eq(a.balance, 60)" },
    { name: "withdraw fails when funds are insufficient", code: "        val a = BankAccount(\"Bo\", 20)\n        expect_true(!a.withdraw(100))\n        expect_eq(a.balance, 20)" },
    { name: "summary is a computed property", code: "        expect_eq(BankAccount(\"Ada\", 100).summary, \"Ada has 100\")" },
    { name: "note setter trims the value", code: "        val a = BankAccount(\"Cy\", 0)\n        a.note = \"  hello  \"\n        expect_eq(a.note, \"hello\")" },
  ],

  solution: `class BankAccount(val owner: String, startingBalance: Int) {
    var balance: Int = startingBalance
        private set

    var note: String = ""
        set(value) {
            field = value.trim()
        }

    init {
        require(startingBalance >= 0) { "starting balance cannot be negative" }
    }

    val summary: String
        get() = "$owner has $balance"

    fun deposit(amount: Int) {
        balance += amount
    }

    fun withdraw(amount: Int): Boolean {
        if (amount > balance) return false
        balance -= amount
        return true
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Kotlin</th></tr>
  <tr><td>Property in constructor</td><td><code>def __init__(self, name): self.name = name</code></td><td><code>class C(val name: String)</code></td></tr>
  <tr><td>Read-only property</td><td>property with no setter (by convention)</td><td><code>val</code></td></tr>
  <tr><td>Mutable property</td><td>plain attribute</td><td><code>var</code></td></tr>
  <tr><td>Construction-time setup</td><td><code>__init__</code> body</td><td><code>init { }</code></td></tr>
  <tr><td>Computed property</td><td><code>@property</code> + <code>def x(self): …</code></td><td><code>val x get() = …</code></td></tr>
  <tr><td>Write interceptor</td><td><code>@x.setter</code> + <code>def x(self, v): …</code></td><td><code>set(value) { field = … }</code></td></tr>
  <tr><td>Read-only from outside</td><td><code>_x</code> + a public getter, by convention</td><td><code>var x = 0; private set</code></td></tr>
</table>
<p>The <code>field</code> identifier inside a custom setter (or getter) is
Kotlin's <em>backing field</em> — it's the storage behind the property, and you
must use it instead of <code>this.note</code> to avoid infinite recursion (a
Python <code>@note.setter</code> method that assigned <code>self.note = value</code>
would recurse forever too; that's why Python code conventionally keeps a
separate <code>self._note</code> attribute as the real backing storage). A
<code>private set</code> gives you a property that anyone can read but only
the class can write — Kotlin's compiler-enforced answer to what Python does
by convention with a single-underscore <code>_note</code> attribute plus a
public property. Note there is no <code>new</code> keyword: <code>BankAccount("Ada",
100)</code> constructs an instance directly, just as it would in Python.</p>`,
};
