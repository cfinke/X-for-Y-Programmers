  title: "Sealed Classes",

  intro: `
<p>In Python you often model "one of a fixed set of shapes" with a base class
and a handful of subclasses, then branch on <code>isinstance</code> checks (or,
since 3.10, structural pattern matching with <code>match</code>/<code>case</code>).
Nothing stops you from forgetting a case, though — Python won't tell you at
"compile" time that your <code>match</code> is missing a branch. Kotlin's
equivalent is a <strong>sealed class</strong> (or <strong>sealed
interface</strong>): a type whose subclasses are all known at compile time
because they must live in the same file/module.</p>
<table>
  <tr><th>Python</th><th>Kotlin</th></tr>
  <tr><td>base class + subclasses</td><td><code>sealed class Shape</code></td></tr>
  <tr><td><code>class Circle(Shape): ...</code></td><td><code>class Circle : Shape()</code></td></tr>
  <tr><td><code>match shape: case Circle(): ...</code></td><td><code>when (s) { is Circle -&gt; ... }</code></td></tr>
  <tr><td>type check <code>isinstance(s, Circle)</code></td><td>type check <code>is Circle</code></td></tr>
</table>
<p>The payoff is <em>exhaustiveness</em>. Because the compiler knows the complete
list of subtypes, a <code>when</code> that covers them all needs <strong>no
<code>else</code> branch</strong> — and if you later add a fourth subclass, every
<code>when</code> used as an expression stops compiling until you handle it. Python
gives you no such guarantee: a <code>match</code> statement missing a case simply
falls through silently (or you must remember to add a wildcard <code>case _:</code>
that raises).</p>`,

  python: `from dataclasses import dataclass
import math

@dataclass
class Circle:
    radius: float

@dataclass
class Rectangle:
    width: float
    height: float

@dataclass
class Triangle:
    base: float
    height: float

Shape = Circle | Rectangle | Triangle

def area(shape: Shape) -> float:
    match shape:
        case Circle(radius=r):
            return math.pi * r ** 2
        case Rectangle(width=w, height=h):
            return w * h
        case Triangle(base=b, height=h):
            return 0.5 * b * h`,

  solution: `import kotlin.math.PI

sealed class Shape
class Circle(val radius: Double) : Shape()
class Rectangle(val width: Double, val height: Double) : Shape()
class Triangle(val base: Double, val height: Double) : Shape()

fun area(shape: Shape): Double = when (shape) {
    is Circle -> PI * shape.radius * shape.radius
    is Rectangle -> shape.width * shape.height
    is Triangle -> 0.5 * shape.base * shape.height
}

fun name(shape: Shape): String = when (shape) {
    is Circle -> "circle"
    is Rectangle -> "rectangle"
    is Triangle -> "triangle"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Kotlin</th></tr>
  <tr><td>Closed set of types</td><td>base class + subclasses (unenforced)</td><td><code>sealed class</code> / <code>sealed interface</code></td></tr>
  <tr><td>Variant</td><td><code>@dataclass class Circle: ...</code></td><td><code>class Circle(...) : Shape()</code></td></tr>
  <tr><td>Match</td><td><code>match shape: case Circle(): ...</code></td><td><code>when (s) { is Circle -&gt; }</code></td></tr>
  <tr><td>Narrowing</td><td><code>case Circle(radius=r)</code> binds <code>r</code></td><td>smart cast after <code>is</code></td></tr>
  <tr><td>Exhaustiveness</td><td>not checked — a missing case is silently skipped</td><td>built in — no <code>else</code></td></tr>
</table>
<p>A <code>when</code> used as an <em>expression</em> (as here, on the right of
<code>=</code>) is checked for exhaustiveness; a <code>when</code> used only as a
statement is not, so prefer the expression form to get the safety. The same
pattern models a <code>Result</code>: <code>sealed class Result&lt;out T&gt;</code>
with <code>class Ok&lt;T&gt;(val value: T)</code> and
<code>class Err(val message: String)</code>, then <code>when</code> over it.
Variants that carry no data can be <code>object</code> singletons (e.g.
<code>object Loading : Result&lt;Nothing&gt;()</code>) instead of classes.</p>`,
