  title: "Structs & Comparable",

  intro: `
<p>In TypeScript, a small value type is usually an <code>interface Point
{ x, y }</code> — and the moment you need behavior or equality, you graduate
to a class and write a constructor, fields, and a hand-rolled
<code>equals</code> (because <code>{x: 1, y: 2} !== {x: 1, y: 2}</code>).
Ruby collapses all of that into one line: <code>Point = Struct.new(:x, :y)</code>
gives you a full value class — constructor, readers <em>and</em> writers,
structural <code>==</code>, <code>to_a</code>, destructuring support. Need
methods too? Pass a block: <code>Struct.new(:x, :y) do ... end</code> and
define them inside.</p>
<table>
  <tr><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td><code>interface Point { x: number; y: number }</code> + a class for behavior</td><td><code>Point = Struct.new(:x, :y)</code></td></tr>
  <tr><td><code>a.x === b.x &amp;&amp; a.y === b.y</code></td><td><code>a == b</code> (structural, for free)</td></tr>
  <tr><td><code>compareTo(other): number</code></td><td><code>def &lt;=&gt;(other)</code> — the "spaceship" operator</td></tr>
  <tr><td><code>arr.sort((a, b) =&gt; a.compareTo(b))</code></td><td><code>arr.sort</code></td></tr>
  <tr><td>write <code>&lt;</code>, <code>&gt;</code>, <code>between</code> yourself</td><td><code>include Comparable</code> — all derived from <code>&lt;=&gt;</code></td></tr>
</table>
<p>The second trick has no TS analogue at all. Write <em>one</em> method,
<code>&lt;=&gt;</code> (return -1, 0, or 1 — arrays already compare this way,
so <code>[major, minor] &lt;=&gt; [other.major, other.minor]</code> does the
work), then <code>include Comparable</code>, and Ruby derives
<code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>,
<code>==</code>, <code>between?</code>, and <code>clamp</code> for you —
plus <code>sort</code>, <code>min</code>, and <code>max</code> just work on
collections of your objects. A whole operator set from one method.</p>`,

  typescript: `interface Point { x: number; y: number; }

function distance(a: Point, b: Point): number {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// Equality? Roll your own — {x:1,y:2} !== {x:1,y:2}.
function pointsEqual(a: Point, b: Point): boolean {
  return a.x === b.x && a.y === b.y;
}

class Version {
  constructor(public major: number, public minor: number) {}

  compareTo(other: Version): number {
    if (this.major !== other.major) return this.major - other.major;
    return this.minor - other.minor;
  }
}

// versions.sort((a, b) => a.compareTo(b));
// ...and still no <, >, or between() for Version.`,

  task: `

</ol>`,

    { name: "between? comes along for the ride",
      code: "  expect_true(Version.new(1, 5).between?(Version.new(1, 0), Version.new(2, 0)))\n  expect_true(!Version.new(2, 1).between?(Version.new(1, 0), Version.new(2, 0)))" },

  solution: `Point = Struct.new(:x, :y) do
  def distance_to(other)
    Math.sqrt((x - other.x)**2 + (y - other.y)**2)
  end
end

class Version
  include Comparable
  attr_reader :major, :minor

  def initialize(major, minor)
    @major = major
    @minor = minor
  end

  def <=>(other)
    [major, minor] <=> [other.major, other.minor]
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td>Value type</td><td><code>interface</code> + class + equals()</td><td><code>Name = Struct.new(:a, :b)</code></td></tr>
  <tr><td>Add behavior</td><td>methods on the class</td><td><code>Struct.new(:a, :b) do ... end</code></td></tr>
  <tr><td>Structural equality</td><td>hand-written</td><td><code>==</code> free on Structs</td></tr>
  <tr><td>Convert to array</td><td>manual</td><td><code>point.to_a</code> free on Structs</td></tr>
  <tr><td>Ordering</td><td><code>compareTo</code> + comparator lambdas everywhere</td><td><code>def &lt;=&gt;(other)</code> once</td></tr>
  <tr><td>Derived operators</td><td>none</td><td><code>include Comparable</code> → <code>&lt; &gt; &lt;= &gt;= == between? clamp</code></td></tr>
</table>
<p>The <code>Version.new(1, 2) &lt; Version.new(1, 10)</code> test is why
<code>&lt;=&gt;</code> on arrays is so handy: <code>"1.2" &lt; "1.10"</code>
is <em>false</em> as strings, but <code>[1, 2] &lt;=&gt; [1, 10]</code>
compares element-wise, exactly like a database sort key. This
one-method-unlocks-many pattern repeats across Ruby:
<code>Comparable</code> builds on <code>&lt;=&gt;</code> the same way
<code>Enumerable</code> builds everything on <code>each</code> — which is the
next lesson's starting point.</p>`,
