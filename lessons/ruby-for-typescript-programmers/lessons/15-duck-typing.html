const LESSON = {
  number: 15,
  title: "Duck Typing & respond_to?",

  intro: `
<p>Here's the reframe that makes Ruby's missing <code>interface</code> keyword
stop feeling like a loss: TypeScript's structural typing <em>was already duck
typing</em> — an object satisfies <code>Speaker</code> not because it declared
anything, but because it happens to have the right-shaped <code>speak</code>.
Ruby keeps exactly that philosophy and just drops the compiler. Polymorphism
is method <em>presence</em>: any object with a <code>speak</code> method
satisfies "the speaker interface", and nothing anywhere writes that interface
down.</p>
<table>
  <tr><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td><code>interface Speaker { speak(): string }</code></td><td>(nothing — the "interface" is just the method name)</td></tr>
  <tr><td><code>class Dog implements Speaker</code></td><td><code>class Dog</code> with a <code>speak</code> method</td></tr>
  <tr><td><code>"speak" in thing</code> / type guard</td><td><code>thing.respond_to?(:speak)</code></td></tr>
  <tr><td><code>thing instanceof Dog</code></td><td><code>thing.is_a?(Dog)</code></td></tr>
  <tr><td>compile error on <code>rock.speak()</code></td><td><code>NoMethodError</code> at runtime</td></tr>
</table>
<p>So how do you check? <code>thing.respond_to?(:speak)</code> is the runtime
type guard: it asks the object itself "will you answer this message?" —
usually right before sending it. When you genuinely need a nominal check
(this exact class or its subclasses), <code>thing.is_a?(Dog)</code> is
Ruby's <code>instanceof</code> — but idiomatic Ruby reaches for
<code>respond_to?</code> first, because caring about <em>what an object can
do</em> instead of <em>what it is</em> is the whole duck-typing creed: if it
quacks like a duck, call it a duck.</p>`,

  typescript: `interface Speaker {
  speak(): string;
}

class Dog implements Speaker {
  speak() { return "Woof"; }
}

class Robot implements Speaker {
  speak() { return "Beep"; }
}

class Rock {}  // does not implement Speaker

function makeSpeak(thing: unknown): string {
  // The runtime "can it speak?" check TS makes you spell out:
  return typeof (thing as any)?.speak === "function"
    ? (thing as Speaker).speak()
    : "...";
}`,

  task: `
<p>Build the menagerie, minus the interface:</p>
<ol>
  <li>A class <code>Dog</code> whose <code>speak</code> method returns
      <code>"Woof"</code>, and a class <code>Robot</code> whose
      <code>speak</code> returns <code>"Beep"</code>. <code>Rock</code> stays
      silent — no <code>speak</code> method at all. No
      <code>implements</code>, no interface: the shared method name IS the
      contract.</li>
  <li><code>make_speak(thing)</code> — return <code>thing.speak</code> if
      <code>thing.respond_to?(:speak)</code>, otherwise the string
      <code>"..."</code>.</li>
  <li><code>all_speakers(things)</code> — keep only the things that respond
      to <code>:speak</code> (<code>select</code>), then collect what they
      say (<code>map(&amp;:speak)</code>).</li>
</ol>`,

  starter: `class Dog
  def speak
    raise NotImplementedError, "TODO: return 'Woof'"
  end
end

class Robot
  def speak
    raise NotImplementedError, "TODO: return 'Beep'"
  end
end

class Rock
  # Deliberately silent: no speak method. That's what makes it not-a-speaker.
end

# respond_to?(:speak) is the runtime type guard.
def make_speak(thing)
  raise NotImplementedError, "TODO: thing.speak if it responds, else '...'"
end

# select the responders, then map(&:speak).
def all_speakers(things)
  raise NotImplementedError, "TODO: select { respond_to? } then map"
end
`,

  requirements: [
    { pattern: /respond_to\?/, message: "Ask with respond_to?(:speak) before calling" },
    { pattern: /is_a\?|\.speak/, message: "Send the speak message to the objects that answer it" },
    { pattern: /class\s+Dog/, message: "Define a Dog class" },
    { pattern: /class\s+Robot/, message: "Define a Robot class" },
  ],

  tests: [
    { name: 'make_speak(Dog.new) returns "Woof"',
      code: '  expect_eq(make_speak(Dog.new), "Woof")' },
    { name: 'make_speak(Robot.new) returns "Beep"',
      code: '  expect_eq(make_speak(Robot.new), "Beep")' },
    { name: 'make_speak(Rock.new) returns "..."',
      code: '  expect_eq(make_speak(Rock.new), "...")' },
    { name: "Rock does not respond to :speak (no dummy method!)",
      code: "  expect_true(!Rock.new.respond_to?(:speak))" },
    { name: 'all_speakers([Dog.new, Rock.new, Robot.new]) returns ["Woof", "Beep"]',
      code: '  expect_eq(all_speakers([Dog.new, Rock.new, Robot.new]), ["Woof", "Beep"])' },
    { name: "all_speakers([Rock.new]) returns []",
      code: "  expect_eq(all_speakers([Rock.new]), [])" },
  ],

  solution: `class Dog
  def speak
    "Woof"
  end
end

class Robot
  def speak
    "Beep"
  end
end

class Rock
end

def make_speak(thing)
  thing.respond_to?(:speak) ? thing.speak : "..."
end

def all_speakers(things)
  things.select { |t| t.respond_to?(:speak) }.map(&:speak)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Ruby</th></tr>
  <tr><td>Declare a contract</td><td><code>interface Speaker { speak(): string }</code></td><td>(implicit — just the method name)</td></tr>
  <tr><td>Satisfy it</td><td>have the right shape (structural)</td><td>define the method (duck)</td></tr>
  <tr><td>Capability check</td><td>type guard / <code>"speak" in thing</code></td><td><code>thing.respond_to?(:speak)</code></td></tr>
  <tr><td>Nominal check</td><td><code>thing instanceof Dog</code></td><td><code>thing.is_a?(Dog)</code> (also matches subclasses)</td></tr>
  <tr><td>Exact class</td><td>—</td><td><code>thing.instance_of?(Dog)</code></td></tr>
  <tr><td>Wrong call caught</td><td>at compile time</td><td><code>NoMethodError</code> at runtime</td></tr>
</table>
<p>The trade is explicit now: TypeScript verifies every duck before the
program runs; Ruby finds out when the message is sent. What you buy with that
risk is radical openness — <code>all_speakers</code> works on any object
anyone ever writes with a <code>speak</code> method, with no import, no
declaration, no <code>implements</code> clause connecting them. In practice
Rubyists lean on tests (and often just send the message and rescue) rather
than sprinkling <code>respond_to?</code> everywhere — the guard is for
genuine boundaries, where mixed collections like this one show up.</p>`,
};
