  number: 16,
  title: "Dataclasses",

  intro: `
<p>In Go you reach for a <code>struct</code> when you want to bundle a few
fields together — a plain data-holder with no behaviour beyond maybe a few
methods. Go structs already give you two things for free: zero-value
initialization (every field starts at its type's zero value) and, if every
field is itself comparable, a working <code>==</code> operator. What they
don't give you is default field values, a generated ordering, or true
immutability — you write those yourself, or reach for a constructor
function. Python's answer for a similar "plain data holder with generated
boilerplate" is the <code>@dataclass</code> decorator from the
<code>dataclasses</code> module. You declare the fields with class-level type
annotations, and the decorator writes the boilerplate for you: an
<code>__init__</code> that assigns every field, a readable <code>__repr__</code>,
and an <code>__eq__</code> that compares by <em>value</em> instead of identity.</p>
<table>
  <tr><th>Go</th><th>Python</th></tr>
  <tr><td><code>type Point struct { X, Y int }</code></td><td><code>@dataclass</code> + <code>class Point:</code></td></tr>
  <tr><td><code>X int</code></td><td><code>x: int</code></td></tr>
  <tr><td><code>Tags []string</code> (zero value <code>nil</code>, independent per instance)</td><td><code>tags: list = field(default_factory=list)</code></td></tr>
  <tr><td>unexported field, no setter (convention only)</td><td><code>@dataclass(frozen=True)</code></td></tr>
  <tr><td><code>==</code> works already (if all fields are comparable)</td><td>value <code>==</code> for free</td></tr>
</table>
<p>Ordinary fields with a default don't have a direct Go equivalent, since
struct literals have no field-default syntax — you either accept the zero
value or write a constructor function that fills one in
(<code>func NewPoint(x, y int) Point { return Point{X: x, Y: y} }</code>).
Python's dataclass defaults (<code>z: int = 0</code>) play that role inline.
A <em>mutable</em> default — a list or dict — cannot be written directly on a
dataclass field, because one shared object would leak across every instance;
Go doesn't have this trap, since every zero-valued struct gets its own
independent <code>nil</code> slice. In Python, use
<code>field(default_factory=list)</code>: the factory is called fresh for
each new instance. Pass <code>frozen=True</code> to make instances immutable
(assigning a field raises) — Go has no built-in equivalent, so immutability
there is usually enforced by convention (unexported fields, no setters) — and
<code>order=True</code> to also generate <code>&lt;</code>, <code>&lt;=</code>,
<code>&gt;</code>, <code>&gt;=</code> that compare fields tuple-wise, top to
bottom, similar to hand-writing a <code>Less</code> method for
<code>sort.Interface</code> in Go.</p>`,

  go: `type Point struct {
	X, Y  int
	Label string
}

a := Point{X: 1, Y: 2}
b := Point{X: 1, Y: 2}
// structs compare by value already, no helper needed:
a == b // true

// Immutable "value object" (by convention; Go has no readonly fields):
var origin = Point{X: 0, Y: 0}`,

  task: `
<p>Import from <code>dataclasses</code> and build two dataclasses:</p>
<ol>
  <li><code>Point</code> with fields <code>x: int</code> and <code>y: int</code>,
      plus a <code>label: str = ""</code> that defaults to the empty string.
      Decorate it with <code>@dataclass</code>. Also add
      <code>order=True</code> so points can be sorted, and give it a method
      <code>translate(self, dx, dy)</code> that returns a <em>new</em>
      <code>Point</code> shifted by <code>dx</code>/<code>dy</code> (same
      label).</li>
  <li><code>Polygon</code> with a field <code>points</code> that defaults to an
      empty list via <code>field(default_factory=list)</code>, and a method
      <code>add(self, point)</code> that appends a point to that list.</li>
  <li><code>Color</code>, a <strong>frozen</strong> dataclass
      (<code>@dataclass(frozen=True)</code>) with fields <code>r: int</code>,
      <code>g: int</code>, <code>b: int</code> — an immutable value object.</li>
</ol>`,

class Point:
    pass  # TODO


# 2. Polygon: points defaults to [] via default_factory ; add(point)
class Polygon:

# 3. Color: frozen dataclass with r, g, b

    pass  # TODO
`,

  requirements: [
    { pattern: /@dataclass/, message: "Use the @dataclass decorator" },
    { pattern: /default_factory\s*=\s*list/, message: "Give Polygon.points a default_factory=list" },
    { pattern: /frozen\s*=\s*True/, message: "Make Color a frozen dataclass (frozen=True)" },
  ],

  tests: [
    { name: "Point auto __init__ sets fields and default label", code: "    p = Point(1, 2)\n    expect_eq(p.x, 1)\n    expect_eq(p.y, 2)\n    expect_eq(p.label, \"\")" },
    { name: "Points compare by value, not identity", code: "    expect_eq(Point(1, 2), Point(1, 2))\n    expect_true(Point(1, 2) != Point(1, 3))" },
    { name: "translate returns a new shifted Point", code: "    p = Point(1, 2, \"a\")\n    q = p.translate(10, 20)\n    expect_eq(q, Point(11, 22, \"a\"))\n    expect_eq(p, Point(1, 2, \"a\"))" },
    { name: "order=True enables sorting", code: "    pts = sorted([Point(2, 1), Point(1, 9), Point(1, 3)])\n    expect_eq(pts, [Point(1, 3), Point(1, 9), Point(2, 1)])\n    expect_true(Point(1, 3) < Point(2, 0))" },
    { name: "Polygon default_factory gives independent lists", code: "    a = Polygon()\n    b = Polygon()\n    a.add(Point(0, 0))\n    expect_eq(a.points, [Point(0, 0)])\n    expect_eq(b.points, [])" },
    { name: "Color is frozen and immutable", code: "    c = Color(255, 0, 0)\n    expect_eq(c, Color(255, 0, 0))\n    raised = False\n    try:\n        c.r = 0\n    except Exception:\n        raised = True\n    expect_true(raised)" },
  ],

  solution: `from dataclasses import dataclass, field


@dataclass(order=True)
class Point:
    x: int
    y: int
    label: str = ""

    def translate(self, dx, dy):
        return Point(self.x + dx, self.y + dy, self.label)


@dataclass
class Polygon:
    points: list = field(default_factory=list)

    def add(self, point):
        self.points.append(point)


@dataclass(frozen=True)
class Color:
    r: int
    g: int
    b: int
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Python</th></tr>
  <tr><td>Data holder</td><td><code>struct</code></td><td><code>@dataclass</code></td></tr>
  <tr><td>Field</td><td><code>X int</code></td><td><code>x: int</code></td></tr>
  <tr><td>Default</td><td>zero value, or a constructor func</td><td><code>label: str = ""</code></td></tr>
  <tr><td>Mutable default</td><td><code>Tags []string</code> (independent <code>nil</code> per instance)</td><td><code>field(default_factory=list)</code></td></tr>
  <tr><td>Immutable</td><td>unexported fields (convention only)</td><td><code>frozen=True</code></td></tr>
  <tr><td>Value equality</td><td><code>==</code> (if comparable) / <code>reflect.DeepEqual</code></td><td><code>__eq__</code> for free</td></tr>
  <tr><td>Ordering</td><td><code>sort.Slice</code> with a custom <code>less</code> func</td><td><code>order=True</code></td></tr>
</table>
<p>The annotations are what the decorator reads to find your fields — they are
not enforced at runtime, unlike Go's struct field types, which the compiler
checks at every call site. A field with a default must come after all fields
without one (same rule as default function parameters), which is why
<code>label</code> sits last on <code>Point</code>.</p>
<p><code>order=True</code> generates the comparison operators by treating each
instance as a tuple of its fields in declaration order, so <code>Point(1, 3) &lt;
Point(1, 9)</code> falls through to the second field — the same tie-breaking
logic you'd write by hand in a <code>less</code> function passed to
<code>sort.Slice</code>. A <code>frozen=True</code> dataclass also becomes
hashable, so its instances can be dict keys or set members — handy for value
objects like <code>Color</code>; Go's map keys just need a comparable type, so
a plain (non-frozen) struct already works as a key as long as none of its
fields are slices or maps. If you need a modified copy of a frozen instance,
reach for <code>dataclasses.replace(c, r=0)</code> rather than mutating in
place — in Go you'd write <code>c2 := c; c2.R = 0</code>, relying on struct
value-copy semantics.</p>`,
};
