  intro: `
<p>Time to put it all together. In Go you might model a small in-memory
store with a <code>struct</code> for the record, another <code>struct</code>
holding a <code>map</code>, custom error types implementing the
<code>error</code> interface, and <code>for</code> loops to filter, sum, and
sort. Python gives you the same shape with different spellings: a
<code>@dataclass</code> instead of a plain struct, a plain <code>dict</code>
instead of <code>map[string]V</code>, custom <code>Exception</code>
subclasses instead of error-returning functions, and comprehensions/generator
expressions instead of hand-rolled loops.</p>
<table>
  <tr><th>Go</th><th>Python</th></tr>
  <tr><td><code>type Product struct { Name string }</code></td><td><code>@dataclass\nclass Product: name: str</code></td></tr>
  <tr><td><code>map[string]Product{}</code></td><td><code>{}</code> (a dict)</td></tr>
  <tr><td><code>type NotFoundError struct{}</code> + <code>Error()</code></td><td><code>class ProductNotFound(Exception): pass</code></td></tr>
  <tr><td><code>return &amp;NotFoundError{name}</code></td><td><code>raise ProductNotFound(name)</code></td></tr>
  <tr><td><code>for _, p := range items { if contains(p.Tags, t) {...} }</code></td><td><code>[p for p in items if t in p.tags]</code></td></tr>
  <tr><td><code>total := 0.0; for _, p := range items { total += p.Price }</code></td><td><code>sum(p.price for p in items)</code></td></tr>
</table>
<p>This capstone ties together the dataclass, dict/list processing,
comprehensions, and exceptions you have met in earlier lessons — no new syntax,
just idiomatic assembly.</p>`,

  go: `type Product struct {
	Name  string
	Price float64
	Tags  []string
}

type ProductNotFoundError struct{ Name string }

func (e *ProductNotFoundError) Error() string {
	return "product not found: " + e.Name
}

type DuplicateProductError struct{ Name string }

func (e *DuplicateProductError) Error() string {
	return "duplicate product: " + e.Name
}

type Store struct {
	items map[string]Product
}

func NewStore() *Store {
	return &Store{items: make(map[string]Product)}
}

func (s *Store) Add(p Product) error {
	if _, ok := s.items[p.Name]; ok {
		return &DuplicateProductError{p.Name}
	}
	s.items[p.Name] = p
	return nil
}

func (s *Store) Get(name string) (Product, error) {
	p, ok := s.items[name]
	if !ok {
		return Product{}, &ProductNotFoundError{name}
	}
	return p, nil
}

func (s *Store) TotalValue() float64 {
	total := 0.0
	for _, p := range s.items {
		total += p.Price
	}
	return total
}

func (s *Store) NamesWithTag(tag string) []string {
	var names []string
	for _, p := range s.items {
		for _, t := range p.Tags {
			if t == tag {
				names = append(names, p.Name)
				break
			}
		}
	}
	sort.Strings(names)
	return names
}

func Load(records []Product) (*Store, error) {
	store := NewStore()
	for _, r := range records {
		if err := store.Add(r); err != nil {
			return nil, err
		}
	}
	return store, nil
}`,

  solution: `from dataclasses import dataclass, field


class ProductNotFound(Exception):
    pass


class DuplicateProduct(Exception):
    pass


@dataclass
class Product:
    name: str
    price: float
    tags: list = field(default_factory=list)


class Store:
    def __init__(self):
        self._items = {}

    def add(self, product):
        if product.name in self._items:
            raise DuplicateProduct(product.name)
        self._items[product.name] = product

    def get(self, name):
        if name not in self._items:
            raise ProductNotFound(name)
        return self._items[name]

    def total_value(self):
        return sum(p.price for p in self._items.values())

    def names_with_tag(self, tag):
        return sorted(p.name for p in self._items.values() if tag in p.tags)


def load(records):
    store = Store()
    for r in records:
        store.add(Product(name=r["name"], price=r["price"], tags=r.get("tags", [])))
    return store
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Python</th></tr>
  <tr><td>Record type</td><td><code>struct</code></td><td><code>@dataclass</code></td></tr>
  <tr><td>Keyed store</td><td><code>map[K]V</code></td><td><code>dict</code></td></tr>
  <tr><td>Membership</td><td><code>_, ok := m[k]</code></td><td><code>k in d</code></td></tr>
  <tr><td>Custom error</td><td><code>type E struct{}</code> + <code>Error()</code></td><td><code>class E(Exception): pass</code></td></tr>
  <tr><td>Signal an error</td><td><code>return &amp;E{...}</code></td><td><code>raise E()</code></td></tr>
  <tr><td>Reduce/sum</td><td><code>for _, x := range xs { total += x }</code></td><td><code>sum(x for x in xs)</code></td></tr>
  <tr><td>Filter + map + sort</td><td><code>for</code> loop with <code>append</code>, then <code>sort.Strings</code></td><td><code>sorted(f(x) for x in xs if g(x))</code></td></tr>
</table>
<p>A few Pythonic touches worth noting. <code>field(default_factory=list)</code>
gives each instance its own fresh list — the equivalent mistake in Python to a
shared mutable default is a real trap, and the dataclass field factory is how you
avoid it. Passing a generator expression straight into <code>sum()</code> or
<code>sorted()</code> (no surrounding brackets) is the idiomatic replacement for
a hand-rolled accumulation loop, and it avoids building an intermediate list.
Finally, custom exceptions are just classes that inherit from
<code>Exception</code>; you catch them by type with
<code>except ProductNotFound:</code>, which plays a role similar to checking
the concrete type of a returned Go <code>error</code> with
<code>errors.As</code>.</p>`,
