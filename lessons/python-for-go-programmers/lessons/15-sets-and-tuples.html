  intro: `
<p>Go has no built-in set type — the idiomatic substitute is a
<code>map[T]struct{}</code>, using the map's keys for uniqueness and an empty
<code>struct{}</code> as a zero-cost value, and it has no tuple type either: a
function that needs to hand back "a pair" typically returns two values or
reaches for a small struct. Python bakes both into the language as first-class
types with their own literal syntax. A <em>set</em> is an unordered collection
of unique, hashable values written with braces. A <em>tuple</em> is an
immutable, ordered sequence written with commas (usually wrapped in
parentheses).</p>
<table>
  <tr><th>Go</th><th>Python</th></tr>
  <tr><td><code>map[int]struct{}{1: {}, 2: {}}</code></td><td><code>{1, 2, 2}</code> &rarr; <code>{1, 2}</code></td></tr>
  <tr><td><code>s[3] = struct{}{}</code></td><td><code>s.add(3)</code></td></tr>
  <tr><td>manual loop over keys</td><td><code>a | b</code></td></tr>
  <tr><td><code>for k := range s { ... }</code></td><td><code>list(set(items))</code></td></tr>
  <tr><td><code>name, n := "a", 1</code> (no tuple type)</td><td><code>t = ("a", 1)</code></td></tr>
  <tr><td><code>x, y := point.X, point.Y</code></td><td><code>x, y = t</code></td></tr>
</table>
<p>Because tuples are immutable and hashable, Python lets you use them as
dictionary keys or set members — something a mutable slice can never do. Set
algebra has operator sugar: <code>|</code> union, <code>&amp;</code> intersection,
<code>-</code> difference — no writing your own loop over map keys. And when a
tuple's positions start to carry meaning, <code>collections.namedtuple</code>
gives each slot a name while staying a real, immutable tuple, much like a
small Go struct gives named fields to what would otherwise be an anonymous
pair.</p>`,

  go: `tags := map[string]struct{}{"a": {}, "b": {}} // "a" duplicate ignored
tags["c"] = struct{}{}

a := map[int]struct{}{1: {}, 2: {}, 3: {}}
b := map[int]struct{}{2: {}, 3: {}, 4: {}}
// union / intersection by hand -- no set type or operators
both := map[int]struct{}{}
for k := range a {
	if _, ok := b[k]; ok {
		both[k] = struct{}{} // {2, 3}
	}
}

func dedupe(items []string) []string {
	seen := map[string]struct{}{}
	out := []string{}
	for _, it := range items {
		if _, ok := seen[it]; !ok {
			seen[it] = struct{}{}
			out = append(out, it)
		}
	}
	return out
}

// "tuple": fixed positions via a struct, unpacked by field
type Point struct {
	X, Y int
}

point := Point{3, 4}
px, py := point.X, point.Y`,

  solution: `from collections import namedtuple


def dedupe(items):
    return list(set(items))


def common_tags(a, b):
    return set(a) & set(b)


def midpoint(p, q):
    x1, y1 = p
    x2, y2 = q
    return ((x1 + x2) / 2, (y1 + y2) / 2)


Point = namedtuple("Point", ["x", "y"])


def make_point(x, y):
    return Point(x, y)

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Python</th></tr>
  <tr><td>Set literal</td><td><code>map[int]struct{}{1: {}, 2: {}}</code> (no built-in set type)</td><td><code>{1, 2}</code> (but <code>{}</code> is an empty dict &mdash; use <code>set()</code>)</td></tr>
  <tr><td>Membership</td><td><code>_, ok := s[x]</code></td><td><code>x in s</code></td></tr>
  <tr><td>Union / intersection / diff</td><td>hand-written loops over map keys</td><td><code>a | b</code>, <code>a &amp; b</code>, <code>a - b</code></td></tr>
  <tr><td>Tuple</td><td><code>struct{ X, Y int }</code> or multiple return values (no tuple type)</td><td><code>("a", 1)</code> (truly immutable)</td></tr>
  <tr><td>Unpack</td><td><code>x, y := point.X, point.Y</code></td><td><code>x, y = t</code></td></tr>
  <tr><td>Named fields</td><td>struct</td><td><code>namedtuple("P", ["x", "y"])</code></td></tr>
</table>
<p>Two gotchas. First, Go has no set type at all, so what a Go program simulates
with <code>map[T]struct{}</code> is one line in Python &mdash; but
<code>{}</code> is an empty <em>dict</em>, not a set; the empty set is
<code>set()</code>. Second, set elements and tuple entries must be
<em>hashable</em>: numbers, strings, and tuples qualify, but a <code>list</code>
or <code>dict</code> does not, so <code>{[1, 2]}</code> raises
<code>TypeError</code> &mdash; the same shape of restriction as Go's
<code>comparable</code> constraint on map keys, which rules out slices and maps
as keys too. That is exactly why tuples make great dictionary keys and set
members while lists cannot &mdash; e.g. <code>seen = {(0, 0), (1, 2)}</code> to
track visited grid cells, much like a Go program might use a comparable
<code>[2]int</code> array as a map key for the same purpose. A
<code>namedtuple</code> is still a plain tuple under the hood, so
<code>make_point(3, 4) == (3, 4)</code> is <code>True</code> and it unpacks and
indexes like any tuple, but you also get <code>.x</code> / <code>.y</code>
access and a readable <code>repr</code> &mdash; the ergonomics of a small Go
struct, without giving up tuple behavior.</p>`,
