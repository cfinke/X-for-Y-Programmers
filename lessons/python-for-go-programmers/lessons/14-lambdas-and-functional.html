  intro: `
<p>Go doesn't have a dedicated lambda syntax, but it does have function literals —
anonymous functions you can assign to a variable or pass around:
<code>func(x int) int { return x * 2 }</code>. Unlike Python's <code>lambda</code>,
Go has no shorthand; you always write out <code>func</code>, parameter types, and an
explicit <code>return</code>. And unlike Python's standard library, Go's has no
generic <code>map</code>, <code>filter</code>, or <code>reduce</code> — idiomatic Go
just writes a <code>for</code> loop that builds up a result slice.</p>
<p>Python's function-literal equivalent is the <code>lambda</code>: a single
expression, no braces, no <code>return</code>. <code>lambda x: x * 2</code> is close
to Go's <code>func(x int) int { return x * 2 }</code>, just terser — a lambda's body
must be one expression whose value is returned automatically.</p>
<table>
  <tr><th>Go</th><th>Python</th></tr>
  <tr><td><code>func(x int) int { return x * 2 }</code></td><td><code>lambda x: x * 2</code></td></tr>
  <tr><td>for loop building a new slice</td><td><code>map(f, xs)</code> &rarr; wrap in <code>list(...)</code></td></tr>
  <tr><td>for loop with an <code>if</code></td><td><code>filter(f, xs)</code> &rarr; wrap in <code>list(...)</code></td></tr>
  <tr><td><code>sort.Slice(xs, less)</code></td><td><code>sorted(xs, key=...)</code></td></tr>
  <tr><td>for loop accumulating <code>acc</code></td><td><code>reduce(f, xs, init)</code></td></tr>
</table>
<p>Two key differences. First, Python's <code>map</code> and <code>filter</code>
return lazy iterators, not lists — you usually wrap them in <code>list(...)</code>
to see the results; Go has no laziness here since you write the loop yourself.
Second, Go's <code>sort.Slice</code> doesn't take a <code>key=</code> function like
Python's <code>sorted</code>; it takes a <code>less(i, j int) bool</code> function
that compares two indexes directly. Often a comprehension reads better than
<code>map</code>/<code>filter</code> — prefer <code>[x * 2 for x in xs]</code> over
<code>list(map(lambda x: x * 2, xs))</code>. Reserve the functional tools for when
you already have a named function to pass, or for <code>sorted(key=...)</code> and
<code>reduce</code>, where they shine.</p>`,

  solution: `from functools import reduce


def double_all(nums):
    return list(map(lambda x: x * 2, nums))


def keep_evens(nums):
    return list(filter(lambda x: x % 2 == 0, nums))


def by_length(words):
    return sorted(words, key=len)


def total(nums):
    return reduce(lambda acc, x: acc + x, nums, 0)


def apply_twice(f, x):
    return f(f(x))

<table>

<p>A <code>lambda</code> is limited to a single expression — no statements, no
multi-line bodies. If you need branches or locals, use <code>def</code> and pass
the function by name; Python functions are first-class objects just like Go's
function values. For summing specifically, prefer the built-in <code>sum(nums)</code>
over <code>reduce</code> — <code>reduce</code> earns its keep for folds that
aren't already built in (running products, flattening, custom accumulation).</p>
<p>When choosing between <code>map</code>/<code>filter</code> and a comprehension,
lean Pythonic: <code>[x * 2 for x in xs if x &gt; 0]</code> replaces a nested
<code>map</code>+<code>filter</code> and reads top-to-bottom. Reach for
<code>map</code>/<code>filter</code> when you already have a named callable to pass
(e.g. <code>map(str, xs)</code>), and remember that both return lazy iterators —
they compute nothing until you iterate or wrap them in <code>list(...)</code>.</p>`,
