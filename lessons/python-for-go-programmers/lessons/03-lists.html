  intro: `
<p>Python's <code>list</code> is the everyday sequence — the counterpart to a
Go <code>slice</code>. It is ordered, mutable, and freely mixes types (though
you will usually keep one kind of thing in it), unlike a Go slice, which is
fixed to a single element type at compile time. The literal syntax differs
too: Go writes <code>[]int{1, 2, 3}</code> with an explicit element type,
while Python just writes <code>[1, 2, 3]</code>. What is new to a Go
programmer is <em>negative indexing</em> and <em>slicing</em>, two of the
most Pythonic things you will learn this week.</p>
<table>
  <tr><th>Go</th><th>Python</th></tr>
  <tr><td><code>xs := []int{1, 2, 3}</code></td><td><code>xs = [1, 2, 3]</code></td></tr>
  <tr><td><code>len(xs)</code></td><td><code>len(xs)</code></td></tr>
  <tr><td><code>xs[len(xs)-1]</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td><code>xs = append(xs, 4)</code></td><td><code>xs.append(4)</code></td></tr>
  <tr><td><code>xs[1:3]</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td><code>slices.Contains(xs, 2)</code></td><td><code>2 in xs</code></td></tr>
</table>
<p>Indexing from the end is not built into Go — you would write
<code>xs[len(xs)-1]</code> to reach the last element. Python's <code>xs[-1]</code>
and <code>xs[-2]</code> reach the last and second-to-last elements directly.
Go does have its own slice syntax, <code>xs[a:b]</code>, which returns a slice
header over the same backing array from index <code>a</code> up to (but not
including) <code>b</code>; Python's <code>xs[a:b]</code> looks identical but
always copies into a new list, either bound may be omitted (<code>xs[:2]</code>,
<code>xs[2:]</code>), and a third value is a step (<code>xs[::-1]</code>
reverses — Go has no equivalent shorthand). Membership in Go usually means a
manual loop or <code>slices.Contains</code> (Go 1.21+); Python spells it as the
<code>in</code> operator. The length is the free function <code>len(xs)</code>
in both languages — one of the rare places the syntax matches exactly.</p>
<p>Two ways to sort: <code>sorted(xs)</code> returns a new sorted list and leaves
<code>xs</code> alone, while <code>xs.sort()</code> reorders in place and returns
<code>None</code>. Go's <code>slices.Sort(xs)</code> (or the older
<code>sort.Ints(xs)</code>) always mutates in place — there is no built-in
"return a sorted copy" — so you must clone the slice yourself first if you need
one. And when you want to transform a list into another list, reach for a
<em>comprehension</em> — <code>[n * 2 for n in xs]</code> — the Pythonic
replacement for the explicit <code>for</code>-loop-with-buffer you would write
in Go.</p>`,

  go: `nums := []int{3, 1, 2}
nums = append(nums, 4)
last := nums[len(nums)-1]
firstTwo := nums[:2]
doubled := make([]int, len(nums))
for i, n := range nums {
	doubled[i] = n * 2
}
asc := slices.Clone(nums)
slices.Sort(asc)
hasThree := slices.Contains(nums, 3)`,

  task: `
<p>Write these list helpers in idiomatic Python:</p>

    { name: "contains finds and misses correctly", code: "    expect_true(contains([1, 2, 3], 2))\n    expect_true(not contains([1, 2, 3], 9))" },

  solution: `def make_range(n):
    return [i for i in range(n)]


def last(xs):
    return xs[-1]


def middle(xs):
    return xs[1:-1]


def with_added(xs, value):
    return xs + [value]


def doubled(xs):
    return [n * 2 for n in xs]


def sorted_desc(xs):
    return sorted(xs, reverse=True)


def contains(xs, value):
    return value in xs
`,

  notes: `
<table>
  <tr><th>Operation</th><th>Go</th><th>Python</th></tr>
  <tr><td>Length</td><td><code>len(xs)</code></td><td><code>len(xs)</code></td></tr>
  <tr><td>Last element</td><td><code>xs[len(xs)-1]</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td>Slice</td><td><code>xs[1:3]</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td>Reverse copy</td><td><code>c := slices.Clone(xs); slices.Reverse(c)</code></td><td><code>xs[::-1]</code></td></tr>
  <tr><td>Append</td><td><code>xs = append(xs, v)</code></td><td><code>xs.append(v)</code></td></tr>
  <tr><td>Concat many</td><td><code>xs = append(xs, ys...)</code></td><td><code>xs.extend(ys)</code></td></tr>
  <tr><td>Insert at i</td><td><code>xs = slices.Insert(xs, i, v)</code></td><td><code>xs.insert(i, v)</code></td></tr>
  <tr><td>Remove &amp; return</td><td>manual: <code>v, xs := xs[len(xs)-1], xs[:len(xs)-1]</code></td><td><code>xs.pop()</code> / <code>xs.pop(i)</code></td></tr>
  <tr><td>Map</td><td>manual <code>for</code> loop into a new slice</td><td><code>[f(x) for x in xs]</code></td></tr>
  <tr><td>Sort (copy)</td><td><code>c := slices.Clone(xs); slices.Sort(c)</code></td><td><code>sorted(xs)</code></td></tr>
  <tr><td>Sort (in place)</td><td><code>slices.Sort(xs)</code></td><td><code>xs.sort()</code></td></tr>
  <tr><td>Contains</td><td><code>slices.Contains(xs, v)</code></td><td><code>v in xs</code></td></tr>
</table>
<p>The key mental split is <strong>copy vs. mutate</strong>. <code>sorted(xs)</code>,
a slice, and a comprehension all build a <em>new</em> list; <code>xs.sort()</code>,
<code>xs.append(v)</code>, <code>xs.insert(i, v)</code>, and <code>xs.pop()</code>
change <code>xs</code> in place. Python's in-place methods return <code>None</code>,
so <code>ys = xs.sort()</code> is a classic beginner bug — it binds <code>ys</code>
to <code>None</code>. Go has the opposite trap: <code>append</code> always
returns a slice you must reassign (<code>xs = append(xs, v)</code>), and whether
it mutates the original backing array or allocates a new one silently depends on
capacity — a frequent source of Go bugs when two slices unexpectedly alias the
same array. Python's <code>xs + [value]</code> sidesteps that ambiguity entirely
by always making a fresh list, which is why <code>with_added</code> above uses
<code>+</code> instead of a mutating call to avoid touching its argument.</p>
<p>List comprehensions read left-to-right as "collect <em>expression</em> for each
<em>item</em>," and can filter with a trailing <code>if</code>:
<code>[n for n in xs if n &gt; 0]</code>. They are the first Pythonic idiom worth
building a reflex for — the explicit <code>for</code>-loop-with-append (or a
pre-sized buffer filled by index) you would write in Go collapses into a single
comprehension here.</p>`,
