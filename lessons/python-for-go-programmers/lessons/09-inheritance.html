const LESSON = {
  number: 9,
  title: "Inheritance",

  intro: `
<p>Python classes have real single inheritance, with genuine dynamic dispatch —
something Go doesn't have at all. Go has no <code>class</code> keyword and no
inheritance: <strong>struct embedding</strong> promotes an embedded type's
fields and methods onto the outer struct, but there is no shared base type, no
<code>super</code>, and no dispatch back down to an "overriding" method. Python
gives you the real thing: a subclass names its parent in parentheses —
<code>class Dog(Animal)</code>. To reach the parent's constructor you call
<code>super().__init__(...)</code>; like Go's embedding, Python does
<em>not</em> run any parent setup for you automatically, so if you write
<code>__init__</code> in the child and forget the <code>super()</code> call,
the parent's attributes simply never get created.</p>
<table>
  <tr><th>Go</th><th>Python</th></tr>
  <tr><td><code>type Dog struct { Animal }</code> (embedding)</td><td><code>class Dog(Animal):</code> (real inheritance)</td></tr>
  <tr><td>no constructors — a <code>NewDog(...)</code> function</td><td><code>super().__init__(name)</code></td></tr>
  <tr><td><code>d.Animal.Speak()</code> (explicit, no dispatch)</td><td><code>def speak(self):</code> (override, dynamic dispatch)</td></tr>
  <tr><td>type assertion / type switch on an interface</td><td><code>isinstance(x, Animal)</code></td></tr>
  <tr><td>embed another struct — no <code>implements</code></td><td><code>class C(A, M):</code> (mixin)</td></tr>
</table>
<p>Overriding is just defining a method with the same name in the subclass; the
most-derived version wins, and it can call the parent's version through
<code>super()</code> — this is real dynamic dispatch, which Go's embedding
never gives you, since an embedded type's methods have no idea an outer struct
exists. Type checks use <code>isinstance(obj, Cls)</code>, which is
<code>True</code> for subclasses too; Go has nothing to walk here, since
embedding is resolved at compile time and <code>Dog</code>/<code>Animal</code>
remain unrelated concrete types. Python has no <code>interface</code> keyword;
a <em>mixin</em> is just an extra base class that contributes methods, listed
alongside the main parent in the parentheses.</p>`,

  go: `type Animal struct {
	Name string
}

func (a Animal) Speak() string {
	return a.Name + " makes a sound"
}

type Dog struct {
	Animal
}

func (d Dog) Speak() string {
	return d.Animal.Speak() + " — woof!"
}

d := Dog{Animal{Name: "Rex"}}
d.Speak()  // "Rex makes a sound — woof!"
// no instanceof equivalent: Dog and Animal are unrelated
// concrete types, related only by the embedded field`,

  task: `
<p>Recreate the hierarchy in Python:</p>
<ol>
  <li>Write a base class <code>Animal</code> whose <code>__init__(self, name)</code>
      stores <code>self.name</code>, and whose <code>speak(self)</code> returns
      <code>"&lt;name&gt; makes a sound"</code>.</li>
  <li>Write <code>Dog(Animal)</code> that adds a <code>breed</code>: its
      <code>__init__(self, name, breed)</code> calls
      <code>super().__init__(name)</code> and then stores <code>self.breed</code>.
      Override <code>speak(self)</code> to return the parent's result plus
      <code>" — woof!"</code> — call <code>super().speak()</code>, don't
      rebuild the string.</li>
  <li>Write a mixin class <code>Loud</code> with a method
      <code>shout(self)</code> that returns <code>self.speak().upper()</code>,
      and <code>LoudDog(Dog, Loud)</code> that adds no new code (just
      <code>pass</code>).</li>
  <li>Write <code>describe(obj)</code> that returns <code>"animal"</code> if
      <code>obj</code> is an <code>Animal</code> (use <code>isinstance</code>)
      and <code>"other"</code> otherwise.</li>
</ol>`,

  starter: `class Animal:
    def __init__(self, name):
        pass  # TODO: store self.name

    def speak(self):
        return ""  # TODO


class Dog(Animal):
    def __init__(self, name, breed):
        pass  # TODO: call super().__init__ and store self.breed

    def speak(self):
        return ""  # TODO: call super().speak() and add " — woof!"


class Loud:
    def shout(self):
        return ""  # TODO


class LoudDog(Dog, Loud):
    pass


def describe(obj):
    return ""  # TODO: "animal" or "other"
`,

  requirements: [
    { pattern: /class\s+Dog\s*\(\s*Animal\s*\)/, message: "Define Dog as a subclass of Animal" },
    { pattern: /super\s*\(\s*\)\s*\.\s*__init__/, message: "Call super().__init__ from Dog" },
    { pattern: /isinstance\s*\(/, message: "Use isinstance() inside describe" },
  ],

  tests: [
    { name: 'Animal("Cat").speak() is "Cat makes a sound"', code: "    expect_eq(Animal(\"Cat\").speak(), \"Cat makes a sound\")" },
    { name: 'Dog stores name and breed', code: "    d = Dog(\"Rex\", \"Lab\")\n    expect_eq(d.name, \"Rex\")\n    expect_eq(d.breed, \"Lab\")" },
    { name: 'Dog.speak() calls super and appends', code: "    expect_eq(Dog(\"Rex\", \"Lab\").speak(), \"Rex makes a sound — woof!\")" },
    { name: 'a Dog is an Animal (isinstance)', code: "    expect_true(isinstance(Dog(\"Rex\", \"Lab\"), Animal))" },
    { name: 'LoudDog.shout() mixes in Loud', code: "    expect_eq(LoudDog(\"Rex\", \"Lab\").shout(), \"REX MAKES A SOUND — WOOF!\")" },
    { name: 'describe distinguishes animals from others', code: "    expect_eq(describe(Dog(\"Rex\", \"Lab\")), \"animal\")\n    expect_eq(describe(42), \"other\")" },
  ],

  solution: `class Animal:
    def __init__(self, name):
        self.name = name

    def speak(self):
        return f"{self.name} makes a sound"


class Dog(Animal):
    def __init__(self, name, breed):
        super().__init__(name)
        self.breed = breed

    def speak(self):
        return f"{super().speak()} — woof!"


class Loud:
    def shout(self):
        return self.speak().upper()


class LoudDog(Dog, Loud):
    pass


def describe(obj):
    return "animal" if isinstance(obj, Animal) else "other"
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Python</th></tr>
  <tr><td>Subclass</td><td><code>type B struct { A }</code> (embedding)</td><td><code>class B(A):</code></td></tr>
  <tr><td>Parent constructor</td><td><code>NewB(...)</code> builds the embedded field yourself</td><td><code>super().__init__(x)</code></td></tr>
  <tr><td>Call parent method</td><td><code>b.A.M()</code> (explicit, no dispatch)</td><td><code>super().m()</code></td></tr>
  <tr><td>Override</td><td>outer method just shadows the embedded one</td><td>same method name (real dynamic dispatch)</td></tr>
  <tr><td>Type check</td><td>type assertion / type switch on an interface</td><td><code>isinstance(x, A)</code></td></tr>
  <tr><td>Mixin</td><td>embed another struct</td><td>extra base class <code>(A, M)</code></td></tr>
</table>
<p>The biggest gotcha for a Go programmer: Python's <code>super().__init__(...)</code>
looks like it might be automatic, the way a zero-value struct field just
appears in Go, but it isn't — Python never calls the parent's
<code>__init__</code> for you either. If a subclass defines its own
<code>__init__</code>, it is fully responsible for invoking
<code>super().__init__(...)</code> — otherwise attributes the parent would have
set (like <code>self.name</code>) never get created, the same way a forgotten
embedded field in a <code>NewDog</code> constructor is silently left at its
zero value. But the resemblance stops there: Python's method lookup is
genuinely dynamic. Multiple inheritance resolves lookups left-to-right along
the <em>MRO</em> (method resolution order); for a simple mixin like
<code>Loud</code> that just adds a method, this means <code>LoudDog</code> gets
<code>speak</code> from <code>Dog</code> and <code>shout</code> from
<code>Loud</code> with no conflict — and when <code>Loud.shout()</code> calls
<code>self.speak()</code>, it dispatches to <code>Dog</code>'s override, not
<code>Animal</code>'s, something Go's fixed, compile-time
<code>d.Animal.Speak()</code> call can never do. You can also pass a tuple to
<code>isinstance</code>, e.g. <code>isinstance(x, (Dog, Cat))</code>.</p>`,
};
