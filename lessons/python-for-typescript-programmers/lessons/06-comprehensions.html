  title: "Comprehensions",

  intro: `
<p>In TypeScript you reshape an array with chained methods: <code>arr.map(...)</code>,
<code>arr.filter(...)</code>, <code>arr.reduce(...)</code>. Python has those tools too,
but the idiomatic way to build a new collection is the <em>comprehension</em> — a single
expression that reads like the math it models: <em>"this value, for each item, where a
condition holds."</em> One syntax covers lists, dicts, and sets, and swapping the brackets
for parentheses gives you a lazy <em>generator</em>.</p>
<table>
  <tr><th>TypeScript</th><th>Python</th></tr>
  <tr><td><code>xs.map(n => n * n)</code></td><td><code>[n * n for n in xs]</code></td></tr>
  <tr><td><code>xs.filter(n => n % 2 === 0)</code></td><td><code>[n for n in xs if n % 2 == 0]</code></td></tr>
  <tr><td><code>xs.map(...).filter(...)</code></td><td><code>[n * n for n in xs if n &gt; 0]</code></td></tr>
  <tr><td><code>new Map(ws.map(w =&gt; [w, w.length]))</code></td><td><code>{w: len(w) for w in ws}</code></td></tr>
  <tr><td><code>new Set(ws.map(w =&gt; w[0]))</code></td><td><code>{w[0] for w in ws}</code></td></tr>
  <tr><td><code>xs.reduce((a, n) =&gt; a + n * n, 0)</code></td><td><code>sum(n * n for n in xs)</code></td></tr>
</table>
<p>The shape is always <code>output_expr for var in iterable</code>, with an optional
<code>if condition</code> at the end to keep only some items. Square brackets build a
<code>list</code>, curly braces with <code>key: value</code> build a <code>dict</code>,
curly braces with a single value build a <code>set</code>, and parentheses build a
<em>generator expression</em> that yields items one at a time — perfect to hand straight
to <code>sum()</code>, <code>max()</code>, or <code>any()</code> without materializing a
throwaway list.</p>`,

  typescript: `const nums = [1, 2, 3, 4, 5];

const squares = nums.map(n => n * n);
const evens = nums.filter(n => n % 2 === 0);
const lengths = new Map(
  ["hi", "bye"].map(w => [w, w.length])
);
const total = nums.reduce((a, n) => a + n * n, 0);`,

  task: `
<p>Rewrite each of these as a comprehension or generator expression — no manual
accumulation loops, no <code>.append()</code>, no running totals.</p>
<ol>
  <li><code>squares(nums)</code> — return a list of each number squared.</li>
  <li><code>evens(nums)</code> — return a list of only the even numbers, in order.</li>
  <li><code>word_lengths(words)</code> — return a <code>dict</code> mapping each word to

  <li><code>first_letters(words)</code> — return a <code>set</code> of the first letter of
      each word.</li>
  <li><code>sum_of_squares(nums)</code> — return the sum of the squares, using a generator
      expression passed to <code>sum()</code>.</li>
</ol>`,

    { pattern: /\[[^\]]*for\s+\w+\s+in[^\]]*\]/, message: "Use a list comprehension" },

    { name: "evens([1,2,3,4,5,6]) keeps evens", code: "    expect_eq(evens([1, 2, 3, 4, 5, 6]), [2, 4, 6])" },
    { name: "evens([1,3,5]) is []", code: "    expect_eq(evens([1, 3, 5]), [])" },
    { name: "word_lengths maps word to length", code: "    expect_eq(word_lengths([\"hi\", \"bye\", \"a\"]), {\"hi\": 2, \"bye\": 3, \"a\": 1})" },
    { name: "first_letters returns a set", code: "    expect_eq(first_letters([\"apple\", \"avocado\", \"pear\"]), {\"a\", \"p\"})" },

  solution: `def squares(nums):
    return [n * n for n in nums]


def evens(nums):
    return [n for n in nums if n % 2 == 0]


def word_lengths(words):
    return {w: len(w) for w in words}


def first_letters(words):
    return {w[0] for w in words}


def sum_of_squares(nums):
    return sum(n * n for n in nums)

  notes: `
<table>
  <tr><th>Goal</th><th>TypeScript</th><th>Python comprehension</th></tr>
  <tr><td>Transform</td><td><code>xs.map(f)</code></td><td><code>[f(x) for x in xs]</code></td></tr>
  <tr><td>Filter</td><td><code>xs.filter(p)</code></td><td><code>[x for x in xs if p(x)]</code></td></tr>
  <tr><td>Map + filter</td><td><code>xs.filter(p).map(f)</code></td><td><code>[f(x) for x in xs if p(x)]</code></td></tr>
  <tr><td>Build a dict</td><td><code>new Map(...)</code></td><td><code>{k: v for x in xs}</code></td></tr>
  <tr><td>Build a set</td><td><code>new Set(...)</code></td><td><code>{expr for x in xs}</code></td></tr>
  <tr><td>Lazy stream</td><td>generator function</td><td><code>(expr for x in xs)</code></td></tr>
</table>
<p>Reach for a comprehension whenever you would otherwise write a loop that only builds a
collection — it is both shorter and, for lists, faster than an <code>.append()</code> loop.
Save an explicit <code>for</code> statement for when the body has real side effects
(printing, I/O, mutating something else).</p>
<p>The generator expression is the hidden gem: <code>sum(n * n for n in nums)</code> never
builds the intermediate list at all, so it works over huge or infinite iterables in constant
memory. When a generator expression is the sole argument to a function you can even drop the
extra parentheses — <code>sum(n * n for n in nums)</code> instead of
<code>sum((n * n for n in nums))</code>. Comprehensions also nest and support multiple
<code>for</code> clauses (<code>[x for row in grid for x in row]</code> flattens), but keep
them to one screen — past that, a plain loop reads better.</p>`,
