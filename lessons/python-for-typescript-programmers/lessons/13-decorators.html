const LESSON = {
  number: 13,
  title: "Decorators",

  intro: `
<p>A <em>decorator</em> is a function that takes a function and returns a
replacement function. The <code>@name</code> syntax on the line above a
<code>def</code> is just sugar: <code>@log</code> over <code>def greet(...)</code>
runs <code>greet = log(greet)</code> right after the function is defined. If
you have written a TypeScript method decorator you know the shape — but
Python's are plain functions, apply to any function (not just class members),
and need no <code>experimentalDecorators</code> flag or compiler support.</p>
<table>
  <tr><th>TypeScript</th><th>Python</th></tr>
  <tr><td><code>const g = log(greet)</code></td><td><code>@log</code> above <code>def greet</code></td></tr>
  <tr><td><code>(...args: any[]) =&gt; { … }</code></td><td><code>def wrapper(*args, **kwargs):</code></td></tr>
  <tr><td>spread <code>fn(...args)</code></td><td><code>fn(*args, **kwargs)</code></td></tr>
  <tr><td>copy <code>name</code>/<code>length</code> by hand</td><td><code>@functools.wraps(fn)</code></td></tr>
</table>
<p>The wrapper accepts <code>*args, **kwargs</code> so it forwards any call
signature, does its extra work, then calls the original and returns its result.
One catch: the wrapper replaces the original, so <code>greet.__name__</code>
would become <code>"wrapper"</code>. Fix that by decorating the wrapper with
<code>@functools.wraps(fn)</code>, which copies <code>__name__</code>,
<code>__doc__</code>, and friends across — the equivalent of preserving a
function's identity metadata.</p>
<p>A <em>decorator that takes arguments</em> is one level deeper: a function
that returns a decorator. <code>@repeat(3)</code> calls <code>repeat(3)</code>,
which returns the actual decorator, which then wraps the function.</p>`,

  typescript: `function callCounter<A extends any[], R>(fn: (...a: A) => R) {
  let calls = 0;
  const wrapper = (...args: A): R => {
    calls++;
    (wrapper as any).calls = calls;
    return fn(...args);
  };
  return wrapper;
}

const add = callCounter((a: number, b: number) => a + b);
add(1, 2);
add(3, 4);
console.log((add as any).calls); // 2`,

  task: `
<p>Build three decorators:</p>
<ol>
  <li><code>count_calls(fn)</code> — wraps <code>fn</code> so that each call
      increments a counter. Expose the count on the wrapper as an attribute
      named <code>calls</code> (start at 0). Use
      <code>@functools.wraps(fn)</code> so <code>wrapper.__name__</code> keeps
      the original function's name.</li>
  <li><code>memoize(fn)</code> — caches results by the positional-argument
      tuple, so a repeat call with the same args skips <code>fn</code> and
      returns the stored value.</li>
  <li><code>repeat(n)</code> — a decorator <em>factory</em>: <code>@repeat(n)</code>
      returns a decorator that calls the function <code>n</code> times and
      returns the <em>last</em> result.</li>
</ol>
<p>Then apply <code>@count_calls</code> to a function <code>add(a, b)</code> and
<code>@repeat(3)</code> to a function <code>bump()</code> defined at module
level.</p>`,

  starter: `import functools


def count_calls(fn):
    # TODO: wrap fn, count calls, expose .calls, use functools.wraps
    return fn


def memoize(fn):
    # TODO: cache results by the args tuple
    return fn


def repeat(n):
    # TODO: return a decorator that runs the function n times
    def decorator(fn):
        return fn
    return decorator


@count_calls
def add(a, b):
    return a + b


_counter = 0


@repeat(3)
def bump():
    global _counter
    _counter += 1
    return _counter
`,

  requirements: [
    { pattern: /functools\.wraps/, message: "Use functools.wraps on the count_calls wrapper" },
    { pattern: /@count_calls/, message: "Apply @count_calls to add" },
    { pattern: /@repeat\(/, message: "Apply @repeat(...) with an argument to bump" },
  ],

  tests: [
    { name: "add still computes correctly", code: "    expect_eq(add(2, 3), 5)" },
    { name: "count_calls tracks the number of calls", code:
      "    add.calls = 0\n" +
      "    add(1, 1)\n" +
      "    add(2, 2)\n" +
      "    add(3, 3)\n" +
      "    expect_eq(add.calls, 3)" },
    { name: "functools.wraps preserves __name__", code: "    expect_eq(add.__name__, \"add\")" },
    { name: "memoize caches by args and skips recomputation", code:
      "    hits = []\n" +
      "    @memoize\n" +
      "    def square(x):\n" +
      "        hits.append(x)\n" +
      "        return x * x\n" +
      "    expect_eq(square(4), 16)\n" +
      "    expect_eq(square(4), 16)\n" +
      "    expect_eq(square(5), 25)\n" +
      "    expect_eq(hits, [4, 5])" },
    { name: "repeat(3) runs the function three times, returns last result", code:
      "    global _counter\n" +
      "    _counter = 0\n" +
      "    result = bump()\n" +
      "    expect_eq(result, 3)\n" +
      "    expect_eq(_counter, 3)" },
  ],

  solution: `import functools


def count_calls(fn):
    @functools.wraps(fn)
    def wrapper(*args, **kwargs):
        wrapper.calls += 1
        return fn(*args, **kwargs)
    wrapper.calls = 0
    return wrapper


def memoize(fn):
    cache = {}

    @functools.wraps(fn)
    def wrapper(*args):
        if args not in cache:
            cache[args] = fn(*args)
        return cache[args]
    return wrapper


def repeat(n):
    def decorator(fn):
        @functools.wraps(fn)
        def wrapper(*args, **kwargs):
            result = None
            for _ in range(n):
                result = fn(*args, **kwargs)
            return result
        return wrapper
    return decorator


@count_calls
def add(a, b):
    return a + b


_counter = 0


@repeat(3)
def bump():
    global _counter
    _counter += 1
    return _counter
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>Python</th></tr>
  <tr><td>Apply a decorator</td><td><code>@dec</code> (class members only)</td><td><code>@dec</code> above any <code>def</code></td></tr>
  <tr><td>Forward all args</td><td><code>(...args) =&gt; fn(...args)</code></td><td><code>def w(*args, **kwargs): fn(*args, **kwargs)</code></td></tr>
  <tr><td>Preserve metadata</td><td>manual</td><td><code>@functools.wraps(fn)</code></td></tr>
  <tr><td>Parameterized</td><td>decorator factory returns decorator</td><td><code>repeat(n)</code> returns a decorator</td></tr>
  <tr><td>Built-in memoize</td><td>—</td><td><code>@functools.lru_cache</code></td></tr>
</table>
<p>Three nesting levels are the whole trick. A plain decorator is one function
(<code>fn</code> in, wrapper out). A parameterized decorator is two
(<code>repeat(n)</code> returns <code>decorator</code>, which returns
<code>wrapper</code>). Attributes stick to functions because functions are
objects — <code>wrapper.calls</code> is just an attribute, the same way you
would hang state off a closure in TypeScript.</p>
<p>In real code you rarely hand-roll a memoizer: the standard library ships
<code>@functools.lru_cache(maxsize=None)</code>, which does exactly what our
<code>memoize</code> does (keyed on the args) with eviction and thread-safety
thrown in. Writing your own once, though, demystifies every decorator you will
meet — <code>@property</code>, <code>@staticmethod</code>,
<code>@dataclass</code>, and the route decorators in web frameworks are all the
same pattern.</p>`,
};
