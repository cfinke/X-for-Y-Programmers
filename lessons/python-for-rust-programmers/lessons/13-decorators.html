  title: "Decorators",

  intro: `
<p>A <em>decorator</em> is a function that takes a function and returns a
replacement function. The <code>@name</code> syntax on the line above a
<code>def</code> is just sugar: <code>@log</code> over <code>def greet(...)</code>
runs <code>greet = log(greet)</code> right after the function is defined. If
you have written a Rust attribute macro (<code>#[my_macro]</code> above a
<code>fn</code>) the shape looks familiar — the annotation sits directly above
the definition — but a Rust attribute macro is a <em>compile-time</em> source
transformation (a proc-macro crate rewriting tokens before <code>rustc</code>
ever sees a function), while Python's decorator is an ordinary <em>runtime</em>
function call. Decorators are plain functions, apply to any function (not just
items you have tagged for a macro crate to process), and need no
<code>syn</code>/<code>quote</code> machinery or separate proc-macro crate.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>#[my_macro]</code> above <code>fn greet(...)</code> (compile-time)</td><td><code>@log</code> above <code>def greet</code> (runtime)</td></tr>
  <tr><td>closure capturing state: <code>move |args| { … }</code></td><td><code>def wrapper(*args, **kwargs):</code></td></tr>
  <tr><td>no variadics — fixed arity or a tuple/generic parameter</td><td><code>fn(*args, **kwargs)</code></td></tr>
  <tr><td>original <code>fn</code> keeps its own name; wrapper is a new binding</td><td><code>@functools.wraps(fn)</code></td></tr>
</table>
<p>The wrapper accepts <code>*args, **kwargs</code> so it forwards any call
signature, does its extra work, then calls the original and returns its result.
One catch: the wrapper replaces the original, so <code>greet.__name__</code>
would become <code>"wrapper"</code>. Fix that by decorating the wrapper with
<code>@functools.wraps(fn)</code>, which copies <code>__name__</code>,
<code>__doc__</code>, and friends across — there is no Rust equivalent to
"lose," since a Rust closure has no name of its own to begin with, and a named
wrapper function simply keeps whatever name you gave it.</p>
<p>A <em>decorator that takes arguments</em> is one level deeper: a function
that returns a decorator. <code>@repeat(3)</code> calls <code>repeat(3)</code>,
which returns the actual decorator, which then wraps the function.</p>`,

  rust: `struct CallCounter<F> {
    inner: F,
    calls: u32,
}

impl<F> CallCounter<F>
where
    F: Fn(i32, i32) -> i32,
{
    fn new(inner: F) -> Self {
        CallCounter { inner, calls: 0 }
    }

    fn call(&mut self, a: i32, b: i32) -> i32 {
        self.calls += 1;
        (self.inner)(a, b)
    }
}

let mut add = CallCounter::new(|a, b| a + b);
add.call(1, 2);
add.call(3, 4);
println!("{}", add.calls); // 2`,

  task: `
<p>Build three decorators:</p>
<ol>
  <li><code>count_calls(fn)</code> — wraps <code>fn</code> so that each call
      increments a counter. Expose the count on the wrapper as an attribute
      named <code>calls</code> (start at 0). Use
      <code>@functools.wraps(fn)</code> so <code>wrapper.__name__</code> keeps
      the original function's name.</li>
  <li><code>memoize(fn)</code> — caches results by the positional-argument
      tuple, so a repeat call with the same args skips <code>fn</code> and
      returns the stored value.</li>
  <li><code>repeat(n)</code> — a decorator <em>factory</em>: <code>@repeat(n)</code>
      returns a decorator that calls the function <code>n</code> times and
      returns the <em>last</em> result.</li>
</ol>
<p>Then apply <code>@count_calls</code> to a function <code>add(a, b)</code> and
<code>@repeat(3)</code> to a function <code>bump()</code> defined at module
level.</p>`,

  solution: `import functools


def count_calls(fn):
    @functools.wraps(fn)
    def wrapper(*args, **kwargs):
        wrapper.calls += 1
        return fn(*args, **kwargs)
    wrapper.calls = 0
    return wrapper


def memoize(fn):
    cache = {}

    @functools.wraps(fn)
    def wrapper(*args):
        if args not in cache:
            cache[args] = fn(*args)
        return cache[args]
    return wrapper


def repeat(n):
    def decorator(fn):
        @functools.wraps(fn)
        def wrapper(*args, **kwargs):
            result = None
            for _ in range(n):
                result = fn(*args, **kwargs)
            return result
        return wrapper
    return decorator


@count_calls
def add(a, b):
    return a + b


_counter = 0


@repeat(3)
def bump():
    global _counter
    _counter += 1
    return _counter
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Apply a decorator</td><td><code>#[attr]</code> (compile-time, needs a macro crate)</td><td><code>@dec</code> above any <code>def</code></td></tr>
  <tr><td>Forward all args</td><td>fixed-arity closure, or generic over a tuple</td><td><code>def w(*args, **kwargs): fn(*args, **kwargs)</code></td></tr>
  <tr><td>Preserve metadata</td><td>not applicable — the original <code>fn</code> keeps its own name</td><td><code>@functools.wraps(fn)</code></td></tr>
  <tr><td>Parameterized</td><td>proc-macro attribute with arguments, e.g. <code>#[repeat(3)]</code></td><td><code>repeat(n)</code> returns a decorator</td></tr>
  <tr><td>Built-in memoize</td><td>none in std; crates like <code>cached</code></td><td><code>@functools.lru_cache</code></td></tr>
</table>
<p>Three nesting levels are the whole trick. A plain decorator is one function
(<code>fn</code> in, wrapper out). A parameterized decorator is two
(<code>repeat(n)</code> returns <code>decorator</code>, which returns
<code>wrapper</code>). Attributes stick to functions because functions are
objects — <code>wrapper.calls</code> is just an attribute, the same way you
would hang state off a closure in Rust by capturing a <code>Cell</code> or
wrapping it in a struct — except Rust's borrow checker forces you to be
explicit about that mutability, where Python just lets you assign to it.</p>
<p>In real code you rarely hand-roll a memoizer: the standard library ships
<code>@functools.lru_cache(maxsize=None)</code>, which does exactly what our
<code>memoize</code> does (keyed on the args) with eviction and thread-safety
thrown in. Writing your own once, though, demystifies every decorator you will
meet — <code>@property</code>, <code>@staticmethod</code>,
<code>@dataclass</code>, and the route decorators in web frameworks are all the
same pattern.</p>`,
};
