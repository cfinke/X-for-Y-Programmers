  intro: `
<p>In Rust you reach for a <code>HashMap</code> and hand-roll the counting and
grouping logic yourself with the <code>entry</code> API — check whether a key
exists, seed it with <code>0</code> or an empty <code>Vec</code>, then update.
Python's standard library ships that boilerplate as ready-made containers in
the <code>collections</code> module. Three of them come up constantly.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>let mut m: HashMap&lt;String, i32&gt; = HashMap::new();</code></td><td><code>Counter(words)</code></td></tr>
  <tr><td><code>*m.entry(k).or_insert(0) += 1;</code></td><td><code>counter[k] += 1</code></td></tr>
  <tr><td><code>groups.entry(k).or_insert_with(Vec::new).push(v);</code></td><td><code>groups[k].append(v)</code></td></tr>
  <tr><td><code>struct Point { x: i32, y: i32 }</code></td><td><code>Point = namedtuple("Point", ["x", "y"])</code></td></tr>
</table>
<p><code>Counter</code> is a <code>dict</code> subclass that tallies hashable
items for you: pass it any iterable and it counts occurrences.
<code>defaultdict</code> is a <code>dict</code> that calls a factory function to
supply a default the first time you touch a missing key — perfect for grouping.
<code>namedtuple</code> builds a lightweight tuple subclass whose fields have
names, giving you <code>p.x</code> access without writing a class.</p>`,

  rust: `use std::collections::HashMap;

// Counting by hand with a HashMap:
let mut counts: HashMap<&str, i32> = HashMap::new();
for w in ["a", "b", "a"] {
    *counts.entry(w).or_insert(0) += 1;
}

// Grouping by hand:
let mut groups: HashMap<char, Vec<&str>> = HashMap::new();
for w in ["apple", "avocado", "beet"] {
    let first = w.chars().next().unwrap();
    groups.entry(first).or_insert_with(Vec::new).push(w);
}

// A named record:
struct Point { x: i32, y: i32 }
let p = Point { x: 1, y: 2 };`,

  solution: `from collections import Counter, defaultdict, namedtuple


def count_words(text):
    return Counter(text.split())


def count_chars(text):
    return Counter(text)


def group_by_first_letter(words):
    groups = defaultdict(list)
    for word in words:
        groups[word[0]].append(word)
    return groups


Point = namedtuple("Point", ["x", "y"])


def make_point(x, y):
    return Point(x, y)
`,

<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Count items</td><td><code>*m.entry(k).or_insert(0) += 1;</code></td><td><code>Counter(items)</code></td></tr>
  <tr><td>Top N</td><td>sort entries yourself</td><td><code>counter.most_common(3)</code></td></tr>
  <tr><td>Group into lists</td><td><code>g.entry(k).or_insert_with(Vec::new).push(v);</code></td><td><code>defaultdict(list)</code></td></tr>
  <tr><td>Named record</td><td><code>struct P { x: i32 }</code></td><td><code>namedtuple("P", ["x"])</code></td></tr>
  <tr><td>Field access</td><td><code>p.x</code></td><td><code>p.x</code> (also <code>p[0]</code>)</td></tr>
</table>
<p>A <code>Counter</code> compares equal to a plain <code>dict</code> with the
same counts, and missing keys read as <code>0</code> instead of raising —
handy, but it means a typo silently returns zero rather than a
<code>KeyError</code>. Its <code>most_common(n)</code> returns
<code>(item, count)</code> pairs sorted high to low.</p>
<p>A <code>defaultdict</code> takes a zero-argument <em>factory</em>
(<code>list</code>, <code>int</code>, <code>set</code>, or any callable). Merely
<em>reading</em> a missing key inserts the default and returns it, so
<code>d["z"]</code> both creates and returns an empty list. A
<code>namedtuple</code> is still an immutable tuple — it unpacks and indexes like
one — but its named fields make code far more readable than positional
<code>t[0]</code>/<code>t[1]</code> access.</p>`,
