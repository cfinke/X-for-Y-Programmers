  title: "Comprehensions",

  intro: `
<p>In Rust you reshape a collection with chained iterator adapters:
<code>iter().map(...)</code>, <code>.filter(...)</code>, <code>.fold(...)</code>, finished
off with a <code>.collect()</code> that tells the compiler what container to build. Python
has similar tools (<code>map()</code>, <code>filter()</code>), but the idiomatic way to
build a new collection is the <em>comprehension</em> — a single expression that reads like
the math it models: <em>"this value, for each item, where a condition holds."</em> One
syntax covers lists, dicts, and sets, and swapping the brackets for parentheses gives you a
lazy <em>generator</em>, no <code>.collect()</code> required.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>xs.iter().map(|n| n * n).collect::&lt;Vec&lt;_&gt;&gt;()</code></td><td><code>[n * n for n in xs]</code></td></tr>
  <tr><td><code>xs.iter().filter(|&&n| n % 2 == 0).collect::&lt;Vec&lt;_&gt;&gt;()</code></td><td><code>[n for n in xs if n % 2 == 0]</code></td></tr>
  <tr><td><code>xs.iter().map(...).filter(...).collect()</code></td><td><code>[n * n for n in xs if n &gt; 0]</code></td></tr>
  <tr><td><code>ws.iter().map(|w| (*w, w.len())).collect::&lt;HashMap&lt;_,_&gt;&gt;()</code></td><td><code>{w: len(w) for w in ws}</code></td></tr>
  <tr><td><code>ws.iter().map(|w| w.chars().next()).collect::&lt;HashSet&lt;_&gt;&gt;()</code></td><td><code>{w[0] for w in ws}</code></td></tr>
  <tr><td><code>xs.iter().fold(0, |a, n| a + n * n)</code></td><td><code>sum(n * n for n in xs)</code></td></tr>
</table>
<p>The shape is always <code>output_expr for var in iterable</code>, with an optional
<code>if condition</code> at the end to keep only some items. Square brackets build a
<code>list</code>, curly braces with <code>key: value</code> build a <code>dict</code>,
curly braces with a single value build a <code>set</code>, and parentheses build a
<em>generator expression</em> that yields items one at a time — perfect to hand straight
to <code>sum()</code>, <code>max()</code>, or <code>any()</code> without materializing a
throwaway list, much like a Rust iterator chain that never calls <code>.collect()</code>.</p>`,

  rust: `let nums = vec![1, 2, 3, 4, 5];

let squares: Vec<i32> = nums.iter().map(|n| n * n).collect();
let evens: Vec<i32> = nums.iter().filter(|&&n| n % 2 == 0).cloned().collect();
let lengths: std::collections::HashMap<&str, usize> = ["hi", "bye"]
    .iter()
    .map(|w| (*w, w.len()))
    .collect();
let total: i32 = nums.iter().fold(0, |a, n| a + n * n);`,

  task: `
<p>Rewrite each of these as a comprehension or generator expression — no manual

<ol>
  <li><code>squares(nums)</code> — return a list of each number squared.</li>
  <li><code>evens(nums)</code> — return a list of only the even numbers, in order.</li>
  <li><code>word_lengths(words)</code> — return a <code>dict</code> mapping each word to

  <li><code>first_letters(words)</code> — return a <code>set</code> of the first letter of
      each word.</li>
  <li><code>sum_of_squares(nums)</code> — return the sum of the squares, using a generator
      expression passed to <code>sum()</code>.</li>
</ol>`,

    { name: "evens([1,3,5]) is []", code: "    expect_eq(evens([1, 3, 5]), [])" },
    { name: "word_lengths maps word to length", code: "    expect_eq(word_lengths([\"hi\", \"bye\", \"a\"]), {\"hi\": 2, \"bye\": 3, \"a\": 1})" },

  solution: `def squares(nums):
    return [n * n for n in nums]


def evens(nums):
    return [n for n in nums if n % 2 == 0]


def word_lengths(words):
    return {w: len(w) for w in words}


def first_letters(words):
    return {w[0] for w in words}


def sum_of_squares(nums):
    return sum(n * n for n in nums)

  notes: `
<table>
  <tr><th>Goal</th><th>Rust</th><th>Python comprehension</th></tr>
  <tr><td>Transform</td><td><code>xs.iter().map(f).collect()</code></td><td><code>[f(x) for x in xs]</code></td></tr>
  <tr><td>Filter</td><td><code>xs.iter().filter(p).collect()</code></td><td><code>[x for x in xs if p(x)]</code></td></tr>
  <tr><td>Map + filter</td><td><code>xs.iter().filter(p).map(f).collect()</code></td><td><code>[f(x) for x in xs if p(x)]</code></td></tr>
  <tr><td>Build a dict</td><td><code>.collect::&lt;HashMap&lt;_,_&gt;&gt;()</code></td><td><code>{k: v for x in xs}</code></td></tr>
  <tr><td>Build a set</td><td><code>.collect::&lt;HashSet&lt;_&gt;&gt;()</code></td><td><code>{expr for x in xs}</code></td></tr>
  <tr><td>Lazy stream</td><td>iterator (lazy by default)</td><td><code>(expr for x in xs)</code></td></tr>
</table>
<p>Reach for a comprehension whenever you would otherwise write a loop that only builds a
collection — it is both shorter and, for lists, faster than an <code>.append()</code> loop.
Save an explicit <code>for</code> statement for when the body has real side effects
(printing, I/O, mutating something else).</p>
<p>The generator expression is the hidden gem: <code>sum(n * n for n in nums)</code> never
builds the intermediate list at all, so it works over huge or infinite iterables in constant
memory — the same laziness a Rust iterator chain gives you for free before you ever call
<code>.collect()</code>. When a generator expression is the sole argument to a function you
can even drop the extra parentheses — <code>sum(n * n for n in nums)</code> instead of
<code>sum((n * n for n in nums))</code>. Comprehensions also nest and support multiple
<code>for</code> clauses (<code>[x for row in grid for x in row]</code> flattens), but keep
them to one screen — past that, a plain loop reads better.</p>`,
