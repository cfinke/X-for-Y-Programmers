  intro: `
<p>Time to put it all together. In Rust you might model a small in-memory
store with a <code>struct</code> for the record, another <code>struct</code>
wrapping a <code>HashMap</code>, custom error variants on an <code>enum</code>
returned via <code>Result</code>, and iterator adapters
(<code>filter</code>/<code>map</code>/<code>sum</code>) to query it. Python
gives you the same shape with different spellings: a <code>@dataclass</code>
instead of a struct, a plain <code>dict</code> instead of <code>HashMap</code>,
custom <code>Exception</code> subclasses instead of a <code>Result</code>-returning
enum, and comprehensions/generator expressions instead of the iterator-adapter
chains.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>struct Product { name: String }</code></td><td><code>@dataclass\nclass Product: name: str</code></td></tr>
  <tr><td><code>HashMap::&lt;String, Product&gt;::new()</code></td><td><code>{}</code> (a dict)</td></tr>
  <tr><td><code>enum StoreError { NotFound(String) }</code></td><td><code>class ProductNotFound(Exception): pass</code></td></tr>
  <tr><td><code>return Err(StoreError::NotFound(name))</code></td><td><code>raise ProductNotFound(name)</code></td></tr>
  <tr><td><code>items.iter().filter(|p| p.tags.contains(&t))</code></td><td><code>[p for p in items if t in p.tags]</code></td></tr>
  <tr><td><code>items.iter().map(|p| p.price).sum::&lt;f64&gt;()</code></td><td><code>sum(p.price for p in items)</code></td></tr>
</table>
<p>This capstone ties together the dataclass, dict/list processing,
comprehensions, and exceptions you have met in earlier lessons — no new syntax,
just idiomatic assembly.</p>`,

  rust: `use std::collections::HashMap;

struct Product {
    name: String,
    price: f64,
    tags: Vec<String>,
}

#[derive(Debug)]
enum StoreError {
    NotFound(String),
    Duplicate(String),
}

struct Store {
    items: HashMap<String, Product>,
}

impl Store {
    fn new() -> Self {
        Store { items: HashMap::new() }
    }

    fn add(&mut self, p: Product) -> Result<(), StoreError> {
        if self.items.contains_key(&p.name) {
            return Err(StoreError::Duplicate(p.name));
        }
        self.items.insert(p.name.clone(), p);
        Ok(())
    }

    fn get(&self, name: &str) -> Result<&Product, StoreError> {
        self.items
            .get(name)
            .ok_or_else(|| StoreError::NotFound(name.to_string()))
    }

    fn total_value(&self) -> f64 {
        self.items.values().map(|p| p.price).sum()
    }

    fn names_with_tag(&self, tag: &str) -> Vec<String> {
        let mut names: Vec<String> = self
            .items
            .values()
            .filter(|p| p.tags.iter().any(|t| t == tag))
            .map(|p| p.name.clone())
            .collect();
        names.sort();
        names
    }
}

fn load(records: Vec<Product>) -> Result<Store, StoreError> {
    let mut store = Store::new();
    for r in records {
        store.add(r)?;
    }
    Ok(store)
}`,

  solution: `from dataclasses import dataclass, field


class ProductNotFound(Exception):
    pass


class DuplicateProduct(Exception):
    pass


@dataclass
class Product:
    name: str
    price: float
    tags: list = field(default_factory=list)


class Store:
    def __init__(self):
        self._items = {}

    def add(self, product):
        if product.name in self._items:
            raise DuplicateProduct(product.name)
        self._items[product.name] = product

    def get(self, name):
        if name not in self._items:
            raise ProductNotFound(name)
        return self._items[name]

    def total_value(self):
        return sum(p.price for p in self._items.values())

    def names_with_tag(self, tag):
        return sorted(p.name for p in self._items.values() if tag in p.tags)


def load(records):
    store = Store()
    for r in records:
        store.add(Product(name=r["name"], price=r["price"], tags=r.get("tags", [])))
    return store
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Record type</td><td><code>struct</code></td><td><code>@dataclass</code></td></tr>
  <tr><td>Keyed store</td><td><code>HashMap&lt;K, V&gt;</code></td><td><code>dict</code></td></tr>
  <tr><td>Membership</td><td><code>map.contains_key(&k)</code></td><td><code>k in d</code></td></tr>
  <tr><td>Custom error</td><td><code>enum E { Variant(String) }</code></td><td><code>class E(Exception): pass</code></td></tr>
  <tr><td>Signal an error</td><td><code>return Err(E::Variant(x))</code></td><td><code>raise E(x)</code></td></tr>
  <tr><td>Reduce/sum</td><td><code>iter.map(f).sum::&lt;f64&gt;()</code></td><td><code>sum(x for x in arr)</code></td></tr>
  <tr><td>Filter + map + sort</td><td><code>iter.filter(...).map(...).collect(); v.sort()</code></td><td><code>sorted(f(x) for x in arr if g(x))</code></td></tr>
</table>
<p>A few Pythonic touches worth noting. <code>field(default_factory=list)</code>
gives each instance its own fresh list — the equivalent mistake in Python to a
shared mutable default is a real trap, and the dataclass field factory is how you
avoid it. Passing a generator expression straight into <code>sum()</code> or
<code>sorted()</code> (no surrounding brackets) is the idiomatic replacement for
a <code>filter</code>/<code>map</code>/<code>sum</code> iterator chain, and it
avoids building an intermediate list. Finally, custom exceptions are just
classes that inherit from <code>Exception</code>; you catch them by type with
<code>except ProductNotFound:</code>. This is a bigger shift coming from Rust
than it looks: Rust has no exceptions in the Python sense — errors are
ordinary values wrapped in <code>Err(...)</code>, returned up the call stack
explicitly with <code>?</code>, and handled with <code>match</code> or
<code>.ok_or_else(...)</code>. Nothing unwinds automatically the way a Python
<code>raise</code> (or a Rust <code>panic!</code>, which is reserved for
unrecoverable bugs, not everyday control flow) does.</p>`,
