const LESSON = {
  number: 7,
  title: "Classes",

  intro: `
<p>Python classes will feel familiar in shape but far looser than Rust's
<code>struct</code> + <code>impl</code> split. There is no separate type
definition and method block — fields and methods live together in one
<code>class</code>. Instead of a free function that takes <code>&self</code>
or a builder-style associated function, Python gives you a method named
<code>__init__</code> that runs on construction, and every method takes the
instance as its first parameter, spelled <code>self</code> by convention
(Rust's explicit <code>&self</code> parameter, but without the
<code>&amp;</code> — Python references are implicit). You create instance
attributes by assigning to <code>self.something</code>, usually inside
<code>__init__</code>; there is no separate field-declaration list like a
Rust <code>struct</code> body.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>struct Dog { name: String }</code></td><td><code>class Dog:</code></td></tr>
  <tr><td><code>impl Dog { fn new(name: String) -> Self {</code></td><td><code>def __init__(self, name):</code></td></tr>
  <tr><td><code>Self { name }</code></td><td><code>self.name = name</code></td></tr>
  <tr><td><code>fn bark(&self) { … }</code></td><td><code>def bark(self): …</code></td></tr>
  <tr><td><code>Dog::new("Rex".to_string())</code></td><td><code>Dog("Rex")</code></td></tr>
  <tr><td><code>const SPECIES: &str = "…";</code> (impl-level)</td><td><code>species = "…"</code> (in class body)</td></tr>
</table>
<p>A name assigned directly in the class body (not on <code>self</code>) is a
<em>class attribute</em> — shared by every instance, similar in spirit to a
Rust associated constant, and reachable as <code>self.species</code> or
<code>Dog.species</code>. Notice you call the class directly, no
<code>::new</code> convention required: <code>Dog("Rex")</code> runs
<code>__init__</code> and hands back the instance — though nothing stops you
from also writing an actual <code>__init__</code> that mirrors a builder.</p>
<p>Python has no <code>pub</code>/private visibility system. Encapsulation is
<em>by convention</em>: a leading underscore (<code>_balance</code>) signals
"internal, please don't touch." Nothing enforces it — unlike Rust's
module-and-<code>pub</code> visibility rules, which the compiler checks, this
is a promise between programmers, not a compiler rule.</p>`,

  rust: `struct Account {
    owner: String,
    _balance: f64,
}

const BANK: &str = "Pygmy Bank";

impl Account {
    fn new(owner: String, opening: f64) -> Self {
        Account { owner, _balance: opening }
    }

    fn deposit(&mut self, amount: f64) {
        self._balance += amount;
    }

    fn balance(&self) -> f64 {
        self._balance
    }
}

let mut a = Account::new("Ada".to_string(), 100.0);
a.deposit(50.0);
a.balance(); // 150.0`,

  task: `
<p>Write an <code>Account</code> class:</p>
<ol>
  <li>Give it a <strong>class attribute</strong> <code>bank = "Pygmy Bank"</code>
      shared by all instances.</li>
  <li><code>__init__(self, owner, opening)</code> stores <code>owner</code> as a
      public attribute and the opening amount in a "private-by-convention"
      attribute <code>_balance</code>.</li>
  <li><code>deposit(self, amount)</code> adds to <code>_balance</code> and
      returns the new balance.</li>
  <li><code>withdraw(self, amount)</code> subtracts from <code>_balance</code> if
      there are sufficient funds and returns <code>True</code>; otherwise it
      leaves the balance untouched and returns <code>False</code>.</li>
  <li><code>balance(self)</code> returns the current <code>_balance</code>.</li>
</ol>`,

  starter: `class Account:
    # 1. class attribute shared by all instances
    bank = ""  # TODO

    def __init__(self, owner, opening):
        pass  # TODO: set self.owner and self._balance

    def deposit(self, amount):
        return None  # TODO: add to _balance, return new balance

    def withdraw(self, amount):
        return None  # TODO: return True on success, False if insufficient

    def balance(self):

`,

  requirements: [
    { pattern: /def\s+__init__\s*\(\s*self/, message: "Define __init__(self, ...)" },
    { pattern: /self\._balance/, message: "Store the balance in a _balance attribute (private by convention)" },
    { pattern: /bank\s*=\s*["']Pygmy Bank["']/, message: "Add a class attribute bank = \"Pygmy Bank\"" },
  ],

  tests: [
    { name: "constructs with owner and balance", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.owner, \"Ada\")\n    expect_eq(a.balance(), 100)" },
    { name: "deposit increases balance and returns it", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.deposit(50), 150)\n    expect_eq(a.balance(), 150)" },
    { name: "withdraw succeeds when funds suffice", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.withdraw(40), True)\n    expect_eq(a.balance(), 60)" },
    { name: "withdraw fails when funds insufficient", code: "    a = Account(\"Ada\", 100)\n    expect_eq(a.withdraw(500), False)\n    expect_eq(a.balance(), 100)" },
    { name: "bank is a shared class attribute", code: "    a = Account(\"Ada\", 100)\n    b = Account(\"Rob\", 5)\n    expect_eq(a.bank, \"Pygmy Bank\")\n    expect_eq(Account.bank, \"Pygmy Bank\")\n    expect_true(a.bank == b.bank)" },
    { name: "instances hold independent balances", code: "    a = Account(\"Ada\", 100)\n    b = Account(\"Rob\", 5)\n    a.deposit(10)\n    expect_eq(a.balance(), 110)\n    expect_eq(b.balance(), 5)" },
  ],

  solution: `class Account:
    bank = "Pygmy Bank"

    def __init__(self, owner, opening):
        self.owner = owner
        self._balance = opening

    def deposit(self, amount):
        self._balance += amount
        return self._balance

    def withdraw(self, amount):
        if amount > self._balance:
            return False
        self._balance -= amount
        return True

    def balance(self):
        return self._balance
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Constructor</td><td><code>fn new(…) -> Self { … }</code></td><td><code>def __init__(self, …)</code></td></tr>
  <tr><td>Instantiate</td><td><code>Account::new("Ada".to_string(), 100.0)</code></td><td><code>Account("Ada", 100)</code></td></tr>
  <tr><td>Instance field</td><td><code>self.owner</code> (struct field)</td><td><code>self.owner = …</code></td></tr>
  <tr><td>Method receiver</td><td>explicit <code>&self</code> / <code>&mut self</code></td><td>explicit first param <code>self</code> (mutability unmarked)</td></tr>
  <tr><td>Static / shared</td><td>associated <code>const</code> or module-level <code>const</code></td><td><code>bank = …</code> in class body</td></tr>
  <tr><td>Private</td><td>field private by default outside the module (checked)</td><td><code>_x</code> (convention only)</td></tr>
</table>
<p>The leading underscore is a naming convention, not a barrier —
<code>a._balance</code> is still readable from outside. Two leading underscores
(<code>__balance</code>) trigger <em>name mangling</em>, rewriting the attribute
to <code>_Account__balance</code> to dodge accidental clashes in subclasses; it
is still reachable, just harder to hit by accident. Prefer the single underscore
for ordinary "internal" state. Unlike Rust, where the compiler refuses to
compile code that reaches past a private field from outside its module, Python
trusts the caller and simply documents intent.</p>
<p>One trap: class attributes are shared, so a <em>mutable</em> class attribute
(e.g. <code>tags = []</code> in the class body) is shared across every instance
and mutations leak between them — there's no borrow checker to catch this the
way Rust would catch two mutable references to the same data. Keep
per-instance state on <code>self</code> inside <code>__init__</code>, and
reserve class attributes for constants and truly shared data like
<code>bank</code>.</p>`,
};
