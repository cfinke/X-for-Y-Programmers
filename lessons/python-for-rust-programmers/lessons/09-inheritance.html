  title: "Inheritance",

  intro: `
<p>Rust has no inheritance at all — behavior is shared through traits and
composition, not through a hierarchy of structs. Python classes give you the
classic subclassing model instead. A subclass names its parent in
parentheses — <code>class Dog(Animal)</code> — much like <code>impl Animal for
Dog</code> gives a struct trait behavior, except here <code>Dog</code>
actually <em>is</em> an <code>Animal</code> and inherits its fields and
methods directly. To reach the parent's constructor you call
<code>super().__init__(...)</code>; Python does <em>not</em> call it for you,
so if you write <code>__init__</code> in the child and forget the
<code>super()</code> call, the parent's setup simply never runs — there is no
compiler to catch the omission the way Rust's field-initialization checks
would.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>struct Dog { animal: Animal, .. }</code> (composition)</td><td><code>class Dog(Animal):</code></td></tr>
  <tr><td><code>Animal::new(name)</code> (called explicitly)</td><td><code>super().__init__(name)</code></td></tr>
  <tr><td><code>impl Speak for Dog { fn speak(&self) -> String { … } }</code></td><td><code>def speak(self):</code> (override)</td></tr>
  <tr><td>no runtime downcast without <code>Any</code></td><td><code>isinstance(x, Animal)</code></td></tr>
  <tr><td>multiple trait impls: <code>impl A for C</code>, <code>impl M for C</code></td><td><code>class C(A, M):</code> (mixin)</td></tr>
</table>
<p>Overriding is just defining a method with the same name in the subclass; the
most-derived version wins, and it can call the parent's version through
<code>super()</code> — there's no separate <code>trait</code>/<code>impl</code>
split to keep in sync. Type checks use <code>isinstance(obj, Cls)</code>, which
is <code>True</code> for subclasses too, a runtime check Rust has no direct
counterpart for since types are erased and dispatch is static (or done via
<code>dyn Trait</code>, but even then there's no built-in "is a" test). Python
has no <code>trait</code> keyword; a <em>mixin</em> is just an extra base class
that contributes methods, listed alongside the main parent in the
parentheses.</p>`,

  rust: `struct Animal {
    name: String,
}

impl Animal {
    fn new(name: &str) -> Self {
        Animal { name: name.to_string() }
    }

    fn speak(&self) -> String {
        format!("{} makes a sound", self.name)
    }
}

struct Dog {
    animal: Animal,
}

impl Dog {
    fn new(name: &str) -> Self {
        Dog { animal: Animal::new(name) }
    }

    fn speak(&self) -> String {
        format!("{} — woof!", self.animal.speak())
    }
}

let d = Dog::new("Rex");
d.speak();                  // "Rex makes a sound — woof!"
// no built-in "is-a" check; Rust uses composition, not inheritance`,

  task: `
<p>Recreate the hierarchy in Python:</p>
<ol>
  <li>Write a base class <code>Animal</code> whose <code>__init__(self, name)</code>
      stores <code>self.name</code>, and whose <code>speak(self)</code> returns

  <li>Write <code>Dog(Animal)</code> that adds a <code>breed</code>: its
      <code>__init__(self, name, breed)</code> calls
      <code>super().__init__(name)</code> and then stores <code>self.breed</code>.

      <code>" — woof!"</code> — call <code>super().speak()</code>, don't

  <li>Write a mixin class <code>Loud</code> with a method

  <li>Write <code>describe(obj)</code> that returns <code>"animal"</code> if
      <code>obj</code> is an <code>Animal</code> (use <code>isinstance</code>)

</ol>`,

  requirements: [
    { pattern: /class\s+Dog\s*\(\s*Animal\s*\)/, message: "Define Dog as a subclass of Animal" },
    { pattern: /super\s*\(\s*\)\s*\.\s*__init__/, message: "Call super().__init__ from Dog" },

  tests: [
    { name: 'Animal("Cat").speak() is "Cat makes a sound"', code: "    expect_eq(Animal(\"Cat\").speak(), \"Cat makes a sound\")" },
    { name: 'Dog stores name and breed', code: "    d = Dog(\"Rex\", \"Lab\")\n    expect_eq(d.name, \"Rex\")\n    expect_eq(d.breed, \"Lab\")" },
    { name: 'Dog.speak() calls super and appends', code: "    expect_eq(Dog(\"Rex\", \"Lab\").speak(), \"Rex makes a sound — woof!\")" },
    { name: 'a Dog is an Animal (isinstance)', code: "    expect_true(isinstance(Dog(\"Rex\", \"Lab\"), Animal))" },
    { name: 'LoudDog.shout() mixes in Loud', code: "    expect_eq(LoudDog(\"Rex\", \"Lab\").shout(), \"REX MAKES A SOUND — WOOF!\")" },
    { name: 'describe distinguishes animals from others', code: "    expect_eq(describe(Dog(\"Rex\", \"Lab\")), \"animal\")\n    expect_eq(describe(42), \"other\")" },
  ],

  solution: `class Animal:
    def __init__(self, name):
        self.name = name

    def speak(self):
        return f"{self.name} makes a sound"


class Dog(Animal):
    def __init__(self, name, breed):
        super().__init__(name)
        self.breed = breed

    def speak(self):
        return f"{super().speak()} — woof!"


class Loud:
    def shout(self):
        return self.speak().upper()


class LoudDog(Dog, Loud):
    pass


def describe(obj):
    return "animal" if isinstance(obj, Animal) else "other"
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Subclass</td><td>no direct equivalent — use composition: <code>struct B { a: A }</code></td><td><code>class B(A):</code></td></tr>
  <tr><td>Parent constructor</td><td><code>A::new(x)</code> (called explicitly)</td><td><code>super().__init__(x)</code></td></tr>
  <tr><td>Call parent method</td><td><code>self.a.m()</code> (via the held field)</td><td><code>super().m()</code></td></tr>
  <tr><td>Override</td><td>separate <code>impl</code> block per type</td><td>same method name</td></tr>
  <tr><td>Type check</td><td>no built-in "is-a"; static dispatch or <code>Any::downcast</code></td><td><code>isinstance(x, A)</code></td></tr>
  <tr><td>Mixin</td><td><code>impl</code> multiple traits for one type</td><td>extra base class <code>(A, M)</code></td></tr>
</table>
<p>The biggest gotcha for a Rust programmer: Python never calls the parent's
<code>__init__</code> automatically, and there's no compiler enforcing that
every field gets initialized the way Rust's struct-literal checks do. If a
subclass defines its own <code>__init__</code>, it is fully responsible for
invoking <code>super().__init__(...)</code> — otherwise attributes the parent
would have set (like <code>self.name</code>) never get created, and you won't
find out until something tries to read <code>self.name</code> and raises
<code>AttributeError</code> at runtime. Multiple inheritance resolves method
lookups left-to-right along the <em>MRO</em> (method resolution order); for a
simple mixin like <code>Loud</code> that just adds a method, this means
<code>LoudDog</code> gets <code>speak</code> from <code>Dog</code> and
<code>shout</code> from <code>Loud</code> with no conflict — a looser,
runtime-resolved version of the coherence rules Rust enforces at compile time
for trait implementations. You can also pass a tuple to <code>isinstance</code>,
e.g. <code>isinstance(x, (Dog, Cat))</code>.</p>`,
