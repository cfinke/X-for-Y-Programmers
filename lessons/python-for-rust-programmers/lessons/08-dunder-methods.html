const LESSON = {
  number: 8,
  title: "Dunder Methods",

  intro: `
<p>Rust actually does let you opt a type into <code>==</code> and <code>+</code>
— but you do it by implementing a specific trait for each operator
(<code>PartialEq</code>, <code>std::ops::Add</code>), and the compiler checks
at compile time that the types line up. Formatting works the same way:
implement <code>fmt::Debug</code> or <code>fmt::Display</code> (or derive one)
and <code>{:?}</code> / <code>{}</code> picks it up. Python takes the same
idea further: the language's built-in syntax and functions are wired to
<em>double-underscore methods</em> — "dunders" — that you implement on the
class directly, with no separate trait declaration or derive step. Define
<code>__repr__</code> and <code>repr(obj)</code> uses it; define
<code>__eq__</code> and the <code>==</code> operator uses it; define
<code>__add__</code> and the <code>+</code> operator uses it.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>Vector::new(x)</code> (associated function)</td><td><code>def __init__(self, x):</code></td></tr>
  <tr><td><code>impl fmt::Debug for Vector</code></td><td><code>def __repr__(self):</code></td></tr>
  <tr><td><code>impl PartialEq for Vector</code></td><td><code>a == b</code> → <code>__eq__</code></td></tr>
  <tr><td><code>fn len(&amp;self) -&gt; usize</code> (plain method)</td><td><code>len(a)</code> → <code>__len__</code></td></tr>
  <tr><td><code>impl Add for Vector</code></td><td><code>a + b</code> → <code>__add__</code></td></tr>
</table>
<p>This is why Python feels so uniform: <code>len(x)</code>, <code>x == y</code>,
<code>print(x)</code>, and <code>x + y</code> all work on lists, strings, and
your own classes through the exact same protocol. Rust reaches similar
uniformity through its trait system, but each protocol is a distinct trait
you implement (or derive) and the compiler verifies statically; Python looks
the dunder up dynamically at the point of use, with no trait declaration at
all. Implement the right dunders and your type becomes a first-class citizen
of the language.</p>`,

  rust: `use std::fmt;
use std::ops::Add;

struct Vector {
    components: Vec<i32>,
}

impl Vector {
    fn new(components: Vec<i32>) -> Self {
        Vector { components }
    }

    fn len(&self) -> usize {
        self.components.len()
    }
}

impl fmt::Debug for Vector {
    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {
        write!(f, "Vector({:?})", self.components)
    }
}

impl PartialEq for Vector {
    fn eq(&self, other: &Self) -> bool {
        self.components == other.components
    }
}

impl Add for Vector {
    type Output = Vector;

    fn add(self, other: Vector) -> Vector {
        Vector::new(
            self.components
                .iter()
                .zip(other.components.iter())
                .map(|(a, b)| a + b)
                .collect(),
        )
    }
}`,

  task: `
<p>Build a <code>Vector</code> value type whose instances print nicely, compare
by value, report their length, and can be added with <code>+</code>:</p>
<ol>
  <li><code>__init__(self, *components)</code> — accept any number of numbers and
      store them (a tuple is convenient).</li>
  <li><code>__repr__(self)</code> — return a string like
      <code>"Vector(1, 2, 3)"</code>.</li>
  <li><code>__eq__(self, other)</code> — two vectors are equal when their
      components are equal, so <code>Vector(1, 2) == Vector(1, 2)</code>.</li>
  <li><code>__len__(self)</code> — the number of components, so
      <code>len(Vector(1, 2, 3)) == 3</code>.</li>
  <li><code>__add__(self, other)</code> — element-wise addition, so
      <code>Vector(1, 2) + Vector(3, 4) == Vector(4, 6)</code>.</li>
</ol>`,

  starter: `class Vector:
    def __init__(self, *components):
        self.components = ()  # TODO: store the components

    def __repr__(self):
        return ""  # TODO

    def __eq__(self, other):
        return NotImplemented  # TODO

    def __len__(self):
        return 0  # TODO

    def __add__(self, other):
        return NotImplemented  # TODO
`,

  requirements: [
    { pattern: /def\s+__repr__\s*\(/, message: "Define __repr__ so the vector prints nicely" },
    { pattern: /def\s+__eq__\s*\(/, message: "Define __eq__ so vectors compare by value" },
    { pattern: /def\s+__add__\s*\(/, message: "Define __add__ so + works on vectors" },
  ],

  tests: [
    { name: "repr(Vector(1, 2, 3)) is \"Vector(1, 2, 3)\"", code: "    expect_eq(repr(Vector(1, 2, 3)), \"Vector(1, 2, 3)\")" },
    { name: "equal vectors compare equal by value", code: "    expect_true(Vector(1, 2) == Vector(1, 2))" },
    { name: "different vectors are not equal", code: "    expect_true(Vector(1, 2) != Vector(1, 3))" },
    { name: "len() counts the components", code: "    expect_eq(len(Vector(1, 2, 3, 4)), 4)" },
    { name: "empty vector has length 0", code: "    expect_eq(len(Vector()), 0)" },
    { name: "+ adds element-wise", code: "    expect_true(Vector(1, 2) + Vector(3, 4) == Vector(4, 6))" },
    { name: "chained + stays a Vector", code: "    total = Vector(1, 1) + Vector(2, 2) + Vector(3, 3)\n    expect_eq(repr(total), \"Vector(6, 6)\")" },
  ],

  solution: `class Vector:
    def __init__(self, *components):
        self.components = tuple(components)

    def __repr__(self):
        inner = ", ".join(repr(c) for c in self.components)
        return f"Vector({inner})"

    def __eq__(self, other):
        if not isinstance(other, Vector):
            return NotImplemented
        return self.components == other.components

    def __len__(self):
        return len(self.components)

    def __add__(self, other):
        if not isinstance(other, Vector):
            return NotImplemented
        return Vector(*(a + b for a, b in zip(self.components, other.components)))
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Constructor</td><td><code>Vector::new(…)</code> (associated function)</td><td><code>__init__(self, …)</code></td></tr>
  <tr><td>Debug string</td><td><code>impl fmt::Debug</code> (or <code>#[derive(Debug)]</code>)</td><td><code>__repr__(self)</code></td></tr>
  <tr><td>Value equality</td><td><code>impl PartialEq</code> (or <code>#[derive(PartialEq)]</code>)</td><td><code>a == b</code> (<code>__eq__</code>)</td></tr>
  <tr><td>Length / size</td><td><code>fn len(&amp;self) -&gt; usize</code> (plain method, no trait)</td><td><code>len(a)</code> (<code>__len__</code>)</td></tr>
  <tr><td>Addition</td><td><code>impl Add for Vector</code></td><td><code>a + b</code> (<code>__add__</code>)</td></tr>
</table>
<p>A few things worth knowing. Returning <code>NotImplemented</code> (not the same
as raising <code>NotImplementedError</code>) from <code>__eq__</code> or
<code>__add__</code> tells Python "I don't know how to handle that other type" —
it then tries the other operand's reflected method or, for equality, falls back
to identity. You get <code>!=</code> for free once <code>__eq__</code> is defined;
Python derives <code>__ne__</code> from it automatically, the same way Rust's
<code>#[derive(PartialEq)]</code> gives you <code>!=</code> alongside
<code>==</code> without extra code.</p>
<p>Two subtleties for later. First, <code>__repr__</code> is aimed at developers
(and used by the REPL and containers); there is also <code>__str__</code> for the
user-facing <code>str(obj)</code>, and if you only define <code>__repr__</code> it
serves as the fallback for both — roughly <code>Debug</code> versus
<code>Display</code> in Rust, except Python doesn't require both. Second, defining
<code>__eq__</code> makes your class unhashable unless you also define
<code>__hash__</code>, so an instance can't go in a <code>set</code> or be a
<code>dict</code> key until you do — often you'll reach for <code>@dataclass</code>
(a later topic) to generate all of these at once, similar in spirit to Rust's
<code>#[derive(...)]</code>.</p>`,
};
