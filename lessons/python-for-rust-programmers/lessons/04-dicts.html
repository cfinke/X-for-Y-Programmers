  number: 4,
  title: "Dictionaries",

  intro: `
<p>Python's <code>dict</code> is the everyday key/value map — the same role a
<code>HashMap&lt;K, V&gt;</code> plays in Rust, but it needs no type parameters
up front, no <code>use</code> import, and no <code>::new()</code> call. Keys
can be any hashable value (strings, numbers, tuples), and since Python 3.7 a
dict preserves insertion order.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>let mut m = HashMap::new();<br>m.insert("a", 1); m.insert("b", 2);</code></td><td><code>m = {"a": 1, "b": 2}</code></td></tr>
  <tr><td><code>m["a"]</code></td><td><code>m["a"]</code></td></tr>
  <tr><td><code>m.get("x").copied().unwrap_or(0)</code></td><td><code>m.get("x", 0)</code></td></tr>
  <tr><td><code>m.contains_key("a")</code></td><td><code>"a" in m</code></td></tr>
  <tr><td><code>m.keys()</code></td><td><code>m.keys()</code></td></tr>
  <tr><td><code>m.iter()</code></td><td><code>m.items()</code></td></tr>
  <tr><td><code>m.extend(n)</code></td><td><code>{**m, **n}</code> or <code>m.update(n)</code></td></tr>
</table>
<p>Two things trip up Rust programmers. First, Python's dict is untyped and
unsized up front — there's no <code>HashMap&lt;String, i32&gt;</code>
annotation, and keys and values can be mixed types if you really want. But
<code>m["x"]</code> on a missing key still <em>raises</em> <code>KeyError</code>
at runtime — there's no <code>Option</code> wrapping the result the way
<code>HashMap::get</code> returns one. Reach for <code>m.get("x", default)</code>
when a key may be absent. Second, iterating a dict yields its <em>keys</em>, so
to walk pairs (Rust's <code>m.iter()</code> equivalent) you iterate
<code>m.items()</code> and unpack each pair:
<code>for k, v in m.items():</code>.</p>`,

  rust: `use std::collections::HashMap;

let mut scores: HashMap<&str, i32> = HashMap::new();
scores.insert("ada", 90);
scores.insert("rob", 72);

let ada = scores["ada"];                             // 90
let cid = scores.get("cid").copied().unwrap_or(0);   // 0 (missing)
let has_rob = scores.contains_key("rob");            // true

let mut total = 0;
for (_name, score) in &scores {
    total += score;
}`,

  task: `
<p>Write the Python versions:</p>
<ol>
  <li><code>build_scores()</code> returns the dict
      <code>{"ada": 90, "rob": 72}</code> as a literal.</li>
  <li><code>score_for(scores, name)</code> returns the score for
      <code>name</code>, or <code>0</code> if the name is not present — use
      <code>.get()</code> with a default.</li>
  <li><code>total(scores)</code> sums every value by iterating
      <code>.items()</code> with tuple unpacking.</li>
  <li><code>with_bonus(scores, points)</code> returns a <em>new</em> dict built
      with a dict comprehension, adding <code>points</code> to each score (leave
      the original untouched).</li>
</ol>`,

  starter: `# 1. build_scores() -> {"ada": 90, "rob": 72}

    return None  # TODO


# 2. score_for(scores, name) -> score, or 0 if missing

    return None  # TODO

`,

  requirements: [
    { pattern: /\.get\s*\(/, message: "Use .get() with a default in score_for" },
    { pattern: /\.items\s*\(\)/, message: "Iterate .items() in total" },
    { pattern: /for\s+\w+\s*,\s*\w+\s+in/, message: "Unpack each pair with `for k, v in ...`" },
    { pattern: /\{[^}]*for[^}]*\}/, message: "Build with_bonus using a dict comprehension" },
  ],

  tests: [
    { name: "build_scores() returns the literal", code: "    expect_eq(build_scores(), {\"ada\": 90, \"rob\": 72})" },
    { name: "score_for finds a present key", code: "    expect_eq(score_for({\"ada\": 90}, \"ada\"), 90)" },
    { name: "score_for defaults to 0 when missing", code: "    expect_eq(score_for({\"ada\": 90}, \"cid\"), 0)" },
    { name: "total sums the values", code: "    expect_eq(total({\"ada\": 90, \"rob\": 72}), 162)" },
    { name: "total of empty dict is 0", code: "    expect_eq(total({}), 0)" },
    { name: "with_bonus adds points to each value", code: "    expect_eq(with_bonus({\"ada\": 90, \"rob\": 72}, 5), {\"ada\": 95, \"rob\": 77})" },
    { name: "with_bonus leaves the original dict unchanged", code: "    original = {\"ada\": 90}\n    with_bonus(original, 5)\n    expect_eq(original, {\"ada\": 90})" },
  ],

  solution: `def build_scores():
    return {"ada": 90, "rob": 72}


def score_for(scores, name):
    return scores.get(name, 0)


def total(scores):
    running = 0
    for name, score in scores.items():
        running += score
    return running


def with_bonus(scores, points):
    return {name: score + points for name, score in scores.items()}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Read (may be missing)</td><td><code>m.get("x").copied().unwrap_or(d)</code></td><td><code>m.get("x", d)</code></td></tr>
  <tr><td>Read (must exist)</td><td><code>m["x"]</code> → panics</td><td><code>m["x"]</code> → <code>KeyError</code></td></tr>
  <tr><td>Membership</td><td><code>m.contains_key("x")</code></td><td><code>"x" in m</code></td></tr>
  <tr><td>Keys / values / pairs</td><td><code>m.keys()</code> / <code>m.values()</code> / <code>m.iter()</code></td><td><code>m.keys()</code> / <code>m.values()</code> / <code>m.items()</code></td></tr>
  <tr><td>Merge</td><td><code>m.extend(n)</code></td><td><code>{**m, **n}</code></td></tr>
  <tr><td>Comprehension</td><td><code>m.iter().map(...).collect()</code></td><td><code>{k: v for k, v in ...}</code></td></tr>
</table>
<p>Because plain <code>m["x"]</code> raises on a missing key — much like
indexing a Rust <code>HashMap</code> with <code>[]</code> panics if the key
isn't there — <code>.get()</code> is the Python habit whenever absence is
possible, and <code>m.get("x")</code> with no default returns <code>None</code>
rather than raising, which is the same shape as Rust's <code>Option</code>
without needing to unwrap it explicitly. When you actually want a running
default (say, counting), reach for <code>collections.defaultdict</code> or
<code>dict.setdefault</code> — the Python analogues of
<code>HashMap::entry(...).or_insert(...)</code>. Note that <code>in</code>
tests <em>keys</em>, never values: <code>"ada" in scores</code> asks whether
that key exists, mirroring how <code>contains_key</code> checks keys, not
values, in Rust.</p>`,
};
