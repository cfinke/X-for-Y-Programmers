  intro: `
<p>Rust has no null at all — the compiler won't let a value be absent unless
you say so explicitly with <code>Option&lt;T&gt;</code>, and its
<code>None</code> variant is the only "empty" you'll ever meet. Rust also has
no falsy-value coercion: <code>if</code> only accepts an actual
<code>bool</code>, so an empty <code>Vec</code>, an empty <code>&str</code>, or
a <code>0</code> won't compile in a boolean context — you always spell out the
check (<code>vec.is_empty()</code>, <code>n == 0</code>, ...). Python sits in
between: it has exactly one empty, <code>None</code>, but pairs it with a much
looser rule — a value is falsy if it is <em>empty or zero</em>. That means
empty containers count too — <code>[]</code>, <code>{}</code>, <code>""</code>,
and <code>0</code> are all falsy, so you rarely write <code>len(x) == 0</code>.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>Option::None</code></td><td><code>None</code></td></tr>
  <tr><td><code>x.is_none()</code></td><td><code>x is None</code></td></tr>
  <tr><td><code>if vec.is_empty()</code></td><td><code>if not arr:</code></td></tr>
  <tr><td><code>x.unwrap_or(fallback)</code></td><td><code>x if x is not None else fallback</code></td></tr>
  <tr><td><code>if x.is_empty() { fallback } else { x }</code></td><td><code>x or fallback</code></td></tr>
  <tr><td><code>if x { f(); }</code></td><td><code>x and f()</code></td></tr>
</table>
<p>Two things matter here. First, use <code>is</code> / <code>is not</code> to
compare against <code>None</code> — <code>is</code> checks <em>identity</em>
(same object) while <code>==</code> checks <em>equality</em> (same value).
Because there is only one <code>None</code> object in the whole program,
<code>x is None</code> is the idiomatic test — it plays the role that
<code>Option::is_none()</code> or matching on <code>None</code> plays in Rust,
minus the compiler's exhaustiveness checking. Second, <code>or</code> and
<code>and</code> short-circuit and return one of their <em>operands</em>, not a
boolean — so <code>value or default</code> is Python's everyday way to supply a
fallback, a looser cousin of Rust's <code>Option::unwrap_or(default)</code>,
which only fires on <code>None</code> rather than on any falsy value.</p>`,

  rust: `fn greet(name: Option<&str>) -> String {

    format!("Hello, {}", who)
}

fn first_item<T: Copy>(items: &[T]) -> Option<T> {

    who = name or "stranger"
    return f"Hello, {who}"


def is_empty(value):
    return not value


def first_item(items):
    return items[0] if items else None


def has_value(value):
    return value is not None

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>The empty value</td><td><code>Option::None</code></td><td><code>None</code> (only one)</td></tr>
  <tr><td>Null check</td><td><code>x.is_none()</code></td><td><code>x is None</code></td></tr>
  <tr><td>Present check</td><td><code>x.is_some()</code></td><td><code>x is not None</code></td></tr>
  <tr><td>Empty container</td><td><code>vec.is_empty()</code></td><td><code>not arr</code></td></tr>
  <tr><td>Nullish default</td><td><code>x.unwrap_or(d)</code></td><td><code>x if x is not None else d</code></td></tr>
  <tr><td>Falsy default</td><td><em>(no equivalent — Rust has no falsy values)</em></td><td><code>x or d</code></td></tr>
</table>
<p>The subtle trap is one Rust sidesteps by construction: because Rust has no
falsy-value coercion, <code>Option::unwrap_or</code> can only ever be
triggered by <code>None</code>. Python's <code>or</code> gives no such
guarantee: <code>x or d</code> replaces <em>any</em> falsy <code>x</code>, so a
legitimate <code>0</code> or <code>""</code> gets swapped for the default. When
only <code>None</code> should trigger the fallback, reach for
<code>x if x is not None else d</code> — the equivalent of
<code>unwrap_or</code>. Reserve <code>is</code> for the singletons
<code>None</code>, <code>True</code>, and <code>False</code>; use
<code>==</code> for comparing values like numbers and strings. And remember
that <code>and</code>/<code>or</code> return an operand, not a bool:
<code>[] or "x"</code> is <code>"x"</code>, and <code>2 and 3</code> is
<code>3</code> — Rust's <code>&amp;&amp;</code>/<code>||</code>, by contrast,
only ever operate on <code>bool</code> and always yield a <code>bool</code>.</p>`,
