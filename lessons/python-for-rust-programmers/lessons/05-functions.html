const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>You already know functions from Rust. Python's <code>def</code> keyword
covers the same ground, but the parameter system is richer at the call site: any
positional parameter can also be passed <em>by name</em>, defaults are written
inline, and two magic prefixes — <code>*args</code> and <code>**kwargs</code> —
collect the leftovers. There are no type annotations required (they are optional
hints), and the body is marked by indentation after the colon.</p>
<table>
  <tr><th>Rust</th><th>Python</th></tr>
  <tr><td><code>fn add(a: i32, b: i32) -> i32 { a + b }</code></td><td><code>def add(a, b):</code></td></tr>
  <tr><td><code>fn greet(name: Option&lt;&amp;str&gt;)</code> (no built-in default)</td><td><code>def greet(name="friend"):</code></td></tr>
  <tr><td><code>fn sum(nums: &amp;[i32]) -> i32</code></td><td><code>def sum(*nums):</code></td></tr>
  <tr><td><code>fn(&amp;args)</code> (a slice)</td><td><code>fn(*args)</code></td></tr>
  <tr><td><code>return (a, b);</code></td><td><code>return a, b</code></td></tr>
</table>
<p>The big new idea is <strong>keyword arguments</strong>: given
<code>def area(width, height):</code> you can call <code>area(3, 4)</code> or
<code>area(width=3, height=4)</code> or even <code>area(4, width=3)</code>… no,
that last one collides — but <code>area(3, height=4)</code> is fine. This makes
calls self-documenting and lets defaults live anywhere — a real gap in Rust,
where every argument is required and there is no keyword-call syntax at all
(the usual workarounds are a builder struct or an <code>Option&lt;T&gt;</code>
parameter unwrapped with <code>unwrap_or</code>). To gather extra
positionals use <code>*args</code> (a tuple); to gather extra named ones use
<code>**kwargs</code> (a dict). And returning several values is just returning a
comma-separated tuple: <code>return lo, hi</code> — the caller unpacks with
<code>lo, hi = bounds(...)</code>, much like destructuring a Rust tuple.</p>`,

  rust: `fn greet(name: &str, greeting: Option<&str>) -> String {
    format!("{}, {}!", greeting.unwrap_or("Hello"), name)
}

fn total(nums: &[i32]) -> i32 {
    nums.iter().sum()
}

fn min_max(nums: &[i32]) -> (i32, i32) {
    (*nums.iter().min().unwrap(), *nums.iter().max().unwrap())
}`,

  task: `
<p>Write the Python versions:</p>
<ol>
  <li><code>greet(name, greeting="Hello")</code> — returns a string like
      <code>"Hello, Ada!"</code>. The <code>greeting</code> parameter has a
      default so <code>greet("Ada")</code> works, and it can be overridden by
      keyword: <code>greet("Ada", greeting="Hi")</code>.</li>
  <li><code>total(*nums)</code> — accepts any number of positional arguments and
      returns their sum (<code>total()</code> is <code>0</code>).</li>
  <li><code>min_max(*nums)</code> — returns the smallest and largest as a tuple,
      e.g. <code>min_max(3, 1, 2)</code> returns <code>(1, 3)</code>. Use
      <code>return lo, hi</code>.</li>
</ol>`,

  starter: `# 1. greet(name, greeting="Hello") -> "<greeting>, <name>!"
def greet(name, greeting="Hello"):
    return ""  # TODO


# 2. total(*nums) -> sum of all arguments
def total(*nums):
    return None  # TODO


# 3. min_max(*nums) -> (smallest, largest)

`,

  requirements: [
    { pattern: /def\s+greet\s*\(\s*name\s*,\s*greeting\s*=/, message: "greet must give greeting a default value" },
    { pattern: /def\s+total\s*\(\s*\*\w+/, message: "total must collect arguments with *args" },
    { pattern: /return\s+\w+\s*,\s*\w+/, message: "min_max must return a tuple of two values" },
  ],

  tests: [
    { name: 'greet("Ada") uses the default greeting', code: "    expect_eq(greet(\"Ada\"), \"Hello, Ada!\")" },
    { name: 'greet with keyword arg overrides the default', code: "    expect_eq(greet(\"Ada\", greeting=\"Hi\"), \"Hi, Ada!\")" },
    { name: 'greet with a positional second arg', code: "    expect_eq(greet(\"Rob\", \"Hey\"), \"Hey, Rob!\")" },
    { name: 'total() with no args is 0', code: "    expect_eq(total(), 0)" },
    { name: 'total sums any number of args', code: "    expect_eq(total(1, 2, 3, 4), 10)" },
    { name: 'min_max returns a (lo, hi) tuple', code: "    expect_eq(min_max(3, 1, 2), (1, 3))" },
    { name: 'min_max unpacks into two names', code: "    lo, hi = min_max(5, 9, 2, 7)\n    expect_true(lo == 2 and hi == 9)" },
  ],

  solution: `def greet(name, greeting="Hello"):
    return f"{greeting}, {name}!"


def total(*nums):
    result = 0
    for n in nums:
        result += n
    return result


def min_max(*nums):
    lo = min(nums)
    hi = max(nums)
    return lo, hi
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Python</th></tr>
  <tr><td>Define</td><td><code>fn f(a: i32) -> i32 { … }</code></td><td><code>def f(a):</code></td></tr>
  <tr><td>Default</td><td>no built-in default; use <code>Option&lt;T&gt;</code> + <code>unwrap_or</code>, or a builder</td><td><code>def f(a=1):</code></td></tr>
  <tr><td>Rest / varargs</td><td><code>fn f(xs: &amp;[i32])</code> (a slice)</td><td><code>def f(*xs):</code> (a tuple)</td></tr>
  <tr><td>Named extras</td><td>no built-in equivalent; a struct of fields, or a builder</td><td><code>def f(**kw):</code> (a dict)</td></tr>
  <tr><td>Call by name</td><td>— (no keyword-argument syntax)</td><td><code>f(a=1, b=2)</code></td></tr>
  <tr><td>Spread a call</td><td><code>f(&amp;arr)</code> (pass a slice)</td><td><code>f(*arr)</code>, <code>f(**dct)</code></td></tr>
  <tr><td>Multiple return</td><td><code>return (a, b);</code></td><td><code>return a, b</code></td></tr>
</table>
<p>Two gotchas worth internalizing early. First, <strong>never use a mutable
default</strong> like <code>def f(items=[]):</code> — the list is created once at
definition time and shared across every call. The idiom is
<code>def f(items=None):</code> then <code>if items is None: items = []</code>
inside. (Rust's ownership and borrowing rules make this particular trap
impossible — there is no such thing as an argument default that silently
persists mutable state between calls.) Second, <code>*args</code> gives you a
<em>tuple</em>, not a list, and <code>**kwargs</code> gives you a <em>dict</em>
— you can iterate them exactly like any other collection, much like iterating a
Rust slice or a <code>HashMap</code>. Returning <code>a, b</code> builds a
tuple, and the caller can either keep it whole or unpack it into names in one
line, which is how Python code so often avoids ever declaring an output
"shape" type the way a Rust function signature must.</p>`,
};
