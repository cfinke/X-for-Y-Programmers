const LESSON = {
  number: 5,
  title: "Borrowing & References",

  intro: `
<p>Moving everything into every function would be unbearable, and you already
know the fix: pass references. The mapping is direct — <code>const T&amp;</code>
becomes <code>&amp;T</code> (a shared borrow: look, don't touch) and
<code>T&amp;</code> becomes <code>&amp;mut T</code> (an exclusive borrow:
permission to mutate). Unlike C++, the call site spells it out too:
<code>total(&amp;v)</code>, <code>add_item(&amp;mut v, item)</code> — you can
see at a glance which calls can change your data.</p>
<table>
  <tr><th>C++</th><th>Rust</th></tr>
  <tr><td><code>int f(const std::vector&lt;int&gt;&amp; v)</code></td><td><code>fn f(v: &amp;[i32]) -&gt; i32</code></td></tr>
  <tr><td><code>void f(std::vector&lt;T&gt;&amp; v)</code></td><td><code>fn f(v: &amp;mut Vec&lt;T&gt;)</code></td></tr>
  <tr><td><code>f(v);</code> (mutation invisible at call site)</td><td><code>f(&amp;v)</code> / <code>f(&amp;mut v)</code> (visible)</td></tr>
  <tr><td>Aliasing: anything goes</td><td>Many <code>&amp;T</code> <em>or</em> one <code>&amp;mut T</code> — never both</td></tr>
</table>
<p>The new part is the aliasing rule, checked at compile time: at any moment a
value has either any number of shared borrows <em>or</em> exactly one mutable
borrow — never both. That's the guarantee <code>restrict</code> gestures at
and the C++ optimizer only dreams about, and it kills a whole bug family you
know intimately: iterator invalidation. "You may not <code>push_back</code>
into the vector you're iterating" stops being a rule you remember and becomes
an error the compiler emits, because iterating holds a shared borrow and
<code>push</code> needs the mutable one. Dangling references are also caught
at compile time — lifetimes, lesson 16 — so neither kind of reference here
can outlive what it points to. One idiom to note: prefer <code>&amp;[i32]</code>
(a slice, pointer + length like <code>std::span</code>) over
<code>&amp;Vec&lt;i32&gt;</code> for read-only parameters, just as you'd take
<code>span</code> or <code>const&amp;</code> rather than forcing a specific
container.</p>`,

  cpp: `#include <algorithm>
#include <string>
#include <utility>
#include <vector>

int total(const std::vector<int>& numbers) {   // const&: look, don't touch
    int sum = 0;
    for (int n : numbers) {
        sum += n;
        // numbers.push_back(n);  // invalidates the iterator: UB, no error
    }
    return sum;
}

void add_item(std::vector<std::string>& items, std::string item) {
    items.push_back(std::move(item));          // non-const&: may mutate
}

std::size_t longer(const std::string& a, const std::string& b) {
    return std::max(a.size(), b.size());
}`,

  task: `
<p>Rewrite the C++ as Rust — borrow instead of move:</p>
<ol>
  <li><code>total</code> takes <code>numbers: &amp;[i32]</code> (a slice — the
      <code>const vector&lt;int&gt;&amp;</code> / <code>std::span</code> of this
      API) and returns the <code>i32</code> sum. A <code>for n in numbers</code>
      loop or <code>.iter().sum()</code> both work.</li>
  <li><code>add_item</code> takes <code>items: &amp;mut Vec&lt;String&gt;</code>
      and <code>item: String</code> (by value — the function consumes it,
      no <code>std::move</code> needed) and pushes the item onto the vector.
      It returns nothing.</li>
  <li><code>longer</code> takes <code>a: &amp;str</code> and
      <code>b: &amp;str</code> and returns the larger of the two lengths as
      <code>usize</code> (<code>.len()</code> — and <code>usize</code> is your
      <code>size_t</code>).</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. total: shared borrow of a slice — read-only, like const vector<int>&.
fn total(numbers: &[i32]) -> i32 {
    todo!()
}

// 2. add_item: &mut is the T& — exclusive permission to mutate.
//    item arrives by value: it's moved in, then moved into the Vec by .push.
fn add_item(items: &mut Vec<String>, item: String) {
    todo!()
}

// 3. longer: two shared borrows at once are fine; return the bigger .len().
fn longer(a: &str, b: &str) -> usize {
    todo!()
}
`,

  requirements: [
    { pattern: /&\[i32\]/, message: "Take the numbers as a slice: &[i32]" },
    { pattern: /&mut\s/, message: "Take the vector by mutable borrow: &mut Vec<String>" },
  ],

  tests: [
    { name: "total(&[1, 2, 3]) returns 6",
      code: "assert_eq!(total(&[1, 2, 3]), 6);" },
    { name: "total(&[]) returns 0",
      code: "assert_eq!(total(&[]), 0);" },
    { name: "total(&v) leaves the vector usable afterwards (borrow, not move)",
      code: "let v = vec![10, 20, 30];\nassert_eq!(total(&v), 60);\nassert_eq!(v.len(), 3);" },
    { name: "add_item pushes onto the borrowed vector",
      code: 'let mut items = vec![String::from("alpha")];\nadd_item(&mut items, String::from("beta"));\nassert_eq!(items.len(), 2);\nassert_eq!(items[1], "beta");' },
    { name: 'longer("hi", "hello") returns 5',
      code: 'assert_eq!(longer("hi", "hello"), 5);' },
    { name: 'longer("abc", "x") returns 3',
      code: 'assert_eq!(longer("abc", "x"), 3);' },
  ],

  solution: `fn total(numbers: &[i32]) -> i32 {
    numbers.iter().sum()
}

fn add_item(items: &mut Vec<String>, item: String) {
    items.push(item);
}

fn longer(a: &str, b: &str) -> usize {
    if a.len() > b.len() { a.len() } else { b.len() }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Rust</th></tr>
  <tr><td>Read-only reference</td><td><code>const T&amp;</code></td><td><code>&amp;T</code></td></tr>
  <tr><td>Mutable reference</td><td><code>T&amp;</code></td><td><code>&amp;mut T</code></td></tr>
  <tr><td>Call site</td><td><code>f(v)</code> — reference taken silently</td><td><code>f(&amp;v)</code> / <code>f(&amp;mut v)</code> — explicit</td></tr>
  <tr><td>Read-only sequence param</td><td><code>const vector&lt;T&gt;&amp;</code> / <code>std::span</code></td><td><code>&amp;[T]</code> (slice; <code>&amp;Vec&lt;T&gt;</code> coerces to it)</td></tr>
  <tr><td>Aliasing</td><td>Unrestricted (<code>restrict</code> is a promise)</td><td>Many shared <em>or</em> one mutable — compiler-checked</td></tr>
  <tr><td>Iterator invalidation</td><td>Undefined behavior at runtime</td><td>Compile error (push needs <code>&amp;mut</code> while iteration holds <code>&amp;</code>)</td></tr>
  <tr><td>Dangling reference</td><td>Undefined behavior</td><td>Compile error (lifetimes — lesson 16)</td></tr>
</table>
<p>Notice the third test: after <code>total(&amp;v)</code> the vector is still
alive and usable, because the function only borrowed it — had
<code>total</code> taken <code>Vec&lt;i32&gt;</code> by value, <code>v</code>
would be gone, like lesson 4's sink functions. Your C++ instincts for
choosing <code>const&amp;</code> vs <code>&amp;</code> vs by-value transfer
one-for-one; the aliasing rule is the only genuinely new discipline, and
it's the one that makes "fearless" refactoring and threading possible
later.</p>`,
};
