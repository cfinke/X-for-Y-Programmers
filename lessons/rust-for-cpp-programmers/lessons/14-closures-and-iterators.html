  title: "Closures & Iterators",

  intro: `
<p>You know the <code>&lt;algorithm&gt;</code> dance: declare an output
vector, <code>std::copy_if</code> into a <code>back_inserter</code>, then
<code>std::transform</code> over the result — two passes, two temporaries,
and iterator pairs everywhere. C++20 ranges finally gave you
<code>views::filter | views::transform</code>; Rust's iterators are that
model as <em>the</em> default, on every collection, since day one:
<code>.iter().filter(…).map(…).collect()</code>. Chains are lazy like views —
nothing runs until <code>collect</code> or <code>sum</code> consumes them —
and they compile down to the loop you'd have written by hand.</p>
<table>
  <tr><th>C++</th><th>Rust</th></tr>
  <tr><td><code>std::copy_if(begin, end, back_inserter(out), pred)</code></td><td><code>.filter(pred)</code></td></tr>
  <tr><td><code>std::transform(begin, end, back_inserter(out), fn)</code></td><td><code>.map(fn)</code></td></tr>
  <tr><td><code>std::accumulate(begin, end, 0)</code></td><td><code>.sum()</code></td></tr>
  <tr><td><code>[](const auto&amp; x) { return x.price; }</code></td><td><code>|x| x.price</code></td></tr>
  <tr><td>ranges views (lazy, C++20)</td><td>iterator chains (lazy, always)</td></tr>
</table>
<p>The closure <code>|x| x + 1</code> is your <code>[](auto x) { return x + 1; }</code>
with the capture list gone: closures capture whatever they use from the
enclosing scope automatically, by reference when they can. That sounds like
the dangling-lambda bug factory — a <code>[&amp;]</code> that outlives its
locals — except the borrow checker applies the same rules to captures as to
any other borrow, so the lambda that would dangle simply doesn't compile.</p>`,

  cpp: `#include <algorithm>
#include <numeric>
#include <string>
#include <vector>

struct Product { std::string name; unsigned price_cents; bool in_stock; };

std::vector<std::string> in_stock_names(const std::vector<Product>& ps) {
    std::vector<Product> stocked;
    std::copy_if(ps.begin(), ps.end(), std::back_inserter(stocked),
                 [](const Product& p) { return p.in_stock; });
    std::vector<std::string> names;
    std::transform(stocked.begin(), stocked.end(), std::back_inserter(names),
                   [](const Product& p) { return p.name; });
    return names;
}

unsigned total_value(const std::vector<Product>& ps) {
    return std::accumulate(ps.begin(), ps.end(), 0u,
        [](unsigned acc, const Product& p) { return acc + p.price_cents; });
}`,

  task: `
<p>Replace the algorithm calls with iterator chains. The starter defines

<ol>

</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  requirements: [
    { pattern: /\.iter\(\)/, message: "Start the chains with .iter()" },
    { pattern: /\.filter\(/, message: "Use .filter(…) to select elements" },
    { pattern: /\.map\(/, message: "Use .map(…) to transform elements" },
    { pattern: /\.collect/, message: "Materialize results with .collect()" },
  ],

  tests: [
    { name: "in_stock_names keeps only stocked products, in order",
      code: 'let products = vec![\n    Product { name: String::from("Widget"), price_cents: 250, in_stock: true },\n    Product { name: String::from("Gadget"), price_cents: 999, in_stock: false },\n    Product { name: String::from("Gizmo"), price_cents: 150, in_stock: true },\n];\nassert_eq!(in_stock_names(&products), vec!["Widget", "Gizmo"]);' },
    { name: "in_stock_names of an all-out-of-stock list is empty",
      code: 'let products = vec![\n    Product { name: String::from("Doodad"), price_cents: 500, in_stock: false },\n];\nassert_eq!(in_stock_names(&products), Vec::<String>::new());' },
    { name: "total_value sums every price (1399)",
      code: 'let products = vec![\n    Product { name: String::from("Widget"), price_cents: 250, in_stock: true },\n    Product { name: String::from("Gadget"), price_cents: 999, in_stock: false },\n    Product { name: String::from("Gizmo"), price_cents: 150, in_stock: true },\n];\nassert_eq!(total_value(&products), 1399);' },
    { name: "total_value of an empty slice is 0",
      code: "assert_eq!(total_value(&[]), 0);" },
    { name: "evens_doubled(&[1, 2, 3, 4, 5]) is [4, 8]",
      code: "assert_eq!(evens_doubled(&[1, 2, 3, 4, 5]), vec![4, 8]);" },
    { name: "evens_doubled(&[1, 3, 5]) is empty",
      code: "assert_eq!(evens_doubled(&[1, 3, 5]), Vec::<i32>::new());" },

  solution: `struct Product {
    name: String,
    price_cents: u32,
    in_stock: bool,
}

fn in_stock_names(products: &[Product]) -> Vec<String> {
    products
        .iter()
        .filter(|p| p.in_stock)
        .map(|p| p.name.clone())
        .collect()
}

fn total_value(products: &[Product]) -> u32 {
    products.iter().map(|p| p.price_cents).sum()
}

fn evens_doubled(nums: &[i32]) -> Vec<i32> {
    nums.iter()
        .filter(|n| *n % 2 == 0)
        .map(|n| n * 2)
        .collect()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Rust</th></tr>
  <tr><td>Lambda</td><td><code>[](const auto&amp; x) { return x.f; }</code></td><td><code>|x| x.f</code> — captures inferred, borrow-checked</td></tr>
  <tr><td>Filter</td><td><code>std::copy_if</code> / <code>views::filter</code></td><td><code>.filter(|x| …)</code></td></tr>
  <tr><td>Transform</td><td><code>std::transform</code> / <code>views::transform</code></td><td><code>.map(|x| …)</code></td></tr>
  <tr><td>Reduce</td><td><code>std::accumulate</code></td><td><code>.sum()</code>, <code>.fold(init, f)</code></td></tr>
  <tr><td>Materialize</td><td><code>ranges::to&lt;std::vector&gt;</code> (C++23)</td><td><code>.collect()</code> — target type drives it</td></tr>
  <tr><td>Laziness</td><td>views only; algorithms are eager</td><td>every chain, until a consumer runs it</td></tr>
</table>
<p>One wrinkle worth internalizing: <code>.iter()</code> yields
<em>references</em> (<code>&amp;Product</code>, <code>&amp;i32</code>) — it
borrows the collection the way <code>begin()/end()</code> on a
<code>const&amp;</code> does. That's why the solution clones the
<code>String</code> it wants to keep, and why <code>filter</code>'s closure
sees <code>&amp;&amp;i32</code> (a reference to the reference the iterator
yields) — the <code>*n</code> peels one layer. The chain still compiles to a
single fused loop: laziness here is a codegen win, not just an API
nicety.</p>`,
};
