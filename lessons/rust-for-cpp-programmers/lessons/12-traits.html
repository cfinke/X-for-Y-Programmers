<div id="app"></div>
<script>
const LESSON = {
  number: 12,
  title: "Traits",

  intro: `
<p>C++ gives you two tools for "any type that can do X", and each does half
the job. A pure-virtual base class gets you a runtime interface, but it
couples every implementor to your hierarchy (they must inherit from you, at
design time) and buys you a vtable whether you needed one or not. A C++20
concept checks capabilities at compile time with zero cost, but it's purely
structural — it can't add behavior, and there's no way to say "this type
opts in". A Rust <strong>trait</strong> is both halves in one construct: an
interface with optional default method bodies, implemented for a type in a
separate <code>impl</code> block — no inheritance, no coupling, and it works
for types you didn't write (implement your trait for <code>i32</code> if you
like).</p>
<table>
  <tr><th>C++</th><th>Rust</th></tr>
  <tr><td><code>struct Describe { virtual std::string name() = 0; };</code></td><td><code>trait Describe { fn name(&amp;self) -&gt; String; }</code></td></tr>
  <tr><td><code>class Dog : public Describe { … };</code></td><td><code>impl Describe for Dog { … }</code> — separate from the type</td></tr>
  <tr><td>Non-pure virtual with a body</td><td>default method body in the trait</td></tr>
  <tr><td>Dispatch: always virtual (vtable)</td><td>static by default; <code>dyn Describe</code> opts into vtables</td></tr>
  <tr><td>Retrofit onto <code>int</code> or a library type</td><td><code>impl Describe for i32</code> — just works</td></tr>
</table>
<p>Because <code>impl Trait for Type</code> is its own block, conformance is
opt-in and after-the-fact — the thing concepts can't do — while dispatch
stays static and inlineable by default — the thing virtual functions can't
do. When you genuinely want runtime polymorphism, <code>&amp;dyn Describe</code>
gives you exactly the vtable you'd have written, but you pay for it only
where you ask for it.</p>`,

  cpp: `#include <string>
#include <format>

// The interface costs you a vtable and an inheritance edge.
struct Describe {
    virtual std::string name() const = 0;
    virtual std::string describe() const {          // default behavior
        return std::format("This is {}", name());
    }
    virtual ~Describe() = default;
};

// Every implementor must inherit — decided when Dog is written.
class Dog : public Describe {
    std::string name_;
public:
    explicit Dog(std::string n) : name_(std::move(n)) {}
    std::string name() const override { return name_; }
};`,

  task: `
<p>Rebuild the interface as a trait:</p>
<ol>
  <li>In the <code>trait Describe</code> block, keep the required method
      <code>fn name(&amp;self) -&gt; String;</code> and give
      <code>describe</code> a real default body: return
      <code>format!("This is {}", self.name())</code>. Default methods can
      call required ones — that's the non-pure virtual, without the vtable
      tax.</li>
  <li>Complete <code>impl Describe for Dog</code>: <code>name()</code> returns
      a clone of the dog's <code>name</code> field.</li>
  <li>Complete <code>impl Describe for Robot</code>: <code>name()</code>
      returns <code>format!("Robot #{}", self.id)</code>. Neither impl should
      define <code>describe</code> — let both inherit the default.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `struct Dog {
    name: String,
}

struct Robot {
    id: u32,
}

// The trait: one required method, one default method.
trait Describe {
    fn name(&self) -> String;

    // Give this a default body: format!("This is {}", self.name())
    fn describe(&self) -> String {
        todo!()
    }
}

// No inheritance: conformance lives in its own impl block.
impl Describe for Dog {
    fn name(&self) -> String {
        todo!() // return a clone of self.name
    }
}

impl Describe for Robot {
    fn name(&self) -> String {
        todo!() // format!("Robot #{}", self.id)
    }
}
`,

  requirements: [
    { pattern: /trait\s+Describe/, message: "Define the trait Describe" },
    { pattern: /impl\s+Describe\s+for\s+/, message: "Implement Describe for a type with impl Describe for …" },
    { pattern: /self\s*\.\s*name\s*\(\s*\)/, message: "The default describe() should call self.name()" },
  ],

  tests: [
    { name: 'Dog { name: "Rex" }.name() returns "Rex"',
      code: 'let d = Dog { name: String::from("Rex") };\nassert_eq!(d.name(), "Rex");' },
    { name: 'Dog { name: "Rex" }.describe() uses the default body',
      code: 'let d = Dog { name: String::from("Rex") };\nassert_eq!(d.describe(), "This is Rex");' },
    { name: 'Robot { id: 7 }.name() returns "Robot #7"',
      code: 'let r = Robot { id: 7 };\nassert_eq!(r.name(), "Robot #7");' },
    { name: 'Robot { id: 7 }.describe() uses the same default',
      code: 'let r = Robot { id: 7 };\nassert_eq!(r.describe(), "This is Robot #7");' },
  ],

  solution: `struct Dog {
    name: String,
}

struct Robot {
    id: u32,
}

trait Describe {
    fn name(&self) -> String;

    fn describe(&self) -> String {
        format!("This is {}", self.name())
    }
}

impl Describe for Dog {
    fn name(&self) -> String {
        self.name.clone()
    }
}

impl Describe for Robot {
    fn name(&self) -> String {
        format!("Robot #{}", self.id)
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Rust</th></tr>
  <tr><td>Interface</td><td>pure-virtual base class</td><td><code>trait Describe { fn name(&amp;self) -&gt; String; }</code></td></tr>
  <tr><td>Conformance</td><td><code>class Dog : public Describe</code> (at definition)</td><td><code>impl Describe for Dog</code> (anywhere, even later)</td></tr>
  <tr><td>Default behavior</td><td>non-pure virtual with a body</td><td>default method body in the trait</td></tr>
  <tr><td>Dispatch</td><td>virtual — vtable, always</td><td>static by default; <code>&amp;dyn Describe</code> for a vtable</td></tr>
  <tr><td>Compile-time constraint</td><td><code>template&lt;Describable T&gt;</code> (concept, structural)</td><td><code>fn f&lt;T: Describe&gt;(x: &amp;T)</code> (nominal, next lesson)</td></tr>
  <tr><td>Retrofit built-ins</td><td>impossible for <code>int</code></td><td><code>impl Describe for i32 { … }</code></td></tr>
</table>
<p><code>Dog</code> and <code>Robot</code> share no base class, no common
layout, no vtable pointer — yet both answer <code>.describe()</code>, and
the default body dispatches back into each type's own <code>name()</code>
statically. That's the design pattern you approximate in C++ with CRTP,
expressed directly. The one rule Rust adds is coherence: to write
<code>impl Trait for Type</code>, you must own the trait or the type — which
is exactly what stops two libraries from giving <code>i32</code> conflicting
implementations.</p>`,
};
