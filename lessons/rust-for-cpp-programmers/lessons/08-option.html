const LESSON = {
  number: 8,
  title: "Option: The End of Null",

  intro: `
<p>You already know the right answer to "this might not exist":
<code>std::optional&lt;T&gt;</code>, not a raw pointer that might be
<code>nullptr</code>. Rust's <code>Option&lt;T&gt;</code> is that answer made
universal and mandatory. Universal, because there are no raw pointers lurking
in ordinary code — <em>every</em> maybe-absent value is an
<code>Option</code>, so there's no API where the possibility of null hides in
a comment. Mandatory, because the compiler forces the
<code>has_value()</code> check: dereferencing an empty
<code>std::optional</code> without checking is UB, but there is no
<code>*opt</code> in Rust at all — you cannot reach the <code>T</code> without
going through a construct that handles <code>None</code>.</p>
<table>
  <tr><th>C++</th><th>Rust</th></tr>
  <tr><td><code>std::optional&lt;std::string&gt;</code></td><td><code>Option&lt;String&gt;</code></td></tr>
  <tr><td><code>return "Ada";</code></td><td><code>Some(String::from("Ada"))</code></td></tr>
  <tr><td><code>return std::nullopt;</code></td><td><code>None</code></td></tr>
  <tr><td><code>opt.value_or(fallback)</code></td><td><code>opt.unwrap_or(fallback)</code></td></tr>
  <tr><td><code>opt.transform(f)</code> (C++23)</td><td><code>opt.map(f)</code></td></tr>
  <tr><td><code>*opt</code> unchecked → UB</td><td>impossible — <code>match</code> / <code>unwrap_or</code> / <code>if let</code></td></tr>
</table>
<p>The everyday tools: <code>unwrap_or(default)</code> is
<code>value_or</code>; <code>.map(f)</code> is C++23's
<code>transform</code>, applying <code>f</code> only if a value is present;
and <code>match</code> gives you both arms explicitly when you need full
control. There's also <code>.unwrap()</code> — <code>value()</code> minus the
exception, it panics on <code>None</code> — fine in tests, a code smell in
library code.</p>`,

  cpp: `#include <optional>
#include <string>

std::optional<std::string> find_user(unsigned id) {
    if (id == 1) return "Ada";
    if (id == 2) return "Grace";
    return std::nullopt;
}

std::string display_name(std::optional<std::string> name) {
    return name.value_or("anonymous");
}

std::optional<char> first_char(const std::string& s) {
    if (s.empty()) return std::nullopt;
    return s[0];
}

// The bug optional can't stop: *name without has_value() is still UB.`,

  task: `
<p>Port the lookup code to Rust:</p>
<ol>
  <li><code>find_user(id: u32) -&gt; Option&lt;String&gt;</code> — return
      <code>Some(String::from("Ada"))</code> for id <code>1</code>,
      <code>Some(String::from("Grace"))</code> for id <code>2</code>, and
      <code>None</code> otherwise. A <code>match</code> on <code>id</code>
      with a <code>_</code> arm reads nicely here.</li>
  <li><code>display_name(name: Option&lt;String&gt;) -&gt; String</code> —
      return the name if present, else <code>"anonymous"</code>. This is
      <code>value_or</code>, spelled
      <code>name.unwrap_or(String::from("anonymous"))</code>.</li>
  <li><code>first_char(s: &amp;str) -&gt; Option&lt;char&gt;</code> — the
      empty-string check disappears: <code>s.chars().next()</code> already
      returns <code>Option&lt;char&gt;</code>, because iterators speak Option
      natively.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. find_user: Some("Ada") for 1, Some("Grace") for 2, None otherwise.
//    (String::from turns a literal into an owned String.)
fn find_user(id: u32) -> Option<String> {
    todo!()
}

// 2. display_name: value_or is spelled unwrap_or.
fn display_name(name: Option<String>) -> String {
    todo!()
}

// 3. first_char: s.chars().next() is already an Option<char> — no empty()
//    check needed.
fn first_char(s: &str) -> Option<char> {
    todo!()
}
`,

  requirements: [
    { pattern: /Option</, message: "Use Option<T> in your signatures" },
    { pattern: /Some\(/, message: "Wrap present values in Some(...)" },
    { pattern: /None/, message: "Return None for the absent case" },
    { pattern: /unwrap_or/, message: "Use unwrap_or (value_or) for the default in display_name" },
  ],

  tests: [
    { name: 'find_user(1) returns Some("Ada")',
      code: 'assert_eq!(find_user(1), Some(String::from("Ada")));' },
    { name: 'find_user(2) returns Some("Grace")',
      code: 'assert_eq!(find_user(2), Some(String::from("Grace")));' },
    { name: "find_user(99) returns None",
      code: "assert_eq!(find_user(99), None);" },
    { name: 'display_name(Some("Ada")) returns "Ada"',
      code: 'assert_eq!(display_name(Some(String::from("Ada"))), "Ada");' },
    { name: 'display_name(None) returns "anonymous"',
      code: 'assert_eq!(display_name(None), "anonymous");' },
    { name: "first_char works on \"rust\" and the empty string",
      code: 'assert_eq!(first_char("rust"), Some(\'r\'));\nassert_eq!(first_char(""), None);' },
  ],

  solution: `fn find_user(id: u32) -> Option<String> {
    match id {
        1 => Some(String::from("Ada")),
        2 => Some(String::from("Grace")),
        _ => None,
    }
}

fn display_name(name: Option<String>) -> String {
    name.unwrap_or(String::from("anonymous"))
}

fn first_char(s: &str) -> Option<char> {
    s.chars().next()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Rust</th></tr>
  <tr><td>Maybe-a-value type</td><td><code>std::optional&lt;T&gt;</code> (opt-in)</td><td><code>Option&lt;T&gt;</code> (the only way)</td></tr>
  <tr><td>Present</td><td><code>return value;</code></td><td><code>Some(value)</code></td></tr>
  <tr><td>Absent</td><td><code>std::nullopt</code></td><td><code>None</code></td></tr>
  <tr><td>Get with default</td><td><code>opt.value_or(d)</code></td><td><code>opt.unwrap_or(d)</code></td></tr>
  <tr><td>Transform if present</td><td><code>opt.transform(f)</code> (C++23)</td><td><code>opt.map(f)</code></td></tr>
  <tr><td>Get or throw/panic</td><td><code>opt.value()</code> throws</td><td><code>opt.unwrap()</code> panics</td></tr>
  <tr><td>Unchecked access</td><td><code>*opt</code> — UB if empty</td><td>does not exist</td></tr>
  <tr><td>Branch on both cases</td><td><code>if (opt.has_value()) … else …</code></td><td><code>match opt { Some(x) =&gt; …, None =&gt; … }</code></td></tr>
</table>
<p><code>Option&lt;T&gt;</code> is just a library enum —
<code>enum Option&lt;T&gt; { Some(T), None }</code> — with no special compiler
magic, and for pointer-like payloads the niche optimization makes
<code>Option&lt;&amp;T&gt;</code> the same size as <code>&amp;T</code>: the
null pointer you gave up comes back as the representation of
<code>None</code>, but this time the type system stands between you and
dereferencing it.</p>`,
};
