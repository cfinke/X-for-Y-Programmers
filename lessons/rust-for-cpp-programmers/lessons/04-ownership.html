<script>
const LESSON = {
  number: 4,
  title: "Ownership & Moves",

  intro: `
<p>Here's the lesson where your C++ background pays off most: Rust's
ownership model <em>is</em> C++ move semantics with the defaults flipped.
Every value has exactly one owner; when the owner goes out of scope, the
destructor (<code>Drop</code>) runs — deterministic, RAII, exactly the model
you already trust. What changes is assignment: <code>let w = v;</code>
<em>moves</em> — no <code>std::move</code> required — and copies of non-trivial
types are never silent. Where C++'s <code>auto b = a;</code> deep-copies a
vector by accident, Rust makes you write <code>a.clone()</code>: the copy
constructor is now a visible, greppable call.</p>
<table>
  <tr><th>C++</th><th>Rust</th></tr>
  <tr><td><code>auto w = std::move(v);</code></td><td><code>let w = v;</code> (move is the default)</td></tr>
  <tr><td><code>auto b = a;</code> (silent deep copy)</td><td><code>let b = a.clone();</code> (explicit)</td></tr>
  <tr><td>Moved-from: "valid but unspecified"</td><td>Moved-from: statically dead — using it won't compile</td></tr>
  <tr><td>Trivially copyable types</td><td><code>Copy</code> types (<code>i32</code>, <code>bool</code>, …) — assignment copies</td></tr>
  <tr><td>Destructor at end of scope</td><td><code>Drop</code> at end of scope — same RAII</td></tr>
</table>
<p>The payoff is what happens <em>after</em> a move. In C++ the moved-from
object lingers in its "valid but unspecified state", and use-after-move is a
bug your static analyzer might catch. In Rust the moved-from binding is dead:
touch it and the compiler stops you with "value used here after move" — the
core guideline became a type rule. Plain integers and other
<code>Copy</code> types opt out, behaving like trivially-copyable types:
assignment just copies and both bindings stay usable. Passing a value
<em>by value</em> to a function moves it too — the function consumes its
argument, which is why the exercise below has to give ownership back by
returning.</p>`,

  cpp: `#include <utility>
#include <vector>

void demo() {
    std::vector<int> v{1, 2, 3};
    auto w = std::move(v);   // explicit move; v is "valid but unspecified"
    v.push_back(4);          // compiles anyway — use-after-move, good luck

    std::vector<int> a{1, 2, 3};
    auto b = a;              // silent deep copy — easy to pay by accident
    b.push_back(0);          // a is untouched, but nobody asked for a copy

    int x = 5;
    int y = x;               // trivially copyable: both fine, in any language
}   // destructors run here, in reverse order — RAII as usual`,

  task: `
<p>Feel the flipped defaults from inside a function:</p>
<ol>
  <li><code>consume_and_shout</code> takes <code>s: String</code>
      <em>by value</em> — it owns and consumes its argument, like a C++
      pass-by-value sink parameter — and returns the uppercase
      <code>String</code> (<code>.to_uppercase()</code>). The caller's
      original is moved in and statically gone.</li>
  <li><code>keep_both</code> takes <code>v: Vec&lt;i32&gt;</code> and returns a
      tuple <code>(Vec&lt;i32&gt;, Vec&lt;i32&gt;)</code>: the original vector
      unchanged, plus a <code>.clone()</code> of it with one extra element,
      <code>0</code>, appended via <code>.push(0)</code>. Clone first — once
      you've moved <code>v</code> into the tuple you can't touch it.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. consume_and_shout: takes the String by value (a sink), returns it
//    uppercased. No std::move at the call site — by-value IS the move.
fn consume_and_shout(s: String) -> String {
    todo!()
}

// 2. keep_both: clone v (the explicit copy constructor), push 0 onto the
//    clone, and return (original, clone).
fn keep_both(v: Vec<i32>) -> (Vec<i32>, Vec<i32>) {
    todo!()
}
`,

  requirements: [
    { pattern: /\.clone\(\)/, message: "Copy the vector explicitly with .clone()" },
    { pattern: /\.push\(/, message: "Append the extra element with .push(...)" },
  ],

  tests: [
    { name: 'consume_and_shout(String::from("rust")) returns "RUST"',
      code: 'assert_eq!(consume_and_shout(String::from("rust")), "RUST");' },
    { name: 'consume_and_shout(String::from("Move It")) returns "MOVE IT"',
      code: 'assert_eq!(consume_and_shout(String::from("Move It")), "MOVE IT");' },
    { name: "keep_both(vec![1, 2, 3]) returns the original untouched",
      code: "let (original, copy) = keep_both(vec![1, 2, 3]);\nassert_eq!(original, vec![1, 2, 3]);" },
    { name: "keep_both(vec![1, 2, 3]) returns a clone with 0 pushed",
      code: "let (original, copy) = keep_both(vec![1, 2, 3]);\nassert_eq!(copy, vec![1, 2, 3, 0]);" },
    { name: "keep_both(vec![]) returns ([], [0])",
      code: "let (original, copy) = keep_both(vec![]);\nassert_eq!(original, Vec::<i32>::new());\nassert_eq!(copy, vec![0]);" },
  ],

  solution: `fn consume_and_shout(s: String) -> String {
    s.to_uppercase()
}

fn keep_both(v: Vec<i32>) -> (Vec<i32>, Vec<i32>) {
    let mut copy = v.clone();
    copy.push(0);
    (v, copy)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Rust</th></tr>
  <tr><td>Move</td><td><code>auto w = std::move(v);</code></td><td><code>let w = v;</code> — the default</td></tr>
  <tr><td>Deep copy</td><td><code>auto b = a;</code> — implicit</td><td><code>let b = a.clone();</code> — explicit</td></tr>
  <tr><td>Use after move</td><td>Compiles; valid-but-unspecified state</td><td>Compile error: "value used here after move"</td></tr>
  <tr><td>Trivial copies</td><td>Trivially-copyable types</td><td><code>Copy</code> types: integers, floats, <code>bool</code>, <code>char</code></td></tr>
  <tr><td>Destructor</td><td><code>~T()</code> at scope end</td><td><code>Drop</code> at scope end — same determinism</td></tr>
  <tr><td>Sink parameter</td><td><code>void f(T t)</code> + <code>std::move</code> at call site</td><td><code>fn f(t: T)</code> — call site moves automatically</td></tr>
</table>
<p>Try the failure in your head: swap the solution's last two lines of
<code>keep_both</code> so it pushes onto <code>copy</code> <em>after</em>
building the tuple, or clone <em>after</em> moving <code>v</code> — the
borrow checker rejects both with "use of moved value". That error is the
entire feature: the rule your team enforces with <code>clang-tidy</code>'s
<code>bugprone-use-after-move</code> and careful review is simply not
expressible in compiling Rust. RAII, move semantics, single ownership —
you've been writing this discipline for years; now the compiler holds the
other end of the rope.</p>`,
};
</script>
