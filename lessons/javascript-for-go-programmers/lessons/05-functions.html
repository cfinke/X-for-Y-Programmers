<title>Lesson 5: Functions</title>
<link rel="stylesheet" href="../../../shared/css/style.css">

<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>In Go every function is declared with <code>func</code> and a fixed
signature, checked at compile time. JavaScript keeps none of that ceremony —
a function is just a value, and its "signature" is whatever it happens to do
with whatever it happens to receive. This lesson is about the three ways to
make a function, plus the two parameter forms you reach for most: defaults
and rest — both things Go simply doesn't have.</p>
<table>
  <tr><th>Go</th><th>JavaScript</th></tr>
  <tr><td><code>func add(a, b int) int { return a + b }</code></td><td><code>function add(a, b) {}</code></td></tr>
  <tr><td><code>double := func(n int) int { return n * 2 }</code></td><td><code>const double = (n) =&gt; n * 2;</code></td></tr>
  <tr><td>default params: not a thing — write a wrapper</td><td><code>function greet(name = "friend") {}</code></td></tr>
  <tr><td><code>func sum(xs ...int) int {}</code></td><td><code>function sum(...xs) {}</code></td></tr>
</table>
<p>All three JavaScript forms — declarations, function expressions, and arrow
functions — produce a callable value you can pass around, return, and store.
Declarations <em>hoist</em> (you can call them before their line), arrow
functions have no <code>this</code> or <code>arguments</code> of their own,
and a default only kicks in when the argument is <code>undefined</code> —
never for <code>null</code>, never for <code>0</code> or <code>""</code>.
Go's variadic <code>...int</code> is JavaScript's closest cousin to the rest
parameter, but where Go hands you a real <code>[]int</code> slice, JavaScript
hands you a real <code>Array</code> — both iterable, both with built-in
helpers, no <code>arguments</code>-object weirdness to fight.</p>`,

  go: `func add(a, b int) int {
	return a + b
}

double := func(n int) int { return n * 2 }

// No default parameters in Go: write a wrapper
func greet(name string) string {
	return "Hi, " + name
}

func greetDefault() string {
	return greet("friend")
}

// Variadic parameter — Go's version of a rest parameter
func sum(xs ...int) int {
	total := 0
	for _, x := range xs {
		total += x
	}
	return total
}`,

  task: `
<p>Write the plain-JavaScript versions — no type declarations anywhere,
unlike Go's always-explicit signatures:</p>
<ol>
  <li>A function declaration <code>add(a, b)</code> that returns their sum.</li>
  <li>An arrow function stored in a <code>const double</code> that returns
      <code>n * 2</code>.</li>
  <li><code>greet(name)</code> with a <em>default parameter</em> of
      <code>"friend"</code>, returning a string like <code>"Hi, Ada"</code> —
      one function doing the job of Go's <code>greet</code>/<code>greetDefault</code>
      wrapper pair.</li>
  <li><code>sum(...xs)</code> using a <em>rest parameter</em> that returns the
      total of every argument (<code>0</code> when called with none) — the
      JavaScript answer to Go's <code>xs ...int</code> variadic.</li>
</ol>`,

  starter: `// 1. declaration: add(a, b) -> a + b
function add(a, b) {
  // TODO
  return 0;
}

// 2. arrow function: double(n) -> n * 2
const double = (n) => {
  // TODO
  return 0;
};

// 3. default parameter: greet(name = "friend") -> "Hi, <name>"
function greet(name) {
  // TODO
  return "";
}

// 4. rest parameter: sum(...xs) -> total of all arguments
function sum() {
  // TODO
  return 0;
}
`,

  exportNames: ["add", "double", "greet", "sum"],

  requirements: [
    { pattern: /const\s+double\s*=\s*\(?\s*n\s*\)?\s*=>/, message: "Define double as an arrow function" },
    { pattern: /function\s+greet\s*\(\s*name\s*=\s*["']friend["']\s*\)/, message: "Give greet a default parameter of \"friend\"" },
    { pattern: /function\s+sum\s*\(\s*\.\.\.[A-Za-z_$][\w$]*\s*\)/, message: "Use a rest parameter in sum" },
  ],

  tests: [
    { name: "add(2, 3) is 5", run: (x) => expectEqual(x.add(2, 3), 5) },
    { name: "double(21) is 42", run: (x) => expectEqual(x.double(21), 42) },
    { name: 'greet("Ada") is "Hi, Ada"', run: (x) => expectEqual(x.greet("Ada"), "Hi, Ada") },
    { name: 'greet() falls back to "Hi, friend"', run: (x) => expectEqual(x.greet(), "Hi, friend") },
    { name: "sum() with no args is 0", run: (x) => expectEqual(x.sum(), 0) },
    { name: "sum(1, 2, 3, 4) is 10", run: (x) => expectEqual(x.sum(1, 2, 3, 4), 10) },
    { name: "double is a function value", run: (x) => expectEqual(typeof x.double, "function") },
  ],

  solution: `function add(a, b) {
  return a + b;
}

const double = (n) => n * 2;

function greet(name = "friend") {
  return \`Hi, \${name}\`;
}

function sum(...xs) {
  return xs.reduce((total, x) => total + x, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>JavaScript</th></tr>
  <tr><td>Declaration</td><td><code>func add(a, b int) int</code></td><td><code>function add(a, b)</code> (hoisted)</td></tr>
  <tr><td>Function literal</td><td><code>double := func(n int) int { return n * 2 }</code></td><td><code>const f = (n) =&gt; n * 2</code> (not hoisted)</td></tr>
  <tr><td>Default param</td><td>— (write a wrapper function)</td><td><code>name = "friend"</code></td></tr>
  <tr><td>Rest/variadic param</td><td><code>xs ...int</code> (a real <code>[]int</code> slice)</td><td><code>...xs</code> (a real <code>Array</code>)</td></tr>
  <tr><td>Missing return</td><td>compile error</td><td>silently <code>undefined</code></td></tr>
</table>
<p>Two JavaScript gotchas Go's compiler would never let slide. First, a
default triggers only on <code>undefined</code>: <code>greet(null)</code>
returns <code>"Hi, null"</code>, not <code>"Hi, friend"</code> — there's
nothing in Go to compare that to, since Go doesn't have default parameters
at all. Second, a rest parameter is a genuine <code>Array</code> — you can
call <code>.reduce</code>, <code>.map</code>, or <code>.length</code> on it
directly, the same way you'd range over Go's <code>xs ...int</code> slice,
except the JavaScript array is untyped and can hold anything you hand it.
And because arrow functions capture no <code>this</code> of their own, they
are the idiomatic choice for the little callbacks you hand to array
methods — filling the role Go's function literals play when passed to
<code>sort.Slice</code> or similar.</p>`,
};
</script>
