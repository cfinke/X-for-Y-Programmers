  title: "Async & Await",

  intro: `
<p>Go has no <code>async</code>/<code>await</code> keywords and no
<code>Promise</code> type. Every Go function is synchronous by default: call it
and you get its result back directly, no wrapper type, no unwrapping step.
JavaScript's <code>async</code>/<code>await</code> is syntax sugar over an
event loop and a microtask queue — machinery Go's runtime does not need,
because Go concurrency is built on goroutines scheduled by the Go runtime, not
a single-threaded event loop working through queued callbacks.</p>
<table>
  <tr><th>Go</th><th>JavaScript</th></tr>
  <tr><td><code>func f() int { return n }</code></td><td><code>async function f() { return n; }</code></td></tr>
  <tr><td><code>n := f()</code> (already synchronous)</td><td><code>const n = await f();</code></td></tr>
  <tr><td><code>go f(); go g(); wg.Wait()</code></td><td><code>Promise.all([f(), g()])</code></td></tr>
  <tr><td><code>if err != nil { … }</code> — errors are ordinary return values</td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today, and they map onto ideas you already have in
Go. First, JavaScript's serial <code>await</code>s behave like calling two Go
functions back-to-back on the same goroutine: each one finishes before the
next starts. To get the parallelism you would reach for with <code>go</code>
statements and a <code>sync.WaitGroup</code> (or channels), JavaScript hands
its promises to <code>Promise.all</code>, which kicks off all of the
underlying work up front and resolves to an array of results once everything
is done. Second, where Go surfaces failure as an explicit <code>error</code>
return value you check with <code>if err != nil</code>, JavaScript surfaces a
rejected promise as a thrown value at the <code>await</code> — so a plain
<code>try/catch</code> around it plays the role your <code>if err != nil</code>
check would, and an uncaught rejection propagates out of the
<code>async</code> function just like an unchecked error keeps bubbling up a
Go call stack.</p>`,

  go: `func double(n int) int {
	return n * 2
}

func sumDoubled(a, b int) int {
	var wg sync.WaitGroup
	var x, y int
	wg.Add(2)
	go func() {
		defer wg.Done()
		x = double(a)
	}()
	go func() {
		defer wg.Done()
		y = double(b)
	}()
	wg.Wait()
	return x + y
}

func safeDouble(n int) (result int) {
	defer func() {
		if r := recover(); r != nil {
			result = 0
		}
	}()
	return double(n)
}`,

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>JavaScript</th></tr>
  <tr><td>Return of async fn</td><td>plain <code>T</code> — functions just return their value</td><td>a promise; contents unlabeled</td></tr>
  <tr><td>Getting the value</td><td>the call itself, synchronously</td><td>whatever <code>await</code> settles to</td></tr>
  <tr><td>Sequential work</td><td>two calls, one after another</td><td><code>await a; await b;</code> — b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td><code>go</code> + <code>sync.WaitGroup</code> or channels</td><td><code>Promise.all([...])</code>; resolves to a results array</td></tr>
  <tr><td>Failure</td><td><code>if err != nil</code> — an explicit return value</td><td><code>catch (e)</code> — any thrown value</td></tr>
</table>
<p>The most common runtime performance bug in JavaScript that your Go instincts
will not automatically save you from: awaiting independent work in a loop or
in sequence when it could run concurrently. Two serial <code>await</code>s
take as long as the sum of both promises; <code>Promise.all</code> takes as
long as the slowest one — the same win you would reach for in Go by firing off
several <code>go</code> statements instead of calling functions back-to-back.
Reach for <code>Promise.all</code> whenever the tasks do not depend on each
other.</p>
<p>On errors: a rejected promise becomes a thrown value at its
<code>await</code>. If nothing catches it, your <code>async</code> function
returns a <em>rejected</em> promise — the failure propagates to whoever awaits
you, the same way an unchecked Go <code>error</code> keeps bubbling up the
call stack if you forget an <code>if err != nil</code>. But unlike Go's
<code>error</code> interface, JavaScript places no constraint on what can be
thrown, so a runtime <code>catch (e)</code> must be ready for anything: an
<code>Error</code>, a string, even <code>undefined</code>.</p>`,
