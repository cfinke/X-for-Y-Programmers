const LESSON = {
  number: 16,
  title: "Promises",

  intro: `
<p>Go doesn't have a Promise type. A function either returns synchronously —
often with an <code>error</code> as its second value — or you reach for a
goroutine and a channel to represent "a value that will show up later."
There's no built-in state machine tracking <em>pending</em>, <em>fulfilled</em>,
or <em>rejected</em>; you build that shape yourself out of channels, or you
just block with <code>&lt;-ch</code> until something arrives. JavaScript's
Promise bakes all three states into one object, with <code>then</code> and
<code>catch</code> as the vocabulary for reacting to it.</p>
<table>
  <tr><th>Go</th><th>JavaScript</th></tr>
  <tr><td><code>func f() int { return 2 }</code></td><td><code>Promise.resolve(2)</code> — value is just <code>2</code></td></tr>
  <tr><td><code>result, err := f()</code></td><td><code>.then((n) =&gt; ...)</code> — <code>n</code> is whatever came through</td></tr>
  <tr><td><code>error</code> is a plain typed return value</td><td>reject with anything; <code>catch</code> receives it as-is</td></tr>
  <tr><td><code>sync.WaitGroup</code> / fan-in channel</td><td><code>Promise.all([...])</code> resolves to a plain array</td></tr>
</table>
<p>Two runtime facts Go's synchronous-by-default model has no direct analog
for. First, <code>then</code> always returns a <em>new</em> Promise, and if
your callback returns a value that value becomes the next Promise's
fulfillment — returning a Promise flattens it, there is no
<code>Promise&lt;Promise&lt;T&gt;&gt;</code>, the way a Go function can't
accidentally return a "channel of a channel" without you writing that type
explicitly. Second, a <code>throw</code> inside a <code>then</code> callback
turns into a rejection of the returned Promise, which is why <code>catch</code>
can sit at the end of a chain and catch anything above it — closer to how a
single deferred <code>recover()</code> at the top of a goroutine can catch a
panic from anything it called.</p>`,

  go: `func double(n int) int {
	return n * 2
}

func safeDivide(a, b int) (int, error) {
	if b == 0 {
		return 0, errors.New("divide by zero")
	}
	return a / b, nil
}

func firstDone(tasks []func() int) int {
	result := make(chan int, len(tasks))
	for _, task := range tasks {
		go func(t func() int) {
			result <- t()
		}(task)
	}
	return <-result
}`,

  task: `
<p>Everything here settles immediately — no timers. Build a few functions that
exercise the Promise API in the shapes a Go programmer already reaches for
with <code>(value, error)</code> pairs and channels, but written as plain
runtime JavaScript.</p>
<ol>
  <li><code>double(n)</code> — return a Promise that <strong>fulfills</strong> with
      <code>n * 2</code> (use <code>Promise.resolve</code>).</li>
  <li><code>safeDivide(a, b)</code> — return a Promise. If <code>b</code> is
      <code>0</code>, <strong>reject</strong> with <code>new Error("divide by zero")</code>
      (use <code>Promise.reject</code>); otherwise resolve with <code>a / b</code>.</li>
  <li><code>chainDouble(n)</code> — call <code>double(n)</code> and use
      <code>.then(...)</code> to return a Promise that fulfills with the doubled
      value <em>plus 1</em>.</li>
  <li><code>divideOrDefault(a, b, fallback)</code> — call <code>safeDivide</code>
      and use <code>.catch(...)</code> so that on rejection it fulfills with
      <code>fallback</code> instead.</li>
  <li><code>sumAll(promises)</code> — use <code>Promise.all</code> to wait for an
      array of number-promises, then resolve with their sum.</li>
  <li><code>describeSettled(promises)</code> — use <code>Promise.allSettled</code>
      and resolve with an array of strings: <code>"ok:&lt;value&gt;"</code> for each
      fulfilled entry and <code>"err:&lt;message&gt;"</code> for each rejected one.</li>
</ol>`,

  exportNames: ["double", "safeDivide", "chainDouble", "divideOrDefault", "sumAll", "describeSettled"],

  requirements: [
    { pattern: /Promise\.resolve/, message: "Use Promise.resolve" },
    { pattern: /Promise\.reject/, message: "Use Promise.reject for the divide-by-zero case" },
    { pattern: /\.then\s*\(/, message: "Use .then to chain in chainDouble" },
    { pattern: /\.catch\s*\(/, message: "Use .catch in divideOrDefault" },
    { pattern: /Promise\.all\b/, message: "Use Promise.all in sumAll" },
    { pattern: /Promise\.allSettled/, message: "Use Promise.allSettled in describeSettled" },
  ],

  tests: [
    { name: "double(21) fulfills with 42", run: async (x) => expectEqual(await x.double(21), 42) },
    { name: "safeDivide(10, 2) fulfills with 5", run: async (x) => expectEqual(await x.safeDivide(10, 2), 5) },
    {
      name: "safeDivide(1, 0) rejects with the right message",
      run: async (x) => {
        let msg = null;
        await x.safeDivide(1, 0).catch((e) => { msg = e.message; });
        expectEqual(msg, "divide by zero");
      },
    },
    { name: "chainDouble(20) fulfills with 41", run: async (x) => expectEqual(await x.chainDouble(20), 41) },
    { name: "divideOrDefault(8, 2, -1) fulfills with 4", run: async (x) => expectEqual(await x.divideOrDefault(8, 2, -1), 4) },
    { name: "divideOrDefault(8, 0, -1) falls back to -1", run: async (x) => expectEqual(await x.divideOrDefault(8, 0, -1), -1) },
    {
      name: "sumAll resolves the total",
      run: async (x) => expectEqual(await x.sumAll([Promise.resolve(1), Promise.resolve(2), Promise.resolve(3)]), 6),
    },
    {
      name: "describeSettled reports ok and err entries",
      run: async (x) => expectDeepEqual(
        await x.describeSettled([Promise.resolve(7), Promise.reject(new Error("nope"))]),

      ),
    },
  ],

  solution: `function double(n) {
  return Promise.resolve(n * 2);
}

function safeDivide(a, b) {
  if (b === 0) return Promise.reject(new Error("divide by zero"));
  return Promise.resolve(a / b);
}

function chainDouble(n) {
  return double(n).then((d) => d + 1);
}

function divideOrDefault(a, b, fallback) {
  return safeDivide(a, b).catch(() => fallback);
}

function sumAll(promises) {
  return Promise.all(promises).then((values) => values.reduce((t, v) => t + v, 0));
}

function describeSettled(promises) {
  return Promise.allSettled(promises).then((results) =>
    results.map((r) =>
      r.status === "fulfilled" ? "ok:" + r.value : "err:" + r.reason.message
    )
  );
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Already-settled value</td><td><code>return 1, nil</code></td><td><code>Promise.resolve(1)</code></td></tr>
  <tr><td>Rejection value</td><td>an <code>error</code> value, often a struct implementing <code>Error() string</code></td><td>whatever you rejected with</td></tr>
  <tr><td>Chaining</td><td>sequential statements simply block until each call returns</td><td><code>then</code> returns a new Promise; returned values flatten</td></tr>
  <tr><td>Wait for all</td><td><code>sync.WaitGroup</code> or <code>errgroup.Group</code> collects each goroutine's result</td><td>resolves to a plain array, rejects on first failure</td></tr>
  <tr><td>Wait for all, keep errors</td><td>a results slice recording each goroutine's <code>(value, error)</code> pair</td><td>same shape, never rejects</td></tr>
  <tr><td>First to settle</td><td><code>select</code> over channels, or a fan-in channel</td><td>settles with the first result, win or lose</td></tr>
</table>
<p>Reach for a fan-in channel (or <code>errgroup.Group</code>) when you need
every result and one failure should sink the whole thing — the closest match
to JavaScript's <code>Promise.all</code>; reach for a results slice that
records each goroutine's <code>(value, error)</code> pair when you want to
inspect every outcome, the closest match to <code>Promise.allSettled</code>,
whose result objects are <code>{ status: "fulfilled", value }</code> or
<code>{ status: "rejected", reason }</code>. <code>Promise.race</code> settles
as soon as the first input does, whether that first one fulfills or rejects —
Go's nearest equivalent is a <code>select</code> statement or the fan-in
pattern above, where whichever goroutine writes to the channel first wins.</p>
<p>Runtime gotcha Go's compiler has no direct analog for:
<code>Promise.reject(x)</code> creates an already-rejected Promise, and if
nothing ever attaches a <code>catch</code> to it you get an "unhandled
rejection" warning — there's nothing here like <code>go vet</code> flagging an
unchecked <code>error</code> return. And because a thrown error inside
<code>then</code> becomes a rejection, a single trailing <code>.catch</code>
(or <code>try/await/catch</code>) covers the whole chain above it, similar to
how one deferred <code>recover()</code> can guard an entire call chain within
a goroutine.</p>`,
};
