  title: "Capstone",

  intro: `
<p>Time to put it together. This capstone is a tiny in-memory <em>task store</em>
that leans on almost everything this course has covered: a <strong>class</strong>
to hold state and behavior, <strong>array-iteration methods</strong>
(<code>find</code>, <code>filter</code>, <code>reduce</code>) to query and
aggregate, and <strong>custom errors</strong> to refuse bad input. Nothing here
is new syntax — you have written the equivalent shape in Go. The point is to
feel how it behaves once the compiler and the explicit <code>error</code> return
are gone and the only thing standing between a caller and a corrupt store is the
code <em>you</em> wrote.</p>
<table>
  <tr><th>Go</th><th>JavaScript</th></tr>
  <tr><td><code>type Task struct { ID int; Done bool }</code></td><td>a plain object shaped however you build it</td></tr>
  <tr><td><code>tasks []Task</code> — element type enforced</td><td><code>this.tasks = []</code> — holds anything you push</td></tr>
  <tr><td>compiler rejects <code>Add(42)</code></td><td>you must <code>throw</code> to reject it</td></tr>
  <tr><td><code>Get(id) (Task, error)</code> forces the caller to check <code>err</code></td><td><code>find</code> returns <code>undefined</code>; guard it</td></tr>
</table>
<p>In Go, a missing task is just a normal, expected outcome: <code>Get</code>
returns <code>(Task{}, &NotFoundError{...})</code>, and <code>if err != nil</code>
is the idiom every Go programmer's fingers type on reflex. The compiler will not
literally stop you from ignoring that second return value, but the convention
is strong enough that skipping it reads as a bug. JavaScript offers no such
nudge: <code>find</code> hands back a task or <code>undefined</code>, and if you
forget to check, the very next property access throws a <code>TypeError</code>.
The runtime discipline is to <em>make the miss explicit</em> — detect it and
throw a meaningful error instead of letting a cryptic one leak out later.</p>`,

  go: `type Task struct {
	ID       int
	Title    string
	Priority int
	Done     bool
}

type ValidationError struct{ Msg string }

func (e *ValidationError) Error() string { return e.Msg }

type NotFoundError struct{ ID int }

func (e *NotFoundError) Error() string {
	return fmt.Sprintf("no task %d", e.ID)
}

type TaskStore struct {
	tasks  []Task
	nextID int
}

func NewTaskStore() *TaskStore {
	return &TaskStore{nextID: 1}
}

func (s *TaskStore) Add(title string, priority int) (Task, error) {
	if strings.TrimSpace(title) == "" {
		return Task{}, &ValidationError{Msg: "title required"}
	}
	task := Task{ID: s.nextID, Title: title, Priority: priority, Done: false}
	s.nextID++
	s.tasks = append(s.tasks, task)
	return task, nil
}

func (s *TaskStore) Get(id int) (Task, error) {
	for _, t := range s.tasks {
		if t.ID == id {
			return t, nil
		}
	}
	return Task{}, &NotFoundError{ID: id}
}

func (s *TaskStore) Complete(id int) (Task, error) {
	for i := range s.tasks {
		if s.tasks[i].ID == id {
			s.tasks[i].Done = true
			return s.tasks[i], nil
		}
	}
	return Task{}, &NotFoundError{ID: id}
}

func (s *TaskStore) Pending() []Task {
	pending := []Task{}
	for _, t := range s.tasks {
		if !t.Done {
			pending = append(pending, t)
		}
	}
	return pending
}

type Summary struct {
	Total, Done, Pending int
}

func (s *TaskStore) Summary() Summary {
	sum := Summary{}
	for _, t := range s.tasks {
		sum.Total++
		if t.Done {
			sum.Done++
		} else {
			sum.Pending++
		}
	}
	return sum
}`,

  task: `
<p>Build the plain-JavaScript version of the same store. Define two error
classes and one <code>TaskStore</code> class.</p>
<ol>

  exportNames: ["TaskStore", "ValidationError", "NotFoundError"],

  requirements: [
    { pattern: /class\s+TaskStore/, message: "Define a TaskStore class" },
    { pattern: /class\s+\w*Error\s+extends\s+Error/, message: "Define a custom Error subclass" },
    { pattern: /\.(find|filter|reduce)\s*\(/, message: "Use array-iteration methods (find/filter/reduce)" },
    { pattern: /throw\s+new/, message: "Throw a custom error on bad input or a missing task" },

  tests: [
    { name: "add returns a task with id 1, not done", run: (x) => {
        const store = new x.TaskStore();
        expectDeepEqual(store.add("Write", 2), { id: 1, title: "Write", priority: 2, done: false });
      } },
    { name: "ids auto-increment across adds", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        expectEqual(store.add("b").id, 2);
      } },
    { name: "add with an empty title throws ValidationError", run: (x) => {
        const store = new x.TaskStore();
        try { store.add("   "); } catch (e) { expectTruthy(e instanceof x.ValidationError); return; }
        throw new Error("expected add('   ') to throw");
      } },
    { name: "get throws NotFoundError for a missing id", run: (x) => {
        const store = new x.TaskStore();
        try { store.get(99); } catch (e) { expectTruthy(e instanceof x.NotFoundError); return; }
        throw new Error("expected get(99) to throw");
      } },
    { name: "complete marks a task done", run: (x) => {
        const store = new x.TaskStore();
        const t = store.add("ship");
        expectEqual(store.complete(t.id).done, true);
      } },
    { name: "pending excludes completed tasks", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        const b = store.add("b");
        store.complete(b.id);
        expectDeepEqual(store.pending().map((t) => t.title), ["a"]);
      } },
    { name: "summary counts total/done/pending", run: (x) => {
        const store = new x.TaskStore();
        store.add("a");
        store.add("b");
        store.complete(store.add("c").id);
        expectDeepEqual(store.summary(), { total: 3, done: 1, pending: 2 });
      } },
    { name: "custom errors carry a name, message, and stack", run: (x) => {
        const err = new x.NotFoundError("nope");
        expectTruthy(err instanceof x.NotFoundError);
        expectEqual(err.name, "NotFoundError");
        expectEqual(err.message, "nope");
        expectTruthy(typeof err.stack === "string");
      } },

  solution: `class ValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = "ValidationError";
  }
}

class NotFoundError extends Error {
  constructor(message) {
    super(message);
    this.name = "NotFoundError";
  }
}

class TaskStore {
  constructor() {
    this.tasks = [];
    this.nextId = 1;
  }

  add(title, priority = 1) {
    if (typeof title !== "string" || title.trim() === "") {
      throw new ValidationError("title must be a non-empty string");
    }
    const task = { id: this.nextId++, title, priority, done: false };
    this.tasks.push(task);
    return task;
  }

  get(id) {
    const task = this.tasks.find((t) => t.id === id);
    if (!task) {
      throw new NotFoundError("no task with id " + id);
    }
    return task;
  }

  complete(id) {
    const task = this.get(id);
    task.done = true;
    return task;
  }

  pending() {
    return this.tasks.filter((t) => !t.done);
  }

  summary() {
    return this.tasks.reduce(
      (acc, t) => {
        acc.total += 1;
        if (t.done) acc.done += 1;
        else acc.pending += 1;
        return acc;
      },
      { total: 0, done: 0, pending: 0 }
    );
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>JavaScript</th></tr>
  <tr><td>Task shape</td><td><code>type Task struct</code> enforced</td><td>whatever object you construct</td></tr>
  <tr><td>Bad input</td><td>rejected at compile time (wrong types) or returned as an <code>error</code></td><td>rejected only if you <code>throw</code></td></tr>
  <tr><td>Missing lookup</td><td><code>(Task, error)</code> return forces a check</td><td><code>find</code> returns <code>undefined</code> silently</td></tr>
  <tr><td>Aggregate</td><td>a hand-written loop over a typed slice</td><td><code>reduce</code> with a seed object</td></tr>
</table>
<p>The lesson of the whole course lives in one line: <code>this.tasks.find(...)</code>
returns a task <em>or</em> <code>undefined</code>, and the runtime will not stop
you from reading <code>.done</code> off <code>undefined</code>. The
<code>if (!task) throw</code> guard is you doing, by hand, what Go's
<code>if err != nil</code> convention does for every fallible call — except in Go
the compiler at least forces you to name that second return value, while in
JavaScript nothing forces you to check anything at all.</p>
<p>Two other habits carried through here. Custom <code>Error</code> subclasses
let callers tell <em>why</em> something failed with <code>instanceof</code>
instead of string-matching messages — the rough JavaScript counterpart of Go's
<code>errors.As</code> against a custom error type — but only because each
constructor sets <code>this.name</code>. And the array methods (<code>find</code>,
<code>filter</code>, <code>reduce</code>) stayed the workhorses: where Go makes
you write an explicit <code>for range</code> loop for each of these, JavaScript
gives you one method call apiece. They read the same as a Go loop's intent, they
just no longer promise anything about what the elements are. That promise is now
your job.</p>`,
