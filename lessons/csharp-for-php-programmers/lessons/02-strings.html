  title: "Strings",

  intro: `
<p>C# strings will feel familiar in spirit — immutable sequences of characters
where every operation returns a <em>new</em> string rather than mutating the
original, much like PHP strings once you stop passing them by reference. The
big surface difference is that C# has no free functions: everything is a
method on the string itself (or a static method on the <code>string</code>
type), named in PascalCase, and a couple of them (<code>Substring</code>,
<code>IndexOf</code>) have sharper edges than their PHP cousins.</p>
<table>
  <tr><th>PHP</th><th>C#</th></tr>
  <tr><td><code>strtoupper($s)</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td><code>str_contains($s, "x")</code></td><td><code>s.Contains("x")</code></td></tr>
  <tr><td><code>strpos($s, "x")</code></td><td><code>s.IndexOf("x")</code></td></tr>
  <tr><td><code>substr($s, 1, 3)</code></td><td><code>s.Substring(1, 3)</code></td></tr>
  <tr><td><code>explode(",", $s)</code></td><td><code>s.Split(',')</code></td></tr>
  <tr><td><code>trim($s)</code></td><td><code>s.Trim()</code></td></tr>
  <tr><td><code>implode(", ", $arr)</code></td><td><code>string.Join(", ", arr)</code></td></tr>
</table>
<p>Two traps to note. <code>Substring(start, length)</code> takes a
<em>length</em> as its second argument, which lines up with PHP's
<code>substr($s, start, length)</code> — unlike JavaScript's
<code>slice</code>, which takes an end index. And <code>IndexOf</code> returns
<code>-1</code> when the substring is missing, whereas PHP's
<code>strpos</code> returns <code>false</code> (so you must use
<code>=== false</code>, not falsy checks, to test for "not found"). For
assembling many pieces in a loop, reach for <code>StringBuilder</code> instead
of repeatedly <code>+</code>-ing strings — the same reason you would avoid
<code>.=</code> in a hot loop in PHP, but here it is the idiomatic tool.</p>`,

  php: `function shout(string $s): string {
    return strtoupper(trim($s));
}

function csv(array $parts): string {
    return implode(", ", $parts);
}

function initials(string $name): string {
    $words = explode(" ", $name);
    $letters = array_map(fn($w) => $w[0], $words);
    return implode("", $letters);
}`,

  task: `
<p>Build a <code>static class TextUtil</code> with these <code>static</code>

</ol>`,

  requirements: [
    { pattern: /string\.Join/, message: "Join the parts with string.Join" },
    { pattern: /new\s+StringBuilder/, message: "Build the initials with a StringBuilder" },

  tests: [
    { name: "Shout(\"  hi there \") is \"HI THERE\"", code: "      expect_eq(TextUtil.Shout(\"  hi there \"), \"HI THERE\");" },
    { name: "Csv joins with \", \"", code: "      expect_eq(TextUtil.Csv(new string[] { \"a\", \"b\", \"c\" }), \"a, b, c\");" },
    { name: "Csv of one element has no separator", code: "      expect_eq(TextUtil.Csv(new string[] { \"solo\" }), \"solo\");" },
    { name: "Initials(\"Ada Lovelace\") is \"AL\"", code: "      expect_eq(TextUtil.Initials(\"Ada Lovelace\"), \"AL\");" },
    { name: "Initials(\"grace brewster hopper\") is \"gbh\"", code: "      expect_eq(TextUtil.Initials(\"grace brewster hopper\"), \"gbh\");" },
    { name: "Greeting(\"Ada\") is \"Hello, Ada!\"", code: "      expect_eq(TextUtil.Greeting(\"Ada\"), \"Hello, Ada!\");" },
  ],

  solution: `static class TextUtil {
  public static string Shout(string s) {
    return s.Trim().ToUpper();
  }

  public static string Csv(string[] parts) {
    return string.Join(", ", parts);
  }

  public static string Initials(string name) {
    var sb = new StringBuilder();
    foreach (var word in name.Split(' ')) {
      if (word.Length > 0) {
        sb.Append(word[0]);
      }
    }
    return sb.ToString();
  }

  public static string Greeting(string name) {
    return $"Hello, {name}!";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C#</th></tr>
  <tr><td>Uppercase</td><td><code>strtoupper($s)</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td>Contains</td><td><code>str_contains($s, $x)</code></td><td><code>s.Contains(x)</code></td></tr>
  <tr><td>Substring</td><td><code>substr($s, 1, 3)</code></td><td><code>s.Substring(1, 3)</code> (start, <em>length</em>)</td></tr>
  <tr><td>Replace</td><td><code>str_replace("a", "b", $s)</code></td><td><code>s.Replace("a", "b")</code> (replaces all)</td></tr>
  <tr><td>Join</td><td><code>implode($sep, $arr)</code></td><td><code>string.Join(sep, arr)</code> (static)</td></tr>
  <tr><td>Build in loop</td><td><code>$s .= $piece</code></td><td><code>sb.Append(piece)</code></td></tr>
</table>
<p>A few more idioms worth filing away. <code>string.Split</code> takes a
<code>char</code> (single quotes: <code>','</code>) or a <code>string[]</code> of
separators — not a regex, so it is closer to PHP's <code>explode</code> than
<code>preg_split</code>. <code>Replace</code> swaps <em>every</em> occurrence,
so it matches PHP's <code>str_replace</code>, not a single-shot replace.
<code>StartsWith</code>, <code>EndsWith</code>, and <code>Contains</code> all
return <code>bool</code> — no need for PHP's "compare the result to
<code>false</code>" dance that <code>strpos</code> requires. And note that
<code>string.Join</code>, <code>string.IsNullOrEmpty</code>, and friends are
<em>static</em> methods on the <code>string</code> type, much like PHP's
free-standing <code>string</code> functions, which is why the call reads
<code>string.Join(...)</code> rather than <code>arr.Join(...)</code>.</p>`,
