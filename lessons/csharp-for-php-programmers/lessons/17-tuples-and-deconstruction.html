  title: "Tuples & Deconstruction",

  intro: `
<p>In PHP you reach for <code>list()</code> / <code>[$a, $b] = ...</code>
destructuring, or an associative array like
<code>["count" => $count, "name" => $name]</code>, whenever you want to return
two values without declaring a whole class. C# has a direct equivalent:
the <strong>value tuple</strong>. It is written with parentheses —
<code>(int, string)</code> — and it is a lightweight <code>struct</code>, so it
copies by value and compares by value.</p>
<table>
  <tr><th>PHP</th><th>C#</th></tr>
  <tr><td><code>[int, string]</code> (array, untyped)</td><td><code>(int, string)</code></td></tr>
  <tr><td><code>["count" => $c, "name" => $n]</code></td><td><code>(int Count, string Name)</code> (named)</td></tr>
  <tr><td><code>[$a, $b] = $pair;</code></td><td><code>var (a, b) = pair;</code></td></tr>
  <tr><td><code>return [$n, $s];</code></td><td><code>return (n, s);</code></td></tr>
  <tr><td><code>$t[0]</code>, <code>$t[1]</code></td><td><code>t.Item1</code>, <code>t.Item2</code> (or names)</td></tr>
</table>
<p>Unlike a PHP array standing in for a tuple, a C# tuple's elements can carry
<em>names</em> (<code>(int Count, string Name)</code>), so you read
<code>result.Count</code> instead of counting index positions — and it is
strongly typed and checked at compile time, unlike an array. And the names are
just labels — two tuples with the same element types are the same type
regardless of the names, and <code>==</code>/<code>Equals</code> compare
element by element.</p>
<p>To pull a tuple apart you <strong>deconstruct</strong> it:
<code>var (a, b) = GetPair();</code>. Any type can opt into this by defining a
<code>Deconstruct</code> method with <code>out</code> parameters, and then it too
works with the <code>var (…)</code> syntax.</p>`,

  php: `function minMax(array $nums): array {
  $lo = $nums[0];
  $hi = $nums[0];
  foreach ($nums as $n) {
    $lo = min($lo, $n);
    $hi = max($hi, $n);
  }
  return [$lo, $hi];
}

[$low, $high] = minMax([4, 1, 9, 2]);

class Point {

}
$p = new Point(3, 4);
["x" => $x, "y" => $y] = ["x" => $p->x, "y" => $p->y];`,

    { name: "Divide result compares by value", code: "      expect_true(Stats.Divide(10, 3).Equals((3, 1)));" },

  solution: `static class Stats {
  public static (int Min, int Max) MinMax(int[] nums) {
    int lo = nums[0], hi = nums[0];
    foreach (var n in nums) {
      if (n < lo) lo = n;
      if (n > hi) hi = n;
    }
    return (lo, hi);
  }

  public static (int Quotient, int Remainder) Divide(int a, int b) {
    return (a / b, a % b);
  }

  public static int Range(int[] nums) {
    var (min, max) = MinMax(nums);
    return max - min;
  }
}

class Point {
  public int X { get; }
  public int Y { get; }

  public Point(int x, int y) {
    X = x;
    Y = y;
  }

  public void Deconstruct(out int x, out int y) {
    x = X;
    y = Y;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C#</th></tr>
  <tr><td>Tuple type</td><td><code>array</code> (untyped)</td><td><code>(int, string)</code></td></tr>
  <tr><td>Named elements</td><td><code>["count" => ..., "name" => ...]</code></td><td><code>(int Count, string Name)</code></td></tr>
  <tr><td>Construct</td><td><code>[1, "a"]</code></td><td><code>(1, "a")</code></td></tr>
  <tr><td>Access</td><td><code>$t[0]</code></td><td><code>t.Item1</code> or <code>t.Count</code></td></tr>
  <tr><td>Deconstruct</td><td><code>[$a, $b] = $t;</code></td><td><code>var (a, b) = t;</code></td></tr>
  <tr><td>Array destructure</td><td><code>["x" => $x, "y" => $y] = $arr;</code></td><td><code>var (x, y) = p;</code> via <code>Deconstruct</code></td></tr>
</table>
<p>A value tuple is a <code>struct</code> (<code>System.ValueTuple</code>), so it
copies on assignment and <code>==</code>/<code>Equals</code> compare element by
element — handy in tests. That's a sharper guarantee than a PHP array, which is
untyped and compares by value only via <code>==</code> on the whole array
(including keys). The C# element names are compile-time sugar only:
<code>(int Min, int Max)</code> and <code>(int, int)</code> are the same runtime
type, which is why <code>MinMax(...) == (3, 8)</code> works against a nameless
literal.</p>
<p>You can also mix deconstruction into <code>foreach</code>
(<code>foreach (var (k, v) in dict)</code>) and discard pieces you don't need with
<code>_</code>: <code>var (_, max) = MinMax(nums);</code>. Any type — not just
tuples — becomes deconstructible the moment it exposes a <code>Deconstruct</code>
method with <code>out</code> parameters, and you can even provide several
overloads for different arities.</p>`,
