<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>PHP and C# look quite different on the page, but the ideas underneath line
up: both have variables, functions, and (these days) real static-typing
options. The big shifts moving from PHP to C# are that types are checked at
compile time instead of runtime, variables don't wear a <code>$</code> sigil,
and every method lives inside a class — there are no loose top-level
functions.</p>
<table>
  <tr><th>PHP</th><th>C#</th></tr>
  <tr><td><code>$age = 36;</code></td><td><code>int age = 36;</code></td></tr>
  <tr><td><code>$name = "Ada";</code></td><td><code>var name = "Ada";</code> (inferred)</td></tr>
  <tr><td><code>"{$name} is {$age}"</code></td><td><code>$"{name} is {age}"</code></td></tr>
  <tr><td><code>int</code>, <code>float</code></td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>decimal</code>, …</td></tr>
</table>
<p>Two adjustments. First, <code>var</code> is C#'s closest thing to PHP's
untyped <code>$x = …</code> — the type is inferred from the initializer, but
unlike PHP it's fixed once chosen; you can't reassign a string into it later.
Second, the numeric split matters: <code>7 / 2</code> is <code>3</code>
(integer division), while PHP's <code>7 / 2</code> would give you
<code>3.5</code> because PHP always uses floating-point division unless you
reach for <code>intdiv()</code>. In C#, <code>7 / 2.0</code> is
<code>3.5</code>. Interpolated strings drop the curly-brace-and-dollar PHP
style for a <code>$</code> prefix on the whole string, and there are no free
functions — helpers become <code>static</code> methods on a class.</p>`,

  php: `$age = 36;
$userName = "Ada";

function describe(string $name, int $age): string {
  return "{$name} is {$age}";
}`,

  task: `
<p>Write the C# version. C# has no top-level functions, so put your methods in a
class:</p>
<ol>
  <li>Declare a <code>static class Basics</code> holding <code>static</code>
      methods.</li>
  <li><code>Add(int a, int b)</code> returns their sum.</li>
  <li><code>Describe(string name, int age)</code> returns a string like
      <code>"Ada is 36"</code> — use an interpolated string
      <code>$"{name} is {age}"</code>.</li>
  <li><code>Divide(int a, int b)</code> returns a <code>double</code>, so
      <code>Divide(7, 2)</code> is <code>3.5</code>. Cast one operand:
      <code>(double)a / b</code>.</li>
</ol>`,

  starter: `static class Basics {
  public static int Add(int a, int b) {
    return 0; // TODO
  }

  public static string Describe(string name, int age) {
    return ""; // TODO
  }

  public static double Divide(int a, int b) {
    return 0; // TODO: watch out for integer division
  }
}
`,

  requirements: [
    { pattern: /\$"/, message: "Build the string with an interpolated string ($\"...\")" },
    { pattern: /\(double\)/, message: "Cast to (double) so Divide returns a fractional result" },
  ],

  tests: [
    { name: "Add(2, 3) is 5", code: "      expect_eq(Basics.Add(2, 3), 5);" },
    { name: "Describe(\"Ada\", 36) is \"Ada is 36\"", code: "      expect_eq(Basics.Describe(\"Ada\", 36), \"Ada is 36\");" },
    { name: "Describe(\"Rob\", 68) is \"Rob is 68\"", code: "      expect_eq(Basics.Describe(\"Rob\", 68), \"Rob is 68\");" },
    { name: "Divide(7, 2) is 3.5", code: "      expect_eq(Basics.Divide(7, 2), 3.5);" },
    { name: "Divide(10, 4) is 2.5", code: "      expect_eq(Basics.Divide(10, 4), 2.5);" },
  ],

  solution: `static class Basics {
  public static int Add(int a, int b) {
    return a + b;
  }

  public static string Describe(string name, int age) {
    return $"{name} is {age}";
  }

  public static double Divide(int a, int b) {
    return (double)a / b;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C#</th></tr>
  <tr><td>Typed variable</td><td><code>int $x = 1;</code> (rare, function params/props only)</td><td><code>int x = 1;</code></td></tr>
  <tr><td>Inferred variable</td><td><code>$x = 1;</code></td><td><code>var x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>const X = 1;</code> / <code>define('X', 1);</code></td><td><code>const int x = 1;</code></td></tr>
  <tr><td>Interpolation</td><td><code>"{$x}"</code></td><td><code>$"{x}"</code></td></tr>
  <tr><td>Free function</td><td><code>function f() {}</code></td><td><code>static</code> method in a class</td></tr>
</table>
<p>The integer-division gotcha runs the opposite direction from what you're
used to: in PHP, <code>/</code> always produces a float, so <code>7 / 2</code>
is <code>3.5</code> and you'd reach for <code>intdiv(7, 2)</code> to get
<code>3</code>. In C#, <code>int / int</code> truncates by default. Promote
one side to <code>double</code> — a cast, a literal like <code>2.0</code>, or
a <code>double</code> variable — and the whole expression becomes floating
point. For money, reach for <code>decimal</code> instead of <code>double</code>
to avoid binary rounding error.</p>`,
};
