  intro: `
<p>PHP's generator functions produce values lazily, one at a time: any function whose
body contains a <code>yield</code> keyword automatically becomes a generator that
returns a <code>Generator</code> object, and anything implementing <code>Traversable</code>
can drive a <code>foreach</code> loop. C# has the exact same idea under different names: a
method whose return type is <code>IEnumerable&lt;T&gt;</code> becomes an <em>iterator</em>
the moment it contains a <code>yield return</code>, and <code>foreach</code> works the same
way in both languages.</p>
<table>
  <tr><th>PHP</th><th>C#</th></tr>
  <tr><td><code>function g(): Generator</code></td><td><code>IEnumerable&lt;int&gt; G()</code></td></tr>
  <tr><td><code>yield $x;</code></td><td><code>yield return x;</code></td></tr>
  <tr><td><code>return;</code> (stop early)</td><td><code>yield break;</code></td></tr>
  <tr><td><code>foreach ($seq as $x)</code></td><td><code>foreach (var x in seq)</code></td></tr>
  <tr><td><code>IteratorAggregate::getIterator()</code></td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>Two things to internalize. First, iterators are <em>lazy</em>: the body does not
run until something enumerates it, and it runs only as far as the consumer asks —
so an infinite <code>Fibonacci()</code> is fine as long as a caller uses
<code>Take(…)</code> to stop pulling. Second, there is no <code>function*</code>
keyword, just like in PHP; the compiler rewrites any method containing <code>yield</code>
into a state machine automatically. To make a whole <em>class</em> iterable, implement
<code>IEnumerable&lt;T&gt;</code> and give it a <code>GetEnumerator()</code> — which
can itself be an iterator built from <code>yield return</code>, the same way a PHP
class implementing <code>IteratorAggregate</code> can have a <code>getIterator()</code>
that itself uses <code>yield</code>.</p>`,

  php: `function numberRange(int $start, int $count): iterable {
    for ($i = 0; $i < $count; $i++) {
        yield $start + $i;
    }
}

function take(iterable $source, int $n): iterable {
    $i = 0;
    foreach ($source as $x) {
        if ($i >= $n) return;   // stop early
        yield $x;
        $i++;
    }
}

function fibonacci(): iterable {
    [$a, $b] = [0, 1];
    while (true) {
        yield $a;
        [$a, $b] = [$b, $a + $b];
    }
}

class Countdown implements IteratorAggregate {
    public function __construct(private int $start) {}
    public function getIterator(): Generator {
        for ($i = $this->start; $i >= 1; $i--) {
            yield $i;
        }
    }
}`,

  solution: `static class Sequences {
  public static IEnumerable<int> Range(int start, int count) {
    for (int i = 0; i < count; i++) {
      yield return start + i;
    }
  }

  public static IEnumerable<T> Take<T>(IEnumerable<T> source, int n) {
    int i = 0;
    foreach (T item in source) {
      if (i >= n) {
        yield break;
      }
      yield return item;
      i++;
    }
  }

  public static IEnumerable<long> Fibonacci() {
    long a = 0, b = 1;
    while (true) {
      yield return a;
      long next = a + b;
      a = b;
      b = next;
    }
  }
}

class Countdown : IEnumerable<int> {
  private int start;

  public Countdown(int start) {
    this.start = start;
  }

  public IEnumerator<int> GetEnumerator() {
    for (int i = start; i >= 1; i--) {
      yield return i;
    }
  }

  IEnumerator IEnumerable.GetEnumerator() {
    return GetEnumerator();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C#</th></tr>
  <tr><td>Generator function</td><td>any <code>function</code> containing <code>yield</code></td><td>method returning <code>IEnumerable&lt;T&gt;</code> with <code>yield</code></td></tr>
  <tr><td>Emit a value</td><td><code>yield $x;</code></td><td><code>yield return x;</code></td></tr>
  <tr><td>Stop early</td><td><code>return;</code></td><td><code>yield break;</code></td></tr>
  <tr><td>Consume</td><td><code>foreach</code></td><td><code>foreach</code> / LINQ</td></tr>
  <tr><td>Iterable class</td><td><code>IteratorAggregate::getIterator()</code></td><td><code>GetEnumerator()</code></td></tr>
</table>
<p>An iterator method's body does not execute when you call it — it runs on demand
as the consumer pulls values. That laziness is why an infinite <code>Fibonacci()</code>
never hangs: <code>Take(Fibonacci(), 7)</code> pulls exactly seven values and then
stops asking. It is also why any exception or expensive setup inside the method is
deferred until the first <code>MoveNext</code>.</p>
<p>Because iterator methods return <code>IEnumerable&lt;T&gt;</code>, the entire LINQ
surface (<code>Where</code>, <code>Select</code>, <code>Sum</code>, <code>First</code>,
<code>SequenceEqual</code>, …) composes over them for free, with no extra step. PHP's
generators are lazy in the same way, but the built-in array functions
(<code>array_map</code>, <code>array_filter</code>, <code>array_sum</code>, …) only
accept arrays — you have to eagerly drain a generator with
<code>iterator_to_array()</code> before you can use them, which throws away the
laziness. Implementing <code>IEnumerable&lt;T&gt;</code> on a class requires two
<code>GetEnumerator</code> methods: the generic one you actually write, plus a
non-generic <code>IEnumerator IEnumerable.GetEnumerator()</code> (explicit interface
implementation) that just delegates to it — a legacy requirement from the
pre-generics <code>System.Collections</code> interface, with no PHP equivalent since
<code>IteratorAggregate</code> only ever needs the one <code>getIterator()</code> method.</p>`,
