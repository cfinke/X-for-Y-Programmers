const LESSON = {
  number: 12,
  title: "Array Iteration",

  intro: `
<p>In PHP, transforming an array usually means reaching for
<code>array_map</code>, <code>array_filter</code>, and <code>array_reduce</code>
— free functions that take the array as an argument, with the callback's
position varying from function to function. JavaScript puts the equivalent
behavior directly on the array as methods: <code>map</code>, <code>filter</code>,
and <code>reduce</code> are called on the array itself, always with the
callback first. The transformations they perform are the same ones you already
reach for in PHP; only the calling convention changes.</p>
<table>
  <tr><th>PHP</th><th>JavaScript</th></tr>
  <tr><td><code>array_map(fn, $arr)</code></td><td><code>arr.map(fn)</code></td></tr>
  <tr><td><code>array_reduce($arr, $fn, 0)</code></td><td><code>arr.reduce(fn, 0)</code></td></tr>
  <tr><td><code>current(array_filter($arr, fn)) ?: null</code></td><td><code>arr.find(fn)</code> — may be <code>undefined</code></td></tr>
  <tr><td>result type is whatever the callback returned</td><td>result is whatever the callback returned</td></tr>
</table>
<p>The idiomatic move — in both languages — is to <em>chain</em> these methods
instead of writing manual <code>for</code> loops: describe the transformation as
a pipeline (<code>filter</code> then <code>map</code> then <code>reduce</code>)
rather than a sequence of mutations. Chaining reads especially naturally in
JavaScript because each method returns a new array that the next method call
can be attached to directly, without PHP's nested-function-call syntax. Two
runtime facts worth holding onto: <code>find</code> returns <code>undefined</code>
when nothing matches (PHP's <code>array_filter</code> plus <code>current</code>
gives you <code>false</code> on an empty result instead), and <code>reduce</code>
on an empty array <em>throws</em> if you gave it no initial value — PHP's
<code>array_reduce</code> is more forgiving and just returns the initial value
you passed (or <code>null</code> if you omitted it).</p>`,

  php: `function paidTotal(array $orders): float {
    return array_reduce(
        array_filter($orders, fn($o) => $o['paid']),
        fn($sum, $o) => $sum + $o['total'],
        0
    );
}

function customerNames(array $orders): array {
    return array_map(fn($o) => $o['customer'], $orders);
}`,

  task: `
<p>You are given an array of order objects, each shaped like
<code>{ id, customer, total, paid }</code>. Build a little reporting toolkit —
no manual <code>for</code>/<code>while</code> loops, use the array methods:</p>
<ol>
  <li><code>paidTotal(orders)</code> — sum of <code>total</code> across only the
      <em>paid</em> orders (chain <code>filter</code> then <code>reduce</code>).
      Returns <code>0</code> for an empty array.</li>
  <li><code>bigSpenders(orders, min)</code> — an array of the
      <code>customer</code> names whose order <code>total</code> is greater than
      or equal to <code>min</code> (chain <code>filter</code> then
      <code>map</code>).</li>
  <li><code>findOrder(orders, id)</code> — the first order object with the given
      <code>id</code>, or <code>undefined</code> if there is none (use
      <code>find</code>).</li>
  <li><code>allPaid(orders)</code> — <code>true</code> if every order is paid
      (use <code>every</code>).</li>
  <li><code>anyUnpaid(orders)</code> — <code>true</code> if at least one order is
      unpaid (use <code>some</code>).</li>
  <li><code>totalByCustomer(orders)</code> — an object mapping each customer name
      to the sum of their order totals, built with a single <code>reduce</code>.</li>
</ol>`,

  starter: `// The data the tests will pass in looks like:
// { id: 1, customer: "Ada", total: 40, paid: true }

// 1. Sum of totals across only paid orders.

  // TODO: filter then reduce
  return 0;
}

// 2. Names of customers whose order total is >= min.
function bigSpenders(orders, min) {
  // TODO: filter then map
  return [];
}

// 3. First order with matching id, or undefined.
function findOrder(orders, id) {
  // TODO: find
  return undefined;
}

// 4. True if every order is paid.
function allPaid(orders) {
  // TODO: every
  return false;
}

// 5. True if at least one order is unpaid.
function anyUnpaid(orders) {
  // TODO: some
  return false;
}

// 6. Map of customer name -> summed total, via one reduce.
function totalByCustomer(orders) {
  // TODO: reduce into an object
  return {};
}
`,

  exportNames: ["paidTotal", "bigSpenders", "findOrder", "allPaid", "anyUnpaid", "totalByCustomer"],

  requirements: [
    { pattern: /\.filter\s*\(/, message: "Use .filter() to select orders" },
    { pattern: /\.map\s*\(/, message: "Use .map() to project customer names" },
    { pattern: /\.reduce\s*\(/, message: "Use .reduce() to aggregate totals" },
    { pattern: /\.find\s*\(/, message: "Use .find() to locate an order by id" },
  ],

  tests: [
    {
      name: "paidTotal sums only paid orders",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Ada", total: 10, paid: true },
        ];
        expectEqual(x.paidTotal(orders), 50);
      },
    },
    {
      name: "paidTotal returns 0 for an empty array",
      run: (x) => expectEqual(x.paidTotal([]), 0),
    },
    {
      name: "bigSpenders keeps names at or above min",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Cy", total: 100, paid: true },
        ];
        expectDeepEqual(x.bigSpenders(orders, 40), ["Ada", "Cy"]);
      },
    },
    {
      name: "findOrder returns the matching order",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
        ];
        expectEqual(x.findOrder(orders, 2).customer, "Rob");
      },
    },
    {
      name: "findOrder returns undefined when nothing matches",
      run: (x) => expectEqual(x.findOrder([{ id: 1, customer: "Ada", total: 40, paid: true }], 99), undefined),
    },
    {
      name: "allPaid and anyUnpaid reflect the paid flags",
      run: (x) => {
        const mixed = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
        ];
        const clean = [{ id: 3, customer: "Cy", total: 10, paid: true }];
        expectEqual(x.allPaid(mixed), false);
        expectEqual(x.allPaid(clean), true);
        expectEqual(x.anyUnpaid(mixed), true);
        expectEqual(x.anyUnpaid(clean), false);
      },
    },
    {
      name: "totalByCustomer groups totals by name",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Ada", total: 10, paid: true },
        ];
        expectDeepEqual(x.totalByCustomer(orders), { Ada: 50, Rob: 25 });
      },
    },
  ],

  solution: `function paidTotal(orders) {
  return orders
    .filter((o) => o.paid)
    .reduce((sum, o) => sum + o.total, 0);
}

function bigSpenders(orders, min) {
  return orders
    .filter((o) => o.total >= min)
    .map((o) => o.customer);
}

function findOrder(orders, id) {
  return orders.find((o) => o.id === id);
}

function allPaid(orders) {
  return orders.every((o) => o.paid);
}

function anyUnpaid(orders) {
  return orders.some((o) => !o.paid);
}

function totalByCustomer(orders) {
  return orders.reduce((acc, o) => {
    acc[o.customer] = (acc[o.customer] || 0) + o.total;
    return acc;
  }, {});
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>JavaScript</th></tr>
  <tr><td>Map over an array</td><td><code>array_map(fn, $arr)</code></td><td><code>arr.map(fn)</code></td></tr>
  <tr><td>reduce accumulator</td><td>whatever you seed and return</td><td>whatever you seed and return</td></tr>
  <tr><td>find miss</td><td><code>array_filter</code> + <code>current</code> gives <code>false</code></td><td>silently <code>undefined</code></td></tr>
  <tr><td>reduce, no seed, empty array</td><td><code>array_reduce</code> returns <code>null</code></td><td>throws <code>TypeError</code> at runtime</td></tr>
  <tr><td>Grouping accumulator</td><td>an associative array</td><td>a plain <code>{}</code> object</td></tr>
</table>
<p>A few runtime edges are worth managing carefully. Always pass an initial
value to <code>reduce</code> — both to make the accumulator's shape obvious and
because <code>[].reduce((a, b) =&gt; a + b)</code> throws "Reduce of empty array
with no initial value," unlike PHP's <code>array_reduce</code>, which just hands
back the initial value (or <code>null</code>) when the array is empty. A
<code>find</code> that fails returns <code>undefined</code>, so reaching
straight into <code>.customer</code> on the result can blow up with "Cannot
read properties of undefined" — guard it, or use <code>?.</code>, much like you
would check the result of <code>array_filter</code> before indexing into it in
PHP. And each of <code>filter</code>/<code>map</code> allocates a fresh array,
just as <code>array_filter</code>/<code>array_map</code> do in PHP, so a long
chain over a huge list does more work than one fused loop; for the sizes in
everyday code the readability of the pipeline wins, but it is a real runtime
cost worth remembering.</p>`,
};
