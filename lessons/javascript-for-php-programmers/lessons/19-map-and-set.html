<div id="app"></div>
<script>
const LESSON = {
  number: 19,
  title: "Map & Set",

  intro: `
<p>PHP doesn't have a dedicated <code>Map</code> or <code>Set</code> class — you
reach for a single associative array and lean on it for both jobs: dictionary
lookups keyed by string or int, and membership checks by setting a truthy value
under each key you care about. JavaScript keeps those as two separate built-in
classes, <code>Map</code> and <code>Set</code>, and their real runtime behaviour
is genuinely different from both a PHP array and a plain JavaScript object.</p>
<table>
  <tr><th>PHP</th><th>JavaScript</th></tr>
  <tr><td><code>$counts = [];</code></td><td><code>new Map()</code></td></tr>
  <tr><td><code>$seen = [];</code> (used as a set)</td><td><code>new Set()</code></td></tr>
  <tr><td>keys coerced to <code>int</code> or <code>string</code></td><td><em>any</em> value can be a key</td></tr>
  <tr><td><code>$counts[$k] ?? null</code></td><td><code>map.get(k)</code>, undefined if absent</td></tr>
</table>
<p>Two runtime facts matter most. First, a <code>Map</code> key can be
<em>anything</em> — an object, a function, <code>NaN</code>, not just an int or
string like PHP array keys — whereas PHP coerces numeric-string, float, and bool
keys and refuses objects as keys outright. Second, a <code>Map</code> remembers
insertion order and reports its <code>size</code> directly, much like a PHP
array already does with <code>count($arr)</code>. A <code>Set</code> is the same
story for uniqueness: membership is O(1) and duplicates simply do not take,
the JavaScript equivalent of using array keys as a poor man's set in PHP.</p>`,

  php: `<?php
$counts = [];
$counts["go"] = ($counts["go"] ?? 0) + 1;

$seen = [];
$seen[1] = true;
$seen[1] = true; // no-op, key already set
count($seen); // 1`,

  task: `
<p>Build a few small utilities on top of <code>Map</code> and <code>Set</code>:</p>
<ol>
  <li><code>wordCount(text)</code> — split <code>text</code> on whitespace and
      return a <code>Map</code> from each word to how many times it appears.
      Assume words are already lowercased and clean; an empty string yields an
      empty Map.</li>
  <li><code>unique(arr)</code> — return a new array with duplicates removed,
      preserving first-seen order, using a <code>Set</code>.</li>
  <li><code>mostCommon(text)</code> — return the word with the highest count from
      <code>wordCount</code> (first one to reach that count wins on ties), or
      <code>null</code> for empty input.</li>
  <li><code>keyTypes(map)</code> — return a <code>Set</code> of the
      <code>typeof</code> string for every key in <code>map</code>
      (demonstrating that Map keys need not be strings).</li>
</ol>`,

  starter: `// 1. wordCount(text) -> Map<word, count>
function wordCount(text) {
  // TODO
  return new Map();
}

// 2. unique(arr) -> array with duplicates removed, order preserved
function unique(arr) {
  // TODO
  return [];
}

// 3. mostCommon(text) -> the most frequent word, or null if none
function mostCommon(text) {
  // TODO
  return null;
}

// 4. keyTypes(map) -> Set of typeof for each key
function keyTypes(map) {
  // TODO
  return new Set();
}
`,

  exportNames: ["wordCount", "unique", "mostCommon", "keyTypes"],

  requirements: [
    { pattern: /new\s+Map/, message: "Use a Map in wordCount" },
    { pattern: /new\s+Set/, message: "Use a Set in unique or keyTypes" },
    { pattern: /\.set\s*\(/, message: "Use Map.set to record counts" },
  ],

  tests: [
    {
      name: "wordCount counts repeats",
      run: (x) => {
        const m = x.wordCount("go go stop go");
        expectEqual(m.get("go"), 3);
        expectEqual(m.get("stop"), 1);
        expectEqual(m.size, 2);
      },
    },
    {
      name: "wordCount('') is an empty Map",
      run: (x) => {
        const m = x.wordCount("");
        expectEqual(m.size, 0);
        expectEqual(m.get("anything"), undefined);
      },
    },
    {
      name: "unique preserves first-seen order",
      run: (x) => expectDeepEqual(x.unique([3, 1, 3, 2, 1, 2]), [3, 1, 2]),
    },
    {
      name: "unique keeps distinct objects distinct",
      run: (x) => {
        const a = {}, b = {};
        expectEqual(x.unique([a, a, b]).length, 2);
      },
    },
    {
      name: "mostCommon picks the top word",
      run: (x) => expectEqual(x.mostCommon("a b a c a b"), "a"),
    },
    {
      name: "mostCommon('') is null",
      run: (x) => expectEqual(x.mostCommon(""), null),
    },
    {
      name: "keyTypes reports mixed key types",
      run: (x) => {
        const m = new Map();
        m.set("s", 1);
        m.set(42, 2);
        m.set({}, 3);
        const types = x.keyTypes(m);
        expectTruthy(types.has("string"));
        expectTruthy(types.has("number"));
        expectTruthy(types.has("object"));
        expectEqual(types.size, 3);
      },
    },
  ],

  solution: `function wordCount(text) {
  const counts = new Map();
  const words = text.split(/\\s+/).filter((w) => w.length > 0);
  for (const word of words) {
    counts.set(word, (counts.get(word) ?? 0) + 1);
  }
  return counts;
}

function unique(arr) {
  const seen = new Set();
  const out = [];
  for (const item of arr) {
    if (!seen.has(item)) {
      seen.add(item);
      out.push(item);
    }
  }
  return out;
}

function mostCommon(text) {
  const counts = wordCount(text);
  let best = null;
  let bestCount = 0;
  for (const [word, count] of counts) {
    if (count > bestCount) {
      best = word;
      bestCount = count;
    }
  }
  return best;
}

function keyTypes(map) {
  const types = new Set();
  for (const key of map.keys()) {
    types.add(typeof key);
  }
  return types;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP array</th><th>JavaScript Map / Set</th></tr>
  <tr><td>Any-typed keys</td><td>keys coerced to <code>int</code> or <code>string</code>; objects not allowed as keys</td><td><code>map.set(obj, v)</code> keeps identity</td></tr>
  <tr><td>Size</td><td><code>count($arr)</code></td><td><code>map.size</code> / <code>set.size</code></td></tr>
  <tr><td>Membership</td><td><code>array_key_exists($k, $arr)</code></td><td><code>map.has(k)</code> / <code>set.has(v)</code></td></tr>
  <tr><td>Iteration order</td><td>insertion order, always</td><td>strict insertion order</td></tr>
  <tr><td>Dedupe</td><td><code>array_unique($arr)</code> (string comparison, reindexes)</td><td><code>[...new Set(arr)]</code> (identity-based, order preserved)</td></tr>
</table>
<p>A <code>Map</code> uses SameValueZero for key equality, so <code>NaN</code>
works as a key (unlike <code>===</code>) but <code>{}</code> and a different
<code>{}</code> are distinct keys because objects compare by identity. That is
exactly why <code>unique([{}, {}])</code> keeps both — the Set sees two different
references. This is a genuine upgrade over PHP arrays, where a key must be an
<code>int</code> or <code>string</code> — passing an object as an array key
throws a <code>TypeError</code>, and reaching for object identity as a key
normally means <code>SplObjectStorage</code> instead.</p>
<p>Prefer <code>Map</code> over a plain object when keys are dynamic, non-string,
or you care about size and order; prefer <code>Set</code> over an array when you
need fast membership or dedupe. Reach back for objects and arrays when you want
JSON serialization or a fixed, known shape — <code>JSON.stringify</code>, much
like PHP's <code>json_encode</code>, ignores Map and Set contents entirely and
silently serializes a <code>Map</code> as <code>{}</code>.</p>`,
};
