<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lesson 5: Functions</title>
<link rel="stylesheet" href="../../../shared/css/style.css">
</head>
<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>PHP lets you write type hints on parameters and return values, and the
engine enforces them at call time. JavaScript has no such thing — a function
is just a value, and its "signature" is whatever it happens to do with
whatever it happens to receive. This lesson is about the three ways to make a
function, plus the two parameter forms you reach for most: defaults and rest.</p>
<table>
  <tr><th>PHP</th><th>JavaScript</th></tr>
  <tr><td><code>function add(int $a, int $b): int {}</code></td><td><code>function add(a, b) {}</code></td></tr>
  <tr><td><code>$double = fn(int $n): int =&gt; $n * 2;</code></td><td><code>const double = (n) =&gt; n * 2;</code></td></tr>
  <tr><td><code>function greet(string $name = "friend") {}</code></td><td><code>function greet(name = "friend") {}</code></td></tr>
  <tr><td><code>function sum(int ...$xs): int {}</code></td><td><code>function sum(...xs) {}</code></td></tr>
</table>
<p>All three forms — declarations, function expressions, and arrow functions —
produce a callable value you can pass around, return, and store, much like
PHP's named functions, anonymous functions, and arrow (<code>fn</code>)
functions. The runtime details differ from PHP in ways that matter: JavaScript
declarations <em>hoist</em> (you can call them before their line, unlike PHP
functions defined conditionally), arrow functions have no <code>this</code>
or <code>arguments</code> of their own (PHP's <code>fn</code> closures capture
<code>$this</code> automatically, and PHP has no <code>arguments</code>
equivalent at all), and a default only kicks in when the argument is
<code>undefined</code> — never for <code>null</code>, never for <code>0</code>
or <code>""</code>, whereas PHP's defaults only kick in when the argument is
omitted entirely.</p>`,

  php: `<?php
function add(int $a, int $b): int {
  return $a + $b;
}

$double = fn(int $n): int => $n * 2;

function greet(string $name = "friend"): string {
  return "Hi, $name";
}

function sum(int ...$xs): int {
  return array_sum($xs);
}`,

  task: `
<p>Write the plain-JavaScript versions — no type hints anywhere:</p>
<ol>
  <li>A function declaration <code>add(a, b)</code> that returns their sum.</li>
  <li>An arrow function stored in a <code>const double</code> that returns
      <code>n * 2</code>.</li>
  <li><code>greet(name)</code> with a <em>default parameter</em> of
      <code>"friend"</code>, returning a string like <code>"Hi, Ada"</code>.</li>
  <li><code>sum(...xs)</code> using a <em>rest parameter</em> that returns the
      total of every argument (<code>0</code> when called with none).</li>
</ol>`,

  starter: `// 1. declaration: add(a, b) -> a + b
function add(a, b) {
  // TODO
  return 0;
}

// 2. arrow function: double(n) -> n * 2
const double = (n) => {
  // TODO
  return 0;
};

// 3. default parameter: greet(name = "friend") -> "Hi, <name>"
function greet(name) {
  // TODO
  return "";
}

// 4. rest parameter: sum(...xs) -> total of all arguments
function sum() {
  // TODO
  return 0;
}
`,

  exportNames: ["add", "double", "greet", "sum"],

  requirements: [
    { pattern: /const\s+double\s*=\s*\(?\s*n\s*\)?\s*=>/, message: "Define double as an arrow function" },
    { pattern: /function\s+greet\s*\(\s*name\s*=\s*["']friend["']\s*\)/, message: "Give greet a default parameter of \"friend\"" },
    { pattern: /function\s+sum\s*\(\s*\.\.\.[A-Za-z_$][\w$]*\s*\)/, message: "Use a rest parameter in sum" },
  ],

  tests: [
    { name: "add(2, 3) is 5", run: (x) => expectEqual(x.add(2, 3), 5) },
    { name: "double(21) is 42", run: (x) => expectEqual(x.double(21), 42) },
    { name: 'greet("Ada") is "Hi, Ada"', run: (x) => expectEqual(x.greet("Ada"), "Hi, Ada") },
    { name: 'greet() falls back to "Hi, friend"', run: (x) => expectEqual(x.greet(), "Hi, friend") },
    { name: "sum() with no args is 0", run: (x) => expectEqual(x.sum(), 0) },
    { name: "sum(1, 2, 3, 4) is 10", run: (x) => expectEqual(x.sum(1, 2, 3, 4), 10) },
    { name: "double is a function value", run: (x) => expectEqual(typeof x.double, "function") },
  ],

  solution: `function add(a, b) {
  return a + b;
}

const double = (n) => n * 2;

function greet(name = "friend") {
  return \`Hi, \${name}\`;
}

function sum(...xs) {
  return xs.reduce((total, x) => total + x, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>JavaScript</th></tr>
  <tr><td>Declaration</td><td><code>function add(int $a, int $b): int</code></td><td><code>function add(a, b)</code> (hoisted)</td></tr>
  <tr><td>Arrow expression</td><td><code>$f = fn(int $n): int =&gt; $n * 2;</code></td><td><code>const f = (n) =&gt; n * 2</code> (not hoisted)</td></tr>
  <tr><td>Default param</td><td><code>string $name = "friend"</code></td><td><code>name = "friend"</code></td></tr>
  <tr><td>Rest/variadic param</td><td><code>int ...$xs</code> (an array)</td><td><code>...xs</code> (a real array)</td></tr>
  <tr><td>Missing type hint</td><td>allowed; no check</td><td>no such thing — silently <code>undefined</code></td></tr>
</table>
<p>Two runtime gotchas that PHP handles differently. First, JavaScript defaults
trigger only on <code>undefined</code>: <code>greet(null)</code> returns
<code>"Hi, null"</code>, not <code>"Hi, friend"</code> — PHP's defaults instead
trigger only when the argument is omitted, and passing <code>null</code>
explicitly to a non-nullable hint would raise a <code>TypeError</code>.
Second, a rest parameter is a genuine <code>Array</code> — you can call
<code>.reduce</code>, <code>.map</code>, or <code>.length</code> on it
directly, the same way PHP's <code>...$xs</code> collects into a real array
you could pass to <code>array_sum()</code>. And because arrow functions
capture no <code>this</code> of their own (unlike a PHP <code>fn</code>
closure, which automatically captures <code>$this</code> from its enclosing
scope), they are the idiomatic choice for the little callbacks you hand to
array methods.</p>`,
};
</script>

</body>
</html>
