  number: 17,
  title: "Async & Await",

  intro: `
<p>PHP has no built-in promise type and no <code>async</code>/<code>await</code>
keywords — function calls run synchronously, top to bottom, and "concurrency"
usually means reaching for <code>pcntl_fork()</code>, a queue worker, or a
library like ReactPHP that layers an event loop and promises on top. Recent
ReactPHP versions add <code>React\\Async\\async()</code> and
<code>React\\Async\\await()</code>, built on PHP 8.1 Fibers, which read a lot
like JavaScript's syntax — but it is still a library convention, not a language
feature. JavaScript bakes the concept straight into the language: an
<code>async</code> function always returns a promise, and <code>await</code>
pauses that function (without blocking the rest of the program) until the
promise settles, handing you back whatever value it resolves to — number,
string, object, or <code>undefined</code>.</p>
<table>
  <tr><th>PHP</th><th>JavaScript</th></tr>
  <tr><td><code>async(fn () =&gt; $n * 2)()</code> returns a <code>PromiseInterface</code></td><td><code>async function f()</code></td></tr>
  <tr><td><code>$n = await($promise);</code></td><td><code>const n = await f();</code></td></tr>
  <tr><td><code>React\\Promise\\all([$a, $b])</code></td><td><code>Promise.all([a, b])</code></td></tr>
  <tr><td><code>catch (\\Throwable $e)</code> — must name a type</td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today. First, <code>await</code> in sequence is
<em>serial</em>: each line waits for the previous promise to settle before the next
even starts — much like calling one PHP function after another. To run
independent work concurrently you hand the promises to <code>Promise.all</code>,
which waits for all of them and resolves to an array of their results, the rough
JavaScript counterpart of <code>React\\Promise\\all()</code> fanning several
promises out and collecting every value. Second, a rejected promise surfaces as
a thrown value at the <code>await</code>, so a plain <code>try/catch</code>
catches it — much like PHP's own <code>try/catch</code> — and if you do not
catch it, it propagates out of your <code>async</code> function as a rejected
promise the caller must handle.</p>`,

  php: `<?php
use function React\\Async\\async;
use function React\\Async\\await;
use function React\\Promise\\all;

function double(int $n): PromiseInterface {
    return async(fn () => $n * 2)();
}

function sumDoubled(int $a, int $b): PromiseInterface {
    return async(function () use ($a, $b) {
        [$x, $y] = await(all([double($a), double($b)]));
        return $x + $y;
    })();
}

function safeDouble(int $n): PromiseInterface {
    return async(function () use ($n) {
        try {
            return await(double($n));
        } catch (\\Throwable $e) {
            return 0;
        }
    })();
}`,

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>JavaScript</th></tr>
  <tr><td>Return of async fn</td><td>a <code>PromiseInterface</code> (from ReactPHP); plain functions just return a value</td><td>a promise; contents unlabeled</td></tr>
  <tr><td>Awaited value</td><td><code>await($promise)</code> pauses the current Fiber until it settles</td><td>whatever it settles to</td></tr>
  <tr><td>Serial awaits</td><td>one <code>await()</code> call, then the next — each pauses the fiber in turn</td><td>b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td><code>React\\Promise\\all([...])</code></td><td><code>Promise.all([...])</code>; resolves to a results array</td></tr>
  <tr><td>Caught rejection</td><td><code>catch (\\Throwable $e)</code> — must declare a type</td><td><code>catch (e)</code> — any thrown value</td></tr>
</table>
<p>The most common runtime performance bug in either language: awaiting
independent work in a loop or in sequence when it could run concurrently. Two
serial <code>await</code>s take as long as the sum of both promises;
<code>Promise.all</code> takes as long as the slowest one. Reach for
<code>Promise.all</code> whenever the tasks do not depend on each other — the
same instinct that leads a PHP programmer using ReactPHP to fan work out with
<code>React\\Promise\\all()</code> instead of awaiting one promise after
another.</p>
<p>On errors: a rejected promise becomes a thrown value at its <code>await</code>.
If nothing catches it, your <code>async</code> function returns a
<em>rejected</em> promise — the failure propagates to whoever awaits you, much
like an uncaught exception unwinding the call stack in PHP. Unlike PHP's
<code>catch (\\Throwable $e)</code>, which forces you to name a type,
JavaScript's <code>catch (e)</code> carries no type annotation at all — it must
be ready for anything: an <code>Error</code>, a string, even
<code>undefined</code>.</p>`,
