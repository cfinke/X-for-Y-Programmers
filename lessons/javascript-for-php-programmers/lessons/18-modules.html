<div id="app"></div>
<script>
const LESSON = {
  number: 18,
  title: "Modules",

  intro: `
<p>PHP has no built-in concept of a file as a module. A <code>.php</code> file
is just text that gets pulled in with <code>require</code>/<code>include</code>,
and the things worth reusing — classes, functions, constants — are made
reachable with <code>namespace</code> and <code>use</code>, resolved at runtime
by a Composer autoloader. JavaScript's ES modules fold all of that into the
language itself: <code>export</code> and <code>import</code> are syntax the
engine understands directly, one file is automatically one module, and there is
no separate autoload-mapping step to keep in sync with your directory layout.</p>
<table>
  <tr><th>PHP</th><th>JavaScript (runtime)</th></tr>
  <tr><td><code>const TAX = 0.1;</code> (namespaced global)</td><td><code>export const TAX = 0.1;</code></td></tr>
  <tr><td><code>interface Cart { ... }</code></td><td>no equivalent — JS has no interfaces</td></tr>
  <tr><td><code>use App\\Cart;</code></td><td><code>import { Cart } from "./m.js";</code></td></tr>
  <tr><td>one class per file, autoloaded by name</td><td><code>export default function total() {}</code></td></tr>
</table>
<p>The mental shift: a named export is a <em>value</em> you name, and the
default export is just the one binding the module hands back when you import it
without braces. PHP has nothing quite like a default export — the closest
analogue is "the one class this file is named after" — but in JavaScript it is
just a property named <code>default</code> on the module object, nothing more
magical than that.</p>`,

  php: `<?php
const TAX_RATE = 0.1;

function addTax(int $cents): int {
    return (int) round($cents * (1 + TAX_RATE));
}

function formatUSD(int $cents): string {
    return "$" . number_format($cents / 100, 2);
}

// the file's "main" value -- there's no true default export in PHP,
// so callers just require the file and call total() directly
function total(array $items): int {
    return array_sum($items);
}`,

  task: `
<p>Build a tiny pricing module using plain-JavaScript exports. Export every
symbol directly, and give the module one default export:</p>
<ol>
  <li><strong>Named const export</strong>: <code>TAX_RATE</code> = <code>0.1</code>.</li>
  <li><strong>Named function export</strong>: <code>addTax(cents)</code> returns
      the price with tax added, rounded to a whole number of cents
      (<code>Math.round(cents * (1 + TAX_RATE))</code>).</li>
  <li><strong>Named function export</strong>: <code>formatUSD(cents)</code>
      returns a string like <code>"$12.34"</code> (dollars with two decimals).</li>
  <li><strong>Default export</strong>: <code>total(items)</code>, a function that
      sums an array of cent amounts and returns the total (<code>0</code> for an
      empty array). Export it with <code>export default</code>.</li>
</ol>`,

  starter: `// 1. named const export
export const TAX_RATE = 0.1;

// 2. named function export: price with tax, rounded to whole cents
export function addTax(cents) {
  // TODO
  return 0;
}

// 3. named function export: cents -> "$12.34"
export function formatUSD(cents) {
  // TODO
  return "";
}

// 4. default export: sum an array of cent amounts
export default function total(items) {
  // TODO
  return 0;
}
`,

  exportNames: ["TAX_RATE", "addTax", "formatUSD", "total"],

  requirements: [
    { pattern: /export\s+const\s+TAX_RATE/, message: "Use a named const export for TAX_RATE" },
    { pattern: /export\s+function\s+addTax/, message: "Use a named function export for addTax" },
    { pattern: /export\s+default/, message: "Use export default for total" },
  ],

  tests: [
    { name: "TAX_RATE is 0.1", run: (x) => expectEqual(x.TAX_RATE, 0.1) },
    { name: "addTax(100) is 110", run: (x) => expectEqual(x.addTax(100), 110) },
    { name: "addTax(199) rounds to 219", run: (x) => expectEqual(x.addTax(199), 219) },
    { name: 'formatUSD(1234) is "$12.34"', run: (x) => expectEqual(x.formatUSD(1234), "$12.34") },
    { name: 'formatUSD(500) is "$5.00"', run: (x) => expectEqual(x.formatUSD(500), "$5.00") },
    { name: "default export total sums the array", run: (x) => expectEqual(x.total([100, 200, 300]), 600) },
    { name: "default export total([]) is 0", run: (x) => expectEqual(x.total([]), 0) },
  ],

  solution: `export const TAX_RATE = 0.1;

export function addTax(cents) {
  return Math.round(cents * (1 + TAX_RATE));
}

export function formatUSD(cents) {
  return "$" + (cents / 100).toFixed(2);
}

export default function total(items) {
  return items.reduce((sum, cents) => sum + cents, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Named export</td><td><code>const x = 1;</code> + <code>namespace</code></td><td><code>export const x = 1;</code></td></tr>
  <tr><td>Default export</td><td>no equivalent — one class/file, by convention</td><td>becomes the <code>default</code> binding</td></tr>
  <tr><td>Sharing a type</td><td><code>interface Cart { ... }</code></td><td>no equivalent — JS has no interfaces</td></tr>
  <tr><td>Pulling in a symbol</td><td><code>use App\\Cart;</code></td><td><code>import { Cart } from "./m.js";</code></td></tr>
  <tr><td>Import a default</td><td><code>require "m.php";</code> then call by name</td><td><code>import fn from "./m.js";</code></td></tr>
</table>
<p>A default export is not a special kind of value — it is exposed under the name
<code>default</code>, which is exactly why <code>import Something from "./m.js"</code>
(no braces) grabs it and lets you rename it freely, while named imports must
match the exported name inside braces. PHP has no built-in notion of "this file's
main export" the way a default export captures it; the closest habit is naming
the file after the one class it defines and autoloading that class by convention.
At runtime, a JavaScript module is just an object of live value bindings — no
autoloader, no namespace-to-path mapping, no more magic than that.</p>`,
};
</script>
