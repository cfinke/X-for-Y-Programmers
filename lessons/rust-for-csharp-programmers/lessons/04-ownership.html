<div id="app"></div>
<script>
const LESSON = {
  number: 4,
  title: "Ownership & Moves",

  intro: `
<p>This is the lesson with no C# equivalent — the one that replaces the
garbage collector. In C#, reference types are shared freely:
<code>var b = a;</code> gives you two variables pointing at one
<code>List</code>, mutations through either are visible through both, and the
GC frees the object <em>eventually</em>. Deterministic cleanup is a bolt-on:
<code>IDisposable</code> and <code>using</code>, which work only when
everyone remembers to use them.</p>
<table>
  <tr><th>C#</th><th>Rust</th></tr>
  <tr><td><code>var b = a;</code> — two references, one object</td><td><code>let b = a;</code> — <strong>move</strong>: <code>a</code> is dead now</td></tr>
  <tr><td>GC frees memory eventually</td><td>value dropped at end of owner's scope, deterministically</td></tr>
  <tr><td><code>using</code> / <code>IDisposable</code> (opt-in)</td><td>built in — every value gets Dispose-like cleanup</td></tr>
  <tr><td><code>new List&lt;int&gt;(a)</code> — explicit copy</td><td><code>a.clone()</code> — explicit deep copy</td></tr>
  <tr><td><code>int</code>, <code>double</code> copied on assignment</td><td>same: <code>Copy</code> types are exempt from moves</td></tr>
</table>
<p>Rust's rule: every value has exactly <strong>one owner</strong>.
Assignment (and passing by value) <em>moves</em> ownership — after
<code>let b = a;</code>, using <code>a</code> is a <em>compile error</em>,
not a runtime surprise. When the owner goes out of scope, the value is
dropped right there — imagine <code>using</code> semantics applied to every
value in the language, enforced by the compiler instead of convention.
Want two independent copies? Say so: <code>a.clone()</code> is an explicit
deep copy, visible in the code the way an allocation ought to be. Simple
scalar types (<code>i32</code>, <code>f64</code>, <code>bool</code>) are
<code>Copy</code> and exempt — they duplicate on assignment exactly like C#
value types, which is why the earlier lessons never tripped over this.</p>`,

  csharp: `var a = new List<int> { 1, 2, 3 };
var b = a;                    // two variables, ONE list
b.Add(4);
Console.WriteLine(a.Count);   // 4 -- aliasing surprise

// The GC reclaims the list... at some point.
// Deterministic cleanup is opt-in via IDisposable:
using (var file = File.OpenText("data.txt"))
{
    Console.WriteLine(file.ReadLine());
}   // Dispose() runs here -- because you remembered "using"

// A genuinely independent copy must be spelled out:
var c = new List<int>(a);
c.Add(5);
Console.WriteLine(a.Count);   // still 4`,

  task: `
<p>Work with values that move:</p>
<ol>
  <li><code>consume_and_shout</code>: takes <code>s: String</code>
      <em>by value</em> — the function becomes the owner and the caller's
      variable is dead afterward — and returns a new <code>String</code>: the
      input uppercased with <code>"!!!"</code> appended, so
      <code>consume_and_shout(String::from("hi"))</code> is
      <code>"HI!!!"</code>.</li>
  <li><code>keep_both</code>: takes <code>v: Vec&lt;i32&gt;</code> and returns
      a tuple <code>(Vec&lt;i32&gt;, Vec&lt;i32&gt;)</code>: the original
      vector untouched, and a <code>.clone()</code> of it with one extra
      element — <code>0</code> — pushed onto the end with
      <code>.push()</code>. Careful with the order: clone <em>before</em> you
      give <code>v</code> away, because returning it moves it.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. consume_and_shout takes ownership of s (String, not &str).
//    Return the uppercased text with "!!!" appended.
fn consume_and_shout(s: String) -> String {
    todo!()
}

// 2. keep_both: return (original, clone-with-0-pushed).
//    Clone first -- once you move v into the return tuple,
//    it's gone.
fn keep_both(v: Vec<i32>) -> (Vec<i32>, Vec<i32>) {
    todo!()
}
`,

  requirements: [
    { pattern: /\.clone\(\)/, message: "Use .clone() to make an explicit copy of the vector" },
    { pattern: /\.push\(/, message: "Use .push() to add the extra element to the clone" },
  ],

  tests: [
    { name: 'consume_and_shout("hi") returns "HI!!!"',
      code: 'assert_eq!(consume_and_shout(String::from("hi")), "HI!!!");' },
    { name: 'consume_and_shout("rust owns this") returns "RUST OWNS THIS!!!"',
      code: 'assert_eq!(consume_and_shout(String::from("rust owns this")), "RUST OWNS THIS!!!");' },
    { name: "keep_both([1, 2, 3]) returns the original and an extended clone",
      code: "assert_eq!(keep_both(vec![1, 2, 3]), (vec![1, 2, 3], vec![1, 2, 3, 0]));" },
    { name: "keep_both([]) leaves the original empty and the clone with just the 0",
      code: "assert_eq!(keep_both(vec![]), (vec![], vec![0]));" },
    { name: "the clone is independent of the original",
      code: "let (original, extended) = keep_both(vec![7]);\nassert_eq!(original, vec![7]);\nassert_eq!(extended, vec![7, 0]);" },
  ],

  solution: `fn consume_and_shout(s: String) -> String {
    format!("{}!!!", s.to_uppercase())
}

fn keep_both(v: Vec<i32>) -> (Vec<i32>, Vec<i32>) {
    let mut extended = v.clone();
    extended.push(0);
    (v, extended)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Rust</th></tr>
  <tr><td>Assignment of a heap value</td><td>copies the reference — both alive, aliased</td><td>moves ownership — source is dead (compile-checked)</td></tr>
  <tr><td>Who frees memory</td><td>the GC, eventually</td><td>the owner's scope end, deterministically (<code>Drop</code>)</td></tr>
  <tr><td>Deterministic cleanup</td><td><code>using</code> + <code>IDisposable</code>, opt-in</td><td>built into every value</td></tr>
  <tr><td>Deep copy</td><td><code>new List&lt;int&gt;(a)</code></td><td><code>a.clone()</code></td></tr>
  <tr><td>Exempt types</td><td>value types (<code>int</code>, structs)</td><td><code>Copy</code> types (<code>i32</code>, <code>f64</code>, <code>bool</code>…)</td></tr>
</table>
<p>The mental flip: C# answers "who cleans this up?" at <em>runtime</em> with
a GC and answers "who may mutate this?" not at all — aliasing bugs like the
<code>b.Add(4)</code> surprise are yours to find. Rust answers both at
<em>compile time</em> with one concept. Passing a <code>String</code> or
<code>Vec</code> to a function moves it too, which felt drastic until this
exercise — and it's why the next lesson exists: borrowing lets functions
<em>look at</em> a value without taking it.</p>`,
};
