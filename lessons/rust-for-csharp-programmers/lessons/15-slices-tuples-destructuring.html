const LESSON = {
  number: 15,
  title: "Slices, Tuples & Destructuring",

  intro: `
<p>C# value tuples map directly onto Rust tuples:
<code>(double, double)</code> becomes <code>(f64, f64)</code>, and the
positional accessors are <code>.0</code> and <code>.1</code> instead of
<code>.Item1</code> and <code>.Item2</code>. Deconstruction carries over
almost keystroke-for-keystroke — <code>var (x, y) = point;</code> becomes
<code>let (x, y) = point;</code> — except Rust needs no
<code>Deconstruct</code> method: destructuring is built into
<code>let</code> for tuples, structs, everything. Even the party trick
survives: <code>(a, b) = (b, a);</code> swaps two variables in both
languages.</p>
<table>
  <tr><th>C#</th><th>Rust</th></tr>
  <tr><td><code>(double, double) point = (3.0, 4.0);</code></td><td><code>let point: (f64, f64) = (3.0, 4.0);</code></td></tr>
  <tr><td><code>point.Item1</code> / <code>point.Item2</code></td><td><code>point.0</code> / <code>point.1</code></td></tr>
  <tr><td><code>var (x, y) = point;</code> (needs <code>Deconstruct</code> for your own types)</td><td><code>let (x, y) = point;</code> (built in, works on anything)</td></tr>
  <tr><td><code>(a, b) = (b, a);</code></td><td><code>(a, b) = (b, a);</code> — identical</td></tr>
  <tr><td><code>ReadOnlySpan&lt;int&gt;</code> (ref struct, restricted)</td><td><code>&amp;[i32]</code> — same idea, no special rules</td></tr>
</table>
<p>The other star of this lesson you've been using since lesson 6:
<code>&amp;[T]</code>, the slice. It's Rust's
<code>ReadOnlySpan&lt;T&gt;</code> — a borrowed view into someone else's
contiguous memory (an array, a <code>Vec</code>, part of either) with a
pointer and a length, no copy. But where C# quarantines spans with
ref-struct restrictions — no fields, no async, no boxing — a slice is an
ordinary type. Store it in a struct, return it, iterate it. The borrow
checker provides the use-after-free safety that C# enforces with the
ref-struct straitjacket, so the type doesn't need one.</p>`,

  csharp: `(int, int) Swap((int, int) pair)
{
    var (a, b) = pair;         // deconstruction
    return (b, a);
}

double Distance((double, double) p, (double, double) q)
{
    var (x1, y1) = p;
    var (x2, y2) = q;
    return Math.Sqrt(Math.Pow(x2 - x1, 2) + Math.Pow(y2 - y1, 2));
}

// ReadOnlySpan<int>: a borrowed view -- Rust's &[i32],
// minus the ref-struct restrictions.
(int, int) Ends(ReadOnlySpan<int> v) => (v[0], v[^1]);

Console.WriteLine(Distance((0, 0), (3, 4)));  // 5`,

  task: `
<p>Port the three functions:</p>
<ol>
  <li><code>swap(pair: (i32, i32)) -&gt; (i32, i32)</code> — return the pair
      with its elements exchanged. Destructure with
      <code>let (a, b) = pair;</code>, return <code>(b, a)</code>.</li>
  <li><code>distance(p: (f64, f64), q: (f64, f64)) -&gt; f64</code> — the
      Euclidean distance between two points. Destructure both tuples with
      <code>let (x, y)</code> bindings; <code>Math.Sqrt</code> and
      <code>Math.Pow</code> become methods on the number itself:
      <code>(dx * dx + dy * dy).sqrt()</code>.</li>
  <li><code>ends(v: &amp;[i32]) -&gt; (i32, i32)</code> — the first and last
      elements as a tuple. <code>v[0]</code> works as in C#; the last index
      is <code>v.len() - 1</code> (no <code>[^1]</code> sugar). Assume the
      slice is non-empty.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. swap: destructure with let (a, b) = pair; return (b, a).
fn swap(pair: (i32, i32)) -> (i32, i32) {
    todo!()
}

// 2. distance: let (x1, y1) = p; let (x2, y2) = q;
//    Math.Sqrt(x) -> x.sqrt()  (methods live on the number itself)
fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    todo!()
}

// 3. ends: first and last of a borrowed slice (Rust's ReadOnlySpan).
//    Last index is v.len() - 1. Assume non-empty.
fn ends(v: &[i32]) -> (i32, i32) {
    todo!()
}
`,

  requirements: [
    { pattern: /\(\s*f64\s*,\s*f64\s*\)/, message: "distance should take (f64, f64) tuples — C#'s (double, double)" },
    { pattern: /let\s*\(/, message: "Destructure a tuple with a let ( ... ) binding" },
    { pattern: /&\[i32\]/, message: "ends should borrow a slice: &[i32]" },
  ],

  tests: [
    { name: "swap((1, 2)) returns (2, 1)",
      code: "assert_eq!(swap((1, 2)), (2, 1));" },
    { name: "swap((-3, 7)) returns (7, -3)",
      code: "assert_eq!(swap((-3, 7)), (7, -3));" },
    { name: "distance((0.0, 0.0), (3.0, 4.0)) is exactly 5.0 (the 3-4-5 triangle)",
      code: "assert_eq!(distance((0.0, 0.0), (3.0, 4.0)), 5.0);" },
    { name: "distance((1.0, 1.0), (1.0, 1.0)) is 0.0",
      code: "assert_eq!(distance((1.0, 1.0), (1.0, 1.0)), 0.0);" },
    { name: "ends(&[10, 20, 30]) returns (10, 30)",
      code: "assert_eq!(ends(&[10, 20, 30]), (10, 30));" },
    { name: "ends(&[42]) returns (42, 42)",
      code: "assert_eq!(ends(&[42]), (42, 42));" },
  ],

  solution: `fn swap(pair: (i32, i32)) -> (i32, i32) {
    let (a, b) = pair;
    (b, a)
}

fn distance(p: (f64, f64), q: (f64, f64)) -> f64 {
    let (x1, y1) = p;
    let (x2, y2) = q;
    let dx = x2 - x1;
    let dy = y2 - y1;
    (dx * dx + dy * dy).sqrt()
}

fn ends(v: &[i32]) -> (i32, i32) {
    (v[0], v[v.len() - 1])
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Rust</th></tr>
  <tr><td>Tuple type</td><td><code>(double, double)</code></td><td><code>(f64, f64)</code></td></tr>
  <tr><td>Positional access</td><td><code>t.Item1</code>, <code>t.Item2</code></td><td><code>t.0</code>, <code>t.1</code></td></tr>
  <tr><td>Deconstruction</td><td><code>var (x, y) = point;</code> (via <code>Deconstruct</code>)</td><td><code>let (x, y) = point;</code> (built into patterns)</td></tr>
  <tr><td>Swap</td><td><code>(a, b) = (b, a);</code></td><td><code>(a, b) = (b, a);</code></td></tr>
  <tr><td>Borrowed view</td><td><code>ReadOnlySpan&lt;T&gt;</code> / <code>Span&lt;T&gt;</code> (ref structs)</td><td><code>&amp;[T]</code> / <code>&amp;mut [T]</code> (ordinary types)</td></tr>
  <tr><td>Last element</td><td><code>v[^1]</code></td><td><code>v[v.len() - 1]</code>, or <code>v.last()</code> → <code>Option&lt;&amp;T&gt;</code></td></tr>
  <tr><td>Math helpers</td><td><code>Math.Sqrt(x)</code>, <code>Math.Pow(x, 2)</code></td><td><code>x.sqrt()</code>, <code>x.powi(2)</code> — methods on the value</td></tr>
</table>
<p>The unifying idea: <code>let (x, y) = point;</code> isn't a special
tuple feature, it's the same pattern language <code>match</code> uses,
available everywhere a value gets bound — <code>let</code>, function
parameters, <code>for</code> loops, <code>if let</code>. C# bolted
deconstruction on via a magic <code>Deconstruct</code> method; in Rust,
patterns are the primitive and destructuring falls out for free. And note
which functions here <em>borrow</em>: <code>ends</code> takes
<code>&amp;[i32]</code> so callers keep their data — the same
zero-copy discipline <code>ReadOnlySpan</code> brought to modern C# APIs,
but as the everyday default rather than a performance specialty.</p>`,
};
