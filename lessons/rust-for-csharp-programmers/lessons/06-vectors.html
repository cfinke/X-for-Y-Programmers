const LESSON = {
  number: 6,
  title: "Vectors",

  intro: `
<p>After a decade of <code>List&lt;T&gt;</code>, <code>Vec&lt;T&gt;</code> will feel
like home — a growable, contiguous, generic list. The literal syntax is even
nicer: <code>vec![10, 20, 30]</code> replaces
<code>new List&lt;int&gt; { 10, 20, 30 }</code>. The twist is mutability: in C#
every <code>List&lt;T&gt;</code> is mutable unless you reach for
<code>IReadOnlyList&lt;T&gt;</code>. Rust flips that default — a
<code>Vec</code> bound with plain <code>let</code> is frozen, and
<code>.push</code> only exists once you write <code>let mut</code>. It is as
if every collection were readonly unless declared otherwise.</p>
<table>
  <tr><th>C#</th><th>Rust</th></tr>
  <tr><td><code>new List&lt;int&gt; { 1, 2, 3 }</code></td><td><code>vec![1, 2, 3]</code></td></tr>
  <tr><td><code>list.Add(4)</code></td><td><code>v.push(4)</code> (needs <code>let mut v</code>)</td></tr>
  <tr><td><code>list.Count</code></td><td><code>v.len()</code></td></tr>
  <tr><td><code>list[100]</code> → throws <code>ArgumentOutOfRangeException</code></td><td><code>v.get(100)</code> → returns <code>None</code></td></tr>
  <tr><td><code>foreach (var x in list)</code></td><td><code>for x in &amp;v</code></td></tr>
</table>
<p>Out-of-range access changes character too: <code>list[100]</code> throws an
<code>ArgumentOutOfRangeException</code> at runtime, and Rust's <code>v[100]</code>
likewise panics — but <code>v.get(100)</code> returns an <code>Option</code>, so
"maybe missing" is in the type instead of in a try/catch. Iteration is
<code>for x in &amp;v</code>: the <code>&amp;</code> borrows the vector the way
<code>foreach</code> implicitly does, rather than consuming it. And a function
that only reads a list takes <code>&amp;[i32]</code> — a slice, Rust's
<code>IReadOnlyList</code> analog that also accepts arrays for free.</p>`,

  csharp: `var scores = new List<int> { 10, 20, 30 };
scores.Add(40);
Console.WriteLine(scores.Count);      // 4

// Past the end: an exception at runtime.
// var x = scores[100];               // ArgumentOutOfRangeException

int total = 0;
foreach (var s in scores)
{
    total += s;
}
Console.WriteLine(total);             // 100

void Append(List<int> list, int x) => list.Add(x);  // any List is mutable`,

  task: `
<p>Recreate the C# list workflow with <code>Vec</code>:</p>
<ol>
  <li>Write <code>make_scores</code> returning a <code>Vec&lt;i32&gt;</code>
      containing <code>10, 20, 30</code> — use the <code>vec![]</code>
      literal, not repeated pushes.</li>
  <li>Write <code>append</code> taking <code>v: &amp;mut Vec&lt;i32&gt;</code>
      and <code>x: i32</code>, and push <code>x</code> onto the end. Note that
      unlike <code>List&lt;T&gt;.Add</code>, the permission to mutate is spelled
      out in the parameter type.</li>
  <li>Write <code>total</code> taking <code>v: &amp;[i32]</code> and returning
      the <code>i32</code> sum — one line with
      <code>v.iter().sum()</code>, the LINQ <code>.Sum()</code> of Rust.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. make_scores: return a Vec<i32> with 10, 20, 30.
//    C#: new List<int> { 10, 20, 30 }  ->  Rust: vec![...]
fn make_scores() -> Vec<i32> {
    todo!()
}

// 2. append: push x onto the end of v.
//    The &mut in the parameter is the mutation permission — no &mut, no .push.
fn append(v: &mut Vec<i32>, x: i32) {
    todo!()
}

// 3. total: sum the slice. .iter().sum() is the whole body.
fn total(v: &[i32]) -> i32 {
    todo!()
}
`,

  requirements: [
    { pattern: /vec!\s*\[/, message: "Use the vec![] literal to build the list" },
    { pattern: /\.push\(/, message: "Use .push() (the .Add() of Rust) in append" },
    { pattern: /Vec<i32>/, message: "Work with the Vec<i32> type" },
  ],

  tests: [
    { name: "make_scores() returns vec![10, 20, 30]",
      code: "assert_eq!(make_scores(), vec![10, 20, 30]);" },
    { name: "append(&mut v, 3) pushes onto the end",
      code: "let mut v = vec![1, 2];\nappend(&mut v, 3);\nassert_eq!(v, vec![1, 2, 3]);" },
    { name: "append works on an empty Vec",
      code: "let mut v: Vec<i32> = Vec::new();\nappend(&mut v, 7);\nassert_eq!(v, vec![7]);" },
    { name: "total(&[1, 2, 3]) returns 6",
      code: "assert_eq!(total(&[1, 2, 3]), 6);" },
    { name: "total of make_scores() is 60",
      code: "assert_eq!(total(&make_scores()), 60);" },
    { name: "total(&[]) returns 0",
      code: "assert_eq!(total(&[]), 0);" },
  ],

  solution: `fn make_scores() -> Vec<i32> {
    vec![10, 20, 30]
}

fn append(v: &mut Vec<i32>, x: i32) {
    v.push(x);
}

fn total(v: &[i32]) -> i32 {
    v.iter().sum()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Rust</th></tr>
  <tr><td>Literal</td><td><code>new List&lt;int&gt; { 1, 2, 3 }</code></td><td><code>vec![1, 2, 3]</code></td></tr>
  <tr><td>Append</td><td><code>list.Add(x)</code></td><td><code>v.push(x)</code> — requires <code>let mut</code> or <code>&amp;mut</code></td></tr>
  <tr><td>Length</td><td><code>list.Count</code></td><td><code>v.len()</code></td></tr>
  <tr><td>Safe index</td><td><code>list[i]</code> throws if out of range</td><td><code>v.get(i)</code> returns <code>Option&lt;&amp;T&gt;</code></td></tr>
  <tr><td>Iterate</td><td><code>foreach (var x in list)</code></td><td><code>for x in &amp;v</code></td></tr>
  <tr><td>Read-only view</td><td><code>IReadOnlyList&lt;int&gt;</code></td><td><code>&amp;[i32]</code> (a slice)</td></tr>
  <tr><td>Sum</td><td><code>list.Sum()</code> (LINQ)</td><td><code>v.iter().sum()</code></td></tr>
</table>
<p>The habit shift is where mutability lives. In C# you defend a list by
exposing it as <code>IReadOnlyList&lt;T&gt;</code> — an opt-in wrapper the
caller can often cast away. In Rust, <code>total(v: &amp;[i32])</code> is
read-only by construction and <code>append(v: &amp;mut Vec&lt;i32&gt;)</code>
declares mutation in its signature; every call site shows an explicit
<code>&amp;mut</code>, so you can see who changes the list just by reading
the code.</p>`,
};
