<script>
const LESSON = {
  number: 9,
  title: "Result & the ? Operator",

  intro: `
<p>C# exceptions have two problems you have learned to live with: they are
invisible in signatures — nothing about <code>int Parse(string s)</code>
tells you it can throw <code>FormatException</code> — and they are expensive
to throw, which is why <code>int.TryParse</code> exists at all. But
<code>TryParse</code>'s <code>bool</code>-plus-<code>out</code> pattern
loses the error's details entirely. Rust folds failure into the return type:
<code>Result&lt;T, E&gt;</code> is an enum of <code>Ok(value)</code> and
<code>Err(error)</code> — the value <em>and</em> the error in one place, and
the possibility of failure is right there in the signature.</p>
<table>
  <tr><th>C#</th><th>Rust</th></tr>
  <tr><td><code>int Parse(string s)</code> — throws, invisibly</td><td><code>fn parse(&amp;self) -&gt; Result&lt;T, E&gt;</code> — failure in the type</td></tr>
  <tr><td><code>bool TryParse(s, out int v)</code> — error details lost</td><td><code>s.parse::&lt;u32&gt;()</code> → <code>Ok(v)</code> or <code>Err(e)</code></td></tr>
  <tr><td><code>catch (FormatException e) { throw new ...; }</code></td><td><code>.map_err(|e| ...)</code></td></tr>
  <tr><td><code>try { ... } catch { throw; }</code> (rethrow)</td><td><code>?</code> — one character, typed</td></tr>
  <tr><td><code>try/catch</code> with both branches</td><td><code>match r { Ok(v) =&gt; ..., Err(e) =&gt; ... }</code></td></tr>
</table>
<p>Handling looks like <code>Option</code>: <code>match</code> on
<code>Ok</code>/<code>Err</code>, or convert the error type with
<code>.map_err</code>. The star is <code>?</code>. Writing
<code>parse_age(s)?</code> means: if that returned <code>Ok(v)</code>, unwrap
to <code>v</code> and continue; if it returned <code>Err(e)</code>, return
that error from <em>this</em> function right now. It is
catch-and-rethrow in one character — except checked by the compiler, visible
at every call site, and costing nothing more than a branch.</p>`,

  csharp: `// Exceptions: invisible in the signature, expensive to throw.
int ParseAge(string s)
{
    return int.Parse(s.Trim());   // FormatException on bad input
}

// TryParse avoids the throw but loses the error's details.
int AgeNextYear(string s)
{
    if (int.TryParse(s.Trim(), out int age))
    {
        return age + 1;
    }
    // Manufacture a new error — the original is gone.
    throw new ArgumentException($"'{s}' is not a valid age");
}`,

  task: `
<p>Rewrite the parsing code with <code>Result</code>:</p>
<ol>
  <li>Write <code>parse_age(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code>.
      Call <code>s.trim().parse::&lt;u32&gt;()</code> — it returns a
      <code>Result</code> already — and convert its error type with
      <code>.map_err(|_| format!("'{}' is not a valid age", s))</code>
      (that exact message: for input <code>"abc"</code> the error is
      <code>'abc' is not a valid age</code>).</li>
  <li>Write <code>age_next_year(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code>
      that returns the parsed age plus one. Use the <code>?</code> operator:
      the whole body is <code>Ok(parse_age(s)? + 1)</code> — the
      <code>Err</code> case propagates itself.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. parse_age: parse the trimmed string as a u32.
//    s.trim().parse::<u32>() returns Result<u32, ParseIntError>;
//    .map_err(|_| format!("'{}' is not a valid age", s)) converts the
//    error into the String our signature promises.
fn parse_age(s: &str) -> Result<u32, String> {
    todo!()
}

// 2. age_next_year: the parsed age plus one.
//    parse_age(s)? unwraps the Ok — or returns the Err for you.
fn age_next_year(s: &str) -> Result<u32, String> {
    todo!()
}
`,

  requirements: [
    { pattern: /Result</, message: "Return Result<u32, String> types" },
    { pattern: /map_err|Err\(/, message: "Convert or produce the error with map_err (or Err(...))" },
    { pattern: /\)\?/, message: "Propagate the error with the ? operator in age_next_year" },
  ],

  tests: [
    { name: 'parse_age("42") returns Ok(42)',
      code: 'assert_eq!(parse_age("42"), Ok(42));' },
    { name: 'parse_age("  30  ") trims whitespace before parsing',
      code: 'assert_eq!(parse_age("  30  "), Ok(30));' },
    { name: 'parse_age("abc") returns the descriptive Err',
      code: 'assert_eq!(parse_age("abc"), Err("\'abc\' is not a valid age".to_string()));' },
    { name: 'age_next_year("42") returns Ok(43)',
      code: 'assert_eq!(age_next_year("42"), Ok(43));' },
    { name: 'age_next_year("abc") propagates the Err',
      code: 'assert!(age_next_year("abc").is_err());' },
  ],

  solution: `fn parse_age(s: &str) -> Result<u32, String> {
    s.trim()
        .parse::<u32>()
        .map_err(|_| format!("'{}' is not a valid age", s))
}

fn age_next_year(s: &str) -> Result<u32, String> {
    Ok(parse_age(s)? + 1)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Rust</th></tr>
  <tr><td>Fallible function</td><td><code>int Parse(string)</code> + hidden throws</td><td><code>fn parse_age(&amp;str) -&gt; Result&lt;u32, String&gt;</code></td></tr>
  <tr><td>Success / failure</td><td>return value / thrown exception</td><td><code>Ok(v)</code> / <code>Err(e)</code> — both are returns</td></tr>
  <tr><td>Parse safely</td><td><code>int.TryParse(s, out v)</code> — <code>bool</code> + <code>out</code></td><td><code>s.parse::&lt;u32&gt;()</code> — value and error in one <code>Result</code></td></tr>
  <tr><td>Translate the error</td><td><code>catch (E e) { throw new F(...); }</code></td><td><code>.map_err(|e| ...)</code></td></tr>
  <tr><td>Propagate</td><td><code>catch { throw; }</code> or just no try/catch</td><td><code>?</code></td></tr>
  <tr><td>Handle both</td><td><code>try/catch</code></td><td><code>match { Ok(v) =&gt; ..., Err(e) =&gt; ... }</code></td></tr>
</table>
<p>Note what <code>?</code> demands: it only compiles inside a function whose
return type can absorb the error, so propagation is visible in every
signature along the chain — the property C#'s checked-exceptions cousin Java
wanted, without the ceremony. And because <code>Err</code> is just a return
value, error paths cost a branch, not a stack unwind: the reason
<code>TryParse</code> exists in C# is simply how all fallible code works
in Rust.</p>`,
};
