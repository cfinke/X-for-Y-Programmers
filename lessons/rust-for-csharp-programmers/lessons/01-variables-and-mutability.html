<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables, Mutability & Types",

  intro: `
<p><code>var x = 5;</code> becomes <code>let x = 5;</code> — same idea, the
compiler infers the type. The twist is what happens next: Rust's
<code>let</code> binding is <strong>immutable by default</strong>. Reassigning
it is a compile error. Think of it as the <code>readonly</code> local that C#
proposals kept promising and never shipped — except in Rust it's the default,
and mutation is the explicit opt-in: <code>let mut x = 5;</code>.</p>
<table>
  <tr><th>C#</th><th>Rust</th></tr>
  <tr><td><code>var name = "Ada";</code></td><td><code>let name = "Ada";</code></td></tr>
  <tr><td><code>var age = 36; age = 37;</code></td><td><code>let mut age = 36; age = 37;</code></td></tr>
  <tr><td><code>double price = 9.99;</code></td><td><code>let price: f64 = 9.99;</code></td></tr>
  <tr><td><code>int</code> / <code>long</code> / <code>double</code></td><td><code>i32</code> / <code>i64</code> / <code>f64</code></td></tr>
  <tr><td><code>uint</code> (CLS-frowned-upon)</td><td><code>u32</code> (a first-class citizen)</td></tr>
  <tr><td><code>$"{name} is {age}"</code></td><td><code>format!("{} is {}", name, age)</code></td></tr>
</table>
<p>The numeric types map almost one-to-one: <code>int</code> → <code>i32</code>,
<code>long</code> → <code>i64</code>, <code>double</code> → <code>f64</code>
(there's no <code>decimal</code> in the standard library — crates cover that).
Unsigned types like <code>u32</code> are idiomatic in Rust, not a compliance
warning: an age or a count that can't be negative simply <em>is</em> unsigned.
And where C# quietly widens <code>int</code> to <code>long</code>, Rust never
mixes numeric types silently — you convert explicitly with <code>as</code>.
One convention change to internalize early: locals and functions are
<code>snake_case</code>, not camelCase or PascalCase, and the compiler will
nag you about it.</p>`,

  csharp: `var name = "Ada";
var age = 36;
double price = 9.99;

// var infers the type, but the local stays reassignable.
// C# has no readonly locals -- Rust's let is exactly that.
age = 37;

string DescribeUser(string name, int age) =>
    $"{name} is {age} years old";

int Birthday(int age)
{
    var next = age;
    next += 1;
    return next;
}

Console.WriteLine(DescribeUser(name, age));`,

  task: `
<p>Rewrite the C# as Rust:</p>
<ol>
  <li>Write a function <code>describe_user</code> (note the
      <code>snake_case</code> — not <code>DescribeUser</code>) that takes
      <code>name: &amp;str</code> and <code>age: u32</code> and returns a
      <code>String</code> like <code>"Ada is 36 years old"</code>. Use
      <code>format!</code> — Rust's answer to <code>$"..."</code>
      interpolation, with positional <code>{}</code> placeholders.</li>
  <li>Write a function <code>birthday</code> that takes <code>age: u32</code>
      and returns <code>u32</code>. Inside, bind the argument to a mutable
      local with <code>let mut</code>, add 1 to it with <code>+=</code>,
      and return it.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. describe_user: takes name: &str and age: u32, returns String.
//    C#: $"{name} is {age} years old"
//    Rust: format!("{} is {} years old", ...)
fn describe_user(name: &str, age: u32) -> String {
    todo!()
}

// 2. birthday: bind age to a mutable local with let mut,
//    increment it with +=, and return it.
fn birthday(age: u32) -> u32 {
    todo!()
}
`,

  requirements: [
    { pattern: /fn\s+describe_user\s*\(\s*name\s*:\s*&str\s*,\s*age\s*:\s*u32\s*\)\s*->\s*String/, message: "Define describe_user(name: &str, age: u32) -> String" },
    { pattern: /format!\s*\(/, message: "Use the format! macro to build the string" },
    { pattern: /let\s+mut\b/, message: "Use a let mut binding inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'assert_eq!(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'assert_eq!(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "assert_eq!(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "assert_eq!(birthday(0), 1);" },
  ],

  solution: `fn describe_user(name: &str, age: u32) -> String {
    format!("{} is {} years old", name, age)
}

fn birthday(age: u32) -> u32 {
    let mut next = age;
    next += 1;
    next
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Rust</th></tr>
  <tr><td>Inferred local</td><td><code>var x = 5;</code> (always reassignable)</td><td><code>let x = 5;</code> (immutable)</td></tr>
  <tr><td>Mutable local</td><td><code>var x = 5;</code></td><td><code>let mut x = 5;</code></td></tr>
  <tr><td>Integers</td><td><code>int</code>, <code>long</code>, <code>uint</code></td><td><code>i32</code>, <code>i64</code>, <code>u32</code> — never silently mixed</td></tr>
  <tr><td>Floating point</td><td><code>double</code>, <code>float</code></td><td><code>f64</code>, <code>f32</code></td></tr>
  <tr><td>Interpolation</td><td><code>$"{name} is {age}"</code></td><td><code>format!("{} is {}", name, age)</code></td></tr>
  <tr><td>Naming</td><td><code>PascalCase</code> methods, <code>camelCase</code> locals</td><td><code>snake_case</code> for both</td></tr>
</table>
<p>Notice <code>birthday</code>'s last line: no <code>return</code>, no
semicolon. A block's final expression is its value — more on that in the next
lesson. Your static-typing instincts transfer directly; what changes is the
default. In C# you opt <em>into</em> safety (<code>readonly</code>,
<code>const</code>); in Rust you opt <em>out</em> of it (<code>mut</code>),
which makes the mutable parts of a function jump out at a glance.</p>`,
};
