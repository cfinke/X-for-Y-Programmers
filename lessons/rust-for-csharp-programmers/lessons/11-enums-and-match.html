<div id="app"></div>
<script>
const LESSON = {
  number: 11,
  title: "Enums & Pattern Matching",

  intro: `
<p>You've probably built this in C#: an <code>abstract record Shape</code>,
a handful of <code>sealed record</code> subtypes, and a <code>switch</code>
expression with type patterns to consume them. That combination — a closed
set of shapes, each carrying its own data — approximates what a Rust
<code>enum</code> simply <em>is</em>. The whole sealed record hierarchy
collapses into four lines: <code>enum Shape { Circle { radius: f64 },
Rectangle { width: f64, height: f64 } }</code>. Each variant is like one
of your sealed records; the enum is the abstract base, the sealing, and
the exhaustiveness contract all at once.</p>
<table>
  <tr><th>C#</th><th>Rust</th></tr>
  <tr><td><code>abstract record Shape;</code> + sealed subtypes</td><td><code>enum Shape { Circle {..}, Rectangle {..} }</code></td></tr>
  <tr><td><code>shape switch { ... }</code></td><td><code>match shape { ... }</code></td></tr>
  <tr><td><code>Circle c =&gt; ... c.Radius ...</code></td><td><code>Shape::Circle { radius } =&gt; ...</code></td></tr>
  <tr><td>Missing case: warning CS8509</td><td>Missing case: <strong>compile error</strong> E0004</td></tr>
  <tr><td><code>_ =&gt; throw ...</code> discard arm to silence it</td><td>No discard arm needed — the compiler knows the set is closed</td></tr>
</table>
<p><code>match</code> is your <code>switch</code> expression: it produces a
value, arms use <code>=&gt;</code>, and patterns destructure the data right
in the arm. The upgrade is exhaustiveness. C# can only <em>warn</em> when a
switch misses a case (the hierarchy isn't provably closed, so you add the
<code>_ =&gt; throw</code> arm as a runtime tripwire). Rust <em>knows</em>
every variant of an enum, so a missing arm is a hard compile error — and no
throw-arm is needed, because there's nothing else a <code>Shape</code> could
be. Add a variant next year, and every <code>match</code> in the codebase
fails to compile until it's handled. That's the refactoring safety net C#'s
warning wishes it were.</p>`,

  csharp: `public abstract record Shape;
public sealed record Circle(double Radius) : Shape;
public sealed record Rectangle(double Width, double Height) : Shape;

double Area(Shape shape) => shape switch
{
    Circle c      => Math.PI * c.Radius * c.Radius,
    Rectangle r   => r.Width * r.Height,
    // Compiler can't prove the hierarchy is closed, so:
    _ => throw new ArgumentException("unknown shape"),
};

Console.WriteLine(Area(new Circle(1.0)));       // 3.14159...
Console.WriteLine(Area(new Rectangle(3, 4)));   // 12`,

  task: `
<p>Port the sealed-record-plus-switch pattern to its native habitat:</p>
<ol>
  <li>The <code>enum Shape</code> with variants
      <code>Circle { radius: f64 }</code> and
      <code>Rectangle { width: f64, height: f64 }</code> is already defined
      in the starter — keep it as is. That's the whole hierarchy.</li>
  <li>Write the body of <code>area(shape: &amp;Shape) -&gt; f64</code> using
      a <code>match</code> expression. Destructure the fields in each arm:
      <code>Shape::Circle { radius } =&gt; ...</code>. Use
      <code>std::f64::consts::PI</code> for the circle
      (C#'s <code>Math.PI</code>). No <code>_</code> arm — two variants,
      two arms, done.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// The entire sealed record hierarchy, in four lines.
// Each variant carries its own fields, like your sealed records.
enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

// area: a match expression -- your switch expression, with teeth.
// Destructure each variant's fields right in the arm.
// Circle area: std::f64::consts::PI * radius * radius.
fn area(shape: &Shape) -> f64 {
    todo!()
}
`,

  requirements: [
    { pattern: /enum\s+Shape/, message: "Keep the enum Shape definition" },
    { pattern: /match\b/, message: "Use a match expression in area" },
    { pattern: /Circle\s*\{/, message: "Destructure the Circle variant's fields in a match arm" },
  ],

  tests: [
    { name: "area of Circle { radius: 1.0 } is about PI",
      code: "assert!((area(&Shape::Circle { radius: 1.0 }) - std::f64::consts::PI).abs() < 0.001);" },
    { name: "area of Circle { radius: 2.0 } is about 12.566",
      code: "assert!((area(&Shape::Circle { radius: 2.0 }) - 12.566370).abs() < 0.001);" },
    { name: "area of Rectangle { width: 3.0, height: 4.0 } is 12.0",
      code: "assert_eq!(area(&Shape::Rectangle { width: 3.0, height: 4.0 }), 12.0);" },
    { name: "area of Rectangle { width: 2.5, height: 2.0 } is 5.0",
      code: "assert_eq!(area(&Shape::Rectangle { width: 2.5, height: 2.0 }), 5.0);" },
  ],

  solution: `enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

fn area(shape: &Shape) -> f64 {
    match shape {
        Shape::Circle { radius } => std::f64::consts::PI * radius * radius,
        Shape::Rectangle { width, height } => width * height,
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Rust</th></tr>
  <tr><td>Closed type hierarchy</td><td><code>abstract record</code> + <code>sealed record</code> subtypes</td><td><code>enum</code> with data-carrying variants</td></tr>
  <tr><td>Branch on shape</td><td><code>shape switch { Circle c =&gt; ... }</code></td><td><code>match shape { Shape::Circle { radius } =&gt; ... }</code></td></tr>
  <tr><td>Extract the data</td><td>Pattern variable: <code>c.Radius</code></td><td>Destructuring: <code>radius</code> is bound in the arm</td></tr>
  <tr><td>Missing case</td><td>Warning CS8509, crashes at runtime</td><td>Compile error E0004 — won't build</td></tr>
  <tr><td>Catch-all arm</td><td><code>_ =&gt; throw ...</code> (obligatory hedge)</td><td><code>_ =&gt;</code> exists, but only when you <em>want</em> it</td></tr>
  <tr><td>Pi</td><td><code>Math.PI</code></td><td><code>std::f64::consts::PI</code></td></tr>
</table>
<p>The C# enum you know — a named list of integers — is just the degenerate
case here (<code>enum Direction { North, South }</code> works in Rust too).
The general case is a <em>discriminated union</em>: each variant carries its
own payload, and <code>match</code> is the only way in, so you can never
read a radius off a rectangle. You've already met the two most famous enums
in earlier lessons: <code>Option&lt;T&gt;</code> is just
<code>enum Option&lt;T&gt; { Some(T), None }</code> and <code>Result</code>
is <code>enum Result&lt;T, E&gt; { Ok(T), Err(E) }</code>. No magic —
library code, built from this lesson's feature.</p>`,
};
