const LESSON = {
  number: 12,
  title: "Closures",

  intro: `
<p>A closure is a function that remembers the variables of the scope it was
created in. This works exactly like it does in Ruby: a block, proc, or lambda
keeps a live reference to the enclosing variable, not a copy, so mutating it
persists across calls. The syntax is the only thing that changes — Go writes
anonymous functions as <code>func(params) returnType { ... }</code> and function
types the same way.</p>
<table>
  <tr><th>Ruby</th><th>Go</th></tr>
  <tr><td><code>-&gt; { ... }</code></td><td><code>func() int</code></td></tr>
  <tr><td><code>->(n) { ... }</code></td><td><code>func(n int) int</code></td></tr>
  <tr><td><code>f = -&gt; { ... }</code></td><td><code>f := func() int { ... }</code></td></tr>
  <tr><td><code>count = 0</code> captured</td><td><code>count := 0</code> captured</td></tr>
</table>
<p>Because the captured variable is shared, a factory that returns a closure hands
back a private, persistent piece of state — the same trick you would use in
Ruby to make a counter without a class. Go has no <code>self</code> to worry
about, so the mental model is even simpler: the closure just reaches out and
touches the variable that was in scope when it was defined.</p>`,

  ruby: `def make_counter
  count = 0
  -> {
    count += 1
    count
  }
end

next_val = make_counter
next_val.call # 1
next_val.call # 2`,

  task: `
<p>Write these package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>MakeCounter() func() int</code> returns a closure. Each call to the
      returned function increments a captured <code>count</code> and returns the
      new value: first call gives <code>1</code>, then <code>2</code>, and so on.</li>
  <li><code>MakeAdder(start int) func(int) int</code> captures <code>start</code>
      as a running total. Each call adds its argument to the total and returns the
      updated total, so <code>a := MakeAdder(10); a(5)</code> is <code>15</code>
      and a following <code>a(3)</code> is <code>18</code>.</li>
  <li><code>ApplyTwice(n int, f func(int) int) int</code> takes a closure as an
      argument and returns <code>f(f(n))</code>.</li>
</ol>`,

  starter: `func MakeCounter() func() int {
	return nil // TODO
}

func MakeAdder(start int) func(int) int {
	return nil // TODO
}

func ApplyTwice(n int, f func(int) int) int {
	return 0 // TODO
}
`,

  requirements: [
    { pattern: /func\(\)\s*int\s*{/, message: "Return an anonymous func() int closure from MakeCounter" },
    { pattern: /func\s+MakeAdder/, message: "Define MakeAdder that captures a running total" },
    { pattern: /f\(f\(/, message: "In ApplyTwice, call the closure twice: f(f(n))" },
  ],

  tests: [
    { name: "MakeCounter counts 1,2,3", code: "\t\tc := MakeCounter()\n\t\texpect_eq(c(), 1)\n\t\texpect_eq(c(), 2)\n\t\texpect_eq(c(), 3)" },
    { name: "Separate counters are independent", code: "\t\ta := MakeCounter()\n\t\tb := MakeCounter()\n\t\texpect_eq(a(), 1)\n\t\texpect_eq(a(), 2)\n\t\texpect_eq(b(), 1)" },
    { name: "MakeAdder accumulates", code: "\t\tadd := MakeAdder(10)\n\t\texpect_eq(add(5), 15)\n\t\texpect_eq(add(3), 18)" },
    { name: "ApplyTwice applies the closure twice", code: "\t\tdouble := func(x int) int { return x * 2 }\n\t\texpect_eq(ApplyTwice(3, double), 12)" },
  ],

  solution: `func MakeCounter() func() int {
	count := 0
	return func() int {
		count++
		return count
	}
}

func MakeAdder(start int) func(int) int {
	total := start
	return func(n int) int {
		total += n
		return total
	}
}

func ApplyTwice(n int, f func(int) int) int {
	return f(f(n))
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Go</th></tr>
  <tr><td>Anonymous function</td><td><code>->(n) { n * 2 }</code></td><td><code>func(n int) int { return n * 2 }</code></td></tr>
  <tr><td>Function type</td><td><code>Proc</code> / <code>Lambda</code> object</td><td><code>func() int</code></td></tr>
  <tr><td>Captured, mutated var</td><td><code>count += 1</code></td><td><code>count++</code></td></tr>
  <tr><td>Closure factory</td><td><code>make_counter</code></td><td><code>MakeCounter()</code></td></tr>
  <tr><td>Closure as argument</td><td><code>array.map(&amp;f)</code></td><td><code>ApplyTwice(n, f)</code></td></tr>
</table>
<p>The captured variable lives as long as the closure does. Go's garbage collector
keeps <code>count</code> alive even after <code>MakeCounter</code> returns, so the
state survives across calls — exactly like Ruby. Each call to the factory
creates a fresh variable, which is why two counters never share a value.</p>
<p>One Go-specific gotcha to remember for later lessons: before Go 1.22, a loop
variable was captured by reference and <em>shared</em> across iterations, so
closures made inside a <code>for</code> loop all saw the final value. Go 1.22 gave
each iteration its own copy, matching how a Ruby block passed to <code>each</code>
already behaves — every call to the block gets its own local binding of the
loop variable, so a lambda built inside it captures that call's value rather
than a value shared across the whole loop.</p>`,
};
