  title: "Pointers",

  intro: `
<p>In Ruby you never think about pointers, but you rely on similar semantics
constantly: every value is an object, and the <em>reference</em> to that object is
what gets passed around, so a method that mutates a passed-in object's state (like
<code>account.balance += amount</code>) is visible to the caller. Reassigning the
parameter itself has no such effect, and neither does "mutating" an
<code>Integer</code> — Ruby's integers are immutable objects, so a method can never
make a caller's number change value. Go makes this split explicit with pointers.</p>
<p>A pointer is a value that holds the address of another value. <code>&x</code>
takes the address of <code>x</code>; <code>*p</code> <em>dereferences</em> —
reads or writes the value at that address. The type <code>*int</code> means
"pointer to an int". Every pointer's zero value is <code>nil</code> (Go's
<code>nil</code>), and dereferencing a <code>nil</code> pointer panics, so you
guard with <code>if p == nil</code>.</p>
<table>
  <tr><th>Ruby</th><th>Go</th></tr>
  <tr><td>objects passed by reference (mutating methods are visible to the caller)</td><td><code>*T</code> pointer, taken with <code>&amp;x</code></td></tr>
  <tr><td>(no equivalent)</td><td><code>*p</code> reads/writes the pointee</td></tr>
  <tr><td><code>nil</code></td><td><code>nil</code> (the zero value of a pointer)</td></tr>
  <tr><td>integers are immutable, can't be changed in place</td><td><code>func f(p *int)</code> can mutate the caller's int</td></tr>
  <tr><td><code>def m; self.x = …; end</code> mutates the object</td><td>pointer receiver <code>func (a *T) M()</code></td></tr>
</table>
<p>Go copies arguments by default, so to let a function change a caller's value you
pass a pointer to it. The same idea drives <strong>pointer receivers</strong>: a
method declared on <code>*T</code> can mutate the struct it is called on, while a
method on <code>T</code> only sees a copy. Go conveniently lets you call a pointer
method on an addressable value: <code>a.Deposit(50)</code> is shorthand for
<code>(&amp;a).Deposit(50)</code>. There is no pointer arithmetic in Go — you can
only take an address, dereference it, or compare against <code>nil</code>.</p>`,

  ruby: `# Objects: mutation through a reference works.
def deposit(account, amount)
  account.balance += amount
end

# Integers are immutable, so this can't touch the caller's variable.
def double(n)
  n = n * 2 # no effect outside
end`,

  solution: `func Double(p *int) {
	*p = *p * 2
}

type Account struct {
	Balance int
}

func (a *Account) Deposit(amount int) {
	a.Balance += amount
}

func ValueOr(p *int, fallback int) int {
	if p == nil {
		return fallback
	}
	return *p

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Go</th></tr>

  <tr><td>Write the pointee</td><td>—</td><td><code>*p = 10</code></td></tr>

  <tr><td>Mutating method</td><td><code>self.x = …</code></td><td><code>func (a *T) M()</code></td></tr>

<p>Rules of thumb: use a <strong>pointer receiver</strong> when a method needs to
modify the struct (or when the struct is large and you want to avoid copying it),
and be consistent — if one method on a type uses a pointer receiver, give them all
pointer receivers. When you build a struct you plan to mutate, keep a pointer to it
(<code>a := &amp;Account{}</code>) so every method call shares the same value. And
because a <code>nil</code> pointer panics on dereference, treat <code>*p</code> the
way you'd treat calling a method on a value that might be <code>nil</code> in
Ruby — a <code>NoMethodError</code> waiting to happen: check first with
<code>p == nil</code> unless you know it's set.</p>`,
