const LESSON = {
  number: 2,
  title: "Strings",

  intro: `
<p>A Go <code>string</code> is an immutable, read-only slice of bytes — usually
UTF-8 text. Like Ruby you concatenate with <code>+</code>, but there is no
string interpolation syntax and no rich method syntax on the string itself:
you call <em>package-level functions</em> instead of <code>s.method</code>.
Formatting lives in <code>fmt</code>, everyday text manipulation in
<code>strings</code>, and number/string conversion in <code>strconv</code>.</p>
<table>
  <tr><th>Ruby</th><th>Go</th></tr>
  <tr><td><code>"#{a} #{b}"</code></td><td><code>fmt.Sprintf("%s %d", a, b)</code></td></tr>
  <tr><td><code>s.upcase</code></td><td><code>strings.ToUpper(s)</code></td></tr>
  <tr><td><code>s.include?(x)</code></td><td><code>strings.Contains(s, x)</code></td></tr>
  <tr><td><code>s.strip</code></td><td><code>strings.TrimSpace(s)</code></td></tr>
  <tr><td><code>n.to_s</code></td><td><code>strconv.Itoa(n)</code></td></tr>
  <tr><td><code>s.length</code></td><td><code>len(s)</code> (bytes!) / rune count via <code>range</code></td></tr>
</table>
<p>The verbs you will reach for constantly: <code>%s</code> (string),
<code>%d</code> (integer), <code>%q</code> (double-quoted string), and
<code>%v</code> (any value in its default form). The <code>strings</code>
package also gives you <code>Split</code>, <code>Join</code>, <code>Replace</code>,
<code>HasPrefix</code>, and friends — all as functions that take the string as
their first argument.</p>
<p>The one real surprise for a Ruby programmer is length.
<code>len(s)</code> counts <em>bytes</em>, not characters — unlike Ruby's
<code>String#length</code>, which is already character-aware. Because Go
stores UTF-8, a multi-byte character like <code>"é"</code> or an emoji makes
<code>len</code> larger than the number of visible characters (that's the
number Ruby's <code>String#bytesize</code> would give you). To count actual
characters (runes), iterate with <code>for range</code>, which decodes one rune
per step.</p>`,

  ruby: `name = "Ada"
count = 3
msg = "#{name} has #{count} messages"

loud = "  go  ".strip.upcase # "GO"
label = 5.to_s + " items"     # "5 items"
chars = "héllo".length          # 5`,

  task: `
<p>Write these as package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>Announce(name string, count int) string</code> returns a line like
      <code>"Ada has 3 messages"</code> — build it with
      <code>fmt.Sprintf("%s has %d messages", name, count)</code>.</li>
  <li><code>Normalize(s string) string</code> trims surrounding whitespace and
      uppercases the result, so <code>Normalize("  go  ")</code> is
      <code>"GO"</code>. Compose <code>strings.TrimSpace</code> and
      <code>strings.ToUpper</code>.</li>
  <li><code>CountLabel(n int) string</code> returns <code>n</code> followed by
      <code>" items"</code>, e.g. <code>CountLabel(5)</code> is
      <code>"5 items"</code> — convert with <code>strconv.Itoa(n)</code>.</li>
  <li><code>RuneLength(s string) int</code> returns the number of runes
      (characters) in <code>s</code>. Loop with <code>for range s</code> and
      count the iterations — do <em>not</em> return <code>len(s)</code>, which is
      bytes.</li>
</ol>`,

  starter: `func Announce(name string, count int) string {
	return "" // TODO
}

func Normalize(s string) string {
	return "" // TODO
}

func CountLabel(n int) string {
	return "" // TODO
}

func RuneLength(s string) int {
	return 0 // TODO: count runes, not bytes
}
`,

  requirements: [
    { pattern: /fmt\.Sprintf/, message: "Use fmt.Sprintf to build the string in Announce" },
    { pattern: /strings\.ToUpper/, message: "Use strings.ToUpper in Normalize" },
    { pattern: /strconv\.Itoa/, message: "Use strconv.Itoa to convert the number in CountLabel" },
  ],

  tests: [
    { name: "Announce(\"Ada\", 3) is \"Ada has 3 messages\"", code: "\t\texpect_eq(Announce(\"Ada\", 3), \"Ada has 3 messages\")" },
    { name: "Announce(\"Rob\", 0) is \"Rob has 0 messages\"", code: "\t\texpect_eq(Announce(\"Rob\", 0), \"Rob has 0 messages\")" },
    { name: "Normalize(\"  go  \") is \"GO\"", code: "\t\texpect_eq(Normalize(\"  go  \"), \"GO\")" },
    { name: "Normalize(\"Hello\\t\") is \"HELLO\"", code: "\t\texpect_eq(Normalize(\"Hello\\t\"), \"HELLO\")" },
    { name: "CountLabel(5) is \"5 items\"", code: "\t\texpect_eq(CountLabel(5), \"5 items\")" },
    { name: "CountLabel(42) is \"42 items\"", code: "\t\texpect_eq(CountLabel(42), \"42 items\")" },
    { name: "RuneLength(\"héllo\") is 5 (len would be 6)", code: "\t\texpect_eq(RuneLength(\"héllo\"), 5)" },
    { name: "RuneLength(\"🎉\") is 1 (len would be 4)", code: "\t\texpect_eq(RuneLength(\"🎉\"), 1)" },
    { name: "RuneLength(\"\") is 0", code: "\t\texpect_eq(RuneLength(\"\"), 0)" },
  ],

  solution: `func Announce(name string, count int) string {
	return fmt.Sprintf("%s has %d messages", name, count)
}

func Normalize(s string) string {
	return strings.ToUpper(strings.TrimSpace(s))
}

func CountLabel(n int) string {
	return strconv.Itoa(n) + " items"
}

func RuneLength(s string) int {
	count := 0
	for range s {
		count++
	}
	return count
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Go</th></tr>
  <tr><td>Interpolate</td><td><code>"#{x}"</code></td><td><code>fmt.Sprintf("%v", x)</code></td></tr>
  <tr><td>Quote a value</td><td><code>s.inspect</code></td><td><code>fmt.Sprintf("%q", s)</code></td></tr>
  <tr><td>Contains</td><td><code>s.include?(x)</code></td><td><code>strings.Contains(s, x)</code></td></tr>
  <tr><td>Split / Join</td><td><code>s.split(",")</code> / <code>a.join(",")</code></td><td><code>strings.Split(s, ",")</code> / <code>strings.Join(a, ",")</code></td></tr>
  <tr><td>Replace all</td><td><code>s.gsub(a, b)</code></td><td><code>strings.ReplaceAll(s, a, b)</code></td></tr>
  <tr><td>Prefix test</td><td><code>s.start_with?(p)</code></td><td><code>strings.HasPrefix(s, p)</code></td></tr>
  <tr><td>String → int</td><td><code>s.to_i</code></td><td><code>strconv.Atoi(s)</code> (returns value + error)</td></tr>
  <tr><td>Char count</td><td><code>s.length</code></td><td><code>for range s</code> (or <code>utf8.RuneCountInString</code>)</td></tr>
</table>
<p>Two habits carry over from this lesson. First, text operations are functions,
not methods — you will import <code>strings</code> and <code>strconv</code>
constantly, and their functions all take the data as the first argument. Second,
respect the byte/rune distinction: <code>len(s)</code> is bytes and indexing
<code>s[i]</code> gives you a single <code>byte</code>, while <code>for i, r :=
range s</code> hands you the byte offset <code>i</code> and the decoded rune
<code>r</code>. When you truly need characters, range or the
<code>unicode/utf8</code> helpers are the correct tools.</p>
<p>Note that <code>strconv.Atoi</code> returns <em>two</em> values — the number
and an <code>error</code> — because parsing can fail. Ruby's <code>to_i</code>
silently returns <code>0</code> on unparseable input instead of raising, so
Go's explicit two-value error return takes some getting used to; it is the
subject of a later lesson.</p>`,
};
