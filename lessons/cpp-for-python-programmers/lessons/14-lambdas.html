  title: "Lambdas",

  intro: `
<p>A Python <code>lambda</code> (or a nested <code>def</code>) closes over
every variable in its enclosing scope automatically, and always <em>by
reference</em> — there is no way to ask Python for a private copy. A C++
lambda makes that closure explicit: the <em>capture list</em> in square
brackets says exactly which surrounding variables the lambda can see, and
<em>how</em> — by value or by reference. The rest of the syntax plays a
similar role to <code>lambda params: expr</code>, except a C++ lambda's body
can hold any number of statements, not just one expression:
<code>[captures](params){ body }</code>.</p>
<table>
  <tr><th>Python</th><th>C++</th></tr>
  <tr><td><code>lambda x: x + 1</code></td><td><code>[](int x){ return x + 1; }</code></td></tr>
  <tr><td><code>lambda n: n * factor</code> (closes over <code>factor</code>)</td><td><code>[factor](int n){ return n * factor; }</code> (by value)</td></tr>
  <tr><td>not expressible as a <code>lambda</code>; needs a <code>def</code> with <code>nonlocal total</code></td><td><code>[&amp;total](){ total += x; }</code> (by reference)</td></tr>
  <tr><td><code>f: Callable[[int], int]</code></td><td><code>std::function&lt;int(int)&gt; f</code></td></tr>
</table>
<p>Three knobs to know. <strong>Capture by value</strong> — <code>[x]</code> or
<code>[=]</code> for everything — copies the variable into the lambda; the copy
is <code>const</code> by default. <strong>Capture by reference</strong> —
<code>[&amp;x]</code> or <code>[&amp;]</code> for everything — lets the body read
and write the original. Python has no by-value option at all: every closure
captures its outer variables by reference (technically, by the variable's
cell), which is exactly why mutating a captured counter needs a <code>def</code>
with <code>nonlocal</code> rather than a <code>lambda</code>. Adding
<code>mutable</code> after a C++ lambda's parameter list lets a by-value
lambda modify <em>its own copy</em> between calls, which is how you build a
stateful closure. To store a lambda in a variable, a struct field, or a
function parameter, wrap it in <code>std::function&lt;Ret(Args)&gt;</code> —
the type-erased equivalent of Python's <code>Callable[[Args], Ret]</code>
type hint.</p>`,

  python: `def apply_twice(x, f):

def make_counter():
    count = 0
    def counter():
        nonlocal count
        count += 1
        return count
    return counter   # closes over count by reference

from functools import reduce
total = reduce(lambda acc, x: acc + x, [1, 2, 3, 4], 0)`,

  solution: `int applyTwice(int x, const std::function<int(int)>& f) {
  return f(f(x));
}

int total(const std::vector<int>& v) {
  int sum = 0;
  std::for_each(v.begin(), v.end(), [&sum](int x){ sum += x; });
  return sum;
}

int countGreaterThan(const std::vector<int>& v, int threshold) {
  return static_cast<int>(
    std::count_if(v.begin(), v.end(), [threshold](int x){ return x > threshold; }));
}

std::function<int()> makeCounter() {
  int count = 0;
  return [count]() mutable { return ++count; };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>C++</th></tr>
  <tr><td>Lambda</td><td><code>lambda x: x + 1</code></td><td><code>[](int x){ return x + 1; }</code></td></tr>
  <tr><td>Capture by value</td><td>not available — every closure is by reference</td><td><code>[x]</code> or <code>[=]</code> (copy, const)</td></tr>
  <tr><td>Capture by reference</td><td>implicit and unavoidable</td><td><code>[&amp;x]</code> or <code>[&amp;]</code></td></tr>
  <tr><td>Stateful closure</td><td><code>nonlocal count</code> inside a nested <code>def</code></td><td><code>[count]() mutable { return ++count; }</code></td></tr>
  <tr><td>Function-typed value</td><td><code>Callable[[int], int]</code></td><td><code>std::function&lt;int(int)&gt;</code></td></tr>
</table>
<p>A bare lambda has a unique, unnameable type, so <code>auto c = makeCounter();</code>
works but you cannot spell the type by hand — that is what
<code>std::function</code> is for when you need to name it, store it, or pass it
across a function boundary. Note the cost trade-off Python never forces on
you: passing a lambda directly to <code>std::for_each</code> or
<code>std::count_if</code> lets the compiler inline it (fast), while wrapping it
in <code>std::function</code> adds a small indirection in exchange for a nameable,
storable type. Reach for <code>std::function</code> at API boundaries; let
templates and <code>auto</code> keep the hot paths concrete.</p>
<p>One footgun: capturing a local <em>by reference</em> and then returning the
lambda leaves a dangling reference once the enclosing function exits. Python's
garbage collector spares you that particular crash — a captured variable's
cell stays alive as long as the closure does — but Python has its own version
of the same surprise: a <code>lambda</code> in a loop captures the loop
variable <em>by reference</em>, so every closure built inside the loop sees
whatever value the variable holds when it is finally <em>called</em>, not when
it was created (the classic fix is a default argument, <code>lambda x=x:
...</code>, to force a snapshot). That is also why <code>makeCounter</code>'s
C++ lambda captures <code>count</code> <em>by value</em> — the state lives
inside the returned closure itself, not on a stack frame that is about to
vanish.</p>`,
