  title: "Interfaces",

  intro: `
<p>You already think in interfaces — Kotlin's <code>interface</code> is a
nominal contract, just like C#: a class only conforms if it declares
<code>: Name</code> explicitly, and having the right members by coincidence is
never enough to satisfy it. That much carries over directly from Kotlin. The
differences are in the details of what an interface is allowed to contain.</p>
<table>
  <tr><th>Kotlin</th><th>C#</th></tr>
  <tr><td><code>interface Shape { fun area(): Double }</code></td><td><code>interface IShape { double Area(); }</code></td></tr>
  <tr><td><code>class Box : Shape {}</code></td><td><code>class Box : IShape {}</code></td></tr>
  <tr><td>nominal (must declare <code>: Shape</code>)</td><td>nominal (must declare <code>: IShape</code>)</td></tr>
  <tr><td><code>val name: String</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td><code>class C : A, B</code></td><td><code>class C : A, B</code></td></tr>
</table>
<p>Three conventions to absorb. First, C# interface names start with a capital
<code>I</code> (<code>IShape</code>, <code>IComparable</code>) — Kotlin has no
such prefix convention; a Kotlin interface is simply named <code>Shape</code>.
Second, interface members are implicitly <code>public</code> in both languages
— you write no access modifier in the interface itself, but the implementing
class must explicitly mark its members <code>public</code> in C#, while Kotlin
infers the modifier for you. Third, and most important: in C# 7.3 an interface
has <em>no</em> method bodies at all (default interface methods arrived later,
in C# 8), so every member is a pure signature the class must fill in — whereas
Kotlin has allowed default method bodies directly inside an interface since
Kotlin 1.0.</p>`,

  kotlin: `interface Shape {
  val name: String
  fun area(): Double
}

interface Named {
  fun describe(): String
}

class Circle(override val name: String, private val r: Double) : Shape, Named {
  override fun area(): Double = Math.PI * r * r
  override fun describe(): String = "$name: \${area()}"
}

fun totalArea(shapes: List<Shape>): Double {
  return shapes.sumOf { it.area() }
}`,

  task: `

  solution: `interface IShape {
  string Name { get; }
  double Area();
}

interface IDescribable {
  string Describe();
}

class Rectangle : IShape, IDescribable {
  public string Name { get; private set; }
  private double width;
  private double height;

  public Rectangle(string name, double width, double height) {
    Name = name;
    this.width = width;
    this.height = height;
  }

  public double Area() {
    return width * height;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

class Square : IShape, IDescribable {
  public string Name { get; private set; }
  private double side;

  public Square(string name, double side) {
    Name = name;
    this.side = side;
  }

  public double Area() {
    return side * side;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

static class Shapes {
  public static double TotalArea(IShape[] shapes) {
    double sum = 0;
    foreach (IShape s in shapes) {
      sum += s.Area();
    }
    return sum;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>C#</th></tr>
  <tr><td>Declare</td><td><code>interface Shape {}</code></td><td><code>interface IShape {}</code></td></tr>
  <tr><td>Implement</td><td><code>class Box : Shape</code></td><td><code>class Box : IShape</code></td></tr>
  <tr><td>Conformance</td><td>nominal (must declare <code>: Shape</code>)</td><td>nominal (must declare <code>: IShape</code>)</td></tr>
  <tr><td>Read-only property</td><td><code>val name: String</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td>Multiple</td><td><code>: A, B</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Member bodies</td><td>allowed (default methods since Kotlin 1.0)</td><td>none (in C# 7.3)</td></tr>
</table>
<p>Conformance is nominal in both languages, so a class that happens to expose
matching members does <em>not</em> automatically implement the interface — you
must list the interface after the colon in Kotlin and in C# alike. That same
colon does double duty for base classes: a class can extend at most one class
but implement any number of interfaces, and if it does both the base class
comes first (<code>class C : BaseClass, IShape</code> in C#, mirroring
Kotlin's <code>class C : BaseClass(), Shape</code>).</p>
<p>The payoff is the <code>IShape[]</code> parameter in <code>TotalArea</code>:
callers pass concrete <code>Rectangle</code> and <code>Square</code> objects, but
the method only sees the contract. This is C#'s everyday tool for decoupling and is
exactly what powers built-in interfaces like <code>IEnumerable&lt;T&gt;</code>,
<code>IComparable&lt;T&gt;</code>, and <code>IEquatable&lt;T&gt;</code> — the same
role Kotlin's <code>Iterable&lt;T&gt;</code> and <code>Comparable&lt;T&gt;</code>
interfaces play in that ecosystem.</p>`,
