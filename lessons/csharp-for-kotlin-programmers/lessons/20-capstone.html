class NotFoundError(message: String) : Exception(message)

class Repository<T : Entity> {
    private val items = mutableMapOf<Int, T>()

    fun add(item: T) {
        if (items.containsKey(item.id))
            throw Exception("id \${item.id} already exists")
        items[item.id] = item
    }

    fun get(id: Int): T {
        return items[id] ?: throw NotFoundError("id \$id not found")
    }

    fun where(predicate: (T) -> Boolean): List<T> {
        return items.values
            .filter(predicate)
            .sortedBy { it.id }
    }

    val count: Int
        get() = items.size

  solution: `interface IEntity {
  int Id { get; }
}

class NotFoundException : Exception {
  public NotFoundException(string message) : base(message) {
  }
}

class Repository<T> where T : IEntity {
  private Dictionary<int, T> items = new Dictionary<int, T>();

  public void Add(T item) {
    if (items.ContainsKey(item.Id)) {
      throw new InvalidOperationException($"id {item.Id} already exists");
    }
    items[item.Id] = item;
  }

  public T Get(int id) {
    T value;
    if (!items.TryGetValue(id, out value)) {
      throw new NotFoundException($"id {id} not found");
    }
    return value;
  }

  public bool Remove(int id) {
    return items.Remove(id);
  }

  public List<T> Where(Func<T, bool> predicate) {
    return items.Values.Where(predicate).OrderBy(x => x.Id).ToList();
  }

  public int Count {
    get { return items.Count; }
  }
}

class User : IEntity {
  public int Id { get; private set; }
  public string Name { get; private set; }
  public int Age { get; private set; }

  public User(int id, string name, int age) {
    Id = id;
    Name = name;
    Age = age;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>C#</th></tr>
  <tr><td>Constrained generic</td><td><code>class R&lt;T : Entity&gt;</code></td><td><code>class Repository&lt;T&gt; where T : IEntity</code></td></tr>
  <tr><td>Keyed store</td><td><code>MutableMap&lt;Int, T&gt;</code></td><td><code>Dictionary&lt;int, T&gt;</code></td></tr>
  <tr><td>Safe lookup</td><td><code>map[id]</code> → <code>T?</code></td><td><code>TryGetValue(id, out value)</code></td></tr>
  <tr><td>Filter</td><td><code>list.filter(p)</code></td><td><code>seq.Where(p)</code> (LINQ)</td></tr>
  <tr><td>Custom error</td><td><code>class E(msg: String) : Exception(msg)</code></td><td><code>class E : Exception</code></td></tr>
  <tr><td>Catch by type</td><td><code>catch (e: E) { }</code></td><td><code>catch (E ex) { }</code></td></tr>
</table>
<p>A few things came together here. <code>where T : IEntity</code> is what unlocks
<code>item.Id</code> inside the generic — without the constraint the compiler only
knows <code>T</code> is <em>some</em> type and would reject the member access, the
same way <code>T : Entity</code> narrows a Kotlin generic. The LINQ chain
<code>Where(...).OrderBy(...).ToList()</code> is lazy until <code>ToList()</code>
forces it, mirroring how you'd <code>filter</code> then <code>sortedBy</code> a
Kotlin list.</p>
<p>The idiomatic shift from Kotlin here is smaller than it might look: Kotlin
already favors exceptions for truly exceptional failures and reserves nullable
types (<code>T?</code>) for expected absence, so idiomatic C# throwing
<code>NotFoundException</code> instead of returning a nullable <code>T?</code>
lands as a familiar trade-off rather than a foreign one. Catching by type —
<code>catch (NotFoundException ex)</code> — even matches the shape of Kotlin's
own <code>catch (e: NotFoundException)</code>. That's the whole course in one
small object: types that are real at runtime, generics with constraints,
interfaces as contracts, LINQ for querying, and exceptions for failure.</p>`,
