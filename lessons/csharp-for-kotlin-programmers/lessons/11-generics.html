  title: "Generics",

  intro: `
<p>Generics will feel like home: <code>Box&lt;T&gt;</code> and
<code>identity&lt;T&gt;(x)</code> read almost the same in both languages. The big
difference is that C# generics are <em>reified</em> — the type argument survives
to runtime, so <code>new T()</code> and <code>typeof(T)</code> actually work.
Kotlin generics are erased at runtime, just like Java's, with one narrow escape
hatch: an <code>inline fun &lt;reified T&gt;</code> lets the compiler splice the
real type into <code>T::class</code> at every call site. Ordinary classes and
non-inline functions get none of that — <code>T</code> is gone by the time the
code runs.</p>
<p>The other new idea is <strong>constraints</strong>, and this part really is
familiar: Kotlin already spells a bound as <code>&lt;T : Foo&gt;</code>. C# spells
it as a <code>where</code> clause after the signature instead. Constraints let the
compiler know what a <code>T</code> can do — call <code>CompareTo</code> on it, or
<code>new</code> it up — instead of treating it as an opaque blob.</p>
<table>
  <tr><th>Kotlin</th><th>C#</th></tr>
  <tr><td><code>class Box&lt;T&gt; {}</code></td><td><code>class Box&lt;T&gt; {}</code></td></tr>
  <tr><td><code>fun &lt;T&gt; id(x: T): T</code></td><td><code>T Id&lt;T&gt;(T x)</code></td></tr>
  <tr><td><code>&lt;T : Comparable&lt;T&gt;&gt;</code></td><td><code>where T : IComparable&lt;T&gt;</code></td></tr>
  <tr><td><code>inline fun &lt;reified T&gt; ...</code></td><td><code>where T : class, new()</code></td></tr>
</table>
<p>A constraint like <code>where T : IComparable&lt;T&gt;</code> unlocks
<code>a.CompareTo(b)</code>; <code>where T : new()</code> unlocks
<code>new T()</code>; and <code>where T : class</code> promises <code>T</code> is
a reference type so it can be <code>null</code>. You can combine them with commas.</p>`,

  kotlin: `class Box<T>(private var item: T) {
  val value: T get() = item
  val isEmpty: Boolean get() = item == null
}

fun <T> identity(x: T): T {
  return x
}

// Kotlin needs an explicit bound to use compareTo:
fun <T : Comparable<T>> max(a: T, b: T): T {
  return if (a >= b) a else b
}`,

  task: `

    { pattern: /class\s+Box\s*<\s*T\s*>/, message: "Declare a generic class Box<T>" },

    { name: "Max(3, 7) is 7", code: "      expect_eq(Generics.Max(3, 7), 7);" },

  solution: `public class Box<T> {
  private T item;

  public Box(T item) {
    this.item = item;
  }

  public T Value {
    get { return item; }
    set { item = value; }
  }

  public bool IsEmpty {
    get { return item == null; }
  }
}

public class Widget {
  public int Size { get; set; }
}

public static class Generics {
  public static T Identity<T>(T x) {
    return x;
  }

  public static T Max<T>(T a, T b) where T : IComparable<T> {
    return a.CompareTo(b) >= 0 ? a : b;
  }

  public static T Create<T>() where T : class, new() {
    return new T();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>C#</th></tr>
  <tr><td>Generic class</td><td><code>class Box&lt;T&gt; {}</code></td><td><code>class Box&lt;T&gt; {}</code></td></tr>
  <tr><td>Generic method</td><td><code>fun &lt;T&gt; id(x: T): T</code></td><td><code>T Id&lt;T&gt;(T x)</code></td></tr>
  <tr><td>Bound / constraint</td><td><code>&lt;T : C&gt;</code></td><td><code>where T : C</code></td></tr>
  <tr><td>Construct a T</td><td>only via <code>inline fun &lt;reified T&gt;</code></td><td><code>new T()</code> with <code>where T : new()</code></td></tr>
  <tr><td>Reference-type only</td><td><em>n/a</em></td><td><code>where T : class</code></td></tr>
  <tr><td>Value-type only</td><td><em>n/a</em></td><td><code>where T : struct</code></td></tr>
</table>
<p>Because C# generics are reified, <code>item == null</code> inside
<code>Box&lt;T&gt;</code> is legal even without a <code>class</code> constraint —
for a value type like <code>int</code> it simply evaluates to <code>false</code>.
That's why <code>Box&lt;int&gt;(0).IsEmpty</code> is <code>false</code>, not a
compile error. Kotlin has no equivalent worry to design around: every ordinary
type parameter is erased to its bound (or <code>Object</code>) on the JVM, so a
plain <code>Box&lt;T&gt;</code> can never ask "what type is T?" at all —
<code>T::class</code> is only reachable inside an
<code>inline fun &lt;reified T&gt;</code>, and even then only at the call site,
not from inside a stored generic class.</p>
<p>The <code>new()</code> constraint must come <em>last</em> in a
<code>where</code> list, and it only permits a parameterless constructor —
<code>new T(arg)</code> is never allowed generically. When you need to build a
<code>T</code> with arguments, pass in a <code>Func&lt;..., T&gt;</code> factory
instead — the same trick you'd reach for in Kotlin with a plain
<code>(Args) -&gt; T</code> lambda parameter when <code>reified</code> isn't an
option.</p>`,
};
