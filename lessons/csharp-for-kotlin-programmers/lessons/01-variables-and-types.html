const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Kotlin and C# feel like cousins — both are statically typed with generics,
lambdas, and structured concurrency (<code>suspend</code> in Kotlin,
<code>async</code>/<code>await</code> in C#), and both favor type inference
and null safety. But C#'s numeric types are distinct primitives, and every
method lives inside a class or struct — there's no file-level top-level
function outside of a class the way Kotlin allows.</p>
<table>
  <tr><th>Kotlin</th><th>C#</th></tr>
  <tr><td><code>val age: Int = 36</code></td><td><code>int age = 36;</code></td></tr>
  <tr><td><code>val name = "Ada"</code></td><td><code>var name = "Ada";</code> (inferred)</td></tr>
  <tr><td><code>"$name is $age"</code></td><td><code>$"{name} is {age}"</code></td></tr>
  <tr><td><code>Int</code></td><td><code>int</code>, <code>long</code>, <code>double</code>, <code>decimal</code>, …</td></tr>
</table>
<p>Two adjustments. First, <code>var</code> is C#'s <code>val x = …</code> —
inference from the initializer — but the type is fixed once chosen (C#'s
<code>var</code> is more like Kotlin's <code>val</code> in that the *type*
never changes, though the variable itself can still be mutable). Second, the
numeric split matters: <code>7 / 2</code> is <code>3</code> (integer division),
while <code>7 / 2.0</code> is <code>3.5</code> — this is true in Kotlin too, but
C# has no free functions — helpers become <code>static</code> methods on a
class, not top-level functions in a file.</p>`,

  kotlin: `val age: Int = 36
val userName: String = "Ada"

fun describe(name: String, age: Int): String {
  return "$name is $age"
}`,

  task: `
<p>Write the C# version. C# has no top-level functions, so put your methods in a
class:</p>
<ol>
  <li>Declare a <code>static class Basics</code> holding <code>static</code>
      methods.</li>
  <li><code>Add(int a, int b)</code> returns their sum.</li>
  <li><code>Describe(string name, int age)</code> returns a string like
      <code>"Ada is 36"</code> — use an interpolated string
      <code>$"{name} is {age}"</code>.</li>
  <li><code>Divide(int a, int b)</code> returns a <code>double</code>, so
      <code>Divide(7, 2)</code> is <code>3.5</code>. Cast one operand:
      <code>(double)a / b</code>.</li>
</ol>`,

  starter: `static class Basics {
  public static int Add(int a, int b) {
    return 0; // TODO
  }

  public static string Describe(string name, int age) {
    return ""; // TODO
  }

  public static double Divide(int a, int b) {
    return 0; // TODO: watch out for integer division
  }
}
`,

  requirements: [
    { pattern: /\$"/, message: "Build the string with an interpolated string ($\"...\")" },
    { pattern: /\(double\)/, message: "Cast to (double) so Divide returns a fractional result" },
  ],

  tests: [
    { name: "Add(2, 3) is 5", code: "      expect_eq(Basics.Add(2, 3), 5);" },
    { name: "Describe(\"Ada\", 36) is \"Ada is 36\"", code: "      expect_eq(Basics.Describe(\"Ada\", 36), \"Ada is 36\");" },
    { name: "Describe(\"Rob\", 68) is \"Rob is 68\"", code: "      expect_eq(Basics.Describe(\"Rob\", 68), \"Rob is 68\");" },
    { name: "Divide(7, 2) is 3.5", code: "      expect_eq(Basics.Divide(7, 2), 3.5);" },
    { name: "Divide(10, 4) is 2.5", code: "      expect_eq(Basics.Divide(10, 4), 2.5);" },
  ],

  solution: `static class Basics {
  public static int Add(int a, int b) {
    return a + b;
  }

  public static string Describe(string name, int age) {
    return $"{name} is {age}";
  }

  public static double Divide(int a, int b) {
    return (double)a / b;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>C#</th></tr>
  <tr><td>Typed variable</td><td><code>val x: Int = 1</code></td><td><code>int x = 1;</code></td></tr>
  <tr><td>Inferred variable</td><td><code>val x = 1</code></td><td><code>var x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>const val x = 1</code></td><td><code>const int x = 1;</code></td></tr>
  <tr><td>Interpolation</td><td><code>"$x"</code></td><td><code>$"{x}"</code></td></tr>
  <tr><td>Top-level function</td><td><code>fun f() {}</code></td><td><code>static</code> method in a class</td></tr>
</table>
<p>The integer-division gotcha is the classic first surprise, and it bites
Kotlin developers too: <code>Int / Int</code> truncates in both languages.
Promote one side to <code>double</code> — a cast, a literal like
<code>2.0</code>, or a <code>double</code> variable — and the whole expression
becomes floating point. For money, reach for <code>decimal</code> instead of
<code>double</code> to avoid binary rounding error.</p>`,
};
