const LESSON = {
  number: 15,
  title: "Closures & Callables",

  intro: `
<p>Ruby has four flavors of callable — blocks, procs, lambdas, methods — each
with its own calling convention. PHP collapses the story to one thing: the
anonymous function, an object of class <code>Closure</code>, called with
plain parentheses: <code>$f(5)</code>. There's no <code>yield</code> and no
implicit block argument; where Ruby passes a block, PHP just passes the
closure as an ordinary argument, hinted <code>callable</code> (or
<code>Closure</code>).</p>
<table>
  <tr><th>Ruby</th><th>PHP</th></tr>
  <tr><td><code>-&gt;(x) { x * 2 }</code></td><td><code>fn($x) =&gt; $x * 2</code> (auto-captures, by value)</td></tr>
  <tr><td><code>proc { … }</code> / multi-line lambda</td><td><code>function ($x) use ($y) { … }</code></td></tr>
  <tr><td>captures <em>everything</em>, automatically, live</td><td><code>use ($y)</code> — opt-in, per variable, <strong>by value</strong></td></tr>
  <tr><td>(the live binding is the only option)</td><td><code>use (&amp;$y)</code> — opt back in to the live binding</td></tr>
  <tr><td><code>f.call(5)</code> / <code>f.(5)</code></td><td><code>$f(5)</code></td></tr>
  <tr><td><code>def apply(&amp;blk)</code> + <code>yield</code></td><td><code>function apply(callable $f)</code> — a normal parameter</td></tr>
</table>
<p>The one real conceptual shift is <em>capture</em>. A Ruby closure sees
every variable in scope, always live: mutate <code>count</code> inside the
lambda and the outer <code>count</code> changes. PHP's long-form
<code>function () { … }</code> captures <em>nothing</em> unless you list it in
<code>use (…)</code> — and even then you get a <strong>snapshot</strong>, a
copy taken at creation time. To get Ruby's live binding you must ask for a
reference: <code>use (&amp;$count)</code>. Short arrow functions
(<code>fn($x) =&gt; expr</code>, single expression only) auto-capture like
Ruby, but still by value. Counter-style state therefore needs the long form
with <code>&amp;</code> — that ampersand is doing the job Ruby's closures did
silently all along.</p>`,

  ruby: `def make_multiplier(n)
  ->(x) { x * n } # captures n automatically
end

def apply_twice(f, x)
  f.call(f.call(x))
end

def make_counter
  count = 0
  -> { count += 1 } # sees the LIVE count binding, always
end

double = make_multiplier(2)
double.call(5)                  # 10
apply_twice(->(x) { x + 3 }, 10) # 16
counter = make_counter
counter.call                    # 1
counter.call                    # 2
counter.call                    # 3`,

  task: `
<p>Port the Ruby to PHP:</p>
<ol>
  <li><code>make_multiplier(int $n): Closure</code> — return
      <code>fn(int $x) =&gt; $x * $n</code>. The arrow function auto-captures
      <code>$n</code> by value — for a number that's all you need.</li>
  <li><code>apply_twice(callable $f, int $x): int</code> — Ruby's
      <code>f.call(f.call(x))</code> is just <code>$f($f($x))</code>; the
      <code>callable</code> hint accepts closures, arrows, and even function
      names as strings.</li>
  <li><code>make_counter(): Closure</code> — the one that needs the
      ampersand. Initialize <code>$count = 0;</code>, then return a long-form
      closure with <code>use (&amp;$count)</code> that increments and returns
      it: successive calls yield <code>1</code>, <code>2</code>,
      <code>3</code>. With plain <code>use ($count)</code> you'd snapshot the
      zero and return <code>1</code> forever.</li>
</ol>`,

  starter: `<?php

// 1. ->(x) { x * n }  ->  fn(int $x) => $x * $n  (auto-captures $n)
function make_multiplier(int $n): Closure {
    throw new Exception("TODO: implement make_multiplier");
}

// 2. f.call(f.call(x))  ->  $f($f($x)) — closures call with plain parens.
function apply_twice(callable $f, int $x): int {
    throw new Exception("TODO: implement apply_twice");
}

// 3. Needs the live binding: function () use (&$count) { ... }
function make_counter(): Closure {
    throw new Exception("TODO: implement make_counter");
}
`,

  requirements: [
    { pattern: /use\s*\(\s*&/, message: "Capture by reference with use (&$count) in make_counter" },
    { pattern: /fn\s*\(/, message: "Use an arrow function fn($x) => ... somewhere" },
    { pattern: /callable|Closure/, message: "Type the callables (callable param / Closure return)" },
  ],

  tests: [
    { name: "make_multiplier(2) returns a closure: $double(5) is 10",
      code: "$double = make_multiplier(2);\nexpect_eq($double(5), 10);" },
    { name: "each multiplier keeps its own captured $n",
      code: "$double = make_multiplier(2);\n$triple = make_multiplier(3);\nexpect_eq($double(7), 14);\nexpect_eq($triple(7), 21);" },
    { name: "apply_twice(fn($x) => $x + 3, 10) returns 16",
      code: "expect_eq(apply_twice(fn($x) => $x + 3, 10), 16);" },
    { name: "apply_twice(fn($x) => $x * $x, 3) returns 81",
      code: "expect_eq(apply_twice(fn($x) => $x * $x, 3), 81);" },
    { name: "make_counter() counts 1, 2, 3 — the reference capture works",
      code: "$counter = make_counter();\nexpect_eq($counter(), 1);\nexpect_eq($counter(), 2);\nexpect_eq($counter(), 3);" },
    { name: "two counters are independent",
      code: "$a = make_counter();\n$b = make_counter();\n$a();\n$a();\nexpect_eq($b(), 1);" },
  ],

  solution: `<?php

function make_multiplier(int $n): Closure {
    return fn(int $x) => $x * $n;
}

function apply_twice(callable $f, int $x): int {
    return $f($f($x));
}

function make_counter(): Closure {
    $count = 0;
    return function () use (&$count) {
        return ++$count;
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>PHP</th></tr>
  <tr><td>Lambda (one expression)</td><td><code>-&gt;(x) { x * 2 }</code></td><td><code>fn($x) =&gt; $x * 2</code></td></tr>
  <tr><td>Multi-line closure</td><td><code>lambda do … end</code></td><td><code>function ($x) use ($y) { … }</code></td></tr>
  <tr><td>Capture</td><td>everything, automatic, live</td><td><code>use ($y)</code>: listed, by value (snapshot)</td></tr>
  <tr><td>Live capture</td><td>(the default)</td><td><code>use (&amp;$y)</code></td></tr>
  <tr><td>Call it</td><td><code>f.call(x)</code>, <code>f.(x)</code>, <code>f[x]</code></td><td><code>$f($x)</code></td></tr>
  <tr><td>Accept one</td><td><code>def f(&amp;blk)</code> or a proc param</td><td><code>callable $f</code> or <code>Closure $f</code> parameter</td></tr>
  <tr><td>Pass a method</td><td><code>obj.method(:name)</code></td><td><code>$obj-&gt;name(...)</code> — first-class callable syntax</td></tr>
  <tr><td>Block-style API</td><td><code>items.each { … }</code> + <code>yield</code></td><td>no <code>yield</code> — pass the closure as an argument</td></tr>
</table>
<p>The mental model: a PHP closure is a frozen lunchbox, a Ruby closure is a
window into the kitchen. <code>use ($x)</code> packs a copy at creation time;
if the outer variable changes later, the closure never notices. Reach for
<code>use (&amp;$x)</code> only when you genuinely want shared mutable state —
like the counter — and enjoy that everywhere else, the snapshot semantics
kill a whole class of "who changed my captured variable?" bugs that Ruby
closures happily allow.</p>`,
};
