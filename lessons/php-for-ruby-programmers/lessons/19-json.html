  number: 19,
  title: "Working with JSON",

  intro: `
<p>No <code>require 'json'</code> — JSON support is built into PHP.
<code>data.to_json</code> becomes <code>json_encode($data)</code>, and
<code>JSON.parse(s)</code> becomes <code>json_decode($json, true)</code>.
That second argument matters: <strong>always pass <code>true</code></strong>.
Without it, JSON objects decode into <code>stdClass</code> objects with
<code>-&gt;</code> access instead of associative arrays — the same "why is
this an OpenStruct?" surprise, except it silently breaks every
<code>$data["key"]</code> lookup downstream.</p>
<table>
  <tr><th>Ruby</th><th>PHP</th></tr>
  <tr><td><code>require "json"</code></td><td>built in — nothing to require</td></tr>
  <tr><td><code>data.to_json</code></td><td><code>json_encode($data)</code></td></tr>
  <tr><td><code>JSON.parse(s)</code></td><td><code>json_decode($json, true)</code> — don't forget the <code>true</code></td></tr>
  <tr><td><code>JSON.parse(s)</code> raises on bad input</td><td>returns <code>null</code> silently (opt in with <code>JSON_THROW_ON_ERROR</code>)</td></tr>
  <tr><td><code>data.dig("a", "b") || default</code></td><td><code>$data["a"]["b"] ?? $default</code></td></tr>
  <tr><td><code>users.map { |u| u["name"] }</code></td><td><code>array_map(fn($u) =&gt; $u["name"], $users)</code></td></tr>
</table>
<p>The error-handling default is inverted from what you're used to:
<code>JSON.parse</code> raises <code>JSON::ParserError</code> on garbage,
but <code>json_decode</code> just returns <code>null</code> and moves on.
Pass <code>JSON_THROW_ON_ERROR</code> as the flags argument —
<code>json_decode($s, true, 512, JSON_THROW_ON_ERROR)</code> — to opt into
the Ruby behavior. Alternatively, lean on <code>??</code>: since missing
keys, <code>null</code> values, and a whole-decode failure all coalesce the
same way, a <code>??</code> chain gives you <code>dig</code>-with-default
resilience in one expression.</p>`,

  ruby: `require "json"

def to_json(data)
  data.to_json
end

def parse_user(json)
  data = JSON.parse(json) rescue {}   # JSON.parse RAISES on bad input
  {
    "name" => data.fetch("name", "unknown"),
    "age"  => data.fetch("age", 0),
  }
end

def pluck_names(json)
  JSON.parse(json).map { |u| u["name"] }
end

to_json({ "name" => "Yuki", "age" => 30 })  # '{"name":"Yuki","age":30}'
parse_user('{"name":"Riko"}')               # {"name"=>"Riko", "age"=>0}
pluck_names('[{"name":"Aoi"},{"name":"Riko"}]')  # ["Aoi", "Riko"]`,

  task: `
<p>Port the Ruby to PHP:</p>
<ol>
  <li><code>to_json(array $data): string</code> — <code>data.to_json</code>
      becomes <code>json_encode($data)</code>. Associative arrays encode as
      JSON objects; list arrays encode as JSON arrays.</li>
  <li><code>parse_user(string $json): array</code> — decode with
      <code>json_decode($json, true)</code>, then return an array with keys
      <code>"name"</code> (default <code>"unknown"</code>) and
      <code>"age"</code> (default <code>0</code>) using <code>??</code> —
      the <code>fetch</code>-with-default. Because <code>??</code> also
      swallows the <code>null</code> a failed decode returns, empty and
      invalid JSON both fall back to the defaults for free.</li>
  <li><code>pluck_names(string $json): array</code> — decode a JSON array of
      user objects and map each to its <code>"name"</code> with
      <code>array_map</code>.</li>
</ol>`,

  starter: `<?php

}
`,

  requirements: [
    { pattern: /json_encode/, message: "Encode with json_encode (Ruby's to_json)" },
    { pattern: /json_decode\s*\(\s*\$\w+\s*,\s*true\s*\)/, message: "Decode with json_decode($json, true) — associative arrays, not stdClass" },
    { pattern: /\?\?/, message: "Default missing keys with the ?? operator" },
  ],

  tests: [
    { name: "to_json encodes an associative array as a JSON object",
      code: "expect_eq(to_json([\"name\" => \"Yuki\", \"age\" => 30]), '{\"name\":\"Yuki\",\"age\":30}');" },
    { name: "to_json encodes a list as a JSON array",
      code: "expect_eq(to_json([1, 2, 3]), \"[1,2,3]\");" },
    { name: "parse_user returns both fields when present",
      code: "expect_eq(parse_user('{\"name\":\"Aoi\",\"age\":25}'), [\"name\" => \"Aoi\", \"age\" => 25]);" },
    { name: "parse_user defaults a missing age to 0",
      code: "expect_eq(parse_user('{\"name\":\"Riko\"}'), [\"name\" => \"Riko\", \"age\" => 0]);" },
    { name: "parse_user survives invalid JSON via ?? (decode returns null)",
      code: "expect_eq(parse_user('not json at all'), [\"name\" => \"unknown\", \"age\" => 0]);" },
    { name: "pluck_names maps a JSON array of users to their names",
      code: "expect_eq(pluck_names('[{\"name\":\"Aoi\"},{\"name\":\"Riko\"}]'), [\"Aoi\", \"Riko\"]);" },
  ],

  solution: `<?php

function to_json(array $data): string {
    return json_encode($data);
}

function parse_user(string $json): array {
    $data = json_decode($json, true);   // true -> arrays, not stdClass
    return [
        "name" => $data["name"] ?? "unknown",
        "age"  => $data["age"] ?? 0,
    ];
}

function pluck_names(string $json): array {
    $users = json_decode($json, true);
    return array_map(fn($u) => $u["name"], $users);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>PHP</th></tr>
  <tr><td>Library</td><td><code>require "json"</code></td><td>built in</td></tr>
  <tr><td>Encode</td><td><code>data.to_json</code></td><td><code>json_encode($data)</code></td></tr>
  <tr><td>Pretty print</td><td><code>JSON.pretty_generate(data)</code></td><td><code>json_encode($data, JSON_PRETTY_PRINT)</code></td></tr>
  <tr><td>Decode to hashes/arrays</td><td><code>JSON.parse(s)</code></td><td><code>json_decode($s, true)</code></td></tr>
  <tr><td>Decode to objects</td><td><code>JSON.parse(s, object_class: OpenStruct)</code></td><td><code>json_decode($s)</code> — the (surprising) default</td></tr>
  <tr><td>Bad input</td><td>raises <code>JSON::ParserError</code></td><td>returns <code>null</code>; add <code>JSON_THROW_ON_ERROR</code> to raise</td></tr>
  <tr><td>Last error</td><td>—</td><td><code>json_last_error_msg()</code></td></tr>
  <tr><td>Safe nested read</td><td><code>data.dig("a", "b") || default</code></td><td><code>$data["a"]["b"] ?? $default</code></td></tr>
</table>
<p>Burn the two defaults into memory, because both are the opposite of Ruby's:
<code>json_decode</code> gives you <em>objects</em> unless you pass
<code>true</code>, and it gives you <em>silence</em> on bad input unless you
pass <code>JSON_THROW_ON_ERROR</code>. The idiomatic modern call when you want
Ruby semantics end-to-end is
<code>json_decode($s, true, 512, JSON_THROW_ON_ERROR)</code> wrapped in a
<code>try/catch (JsonException $e)</code> — or, for tolerant code like today's
<code>parse_user</code>, skip the flag and let a <code>??</code> chain absorb
every failure mode in one line.</p>`,
};
