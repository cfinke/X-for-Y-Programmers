const LESSON = {
  number: 16,
  title: "Sorting",

  intro: `
<p>In C++ you sort with the free function <code>std::sort</code> from
<code>&lt;algorithm&gt;</code>: for plain numbers and strings,
<code>operator&lt;</code> already does the right thing, so
<code>std::sort(v.begin(), v.end())</code> handles both ascending numbers and
lexicographic strings with the same call. Go splits the job across the
<code>sort</code> package instead: ready-made helpers for the common cases —
<code>sort.Ints</code> and <code>sort.Strings</code> — and a general
<code>sort.Slice</code> that takes a <em>less</em> function returning
<code>bool</code>, much like the comparator you'd pass to
<code>std::sort</code>.</p>
<table>
  <tr><th>C++</th><th>Go</th></tr>
  <tr><td><code>std::sort(v.begin(), v.end());</code></td><td><code>sort.Ints(s)</code></td></tr>
  <tr><td><code>std::sort(w.begin(), w.end());</code> (lexicographic)</td><td><code>sort.Strings(s)</code></td></tr>
  <tr><td><code>std::sort(v.begin(), v.end(), [](auto&amp;a, auto&amp;b){ return a.age &lt; b.age; });</code></td><td><code>sort.Slice(s, func(i, j int) bool { return s[i].Age &lt; s[j].Age })</code></td></tr>
  <tr><td>sorts in place, returns nothing</td><td>sorts <strong>in place</strong>, returns nothing</td></tr>
</table>
<p>One habit to unlearn, one to recognize. To unlearn: Go's less function
receives <em>indices</em>, not the elements themselves, so you index back
into the slice with <code>s[i]</code> and <code>s[j]</code> — where a C++
comparator lambda receives the elements (or references to them) directly. To
recognize: both languages ask the same yes/no question — "does <code>i</code>
come before <code>j</code>?" — so like a C++ comparator, Go's less returns
<code>s[i] &lt; s[j]</code>, never a subtraction. And where C++'s
<code>std::sort</code> is <strong>not</strong> guaranteed stable — same as
Go's <code>sort.Slice</code> — reach for <code>std::stable_sort</code> (Go's
<code>sort.SliceStable</code>) when equal keys must keep their original
order.</p>`,

  cpp: `#include <algorithm>
#include <string>
#include <vector>

std::vector<int> nums = {3, 1, 2};
std::sort(nums.begin(), nums.end()); // {1, 2, 3}

struct Person {
    std::string name;
    int age;
};
std::vector<Person> people = {
    {"Bob", 30},
    {"Amy", 20},
};
std::sort(people.begin(), people.end(),
          [](const Person& a, const Person& b) { return a.age < b.age; }); // Amy, then Bob`,

  task: `
<p>Write these as package-level declarations (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>SortInts(nums []int) []int</code> — sort <code>nums</code> ascending with
      <code>sort.Ints</code> and return it.</li>
  <li><code>SortStrings(words []string) []string</code> — sort with
      <code>sort.Strings</code> and return it.</li>
  <li>A struct <code>type Person struct { Name string; Age int }</code> and
      <code>SortByAge(people []Person) []Person</code> that sorts youngest-first with
      <code>sort.Slice</code> and a less func comparing <code>Age</code>.</li>
  <li><code>SortStableByAge(people []Person) []Person</code> — same ordering, but use
      <code>sort.SliceStable</code> so people of equal age keep their input order.</li>
</ol>
<p>All four sort in place and return the same slice for convenient testing.</p>`,

  starter: `func SortInts(nums []int) []int {
	return nil // TODO: use sort.Ints
}

func SortStrings(words []string) []string {
	return nil // TODO: use sort.Strings
}

type Person struct {
	Name string
	Age  int
}

func SortByAge(people []Person) []Person {
	return nil // TODO: use sort.Slice with a less func on Age
}

func SortStableByAge(people []Person) []Person {
	return nil // TODO: use sort.SliceStable
}
`,

  requirements: [
    { pattern: /sort\.Ints/, message: "Use sort.Ints in SortInts" },
    { pattern: /sort\.Slice\(/, message: "Use sort.Slice with a less func in SortByAge" },
    { pattern: /sort\.SliceStable/, message: "Use sort.SliceStable in SortStableByAge" },
  ],

  tests: [
    { name: "SortInts orders ascending", code: "\t\texpect_eq(SortInts([]int{3, 1, 2}), []int{1, 2, 3})" },
    { name: "SortStrings orders lexicographically", code: "\t\texpect_eq(SortStrings([]string{\"pear\", \"apple\", \"fig\"}), []string{\"apple\", \"fig\", \"pear\"})" },
    { name: "SortByAge puts youngest first", code: "\t\tpeople := []Person{{Name: \"Bob\", Age: 30}, {Name: \"Amy\", Age: 20}}\n\t\texpect_eq(SortByAge(people), []Person{{Name: \"Amy\", Age: 20}, {Name: \"Bob\", Age: 30}})" },
    { name: "SortStableByAge keeps input order for equal ages", code: "\t\tpeople := []Person{{Name: \"Bob\", Age: 30}, {Name: \"Amy\", Age: 30}, {Name: \"Cy\", Age: 20}}\n\t\texpect_eq(SortStableByAge(people), []Person{{Name: \"Cy\", Age: 20}, {Name: \"Bob\", Age: 30}, {Name: \"Amy\", Age: 30}})" },
  ],

  solution: `func SortInts(nums []int) []int {
	sort.Ints(nums)
	return nums
}

func SortStrings(words []string) []string {
	sort.Strings(words)
	return words
}

type Person struct {
	Name string
	Age  int
}

func SortByAge(people []Person) []Person {
	sort.Slice(people, func(i, j int) bool {
		return people[i].Age < people[j].Age
	})
	return people
}

func SortStableByAge(people []Person) []Person {
	sort.SliceStable(people, func(i, j int) bool {
		return people[i].Age < people[j].Age
	})
	return people
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Go</th></tr>
  <tr><td>Sort numbers</td><td><code>std::sort(v.begin(), v.end());</code></td><td><code>sort.Ints(a)</code></td></tr>
  <tr><td>Sort strings</td><td><code>std::sort(v.begin(), v.end());</code></td><td><code>sort.Strings(a)</code></td></tr>
  <tr><td>Custom order</td><td><code>std::sort(v.begin(), v.end(), cmp);</code></td><td><code>sort.Slice(a, less)</code></td></tr>
  <tr><td>Comparator receives</td><td>elements (by reference)</td><td>indices (<code>i, j</code>)</td></tr>
  <tr><td>Comparator result</td><td><code>bool</code> (a before b?)</td><td><code>bool</code> (i before j?)</td></tr>
  <tr><td>Stable sort</td><td><code>std::stable_sort(v.begin(), v.end(), cmp);</code></td><td><code>sort.SliceStable(a, less)</code></td></tr>
</table>
<p>Because these functions mutate the slice in place, a caller who wants to keep the
original untouched must copy first — <code>c := append([]int(nil), nums...)</code> —
before sorting. C++ works the same way: <code>std::sort</code> returns <code>void</code>,
so if you need the original vector left alone, copy it first with
<code>std::vector&lt;int&gt; c = nums;</code> before sorting the copy — there's no
chainable, non-mutating variant on either side.</p>
<p>Modern Go (1.21+) adds the generic <code>slices</code> package:
<code>slices.Sort(nums)</code> works on any ordered type, and
<code>slices.SortFunc</code> / <code>slices.SortStableFunc</code> take a comparator
returning an <code>int</code> (use <code>cmp.Compare</code>) — closer in spirit to
C++20's three-way <code>&lt;=&gt;</code> spaceship operator than to the bool-returning
<code>sort.Slice</code>. The <code>sort.Slice</code> family remains the most common
idiom in existing code, which is why it is worth knowing first.</p>`,
};
