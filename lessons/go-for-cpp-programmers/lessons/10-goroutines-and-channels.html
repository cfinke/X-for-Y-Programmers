  title: "Goroutines & Channels",

  intro: `
<p>C++ concurrency is thread-based and explicit: you create a <code>std::thread</code>
that runs a function, coordinate with <code>std::mutex</code> or
<code>std::condition_variable</code>, and hand results back through a
<code>std::future</code> obtained from <code>std::async</code> or a
<code>std::promise</code>. Go's concurrency is also genuinely parallel, but the
primitives are lighter-weight and built into the language. You start a
<em>goroutine</em> — a cheap function that runs alongside yours, far cheaper than an
OS thread — with the <code>go</code> keyword, and goroutines talk to each other
through <em>channels</em>, typed pipes you send to with <code>ch &lt;- v</code> and
receive from with <code>v := &lt;-ch</code>.</p>
<table>
  <tr><th>C++</th><th>Go</th></tr>
  <tr><td><code>std::thread(doWork).detach();</code></td><td><code>go doWork()</code></td></tr>
  <tr><td>joining a group of <code>std::thread</code>s</td><td><code>var wg sync.WaitGroup; …; wg.Wait()</code></td></tr>
  <tr><td>a fulfilled <code>std::future&lt;T&gt;</code></td><td><code>ch chan T</code> (a value in flight)</td></tr>
  <tr><td><code>fut.get()</code></td><td><code>v := &lt;-ch</code></td></tr>
  <tr><td>reading a <code>std::queue&lt;T&gt;</code> under a lock until done</td><td><code>for v := range ch</code></td></tr>
</table>
<p>A channel is made with <code>make(chan T)</code>. An unbuffered channel blocks the
sender until someone receives; a <em>buffered</em> one, <code>make(chan T, n)</code>,
holds up to <code>n</code> values before blocking. When a producer is done it calls
<code>close(ch)</code>; a <code>for v := range ch</code> loop then drains the remaining
values and exits cleanly. To wait for a group of goroutines with no value to return,
use <code>sync.WaitGroup</code>: <code>Add(1)</code> before each, <code>Done()</code>
inside, and <code>Wait()</code> to block until the count hits zero. All of this is
deterministic when you collect results rather than sleep and hope.</p>`,

  cpp: `#include <future>
#include <numeric>
#include <vector>

int sumConcurrent(const std::vector<int>& nums) {
  std::vector<std::future<int>> parts;
  for (int n : nums) {
    parts.push_back(std::async(std::launch::async, [n] { return n; }));
  }
  int total = 0;
  for (auto& p : parts) total += p.get();
  return total;
}

std::vector<int> squareAll(const std::vector<int>& nums) {
  std::vector<std::future<int>> parts;
  for (int n : nums) {
    parts.push_back(std::async(std::launch::async, [n] { return n * n; }));
  }
  std::vector<int> result;
  for (auto& p : parts) result.push_back(p.get());
  return result;
}`,

<p>Write three package-level functions (no <code>package</code>, <code>import</code>,
or <code>main</code> — those are added for you). Keep them deterministic: collect
every result through a channel or a <code>WaitGroup</code>, never a

<ol>

</ol>`,

  solution: `func SumConcurrent(nums []int) int {
	ch := make(chan int)
	for _, n := range nums {
		go func(n int) {
			ch <- n
		}(n)
	}
	total := 0
	for range nums {
		total += <-ch
	}
	return total
}

func SquareAll(nums []int) []int {
	result := make([]int, len(nums))
	var wg sync.WaitGroup
	for i, n := range nums {
		wg.Add(1)
		go func(i, n int) {
			defer wg.Done()
			result[i] = n * n
		}(i, n)
	}
	wg.Wait()
	return result
}

func CountUp(n int) []int {
	ch := make(chan int, n)
	go func() {
		for i := 0; i < n; i++ {
			ch <- i
		}
		close(ch)
	}()
	out := make([]int, 0, n)
	for v := range ch {
		out = append(out, v)
	}
	return out
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Go</th></tr>
  <tr><td>Start async work</td><td><code>auto f = std::async(std::launch::async, work);</code></td><td><code>go work()</code></td></tr>
  <tr><td>Channel of T</td><td><code>std::future&lt;T&gt;</code> (roughly)</td><td><code>make(chan T)</code></td></tr>
  <tr><td>Send / receive</td><td><code>promise.set_value(v)</code> / <code>fut.get()</code></td><td><code>ch &lt;- v</code> / <code>v := &lt;-ch</code></td></tr>
  <tr><td>Buffered channel</td><td>bounded <code>std::queue</code> + condition variable</td><td><code>make(chan T, n)</code></td></tr>
  <tr><td>Signal "no more"</td><td>a sentinel value, or a flag under the lock</td><td><code>close(ch)</code></td></tr>
  <tr><td>Drain a stream</td><td>loop popping a locked queue until done</td><td><code>for v := range ch</code></td></tr>
  <tr><td>Wait for a group</td><td><code>for (auto&amp; t : threads) t.join();</code></td><td><code>wg.Wait()</code></td></tr>
</table>
<p>A few habits that keep concurrent Go correct. Pass loop variables into the
goroutine as arguments (<code>go func(n int){…}(n)</code>) or capture a fresh copy —
otherwise every goroutine may see the last value, the same trap as capturing a loop
variable by reference in a C++ lambda handed to <code>std::thread</code>. Only the
producer should <code>close</code> a channel, and only once; sending on a closed
channel panics, but receiving from one keeps yielding the zero value with
<code>ok == false</code>. Two goroutines writing the <em>same</em> map or slice
element is a data race, but writing <em>distinct</em> indices of a pre-sized slice
(as <code>SquareAll</code> does) is safe — much like two threads writing distinct
elements of a <code>std::vector</code> without a mutex. And whenever a test must be
deterministic, gather results through a channel or a <code>WaitGroup</code> — never a
<code>time.Sleep</code>, which only papers over the race.</p>`,
