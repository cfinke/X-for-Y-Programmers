const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>C++ checks types at compile time and keeps them around at runtime, and so does
Go — but Go's compiler is famously strict about it in ways C++ isn't: unused
variables and imports are errors, not warnings. The type goes <em>after</em> the
name, every type has a zero value, and Go never converts between numeric types
for you, even where C++ would happily do it implicitly.</p>
<table>
  <tr><th>C++</th><th>Go</th></tr>
  <tr><td><code>int age = 36;</code></td><td><code>var age int = 36</code></td></tr>
  <tr><td><code>auto age = 36;</code></td><td><code>age := 36</code> (declare + infer)</td></tr>
  <tr><td><code>name + " is " + std::to_string(age)</code></td><td><code>fmt.Sprintf("%s is %d", name, age)</code></td></tr>
  <tr><td><code>int</code>, <code>long</code>, <code>double</code>, …</td><td><code>int</code>, <code>int64</code>, <code>float64</code>, … (distinct)</td></tr>
</table>
<p>The <code>:=</code> operator is Go's <code>auto x = …</code>: declare and infer
in one step (only inside functions). There is no built-in string interpolation —
reach for <code>fmt.Sprintf</code> with verbs like <code>%s</code> and <code>%d</code>
instead of stream concatenation or <code>std::format</code>. And the numeric split
is strict: you cannot divide an <code>int</code> by <code>2</code> and get a
<code>float64</code> without an explicit <code>float64(n)</code> conversion — Go
has no implicit int-to-float promotion the way C++ does.</p>`,

  cpp: `int age = 36;
std::string userName = "Ada";

std::string describe(std::string name, int age) {
  return name + " is " + std::to_string(age);
}`,

  task: `
<p>Write the Go version as package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>Add(a, b int) int</code> returns their sum.</li>
  <li><code>Describe(name string, age int) string</code> returns a string like
      <code>"Ada is 36"</code> — use <code>fmt.Sprintf("%s is %d", name, age)</code>.</li>
  <li><code>Halve(n int) float64</code> returns half of <code>n</code>, so
      <code>Halve(7)</code> is <code>3.5</code>. Convert explicitly:
      <code>float64(n) / 2</code>.</li>
</ol>`,

  starter: `func Add(a, b int) int {
	return 0 // TODO
}

func Describe(name string, age int) string {
	return "" // TODO
}

func Halve(n int) float64 {
	return 0 // TODO: Go needs an explicit conversion
}
`,

  requirements: [
    { pattern: /func\s+Add/, message: "Define a function Add" },
    { pattern: /fmt\.Sprintf/, message: "Use fmt.Sprintf to build the string in Describe" },
    { pattern: /float64\(/, message: "Convert to float64 explicitly in Halve" },
  ],

  tests: [
    { name: "Add(2, 3) is 5", code: "\t\texpect_eq(Add(2, 3), 5)" },
    { name: "Describe(\"Ada\", 36) is \"Ada is 36\"", code: "\t\texpect_eq(Describe(\"Ada\", 36), \"Ada is 36\")" },
    { name: "Describe(\"Rob\", 68) is \"Rob is 68\"", code: "\t\texpect_eq(Describe(\"Rob\", 68), \"Rob is 68\")" },
    { name: "Halve(7) is 3.5", code: "\t\texpect_eq(Halve(7), 3.5)" },
    { name: "Halve(10) is 5.0", code: "\t\texpect_eq(Halve(10), 5.0)" },
  ],

  solution: `func Add(a, b int) int {
	return a + b
}

func Describe(name string, age int) string {
	return fmt.Sprintf("%s is %d", name, age)
}

func Halve(n int) float64 {
	return float64(n) / 2
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Go</th></tr>
  <tr><td>Typed variable</td><td><code>int x = 1;</code></td><td><code>var x int = 1</code></td></tr>
  <tr><td>Declare + infer</td><td><code>auto x = 1;</code></td><td><code>x := 1</code></td></tr>
  <tr><td>Constant</td><td><code>const int x = 1;</code></td><td><code>const x = 1</code></td></tr>
  <tr><td>Format string</td><td><code>std::to_string(x)</code></td><td><code>fmt.Sprintf("%v", x)</code></td></tr>
  <tr><td>Numeric convert</td><td>often implicit</td><td><code>float64(n)</code> (always explicit)</td></tr>
</table>
<p>Go's strictness is the theme of the whole language: an unused variable or a
missing conversion stops compilation, where C++ would silently narrow a
<code>double</code> to an <code>int</code> or promote an <code>int</code> to a
<code>double</code> for you. It feels heavy at first and pays off in code that
says exactly what it does. The zero value is the other habit to build — a
declared-but-unassigned <code>int</code> is <code>0</code>, a <code>string</code>
is <code>""</code>, and a <code>bool</code> is <code>false</code>, so there is no
uninitialized-variable footgun to guard against.</p>`,
};
