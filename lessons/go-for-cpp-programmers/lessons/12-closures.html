  number: 12,
  title: "Closures",

  intro: `
<p>A closure is a function that remembers the variables of the scope it was
created in. Go's closures capture by reference, the same way a C++ lambda does
when you write <code>[&amp;]</code> or name a variable in the capture list with
an <code>&amp;</code> prefix: the inner function keeps a live link to the
enclosing variable, not a copy, so mutating it persists across calls. But Go
never makes you choose a capture mode — every captured variable behaves as if
it were captured by reference, and the garbage collector keeps it alive on the
heap for as long as the closure exists.</p>
<table>
  <tr><th>C++</th><th>Go</th></tr>
  <tr><td><code>std::function&lt;int()&gt;</code></td><td><code>func() int</code></td></tr>
  <tr><td><code>std::function&lt;int(int)&gt;</code></td><td><code>func(int) int</code></td></tr>
  <tr><td><code>auto f = [&amp;]() { ... };</code></td><td><code>f := func() int { ... }</code></td></tr>
  <tr><td><code>int count = 0;</code> captured by reference</td><td><code>count := 0</code> captured</td></tr>
</table>
<p>Because the captured variable is shared, a factory that returns a closure hands
back a private, persistent piece of state — the same trick you would use in C++
with a lambda that captures by reference. The difference is safety: a C++ lambda
that captures a local variable by reference and then escapes the function that
declared it leaves that reference dangling once the stack frame is gone. Go has
no such trap — its compiler performs escape analysis and silently moves the
captured variable to the heap whenever a closure outlives its creating function.</p>`,

  cpp: `std::function<int()> makeCounter() {
  int count = 0;
  return [count]() mutable {
    count += 1;
    return count;
  };
}

auto next = makeCounter();
next(); // 1
next(); // 2`,

  task: `
<p>Write these package-level functions (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li><code>MakeCounter() func() int</code> returns a closure. Each call to the
      returned function increments a captured <code>count</code> and returns the
      new value: first call gives <code>1</code>, then <code>2</code>, and so on.</li>
  <li><code>MakeAdder(start int) func(int) int</code> captures <code>start</code>
      as a running total. Each call adds its argument to the total and returns the
      updated total, so <code>a := MakeAdder(10); a(5)</code> is <code>15</code>
      and a following <code>a(3)</code> is <code>18</code>.</li>
  <li><code>ApplyTwice(n int, f func(int) int) int</code> takes a closure as an
      argument and returns <code>f(f(n))</code>.</li>
</ol>`,

  starter: `func MakeCounter() func() int {
	return nil // TODO
}

func MakeAdder(start int) func(int) int {
	return nil // TODO
}

func ApplyTwice(n int, f func(int) int) int {
	return 0 // TODO
}
`,

  requirements: [
    { pattern: /func\(\)\s*int\s*{/, message: "Return an anonymous func() int closure from MakeCounter" },
    { pattern: /func\s+MakeAdder/, message: "Define MakeAdder that captures a running total" },
    { pattern: /f\(f\(/, message: "In ApplyTwice, call the closure twice: f(f(n))" },
  ],

  tests: [
    { name: "MakeCounter counts 1,2,3", code: "\t\tc := MakeCounter()\n\t\texpect_eq(c(), 1)\n\t\texpect_eq(c(), 2)\n\t\texpect_eq(c(), 3)" },
    { name: "Separate counters are independent", code: "\t\ta := MakeCounter()\n\t\tb := MakeCounter()\n\t\texpect_eq(a(), 1)\n\t\texpect_eq(a(), 2)\n\t\texpect_eq(b(), 1)" },
    { name: "MakeAdder accumulates", code: "\t\tadd := MakeAdder(10)\n\t\texpect_eq(add(5), 15)\n\t\texpect_eq(add(3), 18)" },
    { name: "ApplyTwice applies the closure twice", code: "\t\tdouble := func(x int) int { return x * 2 }\n\t\texpect_eq(ApplyTwice(3, double), 12)" },
  ],

  solution: `func MakeCounter() func() int {
	count := 0
	return func() int {
		count++
		return count
	}
}

func MakeAdder(start int) func(int) int {
	total := start
	return func(n int) int {
		total += n
		return total
	}
}

func ApplyTwice(n int, f func(int) int) int {
	return f(f(n))
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Go</th></tr>
  <tr><td>Anonymous function</td><td><code>[](int n) { return n * 2; }</code></td><td><code>func(n int) int { return n * 2 }</code></td></tr>
  <tr><td>Function type</td><td><code>std::function&lt;int()&gt;</code></td><td><code>func() int</code></td></tr>
  <tr><td>Captured, mutated var</td><td><code>[&amp;count]</code>, then <code>count += 1;</code></td><td><code>count++</code></td></tr>
  <tr><td>Closure factory</td><td><code>makeCounter()</code></td><td><code>MakeCounter()</code></td></tr>
  <tr><td>Closure as argument</td><td><code>std::function&lt;int(int)&gt;</code> parameter</td><td><code>ApplyTwice(n, f)</code></td></tr>
</table>
<p>The captured variable lives as long as the closure does. Go's garbage collector
keeps <code>count</code> alive even after <code>MakeCounter</code> returns, so the
state survives across calls, with no capture-mode decision to make. In C++ you'd
have to capture <code>count</code> by value (and mark the lambda <code>mutable</code>
to change that copy) precisely because capturing it by reference would leave a
dangling reference the moment <code>makeCounter</code> returns and its stack frame
is gone. Each call to the factory creates a fresh variable, which is why two
counters never share a value.</p>
<p>One Go-specific gotcha to remember for later lessons: before Go 1.22, a loop
variable was captured by reference and <em>shared</em> across iterations, so
closures made inside a <code>for</code> loop all saw the final value. Go 1.22 gave
each iteration its own copy — matching what a C++ range-based
<code>for (auto&amp; x : container)</code> loop already does, but not what an
index-based <code>for (int i = 0; i &lt; n; i++)</code> loop does, where a lambda
that captures <code>i</code> by reference still shares that one variable across
every iteration.</p>`,
};
