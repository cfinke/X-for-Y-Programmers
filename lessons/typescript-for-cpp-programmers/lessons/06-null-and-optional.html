<script>
const LESSON = {
  number: 6,
  title: "Null & Optional",

  intro: `
<p>C++ spells "might not have a value" at least three ways: a raw pointer that
might be <code>nullptr</code>, a <code>std::optional&lt;T&gt;</code>, or a
sentinel like <code>-1</code>. The compiler enforces none of them — you can
dereference a null pointer or call <code>.value()</code> on an empty optional,
and the punishment is UB or a thrown <code>bad_optional_access</code> at
runtime. TypeScript moves absence into the type system itself: a value that
might be missing has type <code>T | null</code> (or
<code>T | undefined</code>), and the compiler <em>refuses to compile</em> code
that touches it before you have checked. The <code>has_value()</code>
discipline you follow by convention becomes mandatory.</p>
<table>
  <tr><th>C++</th><th>TypeScript</th></tr>
  <tr><td><code>Widget* w = nullptr;</code></td><td><code>let w: Widget | null = null;</code></td></tr>
  <tr><td><code>std::optional&lt;std::string&gt; email;</code></td><td><code>email: string | null</code></td></tr>
  <tr><td><code>opt.value_or(fallback)</code></td><td><code>x ?? fallback</code></td></tr>
  <tr><td><code>if (opt.has_value()) use(opt.value());</code></td><td><code>if (x !== null) use(x);</code> — and the compiler <em>forces</em> the check</td></tr>
  <tr><td><code>if (p &amp;&amp; p-&gt;q) p-&gt;q-&gt;r</code></td><td><code>p?.q?.r</code></td></tr>
</table>
<p>Two operators do most of the work. Optional chaining <code>a?.b</code>
replaces the nested <code>if (p &amp;&amp; p-&gt;q)</code> pyramids: if
<code>a</code> is null/undefined the whole expression short-circuits to
<code>undefined</code> instead of crashing. Nullish coalescing
<code>x ?? def</code> is <code>value_or</code> as an operator: it yields
<code>def</code> only when <code>x</code> is <code>null</code> or
<code>undefined</code> (unlike <code>||</code>, it leaves <code>0</code> and
<code>""</code> alone). One wrinkle: JavaScript has <em>two</em> nullish
values — <code>null</code> (deliberate absence) and <code>undefined</code>
(never set, e.g. what <code>Array.find</code> returns on a miss). Both
<code>?.</code> and <code>??</code> treat them the same.</p>`,

  cpp: `#include <optional>
#include <string>

struct User {
    std::string name;
    std::optional<std::string> email;   // may be absent
};

std::optional<User> find_user(const std::string& name);

std::string get_email(const std::string& name) {
    auto user = find_user(name);
    if (user.has_value() && user->email.has_value()) {
        return user->email.value();   // forget the check -> throws
    }
    return "no email on file";        // the value_or path
}`,

  task: `
<p>The <code>User</code> interface and a small <code>users</code> array are
already in the editor. Port the two functions:</p>
<ol>
  <li>Write <code>findUser(name: string): User | null</code> — the
      <code>std::optional&lt;User&gt;</code> lookup. Use
      <code>users.find(...)</code>, which returns <code>undefined</code> on a
      miss, and convert that to <code>null</code> with <code>??</code>.</li>
  <li>Write <code>getEmail(name: string): string</code> — return the user's
      email, or <code>"no email on file"</code> if the user does not exist
      <em>or</em> their email is <code>null</code>. Replace the whole
      <code>has_value()</code> cascade with one expression:
      <code>findUser(name)?.email ?? "no email on file"</code>.</li>
</ol>
<p>Try writing <code>findUser(name).email</code> without the <code>?.</code> —
the compiler rejects it, because the result might be null. That is the
null-pointer dereference caught before the program ever runs.</p>`,

  starter: `interface User {
  name: string;
  email: string | null;   // std::optional<std::string> -> string | null
}

const users: User[] = [
  { name: "Ada", email: "ada@example.com" },
  { name: "Grace", email: null },
];

// 1. Return the matching user, or null when there is none.
//    C++: std::optional<User> find_user(const std::string& name)
function findUser(name: string): User | null {
  // TODO: users.find(...) gives undefined on a miss — turn it into null with ??
  return null;
}

// 2. Return the email, or "no email on file".
//    C++: the has_value() && ->email.has_value() cascade
function getEmail(name: string): string {
  // TODO: one line — chain with ?. and fall back with ??
  return "";
}
`,

  exportNames: ["findUser", "getEmail"],

  requirements: [
    { pattern: /\|\s*null/, message: "Model absence in the type system with a | null union" },
    { pattern: /\?\./, message: "Use optional chaining ?. instead of a nested null check" },
    { pattern: /\?\?/, message: "Use nullish coalescing ?? (the value_or of TypeScript)" },
  ],

  tests: [
    { name: 'findUser("Ada") returns the Ada record', run: (x) => expectDeepEqual(x.findUser("Ada"), { name: "Ada", email: "ada@example.com" }) },
    { name: 'findUser("Nobody") returns null (not undefined)', run: (x) => expectEqual(x.findUser("Nobody"), null) },
    { name: 'getEmail("Ada") returns "ada@example.com"', run: (x) => expectEqual(x.getEmail("Ada"), "ada@example.com") },
    { name: 'getEmail("Grace") falls back — her email is null', run: (x) => expectEqual(x.getEmail("Grace"), "no email on file") },
    { name: 'getEmail("Nobody") falls back — no such user', run: (x) => expectEqual(x.getEmail("Nobody"), "no email on file") },
  ],

  solution: `interface User {
  name: string;
  email: string | null;
}

const users: User[] = [
  { name: "Ada", email: "ada@example.com" },
  { name: "Grace", email: null },
];

function findUser(name: string): User | null {
  return users.find((u) => u.name === name) ?? null;
}

function getEmail(name: string): string {
  return findUser(name)?.email ?? "no email on file";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>TypeScript</th></tr>
  <tr><td>Maybe-absent value</td><td><code>std::optional&lt;T&gt;</code> / <code>T*</code></td><td><code>T | null</code> or <code>T | undefined</code></td></tr>
  <tr><td>Empty state</td><td><code>std::nullopt</code> / <code>nullptr</code></td><td><code>null</code> / <code>undefined</code></td></tr>
  <tr><td>Default on absence</td><td><code>opt.value_or(def)</code></td><td><code>x ?? def</code></td></tr>
  <tr><td>Presence check</td><td><code>opt.has_value()</code> (voluntary)</td><td><code>x !== null</code> (compiler-enforced before use)</td></tr>
  <tr><td>Chained access</td><td><code>if (p &amp;&amp; p-&gt;q) p-&gt;q-&gt;r</code></td><td><code>p?.q?.r</code></td></tr>
  <tr><td>Unchecked access</td><td><code>opt.value()</code> — throws / <code>*p</code> — UB</td><td>Does not compile</td></tr>
</table>
<p>The deep difference: <code>std::optional</code> is a library type that
politely asks you to check, and <code>nullptr</code> does not even ask.
<code>T | null</code> is a compiler obligation — after
<code>if (x !== null)</code> the type of <code>x</code> <em>narrows</em> from
<code>T | null</code> to plain <code>T</code>, so the checked and unchecked
states are literally different types. There is no <code>.value()</code>
escape hatch to throw at runtime, and no UB. The whole class of null-deref
bugs moves to compile time.</p>`,
};
