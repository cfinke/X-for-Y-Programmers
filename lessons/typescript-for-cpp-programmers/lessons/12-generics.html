<script>
const LESSON = {
  number: 12,
  title: "Generics",

  intro: `
<p><code>template&lt;typename T&gt;</code> becomes <code>&lt;T&gt;</code> after
the function name, and that is most of the syntax. The deeper difference is
<em>when errors surface</em>. A C++ template body is only fully checked at
instantiation — write <code>items.frnt()</code> and nothing happens until
someone calls the function, at which point the compiler produces the famous
40-line wall of instantiation context. A TypeScript generic is checked once,
at the <strong>declaration</strong>, against what the constraints guarantee
about <code>T</code>. If it compiles, every instantiation is valid. It feels
exactly like writing against a C++20 concept-constrained template — except
the body is held to the constraint too, not just the call site.</p>
<table>
  <tr><th>C++</th><th>TypeScript</th></tr>
  <tr><td><code>template &lt;typename T&gt; T f(T x)</code></td><td><code>function f&lt;T&gt;(x: T): T</code></td></tr>
  <tr><td><code>template &lt;std::integral T&gt;</code> / <code>enable_if</code></td><td><code>&lt;T extends number&gt;</code></td></tr>
  <tr><td>Body checked at instantiation</td><td>Body checked at declaration</td></tr>
  <tr><td><code>f&lt;int&gt;(5)</code> or deduction</td><td><code>f&lt;number&gt;(5)</code> or inference (usual)</td></tr>
  <tr><td>Member access: per-instantiation, offsetof tricks</td><td><code>&lt;K extends keyof T&gt;</code> — checked names</td></tr>
</table>
<p>What you give up: there is no partial or explicit specialization, no SFINAE,
and no template metaprogramming — you cannot compute in the type system the
way you can with <code>constexpr</code>-flavored template recursion.
(TypeScript does have conditional types, its own flavor of type-level
computation, but they are out of scope today.) What you gain is
<code>keyof</code>: <code>&lt;K extends keyof T&gt;</code> constrains a
parameter to the <em>member names</em> of <code>T</code>, giving you typed
member access by name — think of it as a compile-checked
<code>offsetof</code> whose result type is the member's actual type.</p>`,

  cpp: `#include <optional>
#include <vector>
#include <concepts>

template <typename T>
std::optional<T> first_item(const std::vector<T>& items) {
    if (items.empty()) return std::nullopt;
    return items.front();
}

// C++20 concept: the CALL is checked against the constraint,
// but the body is still only checked per instantiation.
template <std::integral T>
T twice(T value) { return value + value; }

// Generic member access means pointers-to-members or offsetof —
// nothing checks the member NAME generically:
//   auto ptr = &Widget::name;   // one specific member, one type`,

  task: `
<p>Write two generic functions:</p>
<ol>
  <li><code>firstItem&lt;T&gt;(items: T[]): T | undefined</code> — the
      <code>std::optional</code> pattern from the left, with
      <code>T | undefined</code> playing the role of
      <code>std::optional&lt;T&gt;</code>. Return the first element, or
      <code>undefined</code> for an empty array.</li>
  <li><code>pluck&lt;T, K extends keyof T&gt;(obj: T, key: K): T[K]</code> —
      typed member access by name. The constraint
      <code>K extends keyof T</code> means the compiler rejects
      <code>pluck(user, "nmae")</code> at the declaration of the call, and
      <code>T[K]</code> means the return type is the member's real type —
      <code>string</code> for <code>"name"</code>, <code>number</code> for
      <code>"age"</code>.</li>
</ol>
<p>Call them without angle brackets — <code>firstItem([1, 2, 3])</code> —
and let inference do what template argument deduction does in C++.</p>`,

  starter: `// 1. template <typename T> std::optional<T> first_item(...)
//    becomes a type parameter after the function name.
function firstItem<T>(items: T[]): T | undefined {
  // TODO: return the first element, or undefined if the array is empty
  return undefined;
}

// 2. Typed member access: constrain K to the member names of T.
//    TODO: add the type parameters <T, K extends keyof T>
//    and give it the signature (obj: T, key: K): T[K]
function pluck(obj: any, key: any): any {
  // TODO: return the member named by key
  return undefined;
}
`,

  exportNames: ["firstItem", "pluck"],

  requirements: [
    { pattern: /firstItem\s*<T\b/, message: "Declare firstItem with a type parameter <T> (the template<typename T> of TypeScript)" },
    { pattern: /T\s*\|\s*undefined/, message: "Return T | undefined — the std::optional<T> of this exercise" },
    { pattern: /extends\s+keyof/, message: "Constrain pluck's key with K extends keyof T (typed member access)" },
  ],

  tests: [
    { name: "firstItem([10, 20, 30]) returns 10", run: (x) => expectEqual(x.firstItem([10, 20, 30]), 10) },
    { name: 'firstItem(["alpha", "beta"]) returns "alpha" — same body, another T', run: (x) => expectEqual(x.firstItem(["alpha", "beta"]), "alpha") },
    { name: "firstItem([]) returns undefined (the nullopt case)", run: (x) => expectEqual(x.firstItem([]), undefined) },
    { name: 'pluck({name: "Ada", age: 36}, "name") returns "Ada"', run: (x) => expectEqual(x.pluck({ name: "Ada", age: 36 }, "name"), "Ada") },
    { name: 'pluck({name: "Ada", age: 36}, "age") returns 36', run: (x) => expectEqual(x.pluck({ name: "Ada", age: 36 }, "age"), 36) },
  ],

  solution: `function firstItem<T>(items: T[]): T | undefined {
  if (items.length === 0) {
    return undefined;
  }
  return items[0];
}

function pluck<T, K extends keyof T>(obj: T, key: K): T[K] {
  return obj[key];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>TypeScript</th></tr>
  <tr><td>Generic function</td><td><code>template &lt;typename T&gt; T f(T x)</code></td><td><code>function f&lt;T&gt;(x: T): T</code></td></tr>
  <tr><td>Constraint</td><td><code>template &lt;std::integral T&gt;</code>, <code>enable_if</code></td><td><code>&lt;T extends number&gt;</code></td></tr>
  <tr><td>Body checked</td><td>at each instantiation</td><td>once, at the declaration</td></tr>
  <tr><td>Deduction</td><td><code>f(5)</code> deduces <code>T = int</code></td><td><code>f(5)</code> infers <code>T = number</code></td></tr>
  <tr><td>Member-name constraint</td><td>none (offsetof / ptr-to-member)</td><td><code>&lt;K extends keyof T&gt;</code>, result <code>T[K]</code></td></tr>
  <tr><td>Specialization / SFINAE</td><td>yes</td><td>no — one body per generic</td></tr>
</table>
<p>Because generics are erased at runtime, there is exactly one function
underneath — no per-type instantiation, no code bloat, and also no
<code>if constexpr</code> to vary the body by type. If you find yourself
missing specialization, the TypeScript answer is usually a union type plus
narrowing (lesson 16), or overload signatures on a single implementation.
The constraint mindset transfers directly from concepts: say what
<code>T</code> must provide, and the compiler holds both callers <em>and the
body</em> to it.</p>`,
};
