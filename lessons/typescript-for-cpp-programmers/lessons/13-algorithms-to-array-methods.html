<div id="app"></div>
<script>
const LESSON = {
  number: 13,
  title: "Algorithms → Array Methods",

  intro: `
<p>Everything you do with <code>&lt;algorithm&gt;</code> plus iterator pairs,
JavaScript arrays do as <em>methods on the container</em>. No
<code>begin()/end()</code>, no <code>std::back_inserter</code>, no declaring
the output vector first: <code>.filter</code> and <code>.map</code> allocate
and return a fresh array, so a copy_if-then-transform pipeline collapses into
a chain — <code>products.filter(...).map(...)</code> — that reads top to
bottom like a range-v3 pipeline, but built in.</p>
<table>
  <tr><th>C++</th><th>TypeScript</th></tr>
  <tr><td><code>std::copy_if(v.begin(), v.end(), back_inserter(out), pred)</code></td><td><code>v.filter(pred)</code></td></tr>
  <tr><td><code>std::transform(v.begin(), v.end(), back_inserter(out), fn)</code></td><td><code>v.map(fn)</code></td></tr>
  <tr><td><code>std::accumulate(v.begin(), v.end(), 0.0, op)</code></td><td><code>v.reduce(op, 0)</code></td></tr>
  <tr><td><code>std::sort(v.begin(), v.end(), cmp)</code></td><td><code>[...v].sort(cmp)</code> — copy first!</td></tr>
</table>
<p>Two traps. First, <code>.sort()</code> is the one method that
<em>mutates</em>, exactly like <code>std::sort</code> — so when you want a
sorted copy, spread into a new array first: <code>[...v].sort(cmp)</code>.
Second, the comparator contract is <code>std::qsort</code>'s, not
<code>std::sort</code>'s: return a <strong>negative / zero / positive
number</strong>, not a boolean less-than. <code>(a, b) =&gt; a - b</code> is
the idiom for ascending numbers. Returning <code>a &lt; b</code> compiles
(booleans coerce to 0/1) and silently sorts wrong — and with no comparator at
all, numbers sort <em>lexicographically</em>: <code>[10, 9, 100]</code>
becomes <code>[10, 100, 9]</code>.</p>`,

  cpp: `std::vector<std::string> in_stock_names(const std::vector<Product>& ps) {
    std::vector<Product> in_stock;
    std::copy_if(ps.begin(), ps.end(), std::back_inserter(in_stock),
                 [](const Product& p) { return p.in_stock; });
    std::vector<std::string> names;
    std::transform(in_stock.begin(), in_stock.end(),
                   std::back_inserter(names),
                   [](const Product& p) { return p.name; });
    return names;
}

double total_value(const std::vector<Product>& ps) {
    return std::accumulate(ps.begin(), ps.end(), 0.0,
        [](double acc, const Product& p) { return acc + p.price; });
}

std::vector<Product> by_price(std::vector<Product> ps) {  // by value: copy
    std::sort(ps.begin(), ps.end(),
        [](const Product& a, const Product& b) { return a.price < b.price; });
    return ps;
}`,

  task: `
<p>The <code>Product</code> interface is defined in the starter. Port the
three functions:</p>
<ol>
  <li><code>inStockNames(products: Product[]): string[]</code> — chain
      <code>.filter</code> (keep <code>inStock</code>) into <code>.map</code>
      (extract <code>name</code>). One expression, no intermediate
      vectors.</li>
  <li><code>totalValue(products: Product[]): number</code> — use
      <code>.reduce</code> with an initial value of <code>0</code> to sum the
      prices, mirroring the <code>std::accumulate</code>.</li>
  <li><code>sortByPrice(products: Product[]): Product[]</code> — return a new
      array sorted by ascending price <em>without mutating the input</em>:
      spread into a copy, then <code>.sort</code> with a comparator that
      returns a number (<code>a.price - b.price</code>), not a boolean.</li>
</ol>`,

  starter: `interface Product {
  name: string;
  price: number;
  inStock: boolean;
}

// 1. copy_if + transform, as one chain on the array itself.
function inStockNames(products: Product[]): string[] {
  // TODO: products.filter(...).map(...)
  return [];
}

// 2. std::accumulate -> .reduce(op, initialValue)
function totalValue(products: Product[]): number {
  // TODO: sum the prices with .reduce
  return 0;
}

// 3. .sort mutates, like std::sort — copy first, and remember the
//    comparator returns negative/zero/positive, NOT a bool less-than.
function sortByPrice(products: Product[]): Product[] {
  // TODO: return [...products].sort(...)
  return products;
}
`,

  exportNames: ["inStockNames", "totalValue", "sortByPrice"],

  requirements: [
    { pattern: /\.filter\s*\(/, message: "Use .filter for the copy_if step" },
    { pattern: /\.map\s*\(/, message: "Use .map for the transform step" },
    { pattern: /\.reduce\s*\(/, message: "Use .reduce for the accumulate step" },
    { pattern: /\[\s*\.\.\./, message: "Copy before sorting: [...products].sort(...) — .sort mutates like std::sort" },
  ],

  tests: [
    {
      name: 'inStockNames keeps only in-stock products, in order: ["Keyboard", "Mouse"]',
      run: (x) => expectDeepEqual(
        x.inStockNames([
          { name: "Keyboard", price: 89.5, inStock: true },
          { name: "Monitor", price: 249.5, inStock: false },
          { name: "Mouse", price: 24.5, inStock: true },
        ]),
        ["Keyboard", "Mouse"]
      ),
    },
    {
      name: "totalValue sums all prices: 363.5",
      run: (x) => expectEqual(
        x.totalValue([
          { name: "Keyboard", price: 89.5, inStock: true },
          { name: "Monitor", price: 249.5, inStock: false },
          { name: "Mouse", price: 24.5, inStock: true },
        ]),
        363.5
      ),
    },
    {
      name: "totalValue of an empty array is 0 (the initial value)",
      run: (x) => expectEqual(x.totalValue([]), 0),
    },
    {
      name: "sortByPrice orders numerically — [10, 9, 100] must not sort as strings",
      run: (x) => expectDeepEqual(
        x.sortByPrice([
          { name: "A", price: 10, inStock: true },
          { name: "B", price: 9, inStock: true },
          { name: "C", price: 100, inStock: true },
        ]).map((p) => p.price),
        [9, 10, 100]
      ),
    },
    {
      name: "sortByPrice does NOT mutate its input (std::sort would have)",
      run: (x) => {
        const original = [
          { name: "Monitor", price: 249.5, inStock: false },
          { name: "Mouse", price: 24.5, inStock: true },
        ];
        x.sortByPrice(original);
        expectEqual(original[0].name, "Monitor");
        expectEqual(original[1].name, "Mouse");
      },
    },
  ],

  solution: `interface Product {
  name: string;
  price: number;
  inStock: boolean;
}

function inStockNames(products: Product[]): string[] {
  return products
    .filter((p) => p.inStock)
    .map((p) => p.name);
}

function totalValue(products: Product[]): number {
  return products.reduce((acc, p) => acc + p.price, 0);
}

function sortByPrice(products: Product[]): Product[] {
  return [...products].sort((a, b) => a.price - b.price);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>TypeScript</th></tr>
  <tr><td>Keep matching elements</td><td><code>std::copy_if</code> + <code>back_inserter</code></td><td><code>v.filter(pred)</code> — new array</td></tr>
  <tr><td>Element-wise transform</td><td><code>std::transform</code></td><td><code>v.map(fn)</code> — new array</td></tr>
  <tr><td>Fold</td><td><code>std::accumulate(b, e, init, op)</code></td><td><code>v.reduce(op, init)</code></td></tr>
  <tr><td>Sort</td><td><code>std::sort(b, e, cmp)</code> — mutates</td><td><code>v.sort(cmp)</code> — also mutates; copy with <code>[...v]</code></td></tr>
  <tr><td>Comparator</td><td>bool less-than</td><td>number: negative / 0 / positive</td></tr>
  <tr><td>Also handy</td><td><code>any_of / all_of / find_if</code></td><td><code>.some / .every / .find</code></td></tr>
</table>
<p>The mental shift: algorithms live on the container, they return fresh
arrays, and they compose by chaining. The comparator contract is the one
genuine footgun in this lesson — burn <code>(a, b) =&gt; a - b</code> into
muscle memory, because a boolean comparator or a bare <code>.sort()</code> on
numbers is a bug the type checker will not catch for you.</p>`,
};
