const LESSON = {
  number: 11,
  title: "Blocks, Procs & Lambdas",

  intro: `
<p>In C#, passing behavior means passing a delegate: your method declares a
<code>Func&lt;int, int&gt;</code> parameter and callers hand it a lambda,
<code>x =&gt; x * 2</code>. Ruby's everyday equivalent is the
<strong>block</strong> — a chunk of code attached <em>outside</em> the
parentheses of a call: <code>list.ForEach(x =&gt; ...)</code> becomes
<code>arr.each { |x| ... }</code>. The receiving method takes the block
<em>invisibly</em> — no <code>Func&lt;T, R&gt;</code> parameter appears in its
signature! — and invokes it with the <code>yield</code> keyword. It can ask
whether a caller actually attached one with <code>block_given?</code>.</p>
<table>
  <tr><th>C#</th><th>Ruby</th></tr>
  <tr><td><code>list.ForEach(x =&gt; Print(x));</code></td><td><code>arr.each { |x| puts x }</code></td></tr>
  <tr><td><code>int Apply(int x, Func&lt;int, int&gt; f) =&gt; f(x);</code></td><td><code>def apply(x) = yield(x)</code> (block is implicit)</td></tr>
  <tr><td><code>f is null ? x : f(x)</code></td><td><code>block_given? ? yield(x) : x</code></td></tr>
  <tr><td><code>Func&lt;int, int&gt; f = x =&gt; x * 2;</code></td><td><code>f = -&gt;(x) { x * 2 }</code></td></tr>
  <tr><td><code>f(4)</code></td><td><code>f.call(4)</code> (<em>not</em> <code>f(4)</code>)</td></tr>
  <tr><td><code>words.Select(s =&gt; s.ToUpper())</code></td><td><code>words.map(&amp;:upcase)</code></td></tr>
</table>
<p>When you need a first-class, storable, returnable function — the true
<code>Func&lt;T, R&gt;</code> analogue — Ruby has <strong>lambdas</strong>:
<code>-&gt;(x) { x * 2 }</code>. Unlike C# delegates you can't invoke one with
bare parens; you send it <code>.call</code>. And the ubiquitous
<code>&amp;:symbol</code> shorthand converts a method name into a block:
<code>map(&amp;:upcase)</code> is Ruby's <code>Select(s =&gt; s.ToUpper())</code>
in six characters.</p>`,

  csharp: `// C#: behavior travels as an explicit delegate parameter.
static int ApplyTwice(int x, Func<int, int> f) => f(f(x));

static int MaybeApply(int x, Func<int, int>? f) =>
    f is null ? x : f(x);

// A factory returning a closure over n.
static Func<int, int> MakeMultiplier(int n) => x => x * n;

static List<string> ShoutAll(List<string> words) =>
    words.Select(s => s.ToUpper()).ToList();

Console.WriteLine(ApplyTwice(3, x => x * 2));   // 12
Console.WriteLine(MaybeApply(5, null));         // 5
Console.WriteLine(MakeMultiplier(3)(4));        // 12`,

  task: `
<p>Rewrite the delegate-based C# in block-speak:</p>
<ol>
  <li><code>apply_twice(x)</code> — no function parameter at all; the caller
      attaches a block and you call it twice: <code>yield(yield(x))</code>.</li>
  <li><code>maybe_yield(x)</code> — the <code>Func&lt;int,int&gt;?</code>
      null-check becomes <code>block_given? ? yield(x) : x</code>.</li>
  <li><code>make_multiplier(n)</code> — return a first-class lambda,
      <code>-&gt;(x) { x * n }</code>; callers will invoke it with
      <code>.call</code>.</li>
  <li><code>shout_all(words)</code> — uppercase every word with the shorthand:
      <code>words.map(&amp;:upcase)</code>.</li>
</ol>
<p>Notice what's missing: <code>apply_twice</code> and <code>maybe_yield</code>
mention no callback in their parameter lists — the block arrives invisibly.</p>`,

  starter: `# 1. apply_twice: the block is invisible — no parameter. Call it twice:
#    C#: f(f(x))  ->  Ruby: yield(yield(x))

  raise NotImplementedError, "TODO: implement apply_twice"
end

# 2. maybe_yield: block_given? is the null-check on the invisible block.

  raise NotImplementedError, "TODO: implement maybe_yield"
end

# 3. make_multiplier: return a lambda ->(x) { ... } closing over n.
def make_multiplier(n)
  raise NotImplementedError, "TODO: implement make_multiplier"
end

# 4. shout_all: map(&:upcase) — Select(s => s.ToUpper()) in six characters.
def shout_all(words)
  raise NotImplementedError, "TODO: implement shout_all"
end
`,

  requirements: [
    { pattern: /yield/, message: "Call the invisible block with yield" },
    { pattern: /block_given\?/, message: "Guard maybe_yield with block_given?" },
    { pattern: /->\s*\(/, message: "Build the multiplier with the ->(x) { } lambda literal" },
    { pattern: /&:/, message: "Use the &:symbol shorthand in shout_all" },
  ],

  tests: [
    { name: "apply_twice(3) { |v| v * 2 } returns 12",
      code: "  expect_eq(apply_twice(3) { |v| v * 2 }, 12)" },
    { name: 'apply_twice("a") { |s| s + "!" } returns "a!!"',
      code: '  expect_eq(apply_twice("a") { |s| s + "!" }, "a!!")' },
    { name: "maybe_yield(5) { |v| v * 10 } returns 50",
      code: "  expect_eq(maybe_yield(5) { |v| v * 10 }, 50)" },
    { name: "maybe_yield(5) with no block returns 5",
      code: "  expect_eq(maybe_yield(5), 5)" },
    { name: "make_multiplier(3).call(4) returns 12",
      code: "  triple = make_multiplier(3)\n  expect_eq(triple.call(4), 12)\n  expect_eq(make_multiplier(10).call(7), 70)" },
    { name: 'shout_all(["hi", "there"]) returns ["HI", "THERE"]',
      code: '  expect_eq(shout_all(["hi", "there"]), ["HI", "THERE"])' },
  ],

  solution: `def apply_twice(x)
  yield(yield(x))
end

def maybe_yield(x)
  block_given? ? yield(x) : x
end

def make_multiplier(n)
  ->(x) { x * n }
end

def shout_all(words)
  words.map(&:upcase)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Ruby</th></tr>
  <tr><td>Pass behavior</td><td><code>Func&lt;int,int&gt; f</code> parameter</td><td>a block, outside the parens: <code>{ |x| ... }</code> or <code>do |x| ... end</code></td></tr>
  <tr><td>Invoke it</td><td><code>f(x)</code></td><td><code>yield(x)</code> — no parameter declared</td></tr>
  <tr><td>Was one passed?</td><td><code>f is null</code></td><td><code>block_given?</code></td></tr>
  <tr><td>First-class function</td><td><code>x =&gt; x * 2</code></td><td><code>-&gt;(x) { x * 2 }</code></td></tr>
  <tr><td>Call it</td><td><code>f(4)</code></td><td><code>f.call(4)</code> (also <code>f.(4)</code> or <code>f[4]</code>)</td></tr>
  <tr><td>Method-name shorthand</td><td><code>Select(s =&gt; s.ToUpper())</code></td><td><code>map(&amp;:upcase)</code></td></tr>
</table>
<p>The deep difference: a block is not a value. It rides along with exactly one
method call and is consumed by <code>yield</code>; you can't store two of them
or put one in a variable without converting it. When you need the real
<code>Func&lt;T,R&gt;</code> — stored, returned, passed twice — reach for a
lambda. Idiomatic Ruby uses blocks for the 95% case and lambdas for the
rest.</p>`,
};
