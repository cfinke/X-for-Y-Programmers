<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance & Modules",

  intro: `
<p>Inheritance is a single character: <code>class Circle &lt; Shape</code> is
your <code>class Circle : Shape</code>. Calling the base implementation is
<code>super</code> instead of <code>base(...)</code> — with one trap worth
flagging: <strong>bare <code>super</code> (no parentheses) automatically
forwards ALL of the current method's arguments</strong>. Write
<code>super()</code> — empty parens — when you mean "call the parent with
nothing". There's no <code>abstract</code> keyword either; the convention is
a base method that raises <code>NotImplementedError</code>, so forgetting an
override fails at <em>runtime</em>, not compile time.</p>
<table>
  <tr><th>C#</th><th>Ruby</th></tr>
  <tr><td><code>class Circle : Shape</code></td><td><code>class Circle &lt; Shape</code></td></tr>
  <tr><td><code>base(args)</code></td><td><code>super</code> (bare = forwards all args!)</td></tr>
  <tr><td><code>public abstract double Area();</code></td><td><code>def area; raise NotImplementedError; end</code></td></tr>
  <tr><td><code>public override double Area()</code></td><td><code>def area</code> (just redefine it)</td></tr>
  <tr><td><code>interface IGreetable</code> + default methods</td><td><code>module Greetable</code> + <code>include Greetable</code></td></tr>
</table>
<p>Where C# reaches for interfaces, Ruby reaches for <strong>modules as
mixins</strong>. <code>include Greetable</code> injects the module's methods
into the class as real instance methods, with full access to the including
class's state and methods — like C# default interface methods, minus the
restrictions (no casting to the interface type to reach them, no "can't have
state" dance). One class, many modules: it's how Ruby gets multiple
inheritance of <em>behavior</em> without multiple inheritance of classes.</p>`,

  csharp: `public abstract class Shape
{
    public abstract double Area();
    public string Describe() => $"This shape has area {Area()}";
}

public class Circle : Shape
{
    private readonly double _radius;
    public Circle(double radius) => _radius = radius;
    public override double Area() =>
        Math.Round(Math.PI * _radius * _radius, 2);
}

public interface IGreetable
{
    string Name { get; }
    string Greet() => $"Hi, I am {Name}";  // default interface method
}`,

  task: `
<p>Build the hierarchy and the mixin:</p>
<ol>
  <li><code>Shape</code> — the "abstract" base: <code>area</code> raises
      <code>NotImplementedError</code>, and <code>describe</code> returns
      <code>"This shape has area #{area}"</code> (interpolating
      <code>area</code>, so subclasses inherit it working).</li>
  <li><code>Circle &lt; Shape</code> — <code>initialize(radius)</code>
      stores <code>@radius</code>; <code>area</code> returns
      <code>(Math::PI * @radius ** 2).round(2)</code>.</li>
  <li><code>Rectangle &lt; Shape</code> — <code>initialize(width, height)</code>;
      <code>area</code> returns width times height.</li>
  <li><code>module Greetable</code> — a <code>greet</code> method returning
      <code>"Hi, I am #{name}"</code>. It calls <code>name</code> without
      knowing who defines it — the including class will.</li>
  <li><code>Robot</code> — <code>include Greetable</code>, plus
      <code>attr_reader :name</code> and <code>initialize(name)</code>.</li>
</ol>`,

  starter: `# 1. The "abstract" base. Ruby has no abstract keyword — the convention
#    is a method body that raises NotImplementedError.
class Shape
  def area
    raise NotImplementedError, "TODO: raise NotImplementedError for subclasses to override"
  end

  def describe
    raise NotImplementedError, "TODO: return the string, interpolating area into it"
  end
end

# 2. C#: class Circle : Shape  ->  Ruby: class Circle < Shape
class Circle < Shape
  def initialize(radius)
    raise NotImplementedError, "TODO: store @radius"
  end

  def area
    raise NotImplementedError, "TODO: (Math::PI * @radius ** 2).round(2)"
  end
end

# 3. Another subclass — width * height.
class Rectangle < Shape
  def initialize(width, height)
    raise NotImplementedError, "TODO: store @width and @height"
  end

  def area
    raise NotImplementedError, "TODO: multiply"
  end
end

# 4. The mixin: like a default interface method, but it becomes a real
#    instance method with access to the including class's state.
module Greetable
  def greet
    raise NotImplementedError, "TODO: return the greeting, interpolating name into it"
  end
end

# 5. Mix it in with include, and provide the name it relies on.
class Robot
  include Greetable

  def initialize(name)
    raise NotImplementedError, "TODO: store @name (and expose it with attr_reader)"
  end
end
`,

  requirements: [
    { pattern: /<\s*Shape/, message: "Inherit with < Shape (C#'s : Shape)" },
    { pattern: /NotImplementedError/, message: "The abstract method raises NotImplementedError" },
    { pattern: /module\s+Greetable/, message: "Define module Greetable" },
    { pattern: /include\s+Greetable/, message: "Mix the module in with include Greetable" },
  ],

  tests: [
    { name: "Circle.new(1).area is 3.14 and Circle.new(2).area is 12.57",
      code: "  expect_eq(Circle.new(1).area, 3.14)\n  expect_eq(Circle.new(2).area, 12.57)" },
    { name: "Rectangle.new(3, 4).area is 12",
      code: "  expect_eq(Rectangle.new(3, 4).area, 12)" },
    { name: 'describe is inherited: Circle.new(1).describe is "This shape has area 3.14"',
      code: '  expect_eq(Circle.new(1).describe, "This shape has area 3.14")' },
    { name: "Shape.new.area raises NotImplementedError (the abstract convention)",
      code: "  raised = false\n  begin\n    Shape.new.area\n  rescue NotImplementedError\n    raised = true\n  end\n  expect_true(raised)" },
    { name: 'Robot.new("R2-D2").greet is "Hi, I am R2-D2" via the Greetable mixin',
      code: '  expect_eq(Robot.new("R2-D2").greet, "Hi, I am R2-D2")' },
    { name: "a Circle is_a Shape (real inheritance, not just shared shape)",
      code: "  expect_true(Circle.new(1).is_a?(Shape))" },
  ],

  solution: `class Shape
  def area
    raise NotImplementedError, "subclasses must implement area"
  end

  def describe
    "This shape has area #{area}"
  end
end

class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    (Math::PI * @radius ** 2).round(2)
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    @width * @height
  end
end

module Greetable
  def greet
    "Hi, I am #{name}"
  end
end

class Robot
  include Greetable

  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Ruby</th></tr>
  <tr><td>Inherit</td><td><code>class Circle : Shape</code></td><td><code>class Circle &lt; Shape</code></td></tr>
  <tr><td>Call base method</td><td><code>base.Describe()</code> / <code>base(args)</code></td><td><code>super</code> (bare forwards ALL args; <code>super()</code> forwards none)</td></tr>
  <tr><td>Abstract member</td><td><code>abstract</code> (compile-time)</td><td><code>raise NotImplementedError</code> (runtime convention)</td></tr>
  <tr><td>Override</td><td><code>override</code> keyword required</td><td>just define the method again</td></tr>
  <tr><td>Interface + defaults</td><td><code>interface IGreetable { string Greet() =&gt; ...; }</code></td><td><code>module Greetable</code> + <code>include</code></td></tr>
  <tr><td>Type check</td><td><code>c is Shape</code></td><td><code>c.is_a?(Shape)</code></td></tr>
</table>
<p>Modules are the bigger idea here. A C# default interface method can't see
instance fields and is only callable through the interface type; a mixed-in
Ruby method is indistinguishable from one written in the class — it reads
<code>@ivars</code>, calls other methods (our <code>greet</code> just trusts
that <code>name</code> exists), and participates in <code>super</code>'s
method-lookup chain. Ruby's standard library runs on this:
<code>include Comparable</code> gives you <code>&lt;</code>,
<code>&gt;</code>, <code>between?</code> for free once you define
<code>&lt;=&gt;</code> — an entire interface implemented <em>for</em> you,
not by you.</p>`,
};
