  title: "Nil & Safe Navigation",

  intro: `
<p>C#'s <code>null</code> is Ruby's <code>nil</code> — and it will feel
familiar fast. Your <code>?.</code> becomes <code>&amp;.</code> (the
<em>safe navigation operator</em>, same idea, ampersand instead of question
mark), and your <code>??</code> becomes plain old <code>||</code>. There are
no nullable reference types and no compiler warnings; instead, <code>nil</code>
is a real object (an instance of <code>NilClass</code>) that you can ask
questions of: <code>x.nil?</code> is the idiomatic
<code>x is null</code>.</p>
<table>
  <tr><th>C#</th><th>Ruby</th></tr>
  <tr><td><code>null</code></td><td><code>nil</code></td></tr>
  <tr><td><code>user?.Address?.City</code></td><td><code>user&amp;.address&amp;.city</code></td></tr>
  <tr><td><code>value ?? fallback</code></td><td><code>value || fallback</code></td></tr>
  <tr><td><code>_cache ??= Load();</code></td><td><code>@cache ||= load</code></td></tr>
  <tr><td><code>x is null</code></td><td><code>x.nil?</code></td></tr>
</table>
<p>If you've ever written JavaScript, you may distrust <code>||</code> as a
default operator — in JS it eats <code>0</code> and <code>""</code>, which is
exactly why <code>??</code> was invented. Ruby dodges that trap by design:
<strong>only <code>nil</code> and <code>false</code> are falsy</strong>.
Zero is truthy. The empty string is truthy. So <code>stored || default</code>
in Ruby behaves like C#'s <code>??</code> — a stored <code>0</code> sails
right through — with the simplicity of a plain <code>||</code>. The related
idiom <code>@cache ||= expensive_call</code> is your <code>??=</code> lazy
initializer, and you will see it everywhere in Ruby code.</p>`,

  csharp: `public record Address(string City);
public record User(Address? Address);

string GetCity(User? user) =>
    user?.Address?.City ?? "Unknown";

int Pick(Dictionary<string, int> map, string key, int fallback) =>
    map.TryGetValue(key, out var value) ? value : fallback;

T FirstOrDefault<T>(List<T> items, T fallback) =>
    items.Count > 0 ? items[0] : fallback;

// Lazy initialization with ??=
private List<string>? _tags;
public List<string> Tags => _tags ??= new List<string>();`,

  task: `
<p>The starter defines <code>Address</code> and <code>User</code> for you
(a user's <code>address</code> may be <code>nil</code>). Implement three
methods:</p>
<ol>
  <li><code>get_city(user)</code> — return the user's address's city, or
      <code>"Unknown"</code> if the user is <code>nil</code>, has no address,
      or the address has no city. Chain <code>&amp;.</code> exactly like you
      would chain <code>?.</code>, then bolt on <code>|| "Unknown"</code>.</li>
  <li><code>pick(hash, key, default)</code> — return <code>hash[key]</code>,
      falling back to <code>default</code> when the key is missing. In Ruby,
      <code>hash[key] || default</code> is safe even when the stored value is
      <code>0</code> — zero is truthy. The tests check that a stored

</ol>`,

  solution: `class Address
  attr_reader :city

  def initialize(city)
    @city = city
  end
end

class User
  attr_reader :address

  def initialize(address = nil)
    @address = address
  end
end

def get_city(user)
  user&.address&.city || "Unknown"
end

def pick(hash, key, default)
  hash[key] || default
end

def first_or_default(arr, default)
  arr.first || default
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Ruby</th></tr>
  <tr><td>The null value</td><td><code>null</code></td><td><code>nil</code> (a real object: <code>NilClass</code>)</td></tr>
  <tr><td>Safe navigation</td><td><code>a?.B?.C</code></td><td><code>a&amp;.b&amp;.c</code></td></tr>
  <tr><td>Null-coalescing</td><td><code>x ?? fallback</code></td><td><code>x || fallback</code></td></tr>
  <tr><td>Lazy init</td><td><code>x ??= Load();</code></td><td><code>x ||= load</code></td></tr>
  <tr><td>Null check</td><td><code>x is null</code></td><td><code>x.nil?</code></td></tr>
  <tr><td>Falsy values</td><td>n/a (bool only)</td><td>exactly <code>nil</code> and <code>false</code></td></tr>
</table>
<p>The one caveat worth memorizing: because <code>false</code> is falsy,
<code>flag || default</code> is wrong when a legitimately stored
<code>false</code> must survive — for booleans, reach for
<code>hash.fetch(:flag, default)</code> or an explicit <code>.nil?</code>
check instead. For everything else — numbers, strings, arrays —
<code>||</code> gives you <code>??</code>'s safety with none of the
ceremony, because Ruby's truthiness never conflates "empty" or "zero"
with "absent".</p>`,
};
