<p>Time to put it all together. This capstone builds a tiny arithmetic
<strong>evaluator</strong> — the same shape you would write in Java with a
sealed interface and a recursive pattern-matching <code>switch</code>, but
leaning on the Kotlin features from the whole course at once:</p>
<table>
  <tr><th>Feature (Java)</th><th>Feature (Kotlin)</th></tr>
  <tr><td><code>sealed interface Expr permits ...</code></td><td><code>sealed interface Expr</code></td></tr>
  <tr><td><code>record Num(double value) implements Expr</code></td><td><code>data class Num(...) : Expr</code></td></tr>
  <tr><td><code>switch (node) { case Num n -&gt; ... }</code></td><td>exhaustive <code>when (node)</code> with smart casts</td></tr>
  <tr><td><code>Map&lt;String, Double&gt;</code> lookup, maybe <code>null</code></td><td><code>Map&lt;String, Double&gt;</code> lookup returning <code>Double?</code></td></tr>
  <tr><td><code>list.stream().map(...).filter(Objects::nonNull).toList()</code></td><td><code>list.mapNotNull { ... }</code></td></tr>
</table>
<p>An expression is a tree: a literal number, a variable reference, or a binary
operation whose operands are themselves expressions. Evaluation is recursive and
can <em>fail</em> — a variable might be unbound, or you might divide by zero — so
the result type is a nullable <code>Double?</code>, and <code>null</code> is your
"could not evaluate" signal. This is the payoff of the course: closed type
hierarchies, structural data, collection pipelines, and null safety working
together on one small program.</p>`,

  java: `sealed interface Expr permits Num, Var, BinOp {}

record Num(double value) implements Expr {}
record Var(String name) implements Expr {}
record BinOp(String op, Expr left, Expr right) implements Expr {}

static Double evaluate(Expr e, Map<String, Double> env) {
    return switch (e) {
        case Num n -> n.value();
        case Var v -> env.get(v.name());
        case BinOp b -> {
            Double l = evaluate(b.left(), env);
            Double r = evaluate(b.right(), env);
            if (l == null || r == null) yield null;
            yield switch (b.op()) {
                case "+" -> l + r;
                case "-" -> l - r;
                case "*" -> l * r;
                case "/" -> r == 0 ? null : l / r;
                default -> null;
            };
        }
    };
}`,

  solution: `sealed interface Expr
data class Num(val value: Double) : Expr
data class Var(val name: String) : Expr
data class BinOp(val op: String, val left: Expr, val right: Expr) : Expr

fun eval(expr: Expr, env: Map<String, Double>): Double? = when (expr) {
    is Num -> expr.value
    is Var -> env[expr.name]
    is BinOp -> {
        val l = eval(expr.left, env)
        val r = eval(expr.right, env)
        if (l == null || r == null) null
        else when (expr.op) {
            "+" -> l + r
            "-" -> l - r
            "*" -> l * r
            "/" -> if (r == 0.0) null else l / r
            else -> null
        }
    }
}

fun variables(expr: Expr): Set<String> = when (expr) {
    is Num -> emptySet()
    is Var -> setOf(expr.name)
    is BinOp -> variables(expr.left) + variables(expr.right)
}

fun evalAll(exprs: List<Expr>, env: Map<String, Double>): List<Double> =
    exprs.mapNotNull { eval(it, env) }
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Kotlin</th></tr>
  <tr><td>Node hierarchy</td><td><code>sealed interface</code> + <code>record</code> variants</td><td><code>sealed interface</code> + <code>data class</code></td></tr>
  <tr><td>Recursive dispatch</td><td><code>switch (e) { case Num n -&gt; }</code></td><td>exhaustive <code>when (e)</code></td></tr>
  <tr><td>Narrowing a variant</td><td>pattern variable binding (<code>Num n</code>)</td><td>smart cast after <code>is</code></td></tr>
  <tr><td>Missing value</td><td><code>Double</code> (boxed) possibly <code>null</code></td><td><code>Double?</code></td></tr>
  <tr><td>Map/filter out nulls</td><td><code>.map(...).filter(Objects::nonNull)</code></td><td><code>.mapNotNull { }</code></td></tr>
</table>
<p>Notice how little glue this took: no <code>default</code> branch on the outer
<code>when</code> (the compiler knows the three variants are exhaustive, and will
force you to update it if you add a <code>Neg</code> node), no manual equality for
the <code>data class</code> nodes, and <code>mapNotNull</code> folding the
map-then-filter into one pass while carrying the nullability through the types.
Java's Java 21 pattern-matching <code>switch</code> over a sealed hierarchy gets
you the same exhaustiveness check at compile time, but Kotlin's nullable types
(<code>Double?</code>) make the "could not evaluate" case part of the function's
signature instead of an implicit possibility with boxed <code>Double</code>. From
here you could grow this into a real interpreter — add a
<code>data class Let(val name: String, ...)</code> variant, or return a
<code>sealed</code> <code>Result</code> instead of <code>null</code> to carry an
error message — and the compiler will walk you through every <code>when</code>
that needs the new case.</p>`,
