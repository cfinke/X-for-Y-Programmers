  title: "Vectors",

  intro: `
<p>A Kotlin <code>MutableList&lt;T&gt;</code> (typically backed by an
<code>ArrayList</code>) is a growable, ordered list, and it is the collection
you reach for by default. C++ gives you the same everyday tool under a
different name: <code>std::vector&lt;T&gt;</code>. It stores its elements
contiguously, grows as you push onto it, and — much like Kotlin's typed
lists — holds exactly one element type, fixed at compile time.</p>
<table>
  <tr><th>Kotlin</th><th>C++</th></tr>
  <tr><td><code>val xs = mutableListOf&lt;Int&gt;()</code></td><td><code>std::vector&lt;int&gt; xs;</code></td></tr>
  <tr><td><code>xs.add(5)</code></td><td><code>xs.push_back(5);</code></td></tr>
  <tr><td><code>xs[0]</code></td><td><code>xs[0]</code> or <code>xs.at(0)</code></td></tr>
  <tr><td><code>xs.size</code></td><td><code>xs.size()</code></td></tr>
  <tr><td><code>for (x in xs)</code></td><td><code>for (int x : xs)</code></td></tr>
</table>
<p>Two things to note. First, C++'s <code>xs.size()</code> returns an
unsigned integer (<code>std::size_t</code>), not a signed <code>Int</code>
like Kotlin's <code>xs.size</code>. Second, there are two ways to index:
<code>xs[i]</code> is fast but unchecked (out of range is undefined
behavior), while <code>xs.at(i)</code> does bounds-checking and throws
<code>std::out_of_range</code> — the closer analogue to Kotlin's
<code>xs[i]</code>, which throws <code>IndexOutOfBoundsException</code> on a
bad index.</p>`,

  kotlin: `fun evensUpTo(n: Int): List<Int> {
    val out = mutableListOf<Int>()
    for (i in 0..n) {
        if (i % 2 == 0) out.add(i)
    }
    return out
}

fun sum(xs: List<Int>): Int {
    var total = 0
    for (x in xs) total += x
    return total
}`,

  task: `
<p>Write these free functions that build and query
<code>std::vector&lt;int&gt;</code>:</p>
<ol>
  <li><code>evensUpTo(int n)</code> returns a vector of every even number from
      <code>0</code> to <code>n</code> inclusive. Build it with
      <code>push_back</code>.</li>
  <li><code>sum(const std::vector&lt;int&gt;&amp; xs)</code> returns the total of
      all elements. Use a range-based <code>for</code>.</li>
  <li><code>at(const std::vector&lt;int&gt;&amp; xs, int i)</code> returns the

  <li><code>withoutFirst(std::vector&lt;int&gt; xs)</code> takes a vector
      <em>by value</em>, erases its first element with
      <code>xs.erase(xs.begin())</code>, and returns it. (Erasing from an empty
      vector is undefined; assume at least one element.)</li>
</ol>`,

  starter: `std::vector<int> evensUpTo(int n) {

`,

  requirements: [
    { pattern: /push_back/, message: "Use push_back to grow the vector in evensUpTo" },

    { name: "evensUpTo(1) is {0}", code: "    expect_eq(evensUpTo(1), (std::vector<int>{0}));" },
    { name: "sum({1,2,3,4}) is 10", code: "    expect_eq(sum(std::vector<int>{1, 2, 3, 4}), 10);" },
    { name: "sum({}) is 0", code: "    expect_eq(sum(std::vector<int>{}), 0);" },
    { name: "at({10,20,30}, 1) is 20", code: "    expect_eq(at(std::vector<int>{10, 20, 30}, 1), 20);" },
    { name: "withoutFirst({5,6,7}) is {6,7}", code: "    expect_eq(withoutFirst(std::vector<int>{5, 6, 7}), (std::vector<int>{6, 7}));" },
  ],

  solution: `std::vector<int> evensUpTo(int n) {
  std::vector<int> out;
  for (int i = 0; i <= n; i++) {
    if (i % 2 == 0) out.push_back(i);
  }
  return out;
}

int sum(const std::vector<int>& xs) {
  int total = 0;
  for (int x : xs) total += x;
  return total;
}

int at(const std::vector<int>& xs, int i) {
  return xs.at(i);
}

std::vector<int> withoutFirst(std::vector<int> xs) {
  xs.erase(xs.begin());
  return xs;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>C++</th></tr>
  <tr><td>Empty list</td><td><code>val xs = mutableListOf&lt;T&gt;()</code></td><td><code>std::vector&lt;T&gt; xs;</code></td></tr>
  <tr><td>Append</td><td><code>xs.add(v)</code></td><td><code>xs.push_back(v)</code></td></tr>
  <tr><td>Length</td><td><code>xs.size</code></td><td><code>xs.size()</code></td></tr>
  <tr><td>Checked index</td><td><code>xs[i]</code> (throws)</td><td><code>xs.at(i)</code> (throws)</td></tr>
  <tr><td>Remove at index</td><td><code>xs.removeAt(0)</code></td><td><code>xs.erase(xs.begin())</code></td></tr>
  <tr><td>Insert at index</td><td><code>xs.add(0, v)</code></td><td><code>xs.insert(xs.begin(), v)</code></td></tr>
</table>
<p>The big mental shift is <em>copy vs. reference</em>. A parameter of type
<code>std::vector&lt;int&gt;</code> (by value) is a full copy — mutating it does
not touch the caller's vector, which is why <code>withoutFirst</code> can erase
freely and hand back the result. A parameter of type
<code>const std::vector&lt;int&gt;&amp;</code> (by <code>const</code> reference)
avoids the copy and is the default for read-only access. In Kotlin every
<code>MutableList</code> is passed by reference (it's an object reference,
same as in Java); in C++ you choose per parameter whether to copy or share.</p>
<p><code>erase</code> and <code>insert</code> take <em>iterators</em>, not
indices: <code>xs.begin()</code> points at the first element, and you can offset
it with <code>xs.begin() + i</code>. That is the C++ equivalent of the index
arithmetic <code>removeAt</code> and <code>add(index, value)</code> hide for
you.</p>`,
