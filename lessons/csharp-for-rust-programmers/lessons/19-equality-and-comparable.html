  intro: `
<p>In Rust, a struct has no <code>==</code> at all until it implements
<code>PartialEq</code> — compare two structs without deriving or writing that
trait, and the compiler refuses to build, rather than silently comparing by
reference. When every field supports it,
<code>#[derive(PartialEq, Eq, PartialOrd, Ord, Hash)]</code> generates
equality, ordering, and hashing in one line, comparing fields in declaration
order. C# takes the opposite default: every class and struct already has
<code>==</code> and <code>.Equals()</code> (reference equality for classes,
bitwise for structs) — you override a handful of members to change what
equality and ordering <em>mean</em>, and then <code>==</code>,
<code>.Equals()</code>, hash-based collections, and
<code>List&lt;T&gt;.Sort()</code> all cooperate with your type.</p>
<table>
  <tr><th>Rust</th><th>C#</th></tr>
  <tr><td><code>#[derive(PartialEq)]</code> or <code>impl PartialEq for T</code></td><td><code>a == b</code> (you can define it)</td></tr>
  <tr><td><code>a == b</code> via <code>PartialEq::eq</code></td><td><code>a.Equals(b)</code> via <code>IEquatable&lt;T&gt;</code></td></tr>
  <tr><td><code>#[derive(Hash)]</code> for a <code>HashMap</code> key</td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td><code>vec.sort()</code> via derived/implemented <code>Ord</code></td><td><code>list.Sort()</code> via <code>IComparable&lt;T&gt;</code></td></tr>
</table>
<p>The one firm rule in C#: <strong>if you override <code>Equals</code>, you
must also override <code>GetHashCode</code></strong>, and equal objects must
return equal hash codes — otherwise <code>Dictionary</code> and
<code>HashSet</code> will lose your keys. Rust enforces something similar
structurally: <code>#[derive(Hash)]</code> and <code>#[derive(Eq)]</code> walk
the same fields in the same order, so the derived implementations can't drift
apart the way a hand-written C# pair can. Implement
<code>IEquatable&lt;T&gt;</code> for a strongly-typed, allocation-free
<code>Equals(T)</code>, and <code>IComparable&lt;T&gt;</code> so sorting and
<code>SortedSet</code> know the order. Overloading <code>==</code> is a nicety
layered on top of <code>Equals</code>.</p>`,

  rust: `#[derive(PartialEq, Eq, PartialOrd, Ord)]
struct SemVer {
    major: u32,
    minor: u32,
    patch: u32,
}

let mut versions = vec![
    SemVer { major: 1, minor: 2, patch: 0 },
    SemVer { major: 1, minor: 0, patch: 5 },
];
versions.sort(); // derived Ord compares fields in declaration order`,

  solution: `class SemVer : IEquatable<SemVer>, IComparable<SemVer> {
  public int Major { get; }
  public int Minor { get; }
  public int Patch { get; }

  public SemVer(int major, int minor, int patch) {
    Major = major;
    Minor = minor;
    Patch = patch;
  }

  public bool Equals(SemVer other) {
    if (ReferenceEquals(other, null)) return false;
    return Major == other.Major && Minor == other.Minor && Patch == other.Patch;
  }

  public override bool Equals(object obj) {
    return Equals(obj as SemVer);
  }

  public override int GetHashCode() {
    unchecked {
      int hash = 17;
      hash = hash * 31 + Major;
      hash = hash * 31 + Minor;
      hash = hash * 31 + Patch;
      return hash;
    }
  }

  public int CompareTo(SemVer other) {
    if (ReferenceEquals(other, null)) return 1;
    int c = Major.CompareTo(other.Major);
    if (c != 0) return c;
    c = Minor.CompareTo(other.Minor);
    if (c != 0) return c;
    return Patch.CompareTo(other.Patch);
  }

  public static bool operator ==(SemVer a, SemVer b) {
    if (ReferenceEquals(a, b)) return true;
    if (ReferenceEquals(a, null) || ReferenceEquals(b, null)) return false;
    return a.Equals(b);
  }

  public static bool operator !=(SemVer a, SemVer b) {
    return !(a == b);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C#</th></tr>
  <tr><td>Value equality</td><td><code>#[derive(PartialEq)]</code> or <code>impl PartialEq</code></td><td><code>IEquatable&lt;T&gt;</code> + <code>Equals</code> overrides</td></tr>
  <tr><td>Hashing a key</td><td><code>#[derive(Hash)]</code></td><td><code>GetHashCode()</code> override</td></tr>
  <tr><td>Ordering</td><td><code>#[derive(Ord)]</code> or <code>impl Ord</code>, then <code>.sort()</code></td><td><code>IComparable&lt;T&gt;.CompareTo</code></td></tr>
  <tr><td>Operator</td><td><code>==</code> is trait-based (<code>impl PartialEq</code>), no <code>operator</code> keyword</td><td><code>operator ==</code> / <code>!=</code> (explicit syntax)</td></tr>
</table>
<p>The <code>Equals</code>/<code>GetHashCode</code> pair is the part people forget.
Hash-based collections first bucket by hash code, then confirm with
<code>Equals</code> — so two objects that are <code>Equals</code> but hash
differently will land in different buckets and never be found. Keeping the hash
in sync with the fields you compare is what makes <code>HashSet</code> and
<code>Dictionary</code> keys work — exactly the invariant Rust's derived
<code>Hash</code> and <code>Eq</code> preserve automatically by construction.</p>
<p><code>CompareTo</code> returns a sign, not a boolean: negative means "I sort
before <code>other</code>", zero means "equal order", positive means "after".
Delegating to each field's own <code>CompareTo</code> (<code>Major.CompareTo(…)</code>)
gives you correct results for free. Once <code>IComparable&lt;T&gt;</code> is in
place, <code>List&lt;T&gt;.Sort()</code>, <code>Array.Sort</code>, and
<code>SortedSet&lt;T&gt;</code> all use it with no comparator argument. This is
exactly what <code>#[derive(PartialEq, Ord)]</code> would generate for you in
Rust — and on modern .NET you'd usually let a <code>record</code> generate it
too, but records don't exist in C# 7.3, so writing it by hand shows exactly
what those macros produce under the hood.</p>`,
