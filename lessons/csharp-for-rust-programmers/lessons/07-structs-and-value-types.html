  number: 7,
  title: "Structs & Value Types",

  intro: `
<p>Rust already draws a hard line between move/copy semantics and heap
allocation, but every Rust <code>struct</code> you write behaves like a value —
assigning it (or a <code>Copy</code> type, in particular) gives you an
independent value, never a shared reference. C# makes you choose per type. A
<code>class</code> is a reference type: assigning it shares the same object,
the way a <code>Rc&lt;RefCell&lt;T&gt;&gt;</code> or a raw pointer would. A
<code>struct</code> is a <em>value</em> type, much closer to a plain Rust
<code>struct</code>: assigning it copies the whole thing, so the two variables
are independent.</p>
<table>
  <tr><th>Rust</th><th>C#</th></tr>
  <tr><td><code>struct Point { … }</code> (value, copied/moved)</td><td><code>class Point { … }</code> (reference) vs <code>struct Point { … }</code> (value)</td></tr>
  <tr><td>assignment moves or copies (independent)</td><td><code>class</code>: shares; <code>struct</code>: copies</td></tr>
  <tr><td><code>pub x: i32</code> (immutable by convention)</td><td><code>public readonly int X;</code></td></tr>
  <tr><td><code>Point { x: 1, y: 2 }</code></td><td><code>new Point(1, 2)</code></td></tr>
</table>
<p>Reach for a <code>struct</code> when the value is small, immutable, and behaves
like a number — a point, a color, a money amount, a range. Mark the fields
<code>readonly</code> so a copied value can't be half-mutated. Because a struct is
copied on assignment and when passed to a method, a large or mutable struct is a
foot-gun; when in doubt, use a <code>class</code>.</p>`,

  rust: `struct Point {
    x: i32,
    y: i32,
}

impl Point {
    fn new(x: i32, y: i32) -> Point {
        Point { x, y }
    }

    fn translate(&self, dx: i32, dy: i32) -> Point {
        Point::new(self.x + dx, self.y + dy)
    }
}

let a = Point::new(1, 2);
let b = a;                     // move: a is independent, no aliasing
let c = a.translate(10, 0);    // new Point { x: 11, y: 2 }`,

  task: `
<p>Define a <code>struct Point</code> that shows off value semantics:</p>
<ol>
  <li>Two <code>public readonly int</code> fields, <code>X</code> and
      <code>Y</code>, set by a constructor <code>Point(int x, int y)</code>.</li>
  <li><code>Translate(int dx, int dy)</code> returns a <em>new</em>
      <code>Point</code> shifted by the offsets — it must not mutate
      <code>this</code>.</li>
  <li>Override <code>ToString()</code> to return <code>"(X, Y)"</code>, e.g.
      <code>"(1, 2)"</code>.</li>
  <li>Override <code>bool Equals(object obj)</code> so two points with the same
      <code>X</code> and <code>Y</code> are equal, and add a matching
      <code>GetHashCode()</code>.</li>
</ol>
<p>Because it's a <code>struct</code>, copying a <code>Point</code> into another
variable makes an independent value — the tests lean on that.</p>`,

  starter: `struct Point {
  public readonly int X;
  public readonly int Y;

  public Point(int x, int y) {
    X = 0; // TODO
    Y = 0; // TODO
  }

  public Point Translate(int dx, int dy) {
    return default(Point); // TODO
  }

  public override string ToString() {
    return ""; // TODO: "(X, Y)"
  }

    return false; // TODO
  }

  public override int GetHashCode() {
    return 0; // TODO
  }
}
`,

  requirements: [
    { pattern: /struct\s+Point/, message: "Define Point as a struct (a value type), not a class" },
    { pattern: /readonly\s+int/, message: "Make the X and Y fields readonly" },
  ],

  tests: [
    { name: "Constructor stores X and Y", code: "      var p = new Point(1, 2);\n      expect_eq(p.X, 1);\n      expect_eq(p.Y, 2);" },
    { name: "ToString formats as (X, Y)", code: "      expect_eq(new Point(1, 2).ToString(), \"(1, 2)\");" },
    { name: "Translate returns a shifted point", code: "      expect_eq(new Point(1, 2).Translate(10, 0).ToString(), \"(11, 2)\");" },
    { name: "Value equality by X and Y", code: "      expect_true(new Point(3, 4).Equals(new Point(3, 4)));\n      expect_true(!new Point(3, 4).Equals(new Point(4, 3)));" },
    { name: "Assignment copies the value (independent)", code: "      var a = new Point(1, 2);\n      var b = a;\n      var c = a.Translate(5, 5);\n      expect_eq(a.ToString(), \"(1, 2)\");\n      expect_eq(b.ToString(), \"(1, 2)\");\n      expect_eq(c.ToString(), \"(6, 7)\");" },
    { name: "Copies are equal but independent values", code: "      var a = new Point(8, 9);\n      var b = a;\n      expect_true(a.Equals(b));" },
  ],

  solution: `struct Point {
  public readonly int X;
  public readonly int Y;

  public Point(int x, int y) {
    X = x;
    Y = y;
  }

  public Point Translate(int dx, int dy) {
    return new Point(X + dx, Y + dy);
  }

  public override string ToString() {
    return $"({X}, {Y})";
  }

  public override bool Equals(object obj) {
    if (obj is Point other) {
      return X == other.X && Y == other.Y;
    }
    return false;
  }

  public override int GetHashCode() {
    return X * 397 ^ Y;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C#</th></tr>
  <tr><td>Value type</td><td>every <code>struct</code> (moved/copied)</td><td><code>struct</code> (copied on assign)</td></tr>
  <tr><td>Reference type</td><td><code>Rc&lt;T&gt;</code> / <code>&amp;T</code> (shared)</td><td><code>class</code> (shared on assign)</td></tr>
  <tr><td>Immutable field</td><td><code>x: i32</code> (no <code>mut</code>)</td><td><code>public readonly int X;</code></td></tr>
  <tr><td>Value equality</td><td><code>#[derive(PartialEq)]</code></td><td>override <code>Equals</code> + <code>GetHashCode</code></td></tr>
  <tr><td>Default value</td><td><code>Default::default()</code> (opt-in)</td><td><code>default(Point)</code> — all fields zeroed</td></tr>
</table>
<p>A <code>struct</code> can't be <code>null</code> (it's a value), so an
uninitialized one is its zero value, not the <code>Option::None</code> you'd
reach for in Rust. It also can't declare a parameterless constructor in C# 7.3
— <code>new Point()</code> always gives the all-zero value, unlike Rust where
you must implement <code>Default</code> yourself (or derive it) to get an
equivalent. Prefer <code>readonly</code> fields and methods that return new
structs (like <code>Translate</code>) over mutating in place — the same
discipline that makes an immutable Rust <code>struct</code> easy to reason
about: a mutable struct surprises people because <code>list[0].X = 5</code>
mutates a throwaway copy, not the stored element. When the type is big,
mutable, or naturally shared, stay with a <code>class</code>.</p>`,
