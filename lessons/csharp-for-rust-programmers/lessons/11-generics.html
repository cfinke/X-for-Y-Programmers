  title: "Generics",

  intro: `
<p>Generics will feel like home: <code>Box&lt;T&gt;</code> and
<code>Identity&lt;T&gt;(x)</code> read almost the same in both languages. The big
difference is that C# generics are <em>reified</em> — the type argument survives
to runtime, so <code>new T()</code> and <code>typeof(T)</code> actually work.
Rust monomorphizes generics at compile time instead: each instantiation gets its
own specialized code, so there's no shared runtime representation to reflect on,
and something like a bare <code>T::new()</code> isn't legal without a trait
bound that promises it exists.</p>
<p>The other new idea is <strong>constraints</strong>. Rust spells them as trait
bounds — <code>fn max&lt;T: PartialOrd&gt;(a: T, b: T)</code> or a
<code>where T: PartialOrd</code> clause; C# spells the same idea as a
<code>where</code> clause after the signature. Constraints let the compiler know
what a <code>T</code> can do — call <code>CompareTo</code> on it, or
<code>new</code> it up — instead of treating it as an opaque blob.</p>
<table>
  <tr><th>Rust</th><th>C#</th></tr>
  <tr><td><code>struct Box&lt;T&gt; { item: T }</code></td><td><code>class Box&lt;T&gt; {}</code></td></tr>
  <tr><td><code>fn id&lt;T&gt;(x: T) -&gt; T</code></td><td><code>T Id&lt;T&gt;(T x)</code></td></tr>
  <tr><td><code>fn max&lt;T: PartialOrd&gt;(a: T, b: T)</code></td><td><code>where T : IComparable&lt;T&gt;</code></td></tr>
  <tr><td><code>fn make&lt;T: Default&gt;() -&gt; T</code></td><td><code>where T : class, new()</code></td></tr>
</table>
<p>A constraint like <code>where T : IComparable&lt;T&gt;</code> unlocks
<code>a.CompareTo(b)</code>; <code>where T : new()</code> unlocks
<code>new T()</code>; and <code>where T : class</code> promises <code>T</code> is
a reference type so it can be <code>null</code>. You can combine them with commas.</p>`,

  rust: `struct Box<T> {
    item: T,
}

impl<T: PartialEq<T>> Box<T> {
    fn value(&self) -> &T {
        &self.item
    }
}

fn identity<T>(x: T) -> T {
    x
}

// A real bound: PartialOrd unlocks the >= operator generically.
fn max<T: PartialOrd>(a: T, b: T) -> T {
    if a >= b { a } else { b }
}`,

    { pattern: /class\s+Box\s*<\s*T\s*>/, message: "Declare a generic class Box<T>" },

  solution: `public class Box<T> {
  private T item;

  public Box(T item) {
    this.item = item;
  }

  public T Value {
    get { return item; }
    set { item = value; }
  }

  public bool IsEmpty {
    get { return item == null; }
  }
}

public class Widget {
  public int Size { get; set; }
}

public static class Generics {
  public static T Identity<T>(T x) {
    return x;
  }

  public static T Max<T>(T a, T b) where T : IComparable<T> {
    return a.CompareTo(b) >= 0 ? a : b;
  }

  public static T Create<T>() where T : class, new() {
    return new T();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C#</th></tr>
  <tr><td>Generic type</td><td><code>struct Box&lt;T&gt; { item: T }</code></td><td><code>class Box&lt;T&gt; {}</code></td></tr>
  <tr><td>Generic function</td><td><code>fn id&lt;T&gt;(x: T) -&gt; T</code></td><td><code>T Id&lt;T&gt;(T x)</code></td></tr>
  <tr><td>Bound / constraint</td><td><code>&lt;T: Trait&gt;</code> or <code>where T: Trait</code></td><td><code>where T : C</code></td></tr>
  <tr><td>Construct a T</td><td><code>T::default()</code> with <code>T: Default</code></td><td><code>new T()</code> with <code>where T : new()</code></td></tr>
  <tr><td>Reference-type only</td><td><em>n/a (ownership, not reference-ness, is the axis)</em></td><td><code>where T : class</code></td></tr>
  <tr><td>Value-type only</td><td><em>n/a — every type is a "value type" by default</em></td><td><code>where T : struct</code></td></tr>
</table>
<p>Because C# generics are reified, <code>item == null</code> inside
<code>Box&lt;T&gt;</code> is legal even without a <code>class</code> constraint —
for a value type like <code>int</code> it simply evaluates to <code>false</code>.
That's why <code>Box&lt;int&gt;(0).IsEmpty</code> is <code>false</code>, not a
compile error. Rust has no equivalent shortcut: comparing a generic
<code>T</code> to a null-like sentinel requires an explicit bound (such as
<code>T: Default + PartialEq</code>) or, more idiomatically, modeling absence
with <code>Option&lt;T&gt;</code> in the first place so there's no null to check
against.</p>
<p>The <code>new()</code> constraint must come <em>last</em> in a
<code>where</code> list, and it only permits a parameterless constructor —
<code>new T(arg)</code> is never allowed generically. When you need to build a
<code>T</code> with arguments, pass in a <code>Func&lt;..., T&gt;</code> factory
instead — the same escape hatch Rust reaches for with a
<code>Fn() -&gt; T</code> closure parameter when a plain <code>Default</code>
bound isn't expressive enough.</p>`,
};
