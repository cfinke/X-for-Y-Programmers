const LESSON = {
  number: 5,
  title: "Methods",

  intro: `
<p>You already write Rust functions with default-like patterns (via
<code>Option</code> or builder methods) and variadic-ish helpers (via slices).
C# methods cover similar ground with a couple of built-in tools Rust
lacks. Every method lives inside a class, and C# leans on real
<em>overloading</em> — many methods sharing a name, distinguished by their
parameter list — where Rust gives each function exactly one name and one
signature (traits and generics fill some of that gap).</p>
<table>
  <tr><th>Rust</th><th>C#</th></tr>
  <tr><td><code>fn f(x: i32) {}</code> — no built-in default</td><td><code>void F(int x = 1) {}</code> (optional param)</td></tr>
  <tr><td>no named arguments</td><td><code>F(x: 1)</code> (named argument)</td></tr>
  <tr><td><code>fn f(xs: &[i32]) {}</code></td><td><code>void F(params int[] xs)</code></td></tr>
  <tr><td>one function, one signature</td><td>overload <em>bodies</em>, one per signature</td></tr>
  <tr><td>return <code>Result&lt;T, E&gt;</code> or a tuple</td><td><code>out</code> / <code>ref</code> parameters</td></tr>
</table>
<p>Two ideas have no direct Rust equivalent. An <code>out</code> parameter is an
extra return channel: the method must assign it before returning, and the caller
reads it back — the backbone of the <code>TryParse</code> pattern, similar in
spirit to Rust's <code>Result</code>-returning <code>try_*</code> functions but
expressed as a parameter instead of a return type. A <code>ref</code>
parameter passes a variable in and lets the method mutate the caller's own
variable in place — like passing <code>&mut i32</code> in Rust, except C#
marks the mutation at the call site with the same <code>ref</code> keyword
used in the signature, so the reader always sees which arguments a method
writes to.</p>`,

  rust: `fn greet(name: &str, greeting: &str) -> String {
    format!("{greeting}, {name}!")
}

fn sum(numbers: &[i32]) -> i32 {
    numbers.iter().sum()
}

// Rust has no out/ref for this case -- return a Result or tuple instead
fn try_divide(a: i32, b: i32) -> Option<i32> {
    if b == 0 { None } else { Some(a / b) }
}`,

  task: `
<p>Build a <code>static class Calc</code> that shows off C#'s method features:</p>
<ol>
  <li><strong>Overloading:</strong> <code>Max(int a, int b)</code> returns the
      larger, and <code>Max(int a, int b, int c)</code> returns the largest of
      three (reuse the two-argument version).</li>
  <li><strong>Optional parameter:</strong> <code>Greet(string name, string
      greeting = "Hello")</code> returns <code>"Hello, Ada!"</code>, or uses the
      supplied greeting.</li>
  <li><strong>out parameter:</strong> <code>bool TryDivide(int a, int b, out int
      quotient)</code> sets <code>quotient</code> to <code>a / b</code> and
      returns <code>true</code>; when <code>b</code> is <code>0</code>, set
      <code>quotient = 0</code> and return <code>false</code>.</li>
  <li><strong>params array:</strong> <code>Sum(params int[] numbers)</code>
      returns the total (and <code>Sum()</code> is <code>0</code>).</li>
  <li><strong>ref parameter:</strong> <code>void Increment(ref int x)</code>
      adds one to the caller's variable.</li>
</ol>`,

  starter: `static class Calc {

`,

  requirements: [
    { pattern: /\bout\s+int\s+quotient\b/, message: "TryDivide must use an out parameter (out int quotient)" },
    { pattern: /\bparams\s+int\[\]/, message: "Sum must take a params int[] array" },
    { pattern: /\bref\s+int\s+x\b/, message: "Increment must use a ref parameter (ref int x)" },
  ],

  tests: [
    { name: "Max(3, 7) is 7", code: "      expect_eq(Calc.Max(3, 7), 7);" },
    { name: "Max(3, 7, 5) is 7 (three-arg overload)", code: "      expect_eq(Calc.Max(3, 7, 5), 7);" },
    { name: "Greet(\"Ada\") uses the default greeting", code: "      expect_eq(Calc.Greet(\"Ada\"), \"Hello, Ada!\");" },
    { name: "Greet with a named argument", code: "      expect_eq(Calc.Greet(name: \"Rob\", greeting: \"Hi\"), \"Hi, Rob!\");" },
    { name: "TryDivide(10, 2) succeeds with quotient 5", code: "      bool ok = Calc.TryDivide(10, 2, out int q);\n      expect_true(ok);\n      expect_eq(q, 5);" },
    { name: "TryDivide by zero fails and yields 0", code: "      bool ok2 = Calc.TryDivide(10, 0, out int q2);\n      expect_true(!ok2);\n      expect_eq(q2, 0);" },
    { name: "Sum(1, 2, 3, 4) is 10 and Sum() is 0", code: "      expect_eq(Calc.Sum(1, 2, 3, 4), 10);\n      expect_eq(Calc.Sum(), 0);" },
    { name: "Increment mutates the caller's variable", code: "      int x = 5;\n      Calc.Increment(ref x);\n      expect_eq(x, 6);" },
  ],

  solution: `static class Calc {
  public static int Max(int a, int b) {
    return a > b ? a : b;
  }

  public static int Max(int a, int b, int c) {
    return Max(Max(a, b), c);
  }

  public static string Greet(string name, string greeting = "Hello") {
    return $"{greeting}, {name}!";
  }

  public static bool TryDivide(int a, int b, out int quotient) {
    if (b == 0) {
      quotient = 0;
      return false;
    }
    quotient = a / b;
    return true;
  }

  public static int Sum(params int[] numbers) {
    int total = 0;
    foreach (int n in numbers) {
      total += n;
    }
    return total;
  }

  public static void Increment(ref int x) {
    x++;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C#</th></tr>
  <tr><td>Optional parameter</td><td>—, use <code>Option&lt;T&gt;</code> or a builder</td><td><code>F(int x = 1)</code></td></tr>
  <tr><td>Named argument</td><td>struct field syntax only</td><td><code>F(x: 1)</code></td></tr>
  <tr><td>Rest / params</td><td><code>xs: &[i32]</code> slice</td><td><code>params int[] xs</code></td></tr>
  <tr><td>Overloading</td><td>one function per name (or generics/traits)</td><td>a full body per signature</td></tr>
  <tr><td>Extra output</td><td><code>Result</code>/<code>Option</code> or a tuple</td><td><code>out</code> parameter</td></tr>
  <tr><td>Mutate caller's variable</td><td><code>&mut T</code> parameter</td><td><code>ref</code> parameter</td></tr>
</table>
<p>A few sharp edges. Optional parameters must come after all required ones, and
their defaults must be compile-time constants — so <code>string greeting =
"Hello"</code> is fine but <code>DateTime.Now</code> is not; Rust sidesteps this
entirely since it has no default parameters at all. Named arguments let
you skip past optional parameters and document call sites, somewhat like naming
struct fields when you construct a value in Rust. <code>out</code> variables can
be declared right in the call — <code>TryDivide(10, 2, out int q)</code> — and
the <code>Try…</code>-returns-<code>bool</code> shape is idiomatic all through
the .NET library (<code>int.TryParse</code>, <code>Dictionary.TryGetValue</code>),
playing a role similar to Rust's <code>Result</code>-returning functions but
without an <code>Err</code> value to inspect. Finally, only one
<code>params</code> array is allowed and it must be the last parameter; the
caller may pass loose arguments or a real array, much like passing a slice in
Rust versus spreading individual values.</p>`,
};
