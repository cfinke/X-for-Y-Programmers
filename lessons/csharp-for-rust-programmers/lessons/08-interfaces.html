  title: "Interfaces",

  intro: `
<p>You already think in traits — in Rust a type only implements <code>Shape</code>
if you write an explicit <code>impl Shape for Circle</code> block; having the right
methods by coincidence is not enough. C#'s <code>interface</code> works the same
way: it is <em>nominal</em>. A class only implements an interface if it says so
explicitly with <code>: IName</code>. Having the right members is not enough; the
class must declare the contract, just as Rust requires the <code>impl</code> block.</p>
<table>
  <tr><th>Rust</th><th>C#</th></tr>
  <tr><td><code>trait Shape { fn area(&amp;self) -> f64; }</code></td><td><code>interface IShape { double Area(); }</code></td></tr>
  <tr><td><code>impl Shape for Box {}</code></td><td><code>class Box : IShape {}</code></td></tr>
  <tr><td>nominal (explicit <code>impl</code> block)</td><td>nominal (must declare <code>: IShape</code>)</td></tr>
  <tr><td><code>fn name(&amp;self) -> &amp;str;</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td><code>impl A for C {} impl B for C {}</code></td><td><code>class C : A, B</code></td></tr>
</table>
<p>Three conventions to absorb. First, C# interface names start with a capital
<code>I</code> (<code>IShape</code>, <code>IComparable</code>) — Rust trait names
carry no such prefix. Second, interface members are implicitly <code>public</code>
— you write no access modifier in the interface, but the implementing class must
mark them <code>public</code> (Rust's trait methods are simply public by virtue of
the trait itself). Third, in C# 7.3 an interface has <em>no</em> method bodies at
all (default interface methods arrived later), unlike a Rust trait, which may supply
a default <code>fn</code> body — every C# member here is a pure signature the class
must fill in.</p>`,

  rust: `trait Shape {
    fn name(&self) -> &str;
    fn area(&self) -> f64;
}

trait Named {
    fn describe(&self) -> String;
}

struct Circle {
    name: String,
    r: f64,
}

impl Shape for Circle {
    fn name(&self) -> &str { &self.name }
    fn area(&self) -> f64 { std::f64::consts::PI * self.r * self.r }
}

impl Named for Circle {
    fn describe(&self) -> String {
        format!("{}: {}", self.name(), self.area())
    }
}

fn total_area(shapes: &[&dyn Shape]) -> f64 {
    shapes.iter().map(|s| s.area()).sum()
}`,

  task: `
<p>Model shapes behind an interface, then program against that interface.</p>
<ol>
  <li>Declare <code>interface IShape</code> with a read-only property

  <li>Declare a second <code>interface IDescribable</code> with a method

  <li>Write <code>class Rectangle</code> that implements <em>both</em> interfaces:

      <code>Area()</code> returns <code>width * height</code>, and

      <code>static double TotalArea(IShape[] shapes)</code> that sums

</ol>`,

  requirements: [
    { pattern: /interface\s+IShape/, message: "Declare an interface named IShape" },
    { pattern: /class\s+Rectangle\s*:\s*IShape\s*,\s*IDescribable/, message: "Rectangle must implement both IShape and IDescribable" },

    { name: "Rectangle.Name is readable via IShape", code: "      IShape r = new Rectangle(\"box\", 2, 3);\n      expect_eq(r.Name, \"box\");" },
    { name: "Square.Area() is side * side", code: "      IShape s = new Square(\"sq\", 4);\n      expect_eq(s.Area(), 16.0);" },

  solution: `interface IShape {
  string Name { get; }
  double Area();
}

interface IDescribable {
  string Describe();
}

class Rectangle : IShape, IDescribable {
  public string Name { get; private set; }
  private double width;
  private double height;

  public Rectangle(string name, double width, double height) {
    Name = name;
    this.width = width;
    this.height = height;
  }

  public double Area() {
    return width * height;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

class Square : IShape, IDescribable {
  public string Name { get; private set; }
  private double side;

  public Square(string name, double side) {
    Name = name;
    this.side = side;
  }

  public double Area() {
    return side * side;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

static class Shapes {
  public static double TotalArea(IShape[] shapes) {
    double sum = 0;
    foreach (IShape s in shapes) {
      sum += s.Area();
    }
    return sum;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>C#</th></tr>
  <tr><td>Declare</td><td><code>trait Shape {}</code></td><td><code>interface IShape {}</code></td></tr>
  <tr><td>Implement</td><td><code>impl Shape for Box {}</code></td><td><code>class Box : IShape {}</code></td></tr>
  <tr><td>Conformance</td><td>nominal (explicit <code>impl</code>)</td><td>nominal (explicit declare)</td></tr>
  <tr><td>Read-only property</td><td><code>fn name(&amp;self) -> &amp;str;</code></td><td><code>string Name { get; }</code></td></tr>
  <tr><td>Multiple</td><td><code>impl A for C {} impl B for C {}</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Member bodies</td><td>default <code>fn</code> bodies allowed</td><td>none (in C# 7.3)</td></tr>
</table>
<p>Both languages make you spell the contract out explicitly — Rust's
<code>impl Shape for Circle</code> is the trait-side equivalent of C#'s
<code>class Circle : IShape</code>. Where they diverge is structure: Rust ties each
trait implementation to its own <code>impl</code> block, so a type that implements
two traits needs two separate blocks. C# instead folds every implemented interface
(plus an optional base class) into one comma-separated list after the colon, and if
both appear, the base class comes first (<code>class C : BaseClass, IShape</code>).</p>
<p>The payoff mirrors Rust's <code>&amp;[&amp;dyn Shape]</code> trait-object slices: the
<code>IShape[]</code> parameter in <code>TotalArea</code> lets callers pass concrete
<code>Rectangle</code> and <code>Square</code> objects while the method only sees
the contract. This is C#'s everyday tool for decoupling and is exactly what powers
built-in interfaces like <code>IEnumerable&lt;T&gt;</code>,
<code>IComparable&lt;T&gt;</code>, and <code>IEquatable&lt;T&gt;</code> — directly
analogous to Rust's <code>Iterator</code>, <code>Ord</code>, and
<code>PartialEq</code> traits.</p>`,
