<script>
const LESSON = {
  number: 10,
  title: "Inheritance & Abstract Classes",

  intro: `
<p>Single inheritance translates almost symbol-for-symbol:
<code>class Circle &lt; Shape</code> becomes
<code>class Circle extends Shape</code>, and <code>super</code> works the way
you expect — call the parent's constructor, call the parent's version of a
method. One small difference: Ruby's bare <code>super</code> forwards the
current arguments implicitly; TypeScript's <code>super(...)</code> always
takes them explicitly, and a subclass constructor must call it before
touching <code>this</code>.</p>
<table>
  <tr><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td><code>class Circle &lt; Shape</code></td><td><code>class Circle extends Shape</code></td></tr>
  <tr><td><code>super("circle")</code></td><td><code>super("circle")</code> — required before <code>this</code></td></tr>
  <tr><td><code>raise NotImplementedError</code></td><td><code>abstract area(): number;</code> — no body at all</td></tr>
  <tr><td>forgot to implement? runtime error, <em>if that path ever runs</em></td><td>forgot to implement? compile error, immediately</td></tr>
  <tr><td><code>module</code> + <code>include</code> (mixins)</td><td>no direct equivalent — interfaces + composition</td></tr>
</table>
<p>The real upgrade is what happens to
<code>raise NotImplementedError</code>. In Ruby, that convention is a runtime
tripwire: it fires only if someone actually calls the missing method, on the
subclass you forgot, on a code path your tests happened to cover. TypeScript
replaces the tripwire with a wall: mark the class <code>abstract</code>,
declare <code>abstract area(): number;</code> with no body, and any subclass
that fails to implement it — or any attempt to <code>new Shape(...)</code>
directly — is a compile error before the program exists. Meanwhile the
abstract class still carries concrete methods, so the template-method pattern
you know works unchanged: <code>describe()</code> is written once and calls
the <code>area()</code> each subclass provides.</p>
<p>What does <em>not</em> translate: modules and mixins.
<code>include Comparable</code> has no TypeScript equivalent — there is no
multiple inheritance and no <code>include</code>. The idiomatic substitutes
are interfaces (for the shared contract) plus composition (for the shared
behavior), which we will lean on later in the course.</p>`,

  ruby: `class Shape
  def initialize(name)
    @name = name
  end

  def area
    raise NotImplementedError, "#{self.class} must implement area"
  end

  def describe            # template method — relies on subclass #area
    "#{@name} has area #{area.round(2)}"
  end
end

class Circle < Shape
  def initialize(radius)
    super("circle")       # explicit parent call
    @radius = radius
  end

  def area = Math::PI * @radius**2
end

Circle.new(1).describe    # => "circle has area 3.14"
# Forget to define #area on a new subclass? You find out at runtime — maybe.`,

  task: `
<p>Port the shape hierarchy, letting the compiler hold the
<code>NotImplementedError</code> line:</p>
<ol>
  <li>Make <code>Shape</code> an <code>abstract class</code> with a
      constructor taking <code>public readonly name: string</code>, an
      <strong>abstract</strong> method <code>area(): number</code> (no body —
      delete the <code>raise</code> stand-in entirely), and a concrete
      <code>describe(): string</code> returning
      <code>"&lt;name&gt; has area &lt;area&gt;"</code> with the area rounded
      via <code>Math.round(this.area() * 100) / 100</code>.</li>
  <li>Write <code>class Circle extends Shape</code>: the constructor takes
      <code>private radius: number</code> and calls
      <code>super("circle")</code>; <code>area()</code> returns
      <code>Math.PI * this.radius * this.radius</code>.</li>
  <li>Write <code>class Rectangle extends Shape</code>: the constructor takes
      <code>private width: number</code> and
      <code>private height: number</code> and calls
      <code>super("rectangle")</code>; <code>area()</code> returns their
      product.</li>
</ol>
<p>Two experiments once it passes: delete <code>area()</code> from
<code>Rectangle</code>, and try <code>new Shape("blob")</code>. Both are
compile errors — Ruby would have waited for production to mention either
one.</p>`,

  starter: `// Ruby: def area; raise NotImplementedError; end — a runtime tripwire.
// TypeScript: an abstract method — a missing implementation cannot compile.

// TODO: make this an abstract class; make area() abstract (no body);
// implement describe() as the template method.
class Shape {
  constructor(public readonly name: string) {}

  area(): number {
    throw new Error("NotImplementedError"); // TODO: abstract instead
  }

  describe(): string {
    // TODO: "<name> has area <area>", rounded:
    //       Math.round(this.area() * 100) / 100
    return "";
  }
}

// TODO: Circle extends Shape — constructor(private radius: number) calling
// super("circle"); area() = Math.PI * radius * radius.
class Circle extends Shape {
  constructor(private radius: number) {
    super("circle");
  }
  // TODO: area()
}

// TODO: Rectangle extends Shape — width and height, name "rectangle",
// area() = width * height.
class Rectangle extends Shape {
  constructor(private width: number, private height: number) {
    super("rectangle");
  }
  // TODO: area()
}
`,

  exportNames: ["Shape", "Circle", "Rectangle"],

  requirements: [
    { pattern: /abstract\s+class\s+Shape/, message: "Declare Shape as an abstract class — it can never be instantiated directly" },
    { pattern: /abstract\s+area\s*\(/, message: "Declare area() as an abstract method with no body (the compiler's NotImplementedError)" },
    { pattern: /extends\s+Shape/, message: "Subclass with extends Shape (Ruby's class Circle < Shape)" },
  ],

  tests: [
    { name: "new Circle(1).area() is 3.14 to two decimals", run: (x) => expectEqual(Math.round(new x.Circle(1).area() * 100) / 100, 3.14) },
    { name: "new Rectangle(3, 4).area() is 12", run: (x) => expectEqual(new x.Rectangle(3, 4).area(), 12) },
    { name: 'new Circle(2).describe() is "circle has area 12.57"', run: (x) => expectEqual(new x.Circle(2).describe(), "circle has area 12.57") },
    { name: 'new Rectangle(3, 4).describe() is "rectangle has area 12"', run: (x) => expectEqual(new x.Rectangle(3, 4).describe(), "rectangle has area 12") },
    { name: "a Circle is a Shape (instanceof, like is_a?)", run: (x) => expectTruthy(new x.Circle(1) instanceof x.Shape) },
  ],

  solution: `abstract class Shape {
  constructor(public readonly name: string) {}

  abstract area(): number;

  describe(): string {
    return this.name + " has area " + (Math.round(this.area() * 100) / 100);
  }
}

class Circle extends Shape {
  constructor(private radius: number) {
    super("circle");
  }

  area(): number {
    return Math.PI * this.radius * this.radius;
  }
}

class Rectangle extends Shape {
  constructor(private width: number, private height: number) {
    super("rectangle");
  }

  area(): number {
    return this.width * this.height;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td>Inherit</td><td><code>class Circle &lt; Shape</code></td><td><code>class Circle extends Shape</code></td></tr>
  <tr><td>Parent constructor</td><td><code>super("circle")</code> (bare <code>super</code> forwards args)</td><td><code>super("circle")</code> — explicit, and required before <code>this</code></td></tr>
  <tr><td>Must-implement method</td><td><code>raise NotImplementedError</code></td><td><code>abstract area(): number;</code></td></tr>
  <tr><td>Enforced</td><td>at runtime, if the path ever runs</td><td>at compile time, always</td></tr>
  <tr><td>Instantiating the base</td><td><code>Shape.new</code> happily works</td><td><code>new Shape(...)</code> on an abstract class won't compile</td></tr>
  <tr><td>Type check</td><td><code>circle.is_a?(Shape)</code></td><td><code>circle instanceof Shape</code></td></tr>
  <tr><td>Mixins</td><td><code>module</code> + <code>include</code></td><td>none — interfaces + composition instead</td></tr>
</table>
<p>Notice which half of the pattern moved and which stayed. The template
method — concrete <code>describe()</code> calling polymorphic
<code>area()</code> — is identical to the Ruby version. What moved is the
enforcement: <code>raise NotImplementedError</code> is documentation that
punishes at runtime, while <code>abstract</code> is a contract the compiler
settles before the program runs. Unlike interfaces, abstract classes are real
runtime values — <code>instanceof</code> works on them, just like
<code>is_a?</code>.</p>`,
};
