<title>Lesson 5: Methods → Functions</title>
<link rel="stylesheet" href="../../../shared/css/style.css">
</head>
<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Methods → Functions",

  intro: `
<p>Ruby methods translate to TypeScript functions with few surprises —
default arguments like <code>greeting = "Hello"</code> carry straight over —
but one habit will bite you until it's retrained: <strong>Ruby returns the
last expression implicitly; TypeScript does not.</strong> A function body
without <code>return</code> returns <code>undefined</code>, silently. This
is <em>the</em> classic Rubyist-writing-TypeScript bug, though the compiler
catches most cases once you declare a return type.</p>
<table>
  <tr><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td><code>def greet(name, greeting = "Hello")</code></td><td><code>function greet(name: string, greeting: string = "Hello")</code></td></tr>
  <tr><td><code>def create(name:, age: 0)</code> (keyword args)</td><td><code>function create({ name, age = 0 }: { name: string; age?: number })</code></td></tr>
  <tr><td><code>double = -&gt;(x) { x * 2 }</code></td><td><code>const double = (x: number) =&gt; x * 2;</code></td></tr>
  <tr><td><code>double.call(21)</code></td><td><code>double(21)</code> — no <code>.call</code> needed</td></tr>
  <tr><td>implicit return of last expression</td><td>explicit <code>return</code> (except one-line arrows)</td></tr>
</table>
<p>Keyword arguments have no direct equivalent; the idiom is an <em>options
object</em> — the caller passes <code>create({ name: "Ada" })</code>, and the
function destructures it, with defaults, in the parameter list. And where
Ruby splits callables into blocks, procs, and lambdas, TypeScript has one
unified answer: the <em>arrow function</em>, <code>(x) =&gt; x * 2</code> —
a first-class value you can assign, pass, and call directly, no
<code>.call</code> or <code>yield</code> ceremony. A single-expression arrow
body is the one place TypeScript returns implicitly.</p>`,

  ruby: `def greet(name, greeting = "Hello")
  "#{greeting}, #{name}!"        # implicit return — last expression
end

def create_user(name:, age: 0)   # keyword arguments
  "#{name} (#{age})"
end

double = ->(x) { x * 2 }         # a lambda

puts greet("Ada")                # "Hello, Ada!"
puts greet("Ada", "Hi")          # "Hi, Ada!"
puts create_user(name: "Ada")    # "Ada (0)"
puts double.call(21)             # 42`,

  task: `
<p>Translate the methods:</p>
<ol>
  <li>Write a function <code>greet</code> taking <code>name: string</code>
      and <code>greeting</code> with a default of <code>"Hello"</code>,
      returning <code>"GREETING, NAME!"</code>. Don't forget the explicit
      <code>return</code>.</li>
  <li>Write a function <code>createUser</code> that replaces the keyword
      arguments with an options object: it takes
      <code>{ name, age = 0 }: { name: string; age?: number }</code> and
      returns <code>"NAME (AGE)"</code>. Callers write
      <code>createUser({ name: "Ada" })</code> — almost the same as Ruby's
      <code>create_user(name: "Ada")</code>.</li>
  <li>Declare a constant <code>double</code> holding an arrow function —
      the lambda <code>-&gt;(x) { x * 2 }</code> becomes
      <code>(x: number) =&gt; x * 2</code>. Called as <code>double(21)</code>,
      no <code>.call</code>.</li>
</ol>`,

  starter: `// 1. Ruby: def greet(name, greeting = "Hello") — defaults carry over
function greet(name: string, greeting: string = "Hello"): string {
  // TODO: build "GREETING, NAME!" — and remember: explicit return!
  return "";
}

// 2. Ruby keyword args -> a destructured, typed options object
function createUser({ name, age = 0 }: { name: string; age?: number }): string {
  // TODO: return "NAME (AGE)"
  return "";
}

// 3. Ruby: double = ->(x) { x * 2 } — becomes an arrow function
// TODO: const double = ...
const double = (x: number): number => 0; // TODO: fix the body
`,

  exportNames: ["greet", "createUser", "double"],

  requirements: [
    { pattern: /greeting\s*:\s*string\s*=\s*["']Hello["']/, message: 'Give greeting a default value: greeting: string = "Hello"' },
    { pattern: /age\s*\?\s*:\s*number/, message: "Mark age as optional in the options-object type: age?: number" },
    { pattern: /=>/, message: "Use an arrow function (=>) — TypeScript's lambda" },
  ],

  tests: [
    { name: 'greet("Ada") returns "Hello, Ada!" (default kicks in)', run: (x) => expectEqual(x.greet("Ada"), "Hello, Ada!") },
    { name: 'greet("Ada", "Hi") returns "Hi, Ada!"', run: (x) => expectEqual(x.greet("Ada", "Hi"), "Hi, Ada!") },
    { name: 'createUser({ name: "Ada" }) returns "Ada (0)"', run: (x) => expectEqual(x.createUser({ name: "Ada" }), "Ada (0)") },
    { name: 'createUser({ name: "Matz", age: 61 }) returns "Matz (61)"', run: (x) => expectEqual(x.createUser({ name: "Matz", age: 61 }), "Matz (61)") },
    { name: "double(21) returns 42", run: (x) => expectEqual(x.double(21), 42) },
    { name: "double is directly callable (no .call)", run: (x) => expectEqual(typeof x.double, "function") },
  ],

  solution: `function greet(name: string, greeting: string = "Hello"): string {
  return \`\${greeting}, \${name}!\`;
}

function createUser({ name, age = 0 }: { name: string; age?: number }): string {
  return \`\${name} (\${age})\`;
}

const double = (x: number): number => x * 2;
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td>Definition</td><td><code>def greet(name) ... end</code></td><td><code>function greet(name: string) { ... }</code></td></tr>
  <tr><td>Default argument</td><td><code>greeting = "Hello"</code></td><td><code>greeting: string = "Hello"</code> — same idea</td></tr>
  <tr><td>Keyword arguments</td><td><code>def f(name:, age: 0)</code></td><td>Options object: <code>f({ name, age = 0 }: {...})</code></td></tr>
  <tr><td>Lambda / proc / block</td><td><code>-&gt;(x) { x * 2 }</code>, <code>proc</code>, <code>{ |x| }</code></td><td>One form: <code>(x) =&gt; x * 2</code></td></tr>
  <tr><td>Calling a lambda</td><td><code>fn.call(21)</code> / <code>fn.(21)</code></td><td><code>fn(21)</code></td></tr>
  <tr><td>Return value</td><td>Last expression, implicitly</td><td><code>return</code> required (except one-line arrow bodies)</td></tr>
  <tr><td>Optional parameter</td><td>default value or <code>nil</code></td><td><code>age?: number</code> or a default</td></tr>
</table>
<p>The unification is the real win: Ruby distinguishes methods (called on
receivers), blocks (passed with <code>yield</code>), procs, and lambdas —
each with its own calling convention. In TypeScript a function is just a
value. The arrow function you wrote for <code>double</code> is the same kind
of thing you'll pass to <code>map</code> and <code>filter</code> in Lesson
13, store in objects, and return from other functions — one concept where
Ruby has four.</p>`,
};
</script>
