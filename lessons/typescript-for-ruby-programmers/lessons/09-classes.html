const LESSON = {
  number: 9,
  title: "Classes",

  intro: `
<p>Ruby classes and TypeScript classes are close cousins, but the instance
variables live differently. In Ruby, <code>@balance</code> springs into being
the moment you assign it inside <code>initialize</code> — no declaration
anywhere. In TypeScript, every property is <em>declared</em>, with a type,
in the class body: assign to something undeclared and the compiler objects.
<code>initialize</code> becomes <code>constructor</code>, and
<code>attr_reader :owner</code> becomes a <code>public readonly owner</code>
property (or a getter, for computed values).</p>
<table>
  <tr><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td><code>def initialize(owner)</code></td><td><code>constructor(owner: string)</code></td></tr>
  <tr><td><code>@balance = balance</code> — ivar appears on assignment</td><td>declared property: <code>private balance: number;</code></td></tr>
  <tr><td><code>attr_reader :owner</code></td><td><code>public readonly owner: string</code></td></tr>
  <tr><td><code>attr_accessor :name</code></td><td><code>public name: string</code></td></tr>
  <tr><td><code>private</code> — soft; <code>send</code> walks right past it</td><td><code>private</code> — a compile error, full stop</td></tr>
</table>
<p>The best part is <em>parameter properties</em>: writing
<code>constructor(private balance: number)</code> declares the property,
types it, and assigns the argument to it — all in one place. It replaces the
entire <code>@balance = balance</code> dance, one line per ivar, that fills
every Ruby <code>initialize</code>.</p>
<p>One honest difference on <code>private</code>: Ruby's is a soft
convention — it only restricts the message <em>send</em> syntax, and
<code>account.send(:balance)</code> saunters past it. TypeScript's
<code>private</code> is enforced by the compiler: <code>account.balance</code>
outside the class simply does not compile. (It is still a compile-time-only
fence — the property exists in the emitted JavaScript — but no type-checked
code can cross it.)</p>`,

  ruby: `class BankAccount
  attr_reader :owner, :id     # public read-only access

  def initialize(owner, id, balance = 0)
    @owner = owner            # ivars spring into being on assignment
    @id = id
    @balance = balance
  end

  def deposit(amount)
    @balance += amount
  end

  def withdraw(amount)
    raise "Insufficient funds" if amount > @balance
    @balance -= amount
  end

  def balance = @balance      # Ruby 3 endless method, in lieu of attr_reader
end

account = BankAccount.new("Ada", 42, 100)
account.send(:instance_variable_get, :@balance)  # "private" was a suggestion`,

  task: `
<p>Port <code>BankAccount</code>, upgrading the access control on the way:</p>
<ol>
  <li>Give <code>BankAccount</code> a constructor using <em>parameter
      properties</em>: <code>readonly owner</code> (<code>string</code>),
      <code>readonly id</code> (<code>number</code>), and
      <code>private balance</code> (<code>number</code>, defaulting to
      <code>0</code>). No property declarations, no assignments — the
      parameter list does it all.</li>
  <li>Add <code>deposit(amount: number): void</code>, which adds to the
      balance.</li>
  <li>Add <code>withdraw(amount: number): void</code>, which throws an
      <code>Error</code> when <code>amount</code> exceeds the balance
      (Ruby's <code>raise</code> guard) and subtracts otherwise.</li>
  <li>Add <code>getBalance(): number</code> — the public window onto the
      private ivar, your <code>def balance = @balance</code>.</li>
</ol>
<p>Then try <code>account.balance</code> or
<code>account.owner = "Eve"</code> outside the class — one trips
<code>private</code>, the other <code>readonly</code>, both at compile
time.</p>`,

  starter: `class BankAccount {
  // TODO: replace this constructor with parameter properties, so one line
  // declares, types, AND assigns each field (no @owner = owner dance):
  //   readonly owner (string), readonly id (number),
  //   private balance (number, default 0)
  constructor(owner: string, id: number, balance: number = 0) {
    // TODO
  }

  deposit(amount: number): void {
    // TODO: add amount to the balance
  }

  withdraw(amount: number): void {
    // TODO: throw new Error("Insufficient funds") when amount > balance,
    //       otherwise subtract it. Ruby: raise "..." if amount > @balance
  }

  getBalance(): number {
    // TODO: the public reader for the private balance
    return 0;
  }
}
`,

  exportNames: ["BankAccount"],

  requirements: [
    { pattern: /private\s+balance/, message: "Make balance private — real, compiler-enforced private, not Ruby's polite suggestion" },
    { pattern: /readonly\s+owner/, message: "Declare owner as readonly (your attr_reader :owner)" },
    { pattern: /readonly\s+id/, message: "Declare id as readonly (your attr_reader :id)" },
  ],

  tests: [
    { name: 'new BankAccount("Ada", 42, 100) starts with balance 100', run: (x) => expectEqual(new x.BankAccount("Ada", 42, 100).getBalance(), 100) },
    { name: "balance defaults to 0 when omitted", run: (x) => expectEqual(new x.BankAccount("Grace", 7).getBalance(), 0) },
    { name: "deposit(50) raises the balance to 150", run: (x) => { const a = new x.BankAccount("Ada", 42, 100); a.deposit(50); expectEqual(a.getBalance(), 150); } },
    { name: "withdraw(30) lowers the balance to 70", run: (x) => { const a = new x.BankAccount("Ada", 42, 100); a.withdraw(30); expectEqual(a.getBalance(), 70); } },
    { name: "withdraw beyond the balance throws", run: (x) => { const a = new x.BankAccount("Ada", 42, 100); expectThrows(() => a.withdraw(1000)); } },
    { name: "owner and id read like attr_reader", run: (x) => { const a = new x.BankAccount("Ada", 42, 100); expectEqual(a.owner, "Ada"); expectEqual(a.id, 42); } },
  ],

  solution: `class BankAccount {
  constructor(
    public readonly owner: string,
    public readonly id: number,
    private balance: number = 0
  ) {}

  deposit(amount: number): void {
    this.balance += amount;
  }

  withdraw(amount: number): void {
    if (amount > this.balance) {
      throw new Error("Insufficient funds");
    }
    this.balance -= amount;
  }

  getBalance(): number {
    return this.balance;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td>Constructor</td><td><code>def initialize(owner)</code></td><td><code>constructor(owner: string)</code></td></tr>
  <tr><td>Instance variable</td><td><code>@balance</code>, born on assignment</td><td>declared: <code>private balance: number;</code></td></tr>
  <tr><td>Declare + assign in one</td><td>—</td><td><code>constructor(private balance: number = 0)</code></td></tr>
  <tr><td>Read-only accessor</td><td><code>attr_reader :owner</code></td><td><code>public readonly owner: string</code></td></tr>
  <tr><td>Read-write accessor</td><td><code>attr_accessor :name</code></td><td><code>public name: string</code></td></tr>
  <tr><td>Computed reader</td><td><code>def balance = @balance</code></td><td><code>get balance(): number { ... }</code> or a method</td></tr>
  <tr><td>Access inside methods</td><td><code>@balance</code>, bare method calls</td><td><code>this.balance</code> — <code>this.</code> is mandatory</td></tr>
  <tr><td>Privacy</td><td>soft: <code>send</code> bypasses it</td><td>compile-time enforced (and <code>#field</code> for hard runtime privacy)</td></tr>
</table>
<p>The habit to build is <code>this.</code> — Ruby lets a bare
<code>balance</code> resolve to a method or local, but in TypeScript every
property access inside the class goes through <code>this.balance</code>,
explicitly. In exchange, parameter properties delete the boilerplate Ruby
makes you write: the entire declare-assign preamble of
<code>initialize</code> collapses into the constructor's parameter list.</p>`,
};
