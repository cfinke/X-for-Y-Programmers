const LESSON = {
  number: 20,
  title: "Modules & Capstone",

  intro: `
<p>Ruby's <code>require</code> and <code>require_relative</code> load a file's
contents into one big global soup — every class and constant lands in the same
namespace, and you carve out islands with <code>module Inventory</code>. Load
order matters, autoload magic papers over it, and a missing
<code>require</code> becomes a <code>NameError</code> or <code>LoadError</code>
at runtime, sometimes only on the code path that forgot it. TypeScript flips
the model: <strong>every file is already a module</strong>. Nothing leaks out
unless you <code>export</code> it at the definition site, and nothing comes in
unless you <code>import</code> it by name — explicitly, with a checked path
and checked names, at compile time.</p>
<table>
  <tr><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td><code>require_relative "inventory"</code></td><td><code>import { findById } from "./inventory";</code></td></tr>
  <tr><td><code>module Inventory ... end</code> as a namespace</td><td>The file <em>is</em> the namespace — one file, one module</td></tr>
  <tr><td>Everything loaded is visible everywhere</td><td>Only what you <code>export</code> is visible, only where imported</td></tr>
  <tr><td>Wrong load order → <code>NameError</code> at runtime</td><td>Wrong import → compile error, with the exact name and path</td></tr>
  <tr><td>Rails autoload guessing from names</td><td>No magic: the import statement is the whole story</td></tr>
</table>
<p>This final lesson is a capstone. You will build a small, typed
inventory-and-cart module — the kind of file you would actually ship as
<code>cart.ts</code> — using the whole course: interfaces for the shapes, a
generic function, array methods instead of Enumerable, spread for
non-mutating updates, and narrowing. Everything is published with
<code>export</code>, so another file could <code>import</code> exactly what it
needs. (In this single-file editor we only write the exporting side.)</p>`,

  ruby: `# inventory.rb — a namespace carved out of the global soup
module Inventory
  def self.find_by_id(items, id)
    items.find { |item| item[:id] == id }
  end
end

# cart.rb
require_relative "inventory"  # forget this: NameError at runtime

module Cart
  def self.add(cart, product, quantity)
    existing = cart.find { |i| i[:product][:id] == product[:id] }
    if existing
      cart.map do |i|
        next i unless i[:product][:id] == product[:id]
        i.merge(quantity: i[:quantity] + quantity)
      end
    else
      cart + [{ product: product, quantity: quantity }]
    end
  end

  def self.total(cart)
    cart.sum { |i| i[:product][:price] * i[:quantity] }
  end
end`,

  task: `
<p>Build the cart module. Mark <strong>every</strong> function with
<code>export</code> — that is what makes this file a usable module instead of
a private scratchpad:</p>
<ol>
  <li>Define (and export) <code>interface Product</code> — <code>id: number</code>,
      <code>name: string</code>, <code>price: number</code> — and
      <code>interface CartItem</code> — <code>product: Product</code>,
      <code>quantity: number</code>.</li>
  <li><code>export function findById&lt;T extends { id: number }&gt;(items: T[], id: number): T | undefined</code>
      — a generic lookup that works on anything with an <code>id</code>
      (Lesson 12's duck typing, kept honest).</li>
  <li><code>export function addToCart(cart: CartItem[], product: Product, quantity: number): CartItem[]</code>
      — returns a <strong>new</strong> array. If the product is already in the
      cart, bump that item's quantity (spread the item); otherwise append a
      new item (spread the array). Never mutate the input.</li>
  <li><code>export function cartTotal(cart: CartItem[]): number</code> — sum of
      <code>price * quantity</code> via <code>reduce</code>
      (Ruby's <code>sum</code>).</li>
  <li><code>export function describeItem(item: CartItem | string): string</code>
      — narrow with <code>typeof</code>: strings (like <code>"Free shipping"</code>)
      pass through unchanged; cart items become <code>"2 x Keyboard"</code>
      (quantity, space, x, space, product name).</li>
</ol>`,

`,

  exportNames: ["findById", "addToCart", "cartTotal", "describeItem"],

  requirements: [
    { pattern: /export\s+(function|const)/, message: "Publish your functions with export — the file is the module" },
    { pattern: /<\s*T\s+extends/, message: "Make findById generic: <T extends { id: number }>" },
    { pattern: /\.\.\./, message: "Use spread (...) for the non-mutating cart update" },
    { pattern: /typeof/, message: "Narrow CartItem | string with a typeof guard in describeItem" },
  ],

  tests: [
    { name: "findById finds by id, or returns undefined", run: (x) => {
        const products = [
          { id: 1, name: "Keyboard", price: 50 },
          { id: 2, name: "Mouse", price: 25 },
        ];
        expectEqual(x.findById(products, 2).name, "Mouse");
        expectEqual(x.findById(products, 99), undefined);
      } },
    { name: "addToCart appends a new item without touching the original", run: (x) => {
        const cart = [];
        const result = x.addToCart(cart, { id: 2, name: "Mouse", price: 25 }, 1);
        expectEqual(result.length, 1);
        expectEqual(result[0].product.name, "Mouse");
        expectEqual(result[0].quantity, 1);
        expectEqual(cart.length, 0);
      } },
    { name: "addToCart bumps the quantity of an existing product", run: (x) => {
        const keyboard = { id: 1, name: "Keyboard", price: 50 };
        const cart = [{ product: keyboard, quantity: 1 }];
        const result = x.addToCart(cart, keyboard, 2);
        expectEqual(result.length, 1);
        expectEqual(result[0].quantity, 3);
        expectEqual(cart[0].quantity, 1);
      } },
    { name: "cartTotal sums price * quantity", run: (x) => {
        const cart = [
          { product: { id: 1, name: "Keyboard", price: 50 }, quantity: 2 },
          { product: { id: 2, name: "Mouse", price: 25 }, quantity: 1 },
        ];
        expectEqual(x.cartTotal(cart), 125);
        expectEqual(x.cartTotal([]), 0);
      } },
    { name: "describeItem narrows the union correctly", run: (x) => {
        expectEqual(x.describeItem("Free shipping"), "Free shipping");
        const item = { product: { id: 1, name: "Keyboard", price: 50 }, quantity: 2 };
        expectEqual(x.describeItem(item), "2 x Keyboard");
      } },
  ],

  solution: `export interface Product {
  id: number;
  name: string;
  price: number;
}

export interface CartItem {
  product: Product;
  quantity: number;
}

export function findById<T extends { id: number }>(items: T[], id: number): T | undefined {
  return items.find((item) => item.id === id);
}

export function addToCart(cart: CartItem[], product: Product, quantity: number): CartItem[] {
  const existing = cart.find((item) => item.product.id === product.id);
  if (existing) {
    return cart.map((item) =>
      item.product.id === product.id
        ? { ...item, quantity: item.quantity + quantity }
        : item
    );
  }
  return [...cart, { product: product, quantity: quantity }];
}

export function cartTotal(cart: CartItem[]): number {
  return cart.reduce((sum, item) => sum + item.product.price * item.quantity, 0);
}

export function describeItem(item: CartItem | string): string {
  if (typeof item === "string") {
    return item;
  }
  return item.quantity + " x " + item.product.name;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td>Bring code in</td><td><code>require "json"</code> / <code>require_relative "cart"</code></td><td><code>import { addToCart } from "./cart";</code></td></tr>
  <tr><td>Namespace</td><td><code>module Cart ... end</code></td><td>The file itself; <code>export</code> marks the public API</td></tr>
  <tr><td>Public vs private</td><td>Everything loaded is global; <code>private_constant</code> to hide</td><td>Private by default; <code>export</code> to publish</td></tr>
  <tr><td>Default export</td><td>n/a</td><td><code>export default</code> — one main thing per file, imported without braces</td></tr>
  <tr><td>Missing dependency</td><td><code>NameError</code> / <code>LoadError</code> at runtime</td><td>Compile error naming the file and symbol</td></tr>
  <tr><td>Load order puzzles</td><td>Real (see: every large pre-Zeitwerk app)</td><td>Nonexistent — the import graph is resolved for you</td></tr>
</table>
<p>The insight — and the course in one sentence: everything Ruby verifies at
runtime (duck types, pattern matches, hash shapes, load order), TypeScript
verifies before the program starts, and the capstone you just wrote used all
of it — interfaces as formalized duck types, a generic that keeps type
information flowing, Enumerable-style array methods, spread instead of
mutation, narrowing instead of <code>is_a?</code> sprinkled on faith, and
<code>export</code> instead of the global soup. You are not writing Ruby with
annotations; you are writing Ruby's intentions, checked.</p>`,
};
