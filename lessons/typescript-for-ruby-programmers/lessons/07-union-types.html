<title>Lesson 7: Union Types</title>
<link rel="stylesheet" href="../../../shared/css/style.css">

<body>
<div id="app"></div>
<script>
const LESSON = {
  number: 7,
  title: "Union Types",

  intro: `
<p>When a Ruby method accepts "an ID that might be a number or a string", the
signature says nothing — <code>def format_id(id)</code> takes whatever
arrives, and the careful version litters the body with
<code>respond_to?(:upcase)</code> or <code>is_a?(String)</code> checks. The
contract lives in your head (or a comment), and a caller who passes
<code>nil</code> finds out via <code>NoMethodError</code> in production.</p>
<table>
  <tr><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td><code>def format_id(id)</code> — anything arrives</td><td><code>function formatId(id: number | string)</code></td></tr>
  <tr><td><code>id.is_a?(String)</code> / <code>id.respond_to?(:upcase)</code></td><td><code>typeof id === "string"</code></td></tr>
  <tr><td>after the check: still your job to be right</td><td>after the check: the compiler <em>narrows</em> the type</td></tr>
  <tr><td><code>format_id(nil)</code> → <code>NoMethodError</code> at runtime</td><td><code>formatId(null)</code> → compile error at the call site</td></tr>
</table>
<p>A union type writes the duck-typed contract down:
<code>number | string</code> means "one of these two, nothing else". Inside
the function, TypeScript enforces the discipline you already practice on good
days: you cannot call <code>id.toUpperCase()</code> until you have proven
<code>id</code> is a string. The proof is a plain <code>typeof</code> check —
and here is the clever part: inside the <code>if</code>, the compiler
<em>narrows</em> the union, so <code>id</code> simply <em>is</em> a
<code>string</code> in that branch and a <code>number</code> in the
<code>else</code>. It is <code>respond_to?</code> that the compiler verifies
you actually did.</p>`,

  ruby: `# Ruby ducks it: * happens to work on Integer and String alike
def double(value)
  value * 2          # 21 -> 42, "na" -> "nana"... until nil arrives
end

def format_id(id)
  if id.respond_to?(:upcase)   # the polite guess at "is it a string?"
    id.upcase
  else
    format("ID-%04d", id)
  end
end

format_id(42)       # => "ID-0042"
format_id("a1b2")   # => "A1B2"
format_id(nil)      # NoMethodError — discovered whenever this line runs

# Nothing stops the nil at the door; the signature promises nothing.`,

  task: `
<p>Declare the contract Ruby left implicit:</p>
<ol>
  <li>Complete <code>formatId(id: number | string): string</code> — the union
      goes right in the signature. When <code>typeof id === "number"</code>,
      return <code>"ID-"</code> plus the number zero-padded to 4 digits
      (<code>String(id).padStart(4, "0")</code>); otherwise return
      <code>id.toUpperCase()</code>.</li>
  <li>Complete <code>double(value: number | string): number | string</code> —
      Ruby's <code>value * 2</code> did both jobs by luck; here you must
      narrow first. Numbers are doubled (<code>21</code> → <code>42</code>),
      strings are repeated (<code>"na"</code> → <code>"nana"</code>).</li>
</ol>
<p>Before writing the <code>typeof</code> check, try calling
<code>id.toUpperCase()</code> on the first line of <code>formatId</code> —
the compiler blocks it, because <code>id</code> might be a number. Add the
check and watch the red squiggle disappear: that is narrowing.</p>`,

  starter: `// 1. The union goes in the signature: this function takes a number OR a
//    string, and the compiler holds every caller to it.
function formatId(id: number | string): string {
  // TODO: if typeof id === "number", return "ID-" + zero-padded 4 digits
  //       (String(id).padStart(4, "0")); otherwise return id.toUpperCase().
  // Try id.toUpperCase() BEFORE the typeof check — the compiler stops you.
  return "";
}

// 2. Ruby's value * 2 happened to work on both types. Narrow, then act:
//    numbers are doubled, strings are repeated.
function double(value: number | string): number | string {
  // TODO
  return 0;
}
`,

  exportNames: ["formatId", "double"],

  requirements: [
    { pattern: /formatId\s*\(\s*id\s*:\s*number\s*\|\s*string\s*\)/, message: "Declare the union in the signature: formatId(id: number | string)" },
    { pattern: /typeof\s+\w+\s*===/, message: "Narrow with a typeof check (the compiler-verified respond_to?)" },
  ],

  tests: [
    { name: 'formatId(42) is "ID-0042"', run: (x) => expectEqual(x.formatId(42), "ID-0042") },
    { name: 'formatId(7) is "ID-0007"', run: (x) => expectEqual(x.formatId(7), "ID-0007") },
    { name: 'formatId("a1b2") is "A1B2"', run: (x) => expectEqual(x.formatId("a1b2"), "A1B2") },
    { name: "double(21) is 42", run: (x) => expectEqual(x.double(21), 42) },
    { name: 'double("na") is "nana"', run: (x) => expectEqual(x.double("na"), "nana") },
  ],

  solution: `function formatId(id: number | string): string {
  if (typeof id === "number") {
    return "ID-" + String(id).padStart(4, "0");
  }
  return id.toUpperCase(); // in this branch, id can only be a string
}

function double(value: number | string): number | string {
  if (typeof value === "number") {
    return value * 2;
  }
  return value + value;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td>"Either type" parameter</td><td><code>def f(x)</code> + a comment, if you're lucky</td><td><code>function f(x: number | string)</code></td></tr>
  <tr><td>Runtime type check</td><td><code>x.is_a?(String)</code></td><td><code>typeof x === "string"</code></td></tr>
  <tr><td>Duck check</td><td><code>x.respond_to?(:upcase)</code></td><td>unneeded — the union already lists every possibility</td></tr>
  <tr><td>After the check</td><td>nothing changes; you just hope</td><td>the type <em>narrows</em> inside the branch</td></tr>
  <tr><td>Wrong type passed</td><td><code>NoMethodError</code>, at runtime</td><td>compile error, at the call site</td></tr>
  <tr><td>Nilable</td><td><code>nil</code> can always sneak in</td><td>only if you wrote <code>| null</code></td></tr>
</table>
<p>Unions flip the duck-typing bargain. Ruby says "accept anything, check if
you're nervous"; TypeScript says "list what you accept, and I will make the
check mandatory and then <em>remember</em> it". Note what a union is not: it
is not "either type, anywhere" — outside a narrowing check you can only use
what both members support, which is exactly why the compiler blocks
<code>.toUpperCase()</code> until you have proven the string case.</p>`,
};
</script>
