  number: 19,
  title: "Async & Promises",

  intro: `
<p>In Ruby, waiting is the default. <code>Net::HTTP.get</code> simply blocks
the thread until the bytes arrive, and that is fine — Threads, Fibers, and the
async gems exist, but for most Rubyists they are exotic tools you reach for
twice a year. In TypeScript the water you swim in is the opposite: nothing
blocks, ever. An operation that takes time returns immediately with a
<code>Promise&lt;T&gt;</code> — "a T, later". <code>async</code>/<code>await</code>
is the syntax that lets you consume those promises in code that <em>reads</em>
exactly like blocking Ruby, while the single-threaded event loop keeps
everything else moving.</p>
<table>
  <tr><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td><code>response = Net::HTTP.get(uri)</code> (blocks)</td><td><code>const response = await fetch(url);</code> (yields, resumes later)</td></tr>
  <tr><td>Return value: the data itself</td><td>Return value of an async function: <code>Promise&lt;T&gt;</code></td></tr>
  <tr><td><code>ids.map { |id| fetch_user(id) }</code> — sequential, one at a time</td><td><code>await Promise.all(ids.map(fetchUser))</code> — concurrent, one thread</td></tr>
  <tr><td><code>begin ... rescue =&gt; e ... end</code></td><td><code>try { await ... } catch (e) { ... }</code></td></tr>
  <tr><td>Concurrency: Threads + Mutex + GVL debates</td><td>One event loop — no locks, no data races on shared state</td></tr>
</table>
<p>Two rules carry you a long way. First: <code>async function f(): Promise&lt;string&gt;</code>
means "call me and you get a promise; <code>await</code> me inside another
async function and you get the string". Second: <code>await</code> one thing
at a time and you have written sequential Ruby with extra steps —
<code>Promise.all</code> is how you fire off every request at once and wait
for them together, no Mutex, no GVL, no <code>Thread.new</code>.</p>`,

  ruby: `def fetch_user(id)
  # Blocks the whole thread until the response arrives.
  # In Ruby, that's just how life is — and it's fine.
  response = Net::HTTP.get(URI("https://example.com/users/#{id}"))
  JSON.parse(response, symbolize_names: true)
end

def fetch_user_names(ids)
  # Sequential: request 2 doesn't start until request 1 finishes.
  ids.map { |id| fetch_user(id)[:name] }
end

def fetch_user_name_or_guest(id)
  fetch_user(id)[:name]
rescue StandardError
  "guest"
end`,

  task: `
<p>The starter gives you <code>fetchUser</code> — a deterministic stand-in for
a network call that resolves on a later tick of the event loop (built on
<code>Promise.resolve().then(...)</code>; no timers, no randomness). Users 1,
2, and 3 exist; any other id rejects, like a 404. Build on it:</p>
<ol>
  <li>Write <code>async function fetchUserNames(ids: number[]): Promise&lt;string[]&gt;</code>
      that fetches <strong>all</strong> the users concurrently with
      <code>Promise.all</code>, then returns their names in the same order as
      <code>ids</code>. Do not <code>await</code> inside a loop — that is
      sequential Ruby wearing a costume.</li>
  <li>Write <code>async function fetchUserNameOrGuest(id: number): Promise&lt;string&gt;</code>
      that returns the user's name, or <code>"guest"</code> if the fetch
      rejects. This is <code>begin/rescue</code> spelled
      <code>try { await ... } catch { ... }</code> — <code>await</code> is
      what turns a rejected promise into a catchable exception.</li>
</ol>`,

  starter: `interface User {
  id: number;
  name: string;
}

const FAKE_DB: Record<number, string> = {
  1: "Matz",
  2: "Aaron",
  3: "Koichi",
};

// A deterministic fake network call. Promise.resolve().then(...) defers
// the work to a later tick of the event loop — asynchronous, but with
// no timers and no randomness.
function fetchUser(id: number): Promise<User> {
  return Promise.resolve().then(() => {
    const name = FAKE_DB[id];
    if (name === undefined) {
      throw new Error("No user with id " + id); // becomes a rejection
    }
    return { id: id, name: name };
  });
}

// 1. Fetch every id CONCURRENTLY, keep the order of ids.
//    Ruby: ids.map { |id| fetch_user(id)[:name] }  -- but all at once.
async function fetchUserNames(ids: number[]): Promise<string[]> {
  // TODO: Promise.all over ids.map(...), then map users to names
  return [];
}

// 2. begin/rescue -> try/catch. Rejections only become catchable
//    exceptions when you await them.
async function fetchUserNameOrGuest(id: number): Promise<string> {
  // TODO: try to await fetchUser(id); rescue by returning "guest"
  return "guest";
}
`,

  exportNames: ["fetchUser", "fetchUserNames", "fetchUserNameOrGuest"],

  requirements: [
    { pattern: /async\s+function/, message: "Declare your functions with async function — they return Promises" },
    { pattern: /await/, message: "Use await to unwrap promises, like Ruby code that just... waits" },
    { pattern: /Promise\.all/, message: "Use Promise.all to run the fetches concurrently, not one by one" },
    { pattern: /try\s*\{/, message: "Handle the rejection with try/catch — begin/rescue for promises" },
  ],

  tests: [
    { name: "fetchUser(1) resolves to Matz", run: async (x) => {
        const user = await x.fetchUser(1);
        expectEqual(user.name, "Matz");
        expectEqual(user.id, 1);
      } },
    { name: "fetchUserNames([1, 2, 3]) resolves to all three names", run: async (x) => {
        expectDeepEqual(await x.fetchUserNames([1, 2, 3]), ["Matz", "Aaron", "Koichi"]);
      } },
    { name: "fetchUserNames keeps the order of the ids you passed", run: async (x) => {
        expectDeepEqual(await x.fetchUserNames([3, 1]), ["Koichi", "Matz"]);
      } },
    { name: "fetchUser(99) rejects (the 404 case)", run: async (x) => {
        let rejected = false;
        try {
          await x.fetchUser(99);
        } catch (e) {
          rejected = true;
        }
        expectTruthy(rejected);
      } },
    { name: 'fetchUserNameOrGuest(99) rescues to "guest"', run: async (x) => {
        expectEqual(await x.fetchUserNameOrGuest(99), "guest");
      } },
    { name: "fetchUserNameOrGuest(2) returns the real name", run: async (x) => {
        expectEqual(await x.fetchUserNameOrGuest(2), "Aaron");
      } },
  ],

  solution: `interface User {
  id: number;
  name: string;
}

const FAKE_DB: Record<number, string> = {
  1: "Matz",
  2: "Aaron",
  3: "Koichi",
};

function fetchUser(id: number): Promise<User> {
  return Promise.resolve().then(() => {
    const name = FAKE_DB[id];
    if (name === undefined) {
      throw new Error("No user with id " + id);
    }
    return { id: id, name: name };
  });
}

async function fetchUserNames(ids: number[]): Promise<string[]> {
  // Every fetch starts immediately; Promise.all waits for all of them
  // and preserves order. One thread, no Mutex, no GVL.
  const users = await Promise.all(ids.map((id) => fetchUser(id)));
  return users.map((user) => user.name);
}

async function fetchUserNameOrGuest(id: number): Promise<string> {
  try {
    const user = await fetchUser(id);
    return user.name;
  } catch (error) {
    return "guest";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>TypeScript</th></tr>
  <tr><td>Slow call</td><td>Blocks the thread</td><td>Returns <code>Promise&lt;T&gt;</code> immediately</td></tr>
  <tr><td>"Just wait for it"</td><td>Default behavior</td><td><code>await promise</code> (only inside <code>async</code> functions)</td></tr>
  <tr><td>Declaring it</td><td><code>def fetch_user(id)</code></td><td><code>async function fetchUser(id: number): Promise&lt;User&gt;</code></td></tr>
  <tr><td>N calls at once</td><td><code>ids.map { Thread.new { ... } }.map(&amp;:value)</code> (exotic)</td><td><code>await Promise.all(ids.map(fetchUser))</code> (everyday)</td></tr>
  <tr><td>Error handling</td><td><code>begin / rescue =&gt; e / end</code></td><td><code>try { await ... } catch (e) { ... }</code></td></tr>
  <tr><td>Shared-state hazards</td><td>Mutex, GVL, race conditions</td><td>One event loop — concurrency without locks</td></tr>
</table>
<p>The insight: an <code>async function</code> never returns the value — it
always returns a <code>Promise</code>, even if you return a plain string
inside it. The mental shift from Ruby is not the syntax (with
<code>await</code>, it reads identically); it is remembering that between an
<code>await</code> and the next line, <em>time passes and other code runs</em>.
And <code>Promise.all</code> is the payoff: the concurrency Ruby makes you
build out of Threads and locks comes free, on one thread.</p>`,
};
