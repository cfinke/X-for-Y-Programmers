<script>
const LESSON = {
  number: 12,
  title: "Traits",

  intro: `
<p>Traits are Rust's interfaces: a named set of methods a type promises to
provide. The declaration will look instantly familiar — required methods are
bare signatures, and default methods (an interface method with a body in
Kotlin) carry over directly: a trait method with a body is inherited by every
implementor unless it overrides it.</p>
<table>
  <tr><th>Kotlin</th><th>Rust</th></tr>
  <tr><td><code>interface Describe { fun name(): String }</code></td><td><code>trait Describe { fn name(&amp;self) -&gt; String; }</code></td></tr>
  <tr><td><code>fun describe(): String { ... }</code> (body in interface)</td><td><code>fn describe(&amp;self) -&gt; String { ... }</code> (body = default)</td></tr>
  <tr><td><code>class Dog : Describe { ... }</code></td><td><code>struct Dog;</code> then <code>impl Describe for Dog { ... }</code></td></tr>
  <tr><td>Implementation lives inside the class</td><td>Implementation is a separate <code>impl</code> block</td></tr>
</table>
<p>The structural difference is the big one: in Kotlin, the <code>: Describe</code>
supertype list is welded to the class declaration, so a type's interfaces are
fixed by whoever wrote it. In Rust the implementation lives <em>outside</em> the
type, in its own <code>impl Describe for Dog</code> block — which means you can
implement <em>your</em> trait for types you didn't write:
<code>impl Describe for String</code> is perfectly legal. Kotlin's extension
functions let you bolt <em>functions</em> onto foreign types, but they can't
make that type actually <em>implement</em> your interface — in Rust a trait impl
does exactly that, no adapter classes required.</p>`,

  kotlin: `interface Describe {
    fun name(): String

    // Interface method with a body — inherited unless overridden.
    fun describe(): String = "I am a \${name()}"
}

class Dog : Describe {
    override fun name() = "Dog"
}

class Robot : Describe {
    override fun name() = "Robot"
}

// You can't make String, or any library class, implement Describe:
// the supertype list is fixed at class-declaration time. An extension
// function can add describe() to String, but not make it a Describe.
// In Rust: impl Describe for String { ... }
println(Dog().describe()) // "I am a Dog"`,

  task: `
<p>Port the interface to a trait. The structs <code>Dog</code> and
<code>Robot</code> are already in the starter:</p>
<ol>
  <li>In <code>trait Describe</code>, keep the required method
      <code>fn name(&amp;self) -&gt; String</code> and give the default method
      <code>fn describe(&amp;self) -&gt; String</code> a real body: return
      <code>"I am a Dog"</code>-style text by calling <code>self.name()</code>
      inside <code>format!</code>.</li>
  <li>Fill in <code>impl Describe for Dog</code> so <code>name()</code>
      returns <code>"Dog"</code>.</li>
  <li>Fill in <code>impl Describe for Robot</code> so <code>name()</code>
      returns <code>"Robot"</code>. Neither impl should define
      <code>describe</code> — let the default do the work for both.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your methods
directly.</p>`,

  starter: `struct Dog;
struct Robot;

trait Describe {
    // Required method: every implementor must provide it.
    fn name(&self) -> String;

    // Default method (like a Kotlin interface method with a body): give it a body that
    // returns "I am a <name>" using self.name() and format!.
    fn describe(&self) -> String {
        todo!()
    }
}

// Note: the implementation lives OUTSIDE the struct.
impl Describe for Dog {
    fn name(&self) -> String {
        todo!()
    }
}

impl Describe for Robot {
    fn name(&self) -> String {
        todo!()
    }
}
`,

  requirements: [
    { pattern: /trait\s+Describe/, message: "Define trait Describe" },
    { pattern: /impl\s+Describe\s+for\s+/, message: "Implement Describe in an impl Describe for ... block" },
    { pattern: /self\.name\(\)/, message: "The default describe() should call self.name()" },
  ],

  tests: [
    { name: 'Dog.name() returns "Dog"',
      code: 'assert_eq!(Dog.name(), "Dog");' },
    { name: 'Robot.name() returns "Robot"',
      code: 'assert_eq!(Robot.name(), "Robot");' },
    { name: 'Dog.describe() returns "I am a Dog" via the default method',
      code: 'assert_eq!(Dog.describe(), "I am a Dog");' },
    { name: 'Robot.describe() returns "I am a Robot" via the default method',
      code: 'assert_eq!(Robot.describe(), "I am a Robot");' },
  ],

  solution: `struct Dog;
struct Robot;

trait Describe {
    fn name(&self) -> String;

    fn describe(&self) -> String {
        format!("I am a {}", self.name())
    }
}

impl Describe for Dog {
    fn name(&self) -> String {
        String::from("Dog")
    }
}

impl Describe for Robot {
    fn name(&self) -> String {
        String::from("Robot")
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Rust</th></tr>
  <tr><td>Contract</td><td><code>interface Describe</code></td><td><code>trait Describe</code></td></tr>
  <tr><td>Required method</td><td><code>fun name(): String</code></td><td><code>fn name(&amp;self) -&gt; String;</code></td></tr>
  <tr><td>Default method</td><td><code>fun describe(): String { ... }</code></td><td><code>fn describe(&amp;self) -&gt; String { ... }</code></td></tr>
  <tr><td>Implementing</td><td><code>class Dog : Describe</code></td><td><code>impl Describe for Dog</code> (a separate block)</td></tr>
  <tr><td>Foreign types</td><td>extension function (can't add the interface)</td><td><code>impl Describe for String</code> — just do it</td></tr>
</table>
<p>Because implementations are detached from type declarations, "does Dog
implement Describe?" is answered by the <code>impl</code> blocks in scope, not
by Dog's author. The one rule to remember (the <em>orphan rule</em>): at least
one of the trait or the type must be yours — you can't implement someone
else's trait for someone else's type. Everything else, including implementing
<code>Describe</code> for <code>i32</code>, is fair game.</p>`,
};
</script>
