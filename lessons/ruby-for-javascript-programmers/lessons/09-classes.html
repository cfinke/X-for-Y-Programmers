const LESSON = {
  number: 9,
  title: "Classes & Objects",

  intro: `
<p>Ruby classes will feel familiar in shape and lighter in ceremony. The
constructor is a plain method named <code>initialize</code>, and you never
call it directly — <code>User.new("Ada")</code> allocates the object and
forwards the arguments (yes, <code>new</code> is a method on the class, not
an operator). Instance state is <code>@ivars</code>: <code>this.x = x</code>
becomes <code>@x = x</code>, with no field declarations and no
<code>#private</code> syntax — <strong>ivars are always private</strong>;
outside code can only reach them through methods you expose.</p>
<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td><code>constructor(x) { this.x = x; }</code></td><td><code>def initialize(x) @x = x end</code></td></tr>
  <tr><td><code>new User("Ada")</code></td><td><code>User.new("Ada")</code></td></tr>
  <tr><td><code>get balance() { return this.#balance; }</code></td><td><code>attr_reader :balance</code></td></tr>
  <tr><td>getter + setter pair</td><td><code>attr_accessor :name</code></td></tr>
  <tr><td><code>this</code> (depends on the call site)</td><td><code>self</code> (always the lexically enclosing object)</td></tr>
</table>
<p>The getter/setter boilerplate collapses into one line:
<code>attr_reader :owner</code> <em>generates</em> a read method for
<code>@owner</code>; <code>attr_accessor</code> generates reader and writer.
Two relief notes for the JavaScript-scarred: there are no
<code>this</code>-binding puzzles — <code>self</code> is fixed by where the
code sits, never by how a method was passed around, so nothing ever needs a
<code>.bind(this)</code>. And <code>private</code> below a group of methods
makes them genuinely uncallable from outside — real privacy, not an
underscore convention.</p>`,

  javascript: `class BankAccount {
  #balance = 0;                     // declare the field

  constructor(owner) {
    this.owner = owner;             // this. everywhere
  }

  get balance() {                   // getter boilerplate
    return this.#balance;
  }

  deposit(amount) {
    this.#balance += amount;
  }

  withdraw(amount) {
    if (amount > this.#balance) return false;
    this.#balance -= amount;
    return true;
  }
}

const acct = new BankAccount("Ada");`,

  task: `
<p>Port <code>BankAccount</code> to Ruby:</p>
<ol>
  <li>Define <code>class BankAccount</code> with
      <code>attr_reader :owner, :balance</code> — that single line replaces
      the getter methods.</li>
  <li><code>initialize(owner)</code> — store <code>@owner</code> and start
      <code>@balance</code> at <code>0</code>. No field declarations; the
      assignments <em>are</em> the fields.</li>
  <li><code>deposit(amount)</code> — add to <code>@balance</code>.</li>
  <li><code>withdraw(amount)</code> — return <code>false</code> if
      <code>amount</code> exceeds the balance (nothing deducted — the tests
      check!); otherwise deduct it and return <code>true</code>. A modifier
      guard reads well: <code>return false if amount &gt; @balance</code>.</li>
</ol>`,

  starter: `class BankAccount
  attr_reader :owner, :balance

  def initialize(owner)
    raise NotImplementedError, "TODO: set @owner, and start @balance at 0"
  end

  def deposit(amount)
    raise NotImplementedError, "TODO: implement deposit"
  end

  def withdraw(amount)
    raise NotImplementedError, "TODO: false if insufficient, else deduct and true"
  end
end
`,

  requirements: [
    { pattern: /class\s+BankAccount/, message: "Define class BankAccount" },
    { pattern: /def\s+initialize/, message: "Define the constructor as def initialize" },
    { pattern: /attr_reader|attr_accessor/, message: "Generate the accessors with attr_reader (or attr_accessor)" },
    { pattern: /@balance/, message: "Keep the state in the @balance instance variable" },
  ],

  tests: [
    { name: 'BankAccount.new("Ada") sets owner and starts balance at 0',
      code: '  acct = BankAccount.new("Ada")\n  expect_eq(acct.owner, "Ada")\n  expect_eq(acct.balance, 0)' },
    { name: "deposit(50) then deposit(25) leaves balance at 75",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(50)\n  acct.deposit(25)\n  expect_eq(acct.balance, 75)' },
    { name: "withdraw(30) from 50 returns true and leaves 20",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(50)\n  expect_eq(acct.withdraw(30), true)\n  expect_eq(acct.balance, 20)' },
    { name: "withdraw(100) from 50 returns false",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(50)\n  expect_eq(acct.withdraw(100), false)' },
    { name: "a failed withdraw leaves the balance unchanged",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(50)\n  acct.withdraw(100)\n  expect_eq(acct.balance, 50)' },
  ],

  solution: `class BankAccount
  attr_reader :owner, :balance

  def initialize(owner)
    @owner = owner
    @balance = 0
  end

  def deposit(amount)
    @balance += amount
  end

  def withdraw(amount)
    return false if amount > @balance

    @balance -= amount
    true
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Constructor</td><td><code>constructor(x)</code></td><td><code>def initialize(x)</code></td></tr>
  <tr><td>Instantiate</td><td><code>new User("Ada")</code></td><td><code>User.new("Ada")</code></td></tr>
  <tr><td>Instance state</td><td><code>this.x</code> / <code>this.#x</code></td><td><code>@x</code> (always private)</td></tr>
  <tr><td>Getter</td><td><code>get x() { return this.#x; }</code></td><td><code>attr_reader :x</code></td></tr>
  <tr><td>Getter + setter</td><td><code>get x()</code> + <code>set x(v)</code></td><td><code>attr_accessor :x</code></td></tr>
  <tr><td>Private methods</td><td><code>#helper() {}</code></td><td><code>private</code> before the defs</td></tr>
  <tr><td>Self-reference</td><td><code>this</code> (call-site dependent)</td><td><code>self</code> (lexically fixed)</td></tr>
</table>
<p><code>attr_reader :owner, :balance</code> isn't syntax — it's an ordinary
method call executing at class-definition time that <em>writes the getter
methods for you</em>. Classes are just code being run, which is the seed of
Ruby metaprogramming. Note <code>withdraw</code>'s shape: a modifier guard,
the mutation, then a bare <code>true</code> as the last expression —
implicit return doing the work three lessons of habits have been building
toward.</p>`,
};
