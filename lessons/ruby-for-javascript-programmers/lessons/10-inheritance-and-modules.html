<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance & Modules",

  intro: `
<p><code>extends</code> becomes a single character: <code>class Circle &lt;
Shape</code>. Overriding works as you expect, and <code>super</code> calls
the parent's version — but watch the parentheses, because the intuition is
<em>exactly inverted</em> from JavaScript: bare <code>super</code> (no
parens) forwards <strong>all</strong> of the current method's arguments
automatically, while <code>super()</code> calls the parent with
<strong>none</strong>. Ruby also has no <code>abstract</code> keyword — the
convention is a base method that does <code>raise NotImplementedError</code>,
so forgetting to override fails loudly at the first call.</p>
<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td><code>class Circle extends Shape</code></td><td><code>class Circle &lt; Shape</code></td></tr>
  <tr><td><code>super(a, b)</code> (explicit, parens required)</td><td><code>super</code> forwards all args; <code>super()</code> passes none</td></tr>
  <tr><td>abstract: TypeScript keyword or thrown Error</td><td><code>raise NotImplementedError</code> by convention</td></tr>
  <tr><td><code>Object.assign(Robot.prototype, mixin)</code></td><td><code>include Greetable</code></td></tr>
</table>
<p>Then the thing JavaScript never got as a language feature:
<strong>modules as mixins</strong>. A <code>module</code> is a bundle of
methods with no instances of its own; <code>include Greetable</code> injects
its instance methods into any class — composition without prototype surgery.
The module's methods can call methods like <code>name</code> that it doesn't
define, trusting the including class to provide them (duck typing meets
inheritance). Any number of classes can include any number of modules —
multiple-inheritance-shaped power with a defined method-lookup order.</p>`,

  javascript: `class Shape {
  area() { throw new Error("not implemented"); }
  describe() {
    return \`A shape with area \${this.area()}\`;
  }
}

class Circle extends Shape {
  constructor(radius) {
    super();               // required, parens and all
    this.radius = radius;
  }
  area() {
    return +(Math.PI * this.radius ** 2).toFixed(2);
  }
}

// "Mixins": copy methods onto the prototype by hand.
const greetable = {
  greet() { return \`Hi, I'm \${this.name}\`; },
};
Object.assign(Robot.prototype, greetable);`,

  task: `
<p>Build the hierarchy, then out-mixin JavaScript:</p>
<ol>
  <li><code>class Shape</code> — <code>area</code> raises
      <code>NotImplementedError</code> (the "abstract method" convention),
      and <code>describe</code> returns
      <code>"A shape with area #{area}"</code> — it calls whichever
      <code>area</code> the subclass provides.</li>
  <li><code>class Circle &lt; Shape</code> — <code>initialize(radius)</code>
      stores <code>@radius</code>; <code>area</code> returns
      <code>(Math::PI * @radius ** 2).round(2)</code>.</li>
  <li><code>class Rectangle &lt; Shape</code> —
      <code>initialize(width, height)</code>; <code>area</code> multiplies
      them.</li>
  <li><code>module Greetable</code> — <code>greet</code> returns
      <code>"Hi, I'm #{name}"</code>, calling a <code>name</code> method the
      module itself never defines.</li>
  <li><code>class Robot</code> — <code>include Greetable</code>, with
      <code>attr_reader :name</code> and <code>initialize(name)</code>. No
      Shape in sight: mixins cross class hierarchies.</li>
</ol>`,

  starter: `class Shape
  # The "abstract method" convention: raise so subclasses must override.
  def area
    raise NotImplementedError, "TODO: subclasses must implement area"
  end

  def describe
    raise NotImplementedError, "TODO: interpolate area into a description"
  end
end

class Circle < Shape
  def initialize(radius)
    raise NotImplementedError, "TODO: store @radius"
  end

  def area
    raise NotImplementedError, "TODO: (Math::PI * @radius ** 2).round(2)"
  end
end

class Rectangle < Shape
  def initialize(width, height)
    raise NotImplementedError, "TODO: store @width and @height"
  end

  def area
    raise NotImplementedError, "TODO: width times height"
  end
end

module Greetable
  def greet
    raise NotImplementedError, "TODO: use the including class's name method"
  end
end

class Robot
  include Greetable
  attr_reader :name

  def initialize(name)
    raise NotImplementedError, "TODO: store @name"
  end
end
`,

  requirements: [
    { pattern: /<\s*Shape/, message: "Inherit with < Shape (Ruby's extends)" },
    { pattern: /NotImplementedError/, message: "Shape#area raises NotImplementedError" },
    { pattern: /module\s+Greetable/, message: "Define module Greetable" },
    { pattern: /include\s+Greetable/, message: "Mix it in with include Greetable" },
  ],

  tests: [
    { name: "Circle.new(1).area returns 3.14",
      code: "  expect_eq(Circle.new(1).area, 3.14)" },
    { name: "Circle.new(2).area returns 12.57",
      code: "  expect_eq(Circle.new(2).area, 12.57)" },
    { name: "Rectangle.new(3, 4).area returns 12",
      code: "  expect_eq(Rectangle.new(3, 4).area, 12)" },
    { name: 'describe (defined once on Shape) uses each subclass\'s area',
      code: '  expect_eq(Rectangle.new(3, 4).describe, "A shape with area 12")\n  expect_eq(Circle.new(1).describe, "A shape with area 3.14")' },
    { name: "Shape.new.area raises NotImplementedError",
      code: '  raised = false\n  begin\n    Shape.new.area\n  rescue NotImplementedError\n    raised = true\n  end\n  expect_true(raised)' },
    { name: 'Robot.new("Bender").greet returns "Hi, I\'m Bender" via the mixin',
      code: '  expect_eq(Robot.new("Bender").greet, "Hi, I\'m Bender")' },
  ],

  solution: `class Shape
  def area
    raise NotImplementedError, "subclasses must implement area"
  end

  def describe
    "A shape with area #{area}"
  end
end

class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    (Math::PI * @radius ** 2).round(2)
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    @width * @height
  end
end

module Greetable
  def greet
    "Hi, I'm #{name}"
  end
end

class Robot
  include Greetable
  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Inherit</td><td><code>class C extends S</code></td><td><code>class C &lt; S</code></td></tr>
  <tr><td>Call parent, same args</td><td><code>super(a, b)</code> — spell them out</td><td><code>super</code> — bare keyword forwards everything</td></tr>
  <tr><td>Call parent, no args</td><td><code>super()</code></td><td><code>super()</code> — parens mean NONE (inverted!)</td></tr>
  <tr><td>Abstract method</td><td><code>throw new Error(...)</code> / TS <code>abstract</code></td><td><code>raise NotImplementedError</code></td></tr>
  <tr><td>Mixin</td><td><code>Object.assign(C.prototype, obj)</code></td><td><code>include SomeModule</code></td></tr>
  <tr><td>Instance check</td><td><code>x instanceof C</code></td><td><code>x.is_a?(C)</code> — true for included modules too</td></tr>
</table>
<p>Burn in the <code>super</code> inversion: in a Ruby
<code>initialize(radius)</code>, bare <code>super</code> means
<code>super(radius)</code>, and if the parent takes zero arguments you must
write <code>super()</code> — the opposite of every JavaScript reflex you
own. And notice what <code>Greetable</code> did: <code>greet</code> calls
<code>name</code> on faith, <code>Robot</code> supplies it via
<code>attr_reader</code>, and <code>Robot.new("Bender").is_a?(Greetable)</code>
is even <code>true</code>. Ruby's standard library runs on this pattern —
define <code>&lt;=&gt;</code> and include <code>Comparable</code>, define
<code>each</code> and include <code>Enumerable</code>, and dozens of methods
appear for free.</p>`,
};
