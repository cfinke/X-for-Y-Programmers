  number: 3,
  title: "Arrays",

  intro: `
<p>Ruby arrays are JavaScript arrays with better manners. The literals are
identical — <code>[80, 91, 75]</code> — and <code>arr.push(x)</code> even
works, though idiomatic Ruby writes it as the shovel operator:
<code>arr &lt;&lt; x</code>. <code>.length</code> is still
<code>.length</code> (with <code>.size</code> as a synonym), and
<code>.includes(x)</code> becomes the predicate <code>.include?(x)</code>,
just like on strings.</p>
<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td><code>arr.push(x)</code></td><td><code>arr &lt;&lt; x</code> (push works too)</td></tr>
  <tr><td><code>arr.at(-1)</code> (<code>arr[-1]</code> is undefined!)</td><td><code>arr[-1]</code></td></tr>
  <tr><td><code>arr[0]</code> / <code>arr.at(-1)</code></td><td><code>arr.first</code> / <code>arr.last</code></td></tr>
  <tr><td><code>arr.slice(1, 3)</code></td><td><code>arr[1..2]</code> (a range as index)</td></tr>
  <tr><td><code>arr.reduce((a, b) =&gt; a + b, 0)</code></td><td><code>arr.sum</code></td></tr>
  <tr><td><code>arr.includes(x)</code></td><td><code>arr.include?(x)</code></td></tr>
</table>
<p>Where Ruby pulls ahead is indexing: <strong>negative indexes just
work</strong>. <code>arr[-1]</code> is the last element — goodbye
<code>arr.at(-1)</code> and <code>arr[arr.length - 1]</code>. There are also
named endpoints, <code>arr.first</code> and <code>arr.last</code>, and ranges
slice: <code>arr[1..2]</code> gives elements 1 through 2 inclusive. One thing
that <em>doesn't</em> change: arrays are references, exactly like home. Pass
an array to a method and mutate it there, and every holder of that array sees
the change — <code>&lt;&lt;</code> mutates, it does not copy.</p>`,

  javascript: `function makeScores() {
  return [80, 91, 75];
}

function append(arr, x) {
  arr.push(x);        // mutates the shared array
  return arr;
}

function total(nums) {
  return nums.reduce((sum, n) => sum + n, 0);
}

function ends(arr) {
  // arr[-1] is undefined in JS, so: arr.at(-1)
  return [arr[0], arr.at(-1)];
}

const scores = makeScores();
append(scores, 68);
console.log(total(scores), ends(scores));`,

  task: `
<p>Port the score helpers to Ruby:</p>
<ol>
  <li><code>make_scores</code> — no arguments; the array literal
      <code>[80, 91, 75]</code> as the last (only) expression.</li>
  <li><code>append(arr, x)</code> — push with the shovel:
      <code>arr &lt;&lt; x</code>. Conveniently, <code>&lt;&lt;</code>
      returns the array itself, so the shovel expression can be the whole
      method body. It mutates the caller's array — same reference semantics
      as JavaScript.</li>
  <li><code>total(nums)</code> — no reduce dance: <code>.sum</code> is built
      in (and returns 0 for an empty array, no seed argument needed).</li>
  <li><code>ends(arr)</code> — the two-element array
      <code>[arr.first, arr.last]</code>. (<code>arr[0]</code> and
      <code>arr[-1]</code> would work too.)</li>
</ol>`,

  starter: `# 1. make_scores: just the literal — it is the last expression.

`,

  requirements: [
    { pattern: /<</, message: "Push with the shovel operator << in append" },
    { pattern: /\.sum/, message: "Use .sum in total" },
    { pattern: /\.first/, message: "Use .first in ends" },
    { pattern: /\[-1\]|\.last/, message: "Grab the last element with arr[-1] or .last" },
  ],

  tests: [
    { name: "make_scores returns [80, 91, 75]",
      code: "  expect_eq(make_scores, [80, 91, 75])" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "  expect_eq(append([1, 2], 3), [1, 2, 3])" },
    { name: "append mutates the array it was given (reference semantics, like JS)",
      code: `  a = [1, 2]
  append(a, 3)
  expect_eq(a, [1, 2, 3])` },
    { name: "total([80, 91, 75]) returns 246",
      code: "  expect_eq(total([80, 91, 75]), 246)" },
    { name: "total([]) returns 0",
      code: "  expect_eq(total([]), 0)" },
    { name: "ends([80, 91, 75]) returns [80, 75]",
      code: "  expect_eq(ends([80, 91, 75]), [80, 75])" },
  ],

  solution: `def make_scores
  [80, 91, 75]
end

def append(arr, x)
  arr << x
end

def total(nums)
  nums.sum
end

def ends(arr)
  [arr.first, arr.last]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Push</td><td><code>arr.push(x)</code></td><td><code>arr &lt;&lt; x</code> (returns the array — chainable)</td></tr>
  <tr><td>Last element</td><td><code>arr.at(-1)</code></td><td><code>arr[-1]</code> or <code>arr.last</code></td></tr>
  <tr><td>First element</td><td><code>arr[0]</code></td><td><code>arr[0]</code> or <code>arr.first</code></td></tr>
  <tr><td>Slice</td><td><code>arr.slice(1, 3)</code></td><td><code>arr[1..2]</code> (inclusive) or <code>arr[1...3]</code></td></tr>
  <tr><td>Sum</td><td><code>arr.reduce((a, b) =&gt; a + b, 0)</code></td><td><code>arr.sum</code></td></tr>
  <tr><td>Length</td><td><code>arr.length</code></td><td><code>arr.length</code> / <code>arr.size</code></td></tr>
  <tr><td>Contains?</td><td><code>arr.includes(x)</code></td><td><code>arr.include?(x)</code></td></tr>
  <tr><td>Join</td><td><code>arr.join(", ")</code></td><td><code>arr.join(", ")</code> (same!)</td></tr>
</table>
<p>The mental model carries straight over: Ruby arrays are ordered,
heterogeneous, and held by reference, so mutation is visible to every holder
— exactly like JavaScript. What changes is the vocabulary's density. Where
JavaScript reaches for a callback (<code>reduce</code> for a sum, a
comparator for a sort), Ruby usually has a named method already:
<code>sum</code>, <code>min</code>, <code>max</code>, <code>sort</code>,
<code>uniq</code>, <code>flatten</code>. The callback-powered heavy machinery
exists too — that is lesson 12's Enumerable — but check for a one-word method
first.</p>`,
};
