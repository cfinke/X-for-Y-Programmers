  title: "Enumerable Power Tools",

  intro: `
<p>JavaScript recently caught up to one of these — <code>Object.groupBy</code>
landed in 2024. Ruby has shipped the whole shelf for years, and the pattern is
consistent: every "reduce into an object" contortion you've ever written has
a one-word name. <code>.group_by { |x| key }</code> buckets elements.
<code>.tally</code> is the classic reduce-into-counts idiom — the
<code>acc[v] = (acc[v] ?? 0) + 1</code> dance — as a single word with no
block at all.</p>
<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td><code>Object.groupBy(words, (w) =&gt; w.length)</code></td><td><code>words.group_by(&amp;:length)</code></td></tr>
  <tr><td><code>reduce((a, v) =&gt; { a[v] = (a[v] ?? 0) + 1; ... }, {})</code></td><td><code>votes.tally</code></td></tr>
  <tr><td><code>reduce</code> into an object literal</td><td><code>.each_with_object({}) { |x, acc| ... }</code></td></tr>
  <tr><td>two <code>.filter</code> passes</td><td><code>.partition { |x| cond }</code> — one pass, two arrays</td></tr>
  <tr><td><code>.reduce((t, x) =&gt; t + x)</code></td><td><code>.reduce(:+)</code></td></tr>
</table>
<p>When no shortcut fits, <code>.each_with_object({})</code> is the honest
accumulator: like <code>reduce</code>, but the accumulator is the same object
every iteration, so <strong>you never write the <code>return acc</code>
line</strong> — forgetting it was the classic JS reduce bug. Seed it with
<code>Hash.new(0)</code> (a hash whose misses return <code>0</code>) and the
<code>?? 0</code> guard disappears too. And <code>.partition</code> splits a
collection into matches and non-matches in a single pass, where JavaScript
makes you filter twice. When you do want raw reduce, it's there — and for
simple operators it takes a symbol: <code>.reduce(:+)</code>.</p>`,

  javascript: `const groups = Object.groupBy(words, (w) => w.length);
// { 3: ["cat", "dog"], 5: ["mouse"] }

const counts = votes.reduce((acc, v) => {
  acc[v] = (acc[v] ?? 0) + 1;
  return acc;               // forget this line: classic bug
}, {});

const totals = items.reduce((acc, item) => {
  acc[item.category] = (acc[item.category] ?? 0) + item.price;
  return acc;
}, {});

// Two passes to split one array:
const evens = nums.filter((n) => n % 2 === 0);
const odds  = nums.filter((n) => n % 2 !== 0);`,

  task: `
<p>One power tool each:</p>
<ol>
  <li><code>word_lengths(words)</code> — bucket words by length with

  <li><code>vote_counts(votes)</code> — count occurrences with

  <li><code>totals_by_category(items)</code> — items look like

  <li><code>split_evens(nums)</code> — one pass, two arrays:

</ol>`,

  tests: [
    { name: 'word_lengths(["cat", "dog", "mouse"]) returns { 3 => ["cat", "dog"], 5 => ["mouse"] }',
      code: '  expect_eq(word_lengths(["cat", "dog", "mouse"]), { 3 => ["cat", "dog"], 5 => ["mouse"] })' },

    { name: 'totals_by_category sums prices per category',
      code: '  items = [\n    { category: "food", price: 5 },\n    { category: "toys", price: 3 },\n    { category: "food", price: 2 },\n  ]\n  expect_eq(totals_by_category(items), { "food" => 7, "toys" => 3 })' },

  solution: `def word_lengths(words)
  words.group_by(&:length)
end

def vote_counts(votes)
  votes.tally
end

def totals_by_category(items)
  items.each_with_object(Hash.new(0)) do |item, totals|
    totals[item[:category]] += item[:price]
  end
end

def split_evens(nums)
  nums.partition(&:even?)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Group into buckets</td><td><code>Object.groupBy(xs, fn)</code> (2024)</td><td><code>xs.group_by { |x| ... }</code></td></tr>
  <tr><td>Count occurrences</td><td><code>reduce</code> + <code>?? 0</code> dance</td><td><code>xs.tally</code></td></tr>
  <tr><td>Build a hash</td><td><code>reduce((acc, x) =&gt; { ...; return acc }, {})</code></td><td><code>xs.each_with_object({}) { |x, acc| ... }</code></td></tr>
  <tr><td>Split in two</td><td>two <code>.filter</code> passes</td><td><code>xs.partition { |x| cond }</code></td></tr>
  <tr><td>Fold with an operator</td><td><code>.reduce((t, x) =&gt; t + x)</code></td><td><code>xs.reduce(:+)</code></td></tr>
  <tr><td>Default-valued hash</td><td><code>acc[k] ?? 0</code> at every read</td><td><code>Hash.new(0)</code> — declared once at the seed</td></tr>
</table>
<p>Note the argument order in <code>each_with_object</code>: the element comes
first, the accumulator second — <code>|item, totals|</code> — the reverse of
<code>reduce</code>'s <code>(acc, item)</code>. In exchange, there is no
return-value bookkeeping at all: the same object threads through every
iteration and is the method's result. If you catch yourself writing a
<code>reduce</code> that builds a hash, one of these tools almost certainly
has its name.</p>`,
