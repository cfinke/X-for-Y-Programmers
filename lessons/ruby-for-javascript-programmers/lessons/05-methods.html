const LESSON = {
  number: 5,
  title: "Methods & Implicit Return",

  intro: `
<p>This is <em>the</em> lesson. In JavaScript, only one form gets implicit
return — the braceless arrow, <code>(age) =&gt; age &gt;= 18</code>. In Ruby,
<strong>every method returns its last evaluated expression</strong>. There is
no special form to remember, because everything — including
<code>if/else</code> — is an expression with a value. <code>return</code>
exists, but idiomatic Ruby writes it only for early exits; a
<code>return</code> on the last line is a tell that someone is writing
JavaScript in Ruby.</p>
<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td><code>(age) =&gt; age &gt;= 18</code> (arrows only)</td><td>every method: last expression is the value</td></tr>
  <tr><td><code>function greet(name, greeting = "Hello")</code></td><td><code>def greet(name, greeting = "Hello")</code></td></tr>
  <tr><td><code>function create({ name, age = 0 })</code></td><td><code>def create(name:, age: 0)</code></td></tr>
  <tr><td><code>create({ name: "Ada" })</code></td><td><code>create(name: "Ada")</code></td></tr>
  <tr><td>missing <code>name</code> → <code>undefined</code> leaks</td><td>missing <code>name:</code> → <code>ArgumentError</code>, immediately</td></tr>
  <tr><td><code>isAdult(age)</code></td><td><code>adult?(age)</code></td></tr>
</table>
<p>Parameter defaults look exactly like home:
<code>def greet(name, greeting = "Hello")</code>. And the destructured
options object you have typed a thousand times —
<code>function create({ name, age = 0 })</code> — is a native, checked
language feature here: <strong>keyword arguments</strong>.
<code>def create(name:, age: 0)</code> is called as
<code>create(name: "Ada")</code>; a trailing colon with no default
(<code>name:</code>) makes the keyword <em>required</em>, and forgetting it
raises an <code>ArgumentError</code> at the call — not an
<code>undefined</code> surfacing three functions later. Round it out with the
naming conventions from lesson 2: <code>?</code> for predicates
(<code>adult?</code>), <code>!</code> for the mutating/dangerous variant.</p>`,

  javascript: `function greet(name, greeting = "Hello") {
  return \`\${greeting}, \${name}!\`;
}

// The "options object" pattern — destructured, defaulted…
// but nothing checks that \`first\` was actually passed.
function fullName({ first, last = null }) {
  return last ? \`\${first} \${last}\` : first;
}

// Implicit return: arrow functions only.
const isAdult = (age) => age >= 18;

console.log(greet("Ada"));                          // "Hello, Ada!"
console.log(greet("Ada", "Howdy"));                 // "Howdy, Ada!"
console.log(fullName({ first: "Ada", last: "Lovelace" }));
console.log(fullName({ last: "Lovelace" }));        // "undefined Lovelace" — oops
console.log(isAdult(17));                           // false`,

  task: `
<p>Port all three to Ruby — with <strong>no <code>return</code> keyword
anywhere</strong> in your code:</p>
<ol>
  <li><code>greet(name, greeting = "Hello")</code> — a positional default,
      producing <code>"Hello, Ada!"</code> or <code>"Howdy, Ada!"</code>. The
      interpolated string is the last expression.</li>
  <li><code>full_name(first:, last: nil)</code> — keyword arguments:
      <code>first:</code> is required (no default), <code>last:</code>
      defaults to <code>nil</code>. Produce <code>"Ada Lovelace"</code>, or
      just <code>"Ada"</code> when <code>last</code> is nil. Remember
      <code>if/else</code> is an expression — its chosen branch is the
      method's value. Calling <code>full_name(last: "Lovelace")</code>
      without <code>first:</code> should blow up with
      <code>ArgumentError</code> — you get that check for free.</li>
  <li><code>adult?(age)</code> — a predicate, so it ends in <code>?</code>.
      The comparison <code>age &gt;= 18</code> is the entire body.</li>
</ol>`,

  starter: `# 1. greet: positional default, same syntax as JS.
#    The interpolated string is the last expression — no early exit needed.
def greet(name, greeting = "Hello")
  raise NotImplementedError, "TODO: implement greet"
end

# 2. full_name: keyword arguments. first: has no default -> required;
#    calling without it raises ArgumentError automatically.
#    if/else is an expression — the chosen branch is the method's value.
def full_name(first:, last: nil)
  raise NotImplementedError, "TODO: implement full_name"
end

# 3. adult?: predicates end in ?. One comparison, one line.
def adult?(age)
  raise NotImplementedError, "TODO: implement adult?"
end
`,

  requirements: [
    { pattern: /=\s*"Hello"/, message: 'Give greeting a default: greeting = "Hello"' },
    { pattern: /\w+:/, message: "Define full_name with keyword arguments (first:, last: nil)" },
    { pattern: /def\s+adult\?/, message: "Name the predicate adult? — with the question mark" },
    { pattern: /^(?:(?!\breturn\b)[\s\S])*$/, message: "No return keyword — every method's last expression is its value" },
  ],

  tests: [
    { name: 'greet("Ada") uses the default: "Hello, Ada!"',
      code: '  expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'greet("Ada", "Howdy") returns "Howdy, Ada!"',
      code: '  expect_eq(greet("Ada", "Howdy"), "Howdy, Ada!")' },
    { name: 'full_name(first: "Ada", last: "Lovelace") returns "Ada Lovelace"',
      code: '  expect_eq(full_name(first: "Ada", last: "Lovelace"), "Ada Lovelace")' },
    { name: 'full_name(first: "Plato") returns "Plato"',
      code: '  expect_eq(full_name(first: "Plato"), "Plato")' },
    { name: "full_name without the required first: raises ArgumentError",
      code: `  raised = false
  begin
    full_name(last: "Lovelace")
  rescue ArgumentError
    raised = true
  end
  expect_true(raised)` },
    { name: "adult?(18) is true, adult?(17) is false",
      code: `  expect_true(adult?(18))
  expect_eq(adult?(17), false)` },
  ],

  solution: `def greet(name, greeting = "Hello")
  "#{greeting}, #{name}!"
end

def full_name(first:, last: nil)
  if last
    "#{first} #{last}"
  else
    first
  end
end

def adult?(age)
  age >= 18
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Implicit return</td><td>braceless arrows only</td><td>every method, always (last expression)</td></tr>
  <tr><td>Early exit</td><td><code>return</code></td><td><code>return</code> — its only idiomatic job</td></tr>
  <tr><td>Positional default</td><td><code>greeting = "Hello"</code></td><td><code>greeting = "Hello"</code> (same)</td></tr>
  <tr><td>Named options</td><td><code>function f({ a, b = 0 })</code></td><td><code>def f(a:, b: 0)</code></td></tr>
  <tr><td>Call with options</td><td><code>f({ a: 1 })</code></td><td><code>f(a: 1)</code> (no braces needed)</td></tr>
  <tr><td>Missing required option</td><td><code>undefined</code>, discovered later</td><td><code>ArgumentError</code>, at the call site</td></tr>
  <tr><td>Naming</td><td><code>isAdult</code>, <code>sortInPlace</code></td><td><code>adult?</code>, <code>sort!</code></td></tr>
</table>
<p>Keyword arguments are the destructured-options-object pattern promoted to
a language feature, and the promotion buys real checking: required keywords
raise <code>ArgumentError</code> when missing, and so do keywords the method
never declared — both bugs that JavaScript lets sail through as
<code>undefined</code> or silent extra properties. Combined with implicit
return, method definitions get remarkably terse: signature, one expression,
<code>end</code>. When you find yourself typing <code>return</code> on a
method's last line, stop — Ruby already did it.</p>`,
};
</script>
