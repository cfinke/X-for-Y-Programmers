  number: 12,
  title: "Enumerable: map, select & Friends",

  intro: `
<p>This is the lesson where Ruby feels most like home. <code>.map</code> is
<code>.map</code>. The one rename to absorb: <code>.filter</code> is
<strong><code>.select</code></strong> (Ruby also aliases <code>filter</code>,
but <code>select</code> is what you'll read in the wild), and its mirror
<code>.reject</code> keeps the elements where the block is <em>false</em> —
no more <code>filter(x =&gt; !cond)</code>.</p>
<table>
  <tr><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td><code>.map((x) =&gt; ...)</code></td><td><code>.map { |x| ... }</code></td></tr>
  <tr><td><code>.filter((x) =&gt; cond)</code></td><td><code>.select { |x| cond }</code></td></tr>
  <tr><td><code>.filter((x) =&gt; !cond)</code></td><td><code>.reject { |x| cond }</code></td></tr>
  <tr><td><code>.reduce((t, x) =&gt; t + x.n, 0)</code></td><td><code>.sum { |x| x.n }</code></td></tr>
  <tr><td><code>.sort((a, b) =&gt; a.price - b.price)[0]</code></td><td><code>.min_by { |x| x.price }</code></td></tr>
</table>
<p>The bigger upgrades: <code>.sum</code> replaces the
<code>reduce((total, x) =&gt; total + ..., 0)</code> boilerplate with one word,
and <code>.sort_by(&amp;:price)</code> / <code>.min_by { }</code> need no
comparator at all — you say <em>what</em> to sort by and the
<code>(a, b) =&gt; a - b</code> arithmetic is gone. Chains read identically to
the JavaScript you already write: <code>products.select { ... }.map { ... }</code>.
One habit shift for the exercise below: these products are symbol-keyed
hashes, so it's <code>p[:name]</code>, not <code>p.name</code>.</p>`,

  javascript: `const products = [
  { name: "Desk",  priceCents: 24900, inStock: true },
  { name: "Lamp",  priceCents: 3900,  inStock: false },
  { name: "Chair", priceCents: 9900,  inStock: true },
];

function inStockNames(products) {
  return products
    .filter((p) => p.inStock)
    .map((p) => p.name);
}

function totalValue(products) {
  return products.reduce((sum, p) => sum + p.priceCents, 0);
}

function cheapestName(products) {
  return [...products]
    .sort((a, b) => a.priceCents - b.priceCents)[0].name;
}`,

  task: `
<p>Each product is a symbol-keyed hash like
<code>{ name: "Desk", price_cents: 24900, in_stock: true }</code>. Write:</p>
<ol>
  <li><code>in_stock_names(products)</code> — names of the in-stock products,

  <li><code>total_value(products)</code> — the sum of every product's
      <code>:price_cents</code>. No reduce boilerplate:
      <code>products.sum { |p| p[:price_cents] }</code>.</li>
  <li><code>cheapest_name(products)</code> — the name of the cheapest product.
      <code>min_by</code> takes the same block as <code>sort_by</code> and
      hands back the winning element — no comparator, no
      <code>[0]</code>.</li>
</ol>`,

  starter: `# Products are symbol-keyed hashes:

`,

  requirements: [
    { pattern: /\.select/, message: "Use .select (Ruby's filter) for the in-stock products" },
    { pattern: /\.map/, message: "Chain .map to pull out the names" },
    { pattern: /\.sum/, message: "Use .sum with a block instead of reduce" },
    { pattern: /min_by|sort_by/, message: "Use min_by (or sort_by) — no (a, b) comparator" },
  ],

  tests: [
    { name: 'in_stock_names returns ["Desk", "Chair"] for the sample catalog',
      code: '  products = [\n    { name: "Desk", price_cents: 24900, in_stock: true },\n    { name: "Lamp", price_cents: 3900, in_stock: false },\n    { name: "Chair", price_cents: 9900, in_stock: true },\n  ]\n  expect_eq(in_stock_names(products), ["Desk", "Chair"])' },
    { name: "in_stock_names([]) returns []",
      code: "  expect_eq(in_stock_names([]), [])" },
    { name: "total_value returns 38700 for the sample catalog",
      code: '  products = [\n    { name: "Desk", price_cents: 24900, in_stock: true },\n    { name: "Lamp", price_cents: 3900, in_stock: false },\n    { name: "Chair", price_cents: 9900, in_stock: true },\n  ]\n  expect_eq(total_value(products), 38700)' },
    { name: "total_value([]) returns 0",
      code: "  expect_eq(total_value([]), 0)" },
    { name: 'cheapest_name returns "Lamp" for the sample catalog',
      code: '  products = [\n    { name: "Desk", price_cents: 24900, in_stock: true },\n    { name: "Lamp", price_cents: 3900, in_stock: false },\n    { name: "Chair", price_cents: 9900, in_stock: true },\n  ]\n  expect_eq(cheapest_name(products), "Lamp")' },
    { name: 'cheapest_name picks the minimum, not the first: [{ name: "B", price_cents: 2 }, { name: "A", price_cents: 1 }] returns "A"',
      code: '  expect_eq(cheapest_name([{ name: "B", price_cents: 2 }, { name: "A", price_cents: 1 }]), "A")' },
  ],

  solution: `def in_stock_names(products)
  products.select { |p| p[:in_stock] }.map { |p| p[:name] }
end

def total_value(products)
  products.sum { |p| p[:price_cents] }
end

def cheapest_name(products)
  products.min_by { |p| p[:price_cents] }[:name]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Ruby</th></tr>
  <tr><td>Transform</td><td><code>.map((x) =&gt; ...)</code></td><td><code>.map { |x| ... }</code></td></tr>
  <tr><td>Keep matches</td><td><code>.filter((x) =&gt; cond)</code></td><td><code>.select { |x| cond }</code></td></tr>
  <tr><td>Drop matches</td><td><code>.filter((x) =&gt; !cond)</code></td><td><code>.reject { |x| cond }</code></td></tr>
  <tr><td>Total</td><td><code>.reduce((t, x) =&gt; t + x, 0)</code></td><td><code>.sum</code> (or <code>.sum { |x| ... }</code>)</td></tr>
  <tr><td>Sort by key</td><td><code>.sort((a, b) =&gt; a.p - b.p)</code></td><td><code>.sort_by { |x| x[:p] }</code></td></tr>
  <tr><td>Min / max by key</td><td>sort then <code>[0]</code>, or reduce</td><td><code>.min_by { }</code> / <code>.max_by { }</code></td></tr>
  <tr><td>Any / all</td><td><code>.some()</code> / <code>.every()</code></td><td><code>.any? { }</code> / <code>.all? { }</code></td></tr>
</table>
<p>Everything here comes from the <code>Enumerable</code> module — one mixin
that arrays, hashes, ranges, sets, and even file handles share. Learn the
vocabulary once and it works on every collection in the language, which is
why Rubyists reach for <code>select</code>/<code>map</code>/<code>sum</code>
chains where JavaScript often falls back to a <code>for...of</code> loop.</p>`,
};
