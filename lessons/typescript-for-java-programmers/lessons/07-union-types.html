<title>Lesson 7: Union Types</title>

<div id="app"></div>
<script>
const LESSON = {
  number: 7,
  title: "Union Types",

  intro: `
<p>"This parameter is an <code>int</code> <em>or</em> a <code>String</code>."
Java has three answers, none of them great: write two overloads and duplicate
the plumbing; take <code>Object</code> and give up type safety at the door;
or build a sealed hierarchy — an interface and two wrapper records — just to
say "or". TypeScript has a fourth answer that is just the sentence itself:
<code>number | string</code>. The pipe builds an <em>ad-hoc union type</em>,
on the spot, no declarations anywhere.</p>
<table>
  <tr><th>Java</th><th>TypeScript</th></tr>
  <tr><td>Two overloads of <code>formatId</code></td><td>One <code>formatId(id: number | string)</code></td></tr>
  <tr><td><code>Object</code> + <code>instanceof</code> + cast</td><td><code>typeof id === "number"</code> — narrows, no cast</td></tr>
  <tr><td><code>sealed interface Id permits ...</code></td><td>The union is anonymous; nothing to declare</td></tr>
  <tr><td>Compiler forgets the check; you cast</td><td>Compiler <em>remembers</em> the check inside the branch</td></tr>
</table>
<p>Inside the function, <code>typeof</code> does what Java 17's
<code>instanceof</code> patterns do — but better. After
<code>if (typeof id === "number")</code>, the compiler treats <code>id</code>
as a plain <code>number</code> inside that branch, and — this is the part
Java cannot do — as a plain <code>string</code> in the <code>else</code>
branch, because it subtracts the cases you have already handled. This is
called <em>narrowing</em>, and it is the engine behind most of TypeScript's
ergonomics. (For primitives use <code>typeof</code>; for class instances
<code>instanceof</code> works here too.)</p>`,

  java: `// Java's three answers to "int OR String":

// 1. Overloads — two methods, duplicated plumbing:
String formatId(int id)    { return String.format("ID-%05d", id); }
String formatId(String id) { return "ID-" + id.toUpperCase(); }

// 2. Object + instanceof — type safety abandoned at the door:
String formatId(Object id) {
    if (id instanceof Integer i) return String.format("ID-%05d", i);
    if (id instanceof String s)  return "ID-" + s.toUpperCase();
    throw new IllegalArgumentException("int or String only");
}

// 3. A sealed hierarchy — real ceremony for a two-case "or":
sealed interface Id permits NumericId, TextId {}
record NumericId(int value) implements Id {}
record TextId(String value) implements Id {}`,

  task: `
<p>Collapse the overload pair into one function:</p>
<ol>
  <li>Write <code>formatId(id: number | string): string</code> — the union
      pipe goes right in the parameter's type annotation.</li>
  <li>If <code>id</code> is a <strong>number</strong>, return
      <code>"ID-"</code> followed by the number left-padded with zeros to 5
      digits: <code>formatId(42)</code> is <code>"ID-00042"</code>.
      (<code>String(id).padStart(5, "0")</code> is your
      <code>String.format("%05d", id)</code>.)</li>
  <li>If <code>id</code> is a <strong>string</strong>, return
      <code>"ID-"</code> plus the string uppercased:
      <code>formatId("abc123")</code> is <code>"ID-ABC123"</code>.</li>
  <li>Branch with <code>typeof id === "number"</code>. Notice there is no
      cast in either branch — try calling <code>id.toUpperCase()</code>
      inside the number branch and watch the compiler object.</li>
</ol>`,

  starter: `// One function, two accepted types. Put the union in the signature:
//   number | string
// then let typeof narrow each branch — no instanceof-and-cast, no overloads.
function formatId(id: string): string {
  // TODO: number -> "ID-" + String(id).padStart(5, "0")
  //       string -> "ID-" + id.toUpperCase()
  return "";
}
`,

  exportNames: ["formatId"],

  requirements: [
    { pattern: /formatId\s*\(\s*id\s*:\s*number\s*\|\s*string\s*\)/, message: "Declare the parameter as a union: formatId(id: number | string) — one function instead of two overloads" },
    { pattern: /typeof\s+id/, message: "Narrow with typeof id — the compiler knows the exact type inside each branch, no cast required" },
  ],

  tests: [
    { name: 'formatId(42) returns "ID-00042"', run: (x) => expectEqual(x.formatId(42), "ID-00042") },
    { name: 'formatId(7) returns "ID-00007"', run: (x) => expectEqual(x.formatId(7), "ID-00007") },
    { name: 'formatId("abc123") returns "ID-ABC123"', run: (x) => expectEqual(x.formatId("abc123"), "ID-ABC123") },
    { name: 'formatId("x9") returns "ID-X9"', run: (x) => expectEqual(x.formatId("x9"), "ID-X9") },
  ],

  solution: `function formatId(id: number | string): string {
  if (typeof id === "number") {
    // In this branch the compiler knows id is a number.
    return "ID-" + String(id).padStart(5, "0");
  }
  // And here it knows id is a string — number was subtracted.
  return "ID-" + id.toUpperCase();
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>TypeScript</th></tr>
  <tr><td>"A or B" parameter</td><td>Overloads / <code>Object</code> / sealed hierarchy</td><td><code>a: A | B</code></td></tr>
  <tr><td>Runtime type test (primitive)</td><td><code>instanceof Integer</code></td><td><code>typeof x === "number"</code></td></tr>
  <tr><td>Runtime type test (class)</td><td><code>x instanceof Circle c</code></td><td><code>x instanceof Circle</code> (also narrows)</td></tr>
  <tr><td>After the test</td><td>Bind pattern variable or cast</td><td>Same variable, automatically narrowed</td></tr>
  <tr><td>The else branch</td><td>Compiler knows nothing new</td><td>Handled cases are subtracted from the union</td></tr>
  <tr><td>Nullable as a union</td><td>n/a</td><td><code>string | null</code> is just another union</td></tr>
</table>
<p>Notice that lesson 6 was secretly this lesson: <code>User | null</code> is
an ordinary union, and <code>if (user !== null)</code> is an ordinary
narrowing. Java overloads pick an implementation at <em>compile</em> time per
call site; a union function branches at <em>runtime</em> — yet stays fully
type-checked, because the compiler tracks which member of the union survives
each branch. When a union's cases each carry different data, you will want
discriminated unions — Java's sealed-interface-plus-switch pattern — which
get their own lesson later.</p>`,
};
</script>
