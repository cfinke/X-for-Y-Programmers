<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Basic Types",

  intro: `
<p>Good news: your Java instincts transfer almost directly. TypeScript is a
statically typed language checked at compile time, just like Java — you will
not have to relearn what a type error feels like. The syntax is simply
flipped: Java puts the type <em>before</em> the name
(<code>int age = 36;</code>), TypeScript puts it <em>after</em>, separated by
a colon (<code>let age: number = 36;</code>). If you have used Java 10's
<code>var</code>, you already know how TypeScript feels most of the time,
because inference is the default and annotations are the exception.</p>
<table>
  <tr><th>Java</th><th>TypeScript</th></tr>
  <tr><td><code>final String name = "Ada";</code></td><td><code>const name: string = "Ada";</code></td></tr>
  <tr><td><code>int age = 36;</code></td><td><code>let age: number = 36;</code></td></tr>
  <tr><td><code>double price = 9.99;</code></td><td><code>let price: number = 9.99;</code> (same type!)</td></tr>
  <tr><td><code>long views = 1_000_000L;</code></td><td><code>let views: number = 1_000_000;</code> (still same)</td></tr>
  <tr><td><code>boolean active = true;</code></td><td><code>let active: boolean = true;</code></td></tr>
  <tr><td><code>var city = "London";</code></td><td><code>let city = "London";</code> (inferred string)</td></tr>
</table>
<p>The biggest simplification: Java's whole numeric menagerie —
<code>int</code>, <code>long</code>, <code>short</code>, <code>byte</code>,
<code>float</code>, <code>double</code>, plus their boxed twins — collapses
into a single <code>number</code> type (an IEEE-754 double, i.e. exactly a
Java <code>double</code>). And where Java splits declarations into
<code>final</code> vs. plain, TypeScript uses <code>const</code>
(never reassigned — your default, like sprinkling <code>final</code>
everywhere) and <code>let</code> (reassigned later). Booleans are lowercase
<code>true</code>/<code>false</code>, same as Java — one thing you do not
have to change.</p>`,

  java: `public class Main {
    public static void main(String[] args) {
        final String name = "Ada";   // final: never reassigned
        int age = 36;                // int, long, double, float...
        double price = 9.99;         // ...are all separate types
        boolean active = true;       // lowercase literals, like TS
        var city = "London";         // Java 10+ local inference

        System.out.println(describeUser(name, age));
    }

    static String describeUser(String name, int age) {
        return name + " is " + age + " years old";
    }
}`,

  task: `
<p>Rewrite the Java as TypeScript (no class wrapper needed —
top-level code is fine, and note that camelCase is already the Java
convention, so nothing to rename):</p>
<ol>
  <li>Declare a constant <code>userName</code> of type <code>string</code>
      with the value <code>"Ada"</code> — the <code>final String</code> of
      TypeScript is <code>const ...: string</code>. Then declare a variable
      <code>userAge</code> with <code>let</code> and an explicit
      <code>: number</code> annotation, value <code>36</code>.
      Remember: the type goes <em>after</em> the name.</li>
  <li>Write a function <code>describeUser</code> that takes
      <code>name: string</code> and <code>age: number</code> and returns a
      <code>string</code> like <code>"Ada is 36 years old"</code>.
      The return type goes after the parameter list:
      <code>function describeUser(...): string</code>.</li>
</ol>
<p>Reassigning <code>userAge = "thirty-six"</code> is a compile error here,
exactly as it would be in javac — same safety net, new syntax.</p>`,

  starter: `// 1. Declare userName (string) and userAge (number) with explicit types.
//    Java: final String name = "Ada";  ->  TS: const ...: string = "Ada";
//    Java: int age = 36;               ->  TS: let ...: number = 36;


// 2. Write describeUser with typed parameters and a typed return value.
//    Java: static String describeUser(String name, int age) { ... }
//    TS flips it: types come after the names, return type after the ).
function describeUser(name, age) {
  // TODO: return "<name> is <age> years old"
  return "";
}
`,

  exportNames: ["userName", "userAge", "describeUser"],

  requirements: [
    { pattern: /const\s+userName\s*:\s*string/, message: "Declare userName as a const with an explicit : string annotation" },
    { pattern: /let\s+userAge\s*:\s*number/, message: "Declare userAge with let and an explicit : number annotation" },
    { pattern: /describeUser\s*\(\s*name\s*:\s*string\s*,\s*age\s*:\s*number\s*\)\s*:\s*string/, message: "Give describeUser typed parameters (name: string, age: number) and a : string return type" },
  ],

  tests: [
    { name: 'userName is "Ada"', run: (x) => expectEqual(x.userName, "Ada") },
    { name: "userAge is 36", run: (x) => expectEqual(x.userAge, 36) },
    { name: 'describeUser("Ada", 36) returns "Ada is 36 years old"', run: (x) => expectEqual(x.describeUser("Ada", 36), "Ada is 36 years old") },
    { name: 'describeUser("James", 70) returns "James is 70 years old"', run: (x) => expectEqual(x.describeUser("James", 70), "James is 70 years old") },
  ],

  solution: `const userName: string = "Ada";
let userAge: number = 36;

function describeUser(name: string, age: number): string {
  return name + " is " + age + " years old";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>TypeScript</th></tr>
  <tr><td>Typed variable</td><td><code>int x = 1;</code></td><td><code>let x: number = 1;</code> (type after name)</td></tr>
  <tr><td>Constant</td><td><code>final int x = 1;</code></td><td><code>const x = 1;</code></td></tr>
  <tr><td>Inference</td><td><code>var x = "hi";</code> (locals only)</td><td><code>let x = "hi";</code> (works everywhere)</td></tr>
  <tr><td>Numeric types</td><td><code>int</code>, <code>long</code>, <code>float</code>, <code>double</code>, boxed types</td><td><code>number</code> — one type, a 64-bit double</td></tr>
  <tr><td>Strings</td><td><code>String</code> (capital S, a class)</td><td><code>string</code> (lowercase, primitive)</td></tr>
  <tr><td>Return type</td><td><code>static String f() { }</code></td><td><code>function f(): string { }</code></td></tr>
  <tr><td>Free functions</td><td>No — everything lives in a class</td><td>Yes — top-level functions are normal</td></tr>
</table>
<p>One instinct to recalibrate: because every Java <code>int</code>,
<code>long</code>, and <code>double</code> becomes <code>number</code>,
integer semantics are gone — <code>7 / 2</code> is <code>3.5</code>, not
<code>3</code>, and there is no overflow at 2³¹. Integers stay exact up to
2⁵³ (like a double's mantissa, which is exactly what they are). When you
genuinely need int division, that's <code>Math.trunc(a / b)</code>.</p>`,
};
