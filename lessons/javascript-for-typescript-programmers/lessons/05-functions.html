<div id="app"></div>
<script>
const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>In TypeScript you annotate every parameter and return value, and the compiler
holds you to it. At runtime those annotations are gone — a function is just a
value, and its "signature" is whatever it happens to do with whatever it happens
to receive. This lesson is about the three ways to make a function, plus the two
parameter forms you reach for most: defaults and rest.</p>
<table>
  <tr><th>TypeScript</th><th>JavaScript</th></tr>
  <tr><td><code>function add(a: number, b: number): number {}</code></td><td><code>function add(a, b) {}</code></td></tr>
  <tr><td><code>const double = (n: number): number =&gt; n * 2;</code></td><td><code>const double = (n) =&gt; n * 2;</code></td></tr>
  <tr><td><code>function greet(name: string = "friend") {}</code></td><td><code>function greet(name = "friend") {}</code></td></tr>
  <tr><td><code>function sum(...xs: number[]): number {}</code></td><td><code>function sum(...xs) {}</code></td></tr>
</table>
<p>All three forms — declarations, function expressions, and arrow functions —
produce a callable value you can pass around, return, and store. The runtime
differences that survive type erasure are real: declarations <em>hoist</em>
(you can call them before their line), arrow functions have no <code>this</code>
or <code>arguments</code> of their own, and a default only kicks in when the
argument is <code>undefined</code> — never for <code>null</code>, never for
<code>0</code> or <code>""</code>.</p>`,

  typescript: `function add(a: number, b: number): number {
  return a + b;
}

const double = (n: number): number => n * 2;

function greet(name: string = "friend"): string {
  return \`Hi, \${name}\`;
}

function sum(...xs: number[]): number {
  return xs.reduce((total, x) => total + x, 0);
}`,

  task: `
<p>Write the plain-JavaScript versions — no annotations anywhere:</p>
<ol>
  <li>A function declaration <code>add(a, b)</code> that returns their sum.</li>
  <li>An arrow function stored in a <code>const double</code> that returns
      <code>n * 2</code>.</li>
  <li><code>greet(name)</code> with a <em>default parameter</em> of
      <code>"friend"</code>, returning a string like <code>"Hi, Ada"</code>.</li>
  <li><code>sum(...xs)</code> using a <em>rest parameter</em> that returns the
      total of every argument (<code>0</code> when called with none).</li>
</ol>`,

  starter: `// 1. declaration: add(a, b) -> a + b
function add(a, b) {
  // TODO
  return 0;
}

// 2. arrow function: double(n) -> n * 2
const double = (n) => {
  // TODO
  return 0;
};

// 3. default parameter: greet(name = "friend") -> "Hi, <name>"
function greet(name) {
  // TODO
  return "";
}

// 4. rest parameter: sum(...xs) -> total of all arguments
function sum() {
  // TODO
  return 0;
}
`,

  exportNames: ["add", "double", "greet", "sum"],

  requirements: [
    { pattern: /const\s+double\s*=\s*\(?\s*n\s*\)?\s*=>/, message: "Define double as an arrow function" },
    { pattern: /function\s+greet\s*\(\s*name\s*=\s*["']friend["']\s*\)/, message: "Give greet a default parameter of \"friend\"" },
    { pattern: /function\s+sum\s*\(\s*\.\.\.[A-Za-z_$][\w$]*\s*\)/, message: "Use a rest parameter in sum" },
  ],

  tests: [
    { name: "add(2, 3) is 5", run: (x) => expectEqual(x.add(2, 3), 5) },
    { name: "double(21) is 42", run: (x) => expectEqual(x.double(21), 42) },
    { name: 'greet("Ada") is "Hi, Ada"', run: (x) => expectEqual(x.greet("Ada"), "Hi, Ada") },
    { name: 'greet() falls back to "Hi, friend"', run: (x) => expectEqual(x.greet(), "Hi, friend") },
    { name: "sum() with no args is 0", run: (x) => expectEqual(x.sum(), 0) },
    { name: "sum(1, 2, 3, 4) is 10", run: (x) => expectEqual(x.sum(1, 2, 3, 4), 10) },
    { name: "double is a function value", run: (x) => expectEqual(typeof x.double, "function") },
  ],

  solution: `function add(a, b) {
  return a + b;
}

const double = (n) => n * 2;

function greet(name = "friend") {
  return \`Hi, \${name}\`;
}

function sum(...xs) {
  return xs.reduce((total, x) => total + x, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>JavaScript</th></tr>
  <tr><td>Declaration</td><td><code>function add(a: number, b: number): number</code></td><td><code>function add(a, b)</code> (hoisted)</td></tr>
  <tr><td>Arrow expression</td><td><code>const f = (n: number): number =&gt; n * 2</code></td><td><code>const f = (n) =&gt; n * 2</code> (not hoisted)</td></tr>
  <tr><td>Default param</td><td><code>name: string = "friend"</code></td><td><code>name = "friend"</code></td></tr>
  <tr><td>Rest param</td><td><code>...xs: number[]</code></td><td><code>...xs</code> (a real array)</td></tr>
  <tr><td>Missing return type</td><td>inferred / checked</td><td>silently <code>undefined</code></td></tr>
</table>
<p>Two runtime gotchas the compiler used to hide. First, defaults trigger only on
<code>undefined</code>: <code>greet(null)</code> returns <code>"Hi, null"</code>,
not <code>"Hi, friend"</code>. Second, a rest parameter is a genuine
<code>Array</code> — you can call <code>.reduce</code>, <code>.map</code>, or
<code>.length</code> on it directly, unlike the old array-like
<code>arguments</code> object. And because arrow functions capture no
<code>this</code> of their own, they are the idiomatic choice for the little
callbacks you hand to array methods.</p>`,
};
</script>
