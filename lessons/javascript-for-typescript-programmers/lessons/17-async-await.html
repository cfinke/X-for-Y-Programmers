const LESSON = {
  number: 17,
  title: "Async & Await",

  intro: `
<p>In TypeScript, an <code>async</code> function is typed <code>Promise&lt;T&gt;</code>
and <code>await</code> unwraps it to <code>T</code>, with the compiler tracking the
inner type at every step. Erase the types and the machinery is identical — the
same event loop, the same microtask queue, the same promises — you just lose the
<code>Promise&lt;T&gt;</code> label telling you what is inside. At runtime,
<code>await</code> works on <em>any</em> thenable and hands you whatever value it
settles to, number, string, object, or <code>undefined</code>.</p>
<table>
  <tr><th>TypeScript</th><th>JavaScript</th></tr>
  <tr><td><code>async function f(): Promise&lt;number&gt;</code></td><td><code>async function f()</code></td></tr>
  <tr><td><code>const n: number = await f();</code></td><td><code>const n = await f();</code></td></tr>
  <tr><td><code>Promise.all&lt;[A, B]&gt;([a, b])</code></td><td><code>Promise.all([a, b])</code></td></tr>
  <tr><td>rejection typed <code>unknown</code> in <code>catch</code></td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today. First, <code>await</code> in sequence is
<em>serial</em>: each line waits for the previous promise to settle before the next
even starts. To run independent work concurrently you hand the promises to
<code>Promise.all</code>, which waits for all of them and resolves to an array of
their results. Second, a rejected promise surfaces as a thrown value at the
<code>await</code>, so a plain <code>try/catch</code> catches it — and if you do not
catch it, it propagates out of your <code>async</code> function as a rejected
promise the caller must handle.</p>`,

  typescript: `async function double(n: number): Promise<number> {
  return n * 2;
}

async function sumDoubled(a: number, b: number): Promise<number> {
  const [x, y] = await Promise.all([double(a), double(b)]);
  return x + y;
}

async function safeDouble(n: number): Promise<number> {
  try {
    return await double(n);
  } catch (e: unknown) {
    return 0;
  }
}`,

  task: `
<p>All promises here resolve immediately — no timers. Write four functions:</p>
<ol>
  <li><code>double(n)</code> — an <code>async</code> function that returns
      <code>n * 2</code>. (Because it is <code>async</code>, callers get a promise.)</li>
  <li><code>sumSequential(a, b)</code> — <code>await</code> <code>double(a)</code>,
      then <code>await</code> <code>double(b)</code>, and return their sum. Two
      awaits, one after the other.</li>
  <li><code>sumConcurrent(nums)</code> — given an array of numbers, run every
      <code>double</code> at once with <code>Promise.all</code> and return the sum
      of the resolved results.</li>
  <li><code>safeParse(value)</code> — <code>await</code> the helper
      <code>parseAsync(value)</code> (provided below) inside a
      <code>try/catch</code>. Return the parsed number on success; on a rejection,
      catch it and return <code>0</code>.</li>
</ol>
<p>A helper is given to you — paste it as-is into your solution:</p>
<pre><code>async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}</code></pre>`,

`,

  exportNames: ["double", "sumSequential", "sumConcurrent", "safeParse", "parseAsync"],

  requirements: [
    { pattern: /async\s+function/, message: "Define your functions with async function" },
    { pattern: /await/, message: "Use await to unwrap the helper promises" },
    { pattern: /Promise\.all/, message: "Use Promise.all for the concurrent sum" },
    { pattern: /try\s*\{[\s\S]*catch/, message: "Wrap the await in safeParse with try/catch" },
  ],

  tests: [
    {
      name: "double returns a promise resolving to n * 2",
      run: async (x) => {
        const p = x.double(21);
        expectTruthy(typeof p.then === "function");
        expectEqual(await p, 42);
      },
    },
    {
      name: "sumSequential(3, 4) resolves to 14",
      run: async (x) => { expectEqual(await x.sumSequential(3, 4), 14); },
    },
    {
      name: "sumConcurrent([1, 2, 3]) resolves to 12",
      run: async (x) => { expectEqual(await x.sumConcurrent([1, 2, 3]), 12); },
    },
    {
      name: "sumConcurrent([]) resolves to 0",
      run: async (x) => { expectEqual(await x.sumConcurrent([]), 0); },
    },
    {
      name: "safeParse('10') resolves to 10",
      run: async (x) => { expectEqual(await x.safeParse("10"), 10); },
    },
    {
      name: "safeParse('nope') catches the rejection and returns 0",
      run: async (x) => { expectEqual(await x.safeParse("nope"), 0); },
    },
    {
      name: "parseAsync rejects on non-numeric input",
      run: async (x) => {
        let threw = false;
        try { await x.parseAsync("xyz"); } catch (e) { threw = true; }
        expectTruthy(threw);
      },
    },
  ],

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>TypeScript</th><th>JavaScript</th></tr>
  <tr><td>Return of async fn</td><td><code>Promise&lt;T&gt;</code></td><td>a promise; contents unlabeled</td></tr>
  <tr><td>Awaited value</td><td>narrowed to <code>T</code></td><td>whatever it settles to</td></tr>
  <tr><td>Serial awaits</td><td><code>await a; await b;</code></td><td>b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td><code>Promise.all([...])</code></td><td>same; resolves to a results array</td></tr>
  <tr><td>Caught rejection</td><td><code>catch (e: unknown)</code></td><td><code>catch (e)</code> — any thrown value</td></tr>
</table>
<p>The most common runtime performance bug the compiler will never flag: awaiting
independent work in a loop or in sequence when it could run concurrently. Two
serial <code>await</code>s take as long as the sum of both promises;
<code>Promise.all</code> takes as long as the slowest one. Reach for
<code>Promise.all</code> whenever the tasks do not depend on each other.</p>
<p>On errors: a rejected promise becomes a thrown value at its <code>await</code>.
If nothing catches it, your <code>async</code> function returns a
<em>rejected</em> promise — the failure propagates to whoever awaits you.
TypeScript typed the resolved value but never the rejection (it is always
<code>unknown</code> in <code>catch</code>), so a runtime <code>catch (e)</code>
must be ready for anything: an <code>Error</code>, a string, even
<code>undefined</code>.</p>`,
};
