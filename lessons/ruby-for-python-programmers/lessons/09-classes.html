const LESSON = {
  number: 9,
  title: "Classes & Objects",

  intro: `
<p>Ruby classes are Python classes with the boilerplate sanded off.
<code>__init__</code> is called <code>initialize</code>, and you construct
with <code>User.new("Ada")</code> instead of calling the class itself.
Instance state uses <code>@name</code> instead of <code>self.name</code> —
and here's the twist: <code>@ivars</code> are <strong>truly private by
default</strong>. There is no <code>user.@name</code> from outside, so
Python's <code>_leading_underscore</code> honor system isn't needed.</p>
<table>
  <tr><th>Python</th><th>Ruby</th></tr>
  <tr><td><code>def __init__(self, owner):</code></td><td><code>def initialize(owner)</code></td></tr>
  <tr><td><code>self.owner = owner</code></td><td><code>@owner = owner</code></td></tr>
  <tr><td><code>u = User("Ada")</code></td><td><code>u = User.new("Ada")</code></td></tr>
  <tr><td><code>self._balance</code> (convention)</td><td><code>@balance</code> (actually private)</td></tr>
  <tr><td><code>@property def balance(self): ...</code></td><td><code>attr_reader :balance</code></td></tr>
</table>
<p>Since ivars are invisible from outside, you expose them deliberately:
<code>attr_reader :owner</code> <em>generates</em> a getter method,
<code>attr_accessor</code> generates getter and setter — one line replacing
Python's <code>@property</code> ceremony. Also gone: the explicit
<code>self</code> parameter. Inside a method, other methods and ivars of the
same object are just in scope — the receiver is implicit.</p>`,

  python: `class BankAccount:
    def __init__(self, owner):
        self.owner = owner
        self._balance = 0     # private by convention only

    @property
    def balance(self):
        return self._balance

    def deposit(self, amount):
        self._balance += amount

    def withdraw(self, amount):
        if amount > self._balance:
            return False
        self._balance -= amount
        return True`,

  task: `
<p>Port <code>BankAccount</code> to Ruby:</p>
<ol>
  <li>Write <code>initialize(owner)</code> — set <code>@owner</code> and
      start <code>@balance</code> at <code>0</code>. (Note: no
      <code>self</code> parameter anywhere.)</li>
  <li>Expose both ivars read-only with
      <code>attr_reader :owner, :balance</code> — that single line replaces
      the whole <code>@property</code> block.</li>
  <li><code>deposit(amount)</code> — add to <code>@balance</code>.</li>
  <li><code>withdraw(amount)</code> — return <code>false</code> (and change
      nothing) if <code>amount</code> exceeds the balance; otherwise subtract
      it and return <code>true</code>. A modifier-if guard from lesson 8
      works nicely here.</li>
</ol>
<p>The tests build accounts with <code>BankAccount.new("Ada")</code>.</p>`,

  starter: `class BankAccount
  attr_reader :owner, :balance

  # __init__(self, owner) -> initialize(owner); self.x -> @x
  def initialize(owner)
    raise NotImplementedError, "TODO: set @owner and @balance = 0"
  end

  def deposit(amount)
    raise NotImplementedError, "TODO: add amount to @balance"
  end

  # Return false and leave @balance alone if amount > @balance.

    raise NotImplementedError, "TODO: implement withdraw"
  end
end
`,

  requirements: [
    { pattern: /class\s+BankAccount/, message: "Define class BankAccount" },
    { pattern: /def\s+initialize/, message: "Define initialize (Ruby's __init__)" },
    { pattern: /attr_reader|attr_accessor/, message: "Generate accessors with attr_reader or attr_accessor" },
    { pattern: /@balance/, message: "Store state in the @balance instance variable" },
  ],

  tests: [
    { name: 'BankAccount.new("Ada") has owner "Ada" and balance 0',
      code: '  acct = BankAccount.new("Ada")\n  expect_eq(acct.owner, "Ada")\n  expect_eq(acct.balance, 0)' },
    { name: "deposit(100) then deposit(50) leaves a balance of 150",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(100)\n  acct.deposit(50)\n  expect_eq(acct.balance, 150)' },
    { name: "withdraw(30) from 100 returns true and leaves 70",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(100)\n  expect_true(acct.withdraw(30) == true)\n  expect_eq(acct.balance, 70)' },
    { name: "withdrawing more than the balance returns false",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(20)\n  expect_true(acct.withdraw(50) == false)' },
    { name: "a failed withdraw leaves the balance unchanged",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(20)\n  acct.withdraw(50)\n  expect_eq(acct.balance, 20)' },
  ],

  solution: `class BankAccount
  attr_reader :owner, :balance

  def initialize(owner)
    @owner = owner
    @balance = 0
  end

  def deposit(amount)
    @balance += amount
  end

  def withdraw(amount)
    return false if amount > @balance

    @balance -= amount
    true
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Ruby</th></tr>
  <tr><td>Constructor</td><td><code>def __init__(self, x):</code></td><td><code>def initialize(x)</code></td></tr>
  <tr><td>Instantiate</td><td><code>User("Ada")</code></td><td><code>User.new("Ada")</code></td></tr>
  <tr><td>Instance variable</td><td><code>self.x</code></td><td><code>@x</code></td></tr>
  <tr><td>Privacy</td><td><code>_x</code> by convention</td><td><code>@x</code> private for real</td></tr>
  <tr><td>Read-only accessor</td><td><code>@property</code> method</td><td><code>attr_reader :x</code></td></tr>
  <tr><td>Read-write accessor</td><td><code>@property</code> + setter</td><td><code>attr_accessor :x</code></td></tr>
  <tr><td>Method receiver</td><td>explicit <code>self</code> arg</td><td>implicit</td></tr>
</table>
<p><code>attr_reader</code> isn't syntax — it's an ordinary method call,
running at class-definition time, that defines getter methods for you. That's
your first taste of Ruby metaprogramming, and it's why the line sits bare
inside the class body. If you later need validation on assignment, replace
the generated writer with a plain <code>def balance=(value)</code> method —
callers never change, exactly like moving from a Python attribute to a
<code>@property</code>.</p>`,
