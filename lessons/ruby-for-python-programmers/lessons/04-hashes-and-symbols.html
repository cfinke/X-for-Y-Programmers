  intro: `
<p>Python dicts are Ruby Hashes, and the API maps almost one-to-one — but
Ruby adds a type Python simply doesn't have: the <strong>symbol</strong>.
A symbol is an interned identifier written <code>:apples</code> — lightweight,
immutable, and the idiomatic choice for fixed keys. The literal
<code>{ apples: 3 }</code> is shorthand that creates the <em>symbol</em> key
<code>:apples</code>; string keys use the older "hash rocket" syntax:
<code>{ "apples" =&gt; 3 }</code>.</p>
<table>
  <tr><th>Python</th><th>Ruby</th></tr>
  <tr><td><code>{"apples": 3}</code></td><td><code>{ apples: 3 }</code> — key is the symbol <code>:apples</code></td></tr>
  <tr><td><code>d["apples"]</code> (KeyError if missing)</td><td><code>h.fetch(:apples)</code> (KeyError if missing)</td></tr>
  <tr><td><code>d.get(k, 0)</code></td><td><code>h.fetch(k, 0)</code></td></tr>
  <tr><td><code>d[k]</code> missing → raises</td><td><code>h[k]</code> missing → <code>nil</code> (!)</td></tr>
  <tr><td><code>for k, v in d.items():</code></td><td><code>h.each { |k, v| ... }</code></td></tr>
  <tr><td><code>{**d, k: v}</code></td><td><code>h.merge(k =&gt; v)</code></td></tr>
</table>
<p>The safe/strict split you know from <code>d[k]</code> vs
<code>d.get(k, 0)</code> exists in Ruby with the roles shuffled:
<code>h.fetch(:k)</code> without a default <em>raises</em> like Python's
<code>d[k]</code>, <code>h.fetch(:k, 0)</code> is exactly
<code>d.get(k, 0)</code> — while bare <code>h[:k]</code> quietly returns
<code>nil</code> for missing keys. And <em>the</em> gotcha to tattoo somewhere
visible: <code>h[:name]</code> and <code>h["name"]</code> are different keys.
A hash built with symbol keys returns <code>nil</code> when you ask with a
string, and vice versa.</p>`,

  python: `inventory = {"apples": 3, "bananas": 5}

print(inventory["apples"])        # 3
print(inventory.get("pears", 0))  # 0   (missing -> default)
# inventory["pears"]              # KeyError!

for name, count in inventory.items():
    print(f"{name}: {count}")

print(list(inventory.keys()))     # ['apples', 'bananas']


def add_stock(inv, name, n):
    # Non-mutating update: build a new dict.
    return {**inv, name: inv.get(name, 0) + n}


print(add_stock(inventory, "apples", 2))  # {'apples': 5, 'bananas': 5}
print(inventory)                          # unchanged`,

  solution: `def build_inventory
  { apples: 3, bananas: 5 }
end

def apple_count(inv)
  inv[:apples]
end

def get_count(inv, name)
  inv.fetch(name, 0)
end

def add_stock(inv, name, n)
  inv.merge(name => inv.fetch(name, 0) + n)
end

def item_names(inv)
  inv.keys
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Ruby</th></tr>
  <tr><td>Literal, fixed keys</td><td><code>{"apples": 3}</code></td><td><code>{ apples: 3 }</code> (symbol keys)</td></tr>
  <tr><td>Literal, string keys</td><td><code>{"apples": 3}</code></td><td><code>{ "apples" =&gt; 3 }</code></td></tr>
  <tr><td>Lookup, strict</td><td><code>d[k]</code> (raises)</td><td><code>h.fetch(k)</code> (raises)</td></tr>
  <tr><td>Lookup, with default</td><td><code>d.get(k, 0)</code></td><td><code>h.fetch(k, 0)</code></td></tr>
  <tr><td>Lookup, forgiving</td><td>—</td><td><code>h[k]</code> → <code>nil</code> if missing</td></tr>
  <tr><td>Iterate pairs</td><td><code>for k, v in d.items():</code></td><td><code>h.each { |k, v| ... }</code></td></tr>
  <tr><td>Non-mutating update</td><td><code>{**d, k: v}</code></td><td><code>h.merge(k =&gt; v)</code></td></tr>
  <tr><td>Keys</td><td><code>list(d.keys())</code></td><td><code>h.keys</code></td></tr>
</table>
<p>Why symbols at all? Every <code>"apples"</code> literal in Python (and
Ruby) can be a distinct string object, but <code>:apples</code> is interned —
one object, everywhere, compared by identity. That makes symbols the natural
currency for fixed names: hash keys, keyword arguments (next lesson), method
references. Rule of thumb: symbols for <em>labels</em> your code knows about,
strings for <em>data</em> that came from outside.</p>`,
