  title: "Strings & Interpolation",

  intro: `
<p>Ruby strings will feel like Python strings with one prefix deleted: there
is no <code>f</code>. Every double-quoted string interpolates with
<code>#{}</code>, and single-quoted strings are literal — the exact same
"single quotes mean raw-ish, no substitution" instinct you already have,
except in Ruby it's the whole story rather than a style choice.</p>
<table>
  <tr><th>Python</th><th>Ruby</th></tr>
  <tr><td><code>f"Hello, {name}!"</code></td><td><code>"Hello, #{name}!"</code></td></tr>
  <tr><td><code>s.upper()</code></td><td><code>s.upcase</code></td></tr>
  <tr><td><code>"x" in s</code></td><td><code>s.include?("x")</code></td></tr>
  <tr><td><code>len(s)</code></td><td><code>s.length</code></td></tr>
  <tr><td><code>", ".join(words)</code></td><td><code>words.join(", ")</code></td></tr>
</table>
<p>The method names shift a little — <code>.upper()</code> becomes
<code>.upcase</code> (no parentheses needed) — and two receivers flip.
Python's <code>"x" in s</code> puts the needle first; Ruby asks the haystack:
<code>s.include?("x")</code>, with the trailing <code>?</code> that marks
every true/false method in Ruby. And Python's famously backwards
<code>", ".join(words)</code> flips back to sanity: <code>words.join(", ")</code>
— the collection is the receiver. Even <code>len(s)</code> stops being a
function and becomes a question you ask the string: <code>s.length</code>.</p>`,

  python: `def shout(s):
    return s.upper()


def greet(name):
    return f"Hello, {name}!"


def contains_word(haystack, needle):
    return needle in haystack   # needle first, haystack second


def join_words(words):
    return ", ".join(words)     # the separator is the receiver (!)


print(shout("hey"))                       # HEY
print(greet("Ada"))                       # Hello, Ada!
print(contains_word("hello world", "wo")) # True
print(len("hello"))                       # 5
print(join_words(["pen", "paper"]))       # pen, paper`,

  task: `
<p>Rewrite the Python as Ruby:</p>
<ol>
  <li><code>shout(s)</code> — return the string uppercased with
      <code>.upcase</code> (Ruby's <code>.upper()</code>).</li>
  <li><code>greet(name)</code> — return <code>"Hello, Ada!"</code>-style text
      with <code>#{}</code> interpolation in a double-quoted string. No
      <code>f</code> prefix exists to write.</li>
  <li><code>contains_word?(haystack, needle)</code> — note the <code>?</code>
      in the name: predicates end in <code>?</code> by convention. Flip the
      receiver: Python's <code>needle in haystack</code> becomes
      <code>haystack.include?(needle)</code>.</li>
  <li><code>join_words(words)</code> — join with <code>", "</code>. The
      receiver flips back to the collection: <code>words.join(", ")</code>.</li>
</ol>
<p>Remember: last expression is the return value — no <code>return</code>
needed anywhere.</p>`,

  starter: `# 1. shout: .upper() -> .upcase (no parentheses needed).

  raise NotImplementedError, "TODO: implement join_words"

`,

  requirements: [
    { pattern: /#\{/, message: "Interpolate with #{} in a double-quoted string" },
    { pattern: /\.upcase/, message: "Use .upcase in shout" },
    { pattern: /\.include\?/, message: "Ask the haystack with .include? in contains_word?" },
    { pattern: /\.join/, message: "Call .join on the words array" },
  ],

  tests: [
    { name: 'shout("hello") returns "HELLO"',
      code: '  expect_eq(shout("hello"), "HELLO")' },
    { name: 'greet("Ada") returns "Hello, Ada!"',
      code: '  expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'contains_word?("hello world", "world") is true',
      code: '  expect_true(contains_word?("hello world", "world"))' },
    { name: 'contains_word?("hello", "xyz") is false',
      code: '  expect_eq(contains_word?("hello", "xyz"), false)' },
    { name: 'join_words(["pen", "paper", "ink"]) returns "pen, paper, ink"',
      code: '  expect_eq(join_words(["pen", "paper", "ink"]), "pen, paper, ink")' },
  ],

  solution: `def shout(s)
  s.upcase
end

def greet(name)
  "Hello, #{name}!"
end

def contains_word?(haystack, needle)
  haystack.include?(needle)
end

def join_words(words)
  words.join(", ")
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Ruby</th></tr>
  <tr><td>Interpolation</td><td><code>f"{name}"</code></td><td><code>"#{name}"</code> — every double-quoted string</td></tr>
  <tr><td>Literal string</td><td><code>r"raw-ish"</code> / plain</td><td><code>'no #{interpolation} here'</code> (single quotes)</td></tr>
  <tr><td>Uppercase / lowercase</td><td><code>s.upper()</code> / <code>s.lower()</code></td><td><code>s.upcase</code> / <code>s.downcase</code></td></tr>
  <tr><td>Substring test</td><td><code>"x" in s</code></td><td><code>s.include?("x")</code> — receiver flips</td></tr>
  <tr><td>Length</td><td><code>len(s)</code></td><td><code>s.length</code> (or <code>s.size</code>)</td></tr>
  <tr><td>Join</td><td><code>", ".join(words)</code></td><td><code>words.join(", ")</code> — flips back!</td></tr>
  <tr><td>Strip whitespace</td><td><code>s.strip()</code></td><td><code>s.strip</code></td></tr>
</table>
<p>The <code>?</code> suffix is pure convention — <code>include?</code>,
<code>empty?</code>, <code>start_with?</code> — but Rubyists treat it as law:
if a method answers yes-or-no, its name ends in <code>?</code>. It's Ruby's
answer to Python's <code>is_</code> prefix, baked into the method name itself.
You'll meet its sibling <code>!</code> (for "mutates or is otherwise
surprising") in a later lesson.</p>`,
};
