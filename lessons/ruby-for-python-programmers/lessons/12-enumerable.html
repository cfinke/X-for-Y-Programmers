const LESSON = {
  number: 12,
  title: "Enumerable: map, select & Friends",

  intro: `
<p>The list comprehension is Python's signature move, and Ruby simply doesn't
have it. What it has instead is <strong>Enumerable</strong>: a toolkit of
methods on every collection, each taking a block, designed to chain. Where a
comprehension packs filter-and-transform into one expression read
middle-out, Ruby reads strictly left to right:</p>
<table>
  <tr><th>Python</th><th>Ruby</th></tr>
  <tr><td><code>[p["name"] for p in products if p["in_stock"]]</code></td><td><code>products.select { |p| p[:in_stock] }.map { |p| p[:name] }</code></td></tr>
  <tr><td><code>list(filter(f, xs))</code> / <code>list(map(g, xs))</code></td><td><code>xs.select { ... }</code> / <code>xs.map { ... }</code> — methods, no wrapping</td></tr>
  <tr><td><code>sum(p["price"] for p in products)</code></td><td><code>products.sum { |p| p[:price] }</code></td></tr>
  <tr><td><code>min(products, key=lambda p: p["price"])</code></td><td><code>products.min_by { |p| p[:price] }</code></td></tr>
</table>
<p>The <code>filter</code>/<code>map</code> builtins you avoid in Python
because they need <code>lambda</code> and a <code>list()</code> wrapper are
the <em>primary idiom</em> here, as methods: <code>.select</code> keeps what
the block says (Python's <code>filter</code>), <code>.map</code> transforms
(there's also <code>.reject</code>, the inverted <code>select</code>). And
Python's <code>key=</code> idea carries straight over:
<code>sorted(xs, key=f)</code> is <code>xs.sort_by { ... }</code>,
<code>min(xs, key=f)</code> is <code>xs.min_by { ... }</code> — same
key-function concept, block instead of lambda.</p>`,

  python: `products = [
    {"name": "Mug", "price_cents": 900,  "in_stock": True},
    {"name": "Tee", "price_cents": 1500, "in_stock": False},
    {"name": "Pin", "price_cents": 300,  "in_stock": True},
]

# The comprehension: filter + transform, read middle-out
names = [p["name"] for p in products if p["in_stock"]]

# Aggregate with a generator expression
total = sum(p["price_cents"] for p in products)

# key= picks what to compare
cheapest = min(products, key=lambda p: p["price_cents"])

print(names, total, cheapest["name"])
# ['Mug', 'Pin'] 2700 'Pin'`,

  task: `
<p>The products are Ruby hashes with symbol keys — <code>p[:name]</code>,
<code>p[:price_cents]</code>, <code>p[:in_stock]</code>. Write:</p>
<ol>
  <li><code>in_stock_names(products)</code> — the comprehension, unrolled:
      <code>.select</code> the in-stock products, then <code>.map</code> to

  <li><code>total_value(products)</code> — sum of every product's price:
      <code>.sum { |p| p[:price_cents] }</code>, no stock filter.</li>
  <li><code>cheapest_name(products)</code> — the name of the cheapest
      product: <code>.min_by</code> with a price block, then index the
      winning hash with <code>[:name]</code>.</li>
</ol>`,

  starter: `# 1. in_stock_names: [p["name"] for p in products if p["in_stock"]]
#    becomes .select { ... }.map { ... } — a left-to-right chain.

end
`,

  requirements: [
    { pattern: /\.select/, message: "Filter with .select (Python's filter / the comprehension's if)" },
    { pattern: /\.map/, message: "Transform with .map" },
    { pattern: /\.sum/, message: "Aggregate with .sum" },
    { pattern: /min_by|sort_by/, message: "Find the cheapest with .min_by (or .sort_by)" },
  ],

  tests: [
    { name: 'in_stock_names returns ["Mug", "Pin"] for the sample products',
      code: '  expect_eq(in_stock_names([{ name: "Mug", price_cents: 900, in_stock: true }, { name: "Tee", price_cents: 1500, in_stock: false }, { name: "Pin", price_cents: 300, in_stock: true }]), ["Mug", "Pin"])' },
    { name: "in_stock_names returns [] when nothing is in stock",
      code: '  expect_eq(in_stock_names([{ name: "Tee", price_cents: 1500, in_stock: false }]), [])' },
    { name: "total_value sums every price (2700 for the sample)",
      code: '  expect_eq(total_value([{ name: "Mug", price_cents: 900, in_stock: true }, { name: "Tee", price_cents: 1500, in_stock: false }, { name: "Pin", price_cents: 300, in_stock: true }]), 2700)' },
    { name: "total_value of an empty catalog is 0",
      code: '  expect_eq(total_value([]), 0)' },
    { name: 'cheapest_name picks "Pin" (300 cents)',
      code: '  expect_eq(cheapest_name([{ name: "Mug", price_cents: 900, in_stock: true }, { name: "Tee", price_cents: 1500, in_stock: false }, { name: "Pin", price_cents: 300, in_stock: true }]), "Pin")' },
  ],

  solution: `def in_stock_names(products)
  products.select { |p| p[:in_stock] }.map { |p| p[:name] }
end

def total_value(products)
  products.sum { |p| p[:price_cents] }
end

def cheapest_name(products)
  products.min_by { |p| p[:price_cents] }[:name]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Ruby</th></tr>
  <tr><td>Filter</td><td><code>[x for x in xs if f(x)]</code></td><td><code>xs.select { |x| f(x) }</code></td></tr>
  <tr><td>Inverted filter</td><td><code>[x for x in xs if not f(x)]</code></td><td><code>xs.reject { |x| f(x) }</code></td></tr>
  <tr><td>Transform</td><td><code>[g(x) for x in xs]</code></td><td><code>xs.map { |x| g(x) }</code></td></tr>
  <tr><td>Sum with key</td><td><code>sum(g(x) for x in xs)</code></td><td><code>xs.sum { |x| g(x) }</code></td></tr>
  <tr><td>Sort / min by key</td><td><code>sorted(xs, key=f)</code> / <code>min(xs, key=f)</code></td><td><code>xs.sort_by { ... }</code> / <code>xs.min_by { ... }</code></td></tr>
  <tr><td>Any / all</td><td><code>any(f(x) for x in xs)</code> / <code>all(...)</code></td><td><code>xs.any? { ... }</code> / <code>xs.all? { ... }</code></td></tr>
</table>
<p>Comprehensions optimize for one filter and one transform; past that they
nest and get read inside-out. Method chains scale linearly — add
<code>.sort_by</code>, <code>.first(3)</code>, <code>.tally</code> to the end
and the pipeline still reads top to bottom, left to right. That, plus blocks
that grow to multiple lines without ceremony, is why Ruby never missed
comprehensions.</p>`,
};
