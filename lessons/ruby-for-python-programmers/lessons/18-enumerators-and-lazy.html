  intro: `
<p>Python generators — a <code>def</code> with <code>yield</code> inside —
have a direct Ruby counterpart: <code>Enumerator.new</code>. You get handed a
<em>yielder</em> object, and pushing into it (<code>y &lt;&lt; value</code>)
is your <code>yield</code>. Like a generator, nothing runs until someone asks
for values, an infinite <code>loop do ... end</code> inside is perfectly fine,
and the consumer pulls one value at a time.</p>
<table>
  <tr><th>Python</th><th>Ruby</th></tr>
  <tr><td><code>def gen(): ... yield v</code></td><td><code>Enumerator.new { |y| y &lt;&lt; v }</code></td></tr>
  <tr><td><code>itertools.count(1)</code></td><td><code>(1..Float::INFINITY)</code></td></tr>
  <tr><td><code>(i for i in count(1) if ...)</code></td><td><code>(1..Float::INFINITY).lazy.select { ... }</code></td></tr>
  <tr><td><code>list(islice(gen, 5))</code></td><td><code>.first(5)</code></td></tr>
  <tr><td>grouper recipe / manual slicing</td><td><code>arr.each_slice(2)</code></td></tr>
</table>
<p>For the <code>itertools</code> half of your toolbox, Ruby needs no import:
<code>(1..Float::INFINITY)</code> is <code>count(1)</code>, tacking on
<code>.lazy</code> makes every <code>map</code>/<code>select</code> after it
demand-driven instead of eager, and <code>.first(n)</code> plays the role of
<code>islice</code> — pull <code>n</code> results and stop. Without
<code>.lazy</code>, <code>select</code> on an infinite range would try to
build the whole array and hang; with it, work happens only as values are
demanded. And <code>each_slice(n)</code> is the "grouper" recipe you've
pasted from the itertools docs, built in — including keeping the short tail
chunk.</p>`,

  python: `from itertools import count, islice

def multiples_of(k, n):
    gen = (i for i in count(1) if i % k == 0)
    return list(islice(gen, n))

def fibonacci(n):
    def fibs():
        a, b = 0, 1
        while True:
            yield a
            a, b = b, a + b
    return list(islice(fibs(), n))

def pairs(items):
    return [items[i:i + 2] for i in range(0, len(items), 2)]`,

  solution: `def multiples_of(k, count)
  (1..Float::INFINITY).lazy.select { |n| n % k == 0 }.first(count)
end

def fibonacci(count)
  fibs = Enumerator.new do |y|
    a, b = 0, 1
    loop do
      y << a
      a, b = b, a + b
    end
  end
  fibs.first(count)
end

def pairs(arr)
  arr.each_slice(2).to_a
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Ruby</th></tr>
  <tr><td>Generator</td><td><code>def f(): yield v</code></td><td><code>Enumerator.new { |y| y &lt;&lt; v }</code></td></tr>
  <tr><td>Infinite counter</td><td><code>itertools.count(1)</code></td><td><code>(1..Float::INFINITY)</code> (or <code>1.step</code>)</td></tr>
  <tr><td>Lazy pipeline</td><td>generator expressions (lazy by default)</td><td><code>.lazy</code> then <code>map</code>/<code>select</code></td></tr>
  <tr><td>Take n</td><td><code>list(islice(gen, n))</code></td><td><code>.first(n)</code></td></tr>
  <tr><td>Chunk</td><td>grouper recipe / slicing loop</td><td><code>each_slice(n)</code></td></tr>
  <tr><td>Sliding window</td><td><code>itertools.pairwise</code></td><td><code>each_cons(2)</code></td></tr>
  <tr><td>Pull one value</td><td><code>next(gen)</code></td><td><code>enum.next</code></td></tr>
</table>
<p>The polarity flip to remember: Python iterators are lazy by default and you
opt into eagerness with <code>list()</code>; Ruby's Enumerable is eager by
default and you opt into laziness with <code>.lazy</code>. An
<code>Enumerator</code> itself is always demand-driven, though — it even
supports <code>.next</code> for external, one-at-a-time iteration, exactly
like calling <code>next()</code> on a generator. Every <code>each</code>-like
method called without a block (<code>arr.each_slice(2)</code> above) returns
one of these, which is why <code>.to_a</code> was needed to materialize the
chunks.</p>`,
