<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance & Modules",

  intro: `
<p>Inheritance loses its ceremony: <code>: public Shape</code> becomes
<code>&lt; Shape</code>, and the entire virtual-dispatch apparatus disappears
because <strong>every method is virtual</strong>. Dispatch is always dynamic —
no <code>virtual</code>, no <code>override</code>, no vtable bookkeeping, no
virtual destructor to remember. A "pure virtual" method is a convention
instead of a keyword: the base implementation raises
<code>NotImplementedError</code>, so forgetting to override is caught at
runtime rather than compile time — that's the trade.</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>struct Circle : public Shape</code></td><td><code>class Circle &lt; Shape</code></td></tr>
  <tr><td><code>virtual double area() const = 0;</code></td><td><code>def area = raise NotImplementedError</code></td></tr>
  <tr><td><code>virtual</code> + <code>override</code> + vtables</td><td>nothing — dispatch is always dynamic</td></tr>
  <tr><td><code>Shape::describe()</code> call to base</td><td><code>super</code> (bare form forwards all args)</td></tr>
  <tr><td>multiple inheritance, CRTP mixins</td><td>single inheritance + <code>include Module</code></td></tr>
</table>
<p>Ruby allows only single inheritance — no diamonds — but <strong>modules as
mixins</strong> cover the use case that pushed you to multiple inheritance or
CRTP: <code>include Greetable</code> splices shared methods into a class, and
those methods can call <code>self.name</code> or any other method the host
defines, exactly the trick CRTP plays with <code>static_cast&lt;Derived*&gt;(this)</code>
— minus all the template machinery. When you do override a method,
<code>super</code> chains to the parent's version; the bare form (no parens,
no args) forwards every argument automatically.</p>`,

  cpp: `#include <string>

struct Shape {
    virtual ~Shape() = default;          // or leak on delete-via-base
    virtual double area() const = 0;     // pure virtual
    std::string describe() const {
        return "a shape with area " + std::to_string(area());
    }
};

struct Circle : public Shape {
    explicit Circle(double r) : radius(r) {}
    double area() const override { return 3.14159265 * radius * radius; }
    double radius;
};

template <typename Derived>              // CRTP: a mixin via templates
struct Greetable {
    std::string greet() const {
        return "Hi, I am " + static_cast<const Derived*>(this)->name;
    }
};

struct Robot : Greetable<Robot> { std::string name; };`,

  task: `
<p>Build the hierarchy and the mixin:</p>
<ol>
  <li><code>Shape</code> — <code>area</code> raises
      <code>NotImplementedError</code> (the "pure virtual" convention), and
      <code>describe</code> returns <code>"a shape with area #{area}"</code>.
      The base calls <code>area</code>; dynamic dispatch finds the child's
      version — a template method with zero keywords.</li>
  <li><code>Circle &lt; Shape</code> — <code>initialize(radius)</code>, and
      <code>area</code> returns <code>(Math::PI * @radius ** 2).round(2)</code>.</li>
  <li><code>Rectangle &lt; Shape</code> — <code>initialize(width, height)</code>,
      <code>area</code> returns width × height.</li>
  <li><code>module Greetable</code> — <code>greet</code> returns
      <code>"Hi, I am #{name}"</code>, calling whatever <code>name</code> the
      host class provides.</li>
  <li><code>Robot</code> — <code>include Greetable</code>, plus
      <code>attr_reader :name</code> and <code>initialize(name)</code>.</li>
</ol>`,

  starter: `# "Pure virtual", Ruby style: the base raises NotImplementedError.
class Shape
  def area
    raise NotImplementedError, "subclasses must implement area"
  end

  # 1. Template method: interpolate area into "a shape with area ...".
  def describe
    raise NotImplementedError, "TODO: implement describe"
  end
end

# 2. Inherit with <  — every method is already virtual.
class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    raise NotImplementedError, "TODO: implement Circle#area"
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    raise NotImplementedError, "TODO: implement Rectangle#area"
  end
end

# 4. The mixin: greet can call name because the host class defines it.
module Greetable
  def greet
    raise NotImplementedError, "TODO: implement greet"
  end
end

# 5. include Greetable to splice the mixin in.
class Robot
  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  requirements: [
    { pattern: /<\s*Shape/, message: "Inherit with < Shape" },
    { pattern: /NotImplementedError/, message: "Raise NotImplementedError in the abstract base" },
    { pattern: /module\s+Greetable/, message: "Define module Greetable" },
    { pattern: /include\s+Greetable/, message: "Mix the module in with include Greetable" },
  ],

  tests: [
    { name: "Circle.new(1.0).area returns 3.14",
      code: "  expect_eq(Circle.new(1.0).area, 3.14)" },
    { name: "Rectangle.new(3, 4).area returns 12",
      code: "  expect_eq(Rectangle.new(3, 4).area, 12)" },
    { name: 'describe on a Circle dispatches to the child area: "a shape with area 12.57"',
      code: '  expect_eq(Circle.new(2.0).describe, "a shape with area 12.57")' },
    { name: "Shape.new.area raises NotImplementedError",
      code: `  raised = false
  begin
    Shape.new.area
  rescue NotImplementedError
    raised = true
  end
  expect_true(raised)` },
    { name: 'Robot.new("R2-D2").greet returns "Hi, I am R2-D2"',
      code: '  expect_eq(Robot.new("R2-D2").greet, "Hi, I am R2-D2")' },
  ],

  solution: `class Shape
  def area
    raise NotImplementedError, "subclasses must implement area"
  end

  def describe
    "a shape with area #{area}"
  end
end

class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    (Math::PI * @radius ** 2).round(2)
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    @width * @height
  end
end

module Greetable
  def greet
    "Hi, I am #{name}"
  end
end

class Robot
  include Greetable
  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>Inherit</td><td><code>struct Circle : public Shape</code></td><td><code>class Circle &lt; Shape</code></td></tr>
  <tr><td>Virtual dispatch</td><td>opt-in: <code>virtual</code> + <code>override</code></td><td>always — every call is dynamic</td></tr>
  <tr><td>Abstract method</td><td><code>= 0</code>, compile-time enforced</td><td><code>raise NotImplementedError</code>, runtime convention</td></tr>
  <tr><td>Call the parent</td><td><code>Shape::describe()</code></td><td><code>super</code> — bare form forwards all args</td></tr>
  <tr><td>Virtual destructor</td><td>required for delete-via-base</td><td>not a thing (GC)</td></tr>
  <tr><td>Code reuse across hierarchies</td><td>multiple inheritance, CRTP</td><td><code>module</code> + <code>include</code></td></tr>
  <tr><td>Diamond problem</td><td>virtual bases, ambiguity rules</td><td>can't happen — single inheritance + linearized modules</td></tr>
</table>
<p><code>describe</code> is the classic template method, and it needed no
keywords: the base's <code>"a shape with area #{area}"</code> sends the
<code>area</code> message to <code>self</code>, and dispatch — always dynamic
— finds <code>Circle#area</code>. The mixin plays the same trick from the
other side: <code>Greetable#greet</code> calls <code>name</code> on whatever
class included it. An included module is inserted into the ancestor chain
just above the class (inspect it with <code>Robot.ancestors</code>), which is
also why <code>super</code> works through modules — the "diamond" is
flattened into one well-defined lookup order.</p>`,
};
</script>
