  number: 15,
  title: "Duck Typing & respond_to?",

  intro: `
<p>Here is the secret you already know: <strong>templates were always duck
typing</strong>. <code>template &lt;typename T&gt; ... thing.speak()</code>
compiles for <em>any</em> <code>T</code> that has a suitable
<code>speak()</code> — no base class, no declared interface, just structural
"if it quacks." C++ does the quack-check at instantiation time (and greets
failure with a forty-line error novel, which is why SFINAE and then concepts
exist). Ruby does the same check at the moment of the call:
<code>thing.speak</code> works on any object with a <code>speak</code>
method, whatever its class, or raises a one-line
<code>NoMethodError</code>.</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>template &lt;typename T&gt;</code> — works if <code>T::speak()</code> exists</td><td>just call <code>thing.speak</code> — works if it exists</td></tr>
  <tr><td>SFINAE probe / <code>requires { t.speak(); }</code></td><td><code>thing.respond_to?(:speak)</code></td></tr>
  <tr><td>check fails → instantiation error at compile time</td><td>call fails → <code>NoMethodError</code> at run time</td></tr>
  <tr><td><code>dynamic_cast&lt;Dog*&gt;(p) != nullptr</code></td><td><code>thing.is_a?(Dog)</code></td></tr>
</table>
<p>When you'd rather probe than crash, <code>respond_to?(:speak)</code> is
the SFINAE/concepts check reborn as a plain runtime question — ask first,
call second, with a fallback in the else branch. Reserve
<code>is_a?(Dog)</code> for the rare case where the <em>nominal</em> class
matters (pure <code>dynamic_cast</code> energy); idiomatic Ruby cares about
what an object can <em>do</em>, not what it <em>is</em>. Note what
disappears: <code>Dog</code> and <code>Robot</code> below share no base
class, no virtual functions, no vtable — and heterogeneous collections need
no <code>std::variant</code>, no visitors, no
<code>vector&lt;unique_ptr&lt;Base&gt;&gt;</code>. An Array holds anything;
you just send messages.</p>`,

  cpp: `#include <string>
#include <type_traits>

// A template was always duck typing: any T with .speak() compiles.
template <typename T>
std::string make_speak(const T& thing) {
    return thing.speak();   // T = Rock? Forty lines of template errors.
}

// The SFINAE probe — "does T respond to speak?" — asked at compile time.
template <typename T, typename = void>
struct has_speak : std::false_type {};
template <typename T>
struct has_speak<T, std::void_t<decltype(std::declval<T>().speak())>>
    : std::true_type {};
// C++20 finally names the idea:  requires { t.speak(); }

struct Dog   { std::string speak() const { return "Woof"; } };
struct Robot { std::string speak() const { return "Beep"; } };
struct Rock  { };   // no speak(); has_speak<Rock>::value == false`,

  task: `
<p>Rebuild the menagerie, with the probe at run time:</p>
<ol>
  <li>Three classes, no shared base, no interface: <code>Dog</code> with a
      <code>speak</code> method returning <code>"Woof"</code>;
      <code>Robot</code> with <code>speak</code> returning
      <code>"Beep"</code>; and <code>Rock</code> with no <code>speak</code>
      at all.</li>
  <li><code>make_speak(thing)</code> — the duck-typed function. Probe first:
      if <code>thing.respond_to?(:speak)</code>, return
      <code>thing.speak</code>; otherwise return the string
      <code>"..."</code>. Where <code>has_speak&lt;Rock&gt;</code> guarded a
      compile-time branch, this is one runtime ternary.</li>
  <li><code>all_speakers(things)</code> — take a mixed array (dogs, rocks,
      robots — no <code>std::variant</code>, no visitor, no
      <code>unique_ptr&lt;Base&gt;</code>), keep the objects that respond to
      <code>:speak</code> with <code>.select</code>, and <code>.map</code>
      them to what they say.</li>
</ol>`,

end

class Rock

end

# make_speak: probe with respond_to?(:speak), call if it quacks,
# fall back to "..." if it does not.
def make_speak(thing)
  raise NotImplementedError, "TODO: implement make_speak"

  raise NotImplementedError, "TODO: implement all_speakers"

`,

  requirements: [
    { pattern: /respond_to\?/, message: "Probe with respond_to?(:speak) before calling" },
    { pattern: /class\s+Dog/, message: "Define a Dog class" },
    { pattern: /class\s+Robot/, message: "Define a Robot class" },
    { pattern: /\.speak/, message: "Actually send the .speak message" },
  ],

  tests: [
    { name: 'make_speak(Dog.new) returns "Woof"',
      code: '  expect_eq(make_speak(Dog.new), "Woof")' },
    { name: 'make_speak(Robot.new) returns "Beep" — no shared base class needed',
      code: '  expect_eq(make_speak(Robot.new), "Beep")' },
    { name: 'make_speak(Rock.new) returns "..." instead of raising NoMethodError',
      code: '  expect_eq(make_speak(Rock.new), "...")' },
    { name: "Rock really has no speak method",
      code: "  expect_true(Rock.new.respond_to?(:speak) == false)" },
    { name: 'all_speakers([Dog, Rock, Robot, Dog]) returns ["Woof", "Beep", "Woof"]',
      code: '  things = [Dog.new, Rock.new, Robot.new, Dog.new]\n  expect_eq(all_speakers(things), ["Woof", "Beep", "Woof"])' },
    { name: "all_speakers([Rock.new]) returns [] — nothing quacks",
      code: "  expect_eq(all_speakers([Rock.new]), [])" },
  ],

  solution: `class Dog
  def speak
    "Woof"
  end
end

class Robot
  def speak
    "Beep"
  end
end

class Rock
end

def make_speak(thing)
  thing.respond_to?(:speak) ? thing.speak : "..."
end

def all_speakers(things)
  things.select { |t| t.respond_to?(:speak) }.map(&:speak)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>Structural "if it quacks"</td><td>template instantiation</td><td>every method call, always</td></tr>
  <tr><td>Probe for a capability</td><td>SFINAE / <code>std::void_t</code> / <code>requires { t.speak(); }</code></td><td><code>thing.respond_to?(:speak)</code></td></tr>
  <tr><td>Quack check fails</td><td>pages of instantiation errors, compile time</td><td>one-line <code>NoMethodError</code>, run time</td></tr>
  <tr><td>Nominal type check</td><td><code>dynamic_cast&lt;Dog*&gt;(p)</code></td><td><code>thing.is_a?(Dog)</code> — use sparingly</td></tr>
  <tr><td>Heterogeneous collection</td><td><code>std::variant</code> + visitor, or <code>vector&lt;unique_ptr&lt;Base&gt;&gt;</code></td><td>a plain Array of anything</td></tr>
  <tr><td>Polymorphic dispatch</td><td>virtual functions + vtable, or template</td><td>every call dispatches by method name</td></tr>
  <tr><td>Declared interface</td><td>abstract base class / concept</td><td>none — the method set <em>is</em> the interface</td></tr>
</table>
<p>So the mental model transfers cleanly: Ruby behaves as if every method
were a template method, with instantiation deferred to the call and the
error shrunk to one line. What you give up is the compiler proving every
quack before the program ships — in Ruby that proof is the test suite's job.
What you gain is that "accepts anything with <code>speak</code>" needs no
machinery at all: no template, no concept, no variant, no inheritance
hierarchy designed up front. The interface is simply the set of messages an
object answers — and <code>respond_to?</code> lets you ask politely before
you send one.</p>`,
};
