  intro: `
<p>In Python a function is just a value: you write one with <code>def</code>
or inline it as a <code>lambda</code>, pass it around, and call it directly.
Java has lambdas too, and the arrow syntax will look familiar — but Java
has no free-standing function <em>type</em>. Every lambda must be an instance of
a <strong>functional interface</strong>: an interface with exactly one abstract
method. The compiler infers which interface from the target type.</p>
<table>
  <tr><th>Python</th><th>Java</th></tr>
  <tr><td><code>lambda x: x * 2</code></td><td><code>x -&gt; x * 2</code></td></tr>
  <tr><td><code>lambda a, b: a + b</code></td><td><code>(a, b) -&gt; a + b</code></td></tr>
  <tr><td><code>lambda: "hi"</code></td><td><code>() -&gt; "hi"</code></td></tr>
  <tr><td><code>Callable[[int], int]</code></td><td><code>Function&lt;Integer,Integer&gt;</code></td></tr>
  <tr><td><code>Callable[[int], bool]</code></td><td><code>Predicate&lt;Integer&gt;</code></td></tr>
  <tr><td><code>map(f, xs)</code></td><td>pass a <code>Function</code> to a method</td></tr>
</table>
<p>The <code>java.util.function</code> package ships the everyday shapes:
<code>Function&lt;T,R&gt;</code> (one arg, call <code>.apply</code>),
<code>BiFunction&lt;A,B,R&gt;</code> (two args, <code>.apply</code>),
<code>Predicate&lt;T&gt;</code> (returns <code>boolean</code>, call
<code>.test</code>), and <code>Supplier&lt;T&gt;</code> (no args, call
<code>.get</code>). Because generics can't hold primitives, use the boxed types
(<code>Integer</code>, not <code>int</code>). And where Python lets you write
<code>map(square, xs)</code>, Java offers <strong>method references</strong>:
<code>Functional::square</code> (a static method), <code>String::toUpperCase</code>
(an instance method invoked on the argument), or <code>prefix::concat</code> (an
instance method bound to a specific object).</p>`,

  solution: `import java.util.function.*;

class Functional {
  static Function<Integer, Integer> doubler() {
    return n -> n * 2;
  }

  static Predicate<Integer> isEven() {
    return n -> n % 2 == 0;
  }

  static BiFunction<Integer, Integer, Integer> adder() {
    return (a, b) -> a + b;
  }

  static Supplier<String> greeter() {
    return () -> "hello";
  }

  static List<Integer> mapAll(List<Integer> nums, Function<Integer, Integer> f) {
    List<Integer> out = new ArrayList<>();
    for (Integer n : nums) {
      out.add(f.apply(n));
    }
    return out;
  }

  static List<Integer> keep(List<Integer> nums, Predicate<Integer> p) {
    List<Integer> out = new ArrayList<>();
    for (Integer n : nums) {
      if (p.test(n)) {
        out.add(n);
      }
    }
    return out;
  }

  static int square(int n) {
    return n * n;
  }

  static List<Integer> squareAll(List<Integer> nums) {
    return mapAll(nums, Functional::square);
  }

  static List<String> shout(List<String> words, String prefix) {
    Function<String, String> up = String::toUpperCase;   // Class::instanceMethod
    Function<String, String> withPrefix = prefix::concat; // instance::method
    List<String> out = new ArrayList<>();
    for (String w : words) {
      out.add(withPrefix.apply(up.apply(w)));
    }
    return out;
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Java</th></tr>
  <tr><td>One-arg lambda</td><td><code>lambda x: x * 2</code></td><td><code>x -&gt; x * 2</code></td></tr>
  <tr><td>Function type</td><td><code>Callable[[int], int]</code></td><td><code>Function&lt;Integer,Integer&gt;</code></td></tr>
  <tr><td>Calling it</td><td><code>f(x)</code></td><td><code>f.apply(x)</code></td></tr>
  <tr><td>Predicate</td><td><code>Callable[[int], bool]</code></td><td><code>Predicate&lt;T&gt;</code>, <code>p.test(x)</code></td></tr>
  <tr><td>Supplier</td><td><code>Callable[[], T]</code></td><td><code>Supplier&lt;T&gt;</code>, <code>s.get()</code></td></tr>
  <tr><td>Static method ref</td><td><code>map(square, xs)</code></td><td><code>Functional::square</code></td></tr>
  <tr><td>Instance method ref</td><td><code>map(str.upper, xs)</code></td><td><code>String::toUpperCase</code></td></tr>
</table>
<p>The big mental shift: in Python a function is its own first-class object with
no declared type; in Java a lambda is always an <em>instance of an interface</em>
with a single abstract method (a "functional interface"). You rarely name it —
the compiler infers it from the parameter or return type — but that's why
<code>.apply</code>, <code>.test</code>, and <code>.get</code> differ: each
interface names its one method differently.</p>
<p>Method references are pure sugar for a lambda that just forwards its arguments.
<code>Functional::square</code> means <code>n -&gt; Functional.square(n)</code>;
<code>String::toUpperCase</code> means <code>s -&gt; s.toUpperCase()</code> (the
argument becomes the receiver); and <code>prefix::concat</code> means
<code>s -&gt; prefix.concat(s)</code> (bound to a captured object). Reach for them
when the lambda would only relay its inputs to an existing method — the same
instinct that leads you to pass <code>str.upper</code> directly to <code>map()</code>
in Python instead of wrapping it in <code>lambda s: s.upper()</code>.</p>`,
