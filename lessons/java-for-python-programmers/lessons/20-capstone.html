interfaces, generics, streams, and exceptions one at a time. A real component
uses all of them at once. In this capstone you will build a tiny <strong>typed

<table>

  <tr><td><code>class Entity(Protocol): id: int</code></td><td><code>interface Entity { int id(); }</code></td></tr>
  <tr><td><code>class Repo(Generic[T])</code></td><td><code>class Repo&lt;T extends Entity&gt;</code></td></tr>
  <tr><td><code>dict[int, T]</code></td><td><code>Map&lt;Integer, T&gt;</code></td></tr>

  <tr><td><code>raise KeyError(...)</code></td><td><code>throw new NotFoundException(id)</code></td></tr>
</table>
<p>The shape is one you know: a generic container keyed by id, a lookup that
throws when the key is missing, an <code>Optional</code>-returning lookup that
does not, and a query method that takes a predicate and returns filtered,
sorted results via a stream. Each piece is small; the point is that the type
parameter <code>T extends Entity</code> threads through all of them so the
same repository serves <code>User</code>, <code>Product</code>, or any future
record without a single cast.</p>`,

  python: `class Entity(Protocol):
    id: int

class Repo(Generic[T]):
    def __init__(self):
        self._store: dict[int, T] = {}

    def add(self, e: T) -> T:
        self._store[e.id] = e
        return e

    def get(self, id: int) -> T:
        if id not in self._store:
            raise KeyError(f"no entity with id {id}")
        return self._store[id]

    def where(self, pred: Callable[[T], bool]) -> list[T]:
        return sorted(
            (v for v in self._store.values() if pred(v)),
            key=lambda t: t.id,
        )`,

  solution: `import java.util.function.*;

interface Entity {
  int id();
}

record User(int id, String name, int age) implements Entity {}

record Product(int id, String title, double price) implements Entity {}

class NotFoundException extends RuntimeException {
  NotFoundException(int id) {
    super("no entity with id " + id);
  }
}

class Repo<T extends Entity> {
  private final Map<Integer, T> store = new HashMap<>();

  T add(T entity) {
    store.put(entity.id(), entity);
    return entity;
  }

  T get(int id) {
    T value = store.get(id);
    if (value == null) {
      throw new NotFoundException(id);
    }
    return value;
  }

  Optional<T> find(int id) {
    return Optional.ofNullable(store.get(id));
  }

  int count() {
    return store.size();
  }

  List<T> where(Predicate<T> pred) {
    return store.values().stream()
        .filter(pred)
        .sorted(Comparator.comparingInt(Entity::id))
        .toList();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Java</th></tr>
  <tr><td>Bounded generic</td><td><code>class Repo(Generic[T])</code> (no bound enforced at runtime)</td><td><code>&lt;T extends Entity&gt;</code></td></tr>
  <tr><td>Absent-or-present</td><td><code>T | None</code></td><td><code>Optional&lt;T&gt;</code></td></tr>
  <tr><td>Filter + sort</td><td><code>sorted(filter(p, items), key=...)</code></td><td><code>stream().filter(p).sorted(cmp).toList()</code></td></tr>
  <tr><td>Sort key</td><td><code>key=lambda t: t.id</code></td><td><code>Comparator.comparingInt(Entity::id)</code></td></tr>
  <tr><td>Signal "missing"</td><td><code>raise KeyError(...)</code></td><td>a typed <code>RuntimeException</code></td></tr>
</table>
<p>Two design choices echo the whole course. First, <code>get</code> and
<code>find</code> split the same lookup into a throwing path and an
<code>Optional</code> path — Java's answer to "should absence be an exception or
a value?" is to offer both and let the caller choose, rather than leaning on
<code>None</code> as Python does. Second, the bound
<code>T extends Entity</code> is what lets <code>where</code> sort by
<code>Entity::id</code> and lets <code>add</code> call <code>entity.id()</code>:
the compiler knows every <code>T</code> has an <code>id()</code>, so no cast is
ever needed and the same class stores users and products alike — a guarantee
Python's duck typing cannot make until the code actually runs.</p>
<p><code>NotFoundException</code> extends <code>RuntimeException</code>, so it is
<em>unchecked</em> — callers are not forced to declare or catch it, which keeps
the happy path clean while still giving failures a precise type to
<code>catch</code>. That is the idiomatic modern-Java choice for a repository
lookup, and it maps almost one-to-one onto the exceptions you already raise in
Python.</p>`,
