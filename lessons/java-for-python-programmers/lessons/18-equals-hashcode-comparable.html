  title: "equals, hashCode & Comparable",

  intro: `
<p>In Python, <code>==</code> on objects calls <code>__eq__</code>, which by
default falls back to identity — but you can override it (and
<code>__hash__</code> alongside it) to give a class value semantics.
Ordering is a callback: <code>sorted(wallet, key=lambda m: m.cents)</code>, or
you implement <code>__lt__</code> and friends (often via
<code>functools.total_ordering</code>) so plain <code>sorted()</code> works.
Java bakes both of these into the object model. Every class inherits
<code>equals(Object)</code> and <code>hashCode()</code> from
<code>Object</code> — by default they mean reference identity — and you
<em>override</em> them to give a class value semantics. For ordering, a class
implements <code>Comparable&lt;T&gt;</code> and defines <code>compareTo</code>,
which <code>Collections.sort</code> and <code>TreeSet</code> use
automatically.</p>
<table>
  <tr><th>Python</th><th>Java</th></tr>
  <tr><td><code>a is b</code> (identity)</td><td><code>a == b</code> (identity)</td></tr>
  <tr><td>override <code>__eq__(self, other)</code></td><td>override <code>a.equals(b)</code></td></tr>
  <tr><td>override <code>__hash__(self)</code> to match <code>__eq__</code></td><td>override <code>hashCode()</code> to match <code>equals</code></td></tr>
  <tr><td><code>sorted(items, key=lambda m: m.age)</code></td><td><code>implements Comparable&lt;T&gt;</code> + <code>compareTo</code></td></tr>
</table>
<p>The load-bearing rule is <strong>the equals/hashCode contract</strong>: if
<code>a.equals(b)</code> is true, then <code>a.hashCode() == b.hashCode()</code>
must also be true. Break it and hash-based collections
(<code>HashMap</code>, <code>HashSet</code>) silently misbehave — a key you
inserted becomes unfindable. Override the two together, always, over the same
fields. <code>Objects.equals</code> and <code>Objects.hash</code> make this a
one-liner each.</p>`,

  python: `class Money:
    def __init__(self, cents: int, currency: str):
        self.cents = cents
        self.currency = currency

# value equality is a manual dunder in Python
def __eq__(self, other):
    return self.cents == other.cents and self.currency == other.currency

# sorting is a key function
sorted_wallet = sorted(wallet, key=lambda m: m.cents)`,

  task: `
<p>Build a small value class <code>Money</code> that has both value equality and a
natural ordering.</p>
<ol>
  <li>Give it two fields: <code>int cents</code> and <code>String currency</code>,
      set in the constructor. Make the class <code>implements Comparable&lt;Money&gt;</code>.</li>
  <li>Override <code>equals(Object o)</code> so two <code>Money</code> values are
      equal when both <code>cents</code> and <code>currency</code> match. Use the
      <code>getClass()</code> check and a cast, then compare fields
      (<code>Objects.equals</code> for the String).</li>
  <li>Override <code>hashCode()</code> consistently with
      <code>equals</code> — <code>return Objects.hash(cents, currency);</code></li>
  <li>Implement <code>compareTo(Money other)</code> for natural ordering by
      <code>cents</code> ascending. Use <code>Integer.compare(this.cents, other.cents)</code>
      (never <code>this.cents - other.cents</code>, which can overflow).</li>
</ol>
<p>Once <code>compareTo</code> exists, <code>Collections.sort(list)</code> works
with no comparator argument.</p>`,

    { name: "hashCode matches for equal values", code: "      expect_eq(new Money(500, \"USD\").hashCode(), new Money(500, \"USD\").hashCode());" },
    { name: "works as a HashSet element", code: "      Set<Money> set = new HashSet<>();\n      set.add(new Money(500, \"USD\"));\n      expect_true(set.contains(new Money(500, \"USD\")));" },
    { name: "compareTo orders by cents", code: "      expect_true(new Money(300, \"USD\").compareTo(new Money(500, \"USD\")) < 0);\n      expect_true(new Money(500, \"USD\").compareTo(new Money(500, \"USD\")) == 0);" },
    { name: "Collections.sort uses natural ordering", code: "      List<Money> list = new ArrayList<>(List.of(new Money(300, \"USD\"), new Money(100, \"USD\"), new Money(200, \"USD\")));\n      Collections.sort(list);\n      expect_eq(list.get(0).cents, 100);\n      expect_eq(list.get(2).cents, 300);" },

  solution: `class Money implements Comparable<Money> {
  final int cents;
  final String currency;

  Money(int cents, String currency) {
    this.cents = cents;
    this.currency = currency;
  }

  @Override
  public boolean equals(Object o) {
    if (this == o) return true;
    if (o == null || getClass() != o.getClass()) return false;
    Money other = (Money) o;
    return cents == other.cents && Objects.equals(currency, other.currency);
  }

  @Override
  public int hashCode() {
    return Objects.hash(cents, currency);
  }

  @Override
  public int compareTo(Money other) {
    return Integer.compare(this.cents, other.cents);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Java</th></tr>
  <tr><td>Identity check</td><td><code>a is b</code></td><td><code>a == b</code></td></tr>
  <tr><td>Value equality</td><td>override <code>__eq__</code></td><td>override <code>equals(Object)</code></td></tr>
  <tr><td>Hashing</td><td>override <code>__hash__</code> to match <code>__eq__</code></td><td>override <code>hashCode()</code> to match equals</td></tr>
  <tr><td>Combine fields into a hash</td><td><code>hash((a, b))</code></td><td><code>Objects.hash(a, b)</code></td></tr>
  <tr><td>Natural ordering</td><td><code>__lt__</code> / <code>total_ordering</code></td><td><code>Comparable&lt;T&gt;.compareTo</code></td></tr>
  <tr><td>One-off ordering</td><td><code>sorted(items, key=...)</code></td><td><code>Comparator</code> passed to sort</td></tr>
</table>
<p>The contract is the whole point: <code>equals</code> and <code>hashCode</code>
travel together and must be computed from the same fields, or
<code>HashMap</code>/<code>HashSet</code> break. In real code you'd usually reach
for a <a><code>record</code></a>, which generates a correct
<code>equals</code>/<code>hashCode</code> for you — but records still need a
hand-written <code>compareTo</code> if you want ordering, and knowing the manual
version explains what the record is doing under the hood.</p>
<p><code>compareTo</code> returns a sign, not a boolean: negative means
<code>this</code> sorts before <code>other</code>, zero means equal ordering,
positive means after — exactly the contract of a Python <code>key</code>-based
sort comparison (or a <code>__lt__</code> implementation). Prefer
<code>Integer.compare</code> / <code>Comparator</code> chains over subtracting,
since subtraction can overflow for large values.</p>`,
