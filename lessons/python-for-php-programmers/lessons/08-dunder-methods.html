const LESSON = {
  number: 8,
  title: "Dunder Methods",

  intro: `
<p>In PHP, if you want a class to print nicely you implement
<code>__toString()</code>; to compare two instances you write an
<code>equals()</code> method and call it by name (or lean on loose/strict
comparison, which only checks that properties match); and operators like
<code>+</code> or <code>&lt;</code> don't mean anything for your own type —
PHP has no operator overloading at all. Python takes a similar "magic method"
idea and runs it much further: the language's built-in syntax and functions
are wired to <em>double-underscore methods</em> — "dunders" — that you implement
on the class. Define <code>__repr__</code> and <code>repr(obj)</code> uses it;
define <code>__eq__</code> and the <code>==</code> operator uses it; define
<code>__add__</code> and the <code>+</code> operator uses it.</p>
<table>
  <tr><th>PHP</th><th>Python</th></tr>
  <tr><td><code>function __construct($x) { … }</code></td><td><code>def __init__(self, x):</code></td></tr>
  <tr><td><code>function __toString()</code></td><td><code>def __repr__(self):</code></td></tr>
  <tr><td><code>$a == $b</code> (property comparison)</td><td><code>a == b</code> → <code>__eq__</code></td></tr>
  <tr><td><code>count($a)</code> + <code>Countable</code></td><td><code>len(a)</code> → <code>__len__</code></td></tr>
  <tr><td>(no operator overloading)</td><td><code>a + b</code> → <code>__add__</code></td></tr>
</table>
<p>This is why Python feels so uniform: <code>len(x)</code>, <code>x == y</code>,
<code>print(x)</code>, and <code>x + y</code> all work on lists, strings, and
your own classes through the exact same protocol. Implement the right dunders
and your type becomes a first-class citizen of the language.</p>`,

  php: `class Vector {
  public array $components;

  public function __construct(array $components) {
    $this->components = $components;
  }

  public function __toString(): string {
    return "Vector(" . implode(", ", $this->components) . ")";
  }

  public function equals(Vector $other): bool {
    return $this->components === $other->components;
  }

  public function length(): int {
    return count($this->components);
  }

  public function add(Vector $other): Vector {
    $sum = [];
    foreach ($this->components as $i => $c) {
      $sum[] = $c + $other->components[$i];
    }
    return new Vector($sum);
  }
}`,

  task: `
<p>Build a <code>Vector</code> value type whose instances print nicely, compare
by value, report their length, and can be added with <code>+</code>:</p>
<ol>
  <li><code>__init__(self, *components)</code> — accept any number of numbers and
      store them (a tuple is convenient).</li>
  <li><code>__repr__(self)</code> — return a string like
      <code>"Vector(1, 2, 3)"</code>.</li>
  <li><code>__eq__(self, other)</code> — two vectors are equal when their
      components are equal, so <code>Vector(1, 2) == Vector(1, 2)</code>.</li>
  <li><code>__len__(self)</code> — the number of components, so
      <code>len(Vector(1, 2, 3)) == 3</code>.</li>
  <li><code>__add__(self, other)</code> — element-wise addition, so
      <code>Vector(1, 2) + Vector(3, 4) == Vector(4, 6)</code>.</li>
</ol>`,

  starter: `class Vector:
    def __init__(self, *components):
        self.components = ()  # TODO: store the components

    def __repr__(self):
        return ""  # TODO

    def __eq__(self, other):
        return NotImplemented  # TODO

    def __len__(self):
        return 0  # TODO

    def __add__(self, other):
        return NotImplemented  # TODO
`,

  requirements: [
    { pattern: /def\s+__repr__\s*\(/, message: "Define __repr__ so the vector prints nicely" },
    { pattern: /def\s+__eq__\s*\(/, message: "Define __eq__ so vectors compare by value" },
    { pattern: /def\s+__add__\s*\(/, message: "Define __add__ so + works on vectors" },
  ],

  tests: [
    { name: "repr(Vector(1, 2, 3)) is \"Vector(1, 2, 3)\"", code: "    expect_eq(repr(Vector(1, 2, 3)), \"Vector(1, 2, 3)\")" },
    { name: "equal vectors compare equal by value", code: "    expect_true(Vector(1, 2) == Vector(1, 2))" },
    { name: "different vectors are not equal", code: "    expect_true(Vector(1, 2) != Vector(1, 3))" },
    { name: "len() counts the components", code: "    expect_eq(len(Vector(1, 2, 3, 4)), 4)" },
    { name: "empty vector has length 0", code: "    expect_eq(len(Vector()), 0)" },
    { name: "+ adds element-wise", code: "    expect_true(Vector(1, 2) + Vector(3, 4) == Vector(4, 6))" },
    { name: "chained + stays a Vector", code: "    total = Vector(1, 1) + Vector(2, 2) + Vector(3, 3)\n    expect_eq(repr(total), \"Vector(6, 6)\")" },
  ],

  solution: `class Vector:
    def __init__(self, *components):
        self.components = tuple(components)

    def __repr__(self):
        inner = ", ".join(repr(c) for c in self.components)
        return f"Vector({inner})"

    def __eq__(self, other):
        if not isinstance(other, Vector):
            return NotImplemented
        return self.components == other.components

    def __len__(self):
        return len(self.components)

    def __add__(self, other):
        if not isinstance(other, Vector):
            return NotImplemented
        return Vector(*(a + b for a, b in zip(self.components, other.components)))
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Python</th></tr>
  <tr><td>Constructor</td><td><code>__construct(…)</code></td><td><code>__init__(self, …)</code></td></tr>
  <tr><td>Debug string</td><td><code>__toString()</code></td><td><code>__repr__(self)</code></td></tr>
  <tr><td>Value equality</td><td><code>$a == $b</code> (properties)</td><td><code>a == b</code> (<code>__eq__</code>)</td></tr>
  <tr><td>Length / size</td><td><code>count($a)</code> (<code>Countable</code>)</td><td><code>len(a)</code> (<code>__len__</code>)</td></tr>
  <tr><td>Addition</td><td>— (write a method)</td><td><code>a + b</code> (<code>__add__</code>)</td></tr>
</table>
<p>A few things worth knowing. Returning <code>NotImplemented</code> (not the same
as raising <code>NotImplementedError</code>) from <code>__eq__</code> or
<code>__add__</code> tells Python "I don't know how to handle that other type" —
it then tries the other operand's reflected method or, for equality, falls back
to identity. You get <code>!=</code> for free once <code>__eq__</code> is defined;
Python derives <code>__ne__</code> from it automatically.</p>
<p>Two subtleties for later. First, <code>__repr__</code> is aimed at developers
(and used by the REPL and containers); there is also <code>__str__</code> for the
user-facing <code>str(obj)</code>, and if you only define <code>__repr__</code> it
serves as the fallback for both. Second, defining <code>__eq__</code> makes your
class unhashable unless you also define <code>__hash__</code>, so an instance
can't go in a <code>set</code> or be a <code>dict</code> key until you do — often
you'll reach for <code>@dataclass</code> (a later topic) to generate all of these
at once.</p>`,
};
