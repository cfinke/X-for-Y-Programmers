  intro: `
<p>PHP's indexed array is the closest counterpart to Python's <code>list</code>
— an ordered collection you access by position. Under the hood a PHP array is
actually an ordered map (every element has an integer or string key), which is
why a few habits differ once you get past the surface syntax. The literal
syntax is close: square brackets and commas, though PHP requires a
<code>$</code> sigil on the variable name. What is genuinely new here is
<em>negative indexing</em> and <em>slicing</em>, two of the most Pythonic
things you will learn this week — PHP has no built-in negative-index syntax
on arrays (<code>$xs[-1]</code> looks up the key <code>-1</code>, not the last
item, and usually just warns), so both are worth learning as fresh vocabulary.</p>
<table>
  <tr><th>PHP</th><th>Python</th></tr>
  <tr><td><code>$xs = [1, 2, 3];</code></td><td><code>xs = [1, 2, 3]</code></td></tr>
  <tr><td><code>count($xs)</code></td><td><code>len(xs)</code></td></tr>
  <tr><td><code>$xs[count($xs) - 1]</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td><code>$xs[] = 4;</code></td><td><code>xs.append(4)</code></td></tr>
  <tr><td><code>array_slice($xs, 1, 2)</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td><code>in_array(2, $xs)</code></td><td><code>2 in xs</code></td></tr>
</table>
<p>Indexing from the end is built in: <code>xs[-1]</code> is the last element,
<code>xs[-2]</code> the second-to-last. A <em>slice</em> <code>xs[a:b]</code>
returns a new list from index <code>a</code> up to (but not including)
<code>b</code>; either bound may be omitted (<code>xs[:2]</code>,
<code>xs[2:]</code>) and a third value is a step (<code>xs[::-1]</code> reverses).
PHP's closest equivalent, <code>array_slice($xs, $offset, $length)</code>,
takes a <em>length</em> rather than an end index (though it does accept
negative offsets counted from the end). Membership is the <code>in</code>
operator rather than a function call like <code>in_array()</code>, and the
length is the free function <code>len(xs)</code> rather than <code>count()</code>.</p>
<p>Two ways to sort: <code>sorted(xs)</code> returns a new sorted list and leaves
<code>xs</code> alone, while <code>xs.sort()</code> reorders in place and returns
<code>None</code>. PHP's <code>sort($xs)</code> only mutates in place — there is
no built-in non-mutating sort, so getting a sorted copy means copying the array
first (<code>$ys = $xs; sort($ys);</code>). And when you want to transform a
list into another list, reach for a <em>comprehension</em> —
<code>[n * 2 for n in xs]</code> — the Pythonic replacement for PHP's
<code>array_map(fn($n) => $n * 2, $xs)</code>.</p>`,

  php: `$nums = [3, 1, 2];
$nums[] = 4;
$last = $nums[count($nums) - 1];
$firstTwo = array_slice($nums, 0, 2);
$doubled = array_map(fn($n) => $n * 2, $nums);
$asc = $nums;
sort($asc);
$hasThree = in_array(3, $nums);`,

  solution: `def make_range(n):
    return [i for i in range(n)]


def last(xs):
    return xs[-1]


def middle(xs):
    return xs[1:-1]


def with_added(xs, value):
    return xs + [value]


def doubled(xs):
    return [n * 2 for n in xs]


def sorted_desc(xs):
    return sorted(xs, reverse=True)


def contains(xs, value):
    return value in xs
`,

  notes: `
<table>
  <tr><th>Operation</th><th>PHP</th><th>Python</th></tr>
  <tr><td>Length</td><td><code>count($xs)</code></td><td><code>len(xs)</code></td></tr>
  <tr><td>Last element</td><td><code>end($xs)</code> / <code>$xs[count($xs) - 1]</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td>Slice</td><td><code>array_slice($xs, 1, 2)</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td>Reverse copy</td><td><code>array_reverse($xs)</code></td><td><code>xs[::-1]</code></td></tr>
  <tr><td>Append</td><td><code>$xs[] = $v;</code></td><td><code>xs.append(v)</code></td></tr>
  <tr><td>Concat many</td><td><code>array_push($xs, ...$ys);</code></td><td><code>xs.extend(ys)</code></td></tr>
  <tr><td>Insert at i</td><td><code>array_splice($xs, $i, 0, [$v]);</code></td><td><code>xs.insert(i, v)</code></td></tr>
  <tr><td>Remove &amp; return</td><td><code>array_pop($xs)</code></td><td><code>xs.pop()</code> / <code>xs.pop(i)</code></td></tr>
  <tr><td>Map</td><td><code>array_map($f, $xs)</code></td><td><code>[f(x) for x in xs]</code></td></tr>
  <tr><td>Sort (copy)</td><td><code>$ys = $xs; sort($ys);</code></td><td><code>sorted(xs)</code></td></tr>
  <tr><td>Sort (in place)</td><td><code>sort($xs);</code></td><td><code>xs.sort()</code></td></tr>
  <tr><td>Contains</td><td><code>in_array($v, $xs)</code></td><td><code>v in xs</code></td></tr>
</table>
<p>Coming from PHP, the single biggest mental shift is <strong>copy vs.
reference</strong>. PHP arrays have value (copy-on-write) semantics —
<code>$ys = $xs;</code> copies the whole array, and mutating <code>$ys</code>
afterward leaves <code>$xs</code> untouched. Python lists have reference
semantics — <code>ys = xs</code> just gives you a second name for the
<em>same</em> list, so mutating <code>ys</code> (e.g. <code>ys.append(v)</code>)
mutates <code>xs</code> too. That is why <code>with_added</code> above builds a
new list with <code>xs + [value]</code> rather than appending: in Python you
have to explicitly build a new object (a slice, a concatenation, or a
comprehension) to get a copy, instead of getting one for free from assignment
the way you would in PHP.</p>
<p>The in-place methods (<code>xs.sort()</code>, <code>xs.append(v)</code>,
<code>xs.insert(i, v)</code>, <code>xs.pop()</code>) mutate <code>xs</code> and
return <code>None</code> (except <code>pop</code>, which returns the removed
item), so <code>ys = xs.sort()</code> is a classic beginner bug — it binds
<code>ys</code> to <code>None</code>, not a sorted list.</p>
<p>List comprehensions read left-to-right as "collect <em>expression</em> for each
<em>item</em>," and can filter with a trailing <code>if</code>:
<code>[n for n in xs if n &gt; 0]</code>. They are the first Pythonic idiom worth
building a reflex for — most <code>array_map</code>/<code>array_filter</code>
chains you would write in PHP become a single comprehension here.</p>`,
