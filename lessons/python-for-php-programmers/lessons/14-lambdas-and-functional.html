  intro: `
<p>In PHP you reach for arrow functions constantly — <code>array_map(fn($x) =&gt; $x * 2, $arr)</code>,
<code>array_filter($arr, fn($x) =&gt; $x &gt; 0)</code>, <code>usort($arr, fn($a, $b) =&gt; $a - $b)</code>. Python
has the same building blocks, but they live as <em>standalone</em> functions
(<code>map</code>, <code>filter</code>, <code>sorted</code>) that take a callable as
an argument, in the same argument order as PHP's <code>array_map</code>/<code>array_filter</code> —
just without the <code>array_</code> prefix and without needing the subject array threaded through
every call.</p>
<p>Python's arrow function is the <code>lambda</code>: a single expression, no braces, no
<code>return</code>. <code>lambda x: x * 2</code> is exactly <code>fn($x) =&gt; $x * 2</code>.
A lambda's body must be one expression whose value is returned automatically — there's no
<code>use (&amp;$var)</code> capture-by-reference clause to worry about; Python closures just
capture by reference automatically.</p>
<table>
  <tr><th>PHP</th><th>Python</th></tr>
  <tr><td><code>fn($x) =&gt; $x * 2</code></td><td><code>lambda x: x * 2</code></td></tr>
  <tr><td><code>array_map($f, $xs)</code></td><td><code>map(f, xs)</code> &rarr; wrap in <code>list(...)</code></td></tr>
  <tr><td><code>array_filter($xs, $f)</code></td><td><code>filter(f, xs)</code> &rarr; wrap in <code>list(...)</code></td></tr>
  <tr><td><code>usort($xs, fn($a,$b)=&gt;$a-$b)</code></td><td><code>sorted(xs, key=...)</code></td></tr>
  <tr><td><code>array_reduce($xs, $f, $init)</code></td><td><code>reduce(f, xs, init)</code></td></tr>
</table>
<p>Two key differences. First, <code>map</code> and <code>filter</code> return lazy
iterators, not lists — you usually wrap them in <code>list(...)</code> to see the
results, whereas <code>array_map</code>/<code>array_filter</code> always return a
concrete array. Second, <code>sorted</code> does not take a comparator like
<code>usort</code>; it takes a <code>key=</code> function that maps each element to
the value you want to sort <em>by</em>. Often a comprehension reads better than
<code>map</code>/<code>filter</code> — prefer <code>[x * 2 for x in xs]</code> over
<code>list(map(lambda x: x * 2, xs))</code>. Reserve the functional tools for when
you already have a named function to pass, or for <code>sorted(key=...)</code> and
<code>reduce</code>, where they shine.</p>`,

$byLen = ["bb", "a", "ccc"];
usort($byLen, fn($a, $b) => strlen($a) - strlen($b));
$total = array_reduce($nums, fn($acc, $x) => $acc + $x, 0);

function applyTwice(callable $f, int $x): int {

}`,

  solution: `from functools import reduce


def double_all(nums):
    return list(map(lambda x: x * 2, nums))


def keep_evens(nums):
    return list(filter(lambda x: x % 2 == 0, nums))


def by_length(words):
    return sorted(words, key=len)


def total(nums):
    return reduce(lambda acc, x: acc + x, nums, 0)


def apply_twice(f, x):
    return f(f(x))
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Python</th></tr>
  <tr><td>Arrow / lambda</td><td><code>fn($x) =&gt; $x + 1</code></td><td><code>lambda x: x + 1</code></td></tr>
  <tr><td>Map</td><td><code>array_map($f, $xs)</code></td><td><code>list(map(f, xs))</code></td></tr>
  <tr><td>Filter</td><td><code>array_filter($xs, $f)</code></td><td><code>list(filter(f, xs))</code></td></tr>
  <tr><td>Sort by key</td><td><code>usort($xs, fn($a,$b)=&gt;$a-$b)</code></td><td><code>sorted(xs, key=...)</code></td></tr>
  <tr><td>Reduce</td><td><code>array_reduce($xs, $f, 0)</code></td><td><code>reduce(f, xs, 0)</code></td></tr>
  <tr><td>Reverse sort</td><td><code>usort(...); array_reverse(...)</code></td><td><code>sorted(xs, key=..., reverse=True)</code></td></tr>
</table>
<p>A <code>lambda</code> is limited to a single expression — no statements, no
multi-line bodies, much like PHP's arrow functions (<code>fn</code>) but even more
restrictive than PHP's full <code>function() {...}</code> closures. If you need
branches or locals, use <code>def</code> and pass the function by name; Python
functions are first-class objects just like closures in PHP. For summing
specifically, prefer the built-in <code>sum(nums)</code> over <code>reduce</code> —
<code>reduce</code> earns its keep for folds that aren't already built in (running
products, flattening, custom accumulation), the same niche <code>array_reduce</code>
fills in PHP.</p>
<p>When choosing between <code>map</code>/<code>filter</code> and a comprehension,
lean Pythonic: <code>[x * 2 for x in xs if x &gt; 0]</code> replaces a nested
<code>array_map</code>+<code>array_filter</code> and reads top-to-bottom. Reach for
<code>map</code>/<code>filter</code> when you already have a named callable to pass
(e.g. <code>map(str, xs)</code>), and remember that both return lazy iterators —
unlike PHP's eager <code>array_map</code>/<code>array_filter</code>, they compute
nothing until you iterate or wrap them in <code>list(...)</code>.</p>`,
