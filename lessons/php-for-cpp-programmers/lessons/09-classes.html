  title: "Classes & Objects",

  intro: `
<p>A PHP class is your C++ class with the ceremony deleted: no header/implementation
split (one definition, methods inline), no destructors to write (garbage
collection — no delete, no leaks to chase), and therefore no rule of three,
five, or zero. The constructor is always named <code>__construct</code>, and
every member access — property or method, inside or outside the class — uses
<code>-&gt;</code>: <code>$this-&gt;balance</code>,
<code>$account-&gt;deposit(50)</code>.</p>
<table>
  <tr><th>C++</th><th>PHP</th></tr>
  <tr><td><code>BankAccount(std::string o, int b = 0) : owner_(std::move(o)), balance_(b) {}</code></td><td><code>function __construct(private string $owner, private int $balance = 0) {}</code></td></tr>
  <tr><td><code>obj.method()</code> / <code>ptr-&gt;method()</code></td><td><code>$obj-&gt;method()</code> (always <code>-&gt;</code>)</td></tr>
  <tr><td><code>this-&gt;x</code></td><td><code>$this-&gt;x</code></td></tr>
  <tr><td><code>~BankAccount()</code>, copy/move ctors</td><td>none — GC, and objects are handles anyway</td></tr>
</table>
<p>The one semantic shift to internalize: PHP object variables are
<em>handles</em>. Every object lives behind the equivalent of a
<code>shared_ptr</code> — assignment and parameter passing copy the handle,
never the object. There are no stack objects, no value semantics to opt into,
and consequently no slicing. PHP 8's <em>promoted properties</em> collapse
your member-initializer list and the member declarations into one place:
writing <code>private int $balance = 0</code> in the constructor's parameter
list declares the member, accepts the argument, and initializes it, all at
once.</p>`,

  cpp: `// bank_account.h + bank_account.cpp, collapsed into one file
#include <string>

class BankAccount {
    std::string owner_;
    int balance_;
public:
    BankAccount(std::string owner, int balance = 0)
        : owner_(std::move(owner)), balance_(balance) {}
    // No ~BankAccount, no copy/move quintet: rule of zero.

    const std::string& owner() const { return owner_; }
    void deposit(int amount) { balance_ += amount; }
    bool withdraw(int amount) {
        if (amount > balance_) return false;
        balance_ -= amount;
        return true;
    }
    int balance() const { return balance_; }
};`,

  solution: `<?php

class BankAccount {
    public function __construct(
        private string $owner,
        private int $balance = 0,
    ) {}

    public function owner(): string {
        return $this->owner;
    }

    public function deposit(int $amount): void {
        $this->balance += $amount;
    }

    public function withdraw(int $amount): bool {
        if ($amount > $this->balance) {
            return false;
        }
        $this->balance -= $amount;
        return true;
    }

    public function balance(): int {
        return $this->balance;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>PHP</th></tr>
  <tr><td>Constructor</td><td><code>ClassName(...)</code> + init list</td><td><code>__construct(...)</code>, promoted params</td></tr>
  <tr><td>Member access</td><td><code>.</code> or <code>-&gt;</code> by storage</td><td><code>-&gt;</code> always (objects are handles)</td></tr>
  <tr><td>Self reference</td><td><code>this</code> (a pointer)</td><td><code>$this</code></td></tr>
  <tr><td>Object lifetime</td><td>RAII, destructors, rule of five</td><td>GC; <code>__destruct</code> exists but is rarely written</td></tr>
  <tr><td>Copy semantics</td><td>value by default, deep copies</td><td>handle copy by default; <code>clone $obj</code> for a shallow copy</td></tr>
  <tr><td>Instantiation</td><td><code>BankAccount a{"Ada"};</code> / <code>make_shared</code></td><td><code>$a = new BankAccount("Ada");</code></td></tr>
</table>
<p>Because every object variable behaves like a <code>shared_ptr</code>,
passing an account into a function and mutating it mutates the caller's
account too — there is no pass-by-value escape hatch, and <code>===</code> on
objects means "same instance" (handle identity), while <code>==</code> means
field-by-field equality. When you genuinely want an independent copy, say so
explicitly with <code>clone</code>. Everything else about class design —
private state, small public API, invariants enforced in methods — transfers
from C++ unchanged.</p>`,
