  number: 15,
  title: "Closures & Callables",

  intro: `
<p>You already think in capture lists — PHP just spells them with a keyword.
A C++ lambda <code>[x](int a) { ... }</code> becomes
<code>function (int $a) use ($x) { ... }</code>: the <code>use (...)</code>
clause is the capture list, by value, one explicit variable at a time.
Capture by reference is <code>use (&amp;$x)</code>, the moral twin of
<code>[&amp;x]</code> — with one enormous difference: it's <em>safe</em>. The
closure keeps the captured variable alive via the garbage collector, so the
classic C++ bug of a lambda outliving its stack frame and dangling simply
cannot happen. A returned closure that captured by reference keeps working.</p>
<table>
  <tr><th>C++17</th><th>PHP</th></tr>
  <tr><td><code>[x](int a) { return a * x; }</code></td><td><code>function (int $a) use ($x) { return $a * $x; }</code></td></tr>
  <tr><td><code>[&amp;x]() { ++x; }</code></td><td><code>function () use (&amp;$x) { ++$x; }</code> — no dangling, GC-kept</td></tr>
  <tr><td><code>[=](int a) { return a * x; }</code></td><td><code>fn(int $a) =&gt; $a * $x</code> — arrow fns auto-capture by value</td></tr>
  <tr><td><code>mutable</code> to mutate a by-value capture</td><td>unneeded — capture by reference instead</td></tr>
  <tr><td><code>std::function&lt;int(int)&gt;</code></td><td><code>callable</code> / <code>Closure</code> — no signature template</td></tr>
</table>
<p>The short form, <code>fn(int $a) =&gt; expr</code>, is a single-expression
arrow function that captures every outer variable it mentions automatically,
by value — PHP's only <code>[=]</code>; long-form closures never capture
implicitly. For types, <code>callable</code> accepts anything invokable
(closures, <code>'strlen'</code>, <code>[$obj, 'method']</code>) while
<code>Closure</code> is the concrete class — either way there's no
<code>std::function&lt;int(int)&gt;</code> signature ceremony, and no
type-erasure allocation to fret about.</p>`,

  cpp: `#include <functional>

std::function<int(int)> make_multiplier(int n) {
    return [n](int x) { return x * n; };   // capture by value
}

int apply_twice(const std::function<int(int)>& f, int x) {
    return f(f(x));
}

std::function<int()> make_counter() {
    int count = 0;
    // mutable, so the by-value copy can change; capturing
    // [&count] here would dangle after return!
    return [count]() mutable { return ++count; };
}`,

  task: `
<p>Port all three factories:</p>
<ol>
  <li><code>make_multiplier(int $n): Closure</code> — return
      <code>fn(int $x) =&gt; $x * $n</code>. The arrow function grabs
      <code>$n</code> by value on its own, like <code>[=]</code>.</li>
  <li><code>apply_twice(callable $f, int $x): int</code> — call <code>$f</code>
      on <code>$x</code>, then on the result. A parameter typed
      <code>callable</code> is invoked directly: <code>$f($x)</code>.</li>
  <li><code>make_counter(): Closure</code> — declare a local
      <code>$count = 0;</code> and return a long-form
      <code>function () use (&amp;$count)</code> that increments and returns
      it: <code>1, 2, 3, ...</code> This is the <code>mutable</code>-lambda
      counter without <code>mutable</code> — and unlike a C++
      <code>[&amp;count]</code>, returning it is safe: the closure keeps
      <code>$count</code> alive.</li>
</ol>`,

  starter: `<?php

// 1. One expression: fn(int $x) => $x * $n  (auto-captures $n by value).

}

// 2. $f is callable — invoke it like any function: $f($x).

    throw new Exception("TODO: implement apply_twice");
}

// 3. $count = 0; then return function () use (&$count) { ... };
//    By reference, so the state survives — and can't dangle.
function make_counter(): Closure {
    throw new Exception("TODO: implement make_counter");
}
`,

  requirements: [
    { pattern: /use\s*\(\s*&/, message: "Capture by reference with use (&$count) in make_counter" },
    { pattern: /fn\s*\(/, message: "Use an arrow function fn(...) => ... in make_multiplier" },
    { pattern: /callable|Closure/, message: "Type the function values with callable or Closure" },
  ],

  tests: [
    { name: "make_multiplier(2) returns a closure: (2)(21) is 42",
      code: "$double = make_multiplier(2);\nexpect_eq($double(21), 42);\nexpect_true($double instanceof Closure);" },
    { name: "each multiplier keeps its own captured $n",
      code: "$double = make_multiplier(2);\n$triple = make_multiplier(3);\nexpect_eq($double(10), 20);\nexpect_eq($triple(10), 30);" },
    { name: "apply_twice(fn(int \$x) => \$x + 3, 10) returns 16",
      code: "expect_eq(apply_twice(fn(int $x) => $x + 3, 10), 16);" },
    { name: "apply_twice composes with a made multiplier",
      code: "expect_eq(apply_twice(make_multiplier(2), 5), 20);" },
    { name: "make_counter() counts 1, 2, 3 across calls",
      code: "$next = make_counter();\nexpect_eq($next(), 1);\nexpect_eq($next(), 2);\nexpect_eq($next(), 3);" },
    { name: "two counters hold independent state",
      code: "$a = make_counter();\n$b = make_counter();\n$a();\n$a();\nexpect_eq($b(), 1);\nexpect_eq($a(), 3);" },
  ],

  solution: `<?php

function make_multiplier(int $n): Closure {
    return fn(int $x) => $x * $n;
}

function apply_twice(callable $f, int $x): int {
    return $f($f($x));
}

function make_counter(): Closure {
    $count = 0;
    return function () use (&$count): int {
        return ++$count;
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17</th><th>PHP</th></tr>
  <tr><td>Lambda, capture by value</td><td><code>[x](int a) { ... }</code></td><td><code>function (int $a) use ($x) { ... }</code></td></tr>
  <tr><td>Capture by reference</td><td><code>[&amp;x]</code> — dangles if it outlives x</td><td><code>use (&amp;$x)</code> — GC keeps $x alive, always safe</td></tr>
  <tr><td>Capture everything by value</td><td><code>[=]</code></td><td>only <code>fn($a) =&gt; expr</code> arrow functions</td></tr>
  <tr><td>Mutate captured state</td><td><code>[x]() mutable</code> or <code>[&amp;x]</code></td><td><code>use (&amp;$x)</code> — no <code>mutable</code> keyword</td></tr>
  <tr><td>Function-value type</td><td><code>std::function&lt;int(int)&gt;</code></td><td><code>callable</code> (anything invokable) / <code>Closure</code> (the class)</td></tr>
  <tr><td>Function pointer</td><td><code>&amp;strlen</code></td><td><code>'strlen'</code> or first-class <code>strlen(...)</code></td></tr>
  <tr><td>Member call as value</td><td><code>std::bind</code> / lambda wrapper</td><td><code>[$obj, 'method']</code> or <code>$obj-&gt;method(...)</code></td></tr>
</table>
<p>The insight: PHP closures are C++ lambdas with the lifetime problem
deleted. In C++, choosing <code>[&amp;]</code> versus <code>[=]</code> is a
lifetime decision — capture wrong and you dangle. In PHP it's purely a
<em>semantics</em> decision: do you want the closure to see a snapshot
(<code>use ($x)</code>) or share the live variable (<code>use (&amp;$x)</code>)?
The garbage collector guarantees either choice outlives whatever scope created
it, which is exactly what makes the closure-returning factories in this lesson
idiomatic PHP rather than a code review incident.</p>`,
};
