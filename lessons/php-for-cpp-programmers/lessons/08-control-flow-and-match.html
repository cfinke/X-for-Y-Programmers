const LESSON = {
  number: 8,
  title: "Control Flow & match",

  intro: `
<p>PHP's <code>if</code> is your <code>if</code> (the chained keyword is
spelled <code>elseif</code>, one word). Its <code>switch</code>, though, is a
C++ <code>switch</code> with two extra hazards: it compares cases with the
juggling <code>==</code> from last lesson, <em>and</em> it falls through
without <code>break</code> — so it inherits the bug you already know and adds
one you can't fix with a compiler warning. Modern PHP code mostly avoids it.</p>
<table>
  <tr><th>C++</th><th>PHP</th></tr>
  <tr><td><code>else if</code></td><td><code>elseif</code> (one word)</td></tr>
  <tr><td><code>switch</code> — strict, falls through, statements only</td><td><code>switch</code> — <em>loose</em> <code>==</code>, falls through: avoid</td></tr>
  <tr><td>no direct equivalent</td><td><code>match</code> (PHP 8) — strict <code>===</code>, no fallthrough, an <em>expression</em></td></tr>
  <tr><td><code>default:</code> optional, silent miss</td><td>no arm matched → throws <code>UnhandledMatchError</code></td></tr>
</table>
<p><code>match</code> (PHP 8) is what <code>switch</code> should have been:
each arm is <code>value =&gt; result</code>, comparison is strict
<code>===</code>, there is no fallthrough (arms that share a result are
grouped with commas), and the whole thing is an <em>expression</em> that
returns a value — <code>$x = match (...) { ... };</code>. Miss every arm with
no <code>default</code> and it throws <code>UnhandledMatchError</code>: an
exhaustiveness check, enforced at runtime rather than compile time. One idiom
to learn: <code>match (true)</code> compares each arm's <em>condition</em>
against <code>true</code>, turning match into a strict, value-returning
if/elseif ladder — perfect for range dispatch.</p>`,

  cpp: `#include <string>

std::string grade(int score) {
    if (score >= 90) return "A";       // switch can't do ranges,
    else if (score >= 80) return "B";  // so C++ falls back to an
    else if (score >= 70) return "C";  // if / else if ladder
    else if (score >= 60) return "D";
    return "F";
}

std::string day_type(const std::string& day) {
    // switch can't take std::string either; and an int switch
    // silently falls through without break. PHP's match fixes
    // the type limit, the fallthrough, and the statement-ness.
    if (day == "Sat" || day == "Sun") return "Weekend";
    if (day == "Mon" || day == "Tue" || day == "Wed" ||
        day == "Thu" || day == "Fri") return "Weekday";
    return "Unknown";
}`,

  task: `
<p>Rewrite both functions as single <code>return match ...</code>
expressions:</p>
<ol>
  <li><code>grade(int $score): string</code> — use <code>match (true)</code>
      with range arms (<code>$score &gt;= 90 =&gt; "A"</code>, then 80/70/60)
      and a <code>default =&gt; "F"</code>. The first arm whose condition is
      <code>true</code> (strictly) wins.</li>
  <li><code>day_type(string $day): string</code> — use a plain
      <code>match ($day)</code> with <em>grouped</em> arms:
      <code>"Sat", "Sun" =&gt; "Weekend"</code>, the five weekdays on one arm,
      and <code>default =&gt; "Unknown"</code>. Grouping with commas is how
      match expresses intentional case-sharing — there is no fallthrough to
      exploit.</li>
</ol>`,

  starter: `<?php

// 1. match (true) turns the if/elseif ladder into one expression:
//    each arm is condition => result, first strict-true arm wins.
function grade(int $score): string {
    throw new Exception("TODO: implement grade with match (true)");
}

// 2. Plain match on the value; group cases with commas, no break,
//    no fallthrough, and a default arm instead of a silent miss.
function day_type(string $day): string {
    throw new Exception("TODO: implement day_type with match");
}
`,

  requirements: [
    { pattern: /match\s*\(/, message: "Use a match expression" },
    { pattern: /match\s*\(\s*true\s*\)/, message: "Use the match (true) idiom for the score ranges" },
    { pattern: /default\s*=>/, message: "Give each match a default => arm" },
  ],

  tests: [
    { name: 'grade: 95 => "A", 85 => "B", 72 => "C"',
      code: 'expect_eq(grade(95), "A");\nexpect_eq(grade(85), "B");\nexpect_eq(grade(72), "C");' },
    { name: 'grade boundaries: 90 => "A", 60 => "D", 59 => "F"',
      code: 'expect_eq(grade(90), "A");\nexpect_eq(grade(60), "D");\nexpect_eq(grade(59), "F");' },
    { name: 'day_type: weekend days',
      code: 'expect_eq(day_type("Sat"), "Weekend");\nexpect_eq(day_type("Sun"), "Weekend");' },
    { name: 'day_type: weekdays',
      code: 'expect_eq(day_type("Mon"), "Weekday");\nexpect_eq(day_type("Wed"), "Weekday");\nexpect_eq(day_type("Fri"), "Weekday");' },
    { name: 'day_type: anything else hits the default arm',
      code: 'expect_eq(day_type("Caturday"), "Unknown");' },
  ],

  solution: `<?php

function grade(int $score): string {
    return match (true) {
        $score >= 90 => "A",
        $score >= 80 => "B",
        $score >= 70 => "C",
        $score >= 60 => "D",
        default => "F",
    };
}

function day_type(string $day): string {
    return match ($day) {
        "Sat", "Sun" => "Weekend",
        "Mon", "Tue", "Wed", "Thu", "Fri" => "Weekday",
        default => "Unknown",
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>PHP</th></tr>
  <tr><td>Chained if</td><td><code>else if</code></td><td><code>elseif</code></td></tr>
  <tr><td>switch comparison</td><td>strict, integral/enum types</td><td>loose <code>==</code> — a juggling trap</td></tr>
  <tr><td>Fallthrough</td><td>yes, unless <code>break</code>/<code>[[fallthrough]]</code></td><td><code>switch</code> yes; <code>match</code> never</td></tr>
  <tr><td>Value-producing branch</td><td>ternary chains / IIFE tricks</td><td><code>$x = match (...) {...};</code></td></tr>
  <tr><td>Shared cases</td><td>stacked <code>case</code> labels</td><td><code>"a", "b" =&gt; result</code></td></tr>
  <tr><td>Unhandled value</td><td>silent (maybe <code>-Wswitch</code>)</td><td>throws <code>UnhandledMatchError</code></td></tr>
</table>
<p>Think of <code>match</code> as the expression-oriented, strictly-compared
successor that C++ programmers keep wishing <code>switch</code> were.
The <code>match (true)</code> idiom is worth committing to memory: because
arms are compared with <code>===</code> against the subject, making the
subject <code>true</code> lets each arm be an arbitrary boolean condition —
range checks, compound predicates — while keeping the no-fallthrough,
must-match, returns-a-value guarantees. When a value can legitimately miss,
add <code>default</code>; when it can't, omit it and let
<code>UnhandledMatchError</code> be your assertion.</p>`,
};
