const LESSON = {
  number: 3,
  title: "Arrays as Lists",

  intro: `
<p>Where you reached for <code>std::vector&lt;int&gt;</code>, PHP has the
<code>array</code>: <code>$scores = [90, 85, 77];</code>. No element type
(it can hold anything, though disciplined code keeps it homogeneous), no
template argument, and no capacity management — there is no
<code>reserve()</code>, no <code>capacity()</code>, no iterator
invalidation, because there are no iterators to invalidate. Append with the
empty-bracket idiom <code>$arr[] = $x;</code> (that's
<code>push_back</code>), count with <code>count($arr)</code>, and test
membership with <code>in_array($x, $arr, true)</code> — the <code>true</code>
asks for strict <code>===</code> comparison, and you should always pass
it.</p>
<table>
  <tr><th>C++17</th><th>PHP</th></tr>
  <tr><td><code>std::vector&lt;int&gt; v = {1, 2, 3};</code></td><td><code>$v = [1, 2, 3];</code></td></tr>
  <tr><td><code>v.push_back(x);</code></td><td><code>$v[] = $x;</code></td></tr>
  <tr><td><code>v.size()</code></td><td><code>count($v)</code></td></tr>
  <tr><td><code>std::find(begin, end, x) != end</code></td><td><code>in_array($x, $v, true)</code></td></tr>
  <tr><td><code>std::accumulate(begin, end, 0)</code></td><td><code>array_sum($v)</code></td></tr>
  <tr><td>take by value → caller's copy untouched</td><td>same — arrays have value semantics</td></tr>
</table>
<p>The part that surprises people coming from every <em>other</em> scripting
language — but not you — is that PHP arrays have <strong>value
semantics</strong>. Assigning or passing an array copies it, exactly like a
<code>std::vector</code> passed by value. The implementation is
copy-on-write: the "copy" shares storage until one side writes, so it's a
cheap refcount bump until mutation actually happens — like a COW
<code>std::vector</code> you never had to write. Mutating a parameter inside
a function therefore never touches the caller's array; you return the
modified copy instead.</p>`,

  cpp: `#include <numeric>
#include <vector>

std::vector<int> make_scores() {
    return {90, 85, 77};
}

// By value on purpose: we mutate our copy and hand it back.
std::vector<int> append(std::vector<int> v, int x) {
    v.push_back(x);
    return v;
}

int total(const std::vector<int>& nums) {
    return std::accumulate(nums.begin(), nums.end(), 0);
}

int main() {
    auto scores = append(make_scores(), 100);
    int sum = total(scores);
}`,

  task: `
<p>Port the vector code to PHP arrays:</p>
<ol>
  <li><code>make_scores(): array</code> — return the literal list
      <code>[90, 85, 77]</code>. Note the return type is just
      <code>array</code>: no element type, no angle brackets.</li>
  <li><code>append(array $arr, int $x): array</code> — push <code>$x</code>
      with the <code>$arr[] = $x;</code> idiom and return the result.
      <code>$arr</code> arrived by value (copy-on-write), so this is the
      C++ take-by-value-and-return pattern: the caller's array is never
      touched.</li>
  <li><code>total(array $nums): int</code> — the whole
      <code>std::accumulate</code> call is one word:
      <code>array_sum($nums)</code>.</li>
</ol>`,

  starter: `<?php

  requirements: [
    { pattern: /\[\]\s*=/, message: "Append with the $arr[] = $x idiom (PHP's push_back)" },
    { pattern: /count\(|array_sum\(/, message: "Use the array toolbox (array_sum / count) instead of a manual loop" },
    { pattern: /:\s*array/, message: "Declare : array return types on the functions that return arrays" },
  ],

  tests: [
    { name: "make_scores() returns [90, 85, 77]",
      code: "expect_eq(make_scores(), [90, 85, 77]);" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "expect_eq(append([1, 2], 3), [1, 2, 3]);" },
    { name: "append leaves the caller's array untouched (value semantics)",
      code: "$orig = [1, 2];\nappend($orig, 3);\nexpect_eq($orig, [1, 2]);" },
    { name: "total([90, 85, 77]) returns 252",
      code: "expect_eq(total([90, 85, 77]), 252);" },
    { name: "total([]) returns 0",
      code: "expect_eq(total([]), 0);" },
  ],

  solution: `<?php

function make_scores(): array {
    return [90, 85, 77];
}

function append(array $arr, int $x): array {
    $arr[] = $x;
    return $arr;
}

function total(array $nums): int {
    return array_sum($nums);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17</th><th>PHP</th></tr>
  <tr><td>List literal</td><td><code>std::vector&lt;int&gt; v = {1, 2, 3};</code></td><td><code>$v = [1, 2, 3];</code></td></tr>
  <tr><td>Append</td><td><code>v.push_back(x);</code></td><td><code>$v[] = $x;</code></td></tr>
  <tr><td>Length</td><td><code>v.size()</code></td><td><code>count($v)</code></td></tr>
  <tr><td>Membership</td><td><code>std::find(...) != end</code></td><td><code>in_array($x, $v, true)</code> — always pass <code>true</code></td></tr>
  <tr><td>Sum</td><td><code>std::accumulate(begin, end, 0)</code></td><td><code>array_sum($v)</code></td></tr>
  <tr><td>Copying</td><td><code>auto b = a;</code> copies eagerly</td><td><code>$b = $a;</code> copies lazily (copy-on-write)</td></tr>
  <tr><td>Capacity</td><td><code>reserve</code>/<code>capacity</code>/<code>shrink_to_fit</code></td><td>none — the engine manages storage</td></tr>
  <tr><td>Iterators</td><td><code>begin()</code>/<code>end()</code>, invalidation rules</td><td>none — <code>foreach</code> (next lesson) walks elements</td></tr>
</table>
<p>Copy-on-write is the detail worth keeping: <code>$b = $a;</code> and
passing an array to a function are O(1) refcount operations, and the real
copy happens only at the first write to either side. You get
<code>std::vector</code>'s reasoning model — no spooky action at a distance,
what a function does to its parameter stays in the function — without the
eager-deep-copy cost that would make pass-by-value ruinous. (True reference
semantics exist behind an explicit <code>&amp;</code>, but idiomatic PHP
returns new arrays instead.)</p>`,
