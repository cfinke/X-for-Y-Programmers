  number: 18,
  title: "Generators & Iterables",

  intro: `
<p>You know exactly what a lazy sequence costs in C++. Either you hand-write
an iterator class — <code>begin()</code>, <code>end()</code>,
<code>operator*</code>, <code>operator++</code>, <code>operator!=</code>, five
members to say "count by twos" — or you reach for C++20 coroutines and
discover that <code>co_yield</code> only works after someone has written a
<code>generator&lt;T&gt;</code> with its <code>promise_type</code>,
<code>yield_value</code>, and awaiter ceremony (the standard didn't even ship
one until C++23). PHP took the coroutine payoff and deleted the ceremony: put
<code>yield</code> in a function body and that function <em>is</em> a
generator. Calling it runs no code; it returns a <code>Generator</code>
object that produces values on demand, pausing at each <code>yield</code>
exactly like a suspended coroutine frame.</p>
<table>
  <tr><th>C++17 / C++20</th><th>PHP</th></tr>
  <tr><td>iterator class: <code>begin()</code>/<code>end()</code>/<code>operator++</code>/<code>operator*</code></td><td><code>function f(): Generator { yield $x; }</code> — that's the whole thing</td></tr>
  <tr><td><code>co_yield</code> + hand-rolled <code>promise_type</code></td><td><code>yield</code> — the promise machinery is built in</td></tr>
  <tr><td><code>for (int n : evens)</code></td><td><code>foreach ($evens as $n)</code> — drives the generator lazily</td></tr>
  <tr><td><code>std::vector&lt;int&gt;(r.begin(), r.end())</code></td><td><code>iterator_to_array($gen)</code> — materialize when you must</td></tr>
  <tr><td>template param / concept to accept any range</td><td><code>iterable</code> type hint — accepts arrays <em>and</em> generators</td></tr>
</table>
<p>Two things to internalize. First, laziness is real: a generator over two
billion numbers costs nothing until something pulls values out of it, and if
the consumer stops after three, only three are ever computed. Second, the
<code>iterable</code> pseudo-type is your <code>concept</code> here — a
parameter typed <code>iterable</code> takes a plain array or any generator,
so one <code>foreach</code>-based function works over both, no templates
required.</p>`,

  cpp: `// C++17: one lazy sequence, five special members.
class evens_iter {
    int v_;
public:
    explicit evens_iter(int v) : v_(v) {}
    int operator*() const { return v_; }
    evens_iter& operator++() { v_ += 2; return *this; }
    bool operator!=(const evens_iter& end) const { return v_ <= end.v_; }
};

struct evens_up_to {
    int max;
    evens_iter begin() const { return evens_iter(2); }
    evens_iter end() const { return evens_iter(max); }
};

for (int n : evens_up_to{100}) use(n);
// C++20 alternative: co_yield — once you've hand-written
// generator<T>, its promise_type, and the awaiter glue.`,

  task: `
<p>Build the lazy pipeline:</p>
<ol>
  <li><code>evens_up_to(int $max): Generator</code> — <code>yield</code> the
      even numbers 2, 4, 6, … up to and including <code>$max</code>. A plain
      <code>for</code> loop with <code>yield $i;</code> in the body — the
      <code>yield</code> keyword alone turns the function into a
      generator.</li>
  <li><code>squares(array $nums): Generator</code> — <code>foreach</code> over
      <code>$nums</code> and <code>yield $n * $n;</code> for each
      element.</li>
  <li><code>take(iterable $items, int $n): array</code> — consume at most
      <code>$n</code> values: <code>foreach</code> with a counter, append with
      <code>$out[] = ...</code>, and <code>break</code> once you have enough.
      The <code>iterable</code> hint means the same function accepts a plain
      array or a generator — including one over two billion numbers, because
      <code>break</code> stops pulling before they are ever produced.</li>
</ol>`,

  starter: `<?php

// 1. for ($i = 2; $i <= $max; $i += 2) { yield $i; }

    throw new Exception("TODO: implement evens_up_to");
}

// 2. foreach ($nums as $n) { yield $n * $n; }

    throw new Exception("TODO: implement squares");
}

// 3. foreach with a counter; break once $n values are collected.

    throw new Exception("TODO: implement take");
}
`,

  requirements: [
    { pattern: /yield/, message: "Use yield — it is what makes a function a generator" },
    { pattern: /:\s*Generator/, message: "Declare the Generator return type on the generator functions" },
    { pattern: /iterable/, message: "Type take()'s first parameter as iterable so it accepts arrays and generators" },
  ],

  tests: [
    { name: 'evens_up_to(10) yields 2, 4, 6, 8, 10',
      code: `expect_eq(iterator_to_array(evens_up_to(10)), [2, 4, 6, 8, 10]);` },
    { name: 'evens_up_to returns a Generator object, not an array',
      code: `expect_true(evens_up_to(4) instanceof Generator);` },
    { name: 'squares([1, 2, 3]) yields 1, 4, 9',
      code: `expect_eq(iterator_to_array(squares([1, 2, 3])), [1, 4, 9]);` },
    { name: 'take is lazy: 3 evens from a 2-billion range, instantly',
      code: `expect_eq(take(evens_up_to(2000000000), 3), [2, 4, 6]);` },
    { name: 'take accepts a plain array too (iterable)',
      code: `expect_eq(take(["a", "b", "c", "d"], 2), ["a", "b"]);` },
    { name: 'take(gen, 0) consumes nothing',
      code: `expect_eq(take(evens_up_to(100), 0), []);` },
  ],

  solution: `<?php

function evens_up_to(int $max): Generator {
    for ($i = 2; $i <= $max; $i += 2) {
        yield $i;
    }
}

function squares(array $nums): Generator {
    foreach ($nums as $n) {
        yield $n * $n;
    }
}

function take(iterable $items, int $n): array {
    $out = [];
    $taken = 0;
    foreach ($items as $item) {
        if ($taken >= $n) {
            break;
        }
        $out[] = $item;
        $taken++;
    }
    return $out;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17 / C++20</th><th>PHP</th></tr>
  <tr><td>Define a lazy sequence</td><td>iterator class, or <code>co_yield</code> + promise ceremony</td><td><code>function f(): Generator { yield $x; }</code></td></tr>
  <tr><td>Yield a value</td><td><code>co_yield v;</code></td><td><code>yield $v;</code></td></tr>
  <tr><td>Consume</td><td><code>for (auto v : range)</code></td><td><code>foreach ($gen as $v)</code></td></tr>
  <tr><td>Materialize</td><td><code>std::vector(r.begin(), r.end())</code></td><td><code>iterator_to_array($gen)</code></td></tr>
  <tr><td>Accept array or generator</td><td>template / <code>std::ranges::range</code> concept</td><td><code>iterable</code> parameter type</td></tr>
  <tr><td>Yield key and value</td><td>—</td><td><code>yield $key =&gt; $value;</code></td></tr>
  <tr><td>Delegate to another generator</td><td>nested loop, or <code>co_yield</code> per element</td><td><code>yield from $other;</code></td></tr>
  <tr><td>Infinite sequence</td><td><code>std::views::iota(0)</code></td><td><code>while (true) { yield $i++; }</code></td></tr>
</table>
<p>The insight: a generator is a stackless coroutine, and PHP hands you the
whole mechanism for the price of one keyword. Nothing runs when you call the
function — you get a suspended frame; each <code>foreach</code> iteration
resumes it until the next <code>yield</code>. That is why
<code>take(evens_up_to(2000000000), 3)</code> returns instantly: the other
999,999,997 values are never computed. One caveat a C++ mind should note —
generators are single-pass input iterators. Once consumed, they are done;
call the function again for a fresh one, or <code>iterator_to_array</code> it
if you need to traverse twice.</p>`,
};
