  intro: `
<p>Here's the twist: PHP does not have a separate map type. The same
<code>array</code> from last lesson is also your
<code>std::unordered_map&lt;std::string, int&gt;</code> — write
<code>['apples' =&gt; 3, 'pears' =&gt; 5]</code> and you have string keys
pointing at values. A "list" is just the special case where the keys are
<code>0, 1, 2, …</code>. Writing works like <code>operator[]</code>:
<code>$m[$k] = $v;</code> inserts or overwrites. <em>Reading</em> does not:
<code>$m['missing']</code> emits a warning and yields <code>null</code>
instead of silently inserting a default-constructed value. There is no
insert-on-read — the single most infamous <code>operator[]</code> footgun
doesn't exist here.</p>
<table>
  <tr><th>C++17</th><th>PHP</th></tr>
  <tr><td><code>std::unordered_map&lt;std::string, int&gt; m = {{"apples", 3}};</code></td><td><code>$m = ['apples' =&gt; 3];</code></td></tr>
  <tr><td><code>m["pears"] = 5;</code></td><td><code>$m['pears'] = 5;</code></td></tr>
  <tr><td><code>m.count(k) ? m.at(k) : 0</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td><code>m.count(k)</code> / <code>m.contains(k)</code></td><td><code>array_key_exists($k, $m)</code></td></tr>
  <tr><td><code>for (const auto&amp; [k, v] : m)</code></td><td><code>foreach ($m as $k =&gt; $v)</code></td></tr>
  <tr><td>collect keys by hand</td><td><code>array_keys($m)</code></td></tr>
</table>
<p>Lookup-with-default — the <code>.count()</code>-then-<code>.at()</code>
dance, or the <code>find</code>/<code>end</code>/<code>-&gt;second</code>
three-step — collapses into one expression: <code>$m[$k] ?? 0</code>. The
<code>??</code> null-coalescing operator checks existence without warning
and supplies the fallback. Iteration is
<code>foreach ($m as $k =&gt; $v)</code>, structured bindings built into the
loop syntax since long before C++17 had them. And unlike
<code>unordered_map</code>, PHP arrays remember <strong>insertion
order</strong> — iteration is deterministic, in the order you added the
keys.</p>`,

  cpp: `#include <string>
#include <unordered_map>
#include <vector>

std::unordered_map<std::string, int> build_inventory() {
    return {{"apples", 3}, {"pears", 5}};
}

int get_count(const std::unordered_map<std::string, int>& inv,
              const std::string& name) {
    auto it = inv.find(name);          // the find-then-deref dance
    return it == inv.end() ? 0 : it->second;
}

std::unordered_map<std::string, int>
add_stock(std::unordered_map<std::string, int> inv,
          const std::string& name, int n) {
    inv[name] += n;                    // op[] default-constructs 0 first
    return inv;
}

std::vector<std::string> item_names(
        const std::unordered_map<std::string, int>& inv) {
    std::vector<std::string> keys;
    for (const auto& [name, count] : inv) keys.push_back(name);
    return keys;                       // order: whatever the hash felt like
}`,

  solution: `<?php

function build_inventory(): array {
    return ['apples' => 3, 'pears' => 5];
}

function get_count(array $inv, string $name): int {
    return $inv[$name] ?? 0;
}

function add_stock(array $inv, string $name, int $n): array {
    $inv[$name] = ($inv[$name] ?? 0) + $n;
    return $inv;
}

function item_names(array $inv): array {
    return array_keys($inv);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17</th><th>PHP</th></tr>
  <tr><td>Map literal</td><td><code>{{"apples", 3}, {"pears", 5}}</code></td><td><code>['apples' =&gt; 3, 'pears' =&gt; 5]</code></td></tr>
  <tr><td>Insert / overwrite</td><td><code>m[k] = v;</code></td><td><code>$m[$k] = $v;</code></td></tr>
  <tr><td>Read a missing key</td><td><code>m[k]</code> silently inserts a default</td><td><code>$m[$k]</code> warns and yields <code>null</code> — no insert</td></tr>
  <tr><td>Lookup with default</td><td><code>m.count(k) ? m.at(k) : 0</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td>Has key?</td><td><code>m.contains(k)</code> (C++20) / <code>m.count(k)</code></td><td><code>array_key_exists($k, $m)</code></td></tr>
  <tr><td>Iterate</td><td><code>for (const auto&amp; [k, v] : m)</code></td><td><code>foreach ($m as $k =&gt; $v)</code></td></tr>
  <tr><td>All keys</td><td>manual loop</td><td><code>array_keys($m)</code>; values via <code>array_values($m)</code></td></tr>
  <tr><td>Iteration order</td><td>unspecified (hash order)</td><td>insertion order, guaranteed</td></tr>
</table>
<p>One type, two personalities: under the hood every PHP array is an ordered
hash table, and the "list" from lesson 3 is merely the case where keys
happen to be consecutive integers. That's why <code>count</code>,
<code>foreach</code>, and value semantics (copy-on-write included) work
identically on both. The habits to swap: <code>??</code> replaces every
lookup dance you've ever written, and because reading never inserts,
<code>add_stock</code>-style code must handle the missing key explicitly —
which <code>?? 0</code> makes a non-event.</p>`,
