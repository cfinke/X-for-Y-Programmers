  number: 11,
  title: "Enums",

  intro: `
<p>A C++ <code>enum class</code> gives you scoped, strongly-typed names — and
then leaves you on your own. Converting to the underlying value takes a
<code>static_cast</code>, converting <em>back</em> is an unchecked cast that
happily produces an enumerator that doesn't exist, and enumerating the cases
requires an X-macro or a hand-maintained array. PHP 8.1 enums are the same
idea with the batteries included. A <em>backed</em> enum pairs each case with
a string or int: <code>enum OrderStatus: string { case Pending = 'pending'; }</code>.
The backing value is one property read away — <code>$status->value</code>, no
cast — and the reverse direction is a checked constructor:
<code>OrderStatus::from('pending')</code> throws on garbage, while
<code>OrderStatus::tryFrom('garbage')</code> returns <code>null</code> instead
of the undefined behavior a bad <code>static_cast</code> risks.</p>
<table>
  <tr><th>C++17</th><th>PHP 8.1+</th></tr>
  <tr><td><code>enum class OrderStatus { Pending };</code></td><td><code>enum OrderStatus: string { case Pending = 'pending'; }</code></td></tr>
  <tr><td><code>static_cast&lt;int&gt;(s)</code></td><td><code>$s->value</code></td></tr>
  <tr><td><code>static_cast&lt;OrderStatus&gt;(x)</code> — unchecked</td><td><code>OrderStatus::from($x)</code> — throws on bad input</td></tr>
  <tr><td>no checked conversion</td><td><code>OrderStatus::tryFrom($x)</code> — returns <code>null</code></td></tr>
  <tr><td>X-macros / hand-kept array</td><td><code>OrderStatus::cases()</code> — built in</td></tr>
  <tr><td>free functions taking the enum</td><td>methods <em>on</em> the enum are allowed</td></tr>
</table>
<p>Each case is a singleton object, so <code>===</code> compares identity and
always does the right thing, and <code>match($status)</code> switches over
cases exhaustively — an unhandled case throws at runtime instead of falling
off the end of a <code>switch</code>. Enums can even declare methods, so the
<code>to_string</code> free function you'd write in C++ can live right on the
type.</p>`,

  cpp: `#include <optional>
#include <string>

enum class OrderStatus { Pending, Shipped, Delivered };

std::string status_label(OrderStatus s) {
    switch (s) {
        case OrderStatus::Pending:   return "Awaiting shipment";
        case OrderStatus::Shipped:   return "On the way";
        case OrderStatus::Delivered: return "Delivered";
    }
    return "?"; // compilers still want this line
}

std::optional<OrderStatus> parse_status(const std::string& v) {
    if (v == "pending")   return OrderStatus::Pending;
    if (v == "shipped")   return OrderStatus::Shipped;
    if (v == "delivered") return OrderStatus::Delivered;
    return std::nullopt;  // the mapping is maintained by hand
}`,

  task: `

  <li>Write <code>status_label(OrderStatus $status): string</code> using a

</ol>`,

`,

  requirements: [
    { pattern: /enum\s+OrderStatus\s*:\s*string/, message: "Declare enum OrderStatus: string (a string-backed enum)" },
    { pattern: /case\s+\w+\s*=/, message: "Give each case a backing value with case Name = '...'" },
    { pattern: /::tryFrom|::from/, message: "Convert the string back with OrderStatus::tryFrom (or ::from)" },
    { pattern: /match\s*\(/, message: "Use a match(...) expression in status_label" },
  ],

  tests: [
    { name: "OrderStatus::Pending->value is 'pending' (no static_cast)",
      code: "expect_eq(OrderStatus::Pending->value, 'pending');" },
    { name: 'status_label(OrderStatus::Shipped) returns "On the way"',
      code: 'expect_eq(status_label(OrderStatus::Shipped), "On the way");' },
    { name: 'status_label covers Pending and Delivered',
      code: 'expect_eq(status_label(OrderStatus::Pending), "Awaiting shipment");\nexpect_eq(status_label(OrderStatus::Delivered), "Delivered");' },
    { name: "parse_status('delivered') returns the OrderStatus::Delivered case",
      code: "expect_true(parse_status('delivered') === OrderStatus::Delivered);" },
    { name: "parse_status('teleported') returns null, not UB",
      code: "expect_true(parse_status('teleported') === null);" },
    { name: "OrderStatus::cases() enumerates all three cases",
      code: "expect_eq(count(OrderStatus::cases()), 3);\nexpect_true(OrderStatus::cases()[0] === OrderStatus::Pending);" },
  ],

  solution: `<?php

enum OrderStatus: string {
    case Pending = 'pending';
    case Shipped = 'shipped';
    case Delivered = 'delivered';
}

function status_label(OrderStatus $status): string {
    return match ($status) {
        OrderStatus::Pending => "Awaiting shipment",
        OrderStatus::Shipped => "On the way",
        OrderStatus::Delivered => "Delivered",
    };
}

function parse_status(string $value): ?OrderStatus {
    return OrderStatus::tryFrom($value);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++17</th><th>PHP 8.1+</th></tr>
  <tr><td>Scoped enum</td><td><code>enum class Color { Red };</code></td><td><code>enum Color { case Red; }</code> (pure enum)</td></tr>
  <tr><td>Underlying value</td><td><code>enum class S : int</code> + <code>static_cast</code></td><td><code>enum S: string|int</code> + <code>$s->value</code></td></tr>
  <tr><td>Value → enum, checked</td><td>write it yourself</td><td><code>S::from($v)</code> (throws) / <code>S::tryFrom($v)</code> (null)</td></tr>
  <tr><td>List all cases</td><td>X-macros, magic_enum, hand-kept arrays</td><td><code>S::cases()</code></td></tr>
  <tr><td>Switch over cases</td><td><code>switch</code> + <code>break</code> discipline</td><td><code>match($s)</code> — expression, no fall-through</td></tr>
  <tr><td>Attach behavior</td><td>free functions</td><td>methods on the enum, <code>implements</code> allowed</td></tr>
  <tr><td>Compare</td><td><code>==</code> on values</td><td><code>===</code> — each case is a singleton object</td></tr>
</table>
<p>The insight: a PHP enum case is an <em>object</em>, not an integer in a
costume. That's why <code>-&gt;value</code> is a property, why methods can
live on the type, and why identity comparison with <code>===</code> is exact.
The two conversion functions split the error-handling decision C++ leaves
implicit: reach for <code>from</code> when a bad value is a bug (throw),
<code>tryFrom</code> when it's expected input (null) — the invalid-enumerator
state simply cannot be constructed.</p>`,
};
