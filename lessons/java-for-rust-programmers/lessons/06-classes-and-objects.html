  title: "Classes & Objects",

  intro: `
<p>Rust structs already default to private fields, and their behavior lives in
a separate <code>impl</code> block reached through explicit
<code>&amp;self</code>/<code>&amp;mut self</code> receivers — so the shape of a
Java class (fields and methods together in one body, an implicit
<code>this</code>) will look unfamiliar even though the privacy story ends up
similar. Java has no field-init shorthand like <code>Self { owner, .. }</code>,
no struct/impl split, and (importantly) no <code>public</code> on the
top-level class in this course: the harness compiles your file as
<code>prog.java</code>, so a <code>public</code> top-level type would be
rejected. Leave classes <em>package-private</em> (no modifier).</p>
<table>
  <tr><th>Rust</th><th>Java</th></tr>
  <tr><td><code>balance: i32,</code> (private field, in a struct)</td><td><code>private int balance;</code></td></tr>
  <tr><td><code>fn new(o: String) -&gt; Self { Self { owner: o, .. } }</code></td><td><code>BankAccount(String o) { this.owner = o; }</code></td></tr>
  <tr><td><code>fn balance(&amp;self) -&gt; i32 { self.balance }</code></td><td><code>int getBalance() { return balance; }</code></td></tr>
  <tr><td><code>impl std::fmt::Display for C { … }</code></td><td><code>@Override public String toString() { … }</code></td></tr>
  <tr><td>field-init shorthand in <code>Self { … }</code></td><td>always assign fields explicitly</td></tr>
</table>
<p>Two things to internalize. First, encapsulation in Java is enforced by
<code>private</code> plus getter methods — there is no property-access sugar
either way, so <code>getBalance()</code> is a real method call with parens,
much like calling a Rust accessor method such as <code>account.balance()</code>.
Second, <code>toString()</code> is inherited from <code>Object</code> and is
already <code>public</code>, so your override must stay <code>public</code> (you
cannot narrow visibility) and should carry <code>@Override</code> — the rough
analogue of implementing the <code>Display</code> trait, except Java's version
is baked into every class instead of being opt-in.</p>`,

  rust: `struct BankAccount {
    owner: String,
    balance: i32,
}

impl BankAccount {
    fn new(owner: String, initial: i32) -> Self {
        BankAccount { owner, balance: initial }
    }

    fn balance(&self) -> i32 {
        self.balance
    }

    fn deposit(&mut self, amount: i32) {
        self.balance += amount;
    }

    fn withdraw(&mut self, amount: i32) -> bool {
        if amount > self.balance {
            return false;
        }
        self.balance -= amount;
        true
    }
}

impl std::fmt::Display for BankAccount {
    fn fmt(&self, f: &mut std::fmt::Formatter) -> std::fmt::Result {
        write!(f, "{} has \${}", self.owner, self.balance)
    }
}`,

</ol>`,

  solution: `class BankAccount {
  private final String owner;
  private int balance;

  BankAccount(String owner, int initialBalance) {
    this.owner = owner;
    this.balance = initialBalance;
  }

  String getOwner() {
    return owner;
  }

  int getBalance() {
    return balance;
  }

  void deposit(int amount) {
    this.balance += amount;
  }

  boolean withdraw(int amount) {
    if (amount > this.balance) {
      return false;
    }
    this.balance -= amount;
    return true;
  }

  @Override
  public String toString() {
    return owner + " has $" + balance;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Java</th></tr>
  <tr><td>Private field</td><td><code>x: i32,</code> (private by default)</td><td><code>private int x;</code></td></tr>
  <tr><td>Constructor</td><td><code>fn new(x: i32) -&gt; Self { Self { x } }</code></td><td><code>ClassName(int x) {}</code></td></tr>
  <tr><td>Read a field</td><td><code>self.x</code></td><td><code>this.x</code> or just <code>x</code></td></tr>
  <tr><td>Getter</td><td><code>fn x(&amp;self) -&gt; i32</code> (a method call)</td><td><code>int getX()</code> (a method call)</td></tr>
  <tr><td>Stringify</td><td><code>impl std::fmt::Display for C</code></td><td><code>@Override public String toString()</code></td></tr>
  <tr><td>Instantiate</td><td><code>C::new(…)</code></td><td><code>new C(…)</code></td></tr>
</table>
<p>Inside a method, <code>this.</code> is optional when there is no name clash —
<code>balance</code> and <code>this.balance</code> refer to the same field. It
becomes mandatory only to disambiguate a field from a parameter of the same name
(exactly what the constructor does), which is a bit more forgiving than Rust,
where <code>self.balance</code> is always required — there is no bare
<code>balance</code> shorthand for a field access inside a method. Notice
<code>owner</code> is <code>final</code> in the solution: assign it once in the
constructor and it can never change again, similar in spirit to a Rust field
whose value simply never gets reassigned, though Rust tracks mutability on the
<em>binding</em> (<code>let</code> vs <code>let mut</code>, or the receiver
type <code>&amp;self</code> vs <code>&amp;mut self</code>) rather than with a
per-field keyword. And where Rust's privacy is a compile-time-only concept —
checked by <code>rustc</code> and left with zero trace in the compiled binary
— Java's <code>private</code> is enforced by the compiler <em>and</em> the JVM,
persisting into the bytecode as an access flag that only reflection's
<code>setAccessible(true)</code> can override.</p>`,
