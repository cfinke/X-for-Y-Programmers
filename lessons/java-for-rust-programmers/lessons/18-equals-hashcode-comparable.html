  number: 18,
  title: "equals, hashCode & Comparable",

  intro: `
<p>In Rust, <code>==</code> on a struct requires the type to implement
<code>PartialEq</code> — almost always via <code>#[derive(PartialEq)]</code>,
which compares every field automatically. Hashing for <code>HashMap</code>/
<code>HashSet</code> keys needs <code>Hash</code>, usually derived right
alongside it. Ordering for <code>.sort()</code> or a <code>BTreeSet</code> needs
<code>Ord</code> (and its supertrait <code>PartialOrd</code>), which can likewise
be derived field-by-field, or written by hand by returning a
<code>std::cmp::Ordering</code> from <code>cmp</code>. Java bakes the same three
ideas into the object model but without a derive macro: every class inherits
<code>equals(Object)</code> and <code>hashCode()</code> from <code>Object</code>
— by default they mean reference identity — and you <em>override</em> them
yourself to give a class value semantics. For ordering, a class implements
<code>Comparable&lt;T&gt;</code> and defines <code>compareTo</code>, which
<code>Collections.sort</code> and <code>TreeSet</code> use automatically.</p>
<table>
  <tr><th>Rust</th><th>Java</th></tr>
  <tr><td><code>std::ptr::eq(a, b)</code> (identity)</td><td><code>a == b</code> (identity)</td></tr>
  <tr><td><code>#[derive(PartialEq)]</code></td><td>override <code>a.equals(b)</code></td></tr>
  <tr><td><code>#[derive(Hash)]</code>, kept alongside <code>PartialEq</code></td><td>override <code>hashCode()</code> to match <code>equals</code></td></tr>
  <tr><td><code>#[derive(PartialOrd, Ord)]</code> + <code>vec.sort()</code></td><td><code>implements Comparable&lt;T&gt;</code> + <code>compareTo</code></td></tr>
</table>
<p>The load-bearing rule is <strong>the equals/hashCode contract</strong>: if
<code>a.equals(b)</code> is true, then <code>a.hashCode() == b.hashCode()</code>
must also be true. Break it and hash-based collections
(<code>HashMap</code>, <code>HashSet</code>) silently misbehave — a key you
inserted becomes unfindable. Override the two together, always, over the same
fields. <code>Objects.equals</code> and <code>Objects.hash</code> make this a
one-liner each — Rust's derive macros give you that same guarantee for free,
just by listing the fields once in the struct definition.</p>`,

  rust: `#[derive(PartialEq, Hash)]
struct Money {
    cents: i32,
    currency: String,
}

// value equality comes from the derive, not a manual helper
let equal = Money { cents: 500, currency: "USD".into() }
    == Money { cents: 500, currency: "USD".into() };

// sorting is a callback too
let mut wallet: Vec<Money> = vec![];
wallet.sort_by_key(|m| m.cents);`,

  task: `
<p>Build a small value class <code>Money</code> that has both value equality and a
natural ordering.</p>
<ol>
  <li>Give it two fields: <code>int cents</code> and <code>String currency</code>,
      set in the constructor. Make the class <code>implements Comparable&lt;Money&gt;</code>.</li>
  <li>Override <code>equals(Object o)</code> so two <code>Money</code> values are
      equal when both <code>cents</code> and <code>currency</code> match. Use the
      <code>getClass()</code> check and a cast, then compare fields
      (<code>Objects.equals</code> for the String).</li>
  <li>Override <code>hashCode()</code> consistently with
      <code>equals</code> — <code>return Objects.hash(cents, currency);</code></li>
  <li>Implement <code>compareTo(Money other)</code> for natural ordering by
      <code>cents</code> ascending. Use <code>Integer.compare(this.cents, other.cents)</code>
      (never <code>this.cents - other.cents</code>, which can overflow).</li>
</ol>
<p>Once <code>compareTo</code> exists, <code>Collections.sort(list)</code> works
with no comparator argument.</p>`,

`,

  requirements: [
    { pattern: /public\s+boolean\s+equals\s*\(\s*Object/, message: "Override equals(Object o)" },
    { pattern: /public\s+int\s+hashCode\s*\(/, message: "Override hashCode()" },

  tests: [
    { name: "equal values are equal", code: "      expect_true(new Money(500, \"USD\").equals(new Money(500, \"USD\")));" },
    { name: "different cents are not equal", code: "      expect_true(!new Money(500, \"USD\").equals(new Money(750, \"USD\")));" },
    { name: "different currency is not equal", code: "      expect_true(!new Money(500, \"USD\").equals(new Money(500, \"EUR\")));" },
    { name: "hashCode matches for equal values", code: "      expect_eq(new Money(500, \"USD\").hashCode(), new Money(500, \"USD\").hashCode());" },
    { name: "works as a HashSet element", code: "      Set<Money> set = new HashSet<>();\n      set.add(new Money(500, \"USD\"));\n      expect_true(set.contains(new Money(500, \"USD\")));" },
    { name: "compareTo orders by cents", code: "      expect_true(new Money(300, \"USD\").compareTo(new Money(500, \"USD\")) < 0);\n      expect_true(new Money(500, \"USD\").compareTo(new Money(500, \"USD\")) == 0);" },
    { name: "Collections.sort uses natural ordering", code: "      List<Money> list = new ArrayList<>(List.of(new Money(300, \"USD\"), new Money(100, \"USD\"), new Money(200, \"USD\")));\n      Collections.sort(list);\n      expect_eq(list.get(0).cents, 100);\n      expect_eq(list.get(2).cents, 300);" },
  ],

  solution: `class Money implements Comparable<Money> {
  final int cents;
  final String currency;

  Money(int cents, String currency) {
    this.cents = cents;
    this.currency = currency;
  }

  @Override
  public boolean equals(Object o) {
    if (this == o) return true;
    if (o == null || getClass() != o.getClass()) return false;
    Money other = (Money) o;
    return cents == other.cents && Objects.equals(currency, other.currency);
  }

  @Override
  public int hashCode() {
    return Objects.hash(cents, currency);
  }

  @Override
  public int compareTo(Money other) {
    return Integer.compare(this.cents, other.cents);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Java</th></tr>
  <tr><td>Identity check</td><td><code>std::ptr::eq(a, b)</code></td><td><code>a == b</code></td></tr>
  <tr><td>Value equality</td><td><code>#[derive(PartialEq)]</code> (or manual <code>impl PartialEq</code>)</td><td>override <code>equals(Object)</code></td></tr>
  <tr><td>Hashing</td><td><code>#[derive(Hash)]</code></td><td>override <code>hashCode()</code> to match equals</td></tr>
  <tr><td>Combine fields into a hash</td><td>the derive does it structurally</td><td><code>Objects.hash(a, b)</code></td></tr>
  <tr><td>Natural ordering</td><td><code>#[derive(PartialOrd, Ord)]</code> (or manual <code>cmp</code>)</td><td><code>Comparable&lt;T&gt;.compareTo</code></td></tr>
  <tr><td>One-off ordering</td><td><code>sort_by</code> / <code>sort_by_key</code></td><td><code>Comparator</code> passed to sort</td></tr>
</table>
<p>The contract is the whole point: <code>equals</code> and <code>hashCode</code>
travel together and must be computed from the same fields, or
<code>HashMap</code>/<code>HashSet</code> break. Rust sidesteps this for the
common case: <code>#[derive(PartialEq, Eq, Hash)]</code> generates both from the
same field list mechanically, so they can never drift apart. Java has no derive
macro, so in real code you'd usually reach for a <a><code>record</code></a>,
which generates a correct <code>equals</code>/<code>hashCode</code> for you —
but records still need a hand-written <code>compareTo</code> if you want
ordering, and knowing the manual version explains what the record (and the Rust
derive) is doing under the hood.</p>
<p><code>compareTo</code> returns a sign, not a boolean: negative means
<code>this</code> sorts before <code>other</code>, zero means equal ordering,
positive means after — the same three-way contract as Rust's
<code>std::cmp::Ordering</code> (<code>Less</code> / <code>Equal</code> /
<code>Greater</code>) returned by <code>cmp</code>. Prefer
<code>Integer.compare</code> / <code>Comparator</code> chains over subtracting,
since subtraction can overflow for large values — a derived Rust <code>Ord</code>
sidesteps this class of bug entirely by comparing fields directly rather than
subtracting them.</p>`,
};
