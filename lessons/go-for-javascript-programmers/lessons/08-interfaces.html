  number: 8,
  title: "Interfaces",

  intro: `
<p>Go interfaces describe behavior — a set of method signatures. JavaScript has
no interface construct at all: "does this object have an <code>area</code>
method?" is just a question you ask at runtime, usually by calling the method
and letting it throw if it's missing, or by checking
<code>typeof obj.area === "function"</code> first. Go turns that ad-hoc duck
typing into something the compiler checks for you, but the spirit is the
same: no formal relationship needs to be declared between a value and the
interface it satisfies.</p>
<table>
  <tr><th>JavaScript</th><th>Go</th></tr>
  <tr><td>no interface — just "has an <code>area()</code> method"</td><td><code>type Shape interface { Area() float64 }</code></td></tr>
  <tr><td><code>class Rectangle { area() {…} }</code></td><td><code>func (r Rectangle) Area() float64 {…}</code></td></tr>
  <tr><td><code>function total(shapes)</code></td><td><code>func TotalArea(s []Shape)</code></td></tr>
  <tr><td>any value at all (no type checking)</td><td><code>interface{}</code> (the empty interface)</td></tr>
</table>
<p>Because satisfaction is structural, a <code>Rectangle</code> becomes a
<code>Shape</code> the moment it gains an <code>Area()</code> method — no import,
no declaration linking the two. A function that takes a <code>Shape</code>
parameter accepts any such value and calls the method through the interface,
dispatching to the concrete type at runtime. This is exactly the duck typing
JavaScript does naturally, just verified ahead of time. The empty interface
<code>interface{}</code> names <em>zero</em> methods, so <em>every</em> value
satisfies it — it is Go's way of saying "any value," the same as an untyped
JavaScript parameter accepts anything.</p>`,

  javascript: `class Rectangle {
  constructor(width, height) {
    this.width = width;
    this.height = height;
  }
  area() { return this.width * this.height; }
}

function totalArea(shapes) {
  return shapes.reduce((sum, s) => sum + s.area(), 0);
}`,

  task: `
<p>Build a small shape system. Write these package-level declarations (no
<code>package</code>, <code>import</code>, or <code>main</code> — those are added
for you):</p>
<ol>
  <li>An interface <code>Shape</code> with one method <code>Area() float64</code>.</li>
  <li>A struct <code>Rectangle</code> with <code>Width, Height float64</code> and a
      method <code>Area() float64</code> returning <code>Width * Height</code>.</li>
  <li>A struct <code>Triangle</code> with <code>Base, Height float64</code> and a
      method <code>Area() float64</code> returning <code>0.5 * Base * Height</code>.
      (Note: neither type says <code>implements</code> — having the method is enough.)</li>
  <li><code>TotalArea(shapes []Shape) float64</code> that sums <code>Area()</code>
      over every shape, calling it <em>through the interface</em>.</li>
  <li><code>Stringify(v interface{}) string</code> that accepts a value of any type
      and returns <code>fmt.Sprintf("%v", v)</code>.</li>
</ol>`,

  starter: `type Shape interface {
	Area() float64
}

type Rectangle struct {
	Width, Height float64
}

func (r Rectangle) Area() float64 {
	return 0 // TODO
}

type Triangle struct {

}

func (t Triangle) Area() float64 {

`,

  requirements: [
    { pattern: /type\s+Shape\s+interface/, message: "Define an interface type named Shape" },
    { pattern: /\[\]Shape/, message: "TotalArea should take a []Shape parameter and call Area() through the interface" },
    { pattern: /interface\{\}/, message: "Stringify should take an empty interface (interface{}) parameter" },
  ],

  tests: [
    { name: "Rectangle{3,4}.Area() is 12", code: "\t\texpect_eq(Rectangle{Width: 3, Height: 4}.Area(), 12.0)" },
    { name: "Triangle{3,4}.Area() is 6", code: "\t\texpect_eq(Triangle{Base: 3, Height: 4}.Area(), 6.0)" },
    { name: "Area() via a Shape variable", code: "\t\tvar s Shape = Rectangle{Width: 2, Height: 5}\n\t\texpect_eq(s.Area(), 10.0)" },
    { name: "TotalArea sums through the interface", code: "\t\texpect_eq(TotalArea([]Shape{Rectangle{Width: 3, Height: 4}, Triangle{Base: 3, Height: 4}}), 18.0)" },
    { name: "TotalArea of empty slice is 0", code: "\t\texpect_eq(TotalArea([]Shape{}), 0.0)" },
    { name: "Stringify accepts an int", code: "\t\texpect_eq(Stringify(42), \"42\")" },
    { name: "Stringify accepts a bool", code: "\t\texpect_eq(Stringify(true), \"true\")" },
  ],

  solution: `type Shape interface {
	Area() float64
}

type Rectangle struct {
	Width, Height float64
}

func (r Rectangle) Area() float64 {
	return r.Width * r.Height
}

type Triangle struct {
	Base, Height float64
}

func (t Triangle) Area() float64 {
	return 0.5 * t.Base * t.Height
}

func TotalArea(shapes []Shape) float64 {
	total := 0.0
	for _, s := range shapes {
		total += s.Area()
	}
	return total
}

func Stringify(v interface{}) string {
	return fmt.Sprintf("%v", v)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>Go</th></tr>
  <tr><td>Declare interface</td><td>no equivalent — just document the expected methods</td><td><code>type Shape interface { Area() float64 }</code></td></tr>
  <tr><td>Satisfy it</td><td>give the object/class the method</td><td>just define the method — no keyword</td></tr>
  <tr><td>Interface parameter</td><td><code>(s) =&gt; …</code> (untyped, hope it has the method)</td><td><code>func f(s Shape)</code></td></tr>
  <tr><td>Any value</td><td>every parameter, implicitly</td><td><code>interface{}</code> (or <code>any</code> in Go 1.18+)</td></tr>
</table>
<p>Implicit satisfaction is the mental shift for readers coming from typed
languages, but it should feel familiar to a JavaScript programmer: it is duck
typing, just checked by the compiler instead of discovered at the call site
when a method turns out to be missing. Go extends the same idea to method
sets, so a concrete type can satisfy an interface defined in a package it has
never heard of. Interfaces stay small — often one method — and callers depend
on behavior, not on a class hierarchy.</p>
<p>Go 1.18 added <code>any</code> as an alias for <code>interface{}</code>, so
you will see both; they are identical. To recover the concrete value out of an
<code>interface{}</code>, you use a type assertion (<code>v.(int)</code>) or a
type switch — roughly the job a JavaScript <code>typeof</code> check or
<code>instanceof</code> check does when you need to know what you actually got.</p>`,
