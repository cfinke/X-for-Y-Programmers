  intro: `
<p>Java gives you <code>Set</code> as an interface (usually backed by
<code>HashSet</code>) that you construct and mutate with methods, and it has no
built-in tuple type at all — the closest things are a plain array (still
mutable, and every element must share one type), a small custom class, or,
since Java 16, a <code>record</code> for a fixed shape of immutable fields.
Python bakes both into the language as first-class types with their own
literal syntax. A <em>set</em> is an unordered collection of unique, hashable
values written with braces. A <em>tuple</em> is an immutable, ordered sequence
written with commas (usually wrapped in parentheses).</p>
<table>
  <tr><th>Java</th><th>Python</th></tr>
  <tr><td><code>new HashSet&lt;&gt;(List.of(1, 2, 2))</code></td><td><code>{1, 2, 2}</code> &rarr; <code>{1, 2}</code></td></tr>
  <tr><td><code>s.add(3)</code></td><td><code>s.add(3)</code></td></tr>
  <tr><td><code>a.retainAll(b)</code> (mutates <code>a</code>)</td><td><code>a &amp; b</code></td></tr>
  <tr><td><code>new ArrayList&lt;&gt;(new HashSet&lt;&gt;(list))</code></td><td><code>list(set(items))</code></td></tr>
  <tr><td><code>record Pt(String a, int b) {}<br>var t = new Pt("a", 1);</code></td><td><code>t = ("a", 1)</code></td></tr>
  <tr><td><code>String x = t.a(); int y = t.b();</code></td><td><code>x, y = t</code></td></tr>
</table>
<p>Because tuples are immutable and hashable, Python lets you use them as
dictionary keys or set members — something a mutable list can never do. Set
algebra has operator sugar: <code>|</code> union, <code>&amp;</code> intersection,
<code>-</code> difference. And when a tuple's positions start to carry meaning,
<code>collections.namedtuple</code> gives each slot a name while staying a real,
immutable tuple.</p>`,

Set<Integer> b = new HashSet<>(List.of(2, 3, 4));
// intersection: copy, then keep only what's also in b
Set<Integer> both = new HashSet<>(a);
both.retainAll(b);                                   // {2, 3}

static <T> List<T> dedupe(List<T> items) {
    return new ArrayList<>(new HashSet<>(items));
}

// tuple: no built-in type; a record gives a fixed, immutable shape
record Point(int x, int y) {}
Point point = new Point(3, 4);
int px = point.x();
int py = point.y();`,

  solution: `from collections import namedtuple


def dedupe(items):
    return list(set(items))


def common_tags(a, b):
    return set(a) & set(b)


def midpoint(p, q):
    x1, y1 = p
    x2, y2 = q
    return ((x1 + x2) / 2, (y1 + y2) / 2)


Point = namedtuple("Point", ["x", "y"])


def make_point(x, y):
    return Point(x, y)
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Python</th></tr>
  <tr><td>Set literal</td><td><code>new HashSet&lt;&gt;(List.of(1, 2))</code></td><td><code>{1, 2}</code> (but <code>{}</code> is an empty dict &mdash; use <code>set()</code>)</td></tr>
  <tr><td>Membership</td><td><code>s.contains(x)</code></td><td><code>x in s</code></td></tr>
  <tr><td>Union / intersection / diff</td><td><code>addAll</code> / <code>retainAll</code> / <code>removeAll</code> (mutate in place)</td><td><code>a | b</code>, <code>a &amp; b</code>, <code>a - b</code></td></tr>
  <tr><td>Tuple</td><td>no built-in type &mdash; array (mutable) or <code>record</code> (fixed, immutable)</td><td><code>("a", 1)</code> (truly immutable)</td></tr>
  <tr><td>Unpack</td><td>accessor calls, e.g. <code>t.a()</code>, <code>t.b()</code></td><td><code>x, y = t</code></td></tr>
  <tr><td>Named fields</td><td>class or <code>record</code></td><td><code>namedtuple("P", ["x", "y"])</code></td></tr>
</table>
<p>Two gotchas. First, <code>{}</code> is an empty <em>dict</em>, not a set &mdash;
the empty set is <code>set()</code>. Second, set elements and tuple entries must be
<em>hashable</em>: numbers, strings, and tuples qualify, but a <code>list</code> or
<code>dict</code> does not, so <code>{[1, 2]}</code> raises <code>TypeError</code>.
That is exactly why tuples make great dictionary keys and set members while lists
cannot &mdash; e.g. <code>seen = {(0, 0), (1, 2)}</code> to track visited grid
cells. A <code>namedtuple</code> is still a plain tuple under the hood, so
<code>make_point(3, 4) == (3, 4)</code> is <code>True</code> and it unpacks and
indexes like any tuple, but you also get <code>.x</code> / <code>.y</code> access
and a readable <code>repr</code>.</p>`,
