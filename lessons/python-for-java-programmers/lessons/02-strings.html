  intro: `
<p>Most of what you know about Java strings carries over: they are
immutable, zero-indexed, and every method returns a new string rather than
mutating in place. The names differ, though — Python spells interpolation with
an <em>f-string</em>, and slicing replaces <code>substring</code>
with the compact <code>s[a:b]</code> syntax.</p>
<table>
  <tr><th>Java</th><th>Python</th></tr>
  <tr><td><code>"Hi " + name</code></td><td><code>f"Hi {name}"</code></td></tr>
  <tr><td><code>s.toUpperCase()</code></td><td><code>s.upper()</code></td></tr>
  <tr><td><code>s.trim()</code></td><td><code>s.strip()</code></td></tr>
  <tr><td><code>s.replace("a", "b")</code></td><td><code>s.replace("a", "b")</code></td></tr>
  <tr><td><code>s.split(",")</code></td><td><code>s.split(",")</code></td></tr>
  <tr><td><code>String.join("-", arr)</code></td><td><code>"-".join(arr)</code></td></tr>
  <tr><td><code>s.substring(0, 3)</code></td><td><code>s[0:3]</code></td></tr>
  <tr><td><code>Integer.parseInt(s)</code> / <code>String.valueOf(n)</code></td><td><code>int(s)</code> / <code>str(n)</code></td></tr>
</table>
<p>Two things to note. First, Python's <code>str.replace</code> already
replaces <em>every</em> occurrence, matching Java's <code>String.replace</code>
(not the regex-based <code>replaceAll</code>). Second, <code>join</code> is a
method on the <em>separator</em> string rather than a static method that takes
the delimiter as an argument: instead of <code>String.join(", ", parts)</code>
you write <code>", ".join(parts)</code>, and every element must already be a
string. And <code>find</code> returns <code>-1</code> when the substring is
absent, exactly like <code>indexOf</code>.</p>`,

        }
        result.append(Character.toUpperCase(parts[i].charAt(0)));

}

  solution: `def shout(text):
    return text.strip().upper()


def slugify(title):
    return title.strip().lower().replace(" ", "-")


def initials(full_name):
    parts = full_name.split(" ")
    return ".".join(p[0].upper() for p in parts)


def label(name, score):
    return f"{name}: {score}"


def parse_total(a, b):
    return str(int(a) + int(b))

<table>

  <tr><td>Interpolation</td><td><code>String.format("%s", x)</code></td><td><code>f"{x}"</code></td></tr>

<p>Slices never raise on out-of-range bounds: <code>s[0:99]</code> just returns
the whole string, and a negative index counts from the end, so <code>s[-3:]</code>
is the last three characters — a relief coming from Java, where
<code>s.substring(0, 99)</code> throws a <code>StringIndexOutOfBoundsException</code>.
Because strings are immutable you can happily chain
<code>.strip().lower().replace(...)</code> — each call hands back a fresh
string, just as chaining methods on a Java <code>String</code> never mutates
the original. If you need case-insensitive membership, lowercase both sides
first (<code>"x" in s.lower()</code>); Java's <code>contains</code> has no
case-insensitive flag either, so the fix there is the same trick.</p>`,
