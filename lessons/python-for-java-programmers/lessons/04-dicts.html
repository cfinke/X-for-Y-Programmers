  intro: `
<p>Python's <code>dict</code> is the everyday key/value map — the same role
<code>java.util.Map</code> (usually a <code>HashMap</code>) plays in Java, but
with a literal syntax and no class to instantiate or type parameters to
declare. Keys can be any hashable value (strings, numbers, tuples), and since
Python 3.7 a dict preserves insertion order.</p>
<table>
  <tr><th>Java</th><th>Python</th></tr>
  <tr><td><code>Map&lt;String, Integer&gt; m = new HashMap&lt;&gt;();<br>m.put("a", 1);<br>m.put("b", 2);</code></td><td><code>m = {"a": 1, "b": 2}</code></td></tr>
  <tr><td><code>m.get("a")</code></td><td><code>m["a"]</code></td></tr>
  <tr><td><code>m.getOrDefault("x", 0)</code></td><td><code>m.get("x", 0)</code></td></tr>
  <tr><td><code>m.containsKey("a")</code></td><td><code>"a" in m</code></td></tr>
  <tr><td><code>m.keySet()</code></td><td><code>m.keys()</code></td></tr>
  <tr><td><code>m.entrySet()</code></td><td><code>m.items()</code></td></tr>
  <tr><td><code>Map&lt;String,Integer&gt; merged = new HashMap&lt;&gt;(m);<br>merged.putAll(n);</code></td><td><code>{**m, **n}</code> or <code>m.update(n)</code></td></tr>
</table>
<p>Two things trip up Java programmers. First, <code>m["x"]</code> on a
missing key <em>raises</em> <code>KeyError</code> — it does not return
<code>null</code> the way <code>Map.get</code> does. Reach for
<code>m.get("x", default)</code> when a key may be absent. Second, iterating a
dict yields its <em>keys</em>, so to walk pairs you iterate <code>m.items()</code>
and unpack each pair: <code>for k, v in m.items():</code>.</p>`,

  java: `Map<String, Integer> scores = new HashMap<>();
scores.put("ada", 90);
scores.put("rob", 72);

int ada = scores.get("ada");                  // 90
int cid = scores.getOrDefault("cid", 0);      // 0 (missing)
boolean hasRob = scores.containsKey("rob");   // true

int total = 0;
for (Map.Entry<String, Integer> entry : scores.entrySet()) {
    total += entry.getValue();
}`,

  task: `
<p>Write the Python versions:</p>
<ol>

    { name: "total sums the values", code: "    expect_eq(total({\"ada\": 90, \"rob\": 72}), 162)" },
    { name: "total of empty dict is 0", code: "    expect_eq(total({}), 0)" },
    { name: "with_bonus adds points to each value", code: "    expect_eq(with_bonus({\"ada\": 90, \"rob\": 72}, 5), {\"ada\": 95, \"rob\": 77})" },

  solution: `def build_scores():
    return {"ada": 90, "rob": 72}


def score_for(scores, name):
    return scores.get(name, 0)


def total(scores):
    running = 0
    for name, score in scores.items():
        running += score
    return running


def with_bonus(scores, points):
    return {name: score + points for name, score in scores.items()}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Python</th></tr>
  <tr><td>Read (may be missing)</td><td><code>m.getOrDefault("x", d)</code></td><td><code>m.get("x", d)</code></td></tr>
  <tr><td>Read (must exist)</td><td><code>m.get("x")</code> → <code>null</code></td><td><code>m["x"]</code> → <code>KeyError</code></td></tr>
  <tr><td>Membership</td><td><code>m.containsKey("x")</code></td><td><code>"x" in m</code></td></tr>
  <tr><td>Keys / values / pairs</td><td><code>m.keySet()</code> / <code>m.values()</code> / <code>m.entrySet()</code></td><td><code>m.keys()</code> / <code>m.values()</code> / <code>m.items()</code></td></tr>
  <tr><td>Merge</td><td><code>new HashMap&lt;&gt;(m)</code> then <code>.putAll(n)</code></td><td><code>{**m, **n}</code></td></tr>
  <tr><td>Comprehension</td><td>loop, or <code>Collectors.toMap(...)</code></td><td><code>{k: v for k, v in ...}</code></td></tr>
</table>
<p>Because plain <code>m["x"]</code> raises on a missing key, <code>.get()</code>
is the Python habit whenever absence is possible — and <code>m.get("x")</code>
with no default returns <code>None</code> rather than raising, much like Java's
<code>Map.get</code> returning <code>null</code>. When you actually want a
running default (say, counting), reach for <code>collections.defaultdict</code>
or <code>dict.setdefault</code>. Note that <code>in</code> tests <em>keys</em>,
never values: <code>"ada" in scores</code> asks whether that key exists,
mirroring how Java's <code>containsKey</code> checks keys, not
<code>containsValue</code>.</p>`,
