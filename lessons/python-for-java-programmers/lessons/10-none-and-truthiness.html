  title: "None & Truthiness",

  intro: `
<p>Java has one empty reference — <code>null</code> — but no built-in notion of
"falsy" values: an <code>int</code> can never be <code>null</code>, an empty
<code>List</code> is not automatically false, and <code>if (someString)</code>
does not even compile. You always write out the check, e.g.
<code>list.isEmpty()</code> or <code>str == null || str.isEmpty()</code>.
Python has exactly one empty, <code>None</code>, and a cleaner rule: a value is
falsy if it is <em>empty or zero</em>. That means empty containers count too —
<code>[]</code>, <code>{}</code>, <code>""</code>, and <code>0</code> are all
falsy, so you rarely write <code>len(x) == 0</code>.</p>
<table>
  <tr><th>Java</th><th>Python</th></tr>
  <tr><td><code>null</code></td><td><code>None</code></td></tr>
  <tr><td><code>x == null</code></td><td><code>x is None</code></td></tr>
  <tr><td><code>if (list.isEmpty())</code></td><td><code>if not arr:</code></td></tr>
  <tr><td><code>x != null ? x : fallback</code></td><td><code>x if x is not None else fallback</code></td></tr>
  <tr><td><code>x != null &amp;&amp; !x.isEmpty() ? x : fallback</code></td><td><code>x or fallback</code></td></tr>
  <tr><td><code>x != null &amp;&amp; f()</code></td><td><code>x and f()</code></td></tr>
</table>
<p>Two things matter here. First, use <code>is</code> / <code>is not</code> to
compare against <code>None</code> — <code>is</code> checks <em>identity</em>
(same object) while <code>==</code> checks <em>equality</em> (same value).
Because there is only one <code>None</code> object in the whole program,
<code>x is None</code> is the idiomatic test. Second, <code>or</code> and
<code>and</code> short-circuit and return one of their <em>operands</em>, not a
boolean — so <code>value or default</code> is Python's everyday way to supply a
fallback, similar to a ternary <code>null</code> check in Java but terser.</p>`,

  java: `static String greet(String name) {
    String who = (name != null && !name.isEmpty()) ? name : "stranger";
    return "Hello, " + who;
}

static <T> T firstItem(List<T> items) {
    return items.isEmpty() ? null : items.get(0);
}`,

  task: `
<p>Write these four functions using <code>None</code>, truthiness, and the

<ol>

  <li><code>is_empty(value)</code> — return <code>True</code> when

  solution: `def greet(name):
    who = name or "stranger"
    return f"Hello, {who}"


def is_empty(value):
    return not value


def first_item(items):
    return items[0] if items else None


def has_value(value):
    return value is not None
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Python</th></tr>
  <tr><td>The empty value</td><td><code>null</code></td><td><code>None</code> (only one)</td></tr>
  <tr><td>Null check</td><td><code>x == null</code></td><td><code>x is None</code></td></tr>
  <tr><td>Present check</td><td><code>x != null</code></td><td><code>x is not None</code></td></tr>
  <tr><td>Empty container</td><td><code>list.isEmpty()</code></td><td><code>not arr</code></td></tr>
  <tr><td>Null-safe default</td><td><code>x != null ? x : d</code></td><td><code>x if x is not None else d</code></td></tr>
  <tr><td>Falsy default</td><td>(no built-in equivalent)</td><td><code>x or d</code></td></tr>
</table>
<p>The subtle trap is one Java sidesteps entirely by not having falsy values:
<code>x or d</code> replaces <em>any</em> falsy <code>x</code>, so a
legitimate <code>0</code> or <code>""</code> gets swapped for the default. When
only <code>None</code> should trigger the fallback, reach for
<code>x if x is not None else d</code> — the equivalent of Java's
<code>x != null ? x : d</code>. Reserve <code>is</code> for the singletons
<code>None</code>, <code>True</code>, and <code>False</code>; use
<code>==</code> for comparing values like numbers and strings. And remember
that <code>and</code>/<code>or</code> return an operand, not a bool:
<code>[] or "x"</code> is <code>"x"</code>, and <code>2 and 3</code> is
<code>3</code>.</p>`,
