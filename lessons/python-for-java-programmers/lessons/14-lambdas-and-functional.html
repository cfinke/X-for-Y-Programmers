  intro: `
<p>In Java you reach for lambda expressions through the Stream API — <code>nums.stream().map(x -&gt; x * 2)</code>,
<code>nums.stream().filter(x -&gt; x &gt; 0)</code>, <code>list.sort(Comparator.comparingInt(...))</code>. Python
has the same building blocks, but they live as <em>standalone</em> functions
(<code>map</code>, <code>filter</code>, <code>sorted</code>) that take a callable as
an argument, not as methods chained off a stream.</p>
<p>Python's version of a lambda expression is the <code>lambda</code> keyword: a single
expression, no braces, no <code>return</code>. <code>lambda x: x * 2</code> is exactly
<code>x -&gt; x * 2</code>. A lambda's body must be one expression whose value is returned
automatically — unlike a brace-bodied Java lambda, it can never hold statements.</p>
<table>
  <tr><th>Java</th><th>Python</th></tr>
  <tr><td><code>x -&gt; x * 2</code></td><td><code>lambda x: x * 2</code></td></tr>
  <tr><td><code>xs.stream().map(f).collect(Collectors.toList())</code></td><td><code>map(f, xs)</code> &rarr; wrap in <code>list(...)</code></td></tr>
  <tr><td><code>xs.stream().filter(f).collect(Collectors.toList())</code></td><td><code>filter(f, xs)</code> &rarr; wrap in <code>list(...)</code></td></tr>
  <tr><td><code>xs.sort(Comparator.comparingInt(...))</code></td><td><code>sorted(xs, key=...)</code></td></tr>
  <tr><td><code>xs.stream().reduce(init, f)</code></td><td><code>reduce(f, xs, init)</code></td></tr>
</table>
<p>Two key differences. First, <code>map</code> and <code>filter</code> return lazy
iterators, not lists — you usually wrap them in <code>list(...)</code> to see the
results, much like a Java <code>Stream</code> stays unevaluated until a terminal
operation such as <code>collect</code> runs. Second, <code>sorted</code> does not take
a <code>Comparator</code>; it takes a <code>key=</code> function that maps each element
to the value you want to sort <em>by</em> (closer to <code>Comparator.comparing(...)</code>
than to a two-argument comparator). Often a comprehension reads better than
<code>map</code>/<code>filter</code> — prefer <code>[x * 2 for x in xs]</code> over
<code>list(map(lambda x: x * 2, xs))</code>. Reserve the functional tools for when
you already have a named function to pass, or for <code>sorted(key=...)</code> and
<code>reduce</code>, where they shine.</p>`,

  solution: `from functools import reduce


def double_all(nums):
    return list(map(lambda x: x * 2, nums))


def keep_evens(nums):
    return list(filter(lambda x: x % 2 == 0, nums))


def by_length(words):
    return sorted(words, key=len)


def total(nums):
    return reduce(lambda acc, x: acc + x, nums, 0)


def apply_twice(f, x):
    return f(f(x))

<p>A <code>lambda</code> is limited to a single expression — no statements, no
multi-line bodies. If you need branches or locals, use <code>def</code> and pass
the function by name; Python functions are first-class objects just like Java
lambdas and method references. For summing specifically, prefer the built-in
<code>sum(nums)</code> over <code>reduce</code> — <code>reduce</code> earns its keep
for folds that aren't already built in (running products, flattening, custom
accumulation).</p>
<p>When choosing between <code>map</code>/<code>filter</code> and a comprehension,
lean Pythonic: <code>[x * 2 for x in xs if x &gt; 0]</code> replaces a nested
<code>map</code>+<code>filter</code> and reads top-to-bottom. Reach for
<code>map</code>/<code>filter</code> when you already have a named callable to pass
(e.g. <code>map(str, xs)</code>), and remember that both return lazy iterators —
they compute nothing until you iterate or wrap them in <code>list(...)</code>, much
like an unconsumed Java <code>Stream</code>.</p>`,
