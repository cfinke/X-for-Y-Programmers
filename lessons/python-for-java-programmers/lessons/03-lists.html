  intro: `
<p>Python's <code>list</code> is the everyday sequence — the counterpart to
Java's <code>ArrayList</code> (or the <code>List</code> interface it
implements). It is ordered, mutable, and freely mixes types, unlike a Java
<code>List&lt;T&gt;</code>, which is pinned to one type parameter. The literal
syntax is much lighter than Java's: square brackets and commas, no
<code>new ArrayList&lt;&gt;(List.of(...))</code> boilerplate. What is new is
<em>negative indexing</em> and <em>slicing</em>, two of the most Pythonic
things you will learn this week.</p>
<table>
  <tr><th>Java</th><th>Python</th></tr>
  <tr><td><code>List&lt;Integer&gt; xs = new ArrayList&lt;&gt;(List.of(1, 2, 3));</code></td><td><code>xs = [1, 2, 3]</code></td></tr>
  <tr><td><code>xs.size()</code></td><td><code>len(xs)</code></td></tr>
  <tr><td><code>xs.get(xs.size() - 1)</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td><code>xs.add(4)</code></td><td><code>xs.append(4)</code></td></tr>
  <tr><td><code>xs.subList(1, 3)</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td><code>xs.contains(2)</code></td><td><code>2 in xs</code></td></tr>
</table>
<p>Indexing from the end is built in: <code>xs[-1]</code> is the last element,
<code>xs[-2]</code> the second-to-last — no more reaching for
<code>xs.get(xs.size() - 1)</code>. A <em>slice</em> <code>xs[a:b]</code>
returns a new list from index <code>a</code> up to (but not including)
<code>b</code>; either bound may be omitted (<code>xs[:2]</code>,
<code>xs[2:]</code>) and a third value is a step (<code>xs[::-1]</code> reverses).
Membership is the <code>in</code> operator, and the length is the free function
<code>len(xs)</code> rather than the <code>xs.size()</code> method call.</p>
<p>Two ways to sort: <code>sorted(xs)</code> returns a new sorted list and leaves
<code>xs</code> alone, while <code>xs.sort()</code> reorders in place and returns
<code>None</code>. And when you want to transform a list into another list, reach
for a <em>comprehension</em> — <code>[n * 2 for n in xs]</code> — the Pythonic
replacement for <code>xs.stream().map(...).collect(Collectors.toList())</code>.</p>`,

  java: `List<Integer> nums = new ArrayList<>(List.of(3, 1, 2));
nums.add(4);

List<Integer> firstTwo = nums.subList(0, 2);
List<Integer> doubled = nums.stream().map(n -> n * 2).collect(Collectors.toList());
List<Integer> asc = new ArrayList<>(nums);
Collections.sort(asc);
boolean hasThree = nums.contains(3);`,

  solution: `def make_range(n):
    return [i for i in range(n)]


def last(xs):
    return xs[-1]


def middle(xs):
    return xs[1:-1]


def with_added(xs, value):
    return xs + [value]


def doubled(xs):
    return [n * 2 for n in xs]


def sorted_desc(xs):
    return sorted(xs, reverse=True)


def contains(xs, value):
    return value in xs
`,

  notes: `
<table>
  <tr><th>Operation</th><th>Java</th><th>Python</th></tr>
  <tr><td>Length</td><td><code>xs.size()</code></td><td><code>len(xs)</code></td></tr>
  <tr><td>Last element</td><td><code>xs.get(xs.size() - 1)</code></td><td><code>xs[-1]</code></td></tr>
  <tr><td>Slice</td><td><code>xs.subList(1, 3)</code></td><td><code>xs[1:3]</code></td></tr>
  <tr><td>Reverse copy</td><td><code>var r = new ArrayList&lt;&gt;(xs); Collections.reverse(r);</code></td><td><code>xs[::-1]</code></td></tr>
  <tr><td>Append</td><td><code>xs.add(v)</code></td><td><code>xs.append(v)</code></td></tr>
  <tr><td>Concat many</td><td><code>xs.addAll(ys)</code></td><td><code>xs.extend(ys)</code></td></tr>
  <tr><td>Insert at i</td><td><code>xs.add(i, v)</code></td><td><code>xs.insert(i, v)</code></td></tr>
  <tr><td>Remove &amp; return</td><td><code>xs.remove(xs.size() - 1)</code></td><td><code>xs.pop()</code> / <code>xs.pop(i)</code></td></tr>
  <tr><td>Map</td><td><code>xs.stream().map(f).collect(Collectors.toList())</code></td><td><code>[f(x) for x in xs]</code></td></tr>
  <tr><td>Sort (copy)</td><td><code>var s = new ArrayList&lt;&gt;(xs); Collections.sort(s);</code></td><td><code>sorted(xs)</code></td></tr>
  <tr><td>Sort (in place)</td><td><code>Collections.sort(xs)</code></td><td><code>xs.sort()</code></td></tr>
  <tr><td>Contains</td><td><code>xs.contains(v)</code></td><td><code>v in xs</code></td></tr>
</table>
<p>The key mental split is <strong>copy vs. mutate</strong>. <code>sorted(xs)</code>,
a slice, and a comprehension all build a <em>new</em> list; <code>xs.sort()</code>,
<code>xs.append(v)</code>, <code>xs.insert(i, v)</code>, and <code>xs.pop()</code>
change <code>xs</code> in place. The in-place methods return <code>None</code>, so
<code>ys = xs.sort()</code> is a classic beginner bug — it binds <code>ys</code>
to <code>None</code>. Also note <code>xs + [value]</code> makes a fresh list,
while <code>xs.append(value)</code> does not, which is why <code>with_added</code>
above uses <code>+</code> to avoid mutating its argument — the same discipline
Java's immutable-friendly APIs (like <code>Stream.toList()</code>) encourage.</p>
<p>List comprehensions read left-to-right as "collect <em>expression</em> for each
<em>item</em>," and can filter with a trailing <code>if</code>:
<code>[n for n in xs if n &gt; 0]</code>. They are the first Pythonic idiom worth
building a reflex for — most <code>.stream().map(...)</code>/<code>.filter(...)</code>
chains you would write in Java collapse into a single comprehension here.</p>`,
