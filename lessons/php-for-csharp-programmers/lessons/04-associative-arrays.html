const LESSON = {
  number: 4,
  title: "Associative Arrays",

  intro: `
<p>Here's the punchline of the last lesson: PHP's <code>array</code> is also
your <code>Dictionary&lt;string, int&gt;</code>. The same type, the same
literal syntax — just add keys with the <code>=&gt;</code> arrow:
<code>['apples' =&gt; 3, 'pears' =&gt; 5]</code>. Writing
<code>$m[$k] = $v;</code> inserts or overwrites, exactly like the C# indexer.
And the null-coalescing operator you already know does
<code>GetValueOrDefault</code>'s job: <code>$m[$k] ?? 0</code> yields the
value if the key exists, the default if it doesn't — no
<code>KeyNotFoundException</code> drama.</p>
<table>
  <tr><th>C#</th><th>PHP</th></tr>
  <tr><td><code>new Dictionary&lt;string, int&gt; { ["apples"] = 3 }</code></td><td><code>['apples' =&gt; 3]</code></td></tr>
  <tr><td><code>dict[k] = v;</code></td><td><code>$m[$k] = $v;</code></td></tr>
  <tr><td><code>dict.GetValueOrDefault(k, 0)</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td><code>foreach (var kv in dict)</code></td><td><code>foreach ($m as $k =&gt; $v)</code></td></tr>
  <tr><td><code>dict.Keys</code></td><td><code>array_keys($m)</code></td></tr>
  <tr><td><code>dict.ContainsKey(k)</code></td><td><code>array_key_exists($k, $m)</code></td></tr>
</table>
<p>Iteration is a quiet upgrade: where C# hands you a
<code>KeyValuePair</code> to unpack, PHP's <code>foreach ($m as $k =&gt; $v)</code>
destructures the pair for free — key and value land in their own variables.
And remember lesson 3: this is still an array, so it still has <strong>value
semantics</strong>. A function that "adds stock" receives a copy and must
return it.</p>`,

  csharp: `var inventory = new Dictionary<string, int>
{
    ["apples"] = 3,
    ["pears"]  = 5,
};

inventory["plums"] = 2;                                // insert/overwrite
var kiwis    = inventory.GetValueOrDefault("kiwis", 0); // 0, no throw
var hasPears = inventory.ContainsKey("pears");          // true

var total = 0;
foreach (var kv in inventory)          // KeyValuePair<string, int>
{
    total += kv.Value;
}

var names = inventory.Keys;`,

  task: `
<p>Port the inventory code to one humble array:</p>
<ol>
  <li><code>build_inventory(): array</code> — return
      <code>['apples' =&gt; 3, 'pears' =&gt; 5]</code> using <code>=&gt;</code>
      literal syntax.</li>
  <li><code>get_count(array $inv, string $name): int</code> — look the key up
      with <code>??</code> so a missing product yields <code>0</code>, exactly
      like <code>GetValueOrDefault(name, 0)</code>.</li>
  <li><code>add_stock(array $inv, string $name, int $n): array</code> — add
      <code>$n</code> to the product's count (creating the key if needed —
      <code>??</code> helps again) and return the updated array. Value
      semantics: the caller's copy stays untouched.</li>
  <li><code>total_items(array $inv): int</code> — sum every count with
      <code>foreach ($inv as $name =&gt; $count)</code>, the
      auto-destructured <code>KeyValuePair</code> loop.</li>
</ol>`,

  starter: `<?php

// 1. Dictionary literal -> ['key' => value] pairs.
function build_inventory(): array {
    throw new Exception("TODO: implement build_inventory");
}

// 2. GetValueOrDefault($name, 0) -> $inv[$name] ?? 0
function get_count(array $inv, string $name): int {
    throw new Exception("TODO: implement get_count");
}

// 3. Bump the count (missing key starts at 0) and return the copy.
function add_stock(array $inv, string $name, int $n): array {
    throw new Exception("TODO: implement add_stock");
}

// 4. foreach ($inv as $name => $count) — key and value, pre-unpacked.
function total_items(array $inv): int {
    throw new Exception("TODO: implement total_items");
}
`,

  requirements: [
    { pattern: /=>/, message: "Build the map with 'key' => value pairs" },
    { pattern: /\?\?/, message: "Use ?? for the GetValueOrDefault-style lookup" },
    { pattern: /foreach\s*\(|array_keys/, message: "Iterate with foreach ($m as $k => $v) (or use array_keys)" },
  ],

  tests: [
    { name: "build_inventory() returns ['apples' => 3, 'pears' => 5]",
      code: 'expect_eq(build_inventory(), ["apples" => 3, "pears" => 5]);' },
    { name: 'get_count($inv, "apples") returns 3',
      code: 'expect_eq(get_count(build_inventory(), "apples"), 3);' },
    { name: 'get_count($inv, "kiwis") returns 0 (missing key, no exception)',
      code: 'expect_eq(get_count(build_inventory(), "kiwis"), 0);' },
    { name: "add_stock bumps an existing product and leaves the caller's array alone",
      code: '$inv = build_inventory();\n$restocked = add_stock($inv, "apples", 2);\nexpect_eq($restocked["apples"], 5);\nexpect_eq($inv["apples"], 3);' },
    { name: "add_stock creates a missing product",
      code: 'expect_eq(add_stock([], "plums", 4), ["plums" => 4]);' },
    { name: "total_items sums every count (and returns 0 for [])",
      code: "expect_eq(total_items(build_inventory()), 8);\nexpect_eq(total_items([]), 0);" },
  ],

  solution: `<?php

function build_inventory(): array {
    return ['apples' => 3, 'pears' => 5];
}

function get_count(array $inv, string $name): int {
    return $inv[$name] ?? 0;
}

function add_stock(array $inv, string $name, int $n): array {
    $inv[$name] = ($inv[$name] ?? 0) + $n;
    return $inv;   // the caller's copy is untouched
}

function total_items(array $inv): int {
    $total = 0;
    foreach ($inv as $name => $count) {
        $total += $count;
    }
    return $total;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>PHP</th></tr>
  <tr><td>Literal</td><td><code>new Dictionary&lt;string, int&gt; { ["a"] = 1 }</code></td><td><code>['a' =&gt; 1]</code></td></tr>
  <tr><td>Insert / overwrite</td><td><code>dict[k] = v;</code></td><td><code>$m[$k] = $v;</code></td></tr>
  <tr><td>Lookup w/ default</td><td><code>dict.GetValueOrDefault(k, 0)</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td>Key present?</td><td><code>dict.ContainsKey(k)</code></td><td><code>array_key_exists($k, $m)</code></td></tr>
  <tr><td>Iterate</td><td><code>foreach (var kv in dict)</code></td><td><code>foreach ($m as $k =&gt; $v)</code></td></tr>
  <tr><td>All keys</td><td><code>dict.Keys</code></td><td><code>array_keys($m)</code></td></tr>
  <tr><td>Remove</td><td><code>dict.Remove(k)</code></td><td><code>unset($m[$k]);</code></td></tr>
</table>
<p>One type, two data structures: a PHP array is an <em>ordered</em> map that
happens to default to integer keys 0, 1, 2… when you don't supply any. That's
why lessons 3 and 4 used the same functions — <code>count</code>,
<code>foreach</code>, value semantics — on both shapes. Insertion order is
preserved (like .NET's <code>OrderedDictionary</code>, not the unordered
<code>Dictionary</code>), and <code>$m[$k] ?? 0</code> quietly checks
existence and null in one step, so the
<code>ContainsKey</code>-then-index dance is rarely needed.</p>`,
};
