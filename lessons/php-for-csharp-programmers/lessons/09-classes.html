  intro: `
<p>PHP's object model will feel like home. <code>class</code>,
<code>new</code>, <code>public</code>/<code>private</code>/<code>protected</code>
— all as you know them. The constructor is always named
<code>__construct</code>, member access uses <code>-&gt;</code> instead of
<code>.</code>, and — the one that trips up C# muscle memory —
<code>$this</code> is <em>mandatory</em>: a bare <code>$balance</code> inside
a method is a brand-new local variable, not the property. Every property
access is <code>$this-&gt;balance</code> (note: no <code>$</code> after the
arrow).</p>
<table>
  <tr><th>C#</th><th>PHP</th></tr>
  <tr><td><code>public BankAccount(...)</code></td><td><code>public function __construct(...)</code></td></tr>
  <tr><td><code>account.Deposit(5)</code></td><td><code>$account-&gt;deposit(5)</code></td></tr>
  <tr><td><code>balance</code> (implicit this)</td><td><code>$this-&gt;balance</code> (always explicit)</td></tr>
  <tr><td><code>class C(int balance)</code> — C# 12 primary ctor</td><td><code>function __construct(private int $balance)</code></td></tr>
  <tr><td><code>public int X { get; set; }</code></td><td>no auto-properties — public property or accessor methods</td></tr>
</table>
<p>PHP 8's <em>constructor property promotion</em> is the standout feature:
put a visibility keyword on a constructor parameter and PHP declares the
property, accepts the argument, and assigns it — one line for what used to
be three. It's C# 12 primary constructors, except each parameter carries its
own visibility, so <code>private int $balance = 0</code> gives you a real
private field with a default. What PHP lacks are auto-properties: there is
no <code>{ get; set; }</code>. You either expose a plain public property or
write explicit accessor methods — which is what we'll do here for anything
with invariants, like an account balance.</p>`,

  csharp: `public class BankAccount(string owner, int balance = 0) // C# 12

    public bool Withdraw(int amount)
    {
        if (amount > _balance) return false;
        _balance -= amount;
        return true;
    }

    public int Balance() => _balance;
}

var acct = new BankAccount("Ada");
acct.Deposit(100);
Console.WriteLine(acct.Withdraw(500)); // False — balance still 100`,

  solution: `<?php

class BankAccount {
    public function __construct(
        private string $owner,
        private int $balance = 0,
    ) {}

    public function owner(): string {
        return $this->owner;
    }

    public function deposit(int $amount): void {
        $this->balance += $amount;
    }

    public function withdraw(int $amount): bool {
        if ($amount > $this->balance) {
            return false;
        }
        $this->balance -= $amount;
        return true;
    }

    public function balance(): int {
        return $this->balance;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>PHP</th></tr>
  <tr><td>Constructor</td><td>class-named / primary ctor</td><td><code>__construct</code>, always</td></tr>
  <tr><td>Member access</td><td><code>obj.Member</code></td><td><code>$obj-&gt;member</code></td></tr>
  <tr><td>Own property</td><td><code>balance</code> or <code>this.balance</code></td><td><code>$this-&gt;balance</code> — mandatory</td></tr>
  <tr><td>Promoted / primary ctor</td><td><code>class C(int x)</code> (C# 12, no visibility)</td><td><code>__construct(private int $x = 0)</code></td></tr>
  <tr><td>Auto-property</td><td><code>{ get; set; }</code></td><td>— (public property or accessor methods)</td></tr>
  <tr><td>Instantiation</td><td><code>new BankAccount("Ada")</code></td><td><code>new BankAccount("Ada")</code> (same!)</td></tr>
</table>
<p>The habit to build: <code>$this-&gt;</code> everywhere. In C#, forgetting
<code>this.</code> is harmless because the compiler resolves the field; in
PHP, a bare <code>$balance</code> silently creates a local, your method
"works" on garbage, and nothing warns you. Promotion, meanwhile, is not just
sugar you may use — it is the dominant constructor style in modern PHP
codebases, so expect nearly every constructor you read to look like the one
in this lesson.</p>`,
