<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Interfaces, Inheritance & Abstracts",

  intro: `
<p>This is home turf. PHP's classical OO toolkit is a near-exact copy of
C#'s: <code>interface</code> + <code>implements</code>,
<code>abstract class</code> + <code>extends</code>, single inheritance of
classes, multiple interfaces. The colon syntax splits into keywords —
<code>: IShape</code> becomes <code>implements Shape</code>,
<code>: Base</code> becomes <code>extends Base</code> — and interface names
don't take the <code>I</code> prefix here (<code>Shape</code>,
<code>Countable</code>, <code>Stringable</code>). Calling the base
constructor is <code>parent::__construct(...)</code> in place of
<code>: base(...)</code>.</p>
<table>
  <tr><th>C#</th><th>PHP</th></tr>
  <tr><td><code>class Circle : IShape</code></td><td><code>class Circle implements Shape</code></td></tr>
  <tr><td><code>class Circle : Shape</code></td><td><code>class Circle extends Shape</code></td></tr>
  <tr><td><code>: base(x)</code></td><td><code>parent::__construct($x)</code></td></tr>
  <tr><td><code>public abstract double Area();</code></td><td><code>abstract public function area(): float;</code></td></tr>
  <tr><td><code>public override double Area()</code></td><td><code>public function area(): float</code> — no keyword</td></tr>
  <tr><td><code>obj is Shape</code></td><td><code>$obj instanceof Shape</code></td></tr>
</table>
<p>The one real difference: <em>every method is virtual</em>. There is no
<code>virtual</code>, no <code>override</code>, no <code>sealed</code>-by-default —
a subclass method with the same name simply overrides, and the call always
dispatches to the most-derived implementation. That makes the template
method pattern effortless: an abstract class can ship a concrete method that
calls <code>$this-&gt;area()</code>, and each subclass's version is what
actually runs — exactly like calling an abstract member from a base class in
C#, minus the keyword ceremony.</p>`,

  csharp: `public abstract class Shape
{
    public abstract double Area();

    // Template method: concrete code calling the abstract member.
    public string Describe() => "Area: " + Area();
}

public class Circle(double radius) : Shape
{
    public override double Area() => Math.PI * radius * radius;
}

public class Rectangle(double width, double height) : Shape
{
    public override double Area() => width * height;
}

Shape r = new Rectangle(3, 4);
Console.WriteLine(r.Describe());   // Area: 12`,

  task: `
<p>Port the hierarchy:</p>
<ol>
  <li><code>abstract class Shape</code> with
      <code>abstract public function area(): float;</code> (declaration only,
      semicolon, no body) and a <em>concrete</em>
      <code>describe(): string</code> that returns
      <code>"Area: " . $this-&gt;area()</code> — the template method. Use
      <code>.</code> to concatenate (PHP's <code>+</code> is numbers-only).</li>
  <li><code>class Circle extends Shape</code> — promoted
      <code>private float $radius</code>; <code>area()</code> returns
      <code>M_PI * $this-&gt;radius * $this-&gt;radius</code>
      (<code>M_PI</code> is <code>Math.PI</code>).</li>
  <li><code>class Rectangle extends Shape</code> — promoted private
      <code>float $width</code> and <code>float $height</code>;
      <code>area()</code> multiplies them.</li>
</ol>
<p>No <code>override</code> keyword anywhere — defining <code>area()</code>
in the subclasses is all it takes.</p>`,

  starter: `<?php

// abstract class + extends; every method is virtual, overriding
// needs no keyword.
abstract class Shape {
    // Declaration only — no body, ends with a semicolon.
    abstract public function area(): float;

    // Template method: concrete, but calls $this->area(), which
    // dispatches to the subclass. Return "Area: " . $this->area()
    public function describe(): string {
        throw new Exception("TODO: implement describe");
    }
}

class Circle extends Shape {
    public function __construct(private float $radius) {}

    public function area(): float {
        throw new Exception("TODO: implement Circle::area (M_PI is Math.PI)");
    }
}

class Rectangle extends Shape {
    public function __construct(private float $width, private float $height) {}

    public function area(): float {
        throw new Exception("TODO: implement Rectangle::area");
    }
}
`,

  requirements: [
    { pattern: /abstract\s+class\s+Shape/, message: "Declare Shape as an abstract class" },
    { pattern: /extends\s+Shape/, message: "Circle and Rectangle must extend Shape" },
    { pattern: /abstract\s+(public\s+)?function\s+area/, message: "Declare area() as an abstract method on Shape (no body)" },
  ],

  tests: [
    { name: "new Circle(1) has area pi (3.14 to two decimals)",
      code: "$c = new Circle(1);\nexpect_eq(round($c->area(), 2), 3.14);" },
    { name: "new Circle(2) has area 12.57 to two decimals",
      code: "$c = new Circle(2);\nexpect_eq(round($c->area(), 2), 12.57);" },
    { name: "new Rectangle(3, 4) has area exactly 12.0",
      code: "$r = new Rectangle(3, 4);\nexpect_eq($r->area(), 12.0);" },
    { name: 'describe() on a Rectangle uses the subclass area(): "Area: 12"',
      code: '$r = new Rectangle(3, 4);\nexpect_eq($r->describe(), "Area: 12");' },
    { name: "both shapes are instanceof Shape (C#'s is)",
      code: "$c = new Circle(1);\n$r = new Rectangle(2, 5);\nexpect_true($c instanceof Shape);\nexpect_true($r instanceof Shape);" },
  ],

  solution: `<?php

abstract class Shape {
    abstract public function area(): float;

    public function describe(): string {
        return "Area: " . $this->area();
    }
}

class Circle extends Shape {
    public function __construct(private float $radius) {}

    public function area(): float {
        return M_PI * $this->radius * $this->radius;
    }
}

class Rectangle extends Shape {
    public function __construct(private float $width, private float $height) {}

    public function area(): float {
        return $this->width * $this->height;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>PHP</th></tr>
  <tr><td>Implement an interface</td><td><code>class C : IShape</code></td><td><code>class C implements Shape</code> (no I prefix)</td></tr>
  <tr><td>Inherit a class</td><td><code>class C : Base</code></td><td><code>class C extends Base</code></td></tr>
  <tr><td>Call base constructor</td><td><code>: base(x)</code></td><td><code>parent::__construct($x)</code></td></tr>
  <tr><td>Abstract member</td><td><code>public abstract double Area();</code></td><td><code>abstract public function area(): float;</code></td></tr>
  <tr><td>Override</td><td><code>virtual</code> + <code>override</code></td><td>just redefine — every method is virtual</td></tr>
  <tr><td>Type test</td><td><code>obj is Shape</code></td><td><code>$obj instanceof Shape</code></td></tr>
  <tr><td>Pi</td><td><code>Math.PI</code></td><td><code>M_PI</code></td></tr>
</table>
<p>Everything-virtual cuts both ways. It makes template methods and test
doubles frictionless — no planning ahead with <code>virtual</code> — but it
also means nothing stops a subclass from accidentally overriding a method it
didn't know existed, and no <code>override</code> keyword catches a typo'd
name that silently overrides nothing. When you need C#'s guardrails back,
PHP offers <code>final</code> (on classes and methods) and, since 8.3+
tooling, the <code>#[\\Override]</code> attribute to assert an override is
intentional.</p>`,
};
