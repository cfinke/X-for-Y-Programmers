  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>In C# you opt into interpolation one string at a time with the
<code>$"..."</code> prefix. In PHP, <em>every double-quoted string is an
interpolated string</em> — no prefix needed. <code>"Hello, $name!"</code> just
works, because the <code>$</code> lives on the variable. For expressions
beyond a simple variable, wrap them in braces: <code>"{$user['name']}"</code>.
Single-quoted strings are the opposite: fully literal, no interpolation and
almost no escapes — roughly the role <code>@"..."</code> verbatim strings play
for you today.</p>
<table>
  <tr><th>C#</th><th>PHP</th></tr>
  <tr><td><code>$"Hello, {name}!"</code></td><td><code>"Hello, $name!"</code></td></tr>
  <tr><td><code>a + b</code> (concat)</td><td><code>$a . $b</code> (<code>+</code> is arithmetic only)</td></tr>
  <tr><td><code>name.ToUpper()</code></td><td><code>strtoupper($name)</code></td></tr>
  <tr><td><code>name.Contains("da")</code></td><td><code>str_contains($name, "da")</code></td></tr>
  <tr><td><code>name.Length</code></td><td><code>strlen($name)</code></td></tr>
  <tr><td><code>string.Join(", ", words)</code></td><td><code>implode(", ", $words)</code></td></tr>
</table>
<p>The other big shift: strings have no methods. Everything you know as an
instance method on <code>string</code> is a free function that takes the
string as an argument — <code>strtoupper</code>, <code>strlen</code>,
<code>str_contains</code>, <code>implode</code>. And concatenation is the
<code>.</code> operator, never <code>+</code>: in PHP 8,
<code>"a" + "b"</code> is a <code>TypeError</code>, because <code>+</code>
means arithmetic, full stop.</p>`,

  csharp: `var name = "Ada";
var greeting = $"Hello, {name}!";        // interpolation needs the $ prefix
var label = "score: " + 42;              // + concatenates

var shout  = name.ToUpper();             // "ADA"
var hasDa  = name.Contains("da");        // true
var len    = name.Length;                // 3

var words  = new List<string> { "one", "two", "three" };
var joined = string.Join(", ", words);   // "one, two, three"

static string Greet(string greeting, string name)
{
    return $"{greeting}, {name}!";
}`,

  task: `
<p>Port the string toolbox to PHP:</p>
<ol>
  <li><code>shout(string $s): string</code> — upper-case the input with
      <code>strtoupper</code> and append <code>"!"</code> using the
      <code>.</code> concatenation operator: <code>shout("hello")</code>
      returns <code>"HELLO!"</code>.</li>
  <li><code>greet(string $greeting, string $name): string</code> — return
      <code>"$greeting, $name!"</code> using double-quote interpolation (no
      <code>$</code> prefix on the string — the string is already
      interpolated).</li>
  <li><code>contains_word(string $haystack, string $needle): bool</code> —
      wrap <code>str_contains</code>, the free-function form of

  <li><code>join_words(array $words): string</code> — join with
      <code>", "</code> using <code>implode</code>, PHP's
      <code>string.Join</code>.</li>
</ol>`,

  starter: `<?php

`,

  requirements: [
    { pattern: /"\$\w+|\{\$\w+/, message: "Use double-quote interpolation somewhere (\"$var\" or \"{$var}\")" },
    { pattern: /strtoupper/, message: "Use strtoupper (the free-function .ToUpper())" },
    { pattern: /str_contains/, message: "Use str_contains (the free-function .Contains())" },
    { pattern: /implode/, message: "Use implode (PHP's string.Join)" },
  ],

  tests: [
    { name: 'shout("hello") returns "HELLO!"',
      code: 'expect_eq(shout("hello"), "HELLO!");' },
    { name: 'greet("Howdy", "Ada") returns "Howdy, Ada!"',
      code: 'expect_eq(greet("Howdy", "Ada"), "Howdy, Ada!");' },
    { name: 'contains_word finds "quick" in "the quick brown fox"',
      code: 'expect_true(contains_word("the quick brown fox", "quick"));' },
    { name: 'contains_word does not find "slow"',
      code: 'expect_true(!contains_word("the quick brown fox", "slow"));' },
    { name: 'join_words(["one", "two", "three"]) returns "one, two, three"',
      code: 'expect_eq(join_words(["one", "two", "three"]), "one, two, three");' },
  ],

  solution: `<?php

function shout(string $s): string {
    return strtoupper($s) . "!";
}

function greet(string $greeting, string $name): string {
    return "$greeting, $name!";
}

function contains_word(string $haystack, string $needle): bool {
    return str_contains($haystack, $needle);
}

function join_words(array $words): string {
    return implode(", ", $words);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>PHP</th></tr>
  <tr><td>Interpolation</td><td><code>$"Hi, {name}"</code></td><td><code>"Hi, $name"</code> — every double-quoted string</td></tr>
  <tr><td>Complex expression</td><td><code>$"{user.Name}"</code></td><td><code>"{$user-&gt;name}"</code> (braces, <code>$</code> inside)</td></tr>
  <tr><td>Literal string</td><td><code>@"C:\\temp"</code></td><td><code>'C:\\temp'</code> (single quotes: no interpolation)</td></tr>
  <tr><td>Concatenation</td><td><code>a + b</code></td><td><code>$a . $b</code> (and <code>.=</code> for <code>+=</code>)</td></tr>
  <tr><td>Upper-case</td><td><code>s.ToUpper()</code></td><td><code>strtoupper($s)</code></td></tr>
  <tr><td>Substring test</td><td><code>s.Contains(x)</code></td><td><code>str_contains($s, $x)</code></td></tr>
  <tr><td>Length</td><td><code>s.Length</code></td><td><code>strlen($s)</code> (bytes, not chars!)</td></tr>
  <tr><td>Join</td><td><code>string.Join(", ", xs)</code></td><td><code>implode(", ", $xs)</code></td></tr>
</table>
<p>One habit to unlearn: reaching for <code>+</code> when gluing strings. PHP's
<code>+</code> never concatenates — it converts operands to numbers or throws.
The <code>.</code> operator (and <code>.=</code>, the analogue of
<code>+=</code>) is the only way to concatenate. Also note
<code>strlen</code> counts <em>bytes</em>; for real character counts on UTF-8
text, PHP's <code>mb_strlen</code> is the tool — the same distinction as
<code>string.Length</code> vs <code>StringInfo</code> in .NET, just more
in-your-face.</p>`,
};
