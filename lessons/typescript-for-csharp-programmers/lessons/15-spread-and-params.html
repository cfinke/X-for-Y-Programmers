<div id="app"></div>
<script>
const LESSON = {
  number: 15,
  title: "Spread & params",

  intro: `
<p>C#'s <code>params</code> keyword has a direct TypeScript twin:
<code>void Log(params string[] parts)</code> becomes
<code>function log(...parts: string[])</code>. Same behavior — callers pass any
number of arguments, the function sees an array — just spelled with three dots
before the name (a <em>rest parameter</em>) instead of a keyword before the
type. The same three dots also work in the other direction: <em>spread</em>
unpacks an array into a call (<code>sum(...values)</code>) or into a new array
literal — <code>[...a, ...b]</code> is C# 12's collection expression
<code>[..a, ..b]</code> with one more dot.</p>
<table>
  <tr><th>C#</th><th>TypeScript</th></tr>
  <tr><td><code>int Sum(params int[] nums)</code></td><td><code>function sum(...nums: number[]): number</code></td></tr>
  <tr><td><code>int[] merged = [..a, ..b];</code> (collection expression)</td><td><code>const merged = [...a, ...b];</code></td></tr>
  <tr><td><code>var custom = defaults with { Theme = "dark" };</code></td><td><code>const custom = { ...defaults, theme: "dark" };</code></td></tr>
  <tr><td><code>list.Add(item)</code> (mutates)</td><td><code>[...items, item]</code> (new array, original untouched)</td></tr>
</table>
<p>The idiom that matters most is <em>object spread</em>, because it is exactly
the record <code>with</code>-expression you already use for immutable updates:
<code>user with { Name = "X" }</code> becomes
<code>{ ...user, name: "X" }</code> — copy everything, then override. Later
properties win, so <code>{ ...defaults, ...overrides }</code> is a complete
settings-merge in one expression. Like <code>with</code>, spread never touches
the original — a habit worth keeping, since half of the React/Redux world's
change detection depends on producing new objects instead of mutating old
ones. (Note the property casing: <code>Theme</code> → <code>theme</code>.)</p>`,

  csharp: `static class Demo
{
    static int Sum(params int[] nums)
    {
        var total = 0;
        foreach (var n in nums) total += n;
        return total;
    }

    static void Main()
    {
        Console.WriteLine(Sum(1, 2, 3));  // params: any number of args

        var defaults = new Settings("light", 14);
        var custom = defaults with { Theme = "dark" };  // copy-with-changes
        Console.WriteLine(defaults.Theme);              // still "light"

        int[] a = [1, 2];
        int[] merged = [..a, 3];          // collection expression
    }
}

record Settings(string Theme, int FontSize);`,

  task: `
<p>The starter defines a <code>Settings</code> type. Write three functions, all
mutation-free:</p>
<ol>
  <li><code>sum(...nums: number[]): number</code> — a rest parameter, the
      <code>params int[]</code> of TypeScript. <code>sum()</code> with no
      arguments returns <code>0</code>.</li>
  <li><code>mergeSettings(defaults: Settings, overrides: { theme?: string; fontSize?: number }): Settings</code>
      — the <code>with</code>-expression as a function: return a new object via
      <code>{ ...defaults, ...overrides }</code>. Later spreads win, and
      <code>defaults</code> must be left untouched.</li>
  <li><code>appendItem&lt;T&gt;(items: T[], item: T): T[]</code> — return a new
      array with <code>item</code> at the end, using array spread. No
      <code>.push()</code> — the original array must not change.</li>
</ol>`,

  starter: `type Settings = { theme: string; fontSize: number };

// 1. C#: int Sum(params int[] nums)
//    TS: the dots go on the parameter, not the type.
function sum(): number {
  // TODO: accept ...nums: number[] and add them up (0 for no args)
  return -1;
}

// 2. The with-expression, as a function: { ...defaults, ...overrides }.
function mergeSettings(defaults: Settings, overrides: { theme?: string; fontSize?: number }): Settings {
  // TODO: object spread — do NOT modify defaults
  return defaults;
}

// 3. Immutable Add: a NEW array with item appended.
function appendItem<T>(items: T[], item: T): T[] {
  // TODO: array spread — no .push() on the input!
  return items;
}
`,

  exportNames: ["sum", "mergeSettings", "appendItem"],

  requirements: [
    { pattern: /\(\s*\.\.\.\s*nums\s*:\s*number\s*\[\s*\]/, message: "Declare sum with a rest parameter: sum(...nums: number[])" },
    { pattern: /\{\s*\.\.\./, message: "Build the merged settings with object spread: { ...defaults, ...overrides }" },
    { pattern: /\[\s*\.\.\./, message: "Build the appended array with array spread: [...items, item]" },
  ],

  tests: [
    { name: "sum(1, 2, 3) returns 6", run: (x) => expectEqual(x.sum(1, 2, 3), 6) },
    { name: "sum() with no arguments returns 0", run: (x) => expectEqual(x.sum(), 0) },
    { name: "mergeSettings applies overrides on top of defaults", run: (x) => {
        const merged = x.mergeSettings({ theme: "light", fontSize: 14 }, { theme: "dark" });
        expectDeepEqual(merged, { theme: "dark", fontSize: 14 });
      } },
    { name: "mergeSettings does NOT mutate defaults (with-expression semantics)", run: (x) => {
        const defaults = { theme: "light", fontSize: 14 };
        const merged = x.mergeSettings(defaults, { fontSize: 16 });
        expectTruthy(merged !== defaults);
        expectDeepEqual(defaults, { theme: "light", fontSize: 14 });
      } },
    { name: 'appendItem(["a", "b"], "c") returns ["a", "b", "c"]', run: (x) => expectDeepEqual(x.appendItem(["a", "b"], "c"), ["a", "b", "c"]) },
    { name: "appendItem returns a NEW array and leaves the input untouched", run: (x) => {
        const items = [1, 2];
        const result = x.appendItem(items, 3);
        expectTruthy(result !== items);
        expectDeepEqual(items, [1, 2]);
        expectDeepEqual(result, [1, 2, 3]);
      } },
  ],

  solution: `type Settings = { theme: string; fontSize: number };

function sum(...nums: number[]): number {
  return nums.reduce((total, n) => total + n, 0);
}

function mergeSettings(defaults: Settings, overrides: { theme?: string; fontSize?: number }): Settings {
  // defaults with { ... } — copy everything, later spreads win.
  return { ...defaults, ...overrides };
}

function appendItem<T>(items: T[], item: T): T[] {
  return [...items, item];
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>TypeScript</th></tr>
  <tr><td>Variadic function</td><td><code>void Log(params string[] parts)</code></td><td><code>function log(...parts: string[])</code></td></tr>
  <tr><td>Pass an array to it</td><td><code>Log(arr)</code> (params accepts the array)</td><td><code>log(...arr)</code> (spread it explicitly)</td></tr>
  <tr><td>Concatenate collections</td><td><code>[..a, ..b]</code> (C# 12)</td><td><code>[...a, ...b]</code></td></tr>
  <tr><td>Copy-with-changes</td><td><code>user with { Name = "X" }</code></td><td><code>{ ...user, name: "X" }</code></td></tr>
  <tr><td>Merge, later wins</td><td>chain <code>with</code> expressions</td><td><code>{ ...defaults, ...overrides }</code></td></tr>
  <tr><td>Immutable append</td><td><code>list.Add</code> mutates; use Immutable collections</td><td><code>[...items, item]</code></td></tr>
</table>
<p>One caveat to carry from this lesson: spread makes a <em>shallow</em> copy,
exactly like a record <code>with</code>-expression — nested objects are shared
by reference, not cloned. <code>{ ...user, address: { ...user.address, city:
"Oslo" } }</code> is the idiom for one level down. And unlike C#'s
<code>params</code>, passing an existing array to a rest parameter needs an
explicit spread at the call site (<code>sum(...values)</code>) — the symmetry
of the three dots (gather in the signature, scatter at the call) is the whole
mental model.</p>`,
};
