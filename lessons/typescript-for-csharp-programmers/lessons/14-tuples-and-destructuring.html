<title>Lesson 14: Tuples & Destructuring</title>

<div id="app"></div>
<script>
const LESSON = {
  number: 14,
  title: "Tuples & Destructuring",

  intro: `
<p>C# value tuples map straight across: the type <code>(int, string)</code>
becomes <code>[number, string]</code> — a TypeScript <em>tuple type</em>, an
array whose length and per-position types are fixed by the compiler. Building
one is just an array literal (<code>[3, "three"]</code>), and deconstruction
looks almost identical: <code>var (x, y) = point;</code> becomes
<code>const [x, y] = point;</code>. No <code>Item1</code>/<code>Item2</code>
in sight — positions get names the moment you destructure.</p>
<table>
  <tr><th>C#</th><th>TypeScript</th></tr>
  <tr><td><code>(int, string) pair = (1, "one");</code></td><td><code>const pair: [number, string] = [1, "one"];</code></td></tr>
  <tr><td><code>var (x, y) = point;</code></td><td><code>const [x, y] = point;</code></td></tr>
  <tr><td><code>pair.Item1</code>, <code>pair.Item2</code></td><td><code>pair[0]</code>, <code>pair[1]</code> (but prefer destructuring)</td></tr>
  <tr><td><code>var (name, role) = user;</code> (needs a <code>Deconstruct</code>)</td><td><code>const { name, role } = user;</code> (works on any object)</td></tr>
  <tr><td>—</td><td><code>const { name: userName, role = "user" } = user;</code> (rename + default)</td></tr>
</table>
<p>Then TypeScript goes further than C#: <em>object</em> destructuring works on
any object, no <code>Deconstruct</code> method required —
<code>const { name, role } = user;</code> pulls properties out by name. You can
rename as you extract (<code>{ name: userName }</code> reads "property
<code>name</code>, into variable <code>userName</code>" — handy when adapting a
PascalCase API) and supply defaults (<code>{ role = "user" }</code>). Best of
all, you can destructure a <em>parameter</em> right in the function signature,
which is the standard idiom for the options-object pattern you met in
Lesson 5.</p>`,

  csharp: `static class Geometry
{
    static double Distance((double X, double Y) p)
    {
        var (x, y) = p;                  // tuple deconstruction
        return Math.Sqrt(x * x + y * y);
    }

    static (string, int) SwapPair((int, string) pair) =>
        (pair.Item2, pair.Item1);
}

record User(string Name, string Role = "user");

static class Formatting
{
    static string FormatUser(User user)
    {
        var (name, role) = user;         // records generate Deconstruct
        return $"{name} ({role})";
    }
}`,

  task: `
<p>Port the tuple and deconstruction code:</p>
<ol>
  <li><code>distance(p: [number, number]): number</code> — distance from the
      origin. Destructure the tuple with <code>const [x, y] = p;</code> first,
      then use <code>Math.sqrt</code>.</li>
  <li><code>swapPair(pair: [number, string]): [string, number]</code> — return
      a new tuple with the elements swapped, so <code>[1, "one"]</code> becomes
      <code>["one", 1]</code>.</li>
  <li><code>formatUser</code> — take a <code>{ name: string; role?: string }</code>
      object and return <code>"Name (role)"</code>, e.g. <code>"Ada (admin)"</code>.
      Destructure <em>in the parameter list</em> and default <code>role</code>
      to <code>"user"</code>: <code>function formatUser({ name, role = "user" }: ...)</code>.
      That is the record's <code>Deconstruct</code> plus the default parameter,
      in one signature.</li>
</ol>`,

  starter: `// 1. Distance from the origin — destructure the tuple first.
//    C#: var (x, y) = p;   TS: const [x, y] = p;
function distance(p: [number, number]): number {
  // TODO: destructure p, then Math.sqrt(x * x + y * y)
  return 0;
}

// 2. Swap a [number, string] into a [string, number].
function swapPair(pair: [number, string]): [string, number] {
  // TODO: destructure and return the reversed tuple
  return ["", 0];
}

// 3. Destructure the parameter itself, with a default for role.
//    Target signature: formatUser({ name, role = "user" }: { name: string; role?: string })
function formatUser(user: { name: string; role?: string }): string {
  // TODO: move the destructuring into the parameter list, return "Name (role)"
  return "";
}
`,

  exportNames: ["distance", "swapPair", "formatUser"],

  requirements: [
    { pattern: /\[\s*number\s*,\s*number\s*\]/, message: "Type distance's parameter as the tuple [number, number]" },
    { pattern: /const\s*\[/, message: "Destructure a tuple with const [x, y] = ... (the var (x, y) = ... of TS)" },
    { pattern: /formatUser\s*\(\s*\{\s*name/, message: "Destructure formatUser's parameter in the signature: formatUser({ name, ... })" },
    { pattern: /role\s*=\s*"user"/, message: 'Give role a destructuring default: { name, role = "user" }' },
  ],

  tests: [
    { name: "distance([3, 4]) returns 5", run: (x) => expectEqual(x.distance([3, 4]), 5) },
    { name: "distance([0, 0]) returns 0", run: (x) => expectEqual(x.distance([0, 0]), 0) },
    { name: 'swapPair([1, "one"]) returns ["one", 1]', run: (x) => expectDeepEqual(x.swapPair([1, "one"]), ["one", 1]) },
    { name: 'swapPair([42, "answer"]) returns ["answer", 42]', run: (x) => expectDeepEqual(x.swapPair([42, "answer"]), ["answer", 42]) },
    { name: 'formatUser({ name: "Ada", role: "admin" }) returns "Ada (admin)"', run: (x) => expectEqual(x.formatUser({ name: "Ada", role: "admin" }), "Ada (admin)") },
    { name: 'formatUser({ name: "Grace" }) defaults the role: "Grace (user)"', run: (x) => expectEqual(x.formatUser({ name: "Grace" }), "Grace (user)") },
  ],

  solution: `function distance(p: [number, number]): number {
  const [x, y] = p;
  return Math.sqrt(x * x + y * y);
}

function swapPair(pair: [number, string]): [string, number] {
  const [num, word] = pair;
  return [word, num];
}

function formatUser({ name, role = "user" }: { name: string; role?: string }): string {
  return \`\${name} (\${role})\`;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>TypeScript</th></tr>
  <tr><td>Tuple type</td><td><code>(int, string)</code></td><td><code>[number, string]</code></td></tr>
  <tr><td>Tuple literal</td><td><code>(1, "one")</code></td><td><code>[1, "one"]</code></td></tr>
  <tr><td>Deconstruct a tuple</td><td><code>var (x, y) = p;</code></td><td><code>const [x, y] = p;</code></td></tr>
  <tr><td>Deconstruct an object</td><td>Needs <code>Deconstruct</code> (records get one free)</td><td><code>const { name, role } = user;</code> — any object</td></tr>
  <tr><td>Rename while extracting</td><td><code>var (n, r) = user;</code> (positional only)</td><td><code>const { name: userName } = user;</code> (by name)</td></tr>
  <tr><td>Default while extracting</td><td>—</td><td><code>const { role = "user" } = user;</code></td></tr>
  <tr><td>Discard</td><td><code>var (_, y) = p;</code></td><td><code>const [, y] = p;</code></td></tr>
</table>
<p>Runtime reality check: a TypeScript tuple is just a plain JavaScript array —
the fixed length and per-slot types are compile-time constraints that erase
completely, exactly like the literal unions in Lesson 11. That's why
tuple-heavy APIs are rarer in TS than in C#: once positions need meaning, an
object with named properties (destructured at the call site) usually reads
better than <code>pair[0]</code> ever will.</p>`,
};
</script>
