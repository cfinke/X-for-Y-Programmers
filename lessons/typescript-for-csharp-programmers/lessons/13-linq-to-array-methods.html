const LESSON = {
  number: 13,
  title: "LINQ → Array Methods",

  intro: `
<p>If LINQ method chains are muscle memory, arrays in TypeScript will feel like
home with the labels swapped:
<code>products.Where(p =&gt; p.InStock).Select(p =&gt; p.Name).ToList()</code>
becomes <code>products.filter(p =&gt; p.inStock).map(p =&gt; p.name)</code>.
Same lambdas (note the PascalCase → camelCase property names), same chaining —
and no <code>ToList()</code>, because there is nothing to materialize: array
methods are <em>eager</em>. Each call does its work immediately and returns a
real array, unlike <code>IEnumerable</code>'s deferred pipelines that only
execute on enumeration.</p>
<table>
  <tr><th>C# (LINQ)</th><th>TypeScript</th></tr>
  <tr><td><code>.Where(p =&gt; p.InStock)</code></td><td><code>.filter(p =&gt; p.inStock)</code></td></tr>
  <tr><td><code>.Select(p =&gt; p.Name)</code></td><td><code>.map(p =&gt; p.name)</code></td></tr>
  <tr><td><code>.Aggregate(0m, (sum, p) =&gt; ...)</code> / <code>.Sum(...)</code></td><td><code>.reduce((sum, p) =&gt; ..., 0)</code> (seed goes <em>last</em>)</td></tr>
  <tr><td><code>.OrderBy(p =&gt; p.Price).ToList()</code></td><td><code>[...arr].sort((a, b) =&gt; a.price - b.price)</code></td></tr>
  <tr><td><code>.Any(...)</code> / <code>.All(...)</code> / <code>.FirstOrDefault(...)</code></td><td><code>.some(...)</code> / <code>.every(...)</code> / <code>.find(...)</code></td></tr>
</table>
<p>Two traps for LINQ hands. First, sorting: <code>OrderBy</code> returns a new
sequence and takes a <em>key selector</em>; <code>.sort()</code> takes a
<em>comparator returning a number</em> (negative, zero, positive — think
<code>IComparer&lt;T&gt;.Compare</code>, so <code>a.price - b.price</code>
sorts ascending) and, worse, it <em>mutates the array in place</em>. The idiom
is to copy first: <code>[...products].sort(...)</code>. Second,
<code>reduce</code> is <code>Aggregate</code> with the seed moved to the
<em>end</em> of the argument list — forget the seed and the first element
silently becomes it.</p>`,

  csharp: `record Product(string Name, decimal Price, int Quantity, bool InStock);

static class Report
{
    static List<string> InStockNames(List<Product> products) =>
        products.Where(p => p.InStock)
                .Select(p => p.Name)
                .ToList();

    static decimal TotalValue(List<Product> products) =>
        products.Aggregate(0m, (sum, p) => sum + p.Price * p.Quantity);
        // or simply: products.Sum(p => p.Price * p.Quantity)

    static List<Product> SortByPrice(List<Product> products) =>
        products.OrderBy(p => p.Price).ToList();
        // OrderBy is non-destructive: the original list is untouched
}`,

  task: `
<p>The starter defines a <code>Product</code> interface. Port the LINQ report:</p>
<ol>
  <li><code>inStockNames(products: Product[]): string[]</code> — names of the
      in-stock products, in order: <code>filter</code> then <code>map</code>
      (Where → Select).</li>
  <li><code>totalValue(products: Product[]): number</code> — sum of
      <code>price * quantity</code> over all products, via <code>reduce</code>
      with a seed of <code>0</code> (Aggregate, seed last).</li>
  <li><code>sortByPrice(products: Product[]): Product[]</code> — a <em>new</em>
      array sorted by ascending price. The input array must not be modified —
      copy with <code>[...products]</code> (or <code>.slice()</code>) before
      calling <code>.sort()</code>, and remember the comparator returns a
      number, not a key.</li>
</ol>`,

  starter: `interface Product {
  name: string;
  price: number;
  quantity: number;
  inStock: boolean;
}

// 1. Where(p => p.InStock).Select(p => p.Name).ToList()
function inStockNames(products: Product[]): string[] {
  // TODO: filter, then map
  return [];
}

// 2. Aggregate(0m, (sum, p) => sum + p.Price * p.Quantity)
function totalValue(products: Product[]): number {
  // TODO: reduce — note the seed goes LAST: .reduce(fn, 0)
  return 0;
}

// 3. OrderBy(p => p.Price).ToList() — but .sort() mutates! Copy first.
function sortByPrice(products: Product[]): Product[] {
  // TODO: [...products].sort(comparator) — comparator returns a number
  return products;
}
`,

  exportNames: ["inStockNames", "totalValue", "sortByPrice"],

  requirements: [
    { pattern: /\.filter\s*\(/, message: "Use .filter() — the Where of the array world" },
    { pattern: /\.map\s*\(/, message: "Use .map() — the Select of the array world" },
    { pattern: /\.reduce\s*\(/, message: "Compute totalValue with .reduce() (Aggregate with the seed last)" },
    { pattern: /\.sort\s*\(/, message: "Sort with .sort() and a number-returning comparator, on a copy of the array" },
  ],

  tests: [
    { name: 'inStockNames returns ["Keyboard", "Mouse"] for the sample inventory', run: (x) => {
        const products = [
          { name: "Keyboard", price: 50, quantity: 2, inStock: true },
          { name: "Monitor", price: 200, quantity: 1, inStock: false },
          { name: "Mouse", price: 25, quantity: 4, inStock: true },
        ];
        expectDeepEqual(x.inStockNames(products), ["Keyboard", "Mouse"]);
      } },
    { name: "inStockNames([]) returns []", run: (x) => expectDeepEqual(x.inStockNames([]), []) },
    { name: "totalValue sums price * quantity (sample inventory: 400)", run: (x) => {
        const products = [
          { name: "Keyboard", price: 50, quantity: 2, inStock: true },
          { name: "Monitor", price: 200, quantity: 1, inStock: false },
          { name: "Mouse", price: 25, quantity: 4, inStock: true },
        ];
        expectEqual(x.totalValue(products), 400);
      } },
    { name: "totalValue([]) returns 0 (the seed matters!)", run: (x) => expectEqual(x.totalValue([]), 0) },
    { name: "sortByPrice orders ascending by price", run: (x) => {
        const products = [
          { name: "Keyboard", price: 50, quantity: 2, inStock: true },
          { name: "Monitor", price: 200, quantity: 1, inStock: false },
          { name: "Mouse", price: 25, quantity: 4, inStock: true },
        ];
        expectDeepEqual(x.sortByPrice(products).map((p) => p.name), ["Mouse", "Keyboard", "Monitor"]);
      } },
    { name: "sortByPrice does NOT mutate the original array (OrderBy semantics)", run: (x) => {
        const products = [
          { name: "Keyboard", price: 50, quantity: 2, inStock: true },
          { name: "Monitor", price: 200, quantity: 1, inStock: false },
          { name: "Mouse", price: 25, quantity: 4, inStock: true },
        ];
        const result = x.sortByPrice(products);
        expectTruthy(result !== products);
        expectDeepEqual(products.map((p) => p.name), ["Keyboard", "Monitor", "Mouse"]);
      } },
  ],

  solution: `interface Product {
  name: string;
  price: number;
  quantity: number;
  inStock: boolean;
}

function inStockNames(products: Product[]): string[] {
  return products.filter((p) => p.inStock).map((p) => p.name);
}

function totalValue(products: Product[]): number {
  return products.reduce((sum, p) => sum + p.price * p.quantity, 0);
}

function sortByPrice(products: Product[]): Product[] {
  // .sort() mutates in place, so copy first — the OrderBy safety you're used to.
  return [...products].sort((a, b) => a.price - b.price);
}
`,

  notes: `
<table>
  <tr><th>LINQ</th><th>TypeScript</th><th>Watch out</th></tr>
  <tr><td><code>Where</code></td><td><code>filter</code></td><td>—</td></tr>
  <tr><td><code>Select</code></td><td><code>map</code></td><td>—</td></tr>
  <tr><td><code>Aggregate(seed, fn)</code> / <code>Sum</code></td><td><code>reduce(fn, seed)</code></td><td>Seed is the <em>last</em> argument; omit it and [] throws</td></tr>
  <tr><td><code>OrderBy(keySelector)</code></td><td><code>[...arr].sort(comparator)</code></td><td><code>sort</code> mutates; comparator returns a number, not a key</td></tr>
  <tr><td><code>Any / All / First­OrDefault / Contains</code></td><td><code>some / every / find / includes</code></td><td><code>find</code> returns <code>undefined</code>, not <code>default</code></td></tr>
  <tr><td><code>ToList() / ToArray()</code></td><td>Not needed</td><td>Every step already returns a real array</td></tr>
</table>
<p>The eager-vs-deferred difference cuts both ways. You lose LINQ's free
laziness — a five-method chain over a million items builds intermediate arrays
at every step, where <code>IEnumerable</code> would stream — but you also lose
the classic deferred-execution bugs: no multiple enumeration, no query silently
re-running, no captured variable changing between definition and enumeration.
For typical UI- and API-sized collections, eager is the simpler default; reach
for generators (<code>function*</code>) on the rare day you genuinely need
streaming.</p>`,
};
