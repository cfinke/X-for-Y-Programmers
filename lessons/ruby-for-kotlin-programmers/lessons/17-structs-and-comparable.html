  number: 17,
  title: "Structs & Comparable",

  intro: `
<p>Kotlin's <code>data class</code> is a big convenience: accessors,
<code>equals</code>, <code>hashCode</code>, <code>toString</code>, and
<code>copy</code> from one declaration. Ruby has had that for decades:
<code>Point = Struct.new(:x, :y)</code> is one line that gives you accessors,
<strong>value equality</strong>, and destructuring
(<code>x, y = *point</code>). Pass <code>Struct.new</code> a block and you can
add methods to it, exactly like a data class body.</p>
<table>
  <tr><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td><code>data class Point(val x: Int, val y: Int)</code></td><td><code>Point = Struct.new(:x, :y)</code></td></tr>
  <tr><td><code>Point(1, 2)</code></td><td><code>Point.new(1, 2)</code></td></tr>
  <tr><td><code>p.x</code></td><td><code>p.x</code></td></tr>
  <tr><td><code>: Comparable&lt;Version&gt;</code></td><td><code>include Comparable</code></td></tr>
  <tr><td><code>override fun compareTo(o: Version): Int</code></td><td><code>def &lt;=&gt;(other)</code></td></tr>
  <tr><td><code>a &lt; b</code></td><td><code>a &lt; b</code></td></tr>
</table>
<p>The <code>Comparable</code> story will feel familiar from Kotlin, where
implementing <code>compareTo</code> already lights up the
<code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, and <code>&gt;=</code>
operators through operator conventions. Ruby works the same way: <code>include
Comparable</code> plus one <code>&lt;=&gt;</code> (the "spaceship operator",
Ruby's <code>compareTo</code>: -1, 0, or 1) hands you <code>&lt;</code>,
<code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>, <code>==</code>,
<code>between?</code>, <code>clamp</code>, and sorting, all for free — a little
more than Kotlin gives you (you'd reach for <code>a in lo..hi</code> and
<code>coerceIn</code> for the last two). Bonus trick: arrays already compare
element by element, so
<code>[major, minor] &lt;=&gt; [other.major, other.minor]</code> is a complete
multi-field comparison — the equivalent of Kotlin's
<code>compareValuesBy(this, o, { it.major }, { it.minor })</code>.</p>`,

  kotlin: `import kotlin.math.pow
import kotlin.math.sqrt

data class Point(val x: Int, val y: Int) {
    fun distanceTo(other: Point): Double =
        sqrt((x - other.x).toDouble().pow(2) + (y - other.y).toDouble().pow(2))
}

class Version(val major: Int, val minor: Int) : Comparable<Version> {
    override fun compareTo(other: Version): Int =
        compareValuesBy(this, other, { it.major }, { it.minor })
    // Kotlin lights up <, >, <=, >= from compareTo — but you still spell it out.
}`,

  task: `
<p>Build both types from the Kotlin:</p>
<ol>
  <li>Define <code>Point = Struct.new(:x, :y)</code> using the
      <strong>block form</strong>, and inside the block implement
      <code>distance_to(other)</code> — the usual
      <code>Math.sqrt((x - other.x) ** 2 + (y - other.y) ** 2)</code>. Note
      you refer to <code>x</code> and <code>y</code> bare: they are the
      struct's accessor methods.</li>
  <li>Write <code>class Version</code> with
      <code>include Comparable</code>, <code>attr_reader :major, :minor</code>,
      an <code>initialize(major, minor)</code> that assigns both ivars, and
      <code>def &lt;=&gt;(other)</code> that compares
      <code>[major, minor] &lt;=&gt; [other.major, other.minor]</code>. That
      single method must make <code>&lt;</code>, <code>sort</code>, and
      <code>between?</code> all work.</li>
</ol>`,

  def <=>(other)
    raise NotImplementedError, "TODO: implement <=>"
  end
end
`,

  requirements: [
    { pattern: /Struct\.new/, message: "Define Point with Struct.new" },
    { pattern: /def\s+distance_to/, message: "Implement distance_to inside the Struct.new block" },
    { pattern: /include\s+Comparable/, message: "include Comparable in Version" },
    { pattern: /<=>/, message: "Define the spaceship operator <=>" },
  ],

  tests: [
    { name: "Point.new(0, 0).distance_to(Point.new(3, 4)) is 5.0",
      code: "  expect_eq(Point.new(0, 0).distance_to(Point.new(3, 4)), 5.0)" },
    { name: "Points have value equality and destructure with *",
      code: `  expect_true(Point.new(1, 2) == Point.new(1, 2))
  x, y = *Point.new(3, 4)
  expect_eq([x, y], [3, 4])` },
    { name: "Version.new(1, 2) < Version.new(1, 10) — a free operator",
      code: "  expect_true(Version.new(1, 2) < Version.new(1, 10))" },
    { name: "Versions sort correctly (1.9 < 1.10 < 2.0)",
      code: `  sorted = [Version.new(2, 0), Version.new(1, 10), Version.new(1, 9)].sort
  expect_eq(sorted.map { |v| [v.major, v.minor] }, [[1, 9], [1, 10], [2, 0]])` },
    { name: "Version.new(1, 5).between?(1.0, 2.0) — also free",
      code: "  expect_true(Version.new(1, 5).between?(Version.new(1, 0), Version.new(2, 0)))" },
  ],

  solution: `Point = Struct.new(:x, :y) do
  def distance_to(other)
    Math.sqrt((x - other.x) ** 2 + (y - other.y) ** 2)
  end
end

class Version
  include Comparable

  attr_reader :major, :minor

  def initialize(major, minor)
    @major = major
    @minor = minor
  end

  def <=>(other)
    [major, minor] <=> [other.major, other.minor]
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td>Value type</td><td><code>data class Point(val x: Int, val y: Int)</code></td><td><code>Point = Struct.new(:x, :y)</code></td></tr>
  <tr><td>Extra methods</td><td>data class body</td><td><code>Struct.new(:x, :y) do ... end</code></td></tr>
  <tr><td>Value equality</td><td>generated <code>equals</code>/<code>hashCode</code></td><td><code>==</code> for free from Struct</td></tr>
  <tr><td>Destructuring</td><td><code>val (x, y) = point</code> (componentN)</td><td><code>x, y = *point</code></td></tr>
  <tr><td>Comparable</td><td><code>: Comparable&lt;T&gt;</code> + <code>compareTo</code></td><td><code>include Comparable</code> + <code>&lt;=&gt;</code></td></tr>
  <tr><td>Multi-field compare</td><td><code>compareValuesBy(a, b, { it.x }, { it.y })</code></td><td><code>[a, b] &lt;=&gt; [other.a, other.b]</code></td></tr>
  <tr><td>What you get</td><td><code>compareTo</code>, <code>&lt; &gt; &lt;= &gt;=</code>, <code>sorted</code></td><td><code>&lt; &gt; &lt;= &gt;= == between? clamp min max sort</code></td></tr>
  <tr><td>Immutable version</td><td>data class with <code>val</code> (immutable)</td><td><code>Data.define(:x, :y)</code> (Ruby 3.2+; Struct is mutable)</td></tr>
</table>
<p>The reason Comparable can be so generous is the lesson-7 principle:
operators in Ruby are just method calls, so a module can define
<code>&lt;</code> in terms of your <code>&lt;=&gt;</code> and mix it in.
Kotlin gets there through operator conventions — <code>compareTo</code>
powers <code>&lt;</code> and friends — but stops at the operators; Ruby's
module throws in <code>between?</code> and <code>clamp</code> too (Kotlin's
equivalents are <code>a in lo..hi</code> and <code>coerceIn</code>). One
caveat for the data-class-minded: classic <code>Struct</code> members are
mutable (<code>p.x = 9</code> works), unlike a <code>val</code> in a Kotlin
data class; when you want real immutable-record semantics, reach for
<code>Data.define</code>.</p>`,
};
