  title: "Nil & Safe Navigation",

  intro: `
<p>Kotlin fixed the "billion-dollar mistake" at the type level:
<code>String</code> can never be <code>null</code>, only <code>String?</code>
can, and the compiler makes you deal with it — <code>?.</code> to reach through
safely, <code>?:</code> (Elvis) for the fallback, <code>!!</code> when you
insist. Ruby keeps the operators but drops the types. Its <code>nil</code> is a
real object, an instance of <code>NilClass</code>, and <em>any</em> value can be
<code>nil</code> — there's no <code>String</code> vs <code>String?</code>
distinction. The good news: Ruby's <code>&amp;.</code> is your <code>?.</code>,
and <code>||</code> plays the role of <code>?:</code>, so the chains you already
write in Kotlin translate almost character for character.</p>
<table>
  <tr><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td><code>null</code></td><td><code>nil</code> (an object: <code>nil.class</code> is <code>NilClass</code>)</td></tr>
  <tr><td><code>user?.address?.city ?: "Unknown"</code></td><td><code>u&amp;.address&amp;.city || "Unknown"</code></td></tr>
  <tr><td><code>x == null</code></td><td><code>x.nil?</code></td></tr>
  <tr><td><code>map.getOrDefault(k, d)</code></td><td><code>hash[k] || d</code></td></tr>
  <tr><td><code>cache = cache ?: load()</code></td><td><code>cache ||= load</code></td></tr>
</table>
<p>The rule that makes <code>||</code> safe to lean on: <strong>only
<code>nil</code> and <code>false</code> are falsy</strong>. Ruby has no static
nullable types, but it does have truthiness — where Kotlin forces a
<code>Boolean</code> in every <code>if</code>, Ruby lets any value stand in.
<code>0</code> and <code>""</code> are truthy, so <code>hash[:count] || 5</code>
only falls back when the key is genuinely absent — a stored <code>0</code>
survives, and conditions like <code>if user</code> read naturally. The related
idiom <code>x ||= default</code> assigns only when <code>x</code> is
<code>nil</code>/<code>false</code> — a lazy default in three characters, the
same job as <code>cache = cache ?: load()</code>.</p>`,

  kotlin: `data class Address(val city: String)
data class User(val address: Address?)

fun getCity(user: User?): String =
    // The safe-call chain: ?. short-circuits, ?: supplies the fallback.
    user?.address?.city ?: "Unknown"

fun pick(map: Map<String, Int>, key: String, fallback: Int): Int =
    map.getOrDefault(key, fallback)

fun firstOrDefault(items: List<String>, fallback: String): String =
    items.firstOrNull() ?: fallback`,

  solution: `class Address
  attr_reader :city

  def initialize(city)
    @city = city
  end
end

class User
  attr_reader :address

  def initialize(address = nil)
    @address = address
  end
end

def get_city(user)
  user&.address&.city || "Unknown"
end

def pick(hash, key, default)
  hash[key] || default
end

def first_or_default(arr, default)
  arr.first || default
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td>The absent value</td><td><code>null</code> (not an object)</td><td><code>nil</code> (an object; has methods like <code>nil.to_s</code>)</td></tr>
  <tr><td>Null check</td><td><code>x == null</code></td><td><code>x.nil?</code> — or just <code>if x</code></td></tr>
  <tr><td>Safe chain</td><td><code>x?.foo?.bar</code></td><td><code>x&amp;.foo&amp;.bar</code></td></tr>
  <tr><td>Fallback</td><td><code>x ?: d</code> / <code>getOrDefault</code></td><td><code>value || d</code></td></tr>
  <tr><td>Lazy init</td><td><code>x = x ?: ...</code> / <code>by lazy</code></td><td><code>x ||= ...</code></td></tr>
  <tr><td>Falsy values</td><td>conditions must be <code>Boolean</code> — no truthiness</td><td>only <code>nil</code> and <code>false</code> — <code>0</code> and <code>""</code> are truthy</td></tr>
</table>
<p>The NPE doesn't vanish — calling a method on <code>nil</code> raises
<code>NoMethodError: undefined method for nil</code>, Ruby's equivalent — but
<code>&amp;.</code> makes the "stop and return nil instead" choice a single
character at each step, right where you'd reach for a <code>?.</code> chain in
Kotlin. One caution: unlike Kotlin's <code>?:</code>, which fires only on
<code>null</code>, Ruby's <code>||</code> also replaces a stored
<code>false</code>, so for hashes that legitimately store booleans, prefer
<code>hash.fetch(key, default)</code>.</p>`,
