  title: "Arrays",

  intro: `
<p>Kotlin gives you two sequence families with different rules: fixed-size
arrays (<code>IntArray</code> / <code>Array&lt;Int&gt;</code> — allocated once,
its own <code>.size</code>, no growing) and collections
(<code>MutableList&lt;Int&gt;</code> — growable, method calls). Ruby has exactly
one: <code>Array</code>. It's written <code>[1, 2, 3]</code>, it grows freely,
and since everything is an object it can hold mixed types —
<code>[1, "two", 3.0]</code> is legal (whether it's wise is another matter).</p>
<table>
  <tr><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td><code>intArrayOf(1, 2, 3)</code> / <code>mutableListOf&lt;Int&gt;()</code></td><td><code>a = [1, 2, 3]</code></td></tr>
  <tr><td><code>list.add(x)</code></td><td><code>a &lt;&lt; x</code> (the shovel)</td></tr>
  <tr><td><code>list.size</code></td><td><code>a.size</code> or <code>a.length</code> (same thing)</td></tr>
  <tr><td><code>list.contains(x)</code> / <code>x in list</code></td><td><code>a.include?(x)</code></td></tr>
  <tr><td><code>list[list.size - 1]</code> / <code>list.last()</code></td><td><code>a[-1]</code> or <code>a.last</code></td></tr>
  <tr><td><code>nums.sum()</code></td><td><code>a.sum</code></td></tr>
</table>
<p>Two idioms to adopt on day one. <strong>The shovel:</strong>
<code>a &lt;&lt; x</code> appends in place — it's <code>list.add(x)</code>
with the ceremony boiled off, and it returns the array so you can chain it.
<strong>Negative indexing:</strong> <code>a[-1]</code> is the last element,
<code>a[-2]</code> the one before — Kotlin has no negative subscripts, so this
replaces both <code>list[list.size - 1]</code> and <code>list.last()</code>.
There are also friendly <code>a.first</code> and <code>a.last</code>, and range
slices like <code>a[1..2]</code> (elements 1 through 2) where Kotlin would reach
for <code>subList</code> or <code>slice</code>.</p>`,

  kotlin: `fun main() {
    val scores = mutableListOf<Int>()
    scores.add(85)
    scores.add(92)
    scores.add(78)

    val count = scores.size
    val hasTop = 92 in scores

    val first = scores.first()
    val last = scores[scores.size - 1]   // or scores.last()

    val total = scores.sum()
}`,

  task: `
<p>Rebuild the score handling in Ruby:</p>
<ol>
  <li><code>make_scores</code> — start from an empty array <code>[]</code> and
      shovel <code>85</code>, <code>92</code>, <code>78</code> into it with
      <code>&lt;&lt;</code>, then make the array the last expression.</li>
  <li><code>append(arr, x)</code> — push <code>x</code> onto <code>arr</code>
      with the shovel and produce the array (<code>&lt;&lt;</code> already
      returns it — one line).</li>
  <li><code>total(nums)</code> — sum the numbers. Kotlin's
      <code>nums.sum()</code> becomes one word with no parens:
      <code>.sum</code>.</li>
  <li><code>ends(arr)</code> — a two-element array of the first and last
      elements: <code>[arr.first, arr.last]</code> (or flex the negative
      index: <code>arr[-1]</code>).</li>
</ol>`,

  tests: [

    { name: "total([]) returns 0",

  solution: `def make_scores
  scores = []
  scores << 85
  scores << 92
  scores << 78
  scores
end

def append(arr, x)
  arr << x
end

def total(nums)
  nums.sum
end

def ends(arr)
  [arr.first, arr.last]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td>Literal</td><td><code>listOf(1, 2, 3)</code> / <code>intArrayOf(1, 2, 3)</code></td><td><code>[1, 2, 3]</code></td></tr>
  <tr><td>Append</td><td><code>list.add(x)</code></td><td><code>a &lt;&lt; x</code> (or <code>a.push(x)</code>)</td></tr>
  <tr><td>Size</td><td><code>list.size</code></td><td><code>a.size</code> / <code>a.length</code> — aliases</td></tr>
  <tr><td>Membership</td><td><code>list.contains(x)</code> / <code>x in list</code></td><td><code>a.include?(x)</code></td></tr>
  <tr><td>Last element</td><td><code>list.last()</code> / <code>list[list.size - 1]</code></td><td><code>a[-1]</code> or <code>a.last</code></td></tr>
  <tr><td>First element</td><td><code>list.first()</code> / <code>list[0]</code></td><td><code>a[0]</code> or <code>a.first</code></td></tr>
  <tr><td>Slice</td><td><code>list.subList(1, 3)</code> / <code>list.slice(1..2)</code></td><td><code>a[1..2]</code> (or <code>a[1...3]</code>, end-exclusive)</td></tr>
  <tr><td>Sum</td><td><code>nums.sum()</code></td><td><code>a.sum</code></td></tr>
</table>
<p>Out-of-bounds access is another culture shock: <code>a[99]</code> quietly
gives you <code>nil</code> instead of throwing an
<code>IndexOutOfBoundsException</code>. That leniency is very Ruby — handy
right up until it isn't — and it's why lesson 6 is entirely about
<code>nil</code>. The functional power tools (<code>map</code>,
<code>select</code>, <code>reduce</code>) arrive in lesson 12.</p>`,
