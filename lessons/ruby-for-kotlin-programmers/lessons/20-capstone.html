<p>Last lesson — no new concepts, just the course put to work. You'll build a
tiny inventory module: a class with <code>attr_reader</code> accessors
(lesson 9), queried and transformed with Enumerable and blocks (lessons 11–13).
The Kotlin version on the left is a data class plus a handful of collection
pipelines and a nullable return; the Ruby version is four short methods.</p>
<table>
  <tr><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td><code>items.sumOf { it.priceCents * it.count }</code></td><td><code>items.sum { |i| ... }</code></td></tr>
  <tr><td><code>.find { ... }</code> → <code>Item?</code></td><td><code>items.find { |i| ... }</code> → the item, or <code>nil</code></td></tr>
  <tr><td><code>.filter { ... }.map { ... }</code></td><td><code>items.select { ... }.map { ... }</code></td></tr>
  <tr><td><code>it.copy(...)</code> instead of mutating</td><td><code>Item.new(...)</code> instead of mutating</td></tr>
</table>
<p>Two threads from earlier lessons come due here. Ruby's answer to Kotlin's
nullable types is simply <code>nil</code>: <code>find</code> returns
the matching object or <code>nil</code>, and lesson 6's tools
(<code>&amp;.</code>, <code>||=</code>) are how callers cope — exactly the role
<code>?.</code> and <code>?:</code> play in Kotlin. And objects are
references, just as in Kotlin — so when <code>restock</code> must not mutate
its input, "change" means building a <em>new</em> array containing a
<em>new</em> <code>Item</code> for the match (Kotlin's <code>copy</code>),
passing the originals through untouched.</p>`,

  kotlin: `data class Item(val name: String, val priceCents: Int, val count: Int)

fun totalValue(items: List<Item>): Int =
    items.sumOf { it.priceCents * it.count }

fun findItem(items: List<Item>, name: String): Item? =
    items.find { it.name == name }

fun restock(items: List<Item>, name: String, amount: Int): List<Item> =
    items.map { i ->
        if (i.name == name) i.copy(count = i.count + amount) else i
    }

fun namesInStock(items: List<Item>): List<String> =
    items.filter { it.count > 0 }.map { it.name }`,

  solution: `class Item
  attr_reader :name, :price_cents, :count

  def initialize(name, price_cents, count)
    @name = name
    @price_cents = price_cents
    @count = count
  end
end

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }
end

def restock(items, name, amount)
  items.map do |i|
    if i.name == name
      Item.new(i.name, i.price_cents, i.count + amount)
    else
      i
    end
  end
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map { |i| i.name }
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td>Value class</td><td><code>data class Item(...)</code></td><td><code>class</code> + <code>attr_reader</code> (or <code>Struct</code>/<code>Data</code>, lesson 17)</td></tr>
  <tr><td>Sum a projection</td><td><code>sumOf { it... }</code></td><td><code>sum { |i| ... }</code></td></tr>
  <tr><td>First match</td><td><code>find { ... }</code> → <code>Item?</code></td><td><code>find { ... }</code> → item or <code>nil</code></td></tr>
  <tr><td>Handle the miss</td><td><code>item?.priceCents ?: x</code></td><td><code>item&amp;.price_cents || x</code> (lesson 6)</td></tr>
  <tr><td>Filter + project</td><td><code>filter { ... }.map { ... }</code></td><td><code>select { ... }.map { ... }</code></td></tr>
  <tr><td>Non-mutating update</td><td><code>it.copy(...)</code> in a <code>map</code></td><td><code>Item.new(...)</code> in a <code>map</code></td></tr>
</table>
<p>Notice how close the two columns sit — and where they differ. Both put the
collection methods on the collection itself; both reach for the same
<code>filter</code>/<code>map</code>/<code>find</code> vocabulary. The one real
divergence is absence: Kotlin encodes it in the type (<code>Item?</code>, with
<code>?.</code> and <code>?:</code> to unwrap), while Ruby leans on <code>nil</code>
and trusts the tests to catch the miss. That trade is the course in miniature:
Kotlin makes guarantees explicit in types; Ruby keeps the code bare and lets the
tests speak. You now know how to write the tests. Nicely done — that's the
course.</p>`,
