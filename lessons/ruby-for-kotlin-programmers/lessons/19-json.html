  title: "Working with JSON",

  intro: `
<p>JSON in Kotlin means picking a library (kotlinx.serialization, Jackson…),
adding a plugin or dependency, writing <code>@Serializable</code> data classes,
and sprinkling <code>@SerialName</code> when names don't line up. In Ruby,
<code>require "json"</code> pulls in the standard library and then serialization
is <em>a method on the data itself</em>: <code>data.to_json</code>. No
<code>Json</code> object, no serializable classes — the duck-typed Hash you
already have <strong>is</strong> the object.</p>
<table>
  <tr><th>Kotlin (kotlinx.serialization)</th><th>Ruby</th></tr>
  <tr><td><code>Json.encodeToString(obj)</code></td><td><code>data.to_json</code></td></tr>
  <tr><td><code>Json.decodeFromString&lt;T&gt;(s)</code></td><td><code>JSON.parse(s)</code></td></tr>
  <tr><td><code>@Serializable data class</code></td><td>— plain Hashes and Arrays</td></tr>
  <tr><td><code>element.jsonObject["a"]?.jsonObject?.get("b")</code></td><td><code>data.dig(:a, :b)</code></td></tr>
  <tr><td><code>SerializationException</code></td><td><code>JSON::ParserError</code> (rescue it)</td></tr>
</table>
<p>Two sharp edges to know. <code>JSON.parse(s)</code> returns Hashes keyed by
<strong>strings</strong> — faithful to JSON, but un-Ruby-ish; pass
<code>symbolize_names: true</code> to get the symbol keys idiomatic code
expects. And bad input raises <code>JSON::ParserError</code> — unchecked, like
every exception in Kotlin, so nothing forces you to handle it; a def-level
<code>rescue</code> is the usual guard. For reaching into nested structures,
<code>data.dig(:a, :b)</code> walks a path and returns <code>nil</code> at the
first miss instead of raising — Kotlin's <code>?.jsonObject?.get(...)</code>
chaining, one method.</p>`,

  kotlin: `// kotlinx.serialization: a plugin, a @Serializable class — before any actual JSON.
@Serializable
data class User(val name: String, val age: Int)

val json = Json.encodeToString(User("Ada", 36))
val user = Json.decodeFromString<User>(json)

// Untyped access goes through JsonElement:
val node = Json.parseToJsonElement(json).jsonObject
val name = node["name"]?.jsonPrimitive?.content ?: "unknown"
val age = node["age"]?.jsonPrimitive?.int ?: 0

// Bad input throws an (unchecked) SerializationException:
try {
    Json.decodeFromString<User>("not json")
} catch (e: SerializationException) {
    // recover
}`,

</ol>`,

  solution: `require "json"

def to_json_string(data)
  data.to_json
end

def parse_user(json)
  data = JSON.parse(json, symbolize_names: true)
  { name: data.fetch(:name, "unknown"), age: data.fetch(:age, 0) }
end

def pluck_names(json)
  JSON.parse(json, symbolize_names: true).map { |user| user[:name] }
end

def safe_parse(json)
  JSON.parse(json, symbolize_names: true)
rescue JSON::ParserError
  {}
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin (kotlinx.serialization)</th><th>Ruby</th></tr>
  <tr><td>Setup</td><td>add plugin, use <code>Json</code></td><td><code>require "json"</code> (stdlib)</td></tr>
  <tr><td>Serialize</td><td><code>Json.encodeToString(obj)</code></td><td><code>data.to_json</code></td></tr>
  <tr><td>Pretty print</td><td><code>Json { prettyPrint = true }</code></td><td><code>JSON.pretty_generate(data)</code></td></tr>
  <tr><td>Parse</td><td><code>Json.decodeFromString&lt;T&gt;(s)</code></td><td><code>JSON.parse(s)</code> → string-keyed Hash</td></tr>
  <tr><td>Symbol keys</td><td>n/a</td><td><code>JSON.parse(s, symbolize_names: true)</code></td></tr>
  <tr><td>Nested path</td><td><code>element.jsonObject["a"]?.jsonObject?.get("b")</code></td><td><code>data.dig(:a, :b)</code> (nil on miss)</td></tr>
  <tr><td>Missing field default</td><td><code>node["name"]?.jsonPrimitive?.content ?: "unknown"</code></td><td><code>hash.fetch(:name, "unknown")</code></td></tr>
  <tr><td>Bad input</td><td><code>SerializationException</code> (unchecked)</td><td><code>JSON::ParserError</code> (unchecked)</td></tr>
</table>
<p>The reason Ruby needs no serializable classes is duck typing (lesson 15):
kotlinx.serialization exists to bridge JSON's dynamic shape onto Kotlin's static
classes, and <code>@Serializable</code> data classes are the toll. Ruby's Hash is
already dynamically shaped, so JSON maps onto it directly — parsing gives you
data you can <code>dig</code> into immediately, and any Hash or Array can
announce itself as JSON. The one convention to internalize: JSON's keys are
strings, so <code>JSON.parse</code> honors that by default, and
<code>symbolize_names: true</code> is your explicit opt-in to Ruby's
symbol-keyed idiom.</p>`,
