  title: "Exceptions & Error Handling",

  intro: `
<p>Ruby's exception machinery maps almost one-to-one onto Kotlin's:
<code>begin/rescue/ensure</code> is <code>try/catch/finally</code>,
<code>raise</code> is <code>throw</code>, and a custom error is a class that
inherits from — Ruby writes <code>&lt;</code> where Kotlin writes <code>:</code>
— <code>StandardError</code>. And here is a comfort: just like Kotlin,
<strong>Ruby has no checked exceptions</strong>. No <code>@Throws</code>
obligations, no compiler forcing you to catch or declare. Both languages moved
that discipline out of the type system and into documentation and tests.</p>
<table>
  <tr><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td><code>try { ... } catch (e: E) { ... } finally { ... }</code></td><td><code>begin ... rescue E =&gt; e ... ensure ... end</code></td></tr>
  <tr><td><code>throw IllegalArgumentException("msg")</code></td><td><code>raise ArgumentError, "msg"</code></td></tr>
  <tr><td><code>class MyError(msg: String) : RuntimeException(msg)</code></td><td><code>class MyError &lt; StandardError; end</code></td></tr>
  <tr><td><code>catch (e: Exception)</code></td><td><code>rescue =&gt; e</code> (catches <code>StandardError</code> only)</td></tr>
  <tr><td><code>fun parse(s: String): Int</code> — no <code>throws</code></td><td>— no checked exceptions either</td></tr>
</table>
<p>Two idioms worth stealing immediately. First, a bare <code>rescue</code>
catches <code>StandardError</code>, <em>not</em> <code>Exception</code> — it
stops at the "recoverable" boundary automatically. Kotlin has no such built-in
cutoff: <code>catch (e: Exception)</code> already skips <code>Error</code>, but
a bare <code>rescue</code> hands you that safe default without naming a type at
all. Second, a whole method body can end with <code>rescue</code> — no
<code>begin</code> needed. <code>def ... rescue ... end</code> wraps the entire
method body in one <code>try/catch</code>, without the wrapping
<code>try { ... }</code> expression and extra indentation you would reach for in
Kotlin.</p>`,

  kotlin: `class EmptyCartException(message: String) : RuntimeException(message)

fun parseAge(s: String): Int {
    val t = s.trim()
    return t.toIntOrNull()
        ?: throw IllegalArgumentException("not a valid age: $s")
}

fun safeParseAge(s: String, defaultAge: Int): Int =
    try {
        parseAge(s)
    } catch (e: IllegalArgumentException) {
        defaultAge
    } finally {
        // cleanup would go here — Ruby calls this "ensure"
    }`,

  raise ArgumentError, "not a valid age: #{s.inspect}" unless s.strip.match?(/\\A\\d+\\z/)
  s.to_i
end

def safe_parse_age(s, default)
  parse_age(s)
rescue ArgumentError
  default
end

class EmptyCartError < StandardError
end

def checkout(items)
  raise EmptyCartError, "the cart is empty" if items.empty?
  items.sum
end

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td>Guarded block</td><td><code>try { ... }</code></td><td><code>begin ... end</code></td></tr>
  <tr><td>Catch typed</td><td><code>catch (e: IOException)</code></td><td><code>rescue ArgumentError =&gt; e</code></td></tr>
  <tr><td>Catch broadly</td><td><code>catch (e: Exception)</code></td><td><code>rescue =&gt; e</code> (StandardError, never the whole Exception tree)</td></tr>
  <tr><td>Always run</td><td><code>finally { ... }</code></td><td><code>ensure ... end</code></td></tr>
  <tr><td>Throw</td><td><code>throw X("msg")</code></td><td><code>raise X, "msg"</code></td></tr>
  <tr><td>Re-throw current</td><td><code>throw e</code></td><td>bare <code>raise</code> inside a rescue</td></tr>
  <tr><td>Custom error</td><td><code>class E(msg: String) : RuntimeException(msg)</code></td><td><code>class E &lt; StandardError; end</code></td></tr>
  <tr><td>Whole-method guard</td><td><code>try</code> expression wrapping the body</td><td>def-level <code>rescue</code> — no <code>begin</code></td></tr>
  <tr><td>Declare throws</td><td><code>@Throws(IOException::class)</code> (Java interop only)</td><td>nothing — document it, test it</td></tr>
</table>
<p>The hierarchy insight: Ruby's root is <code>Exception</code>, but almost
everything you'd ever want to catch lives under <code>StandardError</code> —
and that is all a bare <code>rescue</code> catches. On the JVM you already know
this shape: <code>Throwable</code> splits into <code>Error</code> and
<code>Exception</code>, and you catch <code>Exception</code> but never
<code>Error</code>. Ruby bakes that safe default into the bare
<code>rescue</code>: you cannot accidentally swallow the Ruby equivalents of
<code>OutOfMemoryError</code> or <code>StackOverflowError</code> by being lazy.
And since Kotlin already freed you from checked exceptions, the rest of the
trade-off is familiar — method signatures say only what a method
<em>does</em>.</p>`,
