  title: "Blocks, Procs & Lambdas",

  intro: `
<p>In Kotlin, passing behavior means passing a function value: a lambda of type
<code>(T) -&gt; R</code>. You already know Kotlin's trailing-lambda trick, where
the lambda rides <em>outside</em> the parentheses when it's the last argument:
<code>list.forEach { println(it) }</code>. Ruby's most common callback, the
<strong>block</strong>, looks almost identical — <code>arr.each { |x| puts x }</code>
— but there's a deeper difference. In Kotlin the callback is still a
<em>declared parameter</em>: <code>fun f(x: Int, g: (Int) -&gt; Int)</code>. In
Ruby the block arrives <em>invisibly</em> — there is no parameter to declare at
all. Inside the method you invoke it with <code>yield</code>, and
<code>block_given?</code> tells you whether the caller attached one.</p>
<table>
  <tr><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td><code>list.forEach { x -&gt; println(x) }</code></td><td><code>arr.each { |x| puts x }</code></td></tr>
  <tr><td><code>fun f(x: Int, g: (Int) -&gt; Int)</code></td><td><code>def f(x)</code> — the block arrives invisibly</td></tr>
  <tr><td><code>g(x)</code></td><td><code>yield(x)</code></td></tr>
  <tr><td><code>val dbl = { x: Int -&gt; x * 2 }</code></td><td><code>dbl = -&gt;(x) { x * 2 }</code></td></tr>
  <tr><td><code>dbl(3)</code></td><td><code>dbl.call(3)</code></td></tr>
  <tr><td><code>.map(String::uppercase)</code></td><td><code>.map(&amp;:upcase)</code></td></tr>
</table>
<p>When you do want the callback as a first-class value — something to store in
a variable and hand around like a Kotlin <code>(Int) -&gt; Int</code> — Ruby has
the <strong>lambda literal</strong>: <code>-&gt;(x) { x * 2 }</code>, invoked
with <code>.call</code> (or the terse <code>dbl.(3)</code>). And where Kotlin
writes the method reference <code>String::uppercase</code>, Ruby writes
<code>&amp;:upcase</code> — the <code>&amp;:symbol</code> shorthand turns a
method name into a block on the spot.</p>`,

  kotlin: `fun applyTwice(x: Int, f: (Int) -> Int): Int =
    f(f(x))                       // the callback is a declared parameter

fun makeMultiplier(n: Int): (Int) -> Int =
    { x -> x * n }                // captures n: a closure

fun main() {
    println(applyTwice(3) { x -> x * 2 })    // 12
    println(makeMultiplier(5)(4))            // 20

    val shouted: List<String> = listOf("hello", "world")
        .map(String::uppercase)
}`,

  task: `
<p>Rewrite the Kotlin in Ruby's four callback styles:</p>
<ol>
  <li><code>apply_twice(x)</code> — no callback parameter at all! The block
      arrives invisibly; apply it twice with <code>yield(yield(x))</code>.</li>
  <li><code>maybe_yield(x)</code> — call the block on <code>x</code> if the
      caller attached one, otherwise return <code>x</code> unchanged:
      <code>block_given? ? yield(x) : x</code>.</li>
  <li><code>make_multiplier(n)</code> — return a first-class lambda
      <code>-&gt;(x) { x * n }</code> that closes over <code>n</code>, just
      like Kotlin's <code>{ x -&gt; x * n }</code>. Callers invoke it with
      <code>.call</code>.</li>
  <li><code>shout_all(words)</code> — upcase every word with
      <code>map(&amp;:upcase)</code>, Ruby's
      <code>map(String::uppercase)</code>.</li>
</ol>`,

  starter: `# 1. apply_twice: no Function parameter — the block arrives invisibly.

`,

  requirements: [
    { pattern: /yield/, message: "Invoke the invisible block with yield" },
    { pattern: /block_given\?/, message: "Guard maybe_yield with block_given?" },
    { pattern: /->\s*\(/, message: "Build the multiplier with a ->(x) { ... } lambda literal" },
    { pattern: /&:/, message: "Use the &:symbol shorthand in shout_all" },
  ],

  tests: [
    { name: "apply_twice(3) { |v| v * 2 } returns 12",
      code: "  expect_eq(apply_twice(3) { |v| v * 2 }, 12)" },
    { name: 'apply_twice("a") { |s| s + "!" } returns "a!!"',
      code: '  expect_eq(apply_twice("a") { |s| s + "!" }, "a!!")' },
    { name: "maybe_yield(5) { |v| v + 1 } returns 6",
      code: "  expect_eq(maybe_yield(5) { |v| v + 1 }, 6)" },
    { name: "maybe_yield(5) without a block returns 5",
      code: "  expect_eq(maybe_yield(5), 5)" },
    { name: "make_multiplier(5).call(4) returns 20",
      code: "  expect_eq(make_multiplier(5).call(4), 20)" },
    { name: 'shout_all(["hello", "world"]) returns ["HELLO", "WORLD"]',
      code: '  expect_eq(shout_all(["hello", "world"]), ["HELLO", "WORLD"])' },

  solution: `def apply_twice(x)
  yield(yield(x))
end

def maybe_yield(x)
  block_given? ? yield(x) : x
end

def make_multiplier(n)
  ->(x) { x * n }
end

def shout_all(words)
  words.map(&:upcase)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td>Inline callback</td><td><code>forEach { x -&gt; ... }</code> — trailing lambda</td><td><code>each { |x| ... }</code> — outside the parens</td></tr>
  <tr><td>Receiving one</td><td><code>f: (T) -&gt; R</code> parameter</td><td>nothing to declare — every method can take a block</td></tr>
  <tr><td>Invoking it</td><td><code>f(x)</code></td><td><code>yield(x)</code></td></tr>
  <tr><td>Was one passed?</td><td><code>f: ((T) -&gt; R)? = null</code>, then <code>f != null</code></td><td><code>block_given?</code></td></tr>
  <tr><td>First-class function</td><td><code>val f = { x: Int -&gt; x * 2 }</code></td><td><code>f = -&gt;(x) { x * 2 }</code></td></tr>
  <tr><td>Calling it</td><td><code>f(3)</code></td><td><code>f.call(3)</code></td></tr>
  <tr><td>Method reference</td><td><code>map(String::uppercase)</code></td><td><code>map(&amp;:upcase)</code></td></tr>
</table>
<p>The deep difference is that a block is not a value the method sees in its
parameter list — it is an implicit companion to the call, and
<code>yield</code> reaches out to it. That is why Ruby APIs feel so light:
<code>3.times { ... }</code>, <code>File.open(path) { |f| ... }</code> — no
function-type parameter was declared anywhere. When you genuinely need the
callback as data (store it, return it, pass several), you promote it to a
lambda with <code>-&gt;</code> — which is exactly the Kotlin
<code>(Int) -&gt; Int</code> function value you already know, spelled
differently.</p>`,
};
