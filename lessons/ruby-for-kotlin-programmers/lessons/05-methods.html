const LESSON = {
  number: 5,
  title: "Methods & Implicit Return",

  intro: `
<p>Kotlin already trims most of Java's ceremony from a function —
<code>fun greet(name: String): String</code>, and no wrapper class for
top-level functions. Ruby trims the rest: no types, just
<code>def greet(name) ... end</code>. The habit you know from Kotlin's
expression-body functions becomes universal here — a method's
<strong>last expression is its return value</strong>. In Kotlin only the
single-expression <code>=</code> form returns implicitly; a block body
<code>{ ... }</code> still needs <code>return</code>. In Ruby every method
behaves like the <code>=</code> form. Since <code>if</code>/<code>else</code>
is an expression in both languages, even branching methods usually need no
<code>return</code>; the keyword exists, but idiomatic code saves it for
early exits (guard clauses).</p>
<table>
  <tr><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td><code>fun greet(n: String): String { ... }</code></td><td><code>def greet(n) ... end</code></td></tr>
  <tr><td><code>return</code> in a block body; implicit in the <code>=</code> form</td><td>last expression is the value</td></tr>
  <tr><td>default args: <code>fun greet(n: String, g: String = "Hello")</code></td><td>default args: <code>def greet(n, g = "Hello")</code></td></tr>
  <tr><td>named args: <code>create(name = "Ada", age = 0)</code></td><td>keyword arguments: <code>def create(name:, age: 0)</code></td></tr>
  <tr><td><code>isAdult(age)</code></td><td><code>adult?(age)</code></td></tr>
</table>
<p>Two features you already lean on in Kotlin carry straight over — with a
twist. <strong>Default arguments</strong> replace overloading in both
languages: <code>def greet(name, greeting = "Hello")</code>. And
<strong>named arguments</strong> — Kotlin lets the caller pass any parameter
by name — become Ruby's <strong>keyword arguments</strong>, but here they're
declared on the method: <code>def create(name:, age: 0)</code> is called as
<code>create(name: "Ada")</code>. The difference: in Kotlin naming an argument
is the caller's choice; in Ruby a method that declares <code>name:</code> can
<em>only</em> be called with a keyword, and a bare <code>name:</code> (no
default) makes the argument required. Round it out with two naming
conventions Kotlin lacks: <code>?</code> for predicates, and <code>!</code>
marking the "dangerous" variant of a method (usually the one that mutates the
receiver).</p>`,

  kotlin: `object Users {
    // Default argument — one function, no overloading needed (Ruby does this too).
    fun greet(name: String, greeting: String = "Hello") = "\$greeting, \$name!"

    fun isAdult(age: Int) = age >= 18

    // Named arguments are built in — no builder pattern required:
    // create(name = "Ada", age = 36)
    @JvmStatic
    fun main(args: Array<String>) {
        println(greet("Ada"))            // Hello, Ada!
        println(greet("Ada", "Howdy"))   // Howdy, Ada!
    }
}`,

  task: `
<p>Rewrite it in Ruby — one method per idea, and not a single
<code>return</code> keyword anywhere in your solution (unlike a Kotlin block
body, you won't need one):</p>
<ol>
  <li><code>greet(name, greeting = "Hello")</code> — a default argument,
      exactly like Kotlin's <code>greeting: String = "Hello"</code>. Produce
      <code>"Hello, Ada!"</code> (or <code>"Howdy, Ada!"</code> when a
      greeting is given) via interpolation as the last expression.</li>
  <li><code>full_name(first:, last: nil)</code> — keyword arguments: a
      required <code>first:</code> and an optional <code>last:</code>
      (Kotlin would write <code>last: String? = null</code>).
      When <code>last</code> is present, produce
      <code>"first last"</code>; otherwise just <code>first</code>. Use an
      <code>if</code>/<code>else</code> as the last expression — as in Kotlin
      the whole <code>if</code> yields a value, so no <code>return</code> is
      needed in either branch.</li>
  <li><code>adult?(age)</code> — true from age 18 up. The comparison
      <code>age &gt;= 18</code> already <em>is</em> a boolean expression;
      make it the method body. Note the name: <code>isAdult</code> becomes
      <code>adult?</code>.</li>
</ol>`,

  starter: `# 1. greet: both Kotlin overloads in one def, thanks to the default argument.
def greet(name, greeting = "Hello")
  raise NotImplementedError, "TODO: implement greet"
end

# 2. full_name: keyword args — first: is required, last: defaults to nil.
#    Call it like full_name(first: "Ada", last: "Lovelace").
#    An if/else is an expression here: its value is the method's result.
def full_name(first:, last: nil)
  raise NotImplementedError, "TODO: implement full_name"
end

# 3. adult?: predicates end in ? — the comparison itself is the body.
def adult?(age)
  raise NotImplementedError, "TODO: implement adult?"
end
`,

  requirements: [
    { pattern: /=\s*"Hello"/, message: 'Give greeting a default value of "Hello"' },
    { pattern: /\w+:/, message: "Use keyword arguments (first:, last:) in full_name" },
    { pattern: /def\s+adult\?/, message: "Name the predicate adult? — question mark included" },
    { pattern: /^(?:(?!\breturn\b)[\s\S])*$/, message: "No return keyword — the last expression is the return value" },
  ],

  tests: [
    { name: 'greet("Ada") returns "Hello, Ada!"',
      code: '  expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'greet("Ada", "Howdy") returns "Howdy, Ada!"',
      code: '  expect_eq(greet("Ada", "Howdy"), "Howdy, Ada!")' },
    { name: 'full_name(first: "Ada", last: "Lovelace") returns "Ada Lovelace"',
      code: '  expect_eq(full_name(first: "Ada", last: "Lovelace"), "Ada Lovelace")' },
    { name: 'full_name(first: "Ada") returns "Ada"',
      code: '  expect_eq(full_name(first: "Ada"), "Ada")' },
    { name: "adult?(18) is true",
      code: "  expect_true(adult?(18))" },
    { name: "adult?(17) is false",
      code: "  expect_eq(adult?(17), false)" },
  ],

  solution: `def greet(name, greeting = "Hello")
  "#{greeting}, #{name}!"
end

def full_name(first:, last: nil)
  if last
    "#{first} #{last}"
  else
    first
  end
end

def adult?(age)
  age >= 18
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Kotlin</th><th>Ruby</th></tr>
  <tr><td>Define a method</td><td><code>fun greet(n: String): String</code></td><td><code>def greet(n)</code> — no class, no types</td></tr>
  <tr><td>Return a value</td><td><code>return x</code> (block); implicit in the <code>= x</code> form</td><td>last expression; <code>return</code> only for early exit</td></tr>
  <tr><td>Optional argument</td><td><code>fun greet(n: String, g: String = "Hello")</code></td><td><code>def greet(n, g = "Hello")</code></td></tr>
  <tr><td>Named parameters</td><td>named at call site: <code>create(name = "Ada")</code></td><td><code>def create(name:, age: 0)</code> → <code>create(name: "Ada")</code></td></tr>
  <tr><td>Required keyword</td><td>parameter with no default</td><td>bare <code>name:</code> — missing it raises <code>ArgumentError</code></td></tr>
  <tr><td>Predicate</td><td><code>isAdult(age)</code></td><td><code>adult?(age)</code></td></tr>
  <tr><td>Mutating variant</td><td>naming convention: <code>sort()</code> vs <code>sorted()</code></td><td><code>sort</code> (copy) vs <code>sort!</code> (in place)</td></tr>
  <tr><td>Call a method</td><td><code>user.name()</code> — parens required</td><td><code>user.name</code> — parens optional</td></tr>
</table>
<p>Keyword arguments feel familiar from Kotlin's named call sites, but Ruby
moves the decision to the method: declaring <code>name:</code> forces every
caller to name it, and a keyword with no default fails loudly at call time —
no <code>lateinit</code> or nullable dance. The <code>?</code>/<code>!</code>
suffixes go further than any <code>is</code>-prefix convention because they're
part of the method name itself — <code>adult?</code>, <code>save!</code> —
readable at every call site.</p>`,
};
