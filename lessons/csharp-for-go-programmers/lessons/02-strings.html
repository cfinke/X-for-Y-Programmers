  title: "Strings",

  intro: `
<p>C# strings will feel familiar in one big way and different in another. Like
Go strings, they are immutable, and every operation returns a <em>new</em>
string rather than mutating the original. But under the hood a C# string is a
sequence of UTF-16 code units, not the UTF-8 bytes Go iterates over, so
indexing by character does not line up the same way it does with Go's
byte-oriented <code>s[i]</code>. The method names differ too — they are
PascalCase, and live on the string itself rather than in a package — and a
couple of them (<code>Substring</code>, <code>IndexOf</code>) have sharper
edges than their Go cousins.</p>
<table>
  <tr><th>Go</th><th>C#</th></tr>
  <tr><td><code>strings.ToUpper(s)</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td><code>strings.Contains(s, "x")</code></td><td><code>s.Contains("x")</code></td></tr>
  <tr><td><code>strings.Index(s, "x")</code></td><td><code>s.IndexOf("x")</code></td></tr>
  <tr><td><code>s[1:4]</code></td><td><code>s.Substring(1, 3)</code></td></tr>
  <tr><td><code>strings.Split(s, ",")</code></td><td><code>s.Split(',')</code></td></tr>
  <tr><td><code>strings.TrimSpace(s)</code></td><td><code>s.Trim()</code></td></tr>
  <tr><td><code>strings.Join(arr, ", ")</code></td><td><code>string.Join(", ", arr)</code></td></tr>
</table>
<p>Two traps to note. <code>Substring(start, length)</code> takes a
<em>length</em>, not an end index, so it is not a drop-in replacement for
Go's <code>s[a:b]</code> slicing, which takes a start and an end. And
<code>IndexOf</code> returns <code>-1</code> when the substring is missing,
exactly like Go's <code>strings.Index</code>. For assembling many pieces in a
loop, reach for <code>StringBuilder</code> instead of repeatedly
<code>+</code>-ing strings — the same reason you would build with a
<code>strings.Builder</code> in Go rather than <code>+=</code> in a hot loop,
but here it is the idiomatic tool.</p>`,

  go: `func shout(s string) string {
	return strings.ToUpper(strings.TrimSpace(s))
}

func csv(parts []string) string {
	return strings.Join(parts, ", ")
}

func initials(name string) string {
	words := strings.Split(name, " ")
	letters := make([]string, len(words))
	for i, w := range words {
		letters[i] = string(w[0])
	}
	return strings.Join(letters, "")
}`,

  solution: `static class TextUtil {
  public static string Shout(string s) {
    return s.Trim().ToUpper();
  }

  public static string Csv(string[] parts) {
    return string.Join(", ", parts);
  }

  public static string Initials(string name) {
    var sb = new StringBuilder();
    foreach (var word in name.Split(' ')) {
      if (word.Length > 0) {
        sb.Append(word[0]);
      }
    }
    return sb.ToString();
  }

  public static string Greeting(string name) {
    return $"Hello, {name}!";
  }
}

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C#</th></tr>
  <tr><td>Uppercase</td><td><code>strings.ToUpper(s)</code></td><td><code>s.ToUpper()</code></td></tr>
  <tr><td>Contains</td><td><code>strings.Contains(s, "x")</code></td><td><code>s.Contains(x)</code></td></tr>
  <tr><td>Substring</td><td><code>s[1:4]</code></td><td><code>s.Substring(1, 3)</code> (start, <em>length</em>)</td></tr>
  <tr><td>Replace</td><td><code>strings.ReplaceAll(s, "a", "b")</code></td><td><code>s.Replace("a", "b")</code> (replaces all)</td></tr>
  <tr><td>Join</td><td><code>strings.Join(arr, sep)</code></td><td><code>string.Join(sep, arr)</code> (static, args swapped)</td></tr>
  <tr><td>Build in loop</td><td><code>sb.WriteString(piece)</code></td><td><code>sb.Append(piece)</code></td></tr>
</table>
<p>A few more idioms worth filing away. <code>string.Split</code> takes a
<code>char</code> (single quotes: <code>','</code>) or a <code>string[]</code> of
separators — not a regex, much like Go's <code>strings.Split</code> takes a
plain string separator rather than a pattern. <code>Replace</code> swaps
<em>every</em> occurrence, so it matches Go's <code>strings.ReplaceAll</code>,
not the count-limited <code>strings.Replace</code>. <code>StartsWith</code>,
<code>EndsWith</code>, and <code>Contains</code> all return <code>bool</code>,
just as Go's <code>strings.HasPrefix</code>, <code>HasSuffix</code>, and
<code>Contains</code> do. And note that <code>string.Join</code>,
<code>string.IsNullOrEmpty</code>, and friends are <em>static</em> methods on
the <code>string</code> type, which is why the call reads
<code>string.Join(...)</code> rather than <code>arr.Join(...)</code> — with
the separator and the slice in the opposite order from Go's
<code>strings.Join(arr, sep)</code>.</p>`,
