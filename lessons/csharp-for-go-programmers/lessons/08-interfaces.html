  number: 8,
  title: "Interfaces",

  intro: `
<p>Go interfaces work the same way — a type satisfies an interface just by
implementing its methods, with no explicit declaration required. C#'s
<code>interface</code> is the same idea with one crucial difference: it is
<em>nominal</em>. A class only implements an interface if it says so explicitly with
<code>: IName</code>. Having the right members is not enough; the class must declare
the contract.</p>
<table>
  <tr><th>Go</th><th>C#</th></tr>
  <tr><td><code>type Shape interface { Area() float64 }</code></td><td><code>interface IShape { double Area(); }</code></td></tr>
  <tr><td><code>func (b Box) Area() float64 { ... }</code></td><td><code>class Box : IShape {}</code></td></tr>
  <tr><td>structural (implicit satisfaction)</td><td>nominal (must declare <code>: IShape</code>)</td></tr>
  <tr><td><code>Name string</code> (exported field)</td><td><code>string Name { get; }</code></td></tr>
  <tr><td>satisfies any interface whose methods it has</td><td><code>class C : A, B</code></td></tr>
</table>
<p>Three conventions to absorb. First, C# interface names start with a capital
<code>I</code> (<code>IShape</code>, <code>IComparable</code>) — Go interfaces carry
no such prefix (<code>Shape</code>, not <code>IShape</code>). Second, interface
members are implicitly <code>public</code> — you write no access modifier in the
interface, but the implementing class must mark them <code>public</code>. Third, in
C# 7.3 an interface has <em>no</em> method bodies at all (default interface methods
arrived later), so every member is a pure signature the class must fill in, much
like a Go interface only ever lists method signatures.</p>`,

  go: `type Shape interface {
	Area() float64
}

type Named interface {
	Describe() string
}

type Circle struct {
	Name string
	r    float64
}

func (c Circle) Area() float64 {
	return math.Pi * c.r * c.r
}

func (c Circle) Describe() string {
	return fmt.Sprintf("%s: %v", c.Name, c.Area())
}

func totalArea(shapes []Shape) float64 {
	sum := 0.0
	for _, s := range shapes {
		sum += s.Area()
	}
	return sum
}`,

  task: `
<p>Model shapes behind an interface, then program against that interface.</p>
<ol>
  <li>Declare <code>interface IShape</code> with a read-only property
      <code>string Name { get; }</code> and a method <code>double Area();</code>.</li>
  <li>Declare a second <code>interface IDescribable</code> with a method
      <code>string Describe();</code>.</li>
  <li>Write <code>class Rectangle</code> that implements <em>both</em> interfaces:

      <code>Area()</code> returns <code>width * height</code>, and

  <li>Write <code>class Square : IShape, IDescribable</code> with a constructor

  <li>Add a <code>static class Shapes</code> with
      <code>static double TotalArea(IShape[] shapes)</code> that sums

      <em>interface</em>, so it accepts any shape.</li>
</ol>`,

`,

  requirements: [
    { pattern: /interface\s+IShape/, message: "Declare an interface named IShape" },
    { pattern: /class\s+Rectangle\s*:\s*IShape\s*,\s*IDescribable/, message: "Rectangle must implement both IShape and IDescribable" },

    { name: "Rectangle.Name is readable via IShape", code: "      IShape r = new Rectangle(\"box\", 2, 3);\n      expect_eq(r.Name, \"box\");" },
    { name: "Square.Area() is side * side", code: "      IShape s = new Square(\"sq\", 4);\n      expect_eq(s.Area(), 16.0);" },
    { name: "Describe() via the IDescribable interface", code: "      IDescribable d = new Rectangle(\"box\", 2, 3);\n      expect_eq(d.Describe(), \"box: 6\");" },
    { name: "TotalArea sums a mixed IShape[]", code: "      IShape[] all = { new Rectangle(\"box\", 2, 3), new Square(\"sq\", 4) };\n      expect_eq(Shapes.TotalArea(all), 22.0);" },
    { name: "TotalArea of empty array is 0", code: "      IShape[] none = new IShape[0];\n      expect_eq(Shapes.TotalArea(none), 0.0);" },

  solution: `interface IShape {
  string Name { get; }
  double Area();
}

interface IDescribable {
  string Describe();
}

class Rectangle : IShape, IDescribable {
  public string Name { get; private set; }
  private double width;
  private double height;

  public Rectangle(string name, double width, double height) {
    Name = name;
    this.width = width;
    this.height = height;
  }

  public double Area() {
    return width * height;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

class Square : IShape, IDescribable {
  public string Name { get; private set; }
  private double side;

  public Square(string name, double side) {
    Name = name;
    this.side = side;
  }

  public double Area() {
    return side * side;
  }

  public string Describe() {
    return $"{Name}: {Area()}";
  }
}

static class Shapes {
  public static double TotalArea(IShape[] shapes) {
    double sum = 0;
    foreach (IShape s in shapes) {
      sum += s.Area();
    }
    return sum;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C#</th></tr>
  <tr><td>Declare</td><td><code>type Shape interface { Area() float64 }</code></td><td><code>interface IShape {}</code></td></tr>
  <tr><td>Implement</td><td><code>func (b Box) Area() float64 { ... }</code> (implicit)</td><td><code>class Box : IShape</code></td></tr>
  <tr><td>Conformance</td><td>structural (implicit)</td><td>nominal (explicit)</td></tr>
  <tr><td>Read-only property</td><td><code>Name string</code> (exported field or getter method)</td><td><code>string Name { get; }</code></td></tr>
  <tr><td>Multiple</td><td>satisfies any interface whose methods it implements</td><td><code>: A, B</code></td></tr>
  <tr><td>Member bodies</td><td>none (interfaces are pure method sets)</td><td>none (in C# 7.3)</td></tr>
</table>
<p>Because conformance is nominal, adding a method that happens to match an
interface does <em>not</em> make a class implement it — you must list the interface
after the colon. In Go the relationship runs the other way: any type whose method
set matches an interface satisfies it automatically, with no declaration at all.
That colon does double duty for base classes in C#, too: a class can extend at most
one class but implement any number of interfaces, and if it does both the base
class comes first (<code>class C : BaseClass, IShape</code>).</p>
<p>The payoff is the <code>IShape[]</code> parameter in <code>TotalArea</code>:
callers pass concrete <code>Rectangle</code> and <code>Square</code> objects, but
the method only sees the contract. This is C#'s everyday tool for decoupling and is
exactly what powers built-in interfaces like <code>IEnumerable&lt;T&gt;</code>,
<code>IComparable&lt;T&gt;</code>, and <code>IEquatable&lt;T&gt;</code> — much as
Go's <code>io.Reader</code> and <code>sort.Interface</code> lean on implicit
satisfaction to achieve the same kind of decoupling.</p>`,
};
