  title: "Classes & Properties",

  intro: `
<p>Go doesn't have classes, but a struct with methods gets you the same
encapsulation C# gets from properties. Go controls visibility by capitalizing
a field or method name — exported vs. unexported — and exposes a computed
value through a plain method like <code>func (a *Account) Balance() float64</code>.
C# instead reaches for <em>auto-properties</em>: <code>public int Age { get; set; }</code>
compiles down to a hidden backing field plus a getter and setter, but reads
and writes like a plain field.</p>
<table>
  <tr><th>Go</th><th>C#</th></tr>
  <tr><td><code>name string</code> (unexported field)</td><td><code>private string name;</code></td></tr>
  <tr><td><code>Age int</code> (exported field)</td><td><code>public int Age { get; set; }</code></td></tr>
  <tr><td>exported field, set only inside <code>NewThing(...)</code> by convention</td><td><code>public int Id { get; }</code> (get-only)</td></tr>
  <tr><td><code>func (t Thing) Total() int { return … }</code></td><td><code>public int Total => …;</code></td></tr>
  <tr><td><code>func NewThing(x int) *Thing { … }</code></td><td><code>public Thing(int x) { … }</code></td></tr>
</table>
<p>Three things to internalize. First, public members are conventionally
<strong>PascalCase</strong> in C# (<code>Balance</code>, not <code>balance</code>),
which echoes Go's own capitalization rule but means something different: Go's
capital letter decides whether a name crosses a package boundary at all, while
C#'s casing is pure convention layered on top of explicit access modifiers
like <code>public</code> and <code>private</code>. Second, a <code>{ get; }</code>
property with no setter can only be assigned in the constructor — the same
"set once, never again" discipline a Go programmer enforces by hand with an
exported field that only the constructor function ever touches. A
<code>{ get; private set; }</code> lets the class mutate the value internally
while the outside world sees it as read-only: the same shape as an unexported
field paired with an exported getter method. Third, <code>=></code> defines
an <em>expression-bodied member</em>, the terse form of a computed getter or a
one-line method — the C# analog of a short Go method like
<code>func (t Thing) Total() int { return t.a + t.b }</code>.</p>`,

	Owner   string

func NewBankAccount(owner string, initial float64) *BankAccount {
	return &BankAccount{Owner: owner, balance: initial}

func (a *BankAccount) Balance() float64 { return a.balance }

func (a *BankAccount) Deposit(amount float64) { a.balance += amount }

func (a *BankAccount) Summary() string {
	return fmt.Sprintf("%s: %v", a.Owner, a.balance)
}`,

  solution: `class BankAccount {
  public string Owner { get; }
  public decimal Balance { get; private set; }
  private int transactionCount;

  public BankAccount(string owner, decimal initial) {
    Owner = owner;
    Balance = initial;
    transactionCount = 0;
  }

  public void Deposit(decimal amount) {
    Balance += amount;
    transactionCount++;
  }

  public bool Withdraw(decimal amount) {
    if (amount > Balance) {
      return false;
    }
    Balance -= amount;
    transactionCount++;
    return true;
  }

  public int TransactionCount => transactionCount;
  public string Summary => $"{Owner}: {Balance}";
}

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C#</th></tr>
  <tr><td>Mutable property</td><td><code>X int</code> (exported field)</td><td><code>int X { get; set; }</code></td></tr>
  <tr><td>Read-only from outside</td><td><code>x int</code> + <code>func (t T) X() int</code> (no setter)</td><td><code>int X { get; private set; }</code></td></tr>
  <tr><td>Immutable after construction</td><td>exported field set only in <code>NewT(...)</code>, by convention</td><td><code>int X { get; }</code></td></tr>
  <tr><td>Computed getter</td><td><code>func (t T) Total() int {…}</code></td><td><code>int Total => …;</code></td></tr>
  <tr><td>Unexported field</td><td><code>x int</code></td><td><code>private int x;</code></td></tr>
</table>
<p>An auto-property is just sugar: <code>{ get; set; }</code> generates a hidden
backing field and trivial accessors. The moment you need logic — validation,
change tracking — you either switch to a full property with an explicit backing
field, or, as here, keep the auto-property and route all mutation through methods
that guard the invariant. Because the setter is <code>private</code>, no caller
outside <code>BankAccount</code> can bypass <code>Withdraw</code>'s overdraft
check — the same guarantee a Go type gets from keeping <code>balance</code>
unexported and forcing every caller through <code>Deposit</code>/<code>Withdraw</code>
methods.</p>
<p>One adjustment coming from Go: Go's capital-letter rule already tells you
whether a field is public, so there's no separate casing convention layered on
top of it — an exported field is simply <code>MixedCaps</code>, unexported is
<code>camelCase</code>, and that's the whole story. C# keeps casing and access
modifiers separate: the .NET convention is PascalCase for anything public
(properties, methods, types) and camelCase only for private fields, parameters,
and locals, regardless of what <code>public</code> or <code>private</code> says.
The compiler doesn't enforce the casing, but every C# codebase you touch will
expect it.</p>`,
