  number: 9,
  title: "Inheritance & Abstract Classes",

  intro: `
<p>Go doesn't have classes, inheritance, or an <code>abstract</code> keyword at
all — it reaches for two different tools instead: <em>interfaces</em> for
polymorphism (any type with an <code>Area() float64</code> method satisfies a
<code>Shape</code> interface, no <code>implements</code>/<code>:</code>
declaration needed) and <em>struct embedding</em> for code reuse (a struct can
embed another struct to pick up its fields and methods). C# instead builds a
real class hierarchy with <code>:</code> in place of <code>extends</code>,
constructors that chain to a parent, and <code>abstract</code>/<code>virtual</code>
members that opt in to overriding.</p>
<table>
  <tr><th>Go</th><th>C#</th></tr>
  <tr><td>(no inheritance — embed a struct)</td><td><code>class Dog : Animal {}</code></td></tr>
  <tr><td><code>Rectangle{Name: "Rectangle", ...}</code></td><td><code>: base(name)</code> (constructor)</td></tr>
  <tr><td><code>type Shape interface { Area() float64 }</code></td><td><code>abstract class Shape {}</code></td></tr>
  <tr><td>interface method (no body)</td><td><code>public abstract double Area();</code></td></tr>
  <tr><td>any matching method (implicit)</td><td><code>public override double Area()</code></td></tr>
  <tr><td>(no equivalent)</td><td><code>sealed class</code> / <code>sealed override</code></td></tr>
</table>
<p>Three things to internalize. First, Go has no base-constructor call at all —
a struct literal just sets every field directly, so there's nothing like
<code>: base(...)</code> or a <code>super()</code> statement. Second, Go's
embedding gives you a field and its methods "for free," but it does
<em>not</em> give you virtual dispatch: a method promoted from an embedded
struct still runs with the embedded struct as its receiver, not the outer
type, so there's no equivalent of overriding a base method and having the
base's other methods automatically call your version. C#'s
<code>virtual</code>/<code>abstract</code>/<code>override</code> trio exists
precisely to solve that problem. Third, <code>sealed</code> stops further
subclassing (or seals a single overridden method) — Go has nothing like it,
since there's no subclassing to stop in the first place.</p>`,

  go: `type Shape interface {
	Area() float64
	Describe() string
}

type Rectangle struct {
	Name          string
	Width, Height float64
}

func NewRectangle(w, h float64) *Rectangle {
	return &Rectangle{Name: "Rectangle", Width: w, Height: h}
}

func (r *Rectangle) Area() float64 {
	return r.Width * r.Height
}

func (r *Rectangle) Describe() string {
	return fmt.Sprintf("%s has area %g", r.Name, r.Area())
}`,

  solution: `abstract class Shape {
  public string Name { get; }

  protected Shape(string name) {
    Name = name;
  }

  public abstract double Area();

  public virtual string Describe() {
    return $"{Name} has area {Area()}";
  }
}

class Rectangle : Shape {
  public double Width { get; }
  public double Height { get; }

  public Rectangle(double width, double height) : base("Rectangle") {
    Width = width;
    Height = height;
  }

  public override double Area() {
    return Width * Height;
  }
}

sealed class Square : Shape {
  public double Side { get; }

  public Square(double side) : base("Square") {
    Side = side;
  }

  public override double Area() {
    return Side * Side;
  }

  public override string Describe() {
    return $"Square with side {Side}";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C#</th></tr>
  <tr><td>Extend a type</td><td>embed a struct: <code>type D struct { B }</code></td><td><code>class D : B</code></td></tr>
  <tr><td>Call base ctor</td><td>(none — set fields in a struct literal)</td><td><code>: base(x)</code></td></tr>
  <tr><td>Abstract method</td><td>interface method: <code>Area() float64</code></td><td><code>public abstract T F();</code></td></tr>
  <tr><td>Overridable method</td><td>(no virtual dispatch through embedding)</td><td>only <code>virtual</code>/<code>abstract</code></td></tr>
  <tr><td>Override</td><td>define a same-named method on the outer type</td><td><code>override</code> keyword required</td></tr>
  <tr><td>Block subclassing</td><td>(none — no subclassing to block)</td><td><code>sealed class</code></td></tr>
</table>
<p>C# is far more structured than Go here, and deliberately so: Go has no class
hierarchy to be strict or loose about in the first place. Where C# lets an
overriding method reach the parent's version with <code>base.Describe()</code>,
Go has nothing analogous — embedding only forwards calls in one direction,
from the outer struct down to the embedded one, never back up to a method
defined on the outer type. An <code>abstract</code> class in C# cannot be
instantiated with <code>new</code>; it exists only to be inherited. Go's
closest analog is an interface, which likewise can't be instantiated on its
own — only satisfied by a concrete type. <code>sealed</code> is C#'s way of
saying "no further subclasses, ever," which lets the runtime devirtualize
calls and documents that the type is a leaf; since Go has no subclassing to
begin with, there's nothing to seal.</p>`,
};
