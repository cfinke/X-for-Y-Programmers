  number: 4,
  title: "Dictionaries",

  intro: `
<p>In Go you reach for the built-in <code>map[K]V</code> type when you need
key/value lookups — there's no separate object-literal-vs-Map distinction to
worry about. C#'s workhorse is <code>Dictionary&lt;K, V&gt;</code> — a real
generic type where both the key and value types are fixed at compile time,
much like Go's <code>map[string]int</code>, except it's a class instance
rather than a built-in reference type, and iteration order is not
guaranteed.</p>
<table>
  <tr><th>Go</th><th>C#</th></tr>
  <tr><td><code>make(map[string]int)</code></td><td><code>new Dictionary&lt;string, int&gt;()</code></td></tr>
  <tr><td><code>m["a"] = 1</code></td><td><code>d["a"] = 1;</code> or <code>d.Add("a", 1)</code></td></tr>
  <tr><td><code>m["a"]</code></td><td><code>d["a"]</code> (throws if absent)</td></tr>
  <tr><td><code>v, ok := m["a"]</code></td><td><code>d.ContainsKey("a")</code></td></tr>
  <tr><td><code>len(m)</code></td><td><code>d.Count</code></td></tr>
</table>
<p>One sharp edge: the indexer <code>d["a"]</code> <em>throws</em>
<code>KeyNotFoundException</code> when the key is missing — unlike Go's
<code>m["a"]</code>, which quietly returns the value type's zero value with no
error at all. The idiomatic safe lookup is
<code>TryGetValue(key, out value)</code>, which returns a <code>bool</code>
and hands you the value through an <code>out</code> parameter — C#'s answer to
Go's comma-ok form. Assigning through the indexer (<code>d["a"] = 1</code>)
inserts or overwrites, while <code>Add</code> throws if the key already
exists (plain Go map assignment has no such guard — it always overwrites
silently).</p>`,

  go: `scores := map[string]int{
	"Ada": 90,
	"Rob": 75,
}

func get(m map[string]int, name string) int {
	if v, ok := m[name]; ok {
		return v
	}
	return 0
}

func total(m map[string]int) int {
	sum := 0
	for _, v := range m {
		sum += v
	}
	return sum
}`,

  task: `
<p>Write a <code>static class Scores</code> that builds and queries a
<code>Dictionary&lt;string, int&gt;</code>:</p>
<ol>

      <code>TryGetValue</code> with an <code>out</code> variable, not the

  <li><code>Total(dict)</code> sums every value by iterating the
      <code>KeyValuePair&lt;string, int&gt;</code> entries with
      <code>foreach</code>.</li>
  <li><code>Count(dict)</code> returns how many entries the dictionary holds

</ol>`,

  requirements: [
    { pattern: /TryGetValue/, message: "Use TryGetValue(name, out ...) for the safe lookup" },
    { pattern: /foreach/, message: "Iterate the entries with foreach" },
    { pattern: /\{\s*"Ada"\s*,\s*90\s*\}/, message: "Populate Build() with a collection initializer like { \"Ada\", 90 }" },
  ],

  tests: [
    { name: "Build() has 3 entries", code: "      expect_eq(Scores.Build().Count, 3);" },
    { name: "Build()[\"Ada\"] is 90", code: "      expect_eq(Scores.Build()[\"Ada\"], 90);" },
    { name: "GetOrZero for present key", code: "      expect_eq(Scores.GetOrZero(Scores.Build(), \"Rob\"), 75);" },
    { name: "GetOrZero for missing key is 0", code: "      expect_eq(Scores.GetOrZero(Scores.Build(), \"Nobody\"), 0);" },
    { name: "Total sums all values", code: "      expect_eq(Scores.Total(Scores.Build()), 253);" },
    { name: "Count matches", code: "      expect_eq(Scores.Count(Scores.Build()), 3);" },
  ],

  solution: `static class Scores {
  public static Dictionary<string, int> Build() {
    return new Dictionary<string, int> {
      { "Ada", 90 },
      { "Rob", 75 },
      { "Grace", 88 },
    };
  }

  public static int GetOrZero(Dictionary<string, int> dict, string name) {
    if (dict.TryGetValue(name, out int score)) {
      return score;
    }
    return 0;
  }

  public static int Total(Dictionary<string, int> dict) {
    int sum = 0;
    foreach (KeyValuePair<string, int> entry in dict) {
      sum += entry.Value;
    }
    return sum;
  }

  public static int Count(Dictionary<string, int> dict) {
    return dict.Count;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go (map)</th><th>C#</th></tr>
  <tr><td>Create + fill</td><td><code>map[string]int{"a": 1}</code></td><td><code>new Dictionary&lt;string,int&gt; { { "a", 1 } }</code></td></tr>
  <tr><td>Insert/overwrite</td><td><code>m["a"] = 1</code></td><td><code>d["a"] = 1;</code></td></tr>
  <tr><td>Insert (fail if exists)</td><td>— (always overwrites)</td><td><code>d.Add("a", 1)</code></td></tr>
  <tr><td>Safe read</td><td><code>v, ok := m["a"]</code> → <code>ok</code> is <code>false</code></td><td><code>d.TryGetValue("a", out v)</code></td></tr>
  <tr><td>Has key</td><td><code>_, ok := m["a"]</code></td><td><code>d.ContainsKey("a")</code></td></tr>
  <tr><td>Iterate</td><td><code>for k, v := range m</code></td><td><code>foreach (var kv in d)</code> → <code>kv.Key</code>, <code>kv.Value</code></td></tr>
</table>
<p>The <code>out</code> parameter on <code>TryGetValue</code> is C#'s answer to
Go's comma-ok idiom (<code>v, ok := m[key]</code>): you can declare the
variable inline (<code>out int score</code>) right at the call site. When the
key is missing, the <code>out</code> value is set to the type's default
(<code>0</code> for <code>int</code>), so some code even skips checking the
returned <code>bool</code> — but relying on that hides the missing-key case,
just as ignoring Go's <code>ok</code> would silently treat an absent key as
its zero value. Prefer the explicit <code>if (dict.TryGetValue(...))</code>
form. For iteration, each element is a <code>KeyValuePair&lt;K, V&gt;</code>
with read-only <code>Key</code> and <code>Value</code> properties; you can
also loop <code>dict.Keys</code> or <code>dict.Values</code> directly, much
like ranging over a Go map with <code>for k := range m</code> or
<code>for _, v := range m</code>.</p>`,
};
