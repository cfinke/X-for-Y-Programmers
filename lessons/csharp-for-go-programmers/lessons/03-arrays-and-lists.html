  title: "Arrays & Lists",

  intro: `
<p>Go has one everyday sequence you reach for by default: the <em>slice</em>,
<code>[]int</code>. It grows with <code>append</code>, and you rarely think
about its underlying array or capacity. C# splits that single idea in two. A
C# <em>array</em> (<code>int[]</code>) is a fixed-length block chosen at
creation time — fast, but you can't <code>append</code> onto it. When you want
the resizable behaviour a growing Go slice gives you for free, reach for
<code>List&lt;T&gt;</code>.</p>
<table>
  <tr><th>Go</th><th>C#</th></tr>
  <tr><td><code>a := []int{1, 2, 3}</code></td><td><code>int[] a = { 1, 2, 3 };</code></td></tr>
  <tr><td><code>make([]int, 3)</code></td><td><code>new int[3]</code></td></tr>
  <tr><td><code>len(a)</code></td><td><code>a.Length</code> (array) / <code>a.Count</code> (list)</td></tr>
  <tr><td><code>a = append(a, 4)</code></td><td><code>list.Add(4)</code></td></tr>
  <tr><td><code>slices.Contains(a, 4)</code></td><td><code>list.Contains(4)</code></td></tr>
  <tr><td><code>var b []int</code> (grows)</td><td><code>var b = new List&lt;int&gt;();</code></td></tr>
</table>
<p>Two things to internalize. First, arrays are fixed size: <code>new int[3]</code>
gives three slots, all initialized to <code>0</code>, and that size never changes.
Second, <code>List&lt;T&gt;</code> is the growable one — <code>Add</code> instead
of <code>append</code>, <code>Count</code> instead of <code>len(...)</code>, and it
still supports <code>list[i]</code> indexing. Both can be built with a collection
initializer: <code>new List&lt;int&gt; { 1, 2, 3 }</code>.</p>`,

  solution: `using System.Collections.Generic;

static class Collections {
  public static int Total(int[] nums) {
    int sum = 0;
    foreach (int n in nums) {
      sum += n;
    }
    return sum;
  }

  public static List<int> Evens(int[] nums) {
    var result = new List<int>();
    foreach (int n in nums) {
      if (n % 2 == 0) {
        result.Add(n);
      }
    }
    return result;
  }

  public static bool Contains(int[] nums, int target) {
    foreach (int n in nums) {
      if (n == target) {
        return true;
      }
    }
    return false;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C#</th></tr>
  <tr><td>Fixed-size block</td><td><code>[3]int{}</code> (rarely used)</td><td><code>new int[3]</code></td></tr>
  <tr><td>Array literal</td><td><code>[]int{1, 2, 3}</code></td><td><code>new int[] { 1, 2, 3 }</code></td></tr>
  <tr><td>Growable list</td><td><code>[]int{1, 2, 3}</code> (via <code>append</code>)</td><td><code>new List&lt;int&gt; { 1, 2, 3 }</code></td></tr>
  <tr><td>Length</td><td><code>len(a)</code></td><td><code>a.Length</code> / <code>list.Count</code></td></tr>
  <tr><td>Append</td><td><code>a = append(a, x)</code></td><td><code>list.Add(x)</code></td></tr>
  <tr><td>Membership</td><td><code>slices.Contains(a, x)</code></td><td><code>list.Contains(x)</code></td></tr>
</table>
<p>Rule of thumb: if the size is known and fixed, an array is the leaner choice;
if you're accumulating results or the count varies, use <code>List&lt;T&gt;</code>.
Note the naming trap — arrays expose <code>Length</code> (a property), lists
expose <code>Count</code>. Once you have a list you can still call
<code>ToArray()</code> to get back a plain <code>int[]</code>, and any array can
seed a list with <code>new List&lt;int&gt;(myArray)</code>. Under the hood a
<code>List&lt;T&gt;</code> is backed by an array it re-allocates as it grows —
the same trick Go's <code>append</code> does for you invisibly when a slice
outgrows its backing array's capacity.</p>`,
