  number: 16,
  title: "Pattern Matching",

  intro: `
<p>In Go you narrow an <code>interface{}</code> (or <code>any</code>) by hand with a
type switch or a type assertion: <code>switch v := x.(type) { case int: ... }</code>
or <code>n, ok := x.(int)</code>. C# 7 folds the test and the cast into one step
with the <em>is-type pattern</em>. Writing <code>if (o is int n)</code> checks the
runtime type <em>and</em>, when it matches, binds a typed variable <code>n</code>
you can use for the rest of the block — no separate assertion, no <code>ok</code>
boolean to check.</p>
<table>
  <tr><th>Go</th><th>C# 7.3</th></tr>
  <tr><td><code>if n, ok := o.(int); ok { … }</code></td><td><code>if (o is int n) { … }</code></td></tr>
  <tr><td><code>if c, ok := o.(*Cat); ok { … }</code></td><td><code>if (o is Cat c) { … }</code></td></tr>
  <tr><td><code>if n, ok := o.(int); ok &amp;&amp; n &lt; 0</code></td><td><code>if (o is int n &amp;&amp; n &lt; 0)</code></td></tr>
  <tr><td>unused binding (<code>_</code>)</td><td>discard <code>o is bool _</code></td></tr>
</table>
<p>Two things to note. C#'s <code>is</code> checks the <em>real</em> runtime type —
everything boxes to <code>object</code>, so a boxed <code>int</code> still matches
<code>o is int n</code>, and a <code>null</code> matches no type pattern at all
(handle it with an explicit <code>== null</code>). You can bolt a condition
straight onto the match with <code>&amp;&amp;</code> — <code>o is int n &amp;&amp; n &lt; 0</code>
is C#'s answer to a guarded case in a Go type switch. And when you only care
<em>that</em> something matched, not its value, use the discard <code>_</code>
instead of naming a variable you never read (the same idea as Go's blank
identifier).</p>
<p>C# can also use these same patterns as <code>case</code> labels in a
<code>switch</code> statement (with <code>when</code> guards) — much like Go's
<code>switch v := x.(type)</code> — you will see that form in other people's code —
but the <code>is</code>-type pattern is the portable C# 7.3 workhorse, so this
lesson builds a classifier out of it.</p>`,

  go: `func classify(value interface{}) string {
	if value == nil {
		return "null"
	}
	if n, ok := value.(int); ok {
		if n < 0 {
			return "negative integer"
		}
		return fmt.Sprintf("integer %d", n)
	}
	if s, ok := value.(string); ok {
		if len(s) == 0 {
			return "empty string"
		}
		return fmt.Sprintf("string of length %d", len(s))
	}
	if _, ok := value.(bool); ok {
		return "a boolean"
	}
	return "unknown"
}`,

  task: `
<p>Build a <code>static class Classifier</code> that inspects boxed
<code>object</code> values using the <code>is</code>-type pattern:</p>
<ol>
  <li><code>Describe(object value)</code> returns a string. Use a chain of
      <code>is</code> patterns:
    <ul>
      <li><code>value == null</code> &rarr; <code>"null"</code> (a null matches no
          type pattern, so test it first)</li>
      <li><code>value is int n &amp;&amp; n &lt; 0</code> &rarr; <code>"negative integer"</code>
          (a guard via <code>&amp;&amp;</code>)</li>
      <li><code>value is int n</code> &rarr; <code>$"integer {n}"</code></li>
      <li><code>value is string s &amp;&amp; s.Length == 0</code> &rarr; <code>"empty string"</code></li>
      <li><code>value is string s</code> &rarr; <code>$"string of length {s.Length}"</code></li>
      <li><code>value is bool _</code> &rarr; <code>"a boolean"</code> (a discard —
          you match the type but never need the value)</li>
      <li>anything else &rarr; <code>"unknown"</code></li>
    </ul>
  </li>
  <li><code>SumIntegers(object[] values)</code> returns an <code>int</code>: loop
      over the array and use <code>if (item is int n)</code> to add only the
      values that are really <code>int</code>s, skipping everything else.</li>
</ol>`,

  starter: `static class Classifier {
  public static string Describe(object value) {
    return ""; // TODO: chain is-type patterns with guards and a discard
  }

  public static int SumIntegers(object[] values) {
    return 0; // TODO: use the is-type pattern (item is int n)
  }
}
`,

  requirements: [
    { pattern: /is\s+int\s+\w+/, message: "Use the is-type pattern (value is int n) to test and bind an int" },
    { pattern: /is\s+string\s+\w+/, message: "Use an is-type pattern for the string case too" },
    { pattern: /is\s+\w+\s+_/, message: "Use a discard (is bool _) when you match a type but never read the value" },
  ],

  tests: [
    { name: "Describe(42) is \"integer 42\"", code: "      expect_eq(Classifier.Describe(42), \"integer 42\");" },
    { name: "Describe(-5) is \"negative integer\"", code: "      expect_eq(Classifier.Describe(-5), \"negative integer\");" },
    { name: "Describe(\"\") is \"empty string\"", code: "      expect_eq(Classifier.Describe(\"\"), \"empty string\");" },
    { name: "Describe(\"hello\") is \"string of length 5\"", code: "      expect_eq(Classifier.Describe(\"hello\"), \"string of length 5\");" },
    { name: "Describe(true) is \"a boolean\"", code: "      expect_eq(Classifier.Describe(true), \"a boolean\");" },
    { name: "Describe(null) is \"null\"", code: "      expect_eq(Classifier.Describe(null), \"null\");" },
    { name: "Describe(3.14) is \"unknown\"", code: "      expect_eq(Classifier.Describe(3.14), \"unknown\");" },
    { name: "SumIntegers skips non-ints", code: "      expect_eq(Classifier.SumIntegers(new object[] { 1, \"a\", 2, true, 3 }), 6);" },
    { name: "SumIntegers of empty is 0", code: "      expect_eq(Classifier.SumIntegers(new object[] { }), 0);" },
  ],

  solution: `static class Classifier {
  public static string Describe(object value) {
    if (value == null) {
      return "null";
    }
    if (value is int n && n < 0) {
      return "negative integer";
    }
    if (value is int i) {
      return $"integer {i}";
    }
    if (value is string s && s.Length == 0) {
      return "empty string";
    }
    if (value is string str) {
      return $"string of length {str.Length}";
    }
    if (value is bool _) {
      return "a boolean";
    }
    return "unknown";
  }

  public static int SumIntegers(object[] values) {
    int sum = 0;
    foreach (var item in values) {
      if (item is int n) {
        sum += n;
      }
    }
    return sum;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>C# 7.3</th></tr>
  <tr><td>Type test + bind</td><td><code>n, ok := o.(int)</code></td><td><code>o is int n</code></td></tr>
  <tr><td>Class test + bind</td><td><code>c, ok := o.(*Cat)</code></td><td><code>o is Cat c</code></td></tr>
  <tr><td>Guard on a match</td><td><code>n, ok := o.(int); ok &amp;&amp; n &lt; 0</code></td><td><code>o is int n &amp;&amp; n &lt; 0</code></td></tr>
  <tr><td>Ignore the value</td><td>blank identifier <code>_</code></td><td>discard <code>o is bool _</code></td></tr>
  <tr><td>Null</td><td><code>o == nil</code></td><td><code>o == null</code> (matches no type pattern)</td></tr>
</table>
<p>Order matters: the guarded <code>value is int n &amp;&amp; n &lt; 0</code> must come
<em>before</em> the plain <code>value is int</code>, or the negative case can never
win. Watch the scoping rule too — a variable bound by <code>is</code> leaks into
the enclosing block, which is why each arm here uses a distinct name
(<code>n</code>, <code>i</code>, <code>s</code>, <code>str</code>) rather than
reusing one — Go's <code>ok</code>-comma idiom sidesteps this by letting you
reuse the same short variable name in each <code>if</code>'s own scope. Remember
that <code>null</code> matches no type pattern, so a <code>null</code> object
falls through every <code>is</code> and you must test it explicitly, the same way
a <code>nil</code> interface value needs its own check before a Go type
assertion. The same patterns can appear as <code>case</code> labels in a
<code>switch</code> statement with <code>when</code> guards — closer to Go's
<code>switch v := x.(type)</code>, and pedagogically the prettier form — but the
<code>is</code>-type pattern shown here is the piece you can rely on everywhere
in C# 7.3, and C# 8 later layers switch <em>expressions</em> and property
patterns on top of it.</p>`,
};
