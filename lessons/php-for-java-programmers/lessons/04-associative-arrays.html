const LESSON = {
  number: 4,
  title: "Associative Arrays",

  intro: `
<p>Here is the punchline of the last lesson: <code>HashMap&lt;String, Integer&gt;</code>
is <em>also</em> the PHP array. <code>['apples' =&gt; 3, 'pears' =&gt; 5]</code>
is a map with string keys; <code>[90, 85, 72]</code> was "a map" with keys
0, 1, 2. One structure plays both roles — keys can be strings or ints, and
insertion order is always preserved (closer to <code>LinkedHashMap</code>
than <code>HashMap</code>).</p>
<table>
  <tr><th>Java</th><th>PHP</th></tr>
  <tr><td><code>new HashMap&lt;String, Integer&gt;()</code></td><td><code>['apples' =&gt; 3]</code></td></tr>
  <tr><td><code>map.put(k, v)</code></td><td><code>$m[$k] = $v;</code></td></tr>
  <tr><td><code>map.get(k)</code></td><td><code>$m[$k]</code></td></tr>
  <tr><td><code>map.getOrDefault(k, 0)</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td><code>for (var e : map.entrySet())</code></td><td><code>foreach ($m as $k =&gt; $v)</code></td></tr>
  <tr><td><code>map.keySet()</code></td><td><code>array_keys($m)</code></td></tr>
  <tr><td><code>map.containsKey(k)</code></td><td><code>array_key_exists($k, $m)</code></td></tr>
</table>
<p>Two idioms carry most of the weight. The null coalescing operator
<code>??</code> is <code>getOrDefault</code> as syntax: <code>$m[$k] ?? 0</code>
yields the value, or 0 if the key is absent, with no warning. And
<code>foreach ($m as $k =&gt; $v)</code> iterates entries directly — no
<code>entrySet()</code>, no <code>Map.Entry</code> unpacking. Value semantics
still apply: pass a map to a function and it gets its own copy, so "add a key"
functions return the updated array, just like last lesson.</p>`,

  java: `Map<String, Integer> inv = new HashMap<>();
inv.put("apples", 3);                          // put
inv.put("pears", 5);

int apples = inv.getOrDefault("apples", 0);    // 3
int kiwis  = inv.getOrDefault("kiwis", 0);     // 0, no NPE

boolean hasPears = inv.containsKey("pears");   // true

for (Map.Entry<String, Integer> e : inv.entrySet()) {
    System.out.println(e.getKey() + ": " + e.getValue());
}

Set<String> names = inv.keySet();              // ["apples", "pears"]`,

  task: `
<p>Port the inventory map to a PHP associative array:</p>
<ol>
  <li><code>build_inventory(): array</code> — return
      <code>['apples' =&gt; 3, 'pears' =&gt; 5]</code> as a literal; no
      <code>put</code> calls needed.</li>
  <li><code>get_count(array $inv, string $name): int</code> — the
      <code>getOrDefault</code> port: return <code>$inv[$name] ?? 0</code>.</li>
  <li><code>add_stock(array $inv, string $name, int $n): array</code> — add
      <code>$n</code> to the item's count (treat a missing key as 0, using
      <code>??</code> again) and return the updated array.</li>
  <li><code>list_items(array $inv): array</code> — the <code>keySet()</code>
      port: return the keys via <code>array_keys</code>.</li>
</ol>`,

  starter: `<?php

// 1. A map literal: ['key' => value, ...] — no puts required.
function build_inventory(): array {
    throw new Exception("TODO: implement build_inventory");
}

// 2. map.getOrDefault(name, 0)  ->  $inv[$name] ?? 0
function get_count(array $inv, string $name): int {
    throw new Exception("TODO: implement get_count");
}

// 3. Bump the count (missing key counts as 0), return the updated copy.
function add_stock(array $inv, string $name, int $n): array {
    throw new Exception("TODO: implement add_stock");
}

// 4. map.keySet()  ->  array_keys($inv)
function list_items(array $inv): array {
    throw new Exception("TODO: implement list_items");
}
`,

  requirements: [
    { pattern: /=>/, message: "Build the inventory with ['key' => value] literal syntax" },
    { pattern: /\?\?/, message: "Use the ?? operator for the getOrDefault behavior" },
    { pattern: /foreach\s*\(|array_keys/, message: "Use array_keys (or a foreach) to work with the keys" },
  ],

  tests: [
    { name: "build_inventory() returns ['apples' => 3, 'pears' => 5]",
      code: "expect_eq(build_inventory(), ['apples' => 3, 'pears' => 5]);" },
    { name: "get_count(build_inventory(), 'apples') returns 3",
      code: "expect_eq(get_count(build_inventory(), 'apples'), 3);" },
    { name: "get_count(build_inventory(), 'kiwis') returns 0 (missing key)",
      code: "expect_eq(get_count(build_inventory(), 'kiwis'), 0);" },
    { name: "add_stock(['apples' => 3], 'apples', 2) returns ['apples' => 5]",
      code: "expect_eq(add_stock(['apples' => 3], 'apples', 2), ['apples' => 5]);" },
    { name: "add_stock adds new items and leaves the caller's array alone",
      code: "$inv = ['apples' => 3];\nexpect_eq(add_stock($inv, 'pears', 4), ['apples' => 3, 'pears' => 4]);\nexpect_eq($inv, ['apples' => 3]);" },
    { name: "list_items(['pears' => 5, 'apples' => 3]) returns ['pears', 'apples'] (insertion order)",
      code: "expect_eq(list_items(['pears' => 5, 'apples' => 3]), ['pears', 'apples']);" },
  ],

  solution: `<?php

function build_inventory(): array {
    return ['apples' => 3, 'pears' => 5];
}

function get_count(array $inv, string $name): int {
    return $inv[$name] ?? 0;
}

function add_stock(array $inv, string $name, int $n): array {
    $inv[$name] = ($inv[$name] ?? 0) + $n;
    return $inv;
}

function list_items(array $inv): array {
    return array_keys($inv);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>PHP</th></tr>
  <tr><td>Create a map</td><td><code>Map.of("apples", 3)</code> / <code>new HashMap&lt;&gt;()</code></td><td><code>['apples' =&gt; 3]</code></td></tr>
  <tr><td>Put</td><td><code>map.put(k, v)</code></td><td><code>$m[$k] = $v;</code></td></tr>
  <tr><td>Get with default</td><td><code>map.getOrDefault(k, 0)</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td>Iterate entries</td><td><code>for (var e : map.entrySet())</code></td><td><code>foreach ($m as $k =&gt; $v)</code></td></tr>
  <tr><td>Keys</td><td><code>map.keySet()</code></td><td><code>array_keys($m)</code></td></tr>
  <tr><td>Key present?</td><td><code>map.containsKey(k)</code></td><td><code>array_key_exists($k, $m)</code></td></tr>
  <tr><td>Iteration order</td><td>unspecified (<code>HashMap</code>)</td><td>insertion order, always</td></tr>
</table>
<p>The unification runs deep: <code>$arr[] = $x</code> from last lesson was
really "put at the next integer key," and <code>foreach</code> works
identically on lists and maps. One subtlety worth filing away:
<code>$m[$k] ?? 0</code> treats a key that exists <em>with a null value</em>
as missing, while <code>array_key_exists($k, $m)</code> reports it as present
— the same distinction as <code>getOrDefault</code> versus
<code>containsKey</code> on a map that allows null values. For counting and
defaulting, <code>??</code> is almost always what you want.</p>`,
};
