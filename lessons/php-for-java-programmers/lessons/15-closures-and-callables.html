  number: 15,
  title: "Closures & Callables",

  intro: `
<p>A Java lambda captures outer variables automatically — as long as they are
effectively final. PHP anonymous functions capture <strong>nothing</strong>
unless you say so: <code>function () use ($x) { ... }</code> lists every
captured variable explicitly, and each is copied <em>by value</em> — a
snapshot at creation time, with no effectively-final rule because the outer
variable can change freely without affecting the copy. Add an ampersand,
<code>use (&amp;$x)</code>, and you get capture <em>by reference</em>: the
closure reads and <strong>writes the live outer variable</strong> — the
mutable capture Java flatly forbids and makes you simulate with
<code>AtomicInteger</code>.</p>
<table>
  <tr><th>Java</th><th>PHP</th></tr>
  <tr><td><code>x -&gt; x * n</code> (auto-capture, effectively final)</td><td><code>function ($x) use ($n) { return $x * $n; }</code></td></tr>
  <tr><td>—</td><td><code>fn($x) =&gt; $x * $n</code> — arrow fn, auto-captures by value</td></tr>
  <tr><td>Mutable capture: forbidden (<code>AtomicInteger</code> workaround)</td><td><code>use (&amp;$count)</code> — capture by reference</td></tr>
  <tr><td><code>Function&lt;Integer,Integer&gt;</code>, <code>Supplier&lt;T&gt;</code>, ...</td><td><code>callable</code> (param type) / <code>Closure</code> (the object)</td></tr>
  <tr><td><code>f.apply(x)</code>, <code>s.get()</code></td><td><code>$f($x)</code> — just call it</td></tr>
</table>
<p>The short form, <code>fn($x) =&gt; $x * $n</code>, is the one that feels
like home: a single expression that auto-captures by value, no
<code>use</code> clause. For types, PHP collapses Java's zoo of functional
interfaces into two words: <code>callable</code> is the loose parameter type
accepting closures, function-name strings, and more (its signature is
unchecked — no shapes like <code>Function&lt;A,B&gt;</code>), while
<code>Closure</code> is the concrete class anonymous functions actually are,
usable as a precise return type. And there is no <code>.apply()</code> /
<code>.get()</code> naming lottery — every callable is invoked the same way:
<code>$f($x)</code>.</p>`,

  java: `int n = 3; // must be effectively final to be captured
Function<Integer, Integer> triple = x -> x * n;
// n = 4;  // compile error: n is captured

static int applyTwice(UnaryOperator<Integer> f, int x) {
    return f.apply(f.apply(x));
}

// A counting lambda? Java forbids mutating a captured local:
// int count = 0;
// Supplier<Integer> counter = () -> ++count;   // won't compile
// ...so you smuggle the mutation through a box:
AtomicInteger count = new AtomicInteger(0);
Supplier<Integer> counter = count::incrementAndGet;
// counter.get() -> 1, counter.get() -> 2, counter.get() -> 3`,

  task: `
<p>Write the three closure factories Java makes awkward:</p>
<ol>
  <li><code>make_multiplier(int $n): Closure</code> — return
      <code>fn(int $x) =&gt; $x * $n</code>. The arrow function auto-captures
      <code>$n</code> by value, like the lambda capturing its effectively
      final <code>n</code>.</li>
  <li><code>apply_twice(callable $f, int $x): int</code> — call <code>$f</code>
      on <code>$x</code>, then on the result: <code>$f($f($x))</code>.
      <code>callable</code> stands in for <code>UnaryOperator</code>, and
      there is no <code>.apply()</code> — <code>$f($x)</code> invokes it.</li>
  <li><code>make_counter(): Closure</code> — start a local
      <code>$count</code> at 0 and return a long-form closure with
      <code>use (&amp;$count)</code> that increments and returns it:
      successive calls yield 1, 2, 3. By-reference capture replaces the whole
      <code>AtomicInteger</code> dance.</li>
</ol>`,

// 1. Return an arrow function: fn(int $x) => $x * $n

}

// 3. Declare $count = 0, then return a closure with use (&$count)

`,

  requirements: [
    { pattern: /use\s*\(\s*&/, message: "Capture the counter by reference with use (&$count)" },
    { pattern: /fn\s*\(/, message: "Use an arrow function fn(...) => ... in make_multiplier" },
    { pattern: /callable|Closure/, message: "Type the parameters/returns with callable and Closure" },
  ],

  tests: [
    { name: "make_multiplier(3) returns a closure that triples",
      code: "$triple = make_multiplier(3);\nexpect_eq($triple(7), 21);" },
    { name: "the captured $n is a snapshot per closure — two multipliers don't interfere",
      code: "$double = make_multiplier(2);\n$ten = make_multiplier(10);\nexpect_eq($double(5), 10);\nexpect_eq($ten(5), 50);" },
    { name: "apply_twice(fn($x) => $x + 1, 5) returns 7",
      code: "expect_eq(apply_twice(fn($x) => $x + 1, 5), 7);" },
    { name: "apply_twice composes with make_multiplier: doubling twice is x4",
      code: "expect_eq(apply_twice(make_multiplier(2), 3), 12);" },
    { name: "make_counter() counts 1, 2, 3 across calls (mutable capture)",
      code: "$counter = make_counter();\nexpect_eq($counter(), 1);\nexpect_eq($counter(), 2);\nexpect_eq($counter(), 3);" },
    { name: "each counter owns its own $count",
      code: "$a = make_counter();\n$b = make_counter();\n$a();\n$a();\nexpect_eq($b(), 1);" },
  ],

  solution: `<?php

function make_multiplier(int $n): Closure {
    return fn(int $x) => $x * $n;
}

function apply_twice(callable $f, int $x): int {
    return $f($f($x));
}

function make_counter(): Closure {
    $count = 0;
    return function () use (&$count): int {
        $count += 1;
        return $count;
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>PHP</th></tr>
  <tr><td>Lambda, one expression</td><td><code>x -&gt; x * n</code></td><td><code>fn($x) =&gt; $x * $n</code> (auto-captures by value)</td></tr>
  <tr><td>Lambda, full body</td><td><code>x -&gt; { ... }</code></td><td><code>function ($x) use ($n) { ... }</code> (explicit capture)</td></tr>
  <tr><td>Capture rule</td><td>Automatic, effectively final only</td><td>Explicit <code>use</code>; by-value copy, outer var stays free</td></tr>
  <tr><td>Mutable capture</td><td>Forbidden — <code>AtomicInteger</code> box</td><td><code>use (&amp;$x)</code> — by reference</td></tr>
  <tr><td>Function type</td><td><code>Function&lt;A,B&gt;</code>, <code>Supplier</code>, <code>Predicate</code>, ...</td><td><code>callable</code> (loose) / <code>Closure</code> (concrete class)</td></tr>
  <tr><td>Invoke</td><td><code>f.apply(x)</code> / <code>s.get()</code> / <code>p.test(x)</code></td><td><code>$f($x)</code>, always</td></tr>
  <tr><td>Method reference</td><td><code>String::strip</code></td><td><code>strlen(...)</code> — first-class callable (PHP 8.1)</td></tr>
</table>
<p>The capture model is the real difference to internalize: a Java lambda
shares the (immutable) variable, a PHP closure by default owns a
<em>copy</em> taken when the closure was created — later changes to the outer
variable are invisible, which surprises in loops. Reach for
<code>use (&amp;$x)</code> only when you genuinely want shared mutable state,
as in the counter; and note that <code>callable</code> promises nothing about
arity or types, so a <code>Closure</code> return type plus a documented
signature is the closest PHP gets to
<code>Supplier&lt;Integer&gt;</code>.</p>`,
};
