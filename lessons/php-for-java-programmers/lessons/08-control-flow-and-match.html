const LESSON = {
  number: 8,
  title: "Control Flow & match",

  intro: `
<p>PHP's <code>if</code> is Java's <code>if</code> (with truthiness, per the
last lesson) — the only spelling difference is <code>elseif</code> as one
word. Its classic <code>switch</code>, however, is <em>worse</em> than the
one you left behind: it compares cases with loose <code>==</code> juggling
<em>and</em> falls through without <code>break</code>, combining Java's
oldest switch footgun with PHP's oldest comparison footgun. Skip it.</p>
<p>What you use instead is <code>match</code> (PHP 8), which lands almost
exactly on Java 14's <code>switch</code> <em>expressions</em>: each arm uses
<code>-></code>-style <code>=></code> syntax, there is no fallthrough, arms
can be grouped with commas, the whole thing is an expression you can
<code>return</code>, and — crucially — it compares with strict
<code>===</code>. Exhaustiveness is enforced too, though at runtime rather
than compile time: an unmatched value with no <code>default</code> throws
<code>UnhandledMatchError</code>, like a sealed-type switch missing a case,
discovered when it runs.</p>
<table>
  <tr><th>Java</th><th>PHP</th></tr>
  <tr><td><code>else if</code></td><td><code>elseif</code> (one word)</td></tr>
  <tr><td><code>switch</code> statement (fallthrough, needs <code>break</code>)</td><td><code>switch</code> — fallthrough <em>and</em> loose <code>==</code>; avoid</td></tr>
  <tr><td><code>switch (d) { case "Sat", "Sun" -> "Weekend"; }</code></td><td><code>match ($d) { "Sat", "Sun" => "Weekend", }</code></td></tr>
  <tr><td>exhaustiveness: compile error</td><td>exhaustiveness: <code>UnhandledMatchError</code> at runtime</td></tr>
  <tr><td>guarded patterns: <code>case Integer i when i >= 90</code></td><td><code>match (true) { $score >= 90 => ..., }</code></td></tr>
</table>
<p>The last row is the local idiom worth memorizing: <code>match (true)</code>
turns each arm's condition into a guard, giving you a clean ladder of range
checks — the job Java 21 needs pattern guards for, or that otherwise falls
back to an <code>if</code>/<code>else if</code> chain.</p>`,

  java: `String grade(int score) {
    if (score >= 90) return "A";
    else if (score >= 80) return "B";
    else if (score >= 70) return "C";
    else if (score >= 60) return "D";
    else return "F";
}

String dayType(String day) {
    // Java 14+ switch expression: no fallthrough, an expression,
    // grouped labels, exhaustiveness checked by the compiler.
    return switch (day) {
        case "Saturday", "Sunday" -> "Weekend";
        case "Monday", "Tuesday", "Wednesday",
             "Thursday", "Friday" -> "Weekday";
        default -> "Unknown";
    };
}`,

  task: `
<p>Port both functions using <code>match</code> — no <code>if</code> chains,
no <code>switch</code>:</p>
<ol>
  <li><code>grade(int $score): string</code> — the classic grade ladder
      (90+ "A", 80+ "B", 70+ "C", 60+ "D", otherwise "F"). Ranges aren't
      values you can list, so use the <code>match (true)</code> idiom: each
      arm is a condition like <code>$score >= 90 => "A"</code>, and the first
      true one wins. Finish with <code>default => "F"</code>.</li>
  <li><code>day_type(string $day): string</code> — a direct port of the Java
      switch expression: group <code>"Saturday", "Sunday"</code> into one
      <code>"Weekend"</code> arm, the five weekdays into a
      <code>"Weekday"</code> arm, and give any other string
      <code>default => "Unknown"</code> (without the default, an unexpected
      value would throw <code>UnhandledMatchError</code>).</li>
</ol>`,

  starter: `<?php

// 1. Ranges can't be case labels — match (true) makes each arm a guard:
//    match (true) { $score >= 90 => "A", ..., default => "F" }
function grade(int $score): string {
    throw new Exception("TODO: implement grade with match(true)");
}

// 2. A straight port of Java's switch expression: grouped arms + default.
function day_type(string $day): string {
    throw new Exception("TODO: implement day_type with match");
}
`,

  requirements: [
    { pattern: /match\s*\(/, message: "Use a match expression (not if chains or switch)" },
    { pattern: /match\s*\(\s*true\s*\)/, message: "Use the match(true) idiom for the grade ranges" },
    { pattern: /default\s*=>/, message: "Include a default => arm" },
  ],

  tests: [
    { name: 'grade: 95 => "A", 80 => "B"',
      code: 'expect_eq(grade(95), "A");\nexpect_eq(grade(80), "B");' },
    { name: 'grade: 72 => "C", 60 => "D"',
      code: 'expect_eq(grade(72), "C");\nexpect_eq(grade(60), "D");' },
    { name: 'grade: 59 and 0 both => "F"',
      code: 'expect_eq(grade(59), "F");\nexpect_eq(grade(0), "F");' },
    { name: 'day_type: Saturday and Sunday are "Weekend"',
      code: 'expect_eq(day_type("Saturday"), "Weekend");\nexpect_eq(day_type("Sunday"), "Weekend");' },
    { name: 'day_type: Monday and Wednesday are "Weekday"',
      code: 'expect_eq(day_type("Monday"), "Weekday");\nexpect_eq(day_type("Wednesday"), "Weekday");' },
    { name: 'day_type: anything else is "Unknown"',
      code: 'expect_eq(day_type("Payday"), "Unknown");' },
  ],

  solution: `<?php

function grade(int $score): string {
    return match (true) {
        $score >= 90 => "A",
        $score >= 80 => "B",
        $score >= 70 => "C",
        $score >= 60 => "D",
        default => "F",
    };
}

function day_type(string $day): string {
    return match ($day) {
        "Saturday", "Sunday" => "Weekend",
        "Monday", "Tuesday", "Wednesday", "Thursday", "Friday" => "Weekday",
        default => "Unknown",
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>PHP</th></tr>
  <tr><td>Chained condition</td><td><code>else if</code></td><td><code>elseif</code></td></tr>
  <tr><td>Value dispatch</td><td><code>switch</code> expression (14+)</td><td><code>match</code> (8.0+), strict <code>===</code></td></tr>
  <tr><td>Arm syntax</td><td><code>case X -> result;</code></td><td><code>X => result,</code></td></tr>
  <tr><td>Grouped labels</td><td><code>case "Sat", "Sun" -></code></td><td><code>"Sat", "Sun" =></code></td></tr>
  <tr><td>Missing case</td><td>compile error (sealed/enum)</td><td><code>UnhandledMatchError</code> at runtime</td></tr>
  <tr><td>Range guards</td><td><code>case Integer i when i >= 90</code></td><td><code>match (true) { $x >= 90 => ... }</code></td></tr>
</table>
<p>Two things carry over unchanged and one doesn't: <code>match</code> arms
are expressions only — no statement blocks, so a complex arm calls a helper
function; each arm compares with <code>===</code>, so <code>match ("1")</code>
will not hit an arm listing <code>1</code>; and unlike Java there is no
compiler to catch the missing case, so an intentionally exhaustive
<code>match</code> <em>without</em> a <code>default</code> is often the safer
design — the <code>UnhandledMatchError</code> surfaces the forgotten case
loudly instead of hiding it behind a catch-all.</p>`,
};
