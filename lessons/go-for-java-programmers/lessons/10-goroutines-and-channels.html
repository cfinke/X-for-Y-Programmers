  title: "Goroutines & Channels",

  intro: `
<p>Java's concurrency is built on OS threads and shared mutable state guarded by
locks: you start a <code>Thread</code> or submit a task to an
<code>ExecutorService</code>, and coordinate with <code>synchronized</code> blocks,
<code>Future.get()</code>, or a <code>CountDownLatch</code>. Go's concurrency is
built into the language and uses lightweight, genuinely parallel goroutines. You
start a <em>goroutine</em> — a cheap function that runs alongside yours — with the
<code>go</code> keyword, and goroutines talk to each other through <em>channels</em>,
typed pipes you send to with <code>ch &lt;- v</code> and receive from with
<code>v := &lt;-ch</code>.</p>
<table>
  <tr><th>Java</th><th>Go</th></tr>
  <tr><td><code>executor.submit(() -&gt; work());</code></td><td><code>go doWork()</code></td></tr>
  <tr><td><code>for (Future&lt;?&gt; f : futures) f.get();</code></td><td><code>var wg sync.WaitGroup; …; wg.Wait()</code></td></tr>
  <tr><td>a completed <code>Future&lt;T&gt;</code></td><td><code>ch chan T</code> (a value in flight)</td></tr>
  <tr><td><code>future.get()</code></td><td><code>v := &lt;-ch</code></td></tr>
  <tr><td><code>for (T x : blockingQueue)</code></td><td><code>for v := range ch</code></td></tr>
</table>
<p>A channel is made with <code>make(chan T)</code>. An unbuffered channel blocks the
sender until someone receives; a <em>buffered</em> one, <code>make(chan T, n)</code>,
holds up to <code>n</code> values before blocking. When a producer is done it calls
<code>close(ch)</code>; a <code>for v := range ch</code> loop then drains the remaining
values and exits cleanly. To wait for a group of goroutines with no value to return,
use <code>sync.WaitGroup</code>: <code>Add(1)</code> before each, <code>Done()</code>
inside, and <code>Wait()</code> to block until the count hits zero. All of this is
deterministic when you collect results rather than sleep and hope.</p>`,

  java: `int sumConcurrent(List<Integer> nums) throws Exception {
    ExecutorService pool = Executors.newCachedThreadPool();
    List<Future<Integer>> futures = new ArrayList<>();
    for (int n : nums) {
        futures.add(pool.submit(() -> n));
    }
    int total = 0;
    for (Future<Integer> f : futures) {
        total += f.get();
    }
    pool.shutdown();
    return total;
}

List<Integer> squareAll(List<Integer> nums) throws Exception {
    ExecutorService pool = Executors.newCachedThreadPool();
    List<Future<Integer>> futures = new ArrayList<>();
    for (int n : nums) {
        futures.add(pool.submit(() -> n * n));
    }
    List<Integer> result = new ArrayList<>();
    for (Future<Integer> f : futures) {
        result.add(f.get());
    }
    pool.shutdown();
    return result;
}`,

  solution: `func SumConcurrent(nums []int) int {
	ch := make(chan int)
	for _, n := range nums {
		go func(n int) {
			ch <- n
		}(n)
	}
	total := 0
	for range nums {
		total += <-ch
	}
	return total
}

func SquareAll(nums []int) []int {
	result := make([]int, len(nums))
	var wg sync.WaitGroup
	for i, n := range nums {
		wg.Add(1)
		go func(i, n int) {
			defer wg.Done()
			result[i] = n * n
		}(i, n)
	}
	wg.Wait()
	return result
}

func CountUp(n int) []int {
	ch := make(chan int, n)
	go func() {
		for i := 0; i < n; i++ {
			ch <- i
		}
		close(ch)
	}()
	out := make([]int, 0, n)
	for v := range ch {
		out = append(out, v)
	}
	return out
}
`,

<table>

  <tr><td>Signal "no more"</td><td>sentinel value / poison pill</td><td><code>close(ch)</code></td></tr>
  <tr><td>Drain a stream</td><td><code>for (T v : queue)</code></td><td><code>for v := range ch</code></td></tr>
  <tr><td>Wait for a group</td><td><code>latch.await()</code> / <code>pool.awaitTermination(...)</code></td><td><code>wg.Wait()</code></td></tr>
</table>
<p>A few habits that keep concurrent Go correct. Pass loop variables into the
goroutine as arguments (<code>go func(n int){…}(n)</code>) or capture a fresh copy —
otherwise every goroutine may see the last value. Only the producer should
<code>close</code> a channel, and only once; sending on a closed channel panics, but
receiving from one keeps yielding the zero value with <code>ok == false</code>. Two
goroutines writing the <em>same</em> map or slice element is a data race, but writing
<em>distinct</em> indices of a pre-sized slice (as <code>SquareAll</code> does) is
safe. And whenever a test must be deterministic, gather results through a channel or a
<code>WaitGroup</code> — never a <code>time.Sleep</code>, which only papers over the
race.</p>`,
