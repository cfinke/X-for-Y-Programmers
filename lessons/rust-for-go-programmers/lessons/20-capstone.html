const LESSON = {
  number: 20,
  title: "Capstone",

  intro: `
<p>Last lesson — no new concepts, just the course in one exercise. You're
building the classic small Go program: a struct, a slice of them, and four
functions that read, search, and update it. Every line will use something
you've already earned: struct definitions (lesson 10), <code>Option</code>
instead of nil-or-bool returns (lesson 8), iterator chains instead of
<code>for</code>-append loops (lesson 14), <code>&amp;mut</code> for the
one function that writes (lesson 5), and a lifetime tying a returned
reference to its slice (lesson 16).</p>
<table>
  <tr><th>Go</th><th>Rust</th></tr>
  <tr><td><code>func totalValue(items []Item) int</code></td><td><code>fn total_value(items: &amp;[Item]) -&gt; u32</code></td></tr>
  <tr><td><code>func findItem(...) *Item</code> — nil if missing</td><td><code>fn find_item&lt;'a&gt;(...) -&gt; Option&lt;&amp;'a Item&gt;</code></td></tr>
  <tr><td><code>func restock(items []Item, ...) bool</code> — mutates via the shared backing array</td><td><code>fn restock(items: &amp;mut Vec&lt;Item&gt;, ...) -&gt; bool</code> — mutation declared in the type</td></tr>
  <tr><td><code>for</code> + <code>append</code></td><td><code>.iter().filter(...).map(...).collect()</code></td></tr>
</table>
<p>Look at the middle rows — they're the course's thesis in two lines.
Go's <code>*Item</code> return might be nil, and the compiler won't make
the caller check; <code>Option&lt;&amp;Item&gt;</code> makes forgetting
impossible. Go's slice parameter can always mutate the caller's data;
Rust's signatures split into <code>&amp;[Item]</code> (may only look) and
<code>&amp;mut Vec&lt;Item&gt;</code> (may change it), so the function's
side effects are part of its type. That's the whole trade you've been
making for twenty lessons: more said up front, nothing left to runtime.</p>`,

  go: `type Item struct {
	Name       string
	PriceCents uint
	Count      uint
}

func totalValue(items []Item) uint {
	total := uint(0)
	for _, it := range items {
		total += it.PriceCents * it.Count
	}
	return total
}

func findItem(items []Item, name string) *Item {
	for i := range items {
		if items[i].Name == name {
			return &items[i]
		}
	}
	return nil // caller had better remember to check
}

func restock(items []Item, name string, amount uint) bool {
	for i := range items {
		if items[i].Name == name {
			items[i].Count += amount
			return true
		}
	}
	return false
}

func namesInStock(items []Item) []string {
	names := []string{}
	for _, it := range items {
		if it.Count > 0 {
			names = append(names, it.Name)
		}
	}
	return names
}`,

  task: `
<p>The <code>Item</code> struct is defined for you. Port the four
functions:</p>
<ol>
  <li><code>total_value</code> takes <code>items: &amp;[Item]</code> and
      returns <code>u32</code>: the sum of <code>price_cents * count</code>
      over all items — <code>.iter().map(...).sum()</code>.</li>
  <li><code>find_item&lt;'a&gt;</code> takes
      <code>items: &amp;'a [Item]</code> and <code>name: &amp;str</code>,
      returning <code>Option&lt;&amp;'a Item&gt;</code>: a reference to the
      first item whose name matches, or <code>None</code> —
      <code>.iter().find(...)</code> returns exactly this. (Two input
      references, so the lifetime says which one the result borrows
      from.)</li>
  <li><code>restock</code> takes <code>items: &amp;mut Vec&lt;Item&gt;</code>,
      <code>name: &amp;str</code>, and <code>amount: u32</code>, returning
      <code>bool</code>: find the matching item (loop over
      <code>items.iter_mut()</code>), add <code>amount</code> to its
      <code>count</code>, and return <code>true</code>; return
      <code>false</code> if no item matches.</li>
  <li><code>names_in_stock</code> takes <code>items: &amp;[Item]</code> and
      returns <code>Vec&lt;String&gt;</code>: the names of items with
      <code>count &gt; 0</code>, in order —
      <code>.iter().filter(...).map(|i| i.name.clone()).collect()</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `struct Item {
    name: String,
    price_cents: u32,
    count: u32,
}

// 1. Sum of price_cents * count: .iter().map(...).sum()
fn total_value(items: &[Item]) -> u32 {
    todo!()
}

// 2. First item with a matching name: .iter().find(...)
fn find_item<'a>(items: &'a [Item], name: &str) -> Option<&'a Item> {
    todo!()
}

// 3. Add amount to the matching item's count; true if found.
//    Loop over items.iter_mut().
fn restock(items: &mut Vec<Item>, name: &str, amount: u32) -> bool {
    todo!()
}

// 4. Names of items with count > 0: filter, map, collect.
fn names_in_stock(items: &[Item]) -> Vec<String> {
    todo!()
}
`,

  requirements: [
    { pattern: /Option<&/, message: "find_item returns Option<&Item> — a borrowed item or None" },
    { pattern: /\.iter\(\)/, message: "Use iterator chains (.iter()) rather than index loops" },
    { pattern: /&mut\s+Vec<Item>/, message: "restock takes items: &mut Vec<Item> — mutation is in the signature" },
  ],

  tests: [
    { name: "total_value sums price_cents * count across items",
      code: 'let items = vec![\n    Item { name: String::from("bolt"), price_cents: 50, count: 10 },\n    Item { name: String::from("gear"), price_cents: 300, count: 2 },\n    Item { name: String::from("nut"), price_cents: 25, count: 0 },\n];\nassert_eq!(total_value(&items), 1100);\nlet empty: Vec<Item> = Vec::new();\nassert_eq!(total_value(&empty), 0);' },
    { name: 'find_item(&items, "gear") returns Some of the matching item',
      code: 'let items = vec![\n    Item { name: String::from("bolt"), price_cents: 50, count: 10 },\n    Item { name: String::from("gear"), price_cents: 300, count: 2 },\n];\nlet found = find_item(&items, "gear");\nassert!(found.is_some());\nassert_eq!(found.unwrap().price_cents, 300);' },
    { name: 'find_item returns None when the name is missing',
      code: 'let items = vec![Item { name: String::from("bolt"), price_cents: 50, count: 10 }];\nassert!(find_item(&items, "widget").is_none());' },
    { name: "restock adds to the matching item's count and returns true",
      code: 'let mut items = vec![\n    Item { name: String::from("bolt"), price_cents: 50, count: 10 },\n    Item { name: String::from("nut"), price_cents: 25, count: 0 },\n];\nassert!(restock(&mut items, "nut", 5));\nassert_eq!(items[1].count, 5);\nassert_eq!(items[0].count, 10);' },
    { name: "restock returns false (and changes nothing) for an unknown name",
      code: 'let mut items = vec![Item { name: String::from("bolt"), price_cents: 50, count: 10 }];\nassert!(!restock(&mut items, "widget", 3));\nassert_eq!(items[0].count, 10);' },
    { name: "names_in_stock keeps only items with count > 0, in order",
      code: 'let all = vec![\n    Item { name: String::from("gear"), price_cents: 300, count: 2 },\n    Item { name: String::from("nut"), price_cents: 25, count: 0 },\n    Item { name: String::from("cam"), price_cents: 75, count: 1 },\n];\nassert_eq!(names_in_stock(&all), vec![String::from("gear"), String::from("cam")]);\nlet empty: Vec<Item> = Vec::new();\nassert_eq!(names_in_stock(&empty), Vec::<String>::new());' },
  ],

  solution: `struct Item {
    name: String,
    price_cents: u32,
    count: u32,
}

fn total_value(items: &[Item]) -> u32 {
    items.iter().map(|i| i.price_cents * i.count).sum()
}

fn find_item<'a>(items: &'a [Item], name: &str) -> Option<&'a Item> {
    items.iter().find(|i| i.name == name)
}

fn restock(items: &mut Vec<Item>, name: &str, amount: u32) -> bool {
    for item in items.iter_mut() {
        if item.name == name {
            item.count += amount;
            return true;
        }
    }
    false
}

fn names_in_stock(items: &[Item]) -> Vec<String> {
    items
        .iter()
        .filter(|i| i.count > 0)
        .map(|i| i.name.clone())
        .collect()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Rust</th></tr>
  <tr><td>"Maybe found" return</td><td><code>*Item</code>, nil unchecked</td><td><code>Option&lt;&amp;Item&gt;</code>, checked by the compiler</td></tr>
  <tr><td>Read-only parameter</td><td><code>[]Item</code> (but mutation still compiles)</td><td><code>&amp;[Item]</code> — writes are a compile error</td></tr>
  <tr><td>Mutating parameter</td><td><code>[]Item</code> (looks identical!)</td><td><code>&amp;mut Vec&lt;Item&gt;</code> — declared, and exclusive</td></tr>
  <tr><td>Search</td><td>index loop + <code>return &amp;items[i]</code></td><td><code>.iter().find(|i| ...)</code></td></tr>
  <tr><td>Filter + transform</td><td><code>for</code> + <code>if</code> + <code>append</code></td><td><code>.iter().filter(...).map(...).collect()</code></td></tr>
  <tr><td>Returned reference's validity</td><td>GC keeps it alive indefinitely</td><td><code>&lt;'a&gt;</code> ties it to the slice, checked statically</td></tr>
</table>
<p>Compare the two parameter columns: in Go, <code>totalValue</code> and
<code>restock</code> take the <em>same type</em>, and only reading the body
tells you which one mutates your data. In Rust the signatures disagree —
<code>&amp;[Item]</code> versus <code>&amp;mut Vec&lt;Item&gt;</code> — and
the compiler holds each function to its claim. That's the summary of the
whole course: Go trusts you and checks at runtime (nil, races, the
<code>-race</code> flag); Rust asks you to write the contract down —
ownership, <code>mut</code>, <code>Option</code>, <code>'a</code> — and
then proves it before the program ever runs. You now read and write those
contracts. Welcome to Rust.</p>`,
};
