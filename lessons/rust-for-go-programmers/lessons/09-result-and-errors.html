<script>
const LESSON = {
  number: 9,
  title: "Result & the ? Operator",

  intro: `
<p>This is the lesson where your Go instincts transfer best. Both languages
made the same foundational bet: <strong>errors are values</strong>, not
exceptions — returned, inspected, wrapped, passed along. Rust's
<code>Result&lt;T, E&gt;</code> is Go's <code>(T, error)</code> with two
upgrades: you <em>can't</em> forget to check the error (using the
<code>T</code> requires going through the <code>Result</code>), and you
can't accidentally use a half-valid <code>T</code> when <code>err !=
nil</code>, because there is no <code>T</code> in the <code>Err</code>
case — it's <code>Ok(value)</code> <em>or</em> <code>Err(error)</code>,
never both.</p>
<table>
  <tr><th>Go</th><th>Rust</th></tr>
  <tr><td><code>func f() (T, error)</code></td><td><code>fn f() -&gt; Result&lt;T, E&gt;</code></td></tr>
  <tr><td><code>return value, nil</code></td><td><code>Ok(value)</code></td></tr>
  <tr><td><code>return T{}, err</code></td><td><code>Err(err)</code> — no dummy value needed</td></tr>
  <tr><td><code>if err != nil { return 0, err }</code></td><td><code>?</code> — one character</td></tr>
  <tr><td><code>fmt.Errorf("parse age: %w", err)</code></td><td><code>.map_err(|e| format!("parse age: {}", e))</code></td></tr>
</table>
<p>And the pattern you type fifty times a day — <code>if err != nil {
return err }</code> — becomes one character: <code>?</code>. Write
<code>parse_age(s)?</code> and if the result is <code>Err</code>, the
function returns it immediately; if it's <code>Ok(v)</code>, the expression
evaluates to <code>v</code> and execution continues. It's the exact
early-return you write by hand in Go, generated by the compiler, with the
error path impossible to skip. For wrapping errors on the way up —
Go's <code>fmt.Errorf("context: %w", err)</code> —
<code>.map_err(...)</code> transforms the error while leaving
<code>Ok</code> untouched.</p>`,

  go: `package main

import (
	"fmt"
	"strconv"
	"strings"
)

func parseAge(s string) (uint32, error) {
	n, err := strconv.ParseUint(strings.TrimSpace(s), 10, 32)
	if err != nil {
		return 0, fmt.Errorf("invalid age %q: %w", s, err)
	}
	return uint32(n), nil
}

func ageNextYear(s string) (uint32, error) {
	age, err := parseAge(s)
	if err != nil {
		return 0, err // the three lines you type fifty times a day
	}
	return age + 1, nil
}

func main() {
	fmt.Println(ageNextYear(" 41 "))
}`,

  task: `
<p>Rewrite the parsing pair with <code>Result</code>:</p>
<ol>
  <li><code>parse_age(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code> —
      trim and parse: <code>s.trim().parse::&lt;u32&gt;()</code> gives a
      <code>Result</code> whose error type is the standard library's parse
      error; convert it to your <code>String</code> error with
      <code>.map_err(|e| format!("invalid age {:?}: {}", s, e))</code> —
      the <code>fmt.Errorf("...%w", err)</code> of Rust.</li>
  <li><code>age_next_year(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code>
      — call <code>parse_age(s)?</code> (the whole
      <code>if err != nil { return err }</code> block, as one character),
      add 1, and return it wrapped in <code>Ok</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. parse_age: s.trim().parse::<u32>() returns
//    Result<u32, ParseIntError>. Use .map_err(|e| format!(...)) to
//    turn that into your Result<u32, String> — Go's fmt.Errorf wrap.
fn parse_age(s: &str) -> Result<u32, String> {
    todo!()
}

// 2. age_next_year: parse_age(s)? is Go's
//        age, err := parseAge(s)
//        if err != nil { return 0, err }
//    in one character. Then Ok(age + 1).
fn age_next_year(s: &str) -> Result<u32, String> {
    todo!()
}
`,

  requirements: [
    { pattern: /Result</, message: "Return Result<u32, String> — Go's (uint32, error)" },
    { pattern: /map_err|Err\(/, message: "Convert the parse error with map_err (or construct Err yourself)" },
    { pattern: /\)\?/, message: "Propagate the error with the ? operator in age_next_year" },
  ],

  tests: [
    { name: 'parse_age("42") returns Ok(42)',
      code: 'assert_eq!(parse_age("42"), Ok(42));' },
    { name: 'parse_age(" 41 ") trims whitespace before parsing',
      code: 'assert_eq!(parse_age(" 41 "), Ok(41));' },
    { name: 'parse_age("forty") returns an Err',
      code: 'assert!(parse_age("forty").is_err());' },
    { name: 'age_next_year("41") returns Ok(42)',
      code: 'assert_eq!(age_next_year("41"), Ok(42));' },
    { name: "age_next_year propagates the parse error via ?",
      code: 'assert!(age_next_year("not a number").is_err());' },
  ],

  solution: `fn parse_age(s: &str) -> Result<u32, String> {
    s.trim()
        .parse::<u32>()
        .map_err(|e| format!("invalid age {:?}: {}", s, e))
}

fn age_next_year(s: &str) -> Result<u32, String> {
    let age = parse_age(s)?;
    Ok(age + 1)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Rust</th></tr>
  <tr><td>Fallible signature</td><td><code>func f() (T, error)</code></td><td><code>fn f() -&gt; Result&lt;T, E&gt;</code></td></tr>
  <tr><td>Success</td><td><code>return v, nil</code></td><td><code>Ok(v)</code></td></tr>
  <tr><td>Failure</td><td><code>return 0, err</code> (dummy T required)</td><td><code>Err(e)</code> (no dummy)</td></tr>
  <tr><td>Check &amp; propagate</td><td><code>if err != nil { return 0, err }</code></td><td><code>let v = f()?;</code></td></tr>
  <tr><td>Wrap with context</td><td><code>fmt.Errorf("ctx: %w", err)</code></td><td><code>.map_err(|e| format!("ctx: {}", e))</code></td></tr>
  <tr><td>Ignore the error</td><td><code>v, _ := f()</code> compiles fine</td><td>must go through the <code>Result</code>; ignoring is loud (<code>unwrap</code>)</td></tr>
  <tr><td>Handle both branches</td><td><code>if err != nil { ... } else { ... }</code></td><td><code>match r { Ok(v) =&gt; ..., Err(e) =&gt; ... }</code></td></tr>
</table>
<p>Rust and Go agree on the philosophy and differ on enforcement. In Go,
<code>v, _ := f()</code> discards an error silently, and the linters that
catch it are opt-in. In Rust the value only exists inside <code>Ok</code>,
so every caller either handles the error, propagates it with
<code>?</code>, or writes <code>unwrap()</code> — a visible, greppable
admission that a panic is acceptable here. Note the small structural bonus
too: <code>?</code> nests inside expressions
(<code>Ok(parse_age(s)? + 1)</code> works), which the three-line Go idiom
never could.</p>`,
};
