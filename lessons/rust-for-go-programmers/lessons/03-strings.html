const LESSON = {
  number: 3,
  title: "Strings: String & &str",

  intro: `
<p>Go has one string type: an immutable view of bytes, cheap to copy
around because it's just a pointer and a length. Rust splits that job in
two. <code>&amp;str</code> is a borrowed view — pointer + length, immutable,
cheap to pass — which makes it the closest cousin of Go's
<code>string</code>. <code>String</code> is the owned, growable buffer —
the thing you build with <code>format!</code> or modify in place. Go hides
this split (building a string quietly allocates a new one); Rust puts it
in the type, so you can see which functions allocate just by reading
their signatures.</p>
<table>
  <tr><th>Go</th><th>Rust</th></tr>
  <tr><td><code>string</code> (immutable view)</td><td><code>&amp;str</code> (borrowed view)</td></tr>
  <tr><td><code>string</code> (freshly built)</td><td><code>String</code> (owned, growable)</td></tr>
  <tr><td><code>strings.ToUpper(s)</code></td><td><code>s.to_uppercase()</code></td></tr>
  <tr><td><code>strings.Contains(h, n)</code></td><td><code>h.contains(n)</code></td></tr>
  <tr><td><code>fmt.Sprintf("Hello, %s!", n)</code></td><td><code>format!("Hello, {}!", n)</code></td></tr>
  <tr><td><code>len(s)</code> — bytes</td><td><code>s.len()</code> — bytes (they agree!)</td></tr>
</table>
<p>The working rule for function signatures: <strong>take
<code>&amp;str</code>, return <code>String</code></strong>. Borrow what you
read, own what you build. Also comfortingly familiar: both languages
commit to UTF-8, and both count length in <em>bytes</em>, not characters
— your Go instincts about <code>len("héllo")</code> transfer directly.
One stylistic shift: where Go puts string helpers in the
<code>strings</code> package, Rust hangs them off the value itself —
<code>strings.ToUpper(s)</code> becomes <code>s.to_uppercase()</code>.</p>`,

  go: `package main

import (
	"fmt"
	"strings"
)

func shout(s string) string {
	return strings.ToUpper(s) + "!"
}

func greet(name string) string {
	return fmt.Sprintf("Hello, %s!", name)
}

func containsWord(haystack, needle string) bool {
	return strings.Contains(haystack, needle)
}`,

  task: `
<p>Port the three Go functions, following the "take <code>&amp;str</code>,
return <code>String</code>" rule:</p>
<ol>
  <li><code>shout</code> takes <code>s: &amp;str</code> and returns a
      <code>String</code>: the input uppercased with <code>"!"</code>
      appended. <code>s.to_uppercase()</code> already gives you an owned
      <code>String</code>, and <code>format!</code> can glue on the
      <code>!</code>.</li>
  <li><code>greet</code> takes <code>name: &amp;str</code> and returns
      <code>String</code> like <code>"Hello, Gopher!"</code> — a direct
      <code>fmt.Sprintf</code> → <code>format!</code> translation.</li>
  <li><code>contains_word</code> takes <code>haystack: &amp;str</code> and
      <code>needle: &amp;str</code>, returning <code>bool</code>. The method
      lives on the string itself: <code>haystack.contains(needle)</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. shout: uppercase + "!" appended.
//    Go: strings.ToUpper(s) + "!"  ->  Rust: s.to_uppercase(), then format!
fn shout(s: &str) -> String {
    todo!()
}

// 2. greet: "Hello, <name>!" — fmt.Sprintf("%s") becomes format!("{}").
fn greet(name: &str) -> String {
    todo!()
}

// 3. contains_word: strings.Contains(h, n) -> h.contains(n)
fn contains_word(haystack: &str, needle: &str) -> bool {
    todo!()
}
`,

  requirements: [
    { pattern: /&str/, message: "Take borrowed &str parameters" },
    { pattern: /->\s*String/, message: "Return an owned String from shout and greet" },
    { pattern: /format!\s*\(/, message: "Use format! to build a string" },
  ],

  tests: [
    { name: 'shout("go") returns "GO!"',
      code: 'assert_eq!(shout("go"), "GO!");' },
    { name: 'shout("hello world") returns "HELLO WORLD!"',
      code: 'assert_eq!(shout("hello world"), "HELLO WORLD!");' },
    { name: 'greet("Gopher") returns "Hello, Gopher!"',
      code: 'assert_eq!(greet("Gopher"), "Hello, Gopher!");' },
    { name: 'contains_word("the quick brown fox", "quick") is true',
      code: 'assert!(contains_word("the quick brown fox", "quick"));' },
    { name: 'contains_word("the quick brown fox", "slow") is false',
      code: 'assert!(!contains_word("the quick brown fox", "slow"));' },
  ],

  solution: `fn shout(s: &str) -> String {
    format!("{}!", s.to_uppercase())
}

fn greet(name: &str) -> String {
    format!("Hello, {}!", name)
}

fn contains_word(haystack: &str, needle: &str) -> bool {
    haystack.contains(needle)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Rust</th></tr>
  <tr><td>Pass a string in</td><td><code>s string</code></td><td><code>s: &amp;str</code> (borrowed view)</td></tr>
  <tr><td>Build and return</td><td><code>string</code></td><td><code>String</code> (owned)</td></tr>
  <tr><td>Uppercase</td><td><code>strings.ToUpper(s)</code></td><td><code>s.to_uppercase()</code></td></tr>
  <tr><td>Substring check</td><td><code>strings.Contains(h, n)</code></td><td><code>h.contains(n)</code></td></tr>
  <tr><td>Interpolation</td><td><code>fmt.Sprintf("Hello, %s!", n)</code></td><td><code>format!("Hello, {}!", n)</code></td></tr>
  <tr><td>Length</td><td><code>len(s)</code>, bytes, UTF-8</td><td><code>s.len()</code>, bytes, UTF-8 — identical semantics</td></tr>
</table>
<p>Why two types instead of Go's one? Because they answer the question Go
answers at runtime with the garbage collector: <em>who frees this
buffer?</em> A <code>String</code> has an owner who will free it; an
<code>&amp;str</code> is just looking at someone else's bytes. A string
literal like <code>"go"</code> is an <code>&amp;str</code> baked into the
binary, which is why you can pass literals straight into
<code>&amp;str</code> parameters. That word "owner" is the subject of the
next lesson.</p>`,
};
