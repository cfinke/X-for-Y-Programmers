const LESSON = {
  number: 17,
  title: "Generics",

  intro: `
<p>Go's generics (added in 1.18) cover similar ground to Kotlin's, but the
type parameter lives in square brackets right after the function or type
name, and every constraint has to be spelled out as an interface — there's
no bare <code>extends</code>-style shorthand. The syntax doesn't translate
one-to-one the way it might between two languages that got generics from the
same lineage.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>func First[T any](xs []T) T</code></td><td><code>fun &lt;T&gt; first(xs: List&lt;T&gt;): T</code></td></tr>
  <tr><td><code>type Box[T any] struct { Value T }</code></td><td><code>class Box&lt;T&gt;(val value: T)</code></td></tr>
  <tr><td><code>[T cmp.Ordered]</code></td><td><code>&lt;T : Comparable&lt;T&gt;&gt;</code></td></tr>
  <tr><td>invariant (no variance)</td><td><code>out</code> / <code>in</code> (declared)</td></tr>
</table>
<p>Two things differ. First, Go's type parameter goes in square brackets
immediately after the name — <code>func First[T any](...)</code> and
<code>type Box[T any] struct{...}</code> both put it there — while Kotlin puts
it before the name on a function (<code>fun &lt;T&gt; first(...)</code>) but
after the name on a class. Second, Go bounds a type parameter with an
interface (<code>[T cmp.Ordered]</code>), where Kotlin uses a colon
(<code>T : Comparable&lt;T&gt;</code>). Because Kotlin has no bare
<code>&gt;</code> operator on arbitrary types, a constraint like
<code>Comparable&lt;T&gt;</code> is what lets you write <code>a &gt; b</code>
inside a generic function at all — Go's <code>cmp.Ordered</code> constraint
plays the same role.</p>`,

  go: `type Box[T any] struct {
	Value T
}

// Go methods can't add their own type parameters, so a generic
// "map" has to be a free function instead of a method on Box.
func MapBox[T, R any](b Box[T], fn func(T) R) Box[R] {
	return Box[R]{Value: fn(b.Value)}
}

// T must satisfy cmp.Ordered so we can use > on it
func Largest[T cmp.Ordered](items []T) T {
	result := items[0]
	for _, item := range items[1:] {
		if item > result {
			result = item
		}
	}
	return result
}`,

  task: `
<p>Build a small generic toolkit. Everything is top-level — no
<code>main</code> needed.</p>
<ol>
  <li>Define a generic container <code>class Box&lt;T&gt;(val value: T)</code>.
      Give it <code>fun &lt;R&gt; map(transform: (T) -&gt; R): Box&lt;R&gt;</code>
      that returns a new box holding the transformed value, and a
      <code>toString()</code> that returns <code>"Box(&lt;value&gt;)"</code>.</li>
  <li>Write <code>describe(box: Box&lt;out Any?&gt;): String</code> that returns
      <code>box.toString()</code>. The <code>out</code> projection is use-site
      variance — it lets a <code>Box&lt;Int&gt;</code> be passed where any
      <code>Box</code> is accepted.</li>
  <li>Write <code>largest</code> as a constrained generic
      <code>fun &lt;T : Comparable&lt;T&gt;&gt; largest(items: List&lt;T&gt;): T</code>
      that returns the biggest element of a non-empty list using
      <code>&gt;</code>.</li>
</ol>`,

  starter: `// 1. Box<T> — a generic container holding one value of type T
class Box<T>(val value: T) {
    // map: turn a Box<T> into a Box<R> by transforming the value
    fun <R> map(transform: (T) -> R): Box<R> = TODO()

    override fun toString(): String = "Box(\$value)"
}

// 2. describe — accept a Box of anything using use-site variance (out)
fun describe(box: Box<out Any?>): String = TODO()

// 3. largest — the largest element of a non-empty list, via a Comparable constraint
fun <T : Comparable<T>> largest(items: List<T>): T = TODO()
`,

  requirements: [
    { pattern: /class\s+Box\s*<\s*T\s*>/, message: "Define a generic container: class Box<T>" },
    { pattern: /fun\s*<\s*T\s*:\s*Comparable\s*<\s*T\s*>\s*>/, message: "Write largest with a constraint: fun <T : Comparable<T>>" },
    { pattern: /Box\s*<\s*out\b/, message: "Accept any Box with use-site variance: Box<out Any?>" },
  ],

  tests: [
    { name: "Box holds its value", code: "        expect_eq(Box(42).value, 42)" },
    { name: "map transforms Int -> Int", code: "        expect_eq(Box(3).map { it * 2 }.value, 6)" },
    { name: "map can change the type (String -> Int)", code: "        expect_eq(Box(\"hi\").map { it.length }.value, 2)" },
    { name: "describe accepts a Box<Int> via out", code: "        expect_eq(describe(Box(5)), \"Box(5)\")" },
    { name: "largest of Ints", code: "        expect_eq(largest(listOf(3, 9, 2)), 9)" },
    { name: "largest of Strings", code: "        expect_eq(largest(listOf(\"apple\", \"pear\", \"kiwi\")), \"pear\")" },
  ],

  solution: `class Box<T>(val value: T) {
    fun <R> map(transform: (T) -> R): Box<R> = Box(transform(value))

    override fun toString(): String = "Box(\$value)"
}

fun describe(box: Box<out Any?>): String = box.toString()

fun <T : Comparable<T>> largest(items: List<T>): T {
    var result = items[0]
    for (item in items) {
        if (item > result) result = item
    }
    return result
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Generic function</td><td><code>func F[T any](x T)</code></td><td><code>fun &lt;T&gt; f(x: T)</code></td></tr>
  <tr><td>Generic class</td><td><code>type Box[T any] struct{...}</code></td><td><code>class Box&lt;T&gt;(val value: T)</code></td></tr>
  <tr><td>Upper bound</td><td><code>[T X]</code> (X is an interface)</td><td><code>&lt;T : X&gt;</code></td></tr>
  <tr><td>Producer (covariant)</td><td>invariant — no equivalent</td><td><code>class Src&lt;out T&gt;</code> / <code>Box&lt;out T&gt;</code></td></tr>
  <tr><td>Consumer (contravariant)</td><td>invariant — no equivalent</td><td><code>class Sink&lt;in T&gt;</code></td></tr>
</table>
<p>Kotlin makes variance <em>explicit</em>. An <code>out T</code> means the type
only ever <em>produces</em> a <code>T</code> (like a read-only source), so
<code>Box&lt;Int&gt;</code> can safely stand in for <code>Box&lt;Any?&gt;</code>.
An <code>in T</code> means the type only <em>consumes</em> a <code>T</code>.
You can declare it on the class (declaration-site) or, as in
<code>Box&lt;out Any?&gt;</code> above, at the point of use (use-site
projection). Go has nothing like this: its type parameters are invariant, so
a <code>Box[int]</code> is never assignable to a <code>Box[any]</code> — you'd
need a manual conversion function or interfaces to get similar flexibility.</p>
<p>Go composes multiple bounds by embedding several interfaces into one named
constraint (<code>type Ordered interface { Integer; Float }</code>) and
referencing that single name in the brackets; Kotlin instead lets you list
bounds inline with a <code>where</code> clause:
<code>fun &lt;T&gt; f(x: T) where T : A, T : B</code>. And where a Go generic
function has no built-in way to inspect the concrete type behind a type
parameter at runtime without reflection, Kotlin can retain a type argument at
runtime when a function is marked <code>inline</code> with a
<code>reified</code> parameter — handy for <code>x is T</code> checks.</p>`,
};
