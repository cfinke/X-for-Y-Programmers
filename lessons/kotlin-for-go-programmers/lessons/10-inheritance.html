<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance",

  intro: `
<p>Go has no class inheritance at all — there's no <code>extends</code>, no
<code>abstract class</code>, and no <code>override</code>. Instead, Go gets code
reuse from struct embedding (a field with no name, of another struct's type) and
gets polymorphism from interfaces (a set of method signatures any type can
satisfy). Kotlin's <code>open</code>/<code>override</code> model has no direct
counterpart: in Kotlin a base class can call an <code>open</code> method and get
the <em>subclass's</em> override (dynamic dispatch); in Go, embedding
<code>Animal</code> inside <code>Dog</code> gives <code>Dog</code> access to
<code>Animal</code>'s methods, but a method defined on <code>Animal</code> that
calls another <code>Animal</code> method will never see a "sound" method defined
on <code>Dog</code> — there's no dynamic dispatch through embedding.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>type Dog struct { Animal }</code></td><td><code>class Dog : Animal() {}</code></td></tr>
  <tr><td><code>type Animal interface { ... }</code></td><td><code>abstract class Animal {}</code></td></tr>
  <tr><td><code>Sound() string</code> (interface method)</td><td><code>abstract fun sound(): String</code></td></tr>
  <tr><td><code>func (d Dog) Sound() string { ... }</code></td><td><code>override fun sound() { ... }</code></td></tr>
  <tr><td><code>d.Animal.Describe()</code> (explicit)</td><td><code>super.describe()</code></td></tr>
</table>
<p>Kotlin's <code>class Dog(name: String) : Animal(name)</code> passes
<code>name</code> straight to the base constructor. Go has no constructors at
all — you write ordinary functions like <code>NewDog(name string) *Dog</code>
that build and return the struct yourself, initializing the embedded
<code>Animal</code> field by hand.</p>`,

  go: `type Animal struct {
	Name string
}

// No dynamic dispatch: Sound here always refers to Animal's own method,
// never a "Sound" method defined on an embedding type like Dog or Puppy.
func (a Animal) Sound() string {
	return "..."
}

func (a Animal) Describe() string {
	return fmt.Sprintf("%s says %s", a.Name, a.Sound())
}

type Dog struct {
	Animal
}

func (d Dog) Sound() string {
	return "Woof"
}

type Puppy struct {
	Dog
}

func (p Puppy) Sound() string {
	return "Yip"
}

func (p Puppy) Describe() string {
	return "Baby " + p.Dog.Describe()
}`,

  task: `
<p>The <code>Animal</code> base class is provided for you: it takes a
<code>name</code>, declares an <code>abstract fun sound()</code>, and has an
<code>open fun describe()</code>. Build the two subclasses:</p>
<ol>
  <li>Make <code>Dog</code> an <code>open class</code> extending
      <code>Animal(name)</code> (so it passes <code>name</code> to the base
      constructor) and <code>override</code> <code>sound()</code> to return
      <code>"Woof"</code>.</li>
  <li>Make <code>Puppy</code> extend <code>Dog(name)</code>,
      <code>override sound()</code> to return <code>"Yip"</code>, and
      <code>override describe()</code> to return
      <code>"Baby "</code> prepended to <code>super.describe()</code>.</li>
</ol>
<p>Because <code>describe()</code> calls <code>sound()</code>, dynamic dispatch
means a <code>Puppy</code>'s <code>describe()</code> uses the <code>Puppy</code>
sound even when invoked through <code>super</code>.</p>`,

  starter: `abstract class Animal(val name: String) {
    // Subclasses must implement this (no body allowed on an abstract member).
    abstract fun sound(): String

    // 'open' lets subclasses override this; the default just uses sound().
    open fun describe(): String = "$name says \${sound()}"
}

// 1. Dog: an open class so Puppy can extend it. Pass name to Animal(name).
open class Dog(name: String) : Animal(name) {
    override fun sound(): String = "" // TODO: return "Woof"
}

// 2. Puppy: extend Dog(name); override sound() and describe().
class Puppy(name: String) : Dog(name) {
    // TODO: override sound() to return "Yip"
    // TODO: override describe() to return "Baby " + super.describe()
}
`,

  requirements: [
    { pattern: /\bopen\s+class\s+Dog\b/, message: "Declare Dog as an open class so Puppy can extend it" },
    { pattern: /\boverride\s+fun\s+sound\b/, message: "Override sound() in the subclasses" },
    { pattern: /super\.describe\s*\(\s*\)/, message: "Call the base implementation with super.describe()" },
  ],

  tests: [
    { name: 'Dog("Rex").sound() is "Woof"', code: "        expect_eq(Dog(\"Rex\").sound(), \"Woof\")" },
    { name: 'Dog("Rex").describe() is "Rex says Woof"', code: "        expect_eq(Dog(\"Rex\").describe(), \"Rex says Woof\")" },
    { name: 'Puppy("Fido").sound() is "Yip"', code: "        expect_eq(Puppy(\"Fido\").sound(), \"Yip\")" },
    { name: 'Puppy("Fido").describe() is "Baby Fido says Yip"', code: "        expect_eq(Puppy(\"Fido\").describe(), \"Baby Fido says Yip\")" },
    { name: "base-constructor name is inherited", code: "        expect_eq(Puppy(\"Fido\").name, \"Fido\")" },
    { name: "a Puppy is-an Animal", code: "        expect_true(Puppy(\"Fido\") is Animal)" },
  ],

  solution: `abstract class Animal(val name: String) {
    abstract fun sound(): String

    open fun describe(): String = "$name says \${sound()}"
}

open class Dog(name: String) : Animal(name) {
    override fun sound(): String = "Woof"
}

class Puppy(name: String) : Dog(name) {
    override fun sound(): String = "Yip"
    override fun describe(): String = "Baby " + super.describe()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Subclassable</td><td>n/a — no classes, only embedding</td><td><code>open class</code> (opt in)</td></tr>
  <tr><td>Overridable method</td><td>n/a — no dynamic dispatch through embedding</td><td><code>open fun</code> (opt in)</td></tr>
  <tr><td>Override keyword</td><td>n/a — shadow the method name instead</td><td><code>override</code> (required)</td></tr>
  <tr><td>Abstract member</td><td><code>Sound() string</code> in an interface</td><td><code>abstract fun sound(): String</code></td></tr>
  <tr><td>Base constructor</td><td>n/a — call a <code>NewDog</code>-style function by hand</td><td><code>: Animal(name)</code> in header</td></tr>
</table>
<p>The <code>open</code>/<code>final</code> default is the big mindset shift coming
from Go: Go doesn't have "final" or "open" because it doesn't have inheritance to
begin with. What Go calls embedding looks like inheritance syntactically (you get
promoted access to the embedded type's fields and methods) but is really just
automatic delegation — there's no dynamic dispatch, so the "Puppy's sound wins
even when called through super" behavior this lesson demonstrates in Kotlin
simply can't happen by accident in Go. To get that behavior in Go you'd reach for
an explicit interface field on the base struct, set by each constructor
function.</p>`,
};
</script>
