  intro: `
<p>Kotlin strings will feel like a real upgrade coming from Go. Go has no
built-in string interpolation at all — you reach for <code>fmt.Sprintf</code>
with <code>%s</code> / <code>%d</code> verbs, or fall back to <code>+</code>
concatenation. Kotlin bakes interpolation directly into every double-quoted
string: a bare <code>$name</code> for a simple substitution, and for a full
expression you wrap it in braces: <code>\${user.age + 1}</code>. There's no
separate template syntax to opt into — the ordinary string literal already
does the job.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>fmt.Sprintf("Hi %s", name)</code></td><td><code>"Hi $name"</code></td></tr>
  <tr><td><code>fmt.Sprintf("%d", a+b)</code></td><td><code>"\${a + b}"</code></td></tr>
  <tr><td><code>strings.ToUpper(s)</code></td><td><code>s.uppercase()</code></td></tr>
  <tr><td><code>strings.Contains(s, x)</code></td><td><code>s.contains(x)</code></td></tr>
  <tr><td><code>strconv.Atoi("42")</code></td><td><code>"42".toInt()</code></td></tr>
</table>
<p>Go's string helpers live in the <code>strings</code> and <code>strconv</code>
packages and take the string as their first argument; Kotlin puts the same
operations directly on the string as methods: <code>uppercase()</code> /
<code>lowercase()</code>, <code>contains()</code>, and <code>joinToString()</code>
in place of <code>strings.Join</code>. Multi-line and regex-heavy text goes in a
<em>triple-quoted</em> raw string (<code>""" ... """</code>) where backslashes
are literal — much like Go's backtick raw string literals, except Kotlin's
version can still span multiple lines and be cleaned up with
<code>trimIndent()</code>.</p>`,

  solution: `fun greet(name: String): String {
    return "Hello, $name!"
}

fun preview(title: String, body: String): String {
    return "\${title.uppercase()}: \${body.length} chars"
}

fun slugify(title: String): String {
    return title.trim().lowercase().split(" ").joinToString("-")
}

fun redact(text: String): String {
    return text.replace("secret", "*****")
}

fun snippet(text: String): String {
    return text.substring(0, 5)
}

fun mentions(text: String, term: String): Boolean {
    return text.contains(term)
}

fun isHashtag(text: String): Boolean {
    return text.startsWith("#")
}

fun doubleNumber(numText: String): String {
    return (numText.trim().toInt() * 2).toString()
}

fun card(name: String, role: String): String {
    return """
        Name: $name
        Role: $role
    """.trimIndent()
}
`,

  notes: `
<table>
  <tr><th>Task</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Interpolate</td><td><code>fmt.Sprintf("%v", x)</code></td><td><code>"$x"</code> / <code>"\${x.y}"</code></td></tr>
  <tr><td>Case</td><td><code>strings.ToUpper(s)</code></td><td><code>uppercase()</code></td></tr>
  <tr><td>Split &amp; join</td><td><code>strings.Join(strings.Split(s, ","), "-")</code></td><td><code>s.split(",").joinToString("-")</code></td></tr>
  <tr><td>Substring</td><td><code>s[0:5]</code></td><td><code>s.substring(0, 5)</code></td></tr>
  <tr><td>Contains</td><td><code>strings.Contains(s, x)</code></td><td><code>s.contains(x)</code></td></tr>
  <tr><td>Parse int</td><td><code>strconv.Atoi(s)</code></td><td><code>s.toInt()</code></td></tr>
  <tr><td>Raw / multi-line</td><td><code>\`line1\nline2\`</code></td><td><code>"""line1\nline2"""</code></td></tr>
</table>
<p>One sharp edge if you're used to Go: <code>"42".toInt()</code> throws an
exception on bad input rather than returning an <code>error</code> the way
<code>strconv.Atoi</code> does — reach for <code>toIntOrNull()</code> when the
text might not be a number and you'd rather check for <code>null</code> than
catch an exception. And unlike Go, where turning a value into text usually
means a call into the <code>fmt</code> or <code>strconv</code> package,
Kotlin's <code>x.toString()</code> is a method on every value, so
<code>42.toString()</code> and <code>listOf(1).toString()</code> both just
work. Prefer <code>joinToString</code> whenever you're turning a collection
back into text — it takes optional <code>prefix</code>, <code>postfix</code>, and
per-element <code>transform</code> arguments that cover more than a bare
<code>strings.Join</code> call can.</p>`,
