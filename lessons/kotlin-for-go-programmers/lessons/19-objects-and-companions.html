  title: "Objects & Companions",

  intro: `
<p>Go gives you plain functions and package-level state for "one-of-a-kind"
and "namespace-level" code: a package-level <code>var</code> plus functions
acts as a singleton, an unexported struct field plus a constructor function
stands in for a private constructor, and a struct or closure that satisfies
an interface stands in for a throwaway implementation. Kotlin folds all three
under one keyword — <code>object</code>.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>var items []string</code> + package funcs (a package as namespace)</td><td><code>object Tally { … }</code></td></tr>
  <tr><td><code>func ParseUser(…) *User</code> (package-level factory)</td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td>anonymous struct/closure satisfying an interface</td><td><code>object : Greeter { … }</code></td></tr>
  <tr><td>unexported fields + constructor func</td><td><code>class User private constructor(…)</code></td></tr>
</table>
<p>An <strong>object declaration</strong> (<code>object Name { … }</code>) is a
lazily-created singleton — there is exactly one instance and you reach it by its
name, much like a Go package's exported functions and package-level state form
a de facto singleton. A <strong>companion object</strong> is a singleton that
lives inside a class, so its members read like Go's convention of
<code>NewX</code>/<code>ParseX</code> constructor functions attached to a type
(<code>User.parse(…)</code> rather than a bare <code>ParseUser(…)</code>), and
because it can see the class's <code>private</code> constructor it is the
idiomatic home for factory functions. An <strong>object expression</strong>
(<code>object : Greeter { … }</code>) is an anonymous instance created on the
spot, Kotlin's answer to a Go anonymous struct or closure that satisfies an
interface on the spot.</p>`,

  go: `// Singleton: package-level state + functions act as a namespace
package tally

var items []string

func Add(item string) { items = append(items, item) }
func Count() int       { return len(items) }

type Greeter interface {
  Greet(name string) string
}

// "Static" factory + unexported fields stand in for a private constructor
type User struct {
  name string
  age  int
}

const Species = "human"

func ParseUser(text string) *User {
  parts := strings.Split(text, ":")
  age, _ := strconv.Atoi(parts[1])
  return &User{name: parts[0], age: age}
}

// Anonymous type implementing an interface
type greeterFunc func(string) string

func (f greeterFunc) Greet(name string) string { return f(name) }

func politeGreeter() Greeter {
  return greeterFunc(func(name string) string {
    return fmt.Sprintf("Hello, %s", name)
  })
}`,

  solution: `object Tally {
    private val items = mutableListOf<String>()

    fun add(item: String) {
        items.add(item)
    }

    fun count(): Int = items.size

    fun all(): List<String> = items.toList()
}

interface Greeter {
    fun greet(name: String): String
}

class User private constructor(val name: String, val age: Int) {
    companion object {
        const val SPECIES = "human"

        fun parse(text: String): User {
            val parts = text.split(":")
            return User(parts[0], parts[1].toInt())
        }
    }
}

fun politeGreeter(): Greeter = object : Greeter {
    override fun greet(name: String): String = "Hello, $name"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Singleton</td><td>package-level <code>var</code> + funcs</td><td><code>object Tally { … }</code></td></tr>
  <tr><td>Class-level member</td><td><code>func ParseUser(…) *User</code></td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td>Class-level constant</td><td>package-level <code>const X = …</code></td><td><code>const val X</code> (in companion)</td></tr>
  <tr><td>Private constructor</td><td>unexported fields + constructor func</td><td><code>class C private constructor(…)</code></td></tr>
  <tr><td>Anonymous instance</td><td>anonymous struct/closure satisfying an interface</td><td><code>object : Greeter { … }</code></td></tr>
</table>
<p>A companion object is <em>not</em> a bag of statics — it is a genuine
singleton object attached to the class, reachable as
<code>User.Companion</code>, and it can implement interfaces or hold state like
any other object. You get the <code>User.parse(…)</code> call syntax for free
because Kotlin lets you address companion members through the class name. A
<code>private constructor</code> plus a companion factory is the standard way to
force construction through a validated entry point.</p>
<p>One idiomatic wrinkle: Kotlin allows top-level functions, so you often do not
need a singleton at all — a plain <code>fun</code> or a top-level
<code>val</code> replaces many types you would have modeled as a package of
related functions in Go. Reach for <code>object</code> when you specifically
want a single named instance that carries state or implements an interface —
something a Go package's loose collection of functions and vars can't itself
do, since a package isn't a value you can pass around or substitute behind an
interface.</p>`,
