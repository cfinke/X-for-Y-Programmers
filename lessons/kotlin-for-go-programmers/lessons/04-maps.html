  intro: `
<p>Kotlin splits the concept you know from Go into two types by
mutability. A <code>mapOf(...)</code> is a <em>read-only</em> <code>Map</code>
(no <code>put</code> in its interface), while a <code>mutableMapOf(...)</code>
is a <code>MutableMap</code> you can add to. Both are backed by a
<code>LinkedHashMap</code>, so insertion order is preserved — unlike a Go
<code>map</code>, whose iteration order is intentionally randomized.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>map[string]int{"a": 1, "b": 2}</code></td><td><code>mapOf("a" to 1, "b" to 2)</code></td></tr>
  <tr><td><code>make(map[string]int)</code></td><td><code>mutableMapOf&lt;String, Int&gt;()</code></td></tr>
  <tr><td><code>v, ok := m["a"]</code></td><td><code>m["a"]</code> (returns <code>Int?</code>)</td></tr>
  <tr><td><code>v, ok := m[k]; if !ok { v = d }</code></td><td><code>m.getOrDefault(k, d)</code></td></tr>
  <tr><td><code>m[k] = v</code></td><td><code>m[k] = v</code> (mutable only)</td></tr>
  <tr><td><code>_, ok := m[k]</code></td><td><code>m.containsKey(k)</code></td></tr>
</table>
<p>The key difference from Go is that indexing a map,
<code>m[k]</code>, returns a <em>nullable</em> <code>V?</code> directly — there's
no separate "comma ok" form. The type system forces you to handle a missing
key, exactly as if you'd checked the <code>ok</code> boolean yourself. Reach
for <code>getOrDefault</code> when you have a sensible fallback.</p>`,

  go: `capitals := map[string]string{

capital, ok := capitals["Narnia"]

  solution: `val capitals: Map<String, String> = mapOf(
    "France" to "Paris",
    "Japan" to "Tokyo",
    "Kenya" to "Nairobi",
)

fun isKnown(country: String): Boolean {
    return capitals.containsKey(country)
}

fun capitalOr(country: String, fallback: String): String {
    return capitals.getOrDefault(country, fallback)
}

fun wordCounts(words: List<String>): Map<String, Int> {
    val counts = mutableMapOf<String, Int>()
    for (w in words) {
        counts[w] = counts.getOrDefault(w, 0) + 1
    }
    return counts
}

fun entryLines(m: Map<String, Int>): List<String> {
    val lines = mutableListOf<String>()
    for ((k, v) in m.toSortedMap()) {
        lines.add("$k=$v")
    }
    return lines
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Read-only map</td><td>no direct equivalent (convention only)</td><td><code>mapOf(...)</code> → <code>Map</code></td></tr>
  <tr><td>Mutable map</td><td><code>make(map[K]V)</code></td><td><code>mutableMapOf(...)</code> → <code>MutableMap</code></td></tr>
  <tr><td>Lookup</td><td><code>v, ok := m[k]</code></td><td><code>m[k]</code> → <code>V?</code></td></tr>
  <tr><td>With default</td><td><code>v, ok := m[k]; if !ok { v = d }</code></td><td><code>m.getOrDefault(k, d)</code></td></tr>
  <tr><td>Insert / update</td><td><code>m[k] = v</code></td><td><code>m[k] = v</code></td></tr>
  <tr><td>Views</td><td>(loop to collect keys/values)</td><td><code>m.keys</code> / <code>m.values</code> / <code>m.entries</code></td></tr>
  <tr><td>Iterate pairs</td><td><code>for k, v := range m</code></td><td><code>for ((k, v) in m)</code></td></tr>
</table>
<p>Note that <code>m[k] = v</code> is the idiomatic way to write
<code>put</code>; it only compiles on a <code>MutableMap</code>, so the read-only
<code>Map</code> from <code>mapOf</code> won't let you accidentally mutate it —
Go has no built-in way to enforce that at compile time. For counting and
grouping, Kotlin also ships higher-level helpers —
<code>words.groupingBy { it }.eachCount()</code> is the one-liner equivalent of
the <code>wordCounts</code> loop, and <code>groupBy</code> collects items into
<code>Map&lt;K, List&lt;V&gt;&gt;</code>. Iterating a map yields
<code>Map.Entry</code> objects, which destructure straight into
<code>(k, v)</code> — and unlike Go's randomized iteration order, Kotlin's
<code>Map</code>/<code>MutableMap</code> preserve insertion order.</p>`,
