  intro: `
<p>Time to put it all together. This capstone builds a tiny arithmetic
<strong>evaluator</strong> — the same shape you would write in Go with an
interface, a type switch, and a <code>(value, ok bool)</code> return, but
leaning on the Kotlin features from the whole course at once:</p>
<table>
  <tr><th>Feature (Go)</th><th>Feature (Kotlin)</th></tr>
  <tr><td>interface + one struct per node type (not closed)</td><td><code>sealed interface Expr</code></td></tr>
  <tr><td>struct literal per variant</td><td><code>data class Num(...) : Expr</code></td></tr>
  <tr><td><code>switch e := node.(type)</code></td><td>exhaustive <code>when (node)</code> with smart casts</td></tr>
  <tr><td><code>map[string]float64</code> lookup returning <code>(float64, bool)</code></td><td><code>Map&lt;String, Double&gt;</code> lookup returning <code>Double?</code></td></tr>
  <tr><td>manual <code>for</code> loop appending only the <code>ok</code> results</td><td><code>list.mapNotNull { ... }</code></td></tr>
</table>
<p>An expression is a tree: a literal number, a variable reference, or a binary
operation whose operands are themselves expressions. Evaluation is recursive and
can <em>fail</em> — a variable might be unbound, or you might divide by zero — so
where Go would thread an <code>ok bool</code> (or a <code>*float64</code>)
through every call, Kotlin uses a nullable <code>Double?</code>, and
<code>null</code> is your "could not evaluate" signal. This is the payoff of
the course: closed type hierarchies, structural data, collection pipelines,
and null safety working together on one small program.</p>`,

  go: `type Expr interface{ isExpr() }

type Num struct{ Value float64 }
type Var struct{ Name string }
type Op struct {
	Kind        string
	Left, Right Expr
}

func (Num) isExpr() {}
func (Var) isExpr() {}
func (Op) isExpr()  {}

func evaluate(e Expr, env map[string]float64) (float64, bool) {
	switch e := e.(type) {
	case Num:
		return e.Value, true
	case Var:
		v, ok := env[e.Name]
		return v, ok
	case Op:
		l, ok := evaluate(e.Left, env)
		if !ok {
			return 0, false
		}
		r, ok := evaluate(e.Right, env)
		if !ok {
			return 0, false
		}
		switch e.Kind {
		case "+":
			return l + r, true
		case "-":
			return l - r, true
		case "*":
			return l * r, true
		case "/":
			if r == 0 {
				return 0, false
			}
			return l / r, true
		default:
			return 0, false
		}
	}
	return 0, false
}`,

    { name: "eval a nested arithmetic tree", code: "        val env = mapOf(\"x\" to 2.0)\n        val tree = BinOp(\"*\", BinOp(\"+\", Var(\"x\"), Num(1.0)), Num(2.0))\n        expect_eq(eval(tree, env), 6.0)" },

  solution: `sealed interface Expr
data class Num(val value: Double) : Expr
data class Var(val name: String) : Expr
data class BinOp(val op: String, val left: Expr, val right: Expr) : Expr

fun eval(expr: Expr, env: Map<String, Double>): Double? = when (expr) {
    is Num -> expr.value
    is Var -> env[expr.name]
    is BinOp -> {
        val l = eval(expr.left, env)
        val r = eval(expr.right, env)
        if (l == null || r == null) null
        else when (expr.op) {
            "+" -> l + r
            "-" -> l - r
            "*" -> l * r
            "/" -> if (r == 0.0) null else l / r
            else -> null
        }
    }
}

fun variables(expr: Expr): Set<String> = when (expr) {
    is Num -> emptySet()
    is Var -> setOf(expr.name)
    is BinOp -> variables(expr.left) + variables(expr.right)
}

fun evalAll(exprs: List<Expr>, env: Map<String, Double>): List<Double> =
    exprs.mapNotNull { eval(it, env) }
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Node hierarchy</td><td>interface + one struct per variant (not closed)</td><td><code>sealed interface</code> + <code>data class</code></td></tr>
  <tr><td>Recursive dispatch</td><td><code>switch e := node.(type)</code></td><td>exhaustive <code>when (e)</code></td></tr>
  <tr><td>Narrowing a variant</td><td><code>e</code> bound to the concrete type in each <code>case</code></td><td>smart cast after <code>is</code></td></tr>
  <tr><td>Missing value</td><td><code>(float64, bool)</code> / <code>*float64</code></td><td><code>Double?</code></td></tr>
  <tr><td>Map/filter out failures</td><td>manual <code>for</code> loop appending only the <code>ok</code> results</td><td><code>.mapNotNull { }</code></td></tr>
</table>
<p>Notice how little glue this took: no <code>else</code> branch on the outer
<code>when</code> (the compiler knows the three variants are exhaustive, and will
force you to update it if you add a <code>Neg</code> node — unlike Go's type
switch, which would just fall through a missing <code>case</code> at runtime),
no manual equality for the <code>data class</code> nodes, and
<code>mapNotNull</code> folding the loop-and-append into one pass while
carrying the nullability through the types. From here you could grow this into
a real interpreter — add a <code>data class Let(val name: String, ...)</code>
variant, or return a <code>sealed</code> <code>Result</code> instead of
<code>null</code> to carry an error message — and the compiler will walk you
through every <code>when</code> that needs the new case.</p>`,
