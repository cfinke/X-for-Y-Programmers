<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Kotlin will feel familiar coming from Go: static typing with inference and
a serious approach to null safety (Go's zero values become Kotlin's
non-nullable-by-default types plus explicit <code>?</code> when null really is
allowed). The headline difference is <code>val</code> vs <code>var</code>:
<code>val</code> is a read-only binding — no direct Go equivalent, though it's
close in spirit to never reassigning a variable — and is the default you
should reach for; <code>var</code> is for the rare genuine reassignment, the
same role Go's <code>var</code> plays.</p>
<table>
  <tr><th>Go</th><th>Kotlin</th></tr>
  <tr><td><code>name := "Ada"</code></td><td><code>val name = "Ada"</code></td></tr>
  <tr><td><code>var age = 36</code></td><td><code>var age = 36</code></td></tr>
  <tr><td><code>fmt.Sprintf("%s is %d", name, age)</code></td><td><code>"$name is $age"</code></td></tr>
  <tr><td><code>var x int</code></td><td><code>x: Int</code> / <code>x: Double</code></td></tr>
</table>
<p>The type still goes after the name with a colon, but you rarely write it —
Kotlin infers it from the initializer, just like Go's <code>:=</code> infers
from the right-hand side. String templates use a bare <code>$name</code> (or
<code>\${expr}</code> for a full expression) instead of <code>fmt.Sprintf</code>
verbs. And every value has a real type at runtime, reachable via
<code>value::class.simpleName</code> — similar to Go's
<code>reflect.TypeOf(value)</code>.</p>`,

  go: `age := 36
userName := "Ada"

func describe(name string, age int) string {
	return fmt.Sprintf("%s is %d", name, age)
}`,

  task: `
<p>Write the Kotlin version. Kotlin allows top-level declarations — no class or
<code>main</code> needed (those are added for you):</p>
<ol>
  <li>Declare <code>userName</code> with <code>val</code> = <code>"Ada"</code>
      and <code>userAge</code> with <code>var</code> = <code>36</code>.</li>
  <li>Write <code>describe(name: String, age: Int): String</code> that returns a
      string like <code>"Ada is 36"</code> using a string template.</li>
  <li>Write <code>typeName(value: Any): String</code> that returns the value's
      runtime type name — use <code>value::class.simpleName ?: "?"</code>.</li>
</ol>`,

  starter: `// 1. userName (val) and userAge (var) — replace the placeholder values
val userName = "" // TODO
var userAge = 0    // TODO


// 2. describe(name, age) -> "<name> is <age>"
fun describe(name: String, age: Int): String {
    return "" // TODO
}

// 3. typeName(value) -> the runtime type name, e.g. "Int"
fun typeName(value: Any): String {
    return "" // TODO
}
`,

  requirements: [
    { pattern: /\bval\s+userName/, message: "Declare userName with val" },
    { pattern: /\bvar\s+userAge/, message: "Declare userAge with var" },
    { pattern: /"\$name is \$age"/, message: "Build the string with a template: \"$name is $age\"" },
  ],

  tests: [
    { name: 'userName is "Ada"', code: "        expect_eq(userName, \"Ada\")" },
    { name: "userAge is 36", code: "        expect_eq(userAge, 36)" },
    { name: 'describe("Ada", 36) is "Ada is 36"', code: "        expect_eq(describe(\"Ada\", 36), \"Ada is 36\")" },
    { name: 'describe("Rob", 68) is "Rob is 68"', code: "        expect_eq(describe(\"Rob\", 68), \"Rob is 68\")" },
    { name: 'typeName(1) is "Int"', code: "        expect_eq(typeName(1), \"Int\")" },
    { name: 'typeName("a") is "String"', code: "        expect_eq(typeName(\"a\"), \"String\")" },
    { name: 'typeName(true) is "Boolean"', code: "        expect_eq(typeName(true), \"Boolean\")" },
  ],

  solution: `val userName = "Ada"
var userAge = 36

fun describe(name: String, age: Int): String {
    return "$name is $age"
}

fun typeName(value: Any): String {
    return value::class.simpleName ?: "?"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Go</th><th>Kotlin</th></tr>
  <tr><td>Read-only binding</td><td>no direct equivalent (const is compile-time only)</td><td><code>val x = 1</code></td></tr>
  <tr><td>Reassignable</td><td><code>var x = 1</code></td><td><code>var x = 1</code></td></tr>
  <tr><td>Explicit type</td><td><code>var x int = 1</code></td><td><code>val x: Int = 1</code></td></tr>
  <tr><td>Template</td><td><code>fmt.Sprintf("%v", x)</code></td><td><code>"$x"</code> / <code>"\${x.foo}"</code></td></tr>
  <tr><td>Runtime type</td><td><code>reflect.TypeOf(x)</code></td><td><code>x::class.simpleName</code></td></tr>
</table>
<p>Kotlin splits Go's <code>int</code> (and friends) into <code>Int</code>,
<code>Long</code>, <code>Double</code>, and more, and it will not silently mix
them — <code>1 / 2</code> is <code>0</code> (integer division), while
<code>1.0 / 2</code> is <code>0.5</code>, the same rule Go applies to
<code>int</code> vs <code>float64</code> division. Prefer <code>val</code>
everywhere you can; the compiler will tell you the moment you actually need
<code>var</code>.</p>`,
};
