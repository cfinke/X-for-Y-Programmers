<div id="app"></div>
<script>
const LESSON = {
  number: 14,
  title: "Error Handling",

  intro: `
<p>In C++ you throw and catch <em>typed</em> exceptions — the compiler checks
that every <code>catch</code> clause names a real type, and by convention
exceptions derive from <code>std::exception</code> so callers can call
<code>what()</code>. At runtime that structure is gone: a JavaScript caller
can hand you anything, and the only way to refuse is to <code>throw</code>.
The mechanics — <code>try</code> / <code>catch</code> / <code>finally</code> —
play the same role as <code>try</code> / <code>catch</code> in C++, but there
is one runtime fact C++'s type system hides from you: <strong>you can throw
<em>any</em> value, and a caught error has no compile-time type at
all</strong> — <code>catch (e)</code> declares no type the way
<code>catch (const std::exception&amp; e)</code> does. There is no guarantee
the thrown value is even an <code>Error</code>.</p>
<table>
  <tr><th>C++</th><th>JavaScript</th></tr>
  <tr><td><code>catch (const std::exception&amp; e) { }</code></td><td><code>catch (e) { /* e is whatever was thrown */ }</code></td></tr>
  <tr><td><code>throw ValidationError("x");</code></td><td><code>throw new Error("x");</code> (same idea)</td></tr>
  <tr><td>compiler enforces exact/base type match</td><td><code>instanceof</code> is a real runtime check</td></tr>
  <tr><td>custom exception <code>: public std::exception</code></td><td>subclass <code>Error</code>, set <code>this.name</code></td></tr>
</table>
<p>Because the caught value is untyped, idiomatic JavaScript checks it before
trusting it: <code>if (e instanceof ValidationError)</code>. An
<code>Error</code> object carries a <code>name</code> and a <code>message</code>;
a custom subclass sets its own <code>name</code> so callers can tell your errors
apart from someone else's — much like a C++ exception hierarchy lets
<code>catch (const std::exception&amp;)</code> fall back to <code>.what()</code>
when you don't need the specific subclass.</p>`,

  cpp: `class ValidationError : public std::runtime_error {
public:
  explicit ValidationError(const std::string& message)
    : std::runtime_error(message) {}
};

int checkAge(double age) {
  if (std::isnan(age)) {
    throw ValidationError("age must be a number");
  }
  if (age < 0) throw ValidationError("age must not be negative");
  return static_cast<int>(age);
}

int safeCheckAge(double age, int fallback) {
  try {
    return checkAge(age);
  } catch (const std::exception& e) {
    return fallback;
  }
}`,

  task: `
<p>Build a tiny validation layer that throws, catches, and reports.</p>
<ol>
  <li>Define <code>ValidationError</code>, a subclass of <code>Error</code>.
      Its constructor takes a message, calls <code>super(message)</code>, and
      sets <code>this.name = "ValidationError"</code>.</li>
  <li>Write <code>checkAge(age)</code>: if <code>age</code> is not a number (use
      <code>typeof</code>) or is <code>NaN</code>, throw a
      <code>ValidationError("age must be a number")</code>. If it is negative,
      throw a <code>ValidationError("age must not be negative")</code>.
      Otherwise return <code>age</code>.</li>
  <li>Write <code>safeCheckAge(age, fallback)</code>: run <code>checkAge</code>
      inside a <code>try</code>; if it throws, return <code>fallback</code>.</li>
  <li>Write <code>describeError(fn)</code>: call <code>fn()</code> inside a
      <code>try</code>. If it throws, return the error's
      <code>name + ": " + message</code>. Use a <code>finally</code> block that
      is harmless here (e.g. a no-op) but must run either way. If nothing throws,
      return <code>"ok"</code>.</li>
</ol>`,

  starter: `// 1. Custom error subclass
class ValidationError extends Error {
  constructor(message) {
    // TODO: call super and set this.name
  }
}

// 2. Validator that throws
function checkAge(age) {
  // TODO
  return age;
}

// 3. Safe wrapper that catches and returns a fallback
function safeCheckAge(age, fallback) {
  // TODO
  return fallback;
}

// 4. Report an error as "name: message", or "ok"
function describeError(fn) {
  // TODO
  return "ok";
}
`,

  exportNames: ["ValidationError", "checkAge", "safeCheckAge", "describeError"],

  requirements: [
    { pattern: /class\s+ValidationError\s+extends\s+Error/, message: "ValidationError must extend Error" },
    { pattern: /throw\s+new\s+ValidationError/, message: "checkAge must throw a ValidationError" },
    { pattern: /catch\s*\(/, message: "Use a try/catch block" },
    { pattern: /finally/, message: "describeError must use a finally block" },
  ],

  tests: [
    { name: "checkAge(36) returns 36", run: (x) => expectEqual(x.checkAge(36), 36) },
    { name: "checkAge(-1) throws", run: (x) => expectThrows(() => x.checkAge(-1)) },
    { name: 'checkAge("x") throws', run: (x) => expectThrows(() => x.checkAge("x")) },
    { name: "checkAge(NaN) throws", run: (x) => expectThrows(() => x.checkAge(NaN)) },
    { name: "thrown value is a ValidationError instance", run: (x) => {
        try { x.checkAge(-5); } catch (e) { expectTruthy(e instanceof x.ValidationError); return; }
        throw new Error("expected checkAge(-5) to throw");
      } },
    { name: "ValidationError carries name and message", run: (x) => {
        const err = new x.ValidationError("nope");
        expectEqual(err.name, "ValidationError");
        expectEqual(err.message, "nope");
      } },
    { name: "safeCheckAge returns value when valid", run: (x) => expectEqual(x.safeCheckAge(20, 0), 20) },
    { name: "safeCheckAge returns fallback when invalid", run: (x) => expectEqual(x.safeCheckAge(-3, 0), 0) },
    { name: "describeError reports name: message", run: (x) => expectEqual(x.describeError(() => x.checkAge(-1)), "ValidationError: age must not be negative") },
    { name: "describeError returns ok when no throw", run: (x) => expectEqual(x.describeError(() => 42), "ok") },
  ],

  solution: `class ValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = "ValidationError";
  }
}

function checkAge(age) {
  if (typeof age !== "number" || Number.isNaN(age)) {
    throw new ValidationError("age must be a number");
  }
  if (age < 0) {
    throw new ValidationError("age must not be negative");
  }
  return age;
}

function safeCheckAge(age, fallback) {
  try {
    return checkAge(age);
  } catch (e) {
    return fallback;
  }
}

function describeError(fn) {
  try {
    fn();
    return "ok";
  } catch (e) {
    return e.name + ": " + e.message;
  } finally {
    // always runs; harmless here
    void 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>JavaScript</th></tr>
  <tr><td>Caught value</td><td>typed by the <code>catch</code> clause, e.g. <code>const std::exception&amp;</code></td><td>could be anything thrown</td></tr>
  <tr><td>Narrowing</td><td>static type match, or <code>dynamic_cast</code></td><td><code>instanceof</code> at runtime</td></tr>
  <tr><td>Custom error</td><td>class <code>: public std::exception</code>, override <code>what()</code></td><td>subclass <code>Error</code>, set <code>this.name</code></td></tr>
  <tr><td>Cleanup</td><td>RAII — destructors run during stack unwinding</td><td><code>finally</code></td></tr>
</table>
<p>Three runtime facts worth internalizing. First, <code>finally</code> runs
whether the <code>try</code> returns, throws, or falls through — it is where
you release resources, playing the role that RAII destructors play
automatically when a C++ stack unwinds. Second, you can <code>throw</code> a
string or a number, but idiomatic code always throws an <code>Error</code> (or
a subclass) so callers get a <code>name</code>, a <code>message</code>, and a
stack. Third, because the caught value is untyped, guard with
<code>instanceof</code> before reading properties:
<code>if (e instanceof ValidationError)</code> is the JavaScript stand-in for
writing multiple typed <code>catch</code> clauses in C++ — except JavaScript
only ever gives you one generic <code>catch (e)</code>, and you do the type
dispatch yourself.</p>
<p>One subtlety: setting <code>this.name</code> in the subclass constructor is
what makes <code>err.name</code> read <code>"ValidationError"</code> instead of
the inherited <code>"Error"</code>. Without it, your custom error is
indistinguishable by name from a plain one. This differs from C++, where
overriding <code>what()</code> — not setting a field — is what customizes an
exception's message; there is no built-in <code>name</code> property to
override, since <code>typeid</code> already reports the concrete type at
runtime.</p>`,
};
