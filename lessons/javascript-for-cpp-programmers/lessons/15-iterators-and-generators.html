const LESSON = {
  number: 15,
  title: "Iterators & Generators",

  intro: `
<p>C++ has its own iterator protocol: a type is <em>iterable</em> if it exposes
<code>begin()</code> and <code>end()</code> methods returning iterator objects,
and an <em>iterator</em> is anything supporting <code>operator*</code>,
<code>operator++</code>, and a not-equal comparison against the end sentinel.
Range-based <code>for</code> loops and the algorithms in <code>&lt;algorithm&gt;</code>
are built on that convention, checked by the compiler (via templates or, since
C++20, concepts). JavaScript's iterator protocol is the runtime analog: an
object is <em>iterable</em> if it has a method under the key
<code>Symbol.iterator</code> that returns an <em>iterator</em> — any object
with a <code>next()</code> method returning <code>{ value, done }</code>.</p>
<table>
  <tr><th>C++</th><th>JavaScript</th></tr>
  <tr><td><code>struct Range { Iterator begin() const; Iterator end() const; };</code></td><td><code>function* range(a, b)</code></td></tr>
  <tr><td><code>auto it = xs.begin();</code></td><td><code>const it = xs[Symbol.iterator]();</code></td></tr>
  <tr><td><code>*it</code>, then check <code>it != xs.end()</code></td><td><code>{ value, done }</code> returned by <code>next()</code></td></tr>
  <tr><td>compiler enforces the shape (templates / concepts)</td><td><code>for...of</code> just calls <code>next()</code></td></tr>
</table>
<p>A <code>function*</code> (generator function) is the easy way to build both at
once: calling it returns an object that is <em>its own</em> iterator, and each
<code>yield</code> hands a value back to the consumer and pauses until
<code>next()</code> is called again. <code>yield*</code> delegates to another
iterable. Because generators are lazy, <code>range(0, Infinity)</code> is fine
until you actually pull values from it — there is no eager allocation the way
a <code>std::vector&lt;int&gt;</code> holding the whole sequence would require.</p>`,

  cpp: `#include <vector>

struct Range {
    int start_, end_;
    struct Iterator {
        int value;
        int operator*() const { return value; }
        Iterator& operator++() { ++value; return *this; }
        bool operator!=(const Iterator& other) const { return value != other.value; }
    };
    Iterator begin() const { return Iterator{start_}; }
    Iterator end() const { return Iterator{end_}; }
};

template <typename Iterable>
std::vector<int> take(const Iterable& xs, int n) {
    std::vector<int> out;
    auto it = xs.begin();
    auto stop = xs.end();
    for (int i = 0; i < n && it != stop; ++i, ++it) {
        out.push_back(*it);
    }
    return out;
}`,

  task: `
<p>Build a tiny lazy-sequence toolkit using the iterator protocol directly — no
templates or compile-time iterator categories the way an equivalent C++ range
type would need:</p>
<ol>
  <li><code>range(start, end)</code> — a generator function that
      <code>yield</code>s every integer from <code>start</code> up to but not
      including <code>end</code>.</li>
  <li><code>take(iterable, n)</code> — pull at most <code>n</code> values from
      any iterable by driving its <code>next()</code>, returning them as an
      array. Stop early if the iterable runs out.</li>
  <li><code>concat(a, b)</code> — a generator that yields everything from
      <code>a</code>, then everything from <code>b</code>, using
      <code>yield*</code>.</li>
  <li><code>countUpFrom(start)</code> — return a custom <em>iterable object</em>
      (not a generator function) whose <code>[Symbol.iterator]()</code> counts
      <code>start</code>, <code>start + 1</code>, <code>start + 2</code>, …
      forever.</li>
</ol>`,

  starter: `// 1. range(start, end) — generator yielding start .. end-1
function* range(start, end) {
  // TODO
}

// 2. take(iterable, n) — first n values as an array
function take(iterable, n) {
  // TODO
  return [];
}

// 3. concat(a, b) — generator delegating with yield*
function* concat(a, b) {
  // TODO
}

// 4. countUpFrom(start) — a custom iterable object (infinite)
function countUpFrom(start) {
  // TODO
  return {};
}
`,

  exportNames: ["range", "take", "concat", "countUpFrom"],

  requirements: [
    { pattern: /function\s*\*\s*range/, message: "range must be a generator function (function*)" },
    { pattern: /yield\s*\*/, message: "Use yield* to delegate inside concat" },
    { pattern: /\[\s*Symbol\.iterator\s*\]/, message: "countUpFrom must define a [Symbol.iterator]() method" },
    { pattern: /\.next\s*\(/, message: "take must drive the iterator by calling next()" },
  ],

  tests: [
    { name: "range(0, 5) spreads to [0,1,2,3,4]", run: (x) => expectDeepEqual([...x.range(0, 5)], [0, 1, 2, 3, 4]) },
    { name: "range(2, 2) is empty", run: (x) => expectDeepEqual(Array.from(x.range(2, 2)), []) },
    { name: "take(range(10, 100), 3) is [10,11,12]", run: (x) => expectDeepEqual(x.take(x.range(10, 100), 3), [10, 11, 12]) },
    { name: "take stops early when the source runs out", run: (x) => expectDeepEqual(x.take(x.range(0, 2), 5), [0, 1]) },
    { name: "concat yields a then b", run: (x) => expectDeepEqual([...x.concat(x.range(0, 2), x.range(5, 7))], [0, 1, 5, 6]) },
    { name: "concat works with arrays (any iterable)", run: (x) => expectDeepEqual(Array.from(x.concat([1, 2], [3])), [1, 2, 3]) },
    { name: "countUpFrom is an infinite iterable driven by take", run: (x) => expectDeepEqual(x.take(x.countUpFrom(100), 4), [100, 101, 102, 103]) },
  ],

  solution: `function* range(start, end) {
  for (let i = start; i < end; i++) {
    yield i;
  }
}

function take(iterable, n) {
  const out = [];
  const it = iterable[Symbol.iterator]();
  for (let i = 0; i < n; i++) {
    const r = it.next();
    if (r.done) break;
    out.push(r.value);
  }
  return out;
}

function* concat(a, b) {
  yield* a;
  yield* b;
}

function countUpFrom(start) {
  return {
    [Symbol.iterator]() {
      let i = start;
      return {
        next() {
          return { value: i++, done: false };
        },
      };
    },
  };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>JavaScript</th></tr>
  <tr><td>Iterable contract</td><td>type with <code>begin()</code> / <code>end()</code></td><td>object with <code>[Symbol.iterator]()</code></td></tr>
  <tr><td>Iterator contract</td><td>type with <code>operator*</code>, <code>operator++</code>, comparison</td><td>object with <code>next()</code> → <code>{ value, done }</code></td></tr>
  <tr><td>Generator</td><td>C++20 coroutine with <code>co_yield</code> (e.g. <code>std::generator&lt;T&gt;</code>, C++23)</td><td>result of calling a <code>function*</code></td></tr>
  <tr><td>Collect to array</td><td>range-based <code>for</code> loop pushing into a <code>std::vector</code></td><td><code>[...gen]</code> / <code>Array.from(gen)</code></td></tr>
</table>
<p>A generator object is <em>both</em> an iterator and an iterable: its own
<code>[Symbol.iterator]()</code> returns itself. That is why you can spread it
directly with <code>[...range(0, 5)]</code>. Note the consequence — a generator
is single-use; once fully consumed, iterating it again yields nothing. That is
different from a typical C++ range object, where calling <code>begin()</code>
again gives you a fresh iterator over the same underlying data. A custom
iterable object like <code>countUpFrom</code> behaves more like that C++ range:
each call to <code>[Symbol.iterator]()</code> starts a fresh iterator, so it
can be looped over repeatedly.</p>
<p>Beware infinite iterables with <code>[...gen]</code> or <code>Array.from</code>
— they will loop forever, the same way a <code>for</code> loop over a C++
range whose <code>end()</code> never compares equal would never terminate.
That is exactly what <code>take</code> guards against: it pulls a bounded
number of values and never asks for more.</p>`,
};
