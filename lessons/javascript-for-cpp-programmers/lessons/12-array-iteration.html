  number: 12,
  title: "Array Iteration",

  intro: `
<p>In C++ you reach for <code>&lt;algorithm&gt;</code> and <code>&lt;numeric&gt;</code>
to keep transformations honest: <code>std::transform</code> is templated on the
output type, <code>std::accumulate</code> threads an accumulator whose type you
fix by the initial value you pass, and the compiler checks every lambda's
signature against the iterator range it walks. JavaScript's array methods —
<code>map</code>, <code>filter</code>, <code>reduce</code>, <code>find</code>,
<code>every</code>, <code>some</code> — do the same jobs at runtime, but nothing
checks the shape of what flows through them, so the discipline moves from the
compiler into your head.</p>
<table>
  <tr><th>C++</th><th>JavaScript</th></tr>
  <tr><td><code>std::transform(b, e, out, [](int x){ return std::to_string(x); })</code></td><td><code>arr.map((x) =&gt; ...)</code></td></tr>
  <tr><td><code>std::accumulate(b, e, 0, fn)</code></td><td><code>arr.reduce(fn, 0)</code></td></tr>
  <tr><td><code>std::find_if(b, e, pred)</code> — compare to <code>end()</code></td><td><code>arr.find(...)</code> — may be <code>undefined</code></td></tr>
  <tr><td>result type checked at compile time</td><td>result is whatever the callback returned</td></tr>
</table>
<p>The idiomatic move — in both languages — is to <em>chain</em> these
operations instead of writing manual index-based loops: describe the
transformation as a pipeline (<code>filter</code> then <code>map</code> then
<code>reduce</code>) rather than a sequence of mutations. C++'s algorithms
require you to wire up an output iterator (<code>std::back_inserter</code>) or
a seed value for each step; JavaScript's methods just return a fresh array, so
the pipeline reads top-to-bottom as a series of pure steps with less
ceremony. Two runtime facts worth holding onto: <code>find</code> returns
<code>undefined</code> when nothing matches (unlike <code>find_if</code>, which
hands back an iterator you must compare against <code>end()</code> — dereferencing
it otherwise is undefined behavior), and <code>reduce</code> on an empty array
<em>throws</em> if you gave it no initial value.</p>`,

  cpp: `struct Order {
  int id;
  std::string customer;
  double total;
  bool paid;
};

double paidTotal(const std::vector<Order>& orders) {
  return std::accumulate(orders.begin(), orders.end(), 0.0,
    [](double sum, const Order& o) {
      return o.paid ? sum + o.total : sum;
    });
}

std::vector<std::string> customerNames(const std::vector<Order>& orders) {
  std::vector<std::string> names;
  std::transform(orders.begin(), orders.end(), std::back_inserter(names),
    [](const Order& o) { return o.customer; });
  return names;
}`,

  task: `
<p>You are given an array of order objects, each shaped like
<code>{ id, customer, total, paid }</code>. Build a little reporting toolkit —
no manual <code>for</code>/<code>while</code> loops, use the array methods:</p>
<ol>
  <li><code>paidTotal(orders)</code> — sum of <code>total</code> across only the
      <em>paid</em> orders (chain <code>filter</code> then <code>reduce</code>).
      Returns <code>0</code> for an empty array.</li>
  <li><code>bigSpenders(orders, min)</code> — an array of the
      <code>customer</code> names whose order <code>total</code> is greater than
      or equal to <code>min</code> (chain <code>filter</code> then
      <code>map</code>).</li>
  <li><code>findOrder(orders, id)</code> — the first order object with the given
      <code>id</code>, or <code>undefined</code> if there is none (use
      <code>find</code>).</li>
  <li><code>allPaid(orders)</code> — <code>true</code> if every order is paid
      (use <code>every</code>).</li>
  <li><code>anyUnpaid(orders)</code> — <code>true</code> if at least one order is
      unpaid (use <code>some</code>).</li>
  <li><code>totalByCustomer(orders)</code> — an object mapping each customer name
      to the sum of their order totals, built with a single <code>reduce</code>.</li>
</ol>`,

`,

  exportNames: ["paidTotal", "bigSpenders", "findOrder", "allPaid", "anyUnpaid", "totalByCustomer"],

  requirements: [
    { pattern: /\.filter\s*\(/, message: "Use .filter() to select orders" },
    { pattern: /\.map\s*\(/, message: "Use .map() to project customer names" },
    { pattern: /\.reduce\s*\(/, message: "Use .reduce() to aggregate totals" },
    { pattern: /\.find\s*\(/, message: "Use .find() to locate an order by id" },
  ],

  tests: [
    {
      name: "paidTotal sums only paid orders",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Ada", total: 10, paid: true },
        ];
        expectEqual(x.paidTotal(orders), 50);
      },
    },
    {
      name: "paidTotal returns 0 for an empty array",
      run: (x) => expectEqual(x.paidTotal([]), 0),
    },
    {
      name: "bigSpenders keeps names at or above min",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Cy", total: 100, paid: true },
        ];
        expectDeepEqual(x.bigSpenders(orders, 40), ["Ada", "Cy"]);
      },
    },
    {
      name: "findOrder returns the matching order",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
        ];
        expectEqual(x.findOrder(orders, 2).customer, "Rob");
      },
    },
    {
      name: "findOrder returns undefined when nothing matches",
      run: (x) => expectEqual(x.findOrder([{ id: 1, customer: "Ada", total: 40, paid: true }], 99), undefined),
    },
    {
      name: "allPaid and anyUnpaid reflect the paid flags",
      run: (x) => {
        const mixed = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
        ];
        const clean = [{ id: 3, customer: "Cy", total: 10, paid: true }];
        expectEqual(x.allPaid(mixed), false);
        expectEqual(x.allPaid(clean), true);
        expectEqual(x.anyUnpaid(mixed), true);
        expectEqual(x.anyUnpaid(clean), false);
      },
    },
    {
      name: "totalByCustomer groups totals by name",
      run: (x) => {
        const orders = [
          { id: 1, customer: "Ada", total: 40, paid: true },
          { id: 2, customer: "Rob", total: 25, paid: false },
          { id: 3, customer: "Ada", total: 10, paid: true },
        ];
        expectDeepEqual(x.totalByCustomer(orders), { Ada: 50, Rob: 25 });
      },
    },
  ],

  solution: `function paidTotal(orders) {
  return orders
    .filter((o) => o.paid)
    .reduce((sum, o) => sum + o.total, 0);
}

function bigSpenders(orders, min) {
  return orders
    .filter((o) => o.total >= min)
    .map((o) => o.customer);
}

function findOrder(orders, id) {
  return orders.find((o) => o.id === id);
}

function allPaid(orders) {
  return orders.every((o) => o.paid);
}

function anyUnpaid(orders) {
  return orders.some((o) => !o.paid);
}

function totalByCustomer(orders) {
  return orders.reduce((acc, o) => {
    acc[o.customer] = (acc[o.customer] || 0) + o.total;
    return acc;
  }, {});
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Mapped result type</td><td><code>std::transform</code> writes into an output iterator whose element type you declare</td><td>whatever the callback returns</td></tr>
  <tr><td>reduce accumulator</td><td>type fixed by the initial value passed to <code>std::accumulate</code></td><td>whatever you seed and return</td></tr>
  <tr><td>find miss</td><td><code>find_if</code> returns <code>end()</code>; dereferencing it is undefined behavior</td><td>silently <code>undefined</code></td></tr>
  <tr><td>reduce, no seed, empty array</td><td><code>accumulate</code> always requires an initial value — it won't compile without one</td><td>throws <code>TypeError</code> at runtime</td></tr>
  <tr><td>Grouping accumulator</td><td><code>std::map&lt;std::string, double&gt;</code></td><td>a plain <code>{}</code> object</td></tr>
</table>
<p>Because there is no compiler enforcing any of this, a few runtime edges
become yours to manage. Always pass an initial value to <code>reduce</code> —
both to define the result type in your head and because
<code>[].reduce((a, b) =&gt; a + b)</code> throws "Reduce of empty array with
no initial value" (C++'s <code>accumulate</code> sidesteps this entirely by
making the initial value a required parameter). A <code>find</code> that fails
returns <code>undefined</code>, so reaching straight into <code>.customer</code>
on the result can blow up with "Cannot read properties of undefined" — guard
it, or use <code>?.</code>; this is the JavaScript analogue of dereferencing an
iterator without checking it against <code>end()</code> first, except it
throws a catchable error instead of corrupting memory. And each of
<code>filter</code>/<code>map</code> allocates a fresh array, so a long chain
over a huge list does more allocation than one fused loop — much like chaining
several STL algorithms with intermediate containers instead of writing one
pass by hand; for the sizes in everyday code the readability of the pipeline
wins, but it is a real runtime cost no type annotation ever hinted at.</p>`,
