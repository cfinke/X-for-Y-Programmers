<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables, Mutability & Types",

  intro: `
<p>In Python, a name is a sticky note: <code>age = 36</code> today,
<code>age = "thirty-six"</code> tomorrow, and the type hints you carefully
write are advisory — mypy complains, the interpreter shrugs. Rust flips both
defaults. A <code>let</code> binding is immutable — not just "can't rebind,"
the <em>contents</em> can't change either — and mutation is an explicit
opt-in with <code>let mut</code>. And the annotations are the same colon-style
hints you already write, except they're enforced, at compile time, always.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>name = "Ada"</code> (rebindable, mutable)</td><td><code>let name = "Ada";</code> (immutable)</td></tr>
  <tr><td><code>age: int = 36</code> (hint, advisory)</td><td><code>let mut age: u32 = 36;</code> (enforced)</td></tr>
  <tr><td><code>int</code> — one type, arbitrary precision</td><td><code>i32</code>, <code>u64</code>, <code>f64</code>… fixed-size, pick one</td></tr>
  <tr><td><code>f"{name} is {age}"</code></td><td><code>format!("{} is {} years old", name, age)</code></td></tr>
</table>
<p>Python's <code>int</code> quietly grows to hold <code>10 ** 100</code>;
Rust integers are fixed-size machine types — <code>i32</code> is the default
(a 32-bit signed integer), <code>u32</code> is unsigned, <code>f64</code> is
your <code>float</code> — and overflow is an error, not a bigger number.
They never mix silently either: adding an <code>i32</code> to an
<code>f64</code> is a compile error until you convert with <code>as</code>.
Two mechanical changes round it out: braces and semicolons replace
indentation, and — good news — Rust already uses <code>snake_case</code>,
so your naming instincts carry over untouched.</p>`,

  python: `name = "Ada"
age: int = 36
price: float = 9.99

# Hints are advisory: mypy objects, Python shrugs.
age = "thirty-six"
age = 36

# int is arbitrary precision — this just works:
big = 10 ** 100

def describe_user(name: str, age: int) -> str:
    return f"{name} is {age} years old"

def birthday(age: int) -> int:
    age += 1
    return age

print(describe_user(name, age))`,

  task: `
<p>Rewrite the Python as Rust:</p>
<ol>
  <li>Write a function <code>describe_user</code> that takes
      <code>name: &amp;str</code> and <code>age: u32</code> and returns a
      <code>String</code> like <code>"Ada is 36 years old"</code>. Use
      <code>format!</code> — Rust's f-string, with positional <code>{}</code>
      holes instead of inline expressions.</li>
  <li>Write a function <code>birthday</code> that takes <code>age: u32</code>
      and returns <code>u32</code>. Inside, bind the argument to a
      <code>let mut</code> local, add 1 to it with <code>+=</code>, and
      return it — parameters are immutable by default, so mutation needs
      the opt-in.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. describe_user: takes name: &str and age: u32, returns String.
//    Python: f"{name} is {age} years old"
//    Rust:   format!("{} is {} years old", ...)
fn describe_user(name: &str, age: u32) -> String {
    todo!()
}

// 2. birthday: bind age to a \`let mut\` local, increment with +=, return it.
fn birthday(age: u32) -> u32 {
    todo!()
}
`,

  requirements: [
    { pattern: /fn\s+describe_user\s*\(\s*name\s*:\s*&str\s*,\s*age\s*:\s*u32\s*\)\s*->\s*String/, message: "Define describe_user(name: &str, age: u32) -> String" },
    { pattern: /format!\s*\(/, message: "Use the format! macro to build the string" },
    { pattern: /let\s+mut\b/, message: "Use a let mut binding inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'assert_eq!(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'assert_eq!(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "assert_eq!(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "assert_eq!(birthday(0), 1);" },
  ],

  solution: `fn describe_user(name: &str, age: u32) -> String {
    format!("{} is {} years old", name, age)
}

fn birthday(age: u32) -> u32 {
    let mut next = age;
    next += 1;
    next
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Binding</td><td><code>x = 1</code> (rebind anytime)</td><td><code>let x = 1;</code> (immutable, contents too)</td></tr>
  <tr><td>Mutable binding</td><td>every binding, always</td><td><code>let mut x = 1;</code> (explicit opt-in)</td></tr>
  <tr><td>Type annotations</td><td><code>age: int</code> (advisory)</td><td><code>age: u32</code> (enforced at compile time)</td></tr>
  <tr><td>Integers</td><td><code>int</code>, arbitrary precision</td><td><code>i32</code>/<code>u32</code>/<code>i64</code>/<code>u64</code>… fixed-size</td></tr>
  <tr><td>Floats</td><td><code>float</code></td><td><code>f64</code> (also <code>f32</code>)</td></tr>
  <tr><td>String building</td><td><code>f"{name} is {age}"</code></td><td><code>format!("{} is {}", name, age)</code></td></tr>
  <tr><td>Naming</td><td><code>snake_case</code></td><td><code>snake_case</code> — no change!</td></tr>
</table>
<p>Notice <code>birthday</code>'s last line: <code>next</code> with no
<code>return</code> and no semicolon. A block's final expression is its
value — more on that in the next lesson. And note that you rarely annotate
locals: like a good mypy setup, Rust infers <code>let next = age;</code> is a
<code>u32</code>. Annotate signatures; let the compiler handle the rest.</p>`,
};
</script>
