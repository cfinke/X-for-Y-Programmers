const LESSON = {
  number: 13,
  title: "Generics & Trait Bounds",

  intro: `
<p>Every Python function is already "generic" — it takes anything, and if the
anything doesn't support what you do to it, you get a <code>TypeError</code>
at runtime. <code>TypeVar</code> lets you <em>describe</em> the intent
(<code>def first(items: list[T]) -&gt; T | None</code>), but it's advisory:
mypy might catch a misuse, the interpreter never will. Rust generics use
nearly the same vocabulary — <code>fn first&lt;T&gt;(items: &amp;[T])</code>
reads just like the TypeVar version — but the parameter is enforced, and the
function is compiled separately for each concrete <code>T</code> it's used
with.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>T = TypeVar("T")</code></td><td><code>&lt;T&gt;</code> right on the function</td></tr>
  <tr><td><code>def first(items: list[T]) -&gt; T | None:</code></td><td><code>fn first&lt;T&gt;(items: &amp;[T]) -&gt; Option&lt;&amp;T&gt;</code></td></tr>
  <tr><td><code>TypeVar("C", bound=…)</code> (advisory)</td><td><code>&lt;T: PartialOrd&gt;</code> (enforced)</td></tr>
  <tr><td><code>item &gt; best</code> — hope it supports <code>&gt;</code></td><td><code>item &gt; best</code> — only compiles because of the bound</td></tr>
</table>
<p>The interesting part is the flip in who does the hoping. Inside a Rust
generic function you can only do to <code>T</code> what you've
<em>declared</em> about <code>T</code>. Plain <code>&lt;T&gt;</code> promises
nothing, so <code>first</code> can move references around but never compare
elements. Write <code>largest</code> with plain <code>&lt;T&gt;</code> and
the <code>&gt;</code> inside won't compile; the bound
<code>&lt;T: PartialOrd&gt;</code> — "T must be orderable," a
<code>TypeVar(bound=…)</code> with teeth — is what buys you the comparison.
And callers are checked against the same contract: pass a slice of
un-orderable things and the <em>call site</em> is the error, not a stack
trace in production.</p>`,

  python: `from typing import TypeVar

T = TypeVar("T")
C = TypeVar("C", bound="SupportsDunderLT")  # advisory only

def first(items: list[T]) -> T | None:
    return items[0] if items else None

def largest(items: list[C]) -> C:
    best = items[0]
    for item in items:
        if item > best:   # hope every item supports ">"
            best = item
    return best

largest([3, 7, 2])        # 7 — works
largest(["pear", "fig"])  # "pear" — works
largest([{}, {}])         # TypeError — at runtime, in production`,

  task: `
<p>Rewrite both functions with enforced type parameters (the signatures are
already in the starter):</p>
<ol>
  <li><code>first&lt;T&gt;(items: &amp;[T]) -&gt; Option&lt;&amp;T&gt;</code> —
      return <code>Some(&amp;items[0])</code>, or <code>None</code> if the
      slice is empty (<code>items.is_empty()</code>). No bound needed:
      handing back a reference asks nothing of <code>T</code>.</li>
  <li><code>largest&lt;T: PartialOrd&gt;(items: &amp;[T]) -&gt; &amp;T</code> —
      start with a reference to the first element, loop, and keep the bigger
      one; <code>&gt;</code> works because the bound promises it. Assume the
      slice is non-empty.</li>
</ol>
<p>The tests call both functions with <code>i32</code> slices <em>and</em>
<code>&amp;str</code> slices — one definition, checked for each. Don't write
<code>fn main</code> — the lesson's tests call your functions directly.</p>`,

  starter: `// No bound: T can be anything, so the body can't assume anything about it.
// Python: def first(items: list[T]) -> T | None
fn first<T>(items: &[T]) -> Option<&T> {
    todo!()
}

// The bound <T: PartialOrd> is TypeVar(bound=...) with teeth:
// it's the only reason ">" compiles inside. Assume items is non-empty.
fn largest<T: PartialOrd>(items: &[T]) -> &T {
    todo!()
}
`,

  requirements: [
    { pattern: /<T>/, message: "Declare first with an unbounded type parameter <T>" },
    { pattern: /Option<&T>/, message: "first should return Option<&T>" },
    { pattern: /<T\s*:\s*PartialOrd>/, message: "Give largest the trait bound <T: PartialOrd>" },
  ],

  tests: [
    { name: "first(&[10, 20, 30]) returns Some(&10)",
      code: "assert_eq!(first(&[10, 20, 30]), Some(&10));" },
    { name: "first on an empty slice returns None",
      code: "let empty: &[i32] = &[];\nassert_eq!(first(empty), None);" },
    { name: 'first(&["a", "b"]) returns Some(&"a") — same fn, different T',
      code: 'assert_eq!(first(&["a", "b"]), Some(&"a"));' },
    { name: "largest(&[3, 7, 2]) returns &7",
      code: "assert_eq!(largest(&[3, 7, 2]), &7);" },
    { name: 'largest(&["apple", "pear", "banana"]) returns &"pear"',
      code: 'assert_eq!(largest(&["apple", "pear", "banana"]), &"pear");' },
    { name: "largest(&[-5, -1, -9]) returns &-1",
      code: "assert_eq!(largest(&[-5, -1, -9]), &-1);" },
  ],

  solution: `fn first<T>(items: &[T]) -> Option<&T> {
    if items.is_empty() {
        None
    } else {
        Some(&items[0])
    }
}

fn largest<T: PartialOrd>(items: &[T]) -> &T {
    let mut best = &items[0];
    for item in items {
        if item > best {
            best = item;
        }
    }
    best
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Type parameter</td><td><code>T = TypeVar("T")</code>, module-level</td><td><code>fn first&lt;T&gt;(…)</code>, on the function</td></tr>
  <tr><td>Constrained parameter</td><td><code>TypeVar("C", bound=…)</code> (advisory)</td><td><code>&lt;T: PartialOrd&gt;</code> (enforced both sides)</td></tr>
  <tr><td>Several constraints</td><td>Protocol gymnastics</td><td><code>&lt;T: PartialOrd + Clone&gt;</code></td></tr>
  <tr><td>Orderable</td><td><code>__lt__</code> et al., by convention</td><td><code>PartialOrd</code> trait</td></tr>
  <tr><td>Misuse caught</td><td>Runtime <code>TypeError</code> (or mypy, maybe)</td><td>Compile error at the call site</td></tr>
  <tr><td>Runtime cost</td><td>Dynamic dispatch everywhere</td><td>None — compiled per concrete type</td></tr>
</table>
<p>The bound cuts both ways, and that's the insight: the <em>body</em> may
only use what the bound grants (drop <code>PartialOrd</code> and
<code>&gt;</code> stops compiling), and <em>callers</em> may only supply types
that satisfy it (the <code>largest([{}, {}])</code> disaster is rejected
before the program exists). Last lesson's traits are the vocabulary these
bounds are written in — <code>T: Describe</code> would let a generic function
call <code>.describe()</code>. This isn't new machinery to you, either:
<code>Option&lt;T&gt;</code> and <code>Vec&lt;T&gt;</code> have been generics
all along.</p>`,
};
