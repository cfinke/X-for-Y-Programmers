<script>
const LESSON = {
  number: 9,
  title: "Result & the ? Operator",

  intro: `
<p>In Python, failure is invisible in the signature.
<code>def parse_age(s: str) -&gt; int</code> looks total, but
<code>int(s)</code> can raise <code>ValueError</code> — and nothing but the
docs (or a stack trace in production) tells you which exceptions a function
might throw, from how many layers down. Rust makes failure part of the type:
a fallible function returns <code>Result&lt;T, E&gt;</code>, which is either
<code>Ok(value)</code> or <code>Err(error)</code>. No more guessing what a
function raises — it's written in the signature, and the compiler makes the
caller deal with it.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>def parse_age(s: str) -&gt; int:</code> (may raise — who knows?)</td><td><code>fn parse_age(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code></td></tr>
  <tr><td><code>raise ValueError("bad age")</code></td><td><code>return Err(String::from("bad age"));</code></td></tr>
  <tr><td><code>return age</code> (success)</td><td><code>Ok(age)</code></td></tr>
  <tr><td><code>int(s)</code> raises <code>ValueError</code></td><td><code>s.parse::&lt;u32&gt;()</code> returns a <code>Result</code></td></tr>
  <tr><td><code>except ValueError: raise</code> (re-raise upward)</td><td><code>parse_age(s)?</code> — the <code>?</code> operator</td></tr>
</table>
<p>The star is <code>?</code>. Stuck after a <code>Result</code>, it means
"unwrap the <code>Ok</code>, or early-return the <code>Err</code> to my
caller" — exactly the propagation you'd write in Python as a
<code>try/except</code> whose except block is a bare <code>raise</code>, in
one character. And <code>int(s)</code> has a direct counterpart:
<code>s.parse::&lt;u32&gt;()</code>, which returns a <code>Result</code>
instead of raising. Its error type is a parse-error struct, so
<code>.map_err(...)</code> — <code>.map</code> for the failure side — converts
it into whatever error type your signature promises.</p>`,

  python: `def parse_age(s: str) -> int:
    # int() raises ValueError — the signature never warns you.
    age = int(s.strip())
    return age

def age_next_year(s: str) -> int:
    try:
        age = parse_age(s)
    except ValueError:
        raise                      # propagate: the bare re-raise
    return age + 1

try:
    print(age_next_year("29"))     # 30
    print(age_next_year("??"))     # ValueError, from two calls deep
except ValueError as e:
    print(f"bad input: {e}")`,

  task: `
<p>Rewrite the parsing pipeline with errors as values:</p>
<ol>
  <li><code>parse_age(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code>:
      trim the input and parse it with
      <code>s.trim().parse::&lt;u32&gt;()</code>. That returns a
      <code>Result</code> with a parse-error type, so convert the failure
      into your <code>String</code> error with
      <code>.map_err(|_| format!("invalid age: {}", s))</code> (any message
      works — the tests only check that bad input produces an
      <code>Err</code>).</li>
  <li><code>age_next_year(s: &amp;str) -&gt; Result&lt;u32, String&gt;</code>:
      call <code>parse_age(s)?</code> — the <code>?</code> propagates an
      <code>Err</code> to your caller, like a bare <code>raise</code> — then
      return the age plus one, wrapped in <code>Ok</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. parse_age: int(s.strip()) that returns instead of raises.
//    s.trim().parse::<u32>() gives a Result; .map_err(...) converts
//    the parse error into your String error type.
fn parse_age(s: &str) -> Result<u32, String> {
    todo!()
}

// 2. age_next_year: parse_age(s)? propagates the Err (the bare raise);
//    on success, return Ok(age + 1).
fn age_next_year(s: &str) -> Result<u32, String> {
    todo!()
}
`,

  requirements: [
    { pattern: /Result</, message: "Return Result — failure belongs in the signature" },
    { pattern: /map_err|Err\(/, message: "Produce the error value (map_err or Err(...))" },
    { pattern: /\)\?/, message: "Use the ? operator to propagate the error in age_next_year" },
  ],

  tests: [
    { name: 'parse_age("42") is Ok(42)',
      code: 'assert_eq!(parse_age("42"), Ok(42));' },
    { name: "parse_age trims whitespace first",
      code: 'assert_eq!(parse_age("  7  "), Ok(7));' },
    { name: "parse_age on garbage is an Err",
      code: 'assert!(parse_age("not a number").is_err());' },
    { name: 'age_next_year("29") is Ok(30)',
      code: 'assert_eq!(age_next_year("29"), Ok(30));' },
    { name: "age_next_year propagates the parse error",
      code: 'assert!(age_next_year("??").is_err());' },
  ],

  solution: `fn parse_age(s: &str) -> Result<u32, String> {
    s.trim()
        .parse::<u32>()
        .map_err(|_| format!("invalid age: {}", s))
}

fn age_next_year(s: &str) -> Result<u32, String> {
    Ok(parse_age(s)? + 1)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Fallible signature</td><td><code>-&gt; int</code> (exceptions invisible)</td><td><code>-&gt; Result&lt;u32, String&gt;</code></td></tr>
  <tr><td>Fail</td><td><code>raise ValueError("...")</code></td><td><code>Err(String::from("..."))</code></td></tr>
  <tr><td>Succeed</td><td><code>return value</code></td><td><code>Ok(value)</code></td></tr>
  <tr><td>Parse a number</td><td><code>int(s)</code> — raises</td><td><code>s.parse::&lt;u32&gt;()</code> — returns <code>Result</code></td></tr>
  <tr><td>Propagate upward</td><td><code>except ValueError: raise</code></td><td><code>expr?</code></td></tr>
  <tr><td>Convert the error</td><td><code>raise MyError(...) from e</code></td><td><code>.map_err(|e| ...)</code></td></tr>
  <tr><td>Handle both cases</td><td><code>try / except</code></td><td><code>match r { Ok(v) =&gt; ..., Err(e) =&gt; ... }</code></td></tr>
</table>
<p><code>Result</code> is <code>Option</code>'s sibling: two variants, but the
failure side carries a value explaining <em>why</em>. Note what <code>?</code>
requires: it early-returns an <code>Err</code>, so it only works inside a
function that itself returns a <code>Result</code> (with a compatible error
type) — which is precisely the discipline Python can't enforce: you can only
"re-raise" if your own signature admits you might fail. There's no invisible
exception highway from anywhere to anywhere; every hop of the propagation is
visible as a <code>?</code>, and the compiler checks the whole chain.</p>`,
};
