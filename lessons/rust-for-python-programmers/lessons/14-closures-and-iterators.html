const LESSON = {
  number: 14,
  title: "Closures & Iterators",

  intro: `
<p>List comprehensions are the most Pythonic thing you write, and they
translate almost mechanically:
<code>[p.name for p in products if p.in_stock]</code> becomes
<code>products.iter().filter(|p| p.in_stock).map(|p| p.name.clone()).collect()</code>.
Read the chain left to right and it's the comprehension read inside-out —
source, filter, transform, materialize. The <code>|x| body</code> syntax is a
closure, Rust's <code>lambda x: body</code>, with one upgrade: it may have a
multi-statement block body (<code>|x| { let y = …; y * 2 }</code>), the thing
Python lambdas famously can't.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>[p.name for p in ps if p.in_stock]</code></td><td><code>ps.iter().filter(|p| p.in_stock).map(|p| p.name.clone()).collect()</code></td></tr>
  <tr><td><code>lambda x: x * 2</code></td><td><code>|x| x * 2</code> (multi-statement allowed)</td></tr>
  <tr><td><code>(p.price for p in ps)</code> — lazy generator</td><td><code>ps.iter().map(|p| p.price_cents)</code> — lazy chain</td></tr>
  <tr><td><code>list(gen)</code></td><td><code>.collect()</code></td></tr>
  <tr><td><code>sum(gen)</code></td><td><code>.sum()</code></td></tr>
</table>
<p>The mental model you already own is the generator expression: an iterator
chain is <em>lazy</em>, exactly like <code>(p.price for p in ps)</code> —
building it does no work, and nothing runs until a consumer like
<code>.collect()</code> (Rust's <code>list()</code>) or <code>.sum()</code>
pulls values through. One borrow-checker note: <code>.iter()</code> yields
<em>references</em> to the elements — the slice is borrowed, not consumed —
so to put an element's <code>String</code> into a new <code>Vec</code> you
clone it (<code>p.name.clone()</code>), and <code>collect</code> needs to
know what it's building, which the <code>-&gt; Vec&lt;String&gt;</code>
return type tells it.</p>`,

  python: `from dataclasses import dataclass

@dataclass
class Product:
    name: str
    price_cents: int
    in_stock: bool

def in_stock_names(products: list[Product]) -> list[str]:
    return [p.name for p in products if p.in_stock]

def total_value(products: list[Product]) -> int:
    # generator expression: lazy, sum() pulls it through
    return sum(p.price_cents for p in products)

def evens_doubled(numbers: list[int]) -> list[int]:
    return [n * 2 for n in numbers if n % 2 == 0]`,

  task: `
<p>Translate the three comprehensions into iterator chains (the
<code>Product</code> struct is already complete in the starter):</p>
<ol>
  <li><code>in_stock_names(products: &amp;[Product]) -&gt; Vec&lt;String&gt;</code> —
      <code>.iter()</code>, <code>.filter(|p| p.in_stock)</code>,
      <code>.map(|p| p.name.clone())</code>, <code>.collect()</code>.</li>
  <li><code>total_value(products: &amp;[Product]) -&gt; u32</code> — map each
      product to <code>p.price_cents</code> and <code>.sum()</code>, the
      generator-expression-into-<code>sum()</code> pattern.</li>
  <li><code>evens_doubled(numbers: &amp;[i32]) -&gt; Vec&lt;i32&gt;</code> —
      keep the even numbers (<code>|n| *n % 2 == 0</code> — the closure gets
      a reference, so dereference to do math), double them, collect.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// Complete — the tests construct Products with struct literals.
struct Product {
    name: String,
    price_cents: u32,
    in_stock: bool,
}

// Python: [p.name for p in products if p.in_stock]
// Rust:   .iter().filter(...).map(...).collect()
fn in_stock_names(products: &[Product]) -> Vec<String> {
    todo!()
}

// Python: sum(p.price_cents for p in products)
fn total_value(products: &[Product]) -> u32 {
    todo!()
}

// Python: [n * 2 for n in numbers if n % 2 == 0]
fn evens_doubled(numbers: &[i32]) -> Vec<i32> {
    todo!()
}
`,

  requirements: [
    { pattern: /\.iter\(\)/, message: "Start the chains with .iter()" },
    { pattern: /\.filter\(/, message: "Use .filter(...) for the 'if' part of the comprehension" },
    { pattern: /\.map\(/, message: "Use .map(...) for the expression part of the comprehension" },
    { pattern: /\.collect/, message: "Materialize the lazy chain with .collect()" },
  ],

  tests: [
    { name: 'in_stock_names keeps only in-stock names, in order',
      code: 'let products = vec![\n    Product { name: String::from("keyboard"), price_cents: 4999, in_stock: true },\n    Product { name: String::from("monitor"), price_cents: 15999, in_stock: false },\n    Product { name: String::from("mouse"), price_cents: 2499, in_stock: true },\n];\nassert_eq!(in_stock_names(&products), vec!["keyboard", "mouse"]);' },
    { name: "in_stock_names on an empty slice returns an empty Vec",
      code: "let products: Vec<Product> = Vec::new();\nassert_eq!(in_stock_names(&products), Vec::<String>::new());" },
    { name: "total_value sums price_cents across all products (23497)",
      code: 'let products = vec![\n    Product { name: String::from("keyboard"), price_cents: 4999, in_stock: true },\n    Product { name: String::from("monitor"), price_cents: 15999, in_stock: false },\n    Product { name: String::from("mouse"), price_cents: 2499, in_stock: true },\n];\nassert_eq!(total_value(&products), 23497);' },
    { name: "total_value of no products is 0",
      code: "let products: Vec<Product> = Vec::new();\nassert_eq!(total_value(&products), 0);" },
    { name: "evens_doubled(&[1, 2, 3, 4, 5]) returns [4, 8]",
      code: "assert_eq!(evens_doubled(&[1, 2, 3, 4, 5]), vec![4, 8]);" },
    { name: "evens_doubled with no evens returns an empty Vec",
      code: "assert_eq!(evens_doubled(&[1, 3, 5]), Vec::<i32>::new());" },
  ],

  solution: `struct Product {
    name: String,
    price_cents: u32,
    in_stock: bool,
}

fn in_stock_names(products: &[Product]) -> Vec<String> {
    products
        .iter()
        .filter(|p| p.in_stock)
        .map(|p| p.name.clone())
        .collect()
}

fn total_value(products: &[Product]) -> u32 {
    products.iter().map(|p| p.price_cents).sum()
}

fn evens_doubled(numbers: &[i32]) -> Vec<i32> {
    numbers
        .iter()
        .filter(|n| *n % 2 == 0)
        .map(|n| n * 2)
        .collect()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Anonymous function</td><td><code>lambda x: x * 2</code> (one expression only)</td><td><code>|x| x * 2</code> (blocks allowed: <code>|x| { … }</code>)</td></tr>
  <tr><td>Filter + transform</td><td><code>[f(x) for x in xs if cond(x)]</code></td><td><code>xs.iter().filter(cond).map(f).collect()</code></td></tr>
  <tr><td>Lazy pipeline</td><td>generator expression</td><td>iterator chain (also lazy)</td></tr>
  <tr><td>Materialize</td><td><code>list(gen)</code></td><td><code>.collect()</code> (return type picks the container)</td></tr>
  <tr><td>Reduce</td><td><code>sum(gen)</code>, <code>max(gen)</code>, <code>any(gen)</code></td><td><code>.sum()</code>, <code>.max()</code>, <code>.any(…)</code></td></tr>
  <tr><td>Enumerate / zip</td><td><code>enumerate(xs)</code>, <code>zip(a, b)</code></td><td><code>.enumerate()</code>, <code>.zip(b)</code></td></tr>
</table>
<p>Laziness is more than a performance footnote — it's why the chain style is
idiomatic. Like stacked generator expressions, a five-adapter chain does one
pass over the data with no intermediate lists; the closures are inlined by
the compiler, so this typically beats the hand-written <code>for</code> loop
you'd reach for "to be fast." And because a lazy chain that's never consumed
does nothing at all, Rust warns you about it — the same silent no-op as
building a generator expression and forgetting to iterate it.</p>`,
};
