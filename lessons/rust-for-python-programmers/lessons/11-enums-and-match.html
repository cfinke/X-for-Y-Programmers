const LESSON = {
  number: 11,
  title: "Enums & Pattern Matching",

  intro: `
<p>Python 3.10's <code>match</code>/<code>case</code> with class patterns is
the closest thing Python has to Rust's crown jewel. You already model
"one of several shapes of data" as a <code>Union</code> of dataclasses and
destructure with <code>case Circle(radius=r)</code>. A Rust <code>enum</code>
is that idea as a single first-class type: each variant can carry its own
fields, so <code>Shape::Circle { radius: 1.0 }</code> and
<code>Shape::Rectangle { width: 3.0, height: 4.0 }</code> are two variants of
one type — a union of dataclasses with the union built in.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>Shape = Circle | Rectangle</code> (union of dataclasses)</td><td><code>enum Shape { Circle {…}, Rectangle {…} }</code></td></tr>
  <tr><td><code>Circle(radius=1.0)</code></td><td><code>Shape::Circle { radius: 1.0 }</code></td></tr>
  <tr><td><code>match shape:</code> … <code>case Circle(radius=r):</code></td><td><code>match shape { Shape::Circle { radius } =&gt; … }</code></td></tr>
  <tr><td>Missed a case? Falls through at <em>runtime</em></td><td>Missed a case? <em>Compile error</em></td></tr>
</table>
<p>The payoff is exhaustiveness. In Python, forgetting a <code>case</code>
means <code>match</code> silently matches nothing and your function returns
<code>None</code> — you find out in production, or never. Rust's
<code>match</code> must handle every variant of the enum or the program does
not compile. Add a <code>Triangle</code> variant next month and the compiler
walks you to every <code>match</code> that needs updating. Destructuring
looks just like the class pattern: <code>Shape::Circle { radius }</code>
binds the field to a local, same spirit as
<code>case Circle(radius=r)</code>.</p>`,

  python: `import math
from dataclasses import dataclass

@dataclass
class Circle:
    radius: float

@dataclass
class Rectangle:
    width: float
    height: float

Shape = Circle | Rectangle

def area(shape: Shape) -> float:
    match shape:
        case Circle(radius=r):
            return math.pi * r * r
        case Rectangle(width=w, height=h):
            return w * h
    # Forgot a case? match falls through, you return None.
    # mypy might warn; Python itself never will.`,

  task: `
<p>Model the same shapes as one Rust enum and match on it:</p>
<ol>
  <li>The enum <code>Shape</code> is already complete in the starter, with
      variants <code>Circle { radius: f64 }</code> and
      <code>Rectangle { width: f64, height: f64 }</code> — leave it as is;
      the tests construct values like
      <code>Shape::Circle { radius: 1.0 }</code>.</li>
  <li>Write <code>area(shape: &amp;Shape) -&gt; f64</code> using
      <code>match</code>: a circle's area is
      <code>PI * radius * radius</code> (the starter already imports
      <code>std::f64::consts::PI</code>), a rectangle's is
      <code>width * height</code>. Destructure the fields right in the match
      arm, like <code>case Circle(radius=r)</code>.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `use std::f64::consts::PI;

// One type, two shapes of data — the Union of dataclasses, built in.
// This definition is complete; the tests construct these variants.
enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

// match on the shape and destructure each variant's fields.
// Python: case Circle(radius=r)  ->  Rust: Shape::Circle { radius } => ...
fn area(shape: &Shape) -> f64 {
    todo!()
}
`,

  requirements: [
    { pattern: /enum\s+Shape/, message: "Keep the enum Shape definition" },
    { pattern: /match\b/, message: "Use a match expression in area" },
    { pattern: /Circle\s*\{/, message: "Destructure the Circle variant's fields in a match arm" },
  ],

  tests: [
    { name: "area of Circle { radius: 1.0 } is about PI",
      code: "let s = Shape::Circle { radius: 1.0 };\nassert!((area(&s) - std::f64::consts::PI).abs() < 0.001);" },
    { name: "area of Circle { radius: 2.0 } is about 12.566",
      code: "let s = Shape::Circle { radius: 2.0 };\nassert!((area(&s) - 12.566370).abs() < 0.001);" },
    { name: "area of Rectangle { width: 3.0, height: 4.0 } is 12.0",
      code: "let s = Shape::Rectangle { width: 3.0, height: 4.0 };\nassert_eq!(area(&s), 12.0);" },
    { name: "area of Rectangle { width: 2.5, height: 4.0 } is 10.0",
      code: "let s = Shape::Rectangle { width: 2.5, height: 4.0 };\nassert_eq!(area(&s), 10.0);" },
  ],

  solution: `use std::f64::consts::PI;

enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

fn area(shape: &Shape) -> f64 {
    match shape {
        Shape::Circle { radius } => PI * radius * radius,
        Shape::Rectangle { width, height } => width * height,
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Sum type</td><td><code>Shape = Circle | Rectangle</code> + dataclasses</td><td><code>enum Shape { Circle {…}, Rectangle {…} }</code></td></tr>
  <tr><td>Construct a variant</td><td><code>Circle(radius=1.0)</code></td><td><code>Shape::Circle { radius: 1.0 }</code></td></tr>
  <tr><td>Match &amp; destructure</td><td><code>case Circle(radius=r):</code></td><td><code>Shape::Circle { radius } =&gt; …</code></td></tr>
  <tr><td>Catch-all arm</td><td><code>case _:</code></td><td><code>_ =&gt; …</code></td></tr>
  <tr><td>Missing case</td><td>Silent fall-through at runtime</td><td>Compile error: "non-exhaustive patterns"</td></tr>
</table>
<p>Try deleting the <code>Rectangle</code> arm from your solution and running
the tests: the compiler refuses with "non-exhaustive patterns", naming the
exact variant you missed. That's the habit shift — in Python you write
<code>case _:</code> defensively and hope; in Rust you usually <em>avoid</em>
the catch-all, so that adding a new variant later turns every stale
<code>match</code> in the codebase into a to-do list from the compiler.
You've already met this machinery: <code>Option</code> and <code>Result</code>
from earlier lessons are just enums — <code>Some(x)</code> is a variant
carrying data.</p>`,
};
