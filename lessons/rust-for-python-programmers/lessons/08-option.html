<script>
const LESSON = {
  number: 8,
  title: "Option: The End of Null",

  intro: `
<p>Every Python developer knows the crash:
<code>AttributeError: 'NoneType' object has no attribute 'upper'</code>. A
function returned <code>None</code>, nothing forced you to check, and the
program fell over three calls later. Rust removes the trapdoor: there is no
<code>None</code> that can silently stand in for any value. Absence is its own
type, <code>Option&lt;T&gt;</code>, with exactly two shapes —
<code>Some(x)</code> ("here's your value") and <code>None</code> ("nothing
here") — and the compiler will not let you use the <code>T</code> inside
until you've handled both.</p>
<table>
  <tr><th>Python</th><th>Rust</th></tr>
  <tr><td><code>def find(...) -&gt; str | None:</code></td><td><code>fn find(...) -&gt; Option&lt;String&gt;</code></td></tr>
  <tr><td><code>return name</code> / <code>return None</code></td><td><code>Some(name)</code> / <code>None</code></td></tr>
  <tr><td><code>name or "guest"</code></td><td><code>name.unwrap_or(String::from("guest"))</code></td></tr>
  <tr><td><code>x.upper() if x is not None else None</code></td><td><code>x.map(|s| s.to_uppercase())</code></td></tr>
  <tr><td><code>if x is not None: ... else: ...</code></td><td><code>match x { Some(v) =&gt; ..., None =&gt; ... }</code></td></tr>
</table>
<p>Your existing habits map onto methods. The <code>name or "guest"</code>
default (and <code>d.get(k, default)</code>) is <code>.unwrap_or(default)</code>.
The "do this only if it's not <code>None</code>" dance is <code>.map</code>:
it applies a function to the value inside a <code>Some</code> and passes a
<code>None</code> straight through, untouched. And when you want both arms
spelled out explicitly, <code>match</code> is your
<code>if x is not None / else</code> — except the compiler checks that you
wrote both arms. You've already met <code>Option</code> in the wild:
<code>HashMap::get</code> and <code>Vec::get</code> return one.</p>`,

  python: `def find_user(user_id: int) -> str | None:
    users = {1: "Ada", 2: "Grace"}
    return users.get(user_id)      # None when missing

name = find_user(3)
# print(name.upper())              # AttributeError: 'NoneType' object
#                                  # has no attribute 'upper' — at runtime,
#                                  # far from where None was produced.

if name is not None:               # the dance you do everywhere
    print(name.upper())

def display_name(name: str | None) -> str:
    return name if name is not None else "guest"

def first_char(s: str) -> str | None:
    return s[0] if s else None`,

  task: `
<p>Rewrite the maybe-missing logic with <code>Option</code>:</p>
<ol>
  <li><code>find_user(id: u32) -&gt; Option&lt;String&gt;</code> returns
      <code>Some("Ada")</code> for id <code>1</code>,
      <code>Some("Grace")</code> for id <code>2</code>, and <code>None</code>
      for anything else (a <code>match</code> on <code>id</code> works
      nicely; build the strings with <code>String::from</code>).</li>
  <li><code>display_name(name: Option&lt;String&gt;) -&gt; String</code>
      returns the name if present, otherwise <code>"guest"</code> — one call
      to <code>.unwrap_or</code>, no <code>if</code> needed.</li>
  <li><code>first_char(s: &amp;str) -&gt; Option&lt;char&gt;</code> returns
      the first character, or <code>None</code> for an empty string.
      <code>s.chars().next()</code> already returns exactly that
      <code>Option</code> — no emptiness check required.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. find_user: Some("Ada") for 1, Some("Grace") for 2, None otherwise.
//    Python's str | None return, as a real type.
fn find_user(id: u32) -> Option<String> {
    todo!()
}

// 2. display_name: the name, or "guest" — Python's "x if x is not None
//    else default" is one method: .unwrap_or(...)
fn display_name(name: Option<String>) -> String {
    todo!()
}

// 3. first_char: s.chars().next() is already an Option<char>.
fn first_char(s: &str) -> Option<char> {
    todo!()
}
`,

  requirements: [
    { pattern: /Option</, message: "Work with the Option type" },
    { pattern: /Some\(/, message: "Produce present values with Some(...)" },
    { pattern: /None/, message: "Produce absence with None" },
    { pattern: /unwrap_or/, message: "Use unwrap_or for the default in display_name" },
  ],

  tests: [
    { name: 'find_user(1) is Some("Ada")',
      code: 'assert_eq!(find_user(1), Some(String::from("Ada")));' },
    { name: 'find_user(2) is Some("Grace")',
      code: 'assert_eq!(find_user(2), Some(String::from("Grace")));' },
    { name: "find_user(99) is None",
      code: "assert_eq!(find_user(99), None);" },
    { name: "display_name(Some(...)) returns the name",
      code: 'assert_eq!(display_name(Some(String::from("Linus"))), "Linus");' },
    { name: 'display_name(None) returns "guest"',
      code: 'assert_eq!(display_name(None), "guest");' },
    { name: "first_char works on both empty and non-empty strings",
      code: "assert_eq!(first_char(\"rust\"), Some('r'));\nassert_eq!(first_char(\"\"), None);" },
  ],

  solution: `fn find_user(id: u32) -> Option<String> {
    match id {
        1 => Some(String::from("Ada")),
        2 => Some(String::from("Grace")),
        _ => None,
    }
}

fn display_name(name: Option<String>) -> String {
    name.unwrap_or(String::from("guest"))
}

fn first_char(s: &str) -> Option<char> {
    s.chars().next()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Rust</th></tr>
  <tr><td>Maybe-missing type</td><td><code>str | None</code> (hint only)</td><td><code>Option&lt;String&gt;</code> (compiler-enforced)</td></tr>
  <tr><td>Present / absent</td><td><code>value</code> / <code>None</code></td><td><code>Some(value)</code> / <code>None</code></td></tr>
  <tr><td>Default if missing</td><td><code>x or default</code>, <code>d.get(k, default)</code></td><td><code>x.unwrap_or(default)</code></td></tr>
  <tr><td>Transform if present</td><td><code>f(x) if x is not None else None</code></td><td><code>x.map(f)</code></td></tr>
  <tr><td>Handle both cases</td><td><code>if x is not None: ... else: ...</code></td><td><code>match x { Some(v) =&gt; ..., None =&gt; ... }</code></td></tr>
  <tr><td>"I know it's there"</td><td>just use it (and maybe crash)</td><td><code>x.unwrap()</code> — an explicit, greppable gamble</td></tr>
</table>
<p>The deep difference is <em>where</em> the failure surfaces. Python's
<code>None</code> travels freely and explodes at the point of use, often far
from its origin; Rust's <code>Option&lt;String&gt;</code> is a different type
from <code>String</code>, so forgetting to handle absence is a compile error
at the exact line that forgot. <code>.unwrap()</code> still exists as the "I
accept the crash" escape hatch — but unlike Python, it's a visible, searchable
decision rather than the silent default.</p>`,
};
