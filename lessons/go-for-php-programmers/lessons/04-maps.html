  title: "Maps",

  intro: `
<p>A Go <code>map[K]V</code> is the everyday key/value structure — the rough
equivalent of a PHP associative array, but with static key and value types
baked in. Create one with <code>make(map[K]V)</code> or a literal, then read
and write with <code>m[k]</code>.</p>
<table>
  <tr><th>PHP</th><th>Go</th></tr>
  <tr><td><code>$m = [];</code></td><td><code>m := make(map[string]int)</code></td></tr>
  <tr><td><code>["a" => 1, "b" => 2]</code></td><td><code>map[string]int{"a": 1, "b": 2}</code></td></tr>
  <tr><td><code>$m["a"] = 1;</code></td><td><code>m["a"] = 1</code></td></tr>
  <tr><td><code>$m["a"] ?? 0</code></td><td><code>m["a"]</code> (missing key gives the zero value)</td></tr>
  <tr><td><code>array_key_exists("a", $m)</code></td><td><code>v, ok := m["a"]</code> (comma-ok)</td></tr>
  <tr><td><code>unset($m["a"]);</code></td><td><code>delete(m, "a")</code></td></tr>
</table>
<p>The big difference from PHP is the <em>comma-ok</em> read. Reading a
missing key never throws and never gives <code>null</code> — you get the
value type's zero value (<code>0</code>, <code>""</code>, …). To tell "key is
absent" apart from "key is present with a zero value", use the two-result form
<code>v, ok := m[k]</code>, where <code>ok</code> is a <code>bool</code>. Also
note <code>range</code> over a map visits pairs in <strong>random</strong>
order, so sort the keys yourself when order matters.</p>`,

  php: `function tally(array $words): array {
  $counts = [];
  foreach ($words as $w) {
    $counts[$w] = ($counts[$w] ?? 0) + 1;
  }
  return $counts;
}

// "comma-ok" has no direct equivalent — check membership separately:
$present = array_key_exists("the", $counts);`,

  task: `
<p>Write these package-level functions (no <code>package</code>,

<ol>
  <li><code>Tally(words []string) map[string]int</code> counts how many times

  <li><code>Lookup(m map[string]int, key string) (int, bool)</code> returns the

</ol>`,

  solution: `func Tally(words []string) map[string]int {
	counts := make(map[string]int)
	for _, w := range words {
		counts[w]++
	}
	return counts
}

func Lookup(m map[string]int, key string) (int, bool) {
	v, ok := m[key]
	return v, ok
}

func Keys(m map[string]int) []string {
	keys := make([]string, 0, len(m))
	for k := range m {
		keys = append(keys, k)
	}
	sort.Strings(keys)
	return keys
}

func Remove(m map[string]int, key string) int {
	delete(m, key)
	return len(m)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Go</th></tr>
  <tr><td>Create empty</td><td><code>[]</code></td><td><code>make(map[string]int)</code></td></tr>
  <tr><td>Literal</td><td><code>["a" => 1]</code></td><td><code>map[string]int{"a": 1}</code></td></tr>
  <tr><td>Read missing key</td><td><code>null</code> (with a warning)</td><td>zero value (<code>0</code>, <code>""</code>, …)</td></tr>
  <tr><td>Membership</td><td><code>array_key_exists("a", $m)</code></td><td><code>_, ok := m["a"]</code></td></tr>
  <tr><td>Delete</td><td><code>unset($m["a"])</code></td><td><code>delete(m, "a")</code></td></tr>
  <tr><td>Size</td><td><code>count($m)</code></td><td><code>len(m)</code></td></tr>
  <tr><td>Iterate</td><td>insertion order</td><td><code>range</code> — random order</td></tr>
</table>
<p>Two habits worth internalizing. First, maps are reference types: passing one to
a function and calling <code>delete</code> or assigning a key mutates the
caller's map — unlike a PHP array, which is copied by value when passed to a
function or assigned to another variable. Second, the zero-value read is a
feature, not a footgun — <code>counts[w]++</code> works on a brand-new key
because the missing read yields <code>0</code> first. Just reach for
comma-ok whenever "absent" and "zero" need to be distinguished. Finally, never
rely on <code>range</code> order; Go deliberately randomizes it, so sort keys (or
values) when you need determinism.</p>`,
