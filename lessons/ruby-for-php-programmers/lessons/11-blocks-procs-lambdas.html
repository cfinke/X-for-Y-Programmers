  number: 11,
  title: "Blocks, Procs & Lambdas",

  intro: `
<p>Every PHP closure starts with a negotiation: which variables am I allowed
to see? <code>function ($x) use ($factor) { ... }</code> — forget the
<code>use ($factor)</code> and PHP throws an "undefined variable" warning at
you, because closures capture <em>nothing</em> unless you list it. Ruby's
blocks capture <em>everything</em> in the surrounding scope, automatically.
The explicit-capture ceremony is simply gone.</p>
<p>Blocks are also delivered differently: they ride <em>outside</em> the
parentheses — <code>arr.each { |x| puts x }</code> — and the receiving method
never declares a <code>callable $fn</code> parameter. The block arrives
invisibly, and the method invokes it with <code>yield</code>. It can even ask
whether one was passed at all with <code>block_given?</code>.</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td><code>function ($x) use ($n) { ... }</code></td><td><code>{ |x| ... }</code> — captures everything, no <code>use</code></td></tr>
  <tr><td><code>fn($x) =&gt; $x * 2</code></td><td><code>-&gt;(x) { x * 2 }</code> (a lambda)</td></tr>
  <tr><td><code>$fn(5)</code></td><td><code>fn.call(5)</code> — lambdas need <code>.call</code>, not <code>()</code></td></tr>
  <tr><td><code>function apply(callable $fn, $x)</code></td><td><code>def apply(x)</code> + <code>yield(x)</code> — no parameter</td></tr>
  <tr><td><code>array_map('strtoupper', $arr)</code></td><td><code>arr.map(&amp;:upcase)</code></td></tr>
</table>
<p>When you need a block as a first-class <em>value</em> — to store it, return
it, call it later — you reach for a lambda: <code>-&gt;(x) { x * 2 }</code> is
the sibling of PHP's <code>fn($x) =&gt; $x * 2</code>, except you invoke it
with <code>.call</code>. And for the "just call this one method on each
element" case, <code>&amp;:symbol</code> is the whole story:
<code>words.map(&amp;:upcase)</code> has the same energy as
<code>array_map('strtoupper', $words)</code>, minus the string-as-function
trick.</p>`,

  php: `$factor = 3;

// Capture is opt-in, one variable at a time:
$triple = function ($x) use ($factor) {
    return $x * $factor;
};

// Arrow fns auto-capture, but only hold ONE expression:
$double = fn($x) => $x * 2;
echo $double($triple(5)); // 30

// Higher-order functions declare a callable parameter:
function apply_twice(callable $fn, $x) {
    return $fn($fn($x));
}
echo apply_twice($double, 3); // 12

echo implode(",", array_map('strtoupper', ["hi", "yo"])); // HI,YO`,

  task: `
<p>Rebuild the PHP with blocks and lambdas:</p>
<ol>
  <li><code>apply_twice(x)</code> — takes a block <em>invisibly</em> (no
      parameter for it!) and applies it twice: <code>yield(yield(x))</code>.
      No <code>callable $fn</code> anywhere.</li>
  <li><code>maybe_yield(x)</code> — if a block was passed, return
      <code>yield(x)</code>; otherwise return <code>x</code> unchanged. Probe
      with <code>block_given?</code>.</li>
  <li><code>make_multiplier(n)</code> — return the lambda
      <code>-&gt;(x) { x * n }</code>. This is PHP's
      <code>use ($n)</code> closure with the capture clause deleted:
      <code>n</code> is just <em>there</em>.</li>
  <li><code>shout_all(words)</code> — uppercase every word using the
      <code>&amp;:symbol</code> shorthand: <code>words.map(&amp;:upcase)</code>.</li>
</ol>
<p>Remember: the tests hand your methods blocks in braces, outside the parens
— <code>apply_twice(3) { |v| v * 2 }</code>.</p>`,

  starter: `# 1. apply_twice: no callable parameter — the block arrives invisibly.

end

# 3. make_multiplier: return a lambda ->(x) { ... } that multiplies by n.
#    No use (n) clause exists — n is captured automatically.

  raise NotImplementedError, "TODO: implement make_multiplier"
end

# 4. shout_all: map with the &:symbol shorthand.

  raise NotImplementedError, "TODO: implement shout_all"
end
`,

  requirements: [
    { pattern: /yield/, message: "Call the invisible block with yield" },
    { pattern: /block_given\?/, message: "Probe for a block with block_given? in maybe_yield" },
    { pattern: /->\s*\(/, message: "Build the multiplier as a ->(x) { ... } lambda" },
    { pattern: /&:/, message: "Use the &:symbol shorthand in shout_all" },
  ],

  tests: [
    { name: "apply_twice(3) { |v| v * 2 } returns 12",
      code: "  expect_eq(apply_twice(3) { |v| v * 2 }, 12)" },
    { name: 'apply_twice("a") { |s| s + "!" } returns "a!!"',
      code: '  expect_eq(apply_twice("a") { |s| s + "!" }, "a!!")' },
    { name: "maybe_yield(5) { |v| v + 1 } returns 6",
      code: "  expect_eq(maybe_yield(5) { |v| v + 1 }, 6)" },
    { name: "maybe_yield(5) with no block returns 5 untouched",
      code: "  expect_eq(maybe_yield(5), 5)" },
    { name: "make_multiplier(3).call(4) returns 12 — n was captured for free",
      code: "  triple = make_multiplier(3)\n  expect_eq(triple.call(4), 12)\n  expect_eq(triple.call(10), 30)" },
    { name: 'shout_all(["hi", "there"]) returns ["HI", "THERE"]',
      code: '  expect_eq(shout_all(["hi", "there"]), ["HI", "THERE"])' },
  ],

  solution: `def apply_twice(x)
  yield(yield(x))
end

def maybe_yield(x)
  block_given? ? yield(x) : x
end

def make_multiplier(n)
  ->(x) { x * n }
end

def shout_all(words)
  words.map(&:upcase)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>Anonymous fn</td><td><code>function ($x) use ($n) { ... }</code></td><td><code>{ |x| ... }</code> or <code>do |x| ... end</code></td></tr>
  <tr><td>Capture outer vars</td><td><code>use ($a, $b)</code>, explicit</td><td>automatic — everything in scope</td></tr>
  <tr><td>Arrow / lambda</td><td><code>fn($x) =&gt; $x * 2</code></td><td><code>-&gt;(x) { x * 2 }</code> (multi-line allowed)</td></tr>
  <tr><td>Invoke it</td><td><code>$fn(5)</code></td><td><code>fn.call(5)</code> (or <code>fn.(5)</code>)</td></tr>
  <tr><td>Receive a callback</td><td><code>callable $fn</code> parameter</td><td>invisible block + <code>yield</code></td></tr>
  <tr><td>Was one passed?</td><td>nullable param + <code>!== null</code></td><td><code>block_given?</code></td></tr>
  <tr><td>Method-name shorthand</td><td><code>array_map('strtoupper', $a)</code></td><td><code>a.map(&amp;:upcase)</code></td></tr>
</table>
<p>The deeper shift: in PHP a callback is an <em>argument</em>, so every
higher-order function signature grows a <code>callable</code> slot. In Ruby
the block is a separate channel — every method silently accepts one — which is
why iteration, resource cleanup, and configuration all share the same
<code>method { ... }</code> shape. Lambdas (<code>-&gt;</code>) are for the
minority case where the code needs to be a storable value; blocks handle the
rest.</p>`,
};
