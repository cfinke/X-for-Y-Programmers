const LESSON = {
  number: 9,
  title: "Classes & Objects",

  intro: `
<p>Classes are where PHP and Ruby feel most similar and differ in all the
details. You still write <code>class BankAccount</code>, but the constructor is
named <code>initialize</code> instead of <code>__construct</code>, and Ruby
calls it for you when you write <code>BankAccount.new(...)</code> — note
<code>.new</code>, not the <code>new</code> keyword. Method calls use a dot,
so PHP's <code>$account-&gt;deposit(10)</code> becomes
<code>account.deposit(10)</code>.</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td><code>class BankAccount { }</code></td><td><code>class BankAccount ... end</code></td></tr>
  <tr><td><code>__construct(...)</code></td><td><code>def initialize(...)</code></td></tr>
  <tr><td><code>new BankAccount("Ada")</code></td><td><code>BankAccount.new("Ada")</code></td></tr>
  <tr><td><code>$this-&gt;balance</code></td><td><code>@balance</code> (instance variable)</td></tr>
  <tr><td><code>$account-&gt;deposit(10)</code></td><td><code>account.deposit(10)</code></td></tr>
  <tr><td>promoted <code>public</code> props</td><td><code>attr_reader</code> / <code>attr_accessor</code></td></tr>
</table>
<p>Two differences matter most. First, instance state lives in
<strong>instance variables</strong> prefixed with <code>@</code>:
<code>@balance</code> inside a method is this object's balance. Unlike PHP's
<code>public</code> properties, <code>@balance</code> is genuinely private —
there is no way to reach it from outside the object except through a method you
choose to expose. Second, that exposing is what <code>attr_reader</code> does.
PHP 8's constructor property promotion writes the property <em>and</em> makes it
public in one stroke; Ruby separates the two. You still assign
<code>@balance</code> in <code>initialize</code>, and <code>attr_reader
:owner, :balance</code> <em>generates</em> the reader methods that let the
outside world call <code>account.balance</code>. Use <code>attr_accessor</code>
when you also want a writer (<code>account.balance = 5</code>); use
<code>attr_reader</code> for read-only, as here.</p>`,

  php: `<?php
class BankAccount {
    public int $balance = 0;

    // PHP 8 constructor property promotion: declares AND exposes $owner.
    public function __construct(
        public readonly string $owner,
    ) {}

    public function deposit(int $amount): void {
        $this->balance += $amount;
    }

    public function withdraw(int $amount): bool {
        if ($amount > $this->balance) {
            return false;             // not enough money
        }
        $this->balance -= $amount;
        return true;
    }
}

$acct = new BankAccount("Ada");
$acct->deposit(100);
$acct->withdraw(30);                  // true; balance now 70`,

  task: `
<p>Build a <code>BankAccount</code> class:</p>
<ol>
  <li><code>class BankAccount</code> with <code>attr_reader :owner, :balance</code>
      so both can be read from outside — no hand-written getter methods.</li>
  <li><code>initialize(owner)</code> — store the owner in <code>@owner</code> and
      start the balance at zero: <code>@balance = 0</code>.</li>
  <li><code>deposit(amount)</code> — add <code>amount</code> to
      <code>@balance</code>.</li>
  <li><code>withdraw(amount)</code> — if <code>amount</code> is more than the
      balance, change nothing and return <code>false</code>; otherwise subtract
      it and return <code>true</code>. A rejected withdrawal must leave the
      balance untouched — the tests check it.</li>
</ol>`,

  starter: `class BankAccount
  attr_reader :owner, :balance

  # 2. store the owner in @owner and set @balance to 0.
  def initialize(owner)
    raise NotImplementedError, "TODO: set @owner and @balance"
  end

  # 3. add amount to @balance.
  def deposit(amount)
    raise NotImplementedError, "TODO: implement deposit"
  end

  # 4. reject overdrafts (return false), otherwise subtract and return true.
  def withdraw(amount)
    raise NotImplementedError, "TODO: implement withdraw"
  end
end
`,

  requirements: [
    { pattern: /class\s+BankAccount/, message: "Define class BankAccount" },
    { pattern: /def\s+initialize/, message: "Use initialize as the constructor" },
    { pattern: /attr_reader|attr_accessor/, message: "Expose owner and balance with attr_reader" },
    { pattern: /@balance/, message: "Track state in the @balance instance variable" },
  ],

  tests: [
    { name: "a new account exposes its owner via attr_reader",
      code: "  acct = BankAccount.new(\"Ada\")\n  expect_eq(acct.owner, \"Ada\")" },
    { name: "a new account starts at zero",
      code: "  acct = BankAccount.new(\"Ada\")\n  expect_eq(acct.balance, 0)" },
    { name: "deposit increases the balance",
      code: "  acct = BankAccount.new(\"Ada\")\n  acct.deposit(100)\n  expect_eq(acct.balance, 100)" },
    { name: "a successful withdrawal returns true and reduces the balance",
      code: "  acct = BankAccount.new(\"Ada\")\n  acct.deposit(100)\n  expect_eq(acct.withdraw(40), true)\n  expect_eq(acct.balance, 60)" },
    { name: "an overdraft returns false and leaves the balance untouched",
      code: "  acct = BankAccount.new(\"Ada\")\n  acct.deposit(50)\n  expect_eq(acct.withdraw(80), false)\n  expect_eq(acct.balance, 50)" },
  ],

  solution: `class BankAccount
  attr_reader :owner, :balance

  def initialize(owner)
    @owner = owner
    @balance = 0
  end

  def deposit(amount)
    @balance += amount
  end

  def withdraw(amount)
    if amount > @balance
      false
    else
      @balance -= amount
      true
    end
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>Class</td><td><code>class C { }</code></td><td><code>class C ... end</code></td></tr>
  <tr><td>Constructor</td><td><code>__construct</code></td><td><code>initialize</code></td></tr>
  <tr><td>Instantiate</td><td><code>new C(x)</code></td><td><code>C.new(x)</code></td></tr>
  <tr><td>Instance state</td><td><code>$this-&gt;x</code> (public/private)</td><td><code>@x</code> (always private)</td></tr>
  <tr><td>Method call</td><td><code>$obj-&gt;m()</code></td><td><code>obj.m</code></td></tr>
  <tr><td>Read accessor</td><td>public prop / getter</td><td><code>attr_reader :x</code></td></tr>
  <tr><td>Read + write</td><td>public prop</td><td><code>attr_accessor :x</code></td></tr>
</table>
<p>The mental flip is that Ruby has no public instance variables at all —
<code>@balance</code> can only be touched from inside the object, and every
peek or poke from outside goes through a method. <code>attr_reader</code>,
<code>attr_writer</code>, and <code>attr_accessor</code> are just method
factories that write those trivial accessors for you, so you add them only
where outside access is actually wanted. That is why <code>withdraw</code> can
enforce a rule ("no overdrafts") that no caller can bypass: there is no public
field to reach around the method and set directly.</p>`,
};
