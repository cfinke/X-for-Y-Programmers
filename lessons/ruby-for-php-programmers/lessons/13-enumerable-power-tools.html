const LESSON = {
  number: 13,
  title: "Enumerable Power Tools",

  intro: `
<p>Some collection jobs have no <code>array_*</code> function at all, so in PHP
you write the same accumulator loop over and over: initialize an empty array,
<code>foreach</code>, decide which bucket a value belongs to, append or add. It
works, but it is four lines of bookkeeping for one idea, and the intent is buried
under the machinery.</p>
<p>Ruby's Enumerable turns each of those loops into a single named method.
<code>group_by</code> builds the bucketed hash. <code>tally</code> counts
occurrences (PHP's <code>array_count_values</code>, but for <em>any</em> object,
not just strings and ints). <code>each_with_object(Hash.new(0))</code> carries a
mutable accumulator through the iteration so you can sum into keyed totals without
the <code>??= 0</code> guard. <code>partition</code> splits a list into
matches-and-misses in one pass. And <code>reduce(:+)</code> collapses a list to a
single value by repeatedly applying an operator.</p>
<table>
  <tr><th>The PHP loop</th><th>Ruby one-liner</th></tr>
  <tr><td><code>foreach</code> appending into <code>$buckets[$key][]</code></td><td><code>arr.group_by { |x| ... }</code></td></tr>
  <tr><td><code>array_count_values($arr)</code> (strings/ints only)</td><td><code>arr.tally</code> (any object)</td></tr>
  <tr><td><code>foreach</code> with <code>$totals[$k] ??= 0; $totals[$k] += ...</code></td><td><code>arr.each_with_object(Hash.new(0)) { ... }</code></td></tr>
  <tr><td>two <code>array_filter</code> passes (match / not-match)</td><td><code>arr.partition { |x| ... }</code></td></tr>
  <tr><td><code>array_sum($arr)</code> / <code>array_reduce</code></td><td><code>arr.reduce(:+)</code></td></tr>
</table>
<p>A note on <code>Hash.new(0)</code>: it is a hash whose <em>default value</em>
for any missing key is <code>0</code>, so <code>totals[k] += n</code> just works
on the first touch — no existence check, no <code>??=</code>. That default-value
hash is the secret ingredient behind the tidy <code>each_with_object</code>
accumulator.</p>`,

  php: `$words = ['hi', 'yo', 'cat', 'dog'];

// Group by length — build the buckets by hand:
$by_length = [];
foreach ($words as $w) {
    $by_length[strlen($w)][] = $w;
}

// Count occurrences — array_count_values only handles strings/ints:
$votes = ['yes', 'no', 'yes', 'yes'];
$counts = array_count_values($votes);

// Sum into keyed buckets — the ??= 0 guard is unavoidable:
$totals = [];
foreach ($items as $item) {
    $totals[$item['category']] ??= 0;
    $totals[$item['category']] += $item['amount'];
}

// Split into evens and odds — two passes:
$evens = array_values(array_filter($nums, fn($n) => $n % 2 === 0));
$odds  = array_values(array_filter($nums, fn($n) => $n % 2 !== 0));`,

  task: `
<p>Replace four hand-written PHP loops with four Enumerable methods:</p>
<ol>
  <li><code>word_lengths(words)</code> — group the words by their length with
      <code>group_by(&amp;:length)</code>. Returns a hash of
      <code>length =&gt; [words]</code>.</li>
  <li><code>vote_counts(votes)</code> — count how many times each vote appears
      with <code>tally</code>. Returns a hash of <code>vote =&gt; count</code>.</li>
  <li><code>totals_by_category(items)</code> — sum each item's <code>:amount</code>
      into a per-<code>:category</code> total using
      <code>each_with_object(Hash.new(0))</code>.</li>
  <li><code>split_evens(nums)</code> — split into evens and odds in one pass with
      <code>partition(&amp;:even?)</code>. Returns <code>[evens, odds]</code>.</li>
</ol>`,

  starter: `# 1. word_lengths: group_by the word's length.

  raise NotImplementedError, "TODO: group_by(&:length)"
end

# 2. vote_counts: tally the occurrences of each vote.

  raise NotImplementedError, "TODO: tally the votes"
end

# 3. totals_by_category: each_with_object(Hash.new(0)) to sum amounts per category.
def totals_by_category(items)
  raise NotImplementedError, "TODO: sum :amount into per-:category buckets"
end

# 4. split_evens: partition into [evens, odds].
def split_evens(nums)
  raise NotImplementedError, "TODO: partition(&:even?)"
end
`,

  requirements: [
    { pattern: /group_by/, message: "Bucket the words with group_by" },
    { pattern: /tally/, message: "Count the votes with tally" },
    { pattern: /each_with_object/, message: "Accumulate totals with each_with_object" },
    { pattern: /partition/, message: "Split evens and odds with partition" },
  ],

  tests: [
    { name: 'word_lengths buckets words by their length',
      code: '  expect_eq(word_lengths(["hi", "yo", "cat", "dog", "a"]), {2 => ["hi", "yo"], 3 => ["cat", "dog"], 1 => ["a"]})' },
    { name: 'vote_counts counts each distinct vote',
      code: '  expect_eq(vote_counts(["yes", "no", "yes", "yes"]), {"yes" => 3, "no" => 1})' },
    { name: 'totals_by_category sums amounts per category',
      code: '  items = [{category: "food", amount: 10}, {category: "toys", amount: 5}, {category: "food", amount: 3}]\n  expect_eq(totals_by_category(items), {"food" => 13, "toys" => 5})' },
    { name: 'totals_by_category on an empty list is an empty hash',
      code: '  expect_eq(totals_by_category([]), {})' },
    { name: 'split_evens returns [evens, odds]',
      code: '  expect_eq(split_evens([1, 2, 3, 4, 5, 6]), [[2, 4, 6], [1, 3, 5]])' },
  ],

  solution: `def word_lengths(words)
  words.group_by(&:length)
end

def vote_counts(votes)
  votes.tally
end

def totals_by_category(items)
  items.each_with_object(Hash.new(0)) do |item, totals|
    totals[item[:category]] += item[:amount]
  end
end

def split_evens(nums)
  nums.partition(&:even?)
end
`,

  notes: `
<table>
  <tr><th>Job</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>Bucket by a key</td><td><code>foreach</code> + <code>$b[$k][] = $x</code></td><td><code>a.group_by { |x| ... }</code></td></tr>
  <tr><td>Count occurrences</td><td><code>array_count_values($a)</code></td><td><code>a.tally</code></td></tr>
  <tr><td>Sum into keyed totals</td><td><code>foreach</code> + <code>??= 0</code></td><td><code>a.each_with_object(Hash.new(0)) { ... }</code></td></tr>
  <tr><td>Split match / miss</td><td>two <code>array_filter</code> passes</td><td><code>a.partition { |x| ... }</code></td></tr>
  <tr><td>Collapse to one value</td><td><code>array_reduce($a, $fn, $init)</code></td><td><code>a.reduce(:+)</code> / <code>a.reduce(0) { ... }</code></td></tr>
  <tr><td>Default-valued hash</td><td><code>$h[$k] ?? 0</code> at every read</td><td><code>Hash.new(0)</code> once</td></tr>
</table>
<p>These methods encode the <em>shape</em> of an accumulator loop so you never
re-derive it. When you catch yourself about to write
<code>result = {}; arr.each do |x| ...</code>, stop and ask which power tool
already does it: grouping is <code>group_by</code>, counting is <code>tally</code>,
summing-into-keys is <code>each_with_object(Hash.new(0))</code>, and
splitting-in-two is <code>partition</code>. The loop you were about to write has a
name.</p>`,
};
