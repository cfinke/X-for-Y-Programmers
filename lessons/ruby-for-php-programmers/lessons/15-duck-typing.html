const LESSON = {
  number: 15,
  title: "Duck Typing & respond_to?",

  intro: `
<p>In PHP, "can I call <code>speak()</code> on this?" is a question about
<em>type</em>. You declare an <code>interface Speaker { public function speak(); }</code>,
each class <code>implements Speaker</code>, and you gate behavior with
<code>$x instanceof Speaker</code>. The contract is nominal: an object qualifies
only if its class explicitly signed up.</p>
<p>Ruby doesn't ask what an object <em>is</em>; it asks what it <em>can do</em>.
If an object has a <code>speak</code> method, you call <code>speak</code> — no
<code>implements</code> declaration exists, and no <code>Speaker</code> interface
needs to be defined. This is duck typing: if it walks like a duck and quacks like
a duck, it's a duck. When you need to check before calling, <code>respond_to?</code>
probes at runtime — <code>thing.respond_to?(:speak)</code> — the first-class,
built-in cousin of PHP's <code>method_exists($obj, 'speak')</code>. It answers
the question that actually matters: can I send this message?</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td><code>interface Speaker { ... }</code> + <code>implements</code></td><td>nothing to declare — just define <code>speak</code></td></tr>
  <tr><td><code>$x instanceof Speaker</code></td><td><code>x.respond_to?(:speak)</code> (method presence)</td></tr>
  <tr><td><code>method_exists($obj, 'speak')</code></td><td><code>obj.respond_to?(:speak)</code></td></tr>
  <tr><td><code>$x instanceof Dog</code> (nominal)</td><td><code>x.is_a?(Dog)</code> (nominal, when you truly need it)</td></tr>
</table>
<p><code>is_a?</code> still exists for the rare case you need a genuine
type check — it has the same energy as <code>instanceof</code>. But idiomatic
Ruby leans on <code>respond_to?</code>, because polymorphism here is about
<em>capability</em>, not lineage: a <code>Dog</code> and a <code>Robot</code> that
both define <code>speak</code> are interchangeable to any code that only wants
something speakable, even though they share no base class and implement no common
interface.</p>`,

  php: `interface Speaker {
    public function speak(): string;
}

class Dog implements Speaker {
    public function speak(): string { return "Woof"; }
}

class Robot implements Speaker {
    public function speak(): string { return "Beep"; }
}

class Rock {
    // Does NOT implement Speaker — has no speak().
}

function make_speak(object $thing): string {
    // Gate on capability before calling:
    if (method_exists($thing, 'speak')) {
        return $thing->speak();
    }
    return "...";
}

echo make_speak(new Dog());   // Woof
echo make_speak(new Rock());  // ...`,

  task: `
<p>No interface, no <code>implements</code> — three plain classes and two helper
methods:</p>
<ol>
  <li><code>class Dog</code> — a <code>speak</code> method returning
      <code>"Woof"</code>.</li>
  <li><code>class Robot</code> — a <code>speak</code> method returning
      <code>"Beep"</code>. It shares no base class with <code>Dog</code>; both
      just happen to define <code>speak</code>.</li>
  <li><code>class Rock</code> — no <code>speak</code> method at all.</li>
  <li><code>make_speak(thing)</code> — if <code>thing.respond_to?(:speak)</code>,
      return <code>thing.speak</code>; otherwise return <code>"..."</code>.</li>
  <li><code>all_speakers(things)</code> — from a mixed array, <code>select</code>
      the ones that respond to <code>:speak</code>, then <code>map</code> each to
      its <code>speak</code> result.</li>
</ol>`,

  starter: `# Dog: define speak to return "Woof".
class Dog
  def speak
    raise NotImplementedError, "TODO: return the string Woof"
  end
end

# Robot: define speak to return "Beep". No shared base class with Dog.
class Robot
  def speak
    raise NotImplementedError, "TODO: return the string Beep"
  end
end

# Rock: intentionally has no speak method.
class Rock
end

# make_speak: call speak only if the object responds to it, else "...".
def make_speak(thing)
  raise NotImplementedError, "TODO: respond_to?(:speak) ? thing.speak : ..."
end

# all_speakers: keep the responders, then map to their speak result.
def all_speakers(things)
  raise NotImplementedError, "TODO: select responders, then map(&:speak)"
end
`,

  requirements: [
    { pattern: /respond_to\?/, message: "Probe with respond_to?(:speak) before calling" },
    { pattern: /class\s+Dog/, message: "Define class Dog" },
    { pattern: /class\s+Robot/, message: "Define class Robot" },
    { pattern: /\.speak/, message: "Send the speak message with thing.speak" },
  ],

  tests: [
    { name: 'make_speak(Dog.new) returns "Woof"',
      code: '  expect_eq(make_speak(Dog.new), "Woof")' },
    { name: 'make_speak(Robot.new) returns "Beep"',
      code: '  expect_eq(make_speak(Robot.new), "Beep")' },
    { name: 'make_speak(Rock.new) returns "..." — no speak method',
      code: '  expect_eq(make_speak(Rock.new), "...")' },
    { name: 'Dog and Robot are interchangeable despite no shared interface',
      code: '  expect_true(Dog.new.respond_to?(:speak) && Robot.new.respond_to?(:speak))' },
    { name: 'all_speakers keeps responders and maps to their speech',
      code: '  expect_eq(all_speakers([Dog.new, Rock.new, Robot.new]), ["Woof", "Beep"])' },
    { name: 'all_speakers on all-silent things is empty',
      code: '  expect_eq(all_speakers([Rock.new, Rock.new]), [])' },
  ],

  solution: `class Dog
  def speak
    "Woof"
  end
end

class Robot
  def speak
    "Beep"
  end
end

class Rock
end

def make_speak(thing)
  thing.respond_to?(:speak) ? thing.speak : "..."
end

def all_speakers(things)
  things.select { |t| t.respond_to?(:speak) }.map(&:speak)
end
`,

  notes: `
<table>
  <tr><th>Question</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>Declare a contract</td><td><code>interface Speaker</code> + <code>implements</code></td><td>none — just define the method</td></tr>
  <tr><td>Can I call this method?</td><td><code>method_exists($o, 'm')</code></td><td><code>o.respond_to?(:m)</code></td></tr>
  <tr><td>Does it satisfy a role?</td><td><code>$o instanceof Speaker</code></td><td><code>o.respond_to?(:speak)</code></td></tr>
  <tr><td>Is it exactly this type?</td><td><code>$o instanceof Dog</code></td><td><code>o.is_a?(Dog)</code></td></tr>
  <tr><td>Polymorphism basis</td><td>shared interface / base class</td><td>shared method name (capability)</td></tr>
</table>
<p>The payoff is looser coupling. In PHP a new speakable type must import and
<code>implements</code> your interface; in Ruby it only needs a <code>speak</code>
method, so classes you don't own — and objects from unrelated libraries — slot in
for free. Reach for <code>respond_to?</code> when you want to be forgiving about
what you accept, and reserve <code>is_a?</code> for the moments you genuinely need
to reason about an object's actual class rather than its abilities.</p>`,
};
