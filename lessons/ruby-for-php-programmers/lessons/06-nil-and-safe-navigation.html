  intro: `
<p>PHP's <code>null</code> becomes Ruby's <code>nil</code> — and unlike
<code>null</code>, <code>nil</code> is a real object (an instance of
<code>NilClass</code>) that answers messages: <code>nil.nil?</code> is
<code>true</code>, <code>nil.to_s</code> is <code>""</code>. The tooling
around it maps almost one-to-one: PHP 8's nullsafe <code>?-></code> becomes
Ruby's <code>&amp;.</code> — same idea, different arrow — and the
<code>??</code> default-value habit becomes <code>||</code>.</p>
<table>
  <tr><th>PHP</th><th>Ruby</th></tr>
  <tr><td><code>null</code></td><td><code>nil</code> (a real object)</td></tr>
  <tr><td><code>$user?->address?->city</code></td><td><code>user&amp;.address&amp;.city</code></td></tr>
  <tr><td><code>$hash[$key] ?? $default</code></td><td><code>hash[key] || default</code></td></tr>
  <tr><td><code>$x ??= $default</code></td><td><code>x ||= default</code></td></tr>
  <tr><td><code>isset($x)</code> / <code>is_null($x)</code></td><td><code>!x.nil?</code> / <code>x.nil?</code></td></tr>
  <tr><td><code>array_key_exists($k, $a)</code></td><td><code>hash.key?(k)</code></td></tr>
</table>
<p>Here is the part that will feel like a vacation: in Ruby, <strong>only
<code>nil</code> and <code>false</code> are falsy</strong>. <code>0</code> is
truthy. <code>""</code> is truthy. <code>"0"</code> is truthy. An empty array
is truthy. The entire PHP falsy-string minefield — the reason
<code>?:</code> silently eats a legitimate <code>0</code> and PHP had to grow
<code>??</code> in the first place — simply does not exist. Ruby's
<code>||</code> <em>reads</em> like <code>?:</code> but <em>behaves</em> like
<code>??</code> for stored zeros and empty strings, because those values are
truthy. One operator, no minefield.</p>`,

  php: `class Address {
    public function __construct(public readonly string $city) {}
}

class User {
    public function __construct(public ?Address $address = null) {}
}

function getCity(?User $user): string {
    return $user?->address?->city ?? "Unknown";
}

function pick(array $hash, string $key, $default) {
    // ?? is null-only, so this is safe...
    return $hash[$key] ?? $default;
    // ...but $hash[$key] ?: $default would eat a stored 0 or ""
    // because PHP calls 0, 0.0, "", "0", and [] all falsy.
}

echo getCity(new User(new Address("Lisbon"))); // Lisbon
echo getCity(null);                            // Unknown
echo pick(["retries" => 0], "retries", 5);     // 0`,

  solution: `class Address
  attr_reader :city

  def initialize(city)
    @city = city
  end
end

class User
  attr_reader :address

  def initialize(address = nil)
    @address = address
  end
end

def get_city(user)
  user&.address&.city || "Unknown"
end

def pick(hash, key, default)
  hash[key] || default
end

def first_or_default(arr, default)
  first = arr.first
  first.nil? ? default : first
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>Ruby</th></tr>
  <tr><td>The null value</td><td><code>null</code></td><td><code>nil</code> (an object: <code>NilClass</code>)</td></tr>
  <tr><td>Nullsafe call</td><td><code>$a?->b()?->c()</code></td><td><code>a&amp;.b&amp;.c</code></td></tr>
  <tr><td>Default value</td><td><code>$x ?? $d</code> (null-only) / <code>$x ?: $d</code> (truthiness)</td><td><code>x || d</code> — one operator, no minefield</td></tr>
  <tr><td>Assign if unset</td><td><code>$x ??= $d</code></td><td><code>x ||= d</code></td></tr>
  <tr><td>Is it null?</td><td><code>is_null($x)</code> / <code>$x === null</code></td><td><code>x.nil?</code></td></tr>
  <tr><td>Key present?</td><td><code>array_key_exists($k, $a)</code></td><td><code>hash.key?(k)</code></td></tr>
  <tr><td>What is falsy?</td><td><code>false, 0, 0.0, "", "0", [], null</code>…</td><td><strong>only <code>nil</code> and <code>false</code></strong></td></tr>
</table>
<p>Memorize the last row — it rewires years of PHP defensive habits.
Because <code>0</code>, <code>""</code>, and <code>"0"</code> are truthy,
<code>value || default</code> is safe for almost everything you'd reach for
<code>??</code> in PHP. The one thing <code>||</code> still eats is a stored
<code>false</code> — when a hash might legitimately hold <code>false</code>
(or you must distinguish "missing key" from "stored nil"), reach for
<code>hash.fetch(key, default)</code> or <code>hash.key?(key)</code>
instead.</p>`,
