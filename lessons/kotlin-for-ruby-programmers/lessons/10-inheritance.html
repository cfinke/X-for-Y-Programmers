<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance",

  intro: `
<p>Inheritance in Kotlin looks familiar, but one default is flipped: in
Ruby every class is wide open — you can subclass anything, override any
method, even reopen an existing class later and add or replace methods —
while in Kotlin classes (and their methods) are <strong>final by default</strong>.
To let a class be subclassed you mark it <code>open</code>; to let a subclass
replace a method you mark that method <code>open</code> too. The subclass then
uses <code>override</code> — a keyword Ruby has no equivalent of at all, since
redefining a method there is just... defining it again.</p>
<table>
  <tr><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td><code>class Dog < Animal; end</code></td><td><code>class Dog : Animal() {}</code></td></tr>
  <tr><td><code>class Animal; end</code> (no built-in abstract)</td><td><code>abstract class Animal {}</code></td></tr>
  <tr><td><code>def sound; raise NotImplementedError; end</code></td><td><code>abstract fun sound(): String</code></td></tr>
  <tr><td><code>def sound; ...; end</code> (just redefine it)</td><td><code>override fun sound() { ... }</code></td></tr>
  <tr><td><code>super</code></td><td><code>super.describe()</code></td></tr>
</table>
<p>You call the base constructor right where you name the supertype:
<code>class Dog(name: String) : Animal(name)</code> passes <code>name</code>
straight up — the Ruby equivalent is calling <code>super(name)</code> inside
<code>initialize</code>. An <code>abstract</code> class can't be instantiated
and may declare members with no body (<code>abstract fun</code>), enforced by
the compiler; a subclass must implement them. Ruby has no compiler to enforce
that, so the closest idiom is a base method that just
<code>raise</code>s <code>NotImplementedError</code> if a subclass forgets to
override it. Abstract and open members are the only ones a Kotlin subclass may
override.</p>`,

  ruby: `class Animal
  def initialize(name)
    @name = name
  end

  def sound
    raise NotImplementedError
  end

  def describe
    "#{@name} says #{sound}"
  end
end

class Dog < Animal
  def sound
    "Woof"
  end
end

class Puppy < Dog
  def sound
    "Yip"
  end

  def describe
    "Baby " + super
  end
end`,

  task: `
<p>The <code>Animal</code> base class is provided for you: it takes a
<code>name</code>, declares an <code>abstract fun sound()</code>, and has an
<code>open fun describe()</code>. Build the two subclasses:</p>
<ol>
  <li>Make <code>Dog</code> an <code>open class</code> extending
      <code>Animal(name)</code> (so it passes <code>name</code> to the base
      constructor) and <code>override</code> <code>sound()</code> to return
      <code>"Woof"</code>.</li>
  <li>Make <code>Puppy</code> extend <code>Dog(name)</code>,
      <code>override sound()</code> to return <code>"Yip"</code>, and
      <code>override describe()</code> to return
      <code>"Baby "</code> prepended to <code>super.describe()</code>.</li>
</ol>
<p>Because <code>describe()</code> calls <code>sound()</code>, dynamic dispatch
means a <code>Puppy</code>'s <code>describe()</code> uses the <code>Puppy</code>
sound even when invoked through <code>super</code>.</p>`,

  starter: `abstract class Animal(val name: String) {
    // Subclasses must implement this (no body allowed on an abstract member).
    abstract fun sound(): String

    // 'open' lets subclasses override this; the default just uses sound().
    open fun describe(): String = "$name says \${sound()}"
}

// 1. Dog: an open class so Puppy can extend it. Pass name to Animal(name).
open class Dog(name: String) : Animal(name) {
    override fun sound(): String = "" // TODO: return "Woof"
}

// 2. Puppy: extend Dog(name); override sound() and describe().
class Puppy(name: String) : Dog(name) {
    // TODO: override sound() to return "Yip"
    // TODO: override describe() to return "Baby " + super.describe()
}
`,

  requirements: [
    { pattern: /\bopen\s+class\s+Dog\b/, message: "Declare Dog as an open class so Puppy can extend it" },
    { pattern: /\boverride\s+fun\s+sound\b/, message: "Override sound() in the subclasses" },
    { pattern: /super\.describe\s*\(\s*\)/, message: "Call the base implementation with super.describe()" },
  ],

  tests: [
    { name: 'Dog("Rex").sound() is "Woof"', code: "        expect_eq(Dog(\"Rex\").sound(), \"Woof\")" },
    { name: 'Dog("Rex").describe() is "Rex says Woof"', code: "        expect_eq(Dog(\"Rex\").describe(), \"Rex says Woof\")" },
    { name: 'Puppy("Fido").sound() is "Yip"', code: "        expect_eq(Puppy(\"Fido\").sound(), \"Yip\")" },
    { name: 'Puppy("Fido").describe() is "Baby Fido says Yip"', code: "        expect_eq(Puppy(\"Fido\").describe(), \"Baby Fido says Yip\")" },
    { name: "base-constructor name is inherited", code: "        expect_eq(Puppy(\"Fido\").name, \"Fido\")" },
    { name: "a Puppy is-an Animal", code: "        expect_true(Puppy(\"Fido\") is Animal)" },
  ],

  solution: `abstract class Animal(val name: String) {
    abstract fun sound(): String

    open fun describe(): String = "$name says \${sound()}"
}

open class Dog(name: String) : Animal(name) {
    override fun sound(): String = "Woof"
}

class Puppy(name: String) : Dog(name) {
    override fun sound(): String = "Yip"
    override fun describe(): String = "Baby " + super.describe()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>Subclassable</td><td>every class (default)</td><td><code>open class</code> (opt in)</td></tr>
  <tr><td>Overridable method</td><td>every method (default)</td><td><code>open fun</code> (opt in)</td></tr>
  <tr><td>Override keyword</td><td>none — just redefine the method</td><td><code>override</code> (required)</td></tr>
  <tr><td>Abstract member</td><td><code>raise NotImplementedError</code> (convention, runtime-checked)</td><td><code>abstract fun sound(): String</code></td></tr>
  <tr><td>Base constructor</td><td><code>super(name)</code> in <code>initialize</code></td><td><code>: Animal(name)</code> in header</td></tr>
</table>
<p>The <code>open</code>/<code>final</code> default is the big mindset shift: a
Kotlin class you didn't write is a sealed box unless its author chose to open it,
which makes accidental fragile-base-class bugs much rarer — there's no Kotlin
equivalent of Ruby's monkey-patching, where any class can be reopened from
anywhere and have its methods redefined out from under it. Note that
<code>abstract</code> members are implicitly open — you don't (and can't) write
<code>open abstract fun</code>. To go the other way and stop an inherited method
from being overridden further, mark the override itself <code>final</code>.</p>`,
};
</script>
