const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Kotlin will feel different from Ruby in one big way: everything is
statically typed, though type inference means you rarely write the types out.
The headline difference to internalize is <code>val</code> vs <code>var</code>:
<code>val</code> is a read-only binding (there's no exact Ruby equivalent —
it's closer to freezing a variable name itself, not just the object) and is
the default you should reach for; <code>var</code> is for the rare genuine
reassignment, which in Ruby is just... every local variable.</p>
<table>
  <tr><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td><code>name = "Ada"</code></td><td><code>val name = "Ada"</code></td></tr>
  <tr><td><code>age = 36</code></td><td><code>var age = 36</code></td></tr>
  <tr><td><code>"#{name} is #{age}"</code></td><td><code>"$name is $age"</code></td></tr>
  <tr><td>(no static type)</td><td><code>x: Int</code> / <code>x: Double</code></td></tr>
</table>
<p>The type still goes after the name with a colon, but you rarely write it —
Kotlin infers it from the initializer, so declarations often read almost like
Ruby's bare <code>name = "Ada"</code>. String templates use a bare
<code>$name</code> (or <code>\${expr}</code> for a full expression) instead of
Ruby's <code>#{...}</code>. And every value has a real type at runtime,
reachable via <code>value::class.simpleName</code> — much like Ruby's
<code>value.class.name</code>.</p>`,

  ruby: `age = 36
user_name = "Ada"

def describe(name, age)
  "#{name} is #{age}"
end`,

  task: `
<p>Write the Kotlin version. Kotlin allows top-level declarations — no class or
<code>main</code> needed (those are added for you):</p>
<ol>
  <li>Declare <code>userName</code> with <code>val</code> = <code>"Ada"</code>
      and <code>userAge</code> with <code>var</code> = <code>36</code>.</li>
  <li>Write <code>describe(name: String, age: Int): String</code> that returns a
      string like <code>"Ada is 36"</code> using a string template.</li>
  <li>Write <code>typeName(value: Any): String</code> that returns the value's
      runtime type name — use <code>value::class.simpleName ?: "?"</code>.</li>
</ol>`,

  starter: `// 1. userName (val) and userAge (var) — replace the placeholder values
val userName = "" // TODO
var userAge = 0    // TODO


// 2. describe(name, age) -> "<name> is <age>"
fun describe(name: String, age: Int): String {
    return "" // TODO
}

// 3. typeName(value) -> the runtime type name, e.g. "Int"
fun typeName(value: Any): String {
    return "" // TODO
}
`,

  requirements: [
    { pattern: /\bval\s+userName/, message: "Declare userName with val" },
    { pattern: /\bvar\s+userAge/, message: "Declare userAge with var" },
    { pattern: /"\$name is \$age"/, message: "Build the string with a template: \"$name is $age\"" },
  ],

  tests: [
    { name: 'userName is "Ada"', code: "        expect_eq(userName, \"Ada\")" },
    { name: "userAge is 36", code: "        expect_eq(userAge, 36)" },
    { name: 'describe("Ada", 36) is "Ada is 36"', code: "        expect_eq(describe(\"Ada\", 36), \"Ada is 36\")" },
    { name: 'describe("Rob", 68) is "Rob is 68"', code: "        expect_eq(describe(\"Rob\", 68), \"Rob is 68\")" },
    { name: 'typeName(1) is "Int"', code: "        expect_eq(typeName(1), \"Int\")" },
    { name: 'typeName("a") is "String"', code: "        expect_eq(typeName(\"a\"), \"String\")" },
    { name: 'typeName(true) is "Boolean"', code: "        expect_eq(typeName(true), \"Boolean\")" },
  ],

  solution: `val userName = "Ada"
var userAge = 36

fun describe(name: String, age: Int): String {
    return "$name is $age"
}

fun typeName(value: Any): String {
    return value::class.simpleName ?: "?"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>Read-only binding</td><td>(no direct equivalent; <code>x = 1</code>)</td><td><code>val x = 1</code></td></tr>
  <tr><td>Reassignable</td><td><code>x = 1</code></td><td><code>var x = 1</code></td></tr>
  <tr><td>Explicit type</td><td>(not applicable)</td><td><code>val x: Int = 1</code></td></tr>
  <tr><td>Template</td><td><code>"#{x}"</code></td><td><code>"$x"</code> / <code>"\${x.foo}"</code></td></tr>
  <tr><td>Runtime type</td><td><code>x.class</code></td><td><code>x::class.simpleName</code></td></tr>
</table>
<p>Kotlin splits what Ruby just calls <code>Integer</code> and <code>Float</code>
into <code>Int</code>, <code>Long</code>, <code>Double</code>, and friends, and
it will not silently mix them — <code>1 / 2</code> is <code>0</code> (integer
division), while <code>1.0 / 2</code> is <code>0.5</code> (Ruby's
<code>1 / 2</code> is also <code>0</code>, so that part will feel familiar).
Prefer <code>val</code> everywhere you can; the compiler will tell you the
moment you actually need <code>var</code>.</p>`,
};
