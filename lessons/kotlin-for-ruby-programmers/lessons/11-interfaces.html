const LESSON = {
  number: 11,
  title: "Interfaces",

  intro: `
<p>Kotlin interfaces will feel like a new tool if you're coming from Ruby,
which has no dedicated interface construct at all. Ruby relies on
<strong>duck typing</strong> — any object that responds to the right methods
works, with nothing declared up front — and on <strong>modules</strong> mixed
into a class with <code>include</code> when you want to share real method
bodies across classes. A Kotlin interface is closer to that second idea: it's
a real, named type you opt into with a colon, and it can carry
<strong>default method bodies</strong> and <strong>property getters</strong>,
much like a Ruby module's instance methods — except Kotlin checks the
contract at compile time instead of leaving it to whatever happens to respond
at call time.</p>
<table>
  <tr><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>no declaration — <code>def area; …; end</code> is enough</td><td><code>interface Shape { fun area(): Double }</code></td></tr>
  <tr><td>duck typing: works if it responds to the method</td><td>nominal: <code>class C : Shape</code></td></tr>
  <tr><td><code>attr_reader :name</code> in a module</td><td><code>val name: String</code> (abstract)</td></tr>
  <tr><td>method body in a <code>module</code></td><td><code>fun f() = …</code> right in the interface</td></tr>
  <tr><td><code>include A; include B</code></td><td><code>class C : A, B</code></td></tr>
</table>
<p>Because a Kotlin interface can hold behaviour, you can declare an abstract
<code>val</code>, a <code>val</code> with a default <code>get()</code>, and a
<code>fun</code> with a default body all in one place — then have each class
<code>override</code> only what it needs. And, much as Ruby's duck typing
pushes you to depend only on the methods you actually call, in Kotlin you
should <strong>program to the interface type</strong>: type your parameters
and variables as <code>Employee</code>, not <code>Engineer</code> — the
compiler just enforces the discipline that duck typing leaves to convention.</p>`,

  ruby: `module Employee
  # Ruby modules can hold logic, so total_pay/summary live right here;
  # name, base_salary, and bonus are just expected to be defined by
  # whatever class includes this module — nothing declares them.
  def total_pay
    base_salary + bonus
  end

  def summary
    "#{name} earns #{total_pay}"
  end
end

class Engineer
  include Employee
  attr_reader :name, :base_salary

  def initialize(name, base_salary)
    @name = name
    @base_salary = base_salary
  end

  def bonus
    base_salary * 0.1
  end
end

def total_payroll(staff)
  staff.reduce(0) { |sum, e| sum + e.base_salary + e.bonus }
end`,

  task: `
<p>Build a small payroll model where the logic lives <em>in the interface</em>,
and the tests talk to everything through the interface type. No class or
<code>main</code> is needed — Kotlin allows top-level declarations.</p>
<ol>
  <li>Declare an <code>Employee</code> interface with two abstract properties
      <code>name: String</code> and <code>baseSalary: Double</code>, and an
      abstract method <code>fun bonus(): Double</code>.</li>
  <li>Give <code>Employee</code> a property <code>totalPay: Double</code> with a
      <strong>default getter</strong> returning
      <code>baseSalary + bonus()</code>, and a <strong>default method</strong>
      <code>fun summary(): String</code> returning
      <code>"$name earns $totalPay"</code>.</li>
  <li>Declare a second interface <code>Manager</code> with
      <code>fun teamSize(): Int</code>.</li>
  <li><code>class Engineer(name, baseSalary) : Employee</code> whose
      <code>bonus()</code> is 10% of <code>baseSalary</code>.</li>
  <li><code>class TeamLead(name, baseSalary, reports) : Employee, Manager</code>
      — <strong>implementing both interfaces</strong> — whose <code>bonus()</code>
      is <code>baseSalary * 0.2 + reports * 100.0</code> and whose
      <code>teamSize()</code> returns <code>reports</code>.</li>
  <li>Write <code>totalPayroll(staff: List&lt;Employee&gt;): Double</code> that
      sums <code>totalPay</code> across the list — programming to the interface.</li>
</ol>`,

  starter: `// 1 & 2. The Employee interface: abstract members, a default property getter,
//        and a default method. Fill in the two defaults.
interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = 0.0            // TODO: baseSalary + bonus()

    fun summary(): String = "" // TODO: "$name earns $totalPay"
}

// 3. A second interface.
interface Manager {
    fun teamSize(): Int
}

// 4. Engineer implements Employee.
class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = 0.0 // TODO: 10% of baseSalary
}

// 5. TeamLead implements BOTH Employee and Manager.
class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = 0.0 // TODO: baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = 0   // TODO: reports
}

// 6. Program to the interface type.
fun totalPayroll(staff: List<Employee>): Double = 0.0 // TODO
`,

  requirements: [
    { pattern: /interface\s+Employee\b/, message: "Declare an Employee interface" },
    { pattern: /fun\s+summary\s*\([^)]*\)\s*:\s*String\s*=/, message: "Give Employee a default summary() method with a body in the interface" },
    { pattern: /:\s*Employee\s*,\s*Manager/, message: "Have TeamLead implement both Employee and Manager" },
  ],

  tests: [
    { name: "Engineer.bonus() is 10% of base", code: "        expect_eq(Engineer(\"Ada\", 1000.0).bonus(), 100.0)" },
    { name: "totalPay via the Employee type uses the default getter", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.totalPay, 1100.0)" },
    { name: "default summary() reads \"Ada earns 1100.0\"", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.summary(), \"Ada earns 1100.0\")" },
    { name: "TeamLead satisfies Manager (teamSize)", code: "        val m: Manager = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(m.teamSize(), 3)" },
    { name: "TeamLead is also an Employee (totalPay)", code: "        val emp: Employee = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(emp.totalPay, 2700.0)" },
    { name: "totalPayroll sums via the interface", code: "        val staff: List<Employee> = listOf(Engineer(\"Ada\", 1000.0), TeamLead(\"Rob\", 2000.0, 3))\n        expect_eq(totalPayroll(staff), 3800.0)" },
  ],

  solution: `interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = baseSalary + bonus()

    fun summary(): String = "$name earns $totalPay"
}

interface Manager {
    fun teamSize(): Int
}

class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = baseSalary * 0.1
}

class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = reports
}

fun totalPayroll(staff: List<Employee>): Double = staff.sumOf { it.totalPay }
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>Declare interface</td><td>no declaration (duck typing), or <code>module E; …; end</code></td><td><code>interface E { … }</code></td></tr>
  <tr><td>Implement</td><td><code>include E</code> (or nothing, just duck-type it)</td><td><code>class C : E</code></td></tr>
  <tr><td>Multiple interfaces</td><td><code>include A; include B</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Abstract property</td><td><code>attr_reader :name</code> (unenforced)</td><td><code>val name: String</code></td></tr>
  <tr><td>Property with logic</td><td><code>def name; …; end</code> in a module</td><td><code>val p: T get() = …</code></td></tr>
  <tr><td>Default method body</td><td><code>def f; …; end</code> in a module</td><td><code>fun f() = …</code> in the interface</td></tr>
  <tr><td>Override</td><td>just redefine the method</td><td><code>override</code> keyword required</td></tr>
</table>
<p>The big shift from Ruby is that conformance is <strong>nominal</strong>:
a class only satisfies <code>Employee</code> if it says <code>: Employee</code>.
Ruby's duck typing never checks this at all — a class "satisfies" <code>Employee</code>
simply by happening to respond to <code>name</code>, <code>baseSalary</code>, and
<code>bonus</code>, with no declaration and nothing enforced until you call a missing
method at runtime. In exchange for that nominal contract you get real behaviour in the
interface — a default <code>get()</code> or <code>fun</code> body — so shared logic
lives with the contract instead of being copied into every class or reimplemented per
object, much as a Ruby module already does when you <code>include</code> it. Kotlin
also requires the <code>override</code> keyword, which catches typos Ruby would
silently accept as a brand-new method. When a class implements two interfaces that
both define the same default method, Kotlin makes you resolve it explicitly with
<code>super&lt;A&gt;.f()</code> — where Ruby's mixins would silently pick whichever
included module comes first in the ancestor chain (its method resolution order).</p>`,
};
