  title: "Sealed Classes",

  intro: `
<p>In Ruby there's no built-in way to say "one of a fixed set of types" — you
just define plain classes and use <code>case</code>/<code>when</code> (which
calls <code>===</code>, i.e. <code>Circle === shape</code>, under the hood) to
branch on the runtime class. Nothing stops someone from defining a fourth
subclass in another file, and nothing checks that your <code>case</code>
handles every one. Kotlin's equivalent is a <strong>sealed
class</strong> (or <strong>sealed interface</strong>): a type whose subclasses
are all known at compile time because they must live in the same file/module.</p>
<table>
  <tr><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>plain classes, no shared marker</td><td><code>sealed class Shape</code></td></tr>
  <tr><td><code>class Circle; ...; end</code></td><td><code>class Circle : Shape()</code></td></tr>
  <tr><td><code>case shape when Circle</code></td><td><code>when (s) { is Circle -&gt; ... }</code></td></tr>
  <tr><td>runtime check <code>shape.is_a?(Circle)</code></td><td>type check <code>is Circle</code></td></tr>
</table>
<p>The payoff is <em>exhaustiveness</em>. Because the compiler knows the complete
list of subtypes, a <code>when</code> that covers them all needs <strong>no
<code>else</code> branch</strong> — and if you later add a fourth subclass, every
<code>when</code> used as an expression stops compiling until you handle it. It is
the same safety you'd get from disciplined <code>else raise "unhandled shape"</code>
guards on every Ruby <code>case</code>, except the compiler enforces it instead of
you having to remember to write it.</p>`,

  ruby: `class Circle
  attr_reader :radius
  def initialize(radius) = @radius = radius
end

class Rectangle
  attr_reader :width, :height
  def initialize(width, height) = (@width, @height = width, height)
end

class Triangle
  attr_reader :base, :height
  def initialize(base, height) = (@base, @height = base, height)
end

def area(shape)
  case shape
  when Circle then Math::PI * shape.radius**2
  when Rectangle then shape.width * shape.height
  when Triangle then 0.5 * shape.base * shape.height
  end
end`,

  solution: `import kotlin.math.PI

sealed class Shape
class Circle(val radius: Double) : Shape()
class Rectangle(val width: Double, val height: Double) : Shape()
class Triangle(val base: Double, val height: Double) : Shape()

fun area(shape: Shape): Double = when (shape) {
    is Circle -> PI * shape.radius * shape.radius
    is Rectangle -> shape.width * shape.height
    is Triangle -> 0.5 * shape.base * shape.height
}

fun name(shape: Shape): String = when (shape) {
    is Circle -> "circle"
    is Rectangle -> "rectangle"
    is Triangle -> "triangle"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Kotlin</th></tr>
  <tr><td>Closed set of types</td><td>no built-in support — plain classes</td><td><code>sealed class</code> / <code>sealed interface</code></td></tr>
  <tr><td>Variant</td><td><code>class Circle; ...; end</code></td><td><code>class Circle(...) : Shape()</code></td></tr>
  <tr><td>Match</td><td><code>case shape when Circle</code></td><td><code>when (s) { is Circle -&gt; }</code></td></tr>
  <tr><td>Narrowing</td><td>not needed — duck typed</td><td>smart cast after <code>is</code></td></tr>
  <tr><td>Exhaustiveness</td><td>none — you write the <code>else</code>/<code>raise</code> yourself</td><td>built in — no <code>else</code></td></tr>
</table>
<p>A <code>when</code> used as an <em>expression</em> (as here, on the right of
<code>=</code>) is checked for exhaustiveness; a <code>when</code> used only as a
statement is not, so prefer the expression form to get the safety. The same
pattern models a <code>Result</code>: <code>sealed class Result&lt;out T&gt;</code>
with <code>class Ok&lt;T&gt;(val value: T)</code> and
<code>class Err(val message: String)</code>, then <code>when</code> over it.
Variants that carry no data can be <code>object</code> singletons (e.g.
<code>object Loading : Result&lt;Nothing&gt;()</code>) instead of classes.</p>`,
