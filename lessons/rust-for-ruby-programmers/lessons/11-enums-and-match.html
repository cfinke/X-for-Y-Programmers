<div id="app"></div>
<script>
const LESSON = {
  number: 11,
  title: "Enums & Pattern Matching",

  intro: `
<p>Ruby 3's <code>case/in</code> pattern matching probably changed how you
model data: instead of a class hierarchy, you pass around tagged hashes like
<code>{ type: :circle, radius: 1.0 }</code> and destructure them with
<code>in { type: :circle, radius: }</code>. It's elegant — right up until
someone passes <code>{ type: :triangle, ... }</code> and you get a
<code>NoMatchingPatternError</code> <em>at runtime</em>, in production, at
3am. The tag is a convention, not a guarantee.</p>
<table>
  <tr><th>Ruby</th><th>Rust</th></tr>
  <tr><td><code>{ type: :circle, radius: 1.0 }</code></td><td><code>Shape::Circle { radius: 1.0 }</code></td></tr>
  <tr><td><code>case shape ... in { type: :circle, radius: }</code></td><td><code>match shape { Shape::Circle { radius } =&gt; ... }</code></td></tr>
  <tr><td>Missed variant → <code>NoMatchingPatternError</code> at <strong>runtime</strong></td><td>Missed variant → error at <strong>compile time</strong></td></tr>
  <tr><td>Any hash can claim any <code>type:</code></td><td>Only the variants the <code>enum</code> declares exist</td></tr>
</table>
<p>A Rust <code>enum</code> is that tagged-hash idiom <em>formalized</em>:
<code>enum Shape { Circle { radius: f64 }, Rectangle { width: f64, height: f64 } }</code>
declares the complete, closed set of shapes that can ever exist, and each
variant carries exactly the fields it needs. <code>match</code> destructures
just like <code>case/in</code> — same feel, same named-field binding — but
the compiler checks <em>exhaustiveness</em>: leave out
<code>Rectangle</code> and the code doesn't compile. The 3am pattern-miss
becomes a red squiggle before you even run the tests.</p>`,

  ruby: `def area(shape)
  case shape
  in { type: :circle, radius: }
    Math::PI * radius ** 2
  in { type: :rectangle, width:, height: }
    width * height
  end
end

puts area({ type: :circle, radius: 1.0 })
# => 3.141592653589793

puts area({ type: :rectangle, width: 3.0, height: 4.0 })
# => 12.0

# Nothing stops a caller inventing a new tag:
# area({ type: :triangle, base: 3, height: 4 })
# => NoMatchingPatternKeyError — at RUNTIME`,

  task: `
<p>Formalize the tagged hash as an enum, and rewrite <code>area</code> as a
<code>match</code>:</p>
<ol>
  <li>Define <code>enum Shape</code> with two struct-like variants:
      <code>Circle { radius: f64 }</code> and
      <code>Rectangle { width: f64, height: f64 }</code>. (The starter already
      has this — the tests construct <code>Shape::Circle { radius: 1.0 }</code>
      directly, so leave the definition intact.)</li>
  <li>Write <code>area(shape: &amp;Shape) -&gt; f64</code> using
      <code>match</code>: a circle's area is π·r²
      (use <code>std::f64::consts::PI</code>), a rectangle's is
      width × height. Destructure the fields in the match arms, exactly like
      <code>in { type: :circle, radius: }</code>.</li>
  <li>Try commenting out the <code>Rectangle</code> arm and running — watch
      the compiler refuse, where Ruby would have waited for runtime.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your function
directly.</p>`,

  starter: `// The tagged hash { type: :circle, radius: 1.0 }, formalized.
// The tests construct these variants directly — keep the definition as-is.
enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

// area: match on the shape, destructure the fields in each arm.
//   Shape::Circle { radius } => ...   (like: in { type: :circle, radius: })
// Circle area is std::f64::consts::PI * radius * radius.
fn area(shape: &Shape) -> f64 {
    todo!()
}
`,

  requirements: [
    { pattern: /enum\s+Shape/, message: "Define enum Shape" },
    { pattern: /match\b/, message: "Use match to handle each variant" },
    { pattern: /Circle\s*\{/, message: "Use the struct-like Circle { radius } variant" },
  ],

  tests: [
    { name: "area of Circle { radius: 1.0 } is π",
      code: "let a = area(&Shape::Circle { radius: 1.0 });\nassert!((a - std::f64::consts::PI).abs() < 0.001, \"expected about 3.14159, got {}\", a);" },
    { name: "area of Circle { radius: 2.0 } is about 12.566",
      code: "let a = area(&Shape::Circle { radius: 2.0 });\nassert!((a - 12.566370614359172).abs() < 0.001, \"expected about 12.566, got {}\", a);" },
    { name: "area of Rectangle { width: 3.0, height: 4.0 } is exactly 12.0",
      code: "assert_eq!(area(&Shape::Rectangle { width: 3.0, height: 4.0 }), 12.0);" },
    { name: "area of Rectangle { width: 2.5, height: 4.0 } is exactly 10.0",
      code: "assert_eq!(area(&Shape::Rectangle { width: 2.5, height: 4.0 }), 10.0);" },
  ],

  solution: `enum Shape {
    Circle { radius: f64 },
    Rectangle { width: f64, height: f64 },
}

fn area(shape: &Shape) -> f64 {
    match shape {
        Shape::Circle { radius } => std::f64::consts::PI * radius * radius,
        Shape::Rectangle { width, height } => width * height,
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Rust</th></tr>
  <tr><td>Tagged data</td><td><code>{ type: :circle, radius: 1.0 }</code></td><td><code>Shape::Circle { radius: 1.0 }</code></td></tr>
  <tr><td>Declaring the set of tags</td><td>convention only</td><td><code>enum Shape { Circle {...}, Rectangle {...} }</code></td></tr>
  <tr><td>Branch on the tag</td><td><code>case shape ... in ...</code></td><td><code>match shape { ... =&gt; ... }</code></td></tr>
  <tr><td>Destructure fields</td><td><code>in { type: :circle, radius: }</code></td><td><code>Shape::Circle { radius } =&gt;</code></td></tr>
  <tr><td>Missed case</td><td><code>NoMatchingPatternError</code> at runtime</td><td>compile error: "non-exhaustive patterns"</td></tr>
  <tr><td>Catch-all arm</td><td><code>else</code></td><td><code>_ =&gt; ...</code></td></tr>
</table>
<p>The exhaustiveness check is the whole point, and it compounds: add a
<code>Triangle</code> variant next month and the compiler lists <em>every</em>
<code>match</code> in the codebase that needs a new arm — a complete, free
refactoring todo-list. In Ruby you'd grep for <code>:circle</code> and hope.
You've already been using enums, by the way: <code>Option</code> is just
<code>enum Option&lt;T&gt; { Some(T), None }</code>, and <code>Result</code>
is <code>enum Result&lt;T, E&gt; { Ok(T), Err(E) }</code> — the same machinery
you're building here.</p>`,
};
</script>
