const LESSON = {
  number: 16,
  title: "Lifetimes: An Introduction",

  intro: `
<p>Here's a question Ruby's garbage collector never makes you ask: if a
method returns a reference into <em>someone else's</em> data, how long is
that reference valid? In Ruby the answer is "forever, more or less" — as
long as you hold a reference, the GC keeps the object alive. Rust has no
GC. Borrows (<code>&amp;str</code>, <code>&amp;Vec&lt;T&gt;</code>…) point
into data owned elsewhere, and the compiler must <em>prove</em> the owner
outlives every borrow. Usually it figures that out silently. But a
function like <code>longest(a, b)</code> that takes two string references
and returns one of them is genuinely ambiguous: is the returned reference
tied to <code>a</code>'s owner, or <code>b</code>'s?</p>
<table>
  <tr><th>Ruby</th><th>Rust</th></tr>
  <tr><td>GC keeps anything referenced alive</td><td>Compiler proves the owner outlives every borrow</td></tr>
  <tr><td><code>def longest(a, b)</code> — no question to answer</td><td><code>fn longest&lt;'a&gt;(a: &amp;'a str, b: &amp;'a str) -&gt; &amp;'a str</code></td></tr>
  <tr><td>Dangling references are impossible (GC)</td><td>Dangling references are impossible (compile error)</td></tr>
  <tr><td>Nothing to annotate</td><td>Usually inferred (<em>elision</em>); written only when ambiguous</td></tr>
</table>
<p><code>&lt;'a&gt;</code> is a <em>lifetime parameter</em> — a name for
the answer. Reading <code>fn longest&lt;'a&gt;(a: &amp;'a str, b: &amp;'a str)
-&gt; &amp;'a str</code> out loud: "for some span of time called
<code>'a</code>, both inputs live at least that long, and the returned
reference is valid for that same span." You aren't <em>choosing</em> how
long anything lives — you're describing a relationship the compiler then
enforces at every call site. And most of the time you write nothing at
all: a function with one reference in and one reference out, like
<code>first_word</code>, is unambiguous, so the compiler fills the
lifetime in for you. That's called elision, and it's why you've written
fifteen lessons of Rust without ever seeing a <code>'a</code>.</p>`,

  ruby: `def longest(a, b)
  a.length >= b.length ? a : b
end

def first_word(s)
  s.split.first || ""
end

winner = longest("raspberry", "kiwi")
# Ruby never asks how long "winner" stays valid:
# the GC keeps the winning string alive as long
# as anything points at it.

word = first_word("hello there world")
puts winner  # "raspberry"
puts word    # "hello"`,

  task: `
<p>Two borrowing functions — one where the lifetime must be written, one
where elision handles it:</p>
<ol>
  <li><code>longest</code> takes <code>a: &amp;'a str</code> and
      <code>b: &amp;'a str</code> and returns <code>&amp;'a str</code> —
      whichever is longer by <code>.len()</code> (return <code>a</code> on a
      tie). Two reference parameters, one reference out: the compiler can't
      guess which input the result borrows from, so you declare
      <code>&lt;'a&gt;</code> after the function name and tag all three
      references with it.</li>
  <li><code>first_word</code> takes <code>s: &amp;str</code> and returns
      <code>&amp;str</code>: the first whitespace-separated word, or
      <code>""</code> if there is none. Use
      <code>s.split_whitespace().next().unwrap_or("")</code>. One reference
      in, one out — elision applies, so write <em>no</em> lifetime
      annotation at all.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// 1. longest: two borrowed strings in, one borrowed string out.
//    Ambiguous — so name the lifetime: fn longest<'a>(...) -> &'a str
//    Return whichever is longer by .len(); return a on a tie.
fn longest<'a>(a: &'a str, b: &'a str) -> &'a str {
    todo!()
}

// 2. first_word: one reference in, one out — elision fills in the
//    lifetime, so no <'a> needed anywhere.
//    Hint: s.split_whitespace().next().unwrap_or("")
fn first_word(s: &str) -> &str {
    todo!()
}
`,

  requirements: [
    { pattern: /<'a>/, message: "Declare a lifetime parameter <'a> on longest" },
    { pattern: /&'a\s+str/, message: "Tag longest's references with the lifetime: &'a str" },
  ],

  tests: [
    { name: 'longest("raspberry", "kiwi") returns "raspberry"',
      code: 'assert_eq!(longest("raspberry", "kiwi"), "raspberry");' },
    { name: 'longest("ox", "gazelle") returns "gazelle"',
      code: 'assert_eq!(longest("ox", "gazelle"), "gazelle");' },
    { name: 'first_word("hello there world") returns "hello"',
      code: 'assert_eq!(first_word("hello there world"), "hello");' },
    { name: 'first_word("  leading spaces") returns "leading"',
      code: 'assert_eq!(first_word("  leading spaces"), "leading");' },
    { name: 'first_word("") returns ""',
      code: 'assert_eq!(first_word(""), "");' },
  ],

  solution: `fn longest<'a>(a: &'a str, b: &'a str) -> &'a str {
    if a.len() >= b.len() {
        a
    } else {
        b
    }
}

fn first_word(s: &str) -> &str {
    s.split_whitespace().next().unwrap_or("")
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Rust</th></tr>
  <tr><td>How long is a reference valid?</td><td>As long as you hold it (GC)</td><td>As long as the owner lives — compiler-checked</td></tr>
  <tr><td>Naming that span</td><td>(no such concept)</td><td><code>&lt;'a&gt;</code> — a lifetime parameter</td></tr>
  <tr><td>Return a borrow of an input</td><td><code>def longest(a, b)</code>, nothing to say</td><td><code>fn longest&lt;'a&gt;(a: &amp;'a str, b: &amp;'a str) -&gt; &amp;'a str</code></td></tr>
  <tr><td>One reference in, one out</td><td>—</td><td>Elision: compiler infers it, write nothing</td></tr>
  <tr><td>Dangling reference</td><td>Impossible at runtime</td><td>Impossible at compile time</td></tr>
</table>
<p>A lifetime annotation never changes what your code does — it changes
what the compiler will <em>let callers do</em>. It's documentation the
compiler enforces, exactly like a type. And the honest advice for a Ruby
programmer: don't go looking for places to write <code>'a</code>. Write
code without annotations, and when rustc says "missing lifetime specifier,"
it will usually tell you exactly what to add. Elision covers the vast
majority of real functions; <code>longest</code>-shaped signatures — two
borrows in, one borrow out — are the main place you'll ever type it.</p>`,
};
