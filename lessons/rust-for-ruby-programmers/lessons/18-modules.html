const LESSON = {
  number: 18,
  title: "Modules & Visibility",

  intro: `
<p>Ruby's <code>module</code> wears two hats: it's a namespace
(<code>Inventory.item_count</code>) <em>and</em> a mixin
(<code>include Enumerable</code>). Rust splits the job. Namespacing belongs
to <code>mod</code>; the mixin role — sharing behavior across types — you
already met in the traits lesson. So a Rust <code>mod</code> is the simpler
half of what you know: a named box of functions, types, and other mods,
addressed with <code>::</code> instead of <code>.</code>.</p>
<table>
  <tr><th>Ruby</th><th>Rust</th></tr>
  <tr><td><code>module Inventory ... end</code></td><td><code>mod inventory { ... }</code></td></tr>
  <tr><td><code>Inventory.item_count(items)</code></td><td><code>inventory::item_count(&amp;items)</code></td></tr>
  <tr><td>Everything public unless <code>private</code></td><td>Everything private unless <code>pub</code></td></tr>
  <tr><td><code>obj.send(:secret)</code> sneaks past privacy</td><td>No <code>send</code> — private means the call doesn't compile</td></tr>
  <tr><td><code>include Inventory</code> (mixin: copies methods in)</td><td><code>use inventory::item_count;</code> (just shortens the path)</td></tr>
</table>
<p>Two defaults flip. First, privacy: in Ruby everything is public unless
you say <code>private</code>, and even then <code>send</code> lets anyone
through. In Rust everything is <em>private</em> unless you mark it
<code>pub</code>, and there is no back door — calling a private function
from outside the module is a compile error, full stop. Second,
<code>use</code>: it looks like <code>include</code> but does far less. It
never copies methods into anything; it only shortens a path, letting you
write <code>item_count(...)</code> instead of
<code>inventory::item_count(...)</code>. The full path always works with no
<code>use</code> at all.</p>`,

  ruby: `module Inventory
  def self.item_count(items)
    items.length
  end

  def self.describe(items)
    "#{item_count(items)} items: #{list_names(items)}"
  end

  def self.list_names(items)
    items.join(", ")
  end
  private_class_method :list_names
end

Inventory.describe(["hammer", "nails"])
# => "2 items: hammer, nails"

Inventory.send(:list_names, ["saw"])
# Ruby privacy is a suggestion — send walks right past it.`,

  task: `
<p>Build an <code>inventory</code> module with a real privacy boundary:</p>
<ol>
  <li>Define <code>mod inventory { ... }</code> containing everything
      below. The tests live <em>outside</em> the module and call
      <code>inventory::item_count(...)</code>, so anything they touch needs
      <code>pub</code>.</li>
  <li><code>pub fn item_count(items: &amp;Vec&lt;String&gt;) -&gt; usize</code>
      — how many items (<code>.len()</code>).</li>
  <li><code>pub fn describe(items: &amp;Vec&lt;String&gt;) -&gt; String</code>
      — a summary like <code>"2 items: hammer, nails"</code>: the count,
      the literal <code>" items: "</code>, then the names joined with
      <code>", "</code>.</li>
  <li>Build the joined-names part in a <em>private</em> helper
      <code>fn list_names(items: &amp;Vec&lt;String&gt;) -&gt; String</code>
      (no <code>pub</code> — use <code>items.join(", ")</code>) and call it
      from <code>describe</code>. Inside the module, private siblings are
      callable directly; outside, <code>inventory::list_names</code> won't
      even compile.</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// A module is a named box. Private by default: the tests outside can
// only reach what you mark pub.
mod inventory {
    // pub: callable from outside as inventory::item_count(...)
    pub fn item_count(items: &Vec<String>) -> usize {
        todo!()
    }

    // pub: "2 items: hammer, nails" — count + " items: " + joined names.
    pub fn describe(items: &Vec<String>) -> String {
        todo!()
    }

    // NO pub: a private helper. describe can call it; the tests cannot.
    fn list_names(items: &Vec<String>) -> String {
        todo!()
    }
}
`,

  requirements: [
    { pattern: /mod\s+inventory/, message: "Define the module with mod inventory { ... }" },
    { pattern: /pub\s+fn/, message: "Mark the functions the tests call as pub fn" },
    { pattern: /fn\s+list_names/, message: "Keep the private list_names helper inside the module" },
  ],

  tests: [
    { name: 'inventory::item_count of ["hammer", "nails"] returns 2',
      code: 'let items = vec![String::from("hammer"), String::from("nails")];\nassert_eq!(inventory::item_count(&items), 2);' },
    { name: "inventory::item_count of an empty Vec returns 0",
      code: "let items: Vec<String> = Vec::new();\nassert_eq!(inventory::item_count(&items), 0);" },
    { name: 'inventory::describe of ["hammer", "nails"] returns "2 items: hammer, nails"',
      code: 'let items = vec![String::from("hammer"), String::from("nails")];\nassert_eq!(inventory::describe(&items), "2 items: hammer, nails");' },
    { name: 'inventory::describe of ["saw"] returns "1 items: saw"',
      code: 'let items = vec![String::from("saw")];\nassert_eq!(inventory::describe(&items), "1 items: saw");' },
  ],

  solution: `mod inventory {
    pub fn item_count(items: &Vec<String>) -> usize {
        items.len()
    }

    pub fn describe(items: &Vec<String>) -> String {
        format!("{} items: {}", item_count(items), list_names(items))
    }

    fn list_names(items: &Vec<String>) -> String {
        items.join(", ")
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Rust</th></tr>
  <tr><td>Namespace</td><td><code>module Inventory ... end</code></td><td><code>mod inventory { ... }</code></td></tr>
  <tr><td>Path separator</td><td><code>Inventory.item_count</code> / <code>Inventory::CONST</code></td><td><code>inventory::item_count</code> (always <code>::</code>)</td></tr>
  <tr><td>Visibility default</td><td>public; opt out with <code>private</code></td><td>private; opt in with <code>pub</code></td></tr>
  <tr><td>Bypass privacy</td><td><code>send(:list_names)</code></td><td>impossible — it's a compile error</td></tr>
  <tr><td>Shorten a name</td><td>(constants resolve lexically)</td><td><code>use inventory::describe;</code></td></tr>
  <tr><td>Mixins</td><td>also <code>module</code> + <code>include</code></td><td>not <code>mod</code>'s job — that's traits</td></tr>
</table>
<p>The flipped default is the philosophical heart of this lesson. Ruby
trusts callers and makes privacy advisory — every method is API unless
documentation says otherwise, and <code>send</code> means even that's
negotiable. Rust makes the boundary structural: <code>pub</code> is a
deliberate, greppable declaration of "this is my interface," and everything
else can be renamed, rewritten, or deleted with total confidence that no
caller depends on it — the compiler already proved nobody could. In larger
projects the same keywords scale up: each file becomes a module
automatically, and <code>pub</code> draws the API lines between them.</p>`,
};
