const LESSON = {
  number: 14,
  title: "Closures & Iterators",

  intro: `
<p>This is the lesson where your Ruby instincts transfer most directly. The
Enumerable style you think in — chain <code>select</code>, <code>map</code>,
<code>sum</code> over a collection instead of writing loops — <em>is</em>
idiomatic Rust. Even the block syntax survives: Ruby's
<code>{ |p| p.price }</code> becomes the closure <code>|p| p.price</code>.
Same pipes, same "little anonymous function that captures its surroundings."</p>
<table>
  <tr><th>Ruby</th><th>Rust</th></tr>
  <tr><td><code>products.select { |p| p.in_stock }</code></td><td><code>products.iter().filter(|p| p.in_stock)</code></td></tr>
  <tr><td><code>.map { |p| p.name }</code></td><td><code>.map(|p| p.name.clone())</code></td></tr>
  <tr><td><code>.sum(&amp;:price_cents)</code></td><td><code>.map(|p| p.price_cents).sum()</code></td></tr>
  <tr><td>returns a new Array automatically</td><td><code>.collect()</code> materializes the result</td></tr>
  <tr><td>eager (each step builds an array); <code>.lazy</code> opts out</td><td>lazy always — and free</td></tr>
</table>
<p>Two mechanical differences. You start a chain explicitly with
<code>.iter()</code> (borrow the elements) and end it explicitly with
<code>.collect()</code> (build the output collection) — Ruby does both
implicitly. And the chain is <strong>lazy</strong>: <code>filter</code> and
<code>map</code> build a recipe, nothing runs until <code>.collect()</code> or
<code>.sum()</code> consumes it. That's Ruby's <code>.lazy</code>, except it's
the default and costs nothing — the compiler fuses the chain into a single
loop as fast as hand-written imperative code. No intermediate arrays,
ever.</p>`,

  ruby: `Product = Struct.new(:name, :price_cents, :in_stock)

products = [
  Product.new("Mug", 900, true),
  Product.new("Desk", 25_000, false),
  Product.new("Pen", 150, true)
]

in_stock_names = products.select(&:in_stock).map(&:name)
# => ["Mug", "Pen"]

total_value = products.select(&:in_stock).sum(&:price_cents)
# => 1050

evens_doubled = [1, 2, 3, 4, 5].select(&:even?).map { |n| n * 2 }
# => [4, 8]`,

  task: `
<p>Rewrite the three Enumerable chains as iterator chains over the
<code>Product</code> struct (already defined in the starter — the tests
construct it directly, so keep it as-is):</p>
<ol>
  <li><code>in_stock_names(products: &amp;[Product]) -&gt; Vec&lt;String&gt;</code> —
      the names of in-stock products, in order:
      <code>.iter().filter(...).map(...).collect()</code>. Inside
      <code>map</code>, clone the name (<code>p.name.clone()</code>) — you
      only borrowed the products, but the caller gets owned Strings.</li>
  <li><code>total_value(products: &amp;[Product]) -&gt; u32</code> — the sum
      of <code>price_cents</code> over the <em>in-stock</em> products.
      <code>filter</code>, <code>map</code> to the price, then
      <code>.sum()</code> — a consumer, so no <code>collect</code> needed.</li>
  <li><code>evens_doubled(numbers: &amp;[i32]) -&gt; Vec&lt;i32&gt;</code> —
      keep the even numbers (<code>n % 2 == 0</code>), double them. Ruby's
      <code>select(&amp;:even?).map { |n| n * 2 }</code>, pipes and all.
      (Tip: iterating <code>&amp;[i32]</code> gives <code>&amp;i32</code> —
      dereference with <code>*n</code> when you do the math.)</li>
</ol>
<p>Don't write <code>fn main</code> — the lesson's tests call your functions
directly.</p>`,

  starter: `// Struct.new(:name, :price_cents, :in_stock), formalized.

    name: String,
    price_cents: u32,
    in_stock: bool,
}

// 1. products.select(&:in_stock).map(&:name)
//    -> .iter().filter(|p| ...).map(|p| p.name.clone()).collect()

    todo!()
}

// 2. products.select(&:in_stock).sum(&:price_cents)
//    -> filter, map to the price, .sum() — the consumer replaces collect.
fn total_value(products: &[Product]) -> u32 {
    todo!()
}

// 3. numbers.select(&:even?).map { |n| n * 2 } — same pipes: |n| n * 2
fn evens_doubled(numbers: &[i32]) -> Vec<i32> {
    todo!()
}
`,

  requirements: [
    { pattern: /\.iter\(\)/, message: "Start your chains explicitly with .iter()" },
    { pattern: /\.filter\(/, message: "Use .filter(...) — Ruby's select" },
    { pattern: /\.map\(/, message: "Use .map(...) with a |p| closure" },
    { pattern: /\.collect/, message: "Materialize a Vec with .collect()" },
  ],

  tests: [
    { name: 'in_stock_names returns ["Mug", "Pen"] for the sample catalog',
      code: 'let products = vec![\n    Product { name: String::from("Mug"), price_cents: 900, in_stock: true },\n    Product { name: String::from("Desk"), price_cents: 25000, in_stock: false },\n    Product { name: String::from("Pen"), price_cents: 150, in_stock: true },\n];\nassert_eq!(in_stock_names(&products), vec!["Mug", "Pen"]);' },
    { name: "in_stock_names returns an empty Vec when nothing is in stock",
      code: 'let products = vec![\n    Product { name: String::from("Desk"), price_cents: 25000, in_stock: false },\n];\nassert_eq!(in_stock_names(&products), Vec::<String>::new());' },
    { name: "total_value sums the in-stock prices: 900 + 150 = 1050",
      code: 'let products = vec![\n    Product { name: String::from("Mug"), price_cents: 900, in_stock: true },\n    Product { name: String::from("Desk"), price_cents: 25000, in_stock: false },\n    Product { name: String::from("Pen"), price_cents: 150, in_stock: true },\n];\nassert_eq!(total_value(&products), 1050);' },
    { name: "total_value of an empty slice is 0",
      code: "assert_eq!(total_value(&[]), 0);" },
    { name: "evens_doubled(&[1, 2, 3, 4, 5]) returns [4, 8]",
      code: "assert_eq!(evens_doubled(&[1, 2, 3, 4, 5]), vec![4, 8]);" },
    { name: "evens_doubled(&[1, 3, 5]) returns an empty Vec",
      code: "assert_eq!(evens_doubled(&[1, 3, 5]), Vec::<i32>::new());" },
  ],

  solution: `struct Product {
    name: String,
    price_cents: u32,
    in_stock: bool,
}

fn in_stock_names(products: &[Product]) -> Vec<String> {
    products
        .iter()
        .filter(|p| p.in_stock)
        .map(|p| p.name.clone())
        .collect()
}

fn total_value(products: &[Product]) -> u32 {
    products
        .iter()
        .filter(|p| p.in_stock)
        .map(|p| p.price_cents)
        .sum()
}

fn evens_doubled(numbers: &[i32]) -> Vec<i32> {
    numbers
        .iter()
        .filter(|n| *n % 2 == 0)
        .map(|n| n * 2)
        .collect()
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Rust</th></tr>
  <tr><td>Block / closure</td><td><code>{ |p| p.price }</code></td><td><code>|p| p.price</code> (same pipes!)</td></tr>
  <tr><td>Keep matching</td><td><code>.select { ... }</code></td><td><code>.filter(|p| ...)</code></td></tr>
  <tr><td>Transform</td><td><code>.map { ... }</code></td><td><code>.map(|p| ...)</code></td></tr>
  <tr><td>Sum</td><td><code>.sum(&amp;:price)</code></td><td><code>.map(|p| p.price).sum()</code></td></tr>
  <tr><td>Start the chain</td><td>implicit</td><td><code>.iter()</code></td></tr>
  <tr><td>Build the result</td><td>implicit new Array</td><td><code>.collect()</code></td></tr>
  <tr><td>Laziness</td><td>opt-in with <code>.lazy</code></td><td>always — adapters do nothing until consumed</td></tr>
</table>
<p>The taxonomy worth internalizing: <code>filter</code> and <code>map</code>
are <em>adapters</em> — they wrap the iterator in a new lazy iterator;
<code>collect</code>, <code>sum</code>, <code>count</code>, and
<code>any</code> are <em>consumers</em> — they drive the loop and produce a
value. A chain with no consumer does literally nothing (the compiler warns:
"iterators are lazy and do nothing unless consumed"). Nearly all of
Enumerable is here under light aliases — <code>find</code>,
<code>all?</code>/<code>any?</code> → <code>all</code>/<code>any</code>,
<code>reduce</code> → <code>fold</code>, <code>first(3)</code> →
<code>take(3)</code> — and it all comes from the <code>Iterator</code> trait's
default methods, the Comparable trick from Lesson 12 at scale.</p>`,
};
