  intro: `
<p>Time to put it together. This capstone is a tiny in-memory <em>task store</em>
that leans on almost everything this course has covered: a <strong>class</strong>
to hold state and behavior, <strong>array-iteration methods</strong>
(<code>find</code>, <code>filter</code>, <code>reduce</code>) to query and
aggregate, and <strong>custom errors</strong> to refuse bad input. Nothing here
is unfamiliar — you have written all of it in Python, just with different names.
The point is to feel how it behaves in JavaScript once the object is built from
list/dict operations instead of Python's list comprehensions and dataclasses, and
the only thing standing between a caller and a corrupt store is the code
<em>you</em> wrote.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>@dataclass class Task: id: int; done: bool</code></td><td>a plain object shaped however you build it</td></tr>
  <tr><td><code>tasks: list[Task]</code></td><td><code>this.tasks = []</code> — holds anything you push</td></tr>
  <tr><td><code>next((t for t in tasks if t.id == id), None)</code></td><td><code>this.tasks.find((t) => t.id === id)</code></td></tr>
  <tr><td><code>[t for t in tasks if not t.done]</code></td><td><code>this.tasks.filter((t) => !t.done)</code></td></tr>
</table>
<p>In Python, <code>next(...)</code> (or a dict lookup) hands back the item or
<code>None</code> if nothing matched, and you are used to checking for
<code>None</code> before using the result. JavaScript's <code>find</code> works
the same way, just with <code>undefined</code> standing in for <code>None</code>:
it hands back a task or <code>undefined</code>, and if you forget to check, the
very next property access throws a <code>TypeError</code> — JavaScript's
equivalent of Python's <code>AttributeError: 'NoneType' object has no attribute</code>.
The discipline is the same one you already practice: <em>make the miss
explicit</em> — detect it and <code>raise</code>/<code>throw</code> a meaningful
error instead of letting a cryptic one leak out later.</p>`,

  python: `class NotFoundError(Exception):
    pass

class ValidationError(Exception):
    pass

class Task:
    def __init__(self, id, title, priority, done):
        self.id = id
        self.title = title
        self.priority = priority
        self.done = done

class TaskStore:
    def __init__(self):
        self.tasks = []
        self.next_id = 1

    def add(self, title, priority=1):
        if title.strip() == "":
            raise ValidationError("title required")
        task = Task(self.next_id, title, priority, False)
        self.next_id += 1
        self.tasks.append(task)
        return task

    def get(self, id):
        task = next((t for t in self.tasks if t.id == id), None)
        if task is None:
            raise NotFoundError(f"no task {id}")
        return task

    def complete(self, id):
        task = self.get(id)
        task.done = True
        return task

    def pending(self):
        return [t for t in self.tasks if not t.done]

    def summary(self):
        total = len(self.tasks)
        done = sum(1 for t in self.tasks if t.done)
        return {"total": total, "done": done, "pending": total - done}`,

  solution: `class ValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = "ValidationError";
  }
}

class NotFoundError extends Error {
  constructor(message) {
    super(message);
    this.name = "NotFoundError";
  }
}

class TaskStore {
  constructor() {
    this.tasks = [];
    this.nextId = 1;
  }

  add(title, priority = 1) {
    if (typeof title !== "string" || title.trim() === "") {
      throw new ValidationError("title must be a non-empty string");
    }
    const task = { id: this.nextId++, title, priority, done: false };
    this.tasks.push(task);
    return task;
  }

  get(id) {
    const task = this.tasks.find((t) => t.id === id);
    if (!task) {
      throw new NotFoundError("no task with id " + id);
    }
    return task;
  }

  complete(id) {
    const task = this.get(id);
    task.done = true;
    return task;
  }

  pending() {
    return this.tasks.filter((t) => !t.done);
  }

  summary() {
    return this.tasks.reduce(
      (acc, t) => {
        acc.total += 1;
        if (t.done) acc.done += 1;
        else acc.pending += 1;
        return acc;
      },
      { total: 0, done: 0, pending: 0 }
    );
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript</th></tr>
  <tr><td>Task shape</td><td><code>@dataclass</code> or plain class</td><td>whatever object you construct</td></tr>
  <tr><td>Bad input</td><td>rejected only if you <code>raise</code></td><td>rejected only if you <code>throw</code></td></tr>
  <tr><td>Missing lookup</td><td><code>next(..., None)</code> returns <code>None</code> silently</td><td><code>find</code> returns <code>undefined</code> silently</td></tr>
  <tr><td>Aggregate</td><td>a loop, comprehension, or <code>functools.reduce</code></td><td><code>reduce</code> with a seed object</td></tr>
</table>
<p>The lesson of the whole course lives in one line: <code>this.tasks.find(...)</code>
returns a task <em>or</em> <code>undefined</code>, and the runtime will not stop
you from reading <code>.done</code> off <code>undefined</code> — the same trap as
calling a method on a Python <code>None</code>. The <code>if (!task) throw</code>
guard is exactly the <code>if task is None: raise</code> check you already write
by habit in Python; JavaScript just never had an optional-type checker urging you
to add it, so the habit has to be deliberate.</p>
<p>Two other habits carried through here. Custom <code>Error</code> subclasses,
like Python's custom <code>Exception</code> subclasses, let callers tell
<em>why</em> something failed with <code>instanceof</code> (Python's
<code>isinstance</code>) instead of string-matching messages — but only because
each constructor sets <code>this.name</code>. And the array methods
(<code>find</code>, <code>filter</code>, <code>reduce</code>) stayed the
workhorses: they read the same as a Python generator expression or list
comprehension, they just no longer promise anything about what the elements are.
That promise is now your job.</p>`,
