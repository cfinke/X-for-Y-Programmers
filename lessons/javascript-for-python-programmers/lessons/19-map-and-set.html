const LESSON = {
  number: 19,
  title: "Map & Set",

  intro: `
<p>Python already gives you <code>dict</code> and <code>set</code> as
first-class mapping and uniqueness types, so <code>Map</code> and <code>Set</code>
in JavaScript will feel familiar in spirit — they are separate built-in classes
that fill the same roles a plain object literal cannot quite cover. The syntax
is different, but the runtime behaviour lines up closely with what you already
know.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>d = {}</code></td><td><code>new Map()</code></td></tr>
  <tr><td><code>s = set()</code></td><td><code>new Set()</code></td></tr>
  <tr><td>keys must be hashable</td><td><em>any</em> value can be a key, hashable or not</td></tr>
  <tr><td><code>d.get(k)</code> returns <code>None</code> if absent</td><td><code>map.get(k)</code>, <code>undefined</code> if absent</td></tr>
</table>
<p>Two runtime facts matter most. First, a <code>Map</code> key can be
<em>anything</em> — an object, a function, <code>NaN</code> — the same way
Python lets you use tuples or custom objects as dict keys, except JavaScript
never asks for a <code>__hash__</code>: plain identity is enough. Second, a
<code>Map</code> remembers insertion order and reports its <code>size</code>
directly, exactly like a modern Python <code>dict</code> with <code>len()</code>
— no surprises there. A <code>Set</code> is the same story for uniqueness:
membership is O(1) and duplicates simply do not take, just like a Python
<code>set</code>.</p>`,

  python: `counts = {}
counts["go"] = counts.get("go", 0) + 1

seen = set()
seen.add(1)
seen.add(1)  # no-op
len(seen)  # 1`,

  task: `
<p>Build a few small utilities on top of <code>Map</code> and <code>Set</code>:</p>
<ol>
  <li><code>wordCount(text)</code> — split <code>text</code> on whitespace and
      return a <code>Map</code> from each word to how many times it appears.
      Assume words are already lowercased and clean; an empty string yields an
      empty Map.</li>
  <li><code>unique(arr)</code> — return a new array with duplicates removed,
      preserving first-seen order, using a <code>Set</code>.</li>
  <li><code>mostCommon(text)</code> — return the word with the highest count from
      <code>wordCount</code> (first one to reach that count wins on ties), or
      <code>null</code> for empty input.</li>
  <li><code>keyTypes(map)</code> — return a <code>Set</code> of the
      <code>typeof</code> string for every key in <code>map</code>
      (demonstrating that Map keys need not be strings).</li>
</ol>`,

  starter: `// 1. wordCount(text) -> Map<word, count>
function wordCount(text) {
  // TODO
  return new Map();
}

// 2. unique(arr) -> array with duplicates removed, order preserved
function unique(arr) {
  // TODO
  return [];
}

// 3. mostCommon(text) -> the most frequent word, or null if none
function mostCommon(text) {
  // TODO
  return null;
}

// 4. keyTypes(map) -> Set of typeof for each key
function keyTypes(map) {
  // TODO
  return new Set();
}
`,

  exportNames: ["wordCount", "unique", "mostCommon", "keyTypes"],

  requirements: [
    { pattern: /new\s+Map/, message: "Use a Map in wordCount" },
    { pattern: /new\s+Set/, message: "Use a Set in unique or keyTypes" },
    { pattern: /\.set\s*\(/, message: "Use Map.set to record counts" },
  ],

  tests: [
    {
      name: "wordCount counts repeats",
      run: (x) => {
        const m = x.wordCount("go go stop go");
        expectEqual(m.get("go"), 3);
        expectEqual(m.get("stop"), 1);
        expectEqual(m.size, 2);
      },
    },
    {
      name: "wordCount('') is an empty Map",
      run: (x) => {
        const m = x.wordCount("");
        expectEqual(m.size, 0);
        expectEqual(m.get("anything"), undefined);
      },
    },
    {
      name: "unique preserves first-seen order",
      run: (x) => expectDeepEqual(x.unique([3, 1, 3, 2, 1, 2]), [3, 1, 2]),
    },
    {
      name: "unique keeps distinct objects distinct",
      run: (x) => {
        const a = {}, b = {};
        expectEqual(x.unique([a, a, b]).length, 2);
      },
    },
    {
      name: "mostCommon picks the top word",
      run: (x) => expectEqual(x.mostCommon("a b a c a b"), "a"),
    },
    {
      name: "mostCommon('') is null",
      run: (x) => expectEqual(x.mostCommon(""), null),
    },
    {
      name: "keyTypes reports mixed key types",
      run: (x) => {
        const m = new Map();
        m.set("s", 1);
        m.set(42, 2);
        m.set({}, 3);
        const types = x.keyTypes(m);
        expectTruthy(types.has("string"));
        expectTruthy(types.has("number"));
        expectTruthy(types.has("object"));
        expectEqual(types.size, 3);
      },
    },
  ],

  solution: `function wordCount(text) {
  const counts = new Map();
  const words = text.split(/\\s+/).filter((w) => w.length > 0);
  for (const word of words) {
    counts.set(word, (counts.get(word) ?? 0) + 1);
  }
  return counts;
}

function unique(arr) {
  const seen = new Set();
  const out = [];
  for (const item of arr) {
    if (!seen.has(item)) {
      seen.add(item);
      out.push(item);
    }
  }
  return out;
}

function mostCommon(text) {
  const counts = wordCount(text);
  let best = null;
  let bestCount = 0;
  for (const [word, count] of counts) {
    if (count > bestCount) {
      best = word;
      bestCount = count;
    }
  }
  return best;
}

function keyTypes(map) {
  const types = new Set();
  for (const key of map.keys()) {
    types.add(typeof key);
  }
  return types;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript Map / Set</th></tr>
  <tr><td>Any-typed keys</td><td>keys must be hashable</td><td><code>map.set(obj, v)</code> works for any value, no hashing needed</td></tr>
  <tr><td>Size</td><td><code>len(d)</code> / <code>len(s)</code></td><td><code>map.size</code> / <code>set.size</code></td></tr>
  <tr><td>Membership</td><td><code>k in d</code> / <code>v in s</code></td><td><code>map.has(k)</code> / <code>set.has(v)</code></td></tr>
  <tr><td>Iteration order</td><td>insertion order (3.7+)</td><td>strict insertion order</td></tr>
  <tr><td>Dedupe</td><td><code>list(dict.fromkeys(arr))</code></td><td><code>[...new Set(arr)]</code></td></tr>
</table>
<p>A <code>Map</code> uses SameValueZero for key equality, so <code>NaN</code>
works as a key (unlike <code>===</code>) but <code>{}</code> and a different
<code>{}</code> are distinct keys because objects compare by identity. Python
dicts behave the same way for plain custom objects — two separate instances are
different keys unless <code>__eq__</code>/<code>__hash__</code> say otherwise.
That is exactly why <code>unique([{}, {}])</code> keeps both — the Set sees two
different references.</p>
<p>Prefer <code>Map</code> over a plain object when keys are dynamic, non-string,
or you care about size and order; prefer <code>Set</code> over an array when you
need fast membership or dedupe — much like reaching for a Python <code>dict</code>
or <code>set</code> instead of a list for the same reasons. Reach back for objects
and arrays when you want JSON serialization or a fixed, known shape —
<code>JSON.stringify</code> ignores Map and Set contents entirely, just as
Python's <code>json.dumps</code> refuses to serialize a raw <code>set</code>
either.</p>`,
};
