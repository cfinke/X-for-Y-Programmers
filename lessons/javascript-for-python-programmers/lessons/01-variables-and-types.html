<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>Python and JavaScript are both dynamically typed under the hood: a name is
just bound to a value, and nothing about the name itself constrains what it
can point to next. If you've ever written a hint like <code>age: int = 36</code>
and watched Python run right past a later <code>age = "thirty-six"</code>
without complaint, you already understand the JavaScript mindset — type hints
(in Python) and annotations (in TypeScript) are the exception; plain, unchecked
assignment is the norm. Start with the smallest change: drop the hint syntax
and lean on <code>const</code> and <code>let</code> instead.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>age = 36</code></td><td><code>let age = 36;</code></td></tr>
  <tr><td><code>name = "Ada"</code></td><td><code>const name = "Ada";</code></td></tr>
  <tr><td>no true constants (convention: <code>NAME = "Ada"</code>)</td><td><code>const</code> — reassignment is a runtime error</td></tr>
</table>
<p>The difference that matters is enforcement. Python has no built-in way to
stop <code>x = 1; x = "one"</code> — a <code>const</code>-like guarantee
doesn't exist as language syntax, only as a naming convention nobody enforces.
JavaScript does enforce it: reach for <code>const</code> by default and
rebinding the name becomes a real <code>TypeError</code>. Two habits carry you
a long way: prefer <code>const</code> over <code>let</code>, and use the
<code>typeof</code> operator when you genuinely need to know what you are
holding — the JavaScript analogue of Python's <code>type()</code>.</p>`,

  python: `age: int = 36
user_name: str = "Ada"

# The hint is advisory: mypy would complain, but Python
# itself happily runs this line.
# age = "thirty-six"

def describe(name: str, age: int) -> str:
    return f"{name} is {age}"`,

  task: `
<p>Write the JavaScript version of the same code:</p>
<ol>
  <li>Declare a constant <code>userName</code> = <code>"Ada"</code> and a
      variable <code>userAge</code> = <code>36</code> — no type hints,
      and use <code>let</code> for <code>userAge</code>.</li>
  <li>Write <code>describe(name, age)</code> that returns a string like
      <code>"Ada is 36"</code> using a template literal — the JavaScript
      equivalent of Python's f-string.</li>
  <li>Write <code>typeOf(value)</code> that returns the JavaScript
      <code>typeof</code> string for whatever it is given, the way Python's
      <code>type(value)</code> would tell you the class.</li>
</ol>`,

  starter: `// 1. userName (const) and userAge (let) — no annotations


// 2. describe(name, age) -> "<name> is <age>"
function describe(name, age) {
  // TODO
  return "";
}

// 3. typeOf(value) -> the typeof string, e.g. "number"
function typeOf(value) {
  // TODO
  return "";
}
`,

  exportNames: ["userName", "userAge", "describe", "typeOf"],

  requirements: [
    { pattern: /const\s+userName/, message: "Declare userName with const" },
    { pattern: /let\s+userAge/, message: "Declare userAge with let" },
    { pattern: /typeof/, message: "Use the typeof operator inside typeOf" },
  ],

  tests: [
    { name: 'userName is "Ada"', run: (x) => expectEqual(x.userName, "Ada") },
    { name: "userAge is 36", run: (x) => expectEqual(x.userAge, 36) },
    { name: 'describe("Ada", 36) returns "Ada is 36"', run: (x) => expectEqual(x.describe("Ada", 36), "Ada is 36") },
    { name: 'describe("Rob", 68) returns "Rob is 68"', run: (x) => expectEqual(x.describe("Rob", 68), "Rob is 68") },
    { name: 'typeOf(1) is "number"', run: (x) => expectEqual(x.typeOf(1), "number") },
    { name: 'typeOf("a") is "string"', run: (x) => expectEqual(x.typeOf("a"), "string") },
    { name: 'typeOf(true) is "boolean"', run: (x) => expectEqual(x.typeOf(true), "boolean") },
  ],

  solution: `const userName = "Ada";
let userAge = 36;

function describe(name, age) {
  return \`\${name} is \${age}\`;
}

function typeOf(value) {
  return typeof value;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript</th></tr>
  <tr><td>Hinted declaration</td><td><code>x: int = 1</code> (hint, unchecked)</td><td><code>let x = 1;</code> (no hint syntax)</td></tr>
  <tr><td>Constant</td><td><code>X = 1</code> (convention only, still reassignable)</td><td><code>const x = 1;</code> (enforced)</td></tr>
  <tr><td>Runtime type check</td><td><code>type(x)</code></td><td><code>typeof x</code></td></tr>
  <tr><td>Reassign a new type</td><td>allowed — hints aren't checked</td><td>allowed at runtime (unless <code>const</code>)</td></tr>
</table>
<p><code>typeof</code> returns one of a small set of strings: <code>"number"</code>,
<code>"string"</code>, <code>"boolean"</code>, <code>"undefined"</code>,
<code>"object"</code>, <code>"function"</code>, <code>"symbol"</code>, and
<code>"bigint"</code>. Its famous wart: <code>typeof null === "object"</code>.
Python's <code>type()</code> returns the actual class object instead — e.g.
<code>type(1)</code> is <code>&lt;class 'int'&gt;</code> — and has no such
quirk. Any hints you leaned on while writing Python are gone once the code
runs; <code>typeof</code> is how JavaScript answers the same "what is this?"
question at runtime.</p>`,
};
</script>
