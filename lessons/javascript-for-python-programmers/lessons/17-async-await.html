  title: "Async & Await",

  intro: `
<p>Python has had <code>async</code>/<code>await</code> since 3.5, and the
vocabulary carries over almost directly: JavaScript's <code>async function</code>
is Python's <code>async def</code>, and <code>await</code> means the same thing
in both — pause here until this coroutine or promise settles. The mechanics
diverge in one important way. A Python coroutine object does <em>nothing</em>
until something awaits it or schedules it on the event loop
(<code>asyncio.run</code>, <code>asyncio.create_task</code>); calling an
<code>async def</code> function just builds an inert coroutine object. A
JavaScript <code>async function</code> call starts running <em>immediately</em>,
synchronously, up to its first <code>await</code> — only then does it hand
control back. Everything else you know from Python maps over: the same
suspend-and-resume model, just eager instead of lazy at the call site.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>async def f() -> float: ...</code></td><td><code>async function f()</code></td></tr>
  <tr><td><code>n = await f()</code></td><td><code>const n = await f();</code></td></tr>
  <tr><td><code>a, b = await asyncio.gather(f(), g())</code></td><td><code>const [a, b] = await Promise.all([f(), g()]);</code></td></tr>
  <tr><td><code>except Exception as e:</code></td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today. First, <code>await</code> in sequence is
<em>serial</em>: each line waits for the previous coroutine or promise to settle
before the next even starts — same as chaining <code>await</code> calls in
Python. To run independent work concurrently you hand the promises to
<code>Promise.all</code>, the direct counterpart of <code>asyncio.gather</code>,
which waits for all of them and resolves to an array of their results in the
original order. Second, a rejected promise surfaces as a thrown value at the
<code>await</code>, so a plain <code>try/catch</code> catches it — just like a
raised exception surfacing at an <code>await</code> in Python — and if you do not
catch it, it propagates out of your <code>async</code> function as a rejected
promise the caller must handle.</p>`,

  python: `import asyncio

async def double(n: float) -> float:
    return n * 2


async def sum_doubled(a: float, b: float) -> float:
    x, y = await asyncio.gather(double(a), double(b))
    return x + y


async def safe_double(n: float) -> float:
    try:
        return await double(n)
    except Exception:
        return 0`,

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript</th></tr>
  <tr><td>Return of async fn</td><td>a coroutine object</td><td>a promise; contents unlabeled</td></tr>
  <tr><td>Awaited value</td><td>whatever the coroutine returns</td><td>whatever it settles to</td></tr>
  <tr><td>Serial awaits</td><td><code>await a; await b</code></td><td>b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td><code>asyncio.gather(a, b)</code></td><td><code>Promise.all([...])</code>; resolves to a results array</td></tr>
  <tr><td>Caught rejection</td><td><code>except Exception as e:</code></td><td><code>catch (e)</code> — any thrown value</td></tr>
</table>
<p>The most common async performance bug looks the same in both languages:
awaiting independent work in a loop or in sequence when it could run
concurrently. Two serial <code>await</code>s take as long as the sum of both
promises; <code>Promise.all</code>, like <code>asyncio.gather</code>, takes as
long as the slowest one. Reach for <code>Promise.all</code> whenever the tasks do
not depend on each other.</p>
<p>On errors: a rejected promise becomes a thrown value at its <code>await</code>.
If nothing catches it, your <code>async</code> function returns a
<em>rejected</em> promise — the failure propagates to whoever awaits you, just as
an uncaught exception propagates out of an <code>async def</code> in Python.
JavaScript's <code>catch (e)</code> has no equivalent to Python's
<code>except ValueError:</code> filtering by exception type — it catches
<em>anything</em> thrown, so it must be ready for an <code>Error</code>, a
string, even <code>undefined</code>.</p>`,
