const LESSON = {
  number: 18,
  title: "Modules",

  intro: `
<p>Python modules and JavaScript modules solve the same problem —
sharing code across files — with different defaults. In Python, everything
defined at the top level of a file is implicitly "exported"; any name that
does not start with an underscore is fair game for <code>from module import
name</code>, and <code>__all__</code> is only an optional, easily-ignored
suggestion for <code>import *</code>. JavaScript flips that: nothing leaves
a module unless you explicitly write <code>export</code> in front of it.
There is also no single "default" name to import the way Python's
<code>import module</code> hands you the whole namespace object —
JavaScript instead has a dedicated <code>export default</code> for "the one
thing this module is mainly about."</p>
<table>
  <tr><th>Python</th><th>JavaScript (runtime)</th></tr>
  <tr><td><code>TAX = 0.1</code> (module-level name)</td><td><code>export const TAX = 0.1;</code></td></tr>
  <tr><td><code>_helper = ...</code> (leading underscore, convention only)</td><td>simply not exported — a real wall</td></tr>
  <tr><td><code>from module import Cart</code></td><td><code>import { Cart } from "./m";</code></td></tr>
  <tr><td>no true default — <code>import module</code> gets everything</td><td><code>export default function total() {}</code></td></tr>
</table>
<p>The mental shift: in JavaScript a named export is a <em>value</em> you
name explicitly, and the default export is just the one binding the module
hands back when you import it without braces. Unlike Python's
underscore convention, which anyone can bypass with an explicit import,
leaving something un-exported in JavaScript means it genuinely cannot be
reached from outside the module — there is no back door.</p>`,

  python: `TAX_RATE = 0.1

def add_tax(cents: int) -> int:
    return round(cents * (1 + TAX_RATE))

def format_usd(cents: int) -> str:
    return f"\${cents / 100:.2f}"

# the module's "main" function — imported explicitly, no special status
def total(items: list[int]) -> int:
    return sum(items)`,

  task: `
<p>Build a tiny pricing module using plain-JavaScript exports. Export every
symbol directly (no type annotations), and give the module one default export:</p>
<ol>
  <li><strong>Named const export</strong>: <code>TAX_RATE</code> = <code>0.1</code>.</li>
  <li><strong>Named function export</strong>: <code>addTax(cents)</code> returns
      the price with tax added, rounded to a whole number of cents
      (<code>Math.round(cents * (1 + TAX_RATE))</code>).</li>
  <li><strong>Named function export</strong>: <code>formatUSD(cents)</code>
      returns a string like <code>"$12.34"</code> (dollars with two decimals).</li>
  <li><strong>Default export</strong>: <code>total(items)</code>, a function that
      sums an array of cent amounts and returns the total (<code>0</code> for an
      empty array). Export it with <code>export default</code>.</li>
</ol>`,

  starter: `// 1. named const export
export const TAX_RATE = 0.1;

// 2. named function export: price with tax, rounded to whole cents
export function addTax(cents) {
  // TODO
  return 0;
}

// 3. named function export: cents -> "$12.34"
export function formatUSD(cents) {
  // TODO
  return "";
}

// 4. default export: sum an array of cent amounts
export default function total(items) {
  // TODO
  return 0;
}
`,

  exportNames: ["TAX_RATE", "addTax", "formatUSD", "total"],

  requirements: [
    { pattern: /export\s+const\s+TAX_RATE/, message: "Use a named const export for TAX_RATE" },
    { pattern: /export\s+function\s+addTax/, message: "Use a named function export for addTax" },
    { pattern: /export\s+default/, message: "Use export default for total" },
  ],

  tests: [
    { name: "TAX_RATE is 0.1", run: (x) => expectEqual(x.TAX_RATE, 0.1) },
    { name: "addTax(100) is 110", run: (x) => expectEqual(x.addTax(100), 110) },
    { name: "addTax(199) rounds to 219", run: (x) => expectEqual(x.addTax(199), 219) },
    { name: 'formatUSD(1234) is "$12.34"', run: (x) => expectEqual(x.formatUSD(1234), "$12.34") },
    { name: 'formatUSD(500) is "$5.00"', run: (x) => expectEqual(x.formatUSD(500), "$5.00") },
    { name: "default export total sums the array", run: (x) => expectEqual(x.total([100, 200, 300]), 600) },
    { name: "default export total([]) is 0", run: (x) => expectEqual(x.total([]), 0) },
  ],

  solution: `export const TAX_RATE = 0.1;

export function addTax(cents) {
  return Math.round(cents * (1 + TAX_RATE));
}

export function formatUSD(cents) {
  return "$" + (cents / 100).toFixed(2);
}

export default function total(items) {
  return items.reduce((sum, cents) => sum + cents, 0);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Named export</td><td>any module-level name is importable</td><td><code>export const x = 1;</code> (must opt in)</td></tr>
  <tr><td>Default export</td><td>no equivalent — <code>import module</code> gets everything</td><td>becomes the <code>default</code> binding</td></tr>
  <tr><td>Hiding a name</td><td>leading underscore (convention only)</td><td>simply omit <code>export</code> (enforced)</td></tr>
  <tr><td><code>__all__</code></td><td>only affects <code>import *</code></td><td>no equivalent — every export is explicit</td></tr>
  <tr><td>Import a default</td><td><code>from m import total</code></td><td><code>import total from "./m";</code> (no braces, any local name)</td></tr>
</table>
<p>A default export is not a special kind of value — it is exposed under the name
<code>default</code>, which is exactly why <code>import Something from "./m"</code>
(no braces) grabs it and lets you rename it freely, while named imports must
match the exported name inside braces. Python has nothing quite like this:
<code>import module</code> always hands back the whole namespace, and
<code>from module import name</code> always has to match the real name. If
you ever wonder why a JavaScript import "renamed itself" compared to the file
that defined it, it is almost certainly a default import being bound to a
local name of the importer's choosing. At runtime, a module is just an
object of live value bindings — no more, no less.</p>`,
};
