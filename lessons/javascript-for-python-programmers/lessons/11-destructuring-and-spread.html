  title: "Destructuring & Spread",

  intro: `
<p>Python has its own unpacking syntax, but it only really shines on
sequences: <code>a, b = pair</code> and <code>first, *rest = items</code> are
close cousins of JavaScript's array destructuring. Dictionaries don't get a
left-hand-side unpacking syntax, though — pulling named fields out of a
<code>dict</code> means reaching for <code>d["key"]</code> or
<code>d.get("key", default)</code> one at a time, and merging two dicts means
<code>{**a, **b}</code>. JavaScript unifies all of that: the same
<code>{ ... }</code> / <code>[ ... ]</code> syntax destructures arrays,
objects, and function parameters alike, with renaming and defaults built in.</p>
<table>
  <tr><th>Python</th><th>JavaScript</th></tr>
  <tr><td><code>x, y = p["x"], p["y"]</code></td><td><code>const { x, y } = p;</code></td></tr>
  <tr><td><code>a, *rest = xs</code></td><td><code>const [a, ...rest] = xs;</code></td></tr>
  <tr><td><code>def f(*, n): ...</code></td><td><code>function f({ n }) {}</code></td></tr>
  <tr><td>missing key = <code>KeyError</code> (or <code>None</code> via <code>.get</code>)</td><td>missing property = <code>undefined</code></td></tr>
</table>
<p>A default in JS destructuring only fires when the value is
<code>undefined</code> — not for <code>null</code>, not for <code>0</code>,
not for <code>""</code>. Python's <code>dict.get(key, default)</code> fires
whenever the key is simply absent, which is a different (arguably more
predictable) rule. And <code>{ ...a, ...b }</code> is JavaScript's
<code>{**a, **b}</code>: a shallow copy, last-writer-wins on keys, with
nested objects shared by reference, not cloned.</p>`,

  python: `from typing import Optional, TypedDict

class Point(TypedDict):
    x: float
    y: float

class Address(TypedDict, total=False):
    city: str

class User(TypedDict):
    name: str
    address: Optional[Address]

def renamed(p: Point) -> dict:
    left, top = p["x"], p["y"]
    return {"left": left, "top": top}

def city_of(u: User) -> str:
    address = u.get("address") or {}
    city = address.get("city", "Unknown")
    return city

def merge(base: dict, overrides: dict) -> dict:
    return {**base, **overrides}`,

  task: `
<p>Write the JavaScript versions using real destructuring and spread
syntax — the point is to replace the manual <code>.get()</code> chains,
tuple unpacking, and <code>{**a, **b}</code> merges you'd reach for in Python
with the built-in syntax JavaScript gives you for free.</p>
<ol>
  <li><code>renamed(point)</code> — destructure <code>x</code> and <code>y</code>
      out of <code>point</code>, <strong>renaming</strong> them to
      <code>left</code> and <code>top</code>, and return
      <code>{ left, top }</code>.</li>
  <li><code>cityOf(user)</code> — use <strong>nested</strong> destructuring with a
      <strong>default</strong> to pull <code>user.address.city</code>, returning
      <code>"Unknown"</code> when either the address or the city is missing.</li>
  <li><code>headAndRest(arr)</code> — use array destructuring with a
      <strong>rest</strong> element to return
      <code>{ head, rest }</code> (the first item and an array of the remainder).</li>
  <li><code>greet({ name, greeting = "Hello" })</code> — take a
      <strong>destructured parameter</strong> with a default and return a string
      like <code>"Hello, Ada!"</code>.</li>
  <li><code>merge(base, overrides)</code> — return a new object combining both with
      the <strong>spread</strong> operator (overrides win); do not mutate
      <code>base</code>.</li>
  <li><code>concatAll(...arrays)</code> — accept any number of arrays and return one
      flat array using <strong>spread</strong>.</li>
</ol>`,

  exportNames: ["renamed", "cityOf", "headAndRest", "greet", "merge", "concatAll"],

  requirements: [
    { pattern: /\{\s*x\s*:\s*left\s*,\s*y\s*:\s*top\s*\}/, message: "Rename x and y to left and top while destructuring" },

    { pattern: /\{\s*name\s*,\s*greeting\s*=\s*["']Hello["']\s*\}/, message: "Destructure the greet parameter with a default" },

  tests: [
    { name: "renamed relabels x/y to left/top", run: (x) => expectDeepEqual(x.renamed({ x: 1, y: 2 }), { left: 1, top: 2 }) },
    { name: "cityOf reads a nested city", run: (x) => expectEqual(x.cityOf({ name: "Ada", address: { city: "London" } }), "London") },

    { name: "cityOf falls back when city is missing", run: (x) => expectEqual(x.cityOf({ name: "Ada", address: {} }), "Unknown") },
    { name: "headAndRest splits an array", run: (x) => expectDeepEqual(x.headAndRest([10, 20, 30]), { head: 10, rest: [20, 30] }) },

    { name: "merge lets overrides win", run: (x) => expectDeepEqual(x.merge({ a: 1, b: 2 }, { b: 9, c: 3 }), { a: 1, b: 9, c: 3 }) },

      } },
    { name: "concatAll flattens several arrays", run: (x) => expectDeepEqual(x.concatAll([1], [2, 3], [4]), [1, 2, 3, 4]) },
    { name: "concatAll with no arguments is empty", run: (x) => expectDeepEqual(x.concatAll(), []) },
  ],

  solution: `function renamed(point) {
  const { x: left, y: top } = point;
  return { left, top };
}

function cityOf(user) {
  const { address: { city = "Unknown" } = {} } = user;
  return city;
}

function headAndRest(arr) {
  const [head, ...rest] = arr;
  return { head, rest };
}

function greet({ name, greeting = "Hello" }) {
  return \`\${greeting}, \${name}!\`;
}

function merge(base, overrides) {
  return { ...base, ...overrides };
}

function concatAll(...arrays) {
  return [].concat(...arrays);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>JavaScript</th></tr>
  <tr><td>Rename</td><td><code>left = p["x"]</code></td><td><code>const { x: left } = p;</code></td></tr>
  <tr><td>Default</td><td><code>d.get("n", 5)</code>; fires when the key is absent</td><td>fires on <code>undefined</code> only</td></tr>
  <tr><td>Nested + default</td><td><code>(o.get("a") or {}).get("b", 1)</code></td><td><code>const { a: { b = 1 } = {} } = o;</code></td></tr>
  <tr><td>Spread merge</td><td><code>{**a, **b}</code></td><td><code>{ ...a, ...b }</code>, shallow</td></tr>
  <tr><td>Rest param</td><td><code>def f(*xs): ...</code></td><td><code>(...xs)</code></td></tr>
</table>
<p>Two runtime behaviors worth calling out for anyone coming from Python's
<code>.get()</code> habits. First, a default only triggers for
<code>undefined</code>: <code>const { n = 5 } = { n: null }</code>
leaves <code>n</code> as <code>null</code>, and <code>{ n: 0 }</code> keeps
<code>0</code> — Python's <code>dict.get("n", 5)</code> would return the
stored <code>None</code> or <code>0</code> too, but only because it never
tries to distinguish "present but falsy" from "absent" in the first place.
Second, that nested <code>= {}</code> in
<code>{ address: { city } = {} }</code> is load-bearing — without it,
destructuring <code>city</code> from a missing <code>address</code> throws
<code>TypeError: Cannot destructure property 'city' of undefined</code>,
much like calling <code>.get()</code> on <code>None</code> raises
<code>AttributeError</code> in Python.</p>
<p>Spread copies are <strong>shallow</strong>. In <code>{ ...base, ...overrides }</code>
any nested object is shared, not cloned — mutating a nested value through the copy
mutates the original too, exactly as it would after Python's
<code>{**base, **overrides}</code>. And <code>[].concat(...arrays)</code>
flattens exactly one level, which is all "spread the arguments" gets you.</p>`,
