const LESSON = {
  number: 12,
  title: "Enumerable: map, select & Friends",

  intro: `
<p>You know the Rust incantation by heart:
<code>.iter().map(|x| ...).collect::&lt;Vec&lt;_&gt;&gt;()</code>. Ruby keeps the
pipeline and deletes the scaffolding. There is no <code>.iter()</code> — arrays
respond to <code>.map</code> directly. There is no <code>.collect()</code> and
no turbofish — each step is <strong>eager</strong> and hands back a real array
immediately. That is the trade: every step allocates a new array (no
zero-cost lazy adapters), and in exchange the pipeline reads like the idea
itself.</p>
<table>
  <tr><th>Rust</th><th>Ruby</th></tr>
  <tr><td><code>v.iter().map(|x| x * 2).collect::&lt;Vec&lt;_&gt;&gt;()</code></td><td><code>v.map { |x| x * 2 }</code></td></tr>
  <tr><td><code>.filter(|p| p.in_stock)</code></td><td><code>.select { |p| p[:in_stock] }</code></td></tr>
  <tr><td><code>.map(|p| p.price).sum::&lt;u32&gt;()</code></td><td><code>.sum { |p| p[:price] }</code></td></tr>
  <tr><td><code>.min_by_key(|p| p.price)</code> → <code>Option</code></td><td><code>.min_by { |p| p[:price] }</code> → the item, or <code>nil</code></td></tr>
</table>
<p>The renames to learn: <code>filter</code> is <code>select</code> (its
opposite is <code>reject</code>), <code>min_by_key</code> is
<code>min_by</code>, and <code>sum</code> carries straight over — it even
takes a block, folding the <code>map</code> step in. These all live in the
<code>Enumerable</code> module, so the same vocabulary works on arrays,
hashes, ranges, and anything else that knows how to <code>each</code>.</p>`,

  rust: `struct Product { name: String, price_cents: u32, in_stock: bool }

fn in_stock_names(products: &[Product]) -> Vec<String> {
    products.iter()
        .filter(|p| p.in_stock)
        .map(|p| p.name.clone())
        .collect::<Vec<_>>()
}

fn total_value(products: &[Product]) -> u32 {
    products.iter().map(|p| p.price_cents).sum()
}

fn cheapest_name(products: &[Product]) -> Option<&str> {
    products.iter()
        .min_by_key(|p| p.price_cents)
        .map(|p| p.name.as_str())
}`,

  task: `
<p>The products arrive as an array of symbol-keyed hashes —
<code>{ name: "cable", price_cents: 500, in_stock: true }</code> — Ruby's
stand-in for the struct. Write:</p>
<ol>
  <li><code>in_stock_names(products)</code> — chain
      <code>.select { |p| p[:in_stock] }</code> into
      <code>.map { |p| p[:name] }</code>. No <code>iter()</code>, no
      <code>collect</code>: each step already returns an array.</li>
  <li><code>total_value(products)</code> — one call:
      <code>products.sum { |p| p[:price_cents] }</code>. The block replaces
      the separate <code>map</code>.</li>
  <li><code>cheapest_name(products)</code> — find the cheapest product with
      <code>.min_by { |p| p[:price_cents] }</code>, then index its
      <code>[:name]</code>. It returns the item itself, not an
      <code>Option</code>.</li>
</ol>`,

`,

  requirements: [
    { pattern: /\.select/, message: "Filter with .select (Ruby's name for filter)" },
    { pattern: /\.map/, message: "Transform with .map — no iter(), no collect" },
    { pattern: /\.sum/, message: "Total the prices with .sum" },
    { pattern: /min_by|sort_by/, message: "Find the cheapest with min_by (or sort_by)" },
  ],

  tests: [
    { name: 'in_stock_names picks ["keyboard", "cable"]',
      code: '  products = [\n    { name: "keyboard", price_cents: 4500, in_stock: true },\n    { name: "mouse", price_cents: 1500, in_stock: false },\n    { name: "cable", price_cents: 500, in_stock: true },\n  ]\n  expect_eq(in_stock_names(products), ["keyboard", "cable"])' },
    { name: "in_stock_names returns [] when nothing is stocked",
      code: '  products = [{ name: "mouse", price_cents: 1500, in_stock: false }]\n  expect_eq(in_stock_names(products), [])' },
    { name: "total_value sums 4500 + 1500 + 500 = 6500",
      code: '  products = [\n    { name: "keyboard", price_cents: 4500, in_stock: true },\n    { name: "mouse", price_cents: 1500, in_stock: false },\n    { name: "cable", price_cents: 500, in_stock: true },\n  ]\n  expect_eq(total_value(products), 6500)' },
    { name: "total_value of an empty catalog is 0",
      code: "  expect_eq(total_value([]), 0)" },
    { name: 'cheapest_name finds "cable"',
      code: '  products = [\n    { name: "keyboard", price_cents: 4500, in_stock: true },\n    { name: "mouse", price_cents: 1500, in_stock: false },\n    { name: "cable", price_cents: 500, in_stock: true },\n  ]\n  expect_eq(cheapest_name(products), "cable")' },

  solution: `def in_stock_names(products)
  products.select { |p| p[:in_stock] }.map { |p| p[:name] }
end

def total_value(products)
  products.sum { |p| p[:price_cents] }
end

def cheapest_name(products)
  products.min_by { |p| p[:price_cents] }[:name]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Start a pipeline</td><td><code>.iter()</code> / <code>.into_iter()</code></td><td>nothing — call <code>.map</code> on the array</td></tr>
  <tr><td>Transform</td><td><code>.map(|x| ...)</code>, lazy</td><td><code>.map { |x| ... }</code>, eager (allocates)</td></tr>
  <tr><td>Keep matching</td><td><code>.filter(|x| ...)</code></td><td><code>.select { |x| ... }</code></td></tr>
  <tr><td>Drop matching</td><td><code>.filter(|x| !...)</code></td><td><code>.reject { |x| ... }</code></td></tr>
  <tr><td>Materialize</td><td><code>.collect::&lt;Vec&lt;_&gt;&gt;()</code></td><td>already an array</td></tr>
  <tr><td>Total</td><td><code>.map(...).sum::&lt;u32&gt;()</code></td><td><code>.sum { ... }</code></td></tr>
  <tr><td>Smallest by key</td><td><code>.min_by_key(...)</code> → <code>Option&lt;T&gt;</code></td><td><code>.min_by { ... }</code> → item or <code>nil</code></td></tr>
</table>
<p>Rust's iterators are lazy so that a five-step chain compiles to one loop
with zero allocations. Ruby chose the opposite corner: every step allocates an
intermediate array, and in exchange the chain needs no setup, no
materialization, and no type hints. For the hot loops where that allocation
matters, lesson 18's <code>.lazy</code> buys the Rust behavior back — but
idiomatic Ruby reaches for the eager chain first and profiles later.</p>`,
};
