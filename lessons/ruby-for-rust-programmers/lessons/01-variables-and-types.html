<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>You are crossing the entire spectrum: from maximum compile-time guarantees
to maximum runtime expressiveness. In Ruby there is no <code>let</code>, no
<code>mut</code>, no type annotations, and no compiler pass — a variable
exists the moment you assign to it, every binding is mutable and rebindable
(to a value of a <em>different class</em>, even), and the script simply runs.
Where <code>rustc</code> proved things before execution, Ruby answers
questions <em>during</em> it: <code>x.class</code>,
<code>x.is_a?(Integer)</code>.</p>
<table>
  <tr><th>Rust</th><th>Ruby</th></tr>
  <tr><td><code>let x = 5;</code> (immutable)</td><td><code>x = 5</code> (mutable, rebindable — the default and only mode)</td></tr>
  <tr><td><code>i32</code>, <code>u64</code>, <code>i128</code>…</td><td><code>Integer</code> — one class, arbitrary precision</td></tr>
  <tr><td><code>f64</code></td><td><code>Float</code></td></tr>
  <tr><td><code>format!("{name} is {age}")</code></td><td><code>"#{name} is #{age}"</code></td></tr>
  <tr><td>types checked by the compiler</td><td><code>x.is_a?(Integer)</code> asked at runtime</td></tr>
</table>
<p>Two pieces of good news. First, <code>snake_case</code> carries over
perfectly — your naming instincts need zero retraining. Second, Ruby shares
Rust's best expression habit: a method's <strong>last expression is its
return value</strong>. The <code>next_age</code>-without-a-semicolon move at
the end of a Rust function block is exactly how idiomatic Ruby ends every
method — <code>return</code> exists but is reserved for early exits. One
instinct that transfers untouched.</p>
<p>And <code>Integer</code> is arbitrary precision: <code>2 ** 100</code>
just works. No overflow, no <code>wrapping_add</code>, no
<code>checked_mul</code>, no picking a width. What the borrow checker and the
type checker proved for you, tests and conventions now cover — that is the
trade this whole course explores.</p>`,

  rust: `fn describe_user(name: &str, age: i32) -> String {
    format!("{name} is {age} years old")
}

fn birthday(age: i32) -> i32 {
    let mut next_age = age;
    next_age += 1;
    next_age // last expression, no semicolon: the return value
}

fn main() {
    let name = "Ada";
    let age: i32 = 36;
    // age = "thirty-six"; // error[E0308]: mismatched types
    //                     // (and age is not even mut)
    println!("{}", describe_user(name, age));
    println!("{}", birthday(age));
}`,

  task: `
<p>Rewrite the Rust as Ruby:</p>
<ol>
  <li>Write a method <code>describe_user(name, age)</code> that produces
      <code>"Ada is 36 years old"</code>-style text.
      <code>format!("{name} is {age} years old")</code> becomes the
      interpolated string <code>"#{name} is #{age} years old"</code> — and
      make that string the method's <em>last expression</em>. No parameter
      types, no <code>-&gt; String</code>, no <code>return</code>.</li>
  <li>Write a method <code>birthday(age)</code> that copies <code>age</code>
      into a local variable, bumps it with <code>+=</code>, and lets it be
      the last expression — a direct port of the Rust version, minus
      <code>let mut</code> (every Ruby local is already mutable).</li>
</ol>
<p>Keep <code>return</code> out of your solution entirely: the last
expression <em>is</em> the return value, exactly as in a Rust block.</p>`,

  starter: `# 1. describe_user: format!("{name} ...") -> "#{name} ..."
#    The interpolated string should be the last expression (it gets returned).
def describe_user(name, age)
  raise NotImplementedError, "TODO: implement describe_user"
end

# 2. birthday: a local variable and += — no let, no mut, and the
#    bumped local as the last expression.
def birthday(age)
  raise NotImplementedError, "TODO: implement birthday"
end
`,

  requirements: [
    { pattern: /def\s+describe_user\s*\(\s*name\s*,\s*age\s*\)/, message: "Define describe_user(name, age) with def" },
    { pattern: /#\{\s*name\s*\}/, message: "Build the string with #{} interpolation" },
    { pattern: /^(?:(?!\breturn\b)[\s\S])*$/, message: "No return keyword — the last expression is the return value" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: '  expect_eq(describe_user("Ada", 36), "Ada is 36 years old")' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: '  expect_eq(describe_user("Grace", 52), "Grace is 52 years old")' },
    { name: "birthday(36) returns 37",
      code: "  expect_eq(birthday(36), 37)" },
    { name: "birthday(2 ** 64) returns 2 ** 64 + 1 — no overflow, no wrapping_add",
      code: "  expect_eq(birthday(2 ** 64), 18446744073709551617)" },
  ],

  solution: `def describe_user(name, age)
  "#{name} is #{age} years old"
end

def birthday(age)
  next_age = age
  next_age += 1
  next_age
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Bind a variable</td><td><code>let x = 5;</code></td><td><code>x = 5</code> (assignment is declaration)</td></tr>
  <tr><td>Mutate / rebind</td><td><code>let mut x = 5; x = 6;</code></td><td><code>x = 6</code> — mut is the default and only mode</td></tr>
  <tr><td>Change the type</td><td>impossible</td><td><code>x = "six"</code> — a binding can hold anything</td></tr>
  <tr><td>Integers</td><td><code>i32</code>/<code>u64</code>/… + overflow rules</td><td><code>Integer</code> — arbitrary precision, no overflow</td></tr>
  <tr><td>Floats</td><td><code>f32</code>/<code>f64</code></td><td><code>Float</code> (a 64-bit double)</td></tr>
  <tr><td>Interpolation</td><td><code>format!("{name}")</code></td><td><code>"#{name}"</code> (double quotes only)</td></tr>
  <tr><td>Ask about a type</td><td>compile-time, via the checker</td><td><code>x.is_a?(Integer)</code>, <code>x.class</code> — at runtime</td></tr>
  <tr><td>Function result</td><td>last expression (no semicolon)</td><td>last expression — same instinct, kept</td></tr>
</table>
<p>The honest version of the trade: <code>rustc</code> would have rejected
<code>describe_user(36, "Ada")</code> before anything ran; Ruby will raise a
<code>NoMethodError</code> (or quietly interpolate something odd) at the
moment of the call. What the type system proved, your tests now cover — and
in exchange, an entire dimension of ceremony (widths, <code>mut</code>,
annotations, the compile step itself) is simply gone.</p>`,
};
