<div id="app"></div>
<script>
const LESSON = {
  number: 10,
  title: "Inheritance & Modules",

  intro: `
<p>Rust deliberately rejected implementation inheritance: you compose behavior
with traits and never say "<code>Circle</code> is a kind of <code>Shape</code>
and gets its fields." Ruby embraces it. <code>class Circle &lt; Shape</code>
means <code>Circle</code> inherits every method of <code>Shape</code> (single
inheritance — one parent only), and <code>super</code> calls up the chain to
the parent's version. A bare <code>super</code> is a nice shorthand: it forwards
<em>all</em> the current method's arguments to the parent automatically. There
is no <code>abstract</code> keyword; the convention is to define the method in
the base class so it <code>raise NotImplementedError</code>, which is a
"required" method checked when it is <em>called</em>, not when the subclass is
compiled — the runtime analogue of a required trait method.</p>
<table>
  <tr><th>Rust</th><th>Ruby</th></tr>
  <tr><td>traits only, no inheritance</td><td><code>class Circle &lt; Shape</code></td></tr>
  <tr><td>required trait method (compile-checked)</td><td><code>raise NotImplementedError</code> (call-checked)</td></tr>
  <tr><td>trait default method</td><td>parent method / module method</td></tr>
  <tr><td><code>impl Greetable for Robot</code></td><td><code>include Greetable</code></td></tr>
  <tr><td>call parent impl explicitly</td><td><code>super</code> (forwards args)</td></tr>
</table>
<p>Trait <em>default methods</em> — behavior you get for free by implementing an
interface — map to Ruby <strong>modules used as mixins</strong>. A module is a
bag of methods that no one instantiates; <code>include Greetable</code> splices
those methods into a class as if you had written them there. The mixin's
methods can call back into the host object: <code>Greetable#greet</code> can
reference <code>self.name</code> (or just <code>name</code>), trusting that
whatever class includes it will supply a <code>name</code> method — exactly how
a trait default method leans on the type's other required methods. This is the
"template method" pattern: a base defines the skeleton (<code>describe</code>
uses <code>area</code>) and subclasses fill in the holes.</p>`,

  rust: `trait Shape {
    fn area(&self) -> f64; // required — the compiler checks each impl provides it
    fn describe(&self) -> String {
        format!("This shape has area {}", self.area()) // default method
    }
}

struct Circle { radius: f64 }
impl Shape for Circle {
    fn area(&self) -> f64 {
        std::f64::consts::PI * self.radius.powi(2)
    }
}

struct Rectangle { width: f64, height: f64 }
impl Shape for Rectangle {
    fn area(&self) -> f64 { self.width * self.height }
}
// Note: no "Circle < Shape" — Rust composes with traits, it never inherits.`,

  task: `
<p>Build a small hierarchy plus a mixin. Structure it so a base class supplies
the template and subclasses fill in <code>area</code>:</p>
<ol>
  <li><code>class Shape</code> — <code>area</code> should
      <code>raise NotImplementedError</code> (the "required method"), and
      <code>describe</code> should return
      <code>"This shape has area #{area}"</code>, calling
      <code>area</code> so subclasses plug in their own.</li>
  <li><code>class Circle &lt; Shape</code> — <code>initialize(radius)</code>
      stores <code>@radius</code>; <code>area</code> returns
      <code>(Math::PI * @radius ** 2).round(2)</code>.</li>
  <li><code>class Rectangle &lt; Shape</code> — <code>initialize(width, height)</code>
      stores both; <code>area</code> returns <code>@width * @height</code>.</li>
  <li><code>module Greetable</code> — a <code>greet</code> method returning
      <code>"Hello, I am #{name}"</code>, calling <code>name</code> on the host.</li>
  <li><code>class Robot</code> — <code>include Greetable</code>, take a
      <code>name</code> in <code>initialize</code>, and expose it with
      <code>attr_reader :name</code>.</li>
</ol>`,

  starter: `class Shape
  # The "required method": subclasses must override this.
  def area
    raise NotImplementedError, "TODO: subclasses must implement area"
  end

  # Template method: build the description out of area.
  def describe
    raise NotImplementedError, "TODO: return \\"This shape has area #{area}\\""
  end
end

class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    raise NotImplementedError, "TODO: (Math::PI * @radius ** 2).round(2)"
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    raise NotImplementedError, "TODO: @width * @height"
  end
end

module Greetable
  # Calls name on whatever class includes this module.
  def greet
    raise NotImplementedError, "TODO: return \\"Hello, I am #{name}\\""
  end
end

class Robot
  include Greetable
  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  requirements: [
    { pattern: /<\s*Shape/, message: "Inherit with class Circle < Shape (and Rectangle < Shape)" },
    { pattern: /NotImplementedError/, message: "Raise NotImplementedError for the required area method in Shape" },
    { pattern: /module\s+Greetable/, message: "Define module Greetable" },
    { pattern: /include\s+Greetable/, message: "Mix it in with include Greetable" },
  ],

  tests: [
    { name: "Circle#area uses pi and rounds to two places",
      code: '  expect_eq(Circle.new(2).area, 12.57)' },
    { name: "Rectangle#area multiplies its sides",
      code: '  expect_eq(Rectangle.new(3, 4).area, 12)' },
    { name: "describe (inherited) calls the subclass area",
      code: '  expect_eq(Circle.new(1).describe, "This shape has area 3.14")' },
    { name: "the base Shape#area raises NotImplementedError",
      code: `  raised = false
  begin
    Shape.new.area
  rescue NotImplementedError
    raised = true
  end
  expect_true(raised)` },
    { name: "Robot mixes in greet, which calls back into name",
      code: '  expect_eq(Robot.new("R2D2").greet, "Hello, I am R2D2")' },
  ],

  solution: `class Shape
  def area
    raise NotImplementedError, "#{self.class} must implement area"
  end

  def describe
    "This shape has area #{area}"
  end
end

class Circle < Shape
  def initialize(radius)
    @radius = radius
  end

  def area
    (Math::PI * @radius ** 2).round(2)
  end
end

class Rectangle < Shape
  def initialize(width, height)
    @width = width
    @height = height
  end

  def area
    @width * @height
  end
end

module Greetable
  def greet
    "Hello, I am #{name}"
  end
end

class Robot
  include Greetable
  attr_reader :name

  def initialize(name)
    @name = name
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Reuse behavior</td><td>trait composition</td><td><code>class Sub &lt; Base</code> (inheritance)</td></tr>
  <tr><td>Call parent</td><td>explicit path</td><td><code>super</code> (bare form forwards args)</td></tr>
  <tr><td>Required method</td><td>trait method, compile-checked</td><td><code>raise NotImplementedError</code>, call-checked</td></tr>
  <tr><td>Default behavior</td><td>trait default method</td><td>base method / module method</td></tr>
  <tr><td>Mixin</td><td><code>impl Trait for T</code></td><td><code>include Module</code></td></tr>
  <tr><td>Mixin calls host</td><td>trait method calls other required methods</td><td>module method calls <code>self.name</code></td></tr>
</table>
<p>Single inheritance keeps the parent chain linear, and <code>super</code>
walks it: bare <code>super</code> forwards the same arguments the current method
received, while <code>super()</code> (with empty parens) forwards none. Modules
fill the gap that single inheritance leaves — you can <code>include</code> as
many as you like, and their methods land in the lookup path just above the
class, which is how Ruby gets Rust-trait-like composition without multiple
inheritance. The catch is the one you already felt with
<code>NotImplementedError</code>: nothing verifies a subclass actually overrode
a required method until something calls it, so "abstract" is a runtime promise
here, not a compile-time guarantee.</p>`,
};
