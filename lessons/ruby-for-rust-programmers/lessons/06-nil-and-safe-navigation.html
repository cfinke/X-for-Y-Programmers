  title: "Nil & Safe Navigation",

  intro: `
<p>In Rust, absence is a <em>type</em>: <code>Option&lt;T&gt;</code> wraps the
value, and the compiler will not let you touch the inside without going
through <code>match</code>, <code>map</code>, or <code>unwrap</code>. In Ruby,
absence is a <em>value</em>: <code>nil</code>, a real object (of class
<code>NilClass</code>) that any variable can hold. <code>h[:missing]</code>
just returns <code>nil</code> — no <code>Some</code>, no <code>unwrap</code>,
and crucially, no compiler forcing you to handle it. That is the price of
dynamism: forget the check and you get a <code>NoMethodError</code> at
runtime — Ruby's version of an <code>unwrap</code> panic.</p>
<table>
  <tr><th>Rust</th><th>Ruby</th></tr>
  <tr><td><code>opt.map(|u| u.city).unwrap_or(default)</code></td><td><code>user&amp;.city || default</code></td></tr>
  <tr><td><code>opt.is_none()</code></td><td><code>x.nil?</code></td></tr>
  <tr><td><code>map.get(&amp;key).copied().unwrap_or(d)</code></td><td><code>h[key] || d</code></td></tr>
  <tr><td><code>opt.get_or_insert(v)</code></td><td><code>x ||= v</code></td></tr>
</table>
<p>The tools you get in exchange are sharp. <code>&amp;.</code> (safe
navigation) is <code>Option::map</code> for method calls: <code>user&amp;.city</code>
returns <code>nil</code> instead of raising if <code>user</code> is
<code>nil</code>, and chains — <code>user&amp;.address&amp;.city</code> is an
<code>and_then</code> pipeline. And <code>||</code> is a precise
<code>unwrap_or</code>, because Ruby's truthiness is strict: <strong>only
<code>nil</code> and <code>false</code> are falsy</strong>. <code>0</code>
and <code>""</code> are truthy, so <code>count || 10</code> keeps a stored
<code>0</code> — no JavaScript-style surprises. <code>x ||= v</code> assigns
only if <code>x</code> is nil/false, and <code>.nil?</code> is your
<code>is_none()</code> when even <code>false</code> must survive.</p>`,

  rust: `use std::collections::HashMap;

struct Address { city: String }
struct User { address: Option<Address> }

fn get_city(user: Option<&User>) -> String {
    user.and_then(|u| u.address.as_ref())
        .map(|a| a.city.clone())
        .unwrap_or_else(|| "Unknown".to_string())
}

fn pick(map: &HashMap<String, i32>, key: &str, default: i32) -> i32 {
    // .get returns Option<&i32>; the compiler makes us unwrap it.
    *map.get(key).unwrap_or(&default)
}`,

  task: `

    { name: 'get_city returns "Unknown" when the address is nil',

  solution: `class Address
  attr_reader :city
  def initialize(city)
    @city = city
  end
end

class User
  attr_reader :address
  def initialize(address = nil)
    @address = address
  end
end

def get_city(user)
  user&.address&.city || "Unknown"
end

def pick(hash, key, default)
  hash[key] || default
end

def first_or_default(arr, default)
  value = arr[0]
  value.nil? ? default : value
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Absence</td><td><code>Option&lt;T&gt;</code> (a type)</td><td><code>nil</code> (a value, class <code>NilClass</code>)</td></tr>
  <tr><td>Is it absent?</td><td><code>opt.is_none()</code></td><td><code>x.nil?</code></td></tr>
  <tr><td>Map through absence</td><td><code>opt.map(|u| u.city)</code></td><td><code>user&amp;.city</code></td></tr>
  <tr><td>Chain</td><td><code>.and_then(...)</code></td><td><code>a&amp;.b&amp;.c</code></td></tr>
  <tr><td>Default</td><td><code>.unwrap_or(d)</code></td><td><code>value || d</code></td></tr>
  <tr><td>Set if absent</td><td><code>opt.get_or_insert(v)</code></td><td><code>x ||= v</code></td></tr>
  <tr><td>Missing hash key</td><td><code>map.get(&amp;k)</code> → <code>Option</code></td><td><code>h[key]</code> → <code>nil</code></td></tr>
</table>
<p><code>nil</code> is a full object — <code>nil.to_s</code> is <code>""</code>,
<code>nil.to_a</code> is <code>[]</code>, <code>nil.inspect</code> is
<code>"nil"</code>. Because only <code>nil</code> and <code>false</code> are
falsy, <code>||</code> behaves like a real <code>unwrap_or</code> for almost
every value; reach for <code>.nil?</code> only when <code>false</code> is
meaningful data. What you do not get back is the compiler: nothing forces the
check, and a forgotten one surfaces later as
<code>NoMethodError: undefined method for nil</code> — read that message as
"you unwrapped a None".</p>`,
