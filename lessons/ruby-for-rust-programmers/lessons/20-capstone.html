<table>

</table>
<p>One habit deserves a spotlight. In Ruby, <em>every</em> object is a shared
reference — there is no borrow checker to stop <code>restock</code> from

changed entry, a new array around the rest. It is the <code>.clone()</code>

struct Item {
    name: String,
    price_cents: u64,
    count: u64,
}

fn total_value(items: &[Item]) -> u64 {
    items.iter().map(|i| i.price_cents * i.count).sum()
}

fn find_item<'a>(items: &'a [Item], name: &str) -> Option<&'a Item> {
    items.iter().find(|i| i.name == name)
}

fn restock(items: &[Item], name: &str, amount: u64) -> Vec<Item> {
    items.iter().map(|i| {
        let mut item = i.clone(); // the compiler forces the copy
        if item.name == name { item.count += amount; }
        item
    }).collect()
}

fn names_in_stock(items: &[Item]) -> Vec<String> {
    items.iter().filter(|i| i.count > 0).map(|i| i.name.clone()).collect()
}`,

  solution: `class Item
  attr_reader :name, :price_cents, :count

  def initialize(name, price_cents, count)
    @name = name
    @price_cents = price_cents
    @count = count
  end
end

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }
end

def restock(items, name, amount)
  items.map do |item|
    if item.name == name
      Item.new(item.name, item.price_cents, item.count + amount)
    else
      item
    end
  end
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map { |i| i.name }
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Sum a projection</td><td><code>.map(...).sum()</code></td><td><code>.sum { |i| ... }</code></td></tr>
  <tr><td>First match</td><td><code>.find(...)</code> → <code>Option</code></td><td><code>.find { ... }</code> → item or <code>nil</code></td></tr>
  <tr><td>Filter + project</td><td><code>.filter(...).map(...).collect()</code></td><td><code>.select { ... }.map { ... }</code></td></tr>
  <tr><td>Non-mutating update</td><td><code>clone()</code>, enforced by the compiler</td><td>build <code>Item.new(...)</code>, enforced by you</td></tr>
  <tr><td>Ownership</td><td>moves, borrows, lifetimes</td><td>everything is a shared reference, always</td></tr>
</table>
<p>That is the whole trade, one last time: Rust encodes its guarantees —
error types, orderings, data shapes, aliasing — in signatures the compiler
checks; Ruby deletes the ceremony and trusts conventions the community
enforces by habit. Neither is free. But having internalized snake_case,
blocks, <code>nil</code>, <code>raise</code>/<code>rescue</code>, and the
discipline of not mutating what you did not create, you now write Ruby the
way Rubyists do — and you know exactly which safety net you gave up to get
there.</p>`,
