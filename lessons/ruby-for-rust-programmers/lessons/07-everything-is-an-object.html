  number: 7,
  title: "Everything Is an Object",

  intro: `
<p>In Rust, <code>i32::abs</code> is a method only because someone wrote an
<code>impl</code> block for it; a bare integer literal has no inherent
behavior, and there is a hard line between primitives (living on the stack,
copied by value) and the methods the standard library bolts on. Ruby erases
that line completely. There are <em>no</em> primitives: <code>-5</code> is a
full-fledged object of class <code>Integer</code>, <code>3.14</code> is a
<code>Float</code>, <code>"abc"</code> is a <code>String</code>, and even
<code>nil</code> and <code>true</code> are objects. Every value can receive
messages, so <code>(-5).abs</code>, <code>2.even?</code>, and
<code>5.times { ... }</code> are all just method calls on ordinary objects.</p>
<table>
  <tr><th>Rust</th><th>Ruby</th></tr>
  <tr><td><code>(-5i32).abs()</code></td><td><code>-5.abs</code></td></tr>
  <tr><td><code>4 % 2 == 0</code></td><td><code>4.even?</code></td></tr>
  <tr><td><code>for _ in 0..5 { ... }</code></td><td><code>5.times { ... }</code></td></tr>
  <tr><td><code>s.chars().collect::&lt;Vec&lt;_&gt;&gt;()</code></td><td><code>s.chars</code></td></tr>
  <tr><td><code>(f * 100.0).round() / 100.0</code></td><td><code>f.round(2)</code></td></tr>
</table>
<p>Two consequences follow. First, calling a method needs no ceremony:
<code>abs</code> takes no parentheses, and predicate methods end in
<code>?</code> by convention (<code>even?</code>, <code>nil?</code>,
<code>zero?</code>). Second, because every method returns an object that itself
receives messages, <em>chaining</em> is the native idiom —
<code>-5.abs.to_s</code> or <code>"hi there".split.map(&:capitalize)</code>
reads left to right with no intermediate bindings. Where Rust reaches for an
operator or a free function, Ruby almost always has a method already living on
the value.</p>`,

  rust: `fn absolute(n: i32) -> i32 {
    n.abs() // i32::abs exists only because std wrote an impl block for it
}

fn even_numbers(nums: &[i32]) -> Vec<i32> {
    nums.iter().copied().filter(|n| n % 2 == 0).collect()
}

fn rounded(f: f64, digits: i32) -> f64 {
    let factor = 10f64.powi(digits);
    (f * factor).round() / factor
}

fn char_list(s: &str) -> Vec<char> {
    s.chars().collect()
}`,

  task: `

</ol>`,

  tests: [

    { name: "absolute of zero is zero",
      code: '  expect_eq(absolute(0), 0)' },
    { name: "even_numbers keeps only the even elements",

    { name: "even_numbers on all-odd input is empty",
      code: '  expect_eq(even_numbers([1, 3, 5]), [])' },
    { name: "rounded trims to the requested decimal places",
      code: `  expect_eq(rounded(9.87654, 2), 9.88)

  solution: `def absolute(n)

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Absolute value</td><td><code>n.abs()</code></td><td><code>n.abs</code></td></tr>
  <tr><td>Parity test</td><td><code>n % 2 == 0</code></td><td><code>n.even?</code> / <code>n.odd?</code></td></tr>
  <tr><td>Repeat N times</td><td><code>for _ in 0..n {}</code></td><td><code>n.times { ... }</code></td></tr>
  <tr><td>Round to places</td><td>manual scale + <code>round()</code></td><td><code>f.round(2)</code></td></tr>
  <tr><td>String to chars</td><td><code>s.chars().collect()</code></td><td><code>s.chars</code></td></tr>
  <tr><td>Ask the class</td><td><code>std::any</code> gymnastics</td><td><code>x.class</code></td></tr>
</table>
<p>The mental shift is that there are no primitives to reach around: an integer
literal <em>is</em> an object, so the behavior you want is almost always a
method sitting on the value already — <code>(-5).abs</code>,
<code>3.times</code>, <code>"x".upcase</code>. Predicate methods end in
<code>?</code> and boolean-ish setters end in <code>!</code>, and because every
call returns another object, chaining (<code>-5.abs.to_s.rjust(3, "0")</code>)
is the idiomatic style rather than nesting free functions. When you catch
yourself writing an operator or a loop, ask first whether the object already
knows how to do it.</p>`,
