<div id="app"></div>
<script>
const LESSON = {
  number: 15,
  title: "Duck Typing & respond_to?",

  intro: `
<p>In Rust, a trait bound is a compile-time contract:
<code>fn make_speak&lt;T: Speaker&gt;(t: &amp;T)</code> declares exactly what
<code>T</code> can do, and rustc proves every call site honors it before the
program exists. Ruby has no bounds and no interfaces. Polymorphism is simply
<strong>method presence</strong>: if the object has a <code>speak</code>
method, <code>thing.speak</code> works — structural, like a trait match on
shape alone, but <em>unchecked</em>. Nobody verifies anything until the call
actually happens.</p>
<table>
  <tr><th>Rust</th><th>Ruby</th></tr>
  <tr><td><code>trait Speaker { fn speak(&amp;self) -&gt; String; }</code></td><td>no declaration — having <code>speak</code> <em>is</em> the trait</td></tr>
  <tr><td><code>fn f&lt;T: Speaker&gt;(t: &amp;T)</code></td><td><code>def f(thing)</code> — any object may arrive</td></tr>
  <tr><td>bound checked at compile time</td><td><code>thing.respond_to?(:speak)</code> — asked at runtime</td></tr>
  <tr><td>wrong type = compile error</td><td>wrong object = <code>NoMethodError</code>, at the call</td></tr>
  <tr><td>downcast via <code>Any</code> (rare, discouraged)</td><td><code>thing.is_a?(Dog)</code> for nominal moments</td></tr>
</table>
<p><code>respond_to?(:speak)</code> is the trait check recast as a question you
ask the object itself — useful at boundaries where mixed collections arrive.
<code>is_a?</code> exists for the occasional nominal check, but idiomatic Ruby
asks what an object can <em>do</em>, not what it <em>is</em>. Be clear-eyed
about the trade, because this lesson is the whole course in miniature: where
rustc verified every call site of every generic function, Ruby verifies
nothing ahead of time. Tests and conventions now carry the weight the
compiler used to.</p>`,

  rust: `trait Speaker {
    fn speak(&self) -> String;
}

struct Dog;
impl Speaker for Dog {
    fn speak(&self) -> String { "Woof".to_string() }
}

struct Robot;
impl Speaker for Robot {
    fn speak(&self) -> String { "Beep".to_string() }
}

struct Rock; // no impl Speaker

fn make_speak<T: Speaker>(thing: &T) -> String {
    thing.speak() // rustc proved this method exists
}
// make_speak(&Rock) — compile error, before the program ever runs`,

  task: `
<p>Port the trait objects to duck typing:</p>
<ol>
  <li>Class <code>Dog</code> with a <code>speak</code> method returning
      <code>"Woof"</code>, and class <code>Robot</code> whose
      <code>speak</code> returns <code>"Beep"</code>. No trait to declare or
      implement — defining <code>speak</code> is the whole contract.</li>
  <li>Class <code>Rock</code> with <em>no</em> <code>speak</code> method at
      all.</li>
  <li><code>make_speak(thing)</code> — no <code>T: Speaker</code> bound
      exists, so probe at runtime: if
      <code>thing.respond_to?(:speak)</code>, return <code>thing.speak</code>;
      otherwise return <code>"..."</code>.</li>
  <li><code>all_speakers(things)</code> — from a mixed array, keep only the
      objects that respond to <code>:speak</code> (<code>select</code>) and
      collect what they say (<code>map</code>).</li>
</ol>`,

  starter: `# The trait is gone. Defining speak IS the contract.
class Dog
  def speak
    raise NotImplementedError, "TODO: return \\"Woof\\""
  end
end

class Robot
  def speak
    raise NotImplementedError, "TODO: return \\"Beep\\""
  end
end

# Rock deliberately has no speak method.
class Rock
end

# No T: Speaker bound — ask the object itself with respond_to?(:speak).
def make_speak(thing)
  raise NotImplementedError, "TODO: respond_to? guard, else \\"...\\""
end

# select the objects that respond to :speak, then map over their speak.
def all_speakers(things)
  raise NotImplementedError, "TODO: select + map"
end
`,

  requirements: [
    { pattern: /respond_to\?/, message: "Probe the object with respond_to?(:speak)" },
    { pattern: /class\s+Dog/, message: "Define a Dog class" },
    { pattern: /class\s+Robot/, message: "Define a Robot class" },
    { pattern: /\.speak/, message: "Call .speak on the object once it passes the probe" },
  ],

  tests: [
    { name: 'make_speak(Dog.new) returns "Woof"',
      code: '  expect_eq(make_speak(Dog.new), "Woof")' },
    { name: 'make_speak(Robot.new) returns "Beep"',
      code: '  expect_eq(make_speak(Robot.new), "Beep")' },
    { name: 'make_speak(Rock.new) returns "..." — no NoMethodError',
      code: '  expect_eq(make_speak(Rock.new), "...")' },
    { name: "Rock really has no speak method",
      code: "  expect_true(!Rock.new.respond_to?(:speak))\n  expect_true(Dog.new.respond_to?(:speak))" },
    { name: 'all_speakers([Dog, Rock, Robot]) returns ["Woof", "Beep"]',
      code: '  expect_eq(all_speakers([Dog.new, Rock.new, Robot.new]), ["Woof", "Beep"])' },
    { name: "all_speakers([]) returns []",
      code: "  expect_eq(all_speakers([]), [])" },
  ],

  solution: `class Dog
  def speak
    "Woof"
  end
end

class Robot
  def speak
    "Beep"
  end
end

class Rock
end

def make_speak(thing)
  thing.respond_to?(:speak) ? thing.speak : "..."
end

def all_speakers(things)
  things.select { |t| t.respond_to?(:speak) }.map(&:speak)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>Ruby</th></tr>
  <tr><td>Declare a capability</td><td><code>trait Speaker { ... }</code></td><td>nothing — define the method</td></tr>
  <tr><td>Implement it</td><td><code>impl Speaker for Dog</code></td><td><code>def speak</code> inside the class</td></tr>
  <tr><td>Constrain a function</td><td><code>&lt;T: Speaker&gt;</code></td><td>no constraint — just call the method</td></tr>
  <tr><td>Check the capability</td><td>rustc, at compile time</td><td><code>obj.respond_to?(:speak)</code>, at runtime</td></tr>
  <tr><td>Nominal type check</td><td><code>Any</code> + downcast (rare)</td><td><code>obj.is_a?(Dog)</code> (use sparingly)</td></tr>
  <tr><td>Violation surfaces as</td><td>compile error</td><td><code>NoMethodError</code> at the call site</td></tr>
</table>
<p>This is the deal you have been sizing up since lesson 1, stated plainly.
Rust's answer to "can I call this?" is a proof; Ruby's is a shrug — try it, or
ask first with <code>respond_to?</code>. What you gain is radical flexibility:
any object from any library participates in <code>all_speakers</code> by
defining one method, no trait import, no orphan rule, no wrapper types. What
you give up is the proof, and the honest consequence is cultural: Ruby
codebases lean hard on test suites and naming conventions because they are the
type system now. Write the tests you used to let rustc write.</p>`,
};
