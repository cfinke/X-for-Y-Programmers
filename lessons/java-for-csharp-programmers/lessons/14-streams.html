  intro: `
<p>In C# you transform sequences with chained LINQ methods:
<code>.Where()</code>, <code>.Select()</code>, <code>.Aggregate()</code>. Java's
answer is the <strong>Stream API</strong>. You call <code>.stream()</code> on a
collection to open a pipeline, chain lazy operations, and finish with a
<em>terminal</em> operation — usually <code>.collect(...)</code> or a reduction
like <code>.Sum()</code>.</p>
<table>
  <tr><th>C#</th><th>Java</th></tr>
  <tr><td><code>xs.Where(x =&gt; x &gt; 0)</code></td><td><code>list.stream().filter(x -&gt; x &gt; 0)</code></td></tr>
  <tr><td><code>xs.Select(x =&gt; x.Name)</code></td><td><code>list.stream().map(x -&gt; x.name())</code></td></tr>
  <tr><td><code>xs.Aggregate(0, (a, b) =&gt; a + b)</code></td><td><code>stream.reduce(0, Integer::sum)</code></td></tr>
  <tr><td><code>.ToList()</code></td><td><code>.collect(Collectors.toList())</code></td></tr>
</table>
<p>Two things differ from C# <code>IEnumerable</code> pipelines. First, a
stream is <strong>single-use and lazy</strong>: nothing runs until a terminal
operation pulls values through, and you cannot reuse a stream after that —
much like a C# iterator, except Java enforces the one-shot rule by throwing
<code>IllegalStateException</code> on reuse. Second, a pipeline does not
produce a collection by itself — you must <em>collect</em> it, the way LINQ
needs an explicit <code>.ToList()</code> or <code>.ToDictionary()</code>. The
<code>Collectors</code> class is the toolbox: <code>toList()</code>,
<code>joining(", ")</code>, <code>groupingBy(...)</code>,
<code>summingInt(...)</code>, and <code>counting()</code>. For plain number
crunching, <code>mapToInt(...)</code> turns the stream into an
<code>IntStream</code> with a direct <code>.sum()</code>.</p>`,

  csharp: `record Product(string Name, string Category, int Price);

static class Catalog {
    static List<string> NamesUnder(List<Product> products, int max) {
        return products.Where(p => p.Price < max).Select(p => p.Name).ToList();
    }

    static int TotalPrice(List<Product> products) {
        return products.Sum(p => p.Price);
    }

    static Dictionary<string, int> TotalByCategory(List<Product> products) {
        var result = new Dictionary<string, int>();
        foreach (var p in products) {
            result[p.Category] = result.GetValueOrDefault(p.Category, 0) + p.Price;
        }
        return result;
    }
}`,

  <li><code>totalPrice(List&lt;Product&gt; products)</code> — return the

</ol>`,

  solution: `record Product(String name, String category, int price) {}

class Catalog {
  static List<String> namesUnder(List<Product> products, int maxPrice) {
    return products.stream()
        .filter(p -> p.price() < maxPrice)
        .map(Product::name)
        .collect(Collectors.toList());
  }

  static int totalPrice(List<Product> products) {
    return products.stream()
        .mapToInt(Product::price)
        .sum();
  }

  static int totalPriceReduce(List<Product> products) {
    return products.stream()
        .map(Product::price)
        .reduce(0, Integer::sum);
  }

  static String nameList(List<Product> products) {
    return products.stream()
        .map(Product::name)
        .collect(Collectors.joining(", "));
  }

  static Map<String, List<Product>> byCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category));
  }

  static Map<String, Integer> totalByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.summingInt(Product::price)));
  }

  static Map<String, Long> countByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.counting()));
  }
}
`,

  notes: `
<table>
  <tr><th>Goal</th><th>C#</th><th>Java</th></tr>
  <tr><td>Start</td><td><code>xs</code> (IEnumerable)</td><td><code>list.stream()</code></td></tr>
  <tr><td>Keep some</td><td><code>.Where(f)</code></td><td><code>.filter(f)</code></td></tr>
  <tr><td>Transform</td><td><code>.Select(f)</code></td><td><code>.map(f)</code></td></tr>
  <tr><td>Sum numbers</td><td><code>.Sum(f)</code></td><td><code>.mapToInt(f).sum()</code></td></tr>
  <tr><td>Fold</td><td><code>.Aggregate(init, f)</code></td><td><code>.reduce(init, f)</code></td></tr>
  <tr><td>Back to a list</td><td><code>.ToList()</code></td><td><code>.collect(Collectors.toList())</code></td></tr>
  <tr><td>Join to string</td><td><code>string.Join(", ", xs)</code></td><td><code>.collect(Collectors.joining(", "))</code></td></tr>
  <tr><td>Group</td><td><code>.GroupBy(f)</code></td><td><code>Collectors.groupingBy(f)</code></td></tr>
  <tr><td>Count per group</td><td><code>.GroupBy(f).Select(g =&gt; g.Count())</code></td><td><code>groupingBy(f, counting())</code></td></tr>
</table>
<p>The argument order on <code>Aggregate</code> and <code>reduce</code> lines
up: both take <code>(seed/identity, accumulator)</code>, unlike some other
languages that flip it. The method reference <code>Integer::sum</code> is Java
shorthand for <code>(a, b) -&gt; a + b</code>, similar to a C# method group
conversion like <code>Add</code> passed where a delegate is expected.
<code>counting()</code> yields a <code>Long</code>, not an <code>int</code>,
which is why <code>countByCategory</code> returns
<code>Map&lt;String, Long&gt;</code> — much like LINQ's <code>Count()</code>
returning <code>int</code> while <code>LongCount()</code> returns
<code>long</code>. Remember a stream is one-shot: build the pipeline and
finish it in a single chain, since you cannot iterate the same stream twice —
where a C# <code>IEnumerable</code> built from a list can typically be
enumerated repeatedly, a Java stream cannot.</p>`,
