  number: 6,
  title: "Classes & Objects",

  intro: `
<p>Classes will feel familiar — Java and C# share the same vocabulary of
fields, constructors, methods and <code>this</code>. The differences are mostly
about ceremony and defaults. Java has no auto-implemented properties, no
constructor parameter shorthand, and (importantly) no <code>public</code> on the
top-level class in this course: the harness compiles your file as
<code>prog.java</code>, so a <code>public</code> top-level type would be
rejected. Leave classes <em>package-private</em> (no modifier).</p>
<table>
  <tr><th>C#</th><th>Java</th></tr>
  <tr><td><code>private int balance;</code></td><td><code>private int balance;</code></td></tr>
  <tr><td><code>public BankAccount(string o) { owner = o; }</code></td><td><code>BankAccount(String o) { this.owner = o; }</code></td></tr>
  <tr><td><code>public int Balance => balance;</code></td><td><code>int getBalance() { return balance; }</code></td></tr>
  <tr><td><code>public override string ToString() { … }</code></td><td><code>@Override public String toString() { … }</code></td></tr>
  <tr><td>auto-implemented property</td><td>always assign fields explicitly</td></tr>
</table>
<p>Two things to internalize. First, encapsulation in Java is enforced by
<code>private</code> plus getter methods — there is no <code>{ get; }</code>
property syntax, so <code>getBalance()</code> is a real method call with parens.
Second, <code>toString()</code> is inherited from <code>Object</code> and is
already <code>public</code>, so your override must stay <code>public</code> (you
cannot narrow visibility) and should carry <code>@Override</code>, the analogue
of C#'s <code>override</code> keyword.</p>`,

  csharp: `public class BankAccount {
  private string owner;
  private int balance;

  public BankAccount(string owner, int initial) {
    this.owner = owner;
    balance = initial;
  }

  public int GetBalance() => balance;
  public void Deposit(int amount) => balance += amount;
  public bool Withdraw(int amount) {
    if (amount > balance) return false;
    balance -= amount;
    return true;
  }

  public override string ToString() => $"{owner} has \${balance}";
}`,

  task: `
<p>Model a bank account as a class. Because there are no top-level functions and
no <code>public</code> top-level types here, write a single package-private
class:</p>
<ol>
  <li>Class <code>BankAccount</code> with <code>private</code> fields
      <code>owner</code> (a <code>String</code>) and <code>balance</code> (an
      <code>int</code>).</li>
  <li>A constructor <code>BankAccount(String owner, int initialBalance)</code>
      that assigns the fields using <code>this</code>.</li>
  <li>Getters <code>getOwner()</code> and <code>getBalance()</code>.</li>
  <li><code>deposit(int amount)</code> adds to the balance.</li>
  <li><code>withdraw(int amount)</code> returns <code>false</code> and changes
      nothing if <code>amount</code> exceeds the balance; otherwise it subtracts
      and returns <code>true</code>.</li>
  <li>Override <code>toString()</code> to return a string like
      <code>"Ada has $100"</code>.</li>
</ol>`,

  starter: `class BankAccount {

`,

  requirements: [
    { pattern: /private\s+/, message: "Keep the fields private" },
    { pattern: /this\./, message: "Use this to assign the instance fields in the constructor" },
    { pattern: /String\s+toString\s*\(\s*\)/, message: "Override toString()" },
  ],

  tests: [
    { name: "constructor stores owner and balance", code:
      "      var acct = new BankAccount(\"Ada\", 100);\n" +
      "      expect_eq(acct.getOwner(), \"Ada\");\n" +

    { name: "deposit increases the balance", code:
      "      var acct = new BankAccount(\"Ada\", 100);\n" +
      "      acct.deposit(50);\n" +
      "      expect_eq(acct.getBalance(), 150);" },
    { name: "withdraw succeeds when funds suffice", code:
      "      var acct = new BankAccount(\"Ada\", 100);\n" +
      "      expect_true(acct.withdraw(40));\n" +
      "      expect_eq(acct.getBalance(), 60);" },
    { name: "withdraw fails and leaves the balance untouched", code:
      "      var acct = new BankAccount(\"Ada\", 100);\n" +
      "      expect_true(!acct.withdraw(200));\n" +
      "      expect_eq(acct.getBalance(), 100);" },
    { name: "toString formats the account", code:
      "      var acct = new BankAccount(\"Rob\", 68);\n" +
      "      expect_eq(acct.toString(), \"Rob has $68\");" },
    { name: "two instances are independent", code:
      "      var a = new BankAccount(\"Ada\", 100);\n" +
      "      var b = new BankAccount(\"Rob\", 10);\n" +
      "      a.deposit(5);\n" +
      "      expect_eq(a.getBalance(), 105);\n" +
      "      expect_eq(b.getBalance(), 10);" },
  ],

  solution: `class BankAccount {
  private final String owner;
  private int balance;

  BankAccount(String owner, int initialBalance) {
    this.owner = owner;
    this.balance = initialBalance;
  }

  String getOwner() {
    return owner;
  }

  int getBalance() {
    return balance;
  }

  void deposit(int amount) {
    this.balance += amount;
  }

  boolean withdraw(int amount) {
    if (amount > this.balance) {
      return false;
    }
    this.balance -= amount;
    return true;
  }

  @Override
  public String toString() {
    return owner + " has $" + balance;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Java</th></tr>
  <tr><td>Private field</td><td><code>private int x;</code></td><td><code>private int x;</code></td></tr>
  <tr><td>Constructor</td><td><code>public ClassName(int x) {}</code></td><td><code>ClassName(int x) {}</code></td></tr>
  <tr><td>Read a field</td><td><code>this.x</code> or just <code>x</code></td><td><code>this.x</code> or just <code>x</code></td></tr>
  <tr><td>Getter</td><td><code>public int X { get; }</code> (property)</td><td><code>int getX()</code> (a method call)</td></tr>
  <tr><td>Stringify</td><td><code>public override string ToString()</code></td><td><code>@Override public String toString()</code></td></tr>
  <tr><td>Instantiate</td><td><code>new C(…)</code></td><td><code>new C(…)</code></td></tr>
</table>
<p>Inside a method, <code>this.</code> is optional when there is no name clash —
<code>balance</code> and <code>this.balance</code> refer to the same field. It
becomes mandatory only to disambiguate a field from a parameter of the same name
(exactly what the constructor does). Notice <code>owner</code> is
<code>final</code> in the solution: assign it once in the constructor and it can
never change, the Java equivalent of a C# <code>readonly</code> field. And unlike
C#, whose properties can wrap validation logic behind field-like syntax, Java's
<code>private</code> fields are only ever reachable through explicit method
calls like <code>getBalance()</code>.</p>`,
};
