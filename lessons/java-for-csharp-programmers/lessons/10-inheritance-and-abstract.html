  title: "Inheritance & Abstract Classes",

  intro: `
<p>C# and Java share the same object model: a class <code>extends</code> (in
C#, <code>:</code>) a base, calls <code>super</code> (in C#, <code>base</code>),
and overrides methods. The differences are in the ceremony. Java has a real
<code>abstract</code> keyword for classes and methods (C# has this too), a
<code>@Override</code> annotation the compiler actually enforces (C# requires
<code>override</code> on the subclass member and <code>virtual</code> or
<code>abstract</code> on the base member), and a <code>final</code> keyword
that blocks further subclassing or reassignment (C#'s equivalent is
<code>sealed</code> for classes/methods and <code>readonly</code> for fields).
There is no structural typing — a subtype relationship exists only if you wrote
<code>extends</code> (or, in C#, <code>:</code>).</p>
<table>
  <tr><th>C#</th><th>Java</th></tr>
  <tr><td><code>class Dog : Animal</code></td><td><code>class Dog extends Animal</code></td></tr>
  <tr><td><code>base(name)</code></td><td><code>super(name);</code></td></tr>
  <tr><td><code>base.Speak()</code></td><td><code>super.speak();</code></td></tr>
  <tr><td><code>abstract class</code> / <code>abstract T M()</code></td><td><code>abstract class</code> / <code>abstract T m();</code></td></tr>
  <tr><td><code>x is Dog</code></td><td><code>x instanceof Dog</code></td></tr>
</table>
<p>Two things trip up newcomers. First, Java's <code>@Override</code> is
optional but you should always write it — if the signature does not actually
match a superclass method, the compiler errors instead of silently creating a
new method. This is stricter than C#'s <code>new</code>/<code>override</code>
distinction only in the sense that Java has no silent "hiding" of a base
member; C# requires you to be explicit about hiding vs. overriding, and Java's
<code>@Override</code> plays a similar guardrail role. Second,
<code>final</code> does double duty: on a field or local it means "assign
once" (like C#'s <code>readonly</code>), and on a class or method it forbids
subclassing or overriding (like C#'s <code>sealed</code>).</p>`,

  csharp: `abstract class Employee {
  protected Employee(string name) { Name = name; }
  protected readonly string Name;
  public abstract double BasePay();
  public virtual double TotalPay() => BasePay();
  public string Describe() => $"{Name}: {TotalPay()}";
}

class Manager : Employee {
  public Manager(string name, double bonus) : base(name) { this.bonus = bonus; }
  private readonly double bonus;
  public override double BasePay() => 8000;
  public override double TotalPay() => base.TotalPay() + bonus;
}`,

  task: `
<p>Build a small employee hierarchy that exercises every inheritance feature.</p>
<ol>
  <li>An <code>abstract class Employee</code> with a <code>final</code> field
      <code>name</code>, a constructor that sets it, an
      <code>abstract double basePay()</code>, a concrete
      <code>double totalPay()</code> that returns <code>basePay()</code>, and a
      <code>String describe()</code> returning <code>name + ": " + totalPay()</code>
      (e.g. <code>"Ada: 5000.0"</code>).</li>
  <li>A <code>Developer extends Employee</code> whose constructor calls
      <code>super(name)</code> and whose <code>basePay()</code> (marked
      <code>@Override</code>) returns <code>5000</code>.</li>
  <li>A <code>Manager extends Employee</code> with an extra <code>double bonus</code>.
      Its <code>basePay()</code> returns <code>8000</code>, and its
      <code>totalPay()</code> returns <code>super.totalPay() + bonus</code>.</li>
  <li>A class <code>Payroll</code> with static <code>double totalPayroll(Employee[] emps)</code>
      (sum of every <code>totalPay()</code>) and
      <code>int countManagers(Employee[] emps)</code> using
      <code>instanceof</code>.</li>
</ol>`,

  requirements: [
    { pattern: /abstract\s+class\s+Employee/, message: "Make Employee an abstract class" },
    { pattern: /extends\s+Employee/, message: "Have Developer and Manager extend Employee" },
    { pattern: /instanceof/, message: "Use instanceof to count managers" },
  ],

  tests: [
    { name: "Developer.totalPay() is 5000.0", code: "      expect_eq(new Developer(\"Ada\").totalPay(), 5000.0);" },
    { name: "Manager.totalPay() adds bonus via super", code: "      expect_eq(new Manager(\"Rob\", 2000).totalPay(), 10000.0);" },
    { name: "describe() uses name and totalPay", code: "      expect_eq(new Manager(\"Rob\", 2000).describe(), \"Rob: 10000.0\");" },
    { name: "polymorphism: Employee ref calls override", code: "      Employee e = new Manager(\"Sue\", 500);\n      expect_eq(e.totalPay(), 8500.0);" },
    { name: "Payroll.totalPayroll sums the team", code: "      Employee[] team = { new Developer(\"A\"), new Manager(\"B\", 1000) };\n      expect_eq(Payroll.totalPayroll(team), 14000.0);" },
    { name: "Payroll.countManagers uses instanceof", code: "      Employee[] team = { new Developer(\"A\"), new Manager(\"B\", 1000), new Manager(\"C\", 0) };\n      expect_eq(Payroll.countManagers(team), 2);" },
    { name: "a Manager is an Employee", code: "      expect_true(new Manager(\"X\", 0) instanceof Employee);" },

  solution: `abstract class Employee {
  protected final String name;

  protected Employee(String name) {
    this.name = name;
  }

  abstract double basePay();

  double totalPay() {
    return basePay();
  }

  String describe() {
    return name + ": " + totalPay();
  }
}

class Developer extends Employee {
  Developer(String name) {
    super(name);
  }

  @Override
  double basePay() {
    return 5000;
  }
}

class Manager extends Employee {
  private final double bonus;

  Manager(String name, double bonus) {
    super(name);
    this.bonus = bonus;
  }

  @Override
  double basePay() {
    return 8000;
  }

  @Override
  double totalPay() {
    return super.totalPay() + bonus;
  }
}

class Payroll {
  static double totalPayroll(Employee[] emps) {
    double sum = 0;
    for (Employee e : emps) {
      sum += e.totalPay();
    }
    return sum;
  }

  static int countManagers(Employee[] emps) {
    int count = 0;
    for (Employee e : emps) {
      if (e instanceof Manager) {
        count++;
      }
    }
    return count;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Java</th></tr>
  <tr><td>Subclass</td><td><code>class B : A</code></td><td><code>class B extends A</code></td></tr>
  <tr><td>Super constructor</td><td><code>: base(x)</code></td><td><code>super(x);</code></td></tr>
  <tr><td>Super method</td><td><code>base.M()</code></td><td><code>super.m()</code></td></tr>
  <tr><td>Mark an override</td><td><code>override</code> (compiler-checked)</td><td><code>@Override</code> (compiler-checked)</td></tr>
  <tr><td>Abstract member</td><td><code>abstract T M();</code></td><td><code>abstract T m();</code></td></tr>
  <tr><td>No subclassing</td><td><code>sealed class</code> / <code>sealed</code> method</td><td><code>final class</code> / <code>final</code> method</td></tr>
  <tr><td>Runtime type check</td><td><code>x is B</code></td><td><code>x instanceof B</code></td></tr>
</table>
<p>Polymorphism works exactly like C#: an <code>Employee</code> reference
holding a <code>Manager</code> runs <code>Manager.totalPay()</code>, just as a
C# base-typed reference dispatches to the derived <code>override</code>. One
difference to watch for: in C# a method must be explicitly marked
<code>virtual</code> or <code>abstract</code> before it can be overridden — in
Java every non-<code>final</code>, non-<code>private</code>, non-<code>static</code>
method is implicitly overridable, so <code>@Override</code> is your only
compiler-checked safety net (Java has no separate <code>virtual</code>
keyword). Note also that a class with even one <code>abstract</code> method
must itself be <code>abstract</code> and cannot be instantiated with
<code>new</code>, exactly as in C#.</p>`,
