  intro: `
<p>Java's <code>String</code> will feel familiar — it is immutable, just like a
C# <code>string</code> — but the method names differ and Java has nothing quite
like C#'s <code>$"..."</code> interpolated strings. You either concatenate with
<code>+</code> or reach for <code>String.format</code> (Java's <code>printf</code>-
style formatter, analogous to C#'s <code>string.Format</code>). And when you build
a string in a loop, <code>+=</code> allocates a fresh object every time, so Java
gives you <code>StringBuilder</code> for that — C# has the very same class,
<code>System.Text.StringBuilder</code>.</p>
<table>
  <tr><th>C#</th><th>Java</th></tr>
  <tr><td><code>s.ToUpper()</code></td><td><code>s.toUpperCase()</code></td></tr>
  <tr><td><code>s.Contains("x")</code></td><td><code>s.contains("x")</code></td></tr>
  <tr><td><code>s.Substring(1, 3)</code></td><td><code>s.substring(1, 4)</code></td></tr>
  <tr><td><code>s.Trim()</code></td><td><code>s.strip()</code> (Unicode-aware)</td></tr>
  <tr><td><code>string.Concat(Enumerable.Repeat("ab", 3))</code></td><td><code>"ab".repeat(3)</code></td></tr>
  <tr><td><code>$"{a} and {b}"</code></td><td><code>String.format("%s and %s", a, b)</code></td></tr>
</table>
<p>Two things to keep in mind. First, C#'s <code>Substring(start, length)</code>
takes a start index and a <em>length</em>, while Java's <code>substring(start,
end)</code> takes a start and an <em>end</em> index — mixing those up when
porting code is a classic off-by-one bug. Second, because <code>String</code> is
immutable, every method that "changes" a string actually returns a new one —
<code>s.replace(...)</code> does nothing unless you capture the result, exactly
as with C#'s <code>string</code> methods.</p>`,

  solution: `class Strings {
  static String shout(String s) {
    return s.strip().toUpperCase();
  }

  static String greeting(String name, int count) {
    return String.format("%s x%d", name, count);
  }

  static String initials(String full) {
    StringBuilder sb = new StringBuilder();
    for (String word : full.split(" ")) {
      if (!word.isBlank()) {
        sb.append(word.substring(0, 1).toUpperCase());
      }
    }
    return sb.toString();
  }

  static String censor(String s, String word) {
    return s.replace(word, "***");
  }
}

<p>Watch out: Java's <code>String.split</code> takes a <em>regular expression</em>,
unlike C#'s <code>Split</code>, which splits on literal characters (you need
<code>Regex.Split</code> for a pattern) — so <code>split(".")</code> in Java
splits on every character. Escape it (<code>split("\\\\.")</code>) or use
<code>Pattern.quote</code> when you mean a literal dot. Also note
<code>strip()</code> (Java 11+) is the Unicode-aware replacement for the older
<code>trim()</code>, which only removes ASCII control characters — this actually
brings Java's behavior in line with C#'s <code>Trim()</code>, which has always
been Unicode-aware. And since strings are immutable, <code>StringBuilder</code>
is not an optimization detail but the idiomatic way to assemble text piece by
piece, just like <code>System.Text.StringBuilder</code> in C# — call
<code>toString()</code> when you are done.</p>`,
