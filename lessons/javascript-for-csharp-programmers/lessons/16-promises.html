  title: "Promises",

  intro: `
<p>In C# you reach for <code>Task&lt;T&gt;</code> and <code>async</code>/<code>await</code>,
and the compiler enforces that a <code>Task&lt;int&gt;</code> only ever completes
with an <code>int</code>. JavaScript's Promise is the same basic idea — an
object with a settled state (<em>pending</em>, <em>fulfilled</em>, or
<em>rejected</em>) and a value — but there is no generic parameter and nothing
checks that the value matches anything; <code>then</code> hands you whatever the
previous step actually produced.</p>
<table>
  <tr><th>C#</th><th>JavaScript</th></tr>
  <tr><td><code>Task.FromResult(1)</code> → <code>Task&lt;int&gt;</code></td><td><code>Promise.resolve(1)</code> — value is just <code>1</code></td></tr>
  <tr><td><code>await task</code> then use the <code>int</code></td><td><code>.then((n) =&gt; ...)</code> — <code>n</code> is whatever came through</td></tr>
  <tr><td>exceptions are typed (<code>Exception</code>-derived)</td><td>reject with anything; <code>catch</code> receives it as-is</td></tr>
  <tr><td><code>Task.WhenAll(...)</code> → <code>Task&lt;(A, B)&gt;</code>-ish typed results</td><td><code>Promise.all([...])</code> resolves to a plain array</td></tr>
</table>
<p>Two runtime facts that don't have a direct C# analogue. First, <code>then</code>
always returns a <em>new</em> Promise, and if your callback returns a value that
value becomes the next Promise's fulfillment — returning a Promise flattens it,
there is no <code>Promise&lt;Promise&lt;T&gt;&gt;</code> the way a nested <code>Task</code> can
happen in C# without <code>Unwrap()</code>. Second, a <code>throw</code> inside a
<code>then</code> callback turns into a rejection of the returned Promise, which
is why <code>catch</code> can sit at the end of a chain and catch anything above
it — similar in spirit to how an exception inside an <code>async</code> method
surfaces on the awaited <code>Task</code>.</p>`,

  csharp: `static Task<int> Double(int n) {
    return Task.FromResult(n * 2);
}

static Task<int> SafeDivide(int a, int b) {
    if (b == 0) return Task.FromException<int>(new DivideByZeroException("divide by zero"));
    return Task.FromResult(a / b);
}

static Task<int> FirstDone(List<Task<int>> tasks) {
    return Task.WhenAny(tasks).Unwrap();
}`,

  task: `
<p>Everything here settles immediately — no timers. Build a few functions that
exercise the Promise API using patterns that echo <code>Task&lt;T&gt;</code> in C#,
but written as plain runtime JavaScript.</p>
<ol>
  <li><code>double(n)</code> — return a Promise that <strong>fulfills</strong> with
      <code>n * 2</code> (use <code>Promise.resolve</code>).</li>
  <li><code>safeDivide(a, b)</code> — return a Promise. If <code>b</code> is
      <code>0</code>, <strong>reject</strong> with <code>new Error("divide by zero")</code>
      (use <code>Promise.reject</code>); otherwise resolve with <code>a / b</code>.</li>
  <li><code>chainDouble(n)</code> — call <code>double(n)</code> and use
      <code>.then(...)</code> to return a Promise that fulfills with the doubled
      value <em>plus 1</em>.</li>
  <li><code>divideOrDefault(a, b, fallback)</code> — call <code>safeDivide</code>
      and use <code>.catch(...)</code> so that on rejection it fulfills with

  <li><code>sumAll(promises)</code> — use <code>Promise.all</code> to wait for an
      array of number-promises, then resolve with their sum.</li>
  <li><code>describeSettled(promises)</code> — use <code>Promise.allSettled</code>
      and resolve with an array of strings: <code>"ok:&lt;value&gt;"</code> for each
      fulfilled entry and <code>"err:&lt;message&gt;"</code> for each rejected one.</li>
</ol>`,

  exportNames: ["double", "safeDivide", "chainDouble", "divideOrDefault", "sumAll", "describeSettled"],

  requirements: [
    { pattern: /Promise\.resolve/, message: "Use Promise.resolve" },
    { pattern: /Promise\.reject/, message: "Use Promise.reject for the divide-by-zero case" },
    { pattern: /\.then\s*\(/, message: "Use .then to chain in chainDouble" },
    { pattern: /\.catch\s*\(/, message: "Use .catch in divideOrDefault" },
    { pattern: /Promise\.all\b/, message: "Use Promise.all in sumAll" },

  tests: [
    { name: "double(21) fulfills with 42", run: async (x) => expectEqual(await x.double(21), 42) },
    { name: "safeDivide(10, 2) fulfills with 5", run: async (x) => expectEqual(await x.safeDivide(10, 2), 5) },
    {

      run: async (x) => {
        let msg = null;

    },
    { name: "chainDouble(20) fulfills with 41", run: async (x) => expectEqual(await x.chainDouble(20), 41) },

      name: "sumAll resolves the total",
      run: async (x) => expectEqual(await x.sumAll([Promise.resolve(1), Promise.resolve(2), Promise.resolve(3)]), 6),

      name: "describeSettled reports ok and err entries",
      run: async (x) => expectDeepEqual(

  solution: `function double(n) {
  return Promise.resolve(n * 2);
}

function safeDivide(a, b) {
  if (b === 0) return Promise.reject(new Error("divide by zero"));
  return Promise.resolve(a / b);
}

function chainDouble(n) {
  return double(n).then((d) => d + 1);
}

function divideOrDefault(a, b, fallback) {
  return safeDivide(a, b).catch(() => fallback);
}

function sumAll(promises) {
  return Promise.all(promises).then((values) => values.reduce((t, v) => t + v, 0));
}

function describeSettled(promises) {
  return Promise.allSettled(promises).then((results) =>
    results.map((r) =>
      r.status === "fulfilled" ? "ok:" + r.value : "err:" + r.reason.message
    )
  );
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>JavaScript (runtime)</th></tr>
  <tr><td>Already-settled value</td><td><code>Task.FromResult(1)</code></td><td><code>Promise.resolve(1)</code></td></tr>
  <tr><td>Rejection value</td><td>typed <code>Exception</code> caught in <code>catch (Exception e)</code></td><td>whatever you rejected with</td></tr>
  <tr><td>Chaining</td><td><code>await</code> unwraps a <code>Task&lt;T&gt;</code> to its <code>T</code></td><td><code>then</code> returns a new Promise; returned values flatten</td></tr>
  <tr><td>Wait for all</td><td><code>Task.WhenAll</code> gives you each task's typed result</td><td>resolves to a plain array, rejects on first failure</td></tr>
  <tr><td>Wait for all, keep errors</td><td>no direct equivalent — you'd wrap each task and catch individually</td><td><code>Promise.allSettled</code> → <code>{status, value|reason}[]</code>, never rejects</td></tr>
  <tr><td>First to settle</td><td><code>Task.WhenAny</code></td><td><code>Promise.race</code> settles with the first result, win or lose</td></tr>
</table>
<p>Reach for <code>Promise.all</code> when you need every result and one failure
should sink the whole thing; reach for <code>Promise.allSettled</code> when you
want to inspect each outcome — its result objects are <code>{ status:
"fulfilled", value }</code> or <code>{ status: "rejected", reason }</code>.
<code>Promise.race</code> settles as soon as the first input does, whether that
first one fulfills or rejects.</p>
<p>Runtime gotcha with no compiler backstop: <code>Promise.reject(x)</code>
creates an already-rejected Promise, and if nothing ever attaches a
<code>catch</code> to it you get an "unhandled rejection" warning — there is no
equivalent of an unobserved faulted <code>Task</code> being flagged for you at
compile time. And because a thrown error inside <code>then</code> becomes a
rejection, a single trailing <code>.catch</code> (or <code>try/await/catch</code>)
covers the whole chain above it.</p>`,
};
