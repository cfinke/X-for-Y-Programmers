  number: 2,
  title: "Strings",

  intro: `
<p>Strings feel familiar coming from C#, but the machinery underneath is
different. C#'s <code>string</code> is a fixed type with real methods on a
real class; JavaScript's string is a primitive, and every method you call on
it is a plain function on the built-in <code>String.prototype</code> that the
engine auto-boxes just long enough to run. There's no compiler tracking
whether a value is really a string — a value you <em>believe</em> is a string
might turn out to be <code>undefined</code> at runtime, and nothing will stop
you until it throws.</p>
<table>
  <tr><th>C#</th><th>JavaScript</th></tr>
  <tr><td><code>string s = "Ada";</code></td><td><code>const s = "Ada";</code></td></tr>
  <tr><td><code>int n = s.Length;</code></td><td><code>const n = s.length;</code></td></tr>
  <tr><td><code>s.Substring(0, 3)</code></td><td><code>s.slice(0, 3)</code></td></tr>
  <tr><td>return type declared as <code>string</code></td><td>whatever the method actually returns</td></tr>
</table>
<p>Two runtime facts worth keeping in mind. First, strings are immutable in
both languages: <code>toUpperCase()</code>, <code>trim()</code>,
<code>replace()</code> and friends never mutate — they return a brand-new
string, so you must use the return value, just like <code>string.Trim()</code>
in C#. Second, a template literal (<code>\`hello \${name}\`</code>) calls
<code>String()</code> on every interpolated value, which is why
<code>\`\${null}\`</code> quietly becomes <code>"null"</code> — there's no
compile-time check like C#'s string interpolation gives you.</p>`,

  csharp: `string Initials(string fullName) {
    return string.Concat(
        fullName
            .Trim()
            .Split(' ')
            .Select(part => char.ToUpper(part[0]))
    );
}

string Slug(string title) {
    return Regex.Replace(title.Trim().ToLower(), @"\\s+", "-");
}`,

  task: `
<p>Build a few small, pure string helpers — plain JavaScript, no annotations.
Each returns a new string (or number) and mutates nothing.</p>
<ol>
  <li><code>shout(text)</code> — trim the surrounding whitespace and return the
      result in UPPERCASE.</li>
  <li><code>initials(fullName)</code> — split the name on spaces and return the
      first letter of each part, uppercased and joined (e.g.
      <code>"ada lovelace"</code> &rarr; <code>"AL"</code>).</li>
  <li><code>slug(title)</code> — trim, lowercase, and replace every run of
      whitespace with a single hyphen (e.g. <code>"  Hello  World "</code>
      &rarr; <code>"hello-world"</code>).</li>
  <li><code>lastName(fullName)</code> — return everything after the last space
      using <code>indexOf</code>/<code>lastIndexOf</code> and <code>slice</code>.</li>
  <li><code>zeroPad(value, width)</code> — turn <code>value</code> into a string

  <li><code>mentions(text, needle)</code> — return <code>true</code> if
      <code>text</code> contains <code>needle</code>, case-insensitively.</li>
</ol>`,

`,

  exportNames: ["shout", "initials", "slug", "lastName", "zeroPad", "mentions"],

  requirements: [
    { pattern: /toUpperCase\s*\(/, message: "Use toUpperCase() to uppercase text" },
    { pattern: /toLowerCase\s*\(/, message: "Use toLowerCase() for case-insensitive work" },
    { pattern: /\.trim\s*\(/, message: "Use trim() to strip surrounding whitespace" },
    { pattern: /\.split\s*\(/, message: "Use split() to break a string into parts" },
    { pattern: /\.replace\s*\(/, message: "Use replace() to build the slug" },
    { pattern: /padStart\s*\(/, message: "Use padStart() in zeroPad" },
    { pattern: /\.includes\s*\(/, message: "Use includes() in mentions" },
  ],

  tests: [
    { name: 'shout("  hi  ") is "HI"', run: (x) => expectEqual(x.shout("  hi  "), "HI") },
    { name: 'shout("Hello, World") is "HELLO, WORLD"', run: (x) => expectEqual(x.shout("Hello, World"), "HELLO, WORLD") },
    { name: 'initials("ada lovelace") is "AL"', run: (x) => expectEqual(x.initials("ada lovelace"), "AL") },
    { name: 'initials("Grace Brewster Hopper") is "GBH"', run: (x) => expectEqual(x.initials("Grace Brewster Hopper"), "GBH") },
    { name: 'slug("  Hello  World ") is "hello-world"', run: (x) => expectEqual(x.slug("  Hello  World "), "hello-world") },
    { name: 'lastName("Ada Lovelace") is "Lovelace"', run: (x) => expectEqual(x.lastName("Ada Lovelace"), "Lovelace") },
    { name: 'lastName("Grace Brewster Hopper") is "Hopper"', run: (x) => expectEqual(x.lastName("Grace Brewster Hopper"), "Hopper") },
    { name: 'zeroPad(7, 3) is "007"', run: (x) => expectEqual(x.zeroPad(7, 3), "007") },
    { name: 'zeroPad(1234, 3) is "1234" (already wide enough)', run: (x) => expectEqual(x.zeroPad(1234, 3), "1234") },
    { name: 'mentions("Hello World", "world") is true', run: (x) => expectTruthy(x.mentions("Hello World", "world")) },
    { name: 'mentions("Hello World", "xyz") is false', run: (x) => expectEqual(x.mentions("Hello World", "xyz"), false) },
  ],

  solution: `function shout(text) {
  return text.trim().toUpperCase();
}

function initials(fullName) {
  return fullName
    .trim()
    .split(" ")
    .map((part) => part[0].toUpperCase())
    .join("");
}

function slug(title) {
  return title.trim().toLowerCase().replace(/\\s+/g, "-");
}

function lastName(fullName) {
  const trimmed = fullName.trim();
  const at = trimmed.lastIndexOf(" ");
  return at === -1 ? trimmed : trimmed.slice(at + 1);
}

function zeroPad(value, width) {
  return String(value).padStart(width, "0");
}

function mentions(text, needle) {
  return text.toLowerCase().includes(needle.toLowerCase());
}
`,

  notes: `
<table>
  <tr><th>Task</th><th>C# instinct</th><th>JavaScript runtime</th></tr>
  <tr><td>Uppercase</td><td><code>s.ToUpper()</code></td><td><code>s.toUpperCase()</code> — new string</td></tr>
  <tr><td>Contains?</td><td><code>s.Contains(x)</code></td><td><code>s.includes(x)</code> — case-sensitive</td></tr>
  <tr><td>Substring</td><td><code>s.Substring(a, len)</code> — length, not end index</td><td><code>s.slice(a, b)</code>, negatives count from end</td></tr>
  <tr><td>Split</td><td><code>s.Split(sep)</code></td><td><code>s.split(sep)</code> — array of strings</td></tr>
  <tr><td>Pad</td><td><code>s.PadLeft(n, pad)</code></td><td><code>s.padStart(n, pad)</code> — no-op if already &ge; <code>n</code></td></tr>
</table>
<p>A few runtime details C#'s stricter types papered over. <code>indexOf</code>
returns <code>-1</code> when the substring is missing, just like C#'s
<code>IndexOf</code> — but there's no exception-throwing
<code>Substring</code> overload to bail you out if you slice past the end;
JavaScript just clamps or returns an empty string. <code>replace(str, ...)</code>
only replaces the <em>first</em> match, unlike C#'s <code>string.Replace</code>
which replaces every occurrence; use a regex with the <code>/g</code> flag (or
<code>replaceAll</code>) for every match in JavaScript. And because strings
are immutable, forgetting to assign the return value of <code>trim()</code> or
<code>replace()</code> is a classic bug — the same mistake C# programmers
sometimes make with <code>Trim()</code> or <code>Replace()</code> — the
original string is simply unchanged.</p>`,
