<div id="app"></div>
<script>
const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>C# made you declare a type for every variable — or let <code>var</code>
infer one — and checked it at compile time. JavaScript throws that away:
there is no compiler standing between you and the runtime, and a variable's
"type" is nothing more than whatever value it currently holds. Start with the
smallest change: variables lose their declared types.</p>
<table>
  <tr><th>C#</th><th>JavaScript</th></tr>
  <tr><td><code>int age = 36;</code></td><td><code>let age = 36;</code></td></tr>
  <tr><td><code>const string name = "Ada";</code></td><td><code>const name = "Ada";</code></td></tr>
  <tr><td>types checked at compile time</td><td><code>typeof</code> checked at run time</td></tr>
</table>
<p>Without the compiler, nothing stops a variable from changing what kind of
value it holds. <code>let x = 1; x = "one";</code> is perfectly legal
JavaScript; there is no red squiggle or CS0029 to save you. Two habits carry
you a long way: reach for <code>const</code> by default, and use the
<code>typeof</code> operator when you genuinely need to know what you are
holding.</p>`,

  csharp: `int age = 36;
const string userName = "Ada";

string Describe(string name, int age) {
  return name + " is " + age;
}`,

  task: `
<p>Write the plain-JavaScript runtime version of the same code:</p>
<ol>
  <li>Declare a constant <code>userName</code> = <code>"Ada"</code> and a
      variable <code>userAge</code> = <code>36</code> — no type declarations,
      and use <code>let</code> for <code>userAge</code>.</li>
  <li>Write <code>describe(name, age)</code> that returns a string like
      <code>"Ada is 36"</code> using a template literal.</li>
  <li>Write <code>typeOf(value)</code> that returns the JavaScript
      <code>typeof</code> string for whatever it is given.</li>
</ol>`,

  starter: `// 1. userName (const) and userAge (let) — no annotations


// 2. describe(name, age) -> "<name> is <age>"
function describe(name, age) {
  // TODO
  return "";
}

// 3. typeOf(value) -> the typeof string, e.g. "number"
function typeOf(value) {
  // TODO
  return "";
}
`,

  exportNames: ["userName", "userAge", "describe", "typeOf"],

  requirements: [
    { pattern: /const\s+userName/, message: "Declare userName with const" },
    { pattern: /let\s+userAge/, message: "Declare userAge with let" },
    { pattern: /typeof/, message: "Use the typeof operator inside typeOf" },
  ],

  tests: [
    { name: 'userName is "Ada"', run: (x) => expectEqual(x.userName, "Ada") },
    { name: "userAge is 36", run: (x) => expectEqual(x.userAge, 36) },
    { name: 'describe("Ada", 36) returns "Ada is 36"', run: (x) => expectEqual(x.describe("Ada", 36), "Ada is 36") },
    { name: 'describe("Rob", 68) returns "Rob is 68"', run: (x) => expectEqual(x.describe("Rob", 68), "Rob is 68") },
    { name: 'typeOf(1) is "number"', run: (x) => expectEqual(x.typeOf(1), "number") },
    { name: 'typeOf("a") is "string"', run: (x) => expectEqual(x.typeOf("a"), "string") },
    { name: 'typeOf(true) is "boolean"', run: (x) => expectEqual(x.typeOf(true), "boolean") },
  ],

  solution: `const userName = "Ada";
let userAge = 36;

function describe(name, age) {
  return \`\${name} is \${age}\`;
}

function typeOf(value) {
  return typeof value;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>JavaScript</th></tr>
  <tr><td>Typed declaration</td><td><code>int x = 1;</code></td><td><code>let x = 1;</code></td></tr>
  <tr><td>Constant</td><td><code>const int x = 1;</code></td><td><code>const x = 1;</code></td></tr>
  <tr><td>Runtime type check</td><td>the compiler (and reflection, rarely)</td><td><code>typeof x</code></td></tr>
  <tr><td>Reassign a new type</td><td>compile error</td><td>allowed at runtime</td></tr>
</table>
<p><code>typeof</code> returns one of a small set of strings: <code>"number"</code>,
<code>"string"</code>, <code>"boolean"</code>, <code>"undefined"</code>,
<code>"object"</code>, <code>"function"</code>, <code>"symbol"</code>, and
<code>"bigint"</code>. Its famous wart: <code>typeof null === "object"</code>.
The types you leaned on at compile time are gone — <code>typeof</code> is how you
ask the same question while the program runs.</p>`,
};
</script>
