  number: 17,
  title: "Async & Await",

  intro: `
<p>In C#, an <code>async</code> method is typed <code>Task&lt;T&gt;</code> (or
just <code>Task</code> for no return value) and <code>await</code> unwraps it to
<code>T</code>, with the compiler tracking the inner type at every step. JavaScript's
<code>async</code>/<code>await</code> is built on the same idea — the same event
loop, the same microtask queue, the same "a pending operation you can wait on" —
you just lose the <code>Task&lt;T&gt;</code> label telling you what is inside. At
runtime, <code>await</code> works on <em>any</em> thenable and hands you whatever
value it settles to, number, string, object, or <code>undefined</code>.</p>
<table>
  <tr><th>C#</th><th>JavaScript</th></tr>
  <tr><td><code>async Task&lt;int&gt; F()</code></td><td><code>async function f()</code></td></tr>
  <tr><td><code>int n = await F();</code></td><td><code>const n = await f();</code></td></tr>
  <tr><td><code>await Task.WhenAll(taskA, taskB)</code></td><td><code>Promise.all([a, b])</code></td></tr>
  <tr><td>exception typed (e.g. <code>catch (Exception e)</code>)</td><td><code>catch (e)</code> — anything can be thrown</td></tr>
</table>
<p>Two runtime facts matter today. First, <code>await</code> in sequence is
<em>serial</em>: each line waits for the previous promise to settle before the next
even starts — just like awaiting one <code>Task</code> after another in C#. To run
independent work concurrently you hand the promises to <code>Promise.all</code>,
JavaScript's counterpart to <code>Task.WhenAll</code>, which waits for all of them
and resolves to an array of their results. Second, a rejected promise surfaces as a
thrown value at the <code>await</code>, so a plain <code>try/catch</code> catches
it — and if you do not catch it, it propagates out of your <code>async</code>
function as a rejected promise the caller must handle, the same way an unhandled
exception inside a C# <code>async Task</code> method faults the returned task.</p>`,

  csharp: `async Task<int> Double(int n)
{
    return n * 2;
}

async Task<int> SumDoubled(int a, int b)
{
    var results = await Task.WhenAll(Double(a), Double(b));
    return results[0] + results[1];
}

async Task<int> SafeDouble(int n)
{
    try
    {
        return await Double(n);
    }
    catch (Exception)
    {
        return 0;
    }
}`,

  task: `
<p>All promises here resolve immediately — no timers. Write four functions:</p>
<ol>
  <li><code>double(n)</code> — an <code>async</code> function that returns
      <code>n * 2</code>. (Because it is <code>async</code>, callers get a promise.)</li>
  <li><code>sumSequential(a, b)</code> — <code>await</code> <code>double(a)</code>,
      then <code>await</code> <code>double(b)</code>, and return their sum. Two
      awaits, one after the other.</li>
  <li><code>sumConcurrent(nums)</code> — given an array of numbers, run every
      <code>double</code> at once with <code>Promise.all</code> and return the sum
      of the resolved results.</li>
  <li><code>safeParse(value)</code> — <code>await</code> the helper

</ol>
<p>A helper is given to you — paste it as-is into your solution:</p>
<pre><code>async function parseAsync(value) {

  solution: `async function parseAsync(value) {
  const n = Number(value);
  if (Number.isNaN(n)) throw new Error("not a number");
  return n;
}

async function double(n) {
  return n * 2;
}

async function sumSequential(a, b) {
  const x = await double(a);
  const y = await double(b);
  return x + y;
}

async function sumConcurrent(nums) {
  const results = await Promise.all(nums.map((n) => double(n)));
  return results.reduce((total, n) => total + n, 0);
}

async function safeParse(value) {
  try {
    return await parseAsync(value);
  } catch (e) {
    return 0;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>JavaScript</th></tr>
  <tr><td>Return of async method</td><td><code>Task&lt;T&gt;</code></td><td>a promise; contents unlabeled</td></tr>
  <tr><td>Awaited value</td><td>statically typed as <code>T</code></td><td>whatever it settles to</td></tr>
  <tr><td>Serial awaits</td><td><code>await a; await b;</code></td><td>b starts only after a settles</td></tr>
  <tr><td>Concurrency</td><td><code>Task.WhenAll(a, b)</code></td><td><code>Promise.all([a, b])</code> — resolves to a results array</td></tr>
  <tr><td>Caught rejection</td><td><code>catch (Exception e)</code></td><td><code>catch (e)</code> — any thrown value</td></tr>
</table>
<p>The most common runtime performance bug the compiler will never flag: awaiting
independent work in a loop or in sequence when it could run concurrently. Two
serial <code>await</code>s take as long as the sum of both promises;
<code>Promise.all</code> takes as long as the slowest one — the same tradeoff as
choosing <code>Task.WhenAll</code> over a chain of awaited <code>Task</code>s in
C#. Reach for <code>Promise.all</code> whenever the tasks do not depend on each
other.</p>
<p>On errors: a rejected promise becomes a thrown value at its <code>await</code>.
If nothing catches it, your <code>async</code> function returns a
<em>rejected</em> promise — the failure propagates to whoever awaits you, much
like an unobserved exception faulting a C# <code>Task</code> and surfacing when
that task is awaited. C# lets you type the exception in <code>catch (SomeException e)</code>
and dispatch on the type, but JavaScript's <code>catch (e)</code> must be ready
for anything: an <code>Error</code>, a string, even <code>undefined</code>.</p>`,
