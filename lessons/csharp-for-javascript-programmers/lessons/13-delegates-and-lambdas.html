  title: "Delegates & Lambdas",

  intro: `
<p>In JavaScript, functions are just values: you write an arrow function like
<code>(a, b) =&gt; a + b</code>, pass them around, and close over locals. C# does
all of this too, but a function value has a <em>named type</em> called a
<strong>delegate</strong>. You rarely declare one by hand, because the
framework ships generic delegates that cover almost every case:
<code>Func&lt;&gt;</code> for something that returns a value,
<code>Action&lt;&gt;</code> for something that returns <code>void</code>, and
<code>Predicate&lt;T&gt;</code> for a test returning <code>bool</code>.</p>
<table>
  <tr><th>JavaScript</th><th>C#</th></tr>
  <tr><td><code>x =&gt; x + 1</code></td><td><code>Func&lt;int, int&gt;</code></td></tr>
  <tr><td><code>(a, b) =&gt; a + b</code></td><td><code>Func&lt;int, int, int&gt;</code></td></tr>
  <tr><td><code>x =&gt; { console.log(x); }</code></td><td><code>Action&lt;int&gt;</code></td></tr>
  <tr><td><code>x =&gt; x % 2 === 0</code></td><td><code>Predicate&lt;int&gt;</code></td></tr>
  <tr><td><code>x =&gt; x + 1</code></td><td><code>x =&gt; x + 1</code> (same arrow!)</td></tr>
  <tr><td>no named type — JS has no type annotations</td><td><code>delegate int Op(int a, int b);</code></td></tr>
</table>
<p>JavaScript has no static types, so there's nothing labeling "this function
takes two numbers and returns a number" other than a comment or your own
discipline. C# gives that shape an actual name (either a built-in generic
delegate or one you declare yourself). And the lambda arrow <code>=&gt;</code>
is identical to JavaScript's: <code>x =&gt; x + 1</code>, or with a block body
<code>x =&gt; { return x + 1; }</code>. Lambdas capture surrounding variables,
so you can return one that closes over a parameter.</p>`,

  javascript: `function reduce(nums, seed, op) {
  let acc = seed;
  for (const n of nums) acc = op(acc, n);
  return acc;
}

const countWhere = (nums, pred) =>
  nums.filter(pred).length;

const adder = (n) => (x) => x + n;`,

  task: `
<p>Build a <code>static class Higher</code> of higher-order helpers that take
delegates and apply them to data:</p>
<ol>
  <li>Declare a <strong>custom delegate type</strong>
      <code>public delegate int Combine(int a, int b);</code></li>
  <li><code>Reduce(IEnumerable&lt;int&gt; nums, int seed, Combine op)</code> folds
      the numbers: start from <code>seed</code> and apply <code>op(acc, n)</code>

  <li><code>CountWhere(IEnumerable&lt;int&gt; nums, Predicate&lt;int&gt; pred)</code>
      returns how many numbers satisfy <code>pred</code>.</li>
  <li><code>SumMapped(IEnumerable&lt;int&gt; nums, Func&lt;int, int&gt; f)</code>
      applies <code>f</code> to each number and returns the sum of the results.</li>
  <li><code>Adder(int n)</code> returns a <code>Func&lt;int, int&gt;</code> — a

  <li><code>ForEach(IEnumerable&lt;int&gt; nums, Action&lt;int&gt; effect)</code>
      calls <code>effect</code> once per number (returns <code>void</code>).</li>
</ol>
<p>Pass lambdas (<code>x =&gt; x * x</code>) when you call these methods.</p>`,

`,

  requirements: [
    { pattern: /=>/, message: "Use a lambda expression (=>) somewhere in your solution" },
    { pattern: /\bdelegate\b/, message: "Declare the custom delegate type with the delegate keyword" },
  ],

  tests: [
    { name: "Reduce sums with a lambda", code: "      expect_eq(Higher.Reduce(new List<int>{1, 2, 3, 4}, 0, (a, b) => a + b), 10);" },
    { name: "Reduce multiplies with a lambda", code: "      expect_eq(Higher.Reduce(new List<int>{1, 2, 3, 4}, 1, (a, b) => a * b), 24);" },
    { name: "CountWhere counts evens via Predicate", code: "      expect_eq(Higher.CountWhere(new List<int>{1, 2, 3, 4, 5, 6}, x => x % 2 == 0), 3);" },
    { name: "SumMapped sums squares via Func", code: "      expect_eq(Higher.SumMapped(new List<int>{1, 2, 3}, x => x * x), 14);" },
    { name: "Adder returns a closure", code: "      var add5 = Higher.Adder(5);\n      expect_eq(add5(3), 8);" },
    { name: "ForEach runs an Action per element", code: "      int sum = 0;\n      Higher.ForEach(new List<int>{4, 5, 6}, x => sum += x);\n      expect_eq(sum, 15);" },
  ],

  solution: `static class Higher {
  public delegate int Combine(int a, int b);

  public static int Reduce(IEnumerable<int> nums, int seed, Combine op) {
    int acc = seed;
    foreach (var n in nums) {
      acc = op(acc, n);
    }
    return acc;
  }

  public static int CountWhere(IEnumerable<int> nums, Predicate<int> pred) {
    int count = 0;
    foreach (var n in nums) {
      if (pred(n)) count++;
    }
    return count;
  }

  public static int SumMapped(IEnumerable<int> nums, Func<int, int> f) {
    int total = 0;
    foreach (var n in nums) {
      total += f(n);
    }
    return total;
  }

  public static Func<int, int> Adder(int n) {
    return x => x + n;
  }

  public static void ForEach(IEnumerable<int> nums, Action<int> effect) {
    foreach (var n in nums) {
      effect(n);
    }
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>C#</th></tr>
  <tr><td>Value-returning fn</td><td><code>x =&gt; x + 1</code></td><td><code>Func&lt;int, int&gt;</code></td></tr>
  <tr><td>Void fn</td><td><code>x =&gt; { console.log(x); }</code></td><td><code>Action&lt;int&gt;</code></td></tr>
  <tr><td>Boolean test</td><td><code>x =&gt; x % 2 === 0</code></td><td><code>Predicate&lt;int&gt;</code></td></tr>
  <tr><td>Named fn "type"</td><td>none — no type annotations</td><td><code>delegate int Op(int a, int b);</code></td></tr>
  <tr><td>Arrow / lambda</td><td><code>x =&gt; x + 1</code></td><td><code>x =&gt; x + 1</code></td></tr>
  <tr><td>Closure</td><td><code>n =&gt; x =&gt; x + n</code></td><td><code>x =&gt; x + n</code> (captures <code>n</code>)</td></tr>
</table>
<p><code>Func&lt;&gt;</code>, <code>Action&lt;&gt;</code>, and
<code>Predicate&lt;T&gt;</code> are just pre-declared delegate types, so your
<code>Combine</code> above could equally have been a
<code>Func&lt;int, int, int&gt;</code> — a custom delegate mostly earns its keep
when the name documents intent or the signature uses <code>ref</code>/<code>out</code>
parameters that <code>Func</code> cannot express.</p>
<p>Because these are all the same underlying concept, a lambda flows into any
delegate whose shape it matches. This is exactly how LINQ works:
<code>nums.Where(x =&gt; x &gt; 0).Select(x =&gt; x * x).Sum()</code> is just
higher-order methods taking <code>Func</code>/<code>Predicate</code> arguments —
your <code>CountWhere</code> and <code>SumMapped</code> are hand-rolled versions
of <code>Count(pred)</code> and <code>Sum(selector)</code>, much like chaining
<code>.filter()</code> and <code>.map()</code> in JavaScript.</p>`,
