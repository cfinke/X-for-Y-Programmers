  number: 11,
  title: "Generics",

  intro: `
<p>JavaScript has no generics at all — it's dynamically typed, so a function like
<code>identity(x)</code> or a class like <code>Box</code> just works with
whatever value you hand it, no type parameter in sight. C# generics
(<code>Box&lt;T&gt;</code>, <code>Identity&lt;T&gt;(x)</code>) are how the
compiler gives you that same "works with anything" flexibility while still
checking your code at compile time. And C# generics are <em>reified</em> — the
type argument survives to runtime, so <code>new T()</code> and
<code>typeof(T)</code> actually work, something JavaScript doesn't need because
it never erases types in the first place (it never had them).</p>
<p>The other new idea is <strong>constraints</strong>. JavaScript just calls
whatever method it finds at runtime and throws a <code>TypeError</code> if it's
missing; C# wants to know upfront what a <code>T</code> can do. It spells that
out with a <code>where</code> clause after the signature. Constraints let the
compiler know what a <code>T</code> can do — call <code>CompareTo</code> on it,
or <code>new</code> it up — instead of treating it as an opaque blob.</p>
<table>
  <tr><th>JavaScript</th><th>C#</th></tr>
  <tr><td><code>class Box {}</code></td><td><code>class Box&lt;T&gt; {}</code></td></tr>
  <tr><td><code>function id(x) { return x; }</code></td><td><code>T Id&lt;T&gt;(T x)</code></td></tr>
  <tr><td><em>(no equivalent — just calls .compareTo and hopes)</em></td><td><code>where T : IComparable&lt;T&gt;</code></td></tr>
  <tr><td><em>(no equivalent)</em></td><td><code>where T : class, new()</code></td></tr>
</table>
<p>A constraint like <code>where T : IComparable&lt;T&gt;</code> unlocks
<code>a.CompareTo(b)</code>; <code>where T : new()</code> unlocks
<code>new T()</code>; and <code>where T : class</code> promises <code>T</code> is
a reference type so it can be <code>null</code>. You can combine them with commas.</p>`,

  javascript: `class Box {
  #item;
  constructor(item) { this.#item = item; }
  get value() { return this.#item; }
  get isEmpty() { return this.#item == null; }
}

function identity(x) {
  return x;
}

// JS has no runtime constraint, so this just uses the >= operator:
function max(a, b) {
  return a >= b ? a : b;
}`,

  task: `
<p>Build a small generic toolkit. C# has no free functions, so the helper methods

  requirements: [
    { pattern: /class\s+Box\s*<\s*T\s*>/, message: "Declare a generic class Box<T>" },
    { pattern: /where\s+T\s*:\s*IComparable<T>/, message: "Constrain Max with where T : IComparable<T>" },

    { name: "Identity returns its argument (string)", code: "      expect_eq(Generics.Identity(\"hi\"), \"hi\");" },
    { name: "Box<int> stores and returns a value", code: "      var b = new Box<int>(7);\n      expect_eq(b.Value, 7);\n      b.Value = 9;\n      expect_eq(b.Value, 9);" },
    { name: "Box<string> IsEmpty reflects null", code: "      expect_true(new Box<string>(null).IsEmpty);\n      expect_true(!new Box<string>(\"x\").IsEmpty);" },
    { name: "Max(3, 7) is 7", code: "      expect_eq(Generics.Max(3, 7), 7);" },
    { name: "Max on strings compares lexically", code: "      expect_eq(Generics.Max(\"apple\", \"banana\"), \"banana\");" },
    { name: "Create<Widget>() builds a fresh instance", code: "      var w = Generics.Create<Widget>();\n      expect_true(w != null);\n      expect_eq(w.Size, 0);" },

  solution: `public class Box<T> {
  private T item;

  public Box(T item) {
    this.item = item;
  }

  public T Value {
    get { return item; }
    set { item = value; }
  }

  public bool IsEmpty {
    get { return item == null; }
  }
}

public class Widget {
  public int Size { get; set; }
}

public static class Generics {
  public static T Identity<T>(T x) {
    return x;
  }

  public static T Max<T>(T a, T b) where T : IComparable<T> {
    return a.CompareTo(b) >= 0 ? a : b;
  }

  public static T Create<T>() where T : class, new() {
    return new T();
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>C#</th></tr>
  <tr><td>Generic class</td><td><code>class Box {}</code> (no type parameter)</td><td><code>class Box&lt;T&gt; {}</code></td></tr>
  <tr><td>Generic method</td><td><code>function id(x) { return x; }</code></td><td><code>T Id&lt;T&gt;(T x)</code></td></tr>
  <tr><td>Bound / constraint</td><td><em>n/a — duck typing, fails at call time</em></td><td><code>where T : C</code></td></tr>
  <tr><td>Construct a T</td><td><em>n/a — just call the constructor you have</em></td><td><code>new T()</code> with <code>where T : new()</code></td></tr>
  <tr><td>Reference-type only</td><td><em>n/a</em></td><td><code>where T : class</code></td></tr>
  <tr><td>Value-type only</td><td><em>n/a</em></td><td><code>where T : struct</code></td></tr>
</table>
<p>Because C# generics are reified, <code>item == null</code> inside
<code>Box&lt;T&gt;</code> is legal even without a <code>class</code> constraint —
for a value type like <code>int</code> it simply evaluates to <code>false</code>.
That's why <code>Box&lt;int&gt;(0).IsEmpty</code> is <code>false</code>, not a
compile error. JavaScript has no value types in this sense, so the analogous
check (<code>item == null</code> or <code>item === null</code>) is always just a
plain runtime comparison, with no compiler involved.</p>
<p>The <code>new()</code> constraint must come <em>last</em> in a
<code>where</code> list, and it only permits a parameterless constructor —
<code>new T(arg)</code> is never allowed generically. When you need to build a
<code>T</code> with arguments, pass in a <code>Func&lt;..., T&gt;</code> factory
instead — the JavaScript equivalent of passing around a plain constructor
function or factory callback.</p>`,
};
