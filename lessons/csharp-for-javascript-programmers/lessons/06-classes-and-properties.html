  number: 6,
  title: "Classes & Properties",

  intro: `
<p>JavaScript classes and C# classes look almost identical at first glance —
fields, a constructor, methods. The big difference is C#'s <em>properties</em>.
Where JavaScript reaches for <code>get</code>/<code>set</code> accessors or
plain public fields, idiomatic C# uses <em>auto-properties</em>:
<code>public int Age { get; set; }</code> compiles down to a hidden backing field
plus a getter and setter, but reads and writes like a plain field.</p>
<table>
  <tr><th>JavaScript</th><th>C#</th></tr>
  <tr><td><code>#name;</code></td><td><code>private string name;</code></td></tr>
  <tr><td><code>age = 0;</code></td><td><code>public int Age { get; set; }</code></td></tr>
  <tr><td><code>#id; get id() { return this.#id; }</code></td><td><code>public int Id { get; }</code> (get-only)</td></tr>
  <tr><td><code>get total() { return … }</code></td><td><code>public int Total => …;</code></td></tr>
  <tr><td><code>constructor(x) { … }</code></td><td><code>public Thing(int x) { … }</code></td></tr>
</table>
<p>Three things to internalize. First, public members are conventionally
<strong>PascalCase</strong> in C# (<code>Balance</code>, not <code>balance</code>).
Second, a <code>{ get; }</code> property with no setter can only be assigned in
the constructor — that is C#'s <code>readonly</code>, similar in spirit to
exposing only a getter (no setter) for a private <code>#field</code> in
JavaScript. A <code>{ get; private set; }</code> lets the class mutate it while
the outside world sees it as read-only: real encapsulation, the same guarantee
JavaScript's <code>#private</code> fields give you but expressed as part of the
property itself. Third, <code>=></code> defines an <em>expression-bodied
member</em>, the terse form of a computed getter or a one-line method.</p>`,

  javascript: `class BankAccount {
  #balance;

  constructor(owner, initial) {
    this.owner = owner;
    this.#balance = initial;
  }

  get balance() { return this.#balance; }

  deposit(amount) { this.#balance += amount; }

  get summary() { return \`\${this.owner}: \${this.#balance}\`; }
}`,

  task: `
<p>Build a <code>BankAccount</code> class that encapsulates its balance so callers
can only change it through methods:</p>
<ol>
  <li>A constructor <code>BankAccount(string owner, decimal initial)</code>.</li>
  <li><code>Owner</code> — a get-only auto-property (<code>{ get; }</code>) set in

  <li><code>Balance</code> — a <code>decimal</code> auto-property with a
      <code>private set</code>, so outside code can read it but not assign it.</li>
  <li>A private field <code>int transactionCount</code> that counts deposits and
      withdrawals.</li>
  <li><code>Deposit(decimal amount)</code> adds to <code>Balance</code> and bumps

  <li><code>Withdraw(decimal amount)</code> returns <code>false</code> (and does
      nothing) if <code>amount</code> exceeds <code>Balance</code>; otherwise it
      subtracts, bumps the count, and returns <code>true</code>.</li>
  <li><code>TransactionCount</code> and <code>Summary</code> as expression-bodied
      members (<code>=></code>). <code>Summary</code> returns
      <code>"Ada: 150"</code> style text via an interpolated string.</li>
</ol>`,

`,

  requirements: [

  tests: [
    { name: "New account exposes Owner and Balance", code:
      "      var a = new BankAccount(\"Ada\", 100m);\n" +

    { name: "Deposit increases the balance", code:
      "      var a = new BankAccount(\"Ada\", 100m);\n" +

    { name: "Withdraw within balance succeeds", code:
      "      var a = new BankAccount(\"Ada\", 100m);\n" +

      "      expect_eq(a.Balance, 70m);" },
    { name: "Overdraw is rejected and leaves balance untouched", code:
      "      var a = new BankAccount(\"Ada\", 100m);\n" +
      "      expect_true(!a.Withdraw(1000m));\n" +
      "      expect_eq(a.Balance, 100m);" },
    { name: "TransactionCount tracks deposits and withdrawals", code:
      "      var a = new BankAccount(\"Ada\", 100m);\n" +
      "      a.Deposit(10m);\n" +
      "      a.Withdraw(5m);\n" +
      "      a.Withdraw(9999m);\n" +
      "      expect_eq(a.TransactionCount, 2);" },
    { name: "Summary reads owner and balance", code:
      "      var a = new BankAccount(\"Ada\", 100m);\n" +
      "      a.Deposit(50m);\n" +
      "      expect_eq(a.Summary, \"Ada: 150\");" },
  ],

  solution: `class BankAccount {
  public string Owner { get; }
  public decimal Balance { get; private set; }
  private int transactionCount;

  public BankAccount(string owner, decimal initial) {
    Owner = owner;
    Balance = initial;
    transactionCount = 0;
  }

  public void Deposit(decimal amount) {
    Balance += amount;
    transactionCount++;
  }

  public bool Withdraw(decimal amount) {
    if (amount > Balance) {
      return false;
    }
    Balance -= amount;
    transactionCount++;
    return true;
  }

  public int TransactionCount => transactionCount;
  public string Summary => $"{Owner}: {Balance}";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>JavaScript</th><th>C#</th></tr>
  <tr><td>Mutable property</td><td><code>x = 0;</code></td><td><code>int X { get; set; }</code></td></tr>
  <tr><td>Read-only from outside</td><td><code>#x; get x() { return this.#x; }</code></td><td><code>int X { get; private set; }</code></td></tr>
  <tr><td>Immutable after construction</td><td><code>#x</code> set once in constructor</td><td><code>int X { get; }</code></td></tr>
  <tr><td>Computed getter</td><td><code>get total() {…}</code></td><td><code>int Total => …;</code></td></tr>
  <tr><td>Private field</td><td><code>#x</code></td><td><code>private int x;</code></td></tr>
</table>
<p>An auto-property is just sugar: <code>{ get; set; }</code> generates a hidden
backing field and trivial accessors. The moment you need logic — validation,
change tracking — you either switch to a full property with an explicit backing
field, or, as here, keep the auto-property and route all mutation through methods
that guard the invariant. Because the setter is <code>private</code>, no caller
outside <code>BankAccount</code> can bypass <code>Withdraw</code>'s overdraft
check — the same guarantee JavaScript's <code>#private</code> fields provide, but
C# expresses it as an access modifier on the property rather than a separate
private field plus a hand-written getter.</p>
<p>One JavaScript habit to drop: naming public members in camelCase. The .NET
convention is PascalCase for anything public (properties, methods, types) and
camelCase only for private fields, parameters, and locals. The compiler doesn't
enforce it, but every C# codebase you touch will expect it.</p>`,
};
