const LESSON = {
  number: 6,
  title: "Structs & Methods",

  intro: `
<p>A Go <code>struct</code> is the closest thing to a Python <code>class</code>: a
named bundle of typed fields. But Go keeps data and behavior loosely coupled — you
define the fields with <code>struct</code>, then attach methods separately by naming
a <em>receiver</em> before the function name. There is no <code>class</code> keyword
and no <code>self</code>; you pick the receiver's name.</p>
<table>
  <tr><th>Python</th><th>Go</th></tr>
  <tr><td><code>class P:<br>&nbsp;&nbsp;def __init__(self, x, y):<br>&nbsp;&nbsp;&nbsp;&nbsp;self.x = x; self.y = y</code></td><td><code>type P struct { X, Y int }</code></td></tr>
  <tr><td><code>p = P(1, 2)</code></td><td><code>p := P{X: 1, Y: 2}</code></td></tr>
  <tr><td><code>def m(self): …</code></td><td><code>func (c C) M() {…}</code></td></tr>
  <tr><td><code>self.x</code></td><td><code>c.X</code> (receiver name is yours)</td></tr>
</table>
<p>The big new idea is the <strong>receiver kind</strong>. A <em>value receiver</em>
(<code>func (c C) M()</code>) operates on a copy of the struct, so it cannot change
the caller's data. A <em>pointer receiver</em> (<code>func (c *C) M()</code>)
operates on the original, so it is required to mutate. This is like the difference
between passing a copy of an object versus passing the object itself — except in
Python every object reference already behaves like the pointer case, so Go's explicit,
per-method choice has no direct analogue.</p>`,

  python: `class Counter:
    def __init__(self, start):
        self.count = start

    def value(self):
        return self.count

    def increment(self):
        self.count += 1

c = Counter(0)
c.increment()
c.value()  # 1`,

  task: `
<p>Write these as package-level declarations (no <code>package</code>,
<code>import</code>, or <code>main</code> — those are added for you):</p>
<ol>
  <li>A struct <code>type Counter struct { Count int }</code>.</li>
  <li>A <strong>value-receiver</strong> method <code>func (c Counter) Value() int</code>
      that returns <code>c.Count</code>.</li>
  <li>A <strong>pointer-receiver</strong> method <code>func (c *Counter) Increment()</code>
      that does <code>c.Count++</code>. It must be a pointer receiver so the mutation
      sticks.</li>
</ol>
<p>Construct with a field literal: <code>c := Counter{Count: 0}</code>, then call
<code>c.Increment()</code> — Go automatically takes the address of an addressable
value, so you do not write <code>(&amp;c).Increment()</code>.</p>`,

  starter: `type Counter struct {
	Count int
}

func (c Counter) Value() int {
	return 0 // TODO
}

func (c *Counter) Increment() {
	// TODO: mutate c.Count
}
`,

  requirements: [
    { pattern: /type\s+Counter\s+struct/, message: "Define a struct type Counter" },
    { pattern: /func\s+\(c\s+Counter\)\s+Value/, message: "Value must use a value receiver (c Counter)" },
    { pattern: /func\s+\(c\s+\*Counter\)\s+Increment/, message: "Increment must use a pointer receiver (c *Counter)" },
  ],

  tests: [
    { name: "Value reads the constructed field", code: "\t\tc := Counter{Count: 5}\n\t\texpect_eq(c.Value(), 5)" },
    { name: "Increment mutates through the pointer receiver", code: "\t\tc := Counter{Count: 0}\n\t\tc.Increment()\n\t\texpect_eq(c.Value(), 1)" },
    { name: "Increment is repeatable", code: "\t\tc := Counter{Count: 0}\n\t\tc.Increment()\n\t\tc.Increment()\n\t\tc.Increment()\n\t\texpect_eq(c.Count, 3)" },
  ],

  solution: `type Counter struct {
	Count int
}

func (c Counter) Value() int {
	return c.Count
}

func (c *Counter) Increment() {
	c.Count++
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Python</th><th>Go</th></tr>
  <tr><td>Define shape</td><td><code>class C:<br>&nbsp;&nbsp;def __init__(self, x): self.x = x</code></td><td><code>type C struct { X int }</code></td></tr>
  <tr><td>Construct</td><td><code>C(1)</code></td><td><code>C{X: 1}</code></td></tr>
  <tr><td>Read method</td><td><code>def m(self): return self.x</code></td><td><code>func (c C) M() int {…}</code></td></tr>
  <tr><td>Mutating method</td><td><code>def m(self): self.x += 1</code></td><td><code>func (c *C) M() {…}</code></td></tr>
  <tr><td>Receiver name</td><td><code>self</code> (convention)</td><td><code>c</code> (you choose)</td></tr>
</table>
<p>Rule of thumb: if a method changes the struct — or the struct is large enough that
copying it is wasteful — use a pointer receiver. Otherwise a value receiver is fine.
In practice Go programmers keep receiver kinds consistent across a type, so once one
method needs a pointer, most of them use a pointer too.</p>
<p>A subtle payoff: because <code>Increment</code> has a pointer receiver, calling
<code>c.Increment()</code> on a value variable works only because <code>c</code> is
<em>addressable</em>. Go silently rewrites it to <code>(&amp;c).Increment()</code>.
A value receiver would have incremented a throwaway copy and the counter would never
move — a class of bug that cannot happen in Python, where <code>self</code> is always
a reference to the one object.</p>`,
};
