  intro: `
<p>A Go <code>map[K]V</code> is the everyday key/value structure — the rough
equivalent of a Python <code>dict</code>, but with static key and value types
baked in. Create one with <code>make(map[K]V)</code> or a literal, then read
and write with <code>m[k]</code>.</p>
<table>
  <tr><th>Python</th><th>Go</th></tr>
  <tr><td><code>m: dict[str, int] = {}</code></td><td><code>m := make(map[string]int)</code></td></tr>
  <tr><td><code>{ "a": 1, "b": 2 }</code></td><td><code>map[string]int{"a": 1, "b": 2}</code></td></tr>
  <tr><td><code>m["a"] = 1</code></td><td><code>m["a"] = 1</code></td></tr>
  <tr><td><code>m.get("a", 0)</code></td><td><code>m["a"]</code> (missing key gives the zero value)</td></tr>
  <tr><td><code>"a" in m</code></td><td><code>v, ok := m["a"]</code> (comma-ok)</td></tr>
  <tr><td><code>del m["a"]</code></td><td><code>delete(m, "a")</code></td></tr>
</table>
<p>The big difference from Python is the <em>comma-ok</em> read. Reading a
missing key never raises a <code>KeyError</code> — you get the value type's
zero value (<code>0</code>, <code>""</code>, …), much like Python's
<code>m.get("a", 0)</code> with an explicit default. To tell "key is
absent" apart from "key is present with a zero value", use the two-result form
<code>v, ok := m[k]</code>, where <code>ok</code> is a <code>bool</code> — this
is Go's answer to Python's <code>"a" in m</code> check. Also note
<code>range</code> over a map visits pairs in <strong>random</strong> order
(similar in spirit to older Python dicts before 3.7 guaranteed insertion
order), so sort the keys yourself when order matters.</p>`,

  solution: `func Tally(words []string) map[string]int {
	counts := make(map[string]int)
	for _, w := range words {
		counts[w]++
	}
	return counts
}

func Lookup(m map[string]int, key string) (int, bool) {
	v, ok := m[key]
	return v, ok
}

func Keys(m map[string]int) []string {
	keys := make([]string, 0, len(m))
	for k := range m {
		keys = append(keys, k)
	}
	sort.Strings(keys)
	return keys
}

func Remove(m map[string]int, key string) int {
	delete(m, key)
	return len(m)
}

<table>
  <tr><th>Concept</th><th>Python</th><th>Go</th></tr>

<p>Two habits worth internalizing. First, maps are reference types: passing one to
a function and calling <code>delete</code> or assigning a key mutates the
caller's map, exactly like passing a Python <code>dict</code> around — no
copying happens implicitly. Second, the zero-value read is a feature, not a
footgun — <code>counts[w]++</code> works on a brand-new key because the
missing read yields <code>0</code> first, similar to reaching for
<code>collections.defaultdict(int)</code> in Python. Just reach for comma-ok
whenever "absent" and "zero" need to be distinguished, the way you'd otherwise
use <code>"a" in m</code> or a try/except around <code>KeyError</code>.
Finally, never rely on <code>range</code> order; Go deliberately randomizes
it, so sort keys (or values) when you need determinism — Python dicts don't
require this since 3.7, but Go still does.</p>`,
