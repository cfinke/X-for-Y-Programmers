const LESSON = {
  number: 13,
  title: "array_map, array_filter & Friends",

  intro: `
<p>Where Rust builds a lazy pipeline —
<code>.iter().filter(..).map(..).collect()</code> — PHP gives you whole-array
<em>functions</em>: <code>array_filter</code> and <code>array_map</code> each
take an array and return a brand-new array. There is no iterator adapter, no
<code>collect()</code>, and nothing is lazy: every stage allocates and walks
the whole array eagerly. For typical sizes that's fine; just don't expect
fusion. Closures shrink nicely, though —
<code>|p| p.price</code> becomes <code>fn($p) =&gt; $p['price_cents']</code>,
which auto-captures like a non-<code>move</code> Rust closure.</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>.iter().map(f).collect()</code></td><td><code>array_map($f, $arr)</code> — callback <em>first</em></td></tr>
  <tr><td><code>.iter().filter(p).collect()</code></td><td><code>array_filter($arr, $p)</code> — array <em>first</em></td></tr>
  <tr><td><code>.fold(init, f)</code></td><td><code>array_reduce($arr, $f, $init)</code></td></tr>
  <tr><td><code>.sum()</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td><code>|p| p.in_stock</code></td><td><code>fn($p) =&gt; $p['in_stock']</code></td></tr>
</table>
<p>Two traps. First, the argument orders genuinely disagree:
<code>array_map($fn, $arr)</code> but <code>array_filter($arr, $fn)</code> —
a historical accident you just memorize. Second, and more surprising from
Vec-land: <strong><code>array_filter</code> preserves keys</strong>. Filter
<code>[10, 15, 20]</code> down to the evens and you get
<code>[0 =&gt; 10, 2 =&gt; 20]</code> — a hole at index 1. A <code>Vec</code>
could never do that; PHP arrays are ordered maps, so it can. When you need a
clean list again, wrap the result in <code>array_values()</code> to
reindex.</p>`,

  rust: `struct Product {
    name: String,
    price_cents: u32,
    in_stock: bool,
}

fn in_stock_names(products: &[Product]) -> Vec<String> {
    products
        .iter()
        .filter(|p| p.in_stock)
        .map(|p| p.name.clone())
        .collect()
}

fn total_value(products: &[Product]) -> u32 {
    products.iter().map(|p| p.price_cents).sum()
}

fn evens_doubled(nums: &[i32]) -> Vec<i32> {
    nums.iter().filter(|n| **n % 2 == 0).map(|n| n * 2).collect()
}`,

  task: `
<p>Products here are associative arrays shaped like
<code>['name' =&gt; 'Keyboard', 'price_cents' =&gt; 4500, 'in_stock' =&gt; true]</code>.
Port the three pipelines:</p>
<ol>
  <li><code>in_stock_names(array $products): array</code> — the names of the
      in-stock products, as a cleanly reindexed list. Filter, then map, then
      <code>array_values()</code> to close the key holes.</li>
  <li><code>total_value(array $products): int</code> — the sum of every
      product's <code>price_cents</code> (in stock or not). Map to the prices,
      then <code>array_sum()</code> — or do it in one pass with
      <code>array_reduce()</code>, your <code>.fold()</code>.</li>
  <li><code>evens_doubled(array $nums): array</code> — keep the even numbers,
      double them, and return a reindexed list (the tests compare with strict
      <code>===</code>, so leftover keys fail).</li>
</ol>`,

  starter: `<?php

// 1. filter -> map -> array_values. Mind the argument orders:
//    array_filter($arr, $fn) but array_map($fn, $arr).
function in_stock_names(array $products): array {
    throw new Exception("TODO: implement in_stock_names");
}

// 2. .map(|p| p.price_cents).sum()  ->  array_sum(array_map(...))
//    (or array_reduce, PHP's .fold())
function total_value(array $products): int {
    throw new Exception("TODO: implement total_value");
}

// 3. Evens, doubled — and reindexed with array_values().
function evens_doubled(array $nums): array {
    throw new Exception("TODO: implement evens_doubled");
}
`,

  requirements: [
    { pattern: /array_map/, message: "Use array_map (PHP's .map())" },
    { pattern: /array_filter/, message: "Use array_filter (PHP's .filter())" },
    { pattern: /array_values/, message: "Reindex a filtered result with array_values()" },
    { pattern: /array_reduce|array_sum/, message: "Total the prices with array_sum() or array_reduce()" },
  ],

  tests: [
    { name: "in_stock_names picks the in-stock names, reindexed",
      code: "$products = [\n    ['name' => 'Keyboard', 'price_cents' => 4500, 'in_stock' => true],\n    ['name' => 'Mouse', 'price_cents' => 2500, 'in_stock' => false],\n    ['name' => 'Monitor', 'price_cents' => 30000, 'in_stock' => true],\n];\nexpect_eq(in_stock_names($products), ['Keyboard', 'Monitor']);" },
    { name: "in_stock_names([]) returns []",
      code: "expect_eq(in_stock_names([]), []);" },
    { name: "total_value sums price_cents across all products",
      code: "$products = [\n    ['name' => 'Keyboard', 'price_cents' => 4500, 'in_stock' => true],\n    ['name' => 'Mouse', 'price_cents' => 2500, 'in_stock' => false],\n    ['name' => 'Monitor', 'price_cents' => 30000, 'in_stock' => true],\n];\nexpect_eq(total_value($products), 37000);" },
    { name: "evens_doubled([1, 2, 3, 4, 5]) returns [4, 8] with clean 0-based keys",
      code: "expect_eq(evens_doubled([1, 2, 3, 4, 5]), [4, 8]);" },
    { name: "evens_doubled([1, 3, 5]) returns []",
      code: "expect_eq(evens_doubled([1, 3, 5]), []);" },
  ],

  solution: `<?php

function in_stock_names(array $products): array {
    $in_stock = array_filter($products, fn($p) => $p['in_stock']);
    return array_values(array_map(fn($p) => $p['name'], $in_stock));
}

function total_value(array $products): int {
    return array_sum(array_map(fn($p) => $p['price_cents'], $products));
}

function evens_doubled(array $nums): array {
    $evens = array_filter($nums, fn($n) => $n % 2 === 0);
    return array_map(fn($n) => $n * 2, array_values($evens));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>Map</td><td><code>.iter().map(f).collect()</code></td><td><code>array_map($f, $arr)</code> — fn first</td></tr>
  <tr><td>Filter</td><td><code>.filter(p)</code></td><td><code>array_filter($arr, $p)</code> — array first, <em>keys preserved</em></td></tr>
  <tr><td>Reindex after filter</td><td>never needed (Vec)</td><td><code>array_values($arr)</code></td></tr>
  <tr><td>Fold</td><td><code>.fold(init, |acc, x| ..)</code></td><td><code>array_reduce($arr, fn($acc, $x) =&gt; .., $init)</code></td></tr>
  <tr><td>Sum</td><td><code>.sum()</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td>Laziness</td><td>lazy until <code>collect()</code></td><td>none — every call walks and allocates eagerly</td></tr>
  <tr><td>Sort with comparator</td><td><code>.sort_by(..)</code></td><td><code>usort($arr, $cmp)</code> — mutates in place, reindexes</td></tr>
</table>
<p>The key-preservation rule is the one that bites: <code>array_filter</code>
(and friends like <code>array_slice</code> with defaults) keep original keys
because a PHP array is an ordered map even when you're using it as a list.
Strict <code>===</code> comparison and <code>json_encode</code> both notice
the gap — a holey "list" JSON-encodes as an object. Habit to build: any time
a filter feeds something that expects a list, wrap it in
<code>array_values()</code> on the way out.</p>`,
};
