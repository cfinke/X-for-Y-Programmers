const LESSON = {
  number: 15,
  title: "Closures & Callables",

  intro: `
<p>Rust closures capture their environment automatically, and the borrow
checker decides how: by reference, by mutable reference, or by move, with the
<code>Fn</code>/<code>FnMut</code>/<code>FnOnce</code> traits policing what
callers may do. PHP closures are the opposite: explicit and rule-free. A
long-form closure captures <em>nothing</em> unless you list it —
<code>function () use ($x) { .. }</code> — and each listed variable is copied
in <em>by value</em> at creation time (a clone-ish <code>move</code>). Add an
ampersand, <code>use (&amp;$x)</code>, and you capture by reference: the
closure and the outer scope now share one variable, mutable from both sides,
with no exclusivity check and no lifetimes — the garbage collector keeps the
variable alive as long as the closure does.</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>move |x| x * n</code></td><td><code>fn($x) =&gt; $x * $n</code> (arrows auto-capture by value)</td></tr>
  <tr><td>capture by reference (borrow)</td><td><code>function () use (&amp;$count) { .. }</code></td></tr>
  <tr><td><code>FnMut</code> mutating captured state</td><td><code>use (&amp;$count)</code> and assign away — no checker</td></tr>
  <tr><td><code>Rc&lt;RefCell&lt;i32&gt;&gt;</code> for shared mutable counters</td><td>not needed; references + GC</td></tr>
  <tr><td><code>impl Fn(i32) -&gt; i32</code> / trait bounds</td><td><code>Closure</code> as a return type, <code>callable</code> as a parameter hint</td></tr>
</table>
<p>The short arrow form <code>fn($a) =&gt; expr</code> (one expression only)
skips the <code>use</code> clause and auto-captures by value, which is why it
dominated lesson 13. For types: any function value satisfies a
<code>callable</code> parameter hint — a <code>Closure</code> object, a
function name string like <code>'strlen'</code>, or a first-class callable
<code>strlen(...)</code>. There are no <code>Fn</code>-style bounds to
satisfy; calling <code>$f($x)</code> is duck-typed all the way down.</p>`,

  rust: `fn make_multiplier(n: i32) -> impl Fn(i32) -> i32 {
    move |x| x * n // move the captured n into the closure
}

fn apply_twice(f: impl Fn(i32) -> i32, x: i32) -> i32 {
    f(f(x))
}

// FnMut: the closure owns and mutates its own counter.
// Sharing that state with the outside would take Rc<RefCell<_>>.
fn make_counter() -> impl FnMut() -> i32 {
    let mut count = 0;
    move || {
        count += 1;
        count
    }
}`,

  task: `
<p>Port the three closure factories:</p>
<ol>
  <li><code>make_multiplier(int $n): Closure</code> — return an arrow function
      <code>fn(int $x) =&gt; $x * $n</code>; the arrow captures
      <code>$n</code> by value automatically.</li>
  <li><code>apply_twice(callable $f, int $x): int</code> — call
      <code>$f</code> on <code>$x</code>, then on the result. The
      <code>callable</code> hint is your <code>impl Fn(i32) -&gt; i32</code>,
      minus the compile-time signature check.</li>
  <li><code>make_counter(): Closure</code> — declare a local
      <code>$count = 0;</code> and return a long-form closure with
      <code>use (&amp;$count)</code> that increments and returns it: first call
      <code>1</code>, then <code>2</code>, then <code>3</code>. This is the
      shared mutable counter that pushes Rust toward <code>RefCell</code>;
      by-reference capture makes it free here.</li>
</ol>`,

  starter: `<?php

// 1. move |x| x * n  ->  fn(int $x) => $x * $n (auto-captures $n by value)
function make_multiplier(int $n): Closure {
    throw new Exception("TODO: implement make_multiplier");
}

// 2. callable accepts any function value — Closure, 'strlen', or f(...).
function apply_twice(callable $f, int $x): int {
    throw new Exception("TODO: implement apply_twice");
}

// 3. Capture $count BY REFERENCE with use (&$count) so each call
//    mutates the same variable. No RefCell, no borrow checker.
function make_counter(): Closure {
    throw new Exception("TODO: implement make_counter");
}
`,

  requirements: [
    { pattern: /use\s*\(\s*&/, message: "Capture by reference with use (&$count) in make_counter" },
    { pattern: /fn\s*\(/, message: "Use a short arrow function fn(...) => ..." },
    { pattern: /callable|Closure/, message: "Type the function values with callable / Closure" },
  ],

  tests: [
    { name: "make_multiplier(3) returns a closure: (5) gives 15",
      code: "$triple = make_multiplier(3);\nexpect_eq($triple(5), 15);\nexpect_eq($triple(0), 0);" },
    { name: "apply_twice(fn($x) => $x + 3, 10) returns 16",
      code: "expect_eq(apply_twice(fn(int $x) => $x + 3, 10), 16);" },
    { name: "apply_twice composes with make_multiplier: doubling twice is x4",
      code: "expect_eq(apply_twice(make_multiplier(2), 5), 20);" },
    { name: "make_counter() counts 1, 2, 3 across calls",
      code: "$counter = make_counter();\nexpect_eq($counter(), 1);\nexpect_eq($counter(), 2);\nexpect_eq($counter(), 3);" },
    { name: "two counters keep independent state",
      code: "$a = make_counter();\n$b = make_counter();\n$a();\n$a();\nexpect_eq($b(), 1);\nexpect_eq($a(), 3);" },
  ],

  solution: `<?php

function make_multiplier(int $n): Closure {
    return fn(int $x) => $x * $n;
}

function apply_twice(callable $f, int $x): int {
    return $f($f($x));
}

function make_counter(): Closure {
    $count = 0;
    return function () use (&$count): int {
        $count += 1;
        return $count;
    };
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>Short closure</td><td><code>|x| x * n</code></td><td><code>fn($x) =&gt; $x * $n</code> (one expression, auto-capture by value)</td></tr>
  <tr><td>Long closure</td><td><code>|x| { .. }</code></td><td><code>function ($x) use ($n) { .. }</code> — captures are explicit</td></tr>
  <tr><td>Capture by value / move</td><td><code>move</code></td><td><code>use ($n)</code> — copied at creation time</td></tr>
  <tr><td>Capture by reference</td><td>borrow, checked</td><td><code>use (&amp;$n)</code> — shared, unchecked, GC-kept</td></tr>
  <tr><td>Function parameter type</td><td><code>impl Fn(i32) -&gt; i32</code></td><td><code>callable</code> (or <code>Closure</code> for the object only)</td></tr>
  <tr><td>Returning a closure</td><td><code>-&gt; impl Fn(..)</code></td><td><code>: Closure</code></td></tr>
  <tr><td>Named function as a value</td><td><code>f</code> (fn item)</td><td><code>'strlen'</code> (string) or <code>strlen(...)</code> (first-class callable)</td></tr>
  <tr><td>Shared mutable state</td><td><code>Rc&lt;RefCell&lt;T&gt;&gt;</code></td><td>a by-reference capture</td></tr>
</table>
<p>The mental swap: Rust closures capture implicitly but mutate under strict
rules; PHP closures capture explicitly but mutate with none. By-value
<code>use ($x)</code> snapshots the variable, so later changes outside the
closure are invisible inside it — closest in spirit to <code>move</code> of a
<code>Clone</code> value. By-reference <code>use (&amp;$x)</code> is an
unchecked <code>FnMut</code>-and-then-some: any number of closures can share
and mutate the same variable, and nothing stops them from doing it —
convenient exactly where Rust makes you reach for <code>RefCell</code>, and
your own job to keep sane.</p>`,
};
