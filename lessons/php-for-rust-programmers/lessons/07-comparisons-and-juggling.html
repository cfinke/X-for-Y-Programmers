const LESSON = {
  number: 7,
  title: "Comparisons & Type Juggling",

  intro: `
<p>In Rust, <code>"1" == 1</code> isn't false — it's a <em>compile error</em>.
Equality across types simply doesn't typecheck. PHP goes the other way
entirely: <code>==</code> <em>juggles</em> types at runtime, converting
operands until they're comparable, so <code>"1" == 1</code> is
<code>true</code>. The fix is <code>===</code>: identical value <em>and</em>
identical type, no conversions — the type-checked equality you're used to,
enforced at runtime instead of compile time. The rule for this course and for
professional PHP is blunt: <strong>always use <code>===</code></strong> (and
<code>!==</code>), and treat every <code>==</code> in review as a bug until
proven otherwise.</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>"1" == 1</code> → compile error</td><td><code>"1" == 1</code> → <code>true</code> (juggled!)</td></tr>
  <tr><td><code>a == b</code> (types already match)</td><td><code>$a === $b</code> (value <em>and</em> type)</td></tr>
  <tr><td><code>if</code> requires a <code>bool</code></td><td><code>if ($anything)</code> — truthiness applies</td></tr>
  <tr><td><code>a.cmp(&amp;b)</code> → <code>Ordering</code></td><td><code>$a &lt;=&gt; $b</code> → <code>-1 | 0 | 1</code></td></tr>
</table>
<p>Truthiness is the second habit-breaker: Rust conditions must be
<code>bool</code>, but PHP will coerce anything. <code>""</code>,
<code>0</code>, <code>"0"</code> (yes, the <em>string</em> "0"),
<code>0.0</code>, <code>null</code>, and <code>[]</code> are all falsy;
everything else is truthy. And when you need a full three-way comparison,
the spaceship <code>&lt;=&gt;</code> is <code>Ordering</code> as an int:
<code>-1</code>, <code>0</code>, or <code>1</code>.</p>`,

  rust: `fn same_value_and_type(a: i64, b: i64) -> bool {
    // Rust: == across types doesn't even compile.
    // "1" == 1   // error[E0277]: can't compare &str with {integer}
    a == b
}

fn is_truthy(v: &str) -> bool {
    // No truthiness in Rust: an if wants a bool,
    // so you spell the rule out yourself.
    !v.is_empty()
}

fn compare_nums(a: i64, b: i64) -> std::cmp::Ordering {
    a.cmp(&b) // Less | Equal | Greater
}`,

  task: `
<p>PHP hands you <code>mixed</code> (any type — the ground state of a dynamic
language) and you must impose order on it:</p>
<ol>
  <li><code>same_value_and_type(mixed $a, mixed $b): bool</code> — return
      whether the two are identical using <code>===</code>. This is the
      equality Rust's <code>==</code> always was.</li>
  <li><code>is_truthy(mixed $v): bool</code> — expose PHP's truthiness rules
      by casting: <code>(bool) $v</code>. The tests probe the famous falsy
      set, including the string <code>"0"</code>.</li>
  <li><code>compare_nums(int $a, int $b): int</code> — return
      <code>-1</code>, <code>0</code>, or <code>1</code> with one use of the
      spaceship operator <code>&lt;=&gt;</code>. No branching needed.</li>
</ol>`,

  starter: `<?php

// 1. Identical: same value AND same type. Use ===, never ==.
function same_value_and_type(mixed $a, mixed $b): bool {
    throw new Exception("TODO: implement same_value_and_type");
}

// 2. What PHP would do to $v in an if-condition. Cast with (bool).
function is_truthy(mixed $v): bool {
    throw new Exception("TODO: implement is_truthy");
}

// 3. Ordering as an int: -1, 0, or 1. One spaceship, no ifs.
function compare_nums(int $a, int $b): int {
    throw new Exception("TODO: implement compare_nums");
}
`,

  requirements: [
    { pattern: /===/, message: "Use the identity operator === (never bare ==)" },
    { pattern: /<=>/, message: "Use the spaceship operator <=> in compare_nums" },
    { pattern: /\(bool\)/, message: "Use a (bool) cast to apply PHP's truthiness rules" },
  ],

  tests: [
    { name: "same_value_and_type(1, 1) is true",
      code: "expect_true(same_value_and_type(1, 1));" },
    { name: 'the juggling gotcha: "1" == 1 is true, but same_value_and_type("1", 1) is false',
      code: 'expect_true("1" == 1);\nexpect_true(!same_value_and_type("1", 1));' },
    { name: '0 == "" style traps: same_value_and_type(0, false) is false',
      code: "expect_true(!same_value_and_type(0, false));\nexpect_true(!same_value_and_type(null, false));" },
    { name: 'the falsy set: "", 0, "0", and [] are all falsy',
      code: 'expect_true(!is_truthy(""));\nexpect_true(!is_truthy(0));\nexpect_true(!is_truthy("0"));\nexpect_true(!is_truthy([]));' },
    { name: 'truthy survivors: "false", " ", and [0] are truthy',
      code: 'expect_true(is_truthy("false"));\nexpect_true(is_truthy(" "));\nexpect_true(is_truthy([0]));' },
    { name: "compare_nums returns -1 / 0 / 1",
      code: "expect_eq(compare_nums(1, 2), -1);\nexpect_eq(compare_nums(5, 5), 0);\nexpect_eq(compare_nums(9, 2), 1);" },
  ],

  solution: `<?php

function same_value_and_type(mixed $a, mixed $b): bool {
    return $a === $b;
}

function is_truthy(mixed $v): bool {
    return (bool) $v;
}

function compare_nums(int $a, int $b): int {
    return $a <=> $b;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>Equality across types</td><td>compile error</td><td><code>==</code> juggles — <code>"1" == 1</code> is true</td></tr>
  <tr><td>Strict equality</td><td><code>==</code> (types must match)</td><td><code>===</code> / <code>!==</code></td></tr>
  <tr><td>Three-way compare</td><td><code>a.cmp(&amp;b)</code> → <code>Ordering</code></td><td><code>$a &lt;=&gt; $b</code> → <code>-1 | 0 | 1</code></td></tr>
  <tr><td>Condition type</td><td>must be <code>bool</code></td><td>anything — coerced by truthiness</td></tr>
  <tr><td>Falsy values</td><td>only <code>false</code></td><td><code>false, 0, 0.0, "", "0", null, []</code></td></tr>
  <tr><td>Explicit to-bool</td><td>write the predicate</td><td><code>(bool) $v</code></td></tr>
</table>
<p>The mental model: PHP's <code>==</code> answers "could these be the same
if I squint?", while <code>===</code> answers Rust's question — "are these
the same value of the same type?". Only <code>"0"</code> being falsy tends to
shock: it falls out of PHP's string-to-number coercion history. The spaceship
<code>&lt;=&gt;</code> is how you'll write <code>usort</code> comparators
later — it's <code>Ordering</code> flattened to the int convention C
programmers have used forever.</p>`,
};
