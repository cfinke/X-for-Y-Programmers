  intro: `
<p>Here is the twist: PHP doesn't have a separate map type. The same
<code>array</code> from last lesson is also the <code>HashMap</code> — give
it string keys and it becomes one: <code>['apples' =&gt; 3]</code>. No
<code>HashMap::new()</code>, no <code>.insert()</code> chain, no
<code>.to_string()</code> on every key — a literal, like the map literal
Rust never shipped.</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>HashMap::from([("apples".into(), 3)])</code></td><td><code>['apples' =&gt; 3]</code></td></tr>
  <tr><td><code>m.get(&amp;k).copied().unwrap_or(0)</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td><code>*m.entry(k).or_insert(0) += n;</code></td><td><code>$m[$k] = ($m[$k] ?? 0) + $n;</code></td></tr>
  <tr><td><code>for (k, v) in &amp;m { … }</code></td><td><code>foreach ($m as $k =&gt; $v) { … }</code></td></tr>
  <tr><td><code>m.contains_key(&amp;k)</code></td><td><code>array_key_exists($k, $m)</code></td></tr>
  <tr><td>Iteration order: arbitrary</td><td>Iteration order: <strong>insertion order, guaranteed</strong></td></tr>
</table>
<p>Lookup with a default is an <em>operator</em>: <code>$m[$k] ?? 0</code>
is <code>.get().unwrap_or(0)</code> without the <code>Option</code>
ceremony — a missing key short-circuits to the right-hand side instead of
returning <code>None</code>. The upsert idiom
<code>$m[$k] = ($m[$k] ?? 0) + $n</code> is your
<code>.entry().or_insert()</code>. And one genuine upgrade over
<code>HashMap</code>: PHP arrays are ordered maps — they remember insertion
order, always, something <code>HashMap</code> explicitly never promised
(you'd reach for <code>indexmap</code> to get it).</p>`,

  rust: `use std::collections::HashMap;

fn build_inventory() -> HashMap<String, u32> {
    HashMap::from([("apples".to_string(), 3), ("pears".to_string(), 5)])
}

fn get_count(inv: &HashMap<String, u32>, name: &str) -> u32 {
    inv.get(name).copied().unwrap_or(0)
}

fn add_stock(
    mut inv: HashMap<String, u32>,
    name: &str,
    n: u32,
) -> HashMap<String, u32> {
    *inv.entry(name.to_string()).or_insert(0) += n;
    inv
}

fn total_stock(inv: &HashMap<String, u32>) -> u32 {
    inv.values().sum() // in no particular order
}`,

  solution: `<?php

function build_inventory(): array {
    return ['apples' => 3, 'pears' => 5];
}

function get_count(array $inv, string $name): int {
    return $inv[$name] ?? 0;
}

function add_stock(array $inv, string $name, int $n): array {
    $inv[$name] = ($inv[$name] ?? 0) + $n;
    return $inv;
}

function total_stock(array $inv): int {
    $total = 0;
    foreach ($inv as $name => $qty) {
        $total += $qty;
    }
    return $total;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>Map type</td><td><code>HashMap&lt;K, V&gt;</code></td><td><code>array</code> — same type as lists</td></tr>
  <tr><td>Literal</td><td>none (<code>HashMap::from([...])</code>)</td><td><code>['k' =&gt; v]</code></td></tr>
  <tr><td>Lookup w/ default</td><td><code>m.get(&amp;k).copied().unwrap_or(0)</code></td><td><code>$m[$k] ?? 0</code></td></tr>
  <tr><td>Upsert</td><td><code>*m.entry(k).or_insert(0) += n</code></td><td><code>$m[$k] = ($m[$k] ?? 0) + $n</code></td></tr>
  <tr><td>Has key?</td><td><code>m.contains_key(&amp;k)</code></td><td><code>array_key_exists($k, $m)</code></td></tr>
  <tr><td>Iterate</td><td><code>for (k, v) in &amp;m</code></td><td><code>foreach ($m as $k =&gt; $v)</code></td></tr>
  <tr><td>Order</td><td>arbitrary (use <code>indexmap</code>/<code>BTreeMap</code>)</td><td>insertion order, guaranteed</td></tr>
</table>
<p>One map-vs-list subtlety to file away: <code>[0 =&gt; 'a', 1 =&gt; 'b']</code>
and <code>['a', 'b']</code> are the <em>same value</em> — lists are just
arrays whose keys happen to be 0, 1, 2… This is wonderfully uniform and
occasionally treacherous (delete an element and the keys keep their gaps).
Also mind <code>??</code> vs <code>array_key_exists</code>: a key holding
<code>null</code> looks absent to <code>??</code> but present to
<code>array_key_exists</code> — the difference between
<code>unwrap_or</code> on the value and <code>contains_key</code> on the
slot.</p>`,
