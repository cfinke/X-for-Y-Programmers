  number: 6,
  title: "References & Pointers",

  intro: `
<p>In Java there is one way to reach an object: a reference variable that
either points to it or is <code>null</code>. Assignment copies the reference,
not the object; primitives (<code>int</code>, <code>double</code>, …) are
copied by value; and you never write an address explicitly. C++ splits that
single idea into two distinct tools, and you choose between them.</p>
<p>A <strong>reference</strong> (<code>T&amp;</code>) is an alias for an existing
object. It can never be null and never rebound — it <em>is</em> the thing it
names. Pass <code>int&amp;</code> to let a function write back into the caller's
variable; pass <code>const T&amp;</code> to look without copying. A
<strong>pointer</strong> (<code>T*</code>) is a separate variable holding an
address. It <em>can</em> be <code>nullptr</code>, so it is C++'s way to say
"maybe there is an object here" — like a nullable Java object reference.</p>
<table>
  <tr><th>Java</th><th>C++</th></tr>
  <tr><td><code>f(box)</code> mutates <code>box.value</code></td><td><code>void f(int&amp; n)</code> mutates <code>n</code></td></tr>
  <tr><td>read-only object param (objects always pass by reference)</td><td><code>const std::string&amp; s</code></td></tr>
  <tr><td><code>Integer p</code> (may be <code>null</code>)</td><td><code>const int* p</code> (may be <code>nullptr</code>)</td></tr>
  <tr><td><code>p != null ? p : fallback</code></td><td><code>p ? *p : fallback</code></td></tr>
  <tr><td><code>obj.method()</code></td><td><code>ptr-&gt;method()</code></td></tr>
</table>
<p>Getting a pointer: <code>&amp;x</code> takes the address of <code>x</code>.
Using one: <code>*p</code> reads the pointed-to value, and <code>p-&gt;size()</code>
is shorthand for <code>(*p).size()</code>. A raw pointer here is just a
non-owning "maybe" handle — we are not allocating anything, so there is no
<code>new</code> and no <code>delete</code> in this lesson.</p>`,

  java: `// Java has no int&, so mutation needs a wrapper object:
class IntBox { int value; }

void addInPlace(IntBox box, int delta) {
  box.value += delta;
}

// "maybe an int" is a nullable Integer; the ternary supplies a fallback:
int valueOr(Integer p, int fallback) {
  return p != null ? p : fallback;
}`,

  task: `
<p>Write these free functions. Two mutate through references; two take a
possibly-null pointer.</p>
<ol>
  <li><code>addInPlace(int&amp; n, int delta)</code> returns <code>void</code> and

  <li><code>swapValues(int&amp; a, int&amp; b)</code> returns <code>void</code> and

  <li><code>valueOr(const int* p, int fallback)</code> returns <code>*p</code>
      when <code>p</code> is non-null, otherwise <code>fallback</code>. Check

  <li><code>safeLength(const std::string* s)</code> returns the string's length
      as an <code>int</code> via <code>s-&gt;size()</code>, or <code>-1</code> when
      <code>s</code> is <code>nullptr</code>.</li>
</ol>`,

  requirements: [
    { pattern: /\bint&/, message: "Take an int& parameter so the function can mutate the caller's variable" },

    { name: "valueOr dereferences a non-null pointer", code: "    int v = 42;\n    expect_eq(valueOr(&v, 0), 42);" },
    { name: "valueOr returns the fallback for nullptr", code: "    expect_eq(valueOr(nullptr, -1), -1);" },
    { name: "safeLength reads length through the pointer", code: "    std::string s = \"hello\";\n    expect_eq(safeLength(&s), 5);" },
    { name: "safeLength returns -1 for nullptr", code: "    expect_eq(safeLength(nullptr), -1);" },

  solution: `void addInPlace(int& n, int delta) {
  n += delta;
}

void swapValues(int& a, int& b) {
  int tmp = a;
  a = b;
  b = tmp;
}

int valueOr(const int* p, int fallback) {
  if (p == nullptr) return fallback;
  return *p;
}

int safeLength(const std::string* s) {
  if (s == nullptr) return -1;
  return static_cast<int>(s->size());
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C++</th></tr>
  <tr><td>Mutate caller's value</td><td>wrap in a holder object</td><td><code>void f(int&amp; n)</code></td></tr>
  <tr><td>Read without copying</td><td>pass the object (always by reference)</td><td><code>const std::string&amp; s</code></td></tr>
  <tr><td>Maybe-absent</td><td><code>Integer</code> (nullable)</td><td><code>T*</code> (can be <code>nullptr</code>)</td></tr>
  <tr><td>Address-of</td><td>— (implicit)</td><td><code>&amp;x</code></td></tr>
  <tr><td>Dereference</td><td>— (implicit)</td><td><code>*p</code>, <code>p-&gt;m()</code></td></tr>
</table>
<p>Rule of thumb: reach for a <strong>reference</strong> by default — it cannot be
null, so there is nothing to check, and <code>const T&amp;</code> is the standard
read-only parameter. Reach for a <strong>pointer</strong> only when absence is a
real possibility, and then always test against <code>nullptr</code> before
<code>*</code> or <code>-&gt;</code>; dereferencing a null pointer is undefined
behavior, not a catchable <code>NullPointerException</code>. Note <code>p-&gt;size()</code>
is exactly <code>(*p).size()</code> — the arrow just dereferences and reaches a
member in one step, the way Java's <code>.</code> does automatically once you
hold a reference. When you later need an <em>owning</em> handle, you will use
<code>std::unique_ptr</code> rather than raw <code>new</code>/<code>delete</code>.</p>`,
