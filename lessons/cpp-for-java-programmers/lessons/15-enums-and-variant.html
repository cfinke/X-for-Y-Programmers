  title: "Enums & Variant",

  intro: `
<p>In Java a plain <code>enum</code> already behaves like a strict, scoped type:
its members are referenced as <code>Color.RED</code>, they are full objects
rather than bare integers, and there is no implicit conversion to a number —
you must call <code>.ordinal()</code>. C++ has a direct analog in
<code>enum class</code>. For the second idea — a value that can be one of
several distinct shapes — C++'s <code>std::variant</code> corresponds to
Java's <code>sealed</code> interface with <code>record</code> implementations
and a pattern-matching <code>switch</code>.</p>
<p>An <code>enum class</code> is a <em>scoped</em> enum. Its members live inside
the enum's name (<code>Color::Red</code>, never a bare <code>Red</code>), and it
does not implicitly convert to its integer value — you must ask with
<code>static_cast&lt;int&gt;</code>. That mirrors Java's own enum discipline:
<code>Color.RED</code> is likewise scoped, and getting its integer position
requires an explicit <code>.ordinal()</code> call — neither language lets an
enum quietly decay to a number.</p>
<table>
  <tr><th>Java</th><th>C++</th></tr>
  <tr><td><code>enum Color { RED, GREEN }</code></td><td><code>enum class Color { Red, Green };</code></td></tr>
  <tr><td><code>Color.RED</code></td><td><code>Color::Red</code></td></tr>
  <tr><td><code>Color.RED.ordinal()</code></td><td><code>static_cast&lt;int&gt;(Color::Red)</code></td></tr>
  <tr><td><code>sealed interface Shape permits Circle, Square {}</code></td><td><code>std::variant&lt;Circle, Square&gt;</code></td></tr>
  <tr><td><code>switch (s) { case Circle c -&gt; …; case Square sq -&gt; …; }</code></td><td><code>std::visit(overload, s)</code></td></tr>
</table>
<p>A <code>std::variant&lt;A, B, C&gt;</code> holds exactly one of its listed
types at a time. You ask which with <code>std::holds_alternative&lt;A&gt;(v)</code>,
pull a value out with <code>std::get&lt;A&gt;(v)</code>, and handle every case at
once with <code>std::visit</code>. Unlike a Java sealed interface, where "which"
is simply the object's runtime class, a variant carries that identity inside
itself — <code>std::holds_alternative</code> and <code>std::get</code> ask the
variant directly instead of using <code>instanceof</code> or a pattern-matching
<code>case</code>.</p>`,

  java: `enum Direction { NORTH, EAST, SOUTH, WEST }

Direction turnRight(Direction d) {
  Direction[] values = Direction.values();
  return values[(d.ordinal() + 1) % 4];
}

sealed interface Shape permits Circle, Square {}
record Circle(double radius) implements Shape {}
record Square(double side) implements Shape {}

double area(Shape s) {
  return switch (s) {
    case Circle c -> Math.PI * c.radius() * c.radius();
    case Square sq -> sq.side() * sq.side();
  };
}`,

<p>Model the same ideas in modern C++.</p>
<ol>

</ol>`,

  solution: `enum class Direction { North, East, South, West };

Direction turnRight(Direction d) {
  return static_cast<Direction>((static_cast<int>(d) + 1) % 4);
}

struct Circle { double radius; };
struct Square { double side; };
using Shape = std::variant<Circle, Square>;

double area(const Shape& s) {
  return std::visit([](const auto& shape) -> double {
    using T = std::decay_t<decltype(shape)>;
    if constexpr (std::is_same_v<T, Circle>) {
      return 3.141592653589793 * shape.radius * shape.radius;
    } else {
      return shape.side * shape.side;
    }
  }, s);
}

std::string shapeName(const Shape& s) {
  if (std::holds_alternative<Circle>(s)) {
    return "circle";
  }
  return "square";
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C++</th></tr>
  <tr><td>Scoped enum member</td><td><code>Direction.NORTH</code></td><td><code>Direction::North</code></td></tr>
  <tr><td>Enum to number</td><td><code>d.ordinal()</code> (explicit)</td><td><code>static_cast&lt;int&gt;(d)</code> (explicit)</td></tr>
  <tr><td>Union type</td><td><code>sealed interface Shape permits Circle, Square</code></td><td><code>std::variant&lt;Circle, Square&gt;</code></td></tr>
  <tr><td>Narrowing check</td><td><code>case Circle c -&gt; …</code></td><td><code>std::holds_alternative&lt;Circle&gt;(s)</code></td></tr>
  <tr><td>Extract value</td><td><code>c.radius()</code> (bound by the case)</td><td><code>std::get&lt;Circle&gt;(s).radius</code></td></tr>
  <tr><td>Exhaustive handling</td><td><code>switch (s) { case Circle c -&gt; …; case Square sq -&gt; …; }</code></td><td><code>std::visit(fn, s)</code></td></tr>
</table>
<p>Two idioms are worth internalizing. First, <code>std::get&lt;Circle&gt;(s)</code>
throws <code>std::bad_variant_access</code> if the variant does not currently
hold a <code>Circle</code> — so guard it with <code>std::holds_alternative</code>
first, much like a Java pattern-matching <code>case Circle c</code> only binds
<code>c</code> inside the branch where the match actually succeeds. Second, the
<code>std::visit</code> + generic-lambda + <code>if constexpr</code> pattern is
C++'s way of earning the same guarantee Java's compiler gives for free with a
<code>sealed</code> interface: add a type to the variant (or a new permitted
subtype in Java) and the code stops compiling until every branch is handled.
Because <code>enum class</code> values do not implicitly convert to
<code>int</code>, you cannot accidentally compare a <code>Direction</code> with
a <code>Color</code> — the same discipline Java's own enums already enforce by
requiring an explicit <code>.ordinal()</code> call.</p>`,
