  intro: `
<p>In Java you reach for a <code>HashMap</code> (or a <code>TreeMap</code> when
you need sorted order) to associate keys with values. C++ gives you two
standard containers: <code>std::map</code>, which keeps its keys sorted in a
balanced tree, and <code>std::unordered_map</code>, a hash table with average
O(1) lookup and no ordering — mirroring the split between Java's
<code>TreeMap</code> and <code>HashMap</code>. Both are strongly typed in the
declaration — <code>std::map&lt;std::string, int&gt;</code> fixes the key and
value types up front, the way a Java <code>Map&lt;String, Integer&gt;</code>
does.</p>
<table>
  <tr><th>Java</th><th>C++</th></tr>
  <tr><td><code>Map&lt;String, Integer&gt; m = new HashMap&lt;&gt;();</code></td><td><code>std::map&lt;std::string, int&gt; m;</code></td></tr>
  <tr><td><code>m.put("a", 1);</code></td><td><code>m["a"] = 1;</code></td></tr>
  <tr><td><code>m.get("a")</code> (returns <code>null</code> if missing)</td><td><code>m.at("a")</code> (throws if missing)</td></tr>
  <tr><td><code>m.containsKey("a")</code></td><td><code>m.contains("a")</code></td></tr>
  <tr><td><code>m.size()</code></td><td><code>m.size()</code></td></tr>
</table>
<p>Two gotchas for a Java programmer. First, <code>m["missing"]</code>
does not return <code>null</code> — it <em>inserts</em> a default-constructed
value (<code>0</code> for <code>int</code>) and returns a reference to it,
unlike Java's <code>m.get(missing)</code>, which simply returns
<code>null</code> and leaves the map untouched. To look without inserting, use
<code>.at</code>, <code>.find</code>, <code>.count</code>, or
<code>.contains</code>. Second, iterating yields
<code>std::pair&lt;const Key, Value&gt;</code> elements; destructure them with
structured bindings: <code>for (const auto&amp; [key, value] : m)</code>,
similar to pulling a <code>Map.Entry&lt;String, Integer&gt;</code> out of
<code>m.entrySet()</code> in Java.</p>`,

  solution: `std::unordered_map<std::string, int> wordCounts(const std::vector<std::string>& words) {
  std::unordered_map<std::string, int> counts;
  for (const auto& word : words) {
    counts[word]++;
  }
  return counts;
}

int countOf(const std::unordered_map<std::string, int>& m, const std::string& key) {
  auto it = m.find(key);
  if (it == m.end()) {
    return 0;
  }
  return it->second;
}

bool hasWord(const std::unordered_map<std::string, int>& m, const std::string& key) {
  return m.contains(key);
}

int distinctCount(const std::unordered_map<std::string, int>& m) {
  return static_cast<int>(m.size());
}

int totalCount(const std::unordered_map<std::string, int>& m) {
  int total = 0;
  for (const auto& [word, n] : m) {
    total += n;
  }
  return total;
}
`,

  notes: `
<table>
  <tr><th>Operation</th><th>Java (Map)</th><th>C++</th></tr>
  <tr><td>Declare</td><td><code>new HashMap&lt;String, Integer&gt;()</code></td><td><code>std::unordered_map&lt;std::string, int&gt; m;</code></td></tr>
  <tr><td>Insert / overwrite</td><td><code>m.put(k, v)</code></td><td><code>m[k] = v;</code> or <code>m.insert({k, v})</code></td></tr>
  <tr><td>Read (throwing)</td><td><code>int v = m.get(k);</code> (NPE on auto-unbox if missing)</td><td><code>m.at(k)</code></td></tr>
  <tr><td>Read (safe)</td><td><code>m.getOrDefault(k, d)</code></td><td><code>m.find(k)</code> / <code>m.contains(k)</code></td></tr>
  <tr><td>Membership</td><td><code>m.containsKey(k)</code></td><td><code>m.contains(k)</code> / <code>m.count(k)</code></td></tr>
  <tr><td>Size</td><td><code>m.size()</code></td><td><code>m.size()</code></td></tr>
  <tr><td>Iterate</td><td><code>for (Map.Entry&lt;String, Integer&gt; e : m.entrySet())</code></td><td><code>for (const auto&amp; [k, v] : m)</code></td></tr>
</table>
<p>The most important difference is <code>operator[]</code>. In Java, reading
a missing key with <code>m.get(k)</code> gives <code>null</code> (and throws a
<code>NullPointerException</code> if you immediately auto-unbox that into a
primitive like <code>int</code>); in C++, <code>m[k]</code> on
a missing key silently <em>inserts</em> a default value and hands back a
reference. That is exactly why <code>m[word]++</code> works as a counter — the
first touch creates a <code>0</code>, then increments it — but also why you must
avoid <code>[]</code> for read-only lookups (and it won't even compile on a
<code>const</code> map). Prefer <code>.at</code> when the key must exist,
<code>.find</code> / <code>.contains</code> when it might not.</p>
<p>Choose <code>std::map</code> when you need keys visited in sorted order —
matching Java's <code>TreeMap</code>; choose <code>std::unordered_map</code>
(a hash table, matching Java's <code>HashMap</code>) when you just need fast
lookups. The API shown here is identical between the two, so switching is a
one-word change.</p>`,
