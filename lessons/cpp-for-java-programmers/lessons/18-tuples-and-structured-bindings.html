  intro: `
<p>Java has no built-in tuple type. When you want to return two values
without writing a whole class, you reach for a small <code>record</code> —
<code>record Pair(String name, int age) {}</code> — or, when iterating a
<code>Map</code>, you get a <code>Map.Entry&lt;K, V&gt;</code> for free. To pull
a record apart you either call its accessor methods
(<code>p.name()</code>, <code>p.age()</code>) or, with a modern record
pattern, destructure it directly:
<code>if (p instanceof Pair(String n, int a)) { ... }</code>. C++ has
purpose-built tools for exactly this: <code>std::pair&lt;A, B&gt;</code> holds
exactly two values, <code>std::tuple&lt;...&gt;</code> holds any fixed number,
and <em>structured bindings</em> — <code>auto [a, b] = ...</code> — are C++'s
destructuring, with no <code>instanceof</code> check required.</p>
<table>
  <tr><th>Java</th><th>C++</th></tr>
  <tr><td><code>record Pair(String name, int age) {}</code><br><code>var p = new Pair("Ada", 36);</code></td><td><code>std::pair&lt;std::string, int&gt; p{"Ada", 36};</code></td></tr>
  <tr><td><code>record Triple(String s, int n, boolean b) {}</code></td><td><code>std::tuple&lt;std::string, int, bool&gt;</code></td></tr>
  <tr><td><code>if (p instanceof Pair(var n, var a)) { ... }</code></td><td><code>auto [n, a] = p;</code></td></tr>
  <tr><td><code>p.name()</code>, <code>p.age()</code></td><td><code>p.first</code>, <code>p.second</code> (pair) / <code>std::get&lt;0&gt;(t)</code> (tuple)</td></tr>
  <tr><td><code>return new Pair(x, y);</code></td><td><code>return {x, y};</code> or <code>std::make_tuple(x, y)</code></td></tr>
</table>
<p>Two differences to keep in mind. First, tuple element access is by
<em>compile-time</em> index: <code>std::get&lt;0&gt;(t)</code>, not a named
accessor — the index lives in angle brackets because each slot can be a
different type. Second, structured bindings copy by default; write
<code>auto&amp; [a, b] = ...</code> to bind to the original (handy when you
iterate a <code>std::map</code> and each entry is a
<code>pair&lt;const Key, Value&gt;</code>).</p>`,

  java: `record MinMax(int lo, int hi) {}

static MinMax minMax(int[] v) {
  int lo = v[0], hi = v[0];
  for (int x : v) { if (x < lo) lo = x; if (x > hi) hi = x; }
  return new MinMax(lo, hi);

if (result instanceof MinMax(int lo, int hi)) {

Map<String, Integer> scores = Map.of("Ada", 90, "Rob", 80);
int total = 0;
for (Map.Entry<String, Integer> entry : scores.entrySet()) total += entry.getValue();`,

  solution: `std::pair<int, int> minMax(const std::vector<int>& v) {
  int lo = v[0], hi = v[0];
  for (int x : v) {
    if (x < lo) lo = x;
    if (x > hi) hi = x;
  }
  return {lo, hi};
}

std::tuple<int, int, double> stats(const std::vector<int>& v) {
  int sum = 0;
  for (int x : v) sum += x;
  int count = static_cast<int>(v.size());
  double average = static_cast<double>(sum) / count;
  return std::make_tuple(sum, count, average);
}

int rangeOf(const std::vector<int>& v) {
  auto [lo, hi] = minMax(v);
  return hi - lo;
}

int totalScore(const std::map<std::string, int>& scores) {
  int total = 0;
  for (const auto& [name, score] : scores) {
    total += score;
  }
  return total;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>C++</th></tr>
  <tr><td>Two-value pack</td><td><code>record Pair(A a, B b) {}</code> / <code>Map.Entry&lt;A, B&gt;</code></td><td><code>std::pair&lt;A, B&gt;</code></td></tr>
  <tr><td>N-value pack</td><td><code>record Triple(A a, B b, C c) {}</code></td><td><code>std::tuple&lt;A, B, C&gt;</code></td></tr>
  <tr><td>Build it</td><td><code>return new Pair(x, y);</code></td><td><code>return {x, y};</code> / <code>std::make_tuple(x, y)</code></td></tr>
  <tr><td>Index access</td><td><code>t.a()</code> (named accessor)</td><td><code>std::get&lt;0&gt;(t)</code> (compile-time index)</td></tr>
  <tr><td>Destructure</td><td><code>if (t instanceof Pair(var a, var b)) { ... }</code></td><td><code>auto [a, b] = t;</code></td></tr>
  <tr><td>Destructure by ref</td><td>—</td><td><code>auto&amp; [a, b] = t;</code></td></tr>
</table>
<p>A pair is just a two-element tuple; <code>p.first</code>/<code>p.second</code>
are shorthand for its two slots. Because <code>std::get</code> takes the index
in angle brackets, you cannot index a tuple with a runtime variable — the
compiler must know which slot (and thus which type) you mean. When a function
naturally returns several values, a tuple beats juggling out-parameters or
pointers. And structured bindings shine over a <code>std::map</code>: each entry
is a <code>std::pair&lt;const Key, Value&gt;</code>, so
<code>for (const auto&amp; [key, value] : m)</code> reads much like Java's
<code>for (Map.Entry&lt;String, Integer&gt; e : m.entrySet())</code>, just
without the extra <code>.getKey()</code>/<code>.getValue()</code> calls.</p>`,
