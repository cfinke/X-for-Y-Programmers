  number: 8,
  title: "Data Classes",

  intro: `
<p>In C++ you reach for a plain <code>struct</code> when you just want to
bundle a few fields together — and you get structural equality, a debug
string, and an update-a-copy helper only if you write <code>operator==</code>,
an <code>operator<<</code>, and a copy constructor yourself. Kotlin's answer is
the <strong>data class</strong>: prefix a class with <code>data</code> and the
compiler generates <code>equals()</code>, <code>hashCode()</code>,
<code>toString()</code>, a <code>copy()</code>, and <code>componentN()</code>
destructuring functions from the primary-constructor properties.</p>
<table>
  <tr><th>C++</th><th>Kotlin</th></tr>
  <tr><td><code>struct Point { int x; int y; };</code></td><td><code>data class Point(val x: Int, val y: Int)</code></td></tr>
  <tr><td><code>a.x == b.x && a.y == b.y</code></td><td><code>a == b</code></td></tr>
  <tr><td><code>Point b = a; b.y = 9;</code></td><td><code>p.copy(y = 9)</code></td></tr>
  <tr><td><code>auto [x, y] = p;</code></td><td><code>val (x, y) = p</code></td></tr>
</table>
<p>Because <code>==</code> on a data class calls the generated structural
<code>equals()</code> (Kotlin's <code>==</code> is never reference identity —
that's <code>===</code>), two independently-built <code>Point(1, 2)</code> values
are equal, the same way a hand-written <code>operator==</code> comparing
members would behave, but without you writing it. <code>copy()</code> is the
immutable-update workhorse: it clones the value, overriding only the named
arguments you pass — similar in spirit to copying a struct and then setting a
field, but expressed as a single type-checked call.</p>`,

  cpp: `struct Point {
  int x;
  int y;
};

Point shift(const Point& p, int dx, int dy) {
  return Point{p.x + dx, p.y + dy};
}

Point a{1, 2};
Point b = a;
b.y = 2;
std::cout << (a.x == b.x && a.y == b.y) << "\\n"; // true
auto [x, y] = a;`,

  task: `

<ol>

  <li>Make <code>User</code> a <strong>data class</strong> with

</ol>`,

  requirements: [
    { pattern: /\bdata\s+class\s+Point\b/, message: "Define Point as a data class" },

  tests: [
    { name: "structural equality: Point(1, 2) == Point(1, 2)", code: "        expect_true(Point(1, 2) == Point(1, 2))" },
    { name: "distinct points are not equal", code: "        expect_true(Point(1, 2) != Point(3, 4))" },
    { name: "generated toString", code: "        expect_eq(Point(1, 2).toString(), \"Point(x=1, y=2)\")" },
    { name: "shift returns a copy moved by (dx, dy)", code: "        expect_eq(shift(Point(1, 2), 3, 4), Point(4, 6))" },
    { name: "shift leaves the original untouched", code: "        val p = Point(1, 2)\n        shift(p, 5, 5)\n        expect_eq(p, Point(1, 2))" },
    { name: "sumCoords destructures the point", code: "        expect_eq(sumCoords(Point(3, 4)), 7)" },
    { name: "sumCoords on another point", code: "        expect_eq(sumCoords(Point(5, 6)), 11)" },
    { name: "named-argument construction with default", code: "        expect_eq(User(name = \"Ada\", age = 36), User(\"Ada\", 36, true))" },
    { name: "active defaults to true", code: "        expect_true(User(\"Ada\", 36).active)" },

  solution: `data class Point(val x: Int, val y: Int)

data class User(val name: String, val age: Int, val active: Boolean = true)

fun shift(p: Point, dx: Int, dy: Int): Point {
    return p.copy(x = p.x + dx, y = p.y + dy)
}

fun sumCoords(p: Point): Int {
    val (x, y) = p
    return x + y
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Kotlin</th></tr>
  <tr><td>Value bundle</td><td><code>struct P { int x; };</code></td><td><code>data class P(val x: Int)</code></td></tr>
  <tr><td>Value equality</td><td>write <code>operator==</code></td><td><code>a == b</code> (generated)</td></tr>
  <tr><td>Reference identity</td><td><code>&a == &b</code></td><td><code>a === b</code></td></tr>
  <tr><td>Immutable update</td><td>copy, then mutate a field</td><td><code>p.copy(y = 9)</code></td></tr>
  <tr><td>Destructure</td><td><code>auto [x, y] = p;</code></td><td><code>val (x, y) = p</code></td></tr>
  <tr><td>Debug string</td><td>write <code>operator<<</code></td><td><code>p.toString()</code></td></tr>
</table>
<p>Two things to keep in mind. First, destructuring is
<strong>positional</strong>, not by name: <code>val (x, y) = p</code> calls
<code>p.component1()</code> and <code>p.component2()</code>, so the order of the
constructor properties is what matters — the same positional rule C++'s
structured bindings follow with <code>auto [x, y] = p</code>. Second, only
properties declared in the <em>primary constructor</em> feed the generated
<code>equals</code>, <code>hashCode</code>, <code>toString</code>, and
<code>copy</code>; anything you add in the class body is ignored by them.
Reach for a data class whenever you would have written a plain
<code>struct</code> plus hand-rolled <code>operator==</code> and
<code>operator<<</code>, and reach for named arguments plus defaults instead of
the constructor overloads you might write in C++ to fake optional
parameters.</p>`,
