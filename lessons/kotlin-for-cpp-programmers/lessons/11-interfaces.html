const LESSON = {
  number: 11,
  title: "Interfaces",

  intro: `
<p>Kotlin interfaces will feel familiar, but they do more than a C++ abstract
base class typically does. A C++ "interface" is usually just a class with pure
virtual functions (<code>virtual double area() = 0;</code>) and no data
members — a convention, not a distinct language construct — and a derived
class must publicly inherit from it to conform. A Kotlin interface is a real,
named type you opt into with a colon, and it can carry <strong>default
method bodies</strong> and <strong>property getters</strong> — the job a C++
base class with non-pure virtual methods (or default member implementations)
would do.</p>
<table>
  <tr><th>C++</th><th>Kotlin</th></tr>
  <tr><td><code>struct Shape { virtual double area() = 0; };</code></td><td><code>interface Shape { fun area(): Double }</code></td></tr>
  <tr><td>nominal: <code>class C : public Shape</code></td><td>nominal: <code>class C : Shape</code></td></tr>
  <tr><td>pure virtual accessor</td><td><code>val name: String</code> (abstract)</td></tr>
  <tr><td>non-pure virtual method → body in the base class</td><td><code>fun f() = …</code> right in the interface</td></tr>
  <tr><td><code>class C : public A, public B</code></td><td><code>class C : A, B</code></td></tr>
</table>
<p>Because a Kotlin interface can hold behaviour, you can declare an abstract
<code>val</code>, a <code>val</code> with a default <code>get()</code>, and a
<code>fun</code> with a default body all in one place — then have each class
<code>override</code> only what it needs. And, as in C++, you should
<strong>program to the interface type</strong>: type your parameters and
variables as <code>Employee</code>, not <code>Engineer</code>.</p>`,

  cpp: `class Employee {
public:
    virtual ~Employee() = default;
    virtual std::string name() const = 0;
    virtual double baseSalary() const = 0;
    virtual double bonus() const = 0;
    // A pure interface can't hold logic, so totalPay/summary
    // would have to live in a derived class or a free function.
};

class Engineer : public Employee {
    std::string name_;
    double baseSalary_;
public:
    Engineer(std::string name, double baseSalary)
        : name_(std::move(name)), baseSalary_(baseSalary) {}
    std::string name() const override { return name_; }
    double baseSalary() const override { return baseSalary_; }
    double bonus() const override { return baseSalary_ * 0.1; }
};

double totalPayroll(const std::vector<Employee*>& staff) {
    double sum = 0.0;
    for (auto* e : staff) sum += e->baseSalary() + e->bonus();
    return sum;
}`,

  task: `
<p>Build a small payroll model where the logic lives <em>in the interface</em>,
and the tests talk to everything through the interface type. No class or
<code>main</code> is needed — Kotlin allows top-level declarations.</p>
<ol>
  <li>Declare an <code>Employee</code> interface with two abstract properties
      <code>name: String</code> and <code>baseSalary: Double</code>, and an
      abstract method <code>fun bonus(): Double</code>.</li>
  <li>Give <code>Employee</code> a property <code>totalPay: Double</code> with a
      <strong>default getter</strong> returning
      <code>baseSalary + bonus()</code>, and a <strong>default method</strong>
      <code>fun summary(): String</code> returning
      <code>"$name earns $totalPay"</code>.</li>
  <li>Declare a second interface <code>Manager</code> with
      <code>fun teamSize(): Int</code>.</li>
  <li><code>class Engineer(name, baseSalary) : Employee</code> whose
      <code>bonus()</code> is 10% of <code>baseSalary</code>.</li>
  <li><code>class TeamLead(name, baseSalary, reports) : Employee, Manager</code>
      — <strong>implementing both interfaces</strong> — whose <code>bonus()</code>
      is <code>baseSalary * 0.2 + reports * 100.0</code> and whose
      <code>teamSize()</code> returns <code>reports</code>.</li>
  <li>Write <code>totalPayroll(staff: List&lt;Employee&gt;): Double</code> that
      sums <code>totalPay</code> across the list — programming to the interface.</li>
</ol>`,

  starter: `// 1 & 2. The Employee interface: abstract members, a default property getter,
//        and a default method. Fill in the two defaults.
interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = 0.0            // TODO: baseSalary + bonus()

    fun summary(): String = "" // TODO: "$name earns $totalPay"
}

// 3. A second interface.
interface Manager {
    fun teamSize(): Int
}

// 4. Engineer implements Employee.
class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = 0.0 // TODO: 10% of baseSalary
}

// 5. TeamLead implements BOTH Employee and Manager.
class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = 0.0 // TODO: baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = 0   // TODO: reports
}

// 6. Program to the interface type.
fun totalPayroll(staff: List<Employee>): Double = 0.0 // TODO
`,

  requirements: [
    { pattern: /interface\s+Employee\b/, message: "Declare an Employee interface" },
    { pattern: /fun\s+summary\s*\([^)]*\)\s*:\s*String\s*=/, message: "Give Employee a default summary() method with a body in the interface" },
    { pattern: /:\s*Employee\s*,\s*Manager/, message: "Have TeamLead implement both Employee and Manager" },
  ],

  tests: [
    { name: "Engineer.bonus() is 10% of base", code: "        expect_eq(Engineer(\"Ada\", 1000.0).bonus(), 100.0)" },
    { name: "totalPay via the Employee type uses the default getter", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.totalPay, 1100.0)" },
    { name: "default summary() reads \"Ada earns 1100.0\"", code: "        val e: Employee = Engineer(\"Ada\", 1000.0)\n        expect_eq(e.summary(), \"Ada earns 1100.0\")" },
    { name: "TeamLead satisfies Manager (teamSize)", code: "        val m: Manager = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(m.teamSize(), 3)" },
    { name: "TeamLead is also an Employee (totalPay)", code: "        val emp: Employee = TeamLead(\"Rob\", 2000.0, 3)\n        expect_eq(emp.totalPay, 2700.0)" },
    { name: "totalPayroll sums via the interface", code: "        val staff: List<Employee> = listOf(Engineer(\"Ada\", 1000.0), TeamLead(\"Rob\", 2000.0, 3))\n        expect_eq(totalPayroll(staff), 3800.0)" },
  ],

  solution: `interface Employee {
    val name: String
    val baseSalary: Double
    fun bonus(): Double

    val totalPay: Double
        get() = baseSalary + bonus()

    fun summary(): String = "$name earns $totalPay"
}

interface Manager {
    fun teamSize(): Int
}

class Engineer(override val name: String, override val baseSalary: Double) : Employee {
    override fun bonus(): Double = baseSalary * 0.1
}

class TeamLead(
    override val name: String,
    override val baseSalary: Double,
    val reports: Int,
) : Employee, Manager {
    override fun bonus(): Double = baseSalary * 0.2 + reports * 100.0
    override fun teamSize(): Int = reports
}

fun totalPayroll(staff: List<Employee>): Double = staff.sumOf { it.totalPay }
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Kotlin</th></tr>
  <tr><td>Declare interface</td><td><code>class E { virtual … = 0; };</code></td><td><code>interface E { … }</code></td></tr>
  <tr><td>Implement</td><td><code>class C : public E</code></td><td><code>class C : E</code></td></tr>
  <tr><td>Multiple interfaces</td><td><code>: public A, public B</code></td><td><code>: A, B</code></td></tr>
  <tr><td>Abstract property</td><td><code>virtual std::string name() const = 0;</code></td><td><code>val name: String</code></td></tr>
  <tr><td>Property with logic</td><td>(non-pure virtual, needs a vtable slot)</td><td><code>val p: T get() = …</code></td></tr>
  <tr><td>Default method body</td><td>non-pure <code>virtual</code> with a body in the base class</td><td><code>fun f() = …</code> in the interface</td></tr>
  <tr><td>Override</td><td><code>override</code> keyword (optional but recommended)</td><td><code>override</code> keyword required</td></tr>
</table>
<p>The big shift from C++ is that Kotlin's interface is not a vtable-based
base class you allocate with <code>new</code> and manage through a pointer or
<code>std::unique_ptr</code> — it's a compile-time contract with real default
behaviour built in. A default <code>get()</code> or <code>fun</code> body means
shared logic lives with the contract instead of being duplicated in every
derived class or hoisted into a free function, and there's no need for
virtual destructors or manual lifetime management to make it safe. Kotlin also
requires the <code>override</code> keyword (C++'s is optional, so a typo in a
signature can silently create a brand-new, never-called virtual function
instead of overriding one). When a class implements two interfaces that both
define the same default method, Kotlin makes you resolve it explicitly with
<code>super&lt;A&gt;.f()</code> — much like C++'s diamond-inheritance
ambiguity, but caught by the compiler instead of requiring virtual
inheritance tricks.</p>`,
};
