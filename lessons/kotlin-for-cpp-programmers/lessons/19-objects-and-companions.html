  title: "Objects & Companions",

  intro: `
<p>C++ gives you three separate tools for "one-of-a-kind" and
"class-level" code: a namespace or a global variable for a singleton,
the <code>static</code> keyword for members that hang off the class rather than
an instance, and a small locally-defined class (or a lambda) for a throwaway
implementation. Kotlin folds all three under one keyword — <code>object</code>.</p>
<table>
  <tr><th>C++</th><th>Kotlin</th></tr>
  <tr><td><code>class Tally { static … };</code> (all-static class)</td><td><code>object Tally { … }</code></td></tr>
  <tr><td><code>static User parse(…)</code> on a class</td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td><code>struct PoliteGreeter : Greeter { … }</code> (local class)</td><td><code>object : Greeter { … }</code></td></tr>
  <tr><td><code>private:</code> constructor</td><td><code>class User private constructor(…)</code></td></tr>
</table>
<p>An <strong>object declaration</strong> (<code>object Name { … }</code>) is a
lazily-created singleton — there is exactly one instance and you reach it by its
name. A <strong>companion object</strong> is a singleton that lives inside a
class, so its members read like C++ <code>static</code> members
(<code>User::parse(…)</code> in C++, <code>User.parse(…)</code> in Kotlin), and
because it can see the class's <code>private</code> constructor it is the
idiomatic home for factory functions. An <strong>object expression</strong>
(<code>object : Greeter { … }</code>) is an anonymous instance created on the
spot — Kotlin's answer to a locally-defined class that implements an interface,
something C++ has no single-expression shorthand for; you write a small local
<code>struct</code>/<code>class</code> or reach for a lambda instead.</p>`,

  cpp: `// Singleton: a class made entirely of static members
class Tally {
public:
    static void add(const std::string& item) { items.push_back(item); }
    static int count() { return static_cast<int>(items.size()); }
private:
    static inline std::vector<std::string> items;
};

struct Greeter {
    virtual std::string greet(const std::string& name) const = 0;
    virtual ~Greeter() = default;
};

// Static factory + private constructor
class User {
public:
    static const std::string SPECIES;
    static User parse(const std::string& text) {
        auto sep = text.find(':');
        std::string name = text.substr(0, sep);
        int age = std::stoi(text.substr(sep + 1));
        return User(name, age);
    }
    const std::string name;
    const int age;
private:
    User(std::string name, int age) : name(std::move(name)), age(age) {}
};
const std::string User::SPECIES = "human";

// Locally-defined class implementing an interface
Greeter* politeGreeter() {
    struct PoliteGreeter : Greeter {
        std::string greet(const std::string& name) const override {
            return "Hello, " + name;
        }
    };
    return new PoliteGreeter();
}`,

</ol>`,

  requirements: [
    { pattern: /\bobject\s+Tally\b/, message: "Declare Tally as an object (singleton) declaration" },
    { pattern: /\bcompanion\s+object\b/, message: "Use a companion object for User's factory and constant" },
    { pattern: /\bobject\s*:\s*Greeter\b/, message: "Return an object expression: object : Greeter { … }" },
  ],

  tests: [
    { name: "Tally is a singleton: state persists across calls", code: "        val start = Tally.count()\n        Tally.add(\"apples\")\n        Tally.add(\"pears\")\n        expect_eq(Tally.count(), start + 2)\n        expect_true(Tally.all().contains(\"apples\"))\n        expect_true(Tally.all().contains(\"pears\"))" },
    { name: "Tally.all() returns a copy, not the live list", code: "        val snapshot = Tally.all()\n        Tally.add(\"plums\")\n        expect_eq(snapshot.contains(\"plums\"), false)" },
    { name: "companion factory parses a user", code: "        val u = User.parse(\"Ada:36\")\n        expect_eq(u.name, \"Ada\")\n        expect_eq(u.age, 36)" },
    { name: "companion factory parses another user", code: "        expect_eq(User.parse(\"Rob:68\").age, 68)" },
    { name: "companion constant is reachable on the class", code: "        expect_eq(User.SPECIES, \"human\")" },
    { name: "object expression implements Greeter", code: "        expect_eq(politeGreeter().greet(\"Ada\"), \"Hello, Ada\")" },
    { name: "object expression works for any name", code: "        expect_eq(politeGreeter().greet(\"Rob\"), \"Hello, Rob\")" },
  ],

  solution: `object Tally {
    private val items = mutableListOf<String>()

    fun add(item: String) {
        items.add(item)
    }

    fun count(): Int = items.size

    fun all(): List<String> = items.toList()
}

interface Greeter {
    fun greet(name: String): String
}

class User private constructor(val name: String, val age: Int) {
    companion object {
        const val SPECIES = "human"

        fun parse(text: String): User {
            val parts = text.split(":")
            return User(parts[0], parts[1].toInt())
        }
    }
}

fun politeGreeter(): Greeter = object : Greeter {
    override fun greet(name: String): String = "Hello, $name"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Kotlin</th></tr>
  <tr><td>Singleton</td><td><code>class Tally { static … };</code></td><td><code>object Tally { … }</code></td></tr>
  <tr><td>Class-level member</td><td><code>static User parse(…)</code></td><td><code>companion object { fun parse(…) }</code></td></tr>
  <tr><td>Class-level constant</td><td><code>static const X;</code></td><td><code>const val X</code> (in companion)</td></tr>
  <tr><td>Private constructor</td><td><code>private:</code> constructor</td><td><code>class C private constructor(…)</code></td></tr>
  <tr><td>Anonymous instance</td><td><code>struct : Greeter { … }</code> (local class)</td><td><code>object : Greeter { … }</code></td></tr>
</table>
<p>A companion object is <em>not</em> a bag of statics — it is a genuine
singleton object attached to the class, reachable as
<code>User.Companion</code>, and it can implement interfaces or hold state like
any other object. You get the <code>User.parse(…)</code> call syntax for free
because Kotlin lets you address companion members through the class name, the
same way C++ lets you call <code>User::parse(…)</code> without an instance. A
<code>private constructor</code> plus a companion factory is the standard way to
force construction through a validated entry point — the same shape as a
<code>private:</code> constructor paired with a <code>static</code> factory
method in C++.</p>
<p>One idiomatic wrinkle: Kotlin allows top-level functions, so you often do not
need a singleton at all — a plain <code>fun</code> or a top-level
<code>val</code> replaces many classes you would have written as an all-static
class in C++. Reach for <code>object</code> when you specifically want a
single named instance that carries state or implements an interface.</p>`,
