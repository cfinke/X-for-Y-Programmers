  number: 6,
  title: "Classes & Objects",

  intro: `
<p>Classes will feel familiar — Java and Ruby share the same vocabulary of
fields, constructors, methods and <code>this</code> (Ruby's <code>self</code>).
The differences are mostly about ceremony and defaults. Ruby's
<code>attr_accessor</code>/<code>attr_reader</code> generate getters (and
setters) for you and <code>initialize</code> assigns instance variables with a
sigil instead of a declared field, so there is no field shorthand or type
annotation to write. Java has neither: no attribute macros, no
<code>@balance</code> sigils, and (importantly) no <code>public</code> on the
top-level class in this course: the harness compiles your file as
<code>prog.java</code>, so a <code>public</code> top-level type would be
rejected. Leave classes <em>package-private</em> (no modifier).</p>
<table>
  <tr><th>Ruby</th><th>Java</th></tr>
  <tr><td><code>attr_reader :balance</code></td><td><code>private int balance;</code></td></tr>
  <tr><td><code>def initialize(o); @owner = o; end</code></td><td><code>BankAccount(String o) { this.owner = o; }</code></td></tr>
  <tr><td><code>attr_reader :balance</code></td><td><code>int getBalance() { return balance; }</code></td></tr>
  <tr><td><code>def to_s; …; end</code></td><td><code>@Override public String toString() { … }</code></td></tr>
  <tr><td><code>attr_accessor</code> shorthand</td><td>always assign fields explicitly</td></tr>
</table>
<p>Two things to internalize. First, encapsulation in Java is enforced by
<code>private</code> plus getter methods — there is no <code>attr_reader</code>
macro, so <code>getBalance()</code> is a real method call with parens that you
must write out by hand. Second, <code>toString()</code> is inherited from
<code>Object</code> and is already <code>public</code>, so your override must
stay <code>public</code> (you cannot narrow visibility) and should carry
<code>@Override</code> — Ruby's <code>to_s</code> has no such visibility rule
to worry about.</p>`,

  ruby: `class BankAccount
  attr_reader :balance

  def initialize(owner, initial)
    @owner = owner
    @balance = initial
  end

  def deposit(amount)
    @balance += amount
  end

  def withdraw(amount)
    return false if amount > @balance
    @balance -= amount
    true
  end

  def to_s
    "#{@owner} has $#{@balance}"
  end
end`,

  task: `
<p>Model a bank account as a class. Because there are no top-level functions and

<ol>

  <li>A constructor <code>BankAccount(String owner, int initialBalance)</code>

  <li>Getters <code>getOwner()</code> and <code>getBalance()</code>.</li>
  <li><code>deposit(int amount)</code> adds to the balance.</li>
  <li><code>withdraw(int amount)</code> returns <code>false</code> and changes
      nothing if <code>amount</code> exceeds the balance; otherwise it subtracts
      and returns <code>true</code>.</li>
  <li>Override <code>toString()</code> to return a string like
      <code>"Ada has $100"</code>.</li>
</ol>`,

  tests: [
    { name: "constructor stores owner and balance", code:

    { name: "toString formats the account", code:

    { name: "two instances are independent", code:
      "      var a = new BankAccount(\"Ada\", 100);\n" +
      "      var b = new BankAccount(\"Rob\", 10);\n" +

  solution: `class BankAccount {
  private final String owner;
  private int balance;

  BankAccount(String owner, int initialBalance) {
    this.owner = owner;
    this.balance = initialBalance;
  }

  String getOwner() {
    return owner;
  }

  int getBalance() {
    return balance;
  }

  void deposit(int amount) {
    this.balance += amount;
  }

  boolean withdraw(int amount) {
    if (amount > this.balance) {
      return false;
    }
    this.balance -= amount;
    return true;
  }

  @Override
  public String toString() {
    return owner + " has $" + balance;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Java</th></tr>
  <tr><td>Private field</td><td><code>@x</code> (instance var, not declared)</td><td><code>private int x;</code></td></tr>
  <tr><td>Constructor</td><td><code>def initialize(x); @x = x; end</code></td><td><code>ClassName(int x) {}</code></td></tr>
  <tr><td>Read a field</td><td><code>@x</code></td><td><code>this.x</code> or just <code>x</code></td></tr>
  <tr><td>Getter</td><td><code>attr_reader :x</code></td><td><code>int getX()</code> (a method call)</td></tr>
  <tr><td>Stringify</td><td><code>def to_s</code></td><td><code>@Override public String toString()</code></td></tr>
  <tr><td>Instantiate</td><td><code>C.new(…)</code></td><td><code>new C(…)</code></td></tr>
</table>
<p>Inside a method, <code>this.</code> is optional when there is no name clash —
<code>balance</code> and <code>this.balance</code> refer to the same field. It
becomes mandatory only to disambiguate a field from a parameter of the same name
(exactly what the constructor does). Notice <code>owner</code> is
<code>final</code> in the solution: assign it once in the constructor and it can
never change, roughly Java's version of a Ruby object whose <code>@owner</code>
you simply never reassign after <code>initialize</code> — except Java enforces
it for you at compile time. And unlike Ruby, where <code>@instance_variables</code>
are inaccessible from outside the object only by convention (you can still poke
at them via <code>instance_variable_get</code>), Java's <code>private</code> is
enforced by the compiler and the JVM with no back door.</p>`,
