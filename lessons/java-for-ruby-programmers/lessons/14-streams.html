  intro: `
<p>In Ruby you transform arrays with chained <code>Enumerable</code> methods:
<code>.select</code>, <code>.map</code>, <code>.reduce</code>. Java's
answer is the <strong>Stream API</strong>. You call <code>.stream()</code> on a
collection to open a pipeline, chain lazy operations, and finish with a
<em>terminal</em> operation — usually <code>.collect(...)</code> or a reduction
like <code>.sum()</code>.</p>
<table>
  <tr><th>Ruby</th><th>Java</th></tr>
  <tr><td><code>arr.select { |x| x &gt; 0 }</code></td><td><code>list.stream().filter(x -&gt; x &gt; 0)</code></td></tr>
  <tr><td><code>arr.map { |x| x.name }</code></td><td><code>list.stream().map(x -&gt; x.name())</code></td></tr>
  <tr><td><code>arr.reduce(0) { |a, b| a + b }</code></td><td><code>stream.reduce(0, Integer::sum)</code></td></tr>
  <tr><td><code>[...]</code> (already an array)</td><td><code>.collect(Collectors.toList())</code></td></tr>
</table>
<p>Two things differ from Ruby arrays. First, a stream is
<strong>single-use and lazy</strong>: nothing runs until a terminal operation
pulls values through, and you cannot reuse a stream after that. Second, a
pipeline does not produce a collection by itself — you must <em>collect</em> it.
The <code>Collectors</code> class is the toolbox: <code>toList()</code>,
<code>joining(", ")</code>, <code>groupingBy(...)</code>,
<code>summingInt(...)</code>, and <code>counting()</code>. For plain number
crunching, <code>mapToInt(...)</code> turns the stream into an
<code>IntStream</code> with a direct <code>.sum()</code>.</p>`,

  ruby: `Product = Struct.new(:name, :category, :price)

def names_under(products, max)
  products.select { |p| p.price < max }.map(&:name)
end

def total_price(products)
  products.reduce(0) { |sum, p| sum + p.price }
end

def total_by_category(products)
  out = Hash.new(0)
  products.each { |p| out[p.category] += p.price }
  out
end`,

</ol>`,

  solution: `record Product(String name, String category, int price) {}

class Catalog {
  static List<String> namesUnder(List<Product> products, int maxPrice) {
    return products.stream()
        .filter(p -> p.price() < maxPrice)
        .map(Product::name)
        .collect(Collectors.toList());
  }

  static int totalPrice(List<Product> products) {
    return products.stream()
        .mapToInt(Product::price)
        .sum();
  }

  static int totalPriceReduce(List<Product> products) {
    return products.stream()
        .map(Product::price)
        .reduce(0, Integer::sum);
  }

  static String nameList(List<Product> products) {
    return products.stream()
        .map(Product::name)
        .collect(Collectors.joining(", "));
  }

  static Map<String, List<Product>> byCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category));
  }

  static Map<String, Integer> totalByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.summingInt(Product::price)));
  }

  static Map<String, Long> countByCategory(List<Product> products) {
    return products.stream()
        .collect(Collectors.groupingBy(Product::category,
            Collectors.counting()));
  }
}
`,

  notes: `
<table>
  <tr><th>Goal</th><th>Ruby</th><th>Java</th></tr>
  <tr><td>Start</td><td><code>arr</code></td><td><code>list.stream()</code></td></tr>
  <tr><td>Keep some</td><td><code>.select { |x| f }</code></td><td><code>.filter(f)</code></td></tr>
  <tr><td>Transform</td><td><code>.map { |x| f }</code></td><td><code>.map(f)</code></td></tr>
  <tr><td>Sum numbers</td><td><code>.sum</code></td><td><code>.mapToInt(f).sum()</code></td></tr>
  <tr><td>Fold</td><td><code>.reduce(init) { |a,b| f }</code></td><td><code>.reduce(init, f)</code></td></tr>
  <tr><td>Back to a list</td><td>already an array</td><td><code>.collect(Collectors.toList())</code></td></tr>
  <tr><td>Join to string</td><td><code>.join(", ")</code></td><td><code>.collect(Collectors.joining(", "))</code></td></tr>
  <tr><td>Group</td><td><code>.group_by { |x| f }</code></td><td><code>Collectors.groupingBy(f)</code></td></tr>
  <tr><td>Count per group</td><td><code>.group_by(&amp;f).transform_values(&amp;:count)</code></td><td><code>groupingBy(f, counting())</code></td></tr>
</table>
<p>Ruby's <code>reduce</code> (aka <code>inject</code>) takes the initial value
first and yields <code>(accumulator, element)</code> to the block, much like
Java's <code>reduce(identity, accumulator)</code> — so the argument order
already matches. The method reference <code>Integer::sum</code> is Java
shorthand for <code>(a, b) -&gt; a + b</code>, similar to passing
<code>:+</code> as a symbol-to-proc in Ruby. <code>counting()</code> yields a
<code>Long</code>, not an <code>int</code>, which is why
<code>countByCategory</code> returns <code>Map&lt;String, Long&gt;</code>.
Remember a stream is one-shot: build the pipeline and finish it in a single
chain, since you cannot iterate the same stream twice — unlike a Ruby
<code>Enumerator</code>, which you can call <code>.each</code> on repeatedly.</p>`,
