  intro: `
<p>Java's <code>String</code> will feel familiar — it is immutable, just like a
Ruby <code>String</code> is <em>not</em> — Ruby strings are mutable by default,
so <code>s.upcase!</code> and friends actually change the object in place.
Java has no such bang-methods; every "mutating" call returns a new object. Java
also has no string interpolation syntax — you either concatenate with
<code>+</code> or reach for <code>String.format</code> (Java's
<code>sprintf</code>-style formatter). And when you build a string in a loop,
<code>+=</code> allocates a fresh object every time, so Java gives you
<code>StringBuilder</code> for that.</p>
<table>
  <tr><th>Ruby</th><th>Java</th></tr>
  <tr><td><code>s.upcase</code></td><td><code>s.toUpperCase()</code></td></tr>
  <tr><td><code>s.include?("x")</code></td><td><code>s.contains("x")</code></td></tr>
  <tr><td><code>s[1...4]</code></td><td><code>s.substring(1, 4)</code></td></tr>
  <tr><td><code>s.strip</code></td><td><code>s.strip()</code> (Unicode-aware)</td></tr>
  <tr><td><code>"ab" * 3</code></td><td><code>"ab".repeat(3)</code></td></tr>
  <tr><td><code>"#{a} and #{b}"</code></td><td><code>String.format("%s and %s", a, b)</code></td></tr>
</table>
<p>Two things to keep in mind. First, <code>substring</code> takes a start and an
<em>end</em> index (like Ruby's range slicing), not a start and a length. Second,
because <code>String</code> is immutable, every method that "changes" a string
actually returns a new one — <code>s.replace(...)</code> does nothing unless you
capture the result.</p>`,

def shout(s)

def greeting(name, count)
  "#{name} x#{count}"

def join_words(words)
  out = ""
  words.each { |w| out += w + "-" }
  out

    { name: 'initials("Ada Lovelace") is "AL"', code: "      expect_eq(Strings.initials(\"Ada Lovelace\"), \"AL\");" },
    { name: 'initials("Grace Brewster Hopper") is "GBH"', code: "      expect_eq(Strings.initials(\"Grace Brewster Hopper\"), \"GBH\");" },
    { name: 'censor("no cats here, cats!", "cats") replaces both', code: "      expect_eq(Strings.censor(\"no cats here, cats!\", \"cats\"), \"no *** here, ***!\");" },

  solution: `class Strings {
  static String shout(String s) {
    return s.strip().toUpperCase();
  }

  static String greeting(String name, int count) {
    return String.format("%s x%d", name, count);
  }

  static String initials(String full) {
    StringBuilder sb = new StringBuilder();
    for (String word : full.split(" ")) {
      if (!word.isBlank()) {
        sb.append(word.substring(0, 1).toUpperCase());
      }
    }
    return sb.toString();
  }

  static String censor(String s, String word) {
    return s.replace(word, "***");
  }
}

<p>Watch out: Java's <code>String.split</code> takes a <em>regular expression</em>,
not a literal string, so <code>split(".")</code> splits on every character. Escape
it (<code>split("\\\\.")</code>) or use <code>Pattern.quote</code> when you mean a
literal dot. Also note <code>strip()</code> (Java 11+) is the Unicode-aware
replacement for the older <code>trim()</code>, which only removes ASCII control
characters. And since strings are immutable, <code>StringBuilder</code> is not an
optimization detail but the idiomatic way to assemble text piece by piece — call
<code>toString()</code> when you are done, unlike Ruby where <code>String#+=</code>
and bang-methods mutate happily on their own.</p>`,
