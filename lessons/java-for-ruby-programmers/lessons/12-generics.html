  number: 12,
  title: "Generics",

  intro: `
<p>Ruby doesn't have generics at all, and it doesn't need them: a Ruby method
that calls <code>+</code> or <code>&lt;=&gt;</code> on its argument works with
any object that responds to those messages, whatever class it happens to be.
Java takes a different route to that same flexibility — a class or method
declares a type parameter in angle brackets, and the compiler checks that
every use is consistent, giving you compile-time safety that an untyped Ruby
method never had.</p>
<table>
  <tr><th>Ruby</th><th>Java</th></tr>
  <tr><td><code>class Box; end</code> (duck typing)</td><td><code>class Box&lt;T&gt; { ... }</code></td></tr>
  <tr><td><code>def identity(x); x; end</code></td><td><code>&lt;T&gt; T identity(T x)</code></td></tr>
  <tr><td><code>items.max { |a, b| a &lt;=&gt; b }</code></td><td><code>&lt;T extends Comparable&lt;T&gt;&gt; T max(List&lt;T&gt; items)</code></td></tr>
  <tr><td>any object, checked at runtime</td><td><code>List&lt;Integer&gt;</code>, checked at compile time, no primitives in generics</td></tr>
</table>
<p>Two things take getting used to. First, a generic method puts its type
parameter <em>before</em> the return type — <code>static &lt;T&gt; T identity(T x)</code> —
there's nothing in Ruby to compare it to, since Ruby methods never declare
types at all. Second, Java generics are <em>invariant</em>: a
<code>List&lt;Integer&gt;</code> is <strong>not</strong> a
<code>List&lt;Number&gt;</code>, unlike a Ruby <code>Array</code>, which simply
holds whatever objects you put into it. To accept "a list of some subtype of
Number" you use a wildcard: <code>List&lt;? extends Number&gt;</code>. And
because of type erasure, generics only work over reference types, so you write
<code>Box&lt;Integer&gt;</code>, never <code>Box&lt;int&gt;</code>.</p>`,

  ruby: `class Box
  def initialize(value)
    @value = value
  end

  def get
    @value
  end
end

def identity(x)
  x
end

def max(items)
  items.max { |a, b| a <=> b }
end

def sum(nums)
  nums.reduce(0) { |a, b| a + b }
end`,

  task: `
<p>Build a small generic toolkit. Write two top-level types:</p>
<ol>
  <li>A generic container <code>class Box&lt;T&gt;</code> with a constructor
      taking a <code>T</code>, a method <code>T get()</code>, and a method
      <code>void set(T value)</code>.</li>
  <li>A utility <code>class Generics</code> with three static methods:
    <ul>
      <li><code>&lt;T&gt; T identity(T x)</code> — returns its argument
          unchanged (note the <code>&lt;T&gt;</code> before the return type).</li>
      <li><code>&lt;T extends Comparable&lt;T&gt;&gt; T max(List&lt;T&gt; items)</code>
          — returns the largest element using <code>compareTo</code>.</li>
      <li><code>double sum(List&lt;? extends Number&gt; nums)</code> — adds the
          numbers, calling <code>doubleValue()</code> on each. The wildcard lets
          it accept a <code>List&lt;Integer&gt;</code> or a
          <code>List&lt;Double&gt;</code>.</li>
    </ul>
  </li>
</ol>`,

`,

  requirements: [
    { pattern: /class\s+Box<T>/, message: "Declare a generic class Box<T>" },
    { pattern: /<T\s+extends\s+Comparable<T>>/, message: "Use a bounded type parameter <T extends Comparable<T>> on max" },
    { pattern: /List<\?\s+extends\s+Number>/, message: "Accept a List<? extends Number> wildcard in sum" },
  ],

  tests: [
    { name: "Box holds and returns a value", code: "      Box<String> b = new Box<>(\"hi\");\n      expect_eq(b.get(), \"hi\");" },
    { name: "Box.set replaces the value", code: "      Box<Integer> b = new Box<>(1);\n      b.set(42);\n      expect_eq(b.get(), 42);" },
    { name: "identity returns its argument", code: "      expect_eq(Generics.identity(\"abc\"), \"abc\");\n      expect_eq(Generics.identity(7), 7);" },
    { name: "max of integers", code: "      expect_eq(Generics.max(List.of(3, 9, 1, 7)), 9);" },
    { name: "max of strings (lexicographic)", code: "      expect_eq(Generics.max(List.of(\"apple\", \"pear\", \"fig\")), \"pear\");" },
    { name: "sum accepts List<Integer>", code: "      expect_eq(Generics.sum(List.of(1, 2, 3)), 6.0);" },
    { name: "sum accepts List<Double>", code: "      expect_eq(Generics.sum(List.of(1.5, 2.5)), 4.0);" },
  ],

  solution: `class Box<T> {
  private T value;

  Box(T value) {
    this.value = value;
  }

  T get() {
    return value;
  }

  void set(T value) {
    this.value = value;
  }
}

class Generics {
  static <T> T identity(T x) {
    return x;
  }

  static <T extends Comparable<T>> T max(List<T> items) {
    T best = items.get(0);
    for (T x : items) {
      if (x.compareTo(best) > 0) {
        best = x;
      }
    }
    return best;
  }

  static double sum(List<? extends Number> nums) {
    double total = 0;
    for (Number n : nums) {
      total += n.doubleValue();
    }
    return total;
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Ruby</th><th>Java</th></tr>
  <tr><td>Generic class</td><td><code>class Box</code> (no type param needed)</td><td><code>class Box&lt;T&gt;</code></td></tr>
  <tr><td>Generic method</td><td><code>def id(x); x; end</code></td><td><code>&lt;T&gt; T id(T x)</code> (param before return type)</td></tr>
  <tr><td>Upper bound</td><td>none — just call <code>&lt;=&gt;</code> and see what happens</td><td><code>&lt;T extends X&gt;</code></td></tr>
  <tr><td>Covariant read</td><td>an <code>Array</code> holds anything, always</td><td><code>List&lt;? extends Number&gt;</code> (explicit wildcard)</td></tr>
  <tr><td>Element type</td><td><code>Box.new(5)</code> — no declared element type</td><td><code>Box&lt;Integer&gt;</code> (no <code>int</code>)</td></tr>
</table>
<p>The wildcard is the piece with no Ruby equivalent, since a Ruby
<code>Array</code> never declares an element type to begin with — it happily
holds a mix of integers and floats. Because Java lists are invariant, a method
that only <em>reads</em> Numbers should say
<code>List&lt;? extends Number&gt;</code> so callers can pass a
<code>List&lt;Integer&gt;</code>. The mirror image, <code>? super T</code>, is
for lists you only <em>write</em> to — the classic "producer extends, consumer
super" rule. Also remember erasure: at runtime a <code>Box&lt;String&gt;</code>
and a <code>Box&lt;Integer&gt;</code> are the same class, so you cannot write
<code>new T()</code> or <code>x instanceof Box&lt;String&gt;</code> — a
restriction that will feel oddly familiar, since a Ruby object never carried a
compile-time type parameter to check against in the first place.</p>`,
};
