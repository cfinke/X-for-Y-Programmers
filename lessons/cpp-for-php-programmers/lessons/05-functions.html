  title: "Functions",

  intro: `
<p>You already write free functions in PHP, and C++ free functions look
similar. But C++ adds two things PHP does not have. First, real
<em>overloading</em>: several functions can share a name as long as their
parameter lists differ, and the compiler picks one at compile time from the
argument types. PHP only lets one function own a given name — you'd fake
overloading with default arguments or by checking <code>func_num_args()</code>.
Second, the calling convention is part of the parameter type. How you declare
a parameter decides whether the argument is copied, shared read-only, or made
writable by the callee.</p>
<table>
  <tr><th>PHP</th><th>C++</th></tr>
  <tr><td><code>function f(int $x)</code></td><td><code>void f(int x)</code> (by value — a copy)</td></tr>
  <tr><td>pass a string/array (copied on write)</td><td><code>void f(const std::string&amp; s)</code> (read-only, no copy)</td></tr>
  <tr><td><code>function f(string &amp;$s)</code> (by reference)</td><td><code>void f(std::string&amp; s)</code> (callee mutates caller's object)</td></tr>
  <tr><td>one function, no true overloads</td><td>truly separate functions per signature</td></tr>
  <tr><td><code>function g($x = 10)</code></td><td><code>int g(int x = 10)</code></td></tr>
</table>
<p>The rule of thumb: pass small values (<code>int</code>, <code>double</code>,
<code>bool</code>) <em>by value</em>; pass objects you only read
(<code>std::string</code>, <code>std::vector</code>) by <code>const</code>
<em>reference</em> to skip the copy; pass by plain reference
(<code>T&amp;</code>) only when you intend to modify the caller's object.</p>`,

  php: `// PHP has no true overloading — one function name, one implementation:
function area(int $w, ?int $h = null): int {
  return $h === null ? $w * $w : $w * $h;
}

function greet(string $name, string $greeting = "Hello"): string {
  return "$greeting, $name!";
}

// Arrays are passed by value by default; use &$xs to mutate the caller's copy:
function doubleAll(array &$xs): void {
  foreach ($xs as &$x) {
    $x *= 2;
  }
}`,

  solution: `int area(int side) {
  return side * side;
}

int area(int width, int height) {
  return width * height;
}

std::string greet(const std::string& name, const std::string& greeting = "Hello") {
  return greeting + ", " + name + "!";
}

void doubleAll(std::vector<int>& xs) {
  for (int& x : xs) {
    x *= 2;
  }
}

int sumOf(const std::vector<int>& xs) {
  int total = 0;
  for (int x : xs) {
    total += x;
  }
  return total;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>C++</th></tr>
  <tr><td>By value (copy)</td><td>scalars are copied</td><td><code>void f(int x)</code></td></tr>
  <tr><td>Read-only object</td><td>string/array passed by value (copy-on-write)</td><td><code>void f(const std::string&amp; s)</code></td></tr>
  <tr><td>Mutate caller's object</td><td><code>function f(array &amp;$xs)</code></td><td><code>void f(std::string&amp; s)</code></td></tr>
  <tr><td>Overloading</td><td>not supported — one name, one function</td><td>separate functions per signature</td></tr>
  <tr><td>Default argument</td><td><code>function g($x = 10)</code></td><td><code>int g(int x = 10)</code></td></tr>
</table>
<p>A subtle point that trips up PHP programmers: in PHP, arrays and strings
are value types by default — passing one into a function hands the callee its
own logical copy (PHP optimizes this with copy-on-write under the hood), and
you must opt in with <code>&amp;$xs</code> to let a function mutate the
caller's array. C++ works the other way: <code>const std::vector&lt;int&gt;&amp;</code>
says "I will read this and not copy it"; drop the <code>const</code> and you
are asking for a handle you can write through, which changes the caller's own
vector. Pass an object by value (<code>std::vector&lt;int&gt; xs</code>) and
the callee gets its own copy — mutations stay local, but you paid for the
copy.</p>
<p>Default arguments live in the declaration, not the call, and follow the
same "trailing only" rule as PHP: once a parameter has a default, everything
after it must too. Overload resolution happens entirely at compile time —
<code>area(4)</code> and <code>area(3, 5)</code> resolve to two genuinely
different functions, something PHP simply cannot express since a class or
namespace can only have one function of a given name.</p>`,
