<p>No new concepts — this is the course's ideas run together as one small
inventory system. Classes with promoted properties (lesson 9), the
<code>array_map</code>/<code>array_filter</code> toolbox (lesson 13),
nullable returns standing in for <code>Option</code> (lesson 6), and the
one semantic seam this course keeps circling: <em>arrays are values,
objects are handles</em>. Assigning or passing an array copies it —
Rust-style value semantics with free implicit clones. Assigning or passing
an object copies only a handle to shared state — <code>Rc</code> semantics,
no <code>.clone()</code> required and none performed.</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>Vec&lt;Item&gt;</code>, moved or explicitly cloned</td><td><code>array</code> — copied implicitly on assignment</td></tr>

  <tr><td><code>item.clone()</code> for a deep, independent copy</td><td><code>clone $item</code> — explicit, objects only</td></tr>
  <tr><td><code>Option&lt;&amp;Item&gt;</code></td><td><code>?Item</code> return type (object or <code>null</code>)</td></tr>
  <tr><td><code>.iter().map(…).collect()</code></td><td><code>array_map(fn($i) =&gt; …, $items)</code></td></tr>
  <tr><td><code>.filter(…)</code> then reindex is automatic</td><td><code>array_filter</code> keeps keys — wrap in <code>array_values</code></td></tr>
</table>
<p>That seam decides the hardest function below. <code>restock</code> must
return an updated list <em>without touching the caller's items</em>.
Returning a new array is free — arrays copy themselves. But the
<code>Item</code> objects inside it are shared handles, so bumping
<code>-&gt;count</code> on one would mutate the caller's object through the
alias. The fix is the <code>.clone()</code> you must remember again — but
only for objects: <code>clone</code> the matched <code>Item</code>, update
the copy, and leave the original untouched.</p>`,

struct Item {
    name: String,
    price_cents: u64,
    count: u64,
}

fn total_value(items: &[Item]) -> u64 {
    items.iter().map(|i| i.price_cents * i.count).sum()
}

fn find_item<'a>(items: &'a [Item], name: &str) -> Option<&'a Item> {
    items.iter().find(|i| i.name == name)
}

fn restock(items: &[Item], name: &str, amount: u64) -> Vec<Item> {
    items
        .iter()
        .map(|i| {
            let mut copy = i.clone(); // explicit copy, then mutate it
            if copy.name == name {
                copy.count += amount;
            }
            copy
        })
        .collect()
}

fn names_in_stock(items: &[Item]) -> Vec<String> {
    items
        .iter()
        .filter(|i| i.count > 0)
        .map(|i| i.name.clone())
        .collect()
}`,

  solution: `<?php

class Item {
    public function __construct(
        public string $name,
        public int $price_cents,
        public int $count,
    ) {}
}

function total_value(array $items): int {
    return array_reduce(
        $items,
        fn(int $sum, Item $i) => $sum + $i->price_cents * $i->count,
        0,
    );
}

function find_item(array $items, string $name): ?Item {
    foreach ($items as $item) {
        if ($item->name === $name) {
            return $item;
        }
    }
    return null;
}

function restock(array $items, string $name, int $amount): array {
    return array_map(function (Item $item) use ($name, $amount): Item {
        if ($item->name !== $name) {
            return $item; // sharing the handle is fine: nobody writes to it
        }
        $copy = clone $item; // the .clone() you must remember again
        $copy->count += $amount;
        return $copy;
    }, $items);
}

function names_in_stock(array $items): array {
    return array_values(array_map(
        fn(Item $i) => $i->name,
        array_filter($items, fn(Item $i) => $i->count > 0),
    ));
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>List of structs</td><td><code>Vec&lt;Item&gt;</code></td><td><code>array</code> of <code>Item</code> objects</td></tr>
  <tr><td>Pass the list</td><td>borrow or move, your choice</td><td>array copies (value); the objects inside stay shared (handles)</td></tr>
  <tr><td>Independent copy</td><td><code>item.clone()</code></td><td><code>clone $item</code> — explicit, shallow</td></tr>
  <tr><td>Maybe-a-result</td><td><code>Option&lt;&amp;Item&gt;</code></td><td><code>?Item</code>, checked with <code>=== null</code></td></tr>
  <tr><td>map / filter / fold</td><td>iterator adaptors</td><td><code>array_map</code> / <code>array_filter</code> / <code>array_reduce</code></td></tr>
  <tr><td>Reindex after filter</td><td>automatic (<code>collect</code>)</td><td><code>array_values(...)</code>, always</td></tr>
</table>
<p>The capstone's whole lesson is in <code>restock</code>. Rust would never
let the bug happen: mutating through <code>&amp;[Item]</code> doesn't
compile, and getting an owned, independent value requires a visible
<code>.clone()</code>. PHP lets <code>$item-&gt;count += $amount</code>
compile, run, and quietly corrupt the caller's data through the shared
handle — the exact aliasing the borrow checker exists to forbid. So carry
the instinct, not the compiler: when a function promises not to mutate its
inputs, any object it modifies must be <code>clone</code>d first. Arrays
you get for free; objects are on you.</p>`,
