<div id="app"></div>
<script>
const LESSON = {
  number: 6,
  title: "Null, ?? & ?->",

  intro: `
<p>In Rust, absence is a type: <code>Option&lt;T&gt;</code>, and the compiler
refuses to let you touch the <code>T</code> until you've dealt with the
<code>None</code>. PHP has no <code>Option</code> — because <code>null</code>
<em>is</em> the <code>None</code>. A nullable type is spelled with a leading
question mark (<code>?Address</code> ≈ <code>Option&lt;Address&gt;</code>),
and instead of combinator methods you get two operators:
<code>??</code> (null coalescing — <code>unwrap_or</code>) and
<code>?-&gt;</code> (nullsafe access — a <code>map</code> chain where
<code>None</code> propagates).</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>Option&lt;Address&gt;</code></td><td><code>?Address</code> (the type may also hold <code>null</code>)</td></tr>
  <tr><td><code>x.unwrap_or(default)</code></td><td><code>$x ?? $default</code></td></tr>
  <tr><td><code>opt.map(|u| u.city)</code> chains</td><td><code>$user?-&gt;address?-&gt;city</code> (null propagates)</td></tr>
  <tr><td><code>opt.is_some()</code></td><td><code>isset($x)</code></td></tr>
  <tr><td><code>None</code></td><td><code>null</code></td></tr>
</table>
<p>The catch, and it's the big one: the compiler no longer forces the check.
Nothing stops you writing <code>$user-&gt;address-&gt;city</code> on a null
and getting a runtime error — that is the price of dynamism. In PHP,
<code>??</code> and <code>?-&gt;</code> are <em>discipline</em>, not proof.
The habit you built fighting the borrow checker is exactly the habit that
makes you a good PHP programmer: assume everything nullable is null until
handled.</p>`,

  rust: `use std::collections::HashMap;

struct Address { city: String }
struct User { address: Option<Address> }

fn get_city(user: Option<&User>) -> String {
    user.and_then(|u| u.address.as_ref())
        .map(|a| a.city.clone())
        .unwrap_or_else(|| String::from("Unknown"))
}

fn pick(data: &HashMap<String, String>, key: &str, default: &str) -> String {
    data.get(key).cloned().unwrap_or_else(|| default.to_string())
}`,

  task: `
<p>The starter defines <code>Address</code> and <code>User</code> (with a
nullable <code>?Address $address</code>). Rewrite the two Rust functions
as PHP, replacing the combinator chains with operators:</p>
<ol>
  <li><code>get_city(?User $user): string</code> — walk
      <code>$user?-&gt;address?-&gt;city</code> with the nullsafe operator, and
      fall back to <code>"Unknown"</code> with <code>??</code>. One line: the
      whole <code>and_then / map / unwrap_or</code> pipeline.</li>
  <li><code>pick(array $data, string $key, string $default): string</code> —
      return <code>$data[$key]</code> if it's set and non-null, otherwise
      <code>$default</code>, using <code>??</code>. (Reading a missing key
      would normally warn — <code>??</code> silences that too, like
      <code>.get()</code> instead of indexing.)</li>
</ol>`,

  starter: `<?php

// Given: the data model. ?Address means "Address or null" — Option<Address>.
class Address {
    public function __construct(public string $city) {}
}

class User {
    public function __construct(public ?Address $address = null) {}
}

// 1. user.and_then(...).map(...).unwrap_or("Unknown")  ->  ?-> and ??
function get_city(?User $user): string {
    throw new Exception("TODO: implement get_city");
}

// 2. data.get(key).unwrap_or(default)  ->  ??
function pick(array $data, string $key, string $default): string {
    throw new Exception("TODO: implement pick");
}
`,

  requirements: [
    { pattern: /\?\?/, message: "Use the null coalescing operator ?? (unwrap_or as an operator)" },
    { pattern: /\?->/, message: "Use the nullsafe operator ?-> to chain through possible nulls" },
    { pattern: /\?User|\?Address/, message: "Keep the nullable type declarations (?User / ?Address)" },
  ],

  tests: [
    { name: 'get_city with a full chain returns the city',
      code: 'expect_eq(get_city(new User(new Address("Paris"))), "Paris");' },
    { name: 'get_city with a user but no address returns "Unknown"',
      code: 'expect_eq(get_city(new User()), "Unknown");' },
    { name: 'get_city(null) returns "Unknown" — None propagates from the very first link',
      code: 'expect_eq(get_city(null), "Unknown");' },
    { name: 'pick finds an existing key',
      code: 'expect_eq(pick(["name" => "Ada"], "name", "n/a"), "Ada");' },
    { name: 'pick falls back on a missing key',
      code: 'expect_eq(pick([], "name", "n/a"), "n/a");' },
    { name: 'pick falls back on a key that is present but null (?? checks null, not existence)',
      code: 'expect_eq(pick(["name" => null], "name", "n/a"), "n/a");' },
  ],

  solution: `<?php

class Address {
    public function __construct(public string $city) {}
}

class User {
    public function __construct(public ?Address $address = null) {}
}

function get_city(?User $user): string {
    return $user?->address?->city ?? "Unknown";
}

function pick(array $data, string $key, string $default): string {
    return $data[$key] ?? $default;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>Maybe-absent type</td><td><code>Option&lt;T&gt;</code></td><td><code>?T</code> (nullable type declaration)</td></tr>
  <tr><td>The absent value</td><td><code>None</code></td><td><code>null</code></td></tr>
  <tr><td>Default on absence</td><td><code>x.unwrap_or(d)</code></td><td><code>$x ?? $d</code></td></tr>
  <tr><td>Chain through absence</td><td><code>opt.map(|u| u.city)</code></td><td><code>$user?-&gt;city</code></td></tr>
  <tr><td>Presence check</td><td><code>opt.is_some()</code></td><td><code>isset($x)</code></td></tr>
  <tr><td>Assign if unset</td><td><code>get_or_insert_with</code></td><td><code>$x ??= $d</code></td></tr>
</table>
<p>The deep difference: in Rust, <code>Option</code> makes forgetting the
<code>None</code> case a compile error. In PHP, forgetting <code>null</code>
is a runtime error waiting on the one input you didn't test. <code>?-&gt;</code>
short-circuits the whole rest of the chain to <code>null</code> the moment one
link is null — exactly like <code>?</code>-style early return — so
<code>chain ?? default</code> is the closing <code>unwrap_or</code>. Static
analyzers (PHPStan, Psalm) can restore much of the compiler's nagging; in
plain PHP, the nagging has to live in you.</p>`,
};
