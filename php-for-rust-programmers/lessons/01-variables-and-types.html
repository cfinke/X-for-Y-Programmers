const LESSON = {
  number: 1,
  title: "Variables & Types",

  intro: `
<p>In Rust, a binding starts life immutable and you spend a keyword
(<code>mut</code>) to change it. PHP inverts every one of those defaults:
a variable is <code>$name</code>, it springs into existence on first
assignment (no <code>let</code>, no declaration keyword at all), and it is
mutable and freely rebindable — even to a value of a different type. The
<code>$</code> sigil is the price of admission; in exchange, your
<code>snake_case</code> habits carry over untouched.</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>let name = "Ada";</code> (immutable)</td><td><code>$name = "Ada";</code> (mutable, rebindable)</td></tr>
  <tr><td><code>let mut age = 36;</code></td><td><code>$age = 36;</code> (everything is already mut)</td></tr>
  <tr><td><code>i8…i128, u8…u128, f32/f64</code></td><td><code>int</code> and <code>float</code> — one of each</td></tr>
  <tr><td><code>fn f(x: i32) -&gt; String</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td><code>format!("{name} is {age}")</code></td><td><code>"$name is $age"</code> (plain double quotes)</td></tr>
</table>
<p>There is no compile step, but PHP is not typeless: since PHP 7/8 you can
put real type declarations on <em>function signatures</em> —
<code>function f(int $x): string</code> — and they are enforced with a
<code>TypeError</code>. The catch, coming from Rust: the check happens at
the <em>call</em>, while the program runs, not ahead of time. You trade
<code>rustc</code>'s proofs for instant iteration; tools like PHPStan can
win some of the proofs back later. Files start with the <code>&lt;?php</code>
tag, a relic of PHP's origins as an HTML templating language.</p>`,

  rust: `fn describe_user(name: &str, age: u32) -> String {
    format!("{name} is {age} years old")
}

fn birthday(age: u32) -> u32 {
    let mut next = age; // mutation is opt-in
    next += 1;
    next
}

fn main() {
    let name = "Ada"; // immutable binding
    let age: u32 = 36;
    // age = 37;  // error[E0384]: cannot assign twice
    println!("{}", describe_user(name, age));
    println!("{}", birthday(age));
}`,

  task: `
<p>Port the Rust on the left to PHP:</p>
<ol>
  <li>Write <code>describe_user</code> taking <code>string $name</code> and
      <code>int $age</code> (the type comes <em>before</em> the parameter,
      C-style) with a <code>: string</code> return type, returning
      <code>"Ada is 36 years old"</code>-style text. Use double-quote
      interpolation — <code>"$name is $age years old"</code> is
      <code>format!</code> without the macro.</li>
  <li>Write <code>birthday</code> taking <code>int $age</code>, returning
      <code>int</code>: copy the argument into a local, bump it with
      <code>+=</code>, and return it. No <code>mut</code> keyword exists —
      or rather, everything already is.</li>
</ol>
<p>Keep the <code>&lt;?php</code> tag at the top. Function names stay
<code>snake_case</code>, exactly as in Rust.</p>`,

  starter: `<?php

// 1. describe_user: string $name and int $age in, string out.
//    Rust: format!("{name} is {age} years old")
//    PHP:  "$name is $age years old"  (interpolation is built into "")
function describe_user(string $name, int $age): string {
    throw new Exception("TODO: implement describe_user");
}

// 2. birthday: copy into a local, += 1, return. No \`mut\` needed.
function birthday(int $age): int {
    throw new Exception("TODO: implement birthday");
}
`,

  requirements: [
    { pattern: /function\s+describe_user\s*\(\s*string\s+\$name\s*,\s*int\s+\$age\s*\)\s*:\s*string/, message: "Define describe_user(string $name, int $age): string with full type declarations" },
    { pattern: /"\$\w+/, message: "Build the string with double-quote interpolation, not concatenation" },
    { pattern: /\+=/, message: "Use += inside birthday" },
  ],

  tests: [
    { name: 'describe_user("Ada", 36) returns "Ada is 36 years old"',
      code: 'expect_eq(describe_user("Ada", 36), "Ada is 36 years old");' },
    { name: 'describe_user("Grace", 52) returns "Grace is 52 years old"',
      code: 'expect_eq(describe_user("Grace", 52), "Grace is 52 years old");' },
    { name: "birthday(36) returns 37",
      code: "expect_eq(birthday(36), 37);" },
    { name: "birthday(0) returns 1",
      code: "expect_eq(birthday(0), 1);" },
  ],

  solution: `<?php

function describe_user(string $name, int $age): string {
    return "$name is $age years old";
}

function birthday(int $age): int {
    $next = $age;
    $next += 1;
    return $next;
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>Declare a variable</td><td><code>let x = 1;</code></td><td><code>$x = 1;</code> (assignment is declaration)</td></tr>
  <tr><td>Mutation</td><td><code>let mut x</code> — opt-in</td><td>Always allowed; rebinding can even change type</td></tr>
  <tr><td>Integers</td><td><code>i32</code>, <code>u64</code>, …</td><td><code>int</code> — one platform-sized signed type</td></tr>
  <tr><td>Floats</td><td><code>f32</code> / <code>f64</code></td><td><code>float</code> — one type (an f64 underneath)</td></tr>
  <tr><td>Typed signature</td><td><code>fn f(x: i32) -&gt; String</code></td><td><code>function f(int $x): string</code></td></tr>
  <tr><td>Interpolation</td><td><code>format!("{name}")</code></td><td><code>"$name"</code> (double quotes only)</td></tr>
  <tr><td>Type errors</td><td>Caught by <code>rustc</code>, before running</td><td><code>TypeError</code> thrown at the call, at runtime</td></tr>
</table>
<p>The honest trade: PHP's signature types are real — pass a string where
<code>int $age</code> is declared and you get a <code>TypeError</code> — but
only when that call actually executes. Nothing proves the whole program
sound before it runs, the way <code>cargo check</code> does. What you get
back is a zero-second edit-run loop and no borrow checker to negotiate with;
in real projects, PHPStan or Psalm restore a static layer on top.</p>`,
};
