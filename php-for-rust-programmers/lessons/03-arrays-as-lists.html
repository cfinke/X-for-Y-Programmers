const LESSON = {
  number: 3,
  title: "Arrays as Lists",

  intro: `
<p>Where Rust gives you <code>Vec&lt;i32&gt;</code>, PHP gives you
<code>array</code> — written <code>[1, 2, 3]</code>, growable, heterogeneous,
and mutable without asking. <code>v.push(x)</code> (which needed
<code>let mut v</code>) becomes <code>$arr[] = $x</code>: empty brackets on
the left mean "append". Length is <code>count($arr)</code>, and membership is
<code>in_array($x, $arr, true)</code> — no <code>&amp;x</code> borrow, but do
pass that <code>true</code>: it requests strict <code>===</code> matching,
the comparison you'd expect coming from Rust.</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>let mut v: Vec&lt;i32&gt; = vec![1, 2, 3];</code></td><td><code>$arr = [1, 2, 3];</code></td></tr>
  <tr><td><code>v.push(x);</code> (needs <code>mut</code>)</td><td><code>$arr[] = $x;</code> (nothing to opt into)</td></tr>
  <tr><td><code>v.len()</code></td><td><code>count($arr)</code></td></tr>
  <tr><td><code>v.contains(&amp;x)</code></td><td><code>in_array($x, $arr, true)</code></td></tr>
  <tr><td><code>v.iter().sum::&lt;i32&gt;()</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td><code>passing = move / borrow</code></td><td>passing = copy (copy-on-write value)</td></tr>
</table>
<p>The deepest difference is <em>value semantics</em>. Assigning or passing
an array copies it — like a free, automatic <code>.clone()</code> — with
copy-on-write underneath, so no bytes actually move until someone writes.
Every ownership problem you've ever fought with <code>Vec</code> dissolves:
passing an array to a function can't invalidate your variable, and the
callee mutating its copy can't touch yours. The idiom below —
take an array, modify, return it — reads like a Rust function taking a
<code>Vec</code> by value and handing it back, except nothing was ever
moved.</p>`,

  rust: `fn make_scores() -> Vec<i32> {
    vec![90, 85, 100]
}

fn append(mut v: Vec<i32>, x: i32) -> Vec<i32> {
    v.push(x); // takes ownership; needs mut
    v          // hand the Vec back
}

fn total(nums: &[i32]) -> i32 {
    nums.iter().sum()
}

fn main() {
    let scores = make_scores();
    let more = append(scores.clone(), 42); // clone, or lose scores
    assert!(more.contains(&42));
    println!("{} items, total {}", more.len(), total(&more));
}`,

  task: `
<p>Port the three functions. The tests also check that <code>append</code>
leaves the caller's array untouched — value semantics should make that
automatic.</p>
<ol>
  <li><code>make_scores(): array</code> — return the literal list
      <code>[90, 85, 100]</code>. No <code>vec!</code>, no type parameter:
      <code>array</code> is the whole declaration.</li>
  <li><code>append(array $arr, int $x): array</code> — append with
      <code>$arr[] = $x;</code> and return the modified copy. This is the
      take-a-<code>Vec</code>-by-value-and-return-it pattern, minus the
      ownership transfer: the caller's array is a separate value.</li>
  <li><code>total(array $nums): int</code> — sum with
      <code>array_sum</code>, PHP's <code>.iter().sum()</code>. It returns
      <code>0</code> for an empty array, like a sum over an empty
      iterator.</li>
</ol>`,

  starter: `<?php

// 1. vec![90, 85, 100]  ->  a plain array literal.
function make_scores(): array {
    throw new Exception("TODO: implement make_scores");
}

// 2. Append with $arr[] = $x; then return $arr.
//    $arr is already a copy — the caller's array is safe.
function append(array $arr, int $x): array {
    throw new Exception("TODO: implement append");
}

// 3. nums.iter().sum()  ->  array_sum($nums)
function total(array $nums): int {
    throw new Exception("TODO: implement total");
}
`,

  requirements: [
    { pattern: /\[\]\s*=/, message: "Append with $arr[] = ... (empty brackets on the left)" },
    { pattern: /count\(|array_sum\(/, message: "Use array_sum (or count) rather than a hand-rolled loop" },
    { pattern: /:\s*array/, message: "Declare : array return types on the signatures" },
  ],

  tests: [
    { name: "make_scores() returns [90, 85, 100]",
      code: "expect_eq(make_scores(), [90, 85, 100]);" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",
      code: "expect_eq(append([1, 2], 3), [1, 2, 3]);" },
    { name: "append([], 5) returns [5]",
      code: "expect_eq(append([], 5), [5]);" },
    { name: "append does not mutate the caller's array (value semantics)",
      code: "$orig = [1, 2];\n$copy = append($orig, 3);\nexpect_eq($orig, [1, 2]);\nexpect_eq($copy, [1, 2, 3]);" },
    { name: "total([90, 85, 100]) returns 275",
      code: "expect_eq(total([90, 85, 100]), 275);" },
    { name: "total([]) returns 0",
      code: "expect_eq(total([]), 0);" },
  ],

  solution: `<?php

function make_scores(): array {
    return [90, 85, 100];
}

function append(array $arr, int $x): array {
    $arr[] = $x;
    return $arr;
}

function total(array $nums): int {
    return array_sum($nums);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>List type</td><td><code>Vec&lt;T&gt;</code></td><td><code>array</code> (untyped elements)</td></tr>
  <tr><td>Literal</td><td><code>vec![1, 2, 3]</code></td><td><code>[1, 2, 3]</code></td></tr>
  <tr><td>Append</td><td><code>v.push(x)</code> — needs <code>mut</code></td><td><code>$arr[] = $x</code></td></tr>
  <tr><td>Length</td><td><code>v.len()</code></td><td><code>count($arr)</code></td></tr>
  <tr><td>Membership</td><td><code>v.contains(&amp;x)</code></td><td><code>in_array($x, $arr, true)</code> — keep the <code>true</code></td></tr>
  <tr><td>Sum</td><td><code>v.iter().sum()</code></td><td><code>array_sum($arr)</code></td></tr>
  <tr><td>Assignment / passing</td><td>move (or explicit clone/borrow)</td><td>copy-on-write value — a free <code>.clone()</code></td></tr>
</table>
<p>Copy-on-write is why this feels so different from Java-style reference
languages too: a PHP array behaves like a value, full stop. The cost of
losing <code>Vec&lt;i32&gt;</code> is that nothing stops
<code>[90, "85", 3.5]</code> from existing — the <code>: array</code>
declaration says nothing about elements. Runtime discipline (and PHPStan's
<code>array&lt;int&gt;</code> annotations) stand in for the type
parameter.</p>`,
};
