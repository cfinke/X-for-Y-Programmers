const LESSON = {
  number: 19,
  title: "Working with JSON",

  intro: `
<p>In Rust, JSON means serde: define a struct, derive
<code>Serialize</code> and <code>Deserialize</code>, and the shape of the
data is a compile-time contract. PHP replaces the entire apparatus with two
functions and zero schema: <code>json_encode($data)</code> turns any array
straight into JSON, and <code>json_decode($json, true)</code> turns JSON
straight into associative arrays. No derive, no struct, no
<code>Cargo.toml</code> — and, the honest flip side, no compile-time shape
checking either. Nothing promises the decoded array has a
<code>"name"</code> key until you look.</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>#[derive(Serialize, Deserialize)] struct User { … }</code></td><td>nothing — arrays are already "schemaless structs"</td></tr>
  <tr><td><code>serde_json::to_string(&amp;user)?</code></td><td><code>json_encode($user)</code></td></tr>
  <tr><td><code>serde_json::from_str(&amp;s)?</code></td><td><code>json_decode($json, true)</code></td></tr>
  <tr><td>Typed error: <code>Result&lt;T, serde_json::Error&gt;</code></td><td>default: bad JSON silently returns <code>null</code></td></tr>
  <tr><td>Forced to handle the <code>Err</code></td><td><code>JSON_THROW_ON_ERROR</code> flag opts into an exception</td></tr>
  <tr><td><code>Option&lt;T&gt;</code> field + <code>unwrap_or</code></td><td><code>$data["age"] ?? 0</code></td></tr>
</table>
<p>Two flags matter. The <code>true</code> in
<code>json_decode($json, true)</code> is load-bearing: without it, JSON
objects decode into <code>stdClass</code> objects
(<code>$u-&gt;name</code>) instead of associative arrays
(<code>$u["name"]</code>) — this course, like most modern PHP, wants the
arrays. And <code>json_decode($json, true, 512, JSON_THROW_ON_ERROR)</code>
upgrades the failure mode: by default malformed JSON returns
<code>null</code>, an <code>Err</code> you can silently ignore — exactly
the bug <code>#[must_use]</code> exists to prevent. Missing fields are
handled where serde would use <code>Option</code> plus a default: the
<code>??</code> operator you met in lesson 6.</p>`,

  rust: `use serde::{Deserialize, Serialize};

#[derive(Serialize, Deserialize)]
struct User {
    name: Option<String>, // field may be absent
    age: Option<u32>,
}

fn parse_user(json: &str) -> (String, u32) {
    let u: User = serde_json::from_str(json).expect("valid JSON");
    (
        u.name.unwrap_or_else(|| "unknown".to_string()),
        u.age.unwrap_or(0),
    )
}

fn pluck_names(json: &str) -> Vec<String> {
    let users: Vec<User> = serde_json::from_str(json).expect("valid JSON");
    users.into_iter().filter_map(|u| u.name).collect()
}`,

  task: `
<p>Do the same work with no derive in sight:</p>
<ol>
  <li>Write <code>to_json(array $data): string</code> — one call to
      <code>json_encode</code>. Note what encodes to what: a list array
      becomes a JSON array, a string-keyed array becomes a JSON object.</li>
  <li>Write <code>parse_user(string $json): array</code> — decode with
      <code>json_decode($json, true)</code> (associative!), then return
      <code>["name" =&gt; ..., "age" =&gt; ...]</code> where missing fields
      fall back to <code>"unknown"</code> and <code>0</code> via
      <code>??</code> — your <code>unwrap_or</code>.</li>
  <li>Write <code>pluck_names(string $json): array</code> — decode a JSON
      array of user objects and return just the names, using
      <code>array_map</code> over the decoded rows.</li>
</ol>
<p>Keep the field order <code>name</code> then <code>age</code> in
<code>parse_user</code>'s result — the tests compare with <code>===</code>,
and for PHP arrays that includes key order.</p>`,

  starter: `<?php

// 1. to_json: serde_json::to_string, minus serde, minus the struct.
function to_json(array $data): string {
    throw new Exception("TODO: encode");
}

// 2. parse_user: json_decode($json, true) -- the true means assoc arrays,
//    not stdClass objects. Defaults via ?? : "unknown" for name, 0 for age.
//    Return ["name" => ..., "age" => ...] in that order.
function parse_user(string $json): array {
    throw new Exception("TODO: decode with defaults");
}

// 3. pluck_names: decode, then array_map out the "name" of each row.
function pluck_names(string $json): array {
    throw new Exception("TODO: decode and pluck");
}
`,

  requirements: [
    { pattern: /json_encode/, message: "Use json_encode in to_json" },
    { pattern: /json_decode\s*\(\s*\$\w+\s*,\s*true\s*\)/, message: "Decode with json_decode($json, true) — the true gives you associative arrays" },
    { pattern: /\?\?/, message: "Use ?? to default the missing fields (your unwrap_or)" },
  ],

  tests: [
    { name: "to_json encodes a string-keyed array as a JSON object",
      code: `expect_eq(to_json(["name" => "Ada", "age" => 36]), '{"name":"Ada","age":36}');` },
    { name: "to_json encodes a list as a JSON array",
      code: `expect_eq(to_json([1, 2, 3]), '[1,2,3]');` },
    { name: "parse_user reads both fields when present",
      code: `expect_eq(parse_user('{"name":"Ada","age":36}'), ["name" => "Ada", "age" => 36]);` },
    { name: 'parse_user defaults a missing age to 0',
      code: `expect_eq(parse_user('{"name":"Grace"}'), ["name" => "Grace", "age" => 0]);` },
    { name: 'parse_user defaults everything on {}',
      code: `expect_eq(parse_user('{}'), ["name" => "unknown", "age" => 0]);` },
    { name: "pluck_names maps out the names",
      code: `expect_eq(pluck_names('[{"name":"Ada"},{"name":"Grace"},{"name":"Linus"}]'), ["Ada", "Grace", "Linus"]);` },
  ],

  solution: `<?php

function to_json(array $data): string {
    return json_encode($data);
}

function parse_user(string $json): array {
    $data = json_decode($json, true);
    return [
        "name" => $data["name"] ?? "unknown",
        "age" => $data["age"] ?? 0,
    ];
}

function pluck_names(string $json): array {
    $rows = json_decode($json, true);
    return array_map(fn(array $row) => $row["name"], $rows);
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>Schema</td><td><code>struct</code> + <code>#[derive(...)]</code></td><td>none — arrays in, arrays out</td></tr>
  <tr><td>Serialize</td><td><code>serde_json::to_string(&amp;v)?</code></td><td><code>json_encode($v)</code></td></tr>
  <tr><td>Deserialize</td><td><code>serde_json::from_str(&amp;s)?</code></td><td><code>json_decode($s, true)</code></td></tr>
  <tr><td>Forgot the flag</td><td>—</td><td><code>json_decode($s)</code> → <code>stdClass</code>, <code>-&gt;name</code> access</td></tr>
  <tr><td>Parse failure</td><td><code>Err(serde_json::Error)</code>, must handle</td><td><code>null</code> returned silently; <code>JSON_THROW_ON_ERROR</code> to throw</td></tr>
  <tr><td>Optional field</td><td><code>Option&lt;T&gt;</code> + <code>unwrap_or</code></td><td><code>$data["k"] ?? $default</code></td></tr>
  <tr><td>Pretty print</td><td><code>to_string_pretty</code></td><td><code>json_encode($v, JSON_PRETTY_PRINT)</code></td></tr>
</table>
<p>What serde bought you was a boundary: once <code>from_str</code>
returned <code>Ok(user)</code>, the whole program knew the shape was right.
In PHP the decode succeeds and the <em>shape questions follow you around</em>
— every <code>$data["name"]</code> is a small leap of faith, softened by
<code>??</code>. Idiomatic PHP therefore validates at the edge, serde-style:
decode with <code>JSON_THROW_ON_ERROR</code>, immediately normalize into a
known shape (as <code>parse_user</code> does) or into typed readonly
objects, and let the rest of the code trust the result.</p>`,
};
