<div id="app"></div>
<script>
const LESSON = {
  number: 16,
  title: "Exceptions & Error Handling",

  intro: `
<p>Rust splits failure into two worlds: recoverable errors travel as
<code>Result&lt;T, E&gt;</code> values you must plumb through every signature
(with <code>?</code> doing the forwarding), and unrecoverable ones
<code>panic!</code> and unwind the stack. PHP has only the second world —
and uses it for everything. A PHP function that can fail just
<code>throw</code>s, and the error propagates <em>invisibly</em> up the call
stack until some frame catches it. No <code>Result</code> in the return
type, no <code>?</code> at each hop — and, be honest with yourself: no
compiler forcing anyone to handle anything. The panic model <em>is</em> the
normal path here; a signature like <code>parse_age(string $s): int</code>
tells you nothing about what can go wrong.</p>
<table>
  <tr><th>Rust</th><th>PHP</th></tr>
  <tr><td><code>Result&lt;T, E&gt;</code> in the signature</td><td>Nothing in the signature — <code>throw</code> inside the body</td></tr>
  <tr><td><code>?</code> forwards the error</td><td>Automatic: uncaught exceptions bubble up on their own</td></tr>
  <tr><td><code>match result { Ok(v) =&gt; …, Err(e) =&gt; … }</code></td><td><code>try { … } catch (SomeException $e) { … }</code></td></tr>
  <tr><td>Matching the error <em>variant</em></td><td>Typed catch: <code>catch (InvalidArgumentException $e)</code></td></tr>
  <tr><td>Custom error enum / struct</td><td><code>class MyError extends Exception {}</code></td></tr>
  <tr><td><code>Drop</code> runs on unwind</td><td><code>finally { … }</code> runs whether or not something threw</td></tr>
</table>
<p>The <code>try/catch</code> block is your <code>match</code> on
<code>Result</code>: the <code>try</code> arm is <code>Ok</code>, each
<code>catch</code> arm matches an error variant by class (subclasses match
too, like a <code>_</code>-ish pattern up the hierarchy). Stack several
<code>catch</code> blocks to distinguish variants, and use
<code>finally</code> for the cleanup you would otherwise trust to
<code>Drop</code>. Combinators like <code>unwrap_or</code> don't exist —
you reconstruct them from <code>try/catch</code> by hand.</p>`,

  rust: `fn parse_age(s: &str) -> Result<u32, String> {
    let t = s.trim();
    if !t.is_empty() && t.chars().all(|c| c.is_ascii_digit()) {
        Ok(t.parse().unwrap())
    } else {
        Err(format!("not a valid age: {t:?}"))
    }
}

fn safe_parse_age(s: &str, default: u32) -> u32 {
    // The Err variant is a value; unwrap_or consumes it.
    parse_age(s).unwrap_or(default)
}

fn main() {
    assert_eq!(parse_age("42"), Ok(42));
    assert_eq!(safe_parse_age("abc", 18), 18);
}`,

  task: `
<p>Port the <code>Result</code> pipeline to exceptions:</p>
<ol>
  <li>Write <code>parse_age(string $s): int</code>. Trim the input; if
      <code>ctype_digit(trim($s))</code> is false, <code>throw new
      InvalidArgumentException(...)</code> — that throw is your
      <code>Err(...)</code>, except the signature stays silent about it.
      Otherwise return the digits cast to <code>int</code> with
      <code>(int)</code>.</li>
  <li>Write <code>safe_parse_age(string $s, int $default): int</code> —
      <code>unwrap_or</code>, reconstructed by hand: <code>try</code> to
      return <code>parse_age($s)</code>, and in a typed
      <code>catch (InvalidArgumentException $e)</code> block return
      <code>$default</code> instead.</li>
</ol>
<p>Note what the tests must do to check the failure path: call the function
inside their own <code>try</code> and assert the right exception class
arrives. That ceremony is what <code>assert_eq!(r, Err(...))</code> used to
be.</p>`,

  starter: `<?php

// 1. parse_age: the Ok path returns an int; the Err path is a throw.
//    Rust: Err(format!("not a valid age")) -> PHP: throw new InvalidArgumentException(...)
//    Validity check: ctype_digit(trim($s))
function parse_age(string $s): int {
    throw new Exception("TODO: implement parse_age");
}

// 2. safe_parse_age: unwrap_or, rebuilt from try/catch.
//    Catch only InvalidArgumentException -- the variant you expect.
function safe_parse_age(string $s, int $default): int {
    throw new Exception("TODO: implement safe_parse_age");
}
`,

  requirements: [
    { pattern: /InvalidArgumentException/, message: "Throw (and catch) InvalidArgumentException — the specific variant, not bare Exception" },
    { pattern: /try\s*\{/, message: "Use a try block in safe_parse_age" },
    { pattern: /catch\s*\(/, message: "Use a catch block with a typed exception" },
    { pattern: /throw\s+new/, message: "Throw a new exception from parse_age on bad input" },
  ],

  tests: [
    { name: 'parse_age("42") returns 42',
      code: 'expect_eq(parse_age("42"), 42);' },
    { name: 'parse_age("  7 ") trims whitespace and returns 7',
      code: 'expect_eq(parse_age("  7 "), 7);' },
    { name: 'parse_age("abc") throws InvalidArgumentException',
      code: 'try { parse_age("abc"); throw new Exception("did not throw"); } catch (InvalidArgumentException $e) {}' },
    { name: 'parse_age("") throws InvalidArgumentException',
      code: 'try { parse_age(""); throw new Exception("did not throw"); } catch (InvalidArgumentException $e) {}' },
    { name: 'safe_parse_age("abc", 18) falls back to 18',
      code: 'expect_eq(safe_parse_age("abc", 18), 18);' },
    { name: 'safe_parse_age("30", 18) returns 30',
      code: 'expect_eq(safe_parse_age("30", 18), 30);' },
  ],

  solution: `<?php

function parse_age(string $s): int {
    $t = trim($s);
    if (!ctype_digit($t)) {
        throw new InvalidArgumentException("not a valid age: $t");
    }
    return (int) $t;
}

function safe_parse_age(string $s, int $default): int {
    try {
        return parse_age($s);
    } catch (InvalidArgumentException $e) {
        return $default;
    }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Rust</th><th>PHP</th></tr>
  <tr><td>Signal failure</td><td><code>return Err(e)</code></td><td><code>throw new SomeException(...)</code></td></tr>
  <tr><td>Propagate upward</td><td><code>?</code> at every call site</td><td>Automatic — uncaught exceptions climb the stack</td></tr>
  <tr><td>Handle it</td><td><code>match</code> / <code>if let Err(e)</code></td><td><code>try { … } catch (SomeException $e) { … }</code></td></tr>
  <tr><td>Match a variant</td><td><code>Err(MyError::BadInput)</code></td><td><code>catch (InvalidArgumentException $e)</code> (class = variant)</td></tr>
  <tr><td>Custom error type</td><td><code>enum MyError { … }</code></td><td><code>class MyError extends Exception {}</code></td></tr>
  <tr><td><code>unwrap_or(default)</code></td><td>one method call</td><td>hand-rolled <code>try/catch</code> returning <code>$default</code></td></tr>
  <tr><td>Cleanup on unwind</td><td><code>Drop</code></td><td><code>finally { … }</code>, or destructors on scope exit</td></tr>
  <tr><td>The message</td><td><code>e.to_string()</code></td><td><code>$e-&gt;getMessage()</code></td></tr>
</table>
<p>The deep trade: Rust makes error paths <em>visible and mandatory</em> —
every signature declares them, every caller acknowledges them. PHP makes
them invisible and optional, which reads wonderfully (no plumbing) and
fails silently in review (nothing tells you <code>parse_age</code> can
throw except its docs or its source). Idiomatic PHP leans on the class
hierarchy to compensate: throw the most specific SPL exception that fits
(<code>InvalidArgumentException</code>, <code>RangeException</code>, …) and
catch narrowly, so a typo-level bug (<code>TypeError</code>) never gets
swallowed by a <code>catch</code> meant for bad user input.</p>`,
};
