  intro: `
<p>Kotlin strings will feel instantly familiar. Interpolation uses a bare
<code>$name</code> instead of Java's <code>+ name +</code> concatenation (or
<code>String.format</code>), and for a full expression you wrap it in braces:
<code>\${user.age + 1}</code>. Since there's no separate builder syntax to opt
into, a plain double-quoted string can always hold interpolation.</p>
<table>
  <tr><th>Java</th><th>Kotlin</th></tr>
  <tr><td><code>"Hi " + name</code></td><td><code>"Hi $name"</code></td></tr>
  <tr><td><code>String.valueOf(a + b)</code></td><td><code>"\${a + b}"</code></td></tr>
  <tr><td><code>s.toUpperCase()</code></td><td><code>s.uppercase()</code></td></tr>
  <tr><td><code>s.contains(x)</code></td><td><code>s.contains(x)</code></td></tr>
  <tr><td><code>Integer.parseInt("42")</code></td><td><code>"42".toInt()</code></td></tr>
</table>
<p>The method names are close but not identical: <code>uppercase()</code> /
<code>lowercase()</code> (not <code>toUpperCase</code>), and
<code>joinToString()</code> in place of <code>String.join</code> or a
<code>StringJoiner</code>. Multi-line and regex-heavy text goes in a
<em>triple-quoted</em> raw string (<code>""" ... """</code>) where backslashes
are literal — handy where Java would otherwise need a text block with escaped
characters or a <code>StringBuilder</code>.</p>`,

  solution: `fun greet(name: String): String {
    return "Hello, $name!"
}

fun preview(title: String, body: String): String {
    return "\${title.uppercase()}: \${body.length} chars"
}

fun slugify(title: String): String {
    return title.trim().lowercase().split(" ").joinToString("-")
}

fun redact(text: String): String {
    return text.replace("secret", "*****")
}

fun snippet(text: String): String {
    return text.substring(0, 5)
}

fun mentions(text: String, term: String): Boolean {
    return text.contains(term)
}

fun isHashtag(text: String): Boolean {
    return text.startsWith("#")
}

fun doubleNumber(numText: String): String {
    return (numText.trim().toInt() * 2).toString()
}

fun card(name: String, role: String): String {
    return """
        Name: $name
        Role: $role
    """.trimIndent()
}

  notes: `
<table>
  <tr><th>Task</th><th>Java</th><th>Kotlin</th></tr>
  <tr><td>Interpolate</td><td><code>"" + x</code></td><td><code>"$x"</code> / <code>"\${x.y}"</code></td></tr>
  <tr><td>Case</td><td><code>toUpperCase()</code></td><td><code>uppercase()</code></td></tr>
  <tr><td>Split &amp; join</td><td><code>String.join("-", s.split(","))</code></td><td><code>s.split(",").joinToString("-")</code></td></tr>
  <tr><td>Substring</td><td><code>s.substring(0, 5)</code></td><td><code>s.substring(0, 5)</code></td></tr>
  <tr><td>Contains</td><td><code>s.contains(x)</code></td><td><code>s.contains(x)</code></td></tr>
  <tr><td>Parse int</td><td><code>Integer.parseInt(s)</code></td><td><code>s.toInt()</code></td></tr>
  <tr><td>Raw / multi-line</td><td><code>"""line1\nline2"""</code> (text block)</td><td><code>"""line1\nline2"""</code></td></tr>
</table>
<p>One sharp edge for Java refugees: <code>"42".toInt()</code>
<em>throws</em> on bad input, just like <code>Integer.parseInt</code> does —
reach for <code>toIntOrNull()</code> when the text might not be a number and
you'd rather get <code>null</code> than catch a
<code>NumberFormatException</code>. And unlike Java's overloaded
<code>String.valueOf(x)</code>, Kotlin's <code>x.toString()</code> is a method
on every value, so <code>42.toString()</code> and <code>listOf(1).toString()</code>
both just work. Prefer <code>joinToString</code> whenever you're turning a
collection back into text — it takes optional <code>prefix</code>,
<code>postfix</code>, and per-element <code>transform</code> arguments that
cover most formatting needs.</p>`,
