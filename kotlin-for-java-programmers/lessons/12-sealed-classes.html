  title: "Sealed Classes",

  intro: `
<p>In Java you model "one of a fixed set of shapes" with an abstract base class
(or interface) and a small, fixed list of subclasses, then branch with
<code>instanceof</code> checks or, since Java 17, a <code>switch</code> pattern
match. Kotlin's equivalent is a <strong>sealed class</strong> (or <strong>sealed
interface</strong>): a type whose subclasses are all known at compile time
because they must live in the same file/module — very close to Java's own
<code>sealed</code> classes (Java 17+), but with tighter, more ergonomic
<code>when</code> support built in from Kotlin's start.</p>
<table>
  <tr><th>Java</th><th>Kotlin</th></tr>
  <tr><td><code>sealed abstract class Shape permits ...</code></td><td><code>sealed class Shape</code></td></tr>
  <tr><td><code>final class Circle extends Shape</code></td><td><code>class Circle : Shape()</code></td></tr>
  <tr><td><code>switch (shape) { case Circle c -&gt; ... }</code></td><td><code>when (s) { is Circle -&gt; ... }</code></td></tr>
  <tr><td>pattern check <code>shape instanceof Circle c</code></td><td>type check <code>is Circle</code></td></tr>
</table>
<p>The payoff is <em>exhaustiveness</em>. Because the compiler knows the complete
list of subtypes, a <code>when</code> that covers them all needs <strong>no
<code>else</code> branch</strong> — and if you later add a fourth subclass, every
<code>when</code> used as an expression stops compiling until you handle it. It is
the same safety a Java 21 exhaustive <code>switch</code> over a sealed hierarchy
gives you, but Kotlin has had it as a first-class expression form for years, and
you don't need a separate <code>permits</code> clause — the compiler infers the
subtype list from what's declared in the same file.</p>`,

  java: `sealed interface Shape permits Circle, Rectangle, Triangle {}

record Circle(double radius) implements Shape {}
record Rectangle(double width, double height) implements Shape {}
record Triangle(double base, double height) implements Shape {}

static double area(Shape shape) {
    return switch (shape) {
        case Circle c -> Math.PI * c.radius() * c.radius();
        case Rectangle r -> r.width() * r.height();
        case Triangle t -> 0.5 * t.base() * t.height();
    };
}`,

</ol>`,

  solution: `import kotlin.math.PI

sealed class Shape
class Circle(val radius: Double) : Shape()
class Rectangle(val width: Double, val height: Double) : Shape()
class Triangle(val base: Double, val height: Double) : Shape()

fun area(shape: Shape): Double = when (shape) {
    is Circle -> PI * shape.radius * shape.radius
    is Rectangle -> shape.width * shape.height
    is Triangle -> 0.5 * shape.base * shape.height
}

fun name(shape: Shape): String = when (shape) {
    is Circle -> "circle"
    is Rectangle -> "rectangle"
    is Triangle -> "triangle"
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Kotlin</th></tr>
  <tr><td>Closed set of types</td><td><code>sealed</code> class/interface + <code>permits</code></td><td><code>sealed class</code> / <code>sealed interface</code></td></tr>
  <tr><td>Variant</td><td><code>record Circle(double radius) implements Shape {}</code></td><td><code>class Circle(...) : Shape()</code></td></tr>
  <tr><td>Match</td><td><code>switch (shape) { case Circle c -&gt; }</code></td><td><code>when (s) { is Circle -&gt; }</code></td></tr>
  <tr><td>Narrowing</td><td>pattern variable binding (<code>Circle c</code>)</td><td>smart cast after <code>is</code></td></tr>
  <tr><td>Exhaustiveness</td><td>enforced for sealed types (Java 21+)</td><td>built in — no <code>else</code></td></tr>
</table>
<p>A <code>when</code> used as an <em>expression</em> (as here, on the right of
<code>=</code>) is checked for exhaustiveness; a <code>when</code> used only as a
statement is not, so prefer the expression form to get the safety. The same
pattern models a <code>Result</code>: <code>sealed class Result&lt;out T&gt;</code>
with <code>class Ok&lt;T&gt;(val value: T)</code> and
<code>class Err(val message: String)</code>, then <code>when</code> over it.
Variants that carry no data can be <code>object</code> singletons (e.g.
<code>object Loading : Result&lt;Nothing&gt;()</code>) instead of classes —
unlike a Java sealed hierarchy, where a no-data variant still needs its own
(often empty) record or class.</p>`,
