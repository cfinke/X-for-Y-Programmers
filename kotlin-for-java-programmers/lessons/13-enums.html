  title: "Enums",

  intro: `
<p>A Java <code>enum</code> is already a real class — each constant is a
singleton instance, and it can carry fields, constructors, and methods.
Kotlin's <code>enum class</code> is the same idea with tighter syntax: each
constant is still a real singleton object that can carry its own
<em>properties</em>, share <em>methods</em>, and even override behaviour
per constant.</p>
<table>
  <tr><th>Java</th><th>Kotlin</th></tr>
  <tr><td><code>enum Status { OK, ERROR }</code></td><td><code>enum class Status { OK, ERROR }</code></td></tr>
  <tr><td><code>Status.OK</code></td><td><code>Status.OK</code></td></tr>
  <tr><td><code>Status.OK.toString()</code> → <code>"OK"</code></td><td><code>Status.OK.name</code> → <code>"OK"</code></td></tr>
  <tr><td><code>Status.OK.ordinal()</code> → <code>0</code></td><td><code>Status.OK.ordinal</code> → <code>0</code></td></tr>
  <tr><td><code>Status.valueOf("OK")</code></td><td><code>Status.valueOf("OK")</code></td></tr>
  <tr><td><code>Status.values()</code></td><td><code>Status.values()</code></td></tr>
</table>
<p>Because a constant can take constructor arguments, you attach data directly:
<code>OK(200)</code> stores <code>200</code> in a <code>val code</code> property
— just like a Java enum constant passing arguments to its constructor. Every
constant automatically gets <code>.name</code> (its declared identifier as a
<code>String</code>) and <code>.ordinal</code> (its zero-based position), same
as Java's <code>name()</code> and <code>ordinal()</code>. And a
<code>when</code> over an enum is <em>exhaustive</em> — if you handle every
constant, you need no <code>else</code>, and the compiler will flag you the day
someone adds a new one (Java's <code>switch</code> over an enum warns but
doesn't require exhaustiveness).</p>`,

  java: `enum HttpStatus {
  OK(200),
  NOT_FOUND(404),
  SERVER_ERROR(500);

  final int code;

  HttpStatus(int code) {
    this.code = code;
  }
}

boolean isError(HttpStatus s) {
  return s.code >= 400;
}

String label(HttpStatus s) {
  switch (s) {
    case OK: return "OK";
    case NOT_FOUND: return "Not Found";
    case SERVER_ERROR: return "Server Error";
    default: throw new IllegalStateException();
  }
}`,

  solution: `enum class HttpStatus(val code: Int) {
    OK(200),
    NOT_FOUND(404),
    SERVER_ERROR(500);

    fun isError(): Boolean = code >= 400
}

fun label(status: HttpStatus): String {
    return when (status) {
        HttpStatus.OK -> "OK"
        HttpStatus.NOT_FOUND -> "Not Found"
        HttpStatus.SERVER_ERROR -> "Server Error"
    }
}

fun allCodes(): List<Int> {
    return HttpStatus.values().map { it.code }
}

fun fromName(name: String): HttpStatus {
    return HttpStatus.valueOf(name)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Kotlin</th></tr>
  <tr><td>Declare</td><td><code>enum Status { OK }</code></td><td><code>enum class Status { OK }</code></td></tr>
  <tr><td>Attach data</td><td>field + constructor: <code>OK(200)</code></td><td><code>OK(200)</code> + <code>val code</code></td></tr>
  <tr><td>Constant name</td><td><code>Status.OK.name()</code></td><td><code>Status.OK.name</code></td></tr>
  <tr><td>Position</td><td><code>Status.OK.ordinal()</code></td><td><code>Status.OK.ordinal</code></td></tr>
  <tr><td>By name</td><td><code>Status.valueOf("OK")</code></td><td><code>Status.valueOf("OK")</code></td></tr>
  <tr><td>All members</td><td><code>Status.values()</code></td><td><code>Status.values()</code></td></tr>
  <tr><td>Switch</td><td><code>switch</code> (warns, not required)</td><td>exhaustive <code>when</code> — no <code>else</code></td></tr>
</table>
<p>Constants can also override a method individually: declare an
<code>abstract fun</code> in the enum body and give each constant a <code>{ ... }</code>
block — the enum becomes a compact strategy table, the same trick as a Java
enum constant with a constant-specific class body (<code>OK { ... }</code>).
Note the semicolon after the last constant: it is required whenever the enum
body contains members (a constructor property, method, or override), just as
Java requires one when constants are followed by members. And
<code>valueOf</code> throws <code>IllegalArgumentException</code> for an
unknown name — same as Java's <code>valueOf</code> — so reach for
<code>entries.find { it.name == name }</code> or
<code>enumValueOf&lt;HttpStatus&gt;(...)</code> in a <code>try</code> when the
input is untrusted.</p>`,
