  intro: `
<p>In Java, <code>List&lt;T&gt;</code> is a single interface and immutability is
something you bolt on afterward with <code>Collections.unmodifiableList</code> or
<code>List.of</code>. Kotlin splits the idea into <em>two distinct
types</em>: <code>List&lt;T&gt;</code> has no mutating methods at all, while
<code>MutableList&lt;T&gt;</code> adds <code>add</code>/<code>remove</code>. You
choose the capability by choosing the builder: <code>listOf(...)</code> gives a
read-only <code>List</code>, and <code>mutableListOf(...)</code> gives a
<code>MutableList</code>.</p>
<table>
  <tr><th>Java</th><th>Kotlin</th></tr>
  <tr><td><code>List&lt;Integer&gt; xs = List.of(1, 2, 3);</code></td><td><code>val xs = listOf(1, 2, 3)</code></td></tr>
  <tr><td><code>List&lt;Integer&gt; ys = new ArrayList&lt;&gt;();</code></td><td><code>val ys = mutableListOf&lt;Int&gt;()</code></td></tr>
  <tr><td><code>ys.add(4)</code></td><td><code>ys.add(4)</code></td></tr>
  <tr><td><code>xs.get(0)</code>, <code>xs.size()</code></td><td><code>xs[0]</code>, <code>xs.size</code></td></tr>
  <tr><td><code>xs.contains(2)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td><code>xs.stream().map(x -&gt; x * 2).toList()</code></td><td><code>xs.map { it * 2 }</code></td></tr>
</table>
<p>Notice indexing needs a method call in Java (<code>xs.get(0)</code>) but is
just bracket syntax in Kotlin (<code>xs[0]</code>); <code>.size()</code>
becomes the property <code>.size</code>, membership uses the <code>in</code>
operator instead of <code>.contains(...)</code>, and there is no need for
<code>.stream()</code>/<code>.toList()</code> ceremony — lambdas drop the
parameter list when there is a single argument, and you refer to it as
<code>it</code>. <code>first()</code> and <code>last()</code> return the
ends of a list. Crucially, calling <code>.add()</code> on a plain
<code>List</code> is a <em>compile error</em>, not a runtime
<code>UnsupportedOperationException</code> — the type system enforces
read-only.</p>`,

  java: `List<Integer> firstThree = List.of(1, 2, 3);

List<Integer> nums = new ArrayList<>();
nums.add(1);
nums.add(2);

static List<Integer> doubled(List<Integer> list) {
  return list.stream().map(x -> x * 2).toList();
}

static List<Integer> evens(List<Integer> list) {
  return list.stream().filter(x -> x % 2 == 0).toList();
}`,

  solution: `fun firstThree(): List<Int> {
    return listOf(1, 2, 3)
}

fun collect(n: Int): MutableList<Int> {
    val result = mutableListOf<Int>()
    for (i in 1..n) {
        result.add(i)
    }
    return result
}

fun at(list: List<Int>, i: Int): Int {
    return list[i]
}

fun count(list: List<Int>): Int {
    return list.size
}

fun has(list: List<Int>, x: Int): Boolean {
    return x in list
}

fun ends(list: List<Int>): List<Int> {
    return listOf(list.first(), list.last())
}

fun doubled(list: List<Int>): List<Int> {
    return list.map { it * 2 }
}

fun evens(list: List<Int>): List<Int> {
    return list.filter { it % 2 == 0 }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Kotlin</th></tr>
  <tr><td>Read-only list</td><td><code>List&lt;Integer&gt;</code> (via <code>List.of</code>)</td><td><code>List&lt;Int&gt;</code></td></tr>
  <tr><td>Mutable list</td><td><code>ArrayList&lt;Integer&gt;</code></td><td><code>MutableList&lt;Int&gt;</code></td></tr>
  <tr><td>Build</td><td><code>List.of(1, 2, 3)</code></td><td><code>listOf(1, 2, 3)</code></td></tr>
  <tr><td>Append</td><td><code>xs.add(4)</code></td><td><code>xs.add(4)</code></td></tr>
  <tr><td>Remove value</td><td><code>xs.remove(Integer.valueOf(4))</code></td><td><code>xs.remove(4)</code></td></tr>
  <tr><td>Length</td><td><code>xs.size()</code></td><td><code>xs.size</code></td></tr>
  <tr><td>Membership</td><td><code>xs.contains(2)</code></td><td><code>2 in xs</code></td></tr>
  <tr><td>Ends</td><td><code>xs.get(0)</code> / <code>xs.get(xs.size() - 1)</code></td><td><code>xs.first()</code> / <code>xs.last()</code></td></tr>
  <tr><td>Transform</td><td><code>xs.stream().map(x -&gt; x * 2).toList()</code></td><td><code>xs.map { it * 2 }</code></td></tr>
  <tr><td>Keep some</td><td><code>xs.stream().filter(x -&gt; ...).toList()</code></td><td><code>xs.filter { ... }</code></td></tr>
</table>
<p>A <code>MutableList</code> <em>is a</em> <code>List</code>, so you can pass one
anywhere a read-only <code>List</code> is expected — the receiver just cannot
mutate it. That is why <code>collect</code> returns a
<code>MutableList</code> yet compares equal to a <code>listOf(...)</code>:
equality is by contents, just as Java's <code>List.equals</code> compares
elements rather than references. Both <code>map</code> and <code>filter</code>
always return a <em>new</em> read-only <code>List</code>, never mutating the
source, just like Java's <code>Stream</code> pipeline never mutates the
original list. Reach for <code>listOf</code> by default and upgrade to
<code>mutableListOf</code> only when you genuinely need to grow or shrink the
collection in place.</p>`,
