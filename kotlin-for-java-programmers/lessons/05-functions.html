<script>
const LESSON = {
  number: 5,
  title: "Functions",

  intro: `
<p>Kotlin functions start with the <code>fun</code> keyword, and — unlike
Java — the parameter type follows the name and the return type comes last,
after a colon. There's no method needs to live inside a class, either.
Features you'd reach for verbose Java patterns to fake all have direct
Kotlin equivalents, often with less ceremony.</p>
<table>
  <tr><th>Java</th><th>Kotlin</th></tr>
  <tr><td><code>static int add(int a, int b)</code></td><td><code>fun add(a: Int, b: Int): Int</code></td></tr>
  <tr><td>overloaded method (default)</td><td><code>greeting: String = "Hi"</code></td></tr>
  <tr><td><code>add(2, 1)</code> (no such thing as named args)</td><td><code>add(b = 2, a = 1)</code> (named args)</td></tr>
  <tr><td><code>int... nums</code></td><td><code>vararg nums: Int</code></td></tr>
  <tr><td><code>void</code></td><td><code>: Unit</code> (usually omitted)</td></tr>
</table>
<p>Two things that feel new. First, when a function is just <em>one</em>
expression you can drop the braces and <code>return</code> and use
<code>=</code>: <code>fun square(n: Int) = n * n</code>. The return type is
inferred, which Java has no equivalent for outside of lambdas. Second, Kotlin
has real <strong>named arguments</strong>: you can pass
<code>greet(name = "Ada")</code> and even reorder them, which pairs
beautifully with default values so you only name the arguments you want to
change — no more writing three overloads just to fake an optional
parameter.</p>`,

  java: `String greet(String name, String greeting) {
  return greeting + ", " + name + "!";
}

String greet(String name) {
  return greet(name, "Hello");
}

int sum(int... nums) {
  int total = 0;
  for (int n : nums) {
    total += n;
  }
  return total;
}

List<String> log = new ArrayList<>();
void logMessage(String message) {
  log.add(message);
}`,

  task: `
<p>Rewrite these three functions in idiomatic Kotlin. Top-level declarations are
fine — no class or <code>main</code> needed:</p>
<ol>
  <li>Write <code>greet(name: String, greeting: String = "Hello"): String</code>
      as a <strong>single-expression</strong> function that returns a template
      like <code>"Hello, Ada!"</code>. The default lets callers write
      <code>greet("Ada")</code> instead of needing an overload, and named
      arguments let them write
      <code>greet(name = "Ada", greeting = "Hi")</code>.</li>
  <li>Write <code>sum(vararg nums: Int): Int</code> as a single-expression
      function that adds up any number of arguments (hint: <code>nums.sum()</code>).
      With no arguments it returns <code>0</code>.</li>
  <li>Write <code>logMessage(message: String)</code>, which returns
      <code>Unit</code> and appends <code>message</code> to the top-level
      <code>log</code> list.</li>
</ol>`,

  starter: `// A shared log the tests inspect.
val log = mutableListOf<String>()

// 1. Single-expression function with a default argument.
fun greet(name: String, greeting: String = "Hello"): String = "" // TODO

// 2. Single-expression function taking a vararg of Ints.
fun sum(vararg nums: Int): Int = 0 // TODO

// 3. A Unit-returning function (no return type needed).
fun logMessage(message: String) {
    // TODO
}
`,

  requirements: [
    { pattern: /fun\s+greet\([^)]*greeting:\s*String\s*=\s*"Hello"[^)]*\)\s*:\s*String\s*=/, message: "Write greet as a single-expression function with a default: greeting: String = \"Hello\"" },
    { pattern: /fun\s+sum\(\s*vararg\s+nums:\s*Int\s*\)\s*:\s*Int\s*=/, message: "Write sum as a single-expression function taking vararg nums: Int" },
    { pattern: /log\.add\(/, message: "logMessage should append to the log list with log.add(...)" },
  ],

  tests: [
    { name: 'greet("Ada") uses the default greeting', code: '        expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'greet("Ada", "Hi") overrides the greeting', code: '        expect_eq(greet("Ada", "Hi"), "Hi, Ada!")' },
    { name: "greet with named arguments", code: '        expect_eq(greet(name = "Ada", greeting = "Hey"), "Hey, Ada!")' },
    { name: "greet with reordered named arguments", code: '        expect_eq(greet(greeting = "Yo", name = "Bo"), "Yo, Bo!")' },
    { name: "sum() with no arguments is 0", code: "        expect_eq(sum(), 0)" },
    { name: "sum(1, 2, 3) is 6", code: "        expect_eq(sum(1, 2, 3), 6)" },
    { name: "sum spreads an array with *", code: "        val nums = intArrayOf(4, 5, 6)\n        expect_eq(sum(*nums), 15)" },
    { name: "logMessage returns Unit and appends", code: '        val before = log.size\n        val result: Unit = logMessage("hello")\n        expect_true(result == Unit)\n        expect_eq(log.size, before + 1)\n        expect_eq(log.last(), "hello")' },
  ],

  solution: `val log = mutableListOf<String>()

fun greet(name: String, greeting: String = "Hello"): String = "$greeting, $name!"

fun sum(vararg nums: Int): Int = nums.sum()

fun logMessage(message: String) {
    log.add(message)
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>Java</th><th>Kotlin</th></tr>
  <tr><td>Single expression</td><td><code>int f(int n) { return n * n; }</code></td><td><code>fun f(n: Int) = n * n</code></td></tr>
  <tr><td>Default argument</td><td>overload: <code>int f(int x)</code> calling <code>f(int x, int y)</code></td><td><code>fun f(x: Int = 1)</code></td></tr>
  <tr><td>Named argument</td><td>—</td><td><code>f(x = 1)</code></td></tr>
  <tr><td>Rest / vararg</td><td><code>int f(int... xs)</code></td><td><code>fun f(vararg xs: Int)</code></td></tr>
  <tr><td>Spread a collection</td><td><code>f(arr)</code> (arrays auto-spread into varargs)</td><td><code>f(*arr)</code></td></tr>
  <tr><td>No return value</td><td><code>void</code></td><td><code>: Unit</code> (omit it)</td></tr>
</table>
<p>A few Kotlin-isms worth remembering. Named arguments are not just sugar — they
make call sites self-documenting and are the reason Kotlin rarely needs the
telescoping-overload or builder pattern you reach for in Java to fake optional
parameters. To pass an existing array into a <code>vararg</code>, use the
<em>spread operator</em> <code>*</code> (e.g. <code>sum(*nums)</code>) — Kotlin
requires it explicitly, unlike Java where an array argument is passed straight
into a varargs parameter with no special syntax. Finally, <code>Unit</code> is
a real type with a single value (also written <code>Unit</code>), unlike
Java's <code>void</code> which isn't a type at all; a function with no
declared return type returns <code>Unit</code> implicitly, so you almost never
type it out.</p>`,
};
