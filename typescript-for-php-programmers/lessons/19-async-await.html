const LESSON = {
  number: 19,
  title: "Async & Promises",

  intro: `
<p>PHP is refreshingly simple about time: everything blocks.
<code>file_get_contents()</code> and <code>curl_exec()</code> just… return when
they're done, and the next line runs after. Want two HTTP calls in parallel?
Now you're wiring up <code>curl_multi_*</code> handles or reaching for
ext-parallel/Swoole. In JavaScript the situation is inverted: <em>nothing</em>
blocks. A slow operation returns immediately — not with the value, but with a
<code>Promise</code>, a typed IOU for a value that will exist later.</p>
<p><code>Promise&lt;User&gt;</code> reads as "eventually, a User (or an
error)". The <code>async</code>/<code>await</code> keywords let you consume
these IOUs in code that <em>looks</em> like blocking PHP:
<code>const user = await fetchUser(1);</code> pauses this function (only this
function — the rest of the program keeps running) until the promise settles.
An <code>async function</code> always returns a <code>Promise</code>, and a
rejected promise surfaces through <code>await</code> as a throw you catch with
ordinary <code>try/catch</code>.</p>
<table>
  <tr><th>PHP</th><th>TypeScript</th></tr>
  <tr><td><code>$data = file_get_contents($url);</code> (blocks)</td><td><code>const data = await fetchData(url);</code> (suspends, doesn't block)</td></tr>
  <tr><td>Return type: <code>string</code></td><td>Return type: <code>Promise&lt;string&gt;</code></td></tr>
  <tr><td>Parallelism: <code>curl_multi_exec()</code> loop</td><td><code>await Promise.all([a(), b()])</code></td></tr>
  <tr><td><code>try { ... } catch (Exception $e)</code></td><td><code>try { await ... } catch (e)</code> — same shape</td></tr>
</table>
<p>The key concurrency habit: <code>await a(); await b();</code> runs
sequentially (like two PHP calls), while <code>await Promise.all([a(), b()])</code>
starts both at once and waits for both — the two-line version of a
<code>curl_multi</code> ceremony.</p>`,

  php: `<?php
// PHP: each call blocks until it finishes. Total time = sum of all calls.
function fetchUser(int $id): array {
    $json = file_get_contents("https://api.example.com/users/$id");
    if ($json === false) {
        throw new RuntimeException("No user with id $id");
    }
    return json_decode($json, true);
}

function fetchUserNames(array $ids): array {
    $names = [];
    foreach ($ids as $id) {          // one... at... a... time
        $user = fetchUser($id);
        $names[] = $user['name'];
    }
    return $names;
}
// Parallel version? curl_multi_init(), curl_multi_add_handle(),
// curl_multi_exec() in a loop... 30 lines later, maybe.`,

  task: `
<p>The starter provides a deterministic fake <code>fetchUser(id)</code> that
returns a <code>Promise</code> (resolving for ids 1–3, rejecting otherwise).
Leave it as-is and build on it:</p>
<ol>
  <li>Implement <code>async function fetchUserNames(ids: number[]): Promise&lt;string[]&gt;</code>:
      fetch <strong>all</strong> users concurrently with
      <code>Promise.all</code>, then return just their names, in the same
      order as <code>ids</code>.</li>
  <li>Implement <code>async function fetchUserNameOrDefault(id: number): Promise&lt;string&gt;</code>:
      <code>await fetchUser(id)</code> inside <code>try/catch</code>; return the
      user's name, or <code>"unknown"</code> if the promise rejected.</li>
</ol>
<p>No timers, no network — the fake helper resolves on the microtask queue, so
the tests are instant and deterministic.</p>`,

  starter: `// --- Provided fake async helper (do not modify) -------------------
// Simulates latency with Promise.resolve().then(...): asynchronous,
// but deterministic — no timers, no network.
const FAKE_USERS: Record<number, string> = { 1: "Ada", 2: "Rasmus", 3: "Anders" };

function fetchUser(id: number): Promise<{ id: number; name: string }> {
  return Promise.resolve().then(() => {
    const name = FAKE_USERS[id];
    if (name === undefined) {
      throw new Error("No user with id " + id);
    }
    return { id: id, name: name };
  });
}
// -------------------------------------------------------------------

// 1. TODO: fetch all users concurrently with Promise.all,
//    then map to their names (same order as ids).
async function fetchUserNames(ids: number[]): Promise<string[]> {
  return [];
}

// 2. TODO: await fetchUser(id) in a try/catch;
//    return the name, or "unknown" on rejection.
async function fetchUserNameOrDefault(id: number): Promise<string> {
  return "";
}
`,

  exportNames: ["fetchUser", "fetchUserNames", "fetchUserNameOrDefault"],

  requirements: [
    { pattern: /async\s+function/, message: "Declare your functions with async function" },
    { pattern: /await/, message: "Use await to consume the promises" },
    { pattern: /Promise\.all/, message: "Fetch the users concurrently with Promise.all" },
    { pattern: /try\s*\{[\s\S]*?\}\s*catch/, message: "Handle the rejection with try/catch around an await" },
  ],

  tests: [
    {
      name: "fetchUser(1) resolves to { id: 1, name: \"Ada\" } (provided helper intact)",
      run: async (x) => expectDeepEqual(await x.fetchUser(1), { id: 1, name: "Ada" }),
    },
    {
      name: "fetchUserNames([1, 2]) resolves to [\"Ada\", \"Rasmus\"]",
      run: async (x) => expectDeepEqual(await x.fetchUserNames([1, 2]), ["Ada", "Rasmus"]),
    },
    {
      name: "fetchUserNames([3, 1, 2]) preserves the requested order",
      run: async (x) => expectDeepEqual(await x.fetchUserNames([3, 1, 2]), ["Anders", "Ada", "Rasmus"]),
    },
    {
      name: "fetchUserNames([]) resolves to []",
      run: async (x) => expectDeepEqual(await x.fetchUserNames([]), []),
    },
    {
      name: "fetchUser(99) rejects",
      run: async (x) => {
        try {
          await x.fetchUser(99);
        } catch (e) {
          return;
        }
        throw new Error("expected the promise to reject, but it resolved");
      },
    },
    {
      name: "fetchUserNameOrDefault: 2 → \"Rasmus\", 99 → \"unknown\"",
      run: async (x) => {
        expectEqual(await x.fetchUserNameOrDefault(2), "Rasmus");
        expectEqual(await x.fetchUserNameOrDefault(99), "unknown");
      },
    },
  ],

  solution: `// --- Provided fake async helper (do not modify) -------------------
const FAKE_USERS: Record<number, string> = { 1: "Ada", 2: "Rasmus", 3: "Anders" };

function fetchUser(id: number): Promise<{ id: number; name: string }> {
  return Promise.resolve().then(() => {
    const name = FAKE_USERS[id];
    if (name === undefined) {
      throw new Error("No user with id " + id);
    }
    return { id: id, name: name };
  });
}
// -------------------------------------------------------------------

async function fetchUserNames(ids: number[]): Promise<string[]> {
  const users = await Promise.all(ids.map((id) => fetchUser(id)));
  return users.map((user) => user.name);
}

async function fetchUserNameOrDefault(id: number): Promise<string> {
  try {
    const user = await fetchUser(id);
    return user.name;
  } catch (e) {
    return "unknown";
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>PHP</th><th>TypeScript</th></tr>
  <tr><td>Slow call</td><td>Blocks the whole script</td><td>Returns a <code>Promise&lt;T&gt;</code> immediately</td></tr>
  <tr><td>"Wait for it"</td><td>Automatic (next line runs after)</td><td><code>await</code>, only inside an <code>async function</code></td></tr>
  <tr><td>Function that waits</td><td><code>function f(): array</code></td><td><code>async function f(): Promise&lt;User[]&gt;</code></td></tr>
  <tr><td>Failure</td><td><code>throw</code> / <code>false</code> return</td><td>Rejected promise; <code>await</code> re-throws it into <code>try/catch</code></td></tr>
  <tr><td>N calls in parallel</td><td><code>curl_multi_*</code>, ext-parallel, Swoole</td><td><code>await Promise.all([...])</code></td></tr>
  <tr><td>N calls in sequence</td><td>Just call them in order</td><td><code>await</code> them in order</td></tr>
</table>
<p>One trap for PHP muscle memory: forgetting <code>await</code> is not a
syntax error — you just get the <code>Promise</code> object itself, and
<code>user.name</code> is <code>undefined</code>. TypeScript usually saves you
here, because <code>Promise&lt;User&gt;</code> has no <code>name</code>
property and the compiler says so. Read "<code>Property does not exist on type
Promise&lt;...&gt;</code>" as "you forgot an <code>await</code>".</p>`,
};
