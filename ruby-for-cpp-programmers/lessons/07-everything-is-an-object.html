const LESSON = {
  number: 7,
  title: "Everything Is an Object",

  intro: `
<p>C++ splits the world in two: primitive value types (<code>int</code>,
<code>double</code>, <code>char</code>) that live in registers and support
operators but no methods, and class types that can. Ruby erases the split
entirely: <em>everything</em> is an object that receives messages. An integer
has methods. So does a float, a string, <code>nil</code>, <code>true</code>,
and the class <code>Integer</code> itself. (Don't fear the heap — the VM
stores small integers as tagged immediates, so <code>-3.abs</code> costs no
allocation.)</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>std::abs(x)</code></td><td><code>x.abs</code></td></tr>
  <tr><td><code>x % 2 == 0</code></td><td><code>x.even?</code></td></tr>
  <tr><td><code>for (int i = 0; i &lt; 5; ++i)</code></td><td><code>5.times { |i| ... }</code></td></tr>
  <tr><td><code>std::to_string(42)</code></td><td><code>42.to_s</code></td></tr>
  <tr><td>free function over a value</td><td>method <em>on</em> the value</td></tr>
</table>
<p>The consequence is a change in direction: where C++ wraps values in free
functions that read inside-out — <code>std::round(std::abs(x))</code> — Ruby
sends messages that chain left to right: <code>x.abs.round</code>. Idiomatic
Ruby is a pipeline of method calls on the data itself, and once every value
answers messages, even loops become messages: <code>5.times</code> is a
method on the integer <code>5</code>.</p>`,

  cpp: `#include <cmath>
#include <string>
#include <vector>

int absolute(int n) {
    return std::abs(n);            // free function, not a method on int
}

std::vector<int> even_numbers(const std::vector<int>& nums) {
    std::vector<int> out;
    for (int n : nums)
        if (n % 2 == 0) out.push_back(n);
    return out;
}

double rounded(double f, int digits) {
    const double p = std::pow(10.0, digits);
    return std::round(f * p) / p;  // double has no member functions
}

std::vector<char> char_list(const std::string& s) {
    return { s.begin(), s.end() };
}`,

  task: `
<p>Rewrite each free function as a one-line message send:</p>
<ol>
  <li><code>absolute(n)</code> — no <code>std::abs</code>; the integer answers
      <code>n.abs</code> itself.</li>
  <li><code>even_numbers(nums)</code> — no loop, no manual <code>% 2</code>:
      <code>nums.select { |n| n.even? }</code> asks each element the
      <code>even?</code> question and keeps the ones that say yes.</li>
  <li><code>rounded(f, digits)</code> — no pow/round arithmetic;
      <code>f.round(digits)</code> is a method on the float.</li>
  <li><code>char_list(s)</code> — <code>s.chars</code> splits a string into an
      array of one-character strings.</li>
</ol>
<p>Every body should be a single expression — the receiver does the work.</p>`,

  starter: `# 1. std::abs(n) -> a method on the integer itself.

  raise NotImplementedError, "TODO: implement char_list"

`,

  requirements: [
    { pattern: /\.abs/, message: "Call .abs on the number" },
    { pattern: /\.even\?/, message: "Ask each number n.even? inside select" },
    { pattern: /\.round\(/, message: "Call .round(digits) on the float" },
    { pattern: /\.chars/, message: "Call .chars on the string" },
  ],

  tests: [
    { name: "absolute(-5) returns 5 and absolute(7) returns 7",
      code: "  expect_eq(absolute(-5), 5)\n  expect_eq(absolute(7), 7)" },
    { name: "even_numbers([1, 2, 3, 4, 5, 6]) returns [2, 4, 6]",
      code: "  expect_eq(even_numbers([1, 2, 3, 4, 5, 6]), [2, 4, 6])" },
    { name: "even_numbers([1, 3, 5]) returns []",
      code: "  expect_eq(even_numbers([1, 3, 5]), [])" },
    { name: "rounded(3.14159, 2) returns 3.14",
      code: "  expect_eq(rounded(3.14159, 2), 3.14)" },
    { name: "rounded(2.71828, 3) returns 2.718",
      code: "  expect_eq(rounded(2.71828, 3), 2.718)" },
    { name: 'char_list("ruby") returns ["r", "u", "b", "y"]',
      code: '  expect_eq(char_list("ruby"), ["r", "u", "b", "y"])' },
  ],

  solution: `def absolute(n)
  n.abs
end

def even_numbers(nums)
  nums.select { |n| n.even? }
end

def rounded(f, digits)
  f.round(digits)
end

def char_list(s)
  s.chars
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>Absolute value</td><td><code>std::abs(x)</code></td><td><code>x.abs</code></td></tr>
  <tr><td>Parity</td><td><code>x % 2 == 0</code></td><td><code>x.even?</code> / <code>x.odd?</code></td></tr>
  <tr><td>Rounding</td><td><code>std::round(f * p) / p</code></td><td><code>f.round(digits)</code></td></tr>
  <tr><td>Counted loop</td><td><code>for (int i = 0; i &lt; 5; ++i)</code></td><td><code>5.times { |i| ... }</code></td></tr>
  <tr><td>String to chars</td><td><code>{ s.begin(), s.end() }</code></td><td><code>s.chars</code></td></tr>
  <tr><td>Compose</td><td><code>g(f(x))</code>, inside-out</td><td><code>x.f.g</code>, left to right</td></tr>
  <tr><td>What's an object?</td><td>class types only</td><td>everything — <code>1</code>, <code>nil</code>, classes themselves</td></tr>
</table>
<p>The pattern <code>select(&amp;:even?)</code> is shorthand for
<code>select { |n| n.even? }</code>: <code>&amp;:even?</code> turns the symbol
into a block that sends that message to each element. It only works because
numbers <em>are</em> objects — the predicate travels to the data instead of
the data traveling to a free function. That reversal is the heart of Ruby
style, and it is why idiomatic code chains: <code>nums.select(&amp;:even?).map(&amp;:abs).sum</code>.</p>`,
};
