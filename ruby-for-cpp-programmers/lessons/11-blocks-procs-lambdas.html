  title: "Blocks, Procs & Lambdas",

  intro: `
<p>You already write closures constantly — every <code>[](int x) { ... }</code>
you pass to <code>std::for_each</code> is one. Ruby's twist is syntactic: the
closure rides <em>outside</em> the parentheses.
<code>std::for_each(v.begin(), v.end(), [](int x) { ... })</code> becomes
<code>arr.each { |x| ... }</code> — the <code>{ |x| ... }</code> is a
<strong>block</strong>, an anonymous chunk of code handed to the method call
it trails. And there is no capture list to write, ever: a block captures
everything in scope automatically, and because the GC owns all objects,
captured variables can never dangle. The whole
<code>[=]</code>-vs-<code>[&amp;]</code>-vs-"whoops, that reference outlived
the stack frame" question simply does not exist.</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>std::for_each(v.begin(), v.end(), [](int x) { ... })</code></td><td><code>arr.each { |x| ... }</code></td></tr>
  <tr><td><code>[n](int x) { return x * n; }</code> — capture list, by hand</td><td><code>->(x) { x * n }</code> — captures everything, safely</td></tr>
  <tr><td><code>const std::function&lt;int(int)&gt;&amp; f</code> parameter</td><td>no parameter at all — the method calls <code>yield</code></td></tr>
  <tr><td><code>f(x)</code> / <code>f.operator()(x)</code></td><td><code>f.call(x)</code></td></tr>
</table>
<p>On the receiving side, methods take a block <em>invisibly</em>: there is no
<code>std::function</code> parameter in the signature. Inside the method,
<code>yield(x)</code> invokes whatever block the caller attached, and
<code>block_given?</code> asks whether one was attached at all. When you do
want a closure as a first-class <em>value</em> — something to store, return,
or pass around — you use a lambda: <code>->(x) { x * 2 }</code>, invoked with
<code>.call</code> (no <code>operator()</code> here). One last shorthand you
will see everywhere: <code>&amp;:upcase</code> turns a method name into a
block, so <code>words.map(&amp;:upcase)</code> means "call
<code>.upcase</code> on each element."</p>`,

  cpp: `#include <algorithm>
#include <functional>
#include <iostream>
#include <vector>

int apply_twice(int x, const std::function<int(int)>& f) {
    return f(f(x));                        // callable is a visible parameter
}

std::function<int(int)> make_multiplier(int n) {
    return [n](int x) { return x * n; };   // capture n BY VALUE — [&n]
}                                          // would dangle after return

int main() {
    std::vector<int> v{1, 2, 3};
    std::for_each(v.begin(), v.end(), [](int x) { std::cout << x; });
    auto triple = make_multiplier(3);
    std::cout << apply_twice(2, triple);   // 18, via operator()
}`,

  task: `
<p>Four small pieces, covering both sides of the block handshake:</p>
<ol>
  <li><code>apply_twice(x)</code> — takes a block invisibly (no extra
      parameter!) and applies it twice: the body is
      <code>yield(yield(x))</code>.</li>
  <li><code>maybe_yield(x)</code> — if the caller attached a block, apply it
      to <code>x</code>; otherwise return <code>x</code> unchanged. Use
      <code>block_given?</code> as the test of a ternary.</li>
  <li><code>make_multiplier(n)</code> — return a lambda
      <code>->(x) { x * n }</code>. Note what you are <em>not</em> writing:
      a capture list. <code>n</code> is closed over automatically and kept
      alive by the GC — the exact case where <code>[&amp;n]</code> would be a
      dangling reference in C++.</li>
  <li><code>shout_all(words)</code> — uppercase every word using the symbol
      shorthand: <code>words.map(&amp;:upcase)</code>.</li>
</ol>
<p>Watch how the tests call your methods: <code>apply_twice(3) { |v| v * 2 }</code>
— the block sits after the closing paren, and the argument list never
mentions it.</p>`,

  tests: [
    { name: "apply_twice(3) { |v| v * 2 } returns 12",

    { name: 'apply_twice("a") { |s| s + "!" } returns "a!!"',

    { name: "maybe_yield(5) { |v| v + 1 } returns 6",

    { name: "maybe_yield(5) with no block returns 5 untouched",

    { name: "make_multiplier(3).call(4) returns 12 — n survives the method returning",

  solution: `def apply_twice(x)
  yield(yield(x))
end

def maybe_yield(x)
  block_given? ? yield(x) : x
end

def make_multiplier(n)
  ->(x) { x * n }
end

def shout_all(words)
  words.map(&:upcase)
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>Anonymous function at a call site</td><td><code>[](int x) { ... }</code> inside the parens</td><td><code>{ |x| ... }</code> block, after the parens</td></tr>
  <tr><td>Capture</td><td><code>[=]</code>, <code>[&amp;]</code>, <code>[n]</code> — chosen by hand, can dangle</td><td>everything in scope, automatically; GC means no dangling</td></tr>
  <tr><td>Accept a callable</td><td><code>const std::function&lt;int(int)&gt;&amp; f</code> parameter</td><td>invisible — any method may receive a block</td></tr>
  <tr><td>Invoke it</td><td><code>f(x)</code></td><td><code>yield(x)</code></td></tr>
  <tr><td>Was one passed?</td><td>overloads / <code>std::optional</code> juggling</td><td><code>block_given?</code></td></tr>
  <tr><td>First-class closure</td><td><code>auto f = [n](int x) { ... };</code></td><td><code>f = ->(x) { ... }</code></td></tr>
  <tr><td>Call the value</td><td><code>f(x)</code> via <code>operator()</code></td><td><code>f.call(x)</code> (also <code>f.(x)</code>, <code>f[x]</code>)</td></tr>
  <tr><td>Method name as callable</td><td><code>std::mem_fn(&amp;T::upcase)</code></td><td><code>&amp;:upcase</code></td></tr>
</table>
<p>The deep difference is who owns the captured state. Your
<code>make_multiplier</code> works in C++ only because you captured
<code>n</code> by value; capture it by reference and you have UB the moment
the function returns. Ruby's closures capture the <em>variables
themselves</em>, and the GC keeps them alive as long as any closure can see
them — the safe choice is the only choice. Blocks handle the 95% case (one
closure, used immediately, at a call site); lambdas cover the rest (store it,
return it, keep several).</p>`,
