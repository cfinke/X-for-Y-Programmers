<script>
const LESSON = {
  number: 9,
  title: "Classes & Objects",

  intro: `
<p>Strip a C++ class of everything the compiler makes you manage and what's
left is a Ruby class: no header/implementation split, no rule of five, no
destructors (the GC owns lifetime), no <code>delete</code>, no copy/move
constructors to write or suppress. You define <code>initialize</code> — the
one and only constructor — and callers invoke it as <code>Foo.new(args)</code>
(<code>new</code> is a method on the class, which is itself an object).</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>class Foo { public: ... };</code> + .cpp file</td><td><code>class Foo ... end</code> — one place</td></tr>
  <tr><td><code>Foo(std::string o) : owner_(o) {}</code></td><td><code>def initialize(owner) @owner = owner end</code></td></tr>
  <tr><td><code>Foo obj(args);</code></td><td><code>obj = Foo.new(args)</code></td></tr>
  <tr><td>member <code>owner_</code> + hand-written getter</td><td><code>@owner</code> + <code>attr_reader :owner</code></td></tr>
  <tr><td><code>~Foo()</code>, <code>delete</code>, rule of five</td><td>garbage collector — nothing to write</td></tr>
</table>
<p>Members are <strong>instance variables</strong>: <code>@balance</code>
springs into existence on first assignment and is <em>truly</em> private —
Ruby has no public fields at all, so outside code can never touch
<code>@balance</code> directly. Access goes through methods, and rather than
hand-writing getters, you ask the class to generate them:
<code>attr_reader :owner</code> writes the getter,
<code>attr_accessor</code> adds the setter too. One more shift: every Ruby
variable holds a <em>reference</em> — assignment shares the object
(<code>shared_ptr</code> semantics without the ceremony), so there is no
copying on assignment and no slicing, ever.</p>`,

  cpp: `#include <string>

class BankAccount {
public:
    explicit BankAccount(std::string owner)
        : owner_(std::move(owner)), balance_(0) {}

    const std::string& owner() const { return owner_; }   // hand-written
    int balance() const { return balance_; }              // getters

    void deposit(int amount) { balance_ += amount; }

    bool withdraw(int amount) {
        if (amount > balance_) return false;
        balance_ -= amount;
        return true;
    }

private:
    std::string owner_;   // trailing-underscore convention
    int balance_;
};`,

  task: `
<p>Port <code>BankAccount</code> to Ruby:</p>
<ol>
  <li><code>class BankAccount</code> with
      <code>def initialize(owner)</code> that stores <code>@owner</code> and
      starts <code>@balance</code> at <code>0</code>.</li>
  <li><code>attr_reader :owner, :balance</code> — two generated getters,
      zero hand-written ones. (No setters: reader only, like the
      <code>const</code> getters.)</li>
  <li><code>deposit(amount)</code> — add to <code>@balance</code>.</li>
  <li><code>withdraw(amount)</code> — if <code>amount</code> exceeds the
      balance, return <code>false</code> and change nothing; otherwise deduct
      and return <code>true</code>. A modifier-if guard keeps it tidy.</li>
</ol>`,

  starter: `# initialize is the constructor; Foo.new(args) calls it.
# @ivars appear on first assignment and are always private.
class BankAccount
  attr_reader :owner, :balance

  # 1. Store @owner; start @balance at 0.
  def initialize(owner)
    raise NotImplementedError, "TODO: implement initialize"
  end

  # 2. Add amount to @balance.
  def deposit(amount)
    raise NotImplementedError, "TODO: implement deposit"
  end

  # 3. Return false (leaving @balance alone) if amount > @balance;
  #    otherwise deduct and return true.
  def withdraw(amount)
    raise NotImplementedError, "TODO: implement withdraw"
  end
end
`,

  requirements: [
    { pattern: /class\s+BankAccount/, message: "Define class BankAccount" },
    { pattern: /def\s+initialize/, message: "Define the initialize constructor" },
    { pattern: /attr_reader|attr_accessor/, message: "Generate the getters with attr_reader (or attr_accessor)" },
    { pattern: /@balance/, message: "Keep the state in the @balance instance variable" },
  ],

  tests: [
    { name: 'BankAccount.new("Ada") starts with the owner set and a 0 balance',
      code: '  acct = BankAccount.new("Ada")\n  expect_eq(acct.owner, "Ada")\n  expect_eq(acct.balance, 0)' },
    { name: "deposit(100) then deposit(50) leaves a balance of 150",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(100)\n  acct.deposit(50)\n  expect_eq(acct.balance, 150)' },
    { name: "withdraw(30) from 100 returns true and leaves 70",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(100)\n  expect_true(acct.withdraw(30) == true)\n  expect_eq(acct.balance, 70)' },
    { name: "withdraw(500) from 100 returns false",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(100)\n  expect_eq(acct.withdraw(500), false)' },
    { name: "a failed withdraw leaves the balance unchanged",
      code: '  acct = BankAccount.new("Ada")\n  acct.deposit(100)\n  acct.withdraw(500)\n  expect_eq(acct.balance, 100)' },
  ],

  solution: `class BankAccount
  attr_reader :owner, :balance

  def initialize(owner)
    @owner = owner
    @balance = 0
  end

  def deposit(amount)
    @balance += amount
  end

  def withdraw(amount)
    return false if amount > @balance
    @balance -= amount
    true
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>Definition</td><td>header + implementation file</td><td><code>class ... end</code>, one place</td></tr>
  <tr><td>Constructor</td><td><code>Foo(args)</code>, plus copy/move overloads</td><td><code>def initialize(args)</code> — the only one</td></tr>
  <tr><td>Instantiate</td><td><code>Foo obj(args);</code> / <code>make_shared&lt;Foo&gt;(args)</code></td><td><code>Foo.new(args)</code></td></tr>
  <tr><td>Member data</td><td><code>owner_</code> declared in the class</td><td><code>@owner</code>, created on first assignment</td></tr>
  <tr><td>Getter / setter</td><td>hand-written methods</td><td><code>attr_reader</code> / <code>attr_writer</code> / <code>attr_accessor</code></td></tr>
  <tr><td>Visibility</td><td><code>public:</code> fields possible</td><td>@ivars always private; methods public by default</td></tr>
  <tr><td>Destruction</td><td><code>~Foo()</code>, <code>delete</code>, RAII</td><td>garbage collected</td></tr>
  <tr><td>Assignment</td><td>copies (or moves) the value</td><td>shares the reference — like <code>shared_ptr</code></td></tr>
</table>
<p><code>attr_reader :owner, :balance</code> is not syntax — it's an ordinary
method call, executed while the class body runs, that <em>defines</em> two
methods for you. Class bodies are just code, which is where much of Ruby's
"magic" lives. And note what <code>withdraw</code> returns on success: Ruby's
implicit return means the bare <code>true</code> on the last line is the
return value, while the modifier-if guard handles the failure path in one
line — the same shape the C++ version needed four lines and a brace pair
for.</p>`,
};
