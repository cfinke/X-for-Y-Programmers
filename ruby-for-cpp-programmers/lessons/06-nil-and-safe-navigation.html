  title: "Nil & Safe Navigation",

  intro: `
<p>C++ gives you several flavors of "no value" — <code>nullptr</code> for
pointers, <code>std::nullopt</code> for <code>std::optional</code>, and the
ever-present risk that dereferencing the wrong one is undefined behavior.
Ruby has exactly one absent value: <code>nil</code>, the single instance of
<code>NilClass</code>. And there is no UB anywhere near it — calling a method
on <code>nil</code> raises a clean <code>NoMethodError</code> with a message
naming the method. It never segfaults, never corrupts memory, never "happens
to work".</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>nullptr</code> / <code>std::nullopt</code></td><td><code>nil</code> (one value, one class)</td></tr>
  <tr><td><code>if (p &amp;&amp; p-&gt;addr &amp;&amp; ...)</code></td><td><code>p&amp;.addr&amp;.city</code></td></tr>
  <tr><td><code>opt.value_or(def)</code></td><td><code>x || def</code></td></tr>
  <tr><td><code>if (!cache) cache = load();</code></td><td><code>cache ||= load</code></td></tr>
  <tr><td><code>p == nullptr</code></td><td><code>p.nil?</code></td></tr>
</table>
<p>The null-check pyramid collapses into the <strong>safe navigation
operator</strong>: <code>user&amp;.address&amp;.city</code> evaluates to
<code>nil</code> the moment any link is <code>nil</code>, instead of raising.
And <code>||</code> plays the role of <code>value_or</code> — precisely,
because Ruby's truthiness rule is stricter than C++'s: <em>only</em>
<code>nil</code> and <code>false</code> are falsy. <code>0</code> and
<code>""</code> are truthy, so <code>count || 5</code> keeps a stored
<code>0</code> where C++'s <code>value ? value : def</code> habit would lose
it. <code>x ||= y</code> assigns only when <code>x</code> is nil/false —
the lazy-init idiom in one token.</p>`,

  cpp: `#include <optional>
#include <string>
#include <vector>

struct Address { std::string city; };
struct User    { const Address* address = nullptr; };  // may be null

std::string get_city(const User* user) {
    if (user && user->address) {         // the null-check pyramid
        return user->address->city;      // one missed check -> UB
    }
    return "Unknown";
}

std::optional<int> maybe_first(const std::vector<int>& v) {
    if (v.empty()) return std::nullopt;
    return v.front();
}

int first_or_default(const std::vector<int>& v, int def) {
    return maybe_first(v).value_or(def); // optional's escape hatch
}`,

  task: `
<p>The starter defines <code>Address</code> (with an <code>attr_reader :city</code>)
and <code>User</code> (whose <code>address</code> defaults to <code>nil</code>).
Write three methods:</p>
<ol>

</ol>`,

  tests: [
    { name: 'get_city on a fully-populated user returns the city',
      code: '  u = User.new(Address.new("Vienna"))\n  expect_eq(get_city(u), "Vienna")' },
    { name: 'get_city on a user with no address returns "Unknown"',

    { name: 'get_city(nil) returns "Unknown" — no NoMethodError, no segfault',
      code: '  expect_eq(get_city(nil), "Unknown")' },
    { name: 'pick({count: 0}, :count, 5) returns 0 — 0 is truthy in Ruby',
      code: '  expect_eq(pick({count: 0}, :count, 5), 0)' },
    { name: 'pick({}, :retries, 3) returns the default 3',
      code: '  expect_eq(pick({}, :retries, 3), 3)' },
    { name: 'first_or_default: [7, 8] gives 7; [] gives the default 42',

  solution: `class Address
  attr_reader :city
  def initialize(city)
    @city = city
  end
end

class User
  attr_reader :address
  def initialize(address = nil)
    @address = address
  end
end

def get_city(user)
  user&.address&.city || "Unknown"
end

def pick(hash, key, default)
  hash[key] || default
end

def first_or_default(arr, default)
  first = arr.first
  first.nil? ? default : first
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>The absent value</td><td><code>nullptr</code>, <code>std::nullopt</code>, <code>NULL</code>…</td><td><code>nil</code> — one value, class <code>NilClass</code></td></tr>
  <tr><td>Use after null</td><td>undefined behavior</td><td><code>NoMethodError</code>, always, with a message</td></tr>
  <tr><td>Chained access</td><td><code>if (a &amp;&amp; a-&gt;b &amp;&amp; a-&gt;b-&gt;c)</code></td><td><code>a&amp;.b&amp;.c</code> (nil short-circuits)</td></tr>
  <tr><td>Default value</td><td><code>opt.value_or(def)</code></td><td><code>x || def</code></td></tr>
  <tr><td>Lazy init</td><td><code>if (!x) x = make();</code></td><td><code>x ||= make</code></td></tr>
  <tr><td>Null test</td><td><code>p == nullptr</code></td><td><code>x.nil?</code> (or just <code>unless x</code>)</td></tr>
  <tr><td>Falsy values</td><td><code>0</code>, <code>nullptr</code>, <code>false</code>, <code>0.0</code>…</td><td><em>only</em> <code>nil</code> and <code>false</code></td></tr>
</table>
<p>The strict truthiness rule is what makes <code>||</code> a safe
<code>value_or</code>: in C++, <code>if (count)</code> silently treats a
stored <code>0</code> as "no value", but in Ruby <code>0</code>,
<code>""</code>, and <code>[]</code> are all truthy, so <code>hash[key] ||
default</code> only fires when the key is genuinely absent (or stores
<code>nil</code>/<code>false</code> — for those rare cases, reach for
<code>hash.fetch(key, default)</code>).</p>`,
