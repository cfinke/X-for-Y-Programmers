  number: 8,
  title: "Control Flow & case",

  intro: `
<p>Ruby's <code>if</code> drops the parentheses and braces —
<code>if cond ... end</code> — and then goes two places C++ can't. First, the
<strong>modifier form</strong>: <code>return x if cond</code> puts the
condition <em>after</em> the statement, which turns guard clauses into single
readable lines. Second, <code>unless</code> is <code>if !</code> spelled for
humans. And every one of these constructs is an <em>expression</em> that
yields a value.</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>if (cond) { ... }</code></td><td><code>if cond ... end</code></td></tr>
  <tr><td><code>if (n == 0) return "zero";</code></td><td><code>return "zero" if n.zero?</code></td></tr>
  <tr><td><code>if (!ok) { ... }</code></td><td><code>unless ok ... end</code></td></tr>
  <tr><td><code>switch</code> — integral only, <code>break</code> everywhere</td><td><code>case/when</code> — any values, no fallthrough</td></tr>
  <tr><td><code>case 10: case 9:</code> fallthrough trick</td><td><code>when "saturday", "sunday"</code></td></tr>
  <tr><td>can't <code>switch</code> on a range</td><td><code>when 90..</code> — range arms</td></tr>
</table>
<p><code>case/when</code> is what <code>switch</code> wanted to be. It matches
<em>any</em> values, not just integral constants: strings, ranges
(<code>when 90..</code> matches 90 and above), several values in one arm, even
classes. There is no fallthrough and nothing to <code>break</code> out of —
each <code>when</code> is independent. And because <code>case</code> is an
expression, its result can be a method's return value directly: no
<code>return</code> per arm, no variable mutated in every branch.</p>`,

  cpp: `#include <string>

std::string grade(int score) {
    switch (score / 10) {              // switch: integral values only,
        case 10: case 9: return "A";   // so fake the ranges with /10
        case 8:  return "B";
        case 7:  return "C";
        case 6:  return "D";
        default: return "F";
    }
}

std::string day_type(const std::string& day) {
    // no switch on strings — back to if/else chains
    if (day == "saturday" || day == "sunday") return "weekend";
    return "weekday";
}

std::string describe_number(int n) {
    if (n == 0) return "zero";
    return n > 0 ? "positive" : "negative";
}`,

  task: `
<p>Rewrite the three functions with Ruby's control flow:</p>
<ol>
  <li><code>grade(score)</code> — one <code>case score</code> expression with
      <strong>range arms</strong>: <code>when 90..</code> is "A",
      <code>when 80..89</code> is "B", <code>70..79</code> "C",
      <code>60..69</code> "D", <code>else</code> "F". Let the <code>case</code>
      itself be the method's last expression.</li>
  <li><code>day_type(day)</code> — a <code>case day</code> with a
      <strong>grouped</strong> arm: <code>when "saturday", "sunday"</code>
      returns <code>"weekend"</code>, <code>else</code>
      <code>"weekday"</code>. Yes, case on strings.</li>
  <li><code>describe_number(n)</code> — a one-line <strong>modifier-if</strong>
      guard (<code>return "zero" if n.zero?</code>), then an
      <code>if/else</code> <em>expression</em> yielding
      <code>"positive"</code> or <code>"negative"</code>.</li>
</ol>`,

  starter: `# 1. grade: case with range arms — when 90.. then "A", etc.
#    The case expression's value is the method's return value.

end

# 2. day_type: one when arm can list several values, separated by commas.

  raise NotImplementedError, "TODO: implement day_type"
end

# 3. describe_number: a modifier-if guard, then if/else as an expression.

  raise NotImplementedError, "TODO: implement describe_number"
end
`,

  requirements: [
    { pattern: /case\b/, message: "Use a case expression" },
    { pattern: /when\s+/, message: "Use when arms (ranges and grouped values)" },
    { pattern: /if\s+\w|unless/, message: "Use a modifier if (or unless) guard" },
  ],

  tests: [
    { name: 'grade: 95 and 90 are "A" (open-ended range 90..)',
      code: '  expect_eq(grade(95), "A")\n  expect_eq(grade(90), "A")' },
    { name: 'grade: 85 is "B", 71 is "C", 60 is "D"',
      code: '  expect_eq(grade(85), "B")\n  expect_eq(grade(71), "C")\n  expect_eq(grade(60), "D")' },
    { name: 'grade: 42 is "F"',
      code: '  expect_eq(grade(42), "F")' },
    { name: 'day_type: both weekend days hit the grouped when arm',
      code: '  expect_eq(day_type("saturday"), "weekend")\n  expect_eq(day_type("sunday"), "weekend")' },
    { name: 'day_type("wednesday") is "weekday"',
      code: '  expect_eq(day_type("wednesday"), "weekday")' },
    { name: 'describe_number: 0 -> "zero", 5 -> "positive", -3 -> "negative"',
      code: '  expect_eq(describe_number(0), "zero")\n  expect_eq(describe_number(5), "positive")\n  expect_eq(describe_number(-3), "negative")' },
  ],

  solution: `def grade(score)
  case score
  when 90..   then "A"
  when 80..89 then "B"
  when 70..79 then "C"
  when 60..69 then "D"
  else "F"
  end
end

def day_type(day)
  case day
  when "saturday", "sunday" then "weekend"
  else "weekday"
  end
end

def describe_number(n)
  return "zero" if n.zero?
  if n.positive?
    "positive"
  else
    "negative"
  end
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>Basic if</td><td><code>if (cond) { ... }</code></td><td><code>if cond ... end</code> (no parens, no braces)</td></tr>
  <tr><td>Guard clause</td><td><code>if (bad) return x;</code></td><td><code>return x if bad</code> (modifier form)</td></tr>
  <tr><td>Negated if</td><td><code>if (!ok)</code></td><td><code>unless ok</code></td></tr>
  <tr><td>Multi-way branch</td><td><code>switch</code> (integral, fallthrough, <code>break</code>)</td><td><code>case/when</code> (any values, no fallthrough)</td></tr>
  <tr><td>Range arm</td><td><code>case 9: case 10:</code> tricks</td><td><code>when 90..</code>, <code>when 80..89</code></td></tr>
  <tr><td>Several values, one arm</td><td>stacked <code>case</code> labels</td><td><code>when "saturday", "sunday"</code></td></tr>
  <tr><td>Branch as a value</td><td><code>?:</code> only</td><td><code>if</code> and <code>case</code> are expressions</td></tr>
</table>
<p>Under the hood each arm asks <code>arm === value</code> — ranges implement
<code>===</code> as "covers?", classes as "is instance of?", regexps as
"matches?". That protocol is why <code>case</code> handles ranges, strings,
and classes with the same syntax, and it's extensible: any object of yours
that defines <code>===</code> can sit in a <code>when</code>. Use the
expression-ness: assigning <code>result = case ... end</code> (or returning it
implicitly) replaces the C++ pattern of declaring a variable and mutating it
in every branch.</p>`,
};
