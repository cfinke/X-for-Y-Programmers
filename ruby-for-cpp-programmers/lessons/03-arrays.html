  number: 3,
  title: "Arrays",

  intro: `
<p>Ruby's <code>Array</code> is your <code>std::vector</code> with the
template parameter deleted: <code>[1, 2, 3]</code> is a growable,
heap-allocated sequence, and because there is no element type it can hold
anything — <code>[1, "two", 3.0]</code> is legal (whether it's wise is
another matter). <code>push_back</code> becomes the shovel operator:
<code>arr &lt;&lt; x</code> — yes, the same tokens you overload for
<code>std::ostream</code>, here meaning append.</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>std::vector&lt;int&gt; v{1, 2, 3};</code></td><td><code>v = [1, 2, 3]</code></td></tr>
  <tr><td><code>v.push_back(4);</code></td><td><code>v &lt;&lt; 4</code></td></tr>
  <tr><td><code>v.size()</code></td><td><code>v.size</code> / <code>v.length</code></td></tr>
  <tr><td><code>std::find(v.begin(), v.end(), x) != v.end()</code></td><td><code>v.include?(x)</code></td></tr>
  <tr><td><code>v.front()</code> / <code>v.back()</code>, <code>*v.rbegin()</code></td><td><code>v.first</code> / <code>v.last</code>, <code>v[-1]</code></td></tr>
  <tr><td><code>std::accumulate(v.begin(), v.end(), 0)</code></td><td><code>v.sum</code></td></tr>
</table>
<p>Indexing is where Ruby gets generous. Negative indexes count from the end:
<code>arr[-1]</code> is the last element, <code>arr[-2]</code> the one before
it — no <code>rbegin()</code>. Ranges slice: <code>arr[1..2]</code> gives
elements 1 through 2. And an out-of-range read is never UB, never a crash —
it just gives back <code>nil</code>. The whole
begin/end iterator-pair vocabulary is gone; the array itself answers.</p>`,

  cpp: `#include <algorithm>
#include <numeric>
#include <utility>
#include <vector>

std::vector<int> make_scores() {
    std::vector<int> scores;
    scores.push_back(85);
    scores.push_back(92);
    scores.push_back(78);
    return scores;
}

int total(const std::vector<int>& nums) {
    return std::accumulate(nums.begin(), nums.end(), 0);
}

std::pair<int, int> ends(const std::vector<int>& arr) {
    return { arr.front(), arr.back() };   // empty vector: UB!
}`,

  task: `
<p>Rewrite the C++ as Ruby:</p>
<ol>
  <li><code>make_scores</code> — start from an empty array
      (<code>[]</code>), shovel in <code>85</code>, <code>92</code>,
      <code>78</code> with <code>&lt;&lt;</code>, and let the array be the
      last expression.</li>
  <li><code>append(arr, x)</code> — push <code>x</code> onto
      <code>arr</code> with <code>&lt;&lt;</code>. Handy fact: the shovel
      evaluates to the array itself (that's why it chains), so it can be your
      last expression directly.</li>
  <li><code>total(nums)</code> — the whole
      <code>std::accumulate(begin, end, 0)</code> ritual is one word:
      <code>.sum</code>.</li>
  <li><code>ends(arr)</code> — a two-element array
      <code>[arr.first, arr.last]</code>. No <code>front()</code>/UB
      anxiety; on an empty array these are just <code>nil</code>.</li>
</ol>`,

  requirements: [
    { pattern: /<</, message: "Use the << shovel operator to append" },
    { pattern: /\.sum/, message: "Use .sum in total" },
    { pattern: /\.first/, message: "Use .first in ends" },

  tests: [
    { name: "make_scores returns [85, 92, 78]",
      code: "  expect_eq(make_scores, [85, 92, 78])" },
    { name: "append([1, 2], 3) returns [1, 2, 3]",

    { name: 'append can mix types: append([1, 2], "three") works',
      code: '  expect_eq(append([1, 2], "three"), [1, 2, "three"])' },
    { name: "total([1, 2, 3, 4]) returns 10",
      code: "  expect_eq(total([1, 2, 3, 4]), 10)" },
    { name: "ends([7, 8, 9]) returns [7, 9]",
      code: "  expect_eq(ends([7, 8, 9]), [7, 9])" },
    { name: "ends([]) returns [nil, nil] — out of range is nil, not UB",
      code: "  expect_eq(ends([]), [nil, nil])" },
  ],

  solution: `def make_scores
  scores = []
  scores << 85
  scores << 92
  scores << 78
  scores
end

def append(arr, x)
  arr << x
end

def total(nums)
  nums.sum
end

def ends(arr)
  [arr.first, arr.last]
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>Literal</td><td><code>std::vector&lt;int&gt; v{1, 2};</code></td><td><code>v = [1, 2]</code> (heterogeneous allowed)</td></tr>
  <tr><td>Append</td><td><code>v.push_back(x);</code></td><td><code>v &lt;&lt; x</code> (chains: <code>v &lt;&lt; 1 &lt;&lt; 2</code>)</td></tr>
  <tr><td>Length</td><td><code>v.size()</code></td><td><code>v.size</code> / <code>v.length</code></td></tr>
  <tr><td>Membership</td><td><code>std::find(...) != v.end()</code></td><td><code>v.include?(x)</code></td></tr>
  <tr><td>Last element</td><td><code>v.back()</code>, <code>*v.rbegin()</code></td><td><code>v.last</code>, <code>v[-1]</code></td></tr>
  <tr><td>Slice</td><td><code>std::span</code>, iterator pairs</td><td><code>v[1..2]</code>, <code>v[1..]</code>, <code>v.first(2)</code></td></tr>
  <tr><td>Sum</td><td><code>std::accumulate(b, e, 0)</code></td><td><code>v.sum</code></td></tr>
  <tr><td>Out-of-range read</td><td>UB (<code>[]</code>) or throw (<code>.at</code>)</td><td><code>nil</code> — always, quietly</td></tr>
</table>
<p>The safety trade is characteristic: where <code>v[10]</code> on a
three-element vector is undefined behavior, Ruby hands you <code>nil</code>
and keeps going — the failure surfaces later, as a
<code>NoMethodError</code> on <code>nil</code>, rather than as a security
advisory. Also gone: iterator invalidation. Arrays are objects on the heap;
references to them never dangle, because the GC keeps anything reachable
alive.</p>`,
};
