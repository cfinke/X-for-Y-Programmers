<p>No new concepts — this is the course in one exercise: a small inventory
built from a class (lesson 9), queried with Enumerable (lessons 12–13), and
updated the value-oriented way. The starter gives you a finished
<code>Item</code> class; you write four functions against a list of them.</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>std::accumulate</code> with a lambda</td><td><code>items.sum { |i| ... }</code></td></tr>
  <tr><td><code>std::find_if</code> returning <code>end()</code></td><td><code>.find { }</code> returning <code>nil</code></td></tr>
  <tr><td>copy constructor, then modify the copy</td><td>build a fresh <code>Item.new(...)</code></td></tr>
  <tr><td>filter loop + transform loop</td><td><code>.select { }.map { }</code></td></tr>
</table>
<p>The one C++ instinct to keep switched on: Ruby variables are shared
references — closer to <code>shared_ptr</code> than to values on the stack.
An Array of Items holds references, and so does any Array you build from it,
so "return an updated list" must not mutate the Items the caller still holds.
There is no copy constructor to lean on; the idiom is copy-and-modify by
construction — <code>map</code> over the list and build a brand-new
<code>Item.new(...)</code> for the entry that changes, passing everything
else through untouched.</p>`,

  cpp: `#include <algorithm>
#include <numeric>
#include <string>
#include <vector>

struct Item {
    std::string name;
    int price_cents;
    int count;
};

int total_value(const std::vector<Item>& items) {
    return std::accumulate(items.begin(), items.end(), 0,
        [](int acc, const Item& i) { return acc + i.price_cents * i.count; });
}

const Item* find_item(const std::vector<Item>& items, const std::string& name) {
    auto it = std::find_if(items.begin(), items.end(),
                           [&](const Item& i) { return i.name == name; });
    return it == items.end() ? nullptr : &*it;
}

std::vector<Item> restock(std::vector<Item> items,   // taken by copy
                          const std::string& name, int amount) {
    for (auto& i : items)
        if (i.name == name) i.count += amount;
    return items;
}`,

  solution: `class Item
  attr_reader :name, :price_cents, :count

  def initialize(name, price_cents, count)
    @name = name
    @price_cents = price_cents
    @count = count
  end
end

def total_value(items)
  items.sum { |i| i.price_cents * i.count }
end

def find_item(items, name)
  items.find { |i| i.name == name }
end

def restock(items, name, amount)
  items.map do |i|
    if i.name == name
      Item.new(i.name, i.price_cents, i.count + amount)
    else
      i
    end
  end
end

def names_in_stock(items)
  items.select { |i| i.count > 0 }.map { |i| i.name }
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>Reduce</td><td><code>std::accumulate</code> + lambda</td><td><code>sum { }</code> (or <code>reduce</code>)</td></tr>
  <tr><td>First match</td><td><code>std::find_if</code>, compare to <code>end()</code></td><td><code>.find { }</code>, get <code>nil</code></td></tr>
  <tr><td>Filter + transform</td><td>two loops or <code>views::filter | views::transform</code></td><td><code>.select { }.map { }</code></td></tr>
  <tr><td>Update immutably</td><td>copy the vector, mutate the copy's element</td><td><code>map</code> + a fresh <code>Item.new</code> for the change</td></tr>
  <tr><td>Aliasing model</td><td>values by default; sharing is opt-in</td><td>everything is a shared reference; copying is opt-in</td></tr>
</table>
<p>That last row is the capstone's real lesson. In C++,
<code>std::vector&lt;Item&gt;</code> owns its elements, so copying the vector
copies the Items and mutation stays local. In Ruby, copying the Array
(<code>dup</code>, <code>map</code>, slicing) copies only the
<em>references</em> — mutate an Item through the copy and the caller sees it.
So idiomatic Ruby updates by construction, exactly as you did in
<code>restock</code>: new Array, new object for the changed entry, structural
sharing for the rest. Get that instinct and the rest of the course —
messages instead of member access, blocks instead of lambdas-and-algorithms,
<code>nil</code> instead of sentinels — is just vocabulary.</p>`,
