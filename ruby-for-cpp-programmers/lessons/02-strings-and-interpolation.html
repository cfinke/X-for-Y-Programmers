  number: 2,
  title: "Strings & Interpolation",

  intro: `
<p>You have built strings with <code>+</code> chains, with
<code>std::ostringstream</code>, and lately with <code>std::format</code>.
Ruby has one answer for all of it: interpolation. Any expression inside
<code>#{...}</code> in a double-quoted string is evaluated and spliced in —
<code>"Hello, #{name}!"</code> — and each interpolation builds a brand-new
string object on the heap. Ruby strings are mutable objects (there are
in-place methods too), but idiomatic code mostly builds new ones and lets the
GC sweep up.</p>
<table>
  <tr><th>C++</th><th>Ruby</th></tr>
  <tr><td><code>"Hello, " + name + "!"</code></td><td><code>"Hello, #{name}!"</code></td></tr>
  <tr><td><code>std::transform(..., ::toupper)</code></td><td><code>s.upcase</code></td></tr>
  <tr><td><code>s.find(w) != std::string::npos</code></td><td><code>s.include?(w)</code> — an actual bool</td></tr>
  <tr><td><code>s.size()</code></td><td><code>s.length</code> (or <code>s.size</code>)</td></tr>
  <tr><td>loop + <code>+=</code> over a vector</td><td><code>words.join(", ")</code></td></tr>
</table>
<p>Notice the shape of these: where C++ hands you an iterator-and-algorithm
kit, Ruby's <code>String</code> answers messages directly —
<code>.upcase</code> is one method call, not a
<code>std::transform</code> incantation. And <code>.include?</code> shows a
naming convention worth adopting today: predicate methods end in
<code>?</code> and give back a real <code>true</code>/<code>false</code>, not
an <code>npos</code> sentinel to compare against.</p>`,

  cpp: `#include <algorithm>
#include <cctype>
#include <string>
#include <vector>

std::string shout(std::string s) {
    std::transform(s.begin(), s.end(), s.begin(),
                   [](unsigned char c) { return std::toupper(c); });
    return s;
}

std::string greet(const std::string& name) {
    return "Hello, " + name + "!";
}

bool contains_word(const std::string& haystack, const std::string& needle) {
    return haystack.find(needle) != std::string::npos;
}

std::string join_words(const std::vector<std::string>& words) {
    std::string out;
    for (std::size_t i = 0; i < words.size(); ++i) {
        if (i > 0) out += ", ";
        out += words[i];
    }
    return out;
}`,

  task: `
<p>Rewrite the C++ on the left as Ruby — every one of these collapses to a
single expression:</p>
<ol>
  <li><code>shout(s)</code> — the whole <code>std::transform</code> lambda
      dance is one message: <code>.upcase</code>.</li>
  <li><code>greet(name)</code> — build <code>"Hello, Ada!"</code> with
      <code>#{}</code> interpolation, not <code>+</code> concatenation.</li>
  <li><code>contains_word?(haystack, needle)</code> — note the <code>?</code>
      is part of the method name. Use <code>.include?</code>; no
      <code>npos</code> comparison, it already is a bool.</li>
  <li><code>join_words(words)</code> — the entire accumulator loop is
      <code>words.join(", ")</code>.</li>
</ol>`,

  requirements: [
    { pattern: /#\{/, message: "Build greet's string with #{} interpolation" },
    { pattern: /\.upcase/, message: "Use .upcase in shout" },
    { pattern: /\.include\?/, message: "Use .include? in contains_word?" },
    { pattern: /\.join/, message: "Use .join in join_words" },
  ],

  tests: [
    { name: 'shout("hello") returns "HELLO"',
      code: '  expect_eq(shout("hello"), "HELLO")' },
    { name: 'greet("Ada") returns "Hello, Ada!"',
      code: '  expect_eq(greet("Ada"), "Hello, Ada!")' },
    { name: 'contains_word?("the quick brown fox", "quick") is true',
      code: '  expect_true(contains_word?("the quick brown fox", "quick"))' },
    { name: 'contains_word?("the quick brown fox", "slow") is false',
      code: '  expect_eq(contains_word?("the quick brown fox", "slow"), false)' },
    { name: 'join_words(["C++", "Ruby", "Rust"]) returns "C++, Ruby, Rust"',
      code: '  expect_eq(join_words(["C++", "Ruby", "Rust"]), "C++, Ruby, Rust")' },
  ],

  solution: `def shout(s)
  s.upcase
end

def greet(name)
  "Hello, #{name}!"
end

def contains_word?(haystack, needle)
  haystack.include?(needle)
end

def join_words(words)
  words.join(", ")
end
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C++</th><th>Ruby</th></tr>
  <tr><td>Build a string</td><td><code>+</code> chains, <code>ostringstream</code>, <code>std::format</code></td><td><code>"#{expr}"</code> interpolation</td></tr>
  <tr><td>Uppercase</td><td><code>std::transform</code> + <code>::toupper</code></td><td><code>s.upcase</code> (also <code>.downcase</code>, <code>.capitalize</code>)</td></tr>
  <tr><td>Substring test</td><td><code>s.find(w) != npos</code></td><td><code>s.include?(w)</code></td></tr>
  <tr><td>Length</td><td><code>s.size()</code></td><td><code>s.length</code> / <code>s.size</code></td></tr>
  <tr><td>Join a collection</td><td>manual loop with separator logic</td><td><code>words.join(", ")</code></td></tr>
  <tr><td>Trim / split</td><td>hand-rolled or boost</td><td><code>s.strip</code>, <code>s.split(",")</code></td></tr>
  <tr><td>Mutate in place</td><td>default</td><td><code>s.upcase!</code> — the <code>!</code> flags the mutating variant</td></tr>
</table>
<p>The <code>?</code> and <code>!</code> suffixes are pure convention but
universal: <code>?</code> marks a predicate, <code>!</code> marks the
dangerous sibling (usually in-place mutation, like <code>upcase!</code>
next to <code>upcase</code>). Ruby strings are mutable objects — closer to
<code>std::string</code> than to an immutable Java string — yet everyday code
treats them as values, builds new ones by interpolation, and never thinks
about who owns the buffer.</p>`,
