  number: 4,
  title: "Maps",

  intro: `
<p>In C# you reach for <code>Dictionary&lt;TKey, TValue&gt;</code> to associate
keys with values. Java has a real <code>Map&lt;K, V&gt;</code> interface, and the
everyday implementation is <code>HashMap</code>. Like a C# dictionary, a Java map is
strongly typed on both sides — <code>Map&lt;String, Integer&gt;</code> only ever
holds <code>String</code> keys and <code>Integer</code> values.</p>
<table>
  <tr><th>C#</th><th>Java</th></tr>
  <tr><td><code>new Dictionary&lt;string, int&gt;()</code></td><td><code>new HashMap&lt;String, Integer&gt;()</code></td></tr>
  <tr><td><code>m["a"] = 1</code></td><td><code>m.put("a", 1)</code></td></tr>
  <tr><td><code>m["a"]</code> → throws if missing</td><td><code>m.get("a")</code> → <code>Integer</code> or <code>null</code></td></tr>
  <tr><td><code>m.GetValueOrDefault("a", 0)</code></td><td><code>m.getOrDefault("a", 0)</code></td></tr>
  <tr><td><code>m.ContainsKey("a")</code></td><td><code>m.containsKey("a")</code></td></tr>
  <tr><td><code>m.Remove("a")</code></td><td><code>m.remove("a")</code></td></tr>
  <tr><td><code>m.Count</code></td><td><code>m.size()</code></td></tr>
</table>
<p>A key difference: <code>get</code> on a missing key returns <code>null</code>
rather than throwing a <code>KeyNotFoundException</code> the way <code>m["a"]</code>
does in C#, and if the value type is a boxed primitive like <code>Integer</code>
that <code>null</code> will crash on auto-unboxing. Prefer <code>getOrDefault</code>
to sidestep it. For read-only lookup tables, use
<code>Map.of(k1, v1, k2, v2, …)</code> — the Java equivalent of a dictionary
initializer wrapped in <code>ImmutableDictionary</code> or a
<code>readonly</code> field.</p>`,

  csharp: `static Dictionary<string, int> WordCounts(List<string> words) {
    var counts = new Dictionary<string, int>();
    foreach (var w in words) {
        counts[w] = counts.GetValueOrDefault(w, 0) + 1;
    }
    return counts;
}`,

  task: `
<p>Build a small class of static map utilities. Put everything in a class named
<code>Maps</code>:</p>
<ol>
  <li><code>countWords(List&lt;String&gt; words)</code> returns a
      <code>Map&lt;String, Integer&gt;</code> mapping each word to how many times
      it appears. Use <code>getOrDefault</code> (or
      <code>computeIfAbsent</code>).</li>
  <li><code>get(Map&lt;String, Integer&gt; m, String key)</code> returns the value
      for <code>key</code>, or <code>0</code> if the key is absent — use
      <code>getOrDefault</code>.</li>
  <li><code>total(Map&lt;String, Integer&gt; m)</code> sums every value by
      iterating <code>m.entrySet()</code>.</li>
  <li><code>hasKey(Map&lt;String, Integer&gt; m, String key)</code> returns whether
      the key is present via <code>containsKey</code>.</li>
  <li><code>codes()</code> returns an immutable map built with
      <code>Map.of("red", 1, "green", 2, "blue", 3)</code>.</li>
</ol>`,

  starter: `class Maps {
  static Map<String, Integer> countWords(List<String> words) {
    return null; // TODO
  }

  static int get(Map<String, Integer> m, String key) {
    return 0; // TODO: use getOrDefault
  }

  static int total(Map<String, Integer> m) {
    return 0; // TODO: iterate entrySet()
  }

  static boolean hasKey(Map<String, Integer> m, String key) {
    return false; // TODO: use containsKey
  }

  static Map<String, Integer> codes() {

`,

  requirements: [
    { pattern: /new\s+HashMap/, message: "Build the word-count map with a HashMap" },
    { pattern: /getOrDefault/, message: "Use getOrDefault for missing-key lookups" },
    { pattern: /entrySet\s*\(\s*\)/, message: "Sum values by iterating entrySet()" },
    { pattern: /Map\.of/, message: "Build the immutable codes() map with Map.of" },
  ],

  tests: [
    { name: 'countWords counts repeats', code: '      var c = Maps.countWords(List.of("a", "b", "a", "a"));\n      expect_eq(c.get("a"), 3);\n      expect_eq(c.get("b"), 1);' },
    { name: 'countWords on empty list is empty', code: '      expect_eq(Maps.countWords(List.of()).size(), 0);' },
    { name: 'get returns value or 0', code: '      var c = Maps.countWords(List.of("x", "x"));\n      expect_eq(Maps.get(c, "x"), 2);\n      expect_eq(Maps.get(c, "missing"), 0);' },
    { name: 'total sums the values', code: '      expect_eq(Maps.total(Maps.countWords(List.of("a", "b", "a"))), 3);' },
    { name: 'hasKey reflects containsKey', code: '      var c = Maps.countWords(List.of("here"));\n      expect_true(Maps.hasKey(c, "here"));\n      expect_true(!Maps.hasKey(c, "nope"));' },
    { name: 'codes() is the expected immutable map', code: '      var m = Maps.codes();\n      expect_eq(m.size(), 3);\n      expect_eq(m.get("green"), 2);' },
  ],

  solution: `class Maps {
  static Map<String, Integer> countWords(List<String> words) {
    Map<String, Integer> counts = new HashMap<>();
    for (String w : words) {
      counts.put(w, counts.getOrDefault(w, 0) + 1);
    }
    return counts;
  }

  static int get(Map<String, Integer> m, String key) {
    return m.getOrDefault(key, 0);
  }

  static int total(Map<String, Integer> m) {
    int sum = 0;
    for (Map.Entry<String, Integer> e : m.entrySet()) {
      sum += e.getValue();
    }
    return sum;
  }

  static boolean hasKey(Map<String, Integer> m, String key) {
    return m.containsKey(key);
  }

  static Map<String, Integer> codes() {
    return Map.of("red", 1, "green", 2, "blue", 3);
  }
}
`,

  notes: `
<table>
  <tr><th>Concept</th><th>C#</th><th>Java</th></tr>
  <tr><td>Create</td><td><code>new Dictionary&lt;K, V&gt;()</code></td><td><code>new HashMap&lt;&gt;()</code></td></tr>
  <tr><td>Insert / update</td><td><code>m[k] = v</code></td><td><code>m.put(k, v)</code></td></tr>
  <tr><td>Read with default</td><td><code>m.GetValueOrDefault(k, d)</code></td><td><code>m.getOrDefault(k, d)</code></td></tr>
  <tr><td>Membership</td><td><code>m.ContainsKey(k)</code></td><td><code>m.containsKey(k)</code></td></tr>
  <tr><td>Delete</td><td><code>m.Remove(k)</code></td><td><code>m.remove(k)</code></td></tr>
  <tr><td>Iterate</td><td><code>foreach (var kv in m)</code></td><td><code>for (var e : m.entrySet())</code></td></tr>
  <tr><td>Immutable literal</td><td><code>ImmutableDictionary.CreateRange(...)</code></td><td><code>Map.of(...)</code></td></tr>
</table>
<p>Two idioms worth internalizing. <code>getOrDefault</code> replaces the
<code>GetValueOrDefault</code> dance and, crucially, avoids the
<code>NullPointerException</code> you would hit if you unboxed a <code>null</code>
<code>Integer</code> into an <code>int</code>. And
<code>computeIfAbsent(key, k -&gt; new ArrayList&lt;&gt;())</code> is the clean way
to build a map-of-lists: it inserts and returns the default in one step, so
<code>m.computeIfAbsent(k, x -&gt; new ArrayList&lt;&gt;()).add(v)</code>
just works.</p>
<p>Remember that <code>Map.of</code> is immutable — calling <code>put</code> on it
throws <code>UnsupportedOperationException</code>, and it rejects <code>null</code>
keys and values. It also caps out around ten pairs; past that, use
<code>Map.ofEntries(...)</code> or a mutable <code>HashMap</code>.</p>`,
};
